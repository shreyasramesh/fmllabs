# Бритва Хэнлона
# Ментальная модель / Когнитивное искажение - Пример записи

id: hanlons_razor
name: Бритва Хэнлона

quick_introduction: |
  Бритва Хэнлона гласит: "Никогда не приписывайте злобе то, что может быть адекватно объяснено глупостью". Иными словами, не предполагайте злой умысел, когда поведение можно объяснить некомпетентностью, недосмотром или невежеством.

one_liner: Не предполагайте злой умысел, когда его можно объяснить некомпетентностью или недосмотром.

try_this:
  - Когда кто-то вас расстраивает, спросите: Можно ли это объяснить ошибкой или невежеством?
  - По умолчанию выбирайте более простое объяснение, прежде чем предполагать злой умысел.
  - Обращайте внимание, когда вы начинаете думать, что он хотел вам навредить.

ask_yourself:
  - Приписываю ли я злобе то, что можно объяснить глупостью?
  - Хотел бы я получить такое же снисхождение на их месте?

in_more_detail: |
  Этот принцип побуждает относиться к людям снисходительно. Когда чьи-то действия вредят вам или расстраивают вас, по умолчанию часто предполагается, что они хотели вам навредить. Бритва Хэнлона предполагает, что многие такие действия проистекают из невнимательности, нехватки информации или плохого исполнения — а не из злого умысла.

  Это не означает, что злой умысел никогда не существует. Это означает, что мы не должны переходить к худшей интерпретации, когда подходит более простая. Бритва уменьшает паранойю, улучшает отношения и помогает нам более конструктивно реагировать на проблемы.

why_this_is_important: |
  Применение Бритвы Хэнлона уменьшает конфликты, сохраняет отношения и направляет энергию на решение проблем, а не на возложение вины. Это также защищает вас от стресса, связанного с предположением, что все хотят вам навредить.

when_to_use:
  - разрешение_конфликтов
  - руководство
  - построение_отношений
  - принятие_решений

how_can_you_spot_it:
  quick_assumption_of_malice: |
    Вы немедленно интерпретируете негативный результат как преднамеренный вред.
  personalizing_mistakes: |
    Когда что-то идет не так, вы предполагаете, что это было направлено лично против вас.
  ignoring_alternative_explanations: |
    Вы не рассматриваете некомпетентность, недопонимание или недосмотр как возможные причины.
  escalation_before_inquiry: |
    Вы реагируете гневом или местью, прежде чем спросить, что произошло.

examples:
  email_tone: |
    Предполагая, что короткое письмо пассивно-агрессивно, хотя отправитель, возможно, просто торопился или плохо передает тон.
  missed_deadline: |
    Интерпретируя опоздание коллеги с выполнением задачи как саботаж, когда он, возможно, взял на себя слишком много или столкнулся с препятствиями.
  policy_decisions: |
    Предполагая, что нелюбимая вами политика компании была разработана, чтобы навредить сотрудникам, хотя это может быть неуклюжей попыткой решить другую проблему.
  traffic: |
    Предполагая, что другой водитель специально подрезал вас, когда он, возможно, вас не видел.

real_world_implications: |
  Бритва Хэнлона улучшает корпоративную культуру, уменьшает количество судебных исков и делает разрешение конфликтов более эффективным. Чрезмерное применение может способствовать халатности; недостаточное применение создает ненужные конфликты.

professional_application:
  networking_and_relationship_building: |
    Когда кто-то вас разочаровывает, попросите разъяснений, прежде чем предполагать злой умысел. Сохраняйте отношения, по умолчанию применяя благожелательные интерпретации.
  collaborative_learning_initiative: |
    В командах создавайте культуру, в которой ошибки предполагаются непреднамеренными, пока не доказано обратное. Сосредоточьтесь на системах и процессах, а не на обвинениях.

how_can_this_be_misapplied:
  excusing_negligence: |
    Списывать повторяющуюся некомпетентность или халатность как "не злобу", когда это требует ответственности.
  ignoring_genuine_malice: |
    Применять бритву настолько строго, что вы упускаете из виду настоящих злодеев или токсичное поведение.
  avoiding_difficult_conversations: |
    Использовать Бритву Хэнлона как предлог, чтобы не решать проблемы с производительностью.
  gaslighting_victims: |
    Говорить человеку, которому действительно причинили вред, что он "предполагает злобу", когда злоба присутствовала.

related_content:
