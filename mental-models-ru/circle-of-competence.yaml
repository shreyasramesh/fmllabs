# Круг компетенций
# Ментальная модель / Когнитивное искажение - Пример записи

id: circle_of_competence
name: Круг компетенций

quick_introduction: |
  Круг компетенций — это ментальная модель, которая побуждает вас знать границы
  своей экспертизы и придерживаться их при принятии важных решений. Уоррен Баффет
  и Чарли Мангер подчеркивают важность знания того, чего вы не знаете.

one_liner: Знайте границы своей экспертизы — и придерживайтесь их, когда это важно.

try_this:
  - Нанесите на карту области, где у вас есть реальная экспертиза, и где вы угадываете.
  - Когда вы находитесь за пределами своего круга, обратитесь за советом или делегируйте.
  - Будьте честны: согласится ли настоящий эксперт с вашим суждением здесь?

ask_yourself:
  - Нахожусь ли я в пределах своего круга компетенций, или я угадываю?
  - Когда в последний раз я признавал(а) "я не знаю" в этой области?

in_more_detail: |
  У каждого человека есть области, в которых он обладает истинной экспертизой — где он может оценивать
  информацию, выявлять ошибки и делать надежные суждения. Вне этого круга он
  подвержен тем же предубеждениям и ошибкам, что и любой другой. Ключ в честной
  самооценке: где вы действительно компетентны, а где вы угадываете?

  Круг может расширяться посредством целенаправленного обучения, но для распознавания
  его текущих границ требуется смирение. Работа вне своего круга увеличивает
  риск дорогостоящих ошибок, особенно когда ставки высоки.

why_this_is_important: |
  Пребывание в пределах своего круга компетенций снижает количество дорогостоящих ошибок и улучшает
  качество решений. Это также помогает вам знать, когда обращаться за советом, делегировать
  или воздерживаться. Чрезмерная самоуверенность вне своего круга является основным источником неудач.

when_to_use:
  - принятие_решений
  - инвестирование
  - карьерный_рост
  - оценка_рисков

how_can_you_spot_it:
  honest_boundary_assessment: |
    Можете ли вы объяснить пределы своих знаний в определенной области? Знаете ли вы, чего вы не знаете?
  knowing_when_to_defer: |
    Распознавание ситуаций, когда следует искать экспертное мнение, а не принимать решение самостоятельно.
  consistent_track_record: |
    В пределах вашего круга ваши суждения, как правило, подтверждаются со временем; за его пределами — нет.
  calibration: |
    Ваша уверенность в определенной области соответствует вашей фактической производительности в этой области.

examples:
  investing: |
    Баффет избегает акций технологических компаний, потому что, по его словам, они находятся за пределами его круга
    компетенций — он не может надежно их оценить.
  career: |
    Специалист, который остается в своей области, по сравнению с тем, кто принимает "стрессовую" роль в
    не связанной с ней области.
  hiring: |
    Знание того, когда полагаться на собственное суждение, а когда привлекать специалистов для
    технических ролей.
  advice_giving: |
    Отказ высказывать мнение по темам, находящимся за пределами вашей экспертизы, вместо того, чтобы угадывать.

real_world_implications: |
  Круг компетенций является центральным для стоимостного инвестирования и профессионального успеха.
  Игнорирование его приводит к чрезмерной самоуверенности, неудачным начинаниям и плохим советам. Расширение
  круга требует целенаправленных усилий и честной обратной связи.

professional_application:
  networking_and_relationship_building: |
    Стройте отношения с людьми, чьи круги компетенций дополняют ваши.
    Знайте, когда лучше представить других, чем отвечать самому.
  collaborative_learning_initiative: |
    Создавайте команды с пересекающимися и дополняющими друг друга кругами. Поощряйте людей сообщать, когда они действуют за пределами своей компетенции.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    Никогда не выходить за пределы своего круга может ограничить рост и обучение.
  false_modesty: |
    Утверждение о крошечном круге, чтобы избежать ответственности или сложных решений.
  gatekeeping: |
    Использование "круга компетенций" для отторжения других, не вникая в их аргументы.
  stagnation: |
    Отношение к кругу как к фиксированному, а не как к чему-то, что может расширяться с усилиями.

