# Принцип Парето
# Ментальная модель / Когнитивное искажение - Пример записи

id: pareto_principle
name: Принцип Парето

quick_introduction: |
  Принцип Парето (или правило 80/20) гласит, что примерно 80% эффектов происходят
  от 20% причин. Незначительное меньшинство входных данных часто производит
  большинство выходных данных — в продажах, ошибках, клиентах, усилиях, функциях и
  многом другом. Сосредоточьтесь на жизненно важных немногих.

one_liner: 80% эффектов происходят от 20% причин — сосредоточьтесь на жизненно важных немногих.

try_this:
  - Определите 20% входных данных, которые дают 80% результатов — удвойте усилия там.
  - Сократите или понизьте приоритет 80%, которые дают мало.
  - Спросите: Какие немногие вещи, если бы я делал их хорошо, имели бы наибольшее значение?

ask_yourself:
  - Распределяю ли я усилия равномерно, когда немногие вещи имеют большее значение?
  - Каковы мои 20% с высоким рычагом?

in_more_detail: |
  Вильфредо Парето заметил, что 80% земель Италии принадлежало 20% населения.
  Принцип был обобщен: 80% продаж от 20% клиентов, 80% ошибок от 20% кода, 80%
  результатов от 20% усилий. Точное соотношение варьируется, но закономерность —
  неравномерное распределение — распространена.

  Принцип предполагает, что определение и фокусировка на 20% с высоким рычагом
  может значительно улучшить результаты. Это эвристика приоритизации, а не
  физический закон.

why_this_is_important: |
  Применение принципа Парето помогает беспощадно расставлять приоритеты,
  избегать траты усилий на действия с низким влиянием и достигать большего
  меньшими средствами. Это фундаментально для продуктивности и стратегии.

when_to_use:
  - принятие_решений
  - решение_проблем
  - руководство
  - карьерные_шаги

how_can_you_spot_it:
  uneven_distribution: |
    Небольшая доля X составляет большую долю Y.
  high_leverage_activities: |
    Некоторые действия дают большинство результатов.
  low_value_tail: |
    Многие действия приносят мало пользы; их сокращение имеет минимальное влияние.
  vital_few_vs_trivial_many: |
    Ключ в том, чтобы определить, какие немногие имеют наибольшее значение.

examples:
  sales: |
    20% клиентов приносят 80% дохода — сосредоточьтесь на их удержании и росте.
  software: |
    20% функций обеспечивают 80% использования — расставьте приоритеты для них.
  productivity: |
    Некоторые привычки или распорядки дают большую часть вашего результата — удвойте усилия на них.
  problems: |
    20% ошибок вызывают 80% сбоев — исправьте их в первую очередь.

real_world_implications: |
  Принцип Парето руководит распределением ресурсов, продуктовой стратегией и
  личной продуктивностью. Игнорирование его приводит к чрезмерному размазыванию
  усилий. Чрезмерное применение может привести к пренебрежению "длинным хвостом",
  где это имеет значение.

professional_application:
  networking_and_relationship_building: |
    Определите отношения, которые имеют наибольшее значение для ваших целей.
    Инвестируйте непропорционально больше в них, а не распределяйте усилия
    равномерно.
  collaborative_learning_initiative: |
    При улучшении производительности команды найдите 20% вмешательств, которые
    дают 80% результатов. Сосредоточьте обучение и изменения процессов там.

how_can_this_be_misapplied:
  oversimplification: |
    Предположение, что 80/20 применимо везде; некоторые распределения более равномерны.
  neglecting_the_tail: |
    Игнорирование "тривиального большинства", когда они коллективно важны (например,
    многие мелкие клиенты, крайние случаи).
  false_precision: |
    Рассмотрение 80/20 как точного, а не как грубой эвристики.
  misidentifying_the_vital_few: |
    Фокусировка на неправильных 20% из-за ошибочного анализа.

