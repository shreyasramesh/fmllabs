# Гиперболическое дисконтирование
# Ментальная модель / Когнитивное искажение - Пример записи

id: hyperbolic_discounting
name: Гиперболическое дисконтирование

quick_introduction: |
  Гиперболическое дисконтирование — это склонность предпочитать меньшее, но более раннее вознаграждение большему, но более позднему, и дисконтировать будущее круче, чем предсказывают рациональные модели. Мы переоцениваем настоящее и недооцениваем будущее непоследовательными способами.

one_liner: Мы предпочитаем меньшее, но более раннее, большему, но более позднему — и дисконтируем будущее непоследовательно.

try_this:
  - Предварительное обязательство: принимайте решения для своего будущего "я", когда вы находитесь в спокойном состоянии.
  - Переформулируйте: Хотел бы я этого через 10 минут? Через 10 месяцев? — чтобы выявить непоследовательность.
  - Используйте устройства обязательств, чтобы связать свое будущее "я" лучшими решениями.

ask_yourself:
  - Не переоцениваю ли я настоящее в ущерб своему будущему "я"?
  - Принял бы я это решение, если бы вознаграждение было отложено на день? Год?

in_more_detail: |
  Мы можем предпочесть 50 долларов сегодня, а не 100 долларов через год, но также предпочесть 100 долларов через два года, а не 50 долларов через год — даже если это непоследовательно. Наша ставка дисконтирования не постоянна; она гиперболическая. Ближайшее будущее сильно дисконтируется; дальнее будущее дисконтируется менее круто. Это объясняет прокрастинацию, зависимость и недостаточное сбережение.

  "Предвзятость настоящего" — связанное понятие: мы придаем настоящему моменту непропорциональный вес. Гиперболическое дисконтирование объясняет, почему мы берем на себя обязательства, которые не выполняем, и почему долгосрочное планирование затруднительно.

why_this_is_important: |
  Понимание гиперболического дисконтирования помогает вам разрабатывать лучшие стимулы, брать обязательства у своего будущего "я" и избегать ловушек краткосрочной выгоды. Это объясняет, почему мы прокрастинируем и почему мы боремся с долгосрочными целями.

when_to_use:
  - принятие_решений
  - карьерные_шаги
  - инвестирование
  - лидерство

how_can_you_spot_it:
  present_preference: |
    Выбор немедленного удовлетворения вместо отложенного, но большего вознаграждения.
  inconsistent_time_preferences: |
    Предпочтения, которые меняются по мере прохождения времени (например, мы хотим диетиться завтра, но едим сегодня).
  commitment_failures: |
    Составление планов, которым мы не следуем, когда будущее становится настоящим.
  procrastination: |
    Откладывание важных задач в пользу немедленного комфорта.

examples:
  savings: |
    Выбор потратить сейчас, а не сберегать на пенсию — будущее кажется абстрактным.
  health: |
    Пропуск тренировки сегодня ради комфорта, несмотря на знание, что мы будем сожалеть об этом — сожаление о завтрашнем дне дисконтируется.
  addiction: |
    Выбор немедленного подъема вместо долгосрочного здоровья.
  deadlines: |
    Ничегонеделание до тех пор, пока не придет крайний срок — тогда "настоящее" включает в себя крайний срок, и мы действуем.

real_world_implications: |
  Гиперболическое дисконтирование влияет на сбережения, здоровье, образование и зависимости. Оно объясняет многие сбои самоконтроля. Устройства обязательств (например, автоматические сбережения, подотчетность) могут помочь, ограничивая будущие выборы.

professional_application:
  networking_and_relationship_building: |
    При запросе будущих обязательств создавайте подотчетность, которая делает будущее "настоящим" (например, проверки, крайние сроки). Не предполагайте, что люди будут выполнять обещания без структуры.
  collaborative_learning_initiative: |
    Используйте устройства обязательств: публичные обязательства, предварительное обязательство по срокам и структуры, которые делают долгосрочные цели более ощутимыми. Разбивайте длительные проекты на более короткие этапы.

how_can_this_be_misapplied:
  excessive_control: |
    Чрезмерное ограничение выбора людей под предлогом "помощи" их будущему "я".
  paternalism: |
    Предположение, что мы знаем, что лучше для долгосрочных интересов других.
  ignoring_present_needs: |
    Игнорирование законных настоящих потребностей в пользу абстрактных будущих выгод.
  one_size_fits_all: |
    Люди различаются по ставкам дисконтирования; не всем нужны одинаковые устройства обязательств.

