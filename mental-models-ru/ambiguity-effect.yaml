id: ambiguity_effect
name: Эффект неопределенности

quick_introduction: |
  Эффект неопределенности — это тенденция избегать вариантов, когда у нас недостаточно информации о вероятностях исходов. Мы предпочитаем известные риски неизвестным, даже если неизвестные риски могут быть лучше. Сама неопределенность ощущается как неприятная.

one_liner: Мы предпочитаем известные риски неизвестным, даже когда неизвестные могут быть лучше.

try_this:
  - Спросите: избегаю ли я этого варианта в основном из-за неопределенности, или есть реальный недостаток?
  - Оцените то, что вы знаете; иногда "неоднозначный" вариант имеет более очевидные преимущества.
  - Обратите внимание, когда вы по умолчанию выбираете знакомое только потому, что оно кажется безопаснее.

ask_yourself:
  - Отвергаю ли я что-то, потому что это неоднозначно, или потому что это действительно хуже?
  - Что мне нужно было бы знать, чтобы чувствовать себя комфортно с неопределенным вариантом?

in_more_detail: |
  В парадоксе Эллсберга люди предпочитают ставить на урну с известными пропорциями шаров, а не на урну с неизвестными пропорциями, даже когда неизвестная урна может предложить лучшие шансы. Мы не любим неопределенность — мы скорее хотим иметь четкую (даже если плохую) вероятность, чем неясную.

  Этот эффект влияет на решения в области инвестиций, выбора карьеры и политики. Он может приводить к субоптимальным решениям, когда мы избегаем вариантов, которые являются неоднозначными, но потенциально превосходящими. Он также объясняет, почему мы предпочитаем знакомые бренды и известные величины.

why_this_is_important: |
  Осознание эффекта неопределенности помогает избежать чрезмерного предпочтения знакомого и недооценки неопределенного. Это может привести к упущенным возможностям, когда неопределенность управляема. Это также объясняет, почему прозрачность и ясность снижают тревожность.

when_to_use:
  - принятие_решений
  - оценка_рисков
  - инвестирование
  - карьерные_шаги

how_can_you_spot_it:
  preference_for_known_risks: |
    Выбор вариантов с четкими (даже если худшими) вероятностями вместо неоднозначных.
  avoidance_of_uncertainty: |
    Отказ от вариантов в основном потому, что "мы недостаточно знаем".
  familiarity_over_optimality: |
    Предпочтение известного потенциально лучшему неизвестному.
  information_seeking: |
    Готовность платить за информацию, которая снижает неопределенность, даже если она не меняет решения.

examples:
  investing: |
    Предпочтение отечественных акций международным, потому что "мы их лучше понимаем", несмотря на выгоды диверсификации.
  employment: |
    Оставаться на известной работе, а не занимать должность с неопределенными перспективами.
  product_choice: |
    Выбор знакомого бренда вместо нового варианта с неопределенным качеством.
  medical: |
    Предпочтение лечения с известными побочными эффектами одному с неопределенными исходами, даже когда последнее может быть лучше.

real_world_implications: |
  Эффект неопределенности формирует рынки, выбор карьеры и политику. Его можно уменьшить, предоставив более ясную информацию или переформулировав решения. Он также объясняет, почему прозрачность и общение снижают тревожность.

professional_application:
  networking_and_relationship_building: |
    Снижайте неопределенность в отношениях: уточняйте ожидания, общайтесь явно и уменьшайте неуверенность. Люди предпочитают известные ситуации.
  collaborative_learning_initiative: |
    При внедрении изменений снижайте неопределенность: предоставляйте четкую информацию о том, что произойдет, когда и почему. Неопределенность усиливает сопротивление.

how_can_this_be_misapplied:
  manipulation: |
    Сознательное создание неопределенности для направления людей к предпочтительным вариантам.
  false_clarity: |
    Предоставление ложной уверенности, когда существует реальная неопределенность.
  overconfidence: |
    Предположение, что снижение неопределенности всегда улучшает решения; иногда неоднозначный вариант действительно лучше.
  analysis_paralysis: |
    Ожидание идеальной информации перед принятием решения, когда некоторая неопределенность неизбежна.

