# Предвзятость последующего знания
# Ментальная модель / Когнитивное искажение - Пример записи

id: hindsight_bias
name: Предвзятость последующего знания

quick_introduction: |
  Предвзятость последующего знания (или эффект "Я это знал") — это тенденция
  считать, что после наступления события мы могли его предсказать или ожидали.
  Мы реконструируем прошлое, чтобы результаты казались более неизбежными,
  чем они были на самом деле.

one_liner: После факта нам кажется, что мы всё знали.

try_this:
  - Прежде чем оценивать прошлые решения, спросите: "Что они знали в то время?"
  - Записывайте свои прогнозы до наступления результатов — сравните позже.
  - Замечайте, когда вы делаете прошлое более неизбежным, чем оно было.

ask_yourself:
  - Оцениваю ли я, располагая информацией, которой тогда не было?
  - Действительно ли я это предсказал, или сейчас это просто кажется очевидным?

in_more_detail: |
  Как только мы узнаем результат, он кажется очевидным. Мы забываем неуверенность,
  которую испытывали раньше. Это искажение мешает обучению — мы думаем, что
  "знали" что-то, когда на самом деле не знали, и поэтому не обновляем свои
  модели. Это также приводит к несправедливым обвинениям: "Они должны были
  это предвидеть", когда будущее было действительно неопределенным.

  Предвзятость последующего знания влияет на анализ инцидентов, судебные решения
  и исторический анализ. Мы оцениваем прошлые решения, располагая информацией,
  которой тогда не было.

why_this_is_important: |
  Осознание предвзятости последующего знания улучшает обучение на основе
  результатов, более справедливую оценку решений и более точную оценку рисков.
  Это предотвращает ложную уверенность в наших прогностических способностях.

when_to_use:
  - принятие_решений
  - обучение
  - оценка_рисков
  - лидерство

how_can_you_spot_it:
  inevitability_feeling: |
    После события кажется, что оно "должно было" произойти.
  reconstructed_certainty: |
    Мы помним, что были более уверены до события, чем на самом деле.
  blame_for_failure: |
    "Они должны были знать", когда результат был действительно неопределенным.
  undervaluing_luck: |
    Приписывание результатов навыкам или предвидению, когда роль сыграла удача.

examples:
  investing: |
    "Я знал, что рынок рухнет" после того, как он рухнул — когда вы не действовали
    на основе этого "знания" заранее.
  project_failures: |
    "Мы должны были предвидеть риски" на анализе инцидента, когда риски были
    действительно неоднозначными.
  elections: |
    После неожиданного результата эксперты объясняют, почему он был "очевидным"
    в ретроспективе.
  medical: |
    "Признаки были налицо", когда ставится диагноз редкого заболевания постфактум.

real_world_implications: |
  Предвзятость последующего знания искажает юридическую ответственность,
  оценку эффективности и обучение. Она заставляет нас чрезмерно полагаться
  на собственное суждение и несправедливо относиться к тем, кто принимал
  обоснованные решения при ограниченной информации.

professional_application:
  networking_and_relationship_building: |
    При оценке прошлых решений других людей сознательно отделяйте то, что было
    известно тогда, от того, что вы знаете сейчас. Избегайте "Я же говорил",
    когда вы на самом деле не предсказывали результат.
  collaborative_learning_initiative: |
    При анализе инцидентов используйте техники "пре-мортем" или "журнал решений"
    для фиксации неопределенности во время принятия решения. Сравнивайте
    фактическую неопределенность с ретроспективной реконструкцией.

how_can_this_be_misapplied:
  excusing_all_failures: |
    Оправдывать все неудачи как "непредсказуемые", когда некоторые были предвидимы.
  no_accountability: |
    Использовать предвзятость последующего знания, чтобы избегать привлечения
    людей к ответственности за халатность.
  false_uncertainty: |
    Чрезмерно корректировать, полагая, что мы никогда ничего не можем предсказать.
  undermining_learning: |
    Отказываться извлекать уроки, потому что "задним числом все умны" — мы все
    еще можем учиться на результатах.

