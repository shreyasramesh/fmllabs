id: anchoring_bias
name: Эффект якоря

quick_introduction: |
  Эффект якоря — это тенденция чрезмерно полагаться на первую полученную информацию
  при принятии решений. Этот начальный «якорь» искажает последующие суждения,
  даже когда он не имеет отношения к делу или является произвольным.

one_liner: Первое число, которое вы видите, формирует все последующие.

try_this:
  - Перед переговорами определите свою целевую цифру и избегайте якоря, установленного другой стороной.
  - При оценке сначала сгенерируйте собственную цифру, прежде чем услышать оценки других.
  - Спросите: «Думал бы я иначе, если бы сначала увидел другую цифру?»

ask_yourself:
  - Какое число или идея встретилась мне первой — и искажает ли оно мое суждение?
  - Достаточно ли я корректирую свои действия относительно якоря, или все еще слишком близко к нему?

in_more_detail: |
  В классическом эксперименте люди, которым предлагалось оценить процент африканских стран
  в ООН, давали более высокие оценки, если они только что видели более высокое число (например, 65 против 10).
  Якорь — даже произвольный — повлиял на их ответы. Эффект якоря влияет на переговоры,
  ценообразование, наем на работу и прогнозирование.

  Первое число, которое мы видим, становится точкой отсчета. Мы корректируем свои действия от нее, но
  обычно недостаточно. Даже когда мы знаем, что якорь произволен, он все равно может влиять на нас. Эксперты не являются исключением.

why_this_is_important: |
  Понимание эффекта якоря помогает принимать более обоснованные решения, вести переговоры более эффективно
  и избегать манипуляций. Это также объясняет, почему порядок и формулировка
  информации имеют такое большое значение.

when_to_use:
  - принятие_решений
  - переговоры
  - инвестирование
  - оценка_рисков

how_can_you_spot_it:
  first_number_dominance: |
    Первая цифра в переговорах или оценке оказывает непропорциональное влияние на
    результат.
  insufficient_adjustment: |
    При корректировке от якоря люди, как правило, корректируют недостаточно.
  arbitrary_anchor_influence: |
    Даже очевидно нерелевантные числа (например, последние цифры номера социального страхования)
    могут влиять на оценки.
  order_effects: |
    Последовательность представления вариантов меняет выбор.

examples:
  salary_negotiation: |
    Первая упомянутая цифра — будь то работодатель или кандидат — часто якорит
    окончательное предложение.
  real_estate: |
    Цена, указанная в объявлении, якорит восприятие стоимости покупателями, даже если она сознательно
    установлена высоко или низко.
  retail: |
    «Было 99 долларов, теперь 49 долларов» использует первоначальную цену как якорь, чтобы цена продажи
    казалась выгодной.
  forecasting: |
    Первоначальные оценки на совещаниях по планированию якорят последующие прогнозы, даже когда
    первоначальная оценка была лишь предположением.

real_world_implications: |
  Эффект якоря формирует рынки, переговоры и политику. Его можно использовать этично (например,
  устанавливая разумные ожидания) или неэтично (например, манипулятивное ценообразование).
  Его распознавание повышает качество решений.

professional_application:
  networking_and_relationship_building: |
    В переговорах рассмотрите возможность сделать первое предложение, чтобы установить якорь — или будьте в курсе,
    когда это делает другая сторона.
  collaborative_learning_initiative: |
    На совещаниях будьте осторожны с тем, кто говорит первым относительно оценок; рассмотрите
    возможность сбора независимых оценок перед обсуждением.

how_can_this_be_misapplied:
  manipulation: |
    Преднамеренное использование крайних якорей для направления других к желаемым результатам.
  overconfidence_in_anchors: |
    Чрезмерная уверенность в своей первой оценке без ее пересмотра.
  ignoring_relevant_information: |
    Позволить якорю перевесить более релевантные данные.
  exploitation: |
    Методы продаж, использующие завышенные цены «сравнения», чтобы фактические цены казались
    разумными.

