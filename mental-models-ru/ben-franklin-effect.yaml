id: ben_franklin_effect
name: Эффект Бенджамина Франклина

quick_introduction: |
  Эффект Бенджамина Франклина — это психологический феномен, согласно которому люди начинают больше симпатизировать тому, кому они оказали услугу. Вопреки интуитивному представлению о том, что мы делаем одолжения тем, кто нам нравится, мы часто начинаем симпатизировать тем, кому мы оказали услугу.

one_liner: Мы начинаем симпатизировать людям, которым оказывали услуги — наши установки следуют за нашими действиями.

try_this:
  - Если вы хотите улучшить отношения, попросите о небольшой услуге.
  - Обратите внимание, как оказание услуги меняет ваше отношение к кому-либо.
  - Помните, что другие могут начать симпатизировать вам больше после оказания вам помощи.

ask_yourself:
  - Изменило ли оказание услуги кому-то мои чувства к этому человеку?
  - Не рационализирую ли я свои усилия, повышая свое к нему уважение?

in_more_detail: |
  Бенджамин Франклин знаменит тем, что расположил к себе соперника-законодателя, попросив одолжить редкую книгу из его библиотеки. После того, как тот согласился, Франклин вернул книгу с запиской с благодарностью. Отношения значительно улучшились. Эффект предполагает, что наши установки следуют за нашими действиями: когда мы вкладываем усилия в помощь кому-то, мы рационализируем эти усилия, повышая к ним наше положительное отношение.

  Теория когнитивного диссонанса объясняет это: когда мы делаем услугу человеку, который нам не нравится или к которому мы относимся нейтрально, мы испытываем напряжение между нашим действием (помощь) и нашим отношением (неприязнь). Разрешение этого напряжения через более сильную симпатию часто оказывается проще, чем признание того, что мы действовали вопреки своим предпочтениям.

why_this_is_important: |
  Понимание эффекта Бенджамина Франклина помогает вам стратегически строить отношения и распознавать, когда ваши собственные чувства могут быть подвержены влиянию прошлых услуг. Это также объясняет, почему просьба о небольших услугах может быть более эффективной, чем предложение их, когда вы пытаетесь улучшить отношения.

when_to_use:
  - построение_отношений
  - переговоры
  - лидерство
  - разрешение_конфликтов

how_can_you_spot_it:
  liking_after_helping: |
    Замечайте, когда вы чувствуете себя теплее по отношению к кому-то после того, как оказали ему услугу, даже если раньше вы относились к нему нейтрально или негативно.
  others_requesting_small_favors: |
    Когда кто-то неоднократно просит о небольших услугах, он может сознательно или бессознательно использовать этот эффект для установления раппорта.
  attitude_shift_post_investment: |
    После того, как вы вложили время или усилия в помощь кому-то, понаблюдайте, изменилось ли ваше мнение о нем в положительную сторону.
  reciprocal_relationship_dynamics: |
    Отношения, в которых один человек оказал множество услуг, могут казаться несбалансированными в плане привязанности, несмотря на видимый баланс в действиях.

examples:
  networking: |
    Попросить коллегу дать отзыв о черновике, что заставит его почувствовать большую заинтересованность в вашем успехе и более положительно к вам относиться.
  sales: |
    Продавец просит потенциального клиента оказать небольшую услугу (например, дать рекомендацию или представить кого-то), что увеличивает вовлеченность и симпатию клиента.
  conflict_resolution: |
    После разногласия попросить другую сторону помочь с чем-то несвязанным может смягчить напряженность и восстановить добрые намерения.
  mentoring: |
    Когда старший сотрудник просит младшего дать вводные данные или помочь, младший сотрудник часто чувствует себя более ценным и связанным.

real_world_implications: |
  Эффект Бенджамина Франклина влияет на найм, продажи, дипломатию и повседневную социальную динамику. Он может использоваться этично для построения мостов или неэтично для манипулирования привязанностью. Его распознавание помогает понять, почему некоторые отношения становятся крепче после асимметричного оказания услуг.

professional_application:
  networking_and_relationship_building: |
    При построении отношений рассмотрите возможность просьбы о небольших, разумных услугах, а не только их предоставления. Акт оказания помощи создает вовлеченность и положительное отношение.
  collaborative_learning_initiative: |
    В командах, когда члены помогают друг другу (например, взаимный обзор, перекрестное обучение), это может укрепить сплоченность. Структурируйте сотрудничество так, чтобы каждый как давал, так и получал помощь.

how_can_this_be_misapplied:
  manipulation: |
    Сознательная просьба об услугах исключительно для того, чтобы кто-то полюбил вас, без реальной необходимости, может ощущаться как эксплуатация, если это будет обнаружено.
  overreliance_on_favors: |
    Предположение, что одни только услуги исправят испорченные отношения; некоторые конфликты требуют прямого разговора и ответственности.
  asymmetric_exploitation: |
    Неоднократные просьбы об услугах без ответной услуги могут иметь обратный эффект и породить обиду.
  misattributing_motives: |
    Принятие теплоты другого человека как чисто искренней, когда она может быть частично результатом услуг, оказанных им вам.

