# Эвристика доступности
# Ментальная модель / Когнитивное искажение - Пример записи

id: availability_heuristic
name: Эвристика доступности

quick_introduction: |
  Эвристика доступности — это тенденция оценивать вероятность событий
  по тому, насколько легко приходят на ум примеры. Если мы можем легко вспомнить случаи, мы
  предполагаем, что событие является распространенным. Яркие, недавние или эмоциональные примеры доминируют
  в нашей оценке вероятности.

one_liner: То, что легко приходит на ум, кажется более вероятным, даже когда это не так.

try_this:
  - Спросите: Какова базовая ставка? Не переоцениваю ли я яркие или недавние примеры?
  - Ищите данные, когда внутреннее чутье говорит "это кажется распространенным" или "это кажется редким".
  - Обращайте внимание, когда одна драматическая история влияет на вашу оценку риска.

ask_yourself:
  - Оцениваю ли я вероятность по легкости вспоминания, а не по фактической частоте?
  - Думал бы я иначе, если бы не видел этот заголовок только что?

in_more_detail: |
  Мы используем ментальные ярлыки для оценки частоты и вероятности. Один из ярлыков
  — это доступность: что легко приходит на ум? Авиакатастрофы яркие и
  широко освещаются — мы переоцениваем их вероятность. Автокатастрофы
  распространены, но менее заметны — мы недооцениваем. Недавность, яркость и
  эмоциональное воздействие — все это повышает доступность.

  Эвристика полезна, когда доступность коррелирует с фактической частотой.
  Но средства массовой информации, личный опыт и заметность часто искажают эту корреляцию.
  Мы боимся редких, но ярких рисков и игнорируем распространенные, но обыденные.

why_this_is_important: |
  Признание эвристики доступности помогает вам корректировать оценки вероятности,
  избегать чрезмерной реакции на яркие новости и принимать лучшие оценки рисков.
  Это объясняет многие систематические ошибки в суждениях.

when_to_use:
  - принятие_решений
  - оценка_рисков
  - инвестирование
  - решение_задач

how_can_you_spot_it:
  vividness_dominance: |
    Драматические или эмоциональные примеры непропорционально влияют на оценки.
  recency_effect: |
    Недавние события кажутся более вероятными в будущем.
  personal_experience_overweighting: |
    "Я знаю кого-то, кто..." формирует оценки вероятности.
  media_distortion: |
    То, что сообщается, часто не соответствует тому, что является частым.

examples:
  risk_perception: |
    Переоценка риска терроризма (яркий, освещается) и недооценка
    риска сердечных заболеваний (распространен, менее драматичен).
  investing: |
    Недавние рыночные события (крах, бум) доминируют в ожиданиях на будущее.
  hiring: |
    Одна яркая история о плохом найме из определенной школы влияет
    на оценку всех кандидатов из этой школы.
  health: |
    Диагноз рака у друга делает рак более вероятным, чем предполагают базовые ставки.

real_world_implications: |
  Эвристика доступности влияет на покупку страховок, приоритеты политики и
  личные решения. Ее используют средства массовой информации и маркетологи. Для коррекции
  требуется поиск базовых ставок и постановка под сомнение того, что "приходит на ум".

professional_application:
  networking_and_relationship_building: |
    Помните, что один яркий негативный опыт с человеком или группой может
    исказить ваше суждение. Ищите базовые ставки и множество точек данных.
  collaborative_learning_initiative: |
    При оценке рисков или возможностей явно спрашивайте "Какова базовая ставка?"
    и "Не переоцениваю ли я яркие примеры?". Используйте данные для коррекции
    оценок, основанных на доступности.

how_can_this_be_misapplied:
  dismissing_intuition: |
    Иногда доступность информативна — недавний опыт может сигнализировать
    об изменениях. Не думайте, что все суждения, основанные на доступности, ошибочны.
  analysis_paralysis: |
    Чрезмерная коррекция до точки игнорирования законных предупреждающих знаков от
    яркого опыта.
  false_objectivity: |
    Предположение, что базовые ставки всегда верны, когда они могут быть устаревшими или
    неприменимыми.
  manipulation: |
    Преднамеренное создание яркости определенных примеров для влияния на суждения других.

