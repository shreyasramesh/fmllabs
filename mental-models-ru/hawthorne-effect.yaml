# Эффект Хоторна
# Ментальная модель / Когнитивное искажение - Пример записи

id: hawthorne_effect
name: Эффект Хоторна

quick_introduction: |
  Эффект Хоторна — это тенденция людей изменять свое поведение,
  когда они знают, что за ними наблюдают или изучают. Сам акт наблюдения
  может вызвать изменения, а не обязательно тестируемое вмешательство.
  Люди реагируют на уделяемое им внимание.

one_liner: Наблюдение меняет поведение — само внимание может вызвать эффект.

try_this:
  - При оценке вмешательства учитывайте, обусловлены ли результаты наблюдением.
  - Осознайте, что внимание и чувство ценности могут повысить производительность.
  - Будьте осторожны, приписывая изменения конкретному вмешательству, когда изменилось наблюдение.

ask_yourself:
  - Улучшение вызвано вмешательством или наблюдением?
  - Сохранятся ли результаты, если мы перестанем уделять внимание?

in_more_detail: |
  На заводе Hawthorne Works исследователи обнаружили, что производительность
  улучшилась, когда они изменили освещение — и также когда вернули его обратно.
  Улучшение, казалось, было связано с вниманием и наблюдением, а не
  с конкретным вмешательством. Более поздний повторный анализ предполагал, что эффект мог
  быть преувеличен, но концепция остается полезной: изучение
  меняет поведение.

  Эффект Хоторна осложняет исследования и оценки. Он может
  завышать видимое влияние вмешательств. Он также предполагает, что
  внимание и чувство ценности могут повысить производительность — урок для
  управления.

why_this_is_important: |
  Понимание эффекта Хоторна помогает интерпретировать результаты исследований,
  разрабатывать лучшие эксперименты и осознавать, что само внимание
  может стимулировать изменения. В управлении это предполагает, что уделение
  внимания людям может иметь такое же значение, как и конкретное вмешательство.

when_to_use:
  - лидерство
  - принятие_решений
  - обучение
  - решение_проблем

how_can_you_spot_it:
  observation_induced_change: |
    Поведение меняется, когда люди знают, что за ними наблюдают или изучают.
  attention_effect: |
    Сам акт уделения внимания вызывает улучшение, а не только
    конкретное изменение.
  placebo_analog: |
    Подобно плацебо, "лечение" в виде изучения может иметь эффекты.
  short_term_improvement: |
    Улучшения могут исчезнуть, когда наблюдение прекратится.

examples:
  workplace_studies: |
    Производительность увеличивается во время исследования — связано ли это с новым процессом или
    с тем, что кто-то наблюдает?
  medical_trials: |
    Группы плацебо улучшаются — частично потому, что им уделяется внимание.
  education: |
    Студенты лучше учатся, когда присутствуют исследователи —
    "эффект наблюдателя".
  management: |
    Команды улучшаются, когда руководство уделяет внимание — связано ли это с новой
    инициативой или самим вниманием?

real_world_implications: |
  Эффект Хоторна влияет на достоверность исследований и оценку программ.
  Он может привести к завышению оценки эффектов вмешательств.
  Он также несет позитивный урок: внимание и чувство того, что тебя изучают,
  могут мотивировать к улучшению — поэтому забота и видимость имеют значение.

professional_application:
  networking_and_relationship_building: |
    Уделение внимания людям может повысить их производительность —
    эффект Хоторна предполагает, что чувство наблюдения и
    ценности имеет значение. Используйте это позитивно: регулярные проверки,
    видимость и признание.
  collaborative_learning_initiative: |
    При оценке вмешательств используйте контрольные группы и
    учитывайте, вызваны ли улучшения вмешательством
    или вниманием, которое оно привлекает. Эффект Хоторна может
    завысить видимый успех.

how_can_this_be_misapplied:
  surveillance_justification: |
    Использование "эффекта Хоторна" для оправдания постоянного мониторинга —
    наблюдение также может снизить доверие и внутреннюю мотивацию.
  dismissing_improvements: |
    Предположение, что все улучшения во время исследований вызваны эффектом Хоторна —
    иногда вмешательства действительно работают.
  overgeneralization: |
    Оригинальные исследования Хоторна были подвергнуты сомнению;
    эффект может быть меньше или отличаться от первоначально предполагаемого.
  manipulation: |
    Создание ложного "наблюдения" для манипулирования поведением.

related_content:
