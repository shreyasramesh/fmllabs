# Negativity Bias
# Mental Model / Cognitive Bias - Example Entry

id: negativity_bias
name: Негативный уклон

quick_introduction: |
  Негативный уклон — это тенденция придавать больший вес негативной информации, чем
  позитивной. Плохие новости, критика и угрозы привлекают наше внимание и
  влияют на наши решения сильнее, чем эквивалентные позитивные стимулы.

one_liner: Плохие новости весят больше, чем хорошие — мы запрограммированы на приоритизацию угроз.

try_this:
  - Активно ищите и взвешивайте позитивные доказательства при оценке.
  - Замечайте, когда одна критика перевешивает множество комплиментов.
  - Спросите: не придаю ли я негативной информации больше веса, чем она заслуживает?

ask_yourself:
  - Зацикливаюсь ли я на негативе и игнорирую позитив?
  - Чувствовал бы я себя иначе, если бы сосредоточился на хороших доказательствах?

in_more_detail: |
  Эволюционно, пропуск угрозы мог быть фатальным, в то время как упущенная возможность
  обычно была выживаемой. Наш мозг запрограммирован на приоритизацию негативной информации.
  Один критический комментарий может перевесить множество комплиментов. Негативные события
  запоминаются более ярко и на более долгий срок.

  Этот уклон влияет на отношения, принятие решений и самочувствие. Мы зацикливаемся на
  неудачах, предвидим худшие сценарии и игнорируем позитивные доказательства. Понимание
  его помогает нам скорректировать его.

why_this_is_important: |
  Распознавание негативного уклона помогает вам сбалансировать обратную связь, избежать чрезмерной реакции на
  критику и принимать более взвешенные решения. Это также объясняет, почему плохие новости
  доминируют и почему мы часто чувствуем себя хуже, чем оправданы обстоятельства.

when_to_use:
  - принятие_решений
  - построение_отношений
  - лидерство
  - оценка_рисков

how_can_you_spot_it:
  disproportionate_impact_of_criticism: |
    Один негативный комментарий затмевает множество позитивных.
  threat_prioritization: |
    Потенциальные недостатки привлекают больше внимания, чем эквивалентные преимущества.
  vivid_negative_memories: |
    Негативные переживания вспоминаются легче и с большим количеством эмоций.
  discounting_positive_evidence: |
    Хорошие новости быстро забываются или объясняются.

examples:
  performance_reviews: |
    Сотрудник зацикливается на одном критическом отзыве и игнорирует общую
    позитивную оценку.
  news_consumption: |
    Негативные заголовки доминируют во внимании и формируют мировоззрение, несмотря на позитивные
    тененции.
  relationships: |
    Одна ссора имеет больший вес, чем множество хороших моментов.
  investing: |
    Рыночные спады вызывают больше паники, чем эквивалентные подъемы вызывают эйфорию.

real_world_implications: |
  Негативный уклон формирует медиа, политику и организационную культуру. Он
  способствует тревожности, конфликтам и неоптимальным решениям.
  Сознательное противодействие ему может улучшить самочувствие и суждения.

professional_application:
  networking_and_relationship_building: |
    При предоставлении обратной связи помните, что негативные комментарии будут весить больше —
    сбалансируйте их и подчеркните рост. При получении обратной связи сознательно
    рассматривайте полную картину.
  collaborative_learning_initiative: |
    Создавайте культуру, которая явно противостоит негативному уклону: отмечайте победы,
    документируйте позитивные результаты и чередуйте пост-мортемы с "пре-мортемами"
    того, что пошло правильно.

how_can_this_be_misapplied:
  toxic_positivity: |
    Отрицание законных проблем путем настаивания на "позитивном мышлении".
  ignoring_real_threats: |
    Чрезмерная коррекция до степени недооценки реальных рисков.
  feedback_suppression: |
    Избегание необходимой критики, потому что "негатив — это плохо".
  invalidation: |
    Говорить кому-то, что его негативные чувства — "это просто негативный уклон",
    когда у них есть реальные причины для беспокойства.

