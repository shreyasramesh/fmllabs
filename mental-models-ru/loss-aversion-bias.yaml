# Loss Aversion Bias
# Mental Model / Cognitive Bias - Example Entry

id: loss_aversion_bias
name: Неприятие потерь

quick_introduction: |
  Неприятие потерь — это тенденция избегать потерь сильнее, чем приобретать эквивалентные выгоды.
  Люди испытывают боль от потери примерно в два раза сильнее, чем удовольствие от приобретения.

one_liner: Потери ощущаются примерно в два раза болезненнее, чем эквивалентные выгоды кажутся приятными.

try_this:
  - "Спросите себя: не переоцениваю ли я то, что потеряю, по сравнению с тем, что приобрету?"
  - Переформулируйте выбор как приобретение, а не потери, и посмотрите, изменится ли ваше мнение.
  - Обратите внимание, когда страх потери движет решением сильнее, чем реальная выгода.

ask_yourself:
  - Что бы я выбрал, если бы начинал с нуля?
  - Я держусь из-за того, что потеряю, или потому, что будущее действительно лучше?

in_more_detail: |
  Разработанное Даниэлем Канеманом и Амосом Тверски, неприятие потерь описывает, как потери и приобретения
  воспринимаются асимметрично. Психологическое воздействие потери 100 долларов обычно намного
  больше, чем удовлетворение от получения 100 долларов. Этот уклон влияет на решения в
  финансах, переговорах и повседневных выборах, часто приводя к рискованному поведению
  при наличии явных потенциальных потерь.

why_this_is_important: |
  Понимание неприятия потерь помогает распознать, когда страх потери движет решениями
  больше, чем рациональный анализ. Это объясняет, почему люди держатся за убыточные инвестиции, избегают
  необходимых изменений и принимают неоптимальные решения в переговорах и карьерном выборе.

when_to_use:
  - принятие_решений
  - инвестирование
  - карьерные_шаги
  - оценка_рисков

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    Обратите внимание, когда перспектива потери чего-либо вызывает непропорциональную тревогу
    или сопротивление по сравнению с выгодой от потенциального приобретения.
  reluctance_to_change: |
    Нерешительность в смене стратегии, уходе с работы или продаже актива, даже когда
    объективный анализ предполагает, что это лучший вариант.
  framing_sensitivity: |
    Решения резко меняются в зависимости от того, как представлены варианты — как приобретения
    или потери, даже если исходы эквивалентны.
  overvaluing_what_you_have: |
    Эффект владения — придание более высокой ценности вещам, которыми вы владеете, просто потому,
    что вы ими владеете — часто сопровождает неприятие потерь.

examples:
  investing: |
    Удержание падающей акции, чтобы "избежать фиксации убытка", упуская
    лучшие инвестиционные возможности в другом месте.
  career: |
    Оставаться на неудовлетворяющей работе, потому что уход ощущается как потеря безопасности,
    даже когда новая возможность предлагает больший рост.
  negotiations: |
    Отказ от справедливого предложения, потому что оно представлено как "отказ" от чего-то,
    а не "приобретение" соглашения.
  product_design: |
    Бесплатные пробные версии, которые конвертируются в платные — пользователи ощущают "потерю" сервиса
    по окончании пробного периода, что мотивирует подписку сильнее, чем "приобретение"
    нового сервиса.

real_world_implications: |
  Неприятие потерь формирует рынки, политику и поведение отдельных лиц. Оно объясняет,
  почему страхование и гарантии хорошо продаются, почему люди избегают выгодных изменений
  и почему негативные новости оказывают непропорциональное влияние. Осознание этого может улучшить
  качество принятия решений и уменьшить сожаление о сделанном выборе.

professional_application:
  networking_and_relationship_building: |
    Помните, что люди могут сопротивляться прекращению непродуктивных отношений или
    сотрудничества из-за неприятия потерь — они боятся "потерять" связь.
    Представляйте новые возможности как приобретения, а не потери, чтобы снизить сопротивление.
  collaborative_learning_initiative: |
    При внедрении новых процессов или инструментов подчеркивайте, что команда приобретает,
    а не от чего она "отказывается". Инициативы по изменению, представленные в виде потерь,
    часто вызывают более сильное сопротивление.

how_can_this_be_misapplied:
  manipulation: |
    Эксплуатация неприятия потерь для давления на принятие решений — например, "ограниченные по времени предложения"
    или формулировки "не упустите", которые вызывают страх потери, а не
    реальную оценку ценности.
  misinterpreting_relationships: |
    Предположение, что сопротивление человека изменениям является чисто рациональным, когда оно может
    быть обусловлено неприятием потерь. Неправильное приписывание мотивов может подорвать доверие.
  overcommitment: |
    Ошибка невозвратных затрат — продолжение инвестирования в провальный проект, потому что
    "мы уже вложили так много", вместо того чтобы сокращать убытки.
  missed_opportunities_for_conflict_resolution: |
    Отказ от компромисса, потому что любая уступка ощущается как потеря,
    даже когда альтернативой является худший исход для всех.
  vulnerability_to_exploitation: |
    Манипуляции со стороны других, которые формулируют выборы таким образом, чтобы вызвать неприятие потерь,
    например, торговые тактики, подчеркивающие, что вы "потеряете", если не примете меры.
  reinforcing_negative_perceptions: |
    Чрезмерное сосредоточение на потенциальных недостатках может создать пессимистичный
    взгляд, который становится самоисполняющимся, упуская возможности для роста.

