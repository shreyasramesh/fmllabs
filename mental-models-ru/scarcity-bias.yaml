# Scarcity Bias
# Mental Model / Cognitive Bias - Example Entry

id: scarcity_bias
name: Искажение дефицита

quick_introduction: |
  Искажение дефицита — это тенденция придавать большую ценность вещам, когда они кажутся
  редкими или ограниченными. "Ограниченное время", "осталось всего 3" и "эксклюзивный доступ"
  вызывают срочность и желание, часто подавляя рациональную оценку того, действительно ли
  нам нужна или хочется эта вещь.

one_liner: Дефицит усиливает воспринимаемую ценность — "ограниченность" вызывает срочность вместо рациональности.

try_this:
  - Спросите: Хотел бы я это, если бы это не было дефицитным? Уберите срочность.
  - Остановитесь, прежде чем действовать под влиянием предложений об ограниченном времени или остатке количества.
  - Замечайте, когда дефицит вызывает ваше желание сильнее, чем реальная ценность.

ask_yourself:
  - Ценю ли я это, потому что это дефицитно, или потому что оно мне действительно нужно?
  - Принял бы я это решение без фрейминга дефицита?

in_more_detail: |
  Дефицит усиливает воспринимаемую ценность. Когда что-то редкое или исчезает, мы
  хотим этого больше — отчасти потому, что дефицит может сигнализировать о качестве, а отчасти потому,
  что неприятие потерь заставляет нас бояться упустить возможность. Маркетологи и переговорщики используют дефицит
  для создания срочности. Это искажение может приводить к импульсивным решениям, перерасходу средств и плохой приоритизации.

  Дефицит также влияет на когнитивные ресурсы тех, кто действительно
  испытывает нехватку ресурсов; бедность может сокращать "умственные ресурсы" для других решений.

why_this_is_important: |
  Распознавание искажения дефицита помогает противостоять манипулятивным тактикам и принимать более
  осознанные решения. Это также объясняет, почему мы переоцениваем лимитированные издания и
  спешим, когда нет необходимости.

when_to_use:
  - принятие_решений
  - ведение_переговоров
  - инвестирование
  - оценка_рисков

how_can_you_spot_it:
  urgency_trigger: |
    "Ограниченное время" или "осталось всего X" вызывает непропорциональное желание.
  fear_of_missing_out: |
    Возможность потерять доступ побуждает к действию сильнее, чем внутренняя ценность.
  impulsive_purchases: |
    Покупка вещей, потому что они дефицитны, а не потому, что они нужны.
  artificial_scarcity: |
    Дефицит создан искусственно (например, фальшивые таймеры обратного отсчета), а не реален.

examples:
  sales: |
    "Осталось всего 2 штуки" или "Распродажа заканчивается сегодня вечером" вызывает покупки, которые
    не произошли бы без срочности.
  auctions: |
    Участники торгов увлекаются процессом выигрыша и платят больше, чем планировали, из-за
    конкурентного дефицита.
  exclusivity: |
    Доступ "только для членов клуба" или "только по приглашениям" увеличивает воспринимаемую ценность.
  genuine_scarcity: |
    Когда ресурсы действительно ограничены, люди в условиях стресса от дефицита принимают худшие
    решения (например, бедные, испытывающие нехватку времени).

real_world_implications: |
  Искажение дефицита влияет на потребительское поведение, результаты переговоров и политические
  решения. Оно может использоваться этично (например, законные сроки) или неэтично
  (например, фальшивый дефицит). Понимание этого улучшает качество принятия решений.

professional_application:
  networking_and_relationship_building: |
    Будьте осторожны, когда другие создают искусственный дефицит ("Я беру только нескольких
    клиентов"). Проверяйте, реален ли дефицит. При построении отношений
    реальный дефицит вашего времени может сигнализировать о ценности — но чрезмерное использование воспринимается как манипуляция.
  collaborative_learning_initiative: |
    При создании срочности для инициатив убедитесь, что она законна. Фальшивые сроки
    подрывают доверие, когда их обнаруживают.

how_can_this_be_misapplied:
  manipulation: |
    Преднамеренное создание ложного дефицита для давления на других при принятии решений.
  impulsive_decisions: |
    Принятие важных решений под искусственной срочностью, когда больше времени улучшило бы
    результаты.
  overvaluing_scarcity: |
    Предположение, что дефицитные вещи всегда лучше — иногда дефицит произволен.
  exploiting_vulnerability: |
    Использование тактик дефицита в отношении людей, которые уже испытывают нехватку ресурсов.

