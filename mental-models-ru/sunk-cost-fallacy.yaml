# Ошибка невозвратных затрат
# Ментальная модель / Когнитивное искажение - Пример записи

id: sunk_cost_fallacy
name: Ошибка невозвратных затрат

quick_introduction: |
  Ошибка невозвратных затрат — это тенденция продолжать инвестировать в решение из-за
  уже потраченных ресурсов, а не на основе будущих ожидаемых доходов.
  «Мы прошли так далеко» или «Я уже столько вложил» приводит к тому, что хорошие
  деньги идут за плохими.

one_liner: Прошлые вложения потеряны — важны только будущие затраты и выгоды.

try_this:
  - Ask: Если бы я начинал сегодня, выбрал бы я этот путь?
  - Define "kill criteria" in advance—conditions under which you'll stop.
  - Evaluate the marginal decision: what do I gain or lose from here forward?

ask_yourself:
  - Я продолжаю из-за будущей ценности или чтобы оправдать прошлые вложения?
  - Что бы я посоветовал другу, который оказался бы на моем месте с нуля?

in_more_detail: |
  Невозвратные затраты — это прошлые затраты, которые невозможно возместить. Рациональное
  принятие решений игнорирует их — важны только будущие затраты и выгоды. Но мы эмоционально
  привязаны к нашим вложениям. Мы доедаем еду, которая нам не нравится, продолжаем смотреть
  фильм, который не любим, и запускаем проекты, которые больше не имеют смысла. Мы хотим
  «не потерять» то, что вложили, но продолжение часто приводит к еще большим потерям.

  Ошибка особенно сильна, когда мы вложили время, усилия или идентичность, а не только деньги.
  Признать, что мы ошибались, может быть затратно, поэтому мы удваиваем усилия.

why_this_is_important: |
  Распознавание ошибки невозвратных затрат помогает сокращать убытки, менять направление,
  когда это оправдано, и принимать решения на основе будущей ценности, а не прошлых вложений.
  Это важно для проектов, карьеры и отношений.

when_to_use:
  - принятие_решений
  - инвестирование
  - карьерные_шаги
  - оценка_рисков

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    «Мы не можем остановиться сейчас — мы уже потратили X», когда будущие доходы не оправдывают
    продолжения.
  escalation_of_commitment: |
    Вложение большего, чтобы оправдать или «спасти» предыдущие вложения.
  identity_investment: |
    Продолжение, потому что признание неудачи угрожает самооценке.
  ignoring_marginal_analysis: |
    Принятие решений на основе общих затрат, а не предельных затрат и выгод.

examples:
  projects: |
    Продолжение провального проекта, потому что «мы уже потратили на него 6 месяцев»,
    хотя сокращение убытков было бы рациональным.
  relationships: |
    Оставаться в отношениях, потому что «мы вместе 5 лет», вместо того чтобы
    оценивать будущее.
  careers: |
    Оставаться на работе, которая вам не нравится, потому что вы вложились в получение
    диплома или многолетний опыт.
  investments: |
    Держать убыточные акции, чтобы «вернуться к нулю», вместо того чтобы перераспределить средства
    в более выгодные возможности.

real_world_implications: |
  Ошибка невозвратных затрат приводит к растрате ресурсов, затяжным неудачам и упущенным
  возможностям. Она затрагивает отдельных лиц, организации и правительства.
  Преодоление ее требует явных рамок принятия решений.

professional_application:
  networking_and_relationship_building: |
    Не продолжайте инвестировать в отношения или сотрудничество, которые больше не приносят вам пользы,
    только из-за прошлых вложений. Оценивайте перспективную ценность.
  collaborative_learning_initiative: |
    Создайте «критерии прекращения» для проектов — условия, при которых вы остановитесь
    независимо от прошлых вложений. Периодически просматривайте проекты с точки зрения «с нуля».

how_can_this_be_misapplied:
  quitting_too_early: |
    Использование «невозвратных затрат» как предлога для отказа от того, что требует больше времени,
    чтобы принести плоды.
  undervaluing_consistency: |
    Некоторые обязательства (например, отношения, репутация) имеют ценность в непрерывности,
    которую чисто предельный анализ упускает.
  cold_rationality: |
    Отвержение эмоциональной привязанности как иррациональной, когда она может отражать подлинные
    ценности.
  analysis_paralysis: |
    Чрезмерное размышление о том, продолжать ли, когда ответ очевиден.

related_content:
