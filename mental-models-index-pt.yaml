# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Portuguese)

mental_models:
  - id: ambiguity_effect
    name: Efeito de Ambiguidade
    path: mental-models-pt/ambiguity-effect.yaml
    description: |
      O efeito de ambiguidade é a tendência de evitar opções quando não temos informações
      sobre as probabilidades dos resultados. Preferimos riscos conhecidos a riscos
      desconhecidos—mesmo quando os riscos desconhecidos podem ser melhores. A própria incerteza parece
      aversiva.

  - id: anchoring_bias
    name: Viés de Ancoragem
    path: mental-models-pt/anchoring-bias.yaml
    description: |
      O viés de ancoragem é a tendência de confiar excessivamente na primeira informação
      encontrada ao tomar decisões. Essa "âncora" inicial distorce julgamentos subsequentes,
      mesmo quando é irrelevante ou arbitrária.

  - id: availability_cascade
    name: Cascata de Disponibilidade
    path: mental-models-pt/availability-cascade.yaml
    description: |
      Uma cascata de disponibilidade é um processo autorreforçador onde uma ideia ganha
      plausibilidade através de discussão pública repetida. Quanto mais é discutida,
      mais "disponível" ela se torna, mais pessoas acreditam nela, e mais
      ela é discutida. Uma crença coletiva ganha ímpeto independentemente de sua
      verdade subjacente.

  - id: availability_heuristic
    name: Heurística da Disponibilidade
    path: mental-models-pt/availability-heuristic.yaml
    description: |
      A heurística da disponibilidade é a tendência de julgar a probabilidade de eventos
      pela facilidade com que exemplos vêm à mente. Se podemos recordar instâncias facilmente,
      assumimos que o evento é comum. Exemplos vívidos, recentes ou emocionais dominam
      nossas estimativas de probabilidade.

  - id: barnum_effect
    name: Efeito Barnum
    path: mental-models-pt/barnum-effect.yaml
    description: |
      O efeito Barnum (ou efeito Forer) é a tendência de aceitar descrições de personalidade vagas e gerais como unicamente precisas. Horóscopos, adivinhos e testes de personalidade usam afirmações que se aplicam a quase todo mundo - mas acreditamos que são específicas para nós. Vemos a nós mesmos no genérico.

  - id: base_rate_fallacy
    name: Falácia da Taxa Base
    path: mental-models-pt/base-rate-fallacy.yaml
    description: |
      A falácia da taxa base é a tendência de ignorar informações estatísticas gerais
      (taxas base) em favor de informações específicas e vívidas. Supervalorizamos o
      caso particular e subvalorizamos a probabilidade prévia. Uma única história convincente
      pode anular o que os números dizem.

  - id: bayes_theorem
    name: Teorema de Bayes
    path: mental-models-pt/bayes-theorem.yaml
    description: |
      O teorema de Bayes descreve como atualizar a probabilidade de uma hipótese
      quando você recebe novas evidências. Ele formaliza a ideia de que as crenças devem mudar
      proporcionalmente ao quanto a evidência as apoia — não de forma tudo ou nada,
      mas incrementalmente.

  - id: ben_franklin_effect
    name: O Efeito Ben Franklin
    path: mental-models-pt/ben-franklin-effect.yaml
    description: |
      O efeito Ben Franklin é o fenômeno psicológico pelo qual as pessoas gostam mais de alguém
      depois de fazer um favor para elas. Contrário à intuição de que fazemos favores para pessoas
      de quem gostamos, frequentemente passamos a gostar de pessoas para as quais fizemos favores.

  - id: bounded_rationality
    name: Racionalidade Limitada
    path: mental-models-pt/bounded-rationality.yaml
    description: |
      A racionalidade limitada é a ideia de que a tomada de decisão humana é limitada pelas informações
      disponíveis, capacidade cognitiva e tempo. Nós não otimizamos; nós "satisfazemos" — escolhemos
      opções que são boas o suficiente, em vez das melhores possíveis.

  - id: circle_of_competence
    name: Círculo de Competência
    path: mental-models-pt/circle-of-competence.yaml
    description: |
      O círculo de competência é um modelo mental que o exorta a conhecer os limites
      de sua expertise e a permanecer dentro deles ao tomar decisões importantes. Warren Buffett
      e Charlie Munger enfatizam o conhecimento do que você não sabe.

  - id: confirmation_bias
    name: Viés de Confirmação
    path: mental-models-pt/confirmation-bias.yaml
    description: |
      O viés de confirmação é a tendência de buscar, interpretar e lembrar informações
      de maneiras que confirmem nossas crenças existentes. Damos mais peso a evidências
      que apoiam e desconsideramos ou descartamos evidências que contradizem nossas visões.
      Fazemos perguntas que confirmam em vez de testar nossas hipóteses.

  - id: curse_of_knowledge
    name: Maldição do Conhecimento
    path: mental-models-pt/curse-of-knowledge.yaml
    description: |
      A maldição do conhecimento é a dificuldade de imaginar como é não saber algo, uma vez que você já o sabe. Especialistas têm dificuldade em ensinar iniciantes porque não conseguem recriar a perspectiva do iniciante. Uma vez que você sabe, esquece como era não saber.

  - id: default_effect
    name: Efeito Padrão
    path: mental-models-pt/default-effect.yaml
    description: |
      O efeito padrão é a tendência de escolher a opção pré-selecionada quando
      apresentado com escolhas. O que quer que seja definido como padrão tem uma forte vantagem —
      as pessoas frequentemente se apegam a isso, independentemente de ser ideal para elas.

  - id: dissonance_cognitiva
    name: dissonance cognitiva
    path: mental-models-pt/cognitive-dissonance.yaml
    description: |
      

  - id: dunning_kruger_effect
    name: Efeito Dunning-Kruger
    path: mental-models-pt/dunning-kruger-effect.yaml
    description: |
      O efeito Dunning-Kruger descreve um viés cognitivo onde pessoas com conhecimento
      ou habilidade limitada em um domínio superestimam sua competência, enquanto
      especialistas tendem a subestimá-la. Quanto menos você sabe, mais confiante
      você pode estar.

  - id: efeito_dotacao
    name: Efeito de Doutação
    path: mental-models-pt/endowment-effect.yaml
    description: |
      O efeito de doutação é a tendência de valorizar algo mais simplesmente
      porque o possuímos. Exigimos mais para desistir de um objeto do que pagaríamos
      para adquiri-lo. A posse cria um apego que distorce nossa avaliação.

  - id: efeito_espectador
    name: Efeito Espectador
    path: mental-models-pt/bystander-effect.yaml
    description: |
      O efeito espectador é a tendência para que os indivíduos sejam menos propensos a
      oferecer ajuda quando outras pessoas estão presentes. Quanto mais espectadores, menor
      a probabilidade de qualquer uma pessoa agir. A responsabilidade é diluída; assumimos
      que outra pessoa ajudará.

  - id: empathy_gap
    name: Falha de Empatia
    path: mental-models-pt/empathy-gap.yaml
    description: |
      A falha de empatia é a dificuldade em compreender e prever os estados mentais
      de outras pessoas quando nós próprios estamos num estado diferente. Quando
      estamos calmos, subestimamos como nos sentiremos quando estivermos com raiva ou
      com fome. Quando estamos saciados, subestimamos o quanto quereremos comer quando
      estivermos com fome.

  - id: false_consensus_effect
    name: O Efeito do Falso Consenso
    path: mental-models-pt/false-consensus-effect.yaml
    description: |
      O efeito do falso consenso é a tendência a superestimar o quanto os outros concordam
      com nossas crenças, atitudes e comportamentos. Assumimos que nossas opiniões são mais
      comuns do que realmente são, e lutamos para imaginar que pessoas razoáveis possam discordar.

  - id: fenomeno_baader_meinhof
    name: O Fenômeno Baader-Meinhof
    path: mental-models-pt/baader-meinhof-phenomenon.yaml
    description: |
      O fenômeno Baader-Meinhof (também chamado de ilusão de frequência) ocorre quando você aprende
      sobre algo novo e, de repente, o percebe em todos os lugares. Parece uma coincidência,
      mas muitas vezes é atenção seletiva — seu cérebro está preparado para notar o que encontrou recentemente.

  - id: framing_effect
    name: Efeito de Enquadramento
    path: mental-models-pt/framing-effect.yaml
    description: |
      O efeito de enquadramento é a tendência de nossas decisões mudarem com base em como as opções são apresentadas—mesmo quando os fatos subjacentes são idênticos. "90% de sobrevivência" e "10% de mortalidade" descrevem o mesmo resultado, mas geram escolhas diferentes. O enquadramento molda a decisão.

  - id: fundamental_attribution_error
    name: Erro Fundamental de Atribuição
    path: mental-models-pt/fundamental-attribution-error.yaml
    description: |
      O erro fundamental de atribuição é a tendência de atribuir o comportamento dos outros
      ao seu caráter ou personalidade, enquanto atribuímos nosso próprio comportamento a
      fatores situacionais. Julgamos os outros por suas ações e a nós mesmos por nossas
      intenções.

  - id: gamblers_fallacy
    name: Falácia do Jogador
    path: mental-models-pt/gamblers-fallacy.yaml
    description: |
      A falácia do jogador é a crença equivocada de que eventos passados independentes
      afetam os futuros. Após uma sequência de caras, achamos que a coroa está "a caminho" - mesmo
      que cada lançamento seja independente. Vemos padrões na aleatoriedade e
      esperamos uma "correção" ou "reversão" quando nenhuma é necessária.

  - id: groupthink
    name: Pensamento de Grupo
    path: mental-models-pt/groupthink.yaml
    description: |
      O pensamento de grupo é a tendência de grupos coesos priorizarem o consenso e a harmonia em detrimento da avaliação crítica. Os membros suprimem dissidências, autocensuram-se e conformam-se à visão percebida do grupo. O desejo por unanimidade prevalece sobre o desejo pela melhor decisão.

  - id: halo_effect
    name: Efeito Halo
    path: mental-models-pt/halo-effect.yaml
    description: |
      O efeito halo é a tendência de deixar que uma característica ou impressão positiva
      influencie nosso julgamento geral de uma pessoa. Se gostamos da aparência de alguém,
      podemos assumir que essa pessoa é competente. Se admiramos uma habilidade,
      assumimos que ela é boa em tudo. Um atributo positivo lança um
      "halo" sobre o restante.

  - id: hanlons_razor
    name: Navalha de Hanlon
    path: mental-models-pt/hanlons-razor.yaml
    description: |
      A Navalha de Hanlon afirma: "Nunca atribua à malícia o que pode ser adequadamente explicado pela estupidez." Em outras palavras, não presuma má intenção quando a incompetência, a negligência ou a ignorância puderem explicar o comportamento.

  - id: hawthorne_effect
    name: Efeito Hawthorne
    path: mental-models-pt/hawthorne-effect.yaml
    description: |
      O Efeito Hawthorne é a tendência das pessoas a modificar o seu comportamento
      quando sabem que estão a ser observadas ou estudadas. O próprio ato de observação
      pode produzir a mudança — não necessariamente a intervenção que está a ser
      testada. As pessoas respondem à atenção que recebem.

  - id: hindsight_bias
    name: Viés de Retrospectiva
    path: mental-models-pt/hindsight-bias.yaml
    description: |
      O viés de retrospectiva (ou o efeito "eu sabia o tempo todo") é a tendência de acreditar,
      após a ocorrência de um evento, que teríamos previsto ou esperado por ele. Nós
      reconstruímos o passado para que os resultados pareçam mais inevitáveis do que foram.

  - id: hyperbolic_discounting
    name: Desconto Hiperbólico
    path: mental-models-pt/hyperbolic-discounting.yaml
    description: |
      O desconto hiperbólico é a tendência a preferir recompensas menores e imediatas
      em detrimento de recompensas maiores e posteriores — e a descontar o futuro de forma mais acentuada do que
      os modelos racionais preveem. Nós supervalorizamos o presente e subvalorizamos o
      futuro de maneiras inconsistentes.

  - id: illusion_of_control
    name: Ilusão de Controle
    path: mental-models-pt/illusion-of-control.yaml
    description: |
      A ilusão de controle é a tendência de superestimar nossa capacidade de
      influenciar resultados. Acreditamos ter mais controle do que realmente temos — sobre
      eventos aleatórios, outras pessoas e sistemas complexos. Confundimos correlação
      com causalidade e ação com impacto.

  - id: in_group_bias
    name: Viés de Grupo Interno
    path: mental-models-pt/in-group-bias.yaml
    description: |
      O viés de grupo interno é a tendência a favorecer pessoas que percebemos como
      pertencentes ao nosso grupo em detrimento daqueles que percebemos como
      estranhos. Atribuímos qualidades positivas a membros do grupo interno e
      qualidades negativas a membros de grupos externos, muitas vezes com base em
      distinções mínimas ou arbitrárias.

  - id: inversion
    name: Inversão
    path: mental-models-pt/inversion.yaml
    description: |
      A inversão é uma técnica de resolução de problemas que vira uma questão de cabeça para baixo. Em vez de
      perguntar "Como eu tenho sucesso?", pergunte "O que me faria falhar?" e evite essas coisas.
      Ela expõe riscos e antipadrões que o pensamento prospectivo muitas vezes não percebe.

  - id: law_of_diminishing_returns
    name: Lei dos Rendimentos Decrescentes
    path: mental-models-pt/law-of-diminishing-returns.yaml
    description: |
      A lei dos rendimentos decrescentes afirma que, à medida que se adiciona mais de um insumo, mantendo outros constantes, a produção adicional de cada nova unidade de insumo eventualmente diminui. Mais nem sempre é melhor — há um ponto em que o esforço extra rende cada vez menos.

  - id: loss_aversion_bias
    name: Viés de Aversão à Perda
    path: mental-models-pt/loss-aversion-bias.yaml
    description: |
      A aversão à perda é a tendência de preferir evitar perdas a adquirir ganhos equivalentes.
      As pessoas sentem a dor de perder aproximadamente duas vezes mais intensamente do que sentem o prazer de ganhar.

  - id: map_is_not_the_territory
    name: O Mapa Não é o Território
    path: mental-models-pt/map-is-not-the-territory.yaml
    description: |
      "O mapa não é o território" significa que uma representação da realidade não é a realidade
      em si. Modelos, teorias e descrições são simplificações úteis, mas eles
      sempre deixam algo de fora. Confundir o mapa com o território leva a erros.

  - id: mere_exposure_effect
    name: Efeito de Mera Exposição
    path: mental-models-pt/mere-exposure-effect.yaml
    description: |
      O efeito de mera exposição é a tendência de desenvolver uma preferência por coisas
      simplesmente porque estamos familiarizados com elas. Exposição repetida — mesmo sem
      reforço — aumenta o apreço. Tendemos a preferir o que conhecemos.

  - id: narrative_fallacy
    name: Falácia da Narrativa
    path: mental-models-pt/narrative-fallacy.yaml
    description: |
      A falácia da narrativa é a tendência de construir histórias a partir de eventos passados
      que as fazem parecer mais coerentes, previsíveis e significativas do que realmente foram.
      Retrospectivamente, criamos explicações para o acaso. Transformamos a bagunça da
      história em uma narrativa organizada — e então acreditamos que a história era inevitável.

  - id: negativity_bias
    name: Viés de Negatividade
    path: mental-models-pt/negativity-bias.yaml
    description: |
      O viés de negatividade é a tendência de dar mais peso a informações negativas do que a informações
      positivas. Notícias ruins, críticas e ameaças capturam nossa atenção e
      influenciam nossas decisões com mais força do que estímulos positivos equivalentes.

  - id: occams_razor
    name: Navalha de Occam
    path: mental-models-pt/occams-razor.yaml
    description: |
      A Navalha de Occam (ou Navalha de Ockham) é o princípio de que, entre hipóteses concorrentes,
      deve-se preferir aquela com o menor número de suposições. Explicações mais simples são
      frequentemente — embora nem sempre — corretas.

  - id: ostrich_effect
    name: Efeito Avestruz
    path: mental-models-pt/ostrich-effect.yaml
    description: |
      O efeito avestruz é a tendência de evitar informações financeiras negativas—de
      "enterrar a cabeça na areia" como uma avestruz. As pessoas evitam olhar para seus
      portfólios quando os mercados estão em baixa, atrasam a abertura de contas e ignoram
      sinais de alerta que poderiam ajudá-las a agir.

  - id: pareto_principle
    name: Princípio de Pareto
    path: mental-models-pt/pareto-principle.yaml
    description: |
      O Princípio de Pareto (ou regra 80/20) afirma que aproximadamente 80% dos efeitos vêm de
      20% das causas. Uma pequena minoria de entradas muitas vezes produz a maioria das saídas —
      em vendas, bugs, clientes, esforço, recursos e muito mais. Concentre-se nos poucos vitais.

  - id: parkinsons_law
    name: Lei de Parkinson
    path: mental-models-pt/parkinsons-law.yaml
    description: |
      A Lei de Parkinson afirma que "o trabalho se expande para preencher o tempo disponível para sua conclusão". Dê a uma tarefa uma semana, e ela levará uma semana; dê a ela um dia, e muitas vezes será concluída em um dia. O mesmo se aplica a orçamentos, tamanho de equipe e recursos.

  - id: probabilistic_thinking
    name: Pensamento Probabilístico
    path: mental-models-pt/probabilistic-thinking.yaml
    description: |
      O pensamento probabilístico é o hábito de raciocinar em termos de probabilidades
      em vez de certezas. Em vez de "isso vai acontecer?", perguntamos "quão provável é
      isso?". Ele abraça a incerteza e a usa para tomar melhores decisões.

  - id: pygmalion_effect
    name: Efeito Pigmaleão
    path: mental-models-pt/pygmalion-effect.yaml
    description: |
      O efeito Pigmaleão (ou efeito Rosenthal) é o fenômeno onde expectativas mais altas levam a um desempenho melhor. Quando professores, gerentes ou outras pessoas esperam mais de alguém, essa pessoa tende a ter um desempenho melhor. As expectativas se tornam profecias autorrealizáveis.

  - id: regressao_a_media
    name: Regressão à Média
    path: mental-models-pt/regression-to-the-mean.yaml
    description: |
      A regressão à média é o fenômeno estatístico em que resultados extremos tendem a
      ser seguidos por resultados mais próximos da média. Após um resultado incomumente bom ou ruim,
      o próximo resultado provavelmente será menos extremo — não por causa de qualquer intervenção causal,
      mas devido à variação aleatória.

  - id: rosy_retrospection
    name: Retrospecção Rosada
    path: mental-models-pt/rosy-retrospection.yaml
    description: |
      A retrospecção rosada é a tendência de lembrar o passado como melhor do que realmente foi.
      Relembramos experiências passadas de forma mais positiva ao longo do tempo, amenizando dificuldades
      e amplificando os bons momentos. "Os bons velhos tempos" muitas vezes não foram tão bons quanto nos lembramos.

  - id: salience_bias
    name: Viés de Salience
    path: mental-models-pt/salience-bias.yaml
    description: |
      O viés de salience é a tendência de focar nos aspectos mais proeminentes ou
      notáveis de uma situação, enquanto se ignora fatores menos óbvios, mas
      potencialmente importantes. Aquilo que se destaca recebe atenção e peso
      desproporcionais em nossos julgamentos.

  - id: scarcity_bias
    name: Viés de Escassez
    path: mental-models-pt/scarcity-bias.yaml
    description: |
      O viés de escassez é a tendência a atribuir maior valor a coisas quando elas parecem
      escascas ou limitadas. "Tempo limitado", "apenas 3 restantes" e "acesso exclusivo" disparam
      urgência e desejo, muitas vezes sobrepondo-se à avaliação racional se realmente
      precisamos ou queremos a coisa.

  - id: second_order_thinking
    name: Pensamento de Segunda Ordem
    path: mental-models-pt/second-order-thinking.yaml
    description: |
      Pensamento de segunda ordem é a prática de considerar as consequências das
      consequências das suas ações. O pensamento de primeira ordem pergunta "o que acontece se eu
      fizer X?" O pensamento de segunda ordem pergunta "e depois o quê?" e "e depois o que depois
      disso?" Ele revela efeitos não intencionais.

  - id: sunk_cost_fallacy
    name: Falácia do Custo Irrecuperável
    path: mental-models-pt/sunk-cost-fallacy.yaml
    description: |
      A falácia do custo irrecuperável é a tendência de continuar investindo em uma decisão
      devido aos recursos já gastos, em vez de com base nos retornos futuros esperados.
      "Já chegamos tão longe" ou "Eu já investi tanto" leva a jogar mais dinheiro em
      algo que já está fadado ao fracasso.

  - id: survivorship_bias
    name: Viés de Sobrevivência
    path: mental-models-pt/survivorship-bias.yaml
    description: |
      O viés de sobrevivência é o erro lógico de focar em pessoas ou coisas que
      "sobreviveram" a um processo, enquanto se ignora aqueles que não o fizeram. Vemos os vencedores
      e esquecemos os perdedores, levando a conclusões excessivamente otimistas sobre sucesso
      e fracasso.

  - id: viés_de_impacto
    name: Viés de Impacto
    path: mental-models-pt/impact-bias.yaml
    description: |
      

  - id: zeigarnik_effect
    name: Efeito Zeigarnik
    path: mental-models-pt/zeigarnik-effect.yaml
    description: |
      O efeito Zeigarnik é a tendência de lembrar tarefas incompletas ou interrompidas
      melhor do que as concluídas. Tarefas incompletas criam tensão psicológica
      que as mantém ativas em nossas mentes. Nossos cérebros se apegam ao que está
      inacabado.

  - id: zero_sum_thinking
    name: Pensamento de Soma Zero
    path: mental-models-pt/zero-sum-thinking.yaml
    description: |
      Pensamento de soma zero é a crença de que o ganho de uma pessoa deve ser a perda de outra —
      que os recursos são fixos e qualquer vantagem para você significa desvantagem para mim.
      Na realidade, muitas situações são de soma positiva: ambas as partes podem ganhar.
