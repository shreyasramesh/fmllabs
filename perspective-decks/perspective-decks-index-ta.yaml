# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Tamil)

domains:
  art:
    name: கலை
    description: |
      கலையைக் காணும்போது உங்கள் கண்ணோட்டத்தை மாற்ற உதவும் அட்டைகள். ஒவ்வொன்றும்
      வெவ்வேறு கோணத்தை வழங்குகிறது - ஒளி மற்றும் நிழல் முதல் அறிமுகங்கள் மற்றும் உணர்ச்சி வரை - நீங்கள்
      கலைப்படைப்புகளை எவ்வாறு பார்க்கிறீர்கள் மற்றும் தொடர்பு கொள்கிறீர்கள் என்பதை ஆழப்படுத்த.
  urban_jungle:
    name: நகர்ப்புறக் காடு
    description: |
      நகரத்தில் சாதாரணமாக நடப்பதற்குப் பதிலாக, அதை ஒரு உயிருள்ள உயிரினமாகப் பாருங்கள்.
      பழைய கட்டிடங்களின் வடுக்கள், போக்குவரத்தின் நடனம்,
      மற்றும் சந்துகளின் இரகசிய வாழ்க்கையில் அட்டைகள் கவனம் செலுத்துகின்றன.
  culinary_lab:
    name: சமையல் ஆய்வகம்
    description: |
      சுவையானது என்பதிலிருந்து உருமாற்றத்திற்கு மாறுதல். ஒரு கடியின் வேதியியல்,
      ஒரு மூலப்பொருளின் வரலாறு, மற்றும் ஒரு உணவகத்தின் ஒலிப்பதிவு ஆகியவற்றை ஆராயுங்கள்.
  natural_microcosm:
    name: இயற்கை நுண் உலகம்
    description: |
      ஒரு பூங்கா அல்லது பின்புற தோட்டத்திற்கு ஏற்றது. இந்தக் கண்ணோட்டம் ஒரு இலையின் கண்ணுக்குத் தெரியாத
      பொறியியலில், ஒரு கல்லின் மெதுவான வாழ்க்கை, அல்லது பூச்சிகளின் பிரதேச நாடகங்களில் கவனம் செலுத்துகிறது.
  human_interface:
    name: மனித இடைமுகம்
    description: |
      மனிதர்கள் சந்திக்கும் அன்றாட இடங்கள் - காபி கடைகள், போக்குவரத்து மையங்கள்,
      பணி இடங்கள், சில்லறை விற்பனை, பொது பூங்காக்கள். வரிசை நடனம்,
      பிரதேச உரிமைகோரல்கள், கண்ணுக்குத் தெரியாத ஸ்கிரிப்டுகள், மற்றும் பகிரப்பட்ட இடத்தின் மானுடவியல் ஆகியவற்றில் அட்டைகள் கவனம் செலுத்துகின்றன.
  california_superbloom:
    name: கலிபோர்னியா சூப்பர்ப்ளூம்
    description: |
      குளிர்கால மழைக்குப் பிறகு ஏற்படும் மலர்களின் தற்காலிக வெடிப்பு. வண்ணங்கள்,
      அளவு, மகரந்தச் சேர்க்கையாளர்கள், புவியியல், வானிலை, மற்றும் மலரின் தற்காலிகக் காட்சி ஆகியவற்றில் அட்டைகள் கவனம் செலுத்துகின்றன.
