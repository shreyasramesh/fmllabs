# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# कैलिफोर्निया के सुपरब्लूम को देखने के तरीके (Hindi)

id: ways_of_looking_at_california_superbloom
name: कैलिफोर्निया के सुपरब्लूम को देखने के तरीके
description: |
  कैलिफोर्निया के सुपरब्लूम का अनुभव करते समय आपके दृष्टिकोण को बदलने वाले कार्ड।
  प्रत्येक लेंस आपको वाइल्डफ्लावर, पहाड़ी ढलानों और
  सर्दियों की बारिश के बाद रंग के क्षणिक विस्फोट को देखने के तरीके को गहरा करने की पेशकश करता है।
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: वह बारिश जिसने इसे बनाया
    prompt: |
      फूलों से पहले, बारिश हुई थी। उन तूफानों की कल्पना करें जिन्होंने मिट्टी को भर दिया,
      बीज भूमिगत इंतजार कर रहे थे। इस खिलने के लिए किन परिस्थितियों का संरेखित होना पड़ा?
      सुपरब्लूम को उसके मूल तक पीछे की ओर ट्रेस करें।
    follow_ups:
      - अधिक - या कम - बारिश से क्या अलग होता?
      - एक ही पहाड़ी के पीछे कितने वर्षों की निष्क्रियता हो सकती है?
      - इस पल का क्या मतलब है कि यह कभी गारंटीशुदा नहीं था?
  - id: one_species_at_a_time
    name: एक बार में एक प्रजाति
    prompt: |
      एक एकल फूल प्रजाति चुनें और उसका अनुसरण करें। नारंगी खसखस, बैंगनी ल्यूपिन,
      पीले गोल्डफील्ड्स - एक पल के लिए बाकी सब कुछ अनदेखा करें।
      केवल एक पर ध्यान केंद्रित करने से आप जो देखते हैं वह कैसे बदल जाता है?
    follow_ups:
      - यह प्रजाति कहाँ हावी है - और कहाँ यह उपज देती है?
      - यदि केवल यही खिले तो पहाड़ी कैसी दिखेगी?
      - यह दूसरों के बीच अपना स्थान कैसे बनाए रखती है?
  - id: pollinators_view
    name: परागणकों का दृष्टिकोण
    prompt: |
      एक मधुमक्खी, एक तितली, या एक हमिंगबर्ड होने की कल्पना करें। क्या आपको आकर्षित करेगा?
      आप पहले किन फूलों पर जाएंगे? पंखुड़ियों से कुछ इंच ऊपर से परिदृश्य कैसा दिखता है?
    follow_ups:
      - कौन से पैटर्न आपके मार्ग का मार्गदर्शन करेंगे?
      - आप किन फूलों को छोड़ देंगे - और क्यों?
      - पैमाना अनुभव को कैसे बदलता है?
  - id: ground_level
    name: ज़मीनी स्तर
    prompt: |
      नीचे झुकें। अपने पेट के बल लेटें या घुटने टेकें। मिट्टी के दृष्टिकोण से
      सुपरब्लूम को देखें - तने ऊपर उठ रहे हैं, पंखुड़ियाँ आपके ऊपर मेहराबदार हैं,
      आकाश ऊपर एक दूर की पट्टी है।
    follow_ups:
      - खड़े होने की ऊँचाई से आप क्या चूक गए, वह आपको क्या नोटिस हुआ?
      - आपके नीचे ज़मीन कैसी महसूस होती है?
      - यहाँ से एक भृंग क्या देखेगा?
  - id: time_lapse
    name: टाइम-लैप्स
    prompt: |
      सुपरब्लूम एक लंबी कहानी का एक क्षण है। पहाड़ी को फास्ट-फॉरवर्ड में
      कल्पना करें: हरे अंकुर, पहली कलियाँ, शिखर रंग, फिर फीका पड़ना।
      यह तमाशा कब तक रहता है? इससे पहले और बाद में क्या आता है?
    follow_ups:
      - यदि आप केवल एक बार जा सकते थे तो आप कब जाना चुनते?
      - जब आप पहुँचते हैं तब तक क्या पहले से ही चला गया है?
      - रंग फीका पड़ने पर क्या बचेगा?
  - id: the_chemistry_of_color
    name: रंग का रसायन
    prompt: |
      रंगद्रव्यों पर ध्यान केंद्रित करें। नारंगी, बैंगनी, पीला, नीला - प्रत्येक रंगद्रव्य
      क्या बनाता है? वे कैसे परस्पर क्रिया करते हैं? रंग कहाँ टकराते हैं, और कहाँ वे सामंजस्य बिठाते हैं?
      पहाड़ी को एक रंग पैलेट के रूप में मानें।
    follow_ups:
      - आप कौन सा रंग जोड़ेंगे - या घटाएंगे?
      - दिन भर में प्रकाश रंगों को कैसे बदलता है?
      - यह काले और सफेद रंग में कैसा दिखेगा?
  - id: negative_space
    name: नकारात्मक स्थान
    prompt: |
      फूलों के न होने वाली चीजों को देखें। आकाश, मिट्टी के नंगे पैच, खिलने के बीच
      की खाली जगहें। खाली जगह आप जो देखते हैं उसे कैसे आकार देती है?
      जो नहीं है उसके महत्व को महसूस करें।
    follow_ups:
      - खालीपन कहाँ केंद्रित है?
      - उन अंतरालों को क्या भरेगा - और क्या इसे भरना चाहिए?
      - नकारात्मक स्थान संरचना को एक साथ कैसे रखता है?
  - id: the_path_through
    name: इसके माध्यम से पथ
    prompt: |
      पगडंडियों पर ध्यान दें - मानव, जानवर, या हवा से उड़ाई गई। लोग कहाँ चलते हैं?
      परिदृश्य कहाँ मार्ग का विरोध करता है? खिलने के माध्यम से एक पथ का पता लगाएं
      और पूछें कि उसका अनुसरण करने की क्या कीमत चुकानी पड़ेगी।
    follow_ups:
      - वहां न चलकर आप क्या बचाएंगे?
      - पथ आपको कहाँ ले जाना चाहता है?
      - निशान पर बने रहने से आप क्या चूक जाएंगे?
  - id: geology_beneath
    name: नीचे की भूविज्ञान
    prompt: |
      फूल लाखों वर्षों पर आराम करते हैं। मिट्टी के नीचे कौन सा पत्थर है?
      इन पहाड़ियों को किसने आकार दिया? सुपरब्लूम को आपको अपने पैरों के नीचे
      गहरे समय से जोड़ दें।
    follow_ups:
      - भूविज्ञान यहाँ क्या उगता है, इसे कैसे प्रभावित करता है?
      - पहाड़ियों के बनने से पहले यह स्थान कैसा दिखता?
      - फूल चले जाने पर क्या बचेगा?
  - id: scent_and_sound
    name: गंध और ध्वनि
    prompt: |
      अपनी आँखें बंद करें। आपको क्या महक आती है? पराग, धूल, ऋषि, नम पृथ्वी?
      आपको क्या सुनाई देता है? मधुमक्खियाँ, हवा, कदम, चुप्पी?
      एक पल के लिए गैर-दृश्य इंद्रियों को आगे बढ़ने दें।
    follow_ups:
      - अनुभव को पकड़ने के लिए आप कौन सी ध्वनि जोड़ेंगे?
      - जैसे-जैसे आप चलते हैं गंध कैसे बदलती है?
      - यदि आप केवल देखते तो आप क्या चूक जाते?
  - id: light_and_shadow
    name: प्रकाश और छाया
    prompt: |
      देखें कि प्रकाश पहाड़ी पर कैसे चलता है। सुबह, दोपहर, शाम - सूरज का कोण
      फूलों को कैसे बदलता है? छाया कहाँ पड़ती है? क्या प्रकट होता है और क्या छिपा है?
    follow_ups:
      - प्रकाश सबसे अधिक जीवंत कब लगता है?
      - आप भोर में क्या देखेंगे जो आप दोपहर में चूक जाएंगे?
      - छाया परिदृश्य को कैसे आकार देती है?
  - id: seed_to_flower
    name: बीज से फूल तक
    prompt: |
      एक एकल पौधे को बीज से फूल तक ट्रेस करें। यह यहाँ कैसे पहुंचा? हवा, जानवर,
      पानी? यह कब तक इंतजार करता रहा? पंखुड़ियाँ गिरने पर यह क्या बन जाएगा?
      एक जीवन को उसके चक्र के माध्यम से फॉलो करें।
    follow_ups:
      - बीज ने भूमिगत क्या देखा होगा?
      - पौधा पीछे क्या छोड़ेगा?
      - इस पहाड़ी पर कितने पीढ़ियों का प्रतिनिधित्व किया जाता है?
  - id: micro_vs_macro
    name: सूक्ष्म बनाम स्थूल
    prompt: |
      एकल पंखुड़ी, ओस की बूंद, पराग के दाने पर ज़ूम इन करें। फिर पूरी पहाड़ी,
      घाटी, राज्य तक वापस खींचें। पैमाना सुपरब्लूम का क्या अर्थ बदलता है?
    follow_ups:
      - एक पैमाने पर क्या अदृश्य है और दूसरे पर स्पष्ट है?
      - आपका ध्यान स्वाभाविक रूप से कहाँ टिकता है?
      - स्थूल दृश्य सूक्ष्म को कैसे बदलता है - और इसके विपरीत?
  - id: weathers_hand
    name: मौसम का हाथ
    prompt: |
      सुपरब्लूम मौसम का सहयोग है। बारिश, धूप, हवा, तापमान -
      प्रत्येक की एक भूमिका होती है। मौसम को एक सह-निर्माता के रूप में कल्पना करें।
      इसने क्या तय किया? इसने क्या रोक लिया?
    follow_ups:
      - एक अलग सर्दी से क्या पैदा होता?
      - आज का मौसम आपके अनुभव को कैसे आकार देता है?
      - यदि वे कर सकते तो फूल मौसम के बारे में क्या कहेंगे?
  - id: human_witness
    name: मानव गवाह
    prompt: |
      आप इसे देखने वाले पहले व्यक्ति नहीं हैं। और कौन यहाँ खड़ा रहा है?
      पशुपालक, स्वदेशी लोग, फोटोग्राफर, यात्री। आपकी उपस्थिति
      स्थान को कैसे बदलती है? गवाह होने का क्या मतलब है?
    follow_ups:
      - वे क्या देखते जो आप नहीं देखते?
      - आप क्या साथ ले जाएंगे?
      - गवाह होना स्वामित्व या लेने से कैसे भिन्न होता है?
  - id: the_next_year
    name: अगला वर्ष
    prompt: |
      यह खिलना ठीक उसी तरह दोहराया नहीं जाएगा। अगला वर्ष सूखा, या आग, या
      प्रजातियों का एक अलग मिश्रण हो सकता है। एक साल में लौटने की कल्पना करें।
      आप क्या ढूंढने की उम्मीद करेंगे? आप क्या खोने के लिए तैयार होंगे?
    follow_ups:
      - क्या इस पल को अपूरणीय बनाता है?
      - आप अपने भविष्य के स्व को क्या बताएंगे?
      - नश्वरता अनुभव को कैसे गहरा करती है?
  - id: texture_and_touch
    name: बनावट और स्पर्श
    prompt: |
      फूलों के माध्यम से अपना हाथ फेरने पर कैसा महसूस होगा? नरम पंखुड़ियाँ,
      कठोर तने, चिपचिपा पराग, खुरदरी पत्तियाँ। बिना छुए बनावट की कल्पना करें -
      या, जहाँ अनुमति हो, धीरे से स्पर्श करें और ध्यान दें।
    follow_ups:
      - कौन सी बनावट आपको सबसे ज्यादा हैरान करती है?
      - आप किसे छूने से बचेंगे - और क्यों?
      - रंग अकेला क्या व्यक्त नहीं कर सकता, उसमें बनावट कैसे जुड़ती है?
  - id: before_and_after
    name: पहले और बाद में
    prompt: |
      इस पहाड़ी को शुष्क मौसम में चित्रित करें - भूरा, निष्क्रिय, प्रतीत होता है कि मृत।
      अब दोनों छवियों को पकड़ें: पहले और बाद की। विपरीतता
      लचीलापन, धैर्य और परिवर्तन के बारे में क्या प्रकट करती है?
    follow_ups:
      - शुष्क मौसम देखने वाले किसी व्यक्ति ने क्या चूक दिया होगा?
      - निष्क्रियता की स्मृति खिलने को कैसे समृद्ध करती है?
      - यह किन अन्य "पहले और बाद" के क्षणों को प्रेरित करता है?
  - id: make_it_a_mixtape
    name: इसे एक मिक्स्टेपीक बनाएँ
    prompt: |
      इस परिदृश्य के साथ कौन सा संगीत होगा? सुपरब्लूम के लिए एक प्लेलिस्ट बनाएं।
      क्या गति, क्या मूड, क्या वाद्य यंत्र? फूलों को
      साउंडट्रैक सुझाने दें।
    follow_ups:
      - शुरुआती ट्रैक क्या है?
      - संगीत को फूलों से जोड़ने वाला क्या गुण है - लय, रंग, भावना?
      - दिन के अलग-अलग समय पर प्लेलिस्ट कैसे बदलेगी?
  - id: take_one_thing_home
    name: एक चीज घर ले जाओ
    prompt: |
      आप फूल नहीं ले जा सकते - वे यहाँ के हैं। लेकिन आप एक स्मृति,
      एक सनसनी, एक प्रश्न ले जा सकते हैं। आप कौन सी एक चीज साथ ले जाएंगे?
      आप एक भी फूल तोड़े बिना इसे कैसे पकड़े रखेंगे?
    follow_ups:
      - आप किसी ऐसे व्यक्ति को क्या दिखाएंगे जो आ नहीं सकता था?
      - आप बाद में इसका वर्णन कैसे करेंगे?
      - आप जानबूझकर क्या पीछे छोड़ देंगे?
