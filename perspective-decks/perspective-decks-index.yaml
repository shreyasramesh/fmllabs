    domain: urban_jungle

  - id: urban_jungle_paris
    name: Urban Jungle — Paris
    path: perspective-decks/urban-jungle/urban-jungle-paris.yaml
    description: |
      50 cards to shift how you see Paris—from scale and light to layers of
      history and the rhythms of street life.
    domain: urban_jungle

  - id: urban_jungle_bangalore
    name: Urban Jungle — Bangalore
    path: perspective-decks/urban-jungle/urban-jungle-bangalore.yaml
    description: |
      50 cards to shift how you see Bangalore—from scale and light to layers of
