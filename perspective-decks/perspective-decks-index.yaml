    domain: urban_jungle

  - id: culinary_lab_indian
    name: Culinary Lab — Indian
    path: perspective-decks/culinary-lab/culinary-lab-indian.yaml
    description: |
      50 cards to shift how you experience Indian food—from the chemistry of
      spices and heat to the archaeology of ingredients and the choreography of
      the shared table.
    domain: culinary_lab

  - id: culinary_lab_italian
    name: Culinary Lab — Italian
    path: perspective-decks/culinary-lab/culinary-lab-italian.yaml
    description: |
      50 cards to shift how you experience Italian food—from the chemistry of
