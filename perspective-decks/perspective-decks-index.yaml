# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index
# Paths and descriptions for each deck

domains:
  urban_jungle: |
    Instead of just walking through a city, you look at it as a living organism.
    Cards focus on the scars of old buildings, the choreography of traffic,
    and the secret lives of alleyways.
  culinary_lab: |
    Shifting from tasty to transformative. Explore the chemistry of a bite,
    the history of an ingredient, and the soundtrack of a restaurant.

decks:
  - id: ways_of_looking_at_art
    name: Ways of Looking at Art
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      50 cards to shift your perspective when viewing art. Each card offers a
      different lens—from light and shadow to introductions and emotion—to
      deepen how you see and engage with artworks.
    domain: art

  - id: urban_jungle_new_york
    name: Urban Jungle — New York
    path: perspective-decks/urban-jungle/urban-jungle-new-york.yaml
    description: |
      50 cards to shift how you see New York—from scale and light to layers of
      history and the rhythms of street life.
    domain: urban_jungle

  - id: urban_jungle_san_francisco
    name: Urban Jungle — San Francisco
    path: perspective-decks/urban-jungle/urban-jungle-san-francisco.yaml
    description: |
      50 cards to shift how you see San Francisco—from scale and light to
      layers of history and the rhythms of street life.
    domain: urban_jungle

  - id: urban_jungle_london
    name: Urban Jungle — London
    path: perspective-decks/urban-jungle/urban-jungle-london.yaml
    description: |
      50 cards to shift how you see London—from scale and light to layers of
