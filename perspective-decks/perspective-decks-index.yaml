# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index
# Paths and descriptions for each deck

domains:
  urban_jungle: |
    Instead of just walking through a city, you look at it as a living organism.
    Cards focus on the scars of old buildings, the choreography of traffic,
    and the secret lives of alleyways.
  culinary_lab: |
    Shifting from tasty to transformative. Explore the chemistry of a bite,
    the history of an ingredient, and the soundtrack of a restaurant.
  natural_microcosm: |
    Perfect for a park or a backyard. This lens focuses on the invisible
    engineering of a leaf, the slow-motion life of a rock, or the territorial
    dramas of insects.
  human_interface: |
    The everyday spaces where humans meet—coffee shops, transit hubs,
    workplaces, retail, public parks. Cards focus on queue choreography,
    territorial claims, invisible scripts, and the anthropology of shared space.
  digital_ghost: |
    The invisible layer of digital experience—buttons and controls, loading
    states, errors, data storage, onboarding. Cards focus on intent behind
    interfaces, physicality of data, hidden labor behind smooth UI, and when
    software breaks character.

