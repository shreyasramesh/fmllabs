# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Bengali)

domains:
  art:
    name: শিল্প
    description: |
      শিল্পকর্ম দেখার সময় আপনার দৃষ্টিভঙ্গি বদলানোর জন্য কার্ড। প্রতিটি একটি ভিন্ন
      দৃষ্টিকোণ প্রদান করে—আলো ও ছায়া থেকে শুরু করে পরিচয় এবং আবেগ—শিল্পকর্মকে
      আপনি কীভাবে দেখেন এবং সেগুলির সাথে কীভাবে সংযুক্ত হন তা গভীর করার জন্য।
  urban_jungle:
    name: শহুরে জঙ্গল
    description: |
      শুধু শহরের মধ্যে দিয়ে হেঁটে যাওয়ার পরিবর্তে, আপনি এটিকে একটি জীবন্ত সত্তা হিসেবে দেখেন।
      কার্ডগুলি পুরানো ভবনগুলির ক্ষত, ট্র্যাফিকের কোরিওগ্রাফি,
      এবং গলিপথের গোপন জীবনের উপর আলোকপাত করে।
  culinary_lab:
    name: রন্ধনশালা
    description: |
      সুস্বাদু থেকে রূপান্তরমূলক। একটি কামড়ের রসায়ন,
      একটি উপাদানের ইতিহাস, এবং একটি রেস্তোরাঁর সাউন্ডট্র্যাক অন্বেষণ করুন।
  natural_microcosm:
    name: প্রাকৃতিক ক্ষুদ্র বিশ্ব
    description: |
      একটি পার্ক বা একটি উঠোনের জন্য উপযুক্ত। এই লেন্সটি একটি পাতার অদৃশ্য
      প্রকৌশল, একটি পাথরের ধীরগতির জীবন, বা পোকামাকড়ের আঞ্চলিক নাটকগুলির উপর আলোকপাত করে।
  human_interface:
    name: মানব ইন্টারফেস
    description: |
      দৈনন্দিন স্থান যেখানে মানুষেরা মিলিত হয়—কফি শপ, ট্রানজিট হাব,
      কর্মক্ষেত্র, খুচরা দোকান, পাবলিক পার্ক। কার্ডগুলি সারিতে দাঁড়ানোর কোরিওগ্রাফি,
      এলাকার দখল, অদৃশ্য স্ক্রিপ্ট, এবং ভাগ করা স্থানের নৃতত্ত্বের উপর আলোকপাত করে।
  california_superbloom:
    name: ক্যালিফোর্নিয়া সুপারব্লুম
    description: |
      শীতের বৃষ্টির পর বন্যফুলের ক্ষণস্থায়ী বিস্ফোরণ। কার্ডগুলি রঙ,
      স্কেল, পরাগায়নকারী, ভূতত্ত্ব, আবহাওয়া, এবং ফুলের ক্ষণস্থায়ী দৃশ্যের উপর আলোকপাত করে।
