    description: |
      20 de cărți pentru a-ți schimba perspectiva atunci când experimentezi superînflorirea Californiei. Fiecare carte oferă o lentilă diferită – de la polenizatori și geologie la lumină, miros și impermanență – pentru a aprofunda modul în care vezi florile sălbatice și explozia efemeră de culoare.
    domain: california_superbloom
