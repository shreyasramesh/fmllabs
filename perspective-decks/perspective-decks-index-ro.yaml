# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Romanian)

domains:
  art:
    name: Artă
    description: |
      Cărți pentru a-ți schimba perspectiva atunci când privești arta. Fiecare oferă o lentilă diferită – de la lumină și umbră la introduceri și emoție – pentru a aprofunda modul în care vezi și interacționezi cu operele de artă.
  urban_jungle:
    name: Jungla Urbană
    description: |
      În loc să mergi doar prin oraș, îl privești ca pe un organism viu. Cărțile se concentrează pe cicatricile clădirilor vechi, coregrafia traficului și viețile secrete ale aleilor.
  culinary_lab:
    name: Laborator Culinar
    description: |
      Trecând de la gustos la transformator. Explorează chimia unei mușcături, istoria unui ingredient și coloana sonoră a unui restaurant.
  natural_microcosm:
    name: Microcosmos Natural
    description: |
      Perfect pentru un parc sau o grădină. Această perspectivă se concentrează pe ingineria invizibilă a unei frunze, viața în slow-motion a unei pietre sau dramele teritoriale ale insectelor.
  human_interface:
    name: Interfața Umană
    description: |
      Spațiile cotidiene unde oamenii se întâlnesc – cafenele, noduri de transport, locuri de muncă, spații de vânzare cu amănuntul, parcuri publice. Cărțile se concentrează pe coregrafia cozilor, revendicările teritoriale, scenariile invizibile și antropologia spațiului comun.
  california_superbloom:
    name: Superinflorirea Californiei
    description: |
      Explozia efemeră de flori sălbatice după ploaia de iarnă. Cărțile se concentrează pe culoare, scară, polenizatori, geologie, vreme și spectacolul trecător al înfloririi.
decks:
  - id: ways_of_looking_at_art
    name: Artă
    path: perspective-decks/ways-of-looking-at-art.yaml
