# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# Способы взгляда на искусство (Russian)

id: ways_of_looking_at_art
name: Искусство
description: |
  Карты, чтобы изменить ваш взгляд на искусство. Каждая предлагает разную
  призму для углубления вашего восприятия и взаимодействия с произведениями.
domain: art
cards:
  - id: souvenir
    name: Сувенир
    prompt: |
      Выберите что-то из произведения искусства и спрячьте это в следующем, на которое посмотрите.
      Как бы вы вписали это в новую композицию?
    follow_ups:
      - Что бы вы решили перенести?
      - Что бы это приобрело или потеряло в новом контексте?
      - Где бы это поместилось — или отказывалось помещаться — в новой работе?
  - id: throw_a_party
    name: Устроить вечеринку
    prompt: |
      Пригласите всех художников в комнату. Что бы они надели?
      О чем бы они думали?
    follow_ups:
      - Кто бы к кому тянулся?
      - О чем бы они спорили?
      - Что бы их удивило в работах друг друга?
  - id: time_out
    name: Пауза
    prompt: |
      Выйдите наружу. Сосредоточьтесь на свете, звуках и ощущениях. Присутствуйте в своем
      окружении. Опыт просмотра искусства — это не только сами произведения, но и пространства
      между ними.
    follow_ups:
      - Что вы замечаете, когда перестаете фокусироваться на искусстве?
      - Как комната формирует то, что вы видите?
      - Что бы вы упустили, если бы торопились?
  - id: plan_a_trip
    name: Спланировать путешествие
    prompt: |
      То, что вы видите сегодня, может быть первым шагом в гораздо более длинном путешествии. Когда
      вы покинете галерею или пространство, решите, какое произведение искусства вы хотите увидеть следующим,
      и спланируйте целое путешествие вокруг него.
    follow_ups:
      - Куда бы вас привело это путешествие?
      - Что вам понадобилось бы увидеть по пути?
      - Почему именно эта работа — что делает ее достойной путешествия?
  - id: in_black_and_white
    name: В черно-белом
    prompt: |
      Сосредоточьтесь на игре света и тени — вы даже можете сделать фото в черно-белом, чтобы помочь.
      Где тона самые темные? Как это предполагает глубину или нет? Как это помогает вам понять композицию?
    follow_ups:
      - Что исчезает, когда вы убираете цвет?
      - Что становится яснее?
      - Куда в первую очередь направляется ваш взгляд в версии в градациях серого?
  - id: give_it_a_voice
    name: Дать голос
    prompt: |
      Какие звуки издавало бы это произведение искусства? Как вы могли бы услышать цвета,
      формы и фигуры?
    follow_ups:
      - Оно громкое или тихое? Резкое или мягкое?
      - Какой инструмент или текстура могли бы его передать?
      - Каким был бы звук тишины в этой работе?
  - id: find_the_middle_ground
    name: Найти золотую середину
    prompt: |
      Как далеко произведение искусства от вас? Насколько оно велико по сравнению с вашим ростом?
      Сколько оно весит? Сколько места оно занимает? Смогли бы вы поместить его в дом?
    follow_ups:
      - Что бы изменилось, если бы вы могли держать его в руке?
      - Что, если бы оно было размером с комнату?
      - Как масштаб формирует ваши отношения с ним?
  - id: from_the_edges
    name: С краев
    prompt: |
      Где заканчивается произведение искусства и начинается «реальный мир»? Можете ли вы попытаться использовать
      свои руки как видоискатель, чтобы переопределить края произведения искусства для себя? Есть ли различимый край?
    follow_ups:
      - Что происходит, когда вы меняете рамку?
      - Что включается или исключается?
      - Куда работа хочет выплеснуться за свои границы?
  - id: transmogrify_it
    name: Преобразить
    prompt: |
      Что, если бы вы могли изменить произведение искусства на другой жанр? Фотографию в экспрессивную живопись или инсталляцию в пейзаж?
      Как бы вы это сделали? Сохранило бы оно свой характер даже в переводе?
    follow_ups:
      - Что является существенным для работы — что должно пережить изменение?
      - Что было бы приобретено или потеряно в переводе?
      - Какой жанр раскрыл бы что-то новое о ней?
  - id: the_hand_of_the_artist
    name: Рука художника
    prompt: |
      Ищите свидетельства мазков кисти художника, следов резца, отпечатков пальцев, даже волосков.
      Представьте, что вы сами делаете эти отметки — в какое положение вам пришлось бы встать?
      Какие инструменты вы бы использовали?
    follow_ups:
      - Что след раскрывает о теле творца?
      - Где жест быстрый или медленный, уверенный или нерешительный?
      - Каково было бы сделать эту отметку?
  - id: tell_the_story
    name: Рассказать историю
    prompt: |
      История искусства богата повествованием, и сегодня существует захватывающий диалог между искусством, литературой и кино.
      Есть ли история в произведении искусства? Как вы ее рассказываете?
    follow_ups:
      - Что происходит до или после этого момента?
      - Кто рассказчик? Чей голос отсутствует?
      - Сработало бы это как фильм, роман или поэма?
  - id: shadowboxing
    name: Бой с тенью
    prompt: |
      Двигайтесь. Подходите очень близко. Отходите как можно дальше. Смещайтесь в стороны.
      Двигайтесь вверх. Двигайтесь вниз. Пробуйте разные углы. Не задерживайтесь на одном месте долго.
      Наслаждайтесь изменениями, которые совершает произведение искусства, пока вы двигаетесь вокруг него.
    follow_ups:
      - Что меняется, когда вы меняете положение?
      - Какой угол вас удивил?
      - Как движение вашего тела меняет то, что вы видите?
  - id: six_degrees_of_francis_bacon
    name: Шесть степеней Франсиса Бэкона
    prompt: |
      Художники влияют на других художников. Темы и идеи развиваются на протяжении поколений и через границы.
      Свяжите произведение искусства с другим в галерее, используя как можно меньше звеньев.
    follow_ups:
      - Какой кратчайший путь вы можете найти?
      - Какая связь самая сильная — техника, сюжет, настроение или идея?
      - Что подумал бы художник об этой связи?
  - id: headlines
    name: Заголовки
    prompt: |
      Представьте день, когда было создано произведение искусства, и найдите или придумайте газетный
      заголовок для этого дня. Сравните его с сегодняшними первыми полосами.
    follow_ups:
      - Что было бы выше линии сгиба?
      - Что изменилось — а что нет?
      - Как заголовок переосмысливает работу?
  - id: speed_date
    name: Свидание вслепую
    prompt: |
      Посвятите каждому произведению искусства всего 10 секунд. Делайте это до тех пор, пока не увидите их все,
      или пока не иссякнет энергия, затем вернитесь к своим фаворитам и задержитесь.
      Как вы видите их теперь? К каким вы чувствуете себя притянутыми?
    follow_ups:
      - Что выявил быстрый обзор, что могло быть упущено при длительном рассмотрении?
      - Почему вы вернулись к этим конкретным работам?
      - Как второй взгляд отличался от первого?
  - id: make_connections
    name: Установить связи
    prompt: |
      По дороге домой найдите что-то, что напомнит вам о произведении искусства или его части —
      форму или цвет, возможно, слово, даже ощущение.
    follow_ups:
      - Что вы нашли?
      - Как эхо изменило ваше восприятие оригинала?
      - Что бы вы показали художнику, если бы могли?
  - id: dinner_party
    name: Ужин
    prompt: |
      Сопоставьте произведение искусства со вкусом. Какую еду или напиток оно вам напоминает?
      Соберите банкет.
    follow_ups:
      - Как бы выглядело меню?
      - Кто бы где сидел?
      - Каким был бы вкус первого укуса?
  - id: head_off_piste
    name: Свернуть с проторенной дорожки
    prompt: |
      Попросите сотрудника галереи указать на его любимую работу или сверните с маршрута и посмотрите,
      что вы сможете найти.
    follow_ups:
      - Что вы обнаружили вне обычного маршрута?
      - Чем его фаворит отличается от вашего?
      - Что бы вы посоветовали кому-то еще?
  - id: make_it_anew
    name: Сделать заново
    prompt: |
      Дома воссоздайте произведение искусства, используя только то, что есть под рукой.
      Запишите, нарисуйте, постройте из спичек. Чем проще метод, тем лучше. Посмотрите, что остается
      в вашей памяти, что вы замечаете в своем исполнении.
    follow_ups:
      - Что вы вспомнили без усилий?
      - Что ваша версия упустила — и почему это важно?
      - Что бы вы добавили, если бы у вас была еще одна минута?
  - id: origin_story
    name: История происхождения
    prompt: |
      Вы помните первое произведение искусства, которое когда-либо видели? Где вы были? Сколько вам было лет?
      Постарайтесь вспомнить комнату, в которой вы были, свет и звуки, ощущение от просмотра.
      Есть ли что-то, что вы можете связать с произведением искусства, которое вы видите сейчас?
    follow_ups:
      - Что осталось неизменным в вашем способе смотреть на искусство?
      - Что бы подумал тот юный вы о работе?
      - Какая нить протянулась от прошлого к настоящему?
  - id: words_and_images
    name: Слова и образы
    prompt: |
      Не глядя на произведение искусства, прочитайте описание, закройте глаза и попробуйте его представить.
      Затем откройте их. Соответствует ли это вашему видению?
    follow_ups:
      - Что упустили слова?
      - Что вы добавили, чего там не было?
      - Как ваш мысленный образ меняет ваше восприятие реального?
  - id: keep_a_notebook
    name: Вести блокнот
    prompt: |
      Записывайте даты, произведения искусства и свои реакции на них. Просматривайте свои записи
      и ищите новые произведения искусства.
    follow_ups:
      - Какой закономерности вы обнаружили, читая свои записи?
      - Что бы вы сказали своему прошлому «я»?
      - Куда вас дальше ведет блокнот?
  - id: write_a_postcard
    name: Написать открытку
    prompt: |
      Напишите открытку произведению искусства, с которым вы особенно связаны. Что бы вы сказали?
      Как бы оно могло ответить?
    follow_ups:
      - Что бы вам нужно было сказать, чего вы не могли сказать вслух?
      - Как бы выглядел его почерк?
      - Что бы вы сохранили — а что никогда бы не отправили?
  - id: here_today_gone
    name: Здесь сегодня, ушло...?
    prompt: |
      Не каждое произведение искусства выдерживает испытание временем, и не в этом цель каждого художника.
      Хэппенинг или перформанс может существовать один вечер, возможно, минуты или всего секунды!
      Возможно, вы смотрите на документацию мимолетного, временного произведения искусства. Как долго оно продержится?
    follow_ups:
      - Что будет утеряно, если оно исчезнет завтра?
      - Что сохраняется в памяти, фотографии или рассказе?
      - Меняет ли его эфемерность ваш взгляд на него?
  - id: wrap_it_up
    name: Завернуть
    prompt: |
      Что, если бы вы могли завернуть произведение искусства? Смогли бы вы все равно определить, что это?
      Могло бы другое произведение искусства поместиться в ту же упаковку?
    follow_ups:
      - Какую форму приняла бы упаковка?
      - Как бы выглядела оберточная бумага?
      - Что является существенным — а что можно заменить?
  - id: trace_a_path
    name: Проследить путь
    prompt: |
      На что вы смотрите, когда сталкиваетесь с произведением искусства? Куда дальше движется ваш взгляд?
      Где ваш взгляд останавливается? Нанесите точки и соедините их.
    follow_ups:
      - Куда вы постоянно возвращаетесь?
      - Что вы пропустили — и почему?
      - Как ваш путь отличается от пути другого человека?
  - id: superficial
    name: Поверхностный
    prompt: |
      Какая у него поверхность? Поглощает ли она свет или отражает? Гладкая ли она или перфорированная?
      Она слоистая, изысканная или грубая? Не бойтесь быть поверхностным!
    follow_ups:
      - Каково было бы прикоснуться?
      - Что раскрывает — или скрывает — поверхность?
      - Что происходит, когда вы остаетесь на поверхности?
  - id: studio_visit
    name: Посещение мастерской
    prompt: |
      Студий у художников столько же, сколько и самих художников. Представьте пространство, где было создано произведение искусства:
      склад в Бруклине, ателье в Париже, кухонный стол в занятом семейном доме — или, возможно, где-то совсем неожиданном.
    follow_ups:
      - Что бы вы услышали в этом пространстве?
      - В какое время суток оно было создано?
      - Как воображаемое место меняет ваш взгляд на работу?
  - id: switch_channels
    name: Переключить каналы
    prompt: |
      Смотрите на людей, а не на искусство. Как они себя ведут по отношению к работе?
      На что они смотрят? Можете ли вы угадать, что они чувствуют?
    follow_ups:
      - Кто задерживается — а кто проходит мимо?
      - Что бы они сказали, если бы вы спросили?
      - Как наблюдение за другими меняет то, что вы замечаете?
  - id: light
    name: Свет
    prompt: |
      Ищите источник света. Откуда он исходит? Что находится в тени? Сосредоточьтесь на том, что художник хочет, чтобы мы видели, и на том, что скрыто в тенях.
    follow_ups:
      - Что раскрывает свет?
      - Что могут скрывать тени?
      - Как работа изменилась бы при другом освещении?
  - id: introductions
    name: Знакомство
    prompt: |
      Представьте произведение искусства другу, как если бы это был знакомый на вечеринке.
      Как бы вы его описали так, чтобы это привлекло их интерес? Что привлекает ваш интерес?
    follow_ups:
      - На чем бы вы сделали акцент в первую очередь?
      - Что бы вы упустили?
      - Какой крючок заставил бы их захотеть встретиться с ним?
  - id: tipping_point
    name: Точка перелома
    prompt: |
      Где находится центр произведения искусства? Оно неуравновешенно? Ищите точку перелома.
    follow_ups:
      - Что бы его опрокинуло?
      - Что удерживает его на месте?
      - Как дисбаланс создает напряжение — или облегчение?
  - id: homing
    name: Возвращение домой
    prompt: |
      Продолжайте возвращаться. Возвращайтесь к любимому произведению искусства в разные дни или в разное время суток —
      утром зимой, вечером летом. Ведите запись своих чувств; ваши чувства меняются при каждом посещении.
    follow_ups:
      - Что осталось неизменным на протяжении визитов?
      - Когда оно вас больше всего удивило?
      - Что бы вы рассказали своему прошлому «я» о нем?
  - id: one_and_only
    name: Единственное и неповторимое
    prompt: |
      Чтобы избежать перегрузки, выберите всего одно произведение искусства для просмотра, или максимум — несколько.
      Погрузитесь глубоко и проведите с каждым как можно больше времени. Сколько из этих карт вы можете использовать перед одним произведением искусства?
    follow_ups:
      - Что вы заметили при втором осмотре?
      - Какие карты открыли что-то новое?
      - Когда вы поняли, что пора двигаться дальше?
  - id: press_pause
    name: Нажать паузу
    prompt: |
      Замедлитесь. Начните смотреть, закрыв глаза, расслабьтесь и сосредоточьтесь на дыхании, медленно откройте глаза, перефокусируйтесь и дайте произведению искусства развернуться перед вами.
    follow_ups:
      - Что появилось, когда вы замедлились?
      - Что вы заметили первым, когда открыли глаза?
      - Как ваше дыхание меняет ваше восприятие?
  - id: material
    name: Материал
    prompt: |
      Из чего сделано произведение искусства? Что, если бы оно было сделано из чего-то другого?
      Чем более несопоставимо, тем лучше. Изменило бы это ваше отношение к нему?
    follow_ups:
      - Какая замена была бы самой неожиданной?
      - Что добавляет материал к смыслу?
      - Что бы пережило замену — а что было бы утеряно?
  - id: patch_of_sky
    name: Сколько цветов в клочке неба?
    prompt: |
      Увеличьте область произведения искусства. Сколько цветов вы там видите?
      За пределами музея посмотрите вверх и попробуйте сосчитать как можно больше цветов в клочке неба.
    follow_ups:
      - Что вы упустили, когда смотрели на целое?
      - Как небо сравнивается с произведением искусства?
      - Какой цвет вас больше всего удивил?
  - id: greening
    name: Озеленение
    prompt: |
      Каким растением было бы произведение искусства? Было бы оно как персиковое дерево в середине лета,
      отягощенное плодами, или скорее как нежный папоротник? Какие условия ему нужны для роста?
    follow_ups:
      - Где бы оно процветало — а где увядало?
      - Что бы ему понадобилось, чтобы расцвести?
      - Как ботафорическая метафора меняет ваш взгляд на него?
