# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Kannada)

domains:
  art:
    name: ಕಲೆ
    description: |
      ಕಲೆಯನ್ನು ನೋಡುವಾಗ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಾಯಿಸಲು ಕಾರ್ಡ್‌ಗಳು. ಪ್ರತಿಯೊಂದೂ ವಿಭಿನ್ನ
      ಒಂದು ಲೆನ್ಸ್ ಅನ್ನು ನೀಡುತ್ತದೆ - ಬೆಳಕು ಮತ್ತು ನೆರಳುಗಳಿಂದ ಪರಿಚಯಗಳು ಮತ್ತು ಭಾವನೆಗಳವರೆಗೆ - ನೀವು
      ಕಲಾಕೃತಿಗಳನ್ನು ಹೇಗೆ ನೋಡುತ್ತೀರಿ ಮತ್ತು ತೊಡಗಿಸಿಕೊಳ್ಳುತ್ತೀರಿ ಎಂಬುದನ್ನು ಆಳವಾಗಿಸಲು.
  urban_jungle:
    name: ನಗರ ಕಾಡು
    description: |
      ಒಂದು ನಗರದ ಮೂಲಕ ಕೇವಲ ನಡೆಯುವ ಬದಲು, ನೀವು ಅದನ್ನು ಒಂದು ಜೀವಂತ ವಸ್ತುವಿನಂತೆ ನೋಡುತ್ತೀರಿ.
      ಕಾರ್ಡ್‌ಗಳು ಹಳೆಯ ಕಟ್ಟಡಗಳ ಗಾಯಗಳು, ಸಂಚಾರದ ನೃತ್ಯ,
      ಮತ್ತು ಅಲ್ಲೆಗಳ ರಹಸ್ಯ ಜೀವನದ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತವೆ.
  culinary_lab:
    name: ಪಾಕಶಾಸ್ತ್ರ ಪ್ರಯೋಗಾಲಯ
    description: |
      ರುಚಿಕರದಿಂದ ಪರಿವರ್ತನೆಗೆ ಬದಲಾಗುತ್ತಿದೆ. ಒಂದು ತುತ್ತಿನ ರಸಾಯನಶಾಸ್ತ್ರ,
      ಒಂದು ವಸ್ತುವಿನ ಇತಿಹಾಸ, ಮತ್ತು ಒಂದು ರೆಸ್ಟೋರೆಂಟ್‌ನ ಹಿನ್ನೆಲೆ ಸಂಗೀತವನ್ನು ಅನ್ವೇಷಿಸಿ.
  natural_microcosm:
    name: ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮ ವಿಶ್ವ
    description: |
      ಉದ್ಯಾನವನ ಅಥವಾ ಹಿತ್ತಲಿನ ಮನೆಗೆ ಸೂಕ್ತವಾಗಿದೆ. ಈ ಲೆನ್ಸ್ ಕಾಣದ
      ಎಲೆಯ ರಚನೆ, ಕಲ್ಲಿನ ನಿಧಾನಗತಿಯ ಜೀವನ, ಅಥವಾ ಕೀಟಗಳ ಪ್ರಾದೇಶಿಕ
      ನಾಟಕಗಳ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತದೆ.
  human_interface:
    name: ಮಾನವ ಸಂವಹನ
    description: |
      ಮನುಷ್ಯರು ಭೇಟಿಯಾಗುವ ದಿನನಿತ್ಯದ ಸ್ಥಳಗಳು — ಕಾಫಿ ಅಂಗಡಿಗಳು, ಸಾರಿಗೆ ಕೇಂದ್ರಗಳು,
      ಕೆಲಸದ ಸ್ಥಳಗಳು, ಚಿಲ್ಲರೆ ವ್ಯಾಪಾರ, ಸಾರ್ವಜನಿಕ ಉದ್ಯಾನವನಗಳು. ಕಾರ್ಡ್‌ಗಳು ಸರದಿಯ ನೃತ್ಯ,
      ಪ್ರಾದೇಶಿಕ ಹಕ್ಕುಗಳು, ಅಗೋಚರ ಲಿಪಿಗಳು, ಮತ್ತು ಹಂಚಿಕೆಯ ಸ್ಥಳದ ಮಾನವಶಾಸ್ತ್ರದ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತವೆ.
  california_superbloom:
    name: ಕ್ಯಾಲಿಫೋರ್ನಿಯಾ ಸೂಪರ್‌ಬ್ಲೂಮ್
    description: |
      ಚಳಿಗಾಲದ ಮಳೆಯ ನಂತರ ಕಾಡು ಹೂವುಗಳ ಕ್ಷಣಿಕ ಸ್ಫೋಟ. ಕಾರ್ಡ್‌ಗಳು ಬಣ್ಣ,
      ಪ್ರಮಾಣ, ಪರಾಗಸ್ಪರ್ಶಕಗಳು, ಭೂವಿಜ್ಞಾನ, ಹವಾಮಾನ, ಮತ್ತು ಹೂವಿನ ಕ್ಷಣಿಕ ನೋಟದ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತವೆ.
