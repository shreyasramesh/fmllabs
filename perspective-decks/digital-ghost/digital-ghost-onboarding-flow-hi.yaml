# डिजिटल घोस्ट — ऑनबोर्डिंग और फ्लो (Hindi)

id: digital_ghost_onboarding_flow
name: डिजिटल घोस्ट — ऑनबोर्डिंग और फ्लो
description: 50 कार्ड जो ऑनबोर्डिंग को देखने के आपके तरीके को बदल देंगे — पहला अनुभव, खाली स्थितियाँ, पहली छाप, और परिचय का तालमेल।
domain: digital_ghost
cards:
  - id: dg_of_01
    name: पहला रन
    prompt: |
      पहला रन। आपने अभी-अभी इंस्टॉल किया है। ऐप नया है, कॉन्फ़िगर नहीं किया गया है।
      इंटरफ़ेस के पास एक छाप बनाने का एक ही मौका है। उस क्षण को नोटिस करें।
      पहला रन आपके बारे में क्या मानता है? वह क्या चाहता है?
    follow_ups:
      - पहला रन रिश्ते को कैसे आकार देता है?
      - ऑनबोर्डिंग के बिना ऐप क्या होगा?
      - पहले और स्थायी के बीच क्या संबंध है?
  - id: dg_of_02
    name: खाली स्थिति
    prompt: |
      अभी तक कोई डेटा नहीं। सूची खाली है। स्क्रीन एक प्लेसहोल्डर दिखाती है — एक
      चित्र, एक संदेश, एक कॉल टू एक्शन। खाली स्थिति एक
      निमंत्रण है। यह क्या आमंत्रित करता है? यह क्या मानता है कि आप करेंगे?
    follow_ups:
      - खाली स्थिति पहले कार्य को कैसे आकार देती है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - खाली और संभव के बीच क्या संबंध है?
  - id: dg_of_03
    name: स्वागत स्क्रीन
    prompt: |
      "स्वागत है।" शब्द आगमन, समावेशन का अर्थ है। लेकिन स्वागत स्क्रीन
      अक्सर अवरोधक होती हैं — प्रवेश करने के लिए आपको क्लिक करना होगा। स्वागत भी एक
      द्वार है। स्वागत स्क्रीन देहलीज़ के साथ क्या करती है?
    follow_ups:
      - स्वागत पहली छाप को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - स्वागत और बाधा के बीच क्या संबंध है?
  - id: dg_of_04
    name: ट्यूटोरियल
    prompt: |
      पहला कदम। दूसरा कदम। ट्यूटोरियल मार्गदर्शन करता है — हाइलाइट्स, तीर, टूलटिप्स।
      यह मानता है कि आपको सिखाने की आवश्यकता है। यह एक सही तरीके को मानता है। ट्यूटोरियल
      आपके पूर्व ज्ञान के बारे में क्या मानता है?
    follow_ups:
      - ट्यूटोरियल सीखने के मार्ग को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - ट्यूटोरियल और एजेंसी के बीच क्या संबंध है?
  - id: dg_of_05
    name: छोड़ें बटन
    prompt: |
      "छोड़ें।" ट्यूटोरियल एक निकास प्रदान करता है। हर कोई सिखाया जाना नहीं चाहता।
      छोड़ें बटन अधीर, विशेषज्ञ के प्रति एक रियायत है। छोड़ना
      ऐप का उपयोग करने वाले लोगों के बारे में क्या मानता है?
    follow_ups:
      - छोड़ें ऑनबोर्डिंग फ्लो को कैसे आकार देता है?
      - इसके बिना ट्यूटोरियल क्या होगा?
      - छोड़ें और सम्मान के बीच क्या संबंध है?
  - id: dg_of_06
    name: प्रगति डॉट्स
    prompt: |
      तीन डॉट्स। आप दूसरे चरण पर हैं। डॉट्स दिखाते हैं कि कितना बचा है।
      प्रगति संकेतक अपेक्षा को आकार देता है — लगभग हो गया, या बस शुरू हुआ।
      प्रगति आपकी सहनशीलता के बारे में क्या मानती है?
    follow_ups:
      - डॉट्स अनुभव को कैसे आकार देते हैं?
      - उनके बिना फ्लो क्या होगा?
      - प्रगति और धैर्य के बीच क्या संबंध है?
  - id: dg_of_07
    name: अनुमति अनुरोध
    prompt: |
      "संपर्कों तक पहुंच की अनुमति दें?" "सूचनाएं सक्षम करें?" पहला रन अक्सर
      अनुमति मांगता है। समय रणनीतिक है — जल्दी पूछें, जब विश्वास बन रहा हो।
      अनुमति अनुरोध रिश्ते के बारे में क्या मानता है?
    follow_ups:
      - समय जवाब को कैसे आकार देता है?
      - विलंबित अनुरोधों के साथ ऐप क्या होगा?
      - अनुमति और विश्वास के बीच क्या संबंध है?
  - id: dg_of_08
    name: खाता निर्माण
    prompt: |
      साइन अप करें। खाता बनाएँ। पहला रन पहचान की आवश्यकता हो सकती है — ईमेल,
      पासवर्ड, नाम। खाता एक प्रतिबद्धता है। खाता
      निर्माण देहलीज़ के साथ क्या करता है? निवेश की भावना के साथ?
    follow_ups:
      - खाता निर्माण रिश्ते को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - खाता और प्रतिबद्धता के बीच क्या संबंध है?
  - id: dg_of_09
    name: वैयक्तिकरण
    prompt: |
      "आप किसमें रुचि रखते हैं?" "अपने विषय चुनें।" ऑनबोर्डिंग
      वरीयताएं पूछता है। यह एक प्रोफ़ाइल बना रहा है। वैयक्तिकरण
      भी डेटा संग्रह है। प्रश्न क्या मानता है? यह क्या एकत्र करता है?
    follow_ups:
      - वैयक्तिकरण अनुभव को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - वरीयता और प्रोफ़ाइल के बीच क्या संबंध है?
  - id: dg_of_10
    name: पहली छाप
    prompt: |
      पहली छापें टिकती हैं। पहली स्क्रीन, पहला इंटरैक्शन — वे
      टोन सेट करते हैं। डिजाइनर यह जानते हैं। पहली छाप
      उत्पाद के बारे में क्या एनकोड करती है? उस रिश्ते के बारे में जो वह चाहता है?
    follow_ups:
      - पहली छाप स्थायी छाप को कैसे आकार देती है?
      - एक अलग शुरुआत के साथ ऐप क्या होगा?
      - पहले और स्थायी के बीच क्या संबंध है?
  - id: dg_of_11
    name: खाली डैशबोर्ड
    prompt: |
      बिना डेटा वाला डैशबोर्ड। खाली चार्ट, खाली विजेट। संरचना
      वहाँ है, इंतज़ार कर रहा है। खाली डैशबोर्ड एक वादा है — इसे भरें, और यह
      काम करेगा। खाली डैशबोर्ड आपके भविष्य के उपयोग के बारे में क्या मानता है?
    follow_ups:
      - खाली डैशबोर्ड पहले कार्यों को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - संरचना और सामग्री के बीच क्या संबंध है?
  - id: dg_of_12
    name: नमूना डेटा
    prompt: |
      कुछ ऐप पहले से पॉप्युलेट होते हैं — नमूना प्रोजेक्ट, डेमो सामग्री। आप देखते हैं कि
      यह कैसा दिख सकता है। नमूना उदाहरण और प्लेसहोल्डर दोनों है। नमूना
      आपकी कल्पना करने की क्षमता के बारे में क्या मानता है?
    follow_ups:
      - नमूना अनुभव को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - नमूना और टेम्पलेट के बीच क्या संबंध है?
  - id: dg_of_13
    name: ऑनबोर्डिंग चेकलिस्ट
    prompt: |
      "अपनी प्रोफ़ाइल पूरी करें।" "अपना पहला प्रोजेक्ट जोड़ें।" चेकलिस्ट
      मार्गदर्शन करती है — पूर्ण करने के लिए कार्य, जांचने के लिए बॉक्स। चेकलिस्ट
      प्रगति की भावना पैदा करती है। चेकलिस्ट प्रेरणा के बारे में क्या मानती है?
    follow_ups:
      - चेकलिस्ट फ्लो को कैसे आकार देती है?
      - इसके बिना ऐप क्या होगा?
      - चेकलिस्ट और पूर्णता के बीच क्या संबंध है?
  - id: dg_of_14
    name: टूलटिप
    prompt: |
      एक छोटा पॉपओवर। "शुरू करने के लिए यहां क्लिक करें।" टूलटिप एक बार दिखाई देता है,
      फिर कभी नहीं। यह मार्गदर्शन का एक क्षण है। टूलटिप
      ध्यान के बारे में क्या मानता है? स्मृति के बारे में?
    follow_ups:
      - टूलटिप पहले इंटरैक्शन को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - टूलटिप और शिक्षण के बीच क्या संबंध है?
  - id: dg_of_15
    name: निर्देशित टूर
    prompt: |
      एक स्पॉटलाइट एक फ़ीचर को हाइलाइट करता है। "यह वह जगह है जहाँ आप..." निर्देशित
      टूर आपको इसमें ले जाता है। यह एक प्रदर्शन है — इंटरफ़ेस स्वयं का परिचय देता है।
      टूर आपके परिचय की आवश्यकता के बारे में क्या मानता है?
    follow_ups:
      - टूर रिश्ते को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - टूर और खोज के बीच क्या संबंध है?
  - id: dg_of_16
    name: डिफ़ॉल्ट स्थिति
    prompt: |
      आपके अनुकूलित करने से पहले, डिफ़ॉल्ट होते हैं — सेटिंग्स, लेआउट, थीम।
      डिफ़ॉल्ट किसी की पसंद होते हैं। वे अनुभव को आपके अनुकूलित करने से पहले आकार देते हैं।
      डिफ़ॉल्ट आपके बारे में क्या मानते हैं?
    follow_ups:
      - डिफ़ॉल्ट पहले अनुभव को कैसे आकार देते हैं?
      - अलग डिफ़ॉल्ट के साथ ऐप क्या होगा?
      - डिफ़ॉल्ट और नॉर्म के बीच क्या संबंध है?
  - id: dg_of_17
    name: पहला कार्य
    prompt: |
      इंटरफ़ेस चाहता है कि आप सबसे पहले क्या करें? एक संपर्क जोड़ें?
      एक प्रोजेक्ट बनाएँ? पहला कार्य एक धकेलना है। यह पथ निर्धारित करता है। पहला कार्य
      उत्पाद की प्राथमिकताओं के बारे में क्या प्रकट करता है?
    follow_ups:
      - पहला कार्य फ्लो को कैसे आकार देता है?
      - एक अलग धकेलने के साथ ऐप क्या होगा?
      - पहला कार्य और आदत के बीच क्या संबंध है?
  - id: dg_of_18
    name: खाली खोज
    prompt: |
      आप खोजते हैं। कोई परिणाम नहीं। खाली खोज एक प्रकार की खाली स्थिति है —
      इंटरफ़ेस के पास दिखाने के लिए कुछ भी नहीं है। खाली खोज क्या कहती है?
      "फिर से प्रयास करें"? "कुछ जोड़ें"? यह क्या आमंत्रित करता है?
    follow_ups:
      - खाली खोज अनुभव को कैसे आकार देती है?
      - संदेश के बिना इंटरफ़ेस क्या होगा?
      - खाली और संभव के बीच क्या संबंध है?
  - id: dg_of_19
    name: ऑनबोर्डिंग की लंबाई
    prompt: |
      ऑनबोर्डिंग कितनी देर तक चलती है? तीन स्क्रीन? दस? लंबाई एक जुआ है —
      आपकी धैर्य पर, उत्पाद के मूल्य पर। लंबाई
      रिश्ते के बारे में क्या मानती है?
    follow_ups:
      - लंबाई अनुभव को कैसे आकार देती है?
      - अलग लंबाई के साथ ऐप क्या होगा?
      - लंबाई और प्रतिबद्धता के बीच क्या संबंध है?
  - id: dg_of_20
    name: मूल्य प्रस्ताव
    prompt: |
      "अधिक काम करें।" "कनेक्टेड रहें।" ऑनबोर्डिंग मूल्य बताती है।
      यह बेच रहा है — भले ही उत्पाद मुफ्त हो। मूल्य
      प्रस्ताव आपकी जरूरतों के बारे में क्या मानता है?
    follow_ups:
      - मूल्य प्रस्ताव पहली छाप को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - मूल्य और वादा के बीच क्या संबंध है?
  - id: dg_of_21
    name: सामाजिक प्रमाण
    prompt: |
      "10 मिलियन उपयोगकर्ताओं से जुड़ें।" "शीर्ष कंपनियों द्वारा विश्वसनीय।" ऑनबोर्डिंग
      में सामाजिक प्रमाण शामिल हो सकता है। यह आत्मविश्वास बढ़ा रहा है। सामाजिक प्रमाण
      आपके सत्यापन की आवश्यकता के बारे में क्या मानता है?
    follow_ups:
      - सामाजिक प्रमाण अनुभव को कैसे आकार देता है?
      - इसके बिना ऐप क्या होगा?
      - प्रमाण और विश्वास के बीच क्या संबंध है?
  - id: dg_of_22
    name: खाली इनबॉक्स
    prompt: |
      शून्य संदेश। इनबॉक्स खाली है — साफ, अव्यवस्थित। खाली इनबॉक्स
      कुछ के लिए एक उपलब्धि है, दूसरों के लिए एक शून्य। खाली इनबॉक्स
      का क्या मतलब है? इंटरफ़ेस इसके बारे में क्या कहता है?
    follow_ups:
      - खाली इनबॉक्स अनुभव को कैसे आकार देता है?
      - अलग फ्रेमिंग के साथ इंटरफ़ेस क्या होगा?
      - खाली और उपलब्धि के बीच क्या संबंध है?
  - id: dg_of_23
    name: फीचर खोज
    prompt: |
