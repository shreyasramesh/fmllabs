# डिजिटल घोस्ट — डेटा और स्टोरेज (Hindi)

id: digital_ghost_data_storage
name: डिजिटल घोस्ट — डेटा और स्टोरेज
description: 50 कार्ड्स जो डेटा स्टोरेज को देखने के आपके तरीके को बदल देंगे—डेटा कहाँ रहता है, डेटा की भौतिकता, उसका वज़न, और डिजिटल के छिपे हुए भूगोल को।
domain: digital_ghost
cards:
  - id: dg_ds_01
    name: डेटा कहाँ रहता है
    prompt: |
      आपकी तस्वीरें, आपके संदेश—वे कहाँ हैं? एक सर्वर। एक डेटा सेंटर।
      कहीं एक इमारत, जिसमें कूलिंग और बिजली हो। डेटा का एक भौतिक
      पता होता है। एक फ़ाइल का पता लगाएं। यह वास्तव में कहाँ रहती है?
    follow_ups:
      - स्थान हमारे डेटा के साथ संबंध को कैसे आकार देता है?
      - अगर हम जा सकते तो क्या बदल जाता?
      - वर्चुअल और फिजिकल के बीच क्या संबंध है?
  - id: dg_ds_02
    name: डेटा का वज़न
    prompt: |
      डेटा का वज़न होता है—इलेक्ट्रॉन, चुंबकीय डोमेन, फोटॉन। ज़्यादा नहीं। लेकिन
      इंफ्रास्ट्रक्चर का वज़न होता है—सर्वर, केबल, कूलिंग। आपका "क्लाउड"
      टन धातु है। वज़न महसूस करें। भौतिकता क्या जोड़ती है?
    follow_ups:
      - वज़न हमारी समझ को कैसे आकार देता है?
      - भौतिकता के बिना हम क्या खो देंगे?
      - प्रकाश और भारी के बीच क्या संबंध है?
  - id: dg_ds_03
    name: कॉपी
    prompt: |
      डिजिटल डेटा पूरी तरह से कॉपी होता है। आपकी फ़ाइल कई जगहों पर मौजूद है—कैश,
      बैकअप, सिंक। कोई मूल नहीं है। या हर जगह मूल है। "आपके" डेटा की भावना को
      अनंत कॉपी क्या करती है?
    follow_ups:
      - कॉपी स्वामित्व को कैसे आकार देती है?
      - कॉपी के बिना डेटा क्या होगा?
      - कॉपी और मूल के बीच क्या संबंध है?
  - id: dg_ds_04
    name: क्लाउड रूपक
    prompt: |
      "क्लाउड।" रूपक हवा, हल्कापन, हर जगह और कहीं नहीं का सुझाव देता है।
      लेकिन क्लाउड ठोस है—इमारतें, केबल, बिजली।
      रूपक क्या छिपाता है? यह क्या सक्षम करता है?
    follow_ups:
      - रूपक समझ को कैसे आकार देता है?
      - रूपक के बिना हम इसे क्या कहेंगे?
      - क्लाउड और ज़मीन के बीच क्या संबंध है?
  - id: dg_ds_05
    name: लोकल बनाम रिमोट
    prompt: |
      कुछ डेटा लोकल है—आपके डिवाइस पर। कुछ रिमोट है—एक सर्वर पर।
      इंटरफ़ेस अक्सर अंतर को छिपाता है। आप दोनों तरह से एक ही फ़ाइल देखते हैं।
      यह धुंधलापन अधिकार की भावना को क्या करता है?
    follow_ups:
      - स्थान अनुभव को कैसे आकार देता है?
      - स्पष्ट सीमाओं के साथ इंटरफ़ेस क्या होगा?
      - लोकल और स्वामित्व के बीच क्या संबंध है?
  - id: dg_ds_06
    name: कैश
    prompt: |
      कैश एक कॉपी है जो गति के लिए—नज़दीक रखी जाती है। आपका ब्राउज़र कैश करता है। आपका ऐप
      कैश करता है। कैश रिमोट की छाया है। यह पुराना हो सकता है। यह ऑफ़लाइन होने पर आपके पास
      सब कुछ हो सकता है। कैश पहुंच के बारे में क्या मानता है?
    follow_ups:
      - कैशिंग डेटा के अनुभव को कैसे आकार देता है?
      - कैश के बिना इंटरफ़ेस क्या होगा?
      - कैश और सच्चाई के बीच क्या संबंध है?
  - id: dg_ds_07
    name: स्टोरेज फुल
    prompt: |
      "स्टोरेज फुल।" सीमा तक पहुँच गया। और जगह नहीं। संदेश
      कमी का संकेत देता है—जैसे एक फिजिकल दराज। लेकिन स्टोरेज खरीदा जा सकता है।
      कमी आर्थिक है। "फुल" का वास्तव में क्या मतलब है?
    follow_ups:
      - फुल संदेश अनुभव को कैसे आकार देता है?
      - सीमाओं के बिना इंटरफ़ेस क्या होगा?
      - फुल और कमी के बीच क्या संबंध है?
  - id: dg_ds_08
    name: बैकअप
    prompt: |
      बैकअप एक बीमा है—कहीं और एक कॉपी, जब चीजें विफल हो जाती हैं। लेकिन बैकअप
      एक जोखिम भी है। आपका डेटा अधिक स्थानों पर मौजूद है। अधिक प्रतियाँ, अधिक जोखिम।
      बैकअप विफलता के बारे में क्या मानता है? सुरक्षा के बारे में?
    follow_ups:
      - बैकअप डेटा के साथ संबंध को कैसे आकार देता है?
      - बैकअप के बिना हम क्या खो देंगे?
      - बैकअप और जोखिम के बीच क्या संबंध है?
  - id: dg_ds_09
    name: सिंक
    prompt: |
      सिंक प्रतियाँ संरेखित रखता है—एक को बदलें, सबको बदलें। लेकिन सिंक विफल हो सकता है।
      टकराव उत्पन्न होते हैं। कौन सा संस्करण सच है? सिंक एकता का संकेत देता है।
      वास्तविकता बातचीत है। सिंक क्या छिपाता है?
    follow_ups:
      - सिंक "एक" फ़ाइल की भावना को कैसे आकार देता है?
      - सिंक के बिना इंटरफ़ेस क्या होगा?
      - सिंक और सच्चाई के बीच क्या संबंध है?
  - id: dg_ds_10
    name: डिलीट
    prompt: |
      हटाएँ। मिटाएँ। निकालें। शब्द का अर्थ है चला गया। लेकिन डिलीट किया गया डेटा अक्सर
      बना रहता है—बैकअप में, लॉग में, "ट्रैश" में। डिलीट का मतलब "छिपाना" हो सकता है।
      डिलीट वास्तव में क्या करता है?
    follow_ups:
      - डिलीट डेटा के साथ हमारे संबंध को कैसे आकार देता है?
      - वास्तविक मिटाने के साथ इंटरफ़ेस क्या होगा?
      - डिलीट और चला गया के बीच क्या संबंध है?
  - id: dg_ds_11
    name: डेटा सेंटर
    prompt: |
      डेटा सेंटर फ़ैक्ट्री हैं—सर्वर की पंक्तियाँ, गूंजती हुई, ठंडी। वे
      बिजली, पानी, ज़मीन का उपभोग करते हैं। आपका डेटा उस उपभोग में योगदान देता है।
      डेटा सेंटर क्लाउड की लागत के बारे में क्या बताता है?
    follow_ups:
      - डेटा सेंटर समझ को कैसे आकार देता है?
      - अगर हम जाते तो क्या देखते?
      - डेटा और उपभोग के बीच क्या संबंध है?
  - id: dg_ds_12
    name: फ़ोल्डर
    prompt: |
      फ़ोल्डर। डायरेक्टरी। रूपक फिजिकल है—एक फ़ाइलिंग कैबिनेट, एक
      दराज। लेकिन डिजिटल फ़ोल्डर में कई जगहों पर एक ही फ़ाइल हो सकती है।
      वे कंटेनर नहीं, लिंक हैं। फ़ोल्डर रूपक क्या छिपाता है?
    follow_ups:
      - फ़ोल्डर हमारे मानसिक मॉडल को कैसे आकार देता है?
      - फ़ोल्डर के बिना इंटरफ़ेस क्या होगा?
      - रूपक और संरचना के बीच क्या संबंध है?
  - id: dg_ds_13
    name: फ़ाइल
    prompt: |
      एक फ़ाइल। एक दस्तावेज़। रूपक एक फिजिकल ऑब्जेक्ट का सुझाव देता है—कुछ
      जिसे आप पकड़ सकते हैं। लेकिन एक फ़ाइल बिट्स है। इसका कोई सार नहीं है।
      फ़ाइल रूपक क्या सक्षम करता है? यह क्या अस्पष्ट करता है?
    follow_ups:
      - फ़ाइल डेटा के साथ हमारे संबंध को कैसे आकार देती है?
      - रूपक के बिना हम इसे क्या कहेंगे?
      - फ़ाइल और वस्तु के बीच क्या संबंध है?
  - id: dg_ds_14
    name: अपलोड
    prompt: |
      अपलोड। शब्द ऊपर उठने का सुझाव देता है—आप डेटा ऊपर भेजते हैं। कहाँ?
      क्लाउड पर। सर्वर पर। अपलोड स्थान और नियंत्रण का स्थानांतरण है।
      अपलोड वास्तव में आपके डेटा के साथ आपके संबंध को क्या करता है?
    follow_ups:
      - अपलोड अधिकार की भावना को कैसे आकार देता है?
      - शब्द के बिना इंटरफ़ेस क्या होगा?
      - अपलोड और देने के बीच क्या संबंध है?
  - id: dg_ds_15
    name: डाउनलोड
    prompt: |
      डाउनलोड। शब्द नीचे लाने का सुझाव देता है—आप डेटा प्राप्त करते हैं। लेकिन
      डाउनलोड का मतलब अक्सर कॉपी होता है। मूल बना रहता है। आपके पास एक डुप्लिकेट है।
      डाउनलोड स्वामित्व के लिए वास्तव में क्या मतलब है?
    follow_ups:
      - डाउनलोड अधिकार की भावना को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - डाउनलोड और प्राप्त करने के बीच क्या संबंध है?
  - id: dg_ds_16
    name: डेटाबेस
    prompt: |
      आपका डेटा डेटाबेस में रह सकता है—संरचित, क्वेरी किया गया, संबंधपरक।
      आप डेटाबेस कभी नहीं देखते। आप इंटरफ़ेस देखते हैं। डेटाबेस
      छिपा हुआ आर्किटेक्चर है। डेटाबेस आपके अनुभव के बारे में क्या निर्धारित करता है?
    follow_ups:
      - डेटाबेस क्या संभव है इसे कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - संरचना और अनुभव के बीच क्या संबंध है?
  - id: dg_ds_17
    name: कुकी
    prompt: |
      कुकीज़ छोटा डेटा होती हैं—आपके डिवाइस पर संग्रहीत, सर्वर पर वापस भेजी जाती हैं।
      वे याद रखती हैं। वे ट्रैक करती हैं। कुकी एक छोटा अनुबंध है। कुकी
      सहमति के बारे में क्या मानती है? याददाश्त के बारे में?
    follow_ups:
      - कुकी संबंध को कैसे आकार देती है?
      - कुकीज़ के बिना वेब क्या होगा?
      - कुकी और याददाश्त के बीच क्या संबंध है?
  - id: dg_ds_18
    name: इंडेक्स
    prompt: |
      डेटा को इंडेक्स किया जाता है—खोज के लिए कैटलॉग किया जाता है। इंडेक्स एक नक्शा है, क्षेत्र नहीं।
      यह निर्धारित करता है कि आप क्या ढूंढ सकते हैं। इंडेक्स किसने बनाया?
      उन्होंने क्या प्राथमिकता दी?
    follow_ups:
      - इंडेक्स हम क्या पाते हैं इसे कैसे आकार देता है?
      - इंडेक्सिंग के बिना खोज क्या होगी?
      - इंडेक्स और पहुंच के बीच क्या संबंध है?
  - id: dg_ds_19
    name: आर्काइव
    prompt: |
      आर्काइव। शब्द संरक्षण का सुझाव देता है—इतिहास के लिए रखा गया डेटा। लेकिन
      आर्काइव का मतलब "दूर रखना" भी होता है। आर्काइव स्मृति और
      भूलना दोनों है। आर्काइव डेटा को क्या करता है?
    follow_ups:
      - आर्काइव डेटा के साथ संबंध को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस क्या होगा?
      - आर्काइव और स्मृति के बीच क्या संबंध है?
  - id: dg_ds_20
    name: कोटा
    prompt: |
      स्टोरेज में कोटा होते हैं—आपको सौंपे गए सीमाएँ। फ्री टियर: 5GB। पेड: 100GB।
      कोटा कृत्रिम है—स्टोरेज प्रचुर मात्रा में है। सीमा आर्थिक है।
      कोटा व्यावसायिक मॉडल के बारे में क्या बताता है?
    follow_ups:
      - कोटा अनुभव को कैसे आकार देता है?
      - सीमाओं के बिना इंटरफ़ेस क्या होगा?
      - कोटा और मूल्य के बीच क्या संबंध है?
  - id: dg_ds_21
    name: माइग्रेशन
    prompt: |
      डेटा माइग्रेट करता है—एक सेवा से दूसरी सेवा में, एक प्रारूप से दूसरे में।
      माइग्रेशन आंदोलन है। पारगमन में कुछ खो सकता है। माइग्रेशन
      स्वयं की निरंतरता के बारे में क्या मानता है? स्मृति के बारे में?
    follow_ups:
      - माइग्रेशन डेटा के साथ संबंध को कैसे आकार देता है?
      - माइग्रेशन के बिना हम क्या खो देंगे?
      - माइग्रेशन और पहचान के बीच क्या संबंध है?
  - id: dg_ds_22
    name: एक्सपोर्ट
    prompt: |
      एक्सपोर्ट। अपना डेटा बाहर ले जाएं। प्रारूप प्रोप्राइटरी या ओपन हो सकता है।
      एक्सपोर्ट एक एस्केप हैच है—छोड़ने का एक तरीका। एक्सपोर्ट
