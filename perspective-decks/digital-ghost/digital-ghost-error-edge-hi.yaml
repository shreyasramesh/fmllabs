      इशारा करती है—केबल, राउटर, वाहक तक। लेकिन इंटरफ़ेस इसे ठीक नहीं कर
      सकता। यह केवल रिपोर्ट कर सकता है। नेटवर्क त्रुटि कनेक्शन की भावना को
      क्या करती है?
    follow_ups:
      - नेटवर्क त्रुटि अनुभव को कैसे आकार देती है?
      - ऑफ़लाइन क्षमता के साथ इंटरफ़ेस कैसा होता?
      - त्रुटि और अलगाव के बीच क्या संबंध है?
  - id: dg_ee_08
    name: टाइमआउट त्रुटि
