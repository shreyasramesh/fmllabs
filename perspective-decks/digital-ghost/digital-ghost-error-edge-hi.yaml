# डिजिटल घोस्ट — त्रुटि और किनारा (Hindi)

id: digital_ghost_error_edge
name: डिजिटल घोस्ट — त्रुटि और किनारा
description: 50 कार्ड जो त्रुटियों को देखने के तरीके को बदलते हैं—जब मशीन टूट जाती है चरित्र, त्रुटि संदेश, और वे क्षण जब सॉफ्टवेयर अपनी सीम और सीमाओं को प्रकट करता है।
domain: digital_ghost
cards:
  - id: dg_ee_01
    name: चरित्र तोड़ना
    prompt: |
      इंटरफ़ेस प्रदर्शन कर रहा था—सहज, आत्मविश्वासी, मानवीय। फिर एक
      त्रुटि। "कुछ गलत हो गया।" प्रदर्शन टूट जाता है। मशीन
      दिखाई देने लगती है। उस क्षण को नोटिस करें। चरित्र तोड़ना क्या प्रकट करता है?
    follow_ups:
      - त्रुटि भ्रम को कैसे बाधित करती है?
      - यदि इंटरफ़ेस कभी नहीं टूटता तो वह कैसा होता?
      - चरित्र और विफलता के बीच क्या संबंध है?
  - id: dg_ee_02
    name: सामान्य त्रुटि
    prompt: |
      "एक त्रुटि हुई।" "कुछ गलत हो गया।" संदेश निर्दिष्ट करने से इनकार करता है।
      यह सिस्टम की सुरक्षा करता है, आपकी नहीं। यह कारण छिपाता है। सामान्य
      त्रुटि आपकी जानने की आवश्यकता के बारे में क्या मानती है?
    follow_ups:
      - सामान्य त्रुटि संबंध को कैसे आकार देती है?
      - विशिष्टताओं के साथ इंटरफ़ेस कैसा होता?
      - अस्पष्टता और शक्ति के बीच क्या संबंध है?
  - id: dg_ee_03
    name: स्टैक ट्रेस
    prompt: |
