    follow_ups:
      - 404 नेविगेशन को कैसे आकार देता है?
      - डेड लिंक के बिना वेब कैसा होता?
      - लिंक और वादे के बीच क्या संबंध है?
  - id: dg_ee_05
    name: 500
    prompt: |
      सर्वर त्रुटि। समस्या उनके तरफ है—आपकी तरफ नहीं। लेकिन आप ही अवरुद्ध हैं।
      500 दोष स्वीकार करता है लेकिन कोई उपाय नहीं देता। 500 "उनकी समस्या" की
      भावना को क्या करता है? आपकी एजेंसी को?
    follow_ups:
      - 500 विफलता के अनुभव को कैसे आकार देता है?
      - अधिक संदर्भ के साथ इंटरफ़ेस कैसा होता?
      - उनकी गलती और आपकी रुकावट के बीच क्या संबंध है?
  - id: dg_ee_06
    name: सत्यापन त्रुटि
    prompt: |
      "अवैध ईमेल।" "पासवर्ड में अवश्य शामिल होना चाहिए..." सिस्टम आपके इनपुट को
      अस्वीकार करता है। यह नियमों को लागू कर रहा है—नियम जो आप शायद नहीं जानते।
      त्रुटि एक शिक्षक है, लेकिन अक्सर एक कठोर शिक्षक। सत्यापन आपके ज्ञान के
      बारे में क्या मानता है?
    follow_ups:
      - सत्यापन त्रुटि फॉर्म को कैसे आकार देती है?
      - बेहतर मार्गदर्शन के साथ इंटरफ़ेस कैसा होता?
      - नियम और संचार के बीच क्या संबंध है?
  - id: dg_ee_07
