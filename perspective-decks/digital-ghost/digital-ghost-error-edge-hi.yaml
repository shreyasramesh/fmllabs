      अनुवाद देना छोड़ दिया है। यह किसी और से बात कर रहा है। आप सुन रहे हैं।
      स्टैक ट्रेस क्या प्रकट करता है? यह क्या बाहर करता है?
    follow_ups:
      - स्टैक ट्रेस विफलता के अनुभव को कैसे आकार देता है?
      - अनुवाद के साथ इंटरफ़ेस कैसा होता?
      - तकनीकी और मानवीय के बीच क्या संबंध है?
  - id: dg_ee_04
    name: 404
    prompt: |
      पेज नहीं मिला। लिंक कहीं नहीं ले गया। वह चीज जो आप ढूंढ रहे थे वह मौजूद
      नहीं है—या चली गई है, या हटा दी गई है। 404 एक डेड एंड है। 404 वेब की
