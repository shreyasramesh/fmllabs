# डिजिटल घोस्ट — लोडिंग स्टेट्स (Hindi)

id: digital_ghost_loading_states
name: डिजिटल घोस्ट — लोडिंग स्टेट्स
description: 50 कार्ड जो आपको लोडिंग को अलग तरह से देखने में मदद करेंगे—स्पिनर और स्केलेटन से लेकर लेटेंसी, इंतज़ार और एक्शन और प्रतिक्रिया के बीच के गैप में क्या होता है।
domain: digital_ghost
cards:
  - id: dg_ls_01
    name: द स्प‍िनर
    prompt: |
      एक वृत्त घूमता है। अंतहीन। स्प‍िनर कहता है "प्रतीक्षा करें"—लेकिन यह नहीं बताता
      कि कब तक। यह नहीं बताता कि क्या हो रहा है। यह धैर्य के लिए एक प्लेसहोल्डर है।
      स्प‍िनर क्या छिपाता है? यह क्या प्रकट करता है?
    follow_ups:
      - स्प‍िनर अपेक्षाओं को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस कैसा होगा?
      - एनीमेशन और आश्वासन के बीच क्या संबंध है?
  - id: dg_ls_02
    name: स्केलेटन स्क्रीन
    prompt: |
      ग्रे ब्लॉक वहां स्पंदित होते हैं जहां सामग्री आएगी। स्केलेटन संरचना की नकल करता है—
      आप पदार्थ से पहले आकार देखते हैं। इंटरफ़ेस लोड होने का दिखावा करता है।
      स्केलेटन शरीर से क्या उधार लेता है? यह क्या वादा करता है?
    follow_ups:
      - स्केलेटन कथित प्रतीक्षा को कैसे कम करता है?
      - खाली स्क्रीन वाला इंटरफ़ेस कैसा होगा?
      - प्लेसहोल्डर और प्रत्याशा के बीच क्या संबंध है?
  - id: dg_ls_03
    name: प्रोग्रेस बार
    prompt: |
      एक बार भरता है। 23%। 47%। 89%। प्रगति रैखिकता का अर्थ है—प्रत्येक प्रतिशत
      किए गए काम के बराबर है। लेकिन प्रोग्रेस बार अक्सर झूठ बोलते हैं। वे 99% पर रुक जाते हैं।
      बार वास्तव में क्या मापता है? इकाइयाँ कौन तय करता है?
    follow_ups:
      - प्रोग्रेस बार धैर्य को कैसे आकार देता है?
      - प्रतिशत के बिना इंटरफ़ेस कैसा होगा?
      - प्रगति और सत्य के बीच क्या संबंध है?
  - id: dg_ls_04
    name: अनिश्चित प्रतीक्षा
    prompt: |
      कुछ लोडिंग का कोई अंत नहीं होता—स्प‍िनर घूमता रहता है, लेकिन कोई प्रोग्रेस बार नहीं होता।
      सिस्टम यह नहीं बताएगा कि कब तक। आप अनिश्चितता में हैं। अनिश्चितता
      मन पर क्या करती है? यह आपकी सहनशीलता के बारे में क्या मानता है?
    follow_ups:
      - अनिश्चितता चिंता को कैसे आकार देती है?
      - समय अनुमान वाले इंटरफ़ेस कैसा होगा?
      - अज्ञात और असहनीय के बीच क्या संबंध है?
  - id: dg_ls_05
    name: लेटेंसी गैप
    prompt: |
      आप क्लिक करते हैं। कुछ नहीं। फिर कुछ। क्रिया और प्रतिक्रिया के बीच का गैप लेटेंसी है—
      अदृश्य कार्य, छिपी हुई दूरी। डेटा यात्रा करता है। सर्वर सोचते हैं।
      गैप को नोटिस करें। इसमें क्या रहता है?
    follow_ups:
      - लेटेंसी गति की धारणा को कैसे आकार देती है?
      - तत्काल प्रतिक्रिया वाला इंटरफ़ेस कैसा होगा?
      - गैप और अपेक्षा के बीच क्या संबंध है?
  - id: dg_ls_06
    name: लोडिंग मैसेज
    prompt: |
      "लोड हो रहा है..." "कृपया प्रतीक्षा करें..." "आपका डेटा प्राप्त किया जा रहा है..." मैसेज
      खामोशी को भरता है। लेकिन यह किसके लिए है? आप पहले से ही प्रतीक्षा कर रहे हैं।
      क्या मैसेज आराम देता है या परेशान करता है? यह क्या मानता है कि आपको क्या चाहिए?
    follow_ups:
      - मैसेज प्रतीक्षा को कैसे आकार देता है?
      - इसके बिना इंटरफ़ेस कैसा होगा?
      - पाठ और धैर्य के बीच क्या संबंध है?
  - id: dg_ls_07
    name: थ्रोबर
    prompt: |
      एक छोटा एनिमेटेड आइकन—स्पंदित, घूमता हुआ—एक कोने में। थ्रोबर कहता है "कुछ हो रहा है"
      बिना ध्यान आकर्षित किए। यह परिधीय है। परिधीय लोडिंग फोकस पर क्या करती है? चिंता पर?
    follow_ups:
      - थ्रोबर पूर्ण-स्क्रीन स्प‍िनर से कैसे भिन्न है?
      - इसके बिना इंटरफ़ेस कैसा होगा?
      - परिधीय और केंद्रीय के बीच क्या संबंध है?
  - id: dg_ls_08
    name: ऑप्टिमिस्टिक यूआई
    prompt: |
      आप क्लिक करते हैं। सर्वर प्रतिक्रिया देने से पहले इंटरफ़ेस तुरंत अपडेट हो जाता है।
      यह सफलता मानता है। यदि सर्वर विफल रहता है, तो यह वापस रोल करता है। इंटरफ़ेस
      तेज़ महसूस कराने के लिए झूठ बोलता है। आशावाद की कीमत क्या है? यह क्या हासिल करता है?
    follow_ups:
      - ऑप्टिमिस्टिक यूआई धारणा को कैसे आकार देता है?
      - ईमानदार देरी वाला इंटरफ़ेस कैसा होगा?
      - अनुमान और अनुभव के बीच क्या संबंध है?
  - id: dg_ls_09
    name: खाली स्क्रीन
    prompt: |
      कभी-कभी लोडिंग कुछ नहीं होती—एक सफेद या ग्रे शून्य। कोई स्प‍िनर नहीं, कोई
      मैसेज नहीं। बस अनुपस्थिति। इंटरफ़ेस ने आपको प्रतीक्षा के लिए छोड़ दिया है।
      खाली स्क्रीन मन पर क्या करती है? यह क्या देने से मना करता है?
    follow_ups:
      - खाली स्क्रीन स्प‍िनर से कैसे भिन्न है?
      - फीडबैक वाले इंटरफ़ेस में क्या लाभ होगा?
      - शून्यता और चिंता के बीच क्या संबंध है?
  - id: dg_ls_10
    name: लेज़ी लोडिंग
    prompt: |
      जैसे-जैसे आप स्क्रॉल करते हैं सामग्री दिखाई देती है—छवियां तब लोड होती हैं जब वे दृश्य में आती हैं।
      पेज टुकड़ों में, मांग पर लोड होता है। आप कभी भी पूरी तरह से प्रतीक्षा समाप्त नहीं करते।
      लेज़ी लोडिंग पूर्णता की भावना पर क्या करती है? "पेज" की भावना पर?
    follow_ups:
      - लेज़ी लोडिंग उपभोग को कैसे आकार देता है?
      - तत्पर लोडिंग वाला इंटरफ़ेस कैसा होगा?
      - आंशिक और पूर्ण के बीच क्या संबंध है?
  - id: dg_ls_11
    name: बासी स्थिति
    prompt: |
      डेटा लोड होता है। आप इसे देखते हैं। समय बीतता है। क्या यह अभी भी सच है? इंटरफ़ेस
      आपको बिना बताए कल का डेटा दिखा सकता है। बासी होना एक प्रकार का
      लोडिंग है—नए का इंतज़ार। बासीपन विश्वास पर क्या करता है?
    follow_ups:
      - बासीपन डेटा के साथ हमारे संबंध को कैसे आकार देता है?
      - ताजगी संकेतकों वाले इंटरफ़ेस कैसा होगा?
      - पुराना और सच्चा के बीच क्या संबंध है?
  - id: dg_ls_12
    name: अनंत स्क्रॉल
    prompt: |
      आप स्क्रॉल करते हैं। और लोड होता है। आप स्क्रॉल करते हैं। और लोड होता है। इसका कोई अंत नहीं है—केवल
      अधिक लोडिंग। इंटरफ़ेस समाप्त होने से इनकार करता है। अनंत
      स्क्रॉल पूर्णता की भावना पर क्या करता है? "पर्याप्त" की भावना पर?
    follow_ups:
      - अनंत स्क्रॉल उपभोग को कैसे आकार देता है?
      - पेजिनेशन वाला इंटरफ़ेस कैसा होगा?
      - अधिक और पर्याप्त के बीच क्या संबंध है?
  - id: dg_ls_13
    name: लोडिंग ओवरले
    prompt: |
      एक अर्ध-पारदर्शी परत स्क्रीन को कवर करती है। आप इंटरैक्ट नहीं कर सकते। इंटरफ़ेस
      ने आपको फ्रीज कर दिया है। लोडिंग एक प्रकार की कैद है। ओवरले
      एजेंसी पर क्या करता है? नियंत्रण की भावना पर?
    follow_ups:
      - ओवरले प्रतीक्षा को कैसे आकार देता है?
      - अवरुद्ध किए बिना इंटरफ़ेस कैसा होगा?
      - ओवरले और शक्तिहीनता के बीच क्या संबंध है?
  - id: dg_ls_14
    name: स्केलेटन पल्स
    prompt: |
      स्केलेटन सिर्फ बैठता नहीं—यह स्पंदित होता है। एक सूक्ष्म एनीमेशन जीवन, कार्य, प्रगति का सुझाव देता है।
      इंटरफ़ेस अनुपस्थिति को एनिमेट करता है।
      पल्स शरीर से क्या उधार लेता है? यह क्या वादा करता है?
    follow_ups:
      - पल्स कथित प्रतीक्षा को कैसे कम करता है?
      - बिना एनीमेशन वाला स्केलेटन कैसा होगा?
      - पल्स और उपस्थिति के बीच क्या संबंध है?
  - id: dg_ls_15
    name: धीमा नेटवर्क
    prompt: |
      धीमे कनेक्शन पर, सब कुछ टुकड़ों में लोड होता है। छवियां धीरे-धीरे दिखाई देती हैं।
      टेक्स्ट छवियों से पहले आता है। इंटरफ़ेस अपनी निर्भरता दिखाता है।
      धीमा लोडिंग आपको सिस्टम के बारे में क्या सिखाता है?
    follow_ups:
      - धीमा लोडिंग संरचना की धारणा को कैसे आकार देता है?
      - तेज़ कनेक्शन पर इंटरफ़ेस कैसा होगा?
      - गति और प्रकटीकरण के बीच क्या संबंध है?
  - id: dg_ls_16
    name: कैशड इंस्टेंट
    prompt: |
      कभी-कभी लोडिंग तुरंत होती है—डेटा पहले से ही वहां था, कैश किया हुआ। इंटरफ़ेस
      नए को लाने से पहले आपको पुराना दिखाता है। आप शायद नोटिस न करें।
      कैशिंग क्या छिपाता है? यह क्या सक्षम करता है?
    follow_ups:
      - कैशिंग गति के अनुभव को कैसे आकार देता है?
      - कैश के बिना इंटरफ़ेस कैसा होगा?
      - तुरंत और बासी के बीच क्या संबंध है?
  - id: dg_ls_17
    name: लोडिंग डॉट्स
    prompt: |
      तीन बिंदु। एक, दो, तीन। वे क्रम में एनिमेट होते हैं—एक छोटा लय।
      बिंदु शब्दों के बिना "प्रतीक्षा करें" कहते हैं। वे न्यूनतम, लगभग अमूर्त हैं।
      न्यूनतमवाद प्रतीक्षा पर क्या करता है? धैर्य पर?
    follow_ups:
      - डॉट्स स्प‍िनर से कैसे भिन्न हैं?
      - अधिक फीडबैक वाले इंटरफ़ेस कैसा होगा?
      - न्यूनतम और पर्याप्त के बीच क्या संबंध है?
  - id: dg_ls_18
    name: बैकग्राउंड सिंक
    prompt: |
      आप एक बदलाव करते हैं। इंटरफ़ेस कहता है "सहेजा गया"। लेकिन सिंक बाद में हो सकता है—पृष्ठभूमि में,
      जब कनेक्शन वापस आता है। इंटरफ़ेस बताता है कि कब। बैकग्राउंड सिंक "पूर्ण" की भावना पर क्या करता है?
    follow_ups:
      - बैकग्राउंड सिंक विश्वास को कैसे आकार देता है?
      - ईमानदार सिंक वाला इंटरफ़ेस कैसा होगा?
      - वादा और वास्तविक के बीच क्या संबंध है?
  - id: dg_ls_19
    name: द वॉटरफॉल
    prompt: |
      धीमे लोड पर, अनुरोध कैस्केड होते हैं—एक दूसरे पर निर्भर करता है। पेज
      चरणों में बनता है। आप संरचना को उभरते हुए देखते हैं। वॉटरफॉल
      निर्भरताओं के बारे में क्या प्रकट करता है? छिपी हुई वास्तुकला के बारे में?
    follow_ups:
      - वॉटरफॉल संरचना की धारणा को कैसे आकार देता है?
      - समानांतर लोडिंग वाला इंटरफ़ेस कैसा होगा?
      - अनुक्रम और प्रकटीकरण के बीच क्या संबंध है?
  - id: dg_ls_20
    name: कथित प्रदर्शन
    prompt: |
      डिजाइनर कथित गति के लिए अनुकूलित होते हैं—यह कितनी तेज़ी से महसूस होता है, न कि यह कितना तेज़ है।
      स्केलेटन, ऑप्टिमिस्टिक यूआई, प्रोग्रेसिव लोडिंग। इंटरफ़ेस
      गति का प्रदर्शन करता है। जब यह चरणबद्ध हो तो प्रदर्शन का क्या अर्थ है?
    follow_ups:
      - कथित प्रदर्शन वास्तविक से कैसे भिन्न है?
      - ईमानदार समय वाले इंटरफ़ेस कैसा होगा?
      - अनुभव और तथ्य के बीच क्या संबंध है?
  - id: dg_ls_21
    name: लोडिंग लूप
