# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Digital Ghost — Data & Storage

id: digital_ghost_data_storage
name: Digital Ghost — Data & Storage
description: 50 cards to shift how you see data storage—where data lives, the
  physicality of data, its weight, and the hidden geography of the digital.
domain: digital_ghost
cards:
  - id: dg_ds_01
    name: Where Data Lives
    prompt: |
      Your photos, your messages—where are they? A server. A data center.
      A building somewhere, with cooling and power. The data has a physical
      address. Trace one file. Where does it actually live?
    follow_ups:
      - How does location shape our relationship to data?
      - What would change if we could visit?
      - What's the relationship between virtual and physical?
  - id: dg_ds_02
    name: The Weight of Data
    prompt: |
      Data has weight—electrons, magnetic domains, photons. Not much. But
      the infrastructure has weight—servers, cables, cooling. Your "cloud"
      is tons of metal. Feel the weight. What does physicality add?
    follow_ups:
      - How does weight shape our understanding of data?
      - What would we lose without physicality?
      - What's the relationship between light and heavy?
  - id: dg_ds_03
    name: The Copy
    prompt: |
      Digital data copies perfectly. Your file exists in many places—cache,
      backup, sync. There is no original. Or everywhere is original. What
      does infinite copy do to the sense of "your" data?
    follow_ups:
      - How does copying shape ownership?
      - What would data be without copy?
      - What's the relationship between copy and original?
  - id: dg_ds_04
    name: The Cloud Metaphor
    prompt: |
      "The cloud." The metaphor suggests air, lightness, everywhere and
      nowhere. But the cloud is concrete—buildings, cables, electricity.
      What does the metaphor hide? What does it enable?
    follow_ups:
      - How does the metaphor shape understanding?
      - What would we call it without the metaphor?
      - What's the relationship between cloud and ground?
  - id: dg_ds_05
    name: Local vs Remote
    prompt: |
      Some data is local—on your device. Some is remote—on a server. The
      interface often hides the distinction. You see the same file either
      way. What does the blurring do to the sense of possession?
    follow_ups:
      - How does locality shape the experience?
      - What would the interface be with clear boundaries?
      - What's the relationship between local and owned?
  - id: dg_ds_06
    name: The Cache
    prompt: |
      Cache is a copy kept close—for speed. Your browser caches. Your app
      caches. The cache is a shadow of the remote. It might be stale. It
      might be all you have offline. What does the cache assume about access?
    follow_ups:
      - How does caching shape the experience of data?
      - What would the interface be without cache?
      - What's the relationship between cache and truth?
  - id: dg_ds_07
    name: Storage Full
    prompt: |
      "Storage full." The limit is reached. No more room. The message
      implies scarcity—like a physical drawer. But storage can be bought.
      The scarcity is economic. What does "full" actually mean?
    follow_ups:
      - How does the full message shape the experience?
      - What would the interface be without limits?
      - What's the relationship between full and scarce?
  - id: dg_ds_08
    name: The Backup
    prompt: |
      Backup is insurance—a copy elsewhere, for when things fail. But backup
      is also exposure. Your data exists in more places. More copies, more
      risk. What does backup assume about failure? About safety?
    follow_ups:
      - How does backup shape the relationship to data?
      - What would we lose without backup?
      - What's the relationship between backup and exposure?
  - id: dg_ds_09
    name: The Sync
    prompt: |
      Sync keeps copies aligned—change one, change all. But sync can fail.
      Conflicts arise. Which version is true? Sync implies unity. The
      reality is negotiation. What does sync hide?
    follow_ups:
      - How does sync shape the sense of "one" file?
      - What would the interface be without sync?
      - What's the relationship between sync and truth?
  - id: dg_ds_10
    name: The Delete
    prompt: |
      Delete. Erase. Remove. The word implies gone. But deleted data often
      persists—in backups, in logs, in "trash." Delete might mean "hide."
      What does delete actually do?
    follow_ups:
      - How does delete shape our relationship to data?
      - What would the interface be with true erasure?
      - What's the relationship between delete and gone?
  - id: dg_ds_11
    name: The Data Center
    prompt: |
      Data centers are factories—rows of servers, humming, cooled. They
      consume power, water, land. Your data contributes to that consumption.
      What does the data center reveal about the cost of the cloud?
    follow_ups:
      - How does the data center shape our understanding?
      - What would we see if we visited?
      - What's the relationship between data and consumption?
  - id: dg_ds_12
    name: The Folder
    prompt: |
      Folders. Directories. The metaphor is physical—a filing cabinet, a
      drawer. But digital folders can contain the same file in many places.
      They're links, not containers. What does the folder metaphor hide?
    follow_ups:
      - How does the folder shape our mental model?
      - What would the interface be without folders?
      - What's the relationship between metaphor and structure?
  - id: dg_ds_13
    name: The File
    prompt: |
      A file. A document. The metaphor suggests a physical object—something
      you can hold. But a file is bits. It has no substance. What does the
      file metaphor enable? What does it obscure?
    follow_ups:
      - How does the file shape our relationship to data?
      - What would we call it without the metaphor?
      - What's the relationship between file and object?
  - id: dg_ds_14
    name: The Upload
    prompt: |
      Upload. The word suggests rising—you send data up. To where? The
      cloud. The server. Upload is a transfer of location and control.
      What does upload actually do to your relationship with the data?
    follow_ups:
      - How does upload shape the sense of possession?
      - What would the interface be without the word?
      - What's the relationship between upload and give?
  - id: dg_ds_15
    name: The Download
    prompt: |
      Download. The word suggests bringing down—you receive data. But
      download often means copy. The original stays. You have a duplicate.
      What does download actually mean for ownership?
    follow_ups:
      - How does download shape the sense of possession?
      - What would the interface be without it?
      - What's the relationship between download and receive?
  - id: dg_ds_16
    name: The Database
    prompt: |
      Your data might live in a database—structured, queried, relational.
      You never see the database. You see the interface. The database is
      the hidden architecture. What does the database determine about your
      experience?
    follow_ups:
      - How does the database shape what's possible?
      - What would the interface be without it?
      - What's the relationship between structure and experience?
  - id: dg_ds_17
    name: The Cookie
    prompt: |
      Cookies are small data—stored on your device, sent back to the server.
      They remember. They track. The cookie is a tiny contract. What does
      the cookie assume about consent? About memory?
    follow_ups:
      - How does the cookie shape the relationship?
      - What would the web be without cookies?
      - What's the relationship between cookie and memory?
  - id: dg_ds_18
    name: The Index
    prompt: |
      Data is indexed—cataloged for search. The index is a map, not the
      territory. It determines what you can find. Who built the index?
      What did they prioritize?
    follow_ups:
      - How does the index shape what we find?
      - What would search be without indexing?
      - What's the relationship between index and access?
  - id: dg_ds_19
    name: The Archive
    prompt: |
      Archive. The word suggests preservation—data kept for history. But
      archive also means "put away." The archive is both memory and
      forgetting. What does the archive do to the data?
    follow_ups:
      - How does archive shape the relationship to data?
      - What would the interface be without it?
      - What's the relationship between archive and memory?
  - id: dg_ds_20
    name: The Quota
    prompt: |
      Storage has quotas—limits assigned to you. Free tier: 5GB. Paid: 100GB.
      The quota is artificial—storage is abundant. The limit is economic.
      What does the quota reveal about the business model?
    follow_ups:
      - How does the quota shape the experience?
      - What would the interface be without limits?
      - What's the relationship between quota and value?
  - id: dg_ds_21
    name: The Migration
    prompt: |
      Data migrates—from one service to another, from one format to another.
      Migration is movement. Something might be lost in transit. What does
      migration assume about the continuity of self? Of memory?
    follow_ups:
      - How does migration shape the relationship to data?
      - What would we lose without migration?
      - What's the relationship between migration and identity?
  - id: dg_ds_22
    name: The Export
    prompt: |
      Export. Take your data out. The format might be proprietary or open.
      Export is an escape hatch—a way to leave. What does export assume
      about ownership? About portability?
    follow_ups:
      - How does export shape the relationship?
      - What would the interface be without it?
      - What's the relationship between export and freedom?
  - id: dg_ds_23
    name: The Import
    prompt: |
      Import. Bring data in. From another service, another format. Import
      is adoption—the data enters a new system. Something might be lost in
      translation. What does import assume about compatibility?
    follow_ups:
      - How does import shape the experience?
      - What would the interface be without it?
      - What's the relationship between import and adoption?
  - id: dg_ds_24
    name: The Metadata
    prompt: |
      Data has metadata—when created, by whom, where. The metadata is data
      about data. It can reveal more than the content. What does metadata
      assume about the value of context?
    follow_ups:
      - How does metadata shape what we know?
      - What would data be without metadata?
      - What's the relationship between metadata and content?
  - id: dg_ds_25
    name: The Encryption
    prompt: |
      Data can be encrypted—scrambled, unreadable without a key. Encryption
      is a kind of hiding. The data exists but can't be read. What does
      encryption do to the sense of possession? Of privacy?
    follow_ups:
      - How does encryption shape the relationship?
      - What would data be without encryption?
      - What's the relationship between encryption and trust?
  - id: dg_ds_26
    name: The Replication
    prompt: |
      Data is replicated—copied across servers, across regions. For
      durability. For speed. Your file might exist in three data centers.
      What does replication do to the sense of "one"?
    follow_ups:
      - How does replication shape the experience?
      - What would the system be without it?
      - What's the relationship between replication and durability?
  - id: dg_ds_27
    name: The Trash
    prompt: |
      Trash. Recycle bin. Deleted files go here first. They're not gone—
      they're in limbo. The trash is a buffer between keep and delete. What
      does the trash assume about hesitation? About mistake?
    follow_ups:
      - How does the trash shape the delete experience?
      - What would the interface be without it?
      - What's the relationship between trash and finality?
  - id: dg_ds_28
    name: The Version History
    prompt: |
      Some systems keep version history—every change, every save. The past
      persists. You can go back. What does version history do to the sense
      of the present? Of the final?
    follow_ups:
      - How does version history shape the relationship?
      - What would the interface be without it?
      - What's the relationship between history and now?
  - id: dg_ds_29
    name: The Shard
    prompt: |
      Large datasets are sharded—split across servers. Your data might be
      in pieces, distributed. You never see the shards. The interface
      reassembles. What does sharding reveal about scale?
    follow_ups:
      - How does sharding shape what's possible?
      - What would the system be without it?
      - What's the relationship between shard and whole?
  - id: dg_ds_30
    name: The CDN
    prompt: |
      Content delivery networks cache data close to you—at the edge. Your
      video loads from a local node, not the origin. The data has moved
      to meet you. What does the CDN reveal about the geography of data?
    follow_ups:
      - How does the CDN shape the experience of speed?
      - What would the web be without it?
      - What's the relationship between edge and center?
  - id: dg_ds_31
    name: The Data Lake
    prompt: |
      Data lakes store raw data—unstructured, unprocessed. The metaphor
      suggests a body of water—something natural, vast. But the lake is
      managed. What does the data lake metaphor hide?
    follow_ups:
      - How does the metaphor shape understanding?
      - What would we call it without the metaphor?
      - What's the relationship between lake and structure?
  - id: dg_ds_32
    name: The Data Warehouse
    prompt: |
      Data warehouses store processed data—structured for analysis. The
      metaphor suggests a building—organized, intentional. What does the
      warehouse imply about the purpose of data?
    follow_ups:
      - How does the metaphor shape understanding?
      - What would analysis be without it?
      - What's the relationship between warehouse and value?
  - id: dg_ds_33
    name: The Orphan
    prompt: |
      Orphan files—data without a home, without a link. They exist but
      nothing points to them. They're lost in the structure. What does
      the orphan reveal about the organization of data?
    follow_ups:
      - How does the orphan shape the sense of structure?
      - What would the system be without orphans?
      - What's the relationship between link and existence?
  - id: dg_ds_34
    name: The Duplicate
    prompt: |
      Duplicate files—same content, different locations. The system might
      not know they're the same. Duplication wastes space, creates
      confusion. What does the duplicate reveal about the nature of copy?
    follow_ups:
      - How does duplication shape the experience?
      - What would the interface be with deduplication?
      - What's the relationship between duplicate and original?
  - id: dg_ds_35
    name: The Format
    prompt: |
      Data has formats—PDF, JPEG, JSON. The format determines what can read
      it, what can change it. Format is a kind of encoding. What does the
      format assume about the future? About compatibility?
    follow_ups:
      - How does format shape the lifespan of data?
      - What would data be without format?
      - What's the relationship between format and access?
  - id: dg_ds_36
    name: The Compression
    prompt: |
      Data is compressed—made smaller. Something is lost or approximated.
      Lossy or lossless. Compression is a trade-off. What does compression
      sacrifice? What does it enable?
    follow_ups:
      - How does compression shape the experience?
      - What would storage be without it?
      - What's the relationship between compression and fidelity?
  - id: dg_ds_37
    name: The Sync Conflict
    prompt: |
      Two copies changed. The system can't reconcile. You must choose.
      The conflict reveals that "your" data was never singular. What does
      the conflict do to the sense of ownership?
    follow_ups:
      - How does the conflict shape the experience?
      - What would sync be without conflicts?
      - What's the relationship between conflict and truth?
  - id: dg_ds_38
    name: The Data Portability
    prompt: |
      Portability—the ability to take your data elsewhere. It's a right in
      some jurisdictions. But portability requires standards, formats,
      effort. What does portability assume about ownership? About the future?
    follow_ups:
      - How does portability shape the relationship?
      - What would the ecosystem be without it?
      - What's the relationship between portability and freedom?
  - id: dg_ds_39
    name: The Data Residency
    prompt: |
      Data residency—where data is stored, by law or policy. EU data in EU.
      Your data might have a nationality. What does residency reveal about
      the geography of regulation?
    follow_ups:
      - How does residency shape the experience?
      - What would the cloud be without it?
      - What's the relationship between location and law?
  - id: dg_ds_40
    name: The Data Retention
    prompt: |
      Retention policies—how long data is kept. Thirty days. Seven years.
      Forever. Someone decided. What does retention assume about the value
      of the past? About your right to be forgotten?
    follow_ups:
      - How does retention shape the relationship?
      - What would the system be without policies?
      - What's the relationship between retention and memory?
  - id: dg_ds_41
    name: The Cold Storage
    prompt: |
      Cold storage—data kept but rarely accessed. Cheaper, slower. Your
      old photos might be in cold storage. The data exists but is dormant.
      What does cold storage do to the sense of accessibility?
    follow_ups:
      - How does cold storage shape the experience?
      - What would the system be without tiers?
      - What's the relationship between cold and forgotten?
  - id: dg_ds_42
    name: The Data Sovereignty
    prompt: |
      Data sovereignty—the idea that data is subject to the laws of where
      it lives. Your data in Germany is German. What does sovereignty
      reveal about the relationship between data and place?
    follow_ups:
      - How does sovereignty shape the experience?
      - What would the cloud be without it?
      - What's the relationship between data and territory?
  - id: dg_ds_43
    name: The Data Exhaust
    prompt: |
      Data exhaust—the traces you leave. Clicks, scrolls, dwell time. Often
      unexamined, often valuable. The exhaust is the byproduct of use. What
      does the exhaust reveal about the hidden economy of attention?
    follow_ups:
      - How does exhaust shape the relationship?
      - What would the system be without it?
      - What's the relationship between exhaust and value?
  - id: dg_ds_44
    name: The Data Shadow
    prompt: |
      Your data shadow—the profile built from your traces. It might know
      you better than you know yourself. The shadow is you, as data. What
      does the shadow assume about identity?
    follow_ups:
      - How does the shadow shape the relationship?
      - What would the system be without profiling?
      - What's the relationship between shadow and self?
  - id: dg_ds_45
    name: The Data Breach
    prompt: |
      A breach—your data escapes. It was stored, it was protected, and
      now it's elsewhere. The breach reveals that storage was never
      containment. What does the breach do to the sense of security?
    follow_ups:
      - How does the breach shape the relationship?
      - What would the system be without risk?
      - What's the relationship between storage and exposure?
  - id: dg_ds_46
    name: The Data Lifecycle
    prompt: |
      Data has a lifecycle—create, use, archive, delete. Or not delete.
      The lifecycle is designed. Someone decided the stages. What does the
      lifecycle assume about the value of data over time?
    follow_ups:
      - How does the lifecycle shape the experience?
      - What would the system be without stages?
      - What's the relationship between lifecycle and memory?
  - id: dg_ds_47
    name: The Data Gravity
    prompt: |
      Data gravity—the idea that data attracts applications, services.
      Where your data lives shapes what can use it. Data has pull. What
      does gravity reveal about the economics of the cloud?
    follow_ups:
      - How does gravity shape the ecosystem?
      - What would the cloud be without it?
      - What's the relationship between data and lock-in?
  - id: dg_ds_48
    name: The Data Double
    prompt: |
      Your data double—the digital representation built from your inputs.
      It might act for you, might be used to judge you. The double is not
      you, but it stands in. What does the double assume about identity?
    follow_ups:
      - How does the double shape the relationship?
      - What would the system be without profiling?
      - What's the relationship between double and self?
  - id: dg_ds_49
    name: The Data Inheritance
    prompt: |
      When you die, your data remains. Who inherits it? Who can access it?
      Data inheritance is a new kind of estate. What does inheritance
      assume about the persistence of identity?
    follow_ups:
      - How does inheritance shape the relationship?
      - What would the system be without policies?
      - What's the relationship between data and legacy?
  - id: dg_ds_50
    name: The Physicality of the Cloud
    prompt: |
      The cloud is physical—servers, cables, cooling, power. Your data has
      a temperature, a location, a cost in watts. What would it mean to
      fully feel the physicality of the digital? What would that change?
    follow_ups:
      - How could we make the physical more present?
      - What would we sacrifice?
      - What's the relationship between abstraction and responsibility?
