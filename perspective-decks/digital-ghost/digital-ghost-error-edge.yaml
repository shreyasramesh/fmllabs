# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Digital Ghost — Error & Edge

id: digital_ghost_error_edge
name: Digital Ghost — Error & Edge
description: 50 cards to shift how you see errors—when the machine breaks
  character, error messages, and the moments when software reveals its
  seams and limitations.
domain: digital_ghost
cards:
  - id: dg_ee_01
    name: Breaking Character
    prompt: |
      The interface has been performing—smooth, confident, human. Then an
      error. "Something went wrong." The performance cracks. The machine
      shows through. Notice that moment. What does breaking character reveal?
    follow_ups:
      - How does the error disrupt the illusion?
      - What would the interface be if it never broke?
      - What's the relationship between character and failure?
  - id: dg_ee_02
    name: The Generic Error
    prompt: |
      "An error occurred." "Something went wrong." The message refuses to
      specify. It protects the system, not you. It hides the cause. What
      does the generic error assume about your need to know?
    follow_ups:
      - How does the generic error shape the relationship?
      - What would the interface be with specifics?
      - What's the relationship between vagueness and power?
  - id: dg_ee_03
    name: The Stack Trace
    prompt: |
      Sometimes the error is raw—a stack trace, technical gibberish. The
      interface has given up on translation. It's speaking to someone else.
      You're overhearing. What does the stack trace reveal? What does it exclude?
    follow_ups:
      - How does the stack trace shape the experience of failure?
      - What would the interface be with translation?
      - What's the relationship between technical and human?
  - id: dg_ee_04
    name: The 404
    prompt: |
      Page not found. The link led nowhere. The thing you sought doesn't
      exist—or moved, or was deleted. The 404 is a dead end. What does
      the 404 do to the sense of the web? To trust in links?
    follow_ups:
      - How does the 404 shape navigation?
      - What would the web be without dead links?
      - What's the relationship between link and promise?
  - id: dg_ee_05
    name: The 500
    prompt: |
      Server error. The problem is on their side—not yours. But you're the
      one blocked. The 500 admits fault but offers no remedy. What does the
      500 do to the sense of "their problem"? To your agency?
    follow_ups:
      - How does the 500 shape the experience of failure?
      - What would the interface be with more context?
      - What's the relationship between their fault and your block?
  - id: dg_ee_06
    name: The Validation Error
    prompt: |
      "Invalid email." "Password must contain..." The system rejects your
      input. It's enforcing rules—rules you might not know. The error is
      a teacher, but often a harsh one. What does validation assume about
      your knowledge?
    follow_ups:
      - How does the validation error shape the form?
      - What would the interface be with better guidance?
      - What's the relationship between rule and communication?
  - id: dg_ee_07
    name: The Network Error
    prompt: |
      "No internet connection." "Network request failed." The error points
      outward—to the cable, the router, the carrier. But the interface can't
      fix it. It can only report. What does the network error do to the
      sense of connection?
    follow_ups:
      - How does the network error shape the experience?
      - What would the interface be with offline capability?
      - What's the relationship between error and isolation?
  - id: dg_ee_08
    name: The Timeout Error
    prompt: |
      "Request timed out." The system gave up waiting. Someone set a limit.
      You exceeded it. The error is about patience—yours and theirs. What
      does the timeout assume about acceptable wait? About the relationship?
    follow_ups:
      - How does the timeout shape the experience?
      - What would the interface be without a limit?
      - What's the relationship between timeout and abandonment?
  - id: dg_ee_09
    name: The Friendly Error
    prompt: |
      Some errors are designed to be kind—a sad illustration, a gentle
      message. "Oops! We hit a snag." The interface tries to soften the
      blow. What does the friendly error do to the experience? To trust?
    follow_ups:
      - How does friendliness shape the error experience?
      - What would the interface be with a cold error?
      - What's the relationship between tone and trust?
  - id: dg_ee_10
    name: The Blame-Shifting Error
    prompt: |
      "Check your connection." "Verify your credentials." Some errors imply
      the fault is yours. The system deflects. What does blame-shifting do
      to the relationship? To your sense of what went wrong?
    follow_ups:
      - How does blame shape the error experience?
      - What would the interface be with honest attribution?
      - What's the relationship between blame and power?
  - id: dg_ee_11
    name: The Silent Failure
    prompt: |
      Sometimes nothing happens. You click, you submit—and nothing. No
      error, no success. The interface has failed silently. It won't admit
      it. What does silent failure do to trust? To your sense of agency?
    follow_ups:
      - How does silent failure differ from explicit error?
      - What would the interface be with acknowledgment?
      - What's the relationship between silence and betrayal?
  - id: dg_ee_12
    name: The Error Code
    prompt: |
      "Error 0x80070005" or "ERR_CONNECTION_REFUSED." The code is for
      technicians, for search engines. It's not for you. But it's what
      you get. What does the error code assume about the user? About help?
    follow_ups:
      - How does the error code shape the experience?
      - What would the interface be with plain language?
      - What's the relationship between code and clarity?
  - id: dg_ee_13
    name: The Recoverable Error
    prompt: |
      Some errors offer recovery—"Retry," "Go back," "Try again." The
      interface assumes the failure was temporary. It gives you a path.
      What does recoverability do to the sense of failure? To hope?
    follow_ups:
      - How does recovery shape the error experience?
      - What would the interface be without options?
      - What's the relationship between recovery and agency?
  - id: dg_ee_14
    name: The Fatal Error
    prompt: |
      Some errors are fatal—the app crashes, the session ends. There's no
      recovery. You must start over. The interface has given up. What does
      the fatal error do to the sense of the system? To your work?
    follow_ups:
      - How does the fatal error shape the experience?
      - What would the interface be with recovery?
      - What's the relationship between fatal and final?
  - id: dg_ee_15
    name: The Error as Boundary
    prompt: |
      Errors mark boundaries—what the system can do, what it can't. What
      it will allow, what it won't. The error is a wall. What does the
      boundary reveal about the system's design? About its values?
    follow_ups:
      - How does the boundary shape the experience?
      - What would the interface be without limits?
      - What's the relationship between boundary and design?
  - id: dg_ee_16
    name: The Localized Error
    prompt: |
      Error messages can be localized—translated for language, adapted
      for culture. But technical errors often resist translation. "Null
      pointer" in Japanese? What does localization do to the error? To understanding?
    follow_ups:
      - How does localization shape the error experience?
      - What would the interface be without translation?
      - What's the relationship between language and error?
  - id: dg_ee_17
    name: The Cascading Error
    prompt: |
      One error leads to another. The first failure triggers the second.
      The interface collapses in sequence. What does the cascade reveal
      about dependencies? About the architecture of failure?
    follow_ups:
      - How does the cascade shape the experience?
      - What would the interface be with isolation?
      - What's the relationship between cascade and structure?
  - id: dg_ee_18
    name: The Error Log
    prompt: |
      Errors are logged—somewhere, for someone. The log is a record of
      failure, a history of cracks. You might never see it. But it exists.
      What does the error log assume about accountability? About transparency?
    follow_ups:
      - How does the log shape the relationship to failure?
      - What would the system be without logging?
      - What's the relationship between log and memory?
  - id: dg_ee_19
    name: The Graceful Degradation
    prompt: |
      Some systems degrade gracefully—when one part fails, the rest keeps
      working. You get partial function. The error is contained. What does
      graceful degradation assume about what's essential? About what's optional?
    follow_ups:
      - How does degradation shape the experience?
      - What would the interface be with all-or-nothing?
      - What's the relationship between partial and acceptable?
  - id: dg_ee_20
    name: The Error Illustration
    prompt: |
      Some error pages have illustrations—a broken robot, a sad cloud. The
      image softens the technical failure. It adds personality. What does
      the illustration do to the error? To the relationship with the product?
    follow_ups:
      - How does the illustration shape the experience?
      - What would the error be without it?
      - What's the relationship between image and message?
  - id: dg_ee_21
    name: The Permission Error
    prompt: |
      "Access denied." "You don't have permission." The system is refusing
      you. The error is about power—who can do what. What does the
      permission error reveal about the hierarchy? About your place in it?
    follow_ups:
      - How does the permission error shape the experience?
      - What would the interface be with explanation?
      - What's the relationship between permission and power?
  - id: dg_ee_22
    name: The Quota Error
    prompt: |
      "Storage full." "Rate limit exceeded." The system has a limit. You've
      hit it. The error is about scarcity—real or imposed. What does the
      quota error reveal about the business model? About the relationship?
    follow_ups:
      - How does the quota error shape the experience?
      - What would the interface be without limits?
      - What's the relationship between quota and control?
  - id: dg_ee_23
    name: The Conflict Error
    prompt: |
      "This file has been modified by another user." The error describes
      a conflict—two versions, one resource. The system can't reconcile.
      What does the conflict error reveal about collaboration? About sync?
    follow_ups:
      - How does the conflict error shape the experience?
      - What would the interface be with auto-merge?
      - What's the relationship between conflict and collaboration?
  - id: dg_ee_24
    name: The Deprecation Warning
    prompt: |
      "This feature is deprecated and will be removed." The error is
      anticipatory—something will break later. The system is warning you.
      What does the deprecation warning do to the sense of stability? To trust?
    follow_ups:
      - How does the warning shape the experience?
      - What would the interface be without warning?
      - What's the relationship between deprecation and change?
  - id: dg_ee_25
    name: The Error as Feedback
    prompt: |
      In some contexts, errors are feedback—"Wrong password," "Invalid format."
      They guide correction. The error is pedagogical. What does the error
      assume about your ability to fix? About your need for guidance?
    follow_ups:
      - How does the error shape the correction process?
      - What would the interface be without feedback?
      - What's the relationship between error and learning?
  - id: dg_ee_26
    name: The Blue Screen
    prompt: |
      The blue screen of death. The kernel panic. The entire system has
      failed. The error is total—no recovery, no partial function. What
      does the blue screen do to the relationship with the machine?
    follow_ups:
      - How does the blue screen shape the experience?
      - What would the system be with graceful failure?
      - What's the relationship between total and traumatic?
  - id: dg_ee_27
    name: The Error Message as Contract
    prompt: |
      Error messages can be legal—"Terms of service violated." "Account
      suspended." The message is a contract breach. It has consequences.
      What does the legal error reveal about the relationship? About power?
    follow_ups:
      - How does the legal error shape the experience?
      - What would the interface be without legal framing?
      - What's the relationship between error and contract?
  - id: dg_ee_28
    name: The Inconsistent Error
    prompt: |
      Same failure, different messages. The interface is inconsistent—
      sometimes helpful, sometimes cryptic. The inconsistency reveals the
      system's seams. What does inconsistency do to trust? To the sense of coherence?
    follow_ups:
      - How does inconsistency shape the experience?
      - What would the interface be with consistency?
      - What's the relationship between inconsistency and seams?
  - id: dg_ee_29
    name: The Error as Apology
    prompt: |
      "We're sorry. Something went wrong." The error apologizes. It takes
      responsibility—or performs it. What does the apology do to the
      relationship? To the sense of who's at fault?
    follow_ups:
      - How does the apology shape the experience?
      - What would the error be without it?
      - What's the relationship between apology and accountability?
  - id: dg_ee_30
    name: The Error as Opportunity
    prompt: |
      Some errors are designed as opportunities—"Upgrade to fix this,"
      "Contact sales." The failure is monetized. What does the
      opportunity error reveal about the business? About the relationship?
    follow_ups:
      - How does the opportunity error shape the experience?
      - What would the interface be without upsell?
      - What's the relationship between error and commerce?
  - id: dg_ee_31
    name: The Error Sound
    prompt: |
      Some errors have sound—a beep, a buzz. The sound marks the failure
      even if you're not looking. What does the error sound do to the
      experience? To the sense of interruption?
    follow_ups:
      - How does sound shape the error experience?
      - What would the interface be without it?
      - What's the relationship between sound and failure?
  - id: dg_ee_32
    name: The Error Color
    prompt: |
      Errors are often red—danger, stop, wrong. The color is convention.
      It carries meaning before you read. What does the error color assume
      about universal understanding? About accessibility?
    follow_ups:
      - How does color shape the error experience?
      - What would the interface be with different colors?
      - What's the relationship between color and meaning?
  - id: dg_ee_33
    name: The Error Position
    prompt: |
      Errors appear in different places—inline, at the top, in a modal.
      Position shapes attention. Inline errors guide; modal errors block.
      What does position reveal about the error's importance? About the flow?
    follow_ups:
      - How does position shape the error experience?
      - What would the interface be with different placement?
      - What's the relationship between position and attention?
  - id: dg_ee_34
    name: The Error Persistence
    prompt: |
      Some errors persist—they stay until you fix the cause. Others
      disappear—transient, momentary. What does persistence do to the
      relationship with the error? To the sense of what's fixable?
    follow_ups:
      - How does persistence shape the experience?
      - What would the interface be with different persistence?
      - What's the relationship between persistence and agency?
  - id: dg_ee_35
    name: The Error as Debug
    prompt: |
      Developers see different errors—verbose, technical. Users see
      simplified ones. The interface has two error languages. What does
      the split assume about who needs what? About the boundary between roles?
    follow_ups:
      - How does the split shape the experience?
      - What would the interface be with one language?
      - What's the relationship between technical and user-facing?
  - id: dg_ee_36
    name: The Error Chain
    prompt: |
      One error causes another. The root cause is buried. You see the
      symptom, not the source. The error chain hides the truth. What does
      the chain reveal about system complexity? About debuggability?
    follow_ups:
      - How does the chain shape the experience?
      - What would the interface be with root cause?
      - What's the relationship between symptom and source?
  - id: dg_ee_37
    name: The Error as Limit
    prompt: |
      Errors mark the limits of the system—what it can't do, what it won't
      do. The limit might be technical or political. The error doesn't
      distinguish. What does the limit reveal about the design? About values?
    follow_ups:
      - How does the limit shape the experience?
      - What would the interface be without limits?
      - What's the relationship between limit and design?
  - id: dg_ee_38
    name: The Error as Betrayal
    prompt: |
      We trust interfaces. When they fail, it can feel like betrayal—the
      system promised and didn't deliver. The error breaks the contract.
      What does the sense of betrayal reveal about our relationship with tech?
    follow_ups:
      - How does betrayal shape the error experience?
      - What would the relationship be without trust?
      - What's the relationship between trust and failure?
  - id: dg_ee_39
    name: The Error as Revelation
    prompt: |
      Sometimes errors reveal—the inner workings, the hidden architecture.
      A stack trace, a debug message. The failure is informative. What does
      the revelation do to understanding? To the sense of the system?
    follow_ups:
      - How does revelation shape the experience?
      - What would the interface be without it?
      - What's the relationship between failure and knowledge?
  - id: dg_ee_40
    name: The Error as Ritual
    prompt: |
      We've learned to expect errors. We refresh, we retry, we work around.
      Error handling has become ritual. What does the ritual do to our
      relationship with failure? To our tolerance for it?
    follow_ups:
      - How does ritual shape the error experience?
      - What would the relationship be without ritual?
      - What's the relationship between ritual and acceptance?
  - id: dg_ee_41
    name: The Error as Design
    prompt: |
      Error states are designed—someone chose the message, the tone, the
      recovery path. The error is a product decision. What does the design
      of the error reveal about the product? About priorities?
    follow_ups:
      - How does design shape the error experience?
      - What would the error be with different design?
      - What's the relationship between design and failure?
  - id: dg_ee_42
    name: The Error as Translation
    prompt: |
      Technical failures get translated into user-facing messages. Something
      is lost in translation—precision, cause, context. What does the
      translation assume about what users need? About what they can handle?
    follow_ups:
      - How does translation shape the error experience?
      - What would the interface be with raw errors?
      - What's the relationship between technical and human?
  - id: dg_ee_43
    name: The Error as Boundary Object
    prompt: |
      Errors sit at boundaries—between user and system, between frontend and
      backend. They're boundary objects. What does the error reveal about
      the seams? About the divisions of labor?
    follow_ups:
      - How does the boundary shape the error experience?
      - What would the system be without seams?
      - What's the relationship between boundary and understanding?
  - id: dg_ee_44
    name: The Error as Memory
    prompt: |
      Errors create memory—we remember the bad experiences. The 404 that
      lost our work. The crash that corrupted our file. What does error
      memory do to future encounters? To trust?
    follow_ups:
      - How does memory shape the error experience?
      - What would the relationship be without memory?
      - What's the relationship between memory and caution?
  - id: dg_ee_45
    name: The Error as Signal
    prompt: |
      Errors can be signals—they indicate something is wrong, something
      needs attention. The error is information. What does the error signal
      about the system? About the relationship?
    follow_ups:
      - How does the signal shape the experience?
      - What would the interface be without signaling?
      - What's the relationship between error and information?
  - id: dg_ee_46
    name: The Error as Exclusion
    prompt: |
      Some errors exclude—"Browser not supported," "Region not available."
      The system refuses to serve you. The error is a gate. What does the
      exclusion reveal about who the product is for? About access?
    follow_ups:
      - How does exclusion shape the error experience?
      - What would the interface be without gates?
      - What's the relationship between error and access?
  - id: dg_ee_47
    name: The Error as Performance
    prompt: |
      Error handling can be performative—the system performs apology,
      performs helpfulness. The performance might not match the reality.
      What does the performance reveal about the relationship? About sincerity?
    follow_ups:
      - How does performance shape the error experience?
      - What would the error be without performance?
      - What's the relationship between performance and truth?
  - id: dg_ee_48
    name: The Error as Invitation
    prompt: |
      Some errors invite—"Report this," "Send feedback." The interface
      asks for your help. The error becomes collaboration. What does the
      invitation do to the relationship? To the sense of agency?
    follow_ups:
      - How does the invitation shape the experience?
      - What would the interface be without it?
      - What's the relationship between error and collaboration?
  - id: dg_ee_49
    name: The Error as End
    prompt: |
      Some errors are endpoints—no retry, no recovery. The journey stops.
      The interface has no more to offer. What does the terminal error do
      to the sense of the system? To the sense of possibility?
    follow_ups:
      - How does the terminal error shape the experience?
      - What would the interface be with recovery?
      - What's the relationship between end and possibility?
  - id: dg_ee_50
    name: The Error as Character
    prompt: |
      When the interface breaks character, it reveals itself. The error is
      the moment the ghost shows its face. What would it mean for errors
      to stay in character? What would that require? What would it cost?
    follow_ups:
      - How could errors maintain character?
      - What would the interface sacrifice?
      - What's the relationship between character and honesty?
