# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Digital Ghost — Loading States

id: digital_ghost_loading_states
name: Digital Ghost — Loading States
description: 50 cards to shift how you see loading—from spinners and skeletons
  to latency, the wait, and what happens in the gap between action and response.
domain: digital_ghost
cards:
  - id: dg_ls_01
    name: The Spinner
    prompt: |
      A circle rotates. Endlessly. The spinner says "wait"—but it doesn't say
      how long. It doesn't say what's happening. It's a placeholder for
      patience. What does the spinner hide? What does it reveal?
    follow_ups:
      - How does the spinner shape expectation?
      - What would the interface be without it?
      - What's the relationship between animation and reassurance?
  - id: dg_ls_02
    name: Skeleton Screen
    prompt: |
      Gray blocks pulse where content will be. The skeleton mimics structure—
      you see the shape before the substance. The interface pretends to load.
      What does the skeleton borrow from the body? What does it promise?
    follow_ups:
      - How does the skeleton reduce perceived wait?
      - What would the interface be with a blank screen?
      - What's the relationship between placeholder and anticipation?
  - id: dg_ls_03
    name: The Progress Bar
    prompt: |
      A bar fills. 23%. 47%. 89%. Progress implies linearity—each percent
      equals work done. But progress bars often lie. They stall at 99%. What
      does the bar actually measure? Who decides the units?
    follow_ups:
      - How does the progress bar shape patience?
      - What would the interface be without percentages?
      - What's the relationship between progress and truth?
  - id: dg_ls_04
    name: Indeterminate Wait
    prompt: |
      Some loading has no end—the spinner spins, but there's no progress bar.
      The system won't say how long. You're in limbo. What does indeterminacy
      do to the mind? What does it assume about your tolerance?
    follow_ups:
      - How does indeterminacy shape anxiety?
      - What would the interface be with a time estimate?
      - What's the relationship between unknown and unbearable?
  - id: dg_ls_05
    name: The Latency Gap
    prompt: |
      You click. Nothing. Then something. The gap between action and response
      is latency—invisible work, hidden distance. Data travels. Servers think.
      Notice the gap. What lives in it?
    follow_ups:
      - How does latency shape perception of speed?
      - What would the interface be with instant response?
      - What's the relationship between gap and expectation?
  - id: dg_ls_06
    name: Loading Message
    prompt: |
      "Loading..." "Please wait..." "Fetching your data..." The message
      fills the silence. But who is it for? You're already waiting. Does
      the message comfort or irritate? What does it assume you need?
    follow_ups:
      - How does the message shape the wait?
      - What would the interface be without it?
      - What's the relationship between text and patience?
  - id: dg_ls_07
    name: The Throbber
    prompt: |
      A small animated icon—pulsing, spinning—in the corner. The throbber
      says "something is happening" without demanding attention. It's
      peripheral. What does peripheral loading do to focus? To anxiety?
    follow_ups:
      - How does the throbber differ from a full-screen spinner?
      - What would the interface be without it?
      - What's the relationship between peripheral and central?
  - id: dg_ls_08
    name: Optimistic UI
    prompt: |
      You click. The interface updates immediately—before the server responds.
      It assumes success. If the server fails, it rolls back. The interface
      lies to make you feel fast. What does optimism cost? What does it gain?
    follow_ups:
      - How does optimistic UI shape perception?
      - What would the interface be with honest delay?
      - What's the relationship between assumption and experience?
  - id: dg_ls_09
    name: The Blank Screen
    prompt: |
      Sometimes loading is nothing—a white or gray void. No spinner, no
      message. Just absence. The interface has abandoned you to wait. What
      does the blank screen do to the mind? What does it refuse to offer?
    follow_ups:
      - How does the blank screen differ from a spinner?
      - What would the interface gain with feedback?
      - What's the relationship between nothing and anxiety?
  - id: dg_ls_10
    name: Lazy Loading
    prompt: |
      Content appears as you scroll—images load when they enter view. The
      page loads in pieces, on demand. You're never quite done waiting. What
      does lazy loading do to the sense of completion? To the sense of "page"?
    follow_ups:
      - How does lazy loading shape consumption?
      - What would the interface be with eager loading?
      - What's the relationship between partial and whole?
  - id: dg_ls_11
    name: The Stale State
    prompt: |
      Data loads. You see it. Time passes. Is it still true? The interface
      might show you yesterday's data without saying so. Stale is a kind of
      loading—waiting for the new. What does staleness do to trust?
    follow_ups:
      - How does staleness shape our relationship to data?
      - What would the interface be with freshness indicators?
      - What's the relationship between old and true?
  - id: dg_ls_12
    name: Infinite Scroll
    prompt: |
      You scroll. More loads. You scroll. More loads. There's no end—only
      more loading. The interface refuses to finish. What does infinite
      scroll do to the sense of completion? To the sense of enough?
    follow_ups:
      - How does infinite scroll shape consumption?
      - What would the interface be with pagination?
      - What's the relationship between more and enough?
  - id: dg_ls_13
    name: The Loading Overlay
    prompt: |
      A semi-transparent layer covers the screen. You can't interact. The
      interface has frozen you. Loading is a kind of captivity. What does
      the overlay do to agency? To the sense of control?
    follow_ups:
      - How does the overlay shape the wait?
      - What would the interface be without blocking?
      - What's the relationship between overlay and powerlessness?
  - id: dg_ls_14
    name: Skeleton Pulse
    prompt: |
      The skeleton doesn't just sit—it pulses. A subtle animation suggests
      life, work, progress. The interface animates absence. What does the
      pulse borrow from the body? What does it promise?
    follow_ups:
      - How does the pulse reduce perceived wait?
      - What would the skeleton be without animation?
      - What's the relationship between pulse and presence?
  - id: dg_ls_15
    name: The Slow Network
    prompt: |
      On a slow connection, everything loads in pieces. Images appear
      gradually. Text arrives before images. The interface reveals its
      dependencies. What does slow loading teach you about the system?
    follow_ups:
      - How does slow loading shape perception of structure?
      - What would the interface be on a fast connection?
      - What's the relationship between speed and revelation?
  - id: dg_ls_16
    name: Cached Instant
    prompt: |
      Sometimes loading is instant—the data was already there, cached. The
      interface shows you the old before fetching the new. You might not
      notice. What does caching hide? What does it enable?
    follow_ups:
      - How does caching shape the experience of speed?
      - What would the interface be without cache?
      - What's the relationship between instant and stale?
  - id: dg_ls_17
    name: The Loading Dots
    prompt: |
      Three dots. One, two, three. They animate in sequence—a tiny rhythm.
      The dots say "wait" without words. They're minimal, almost abstract.
      What does minimalism do to the wait? To patience?
    follow_ups:
      - How do the dots differ from a spinner?
      - What would the interface be with more feedback?
      - What's the relationship between minimal and sufficient?
  - id: dg_ls_18
    name: Background Sync
    prompt: |
      You make a change. The interface says "saved." But the sync might happen
      later—in the background, when the connection returns. The interface
      lies about when. What does background sync do to the sense of "done"?
    follow_ups:
      - How does background sync shape trust?
      - What would the interface be with honest sync?
      - What's the relationship between promised and actual?
  - id: dg_ls_19
    name: The Waterfall
    prompt: |
      On a slow load, requests cascade—one depends on another. The page
      builds in stages. You see the structure emerge. What does the waterfall
      reveal about dependencies? About the hidden architecture?
    follow_ups:
      - How does the waterfall shape perception of structure?
      - What would the interface be with parallel loading?
      - What's the relationship between sequence and revelation?
  - id: dg_ls_20
    name: Perceived Performance
    prompt: |
      Designers optimize for perceived speed—how fast it feels, not how fast
      it is. Skeletons, optimistic UI, progressive loading. The interface
      performs speed. What does performance mean when it's staged?
    follow_ups:
      - How does perceived performance differ from actual?
      - What would the interface be with honest timing?
      - What's the relationship between feel and fact?
  - id: dg_ls_21
    name: The Loading Loop
    prompt: |
      Sometimes loading never ends—it spins until you refresh, until you
      give up. The interface has failed to complete but won't admit it. The
      spinner becomes a lie. What does the endless load do to trust?
    follow_ups:
      - How does the loading loop differ from a timeout?
      - What would the interface be with a failure state?
      - What's the relationship between spin and truth?
  - id: dg_ls_22
    name: Shimmer Effect
    prompt: |
      A light passes over the skeleton—shimmer, shine. The effect suggests
      something is coming, being prepared. The interface decorates the wait.
      What does the shimmer add? What does it distract from?
    follow_ups:
      - How does shimmer shape anticipation?
      - What would the skeleton be without it?
      - What's the relationship between decoration and reassurance?
  - id: dg_ls_23
    name: The Timeout
    prompt: |
      Loading has a limit. After X seconds, the interface gives up—"Request
      timed out." Someone decided how long you should wait. What does the
      timeout assume about your patience? About the network?
    follow_ups:
      - How does the timeout shape the experience of failure?
      - What would the interface be without a limit?
      - What's the relationship between timeout and abandonment?
  - id: dg_ls_24
    name: Progressive Enhancement
    prompt: |
      The page loads in layers—structure first, then style, then behavior.
      You might interact before everything arrives. The interface degrades
      gracefully. What does progressive loading assume about priority?
    follow_ups:
      - How does progressive enhancement shape the experience?
      - What would the interface be with all-or-nothing?
      - What's the relationship between layers and usability?
  - id: dg_ls_25
    name: The Retry Button
    prompt: |
      Loading failed. "Retry" appears. The interface offers a second chance—
      you can try again. But retry assumes the failure was temporary. What
      if it wasn't? What does retry promise? What does it hide?
    follow_ups:
      - How does retry shape the experience of failure?
      - What would the interface be without it?
      - What's the relationship between retry and hope?
  - id: dg_ls_26
    name: Blocking vs Non-Blocking
    prompt: |
      Some loading blocks—you can't do anything else. Some loading happens
      alongside—you can keep working. The choice is design. What does
      blocking assume about the task? About your attention?
    follow_ups:
      - How does blocking shape the experience of wait?
      - What would the interface be with non-blocking?
      - What's the relationship between block and agency?
  - id: dg_ls_27
    name: The Preloader
    prompt: |
      Before the app, a preloader—a splash screen, a logo, a progress bar.
      The preloader is the gate. You must wait to enter. What does the
      preloader do to the threshold? To the sense of arrival?
    follow_ups:
      - How does the preloader shape first impression?
      - What would the app be without it?
      - What's the relationship between gate and destination?
  - id: dg_ls_28
    name: Loading in Place
    prompt: |
      Sometimes only part of the screen loads—a single component, a widget.
      The rest stays static. Loading is localized. What does in-place
      loading do to the sense of the whole? To attention?
    follow_ups:
      - How does in-place loading differ from full-screen?
      - What would the interface be with global loading?
      - What's the relationship between partial and whole?
  - id: dg_ls_29
    name: The ETA
    prompt: |
      "Estimated time: 2 minutes." The interface guesses. The ETA might be
      wrong—it often is. But it gives you something to hold. What does the
      estimate do to the wait? To the relationship with the system?
    follow_ups:
      - How does the ETA shape patience?
      - What would the interface be without it?
      - What's the relationship between estimate and trust?
  - id: dg_ls_30
    name: Skeleton Accuracy
    prompt: |
      A good skeleton matches the final layout—same shape, same proportion.
      A bad skeleton lies. Content arrives and doesn't fit. What does
      skeleton accuracy do to the moment of arrival? To the sense of shift?
    follow_ups:
      - How does accuracy shape the transition?
      - What would the interface be with a generic skeleton?
      - What's the relationship between placeholder and actual?
  - id: dg_ls_31
    name: The Loading State
    prompt: |
      Loading is a state—like error, like success. The interface has a
      grammar of states. Loading is the in-between. What does it mean for
      the interface to have a state for "not yet"?
    follow_ups:
      - How does the loading state shape the state machine?
      - What would the interface be without state?
      - What's the relationship between state and expectation?
  - id: dg_ls_32
    name: Network Idle
    prompt: |
      The tab shows a spinner when the network is busy. When it stops, the
      tab is "idle." But idle might mean "waiting for you" or "waiting for
      something else." What does idle actually mean?
    follow_ups:
      - How does network idle shape perception?
      - What would the browser be without the indicator?
      - What's the relationship between idle and done?
  - id: dg_ls_33
    name: The Loading Animation
    prompt: |
      Loading animations vary—spinners, pulses, progress bars, custom
      illustrations. Each carries a tone. Playful, professional, minimal.
      What does the animation choice say about the product? About the wait?
    follow_ups:
      - How does the animation shape brand?
      - What would the interface be with a different animation?
      - What's the relationship between animation and tone?
  - id: dg_ls_34
    name: Deferred Loading
    prompt: |
      Some content loads only when needed—when you open a tab, click a
      section. The interface defers work. You pay the cost later. What does
      deferral do to the sense of "ready"? To the distribution of wait?
    follow_ups:
      - How does deferred loading shape the experience?
      - What would the interface be with eager loading?
      - What's the relationship between defer and distribute?
  - id: dg_ls_35
    name: The Loading Sound
    prompt: |
      Some interfaces play a sound when loading—a chime, a click. Sound
      marks the transition. You might not look at the screen. What does
      auditory loading do to attention? To the sense of completion?
    follow_ups:
      - How does sound shape the loading experience?
      - What would the interface be without it?
      - What's the relationship between sound and state?
  - id: dg_ls_36
    name: Optimistic Skeleton
    prompt: |
      The skeleton might show your data—your name, your avatar—before it
      loads. The interface guesses. It's optimistic about what will arrive.
      What does the optimistic skeleton assume? What does it risk?
    follow_ups:
      - How does the optimistic skeleton shape expectation?
      - What would the interface be with a generic skeleton?
      - What's the relationship between guess and actual?
  - id: dg_ls_37
    name: The Loading Queue
    prompt: |
      Multiple things load at once—images, scripts, data. They queue. They
      compete for bandwidth. The order might not be the order you expect.
      What does the queue reveal about priority? About the system?
    follow_ups:
      - How does the queue shape what appears first?
      - What would the interface be with strict ordering?
      - What's the relationship between queue and control?
  - id: dg_ls_38
    name: Stale-While-Revalidate
    prompt: |
      Show the cached version immediately. Fetch the new in the background.
      Swap when it arrives. You see old, then new—maybe without noticing.
      What does stale-while-revalidate do to the sense of "current"?
    follow_ups:
      - How does SWR shape the experience of freshness?
      - What would the interface be with wait-for-fresh?
      - What's the relationship between cached and current?
  - id: dg_ls_39
    name: The Loading Brand
    prompt: |
      Some loaders are branded—a logo animates, a mascot runs. The wait
      becomes marketing. The interface uses your captivity to reinforce
      identity. What does branded loading do to the wait? To the relationship?
    follow_ups:
      - How does branding shape the loading experience?
      - What would the interface be with a generic spinner?
      - What's the relationship between wait and brand?
  - id: dg_ls_40
    name: The Instant Illusion
    prompt: |
      With good design, loading can feel instant—skeletons, optimistic UI,
      caching. The interface performs speed. You might not know you waited.
      What does the illusion of instant do to expectation? To tolerance?
    follow_ups:
      - How does the illusion shape future waits?
      - What would the interface be with honest delay?
      - What's the relationship between illusion and standard?
  - id: dg_ls_41
    name: Loading as Ritual
    prompt: |
      We've learned to wait for interfaces. The spinner is familiar, almost
      comforting. Loading has become ritual—we know the steps. What does
      the ritual do to the experience of wait? To our relationship with tech?
    follow_ups:
      - How does ritual shape patience?
      - What would the interface be without familiar patterns?
      - What's the relationship between ritual and expectation?
  - id: dg_ls_42
    name: The Loading Failure
    prompt: |
      Loading can fail. The spinner stops. An error appears. The interface
      admits defeat. But the failure state is also designed. What does the
      failure message assume? What does it offer?
    follow_ups:
      - How does the failure state shape the experience?
      - What would the interface be without a clear failure?
      - What's the relationship between failure and recovery?
  - id: dg_ls_43
    name: Perceived Completeness
    prompt: |
      A page might feel "loaded" before it is—above-the-fold content first,
      images later. You scroll and things pop in. Completeness is staged.
      What does staged completeness do to the sense of "done"?
    follow_ups:
      - How does perceived completeness shape the experience?
      - What would the interface be with strict completeness?
      - What's the relationship between feel and fact?
  - id: dg_ls_44
    name: The Loading Context
    prompt: |
      Loading happens in context—after a click, on page load, on refresh.
      The context shapes expectation. A click implies quick response. Page
      load implies more patience. What does context do to tolerance?
    follow_ups:
      - How does context shape the experience of wait?
      - What would the interface be without context?
      - What's the relationship between context and expectation?
  - id: dg_ls_45
    name: The Loading Hierarchy
    prompt: |
      Some loading is critical—the main content. Some is secondary—a sidebar.
      The interface prioritizes. You might see the hierarchy in the order
      things appear. What does the hierarchy reveal about values?
    follow_ups:
      - How does the hierarchy shape the experience?
      - What would the interface be with equal priority?
      - What's the relationship between order and importance?
  - id: dg_ls_46
    name: The Loading Interrupt
    prompt: |
      You're waiting. Something interrupts—a notification, a modal. The
      loading continues in the background, but you've been pulled away.
      What does the interrupt do to the sense of wait? To attention?
    follow_ups:
      - How does the interrupt shape the loading experience?
      - What would the interface be without interruption?
      - What's the relationship between interrupt and flow?
  - id: dg_ls_47
    name: The Loading Memory
    prompt: |
      We remember slow loads. We remember when the spinner never stopped.
      Loading creates memory—positive or negative. What does the memory of
      loading do to future encounters? To brand?
    follow_ups:
      - How does loading memory shape expectation?
      - What would the interface be if we forgot?
      - What's the relationship between memory and tolerance?
  - id: dg_ls_48
    name: The Loading Metaphor
    prompt: |
      Loading borrows from the physical—progress bars like filling a glass,
      spinners like wheels. The metaphors shape understanding. What does
      the metaphor assume? What does it hide?
    follow_ups:
      - How does the metaphor shape perception?
      - What would the interface be with a different metaphor?
      - What's the relationship between metaphor and understanding?
  - id: dg_ls_49
    name: The Loading Threshold
    prompt: |
      There's a threshold—below it, we don't notice loading. Above it, we
      do. Designers aim for the threshold. But the threshold varies by
      person, by context. What does the threshold assume about us?
    follow_ups:
      - How does the threshold shape design decisions?
      - What would the interface be with a different threshold?
      - What's the relationship between threshold and tolerance?
  - id: dg_ls_50
    name: The Wait as Gift
    prompt: |
      Some designers argue that loading can be a gift—a moment to breathe,
      to anticipate. The wait can be designed for presence. What would it
      mean for loading to be generous? What would that require?
    follow_ups:
      - How could loading be redesigned as gift?
      - What would the interface sacrifice?
      - What's the relationship between wait and presence?
