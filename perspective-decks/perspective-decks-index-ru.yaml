# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Russian)

domains:
  art:
    name: Искусство
    description: |
      Карточки, чтобы изменить ваш взгляд на искусство. Каждая предлагает разную
      перспективу — от света и тени до введения и эмоций — чтобы углубить ваше
      восприятие и взаимодействие с произведениями искусства.
  urban_jungle:
    name: Городские джунгли
    description: |
      Вместо того, чтобы просто ходить по городу, вы смотрите на него как на живой организм.
      Карточки сосредоточены на шрамах старых зданий, хореографии движения транспорта
      и тайной жизни переулков.
  culinary_lab:
    name: Кулинарная лаборатория
    description: |
      От вкусного к преобразующему. Исследуйте химию укуса,
      историю ингредиента и звуковой фон ресторана.
  natural_microcosm:
    name: Природный микрокосм
    description: |
      Идеально подходит для парка или заднего двора. Эта призма фокусируется на невидимой
      инженерии листа, замедленной жизни камня или территориальных
      драмах насекомых.
  human_interface:
    name: Человеческий интерфейс
    description: |
      Повседневные пространства, где встречаются люди — кафе, транспортные узлы,
      рабочие места, магазины, общественные парки. Карточки сосредоточены на хореографии очередей,
      территориальных притязаниях, невидимых сценариях и антропологии общего пространства.
  california_superbloom:
    name: Суперцветение Калифорнии
    description: |
      Мимолетный всплеск полевых цветов после зимних дождей. Карточки сосредоточены на цвете,
      масштабе, опылителях, геологии, погоде и скоротечном зрелище цветения.
