# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# طرق لرؤية الفيضان الخارق في كاليفورنيا (Arabic)

id: ways_of_looking_at_california_superbloom
name: طرق لرؤية الفيضان الخارق في كاليفورنيا
description: |
  بطاقات لتغيير منظورك عند تجربة الفيضان الخارق في كاليفورنيا.
  كل بطاقة تقدم عدسة مختلفة لتعميق رؤيتك للأزهار البرية، والمنحدرات،
  والانفجار المؤقت للألوان بعد أمطار الشتاء.
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: المطر الذي صنع ذلك
    prompt: |
      قبل الزهور، كان هناك المطر. تخيل العواصف التي ملأت التربة، والبذور التي تنتظر تحت الأرض. ما هي الظروف التي كان يجب أن تتوافق لحدوث هذا الفيضان؟ تتبع الفيضان الخارق إلى أصوله.
    follow_ups:
      - ماذا كان سيختلف مع المزيد - أو أقل - من المطر؟
      - كم سنة من السكون قد تكمن وراء منحدر واحد؟
      - ماذا يعني أن هذه اللحظة لم تكن مضمونة أبدًا؟
  - id: one_species_at_a_time
    name: نوع واحد في كل مرة
    prompt: |
      اختر نوعًا واحدًا من الزهور واتبعه. الخشخاش البرتقالي، اللوبين الأرجواني، حقول الذهب الصفراء - تجاهل كل شيء آخر للحظة. كيف يغير التركيز على واحد ما تراه؟
    follow_ups:
      - أين يهيمن هذا النوع - وأين يتنازل؟
      - كيف ستبدو المنحدر إذا تفتحت هذه الزهرة وحدها؟
      - كيف تصمد بين الآخرين؟
  - id: pollinators_view
    name: رؤية الملقحات
    prompt: |
      تخيل أنك نحلة، أو فراشة، أو طائر طنان. ما الذي قد يجذبك؟ أي زهور ستزور أولاً؟ كيف تبدو المناظر الطبيعية من بضع بوصات فوق البتلات؟
    follow_ups:
      - ما هي الأنماط التي ستوجه مسارك؟
      - أي زهور ستتخطاها - ولماذا؟
      - كيف يغير الحجم التجربة؟
  - id: ground_level
    name: مستوى الأرض
    prompt: |
      انزل إلى الأسفل. استلقِ على بطنك أو اركع. شاهد الفيضان الخارق من منظور التربة - السيقان ترتفع، والبتلات تقوس فوقك، والسماء شريط بعيد في الأعلى.
    follow_ups:
      - ما الذي تلاحظه ولم تلاحظه من ارتفاع الوقوف؟
      - كيف تشعر الأرض تحتك؟
      - ماذا سترى الخنفساء من هنا؟
  - id: time_lapse
    name: الفاصل الزمني
    prompt: |
      الفيضان الخارق هو لحظة في قصة أطول. تخيل المنحدر في تسريع - براعم خضراء، براعم أولى، ذروة اللون، ثم تلاشي. كم من الوقت يستمر هذا المشهد؟ ماذا يأتي قبله وبعده؟
    follow_ups:
      - متى كنت ستختار الزيارة إذا كان بإمكانك الذهاب مرة واحدة فقط؟
      - ماذا ذهب بالفعل بحلول الوقت الذي تصل فيه؟
      - ماذا سيبقى عندما يتلاشى اللون؟
  - id: the_chemistry_of_color
    name: كيمياء اللون
    prompt: |
      ركز على الأصباغ. البرتقالي، الأرجواني، الأصفر، الأزرق - ما الذي يجعل كل لون؟ كيف تتفاعل؟ أين تتضارب الألوان، وأين تتناغم؟ عامل المنحدر كلوحة.
    follow_ups:
      - أي لون ستضيف - أو تطرح؟
      - كيف يغير الضوء الألوان على مدار اليوم؟
      - كيف ستبدو باللونين الأبيض والأسود؟
  - id: negative_space
    name: المساحة السلبية
    prompt: |
      انظر إلى ما ليس زهورًا. السماء، البقع العارية من التربة، الفجوات بين الأزهار. كيف تشكل المساحة الفارغة ما تراه؟ اشعر بأهمية ما هو غير موجود.
    follow_ups:
      - أين تتمركز الفراغ؟
      - ماذا سيملأ تلك الفجوات - وهل يجب عليه ذلك؟
      - كيف تحتفظ المساحة السلبية بالتركيبة معًا؟
  - id: the_path_through
    name: المسار عبر
    prompt: |
      لاحظ المسارات - بشرية، حيوانية، أو بفعل الرياح. أين يمشي الناس؟ أين تقاوم المناظر الطبيعية المرور؟ تتبع مسارًا عبر الفيضان واسأل عن تكلفة اتباعه.
    follow_ups:
      - ماذا ستحمي بعدم المشي هناك؟
      - إلى أين يريد المسار أن يأخذك؟
      - ماذا ستفوت بالبقاء على المسار؟
  - id: geology_beneath
    name: الجيولوجيا في الأسفل
    prompt: |
      تستقر الزهور على ملايين السنين. ما هي الصخور التي تقع تحت التربة؟ ما الذي شكل هذه التلال؟ دع الفيضان الخارق يربطك بالزمن العميق تحت قدميك.
    follow_ups:
      - كيف تؤثر الجيولوجيا على ما ينمو هنا؟
      - كيف ستبدو هذه المكان قبل تشكل التلال؟
      - ماذا سيبقى عندما تختفي الزهور؟
  - id: scent_and_sound
    name: الرائحة والصوت
    prompt: |
      أغمض عينيك. ماذا تشم؟ حبوب اللقاح، الغبار، المريمية، الأرض الرطبة؟ ماذا تسمع؟ نحل، رياح، خطوات، صمت؟ دع الحواس غير البصرية تقود للحظة.
    follow_ups:
      - ما الصوت الذي ستضيفه لالتقاط التجربة؟
      - كيف تتغير الرائحة أثناء تحركك؟
      - ماذا ستفوت إذا نظرت فقط؟
  - id: light_and_shadow
    name: الضوء والظل
    prompt: |
      شاهد كيف يتحرك الضوء عبر المنحدر. صباح، منتصف النهار، مساء - كيف يغير زاوية الشمس الزهور؟ أين تسقط الظلال؟ ما الذي يتم الكشف عنه وما الذي يتم إخفاؤه؟
    follow_ups:
      - متى يبدو الضوء الأكثر حيوية؟
      - ماذا سترى عند الفجر وتفوت عند الظهيرة؟
      - كيف تشكل الظلال المناظر الطبيعية؟
  - id: seed_to_flower
    name: من البذرة إلى الزهرة
    prompt: |
      تتبع نباتًا واحدًا من البذرة إلى الإزهار. كيف وصل إلى هنا؟ رياح، حيوان، ماء؟ كم من الوقت انتظر؟ ماذا سيصبح عندما تسقط البتلات؟ اتبع حياة واحدة خلال دورتها.
    follow_ups:
      - ماذا كانت البذرة ستشهد تحت الأرض؟
      - ماذا ستترك النبتة وراءها؟
      - كم عدد الأجيال الممثلة في هذا المنحدر؟
  - id: micro_vs_macro
    name: صغير مقابل كبير
    prompt: |
      قم بالتكبير على بتلة واحدة، أو قطرة ندى، أو حبة لقاح. ثم ابتعد لرؤية المنحدر بأكمله، الوادي، الولاية. كيف يغير الحجم معنى الفيضان الخارق؟
    follow_ups:
      - ما هو غير مرئي على مقياس وواضح على مقياس آخر؟
      - أين تستقر انتباهك بشكل طبيعي؟
      - كيف يغير المنظر الكبير الصغير - والعكس صحيح؟
  - id: weathers_hand
    name: يد الطقس
    prompt: |
      الفيضان الخارق هو تعاون للطقس. المطر، الشمس، الرياح، درجة الحرارة - لكل دور. تخيل الطقس كشريك في الإبداع. ماذا قرر؟ ماذا حجب؟
    follow_ups:
      - ماذا سينتج شتاء مختلف؟
      - كيف يشكل طقس اليوم تجربتك؟
      - ماذا ستقول الزهور عن الطقس لو استطاعت؟
  - id: human_witness
    name: شاهد بشري
    prompt: |
      لست أول من رأى هذا. من آخر وقف هنا؟ مربو الماشية، السكان الأصليون، المصورون، المسافرون. كيف يغير وجودك المكان؟ ماذا يعني أن تشهد؟
    follow_ups:
      - ماذا كانوا سيرون ولم ترَ أنت؟
      - ماذا ستحمل معك؟
      - كيف يختلف الشهادة عن الملكية أو الأخذ؟
  - id: the_next_year
    name: العام القادم
    prompt: |
      هذا الفيضان لن يتكرر بالضبط. قد يكون العام القادم جفافًا، أو حريقًا، أو مزيجًا مختلفًا من الأنواع. تخيل العودة بعد عام. ماذا ستأمل أن تجد؟ ماذا ستكون مستعدًا لخسارته؟
    follow_ups:
      - ما الذي يجعل هذه اللحظة لا يمكن تكرارها؟
      - ماذا ستقول لنفسك المستقبلية؟
      - كيف يعمق عدم الدوام التجربة؟
  - id: texture_and_touch
    name: النسيج واللمس
    prompt: |
      كيف سيبدو الأمر عند تمرير يدك عبر الزهور؟ بتلات ناعمة، سيقان هشة، لقاح لزج، أوراق خشنة. تخيل الأنسجة دون لمس - أو، حيث يُسمح، المس بلطف ولاحظ.
    follow_ups:
      - أي نسيج يفاجئك أكثر؟
      - ماذا ستتجنب لمسه - ولماذا؟
      - كيف يضيف النسيج ما لا يستطيع اللون وحده نقله؟
  - id: before_and_after
    name: قبل وبعد
    prompt: |
      صوّر هذا المنحدر في الموسم الجاف - بني، ساكن، يبدو ميتًا. الآن احتفظ بالصورتين: قبل وبعد. ماذا يكشف التباين عن الصمود، والصبر، والتحول؟
    follow_ups:
      - ماذا سيفوت شخصًا رأى الموسم الجاف فقط؟
      - كيف يثري تذكر السكون الفيضان؟
      - ما هي لحظات "قبل وبعد" الأخرى التي تستدعيها هذه؟
  - id: make_it_a_mixtape
    name: اجعله شريطًا مختلطًا
    prompt: |
      ما الموسيقى التي سترافق هذه المناظر الطبيعية؟ قم ببناء قائمة تشغيل للفيضان الخارق. ما هو الإيقاع، ما هو المزاج، ما هي الآلات؟ دع الزهور تقترح الموسيقى التصويرية.
    follow_ups:
      - ما هي الأغنية الافتتاحية؟
      - ما هي الجودة التي تربط الموسيقى بالزهور - الإيقاع، اللون، الشعور؟
      - كيف ستتغير قائمة التشغيل في أوقات مختلفة من اليوم؟
  - id: take_one_thing_home
    name: خذ شيئًا واحدًا معك إلى المنزل
    prompt: |
      لا يمكنك أخذ الزهور - فهي تنتمي هنا. لكن يمكنك أخذ ذكرى، إحساس، سؤال. ما هو الشيء الوحيد الذي ستحمله معك؟ كيف ستحتفظ به دون قطف زهرة واحدة؟
    follow_ups:
      - ماذا ستُظهر لشخص لم يستطع المجيء؟
      - كيف ستصفه لاحقًا؟
      - ماذا ستترك وراءك عن قصد؟
