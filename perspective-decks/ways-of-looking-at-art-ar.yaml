# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# طرق النظر إلى الفن (Arabic)

id: ways_of_looking_at_art
name: الفن
description: |
  بطاقات لتغيير منظورك عند مشاهدة الأعمال الفنية. كل منها يقدم عدسة مختلفة
  لتعميق كيفية رؤيتك وتفاعلك مع الأعمال الفنية.
domain: art
cards:
  - id: souvenir
    name: تذكار
    prompt: |
      اختر شيئًا من العمل الفني واخفه في القطعة التالية التي تنظر إليها.
      كيف ستدرجه في التكوين الجديد؟
    follow_ups:
      - ماذا ستختار أن تنقل؟
      - ماذا سيكتسب أو يخسر في السياق الجديد؟
      - أين سيتناسب - أو سيقاوم التناسب - في العمل الجديد؟
  - id: throw_a_party
    name: إقامة حفل
    prompt: |
      ادعُ جميع الفنانين في الغرفة. ماذا سيرتدون؟
      ماذا سيفكرون؟
    follow_ups:
      - من سيجذب من؟
      - عن ماذا سيتجادلون؟
      - ما الذي سيفاجئهم في أعمال بعضهم البعض؟
  - id: time_out
    name: استراحة
    prompt: |
      اخرج. ركز على الضوء والأصوات والإحساس. كن حاضرًا في محيطك.
      تجربة مشاهدة الفن تتعلق بالمساحات بينية بقدر تعلقها بالأعمال الفنية نفسها.
    follow_ups:
      - ماذا تلاحظ عندما تتوقف عن التركيز على الفن؟
      - كيف تشكل الغرفة ما تراه؟
      - ماذا ستفوتك إذا استعجلت؟
  - id: plan_a_trip
    name: خطط لرحلة
    prompt: |
      ما تراه اليوم قد يكون الخطوة الأولى في رحلة أكبر بكثير. عندما تغادر
      المعرض أو المكان، حدد العمل الفني الذي تريد رؤيته بعد ذلك
      وخطط لرحلة كاملة حوله.
    follow_ups:
      - إلى أين ستأخذك تلك الرحلة؟
      - ماذا ستحتاج لرؤيته على طول الطريق؟
      - لماذا هذا العمل - ما الذي يجعله يستحق السفر من أجله؟
  - id: in_black_and_white
    name: بالأبيض والأسود
    prompt: |
      ركز على اللعب بين الضوء والظلام - يمكنك حتى التقاط صورة بالأبيض
      والأسود للمساعدة. أين هي درجات الألوان الأغمق؟ كيف يوحي هذا بالعمق أم لا؟
      كيف يساعد هذا في فهمك للتكوين؟
    follow_ups:
      - ماذا يختفي عند إزالة اللون؟
      - ما الذي يصبح أوضح؟
      - أين تذهب عينك أولاً في النسخة ذات التدرج الرمادي؟
  - id: give_it_a_voice
    name: امنحه صوتًا
    prompt: |
      ما الأصوات التي سيصدرها هذا العمل الفني؟ كيف قد تسمع الألوان والأشكال
      والهياكل؟
    follow_ups:
      - هل هو عالٍ أم هادئ؟ حاد أم ناعم؟
      - أي آلة موسيقية أو نسيج سيلتقطه؟
      - كيف سيبدو الصمت في هذا العمل؟
  - id: find_the_middle_ground
    name: ابحث عن نقطة وسط
    prompt: |
      كم يبعد العمل الفني عنك؟ ما حجمه بالنسبة لحجمك؟ كم هو ثقيل؟
      كم مساحة يشغل؟ هل يمكنك وضعه في منزل؟
    follow_ups:
      - ماذا سيتغير إذا استطعت حمله في يدك؟
      - ماذا لو كان بحجم غرفة؟
      - كيف يشكل الحجم علاقتك به؟
  - id: from_the_edges
    name: من الحواف
    prompt: |
      أين ينتهي العمل الفني وأين تبدأ "العالم الحقيقي"؟ هل يمكنك محاولة استخدام
      يديك كمنظار لإعادة تعريف حواف العمل الفني لنفسك؟ هل هناك حافة واضحة؟
    follow_ups:
      - ماذا يحدث عندما تغير الإطار؟
      - ما الذي يتم تضمينه أو استبعاده؟
      - أين يريد العمل أن يفيض خارج حدوده؟
  - id: transmogrify_it
    name: حوله
    prompt: |
      ماذا لو استطعت تغيير العمل الفني إلى نوع آخر؟ صورة إلى لوحة أكشن أو
      تركيب إلى منظر طبيعي؟ كيف ستفعل ذلك؟
      هل سيظل محتفظًا بطابعه حتى في الترجمة؟
    follow_ups:
      - ما هو جوهري في العمل - ما الذي يجب أن يبقى بعد التغيير؟
      - ماذا سيكتسب أو يخسر في الترجمة؟
      - أي نوع سيكشف شيئًا جديدًا عنه؟
  - id: the_hand_of_the_artist
    name: يد الفنان
    prompt: |
      ابحث عن دليل لضربات الفرشاة، علامات الإزميل، بصمات الأصابع، وحتى الشعر
      للفنان. تخيل أنك تقوم بهذه العلامات بنفسك - ما هو الوضع الذي ستحتاج إلى
      الوصول إليه؟ ما الأدوات التي ستستخدمها؟
    follow_ups:
      - ماذا تكشف العلامة عن جسد الصانع؟
      - أين الإيماءة سريعة أم بطيئة، واثقة أم مترددة؟
      - كيف سيكون الشعور بصنع تلك العلامة؟
  - id: tell_the_story
    name: احكِ القصة
    prompt: |
      تاريخ الفن غني بالسرد، واليوم هناك حوار مثير بين الفن والأدب والسينما.
      هل هناك قصة في العمل الفني؟ كيف تحكيها؟
    follow_ups:
      - ماذا يحدث قبل أو بعد هذه اللحظة؟
      - من هو الراوي؟ من هو الصوت المفقود؟
      - هل سينجح كفيلم، رواية، أو قصيدة؟
  - id: shadowboxing
    name: ملاكمة الظل
    prompt: |
      تحرك. اقترب حقًا. ابتعد قدر الإمكان. انتقل إلى الجانب الآخر.
      اذهب للأعلى. اذهب للأسفل. جرب زوايا مختلفة. لا تبقَ في نفس المكان طويلاً.
      استمتع بالتغييرات التي يقوم بها العمل الفني أثناء تحركك حوله.
    follow_ups:
      - ماذا يتغير عندما تغير موقعك؟
      - أي زاوية فاجأتك؟
      - كيف يغير حركة جسدك ما تراه؟
  - id: six_degrees_of_francis_bacon
    name: ست درجات من فرانسيس بيكون
    prompt: |
      يؤثر الفنانون على الفنانين الآخرين. تتطور الموضوعات والأفكار عبر الأجيال
      وعبر الحدود. اربط العمل الفني بآخر في المعرض باستخدام أقل عدد ممكن من الروابط.
    follow_ups:
      - ما هو أقصر مسار يمكنك العثور عليه؟
      - أي نوع من الروابط هو الأقوى - التقنية، الموضوع، المزاج، أم الفكرة؟
      - ماذا سيفكر الفنان في الارتباط؟
  - id: headlines
    name: عناوين الأخبار
    prompt: |
      تخيل اليوم الذي تم فيه إنشاء العمل الفني وابحث عن أو ابتكر عنوان صحيفة
      لذلك اليوم. قارنه بالصفحات الأولى اليوم.
    follow_ups:
      - ماذا كان سيكون في أعلى الصفحة؟
      - ماذا تغير - وماذا لم يتغير؟
      - كيف تعيد صياغة العنوان للعمل؟
  - id: speed_date
    name: موعد سريع
    prompt: |
      اقضِ 10 ثوانٍ فقط مع كل عمل فني. افعل ذلك حتى ترى كلها أو حتى تنفد طاقتك،
      ثم عد إلى أعمالك المفضلة وابقَ لفترة أطول.
      كيف تراها الآن؟ أيها تجد نفسك منجذبًا إليه؟
    follow_ups:
      - ماذا كشف المرور السريع مما قد يفوتك بالبقاء طويلاً؟
      - لماذا عدت إلى تلك الأعمال بالذات؟
      - كيف اختلفت النظرة الثانية عن الأولى؟
  - id: make_connections
    name: قم بإنشاء روابط
    prompt: |
      في طريقك إلى المنزل، ابحث عن شيء يذكرك بالعمل الفني، أو جزء منه - شكل
      أو لون، ربما كلمة، حتى إحساس.
    follow_ups:
      - ماذا وجدت؟
      - كيف غير الصدى نظرتك للعمل الأصلي؟
      - ماذا كنت ستعرض على الفنان لو استطعت؟
  - id: dinner_party
    name: حفلة عشاء
    prompt: |
      طابق عملًا فنيًا مع طعم. أي طعام أو شراب يذكرك به؟
      اجمع مأدبة.
    follow_ups:
      - كيف ستبدو القائمة؟
      - من سيجلس أين؟
      - كيف سيبدو الطعم الأول؟
  - id: head_off_piste
    name: انحرف عن المسار
    prompt: |
      اطلب من موظف المعرض الإشارة إلى عمله المفضل، أو ابتعد عن البطاقات
      وانظر ما يمكنك العثور عليه.
    follow_ups:
      - ماذا اكتشفت بعيدًا عن المسار المعتاد؟
      - كيف يختلف عملهم المفضل عن عملك؟
      - ماذا كنت ستوصي به لشخص آخر؟
  - id: make_it_anew
    name: اجعلها جديدة
    prompt: |
      في المنزل، أعد إنشاء عمل فني باستخدام ما لديك فقط. اكتبه، ارسمه، ابنِه
      بالأعواد. كلما كانت طريقتك أسهل وأبسط، كان ذلك أفضل. انظر ما يلتصق بذهنك،
      وما تلاحظه في تجسيدك.
    follow_ups:
      - ماذا تذكرت دون محاولة؟
      - ماذا أخطأت نسختك - ولماذا هذا مهم؟
      - ماذا كنت ستضيف لو كان لديك دقيقة إضافية؟
  - id: origin_story
    name: قصة الأصل
    prompt: |
      هل يمكنك تذكر أول عمل فني رأيته على الإطلاق؟ أين كنت؟ كم كان عمرك؟
      حاول تذكر الغرفة التي كنت فيها، الضوء والأصوات، الشعور بمشاهدته.
      هل هناك أي شيء يمكنك ربطه بالعمل الفني الذي تراه الآن؟
    follow_ups:
      - ما الذي ظل ثابتًا في طريقة رؤيتك للفن؟
      - ماذا سيصنع ذلك الشخص الأصغر سنًا من هذا العمل؟
      - أي خيط يمتد من ذلك الوقت إلى الآن؟
  - id: words_and_images
    name: الكلمات والصور
    prompt: |
      بدون النظر إلى العمل الفني، اقرأ الوصف، أغمض عينيك وحاول تخيله. ثم افتحهما.
      هل تتطابق مع نسختك؟
    follow_ups:
      - ماذا تركت الكلمات خارجًا؟
      - ماذا أضفت ولم يكن موجودًا؟
      - كيف تغير صورتك الذهنية نظرتك للصورة الحقيقية؟
  - id: keep_a_notebook
    name: احتفظ بدفتر ملاحظات
    prompt: |
      قم بتسجيل التواريخ والأعمال الفنية واستجابتك لها. عد إلى ملاحظاتك وابحث
      عن أعمال فنية جديدة.
    follow_ups:
      - ما النمط الذي يظهر عند قراءة ملاحظاتك؟
      - ماذا كنت ستقول لنفسك في الماضي؟
      - إلى أين يريد الدفتر أن يأخذك بعد ذلك؟
  - id: write_a_postcard
    name: اكتب بطاقة بريدية
    prompt: |
      اكتب بطاقة بريدية لعمل فني تتواصل معه بشكل خاص. ماذا ستقول؟
      كيف يمكن أن يرد؟
    follow_ups:
      - ماذا ستحتاج لقوله ولا يمكنك قوله بصوت عالٍ؟
      - كيف ستبدو خط يده؟
      - ماذا كنت ستحتفظ به - وماذا لن ترسله أبدًا؟
  - id: here_today_gone
    name: هنا اليوم، ذهب...؟
    prompt: |
      ليس كل عمل فني يصمد أمام اختبار الزمن، ولا هذا هو قصد كل فنان.
      قد يوجد حدث أو أداء لمدة أمسية، ربما دقائق أو ثوانٍ فقط!
      ربما تنظر إلى توثيق عمل فني عابر ومؤقت. كم من الوقت سيستمر؟
    follow_ups:
      - ماذا سيفقد إذا اختفى غدًا؟
      - ما الذي يبقى في الذاكرة، الصورة، أو القصة؟
      - هل عدم دوامه يغير نظرتك له؟
  - id: wrap_it_up
    name: لفه
    prompt: |
      ماذا لو استطعت لف العمل الفني؟ هل ستظل قادرًا على معرفة ما هو؟
      هل يمكن لعمل فني آخر أن يناسب نفس العبوة؟
    follow_ups:
      - ما الشكل الذي ستأخذه العبوة؟
      - كيف سيبدو ورق التغليف؟
      - ما هو الأساسي - وما الذي يمكن استبداله؟
  - id: trace_a_path
    name: تتبع مسارًا
    prompt: |
      ماذا ترى عندما تواجه عملًا فنيًا؟ أين تسافر عينك بعد ذلك؟
      أين تستقر نظرتك؟ ارسم النقاط وصل بينها.
    follow_ups:
      - أين تستمر بالعودة؟
      - ماذا تخطيت - ولماذا؟
      - كيف يقارن مسارك بمسار شخص آخر؟
  - id: superficial
    name: سطحي
    prompt: |
      كيف يبدو السطح؟ هل يمتص الضوء أم يعكسه؟ هل هو أملس أم مثقوب؟
      هل هو متعدد الطبقات، مصقول، أم خشن؟ لا تخف من أن تكون سطحيًا!
    follow_ups:
      - كيف سيكون الشعور بلمسه؟
      - ماذا يكشف السطح - أم يخفي؟
      - ماذا يحدث عندما تبقى على السطح؟
  - id: studio_visit
    name: زيارة الاستوديو
    prompt: |
      هناك استوديوهات فنانين بقدر ما يوجد فنانون. تخيل المساحة التي تم فيها إنشاء
      العمل الفني: مستودع في بروكلين، ورشة في باريس، طاولة المطبخ في منزل عائلي مزدحم -
      أو ربما في مكان أقل احتمالاً على الإطلاق.
    follow_ups:
      - ماذا كنت ستسمع في تلك المساحة؟
      - في أي وقت من اليوم تم صنعه؟
      - كيف يغير المكان المتخيل نظرتك للعمل؟
  - id: switch_channels
    name: تبديل القنوات
    prompt: |
      انظر إلى الأشخاص بدلاً من العمل الفني. كيف يتصرفون تجاه العمل؟
      ماذا ينظرون إليه؟ هل يمكنك تخمين ما يشعرون به؟
    follow_ups:
      - من يظل - ومن يمر بسرعة؟
      - ماذا سيقولون إذا سألتهم؟
      - كيف يغير مشاهدة الآخرين ما تلاحظه؟
  - id: light
    name: الضوء
    prompt: |
      ابحث عن مصدر الضوء. من أين يأتي؟ ماذا يوجد في الظل؟ ركز على ما يريد الفنان
      أن نراه وما هو مخفي في الظلال.
    follow_ups:
      - ماذا يكشف الضوء؟
      - ماذا قد تخفي الظلال؟
      - كيف سيتغير العمل في ضوء مختلف؟
  - id: introductions
    name: مقدمات
    prompt: |
      قدم عملًا فنيًا لصديق كما لو كان زميلًا في حفلة.
      كيف ستصفه بطريقة تلفت انتباهه؟ ما الذي يلفت انتباهك؟
    follow_ups:
      - ماذا ستؤكد أولاً؟
      - ماذا ستستبعد؟
      - ما هو الخطاف الذي سيجعله يرغب في مقابلته؟
  - id: tipping_point
    name: نقطة التحول
    prompt: |
      أين مركز العمل الفني؟ هل هو غير متوازن؟ ابحث عن نقطة التحول.
    follow_ups:
      - ماذا سيده؟
      - ما الذي يثبته في مكانه؟
      - كيف يخلق عدم التوازن توترًا - أم يحرره؟
  - id: homing
    name: عودة إلى الوطن
    prompt: |
      استمر بالعودة. عد إلى عمل فني مفضل في أيام مختلفة أو في أوقات مختلفة من اليوم -
      أول شيء في الشتاء، آخر شيء في أمسية صيفية. احتفظ بسجل لمشاعرك؛ مشاعرك تتغير في
      كل زيارة.
    follow_ups:
      - ما الذي ظل ثابتًا عبر الزيارات؟
      - متى فاجأك أكثر؟
      - ماذا كنت ستقول لنفسك في الماضي عنه؟
  - id: one_and_only
    name: واحد ولا مثيل له
    prompt: |
      لتجنب الشعور بالإرهاق، اختر عملًا فنيًا واحدًا فقط لتراه، أو حفنة في
      أقصى تقدير. تعمق في كل واحد واقضِ أطول وقت ممكن معه.
      كم عدد هذه البطاقات التي يمكنك استخدامها أمام عمل فني واحد؟
    follow_ups:
      - ماذا لاحظت في المرور الثاني؟
      - أي بطاقات كشفت شيئًا جديدًا؟
      - متى عرفت أنه حان الوقت للانتقال؟
  - id: press_pause
    name: اضغط على إيقاف مؤقت
    prompt: |
      أبطئ السرعة تمامًا. ابدأ بالنظر عن طريق إغلاق عينيك، واسترخِ وركز على تنفسك،
      افتح عينيك ببطء، أعد التركيز، وأعطِ العمل الفني وقتًا لينكشف أمامك.
    follow_ups:
      - ماذا ظهر عندما أبطأت؟
      - ماذا لاحظت أولاً عندما فتحت عينيك؟
      - كيف يغير تنفسك نظرتك؟
  - id: material
    name: المادة
    prompt: |
      مما صنع العمل الفني؟ ماذا لو صنع من شيء آخر؟ كلما كان أكثر غرابة، كان أفضل.
      هل سيغير ذلك طريقة شعورك تجاهه؟
    follow_ups:
      - ما هو البديل الأكثر مفاجأة؟
      - ماذا تضيف المادة إلى المعنى؟
      - ماذا سيبقى بعد التبديل - وماذا سيفقد؟
  - id: patch_of_sky
    name: كم عدد الألوان في بقعة من السماء؟
    prompt: |
      قم بالتكبير على منطقة من العمل الفني. كم عدد الألوان التي يمكنك رؤيتها هناك؟
      خارج المتحف، انظر للأعلى وحاول عد أكبر عدد ممكن من الألوان التي يمكنك رؤيتها
      في بقعة من السماء.
    follow_ups:
      - ماذا فاتك عندما كنت تنظر إلى الكل؟
      - كيف تقارن السماء بالعمل الفني؟
      - أي لون فاجأك أكثر؟
  - id: greening
    name: اخضرار
    prompt: |
      ما نوع النبات الذي سيكون عليه العمل الفني؟ هل سيكون شجرة خوخ في منتصف
      الصيف، مثقلة بالفاكهة، أم أشبه بفرن دقيق؟ ما الظروف التي يحتاجها لينمو؟
    follow_ups:
      - أين سيزدهر - وأين سيذبل؟
      - ماذا سيحتاج ليزهر؟
      - كيف يغير الاستعارة النباتية نظرتك له؟
