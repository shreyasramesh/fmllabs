# ಕಲೆಯ ದೃಷ್ಟಿಕೋನಗಳು (Kannada)

id: ways_of_looking_at_art
name: ಕಲೆ
description: |
  ಕಲೆಯನ್ನು ನೋಡುವಾಗ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಾಯಿಸುವ ಕಾರ್ಡ್‌ಗಳು. ಪ್ರತಿಯೊಂದೂ
  ಕಲಾವೈಭವವನ್ನು ನೀವು ಹೇಗೆ ನೋಡುತ್ತೀರಿ ಮತ್ತು ತೊಡಗಿಸಿಕೊಳ್ಳುತ್ತೀರಿ ಎಂಬುದನ್ನು
  ಆಳವಾಗಿಸಲು ವಿಭಿನ್ನ ಲೆನ್ಸ್ ನೀಡುತ್ತದೆ.
domain: art
cards:
  - id: souvenir
    name: ನೆನಪಿನ ಕಾಣಿಕೆ
    prompt: |
      ಕಲಾಕೃತಿಯಿಂದ ಏನನ್ನಾದರೂ ಆರಿಸಿ ಮತ್ತು ನೀವು ನೋಡುವ ಮುಂದಿನ ಕೃತಿಯಲ್ಲಿ ಅದನ್ನು
      ಮರೆಮಾಡಿ. ಹೊಸ ಸಂಯೋಜನೆಗೆ ಅದನ್ನು ಹೇಗೆ ಹೊಂದಿಸುತ್ತೀರಿ?
    follow_ups:
      - ಏನನ್ನು ಒಯ್ಯಲು ನೀವು ಆರಿಸುತ್ತೀರಿ?
      - ಹೊಸ ಸಂದರ್ಭದಲ್ಲಿ ಅದು ಏನು ಗಳಿಸುತ್ತದೆ ಅಥವಾ ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಅದು ಹೊಸ ಕೃತಿಯಲ್ಲಿ ಎಲ್ಲಿ ಹೊಂದುತ್ತದೆ—ಅಥವಾ ಹೊಂದಲು ಪ್ರತಿರೋಧಿಸುತ್ತದೆ?
  - id: throw_a_party
    name: ಪಕ್ಷವನ್ನು ಏರ್ಪಡಿಸಿ
    prompt: |
      ಕೋಣೆಯಲ್ಲಿರುವ ಎಲ್ಲಾ ಕಲಾವಿದರನ್ನು ಆಹ್ವಾನಿಸಿ. ಅವರು ಏನು ಧರಿಸುತ್ತಿದ್ದರು?
      ಅವರು ಏನು ಯೋಚಿಸುತ್ತಿದ್ದರು?
    follow_ups:
      - ಯಾರು ಯಾರ ಕಡೆಗೆ ಆಕರ್ಷಿತರಾಗುತ್ತಾರೆ?
      - ಅವರು ಯಾವುದರ ಬಗ್ಗೆ ವಾದಿಸುತ್ತಾರೆ?
      - ಪರಸ್ಪರರ ಕೃತಿಗಳಲ್ಲಿ ಯಾವುದು ಅವರನ್ನು ಆಶ್ಚರ್ಯಗೊಳಿಸುತ್ತದೆ?
  - id: time_out
    name: ವಿರಾಮ
    prompt: |
      ಹೊರಗೆ ಹೆಜ್ಜೆ ಹಾಕಿ. ಬೆಳಕು, ಶಬ್ದಗಳು ಮತ್ತು ಸಂವೇದನೆಗಳ ಮೇಲೆ ಗಮನಹರಿಸಿ.
      ನಿಮ್ಮ ಸುತ್ತಮುತ್ತಲಿನ ಪರಿಸರದೊಂದಿಗೆ ಪ್ರಸ್ತುತರಿರಿ. ಕಲೆಯ ಅನುಭವವು
      ಕಲಾಕೃತಿಗಳಷ್ಟೇ ನಡುವಿನ ಸ್ಥಳಗಳ ಬಗ್ಗೆಯೂ ಇದೆ.
    follow_ups:
      - ಕಲೆಯ ಮೇಲೆ ಗಮನಹರಿಸುವುದನ್ನು ನಿಲ್ಲಿಸಿದಾಗ ಏನು ಗಮನಿಸುತ್ತೀರಿ?
      - ಕೋಣೆ ನೀವು ನೋಡುವದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅವಸರದಲ್ಲಿ ಹೋದರೆ ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತೀರಿ?
  - id: plan_a_trip
    name: ಪ್ರವಾಸ ಯೋಜಿಸಿ
    prompt: |
      ಇಂದು ನೀವು ನೋಡುವ ಕಲೆಯು ದೊಡ್ಡ ಪ್ರಯಾಣದ ಮೊದಲ ಹೆಜ್ಜೆಯಾಗಿರಬಹುದು.
      ಗ್ಯಾಲರಿ ಅಥವಾ ಸ್ಥಳದಿಂದ ನಿರ್ಗಮಿಸುವಾಗ, ನೀವು ನೋಡಲು ಬಯಸುವ ಮುಂದಿನ
      ಕಲಾಕೃತಿಯನ್ನು ನಿರ್ಧರಿಸಿ ಮತ್ತು ಅದನ್ನು ಸುತ್ತುವರೆದು ಒಂದು ಸಂಪೂರ್ಣ ಪ್ರವಾಸವನ್ನು
      ಯೋಜಿಸಿ.
    follow_ups:
      - ಆ ಪ್ರಯಾಣವು ನಿಮ್ಮನ್ನು ಎಲ್ಲಿಗೆ ಕರೆದೊಯ್ಯುತ್ತದೆ?
      - ದಾರಿಯಲ್ಲಿ ಏನು ನೋಡಬೇಕಾಗುತ್ತದೆ?
      - ಈ ಕೃತಿಯೇ ಏಕೆ-ಇದನ್ನು ನೋಡಲು ಪ್ರಯಾಣಿಸಲು ಯೋಗ್ಯವಾಗುವಂತೆ ಯಾವುದು ಮಾಡುತ್ತದೆ?
  - id: in_black_and_white
    name: ಕಪ್ಪು-ಬಿಳಿ
    prompt: |
      ಬೆಳಕು ಮತ್ತು ಕತ್ತಲಿನ ಆಟದ ಮೇಲೆ ಗಮನಹರಿಸಿ—ಇದಕ್ಕೆ ಸಹಾಯ ಮಾಡಲು ನೀವು ಕಪ್ಪು-ಬಿಳಿ
      ಚಿತ್ರವನ್ನು ಕೂಡ ತೆಗೆದುಕೊಳ್ಳಬಹುದು. ಛಾಯೆಗಳು ಎಲ್ಲಿ ಗಾಢವಾಗಿವೆ? ಇದು ಆಳವನ್ನು
      ಸೂಚಿಸುತ್ತದೆಯೇ ಅಥವಾ ಇಲ್ಲವೇ? ಸಂಯೋಜನೆಯ ನಿಮ್ಮ ತಿಳುವಳಿಕೆಗೆ ಇದು ಹೇಗೆ ಸಹಾಯ
      ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಬಣ್ಣವನ್ನು ತೆಗೆದಾಗ ಏನು ಕಣ್ಮರೆಯಾಗುತ್ತದೆ?
      - ಯಾವುದು ಸ್ಪಷ್ಟವಾಗುತ್ತದೆ?
      - ಬೂದು ಪ್ರಮಾಣದ ಆವೃತ್ತಿಯಲ್ಲಿ ನಿಮ್ಮ ಕಣ್ಣು ಮೊದಲು ಎಲ್ಲಿಗೆ ಹೋಗುತ್ತದೆ?
  - id: give_it_a_voice
    name: ಧ್ವನಿ ನೀಡಿ
    prompt: |
      ಈ ಕಲಾಕೃತಿಯು ಯಾವ ಶಬ್ದಗಳನ್ನು ಮಾಡುತ್ತದೆ? ನೀವು ಬಣ್ಣಗಳು, ಆಕಾರಗಳು ಮತ್ತು
      ರೂಪಗಳನ್ನು ಹೇಗೆ ಕೇಳಬಹುದು?
    follow_ups:
      - ಇದು ಜೋರಾಗಿ ಅಥವಾ ನಿಧಾನವಾಗಿ ಇದೆಯೇ? ತೀಕ್ಷ್ಣವಾಗಿ ಅಥವಾ ಮೃದುವಾಗಿ?
      - ಯಾವ ವಾದ್ಯ ಅಥವಾ ವಿನ್ಯಾಸ ಇದನ್ನು ಸೆರೆಹಿಡಿಯುತ್ತದೆ?
      - ಈ ಕೃತಿಯಲ್ಲಿ ಮೌನ ಹೇಗೆ ಧ್ವನಿಸುತ್ತದೆ?
  - id: find_the_middle_ground
    name: ಮಧ್ಯಮ ಮಾರ್ಗ ಕಂಡುಕೊಳ್ಳಿ
    prompt: |
      ಕಲಾಕೃತಿಯು ನಿಮ್ಮಿಂದ ಎಷ್ಟು ದೂರದಲ್ಲಿದೆ? ನಿಮ್ಮ ಗಾತ್ರಕ್ಕೆ ಹೋಲಿಸಿದರೆ ಅದು ಎಷ್ಟು
      ದೊಡ್ಡದಾಗಿದೆ? ಎಷ್ಟು ಭಾರ? ಅದು ಎಷ್ಟು ಜಾಗ ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ? ನೀವು ಅದನ್ನು
      ಮನೆಯಲ್ಲಿ ಇಡಬಹುದೇ?
    follow_ups:
      - ನೀವು ಅದನ್ನು ನಿಮ್ಮ ಕೈಯಲ್ಲಿ ಹಿಡಿದುಕೊಳ್ಳಲು ಸಾಧ್ಯವಾದರೆ ಏನು ಬದಲಾಗುತ್ತದೆ?
      - ಅದು ಒಂದು ಕೋಣೆಯ ಗಾತ್ರದಲ್ಲಿದ್ದರೆ?
      - ಗಾತ್ರವು ನಿಮ್ಮೊಂದಿಗಿನ ಸಂಬಂಧವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
  - id: from_the_edges
    name: ಅಂಚುಗಳಿಂದ
    prompt: |
      ಕಲಾಕೃತಿಯು ಎಲ್ಲಿ ಕೊನೆಗೊಳ್ಳುತ್ತದೆ ಮತ್ತು "ವಾಸ್ತವ ಜಗತ್ತು" ಎಲ್ಲಿ ಪ್ರಾರಂಭವಾಗುತ್ತದೆ?
      ನಿಮಗಾಗಿ ಕಲಾಕೃತಿಯ ಅಂಚುಗಳನ್ನು ಮರು-ನಿರ್ವಚಿಸಲು ನಿಮ್ಮ ಕೈಗಳನ್ನು ವೀಕ್ಷಕ
      ಆಗಿ ಬಳಸಲು ಪ್ರಯತ್ನಿಸಬಹುದೇ? ಸ್ಪಷ್ಟವಾದ ಅಂಚು ಇದೆಯೇ?
    follow_ups:
      - ಚೌಕಟ್ಟನ್ನು ಬದಲಾಯಿಸಿದಾಗ ಏನಾಗುತ್ತದೆ?
      - ಏನು ಸೇರಿಸಲಾಗಿದೆ ಅಥವಾ ಹೊರಗಿಡಲಾಗಿದೆ?
      - ಅದರ ಗಡಿಗಳನ್ನು ದಾಟಿ ಕೃತಿಯು ಎಲ್ಲಿ ಹರಿಯಲು ಬಯಸುತ್ತದೆ?
  - id: transmogrify_it
    name: ಅದನ್ನು ರೂಪಾಂತರಿಸಿ
    prompt: |
      ಕಲಾಕೃತಿಯನ್ನು ಬೇರೆ ಪ್ರಕಾರಕ್ಕೆ ಬದಲಾಯಿಸಬಹುದೇ? ಛಾಯಾಚಿತ್ರವನ್ನು ಕ್ರಿಯಾಶೀಲ
      ಚಿತ್ರವಾಗಿ ಅಥವಾ ಸ್ಥಾಪನೆಯನ್ನು ಭೂದೃಶ್ಯವಾಗಿ? ನೀವು ಅದನ್ನು ಹೇಗೆ
      ಮಾಡುತ್ತೀರಿ? ಅದು ಅನುವಾದದಲ್ಲೂ ತನ್ನ ಗುಣಲಕ್ಷಣಗಳನ್ನು ಉಳಿಸಿಕೊಳ್ಳುತ್ತದೆಯೇ?
    follow_ups:
      - ಕೃತಿಯ ಅತ್ಯಗತ್ಯ ಯಾವುದು-ಯಾವುದು ಬದಲಾವಣೆಯನ್ನು ತಡೆದುಕೊಳ್ಳಬೇಕು?
      - ಅನುವಾದದಲ್ಲಿ ಏನು ಗಳಿಸಲಾಗುತ್ತದೆ ಅಥವಾ ಕಳೆದುಕೊಳ್ಳಲಾಗುತ್ತದೆ?
      - ಯಾವ ಪ್ರಕಾರವು ಅದರ ಬಗ್ಗೆ ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
  - id: the_hand_of_the_artist
    name: ಕಲಾವಿದನ ಕೈ
    prompt: |
      ಕಲಾವಿದನ ಬ್ರಷ್‌ಸ್ಟ್ರೋಕ್, ಶಿಲ್ಪಿ ಗುರುತುಗಳು, ಬೆರಳಚ್ಚುಗಳು, ಕೂದಲುಗಳ
      ಸಾಕ್ಷ್ಯಗಳನ್ನು ಹುಡುಕಿ. ಆ ಗುರುತುಗಳನ್ನು ನೀವೇ ಮಾಡುತ್ತಿರುವುದಾಗಿ ಕಲ್ಪಿಸಿಕೊಳ್ಳಿ-ಯಾವ
      ಸ್ಥಾನದಲ್ಲಿ ನೀವು ಇರಬೇಕಾಗುತ್ತದೆ? ಯಾವ ಉಪಕರಣಗಳನ್ನು ನೀವು ಬಳಸುತ್ತೀರಿ?
    follow_ups:
      - ಗುರುತು ತಯಾರಕರ ದೇಹದ ಬಗ್ಗೆ ಏನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
      - ಸನ್ನೆ ಎಲ್ಲಿ ವೇಗವಾಗಿ ಅಥವಾ ನಿಧಾನವಾಗಿ, ಖಚಿತವಾಗಿ ಅಥವಾ ಹಿಂಜರಿಯುತ್ತ ಇದೆ?
      - ಆ ಗುರುತು ಮಾಡುವಾಗ ಹೇಗನಿಸುತ್ತದೆ?
  - id: tell_the_story
    name: ಕಥೆ ಹೇಳಿ
    prompt: |
      ಕಲೆಯ ಇತಿಹಾಸವು ನಿರೂಪಣೆಯಿಂದ ಸಮೃದ್ಧವಾಗಿದೆ, ಮತ್ತು ಇಂದು ಕಲೆ, ಸಾಹಿತ್ಯ ಮತ್ತು
      ಚಲನಚಿತ್ರಗಳ ನಡುವೆ ರೋಮಾಂಚಕ ಸಂವಾದವಿದೆ. ಕಲಾಕೃತಿಯಲ್ಲಿ ಕಥೆಯಿದೆಯೇ? ನೀವು
      ಅದನ್ನು ಹೇಗೆ ಹೇಳುತ್ತೀರಿ?
    follow_ups:
      - ಈ ಕ್ಷಣಕ್ಕೆ ಮೊದಲು ಅಥವಾ ನಂತರ ಏನಾಗುತ್ತದೆ?
      - ನಿರೂಪಕ ಯಾರು? ಯಾರ ಧ್ವನಿ ಕಾಣೆಯಾಗಿದೆ?
      - ಇದು ಚಲನಚಿತ್ರ, ಕಾದಂಬರಿ ಅಥವಾ ಕವಿತೆಯಾಗಿ ಕೆಲಸ ಮಾಡುತ್ತದೆಯೇ?
  - id: shadowboxing
    name: ಛಾಯಾಕುಸ್ತಿ
    prompt: |
      ಚಲಿಸಿ. ತುಂಬಾ ಹತ್ತಿರಕ್ಕೆ ಹೋಗಿ. ಸಾಧ್ಯವಾದಷ್ಟು ದೂರ ಹೋಗಿ. ಬದಿಗಳನ್ನು
      ಬದಲಾಯಿಸಿ. ಎತ್ತರಕ್ಕೆ ಹೋಗಿ. ಕೆಳಗೆ ಹೋಗಿ. ವಿಭಿನ್ನ ಕೋನಗಳನ್ನು ಪ್ರಯತ್ನಿಸಿ.
      ಒಂದೇ ಸ್ಥಳದಲ್ಲಿ ಹೆಚ್ಚು ಹೊತ್ತು ಇರಬೇಡಿ. ನೀವು ಸುತ್ತಲೂ ಚಲಿಸುವಾಗ ಕಲಾಕೃತಿಯು
      ಮಾಡುವ ಬದಲಾವಣೆಗಳನ್ನು ಆನಂದಿಸಿ.
    follow_ups:
      - ನಿಮ್ಮ ಸ್ಥಾನವನ್ನು ಬದಲಾಯಿಸಿದಾಗ ಏನು ಬದಲಾಗುತ್ತದೆ?
      - ಯಾವ ಕೋನವು ನಿಮ್ಮನ್ನು ಅಚ್ಚರಿಗೊಳಿಸಿತು?
      - ನಿಮ್ಮ ದೇಹದ ಚಲನೆಯು ನೀವು ನೋಡುವುದನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
  - id: six_degrees_of_francis_bacon
    name: ಫ್ರಾನ್ಸಿಸ್ ಬೇಕನ್‌ನಿಂದ ಆರು ಡಿಗ್ರಿ
    prompt: |
      ಕಲಾವಿದರು ಇತರ ಕಲಾವಿದರಿಗೆ ಪ್ರಭಾವ ಬೀರುತ್ತಾರೆ. ವಿಷಯಗಳು ಮತ್ತು ಕಲ್ಪನೆಗಳು
      ಪೀಳಿಗೆಗಳಾದ್ಯಂತ ಮತ್ತು ಗಡಿಗಳಾದ್ಯಂತ ವಿಕಸನಗೊಳ್ಳುತ್ತವೆ. ಗ್ಯಾಲರಿಯಲ್ಲಿರುವ
