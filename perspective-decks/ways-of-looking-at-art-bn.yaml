# শিল্পের দিকে তাকানোর উপায় (Bengali)

id: ways_of_looking_at_art
name: শিল্প
description: |
  শিল্পকর্ম দেখার সময় আপনার দৃষ্টিভঙ্গি পরিবর্তন করার জন্য কার্ড। প্রতিটি একটি ভিন্ন লেন্স সরবরাহ করে
  আপনি কীভাবে শিল্পকর্মগুলি দেখেন এবং সেগুলির সাথে জড়িত হন তা গভীর করার জন্য।
domain: art
cards:
  - id: souvenir
    name: স্যুভেনিয়ার
    prompt: |
      শিল্পকর্ম থেকে কিছু একটি বাছাই করুন এবং পরের যে কাজটি দেখবেন তার মধ্যে লুকিয়ে রাখুন।
      কীভাবে আপনি এটি নতুন কম্পোজিশনে ফিট করবেন?
    follow_ups:
      - আপনি কি নিয়ে যেতে চান?
      - নতুন প্রেক্ষাপটে এটি কী লাভ বা হারাবে?
      - এটি কোথায় ফিট করবে—বা ফিট করতে প্রতিরোধ করবে—নতুন কাজে?
  - id: throw_a_party
    name: পার্টি আয়োজন করুন
    prompt: |
      ঘরের সমস্ত শিল্পীকে আমন্ত্রণ জানান। তারা কী পরে থাকবে?
      তারা কী ভাববে?
    follow_ups:
      - কে কার দিকে আকৃষ্ট হবে?
      - তারা কী নিয়ে তর্ক করবে?
      - একে অপরের কাজে কী তাদের অবাক করবে?
  - id: time_out
    name: টাইম আউট
    prompt: |
      বাইরে যান। আলো, শব্দ এবং অনুভূতির উপর মনোযোগ দিন। আপনার চারপাশের সাথে উপস্থিত থাকুন।
      শিল্পকর্ম দেখার অভিজ্ঞতা, শিল্পকর্মগুলির মতোই, এর মধ্যবর্তী স্থানগুলির জন্য।
    follow_ups:
      - আপনি যখন শিল্পের উপর মনোযোগ দেওয়া বন্ধ করেন তখন কী লক্ষ্য করেন?
      - ঘরটি আপনি যা দেখেন তাকে কীভাবে আকার দেয়?
      - আপনি যদি তাড়াহুড়ো করে চলে যান তবে কী মিস করবেন?
  - id: plan_a_trip
    name: একটি ভ্রমণ পরিকল্পনা করুন
    prompt: |
      আজ আপনি যা দেখছেন তা একটি অনেক বড় যাত্রার প্রথম ধাপ হতে পারে। যখন
      আপনি গ্যালারি বা স্থান ত্যাগ করবেন, তখন আপনি পরের কোন শিল্পকর্মটি দেখতে চান তা সিদ্ধান্ত নিন
      এবং এর চারপাশে একটি সম্পূর্ণ ভ্রমণ পরিকল্পনা করুন।
    follow_ups:
      - সেই যাত্রা আপনাকে কোথায় নিয়ে যাবে?
      - পথে কী দেখতে হবে?
      - কেন এই কাজটি—কীভাবে এটি ভ্রমণের যোগ্য করে তোলে?
  - id: in_black_and_white
    name: সাদাকালো
    prompt: |
      আলো এবং অন্ধকারের খেলাগুলিতে মনোযোগ দিন—আপনি এটিকে সাহায্য করার জন্য সাদাকালোতে একটি ছবিও তুলতে পারেন।
      টোনগুলি কোথায় সবচেয়ে অন্ধকার? এটি কীভাবে গভীরতা নির্দেশ করে বা করে না? এটি কম্পোজিশন বুঝতে কীভাবে সহায়তা করে?
    follow_ups:
      - রঙ সরিয়ে নিলে কী অদৃশ্য হয়ে যায়?
      - কী স্পষ্ট হয়ে ওঠে?
      - গ্রেস্কেল সংস্করণে আপনার চোখ প্রথমে কোথায় যায়?
  - id: give_it_a_voice
    name: এটিকে একটি কণ্ঠ দিন
    prompt: |
      এই শিল্পকর্মটি কী শব্দ করবে? আপনি কীভাবে রং, আকার এবং ফর্মগুলি শুনতে পারেন?
    follow_ups:
      - এটি কি জোরে বা শান্ত? তীক্ষ্ণ বা নরম?
      - কোন যন্ত্র বা টেক্সচার এটি ধারণ করতে পারবে?
      - এই কাজে নীরবতা কেমন শোনাবে?
  - id: find_the_middle_ground
    name: মধ্যস্থতা খুঁজুন
    prompt: |
      শিল্পকর্মটি আপনার থেকে কত দূরে? আপনার আকারের তুলনায় এটি কতটা বড়? এটি কতটা ভারী? এটি কতটা জায়গা দখল করে?
      আপনি কি এটিকে একটি বাড়িতে ফিট করতে পারেন?
    follow_ups:
      - যদি আপনি এটিকে আপনার হাতে ধরে রাখতে পারেন তবে কী পরিবর্তন হবে?
      - যদি এটি একটি ঘরের আকারের হয়?
      - স্কেল কীভাবে আপনার সাথে এর সম্পর্ককে আকার দেয়?
  - id: from_the_edges
    name: প্রান্ত থেকে
    prompt: |
      শিল্পকর্মটি কোথায় শেষ হয় এবং "বাস্তব জগৎ" কোথায় শুরু হয়? আপনি কি নিজের জন্য শিল্পকর্মের প্রান্তগুলি পুনরায় সংজ্ঞায়িত করতে আপনার হাত ভিউফাইন্ডার হিসাবে ব্যবহার করার চেষ্টা করতে পারেন?
      একটি স্বতন্ত্র প্রান্ত আছে কি?
    follow_ups:
      - ফ্রেম পরিবর্তন করলে কী হয়?
      - কী অন্তর্ভুক্ত বা বাদ দেওয়া হয়?
      - কাজটি তার সীমানা ছাড়িয়ে কোথায় ছড়িয়ে পড়তে চায়?
  - id: transmogrify_it
    name: এটিকে রূপান্তরিত করুন
    prompt: |
      যদি আপনি শিল্পকর্মটিকে অন্য কোনো জেনারে পরিবর্তন করতে পারতেন? একটি ফটোগ্রাফ একটি অ্যাকশন পেইন্টিং-এ বা একটি ইনস্টলেশন একটি ল্যান্ডস্কেপে?
      আপনি এটি কীভাবে করবেন? অনুবাদের পরেও কি এটি তার চরিত্র ধরে রাখবে?
    follow_ups:
      - কাজের জন্য অপরিহার্য কী—পরিবর্তনের পরেও কী টিকে থাকতে হবে?
      - অনুবাদে কী লাভ বা ক্ষতি হবে?
      - কোন জেনার এটি সম্পর্কে নতুন কিছু প্রকাশ করবে?
  - id: the_hand_of_the_artist
    name: শিল্পীর হাত
    prompt: |
      শিল্পীর ব্রাশস্ট্রোক, ছেনি, আঙুলের ছাপ, এমনকি চুলের প্রমাণ খুঁজুন।
      নিজেই সেই চিহ্নগুলি তৈরি করার কল্পনা করুন—আপনাকে কী অবস্থানে যেতে হবে? আপনি কোন সরঞ্জাম ব্যবহার করবেন?
    follow_ups:
      - চিহ্নটি নির্মাতার শরীর সম্পর্কে কী প্রকাশ করে?
      - কোথায় অঙ্গভঙ্গি দ্রুত বা ধীর, নিশ্চিত বা দ্বিধাগ্রস্ত?
      - সেই চিহ্নটি তৈরি করা কেমন লাগবে?
  - id: tell_the_story
    name: গল্প বলুন
    prompt: |
      শিল্পের ইতিহাস আখ্যানের সমৃদ্ধ, এবং আজ শিল্প, সাহিত্য এবং চলচ্চিত্রের মধ্যে একটি উত্তেজনাপূর্ণ সংলাপ রয়েছে।
      শিল্পকর্মে কি একটি গল্প আছে? আপনি এটি কীভাবে বলবেন?
    follow_ups:
      - এই মুহূর্তের আগে বা পরে কী ঘটে?
      - বর্ণনাকারী কে? কার কণ্ঠ অনুপস্থিত?
      - এটি কি একটি চলচ্চিত্র, একটি উপন্যাস বা একটি কবিতা হিসাবে কাজ করবে?
  - id: shadowboxing
    name: শ্যাডোবক্সিং
    prompt: |
      ঘুরে বেড়ান। খুব কাছে যান। যত দূরে সম্ভব যান। পাশ পরিবর্তন করুন।
      উপর যান। নিচে যান। বিভিন্ন কোণ চেষ্টা করুন। বেশিক্ষণ একই জায়গায় থাকবেন না।
      আপনি ঘোরার সাথে সাথে শিল্পকর্মের পরিবর্তনগুলি উপভোগ করুন।
    follow_ups:
      - আপনি যখন আপনার অবস্থান পরিবর্তন করেন তখন কী পরিবর্তন হয়?
      - কোন কোণটি আপনাকে অবাক করেছে?
      - আপনার শরীরের নড়াচড়া আপনি যা দেখেন তা কীভাবে পরিবর্তন করে?
  - id: six_degrees_of_francis_bacon
    name: ফ্রান্সিস বেকনের ছয় ডিগ্রি
    prompt: |
      শিল্পীরা অন্য শিল্পীদের প্রভাবিত করেন। থিম এবং ধারণা প্রজন্ম এবং সীমানা জুড়ে বিকশিত হয়।
      যতটা সম্ভব কম লিঙ্ক ব্যবহার করে শিল্পকর্মটিকে গ্যালারির অন্য একটি কাজের সাথে সংযুক্ত করুন।
    follow_ups:
      - আপনি সবচেয়ে ছোট পথ কী খুঁজে পেতে পারেন?
      - কোন ধরনের সংযোগ সবচেয়ে শক্তিশালী—কৌশল, বিষয়, মেজাজ, নাকি ধারণা?
      - শিল্পী সংযোগের ব্যাপারে কী ভাববেন?
  - id: headlines
    name: শিরোনাম
    prompt: |
      শিল্পকর্মটি যেদিন তৈরি হয়েছিল সেদিনটি কল্পনা করুন এবং সেই দিনের জন্য একটি সংবাদপত্রের শিরোনাম খুঁজুন বা তৈরি করুন।
      আজকের প্রথম পৃষ্ঠাগুলির সাথে তুলনা করুন।
    follow_ups:
      - ফোল্ডের উপরে কী থাকবে?
      - কী পরিবর্তিত হয়েছে—এবং কী হয়নি?
      - শিরোনামটি কীভাবে কাজটি নতুনভাবে তৈরি করে?
  - id: speed_date
    name: স্পিড ডেট
    prompt: |
      প্রতিটি শিল্পকর্মের সাথে মাত্র ১০ সেকেন্ড সময় নিন। এটি করুন যতক্ষণ না আপনি সবগুলি দেখে ফেলেছেন বা আপনার শক্তি ফুরিয়ে গেছে, তারপর আপনার পছন্দেরগুলিতে ফিরে যান এবং সেখানে থাকুন।
      এখন আপনি তাদের কীভাবে দেখছেন? কোনটির দিকে আপনি বেশি আকৃষ্ট হচ্ছেন?
    follow_ups:
      - দ্রুত পার হওয়ার ফলে কী জানা গেল যা হয়তো দীর্ঘক্ষণ থাকলে জানা যেত না?
      - কেন আপনি সেই নির্দিষ্ট কাজগুলিতে ফিরে এসেছিলেন?
      - দ্বিতীয়বার দেখা প্রথমবার থেকে কীভাবে আলাদা ছিল?
  - id: make_connections
    name: সংযোগ তৈরি করুন
    prompt: |
      বাড়ির পথে, এমন কিছু খুঁজুন যা আপনাকে শিল্পকর্ম বা এর অংশ—একটি আকার বা রঙ, সম্ভবত একটি শব্দ, এমনকি একটি সংবেদন—মনে করিয়ে দেয়।
    follow_ups:
      - আপনি কী খুঁজে পেয়েছেন?
      - প্রতিধ্বনি কীভাবে আসলটিকে দেখার আপনার ক্ষমতাকে পরিবর্তন করেছে?
      - যদি আপনি পারতেন তবে আপনি শিল্পীকে কী দেখাতেন?
  - id: dinner_party
    name: ডিনার পার্টি
    prompt: |
      একটি শিল্পকর্মকে একটি স্বাদের সাথে মেলান। এটি আপনাকে কোন খাবার বা পানীয়ের কথা মনে করিয়ে দেয়?
      একটি ভোজের আয়োজন করুন।
    follow_ups:
      - মেনু দেখতে কেমন হবে?
      - কে কোথায় বসবে?
      - প্রথম কামড় কেমন স্বাদ হবে?
  - id: head_off_piste
    name: অফ-পিস্টে যান
    prompt: |
