    description: |
      Kaliforniya süper çiçeklenmesini deneyimlerken bakış açınızı
      değiştirecek 20 kart. Her kart tozlayıcılardan ve jeolojiden ışığa,
      kokulara ve geçiciliğe kadar farklı bir mercek sunar—kır çiçeklerini
      ve geçici renk patlamasını nasıl gördüğünüzü derinleştirmek için.
    domain: california_superbloom
