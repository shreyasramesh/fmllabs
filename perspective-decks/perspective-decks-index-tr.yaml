# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Turkish)

domains:
  art:
    name: Sanata Bakış Açıları
    description: |
      Sanat eserlerini incelerken bakış açınızı değiştirecek kartlar. Her biri
      ışık ve gölgeden girişlere ve duyguya kadar farklı bir mercek sunar—
      eserleri nasıl gördüğünüzü ve onlarla nasıl etkileşim kurduğunuzu derinleştirmek için.
  urban_jungle:
    name: Kentsel Orman
    description: |
      Bir şehirden sadece yürüyerek geçmek yerine, onu canlı bir organizma
      olarak görün. Kartlar eski binaların yaralarına, trafiğin koreografisine
      ve ara sokakların gizli yaşamlarına odaklanır.
  culinary_lab:
    name: Mutfak Laboratuvarı
    description: |
      Lezzetten dönüşüme geçiş. Bir lokmanın kimyasını, bir malzemenin
      tarihini ve bir restoranın müziğini keşfedin.
  natural_microcosm:
    name: Doğal Mikrokozmos
    description: |
      Bir park veya arka bahçe için mükemmel. Bu mercek, bir yaprağın
      görünmez mühendisliğine, bir kayanın ağır çekim yaşamına veya böceklerin
      bölgesel dramalarına odaklanır.
  human_interface:
    name: İnsan Etkileşimi
    description: |
      İnsanların buluştuğu günlük alanlar—kahve dükkanları, ulaşım merkezleri,
      iş yerleri, perakende mağazaları, halka açık parklar. Kartlar sıra
      koreografisine, bölge iddialarına, görünmez senaryolara ve paylaşılan
      alan antropolojisine odaklanır.
  california_superbloom:
    name: Kaliforniya Süper Çiçeklenmesi
    description: |
      Kış yağmurundan sonraki geçici kır çiçekleri patlaması. Kartlar renk,
      ölçek, tozlayıcılar, jeoloji, hava durumu ve çiçeklenmenin geçici
      gösterisine odaklanır.
