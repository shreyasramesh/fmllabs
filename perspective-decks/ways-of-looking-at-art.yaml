# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# Ways of Looking at Art

id: ways_of_looking_at_art
name: Ways of Looking at Art
description: |
  Cards to shift your perspective when viewing art. Each offers a different lens
  to deepen how you see and engage with artworks.
domain: art

cards:
  - id: souvenir
    name: Souvenir
    prompt: |
      Pick something out from the artwork and hide it in the next piece you look at.
      How would you fit it into the new composition?
    follow_ups:
      - What would you choose to carry over?
      - What would it gain or lose in the new context?
      - Where would it fit—or resist fitting—in the new work?

  - id: throw_a_party
    name: Throw a party
    prompt: |
      Invite all the artists in the room. What would they be wearing?
      What would they think about?
    follow_ups:
      - Who would gravitate toward whom?
      - What would they argue about?
      - What would surprise them in each other's work?

  - id: time_out
    name: Time out
    prompt: |
      Step outside. Focus on light, sounds, and sensations. Be present with your
      surroundings. The experience of looking at art is as much about the spaces
      in between as the artworks themselves.
    follow_ups:
      - What do you notice when you stop focusing on the art?
      - How does the room shape what you see?
      - What would you miss if you rushed through?

  - id: plan_a_trip
    name: Plan a trip
    prompt: |
      What you see today might be the first step on a much bigger journey. When
      you leave the gallery or space, decide which artwork you want to see next
      and plan a whole trip around it.
    follow_ups:
      - Where would that journey take you?
      - What would you need to see along the way?
      - Why this work—what makes it worth traveling for?

  - id: in_black_and_white
    name: In black and white
    prompt: |
      Focus on the play of lights and darks—you can even take a photo in black and
      white to help. Where are the tones darkest? How does this suggest depth or
      not? How does this aid your understanding of the composition?
    follow_ups:
      - What disappears when you remove color?
      - What becomes clearer?
      - Where does your eye go first in the grayscale version?

  - id: give_it_a_voice
    name: Give it a voice
    prompt: |
      What sounds would this artwork make? How might you hear the colours, the
      shapes and the forms?
    follow_ups:
      - Is it loud or quiet? Sharp or soft?
      - What instrument or texture would capture it?
      - What would silence sound like in this work?

  - id: find_the_middle_ground
    name: Find the middle ground
    prompt: |
      How far away is the artwork from you? How big is it in relation to your
      size? How heavy? How much space does it take up? Could you fit it in a house?
    follow_ups:
      - What would change if you could hold it in your hand?
      - What if it were the size of a room?
      - How does scale shape your relationship to it?

  - id: from_the_edges
    name: From the edges
    prompt: |
      Where does the artwork end and the "real world" begin? Can you try using
      your hands as a viewfinder to redefine the edges of the artwork for
      yourself? Is there a discernible edge?
    follow_ups:
      - What happens when you change the frame?
      - What gets included or excluded?
      - Where does the work want to spill beyond its boundaries?

  - id: transmogrify_it
    name: Transmogrify it
    prompt: |
      What if you could change the artwork to another genre? A photograph into an
      action painting or an installation into a landscape? How would you do it?
      Would it still retain its character even in translation?
    follow_ups:
      - What is essential to the work—what must survive the change?
      - What would be gained or lost in the translation?
      - Which genre would reveal something new about it?

  - id: the_hand_of_the_artist
    name: The Hand of the Artist
    prompt: |
      Hunt for evidence of the artist's brushstrokes, chisel marks, fingerprints,
      even hairs. Imagine making those marks yourself—what position would you need
      to get into? What tools would you use?
    follow_ups:
      - What does the mark reveal about the maker's body?
      - Where is the gesture fast or slow, sure or hesitant?
      - What would it feel like to make that mark?

  - id: tell_the_story
    name: Tell the story
    prompt: |
      The history of art is rich with narrative, and today there is an exciting
      dialogue between art, literature, and film. Is there a story in the
      artwork? How do you tell it?
    follow_ups:
      - What happens before or after this moment?
      - Who is the narrator? Whose voice is missing?
      - Would it work as a film, a novel, or a poem?
