# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (German)

domains:
  art:
    name: Kunst
    description: |
      Karten, um Ihre Perspektive beim Betrachten von Kunst zu ändern. Jede bietet eine andere
      Linse – von Licht und Schatten bis hin zu Einführungen und Emotionen –, um zu vertiefen, wie Sie
      Kunstwerke sehen und mit ihnen interagieren.
  urban_jungle:
    name: Urbane Dschungel
    description: |
      Anstatt einfach durch eine Stadt zu gehen, betrachten Sie sie als einen lebendigen Organismus.
      Die Karten konzentrieren sich auf die Narben alter Gebäude, die Choreografie des Verkehrs
      und das geheime Leben von Gassen.
  culinary_lab:
    name: Kulinarisches Labor
    description: |
      Vom Leckeren zum Transformierenden. Erkunden Sie die Chemie eines Bisses,
      die Geschichte einer Zutat und den Soundtrack eines Restaurants.
  natural_microcosm:
    name: Natürlicher Mikrokosmos
    description: |
      Perfekt für einen Park oder einen Hinterhof. Diese Linse konzentriert sich auf die unsichtbare
      Konstruktion eines Blattes, das Zeitlupenleben eines Steins oder die territorialen
      Dramen von Insekten.
  human_interface:
    name: Die menschliche Schnittstelle
    description: |
      Die alltäglichen Räume, in denen sich Menschen treffen – Cafés, Verkehrsknotenpunkte,
      Arbeitsplätze, Einzelhandel, öffentliche Parks. Karten konzentrieren sich auf Warteschlangenchoreografie,
      territoriale Ansprüche, unsichtbare Skripte und die Anthropologie des gemeinsamen Raums.
  california_superbloom:
    name: Kalifornische Superblüte
    description: |
      Der vergängliche Ausbruch von Wildblumen nach dem Winterregen. Karten konzentrieren sich auf Farbe,
      Größe, Bestäuber, Geologie, Wetter und das flüchtige Schauspiel der Blüte.
