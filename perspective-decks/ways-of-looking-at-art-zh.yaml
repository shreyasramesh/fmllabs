# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# 艺术的观看方式 (Mandarin Chinese)

id: ways_of_looking_at_art
name: 艺术的观看方式
description: |
  用于转变观看艺术品视角的卡片。每张卡片都提供了一个不同的视角，
  以加深你对艺术作品的观看和互动。
domain: art
cards:
  - id: souvenir
    name: 纪念品
    prompt: |
      从一幅艺术品中挑选一些元素，并将它们“隐藏”在你接下来观看的另一件作品中。
      你将如何将它们融入新的构图？
    follow_ups:
      - 你会选择带走什么？
      - 在新的语境中，它会获得还是失去什么？
      - 它会放在新作品的何处——或者抵制融入新作品？
  - id: throw_a_party
    name: 举办派对
    prompt: |
      邀请房间里的所有艺术家。他们会穿什么？
      他们会想些什么？
    follow_ups:
      - 谁会和谁靠近？
      - 他们会争论什么？
      - 在彼此的作品中，什么会让他们感到惊讶？
  - id: time_out
    name: 休息一下
    prompt: |
      走出去。专注于光线、声音和感受。活在当下，感受你周围的环境。
      观看艺术的体验，同样关乎那些“之间”的空间，就像关乎艺术品本身一样。
    follow_ups:
      - 当你停止专注于艺术品时，你注意到了什么？
      - 这个房间是如何塑造你所见的？
      - 如果你匆匆而过，你会错过什么？
  - id: plan_a_trip
    name: 规划一次旅行
    prompt: |
      你今天看到的东西，可能是更宏大旅程的第一步。当你离开画廊或空间时，
      决定你接下来想看哪件艺术品，并围绕它来规划一次完整的旅行。
    follow_ups:
      - 这段旅程会把你带到哪里？
      - 在路上你需要看到什么？
      - 为什么是这件作品——它为何值得远行？
  - id: in_black_and_white
    name: 黑白之间
    prompt: |
      专注于明暗的对比——你甚至可以拍一张黑白照片来帮助。哪里是最暗的？
      这如何暗示深度，或不暗示？这如何帮助你理解构图？
    follow_ups:
      - 当你去除颜色时，什么消失了？
      - 什么变得更清晰了？
      - 在灰度版本中，你的视线首先会去哪里？
  - id: give_it_a_voice
    name: 赋予它声音
    prompt: |
      这件艺术品会发出什么样的声音？你可能会听到色彩、形状和形式的声音吗？
    follow_ups:
      - 是响亮还是安静？尖锐还是柔和？
      - 哪种乐器或质感能捕捉到它？
      - 在这件作品中，沉默会是怎样的声音？
  - id: find_the_middle_ground
    name: 寻找中间地带
    prompt: |
      艺术品离你有多远？与你的体型相比，它有多大？多重？它占据多大的空间？
      你能把它放在一个房子里吗？
    follow_ups:
      - 如果你能把它捧在手里，什么会改变？
      - 如果它有房间那么大呢？
      - 尺寸是如何塑造你与它的关系的？
  - id: from_the_edges
    name: 从边缘看
    prompt: |
      艺术品在哪里结束，“真实世界”在哪里开始？你能尝试用双手作为取景器来重新定义
      艺术品的边缘吗？是否存在一个可辨别的边缘？
    follow_ups:
      - 当你改变框架时，会发生什么？
      - 什么被包含进来，什么被排除在外？
      - 这件作品想要溢出其边界的愿望在哪里？
  - id: transmogrify_it
    name: 变形
    prompt: |
      如果你能将这件艺术品变成另一种类型呢？一张照片变成行动绘画，
      或一个装置艺术变成风景画？你会怎么做？
      即使在转换后，它还会保留其特征吗？
    follow_ups:
      - 对作品而言，什么才是本质——什么必须在变化中得以保存？
      - 在转换中，什么会被获得，什么会被失去？
      - 哪种类型会揭示关于它的新东西？
  - id: the_hand_of_the_artist
    name: 艺术家的手
    prompt: |
      寻找艺术家笔触、凿痕、指纹，甚至头发的痕迹。想象你自己也在创作——
      你需要处于什么样的姿势？你会使用什么工具？
    follow_ups:
      - 这个笔触揭示了创作者身体的哪些信息？
      - 笔触是快速还是缓慢，是肯定还是犹豫？
      - 创作这个笔触会是什么感觉？
  - id: tell_the_story
    name: 讲述故事
    prompt: |
      艺术史充满了叙事，而今天，艺术、文学和电影之间有着令人兴奋的对话。
      这件艺术品里有故事吗？你如何讲述它？
    follow_ups:
      - 这个时刻之前或之后发生了什么？
      - 叙述者是谁？谁的声音缺失了？
      - 它会作为一部电影、一部小说，还是一首诗起作用？
  - id: shadowboxing
    name: 影子拳击
    prompt: |
      走动。走得很近。尽可能地远离。换边。
      向上看。向下看。尝试不同的角度。不要在一个地方停留太久。
      享受当你围绕着它移动时，艺术品所呈现的变化。
    follow_ups:
      - 当你改变位置时，什么发生了变化？
      - 哪个角度让你感到惊讶？
      - 你身体的移动如何改变你所见？
  - id: six_degrees_of_francis_bacon
    name: 弗朗西斯·培根的六度分离
    prompt: |
      艺术家影响其他艺术家。主题和思想在几代人之间和跨越国界而演变。
      用尽可能少的联系，将这件艺术品与画廊里的另一件联系起来。
    follow_ups:
      - 你能找到的最短路径是什么？
      - 哪种联系最强——技巧、主题、情绪，还是想法？
      - 艺术家会如何看待这种联系？
  - id: headlines
    name: 头条新闻
    prompt: |
      想象艺术品创作的那一天，找出或编造一条当天的报纸头条。
      将其与今天的头版进行比较。
    follow_ups:
      - “头版”上会有什么？
      - 哪些改变了——又有哪些没有？
      - 头条新闻如何重新解读这件作品？
  - id: speed_date
    name: 速配
    prompt: |
      与每件艺术品相处仅10秒钟。这样做，直到你看完所有作品，
      或者直到你精疲力尽，然后回到你最喜欢的作品旁，久久驻足。
      你现在如何看待它们？你发现自己被哪些作品吸引回去？
    follow_ups:
      - 快速浏览揭示了什么，而久久驻足可能会错过？
      - 为什么你会回到那些特定的作品？
      - 第二次观看与第一次有何不同？
  - id: make_connections
    name: 建立联系
    prompt: |
      在回家的路上，寻找让你想起这件艺术品，或其一部分的东西——
      也许是一个形状或颜色，一个词，甚至一种感觉。
    follow_ups:
      - 你找到了什么？
      - 这个回声如何改变你看待原作的方式？
      - 如果可以，你会给艺术家看什么？
  - id: dinner_party
    name: 晚宴
    prompt: |
      将一件艺术品与一种味道相匹配。它让你想起什么食物或饮料？
      准备一场盛宴。
    follow_ups:
      - 菜单会是什么样子？
      - 谁会坐在哪里？
      - 第一口尝起来会是什么味道？
  - id: head_off_piste
    name: 跑偏
    prompt: |
      请画廊工作人员指出他们最喜欢的一件作品，或者远离卡片，看看你能找到什么。
    follow_ups:
      - 在“非热门路线”上你发现了什么？
      - 他们的最爱与你的有何不同？
      - 你会向别人推荐什么？
  - id: make_it_an_mixtape
    name: 制作混音带
    prompt: |
      这件艺术品让你想到一首特定的歌曲或一段音乐吗？
      艺术与音乐以不同的方式重叠，并且经常共享相似的语言。
      它们有哪些共同的特质？为每次画廊参观或为单个艺术家制作一个播放列表。
    follow_ups:
      - 开场曲是什么？
      - 作品与音乐之间的联系是什么——节奏、情绪、质感？
      - 如果一年后你再次参观，播放列表会如何变化？
  - id: read_in_context
    name: 在上下文中阅读
    prompt: |
      这件艺术品在哪里？它的周围环境如何影响它的呈现？
      它是在广告牌上，画廊外面，还是湖中央？倾听作品与其周围环境之间的对话。
    follow_ups:
      - 如果它在别处，会有什么改变？
      - 房间或空间在回应什么？
      - 这里的观众是谁——又缺少谁？
  - id: understand_it_less
    name: 少去理解
    prompt: |
      拥抱你的好奇心。问问自己，你对这件艺术品的体验中有什么奇怪或新颖之处？
      你如何能让它变得更奇怪？试着少去理解它，从而放下对它“应该意味着什么”的执念！
    follow_ups:
      - 为了新鲜地看待它，你需要忘记什么？
      - 哪个问题没有答案——为什么它很重要？
      - “弄错”会是什么样子？
  - id: chaos_or_control
    name: 混乱还是控制？
    prompt: |
      它看起来是随机的，还是有计划的？机会、意外和偶然性在艺术品的创作中都起着作用——
      有时是重要的作用。试着找出哪些是自然发生的，哪些是被控制的。
    follow_ups:
      - 艺术家在哪里掌控着方向——又在哪里放手？
      - 什么样的意外可能变得至关重要？
      - 更多的混乱——或更多的控制——会如何改变作品？
  - id: palimpsest
    name: 羊皮纸手稿
    prompt: |
      寻找层次！隐藏了什么，又揭示了什么？这件作品有多厚？
      表面是随着时间而构建的吗？
    follow_ups:
      - 表面之下是什么？
      - 如果你能把它剥开，会发现什么？
      - 时间如何在这些层次中显现？
  - id: pattern_recognition
    name: 图案识别
    prompt: |
      留意重复的元素。是否存在一个图案？是否有重复的主题？
      某些形状是否相互呼应？
    follow_ups:
      - 什么打破了图案——为什么？
      - 重复将你的视线引向何处？
      - 如果你沿着一个主题追踪整个作品，会发生什么？
  - id: through_another_pair_of_eyes
    name: 通过另一双眼睛
    prompt: |
      回想小说、电影、戏剧中的一个角色，或一位历史人物。
      想象一下与他们就这件艺术品进行一次对话。你会同意他们的看法吗？
    follow_ups:
      - 他们会注意到你错过了什么？
      - 你会在哪里意见不合——又为什么？
      - 他们会问你关于它的什么问题？
  - id: thermostat
    name: 温度计
    prompt: |
      一种颜色是什么温度？寻找艺术品中最冷的颜色，然后找出较暖的色调。
      在一件艺术品中你能找到多少种生态系统？
    follow_ups:
      - 冷与热在哪里相遇——在那里会发生什么？
      - 这件作品唤起了什么样的气候？
      - 如果你走进它的温度，会是什么感觉？
  - id: negative_space
    name: 负空间
    prompt: |
      艺术品中各个元素之间的空隙，与元素本身一样重要。
      就像拼图一样，要注意缺失的部分。负空间：它如何框定现有的东西？
      感受它的重要性。
    follow_ups:
      - 空虚形成了什么形状？
      - 什么会填补这些空白——应该吗？
      - 负空间如何将构图结合在一起？
  - id: make_yourself_at_home
    name: 宾至如归
    prompt: |
      想象一下爬进这件艺术品里。你会藏在哪里？你能看到什么？
      感觉如何？
    follow_ups:
      - 从里面你会听到什么？
      - 你会觉得哪里最安全——或最暴露？
      - 如果你能留下，你会带走什么？
  - id: homage
    name: 致敬
    prompt: |
      为你最喜欢的艺术家制作一个祭坛或一个小型展览。
      从商店的一张明信片开始，或者寻找参考并为他们的作品增添深度和色彩的物品和图像。
    follow_ups:
      - 什么会放在你祭坛的中央？
      - 哪件物品会让他们感到惊讶？
      - 策展的行为如何改变你看待他们作品的方式？
  - id: warm_up
    name: 热身
    prompt: |
      唤醒你的身体，为你的感官做准备。跑、跳、伸展、拍手、扭动脚趾。
      在看艺术品时，注意你身体的任何生理感觉。
    follow_ups:
      - 你身体的哪个部位能感受到这件作品？
      - 运动如何改变你所见？
      - 当你移开视线后，什么感觉仍然存在？
  - id: make_it_anew
    name: 重新创作
    prompt: |
      在家，用手头的一切来重现一件艺术品。写下来，画出来，用火柴搭起来。
      你的方法越简单越好。看看什么能留在你的脑海里，你在自己的演绎中注意到什么。
    follow_ups:
      - 你在不经意间记住了什么？
      - 你的版本有什么不对——为什么它很重要？
      - 如果你还有一分钟，你会添加什么？
  - id: origin_story
    name: 起源故事
    prompt: |
      你还记得你看过的第一件艺术品吗？你在哪里？你多大了？
      试着回忆你所在的房间，光线和声音，观看它的感觉。
      你现在看到的艺术品，有什么可以与那时的经历联系起来吗？
    follow_ups:
      - 在你看待艺术品的方式上，什么保持不变？
      - 那个年轻的你会如何看待这件作品？
      - 从那时到现在，哪条线索贯穿其中？
  - id: words_and_images
    name: 文字与图像
    prompt: |
      在不看艺术品的情况下，阅读描述，闭上眼睛，试着想象它。
      然后睁开眼睛。它与你的想象相符吗？
    follow_ups:
      - 文字遗漏了什么？
      - 你添加了什么，而它原本没有？
      - 你的心理图像如何改变你看待真实图像的方式？
  - id: keep_a_notebook
    name: 记笔记
    prompt: |
      记录日期、艺术品和你对它们的反应。回顾你的笔记，寻找新的艺术品。
    follow_ups:
      - 阅读你的笔记时，出现了什么模式？
      - 你会告诉过去的自己什么？
      - 笔记本想带你下一步去哪里？
  - id: write_a_postcard
    name: 写明信片
    prompt: |
      给一件你特别有共鸣的艺术品写一张明信片。你会说什么？
      它会如何回复？
    follow_ups:
      - 你需要说什么，但又不能大声说出来？
      - 它的笔迹会是什么样子？
      - 你会保留什么——又会永不寄出什么？
  - id: here_today_gone
    name: 今日在此，明日何在……？
    prompt: |
      并非所有艺术品都能经受时间的考验，也不是所有艺术家的意图都如此。
      一次事件或表演可能只存在一个晚上，也许几分钟，甚至几秒钟！
      也许你正在看一件短暂、临时的艺术品的记录。它会持续多久？
    follow_ups:
      - 如果它明天消失了，什么会被丢失？
      - 什么会以记忆、照片或故事的形式得以保留？
      - 它的短暂性是否改变了你看待它的方式？
  - id: wrap_it_up
    name: 包起来
    prompt: |
      如果你能把这件艺术品包起来呢？你还能分辨出它是什么吗？
      另一件艺术品能装进同一个包裹吗？
    follow_ups:
      - 包裹会是什么形状？
      - 包装纸会是什么样子？
      - 什么才是必不可少的——又什么可以被替换？
  - id: trace_a_path
    name: 描绘路径
    prompt: |
      当你遇到一件艺术品时，你会看什么？你的视线接下来会游走到哪里？
      你的目光最终停留在哪里？标记这些点，然后将它们连接起来。
    follow_ups:
      - 你会一直回到哪里？
      - 你跳过了什么——又为什么？
      - 你的路径与别人的相比如何？
  - id: superficial
    name: 表面
    prompt: |
      它的表面是什么样的？它吸收光线还是反射光线？它是光滑的还是多孔的？
      它是分层的、精细的，还是粗糙的？不要害怕浅显！
    follow_ups:
      - 触摸起来会是什么感觉？
      - 表面揭示了什么——又隐藏了什么？
      - 当你停留在表面时，会发生什么？
  - id: studio_visit
    name: 工作室参观
    prompt: |
      艺术家的工作室和艺术家一样多。想象一下艺术品被创作的空间：
      布鲁克林的仓库，巴黎的画室，忙碌家庭的厨房餐桌——或者可能是一个不太可能的地方。
    follow_ups:
      - 在那个空间里你会听到什么？
      - 是什么时间创作的？
      - 想象中的地方如何改变你看待作品的方式？
  - id: switch_channels
    name: 切换频道
    prompt: |
      看看人，而不是艺术品。他们如何对待这件作品？
      他们在看什么？你能猜到他们有什么感觉吗？
    follow_ups:
      - 谁会驻足——谁会匆匆走过？
      - 如果你问他们，他们会说什么？
      - 观察别人如何改变你注意到的东西？
  - id: light
    name: 光
    prompt: |
      寻找光源。它从哪里来？阴影里有什么？
      专注于艺术家想让我们看到的东西，以及隐藏在阴影里的东西。
    follow_ups:
      - 光线揭示了什么？
      - 阴影可能隐藏着什么？
      - 在不同的光线下，这件作品会如何改变？
  - id: introductions
    name: 介绍
    prompt: |
      像在派对上介绍一位熟人一样，将一件艺术品介绍给朋友。
      你会如何描述它以引起他们的兴趣？什么吸引了你？
    follow_ups:
      - 你会首先强调什么？
      - 你会省略什么？
      - 什么样的“钩子”会让他们想去认识它？
  - id: tipping_point
    name: 临界点
    prompt: |
      艺术品的中心在哪里？它是否失去平衡？寻找那个临界点。
    follow_ups:
      - 什么会把它推倒？
      - 什么让它保持平衡？
      - 不平衡是如何产生张力——或释放的？
  - id: homing
    name: 回归
    prompt: |
      不断回头。在不同的日子或一天中的不同时间回到你最喜欢的艺术品——
      冬天早晨，夏天傍晚。记录你的感受；每次访问你的感受都会改变。
    follow_ups:
      - 在多次访问中，什么保持不变？
      - 什么时候它最让你惊讶？
      - 你会告诉过去的自己关于它的什么？
  - id: one_and_only
    name: 独一无二
    prompt: |
      为了避免不知所措，只选择一件艺术品来观看，或者最多选择几件。
      进行一次深入的探索，并与每一件作品尽可能长时间地相处。
      你可以在一件艺术品前使用多少张卡片？
    follow_ups:
      - 第二次浏览时你注意到了什么？
      - 哪些卡片揭示了新的东西？
      - 你是什么时候知道该继续前进的？
  - id: press_pause
    name: 按下暂停
    prompt: |
      放慢速度。开始观看时闭上眼睛，放松并专注于你的呼吸，
      慢慢睁开眼睛，重新聚焦，给艺术品时间在你面前展开。
    follow_ups:
      - 当你放慢速度时，什么出现了？
      - 当你睁开眼睛时，你首先注意到什么？
      - 你的呼吸如何改变你所见？
  - id: material
    name: 材料
    prompt: |
      艺术品是由什么制成的？如果它是由其他东西制成的呢？
      越不协调越好。它会改变你对它的感受吗？
    follow_ups:
      - 最令人惊讶的替代品会是什么？
      - 材料为意义增加了什么？
      - 交换后会保留什么——又会失去什么？
  - id: patch_of_sky
    name: 一片天空有多少种颜色？
    prompt: |
      放大艺术品的一个区域。你看到了多少种颜色？
      在博物馆外面，抬头看看，试着数一数你能看到的一片天空中有多少种颜色。
    follow_ups:
      - 当你看着整体时，你错过了什么？
      - 天空与艺术品相比如何？
      - 哪种颜色最让你惊讶？
  - id: greening
    name: 绿化
    prompt: |
      这件艺术品会是什么样的植物？它会是一棵盛夏的桃树，硕果累累，
      还是更像一株精致的蕨类植物？它需要什么条件才能生长？
    follow_ups:
      - 在哪里它会茁壮成长——又在哪里它会枯萎？
      - 它需要什么才能绽放？
      - 植物的比喻如何改变你看待它的方式？
