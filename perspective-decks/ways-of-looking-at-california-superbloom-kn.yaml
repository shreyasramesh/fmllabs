# ಕ್ಯಾಲಿಫೋರ್ನಿಯಾ ಸೂಪರ್‌ಬ್ಲೂಮ್ ಅನ್ನು ನೋಡುವ ಮಾರ್ಗಗಳು (Kannada)

id: ways_of_looking_at_california_superbloom
name: ಕ್ಯಾಲಿಫೋರ್ನಿಯಾ ಸೂಪರ್‌ಬ್ಲೂಮ್ ಅನ್ನು ನೋಡುವ ಮಾರ್ಗಗಳು
description: |
  ಕ್ಯಾಲಿಫೋರ್ನಿಯಾ ಸೂಪರ್‌ಬ್ಲೂಮ್ ಅನ್ನು ಅನುಭವಿಸುವಾಗ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಾಯಿಸಲು ಕಾರ್ಡ್‌ಗಳು.
  ಪ್ರತಿ ಹೂವು, ಬೆಟ್ಟಗಳು ಮತ್ತು
  ಚಳಿಗಾಲದ ಮಳೆಯ ನಂತರ ಬಣ್ಣದ ತಾತ್ಕಾಲಿಕ ಸ್ಫೋಟವನ್ನು ನೀವು ಹೇಗೆ ನೋಡುತ್ತೀರಿ ಎಂಬುದನ್ನು ಗಾಢವಾಗಿಸಲು ವಿಭಿನ್ನ ಲೆನ್ಸ್ ನೀಡುತ್ತದೆ.
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: ಅದನ್ನು ಉಂಟುಮಾಡಿದ ಮಳೆ
    prompt: |
      ಹೂವುಗಳ ಮೊದಲು, ಮಳೆ ಇತ್ತು. ಭೂಮಿಯನ್ನು ತುಂಬಿದ ಬಿರುಗಾಳಿಗಳನ್ನು ಊಹಿಸಿ,
      ನೆಲದಡಿಯಲ್ಲಿ ಕಾಯುತ್ತಿರುವ ಬೀಜಗಳು. ಈ ಹೂವು ಅರಳಲು ಯಾವ ಪರಿಸ್ಥಿತಿಗಳು ಸೇರಬೇಕಿತ್ತು?
      ಸೂಪರ್‌ಬ್ಲೂಮ್ ಅನ್ನು ಅದರ ಮೂಲಕ್ಕೆ ಹಿಂದಕ್ಕೆ ಪತ್ತೆಹಚ್ಚಿ.
    follow_ups:
      - ಹೆಚ್ಚು - ಅಥವಾ ಕಡಿಮೆ - ಮಳೆಯಿಂದ ಏನು ಭಿನ್ನವಾಗುತ್ತಿತ್ತು?
      - ಒಂದೇ ಬೆಟ್ಟದ ಹಿಂದೆ ಎಷ್ಟು ವರ್ಷಗಳ ಸುಪ್ತಾವಸ್ಥೆ ಇರಬಹುದು?
      - ಈ ಕ್ಷಣವು ಎಂದಿಗೂ ಖಾತರಿಯಾಗಿರಲಿಲ್ಲ ಎಂದರೆ ಏನು ಅರ್ಥ?
  - id: one_species_at_a_time
    name: ಒಂದು ಸಮಯದಲ್ಲಿ ಒಂದು ಪ್ರಭೇದ
    prompt: |
      ಒಂದೇ ಹೂವಿನ ಪ್ರಭೇದವನ್ನು ಆರಿಸಿ ಮತ್ತು ಅದನ್ನು ಅನುಸರಿಸಿ. ಕಿತ್ತಳೆ ಗಸಗಸೆ, ನೇರಳೆ ಲೂಪಿನ್,
      ಹಳದಿ ಗೋಲ್ಡ್‌ಫೀಲ್ಡ್‌ಗಳು - ಕ್ಷಣಕ್ಕೆ ಎಲ್ಲವನ್ನೂ ನಿರ್ಲಕ್ಷಿಸಿ. ಒಂದರ ಮೇಲೆ ಗಮನಹರಿಸುವುದರಿಂದ
      ನೀವು ಏನು ನೋಡುತ್ತೀರಿ ಎಂಬುದನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
    follow_ups:
      - ಈ ಪ್ರಭೇದವು ಎಲ್ಲಿ ಪ್ರಾಬಲ್ಯ ಹೊಂದಿದೆ - ಮತ್ತು ಎಲ್ಲಿ ಅದು ಬಿಟ್ಟುಕೊಡುತ್ತದೆ?
      - ಈ ಒಂದೇ ಹೂವು ಅರಳಿದರೆ ಬೆಟ್ಟವು ಹೇಗಿರಬಹುದು?
      - ಇತರರ ನಡುವೆ ಅದು ತನ್ನನ್ನು ಹೇಗೆ ಉಳಿಸಿಕೊಳ್ಳುತ್ತದೆ?
  - id: pollinators_view
    name: ಪರಾಗಸ್ಪರ್ಶಕದ ದೃಷ್ಟಿ
    prompt: |
      ನೀವು ಜೇನುನೊಣ, ಚಿಟ್ಟೆ ಅಥವಾ ಹಮ್ಮಿಂಗ್‌ಬರ್ಡ್ ಎಂದು ಊಹಿಸಿ. ಯಾವುದು ನಿಮ್ಮನ್ನು ಆಕರ್ಷಿಸುತ್ತದೆ?
      ನೀವು ಮೊದಲು ಯಾವ ಹೂವುಗಳಿಗೆ ಭೇಟಿ ನೀಡುತ್ತೀರಿ?
      ಅವುಗಳ ಎಸಲುಗಳಿಂದ ಕೆಲವು ಇಂಚುಗಳ ಎತ್ತರದಿಂದ ಭೂದೃಶ್ಯವು ಹೇಗಿದೆ?
    follow_ups:
      - ನಿಮ್ಮ ಮಾರ್ಗವನ್ನು ಯಾವ ಮಾದರಿಗಳು ಮಾರ್ಗದರ್ಶನ ನೀಡುತ್ತವೆ?
      - ಯಾವ ಹೂವುಗಳನ್ನು ನೀವು ಬಿಟ್ಟುಬಿಡುತ್ತೀರಿ - ಮತ್ತು ಏಕೆ?
      - ಪ್ರಮಾಣವು ಅನುಭವವನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
  - id: ground_level
    name: ನೆಲದ ಮಟ್ಟ
    prompt: |
      ಕೆಳಗೆ ಇಳಿಯಿರಿ. ನಿಮ್ಮ ಹೊಟ್ಟೆಯ ಮೇಲೆ ಮಲಗಿ ಅಥವಾ ಮೊಣಕಾಲೂರಿ.
      ಮಣ್ಣಿನ ದೃಷ್ಟಿಕೋನದಿಂದ ಸೂಪರ್‌ಬ್ಲೂಮ್ ಅನ್ನು ನೋಡಿ - ಕಾಂಡಗಳು ಏರುತ್ತಿವೆ, ನಿಮ್ಮ ಮೇಲೆ ಕಮಾನು ಮಾಡಿದ ಎಸಲುಗಳು,
      ಆಕಾಶವು ದೂರದ ಪಟ್ಟಿಯಾಗಿ ಮೇಲಿದೆ.
    follow_ups:
      - ನಿಂತಿರುವ ಎತ್ತರದಿಂದ ನೀವು ತಪ್ಪಿಸಿಕೊಂಡದ್ದನ್ನು ಯಾವುದು ಗಮನಿಸುತ್ತೀರಿ?
      - ನಿಮ್ಮ ಕೆಳಗೆ ನೆಲವು ಹೇಗಿದೆ?
      - ಇಲ್ಲಿಂದ ಒಂದು ಜೀರುನೋಣ ಏನು ನೋಡುತ್ತದೆ?
  - id: time_lapse
    name: ಸಮಯ-ಕಾಲ
    prompt: |
      ಸೂಪರ್‌ಬ್ಲೂಮ್ ದೀರ್ಘ ಕಥೆಯ ಒಂದು ಕ್ಷಣವಾಗಿದೆ. ಬೆಟ್ಟದ ಮೇಲೆ ವೇಗವರ್ಧಿತವಾಗಿ ಊಹಿಸಿ:
      ಹಸಿರು ಚಿಗುರುಗಳು, ಮೊದಲ ಮೊಗ್ಗುಗಳು, ಉತ್ತುಂಗ ಬಣ್ಣ, ನಂತರ ಮಸುಕಾಗುವುದು.
      ಈ ಸ್ಪೆಕ್ಟಾಕಲ್ ಎಷ್ಟು ಕಾಲ ಉಳಿಯುತ್ತದೆ? ಮೊದಲು ಮತ್ತು ನಂತರ ಏನು ಬರುತ್ತದೆ?
    follow_ups:
      - ನೀವು ಒಮ್ಮೆ ಮಾತ್ರ ಹೋಗಬಹುದಾದರೆ ನೀವು ಯಾವಾಗ ಭೇಟಿ ನೀಡಲು ಆಯ್ಕೆ ಮಾಡುತ್ತೀರಿ?
      - ನೀವು ತಲುಪುವ ವೇಳೆಗೆ ಯಾವುದು ಈಗಾಗಲೇ ಹೋಗಿದೆ?
      - ಬಣ್ಣ ಮಸುಕಾದಾಗ ಯಾವುದು ಉಳಿಯುತ್ತದೆ?
  - id: the_chemistry_of_color
    name: ಬಣ್ಣದ ರಸಾಯನಶಾಸ್ತ್ರ
    prompt: |
      ವರ್ಣದ್ರವ್ಯಗಳ ಮೇಲೆ ಗಮನಹರಿಸಿ. ಕಿತ್ತಳೆ, ನೇರಳೆ, ಹಳದಿ, ನೀಲಿ - ಪ್ರತಿ ಬಣ್ಣಕ್ಕೆ ಕಾರಣವೇನು?
      ಅವು ಹೇಗೆ ಸಂವಹಿಸುತ್ತವೆ? ಬಣ್ಣಗಳು ಎಲ್ಲಿ ಘರ್ಷಿಸುತ್ತವೆ, ಮತ್ತು ಎಲ್ಲಿ ಅವು ಸಾಮರಸ್ಯದಿಂದ ಕೂಡಿರುತ್ತವೆ?
      ಬೆಟ್ಟವನ್ನು ಪ್ಯಾಲೆಟ್ ಆಗಿ ಪರಿಗಣಿಸಿ.
    follow_ups:
      - ನೀವು ಯಾವ ಬಣ್ಣವನ್ನು ಸೇರಿಸುತ್ತೀರಿ - ಅಥವಾ ಕಳೆಯುತ್ತೀರಿ?
      - ದಿನವಿಡೀ ಬೆಳಕು ಬಣ್ಣಗಳನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
      - ಕಪ್ಪು ಮತ್ತು ಬಿಳಿ ಬಣ್ಣದಲ್ಲಿ ಅದು ಹೇಗಿರುತ್ತದೆ?
  - id: negative_space
    name: ನಕಾರಾತ್ಮಕ ಸ್ಥಳ
    prompt: |
      ಹೂವುಗಳಲ್ಲದವುಗಳನ್ನು ನೋಡಿ. ಆಕಾಶ, ಮಣ್ಣಿನ ಖಾಲಿ ಪ್ರದೇಶಗಳು, ಹೂವುಗಳ ನಡುವಿನ ಅಂತರಗಳು.
      ಖಾಲಿ ಸ್ಥಳವು ನೀವು ನೋಡಿದ್ದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ? ಅಲ್ಲಿ ಇಲ್ಲದಿರುವದರ ಮಹತ್ವವನ್ನು ಅನುಭವಿಸಿ.
    follow_ups:
      - ಶೂನ್ಯತೆಯು ಎಲ್ಲಿ ಕೇಂದ್ರೀಕರಿಸುತ್ತದೆ?
      - ಆ ಅಂತರಗಳನ್ನು ಯಾವುದು ತುಂಬುತ್ತದೆ - ಮತ್ತು ಅದು ತುಂಬಬೇಕೇ?
      - ನಕಾರಾತ್ಮಕ ಸ್ಥಳವು ಸಂಯೋಜನೆಯನ್ನು ಹೇಗೆ ಒಟ್ಟಿಗೆ ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ?
  - id: the_path_through
    name: ಮೂಲಕದ ಹಾದಿ
    prompt: |
      ಹಾದಿಗಳನ್ನು ಗಮನಿಸಿ - ಮಾನವ, ಪ್ರಾಣಿ, ಅಥವಾ ಗಾಳಿಯಿಂದ ಬೀಸಿದ. ಜನರು ಎಲ್ಲಿ ನಡೆಯುತ್ತಾರೆ?
      ಭೂದೃಶ್ಯವು ಹಾದುಹೋಗುವುದನ್ನು ಎಲ್ಲಿ ಪ್ರತಿರೋಧಿಸುತ್ತದೆ? ಹೂವಿನ ಮೂಲಕ ಒಂದು ಹಾದಿಯನ್ನು ಪತ್ತೆಹಚ್ಚಿ ಮತ್ತು ಅದನ್ನು ಅನುಸರಿಸಲು ಏನು ವೆಚ್ಚವಾಗುತ್ತದೆ ಎಂದು ಕೇಳಿ.
    follow_ups:
      - ಅಲ್ಲಿ ನಡೆಯುವುದನ್ನು ತಡೆಯುವ ಮೂಲಕ ನೀವು ಏನನ್ನು ರಕ್ಷಿಸುತ್ತೀರಿ?
      - ಹಾದಿಯು ನಿಮ್ಮನ್ನು ಎಲ್ಲಿಗೆ ಕರೆದೊಯ್ಯಲು ಬಯಸುತ್ತದೆ?
      - ದಾರಿಯಲ್ಲಿ ಉಳಿಯುವುದರಿಂದ ನೀವು ಏನನ್ನು ತಪ್ಪಿಸಿಕೊಳ್ಳುತ್ತೀರಿ?
  - id: geology_beneath
    name: ಕೆಳಗಿನ ಭೂವಿಜ್ಞಾನ
    prompt: |
      ಹೂವುಗಳು ಲಕ್ಷಾಂತರ ವರ್ಷಗಳ ಮೇಲೆ ವಿಶ್ರಾಂತಿ ಪಡೆಯುತ್ತವೆ. ಮಣ್ಣಿನ ಅಡಿಯಲ್ಲಿ ಯಾವ ಬಂಡೆ ಇದೆ?
      ಈ ಬೆಟ್ಟಗಳನ್ನು ಯಾವುದು ರೂಪಿಸಿತು? ಸೂಪರ್‌ಬ್ಲೂಮ್ ನಿಮ್ಮನ್ನು ನಿಮ್ಮ ಅಡಿಗಳ ಕೆಳಗಿನ ಆಳವಾದ ಸಮಯಕ್ಕೆ ಸಂಪರ್ಕಿಸಲಿ.
    follow_ups:
      - ಭೂವಿಜ್ಞಾನವು ಇಲ್ಲಿ ಬೆಳೆಯುವುದನ್ನು ಹೇಗೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ?
      - ಬೆಟ್ಟಗಳು ರೂಪುಗೊಳ್ಳುವ ಮೊದಲು ಈ ಸ್ಥಳವು ಹೇಗಿರುತ್ತಿತ್ತು?
      - ಹೂವುಗಳು ಹೋದಾಗ ಯಾವುದು ಉಳಿಯುತ್ತದೆ?
  - id: scent_and_sound
    name: ವಾಸನೆ ಮತ್ತು ಧ್ವನಿ
    prompt: |
      ಕಣ್ಣುಗಳನ್ನು ಮುಚ್ಚಿ. ನೀವು ಏನು ವಾಸನೆ ಮಾಡುತ್ತೀರಿ? ಪರಾಗ, ಧೂಳು, ಋಷಿ, ಒದ್ದೆಯಾದ ಭೂಮಿ?
      ನೀವು ಏನು ಕೇಳುತ್ತೀರಿ? ಜೇನುನೊಣಗಳು, ಗಾಳಿ, ಹೆಜ್ಜೆಗಳು, ಮೌನ? ದೃಷ್ಟಿಕೋನರಹಿತ ಇಂದ್ರಿಯಗಳನ್ನು
      ಒಂದು ಕ್ಷಣಕ್ಕೆ ಮುನ್ನಡೆಸೋಣ.
    follow_ups:
      - ಅನುಭವವನ್ನು ಸೆರೆಹಿಡಿಯಲು ನೀವು ಯಾವ ಧ್ವನಿಯನ್ನು ಸೇರಿಸುತ್ತೀರಿ?
      - ನೀವು ಚಲಿಸುವಾಗ ವಾಸನೆ ಹೇಗೆ ಬದಲಾಗುತ್ತದೆ?
      - ನೀವು ನೋಡಿದರೆ ಮಾತ್ರ ಏನು ತಪ್ಪಿಸಿಕೊಳ್ಳುತ್ತೀರಿ?
  - id: light_and_shadow
    name: ಬೆಳಕು ಮತ್ತು ನೆರಳು
    prompt: |
      ಬೆಳಕು ಬೆಟ್ಟದ ಮೇಲೆ ಹೇಗೆ ಚಲಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ನೋಡಿ. ಬೆಳಿಗ್ಗೆ, ಮಧ್ಯಾಹ್ನ, ಸಂಜೆ - ಸೂರ್ಯನ ಕೋನವು
      ಹೂವುಗಳನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ? ನೆರಳುಗಳು ಎಲ್ಲಿ ಬೀಳುತ್ತವೆ?
      ಯಾವುದು ಬಹಿರಂಗಗೊಳ್ಳುತ್ತದೆ ಮತ್ತು ಯಾವುದು ಮರೆಮಾಚಿದೆ?
    follow_ups:
      - ಬೆಳಕು ಯಾವಾಗ ಹೆಚ್ಚು ಜೀವಂತವಾಗಿರುತ್ತದೆ?
      - ಮಧ್ಯಾಹ್ನ ತಪ್ಪಿಸಿಕೊಳ್ಳುವುದನ್ನು ನೀವು ಬೆಳಿಗ್ಗೆ ಏನು ನೋಡುತ್ತೀರಿ?
      - ನೆರಳುಗಳು ಭೂದೃಶ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತವೆ?
  - id: seed_to_flower
    name: ಬೀಜದಿಂದ ಹೂವಿನವರೆಗೆ
    prompt: |
      ಒಂದು ಸಸ್ಯವನ್ನು ಬೀಜದಿಂದ ಹೂವಿನವರೆಗೆ ಪತ್ತೆಹಚ್ಚಿ. ಅದು ಇಲ್ಲಿಗೆ ಹೇಗೆ ಬಂತು? ಗಾಳಿ, ಪ್ರಾಣಿ,
