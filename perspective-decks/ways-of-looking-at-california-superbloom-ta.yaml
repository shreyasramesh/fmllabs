# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# கலிபோர்னியா சூப்பர் ப்ளூம்-ஐ நோக்கும் வழிகள் (Tamil)

id: ways_of_looking_at_california_superbloom
name: கலிபோர்னியா சூப்பர் ப்ளூம்-ஐ நோக்கும் வழிகள்
description: |
  கலிபோர்னியா சூப்பர் ப்ளூம்-ஐ அனுபவிக்கும்போது உங்கள் பார்வையை மாற்றியமைக்கும் அட்டைகள்.
  ஒவ்வொன்றும் காட்டுப்பூக்கள், மலைச்சரிவுகள் மற்றும் குளிர்கால மழைக்குப் பிறகு ஏற்படும் தற்காலிக வண்ண வெடிப்பை
  நீங்கள் பார்க்கும் விதத்தை ஆழமாக்க ஒரு வித்தியாசமான கண்ணோட்டத்தை வழங்குகிறது.
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: அதை உருவாக்கிய மழை
    prompt: |
      மலர்களுக்கு முன், மழை இருந்தது. மண்ணை நிரப்பிய புயல்களையும், நிலத்தடியில் காத்திருக்கும் விதைகளையும் கற்பனை செய்யுங்கள்.
      இந்த மலர்ச்சி ஏற்பட என்ன நிலைமைகள் ஒன்றிணைய வேண்டும்? சூப்பர் ப்ளூமின் தொடக்கத்தை அதன் வேர்களுக்குப் பின்னோக்கிச் செல்லுங்கள்.
    follow_ups:
      - அதிக—அல்லது குறைவான—மழை பெய்திருந்தால் என்ன வித்தியாசமாக இருந்திருக்கும்?
      - ஒரு மலையடுக்குக்குப் பின்னால் எத்தனை வருட செயலற்ற தன்மை இருக்கலாம்?
      - இந்த கணம் ஒருபோதும் உத்தரவாதம் அளிக்கப்படவில்லை என்பது என்ன அர்த்தம்?
  - id: one_species_at_a_time
    name: ஒரு நேரத்தில் ஒரு இனம்
    prompt: |
      ஒரு ஒற்றை மலர் இனத்தைத் தேர்ந்தெடுத்து அதைப் பின்தொடருங்கள். ஆரஞ்சு பாப்பீஸ், ஊதா லூபின், மஞ்சள் கோல்ட்ஃபீல்ட்ஸ்—ஒரு கணம் மற்ற அனைத்தையும் புறக்கணியுங்கள்.
      ஒன்றில் கவனம் செலுத்துவது நீங்கள் பார்ப்பதை எப்படி மாற்றுகிறது?
    follow_ups:
      - இந்த இனம் எங்கு ஆதிக்கம் செலுத்துகிறது—எங்கு விட்டுக்கொடுக்கிறது?
      - இந்த ஒரு இனம் மட்டும் மலர்ந்திருந்தால் மலை எப்படி இருந்திருக்கும்?
      - மற்றவற்றுடன் ஒப்பிடுகையில் இது எப்படித் தன் தனித்துவத்தைப் பேணுகிறது?
  - id: pollinators_view
    name: மகரந்தச் சேர்க்கையாளர்களின் பார்வை
    prompt: |
      நீங்கள் ஒரு தேனீ, வண்ணத்துப்பூச்சி அல்லது ஹம்மிங்பேர்ட் என்று கற்பனை செய்யுங்கள். உங்களைக் கவர்வது எது?
      நீங்கள் முதலில் எந்த மலர்களுக்குச் செல்வீர்கள்? இதழ்களிலிருந்து சில அங்குலங்களுக்கு மேல் இருந்து நிலப்பரப்பு எப்படித் தெரிகிறது?
    follow_ups:
      - உங்கள் பாதையை எந்த வடிவங்கள் வழிநடத்தும்?
      - எந்த மலர்களை நீங்கள் தவிர்ப்பீர்கள்—ஏன்?
      - அளவு அனுபவத்தை எப்படி மாற்றுகிறது?
  - id: ground_level
    name: தரை மட்டம்
    prompt: |
      தாழ்வாக இறங்குங்கள். உங்கள் வயிற்றில் படுங்கள் அல்லது மண்டியிடுங்கள். மண்ணின் பார்வையில் இருந்து சூப்பர் ப்ளூமைக் காணுங்கள்—தண்டுகள் உயர்ந்து, இதழ்கள் உங்களைச் சுற்றி வளைந்து, வானம் மேலே ஒரு தொலைதூரக் கோடாகத் தெரிகிறது.
    follow_ups:
      - நிற்கும் உயரத்தில் நீங்கள் தவறவிட்டவை எவை?
      - உங்களுக்குக் கீழே உள்ள மண் எப்படி உணர்கிறது?
      - இங்கிருந்து ஒரு வண்டு என்ன பார்க்கும்?
  - id: time_lapse
    name: டைம்-லாப்ஸ்
    prompt: |
      சூப்பர் ப்ளூம் என்பது நீண்ட கதையில் ஒரு கணம். மலைச்சரிவை வேகமான முன்னோட்டத்தில் கற்பனை செய்யுங்கள்: பச்சை தளிர்கள், முதல் மொட்டுகள், உச்ச நிறம், பின்னர் மங்குதல்.
      இந்தக் காட்சி எவ்வளவு காலம் நீடிக்கும்? அதற்கு முன்னும் பின்னும் என்ன வருகிறது?
    follow_ups:
      - ஒரே ஒரு முறை மட்டுமே வர முடிந்தால் எப்போது நீங்கள் பார்வையிட விரும்பியிருப்பீர்கள்?
      - நீங்கள் வரும்போது ஏற்கனவே எது போய்விட்டது?
      - நிறம் மங்கும்போது எது மிஞ்சியிருக்கும்?
  - id: the_chemistry_of_color
    name: நிறங்களின் வேதியியல்
    prompt: |
      நிறமிகளை மையமாகக் கொள்ளுங்கள். ஆரஞ்சு, ஊதா, மஞ்சள், நீலம்—ஒவ்வொரு நிறத்தையும் எது உருவாக்குகிறது?
      அவை எப்படி ஒன்றோடொன்று இணைகின்றன? எங்கு நிறங்கள் மோதுகின்றன, எங்கு அவை இணக்கமாகின்றன?
      மலைச்சரிவை ஒரு வண்ணத் தட்டாகக் கருதுங்கள்.
    follow_ups:
      - என்ன நிறத்தைச் சேர்ப்பீர்கள்—அல்லது கழிப்பீர்கள்?
      - நாள் முழுவதும் சூரிய ஒளி நிறங்களை எப்படி மாற்றுகிறது?
      - கருப்பு வெள்ளையில் எப்படித் தோற்றமளிக்கும்?
  - id: negative_space
    name: எதிர்மறை வெளி
    prompt: |
      மலர்கள் இல்லாதவற்றைப் பாருங்கள். வானம், வெற்று மண் திட்டுகள், பூக்களுக்கு இடையிலான இடைவெளிகள்.
      வெற்று வெளி நீங்கள் பார்ப்பதை எப்படி வடிவமைக்கிறது? இல்லாதவற்றின் முக்கியத்துவத்தை உணருங்கள்.
    follow_ups:
      - வெட்ட வெளி எங்கு குவிந்துள்ளது?
      - அந்த இடைவெளிகளை எது நிரப்பும்—அது நிரப்ப வேண்டுமா?
      - எதிர்மறை வெளி எப்படி அமைப்பைப் பிணைக்கிறது?
  - id: the_path_through
    name: உள்ளே செல்லும் பாதை
    prompt: |
      பாதைகளைக் கவனியுங்கள்—மனித, விலங்கு, அல்லது காற்று அடித்துச் சென்றவை. மக்கள் எங்கு நடக்கிறார்கள்?
      நிலப்பரப்பு எங்கு கடந்து செல்வதை எதிர்க்கிறது? பூக்களுக்குள் ஒரு பாதையைக் கண்டறிந்து, அதைப் பின்தொடர்வதற்கு என்ன விலை கொடுக்க வேண்டும் என்று கேளுங்கள்.
    follow_ups:
      - அங்கு நடக்காமல் எதைப் பாதுகாப்பீர்கள்?
      - பாதை உங்களை எங்கு அழைத்துச் செல்ல விரும்புகிறது?
      - பாதையில் தங்குவதால் எதைப் பெறுவீர்கள்?
  - id: geology_beneath
    name: கீழே உள்ள புவியியல்
    prompt: |
      மலர்கள் மில்லியன் கணக்கான ஆண்டுகளுக்கு மேல் ஓய்வெடுக்கின்றன. மண்ணுக்கு அடியில் என்ன பாறை உள்ளது?
      இந்த மலைகளை எது வடிவமைத்தது? சூப்பர் ப்ளூம் உங்களை உங்கள் கால்களுக்குக் கீழே உள்ள ஆழமான காலத்துடன் இணைக்கட்டும்.
    follow_ups:
      - புவியியல் இங்கு என்ன வளர்கிறது என்பதை எப்படிப் பாதிக்கிறது?
      - மலைகள் உருவாவதற்கு முன்பு இந்த இடம் எப்படி இருந்திருக்கும்?
      - மலர்கள் மறைந்த பிறகு எது மிஞ்சியிருக்கும்?
  - id: scent_and_sound
    name: வாசனை மற்றும் ஒலி
    prompt: |
      உங்கள் கண்களை மூடுங்கள். என்ன வாசனை வருகிறது? மகரந்தம், தூசி, சேஜ், ஈரமான மண்?
      என்ன கேட்கிறது? தேனீக்கள், காற்று, காலடிகள், அமைதி? ஒரு கணம், பார்வைக்கு அப்பாற்பட்ட உணர்வுகளை வழிநடத்தட்டும்.
    follow_ups:
      - அனுபவத்தைப் பிடிக்க என்ன ஒலியைச் சேர்ப்பீர்கள்?
      - நீங்கள் நகரும்போது வாசனை எப்படி மாறுகிறது?
      - நீங்கள் பார்த்தால் மட்டுமே என்ன தவறவிடுவீர்கள்?
  - id: light_and_shadow
    name: ஒளி மற்றும் நிழல்
    prompt: |
      மலைச்சரிவு முழுவதும் ஒளி எப்படி நகர்கிறது என்பதைக் கவனியுங்கள். காலை, மதியம், மாலை—சூரியனின் கோணம் மலர்களை எப்படி மாற்றுகிறது?
      நிழல்கள் எங்கு விழுகின்றன? என்ன வெளிப்படுத்தப்படுகிறது, என்ன மறைக்கப்படுகிறது?
    follow_ups:
      - எப்போது ஒளி மிகவும் உயிரோட்டமாக உணர்கிறது?
      - நீங்கள் நண்பகலில் தவறவிட்டதை விடியலில் என்ன பார்ப்பீர்கள்?
      - நிழல்கள் நிலப்பரப்பை எப்படி வடிவமைக்கின்றன?
  - id: seed_to_flower
    name: விதை முதல் மலர் வரை
    prompt: |
      ஒரு தனித்த தாவரத்தை விதை முதல் மலர் வரை பின்தொடருங்கள். அது இங்கு எப்படி வந்தது? காற்று, விலங்கு, நீர்?
      அது எவ்வளவு காலம் காத்திருந்தது? இதழ்கள் உதிர்ந்த பிறகு அது என்னவாக மாறும்?
      அதன் சுழற்சி முழுவதும் ஒரு வாழ்க்கையைப் பின்தொடருங்கள்.
    follow_ups:
      - நிலத்தடியில் விதை எதைக் கண்டிருக்கும்?
      - தாவரம் எதை விட்டுச் செல்லும்?
      - இந்த மலைச்சரிவில் எத்தனை தலைமுறைகள் பிரதிநிதித்துவப்படுத்தப்படுகின்றன?
  - id: micro_vs_macro
    name: நுண் vs. பேரளவு
    prompt: |
      ஒரு தனி இதழ், ஒரு பனித்துளி, ஒரு மகரந்தத் துகளுக்குள் உருமாற்றுங்கள். பின்னர் முழு மலைச்சரிவு, பள்ளத்தாக்கு, மாநிலம் வரை பின்வாங்குங்கள்.
      அளவு சூப்பர் ப்ளூம்-ன் அர்த்தத்தை எப்படி மாற்றுகிறது?
    follow_ups:
      - ஒரு அளவில் கண்ணுக்குத் தெரியாததும், மற்றொன்றில் வெளிப்படையானதும் எது?
      - உங்கள் கவனம் இயல்பாக எங்கு நிற்கிறது?
      - பேரளவு பார்வை நுண் அளவை எப்படி மாற்றுகிறது—மற்றும் நேர்மாறாக?
  - id: weathers_hand
