# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# Погляди на каліфорнійське суперцвітіння (Ukrainian)

id: ways_of_looking_at_california_superbloom
name: Погляди на каліфорнійське суперцвітіння
description: |
  Картки, щоб змінити вашу перспективу під час переживання каліфорнійського суперцвітіння.
  Кожна пропонує різну лінзу, щоб поглибити те, як ви бачите польові квіти, схили пагорбів та
  ефемерний сплеск кольору після зимових дощів.
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: Дощ, що це створив
    prompt: |
      Перед квітами був дощ. Уявіть шторми, що наповнювали ґрунт, насіння, що чекало під землею.
      Які умови мали збігтися, щоб це цвітіння сталося? Відстежте суперцвітіння назад до його витоків.
    follow_ups:
      - Що б змінилося, якби дощу було більше — чи менше?
      - Скільки років спокою може лежати за одним схилом пагорба?
      - Що означає, що цей момент ніколи не був гарантованим?
  - id: one_species_at_a_time
    name: По одній рослині за раз
    prompt: |
      Виберіть один вид квітів і стежте за ним. Помаранчеві маки, фіолетовий люпин,
      жовті золотарники — на мить забудьте про все інше. Як зосередження на одному змінює те, що ви бачите?
    follow_ups:
      - Де цей вид домінує — а де він поступається?
      - Як би виглядав схил пагорба, якби цвів лише цей один?
      - Як він тримається серед інших?
  - id: pollinators_view
    name: Погляд запилювачів
    prompt: |
      Уявіть, що ви бджола, метелик чи колібрі. Що б вас привабило? Які квіти ви б відвідали першими?
      Як виглядає ландшафт з висоти кількох сантиметрів над пелюстками?
    follow_ups:
      - Які візерунки керували б вашим шляхом?
      - Які квіти ви б пропустили — і чому?
      - Як масштаб змінює досвід?
  - id: ground_level
    name: На рівні землі
    prompt: |
      Опустіться низько. Ляжте на живіт або станьте на коліна. Подивіться на суперцвітіння з перспективи ґрунту —
      стебла, що піднімаються, пелюстки, що вигинаються над вами, небо — далека смуга вгорі.
    follow_ups:
      - Що ви помічаєте, чого не помічали стоячи?
      - Якою ви відчуваєте землю під собою?
      - Що б побачив жук звідси?
  - id: time_lapse
    name: Повзучий час
    prompt: |
      Суперцвітіння — це момент у довшій історії. Уявіть схил пагорба в прискореному режимі:
      зелені паростки, перші бутони, пік кольору, потім згасання. Як довго триває видовище?
      Що було до цього і що буде після?
    follow_ups:
      - Коли б ви обрали відвідати, якби могли піти лише один раз?
      - Що вже зникло до вашого прибуття?
      - Що залишиться, коли колір згасне?
  - id: the_chemistry_of_color
    name: Хімія кольору
    prompt: |
      Зосередьтеся на пігментах. Помаранчевий, фіолетовий, жовтий, синій — що робить кожен відтінок?
      Як вони взаємодіють? Де кольори конфліктують, а де гармонують?
      Розглядайте схил пагорба як палітру.
    follow_ups:
      - Який колір ви б додали — чи прибрали?
      - Як світло змінює кольори протягом дня?
      - Як би це виглядало в чорно-білому?
  - id: negative_space
    name: Негативний простір
    prompt: |
      Подивіться на те, що не є квітами. Небо, голі ділянки ґрунту, прогалини між цвітінням.
      Як порожній простір формує те, що ви бачите? Відчуйте значущість того, чого немає.
    follow_ups:
      - Де концентрується порожнеча?
      - Що б заповнило ці прогалини — і чи варто?
      - Як негативний простір тримає композицію разом?
  - id: the_path_through
    name: Шлях крізь
    prompt: |
      Зверніть увагу на стежки — людські, тваринні або ті, що створив вітер. Де ходять люди?
      Де ландшафт чинить опір проходу? Простежте шлях крізь цвітіння і запитайте, якою буде ціна його проходження.
    follow_ups:
      - Що б ви захистили, не ступаючи туди?
      - Куди хоче вас привести шлях?
      - Що б ви пропустили, залишаючись на стежці?
  - id: geology_beneath
    name: Геологія під сподом
    prompt: |
      Квіти лежать на мільйонах років. Яка порода під ґрунтом?
      Що формувало ці пагорби? Нехай суперцвітіння з'єднає вас з глибоким часом під вашими ногами.
    follow_ups:
      - Як геологія впливає на те, що тут росте?
      - Як би виглядало це місце до формування пагорбів?
      - Що залишиться, коли квіти зникнуть?
  - id: scent_and_sound
    name: Запах і звук
    prompt: |
      Закрийте очі. Що ви відчуваєте на запах? Пил, пилок, шавлія, вогка земля? Що ви чуєте?
      Бджоли, вітер, кроки, тиша? Нехай невізуальні відчуття ведуть вас на мить.
    follow_ups:
      - Який звук ви б додали, щоб передати враження?
      - Як змінюється запах, коли ви рухаєтеся?
      - Що б ви пропустили, якби лише дивилися?
  - id: light_and_shadow
    name: Світло і тінь
    prompt: |
      Спостерігайте, як світло рухається по схилу пагорба. Ранок, полудень, вечір — як кут сонця змінює квіти?
      Куди падають тіні? Що виявляється, а що приховується?
    follow_ups:
      - Коли світло здається найбільш живим?
      - Що б ви побачили на світанку, чого б не помітили опівдні?
      - Як тіні формують ландшафт?
  - id: seed_to_flower
    name: Від насінини до квітки
    prompt: |
      Простежте одну рослину від насінини до цвітіння. Як вона сюди потрапила? Вітром, тваринами, водою?
      Як довго вона чекала? Чим вона стане, коли пелюстки впадуть?
      Пройдіть одне життя через його цикл.
    follow_ups:
      - Що б насінина побачила під землею?
      - Що рослина залишить після себе?
      - Скільки поколінь представлено на цьому схилі пагорба?
  - id: micro_vs_macro
    name: Мікро проти макро
    prompt: |
      Наблизьтеся до однієї пелюстки, краплі роси, зерна пилку. Потім віддаліться до всього схилу, долини, штату.
      Як масштаб змінює значення суперцвітіння?
    follow_ups:
      - Що невидиме на одному масштабі і очевидне на іншому?
      - Де природно зосереджується ваша увага?
      - Як макро-вид змінює мікро — і навпаки?
  - id: weathers_hand
    name: Рука погоди
    prompt: |
      Суперцвітіння — це співпраця погоди. Дощ, сонце, вітер, температура — кожне має свою роль.
      Уявіть погоду як співтворця. Що вона вирішила? Що вона утримала?
    follow_ups:
      - Що б породила інша зима?
      - Як сьогоднішня погода формує ваш досвід?
      - Що б сказали квіти про погоду, якби могли?
  - id: human_witness
    name: Людське свідчення
    prompt: |
      Ви не перші, хто це бачить. Хто ще стояв тут? Фермери, корінні народи, фотографи, мандрівники.
      Як ваша присутність змінює це місце? Що означає бути свідком?
    follow_ups:
      - Що б вони побачили, чого не бачите ви?
      - Що ви візьмете з собою?
      - Чим свідчення відрізняється від володіння чи взяття?
  - id: the_next_year
    name: Наступний рік
    prompt: |
      Це цвітіння не повториться точно. Наступного року може бути посуха, пожежа або інша суміш видів.
      Уявіть, що ви повертаєтеся через рік. Що б ви сподівалися знайти? До чого б ви були готові втратити?
    follow_ups:
      - Що робить цей момент невідтворним?
      - Що б ви сказали майбутньому собі?
      - Як швидкоплинність поглиблює досвід?
  - id: texture_and_touch
    name: Текстура і дотик
    prompt: |
      Якими б відчувалися, якби ви провели рукою крізь квіти? М'які пелюстки, крихкі стебла, липкий пилок, шорстке листя.
      Уявіть текстури, не торкаючись — або, де це дозволено, обережно торкніться і помітьте.
    follow_ups:
      - Яка текстура дивує вас найбільше?
      - Чого б ви уникали торкатися — і чому?
      - Як текстура додає те, чого не може передати лише колір?
  - id: before_and_after
    name: До і після
    prompt: |
      Уявіть цей схил пагорба в сухий сезон — коричневий, сплячий, ніби мертвий.
      Тепер об'єднайте обидва образи: до і після. Що відкриває контраст про стійкість, терпіння і трансформацію?
    follow_ups:
      - Що б пропустила людина, яка бачила лише сухий сезон?
      - Як пам'ять про спокій збагачує цвітіння?
      - Які ще моменти "до і після" викликає це?
  - id: make_it_a_mixtape
    name: Зробіть мікстейп
    prompt: |
      Яка музика супроводжувала б цей ландшафт? Створіть плейлист для суперцвітіння.
      Який темп, який настрій, які інструменти? Нехай квіти підкажуть саундтрек.
    follow_ups:
      - Який трек відкриває плейлист?
      - Яка якість пов'язує музику з квітами — ритм, колір, відчуття?
      - Як би змінювався плейлист у різний час доби?
  - id: take_one_thing_home
    name: Візьміть щось одне додому
    prompt: |
      Ви не можете забрати квіти — вони належать сюди. Але ви можете забрати спогад, відчуття, запитання.
      Що одне ви заберете з собою? Як ви будете це зберігати, не зірвавши жодної квітки?
    follow_ups:
      - Що б ви показали тому, хто не зміг прийти?
      - Як ви опишете це пізніше?
      - Що б ви залишили навмисно?
