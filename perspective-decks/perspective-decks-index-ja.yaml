# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Japanese)

domains:
  art:
    name: アート
    description: |
      アート鑑賞の視点を変えるカード集。光と影、導入、感情など、
      さまざまなレンズを通して、作品をより深く見たり、関わったりするための
      視点を提供します。
  urban_jungle:
    name: 都市のジャングル
    description: |
      街をただ歩くだけでなく、生きた有機体として捉え直します。
      古い建物の傷跡、交通の振付、路地の秘密の生活に焦点を当てたカードです。
  culinary_lab:
    name: 食のラボ
    description: |
      美味しいものから変革的なものへと視点をシフトさせます。
      一口の化学、食材の歴史、レストランのサウンドトラックを探求します。
  natural_microcosm:
    name: 自然の縮図
    description: |
      公園や裏庭に最適です。葉の目に見えない工学、岩の遅い動き、
      昆虫の縄張り争いに焦点を当てたレンズです。
  human_interface:
    name: ヒューマン・インターフェース
    description: |
      人間が出会う日常空間――カフェ、交通ハブ、職場、小売店、公共公園。
      行列の振付、縄張り主張、見えないスクリプト、共有空間の文化人類学に
      焦点を当てたカードです。
  california_superbloom:
    name: カリフォルニアのスーパーブルーム
    description: |
      冬の雨の後に見られる、野花の一時的な大発生。
      色、規模、受粉者、地質、天気、そして儚い開花のスペクタクルに
      焦点を当てたカードです。
decks:
  - id: ways_of_looking_at_art
    name: アート
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      アート鑑賞の視点を変える50枚のカード。各カードは、光と影、導入、感情など、
      さまざまなレンズを通して、作品をより深く見たり、関わったりするための
      視点を提供します。
    domain: art
  - id: ways_of_looking_at_california_superbloom
    name: カリフォルニアのスーパーブルームの見方
    path: perspective-decks/ways-of-looking-at-california-superbloom.yaml
    description: |
      カリフォルニアのスーパーブルームを体験する際の視点を変える20枚のカード。
      各カードは、受粉者や地質から、光、香り、儚さまで、さまざまなレンズを通して、
      野花や儚い色の爆発をより深く見つめるための視点を提供します。
    domain: california_superbloom
  - id: urban_jungle_new_york
    name: 都市のジャングル — ニューヨーク
    path: perspective-decks/urban-jungle/urban-jungle-new-york.yaml
    description: |
      ニューヨークのスケールや光、歴史の層、街の生活のリズムなど、
      街の見方を変える50枚のカードです。
    domain: urban_jungle
