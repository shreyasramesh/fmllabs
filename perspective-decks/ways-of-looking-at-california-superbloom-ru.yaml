# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# Способы взглянуть на суперцветение Калифорнии (Russian)

id: ways_of_looking_at_california_superbloom
name: Способы взглянуть на суперцветение Калифорнии
description: |
  Карты, чтобы изменить вашу точку зрения при переживании суперцветения Калифорнии.
  Каждая карта предлагает новую призму, чтобы углубить ваше восприятие полевых цветов, склонов холмов и
  эфемерного всплеска цвета после зимних дождей.
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: Дождь, который это создал
    prompt: |
      Перед цветами был дождь. Представьте себе бури, которые наполнили почву, семена, ожидающие под землей. Какие условия должны были совпасть, чтобы это цветение произошло? Проследите суперцветение назад до его истоков.
    follow_ups:
      - Что было бы иначе при большем — или меньшем — количестве дождя?
      - Сколько лет покоя может скрываться за одним склоном холма?
      - Что означает то, что этот момент никогда не был гарантирован?
  - id: one_species_at_a_time
    name: По одному виду за раз
    prompt: |
      Выберите один вид цветка и проследите его. Оранжевые маки, фиолетовые люпины,
      желтые золотильники — на мгновение проигнорируйте все остальное. Как фокусировка
      на одном изменении влияет на то, что вы видите?
    follow_ups:
      - Где этот вид доминирует — а где уступает?
      - Как бы выглядел склон холма, если бы расцвел только он?
      - Как он держится среди других?
  - id: pollinators_view
    name: Взгляд опылителя
    prompt: |
      Представьте, что вы пчела, бабочка или колибри. Что привлекло бы вас? Какие цветы вы бы посетили первыми? Как выглядит ландшафт с высоты нескольких сантиметров над лепестками?
    follow_ups:
      - Какие закономерности направляли бы ваш путь?
      - Какие цветы вы бы пропустили — и почему?
      - Как масштаб меняет впечатление?
  - id: ground_level
    name: Уровень земли
    prompt: |
      Пригнитесь. Лягте на живот или встаньте на колени. Увидьте суперцветение с точки зрения почвы — стебли поднимаются, лепестки изгибаются над вами, небо — далекая полоска вверху.
    follow_ups:
      - Что вы замечаете, чего не видели стоя?
      - Какова земля под вами на ощупь?
      - Что увидел бы жук отсюда?
  - id: time_lapse
    name: Покадровая съемка
    prompt: |
      Суперцветение — это момент в более длинной истории. Представьте себе склон холма в ускоренном режиме: зеленые ростки, первые бутоны, пик цвета, затем увядание. Как долго длится зрелище? Что предшествует и что следует за ним?
    follow_ups:
      - Когда бы вы решили посетить, если бы могли поехать только один раз?
      - Что уже исчезло к тому времени, как вы прибыли?
      - Что останется, когда цвет угаснет?
  - id: the_chemistry_of_color
    name: Химия цвета
    prompt: |
      Сконцентрируйтесь на пигментах. Оранжевый, фиолетовый, желтый, синий — что делает каждый оттенок? Как они взаимодействуют? Где цвета сталкиваются, а где гармонируют? Относитесь к склону холма как к палитре.
    follow_ups:
      - Какой цвет вы бы добавили — или убрали?
      - Как свет меняет цвета в течение дня?
      - Как бы это выглядело в черно-белом цвете?
  - id: negative_space
    name: Отрицательное пространство
    prompt: |
      Посмотрите на то, что не является цветами. Небо, голые участки почвы, промежутки между цветами. Как пустое пространство формирует то, что вы видите? Почувствуйте значение того, чего нет.
    follow_ups:
      - Где концентрируется пустота?
      - Что заполнило бы эти пробелы — и должно ли?
      - Как отрицательное пространство удерживает композицию вместе?
  - id: the_path_through
    name: Тропа через
    prompt: |
      Обратите внимание на тропы — человеческие, звериные или протоптанные ветром. Где ходят люди? Где ландшафт сопротивляется проходу? Проследите путь через цветение и спросите, чего будет стоить его следовать.
    follow_ups:
      - Что бы вы защитили, не ступая туда?
      - Куда хочет привести вас тропа?
      - Что бы вы пропустили, оставаясь на тропе?
  - id: geology_beneath
    name: Геология под
    prompt: |
      Цветы покоятся на миллионах лет. Какие камни лежат под почвой? Что сформировало эти холмы? Позвольте суперцветению связать вас с глубоким временем под вашими ногами.
    follow_ups:
      - Как геология влияет на то, что здесь растет?
      - Как выглядело бы это место до формирования холмов?
      - Что останется, когда цветы исчезнут?
  - id: scent_and_sound
    name: Запах и звук
    prompt: |
      Закройте глаза. Что вы чувствуете? Пыльцу, пыль, шалфей, влажную землю? Что вы слышите? Пчел, ветер, шаги, тишину? На мгновение позвольте незримым чувствам вести вас.
    follow_ups:
      - Какой звук вы бы добавили, чтобы передать впечатления?
      - Как меняется запах при перемещении?
      - Что бы вы упустили, если бы только смотрели?
  - id: light_and_shadow
    name: Свет и тень
    prompt: |
      Наблюдайте, как свет движется по склону холма. Утро, полдень, вечер — как угол солнца меняет цветы? Где падают тени? Что открывается, а что скрывается?
    follow_ups:
      - Когда свет кажется наиболее живым?
      - Что бы вы увидели на рассвете, чего пропустили бы в полдень?
      - Как тени формируют ландшафт?
  - id: seed_to_flower
    name: От семени к цветку
    prompt: |
      Проследите одно растение от семени до цветка. Как оно сюда попало? Ветер, животное, вода? Как долго оно ждало? Чем оно станет, когда опадут лепестки? Проследите одну жизнь через ее цикл.
    follow_ups:
      - Что видело семя под землей?
      - Что оставит после себя растение?
      - Сколько поколений представлено на этом склоне холма?
  - id: micro_vs_macro
    name: Микро против макро
    prompt: |
      Приблизьте один лепесток, каплю росы, зерно пыльцы. Затем отступите к целому склону холма, долине, штату. Как масштаб меняет значение суперцветения?
    follow_ups:
      - Что невидимо в одном масштабе и очевидно в другом?
      - Где естественным образом покоится ваше внимание?
      - Как макро вид меняет микро — и наоборот?
  - id: weathers_hand
    name: Рука погоды
    prompt: |
      Суперцветение — это сотрудничество погоды. Дождь, солнце, ветер, температура — у каждого есть своя роль. Представьте погоду как соавтора. Что она решила? Что она удержала?
    follow_ups:
      - Что произвела бы другая зима?
      - Как сегодняшняя погода влияет на ваш опыт?
      - Что бы сказали цветы о погоде, если бы могли?
  - id: human_witness
    name: Человеческий свидетель
    prompt: |
      Вы не первый, кто это видит. Кто еще стоял здесь? Фермеры, коренные народы, фотографы, путешественники. Как ваше присутствие меняет место? Что значит быть свидетелем?
    follow_ups:
      - Что бы они увидели, чего не видите вы?
      - Что вы унесете с собой?
      - Чем отличается свидетельствование от владения или взятия?
  - id: the_next_year
    name: Следующий год
    prompt: |
      Это цветение не повторится точно. В следующем году может быть засуха, или пожар, или другое сочетание видов. Представьте, что вы вернетесь через год. На что вы надеялись бы найти? От чего вы были бы готовы отказаться?
    follow_ups:
      - Что делает этот момент невосполнимым?
      - Что бы вы сказали своему будущему «я»?
      - Как непостоянство углубляет переживания?
  - id: texture_and_touch
    name: Текстура и прикосновение
    prompt: |
      Каково было бы провести рукой сквозь цветы? Мягкие лепестки, хрупкие стебли, липкая пыльца, грубые листья. Представьте текстуры, не прикасаясь — или, где разрешено, прикоснитесь осторожно и заметьте.
    follow_ups:
      - Какая текстура удивляет вас больше всего?
      - Чего бы вы избегали касаться — и почему?
      - Как текстура добавляет то, что один лишь цвет не может передать?
  - id: before_and_after
    name: До и после
    prompt: |
      Представьте этот склон холма в сухой сезон — коричневый, спящий, кажущийся мертвым. Теперь удерживайте оба образа: до и после. Что контраст раскрывает о стойкости, терпении и трансформации?
    follow_ups:
      - Что упустил бы тот, кто видел только сухой сезон?
      - Как воспоминание о покое обогащает цветение?
      - Какие другие моменты «до и после» вызывает это в памяти?
  - id: make_it_a_mixtape
    name: Сделайте это микстейпом
    prompt: |
      Какая музыка сопровождала бы этот ландшафт? Составьте плейлист для суперцветения. Какой темп, какое настроение, какие инструменты? Позвольте цветам предложить саундтрек.
    follow_ups:
      - Какой трек открывает его?
      - Какое качество связывает музыку с цветами — ритм, цвет, ощущение?
      - Как плейлист менялся бы в разное время дня?
  - id: take_one_thing_home
    name: Заберите одну вещь домой
    prompt: |
      Вы не можете забрать цветы — они принадлежат этому месту. Но вы можете забрать воспоминание, ощущение, вопрос. Какую одну вещь вы унесете с собой? Как вы ее сохраните, не сорвав ни одного цветка?
    follow_ups:
      - Что бы вы показали тому, кто не смог прийти?
      - Как вы опишете это позже?
      - Что бы вы оставили намеренно?
