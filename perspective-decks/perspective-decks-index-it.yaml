# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Italian)

domains:
  art:
    name: Arte
    description: |
      Carte per cambiare la tua prospettiva quando guardi l'arte. Ognuna offre una diversa
      lente—dalla luce e ombra alle introduzioni e all'emozione—per approfondire come vedi
      e interagisci con le opere d'arte.
  urban_jungle:
    name: Giungla Urbana
    description: |
      Invece di camminare semplicemente in una città, la guardi come un organismo vivente.
      Le carte si concentrano sulle cicatrici dei vecchi edifici, la coreografia del traffico
      e le vite segrete dei vicoli.
  culinary_lab:
    name: Laboratorio Culinario
    description: |
      Dal gustoso al trasformativo. Esplora la chimica di un morso,
      la storia di un ingrediente e la colonna sonora di un ristorante.
  natural_microcosm:
    name: Microcosmo Naturale
    description: |
      Perfetto per un parco o un cortile. Questa lente si concentra sull'ingegneria invisibile
      di una foglia, sulla vita al rallentatore di una roccia o sui drammi territoriali
      degli insetti.
  human_interface:
    name: L'Interfaccia Umana
    description: |
      Gli spazi quotidiani dove gli esseri umani si incontrano—caffetterie, snodi di transito,
      luoghi di lavoro, negozi, parchi pubblici. Le carte si concentrano sulla coreografia delle code,
      sulle rivendicazioni territoriali, sugli script invisibili e sull'antropologia dello spazio condiviso.
  california_superbloom:
    name: Superfioritura Californiana
    description: |
      L'effimera esplosione di fiori selvatici dopo le piogge invernali. Le carte si concentrano su colore,
      scala, impollinatori, geologia, meteo e lo spettacolo fugace della fioritura.
decks:
  - id: ways_of_looking_at_art
