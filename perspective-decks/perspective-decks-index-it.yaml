    description: |
      20 carte per cambiare la tua prospettiva quando vivi la superfioritura californiana.
      Ogni carta offre una diversa lente—dagli impollinatori e
      geologia alla luce, profumo e impermanenza—per approfondire come vedi
      i fiori selvatici e l'effimera esplosione di colore.
    domain: california_superbloom
