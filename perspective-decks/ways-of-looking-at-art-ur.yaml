# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# فن کو دیکھنے کے انداز (Urdu)

id: ways_of_looking_at_art
name: فن کو دیکھنے کے انداز
description: |
  فن کو دیکھتے وقت آپ کے نقطہ نظر کو بدلنے کے لیے کارڈز۔ ہر کارڈ ایک مختلف
  لینز پیش کرتا ہے تاکہ آپ فن پاروں کو گہرائی سے دیکھ سکیں اور ان سے جڑ سکیں۔
domain: art
cards:
  - id: souvenir
    name: یادگار
    prompt: |
      فن پارے سے کوئی چیز چنیں اور اگلی جو چیز آپ دیکھیں اس میں اسے چھپا دیں۔
      آپ اسے نئی ترتیب میں کیسے فٹ کریں گے؟
    follow_ups:
      - آپ کیا لے جانا پسند کریں گے؟
      - نئی ترتیب میں اسے کیا فائدہ یا نقصان ہوگا؟
      - یہ کہاں فٹ ہوگا - یا فٹ ہونے سے گریز کرے گا - نئے کام میں؟
  - id: throw_a_party
    name: پارٹی کا اہتمام کریں
    prompt: |
      کمرے میں موجود تمام فنکاروں کو مدعو کریں۔ وہ کیا پہنیں گے؟
      وہ کیا سوچیں گے؟
    follow_ups:
      - کون کس کی طرف راغب ہوگا؟
      - وہ کس بارے میں بحث کریں گے؟
      - ایک دوسرے کے کام میں انہیں کیا حیران کرے گا؟
  - id: time_out
    name: وقفہ لیں
    prompt: |
      باہر نکلیں۔ روشنی، آوازوں اور احساسات پر توجہ دیں۔ اپنے آس پاس کے ماحول
      میں موجود رہیں۔ فن کو دیکھنے کا تجربہ خود فن پاروں کے ساتھ ساتھ ان کے درمیان
      کی جگہوں کے بارے میں بھی ہے۔
    follow_ups:
      - جب آپ فن پر توجہ دینا بند کر دیتے ہیں تو آپ کیا محسوس کرتے ہیں؟
      - کمرہ آپ کو جو دکھاتا ہے اسے کیسے بناتا ہے؟
      - اگر آپ جلدی میں گزر جاتے تو کیا چھوٹ جاتا؟
  - id: plan_a_trip
    name: سفر کا منصوبہ بنائیں
    prompt: |
      آج آپ جو دیکھ رہے ہیں وہ ایک بہت بڑے سفر کا پہلا قدم ہو سکتا ہے۔ جب
      آپ گیلری یا جگہ سے نکلیں، تو فیصلہ کریں کہ آپ اگلی کون سی آرٹ ورک دیکھنا چاہتے ہیں
      اور اس کے گرد پورا سفر کا منصوبہ بنائیں۔
    follow_ups:
      - وہ سفر آپ کو کہاں لے جاتا؟
      - راستے میں آپ کو کیا دیکھنے کی ضرورت ہوتی؟
      - یہ کام کیوں - اسے دیکھنے کے لیے سفر کے قابل کیا بناتا ہے؟
  - id: in_black_and_white
    name: سیاہ اور سفید میں
    prompt: |
      روشنی اور تاریکی کے کھیل پر توجہ مرکوز کریں۔ آپ مدد کے لیے سیاہ اور سفید
      میں تصویر بھی لے سکتے ہیں۔ ٹونز کہاں سب سے زیادہ تاریک ہیں؟ یہ گہرائی کا
      احساس کیسے دیتا ہے یا نہیں؟ یہ ترتیب کی سمجھ میں کیسے مدد کرتا ہے؟
    follow_ups:
      - جب آپ رنگ ہٹا دیتے ہیں تو کیا غائب ہو جاتا ہے؟
      - کیا زیادہ واضح ہو جاتا ہے؟
      - گرے اسکیل ورژن میں آپ کی نظر سب سے پہلے کہاں جاتی ہے؟
  - id: give_it_a_voice
    name: اسے آواز دیں
    prompt: |
      یہ فن پارہ کون سی آوازیں نکالے گا؟ آپ رنگوں، شکلوں اور ڈھانچوں کو کیسے سن
      سکتے ہیں؟
    follow_ups:
      - کیا یہ بلند ہے یا خاموش؟ تیز یا نرم؟
      - کون سا آلہ یا ساخت اسے پکڑ سکے گی؟
      - اس کام میں خاموشی کیسی سنائی دے گی؟
  - id: find_the_middle_ground
    name: درمیانی راستہ تلاش کریں
    prompt: |
      فن پارہ آپ سے کتنی دور ہے؟ آپ کے سائز کے مقابلے میں یہ کتنا بڑا ہے؟ یہ کتنا
      بھاری ہے؟ یہ کتنی جگہ لیتا ہے؟ کیا آپ اسے گھر میں رکھ سکتے ہیں؟
    follow_ups:
      - اگر آپ اسے اپنے ہاتھ میں پکڑ سکتے تو کیا بدل جاتا؟
      - اگر یہ کمرے کے سائز کا ہوتا تو کیا ہوتا؟
      - یہ پیمانہ آپ کے اس کے ساتھ تعلق کو کیسے بناتا ہے؟
  - id: from_the_edges
    name: کناروں سے
    prompt: |
      فن پارہ کہاں ختم ہوتا ہے اور "حقیقی دنیا" کہاں شروع ہوتی ہے؟ کیا آپ اپنے
      ہاتھوں کو ویو فائنڈر کے طور پر استعمال کرنے کی کوشش کر سکتے ہیں تاکہ اپنے لیے
      فن پارے کے کناروں کو دوبارہ سے متعین کر سکیں؟ کیا کوئی واضح کنارہ ہے؟
    follow_ups:
      - جب آپ فریم بدلتے ہیں تو کیا ہوتا ہے؟
      - کیا شامل کیا جاتا ہے یا خارج کیا جاتا ہے؟
      - کام اپنی حدود سے باہر کہاں پھیلنا چاہتا ہے؟
  - id: transmogrify_it
    name: اسے بدل دیں
    prompt: |
      اگر آپ فن پارے کو کسی اور صنف میں بدل سکیں تو کیا ہوگا؟ ایک تصویر کو ایک
      ایکشن پینٹنگ یا ایک تنصیب کو ایک منظر میں؟ آپ یہ کیسے کریں گے؟ کیا یہ ترجمے
      میں بھی اپنی خصوصیت کو برقرار رکھے گا؟
    follow_ups:
      - کام کے لیے کیا ضروری ہے - کیا تبدیل ہونے کے بعد بچنا چاہیے؟
      - ترجمے میں کیا حاصل یا کھو جائے گا؟
      - کون سی صنف اس کے بارے میں کچھ نیا ظاہر کرے گی؟
  - id: the_hand_of_the_artist
    name: فنکار کا ہاتھ
    prompt: |
      فنکار کی برش اسٹروک، چھینی کے نشانات، انگلیوں کے نشانات، یہاں تک کہ بالوں
      کے شواہد کی تلاش کریں۔ تصور کریں کہ آپ خود وہ نشانات بنا رہے ہیں - آپ کو
      کس پوزیشن میں ہونا پڑے گا؟ آپ کون سے اوزار استعمال کریں گے؟
    follow_ups:
      - نشان بنانے والے کے جسم کے بارے میں کیا ظاہر ہوتا ہے؟
      - اشارہ کہاں تیز ہے یا سست، یقینی یا ہچکچاہٹ کا شکار ہے؟
      - وہ نشان بنانے میں کیسا محسوس ہوگا؟
  - id: tell_the_story
    name: کہانی سنائیں
    prompt: |
      فن کی تاریخ کہانیوں سے بھری پڑی ہے، اور آج فن، ادب اور فلم کے درمیان ایک
      اچھی بات چیت ہو رہی ہے۔ کیا فن پارے میں کوئی کہانی ہے؟ آپ اسے کیسے سناتے ہیں؟
    follow_ups:
      - اس لمحے سے پہلے یا بعد میں کیا ہوتا ہے؟
      - راوی کون ہے؟ کس کی آواز غائب ہے؟
      - کیا یہ فلم، ناول یا نظم کے طور پر کام کرے گا؟
  - id: shadowboxing
    name: شیڈو باکسنگ
    prompt: |
      گھومیں۔ بالکل قریب جائیں۔ جتنا ہو سکے دور جائیں۔ سائیڈز بدلیں۔
      اونچا جائیں۔ نیچے جائیں۔ مختلف زاویے آزمائیں۔ ایک ہی جگہ پر زیادہ دیر نہ ٹھہریں۔
      جیسے ہی آپ اس کے گرد گھومتے ہیں، فن پارے میں ہونے والی تبدیلیوں سے لطف اندوز ہوں۔
    follow_ups:
      - جب آپ اپنی پوزیشن بدلتے ہیں تو کیا بدلتا ہے؟
      - کون سا زاویہ آپ کو حیران کر گیا؟
      - آپ کے جسم کی حرکت جو آپ دیکھتے ہیں اسے کیسے بدلتی ہے؟
  - id: six_degrees_of_francis_bacon
    name: فرانسس بیکن کے چھ درجے
    prompt: |
      فنکار دوسرے فنکاروں کو متاثر کرتے ہیں۔ موضوعات اور خیالات نسلوں اور سرحدوں
      کے پار بدلتے رہتے ہیں۔ گیلری میں موجود کسی دوسری آرٹ ورک سے کم از کم
      ممکنہ لنکس کے ساتھ موجودہ آرٹ ورک کو جوڑیں۔
    follow_ups:
      - آپ سب سے مختصر راستہ کیسے تلاش کر سکتے ہیں؟
      - کس قسم کا لنک سب سے مضبوط ہے - تکنیک، موضوع، موڈ، یا خیال؟
      - فنکار رابطے کے بارے میں کیا سوچے گا؟
  - id: headlines
    name: سرخیاں
    prompt: |
      تصور کریں جس دن آرٹ ورک بنایا گیا تھا اور اس دن کے لیے ایک اخبار کی
      ہیڈلائن تلاش کریں یا بنائیں۔ اس کا آج کے فرنٹ پیجز سے موازنہ کریں۔
    follow_ups:
      - فرنٹ پیج پر کیا ہوتا؟
      - کیا بدلا ہے - اور کیا نہیں؟
      - ہیڈلائن کام کو کیسے بدلتی ہے؟
  - id: speed_date
    name: اسپیڈ ڈیٹ
    prompt: |
      ہر آرٹ ورک کے ساتھ صرف 10 سیکنڈ گزاریں۔ ایسا تب تک کریں جب تک آپ نے سب
      کو نہ دیکھ لیا ہو یا جب تک آپ کی ہمت ختم نہ ہو جائے، پھر اپنے پسندیدہ
      کاموں پر واپس جائیں اور ان کے ساتھ ٹھہریں۔ اب آپ انہیں کیسے دیکھتے ہیں؟ آپ
      کس کی طرف واپس کھنچے چلے جاتے ہیں؟
    follow_ups:
      - تیزی سے دیکھنے سے کیا پتہ چلا جو ٹھہر کر دیکھنے سے چھوٹ سکتا تھا؟
      - آپ ان خاص کاموں کی طرف کیوں لوٹے؟
      - دوسری نظر پہلی نظر سے کیسے مختلف تھی؟
  - id: make_connections
    name: روابط بنائیں
    prompt: |
      گھر جاتے ہوئے، ایسی چیز کی تلاش کریں جو آپ کو آرٹ ورک، یا اس کے کسی حصے
      کی یاد دلائے - شاید کوئی شکل یا رنگ، یا کوئی لفظ، یہاں تک کہ کوئی احساس بھی۔
    follow_ups:
      - آپ کو کیا ملا؟
      - بازگشت نے اصل کو دیکھنے کے آپ کے طریقے کو کیسے بدلا؟
      - اگر آپ کر سکتے تو آپ فنکار کو کیا دکھائیں گے؟
  - id: dinner_party
    name: عشائیہ
    prompt: |
      ایک آرٹ ورک کو ایک ذائقے سے ملائیں۔ یہ آپ کو کس کھانے یا مشروب کی یاد دلاتا ہے؟
      ایک دعوت تیار کریں۔
    follow_ups:
      - مینو کیسا لگتا؟
      - کون کہاں بیٹھے گا؟
      - پہلا نوالہ کیسا ذائقہ دے گا؟
  - id: head_off_piste
    name: راستے سے ہٹ کر
    prompt: |
      گیلری اٹینڈنٹ سے کہیں کہ وہ ان کے پسندیدہ کام کی نشاندہی کریں، یا کارڈز سے
      دور جائیں اور دیکھیں کہ آپ کیا تلاش کر سکتے ہیں۔
    follow_ups:
      - راستے سے ہٹ کر آپ کو کیا دریافت ہوا؟
      - ان کا پسندیدہ آپ کے پسندیدہ سے کیسے مختلف ہے؟
      - آپ کسی اور کو کیا تجویز کریں گے؟
  - id: make_it_anew
    name: اسے نیا بنائیں
    prompt: |
      گھر پر، اپنے ہاتھ میں موجود چیزوں کا استعمال کرتے ہوئے ایک فن پارہ دوبارہ
      بنائیں۔ اسے لکھیں، ڈرا کریں، یا ماچس کی تیلیوں سے بنائیں۔ آپ کا طریقہ جتنا
      آسان اور سادہ ہوگا، اتنا ہی بہتر ہے۔ دیکھیں کہ آپ کے ذہن میں کیا رہتا ہے،
      آپ اپنی رینڈیشن میں کیا دیکھتے ہیں۔
    follow_ups:
      - آپ نے بغیر کوشش کے کیا یاد رکھا؟
      - آپ کے ورژن نے کیا غلط کیا - اور یہ کیوں اہم ہے؟
      - اگر آپ کے پاس ایک منٹ اور ہوتا تو آپ کیا شامل کرتے؟
  - id: origin_story
    name: اصل کہانی
    prompt: |
      کیا آپ کو یاد ہے کہ آپ نے سب سے پہلے کون سا فن پارہ دیکھا تھا؟ آپ کہاں تھے؟
      آپ کی عمر کتنی تھی؟ اس کمرے کو یاد کرنے کی کوشش کریں جہاں آپ تھے، روشنی اور
      آوازیں، اسے دیکھنے کا احساس۔ کیا ایسی کوئی چیز ہے جسے آپ اب دیکھ رہے
      آرٹ ورک سے جوڑ سکتے ہیں؟
    follow_ups:
      - آپ فن کو دیکھنے میں کیا ایک جیسا رہتا ہے؟
      - وہ کم عمر خود اس کام کے بارے میں کیا سوچے گا؟
      - اس وقت سے اب تک کون سا دھاگہ چل رہا ہے؟
  - id: words_and_images
    name: الفاظ اور تصاویر
    prompt: |
      آرٹ ورک کو دیکھے بغیر، تفصیل پڑھیں، آنکھیں بند کریں اور اسے دیکھنے کی کوشش
      کریں۔ پھر انہیں کھولیں۔ کیا یہ آپ کے ورژن سے مماثل ہے؟
    follow_ups:
      - الفاظ نے کیا چھوڑ دیا؟
      - آپ نے کیا شامل کیا جو وہاں نہیں تھا؟
      - آپ کی ذہنی تصویر آپ کو اصل کو دیکھنے کے طریقے کو کیسے بدلتی ہے؟
  - id: keep_a_notebook
    name: ایک نوٹ بک رکھیں
    prompt: |
      تاریخیں، آرٹ ورکس، اور ان پر آپ کے ردعمل کا ایک لاگ بنائیں۔ اپنی نوٹس
      دیکھیں اور نئے آرٹ ورکس کی تلاش کریں۔
    follow_ups:
      - جب آپ اپنی نوٹس پڑھتے ہیں تو کون سا پیٹرن ابھرتا ہے؟
      - آپ اپنے ماضی کے خود کو کیا بتائیں گے؟
      - نوٹ بک آپ کو آگے کہاں لے جانا چاہتی ہے؟
  - id: write_a_postcard
    name: ایک پوسٹ کارڈ لکھیں
    prompt: |
      ایک آرٹ ورک کو ایک پوسٹ کارڈ لکھیں جس سے آپ خاص طور پر جڑتے ہیں۔ آپ کیا
      کہیں گے؟ یہ کیسے جواب دے سکتا ہے؟
    follow_ups:
      - آپ کو کیا کہنے کی ضرورت ہوگی جو آپ زور سے نہیں کہہ سکتے؟
      - اس کی ہینڈ رائٹنگ کیسی ہوگی؟
      - آپ کیا رکھیں گے - اور کیا آپ کبھی نہیں بھیجیں گے؟
  - id: here_today_gone
    name: آج یہاں، چلا گیا...؟
    prompt: |
      ہر فن پارہ وقت کی آزمائش پر پورا نہیں اترتا، نہ ہی ہر فنکار کا ارادہ ایسا
      ہوتا ہے۔ ایک ہیپنگ یا پرفارمنس ایک شام، شاید منٹ یا صرف سیکنڈ تک موجود
      رہ سکتی ہے! شاید آپ ایک فانی، عارضی فن پارے کی دستاویزات دیکھ رہے ہوں۔ یہ
      کتنی دیر تک چلے گا؟
    follow_ups:
      - اگر یہ کل غائب ہو جائے تو کیا کھو جائے گا؟
      - یادداشت، تصویر، یا کہانی میں کیا باقی رہتا ہے؟
      - کیا اس کی غیر دائمی حیثیت اسے دیکھنے کے آپ کے انداز کو بدل دیتی ہے؟
  - id: wrap_it_up
    name: اسے لپیٹ دیں
    prompt: |
      اگر آپ آرٹ ورک کو لپیٹ سکیں تو کیا ہوگا؟ کیا آپ پھر بھی بتا سکیں گے کہ یہ کیا
      تھا؟ کیا کوئی دوسرا آرٹ ورک اسی پیکج میں فٹ ہو سکتا ہے؟
    follow_ups:
      - پیکج کی شکل کیا ہوگی؟
      - ریپنگ پیپر کیسا لگے گا؟
      - کیا ضروری ہے - اور کیا بدلا جا سکتا ہے؟
  - id: trace_a_path
    name: راستہ بنائیں
    prompt: |
      جب آپ کسی آرٹ ورک کا سامنا کرتے ہیں تو آپ کیا دیکھتے ہیں؟ آپ کی نظر کہاں
      جاتی ہے؟ آپ کی نگاہ کہاں ٹھہرتی ہے؟ نکات کو نشان زد کریں اور ان کی
      تفصیلات کو جوڑیں۔
    follow_ups:
      - آپ بار بار کہاں جاتے ہیں؟
      - آپ نے کیا چھوڑ دیا - اور کیوں؟
      - کسی اور کے راستے سے آپ کا راستہ کیسے موازنہ کرتا ہے؟
  - id: superficial
    name: سطحی
    prompt: |
      سطح کیسی ہے؟ کیا یہ روشنی کو جذب کرتی ہے یا منعکس کرتی ہے؟ کیا یہ ہموار
      ہے یا سوراخ دار؟ کیا یہ پرت دار، بہتر، یا کھردری ہے؟ سطحی ہونے سے نہ گھبرائیں!
    follow_ups:
      - اسے چھونے میں کیسا محسوس ہوگا؟
      - سطح کیا ظاہر کرتی ہے - یا چھپاتی ہے؟
      - جب آپ سطح پر رہتے ہیں تو کیا ہوتا ہے؟
  - id: studio_visit
    name: اسٹوڈیو کا دورہ
    prompt: |
      فنکاروں جتنے اسٹوڈیو ہیں۔ اس جگہ کا تصور کریں جہاں فن پارہ تخلیق کیا گیا
      تھا: بروکلن میں ایک گودام، پیرس میں ایک ایٹیلیئر، ایک مصروف خاندانی گھر میں
      کچن ٹیبل - یا شاید کہیں اور کم متوقع جگہ پر۔
    follow_ups:
      - اس جگہ میں آپ کیا سنیں گے؟
      - یہ دن کے کس وقت بنایا گیا تھا؟
      - تصور کردہ جگہ کام کو دیکھنے کے آپ کے طریقے کو کیسے بدلتی ہے؟
  - id: switch_channels
    name: چینلز بدلیں
    prompt: |
      فن کی بجائے لوگوں کو دیکھیں۔ وہ کام کے ساتھ کیسا سلوک کرتے ہیں؟
      وہ کیا دیکھ رہے ہیں؟ کیا آپ اندازہ لگا سکتے ہیں کہ وہ کیا محسوس کر رہے ہیں؟
    follow_ups:
      - کون ٹھہرتا ہے - اور کون جلدی گزر جاتا ہے؟
      - اگر آپ پوچھیں تو وہ کیا کہیں گے؟
      - دوسروں کو دیکھنا آپ کو کیا نوٹس کرنے میں مدد کرتا ہے؟
  - id: light
    name: روشنی
    prompt: |
      روشنی کے ماخذ کی تلاش کریں۔ یہ کہاں سے آ رہی ہے؟ سائے میں کیا ہے؟ اس پر
      توجہ مرکوز کریں جو فنکار ہمیں دکھانا چاہتا ہے اور جو سائے میں چھپا ہوا ہے۔
    follow_ups:
      - روشنی کیا ظاہر کرتی ہے؟
      - سائے کیا چھپا رہے ہوں گے؟
      - مختلف روشنی میں کام کیسے بدلے گا؟
  - id: introductions
    name: تعارف
    prompt: |
      کسی آرٹ ورک کا اپنے دوست سے ایسے تعارف کرائیں جیسے وہ پارٹی میں کوئی
      جاننے والا ہو۔ آپ اسے دلچسپ بنانے کے لیے کیسے بیان کریں گے؟ آپ کی دلچسپی
      کیا ہے؟
    follow_ups:
      - آپ سب سے پہلے کس چیز پر زور دیں گے؟
      - آپ کیا چھوڑ دیں گے؟
      - کون سی ہک انہیں اسے ملنے کی خواہش دے گی؟
  - id: tipping_point
    name: ٹپنگ پوائنٹ
    prompt: |
      فن پارے کا مرکز کہاں ہے؟ کیا یہ توازن سے باہر ہے؟ ٹپنگ پوائنٹ تلاش کریں۔
    follow_ups:
      - اسے کیا گرا دے گا؟
      - اسے اپنی جگہ پر کیا رکھتا ہے؟
      - عدم توازن تناؤ - یا راحت کیسے پیدا کرتا ہے؟
  - id: homing
    name: گھر کی طرف لوٹنا
    prompt: |
      واپس آتے رہیں۔ کسی پسندیدہ آرٹ ورک پر مختلف دن یا دن کے مختلف وقتوں
      پر واپس جائیں - موسم سرما کی صبح سب سے پہلے، گرمیوں کی شام سب سے آخر میں۔
      آپ کیسا محسوس کرتے ہیں اس کا ریکارڈ رکھیں؛ ہر دورے پر آپ کے احساسات بدلتے
      ہیں۔
    follow_ups:
      - دوروں میں کیا ایک جیسا رہا؟
      - یہ آپ کو سب سے زیادہ کب حیران کر گیا؟
      - آپ اپنے ماضی کے خود کو اس کے بارے میں کیا بتائیں گے؟
  - id: one_and_only
    name: ایک اور صرف
    prompt: |
      بہت زیادہ پریشان ہونے سے بچنے کے لیے، صرف ایک آرٹ ورک دیکھیں، یا زیادہ سے
      زیادہ چند۔ گہرائی میں جائیں اور ہر ایک کے ساتھ جتنا ہو سکے وقت گزاریں۔ آپ ایک
      ہی آرٹ ورک کے سامنے ان میں سے کتنے کارڈ استعمال کر سکتے ہیں؟
    follow_ups:
      - دوسری بار دیکھنے پر آپ نے کیا دیکھا؟
      - کن کارڈز نے کچھ نیا ظاہر کیا؟
      - آپ کو کب پتہ چلا کہ آگے بڑھنے کا وقت ہے؟
  - id: press_pause
    name: روکیں
    prompt: |
      بہت سست ہو جائیں۔ آنکھیں بند کر کے دیکھنا شروع کریں، آرام کریں اور اپنی سانس
      پر توجہ مرکوز کریں، آہستہ آہستہ آنکھیں کھولیں، دوبارہ فوکس کریں، اور فن
      پارے کو آپ کے سامنے کھلنے کا وقت دیں۔
    follow_ups:
      - جب آپ سست ہوئے تو کیا ظاہر ہوا؟
      - جب آپ نے آنکھیں کھولیں تو آپ نے سب سے پہلے کیا دیکھا؟
      - آپ کی سانس آپ کو دیکھنے کے طریقے کو کیسے بدلتی ہے؟
  - id: material
    name: مواد
    prompt: |
      آرٹ ورک کس چیز سے بنا ہے؟ اگر یہ کسی اور چیز سے بنا ہوتا تو کیا ہوتا؟
      جتنا زیادہ غیر متوقع، اتنا ہی بہتر۔ کیا اس سے آپ کے اس کے بارے میں احساسات
      بدل جائیں گے؟
    follow_ups:
      - سب سے حیران کن متبادل کیا ہوگا؟
      - مواد معنی میں کیا اضافہ کرتا ہے؟
      - تبدیلی کے بعد کیا باقی رہے گا - اور کیا کھو جائے گا؟
  - id: patch_of_sky
    name: آسمان کے ایک حصے میں کتنے رنگ؟
    prompt: |
      آرٹ ورک کے ایک حصے پر زوم ان کریں۔ آپ وہاں کتنے رنگ دیکھ سکتے ہیں؟
      میوزیم کے باہر، اوپر دیکھیں اور آسمان کے ایک حصے میں آپ جتنے رنگ دیکھ سکتے
      ہیں، ان کو گننے کی کوشش کریں۔
    follow_ups:
      - جب آپ سب کچھ دیکھ رہے تھے تو آپ نے کیا چھوڑ دیا؟
      - آسمان آرٹ ورک سے کیسے موازنہ کرتا ہے؟
      - کون سا رنگ آپ کو سب سے زیادہ حیران کر گیا؟
  - id: greening
    name: سبز ہونا
    prompt: |
      آرٹ ورک کس قسم کا پودا ہوگا؟ کیا یہ موسم گرما کا آلو کا درخت ہوگا، جو
      پھلوں سے بھرا ہوا ہے، یا نازک فرن کی طرح؟ اسے بڑھنے کے لیے کن حالات کی ضرورت ہے؟
    follow_ups:
      - یہ کہاں پھلے گا - اور کہاں مرجھا جائے گا؟
      - اسے کھلنے کے لیے کیا چاہیے ہوگا؟
      - بوٹینیکل استعارہ اسے دیکھنے کے آپ کے طریقے کو کیسے بدلتا ہے؟
