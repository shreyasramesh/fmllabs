# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# کیلیفورنیا سپر بلوم کو دیکھنے کے طریقے (Urdu)

id: ways_of_looking_at_california_superbloom
name: کیلیفورنیا سپر بلوم کو دیکھنے کے طریقے
description: |
  کیلیفورنیا میں سپر بلوم کا تجربہ کرتے وقت آپ کے نقطہ نظر کو بدلنے کے لیے کارڈز۔
  ہر ایک پھولوں، پہاڑی ڈھلوانوں اور موسم سرما کی بارش کے بعد رنگ کے عارضی دھماکے کو
  آپ کی بصارت کو گہرا کرنے کے لیے ایک مختلف لینس پیش کرتا ہے۔
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: وہ بارش جس نے اسے بنایا
    prompt: |
      پھولوں سے پہلے، بارش تھی۔ ان طوفانوں کا تصور کریں جنہوں نے مٹی کو بھرا،
      بیج جو زمین کے نیچے انتظار کر رہے تھے۔ اس پھول کے لیے کیا حالات
      ملازم ہونے تھے؟ سپر بلوم کو اس کی اصل کی طرف واپس ٹریس کریں۔
    follow_ups:
      - زیادہ یا کم بارش سے کیا مختلف ہوتا؟
      - ایک پہاڑی ڈھلوان کے پیچھے کتنے سالوں کی نیند ہو سکتی ہے؟
      - اس لمحے کا کیا مطلب ہے جو کبھی ضمانت نہیں تھا؟
  - id: one_species_at_a_time
    name: ایک وقت میں ایک قسم
    prompt: |
      ایک ہی پھول کی قسم چنیں اور اس کی پیروی کریں۔ نارنجی پوست، جامنی لوپین،
      پیلی گالفیلڈز—ایک لمحے کے لیے باقی سب کو نظر انداز کریں۔ صرف ایک پر توجہ
      کرنے سے آپ کیا دیکھتے ہیں وہ کیسے بدلتا ہے؟
    follow_ups:
      - یہ قسم کہاں حاوی ہے—اور کہاں یہ ہار مانتی ہے؟
      - اگر صرف یہ ایک پھولتا تو پہاڑی ڈھلوان کیسی لگتی؟
      - یہ دوسروں کے درمیان اپنی جگہ کیسے قائم رکھتا ہے؟
  - id: pollinators_view
    name: پولینیٹرز کا نظریہ
    prompt: |
      تصور کریں کہ آپ ایک مکھی، ایک تتلی، یا ایک ہممنگ برڈ ہیں۔ کیا آپ کو اپنی طرف
      کھینچے گا؟ آپ پہلے کون سے پھولوں کا دورہ کریں گے؟ پنکھڑیوں سے چند انچ اوپر
      سے منظر کیسا لگتا ہے؟
    follow_ups:
      - کون سے نمونے آپ کے راستے کی رہنمائی کریں گے؟
      - آپ کون سے پھول چھوڑیں گے—اور کیوں؟
      - پیمانہ تجربہ کو کیسے بدلتا ہے؟
  - id: ground_level
    name: زمین کی سطح
    prompt: |
      نیچے جھک جائیں۔ اپنے پیٹ کے بل لیٹ جائیں یا گھٹنوں کے بل بیٹھ جائیں۔
      مٹی کے نقطہ نظر سے سپر بلوم دیکھیں—تنے اوپر اٹھتے ہوئے، پنکھڑیاں آپ کے
      اوپر خمیدہ، آسمان اوپر ایک دور دراز پٹی۔
    follow_ups:
      - کھڑے ہونے کی اونچائی سے آپ نے کیا چھوٹا؟
      - نیچے کی زمین کیسی محسوس ہوتی ہے؟
      - ایک کیڑا یہاں سے کیا دیکھے گا؟
  - id: time_lapse
    name: ٹائم لیپس
    prompt: |
      سپر بلوم ایک طویل کہانی کا ایک لمحہ ہے۔ پہاڑی ڈھلوان کا تصور کریں
      تیز رفتار میں: سبز ٹہنیاں، پہلی کلیاں، چوٹی کا رنگ، پھر fading۔ یہ تماشا
      کتنی دیر تک رہتا ہے؟ اس سے پہلے اور بعد میں کیا آتا ہے؟
    follow_ups:
      - اگر آپ صرف ایک بار جا سکتے تو آپ کب وزٹ کرنا پسند کرتے؟
      - جب آپ پہنچتے ہیں تو کیا پہلے ہی جا چکا ہوتا ہے؟
      - رنگ کے fading کے بعد کیا باقی رہے گا؟
  - id: the_chemistry_of_color
    name: رنگ کی کیمسٹری
    prompt: |
      رنگوں پر توجہ مرکوز کریں۔ نارنجی، جامنی، پیلے، نیلے—ہر رنگ کس سے بنتا ہے؟
      وہ کیسے تعامل کرتے ہیں؟ رنگ کہاں ٹکراتے ہیں، اور کہاں وہ ہم آہنگ ہوتے ہیں؟
      پہاڑی ڈھلوان کو ایک پیلیٹ کے طور پر علاج کریں۔
    follow_ups:
      - آپ کون سا رنگ شامل کریں گے—یا ہٹائیں گے؟
      - دن بھر روشنی رنگوں کو کیسے بدلتی ہے؟
      - یہ سیاہ اور سفید میں کیسا لگے گا؟
  - id: negative_space
    name: منفی جگہ
    prompt: |
      جو پھول نہیں ہیں اسے دیکھیں۔ آسمان، مٹی کے خالی پیوند، پھولوں کے درمیان
      خالیاں۔ خالی جگہ آپ جو دیکھتے ہیں اسے کیسے شکل دیتی ہے؟ جو موجود نہیں
      ہے اس کی اہمیت محسوس کریں۔
    follow_ups:
      - خالی پن کہاں مرتکز ہوتا ہے؟
      - وہ خلاء کیا بھریں گے—اور کیا انہیں بھرنا چاہیے؟
      - منفی جگہ مجموعہ کو کیسے اکٹھا رکھتی ہے؟
  - id: the_path_through
    name: گزرنے کا راستہ
    prompt: |
      راستوں کو دیکھیں۔ انسانی، جانور، یا ہوا سے اڑنے والے۔ لوگ کہاں چلتے ہیں؟
      منظر کہاں گزرنے کی مزاحمت کرتا ہے؟ پھولوں کے ذریعے ایک راستہ ٹریس کریں
      اور پوچھیں کہ اسے فالو کرنے کی کیا قیمت ہوگی۔
    follow_ups:
      - وہاں نہ چل کر آپ کیا بچائیں گے؟
      - راستہ آپ کو کہاں لے جانا چاہتا ہے؟
      - ٹریل پر رہنے سے آپ کیا چھوٹیں گے؟
  - id: geology_beneath
    name: نیچے کی جیولوجی
    prompt: |
      پھول لاکھوں سالوں پر آرام کرتے ہیں۔ مٹی کے نیچے کون سی چٹان ہے؟
      ان پہاڑیوں کو کس نے شکل دی؟ سپر بلوم کو اپنے پاؤں کے نیچے گہرے وقت سے
      سے جوڑنے دیں۔
    follow_ups:
      - جیولوجی یہاں کیا اگتا ہے اس کو کیسے متاثر کرتی ہے؟
      - پہاڑیاں بننے سے پہلے یہ جگہ کیسی لگتی ہوگی؟
      - جب پھول چلے جائیں گے تو کیا باقی رہے گا؟
  - id: scent_and_sound
    name: خوشبو اور آواز
    prompt: |
      اپنی آنکھیں بند کریں۔ آپ کو کیا بو آتی ہے؟ پولن، دھول، بابا، نم مٹی؟
      آپ کیا سنتے ہیں؟ شہد کی مکھیوں، ہوا، قدموں، خاموشی؟ لمحے کے لیے غیر بصری
      حواسوں کو رہنمائی کرنے دیں۔
    follow_ups:
      - تجربے کو پکڑنے کے لیے آپ کون سی آواز شامل کریں گے؟
      - جب آپ حرکت کرتے ہیں تو خوشبو کیسے بدلتی ہے؟
      - اگر آپ صرف دیکھتے تو کیا چھوٹ جاتا؟
  - id: light_and_shadow
    name: روشنی اور سایہ
    prompt: |
      دیکھیں کہ روشنی پہاڑی ڈھلوان پر کیسے حرکت کرتی ہے۔ صبح، دوپہر، شام—سورج
      کی زاویہ پھولوں کو کیسے بدلتی ہے؟ سائے کہاں پڑتے ہیں؟ کیا ظاہر ہوتا ہے
      اور کیا چھپا ہوتا ہے؟
    follow_ups:
      - روشنی کب سب سے زیادہ زندہ محسوس ہوتی ہے؟
      - آپ صبح کے وقت کیا دیکھیں گے جو دوپہر میں چھوٹ جائے گا؟
      - سائے منظر کو کیسے شکل دیتے ہیں؟
  - id: seed_to_flower
    name: بیج سے پھول
    prompt: |
      ایک اکیلے پودے کو بیج سے پھول تک ٹریس کریں۔ یہ یہاں کیسے پہنچا؟ ہوا، جانور،
      پانی؟ اس نے کتنی دیر انتظار کیا؟ جب پنکھڑیاں گر جائیں گی تو وہ کیا بن جائے
      گا؟ ایک زندگی کو اس کے چکر میں فالو کریں۔
    follow_ups:
      - بیج نے زمین کے نیچے کیا دیکھا ہوگا؟
      - پودا پیچھے کیا چھوڑے گا؟
      - اس پہاڑی ڈھلوان میں کتنی نسلیں نمائندگی کرتی ہیں؟
  - id: micro_vs_macro
    name: مائیکرو بمقابلہ میکرو
    prompt: |
      ایک اکیلے پتی، ایک اوس کی بوند، پولن کے ایک دانے پر زوم ان کریں۔ پھر
      پوری پہاڑی ڈھلوان، وادی، ریاست تک پیچھے ہٹیں۔ پیمانہ سپر بلوم کے
      مطلب کو کیسے بدلتا ہے؟
    follow_ups:
      - ایک پیمانے پر کیا پوشیدہ ہے اور دوسرے پر واضح ہے؟
      - آپ کی توجہ قدرتی طور پر کہاں ٹھہرتی ہے؟
      - میکرو نظارہ مائیکرو کو کیسے بدلتا ہے—اور اس کے برعکس؟
  - id: weathers_hand
    name: موسم کا ہاتھ
    prompt: |
      سپر بلوم موسم کا تعاون ہے۔ بارش، دھوپ، ہوا، درجہ حرارت—ہر ایک کا اپنا
      کردار ہے۔ موسم کو ایک شریک تخلیق کار کے طور پر تصور کریں۔ اس نے کیا فیصلہ
      کیا؟ اس نے کیا روکا؟
    follow_ups:
      - ایک مختلف موسم سرما نے کیا پیدا کیا ہوگا؟
      - آج کا موسم آپ کے تجربے کو کیسے شکل دیتا ہے؟
      - اگر پھول بول سکتے تو وہ موسم کے بارے میں کیا کہتے؟
  - id: human_witness
    name: انسانی گواہی
    prompt: |
      آپ یہاں دیکھنے والے پہلے شخص نہیں ہیں۔ اور کون یہاں کھڑا ہوا ہے؟
      ریاست کے مالک، مقامی لوگ، فوٹوگرافر، مسافر۔ آپ کی موجودگی جگہ کو
      کیسے بدلتی ہے؟ گواہی دینے کا کیا مطلب ہے؟
    follow_ups:
      - وہ کیا دیکھتے جو آپ نہیں دیکھتے؟
      - آپ کیا لے کر جائیں گے؟
      - گواہی دینے میں ملکیت رکھنے یا لینے سے کیا فرق ہے؟
  - id: the_next_year
    name: اگلا سال
    prompt: |
      یہ پھول بالکل دوبارہ نہیں ہوگا۔ اگلے سال خشک سالی، یا آگ، یا اقسام
      کا ایک مختلف مرکب ہو سکتا ہے۔ ایک سال بعد واپسی کا تصور کریں۔ آپ کیا
      پانا چاہیں گے؟ آپ کیا کھونا کے لیے تیار ہوں گے؟
    follow_ups:
      - یہ لمحہ ناقابل تلافی کیا بناتا ہے؟
      - آپ اپنے مستقبل کے خود کو کیا بتائیں گے؟
      - عارضی پن تجربے کو کیسے گہرا کرتا ہے؟
  - id: texture_and_touch
    name: بناوٹ اور چھونے
    prompt: |
      پھولوں کے ذریعے ہاتھ پھیرنے میں کیسا محسوس ہوگا؟ نرم پنکھڑیاں، سخت
      تنوں، چپچپا پولن، کھردرا پتیاں۔ چھوئے بغیر بناوٹ کا تصور کریں—یا، جہاں
      اجازت ہو، نرمی سے چھوئیں اور نوٹس لیں۔
    follow_ups:
      - کون سی بناوٹ آپ کو سب سے زیادہ حیران کرتی ہے؟
      - آپ کیا چھونے سے گریز کریں گے—اور کیوں؟
      - بناوٹ اس میں کیا اضافہ کرتی ہے جسے صرف رنگ اکیلا بیان نہیں کر سکتا؟
  - id: before_and_after
    name: پہلے اور بعد میں
    prompt: |
      اس پہاڑی ڈھلوان کا خشک موسم میں تصور کریں—بھورا، سویا ہوا، بظاہر مردہ۔
      اب دونوں تصاویر کو تھامیں: پہلے اور بعد میں۔ تضاد لچک، صبر، اور تبدیلی
      کے بارے میں کیا ظاہر کرتا ہے؟
    follow_ups:
      - خشک موسم دیکھنے والے کو کیا چھوٹ جائے گا؟
      - نیند کی یادداشت پھول کو کیسے مالا مال کرتی ہے؟
      - یہ اور کون سے "پہلے اور بعد" کے لمحات کو ابھارتا ہے؟
  - id: make_it_a_mixtape
    name: اسے ایک مکس ٹیپ بنائیں
    prompt: |
      یہ منظر نامہ کس موسیقی کے ساتھ آئے گا؟ سپر بلوم کے لیے ایک پلے لسٹ بنائیں
      ۔ کون سا ٹیمپو، کون سا موڈ، کون سے آلات؟ پھولوں کو ساؤنڈ ٹریک تجویز کرنے
      دیں۔
    follow_ups:
      - افتتاحی ٹریک کیا ہے؟
      - موسیقی کو پھولوں سے جوڑنے والا کون سا معیار ہے—تال، رنگ، احساس؟
      - دن کے مختلف وقتوں میں پلے لسٹ کیسے بدلے گی؟
  - id: take_one_thing_home
    name: ایک چیز گھر لے جائیں
    prompt: |
      آپ پھول نہیں لے جا سکتے—وہ یہیں کے ہیں۔ لیکن آپ ایک یاد، ایک احساس،
      ایک سوال لے سکتے ہیں۔ آپ کیا ایک چیز لے کر جائیں گے؟ آپ اسے ایک بھی پھول
      توڑے بغیر کیسے تھامے رکھیں گے؟
    follow_ups:
      - آپ کسی ایسے شخص کو کیا دکھائیں گے جو آ نہیں سکا؟
      - آپ بعد میں اسے کیسے بیان کریں گے؟
      - آپ جان بوجھ کر کیا پیچھے چھوڑیں گے؟
