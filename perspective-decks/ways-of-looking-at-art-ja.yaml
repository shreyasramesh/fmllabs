# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# アートの見方 (Japanese)

id: ways_of_looking_at_art
name: アートの見方
description: |
  アート鑑賞の視点を変えるカード集です。それぞれが、作品への見方や関わり方を深めるための
  異なるレンズを提供します。
domain: art
cards:
  - id: souvenir
    name: お土産
    prompt: |
      作品の中から何か一つを選び、次に観る作品の中に隠してください。
      新しい構図にどのように取り込みますか？
    follow_ups:
      - 何を持ち運びたいと思いますか？
      - 新しい文脈では、それは何を得て、何を失うでしょうか？
      - 新しい作品にどこに収まる、あるいは収まるのを拒むでしょうか？
  - id: throw_a_party
    name: パーティーを開く
    prompt: |
      部屋にいるすべてのアーティストを招待してください。彼らは何を着ていますか？
      何を考えているでしょうか？
    follow_ups:
      - 誰が誰に惹かれそうか？
      - 彼らは何について議論するだろうか？
      - お互いの作品の何に驚くか？
  - id: time_out
    name: 休憩
    prompt: |
      外に出ましょう。光、音、感覚に集中してください。周囲の状況に身を置いてください。
      アートを鑑賞する体験は、作品そのものだけでなく、その間の空間も同様に重要です。
    follow_ups:
      - アートから意識をそらしたときに何に気づきますか？
      - 部屋はどのようにあなたの見え方を変えますか？
      - 急いで通り過ぎると、何を見逃しますか？
  - id: plan_a_trip
    name: 旅行を計画する
    prompt: |
      今日あなたが見たものは、より大きな旅の第一歩かもしれません。
      ギャラリーや展示スペースを出たら、次に観たい作品を選び、それを中心に旅行を計画してください。
    follow_ups:
      - その旅はどこへ連れて行ってくれますか？
      - 途中、何を見る必要があるでしょうか？
      - なぜこの作品なのか—旅をする価値があるほど何がそれを特別なものにしているのですか？
  - id: in_black_and_white
    name: 白黒で
    prompt: |
      光と影の戯れに集中しましょう—白黒写真で撮るのも助けになるかもしれません。
      トーンはどこで最も暗いですか？それがどのように奥行きを示唆しているか、またはしていないか？
      それが構成の理解をどのように助けますか？
    follow_ups:
      - 色を取り除くと、何が消えますか？
      - 何がより明確になりますか？
      - グレースケール版では、あなたの目はどこに最初に向かいますか？
  - id: give_it_a_voice
    name: 声を与える
    prompt: |
      この作品はどんな音を立てるでしょうか？色、形、フォルムをどのように聞くことができますか？
    follow_ups:
      - 大きい音ですか、静かですか？鋭いですか、柔らかいですか？
      - どの楽器や質感がそれを捉えることができるでしょうか？
      - この作品における沈黙はどのような音になるでしょう？
  - id: find_the_middle_ground
    name: 中間点を見つける
    prompt: |
      作品はあなたからどれくらい離れていますか？あなたの体の大きさと比べてどれくらい大きいですか？
      どれくらい重いですか？どれくらいのスペースを占めますか？家に収まりますか？
    follow_ups:
      - 手で持てるとしたら、何が変わりますか？
      - 部屋の大きさだったらどうなりますか？
      - スケールは、それとの関係をどのように形作りますか？
  - id: from_the_edges
    name: 端から
    prompt: |
      作品はどこで終わり、「現実世界」はどこから始まりますか？
      手をファインダーのように使って、作品の端を自分で再定義してみてください。
      明確な端はありますか？
    follow_ups:
      - フレームを変えると何が起こりますか？
      - 何が含まれ、何が除外されますか？
      - 作品はどこまで境界を超えて広がりたいと思っていますか？
  - id: transmogrify_it
    name: 変身させる
    prompt: |
      もし作品を別のジャンルに変えられたらどうなるでしょうか？
      写真がアクションペインティングに、インスタレーションが風景画に？どのようにしますか？
      翻訳されても、そのキャラクターを保持できますか？
    follow_ups:
      - 作品にとって不可欠なものは何ですか—変化を生き延びなければならないものは？
      - 翻訳で何が得られ、何が失われるでしょうか？
      - どのジャンルがそれについて新しい何かを明らかにするでしょうか？
  - id: the_hand_of_the_artist
    name: アーティストの手
    prompt: |
      アーティストの筆致、ノミの跡、指紋、さらには毛髪の証拠を探してください。
      自分でそれらの跡をつけることを想像してみてください—どのような姿勢が必要ですか？
      どのような道具を使いますか？
    follow_ups:
      - その痕跡は、製作者の身体について何を明らかにしますか？
      - 筆致は速いですか、遅いですか？確実ですか、ためらいがちですか？
      - その跡をつけるのはどんな感じがしますか？
  - id: tell_the_story
    name: 物語を語る
    prompt: |
      美術史は物語に富んでおり、現代ではアート、文学、映画の間にエキサイティングな対話があります。
      作品の中に物語はありますか？どのように語りますか？
    follow_ups:
      - この瞬間の前や後に何が起こりますか？
      - 語り手は誰ですか？誰の声が欠けていますか？
      - 映画、小説、詩として機能するでしょうか？
  - id: shadowboxing
    name: シャドーボクシング
    prompt: |
      動き回ってください。とても近くに寄ってください。できるだけ遠くへ行ってください。
      反対側に回ってください。上へ。下へ。さまざまな角度を試してください。
      同じ場所に長く留まらないでください。
      あなたが作品の周りを移動するにつれて、作品が演じる変化を味わってください。
    follow_ups:
      - 位置を変えると何が変わりますか？
      - どの角度があなたを驚かせましたか？
      - あなたの体の動きは、あなたの見え方をどのように変えますか？
  - id: six_degrees_of_francis_bacon
    name: フランシス・ベーコンの6次の隔たり
    prompt: |
      アーティストはお互いに影響を与え合います。テーマとアイデアは、世代を超えて、国境を越えて進化します。
      できるだけ少ないリンクで、作品をギャラリーの別の作品に繋げてください。
    follow_ups:
      - あなたが見つけられる最短の経路は何ですか？
      - どの種類のリンクが最も強力ですか—テクニック、主題、ムード、またはアイデア？
      - アーティストは、そのつながりをどのように考えるでしょうか？
  - id: headlines
    name: ヘッドライン
    prompt: |
      作品が作られた日を想像し、その日の新聞の見出しを見つけるか、発明してください。
      今日のトップページと比較してください。
    follow_ups:
      - 折込記事の上には何があったでしょうか？
      - 何が変わり—そして何が変わらなかったか？
      - ヘッドラインは作品をどのように再構成しますか？
  - id: speed_date
    name: スピードデート
    prompt: |
      各作品に10秒だけ費やしてください。すべての作品を見るか、元気がなくなるまでこれを行い、
      その後お気に入りに戻ってゆっくり鑑賞してください。
      今、それらをどのように見ていますか？どの作品に惹かれますか？
    follow_ups:
      - ゆっくり鑑賞していると見逃してしまいがちな、素早い観察で何が明らかになりましたか？
      - なぜそれらの特定の作品に戻ってきたのですか？
      - 2回目の鑑賞は1回目とどのように異なりましたか？
  - id: make_connections
    name: つながりを作る
    prompt: |
      帰り道に、作品、またはその一部—形や色、あるいは言葉、感覚—を思い起こさせるものを探してください。
    follow_ups:
      - 何を見つけましたか？
      - その響きは、元の作品の見え方をどのように変えましたか？
      - もしできたら、アーティストに何を見せたいですか？
  - id: dinner_party
    name: 晩餐会
    prompt: |
      作品を味に例えてください。どんな食べ物や飲み物を思い出しますか？
      ご馳走を組み立ててください。
    follow_ups:
      - メニューはどのようなものになるでしょうか？
      - 誰がどこに座りますか？
      - 最初の一口はどんな味がするでしょうか？
  - id: head_off_piste
    name: 斜面を外れる
    prompt: |
      ギャラリーの係員に一番好きな作品を指差してもらうか、カードから離れて自分で何かを見つけてください。
    follow_ups:
      - 定番から外れて、何を発見しましたか？
      - 彼らの好きな作品は、あなたの好きな作品とどう違いますか？
      - 他の人に何を勧めますか？
  - id: make_it_an_mixtape
    name: ミックステープにする
    prompt: |
      その作品は、特定の歌や音楽をあなたの心に呼び起こしますか？
      アートと音楽はさまざまな方法で重なり合い、しばしば似た言語を共有します。
      それらはどのような共通点を持っていますか？ギャラリー訪問ごと、または個々のアーティストごとにプレイリストを作成してください。
    follow_ups:
      - オープニングトラックは何ですか？
      - 作品と音楽を結びつける品質は何ですか—リズム、ムード、テクスチャー？
      - 1年後に再訪したら、プレイリストはどのように変わるでしょうか？
  - id: read_in_context
    name: 文脈で読む
    prompt: |
      作品はどこにありますか？その周囲は、それがどのように受け入れられるかにどのように影響しますか？
      それはビラボード上、ギャラリーの外、湖の真ん中にありますか？
      作品とその周囲との会話に耳を澄ませてください。
    follow_ups:
      - もしそれがどこか別の場所にあったら、何が変わるでしょうか？
      - 部屋や空間は何を返していますか？
      - ここでの観客は誰ですか—そして誰が欠けていますか？
  - id: understand_it_less
    name: 理解を減らす
    prompt: |
      あなたの好奇心を受け入れてください。作品に対するあなたの経験について、何が奇妙または新しいかを自問してください。
      それをさらに奇妙にするにはどうすればよいですか？作品を少しでも理解しようとすることで、それが「意味しているはずのこと」から解放されましょう！
    follow_ups:
      - 新鮮に見るためには、何を学び直す必要がありますか？
      - 答えのない質問は何ですか—そしてそれはなぜ重要ですか？
      - 「間違える」とはどういうことでしょうか？
  - id: chaos_or_control
    name: カオスかコントロールか？
    prompt: |
      それはランダムに見えますか、それとも計画がありますか？
      偶然、事故、そしてセレンディピティは、作品の制作において、しばしば重要な役割を果たします。
      自然に起こったことと、コントロールされたことを見つけようとしてください。
    follow_ups:
      - アーティストはどこで手綱を握り—そしてどこで手放しますか？
      - 事故が本質的なものになった可能性のあるものは何ですか？
      - もっとカオス—あるいはもっとコントロール—があれば、作品はどう変わるでしょうか？
  - id: palimpsest
    name: パリンプセスト
    prompt: |
      層を探してください！何が隠され、何が明らかにされていますか？
      作品の厚みはどれくらいですか？表面は時間をかけて築き上げられましたか？
    follow_ups:
      - 表面の下には何がありますか？
      - 剥がすことができたら、何を見つけますか？
      - 時間は層の中でどのように現れますか？
  - id: pattern_recognition
    name: パターン認識
    prompt: |
      繰り返される要素に注意してください。パターンはありますか？繰り返されるモチーフはありますか？
      特定の形が互いに響き合っていますか？
    follow_ups:
      - パターンを壊すのは何ですか—そしてなぜですか？
      - 繰り返しはあなたの視線をどこへ導きますか？
      - 全作品を通して一つのモチーフをたどったら、何が起こるでしょうか？
  - id: through_another_pair_of_eyes
    name: 別の目のペアを通して
    prompt: |
      小説、映画、演劇、または歴史上の人物からキャラクターを思い浮かべてください。
      そのキャラクターと作品について会話していることを想像してください。
      作品に対する彼らの意見に同意しますか？
    follow_ups:
      - 彼らはあなたが見逃したことに何に気づくでしょうか？
      - どこで意見が分かれる—そしてなぜですか？
      - 彼らはあなたにそれについてどんな質問をするでしょうか？
  - id: thermostat
    name: サーモスタット
    prompt: |
      色は何度ですか？作品の中で最も冷たい色を探し、次に暖かい色調を特定してください。
      一つの作品の中に、いくつくらいの生態系を見つけることができますか？
    follow_ups:
      - 熱と冷たいものはどこで出会い—そしてそこで何が起こりますか？
      - 作品はどのような気候を呼び起こしますか？
      - その温度に足を踏み入れたら、どのように感じるでしょうか？
  - id: negative_space
    name: ネガティブスペース
    prompt: |
      作品内の個々の要素間の隙間は、要素そのものと同様に重要です。
      ジグソーパズルのように、欠けているピースに注意を払ってください。
      ネガティブスペース：それはそこにあるものをどのようにフレーミングしますか？その重要性を感じてください。
    follow_ups:
      - 空虚はどのような形をとりますか？
      - 隙間を埋めるのは何ですか—そして埋めるべきですか？
      - ネガティブスペースは構成をどのようにまとめていますか？
  - id: make_yourself_at_home
    name: くつろいでください
    prompt: |
      作品の中に這い込むのを想像してみてください。どこに隠れますか？
      何が見えますか？どのように感じますか？
    follow_ups:
      - 中からは何が聞こえますか？
      - どこに最も安全—または最も無防備に感じるでしょうか？
      - もしそこに留まることができたら、何を持って行きますか？
  - id: homage
    name: 賛辞
    prompt: |
      お気に入りのアーティストのために、祭壇またはミニ展示を作成してください。
      ショップのポストカードから始めて、または作品への参照を加え、奥行きと色を加えるオブジェクトや画像を見つけてください。
    follow_ups:
      - あなたの祭壇の中心には何が置かれますか？
      - どのオブジェクトが彼らを驚かせるでしょうか？
      - キュレーションするという行為は、彼らの作品の見方をどのように変えますか？
  - id: warm_up
    name: ウォームアップ
    prompt: |
      感覚を整えるために体を覚醒させてください。走る、ジャンプする、ストレッチする、手を叩く、つま先を動かす。
      作品を見ているときに、体にどのような身体感覚があるかに注意してください。
    follow_ups:
      - 体のどこに作品を感じますか？
      - 動きはあなたの見え方をどのように変えますか？
      - 見るのをやめた後、どの感覚が残りますか？
  - id: make_it_anew
    name: 新たに作る
    prompt: |
      家で、手元にあるものだけを使って作品を再現してください。
      書き留める、描き出す、マッチで建てる。方法が簡単でシンプルであるほど良いです。
      あなたの心に残るもの、あなたの再現で気づいたことを見てください。
    follow_ups:
      - 無理なく覚えていることは何でしたか？
      - あなたのバージョンは何を間違えましたか—そしてそれはなぜ重要ですか？
      - あと1分あれば、何を追加しますか？
  - id: origin_story
    name: 起源の物語
    prompt: |
      あなたが最初に見た作品を覚えていますか？どこにいましたか？何歳でしたか？
      いた部屋、光と音、それを見ている感覚を思い出してみてください。
      今見ている作品に繋がるものはありますか？
    follow_ups:
      - アートの見方で、何が変わらずに残っていますか？
      - その若い頃のあなたは、この作品をどう思うでしょうか？
      - その時と今を繋ぐ糸は何ですか？
  - id: words_and_images
    name: 言葉とイメージ
    prompt: |
      作品を見ずに、説明を読んで、目を閉じて、それを想像してみてください。
      それから目を開けてください。あなたのバージョンと一致しますか？
    follow_ups:
      - 言葉は何を省略しましたか？
      - あなたは何を加えましたか—それはそこにありませんでしたか？
      - あなたの心の中のイメージは、実際のイメージの見え方をどのように変えますか？
  - id: keep_a_notebook
    name: ノートを保持する
    prompt: |
      日付、作品、そしてそれらに対するあなたの応答の記録を作成してください。
      あなたのメモを見直し、新しい作品を探してください。
    follow_ups:
      - あなたのメモを読むと、どのようなパターンが現れますか？
      - あなたの過去の自分に何を伝えますか？
      - ノートは次にどこへあなたを連れて行こうとしていますか？
  - id: write_a_postcard
    name: ポストカードを書く
    prompt: |
      特に心惹かれる作品にポストカードを書いてください。何を言いますか？
      それはどのように返信しますか？
    follow_ups:
      - 口に出して言えなかったことの中で、何を伝える必要がありましたか？
      - その筆跡はどのようなものになるでしょうか？
      - 何を保管し—そして決して送らないものは何ですか？
  - id: here_today_gone
    name: 今日ここに、明日消える…？
    prompt: |
      すべての作品が時の試練を乗り越えるわけではありませんし、すべてのアーティストの意図でもありません。
      ハプニングやパフォーマンスは、一晩、あるいは数分、ほんの数秒しか存在しないかもしれません！
      おそらくあなたは、儚く一時的な作品の記録を見ています。それはどれくらい続きますか？
    follow_ups:
      - 明日消えてしまったら、何が失われますか？
      - 記憶、写真、物語の中で、何が生き残りますか？
      - その非永続性は、あなたの作品の見方をどのように変えますか？
  - id: wrap_it_up
    name: 包む
    prompt: |
      もし作品を包むことができたらどうなるでしょうか？
      それが何であるか、まだわかりますか？同じパッケージに別の作品が入るでしょうか？
    follow_ups:
      - パッケージはどのような形をとるでしょうか？
      - 包み紙はどのようなものになるでしょうか？
      - 何が本質的—そして何が交換可能ですか？
  - id: trace_a_path
    name: 道をたどる
    prompt: |
      作品に遭遇したとき、何を見ますか？あなたの目は次にどこへ移動しますか？
      あなたの視線はどこで落ち着きますか？点をプロットし、線で結んでください。
    follow_ups:
      - どこに何度も戻ってきますか？
      - 何をスキップしましたか—そしてなぜですか？
      - あなたの経路は、他の人とどのように比較されますか？
  - id: superficial
    name: 表層的
    prompt: |
      表面はどのような感じですか？光を吸収しますか、それとも反射しますか？
      滑らかですか、それとも穴が開いていますか？層状になっていますか、洗練されていますか、それとも粗いですか？
      浅くなることを恐れないでください！
    follow_ups:
      - 触るとどのような感じがするでしょうか？
      - 表面は何を明らかに—または隠していますか？
      - 表面にとどまると何が起こりますか？
  - id: studio_visit
    name: スタジオ訪問
    prompt: |
      アーティストがいる限り、アーティストのスタジオはあります。
      作品が制作された空間を想像してください：ブルックリンの倉庫、パリのアトリエ、
      賑やかな家庭のキッチンテーブル—あるいは、それよりも珍しい場所かもしれません。
    follow_ups:
      - その空間では何が聞こえるでしょうか？
      - それはいつ作られましたか？
      - 想像上の場所は、作品の見方をどのように変えますか？
  - id: switch_channels
    name: チャンネルを切り替える
    prompt: |
      アートではなく、人を見てください。彼らは作品にどのように振る舞いますか？
      彼らは何を見ていますか？彼らが何を感じているか推測できますか？
    follow_ups:
      - 誰が長居し—そして誰が通り過ぎますか？
      - もし尋ねたら、彼らは何と言うでしょうか？
      - 他の人を見ることは、あなたの気づきをどのように変えますか？
  - id: light
    name: 光
    prompt: |
      光源を探してください。どこから来ていますか？影の中には何がありますか？
      アーティストが私たちに見せたいものと、影の中に隠されているものに集中してください。
    follow_ups:
      - 光は何を明らかにしますか？
      - 影は何を隠している可能性がありますか？
      - 異なる光の下では、作品はどう変わるでしょうか？
  - id: introductions
    name: 紹介
    prompt: |
      パーティーで知人を紹介するように、作品を友人に紹介してください。
      彼らの興味を引くように、どのように説明しますか？
      あなたを惹きつけるものは何ですか？
    follow_ups:
      - まず何を強調しますか？
      - 何を省略しますか？
      - 彼らに会いたいと思わせるフックは何ですか？
  - id: tipping_point
    name: 転換点
    prompt: |
      作品の中心はどこですか？バランスが崩れていますか？転換点を探してください。
    follow_ups:
      - 何がそれをひっくり返すでしょうか？
      - 何がそれを所定の位置に保持していますか？
      - 不均衡はどのように緊張—または解放を生み出しますか？
  - id: homing
    name: 帰巣
    prompt: |
      行き続けましょう。お気に入りの作品に、異なる日または異なる時間帯に戻ってください—
      冬の初めに、夏の夕方に最後に。
      各訪問でどのように感じるかを記録してください；あなたの感情は各訪問で変化します。
    follow_ups:
      - 訪問を通して、何が変わらずに残っていますか？
      - いつ一番驚きましたか？
      - あなたの過去の自分にそれについて何を伝えますか？
  - id: one_and_only
    name: ただ一つ
    prompt: |
      圧倒されるのを避けるために、たった一つの作品、またはせいぜい数点だけを選んでください。
      深く掘り下げ、それぞれにできるだけ多くの時間を費やしてください。
      一つの作品の前で、これらのカードをいくつ使えますか？
    follow_ups:
      - 2回目の鑑賞で何に気づきましたか？
      - どのカードが新しい何かを明らかにしましたか？
      - いつ移動する時だと知りましたか？
  - id: press_pause
    name: 一時停止
    prompt: |
      ゆっくりしてください。目を閉じて鑑賞を始め、リラックスして呼吸に集中し、
      ゆっくりと目を開け、焦点を合わせ直し、作品があなたの前で開かれる時間を与えてください。
    follow_ups:
      - ゆっくりにしたときに現れたものは何ですか？
      - 目を開けたときに最初に気づいたことは何ですか？
      - 呼吸は、あなたの見え方をどのように変えますか？
  - id: material
    name: 素材
    prompt: |
      作品は何でできていますか？もしそれが別の素材でできていたらどうなるでしょうか？
      不一致であればあるほど良いです。それについてのあなたの感情を変えるでしょうか？
    follow_ups:
      - 最も驚くべき代替品は何になるでしょうか？
      - 素材は意味に何を加えますか？
      - 交換で何が生き残り—そして何が失われるでしょうか？
  - id: patch_of_sky
    name: 空の一片にいくつの色がありますか？
    prompt: |
      作品のある領域にズームインしてください。そこにいくつの色が見えますか？
      博物館の外で、空を見上げて、空の一片に見える色の数を数えてみてください。
    follow_ups:
      - 全体を見ているときに、何を見逃しましたか？
      - 空は作品と比較してどうですか？
      - どの色があなたを最も驚かせましたか？
  - id: greening
    name: 緑化
    prompt: |
      その作品はどんな種類の植物でしょうか？
      実のなる夏の桃の木でしょうか、それとも繊細なシダでしょうか？
      成長するためにどのような条件が必要ですか？
    follow_ups:
      - どこで繁栄し—そしてどこで枯れるでしょうか？
      - 花を咲かせるために何が必要でしょうか？
      - 植物の比喩は、作品の見方をどのように変えますか？
