# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Ukrainian)

domains:
  art:
    name: Погляди на мистецтво
    description: |
      Картки, щоб змінити вашу перспективу при перегляді творів мистецтва. Кожна пропонує різний
      погляд — від світла й тіні до знайомств та емоцій — щоб поглибити те, як ви бачите
      та взаємодієте з творами мистецтва.
  urban_jungle:
    name: Міські джунглі
    description: |
      Замість того, щоб просто гуляти містом, ви дивитеся на нього як на живу істоту.
      Картки зосереджені на шрамах старих будівель, хореографії руху транспорту,
      та таємному житті провулків.
  culinary_lab:
    name: Кулінарна лабораторія
    description: |
      Від смачного до трансформаційного. Дослідіть хімію укусу,
      історію інгредієнта та саундтрек ресторану.
  natural_microcosm:
    name: Природний мікрокосм
    description: |
      Ідеально для парку чи заднього двору. Цей погляд зосереджений на невидимій
      інженерії листа, повільному житті каменю або територіальних
      драмах комах.
  human_interface:
    name: Людський інтерфейс
    description: |
      Щоденні простори, де зустрічаються люди — кав'ярні, транспортні вузли,
      робочі місця, магазини, громадські парки. Картки зосереджені на хореографії черг,
      територіальних претензіях, невидимих сценаріях та антропології спільного простору.
  california_superbloom:
    name: Суперцвітіння Каліфорнії
    description: |
      Ефемерний вибух польових квітів після зимового дощу. Картки зосереджені на кольорі,
      масштабі, запилювачах, геології, погоді та швидкоплинному видовищі цвітіння.
decks:
  - id: ways_of_looking_at_art
    name: Погляди на мистецтво
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
