# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Міський джунглі — Париж (Ukrainian)

id: urban_jungle_paris
name: Міський джунглі — Париж
description: 50 карток, щоб змінити ваше сприйняття Парижа — від масштабу та світла до шарів історії та ритмів вуличного життя.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: Квітка на балконі
    prompt: |
      Паризькі балкони квітнуть квітами — геранню, петуніями. Знайдіть будинок,
      де на кожному балконі є горщик. Як квітка змінює фасад?
    follow_ups:
      - А що було б на вулиці без квітів?
      - Як квіти створюють ідентичність?
      - Які стосунки між квіткою та мешканцем?
  - id: paris_haussmann_line
    name: Лінія Османна
    prompt: |
      Бульвари Османна прорізають старий Париж. Прогуляйтеся одним. Лінія невблаганна — будівлі вирівняні, висоти однакові. Як бульвар формує рух?
    follow_ups:
      - А що було б із Парижем без Османна?
      - Як бульвар створює перспективу?
      - Які стосунки між лінією та владою?
  - id: paris_cafe_terrace
    name: Тераса кафе
    prompt: |
      Паризькі тераси кафе виходять на вулицю. Сядьте на одній. Ви одночасно всередині
      і зовні. Тераса — це поріг. Що ви бачите?
    follow_ups:
      - А що було б на вулиці без тераси?
      - Як тераса створює зустріч?
      - Які стосунки між терасою та вулицею?
  - id: paris_metro_entrance
    name: Вхід у метро
    prompt: |
      Входи в метро в стилі Ар-нуво — це ікони. Знайдіть один. Чавунне лиття,
      написи — вхід є порталом. Що він обіцяє?
    follow_ups:
      - А що було б на вулиці без входу?
      - Як вхід створює ідентичність?
      - Які стосунки між входом та підземеллям?
  - id: paris_shutter
    name: Паризька віконниця
    prompt: |
      Паризькі віконниці — volets — закриваються вночі. Вони зелені, сірі, сині. Знайдіть
      вулицю, де віконниці закриті. Що за ними?
    follow_ups:
      - А що було б із фасадом без віконниць?
      - Як віконниці створюють приватність?
      - Які стосунки між віконницею та світлом?
  - id: paris_cobble
    name: Паризька бруківка
    prompt: |
      Паризька бруківка — pavés — зберігається. Пройдіться по ній. Відчуйте текстуру.
      Бруківка — це реліквія іншого Парижа. Як вона формує вулицю?
    follow_ups:
      - А що було б на вулиці без бруківки?
      - Як бруківка відзначає історію?
      - Які стосунки між бруківкою та революцією?
  - id: paris_seine_edge
    name: Берег Сени
    prompt: |
      Сена протікає через Париж. Підійдіть до набережної. Річка — це шов. Що
      з обох боків? Як річка розділяє і з'єднує?
    follow_ups:
      - А що було б із Парижем без Сени?
      - Як річка формує місто?
      - Які стосунки між річкою та берегом?
  - id: paris_roof_zinc
    name: Цинковий дах
    prompt: |
      Паризькі дахи часто з цинку — сірі, похилі, з мансардними вікнами. Подивіться
      вгору. Лінія даху є характерною. Як вона формує горизонт?
    follow_ups:
      - А що було б із горизонтом без цинку?
      - Як цинк створює ідентичність?
      - Які стосунки між дахом та горищем?
  - id: paris_door_height
    name: Висота дверей
    prompt: |
      Паризькі двері часто високі — подвійної висоти. Знайдіть одні. Що могло б
      пройти крізь них? Двері — це поріг масштабу.
    follow_ups:
      - А що було б із будівлею без високих дверей?
      - Як висота створює велич?
      - Які стосунки між дверима та будівлею?
  - id: paris_boulangerie_smell
    name: Запах булочної
    prompt: |
      Булочна пахне хлібом. Йдіть за запахом. Пекарня — це вузол.
      Що запах говорить про квартал?
    follow_ups:
      - А що було б на вулиці без запаху?
      - Як запах створює ідентичність?
      - Які стосунки між запахом та комерцією?
  - id: paris_place
    name: Паризька площа
    prompt: |
      У Парижі є площі — квадрати, кола, вузли. Знайдіть одну. Зверніть увагу
      на геометрію. Як площа формує вулиці, що ведуть до неї?
    follow_ups:
      - А що було б із районом без площі?
      - Як площа створює фокус?
      - Які стосунки між площею та потоком?
  - id: paris_balcony_iron
    name: Балконне залізо
    prompt: |
      Перила паризьких балконів часто вигадливі — коване залізо, вигини, завитки.
      Знайдіть одні. Як залізо формує фасад?
    follow_ups:
      - А що було б із будівлею без заліза?
      - Як залізо створює ідентичність?
      - Які стосунки між залізом та ремеслом?
  - id: paris_plane_tree
    name: Платан
    prompt: |
      Паризькі платани ростуть вздовж бульварів. Їхня кора облущується. Знайдіть
      один. Як дерево формує вулицю? А що було б із бульваром без нього?
    follow_ups:
      - А що було б на вулиці без платана?
      - Як платан створює тінь?
      - Які стосунки між деревом та бульваром?
  - id: paris_metro_tile
    name: Плитка метро
    prompt: |
      Паризькі станції метро мають білу плитку. Тунель — це світлова труба.
      Проїдьте лінією. Як плитка формує подорож?
    follow_ups:
      - А що було б на станції без плитки?
      - Як плитка створює чистоту?
      - Які стосунки між плиткою та підземеллям?
  - id: paris_clock
    name: Паризький годинник
    prompt: |
      У Парижі багато громадських годинників — на церквах, станціях, будівлях.
      Знайдіть один. Котру годину він показує? Чи правильний він?
    follow_ups:
      - А що було б із простором без годинника?
      - Як годинник формує час?
      - Які стосунки між годинником та місцем?
  - id: paris_newsstand
    name: Паризький кіоск
    prompt: |
      Паризькі кіоски продають газети, журнали, квитки на метро. Знайдіть
      один. Що виставлено на продаж? Хто зупиняється? Кіоск — це вузол.
    follow_ups:
      - А що було б на вулиці без кіоску?
      - Як кіоск створює зустріч?
      - Які стосунки між кіоском та вулицею?
  - id: paris_bench
    name: Паризька лавка
    prompt: |
      У Парижі є зелені лавки в парках та вздовж Сени. Сядьте на одну. Хто ще
      сидить? Який краєвид?
    follow_ups:
      - А що було б із простором без лавки?
      - Як лавка створює відпочинок?
      - Які стосунки між лавкою та річкою?
  - id: paris_boulangerie_queue
    name: Черга до булочної
    prompt: |
      Станьте в чергу до булочної в ранкову годину пік. Черга — це ритуал. Що
      купують люди? Який етикет?
    follow_ups:
      - А що було б на вулиці без черги?
      - Як черга створює спільноту?
      - Які стосунки між чергою та хлібом?
  - id: paris_manhole
    name: Паризький каналізаційний люк
    prompt: |
      Кришки паризьких каналізаційних люків часто мають напис "Paris" або "Eau".
      Знайдіть один. Кришка — це двері до жил міста. Що під нею?
    follow_ups:
      - А що було б на вулиці без кришки?
      - Як кришка позначає систему?
      - Які стосунки між кришкою та підземеллям?
  - id: paris_shadow
    name: Паризька тінь
    prompt: |
      Паризьке світло створює різкі тіні. Знайдіть кут, де тінь і сонце
      зустрічаються. Як тінь формує вулицю?
    follow_ups:
      - А що було б на вулиці без тіні?
      - Як тінь створює контраст?
      - Які стосунки між тінню та будівлею?
  - id: paris_courtyard
    name: Паризький двір
    prompt: |
      Паризькі будинки часто приховують двори — cours — за воротами. Зазирніть
      крізь них. Що всередині? Двір — це таємна кімната.
    follow_ups:
      - А що було б із будівлею без двору?
      - Як двір створює приватність?
      - Які стосунки між двором та вулицею?
  - id: paris_bike_lane
    name: Паризька велодоріжка
    prompt: |
      У Парижі розширили велодоріжки — pistes cyclables. Знайдіть одну. Як
      доріжка формує вулицю? Хто нею користується?
    follow_ups:
      - А що було б на вулиці без доріжки?
      - Як доріжка створює мобільність?
      - Які стосунки між доріжкою та автомобілем?
  - id: paris_fountain
    name: Паризький фонтан
    prompt: |
      У Парижі є фонтани — фонтани Воллеса, монументальні фонтани. Знайдіть
      один. Що він пропонує? Хто ним користується?
    follow_ups:
      - А що було б на місці без фонтану?
      - Як фонтан створює дар?
      - Які стосунки між фонтаном та громадськістю?
  - id: paris_awning
    name: Паризький навіс
    prompt: |
      Паризькі навіси кафе створюють тінь. Знайдіть вулицю, де навіси
      повторюються. Як вони формують тротуар?
    follow_ups:
      - А що було б на вулиці без навісів?
      - Як навіси створюють територію?
      - Які стосунки між навісом та терасою?
  - id: paris_lamp_post
    name: Паризький ліхтарний стовп
    prompt: |
      Паризькі ліхтарні стовпи мають особливий стиль — часто вигадливі, часто
      зелені. Знайдіть один. Як ліхтар освітлює вулицю вночі?
    follow_ups:
      - А що було б на вулиці без ліхтаря?
      - Як ліхтар створює безпеку?
      - Які стосунки між ліхтарем та темрявою?
  - id: paris_door_knocker
    name: Дверний молоток
    prompt: |
      Паризькі двері часто мають молотки — левові голови, руки, кільця. Знайдіть
      один. Яким був би його звук? Молоток — це об'єкт порогу.
    follow_ups:
      - А що було б із дверима без молотка?
      - Як молоток створює звук?
      - Які стосунки між молотком та входом?
  - id: paris_shop_sign
    name: Паризька вивіска магазину
    prompt: |
      Паризькі вивіски магазинів часто розписані вручну — булочна, м'ясна, сирна крамниця.
      Знайдіть одну. Що вивіска говорить про магазин?
    follow_ups:
      - А що було б на вулиці без вивіски?
      - Як вивіска створює ідентичність?
      - Які стосунки між вивіскою та ремеслом?
  - id: paris_parking
    name: Паризька парковка
    prompt: |
      Паркування в Парижі винахідливе — автомобілі на тротуарах, під кутом, стиснуті. Поспостерігайте,
      як хтось паркується. Як автомобіль вміщується? Які стосунки між автомобілем та містом?
    follow_ups:
      - А що було б на вулиці без автомобілів?
      - Як парковка формує вулицю?
      - Які стосунки між паркуванням та простором?
  - id: paris_drain
    name: Паризький дренаж
    prompt: |
      Паризькі жолоби йдуть уздовж бордюру. Після дощу вони течуть. Знайдіть
      один. Куди йде вода? Дренаж — це шов.
    follow_ups:
      - А що було б на вулиці без дренажу?
      - Як дренаж керує водою?
      - Які стосунки між дренажем та системою?
  - id: paris_chimney
    name: Паризький димар
    prompt: |
      Паризькі димарі пробивають лінію даху. Порахуйте їх на одній будівлі.
      Димар — це реліквія тепла. Що тут горіло?
    follow_ups:
      - А що було б на даху без димаря?
      - Як димар позначає історію?
      - Які стосунки між димарем та вогнем?
  - id: paris_metro_map
    name: Карта метро
    prompt: |
      Карта паризького метро — це схема. Вона спотворює географію. Що
      підкреслюється? Що опускається? Як карта формує місто?
    follow_ups:
      - А що було б із навігацією без карти?
      - Як карта створює зв'язок?
      - Які стосунки між картою та територією?
  - id: paris_bridge
    name: Паризький міст
    prompt: |
      У Парижі багато мостів через Сену. Перейдіть через один пішки. Відчуйте
      перехід. Що змінюється? Міст — це поріг.
    follow_ups:
      - А що було б із річкою без мосту?
      - Як міст з'єднує?
      - Які стосунки між мостом та річкою?
  - id: paris_graffiti
    name: Паризьке графіті
    prompt: |
      У Парижі є графіті — теги, трафарети, мурали. Знайдіть стіну з шарами.
      Що це за палімпсест? Хто позначив цю поверхню?
    follow_ups:
      - А що було б зі стіною без графіті?
      - Як графіті займає простір?
      - Які стосунки між графіті та містом?
  - id: paris_tree_guard
    name: Захист дерева
    prompt: |
      Паризькі вуличні дерева часто мають захист — металеві решітки навколо
      основи. Знайдіть один. Що захищає захист? Що він виключає?
    follow_ups:
      - А що було б із деревом без захисту?
      - Як захист формує яму?
      - Які стосунки між захистом та деревом?
  - id: paris_bus_stop
    name: Паризька зупинка автобуса
    prompt: |
      Паризькі зупинки автобуса мають навіси, розклади, цифрові дисплеї. Зачекайте
      на одній. Хто ще чекає? Який етикет?
    follow_ups:
      - А що було б на вулиці без зупинки?
      - Як зупинка створює спільноту?
      - Які стосунки між зупинкою та подорожжю?
  - id: paris_terrace_table
    name: Столик на терасі
    prompt: |
      Столик на терасі кафе виходить на вулицю. Сядьте за один. Столик — це
      сцена. Що ви дивитеся? Хто дивиться на вас?
    follow_ups:
      - А що було б на терасі без столика?
      - Як столик створює зустріч?
      - Які стосунки між столиком та вулицею?
  - id: paris_roof_dormer
    name: Мансардне вікно
    prompt: |
      Паризькі мансардні вікна — вікна мансард — пробивають горизонт. Знайдіть
      будівлю з багатьма. Яким був би вид зсередини?
    follow_ups:
      - А що було б на даху без мансардних вікон?
      - Як мансардні вікна створюють світло?
      - Які стосунки між мансардним вікном та горищем?
  - id: paris_parking_metre
    name: Паризький паркомат
    prompt: |
      Паризькі паркомати часто є сірими коробками. Знайдіть один. Як він
      формує бордюр? Хто платить? Хто ні?
    follow_ups:
      - А що було б на вулиці без паркомата?
      - Як паркомат керує простором?
      - Які стосунки між паркоматом та автомобілем?
  - id: paris_doorway
    name: Паризький дверний отвір
    prompt: |
      Паризький дверний отвір часто високий, часто вигадливий. Станьте перед
      ним. Як це було б — пройти крізь нього? Дверний отвір — це поріг.
    follow_ups:
      - А що було б із будівлею без дверного отвору?
      - Як дверний отвір створює велич?
      - Які стосунки між дверним отвором та інтер'єром?
  - id: paris_metro_stair
    name: Сходи метро
    prompt: |
      Сходи метро ведуть вниз, у землю. Порахуйте сходинки. Відчуйте
      перехід. Що зверху? Що знизу?
    follow_ups:
      - А що було б на станції без сходів?
      - Як сходи створюють спуск?
      - Які стосунки між сходами та підземеллям?
  - id: paris_bench_view
    name: Вид з лавки
    prompt: |
      Сядьте на лавку з видом — на Сену, площу, вулицю. Що це за рама? Що це
      за фокус? Лавка — це точка огляду.
    follow_ups:
      - А що було б із видом без лавки?
      - Як лавка створює паузу?
      - Які стосунки між лавкою та видом?
  - id: paris_shutter_open
    name: Віконниця відкрита
    prompt: |
      Паризькі віконниці відкриваються вранці. Знайдіть вулицю, де вони
      відкриваються. Який це ритуал? Що відкривається?
    follow_ups:
      - А що було б на вулиці без віконниць?
      - Як віконниця створює ритм?
      - Які стосунки між віконницею та днем?
  - id: paris_cobble_pattern
    name: Візерунок бруківки
    prompt: |
      Паризька бруківка укладена візерунками — іноді "ялинкою", іноді
      радіальними. Знайдіть візерунок. Як він формує вулицю?
    follow_ups:
      - А що було б на вулиці без візерунка?
      - Як візерунок створює текстуру?
      - Які стосунки між візерунком та ремеслом?
  - id: paris_plane_bark
    name: Кора платана
    prompt: |
      Кора паризьких платанів облущується клаптями. Торкніться однієї. Кора —
      це текстура. Як старіє дерево? А що було б на вулиці без нього?
    follow_ups:
      - А що було б із бульваром без платана?
      - Як кора створює ідентичність?
      - Які стосунки між корою та деревом?
  - id: paris_fountain_drink
    name: Фонтанна вода
    prompt: |
      Фонтани Воллеса пропонують безкоштовну воду. Знайдіть один. Хто п'є?
      Хто не п'є? Фонтан — це дар. Що він означає?
    follow_ups:
      - А що було б на місці без фонтану?
      - Як фонтан створює суспільне благо?
      - Які стосунки між фонтаном та спрагою?
  - id: paris_metro_sound
    name: Звук метро
    prompt: |
      Закрийте очі в метро. Гудіння, гальмування, оголошення.
      Нанесіть звуковий ландшафт на карту. Як звучить Париж під землею?
    follow_ups:
      - А що було б із поїздкою без звуку?
      - Як звук формує враження?
      - Які стосунки між звуком та простором?
  - id: paris_balcony_dry
    name: Сушіння на балконі
    prompt: |
      Паризькі балкони часто використовують для сушіння — білизни, рослин.
      Знайдіть один із білизною. Що сушіння говорить про мешканця?
    follow_ups:
      - А що було б із фасадом без білизни?
      - Як сушіння створює побут?
      - Які стосунки між балконом та домом?
  - id: paris_bike_velib
    name: Велосипед Vélib
    prompt: |
      Станції Vélib розкидані по Парижу. Знайдіть одну. Скільки велосипедів?
      Скільки вільних місць? Система — це шар. Як вона працює?
    follow_ups:
      - А що було б на вулиці без станції?
      - Як Vélib створює мобільність?
      - Які стосунки між станцією та велосипедом?
  - id: paris_door_bell
    name: Дверний дзвінок
    prompt: |
      Паризькі багатоквартирні будинки мають кілька дверних дзвінків — по одному на квартиру. Знайдіть
      панель. Скільки імен? Як організовано будинок?
    follow_ups:
      - А що було б із входом без дзвінків?
      - Як дзвінки створюють адресу?
      - Які стосунки між дзвінком та квартирою?
  - id: paris_roof_terrace
    name: Тераса на даху
    prompt: |
      Уявіть собі паризьку терасу на даху. Що б ви побачили? Хто має доступ?
      Тераса — це таємний рівень. Що б ви там вирощували?
    follow_ups:
      - А що було б на даху без тераси?
      - Як тераса створює вид?
      - Які стосунки між терасою та небом?
