    follow_ups:
      - Wat zou de straat zijn zonder de verkoper?
      - Hoe creëert de verkoper levensonderhoud?
      - Wat is de relatie tussen verkoper en straat?
  - id: blr_compound_garden
    name: Terrein Tuin
    prompt: |
      Terrein tuinen zijn privé — zichtbaar door poorten. Kijk erdoorheen. Wat groeit er? De tuin is een groen zakje. Wat zou de straat zijn zonder?
    follow_ups:
      - Wat zou het terrein zijn zonder de tuin?
      - Hoe creëert de tuin respijt?
      - Wat is de relatie tussen tuin en stad?
  - id: blr_bus_crowd
    name: Busmenigte
    prompt: |
      Bangalore bussen zitten vol tijdens de spits. Kijk naar een bushalte. De menigte stapt
