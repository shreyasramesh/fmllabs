    follow_ups:
      - Wat zou de corridor zijn zonder het station?
      - Hoe creëert het station verbinding?
      - Wat is de relatie tussen station en stad?
  - id: blr_rickshaw_stand
    name: Riksja-standplaats
    prompt: |
      Riksja-standplaatsen clusteren bij kruispunten. Zoek er een. De chauffeurs wachten. De
      standplaats is een knooppunt. Wat is de economie?
    follow_ups:
      - Wat zou het kruispunt zijn zonder de standplaats?
      - Hoe creëert de standplaats mobiliteit?
      - Wat is de relatie tussen standplaats en chauffeur?
  - id: blr_pavement_sleep
    name: Slaap op de Stoep
    prompt: |
      Mensen die op de stoep slapen, maken deel uit van de stad. Kijk met zorg. Waar slapen ze? Wat is de relatie tussen straat en onderdak?
    follow_ups:
      - Wat zou de straat zijn zonder de slapers?
      - Hoe wordt de stoep een thuis?
      - Wat is de relatie tussen slapen en stad?
  - id: blr_gate_security
    name: Poortbeveiliging
    prompt: |
      Koloniepoorten hebben beveiliging — bewakers, barrières, registers. Kijk naar de stroom.
      Wie gaat er naar binnen? Wie wordt tegengehouden? De poort is een filter.
    follow_ups:
      - Wat zou de kolonie zijn zonder de poort?
      - Hoe creëert de poort veiligheid?
      - Wat is de relatie tussen poort en vertrouwen?
  - id: blr_street_dog
    name: Straathond
    prompt: |
      Straathonden maken deel uit van Bangalore. Merk er een op. Waar slaapt hij? Wat
      eet hij? De hond is zowel wild als gedomesticeerd.
    follow_ups:
      - Wat zou de straat zijn zonder de hond?
      - Hoe creëert de hond relatie?
      - Wat is de relatie tussen hond en stad?
  - id: blr_hoarding
    name: Reclamebord
    prompt: |
      Reclameborden — grote billboards — domineren kruispunten. Zoek er een. Wat wordt er
