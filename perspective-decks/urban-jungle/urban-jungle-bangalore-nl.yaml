    follow_ups:
      - Wat zou de straat zijn zonder de halte?
      - Hoe creëert de halte verbinding?
      - Wat is de relatie tussen halte en bus?
  - id: blr_power_line
    name: Stroomkabel
    prompt: |
      Bangalore stroomkabels zijn een wirwar — kabels, transformatoren, lussen. Volg
