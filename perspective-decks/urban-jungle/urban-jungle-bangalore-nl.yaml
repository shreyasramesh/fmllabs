      - Wat zou de weg zijn zonder de verbreding?
      - Hoe creëert de verbreding doorstroming?
      - Wat is de relatie tussen verbreding en ontheemding?
  - id: blr_apartment_balcony
    name: Appartement Balkon
    prompt: |
      Appartement balkons kijken uit op de straat. Zoek een gebouw. Wat staat er op de
