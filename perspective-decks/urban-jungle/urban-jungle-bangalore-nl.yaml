    follow_ups:
      - Wat zou het blok zijn zonder het terrein?
      - Hoe creëert het terrein tijdelijk gebruik?
      - Wat is de relatie tussen terrein en ontwikkeling?
  - id: blr_street_food
    name: Straatvoedsel
    prompt: |
      Straatvoedselverkopers zetten zich op bij schemering. Zoek er een. Wat wordt er gekookt? Wie eet er?
