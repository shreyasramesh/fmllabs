# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Urban Jungle — Bangalore (Dutch)

id: urban_jungle_bangalore
name: Urban Jungle — Bangalore
description: 50 kaarten om Bangalore anders te bekijken — van schaal en licht tot lagen van geschiedenis en het ritme van het straatleven.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Poortkolonie
    prompt: |
      De gated communities van Bangalore hebben muren, bewakers, poorten. Sta bij een poort.
      Wat zit er binnenin? Wie gaat er naar binnen? De poort markeert een grens. Wat beschermt het?
    follow_ups:
      - Wat zou de straat zijn zonder de poort?
      - Hoe creëert de poort veiligheid?
      - Wat is de relatie tussen poort en kolonie?
  - id: blr_tree_canopy
    name: Boomkronen
    prompt: |
      Bangalore was ooit een tuinstad. Oude bomen overkappen nog steeds sommige straten.
      Loop eronder. Hoe verandert de kroon het licht? Het geluid?
    follow_ups:
      - Wat zou de straat zijn zonder de boom?
      - Hoe creëert de kroon microklimaat?
      - Wat is de relatie tussen boom en stad?
  - id: blr_tech_park
    name: Technologiepark
    prompt: |
      Technologieparken zijn campussen — glas, gazon, shuttlebussen. Zoek er een. Hoe
      scheidt het park zich van de stad? Wat is de relatie tussen binnen en buiten?
    follow_ups:
      - Wat zou het gebied zijn zonder het park?
      - Hoe creëert het park identiteit?
      - Wat is de relatie tussen park en straat?
  - id: blr_auto_rickshaw
    name: Auto-riksja
    prompt: |
      Auto-riksja's slingeren door het verkeer. Kijk hoe een exemplaar een kruispunt navigeert. Hoe
      past de auto waar auto's niet kunnen? Wat is de logica van het slingeren?
    follow_ups:
      - Wat zou de straat zijn zonder de auto?
      - Hoe creëert de auto mobiliteit?
      - Wat is de relatie tussen auto en verkeer?
  - id: blr_chai_stall
    name: Chai-kraam
    prompt: |
      Chai-kramen zijn knooppunten — klein, tijdelijk, essentieel. Zoek er een. Wie verzamelt zich?
      Wat is het ritme? De kraam is een sociale machine.
    follow_ups:
      - Wat zou de hoek zijn zonder de kraam?
      - Hoe creëert de kraam ontmoeting?
      - Wat is de relatie tussen kraam en straat?
  - id: blr_billboard
    name: Bangalore Reclamebord
    prompt: |
      Bangalore reclameborden adverteren technologie, onroerend goed, onderwijs. Zoek er een.
      Wat wordt er verkocht? Wie is het publiek? Het reclamebord is een spiegel van ambitie.
    follow_ups:
      - Wat zou de straat zijn zonder het reclamebord?
      - Hoe vormt het reclamebord verlangen?
      - Wat is de relatie tussen reclamebord en stad?
  - id: blr_compound_wall
    name: Omheining
    prompt: |
      Omheiningen scheiden privé van publiek. Zoek een muur. Wat zit erachter?
      Hoe hoog is het? De muur creëert een grens. Wat sluit het buiten?
    follow_ups:
      - Wat zou de straat zijn zonder de muur?
      - Hoe creëert de muur privacy?
      - Wat is de relatie tussen muur en terrein?
  - id: blr_signal_wait
    name: Wachten bij het Signaal
    prompt: |
      Wacht bij een verkeerslicht. Kijk naar de verkopers — bloemen, speelgoed, boeken.
      Het signaal creëert een pauze. Wat gebeurt er in de pauze?
    follow_ups:
      - Wat zou het kruispunt zijn zonder het signaal?
      - Hoe creëert het signaal economie?
      - Wat is de relatie tussen signaal en straat?
  - id: blr_rain_drain
    name: Regenafvoer
    prompt: |
      Bangalore moesson overspoelt afvoeren. Kijk na de regen naar het water. Waar gaat het naartoe? Waar hoopt het zich op? De afvoer is een limiet.
    follow_ups:
      - Wat zou de straat zijn zonder de afvoer?
      - Hoe beheert de afvoer water?
      - Wat is de relatie tussen afvoer en moesson?
  - id: blr_sarjapur_road
    name: Sarjapur Weg
    prompt: |
      Sarjapur Road verbindt het oude Bangalore met de technologiecorridor. Rijd of loop
      een stuk. Wat verandert er? Waar verschuift de stad?
    follow_ups:
      - Wat zou de corridor zijn zonder de weg?
      - Hoe creëert de weg verbinding?
      - Wat is de relatie tussen weg en groei?
  - id: blr_parks_maidans
    name: Parken & Pleinen
    prompt: |
      Bangalore heeft parken en pleinen — Cubbon Park, Lalbagh, buurtpleinen. Ga er een binnen. Wie gebruikt het? Wat is het ritme?
    follow_ups:
      - Wat zou de stad zijn zonder het park?
      - Hoe creëert het park respijt?
      - Wat is de relatie tussen park en buurt?
  - id: blr_temple_street
    name: Tempelstraat
    prompt: |
      Tempels onderbreken de straten van Bangalore. Zoek er een. Let op de offers, de
      klokken, de menigte. Hoe vormt de tempel het blok?
    follow_ups:
      - Wat zou de straat zijn zonder de tempel?
      - Hoe creëert de tempel gemeenschap?
      - Wat is de relatie tussen tempel en straat?
  - id: blr_silk_board
    name: Zijdebord
    prompt: |
      Het Zijdebord kruispunt is berucht. Ga aan de rand staan. Kijk naar het verkeer.
      Hoe werkt het kruispunt? Wat is de logica van de chaos?
    follow_ups:
      - Wat zou de corridor zijn zonder het kruispunt?
      - Hoe creëert het kruispunt een knelpunt?
      - Wat is de relatie tussen kruispunt en woon-werkverkeer?
  - id: blr_metro_elevated
    name: Verhoogde Metro
    prompt: |
      De Bangalore Metro rijdt verhoogd door delen van de stad. Rijd ermee of sta
      eronder. Hoe verandert de verhoogde lijn de straat eronder?
    follow_ups:
      - Wat zou de straat zijn zonder de metro?
      - Hoe creëert de metro verbinding?
      - Wat is de relatie tussen verhoogd en grond?
  - id: blr_apartment_tower
    name: Appartementencomplex
    prompt: |
      Appartementencomplexen rijzen op in heel Bangalore. Zoek er een. Hoeveel verdiepingen? Wie
      woont er? De toren is verticale dichtheid. Wat vervangt het?
    follow_ups:
      - Wat zou de skyline zijn zonder de toren?
      - Hoe creëert de toren huisvesting?
      - Wat is de relatie tussen toren en grond?
  - id: blr_roadside_vendor
    name: Straatverkoper
    prompt: |
      Straatverkopers verkopen fruit, snacks, telefoonladers. Zoek er een. Wat is de
      uitstalling? Wie stopt er? De verkoper is informele economie.
    follow_ups:
      - Wat zou de straat zijn zonder de verkoper?
      - Hoe creëert de verkoper levensonderhoud?
      - Wat is de relatie tussen verkoper en straat?
  - id: blr_borewell
    name: Boorput
    prompt: |
      Bangalore is afhankelijk van boorputten. Kijk naar de leidingen, de tanks, de
      pompen. Water wordt van onderaf gewonnen. Wat is de relatie tussen stad en watervoerende laag?
    follow_ups:
      - Wat zou het gebouw zijn zonder de boorput?
      - Hoe creëert de boorput aanbod?
      - Wat is de relatie tussen boorput en schaarste?
  - id: blr_garbage_heap
    name: Vuilnisbelt
    prompt: |
      Vuilnishoopen verschijnen op hoeken, bij muren. Merk er een op. Wat zit erin? Wie
      doorzoekt het? De hoop is een limiet van het systeem.
    follow_ups:
      - Wat zou de straat zijn zonder de hoop?
      - Hoe markeert de hoop falen?
      - Wat is de relatie tussen hoop en stad?
  - id: blr_marquee_wedding
    name: Bruilofts Tent
    prompt: |
      Bruiloftstenten blokkeren straten. Zoek er een. De tent is een tijdelijk
      gebied. Wat is de relatie tussen viering en straat?
    follow_ups:
      - Wat zou de straat zijn zonder de tent?
      - Hoe creëert de tent aanspraak?
      - Wat is de relatie tussen bruiloft en publiek?
  - id: blr_old_bungalow
    name: Oude Bungalow
    prompt: |
      Oude Bangalore bungalows blijven bestaan tussen de torens. Zoek er een. De bungalow heeft
      een terrein, bomen, ruimte. Wat zal het vervangen?
    follow_ups:
      - Wat zou de straat zijn zonder de bungalow?
      - Hoe markeert de bungalow geschiedenis?
      - Wat is de relatie tussen bungalow en toren?
  - id: blr_coffee_house
    name: Koffiehuis
    prompt: |
      Indian Coffee House is een instelling. Ga erin zitten. Het koffiehuis is
      een ruimte voor gesprek. Wat is het ritme? Wie komt er?
    follow_ups:
      - Wat zou de straat zijn zonder het koffiehuis?
      - Hoe creëert het koffiehuis gemeenschap?
      - Wat is de relatie tussen koffiehuis en stad?
  - id: blr_phone_booth
    name: Telefooncel
    prompt: |
      Openbare telefooncellen bestaan nog steeds. Zoek er een. Werkt het? Wie gebruikt het?
      De cel is een relikwie. Wat heeft het vervangen?
    follow_ups:
      - Wat zou de straat zijn zonder de cel?
      - Hoe markeert de cel verandering?
      - Wat is de relatie tussen cel en mobiel?
  - id: blr_bus_stop
    name: Bangalore Bushalte
    prompt: |
      Bangalore bushaltes zijn vaak een paal en een menigte. Wacht bij een. Wie
