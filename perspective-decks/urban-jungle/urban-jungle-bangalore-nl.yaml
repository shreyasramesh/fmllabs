    follow_ups:
      - Wat zou het kruispunt zijn zonder het reclamebord?
      - Hoe vormt het reclamebord verlangen?
      - Wat is de relatie tussen reclamebord en stad?
  - id: blr_rain_tree
    name: Regenboom
    prompt: |
      Regenbomen — Samanea saman — overkappen sommige straten van Bangalore. Zoek er een.
      De boom is een erfenis. Hoe vormt hij het blok?
    follow_ups:
      - Wat zou de straat zijn zonder de regenboom?
      - Hoe creëert de boom microklimaat?
      - Wat is de relatie tussen boom en tuinstad?
  - id: blr_corner_shop
    name: Bangalore Buurtwinkel
    prompt: |
      Buurtwinkels — kirana winkels — verkopen alles. Ga er een binnen. Wat is de
      voorraad? Wie runt het? De winkel is een buurtknooppunt.
    follow_ups:
      - Wat zou het blok zijn zonder de winkel?
      - Hoe creëert de winkel ontmoeting?
      - Wat is de relatie tussen winkel en gemeenschap?
  - id: blr_flyover
    name: Viaduct
    prompt: |
      Bangalore viaducten springen over kruispunten. Sta eronder. Het viaduct
      creëert schaduw, geluid, een nieuwe laag. Wat is er boven? Wat is eronder?
    follow_ups:
      - Wat zou het kruispunt zijn zonder het viaduct?
      - Hoe creëert het viaduct doorstroming?
      - Wat is de relatie tussen viaduct en grond?
  - id: blr_water_tap
    name: Openbare Waterkraan
    prompt: |
      Openbare waterkranen bestaan nog steeds. Zoek er een. Wie gebruikt het? De kraan is een
      gemeenschappelijk goed. Wat is de relatie tussen kraan en toegang?
    follow_ups:
      - Wat zou de straat zijn zonder de kraan?
      - Hoe creëert de kraan geschenk?
      - Wat is de relatie tussen kraan en schaarste?
  - id: blr_construction_crane
    name: Bouwkraan
    prompt: |
      Bouwkranen onderbreken de skyline. Zoek er een. Wat wordt er gebouwd?
      De kraan is een teken van groei. Wat zal er vervangen worden?
    follow_ups:
      - Wat zou de skyline zijn zonder de kraan?
      - Hoe markeert de kraan verandering?
      - Wat is de relatie tussen kraan en stad?
  - id: blr_parking_lot
    name: Parkeerterrein
    prompt: |
      Parkeerterreinen zijn tijdelijk — leeg land tot ontwikkeling. Zoek er een. Wat
