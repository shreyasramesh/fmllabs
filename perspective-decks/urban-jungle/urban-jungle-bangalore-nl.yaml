      - Hoe creëert de klok tijd?
      - Wat is de relatie tussen klok en gemeenschap?
  - id: blr_road_widening
    name: Wegverbreding
    prompt: |
      Wegverbreding snijdt door buurten. Zoek een stuk. Wat is er verwijderd? Wat blijft er over? De verbreding is een litteken. Wat dient het?
