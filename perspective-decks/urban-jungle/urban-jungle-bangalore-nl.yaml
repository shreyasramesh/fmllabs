    follow_ups:
      - Wat zou de straat zijn zonder de lijnen?
      - Hoe creëert het netwerk aanbod?
      - Wat is de relatie tussen lijn en uitval?
  - id: blr_speed_breaker
    name: Snelheidsdrempel
    prompt: |
      Snelheidsdrempels — liggende agenten — bezaaien de wegen van Bangalore. Voel er een. Waarom is het
      hier? Wat vertraagt het? De drempel is een lokale interventie.
    follow_ups:
      - Wat zou de weg zijn zonder de drempel?
      - Hoe creëert de drempel veiligheid?
      - Wat is de relatie tussen drempel en snelheid?
  - id: blr_compound_tree
    name: Terreinboom
    prompt: |
      Terrein bomen overhangen muren. Zoek er een. De boom is zowel binnen als
      buiten. Wat schaduwt het? Wie bezit het?
    follow_ups:
      - Wat zou de straat zijn zonder de boom?
      - Hoe creëert de boom geschenk?
      - Wat is de relatie tussen boom en terrein?
  - id: blr_shop_shutter
    name: Winkelroluik
    prompt: |
      Bangalore winkelroluiken gaan 's nachts naar beneden. Zoek een gesloten luik. Wat zit
      erachter? Het luik is een dagelijkse cyclus. Wat beschermt het?
    follow_ups:
      - Wat zou de straat zijn zonder het luik?
      - Hoe creëert het luik veiligheid?
      - Wat is de relatie tussen luik en handel?
  - id: blr_water_tanker
    name: Watertankwagen
    prompt: |
      Watertankwagens bevoorraden buurten. Kijk hoe een levert. De tankwagen is
      mobiele infrastructuur. Wat is de relatie tussen tankwagen en kraan?
    follow_ups:
      - Wat zou de buurt zijn zonder de tankwagen?
      - Hoe creëert de tankwagen aanbod?
      - Wat is de relatie tussen tankwagen en schaarste?
  - id: blr_metro_station
    name: Metrostation
    prompt: |
      Bangalore metro stations zijn nieuw — schoon, gemerkt. Ga er een binnen. Hoe verschilt het
