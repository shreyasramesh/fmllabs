    follow_ups:
      - পার্ক ছাড়া এলাকা কেমন হবে?
      - পার্ক কীভাবে পরিচয় তৈরি করে?
      - পার্ক এবং রাস্তার মধ্যে সম্পর্ক কী?
  - id: blr_auto_rickshaw
    name: অটো রিকশা
