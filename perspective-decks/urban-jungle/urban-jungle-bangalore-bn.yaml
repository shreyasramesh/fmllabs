# শহুরে জঙ্গল — বেঙ্গালুরু (Bengali)

id: urban_jungle_bangalore
name: শহুরে জঙ্গল — বেঙ্গালুরু
description: বেঙ্গালুরুকে দেখার উপায় বদলাতে ৫০টি কার্ড — এর বিশালতা ও আলো থেকে শুরু করে ঐতিহ্যের স্তর এবং রাস্তার জীবনের ছন্দ।
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: গেট কলোনি
    prompt: |
      বেঙ্গালুরুর গেটেড কলোনিগুলির দেয়াল, প্রহরী, গেট থাকে। একটি গেটের সামনে দাঁড়ান।
      ভিতরে কী আছে? কারা প্রবেশ করে? গেট একটি সীমানা চিহ্নিত করে। এটি কী রক্ষা করে?
    follow_ups:
      - গেট ছাড়া রাস্তা কেমন হবে?
      - গেট কীভাবে নিরাপত্তা তৈরি করে?
      - গেট এবং কলোনির মধ্যে সম্পর্ক কী?
  - id: blr_tree_canopy
    name: গাছের ছাউনি
    prompt: |
      বেঙ্গালুরু একসময় একটি বাগান শহর ছিল। পুরনো গাছ আজও কিছু রাস্তায় ছাউনি তৈরি করে।
      একটি গাছের তলায় হাঁটুন। ছাউনি আলো পরিবর্তন করে কীভাবে? শব্দ?
    follow_ups:
      - গাছ ছাড়া রাস্তা কেমন হবে?
      - গাছের ছাউনি কীভাবে মাইক্রোক্লাইমেট তৈরি করে?
      - গাছ এবং শহরের মধ্যে সম্পর্ক কী?
  - id: blr_tech_park
    name: টেক পার্ক
