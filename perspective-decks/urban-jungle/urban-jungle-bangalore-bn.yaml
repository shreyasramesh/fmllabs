    follow_ups:
      - স্টল ছাড়া কোণ কেমন হবে?
      - স্টল কীভাবে সাক্ষাৎ তৈরি করে?
      - স্টল এবং রাস্তার মধ্যে সম্পর্ক কী?
  - id: blr_billboard
    name: বেঙ্গালুরু বিলবোর্ড
    prompt: |
      বেঙ্গালুরুর বিলবোর্ডগুলিতে টেক, রিয়েল এস্টেট, শিক্ষার বিজ্ঞাপন দেওয়া হয়। একটি খুঁজে বের করুন। কী বিক্রি হচ্ছে? শ্রোতা কারা? বিলবোর্ডটি আকাঙ্ক্ষার একটি আয়না।
