cards:
  - id: paris_balcony_flower
    name: பால்கனிப் பூ
    prompt: |
      பாரிஸ் பால்கனிகள் பூக்களால் மலர்கின்றன—ஜெரனியம், பெட்யூனியா. ஒவ்வொரு பால்கனியிலும் ஒரு தொட்டி இருக்கும் ஒரு கட்டிடத்தைக் கண்டறியுங்கள். பூவானது முகப்பை எவ்வாறு மாற்றுகிறது?
