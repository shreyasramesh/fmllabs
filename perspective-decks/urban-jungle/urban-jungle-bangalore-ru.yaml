    follow_ups:
      - Каким был бы перекресток без щита?
      - Как щит формирует желания?
      - Каковы отношения между щитом и городом?
  - id: blr_rain_tree
    name: Дождевое дерево
    prompt: |
      Дождевые деревья — Samanea saman — образуют кроны над некоторыми улицами Бангалора. Найдите одно.
      Дерево — это наследие. Как оно формирует квартал?
    follow_ups:
      - Какой была бы улица без дождевого дерева?
      - Как дерево создает микроклимат?
      - Каковы отношения между деревом и городом-садом?
  - id: blr_corner_shop
    name: Угловой магазин в Бангалоре
    prompt: |
      Угловые магазины — кирана — продают все. Зайдите в один. Каков ассортимент?
      Кто им управляет? Магазин — это районный узел.
    follow_ups:
      - Каким был бы квартал без магазина?
      - Как магазин создает встречи?
      - Каковы отношения между магазином и общиной?
  - id: blr_flyover
    name: Эстакада
    prompt: |
      Бангалорские эстакады перелетают через перекрестки. Встаньте под одной. Эстакада
      создает тень, шум, новый слой. Что наверху? Что внизу?
    follow_ups:
      - Каким был бы перекресток без эстакады?
      - Как эстакада создает поток?
      - Каковы отношения между эстакадой и землей?
  - id: blr_water_tap
    name: Общественный водопроводный кран
    prompt: |
      Общественные водопроводные краны все еще существуют. Найдите один. Кто им пользуется?
