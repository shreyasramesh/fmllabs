  - id: blr_street_food
    name: Уличная еда
    prompt: |
      Торговцы уличной едой устанавливаются на закате. Найдите одного. Что готовится? Кто ест?
      Торговец — это неформальная инфраструктура. Какова экономика?
    follow_ups:
      - Какой была бы улица без торговца?
      - Как торговец создает средства к существованию?
