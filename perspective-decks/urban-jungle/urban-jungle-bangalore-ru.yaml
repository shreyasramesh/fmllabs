# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Городские джунгли — Бангалор (Russian)

id: urban_jungle_bangalore
name: Городские джунгли — Бангалор
description: 50 карточек, чтобы изменить ваш взгляд на Бангалор — от масштаба и света до слоев истории и ритмов уличной жизни.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Огороженная колония
    prompt: |
      В бангалорских огороженных колониях есть стены, охрана, ворота. Встаньте у ворот.
      Что внутри? Кто входит? Ворота отмечают границу. Что они защищают?
    follow_ups:
      - Какой была бы улица без ворот?
      - Как ворота создают безопасность?
      - Каковы отношения между воротами и колонией?
  - id: blr_tree_canopy
    name: Кроны деревьев
    prompt: |
      Бангалор когда-то был городом-садом. Старые деревья до сих пор образуют кроны над некоторыми улицами.
      Пройдите под одним из них. Как крона меняет свет? Звук?
    follow_ups:
      - Какой была бы улица без дерева?
      - Как крона создает микроклимат?
      - Каковы отношения между деревом и городом?
  - id: blr_tech_park
    name: Технопарк
    prompt: |
      Технопарки — это кампусы: стекло, газон, шаттлы. Найдите один. Чем парк
      отделен от города? Каковы отношения между внутренним и внешним?
    follow_ups:
      - Какой была бы местность без парка?
      - Как парк создает идентичность?
      - Каковы отношения между парком и улицей?
  - id: blr_auto_rickshaw
    name: Авторикша
    prompt: |
      Авторикши лавируют в пробках. Наблюдайте, как авторикша проезжает перекресток. Как авторикша помещается там, где машины не могут? Какова логика этой маневренности?
    follow_ups:
      - Какой была бы улица без авторикши?
      - Как авторикша создает мобильность?
      - Каковы отношения между авторикшей и трафиком?
  - id: blr_chai_stall
    name: Чайная лавка
    prompt: |
      Чайные лавки — это узлы: маленькие, временные, необходимые. Найдите одну. Кто там собирается?
      Каков ритм? Лавка — это социальная машина.
    follow_ups:
      - Какой был бы угол без лавки?
      - Как лавка создает встречи?
      - Каковы отношения между лавкой и улицей?
  - id: blr_billboard
    name: Баннер в Бангалоре
    prompt: |
      Баннеры в Бангалоре рекламируют технологии, недвижимость, образование. Найдите один.
      Что продается? Кто целевая аудитория? Баннер — это зеркало стремлений.
    follow_ups:
      - Какой была бы улица без баннера?
      - Как баннер формирует желания?
      - Каковы отношения между баннером и городом?
  - id: blr_compound_wall
    name: Ограждающая стена
    prompt: |
      Ограждающие стены отделяют частное от общественного. Найдите стену. Что за ней?
      Насколько она высока? Стена создает границу. Что она исключает?
    follow_ups:
      - Какой была бы улица без стены?
      - Как стена создает приватность?
      - Каковы отношения между стеной и территорией?
  - id: blr_signal_wait
    name: Ожидание на светофоре
    prompt: |
      Подождите на светофоре. Понаблюдайте за торговцами — цветами, игрушками, книгами.
      Светофор создает паузу. Что происходит в этой паузе?
    follow_ups:
      - Каким был бы перекресток без светофора?
      - Как светофор создает экономику?
      - Каковы отношения между светофором и улицей?
  - id: blr_rain_drain
    name: Ливневый сток
    prompt: |
      Бангалорские муссоны переполняют стоки. После дождя наблюдайте за водой. Куда она уходит? Где скапливается?
      Сток — это предел.
    follow_ups:
      - Какой была бы улица без стока?
      - Как сток управляет водой?
      - Каковы отношения между стоком и муссоном?
  - id: blr_sarjapur_road
    name: Сарджапур Роуд
    prompt: |
      Сарджапур Роуд соединяет старый Бангалор с техно-коридором. Проедьте или пройдите по участку. Что меняется? Где город смещается?
    follow_ups:
      - Каким был бы коридор без дороги?
      - Как дорога создает связь?
      - Каковы отношения между дорогой и ростом?
  - id: blr_parks_maidans
    name: Парки и площади
    prompt: |
      В Бангалоре есть парки и площади — Куббон Парк, Лалбаг, районные поля. Зайдите в один. Кто им пользуется?
      Каков ритм?
    follow_ups:
      - Каким был бы город без парка?
      - Как парк создает отдых?
      - Каковы отношения между парком и районом?
  - id: blr_temple_street
    name: Храмовая улица
    prompt: |
      Храмы располагаются на улицах Бангалора. Найдите один. Обратите внимание на подношения, колокола, толпу. Как храм формирует квартал?
    follow_ups:
      - Какой была бы улица без храма?
      - Как храм создает общину?
      - Каковы отношения между храмом и улицей?
  - id: blr_silk_board
    name: Шелковый совет
    prompt: |
      Перекресток Silk Board печально известен. Встаньте на краю. Наблюдайте за трафиком.
      Как работает перекресток? В чем логика хаоса?
    follow_ups:
      - Каким был бы коридор без перекрестка?
      - Как перекресток создает узкое место?
      - Каковы отношения между перекрестком и маршрутом?
  - id: blr_metro_elevated
    name: Метро над землей
    prompt: |
      Бангалорское метро проходит над землей через некоторые части города. Прокатитесь на нем или встаньте под ним. Как надземная линия меняет улицу внизу?
    follow_ups:
      - Какой была бы улица без метро?
      - Как метро создает связь?
      - Каковы отношения между надземным и наземным?
  - id: blr_apartment_tower
    name: Многоквартирная башня
    prompt: |
      Многоквартирные башни возвышаются по всему Бангалору. Найдите одну. Сколько этажей? Кто там живет?
      Башня — это вертикальная плотность. Что она заменяет?
    follow_ups:
      - Каким был бы горизонт без башни?
      - Как башня создает жилье?
      - Каковы отношения между башней и землей?
  - id: blr_roadside_vendor
    name: Уличный торговец
    prompt: |
      Уличные торговцы продают фрукты, закуски, зарядные устройства для телефонов. Найдите одного.
      Какой дисплей? Кто останавливается? Торговец — это неформальная экономика.
    follow_ups:
      - Какой была бы улица без торговца?
      - Как торговец создает средства к существованию?
      - Каковы отношения между торговцем и улицей?
  - id: blr_borewell
    name: Артезианская скважина
    prompt: |
      Бангалор зависит от артезианских скважин. Посмотрите на трубы, резервуары,
      насосы. Вода извлекается снизу. Каковы отношения между городом и водоносным горизонтом?
    follow_ups:
      - Каким было бы здание без скважины?
      - Как скважина создает снабжение?
      - Каковы отношения между скважиной и дефицитом?
  - id: blr_garbage_heap
    name: Свалка мусора
    prompt: |
      Свалки мусора появляются на углах, у стен. Заметьте одну. Что в ней? Кто роется в ней?
      Свалка — это предел системы.
    follow_ups:
      - Какой была бы улица без свалки?
      - Как свалка отмечает провал?
      - Каковы отношения между свалкой и городом?
  - id: blr_marquee_wedding
    name: Свадебный шатер
    prompt: |
      Свадебные шатры блокируют улицы. Найдите один. Шатр — это временная территория.
      Каковы отношения между праздником и улицей?
    follow_ups:
      - Какой была бы улица без шатра?
      - Как шатер создает претензию?
      - Каковы отношения между свадьбой и общественным пространством?
  - id: blr_old_bungalow
    name: Старый особняк
    prompt: |
      Старые бангалорские особняки сохраняются среди башен. Найдите один. У особняка есть
      территория, деревья, пространство. Что его заменит?
    follow_ups:
      - Какой была бы улица без особняка?
      - Как особняк отмечает историю?
      - Каковы отношения между особняком и башней?
  - id: blr_coffee_house
    name: Кофейня
    prompt: |
      Indian Coffee House — это учреждение. Посидите в одной. Кофейня —
      это комната для бесед. Каков ритм? Кто приходит?
    follow_ups:
      - Какой была бы улица без кофейни?
      - Как кофейня создает общину?
      - Каковы отношения между кофейней и городом?
  - id: blr_phone_booth
    name: Телефонная будка
    prompt: |
      Общественные телефонные будки все еще существуют. Найдите одну. Работает ли она? Кто ею пользуется?
      Будка — это реликт. Что ее заменило?
    follow_ups:
      - Какой была бы улица без будки?
      - Как будка отмечает изменения?
      - Каковы отношения между будкой и мобильной связью?
  - id: blr_bus_stop
    name: Автобусная остановка в Бангалоре
    prompt: |
      Бангалорские автобусные остановки — это часто столб и толпа. Подождите на одной. Кто
      ждет? Каков этикет? Остановка — это минимальная инфраструктура.
    follow_ups:
      - Какой была бы улица без остановки?
      - Как остановка создает связь?
      - Каковы отношения между остановкой и автобусом?
  - id: blr_power_line
    name: Линия электропередачи
    prompt: |
      Бангалорские линии электропередачи — это клубок: кабели, трансформаторы, петли. Проследите
      одну линию. Куда она идет? Сеть видна. Что она питает?
    follow_ups:
      - Какой была бы улица без линий?
      - Как сеть создает снабжение?
      - Каковы отношения между линией и отключением?
  - id: blr_speed_breaker
    name: Лежачий полицейский
    prompt: |
      "Лежачие полицейские" — спящие полицейские — усеивают дороги Бангалора. Почувствуйте один. Почему он здесь? Что он замедляет? Преграда — это локальное вмешательство.
    follow_ups:
      - Какая была бы дорога без преграды?
      - Как преграда создает безопасность?
      - Каковы отношения между преградой и скоростью?
  - id: blr_compound_tree
    name: Дерево на территории
    prompt: |
      Деревья на территории нависают над стенами. Найдите одно. Дерево находится одновременно внутри и
      снаружи. Что оно затеняет? Кому оно принадлежит?
    follow_ups:
      - Какой была бы улица без дерева?
      - Как дерево создает подарок?
      - Каковы отношения между деревом и территорией?
  - id: blr_shop_shutter
    name: Рольставни магазина
    prompt: |
      Бангалорские рольставни магазинов опускаются ночью. Найдите закрытые рольставни. Что
      за ними? Рольставни — это ежедневный цикл. Что они защищают?
    follow_ups:
      - Какой была бы улица без рольставен?
      - Как рольставни создают безопасность?
      - Каковы отношения между рольставнями и торговлей?
  - id: blr_water_tanker
    name: Водовоз
    prompt: |
      Водовозы снабжают районы. Наблюдайте за одним во время доставки. Водовоз —
      это мобильная инфраструктура. Каковы отношения между водовозом и краном?
    follow_ups:
      - Каким был бы район без водовоза?
      - Как водовоз создает снабжение?
      - Каковы отношения между водовозом и дефицитом?
  - id: blr_metro_station
    name: Станция метро
    prompt: |
      Бангалорские станции метро новые — чистые, брендированные. Войдите в одну. Чем
      станция отличается от улицы? Каков переход?
    follow_ups:
      - Каким был бы коридор без станции?
      - Как станция создает связь?
      - Каковы отношения между станцией и городом?
  - id: blr_rickshaw_stand
    name: Стоянка рикш
    prompt: |
      Стоянки рикш группируются на перекрестках. Найдите одну. Водители ждут.
      Стоянка — это узел. Какова экономика?
    follow_ups:
      - Каким был бы перекресток без стоянки?
      - Как стоянка создает мобильность?
      - Каковы отношения между стоянкой и водителем?
  - id: blr_pavement_sleep
    name: Сон на тротуаре
    prompt: |
      Спящие на тротуаре — часть города. Наблюдайте с осторожностью. Где они спят?
      Каковы отношения между улицей и убежищем?
    follow_ups:
      - Какой была бы улица без спящих?
      - Как тротуар становится домом?
      - Каковы отношения между сном и городом?
  - id: blr_gate_security
    name: Охрана у ворот
    prompt: |
      У ворот колоний есть охрана — стражники, барьеры, журналы. Наблюдайте за потоком.
      Кто входит? Кого останавливают? Ворота — это фильтр.
    follow_ups:
      - Какая была бы колония без ворот?
      - Как ворота создают безопасность?
      - Каковы отношения между воротами и доверием?
  - id: blr_street_dog
    name: Бездомная собака
    prompt: |
      Бездомные собаки — часть Бангалора. Заметьте одну. Где она спит? Что
