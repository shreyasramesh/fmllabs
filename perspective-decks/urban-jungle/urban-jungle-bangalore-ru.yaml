    follow_ups:
      - Какой была бы улица без собаки?
      - Как собака создает отношения?
      - Каковы отношения между собакой и городом?
  - id: blr_hoarding
    name: Рекламный щит
    prompt: |
      Рекламные щиты — большие баннеры — доминируют на перекрестках. Найдите один. Что
