    follow_ups:
      - Какой была бы улица без крана?
      - Как кран создает подарок?
      - Каковы отношения между краном и дефицитом?
  - id: blr_construction_crane
    name: Строительный кран
    prompt: |
      Строительные краны выделяются на фоне неба. Найдите один. Что строится?
