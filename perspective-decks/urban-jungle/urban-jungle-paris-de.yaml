      Pariser Métro-Stationen haben weiße Kacheln. Der Tunnel ist eine Röhre aus Licht. Fahre eine Linie. Wie prägt die Kachel die Fahrt?
    follow_ups:
      - Was wäre die Station ohne die Kacheln?
      - Wie schaffen Kacheln Sauberkeit?
      - Was ist die Beziehung zwischen Kachel und Untergrund?
  - id: paris_clock
    name: Pariser Uhr
    prompt: |
      Paris hat viele öffentliche Uhren – an Kirchen, Bahnhöfen, Gebäuden. Finde eine.
