      - Wie prägt die Uhr die Zeit?
      - Was ist die Beziehung zwischen Uhr und Ort?
  - id: paris_newsstand
    name: Pariser Kiosk
    prompt: |
      Pariser Kioske verkaufen Zeitungen, Zeitschriften, Métro-Tickets. Finde einen. Was
