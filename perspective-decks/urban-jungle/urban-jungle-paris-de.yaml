    follow_ups:
      - Was wäre das Gebäude ohne das Eisen?
      - Wie schafft das Eisen Identität?
      - Was ist die Beziehung zwischen Eisen und Handwerk?
  - id: paris_plane_tree
    name: Platane
    prompt: |
      Pariser Platanen säumen die Boulevards. Ihre Rinde blättert ab. Finde eine. Wie prägt der Baum die Straße? Was wäre der Boulevard ohne ihn?
    follow_ups:
      - Was wäre die Straße ohne die Platane?
      - Wie schafft die Platane Schatten?
      - Was ist die Beziehung zwischen Baum und Boulevard?
  - id: paris_metro_tile
    name: Métro-Kachel
