# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Urban Jungle — Paris (German)

id: urban_jungle_paris
name: Urban Jungle — Paris
description: 50 Karten, um Ihre Sicht auf Paris zu verändern – von Maßstab und Licht bis hin zu Schichten der Geschichte und den Rhythmen des Straßenlebens.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: Balkonblume
    prompt: |
      Pariser Balkone blühen mit Blumen – Geranien, Petunien. Finde ein Gebäude
      mit auf jedem Balkon einem Topf. Wie verändert die Blume die Fassade?
    follow_ups:
      - Was wäre die Straße ohne die Blumen?
      - Wie schaffen Blumen Identität?
      - Was ist die Beziehung zwischen Blume und Bewohner?
  - id: paris_haussmann_line
    name: Haussmann-Linie
    prompt: |
      Haussmannsche Boulevards schneiden durch das alte Paris. Gehe einen entlang. Die Linie ist
      unaufhaltsam – Gebäude ausgerichtet, Höhen einheitlich. Wie prägt der Boulevard die Bewegung?
    follow_ups:
      - Was wäre Paris ohne Haussmann?
      - Wie schafft der Boulevard eine Aussicht?
      - Was ist die Beziehung zwischen Linie und Macht?
  - id: paris_cafe_terrace
    name: Café-Terrasse
    prompt: |
      Pariser Café-Terrassen sind zur Straße hin ausgerichtet. Setze dich an eine. Du bist gleichzeitig drinnen und
      draußen. Die Terrasse ist ein Schwellenraum. Was siehst du?
    follow_ups:
      - Was wäre die Straße ohne die Terrasse?
      - Wie schafft die Terrasse Begegnung?
      - Was ist die Beziehung zwischen Terrasse und Straße?
  - id: paris_metro_entrance
    name: Métro-Eingang
    prompt: |
      Art Nouveau Métro-Eingänge sind Ikonen. Finde einen. Das Schmiedeeisen, die
      Beschriftung – der Eingang ist ein Portal. Was verspricht er?
    follow_ups:
      - Was wäre die Straße ohne den Eingang?
      - Wie schafft der Eingang Identität?
      - Was ist die Beziehung zwischen Eingang und Untergrund?
  - id: paris_shutter
    name: Pariser Fensterladen
    prompt: |
      Pariser Fensterläden – volets – schließen sich nachts. Sie sind grün, grau, blau. Finde eine
      Straße, in der die Fensterläden geschlossen sind. Was verbirgt sich dahinter?
    follow_ups:
      - Was wäre die Fassade ohne die Fensterläden?
      - Wie schaffen Fensterläden Privatsphäre?
      - Was ist die Beziehung zwischen Fensterladen und Licht?
  - id: paris_cobble
    name: Pariser Kopfsteinpflaster
    prompt: |
      Pariser Kopfsteinpflaster – pavés – sind beständig. Gehe darauf. Spüre die Textur. Das
      Kopfsteinpflaster ist ein Relikt eines anderen Paris. Wie prägt es die Straße?
    follow_ups:
      - Was wäre die Straße ohne das Kopfsteinpflaster?
      - Wie kennzeichnet Kopfsteinpflaster Geschichte?
      - Was ist die Beziehung zwischen Kopfsteinpflaster und Revolution?
  - id: paris_seine_edge
    name: Seine-Ufer
    prompt: |
      Die Seine fließt durch Paris. Gehe zum Kai. Der Fluss ist eine Naht. Was
      ist auf beiden Seiten? Wie teilt und verbindet der Fluss?
    follow_ups:
      - Was wäre Paris ohne die Seine?
      - Wie prägt der Fluss die Stadt?
      - Was ist die Beziehung zwischen Fluss und Ufer?
  - id: paris_roof_zinc
    name: Dachzink
    prompt: |
      Pariser Dächer sind oft aus Zink – grau, geneigt, mit Gauben. Schaue nach oben. Die Dachlinie
      ist charakteristisch. Wie prägt sie die Skyline?
    follow_ups:
      - Was wäre die Skyline ohne das Zink?
      - Wie schafft Zink Identität?
      - Was ist die Beziehung zwischen Dach und Dachboden?
  - id: paris_door_height
    name: Türhöhe
    prompt: |
      Pariser Türen sind oft hoch – doppelte Höhe. Finde eine. Was würde hindurchgehen? Die Tür ist ein Schwellenraum des Maßstabs.
    follow_ups:
      - Was wäre das Gebäude ohne die hohe Tür?
      - Wie schafft Höhe Grandiosität?
      - Was ist die Beziehung zwischen Tür und Gebäude?
  - id: paris_boulangerie_smell
    name: Duft der Boulangerie
    prompt: |
      Eine Boulangerie riecht nach Brot. Folge dem Geruch. Die Bäckerei ist ein Knotenpunkt.
      Was sagt der Geruch über den Block aus?
    follow_ups:
      - Was wäre die Straße ohne den Geruch?
      - Wie schafft Geruch Identität?
      - Was ist die Beziehung zwischen Geruch und Handel?
  - id: paris_place
    name: Pariser Platz
    prompt: |
      Paris hat Plätze – Quadrate, Kreise, Knotenpunkte. Finde einen. Achte auf die
      Geometrie. Wie prägt der Platz die Straßen, die in ihn münden?
    follow_ups:
      - Was wäre das Viertel ohne den Platz?
      - Wie schafft der Platz Fokus?
      - Was ist die Beziehung zwischen Platz und Fluss?
  - id: paris_balcony_iron
    name: Balkon-Eisen
    prompt: |
      Pariser Balkongeländer sind oft kunstvoll – Schmiedeeisen, Kurven, Verzierungen.
