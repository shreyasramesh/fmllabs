# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# アーバン・ジャングル — ロンドン (Japanese)

id: urban_jungle_london
name: アーバン・ジャングル — ロンドン
description: ロンドンを、スケールや光、歴史の層、そしてストリートライフのリズムから捉え直すための50枚のカード。
domain: urban_jungle
cards:
  - id: london_layer
    name: ロンドンの層
    prompt: |
      ロンドンは、ローマ時代、中世、ビクトリア朝、現代といった層の上に築かれています。時代がぶつかり合う場所を見つけてください。あなたが見える最も古いものは何ですか？最も新しいものは？
    follow_ups:
      - 層がなければ、この通りはどうなるだろうか？
      - 建物には歴史がどのように表れているか？
      - 層とアイデンティティの関係は？
  - id: london_pub_threshold
    name: パブの敷居
    prompt: |
      ロンドンのパブには敷居があります――段差、ドア、バー。その敷居に立ってみてください。内部には何がありますか？外部には何がありますか？パブは街の一室です。
    follow_ups:
      - パブがなければ、このブロックはどうなるだろうか？
      - 敷居はどのように移行を生み出すか？
      - パブと通りの関係は？
  - id: london_blue_plaque
    name: 青いプレート
    prompt: |
      青いプレートは、有名な人物が住んでいた場所を示しています。それを見つけてください。誰がここに住んでいましたか？彼らは何をしましたか？プレートは歴史を目に見えるものにします。
    follow_ups:
      - プレートがなければ、この建物はどうなるだろうか？
      - プレートはどのように記憶を形作るか？
      - プレートと場所の関係は？
  - id: london_underground
    name: 地下鉄
    prompt: |
      チューブ（地下鉄）は、街の下の街です。降りてみてください。タイル、地図、エスカレーターに注目してください。地下は地上をどのように形作っているのでしょうか？
    follow_ups:
      - チューブがなければ、ロンドンはどうなるだろうか？
      - 地下はどのように繋がりを生み出すか？
      - 地下と地上の関係は？
  - id: london_thames_edge
    name: テムズ川のほとり
    prompt: |
      テムズ川はロンドンを流れています。河岸に出てみてください。川は縫い目です。両側には何がありますか？川はどのように分断し、繋いでいるのでしょうか？
    follow_ups:
      - テムズ川がなければ、ロンドンはどうなるだろうか？
      - 川はどのように街を形作るか？
      - 川と岸辺の関係は？
  - id: london_georgian_row
    name: ジョージアン様式のテラスハウスの列
    prompt: |
      ジョージアン様式のテラスハウスは繰り返されています――ドア、窓、ドア、窓。列に沿って歩いてください。繰り返しはリズムを生み出します。それを壊すものは何ですか？それを一つにまとめるものは何ですか？
    follow_ups:
      - 列がなければ、この通りはどうなるだろうか？
      - 繰り返しはどのようにアイデンティティを生み出すか？
      - 列と個の関係は？
  - id: london_mews
    name: ミューズ
    prompt: |
      ミューズは馬小屋でしたが、今は家になっています。それを見つけてください。狭い路地、石畳、改装された馬車小屋。過去はどのように存続するのか？
    follow_ups:
      - 歴史がなければ、ミューズはどうなるだろうか？
      - ミューズはどのようにプライバシーを生み出すか？
      - ミューズとメインストリートの関係は？
  - id: london_phone_box
    name: 電話ボックス
    prompt: |
      赤い電話ボックスは象徴です。それを見つけてください。まだ電話ですか？AEDですか？図書館ですか？象徴はどのように再利用されるのか？
    follow_ups:
      - ボックスがなければ、この通りはどうなるだろうか？
      - ボックスはどのようにイギリスらしさを示すか？
      - ボックスと機能の関係は？
  - id: london_postbox
    name: ポスト
    prompt: |
      赤いポストはどこにでもあります。それを見つけてください。王室のモノグラムに注目してください。ポストはネットワーク内のノードです。そこを何が流れているのか？
    follow_ups:
      - ポストがなければ、この通りはどうなるだろうか？
      - ポストはどのように縄張りを確保するか？
      - ポストと手紙の関係は？
  - id: london_pavement
    name: 歩道
    prompt: |
      イギリスの「pavement」はアメリカの「sidewalk」です。言葉は私たちの考え方を形作ります。歩道を歩いてください。歩道と道路の関係は？
    follow_ups:
      - 歩道がなければ、この通りはどうなるだろうか？
      - 歩道はどのように安全を確保するか？
      - 歩道と歩行者の関係は？
  - id: london_brick
    name: ロンドンのレンガ
    prompt: |
      ロンドンのレンガは、しばしば黄色または赤――ロンドンのストック。レンガの壁を見つけて、色、質感、積み方を研究してください。レンガはどのように古くなるのか？
    follow_ups:
      - レンガがなければ、この建物はどうなるだろうか？
      - レンガはどのようにアイデンティティを生み出すか？
      - レンガと場所の関係は？
  - id: london_weather
    name: ロンドンの天気
    prompt: |
      ロンドンの天気は変わりやすいです。一箇所に20分間立ってください。空を見てください。天気は街の気分をどのように形作るのか？
    follow_ups:
      - 雨がなければ、ロンドンはどうなるだろうか？
      - 天気はどのように建築を形作るか？
      - 天気とストリートライフの関係は？
  - id: london_queue
    name: 列
    prompt: |
      イギリス人は列を作ります。バス、店、アトラクションの列を見つけてください。エチケットを観察してください。列は秩序の一形態です。どのように機能するのか？
    follow_ups:
      - 列がなければ、この空間はどうなるだろうか？
      - 列はどのように公平性を生み出すか？
      - 列と文化の関係は？
  - id: london_roundabout
    name: ロータリー
    prompt: |
      ロンドンには多くのロータリー――交通円があります。一つを見てください。交通はどのように流れるのか？論理は何か？ロータリーはノードです。
    follow_ups:
      - ロータリーがなければ、この交差点はどうなるだろうか？
      - ロータリーはどのように流れを形作るか？
      - ロータリーとジャンクションの関係は？
  - id: london_parks_room
    name: 公園の部屋
    prompt: |
      ロンドンの公園は部屋です――ハイドパーク、リージェンツパーク、広場。一つに入ってみてください。境界線、小道、家具に注目してください。自然はどのようにデザインされるのか？
    follow_ups:
      - 公園がなければ、ロンドンはどうなるだろうか？
      - 公園はどのように休息を生み出すか？
      - 公園と街の関係は？
  - id: london_square
    name: ロンドンの広場
    prompt: |
      ロンドンの広場はしばしば私有地――ゲートで閉鎖され、鍵がかかっています。それを見つけてください。中には何がありますか？誰がアクセスできますか？広場は排他的なポケットです。
    follow_ups:
      - 広場がなければ、この地域はどうなるだろうか？
      - 広場はどのようにコミュニティを生み出すか？
      - 広場と通りの関係は？
  - id: london_terrace
    name: テラスハウス
    prompt: |
      テラスハウスとは、一列に並んだ家です。一つを歩いてみてください。均一性と変化に注目してください。テラスハウスはどのようにアイデンティティを生み出すのか？
    follow_ups:
      - テラスハウスがなければ、この通りはどうなるだろうか？
      - テラスハウスはどのようにリズムを生み出すか？
      - テラスハウスと個の関係は？
  - id: london_corner_shop
    name: 角の店
    prompt: |
      角の店はロンドンの名物です。入ってみてください。何が売られていますか？誰が経営していますか？店は地域社会のノードです。
    follow_ups:
      - 店がなければ、このブロックはどうなるだろうか？
      - 店はどのように出会いを生み出すか？
      - 店と地域社会の関係は？
  - id: london_bus_route
    name: バス路線
    prompt: |
      ロンドンのバスには番号と行き先があります。これまで乗ったことのないバスに乗ってみてください。どこへ行きますか？路線はどのように街を形作るのか？
    follow_ups:
      - バスがなければ、この旅はどうなるだろうか？
      - 路線はどのように繋がりを生み出すか？
      - バスと地域社会の関係は？
  - id: london_clock
    name: ロンドンの時計
    prompt: |
      ビッグ・ベン、駅の時計、教会の時計。ロンドンは公共の時計でいっぱいです。それを見つけてください。何時を示していますか？正しいですか？
    follow_ups:
      - 時計がなければ、この空間はどうなるだろうか？
      - 時計はどのように時間を形作るか？
      - 時計と場所の関係は？
  - id: london_bridge
    name: ロンドンの橋
    prompt: |
      ロンドンには多くの橋があります――タワーブリッジ、ミレニアムブリッジ、ウォータールー。一つを歩いて渡ってください。移行を感じてください。何が変わりますか？
    follow_ups:
      - 橋がなければ、川はどうなるだろうか？
      - 橋はどのように繋ぐか？
      - 橋と川の関係は？
  - id: london_street_market
    name: ストリートマーケット
    prompt: |
      ロンドンにはストリートマーケットがあります――バラ・マーケット、カムデン・マーケット、ポートベロー・マーケット。一つを歩いてみてください。何が売られていますか？誰が売っていますか？マーケットは一時的な街です。
    follow_ups:
      - マーケットがなければ、この通りはどうなるだろうか？
      - マーケットはどのように出会いを生み出すか？
      - マーケットと地域社会の関係は？
  - id: london_ghost_sign
    name: ロンドンのゴーストサイン
    prompt: |
      レンガに残る色あせた看板――ゴーストサイン――は過去を物語ります。それを見つけてください。何が宣伝されていましたか？誰が見ていたのだろうか？
    follow_ups:
      - サインがなければ、この壁はどうなるだろうか？
      - ゴーストサインはどのように歴史を保存するか？
      - サインと商業の関係は？
  - id: london_bollard
    name: ボラード
    prompt: |
      ボラードは境界線を示します――歩行者区域、駐車禁止。一列のボラードを見つけてください。何を保護していますか？何を排除していますか？
    follow_ups:
      - ボラードがなければ、この空間はどうなるだろうか？
      - ボラードはどのように流れを形作るか？
      - ボラードと境界の関係は？
  - id: london_door_number
    name: ドア番号
    prompt: |
      ロンドンの住所は奇数と偶数で分かれていることがあります――片側に奇数、もう片側に偶数。番号を辿ってください。番号はどのように通りを形作るのか？
    follow_ups:
      - 番号がなければ、道案内はどうなるだろうか？
      - 番号はどのように秩序を生み出すか？
      - 番号と場所の関係は？
  - id: london_basement
    name: ロンドンの地下室
    prompt: |
      ロンドンの家にはしばしば地下室があります――時には地盤面の下に。階段と前のエリアに注目してください。歩道の地下には何があるのか？
    follow_ups:
      - 地下室がなければ、この家はどうなるだろうか？
      - 地下室はどのように空間を生み出すか？
      - 地下室と通りの関係は？
  - id: london_roof_line
    name: 屋根の線
    prompt: |
      ロンドンの屋根の線は多様です――スレート、瓦、フラット。見上げてください。空を辿ってください。屋根はどのように通りを形作るのか？
    follow_ups:
      - 屋根がなければ、この通りはどうなるだろうか？
      - 屋根の線はどのようにアイデンティティを生み出すか？
      - 屋根と空の関係は？
  - id: london_cobble
    name: 石畳
    prompt: |
      石畳はいくつかの通りに残っています。その上を歩いてください。質感を味わってください。表面はどのように通りを形作るのか？
    follow_ups:
      - 石畳がなければ、この通りはどうなるだろうか？
      - 石畳はどのように歴史を示すか？
      - 石畳と現代の関係は？
  - id: london_lamp_post
    name: 街灯
    prompt: |
      ロンドンの街灯は独特のスタイルを持っています――ビクトリア朝、現代。それを見つけてください。街灯は夜の通りをどのように形作るのか？
    follow_ups:
      - 街灯がなければ、この通りはどうなるだろうか？
      - 街灯はどのように安全を確保するか？
      - 街灯と闇の関係は？
  - id: london_bus_stop
    name: バス停
    prompt: |
      ロンドンのバス停にはシェルター、時刻表、番号があります。一つで待ってください。他に誰が待っていますか？エチケットは？
    follow_ups:
      - バス停がなければ、この通りはどうなるだろうか？
      - バス停はどのようにコミュニティを生み出すか？
      - バス停と旅の関係は？
  - id: london_pub_sign
    name: パブの看板
    prompt: |
      パブの看板は通りにぶら下がっています――「ザ・クラウン」、「ザ・レッド・ライオン」。それを見つけてください。画像は何ですか？物語は何ですか？看板はランドマークです。
    follow_ups:
      - 看板がなければ、この通りはどうなるだろうか？
      - 看板はどのようにアイデンティティを生み出すか？
      - 看板とパブの関係は？
  - id: london_church_spire
    name: 教会の尖塔
    prompt: |
      教会の尖塔はロンドンのスカイラインを彩ります。それを見つけてください。尖塔はあなたをどのように方向づけるか？それがなければ、眺めはどうなるだろうか？
    follow_ups:
      - 尖塔がなければ、スカイラインはどうなるだろうか？
      - 尖塔はどのようにランドマークを生み出すか？
      - 尖塔と地域社会の関係は？
  - id: london_canal
    name: ロンドンの運河
    prompt: |
      ロンドンには運河があります――リージェンツ・キャナル、グランド・ユニオン。水路沿いを歩いてください。運河は縫い目です。両側には何がありますか？
    follow_ups:
      - 運河がなければ、街はどうなるだろうか？
      - 運河はどのように繋がりを生み出すか？
      - 運河と産業の関係は？
  - id: london_garden_square
    name: ガーデンスクエア
    prompt: |
      ロンドンのガーデンスクエアはしばしば施錠されています。ゲートから覗いてください。中には何がありますか？誰が鍵を持っていますか？庭は隠された部屋です。
    follow_ups:
      - 庭がなければ、広場はどうなるだろうか？
      - 庭はどのように排他性を生み出すか？
      - 庭と広場の関係は？
  - id: london_taxi
    name: ロンドンのタクシー
    prompt: |
      ブラックキャブは象徴です。止まり、人を乗せ、走り去るのを見てください。タクシーはどのように通りを形作るのか？それなしでは街はどうなるだろうか？
    follow_ups:
      - タクシーがなければ、この通りはどうなるだろうか？
      - タクシーはどのように移動性（モビリティ）を生み出すか？
      - タクシーと知識の関係は？
  - id: london_underground_tile
    name: 地下鉄のタイル
    prompt: |
      チューブの駅には特徴的なタイルがあります――ベイカーストリートのシャーロック、
      ヴィクトリア線の青。個性的な駅を見つけてください。タイルは何を語っているのか？
    follow_ups:
      - タイルがなければ、駅はどうなるだろうか？
      - タイルはどのようにアイデンティティを生み出すか？
      - タイルと場所の関係は？
  - id: london_bench
    name: ロンドンのベンチ
    prompt: |
      ロンドンには多くのベンチがあります――公園、通り、バス停のそば。一つに座ってください。他に誰が座っていますか？眺めは？
    follow_ups:
      - ベンチがなければ、この空間はどうなるだろうか？
      - ベンチはどのように休息を生み出すか？
      - ベンチと通りの関係は？
  - id: london_drain
    name: ロンドンの排水溝
    prompt: |
      見下ろしてください。排水溝を見つけてください――側溝、格子。水はどこへ行くのか？排水溝は街の隠されたシステムへのポータルです。
    follow_ups:
      - 排水溝がなければ、この通りはどうなるだろうか？
      - 排水溝はどのように水を管理するか？
      - 排水溝とシステムの関係は？
  - id: london_shop_front
    name: 店のファサード
    prompt: |
      ロンドンの店のファサードはしばしば小さい――狭く、奥行きがある。窓から覗いてください。
      何が展示されていますか？ファサードはどのように通りを形作るのか？
    follow_ups:
      - ファサードがなければ、この通りはどうなるだろうか？
      - ファサードはどのようにアイデンティティを生み出すか？
      - ファサードと商業の関係は？
  - id: london_paving
    name: ロンドンの舗装
    prompt: |
      ロンドンの舗装は様々です――敷石、アスファルト、レンガ。ブロックを歩き、変化に注目してください。表面はどのように通りを形作るのか？
    follow_ups:
      - 舗装がなければ、この通りはどうなるだろうか？
      - 舗装はどのように縄張りを確保するか？
      - 舗装と歩行者の関係は？
  - id: london_balcony
    name: ロンドンのバルコニー
    prompt: |
      ロンドンのバルコニーはしばしば小さい――ジュリエットバルコニー、小さなテラス。それを見つけてください。そこで何を育てますか？誰がそれを使いますか？
    follow_ups:
      - バルコニーがなければ、この建物はどうなるだろうか？
      - バルコニーはどのように屋外空間を生み出すか？
      - バルコニーとフラット（アパート）の関係は？
  - id: london_chimney
    name: ロンドンの煙突
    prompt: |
      ロンドンの煙突は屋根の線にアクセントをつけます。一つの建物で数えてください。かつて何度燃えたのか？煙突は遺物です。
    follow_ups:
      - 煙突がなければ、屋根はどうなるだろうか？
      - 煙突はどのように歴史を示すか？
      - 煙突と熱の関係は？
  - id: london_bike_stand
    name: 自転車スタンド
    prompt: |
      ロンドンには自転車スタンド、サンタンデールサイクル、配達用自転車があります。クラスターを見つけてください。自転車はどのように通りを形作るのか？それなしではブロックはどうなるだろうか？
    follow_ups:
      - 自転車がなければ、この通りはどうなるだろうか？
      - 自転車はどのように移動性（モビリティ）を生み出すか？
      - 自転車と街の関係は？
  - id: london_tree_pit
    name: 木の植え込み
    prompt: |
      ロンドンの街路樹は植え込みで育ちます――しばしば小さく、しばしば苦戦しています。それを見つけてください。植え込みには何がありますか？木はどうですか？
    follow_ups:
      - 木がなければ、この通りはどうなるだろうか？
      - 植え込みはどのように木の一生を形作るか？
      - 植え込みと歩道の関係は？
  - id: london_rain
    name: ロンドンの雨
    prompt: |
      ロンドンの雨は頻繁です。避難場所の下に立って見てください。雨はどのように通りを変えるのか？それなしでは街はどうなるだろうか？
    follow_ups:
      - 雨はどのように気分を形作るか？
      - 雨と傘の関係は？
      - 乾いた状態では何に気づくだろうか？
  - id: london_cab_rank
    name: タクシー乗り場
    prompt: |
      ブラックキャブは乗り場で列を作ります。流れを見てください。乗り場はノードです。タクシーはどのように通りを形作るのか？それなしでは交差点はどうなるだろうか？
    follow_ups:
      - 乗り場はどのように秩序を生み出すか？
      - タクシーと知識の関係は？
      - タクシー運転手になぜ尋ねるか？
  - id: london_pub_window
    name: パブの窓
    prompt: |
      パブの窓はしばしば鉛ガラスで、しばしば小さい。そこから覗いてください。眺めは？窓は通りを縁取ります。フレームはどのように重要なのか？
    follow_ups:
      - 窓がなければ、パブはどうなるだろうか？
      - 窓はどのように関係を生み出すか？
      - 窓と通りの関係は？
  - id: london_mews_cobble
    name: ミューズの石畳
    prompt: |
      ミューズの路地はしばしば石畳です。それを通って歩いてください。質感を味わってください。石畳は歴史を示します。アスファルトではミューズはどうなるだろうか？
    follow_ups:
      - 石畳はどのように路地を形作るか？
      - 石畳と馬の関係は？
      - 石畳の上で何を聞くだろうか？
  - id: london_underground_escalator
    name: 地下鉄のエスカレーター
    prompt: |
      チューブのエスカレーターは長いです――エンジェル駅のものは最も長いものの一つです。それに乗ってください。下降を感じてください。エスカレーターはどのように旅を形作るのか？
    follow_ups:
      - エスカレーターがなければ、駅はどうなるだろうか？
      - エスカレーターはどのように流れを生み出すか？
      - エスカレーターと深さの関係は？
  - id: london_thames_path
    name: テムズ川の小道
    prompt: |
      テムズ川の小道は川沿いに続いています。一区間歩いてください。小道は回廊を作ります。両側には何がありますか？小道はどのように旅を形作るのか？
    follow_ups:
      - 小道がなければ、川はどうなるだろうか？
      - 小道はどのようにアクセスを生み出すか？
      - 小道と川の関係は？
