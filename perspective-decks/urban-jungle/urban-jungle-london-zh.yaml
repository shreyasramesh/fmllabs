# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Urban Jungle — London (Mandarin Chinese)

id: urban_jungle_london
name: Urban Jungle — London
description: 50 张卡片，改变您看待伦敦的方式——从规模、光线到历史的层次和街头生活的节奏。
domain: urban_jungle
cards:
  - id: london_layer
    name: 伦敦的层次
    prompt: |
      伦敦是层层叠建的——罗马、中世纪、维多利亚、现代。找一个不同时代交汇的地方。您能看到的最古老的东西是什么？最新的又是什么？
    follow_ups:
      - 没有了这些层次，街道会变成什么样？
      - 历史是如何在建筑形态中体现的？
      - 层次与身份之间有什么关系？
  - id: london_pub_threshold
    name: 酒吧门槛
    prompt: |
      伦敦的酒吧有一个门槛——台阶、门、吧台。站在门槛处。里面是什么？外面又是什么？酒吧是城市中的一个房间。
    follow_ups:
      - 没有了酒吧，这个街区会怎么样？
      - 门槛是如何创造过渡的？
      - 酒吧与街道之间有什么关系？
  - id: london_blue_plaque
    name: 蓝色牌匾
    prompt: |
      蓝色牌匾标志着名人曾居住的地方。找一个。这里住着谁？他们做了什么？牌匾让历史可见。
    follow_ups:
      - 没有牌匾，这座建筑会怎样？
      - 牌匾是如何塑造记忆的？
      - 牌匾与地点之间有什么关系？
  - id: london_underground
    name: 地铁
    prompt: |
      地铁是城市下的城市。下去吧。注意瓷砖、地图、自动扶梯。地下是如何塑造地面的？
    follow_ups:
      - 没有地铁，伦敦会怎样？
      - 地下是如何创造连接的？
      - 地下与地面之间有什么关系？
  - id: london_thames_edge
    name: 泰晤士河畔
    prompt: |
      泰晤士河穿过伦敦。去河堤。河流是一条缝隙。两边是什么？河流是如何分隔又连接的？
    follow_ups:
      - 没有泰晤士河，伦敦会怎样？
      - 河流是如何塑造城市的？
      - 河流与河岸之间有什么关系？
  - id: london_georgian_row
    name: 格鲁吉亚时期排屋
    prompt: |
      格鲁吉亚时期的排屋重复出现——门、窗、门、窗。沿着一条排屋走。重复创造了节奏。什么打破了它？什么将它维系在一起？
    follow_ups:
      - 没有了排屋，街道会是什么样？
      - 重复是如何创造身份的？
      - 排屋与个体之间有什么关系？
  - id: london_mews
    name: 马厩街
    prompt: |
      马厩街曾是马厩，现在是住宅。找一个。狭窄的巷道、鹅卵石、改建的马车房。过去是如何延续的？
    follow_ups:
      - 没有历史，马厩街会是怎样？
      - 马厩街是如何创造私密性的？
      - 马厩街与主街之间有什么关系？
  - id: london_phone_box
    name: 电话亭
    prompt: |
      红色电话亭是标志。找一个。它还是电话吗？还是自动除颤器？还是图书角？标志是如何被重新利用的？
    follow_ups:
      - 没有了电话亭，街道会是什么样？
      - 电话亭是如何标志英国身份的？
      - 电话亭与功能之间有什么关系？
  - id: london_postbox
    name: 邮箱
    prompt: |
      红色的邮箱随处可见。找一个。注意皇家标志。邮箱是网络中的一个节点。什么通过它流动？
    follow_ups:
      - 没有了邮箱，街道会是什么样？
      - 邮箱是如何标记领土的？
      - 邮箱与信件之间有什么关系？
  - id: london_pavement
    name: 人行道
    prompt: |
      英式“pavement”是美式“sidewalk”。这个词塑造了我们的思维方式。走在人行道上。人行道与道路之间有什么关系？
    follow_ups:
      - 没有了人行道，街道会是什么样？
      - 人行道是如何创造安全的？
      - 人行道与行人之间有什么关系？
  - id: london_brick
    name: 伦敦砖
    prompt: |
      伦敦的砖通常是黄色或红色的——伦敦砖。找一面砖墙，研究颜色、纹理、砌法。砖是如何老化的？
    follow_ups:
      - 没有了砖，建筑会是什么样？
      - 砖是如何创造身份的？
      - 砖与地点之间有什么关系？
  - id: london_weather
    name: 伦敦的天气
    prompt: |
      伦敦的天气变化无常。在一个地方站二十分钟。看天空。天气是如何塑造城市的心情的？
    follow_ups:
      - 没有雨，伦敦会怎样？
      - 天气是如何塑造建筑的？
      - 天气与街头生活之间有什么关系？
  - id: london_queue
    name: 排队
    prompt: |
      英国人会排队。找一个排队——公交、商店、景点。观察礼仪。排队是一种秩序。它是如何运作的？
    follow_ups:
      - 没有了排队，这个空间会怎样？
      - 排队是如何创造公平的？
      - 排队与文化之间有什么关系？
  - id: london_roundabout
    name: 环岛
    prompt: |
      伦敦有很多环岛——交通环岛。观察一个。交通是如何流动的？它的逻辑是什么？环岛是一个节点。
    follow_ups:
      - 没有了环岛，这个交叉口会是怎样？
      - 环岛是如何塑造交通流动的？
      - 环岛与交叉口之间有什么关系？
  - id: london_parks_room
    name: 公园房间
    prompt: |
      伦敦的公园就是房间——海德公园、摄政公园、广场。进入一个。注意边界、小径、长椅。自然是如何被设计的？
    follow_ups:
      - 没有了公园，伦敦会怎样？
      - 公园是如何创造休憩空间的？
      - 公园与城市之间有什么关系？
  - id: london_square
    name: 伦敦广场
    prompt: |
      伦敦的广场通常是私有的——有围栏、需要钥匙。找一个。里面是什么？谁有权进入？广场是排他性的口袋。
    follow_ups:
      - 没有了广场，这个街区会怎样？
      - 广场是如何创造社区的？
      - 广场与街道之间有什么关系？
  - id: london_terrace
    name: 排屋
    prompt: |
      排屋是一排房屋。走一条。注意统一性和变化性。排屋是如何创造身份的？
    follow_ups:
      - 没有了排屋，街道会是什么样？
      - 排屋是如何创造节奏的？
      - 排屋与个体之间有什么关系？
  - id: london_corner_shop
    name: 转角商店
    prompt: |
      转角商店是伦敦的一大特色。进一个。卖什么？谁在经营？商店是街区中的一个节点。
    follow_ups:
      - 没有了商店，这个街区会怎样？
      - 商店是如何创造偶遇的？
      - 商店与社区之间有什么关系？
  - id: london_bus_route
    name: 公交线路
    prompt: |
      伦敦公交有编号和目的地。乘坐一条您从未乘坐过的公交。它去哪里？路线是如何塑造城市的？
    follow_ups:
      - 没有了公交，这段旅程会是怎样？
      - 路线是如何创造连接的？
      - 公交与街区之间有什么关系？
  - id: london_clock
    name: 伦敦的钟
    prompt: |
      大本钟、车站的钟、教堂的钟。伦敦有很多公共时钟。找一个。它显示什么时间？准时吗？
    follow_ups:
      - 没有了钟，这个空间会是怎样？
      - 钟是如何塑造时间的？
      - 钟与地点之间有什么关系？
  - id: london_bridge
    name: 伦敦桥
    prompt: |
      伦敦有很多桥——伦敦塔桥、千禧桥、滑铁卢桥。步行过一座。感受过渡。什么改变了？
    follow_ups:
      - 没有了桥，河流会是怎样？
      - 桥是如何连接的？
      - 桥与河流之间有什么关系？
  - id: london_street_market
    name: 街头市场
    prompt: |
      伦敦有街头市场——博罗市场、卡姆登市场、波多贝罗市场。走一个。卖什么？谁在卖？市场是临时的城市。
    follow_ups:
      - 没有了市场，街道会是什么样？
      - 市场是如何创造偶遇的？
      - 市场与街区之间有什么关系？
  - id: london_ghost_sign
    name: 伦敦的褪色广告
    prompt: |
      砖墙上褪色的广告——褪色广告——标记着过去。找一个。它曾宣传什么？谁会看到它？
    follow_ups:
      - 没有了广告，墙会是怎样？
      - 褪色广告是如何保存历史的？
      - 广告与商业之间有什么关系？
  - id: london_bollard
    name: 柱子
    prompt: |
      柱子标记边界——行人区、禁停区。找一排柱子。它们在保护什么？它们在排除什么？
    follow_ups:
      - 没有了柱子，这个空间会是怎样？
      - 柱子是如何塑造交通流动的？
      - 柱子与边界之间有什么关系？
  - id: london_door_number
    name: 门牌号
    prompt: |
      伦敦的地址可能很奇怪——奇数在一边，偶数在另一边。跟着数字走。编号是如何塑造街道的？
    follow_ups:
      - 没有了门牌号，指路会怎样？
      - 编号是如何创造秩序的？
      - 编号与地点之间有什么关系？
  - id: london_basement
    name: 伦敦的地下室
    prompt: |
      伦敦的房子经常有地下室——有时在街道以下。注意向下的台阶、前面的区域。人行道下面是什么？
    follow_ups:
      - 没有了地下室，房子会怎样？
      - 地下室是如何创造空间的？
      - 地下室与街道之间有什么关系？
  - id: london_roof_line
    name: 屋顶线
    prompt: |
      伦敦的屋顶线多种多样——石板、瓦片、平顶。抬头看。勾勒天际线。屋顶是如何塑造街道的？
    follow_ups:
      - 没有了屋顶，街道会是什么样？
      - 屋顶线是如何创造身份的？
      - 屋顶与天空之间有什么关系？
  - id: london_cobble
    name: 鹅卵石
    prompt: |
      一些街道上仍然保留着鹅卵石。走在上面。感受纹理。路面是如何塑造街道的？
    follow_ups:
      - 没有了鹅卵石，街道会是什么样？
      - 鹅卵石是如何标志历史的？
      - 鹅卵石与现代性之间有什么关系？
  - id: london_lamp_post
    name: 灯柱
    prompt: |
      伦敦的灯柱风格独特——维多利亚时期、现代。找一个。夜晚灯是如何塑造街道的？
    follow_ups:
      - 没有了灯，街道会是什么样？
      - 灯是如何创造安全的？
      - 灯与黑暗之间有什么关系？
  - id: london_bus_stop
    name: 公交站
    prompt: |
      伦敦的公交站有遮蔽棚、时刻表、编号。等一个。还有谁在等？有什么礼仪？
    follow_ups:
      - 没有了公交站，街道会是什么样？
      - 公交站是如何创造社区的？
      - 公交站与旅程之间有什么关系？
  - id: london_pub_sign
    name: 酒吧招牌
    prompt: |
      酒吧招牌悬挂在街道上方——“王冠酒馆”、“红狮酒馆”。找一个。图像是什么？故事是什么？招牌是一个地标。
    follow_ups:
      - 没有了招牌，街道会是什么样？
      - 招牌是如何创造身份的？
      - 招牌与酒吧之间有什么关系？
  - id: london_church_spire
    name: 教堂尖顶
    prompt: |
      教堂尖顶点缀着伦敦的天际线。找一个。尖顶如何为您定位？没有它，风景会是怎样？
    follow_ups:
      - 没有了尖顶，天际线会是怎样？
      - 尖顶是如何创造地标的？
      - 尖顶与街区之间有什么关系？
  - id: london_canal
    name: 伦敦运河
    prompt: |
      伦敦有运河——摄政运河、大联合运河。走在驳船道上。运河是一条缝隙。两边是什么？
    follow_ups:
      - 没有了运河，城市会是怎样？
      - 运河是如何创造连接的？
      - 运河与工业之间有什么关系？
  - id: london_garden_square
    name: 花园广场
    prompt: |
      伦敦的花园广场通常是锁着的。透过大门看。里面是什么？谁有钥匙？花园是一个隐藏的房间。
    follow_ups:
      - 没有了花园，广场会是怎样？
      - 花园是如何创造排他性的？
      - 花园与广场之间有什么关系？
  - id: london_taxi
    name: 伦敦出租车
    prompt: |
      黑色出租车是标志。看它们停下、载客、驶离。出租车是如何塑造街道的？没有它，城市会是怎样？
    follow_ups:
      - 没有了出租车，街道会是什么样？
      - 出租车是如何创造流动性的？
      - 出租车与知识之间有什么关系？
  - id: london_underground_tile
    name: 地铁瓷砖
    prompt: |
      地铁站有独特的瓷砖——贝克街的夏洛克，维多利亚线的蓝色。找一个有特色的车站。瓷砖在说什么？
    follow_ups:
      - 没有了瓷砖，车站会是怎样？
      - 瓷砖是如何创造身份的？
      - 瓷砖与地点之间有什么关系？
  - id: london_bench
    name: 伦敦长椅
    prompt: |
      伦敦有很多长椅——在公园里、街上、公交站旁。坐一个。还有谁坐？风景如何？
    follow_ups:
      - 没有了长椅，这个空间会是怎样？
      - 长椅是如何创造休憩空间的？
      - 长椅与街道之间有什么关系？
  - id: london_drain
    name: 伦敦的排水口
    prompt: |
      向下看。找一个排水口——沟渠、栅栏。水去哪里了？排水口是通往城市隐藏系统的一扇门。
    follow_ups:
      - 没有了排水口，街道会是什么样？
      - 排水口是如何管理水的？
      - 排水口与系统之间有什么关系？
  - id: london_shop_front
    name: 店面
    prompt: |
      伦敦的店面通常很小——狭窄、深邃。看看窗户。展示了什么？店面是如何塑造街道的？
    follow_ups:
      - 没有了店面，街道会是什么样？
      - 店面是如何创造身份的？
      - 店面与商业之间有什么关系？
  - id: london_paving
    name: 伦敦的路面
    prompt: |
      伦敦的路面多种多样——石板、沥青、砖。走一个街区，注意变化。路面是如何塑造街道的？
    follow_ups:
      - 没有了路面，街道会是什么样？
      - 路面是如何标记领土的？
      - 路面与行人之间有什么关系？
  - id: london_balcony
    name: 伦敦的阳台
    prompt: |
      伦敦的阳台通常很小——茱丽叶阳台、小露台。找一个。您会在那里种什么？谁会使用它？
    follow_ups:
      - 没有了阳台，建筑会怎样？
      - 阳台是如何创造室外空间的？
      - 阳台与公寓之间有什么关系？
  - id: london_chimney
    name: 伦敦的烟囱
    prompt: |
      伦敦的烟囱点缀着屋顶线。数数一座建筑上的烟囱。曾经燃烧过多少火？烟囱是一个遗迹。
    follow_ups:
      - 没有了烟囱，屋顶会是怎样？
      - 烟囱是如何标志历史的？
      - 烟囱与热量之间有什么关系？
  - id: london_bike_stand
    name: 自行车停放架
    prompt: |
      伦敦有自行车停放架、桑坦德自行车、送货自行车。找一簇。自行车是如何塑造街道的？没有它们，街区会是怎样？
    follow_ups:
      - 没有了自行车，街道会是什么样？
      - 自行车是如何创造流动性的？
      - 自行车与城市之间有什么关系？
  - id: london_tree_pit
    name: 树坑
    prompt: |
      伦敦行道树长在树坑里——通常很小，通常在挣扎。找一个。树坑里有什么？树长得怎么样？
    follow_ups:
      - 没有了树，街道会是什么样？
      - 树坑是如何塑造树的生命的？
      - 树坑与人行道之间有什么关系？
  - id: london_rain
    name: 伦敦的雨
    prompt: |
      伦敦雨水充沛。躲在遮蔽处观察。雨水是如何改变街道的？没有它，城市会是怎样？
    follow_ups:
      - 雨水是如何塑造心情的？
      - 雨水与雨伞之间有什么关系？
      - 干燥时您会注意到什么？
  - id: london_cab_rank
    name: 出租车等候点
    prompt: |
      黑色出租车在等候点排队。观察流动。等候点是一个节点。出租车是如何塑造街道的？没有它，交叉口会是怎样？
    follow_ups:
      - 等候点是如何创造秩序的？
      - 出租车与知识之间有什么关系？
      - 您会问出租车司机什么？
  - id: london_pub_window
    name: 酒吧窗户
    prompt: |
      酒吧窗户通常是镶嵌玻璃的，通常很小。透过一个看。风景如何？窗户框住了街道。框架有什么重要性？
    follow_ups:
      - 没有了窗户，酒吧会是怎样？
      - 窗户是如何创造关系的？
      - 窗户与街道之间有什么关系？
  - id: london_mews_cobble
    name: 马厩街的鹅卵石
    prompt: |
      马厩街的巷道通常是鹅卵石铺的。走一条。感受纹理。鹅卵石标志着历史。如果马厩街是沥青铺的，会是怎样？
    follow_ups:
      - 鹅卵石是如何塑造巷道的？
      - 鹅卵石与马之间有什么关系？
      - 走在鹅卵石上会听到什么？
  - id: london_underground_escalator
    name: 地铁自动扶梯
    prompt: |
