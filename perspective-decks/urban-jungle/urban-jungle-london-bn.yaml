    follow_ups:
      - টিউব ছাড়া লন্ডন কেমন হতো?
      - আন্ডারগ্রাউন্ড কীভাবে সংযোগ তৈরি করে?
      - আন্ডারগ্রাউন্ড এবং ভূপৃষ্ঠের মধ্যে সম্পর্ক কী?
  - id: london_thames_edge
    name: টেমস নদীর ধার
