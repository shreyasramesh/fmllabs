# আরবান জাঙ্গল — লন্ডন (Bengali)

id: urban_jungle_london
name: আরবান জাঙ্গল — লন্ডন
description: ৫০টি কার্ড যা লন্ডনকে দেখার নতুন দৃষ্টি দেবে—স্কেল ও আলো থেকে শুরু করে ইতিহাসের স্তর এবং রাস্তার জীবনের ছন্দ পর্যন্ত।
domain: urban_jungle
cards:
  - id: london_layer
    name: লন্ডনের স্তর
    prompt: |
      লন্ডন স্তরে স্তরে নির্মিত—রোমান, মধ্যযুগীয়, ভিক্টোরিয়ান, আধুনিক। এমন একটি
      জায়গা খুঁজুন যেখানে যুগগুলো একে অপরের সাথে সংঘর্ষে লিপ্ত হয়েছে। আপনি সবচেয়ে
      পুরানো কী দেখতে পাচ্ছেন? সবচেয়ে নতুন কোনটি?
    follow_ups:
      - এই স্তরগুলো ছাড়া রাস্তাটি কেমন হতো?
      - নির্মিত কাঠামোয় ইতিহাস কীভাবে প্রতিফলিত হয়?
      - স্তর এবং পরিচয়ের মধ্যে সম্পর্ক কী?
  - id: london_pub_threshold
    name: পাবের প্রবেশদ্বার
    prompt: |
      একটি লন্ডন পাবে একটি প্রবেশদ্বার থাকে—সিঁড়ি, দরজা, বার। প্রবেশদ্বারে দাঁড়ান।
      ভিতরে কী আছে? বাইরে কী আছে? পাবটি শহরের একটি ঘর।
    follow_ups:
      - পাব ছাড়া ব্লকটি কেমন হতো?
      - প্রবেশদ্বার কীভাবে রূপান্তর তৈরি করে?
      - পাব এবং রাস্তার মধ্যে সম্পর্ক কী?
  - id: london_blue_plaque
    name: নীল ফলক
    prompt: |
      নীল ফলকগুলো বিখ্যাত ব্যক্তিদের বাসস্থান চিহ্নিত করে। একটি খুঁজুন। এখানে কে
      থাকতেন? তিনি কী করতেন? ফলকটি ইতিহাসকে দৃশ্যমান করে তোলে।
    follow_ups:
      - ফলক ছাড়া ভবনটি কেমন হতো?
      - ফলক কীভাবে স্মৃতিকে আকার দেয়?
      - ফলক এবং স্থানের মধ্যে সম্পর্ক কী?
  - id: london_underground
    name: আন্ডারগ্রাউন্ড
    prompt: |
      টিউব হলো শহরের নিচে আরেকটি শহর। নিচে নামুন। টাইলস, মানচিত্র, এসকেলেটরগুলো
