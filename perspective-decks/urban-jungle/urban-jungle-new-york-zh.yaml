# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 城市丛林 — 纽约 (Mandarin Chinese)

id: urban_jungle_new_york
name: 城市丛林 — 纽约
description: 50 张卡片，从尺度、光线到历史层次和街头生活节奏，转变你对纽约的看法。
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: 垂直之城
    prompt: |
      向上看。纽约建构在垂直之上——高楼争夺天空。
      沿着一栋建筑，从人行道追踪到楼顶。高度如何改变你的观察？
      你的目光停留在何处？
    follow_ups:
      - 从楼顶看街道会是什么样子？
      - 不同高度的尺度会如何扭曲？
      - 只看向上时，什么东西会被隐藏？
  - id: ny_grid_navigation
    name: 网格导航
    prompt: |
      曼哈顿的网格是无情的。走一个街区，注意编号系统如何塑造
      移动、方向和惊喜。打破网格会发生什么？
    follow_ups:
      - 网格在哪里让人感到压抑？又在哪里让人感到解放？
      - 没有它，这座城市会是什么感觉？
      - 斜向的街道如何改变节奏？
  - id: ny_subway_soundscape
    name: 地铁声景
    prompt: |
      在车站里闭上眼睛。隆隆声、刹车声、广播声、街头艺人的演奏声。
      绘制声景图。当你看不见纽约时，它听起来是什么样的？
    follow_ups:
      - 哪些声音是持续不断的？哪些是偶然出现的？
      - 在这里，沉默意味着什么？
      - 地下的声音如何标记时间？
  - id: ny_fire_escape
    name: 消防通道
    prompt: |
      消防通道是城市的“外骨骼”——实用、有节奏、个人化。
      找一个重复出现消防通道的街区。它们揭示了背后的建筑什么？
      晚上谁可能会在那里坐着？
    follow_ups:
      - 从上面看会看到什么？
      - 它们如何改变街道的特征？
      - 没有它们，这个街区会失去什么？
  - id: ny_street_number
    name: 街道号码
    prompt: |
      选择一个数字——建筑号码、楼层、公交线路。在城市里追踪它。
      出现了什么模式？这个数字在这里意味着什么？
    follow_ups:
      - 这个数字将你引向何处？
      - 另一个数字会揭示什么？
      - 数字如何组织城市体验？
  - id: ny_steam_rising
    name: 蒸汽升腾
    prompt: |
      人行道上的蒸汽是纽约的呼吸。找到它升起的地方，观察它如何
      移动、消散、捕捉光线。下面是什么？城市呼出了什么？
    follow_ups:
      - 格栅下面会发现什么？
      - 天气如何改变蒸汽？
      - 还有哪些隐藏的系统在这里排气？
  - id: ny_storefront_typography
    name: 店面字体
    prompt: |
      读读招牌。小卖部、熟食店、洗衣店——每个都有自己的视觉语言。
      在一个街区收集五种字体。它们说明了这里居住着什么样的人？
    follow_ups:
      - 哪些招牌看起来很旧？哪些很新？
      - 如果招牌会说话，这个街区听起来会是什么样子？
      - 字体如何标记变化？
  - id: ny_waterfront_edge
    name: 水岸边缘
    prompt: |
      走到水边。城市背对着河流、港口、海湾。站在陆地与水相接的地方。
      什么建筑是为了景观而建？什么又是为了忽略它？
    follow_ups:
      - 谁有机会看到水？
      - 边缘是如何被占用的？
      - 如果城市面向水，它会是什么样子？
  - id: ny_parks_as_rooms
    name: 公园如房间
    prompt: |
      中央公园、展望公园、口袋广场——每个都是城市中的一个房间。
      进入一个，注意它的墙壁、天花板、家具。这里的自然是如何设计的？
    follow_ups:
      - 这个房间的目的是什么？
      - 谁设计了视线？
      - 如果墙壁倒塌会发生什么？
  - id: ny_delivery_rhythm
    name: 配送节奏
    prompt: |
      观察配送——卡车、手推车、自行车。追踪一件包裹从卡车到门的路径。
      商业如何在街道中移动？到货的节奏是什么？
    follow_ups:
      - 没有配送，这个街区看起来会是什么样子？
      - 不同的货物如何以不同的方式运输？
      - 在这个流动中，谁是隐形的？
  - id: ny_brownstone_steps
    name: 褐石台阶
    prompt: |
      褐石台阶是舞台。坐在一个上面，观察街道。谁会驻足？谁会经过？
      从这里你会说些什么？
    follow_ups:
      - 从最上面的台阶看出去是什么景色？
      - 台阶如何创造领地？
      - 没有它们，这个街区会失去什么？
  - id: ny_bridge_as_threshold
    name: 桥梁即门槛
    prompt: |
      步行穿过一座桥。感受过渡——一个行政区到另一个行政区。 桥梁不在这里也不在那里。到达另一边时，什么会改变？
    follow_ups:
      - 你留下了什么？
      - 桥梁如何塑造旅程？
      - 没有桥梁，城市会是什么样子？
  - id: ny_awning_shade
    name: 遮阳篷阴影
    prompt: |
      遮阳篷创造微气候。站在一个下面。注意光线、声音、温度的变化。
      小小的结构如何改变街道？
    follow_ups:
      - 没有遮阳篷，这个街区感觉会是什么样子？
      - 它们如何标记所有权？
      - 这里还有哪些小庇护所？
  - id: ny_graffiti_layer
    name: 涂鸦层
    prompt: |
      看看墙壁。标签、壁画、贴纸——每一种都是时间和占有的层。
      读读这层层叠加的痕迹。谁标记了这块表面？
    follow_ups:
      - 你能找到的最古老的标记是什么？
      - 层层叠加如何讲述故事？
      - 如果墙壁会说话，它会说什么？
  - id: ny_rooftop_skyline
    name: 楼顶天际线
    prompt: |
      想象一下从屋顶看出去的景色。水箱、天线、邻近的屋顶。
      从上方看到的城市是另一座城市。你会看到什么？
    follow_ups:
      - 高度如何改变重要的东西？
      - 从街道上隐藏了什么？
      - 谁能看到这种景色？
  - id: ny_crosswalk_wait
    name: 斑马线等待
    prompt: |
      在斑马线处等待。当信号灯改变时不要过马路。等待下一个周期。
      在暂停中，你注意到了什么？还有谁在等待？
    follow_ups:
      - 等待如何改变感知？
      - 什么节奏支配着十字路口？
      - 如果你从未过马路会发生什么？
  - id: ny_diner_booth
    name: 餐车卡座
    prompt: |
      坐在窗边的餐车卡座里。街道变成了一部电影。观察路人、交通、光线。
      正在播放什么故事？
    follow_ups:
      - 主要角色是谁？
      - 框架如何改变你所看到的东西？
      - 没有窗户，你会错过什么？
  - id: ny_scaffolding_skin
    name: 脚手架皮肤
    prompt: |
      脚手架像绷带一样包裹着建筑。在它下面行走。注意声音、光线、临时的天花板。
      什么东西在被修理？什么东西在被隐藏？
    follow_ups:
      - 它在那里多久了？
      - 没有脚手架，建筑会说什么？
      - 修理和隐瞒之间的关系是什么？
  - id: ny_newsstand_archive
    name: 报刊亭档案
    prompt: |
      报刊亭是关注的切片——杂志、报纸、糖果。展示了什么？
      谁会停下来？没有它，这个角落会是什么样子？
    follow_ups:
      - 最畅销的是什么？
      - 报刊亭如何塑造这个街区？
      - 你会在这里放什么？
  - id: ny_construction_site
    name: 建筑工地
    prompt: |
      观察一个建筑工地。起重机、障碍物、工人。城市总是在发展中。
      什么东西正在建造？什么东西正在被取代？
    follow_ups:
      - 完工后谁会使用它？
      - 以前这里有什么？
      - 建设如何改变社区？
  - id: ny_light_well
    name: 光井
    prompt: |
      寻找光井——建筑物之间的狭窄缝隙，光线向下照射。
      谁能获得那束光？那里长出了什么？
    follow_ups:
      - 生活在那样的缝隙里会是什么样子？
      - 光如何定义价值？
      - 阴影中隐藏着什么？
  - id: ny_bodega_cat
    name: 小卖部猫
    prompt: |
      找一家有猫的小卖部。这只猫既在规则之内也在规则之外。
      城市里还有什么以这种方式运作？
    follow_ups:
      - 猫看到了什么？
      - 非正式规则如何塑造空间？
      - 没有猫，商店会是什么样子？
  - id: ny_sidewalk_crack
    name: 人行道裂缝
    prompt: |
      向下看。沿着人行道的裂缝走。它通向哪里？里面长出了什么？
      城市充满了这样的裂痕。
    follow_ups:
      - 人行道会讲述关于时间的故事吗？
      - 小小的破裂有什么意义？
      - 有什么东西在从中突破？
  - id: ny_air_conditioner
    name: 空调
    prompt: |
      数一数一栋建筑上的空调数量。它们是寄生虫，是假肢，
      是必需品。它们如何改变了外墙？它们滴下了什么？
    follow_ups:
      - 没有它们，这栋建筑会是什么样子？
      - 气候如何塑造建筑？
      - 谁决定它们放在哪里？
  - id: ny_express_local
    name: 快车 / 慢车
    prompt: |
      乘坐地铁。注意快车和慢车之间的区别。速度改变了你看到的东西。
      跳过站点，感受城市的压缩。
    follow_ups:
      - 当你不停车时，你错过了什么？
      - 速度如何塑造体验？
      - 如果一切都是慢车，城市会是什么样子？
  - id: ny_water_tower
    name: 水塔
    prompt: |
      水塔是老建筑的顶冠。它们是木制的、桶形的、无处不在的。
      找五个。它们如何描述天际线？
    follow_ups:
      - 为什么它们还在那里？
      - 没有水塔，屋顶会是什么样子？
      - 它们如何标记年龄？
  - id: ny_awning_stripes
    name: 条纹遮阳篷
    prompt: |
      条纹遮阳篷是纽约的特色。找一个重复出现条纹的街区。
      条纹如何创造身份？纯色会有什么效果？
    follow_ups:
      - 为什么是条纹而不是纯色？
      - 遮阳篷如何统一一个街区？
      - 这个图案的历史是什么？
  - id: ny_curb_cut
    name: 路缘坡道
    prompt: |
      注意路缘坡道——角落里的坡道。它们是为轮椅、手推车、婴儿车准备的。
      它们如何改变街道？它们包含了谁？
    follow_ups:
      - 没有它们，这个街区会是什么样子？
      - 便利性如何塑造设计？
      - 还有哪些看不见的便利设施？
  - id: ny_street_tree
    name: 行道树
    prompt: |
      选择一棵行道树。它有多少空间？它的树坑里有什么？
      谁来浇水？这棵树是一个客人。它是如何被对待的？
    follow_ups:
      - 没有树，这个街区会是什么样子？
      - 树木如何标记关怀？
      - 在树的阴影下长出了什么？
  - id: ny_loading_zone
    name: 装卸区
    prompt: |
      装卸区是临时的领地。观察十分钟。谁在使用它？他们停留多久？
      占用的节奏是什么？
    follow_ups:
      - 没有装卸区会发生什么？
      - 规则是如何被打破的？
      - 停车和商业之间的关系是什么？
  - id: ny_vent_grille
    name: 通风口格栅
    prompt: |
      人行道格栅为地铁通风。站在一个上面。感受上升的气流。聆听。
      城市通过这些开口呼吸。
    follow_ups:
      - 从下面升起了什么？
      - 格栅如何连接不同的世界？
      - 没有它，人行道会是什么样子？
  - id: ny_basement_stairs
    name: 地下室楼梯
    prompt: |
      寻找向下的楼梯——通往地下室、地铁、地下酒吧。城市有许多层。
      人行道下面是什么？
    follow_ups:
      - 谁会下去？
      - 下降如何改变光线？
      - 在底部会找到什么？
  - id: ny_clock_tower
    name: 钟楼
    prompt: |
      找一个公共时钟。它准确吗？谁设定的？时钟组织着城市。
      当它们不一致时会发生什么？
    follow_ups:
      - 没有时钟，这个街区会是什么样子？
      - 时间是如何同步的？
      - 时钟时间和身体时间之间的关系是什么？
  - id: ny_newsstand_magazine
    name: 报刊亭杂志
    prompt: |
      在报刊亭，选择一本杂志封面。它是为谁准备的？它对读者有什么假设？
      报刊亭是欲望的镜子。
    follow_ups:
      - 一个陌生人从这个展示中能学到什么？
      - 封面如何竞争注意力？
      - 展台上没有的是什么？
  - id: ny_awning_rain
    name: 遮阳篷雨
    prompt: |
      雨中站在遮阳篷下。看着水从边缘流走。
      遮阳篷创造了一个干燥的岛屿。谁和你一起分享？
    follow_ups:
      - 没有庇护所，这个街区感觉会是什么样子？
      - 雨如何改变街道？
      - 还有哪些庇护所？
  - id: ny_fire_hydrant
    name: 消防栓
    prompt: |
      消防栓是接入城市循环系统的插头。找一个。
      它是什么颜色的？谁可能会打开它？什么东西在里面流动？
    follow_ups:
      - 没有它，这个街区在火灾中会做什么？
      - 消防栓如何标记领地？
      - 消防栓和水管之间的关系是什么？
  - id: ny_stoop_sale
    name: 台阶售物
    prompt: |
      想象一下在这些台阶上进行一次台阶售物。会卖什么？谁会停下？
      台阶是交流的舞台。
    follow_ups:
      - 你会拿出什么来卖？
      - 台阶如何促成偶遇？
      - 这个街区会从一次售物中学到什么？
  - id: ny_rooftop_garden
    name: 屋顶花园
    prompt: |
      想象一下你上方的屋顶花园。会种什么？谁在打理？
      城市有一个秘密的绿色层。
    follow_ups:
      - 你会种什么？
      - 海拔如何改变园艺？
      - 如果所有屋顶都是绿色的，天际线会是什么样子？
  - id: ny_subway_map
    name: 地铁图
    prompt: |
      看看地铁图。它是一个图表，而不是地理。什么被扭曲了？
      什么被遗漏了？地图塑造了我们对城市的想法。
    follow_ups:
      - 一张真实的地图会是什么样子？
      - 地图如何创造社区？
      - 地图和地域之间的关系是什么？
  - id: ny_brick_pattern
    name: 砖墙图案
    prompt: |
      研究一面砖墙。图案——顺砖、叠砌砖——支撑着墙体。
      追踪图案。如果一块砖掉了会发生什么？
    follow_ups:
      - 图案如何分散重量？
      - 墙壁会讲述关于其建造者的什么？
      - 砖块如何老化？
  - id: ny_awning_strip
    name: 遮阳篷条带
    prompt: |
      走一个街区，数一数遮阳篷。什么颜色？什么状况？
      遮阳篷是一种小型建筑。它如何变化？
    follow_ups:
      - 没有遮阳篷，这个街区看起来会是什么样子？
      - 遮阳篷如何创造身份？
      - 遮阳篷和企业之间的关系是什么？
  - id: ny_manhole_cover
    name: 井盖
    prompt: |
      读读井盖。城市的名称、部门、日期。这些圆盘是通往另一座城市的门。
      下面有什么？
    follow_ups:
      - 谁会下去？
      - 井盖如何标记领地？
      - 没有这些门，街道会是什么样子？
  - id: ny_bus_shelter
    name: 公交候车亭
    prompt: |
      在公交候车亭等待。注意还有谁在等待。候车亭是一个共享的房间。
      这里的礼仪是什么？眼前的景象是什么？
    follow_ups:
      - 没有候车亭，等待会是什么样子？
      - 候车亭如何塑造社区？
      - 你会改变它什么？
  - id: ny_street_lamp
    name: 路灯
    prompt: |
      黄昏时站在路灯下。看灯光如何取代太阳。
      路灯创造了一个可见的光圈。光圈里有什么？外面有什么？
    follow_ups:
      - 人工照明如何改变街道？
      - 没有路灯，这个街区会是什么样子？
      - 路灯如何标记时间？
  - id: ny_plaza_seat
    name: 广场座位
    prompt: |
      坐在广场的长椅上。还有谁坐着？谁经过？广场是流动的停顿。
      是什么让人们停下脚步？
    follow_ups:
      - 没有座位，广场会是什么样子？
      - 座位如何塑造相遇？
      - 你会添加什么？
  - id: ny_awning_fabric
    name: 遮阳篷织物
    prompt: |
      如果可以，触摸一下遮阳篷。织物、乙烯基、条纹。遮阳篷是
      内外之间的膜。感觉如何？
    follow_ups:
      - 没有织物，这个街区感觉会是什么样子？
      - 材料如何起作用？
      - 遮阳篷和天气之间的关系是什么？
  - id: ny_newsstand_daily
    name: 报刊亭日常
    prompt: |
      报刊亭一天中会变化——早报、午间杂志、晚间零食。
      在不同时间访问。节奏是什么？
    follow_ups:
      - 没有报刊亭，这个角落会是什么样子？
      - 报刊亭如何标记时间？
      - 报刊亭和街区之间的关系是什么？
  - id: ny_sidewalk_chalk
    name: 人行道粉笔画
    prompt: |
      孩子们在人行道上画画。找到粉笔画。画的是什么？粉笔是
      暂时的。雨水会将其擦掉。暂时的重要性在于什么？
    follow_ups:
      - 没有粉笔画，人行道会是什么样子？
      - 粉笔画如何创造礼物？
      - 粉笔和街道之间的关系是什么？
  - id: ny_rooftop_ac
    name: 屋顶空调
    prompt: |
      夏天，屋顶空调机组嗡嗡作响。听听。屋顶是一个机械森林。
      声音如何塑造这个街区？
    follow_ups:
      - 没有空调机组，屋顶会是什么样子？
      - 空调如何创造舒适？
      - 机组和建筑之间的关系是什么？
  - id: ny_street_musician
    name: 街头乐手
    prompt: |
      一个街头乐手在一个通道里演奏。停下来听听。音乐创造了一个气泡。
      气泡里面有什么？外面有什么？
    follow_ups:
      - 没有乐手，通道会是什么样子？
      - 音乐如何创造暂停？
      - 乐手和街道之间的关系是什么？
