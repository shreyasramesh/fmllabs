# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Городские джунгли — Нью-Йорк (Russian)

id: urban_jungle_new_york
name: Городские джунгли — Нью-Йорк
description: 50 карточек, чтобы изменить ваш взгляд на Нью-Йорк — от масштаба и света до слоев истории и ритмов уличной жизни.
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: Вертикальный город
    prompt: |
      Посмотри вверх. Нью-Йорк строится вертикально — башни, соревнующиеся за небо.
      Проследи за одним зданием от тротуара до его вершины. Как высота меняет то,
      что ты замечаешь? Где останавливается твой взгляд?
    follow_ups:
      - Как бы выглядела улица сверху?
      - Как искажается масштаб на разных высотах?
      - Что скрывается, когда смотришь только вверх?
  - id: ny_grid_navigation
    name: Навигация по сетке
    prompt: |
      Сетка Манхэттена неумолима. Пройди один квартал и заметь, как система нумерации
      формирует движение, ориентацию и сюрпризы. Что происходит, когда ты нарушаешь сетку?
    follow_ups:
      - Где сетка ощущается угнетающей? Где освобождающей?
      - Каким был бы город без нее?
      - Как диагональные улицы меняют ритм?
  - id: ny_subway_soundscape
    name: Звуковой ландшафт метро
    prompt: |
      Закрой глаза на станции. Грохот, тормоза, объявления, уличный музыкант. Составь карту звукового ландшафта. Как звучит Нью-Йорк, когда ты его не видишь?
    follow_ups:
      - Какие звуки постоянны? Какие случайны?
      - Что означала бы тишина здесь?
      - Как звук отмечает время под землей?
  - id: ny_fire_escape
    name: Пожарная лестница
    prompt: |
      Пожарные лестницы — экзоскелет города — функциональные, ритмичные, личные.
      Найди квартал, где они повторяются. Что они раскрывают о зданиях за ними? Кто мог бы сидеть там ночью?
    follow_ups:
      - Что бы ты увидел с нее?
      - Как они меняют характер улицы?
      - Что потерял бы квартал без них?
  - id: ny_street_number
    name: Номер дома
    prompt: |
      Выбери номер — номер здания, этаж, маршрут автобуса. Следуй за ним по городу. Какой узор возникает? Что означает этот номер здесь?
    follow_ups:
      - Куда приведет тебя номер?
      - Что бы раскрыл другой номер?
      - Как номера упорядочивают городской опыт?
  - id: ny_steam_rising
    name: Пар поднимается
    prompt: |
      Пар из люков — это дыхание Нью-Йорка. Найди место, где он поднимается, и наблюдай, как он движется, рассеивается, ловит свет. Что под ним? Что выдыхает город?
    follow_ups:
      - Что ты нашел бы под решеткой?
      - Как погода меняет пар?
      - Какие другие скрытые системы выходят здесь?
  - id: ny_storefront_typography
    name: Типографика витрин
    prompt: |
      Прочитай вывески. Богемы, деликатесы, прачечные — у каждого свой визуальный язык.
      Собери пять шрифтов с одного квартала. Что они говорят о тех, кто здесь живет?
    follow_ups:
      - Какие вывески кажутся старыми? Какие новыми?
      - Как бы звучал квартал, если бы вывески могли говорить?
      - Как типографика отмечает перемены?
  - id: ny_waterfront_edge
    name: Береговая линия
    prompt: |
      Иди к воде. Город отворачивается от реки, гавани, залива. Встань там, где земля встречается с водой. Что построено для вида? Что построено, чтобы игнорировать его?
    follow_ups:
      - Кто может видеть воду?
      - Как была отвоевана береговая линия?
      - Чем был бы город, если бы он был обращен к воде?
  - id: ny_parks_as_rooms
    name: Парки как комнаты
    prompt: |
      Центральный парк, Проспект-парк, маленький сквер — каждый является комнатой в городе.
      Войди в одну и заметь ее стены, потолок, мебель. Как здесь спроектирована природа?
    follow_ups:
      - Каково назначение комнаты?
      - Кто спроектировал линии обзора?
      - Что бы случилось, если бы стены рухнули?
  - id: ny_delivery_rhythm
    name: Ритм доставки
    prompt: |
      Наблюдай за доставками — грузовики, тележки, велосипеды. Проследи путь одной посылки от грузовика до двери. Как коммерция движется по улице? Каков ритм прибытия?
    follow_ups:
      - Как бы выглядел квартал без доставок?
      - Как разные товары перемещаются по-разному?
      - Кто невидим в этом потоке?
  - id: ny_brownstone_steps
    name: Ступени коричневого камня
    prompt: |
      Крыльца из коричневого камня — это сцены. Сядь на одно и наблюдай за улицей. Кто останавливается? Кто проходит мимо? Что бы ты сказал отсюда?
    follow_ups:
      - Какой вид сверху с верхней ступеньки?
      - Как ступени создают территорию?
      - Что потерял бы квартал без них?
  - id: ny_bridge_as_threshold
    name: Мост как порог
    prompt: |
      Перейди мост пешком. Почувствуй переход — из одного района в другой.
      Мост — это ни здесь, ни там. Что меняется, когда ты достигаешь другой стороны?
    follow_ups:
      - Что ты оставляешь позади?
      - Как мост формирует путешествие?
      - Чем был бы город без мостов?
  - id: ny_awning_shade
    name: Тень от навеса
    prompt: |
      Навесы создают микроклиматы. Встань под одним. Заметь изменение света, звука, температуры. Как маленькие конструкции меняют улицу?
    follow_ups:
      - Каким был бы квартал без навесов?
      - Как они отмечают собственность?
      - Какие другие маленькие укрытия существуют здесь?
  - id: ny_graffiti_layer
    name: Слой граффити
    prompt: |
      Посмотри на стены. Теги, муралы, постеры — каждый слой времени и утверждения. Прочитай палимпсест. Кто отметился на этой поверхности?
    follow_ups:
      - Какая самая старая отметка, которую ты можешь найти?
      - Как слои рассказывают историю?
      - Что бы сказала стена, если бы могла говорить?
  - id: ny_rooftop_skyline
    name: Линия горизонта на крышах
    prompt: |
      Представь вид с крыши. Водонапорные башни, антенны, соседние крыши. Город сверху — это другой город. Что бы ты увидел?
    follow_ups:
      - Как высота меняет то, что важно?
      - Что скрыто от улицы?
      - Кто имеет доступ к этому виду?
  - id: ny_crosswalk_wait
    name: Ожидание на пешеходном переходе
    prompt: |
      Подожди на пешеходном переходе. Не переходи, когда загорится зеленый. Подожди следующего цикла. Что ты замечаешь в паузе? Кто еще ждет?
    follow_ups:
      - Как ожидание меняет восприятие?
      - Какие ритмы управляют перекрестком?
      - Что бы случилось, если бы ты никогда не переходил?
  - id: ny_diner_booth
    name: Кабина в закусочной
    prompt: |
      Сядь в кабинку закусочной у окна. Улица становится фильмом. Наблюдай за прохожими, движением, светом. Какая история разыгрывается?
    follow_ups:
      - Кто главные герои?
      - Как рамка меняет то, что ты видишь?
      - Что бы ты упустил без окна?
  - id: ny_scaffolding_skin
    name: Кожа строительных лесов
    prompt: |
      Строительные леса обертывают здания, как бинты. Пройди под ними. Заметь звук, свет, временный потолок. Что ремонтируется? Что скрывается?
    follow_ups:
      - Как долго они там?
      - Что бы сказало здание без них?
      - Каковы отношения между ремонтом и сокрытием?
  - id: ny_newsstand_archive
    name: Архив газетного киоска
    prompt: |
      Газетный киоск — это срез внимания — журналы, газеты, конфеты. Что выставлено на показ? Кто останавливается? Чем был бы этот угол без него?
    follow_ups:
      - Что самое продаваемое?
      - Как киоск формирует квартал?
      - Что бы ты здесь поставил?
  - id: ny_construction_site
    name: Строительная площадка
    prompt: |
      Наблюдай за строительной площадкой. Краны, ограждения, рабочие. Город постоянно меняется. Что строится? Что заменяется?
    follow_ups:
      - Кто будет использовать это, когда закончат?
      - Что было здесь раньше?
      - Как строительство меняет район?
  - id: ny_light_well
    name: Световой колодец
    prompt: |
      Ищи световые колодцы — узкие промежутки между зданиями, куда падает свет. Кому достается этот свет? Что там растет?
    follow_ups:
      - Каково было бы жить в этом колодце?
      - Как свет определяет ценность?
      - Что скрыто в тенях?
  - id: ny_bodega_cat
    name: Кот в бодеге
    prompt: |
      Найди бодегу с котом. Кот одновременно внутри и вне правил. Что еще в городе действует так же?
    follow_ups:
      - Что видит кот?
      - Как неформальные правила формируют пространство?
      - Чем был бы магазин без кота?
  - id: ny_sidewalk_crack
    name: Трещина в тротуаре
    prompt: |
      Посмотри вниз. Следуй за трещиной в тротуаре. Куда она ведет? Что в ней растет? Город полон таких трещин.
    follow_ups:
      - Что бы сказал тротуар о времени?
      - Как важны мелкие разломы?
      - Что пробивается наружу?
  - id: ny_air_conditioner
    name: Кондиционер
    prompt: |
      Посчитай кондиционеры на одном здании. Они — паразиты, протезы,
      необходимости. Как они меняют фасад? Что они капают?
    follow_ups:
      - Как бы выглядело здание без них?
      - Как климат формирует архитектуру?
      - Кто решает, куда они идут?
  - id: ny_express_local
    name: Экспресс / Местный
    prompt: |
      Поезжай в метро. Заметь разницу между экспрессом и местным. Скорость меняет то, что ты видишь. Пропускай станции и чувствуй, как сжимается город.
    follow_ups:
      - Что ты упускаешь, когда не останавливаешься?
      - Как скорость формирует опыт?
      - Чем был бы город, если бы все было местным?
  - id: ny_water_tower
    name: Водонапорная башня
    prompt: |
      Водонапорные башни венчают старые здания. Они деревянные, бочкообразные,
      вездесущие. Найди пять. Что они говорят о линии горизонта?
    follow_ups:
      - Почему они все еще здесь?
      - Как выглядела бы крыша без одной?
      - Как они отмечают возраст?
  - id: ny_awning_stripes
    name: Полосы на навесе
    prompt: |
      Полосатые навесы — это нью-йоркский диалект. Найди квартал, где они
      повторяются. Как полосы создают идентичность? Что сделали бы однотонные цвета?
    follow_ups:
      - Почему полосы, а не однотонные?
      - Как навесы объединяют квартал?
      - Какова история этого узора?
  - id: ny_curb_cut
    name: Спуск с бордюра
    prompt: |
      Заметь спуски с бордюров — пандусы на углах. Они для инвалидных колясок, тележек,
      детских колясок. Как они меняют улицу? Кого они включают?
    follow_ups:
      - Чем был бы квартал без них?
      - Как доступ формирует дизайн?
      - Какие другие невидимые приспособления существуют?
  - id: ny_street_tree
    name: Уличное дерево
    prompt: |
      Выбери одно уличное дерево. Сколько у него места? Что в его яме?
      Кто его поливает? Дерево — гость. Как к нему относятся?
    follow_ups:
      - Чем был бы квартал без деревьев?
      - Как деревья отмечают заботу?
      - Что растет в тени дерева?
  - id: ny_loading_zone
    name: Зона погрузки
    prompt: |
      Зоны погрузки — это временные территории. Наблюдай за одной десять минут. Кто ее использует? Как долго они остаются? Каков ритм занятия?
    follow_ups:
      - Что бы случилось без зон погрузки?
      - Как правила нарушаются?
      - Каковы отношения между парковкой и торговлей?
  - id: ny_vent_grille
    name: Вентиляционная решетка
    prompt: |
      Решетки в тротуаре вентилируют метро. Встань на одну. Почувствуй восходящий поток. Слушай.
      Город дышит через эти отверстия.
    follow_ups:
      - Что поднимается снизу?
      - Как решетка соединяет миры?
      - Чем был бы тротуар без нее?
  - id: ny_basement_stairs
    name: Подвальные ступени
    prompt: |
      Найди ступени, ведущие вниз — в подвал, метро, ​​подпольный бар. Город имеет много уровней. Что находится под тротуаром?
    follow_ups:
      - Кто спускается вниз?
      - Как спуск меняет свет?
      - Что бы ты нашел на дне?
  - id: ny_clock_tower
    name: Часовая башня
    prompt: |
      Найди общественные часы. Они точные? Кто их установил? Часы упорядочивают город.
      Что происходит, когда они расходятся?
    follow_ups:
      - Чем был бы квартал без часов?
      - Как синхронизируется время?
      - Каковы отношения между временем часов и временем тела?
  - id: ny_newsstand_magazine
    name: Журнал в газетном киоске
    prompt: |
      В газетном киоске выбери обложку журнала. Для кого она? Что она предполагает о читателе? Киоск — зеркало желаний.
    follow_ups:
      - Что узнал бы незнакомец из этой витрины?
      - Как обложки конкурируют за внимание?
      - Чего нет на стенде?
  - id: ny_awning_rain
    name: Навес во время дождя
    prompt: |
      Встань под навесом во время дождя. Наблюдай, как вода стекает по краям.
      Навес создает сухой остров. Кто делит его с тобой?
    follow_ups:
      - Каким был бы квартал без укрытия?
      - Как дождь меняет улицу?
      - Какие другие укрытия существуют?
  - id: ny_fire_hydrant
    name: Пожарный гидрант
    prompt: |
      Пожарный гидрант — это подключение к системе кровообращения города. Найди один.
      Какого он цвета? Кто может его открыть? Что течет через него?
    follow_ups:
      - Чем бы занялся квартал при пожаре без него?
      - Как гидранты отмечают территорию?
      - Каковы отношения между гидрантом и шлангом?
  - id: ny_stoop_sale
    name: Распродажа на крыльце
    prompt: |
      Представь себе распродажу на этих ступенях. Что было бы продано? Кто бы остановился? Крыльцо — это сцена для обмена.
    follow_ups:
      - Что бы ты выставил?
      - Как крыльцо способствует встрече?
      - Что бы узнал квартал от распродажи?
  - id: ny_rooftop_garden
    name: Сад на крыше
    prompt: |
      Представь себе сад на крыше над тобой. Что бы там росло? Кто за ним ухаживает?
      У города есть тайный зеленый слой.
    follow_ups:
      - Что бы ты посадил?
      - Как высота меняет садоводство?
      - Как выглядела бы линия горизонта, если бы все крыши были зелеными?
  - id: ny_subway_map
    name: Карта метро
    prompt: |
      Посмотри на карту метро. Это диаграмма, а не география. Что искажено?
      Что опущено? Карта формирует наше представление о городе.
    follow_ups:
      - Как бы выглядела правдивая карта?
      - Как карта создает районы?
      - Каковы отношения между картой и территорией?
  - id: ny_brick_pattern
    name: Кирпичный узор
    prompt: |
      Изучи кирпичную стену. Узор — перевязка, фламандская перевязка — держит стену. Проследи узор. Что бы случилось, если бы один кирпич был удален?
    follow_ups:
      - Как узор распределяет нагрузку?
      - Что бы сказала стена о своем создателе?
      - Как стареет кирпич?
  - id: ny_awning_strip
    name: Полоса навеса
    prompt: |
      Пройди квартал и посчитай навесы. Каких цветов? В каком состоянии? Навес — это маленькая архитектура. Как она варьируется?
    follow_ups:
      - Как бы выглядел квартал без навесов?
      - Как навесы создают идентичность?
      - Каковы отношения между навесом и бизнесом?
  - id: ny_manhole_cover
    name: Крышка люка
    prompt: |
      Прочитай крышку люка. Название города, департамент, дата. Эти диски — двери в другой город. Что находится под ними?
    follow_ups:
      - Кто туда спускается?
      - Как крышка отмечает территорию?
      - Чем была бы улица без этих дверей?
  - id: ny_bus_shelter
    name: Автобусная остановка
    prompt: |
      Подожди на автобусной остановке. Заметь, кто еще ждет. Остановка — это общая комната. Каков этикет? Каков вид?
    follow_ups:
      - Каким было бы ожидание без остановки?
      - Как остановка формирует сообщество?
      - Что бы ты в ней изменил?
  - id: ny_street_lamp
    name: Уличный фонарь
    prompt: |
      Встань под уличным фонарем в сумерках. Наблюдай, как свет вытесняет солнце.
      Фонарь создает круг видимости. Что находится в круге? Что снаружи?
    follow_ups:
      - Как искусственный свет меняет улицу?
      - Чем был бы квартал без фонарей?
      - Как фонари отмечают время?
  - id: ny_plaza_seat
    name: Сиденье на площади
    prompt: |
      Сядь на скамейку на площади. Кто еще сидит? Кто проходит мимо? Площадь — это пауза в потоке. Что заставляет людей останавливаться?
    follow_ups:
      - Чем была бы площадь без сидений?
      - Как сиденья формируют встречу?
      - Что бы ты добавил?
  - id: ny_awning_fabric
    name: Ткань навеса
    prompt: |
      Потрогай навес, если можешь. Ткань, винил, полосы. Навес — это мембрана между внутренним и внешним. Как он ощущается?
    follow_ups:
      - Каким был бы квартал без ткани?
      - Как важен материал?
      - Каковы отношения между навесом и погодой?
  - id: ny_newsstand_daily
    name: Ежедневный газетный киоск
    prompt: |
      Газетный киоск меняется в течение дня — утренние газеты, дневные журналы,
      вечерние закуски. Посети его в разное время. Каков ритм?
    follow_ups:
      - Чем был бы угол без газетного киоска?
      - Как киоск отмечает время?
      - Каковы отношения между киоском и кварталом?
  - id: ny_sidewalk_chalk
    name: Мел на тротуаре
    prompt: |
      Дети рисуют на тротуарах. Найди рисунки мелом. Что нарисовано? Мел временный. Дождь его сотрет. Как важна временность?
    follow_ups:
      - Чем был бы тротуар без мела?
      - Как мел создает дар?
      - Каковы отношения между мелом и улицей?
  - id: ny_rooftop_ac
    name: Кондиционер на крыше
    prompt: |
      Летом гудят кондиционеры на крышах. Слушай. Крыша — это механический лес.
      Как звук формирует квартал?
    follow_ups:
      - Чем была бы крыша без блоков?
      - Как кондиционер создает комфорт?
      - Каковы отношения между блоком и зданием?
  - id: ny_street_musician
    name: Уличный музыкант
    prompt: |
      Уличный музыкант играет в проходе. Остановись и послушай. Музыка создает пузырь. Что внутри пузыря? Что снаружи?
    follow_ups:
      - Чем был бы проход без музыканта?
      - Как музыка создает паузу?
      - Каковы отношения между музыкантом и улицей?
