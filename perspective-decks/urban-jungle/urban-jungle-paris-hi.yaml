# शहरी जंगल — पेरिस (Hindi)

id: urban_jungle_paris
name: शहरी जंगल — पेरिस
description: पेरिस को देखने के तरीके को बदलने के लिए 50 कार्ड — पैमाने और प्रकाश से लेकर इतिहास की परतों और सड़क जीवन की लय तक।
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: बालकनी का फूल
    prompt: |
      पेरिस की बालकनी फूलों से सजी होती हैं—जिरेनियम, पेटूनिया। एक ऐसी इमारत ढूंढें
      जहां हर बालकनी में गमला हो। फूल मुखौटे को कैसे बदलते हैं?
    follow_ups:
      - फूलों के बिना सड़क कैसी होती?
      - फूल पहचान कैसे बनाते हैं?
      - फूल और निवासी के बीच क्या संबंध है?
  - id: paris_haussmann_line
    name: हॉसमैन रेखा
    prompt: |
      हॉसमैन बुलेवार्ड पुराने पेरिस को चीरते हुए जाते हैं। किसी एक पर चलें। रेखा निरंतर है—इमारतें संरेखित, ऊंचाई समान। बुलेवार्ड आवागमन को कैसे आकार देता है?
    follow_ups:
      - हॉसमैन के बिना पेरिस कैसा होता?
      - बुलेवार्ड विस्टा कैसे बनाता है?
      - रेखा और शक्ति के बीच क्या संबंध है?
  - id: paris_cafe_terrace
    name: कैफे टेरेस
    prompt: |
      पेरिस के कैफे टेरेस सड़क की ओर मुख किए होते हैं। एक पर बैठें। आप अंदर और
      बाहर दोनों जगह होते हैं। टेरेस एक दहलीज है। आप क्या देखते हैं?
    follow_ups:
      - टेरेस के बिना सड़क कैसी होती?
      - टेरेस मुलाकातें कैसे बनाता है?
      - टेरेस और सड़क के बीच क्या संबंध है?
  - id: paris_metro_entrance
    name: मेट्रो प्रवेश द्वार
    prompt: |
      आर्ट नोव्यू मेट्रो प्रवेश द्वार प्रतिष्ठित हैं। एक ढूंढें। लोहे का काम,
      अक्षरांकन—प्रवेश द्वार एक पोर्टल है। यह क्या वादा करता है?
    follow_ups:
      - प्रवेश द्वार के बिना सड़क कैसी होती?
      - प्रवेश द्वार पहचान कैसे बनाता है?
      - प्रवेश द्वार और भूमिगत के बीच क्या संबंध है?
  - id: paris_shutter
    name: पेरिस शटर
    prompt: |
      पेरिस के शटर—वोलैट—रात में बंद हो जाते हैं। वे हरे, भूरे, नीले होते हैं।
      एक ऐसी सड़क ढूंढें जहां शटर बंद हों। उनके पीछे क्या है?
    follow_ups:
      - शटर के बिना मुखौटा कैसा होता?
      - शटर गोपनीयता कैसे बनाते हैं?
      - शटर और प्रकाश के बीच क्या संबंध है?
  - id: paris_cobble
    name: पेरिस कोबल
    prompt: |
      पेरिस के कोबलस्टोन—पावे—बने रहते हैं। उन पर चलें। बनावट महसूस करें।
      कोबल एक अन्य पेरिस का अवशेष है। यह सड़क को कैसे आकार देता है?
    follow_ups:
      - कोबलों के बिना सड़क कैसी होती?
      - कोबल इतिहास को कैसे चिह्नित करते हैं?
      - कोबल और क्रांति के बीच क्या संबंध है?
  - id: paris_seine_edge
    name: सीन किनारा
    prompt: |
      सीन पेरिस से होकर बहती है। क्वे पर जाएं। नदी एक सीम है। दोनों ओर क्या है?
      नदी कैसे विभाजित और जोड़ती है?
    follow_ups:
      - सीन के बिना पेरिस कैसा होता?
      - नदी शहर को कैसे आकार देती है?
      - नदी और किनारे के बीच क्या संबंध है?
  - id: paris_roof_zinc
    name: छत जस्ता
    prompt: |
      पेरिस की छतों पर अक्सर जस्ता होता है—भूरा, ढलानदार, डॉर्मर के साथ। ऊपर देखें।
      छत की रेखा विशिष्ट है। यह क्षितिज को कैसे आकार देती है?
    follow_ups:
      - जस्ता के बिना क्षितिज कैसा होता?
      - जस्ता पहचान कैसे बनाता है?
      - छत और अटारी के बीच क्या संबंध है?
  - id: paris_door_height
    name: दरवाजे की ऊंचाई
    prompt: |
      पेरिस के दरवाजे अक्सर लंबे होते हैं—दोहरी ऊंचाई के। एक ढूंढें। इसमें से क्या गुजरेगा?
      दरवाजा पैमाने की एक दहलीज है।
    follow_ups:
      - ऊंचे दरवाजे के बिना इमारत कैसी होती?
      - ऊंचाई भव्यता कैसे बनाती है?
      - दरवाजे और इमारत के बीच क्या संबंध है?
  - id: paris_boulangerie_smell
    name: बेकरी की गंध
    prompt: |
      बेकरी में रोटी की गंध आती है। गंध का पीछा करें। बेकरी एक नोड है।
      गंध ब्लॉक के बारे में क्या कहती है?
    follow_ups:
      - गंध के बिना सड़क कैसी होती?
      - गंध पहचान कैसे बनाती है?
      - गंध और वाणिज्य के बीच क्या संबंध है?
  - id: paris_place
    name: पेरिस प्लेस
    prompt: |
      पेरिस में स्थान हैं—चौक, सर्कल, नोड। एक ढूंढें। ज्यामिति पर ध्यान दें।
      स्थान इसे खिलाने वाली सड़कों को कैसे आकार देता है?
    follow_ups:
      - स्थान के बिना पड़ोस कैसा होता?
      - स्थान फोकस कैसे बनाता है?
      - स्थान और प्रवाह के बीच क्या संबंध है?
  - id: paris_balcony_iron
    name: बालकनी का लोहा
    prompt: |
      पेरिस की बालकनी की रेलिंग अक्सर अलंकृत होती है—कठोर लोहा, वक्र, अलंकरण।
      एक ढूंढें। लोहा मुखौटे को कैसे आकार देता है?
    follow_ups:
      - लोहे के बिना इमारत कैसी होती?
      - लोहा पहचान कैसे बनाता है?
      - लोहे और शिल्प के बीच क्या संबंध है?
  - id: paris_plane_tree
    name: प्लेन पेड़
    prompt: |
      पेरिस के प्लेन पेड़ बुलेवार्ड के किनारे लगे होते हैं। उनकी छाल छिल जाती है।
      एक ढूंढें। पेड़ सड़क को कैसे आकार देता है? उसके बिना बुलेवार्ड कैसा होगा?
    follow_ups:
      - प्लेन के बिना सड़क कैसी होती?
      - प्लेन छाया कैसे बनाता है?
      - पेड़ और बुलेवार्ड के बीच क्या संबंध है?
  - id: paris_metro_tile
    name: मेट्रो टाइल
    prompt: |
      पेरिस मेट्रो स्टेशनों पर सफेद टाइलें होती हैं। सुरंग प्रकाश की एक ट्यूब है।
      एक लाइन पर सवारी करें। टाइल यात्रा को कैसे आकार देती है?
    follow_ups:
      - टाइलों के बिना स्टेशन कैसा होता?
      - टाइलें सफेदी कैसे बनाती हैं?
      - टाइल और भूमिगत के बीच क्या संबंध है?
  - id: paris_clock
    name: पेरिस घड़ी
    prompt: |
      पेरिस में कई सार्वजनिक घड़ियाँ हैं—चर्चों, स्टेशनों, इमारतों पर। एक ढूंढें।
      यह क्या समय बताती है? क्या यह सही है?
    follow_ups:
      - घड़ी के बिना स्थान कैसा होता?
      - घड़ी समय को कैसे आकार देती है?
      - घड़ी और स्थान के बीच क्या संबंध है?
  - id: paris_newsstand
    name: पेरिस न्यूज़स्टैंड
    prompt: |
      पेरिस के कियोस्क अखबार, पत्रिकाएं, मेट्रो टिकट बेचते हैं। एक ढूंढें। क्या प्रदर्शित है?
      कौन रुकता है? कियोस्क एक नोड है।
    follow_ups:
      - कियोस्क के बिना सड़क कैसी होती?
      - कियोस्क मुलाकातें कैसे बनाता है?
      - कियोस्क और सड़क के बीच क्या संबंध है?
  - id: paris_bench
    name: पेरिस बेंच
    prompt: |
      पेरिस में पार्कों में और सीन के किनारे हरी बेंचें हैं। एक पर बैठें। और कौन
      बैठता है? दृश्य क्या है?
    follow_ups:
      - बेंच के बिना स्थान कैसा होता?
      - बेंच आराम कैसे बनाती है?
      - बेंच और नदी के बीच क्या संबंध है?
  - id: paris_boulangerie_queue
    name: बेकरी कतार
    prompt: |
      सुबह की भीड़ में बेकरी की कतार में शामिल हों। कतार एक अनुष्ठान है। लोग
      क्या खरीद रहे हैं? शिष्टाचार क्या है?
    follow_ups:
      - कतार के बिना सड़क कैसी होती?
      - कतार समुदाय कैसे बनाती है?
      - कतार और रोटी के बीच क्या संबंध है?
  - id: paris_manhole
    name: पेरिस मैनहोल
    prompt: |
      पेरिस के मैनहोल कवर पर अक्सर "पेरिस" या "ओ" लिखा होता है। एक ढूंढें। कवर
      शहर की नसों का दरवाजा है। नीचे क्या है?
    follow_ups:
      - कवर के बिना सड़क कैसी होती?
      - कवर प्रणाली को कैसे चिह्नित करता है?
      - कवर और भूमिगत के बीच क्या संबंध है?
  - id: paris_shadow
    name: पेरिस छाया
    prompt: |
      पेरिस का प्रकाश तेज छाया बनाता है। एक ऐसे कोने को ढूंढें जहाँ छाया और धूप
      मिलती हो। छाया सड़क को कैसे आकार देती है?
    follow_ups:
      - छाया के बिना सड़क कैसी होती?
      - छाया कंट्रास्ट कैसे बनाती है?
      - छाया और इमारत के बीच क्या संबंध है?
  - id: paris_courtyard
    name: पेरिस आंगन
    prompt: |
      पेरिस की इमारतों में अक्सर गेट के पीछे आंगन—कोर—छिपे होते हैं। झाँक कर देखें।
      अंदर क्या है? आंगन एक गुप्त कमरा है।
    follow_ups:
      - आंगन के बिना इमारत कैसी होती?
      - आंगन गोपनीयता कैसे बनाता है?
      - आंगन और सड़क के बीच क्या संबंध है?
  - id: paris_bike_lane
    name: पेरिस बाइक लेन
    prompt: |
      पेरिस में बाइक लेन—पिस्ट साइक्लबल—विस्तारित हुई हैं। एक ढूंढें। लेन सड़क को
      कैसे आकार देती है? इसका उपयोग कौन करता है?
    follow_ups:
      - लेन के बिना सड़क कैसी होती?
      - लेन गतिशीलता कैसे बनाती है?
      - लेन और कार के बीच क्या संबंध है?
  - id: paris_fountain
    name: पेरिस फव्वारा
    prompt: |
      पेरिस में फव्वारे हैं—वॉलेस फव्वारे, स्मारकीय फव्वारे। एक ढूंढें। यह क्या
      प्रदान करता है? इसका उपयोग कौन करता है?
    follow_ups:
      - स्थान के बिना फव्वारा कैसा होता?
      - फव्वारा उपहार कैसे बनाता है?
      - फव्वारा और जनता के बीच क्या संबंध है?
  - id: paris_awning
    name: पेरिस कनात
    prompt: |
      पेरिस के कैफे कनात छाया बनाते हैं। एक ऐसी सड़क ढूंढें जहाँ कनातें दोहराई जाती हों।
      वे फुटपाथ को कैसे आकार देते हैं?
    follow_ups:
      - कनातों के बिना सड़क कैसी होती?
      - कनात क्षेत्र कैसे बनाते हैं?
      - कनात और टेरेस के बीच क्या संबंध है?
  - id: paris_lamp_post
    name: पेरिस लैंप पोस्ट
    prompt: |
      पेरिस के लैंप पोस्ट का एक विशेष स्टाइल होता है—अक्सर अलंकृत, अक्सर हरे।
      एक ढूंढें। लैंप रात में सड़क को कैसे आकार देता है?
    follow_ups:
      - लैंप के बिना सड़क कैसी होती?
      - लैंप सुरक्षा कैसे बनाता है?
      - लैंप और अंधेरे के बीच क्या संबंध है?
  - id: paris_door_knocker
    name: दरवाज़ा खटखटाने वाला
    prompt: |
      पेरिस के दरवाजों पर अक्सर खटखटाने वाले होते हैं—शेर के सिर, हाथ, छल्ले।
      एक ढूंढें। इसकी आवाज कैसी होती? खटखटाने वाला एक दहलीज वस्तु है।
    follow_ups:
      - खटखटाने वाले के बिना दरवाजा कैसा होता?
      - खटखटाने वाला ध्वनि कैसे बनाता है?
      - खटखटाने वाला और प्रवेश द्वार के बीच क्या संबंध है?
  - id: paris_shop_sign
    name: पेरिस दुकान संकेत
    prompt: |
      पेरिस के दुकान संकेत अक्सर हाथ से चित्रित होते हैं—बेकरी, कसाई की दुकान, चीज़ की दुकान।
      एक ढूंढें। संकेत दुकान के बारे में क्या कहता है?
    follow_ups:
      - संकेत के बिना सड़क कैसी होती?
      - संकेत पहचान कैसे बनाता है?
      - संकेत और शिल्प के बीच क्या संबंध है?
  - id: paris_parking
    name: पेरिस पार्किंग
    prompt: |
      पेरिस की पार्किंग रचनात्मक होती है—फुटपाथ पर कारें, तिरछी, सघन।
      किसी को पार्क करते देखें। कार कैसे फिट होती है? कार और शहर के बीच क्या संबंध है?
    follow_ups:
      - कारों के बिना सड़क कैसी होती?
      - पार्किंग सड़क को कैसे आकार देती है?
      - पार्किंग और स्थान के बीच क्या संबंध है?
  - id: paris_drain
    name: पेरिस नाली
    prompt: |
      पेरिस के कूड़ेदान किनारे के साथ चलते हैं। बारिश के बाद, वे बहते हैं।
      एक ढूंढें। पानी कहाँ जाता है? नाली एक सीम है।
    follow_ups:
      - नाली के बिना सड़क कैसी होती?
      - नाली पानी का प्रबंधन कैसे करती है?
