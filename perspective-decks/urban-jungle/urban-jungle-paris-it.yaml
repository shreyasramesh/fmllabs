    follow_ups:
      - Cosa sarebbe la strada senza il platano?
      - Come crea il platano ombra?
      - Qual è la relazione tra albero e boulevard?
  - id: paris_metro_tile
    name: Piastrella della Metropolitana
    prompt: |
      Le stazioni della metropolitana di Parigi hanno piastrelle bianche. Il tunnel è
