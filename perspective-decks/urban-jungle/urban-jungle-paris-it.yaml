      - Cosa sarebbe la stazione senza le piastrelle?
      - Come creano le piastrelle pulizia?
      - Qual è la relazione tra piastrella e sotterraneo?
  - id: paris_clock
    name: Orologio Parigino
    prompt: |
      Parigi ha molti orologi pubblici — su chiese, stazioni, edifici. Trovane uno.
