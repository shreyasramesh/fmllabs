    follow_ups:
      - Cosa sarebbe lo spazio senza l'orologio?
      - Come modella l'orologio il tempo?
      - Qual è la relazione tra orologio e luogo?
  - id: paris_newsstand
    name: Edicola Parigina
    prompt: |
      Le edicole parigine — kiosques — vendono giornali, riviste, biglietti della metro. Trovane
