    follow_ups:
      - Cosa sarebbe l'edificio senza il ferro?
      - Come crea il ferro un'identità?
      - Qual è la relazione tra ferro e artigianato?
  - id: paris_plane_tree
    name: Platano Parigino
    prompt: |
      I platani parigini fiancheggiano i boulevard. La loro corteccia si sfalda. Trovane
