# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Giungla Urbana — Parigi (Italian)

id: urban_jungle_paris
name: Giungla Urbana — Parigi
description: 50 carte per cambiare il tuo modo di vedere Parigi — dalla scala e dalla luce agli strati di storia e ai ritmi della vita di strada.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: Fiore sul Balcone
    prompt: |
      I balconi di Parigi fioriscono di fiori — gerani, petunie. Trova un edificio
      dove ogni balcone ha un vaso. Come cambia il fiore la facciata?
    follow_ups:
      - Cosa sarebbe la strada senza i fiori?
      - Come creano i fiori un'identità?
      - Qual è la relazione tra fiore e residente?
  - id: paris_haussmann_line
    name: Linea Haussmanniana
    prompt: |
      I boulevard Haussmanniani tagliano la vecchia Parigi. Percorrine uno. La linea è
      implacabile — edifici allineati, altezze uniformi. Come modella il boulevard il movimento?
    follow_ups:
      - Cosa sarebbe Parigi senza Haussmann?
      - Come crea il boulevard una prospettiva?
      - Qual è la relazione tra linea e potere?
  - id: paris_cafe_terrace
    name: Terrazza di Caffè
    prompt: |
      Le terrazze dei caffè parigini si affacciano sulla strada. Siediti a una. Sei
      sia dentro che fuori. La terrazza è una soglia. Cosa vedi?
    follow_ups:
      - Cosa sarebbe la strada senza la terrazza?
      - Come crea la terrazza un incontro?
      - Qual è la relazione tra terrazza e strada?
  - id: paris_metro_entrance
    name: Ingresso della Metropolitana
    prompt: |
      Gli ingressi della metropolitana Art Nouveau sono icone. Trovane uno. Il
      ferro battuto, le lettere — l'ingresso è un portale. Cosa promette?
    follow_ups:
      - Cosa sarebbe la strada senza l'ingresso?
      - Come crea l'ingresso un'identità?
      - Qual è la relazione tra ingresso e sotterraneo?
  - id: paris_shutter
    name: Scuri di Parigi
    prompt: |
      Gli scuri di Parigi — volets — si chiudono di notte. Sono verdi, grigi, blu. Trova una
      strada dove gli scuri sono chiusi. Cosa c'è dietro di loro?
    follow_ups:
      - Cosa sarebbe la facciata senza gli scuri?
      - Come creano gli scuri privacy?
      - Qual è la relazione tra scuro e luce?
  - id: paris_cobble
    name: Sanpietrini di Parigi
    prompt: |
      I sanpietrini di Parigi — pavés — persistono. Camminaci sopra. Senti la trama. Il
      sanpietrino è una reliquia di un'altra Parigi. Come modella la strada?
    follow_ups:
      - Cosa sarebbe la strada senza i sanpietrini?
      - Come segnano i sanpietrini la storia?
      - Qual è la relazione tra sanpietrino e rivoluzione?
  - id: paris_seine_edge
    name: Margine della Senna
    prompt: |
      La Senna scorre attraverso Parigi. Vai al quai. Il fiume è una cucitura. Cosa c'è
      su entrambi i lati? Come divide e connette il fiume?
    follow_ups:
      - Cosa sarebbe Parigi senza la Senna?
      - Come modella il fiume la città?
      - Qual è la relazione tra fiume e margine?
  - id: paris_roof_zinc
    name: Tetto in Zinco
    prompt: |
      I tetti di Parigi sono spesso in zinco — grigi, inclinati, con abbaini. Guarda in su. La
      linea del tetto è distintiva. Come modella lo skyline?
    follow_ups:
      - Cosa sarebbe lo skyline senza lo zinco?
      - Come crea lo zinco un'identità?
      - Qual è la relazione tra tetto e soffitta?
  - id: paris_door_height
    name: Altezza della Porta
    prompt: |
      Le porte di Parigi sono spesso alte — doppia altezza. Trovane una. Cosa ci passerebbe?
      La porta è una soglia di scala.
    follow_ups:
      - Cosa sarebbe l'edificio senza la porta alta?
      - Come crea l'altezza grandiosità?
      - Qual è la relazione tra porta ed edificio?
  - id: paris_boulangerie_smell
    name: Profumo di Boulangerie
    prompt: |
      Una boulangerie profuma di pane. Segui il profumo. Il panificio è un nodo.
      Cosa dice il profumo del blocco?
    follow_ups:
      - Cosa sarebbe la strada senza il profumo?
      - Come crea il profumo un'identità?
      - Qual è la relazione tra profumo e commercio?
  - id: paris_place
    name: Piazza Parigina
    prompt: |
      Parigi ha piazze — quadrati, cerchi, nodi. Trovane una. Nota la
      geometria. Come modella la piazza le strade che vi confluiscono?
    follow_ups:
      - Cosa sarebbe il quartiere senza la piazza?
      - Come crea la piazza un punto focale?
      - Qual è la relazione tra piazza e flusso?
  - id: paris_balcony_iron
    name: Ferro del Balcone
    prompt: |
      Le ringhiere dei balconi parigini sono spesso ornate — ferro battuto, curve, svolazzi.
