# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 城市丛林 — 旧金山 (Mandarin Chinese)

id: urban_jungle_san_francisco
name: 城市丛林 — 旧金山
description: 50 张卡片，颠覆你对旧金山的看法——从尺度、光线到层叠的历史和街头生活的节奏。
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: 山坡坡度
    prompt: |
      旧金山建在斜坡上。感受脚下的坡度。坡度如何改变你注意到的事物？城市在哪里倾斜？
    follow_ups:
      - 如果街道是平坦的，它会是什么样子？
      - 山坡如何塑造社区？
      - 你爬过的最陡峭的街区是哪一个？
  - id: sf_fog_layer
    name: 雾层
    prompt: |
      雾气弥漫。看着它移动——越过桥梁，掠过山丘。雾是这里的常客。它如何改变光线？声音？
    follow_ups:
      - 没有雾的城市会是什么样子？
      - 雾是如何标记时间的？
      - 雾在哪里停止？
  - id: sf_cable_car_track
    name: 缆车轨道
    prompt: |
      沿着缆车轨道走。路面上的槽，缆车的嗡嗡声。缆车是仍能工作的遗迹。它承载着什么？
    follow_ups:
      - 没有轨道，山坡会是什么样子？
      - 缆车如何塑造旅游业？
      - 轨道和街道之间有什么关系？
  - id: sf_victorian_detail
    name: 维多利亚风格细节
    prompt: |
      旧金山的维多利亚风格建筑装饰华丽——镂空木雕、凸窗、色彩鲜艳。找一栋，仔细看看它的细节。这些装饰讲述了什么故事？
    follow_ups:
      - 没有细节，房子会是什么样子？
      - 颜色如何改变街道？
      - 维多利亚风格和现代风格之间有什么关系？
  - id: sf_painted_lady
    name: 彩绘女士
    prompt: |
      “彩绘女士”名声在外，但每栋维多利亚风格的建筑都有自己的色彩搭配。从一个街区收集五种颜色组合。这些颜色说明了什么？
    follow_ups:
      - 为什么选择这些颜色？
      - 颜料如何保存或改变事物？
      - 如果是灰度图，这个街区看起来会怎么样？
  - id: sf_bay_window
    name: 凸窗
    prompt: |
      凸窗向街道外凸出。它们是为了采光、为了视野、为了展示。站在一扇窗前。从里面你会看到什么？
    follow_ups:
      - 凸窗如何改变房间？
      - 没有凸窗，这面外墙会是什么样子？
      - 凸窗如何与街道建立联系？
  - id: sf_stairway_street
    name: 楼梯街
    prompt: |
      旧金山有一些被当作街道的楼梯——用台阶代替路面。爬一趟。楼梯如何改变社区？
    follow_ups:
      - 谁使用这些楼梯？
      - 没有楼梯，这座山坡会是什么样子？
      - 楼梯如何创造社区？
  - id: sf_mission_mural
    name: 传教区壁画
    prompt: |
      传教区是壁画的画廊。找一幅壁画，读懂它。故事是什么？谁画的？是给谁看的？
    follow_ups:
      - 没有壁画，墙会说什么？
      - 壁画如何占据空间？
      - 壁画和社区之间有什么关系？
  - id: sf_earthquake_retrofit
    name: 抗震加固
    prompt: |
      寻找抗震加固的痕迹——螺栓、支撑、地基。这座城市铭记着1906年和1989年的地震。恐惧如何塑造建筑环境？
    follow_ups:
      - 没有加固，建筑会是什么样子？
      - 抗震设计如何体现？
      - 加固和信任之间有什么关系？
  - id: sf_dolores_palm
    name: 圣多洛雷斯街棕榈树
    prompt: |
      圣多洛雷斯街两旁种植着棕榈树。它们不是本地植物，但却标志鲜明。它们如何体现这座城市与外部的关系？
    follow_ups:
      - 没有棕榈树，街道会是什么样子？
      - 棕榈树如何标记身份？
      - 棕榈树和地点之间有什么关系？
  - id: sf_twin_peaks_view
    name: 双子峰景观
    prompt: |
      想象一下从双子峰看到的景象。城市在脚下延展——网格、水面、桥梁。高度如何改变事物的优先级？
    follow_ups:
      - 从那里你能看到什么？
      - 景观如何塑造城市的形象？
      - 从山顶上隐藏着什么？
  - id: sf_ferry_building
    name: 渡轮大厦
    prompt: |
      渡轮大厦面向海湾。它是界限——陆地与水，城市与通勤。站在它的入口处。有什么在这里流过？
    follow_ups:
      - 没有它，海滨会是什么样子？
      - 建筑如何标记过渡？
      - 渡轮和城市之间有什么关系？
  - id: sf_chinatown_gate
    name: 唐人街牌楼
    prompt: |
      龙门标志着唐人街。穿过它。什么发生了改变？牌楼既是真实的，也是象征性的。它是如何运作的？
    follow_ups:
      - 没有牌楼，唐人街会是什么样子？
      - 牌楼如何创造身份？
      - 牌楼和社区之间有什么关系？
  - id: sf_hydrant_color
    name: 消防栓颜色
    prompt: |
      旧金山的消防栓有不同的颜色——蓝色、绿色、红色。颜色表示水流。找到三种颜色。每种颜色意味着什么？
    follow_ups:
      - 如果发生火灾，街区会做什么？
      - 颜色如何编码信息？
      - 消防栓和系统之间有什么关系？
  - id: sf_parklet
    name: 公园式停车位
    prompt: |
      公园式停车位将停车空间重新用于人行。坐进去。里面有什么家具？谁在使用它？公园式停车位如何改变街区？
    follow_ups:
      - 没有公园式停车位，这个空间会是什么样子？
      - 公园式停车位如何创造相遇？
      - 你会添加什么？
  - id: sf_sf_street_sign
    name: 旧金山街道标志
    prompt: |
      旧金山的街道标志有特殊的风格。注意字体、安装方式、位置。标志如何影响路径导航？
    follow_ups:
      - 没有标志，街区会是什么样子？
      - 字体设计有什么重要性？
      - 标志和身份之间有什么关系？
  - id: sf_castro_rainbow
    name: 卡斯特罗彩虹旗
    prompt: |
      卡斯特罗街飘扬着彩虹旗。走在这条街上数数旗帜。旗帜如何占据空间？它在这里意味着什么？
    follow_ups:
      - 没有旗帜，这个社区会是什么样子？
      - 旗帜如何创造社区？
      - 旗帜和地点之间有什么关系？
  - id: sf_haight_vintage
    name: 海特街复古风
    prompt: |
      海特街是20世纪60年代的博物馆。找一栋没有改变的建筑。什么被保存了下来？什么是表演？
    follow_ups:
      - 没有复古风，这条街会是什么样子？
      - 历史如何塑造商业？
      - 过去和现在之间有什么关系？
  - id: sf_sutro_tower
    name: 萨特罗塔
    prompt: |
      萨特罗塔随处可见。把它当作指南针。这座塔如何为你指明方向？没有它，天际线会是什么样子？
    follow_ups:
      - 这座塔广播什么？
      - 这座塔如何塑造身份？
      - 塔和景观之间有什么关系？
  - id: sf_bart_underground
    name: BART 地下隧道
    prompt: |
      乘坐 BART 穿过海湾。你在水下的隧道里。感受压力，黑暗，然后出现。隧道如何改变旅程？
    follow_ups:
      - 没有隧道，通勤会是什么样子？
      - 海湾是如何分隔的？
      - 隧道和地区之间有什么关系？
  - id: sf_taquería_line
    name: 墨西哥卷饼店排队
    prompt: |
      午夜时分加入墨西哥卷饼店的队伍。排队是一种仪式。里面的人是谁？他们在点什么？队伍就是社区。
    follow_ups:
      - 没有墨西哥卷饼店，街区会是什么样子？
      - 排队如何创造相遇？
      - 食物和地点之间有什么关系？
  - id: sf_dolores_sun
    name: 圣多洛雷斯公园的阳光
    prompt: |
      圣多洛雷斯公园朝西。晴天的时候，它就像一个海滩。观察人群。阳光如何塑造公园？谁能获得最佳位置？
    follow_ups:
      - 没有阳光，公园会是什么样子？
      - 方位有多重要？
      - 公园和天气之间有什么关系？
  - id: sf_mission_door
    name: 传教区门
    prompt: |
      传教区的门通常装饰华丽——雕刻、彩绘、独一无二。在一个街区找到五扇门。它们如何反映后面的建筑？
    follow_ups:
      - 没有门，街区会是什么样子？
      - 门如何创造身份？
      - 门和门槛之间有什么关系？
  - id: sf_coit_tower
    name: 科伊特塔
    prompt: |
      科伊特塔坐落在电报山顶。它是一座纪念碑，一个观景点，一个地标。
      这座塔如何塑造山丘？没有它，山丘会是什么样子？
    follow_ups:
      - 这座塔纪念什么？
      - 这座塔如何为城市定位？
      - 塔和社区之间有什么关系？
  - id: sf_lombard_curve
    name: 伦巴第街弯道
    prompt: |
      伦巴第街沿着山坡蜿蜒而下。以其之字形弯道而闻名。走一走。弯道如何改变下降过程？笔直的街道会怎么样？
    follow_ups:
      - 没有弯道，这座山坡会是什么样子？
      - 弯道如何塑造体验？
      - 弯道和安全之间有什么关系？
  - id: sf_alcatraz_silhouette
    name: 恶魔岛剪影
    prompt: |
      从海滨看，恶魔岛只是一个剪影。这座岛屿始终存在，始终遥远。它对这座城市意味着什么？
    follow_ups:
      - 没有岛屿，海湾会是什么样子？
      - 岛屿如何塑造景观？
      - 监狱和城市之间有什么关系？
  - id: sf_ghost_sign
    name: 褪色广告牌
    prompt: |
      褪色广告牌——砖墙上的褪色广告——标记着过去。找一个。它宣传的是什么？谁会看到它？
    follow_ups:
      - 没有广告牌，墙会说什么？
      - 褪色广告牌如何保存历史？
      - 广告牌和商业之间有什么关系？
  - id: sf_sf_sidewalk
    name: 旧金山人行道
    prompt: |
      旧金山的人行道常常布满裂缝、倾斜、被树根拱起。走一个街区，注意它的质地。人行道是如何老化的？
    follow_ups:
      - 没有人行道，街区会是什么样子？
      - 人行道如何影响通行？
      - 人行道和树木之间有什么关系？
  - id: sf_golden_gate_fog
    name: 金门大桥的雾
    prompt: |
      金门大桥在雾中消失。看着它消失又出现。雾是一层帷幕。它后面是什么？
    follow_ups:
      - 没有雾，桥会是什么样子？
      - 雾如何塑造景观？
      - 雾和桥之间有什么关系？
  - id: sf_mission_dolores
    name: 圣多洛雷斯传教区
    prompt: |
      圣多洛雷斯传教区是这座城市最古老的建筑。站在它前面。它看到了什么？它如何标记时间？
    follow_ups:
      - 没有传教区，社区会是什么样子？
      - 传教区如何塑造身份？
      - 传教区和城市之间有什么关系？
  - id: sf_painted_steps
    name: 彩绘台阶
    prompt: |
      第16大道瓷砖台阶是一个马赛克。爬上去。每个台阶都不同。艺术如何改变攀登过程？
    follow_ups:
      - 没有瓷砖，台阶会是什么样子？
      - 马赛克如何创造社区？
      - 艺术和攀登之间有什么关系？
  - id: sf_sf_street_tree
    name: 旧金山行道树
    prompt: |
      旧金山的行道树通常是棕榈树、木兰树或榕树。找一棵并识别它。树木如何塑造街区？
    follow_ups:
      - 没有树，街区会是什么样子？
      - 树木如何创造栖息地？
      - 树木和人行道之间有什么关系？
  - id: sf_sf_bay_window
    name: 旧金山凸窗
    prompt: |
      凸窗是旧金山的特色建筑。它们向外凸出，捕捉光线。凸窗如何改变房间？
    follow_ups:
      - 没有凸窗，这面外墙会是什么样子？
      - 凸窗如何与街道建立联系？
      - 凸窗和视野之间有什么关系？
  - id: sf_sf_hill
    name: 旧金山山丘
    prompt: |
      选一座山丘爬上去。感受爬坡的燃烧感。在山顶，回头看。爬坡如何改变你的视野？
    follow_ups:
      - 没有山丘，城市会是什么样子？
      - 山丘如何塑造社区？
      - 山丘和景观之间有什么关系？
  - id: sf_sf_fog
    name: 旧金山雾
    prompt: |
      雾有一个名字——卡尔。它是当地的明星。当卡尔来袭时，城市如何改变？什么被隐藏了？什么被揭示了？
    follow_ups:
      - 没有卡尔，城市会是什么样子？
      - 雾如何塑造身份？
      - 雾和光线之间有什么关系？
  - id: sf_sf_cable
    name: 旧金山缆车
    prompt: |
      缆车在街道下方的缆线上运行。你看不到它，但你能听到它。隐藏的缆线如何塑造可见的城市？
    follow_ups:
      - 没有缆线，山坡会是什么样子？
      - 缆线如何创造联系？
      - 缆线和街道之间有什么关系？
  - id: sf_sf_victorian
    name: 旧金山维多利亚风格建筑
    prompt: |
      维多利亚风格的建筑通常成对出现——两栋房子，一块地。找一对。它们如何相互关联？没有对方，一栋房子会是什么样子？
    follow_ups:
      - 没有一对，街区会是什么样子？
      - 一对如何创造节奏？
      - 一对和地块之间有什么关系？
  - id: sf_sf_mission
    name: 旧金山传教区
    prompt: |
      传教区以圣多洛雷斯传教区命名。走在这条街上，感受层叠的文化——西班牙、墨西哥、爱尔兰、中美洲。这是什么叠加？
    follow_ups:
      - 没有这些层叠的文化，社区会是什么样子？
      - 传教区如何塑造身份？
      - 传教区和移民之间有什么关系？
  - id: sf_sf_bridge
    name: 旧金山桥梁
    prompt: |
      湾区大桥不像金门大桥那样有名，但使用率更高。穿过它或观看它。桥梁如何连接？它承载着什么？
    follow_ups:
      - 没有桥梁，海湾会是什么样子？
      - 桥梁如何塑造地区？
      - 桥梁和通勤之间有什么关系？
  - id: sf_sf_parks
    name: 旧金山公园
    prompt: |
      旧金山有许多小型公园——口袋公园、三角形公园。找一个。谁在使用它？它的特点是什么？
    follow_ups:
      - 没有公园，社区会是什么样子？
      - 公园如何创造休憩？
      - 公园和街区之间有什么关系？
  - id: sf_sf_stairs
    name: 旧金山楼梯
    prompt: |
      旧金山有超过600个公共楼梯。找一个你从未爬过的。上面有什么？下面有什么？
    follow_ups:
      - 没有楼梯，这座山坡会是什么样子？
      - 楼梯如何创造捷径？
      - 楼梯和社区之间有什么关系？
  - id: sf_sf_mural
    name: 旧金山壁画
    prompt: |
      传教区的壁画密度在美国首屈一指。找一幅讲述故事的壁画。叙事是什么？它是为谁而作？
    follow_ups:
      - 没有壁画，墙会说什么？
      - 壁画如何占据空间？
      - 壁画和社区之间有什么关系？
  - id: sf_sf_water
    name: 旧金山水域
    prompt: |
      旧金山被水环绕——海湾、海洋、海峡。走到边缘。水对这座城市意味着什么？它如何塑造海岸线？
    follow_ups:
      - 没有水，城市会是什么样子？
      - 水如何塑造身份？
      - 水和城市之间有什么关系？
  - id: sf_sf_sunset
    name: 旧金山日落
    prompt: |
      旧金山的日落很有名。从山上观看日落。光线改变了这座城市。没有日落，景色会是什么样子？
    follow_ups:
      - 日落如何塑造夜晚？
      - 日落和景观之间有什么关系？
      - 没有阳光，你会错过什么？
  - id: sf_sf_wind
    name: 旧金山风
    prompt: |
      在某些街区，旧金山的风是持续不断的。感受它。风如何塑造街道？没有风，街区会是什么样子？
    follow_ups:
      - 风如何创造微气候？
      - 风和建筑之间有什么关系？
      - 在这样的风里你会种什么？
  - id: sf_sf_earthquake
    name: 旧金山地震
    prompt: |
      旧金山位于断层带上。地面会移动。这种认知如何塑造建筑环境？在震动中你会注意到什么？
    follow_ups:
      - 地震风险如何塑造设计？
      - 断层和城市之间有什么关系？
      - 如果地面摇晃，你会怎么做？
  - id: sf_sf_tech_bus
    name: 科技班车
    prompt: |
      科技班车接送员工前往硅谷。观察一辆班车停靠。班车是一个符号。它载着什么？它排斥什么？
    follow_ups:
      - 没有班车，街道会是什么样子？
      - 班车如何塑造社区？
      - 班车和城市之间有什么关系？
  - id: sf_sf_painted_lady
    name: 旧金山彩绘女士
    prompt: |
