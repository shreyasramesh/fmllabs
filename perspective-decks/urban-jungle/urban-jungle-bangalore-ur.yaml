      جمع ہوتا ہے؟ تال کیا ہے؟ اسٹال ایک سماجی مشین ہے۔
    follow_ups:
      - اسٹال کے بغیر کونہ کیسا ہوگا؟
      - اسٹال کس طرح ملاقات پیدا کرتا ہے؟
      - اسٹال اور سڑک کے درمیان کیا تعلق ہے؟
