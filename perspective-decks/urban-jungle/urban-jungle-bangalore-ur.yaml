# اربن جنگل — بنگلور (Urdu)

id: urban_jungle_bangalore
name: اربن جنگل — بنگلور
description: |
  بنگلور کو دیکھنے کے انداز کو بدلنے کے لیے 50 کارڈز — پیمانے اور روشنی سے لے کر تاریخ کی تہوں اور سڑکوں کی زندگی کی تال تک۔
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: گیٹ کالونی
    prompt: |
      بنگلور کی گیٹ کالونیوں میں دیواریں، محافظ، دروازے ہوتے ہیں۔ ایک دروازے پر کھڑے ہوں۔ اندر کیا ہے؟ کون داخل ہوتا ہے؟ دروازہ ایک حد بندی کی نشاندہی کرتا ہے۔ یہ کس چیز کی حفاظت کرتا ہے؟
    follow_ups:
      - دروازے کے بغیر سڑک کیسی ہوگی؟
      - دروازہ کس طرح تحفظ پیدا کرتا ہے؟
      - دروازے اور کالونی کے درمیان کیا تعلق ہے؟
  - id: blr_tree_canopy
    name: درخت کا سایہ
    prompt: |
      بنگلور کبھی ایک باغ شہر تھا۔ اب بھی پرانے درخت کچھ سڑکوں پر سایہ کرتے
      ہیں۔
      ایک کے نیچے چلیں۔ سایہ روشنی کو کیسے بدلتا ہے؟ آواز کو؟
    follow_ups:
      - درخت کے بغیر سڑک کیسی ہوگی؟
      - سایہ کس طرح مائیکرو کلائمیٹ بناتا ہے؟
      - درخت اور شہر کے درمیان کیا تعلق ہے؟
  - id: blr_tech_park
    name: ٹیک پارک
    prompt: |
      ٹیک پارکس کیمپس ہوتے ہیں — شیشہ، لان، شٹل بسیں۔ ایک تلاش کریں۔ یہ پارک شہر سے کس طرح الگ ہوتا ہے؟ اندر اور باہر کے درمیان کیا تعلق ہے؟
    follow_ups:
      - پارک کے بغیر علاقہ کیسا ہوگا؟
      - پارک کس طرح شناخت بناتا ہے؟
      - پارک اور سڑک کے درمیان کیا تعلق ہے؟
  - id: blr_auto_rickshaw
    name: آٹو رکشہ
    prompt: |
      آٹو رکشے ٹریفک میں چلتے ہیں۔ ایک کو چوراہے پر نیویگیٹ کرتے دیکھیں. کاریں
      جہاں فٹ نہیں ہوتیں، آٹو وہاں کیسے فٹ ہوتا ہے؟ لہر کا منطق کیا ہے؟
    follow_ups:
      - آٹو کے بغیر سڑک کیسی ہوگی؟
      - آٹو کس طرح نقل و حرکت پیدا کرتا ہے؟
      - آٹو اور ٹریفک کے درمیان کیا تعلق ہے؟
