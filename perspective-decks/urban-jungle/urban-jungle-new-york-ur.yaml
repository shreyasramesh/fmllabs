# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# شہری جنگل — نیو یارک (Urdu)

id: urban_jungle_new_york
name: شہری جنگل — نیو یارک
description: 50 کارڈز نیو یارک کو دیکھنے کا انداز بدلنے کے لیے—پیمانے اور روشنی سے لے کر تاریخ کی تہوں اور گلی کی زندگی کی دھڑکنوں تک۔
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: عمودی شہر
    prompt: |
      اوپر دیکھو۔ نیو یارک عمودی پر بنایا گیا ہے—برج آسمان کے لیے مقابلہ کرتے ہیں۔
      ایک عمارت کا سڑک سے لے کر اوپری حصے تک تعاقب کرو۔ اونچائی کیا بدلتی ہے جو
      آپ کو نظر آتا ہے؟ آپ کی نظر کہاں ٹھہرتی ہے؟
    follow_ups:
      - اوپر سے سڑک کیسی نظر آئے گی؟
      - مختلف اونچائیوں پر پیمانہ کیسے مسخ ہوتا ہے؟
      - جب آپ صرف اوپر دیکھتے ہیں تو کیا چھپ جاتا ہے؟
  - id: ny_grid_navigation
    name: گرڈ نیویگیشن
    prompt: |
      مین ہٹن کا گرڈ بے رحم ہے۔ ایک بلاک پر چلو اور نوٹس لو کہ نمبرنگ کا نظام
      حرکت، سمت اور حیرت کو کیسے شکل دیتا ہے۔ جب آپ گرڈ کو توڑتے ہیں تو کیا ہوتا ہے؟
    follow_ups:
      - گرڈ کہاں دباؤ والا محسوس ہوتا ہے؟ کہاں آزاد خیال؟
      - اس کے بغیر شہر کیسا محسوس ہوگا؟
      - ترچھے راستے تال کو کیسے بدلتے ہیں؟
  - id: ny_subway_soundscape
    name: سب وے ساؤنڈ سکیپ
    prompt: |
      ایک اسٹیشن میں آنکھیں بند کر لیں۔ گرج، بریک، اعلانات، بسکر۔ آواز کے منظر کا نقشہ بنائیں۔
      جب آپ اسے دیکھ نہیں سکتے تو نیو یارک کیسا آواز دیتا ہے؟
    follow_ups:
      - کون سی آوازیں مستقل ہیں؟ کون سی حادثاتی؟
      - یہاں خاموشی کا کیا مطلب ہوگا؟
      - آواز زیر زمین وقت کو کیسے نشان زد کرتی ہے؟
  - id: ny_fire_escape
    name: فائر ایسکیپ
    prompt: |
      فائر ایسکیپس شہر کا باہر کا ڈھانچہ ہیں—عملی، تال دار، ذاتی۔
      ایک بلاک تلاش کریں جہاں وہ دہرائے جاتے ہیں۔ وہ ان کے پیچھے عمارتوں کے بارے میں کیا ظاہر کرتے ہیں؟
      رات کو وہاں کون بیٹھ سکتا ہے؟
    follow_ups:
      - وہاں سے کیا نظر آئے گا؟
      - وہ سڑک کے کردار کو کیسے بدلتے ہیں؟
      - ان کے بغیر بلاک کیا کھو دے گا؟
  - id: ny_street_number
    name: گلی کا نمبر
    prompt: |
      ایک نمبر منتخب کریں—عمارت نمبر، منزل، بس روٹ۔ اسے شہر میں فالو کریں۔
      کون سا پیٹرن ابھرتا ہے؟ اس نمبر کا یہاں کیا مطلب ہے؟
    follow_ups:
      - نمبر آپ کو کہاں لے جاتا ہے؟
      - ایک مختلف نمبر کیا ظاہر کرے گا؟
      - نمبر شہری تجربے کو کیسے ترتیب دیتے ہیں؟
  - id: ny_steam_rising
    name: اٹھتا ہوا دھواں
    prompt: |
      مین ہول کا دھواں نیو یارک کی سانس ہے۔ جہاں سے یہ اٹھتا ہے اسے تلاش کریں اور دیکھیں کہ یہ کیسے
      حرکت کرتا ہے، منتشر ہوتا ہے، روشنی پکڑتا ہے۔ نیچے کیا ہے؟ شہر کیا باہر نکالتا ہے؟
    follow_ups:
      - گرٹ کے نیچے کیا ملے گا؟
      - موسم دھوئیں کو کیسے بدلتا ہے؟
      - یہاں کون سے دوسرے پوشیدہ نظام وینٹ کرتے ہیں؟
  - id: ny_storefront_typography
    name: دکان کا ٹائپوگرافی
    prompt: |
      سائن بورڈ پڑھیں۔ بوڈیگاس، ڈیلیز، لانڈرومیٹ—ہر ایک کی اپنی بصری زبان ہے۔
      ایک بلاک سے پانچ ٹائپ فیس جمع کریں۔ وہ یہاں رہنے والوں کے بارے میں کیا کہتے ہیں؟
    follow_ups:
      - کون سے سائن پرانے محسوس ہوتے ہیں؟ کون سے نئے؟
      - اگر سائن بول سکتے تو بلاک کیسا آواز دیتا؟
      - ٹائپوگرافی تبدیلی کو کیسے نشان زد کرتی ہے؟
  - id: ny_waterfront_edge
    name: واٹر فرنٹ ایج
    prompt: |
      پانی تک جاؤ۔ شہر دریا، بندرگاہ، خلیج کی طرف اپنی پیٹھ موڑتا ہے۔
      وہاں کھڑے ہوں جہاں زمین پانی سے ملتی ہے۔ نظارے کے لیے کیا بنایا گیا ہے؟ اسے نظر انداز کرنے کے لیے کیا بنایا گیا ہے؟
    follow_ups:
      - پانی دیکھنے کا حق کسے ہے؟
      - کنارے پر کیسے دعویٰ کیا گیا ہے؟
      - اگر شہر پانی کی طرف رخ کرتا تو وہ کیسا ہوتا؟
  - id: ny_parks_as_rooms
    name: پارک کمروں کی طرح
    prompt: |
      سنٹرل پارک، پراسپیکٹ پارک، ایک چھوٹا پلازہ—ہر ایک شہر کا ایک کمرہ ہے۔
      ایک میں داخل ہوں اور اس کی دیواروں، اس کی چھت، اس کے فرنیچر کو نوٹس کریں۔ یہاں فطرت کو کیسے ڈیزائن کیا گیا ہے؟
    follow_ups:
      - کمرے کا مقصد کیا ہے؟
      - سائٹ لائنیں کس نے ڈیزائن کیں؟
      - اگر دیواریں گر جائیں تو کیا ہوگا؟
  - id: ny_delivery_rhythm
    name: ڈیلیوری کا تال
    prompt: |
      ڈیلیوری دیکھو—ٹرک، ہینڈ کارٹ، بائیک۔ ایک پیکج کے راستے کا ٹرک سے دروازے تک تعاقب کرو۔
      کامرس گلی میں کیسے چلتا ہے؟ آمد کا تال کیا ہے؟
    follow_ups:
      - ڈیلیوری کے بغیر بلاک کیسا نظر آئے گا؟
      - مختلف سامان مختلف طریقے سے کیسے چلتے ہیں؟
      - اس بہاؤ میں کون پوشیدہ ہے؟
  - id: ny_brownstone_steps
    name: براؤن اسٹون سیڑھی
    prompt: |
      براؤن اسٹون کی سیڑھیاں اسٹیج ہیں۔ ان میں سے ایک پر بیٹھو اور سڑک دیکھو۔ کون
      ٹھہرتا ہے؟ کون گزرتا ہے؟ یہاں سے آپ کیا کہیں گے؟
    follow_ups:
      - سب سے اوپر کی سیڑھی سے نظارہ کیا ہے؟
      - سیڑھیاں علاقہ کیسے بناتی ہیں؟
      - ان کے بغیر بلاک کیا کھو دے گا؟
  - id: ny_bridge_as_threshold
    name: پل حد بندی کی طرح
    prompt: |
      ذاتی طور پر پل پار کرو۔ تبدیلی محسوس کرو—ایک بورو سے دوسرے تک۔
      پل نہ یہاں کا ہے نہ وہاں کا۔ دوسری طرف پہنچنے پر کیا بدلتا ہے؟
    follow_ups:
      - آپ کیا پیچھے چھوڑتے ہیں؟
      - پل سفر کو کیسے شکل دیتا ہے؟
      - پل کے بغیر شہر کیا ہوگا؟
  - id: ny_awning_shade
    name: چھتری کا سایہ
    prompt: |
      چھتریاں مائیکرو آب و ہوا بناتی ہیں۔ ان کے نیچے کھڑے ہو۔ روشنی، آواز، درجہ حرارت میں تبدیلی کو نوٹس کریں۔
      چھوٹی ساختیں سڑک کو کیسے بدلتی ہیں؟
    follow_ups:
      - چھتریوں کے بغیر بلاک کیسا محسوس ہوگا؟
      - وہ ملکیت کو کیسے نشان زد کرتے ہیں؟
      - یہاں اور کون سے چھوٹے پناہ گاہیں موجود ہیں؟
  - id: ny_graffiti_layer
    name: گرافٹی لیئر
    prompt: |
      دیواروں کو دیکھو۔ ٹیگز، مرل، وہائٹ پیسٹ—ہر ایک وقت اور دعوے کی ایک تہہ ہے۔
      پالیمپسیسٹ کو پڑھو۔ اس سطح پر کس نے نشان لگایا ہے؟
    follow_ups:
      - سب سے پرانا نشان جو آپ کو مل سکتا ہے وہ کیا ہے؟
      - تہہ کیسے کہانی سناتی ہیں؟
      - اگر دیوار بول سکتی تو وہ کیا کہتی؟
  - id: ny_rooftop_skyline
    name: چھت کا اسکائی لائن
    prompt: |
      ایک چھت سے منظر کا تصور کریں۔ پانی کے ٹینک، اینٹینا، پڑوسی چھتیں۔
      اوپر سے شہر ایک مختلف شہر ہے۔ آپ کیا دیکھیں گے؟
    follow_ups:
      - اونچائی کیا اہم ہے اسے کیسے بدلتی ہے؟
      - گلی سے کیا چھپا ہوا ہے؟
      - اس منظر تک رسائی کس کو ہے؟
  - id: ny_crosswalk_wait
    name: کراس واک کا انتظار
    prompt: |
      کراس واک پر انتظار کریں۔ جب لائٹ بدلے تو پار نہ کریں۔
      اگلے سائیکل کا انتظار کریں۔ توقف میں آپ کیا نوٹس کرتے ہیں؟ اور کون انتظار کرتا ہے؟
    follow_ups:
      - انتظار ادراک کو کیسے بدلتا ہے؟
      - چوراہے پر کون سے تال حکمرانی کرتے ہیں؟
      - اگر آپ کبھی پار نہ کرتے تو کیا ہوتا؟
  - id: ny_diner_booth
    name: ڈنر بوتھ
    prompt: |
      کھڑکی کے پاس ایک ڈنر بوتھ میں بیٹھیں۔ سڑک ایک فلم بن جاتی ہے۔
      گزرنے والوں، ٹریفک، روشنی کو دیکھیں۔ کون سی کہانی چل رہی ہے؟
    follow_ups:
      - مرکزی کردار کون ہیں؟
      - فریم آپ کو جو دکھاتا ہے اسے کیسے بدلتا ہے؟
      - کھڑکی کے بغیر آپ کیا کھو دیں گے؟
  - id: ny_scaffolding_skin
    name: سکیفولڈنگ اسکن
    prompt: |
      سکیفولڈنگ عمارتوں کو بینڈیج کی طرح لپیٹتا ہے۔ اس کے نیچے چلیں۔ آواز، روشنی، عارضی چھت کو نوٹس کریں۔
      کیا ٹھیک کیا جا رہا ہے؟ کیا چھپایا جا رہا ہے؟
    follow_ups:
      - یہ کتنی دیر سے ہے؟
      - اس کے بغیر عمارت کیا کہتی؟
      - مرمت اور چھپانے کے درمیان کیا تعلق ہے؟
  - id: ny_newsstand_archive
    name: نیوز اسٹینڈ آرکائیو
    prompt: |
      ایک نیوز اسٹینڈ توجہ کا ایک ٹکڑا ہے—میگزین، اخبارات، کینڈی۔ کیا دکھایا گیا ہے؟
      کون رکتا ہے؟ اس کے بغیر یہ کونہ کیا ہوگا؟
    follow_ups:
      - بیسٹ سیلر کیا ہے؟
      - اسٹینڈ بلاک کو کیسے شکل دیتا ہے؟
      - آپ یہاں کیا رکھیں گے؟
  - id: ny_construction_site
    name: تعمیراتی سائٹ
    prompt: |
      تعمیراتی سائٹ دیکھیں۔ کرینیں، رکاوٹیں، کارکن۔ شہر ہمیشہ بن رہا ہے۔
      کیا تعمیر کیا جا رہا ہے؟ کیا تبدیل کیا جا رہا ہے؟
    follow_ups:
      - مکمل ہونے پر کون اسے استعمال کرے گا؟
      - اس سے پہلے یہاں کیا تھا؟
      - تعمیر محلے کو کیسے بدلتی ہے؟
  - id: ny_light_well
    name: لائٹ ویل
    prompt: |
      لائٹ ویلز کی تلاش کریں—عمارتوں کے درمیان تنگ جگہیں جہاں روشنی نیچے گرتی ہے۔
      یہ روشنی کس کو ملتی ہے؟ وہاں کیا اگتا ہے؟
    follow_ups:
      - اس شافٹ میں رہنا کیسا ہوگا؟
      - روشنی قدر کو کیسے متعین کرتی ہے؟
      - سائے میں کیا چھپا ہوا ہے؟
  - id: ny_bodega_cat
    name: بوڈیگا کیٹ
    prompt: |
      ایک بوڈیگا تلاش کریں جس میں بلی ہو۔ بلی قواعد کے اندر اور باہر دونوں ہے۔
      شہر میں اور کیا اسی طرح کام کرتا ہے؟
    follow_ups:
      - بلی کیا دیکھتی ہے؟
      - غیر رسمی قواعد جگہ کو کیسے شکل دیتے ہیں؟
      - بلی کے بغیر اسٹور کیا ہوگا؟
  - id: ny_sidewalk_crack
    name: فٹ پاتھ کا دراڑ
    prompt: |
      نیچے دیکھو۔ فٹ پاتھ میں ایک دراڑ کا تعاقب کرو۔ یہ کہاں جاتا ہے؟ اس میں کیا اگتا ہے؟
      شہر ایسی دراڑوں سے بھرا ہوا ہے۔
    follow_ups:
      - فٹ پاتھ وقت کے بارے میں کیا کہے گا؟
      - چھوٹی ٹوٹ پھوٹ کیسے معنی رکھتی ہے؟
      - کیا ٹوٹ کر نکل رہا ہے؟
  - id: ny_air_conditioner
    name: ایئر کنڈیشنر
    prompt: |
      ایک عمارت پر ایئر کنڈیشنرز گنیں۔ وہ پرجیوی، مصنوعی اعضاء،
      ضروریات ہیں۔ وہ facade کو کیسے بدلتے ہیں؟ وہ کیا ٹپکاتے ہیں؟
    follow_ups:
      - ان کے بغیر عمارت کیسی نظر آئے گی؟
      - موسم عمارت کو کیسے بدلتا ہے؟
      - وہ کہاں جاتے ہیں اس کا فیصلہ کون کرتا ہے؟
  - id: ny_express_local
    name: ایکسپریس / لوکل
    prompt: |
      سب وے پر سواری کریں۔ ایکسپریس اور لوکل کے درمیان فرق کو نوٹس کریں۔
      رفتار آپ کو جو نظر آتا ہے اسے بدل دیتی ہے۔ اسٹاپ چھوڑیں اور شہر کو کمپریس ہوتے ہوئے محسوس کریں۔
    follow_ups:
      - جب آپ رکتے نہیں ہیں تو آپ کیا کھو دیتے ہیں؟
      - رفتار تجربے کو کیسے شکل دیتی ہے؟
      - اگر سب کچھ مقامی ہوتا تو شہر کیسا ہوتا؟
  - id: ny_water_tower
    name: پانی کا ٹاور
    prompt: |
      پانی کے ٹاور پرانی عمارتوں کے اوپر ہوتے ہیں۔ وہ لکڑی کے، بیرل کے سائز کے،
      ہر جگہ موجود ہیں۔ پانچ تلاش کریں۔ وہ اسکائی لائن کے بارے میں کیا کہتے ہیں؟
    follow_ups:
      - وہ اب بھی کیوں موجود ہیں؟
      - ان کے بغیر چھت کیسی نظر آئے گی؟
      - وہ عمر کو کیسے نشان زد کرتے ہیں؟
  - id: ny_awning_stripes
    name: چھتری کی دھاریاں
    prompt: |
      اسٹرائپڈ چھتریاں نیو یارک کی ایک مخصوص بولی ہیں۔ ایک بلاک تلاش کریں جہاں وہ
