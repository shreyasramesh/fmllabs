# Selva Urbana — Bangalore (Portuguese)

id: urban_jungle_bangalore
name: Selva Urbana — Bangalore
description: 50 cartas para mudar a sua perspetiva sobre Bangalore — da escala e luz a camadas de história e aos ritmos da vida de rua.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Entrada da Colónia
    prompt: |
      As colónias muradas de Bangalore têm muros, guardas, portões. Fique num portão.
      O que há lá dentro? Quem entra? O portão marca um limite. O que protege?
    follow_ups:
      - O que seria da rua sem o portão?
      - Como o portão cria segurança?
      - Qual a relação entre portão e colónia?
  - id: blr_tree_canopy
    name: Copa de Árvores
    prompt: |
      Bangalore foi outrora uma cidade jardim. Árvores antigas ainda cobrem algumas ruas.
      Caminhe debaixo de uma. Como a copa muda a luz? O som?
    follow_ups:
      - O que seria da rua sem a árvore?
      - Como a copa cria microclima?
      - Qual a relação entre árvore e cidade?
  - id: blr_tech_park
    name: Parque Tecnológico
    prompt: |
      Os parques tecnológicos são campus — vidro, relva, autocarros shuttle. Encontre um. Como
      o parque se separa da cidade? Qual a relação entre o interior e o exterior?
    follow_ups:
      - O que seria da área sem o parque?
      - Como o parque cria identidade?
      - Qual a relação entre o parque e a rua?
  - id: blr_auto_rickshaw
    name: Auto Rickshaw
    prompt: |
      Os auto rickshaws tecem-se pelo trânsito. Observe um a negociar uma junção. Como
      o auto se encaixa onde os carros não conseguem? Qual a lógica do entrelaçar?
    follow_ups:
      - O que seria da rua sem o auto?
      - Como o auto cria mobilidade?
      - Qual a relação entre auto e trânsito?
  - id: blr_chai_stall
    name: Barraca de Chai
    prompt: |
      As barracas de chai são nós — pequenas, temporárias, essenciais. Encontre uma. Quem se reúne?
      Qual o ritmo? A barraca é uma máquina social.
    follow_ups:
      - O que seria da esquina sem a barraca?
      - Como a barraca cria encontro?
      - Qual a relação entre a barraca e a rua?
  - id: blr_billboard
    name: Outdoor de Bangalore
    prompt: |
      Os outdoors de Bangalore anunciam tecnologia, imobiliário, educação. Encontre um.
