# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Міський джунглі — Лондон (Ukrainian)

id: urban_jungle_london
name: Міський джунглі — Лондон
description: 50 карток, які змінять ваш погляд на Лондон — від масштабу та світла до шарів історії та ритмів вуличного життя.
domain: urban_jungle
cards:
  - id: london_layer
    name: Шар Лондона
    prompt: |
      Лондон побудований шарами — римський, середньовічний, вікторіанський, сучасний. Знайдіть місце, де стикаються епохи. Що найдавніше, що ви можете побачити? Найновіше?
    follow_ups:
      - Якою була б вулиця без цих шарів?
      - Як історія проявляється у збудованому середовищі?
      - Який зв'язок між шаром та ідентичністю?
  - id: london_pub_threshold
    name: Поріг пабу
    prompt: |
      Лондонський паб має поріг — крок угору, двері, барну стійку. Станьте на порозі. Що всередині? Що зовні? Паб — це кімната в місті.
    follow_ups:
      - Яким би був квартал без пабу?
      - Як поріг створює перехід?
      - Який зв'язок між пабом та вулицею?
  - id: london_blue_plaque
    name: Синя табличка
    prompt: |
      Сині таблички позначають місця, де жили відомі особистості. Знайдіть одну. Хто тут жив? Що вони робили? Табличка робить історію видимою.
    follow_ups:
      - Якою була б будівля без таблички?
      - Як табличка формує пам'ять?
      - Який зв'язок між табличкою та місцем?
  - id: london_underground
    name: Метрополітен
    prompt: |
      "Труба" — це місто під містом. Спустіться. Зверніть увагу на плитку, карти, ескалатори. Як підземка формує те, що над нею?
    follow_ups:
      - Яким би був Лондон без "Труби"?
      - Як підземка створює зв'язок?
      - Який зв'язок між "Трубою" та поверхнею?
  - id: london_thames_edge
    name: Набережна Темзи
    prompt: |
      Темза протікає через Лондон. Підійдіть до набережної. Річка — це шов. Що знаходиться по обидва боки? Як річка розділяє і об'єднує?
    follow_ups:
      - Яким би був Лондон без Темзи?
      - Як річка формує місто?
      - Який зв'язок між річкою та краєм?
  - id: london_georgian_row
    name: Георгіанський ряд
    prompt: |
      Георгіанські тераси повторюються — двері, вікно, двері, вікно. Пройдіться вздовж ряду. Повторення створює ритм. Що його порушує? Що його тримає разом?
    follow_ups:
      - Якою була б вулиця без цього ряду?
      - Як повторення створює ідентичність?
      - Який зв'язок між рядом та індивідуальністю?
  - id: london_mews
    name: Міус
    prompt: |
      Міуси колись були стайнями, а тепер — житловими будинками. Знайдіть один. Вузька провулок, бруківка, переобладнані каретні. Як минуле зберігається?
    follow_ups:
      - Яким був би міус без історії?
      - Як міус створює приватність?
      - Який зв'язок між міусом та головною вулицею?
  - id: london_phone_box
    name: Телефонна будка
    prompt: |
      Червоні телефонні будки — це ікони. Знайдіть одну. Чи це все ще телефон? Дефібрилятор? Бібліотека? Як ікони отримують нове призначення?
    follow_ups:
      - Якою була б вулиця без будки?
      - Як будка позначає британськість?
      - Який зв'язок між будкою та функцією?
  - id: london_postbox
    name: Поштова скринька
    prompt: |
      Червоні поштові скриньки є всюди. Знайдіть одну. Зверніть увагу на королівський монограмму. Поштова скринька — це вузол у мережі. Що через неї проходить?
    follow_ups:
      - Якою була б вулиця без поштової скриньки?
      - Як поштова скринька позначає територію?
      - Який зв'язок між поштовою скринькою та листом?
  - id: london_pavement
    name: Тротуар
    prompt: |
      Британське "pavement" — це американське "sidewalk". Слово формує наше мислення. Пройдіться тротуаром. Який зв'язок між тротуаром і дорогою?
    follow_ups:
      - Якою була б вулиця без тротуару?
      - Як тротуар створює безпеку?
      - Який зв'язок між тротуаром і пішоходом?
  - id: london_brick
    name: Лондонська цегла
    prompt: |
      Лондонська цегла часто жовта або червона — "лондонський сток". Знайдіть цегляну стіну та вивчіть колір, текстуру, кладку. Як цегла старіє?
    follow_ups:
      - Якою була б будівля без цегли?
      - Як цегла створює ідентичність?
      - Який зв'язок між цеглою та місцем?
  - id: london_weather
    name: Лондонська погода
    prompt: |
      Лондонська погода мінлива. Постійте на одному місці двадцять хвилин. Спостерігайте за небом. Як погода формує настрій міста?
    follow_ups:
      - Яким би був Лондон без дощу?
      - Як погода формує архітектуру?
      - Який зв'язок між погодою та вуличним життям?
  - id: london_queue
    name: Черга
    prompt: |
      Британці стоять у чергах. Знайдіть чергу — до автобуса, магазину, атракціону. Спостерігайте за етикетом. Черга — це форма порядку. Як вона працює?
    follow_ups:
      - Яким був би простір без черги?
      - Як черга створює справедливість?
      - Який зв'язок між чергою та культурою?
  - id: london_roundabout
    name: Кільцева розв'язка
    prompt: |
      У Лондоні багато кільцевих розв'язок — кругових перехресть. Спостерігайте за однією. Як рухається трафік? Яка тут логіка? Кільцева розв'язка — це вузол.
    follow_ups:
      - Яким було б перехрестя без кільцевої розв'язки?
      - Як кільцева розв'язка формує потік?
      - Який зв'язок між кільцевою розв'язкою та перехрестям?
  - id: london_parks_room
    name: Паркова кімната
    prompt: |
      Лондонські парки — це кімнати — Гайд-парк, Рігентс-парк, сквери. Зайдіть в один. Зверніть увагу на межі, доріжки, меблі. Як створюється природа?
    follow_ups:
      - Яким би був Лондон без парків?
      - Як парк створює відпочинок?
      - Який зв'язок між парком та містом?
  - id: london_square
    name: Лондонський сквер
    prompt: |
      Лондонські сквери часто приватні — огороджені, замкнені. Знайдіть один. Що всередині? Хто має доступ? Сквер — це кишеня ексклюзивності.
    follow_ups:
      - Яким би був район без скверу?
      - Як сквер створює спільноту?
      - Який зв'язок між сквером та вулицею?
  - id: london_terrace
    name: Тераса
    prompt: |
      Тераса — це ряд будинків. Пройдіться одним. Зверніть увагу на одноманітність та варіації. Як тераса створює ідентичність?
    follow_ups:
      - Якою була б вулиця без тераси?
      - Як тераса створює ритм?
      - Який зв'язок між терасою та індивідуальністю?
  - id: london_corner_shop
    name: Кутовий магазин
    prompt: |
      Кутовий магазин — це лондонська установа. Зайдіть в один. Що тут продається? Хто ним керує? Магазин — це вузол у районі.
    follow_ups:
      - Яким би був квартал без магазину?
      - Як магазин створює зустрічі?
      - Який зв'язок між магазином та громадою?
  - id: london_bus_route
    name: Автобусний маршрут
    prompt: |
      Лондонські автобуси мають номери та пункти призначення. Сідайте на автобус, на якому ви ніколи не їздили. Куди він прямує? Як маршрут формує місто?
    follow_ups:
      - Якою була б подорож без автобуса?
      - Як маршрут створює зв'язок?
      - Який зв'язок між автобусом та районом?
  - id: london_clock
    name: Лондонський годинник
    prompt: |
      Біг Бен, годинник на вокзалі, годинник на церкві. Лондон сповнений громадських годинників. Знайдіть один. Який час він показує? Чи правильний він?
    follow_ups:
      - Яким був би простір без годинника?
      - Як годинник формує час?
      - Який зв'язок між годинником та місцем?
  - id: london_bridge
    name: Лондонський міст
    prompt: |
      У Лондоні багато мостів — Тауерський міст, Мілленіум-міст, Ватерлоо. Перейдіть один пішки. Відчуйте перехід. Що змінюється?
    follow_ups:
      - Якою була б річка без мосту?
      - Як міст з'єднує?
      - Який зв'язок між мостом та річкою?
  - id: london_street_market
    name: Вуличний ринок
    prompt: |
      У Лондоні є вуличні ринки — Борроу, Камден, Портобелло. Пройдіться одним. Що продається? Хто продає? Ринок — це тимчасове місто.
    follow_ups:
      - Якою була б вулиця без ринку?
      - Як ринок створює зустрічі?
      - Який зв'язок між ринком та районом?
  - id: london_ghost_sign
    name: Лондонський примарний знак
    prompt: |
      Вицвілі знаки на цеглі — примарні знаки — позначають минуле. Знайдіть один. Що він рекламував? Хто б його бачив?
    follow_ups:
      - Якою була б стіна без знака?
      - Як примарний знак зберігає історію?
      - Який зв'язок між знаком та комерцією?
  - id: london_bollard
    name: Боллард
    prompt: |
      Болларди позначають межі — пішохідні зони, заборону паркування. Знайдіть ряд боллардів. Що вони захищають? Що вони виключають?
    follow_ups:
      - Яким був би простір без боллардів?
      - Як болларди формують потік?
      - Який зв'язок між боллардом та межею?
  - id: london_door_number
    name: Номер дверей
    prompt: |
      Лондонські адреси можуть бути дивними — непарні з одного боку, парні з іншого. Слідуйте за номерами. Як нумерація формує вулицю?
    follow_ups:
      - Як би здійснювалася навігація без номерів?
      - Як нумерація створює порядок?
      - Який зв'язок між номером та місцем?
  - id: london_basement
    name: Лондонський підвал
    prompt: |
      Лондонські будинки часто мають підвали — іноді нижче рівня вулиці. Зверніть увагу на кроки вниз, на передню частину. Що знаходиться під тротуаром?
    follow_ups:
      - Яким був би будинок без підвалу?
      - Як підвал створює простір?
      - Який зв'язок між підвалом та вулицею?
  - id: london_roof_line
    name: Лінія даху
    prompt: |
      Лінії дахів Лондона різноманітні — шифер, черепиця, плоскі. Подивіться вгору. Простежте за горизонтом. Як дах формує вулицю?
    follow_ups:
      - Якою була б вулиця без дахів?
      - Як лінія даху створює ідентичність?
      - Який зв'язок між дахом та небом?
  - id: london_cobble
    name: Бруківка
    prompt: |
      Бруківка досі зустрічається на деяких вулицях. Пройдіться по ній. Відчуйте текстуру. Як поверхня формує вулицю?
    follow_ups:
      - Якою була б вулиця без бруківки?
      - Як бруківка позначає історію?
      - Який зв'язок між бруківкою та сучасністю?
  - id: london_lamp_post
    name: Ліхтарний стовп
    prompt: |
      Лондонські ліхтарні стовпи мають особливий стиль — вікторіанський, сучасний. Знайдіть один. Як ліхтар освітлює вулицю вночі?
    follow_ups:
      - Якою була б вулиця без ліхтаря?
      - Як ліхтар створює безпеку?
      - Який зв'язок між ліхтарем та темрявою?
  - id: london_bus_stop
    name: Автобусна зупинка
    prompt: |
      Лондонські автобусні зупинки мають навіси, розклади, номери. Зачекайте на одній. Хто ще чекає? Який етикет?
    follow_ups:
      - Якою була б вулиця без зупинки?
      - Як зупинка створює спільноту?
      - Який зв'язок між зупинкою та подорожжю?
  - id: london_pub_sign
    name: Вивіска пабу
    prompt: |
      Вивіски пабів висять над вулицею — "The Crown", "The Red Lion". Знайдіть одну. Яке зображення? Яка історія? Вивіска — це орієнтир.
    follow_ups:
      - Якою була б вулиця без вивіски?
      - Як вивіска створює ідентичність?
      - Який зв'язок між вивіскою та пабом?
  - id: london_church_spire
    name: Церковний шпиль
    prompt: |
      Церковні шпилі пронизують лондонський горизонт. Знайдіть один. Як шпиль орієнтує вас? Яким би був краєвид без нього?
    follow_ups:
      - Яким би був горизонт без шпиля?
      - Як шпиль створює орієнтир?
      - Який зв'язок між шпилем та районом?
  - id: london_canal
    name: Лондонський канал
    prompt: |
      У Лондоні є канали — Регентський канал, Гранд-Юніон. Пройдіться вздовж каналу. Канал — це шов. Що знаходиться по обидва боки?
    follow_ups:
      - Яким би було місто без каналу?
      - Як канал створює зв'язок?
      - Який зв'язок між каналом та промисловістю?
  - id: london_garden_square
    name: Садовий сквер
    prompt: |
      Лондонські садові сквери часто закриті. Зазирніть крізь ворота. Що всередині? Хто має ключ? Сад — це прихована кімната.
    follow_ups:
      - Яким був би сквер без саду?
      - Як сад створює ексклюзивність?
      - Який зв'язок між садом та сквером?
  - id: london_taxi
    name: Лондонське таксі
    prompt: |
      Чорні кеби — це ікони. Спостерігайте, як він зупиняється, підбирає пасажирів, від'їжджає. Як таксі формує вулицю? Яким було б місто без нього?
    follow_ups:
      - Якою була б вулиця без таксі?
      - Як таксі створює мобільність?
      - Який зв'язок між таксі та знанням?
  - id: london_underground_tile
    name: Плитка метрополітену
    prompt: |
      Станції метро мають характерну плитку — Шерлок на Бейкер-стріт, синя лінія Вікторії. Знайдіть станцію з індивідуальністю. Що говорять плитки?
    follow_ups:
      - Якою була б станція без плитки?
      - Як плитка створює ідентичність?
      - Який зв'язок між плиткою та місцем?
  - id: london_bench
    name: Лондонська лавка
    prompt: |
      У Лондоні багато лавок — у парках, на вулицях, біля автобусних зупинок. Сядьте на одну. Хто ще сидить? Який краєвид?
    follow_ups:
      - Яким був би простір без лавки?
      - Як лавка створює відпочинок?
      - Який зв'язок між лавкою та вулицею?
  - id: london_drain
    name: Лондонський дренаж
    prompt: |
      Подивіться вниз. Знайдіть дренаж — жолоб, решітку. Куди йде вода? Дренаж — це портал до прихованих систем міста.
    follow_ups:
      - Якою була б вулиця без дренажу?
      - Як дренаж керує водою?
      - Який зв'язок між дренажем та системою?
  - id: london_shop_front
    name: Вітрина магазину
    prompt: |
      Лондонські вітрини магазинів часто невеликі — вузькі, глибокі. Зазирніть у вікно.
      Що виставлено? Як вітрина формує вулицю?
    follow_ups:
      - Якою була б вулиця без вітрини магазину?
      - Як вітрина створює ідентичність?
      - Який зв'язок між вітриною та комерцією?
  - id: london_paving
    name: Лондонське мощення
    prompt: |
