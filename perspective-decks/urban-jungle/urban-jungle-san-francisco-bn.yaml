# শহুরে জঙ্গল — সান ফ্রান্সিস্কো (Bengali)

id: urban_jungle_san_francisco
name: শহুরে জঙ্গল — সান ফ্রান্সিস্কো
description: ৫০টি কার্ড যা সান ফ্রান্সিস্কোকে দেখার দৃষ্টিভঙ্গি বদলে দেবে—এর আকার ও আলো থেকে শুরু করে ইতিহাসের স্তর এবং রাস্তার জীবনের ছন্দ।
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: পাহাড়ের ঢাল
    prompt: |
      সান ফ্রান্সিস্কো খাড়াইয়ের উপর নির্মিত। আপনার পায়ের তলার ঢাল অনুভব করুন।
      ঢাল আপনার দৃষ্টিতে কী পরিবর্তন আনে? শহর কোন দিকে হেলে আছে?
    follow_ups:
      - রাস্তা সমতল হলে কেমন দেখাত?
      - পাহাড়গুলো কীভাবে পাড়া গঠন করে?
      - আপনি কোন সবচেয়ে খাড়া ব্লকটিতে উঠেছেন?
  - id: sf_fog_layer
    name: কুয়াশার স্তর
    prompt: |
      কুয়াশা নেমে আসে। দেখুন এটি কীভাবে সরে যায়—ব্রিজের উপর দিয়ে, পাহাড়ের
      ঢাল বেয়ে। কুয়াশা নিজেই একটি চরিত্র। এটি আলো এবং শব্দকে কীভাবে পরিবর্তন করে?
    follow_ups:
      - কুয়াশা ছাড়া শহর কেমন হত?
      - কুয়াশা কীভাবে সময়কে চিহ্নিত করে?
      - কুয়াশা কোথায় গিয়ে থামে?
  - id: sf_cable_car_track
    name: কেবল কারের ট্র্যাক
    prompt: |
      একটি কেবল কারের ট্র্যাক অনুসরণ করুন। ফুটপাতের স্লট, কেবলটির গুঞ্জন।
      কেবল কার একটি এখনও কার্যকরী নিদর্শন। এটি কী বহন করে?
    follow_ups:
      - ট্র্যাক ছাড়া পাহাড়টা কেমন হত?
      - কেবল কার পর্যটনকে কীভাবে আকার দেয়?
      - ট্র্যাক এবং রাস্তার মধ্যে সম্পর্ক কী?
  - id: sf_victorian_detail
    name: ভিক্টোরিয়ান স্থাপত্যের খুঁটিনাটি
    prompt: |
      সান ফ্রান্সিস্কোর ভিক্টোরিয়ান বাড়িগুলো জাঁকজমকপূর্ণ—সুন্দর কারুকার্য, উপসাগরীয়
      জানালা, রঙের ব্যবহার। একটি খুঁজে বের করুন এবং এর খুঁটিনাটি লক্ষ্য করুন।
      এই অলঙ্করণ কোন গল্প বলে?
    follow_ups:
      - খুঁটিনাটি ছাড়া বাড়িটা কেমন হত?
      - রং কীভাবে রাস্তাকে পরিবর্তন করে?
      - ভিক্টোরিয়ান এবং আধুনিক স্থাপত্যের মধ্যে সম্পর্ক কী?
  - id: sf_painted_lady
    name: রঙ করা লেডি
    prompt: |
      পেইন্টেড লেডিরা বিখ্যাত, কিন্তু প্রতিটি ভিক্টোরিয়ান বাড়ির নিজস্ব রঙের বিন্যাস আছে।
      একটি ব্লক থেকে পাঁচটি রঙের সংমিশ্রণ সংগ্রহ করুন। রংগুলো কী বলছে?
    follow_ups:
      - কেন এই রংগুলো?
      - রং কীভাবে সংরক্ষণ বা রূপান্তর করে?
      - ব্লকটি গ্রেস্কেলে কেমন দেখাত?
  - id: sf_bay_window
    name: উপসাগরীয় জানালা
    prompt: |
      উপসাগরীয় জানালাগুলো রাস্তায় ফুলে থাকে। এগুলি আলো, দৃশ্য এবং প্রদর্শনের জন্য।
      একটি জানালার সামনে দাঁড়ান। ভেতর থেকে আপনি কী দেখতে পাবেন?
    follow_ups:
      - উপসাগরীয় জানালা কীভাবে ঘরকে পরিবর্তন করে?
      - এটি ছাড়া সম্মুখভাগ কেমন হত?
      - উপসাগরীয় জানালাগুলো কীভাবে রাস্তার সাথে সম্পর্ক তৈরি করে?
  - id: sf_stairway_street
    name: সিঁড়ি পথ
    prompt: |
      সান ফ্রান্সিস্কোতে এমন সিঁড়ি পথ আছে যা রাস্তার মতো—ফুটপাতের বদলে সিঁড়ি।
      একটি বেয়ে উঠুন। সিঁড়ি পথটি কীভাবে পাড়াকে পরিবর্তন করে?
    follow_ups:
      - এই সিঁড়িগুলো কারা ব্যবহার করে?
      - এগুলো ছাড়া পাহাড়টা কেমন হত?
      - সিঁড়িগুলো কীভাবে সম্প্রদায় তৈরি করে?
  - id: sf_mission_mural
    name: মিশন ম্যুরাল
    prompt: |
      মিশন এলাকাটি ম্যুরালের একটি গ্যালারি। একটি খুঁজে বের করুন এবং এটিকে
      পর্যবেক্ষণ করুন। গল্পটি কী? কে এটি এঁকেছেন? এটি কার জন্য?
    follow_ups:
      - ম্যুরাল ছাড়া দেওয়ালটি কী বলত?
      - ম্যুরালগুলি কীভাবে স্থান দখল করে?
      - ম্যুরাল এবং পাড়ার মধ্যে সম্পর্ক কী?
  - id: sf_earthquake_retrofit
    name: ভূমিকম্প প্রতিরোধ ব্যবস্থা
    prompt: |
      ভূমিকম্প প্রতিরোধের ব্যবস্থা খুঁজুন—বল্টু, ব্রেস, ভিত্তি। শহরটি
      ১৯০৬ এবং ১৯৮৯ সালের কথা মনে রাখে। ভয় কীভাবে নির্মিত পরিবেশকে আকার দেয়?
    follow_ups:
      - প্রতিরোধ ব্যবস্থা ছাড়া বাড়িটি কেমন হত?
      - ভূমিকম্প প্রতিরোধী নকশা কীভাবে দেখানো হয়?
      - প্রতিরোধ ব্যবস্থা এবং বিশ্বাসের মধ্যে সম্পর্ক কী?
  - id: sf_dolores_palm
    name: ডলোরেস পাম
    prompt: |
      ডলোরেস স্ট্রিটের ধারে পাম গাছ আছে। এগুলো স্থানীয় নয়, তবে পরিচিত।
      এগুলো শহরটির বাইরের পৃথিবীর সাথে সম্পর্ক সম্পর্কে কী বলে?
    follow_ups:
      - পাম গাছ ছাড়া রাস্তাটা কেমন হত?
      - পাম গাছগুলো কীভাবে পরিচয় চিহ্নিত করে?
      - পাম গাছ এবং জায়গার মধ্যে সম্পর্ক কী?
  - id: sf_twin_peaks_view
    name: টুইন পিকস দৃশ্য
    prompt: |
      টুইন পিকস থেকে দৃশ্যের কল্পনা করুন। শহরটি নিচে ছড়িয়ে আছে—গ্রিড, জল,
      সেতু। উচ্চতা কোন বিষয়গুলোকে গুরুত্বপূর্ণ করে তোলে?
    follow_ups:
      - ওখান থেকে আপনি কী দেখতে পাবেন?
      - দৃশ্যটি শহরের ভাবমূর্তিকে কীভাবে আকার দেয়?
      - শিখর থেকে কী লুকানো থাকে?
  - id: sf_ferry_building
    name: ফেরি ভবন
    prompt: |
      ফেরি ভবনটি উপসাগরের দিকে মুখ করে আছে। এটি একটি প্রবেশদ্বার—ভূমি ও জল,
      শহর ও যাতায়াত। এর প্রবেশপথে দাঁড়ান। কী প্রবাহিত হচ্ছে?
    follow_ups:
      - এটি ছাড়া জলধারা কেমন হত?
      - ভবনটি কীভাবে পরিবর্তন চিহ্নিত করে?
      - ফেরি এবং শহরের মধ্যে সম্পর্ক কী?
  - id: sf_chinatown_gate
    name: চায়নাটাউন গেট
    prompt: |
      ড্রাগন গেট চায়নাটাউনকে চিহ্নিত করে। এটি পার হয়ে যান। কী পরিবর্তন হয়?
      গেটটি বাস্তব এবং প্রতীকী উভয়ই। এটি কীভাবে কাজ করে?
    follow_ups:
      - গেট ছাড়া চায়নাটাউন কেমন হত?
      - গেটটি কীভাবে পরিচয় তৈরি করে?
      - গেট এবং পাড়ার মধ্যে সম্পর্ক কী?
  - id: sf_hydrant_color
    name: ফায়ার হাইড্রেন্টের রং
    prompt: |
      সান ফ্রান্সিস্কোর ফায়ার হাইড্রেন্টগুলো বিভিন্ন রঙের হয়—নীল, সবুজ, লাল।
      রংটি জলের প্রবাহ নির্দেশ করে। তিনটি রং খুঁজুন। প্রতিটির অর্থ কী?
    follow_ups:
      - আগুনে ব্লকটি কী করত?
      - রং কীভাবে তথ্য এনকোড করে?
      - হাইড্রেন্ট এবং সিস্টেমের মধ্যে সম্পর্ক কী?
  - id: sf_parklet
    name: পার্কলেট
    prompt: |
      পার্কলেটগুলো মানুষের জন্য পার্কিং স্থান পুনরুদ্ধার করে। একটিতে বসুন।
      আসবাবপত্র কী? কারা এটি ব্যবহার করে? পার্কলেটটি কীভাবে ব্লকটিকে পরিবর্তন করে?
    follow_ups:
      - পার্কলেট ছাড়া জায়গাটি কেমন হত?
      - পার্কলেটটি কীভাবে সাক্ষাৎ তৈরি করে?
      - আপনি কী যোগ করতেন?
  - id: sf_sf_street_sign
    name: এসএফ রাস্তার চিহ্ন
    prompt: |
      সান ফ্রান্সিস্কোর রাস্তার চিহ্নগুলির একটি বিশেষ শৈলী রয়েছে। ফন্ট, মাউন্ট,
      এবং স্থাপন লক্ষ্য করুন। চিহ্নটি পথ নির্দেশকে কীভাবে আকার দেয়?
    follow_ups:
      - চিহ্ন ছাড়া ব্লকটি কেমন হত?
      - টাইপোগ্রাফি কেন গুরুত্বপূর্ণ?
      - চিহ্ন এবং পরিচয়ের মধ্যে সম্পর্ক কী?
  - id: sf_castro_rainbow
    name: কাস্ট্রো রেইনবো
    prompt: |
      কাস্ট্রোতে রামধনু পতাকা উড়ে। রাস্তা ধরে হাঁটুন এবং পতাকা গুনুন।
      পতাকাটি কীভাবে স্থান দখল করে? এখানে এর অর্থ কী?
    follow_ups:
      - পতাকা ছাড়া পাড়াটি কেমন হত?
      - পতাকাটি কীভাবে সম্প্রদায় তৈরি করে?
      - প্রতীক এবং জায়গার মধ্যে সম্পর্ক কী?
  - id: sf_haight_vintage
    name: হাইট ভিন্টেজ
    prompt: |
      হাইট হলো ১৯৬০-এর দশকের একটি জাদুঘর। একটি অপরিবর্তিত ভবন খুঁজুন।
      কী সংরক্ষিত আছে? কী অভিনয়?
    follow_ups:
      - ভিন্টেজ ছাড়া রাস্তাটি কেমন হত?
      - ইতিহাস কীভাবে বাণিজ্যকে আকার দেয়?
      - অতীত এবং বর্তমানের মধ্যে সম্পর্ক কী?
  - id: sf_sutro_tower
    name: সুট্রো টাওয়ার
    prompt: |
      সুট্রো টাওয়ার সব জায়গা থেকে দেখা যায়। এটি একটি কম্পাস হিসাবে ব্যবহার করুন।
      টাওয়ারটি আপনাকে কীভাবে দিক নির্ণয় করে? এটি ছাড়া স্কাইলাইন কেমন হত?
    follow_ups:
      - টাওয়ারটি কী সম্প্রচার করে?
      - টাওয়ারটি কীভাবে পরিচয়কে আকার দেয়?
      - টাওয়ার এবং দৃশ্যের মধ্যে সম্পর্ক কী?
  - id: sf_bart_underground
    name: বার্ট আন্ডারগ্রাউন্ড
    prompt: |
      বিএআরটি (BART) ট্রেন উপসাগরের নিচ দিয়ে নিয়ে যান। আপনি জলের নীচের একটি
      টিউবের মধ্যে আছেন। চাপ, অন্ধকার, এবং বেরিয়ে আসার অনুভূতি নিন।
      সুরঙ্গটি কীভাবে যাত্রাকে পরিবর্তন করে?
