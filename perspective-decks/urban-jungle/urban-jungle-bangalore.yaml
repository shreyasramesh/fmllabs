    follow_ups:
      - What would the skyline be without the tower?
      - How does the tower create housing?
      - What's the relationship between tower and ground?
  - id: blr_roadside_vendor
    name: Roadside Vendor
    prompt: |
      Roadside vendors sell fruit, snacks, phone chargers. Find one. What's the
      display? Who stops? The vendor is informal economy.
    follow_ups:
      - What would the street be without the vendor?
      - How does the vendor create livelihood?
      - What's the relationship between vendor and street?
  - id: blr_borewell
    name: Borewell
    prompt: >
      Bangalore depends on borewells. Look for the pipes, the tanks, the

      pumps. Water is extracted from below. What's the relationship between city
      and aquifer?
    follow_ups:
      - What would the building be without the borewell?
      - How does the borewell create supply?
      - What's the relationship between borewell and scarcity?
  - id: blr_garbage_heap
    name: Garbage Heap
    prompt: |
      Garbage heaps appear at corners, by walls. Notice one. What's in it? Who
      picks through it? The heap is a limit of the system.
    follow_ups:
      - What would the street be without the heap?
      - How does the heap mark failure?
      - What's the relationship between heap and city?
  - id: blr_marquee_wedding
    name: Marquee Wedding
    prompt: |
      Wedding marquees block streets. Find one. The marquee is a temporary
