    follow_ups:
      - What would the street be without the marquee?
      - How does the marquee create claim?
      - What's the relationship between wedding and public?
  - id: blr_old_bungalow
    name: Old Bungalow
    prompt: |
      Old Bangalore bungalows persist among towers. Find one. The bungalow has
