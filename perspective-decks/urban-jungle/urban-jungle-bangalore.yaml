    follow_ups:
      - What would the street be without the bungalow?
      - How does the bungalow mark history?
      - What's the relationship between bungalow and tower?
  - id: blr_coffee_house
    name: Coffee House
    prompt: |
      Indian Coffee House is an institution. Sit in one. The coffee house is
