# Urban Jungle — Bangalore

id: urban_jungle_bangalore
name: Urban Jungle — Bangalore
description: 50 cards to shift how you see Bangalore—from scale and light to
  layers of history and the rhythms of street life.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Gate Colony
    prompt: >
      Bangalore's gated colonies have walls, guards, gates. Stand at a gate.

      What's inside? Who enters? The gate marks a boundary. What does it
      protect?
    follow_ups:
      - What would the street be without the gate?
      - How does the gate create security?
      - What's the relationship between gate and colony?
  - id: blr_tree_canopy
    name: Tree Canopy
    prompt: |
      Bangalore was once a garden city. Old trees still canopy some streets.
      Walk under one. How does the canopy change the light? The sound?
    follow_ups:
      - What would the street be without the tree?
      - How does the canopy create microclimate?
      - What's the relationship between tree and city?
  - id: blr_tech_park
    name: Tech Park
    prompt: >
      Tech parks are campuses—glass, lawn, shuttle buses. Find one. How does

      the park separate from the city? What's the relationship between inside
      and outside?
    follow_ups:
      - What would the area be without the park?
      - How does the park create identity?
      - What's the relationship between park and street?
  - id: blr_auto_rickshaw
    name: Auto Rickshaw
    prompt: |
      Auto rickshaws weave through traffic. Watch one negotiate a junction. How
      does the auto fit where cars cannot? What's the logic of the weave?
    follow_ups:
      - What would the street be without the auto?
      - How does the auto create mobility?
      - What's the relationship between auto and traffic?
  - id: blr_chai_stall
    name: Chai Stall
    prompt: |
      Chai stalls are nodes—small, temporary, essential. Find one. Who gathers?
      What's the rhythm? The stall is a social machine.
    follow_ups:
      - What would the corner be without the stall?
      - How does the stall create encounter?
      - What's the relationship between stall and street?
  - id: blr_billboard
    name: Bangalore Billboard
    prompt: >
      Bangalore billboards advertise tech, real estate, education. Find one.

      What's being sold? Who is the audience? The billboard is a mirror of
      aspiration.
    follow_ups:
      - What would the street be without the billboard?
      - How does the billboard shape desire?
      - What's the relationship between billboard and city?
  - id: blr_compound_wall
    name: Compound Wall
    prompt: |
      Compound walls separate private from public. Find a wall. What's behind
      it? How high is it? The wall creates a boundary. What does it exclude?
    follow_ups:
      - What would the street be without the wall?
      - How does the wall create privacy?
      - What's the relationship between wall and compound?
  - id: blr_signal_wait
    name: Signal Wait
    prompt: |
      Wait at a traffic signal. Watch the vendors—flowers, toys, books. The
      signal creates a pause. What happens in the pause?
    follow_ups:
      - What would the junction be without the signal?
      - How does the signal create economy?
      - What's the relationship between signal and street?
  - id: blr_rain_drain
    name: Rain Drain
    prompt: |
      Bangalore monsoon overwhelms drains. After rain, watch the water. Where
      does it go? Where does it pool? The drain is a limit.
    follow_ups:
      - What would the street be without the drain?
      - How does the drain manage water?
      - What's the relationship between drain and monsoon?
  - id: blr_sarjapur_road
    name: Sarjapur Road
    prompt: |
      Sarjapur Road connects old Bangalore to the tech corridor. Drive or walk
      a stretch. What changes? Where does the city shift?
    follow_ups:
      - What would the corridor be without the road?
      - How does the road create connection?
      - What's the relationship between road and growth?
  - id: blr_parks_maidans
    name: Parks & Maidans
    prompt: |
      Bangalore has parks and maidans—Cubbon Park, Lalbagh, neighborhood
      grounds. Enter one. Who uses it? What's the rhythm?
    follow_ups:
      - What would the city be without the park?
      - How does the park create respite?
      - What's the relationship between park and neighborhood?
  - id: blr_temple_street
    name: Temple Street
    prompt: |
      Temples punctuate Bangalore streets. Find one. Notice the offerings, the
      bells, the crowd. How does the temple shape the block?
    follow_ups:
      - What would the street be without the temple?
      - How does the temple create community?
      - What's the relationship between temple and street?
  - id: blr_silk_board
    name: Silk Board
    prompt: |
      Silk Board junction is infamous. Stand at the edge. Watch the traffic.
      How does the junction work? What's the logic of the chaos?
    follow_ups:
      - What would the corridor be without the junction?
      - How does the junction create bottleneck?
      - What's the relationship between junction and commute?
  - id: blr_metro_elevated
    name: Metro Elevated
    prompt: |
      Bangalore Metro runs elevated through parts of the city. Ride it or stand
      under it. How does the elevated line change the street below?
    follow_ups:
      - What would the street be without the metro?
      - How does the metro create connection?
      - What's the relationship between elevated and ground?
  - id: blr_apartment_tower
    name: Apartment Tower
    prompt: |
      Apartment towers rise across Bangalore. Find one. How many floors? Who
