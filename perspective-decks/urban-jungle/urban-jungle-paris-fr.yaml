# Jungle Urbaine — Paris (French)

id: urban_jungle_paris
name: Jungle Urbaine — Paris
description: 50 cartes pour changer votre regard sur Paris—de l'échelle et de la lumière aux couches d'histoire et aux rythmes de la vie de rue.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: Fleur de Balcon
    prompt: |
      Les balcons parisiens fleurissent de géraniums, de pétunias. Trouvez un immeuble où chaque balcon a une potée. Comment la fleur change-t-elle la façade ?
    follow_ups:
      - Que serait la rue sans les fleurs ?
      - Comment les fleurs créent-elles une identité ?
      - Quelle est la relation entre la fleur et l'habitant ?
  - id: paris_haussmann_line
    name: Ligne Haussmannienne
    prompt: |
      Les grands boulevards haussmanniens percent le vieux Paris. Parcourez-en un. La ligne est
      implacable—immeubles alignés, hauteurs uniformes. Comment le boulevard façonne-t-il le mouvement ?
    follow_ups:
      - Que serait Paris sans Haussmann ?
      - Comment le boulevard crée-t-il une perspective ?
      - Quelle est la relation entre la ligne et le pouvoir ?
  - id: paris_cafe_terrace
    name: Terrasse de Café
    prompt: |
      Les terrasses de café parisiennes font face à la rue. Asseyez-vous à l'une d'elles. Vous êtes à la fois dedans et dehors. La terrasse est un seuil. Que voyez-vous ?
    follow_ups:
      - Que serait la rue sans la terrasse ?
      - Comment la terrasse crée-t-elle la rencontre ?
      - Quelle est la relation entre la terrasse et la rue ?
  - id: paris_metro_entrance
    name: Entrée de Métro
    prompt: |
      Les entrées de métro Art Nouveau sont des icônes. Trouvez-en une. La ferronnerie, la typographie—l'entrée est un portail. Que promet-elle ?
    follow_ups:
      - Que serait la rue sans l'entrée ?
      - Comment l'entrée crée-t-elle une identité ?
      - Quelle est la relation entre l'entrée et le souterrain ?
  - id: paris_shutter
    name: Volet Parisien
    prompt: |
      Les volets parisiens se ferment la nuit. Ils sont verts, gris, bleus. Trouvez une rue où les volets sont fermés. Qu'y a-t-il derrière ?
    follow_ups:
      - Que serait la façade sans les volets ?
      - Comment les volets créent-ils de l'intimité ?
      - Quelle est la relation entre le volet et la lumière ?
  - id: paris_cobble
    name: Pavé Parisien
    prompt: |
      Les pavés parisiens persistent. Marchez dessus. Sentez la texture. Le pavé est une relique d'un autre Paris. Comment façonne-t-il la rue ?
    follow_ups:
      - Que serait la rue sans les pavés ?
      - Comment les pavés marquent-ils l'histoire ?
      - Quelle est la relation entre le pavé et la révolution ?
  - id: paris_seine_edge
    name: Bord de Seine
    prompt: |
      La Seine traverse Paris. Allez sur les quais. La rivière est une couture. Qu'y a-t-il de chaque côté ? Comment la rivière divise-t-elle et relie-t-elle ?
    follow_ups:
      - Que serait Paris sans la Seine ?
      - Comment la rivière façonne-t-elle la ville ?
      - Quelle est la relation entre la rivière et le bord ?
  - id: paris_roof_zinc
    name: Toiture en Zinc
    prompt: |
      Les toits parisiens sont souvent en zinc—gris, pentus, avec des lucarnes. Regardez en l'air. La ligne du toit est distinctive. Comment façonne-t-elle la silhouette urbaine ?
    follow_ups:
      - Que serait la silhouette urbaine sans le zinc ?
      - Comment le zinc crée-t-il une identité ?
      - Quelle est la relation entre le toit et le grenier ?
  - id: paris_door_height
    name: Hauteur de Porte
    prompt: |
      Les portes parisiennes sont souvent hautes—double hauteur. Trouvez-en une. Que passerait-elle ? La porte est un seuil d'échelle.
    follow_ups:
      - Que serait le bâtiment sans la haute porte ?
      - Comment la hauteur crée-t-elle de la grandeur ?
      - Quelle est la relation entre la porte et le bâtiment ?
  - id: paris_boulangerie_smell
    name: Odeur de Boulangerie
    prompt: |
      Une boulangerie sent le pain. Suivez l'odeur. La boulangerie est un nœud. Que dit l'odeur du pâté de maisons ?
    follow_ups:
      - Que serait la rue sans l'odeur ?
      - Comment l'odeur crée-t-elle une identité ?
      - Quelle est la relation entre l'odeur et le commerce ?
  - id: paris_place
    name: Place Parisienne
    prompt: |
      Paris a des places—carrées, rondes, des nœuds. Trouvez-en une. Remarquez la géométrie. Comment la place façonne-t-elle les rues qui y mènent ?
    follow_ups:
      - Que serait le quartier sans la place ?
      - Comment la place crée-t-elle un point focal ?
      - Quelle est la relation entre la place et le flux ?
  - id: paris_balcony_iron
    name: Fer de Balcon
    prompt: |
      Les garde-corps des balcons parisiens sont souvent ouvragés—fer forgé, courbes, volutes. Trouvez-en un. Comment le fer façonne-t-il la façade ?
    follow_ups:
      - Que serait le bâtiment sans le fer ?
      - Comment le fer crée-t-il une identité ?
      - Quelle est la relation entre le fer et l'artisanat ?
  - id: paris_plane_tree
    name: Platane Parisien
    prompt: |
      Les platanes parisiens bordent les boulevards. Leur écorce se détache. Trouvez-en un. Comment l'arbre façonne-t-il la rue ? Que serait le boulevard sans lui ?
    follow_ups:
      - Que serait la rue sans le platane ?
      - Comment le platane crée-t-il de l'ombre ?
      - Quelle est la relation entre l'arbre et le boulevard ?
  - id: paris_metro_tile
    name: Carreau de Métro
