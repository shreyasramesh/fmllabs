      - Quelle est la relation entre l'horloge et le lieu ?
  - id: paris_newsstand
    name: Kiosque Parisien
    prompt: |
      Les kiosques parisiens vendent journaux, magazines, tickets de métro. Trouvez-en un. Qu'y a-t-il en exposition ? Qui s'arrête ? Le kiosque est un nœud.
