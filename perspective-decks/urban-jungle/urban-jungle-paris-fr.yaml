      - Que serait la station sans les carreaux ?
      - Comment les carreaux créent-ils de la propreté ?
      - Quelle est la relation entre le carreau et le souterrain ?
  - id: paris_clock
    name: Horloge Parisienne
    prompt: |
      Paris a de nombreuses horloges publiques—sur les églises, les gares, les bâtiments. Trouvez-en une. Quelle heure indique-t-elle ? Est-elle juste ?
