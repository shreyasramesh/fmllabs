# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Городские Джунгли — Сан-Франциско (Russian)

id: urban_jungle_san_francisco
name: Городские Джунгли — Сан-Франциско
description: 50 карточек, чтобы изменить ваше восприятие Сан-Франциско — от масштаба и света до слоев истории и ритмов уличной жизни.
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: Уклон Холма
    prompt: |
      Сан-Франциско построен на склонах. Почувствуйте уклон под ногами. Как
      наклон меняет то, что вы замечаете? Где город наклоняется?
    follow_ups:
      - Как бы выглядела улица, если бы она была ровной?
      - Как холмы формируют районы?
      - Какой самый крутой квартал вы преодолели?
  - id: sf_fog_layer
    name: Туманный Слой
    prompt: |
      Накатывает туман. Наблюдайте, как он движется — над мостом, вниз по холмам.
      Туман — это персонаж. Как он меняет свет? Звук?
    follow_ups:
      - Какой был бы город без тумана?
      - Как туман отмечает время?
      - Где останавливается туман?
  - id: sf_cable_car_track
    name: Колея Канатного Трамвая
    prompt: |
      Следуйте за колеей канатного трамвая. Прорезь в мостовой, гул кабеля.
      Канатный трамвай — это реликт, который все еще работает. Что он везет?
    follow_ups:
      - Каким был бы холм без колеи?
      - Как канатный трамвай формирует туризм?
      - Каковы отношения между колеей и улицей?
  - id: sf_victorian_detail
    name: Викторианская Деталь
    prompt: |
      Викторианские дома Сан-Франциско богато украшены — кружева, эркеры, цвета.
      Найдите один и рассмотрите его детали. Какую историю рассказывает украшение?
    follow_ups:
      - Каким был бы дом без деталей?
      - Как цвет меняет улицу?
      - Каковы отношения между викторианским стилем и современностью?
  - id: sf_painted_lady
    name: Раскрашенная Дама
    prompt: |
      «Раскрашенные Дамы» знамениты, но у каждого викторианского дома есть своя
      палитра. Соберите пять цветовых комбинаций из одного квартала. Что говорят
      цвета?
    follow_ups:
      - Почему именно эти цвета?
      - Как краска сохраняет или трансформирует?
      - Как бы выглядел квартал в оттенках серого?
  - id: sf_bay_window
    name: Эркер
    prompt: |
      Эркеры выступают на улицу. Они предназначены для света, для обзора, для
      демонстрации. Встаньте перед одним. Что бы вы увидели изнутри?
    follow_ups:
      - Как эркер меняет комнату?
      - Каким был бы фасад без него?
      - Как эркеры создают отношения с улицей?
  - id: sf_stairway_street
    name: Улица-Лестница
    prompt: |
      В Сан-Франциско есть лестницы, которые являются улицами — ступени вместо
      мостовой. Поднимитесь по одной. Как лестница меняет район?
    follow_ups:
      - Кто пользуется этими лестницами?
      - Каким был бы холм без них?
      - Как лестницы создают сообщество?
  - id: sf_mission_mural
    name: Мурал Миссии
    prompt: |
      Район Миссии — это галерея муралов. Найдите один и прочитайте его. Какова
      история? Кто его нарисовал? Для кого он?
    follow_ups:
      - Что бы сказала стена без мурала?
      - Как муралы занимают пространство?
      - Каковы отношения между муралом и районом?
  - id: sf_earthquake_retrofit
    name: Укрепление от Землетрясения
    prompt: |
      Ищите укрепления от землетрясений — болты, скобы, фундаменты. Город помнит
      1906 и 1989 годы. Как страх формирует застроенную среду?
    follow_ups:
      - Каким было бы здание без укрепления?
      - Как проявляется сейсмостойкое проектирование?
      - Каковы отношения между укреплением и доверием?
  - id: sf_dolores_palm
    name: Пальма на Долорес
    prompt: |
      Пальмы вдоль улицы Долорес. Они не местные, но культовые. Что они говорят
      об отношениях города с внешним миром?
    follow_ups:
      - Какой была бы улица без пальм?
      - Как пальмы обозначают идентичность?
      - Каковы отношения между пальмой и местом?
  - id: sf_twin_peaks_view
    name: Вид с Твин Пикс
    prompt: |
      Представьте вид с Твин Пикс. Город раскинулся внизу — сетка улиц, вода,
      мосты. Как высота меняет то, что важно?
    follow_ups:
      - Что бы вы увидели оттуда?
      - Как вид формирует имидж города?
      - Что скрыто от вершины?
  - id: sf_ferry_building
    name: Здание Паромного Терминала
    prompt: |
      Здание паромного терминала выходит на залив. Это порог — суша и вода,
      город и маршрут. Встаньте у его входа. Что здесь течет?
    follow_ups:
      - Какова была бы набережная без него?
      - Как здание отмечает переход?
      - Каковы отношения между паромом и городом?
  - id: sf_chinatown_gate
    name: Ворота Чайнатауна
    prompt: |
      Драконьи ворота отмечают Чайнатаун. Пройдите через них. Что меняется?
      Ворота — и реальность, и символ. Как они работают?
    follow_ups:
      - Каким был бы Чайнатаун без ворот?
      - Как ворота создают идентичность?
      - Каковы отношения между воротами и районом?
  - id: sf_hydrant_color
    name: Цвет Пожарного Гидранта
    prompt: |
      Пожарные гидранты в Сан-Франциско разных цветов — синие, зеленые, красные.
      Цвет указывает на поток воды. Найдите три цвета. Что означает каждый?
    follow_ups:
      - Что бы сделал квартал во время пожара?
      - Как цвет кодирует информацию?
      - Каковы отношения между гидрантом и системой?
  - id: sf_parklet
    name: Парклет
    prompt: |
      Парклеты отвоевывают парковочные места для людей. Посидите в одном. Какая
      там мебель? Кто им пользуется? Как паркелет меняет квартал?
    follow_ups:
      - Каким было бы пространство без парка?
      - Как паркелет создает встречу?
      - Что бы вы добавили?
  - id: sf_sf_street_sign
    name: Уличный Знак Сан-Франциско
    prompt: |
      Уличные знаки Сан-Франциско имеют особый стиль. Обратите внимание на шрифт,
      крепление, расположение. Как знак формирует навигацию?
    follow_ups:
      - Каким был бы квартал без знака?
      - Важна ли типографика?
      - Каковы отношения между знаком и идентичностью?
  - id: sf_castro_rainbow
    name: Радуга Кастро
    prompt: |
      В Кастро развеваются радужные флаги. Пройдитесь по улице и посчитайте
      флаги. Как флаг занимает пространство? Что он означает здесь?
    follow_ups:
      - Каким был бы район без флагов?
      - Как флаг создает сообщество?
      - Каковы отношения между символом и местом?
  - id: sf_haight_vintage
    name: Винтаж Хейт-Эшбери
    prompt: |
      Хейт-Эшбери — музей 1960-х. Найдите здание, которое не изменилось. Что
      сохранено? Что является исполнением?
    follow_ups:
      - Какой была бы улица без винтажа?
      - Как история формирует торговлю?
      - Каковы отношения между прошлым и настоящим?
  - id: sf_sutro_tower
    name: Башня Сутро
    prompt: |
      Башня Сутро видна отовсюду. Используйте ее как компас. Как башня
      ориентирует вас? Какой была бы городская панорама без нее?
    follow_ups:
      - Что транслирует башня?
      - Как башня формирует идентичность?
      - Каковы отношения между башней и видом?
  - id: sf_bart_underground
    name: BART Подземный
    prompt: |
      Поезжайте на BART под заливом. Вы в трубе под водой. Почувствуйте давление,
      темноту, появление. Как тоннель меняет путешествие?
    follow_ups:
      - Каким был бы маршрут без тоннеля?
      - Как залив разделяет?
      - Каковы отношения между тоннелем и регионом?
  - id: sf_taquería_line
    name: Очередь в Такерию
    prompt: |
      Встаньте в очередь в такерию в полночь. Очередь — это ритуал. Кто в ней?
      Что они заказывают? Очередь — это сообщество.
    follow_ups:
      - Каким был бы квартал без такерии?
      - Как очередь создает встречу?
      - Каковы отношения между едой и местом?
  - id: sf_dolores_sun
    name: Солнце на Долорес
    prompt: |
      Парк Долорес обращен на запад. В солнечный день это пляж. Наблюдайте за
      толпой. Как солнце формирует парк? Кто получает лучшие места?
    follow_ups:
      - Каким был бы парк без солнца?
      - Важен ли аспект?
      - Каковы отношения между парком и погодой?
  - id: sf_mission_door
    name: Дверь Миссии
    prompt: |
      Двери в Миссии часто бывают богато украшены — резные, крашеные, уникальные.
      Найдите пять дверей в одном квартале. Что они говорят о зданиях за ними?
    follow_ups:
      - Каким был бы квартал без дверей?
      - Как дверь создает идентичность?
      - Каковы отношения между дверью и порогом?
  - id: sf_coit_tower
    name: Башня Койт
    prompt: |
      Башня Койт венчает Телеграфный холм. Это памятник, смотровая площадка, ориентир.
      Как башня формирует холм? Какой был бы холм без нее?
    follow_ups:
      - Что увековечивает башня?
      - Как башня ориентирует город?
      - Каковы отношения между башней и районом?
  - id: sf_lombard_curve
    name: Изгиб Ломбард-стрит
    prompt: |
      Улица Ломбард извивается вниз по холму. Она знаменита своими зигзагами. Пройдите по ней. Как изгиб меняет спуск? Что бы сделала прямая улица?
    follow_ups:
      - Каким был бы холм без изгиба?
      - Как изгиб формирует опыт?
      - Каковы отношения между изгибом и безопасностью?
  - id: sf_alcatraz_silhouette
    name: Силуэт Алькатраса
    prompt: |
      С набережной Алькатрас — это силуэт. Остров всегда там, всегда на
      расстоянии. Что он означает для города?
    follow_ups:
      - Каким был бы залив без острова?
      - Как остров формирует вид?
      - Каковы отношения между тюрьмой и городом?
  - id: sf_ghost_sign
    name: Призрачная Вывеска
    prompt: |
      Призрачные вывески — выцветшие рекламные объявления на кирпиче — отмечают
      прошлое. Найдите одну. Что она рекламировала? Кто бы ее видел?
    follow_ups:
      - Что бы сказала стена без вывески?
      - Как призрачная вывеска сохраняет историю?
      - Каковы отношения между вывеской и торговлей?
  - id: sf_sf_sidewalk
    name: Тротуар Сан-Франциско
    prompt: |
      Тротуары Сан-Франциско часто треснувшие, наклонные, с выступающими
      корнями деревьев. Пройдите квартал и обратите внимание на текстуру. Как
      стареет тротуар?
    follow_ups:
      - Каким был бы квартал без тротуара?
      - Как тротуар формирует движение?
      - Каковы отношения между тротуаром и деревом?
  - id: sf_golden_gate_fog
    name: Туман над Золотыми Воротами
    prompt: |
      Мост Золотые Ворота исчезает в тумане. Наблюдайте, как он исчезает и
      появляется снова. Туман — это занавес. Что за ним?
    follow_ups:
      - Каким был бы мост без тумана?
      - Как туман формирует вид?
      - Каковы отношения между туманом и мостом?
  - id: sf_mission_dolores
    name: Миссия Долорес
    prompt: |
      Миссия Долорес — самое старое здание в городе. Встаньте перед ним. Что
      оно видело? Как оно отмечает время?
    follow_ups:
      - Каким был бы район без миссии?
      - Как миссия формирует идентичность?
      - Каковы отношения между миссией и городом?
  - id: sf_painted_steps
    name: Раскрашенные Ступени
    prompt: |
      Пятнадцатая авеню — это мозаичные ступени. Поднимитесь по ним. Каждая
      ступень уникальна. Как искусство меняет подъем?
    follow_ups:
      - Какими были бы ступени без плитки?
      - Как мозаика создает сообщество?
      - Каковы отношения между искусством и подъемом?
  - id: sf_sf_street_tree
    name: Уличное Дерево Сан-Франциско
    prompt: |
      Уличные деревья Сан-Франциско часто пальмы, магнолии или фикусы. Найдите
      одно и идентифицируйте его. Как дерево формирует квартал?
    follow_ups:
      - Каким был бы квартал без дерева?
      - Как дерево создает среду обитания?
      - Каковы отношения между деревом и тротуаром?
  - id: sf_sf_bay_window
    name: Эркер Сан-Франциско
    prompt: |
      Эркеры — это vernacular Сан-Франциско. Они выступают на улицу, ловя
      свет. Как эркер меняет комнату?
    follow_ups:
      - Каким был бы фасад без эркера?
      - Как эркер создает отношения с улицей?
      - Каковы отношения между эркером и видом?
  - id: sf_sf_hill
    name: Холм Сан-Франциско
    prompt: |
      Выберите холм и поднимитесь по нему. Почувствуйте жжение. На вершине
      оглянитесь. Как подъем меняет то, что вы видите?
    follow_ups:
      - Каким был бы город без холмов?
      - Как холмы формируют районы?
      - Каковы отношения между холмом и видом?
  - id: sf_sf_fog
    name: Туман Сан-Франциско
    prompt: |
      У тумана есть имя — Карл. Это местная знаменитость. Когда Карл накатывает,
      как меняется город? Что скрывается? Что раскрывается?
    follow_ups:
      - Каким был бы город без Карла?
      - Как туман формирует идентичность?
      - Каковы отношения между туманом и светом?
  - id: sf_sf_cable
    name: Кабель Сан-Франциско
    prompt: |
      Канатный трамвай работает на кабеле под улицей. Вы его не видите, но
      слышите. Как скрытый кабель формирует видимый город?
    follow_ups:
      - Каким был бы холм без кабеля?
      - Как кабель создает связь?
      - Каковы отношения между кабелем и улицей?
  - id: sf_sf_victorian
    name: Викторианский Дом Сан-Франциско
    prompt: |
      Викторианские дома бывают парами — два дома на одном участке. Найдите
      пару. Как они связаны? Каким был бы один без другого?
    follow_ups:
      - Каким был бы квартал без пары?
      - Как пара создает ритм?
      - Каковы отношения между парой и участком?
  - id: sf_sf_mission
    name: Район Миссии Сан-Франциско
    prompt: |
      Район Миссии назван в честь Миссии Долорес. Пройдитесь по улице и
      почувствуйте слои — испанские, мексиканские, ирландские,
      центральноамериканские. Какой это палимпсест?
    follow_ups:
      - Каким был бы район без слоев?
      - Как миссия формирует идентичность?
      - Каковы отношения между миссией и миграцией?
  - id: sf_sf_bridge
    name: Мост Сан-Франциско
    prompt: |
      Бэй-Бридж менее известен, чем Золотые Ворота, но используется больше.
      Пересеките его или посмотрите на него. Как мост соединяет? Что он везет?
    follow_ups:
      - Каким был бы залив без моста?
      - Как мост формирует регион?
      - Каковы отношения между мостом и маршрутом?
  - id: sf_sf_parks
    name: Парки Сан-Франциско
    prompt: |
      В Сан-Франциско много маленьких парков — карманные парки, треугольные
      парки. Найдите один. Кто им пользуется? Каков его характер?
    follow_ups:
      - Каким был бы район без парка?
      - Как парк создает передышку?
      - Каковы отношения между парком и кварталом?
  - id: sf_sf_stairs
    name: Лестницы Сан-Франциско
    prompt: |
      В Сан-Франциско более 600 общественных лестниц. Найдите одну, по которой
      вы никогда не поднимались. Что наверху? Что внизу?
    follow_ups:
      - Каким был бы холм без лестниц?
      - Как лестницы создают короткие пути?
      - Каковы отношения между лестницами и районом?
  - id: sf_sf_mural
    name: Мурал Сан-Франциско
    prompt: |
      В районе Миссии больше муралов на душу населения, чем где-либо в США.
      Найдите один, который рассказывает историю. Каков сюжет? Для кого он?
    follow_ups:
      - Какой была бы стена без мурала?
      - Как мурал занимает пространство?
      - Каковы отношения между муралом и сообществом?
  - id: sf_sf_water
    name: Вода Сан-Франциско
    prompt: |
      Сан-Франциско окружен водой — залив, океан, пролив. Подойдите к краю.
      Что означает вода для города? Как она формирует край?
    follow_ups:
      - Каким был бы город без воды?
      - Как вода формирует идентичность?
      - Каковы отношения между водой и городом?
  - id: sf_sf_sunset
    name: Закат Сан-Франциско
    prompt: |
      Закаты Сан-Франциско знамениты. Наблюдайте один с холма. Свет меняет
      город. Каким был бы вид без заката?
    follow_ups:
      - Как закат формирует вечер?
      - Каковы отношения между закатом и видом?
      - Что бы вы упустили без света?
  - id: sf_sf_wind
