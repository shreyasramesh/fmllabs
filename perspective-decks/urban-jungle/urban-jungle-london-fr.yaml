    follow_ups:
      - Comment la station crée-t-elle de l'ordre ?
      - Quelle est la relation entre le taxi et la connaissance ?
      - Que demanderiez-vous à un chauffeur de taxi ?
  - id: london_pub_window
    name: Fenêtre de Pub
    prompt: |
      Les fenêtres de pub sont souvent à petits carreaux, souvent petites. Regardez à travers une. Quelle
