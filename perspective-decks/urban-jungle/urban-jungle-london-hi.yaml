# शहरी जंगल — लंदन (Hindi)

id: urban_jungle_london
name: शहरी जंगल — लंदन
description: 50 कार्ड जो लंदन को देखने के तरीके को बदलते हैं - पैमाने और प्रकाश से लेकर इतिहास की परतों और सड़क जीवन की लय तक।
domain: urban_jungle
cards:
  - id: london_layer
    name: लंदन परत
    prompt: |
      लंदन परतों में बना है - रोमन, मध्ययुगीन, विक्टोरियन, आधुनिक। ऐसी जगह खोजें जहाँ युग टकराते हों। आपको सबसे पुरानी चीज़ क्या दिखती है? सबसे नई?
    follow_ups:
      - परतों के बिना सड़क कैसी होगी?
      - इतिहास निर्मित रूप में कैसे प्रकट होता है?
      - परत और पहचान के बीच क्या संबंध है?
  - id: london_pub_threshold
    name: पब की चौखट
    prompt: |
      लंदन के पब की एक चौखट होती है - ऊपर की सीढ़ी, दरवाज़ा, बार। चौखट पर खड़े हो जाइए। अंदर क्या है? बाहर क्या है? पब शहर का एक कमरा है।
    follow_ups:
      - पब के बिना ब्लॉक कैसा होगा?
      - चौखट संक्रमण कैसे बनाती है?
      - पब और सड़क के बीच क्या संबंध है?
  - id: london_blue_plaque
    name: नीली पट्टिका
    prompt: |
      नीली पट्टिकाएं उस जगह को चिह्नित करती हैं जहाँ कोई प्रसिद्ध व्यक्ति रहता था। एक खोजें। यहाँ कौन रहता था? उन्होंने क्या किया? पट्टिका इतिहास को दृश्यमान बनाती है।
    follow_ups:
      - पट्टिका के बिना इमारत कैसी होगी?
      - पट्टिका स्मृति को कैसे आकार देती है?
      - पट्टिका और स्थान के बीच क्या संबंध है?
  - id: london_underground
    name: भूमिगत
    prompt: |
      ट्यूब शहर के नीचे एक शहर है। नीचे उतरें। टाइलों, नक्शों, एस्केलेटर पर ध्यान दें। भूमिगत ऊपर को कैसे आकार देता है?
    follow_ups:
      - ट्यूब के बिना लंदन कैसा होगा?
      - भूमिगत जुड़ाव कैसे बनाता है?
      - ट्यूब और सतह के बीच क्या संबंध है?
  - id: london_thames_edge
    name: थेम्स का किनारा
    prompt: |
      थेम्स लंदन से होकर बहती है। तटबंध पर जाएँ। नदी एक सीम है। दोनों तरफ क्या है? नदी कैसे विभाजित और जोड़ती है?
    follow_ups:
      - थेम्स के बिना लंदन कैसा होगा?
      - नदी शहर को कैसे आकार देती है?
      - नदी और किनारे के बीच क्या संबंध है?
  - id: london_georgian_row
    name: जॉर्जियाई पंक्ति
    prompt: |
      जॉर्जियाई छतों की पंक्तियाँ दोहराती हैं - दरवाज़ा, खिड़की, दरवाज़ा, खिड़की। एक पंक्ति में चलें। पुनरावृत्ति ताल पैदा करती है। क्या इसे तोड़ता है? क्या इसे एक साथ रखता है?
    follow_ups:
      - पंक्ति के बिना सड़क कैसी होगी?
      - पुनरावृत्ति पहचान कैसे बनाती है?
      - पंक्ति और व्यक्ति के बीच क्या संबंध है?
  - id: london_mews
    name: म्यूज
    prompt: |
      म्यूज अस्तबल थे, अब वे घर हैं। एक खोजें। संकरी गली, कोबलस्टोन, परिवर्तित कोच हाउस। अतीत कैसे बना रहता है?
    follow_ups:
      - इतिहास के बिना म्यूज कैसा होगा?
      - म्यूज गोपनीयता कैसे बनाता है?
      - म्यूज और मुख्य सड़क के बीच क्या संबंध है?
  - id: london_phone_box
    name: फ़ोन बॉक्स
    prompt: |
      लाल फ़ोन बॉक्स आइकन हैं। एक खोजें। क्या यह अभी भी एक फ़ोन है? एक डिफाइब्रिलेटर? एक पुस्तकालय? आइकन को कैसे पुन: उपयोग किया जाता है?
    follow_ups:
      - बॉक्स के बिना सड़क कैसी होगी?
      - बॉक्स ब्रिटिशनेस को कैसे चिह्नित करता है?
      - बॉक्स और कार्य के बीच क्या संबंध है?
  - id: london_postbox
    name: पोस्टबॉक्स
    prompt: |
      लाल पोस्टबॉक्स हर जगह हैं। एक खोजें। शाही साइफर पर ध्यान दें। पोस्टबॉक्स एक नेटवर्क में एक नोड है। इसमें से क्या बहता है?
    follow_ups:
      - पोस्टबॉक्स के बिना सड़क कैसी होगी?
      - पोस्टबॉक्स क्षेत्र को कैसे चिह्नित करता है?
      - पोस्टबॉक्स और पत्र के बीच क्या संबंध है?
  - id: london_pavement
    name: फुटपाथ
    prompt: |
      ब्रिटिश "pavement" अमेरिकी "sidewalk" है। यह शब्द हमारे सोचने के तरीके को आकार देता है। फुटपाथ पर चलें। फुटपाथ और सड़क के बीच क्या संबंध है?
    follow_ups:
      - फुटपाथ के बिना सड़क कैसी होगी?
      - फुटपाथ सुरक्षा कैसे बनाता है?
      - फुटपाथ और पैदल यात्री के बीच क्या संबंध है?
  - id: london_brick
    name: लंदन ईंट
    prompt: |
      लंदन की ईंटें अक्सर पीली या लाल होती हैं - लंदन स्टॉक। एक ईंट की दीवार खोजें और रंग, बनावट, बंधन का अध्ययन करें। ईंट कैसे पुरानी होती है?
    follow_ups:
      - ईंट के बिना इमारत कैसी होगी?
      - ईंट पहचान कैसे बनाती है?
      - ईंट और स्थान के बीच क्या संबंध है?
  - id: london_weather
    name: लंदन का मौसम
    prompt: |
      लंदन का मौसम परिवर्तनशील है। बीस मिनट तक एक ही स्थान पर खड़े रहें। आकाश को देखें। मौसम शहर के मूड को कैसे आकार देता है?
    follow_ups:
      - बारिश के बिना लंदन कैसा होगा?
      - मौसम वास्तुकला को कैसे आकार देता है?
      - मौसम और सड़क जीवन के बीच क्या संबंध है?
  - id: london_queue
    name: कतार
    prompt: |
      ब्रिटिश कतार में लगते हैं। एक कतार खोजें - बस, दुकान, आकर्षण। शिष्टाचार का निरीक्षण करें। कतार व्यवस्था का एक रूप है। यह कैसे काम करती है?
    follow_ups:
      - कतार के बिना जगह कैसी होगी?
      - कतार निष्पक्षता कैसे बनाती है?
      - कतार और संस्कृति के बीच क्या संबंध है?
  - id: london_roundabout
    name: गोलचक्कर
    prompt: |
      लंदन में कई गोलचक्कर हैं - ट्रैफिक सर्कल। एक देखें। यातायात कैसे बहता है? तर्क क्या है? गोलचक्कर एक नोड है।
    follow_ups:
      - गोलचक्कर के बिना चौराहा कैसा होगा?
      - गोलचक्कर प्रवाह को कैसे आकार देता है?
      - गोलचक्कर और जंक्शन के बीच क्या संबंध है?
  - id: london_parks_room
    name: पार्क कमरा
    prompt: |
      लंदन के पार्क कमरे हैं - हाइड पार्क, रीजेंट्स पार्क, चौक। एक में प्रवेश करें। सीमाओं, रास्तों, फर्नीचर पर ध्यान दें। प्रकृति को कैसे डिजाइन किया जाता है?
    follow_ups:
      - पार्कों के बिना लंदन कैसा होगा?
      - पार्क राहत कैसे बनाता है?
      - पार्क और शहर के बीच क्या संबंध है?
  - id: london_square
    name: लंदन स्क्वायर
    prompt: |
      लंदन के चौक अक्सर निजी होते हैं - गेटेड, चाबी वाले। एक खोजें। अंदर क्या है? किसकी पहुँच है? चौक विशिष्टता का एक पॉकेट है।
    follow_ups:
      - चौक के बिना पड़ोस कैसा होगा?
      - चौक समुदाय कैसे बनाता है?
      - चौक और सड़क के बीच क्या संबंध है?
  - id: london_terrace
    name: छज्जा
    prompt: |
      एक छज्जा घरों की एक पंक्ति है। एक में चलें। एकरूपता और भिन्नता पर ध्यान दें। छज्जा पहचान कैसे बनाता है?
    follow_ups:
      - छज्जे के बिना सड़क कैसी होगी?
      - छज्जा ताल कैसे बनाता है?
      - छज्जा और व्यक्ति के बीच क्या संबंध है?
  - id: london_corner_shop
    name: नुक्कड़ की दुकान
    prompt: |
      नुक्कड़ की दुकान एक लंदन संस्था है। एक में प्रवेश करें। क्या बिक रहा है? कौन चलाता है? दुकान पड़ोस में एक नोड है।
    follow_ups:
      - दुकान के बिना ब्लॉक कैसा होगा?
      - दुकान मुठभेड़ कैसे बनाती है?
      - दुकान और समुदाय के बीच क्या संबंध है?
  - id: london_bus_route
    name: बस मार्ग
    prompt: |
      लंदन की बसों के नंबर और गंतव्य होते हैं। एक ऐसी बस लें जो आपने पहले कभी नहीं ली हो। यह कहाँ जाती है? मार्ग शहर को कैसे आकार देता है?
    follow_ups:
      - बस के बिना यात्रा कैसी होगी?
      - मार्ग जुड़ाव कैसे बनाता है?
      - बस और पड़ोस के बीच क्या संबंध है?
  - id: london_clock
    name: लंदन घड़ी
    prompt: |
      बिग बेन, स्टेशन पर घड़ी, चर्च पर घड़ी। लंदन सार्वजनिक घड़ियों से भरा है। एक खोजें। यह कौन सा समय बताती है? क्या यह सही है?
    follow_ups:
      - घड़ी के बिना जगह कैसी होगी?
      - घड़ी समय को कैसे आकार देती है?
      - घड़ी और स्थान के बीच क्या संबंध है?
  - id: london_bridge
    name: लंदन ब्रिज
    prompt: |
      लंदन में कई पुल हैं - टॉवर ब्रिज, मिलेनियम ब्रिज, वाटरलू। पैदल एक पार करें। संक्रमण को महसूस करें। क्या बदलता है?
    follow_ups:
      - पुल के बिना नदी कैसी होगी?
      - पुल कैसे जोड़ता है?
      - पुल और नदी के बीच क्या संबंध है?
  - id: london_street_market
    name: स्ट्रीट मार्केट
    prompt: |
      लंदन में स्ट्रीट मार्केट हैं - बरो, कैम्डेन, पोर्टोबेलो। एक में चलें। क्या बिक रहा है? कौन बेच रहा है? बाजार एक अस्थायी शहर है।
    follow_ups:
      - बाजार के बिना सड़क कैसी होगी?
      - बाजार मुठभेड़ कैसे बनाता है?
      - बाजार और पड़ोस के बीच क्या संबंध है?
  - id: london_ghost_sign
    name: लंदन घोस्ट साइन
    prompt: |
      ईंटों पर फीके पड़े संकेत - घोस्ट साइन - अतीत को चिह्नित करते हैं। एक खोजें। यह क्या विज्ञापन करता था? इसे कौन देखता?
    follow_ups:
      - साइन के बिना दीवार कैसी होगी?
      - घोस्ट साइन इतिहास को कैसे संरक्षित करता है?
      - साइन और वाणिज्य के बीच क्या संबंध है?
  - id: london_bollard
    name: बोलार्ड
    prompt: |
      बोलार्ड सीमाएं चिह्नित करते हैं - पैदल यात्री क्षेत्र, पार्किंग नहीं। बोलार्ड की एक पंक्ति खोजें। वे क्या सुरक्षित रख रहे हैं? वे क्या बाहर कर रहे हैं?
    follow_ups:
      - बोलार्ड के बिना जगह कैसी होगी?
      - बोलार्ड प्रवाह को कैसे आकार देते हैं?
      - बोलार्ड और सीमा के बीच क्या संबंध है?
  - id: london_door_number
    name: दरवाज़ा नंबर
    prompt: |
      लंदन के पते अजीब हो सकते हैं - एक तरफ विषम, दूसरी तरफ सम। संख्याओं का पालन करें। नंबरिंग सड़क को कैसे आकार देती है?
    follow_ups:
      - नंबरों के बिना वेफाइंडिंग कैसी होगी?
      - नंबरिंग व्यवस्था कैसे बनाती है?
      - नंबर और स्थान के बीच क्या संबंध है?
  - id: london_basement
    name: लंदन बेसमेंट
    prompt: |
      लंदन के घरों में अक्सर बेसमेंट होते हैं - कभी-कभी सड़क स्तर के नीचे। नीचे की सीढ़ियों, सामने के क्षेत्र पर ध्यान दें। फुटपाथ के नीचे क्या है?
    follow_ups:
      - बेसमेंट के बिना घर कैसा होगा?
      - बेसमेंट जगह कैसे बनाता है?
      - बेसमेंट और सड़क के बीच क्या संबंध है?
  - id: london_roof_line
    name: छत रेखा
    prompt: |
      लंदन की छत रेखाएँ विविध हैं - स्लेट, टाइल, सपाट। ऊपर देखें। क्षितिज को ट्रेस करें। छत सड़क को कैसे आकार देती है?
    follow_ups:
      - छतों के बिना सड़क कैसी होगी?
      - छत रेखा पहचान कैसे बनाती है?
      - छत और आकाश के बीच क्या संबंध है?
  - id: london_cobble
    name: कोबल
    prompt: |
      कुछ सड़कों पर कोबलस्टोन बने रहते हैं। उन पर चलें। बनावट महसूस करें। सतह सड़क को कैसे आकार देती है?
    follow_ups:
      - कोबल्स के बिना सड़क कैसी होगी?
      - कोबल्स इतिहास को कैसे चिह्नित करते हैं?
      - कोबल और आधुनिकता के बीच क्या संबंध है?
  - id: london_lamp_post
    name: लैंप पोस्ट
    prompt: |
