id: urban_jungle_bangalore
name: ನಗರ ಕಾಡು — ಬೆಂಗಳೂರು
description: ಬೆಂಗಳೂರನ್ನು ನೋಡುವ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಾಯಿಸಲು 50 ಕಾರ್ಡ್‌ಗಳು—ಪ್ರಮಾಣ ಮತ್ತು ಬೆಳಕಿನಿಂದ ಹಿಡಿದು ಇತಿಹಾಸದ ಪದರಗಳು ಮತ್ತು ಬೀದಿ ಜೀವನದ ಲಯಗಳವರೆಗೆ.
