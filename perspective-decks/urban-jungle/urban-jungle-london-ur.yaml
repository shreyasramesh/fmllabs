    follow_ups:
      - تہہ کے بغیر سڑک کیسی ہوگی؟
      - تعمیر شدہ شکل میں تاریخ کیسے نظر آتی ہے؟
      - تہہ اور شناخت کے درمیان کیا تعلق ہے؟
