# اربن جنگل — لندن (Urdu)

id: urban_jungle_london
name: اربن جنگل — لندن
description: 50 کارڈز جو آپ کے لندن کو دیکھنے کے انداز کو بدل دیں — پیمانے اور روشنی سے لے کر تاریخ کی تہوں اور سڑک کی زندگی کی تال تک۔
domain: urban_jungle
