# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Міські Джунглі — Сан-Франциско (Ukrainian)

id: urban_jungle_san_francisco
name: Міські Джунглі — Сан-Франциско
description: 50 карток, щоб змінити ваш погляд на Сан-Франциско — від масштабу та світла до шарів історії та ритмів вуличного життя.
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: Нахил вулиці
    prompt: |
      Сан-Франциско збудований на схилах. Відчуйте нахил під ногами. Як
      нахил змінює те, що ви помічаєте? Де місто нахиляється?
    follow_ups:
      - Як би виглядала вулиця, якби вона була рівною?
      - Як пагорби формують райони?
      - Який найкрутіший квартал ви подолали?
  - id: sf_fog_layer
    name: Шар туману
    prompt: |
      Насувається туман. Спостерігайте, як він рухається — над мостом,
      вниз по пагорбах. Туман — це персонаж. Як він змінює світло? Звук?
    follow_ups:
      - Яким би було місто без туману?
      - Як туман позначає час?
      - Де зупиняється туман?
  - id: sf_cable_car_track
    name: Рейки трамваю
    prompt: |
      Йдіть уздовж рейок трамваю. Щілина в тротуарі, гул кабелю.
      Трамвай — це реліквія, яка все ще працює. Що він везе?
    follow_ups:
      - Якою була б вулиця без рейок?
      - Як трамвай формує туризм?
      - Який зв'язок між рейками та вулицею?
  - id: sf_victorian_detail
    name: Вікторіанська деталь
    prompt: |
      Вікторіанські будинки Сан-Франциско пишні — "пряничні", еркерні вікна,
      кольори. Знайдіть один і прочитайте його деталі. Яку історію розповідає
      орнамент?
    follow_ups:
      - Яким був би будинок без деталей?
      - Як колір змінює вулицю?
      - Який зв'язок між вікторіанським стилем і сучасністю?
  - id: sf_painted_lady
    name: Розписна леді
    prompt: |
      "Розписні леді" знамениті, але кожен вікторіанський будинок має свою
      палітру. Зберіть п'ять колірних комбінацій з одного кварталу. Що кажуть
      ці кольори?
    follow_ups:
      - Чому саме ці кольори?
      - Як фарба зберігає або трансформує?
      - Як би виглядав квартал у відтінках сірого?
  - id: sf_bay_window
    name: Еркерне вікно
    prompt: |
      Еркерні вікна виступають на вулицю. Вони призначені для світла, для
      виду, для демонстрації. Станьте перед одним. Що б ви побачили зсередини?
    follow_ups:
      - Як еркер змінює кімнату?
      - Якою була б фасадна частина без нього?
      - Як еркерні вікна створюють зв'язок з вулицею?
  - id: sf_stairway_street
    name: Вулиця-драбина
    prompt: |
      У Сан-Франциско є сходи, які є вулицями — сходинки замість мостової.
      Підніміться по одній. Як драбина змінює район?
    follow_ups:
      - Хто користується цими сходами?
      - Яким був би пагорб без них?
      - Як сходи створюють спільноту?
  - id: sf_mission_mural
    name: Мурал Місії
    prompt: |
      Місіонський район — це галерея муралів. Знайдіть один і прочитайте його.
      Яка історія? Хто його намалював? Для кого він?
    follow_ups:
      - Що б сказала стіна без муралу?
      - Як мурали захоплюють простір?
      - Який зв'язок між муралом і районом?
  - id: sf_earthquake_retrofit
    name: Посилення від землетрусу
    prompt: |
      Шукайте посилення від землетрусу — болти, кронштейни, фундаменти.
      Місто пам'ятає 1906 та 1989 роки. Як страх формує забудоване
      середовище?
    follow_ups:
      - Якою була б будівля без посилення?
      - Як проявляється сейсмічне проєктування?
      - Який зв'язок між посиленням і довірою?
  - id: sf_dolores_palm
    name: Пальма Долорес
    prompt: |
      Пальми висаджені вздовж вулиці Долорес. Вони не місцеві, але
      культові. Що вони говорять про стосунки міста з іншими місцями?
    follow_ups:
      - Якою була б вулиця без пальм?
      - Як пальми позначають ідентичність?
      - Який зв'язок між пальмою та місцем?
  - id: sf_twin_peaks_view
    name: Вид з Твін-Пікс
    prompt: |
      Уявіть краєвид з Твін-Пікс. Місто розкинулося внизу — сітка,
      вода, мости. Як висота змінює те, що має значення?
    follow_ups:
      - Що б ви побачили звідти?
      - Як вид формує імідж міста?
      - Що приховано з вершини?
  - id: sf_ferry_building
    name: Будівля поромного терміналу
    prompt: |
      Будівля поромного терміналу виходить до затоки. Це поріг — суша і
      вода, місто і транспорт. Станьте біля її входу. Що тут проходить?
    follow_ups:
      - Якою була б набережна без неї?
      - Як будівля позначає перехід?
      - Який зв'язок між поромом і містом?
  - id: sf_chinatown_gate
    name: Брама Чайнатауну
    prompt: |
      Брама Дракона позначає Чайнатаун. Пройдіть крізь неї. Що змінюється?
      Брама — це одночасно реальне і символічне. Як вона працює?
    follow_ups:
      - Яким був би Чайнатаун без брами?
      - Як брама створює ідентичність?
      - Який зв'язок між брамою та районом?
  - id: sf_hydrant_color
    name: Колір пожежного гідранта
    prompt: |
      Пожежні гідранти Сан-Франциско мають різні кольори — синій, зелений,
      червоний. Колір вказує на потік води. Знайдіть три кольори. Що означає
      кожен?
    follow_ups:
      - Що б робив квартал під час пожежі?
      - Як колір кодує інформацію?
      - Який зв'язок між гідрантом і системою?
  - id: sf_parklet
    name: Парклет
    prompt: |
      Парклети відвойовують паркувальні місця для людей. Сядьте в одному.
      Які там меблі? Хто ними користується? Як парклет змінює квартал?
    follow_ups:
      - Яким був би простір без парклета?
      - Як парклет створює зустрічі?
      - Що б ви додали?
  - id: sf_sf_street_sign
    name: Вуличний знак Сан-Франциско
    prompt: |
      Вуличні знаки Сан-Франциско мають особливий стиль. Зверніть увагу на
      шрифт, кріплення, розміщення. Як знак формує навігацію?
    follow_ups:
      - Яким був би квартал без знака?
      - Чому типіграфіка важлива?
      - Який зв'язок між знаком і ідентичністю?
  - id: sf_castro_rainbow
    name: Райдуга Кастро
    prompt: |
      У Кастро майорять райдужні прапори. Пройдіться вулицею і порахуйте
      прапори. Як прапор захоплює простір? Що він означає тут?
    follow_ups:
      - Яким був би район без прапорів?
      - Як прапор створює спільноту?
      - Який зв'язок між символом і місцем?
  - id: sf_haight_vintage
    name: Вінтаж Хейт-Ешбері
    prompt: |
      Хейт-Ешбері — це музей 1960-х. Знайдіть будівлю, яка не
      змінилася. Що збереглося? Що є перформансом?
    follow_ups:
      - Якою була б вулиця без вінтажу?
      - Як історія формує комерцію?
      - Який зв'язок між минулим і сьогоденням?
  - id: sf_sutro_tower
    name: Вежа Сутро
    prompt: |
      Вежу Сутро видно звідусіль. Використовуйте її як компас. Як вежа
      орієнтує вас? Якою була б міська панорама без неї?
    follow_ups:
      - Що транслює вежа?
      - Як вежа формує ідентичність?
      - Який зв'язок між вежею та краєвидом?
  - id: sf_bart_underground
    name: Підземка BART
    prompt: |
      Їдьте BART під затокою. Ви в тунелі під водою. Відчуйте тиск,
      темряву, появу. Як тунель змінює подорож?
    follow_ups:
      - Якою була б поїздка без тунелю?
      - Як затока розділяє?
      - Який зв'язок між тунелем і регіоном?
  - id: sf_taquería_line
    name: Черга в такерії
    prompt: |
      Приєднуйтесь до черги в такерії опівночі. Черга — це ритуал. Хто в
      ній? Що вони замовляють? Черга — це спільнота.
    follow_ups:
      - Яким був би квартал без такерії?
      - Як черга створює зустрічі?
      - Який зв'язок між їжею та місцем?
  - id: sf_dolores_sun
    name: Сонце Долорес
    prompt: |
      Парк Долорес виходить на захід. У сонячний день це пляж. Спостерігайте
      за натовпом. Як сонце формує парк? Хто отримує найкращі місця?
    follow_ups:
      - Яким був би парк без сонця?
      - Чому важливий аспект?
      - Який зв'язок між парком і погодою?
  - id: sf_mission_door
    name: Двері Місії
    prompt: |
      Двері Місії часто бувають витіюватими — різьблені, пофарбовані,
      унікальні. Знайдіть п'ять дверей на одному кварталі. Що вони говорять
      про будинки за ними?
    follow_ups:
      - Яким був би квартал без дверей?
      - Як двері створюють ідентичність?
      - Який зв'язок між дверима та порогом?
  - id: sf_coit_tower
    name: Вежа Койт
    prompt: |
      Вежа Койт вінчає Телеграфний пагорб. Це пам'ятник, оглядовий майданчик, орієнтир.
      Як вежа формує пагорб? Яким був би пагорб без неї?
    follow_ups:
      - Що увічнює вежа?
      - Як вежа орієнтує місто?
      - Який зв'язок між вежею та районом?
  - id: sf_lombard_curve
    name: Вигин Ломбард
    prompt: |
      Вулиця Ломбард звивається вниз схилом. Вона знаменита своїми серпантинами. Пройдіть її. Як вигин змінює спуск? Що б робила пряма вулиця?
    follow_ups:
      - Яким був би пагорб без вигину?
      - Як вигин формує досвід?
      - Який зв'язок між вигином і безпекою?
  - id: sf_alcatraz_silhouette
    name: Силует Алькатраса
    prompt: |
      З набережної Алькатрас — це силует. Острів завжди там, завжди
      далеко. Що він означає для міста?
    follow_ups:
      - Якою була б затока без острова?
      - Як острів формує краєвид?
      - Який зв'язок між в'язницею та містом?
  - id: sf_ghost_sign
    name: Примарний знак
    prompt: |
      Примарні знаки — вицвілі реклами на цегляних стінах — позначають
      минуле. Знайдіть один. Що він рекламував? Хто б його бачив?
    follow_ups:
      - Що б сказала стіна без знака?
      - Як примарний знак зберігає історію?
      - Який зв'язок між знаком і комерцією?
  - id: sf_sf_sidewalk
    name: Тротуар Сан-Франциско
    prompt: |
      Тротуари Сан-Франциско часто потріскані, нахилені, з корінням дерев.
      Пройдіться кварталом і помітьте текстуру. Як старіє тротуар?
    follow_ups:
      - Яким був би квартал без тротуару?
      - Як тротуар формує рух?
      - Який зв'язок між тротуаром і деревом?
  - id: sf_golden_gate_fog
    name: Туман над Золотими Воротами
    prompt: |
      Міст Золоті Ворота зникає в тумані. Спостерігайте, як він зникає і
      з'являється знову. Туман — це завіса. Що за нею?
    follow_ups:
      - Яким був би міст без туману?
      - Як туман формує краєвид?
      - Який зв'язок між туманом і мостом?
  - id: sf_mission_dolores
    name: Місія Долорес
    prompt: |
      Місія Долорес — найстаріша будівля в місті. Станьте перед нею.
      Що вона бачила? Як вона позначає час?
    follow_ups:
      - Яким був би район без місії?
      - Як місія формує ідентичність?
      - Який зв'язок між місією та містом?
  - id: sf_painted_steps
    name: Розфарбовані сходи
    prompt: |
      Плитка на 16-й авеню — це мозаїка. Підніміться по ній. Кожна
      сходинка відрізняється. Як мистецтво змінює підйом?
    follow_ups:
      - Якими були б сходи без плитки?
      - Як мозаїка створює спільноту?
      - Який зв'язок між мистецтвом і підйомом?
  - id: sf_sf_street_tree
    name: Вуличне дерево Сан-Франциско
    prompt: |
      Сан-Францизькі вуличні дерева — це часто пальми, магнолії або фікуси.
      Знайдіть одне і визначте його. Як дерево формує квартал?
    follow_ups:
      - Яким був би квартал без дерева?
      - Як дерево створює середовище існування?
      - Який зв'язок між деревом і тротуаром?
  - id: sf_sf_bay_window
    name: Еркер Сан-Франциско
    prompt: |
      Еркерні вікна — це сан-францизька архітектура. Вони виступають на
      вулицю, вловлюючи світло. Як еркерне вікно змінює кімнату?
    follow_ups:
      - Якою була б фасадна частина без еркера?
      - Як еркер створює зв'язок з вулицею?
      - Який зв'язок між еркером і краєвидом?
  - id: sf_sf_hill
    name: Пагорб Сан-Франциско
    prompt: |
      Виберіть пагорб і підніміться на нього. Відчуйте печіння. На вершині
      подивіться назад. Як підйом змінює те, що ви бачите?
    follow_ups:
      - Яким було б місто без пагорбів?
      - Як пагорби формують райони?
      - Який зв'язок між пагорбом і краєвидом?
  - id: sf_sf_fog
    name: Туман Сан-Франциско
    prompt: |
      Туман має ім'я — Карл. Це місцева знаменитість. Коли Карл насувається,
      як змінюється місто? Що ховається? Що розкривається?
    follow_ups:
      - Яким було б місто без Карла?
      - Як туман формує ідентичність?
      - Який зв'язок між туманом і світлом?
  - id: sf_sf_cable
    name: Кабель Сан-Франциско
    prompt: |
      Трамвай працює на кабелі під вулицею. Його не видно, але чутно. Як
      прихований кабель формує видиме місто?
    follow_ups:
      - Яким був би пагорб без кабелю?
      - Як кабель створює зв'язок?
      - Який зв'язок між кабелем і вулицею?
  - id: sf_sf_victorian
    name: Вікторіанський будинок Сан-Франциско
    prompt: |
      Вікторіанські будинки бувають парами — два будинки на одній ділянці.
      Знайдіть пару. Як вони пов'язані? Яким був би один без іншого?
    follow_ups:
      - Яким був би квартал без пари?
      - Як пара створює ритм?
      - Який зв'язок між парою і ділянкою?
  - id: sf_sf_mission
    name: Місіонський район Сан-Франциско
    prompt: |
      Місіонський район названий на честь Місії Долорес. Пройдіться вулицею
      і відчуйте шари — іспанські, мексиканські, ірландські,
      центральноамериканські. Який це палімпсест?
    follow_ups:
      - Яким був би район без шарів?
      - Як місія формує ідентичність?
      - Який зв'язок між місією та міграцією?
  - id: sf_sf_bridge
    name: Міст Сан-Франциско
    prompt: |
      Бей-Брідж менш знаменитий, ніж Золоті Ворота, але більш використовуваний.
      Перетніть його або подивіться на нього. Як міст з'єднує? Що він
      несе?
    follow_ups:
      - Якою була б затока без мосту?
      - Як міст формує регіон?
      - Який зв'язок між мостом і поїздками на роботу?
  - id: sf_sf_parks
    name: Парки Сан-Франциско
    prompt: |
      У Сан-Франциско багато маленьких парків — кишенькових парків,
      трикутних парків. Знайдіть один. Хто ним користується? Який його
      характер?
    follow_ups:
