# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# غابة حضرية — باريس (Arabic)

id: urban_jungle_paris
name: غابة حضرية — باريس
description: 50 بطاقة لتغيير نظرتك لباريس — من المقياس والضوء إلى طبقات التاريخ وإيقاعات حياة الشارع.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: زهرة الشرفة
    prompt: |
      تزهر شرفات باريس بالزهور — الجيرانيوم، البتونيا. ابحث عن مبنى
      به أصيص في كل شرفة. كيف تغير الزهرة الواجهة؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الزهور؟
      - كيف تخلق الزهور الهوية؟
      - ما هي العلاقة بين الزهرة والمقيم؟
  - id: paris_haussmann_line
    name: خط هوسمان
    prompt: |
      تشق شوارع هوسمان طريقها عبر باريس القديمة. امشِ في أحدها. الخط لا يرحم — مبانٍ متراصة، ارتفاعات موحدة. كيف يشكل الشارع الحركة؟
    follow_ups:
      - ماذا ستكون باريس بدون هوسمان؟
      - كيف يخلق الشارع المنظر؟
      - ما هي العلاقة بين الخط والسلطة؟
  - id: paris_cafe_terrace
    name: شرفة المقهى
    prompt: |
      تطل شرفات المقاهي في باريس على الشارع. اجلس في إحداها. أنت بالداخل والخارج.
      الشرفة عتبة. ماذا ترى؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الشرفة؟
      - كيف تخلق الشرفة اللقاء؟
      - ما هي العلاقة بين الشرفة والشارع؟
  - id: paris_metro_entrance
    name: مدخل المترو
    prompt: |
      مداخل مترو فن الآرت نوفو أيقونات. ابحث عن أحدها. المشغولات الحديدية،
      الخطوط — المدخل بوابة. ماذا يعد؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المدخل؟
      - كيف يخلق المدخل الهوية؟
      - ما هي العلاقة بين المدخل وما تحت الأرض؟
  - id: paris_shutter
    name: مصراع نافذة باريس
    prompt: |
      مصاريع النوافذ في باريس — volets — تغلق ليلاً. إنها خضراء، رمادية، زرقاء.
      ابحث عن شارع به مصاريع مغلقة. ماذا يوجد خلفها؟
    follow_ups:
      - ماذا ستكون الواجهة بدون المصاريع؟
      - كيف تخلق المصاريع الخصوصية؟
      - ما هي العلاقة بين المصراع والضوء؟
  - id: paris_cobble
    name: حصى باريس
    prompt: |
      حصى باريس — pavés — لا يزال موجودًا. امشِ فوقها. اشعر بالملمس.
      الحصى بقايا من باريس أخرى. كيف يشكل الشارع؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الحصى؟
      - كيف تميز الحصى التاريخ؟
      - ما هي العلاقة بين الحصى والثورة؟
  - id: paris_seine_edge
    name: حافة السين
    prompt: |
      يمتد نهر السين عبر باريس. اذهب إلى الرصيف. النهر هو درزة. ما الذي على كلا
      الجانبين؟ كيف يقسم النهر ويربط؟
    follow_ups:
      - ماذا ستكون باريس بدون السين؟
      - كيف يشكل النهر المدينة؟
      - ما هي العلاقة بين النهر والحافة؟
  - id: paris_roof_zinc
    name: زنك السقف
    prompt: |
      أسقف باريس غالبًا ما تكون من الزنك — رمادية، مائلة، بها نوافذ علوية. انظر
      للأعلى. خط السقف مميز. كيف يشكل الأفق؟
    follow_ups:
      - ماذا سيكون حال الأفق بدون الزنك؟
      - كيف يخلق الزنك الهوية؟
      - ما هي العلاقة بين السقف العلية؟
  - id: paris_door_height
    name: ارتفاع الباب
    prompt: |
      أبواب باريس غالبًا ما تكون طويلة — مزدوجة الارتفاع. ابحث عن أحدها. ماذا
      سيمر عبره؟ الباب عتبة للمقياس.
    follow_ups:
      - ماذا سيكون حال المبنى بدون الباب الطويل؟
      - كيف يخلق الارتفاع العظمة؟
      - ما هي العلاقة بين الباب والمبنى؟
  - id: paris_boulangerie_smell
    name: رائحة المخبز
    prompt: |
      المخبز تفوح منه رائحة الخبز. اتبع الرائحة. المخبز عقدة. ماذا تقول الرائحة
      عن الحي؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الرائحة؟
      - كيف تخلق الرائحة الهوية؟
      - ما هي العلاقة بين الرائحة والتجارة؟
  - id: paris_place
    name: ساحة باريس
    prompt: |
      لباريس ساحات — مربعات، دوائر، عقد. ابحث عن إحداها. لاحظ الهندسة. كيف تشكل
      الساحة الشوارع التي تغذيها؟
    follow_ups:
      - ماذا سيكون حال الحي بدون الساحة؟
      - كيف تخلق الساحة المركز؟
      - ما هي العلاقة بين الساحة والتدفق؟
  - id: paris_balcony_iron
    name: حديد الشرفة
    prompt: |
      أسوار شرفات باريس غالبًا ما تكون مزخرفة — حديد مشغول، منحنيات، زخارف.
      ابحث عن إحداها. كيف يشكل الحديد الواجهة؟
    follow_ups:
      - ماذا سيكون حال المبنى بدون الحديد؟
      - كيف يخلق الحديد الهوية؟
      - ما هي العلاقة بين الحديد والحرفية؟
  - id: paris_plane_tree
    name: شجرة الدلب
    prompt: |
      تصطف أشجار الدلب في باريس على طول الشوارع. لحائها متقشر. ابحث عن إحداها.
      كيف تشكل الشجرة الشارع؟ ماذا سيكون حال الشارع بدونها؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون شجرة الدلب؟
      - كيف تخلق شجرة الدلب الظل؟
      - ما هي العلاقة بين الشجرة والشعاع؟
  - id: paris_metro_tile
    name: بلاط المترو
    prompt: |
      محطات مترو باريس بها بلاط أبيض. النفق أنبوب من الضوء. اركب خطًا. كيف
      يشكل البلاط الرحلة؟
    follow_ups:
      - ماذا ستكون المحطة بدون البلاط؟
      - كيف يخلق البلاط النظافة؟
      - ما هي العلاقة بين البلاط وما تحت الأرض؟
  - id: paris_clock
    name: ساعة باريس
    prompt: |
      لباريس ساعات عامة كثيرة — على الكنائس، المحطات، المباني. ابحث عن واحدة.
      كم الساعة؟ هل هي صحيحة؟
    follow_ups:
      - ماذا سيكون حال المكان بدون الساعة؟
      - كيف تشكل الساعة الوقت؟
      - ما هي العلاقة بين الساعة والمكان؟
  - id: paris_newsstand
    name: كشك أخبار باريس
    prompt: |
      تبيع أكشاك أخبار باريس الصحف والمجلات وتذاكر المترو. ابحث عن واحد. ماذا
      يُعرض؟ من يتوقف؟ الكشك عقدة.
    follow_ups:
      - ماذا سيكون حال الشارع بدون الكشك؟
      - كيف يخلق الكشك اللقاء؟
      - ما هي العلاقة بين الكشك والشارع؟
  - id: paris_bench
    name: مقعد باريس
    prompt: |
      لباريس مقاعد خضراء في الحدائق وعلى طول نهر السين. اجلس على واحد. من يجلس
      غيرك؟ ما هو المنظر؟
    follow_ups:
      - ماذا سيكون حال المكان بدون المقعد؟
      - كيف يخلق المقعد الراحة؟
      - ما هي العلاقة بين المقعد والنهر؟
  - id: paris_boulangerie_queue
    name: طابور المخبز
    prompt: |
      انضم إلى طابور في المخبز خلال الذروة الصباحية. الطابور طقس. ماذا يشتري
      الناس؟ ما هي الآداب؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الطابور؟
      - كيف يخلق الطابور المجتمع؟
      - ما هي العلاقة بين الطابور والخبز؟
  - id: paris_manhole
    name: غطاء بالوعة باريس
    prompt: |
      أغطية بالوعات باريس غالبًا ما تقول "باريس" أو "ماء". ابحث عن واحد. الغطاء
      باب لعروق المدينة. ماذا يوجد تحته؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الغطاء؟
      - كيف يميز الغطاء النظام؟
      - ما هي العلاقة بين الغطاء وما تحت الأرض؟
  - id: paris_shadow
    name: ظل باريس
    prompt: |
      يخلق ضوء باريس ظلالاً حادة. ابحث عن زاوية تلتقي فيها الظل والشمس. كيف
      يشكل الظل الشارع؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون الظل؟
      - كيف يخلق الظل التباين؟
      - ما هي العلاقة بين الظل والمبنى؟
  - id: paris_courtyard
    name: فناء باريس
    prompt: |
      غالبًا ما تخفي مباني باريس الأفنية — cours — خلف بوابات. انظر من خلالها.
      ماذا يوجد بالداخل؟ الفناء غرفة سرية.
    follow_ups:
      - ماذا سيكون حال المبنى بدون الفناء؟
      - كيف يخلق الفناء الخصوصية؟
      - ما هي العلاقة بين الفناء والشارع؟
  - id: paris_bike_lane
    name: مسار دراجات باريس
    prompt: |
      توسعت باريس في مسارات الدراجات — pistes cyclables. ابحث عن أحدها. كيف
      يشكل المسار الشارع؟ من يستخدمه؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المسار؟
      - كيف يخلق المسار التنقل؟
      - ما هي العلاقة بين المسار والسيارة؟
  - id: paris_fountain
    name: نافورة باريس
    prompt: |
      لباريس نوافير — نوافير والاس، نوافير ضخمة. ابحث عن واحدة. ماذا تقدم؟
      من يستخدمها؟
    follow_ups:
      - ماذا سيكون حال المكان بدون النافورة؟
      - كيف تخلق النافورة هدية؟
      - ما هي العلاقة بين النافورة والعامة؟
  - id: paris_awning
    name: مظلة باريس
    prompt: |
      تخلق مظلات مقاهي باريس الظل. ابحث عن شارع تتكرر فيه المظلات. كيف تشكل
      الرصيف؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المظلات؟
      - كيف تخلق المظلات منطقة؟
      - ما هي العلاقة بين المظلة والشرفة؟
  - id: paris_lamp_post
    name: عمود إنارة باريس
    prompt: |
      لأعمدة إنارة باريس طراز خاص — غالبًا مزخرفة، غالبًا خضراء. ابحث عن واحد.
      كيف يشكل العمود الشارع ليلاً؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون العمود؟
      - كيف يخلق العمود الأمان؟
      - ما هي العلاقة بين العمود والظلام؟
  - id: paris_door_knocker
    name: مطرقة الباب
    prompt: |
      أبواب باريس غالبًا ما بها مطارق — رؤوس أسود، أيدٍ، حلقات. ابحث عن واحدة.
      ماذا سيكون صوتها؟ المطرقة شيء عتبة.
    follow_ups:
      - ماذا سيكون حال الباب بدون المطرقة؟
      - كيف تخلق المطرقة صوتًا؟
      - ما هي العلاقة بين المطرقة والمدخل؟
  - id: paris_shop_sign
    name: لافتة متجر باريس
    prompt: |
      لافتات متاجر باريس غالبًا ما تكون مرسومة يدويًا — مخبز، جزار، متجر أجبان.
      ابحث عن واحدة. ماذا تقول اللافتة عن المتجر؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون اللافتة؟
      - كيف تخلق اللافتة الهوية؟
      - ما هي العلاقة بين اللافتة والحرفية؟
  - id: paris_parking
    name: مواقف باريس
    prompt: |
      مواقف باريس إبداعية — سيارات على الأرصفة، مائلة، مضغوطة. شاهد
      شخصًا يركن. كيف تتناسب السيارة؟ ما هي العلاقة بين السيارة والمدينة؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون السيارات؟
      - كيف تشكل المواقف الشارع؟
      - ما هي العلاقة بين المواقف والمساحة؟
  - id: paris_drain
    name: بالوعة باريس
    prompt: |
      مزاريب باريس تمتد على طول الرصيف. بعد المطر، تتدفق. ابحث عن واحدة. أين
      تذهب المياه؟ البالوعة درزة.
    follow_ups:
      - ماذا سيكون حال الشارع بدون البالوعة؟
      - كيف تدير البالوعة المياه؟
      - ما هي العلاقة بين البالوعة والنظام؟
  - id: paris_chimney
    name: مدخنة باريس
    prompt: |
      مدخنات باريس تبرز خط السقف. عدها على مبنى واحد. المدخنة بقايا حرارة. ماذا
      احترق هنا؟
    follow_ups:
      - ماذا سيكون حال السقف بدون المدخنة؟
      - كيف تميز المدخنة التاريخ؟
      - ما هي العلاقة بين المدخنة والنار؟
  - id: paris_metro_map
    name: خريطة المترو
    prompt: |
      خريطة مترو باريس هي رسم بياني. تشوه الجغرافيا. ماذا يُشدد عليه؟ ماذا
      يُحذف؟ كيف تشكل الخريطة المدينة؟
    follow_ups:
      - ماذا سيكون التوجيه بدون الخريطة؟
      - كيف تخلق الخريطة اتصالاً؟
      - ما هي العلاقة بين الخريطة والإقليم؟
  - id: paris_bridge
    name: جسر باريس
    prompt: |
      لباريس جسور كثيرة فوق نهر السين. اعبر أحدها سيرًا على الأقدام. اشعر بالانتقال.
      ماذا يتغير؟ الجسر عتبة.
    follow_ups:
      - ماذا سيكون حال النهر بدون الجسر؟
      - كيف يربط الجسر؟
      - ما هي العلاقة بين الجسر والنهر؟
  - id: paris_graffiti
    name: جرافيتي باريس
    prompt: |
      لباريس جرافيتي — علامات، استنسلات، جداريات. ابحث عن جدار به طبقات. ماذا
      هي الكتابة المزدوجة؟ من علّم هذا السطح؟
    follow_ups:
      - ماذا سيكون حال الجدار بدون الجرافيتي؟
      - كيف يطالب الجرافيتي بالمساحة؟
      - ما هي العلاقة بين الجرافيتي والمدينة؟
  - id: paris_tree_guard
    name: حارس الشجرة
    prompt: |
      أشجار شوارع باريس غالبًا ما يكون لها حراس — شبكات معدنية حول القاعدة. ابحث
      عن واحد. ماذا يحمي الحارس؟ ماذا يستبعد؟
    follow_ups:
      - ماذا ستكون حال الشجرة بدون الحارس؟
      - كيف يشكل الحارس الحفرة؟
      - ما هي العلاقة بين الحارس والشجرة؟
  - id: paris_bus_stop
    name: محطة حافلات باريس
    prompt: |
      محطات حافلات باريس بها مظلات وجداول ومواجهات رقمية. انتظر في واحدة.
      من ينتظر غيرك؟ ما هي الآداب؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المحطة؟
      - كيف تخلق المحطة مجتمعًا؟
      - ما هي العلاقة بين المحطة والرحلة؟
  - id: paris_terrace_table
    name: طاولة الشرفة
    prompt: |
      طاولة مقهى الشرفة تواجه الشارع. اجلس في إحداها. الطاولة مسرح.
      ماذا تشاهد؟ من يراقبك؟
    follow_ups:
      - ماذا سيكون حال الشرفة بدون الطاولة؟
      - كيف تخلق الطاولة اللقاء؟
      - ما هي العلاقة بين الطاولة والشارع؟
  - id: paris_roof_dormer
    name: نافذة علوية للسقف
    prompt: |
      نوافذ السقف العلوية في باريس — نوافذ مانسارد — تبرز الأفق. ابحث عن مبنى
      به الكثير منها. ماذا سيكون المنظر من الداخل؟
    follow_ups:
      - ماذا سيكون حال السقف بدون النوافذ العلوية؟
      - كيف تخلق النوافذ العلوية الضوء؟
      - ما هي العلاقة بين النافذة العلوية والعلية؟
  - id: paris_parking_metre
    name: عداد مواقف باريس
    prompt: |
      عدادات مواقف باريس غالبًا ما تكون صناديق رمادية. ابحث عن واحد. كيف يشكل
      الرصيف؟ من يدفع؟ من لا يدفع؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون العداد؟
      - كيف يدير العداد المساحة؟
      - ما هي العلاقة بين العداد والسيارة؟
  - id: paris_doorway
    name: مدخل باريس
    prompt: |
      مدخل باريس غالبًا ما يكون طويلاً، غالبًا مزخرفًا. قف أمام واحد. كيف سيكون
      الشعور بالمرور عبره؟ المدخل عتبة.
    follow_ups:
      - ماذا سيكون حال المبنى بدون المدخل؟
      - كيف يخلق المدخل العظمة؟
      - ما هي العلاقة بين المدخل والداخل؟
  - id: paris_metro_stair
    name: درج المترو
    prompt: |
      سلالم المترو تنزل إلى الأرض. عد الدرجات. اشعر بالانتقال. ماذا يوجد
      في الأعلى؟ ماذا يوجد في الأسفل؟
    follow_ups:
      - ماذا ستكون المحطة بدون الدرج؟
      - كيف تخلق الدرج الهبوط؟
      - ما هي العلاقة بين الدرج وما تحت الأرض؟
  - id: paris_bench_view
    name: منظر المقعد
    prompt: |
      اجلس على مقعد مع منظر — لنهر السين، أو ساحة، أو شارع. ما هو الإطار؟ ما هو
      التركيز؟ المقعد نقطة مشاهدة.
    follow_ups:
      - ماذا سيكون المنظر بدون المقعد؟
      - كيف يخلق المقعد توقفًا؟
      - ما هي العلاقة بين المقعد والمنظر؟
  - id: paris_shutter_open
    name: مصراع مفتوح
    prompt: |
      تُفتح مصاريع باريس في الصباح. ابحث عن شارع تُفتح فيه. ما هو الطقس؟ ماذا
      يكشف الفتح؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المصاريع؟
      - كيف يخلق المصراع إيقاعًا؟
      - ما هي العلاقة بين المصراع والنهار؟
  - id: paris_cobble_pattern
    name: نمط الحصى
    prompt: |
      يُوضع حصى باريس في أنماط — أحيانًا متعرجة، وأحيانًا شعاعية. ابحث عن نمط.
      كيف يشكل الشارع؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون النمط؟
      - كيف يخلق النمط ملمسًا؟
      - ما هي العلاقة بين النمط والحرفية؟
  - id: paris_plane_bark
    name: لحاء شجرة الدلب
    prompt: |
      لحاء أشجار الدلب في باريس يتقشر في بقع. المس واحدًا. اللحاء ملمس. كيف
      تتقدم الشجرة في العمر؟ ماذا سيكون حال الشارع بدونها؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون شجرة الدلب؟
      - كيف يخلق اللحاء الهوية؟
      - ما هي العلاقة بين اللحاء والشجرة؟
  - id: paris_fountain_drink
    name: شرب النافورة
    prompt: |
      تقدم نوافير والاس مياه مجانية. ابحث عن واحدة. من يشرب؟ من لا يشرب؟
      النافورة هدية. ماذا تعني؟
    follow_ups:
      - ماذا سيكون حال المكان بدون النافورة؟
      - كيف تخلق النافورة منفعة عامة؟
      - ما هي العلاقة بين النافورة والعطش؟
  - id: paris_metro_sound
    name: صوت المترو
    prompt: |
      أغمض عينيك في المترو. الأنين، الفرامل، الإعلانات.
      ارسم خريطة للصوت. كيف يبدو صوت باريس تحت الأرض؟
    follow_ups:
      - ماذا ستكون الرحلة بدون الصوت؟
      - كيف يشكل الصوت التجربة؟
      - ما هي العلاقة بين الصوت والمساحة؟
  - id: paris_balcony_dry
    name: جفاف الشرفة
    prompt: |
      غالبًا ما تستخدم شرفات باريس للتجفيف — غسيل، نباتات. ابحث عن واحدة بها
      غسيل. ماذا يقول التجفيف عن المقيم؟
    follow_ups:
      - ماذا ستكون الواجهة بدون الغسيل؟
      - كيف يخلق التجفيف الحياة المنزلية؟
      - ما هي العلاقة بين الشرفة والمنزل؟
  - id: paris_bike_velib
    name: دراجة فيليب
    prompt: |
      تنتشر محطات فيليب في باريس. ابحث عن واحدة. كم عدد الدراجات؟ كم عدد
      الأحواض؟ النظام طبقة. كيف يعمل؟
    follow_ups:
      - ماذا سيكون حال الشارع بدون المحطة؟
      - كيف يخلق فيليب التنقل؟
      - ما هي العلاقة بين المحطة والدراجة؟
  - id: paris_door_bell
    name: جرس الباب
    prompt: |
      مباني شقق باريس بها أجراس أبواب متعددة — واحد لكل شقة. ابحث عن لوحة. كم عدد الأسماء؟ كيف يتم تنظيم المبنى؟
    follow_ups:
      - ماذا سيكون حال المدخل بدون الأجراس؟
      - كيف تخلق الأجراس العنوان؟
      - ما هي العلاقة بين الجرس والشقة؟
  - id: paris_roof_terrace
    name: تراس السطح
    prompt: |
      تخيل تراس سطح باريسي. ماذا سترى؟ من لديه الوصول؟
      التراس مستوى سري. ماذا ستزرع هناك؟
    follow_ups:
      - ماذا سيكون حال السطح بدون التراس؟
      - كيف يخلق التراس منظرًا؟
      - ما هي العلاقة بين التراس والسماء؟
