# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# शहरी जंगल — न्यूयॉर्क (Hindi)

id: urban_jungle_new_york
name: शहरी जंगल — न्यूयॉर्क
description: 50 कार्ड्स जो न्यूयॉर्क को देखने के आपके तरीके को बदल देंगे—पैमाने और प्रकाश से लेकर इतिहास की परतों और सड़क जीवन की लय तक।
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: लंबवत शहर
    prompt: |
      ऊपर देखो। न्यूयॉर्क लंबवत निर्मित है— मीनारें आसमान के लिए प्रतिस्पर्धा करती हैं।
      किसी एक इमारत को फुटपाथ से शिखर तक ट्रेस करें। ऊंचाई क्या देखने का तरीका बदल देती है?
      आपकी आँखें कहाँ विश्राम करती हैं?
    follow_ups:
      - ऊपर से सड़क कैसी दिखेगी?
      - अलग-अलग ऊंचाइयों पर पैमाना कैसे विकृत होता है?
      - जब आप केवल ऊपर देखते हैं तो क्या छिपा होता है?
  - id: ny_grid_navigation
    name: ग्रिड नेविगेशन
    prompt: |
      मैनहट्टन का ग्रिड अथक है। एक ब्लॉक चलें और देखें कि संख्या प्रणाली कैसे गति,
      अभिविन्यास और आश्चर्य को आकार देती है। ग्रिड तोड़ने पर क्या होता है?
    follow_ups:
      - ग्रिड कहाँ दमनकारी लगता है? कहाँ मुक्तिदायक?
      - इसके बिना शहर कैसा महसूस होगा?
      - तिरछी सड़कें लय कैसे बदलती हैं?
  - id: ny_subway_soundscape
    name: सबवे साउंडस्केप
    prompt: |
      स्टेशन में अपनी आँखें बंद करें। गड़गड़ाहट, ब्रेक, घोषणाएं, बसकर। साउंडस्केप को
      मैप करें। जब आप इसे देख नहीं सकते तो न्यूयॉर्क कैसा लगता है?
    follow_ups:
      - कौन सी आवाजें निरंतर हैं? कौन सी आकस्मिक?
      - यहाँ मौन का क्या मतलब होगा?
      - ध्वनि भूमिगत समय को कैसे चिह्नित करती है?
  - id: ny_fire_escape
    name: फायर एस्केप
    prompt: |
      फायर एस्केप शहर का एक्सोस्केलेटन हैं—कार्यात्मक, लयबद्ध, व्यक्तिगत।
      जहां वे दोहराए जाते हैं, एक ब्लॉक ढूंढें। वे अपने पीछे की इमारतों के बारे में क्या
      खुलासा करते हैं? रात में कौन वहाँ बैठ सकता है?
    follow_ups:
      - उनसे क्या दिखाई देगा?
      - वे सड़क के चरित्र को कैसे बदलते हैं?
      - उनके बिना ब्लॉक क्या खो देगा?
  - id: ny_street_number
    name: सड़क संख्या
    prompt: |
      एक संख्या चुनें—एक भवन संख्या, एक मंजिल, एक बस मार्ग। इसे शहर के माध्यम से
      फॉलो करें। क्या पैटर्न उभरता है? उस संख्या का यहाँ क्या मतलब है?
    follow_ups:
      - संख्या आपको कहाँ ले जाती है?
      - एक अलग संख्या क्या उजागर करेगी?
      - संख्याएँ शहरी अनुभव को कैसे व्यवस्थित करती हैं?
  - id: ny_steam_rising
    name: भाप उठना
    prompt: |
      मैनहोल से निकलने वाली भाप न्यूयॉर्क की सांस है। जहाँ से यह उठती है, उसे
      ढूंढें और देखें कि यह कैसे चलती है, फैलती है, प्रकाश पकड़ती है। नीचे क्या है?
      शहर क्या बाहर निकालता है?
    follow_ups:
      - जाली के नीचे क्या मिलेगा?
      - मौसम भाप को कैसे बदलता है?
      - यहाँ कौन सी अन्य छिपी हुई प्रणालियाँ वेंट होती हैं?
  - id: ny_storefront_typography
    name: स्टोरफ्रंट टाइपोग्राफी
    prompt: |
      साइनों को पढ़ें। बोडेगा, डेली, लॉन्ड्रोमैट—प्रत्येक की अपनी दृश्य भाषा होती है।
      एक ब्लॉक से पांच टाइपफेस एकत्र करें। वे यहाँ रहने वाले लोगों के बारे में क्या कहते हैं?
    follow_ups:
      - कौन से संकेत पुराने लगते हैं? कौन से नए?
      - अगर साइन बोल सकते तो ब्लॉक कैसा लगता?
      - टाइपोग्राफी परिवर्तन को कैसे चिह्नित करती है?
  - id: ny_waterfront_edge
    name: वाटरफ्रंट एज
    prompt: |
      पानी तक जाएं। शहर अपनी पीठ नदी, बंदरगाह, खाड़ी की ओर मोड़ता है। जहाँ
      भूमि जल से मिलती है, वहाँ खड़े हों। दृश्य के लिए क्या बनाया गया है? इसे
      नजरअंदाज करने के लिए क्या बनाया गया है?
    follow_ups:
      - किसे पानी देखने को मिलता है?
      - किनारे पर कैसे दावा किया गया है?
      - अगर शहर पानी की ओर मुंह करता तो कैसा होता?
  - id: ny_parks_as_rooms
    name: पार्क एक कमरों की तरह
    prompt: |
      सेंट्रल पार्क, प्रॉस्पेक्ट पार्क, एक पॉकेट प्लाजा—प्रत्येक शहर में एक कमरा है।
      किसी एक में प्रवेश करें और उसकी दीवारें, उसकी छत, उसके फर्नीचर देखें। यहाँ प्रकृति
      को कैसे डिज़ाइन किया गया है?
    follow_ups:
      - कमरे का उद्देश्य क्या है?
      - दृष्टि रेखाएँ किसने डिज़ाइन कीं?
      - अगर दीवारें गिर जातीं तो क्या होता?
  - id: ny_delivery_rhythm
    name: डिलीवरी का लय
    prompt: |
      डिलीवरी देखें—ट्रक, हैंडकार्ट, बाइक। एक पैकेज के रास्ते को ट्रक से दरवाजे
      तक ट्रेस करें। वाणिज्य सड़क से कैसे गुजरता है? आगमन का लय क्या है?
    follow_ups:
      - डिलीवरी के बिना ब्लॉक कैसा दिखेगा?
      - विभिन्न सामान अलग-अलग तरीके से कैसे चलते हैं?
      - इस प्रवाह में कौन अदृश्य है?
  - id: ny_brownstone_steps
    name: ब्राउनस्टोन की सीढ़ियाँ
    prompt: |
      ब्राउनस्टोन की सीढ़ियाँ मंच होती हैं। किसी एक पर बैठें और सड़क देखें। कौन
      रुकता है? कौन गुजरता है? आप यहाँ से क्या कहेंगे?
    follow_ups:
      - ऊपर की सीढ़ी से क्या नज़ारा है?
      - सीढ़ियाँ क्षेत्र कैसे बनाती हैं?
      - उनके बिना ब्लॉक क्या खो देगा?
  - id: ny_bridge_as_threshold
    name: पुल एक दहलीज के रूप में
    prompt: |
      पैदल पुल पार करें। संक्रमण महसूस करें—एक बरो से दूसरे में।
      पुल न तो यहाँ है और न ही वहाँ। दूसरी तरफ पहुँचने पर क्या बदलता है?
    follow_ups:
      - आप क्या पीछे छोड़ देते हैं?
      - पुल यात्रा को कैसे आकार देता है?
      - पुलों के बिना शहर कैसा होगा?
  - id: ny_awning_shade
    name: शामियाना की छाया
    prompt: |
      शामियाने सूक्ष्म-जलवायु बनाते हैं। किसी एक के नीचे खड़े हों। प्रकाश, ध्वनि,
      तापमान में बदलाव देखें। छोटे ढाँचे सड़क को कैसे बदलते हैं?
    follow_ups:
      - शामियाने के बिना ब्लॉक कैसा महसूस होगा?
      - वे स्वामित्व को कैसे चिह्नित करते हैं?
      - यहाँ अन्य छोटे आश्रय कौन से हैं?
  - id: ny_graffiti_layer
    name: भित्तिचित्र परत
    prompt: |
      दीवारों को देखें। टैग, भित्ति चित्र, व्हीटपेस्ट—प्रत्येक समय और दावे की एक
      परत है। पैलिम्प्स्स्ट को पढ़ें। इस सतह को किसने चिह्नित किया है?
    follow_ups:
      - आपको सबसे पुराना निशान कौन सा मिल सकता है?
      - परतें कहानी कैसे बताती हैं?
      - अगर दीवार बोल सकती तो क्या कहती?
  - id: ny_rooftop_skyline
    name: छत का क्षितिज
    prompt: |
      एक छत के दृश्य की कल्पना करें। पानी के टैंक, एंटीना, पड़ोसी छतें।
      ऊपर से शहर एक अलग शहर है। आपको क्या दिखेगा?
    follow_ups:
      - ऊंचाई क्या मायने रखती है इसे कैसे बदलती है?
      - सड़क से क्या छिपा है?
      - इस दृश्य तक किसकी पहुँच है?
  - id: ny_crosswalk_wait
    name: क्रॉसवाक प्रतीक्षा
    prompt: |
      क्रॉसवाक पर प्रतीक्षा करें। जब लाइट बदले तो पार न करें। अगले चक्र की प्रतीक्षा
      करें। ठहराव में आप क्या नोटिस करते हैं? और कौन प्रतीक्षा करता है?
    follow_ups:
      - प्रतीक्षा धारणा को कैसे बदलती है?
      - चौराहे को कौन से लय नियंत्रित करते हैं?
      - अगर आप कभी पार नहीं करते तो क्या होता?
  - id: ny_diner_booth
    name: डिनर बूथ
    prompt: |
      खिड़की के पास एक डिनर बूथ में बैठें। सड़क एक फिल्म बन जाती है। राहगीरों,
      यातायात, प्रकाश को देखें। कौन सी कहानी चल रही है?
    follow_ups:
      - मुख्य पात्र कौन हैं?
      - फ्रेम देखने के तरीके को कैसे बदलता है?
      - खिड़की के बिना आप क्या चूक जाएंगे?
  - id: ny_scaffolding_skin
    name: मचान की त्वचा
    prompt: |
      मचान इमारतों को पट्टियों की तरह लपेटते हैं। उनके नीचे चलें। ध्वनि, प्रकाश,
      अस्थायी छत देखें। क्या मरम्मत की जा रही है? क्या छिपाया जा रहा है?
    follow_ups:
      - यह वहाँ कब से है?
      - मचान के बिना इमारत क्या कहेगी?
      - मरम्मत और छिपाव के बीच क्या संबंध है?
  - id: ny_newsstand_archive
    name: समाचार पत्र स्टैंड संग्रह
    prompt: |
      एक समाचार पत्र स्टैंड ध्यान का एक टुकड़ा है—पत्रिकाएं, अखबार, कैंडी। क्या
      प्रदर्शित है? कौन रुकता है? इसके बिना यह कोना क्या होगा?
    follow_ups:
      - सबसे ज्यादा बिकने वाला क्या है?
      - स्टैंड ब्लॉक को कैसे आकार देता है?
      - आप यहाँ क्या रखेंगे?
  - id: ny_construction_site
    name: निर्माण स्थल
    prompt: |
      एक निर्माण स्थल देखें। क्रेन, बाधाएं, श्रमिक। शहर हमेशा बन रहा है। क्या
      बन रहा है? क्या बदला जा रहा है?
    follow_ups:
      - जब यह पूरा हो जाएगा तो कौन इसका उपयोग करेगा?
      - इससे पहले क्या था?
      - निर्माण पड़ोस को कैसे बदलता है?
  - id: ny_light_well
    name: लाइट वेल
    prompt: |
      लाइट वेल की तलाश करें—इमारतों के बीच संकीर्ण अंतराल जहाँ प्रकाश नीचे गिरता
      है। वह प्रकाश किसे मिलता है? वहाँ क्या उगता है?
    follow_ups:
      - उस शाफ्ट में रहना कैसा होगा?
      - प्रकाश मूल्य को कैसे परिभाषित करता है?
      - परछाई में क्या छिपा है?
  - id: ny_bodega_cat
    name: बोडेगा बिल्ली
    prompt: |
      बिल्ली वाला बोडेगा ढूंढें। बिल्ली नियमों के अंदर और बाहर दोनों जगह है।
      शहर में और क्या उसी तरह संचालित होता है?
    follow_ups:
      - बिल्ली क्या देखती है?
      - अनौपचारिक नियम स्थान को कैसे आकार देते हैं?
      - बिल्ली के बिना स्टोर कैसा होगा?
  - id: ny_sidewalk_crack
    name: फुटपाथ दरार
    prompt: |
      नीचे देखो। फुटपाथ में एक दरार का अनुसरण करें। यह कहाँ जाती है? इसमें क्या
      उगता है? शहर ऐसी दरारों से भरा है।
    follow_ups:
      - फुटपाथ समय के बारे में क्या कहेगा?
      - छोटी दरारें कैसे मायने रखती हैं?
      - क्या टूट रहा है?
  - id: ny_air_conditioner
    name: एयर कंडीशनर
    prompt: |
      एक इमारत पर एयर कंडीशनर गिनें। वे परजीवी, प्रोस्थेटिक्स,
      आवश्यकताएं हैं। वे मुखौटे को कैसे बदलते हैं? वे क्या टपकाते हैं?
    follow_ups:
      - उनके बिना इमारत कैसी दिखेगी?
      - जलवायु वास्तुकला को कैसे आकार देती है?
      - वे कहाँ जाते हैं यह कौन तय करता है?
  - id: ny_express_local
    name: एक्सप्रेस / लोकल
    prompt: |
      सबवे की सवारी करें। एक्सप्रेस और लोकल के बीच का अंतर नोटिस करें। गति वह
      बदल देती है जिसे आप देखते हैं। स्टॉप छोड़ें और शहर को संकुचित महसूस करें।
    follow_ups:
      - जब आप नहीं रुकते तो क्या छूट जाता है?
      - गति अनुभव को कैसे आकार देती है?
      - अगर सब कुछ लोकल होता तो शहर कैसा होता?
  - id: ny_water_tower
    name: पानी का टॉवर
    prompt: |
      पानी के टॉवर पुरानी इमारतों के शिखर पर होते हैं। वे लकड़ी के, बैरल के
      आकार के, सर्वव्यापी होते हैं। पांच ढूंढें। वे क्षितिज के बारे में क्या कहते हैं?
    follow_ups:
      - वे अभी भी यहाँ क्यों हैं?
      - उनके बिना छत कैसी दिखेगी?
      - वे उम्र को कैसे चिह्नित करते हैं?
  - id: ny_awning_stripes
    name: शामियाना की धारियां
    prompt: |
