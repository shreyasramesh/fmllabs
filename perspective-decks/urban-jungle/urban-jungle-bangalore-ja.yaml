# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# アーバン・ジャングル — バンガロール (Japanese)

id: urban_jungle_bangalore
name: アーバン・ジャングル — バンガロール
description: バンガロールを、スケールや光、歴史の層、そしてストリートライフのリズムから捉え直す50枚のカード。
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: ゲート・コロニー
    prompt: |
      バンガロールのゲート・コロニーには、壁、警備員、ゲートがある。ゲートに立ってみよう。
      中には何がある？ 誰が入る？ ゲートは境界を示す。何を守っているのか？
    follow_ups:
      - ゲートがなければ、この通りはどうなるだろうか？
      - ゲートはどのように安心感を生み出すか？
      - ゲートとコロニーの関係とは？
  - id: blr_tree_canopy
    name: 木々の天蓋
    prompt: |
      バンガロールはかつて庭園都市だった。古い木々が今もいくつかの通りを覆っている。
      その下を歩いてみよう。天蓋は光をどう変えるか？ 音は？
    follow_ups:
      - 木々がなければ、この通りはどうなるだろうか？
      - 天蓋はどのように微気候を作り出すか？
      - 木々と都市の関係とは？
  - id: blr_tech_park
    name: テック・パーク
    prompt: |
      テック・パークはキャンパスだ — ガラス、芝生、シャトルバス。一つ見つけよう。 パークはどのように街から切り離されているか？ 内と外の関係とは？
    follow_ups:
      - パークがなければ、この地域はどうなるだろうか？
      - パークはどのようにアイデンティティを創り出すか？
      - パークと通りの関係とは？
  - id: blr_auto_rickshaw
    name: オート・リクシャー
    prompt: |
      オート・リクシャーは交通を縫うように走る。一つが交差点を交渉するのを見てみよう。
      車が入れない場所に、オートはどのように収まるのか？ 縫うような動きの論理とは？
    follow_ups:
      - オートがなければ、この通りはどうなるだろうか？
      - オートはどのように移動性を作り出すか？
      - オートと交通の関係とは？
  - id: blr_chai_stall
    name: チャイ・スタンド
    prompt: |
      チャイ・スタンドはノードだ — 小さく、一時的で、不可欠。一つ見つけよう。誰が集まる？
      リズムは？ スタンドは社会的な機械だ。
    follow_ups:
      - スタンドがなければ、この角はどうなるだろうか？
      - スタンドはどのように出会いを作り出すか？
      - スタンドと通りの関係とは？
  - id: blr_billboard
    name: バンガロールのビルボード
    prompt: |
      バンガロールのビルボードは、テック、不動産、教育を広告している。一つ見つけよう。
      何を売っているのか？ 誰が視聴者か？ ビルボードは願望の鏡だ。
    follow_ups:
      - ビルボードがなければ、この通りはどうなるだろうか？
      - ビルボードはどのように欲望を形成するか？
      - ビルボードと都市の関係とは？
  - id: blr_compound_wall
    name: 塀
    prompt: |
      塀はプライベートな空間と公共の空間を隔てる。塀を見つけよう。その向こうには何がある？
      どれくらいの高さがある？ 塀は境界を作る。何を除外しているのか？
    follow_ups:
      - 塀がなければ、この通りはどうなるだろうか？
      - 塀はどのようにプライバシーを作り出すか？
      - 塀と敷地の関係とは？
  - id: blr_signal_wait
    name: 信号待ち
    prompt: |
      信号で待ってみよう。露天商 — 花、おもちゃ、本 — を見てみよう。
      信号は一時停止を作り出す。その一時停止で何が起こるか？
    follow_ups:
      - 信号がなければ、この交差点はどうなるだろうか？
      - 信号はどのように経済を作り出すか？
      - 信号と通りの関係とは？
  - id: blr_rain_drain
    name: 雨水排水溝
    prompt: |
      バンガロールのモンスーンは排水溝を溢れさせる。雨の後、水を追ってみよう。
      どこへ行くのか？ どこに溜まるのか？ 排水溝は限界だ。
    follow_ups:
      - 排水溝がなければ、この通りはどうなるだろうか？
      - 排水溝はどのように水を管理するか？
      - 排水溝とモンスーンの関係とは？
  - id: blr_sarjapur_road
    name: サルジャプーロ・ロード
    prompt: |
      サルジャプーロ・ロードは、古いバンガロールをテック・コリドーに繋ぐ。
      一区間を車で、または歩いてみよう。何が変わるか？ 都市はどこで変化するか？
    follow_ups:
      - 道路がなければ、このコリドーはどうなるだろうか？
      - 道路はどのように繋がりを作り出すか？
      - 道路と成長の関係とは？
  - id: blr_parks_maidans
    name: 公園と広場
    prompt: |
      バンガロールには公園と広場がある — カッボン公園、ラールバーグ、近所のグラウンド。
      一つに入ってみよう。誰が利用しているか？ リズムは？
    follow_ups:
      - 公園がなければ、この街はどうなるだろうか？
      - 公園はどのように休息を作り出すか？
      - 公園と近所の関係とは？
  - id: blr_temple_street
    name: 寺院のある通り
    prompt: |
      寺院はバンガロールの通りに点在している。一つを見つけよう。
      お供え物、鐘、人混みに注目しよう。寺院はどのようにブロックを形作るか？
    follow_ups:
      - 寺院がなければ、この通りはどうなるだろうか？
      - 寺院はどのようにコミュニティを作り出すか？
      - 寺院と通りの関係とは？
  - id: blr_silk_board
    name: シルク・ボード
    prompt: |
      シルク・ボードの交差点は悪名高い。端に立ってみよう。交通を見てみよう。
      交差点はどう機能しているか？ 混沌の論理とは？
    follow_ups:
      - 交差点がなければ、このコリドーはどうなるだろうか？
      - 交差点はどのようにボトルネックを作り出すか？
      - 交差点と通勤の関係とは？
  - id: blr_metro_elevated
    name: 地上を走るメトロ
    prompt: |
      バンガロール・メトロは街の一部を地上を走る。乗るか、下から見てみよう。
      地上を走る線路は下の通りをどう変えるか？
    follow_ups:
      - メトロがなければ、この通りはどうなるだろうか？
      - メトロはどのように繋がりを作り出すか？
      - 地上を走る線路と地面の関係とは？
  - id: blr_apartment_tower
    name: マンション・タワー
    prompt: |
      バンガロールにはマンション・タワーがそびえ立つ。一つを見つけよう。
      何階あるか？ 誰が住んでいるか？ タワーは垂直密度だ。何に取って代わったのか？
    follow_ups:
      - タワーがなければ、このスカイラインはどうなるだろうか？
      - タワーはどのように住宅を作り出すか？
      - タワーと地面の関係とは？
  - id: blr_roadside_vendor
    name: 道端の露天商
    prompt: |
      道端の露天商は果物、軽食、携帯充電器を売る。一つを見つけよう。
      陳列は？ 誰が立ち止まるか？ 露天商はインフォーマル経済だ。
    follow_ups:
      - 露天商がなければ、この通りはどうなるだろうか？
      - 露天商はどのように生計を作り出すか？
      - 露天商と通りの関係とは？
  - id: blr_borewell
    name: 井戸
    prompt: |
      バンガロールは井戸に依存している。パイプ、タンク、ポンプを探してみよう。 水は地下から汲み上げられる。都市と帯水層の関係とは？
    follow_ups:
      - 井戸がなければ、この建物はどうなるだろうか？
      - 井戸はどのように供給を作り出すか？
      - 井戸と不足の関係とは？
  - id: blr_garbage_heap
    name: ゴミの山
    prompt: |
      ゴミの山は角や壁のそばに現れる。一つに気づこう。何が入っている？ 誰が漁る？
      山はシステムの限界だ。
    follow_ups:
      - 山がなければ、この通りはどうなるだろうか？
      - 山はどのように失敗を示すか？
      - 山と都市の関係とは？
  - id: blr_marquee_wedding
    name: 結婚式のマーキー
    prompt: |
      結婚式のマーキーは通りを塞ぐ。一つを見つけよう。マーキーは一時的な領域だ。
      祝祭と通りの関係とは？
    follow_ups:
      - マーキーがなければ、この通りはどうなるだろうか？
      - マーキーはどのように主張を作り出すか？
      - 結婚式と公共の関係とは？
  - id: blr_old_bungalow
    name: 古いバンガロー
    prompt: |
      古いバンガロールのバンガローは、タワーの中に残っている。一つを見つけよう。
      バンガローには敷地、木々、空間がある。何に取って代わられるのか？
    follow_ups:
      - バンガローがなければ、この通りはどうなるだろうか？
      - バンガローはどのように歴史を示すか？
      - バンガローとタワーの関係とは？
  - id: blr_coffee_house
    name: コーヒーハウス
    prompt: |
      インディアン・コーヒー・ハウスは機関だ。一つに座ってみよう。
      コーヒーハウスは会話の部屋だ。リズムは？ 誰が来る？
    follow_ups:
      - コーヒーハウスがなければ、この通りはどうなるだろうか？
      - コーヒーハウスはどのようにコミュニティを作り出すか？
      - コーヒーハウスと都市の関係とは？
  - id: blr_phone_booth
    name: 電話ボックス
    prompt: |
      公衆電話ボックスはまだ存在する。一つを見つけよう。機能しているか？ 誰が使う？
      ボックスは遺物だ。何に取って代わられたのか？
    follow_ups:
      - ボックスがなければ、この通りはどうなるだろうか？
      - ボックスはどのように変化を示すか？
      - ボックスと携帯電話の関係とは？
  - id: blr_bus_stop
    name: バンガロールのバス停
    prompt: |
      バンガロールのバス停は、しばしばポールと人だかりだ。一つで待ってみよう。
      誰が待っている？ エチケットは？ バス停は最小限のインフラだ。
    follow_ups:
      - バス停がなければ、この通りはどうなるだろうか？
      - バス停はどのように繋がりを作り出すか？
      - バス停とバスの関係とは？
  - id: blr_power_line
    name: 電線
    prompt: |
      バンガロールの電線は絡み合っている — ケーブル、変圧器、ループ。一つを追ってみよう。
      どこへ行くのか？ グリッドは可視化されている。何を動かしているのか？
    follow_ups:
      - 電線がなければ、この通りはどうなるだろうか？
      - グリッドはどのように供給を作り出すか？
      - 電線と停電の関係とは？
  - id: blr_speed_breaker
    name: スピード・ブレーカー
    prompt: |
      スピード・ブレーカー — 睡眠障害 — がバンガロールの道路に点在している。一つを感じてみよう。
      なぜここにあるのか？ 何を遅くするのか？ ブレーカーは局所的な介入だ。
    follow_ups:
      - ブレーカーがなければ、この道路はどうなるだろうか？
      - ブレーカーはどのように安全を作り出すか？
      - ブレーカーと速度の関係とは？
  - id: blr_compound_tree
    name: 敷地内の木
    prompt: |
      敷地内の木が塀を越えている。一つを見つけよう。木は内側でもあり、外側でもある。
      何を日陰にするのか？ 誰が所有しているのか？
    follow_ups:
      - 木がなければ、この通りはどうなるだろうか？
      - 木はどのように恵みを作り出すか？
      - 木と敷地の関係とは？
  - id: blr_shop_shutter
    name: 店舗のシャッター
    prompt: |
      バンガロールの店舗のシャッターは夜になると閉まる。閉まったシャッターを見つけよう。
      その向こうには何がある？ シャッターは日々のサイクルだ。何を守っているのか？
    follow_ups:
      - シャッターがなければ、この通りはどうなるだろうか？
      - シャッターはどのようにセキュリティを作り出すか？
      - シャッターと商業の関係とは？
  - id: blr_water_tanker
    name: 水タンカー
    prompt: |
      水タンカーは近隣に供給する。一つが配達するのを見てみよう。
      タンカーは移動するインフラだ。タンカーと水道の蛇口の関係とは？
    follow_ups:
      - タンカーがなければ、この近隣はどうなるだろうか？
      - タンカーはどのように供給を作り出すか？
      - タンカーと不足の関係とは？
  - id: blr_metro_station
    name: メトロ駅
    prompt: |
      バンガロールのメトロ駅は新しい — 清潔で、ブランド化されている。一つに入ってみよう。
      駅は通りとどう違うのか？ 移行はどうなっているか？
    follow_ups:
      - 駅がなければ、このコリドーはどうなるだろうか？
      - 駅はどのように繋がりを作り出すか？
      - 駅と都市の関係とは？
  - id: blr_rickshaw_stand
    name: リクシャー・スタンド
    prompt: |
      リクシャー・スタンドは交差点に集まる。一つを見つけよう。運転手は待っている。
      スタンドはノードだ。経済は？
    follow_ups:
      - スタンドがなければ、この交差点はどうなるだろうか？
      - スタンドはどのように移動性を作り出すか？
      - スタンドと運転手の関係とは？
  - id: blr_pavement_sleep
    name: 地面に寝ている人
    prompt: |
      路上で寝ている人々は都市の一部だ。注意して見てみよう。どこで寝ているのか？
      通りと避難所の関係とは？
    follow_ups:
      - 寝ている人がいなければ、この通りはどうなるだろうか？
      - 地面はどのように家になるのか？
      - 睡眠と都市の関係とは？
  - id: blr_gate_security
    name: ゲートの警備
    prompt: |
      コロニーのゲートには警備がいる — 警備員、バリケード、登録簿。流れを見てみよう。
      誰が入る？ 誰が止められる？ ゲートはフィルターだ。
    follow_ups:
      - ゲートがなければ、このコロニーはどうなるだろうか？
      - ゲートはどのように安心感を作り出すか？
      - ゲートと信頼の関係とは？
  - id: blr_street_dog
    name: 野良犬
    prompt: |
      野良犬はバンガロールの一部だ。一つに気づこう。どこで寝ているのか？
      何を食べているのか？ 犬は野生でもあり、飼いならされたものでもある。
    follow_ups:
      - 犬がなければ、この通りはどうなるだろうか？
      - 犬はどのように関係を作り出すか？
      - 犬と都市の関係とは？
  - id: blr_hoarding
    name: ホーディング
    prompt: |
      ホーディング — 大きなビルボード — が交差点を支配している。一つを見つけよう。
      何を広告しているのか？ ホーディングは願望のスケールだ。何を約束しているのか？
    follow_ups:
      - ホーディングがなければ、この交差点はどうなるだろうか？
      - ホーディングはどのように欲望を形成するか？
      - ホーディングと都市の関係とは？
  - id: blr_rain_tree
    name: レイン・ツリー
    prompt: |
      レイン・ツリー — サマネア・サマン — がバンガロールのいくつかの通りを覆っている。一つを見つけよう。
      木は遺産だ。どのようにブロックを形作っているか？
    follow_ups:
      - レイン・ツリーがなければ、この通りはどうなるだろうか？
      - 木はどのように微気候を作り出すか？
      - 木と庭園都市の関係とは？
  - id: blr_corner_shop
    name: バンガロールの角の店
    prompt: |
      角の店 — キラナ・ストア — は何でも売っている。一つに入ってみよう。
      在庫は？ 誰が経営している？ 店は近所のノードだ。
    follow_ups:
      - 店がなければ、このブロックはどうなるだろうか？
      - 店はどのように出会いを作り出すか？
      - 店とコミュニティの関係とは？
  - id: blr_flyover
    name: 立体交差
    prompt: |
      バンガロールの立体交差は、交差点を飛び越える。その下に立ってみよう。
      立体交差は影、騒音、新しい層を作り出す。上には何がある？ 下には何がある？
    follow_ups:
      - 立体交差がなければ、この交差点はどうなるだろうか？
      - 立体交差はどのように流れを作り出すか？
      - 立体交差と地面の関係とは？
  - id: blr_water_tap
    name: 公衆給水栓
    prompt: |
      公衆給水栓はまだ存在する。一つを見つけよう。誰が使う？
      給水栓はコモンズだ。給水栓とアクセスの関係とは？
    follow_ups:
      - 給水栓がなければ、この通りはどうなるだろうか？
      - 給水栓はどのように恵みを作り出すか？
      - 給水栓と不足の関係とは？
  - id: blr_construction_crane
    name: 建設クレーン
    prompt: |
      建設クレーンはスカイラインに点在している。一つを見つけよう。
      何が建設されているのか？ クレーンは成長の兆候だ。何が何に取って代わるのか？
    follow_ups:
      - クレーンがなければ、このスカイラインはどうなるだろうか？
      - クレーンはどのように変化を示すか？
      - クレーンと都市の関係とは？
  - id: blr_parking_lot
    name: 駐車場
    prompt: |
      駐車場は一時的だ — 開発されるまでの空き地。一つを見つけよう。
      以前は何があった？ 何が来る？ 敷地は一時停止だ。
    follow_ups:
      - 敷地がなければ、このブロックはどうなるだろうか？
      - 敷地はどのように interim use を作り出すか？
      - 敷地と開発の関係とは？
  - id: blr_street_food
    name: 屋台料理
    prompt: |
      屋台料理の露天商は夕暮れ時に設営する。一つを見つけよう。
      何が調理されている？ 誰が食べる？ 露天商はインフォーマルなインフラだ。経済は？
    follow_ups:
      - 露天商がなければ、この通りはどうなるだろうか？
      - 露天商はどのように生計を作り出すか？
      - 露天商と通りの関係とは？
  - id: blr_compound_garden
    name: 敷地内の庭園
    prompt: |
      敷地内の庭園はプライベートだ — ゲート越しに見える。覗いてみよう。 何が育っている？ 庭園は緑のポケットだ。それなしでは通りはどうなるだろうか？
    follow_ups:
      - 庭園がなければ、この敷地はどうなるだろうか？
      - 庭園はどのように休息を作り出すか？
      - 庭園と都市の関係とは？
  - id: blr_bus_crowd
    name: バス待ちの群衆
    prompt: |
      バンガロールのバスはラッシュアワーに満員になる。バス停を見てみよう。
      群衆は波のように乗り込む。群衆はどのように秩序を作り出すか？ エチケットは？
    follow_ups:
      - 群衆がなければ、このバス停はどうなるだろうか？
      - 群衆はどのように圧力を作り出すか？
      - 群衆とバスの関係とは？
  - id: blr_metro_pillar
    name: メトロの柱
    prompt: |
      メトロの柱は高架線を支える。その下に立ってみよう。 柱は空間の列を作り出す。柱と通りの関係とは？
    follow_ups:
      - 柱がなければ、この通りはどうなるだろうか？
      - 柱はどのように構造を作り出すか？
      - 柱とメトロの関係とは？
  - id: blr_temple_bell
    name: 寺の鐘
    prompt: |
      寺の鐘は祈りの時間を告げる。聞いてみよう。鐘はリズムを作り出す。
      鐘はどのように近隣を形作るか？ それがなければ通りはどうなるだろうか？
    follow_ups:
      - 鐘がなければ、この寺はどうなるだろうか？
      - 鐘はどのように時間を作り出すか？
      - 鐘とコミュニティの関係とは？
  - id: blr_road_widening
    name: 道路拡幅
    prompt: |
      道路拡幅は近隣を切り裂く。一区間を見つけよう。
      何が取り除かれた？ 何が残っている？ 拡幅は傷跡だ。何に役立つのか？
    follow_ups:
      - 拡幅がなければ、この道路はどうなるだろうか？
      - 拡幅はどのように流れを作り出すか？
      - 拡幅と立ち退きの関係とは？
  - id: blr_apartment_balcony
    name: アパートのバルコニー
    prompt: |
      アパートのバルコニーは通りに面している。建物を一つ見つけよう。 バルコニーには何がある？ 植物？ 洗濯物？ バルコニーは敷居だ。そこから何が見えるだろうか？
    follow_ups:
      - バルコニーがなければ、この建物はどうなるだろうか？
      - バルコニーはどのように通りとの関係を作り出すか？
      - バルコニーとアパートの関係とは？
  - id: blr_night_light
    name: 夜の光
    prompt: |
      夜のバンガロール — 街灯、店の明かり、アパートの窓。一区間歩いてみよう。
      光はどのように通りを形作るか？ 何が照らされ、何が暗い？
    follow_ups:
      - 光がなければ、この通りはどうなるだろうか？
      - 光はどのように安全を作り出すか？
      - 光と夜の関係とは？
  - id: blr_morning_walk
    name: 朝の散歩
    prompt: |
      朝の散歩をする人々が公園や通りを埋める。参加するか、見てみよう。
      朝の散歩は儀式だ。ルートは？ 誰が歩いている？
    follow_ups:
      - 散歩をする人がいなければ、この朝はどうなるだろうか？
      - 散歩はどのようにコミュニティを作り出すか？
      - 散歩と健康の関係とは？
  - id: blr_garden_city
    name: 庭園都市
    prompt: |
      バンガロールは庭園都市だった。その名残は残っている — ラールバーグ、カッボン公園、古い木々。
      名残を見つけよう。もし庭園が勝っていたら、この街はどうなっていただろうか？
    follow_ups:
      - 庭園がなければ、バンガロールはどうなるだろうか？
      - 庭園はどのようにアイデンティティを作り出すか？
      - 庭園と都市の関係とは？
