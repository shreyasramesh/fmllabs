      什么在改变？城市在哪里转移？
    follow_ups:
      - 没有了这条路，走廊会怎样？
      - 这条路如何创造了连接？
      - 这条路与发展之间是什么关系？
  - id: blr_parks_maidans
    name: 公园与广场
    prompt: |
      班加罗尔有公园和广场——Cubbon 公园、Lalbagh 公园、社区绿地。
      走进一个。谁在使用它？有什么节奏？
    follow_ups:
      - 没有了公园，城市会怎样？
      - 公园如何创造了休憩？
      - 公园与社区之间是什么关系？
  - id: blr_temple_street
    name: 寺庙街
    prompt: |
      寺庙点缀着班加罗尔的街道。找一个。注意供品、钟声、人群。
