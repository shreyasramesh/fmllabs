# 城市丛林 — 班加罗尔 (Mandarin Chinese)

id: urban_jungle_bangalore
name: 城市丛林 — 班加罗尔
description: 50 张卡片，视角转变，从尺度和光线到历史层次和街头生活的节奏，让你重新认识班加罗尔。
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: 门禁社区
    prompt: |
      班加罗尔的门禁社区有围墙、守卫、大门。站在一扇门前。

      里面是什么？谁能进入？大门标志着一个界限。它保护什么？
    follow_ups:
      - 没有了大门，街道会怎样？
      - 大门如何创造安全感？
      - 大门与社区之间是什么关系？
  - id: blr_tree_canopy
    name: 树冠
    prompt: |
      班加罗尔曾是一座花园城市。一些街道仍被古老的树木遮蔽。
      走在一棵树下。树冠如何改变了光线？声音？
    follow_ups:
      - 没有了树，街道会怎样？
      - 树冠如何创造微气候？
      - 树与城市之间是什么关系？
  - id: blr_tech_park
    name: 科技园区
    prompt: |
      科技园区就像校园——玻璃、草坪、班车。找一个。它如何

      与城市分离？内部与外部之间是什么关系？
    follow_ups:
      - 没有了园区，这个区域会怎样？
      - 园区如何创造身份认同？
      - 园区与街道之间是什么关系？
  - id: blr_auto_rickshaw
    name: 三轮摩托出租车
    prompt: |
      三轮摩托出租车穿梭于车流中。看一辆车如何在一个路口穿行。汽车无法通过的地方，三轮车如何进入？穿梭的逻辑是什么？
    follow_ups:
      - 没有了三轮车，街道会怎样？
      - 三轮车如何创造了移动性？
      - 三轮车与车流之间是什么关系？
  - id: blr_chai_stall
    name: 茶摊
    prompt: |
      茶摊是节点——小巧、临时、重要。找一个。谁会聚集？
      有什么节奏？这个摊位是一个社交机器。
    follow_ups:
      - 没有了茶摊，街角会怎样？
      - 茶摊如何创造了相遇？
      - 茶摊与街道之间是什么关系？
  - id: blr_billboard
    name: 班加罗尔广告牌
    prompt: |
      班加罗尔的广告牌宣传科技、房地产、教育。找一个。

      卖的是什么？受众是谁？广告牌是欲望的镜子。
    follow_ups:
      - 没有了广告牌，街道会怎样？
      - 广告牌如何塑造了欲望？
      - 广告牌与城市之间是什么关系？
  - id: blr_compound_wall
    name: 围墙
    prompt: |
      围墙将私人空间与公共空间隔开。找一面墙。后面是什么？
      有多高？墙创造了一个界限。它排除了什么？
    follow_ups:
      - 没有了墙，街道会怎样？
      - 墙如何创造了隐私？
      - 墙与院落之间是什么关系？
  - id: blr_signal_wait
    name: 等信号灯
    prompt: |
      在交通信号灯前等待。看看小贩——鲜花、玩具、书籍。
      信号灯创造了一个停顿。在停顿中发生了什么？
    follow_ups:
      - 没有了信号灯，路口会怎样？
      - 信号灯如何创造了经济？
      - 信号灯与街道之间是什么关系？
  - id: blr_rain_drain
    name: 雨水排水口
    prompt: |
      班加罗尔的季风会淹没排水口。雨后，看看水。它流向哪里？
      在哪里积聚？排水口是一个极限。
    follow_ups:
      - 没有了排水口，街道会怎样？
      - 排水口如何管理水流？
      - 排水口与季风之间是什么关系？
  - id: blr_sarjapur_road
