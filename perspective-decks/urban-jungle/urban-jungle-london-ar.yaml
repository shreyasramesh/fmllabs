    follow_ups:
      - ماذا سيكون الشارع بدون سيارة الأجرة؟
      - كيف تخلق سيارة الأجرة التنقل؟
      - ما هي العلاقة بين سيارة الأجرة والمعرفة؟
  - id: london_underground_tile
    name: بلاط مترو الأنفاق
    prompt: |
      محطات قطار الأنفاق بها بلاط مميز — شيرلوك في بيكر ستريت، الخط الأزرق لفيكتوريا. ابحث عن محطة ذات طابع مميز. ماذا تقول البلاطات؟
    follow_ups:
      - ماذا ستكون المحطة بدون البلاط؟
      - كيف تخلق البلاطات الهوية؟
      - ما هي العلاقة بين البلاط والمكان؟
  - id: london_bench
    name: مقعد لندن
    prompt: |
      لندن بها العديد من المقاعد — في الحدائق، في الشوارع، بجوار مواقف الحافلات. اجلس على واحد.
