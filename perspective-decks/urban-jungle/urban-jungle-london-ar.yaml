# غابة حضرية — لندن (Arabic)

id: urban_jungle_london
name: غابة حضرية — لندن
description: 50 بطاقة لتغيير نظرتك إلى لندن — من الحجم والضوء إلى طبقات التاريخ وإيقاعات الحياة في الشوارع.
domain: urban_jungle
cards:
  - id: london_layer
    name: طبقة لندن
    prompt: |
      لندن مبنية على طبقات — رومانية، تعود إلى العصور الوسطى، فيكتورية، حديثة. ابحث عن مكان
      تتصادم فيه العصور. ما هو أقدم شيء يمكنك رؤيته؟ الأحدث؟
    follow_ups:
      - ماذا سيكون الشارع بدون هذه الطبقات؟
      - كيف يظهر التاريخ في الشكل العمراني؟
      - ما هي العلاقة بين الطبقة والهوية؟
  - id: london_pub_threshold
    name: عتبة حانة لندن
    prompt: |
      للحانة في لندن عتبة — الدرجة للصعود، الباب، البار. قف عند العتبة. ما الذي يوجد بالداخل؟ ما الذي يوجد بالخارج؟ الحانة غرفة في المدينة.
    follow_ups:
      - ماذا سيكون الحي بدون الحانة؟
      - كيف تخلق العتبة الانتقال؟
      - ما هي العلاقة بين الحانة والشارع؟
  - id: london_blue_plaque
    name: اللوحة الزرقاء
    prompt: |
      اللوحات الزرقاء تشير إلى أماكن عاش فيها شخصيات مشهورة. ابحث عن واحدة. من عاش هنا؟
      ماذا فعلوا؟ اللوحة تجعل التاريخ مرئيًا.
    follow_ups:
      - ماذا سيكون المبنى بدون اللوحة؟
      - كيف تشكل اللوحة الذاكرة؟
      - ما هي العلاقة بين اللوحة والمكان؟
  - id: london_underground
    name: تحت الأرض
    prompt: |
      قطار الأنفاق هو مدينة تحت المدينة. انزل. لاحظ البلاط، والخرائط، والسلالم المتحركة. كيف يشكل تحت الأرض ما فوقه؟
    follow_ups:
      - ماذا ستكون لندن بدون قطار الأنفاق؟
      - كيف يخلق تحت الأرض الاتصال؟
      - ما هي العلاقة بين قطار الأنفاق والسطح؟
  - id: london_thames_edge
    name: ضفة نهر التايمز
    prompt: |
      يجري نهر التايمز عبر لندن. اذهب إلى الكورنيش. النهر هو خيط. ما الذي يوجد على كل جانب؟ كيف يقسم النهر ويربط؟
    follow_ups:
      - ماذا ستكون لندن بدون نهر التايمز؟
      - كيف يشكل النهر المدينة؟
      - ما هي العلاقة بين النهر والضفة؟
  - id: london_georgian_row
    name: صف جورجي
    prompt: |
      تتكرر صفوف المنازل الجورجية — باب، نافذة، باب، نافذة. امشِ في صف. يخلق التكرار إيقاعًا. ما الذي يكسره؟ ما الذي يجمعه؟
    follow_ups:
      - ماذا سيكون الشارع بدون الصف؟
      - كيف يخلق التكرار الهوية؟
      - ما هي العلاقة بين الصف والفرد؟
  - id: london_mews
    name: مواء (ممر سكني)
    prompt: |
      كانت الميوز (Mews) اسطبلات، والآن أصبحت منازل. ابحث عن واحدة. الممر الضيق، والحصى، والإسطبلات المحولة. كيف يستمر الماضي؟
    follow_ups:
      - ماذا سيكون الممر بدون التاريخ؟
      - كيف يخلق الممر الخصوصية؟
      - ما هي العلاقة بين الممر والشارع الرئيسي؟
  - id: london_phone_box
    name: كشك الهاتف
    prompt: |
      أكشاك الهاتف الحمراء أيقونات. ابحث عن واحد. هل لا يزال هاتفًا؟ جهاز إنعاش؟
      مكتبة؟ كيف يُعاد تخصيص الأيقونات؟
    follow_ups:
      - ماذا سيكون الشارع بدون الكشك؟
      - كيف يميز الكشك الهوية البريطانية؟
      - ما هي العلاقة بين الكشك والوظيفة؟
  - id: london_postbox
    name: صندوق البريد
    prompt: |
      صناديق البريد الحمراء في كل مكان. ابحث عن واحد. لاحظ الختم الملكي.
      صندوق البريد هو عقدة في شبكة. ماذا يمر عبره؟
    follow_ups:
      - ماذا سيكون الشارع بدون صندوق البريد؟
      - كيف يميز صندوق البريد المنطقة؟
      - ما هي العلاقة بين صندوق البريد والرسالة؟
  - id: london_pavement
    name: الرصيف
    prompt: |
      "Pavement" البريطانية هي "sidewalk" الأمريكية. الكلمة تشكل طريقة تفكيرنا.
      امشِ على الرصيف. ما هي العلاقة بين الرصيف والطريق؟
    follow_ups:
      - ماذا سيكون الشارع بدون الرصيف؟
      - كيف يخلق الرصيف الأمان؟
      - ما هي العلاقة بين الرصيف والمشاة؟
  - id: london_brick
    name: طوب لندن
    prompt: |
      طوب لندن غالبًا ما يكون أصفر أو أحمر — طوب ستوك لندن. ابحث عن جدار طوب
      وا درس اللون، الملمس، الرباط. كيف يتقدم الطوب في العمر؟
    follow_ups:
      - ماذا سيكون المبنى بدون الطوب؟
      - كيف يخلق الطوب الهوية؟
      - ما هي العلاقة بين الطوب والمكان؟
  - id: london_weather
    name: طقس لندن
    prompt: |
      طقس لندن متقلب. قف في مكان واحد لمدة عشرين دقيقة. شاهد
      السماء. كيف يشكل الطقس مزاج المدينة؟
    follow_ups:
      - ماذا ستكون لندن بدون المطر؟
      - كيف يشكل الطقس العمارة؟
      - ما هي العلاقة بين الطقس وحياة الشارع؟
  - id: london_queue
    name: طابور
    prompt: |
      البريطانيون يصطفون في طوابير. ابحث عن طابور — حافلة، محل، معلم سياحي. راقب الآداب.
      الطابور هو شكل من أشكال النظام. كيف يعمل؟
    follow_ups:
      - ماذا سيكون المكان بدون الطابور؟
      - كيف يخلق الطابور العدالة؟
      - ما هي العلاقة بين الطابور والثقافة؟
  - id: london_roundabout
    name: دوار
    prompt: |
      لندن بها العديد من الدوارات — دوائر المرور. راقب واحدة. كيف يتدفق المرور؟ ما هو المنطق؟ الدوار هو عقدة.
    follow_ups:
      - ماذا سيكون التقاطع بدون الدوار؟
      - كيف يشكل الدوار التدفق؟
      - ما هي العلاقة بين الدوار والملتقى؟
  - id: london_parks_room
    name: غرفة الحدائق
    prompt: |
      حدائق لندن هي غرف — هايد بارك، ريجنتس بارك، الميادين. ادخل واحدة.
      لاحظ الحدود، المسارات، الأثاث. كيف تُصمم الطبيعة؟
    follow_ups:
      - ماذا ستكون لندن بدون الحدائق؟
      - كيف تخلق الحديقة الراحة؟
      - ما هي العلاقة بين الحديقة والمدينة؟
  - id: london_square
    name: ميدان لندن
    prompt: |
      ميدانات لندن غالبًا ما تكون خاصة — مغلقة بالبوابات، بالمفاتيح. ابحث عن واحد. ما الذي بداخله؟
      من لديه حق الوصول؟ الميدان هو جيب من التفرد.
    follow_ups:
      - ماذا سيكون الحي بدون الميدان؟
      - كيف يخلق الميدان مجتمعًا؟
      - ما هي العلاقة بين الميدان والشارع؟
  - id: london_terrace
    name: صف منازل
    prompt: |
      الصف هو صف من المنازل. امشِ في واحد. لاحظ التوحيد والاختلاف. كيف يخلق الصف الهوية؟
    follow_ups:
      - ماذا سيكون الشارع بدون الصف؟
      - كيف يخلق الصف الإيقاع؟
      - ما هي العلاقة بين الصف والفرد؟
  - id: london_corner_shop
    name: محل زاوية
    prompt: |
      محل الزاوية مؤسسة لندن. ادخل واحدًا. ماذا يباع؟ من يديره؟ المحل هو عقدة في الحي.
    follow_ups:
      - ماذا سيكون المبنى بدون المحل؟
      - كيف يخلق المحل المواجهة؟
      - ما هي العلاقة بين المحل والمجتمع؟
  - id: london_bus_route
    name: خط حافلات
    prompt: |
      حافلات لندن لها أرقام ووجهات. استقل حافلة لم تركبها من قبل.
      إلى أين تذهب؟ كيف يشكل الخط المدينة؟
    follow_ups:
      - ماذا ستكون الرحلة بدون الحافلة؟
      - كيف يخلق الخط الاتصال؟
      - ما هي العلاقة بين الحافلة والحي؟
  - id: london_clock
    name: ساعة لندن
    prompt: |
      بيج بن، الساعة في المحطة، الساعة على الكنيسة. لندن مليئة بالساعات العامة. ابحث عن واحدة. أي وقت تشير إليه؟ هل هي صحيحة؟
    follow_ups:
      - ماذا سيكون المكان بدون الساعة؟
      - كيف تشكل الساعة الوقت؟
      - ما هي العلاقة بين الساعة والمكان؟
  - id: london_bridge
    name: جسر لندن
    prompt: |
      لندن بها العديد من الجسور — برج لندن، جسر الألفية، واترلو. اعبر
      واحدًا سيرًا على الأقدام. اشعر بالانتقال. ماذا يتغير؟
    follow_ups:
      - ماذا سيكون النهر بدون الجسر؟
      - كيف يربط الجسر؟
      - ما هي العلاقة بين الجسر والنهر؟
  - id: london_street_market
    name: سوق الشارع
    prompt: |
      لندن بها أسواق شوارع — بوروه، كامدن، بورتوبيلو. امشِ في واحد. ماذا
      يُباع؟ من يبيع؟ السوق مدينة مؤقتة.
    follow_ups:
      - ماذا سيكون الشارع بدون السوق؟
      - كيف يخلق السوق المواجهة؟
      - ما هي العلاقة بين السوق والحي؟
  - id: london_ghost_sign
    name: علامة شبحية في لندن
    prompt: |
      اللافتات الباهتة على الطوب — اللافتات الشبحية — تشير إلى الماضي. ابحث عن واحدة. ماذا كانت تعلن؟
      من كان سيرى ذلك؟
    follow_ups:
      - ماذا سيكون الجدار بدون اللافتة؟
      - كيف تحافظ اللافتة الشبحية على التاريخ؟
      - ما هي العلاقة بين اللافتة والتجارة؟
  - id: london_bollard
    name: عمود حماية
    prompt: |
      أعمدة الحماية تحدد الحدود — مناطق المشاة، منع الوقوف. ابحث عن صف من
      أعمدة الحماية. ماذا تحمي؟ ماذا تستبعد؟
    follow_ups:
      - ماذا سيكون المكان بدون أعمدة الحماية؟
      - كيف تشكل أعمدة الحماية التدفق؟
      - ما هي العلاقة بين عمود الحماية والحدود؟
  - id: london_door_number
    name: رقم الباب
    prompt: |
      عناوين لندن يمكن أن تكون غريبة — أرقام فردية على جانب، وأرقام زوجية على الجانب الآخر. اتبع
      الأرقام. كيف يشكل الترقيم الشارع؟
    follow_ups:
      - ماذا سيكون توجيه المسار بدون الأرقام؟
      - كيف يخلق الترقيم النظام؟
      - ما هي العلاقة بين الرقم والمكان؟
  - id: london_basement
    name: قبو لندن
    prompt: |
      منازل لندن غالبًا ما تحتوي على أقبية — أحيانًا تحت مستوى الشارع. لاحظ
      الدرج المؤدي إلى الأسفل، والمساحة الأمامية. ما الذي يوجد تحت الرصيف؟
    follow_ups:
      - ماذا سيكون المنزل بدون القبو؟
      - كيف يخلق القبو مساحة؟
      - ما هي العلاقة بين القبو والشارع؟
  - id: london_roof_line
    name: خط السقف
    prompt: |
      خطوط أسقف لندن متنوعة — ألواح، بلاط، مسطحة. انظر للأعلى. تتبع
      الأفق. كيف يشكل السقف الشارع؟
    follow_ups:
      - ماذا سيكون الشارع بدون الأسقف؟
      - كيف يخلق خط السقف الهوية؟
      - ما هي العلاقة بين السقف والسماء؟
  - id: london_cobble
    name: حجارة الرصف
    prompt: |
      لا تزال حجارة الرصف موجودة في بعض الشوارع. امشِ عليها. اشعر بالملمس.
      كيف يشكل السطح الشارع؟
    follow_ups:
      - ماذا سيكون الشارع بدون حجارة الرصف؟
      - كيف تشير حجارة الرصف إلى التاريخ؟
      - ما هي العلاقة بين حجارة الرصف والحداثة؟
  - id: london_lamp_post
    name: عمود الإنارة
    prompt: |
      أعمدة إنارة لندن لها طراز خاص — فيكتوري، حديث. ابحث عن واحد.
      كيف يشكل العمود الشارع ليلاً؟
    follow_ups:
      - ماذا سيكون الشارع بدون العمود؟
      - كيف يخلق العمود الأمان؟
      - ما هي العلاقة بين العمود والظلام؟
  - id: london_bus_stop
    name: موقف حافلات
    prompt: |
      محطات حافلات لندن بها مظلات، وجداول، وأرقام. انتظر في واحدة. من الآخرين
      ينتظر؟ ما هي الآداب؟
    follow_ups:
      - ماذا سيكون الشارع بدون الموقف؟
      - كيف يخلق الموقف مجتمعًا؟
      - ما هي العلاقة بين الموقف والرحلة؟
  - id: london_pub_sign
    name: لافتة حانة
    prompt: |
      لافتات الحانات معلقة فوق الشارع — التاج، الأسد الأحمر. ابحث عن واحدة. ما هي
      الصورة؟ ما هي القصة؟ اللافتة معلم.
    follow_ups:
      - ماذا سيكون الشارع بدون اللافتة؟
      - كيف تخلق اللافتة الهوية؟
      - ما هي العلاقة بين اللافتة والحانة؟
  - id: london_church_spire
    name: برج كنيسة
    prompt: |
      أبراج الكنائس تبرز في أفق لندن. ابحث عن واحد. كيف يوجهك البرج؟ ماذا سيكون المنظر بدونه؟
    follow_ups:
      - ماذا سيكون الأفق بدون البرج؟
      - كيف يخلق البرج معلمًا؟
      - ما هي العلاقة بين البرج والحي؟
  - id: london_canal
    name: قناة لندن
    prompt: |
      لندن بها قنوات — قناة ريجنتس، القناة الكبرى. امشِ على الممشى.
      القناة هي خيط. ما الذي يوجد على كل جانب؟
    follow_ups:
      - ماذا ستكون المدينة بدون القناة؟
      - كيف تخلق القناة الاتصال؟
      - ما هي العلاقة بين القناة والصناعة؟
  - id: london_garden_square
    name: ميدان حديقة
    prompt: |
      ميدانات الحدائق في لندن غالبًا ما تكون مغلقة. انظر عبر البوابة. ما الذي
      بداخله؟ من لديه المفتاح؟ الحديقة غرفة مخفية.
    follow_ups:
      - ماذا سيكون الميدان بدون الحديقة؟
      - كيف تخلق الحديقة التفرد؟
      - ما هي العلاقة بين الحديقة والميدان؟
  - id: london_taxi
    name: سيارة أجرة لندن
    prompt: |
      السيارات السوداء أيقونات. شاهد واحدة تتوقف، تلتقط، تنطلق. كيف تشكل
