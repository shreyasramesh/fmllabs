    follow_ups:
      - ماذا سيكون الشارع بدون واجهة المحل؟
      - كيف تخلق الواجهة الهوية؟
      - ما هي العلاقة بين الواجهة والتجارة؟
  - id: london_paving
    name: رصف لندن
    prompt: |
      رصف لندن متنوع — بلاط، أسفلت، طوب. امشِ في مبنى ولاحظ
