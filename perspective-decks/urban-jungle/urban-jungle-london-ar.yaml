    follow_ups:
      - ماذا سيكون الشارع بدون المجرى؟
      - كيف تدير المجاري المياه؟
      - ما هي العلاقة بين المجرى والنظام؟
  - id: london_shop_front
    name: واجهة محل
    prompt: |
      واجهات محلات لندن غالبًا ما تكون صغيرة — ضيقة، عميقة. انظر من خلال النافذة. ماذا
