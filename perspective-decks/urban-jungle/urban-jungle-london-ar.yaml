    follow_ups:
      - ماذا سيكون المكان بدون المقعد؟
      - كيف يخلق المقعد الراحة؟
      - ما هي العلاقة بين المقعد والشارع؟
  - id: london_drain
    name: مجاري لندن
    prompt: |
      انظر للأسفل. ابحث عن مجرى — قناة، شبكة. إلى أين تذهب المياه؟
