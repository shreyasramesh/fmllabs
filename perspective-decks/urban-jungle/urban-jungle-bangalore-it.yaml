# Giungla Urbana — Bangalore (Italian)

id: urban_jungle_bangalore
name: Giungla Urbana — Bangalore
description: 50 carte per cambiare la tua prospettiva su Bangalore, dalla scala alla luce, dagli strati di storia ai ritmi della vita di strada.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Quartiere Recintato
    prompt: |
      I quartieri recintati di Bangalore hanno muri, guardie, cancelli. Stai a un cancello.

      Cosa c'è dentro? Chi entra? Il cancello segna un confine. Cosa protegge?
    follow_ups:
      - Cosa sarebbe la strada senza il cancello?
      - Come il cancello crea sicurezza?
      - Qual è la relazione tra cancello e quartiere?
  - id: blr_tree_canopy
    name: Baldacchino di Alberi
    prompt: |
      Bangalore era un tempo una città giardino. Vecchi alberi fanno ancora ombra ad alcune strade.
      Cammina sotto uno. Come il baldacchino cambia la luce? Il suono?
    follow_ups:
      - Cosa sarebbe la strada senza l'albero?
      - Come il baldacchino crea microclima?
      - Qual è la relazione tra albero e città?
