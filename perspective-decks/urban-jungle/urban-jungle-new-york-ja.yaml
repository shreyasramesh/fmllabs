# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# アーバン・ジャングル — ニューヨーク (Japanese)

id: urban_jungle_new_york
name: アーバン・ジャングル — ニューヨーク
description: |
  ニューヨークの見方を変える50枚のカード。スケールや光から、
  歴史の層、そして街の生活のリズムまで。
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: 垂直都市
    prompt: |
      見上げてごらん。ニューヨークは垂直に築かれている。塔が空を競い合っている。
      一つの建物を、歩道から頂上まで辿ってみよう。高さが、あなたの気づきをどう変えるか？
      あなたの目はどこに休まるか？
    follow_ups:
      - 上から見ると、街はどう見えるだろうか？
      - 異なる高さで、スケールはどのように歪むか？
      - 上だけを見ていると、何が隠されてしまうだろうか？
  - id: ny_grid_navigation
    name: グリッド・ナビゲーション
    prompt: |
      マンハッタンのグリッドは容赦ない。一ブロック歩いて、番地システムが
      移動、方角、そして驚きをどう形作っているか気づいてみよう。
      グリッドを破ると、何が起こるか？
    follow_ups:
      - グリッドが息苦しく感じるのはどこか？解放的か？
      - グリッドがなかったら、街はどう感じられるだろうか？
      - 斜めの道は、リズムをどう変えるか？
  - id: ny_subway_soundscape
    name: 地下鉄の音風景
    prompt: |
      駅で目を閉じてみよう。轟音、ブレーキ音、アナウンス、バスカー。
      音風景を地図にしてみよう。見えないとき、ニューヨークはどんな音がするのか？
    follow_ups:
      - どの音が常に聞こえるか？どの音が偶然か？
      - ここで沈黙はどんな意味を持つだろうか？
      - 音は地下の時間をどのように刻むか？
  - id: ny_fire_escape
    name: ファイアー・エスケープ
    prompt: |
      ファイアー・エスケープは、街の外骨格だ。機能的で、リズミカルで、個人的だ。
      それらが繰り返されているブロックを見つけてみよう。
      それらは、その背後にある建物について何を明らかにしているか？
      夜、誰がそこに座っているだろうか？
    follow_ups:
      - そこから何が見えるだろうか？
      - それらは、街の通りにどのような性格を与えるか？
      - それらがなければ、ブロックは何を失うだろうか？
  - id: ny_street_number
    name: 通りの番号
    prompt: |
      一つの番号を選んでみよう。建物の番号、階、バス路線。
      それを街を追って辿ってみよう。どんなパターンが現れるか？
      その番号はここで何を意味するか？
    follow_ups:
      - その番号はどこへあなたを導くか？
      - 違う番号だったら、何が明らかになるだろうか？
      - 数字は、都市の経験をどのように秩序づけるか？
  - id: ny_steam_rising
    name: 立ち込める蒸気
    prompt: |
      マンホールの蒸気は、ニューヨークの息遣いだ。それが立ち昇る場所を見つけ、
      その動き、拡散、光を捉える様子を眺めてみよう。
      その下には何があるか？街は何を吐き出しているのか？
    follow_ups:
      - 鉄格子の下には何があるだろうか？
      - 天候は蒸気をどう変えるか？
      - 他にどんな隠されたシステムがここで換気されているか？
  - id: ny_storefront_typography
    name: 店先のタイポグラフィ
    prompt: |
      看板を読んでみよう。ボデガ、デリ、ランドロマット――それぞれに視覚言語がある。
      一つのブロックから、5つの書体を集めてみよう。 それは、そこに住む人々について何を語っているか？
    follow_ups:
      - どの看板が古く感じるか？どれが新しいか？
      - 看板が話せるとしたら、ブロックはどう聞こえるだろうか？
      - タイポグラフィは変化をどのように刻むか？
  - id: ny_waterfront_edge
    name: ウォーターフロントの端
    prompt: |
      水辺に行ってみよう。街は川、港、湾に背を向けている。
      陸と水が出会う場所に立ってみよう。眺めのために何が建てられたか？
      眺めを無視するために何が建てられたか？
    follow_ups:
      - 誰が水を見る権利があるのか？
      - 端はどのように占領されてきたか？
      - 街が水に向き合っていたら、それはどのようなものになるだろうか？
  - id: ny_parks_as_rooms
    name: 公園は部屋として
    prompt: |
      セントラルパーク、プロスペクトパーク、小さなプラザ――それぞれが街の部屋だ。
      一つに入って、その壁、天井、家具に気づいてみよう。
      ここでは、自然はどのようにデザインされているか？
    follow_ups:
      - その部屋の目的は何か？
      - 視線は誰によってデザインされたか？
      - 壁がなくなったら、何が起こるだろうか？
  - id: ny_delivery_rhythm
    name: 配達のリズム
    prompt: |
      配達を見てみよう――トラック、手押し車、自転車。
      一つの荷物の道筋を、トラックからドアまで辿ってみよう。
      商業はどのように街を動くか？到着のリズムは？
    follow_ups:
      - 配達がなかったら、ブロックはどう見えるだろうか？
      - 異なる品物は、どのように異なって運ばれるか？
      - この流れの中で、誰が見えなくなるか？
  - id: ny_brownstone_steps
    name: ブラウンストーンの階段
    prompt: |
      ブラウンストーンの階段は舞台だ。一つに座って、通りを眺めてみよう。
      誰が立ち止まるか？誰が通り過ぎるか？
      ここから、あなたなら何を言うだろうか？
    follow_ups:
      - 一番上の段からの眺めは？
      - 階段はどのように領域を作り出すか？
      - 階段がなければ、ブロックは何を失うだろうか？
  - id: ny_bridge_as_threshold
    name: 橋は境界として
    prompt: |
      歩いて橋を渡ってみよう。移り変わりを感じて――ある区から別の区へ。 橋は、ここにもあそこにもない。反対側に着くと、何が変わるか？
    follow_ups:
      - 何を置き去りにするか？
      - 橋は旅をどのように形作るか？
      - 橋がなければ、街はどうなるだろうか？
  - id: ny_awning_shade
    name: オーニングの影
    prompt: |
      オーニングはマイクロクライメートを作り出す。その下に立ってみよう。
      光、音、温度の変化に気づいてみよう。
      小さな構造物は、街をどう変えるか？
    follow_ups:
      - オーニングがなければ、ブロックはどう感じられるだろうか？
      - それらはどのように所有権を示すか？
      - ここには他にどんな小さな避難所があるか？
  - id: ny_graffiti_layer
    name: グラフィティの層
    prompt: |
      壁を見てみよう。タグ、壁画、ウィートペースト――それぞれが時間と主張の層だ。
      パリンプセストを読んでみよう。誰がこの表面に印をつけたのか？
    follow_ups:
      - 見つけられる最も古い印は何か？
      - 層はどのように物語を語るか？
      - 壁が話せるとしたら、何と言うだろうか？
  - id: ny_rooftop_skyline
    name: 屋上のスカイライン
    prompt: |
      屋上からの眺めを想像してみよう。給水塔、アンテナ、隣の屋根。
      上からの街は、違う街だ。何が見えるだろうか？
    follow_ups:
      - 高さによって、何が重要になるか？
      - 通りからは何が隠されているか？
      - この眺めには誰がアクセスできるのか？
  - id: ny_crosswalk_wait
    name: 横断歩道の待ち時間
    prompt: |
      横断歩道で待ってみよう。信号が変わっても渡らない。次のサイクルまで待ってみよう。
      その一時停止中に、何に気づくか？他に誰が待っているか？
    follow_ups:
      - 待つことは、知覚をどう変えるか？
      - 交差点はどのようなリズムに支配されているか？
      - 決して渡らなかったら、何が起こるだろうか？
  - id: ny_diner_booth
    name: ダイナーのブース
    prompt: |
      窓際のダイナーのブースに座ってみよう。街は映画のようになる。
      通行人、交通、光を眺めてみよう。どんな物語が再生されているか？
    follow_ups:
      - 主人公は誰か？
      - フレームは、あなたが見るものをどう変えるか？
      - 窓がなければ、何を見逃すだろうか？
  - id: ny_scaffolding_skin
    name: 足場の皮膚
    prompt: |
      足場は建物を包帯のように包む。その下を歩いてみよう。
      音、光、一時的な天井に気づいてみよう。
      何が修理されているか？何が隠されているか？
    follow_ups:
      - どれくらいそこに置かれているか？
      - 足場がなければ、建物は何と言うだろうか？
      - 修理と隠蔽の関係は何か？
  - id: ny_newsstand_archive
    name: ニューススタンドのアーカイブ
    prompt: |
      ニューススタンドは、雑誌、新聞、キャンディー――注意の断片だ。
      何が陳列されているか？誰が立ち止まるか？
      それがなければ、この角はどうなるだろうか？
    follow_ups:
      - ベストセラーは何か？
      - スタンドはブロックをどう形作るか？
      - そこに何を置くだろうか？
  - id: ny_construction_site
    name: 建設現場
    prompt: |
      建設現場を眺めてみよう。クレーン、バリケード、作業員。
      街は常に生まれ変わっている。何が建てられているか？何が置き換えられているか？
    follow_ups:
      - 完成したら、誰がこれを使うだろうか？
      - ここには以前何があったか？
      - 建設は、近隣をどう変えるか？
  - id: ny_light_well
    name: ライトウェル（光井）
    prompt: |
      ライトウェル――建物と建物の間の狭い隙間で、光が差し込む場所――を探してみよう。
      誰がその光を得るか？そこに何が育つか？
    follow_ups:
      - その竪穴で暮らすのはどうだろうか？
      - 光はどのように価値を定義するか？
      - 影の中には何が隠されているか？
  - id: ny_bodega_cat
    name: ボデガの猫
    prompt: |
      猫のいるボデガを見つけよう。猫はルールの中にも外にもいる。
      街の他に何がそのように機能しているか？
    follow_ups:
      - 猫は何を見るか？
      - 非公式なルールは、空間をどのように形作るか？
      - 猫がなければ、店はどうなるだろうか？
  - id: ny_sidewalk_crack
    name: 歩道のひび割れ
    prompt: |
      下を見てみよう。歩道のひび割れを辿ってみよう。どこへ行くのか？
      そこに何が育つのか？街はこのような亀裂で満ちている。
    follow_ups:
      - 歩道は時間について何と言うだろうか？
      - 小さな亀裂はどのように重要か？
      - 何がそこから押し出されているか？
  - id: ny_air_conditioner
    name: エアコン
    prompt: |
      一つの建物にあるエアコンの数を数えてみよう。それらは寄生虫、 補綴物、
      必需品だ。それらはファサードをどう変えるか？何が滴るか？
    follow_ups:
      - それらがなければ、建物はどう見えるだろうか？
      - 気候は建築をどう形作るか？
      - それらをどこに置くか誰が決めるか？
  - id: ny_express_local
    name: 急行／各駅停車
    prompt: |
      地下鉄に乗ってみよう。急行と各駅停車の違いに気づいてみよう。
      スピードは、あなたが見るものを変える。駅を飛ばして、街が圧縮されるのを感じてみよう。
    follow_ups:
      - 止まらないときに、何を見逃すか？
      - スピードは経験をどう形作るか？
      - 全てが各駅停車だったら、街はどうなるだろうか？
  - id: ny_water_tower
    name: 給水塔
    prompt: |
      給水塔は古い建物の頂上を飾る。木製で、樽型で、どこにでもある。
      5つ見つけてみよう。それらはスカイラインについて何を語るか？
    follow_ups:
      - なぜそれらはまだそこにあるのか？
      - 給水塔がなければ、屋根はどう見えるだろうか？
      - それらはどのように年齢を示すか？
  - id: ny_awning_stripes
    name: オーニングの縞模様
    prompt: |
      縞模様のオーニングは、ニューヨークの言葉だ。それらが繰り返されるブロックを見つけよう。
      縞模様はどのようにアイデンティティを作るか？無地の色だったらどうなるか？
    follow_ups:
      - なぜ縞模様で、無地ではないのか？
      - オーニングはブロックをどのように統一するか？
      - このパターンの歴史は？
  - id: ny_curb_cut
    name: カーブカット（段差解消スロープ）
    prompt: |
      カーブカット――角にあるランプ――に気づいてみよう。
      それらは車椅子、カート、ベビーカーのためだ。
      それらは街をどう変えるか？誰を包含するか？
    follow_ups:
      - それらがなければ、ブロックはどうなるだろうか？
      - アクセスはデザインをどう形作るか？
      - 他にどんな見えない配慮が存在するか？
  - id: ny_street_tree
    name: 通りの木
    prompt: |
      一つの通りの木を選んでみよう。どれくらいのスペースがあるか？
      その穴には何があるか？誰が水をやるか？
      木はゲストだ。どのように扱われているか？
    follow_ups:
      - 木がなければ、ブロックはどうなるだろうか？
      - 木はどのように配慮を示すか？
      - 木の影に何が育つか？
  - id: ny_loading_zone
    name: 荷物積み下ろしゾーン
    prompt: |
      荷物積み下ろしゾーンは一時的な領域だ。10分間観察してみよう。
      誰がそれを使うか？どれくらい滞在するか？
      占有のリズムは？
    follow_ups:
      - 荷物積み下ろしゾーンがなければ、何が起こるだろうか？
      - ルールはどのように曲げられるか？
      - 駐車と商業の関係は何か？
  - id: ny_vent_grille
    name: 換気グリッド
    prompt: |
      歩道のグリッドは地下鉄の換気をする。その上に立ってみよう。
      吹き上げる空気を感じてみよう。耳を澄ませてみよう。
      街はこれらの開口部を通して呼吸している。
    follow_ups:
      - 下から何が上がってくるか？
      - グリッドは世界をどう繋ぐか？
      - それがなければ、歩道はどうなるだろうか？
  - id: ny_basement_stairs
    name: 地下室への階段
    prompt: |
      地下への階段――地下鉄、地下室、スピークイージーへ――を見つけよう。
      街には多くのレベルがある。歩道の下には何があるか？
    follow_ups:
      - 誰が下へ行くか？
      - 下降は光をどう変えるか？
      - 一番下には何があるだろうか？
  - id: ny_clock_tower
    name: 時計台
    prompt: |
      公共の時計を見つけよう。正確か？誰が設定したのか？
      時計は街を秩序づける。それらが不一致になると、何が起こるか？
    follow_ups:
      - 時計がなければ、ブロックはどうなるだろうか？
      - 時間はどのように同期されるか？
      - 時計の時間と体の時間の関係は何か？
  - id: ny_newsstand_magazine
    name: ニューススタンドの雑誌
    prompt: |
      ニューススタンドで、雑誌の表紙を選んでみよう。
      それは誰のためか？読者について何を仮定しているか？
      スタンドは欲望の鏡だ。
    follow_ups:
      - このディスプレイから、見知らぬ人は何を学ぶだろうか？
      - 表紙はどのように注目を集めるために競い合うか？
      - スタンドにないものは何か？
  - id: ny_awning_rain
    name: オーニングの雨
    prompt: |
      雨の中、オーニングの下に立ってみよう。端から水が流れる様子を眺めてみよう。
      オーニングは乾いた島を作り出す。誰があなたとそれを共有するか？
    follow_ups:
      - 避難所がなければ、ブロックはどう感じられるだろうか？
      - 雨は街をどう変えるか？
      - 他にどんな避難所があるか？
  - id: ny_fire_hydrant
    name: 消火栓
    prompt: |
      消火栓は街の循環システムへのプラグだ。一つ見つけよう。
      何色か？誰が開けるだろうか？何が流れるか？
    follow_ups:
      - それがなければ、火事のときにブロックはどうなるだろうか？
      - 消火栓はどのように領域を示すか？
      - 消火栓とホースの関係は何か？
  - id: ny_stoop_sale
    name: 階段のセール
    prompt: |
      これらの階段でのセールを想像してみよう。何が売られるだろうか？
      誰が立ち止まるだろうか？階段は交換の舞台だ。
    follow_ups:
      - 何を出すだろうか？
      - 階段はどのように出会いを可能にするか？
      - セールからブロックは何を学ぶだろうか？
  - id: ny_rooftop_garden
    name: 屋上庭園
    prompt: |
      あなたの上の屋上庭園を想像してみよう。何が育つだろうか？誰が手入れするか？
      街には秘密の緑の層がある。
    follow_ups:
      - 何を植えるだろうか？
      - 高さはどのように園芸を変えるか？
      - 全ての屋根が緑になったら、スカイラインはどう見えるだろうか？
  - id: ny_subway_map
    name: 地下鉄の地図
    prompt: |
      地下鉄の地図を見てみよう。それは地理ではなく、図だ。
      何が歪められているか？何が省略されているか？
      地図は、街について私たちがどう考えるかを形作る。
    follow_ups:
      - 真実の地図は、どう見えるだろうか？
      - 地図はどのように地域を創造するか？
      - 地図と領域の関係は何か？
  - id: ny_brick_pattern
    name: レンガの模様
    prompt: |
      レンガの壁を研究してみよう。模様――ランニング・ボンド、フランドル・ボンド――が壁を支えている。
      模様を辿ってみよう。レンガが一つ欠けたら、何が起こるだろうか？
    follow_ups:
      - 模様はどのように重量を分散するか？
      - 壁は、その作り手について何と言うだろうか？
      - レンガはどのように古くなるか？
  - id: ny_awning_strip
    name: オーニングの帯
    prompt: |
      一ブロック歩いて、オーニングの数を数えてみよう。
      どんな色か？どんな状態か？オーニングは小さな建築だ。
      どのように変化するか？
    follow_ups:
      - オーニングがなければ、ブロックはどう見えるだろうか？
      - オーニングはどのようにアイデンティティを作るか？
      - オーニングとビジネスの関係は何か？
  - id: ny_manhole_cover
    name: マンホールの蓋
    prompt: |
      マンホールの蓋を読んでみよう。街の名前、部署、日付。
      これらの円盤は、別の街への扉だ。その下には何があるか？
    follow_ups:
      - 誰がそこへ下りるか？
      - 蓋はどのように領域を示すか？
      - これらの扉がなければ、街はどうなるだろうか？
  - id: ny_bus_shelter
    name: バス停のシェルター
    prompt: |
      バス停のシェルターで待ってみよう。他に誰が待っているか気づいてみよう。
      シェルターは共有の部屋だ。エチケットは？眺めは？
    follow_ups:
      - シェルターがなければ、待つことはどうなるだろうか？
