# الغابة الحضرية — سان فرانسيسكو (Arabic)

id: urban_jungle_san_francisco
name: الغابة الحضرية — سان فرانسيسكو
description: 50 بطاقة لتغيير نظرتك لمدينة سان فرانسيسكو — من الحجم والضوء إلى طبقات التاريخ وإيقاعات حياة الشارع.
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: درجة الانحدار
    prompt: |
      سان فرانسيسكو مبنية على منحدرات. اشعر بالمنحدر تحت قدميك. كيف تغير
      درجة الانحدار ما تلاحظه؟ أين تميل المدينة؟
    follow_ups:
      - كيف سيبدو الشارع لو كان مسطحًا؟
      - كيف تشكل التلال الأحياء؟
      - ما هو أشد منحدر تسلقته؟
  - id: sf_fog_layer
    name: طبقة الضباب
    prompt: |
      الضباب يتسلل. راقبه وهو يتحرك — فوق الجسر، نزولًا على التلال. الضباب
      شخصية. كيف يغير الضوء؟ الصوت؟
    follow_ups:
      - ماذا ستكون المدينة بدون ضباب؟
      - كيف يحدد الضباب الوقت؟
      - أين يتوقف الضباب؟
  - id: sf_cable_car_track
    name: مسار عربة الكابل
    prompt: |
      اتبع مسار عربة الكابل. الشق في الرصيف، همهمة الكابل. عربة الكابل
      أثر قديم لا يزال يعمل. ماذا تحمل؟
    follow_ups:
      - ماذا سيكون المنحدر بدون المسار؟
      - كيف تشكل عربة الكابل السياحة؟
      - ما هي العلاقة بين المسار والشارع؟
  - id: sf_victorian_detail
    name: تفاصيل فيكتورية
    prompt: |
      منازل سان فرانسيسكو الفيكتورية مزخرفة — مزينة بزخارف خشبية، نوافذ بانورامية،
      وألوان. ابحث عن أحدها واقرأ تفاصيله. ما القصة التي ترويها الزخرفة؟
    follow_ups:
      - ماذا سيكون المنزل بدون التفاصيل؟
      - كيف يغير اللون الشارع؟
      - ما هي العلاقة بين العمارة الفيكتورية والحديثة؟
  - id: sf_painted_lady
    name: سيدة مطلية
    prompt: |
      "السيدات المطليات" مشهورات، ولكن لكل منزل فيكتوري لوحة ألوان. اجمع
      خمس مجموعات ألوان من حي واحد. ماذا تقول الألوان؟
    follow_ups:
      - لماذا هذه الألوان؟
      - كيف يحافظ الطلاء أو يحول؟
      - كيف سيبدو الحي باللون الرمادي؟
  - id: sf_bay_window
    name: نافذة خليجية
    prompt: |
      الشبابيك الخليجية تنتفخ في الشارع. هي للضوء، وللمنظر، وللعرض. قف أمام
      أحدها. ماذا سترى من الداخل؟
    follow_ups:
      - كيف يغير الشباك الغرفة؟
      - ماذا سيكون الواجهة بدونها؟
      - كيف تخلق الشبابيك الخليجية علاقة مع الشارع؟
  - id: sf_stairway_street
    name: شارع درج
    prompt: |
      سان فرانسيسكو بها سلالم هي بمثابة شوارع — درجات بدلًا من الرصيف. اصعد
      أحدها. كيف يغير السلم الحي؟
    follow_ups:
      - من يستخدم هذه الدرجات؟
      - ماذا سيكون المنحدر بدونها؟
      - كيف تخلق السلالم مجتمعًا؟
  - id: sf_mission_mural
    name: جدارية الميشن
    prompt: |
      حي الميشن هو معرض للجداريات. ابحث عن جدارية واقرأها. ما هي القصة؟ من
      رسمها؟ لمن هي؟
    follow_ups:
      - ماذا ستقول الجدران بدون الجدارية؟
      - كيف تطالب الجداريات بالمساحة؟
      - ما هي العلاقة بين الجدارية والحي؟
  - id: sf_earthquake_retrofit
    name: تدعيم الزلازل
    prompt: |
      ابحث عن تدعيمات الزلازل — مسامير، دعامات، أساسات. تتذكر المدينة
      عامي 1906 و1989. كيف يشكل الخوف البيئة المبنية؟
    follow_ups:
      - ماذا سيكون المبنى بدون التدعيم؟
      - كيف يظهر التصميم الزلزالي؟
      - ما هي العلاقة بين التدعيم والثقة؟
  - id: sf_dolores_palm
    name: نخلة دولوريس
    prompt: |
      أشجار النخيل تصطف على طول شارع دولوريس. هي ليست محلية، ولكنها أيقونية.
      ماذا تقول عن علاقة المدينة بالأماكن الأخرى؟
    follow_ups:
      - ماذا سيكون الشارع بدون النخيل؟
      - كيف تحدد النخيل الهوية؟
      - ما هي العلاقة بين النخلة والمكان؟
  - id: sf_twin_peaks_view
    name: منظر قمتي التوأم
    prompt: |
      تخيل المنظر من قمتي التوأم. المدينة تنتشر بالأسفل — شبكة، ماء،
      جسور. كيف يغير الارتفاع ما يهم؟
    follow_ups:
      - ماذا سترى من هناك؟
      - كيف يشكل المنظر صورة المدينة؟
      - ما الذي يخفيه القمة؟
  - id: sf_ferry_building
    name: مبنى العبارة
    prompt: |
      مبنى العبارة يواجه الخليج. هو عتبة — أرض وماء، مدينة وتنقل. قف عند
      مدخله. ماذا يتدفق عبره؟
    follow_ups:
      - ماذا سيكون الواجهة البحرية بدونه؟
      - كيف يحدد المبنى الانتقال؟
      - ما هي العلاقة بين العبارة والمدينة؟
  - id: sf_chinatown_gate
    name: بوابة الحي الصيني
    prompt: |
      بوابة التنين تحدد الحي الصيني. اعبر من خلالها. ماذا يتغير؟ البوابة
      حقيقية ورمزية على حد سواء. كيف تعمل؟
    follow_ups:
      - ماذا سيكون الحي الصيني بدون البوابة؟
      - كيف تخلق البوابة الهوية؟
      - ما هي العلاقة بين البوابة والحي؟
  - id: sf_hydrant_color
    name: لون صنبور الحريق
    prompt: |
      صنابير إطفاء الحريق في سان فرانسيسكو بألوان مختلفة — أزرق، أخضر، أحمر.
      اللون يشير إلى تدفق المياه. ابحث عن ثلاثة ألوان. ماذا يعني كل لون؟
    follow_ups:
      - ماذا سيفعل الحي عند نشوب حريق؟
      - كيف تشفر الألوان المعلومات؟
      - ما هي العلاقة بين صنبور الحريق والنظام؟
  - id: sf_parklet
    name: الحدائق المصغرة
    prompt: |
      الحدائق المصغرة تستعيد مواقف السيارات للبشر. اجلس في إحداها. ما هي
      الأثاث؟ من يستخدمها؟ كيف تغير الحديقة المصغرة الحي؟
    follow_ups:
      - ماذا سيكون المكان بدون الحديقة المصغرة؟
      - كيف تخلق الحديقة المصغرة اللقاء؟
      - ماذا ستضيف؟
  - id: sf_sf_street_sign
    name: لافتة شارع سان فرانسيسكو
    prompt: |
      لافتات شوارع سان فرانسيسكو لها نمط معين. لاحظ الخط، طريقة التركيب،
      المكان. كيف تشكل اللافتة تحديد الاتجاه؟
    follow_ups:
      - ماذا سيكون الحي بدون اللافتة؟
      - كيف يؤثر الخط؟
      - ما هي العلاقة بين اللافتة والهوية؟
  - id: sf_castro_rainbow
    name: قوس قزح كاسترو
    prompt: |
      يرفع حي كاسترو أعلام قوس قزح. امشِ في الشارع وعد الأعلام. كيف تطالب
      اللافتة بالمساحة؟ ماذا تعني هنا؟
    follow_ups:
      - ماذا سيكون الحي بدون الأعلام؟
      - كيف يخلق العلم مجتمعًا؟
      - ما هي العلاقة بين الرمز والمكان؟
  - id: sf_haight_vintage
    name: هايهت القديم
    prompt: |
      حي هايهت هو متحف للستينات. ابحث عن مبنى لم يتغير. ما الذي تم الحفاظ
