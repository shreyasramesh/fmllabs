    follow_ups:
      - ماذا سيكون الشارع بدون الأجواء القديمة؟
      - كيف يشكل التاريخ التجارة؟
      - ما هي العلاقة بين الماضي والحاضر؟
  - id: sf_sutro_tower
    name: برج سـوترو
    prompt: |
      برج سوترو مرئي من كل مكان. استخدمه كبوصلة. كيف يوجهك البرج؟ ماذا
      سيكون الأفق بدونه؟
    follow_ups:
      - ماذا يبث البرج؟
      - كيف يشكل البرج الهوية؟
      - ما هي العلاقة بين البرج والمنظر؟
  - id: sf_bart_underground
    name: مترو الأنفاق تحت الأرض
    prompt: |
      استقل مترو الأنفاق تحت الخليج. أنت في أنبوب تحت الماء. اشعر بالضغط،
      بالظلام، بالظهور. كيف يغير النفق الرحلة؟
    follow_ups:
      - ماذا ستكون الرحلة بدون النفق؟
      - كيف يفصل الخليج؟
      - ما هي العلاقة بين النفق والمنطقة؟
  - id: sf_taquería_line
    name: طابور التاكو
    prompt: |
      انضم إلى طابور تاكو في منتصف الليل. الطابور هو طقس. من فيه؟ ماذا يطلبون؟
      الطابور مجتمع.
    follow_ups:
      - ماذا سيكون الحي بدون التاكو؟
      - كيف يخلق الطابور اللقاء؟
      - ما هي العلاقة بين الطعام والمكان؟
  - id: sf_dolores_sun
    name: شمس دولوريس
    prompt: |
      حديقة دولوريس تواجه الغرب. في يوم مشمس، هي بمثابة شاطئ. راقب الحشد.
      كيف تشكل الشمس الحديقة؟ من يحصل على أفضل الأماكن؟
    follow_ups:
      - ماذا ستكون الحديقة بدون الشمس؟
      - كيف يهم التوجيه؟
      - ما هي العلاقة بين الحديقة والطقس؟
  - id: sf_mission_door
    name: باب الميشن
    prompt: |
      أبواب الميشن غالبًا ما تكون مزخرفة — منحوتة، ملونة، فريدة. ابحث عن خمسة
      أبواب في حي واحد. ماذا تقول عن المباني خلفها؟
    follow_ups:
      - ماذا سيكون الحي بدون الأبواب؟
      - كيف يخلق الباب الهوية؟
      - ما هي العلاقة بين الباب والعتبة؟
  - id: sf_coit_tower
    name: برج كويت
    prompt: |
      يوجز برج كويت تل التيليغراف. هو نصب تذكاري، نقطة مراقبة، معلم.
      كيف يشكل البرج التل؟ ماذا سيكون التل بدونه؟
    follow_ups:
      - ماذا يخلد البرج؟
      - كيف يوجه البرج المدينة؟
      - ما هي العلاقة بين البرج والحي؟
  - id: sf_lombard_curve
    name: منعطف لومبارد
    prompt: |
      ينزل شارع لومبارد في منحنيات من التل. يشتهر بمنعطفاته الحادة. امشِ عليه. كيف يغير المنعطف النزول؟ ماذا سيفعل شارع مستقيم؟
    follow_ups:
      - ماذا سيكون التل بدون المنعطف؟
      - كيف يشكل المنعطف التجربة؟
      - ما هي العلاقة بين المنعطف والسلامة؟
  - id: sf_alcatraz_silhouette
    name: صورة ظلية لألكتراز
    prompt: |
      من الواجهة البحرية، ألكتراز هي صورة ظلية. الجزيرة موجودة دائمًا، بعيدة
      دائمًا. ماذا تعني للمدينة؟
    follow_ups:
      - ماذا سيكون الخليج بدون الجزيرة؟
      - كيف تشكل الجزيرة المنظر؟
      - ما هي العلاقة بين السجن والمدينة؟
  - id: sf_ghost_sign
    name: لافتة شبحية
    prompt: |
      اللافتات الشبحية — إعلانات باهتة على الطوب — تحدد الماضي. ابحث عن واحدة.
      ماذا كانت تعلن؟ من كان سيرى ذلك؟
    follow_ups:
      - ماذا ستقول الجدران بدون اللافتة؟
      - كيف تحافظ اللافتة الشبحية على التاريخ؟
      - ما هي العلاقة بين اللافتة والتجارة؟
  - id: sf_sf_sidewalk
    name: رصيف سان فرانسيسكو
    prompt: |
      غالبًا ما تكون أرصفة سان فرانسيسكو متشققة، مائلة، وجذور الأشجار
      تخترقها. امشِ في حي ولاحظ الملمس. كيف يشيخ الرصيف؟
    follow_ups:
      - ماذا سيكون الحي بدون الرصيف؟
      - كيف يشكل الرصيف الحركة؟
      - ما هي العلاقة بين الرصيف والشجرة؟
  - id: sf_golden_gate_fog
    name: ضباب البوابة الذهبية
    prompt: |
      جسر البوابة الذهبية يختفي في الضباب. راقبه وهو يختفي ويعود. الضباب
      ستار. ماذا يوجد خلفه؟
    follow_ups:
      - ماذا سيكون الجسر بدون الضباب؟
      - كيف يشكل الضباب المنظر؟
      - ما هي العلاقة بين الضباب والجسر؟
  - id: sf_mission_dolores
    name: ميشن دولوريس
    prompt: |
      ميشن دولوريس هو أقدم مبنى في المدينة. قف أمامه. ماذا رأى؟ كيف يحدد
      الوقت؟
    follow_ups:
      - ماذا سيكون الحي بدون الميشن؟
      - كيف يشكل الميشن الهوية؟
      - ما هي العلاقة بين الميشن والمدينة؟
  - id: sf_painted_steps
    name: درجات مطلية
    prompt: |
      درجات شارع 16th المبلطة هي فسيفساء. اصعدها. كل درجة مختلفة. كيف يغير
      الفن الصعود؟
    follow_ups:
      - ماذا ستكون الدرجات بدون البلاط؟
      - كيف يخلق الفسيفساء مجتمعًا؟
      - ما هي العلاقة بين الفن والصعود؟
  - id: sf_sf_street_tree
    name: شجرة شارع سان فرانسيسكو
    prompt: |
      أشجار شوارع سان فرانسيسكو غالبًا ما تكون نخيلًا، ماغنوليا، أو فيكس. ابحث
