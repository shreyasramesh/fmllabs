    follow_ups:
      - ماذا سيكون الحي بدون الشجرة؟
      - كيف تخلق الشجرة موطنًا؟
      - ما هي العلاقة بين الشجرة والرصيف؟
  - id: sf_sf_bay_window
    name: نافذة خليجية في سان فرانسيسكو
    prompt: |
      الشبابيك الخليجية هي لهجة من لهجات سان فرانسيسكو. تنتفخ في الشارع،
