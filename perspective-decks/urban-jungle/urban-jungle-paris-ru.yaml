# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Городские джунгли — Париж (Russian)

id: urban_jungle_paris
name: Городские джунгли — Париж
description: 50 карточек, чтобы изменить ваш взгляд на Париж — от масштаба и света до слоев истории и ритмов уличной жизни.
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: Цветок на балконе
    prompt: |
      Парижские балконы утопают в цветах — герани, петунии. Найдите дом, где на каждом балконе стоит горшок с цветами. Как цветок меняет фасад?
    follow_ups:
      - Что было бы на улице без цветов?
      - Как цветы создают индивидуальность?
      - Какие отношения между цветком и жильцом?
  - id: paris_haussmann_line
    name: Линия Османа
    prompt: |
      Бульвары Османа прорезают старый Париж. Пройдитесь по одному из них. Линия безостановочна — дома выровнены, высоты одинаковы. Как бульвар формирует движение?
    follow_ups:
      - Что было бы с Парижем без Османа?
      - Как бульвар создает перспективу?
      - Какие отношения между линией и властью?
  - id: paris_cafe_terrace
    name: Терраса кафе
    prompt: |
      Террасы парижских кафе обращены к улице. Сядьте за столик на одной из них. Вы находитесь одновременно внутри и снаружи. Терраса — это порог. Что вы видите?
    follow_ups:
      - Что было бы на улице без террасы?
      - Как терраса создает встречу?
      - Какие отношения между террасой и улицей?
  - id: paris_metro_entrance
    name: Вход в метро
    prompt: |
      Входы в парижское метро в стиле модерн — это иконы. Найдите один такой. Кованое железо, надписи — вход является порталом. Что он обещает?
    follow_ups:
      - Что было бы на улице без входа?
      - Как вход создает индивидуальность?
      - Какие отношения между входом и подземкой?
  - id: paris_shutter
    name: Французское окно-ставня
    prompt: |
      Парижские ставни — volets — закрываются на ночь. Они зеленые, серые, синие. Найдите улицу, где ставни закрыты. Что за ними?
    follow_ups:
      - Что было бы с фасадом без ставень?
      - Как ставни создают приватность?
      - Какие отношения между ставней и светом?
  - id: paris_cobble
    name: Парижская брусчатка
    prompt: |
      Парижская брусчатка — pavés — все еще здесь. Пройдитесь по ней. Почувствуйте текстуру. Брусчатка — это реликт другого Парижа. Как она формирует улицу?
    follow_ups:
      - Что было бы на улице без брусчатки?
      - Как брусчатка отмечает историю?
      - Какие отношения между брусчаткой и революцией?
  - id: paris_seine_edge
    name: Берег Сены
    prompt: |
      Сена протекает через Париж. Спуститесь к набережной. Река — это шов. Что находится по обе стороны? Как река разделяет и соединяет?
    follow_ups:
      - Что было бы с Парижем без Сены?
      - Как река формирует город?
      - Какие отношения между рекой и берегом?
  - id: paris_roof_zinc
    name: Цинковая кровля
    prompt: |
      Парижские крыши часто покрыты цинком — серые, наклонные, с мансардами. Посмотрите вверх. Линия крыши характерна. Как она формирует горизонт?
    follow_ups:
      - Что было бы с горизонтом без цинка?
      - Как цинк создает индивидуальность?
      - Какие отношения между крышей и чердаком?
  - id: paris_door_height
    name: Высота двери
    prompt: |
      Парижские двери часто высокие — двойной высоты. Найдите одну такую. Что бы через нее могло пройти? Дверь — это порог масштаба.
    follow_ups:
      - Что было бы с домом без высокой двери?
      - Как высота создает величие?
      - Какие отношения между дверью и домом?
  - id: paris_boulangerie_smell
    name: Запах булочной
    prompt: |
      В булочной пахнет хлебом. Следуйте за запахом. Пекарня — это узел. Что этот запах говорит о квартале?
    follow_ups:
      - Что было бы на улице без запаха?
      - Как запах создает индивидуальность?
      - Какие отношения между запахом и торговлей?
  - id: paris_place
    name: Парижская площадь
    prompt: |
      В Париже есть площади — скверы, круги, узлы. Найдите одну. Обратите внимание на геометрию. Как площадь формирует улицы, ведущие к ней?
    follow_ups:
      - Что было бы с районом без площади?
      - Как площадь создает центр?
      - Какие отношения между площадью и потоком?
  - id: paris_balcony_iron
    name: Балконное железо
    prompt: |
      Решетки парижских балконов часто богато украшены — кованое железо, изгибы, завитки. Найдите одну. Как железо формирует фасад?
    follow_ups:
      - Что было бы с домом без железа?
      - Как железо создает индивидуальность?
      - Какие отношения между железом и ремеслом?
  - id: paris_plane_tree
    name: Платан
    prompt: |
      Парижские платаны высажены вдоль бульваров. Их кора шелушится. Найдите один. Как дерево формирует улицу? Что было бы с бульваром без него?
    follow_ups:
      - Что было бы на улице без платана?
      - Как платан создает тень?
      - Какие отношения между деревом и бульваром?
  - id: paris_metro_tile
    name: Плитка метро
    prompt: |
      В парижских станциях метро — белая плитка. Тоннель — это труба света. Прокатитесь по одной из линий. Как плитка формирует поездку?
    follow_ups:
      - Что было бы со станцией без плитки?
      - Как плитка создает чистоту?
      - Какие отношения между плиткой и подземкой?
  - id: paris_clock
    name: Парижские часы
    prompt: |
      В Париже много общественных часов — на церквях, станциях, зданиях. Найдите одни. Который час они показывают? Они идут правильно?
    follow_ups:
      - Что было бы с пространством без часов?
      - Как часы формируют время?
      - Какие отношения между часами и местом?
  - id: paris_newsstand
    name: Парижский киоск
    prompt: |
      Парижские киоски продают газеты, журналы, билеты на метро. Найдите один. Что выставлено на продажу? Кто останавливается? Киоск — это узел.
    follow_ups:
      - Что было бы на улице без киоска?
      - Как киоск создает встречу?
      - Какие отношения между киоском и улицей?
  - id: paris_bench
    name: Парижская скамья
    prompt: |
      В Париже есть зеленые скамьи в парках и вдоль Сены. Сядьте на одну. Кто еще сидит? Какой вид открывается?
    follow_ups:
      - Что было бы с пространством без скамьи?
      - Как скамья создает передышку?
      - Какие отношения между скамьей и рекой?
  - id: paris_boulangerie_queue
    name: Очередь в булочной
    prompt: |
      Встаньте в очередь в булочную в утренний час пик. Очередь — это ритуал. Что покупают люди? Каков этикет?
    follow_ups:
      - Что было бы на улице без очереди?
      - Как очередь создает сообщество?
      - Какие отношения между очередью и хлебом?
  - id: paris_manhole
    name: Парижский люк
    prompt: |
      На крышках парижских люков часто написано "Paris" или "Eau". Найдите одну. Крышка — это дверь к венам города. Что под ней?
    follow_ups:
      - Что было бы на улице без крышки?
      - Как крышка отмечает систему?
      - Какие отношения между крышкой и подземкой?
  - id: paris_shadow
    name: Парижская тень
    prompt: |
      Парижский свет создает резкие тени. Найдите угол, где встречаются тень и солнце. Как тень формирует улицу?
    follow_ups:
      - Что было бы на улице без тени?
      - Как тень создает контраст?
      - Какие отношения между тенью и зданием?
  - id: paris_courtyard
    name: Парижский двор
    prompt: |
      Парижские здания часто скрывают дворы — cours — за воротами. Загляните внутрь. Что там? Двор — это потайная комната.
    follow_ups:
      - Что было бы с домом без двора?
      - Как двор создает приватность?
      - Какие отношения между двором и улицей?
  - id: paris_bike_lane
    name: Парижская велодорожка
    prompt: |
      В Париже появились новые велодорожки — pistes cyclables. Найдите одну. Как дорожка формирует улицу? Кто ею пользуется?
    follow_ups:
      - Что было бы на улице без дорожки?
      - Как дорожка создает мобильность?
      - Какие отношения между дорожкой и автомобилем?
  - id: paris_fountain
    name: Парижский фонтан
    prompt: |
      В Париже есть фонтаны — фонтаны Уоллеса, монументальные фонтаны. Найдите один. Что он предлагает? Кто им пользуется?
    follow_ups:
      - Что было бы на месте без фонтана?
      - Как фонтан создает дар?
      - Какие отношения между фонтаном и общественностью?
  - id: paris_awning
    name: Парижский навес
    prompt: |
      Навесы парижских кафе создают тень. Найдите улицу, где навесы повторяются. Как они формируют тротуар?
    follow_ups:
      - Что было бы на улице без навесов?
      - Как навесы создают территорию?
      - Какие отношения между навесом и террасой?
  - id: paris_lamp_post
    name: Парижский фонарный столб
    prompt: |
      Парижские фонарные столбы имеют особый стиль — часто богато украшены, часто зеленые. Найдите один. Как фонарь освещает улицу ночью?
    follow_ups:
      - Что было бы на улице без фонаря?
      - Как фонарь создает безопасность?
      - Какие отношения между фонарем и темнотой?
  - id: paris_door_knocker
    name: Дверной молоток
    prompt: |
      На парижских дверях часто есть молотки — львиные головы, руки, кольца. Найдите один. Как бы он звучал? Молоток — это предмет-порог.
    follow_ups:
      - Что было бы с дверью без молотка?
      - Как молоток создает звук?
      - Какие отношения между молотком и входом?
  - id: paris_shop_sign
    name: Парижская вывеска магазина
    prompt: |
      Вывески парижских магазинов часто написаны от руки — булочная, мясная лавка, сырная лавка.
      Найдите одну. Что говорит вывеска о магазине?
    follow_ups:
      - Что было бы на улице без вывески?
      - Как вывеска создает идентичность?
      - Какие отношения между вывеской и ремеслом?
  - id: paris_parking
    name: Парижская парковка
    prompt: |
      Парковка в Париже креативна — машины на тротуарах, под углом, втиснутые. Наблюдайте
      за тем, как кто-то паркуется. Как машина помещается? Каковы отношения между автомобилем и городом?
    follow_ups:
      - Что было бы на улице без машин?
      - Как парковка формирует улицу?
      - Какие отношения между парковкой и пространством?
  - id: paris_drain
    name: Парижский водосток
    prompt: |
      Парижские водостоки идут вдоль бордюра. После дождя они текут. Найдите один. Куда уходит вода? Водосток — это шов.
    follow_ups:
      - Что было бы на улице без водостока?
      - Как водосток управляет водой?
      - Какие отношения между водостоком и системой?
  - id: paris_chimney
    name: Парижский дымоход
    prompt: |
      Парижские дымоходы пронзают линию крыши. Сосчитайте их на одном здании. Дымоход — это реликт тепла. Что здесь горело?
    follow_ups:
      - Что было бы на крыше без дымохода?
      - Как дымоход отмечает историю?
      - Какие отношения между дымоходом и огнем?
  - id: paris_metro_map
    name: Карта метро
    prompt: |
      Карта парижского метро — это схема. Она искажает географию. Что
      подчеркивается? Что опущено? Как карта формирует город?
    follow_ups:
      - Что было бы с навигацией без карты?
      - Как карта создает связь?
      - Какие отношения между картой и территорией?
  - id: paris_bridge
    name: Парижский мост
    prompt: |
      В Париже много мостов через Сену. Перейдите через один пешком. Почувствуйте
      переход. Что меняется? Мост — это порог.
    follow_ups:
      - Что было бы с рекой без моста?
      - Как мост соединяет?
      - Какие отношения между мостом и рекой?
  - id: paris_graffiti
    name: Парижское граффити
    prompt: |
      В Париже есть граффити — теги, трафареты, муралы. Найдите стену с несколькими слоями. Каков палимпсест? Кто оставил метку на этой поверхности?
    follow_ups:
      - Что было бы со стеной без граффити?
      - Как граффити захватывает пространство?
      - Какие отношения между граффити и городом?
  - id: paris_tree_guard
    name: Ограда дерева
    prompt: |
      У парижских уличных деревьев часто есть ограды — металлические решетки вокруг основания. Найдите одну. Что защищает ограда? Что она исключает?
    follow_ups:
      - Что было бы с деревом без ограды?
      - Как ограда формирует яму?
      - Какие отношения между оградой и деревом?
  - id: paris_bus_stop
    name: Парижская автобусная остановка
    prompt: |
      На парижских автобусных остановках есть навесы, расписания, цифровые дисплеи. Подождите на одной. Кто еще ждет? Каков этикет?
    follow_ups:
      - Что было бы на улице без остановки?
      - Как остановка создает сообщество?
      - Какие отношения между остановкой и путешествием?
  - id: paris_terrace_table
    name: Столик на террасе
    prompt: |
      Столик на террасе кафе обращен к улице. Сядьте за один. Столик — это сцена.
      Что вы наблюдаете? Что наблюдает вас?
    follow_ups:
      - Что было бы на террасе без столика?
      - Как столик создает встречу?
      - Какие отношения между столиком и улицей?
  - id: paris_roof_dormer
    name: Мансардное окно
    prompt: |
      Парижские мансардные окна — мансардные окна — пронзают горизонт. Найдите здание
      с множеством таких. Какой вид открывался бы изнутри?
    follow_ups:
      - Что было бы на крыше без мансардных окон?
      - Как мансардные окна создают свет?
      - Какие отношения между мансардным окном и чердаком?
  - id: paris_parking_metre
    name: Парковочный автомат
    prompt: |
      Парижские парковочные автоматы часто представляют собой серые коробки. Найдите один. Как он формирует бордюр? Кто платит? Кто нет?
    follow_ups:
      - Что было бы на улице без автомата?
      - Как автомат управляет пространством?
      - Какие отношения между автоматом и автомобилем?
  - id: paris_doorway
    name: Парижский дверной проем
    prompt: |
      Парижский дверной проем часто высокий, часто богато украшенный. Встаньте перед одним. Каково было бы пройти через него? Дверной проем — это порог.
    follow_ups:
      - Что было бы с домом без дверного проема?
      - Как дверной проем создает величие?
      - Какие отношения между дверным проемом и интерьером?
  - id: paris_metro_stair
    name: Лестница метро
    prompt: |
      Лестницы метро спускаются в землю. Сосчитайте ступеньки. Почувствуйте
      переход. Что наверху? Что внизу?
    follow_ups:
      - Что было бы со станцией без лестницы?
      - Как лестница создает спуск?
      - Какие отношения между лестницей и подземкой?
  - id: paris_bench_view
    name: Вид со скамьи
    prompt: |
      Сядьте на скамью с видом — на Сену, площадь, улицу. Какова рамка? Каков фокус? Скамья — это точка обзора.
    follow_ups:
      - Что было бы с видом без скамьи?
      - Как скамья создает паузу?
      - Какие отношения между скамьей и видом?
  - id: paris_shutter_open
    name: Открытая ставня
    prompt: |
      Парижские ставни открываются утром. Найдите улицу, где они открываются.
      Каков ритуал? Что открывает открытие?
    follow_ups:
      - Что было бы на улице без ставень?
      - Как ставня создает ритм?
      - Какие отношения между ставней и днем?
  - id: paris_cobble_pattern
    name: Узор брусчатки
    prompt: |
      Парижская брусчатка укладывается узорами — иногда "елочкой", иногда
      радиально. Найдите узор. Как он формирует улицу?
    follow_ups:
      - Что было бы на улице без узора?
      - Как узор создает текстуру?
      - Какие отношения между узором и ремеслом?
  - id: paris_plane_bark
    name: Кора платана
    prompt: |
      Кора парижских платанов шелушится участками. Прикоснитесь к одной. Кора — это текстура.
      Как стареет дерево? Что было бы на улице без него?
    follow_ups:
      - Что было бы с бульваром без платана?
      - Как кора создает индивидуальность?
      - Какие отношения между корой и деревом?
  - id: paris_fountain_drink
    name: Питьевой фонтан
    prompt: |
      Фонтаны Уоллеса предлагают бесплатную воду. Найдите один. Кто пьет? Кто нет?
