    follow_ups:
      - Comment le coucher de soleil façonne-t-il la soirée ?
      - Quelle est la relation entre le coucher de soleil et la vue ?
      - Que manqueriez-vous sans la lumière ?
  - id: sf_sf_wind
    name: Vent SF
    prompt: |
      Le vent de San Francisco est constant dans certains quartiers. Sentez-le. Comment le
