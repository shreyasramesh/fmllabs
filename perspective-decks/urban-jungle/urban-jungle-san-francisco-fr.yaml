    follow_ups:
      - À quoi ressemblerait le quartier sans le parc ?
      - Comment le parc crée-t-il un répit ?
      - Quelle est la relation entre le parc et le pâté de maisons ?
  - id: sf_sf_stairs
    name: Escaliers SF
    prompt: |
      San Francisco compte plus de 600 escaliers publics. Trouvez-en un que vous n'avez jamais
      monté. Qu'y a-t-il en haut ? Qu'y a-t-il en bas ?
    follow_ups:
      - À quoi ressemblerait la colline sans les escaliers ?
      - Comment les escaliers créent-ils des raccourcis ?
      - Quelle est la relation entre les escaliers et le quartier ?
  - id: sf_sf_mural
    name: Murale SF
    prompt: |
      La Mission a plus de murales par habitant que n'importe où aux États-Unis. Trouvez-en une
      qui raconte une histoire. Quel est le récit ? Pour qui est-il ?
    follow_ups:
      - À quoi ressemblerait le mur sans la murale ?
      - Comment la murale revendique-t-elle l'espace ?
      - Quelle est la relation entre la murale et la communauté ?
  - id: sf_sf_water
    name: Eau SF
    prompt: |
      San Francisco est entourée d'eau — baie, océan, détroit. Allez au bord.
