    follow_ups:
      - À quoi ressemblerait la ville sans l'eau ?
      - Comment l'eau façonne-t-elle l'identité ?
      - Quelle est la relation entre l'eau et la ville ?
  - id: sf_sf_sunset
    name: Coucher de soleil SF
    prompt: |
      Les couchers de soleil de San Francisco sont célèbres. Regardez-en un depuis une colline. La lumière
