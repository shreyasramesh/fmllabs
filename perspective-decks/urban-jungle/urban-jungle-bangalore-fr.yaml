# Jungle Urbaine — Bangalore (French)

id: urban_jungle_bangalore
name: Jungle Urbaine — Bangalore
description: 50 cartes pour changer votre regard sur Bangalore, de son échelle et de sa lumière aux couches d'histoire et aux rythmes de la vie de rue.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Colonie Fortifiée
    prompt: |
      Les colonies fortifiées de Bangalore ont des murs, des gardes, des portes. Tenez-vous à une porte.
      Qu'y a-t-il à l'intérieur ? Qui entre ? La porte marque une limite. Que protège-t-elle ?
    follow_ups:
      - Que serait la rue sans la porte ?
      - Comment la porte crée-t-elle la sécurité ?
      - Quelle est la relation entre la porte et la colonie ?
  - id: blr_tree_canopy
    name: Canopée d'Arbres
    prompt: |
      Bangalore fut autrefois une ville-jardin. De vieux arbres ombragent encore certaines rues.
      Promenez-vous sous l'un d'eux. Comment la canopée modifie-t-elle la lumière ? Le son ?
    follow_ups:
      - Que serait la rue sans l'arbre ?
      - Comment la canopée crée-t-elle un microclimat ?
      - Quelle est la relation entre l'arbre et la ville ?
  - id: blr_tech_park
    name: Parc Technologique
    prompt: |
      Les parcs technologiques sont des campus : verre, pelouse, navettes. Trouvez-en un. Comment le
      parc se sépare-t-il de la ville ? Quelle est la relation entre l'intérieur et l'extérieur ?
    follow_ups:
      - Que serait le quartier sans le parc ?
      - Comment le parc crée-t-il une identité ?
      - Quelle est la relation entre le parc et la rue ?
  - id: blr_auto_rickshaw
    name: Auto-Rickshaw
    prompt: |
      Les auto-rickshaws se faufilent dans le trafic. Observez-en un négocier un carrefour. Comment
      l'auto s'insère-t-elle là où les voitures ne peuvent pas ? Quelle est la logique du zig-zag ?
    follow_ups:
      - Que serait la rue sans l'auto ?
      - Comment l'auto crée-t-elle la mobilité ?
      - Quelle est la relation entre l'auto et le trafic ?
  - id: blr_chai_stall
    name: Étal de Chai
    prompt: |
      Les étals de chai sont des nœuds : petits, temporaires, essentiels. Trouvez-en un. Qui s'y rassemble ?
      Quel est le rythme ? L'étal est une machine sociale.
    follow_ups:
      - Que serait le coin de rue sans l'étal ?
      - Comment l'étal crée-t-il la rencontre ?
      - Quelle est la relation entre l'étal et la rue ?
  - id: blr_billboard
    name: Panneau Publicitaire de Bangalore
    prompt: |
      Les panneaux publicitaires de Bangalore font la promotion de la technologie, de l'immobilier, de l'éducation. Trouvez-en un.
      Que vend-il ? Qui est le public ? Le panneau est un miroir des aspirations.
    follow_ups:
      - Que serait la rue sans le panneau publicitaire ?
      - Comment le panneau façonne-t-il le désir ?
      - Quelle est la relation entre le panneau publicitaire et la ville ?
  - id: blr_compound_wall
    name: Mur de Clôture
    prompt: |
      Les murs de clôture séparent le privé du public. Trouvez un mur. Qu'y a-t-il derrière ?
      Quelle est sa hauteur ? Le mur crée une limite. Qu'exclut-il ?
    follow_ups:
      - Que serait la rue sans le mur ?
      - Comment le mur crée-t-il l'intimité ?
      - Quelle est la relation entre le mur et la clôture ?
  - id: blr_signal_wait
