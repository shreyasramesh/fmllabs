      Attendez à un feu de circulation. Observez les vendeurs : fleurs, jouets, livres.
      Le feu crée une pause. Que se passe-t-il dans la pause ?
    follow_ups:
      - Que serait le carrefour sans le feu ?
      - Comment le feu crée-t-il de l'économie ?
      - Quelle est la relation entre le feu et la rue ?
  - id: blr_rain_drain
