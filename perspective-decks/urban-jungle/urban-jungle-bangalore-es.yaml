# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Jungla Urbana — Bangalore (Spanish)

id: urban_jungle_bangalore
name: Jungla Urbana — Bangalore
description: 50 cartas para cambiar tu forma de ver Bangalore, desde la escala y la luz hasta las capas de historia y los ritmos de la vida callejera.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Colony con Portón
    prompt: |
      Las colonias con portón de Bangalore tienen muros, guardias, portones. Párate en un portón.
      ¿Qué hay dentro? ¿Quién entra? El portón marca un límite. ¿Qué protege?
    follow_ups:
      - ¿Cómo sería la calle sin el portón?
      - ¿Cómo crea el portón seguridad?
      - ¿Cuál es la relación entre el portón y la colonia?
  - id: blr_tree_canopy
    name: Dosel de Árboles
    prompt: |
      Bangalore fue una ciudad jardín. Viejos árboles aún cubren algunas calles.
      Camina bajo uno. ¿Cómo cambia el dosel la luz? ¿El sonido?
    follow_ups:
      - ¿Cómo sería la calle sin el árbol?
      - ¿Cómo crea el dosel un microclima?
      - ¿Cuál es la relación entre el árbol y la ciudad?
  - id: blr_tech_park
    name: Parque Tecnológico
    prompt: |
      Los parques tecnológicos son campus: vidrio, césped, autobuses lanzadera. Busca uno. ¿Cómo se
      separa el parque de la ciudad? ¿Cuál es la relación entre el interior y el exterior?
    follow_ups:
      - ¿Cómo sería el área sin el parque?
      - ¿Cómo crea el parque identidad?
      - ¿Cuál es la relación entre el parque y la calle?
