# Urban Jungle — London (German)

id: urban_jungle_london
name: Urban Jungle — London
description: 50 Karten, um Ihre Sicht auf London zu verändern – von Größe und Licht bis hin zu historischen Schichten und dem Rhythmus des Straßenlebens.
domain: urban_jungle
cards:
  - id: london_layer
    name: Londoner Schicht
    prompt: |
      London ist in Schichten aufgebaut – römisch, mittelalterlich, viktorianisch, modern. Finden Sie einen Ort, an dem sich Epochen treffen. Was ist das Älteste, das Sie sehen können? Das Neueste?
    follow_ups:
      - Was wäre die Straße ohne die Schichten?
      - Wie zeigt sich Geschichte in der gebauten Form?
      - Was ist die Beziehung zwischen Schicht und Identität?
  - id: london_pub_threshold
    name: Pub-Schwelle
    prompt: |
      Ein Londoner Pub hat eine Schwelle – die Stufe nach oben, die Tür, die Theke. Stehen Sie an der Schwelle. Was ist drinnen? Was ist draußen? Das Pub ist ein Raum in der Stadt.
    follow_ups:
      - Was wäre der Block ohne das Pub?
      - Wie schafft die Schwelle den Übergang?
      - Was ist die Beziehung zwischen Pub und Straße?
  - id: london_blue_plaque
    name: Blaue Plakette
    prompt: |
      Blaue Plaketten markieren Orte, an denen berühmte Persönlichkeiten gelebt haben. Finden Sie eine. Wer lebte hier? Was hat er/sie getan? Die Plakette macht Geschichte sichtbar.
    follow_ups:
      - Was wäre das Gebäude ohne die Plakette?
      - Wie prägt die Plakette die Erinnerung?
      - Was ist die Beziehung zwischen Plakette und Ort?
  - id: london_underground
    name: Untergrund
    prompt: |
      Die U-Bahn ist eine Stadt unter der Stadt. Steigen Sie hinab. Beachten Sie die Fliesen, die Karten, die Rolltreppen. Wie prägt der Untergrund das Oberirdische?
    follow_ups:
      - Was wäre London ohne die U-Bahn?
      - Wie schafft der Untergrund Verbindung?
      - Was ist die Beziehung zwischen U-Bahn und Oberfläche?
  - id: london_thames_edge
    name: Themse-Ufer
    prompt: |
      Die Themse fließt durch London. Gehen Sie zur Anlegestelle. Der Fluss ist eine Nahtstelle. Was ist auf beiden Seiten? Wie teilt und verbindet der Fluss?
    follow_ups:
      - Was wäre London ohne die Themse?
      - Wie prägt der Fluss die Stadt?
      - Was ist die Beziehung zwischen Fluss und Ufer?
  - id: london_georgian_row
    name: Georgische Reihe
    prompt: |
      Georgische Reihenhäuser wiederholen sich – Tür, Fenster, Tür, Fenster. Gehen Sie eine Reihe entlang. Die Wiederholung schafft Rhythmus. Was unterbricht ihn? Was hält ihn zusammen?
    follow_ups:
      - Was wäre die Straße ohne die Reihe?
      - Wie schafft Wiederholung Identität?
      - Was ist die Beziehung zwischen Reihe und Einzelperson?
  - id: london_mews
    name: Mews
    prompt: |
      Mews waren einst Ställe, jetzt sind es Wohnhäuser. Finden Sie eine. Die schmale Gasse, das Kopfsteinpflaster, die umgebauten Kutschenhäuser. Wie hält die Vergangenheit an?
    follow_ups:
      - Was wäre die Mews ohne die Geschichte?
      - Wie schafft die Mews Privatsphäre?
      - Was ist die Beziehung zwischen Mews und Hauptstraße?
  - id: london_phone_box
    name: Telefonzelle
    prompt: |
      Rote Telefonzellen sind Ikonen. Finden Sie eine. Ist sie noch ein Telefon? Ein Defibrillator? Eine Bibliothek? Wie werden Ikonen neu interpretiert?
    follow_ups:
      - Was wäre die Straße ohne die Zelle?
      - Wie kennzeichnet die Zelle Britischsein?
      - Was ist die Beziehung zwischen Zelle und Funktion?
  - id: london_postbox
    name: Briefkasten
    prompt: |
      Rote Briefkästen sind überall. Finden Sie einen. Beachten Sie das königliche Monogramm. Der Briefkasten ist ein Knotenpunkt in einem Netzwerk. Was fließt durch ihn?
    follow_ups:
      - Was wäre die Straße ohne den Briefkasten?
      - Wie kennzeichnet der Briefkasten Territorien?
      - Was ist die Beziehung zwischen Briefkasten und Brief?
  - id: london_pavement
    name: Bürgersteig
    prompt: |
      Das britische "pavement" ist das amerikanische "sidewalk". Das Wort prägt unser Denken. Gehen Sie über den Bürgersteig. Was ist die Beziehung zwischen Bürgersteig und Straße?
    follow_ups:
      - Was wäre die Straße ohne den Bürgersteig?
      - Wie schafft der Bürgersteig Sicherheit?
      - Was ist die Beziehung zwischen Bürgersteig und Fußgänger?
  - id: london_brick
    name: Londoner Ziegelstein
    prompt: |
      Londoner Ziegelsteine sind oft gelb oder rot – London Stock. Finden Sie eine Ziegelmauer und studieren Sie die Farbe, die Textur, den Verband. Wie altert Ziegelstein?
    follow_ups:
      - Was wäre das Gebäude ohne den Ziegelstein?
      - Wie schafft Ziegelstein Identität?
      - Was ist die Beziehung zwischen Ziegelstein und Ort?
  - id: london_weather
    name: Londoner Wetter
    prompt: |
      Das Londoner Wetter ist wechselhaft. Stehen Sie zwanzig Minuten lang an einem Ort. Beobachten Sie den Himmel. Wie prägt das Wetter die Stimmung der Stadt?
    follow_ups:
      - Was wäre London ohne den Regen?
      - Wie prägt das Wetter die Architektur?
      - Was ist die Beziehung zwischen Wetter und Straßenleben?
  - id: london_queue
    name: Schlange
    prompt: |
      Briten stehen Schlange. Finden Sie eine Schlange – am Bus, im Geschäft, vor einer Attraktion. Beobachten Sie die Etikette. Die Schlange ist eine Form der Ordnung. Wie funktioniert sie?
    follow_ups:
      - Was wäre der Raum ohne die Schlange?
      - Wie schafft die Schlange Fairness?
      - Was ist die Beziehung zwischen Schlange und Kultur?
  - id: london_roundabout
    name: Kreisverkehr
    prompt: |
      London hat viele Kreisverkehre – Verkehrskreisel. Beobachten Sie einen. Wie fließt der Verkehr? Was ist die Logik? Der Kreisverkehr ist ein Knotenpunkt.
    follow_ups:
      - Was wäre die Kreuzung ohne den Kreisverkehr?
      - Wie prägt der Kreisverkehr den Fluss?
      - Was ist die Beziehung zwischen Kreisverkehr und Knotenpunkt?
  - id: london_parks_room
    name: Parks als Raum
    prompt: |
      Londoner Parks sind Räume – Hyde Park, Regent's Park, die Squares. Betreten Sie einen. Beachten Sie die Grenzen, die Wege, die Möbel. Wie wird Natur gestaltet?
    follow_ups:
      - Was wäre London ohne die Parks?
      - Wie schafft der Park Erholung?
      - Was ist die Beziehung zwischen Park und Stadt?
  - id: london_square
    name: Londoner Platz
    prompt: |
      Londoner Plätze sind oft privat – umzäunt, verschlossen. Finden Sie einen. Was ist drinnen? Wer hat Zugang? Der Platz ist ein Hort der Exklusivität.
