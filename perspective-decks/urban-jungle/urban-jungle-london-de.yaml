  - id: london_street_market
    name: Straßenmarkt
    prompt: |
      London hat Straßenmärkte – Borough, Camden, Portobello. Gehen Sie über einen. Was wird verkauft? Wer verkauft? Der Markt ist eine temporäre Stadt.
