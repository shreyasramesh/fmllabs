# நகர்ப்புறக் காடு — நியூயார்க் (Tamil)

id: urban_jungle_new_york
name: நகர்ப்புறக் காடு — நியூயார்க்
description: 50 அட்டைகள், நியூயார்க்கைப் பார்க்கும் விதத்தை மாற்ற — அளவுகோல் மற்றும் ஒளி முதல் வரலாற்றின் அடுக்குகளும் தெரு வாழ்க்கை ஓட்டங்களும் வரை.
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: செங்குத்து நகரம்
    prompt: |
      மேலே பாருங்கள். நியூயார்க் செங்குத்தாக கட்டப்பட்டது — வானை எட்டும் கோபுரங்கள்.
      ஒரு கட்டிடத்தை நடைபாதையிலிருந்து உச்சிவரை கவனியுங்கள். உயரம் பார்க்கும் விதத்தை
      எப்படி மாற்றுகிறது? உங்கள் கண்கள் எங்கே நிற்கின்றன?
    follow_ups:
      - உச்சியிலிருந்து தெரு எப்படி இருக்கும்?
      - வெவ்வேறு உயரங்களில் அளவு எப்படி சிதைவடைகிறது?
      - மேலே மட்டும் பார்க்கும்போது என்ன மறைக்கப்படுகிறது?
  - id: ny_grid_navigation
    name: கட்ட அமைப்பு வழிசெலுத்தல்
    prompt: |
      மன்ஹாட்டனின் கட்ட அமைப்பு இடைவிடாதது. ஒரு பிளாக்கைக் கடந்து சென்று, எண் அமைப்பு
      எப்படி இயக்கத்தையும், திசையையும், ஆச்சரியத்தையும் வடிவமைக்கிறது என்பதைக் கவனியுங்கள்.
      கட்ட அமைப்பை மீறினால் என்ன நடக்கும்?
    follow_ups:
      - கட்ட அமைப்பு எங்கே அடக்குமுறையாக உணர்கிறது? எங்கே விடுதலையாக?
      - கட்ட அமைப்பு இல்லாமல் நகரம் எப்படி உணரும்?
      - மூலைவிட்டத் தெருக்கள் எவ்வாறு ஓட்டத்தை மாற்றுகின்றன?
  - id: ny_subway_soundscape
    name: சுரங்கப்பாதை ஒலிச்சூழல்
    prompt: |
      ஒரு நிலையத்தில் கண்களை மூடுங்கள். இரைச்சல், பிரேக்குகள், அறிவிப்புகள்,
      தெரு இசைக்கலைஞர். ஒலிச்சூழலை வரைபடமாக்குங்கள். பார்க்க முடியாதபோது நியூயார்க்
      எப்படி ஒலிக்கிறது?
    follow_ups:
      - எந்த ஒலிகள் நிலையானவை? எந்த தற்செயலானவை?
      - இங்கு மௌனம் என்ன அர்த்தம்?
      - பூமிக்கடியில் ஒலி எவ்வாறு நேரத்தைக் குறிக்கிறது?
  - id: ny_fire_escape
    name: தீயணைப்பு ஏணி
    prompt: |
      தீயணைப்பு ஏணிகள் நகரத்தின் வெளிப்புறச் சட்டகம் — செயல்பாட்டுக்குரிய, ஒழுங்கான, தனிப்பட்டவை.
      அவை மீண்டும் மீண்டும் வரும் ஒரு பிளாக்கைக் கண்டறியுங்கள். அவற்றுக்குப் பின்னால் உள்ள கட்டிடங்களைப்
      பற்றி அவை என்ன வெளிப்படுத்துகின்றன? இரவில் யார் அங்கே அமர்ந்திருப்பார்கள்?
    follow_ups:
      - ஒன்றிலிருந்து என்ன தெரியும்?
      - அவை தெருவின் தன்மையை எப்படி மாற்றுகின்றன?
      - அவைகள் இல்லாமல் பிளாக்கிற்கு என்ன இழப்பு?
  - id: ny_street_number
    name: தெரு எண்
    prompt: |
      ஒரு எண்ணைத் தேர்ந்தெடுங்கள் — ஒரு கட்டிட எண், ஒரு மாடி, ஒரு பேருந்து வழி.
      நகரம் முழுவதும் அதைப் பின்தொடருங்கள். என்ன முறை உருவாகிறது? அந்த எண்ணுக்கு இங்கு
      என்ன அர்த்தம்?
    follow_ups:
      - எண் உங்களை எங்கு அழைத்துச் செல்கிறது?
      - வேறு எண் என்ன வெளிப்படுத்தும்?
      - எண்கள் நகர்ப்புற அனுபவத்தை எவ்வாறு ஒழுங்குபடுத்துகின்றன?
  - id: ny_steam_rising
    name: நீராவி எழுவது
    prompt: |
      மனிதக் குழாய் நீராவி நியூயார்க்கின் சுவாசம். அது எழும் இடத்தைக் கண்டறிந்து,
      அது எப்படி நகர்கிறது, சிதறுகிறது, ஒளியைப் பிடிக்கிறது என்பதைக் கவனியுங்கள்.
      அடியில் என்ன இருக்கிறது? நகரம் என்ன வெளியேற்றுகிறது?
    follow_ups:
      - வலைக்கு அடியில் என்ன கண்டுபிடிப்பீர்கள்?
      - வானிலை நீராவி எப்படி மாற்றுகிறது?
      - இங்கு என்ன மறைக்கப்பட்ட அமைப்புகள் காற்றை வெளியேற்றுகின்றன?
  - id: ny_storefront_typography
    name: கடை முகப்பு எழுத்துரு
    prompt: |
      சமிக்ஞைகளைப் படியுங்கள். போடகஸ், டெலிஸ், லாண்டிரோமேட்ஸ் — ஒவ்வொன்றுக்கும் ஒரு காட்சி மொழி உண்டு.
      ஒரு பிளாக்கில் இருந்து ஐந்து எழுத்துருக்களைச் சேகரிக்கவும். இங்கு வசிப்பவர்களைப் பற்றி அவை என்ன கூறுகின்றன?
    follow_ups:
      - எந்த சமிக்ஞைகள் பழையதாக உணர்கின்றன? எது புதியதாக?
      - சமிக்ஞைகளால் பேச முடிந்தால், பிளாக் எப்படி ஒலிக்கும்?
      - எழுத்துரு எவ்வாறு மாற்றத்தைக் குறிக்கிறது?
  - id: ny_waterfront_edge
    name: கடற்கரை ஓரம்
    prompt: |
      தண்ணீருக்குச் செல்லுங்கள். நகரம் நதி, துறைமுகம், விரிகுடாவை நோக்கித் தன் முதுகைத் திருப்புகிறது.
      நிலம் நீரைச் சந்திக்கும் இடத்தில் நில்லுங்கள். பார்வைக்கு என்ன கட்டப்பட்டுள்ளது?
      அதைப் புறக்கணிக்க என்ன கட்டப்பட்டுள்ளது?
    follow_ups:
      - தண்ணீரைப் பார்க்க யாருக்கு உரிமை உண்டு?
      - ஓரம் எப்படி உரிமை கோரப்பட்டது?
      - நகரம் தண்ணீரை நோக்கித் திரும்பினால் எப்படி இருக்கும்?
  - id: ny_parks_as_rooms
    name: பூங்காக்கள் அறைகளாக
    prompt: |
      சென்ட்ரல் பார்க், ப்ராஸ்பெக்ட் பார்க், ஒரு சிறிய பிளாசா — ஒவ்வொன்றும் நகரத்தில்
      ஒரு அறை.
      ஒன்றிற்குள் நுழைந்து அதன் சுவர்கள், கூரை, தளபாடங்கள் ஆகியவற்றைக் கவனியுங்கள். இங்கு
      இயற்கை எவ்வாறு வடிவமைக்கப்பட்டுள்ளது?
    follow_ups:
      - அறையின் நோக்கம் என்ன?
      - பார்வை வரம்புகளை யார் வடிவமைத்தது?
      - சுவர்கள் இடிக்கப்பட்டால் என்ன நடக்கும்?
  - id: ny_delivery_rhythm
    name: விநியோக ஓட்டம்
    prompt: |
      விநியோகங்களைக் கவனியுங்கள் — லாரிகள், கை வண்டிகள், சைக்கிள்கள். ஒரு பொட்டலத்தின்
      பயணத்தை லாரியிலிருந்து கதவு வரை கண்டறியுங்கள். தெருவில் வணிகம் எப்படி நகர்கிறது?
      வருகையின் ஓட்டம் என்ன?
    follow_ups:
      - விநியோகங்கள் இல்லாமல் பிளாக் எப்படி இருக்கும்?
      - வெவ்வேறு பொருட்கள் எப்படி வித்தியாசமாக நகர்கின்றன?
      - இந்த ஓட்டத்தில் யார் கண்ணுக்குத் தெரியாமல் இருக்கிறார்கள்?
  - id: ny_brownstone_steps
    name: பிரவுன்ஸ்டோன் படிகள்
    prompt: |
      பிரவுன்ஸ்டோன் மேடைகள் மேடைகள். ஒன்றில் அமர்ந்து தெருவைக் கவனியுங்கள். யார்
      நிற்கிறார்கள்? யார் கடந்து செல்கிறார்கள்? இங்கிருந்து நீங்கள் என்ன சொல்வீர்கள்?
    follow_ups:
      - மேல் படியிலிருந்து பார்வை எப்படி இருக்கும்?
      - படிகள் எப்படி எல்லையை உருவாக்குகின்றன?
      - அவைகள் இல்லாமல் பிளாக்கிற்கு என்ன இழப்பு?
  - id: ny_bridge_as_threshold
    name: பாலம் ஒரு நுழைவாயிலாக
    prompt: |
      பாதசாரியாக ஒரு பாலத்தைக் கடந்து செல்லுங்கள். மாற்றத்தை உணருங்கள் — ஒரு பரோகோட்டிலிருந்து மற்றொன்றுக்கு. பாலம் இங்குமில்லை அங்கேயுமில்லை. மறுபுறம் செல்லும்போது என்ன மாறுகிறது?
    follow_ups:
      - என்னவற்றை விட்டுச் செல்கிறீர்கள்?
      - பாலம் பயணத்தை எப்படி வடிவமைக்கிறது?
      - பாலங்கள் இல்லாமல் நகரம் எப்படி இருக்கும்?
  - id: ny_awning_shade
    name: பட்டிடாவின் நிழல்
    prompt: |
      பட்டிடப்கள் நுண்-காலநிலைகளை உருவாக்குகின்றன. ஒன்றின் கீழ் நில்லுங்கள். ஒளி,
      ஒலி, வெப்பநிலையில் ஏற்படும் மாற்றத்தைக் கவனியுங்கள். சிறிய கட்டமைப்புகள்
      தெருவை எப்படி மாற்றுகின்றன?
    follow_ups:
      - பட்டிடப்கள் இல்லாமல் பிளாக் எப்படி உணரும்?
      - அவை எப்படி உரிமையைக் குறிக்கின்றன?
      - இங்கு என்ன மற்ற சிறிய தங்குமிடங்கள் உள்ளன?
  - id: ny_graffiti_layer
    name: கிராஃபிட்டி அடுக்கு
    prompt: |
      சுவர்களைப் பாருங்கள். டேக்ஸ், சுவரோவியங்கள், வெட்பேஸ்ட் — ஒவ்வொன்றும் நேரம்
      மற்றும் உரிமை கோரலின் ஒரு அடுக்கு. பல்லிம்ப்செஸ்டைப் படியுங்கள். யார் இந்த
      மேற்பரப்பை அடையாளப்படுத்தியுள்ளனர்?
    follow_ups:
      - நீங்கள் காணக்கூடிய பழைய அடையாளம் என்ன?
      - அடுக்குகள் எப்படி ஒரு கதையைச் சொல்கின்றன?
      - சுவர் பேச முடிந்தால் என்ன சொல்லும்?
  - id: ny_rooftop_skyline
    name: கூரை வானலை
    prompt: |
      ஒரு கூரையின் பார்வையிலிருந்து கற்பனை செய்யுங்கள். தண்ணீர் தொட்டிகள், ஆண்டெனாக்கள்,
      அருகிலுள்ள கூரைகள். மேலிருந்து நகரம் ஒரு வேறுபட்ட நகரம். நீங்கள் என்ன பார்ப்பீர்கள்?
    follow_ups:
      - உயரம் எதை முக்கியமாக்குகிறது?
      - தெருவில் இருந்து என்ன மறைக்கப்படுகிறது?
      - இந்த பார்வைக்கு யார் அணுகல் வைத்திருக்கிறார்கள்?
  - id: ny_crosswalk_wait
    name: குறுக்குவழி காத்திருப்பு
    prompt: |
