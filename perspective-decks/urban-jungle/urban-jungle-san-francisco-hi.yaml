# अर्बन जंगल — सैन फ्रांसिस्को (Hindi)

id: urban_jungle_san_francisco
name: अर्बन जंगल — सैन फ्रांसिस्को
description: 50 ऐसे कार्ड जो सैन फ्रांसिस्को को देखने के आपके नज़रिए को बदल देंगे—बड़े पैमाने और प्रकाश से लेकर इतिहास की परतों और सड़क जीवन की लय तक।
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: पहाड़ी ढलान
    prompt: |
      सैन फ्रांसिस्को ढलानों पर बना है। अपने पैरों के नीचे ढलान को महसूस करें।
      ढलान से आप क्या नोटिस करते हैं, यह कैसे बदल जाता है? शहर कहाँ झुकता है?
    follow_ups:
      - अगर सड़क सपाट होती तो कैसी दिखती?
      - पहाड़ मुहल्लों को कैसे आकार देते हैं?
      - आपने सबसे खड़ी कौन सी गली चढ़ी है?
  - id: sf_fog_layer
    name: कोहरे की परत
    prompt: |
      कोहरा छा जाता है। इसे हिलते हुए देखें—पुल के ऊपर, पहाड़ियों से नीचे।
      कोहरा एक पात्र है। यह प्रकाश को कैसे बदलता है? ध्वनि को?
    follow_ups:
      - कोहरे के बिना शहर कैसा होता?
      - कोहरा समय को कैसे चिह्नित करता है?
      - कोहरा कहाँ रुकता है?
  - id: sf_cable_car_track
    name: केबल कार ट्रैक
    prompt: |
      एक केबल कार ट्रैक का अनुसरण करें। फुटपाथ में स्लॉट, केबल की गुनगुनाहट।
      केबल कार एक अवशेष है जो अभी भी काम करता है। यह क्या ले जाता है?
    follow_ups:
      - ट्रैक के बिना पहाड़ी कैसी होती?
      - केबल कार पर्यटन को कैसे आकार देती है?
      - ट्रैक और सड़क के बीच क्या संबंध है?
  - id: sf_victorian_detail
    name: विक्टोरियन डिटेल
    prompt: |
      सैन फ्रांसिस्को के विक्टोरियन घर अलंकृत होते हैं—जिंजरब्रेड, खाड़ी खिड़कियां, रंग।
      एक ढूंढें और उसके विवरण पढ़ें। आभूषण क्या कहानी कहता है?
    follow_ups:
      - विवरण के बिना घर कैसा होता?
      - रंग सड़क को कैसे बदलता है?
      - विक्टोरियन और आधुनिक के बीच क्या संबंध है?
  - id: sf_painted_lady
    name: पेंटेड लेडी
    prompt: |
      पेंटेड लेडीज़ प्रसिद्ध हैं, लेकिन हर विक्टोरियन का अपना पैलेट होता है।
      एक ब्लॉक से पांच रंग संयोजन इकट्ठा करें। रंग क्या कहते हैं?
    follow_ups:
      - ये रंग क्यों?
      - पेंट कैसे संरक्षित करता है या बदलता है?
      - ब्लॉक ग्रेस्केल में कैसा दिखता?
  - id: sf_bay_window
    name: खाड़ी खिड़की
    prompt: |
      खाड़ी खिड़कियां सड़क में बाहर की ओर निकली होती हैं। वे प्रकाश, दृश्य, प्रदर्शन के लिए हैं।
      एक के सामने खड़े हों। अंदर से आप क्या देखेंगे?
    follow_ups:
      - खाड़ी कमरे को कैसे बदलती है?
      - उसके बिना मुखौटा कैसा होता?
      - खाड़ी खिड़कियां सड़क से संबंध कैसे बनाती हैं?
  - id: sf_stairway_street
    name: सीढ़ीदार सड़क
    prompt: |
      सैन फ्रांसिस्को में सीढ़ियाँ हैं जो सड़कें हैं—फुटपाथ के बजाय कदम।
      एक चढ़ें। सीढ़ियां पड़ोस को कैसे बदलती हैं?
    follow_ups:
      - इन सीढ़ियों का इस्तेमाल कौन करता है?
      - उनके बिना पहाड़ी कैसी होती?
      - सीढ़ियां समुदाय कैसे बनाती हैं?
  - id: sf_mission_mural
    name: मिशन म्यूरल
    prompt: |
      मिशन म्यूरल का एक गैलरी है। एक ढूंढें और उसे पढ़ें। कहानी क्या है?
      इसे किसने चित्रित किया? यह किसके लिए है?
    follow_ups:
      - म्यूरल के बिना दीवार क्या कहेगी?
      - म्यूरल कैसे जगह का दावा करते हैं?
      - म्यूरल और पड़ोस के बीच क्या संबंध है?
  - id: sf_earthquake_retrofit
    name: भूकंप रेट्रोफिट
    prompt: |
      भूकंप रेट्रोफिट की तलाश करें—बोल्ट, ब्रेस, नींव। शहर 1906 और 1989 को याद करता है।
      डर निर्मित वातावरण को कैसे आकार देता है?
    follow_ups:
      - रेट्रोफिट के बिना इमारत कैसी होती?
      - भूकंपीय डिजाइन कैसे दिखता है?
      - रेट्रोफिट और भरोसे के बीच क्या संबंध है?
  - id: sf_dolores_palm
    name: डलोरेस पाम
    prompt: |
      डलोरेस स्ट्रीट पर ताड़ के पेड़ लगे हैं। वे मूल निवासी नहीं हैं, लेकिन वे प्रतिष्ठित हैं।
      वे शहर के दूसरे स्थानों से संबंध के बारे में क्या कहते हैं?
    follow_ups:
      - ताड़ के बिना सड़क कैसी होती?
      - ताड़ पहचान को कैसे चिह्नित करते हैं?
      - ताड़ और स्थान के बीच क्या संबंध है?
  - id: sf_twin_peaks_view
    name: ट्विन पीक्स व्यू
    prompt: |
      ट्विन पीक्स से दृश्य की कल्पना करें। शहर नीचे फैला हुआ है—ग्रिड, पानी, पुल।
      ऊंचाई क्या मायने रखती है, इसे कैसे बदल देती है?
    follow_ups:
      - वहां से ऊपर आप क्या देखेंगे?
      - दृश्य शहर की छवि को कैसे आकार देता है?
      - चोटी से क्या छिपा है?
  - id: sf_ferry_building
    name: फेरी बिल्डिंग
    prompt: |
      फेरी बिल्डिंग खाड़ी की ओर है। यह एक दहलीज है—भूमि और पानी, शहर और आवागमन।
      इसके प्रवेश द्वार पर खड़े हों। क्या बहता है?
    follow_ups:
      - इसके बिना तटरेखा कैसी होती?
      - इमारत परिवर्तन को कैसे चिह्नित करती है?
      - फेरी और शहर के बीच क्या संबंध है?
  - id: sf_chinatown_gate
    name: चाइनाटाउन गेट
    prompt: |
      ड्रैगन गेट चाइनाटाउन को चिह्नित करता है। इससे गुजरें। क्या बदलता है? गेट
      वास्तविक और प्रतीकात्मक दोनों है। यह कैसे काम करता है?
    follow_ups:
      - गेट के बिना चाइनाटाउन कैसा होता?
      - गेट पहचान कैसे बनाता है?
      - गेट और पड़ोस के बीच क्या संबंध है?
  - id: sf_hydrant_color
    name: हाइड्रेंट का रंग
    prompt: |
      सैन फ्रांसिस्को के हाइड्रेंट अलग-अलग रंगों के होते हैं—नीला, हरा, लाल। रंग
      पानी के प्रवाह को इंगित करता है। तीन रंग खोजें। प्रत्येक का क्या अर्थ है?
    follow_ups:
      - आग लगने पर ब्लॉक क्या करेगा?
      - रंग जानकारी को कैसे एन्कोड करता है?
      - हाइड्रेंट और सिस्टम के बीच क्या संबंध है?
  - id: sf_parklet
    name: पार्कट
    prompt: |
      पार्कलट पार्किंग को लोगों के लिए पुनः प्राप्त करते हैं। एक में बैठें। फर्नीचर क्या है?
      इसका उपयोग कौन करता है? पार्कट ब्लॉक को कैसे बदलता है?
    follow_ups:
      - पार्कट के बिना स्थान कैसा होता?
      - पार्कट मुलाकात कैसे बनाता है?
      - आप क्या जोड़ेंगे?
  - id: sf_sf_street_sign
    name: एसएफ स्ट्रीट साइन
    prompt: |
      सैन फ्रांसिस्को के स्ट्रीट साइन की एक विशेष शैली होती है। फ़ॉन्ट, माउंट, प्लेसमेंट पर ध्यान दें।
      साइन वेफाइंडिंग को कैसे आकार देता है?
    follow_ups:
      - साइन के बिना ब्लॉक कैसा होता?
      - टाइपोग्राफी क्यों मायने रखती है?
      - साइन और पहचान के बीच क्या संबंध है?
  - id: sf_castro_rainbow
    name: कैस्ट्रो रेनबो
    prompt: |
      कैस्ट्रो इंद्रधनुषी झंडे फहराता है। सड़क पर चलें और झंडे गिनें। झंडा कैसे
      जगह का दावा करता है? यहाँ इसका क्या मतलब है?
    follow_ups:
      - झंडों के बिना पड़ोस कैसा होता?
      - झंडा समुदाय कैसे बनाता है?
      - प्रतीक और स्थान के बीच क्या संबंध है?
  - id: sf_haight_vintage
    name: हाइट विंटेज
    prompt: |
      हाइट 1960 के दशक का एक संग्रहालय है। एक ऐसी इमारत ढूंढें जो बदली न हो।
      क्या संरक्षित है? क्या प्रदर्शन है?
    follow_ups:
      - विंटेज के बिना सड़क कैसी होती?
      - इतिहास वाणिज्य को कैसे आकार देता है?
      - अतीत और वर्तमान के बीच क्या संबंध है?
  - id: sf_sutro_tower
    name: स्यूट्रो टॉवर
    prompt: |
      स्यूट्रो टॉवर हर जगह से दिखाई देता है। इसे एक कंपास के रूप में उपयोग करें।
      टॉवर आपको कैसे उन्मुख करता है? इसके बिना क्षितिज कैसा होता?
    follow_ups:
      - टॉवर क्या प्रसारित करता है?
      - टॉवर पहचान को कैसे आकार देता है?
      - टॉवर और दृश्य के बीच क्या संबंध है?
  - id: sf_bart_underground
    name: बार्ट अंडरग्राउंड
    prompt: |
      खाड़ी के नीचे बार्ट की सवारी करें। आप पानी के नीचे एक ट्यूब में हैं। दबाव,
      अंधेरा, उभरना महसूस करें। सुरंग यात्रा को कैसे बदलती है?
    follow_ups:
      - सुरंग के बिना आवागमन कैसा होता?
      - खाड़ी कैसे अलग करती है?
      - सुरंग और क्षेत्र के बीच क्या संबंध है?
  - id: sf_taquería_line
    name: टैकेरिया लाइन
    prompt: |
      आधी रात को एक टैकेरिया लाइन में शामिल हों। लाइन एक अनुष्ठान है। इसमें कौन है?
      वे क्या ऑर्डर कर रहे हैं? लाइन समुदाय है।
    follow_ups:
      - टैकेरिया के बिना ब्लॉक कैसा होता?
      - लाइन मुलाकात कैसे बनाती है?
      - भोजन और स्थान के बीच क्या संबंध है?
  - id: sf_dolores_sun
    name: डलोरेस सन
    prompt: |
      डलोरेस पार्क पश्चिम की ओर है। धूप वाले दिन, यह एक समुद्र तट है। भीड़ देखें।
      धूप पार्क को कैसे आकार देती है? किसे सबसे अच्छी जगहें मिलती हैं?
    follow_ups:
      - धूप के बिना पार्क कैसा होता?
      - पहलू क्यों मायने रखता है?
      - पार्क और मौसम के बीच क्या संबंध है?
  - id: sf_mission_door
    name: मिशन डोर
    prompt: |
      मिशन के दरवाजे अक्सर अलंकृत होते हैं—उत्कीर्ण, चित्रित, अद्वितीय।
      एक ब्लॉक पर पांच दरवाजे खोजें। वे उनके पीछे की इमारतों के बारे में क्या कहते हैं?
    follow_ups:
      - दरवाजों के बिना ब्लॉक कैसा होता?
      - दरवाजा पहचान कैसे बनाता है?
      - दरवाजे और दहलीज के बीच क्या संबंध है?
  - id: sf_coit_tower
    name: कॉइट टॉवर
    prompt: |
      कॉइट टॉवर टेलीग्राफ हिल का ताज है। यह एक स्मारक, एक दृश्यावलोकन, एक लैंडमार्क है।
      टॉवर पहाड़ी को कैसे आकार देता है? इसके बिना पहाड़ी कैसी होती?
    follow_ups:
      - टॉवर क्या मनाता है?
      - टॉवर शहर को कैसे उन्मुख करता है?
      - टॉवर और पड़ोस के बीच क्या संबंध है?
  - id: sf_lombard_curve
    name: लोंबार्ड कर्व
    prompt: |
      लोंबार्ड स्ट्रीट पहाड़ी से नीचे मुड़ती है। यह अपने स्विचबैक के लिए प्रसिद्ध है। चलें। मोड़ वंश को कैसे बदलता है? एक सीधी सड़क क्या करेगी?
    follow_ups:
      - मोड़ के बिना पहाड़ी कैसी होती?
      - मोड़ अनुभव को कैसे आकार देता है?
      - मोड़ और सुरक्षा के बीच क्या संबंध है?
  - id: sf_alcatraz_silhouette
    name: अलकाट्राज़ सिल्हूट
    prompt: |
      तटरेखा से, अलकाट्राज़ एक सिल्हूट है। द्वीप हमेशा वहाँ होता है, हमेशा दूर।
      शहर के लिए इसका क्या मतलब है?
    follow_ups:
      - द्वीप के बिना खाड़ी कैसी होती?
      - द्वीप दृश्य को कैसे आकार देता है?
      - जेल और शहर के बीच क्या संबंध है?
  - id: sf_ghost_sign
    name: घोस्ट साइन
    prompt: |
      घोस्ट साइन—ईंटों पर फीके विज्ञापन—अतीत को चिह्नित करते हैं। एक ढूंढें।
      यह किस चीज़ का विज्ञापन करता था? इसे कौन देखता?
    follow_ups:
      - साइन के बिना दीवार क्या कहेगी?
      - घोस्ट साइन इतिहास को कैसे संरक्षित करता है?
      - साइन और वाणिज्य के बीच क्या संबंध है?
  - id: sf_sf_sidewalk
    name: एसएफ फुटपाथ
    prompt: |
      सैन फ्रांसिस्को के फुटपाथ अक्सर टूटे, झुके हुए, पेड़-जड़ वाले होते हैं।
