# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Міський джунглі — Бангалор (Ukrainian)

id: urban_jungle_bangalore
name: Міський джунглі — Бангалор
description: 50 карток, щоб змінити ваш погляд на Бангалор — від масштабу та світла до шарів історії та ритмів вуличного життя.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Огороджена колонія
    prompt: |
      Огороджені колонії Бангалора мають стіни, охорону, ворота. Станьте біля воріт.
      Що всередині? Хто входить? Ворота позначають межу. Що вони захищають?
    follow_ups:
      - Якою була б вулиця без воріт?
      - Як ворота створюють безпеку?
      - Які стосунки між воротами та колонією?
  - id: blr_tree_canopy
    name: Крона дерев
    prompt: |
      Бангалор колись був містом-садом. Старі дерева все ще вкривають кронами деякі вулиці.
      Пройдіться під одним. Як крона змінює світло? Звук?
    follow_ups:
      - Якою була б вулиця без дерева?
      - Як крона створює мікроклімат?
      - Які стосунки між деревом і містом?
  - id: blr_tech_park
    name: Технопарк
    prompt: |
      Технопарки — це кампуси: скло, газон, автобуси-шатли. Знайдіть один. Як
      парк відокремлюється від міста? Які стосунки між внутрішнім і зовнішнім?
    follow_ups:
      - Якою була б територія без парку?
      - Як парк створює ідентичність?
      - Які стосунки між парком і вулицею?
  - id: blr_auto_rickshaw
    name: Авторикша
    prompt: |
      Авторикші маневрують у трафіку. Спостерігайте, як один проїжджає перехрестя. Як
      авторикша вміщується там, де не можуть машини? Яка логіка маневрування?
    follow_ups:
      - Якою була б вулиця без авторикші?
      - Як авторикша створює мобільність?
      - Які стосунки між авторикшею і трафіком?
  - id: blr_chai_stall
    name: Чайний кіоск
    prompt: |
      Чайні кіоски — це вузли: маленькі, тимчасові, важливі. Знайдіть один. Хто збирається?
      Який ритм? Кіоск — це соціальна машина.
    follow_ups:
      - Яким був би кут без кіоску?
      - Як кіоск створює зустріч?
      - Які стосунки між кіоском і вулицею?
  - id: blr_billboard
    name: Білборд Бангалора
    prompt: |
      Білборди Бангалора рекламують технології, нерухомість, освіту. Знайдіть один.
      Що продається? Хто аудиторія? Білборд — це дзеркало прагнень.
    follow_ups:
      - Якою була б вулиця без білборда?
      - Як білборд формує бажання?
      - Які стосунки між білбордом і містом?
  - id: blr_compound_wall
    name: Огорожна стіна
    prompt: |
      Огорожні стіни відокремлюють приватне від публічного. Знайдіть стіну. Що за
      нею? Наскільки вона висока? Стіна створює межу. Що вона виключає?
    follow_ups:
      - Якою була б вулиця без стіни?
      - Як стіна створює приватність?
      - Які стосунки між стіною та комплексом?
  - id: blr_signal_wait
    name: Очікування на світлофорі
    prompt: |
      Почекайте на світлофорі. Спостерігайте за продавцями: квіти, іграшки, книги.
      Світлофор створює паузу. Що відбувається в паузі?
    follow_ups:
      - Яким було б перехрестя без світлофора?
      - Як світлофор створює економіку?
      - Які стосунки між світлофором і вулицею?
  - id: blr_rain_drain
    name: Зливовий дренаж
    prompt: |
      Мусон у Бангалорі переповнює дренажі. Після дощу спостерігайте за водою. Куди
      вона йде? Де вона застоюється? Дренаж — це межа.
    follow_ups:
      - Якою була б вулиця без дренажу?
      - Як дренаж керує водою?
      - Які стосунки між дренажем та мусоном?
  - id: blr_sarjapur_road
    name: Дорога Сарджапур
    prompt: |
      Дорога Сарджапур з'єднує старий Бангалор із технологічним коридором. Проїдьте або пройдіться
      ділянкою. Що змінюється? Де місто переходить?
    follow_ups:
      - Яким був би коридор без дороги?
      - Як дорога створює зв'язок?
      - Які стосунки між дорогою та зростанням?
  - id: blr_parks_maidans
    name: Парки та майдани
    prompt: |
      У Бангалорі є парки та майдани: парк Куббон, Лаалбаг, сусідські
      землі. Зайдіть в один. Хто його використовує? Який ритм?
    follow_ups:
      - Яким було б місто без парку?
      - Як парк створює відпочинок?
      - Які стосунки між парком та районом?
  - id: blr_temple_street
    name: Вулиця храму
    prompt: |
      Храми чергують вулиці Бангалора. Знайдіть один. Зверніть увагу на підношення, дзвони,
      натовп. Як храм формує квартал?
    follow_ups:
      - Якою була б вулиця без храму?
      - Як храм створює громаду?
      - Які стосунки між храмом і вулицею?
  - id: blr_silk_board
    name: Шовкова дошка
    prompt: |
      Перехрестя Шовкової дошки — сумнозвісне. Станьте на краю. Спостерігайте за трафіком.
      Як працює перехрестя? Яка логіка хаосу?
    follow_ups:
      - Яким був би коридор без перехрестя?
      - Як перехрестя створює вузьке місце?
      - Які стосунки між перехрестям та поїздками?
  - id: blr_metro_elevated
    name: Надземне метро
    prompt: |
      Бангалорське метро у деяких частинах міста пролягає над землею. Проїдьтеся ним або станьте
      під ним. Як надземна лінія змінює вулицю внизу?
    follow_ups:
      - Якою була б вулиця без метро?
      - Як метро створює зв'язок?
      - Які стосунки між надземним і землею?
  - id: blr_apartment_tower
    name: Житлова вежа
    prompt: |
      Житлові вежі ростуть по всьому Бангалору. Знайдіть одну. Скільки поверхів? Хто
      там живе? Вежа — це вертикальна щільність. Що вона замінює?
    follow_ups:
      - Яким був би горизонт без вежі?
      - Як вежа створює житло?
      - Які стосунки між вежею та землею?
  - id: blr_roadside_vendor
    name: Вуличний продавець
    prompt: |
      Вуличні продавці продають фрукти, закуски, зарядні пристрої для телефонів. Знайдіть одного. Що
      на вітрині? Хто зупиняється? Продавець — це неформальна економіка.
    follow_ups:
      - Якою була б вулиця без продавця?
      - Як продавець створює засоби до існування?
      - Які стосунки між продавцем і вулицею?
  - id: blr_borewell
    name: Артезіанська свердловина
    prompt: |
      Бангалор залежить від артезіанських свердловин. Шукайте труби, баки,
      насоси. Вода видобувається знизу. Які стосунки між містом та водоносним горизонтом?
    follow_ups:
      - Якою була б будівля без свердловини?
      - Як свердловина створює постачання?
      - Які стосунки між свердловиною та дефіцитом?
  - id: blr_garbage_heap
    name: Сміттєзвалище
    prompt: |
      Сміттєзвалища з'являються на кутах, біля стін. Помітьте одне. Що в ньому? Хто
      там копається? Сміттєзвалище — це межа системи.
    follow_ups:
      - Якою була б вулиця без купи сміття?
      - Як купа сміття позначає збій?
      - Які стосунки між купою сміття та містом?
  - id: blr_marquee_wedding
    name: Весільний намет
    prompt: |
      Весільні намети блокують вулиці. Знайдіть один. Намет — це тимчасова
      територія. Які стосунки між святкуванням і вулицею?
    follow_ups:
      - Якою була б вулиця без намету?
      - Як намет створює претензію?
      - Які стосунки між весіллям і громадськістю?
  - id: blr_old_bungalow
    name: Старий будиночок
    prompt: |
      Старі бангладорські будиночки зберігаються серед веж. Знайдіть один. Будиночок має
      комплекс, дерева, простір. Що його замінить?
    follow_ups:
      - Якою була б вулиця без будиночка?
      - Як будиночок позначає історію?
      - Які стосунки між будиночком і вежею?
  - id: blr_coffee_house
    name: Кав'ярня
    prompt: |
      Indian Coffee House — це заклад. Посидьте в одному. Кав'ярня —
      це кімната для розмов. Який ритм? Хто приходить?
    follow_ups:
      - Якою була б вулиця без кав'ярні?
      - Як кав'ярня створює громаду?
      - Які стосунки між кав'ярнею і містом?
  - id: blr_phone_booth
    name: Телефонна будка
    prompt: |
      Громадські телефонні будки все ще існують. Знайдіть одну. Вона працює? Хто нею користується?
      Будка — це релікт. Що її замінило?
    follow_ups:
      - Якою була б вулиця без будки?
      - Як будка позначає зміни?
      - Які стосунки між будкою та мобільним зв'язком?
  - id: blr_bus_stop
    name: Автобусна зупинка Бангалора
    prompt: |
      Бангалорські автобусні зупинки — це часто стовп і натовп. Зачекайте на одній. Хто
      чекає? Який етикет? Зупинка — це мінімальна інфраструктура.
    follow_ups:
      - Якою була б вулиця без зупинки?
      - Як зупинка створює зв'язок?
      - Які стосунки між зупинкою та автобусом?
  - id: blr_power_line
    name: Лінія електропередач
    prompt: |
      Бангалорські лінії електропередач — це заплутаний клубок: кабелі, трансформатори, петлі. Простежте
      одну лінію. Куди вона йде? Мережа видима. Що вона живить?
    follow_ups:
      - Якою була б вулиця без ліній?
      - Як мережа створює постачання?
      - Які стосунки між лінією та збоєм?
  - id: blr_speed_breaker
    name: Лежачий поліцейський
    prompt: |
      Лежачі поліцейські — "сплячі поліцейські" — розкидані по дорогах Бангалора. Відчуйте один. Чому він тут?
      Що він уповільнює? "Поліцейський" — це місцеве втручання.
    follow_ups:
      - Якою була б дорога без лежачого поліцейського?
      - Як лежачий поліцейський створює безпеку?
      - Які стосунки між лежачим поліцейським і швидкістю?
  - id: blr_compound_tree
    name: Дерево на території
    prompt: |
      Дерева на території виступають над стінами. Знайдіть одне. Дерево одночасно всередині та
      зовні. Що воно затіняє? Кому воно належить?
    follow_ups:
      - Якою була б вулиця без дерева?
      - Як дерево створює дар?
      - Які стосунки між деревом і комплексом?
  - id: blr_shop_shutter
    name: Ролети магазину
    prompt: |
      Ролети магазинів у Бангалорі згортаються вночі. Знайдіть закриті ролети. Що
      за ними? Ролета — це щоденний цикл. Що вона захищає?
    follow_ups:
      - Якою була б вулиця без ролет?
      - Як ролета створює безпеку?
      - Які стосунки між ролетою та торгівлею?
  - id: blr_water_tanker
    name: Автоцистерна з водою
    prompt: |
      Автоцистерни з водою постачають райони. Спостерігайте за доставкою. Автоцистерна —
      це мобільна інфраструктура. Які стосунки між автоцистерною та краном?
    follow_ups:
      - Яким був би район без автоцистерни?
      - Як автоцистерна створює постачання?
      - Які стосунки між автоцистерною та дефіцитом?
  - id: blr_metro_station
    name: Станція метро
    prompt: |
      Бангалорські станції метро нові — чисті, брендовані. Зайдіть на одну. Чим
      станція відрізняється від вулиці? Який перехід?
    follow_ups:
      - Яким був би коридор без станції?
      - Як станція створює зв'язок?
      - Які стосунки між станцією і містом?
  - id: blr_rickshaw_stand
    name: Рикша-стоянка
    prompt: |
      Рикша-стоянки скупчуються на перехрестях. Знайдіть одну. Водії чекають.
      Стоянка — це вузол. Яка там економіка?
    follow_ups:
      - Яким було б перехрестя без стоянки?
      - Як стоянка створює мобільність?
      - Які стосунки між стоянкою та водієм?
  - id: blr_pavement_sleep
    name: Сон на тротуарі
    prompt: |
      Люди, що сплять на тротуарі, є частиною міста. Спостерігайте з увагою. Де вони
      сплять? Які стосунки між вулицею та притулком?
    follow_ups:
      - Якою була б вулиця без сплячих на тротуарі?
      - Як тротуар стає домом?
      - Які стосунки між сном і містом?
  - id: blr_gate_security
    name: Охорона воріт
    prompt: |
      Ворота колоній мають охорону: охоронці, шлагбауми, журнали. Спостерігайте за потоком.
      Хто входить? Кого зупиняють? Ворота — це фільтр.
    follow_ups:
      - Якою була б колонія без воріт?
      - Як ворота створюють безпеку?
      - Які стосунки між воротами та довірою?
  - id: blr_street_dog
    name: Вуличний собака
    prompt: |
      Вуличні собаки — частина Бангалора. Помітьте одного. Де він спить? Що
      він їсть? Собака одночасно дикий і домашній.
    follow_ups:
      - Якою була б вулиця без собаки?
      - Як собака створює стосунки?
      - Які стосунки між собакою і містом?
  - id: blr_hoarding
    name: Рекламний щит
    prompt: |
      Рекламні щити — великі білборди — домінують на перехрестях. Знайдіть один. Що
      рекламується? Рекламний щит — це масштаб прагнень. Що він обіцяє?
    follow_ups:
      - Яким було б перехрестя без рекламного щита?
      - Як рекламний щит формує бажання?
      - Які стосунки між рекламним щитом і містом?
  - id: blr_rain_tree
    name: Дощове дерево
    prompt: |
      Дощові дерева (Samanea saman) вкривають кронами деякі вулиці Бангалора. Знайдіть одне.
      Дерево — це спадщина. Як воно формує квартал?
    follow_ups:
      - Якою була б вулиця без дощового дерева?
      - Як дерево створює мікроклімат?
      - Які стосунки між деревом і містом-садом?
  - id: blr_corner_shop
    name: Кутовий магазин Бангалора
    prompt: |
      Кутові магазини — кірана сторс — продають усе. Зайдіть в один. Який
      асортимент? Хто ним керує? Магазин — це вузол району.
    follow_ups:
      - Яким був би квартал без магазину?
      - Як магазин створює зустріч?
      - Які стосунки між магазином і громадою?
  - id: blr_flyover
    name: Шляхопровід
    prompt: |
      Бангалорські шляхопроводи перетинають перехрестя. Станьте під одним. Шляхопровід
      створює тінь, шум, новий шар. Що зверху? Що знизу?
    follow_ups:
      - Яким було б перехрестя без шляхопроводу?
      - Як шляхопровід створює потік?
      - Які стосунки між шляхопроводом і землею?
  - id: blr_water_tap
    name: Громадський водопровідний кран
    prompt: |
      Громадські водопровідні крани все ще існують. Знайдіть один. Хто ним користується? Кран —
      це спільне благо. Які стосунки між краном і доступом?
    follow_ups:
      - Якою була б вулиця без крана?
      - Як кран створює дар?
      - Які стосунки між краном і дефіцитом?
  - id: blr_construction_crane
    name: Будівельний кран
    prompt: |
      Будівельні крани доповнюють горизонт. Знайдіть один. Що будується?
