# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# アーバン・ジャングル — サンフランシスコ (Japanese)

id: urban_jungle_san_francisco
name: アーバン・ジャングル — サンフランシスコ
description: サンフランシスコの見方を変える50枚のカード。スケールや光から、歴史の層、街の生活のリズムまで。
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: 坂道の勾配
    prompt: |
      サンフランシスコは傾斜地に築かれています。足元に坂道を感じてください。
      勾配は、あなたが気づくことをどう変えますか？街はどこで傾いていますか？
    follow_ups:
      - もし道が平坦だったら、どんな風に見えるだろう？
      - 丘はどのように地域を形作っているか？
      - あなたが上った中で、一番急なブロックはどこ？
  - id: sf_fog_layer
    name: 霧の層
    prompt: |
      霧がやってきます。橋の上を、丘を下っていく霧の動きを見てください。
      霧は登場人物です。光をどう変え、音をどう変えますか？
    follow_ups:
      - 霧がなかったら、この街はどうなるだろう？
      - 霧はどのように時間を刻むか？
      - 霧はどこで止まるのか？
  - id: sf_cable_car_track
    name: ケーブルカーの線路
    prompt: |
      ケーブルカーの線路をたどってみてください。舗装の溝、ケーブルの唸り。
      ケーブルカーはまだ動く遺物です。何を運んでいるのでしょう？
    follow_ups:
      - 線路がなかったら、この丘はどう見えるだろう？
      - ケーブルカーはどのように観光を形作っているか？
      - 線路と道路の関係とは？
  - id: sf_victorian_detail
    name: ビクトリアン様式の細部
    prompt: |
      サンフランシスコのビクトリアン様式の家は装飾的です。
      ジンジャーブレッド、ベイウィンドウ、色。一つを見つけて、その細部を読んでください。
      装飾はどんな物語を語っていますか？
    follow_ups:
      - 細部がなかったら、この家はどう見えるだろう？
      - 色はどのように街を変えるか？
      - ビクトリアン様式と現代の関係とは？
  - id: sf_painted_lady
    name: ペインテッド・レディ
    prompt: |
      ペインテッド・レディは有名ですが、どのビクトリアン様式の家にも色使いがあります。
      一つのブロックから5つの色の組み合わせを集めてください。色はどんなことを語っていますか？
    follow_ups:
      - なぜこれらの色なのか？
      - ペイントはどのように保存したり変容させたりするか？
      - このブロックをモノクロで見たらどう見えるだろう？
  - id: sf_bay_window
    name: ベイウィンドウ
    prompt: |
      ベイウィンドウは通りに突き出ています。光のため、眺めのため、見せるためです。
      一つを前に立ってみてください。中から何が見えるでしょう？
    follow_ups:
      - ベイウィンドウは部屋をどう変えるか？
      - それがなかったら、ファサードはどう見えるだろう？
      - ベイウィンドウはどのように通りとの関係を作り出すか？
  - id: sf_stairway_street
    name: 階段の道
    prompt: |
      サンフランシスコには、道が階段になっている場所があります。舗装の代わりに階段です。
      一つを登ってみてください。階段はどのように地域を変えるか？
    follow_ups:
      - これらの階段を使うのは誰か？
      - それらがなかったら、この丘はどう見えるだろう？
      - 階段はどのようにコミュニティを作り出すか？
  - id: sf_mission_mural
    name: ミッション地区の壁画
    prompt: |
      ミッション地区は壁画のギャラリーです。一つを見つけて、読んでください。
      どんな物語か？誰が描いたのか？誰のためか？
    follow_ups:
      - 壁画がなかったら、壁は何を語るだろう？
      - 壁画はどのように空間を主張するか？
      - 壁画と地域の関係とは？
  - id: sf_earthquake_retrofit
    name: 地震補強
    prompt: |
      地震補強を探してください—ボルト、ブレース、基礎。
      この街は1906年と1989年を記憶しています。恐怖はどのように建造環境を形作っているか？
    follow_ups:
      - 補強がなかったら、建物はどう見えるだろう？
      - 地震設計はどのように現れるか？
      - 補強と信頼の関係とは？
  - id: sf_dolores_palm
    name: ドロレス通りのヤシの木
    prompt: |
      ドロレス通りにはヤシの木が並んでいます。 nativeではありませんが、象徴的です。
      それらは、この街の「 elsewhere」との関係について何を語っていますか？
    follow_ups:
      - ヤシの木がなかったら、この通りはどう見えるだろう？
      - ヤシの木はどのようにアイデンティティを刻むか？
      - ヤシの木と場所の関係とは？
  - id: sf_twin_peaks_view
    name: ツインピークスからの眺め
    prompt: |
      ツインピークスからの眺めを想像してみてください。街が下に広がっています—グリッド、水、橋。
      標高は、何が重要かを変えますか？
    follow_ups:
      - そこから何が見えるだろう？
      - 眺めはどのように街のイメージを形作るか？
      - ピークから隠されているものは何か？
  - id: sf_ferry_building
    name: フェリービルディング
    prompt: |
      フェリービルディングは湾に面しています。それは境界です—陸と水、街と通勤。
      その入り口に立ってみてください。何が流れているか？
    follow_ups:
      - それがなかったら、ウォーターフロントはどう見えるだろう？
      - 建物はどのように遷移を刻むか？
      - フェリーと街の関係とは？
  - id: sf_chinatown_gate
    name: チャイナタウンの門
    prompt: |
      ドラゴンゲートはチャイナタウンをマークしています。そこを通り抜けてください。何が変わりますか？
      門は現実的でもあり、象徴的でもあります。どのように機能するのでしょうか？
    follow_ups:
      - 門がなかったら、チャイナタウンはどうなるだろう？
      - 門はどのようにアイデンティティを作り出すか？
      - 門と地域の関係とは？
  - id: sf_hydrant_color
    name: 消火栓の色
    prompt: |
      サンフランシスコの消火栓は色が違います—青、緑、赤。
      色は水の流れを示します。3色見つけてください。それぞれ何を表していますか？
    follow_ups:
      - 火事の時、このブロックはどうなるだろう？
      - 色はどのように情報をエンコードするか？
      - 消火栓とシステムの関係とは？
  - id: sf_parklet
    name: パークレット
    prompt: |
      パークレットは駐車場を人々のために取り戻します。一つに座ってみてください。
      家具は何ですか？誰が使っていますか？パークレットはブロックをどう変えますか？
    follow_ups:
      - パークレットがなかったら、この空間はどう見えるだろう？
      - パークレットはどのように出会いを創り出すか？
      - 何を追加したいか？
  - id: sf_sf_street_sign
    name: SFの道路標識
    prompt: |
      サンフランシスコの道路標識には特別なスタイルがあります。フォント、取り付け方、配置に注目してください。
      標識はどのように道案内を形作っていますか？
    follow_ups:
      - 標識がなかったら、このブロックはどう見えるだろう？
      - タイポグラフィはなぜ重要か？
      - 標識とアイデンティティの関係とは？
  - id: sf_castro_rainbow
    name: キャストロの虹
    prompt: |
      キャストロは虹の旗を掲げています。通りを歩いて旗の数を数えてください。
      旗はどのように空間を主張するか？ここで何を意味するのか？
    follow_ups:
      - 旗がなかったら、この地域はどうなるだろう？
      - 旗はどのようにコミュニティを作り出すか？
      - 旗と場所の関係とは？
  - id: sf_haight_vintage
    name: ヘイト通りのヴィンテージ
    prompt: |
      ヘイト通りは1960年代の博物館です。変わっていない建物を見つけてください。
      何が保存されているか？何がパフォーマンスか？
    follow_ups:
      - ヴィンテージがなかったら、この通りはどう見えるだろう？
      - 歴史はどのように商業を形作るか？
      - 過去と現在の関係とは？
  - id: sf_sutro_tower
    name: スートロタワー
    prompt: |
      スートロタワーはどこからでも見えます。それをコンパスとして使ってください。
      タワーはどのようにあなたを方向づけるか？それがなかったら、スカイラインはどうなるだろう？
    follow_ups:
      - タワーは何を放送しているか？
      - タワーはどのようにアイデンティティを形作るか？
      - タワーと眺めの関係とは？
  - id: sf_bart_underground
    name: BART地下鉄
    prompt: |
      BARTに乗って湾の下を走ってください。あなたは水中のチューブの中にいます。
      圧力、暗闇、出現を感じてください。トンネルは旅をどう変えるか？
    follow_ups:
      - トンネルがなかったら、通勤はどうなるだろう？
      - 湾はどのように分離するか？
      - トンネルと地域の関係とは？
  - id: sf_taquería_line
    name: タケリアの列
    prompt: |
      真夜中にタケリアの列に並んでください。列は儀式です。
      誰が並んでいるか？何を注文しているか？列はコミュニティです。
    follow_ups:
      - タケリアがなかったら、このブロックはどう見えるだろう？
      - 列はどのように出会いを創り出すか？
      - 食べ物と場所の関係とは？
  - id: sf_dolores_sun
    name: ドロレス公園の太陽
    prompt: |
      ドロレス公園は西向きです。晴れた日には、ビーチのようになります。
      群衆を見てください。太陽は公園をどのように形作っていますか？誰が一番良い場所を得るか？
    follow_ups:
      - 太陽がなかったら、公園はどう見えるだろう？
      - 方角はなぜ重要か？
      - 公園と天候の関係とは？
  - id: sf_mission_door
    name: ミッション地区のドア
    prompt: |
      ミッション地区のドアはしばしば装飾的です—彫刻、塗装、ユニーク。
      一つのブロックで5つのドアを見つけてください。それらは、その背後にある建物について何を語っていますか？
    follow_ups:
      - ドアがなかったら、このブロックはどう見えるだろう？
      - ドアはどのようにアイデンティティを作り出すか？
      - ドアと敷居の関係とは？
  - id: sf_coit_tower
    name: コイトタワー
    prompt: |
      コイトタワーはテレグラフヒルの頂上にあります。それは記念碑であり、展望台であり、ランドマークです。
      タワーはどのように丘を形作っていますか？それがなかったら、丘はどうなるでしょう？
    follow_ups:
      - タワーは何を記念しているか？
      - タワーはどのように街を方向づけるか？
      - タワーと地域の関係とは？
  - id: sf_lombard_curve
    name: ロンバート通りのカーブ
    prompt: |
      ロンバート通りは丘を下るようにカーブしています。ヘアピンカーブで有名です。
      歩いてみてください。カーブは下り坂をどう変えますか？まっすぐな道だったらどうなるでしょう？
    follow_ups:
      - カーブがなかったら、この丘はどう見えるだろう？
      - カーブはどのように体験を形作るか？
      - カーブと安全の関係とは？
  - id: sf_alcatraz_silhouette
    name: アルカトラズのシルエット
    prompt: |
      ウォーターフロントから見ると、アルカトラズはシルエットです。
      島は常にそこにあり、常に遠くにあります。それは街にとって何を意味しますか？
    follow_ups:
      - 島がなかったら、湾はどう見えるだろう？
      - 島はどのように眺めを形作るか？
      - 刑務所と街の関係とは？
  - id: sf_ghost_sign
    name: ゴーストサイン
    prompt: |
      ゴーストサイン—レンガに残った色あせた広告—は過去を刻みます。
      一つを見つけてください。何を宣伝していたのでしょう？誰が見ていたのでしょう？
    follow_ups:
      - サインがなかったら、壁は何を語るだろう？
      - ゴーストサインはどのように歴史を保存するか？
      - サインと商業の関係とは？
  - id: sf_sf_sidewalk
    name: SFの歩道
    prompt: |
      サンフランシスコの歩道はしばしばひび割れ、傾き、木の根に侵食されています。
      一つのブロックを歩いて、その質感を観察してください。歩道はどのように年を取るか？
    follow_ups:
      - 歩道がなかったら、このブロックはどう見えるだろう？
      - 歩道はどのように移動を形作るか？
      - 歩道と木の関連性とは？
  - id: sf_golden_gate_fog
    name: ゴールデンゲートの霧
    prompt: |
      ゴールデンゲートブリッジは霧の中に消えます。消えては現れるのを見てください。
      霧はカーテンです。その向こうには何があるのでしょうか？
    follow_ups:
      - 霧がなかったら、橋はどう見えるだろう？
      - 霧はどのように眺めを形作るか？
      - 霧と橋の関係とは？
  - id: sf_mission_dolores
    name: ミッション・ドロレス
    prompt: |
      ミッション・ドロレスは市内で最も古い建物です。その前に立ってみてください。
      何を見てきたのでしょう？どのように時間を刻むか？
    follow_ups:
      - ミッションがなかったら、この地域はどうなるだろう？
      - ミッションはどのようにアイデンティティを形作るか？
      - ミッションと街の関係とは？
  - id: sf_painted_steps
    name: ペイントされた階段
    prompt: |
      16番街のタイル階段はモザイクです。登ってみてください。
      各ステップは異なります。アートは登ることをどう変えるか？
    follow_ups:
      - タイルがなかったら、階段はどう見えるだろう？
      - モザイクはどのようにコミュニティを作り出すか？
      - アートと登ることの関係とは？
  - id: sf_sf_street_tree
    name: SFの街路樹
    prompt: |
      サンフランシスコの街路樹は、しばしばヤシ、マグノリア、またはフィカスです。
      一つを見つけて、それを特定してください。木はブロックをどのように形作っているか？
    follow_ups:
      - 木がなかったら、このブロックはどう見えるだろう？
      - 木はどのように生息地を作り出すか？
      - 木と歩道の関連性とは？
  - id: sf_sf_bay_window
    name: SFのベイウィンドウ
    prompt: |
      ベイウィンドウはサンフランシスコの vernacularです。
      通りに突き出て、光を捉えます。ベイウィンドウは部屋をどう変えるか？
    follow_ups:
      - ベイウィンドウがなかったら、ファサードはどう見えるだろう？
      - ベイウィンドウはどのように通りとの関係を作り出すか？
      - ベイウィンドウと眺めの関係とは？
  - id: sf_sf_hill
    name: SFの丘
    prompt: |
      一つの丘を選んで登ってみてください。燃えるような感覚を感じてください。
      頂上で、振り返ってみてください。登ることは、あなたが見るものをどう変えるか？
    follow_ups:
      - 丘がなかったら、この街はどう見えるだろう？
      - 丘はどのように地域を形作っているか？
      - 丘と眺めの関係とは？
  - id: sf_sf_fog
    name: SFの霧
    prompt: |
      霧には名前があります—カール。彼は地元の有名人です。
      カールがやってくると、街はどう変わるか？何が隠され、何が明らかにされるか？
    follow_ups:
      - カールがいなかったら、この街はどうなるだろう？
      - 霧はどのようにアイデンティティを形作るか？
      - 霧と光の関係とは？
  - id: sf_sf_cable
    name: SFケーブル
    prompt: |
      ケーブルカーは、道路の下のケーブルで動いています。
      見えませんが、聞こえます。見えないケーブルは、見える街をどのように形作っていますか？
    follow_ups:
      - ケーブルがなかったら、この丘はどう見えるだろう？
      - ケーブルはどのようにつながりを作り出すか？
      - ケーブルと道路の関係とは？
  - id: sf_sf_victorian
    name: SFビクトリアン
    prompt: |
      ビクトリアン様式の家はペアで来ます—2軒の家、1つの敷地。
      ペアを見つけてください。どのように関連していますか？一方が他方なしではどうなるか？
    follow_ups:
      - ペアがなかったら、このブロックはどう見えるだろう？
      - ペアはどのようにリズムを作り出すか？
      - ペアと敷地の関係とは？
  - id: sf_sf_mission
    name: SFミッション
    prompt: |
      ミッション地区はミッション・ドロレスにちなんで名付けられました。
      通りを歩いて、層を感じてください—スペイン、メキシコ、アイルランド、中央アメリカ。
      それは何でしょう？
    follow_ups:
      - 層がなかったら、この地域はどうなるだろう？
      - ミッションはどのようにアイデンティティを形作るか？
      - ミッションと移住の関係とは？
  - id: sf_sf_bridge
    name: SF橋
    prompt: |
      ベイブリッジはゴールデンゲートブリッジほど有名ではありませんが、より多く使われています。
      それを渡るか、見るか。橋はどのように接続しますか？何を運んでいますか？
    follow_ups:
      - 橋がなかったら、湾はどう見えるだろう？
      - 橋はどのように地域を形作るか？
      - 橋と通勤の関係とは？
  - id: sf_sf_parks
    name: SF公園
    prompt: |
      サンフランシスコには小さな公園がたくさんあります—ポケットパーク、トライアングルパーク。
      一つを見つけてください。誰が使っていますか？その特徴は何ですか？
    follow_ups:
      - 公園がなかったら、この地域はどうなるだろう？
      - 公園はどのように休息を作り出すか？
      - 公園とブロックの関係とは？
  - id: sf_sf_stairs
    name: SF階段
    prompt: |
      サンフランシスコには600以上の公共の階段があります。
      まだ登ったことのない一つを見つけてください。上には何がありますか？下には何がありますか？
    follow_ups:
      - 階段がなかったら、この丘はどう見えるだろう？
      - 階段はどのように近道を作り出すか？
      - 階段と地域の関係とは？
  - id: sf_sf_mural
    name: SF壁画
    prompt: |
      ミッション地区は、米国で一人当たりの壁画の数が最も多い地域です。
      物語を語る一つを見つけてください。物語は何ですか？誰のためのものですか？
    follow_ups:
      - 壁画がなかったら、壁は何を語るだろう？
      - 壁画はどのように空間を主張するか？
      - 壁画とコミュニティの関係とは？
  - id: sf_sf_water
    name: SF水
    prompt: |
      サンフランシスコは水に囲まれています—湾、海、海峡。端に行ってみてください。
      水はこの街にとって何を意味しますか？端をどのように形作りますか？
    follow_ups:
      - 水がなかったら、この街はどう見えるだろう？
      - 水はどのようにアイデンティティを形作るか？
      - 水と街の関係とは？
  - id: sf_sf_sunset
    name: SF夕日
    prompt: |
      サンフランシスコの夕日は有名です。丘から見てください。
