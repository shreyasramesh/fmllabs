# শহুরে অরণ্য — নিউ ইয়র্ক (Bengali)

id: urban_jungle_new_york
name: শহুরে অরণ্য — নিউ ইয়র্ক
description: নিউ ইয়র্ককে দেখার ভঙ্গি পরিবর্তন করতে ৫০টি কার্ড — এর বিশালতা ও আলো থেকে শুরু করে ইতিহাসের স্তর এবং রাস্তার জীবনের ছন্দ পর্যন্ত।
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: উল্লম্ব শহর
    prompt: |
      উপরের দিকে তাকাও। নিউ ইয়র্ক উল্লম্বভাবে নির্মিত — টাওয়ারগুলি আকাশের জন্য প্রতিযোগিতা করে।
      একটি ভবনকে ফুটপাত থেকে চূড়া পর্যন্ত অনুসরণ করো। উচ্চতা কীভাবে তোমার দৃষ্টি পরিবর্তন করে? তোমার চোখ কোথায় স্থির হয়?
    follow_ups:
      - উপর থেকে রাস্তাটি দেখতে কেমন লাগবে?
      - বিভিন্ন উচ্চতায় বিশালতা কীভাবে বিকৃত হয়?
      - যখন কেবল উপরের দিকে তাকাও তখন কী লুকানো থাকে?
  - id: ny_grid_navigation
    name: গ্রিড নেভিগেশন
    prompt: |
      ম্যানহাটন-এর গ্রিড অবিচল। এক ব্লক হাঁটো এবং লক্ষ্য করো কীভাবে সংখ্যা ব্যবস্থা গতি, দিকনির্দেশনা এবং বিস্ময়কে আকার দেয়। গ্রিড ভাঙলে কী হয়?
    follow_ups:
      - গ্রিড কোথায় অত্যাচারী মনে হয়? কোথায় মুক্তিদায়ক?
      - এটি ছাড়া শহর কেমন অনুভব হবে?
      - তির্যক রাস্তাগুলি ছন্দকে কীভাবে পরিবর্তন করে?
  - id: ny_subway_soundscape
    name: সাবওয়ে সাউন্ডস্কেপ
    prompt: |
      একটি স্টেশনে চোখ বন্ধ করো। ঘর্ঘর, ব্রেক, ঘোষণা, বাদ্যকার। সাউন্ডস্কেপটি ম্যাপ করো।
      যখন তুমি দেখতে পাও না তখন নিউ ইয়র্ক কেমন শোনায়?
    follow_ups:
      - কোন শব্দগুলি ধ্রুবক? কোনগুলি দুর্ঘটনাজনিত?
      - এখানে নীরবতার অর্থ কী হবে?
      - শব্দ কীভাবে মাটির নীচে সময় চিহ্নিত করে?
  - id: ny_fire_escape
    name: ফায়ার এস্কেপ
    prompt: |
      ফায়ার এস্কেপ হল শহরের বহিঃকঙ্কাল — কার্যকরী, ছন্দময়, ব্যক্তিগত।
      একটি ব্লক খুঁজুন যেখানে তারা পুনরাবৃত্তি হয়। তারা পেছনের ভবনগুলি সম্পর্কে কী প্রকাশ করে? রাতে কে সেখানে বসতে পারে?
    follow_ups:
      - সেখান থেকে কী দেখা যাবে?
      - তারা রাস্তার চরিত্রকে কীভাবে পরিবর্তন করে?
      - সেগুলি ছাড়া ব্লকটি কী হারাবে?
  - id: ny_street_number
    name: রাস্তার নম্বর
    prompt: |
      একটি নম্বর বেছে নাও — একটি ভবনের নম্বর, একটি ফ্লোর, একটি বাস রুট।
      শহর জুড়ে এটি অনুসরণ করো। কোন প্যাটার্ন দেখা যায়? এই নম্বরের এখানে কী মানে?
    follow_ups:
      - নম্বরটি আপনাকে কোথায় নিয়ে যায়?
      - একটি ভিন্ন নম্বর কী প্রকাশ করবে?
      - সংখ্যাগুলি শহুরে অভিজ্ঞতাকে কীভাবে সংগঠিত করে?
  - id: ny_steam_rising
    name: বাষ্প উঠছে
    prompt: |
      ম্যানহোলের বাষ্প নিউ ইয়র্কের শ্বাস। যেখানে এটি উঠছে সেখানে খুঁজুন এবং দেখুন এটি কীভাবে চলে, ছড়িয়ে পড়ে, আলো ধরে।
      এর নীচে কী আছে? শহর কী নিঃশ্বাস ছাড়ছে?
    follow_ups:
      - গ্রিটের নীচে কী পাওয়া যাবে?
      - আবহাওয়া কীভাবে বাষ্প পরিবর্তন করে?
      - অন্য কোন লুকানো ব্যবস্থা এখানে নির্গত হয়?
  - id: ny_storefront_typography
    name: দোকানের সামনের টাইপোগ্রাফি
    prompt: |
      চিহ্নগুলো পড়ো। বোডেগা, ডেলিস, লন্ড্রোম্যাট — প্রতিটির একটি ভিজ্যুয়াল ভাষা আছে।
      একটি ব্লক থেকে পাঁচটি টাইপফেস সংগ্রহ করো। তারা এখানে বসবাসকারীদের সম্পর্কে কী বলে?
    follow_ups:
      - কোন চিহ্নগুলি পুরানো মনে হয়? কোনগুলি নতুন?
      - যদি চিহ্নগুলি কথা বলতে পারত তবে ব্লকটি কেমন শোনাবে?
      - টাইপোগ্রাফি কীভাবে পরিবর্তন চিহ্নিত করে?
  - id: ny_waterfront_edge
    name: ওয়াটারফ্রন্ট প্রান্ত
    prompt: |
      জলের ধারে যাও। শহর নদী, বন্দর, উপসাগরের দিকে পিঠ ফিরিয়ে নেয়।
      যেখানে জমি জলের সাথে মিলিত হয় সেখানে দাঁড়াও। দৃশ্যের জন্য কী নির্মিত? এটি উপেক্ষা করার জন্য কী নির্মিত?
    follow_ups:
      - কে জল দেখার সুযোগ পায়?
      - প্রান্তটি কীভাবে দখল করা হয়েছে?
      - শহর যদি জলের দিকে মুখ করত তবে কেমন হত?
  - id: ny_parks_as_rooms
    name: পার্কগুলি কক্ষের মতো
    prompt: |
      সেন্ট্রাল পার্ক, প্রস্পেক্ট পার্ক, একটি পকেট প্লাজা — প্রতিটি শহরের একটি কক্ষ।
      একটি প্রবেশ করো এবং তার দেয়াল, ছাদ, আসবাব লক্ষ্য করো। এখানে প্রকৃতি কীভাবে ডিজাইন করা হয়?
    follow_ups:
      - কক্ষটির উদ্দেশ্য কী?
      - কে দৃষ্টিরেখা ডিজাইন করেছে?
      - দেয়ালগুলি সরিয়ে নিলে কী হবে?
  - id: ny_delivery_rhythm
    name: ডেলিভারির ছন্দ
    prompt: |
      ডেলিভারিগুলি দেখো — ট্রাক, হ্যান্ডকার্ট, বাইক। একটি প্যাকেজের পথ ট্রাক থেকে দরজায় অনুসরণ করো।
      বাণিজ্য কীভাবে রাস্তার মধ্য দিয়ে চলে? আগমনের ছন্দ কী?
    follow_ups:
      - ডেলিভারি ছাড়া ব্লকটি দেখতে কেমন লাগবে?
      - বিভিন্ন পণ্য কীভাবে ভিন্নভাবে চলাচল করে?
      - এই প্রবাহে কে অদৃশ্য?
  - id: ny_brownstone_steps
    name: ব্রাউনস্টোন সিঁড়ি
    prompt: |
      ব্রাউনস্টোন সিঁড়িগুলি মঞ্চ। একটিতে বসো এবং রাস্তা দেখো। কে থামে? কে চলে যায়? এখান থেকে কী বলবে?
    follow_ups:
      - উপরের ধাপ থেকে দৃশ্যটি কেমন?
      - সিঁড়ি কীভাবে অঞ্চল তৈরি করে?
      - সেগুলি ছাড়া ব্লকটি কী হারাবে?
  - id: ny_bridge_as_threshold
    name: সেতু একটি দোরগোড়া হিসাবে
    prompt: |
      একটি সেতু পায়ে অতিক্রম করো। রূপান্তর অনুভব করো — এক বরো থেকে অন্য বরোতে।
      সেতু এখানে বা সেখানে কোনটিই নয়। অন্য পাশে পৌঁছালে কী পরিবর্তন হয়?
    follow_ups:
      - তুমি কী পেছনে ফেলে আসো?
      - সেতু কীভাবে যাত্রাকে আকার দেয়?
      - সেতু ছাড়া শহর কেমন হবে?
  - id: ny_awning_shade
    name: ছাউনির ছায়া
    prompt: |
      ছাউনিগুলি মাইক্রো-জলবায়ু তৈরি করে। একটির নীচে দাঁড়াও। আলো, শব্দ, তাপমাত্রার পরিবর্তন লক্ষ্য করো।
      ছোট কাঠামো কীভাবে রাস্তাকে পরিবর্তন করে?
    follow_ups:
      - ছাউনি ছাড়া ব্লকটি কেমন অনুভব হবে?
      - তারা কীভাবে মালিকানা চিহ্নিত করে?
      - এখানে অন্য কোন ছোট আশ্রয়স্থল আছে?
  - id: ny_graffiti_layer
    name: গ্রাফিতি স্তর
    prompt: |
      দেয়ালগুলো দেখো। ট্যাগ, ম্যুরাল, হুইটপেস্ট — প্রতিটি সময় এবং দাবির একটি স্তর।
      প্যালিম্পসেস্ট পড়ো। কে এই পৃষ্ঠটিকে চিহ্নিত করেছে?
    follow_ups:
      - তুমি সবচেয়ে পুরানো চিহ্ন কোনটি খুঁজে পেতে পারো?
      - স্তরগুলি কীভাবে একটি গল্প বলে?
      - দেয়ালটি কথা বলতে পারলে কী বলবে?
  - id: ny_rooftop_skyline
    name: ছাদের স্কাইলাইন
    prompt: |
      একটি ছাদ থেকে দৃশ্যের কল্পনা করো। জলের ট্যাঙ্ক, অ্যান্টেনা, পার্শ্ববর্তী ছাদ।
      উপর থেকে শহর একটি ভিন্ন শহর। তুমি কী দেখতে পাবে?
    follow_ups:
      - উচ্চতা কীভাবে গুরুত্বপূর্ণ বিষয় পরিবর্তন করে?
      - রাস্তা থেকে কী লুকানো থাকে?
      - এই দৃশ্যে কার প্রবেশাধিকার আছে?
  - id: ny_crosswalk_wait
    name: ক্রসব্যাঙ্ক অপেক্ষা
    prompt: |
      একটি ক্রসব্যাঙ্কে অপেক্ষা করো। আলোর পরিবর্তন হলে পার হয়ো না।
      পরবর্তী চক্রের জন্য অপেক্ষা করো। বিরতিতে তুমি কী লক্ষ্য করো? আর কে অপেক্ষা করে?
    follow_ups:
      - অপেক্ষা কীভাবে উপলব্ধি পরিবর্তন করে?
      - ছেদ বিন্দুতে কোন ছন্দগুলি চলে?
      - তুমি যদি কখনও পার না হতে তবে কী হত?
  - id: ny_diner_booth
    name: ডিনার বুথ
    prompt: |
      জানালা দিয়ে একটি ডিনার বুথে বসো। রাস্তা একটি চলচ্চিত্রের মতো হয়ে ওঠে।
      পথচারী, ট্র্যাফিক, আলো দেখো। কোন গল্প চলছে?
    follow_ups:
      - প্রধান চরিত্র কারা?
      - ফ্রেম কীভাবে তুমি যা দেখছো তা পরিবর্তন করে?
      - জানালা ছাড়া কী মিস করবে?
  - id: ny_scaffolding_skin
    name: ভারা ত্বক
    prompt: |
      ভারার কাপড় ভবনের ব্যান্ডেজের মতো জড়িয়ে থাকে। এর নীচে হাঁটো।
      শব্দ, আলো, অস্থায়ী ছাদ লক্ষ্য করো। কী মেরামত করা হচ্ছে? কী লুকানো হচ্ছে?
    follow_ups:
      - এটি কতক্ষণ ধরে আছে?
      - এটি ছাড়া ভবনটি কী বলবে?
      - মেরামত এবং লুকানোর মধ্যে সম্পর্ক কী?
  - id: ny_newsstand_archive
    name: সংবাদপত্রের স্ট্যান্ড আর্কাইভ
    prompt: |
      একটি সংবাদপত্রের স্ট্যান্ড মনোযোগের একটি স্লাইস — ম্যাগাজিন, কাগজ, ক্যান্ডি।
      কী প্রদর্শিত হচ্ছে? কে থামে? এটি ছাড়া এই কোণটি কেমন হত?
    follow_ups:
      - সেরা বিক্রেতা কী?
      - স্ট্যান্ডটি কীভাবে ব্লকটিকে আকার দেয়?
      - তুমি এখানে কী রাখবে?
  - id: ny_construction_site
    name: নির্মাণ স্থল
    prompt: |
