# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 城市丛林 — 巴黎 (Mandarin Chinese)

id: urban_jungle_paris
name: 城市丛林 — 巴黎
description: 50 张卡片，颠覆你对巴黎的看法——从规模、光线到历史层叠和街头生活的节奏。
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: 阳台之花
    prompt: |
      巴黎的阳台上盛开着鲜花——天竺葵、矮牵牛。找一座每户阳台都摆满花盆的建筑。
      这些花朵如何改变了建筑的外观？
    follow_ups:
      - 没有了鲜花，街道会变成什么样？
      - 花朵是如何创造身份的？
      - 花朵与居民之间是什么关系？
  - id: paris_haussmann_line
    name: 奥斯曼线条
    prompt: |
      奥斯曼大道穿过旧巴黎。走在其中一条大道上。这条线索
      不容置疑——建筑排列整齐，高度统一。这条大道如何塑造了人们的行进方式？
    follow_ups:
      - 没有了奥斯曼，巴黎会是怎样？
      - 大道是如何创造景致的？
      - 线条与权力之间是什么关系？
  - id: paris_cafe_terrace
    name: 咖啡馆露台
    prompt: |
      巴黎的咖啡馆露台面向街道。坐在其中一个露台上。你既在室内，又在室外。
      露台是一个门槛。你看到了什么？
    follow_ups:
      - 没有了露台，街道会是怎样？
      - 露台是如何创造相遇的？
      - 露台与街道之间是什么关系？
  - id: paris_metro_entrance
    name: 地铁入口
    prompt: |
      新艺术风格的地铁入口是标志性的。找一个。铁艺、字母——这个入口是一个通道。
      它承诺了什么？
    follow_ups:
      - 没有了入口，街道会是怎样？
      - 入口是如何创造身份的？
      - 入口与地下之间是什么关系？
  - id: paris_shutter
    name: 巴黎百叶窗
    prompt: |
      巴黎的百叶窗——volets——晚上会关闭。它们是绿色、灰色、蓝色的。找一条百叶窗都关着的街道。
      它们后面隐藏着什么？
    follow_ups:
      - 没有了百叶窗，外墙会是怎样？
      - 百叶窗是如何创造隐私的？
      - 百叶窗与光线之间是什么关系？
  - id: paris_cobble
    name: 巴黎鹅卵石
    prompt: |
      巴黎的鹅卵石——pavés——依然存在。走在上面。感受它的质地。
      鹅卵石是另一个巴黎的遗迹。它如何塑造了街道？
    follow_ups:
      - 没有了鹅卵石，街道会是怎样？
      - 鹅卵石是如何标记历史的？
      - 鹅卵石与革命之间是什么关系？
  - id: paris_seine_edge
    name: 塞纳河畔
    prompt: |
      塞纳河穿过巴黎。走到码头。这条河是一道缝隙。两边是什么？
      河流是如何分割和连接的？
    follow_ups:
      - 没有了塞纳河，巴黎会是怎样？
      - 河流是如何塑造这座城市的？
      - 河流与河畔之间是什么关系？
  - id: paris_roof_zinc
    name: 屋顶锌板
    prompt: |
      巴黎的屋顶通常是锌板——灰色、倾斜，带有老虎窗。向上看。屋顶线很有特色。
      它如何塑造了天际线？
    follow_ups:
      - 没有了锌板，天际线会是怎样？
      - 锌板是如何创造身份的？
      - 屋顶与阁楼之间是什么关系？
  - id: paris_door_height
    name: 门的高度
    prompt: |
      巴黎的门通常很高——双层高度。找一扇这样的门。什么东西会从中穿过？
      这扇门是尺度上的一个门槛。
    follow_ups:
      - 没有了高门，建筑会是怎样？
      - 高度是如何创造宏伟感的？
      - 门与建筑之间是什么关系？
  - id: paris_boulangerie_smell
    name: 面包店的香味
    prompt: |
      面包店里飘着面包的香味。循着香味找去。面包店是一个节点。
      这香味说明了街区的情况？
    follow_ups:
      - 没有了香味，街道会是怎样？
      - 香味是如何创造身份的？
      - 香味与商业之间是什么关系？
  - id: paris_place
    name: 巴黎广场
    prompt: |
      巴黎有各种各样的广场——方形广场、圆形广场、节点。找一个。注意它的几何形状。
      这个广场如何塑造了汇聚于此的街道？
    follow_ups:
      - 没有了广场，街区会是怎样？
      - 广场是如何创造焦点的？
      - 广场与人流之间是什么关系？
  - id: paris_balcony_iron
    name: 阳台铁艺
    prompt: |
      巴黎阳台的栏杆通常很精致——锻铁、曲线、花饰。找一个。
      铁艺如何塑造了建筑的外观？
    follow_ups:
      - 没有了铁艺，建筑会是怎样？
      - 铁艺是如何创造身份的？
      - 铁艺与工艺之间是什么关系？
  - id: paris_plane_tree
    name: 梧桐树
    prompt: |
      巴黎的梧桐树行道树排列在林荫大道两旁。它们的树皮剥落。找一棵。
      这棵树如何塑造了街道？没有它，林荫大道会是怎样？
    follow_ups:
      - 没有了梧桐树，街道会是怎样？
      - 梧桐树是如何创造阴凉的？
      - 树与林荫大道之间是什么关系？
  - id: paris_metro_tile
    name: 地铁瓷砖
    prompt: |
      巴黎地铁站里铺着白色的瓷砖。隧道是一个光管。乘坐一趟地铁线。
      瓷砖如何塑造了这段旅程？
    follow_ups:
      - 没有了瓷砖，车站会是怎样？
      - 瓷砖是如何创造洁净感的？
      - 瓷砖与地下之间是什么关系？
  - id: paris_clock
    name: 巴黎时钟
    prompt: |
      巴黎有很多公共时钟——在教堂、车站、建筑上。找一个。
      它显示的是几点？准时吗？
    follow_ups:
      - 没有了时钟，这个空间会是怎样？
      - 时钟是如何塑造时间的？
      - 时钟与地点之间是什么关系？
  - id: paris_newsstand
    name: 巴黎报刊亭
    prompt: |
      巴黎的报刊亭（kiosques）出售报纸、杂志、地铁票。找一个。上面展示着什么？
      谁会停下脚步？报刊亭是一个节点。
    follow_ups:
      - 没有了报刊亭，街道会是怎样？
      - 报刊亭是如何创造相遇的？
      - 报刊亭与街道之间是什么关系？
  - id: paris_bench
    name: 巴黎长椅
    prompt: |
      巴黎的公园和塞纳河边有绿色的长椅。坐在一张长椅上。还有谁会坐在这里？
      风景如何？
    follow_ups:
      - 没有了长椅，这个空间会是怎样？
      - 长椅是如何创造休憩的？
      - 长椅与河边之间是什么关系？
  - id: paris_boulangerie_queue
    name: 面包店排队
    prompt: |
      早高峰时加入面包店的队伍。排队是一种仪式。人们在买什么？
      有什么礼仪？
    follow_ups:
      - 没有了队伍，街道会是怎样？
      - 队伍是如何创造社群感的？
      - 队伍与面包之间是什么关系？
  - id: paris_manhole
    name: 巴黎井盖
    prompt: |
      巴黎的井盖上常常写着“Paris”或“Eau”（水）。找一个。
      这个井盖是通往城市血管的门。下面有什么？
    follow_ups:
      - 没有了井盖，街道会是怎样？
      - 井盖是如何标记系统的？
      - 井盖与地下之间是什么关系？
  - id: paris_shadow
    name: 巴黎的阴影
    prompt: |
      巴黎的光线投下清晰的阴影。找一个阳光和阴影交汇的角落。
      阴影如何塑造了街道？
    follow_ups:
      - 没有了阴影，街道会是怎样？
      - 阴影是如何创造对比的？
      - 阴影与建筑之间是什么关系？
  - id: paris_courtyard
    name: 巴黎庭院
    prompt: |
      巴黎的建筑后面常常藏着庭院——cours——隐藏在门后面。透过门缝看。
      里面有什么？庭院是一个秘密的房间。
    follow_ups:
      - 没有了庭院，建筑会是怎样？
      - 庭院是如何创造隐私的？
      - 庭院与街道之间是什么关系？
  - id: paris_bike_lane
    name: 巴黎自行车道
    prompt: |
      巴黎增设了自行车道——pistes cyclables。找一条。
      这条车道如何塑造了街道？谁在使用它？
    follow_ups:
      - 没有了车道，街道会是怎样？
      - 车道是如何创造流动性的？
      - 车道与汽车之间是什么关系？
  - id: paris_fountain
    name: 巴黎喷泉
    prompt: |
      巴黎有各种喷泉——沃莱斯喷泉、纪念性喷泉。找一个。
      它提供了什么？谁在使用它？
    follow_ups:
      - 没有了喷泉，这个地方会是怎样？
      - 喷泉是如何创造馈赠的？
      - 喷泉与公众之间是什么关系？
  - id: paris_awning
    name: 巴黎遮阳篷
    prompt: |
      巴黎咖啡馆的遮阳篷遮挡阳光。找一条重复出现遮阳篷的街道。
      它们如何塑造了人行道？
    follow_ups:
      - 没有了遮阳篷，街道会是怎样？
      - 遮阳篷是如何创造领地的？
      - 遮阳篷与露台之间是什么关系？
  - id: paris_lamp_post
    name: 巴黎灯柱
    prompt: |
      巴黎的灯柱很有特色——通常很精致，通常是绿色的。找一个。
      夜间灯柱如何塑造了街道？
    follow_ups:
      - 没有了灯柱，街道会是怎样？
      - 灯柱是如何创造安全感的？
      - 灯柱与黑暗之间是什么关系？
  - id: paris_door_knocker
    name: 门环
    prompt: |
      巴黎的门上常常有门环——狮子头、手、圆环。找一个。
      它会发出什么样的声音？门环是一个门槛物品。
    follow_ups:
      - 没有了门环，门会是怎样？
      - 门环是如何创造声音的？
      - 门环与入口之间是什么关系？
  - id: paris_shop_sign
    name: 巴黎店招
    prompt: |
      巴黎的店招通常是手绘的——面包店、肉店、奶酪店。
      找一个。这个店招说明了这家店的什么？
    follow_ups:
      - 没有了店招，街道会是怎样？
      - 店招是如何创造身份的？
      - 店招与工艺之间是什么关系？
  - id: paris_parking
    name: 巴黎停车
    prompt: |
      巴黎的停车方式很有创意——汽车停在人行道上，斜着停，挤着停。看着
      一个人停车。汽车如何适应？汽车与城市之间是什么关系？
    follow_ups:
      - 没有了汽车，街道会是怎样？
      - 停车如何塑造了街道？
      - 停车与空间之间是什么关系？
  - id: paris_drain
    name: 巴黎排水口
    prompt: |
      巴黎的排水沟沿着路边。雨后，它们会流水。找一个。
      水流向哪里？这个排水口是一道缝隙。
    follow_ups:
      - 没有了排水口，街道会是怎样？
      - 排水口是如何管理水的？
      - 排水口与系统之间是什么关系？
  - id: paris_chimney
    name: 巴黎烟囱
    prompt: |
      巴黎的烟囱点缀着屋顶线。数一数一座建筑上的烟囱。
      烟囱是热量的遗迹。这里烧过什么？
    follow_ups:
      - 没有了烟囱，屋顶会是怎样？
      - 烟囱是如何标记历史的？
      - 烟囱与火之间是什么关系？
  - id: paris_metro_map
    name: 地铁图
    prompt: |
      巴黎地铁图是一张图示。它扭曲了地理。什么被强调了？
      什么被省略了？地图如何塑造了这座城市？
    follow_ups:
      - 没有了地图，如何指路？
      - 地图是如何创造连接的？
      - 地图与区域之间是什么关系？
  - id: paris_bridge
    name: 巴黎桥梁
    prompt: |
      巴黎有很多跨越塞纳河的桥梁。走过一座桥。感受过渡。
      什么改变了？这座桥是一个门槛。
    follow_ups:
      - 没有了桥梁，河流会是怎样？
      - 桥梁是如何连接的？
      - 桥梁与河流之间是什么关系？
  - id: paris_graffiti
    name: 巴黎涂鸦
    prompt: |
      巴黎有涂鸦——标签、模板、壁画。找一面有层次的墙。
      这里的层叠是什么？是谁标记了这面墙？
    follow_ups:
      - 没有了涂鸦，墙会是怎样？
      - 涂鸦是如何占据空间的？
      - 涂鸦与城市之间是什么关系？
  - id: paris_tree_guard
    name: 树木围栏
    prompt: |
      巴黎的行道树通常有围栏——树根周围的金属格栅。找一个。
      围栏在保护什么？它排斥了什么？
    follow_ups:
      - 没有了围栏，树会是怎样？
      - 围栏是如何塑造树穴的？
      - 围栏与树之间是什么关系？
  - id: paris_bus_stop
    name: 巴黎公交车站
    prompt: |
      巴黎公交车站有站牌、时刻表、电子显示屏。在站台等车。
      还有谁在等？有什么礼仪？
    follow_ups:
      - 没有了车站，街道会是怎样？
      - 车站是如何创造社群感的？
      - 车站与行程之间是什么关系？
  - id: paris_terrace_table
    name: 露台桌子
    prompt: |
      咖啡馆露台的桌子面向街道。坐在桌边。这张桌子是一个舞台。
      你在看什么？什么在看你？
    follow_ups:
      - 没有了桌子，露台会是怎样？
      - 桌子是如何创造相遇的？
      - 桌子与街道之间是什么关系？
  - id: paris_roof_dormer
    name: 屋顶老虎窗
    prompt: |
      巴黎的屋顶老虎窗——曼萨德式窗户——点缀着天际线。找一栋有很多老虎窗的建筑。
      从里面看，景色会是怎样？
    follow_ups:
      - 没有了老虎窗，屋顶会是怎样？
      - 老虎窗是如何创造光线的？
      - 老虎窗与阁楼之间是什么关系？
  - id: paris_parking_metre
    name: 停车计时器
    prompt: |
      巴黎的停车计时器通常是灰色的盒子。找一个。
      它如何塑造了路边？谁在付费？谁没有付费？
    follow_ups:
      - 没有了计时器，街道会是怎样？
      - 计时器是如何管理空间的？
      - 计时器与汽车之间是什么关系？
  - id: paris_doorway
    name: 巴黎门廊
    prompt: |
      巴黎的门廊通常很高，通常很精致。站在一扇门前。
      穿过它会是什么感觉？这个门廊是一个门槛。
    follow_ups:
      - 没有了门廊，建筑会是怎样？
      - 门廊是如何创造宏伟感的？
      - 门廊与内部之间是什么关系？
  - id: paris_metro_stair
    name: 地铁楼梯
    prompt: |
      地铁楼梯向下通往地下。数一数台阶。感受过渡。
      上面是什么？下面是什么？
    follow_ups:
      - 没有了楼梯，车站会是怎样？
      - 楼梯是如何创造下降感的？
      - 楼梯与地下之间是什么关系？
  - id: paris_bench_view
    name: 长椅上的风景
    prompt: |
      坐在有风景的长椅上——望着塞纳河、广场或街道。
      视野的框架是什么？焦点是什么？长椅是一个观景点。
    follow_ups:
      - 没有了长椅，风景会是怎样？
      - 长椅是如何创造停顿的？
      - 长椅与风景之间是什么关系？
  - id: paris_shutter_open
    name: 百叶窗打开
    prompt: |
      巴黎的百叶窗在早晨打开。找一条正在打开百叶窗的街道。
      这是一个什么样的仪式？打开揭示了什么？
    follow_ups:
      - 没有了百叶窗，街道会是怎样？
      - 百叶窗是如何创造节奏的？
      - 百叶窗与白天之间是什么关系？
  - id: paris_cobble_pattern
    name: 鹅卵石图案
    prompt: |
      巴黎的鹅卵石铺设成各种图案——有时是人字形，有时是放射状。
      找一个图案。它如何塑造了街道？
    follow_ups:
      - 没有了图案，街道会是怎样？
      - 图案是如何创造质感的？
      - 图案与工艺之间是什么关系？
  - id: paris_plane_bark
    name: 梧桐树皮
    prompt: |
      巴黎的梧桐树皮呈斑状剥落。摸一摸。树皮是一种质感。
      这棵树是如何衰老的？没有它，街道会是怎样？
    follow_ups:
      - 没有了梧桐树，林荫大道会是怎样？
      - 树皮是如何创造身份的？
      - 树皮与树之间是什么关系？
  - id: paris_fountain_drink
    name: 喷泉饮水
    prompt: |
      沃莱斯喷泉提供免费饮用水。找一个。谁在喝？谁没有喝？
      这个喷泉是一种馈赠。它意味着什么？
    follow_ups:
      - 没有了喷泉，这个地方会是怎样？
      - 喷泉是如何创造公共福利的？
      - 喷泉与口渴之间是什么关系？
  - id: paris_metro_sound
    name: 地铁声音
    prompt: |
      在地铁里闭上眼睛。隆隆声、刹车声、广播声。
      描绘出声音景观。地下的巴黎听起来是什么样的？
    follow_ups:
      - 没有了声音，旅程会是怎样？
