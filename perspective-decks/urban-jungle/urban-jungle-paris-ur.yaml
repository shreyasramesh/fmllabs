# اربن جنگل — پیرس (Urdu)

id: urban_jungle_paris
name: اربن جنگل — پیرس
description: 50 کارڈز پیرس کو دیکھنے کے انداز کو بدلنے کے لیے — پیمانے اور روشنی سے لے کر تاریخ کی تہوں اور گلی کی زندگی کی تال تک۔
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: بالکونی کا پھول
    prompt: |
      پیرس کی بالکونیاں پھولوں سے مہکتی ہیں—جرینیم، پیٹونیا۔ ایسی عمارت تلاش کریں جہاں ہر بالکونی میں ایک گملہ ہو۔ پھول عمارت کے باہر کے حصے کو کیسے بدلتا ہے؟
    follow_ups:
      - پھولوں کے بغیر سڑک کیسی ہوگی؟
      - پھول شناخت کیسے بناتے ہیں؟
      - پھول اور رہائشی کے درمیان کیا تعلق ہے؟
  - id: paris_haussmann_line
    name: ہاوسمین لائن
    prompt: |
      ہاوسمین بولیورڈ پرانے پیرس کو چیرتے ہوئے نکلتے ہیں۔ ایک پر چلیں۔ لائن بے رحم ہے — عمارتیں سیدھ میں، اونچائی یکساں۔ بولیورڈ نقل و حرکت کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - ہاوسمین کے بغیر پیرس کیسا ہوگا؟
      - بولیورڈ منظر کیسے بناتا ہے؟
      - لائن اور طاقت کے درمیان کیا تعلق ہے؟
  - id: paris_cafe_terrace
    name: کیفے ٹیراس
    prompt: |
      پیرس کے کیفے کے ٹیراس سڑک کا رخ کرتے ہیں۔ ایک پر بیٹھیں۔ آپ اندر اور باہر دونوں جگہ ہیں۔ ٹیراس ایک دہلیز ہے۔ آپ کیا دیکھتے ہیں؟
    follow_ups:
      - ٹیراس کے بغیر سڑک کیسی ہوگی؟
      - ٹیراس ملاقات کیسے بناتا ہے؟
      - ٹیراس اور سڑک کے درمیان کیا تعلق ہے؟
  - id: paris_metro_entrance
    name: میٹرو کا داخلی راستہ
    prompt: |
      آرٹ نوو میٹرو کے داخلی راستے آئیکن ہیں۔ ایک تلاش کریں۔ لوہے کا کام، خطوط — داخلی راستہ ایک پورٹل ہے۔ یہ کیا وعدہ کرتا ہے؟
    follow_ups:
      - داخلی راستے کے بغیر سڑک کیسی ہوگی؟
      - داخلی راستہ شناخت کیسے بناتا ہے؟
      - داخلی راستے اور زیر زمین کے درمیان کیا تعلق ہے؟
  - id: paris_shutter
    name: پیرس کا شٹر
    prompt: |
      پیرس کے شٹر—وولٹس—رات کو بند ہو جاتے ہیں۔ وہ سبز، سرمئی، نیلے ہوتے ہیں۔ بند شٹر والی گلی تلاش کریں۔ ان کے پیچھے کیا ہے؟
    follow_ups:
      - شٹر کے بغیر عمارت کا باہر کا حصہ کیسا ہوگا؟
      - شٹر رازداری کیسے بناتے ہیں؟
      - شٹر اور روشنی کے درمیان کیا تعلق ہے؟
  - id: paris_cobble
    name: پیرس کا کوبل
    prompt: |
      پیرس کے کوبل اسٹون—پاوس—باقی ہیں۔ ان پر چلیں۔ ساخت کو محسوس کریں۔ کوبل پتھر ایک پرانے پیرس کی یادگار ہے۔ یہ سڑک کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - کوبل کے بغیر سڑک کیسی ہوگی؟
      - کوبل تاریخ کو کیسے نشان زد کرتے ہیں؟
      - کوبل اور انقلاب کے درمیان کیا تعلق ہے؟
  - id: paris_seine_edge
    name: سین کا کنارہ
    prompt: |
      سین پیرس سے بہتی ہے۔ کنارے پر جائیں۔ دریا ایک جوڑ ہے۔ دونوں طرف کیا ہے؟ دریا کیسے تقسیم اور جوڑتا ہے؟
    follow_ups:
      - سین کے بغیر پیرس کیسا ہوگا؟
      - دریا شہر کو کیسے تشکیل دیتا ہے؟
      - دریا اور کنارے کے درمیان کیا تعلق ہے؟
  - id: paris_roof_zinc
    name: چھت کا زنک
    prompt: |
      پیرس کی چھتیں اکثر زنک کی ہوتی ہیں — سرمئی، ڈھلوان، ڈورمر کے ساتھ۔ اوپر دیکھیں۔ چھت کی لکیر نمایاں ہے۔ یہ افق کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - زنک کے بغیر افق کیسا ہوگا؟
      - زنک شناخت کیسے بناتا ہے؟
      - چھت اور اٹاری کے درمیان کیا تعلق ہے؟
  - id: paris_door_height
    name: دروازے کی اونچائی
    prompt: |
      پیرس کے دروازے اکثر لمبے ہوتے ہیں—دوہری اونچائی۔ ایک تلاش کریں۔ کیا گزرے گا؟ دروازہ پیمانے کی ایک دہلیز ہے۔
    follow_ups:
      - لمبے دروازے کے بغیر عمارت کیسی ہوگی؟
      - اونچائی شان و شوکت کیسے بناتی ہے؟
      - دروازے اور عمارت کے درمیان کیا تعلق ہے؟
  - id: paris_boulangerie_smell
    name: بیکری کی خوشبو
    prompt: |
      بیکری سے روٹی کی خوشبو آتی ہے۔ خوشبو کا تعاقب کریں۔ بیکری ایک مرکز ہے۔ خوشبو بلاک کے بارے میں کیا کہتی ہے؟
    follow_ups:
      - خوشبو کے بغیر سڑک کیسی ہوگی؟
      - خوشبو شناخت کیسے بناتی ہے؟
      - خوشبو اور تجارت کے درمیان کیا تعلق ہے؟
  - id: paris_place
    name: پیرس کا مقام
    prompt: |
      پیرس میں مقامات ہوتے ہیں—چوک، دائرے، مراکز۔ ایک تلاش کریں۔ جیومیٹری پر توجہ دیں۔ مقام اسے فیڈ کرنے والی سڑکوں کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - مقام کے بغیر محلہ کیسا ہوگا؟
      - مقام توجہ کا مرکز کیسے بناتا ہے؟
      - مقام اور بہاؤ کے درمیان کیا تعلق ہے؟
  - id: paris_balcony_iron
    name: بالکونی کا لوہا
    prompt: |
      پیرس کی بالکونی کی ریلنگ اکثر سجاوٹی ہوتی ہیں—ڈھلواں لوہا، خم، فلوریش۔ ایک تلاش کریں۔ لوہا عمارت کے باہر کے حصے کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - لوہے کے بغیر عمارت کیسی ہوگی؟
      - لوہا شناخت کیسے بناتا ہے؟
      - لوہے اور کاریگری کے درمیان کیا تعلق ہے؟
  - id: paris_plane_tree
    name: پلین کا درخت
    prompt: |
      پیرس کے پلین کے درخت بولیورڈز کے کنارے لگے ہوتے ہیں۔ ان کی چھال اترتی ہے۔ ایک تلاش کریں۔ درخت سڑک کو کیسے تشکیل دیتا ہے؟ اس کے بغیر بولیورڈ کیسا ہوگا؟
    follow_ups:
      - درخت کے بغیر سڑک کیسی ہوگی؟
      - درخت سایہ کیسے بناتا ہے؟
      - درخت اور بولیورڈ کے درمیان کیا تعلق ہے؟
  - id: paris_metro_tile
    name: میٹرو کی ٹائل
    prompt: |
      پیرس کے میٹرو اسٹیشنوں میں سفید ٹائلیں ہوتی ہیں۔ سرنگ روشنی کی ایک ٹیوب ہے۔ ایک لائن پر سوار ہوں۔ ٹائل سفر کو کیسے تشکیل دیتی ہے؟
    follow_ups:
      - ٹائلوں کے بغیر اسٹیشن کیسا ہوگا؟
      - ٹائلیں صفائی کیسے بناتی ہیں؟
      - ٹائل اور زیر زمین کے درمیان کیا تعلق ہے؟
  - id: paris_clock
    name: پیرس کی گھڑی
    prompt: |
      پیرس میں بہت سی عوامی گھڑیاں ہوتی ہیں—چرچوں، اسٹیشنوں، عمارتوں پر۔ ایک تلاش کریں۔ یہ کیا وقت بتاتی ہے؟ کیا یہ صحیح ہے؟
    follow_ups:
      - گھڑی کے بغیر جگہ کیسی ہوگی؟
      - گھڑی وقت کو کیسے تشکیل دیتی ہے؟
      - گھڑی اور مقام کے درمیان کیا تعلق ہے؟
  - id: paris_newsstand
    name: پیرس کا نیوز اسٹینڈ
    prompt: |
      پیرس کے کیوسک اخبار، میگزین، میٹرو ٹکٹ فروخت کرتے ہیں۔ ایک تلاش کریں۔ کیا ڈسپلے پر ہے؟ کون رکتا ہے؟ کیوسک ایک مرکز ہے۔
    follow_ups:
      - کیوسک کے بغیر سڑک کیسی ہوگی؟
      - کیوسک ملاقات کیسے بناتا ہے؟
      - کیوسک اور سڑک کے درمیان کیا تعلق ہے؟
  - id: paris_bench
    name: پیرس کا بینچ
    prompt: |
      پیرس میں پارکوں میں اور سین کے ساتھ سبز بینچ ہوتے ہیں۔ ایک پر بیٹھیں. اور کون بیٹھتا ہے؟ منظر کیا ہے؟
    follow_ups:
      - بینچ کے بغیر جگہ کیسی ہوگی؟
      - بینچ آرام کیسے فراہم کرتا ہے؟
      - بینچ اور دریا کے درمیان کیا تعلق ہے؟
  - id: paris_boulangerie_queue
    name: بیکری کی قطار
    prompt: |
      صبح کی رش میں بیکری کی قطار میں شامل ہوں۔ قطار ایک رسم ہے۔ لوگ کیا خرید رہے ہیں؟ آداب کیا ہے؟
    follow_ups:
      - قطار کے بغیر سڑک کیسی ہوگی؟
      - قطار کمیونٹی کیسے بناتی ہے؟
      - قطار اور روٹی کے درمیان کیا تعلق ہے؟
  - id: paris_manhole
    name: پیرس کا مین ہول
    prompt: |
      پیرس کے مین ہول کے کور پر اکثر "Paris" یا "Eau" لکھا ہوتا ہے۔ ایک تلاش کریں۔ کور شہر کی رگوں کا دروازہ ہے۔ اس کے نیچے کیا ہے؟
    follow_ups:
      - کور کے بغیر سڑک کیسی ہوگی؟
      - کور نظام کو کیسے نشان زد کرتا ہے؟
      - کور اور زیر زمین کے درمیان کیا تعلق ہے؟
  - id: paris_shadow
    name: پیرس کا سایہ
    prompt: |
      پیرس کی روشنی تیز سائے بناتی ہے۔ ایک کونہ تلاش کریں جہاں سایہ اور دھوپ ملتی ہے۔ سایہ سڑک کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - سائے کے بغیر سڑک کیسی ہوگی؟
      - سایہ تضاد کیسے بناتا ہے؟
      - سایہ اور عمارت کے درمیان کیا تعلق ہے؟
  - id: paris_courtyard
    name: پیرس کا صحن
    prompt: |
      پیرس کی عمارتیں اکثر گیٹوں کے پیچھے صحن—کور—چھپاتی ہیں۔ اندر جھانکیں۔ اندر کیا ہے؟ صحن ایک خفیہ کمرہ ہے۔
    follow_ups:
      - صحن کے بغیر عمارت کیسی ہوگی؟
      - صحن رازداری کیسے بناتا ہے؟
      - صحن اور سڑک کے درمیان کیا تعلق ہے؟
  - id: paris_bike_lane
    name: پیرس کی بائیک لین
    prompt: |
      پیرس میں بائیک لین—پسٹ سائیکل—بڑھ گئی ہیں۔ ایک تلاش کریں۔ لین سڑک کو کیسے تشکیل دیتی ہے؟ اسے کون استعمال کرتا ہے؟
    follow_ups:
      - لین کے بغیر سڑک کیسی ہوگی؟
      - لین نقل و حرکت کیسے بناتی ہے؟
      - لین اور کار کے درمیان کیا تعلق ہے؟
  - id: paris_fountain
    name: پیرس کا فوارہ
    prompt: |
      پیرس میں فوارے ہوتے ہیں—والیس فوارے، یادگار فوارے۔ ایک تلاش کریں۔ یہ کیا پیش کرتا ہے؟ اسے کون استعمال کرتا ہے؟
    follow_ups:
      - فوارے کے بغیر جگہ کیسی ہوگی؟
      - فوارہ تحفہ کیسے بناتا ہے؟
      - فوارہ اور عوام کے درمیان کیا تعلق ہے؟
  - id: paris_awning
    name: پیرس کا چھت نما سائبان
    prompt: |
      پیرس کے کیفے کے سائبان سایہ بناتے ہیں۔ ایسی گلی تلاش کریں جہاں سائبان دہرائے جاتے ہوں۔ وہ فٹ پاتھ کو کیسے تشکیل دیتے ہیں؟
    follow_ups:
      - سائبان کے بغیر سڑک کیسی ہوگی؟
      - سائبان علاقہ کیسے بناتے ہیں؟
      - سائبان اور ٹیراس کے درمیان کیا تعلق ہے؟
  - id: paris_lamp_post
    name: پیرس کا لیمپ پوسٹ
    prompt: |
      پیرس کے لیمپ پوسٹ کا ایک خاص انداز ہوتا ہے—اکثر سجاوٹی، اکثر سبز۔ ایک تلاش کریں۔ رات کو لیمپ سڑک کو کیسے تشکیل دیتا ہے؟
    follow_ups:
      - لیمپ کے بغیر سڑک کیسی ہوگی؟
      - لیمپ حفاظت کیسے بناتا ہے؟
      - لیمپ اور اندھیرے کے درمیان کیا تعلق ہے؟
  - id: paris_door_knocker
    name: دروازے کا دستک
    prompt: |
      پیرس کے دروازوں پر اکثر دستک دینے والے ہوتے ہیں—شیر کے سر، ہاتھ، انگوٹھیاں۔ ایک تلاش کریں۔ اس کی آواز کیسی ہوگی؟ دستک دینے والا ایک دہلیز کی شے ہے۔
    follow_ups:
      - دستک کے بغیر دروازہ کیسا ہوگا؟
      - دستک آواز کیسے بناتی ہے؟
      - دستک اور داخلی راستے کے درمیان کیا تعلق ہے؟
  - id: paris_shop_sign
    name: پیرس کا دکان کا سائن
    prompt: |
      پیرس کے دکان کے سائن اکثر ہاتھ سے لکھے ہوتے ہیں—بیکری، قصائی، پنیر کی دکان۔
      ایک تلاش کریں۔ سائن دکان کے بارے میں کیا کہتا ہے؟
    follow_ups:
      - سائن کے بغیر سڑک کیسی ہوگی؟
      - سائن شناخت کیسے بناتا ہے؟
      - سائن اور کاریگری کے درمیان کیا تعلق ہے؟
  - id: paris_parking
    name: پیرس کی پارکنگ
    prompt: |
      پیرس کی پارکنگ تخلیقی ہوتی ہے—فٹ پاتھ پر گاڑیاں، ترچھی، دبی ہوئی۔
      ایک شخص کو پارک کرتے ہوئے دیکھیں. کار کیسے فٹ ہوتی ہے؟ کار اور شہر کے درمیان کیا تعلق ہے؟
    follow_ups:
      - کاروں کے بغیر سڑک کیسی ہوگی؟
      - پارکنگ سڑک کو کیسے تشکیل دیتی ہے؟
      - پارکنگ اور جگہ کے درمیان کیا تعلق ہے؟
  - id: paris_drain
    name: پیرس کا نالہ
    prompt: |
      پیرس کے گٹر کنارے کے ساتھ چلتے ہیں۔ بارش کے بعد، وہ بہتے ہیں۔ ایک تلاش کریں۔ پانی کہاں جاتا ہے؟ نالہ ایک جوڑ ہے۔
    follow_ups:
      - نالے کے بغیر سڑک کیسی ہوگی؟
      - نالہ پانی کا انتظام کیسے کرتا ہے؟
