# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# غابة حضرية — نيويورك (Arabic)

id: urban_jungle_new_york
name: غابة حضرية — نيويورك
description: 50 بطاقة لتغيير نظرتك لنيويورك — من المقياس والضوء إلى طبقات التاريخ وإيقاعات حياة الشارع.
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: مدينة عمودية
    prompt: |
      انظر للأعلى. نيويورك مبنية على الرأسي — أبراج تتنافس على السماء.
      تتبع مبنى واحد من الرصيف إلى قمته. كيف يغير الارتفاع ما
      تلاحظه؟ أين تستقر عينك؟
    follow_ups:
      - كيف سيبدو الشارع من الأعلى؟
      - كيف يتشوه المقياس عند ارتفاعات مختلفة؟
      - ما الذي يختفي عندما تنظر للأعلى فقط؟
  - id: ny_grid_navigation
    name: التنقل بالشبكة
    prompt: |
      شبكة مانهاتن لا هوادة فيها. امشِ كتلة واحدة ولاحظ كيف يشكل نظام
      الترقيم الحركة، التوجيه، والمفاجأة. ماذا يحدث عندما تكسر الشبكة؟
    follow_ups:
      - أين تشعر الشبكة بالاضطهاد؟ وأين بالتحرير؟
      - كيف ستبدو المدينة بدونها؟
      - كيف تغير الشوارع المائلة الإيقاع؟
  - id: ny_subway_soundscape
    name: مشهد صوت المترو
    prompt: |
      أغمض عينيك في محطة. الضجيج، الفرامل، الإعلانات، البائع المتجول. ارسم
      خريطة للمشهد الصوتي. كيف تبدو نيويورك عندما لا يمكنك رؤيتها؟
    follow_ups:
      - أي الأصوات ثابتة؟ وأيها عارضة؟
      - ماذا يعني الصمت هنا؟
      - كيف يحدد الصوت الوقت تحت الأرض؟
  - id: ny_fire_escape
    name: مخرج الحريق
    prompt: |
      مخارج الحريق هي الهيكل الخارجي للمدينة — وظيفية، إيقاعية، شخصية.
      ابحث عن كتلة حيث تتكرر. ماذا تكشف عن المباني خلفها؟ من قد يجلس هناك ليلاً؟
    follow_ups:
      - ماذا سترى من واحد منها؟
      - كيف تغير طابع الشارع؟
      - ماذا ستفقد الكتلة بدونها؟
  - id: ny_street_number
    name: رقم الشارع
    prompt: |
      اختر رقمًا — رقم مبنى، طابق، مسار حافلة. تتبعه عبر المدينة. ما النمط الذي يظهر؟ ماذا يعني هذا الرقم هنا؟
    follow_ups:
      - أين يقودك الرقم؟
      - ماذا سيكشف رقم مختلف؟
      - كيف تنظم الأرقام التجربة الحضرية؟
  - id: ny_steam_rising
    name: البخار المتصاعد
    prompt: |
      بخار فتحات الصرف الصحي هو نفس نيويورك. ابحث حيث يتصاعد وشاهد كيف
      يتحرك، يتشتت، يلتقط الضوء. ما الذي تحته؟ ماذا تزفر المدينة؟
    follow_ups:
      - ماذا ستجد تحت الشبكة؟
      - كيف يغير الطقس البخار؟
      - ما هي الأنظمة المخفية الأخرى التي تنفث هنا؟
  - id: ny_storefront_typography
    name: طباعة واجهات المحلات
    prompt: |
      اقرأ اللافتات. البقالات، الديلي، المغاسل — لكل منها لغة بصرية.
      اجمع خمسة خطوط من كتلة واحدة. ماذا تقول عن من يعيش هنا؟
    follow_ups:
      - أي اللافتات تبدو قديمة؟ وأيها جديدة؟
      - كيف ستبدو الكتلة لو استطاعت اللافتات التحدث؟
      - كيف تحدد الطباعة التغيير؟
  - id: ny_waterfront_edge
    name: حافة الواجهة المائية
    prompt: |
      اذهب إلى الماء. المدينة تدير ظهرها للنهر، الميناء، الخليج. قف حيث يلتقي
      البر بالماء. ما المبني للمنظر؟ ما المبني لتجاهله؟
    follow_ups:
      - من يحق له رؤية الماء؟
      - كيف تم الاستيلاء على الحافة؟
      - ماذا ستكون المدينة لو واجهت الماء؟
  - id: ny_parks_as_rooms
    name: الحدائق كغرف
    prompt: |
      سنترال بارك، بروسبكت بارك، ساحة صغيرة — كل منها غرفة في المدينة.
      ادخل واحدة ولاحظ جدرانها، سقفها، أثاثها. كيف يتم تصميم الطبيعة هنا؟
    follow_ups:
      - ما هو الغرض من الغرفة؟
      - من صمم خطوط الرؤية؟
      - ماذا سيحدث لو انهارت الجدران؟
  - id: ny_delivery_rhythm
    name: إيقاع التوصيل
    prompt: |
      شاهد عمليات التوصيل — شاحنات، عربات يدوية، دراجات. تتبع مسار طرد
      واحد من الشاحنة إلى الباب. كيف تتحرك التجارة في الشارع؟ ما هو إيقاع الوصول؟
    follow_ups:
      - كيف ستبدو الكتلة بدون عمليات التوصيل؟
      - كيف تتحرك السلع المختلفة بشكل مختلف؟
      - من هو غير مرئي في هذا التدفق؟
  - id: ny_brownstone_steps
    name: درجات المباني الحجرية البنية
    prompt: |
      سلالم المباني الحجرية البنية هي مسارح. اجلس على واحدة وشاهد الشارع.
      من يتوقف؟ من يمر؟ ماذا ستقول من هنا؟
    follow_ups:
      - ما هو المنظر من الدرجة العليا؟
      - كيف تخلق الدرجات منطقة؟
      - ماذا ستفقد الكتلة بدونها؟
  - id: ny_bridge_as_threshold
    name: الجسر كعتبة
    prompt: |
      اعبر جسرًا سيرًا على الأقدام. اشعر بالانتقال — من حي إلى آخر.
      الجسر ليس هنا ولا هناك. ماذا يتغير عندما تصل إلى الجانب الآخر؟
    follow_ups:
      - ماذا تترك وراءك؟
      - كيف يشكل الجسر الرحلة؟
      - ماذا ستكون المدينة بدون جسور؟
  - id: ny_awning_shade
    name: ظل المظلة
    prompt: |
      المظلات تخلق مناخات صغيرة. قف تحت واحدة. لاحظ التغيير في الضوء،
      الصوت، درجة الحرارة. كيف تغير الهياكل الصغيرة الشارع؟
    follow_ups:
      - كيف ستبدو الكتلة بدون مظلات؟
      - كيف تحدد الملكية؟
      - ما هي الملاجئ الصغيرة الأخرى الموجودة هنا؟
  - id: ny_graffiti_layer
    name: طبقة الجرافيتي
    prompt: |
      انظر إلى الجدران. الملصقات، اللوحات الجدارية، المعجون — كل منها طبقة
      من الزمن والمطالبة. اقرأ الكتابات المتراكمة. من علّم هذا السطح؟
    follow_ups:
      - ما هو أقدم علامة يمكنك العثور عليها؟
      - كيف تحكي الطبقات قصة؟
      - ماذا سيقول الجدار لو استطاع التحدث؟
  - id: ny_rooftop_skyline
    name: أفق السطح
    prompt: |
      تخيل المنظر من السطح. خزانات المياه، الهوائيات، أسطح الجيران.
      المدينة من الأعلى مدينة مختلفة. ماذا سترى؟
    follow_ups:
      - كيف يغير الارتفاع ما يهم؟
      - ما الذي يختبئ عن الشارع؟
      - من لديه إمكانية الوصول إلى هذا المنظر؟
  - id: ny_crosswalk_wait
    name: انتظار عبور المشاة
    prompt: |
      انتظر عند معبر المشاة. لا تعبر عندما يتغير الضوء. انتظر الدورة التالية.
      ماذا تلاحظ في التوقف؟ من ينتظر أيضًا؟
    follow_ups:
      - كيف يغير الانتظار الإدراك؟
      - ما هي الإيقاعات التي تحكم التقاطع؟
      - ماذا سيحدث لو لم تعبر أبدًا؟
  - id: ny_diner_booth
    name: مقصورة المطعم
    prompt: |
      اجلس في مقصورة مطعم بجوار النافذة. يصبح الشارع فيلمًا. شاهد المارة،
      حركة المرور، الضوء. ما القصة التي تُعرض؟
    follow_ups:
      - من هم الشخصيات الرئيسية؟
      - كيف يغير الإطار ما تراه؟
      - ماذا ستفقد بدون النافذة؟
  - id: ny_scaffolding_skin
    name: جلد السقالات
    prompt: |
      السقالات تلف المباني مثل الضمادات. امشِ تحتها. لاحظ الصوت، الضوء،
      السقف المؤقت. ما الذي يتم إصلاحه؟ ما الذي يتم إخفاؤه؟
    follow_ups:
      - منذ متى وهي موجودة؟
      - ماذا سيقول المبنى بدونها؟
      - ما هي العلاقة بين الإصلاح والإخفاء؟
  - id: ny_newsstand_archive
    name: أرشيف كشك الصحف
    prompt: |
      كشك الصحف هو شريحة من الانتباه — مجلات، صحف، حلوى. ما المعروض؟
      من يتوقف؟ ماذا ستكون هذه الزاوية بدونها؟
    follow_ups:
      - ما هو الأكثر مبيعاً؟
      - كيف يشكل الكشك الكتلة؟
      - ماذا ستضع هنا؟
  - id: ny_construction_site
    name: موقع بناء
    prompt: |
      شاهد موقع بناء. رافعات، حواجز، عمال. المدينة تتكون دائمًا. ما الذي يتم
      بناؤه؟ ما الذي يتم استبداله؟
    follow_ups:
      - من سيستخدم هذا عندما ينتهي؟
      - ماذا كان هنا من قبل؟
      - كيف يغير البناء الحي؟
  - id: ny_light_well
    name: بئر الضوء
    prompt: |
      ابحث عن آبار الضوء — الفجوات الضيقة بين المباني حيث يسقط الضوء.
      من يحصل على هذا الضوء؟ ما الذي ينمو هناك؟
    follow_ups:
      - كيف سيكون العيش في هذا العمود؟
      - كيف يحدد الضوء القيمة؟
      - ما الذي يختبئ في الظلال؟
  - id: ny_bodega_cat
    name: قط البقالة
    prompt: |
      ابحث عن بقالة بها قط. القط داخل وخارج القواعد. ماذا يعمل بهذه الطريقة
      في المدينة؟
    follow_ups:
      - ماذا يرى القط؟
      - كيف تشكل القواعد غير الرسمية المساحة؟
      - ماذا ستكون المحل بدون القط؟
  - id: ny_sidewalk_crack
    name: شق الرصيف
    prompt: |
      انظر للأسفل. اتبع شقًا في الرصيف. إلى أين يذهب؟ ما الذي ينمو فيه؟
      المدينة مليئة بهذه الكسور.
    follow_ups:
      - ماذا سيقول الرصيف عن الوقت؟
      - كيف تحدث الكسور الصغيرة فرقًا؟
      - ما الذي يندفع؟
  - id: ny_air_conditioner
    name: مكيف الهواء
    prompt: |
      عد مكيفات الهواء في مبنى واحد. إنها طفيليات، أطراف صناعية،
      ضروريات. كيف تغير الواجهة؟ ماذا تقطر؟
    follow_ups:
      - كيف سيبدو المبنى بدونها؟
      - كيف يشكل المناخ الهندسة المعمارية؟
      - من يقرر مكان وضعها؟
  - id: ny_express_local
    name: سريع / محلي
    prompt: |
      اركب المترو. لاحظ الفرق بين السريع والمحلي. السرعة تغير ما تراه.
      تخطي المحطات واشعر بالمدينة تتقلص.
    follow_ups:
      - ماذا تفوت عندما لا تتوقف؟
      - كيف تشكل السرعة التجربة؟
      - ماذا ستكون المدينة لو كان كل شيء محليًا؟
  - id: ny_water_tower
    name: برج المياه
    prompt: |
      أبراج المياه تعتلي المباني القديمة. إنها خشبية، على شكل براميل،
      متواجدة في كل مكان. ابحث عن خمسة. ماذا تقول عن الأفق؟
    follow_ups:
      - لماذا لا تزال موجودة؟
      - كيف سيبدو السطح بدون واحد؟
      - كيف تحدد العمر؟
  - id: ny_awning_stripes
    name: خطوط المظلات
    prompt: |
      المظلات المخططة هي لغة نيويورك العامية. ابحث عن كتلة حيث تتكرر.
      كيف تخلق الخطوط الهوية؟ ماذا ستفعل الألوان الصلبة؟
    follow_ups:
      - لماذا الخطوط وليس الصلبة؟
      - كيف توحد المظلات الكتلة؟
      - ما هو تاريخ هذا النمط؟
  - id: ny_curb_cut
    name: منحدر الرصيف
    prompt: |
      لاحظ منحدرات الأرصفة — المنحدرات عند الزوايا. إنها للكراسي المتحركة،
      العربات، عربات الأطفال. كيف تغير الشارع؟ من تشمل؟
    follow_ups:
      - كيف ستبدو الكتلة بدونها؟
      - كيف يشكل الوصول التصميم؟
      - ما هي التسهيلات الخفية الأخرى الموجودة؟
  - id: ny_street_tree
    name: شجرة الشارع
    prompt: |
      اختر شجرة شارع واحدة. ما مقدار المساحة التي لديها؟ ما الذي في حفرتها؟
      من يسقيها؟ الشجرة ضيف. كيف يتم التعامل معها؟
    follow_ups:
      - ماذا ستكون الكتلة بدون أشجار؟
      - كيف تحدد الأشجار العناية؟
      - ما الذي ينمو في ظل الشجرة؟
  - id: ny_loading_zone
    name: منطقة التحميل
    prompt: |
      مناطق التحميل هي مناطق مؤقتة. راقب واحدة لمدة عشر دقائق. من يستخدمها؟
      كم من الوقت يبقون؟ ما هو إيقاع الاحتلال؟
    follow_ups:
      - ماذا سيحدث بدون مناطق التحميل؟
      - كيف يتم انحراف القواعد؟
      - ما هي العلاقة بين وقوف السيارات والتجارة؟
  - id: ny_vent_grille
    name: شبكة التهوية
    prompt: |
      شبكات الرصيف تهوي المترو. قف على واحدة. اشعر بالتيار الصاعد. استمع.
      المدينة تتنفس عبر هذه الفتحات.
    follow_ups:
      - ماذا يصعد من الأسفل؟
      - كيف تربط الشبكة العوالم؟
      - ماذا سيكون الرصيف بدونها؟
  - id: ny_basement_stairs
    name: سلالم القبو
    prompt: |
      ابحث عن سلالم تؤدي للأسفل — إلى قبو، مترو، أو مكان سري. المدينة لها
      مستويات عديدة. ما الذي يوجد تحت الرصيف؟
    follow_ups:
      - من ينزل؟
      - كيف يغير النزول الضوء؟
      - ماذا ستجد في الأسفل؟
  - id: ny_clock_tower
    name: برج الساعة
    prompt: |
      ابحث عن ساعة عامة. هل هي دقيقة؟ من ضبطها؟ الساعات تنظم المدينة.
      ماذا يحدث عندما تختلف؟
    follow_ups:
      - ماذا ستكون الكتلة بدون الساعة؟
      - كيف تتم مزامنة الوقت؟
      - ما هي العلاقة بين وقت الساعة ووقت الجسم؟
  - id: ny_newsstand_magazine
    name: مجلة كشك الصحف
    prompt: |
      في كشك صحف، اختر غلاف مجلة. لمن هي؟ ماذا تفترض عن القارئ؟
      الكشك هو مرآة للرغبة.
    follow_ups:
      - ماذا سيتعلم غريب من هذا العرض؟
      - كيف تتنافس الأغلفة على الانتباه؟
      - ما الذي ليس على الكشك؟
  - id: ny_awning_rain
    name: مطر المظلة
    prompt: |
      قف تحت مظلة في المطر. شاهد الماء يتجه نحو الحواف.
      المظلة تخلق جزيرة جافة. من يشاركك فيها؟
    follow_ups:
      - كيف ستبدو الكتلة بدون مأوى؟
      - كيف يغير المطر الشارع؟
      - ما هي الملاجئ الأخرى الموجودة؟
  - id: ny_fire_hydrant
    name: صنبور إطفاء الحريق
    prompt: |
      صنبور إطفاء الحريق هو وصلة بالنظام الدوري للمدينة. ابحث عن واحد.
      ما لونه؟ من قد يفتحه؟ ماذا يتدفق؟
    follow_ups:
      - ماذا ستفعل الكتلة في حريق بدونه؟
      - كيف تحدد الصنابير المناطق؟
      - ما هي العلاقة بين الصنبور والخراطيم؟
  - id: ny_stoop_sale
    name: بيع على الدرج
    prompt: |
      تخيل بيعًا على الدرج هنا. ماذا سيعرض للبيع؟ من سيتوقف؟
      الدرج هو مسرح للتبادل.
    follow_ups:
      - ماذا ستضع؟
      - كيف يمكّن الدرج اللقاء؟
      - ماذا ستتعلم الكتلة من بيع؟
  - id: ny_rooftop_garden
    name: حديقة السطح
    prompt: |
      تخيل حديقة سطح فوقك. ماذا ستنمو هناك؟ من يعتني بها؟
      المدينة لديها طبقة خضراء سرية.
    follow_ups:
      - ماذا ستزرع؟
      - كيف يغير الارتفاع الزراعة؟
      - كيف سيبدو الأفق لو كانت جميع الأسطح خضراء؟
  - id: ny_subway_map
    name: خريطة المترو
    prompt: |
      انظر إلى خريطة مترو. إنها مخطط، وليست جغرافيا. ما الذي تم تشويهه؟
      ما الذي تم حذفه؟ الخريطة تشكل طريقة تفكيرنا في المدينة.
    follow_ups:
      - كيف ستبدو خريطة صادقة؟
      - كيف تخلق الخريطة أحياء؟
      - ما هي العلاقة بين الخريطة والإقليم؟
  - id: ny_brick_pattern
    name: نمط الطوب
    prompt: |
      ادرس جدارًا من الطوب. النمط — رباط تشغيلي، رباط فلامنكي — يحمل
      الجدار. تتبع النمط. ماذا سيحدث لو اختفى طوبة واحدة؟
    follow_ups:
      - كيف يوزع النمط الوزن؟
      - ماذا سيقول الجدار عن صانعه؟
      - كيف يشيخ الطوب؟
  - id: ny_awning_strip
    name: شريط المظلة
    prompt: |
      امشِ كتلة وعد المظلات. ما هي الألوان؟ ما هي الظروف؟
