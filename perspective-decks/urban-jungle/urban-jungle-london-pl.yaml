      - Jaki byłby dach bez komina?
      - Jak komin oznacza historię?
      - Jaka jest relacja między kominem a ciepłem?
  - id: london_bike_stand
    name: Stojak na Rowery
    prompt: |
      Londyn ma stojaki na rowery, rowery Santander, rowery dostawcze. Znajdź klaster. Jak rowery kształtują ulicę? Jaki byłby blok bez nich?
    follow_ups:
