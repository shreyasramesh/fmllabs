      - Jaka jest relacja między rowerem a miastem?
  - id: london_tree_pit
    name: Dołek Drzewa
    prompt: |
      Londyńskie drzewa uliczne rosną w dołkach — często małych, często walczących. Znajdź jeden. Co jest w dołku? Jak radzi sobie drzewo?
