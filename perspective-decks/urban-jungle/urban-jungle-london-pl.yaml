      Uliczki mews są często brukowane. Przejdź się jedną. Poczuj teksturę. Bruk oznacza historię. Jaki byłby mews z asfaltową nawierzchnią?
    follow_ups:
      - Jak bruk kształtuje uliczkę?
      - Jaka jest relacja między brukiem a koniem?
