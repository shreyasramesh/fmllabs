      - Jaka jest relacja między balkonem a mieszkaniem?
  - id: london_chimney
    name: Komina Londyńska
    prompt: |
      Londyńskie kominy przeszywają linię dachu. Policz je na jednym budynku. Ile ogni raz się paliło? Komina to relikt.
