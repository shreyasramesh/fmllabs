      - Jaka jest relacja między nawierzchnią a pieszym?
  - id: london_balcony
    name: Balkon Londyński
    prompt: |
      Londyńskie balkony są często małe — balkony Julii, maleńkie tarasy. Znajdź jeden. Co byś tam uprawiał? Kto by z niego korzystał?
