  - id: london_thames_path
    name: Ścieżka nad Tamizą
    prompt: |
      Ścieżka nad Tamizą biegnie wzdłuż rzeki. Przejdź fragment. Ścieżka tworzy korytarz. Co jest po obu stronach? Jak ścieżka kształtuje podróż?
    follow_ups:
      - Jaka byłaby rzeka bez ścieżki?
      - Jak ścieżka tworzy dostęp?
      - Jaka jest relacja między ścieżką a rzeką?
