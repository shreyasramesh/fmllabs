# நகர்ப்புற காடு — லண்டன் (Tamil)

id: urban_jungle_london
name: நகர்ப்புற காடு — லண்டன்
description: லண்டனை நீங்கள் பார்க்கும் விதத்தை மாற்றியமைக்க 50 அட்டைகள் — அளவு மற்றும் ஒளி முதல் வரலாற்றின் அடுக்குகளும் தெரு வாழ்க்கையின் தாளங்களும் வரை.
domain: urban_jungle
cards:
  - id: london_layer
