# ಅರ್ಬನ್ ಜಂಗಲ್ — ನ್ಯೂಯಾರ್ಕ್ (Kannada)

id: urban_jungle_new_york
name: ಅರ್ಬನ್ ಜಂಗಲ್ — ನ್ಯೂಯಾರ್ಕ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ನ್ಯೂಯಾರ್ಕ್ ಅನ್ನು ನೋಡುವ ರೀತಿಯನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ — ಪ್ರಮಾಣ ಮತ್ತು ಬೆಳಕಿನಿಂದ ಇತಿಹಾಸದ ಪದರಗಳು ಮತ್ತು ಬೀದಿ ಜೀವನದ ಲಯಗಳವರೆಗೆ.
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: ಲಂಬವಾದ ನಗರ
    prompt: |
      ಮೇಲೆ ನೋಡಿ. ನ್ಯೂಯಾರ್ಕ್ ಲಂಬವಾಗಿ ನಿರ್ಮಿಸಲಾಗಿದೆ — ಆಕಾಶಕ್ಕಾಗಿ ಸ್ಪರ್ಧಿಸುವ ಗೋಪುರಗಳು.
      ಒಂದು ಕಟ್ಟಡವನ್ನು ಪಾದಚಾರಿ ಮಾರ್ಗದಿಂದ ಮೇಲಕ್ಕೆ ಎಳೆಯಿರಿ. ಎತ್ತರವು ನೀವು ಗಮನಿಸುವದನ್ನು
      ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ? ನಿಮ್ಮ ಕಣ್ಣು ಎಲ್ಲಿ ನಿಲ್ಲುತ್ತದೆ?
    follow_ups:
      - ಮೇಲಿನಿಂದ ಬೀದಿ ಹೇಗಿರಬಹುದು?
      - ಬೇರೆ ಬೇರೆ ಎತ್ತರಗಳಲ್ಲಿ ಪ್ರಮಾಣವು ಹೇಗೆ ವಿರೂಪಗೊಳ್ಳುತ್ತದೆ?
      - ಮೇಲಕ್ಕೆ ಮಾತ್ರ ನೋಡಿದಾಗ ಏನು ಮರೆಯಾಗುತ್ತದೆ?
  - id: ny_grid_navigation
    name: ಗ್ರಿಡ್ ನ್ಯಾವಿಗೇಷನ್
    prompt: |
      ಮ್ಯಾನ್‌ಹ್ಯಾಟನ್‌ನ ಗ್ರಿಡ್ ಬಿಡದಂತೆ. ಒಂದು ಬ್ಲಾಕ್ ನಡೆಯಿರಿ ಮತ್ತು ಸಂಖ್ಯೆ ವ್ಯವಸ್ಥೆಯು
      ಚಲನೆ, ದೃಷ್ಟಿಕೋನ ಮತ್ತು ಆಶ್ಚರ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಗ್ರಿಡ್ ಅನ್ನು
      ಮುರಿದಾಗ ಏನಾಗುತ್ತದೆ?
    follow_ups:
      - ಗ್ರಿಡ್ ಎಲ್ಲಿ ಒತ್ತಡದಂತೆ ಭಾಸವಾಗುತ್ತದೆ? ಎಲ್ಲಿ ವಿಮೋಚನೆ?
      - ಅದು ಇಲ್ಲದಿದ್ದರೆ ನಗರವು ಹೇಗಿರಬಹುದು?
      - ಕರ್ಣೀಯ ರಸ್ತೆಗಳು ಲಯವನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತವೆ?
  - id: ny_subway_soundscape
    name: ಸಬ್‌ವೇ ಸೌಂಡ್‌ಸ್ಕೇಪ್
    prompt: |
      ನಿಲ್ದಾಣದಲ್ಲಿ ಕಣ್ಣು ಮುಚ್ಚಿಕೊಳ್ಳಿ. ಗರ್ಜನೆ, ಬ್ರೇಕ್‌ಗಳು, ಪ್ರಕಟಣೆಗಳು, ಬಸ್ಕೆರ್.
      ಸೌಂಡ್‌ಸ್ಕೇಪ್ ಅನ್ನು ಮ್ಯಾಪ್ ಮಾಡಿ. ನೀವು ನೋಡದಿದ್ದಾಗ ನ್ಯೂಯಾರ್ಕ್ ಹೇಗೆ ಧ್ವನಿಸುತ್ತದೆ?
    follow_ups:
      - ಯಾವ ಶಬ್ದಗಳು ಸ್ಥಿರವಾಗಿರುತ್ತವೆ? ಯಾವುದು ಆಕಸ್ಮಿಕ?
      - ಇಲ್ಲಿ ಮೌನ ಎಂದರೆ ಏನು?
      - ಭೂಗರ್ಭದಲ್ಲಿ ಶಬ್ದವು ಸಮಯವನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
  - id: ny_fire_escape
    name: ಅಗ್ನಿ ತಪ್ಪಿಸಿಕೊಳ್ಳುವ ಮಾರ್ಗ
    prompt: |
      ಅಗ್ನಿ ತಪ್ಪಿಸಿಕೊಳ್ಳುವ ಮಾರ್ಗಗಳು ನಗರದ ಬಾಹ್ಯ ಅಸ್ಥಿಪಂಜರ — ಕ್ರಿಯಾತ್ಮಕ, ಲಯಬದ್ಧ, ವೈಯಕ್ತಿಕ.
      ಅವು ಪುನರಾವರ್ತನೆಯಾಗುವ ಬ್ಲಾಕ್ ಅನ್ನು ಹುಡುಕಿ. ಅವುಗಳ ಹಿಂದಿರುವ ಕಟ್ಟಡಗಳ ಬಗ್ಗೆ ಅವು ಏನು
      ಬಯಲು ಮಾಡುತ್ತವೆ? ರಾತ್ರಿಯಲ್ಲಿ ಯಾರು ಅಲ್ಲಿ ಕುಳಿತುಕೊಳ್ಳಬಹುದು?
    follow_ups:
      - ಒಂದರಿಂದ ಏನನ್ನು ನೋಡಬಹುದು?
      - ಅವು ಬೀದಿಯ ಪಾತ್ರವನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತವೆ?
      - ಅವು ಇಲ್ಲದಿದ್ದರೆ ಬ್ಲಾಕ್ ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
  - id: ny_street_number
    name: ಬೀದಿ ಸಂಖ್ಯೆ
    prompt: |
      ಒಂದು ಸಂಖ್ಯೆಯನ್ನು ಆರಿಸಿ — ಕಟ್ಟಡ ಸಂಖ್ಯೆ, ಮಹಡಿ, ಬಸ್ ಮಾರ್ಗ. ನಗರದಾದ್ಯಂತ ಅದನ್ನು
      ಅನುಸರಿಸಿ. ಯಾವ ಮಾದರಿ ಹೊರಹೊಮ್ಮುತ್ತದೆ? ಆ ಸಂಖ್ಯೆಯ ಅರ್ಥವೇನು?
    follow_ups:
      - ಸಂಖ್ಯೆ ನಿಮ್ಮನ್ನು ಎಲ್ಲಿಗೆ ಕರೆದೊಯ್ಯುತ್ತದೆ?
      - ಬೇರೆ ಸಂಖ್ಯೆ ಏನು ಬಹಿರಂಗಪಡಿಸಬಹುದು?
      - ಸಂಖ್ಯೆಗಳು ನಗರದ ಅನುಭವವನ್ನು ಹೇಗೆ ಆಯೋಜಿಸುತ್ತವೆ?
  - id: ny_steam_rising
    name: ಏರುತ್ತಿರುವ ಉಗಿ
    prompt: |
      ಮ್ಯಾನ್‌ಹೋಲ್ ಉಗಿ ನ್ಯೂಯಾರ್ಕ್‌ನ ಉಸಿರು. ಅದು ಏಳುವ ಸ್ಥಳವನ್ನು ಹುಡುಕಿ ಮತ್ತು ಅದು
      ಹೇಗೆ ಚಲಿಸುತ್ತದೆ, ಹರಡುತ್ತದೆ, ಬೆಳಕನ್ನು ಹಿಡಿಯುತ್ತದೆ ಎಂಬುದನ್ನು ನೋಡಿ. ಕೆಳಗೆ ಏನಿದೆ?
      ನಗರವು ಏನು ಹೊರಬಿಡುತ್ತದೆ?
    follow_ups:
      - ಗ್ರೇಟ್‌ನ ಕೆಳಗೆ ಏನನ್ನು ಕಾಣಬಹುದು?
      - ಹವಾಮಾನವು ಉಗಿಯನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
      - ಇಲ್ಲಿ ಯಾವ ಗುಪ್ತ ವ್ಯವಸ್ಥೆಗಳು ಗಾಳಿಯನ್ನು ಹೊರಬಿಡುತ್ತವೆ?
  - id: ny_storefront_typography
    name: ಅಂಗಡಿ ಮುಂಭಾಗದ ಟೈಪೊಗ್ರಫಿ
    prompt: |
      ಪಟ್ಟಿಗಳನ್ನು ಓದಿ. ಬೊಡೆಗಾಗಳು, ಡೆಲಿಗಳು, ಲಾಂಡ್ರೊಮ್ಯಾಟ್‌ಗಳು — ಪ್ರತಿಯೊಂದೂ ದೃಶ್ಯ ಭಾಷೆಯನ್ನು ಹೊಂದಿದೆ.
      ಒಂದು ಬ್ಲಾಕ್‌ನಿಂದ ಐದು ಟೈಪ್‌ಫೇಸ್‌ಗಳನ್ನು ಸಂಗ್ರಹಿಸಿ. ಇಲ್ಲಿ ವಾಸಿಸುವವರ ಬಗ್ಗೆ ಅವು ಏನು ಹೇಳುತ್ತವೆ?
    follow_ups:
      - ಯಾವ ಪಟ್ಟಿಗಳು ಹಳೆಯದಾಗಿವೆ? ಯಾವುದು ಹೊಸದು?
      - ಪಟ್ಟಿಗಳು ಮಾತನಾಡಲು ಸಾಧ್ಯವಾದರೆ ಬ್ಲಾಕ್ ಹೇಗಿರಬಹುದು?
      - ಟೈಪೊಗ್ರಫಿ ಬದಲಾವಣೆಯನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
  - id: ny_waterfront_edge
    name: ಜಲಸಂಧಿಯ ಅಂಚು
    prompt: |
      ನೀರಿಗೆ ಹೋಗಿ. ನಗರವು ತನ್ನ ಬೆನ್ನನ್ನು ನದಿಗೆ, ಬಂದರಿಗೆ, ಕೊಲ್ಲಿಗೆ ತಿರುಗಿಸುತ್ತದೆ.
      ಭೂಮಿ ನೀರನ್ನು ಭೇಟಿಯಾಗುವಲ್ಲಿ ನಿಲ್ಲುವಿರಿ. ವೀಕ್ಷಣೆಗಾಗಿ ಏನನ್ನು ನಿರ್ಮಿಸಲಾಗಿದೆ? ಅದನ್ನು
      ಉ A is neglecting is what?
    follow_ups:
      - ನೀರನ್ನು ಯಾರು ನೋಡಬಹುದು?
      - ಅಂಚನ್ನು ಹೇಗೆ ಹಕ್ಕು ಸ್ಥಾಪಿಸಲಾಗಿದೆ?
      - ನಗರವು ನೀರಿನ ಕಡೆಗೆ ಮುಖಮಾಡಿದ್ದರೆ ಹೇಗಿರಬಹುದು?
  - id: ny_parks_as_rooms
    name: ಉದ್ಯಾನವನಗಳು ಕೊಠಡಿಗಳಂತೆ
    prompt: |
      ಸೆಂಟ್ರಲ್ ಪಾರ್ಕ್, ಪ್ರಾಸ್ಪೆಕ್ಟ್ ಪಾರ್ಕ್, ಒಂದು ಪಾಕೆಟ್ ಪ್ಲಾಜಾ — ಪ್ರತಿಯೊಂದೂ ನಗರದಲ್ಲಿ
      ಒಂದು ಕೊಠಡಿ. ಒಂದನ್ನು ಪ್ರವೇಶಿಸಿ ಮತ್ತು ಅದರ ಗೋಡೆಗಳು, ಅದರ ಛಾವಣಿ, ಅದರ ಪೀಠೋಪಕರಣಗಳನ್ನು
      ಗಮನಿಸಿ. ಇಲ್ಲಿ ಪ್ರಕೃತಿಯನ್ನು ಹೇಗೆ ವಿನ್ಯಾಸಗೊಳಿಸಲಾಗಿದೆ?
    follow_ups:
      - ಕೊಠಡಿಯ ಉದ್ದೇಶವೇನು?
      - ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಯಾರು ವಿನ್ಯಾಸಗೊಳಿಸಿದರು?
      - ಗೋಡೆಗಳು ಕೆಡವಿದರೆ ಏನಾಗುತ್ತದೆ?
  - id: ny_delivery_rhythm
    name: ವಿತರಣೆಯ ಲಯ
    prompt: |
      ವಿತರಣೆಗಳನ್ನು ನೋಡಿ — ಟ್ರಕ್‌ಗಳು, ಕೈಗಾಡಿಗಳು, ಬೈಕ್‌ಗಳು. ಒಂದು ಪ್ಯಾಕೇಜ್‌ನ
      ದಾರಿಯನ್ನು ಟ್ರಕ್‌ನಿಂದ ಬಾಗಿಲಿಗೆ ಎಳೆಯಿರಿ. ವಾಣಿಜ್ಯವು ಬೀದಿಯಲ್ಲಿ ಹೇಗೆ ಚಲಿಸುತ್ತದೆ?
      ಆಗಮನದ ಲಯವೇನು?
    follow_ups:
      - ವಿತರಣೆಗಳಿಲ್ಲದಿದ್ದರೆ ಬ್ಲಾಕ್ ಹೇಗಿರಬಹುದು?
      - ಬೇರೆ ಬೇರೆ ವಸ್ತುಗಳು ಹೇಗೆ ವಿಭಿನ್ನವಾಗಿ ಚಲಿಸುತ್ತವೆ?
      - ಈ ಹರಿವಿನಲ್ಲಿ ಯಾರು ಅದೃಶ್ಯರಾಗಿದ್ದಾರೆ?
  - id: ny_brownstone_steps
    name: ಬ್ರೌನ್‌ಸ್ಟೋನ್ ಮೆಟ್ಟಿಲುಗಳು
    prompt: |
      ಬ್ರೌನ್‌ಸ್ಟೋನ್ ಮೆಟ್ಟಿಲುಗಳು ವೇದಿಕೆಗಳು. ಒಂದರ ಮೇಲೆ ಕುಳಿತು ಬೀದಿಯನ್ನು ನೋಡಿ. ಯಾರು
      ನಿಲ್ಲುತ್ತಾರೆ? ಯಾರು ಹಾದುಹೋಗುತ್ತಾರೆ? ಇಲ್ಲಿಂದ ಏನು ಹೇಳುತ್ತೀರಿ?
    follow_ups:
      - ಮೇಲಿನ ಮೆಟ್ಟಿಲಿನಿಂದ ದೃಶ್ಯ ಹೇಗಿದೆ?
      - ಮೆಟ್ಟಿಲುಗಳು ಪ್ರದೇಶವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತವೆ?
      - ಅವು ಇಲ್ಲದಿದ್ದರೆ ಬ್ಲಾಕ್ ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
  - id: ny_bridge_as_threshold
    name: ಸೇತುವೆಯು ಪ್ರವೇಶದ್ವಾರವಾಗಿ
    prompt: |
      ಸೇತುವೆಯನ್ನು ಕಾಲ್ನಡಿಗೆಯಲ್ಲಿ ದಾಟಿ. ಪರಿವರ್ತನೆಯನ್ನು ಅನುಭವಿಸಿ — ಒಂದು ಬರೋನಿಂದ ಮತ್ತೊಂದಕ್ಕೆ. ಸೇತುವೆಯು ಇಲ್ಲಿಯೂ ಇಲ್ಲ, ಅಲ್ಲಿಯೂ ಇಲ್ಲ. ಇನ್ನೊಂದು ಬದಿಯನ್ನು ತಲುಪಿದಾಗ ಏನು ಬದಲಾಗುತ್ತದೆ?
    follow_ups:
      - ನೀವು ಏನನ್ನು ಹಿಂದಿಡುತ್ತೀರಿ?
      - ಸೇತುವೆಯು ಪ್ರಯಾಣವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸೇತುವೆಗಳಿಲ್ಲದಿದ್ದರೆ ನಗರವು ಹೇಗಿರಬಹುದು?
  - id: ny_awning_shade
    name: ಛತ್ರಿಯ ನೆರಳು
    prompt: |
      ಛತ್ರಿಗಳು ಸೂಕ್ಷ್ಮ-ಹವಾಮಾನವನ್ನು ಸೃಷ್ಟಿಸುತ್ತವೆ. ಒಂದರ ಅಡಿಯಲ್ಲಿ ನಿಲ್ಲಿ. ಬೆಳಕು, ಶಬ್ದ,
      ತಾಪಮಾನದಲ್ಲಿನ ಬದಲಾವಣೆಯನ್ನು ಗಮನಿಸಿ. ಸಣ್ಣ ರಚನೆಗಳು ಬೀದಿಯನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತವೆ?
    follow_ups:
      - ಛತ್ರಿಗಳಿಲ್ಲದಿದ್ದರೆ ಬ್ಲಾಕ್ ಹೇಗಿರಬಹುದು?
      - ಅವು ಮಾಲೀಕತ್ವವನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತವೆ?
      - ಇಲ್ಲಿ ಯಾವ ಇತರ ಸಣ್ಣ ಆಶ್ರಯಗಳು ಅಸ್ತಿತ್ವದಲ್ಲಿವೆ?
  - id: ny_graffiti_layer
    name: ಗ್ರಾಫಿಟಿ ಪದರ
