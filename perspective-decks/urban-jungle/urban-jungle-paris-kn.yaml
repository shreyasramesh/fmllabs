cards:
  - id: paris_balcony_flower
    name: ಬಾಲ್ಕನಿ ಹೂವು
    prompt: |
      ಪ್ಯಾರಿಸ್ ಬಾಲ್ಕನಿಗಳು ಹೂವುಗಳಿಂದ ಅರಳುತ್ತವೆ-ಗೆರೇನಿಯಮ್, ಪೆಟೂನಿಯಾ. ಪ್ರತಿ ಬಾಲ್ಕನಿಯಲ್ಲಿ ಒಂದು ಮಡಕೆ ಇರುವ ಕಟ್ಟಡವನ್ನು ಹುಡುಕಿ. ಹೂವು ಮುಂಭಾಗವನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
    follow_ups:
      - ಹೂವುಗಳಿಲ್ಲದ ರಸ್ತೆ ಹೇಗಿರುತ್ತಿತ್ತು?
