      - ಹೂವು ಮತ್ತು ನಿವಾಸಿಗಳ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: paris_haussmann_line
    name: ಹೌಸ್‌ಮನ್ ರೇಖೆ
    prompt: |
      ಹೌಸ್‌ಮನ್ ಬೌಲೆವಾರ್ಡ್‌ಗಳು ಹಳೆಯ ಪ್ಯಾರಿಸ್ ಮೂಲಕ ಕತ್ತರಿಸುತ್ತವೆ. ಒಂದರ ಮೇಲೆ ನಡೆಯಿರಿ. ರೇಖೆಯು
      ಅವಿರತ-ಕಟ್ಟಡಗಳು ಜೋಡಿಸಲ್ಪಟ್ಟಿವೆ, ಎತ್ತರಗಳು ಏಕರೂಪವಾಗಿವೆ. ಬೌಲೆವಾರ್ಡ್ ಚಲನೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
