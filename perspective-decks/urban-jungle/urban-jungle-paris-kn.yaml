# ನಗರ ಕಾಡು — ಪ್ಯಾರಿಸ್ (Kannada)

id: urban_jungle_paris
name: ನಗರ ಕಾಡು — ಪ್ಯಾರಿಸ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ಪ್ಯಾರಿಸ್ ಅನ್ನು ನೋಡುವ ರೀತಿಯನ್ನು ಬದಲಾಯಿಸಲು—ಪ್ರಮಾಣ ಮತ್ತು ಬೆಳಕಿನಿಂದ ಹಿಡಿದು ಇತಿಹಾಸದ ಪದರಗಳು ಮತ್ತು ಬೀದಿ ಜೀವನದ ಲಯಗಳವರೆಗೆ.
