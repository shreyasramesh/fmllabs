    follow_ups:
      - Como o ponto cria ordem?
      - Qual a relação entre o táxi e o conhecimento?
      - O que você perguntaria a um taxista?
  - id: london_pub_window
    name: Janela de Pub
    prompt: |
      As janelas de pub são frequentemente com chumbo, frequentemente pequenas. Olhe através de uma. Qual a
      vista? A janela emoldura a rua. Como a moldura importa?
    follow_ups:
      - O que seria do pub sem a janela?
      - Como a janela cria relacionamento?
      - Qual a relação entre a janela e a rua?
  - id: london_mews_cobble
    name: Paralelepípedo de Mews
    prompt: |
      Vielas de Mews são frequentemente pavimentadas com paralelepípedos. Caminhe por uma. Sinta a textura.
