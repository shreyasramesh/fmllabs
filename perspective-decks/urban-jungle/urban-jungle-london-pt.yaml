    follow_ups:
      - Como a chuva molda o humor?
      - Qual a relação entre a chuva e o guarda-chuva?
      - O que você notaria na seca?
  - id: london_cab_rank
    name: Ponto de Táxi
    prompt: |
      Táxis pretos fazem fila em pontos. Observe o fluxo. O ponto é um nó. Como o
