    follow_ups:
      - O que seria da estação sem a escada rolante?
      - Como a escada rolante cria fluxo?
      - Qual a relação entre a escada rolante e a profundidade?
  - id: london_thames_path
    name: Caminho do Tâmisa
    prompt: |
      O Caminho do Tâmisa corre ao longo do rio. Caminhe por um trecho. O caminho cria um
