      আর্ট নুভেউ মেট্রো প্রবেশদ্বারগুলি প্রতীক। একটি খুঁজুন। লোহার কাজ, লেখা—প্রবেশদ্বারটি একটি পোর্টাল। এটি কী প্রতিশ্রুতি দেয়?
    follow_ups:
      - প্রবেশদ্বার ছাড়া রাস্তাটি কেমন হবে?
      - প্রবেশদ্বার কীভাবে পরিচয় তৈরি করে?
      - প্রবেশদ্বার এবং ভূগর্ভস্থ পথের মধ্যে সম্পর্ক কী?
  - id: paris_shutter
    name: প্যারিস শাটার
