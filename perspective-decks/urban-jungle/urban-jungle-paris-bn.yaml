# আরবান জাঙ্গল — প্যারিস (Bengali)

id: urban_jungle_paris
name: আরবান জাঙ্গল — প্যারিস
description: প্যারিসকে দেখার জন্য ৫০টি কার্ড — স্কেল এবং আলো থেকে শুরু করে ইতিহাসের স্তর এবং রাস্তার জীবনের ছন্দ পর্যন্ত।
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: বারান্দার ফুল
    prompt: |
      প্যারিসের বারান্দা ফুলে ভরে থাকে—জেরানিয়াম, পিটুনিয়া। এমন একটি ভবন খুঁজুন যেখানে প্রতিটি বারান্দায় একটি টব আছে। ফুলটি কি সম্মুখভাগকে পরিবর্তন করে?
    follow_ups:
      - ফুল ছাড়া রাস্তাটি কেমন হবে?
      - ফুল কীভাবে পরিচয় তৈরি করে?
      - ফুল এবং বাসিন্দার মধ্যে সম্পর্ক কী?
  - id: paris_haussmann_line
    name: হাউসমানের রেখা
    prompt: |
      হাউসমান বুলেভার্ডগুলি পুরনো প্যারিসের ভেতর দিয়ে গেছে। একটি ধরে হাঁটুন। রেখাটি
      অবিচল—ভবনগুলি সারিবদ্ধ, উচ্চতা অভিন্ন। বুলেভার্ডটি কীভাবে চলাচলকে রূপ দেয়?
    follow_ups:
      - হাউসমানের প্যারিস ছাড়া প্যারিস কেমন হত?
      - বুলেভার্ড কীভাবে দৃশ্য তৈরি করে?
      - রেখা এবং শক্তির মধ্যে সম্পর্ক কী?
  - id: paris_cafe_terrace
    name: ক্যাফে টেরেস
    prompt: |
      প্যারিসের ক্যাফে টেরেস রাস্তার দিকে মুখ করে থাকে। একটিতে বসুন। আপনি একই সাথে ভিতরে এবং বাইরে। টেরেসটি একটি প্রবেশদ্বার। আপনি কী দেখেন?
    follow_ups:
      - টেরেস ছাড়া রাস্তাটি কেমন হবে?
      - টেরেস কীভাবে সাক্ষাৎ তৈরি করে?
      - টেরেস এবং রাস্তার মধ্যে সম্পর্ক কী?
  - id: paris_metro_entrance
    name: মেট্রো প্রবেশদ্বার
