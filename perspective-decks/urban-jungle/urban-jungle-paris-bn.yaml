    follow_ups:
      - শাটার ছাড়া সম্মুখভাগ কেমন হবে?
      - শাটার কীভাবে গোপনীয়তা তৈরি করে?
      - শাটার এবং আলোর মধ্যে সম্পর্ক কী?
  - id: paris_cobble
    name: প্যারিস কোবল
    prompt: |
