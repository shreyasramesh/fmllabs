    follow_ups:
      - কোবল ছাড়া রাস্তাটি কেমন হবে?
      - কোবল কীভাবে ইতিহাস চিহ্নিত করে?
      - কোবল এবং বিপ্লবের মধ্যে সম্পর্ক কী?
  - id: paris_seine_edge
