# अर्बन जंगल — बेंगलुरु (Hindi)

id: urban_jungle_bangalore
name: अर्बन जंगल — बेंगलुरु
description: |
  बेंगलुरु को देखने के तरीके को बदलने के लिए 50 कार्ड — पैमाने और प्रकाश से लेकर
  इतिहास की परतों और सड़क जीवन की लय तक।
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: गेट कॉलोनी
    prompt: |
      बेंगलुरु की गेट वाली कॉलोनियों में दीवारें, गार्ड, गेट होते हैं। एक गेट पर खड़े हों।
      अंदर क्या है? कौन प्रवेश करता है? गेट एक सीमा को चिह्नित करता है। यह क्या सुरक्षित करता है?
    follow_ups:
      - गेट के बिना सड़क कैसी होगी?
      - गेट सुरक्षा कैसे पैदा करता है?
      - गेट और कॉलोनी के बीच क्या संबंध है?
  - id: blr_tree_canopy
    name: वृक्ष छत्र
    prompt: |
      बेंगलुरु कभी एक उद्यान शहर था। पुरानी पेड़ वाली गलियाँ अभी भी कुछ सड़कों पर छाई हुई हैं।
      किसी एक के नीचे चलें। छत्र प्रकाश को कैसे बदलता है? ध्वनि को?
    follow_ups:
      - पेड़ के बिना सड़क कैसी होगी?
      - छत्र सूक्ष्म-जलवायु कैसे बनाता है?
      - पेड़ और शहर के बीच क्या संबंध है?
  - id: blr_tech_park
    name: टेक पार्क
    prompt: |
      टेक पार्क कैंपस होते हैं — कांच, लॉन, शटल बसें। एक ढूंढें। पार्क शहर से कैसे अलग होता है? अंदर और बाहर के बीच क्या संबंध है?
    follow_ups:
      - पार्क के बिना वह क्षेत्र कैसा होगा?
      - पार्क पहचान कैसे पैदा करता है?
      - पार्क और सड़क के बीच क्या संबंध है?
  - id: blr_auto_rickshaw
    name: ऑटो रिक्शा
    prompt: |
      ऑटो रिक्शा यातायात में घूमते हैं। एक जंक्शन को पार करते हुए देखें। ऑटो वहाँ कैसे फिट होता है जहाँ कारें नहीं कर सकतीं?
      बुनाई का तर्क क्या है?
    follow_ups:
      - ऑटो के बिना सड़क कैसी होगी?
      - ऑटो गतिशीलता कैसे पैदा करता है?
      - ऑटो और यातायात के बीच क्या संबंध है?
  - id: blr_chai_stall
    name: चाय की दुकान
    prompt: |
      चाय की दुकानें नोड्स हैं — छोटी, अस्थायी, आवश्यक। एक ढूंढें। कौन इकट्ठा होता है?
      लय क्या है? दुकान एक सामाजिक मशीन है।
    follow_ups:
      - दुकान के बिना कोना कैसा होगा?
      - दुकान मुलाकात कैसे पैदा करती है?
      - दुकान और सड़क के बीच क्या संबंध है?
  - id: blr_billboard
    name: बेंगलुरु होर्डिंग
    prompt: |
      बेंगलुरु के होर्डिंग टेक, रियल एस्टेट, शिक्षा का विज्ञापन करते हैं। एक ढूंढें।
      क्या बेचा जा रहा है? दर्शक कौन है? होर्डिंग आकांक्षा का दर्पण है।
    follow_ups:
      - होर्डिंग के बिना सड़क कैसी होगी?
      - होर्डिंग इच्छा को कैसे आकार देता है?
      - होर्डिंग और शहर के बीच क्या संबंध है?
  - id: blr_compound_wall
    name: कंपाउंड की दीवार
    prompt: |
      कंपाउंड की दीवारें निजी को सार्वजनिक से अलग करती हैं। एक दीवार ढूंढें। उसके पीछे क्या है?
      यह कितनी ऊंची है? दीवार एक सीमा बनाती है। यह क्या बाहर करती है?
    follow_ups:
      - दीवार के बिना सड़क कैसी होगी?
      - दीवार गोपनीयता कैसे पैदा करती है?
      - दीवार और कंपाउंड के बीच क्या संबंध है?
  - id: blr_signal_wait
    name: सिग्नल का इंतज़ार
    prompt: |
      एक ट्रैफिक सिग्नल पर रुकें। विक्रेताओं को देखें — फूल, खिलौने, किताबें।
      सिग्नल एक ठहराव पैदा करता है। ठहराव में क्या होता है?
    follow_ups:
      - सिग्नल के बिना जंक्शन कैसा होगा?
      - सिग्नल अर्थव्यवस्था कैसे पैदा करता है?
      - सिग्नल और सड़क के बीच क्या संबंध है?
  - id: blr_rain_drain
    name: वर्षा नाली
    prompt: |
      बेंगलुरु की मानसून नालियों को ओवरलोड कर देती है। बारिश के बाद, पानी को देखें। यह कहाँ जाता है? यह कहाँ जमा होता है?
      नाली एक सीमा है।
    follow_ups:
      - नाली के बिना सड़क कैसी होगी?
      - नाली पानी का प्रबंधन कैसे करती है?
      - नाली और मानसून के बीच क्या संबंध है?
  - id: blr_sarjapur_road
    name: सरजापुर रोड
    prompt: |
      सरजापुर रोड पुराने बेंगलुरु को टेक कॉरिडोर से जोड़ती है। एक हिस्से पर ड्राइव करें या चलें।
      क्या बदलता है? शहर कहाँ बदलता है?
    follow_ups:
      - सड़क के बिना कॉरिडोर कैसा होगा?
      - सड़क कनेक्शन कैसे पैदा करती है?
      - सड़क और विकास के बीच क्या संबंध है?
  - id: blr_parks_maidans
    name: पार्क और मैदान
    prompt: |
      बेंगलुरु में पार्क और मैदान हैं — क्यूबॉन पार्क, लाल बाग, पड़ोस के मैदान।
      एक में प्रवेश करें। कौन उपयोग करता है? लय क्या है?
    follow_ups:
      - पार्क के बिना शहर कैसा होगा?
      - पार्क राहत कैसे पैदा करता है?
      - पार्क और पड़ोस के बीच क्या संबंध है?
  - id: blr_temple_street
    name: मंदिर वाली सड़क
    prompt: |
      मंदिर बेंगलुरु की सड़कों पर दिखाई देते हैं। एक ढूंढें। प्रसाद, घंटियों, भीड़ पर ध्यान दें।
      मंदिर ब्लॉक को कैसे आकार देता है?
    follow_ups:
      - मंदिर के बिना सड़क कैसी होगी?
      - मंदिर समुदाय कैसे पैदा करता है?
      - मंदिर और सड़क के बीच क्या संबंध है?
  - id: blr_silk_board
    name: सिल्क बोर्ड
    prompt: |
      सिल्क बोर्ड जंक्शन कुख्यात है। किनारे पर खड़े हों। यातायात देखें।
      जंक्शन कैसे काम करता है? अराजकता का तर्क क्या है?
    follow_ups:
      - जंक्शन के बिना कॉरिडोर कैसा होगा?
      - जंक्शन बाधा कैसे पैदा करता है?
      - जंक्शन और आवागमन के बीच क्या संबंध है?
  - id: blr_metro_elevated
    name: मेट्रो एलिवेटेड
    prompt: |
      बेंगलुरु मेट्रो शहर के कुछ हिस्सों में एलिवेटेड चलती है। इसे सवारी करें या इसके नीचे खड़े हों।
      एलिवेटेड लाइन नीचे की सड़क को कैसे बदलती है?
    follow_ups:
      - मेट्रो के बिना सड़क कैसी होगी?
      - मेट्रो कनेक्शन कैसे पैदा करती है?
      - एलिवेटेड और जमीन के बीच क्या संबंध है?
  - id: blr_apartment_tower
    name: अपार्टमेंट टावर
    prompt: |
      अपार्टमेंट टावर बेंगलुरु में फैले हुए हैं। एक ढूंढें। कितने मंज़िल? कौन रहता है?
      टावर वर्टिकल डेंसिटी है। यह क्या बदलता है?
    follow_ups:
      - टावर के बिना क्षितिज कैसा होगा?
      - टावर आवास कैसे पैदा करता है?
      - टावर और जमीन के बीच क्या संबंध है?
  - id: blr_roadside_vendor
    name: सड़क किनारे विक्रेता
    prompt: |
      सड़क किनारे विक्रेता फल, स्नैक्स, फोन चार्जर बेचते हैं। एक ढूंढें। प्रदर्शन क्या है?
      कौन रुकता है? विक्रेता अनौपचारिक अर्थव्यवस्था है।
    follow_ups:
      - विक्रेता के बिना सड़क कैसी होगी?
      - विक्रेता आजीविका कैसे पैदा करता है?
      - विक्रेता और सड़क के बीच क्या संबंध है?
  - id: blr_borewell
    name: बोरवेल
    prompt: |
      बेंगलुरु बोरवेल पर निर्भर करता है। पाइप, टैंक, पंप देखें।
      पानी नीचे से निकाला जाता है। शहर और एक्वीफर के बीच क्या संबंध है?
    follow_ups:
      - बोरवेल के बिना इमारत कैसी होगी?
      - बोरवेल आपूर्ति कैसे पैदा करता है?
      - बोरवेल और कमी के बीच क्या संबंध है?
  - id: blr_garbage_heap
    name: कचरे का ढेर
    prompt: |
      कचरे के ढेर कोनों पर, दीवारों के पास दिखाई देते हैं। एक पर ध्यान दें। इसमें क्या है?
      कौन चुनता है? ढेर सिस्टम की एक सीमा है।
    follow_ups:
      - ढेर के बिना सड़क कैसी होगी?
      - ढेर विफलता को कैसे चिह्नित करता है?
      - ढेर और शहर के बीच क्या संबंध है?
  - id: blr_marquee_wedding
    name: मैरिज मैरिज
    prompt: |
      शादी के मंडप सड़कों को अवरुद्ध करते हैं। एक ढूंढें। मंडप एक अस्थायी क्षेत्र है।
      उत्सव और सड़क के बीच क्या संबंध है?
    follow_ups:
      - मंडप के बिना सड़क कैसी होगी?
      - मंडप दावा कैसे पैदा करता है?
      - शादी और जनता के बीच क्या संबंध है?
  - id: blr_old_bungalow
    name: पुराना बंगला
    prompt: |
      पुराने बेंगलुरु के बंगले टावरों के बीच बने रहते हैं। एक ढूंढें। बंगले में एक कंपाउंड, पेड़, जगह है।
      इसे क्या बदलेगा?
    follow_ups:
      - बंगले के बिना सड़क कैसी होगी?
      - बंगला इतिहास को कैसे चिह्नित करता है?
      - बंगला और टावर के बीच क्या संबंध है?
  - id: blr_coffee_house
    name: कॉफी हाउस
    prompt: |
      इंडियन कॉफी हाउस एक संस्था है। एक में बैठें। कॉफी हाउस बातचीत का कमरा है।
      लय क्या है? कौन आता है?
    follow_ups:
      - कॉफी हाउस के बिना सड़क कैसी होगी?
      - कॉफी हाउस समुदाय कैसे पैदा करता है?
      - कॉफी हाउस और शहर के बीच क्या संबंध है?
  - id: blr_phone_booth
    name: फोन बूथ
    prompt: |
      सार्वजनिक फोन बूथ अभी भी मौजूद हैं। एक ढूंढें। क्या यह काम कर रहा है? कौन इसका उपयोग करता है?
      बूथ एक अवशेष है। इसे क्या बदल दिया है?
    follow_ups:
      - बूथ के बिना सड़क कैसी होगी?
      - बूथ परिवर्तन को कैसे चिह्नित करता है?
      - बूथ और मोबाइल के बीच क्या संबंध है?
  - id: blr_bus_stop
    name: बेंगलुरु बस स्टॉप
    prompt: |
      बेंगलुरु बस स्टॉप अक्सर एक पोल और भीड़ होते हैं। एक पर प्रतीक्षा करें। कौन प्रतीक्षा करता है?
      शिष्टाचार क्या है? स्टॉप न्यूनतम अवसंरचना है।
    follow_ups:
      - स्टॉप के बिना सड़क कैसी होगी?
      - स्टॉप कनेक्शन कैसे पैदा करता है?
      - स्टॉप और बस के बीच क्या संबंध है?
  - id: blr_power_line
    name: पावर लाइन
    prompt: |
      बेंगलुरु पावर लाइनें एक उलझन हैं — केबल, ट्रांसफार्मर, लूप। एक लाइन का पता लगाएं। यह कहाँ जाती है?
      ग्रिड दिखाई दे रहा है। यह क्या संचालित करता है?
    follow_ups:
      - लाइनों के बिना सड़क कैसी होगी?
      - ग्रिड आपूर्ति कैसे पैदा करता है?
      - लाइन और आउटेज के बीच क्या संबंध है?
  - id: blr_speed_breaker
    name: स्पीड ब्रेकर
    prompt: |
      स्पीड ब्रेकर — स्लीपिंग पुलिसमैन — बेंगलुरु की सड़कों पर दिखाई देते हैं। एक महसूस करें। यह यहाँ क्यों है?
      यह क्या धीमा करता है? ब्रेकर एक स्थानीय हस्तक्षेप है।
    follow_ups:
      - ब्रेकर के बिना सड़क कैसी होगी?
      - ब्रेकर सुरक्षा कैसे पैदा करता है?
      - ब्रेकर और गति के बीच क्या संबंध है?
  - id: blr_compound_tree
    name: कंपाउंड का पेड़
    prompt: |
      कंपाउंड के पेड़ दीवारों पर छाए रहते हैं। एक ढूंढें। पेड़ अंदर और बाहर दोनों है।
      यह क्या छाया देता है? इसका मालिक कौन है?
    follow_ups:
      - पेड़ के बिना सड़क कैसी होगी?
      - पेड़ उपहार कैसे पैदा करता है?
      - पेड़ और कंपाउंड के बीच क्या संबंध है?
  - id: blr_shop_shutter
    name: दुकान का शटर
    prompt: |
      बेंगलुरु की दुकानों के शटर रात में नीचे हो जाते हैं। एक बंद शटर ढूंढें। उसके पीछे क्या है?
      शटर एक दैनिक चक्र है। यह क्या सुरक्षित करता है?
    follow_ups:
      - शटर के बिना सड़क कैसी होगी?
      - शटर सुरक्षा कैसे पैदा करता है?
      - शटर और वाणिज्य के बीच क्या संबंध है?
  - id: blr_water_tanker
    name: पानी का टैंकर
