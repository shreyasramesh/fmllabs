    follow_ups:
      - Ce ar fi strada fără oblon?
      - Cum creează oblonul securitate?
      - Care este relația dintre oblon și comerț?
  - id: blr_water_tanker
    name: Autobasculantă Apă
    prompt: |
      Autobasculantele de apă aprovizionează cartierele. Privește una livrând. Autobasculanta este
