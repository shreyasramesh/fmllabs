# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Jungla Urbană — Bangalore (Romanian)

id: urban_jungle_bangalore
name: Jungla Urbană — Bangalore
description: 50 de cărți pentru a-ți schimba percepția despre Bangalore — de la scară și lumină, la straturi de istorie și ritmurile vieții de stradă.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: Cartier Împrejmuit
    prompt: |
      Cartierele împrejmuite din Bangalore au ziduri, paznici, porți. Stai la o poartă.
      Ce este înăuntru? Cine intră? Poarta marchează o graniță. Ce protejează ea?
    follow_ups:
      - Ce ar fi strada fără poartă?
      - Cum creează poarta securitate?
      - Care este relația dintre poartă și cartier?
  - id: blr_tree_canopy
    name: Coroana Arborilor
    prompt: |
      Bangalore a fost odată un oraș-grădină. Copaci bătrâni încă umbresc unele străzi.
      Mergi sub unul. Cum schimbă coroana lumina? Sunetul?
    follow_ups:
      - Ce ar fi strada fără copac?
      - Cum creează coroana un microclimat?
      - Care este relația dintre copac și oraș?
  - id: blr_tech_park
    name: Parc Tehnologic
    prompt: |
      Parcurile tehnologice sunt campusuri — sticlă, gazon, autobuze navetă. Găsește unul. Cum se
      separă parcul de oraș? Care este relația dintre interior și exterior?
    follow_ups:
      - Ce ar fi zona fără parc?
      - Cum creează parcul identitate?
      - Care este relația dintre parc și stradă?
  - id: blr_auto_rickshaw
    name: Auto-ricșă
    prompt: |
      Auto-ricșele se strecoară prin trafic. Privește una cum negociază o intersecție. Cum se

      potrivește auto-ricșa unde mașinile nu pot? Care este logica strecurării?
    follow_ups:
      - Ce ar fi strada fără auto-ricșă?
      - Cum creează auto-ricșa mobilitate?
      - Care este relația dintre auto-ricșă și trafic?
  - id: blr_chai_stall
    name: Tarabă cu Chai
    prompt: |
      Tarabele cu chai sunt noduri — mici, temporare, esențiale. Găsește una. Cine se adună?
      Care este ritmul? Taraba este o mașinărie socială.
    follow_ups:
      - Ce ar fi colțul străzii fără tarabă?
      - Cum creează taraba întâlniri?
      - Care este relația dintre tarabă și stradă?
  - id: blr_billboard
    name: Panou Publicitar Bangalore
    prompt: |
      Panourile publicitare din Bangalore promovează tehnologie, imobiliare, educație. Găsește unul.
      Ce se vinde? Cine este publicul? Panoul publicitar este o oglindă a aspirațiilor.
    follow_ups:
      - Ce ar fi strada fără panou publicitar?
      - Cum modelează panoul publicitar dorința?
      - Care este relația dintre panou publicitar și oraș?
  - id: blr_compound_wall
    name: Zid de Incintă
    prompt: |
      Zidurile de incintă separă spațiul privat de cel public. Găsește un zid. Ce este în spatele
      lui? Cât de înalt este? Zidul creează o graniță. Ce exclude?
    follow_ups:
      - Ce ar fi strada fără zid?
      - Cum creează zidul intimitate?
      - Care este relația dintre zid și incintă?
  - id: blr_signal_wait
    name: Așteptare la Semafor
    prompt: |
      Așteaptă la un semafor. Privește vânzătorii — flori, jucării, cărți. Semaforul creează o pauză.
      Ce se întâmplă în pauză?
    follow_ups:
      - Ce ar fi intersecția fără semafor?
      - Cum creează semaforul economie?
      - Care este relația dintre semafor și stradă?
  - id: blr_rain_drain
    name: Canal de Ploaie
    prompt: |
      Monsonul din Bangalore copleșește canalele. După ploaie, privește apa. Unde se duce? Unde se
      adună? Canalul este o limită.
    follow_ups:
      - Ce ar fi strada fără canal?
      - Cum gestionează canalul apa?
      - Care este relația dintre canal și monsun?
  - id: blr_sarjapur_road
    name: Drumul Sarjapur
    prompt: |
      Drumul Sarjapur leagă vechiul Bangalore de coridorul tehnologic. Condu sau mergi pe o porțiune.
      Ce se schimbă? Unde se transformă orașul?
    follow_ups:
      - Ce ar fi coridorul fără drum?
      - Cum creează drumul conexiune?
      - Care este relația dintre drum și creștere?
  - id: blr_parks_maidans
    name: Parcuri și Esplanade
    prompt: |
      Bangalore are parcuri și esplanade — Parcul Cubbon, Lalbagh, terenuri de cartier. Intră într-unul.
      Cine îl folosește? Care este ritmul?
    follow_ups:
      - Ce ar fi orașul fără parc?
      - Cum creează parcul respiro?
      - Care este relația dintre parc și cartier?
  - id: blr_temple_street
    name: Stradă cu Temple
    prompt: |
      Templele punctează străzile din Bangalore. Găsește unul. Observă ofrandele, clopotele, mulțimea.
      Cum influențează templul blocul?
    follow_ups:
      - Ce ar fi strada fără templu?
      - Cum creează templul comunitate?
      - Care este relația dintre templu și stradă?
  - id: blr_silk_board
    name: Intersecția Silk Board
    prompt: |
      Intersecția Silk Board este infamă. Stai la margine. Privește traficul. Cum funcționează
      intersecția? Care este logica haosului?
    follow_ups:
      - Ce ar fi coridorul fără intersecție?
      - Cum creează intersecția blocaj?
      - Care este relația dintre intersecție și navetă?
  - id: blr_metro_elevated
    name: Metrou Suspendat
    prompt: |
      Metroul din Bangalore circulă suspendat prin anumite zone ale orașului. Călătorește cu el sau
      stai sub el. Cum schimbă linia suspendată strada de dedesubt?
    follow_ups:
      - Ce ar fi strada fără metrou?
      - Cum creează metroul conexiune?
      - Care este relația dintre suspendat și sol?
  - id: blr_apartment_tower
    name: Turn de Apartamente
    prompt: |
      Turnuri de apartamente se înalță în tot Bangalore. Găsește unul. Câte etaje are? Cine locuiește
      acolo? Turnul este densitate verticală. Ce înlocuiește?
    follow_ups:
      - Ce ar fi orizontul orașului fără turn?
      - Cum creează turnul locuințe?
      - Care este relația dintre turn și sol?
  - id: blr_roadside_vendor
    name: Vânzător Ambulant
    prompt: |
      Vânzătorii ambulanți vând fructe, gustări, încărcătoare de telefon. Găsește unul. Cum este
      expus? Cine se oprește? Vânzătorul este economie informală.
    follow_ups:
      - Ce ar fi strada fără vânzător?
      - Cum creează vânzătorul mijloace de trai?
      - Care este relația dintre vânzător și stradă?
  - id: blr_borewell
    name: Fântână Arteesiană
    prompt: |
      Bangalore depinde de fântâni arteziene. Caută țevile, rezervoarele, pompele.
      Apa este extrasă de jos. Care este relația dintre oraș și acvifer?
    follow_ups:
      - Ce ar fi clădirea fără fântâna arteziană?
      - Cum creează fântâna arteziană aprovizionare?
      - Care este relația dintre fântână arteziană și penurie?
  - id: blr_garbage_heap
    name: Grămadă de Gunoi
    prompt: |
      Grămezi de gunoi apar la colțuri, lângă ziduri. Observă una. Ce este în ea? Cine caută prin ea?
      Grămada este o limită a sistemului.
    follow_ups:
      - Ce ar fi strada fără grămadă de gunoi?
      - Cum marchează grămada de gunoi eșecul?
      - Care este relația dintre grămada de gunoi și oraș?
  - id: blr_marquee_wedding
    name: Cort Nupțial
    prompt: |
      Corturile nupțiale blochează străzile. Găsește unul. Cortul este un teritoriu temporar. Care este
      relația dintre celebrare și stradă?
    follow_ups:
      - Ce ar fi strada fără cortul nupțial?
      - Cum creează cortul nupțial revendicare?
      - Care este relația dintre nuntă și spațiul public?
  - id: blr_old_bungalow
    name: Bungalou Vechi
    prompt: |
      Bungalourile vechi din Bangalore persistă printre turnuri. Găsește unul. Bungaloul are o incintă,
      copaci, spațiu. Ce îl va înlocui?
    follow_ups:
      - Ce ar fi strada fără bungalou?
      - Cum marchează bungaloul istoria?
      - Care este relația dintre bungalou și turn?
  - id: blr_coffee_house
    name: Cafenea
    prompt: |
      Indian Coffee House este o instituție. Stai într-una. Cafeneaua este o cameră de conversație.
      Care este ritmul? Cine vine?
    follow_ups:
      - Ce ar fi strada fără cafenea?
      - Cum creează cafeneaua comunitate?
      - Care este relația dintre cafenea și oraș?
  - id: blr_phone_booth
    name: cabină telefonică
    prompt: |
      Cabinetele telefonice publice încă există. Găsește una. Funcționează? Cine o folosește?
      Cabina este o relicvă. Ce a înlocuit-o?
    follow_ups:
      - Ce ar fi strada fără cabină?
      - Cum marchează cabina schimbarea?
      - Care este relația dintre cabină și mobil?
  - id: blr_bus_stop
    name: Stație de Autobuz Bangalore
    prompt: |
      Stațiile de autobuz din Bangalore sunt adesea un stâlp și o mulțime. Așteaptă la una. Cine
