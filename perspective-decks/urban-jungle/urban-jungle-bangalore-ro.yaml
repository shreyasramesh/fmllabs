    follow_ups:
      - Ce ar fi cartierul fără poartă?
      - Cum creează poarta securitate?
      - Care este relația dintre poartă și încredere?
  - id: blr_street_dog
    name: Câine de Stradă
    prompt: |
      Câinii de stradă fac parte din Bangalore. Observă unul. Unde doarme? Ce
