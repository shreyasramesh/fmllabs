      - Ce ar fi intersecția fără panou publicitar?
      - Cum modelează panoul publicitar dorința?
      - Care este relația dintre panou publicitar și oraș?
  - id: blr_rain_tree
    name: Arbore de Ploaie
    prompt: |
      Arborii de ploaie — Samanea saman — umbresc unele străzi din Bangalore. Găsește unul.
      Arborele este o moștenire. Cum influențează blocul?
    follow_ups:
      - Ce ar fi strada fără arborele de ploaie?
      - Cum creează arborele microclimat?
      - Care este relația dintre arbore și oraș-grădină?
