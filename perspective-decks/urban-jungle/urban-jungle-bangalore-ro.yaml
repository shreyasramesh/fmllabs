    follow_ups:
      - Ce ar fi strada fără linii?
      - Cum creează rețeaua aprovizionare?
      - Care este relația dintre linie și pană de curent?
  - id: blr_speed_breaker
    name: Limitator de Viteză
    prompt: |
      Limitatoare de viteză — polițiști adormiți — punctează drumurile din Bangalore. Simte unul. De ce este
