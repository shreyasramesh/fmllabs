    follow_ups:
      - Ce ar fi cartierul fără autobasculantă?
      - Cum creează autobasculanta aprovizionare?
      - Care este relația dintre autobasculantă și penurie?
  - id: blr_metro_station
    name: Stație de Metrou
    prompt: |
      Stațiile de metrou din Bangalore sunt noi — curate, branduite. Intră într-una. Cum diferă
