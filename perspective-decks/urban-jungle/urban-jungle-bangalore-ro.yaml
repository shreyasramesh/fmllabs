      - Ce ar fi drumul fără limitator?
      - Cum creează limitatorul siguranță?
      - Care este relația dintre limitator și viteză?
  - id: blr_compound_tree
    name: Copac din Incintă
    prompt: |
      Copacii din incinte depășesc zidurile. Găsește unul. Copacul este atât înăuntru, cât și în afara.
