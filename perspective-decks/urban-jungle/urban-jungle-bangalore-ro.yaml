      - Ce ar fi strada fără stație?
      - Cum creează stația conexiune?
      - Care este relația dintre stație și autobuz?
  - id: blr_power_line
    name: Linie Electrică
    prompt: |
      Liniile electrice din Bangalore sunt un amestec — cabluri, transformatoare, bucle. Urmărește
