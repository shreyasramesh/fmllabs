    follow_ups:
      - Ce ar fi coridorul fără stație?
      - Cum creează stația conexiune?
      - Care este relația dintre stație și oraș?
  - id: blr_rickshaw_stand
    name: Stație de Ricșe
    prompt: |
      Stațiile de ricșe se adună la intersecții. Găsește una. Șoferii așteaptă.
