# நகர்ப்புறக் காடு — சான் பிரான்சிஸ்கோ (Tamil)

id: urban_jungle_san_francisco
name: நகர்ப்புறக் காடு — சான் பிரான்சிஸ்கோ
description: சான் பிரான்சிஸ்கோவை நீங்கள் பார்க்கும் விதத்தை மாற்றியமைக்க 50 அட்டைகள் — அதன் அளவு மற்றும் ஒளி முதல் வரலாறு மற்றும் தெரு வாழ்க்கையின் தாளங்கள் வரை.
domain: urban_jungle
cards:
  - id: sf_hill_grade
    name: மலைச் சரிவு
    prompt: |
      சான் பிரான்சிஸ்கோ சாய்வுகளில் கட்டப்பட்டுள்ளது. உங்கள் காலடியில் சரிவை உணருங்கள்.
      இந்தச் சரிவு நீங்கள் கவனிக்கும் விஷயங்களை எவ்வாறு மாற்றுகிறது? நகரம் எங்கே சாய்கிறது?
    follow_ups:
      - தெரு தட்டையாக இருந்தால் எப்படி இருக்கும்?
      - மலைகள் அக்கம்பக்கங்களை எவ்வாறு வடிவமைக்கின்றன?
      - நீங்கள் ஏறிய மிகக் கடுமையான தொகுதி எது?
  - id: sf_fog_layer
    name: பனி மூட்டம்
    prompt: |
      பனி மூட்டம் வருகிறது. அது நகர்வதைக் கவனியுங்கள் — பாலத்தின் மீது, மலைகளில்.
      பனி மூட்டம் ஒரு கதாபாத்திரமாகும். அது ஒளியை எவ்வாறு மாற்றுகிறது? ஒலியை?
    follow_ups:
      - பனி மூட்டம் இல்லாவிட்டால் நகரம் எப்படி இருக்கும்?
      - பனி மூட்டம் நேரத்தை எவ்வாறு குறிக்கிறது?
      - பனி மூட்டம் எங்கே நிற்கிறது?
  - id: sf_cable_car_track
    name: கேபிள் கார் பாதை
    prompt: |
      ஒரு கேபிள் கார் பாதையைப் பின்தொடருங்கள். நடைபாதையில் உள்ள பள்ளம், கேபிளின் சத்தம்.
      கேபிள் கார் வேலை செய்யும் ஒரு பழங்காலப் பொருளாகும். அது எதைக் கொண்டு செல்கிறது?
    follow_ups:
      - பாதை இல்லாவிட்டால் மலை எப்படி இருக்கும்?
      - கேபிள் கார் சுற்றுலாவை எவ்வாறு வடிவமைக்கிறது?
      - பாதைக்கும் தெருவுக்கும் இடையிலான தொடர்பு என்ன?
  - id: sf_victorian_detail
    name: விக்டோரியன் நுணுக்கம்
    prompt: |
      சான் பிரான்சிஸ்கோ விக்டோரியன் வீடுகள் அலங்காரமானவை — இனிப்பு ரொட்டி, விரிகுடா ஜன்னல்கள், நிறம்.
      ஒன்றைக் கண்டுபிடித்து அதன் நுணுக்கங்களைப் படியுங்கள். அலங்காரம் என்ன கதையைச் சொல்கிறது?
    follow_ups:
      - நுணுக்கங்கள் இல்லாவிட்டால் வீடு எப்படி இருக்கும்?
      - நிறம் தெருவை எவ்வாறு மாற்றுகிறது?
      - விக்டோரியனுக்கும் நவீனத்திற்கும் இடையிலான தொடர்பு என்ன?
  - id: sf_painted_lady
    name: வண்ணமயமான பெண்
    prompt: |
      வண்ணமயமான பெண்கள் புகழ்பெற்றவர்கள், ஆனால் ஒவ்வொரு விக்டோரியன் வீட்டிற்கும் ஒரு வண்ணத் தட்டு உள்ளது.
      ஒரு தொகுதியில் இருந்து ஐந்து வண்ண சேர்க்கைகளைச் சேகரிக்கவும். வண்ணங்கள் என்ன சொல்கின்றன?
    follow_ups:
      - இந்த வண்ணங்கள் ஏன்?
      - வண்ணம் எவ்வாறு பாதுகாக்கிறது அல்லது மாற்றுகிறது?
      - தொகுதி சாம்பல் நிறத்தில் எப்படி இருக்கும்?
  - id: sf_bay_window
    name: விரிகுடா ஜன்னல்
