      சான் பிரான்சிஸ்கோவில் தெருக்கள் படிக்கட்டுகளாக உள்ளன — நடைபாதைக்குப் பதிலாக படிகள்.
      ஒன்றில் ஏறுங்கள். படிக்கட்டு அக்கம்பக்கத்தை எவ்வாறு மாற்றுகிறது?
