      விரிகுடா ஜன்னல்கள் தெருவிற்குள் துருத்திக் கொள்கின்றன. அவை ஒளிக்காக, பார்வைக்காக,
      காட்சிப்படுத்துவதற்காக. ஒன்றின் முன் நிற்கவும். உள்ளே இருந்து நீங்கள் என்ன காண்பீர்கள்?
