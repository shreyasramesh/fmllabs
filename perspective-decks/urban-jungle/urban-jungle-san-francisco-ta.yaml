      ட்வின் பீக்ஸ் மலையின் உச்சியில் இருந்து நகரத்தின் காட்சியை கற்பனை செய்யுங்கள்.
      நகரம் கீழே பரந்துள்ளது — கட்டம், நீர், பாலங்கள். உயரம் எதற்கு முக்கியத்துவம் கொடுக்கிறது என்பதை எவ்வாறு மாற்றுகிறது?
