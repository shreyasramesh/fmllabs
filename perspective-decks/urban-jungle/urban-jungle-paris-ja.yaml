# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# アーバン・ジャングル — パリ (Japanese)

id: urban_jungle_paris
name: アーバン・ジャングル — パリ
description: スケールや光、歴史の層、そしてストリートライフのリズムまで、パリの見方を変える50枚のカード。
domain: urban_jungle
cards:
  - id: paris_balcony_flower
    name: バルコニーの花
    prompt: |
      パリのバルコニーは花々で彩られている――ゼラニウム、ペチュニア。
      全てのバルコニーに植木鉢がある建物を見つけよう。その花はファサードをどう変えるだろうか？
    follow_ups:
      - 花がなければ、この通りはどうなるだろうか？
      - 花はどのようにアイデンティティを創造するか？
      - 花と住人の関係とは？
  - id: paris_haussmann_line
    name: オスマンの直線
    prompt: |
      オスマンの大きな通りは古いパリを切り裂く。その一つを歩いてみよう。 その直線は容赦ない――建物が並び、高さは均一だ。その大通りはどのように人の動きを形作るのだろうか？
    follow_ups:
      - オスマンがいなければ、パリはどうなるだろうか？
      - 大通りはどのように景観を創り出すか？
      - 直線と権力の関係とは？
  - id: paris_cafe_terrace
    name: カフェのテラス
    prompt: |
      パリのカフェのテラスは通りに面している。そこに座ってみよう。あなたは内にも外にもいる。
      テラスは境界だ。何が見えるだろうか？
    follow_ups:
      - テラスがなければ、この通りはどうなるだろうか？
      - テラスはどのように出会いを創造するか？
      - テラスと通りの関係とは？
  - id: paris_metro_entrance
    name: メトロの入り口
    prompt: |
      アール・ヌーヴォー様式のメトロの入り口は象徴的だ。それを見つけよう。
      鉄細工、文字――その入り口はポータルだ。それは何を約束しているのだろうか？
    follow_ups:
      - 入り口がなければ、この通りはどうなるだろうか？
      - 入り口はどのようにアイデンティティを創造するか？
      - 入り口と地下の関係とは？
  - id: paris_shutter
    name: パリのシャッター
    prompt: |
      パリのシャッター（volets）は夜に閉まる。緑、灰色、青色だ。
      シャッターが閉まった通りを見つけよう。その向こうには何があるのだろうか？
    follow_ups:
      - シャッターがなければ、ファサードはどうなるだろうか？
      - シャッターはどのようにプライバシーを創造するか？
      - シャッターと光の関係とは？
  - id: paris_cobble
    name: パリの石畳
    prompt: |
      パリの石畳（pavés）は根強く残っている。その上を歩こう。その質感を感じよう。
      石畳は別のパリの遺物だ。それは通りをどのように形作るのだろうか？
    follow_ups:
      - 石畳がなければ、この通りはどうなるだろうか？
      - 石畳はどのように歴史を刻むか？
      - 石畳と革命の関係とは？
  - id: paris_seine_edge
    name: セーヌ川の岸辺
    prompt: |
      セーヌ川はパリを貫いている。岸壁に行ってみよう。川は縫い目だ。
      両側には何がある？川はどのように分断し、繋ぐのだろうか？
    follow_ups:
      - セーヌ川がなければ、パリはどうなるだろうか？
      - 川はどのように街を形作るか？
      - 川と岸辺の関係とは？
  - id: paris_roof_zinc
    name: 屋根の亜鉛
    prompt: |
      パリの屋根はしばしば亜鉛でできている――灰色で、傾斜があり、ドーマー窓がある。
      見上げてみよう。その屋根線は特徴的だ。それはスカイラインをどのように形作るのだろうか？
    follow_ups:
      - 亜鉛がなければ、スカイラインはどうなるだろうか？
      - 亜鉛はどのようにアイデンティティを創造するか？
      - 屋根と屋根裏の関係とは？
  - id: paris_door_height
    name: ドアの高さ
    prompt: |
      パリのドアはしばしば背が高い――二倍の高さだ。それを見つけよう。
      何がそこを通るだろうか？そのドアはスケールの閾だ。
    follow_ups:
      - 背の高いドアがなければ、建物はどうなるだろうか？
      - 高さはいかに壮大さを創造するか？
      - ドアと建物の関係とは？
  - id: paris_boulangerie_smell
    name: パン屋の香り
    prompt: |
      パン屋はパンの匂いがする。その匂いを辿ってみよう。
      その店はノードだ。その香りはブロックについて何を物語っているだろうか？
    follow_ups:
      - 香りがなければ、この通りはどうなるだろうか？
      - 香りはどのようにアイデンティティを創造するか？
      - 香りと商業の関係とは？
  - id: paris_place
    name: パリの広場
    prompt: |
      パリには広場、円形広場、ノードがある。それを見つけよう。
      その幾何学模様に注目しよう。その広場は、そこに集まる通りをどのように形作るのだろうか？
    follow_ups:
      - 広場がなければ、この地域はどうなるだろうか？
      - 広場はどのように中心を創造するか？
      - 広場と流れの関係とは？
  - id: paris_balcony_iron
    name: バルコニーの鉄
    prompt: |
      パリのバルコニーの手すりはしばしば装飾的だ――鋳鉄、曲線、装飾。
      それを見つけよう。その鉄はファサードをどのように形作るのだろうか？
    follow_ups:
      - 鉄がなければ、建物はどうなるだろうか？
      - 鉄はどのようにアイデンティティを創造するか？
      - 鉄と職人の関係とは？
  - id: paris_plane_tree
    name: プラタナスの木
    prompt: |
      パリのプラタナスの木は大通りに沿って並んでいる。その樹皮は剥がれる。
      それを見つけよう。その木は通りをどのように形作るのだろうか？それなしでは大通りはどうなるだろうか？
    follow_ups:
      - プラタナスがなければ、この通りはどうなるだろうか？
      - プラタナスはどのように日陰を創造するか？
      - 木と大通りの関係とは？
  - id: paris_metro_tile
    name: メトロのタイル
    prompt: |
      パリのメトロの駅には白いタイルが貼られている。トンネルは光の管だ。
      路線に乗ってみよう。そのタイルは旅をどのように形作るのだろうか？
    follow_ups:
      - タイルがなければ、駅はどうなるだろうか？
      - タイルはどのように清潔さを創造するか？
      - タイルと地下の関係とは？
  - id: paris_clock
    name: パリの時計
    prompt: |
      パリには多くの公共時計がある――教会、駅、建物の上にある。
      それを見つけよう。それは何時を指しているだろうか？正確だろうか？
    follow_ups:
      - 時計がなければ、その空間はどうなるだろうか？
      - 時計はいかに時間を形作るか？
      - 時計と場所の関係とは？
  - id: paris_newsstand
    name: パリのキオスク
    prompt: |
      パリのキオスクは新聞、雑誌、メトロのチケットを売っている。
      それを見つけよう。何が展示されているだろうか？誰が立ち止まるだろうか？そのキオスクはノードだ。
    follow_ups:
      - キオスクがなければ、この通りはどうなるだろうか？
      - キオスクはどのように出会いを創造するか？
      - キオスクと通りの関係とは？
  - id: paris_bench
    name: パリのベンチ
    prompt: |
      パリには公園やセーヌ川沿いに緑のベンチがある。
      それに座ってみよう。他に誰が座っているだろうか？眺めはどうだろうか？
    follow_ups:
      - ベンチがなければ、その空間はどうなるだろうか？
      - ベンチはどのように休息を創造するか？
      - ベンチと川の関係とは？
  - id: paris_boulangerie_queue
    name: パン屋の列
    prompt: |
      朝のラッシュ時にパン屋の列に並んでみよう。その列は儀式だ。
      人々は何を買っているのだろうか？エチケットはどうだろうか？
    follow_ups:
      - 列がなければ、この通りはどうなるだろうか？
      - 列はどのようにコミュニティを創造するか？
      - 列とパンの関係とは？
  - id: paris_manhole
    name: パリのマンホール
    prompt: |
      パリのマンホールの蓋にはしばしば「Paris」や「Eau」（水）と書かれている。
      それを見つけよう。その蓋は都市の血管への扉だ。その下には何があるのだろうか？
    follow_ups:
      - 蓋がなければ、この通りはどうなるだろうか？
      - 蓋はいかにシステムを刻むか？
      - 蓋と地下の関係とは？
  - id: paris_shadow
    name: パリの影
    prompt: |
      パリの光はくっきりとした影を作る。影と太陽が出会う角を見つけよう。
      その影は通りをどのように形作るのだろうか？
    follow_ups:
      - 影がなければ、この通りはどうなるだろうか？
      - 影はどのようにコントラストを創造するか？
      - 影と建物の関係とは？
  - id: paris_courtyard
    name: パリの中庭
    prompt: |
      パリの建物はしばしば門の陰に中庭（cours）を隠している。覗いてみよう。
      中には何があるだろうか？その中庭は秘密の部屋だ。
    follow_ups:
      - 中庭がなければ、建物はどうなるだろうか？
      - 中庭はどのようにプライバシーを創造するか？
      - 中庭と通りの関係とは？
  - id: paris_bike_lane
    name: パリの自転車レーン
    prompt: |
      パリには自転車レーン（pistes cyclables）が拡張されている。それを見つけよう。
      そのレーンは通りをどのように形作るのだろうか？誰がそれを使うのだろうか？
    follow_ups:
      - レーンがなければ、この通りはどうなるだろうか？
      - レーンはどのように移動性を創造するか？
      - レーンと車の関係とは？
  - id: paris_fountain
    name: パリの噴水
    prompt: |
      パリには噴水がある――ウォレスの噴水、記念碑的な噴水。
      それを見つけよう。それは何を提供するだろうか？誰がそれを使うだろうか？
    follow_ups:
      - 噴水がなければ、その場所はどうなるだろうか？
      - 噴水はどのように贈与を創造するか？
      - 噴水と公共の関係とは？
  - id: paris_awning
    name: パリのオーニング
    prompt: |
      パリのカフェのオーニングは日陰を作る。オーニングが繰り返される通りを見つけよう。
      それらは歩道をどのように形作るのだろうか？
    follow_ups:
      - オーニングがなければ、この通りはどうなるだろうか？
      - オーニングはどのように領域を創造するか？
      - オーニングとテラスの関係とは？
  - id: paris_lamp_post
    name: パリの街灯
    prompt: |
      パリの街灯は独特のスタイルを持っている――しばしば装飾的で、しばしば緑色だ。
      それを見つけよう。その街灯は夜の通りをどのように形作るのだろうか？
    follow_ups:
      - 街灯がなければ、この通りはどうなるだろうか？
      - 街灯はどのように安全を創造するか？
      - 街灯と闇の関係とは？
  - id: paris_door_knocker
    name: ドアノッカー
    prompt: |
      パリのドアにはしばしばノッカーがついている――ライオンの顔、手、輪。
      それを見つけよう。それはどのような音を立てるだろうか？そのノッカーは閾の物体だ。
    follow_ups:
      - ノッカーがなければ、ドアはどうなるだろうか？
      - ノッカーはどのように音を創造するか？
      - ノッカーと入り口の関係とは？
  - id: paris_shop_sign
    name: パリの看板
    prompt: |
      パリの店の看板はしばしば手書きだ――パン屋、肉屋、チーズ屋。
      それを見つけよう。その看板は店について何を語っているだろうか？
    follow_ups:
      - 看板がなければ、この通りはどうなるだろうか？
      - 看板はどのようにアイデンティティを創造するか？
      - 看板と職人の関係とは？
  - id: paris_parking
    name: パリの駐車場
    prompt: |
      パリの駐車場は創造的だ――歩道上の車、斜め、ぎゅうぎゅう詰め。 誰かが駐車するのを見よう。その車はどのように収まるだろうか？車と街の関係とは？
    follow_ups:
      - 車がなければ、この通りはどうなるだろうか？
      - 駐車場はいかに通りを形作るか？
      - 駐車場と空間の関係とは？
  - id: paris_drain
    name: パリの排水溝
    prompt: |
      パリの側溝は縁石に沿って流れている。雨の後、それらは流れる。
      それを見つけよう。その水はどこへ行くのだろうか？その排水溝は seam（縫い目）だ。
    follow_ups:
      - 排水溝がなければ、この通りはどうなるだろうか？
      - 排水溝はいかに水を管理するか？
      - 排水溝とシステムの関係とは？
  - id: paris_chimney
    name: パリの煙突
    prompt: |
      パリの煙突は屋根線にアクセントをつけている。一つの建物で数えてみよう。
      その煙突は熱の遺物だ。ここで何が燃えていたのだろうか？
    follow_ups:
      - 煙突がなければ、屋根はどうなるだろうか？
      - 煙突はいかに歴史を刻むか？
      - 煙突と火の関係とは？
  - id: paris_metro_map
    name: メトロの地図
    prompt: |
      パリのメトロの地図は図だ。それは地理を歪曲している。
      何が強調されているだろうか？何が省略されているだろうか？その地図は街をどのように形作るのだろうか？
    follow_ups:
      - 地図がなければ、道案内はどうなるだろうか？
      - 地図はどのように繋がりを創造するか？
      - 地図と領土の関係とは？
  - id: paris_bridge
    name: パリの橋
    prompt: |
      パリにはセーヌ川にかかる多くの橋がある。徒歩で渡ってみよう。
      その遷移を感じよう。何が変わるだろうか？その橋は閾だ。
    follow_ups:
      - 橋がなければ、川はどうなるだろうか？
      - 橋はいかに繋ぐか？
      - 橋と川の関係とは？
  - id: paris_graffiti
    name: パリのグラフィティ
    prompt: |
      パリにはグラフィティがある――タグ、ステンシル、壁画。
      層になった壁を見つけよう。そのパリンセスト（書き換えられた文書）は何だろうか？
      誰がこの表面に印をつけたのだろうか？
    follow_ups:
      - グラフィティがなければ、壁はどうなるだろうか？
      - グラフィティはいかに場所を主張するか？
      - グラフィティと街の関係とは？
  - id: paris_tree_guard
    name: 木の保護柵
    prompt: |
      パリの街路樹にはしばしば保護柵がある――根元を囲む金属製の格子。
      それを見つけよう。その保護柵は何を守っているのだろうか？何を排除しているのだろうか？
    follow_ups:
      - 保護柵がなければ、木はどうなるだろうか？
      - 保護柵はいかに植樹帯を形作るか？
      - 保護柵と木のВот関係とは？
  - id: paris_bus_stop
    name: パリのバス停
    prompt: |
      パリのバス停にはシェルター、時刻表、デジタルディスプレイがある。
      そこで待ってみよう。他に誰が待っているだろうか？エチケットはどうだろうか？
    follow_ups:
      - バス停がなければ、この通りはどうなるだろうか？
      - バス停はどのようにコミュニティを創造するか？
      - バス停と旅の関係とは？
  - id: paris_terrace_table
    name: テラスのテーブル
    prompt: |
      カフェのテラスのテーブルは通りに面している。それに座ってみよう。
      そのテーブルはステージだ。何を見ているだろうか？何があなたを見ているだろうか？
    follow_ups:
      - テーブルがなければ、テラスはどうなるだろうか？
      - テーブルはどのように出会いを創造するか？
      - テーブルと通りの関係とは？
  - id: paris_roof_dormer
    name: 屋根のドーマー
    prompt: |
      パリの屋根のドーマー（マンサード窓）はスカイラインにアクセントをつけている。
      多くのドーマーがある建物を見つけよう。中からの眺めはどうだろうか？
    follow_ups:
      - ドーマーがなければ、屋根はどうなるだろうか？
      - ドーマーはいかに光を創造するか？
      - ドーマーと屋根裏の関係とは？
  - id: paris_parking_metre
    name: パリの駐車メーター
    prompt: |
      パリの駐車メーターはしばしば灰色の箱だ。それを見つけよう。
      それは縁石をどのように形作るのだろうか？誰が払うのだろうか？誰が払わないのだろうか？
    follow_ups:
      - メーターがなければ、この通りはどうなるだろうか？
      - メーターはいかに空間を管理するか？
      - メーターと車の関係とは？
  - id: paris_doorway
    name: パリの入り口
    prompt: |
      パリの入り口はしばしば背が高く、しばしば装飾的だ。
      その前に立ってみよう。そこを通り抜けるのはどのような体験だろうか？その入り口は閾だ。
    follow_ups:
      - 入り口がなければ、建物はどうなるだろうか？
      - 入り口はいかに壮大さを創造するか？
      - 入り口と内部の関係とは？
  - id: paris_metro_stair
    name: メトロの階段
    prompt: |
      メトロの階段は地下へと降りていく。階段の数を数えてみよう。
      その遷移を感じよう。何が上にあるだろうか？何が下にあるだろうか？
    follow_ups:
      - 階段がなければ、駅はどうなるだろうか？
      - 階段はいかに下降を創造するか？
      - 階段と地下の関係とは？
  - id: paris_bench_view
    name: ベンチからの眺め
    prompt: |
      眺めの良いベンチに座ってみよう――セーヌ川、広場、通り。
      その額縁は何だろうか？焦点は何だろうか？そのベンチは vantage point（眺望点）だ。
    follow_ups:
      - ベンチがなければ、眺めはどうなるだろうか？
      - ベンチはどのように一時停止を創造するか？
      - ベンチと眺めの関係とは？
  - id: paris_shutter_open
    name: シャッターが開く
    prompt: |
      パリのシャッターは朝に開く。開いている通りを見つけよう。
      その儀式は何だろうか？その開口は何を明らかにするのだろうか？
    follow_ups:
      - シャッターがなければ、この通りはどうなるだろうか？
      - シャッターはいかにリズムを創造するか？
      - シャッターと一日の関係とは？
  - id: paris_cobble_pattern
    name: 石畳の模様
    prompt: |
      パリの石畳は模様に敷かれている――時々ヘリンボーン、時々放射状。
      模様を見つけよう。それは通りをどのように形作るのだろうか？
    follow_ups:
      - 模様がなければ、この通りはどうなるだろうか？
      - 模様はいかに質感を創造するか？
      - 模様と職人の関係とは？
  - id: paris_plane_bark
    name: プラタナスの樹皮
    prompt: |
      パリのプラタナスの樹皮はまだら状に剥がれる。それに触れてみよう。
