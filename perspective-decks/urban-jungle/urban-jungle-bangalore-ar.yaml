# الغابة الحضرية — بنغالور (Arabic)

id: urban_jungle_bangalore
name: الغابة الحضرية — بنغالور
description: 50 بطاقة لتغيير نظرتك لبنغالور — من الحجم والإضاءة إلى طبقات التاريخ وإيقاعات الحياة في الشارع.
domain: urban_jungle
cards:
  - id: blr_gate_colony
    name: مستعمرة مسورة
    prompt: |
      مستعمرات بنغالور المسورة لديها أسوار، حراس، بوابات. قف عند بوابة.
      ماذا يوجد بالداخل؟ من يدخل؟ البوابة تمثل حدًا. ماذا تحمي؟
    follow_ups:
      - ماذا سيكون الشارع بدون البوابة؟
      - كيف تخلق البوابة الأمان؟
      - ما هي العلاقة بين البوابة والمستعمرة؟
  - id: blr_tree_canopy
    name: مظلة الأشجار
    prompt: |
      كانت بنغالور ذات يوم مدينة حدائق. لا تزال الأشجار القديمة تغطي بعض الشوارع.
      امشِ تحت إحداها. كيف تغير المظلة الضوء؟ الصوت؟
    follow_ups:
      - ماذا سيكون الشارع بدون الشجرة؟
      - كيف تخلق المظلة مناخًا مصغرًا؟
      - ما هي العلاقة بين الشجرة والمدينة؟
  - id: blr_tech_park
    name: مجمع تقني
    prompt: |
      المجمعات التقنية هي حرم جامعي — زجاج، عشب، حافلات مكوكية. ابحث عن واحد. كيف
      ينفصل المجمع عن المدينة؟ ما هي العلاقة بين الداخل والخارج؟
    follow_ups:
      - ماذا سيكون المكان بدون المجمع؟
      - كيف يخلق المجمع هوية؟
      - ما هي العلاقة بين المجمع والشارع؟
  - id: blr_auto_rickshaw
    name: عربة ريكشا آلية
    prompt: |
      تنسج عربات الركشا الآلية عبر حركة المرور. شاهد واحدة وهي تشق طريقها عند تقاطع. كيف
      تتناسب العربة حيث لا تستطيع السيارات؟ ما هو منطق النسج؟
    follow_ups:
      - ماذا سيكون الشارع بدون العربة؟
      - كيف تخلق العربة التنقل؟
      - ما هي العلاقة بين العربة وحركة المرور؟
  - id: blr_chai_stall
    name: كشك شاي
    prompt: |
      أكشاك الشاي هي نقاط التقاء — صغيرة، مؤقتة، أساسية. ابحث عن واحد. من يتجمع؟
      ما هو الإيقاع؟ الكشك هو آلة اجتماعية.
    follow_ups:
      - ماذا سيكون الركن بدون الكشك؟
      - كيف يخلق الكشك اللقاء؟
      - ما هي العلاقة بين الكشك والشارع؟
  - id: blr_billboard
    name: لوحة إعلانية في بنغالور
    prompt: |
      تعرض لوحات بنغالور الإعلانية الإعلانات التكنولوجية والعقارية والتعليمية. ابحث عن واحدة.
      ماذا يُباع؟ من هو الجمهور؟ اللوحة الإعلانية هي مرآة الطموح.
    follow_ups:
      - ماذا سيكون الشارع بدون اللوحة الإعلانية؟
      - كيف تشكل اللوحة الإعلانية الرغبة؟
      - ما هي العلاقة بين اللوحة الإعلانية والمدينة؟
  - id: blr_compound_wall
    name: جدار مجمع
    prompt: |
      تفصل جدران المجمع بين الخاص والعام. ابحث عن جدار. ماذا يوجد خلفه؟
      كم هو مرتفع؟ الجدار يخلق حدًا. ماذا يستبعد؟
    follow_ups:
      - ماذا سيكون الشارع بدون الجدار؟
      - كيف يخلق الجدار الخصوصية؟
      - ما هي العلاقة بين الجدار والمجمع؟
  - id: blr_signal_wait
    name: انتظار عند الإشارة
    prompt: |
      انتظر عند إشارة مرور. راقب الباعة — أزهار، ألعاب، كتب.
      الإشارة تخلق وقفة. ماذا يحدث في الوقفة؟
    follow_ups:
      - ماذا سيكون التقاطع بدون الإشارة؟
      - كيف تخلق الإشارة الاقتصاد؟
      - ما هي العلاقة بين الإشارة والشارع؟
  - id: blr_rain_drain
    name: مصرف المطر
    prompt: |
      موسم الأمطار في بنغالور يغرق المصارف. بعد المطر، راقب الماء. أين
      يذهب؟ أين يتجمع؟ المصرف هو حد.
    follow_ups:
      - ماذا سيكون الشارع بدون المصرف؟
      - كيف يدير المصرف المياه؟
      - ما هي العلاقة بين المصرف وموسم الأمطار؟
  - id: blr_sarjapur_road
    name: طريق سارجابور
    prompt: |
      يربط طريق سارجابور بنغالور القديمة بالممر التكنولوجي. قد سيراً على الأقدام أو بالسيارة
      لمسافة. ماذا يتغير؟ أين تتحول المدينة؟
    follow_ups:
      - ماذا سيكون الممر بدون الطريق؟
      - كيف يخلق الطريق الاتصال؟
      - ما هي العلاقة بين الطريق والنمو؟
  - id: blr_parks_maidans
    name: حدائق وساحات
    prompt: |
      تمتلك بنغالور حدائق وساحات — حديقة كوبون، لال باغ، ساحات الأحياء. ادخل إلى واحدة. من
      يستخدمها؟ ما هو الإيقاع؟
    follow_ups:
      - ماذا ستكون المدينة بدون الحديقة؟
      - كيف تخلق الحديقة ملاذًا؟
      - ما هي العلاقة بين الحديقة والحي؟
  - id: blr_temple_street
    name: شارع المعبد
    prompt: |
      المعابد تزين شوارع بنغالور. ابحث عن واحد. لاحظ القرابين، الأجراس، الحشود. كيف
      يشكل المعبد الكتلة؟
    follow_ups:
      - ماذا سيكون الشارع بدون المعبد؟
      - كيف يخلق المعبد مجتمعًا؟
      - ما هي العلاقة بين المعبد والشارع؟
  - id: blr_silk_board
    name: لوحة الحرير
    prompt: |
      تقاطع لوحة الحرير سيء السمعة. قف على الحافة. راقب حركة المرور.
      كيف يعمل التقاطع؟ ما هو منطق الفوضى؟
    follow_ups:
      - ماذا سيكون الممر بدون التقاطع؟
      - كيف يخلق التقاطع عنق زجاجة؟
      - ما هي العلاقة بين التقاطع والتنقل؟
  - id: blr_metro_elevated
    name: مترو مرتفع
    prompt: |
      يعمل مترو بنغالور مرتفعًا عبر أجزاء من المدينة. اركبه أو قف تحته. كيف
      يغير الخط المرتفع الشارع أدناه؟
    follow_ups:
      - ماذا سيكون الشارع بدون المترو؟
      - كيف يخلق المترو الاتصال؟
      - ما هي العلاقة بين المرتفع والأرض؟
  - id: blr_apartment_tower
    name: برج شقق
    prompt: |
      ترتفع أبراج الشقق عبر بنغالور. ابحث عن واحد. كم عدد الطوابق؟ من
      يعيش هناك؟ البرج كثافة عمودية. ماذا يحل محل؟
    follow_ups:
      - ماذا سيكون الأفق بدون البرج؟
      - كيف يخلق البرج مساكن؟
      - ما هي العلاقة بين البرج والأرض؟
  - id: blr_roadside_vendor
    name: بائع على جانب الطريق
    prompt: |
      يبيع الباعة على جانب الطريق الفاكهة والوجبات الخفيفة وشواحن الهواتف. ابحث عن واحد. ماذا
      هو العرض؟ من يتوقف؟ البائع هو اقتصاد غير رسمي.
    follow_ups:
      - ماذا سيكون الشارع بدون البائع؟
      - كيف يخلق البائع سبل العيش؟
      - ما هي العلاقة بين البائع والشارع؟
  - id: blr_borewell
    name: بئر ارتوازي
    prompt: |
      تعتمد بنغالور على الآبار الارتوازية. ابحث عن الأنابيب، الخزانات،
      المضخات. يتم استخراج المياه من الأسفل. ما هي العلاقة بين المدينة والخزان الجوفي؟
    follow_ups:
      - ماذا سيكون المبنى بدون البئر الارتوازي؟
      - كيف يخلق البئر الارتوازي الإمداد؟
      - ما هي العلاقة بين البئر الارتوازي والنقص؟
  - id: blr_garbage_heap
    name: كومة قمامة
    prompt: |
      تظهر أكوام القمامة عند الزوايا، بجوار الجدران. لاحظ واحدة. ماذا يوجد بها؟ من
      ينبش فيها؟ الكومة هي حد للنظام.
    follow_ups:
      - ماذا سيكون الشارع بدون الكومة؟
      - كيف تشير الكومة إلى الفشل؟
      - ما هي العلاقة بين الكومة والمدينة؟
  - id: blr_marquee_wedding
    name: خيمة زفاف
    prompt: |
      تقوم خيام الزفاف بحظر الشوارع. ابحث عن واحدة. الخيمة هي إقليم مؤقت.
      ما هي العلاقة بين الاحتفال والشارع؟
    follow_ups:
      - ماذا سيكون الشارع بدون الخيمة؟
      - كيف تخلق الخيمة مطالبة؟
      - ما هي العلاقة بين الزفاف والعامة؟
  - id: blr_old_bungalow
    name: بنغالو قديم
    prompt: |
      لا تزال بنغالات بنغالور القديمة باقية بين الأبراج. ابحث عن واحد. يضم البنغالو
      مجمعًا، أشجارًا، مساحة. ماذا سيحل محله؟
    follow_ups:
      - ماذا سيكون الشارع بدون البنغالو؟
      - كيف يشير البنغالو إلى التاريخ؟
      - ما هي العلاقة بين البنغالو والبرج؟
  - id: blr_coffee_house
    name: مقهى
    prompt: |
      بيت القهوة الهندي مؤسسة. اجلس في واحد. المقهى هو
      غرفة للمحادثة. ما هو الإيقاع؟ من يأتي؟
    follow_ups:
      - ماذا سيكون الشارع بدون المقهى؟
      - كيف يخلق المقهى مجتمعًا؟
      - ما هي العلاقة بين المقهى والمدينة؟
  - id: blr_phone_booth
    name: كابينة هاتف
    prompt: |
      لا تزال كبائن الهواتف العامة موجودة. ابحث عن واحدة. هل تعمل؟ من يستخدمها؟
      الكابينة هي بقايا. ماذا حل محلها؟
    follow_ups:
      - ماذا سيكون الشارع بدون الكابينة؟
      - كيف تشير الكابينة إلى التغيير؟
      - ما هي العلاقة بين الكابينة والهاتف المحمول؟
  - id: blr_bus_stop
    name: موقف حافلات بنغالور
    prompt: |
      غالبًا ما تكون مواقف حافلات بنغالور عبارة عن عمود و حشد. انتظر عند واحد. من
      ينتظر؟ ما هي آداب السلوك؟ المحطة هي بنية تحتية دنيا.
    follow_ups:
      - ماذا سيكون الشارع بدون المحطة؟
      - كيف تخلق المحطة الاتصال؟
      - ما هي العلاقة بين المحطة والحافلة؟
  - id: blr_power_line
    name: خط كهرباء
    prompt: |
      خطوط كهرباء بنغالور متشابكة — كابلات، محولات، حلقات. تتبع
      خطًا واحدًا. إلى أين يذهب؟ الشبكة مرئية. ماذا تغذي؟
    follow_ups:
      - ماذا سيكون الشارع بدون الخطوط؟
      - كيف تخلق الشبكة الإمداد؟
      - ما هي العلاقة بين الخط والانقطاع؟
  - id: blr_speed_breaker
    name: مطب سرعة
    prompt: |
      مطبّات السرعة — رجال الشرطة النائمون — تنتشر في شوارع بنغالور. اشعر بواحد. لماذا هو
      هنا؟ ماذا يبطئ؟ المطب هو تدخل محلي.
    follow_ups:
      - ماذا سيكون الطريق بدون المطب؟
      - كيف يخلق المطب الأمان؟
      - ما هي العلاقة بين المطب والسرعة؟
  - id: blr_compound_tree
    name: شجرة مجمع
    prompt: |
      تتدلى أشجار المجمع فوق الجدران. ابحث عن واحدة. الشجرة داخل وخارج في نفس الوقت.
      ماذا تظلل؟ من يملكها؟
    follow_ups:
      - ماذا سيكون الشارع بدون الشجرة؟
      - كيف تخلق الشجرة هدية؟
      - ما هي العلاقة بين الشجرة والمجمع؟
  - id: blr_shop_shutter
    name: باب محل
    prompt: |
      تُغلق أبواب المحلات في بنغالور ليلاً. ابحث عن باب مغلق. ماذا يوجد
      خلفه؟ الباب هو دورة يومية. ماذا يحمي؟
    follow_ups:
      - ماذا سيكون الشارع بدون الباب؟
      - كيف يخلق الباب الأمان؟
      - ما هي العلاقة بين الباب والتجارة؟
  - id: blr_water_tanker
    name: صهريج مياه
    prompt: |
      توفر صهاريج المياه الأحياء. شاهد واحدة وهي تسلم. الصهريج هو
      بنية تحتية متنقلة. ما هي العلاقة بين الصهريج والصنبور؟
    follow_ups:
      - ماذا سيكون الحي بدون الصهريج؟
      - كيف يخلق الصهريج الإمداد؟
      - ما هي العلاقة بين الصهريج والنقص؟
  - id: blr_metro_station
    name: محطة مترو
    prompt: |
      محطات مترو بنغالور جديدة — نظيفة، تحمل علامة تجارية. ادخل إلى واحدة. كيف
      تختلف المحطة عن الشارع؟ ما هو الانتقال؟
    follow_ups:
      - ماذا سيكون الممر بدون المحطة؟
      - كيف تخلق المحطة الاتصال؟
      - ما هي العلاقة بين المحطة والمدينة؟
  - id: blr_rickshaw_stand
    name: موقف ريكشا
    prompt: |
      تتجمع مواقف الركشا عند التقاطعات. ابحث عن واحد. السائقون ينتظرون.
      الموقف هو نقطة التقاء. ما هو الاقتصاد؟
    follow_ups:
      - ماذا سيكون التقاطع بدون الموقف؟
      - كيف يخلق الموقف التنقل؟
      - ما هي العلاقة بين الموقف والسائق؟
  - id: blr_pavement_sleep
    name: نوم على الرصيف
    prompt: |
      النوم على الرصيف جزء من المدينة. لاحظ بعناية. أين ينامون؟
      ما هي العلاقة بين الشارع والمأوى؟
    follow_ups:
      - ماذا سيكون الشارع بدون النائمين؟
      - كيف يصبح الرصيف وطنًا؟
      - ما هي العلاقة بين النوم والمدينة؟
  - id: blr_gate_security
    name: أمن البوابة
    prompt: |
      للبوابات السكنية أمن — حراس، حواجز، سجلات. راقب التدفق.
      من يدخل؟ من يتوقف؟ البوابة هي مرشح.
    follow_ups:
      - ماذا سيكون السكن بدون البوابة؟
      - كيف تخلق البوابة الأمان؟
      - ما هي العلاقة بين البوابة والثقة؟
  - id: blr_street_dog
    name: كلب شارع
    prompt: |
      كلاب الشوارع جزء من بنغالور. لاحظ واحدًا. أين ينام؟ ماذا
      يأكل؟ الكلب بري ومستأنس في نفس الوقت.
    follow_ups:
      - ماذا سيكون الشارع بدون الكلب؟
      - كيف يخلق الكلب علاقة؟
      - ما هي العلاقة بين الكلب والمدينة؟
  - id: blr_hoarding
    name: لوحة إعلانية كبيرة
    prompt: |
      اللوحات الإعلانية الكبيرة — لوحات إعلانية ضخمة — تهيمن على التقاطعات. ابحث عن واحدة. ماذا
      يُعلن عنها؟ اللوحة هي مقياس للطموح. ماذا تعد؟
    follow_ups:
      - ماذا سيكون التقاطع بدون اللوحة الإعلانية الكبيرة؟
      - كيف تشكل اللوحة الإعلانية الكبيرة الرغبة؟
      - ما هي العلاقة بين اللوحة الإعلانية الكبيرة والمدينة؟
  - id: blr_rain_tree
    name: شجرة المطر
    prompt: |
      أشجار المطر — Samanea saman — تغطي بعض شوارع بنغالور. ابحث عن واحدة. الشجرة
      هي إرث. كيف تشكل الكتلة؟
    follow_ups:
      - ماذا سيكون الشارع بدون شجرة المطر؟
      - كيف تخلق الشجرة مناخًا مصغرًا؟
      - ما هي العلاقة بين الشجرة ومدينة الحدائق؟
  - id: blr_corner_shop
    name: متجر زاوية في بنغالور
    prompt: |
      متاجر الزوايا — متاجر كيرانا — تبيع كل شيء. ادخل إلى واحد. ماذا
      هو المخزون؟ من يديره؟ المتجر هو نقطة تجمع حي.
    follow_ups:
      - ماذا ستكون الكتلة بدون المتجر؟
      - كيف يخلق المتجر لقاء؟
      - ما هي العلاقة بين المتجر والمجتمع؟
  - id: blr_flyover
    name: جسر علوي
    prompt: |
      تقفز جسور بنغالور العلوية فوق التقاطعات. قف تحت واحد. يخلق الجسر العلوي
      ظلًا، ضوضاء، طبقة جديدة. ماذا يوجد أعلاه؟ ماذا يوجد أدناه؟
    follow_ups:
      - ماذا سيكون التقاطع بدون الجسر العلوي؟
      - كيف يخلق الجسر العلوي تدفقًا؟
      - ما هي العلاقة بين الجسر العلوي والأرض؟
  - id: blr_water_tap
    name: صنبور مياه عام
    prompt: |
      لا تزال صنابير المياه العامة موجودة. ابحث عن واحد. من يستخدمه؟ الصنبور هو
      مشاع. ما هي العلاقة بين الصنبور والوصول؟
    follow_ups:
      - ماذا سيكون الشارع بدون الصنبور؟
      - كيف يخلق الصنبور هدية؟
      - ما هي العلاقة بين الصنبور والنقص؟
  - id: blr_construction_crane
    name: رافعة بناء
    prompt: |
      رافعات البناء تزين الأفق. ابحث عن واحدة. ماذا يُبنى؟
      الرافعة علامة على النمو. ماذا سيحل محل ماذا؟
    follow_ups:
      - ماذا سيكون الأفق بدون الرافعة؟
      - كيف تشير الرافعة إلى التغيير؟
