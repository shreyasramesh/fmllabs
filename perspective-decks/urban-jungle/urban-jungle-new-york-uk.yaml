# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Міські джунглі — Нью-Йорк (Ukrainian)

id: urban_jungle_new_york
name: Міські джунглі — Нью-Йорк
description: 50 карток, щоб по-іншому поглянути на Нью-Йорк — від масштабу та світла до шарів історії та ритмів вуличного життя.
domain: urban_jungle
cards:
  - id: ny_vertical_city
    name: Вертикальне місто
    prompt: |
      Подивись вгору. Нью-Йорк збудований вертикально — вежі змагаються за небо.
      Простеж за однією будівлею від тротуару до вершини. Як висота змінює те, що
      ти помічаєш? Де зупиняється твій погляд?
    follow_ups:
      - Як би виглядала вулиця згори?
      - Як масштаб спотворюється на різних висотах?
      - Що ховається, коли дивишся лише вгору?
  - id: ny_grid_navigation
    name: Навігація по сітці
    prompt: |
      Сітка Мангеттена невблаганна. Пройди один квартал і поміть, як система нумерації
      формує рух, орієнтацію та несподіванки. Що відбувається, коли ти порушуєш сітку?
    follow_ups:
      - Де сітка відчувається гнітючою? Де звільняючою?
      - Яким було б місто без неї?
      - Як діагональні вулиці змінюють ритм?
  - id: ny_subway_soundscape
    name: Звуковий ландшафт метро
    prompt: |
      Закрий очі на станції. Гудіння, гальма, оголошення, вуличний музикант. Нанеси на карту звуковий ландшафт. Як звучить Нью-Йорк, коли ти його не бачиш?
    follow_ups:
      - Які звуки постійні? Які випадкові?
      - Що б означала тиша тут?
      - Як звук позначає час під землею?
  - id: ny_fire_escape
    name: Пожежна драбина
    prompt: |
      Пожежні драбини — це екзоскелет міста — функціональні, ритмічні, особисті.
      Знайди квартал, де вони повторюються. Що вони розкривають про будівлі за ними? Хто міг би сидіти там вночі?
    follow_ups:
      - Що б ти побачив з неї?
      - Як вони змінюють характер вулиці?
      - Чого б позбувся квартал без них?
  - id: ny_street_number
    name: Вуличний номер
    prompt: |
      Вибери число — номер будинку, поверх, номер автобусного маршруту. Простеж за ним через місто. Який патерн виникає? Що означає це число тут?
    follow_ups:
      - Куди тебе приведе число?
      - Що б розкрило інше число?
      - Як числа впорядковують міський досвід?
  - id: ny_steam_rising
    name: Пара, що піднімається
    prompt: |
      Пара з люків — це дихання Нью-Йорка. Знайди місце, де вона піднімається, і спостерігай, як вона рухається, розсіюється, ловить світло. Що знаходиться під нею? Що видихає місто?
    follow_ups:
      - Що б ти знайшов під решіткою?
      - Як погода змінює пару?
      - Які інші приховані системи тут виходять?
  - id: ny_storefront_typography
    name: Типографіка вітрин
    prompt: |
      Прочитай вивіски. Магазинчики, делікатеси, пральні — кожна має свою візуальну мову.
      Збери п'ять шрифтів з одного кварталу. Що вони говорять про тих, хто тут живе?
    follow_ups:
      - Які вивіски здаються старими? Які новими?
      - Як би звучав квартал, якби вивіски могли говорити?
      - Як типографіка позначає зміни?
  - id: ny_waterfront_edge
    name: Край набережної
    prompt: |
      Підійди до води. Місто повертається спиною до річки, затоки, гавані. Стань там, де земля зустрічається з водою. Що збудовано для краєвиду? Що збудовано, щоб його ігнорувати?
    follow_ups:
      - Хто має доступ до води?
      - Як був завойований цей край?
      - Яким було б місто, якби воно було обличчям до води?
  - id: ny_parks_as_rooms
    name: Парки як кімнати
    prompt: |
      Центральний парк, Проспект-парк, кишенькова площа — кожен є кімнатою в місті.
      Увійди в одну і поміть її стіни, стелю, меблі. Як тут спроєктована природа?
    follow_ups:
      - Яке призначення кімнати?
      - Хто проєктував лінії огляду?
      - Що б сталося, якби стіни зникли?
  - id: ny_delivery_rhythm
    name: Ритм доставки
    prompt: |
      Спостерігай за доставками — вантажівки, візки, велосипеди. Простеж шлях однієї посилки від вантажівки до дверей. Як комерція рухається вулицею? Який ритм прибуття?
    follow_ups:
      - Як би виглядав квартал без доставок?
      - Як різні товари рухаються по-різному?
      - Хто є невидимим у цьому потоці?
  - id: ny_brownstone_steps
    name: Сходи з бурого каменю
    prompt: |
      Вхідні сходи з бурого каменю — це сцени. Сядь на одну і спостерігай за вулицею. Хто зупиняється? Хто проходить повз? Що б ти сказав звідси?
    follow_ups:
      - Який вид з верхнього щабля?
      - Як сходи створюють територію?
      - Чого б позбувся квартал без них?
  - id: ny_bridge_as_threshold
    name: Міст як поріг
    prompt: |
      Перейди міст пішки. Відчуй перехід — від одного району до іншого.
      Міст — це ні тут, ні там. Що змінюється, коли ти досягаєш іншого боку?
    follow_ups:
      - Що ти залишаєш позаду?
      - Як міст формує подорож?
      - Яким було б місто без мостів?
  - id: ny_awning_shade
    name: Тінь від навісу
    prompt: |
      Навіси створюють мікроклімат. Стань під одним. Поміть зміну світла, звуку, температури. Як маленькі конструкції змінюють вулицю?
    follow_ups:
      - Яким був би квартал без навісів?
      - Як вони позначають власність?
      - Які інші маленькі сховища існують тут?
  - id: ny_graffiti_layer
    name: Шар графіті
    prompt: |
      Подивись на стіни. Теги, мурали, плакати — кожен шар часу і претензії. Прочитай палімпсест. Хто позначив цю поверхню?
    follow_ups:
      - Яку найстарішу позначку ти можеш знайти?
      - Як шари розповідають історію?
      - Що б сказала стіна, якби могла говорити?
  - id: ny_rooftop_skyline
    name: Даховий горизонт
    prompt: |
      Уяви вид з даху. Водяні баки, антени, сусідні дахи. Місто зверху — це інше місто. Що б ти побачив?
    follow_ups:
      - Як висота змінює те, що має значення?
      - Що приховано від вулиці?
      - Хто має доступ до цього виду?
  - id: ny_crosswalk_wait
    name: Очікування на пішохідному переході
    prompt: |
      Зачекай на пішохідному переході. Не переходь, коли зміниться світло. Зачекай наступного циклу. Що ти помічаєш у паузі? Хто ще чекає?
    follow_ups:
      - Як очікування змінює сприйняття?
      - Які ритми керують перехрестям?
      - Що б сталося, якби ти ніколи не переходив?
  - id: ny_diner_booth
    name: Кабінка в дайнері
    prompt: |
      Сядь у кабінку біля вікна дайнера. Вулиця стає фільмом. Спостерігай за перехожими, рухом, світлом. Яка історія грає?
    follow_ups:
      - Хто головні герої?
      - Як кадр змінює те, що ти бачиш?
      - Що б ти пропустив без вікна?
  - id: ny_scaffolding_skin
    name: Шкіра риштувань
    prompt: |
      Риштування обгортають будівлі, як бинти. Пройди під ними. Поміть звук, світло, тимчасову стелю. Що ремонтується? Що ховається?
    follow_ups:
      - Як довго вони там?
      - Що б сказала будівля без них?
      - Які стосунки між ремонтом і приховуванням?
  - id: ny_newsstand_archive
    name: Архів газетного кіоску
    prompt: |
      Газетний кіоск — це зріз уваги — журнали, газети, цукерки. Що виставлено на показ? Хто зупиняється? Яким був би цей кут без нього?
    follow_ups:
      - Що є бестселером?
      - Як кіоск формує квартал?
      - Що б ти тут поставив?
  - id: ny_construction_site
    name: Будівельний майданчик
    prompt: |
      Спостерігай за будівельним майданчиком. Крани, огородження, робітники. Місто завжди стає. Що будується? Що замінюється?
    follow_ups:
      - Хто буде цим користуватися, коли буде готово?
      - Що тут було раніше?
      - Як будівництво змінює район?
  - id: ny_light_well
    name: Світловий колодязь
    prompt: |
      Шукай світлові колодязі — вузькі проміжки між будівлями, куди падає світло. Хто отримує це світло? Що там росте?
    follow_ups:
      - Яким було б жити в цьому стовбурі?
      - Як світло визначає цінність?
      - Що приховано в тіні?
  - id: ny_bodega_cat
    name: Кіт у магазині
    prompt: |
      Знайди магазинчик із котом. Кіт одночасно всередині та зовні правил. Що ще в місті функціонує так само?
    follow_ups:
      - Що бачить кіт?
      - Як неформальні правила формують простір?
      - Яким був би магазин без кота?
  - id: ny_sidewalk_crack
    name: Тріщина на тротуарі
    prompt: |
      Подивись вниз. Простеж за тріщиною на тротуарі. Куди вона веде? Що в ній росте? Місто сповнене таких розломів.
    follow_ups:
      - Що б сказав тротуар про час?
      - Наскільки важливі маленькі розломи?
      - Що пробивається крізь них?
  - id: ny_air_conditioner
    name: Кондиціонер
    prompt: |
      Порахуй кондиціонери на одній будівлі. Вони — паразити, протези,
      необхідності. Як вони змінюють фасад? Що вони капають?
    follow_ups:
      - Як би виглядала будівля без них?
      - Як клімат формує архітектуру?
      - Хто вирішує, куди вони йдуть?
  - id: ny_express_local
    name: Експрес / Місцевий
    prompt: |
      Їдь у метро. Поміть різницю між експресом і місцевим. Швидкість змінює те, що ти бачиш. Пропускай зупинки і відчуй, як місто стискається.
    follow_ups:
      - Що ти пропускаєш, коли не зупиняєшся?
      - Як швидкість формує досвід?
      - Яким було б місто, якби все було місцевим?
  - id: ny_water_tower
    name: Водонапірна башта
    prompt: |
      Водонапірні башти вінчають старіші будівлі. Вони дерев'яні, бочкоподібні,
      вездесущі. Знайди п'ять. Що вони говорять про горизонт?
    follow_ups:
      - Чому вони досі тут?
      - Як би виглядав дах без однієї?
      - Як вони позначають вік?
  - id: ny_awning_stripes
    name: Смугасті навіси
    prompt: |
      Смугасті навіси — це нью-йоркський говір. Знайди квартал, де вони
      повторюються. Як смуги створюють ідентичність? Що б зробили однотонні кольори?
    follow_ups:
      - Чому смуги, а не однотонні?
      - Як навіси об'єднують квартал?
      - Яка історія цього візерунка?
  - id: ny_curb_cut
    name: Зниження бордюру
    prompt: |
      Поміть зниження бордюрів — пандуси на кутах. Вони для інвалідних візків, візків,
      колясок. Як вони змінюють вулицю? Кого вони включають?
    follow_ups:
      - Яким був би квартал без них?
      - Як доступ формує дизайн?
      - Які інші невидимі пристосування існують?
  - id: ny_street_tree
    name: Вуличне дерево
    prompt: |
      Вибери одне вуличне дерево. Скільки простору воно має? Що в його ямі?
      Хто його поливає? Дерево — гість. Як до нього ставляться?
    follow_ups:
      - Яким би був квартал без дерев?
      - Як дерева позначають турботу?
      - Що росте в тіні дерева?
  - id: ny_loading_zone
    name: Зона завантаження
    prompt: |
      Зони завантаження — це тимчасові території. Спостерігай за однією десять хвилин. Хто її використовує? Як довго вони залишаються? Який ритм зайняття?
    follow_ups:
      - Що б сталося без зон завантаження?
      - Як правила порушуються?
      - Які стосунки між парковкою та комерцією?
  - id: ny_vent_grille
    name: Вентиляційна решітка
    prompt: |
      Решітки на тротуарі вентилюють метро. Стань на одну. Відчуй висхідний потік. Слухай.
      Місто дихає через ці отвори.
    follow_ups:
      - Що піднімається знизу?
      - Як решітка з'єднує світи?
      - Яким був би тротуар без неї?
  - id: ny_basement_stairs
    name: Підвальні сходи
    prompt: |
      Знайди сходи, що ведуть вниз — до підвалу, метро, ​​підпільного бару. Місто має багато рівнів. Що знаходиться під тротуаром?
    follow_ups:
      - Хто спускається?
      - Як спуск змінює світло?
      - Що б ти знайшов унизу?
  - id: ny_clock_tower
    name: Годинникова вежа
    prompt: |
      Знайди публічний годинник. Він точний? Хто його встановив? Годинники впорядковують місто.
      Що відбувається, коли вони не збігаються?
    follow_ups:
      - Яким був би квартал без годинника?
      - Як синхронізується час?
      - Які стосунки між годинниковим часом і часом тіла?
  - id: ny_newsstand_magazine
    name: Журнал з кіоску
    prompt: |
      У газетному кіоску вибери обкладинку журналу. Для кого вона? Що вона передбачає про читача? Кіоск — це дзеркало бажань.
    follow_ups:
      - Що б дізнався незнайомець з цього дисплея?
      - Як обкладинки змагаються за увагу?
      - Чого немає на кіоску?
  - id: ny_awning_rain
    name: Навіс під дощем
    prompt: |
      Стань під навісом під час дощу. Спостерігай, як вода стікає з країв.
      Навіс створює сухий острів. Хто ділить його з тобою?
    follow_ups:
      - Яким був би квартал без укриття?
      - Як дощ змінює вулицю?
      - Які інші укриття існують?
  - id: ny_fire_hydrant
    name: Пожежний гідрант
    prompt: |
      Пожежний гідрант — це підключення до кровоносної системи міста. Знайди один.
      Якого він кольору? Хто його може відкрити? Що тече крізь нього?
    follow_ups:
      - Що б робив квартал під час пожежі без нього?
      - Як гідранти позначають територію?
      - Які стосунки між гідрантом і шлангом?
  - id: ny_stoop_sale
    name: Розпродаж на сходах
    prompt: |
      Уяви розпродаж на цих сходах. Що б продавалося? Хто б зупинився? Сходи — це сцена для обміну.
    follow_ups:
      - Що б ти виставив?
      - Як сходи сприяють зустрічі?
      - Що б дізнався квартал з розпродажу?
  - id: ny_rooftop_garden
    name: Сад на даху
    prompt: |
      Уяви сад на даху над собою. Що б там росло? Хто його доглядає?
      У міста є таємний зелений шар.
    follow_ups:
      - Що б ти посадив?
      - Як висота змінює садівництво?
      - Як би виглядав горизонт, якби всі дахи були зеленими?
  - id: ny_subway_map
    name: Карта метро
    prompt: |
      Подивись на карту метро. Це схема, а не географія. Що спотворено?
      Що опущено? Карта формує наше уявлення про місто.
    follow_ups:
      - Як би виглядала правдива карта?
      - Як карта створює райони?
      - Які стосунки між картою і територією?
  - id: ny_brick_pattern
    name: Візерунок з цегли
    prompt: |
      Вивчи цегляну стіну. Візерунок — тичковий, фламандський — тримає стіну. Простеж візерунок. Що б сталося, якби одна цеглина зникла?
    follow_ups:
      - Як візерунок розподіляє вагу?
      - Що б сказала стіна про свого творця?
      - Як старіє цегла?
