      - Что было бы на крыше без трубы?
      - Как труба отмечает историю?
      - Какова связь между трубой и теплом?
  - id: london_bike_stand
    name: Велосипедная стойка
    prompt: |
      В Лондоне есть велосипедные стойки, велосипеды Santander, велосипеды доставки. Найдите скопление. Как велосипеды формируют улицу? Что было бы с кварталом без них?
