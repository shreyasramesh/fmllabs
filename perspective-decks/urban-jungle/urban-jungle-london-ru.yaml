      - Как фасад создает идентичность?
      - Какова связь между фасадом и торговлей?
  - id: london_paving
    name: Лондонская мостовая
    prompt: |
      Лондонская мостовая разнообразна — плиты, асфальт, кирпич. Пройдитесь по кварталу и заметьте изменения. Как поверхность формирует улицу?
