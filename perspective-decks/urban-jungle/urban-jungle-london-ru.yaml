    prompt: |
      Лондонские балконы часто маленькие — балконы Джульетты, крошечные террасы. Найдите один. Что бы вы там выращивали? Кто бы им пользовался?
    follow_ups:
      - Что было бы со зданием без балкона?
      - Как балкон создает открытое пространство?
      - Какова связь между балконом и квартирой?
  - id: london_chimney
    name: Лондонская труба
    prompt: |
      Лондонские трубы на крышах отмечают линию горизонта. Сосчитайте их на одном здании. Сколько пожаров горело раньше? Труба — это реликт.
