      - Что было бы на улице без дренажа?
      - Как дренаж управляет водой?
      - Какова связь между дренажом и системой?
  - id: london_shop_front
    name: Витрина магазина
    prompt: |
      Лондонские витрины часто небольшие — узкие, глубокие. Посмотрите в окно. Что
