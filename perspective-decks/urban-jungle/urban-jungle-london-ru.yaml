# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Городские джунгли — Лондон (Russian)

id: urban_jungle_london
name: Городские джунгли — Лондон
description: 50 карточек, чтобы изменить ваш взгляд на Лондон — от масштаба и света до слоев истории и ритмов уличной жизни.
domain: urban_jungle
cards:
  - id: london_layer
    name: Слой Лондона
    prompt: |
      Лондон построен слоями — римский, средневековый, викторианский, современный. Найдите место, где сталкиваются эпохи. Что самое старое, что вы можете увидеть? Самое новое?
    follow_ups:
      - Что было бы на улице без этих слоев?
      - Как история проявляется в застройке?
      - Какова связь между слоем и идентичностью?
  - id: london_pub_threshold
    name: Порог паба
    prompt: |
      У лондонского паба есть порог — ступенька, дверь, бар. Встаньте на пороге. Что внутри? Что снаружи? Паб — это комната в городе.
    follow_ups:
      - Что было бы с кварталом без паба?
      - Как порог создает переход?
      - Какова связь между пабом и улицей?
  - id: london_blue_plaque
    name: Синяя табличка
    prompt: |
      Синие таблички отмечают места, где жили известные люди. Найдите одну. Кто здесь жил? Чем они занимались? Табличка делает историю видимой.
    follow_ups:
      - Что было бы со зданием без таблички?
      - Как табличка формирует память?
      - Какова связь между табличкой и местом?
  - id: london_underground
    name: Метро
    prompt: |
      Метро — это город под городом. Спуститесь. Обратите внимание на плитку, карты, эскалаторы. Как метро влияет на то, что наверху?
    follow_ups:
      - Что было бы с Лондоном без метро?
      - Как метро создает связь?
      - Какова связь между метро и поверхностью?
  - id: london_thames_edge
    name: Берег Темзы
    prompt: |
      Темза протекает через Лондон. Пройдитесь по набережной. Река — это шов. Что находится по обе стороны? Как река разделяет и соединяет?
    follow_ups:
      - Что было бы с Лондоном без Темзы?
      - Как река формирует город?
      - Какова связь между рекой и берегом?
  - id: london_georgian_row
    name: Георгианский ряд
    prompt: |
      Георгианские террасы повторяются — дверь, окно, дверь, окно. Пройдитесь по ряду. Повторение создает ритм. Что его нарушает? Что его объединяет?
    follow_ups:
      - Что было бы на улице без этого ряда?
      - Как повторение создает идентичность?
      - Какова связь между рядом и индивидуумом?
  - id: london_mews
    name: Конюшенный двор (Mews)
    prompt: |
      Когда-то это были конюшни, теперь — жилье. Найдите такой. Узкая улочка, брусчатка, перестроенные каретные сараи. Как прошлое продолжает жить?
    follow_ups:
      - Что было бы с этим двором без его истории?
      - Как двор создает уединение?
      - Какова связь между двором и главной улицей?
  - id: london_phone_box
    name: Телефонная будка
    prompt: |
      Красные телефонные будки — это иконы. Найдите одну. Она все еще телефон? Дефибриллятор? Библиотека? Как иконы перепрофилируются?
    follow_ups:
      - Что было бы на улице без этой будки?
      - Как будка обозначает британскость?
      - Какова связь между будкой и функцией?
  - id: london_postbox
    name: Почтовый ящик
    prompt: |
      Красные почтовые ящики повсюду. Найдите один. Обратите внимание на королевский вензель. Почтовый ящик — это узел в сети. Что через него проходит?
    follow_ups:
      - Что было бы на улице без почтового ящика?
      - Как почтовый ящик обозначает территорию?
      - Какова связь между почтовым ящиком и письмом?
  - id: london_pavement
    name: Тротуар
    prompt: |
      Британское "pavement" — это американское "sidewalk". Слово формирует наше мышление. Пройдитесь по тротуару. Какова связь между тротуаром и дорогой?
    follow_ups:
      - Что было бы на улице без тротуара?
      - Как тротуар создает безопасность?
      - Какова связь между тротуаром и пешеходом?
  - id: london_brick
    name: Лондонский кирпич
    prompt: |
      Лондонский кирпич часто желтый или красный — лондонский сорт. Найдите кирпичную стену и изучите цвет, текстуру, кладку. Как стареет кирпич?
    follow_ups:
      - Что было бы со зданием без кирпича?
      - Как кирпич создает идентичность?
      - Какова связь между кирпичом и местом?
  - id: london_weather
    name: Лондонская погода
    prompt: |
      Лондонская погода изменчива. Постойте в одном месте двадцать минут. Наблюдайте за небом. Как погода влияет на настроение города?
    follow_ups:
      - Что было бы с Лондоном без дождя?
      - Как погода формирует архитектуру?
      - Какова связь между погодой и уличной жизнью?
  - id: london_queue
    name: Очередь
    prompt: |
      Британцы стоят в очередях. Найдите очередь — к автобусу, в магазин, на достопримечательность. Наблюдайте за этикетом. Очередь — это форма порядка. Как она работает?
    follow_ups:
      - Что было бы в этом месте без очереди?
      - Как очередь создает справедливость?
      - Какова связь между очередью и культурой?
  - id: london_roundabout
    name: Кольцевая развязка
    prompt: |
      В Лондоне много кольцевых развязок — круговых перекрестков. Посмотрите на одну. Как движется транспорт? Какова ее логика? Кольцевая развязка — это узел.
    follow_ups:
      - Что было бы на перекрестке без кольцевой развязки?
      - Как кольцевая развязка формирует поток?
      - Какова связь между кольцевой развязкой и перекрестком?
  - id: london_parks_room
    name: Парковая комната
    prompt: |
      Лондонские парки — это комнаты: Гайд-парк, Риджентс-парк, скверы. Зайдите в один из них. Обратите внимание на границы, дорожки, скамейки. Как природа спроектирована?
    follow_ups:
      - Что было бы с Лондоном без парков?
      - Как парк создает отдых?
      - Какова связь между парком и городом?
  - id: london_square
    name: Лондонский сквер
    prompt: |
      Лондонские скверы часто частные — с воротами, по ключу. Найдите один. Что внутри? Кто имеет доступ? Сквер — это карман эксклюзивности.
    follow_ups:
      - Что было бы в районе без сквера?
      - Как сквер создает сообщество?
      - Какова связь между сквером и улицей?
  - id: london_terrace
    name: Терраса
    prompt: |
      Терраса — это ряд домов. Пройдитесь по одной. Обратите внимание на единообразие и различия. Как терраса создает идентичность?
    follow_ups:
      - Что было бы на улице без террасы?
      - Как терраса создает ритм?
      - Какова связь между террасой и индивидуумом?
  - id: london_corner_shop
    name: Угловой магазин
    prompt: |
      Угловой магазин — это лондонское учреждение. Зайдите в один. Что продается? Кто им управляет? Магазин — это узел в районе.
    follow_ups:
      - Что было бы в квартале без магазина?
      - Как магазин создает встречи?
      - Какова связь между магазином и сообществом?
  - id: london_bus_route
    name: Автобусный маршрут
    prompt: |
      Лондонские автобусы имеют номера и направления. Сядьте на автобус, на который никогда не ездили. Куда он идет? Как маршрут формирует город?
    follow_ups:
      - Что было бы с поездкой без автобуса?
      - Как маршрут создает связь?
      - Какова связь между автобусом и районом?
  - id: london_clock
    name: Лондонские часы
    prompt: |
      Биг-Бен, часы на вокзале, часы на церкви. Лондон полон общественных часов. Найдите одни. Который час они показывают? Они идут правильно?
    follow_ups:
      - Что было бы в этом месте без часов?
      - Как часы формируют время?
      - Какова связь между часами и местом?
  - id: london_bridge
    name: Лондонский мост
    prompt: |
      В Лондоне много мостов — Тауэрский мост, Миллениум-бридж, Ватерлоо. Перейдите через один пешком. Почувствуйте переход. Что меняется?
    follow_ups:
      - Что было бы с рекой без моста?
      - Как мост соединяет?
      - Какова связь между мостом и рекой?
  - id: london_street_market
    name: Уличный рынок
    prompt: |
      В Лондоне есть уличные рынки — Боро, Камден, Портобелло. Прогуляйтесь по одному. Что продается? Кто продает? Рынок — это временный город.
    follow_ups:
      - Что было бы на улице без рынка?
      - Как рынок создает встречи?
      - Какова связь между рынком и районом?
  - id: london_ghost_sign
    name: Лондонская призрачная вывеска
    prompt: |
      Выцветшие надписи на кирпиче — призрачные вывески — отмечают прошлое. Найдите одну. Что она рекламировала? Кто ее видел?
    follow_ups:
      - Что было бы со стеной без вывески?
      - Как призрачная вывеска сохраняет историю?
      - Какова связь между вывеской и торговлей?
  - id: london_bollard
    name: Столбик
    prompt: |
      Столбики обозначают границы — пешеходные зоны, запрет на парковку. Найдите ряд столбиков. Что они защищают? Что они ограничивают?
    follow_ups:
      - Что было бы в этом месте без столбиков?
      - Как столбики формируют поток?
      - Какова связь между столбиком и границей?
  - id: london_door_number
    name: Номер двери
    prompt: |
      Лондонские адреса могут быть необычными — нечетные с одной стороны, четные с другой. Следуйте за номерами. Как нумерация формирует улицу?
    follow_ups:
      - Что было бы с навигацией без номеров?
      - Как нумерация создает порядок?
      - Какова связь между номером и местом?
  - id: london_basement
    name: Лондонский подвал
    prompt: |
      В лондонских домах часто есть подвалы — иногда ниже уровня улицы. Обратите внимание на ступени вниз, на пространство перед домом. Что находится под тротуаром?
    follow_ups:
      - Что было бы с домом без подвала?
      - Как подвал создает пространство?
      - Какова связь между подвалом и улицей?
  - id: london_roof_line
    name: Линия крыши
    prompt: |
      Линии крыш в Лондоне разнообразны — сланец, черепица, плоские. Посмотрите вверх. Проследите за силуэтом города. Как крыша формирует улицу?
    follow_ups:
      - Что было бы на улице без крыш?
      - Как линия крыши создает идентичность?
      - Какова связь между крышей и небом?
  - id: london_cobble
    name: Брусчатка
    prompt: |
      Брусчатка сохранилась на некоторых улицах. Пройдитесь по ней. Почувствуйте текстуру. Как поверхность формирует улицу?
    follow_ups:
      - Что было бы на улице без брусчатки?
      - Как брусчатка отмечает историю?
      - Какова связь между брусчаткой и современностью?
  - id: london_lamp_post
    name: Фонарный столб
    prompt: |
      Лондонские фонарные столбы имеют особый стиль — викторианский, современный. Найдите один. Как фонарь освещает улицу ночью?
    follow_ups:
      - Что было бы на улице без фонаря?
      - Как фонарь создает безопасность?
      - Какова связь между фонарем и темнотой?
  - id: london_bus_stop
    name: Автобусная остановка
    prompt: |
      Лондонские автобусные остановки имеют навесы, расписания, номера. Подождите на одной. Кто еще ждет? Каков этикет?
    follow_ups:
      - Что было бы на улице без остановки?
      - Как остановка создает сообщество?
      - Какова связь между остановкой и поездкой?
  - id: london_pub_sign
    name: Вывеска паба
    prompt: |
      Вывески пабов висят над улицей — "Корона", "Красный Лев". Найдите одну. Какое изображение? Какова история? Вывеска — это ориентир.
    follow_ups:
      - Что было бы на улице без вывески?
      - Как вывеска создает идентичность?
      - Какова связь между вывеской и пабом?
  - id: london_church_spire
    name: Шпиль церкви
    prompt: |
      Шпили церквей пронзают лондонский горизонт. Найдите один. Как шпиль ориентирует вас? Что было бы с видом без него?
    follow_ups:
      - Что было бы с горизонтом без шпиля?
      - Как шпиль создает ориентир?
      - Какова связь между шпилем и районом?
  - id: london_canal
    name: Лондонский канал
    prompt: |
      В Лондоне есть каналы — Риджентс-канал, Гранд-Юнион. Прогуляйтесь по набережной. Канал — это шов. Что находится по обе стороны?
    follow_ups:
      - Что было бы с городом без канала?
      - Как канал создает связь?
      - Какова связь между каналом и промышленностью?
  - id: london_garden_square
    name: Садовый сквер
    prompt: |
      Лондонские садовые скверы часто заперты. Загляните через калитку. Что внутри? У кого есть ключ? Сад — это скрытая комната.
    follow_ups:
      - Что было бы со сквером без сада?
      - Как сад создает эксклюзивность?
      - Какова связь между садом и сквером?
  - id: london_taxi
    name: Лондонское такси
    prompt: |
      Черные кэбы — это иконы. Наблюдайте, как они останавливаются, подбирают пассажиров, уезжают. Как такси формирует улицу? Что было бы с городом без него?
    follow_ups:
      - Что было бы на улице без такси?
      - Как такси создает мобильность?
      - Какова связь между такси и знаниями?
  - id: london_underground_tile
    name: Плитка метро
    prompt: |
      Станции метро имеют характерную плитку — Шерлок Холмс на Бейкер-стрит, синяя линия Виктория. Найдите станцию с индивидуальностью. Что говорят эти плитки?
    follow_ups:
      - Что было бы со станцией без плитки?
      - Как плитка создает идентичность?
      - Какова связь между плиткой и местом?
  - id: london_bench
    name: Лондонская скамейка
    prompt: |
      В Лондоне много скамеек — в парках, на улицах, у автобусных остановок. Посидите на одной. Кто еще сидит? Какой вид открывается?
    follow_ups:
      - Что было бы в этом месте без скамейки?
      - Как скамейка создает отдых?
      - Какова связь между скамейкой и улицей?
  - id: london_drain
    name: Лондонский дренаж
    prompt: |
      Посмотрите вниз. Найдите дренажное отверстие — желоб, решетку. Куда уходит вода? Дренаж — это портал к скрытым системам города.
