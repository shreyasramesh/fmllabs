# Jungla Urbana — Londres (Spanish)

id: urban_jungle_london
name: Jungla Urbana — Londres
description: 50 cartas para cambiar tu forma de ver Londres—desde la escala y la luz hasta las capas de historia y los ritmos de la vida en la calle.
domain: urban_jungle
cards:
  - id: london_layer
    name: Capa de Londres
    prompt: |
      Londres está construido en capas—romana, medieval, victoriana, moderna. Encuentra un lugar
      donde choquen las épocas. ¿Qué es lo más antiguo que puedes ver? ¿Lo más nuevo?
    follow_ups:
      - ¿Qué sería de la calle sin las capas?
      - ¿Cómo se manifiesta la historia en la forma construida?
      - ¿Cuál es la relación entre la capa y la identidad?
  - id: london_pub_threshold
    name: Umbral de Pub
    prompt: |
      Un pub londinense tiene un umbral—el escalón para subir, la puerta, la barra. Párate en el
      umbral. ¿Qué hay dentro? ¿Qué hay fuera? El pub es una habitación en la ciudad.
    follow_ups:
      - ¿Qué sería de la manzana sin el pub?
      - ¿Cómo crea el umbral la transición?
      - ¿Cuál es la relación entre el pub y la calle?
  - id: london_blue_plaque
    name: Placa Azul
    prompt: |
      Las placas azules marcan dónde vivió alguien famoso. Encuentra una. ¿Quién vivió aquí?
      ¿Qué hizo? La placa hace visible la historia.
    follow_ups:
      - ¿Qué sería del edificio sin la placa?
      - ¿Cómo moldea la placa la memoria?
      - ¿Cuál es la relación entre la placa y el lugar?
  - id: london_underground
    name: Subterráneo
    prompt: |
      El Metro es una ciudad bajo la ciudad. Desciende. Observa las baldosas, los
      mapas, las escaleras mecánicas. ¿Cómo moldea el subterráneo lo de arriba?
    follow_ups:
      - ¿Qué sería de Londres sin el Metro?
      - ¿Cómo crea el subterráneo la conexión?
      - ¿Cuál es la relación entre el Metro y la superficie?
  - id: london_thames_edge
    name: Borde del Támesis
    prompt: |
      El Támesis atraviesa Londres. Ve al terraplén. El río es una costura. ¿Qué hay a cada lado?
      ¿Cómo divide y conecta el río?
    follow_ups:
      - ¿Qué sería de Londres sin el Támesis?
      - ¿Cómo moldea el río la ciudad?
      - ¿Cuál es la relación entre el río y el borde?
  - id: london_georgian_row
    name: Fila Georgiana
    prompt: |
      Las hileras georgianas se repiten—puerta, ventana, puerta, ventana. Camina por una hilera.
      La repetición crea ritmo. ¿Qué lo rompe? ¿Qué lo mantiene unido?
    follow_ups:
      - ¿Qué sería de la calle sin la hilera?
      - ¿Cómo crea la repetición la identidad?
      - ¿Cuál es la relación entre la hilera y el individuo?
  - id: london_mews
    name: Mews
    prompt: |
      Los mews eran cuadras, ahora son casas. Encuentra uno. El callejón estrecho, los
      adoquines, las antiguas cocheras convertidas. ¿Cómo persiste el pasado?
    follow_ups:
      - ¿Qué sería del mews sin la historia?
      - ¿Cómo crea el mews la privacidad?
      - ¿Cuál es la relación entre el mews y la calle principal?
  - id: london_phone_box
    name: Cabina Telefónica
    prompt: |
      Las cabinas telefónicas rojas son iconos. Encuentra una. ¿Sigue siendo un teléfono? ¿Un desfibrilador?
      ¿Una biblioteca? ¿Cómo se reutilizan los iconos?
    follow_ups:
      - ¿Qué sería de la calle sin la cabina?
      - ¿Cómo marca la cabina la britanicidad?
      - ¿Cuál es la relación entre la cabina y la función?
  - id: london_postbox
