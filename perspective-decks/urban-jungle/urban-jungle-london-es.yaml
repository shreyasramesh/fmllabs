      - ¿Qué sería de la calle sin el buzón?
      - ¿Cómo marca el buzón el territorio?
      - ¿Cuál es la relación entre el buzón y la carta?
  - id: london_pavement
    name: Acera
    prompt: |
      "Pavement" británico es "sidewalk" americano. La palabra moldea nuestra forma de pensar.
