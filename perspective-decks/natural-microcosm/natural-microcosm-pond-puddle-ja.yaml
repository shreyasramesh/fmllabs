# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然の縮図 — 池と水たまり (Japanese)

id: natural_microcosm_pond_puddle
name: 自然の縮図 — 池と水たまり
description: 水の表面張力や反射から、水生昆虫、オタマジャクシ、一時的な水たまりに生息する生物まで、小規模な水への見方を変える50枚のカード。
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: 表面張力
    prompt: |
      アメンボが水面を歩く。水面が支えている—分子がくっついている。そっとピンを落とす。それは浮く。目に見えない膜を考えてみよう。何がそれを破るだろうか？
    follow_ups:
      - 表面張力は誰がここに住めるかをどのように形作っていますか？
      - それなしでは池はどうなりますか？
      - 表面と境界の関係は何ですか？
  - id: nmp_skater_ripple
    name: アメンボの波紋
    prompt: |
      アメンボの足が水面をくぼませる。一歩ごとに波紋ができる。その模様を見てみよう。アメンボは地図のように水面を読む。何を感じているのだろうか？
    follow_ups:
      - 波紋はどのように情報を伝えていますか？
      - 水面なしではアメンボはどうするだろうか？
      - 波紋と獲物の関係は何ですか？
  - id: nmp_reflection_sky
    name: 空の反射
    prompt: |
      水たまりが空、あるいは枝、あるいはあなたを映す。反射は反転する。静かな水は鏡だ。反射は何を加え、何を隠すだろうか？
    follow_ups:
      - 反射なしでは水たまりはどうなりますか？
      - 静けさはどのように私たちの見え方を形作っていますか？
      - 表面と画像の Ссылкиは何ですか？
  - id: nmp_tadpole_tail
    name: オタマジャクシの尾
    prompt: |
      オタマジャクシが泳ぐ—尾で推進する。尾は再吸収されるだろう。その動物は変容している。その中間を考えてみよう。今、尾は何を可能にしているのだろうか？
    follow_ups:
      - 尾なしではオタマジャクシはどうなりますか？
      - 変態はどのように体を書き換えますか？
      - 形態と機能の関係は何ですか？
  - id: nmp_dragonfly_egg
    name: トンボの卵
    prompt: |
      トンボは水中に、あるいは水面下の茎に卵を産む。幼虫は成虫になるまで何年も水中で過ごす。二重生活を考えてみよう。水と空を結びつけるものは何か？
    follow_ups:
      - 水生段階なしではトンボはどうなりますか？
      - 幼虫はどのように池を形作っていますか？
      - 幼虫と成虫の関係は何ですか？
  - id: nmp_algae_bloom
    name: 藻類の大量発生
    prompt: |
      水面の緑色のぬめり—藻類。それは開花、脈動だ。栄養過多、太陽光過多。池は反応する。何がそれを引き起こし、何が続くのか？
    follow_ups:
      - 藻類なしでは池はどうなりますか？
      - 大量発生は酸素にどのように影響しますか？
      - 栄養と成長の関係は何ですか？
  - id: nmp_reed_stem
    name: ヨシの茎
    prompt: |
      ヨシやガマが縁から伸びる。それらは中空で、空気の通路が通っている。茎は水と空をつなぐ。誰がヨシをはしごとして使うのだろうか？
    follow_ups:
      - ヨシなしでは縁はどうなりますか？
      - 中空はどのように生存を可能にしていますか？
      - 茎と生息地の関係は何ですか？
  - id: nmp_pond_skin
    name: 池の皮膜
    prompt: |
      池には皮膜がある—水と空が出会う場所。ほこりが落ちる。油が広がる。その皮膜は繊細だ。触れてみよう。その皮膜は何を隔てているのか？
    follow_ups:
      - 皮膜なしでは池はどうなりますか？
      - 皮膜はガス交換にどのように影響しますか？
      - 表面と深さの関係は何ですか？
  - id: nmp_temporary_pool
    name: 一時的な水たまり
    prompt: |
      雨上がりの水たまり—それは乾くだろう。それでも生命は適応してきた。フェアリーシュリンプ、タドポリシュリンプ、待つ卵。緊急性を考えてみよう。水がなくなる前に何が起こる必要があるのか？
    follow_ups:
      - 永続的であれば水たまりはどうなりますか？
      - 一時性はどのように戦略を形作っていますか？
      - 時間と適応の関係は何ですか？
  - id: nmp_whirligig_gyre
    name: ミズスマシの渦
    prompt: |
      ミズスマシが水面を回転して泳ぐ。彼らは上下両方を見る—二重の目。彼らは捕食者であり獲物でもある。二重視覚を考えてみよう。それは何を可能にしているのだろうか？
    follow_ups:
      - 二重視覚なしではミズスマシはどうなりますか？
      - 渦はどのように捕食者を混乱させますか？
      - 回転と生存の関係は何ですか？
  - id: nmp_diving_spider
    name: ダイビングスパイダー
    prompt: |
      ダイビングスパイダーは空気の泡—ダイビングベル—を運ぶ。それは水中で呼吸する。泡は肺だ。その発明を考えてみよう。それなしではスパイダーはどうするだろうか？
    follow_ups:
      - 泡はどのように狩りを可能にしていますか？
      - 泡が破裂したらどうなりますか？
      - 空気と水の Ссылкиは何ですか？
  - id: nmp_pond_scum
    name: 池のぬめり
    prompt: |
      縁にぬめりができる—花粉、ほこり、藻類、昆虫。それは境界層だ。そこに何が集まるのか？誰がそれに餌を食べるのか？ぬめりはフィルターだ。
    follow_ups:
      - ぬめりなしでは池はどうなりますか？
      - 縁はどのように生命を集中させますか？
      - 境界と蓄積の関係は何ですか？
  - id: nmp_ice_surface
    name: 氷の表面
    prompt: |
      冬には、池が凍る。氷が支える。その下では、生命は続く—より遅く、より寒く。その障壁を考えてみよう。氷は何を守り、何を遮るのだろうか？
    follow_ups:
      - 氷なしでは池はどうなりますか？
      - 凍結は酸素にどのように影響しますか？
      - 氷と生存の関係は何ですか？
  - id: nmp_minnow_school
    name: コイ科の群れ
    prompt: |
      コイ科の魚は群れをなす—一つとして動く。群れは防御であり、効率である。同期を見てみよう。何がそれらを調整しているのだろうか？単独のコイ科の魚は何を危険にさらすだろうか？
    follow_ups:
      - 群れなしでは池はどうなりますか？
      - 群れることはどのように捕食を減らしますか？
      - 個体と集団の関係は何ですか？
  - id: nmp_lily_pad
    name: 睡蓮の葉
    prompt: |
      睡蓮の葉が浮かんでいる。その裏側は表側とは違う—毛、色。葉はプラットフォームだ。何がそれに着陸し、何が下に住んでいるのだろうか？
    follow_ups:
      - 睡蓮の葉なしでは池はどうなりますか？
      - 葉はどのように下の光を形作っていますか？
      - 葉と影の関係は何ですか？
  - id: nmp_ripple_spread
    name: 波紋の広がり
    prompt: |
      石が落ちる。波紋が広がる。それらは交差し、干渉する。その模様はエネルギーを運ぶ。減衰を考えてみよう。波紋はどこまで広がるのか？
    follow_ups:
      - 波紋なしでは表面はどうなりますか？
      - 波紋はどのように衝撃をマークしますか？
      - 摂動と伝播の関係は何ですか？
  - id: nmp_mosquito_wiggle
    name: カの幼虫の揺れ
    prompt: |
      蚊の幼虫が水面からぶら下がっている—ウィグラー。彼らはサイフォンを通して呼吸する。その揺れは動きであり、摂食だ。幼虫の世界を考えてみよう。何を食べたのだろうか？
    follow_ups:
      - 蚊なしでは池はどうなりますか？
      - 揺れはどのように捕食者を避けるのですか？
      - 幼虫と成虫の関係は何ですか？
  - id: nmp_leaf_boat
    name: 葉の舟
    prompt: |
      葉が浮いている—落ちて、漂っている。それはある者にとっては筏、ある者にとっては食料だ。葉は沈み、腐敗するだろう。その旅をたどってみよう。何になるのだろうか？
    follow_ups:
      - 浮遊する破片なしでは表面はどうなりますか？
      - 葉はどのようにマイクロハビタットを生成しますか？
      - 浮力と沈降の関係は何ですか？
  - id: nmp_backswimmer_top
    name: コオイムシの逆さま泳ぎ
    prompt: |
      コオイムシは逆さまに泳ぐ—腹を空に向ける。足で漕ぐ。水面で呼吸し、そして潜る。その反転を考えてみよう。なぜ逆さまなのか？
    follow_ups:
      - 正しい向きならコオイムシはどうなりますか？
      - その姿勢はどのように狩りを助けますか？
      - 方位と獲物の関係は何ですか？
  - id: nmp_snail_trail
    name: カタツムリの跡
    prompt: |
      池のカタツムリが滑る。それは跡を残す—粘液、動き。その跡はどこを通ったかを示す。他のカタツムリが続くかもしれない。その道を考えてみよう。その跡は何を伝えているのだろうか？
    follow_ups:
      - 跡なしではカタツムリはどうなりますか？
      - 粘液はどのように移動を可能にしますか？
      - 跡と追従の関係は何ですか？
  - id: nmp_dew_drop
    name: 露の滴
    prompt: |
      水面上の葉に露ができる—粒、反射。それは結露だ。その滴は保持される。そして落ちる。その滴を考えてみよう。それは何を拡大しているのだろうか？
    follow_ups:
      - 露なしでは葉はどうなりますか？
      - 滴はどのように光を曲げますか？
      - 滴と表面の関係は何ですか？
  - id: nmp_spring_constant
    name: 源泉の定数
    prompt: |
      泉が池に流れ込む—あるいは池が染み出す。水位はバランスだ。入出力について考えてみよう。何がその水たまりを維持しているのか？何がそれを乾かすのだろうか？
    follow_ups:
      - 泉なしでは池はどうなりますか？
      - 源泉はどのように水を形作っていますか？
      - 入力と生命の関係は何ですか？
  - id: nmp_edge_ecotone
    name: 縁のエコトーン
    prompt: |
      池の縁はエコトーン—移行地帯だ。湿った場所と乾いた場所が出会う。植物は適応する。動物は横断する。その縁は多様性だ。中間に何が繁栄しているのだろうか？
    follow_ups:
      - 縁なしでは池はどうなりますか？
      - エコトーンはどのように機会を創出しますか？
      - 境界と多様性の関係は何ですか？
  - id: nmp_frog_eye
    name: カエルの目
    prompt: |
      カエルが縁に座っている。その目は飛び出している—上下、そして前方を見ている。カエルは静止している。そして舌が飛び出す。その忍耐を考えてみよう。何のために待っているのだろうか？
    follow_ups:
      - 飛び出した目なしではカエルはどうなりますか？
      - 静止はどのように一撃を可能にしますか？
      - 待ちと捕獲の関係は何ですか？
  - id: nmp_oxygen_bubble
    name: 酸素の泡
    prompt: |
      池の植物は酸素を生成する—泡が上がる。晴れた日には、水が呼吸している。その交換を考えてみよう。光合成なしでは池はどうなるだろうか？
    follow_ups:
      - 酸素は誰がここに住めるかをどのように形作っていますか？
      - 酸素が不足するとどうなりますか？
      - 光と息の関係は何ですか？
  - id: nmp_detritus_floor
    name: 腐敗物の底
    prompt: |
      池の底は腐敗物—落ち葉、死んだ昆虫、堆積物だ。それは腐敗の層だ。そこに何が住んでいるのか？誰がそれに餌を食べているのか？その底は貯蔵庫だ。
    follow_ups:
      - 腐敗物なしでは池はどうなりますか？
      - 底はどのように水柱を支えていますか？
      - 底と上部の関係は何ですか？
  - id: nmp_rain_ring
    name: 雨の輪
    prompt: |
      雨が水面に当たる。それぞれの滴が輪を作る—王冠、そしてクレーター。雨は水をテクスチャ化する。その模様を考えてみよう。静かな表面は何を意味するだろうか？
    follow_ups:
      - 雨なしでは水面はどうなりますか？
      - 雨はどのように水を酸素化しますか？
      - 輪は何を妨害しますか？
      - 雨と表面の関係は何ですか？
  - id: nmp_duckweed_carpet
    name: ウキクサの絨毯
    prompt: |
      ウキクサが水面を覆う—小さな浮遊植物。それらは急速に増殖する。その絨毯は下のものを影にする。その広がりを考えてみよう。完全な日差しは何を意味するだろうか？
    follow_ups:
      - ウキクサなしでは池はどうなりますか？
      - 絨毯はどのように温度に影響しますか？
      - 被覆と下の生命の関係は何ですか？
  - id: nmp_phantom_midgie
    name: ユスリカの幼虫（透明）
    prompt: |
      ユスリカの幼虫は透明—幽霊のようだ。それらは水中にぶら下がっている。あなたはそれらを通して見ることができる。透明性を考えてみよう。透明性は何を保護するのだろうか？
    follow_ups:
      - 不透明なら幼虫はどうなりますか？
      - 透明性はどのように捕食を助けますか？
      - 透けて見えることと生存の関係は何ですか？
  - id: nmp_skimmer_skip
    name: 石投げの跳ね
    prompt: |
      水面を滑るように投げられた石—1、2、3。それぞれの跳ねがエネルギーを伝達する。滑る石は最終的に沈む。限界を考えてみよう。何が跳ねの回数を決定するのだろうか？
    follow_ups:
      - 回転なしでは石はどうなりますか？
      - 角度はどのように跳ねを形作りますか？
      - 投げると跳ねの関係は何ですか？
  - id: nmp_pollinator_drink
    name: 訪花昆虫の飲み水
    prompt: |
      蜂が縁で水を飲む。蝶が泥水たまりに集まる。その水は資源だ。誰が来るかを考えてみよう。彼らは水から何を必要としているのだろうか？
    follow_ups:
      - 水たまりなしでは訪花昆虫はどうしますか？
      - 縁はどのように飲水を可能にしますか？
      - 水と鉱物の関係は何ですか？
  - id: nmp_evaporation_skin
    name: 蒸発の皮膜
    prompt: |
      池は蒸発によって水を失う。夏には、水位が下がる。岸辺が広がる。その後退を考えてみよう。何が露出するのだろうか？誰が立ち往生するのだろうか？
    follow_ups:
      - 蒸発なしでは池はどうなりますか？
      - 減少はどのように生命を濃縮しますか？
      - 損失と濃縮の関係は何ですか？
  - id: nmp_hydra_stalk
    name: ヒドラの柄
    prompt: |
      ヒドラ—小さく、触手がある—茎に固定される。それは獲物を刺し、引き寄せる。ヒドラは再生できる。その単純さを考えてみよう。どのような体プランを使っているのだろうか？
    follow_ups:
      - ヒドラなしでは池はどうなりますか？
      - 再生はどのように生存を助けますか？
      - 単純さと回復力の関係は何ですか？
  - id: nmp_boatman_row
    name: タイコウチの漕ぎ
    prompt: |
      タイコウチが漕ぐ—オールのような足。それはしばしば逆さまに、水面にくっついている。それは藻類を食べる。オールを考えてみよう。それは何を推進しているのだろうか？
    follow_ups:
      - オールなしではタイコウチはどうなりますか？
      - 漕ぎはコオイムシとどう違いますか？
      - 足と動きの関係は何ですか？
  - id: nmp_caddisfly_case
    name: トビケラの巣
    prompt: |
      トビケラの幼虫は巣を作る—小枝、石、貝殻。絹でそれらを貼り付ける。その巣は鎧であり、カモフラージュでもある。その構築を考えてみよう。幼虫は何を選ぶのだろうか？
    follow_ups:
      - 巣なしでは幼虫はどうなりますか？
      - 巣は生息地によってどのように異なりますか？
      - 材料と保護の関係は何ですか？
  - id: nmp_damselfly_emergence
    name: クロトンボの羽化
    prompt: |
      クロトンボが羽化する—幼虫が茎を這い上がり、皮を破り、成虫が自由になる。翼が広がる。その瞬間は脆弱だ。その変容を考えてみよう。何がうまくいかなくなる可能性があるだろうか？
    follow_ups:
      - 登る行為なしでは成虫はどうなりますか？
      - 羽化はどのようにタイミングを形作りますか？
      - 幼虫と成虫の関係は何ですか？
  - id: nmp_floating_feather
    name: 浮遊する羽
    prompt: |
      羽が浮いている—鳥が捨てたもの。それは水面を漂う。水がそれに玉になる。その羽を考えてみよう。何が鳥を乾いたままに保ったのだろうか？その羽は今何をしているのだろうか？
    follow_ups:
      - 浮遊する物体なしでは表面はどうなりますか？
      - 羽はどのように空気を閉じ込めますか？
      - 構造と浮力の関係は何ですか？
  - id: nmp_moon_jelly
    name: ミズクラゲ
    prompt: |
      一部の池にはクラゲ—ミズクラゲがいる。それらは脈動する。それらはほとんど水だ。その体を考えてみよう。ゼリーは何を捉え、何を避けるのだろうか？
    follow_ups:
      - クラゲなしでは池はどうなりますか？
      - 脈動はどのように動きを生み出しますか？
      - 水と体の関係は何ですか？
  - id: nmp_seep_source
    name: 染み出し源
    prompt: |
      水が岸辺から染み出す—湧き水、ゆっくりとした流れ。その染み出しが池に供給する。あるいは池が漏れている。その境界を考えてみよう。何が横断し、何が保持されているのだろうか？
    follow_ups:
      - 染み出しなしでは池はどうなりますか？
      - 染み出しはどのように化学を形作っていますか？
      - 源泉と水たまりの関係は何ですか？
  - id: nmp_wind_wave
    name: 風の波
    prompt: |
      風が水面を押す。小さな波ができる。それらは縁で砕ける。距離—風が水面を移動する距離—を考えてみよう。波は何によって形作られるのだろうか？
    follow_ups:
      - 風なしでは表面はどうなりますか？
      - 波はどのように酸素に影響しますか？
      - 風と混合の関係は何ですか？
  - id: nmp_rotifer_wheel
    name: ワムシの車輪
    prompt: |
      ワムシは微細—それらは車輪状の繊毛を持っている。それは回転し、食物を引き込む。ワムシはエンジンだ。その規模を考えてみよう。この水には他に何があるのだろうか？
    follow_ups:
      - ワムシなしでは池はどうなりますか？
      - 車輪はどのように流れを生み出しますか？
      - 繊毛と摂食の関係は何ですか？
  - id: nmp_temperature_layer
    name: 温度層
    prompt: |
      池は層状になることがある—上は暖かく、下は冷たい。層は容易に混ざらない。その境界を考えてみよう。どこに何が住んでいるのか？池が転覆したとき何が起こるのだろうか？
    follow_ups:
      - 層構造なしでは池はどうなりますか？
      - 温度はどのように酸素を形作りますか？
      - 層と生命の関係は何ですか？
  - id: nmp_predator_shadow
    name: 捕食者の影
    prompt: |
      魚の影が通り過ぎる。獲物は静止し、散らばる。影は合図だ。その反応を考えてみよう。常に影があることは何を意味するだろうか？影がないことは何を意味するだろうか？
    follow_ups:
      - 影はどのように逃走を引き起こしますか？
      - 影以外にどのような手がかりが重要ですか？
      - 影と生存の関係は何ですか？
  - id: nmp_surface_film
    name: 水面膜
    prompt: |
      水面上の薄い膜—花粉、バクテリア、有機物。それは重さを支えることができる。一部の昆虫はそれに乗って歩く。その膜を考えてみよう。何がそれを破るだろうか？
    follow_ups:
      - 膜なしでは表面はどうなりますか？
      - 膜はガス交換にどのように影響しますか？
      - 膜と境界の関係は何ですか？
  - id: nmp_dry_wait
    name: 乾燥待機
    prompt: |
      水たまりは乾くだろう。一部の生物は乾燥耐性のある卵を持っている。それらは待つ。次の雨は数ヶ月後かもしれない。その賭けを考えてみよう。成功のためには何が一致する必要があるのか？
    follow_ups:
      - 待機なしでは水たまりはどうなりますか？
      - 休眠はどのように乾燥期間を跨ぎますか？
      - 卵と雨の関係は何ですか？
  - id: nmp_shoreline_wrack
    name: 岸辺の漂着物
    prompt: |
      岸辺にゴミが集まる—葉、小枝、死んだ昆虫。その漂着物は線だ。それは高水位を示す。その蓄積を考えてみよう。誰がここで餌を食べているのか？
    follow_ups:
      - 漂着物なしでは縁はどうなりますか？
      - 漂着物はどのように生息地を創出しますか？
      - 線と水位の関係は何ですか？
  - id: nmp_duckweed_carpet
    name: ウキクサの絨毯
    prompt: |
      ウキクサが静止した水を覆う—小さな緑色の円盤。それは急速に広がる。表面は固くなる。その侵入を考えてみよう。その絨毯は何を遮断し、何を可能にするのだろうか？
    follow_ups:
      - ウキクサなしでは池はどうなりますか？
      - 絨毯はどのように光と酸素に影響しますか？
      - 被覆と下の生命の関係は何ですか？
  - id: nmp_rain_ring
    name: 雨の輪
    prompt: |
      雨滴が水面に当たる。輪が広がり、消える。シャワーの中では、表面はテクスチャになる—輪が重なり合う。その模様を考えてみよう。雨は池に何をするのだろうか？
    follow_ups:
      - 雨なしでは表面はどうなりますか？
      - 雨はどのように水を混ぜますか？
      - 滴と輪の関係は何ですか？
  - id: nmp_minnow_school
    name: コイ科の群れ
    prompt: |
      コイ科の魚は群れをなす—数十匹が一つのように動く。群れは戦略だ。捕食者は混乱する。その協調を考えてみよう。どのように決めているのだろうか？孤独はどんな代償を払うのだろうか？
    follow_ups:
      - 群れなしでは池はどうなりますか？
      - 群れはどのように脅威に応答しますか？
      - 多数と一つの関係は何ですか？
  - id: nmp_ice_edge
    name: 氷の縁
    prompt: |
      冬には、氷が縁から成長する。境界が前進する。その下では、生命は存続する—より寒く、より遅く。その縁を考えてみよう。氷の下で何が生き残るのだろうか？
    follow_ups:
      - 氷なしでは池はどうなりますか？
      - 氷はどのように保護または脅威になりますか？
      - 凍結と酸素の関係は何ですか？
