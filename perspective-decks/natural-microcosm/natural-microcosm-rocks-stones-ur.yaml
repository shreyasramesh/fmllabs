# قدرتی خورد — چٹانیں اور پتھر (Urdu)

id: natural_microcosm_rocks_stones
name: قدرتی خورد — چٹانیں اور پتھر
description: 50 کارڈ جو چٹانوں اور پتھروں کو دیکھنے کے انداز کو بدلیں — ارضیاتی وقت اور لائیکن سے لے کر موسم، کٹاؤ، اور معدنیات کی سست رفتار زندگی تک۔
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: لائیکن کا نقشہ
    prompt: |
      لائیکن پتھر پر اگتا ہے — سست، صبر سے۔ نارنجی، سرمئی، سبز۔ یہ ایک
      جاندار نہیں بلکہ دو ہیں: فنگس اور سیوال۔ شراکت داری پر غور کریں۔ پتھر کیا پیش کرتا ہے؟ لائیکن کیا واپس دیتا ہے؟
    follow_ups:
      - لائیکن کے بغیر پتھر کیسا نظر آئے گا؟
      - لائیکن وقت کا نشان کیسے بناتا ہے؟
      - لائیکن اور کٹاؤ کے درمیان کیا تعلق ہے؟
  - id: nmr_pebble_smooth
    name: کنکر کی ہمواری
    prompt: |
      دریا کا کنکر ہموار ہوتا ہے — پانی اور ریت نے اسے گھسا دیا ہے۔ ایک اٹھائیں۔
      اس میں کتنے سال لگے؟ ہمواری سفر کا ایک ریکارڈ ہے۔ تیز دھار کا کیا مطلب ہوگا؟
    follow_ups:
      - ہمواری تاریخ کا انکشاف کیسے کرتی ہے؟
      - پانی کے بغیر کنکر کیسا ہوگا؟
      - شکل اور بہاؤ کے درمیان کیا تعلق ہے؟
  - id: nmr_crack_frost
    name: ٹھنڈی دراڑ
    prompt: |
      دراڑ میں پانی جم جاتا ہے، پھیلتا ہے۔ پتھر پھٹ جاتا ہے۔ یہ سست تشدد ہے۔
      ایک دراڑ والا پتھر تلاش کریں۔ جمنے اور پگھلنے کے چکروں پر غور کریں
      جنہوں نے اسے بنایا۔
    follow_ups:
      - دراڑ کے بغیر پتھر کیسا ہوگا؟
      - ٹھنڈ کس طرح منظر کو شکل دیتی ہے؟
      - پانی اور دراڑ کے درمیان کیا تعلق ہے؟
  - id: nmr_stone_warmth
    name: پتھر کی گرمی
    prompt: |
      سورج سے گرم ہونے والا پتھر حرارت کو برقرار رکھتا ہے۔ شام کو اس پر بیٹھیں.
      پتھر اسے چھوڑ دیتا ہے جو اس نے جذب کیا۔ تبادلے پر غور کریں۔ سورج کے بغیر پتھر کیسا ہوگا؟
    follow_ups:
      - پتھر کس طرح مائیکرو کلائمیٹ بناتا ہے؟
      - کون سے مخلوق اس گرمی کا استعمال کرتے ہیں؟
      - پتھر اور حرارت کے درمیان کیا تعلق ہے؟
  - id: nmr_moss_crust
    name: کائی کی پرت
    prompt: |
      کائی پتھر پر اگتی ہے — ایک پتلی پرت۔ یہ نمی کو برقرار رکھتی ہے، دھول کو
      روکتی ہے۔ پتھر ایک سبسٹریٹ بن جاتا ہے۔ پتھر کب مٹی بن جاتا ہے؟ کہاں حد ہے؟
    follow_ups:
      - کائی کے بغیر پتھر کیسا ہوگا؟
      - پرت تبدیلی کو کس طرح تیز کرتی ہے؟
      - معدنیات اور نامیاتی مادے کے درمیان کیا تعلق ہے؟
  - id: nmr_vein_quartz
    name: کوارٹز کی رگ
    prompt: |
      کوارٹز کی ایک رگ پتھر کو کاٹتی ہے — ایک مختلف معدنیات کا جوڑ۔ یہ ایک
      دراڑ، ایک بھرائی کو نشان زد کرتا ہے۔ لکیر کا سراغ لگائیں۔ کن قوتوں نے اسے بنایا؟ رگ کیا ظاہر کرتی ہے؟
    follow_ups:
      - رگ کے بغیر پتھر کیسا ہوگا؟
      - رگ گہرے وقت کو کیسے نشان زد کرتی ہے؟
      - دراڑ اور خوبصورتی کے درمیان کیا تعلق ہے؟
  - id: nmr_puddle_reflect
    name: پتھر میں تالاب
    prompt: |
      بارش کے بعد پتھر میں گڑھا پانی کو روک لیتا ہے۔ یہ ایک ننھا سا تالاب ہے — ایک پیالہ۔ اس میں کیا منعکس ہوتا ہے؟ کیا بخارات بن جاتا ہے؟ پتھر نے ایک برتن بنایا ہے۔
    follow_ups:
      - گڑھے کے بغیر پتھر کیسا ہوگا؟
      - تالاب کس طرح رہائش گاہ بناتا ہے؟
      - کھود اور وقت کے درمیان کیا تعلق ہے؟
  - id: nmr_sand_grain
    name: ریت کا دانہ
    prompt: |
      ریت پتھر کا ٹوٹا ہوا چھوٹا حصہ ہے۔ مٹھی بھر پکڑیں۔ ہر دانہ کبھی کسی
      بڑی چیز کا حصہ تھا۔ پیمانے پر غور کریں۔ ایک پہاڑ میں کتنے دانے ہیں؟
    follow_ups:
      - دانوں کے بغیر ساحل کیسا ہوگا؟
      - دانہ کا سائز کہانی کیسے سناتا ہے؟
      - مکمل اور ٹکڑے کے درمیان کیا تعلق ہے؟
  - id: nmr_stone_circle
    name: پتھر کا دائرہ
    prompt: |
      ہاتھ یا گلیشیر سے ترتیب دیے گئے پتھر — ایک دائرہ، ایک کیرن، ایک دیوار۔ کسی
      نے یا کسی چیز نے انہیں رکھا۔ ارادے پر غور کریں۔ ترتیب کا کیا مطلب ہے؟
    follow_ups:
      - پتھروں کے بغیر جگہ کیسی ہوگی؟
      - ترتیب کس طرح معنی پیدا کرتی ہے؟
      - پتھر اور رسم کے درمیان کیا تعلق ہے؟
  - id: nmr_erosion_edge
    name: کٹاؤ کا کنارہ
    prompt: |
      ہوا اور پانی پتھر کو تراشتے ہیں۔ ایک کنارے کو تلاش کریں — ایک چٹان، ایک
      بھاری پتھر۔ شکل ہٹانے کا نتیجہ ہے۔ پہلے کیا تھا؟ کیا باقی رہے گا؟
    follow_ups:
      - کٹاؤ کے بغیر منظر کیسا ہوگا؟
      - کنارہ وقت کو کیسے نشان زد کرتا ہے؟
      - نقصان اور شکل کے درمیان کیا تعلق ہے؟
  - id: nmr_color_streak
    name: رنگ کی لکیر
    prompt: |
      پتھر یکساں نہیں ہوتا — لوہا سرخ، مینگنیج سیاہ، تانبا سبز داغ لگاتا ہے۔
      ایک لکیر کا سراغ لگائیں۔ رنگ کیمسٹری ہے۔ یہ پتھر کی تاریخ کے بارے میں کیا ظاہر کرتا ہے؟
    follow_ups:
      - رنگ کے بغیر پتھر کیسا ہوگا؟
      - معدنیات کس طرح پینٹ کو شکل دیتی ہے؟
      - عنصر اور رنگ کے درمیان کیا تعلق ہے؟
  - id: nmr_scratch_glacier
    name: گلیشیر کا خراش
    prompt: |
      گلیشیر کے نشان — چٹانی سطح پر خراشیں — اس بات کا نشان لگاتے ہیں کہ برف نے پتھروں کو پتھر پر کیسے گھسیٹا۔ لکیریں متوازی ہیں۔ قوت پر غور کریں۔ کیا حرکت کی؟
      کیا ساکن رہا؟
    follow_ups:
      - خراشوں کے بغیر پتھر کیا دکھائے گا؟
      - خراش سمت کو کیسے نشان زد کرتی ہے؟
      - برف اور پتھر کے درمیان کیا تعلق ہے؟
  - id: nmr_cobble_pattern
    name: گنبد کا نمونہ
    prompt: |
      گنبد کا ساحل یا دریا کا کنارہ — یکساں سائز، مختلف شکل۔ پانی نے
      انہیں ترتیب دیا ہے۔ نمونے پر غور کریں۔ ترتیب آپ کو کیا بتاتی ہے؟
    follow_ups:
      - ترتیب کے بغیر ساحل کیسا ہوگا؟
      - بہاؤ کس طرح نمونے کو شکل دیتا ہے؟
      - سائز اور نقل و حمل کے درمیان کیا تعلق ہے؟
  - id: nmr_cavern_drip
    name: غار کا قطرہ
    prompt: |
      اسٹیلٹائٹس قطرہ بہ قطرہ بنتے ہیں — ٹپکتے ہوئے پانی سے معدنیات جمع ہوتی ہیں۔
      نمو ناقابلِ ادراک ہے۔ وقت کے پیمانے پر غور کریں۔ تیز رفتار فلم کیا دکھائے گی؟
    follow_ups:
      - قطرے کے بغیر غار کیسا ہوگا؟
      - قطرہ آب و ہوا کا ریکارڈ کیسے بناتا ہے؟
      - پانی اور پتھر کے درمیان کیا تعلق ہے؟
  - id: nmr_boulder_shadow
    name: پتھر کا سایہ
    prompt: |
      ایک بڑا پتھر سایہ ڈالتا ہے۔ اس کے نیچے کی زمین مختلف ہے — ٹھنڈی، نم، کم دھوپ۔ پتھر ایک مائیکرو کلائمیٹ بناتا ہے۔ کون سایہ میں رہتا ہے؟
    follow_ups:
      - پتھر کے بغیر ڈھلوان کیسی ہوگی؟
      - سایہ زندگی کو کس طرح شکل دیتا ہے؟
      - پتھر اور پناہ گاہ کے درمیان کیا تعلق ہے؟
  - id: nmr_fossil_impression
    name: جیواشم کا نقوش
    prompt: |
      جیواشم پتھر میں بدلی ہوئی زندگی ہے — یا تلچھٹ میں چھوڑی ہوئی ایک نقوش۔
      اگر آپ کو کوئی مل جائے تو اسے تلاش کریں۔ پتھر یادداشت رکھتا ہے۔ یہ کس مخلوق نے چھوڑا؟
      کب؟
    follow_ups:
      - جیواشم کے بغیر پتھر کیسا ہوگا؟
      - نقوش کس طرح محفوظ رہتا ہے؟
      - زندگی اور معدنیات کے درمیان کیا تعلق ہے؟
  - id: nmr_grit_texture
    name: ریت کا ساخت
    prompt: |
      اپنا ہاتھ پتھر پر پھیریں۔ سینڈ اسٹون گرینائٹ سے مختلف محسوس ہوتا ہے،
      سلیٹ بیسالٹ سے۔ ساخت معدنیات، دانہ، ڈھانچہ ہے۔ چھونے سے کیا معلوم ہوتا ہے؟
    follow_ups:
      - ساخت کے بغیر پتھر کیسا ہوگا؟
      - ساخت اصل کا انکشاف کیسے کرتی ہے؟
      - احساس اور ساخت کے درمیان کیا تعلق ہے؟
  - id: nmr_talus_slope
    name: ٹیلوس ڈھلوان
    prompt: |
      ایک ٹیلوس ڈھلوان — چٹان کے نیچے ٹوٹا ہوا پتھر۔ کشش ثقل اور موسم اسے
      نیچے لاتے ہیں۔ ڈھلوان نتائج کا ایک ڈھیر ہے۔ اسے جمع ہونے میں کتنا وقت لگا؟
    follow_ups:
      - ڈھلوان کی بنیاد کے بغیر ڈھلوان کیسی ہوگی؟
      - ڈھلوان کٹاؤ کو کس طرح نشان زد کرتی ہے؟
      - زوال اور ڈھیر کے درمیان کیا تعلق ہے؟
  - id: nmr_soil_horizon
    name: مٹی کا افق
    prompt: |
      احتیاط سے کھودیں۔ مٹی کی تہہ ہوتی ہے — اوپر نامیاتی، نیچے معدنی، کبھی
      کبھی واضح بینڈ۔ افق تاریخ ہے۔ ہر تہہ کس نے بنائی؟
    follow_ups:
      - افق کے بغیر زمین کیسی ہوگی؟
      - افق وقت کا ریکارڈ کیسے بناتا ہے؟
      - پتھر اور مٹی کے درمیان کیا تعلق ہے؟
  - id: nmr_drystone_wall
    name: خشک پتھر کی دیوار
    prompt: |
      ایک خشک پتھر کی دیوار — بغیر کسی گارے کے فٹ کیے گئے پتھر۔ دیوار کشش
      ثقل اور فٹ سے برقرار رہتی ہے۔ دستکاری پر غور کریں۔ ہر پتھر اگلے کو کس طرح سہارا دیتا ہے؟
    follow_ups:
      - دیوار کے بغیر کھیت کیسا ہوگا؟
      - دیوار علاقہ کو کس طرح نشان زد کرتی ہے؟
      - پتھر اور سرحد کے درمیان کیا تعلق ہے؟
  - id: nmr_tide_pool_rock
    name: مد و جزر تالاب کا پتھر
    prompt: |
      مد و جزر کے تالاب میں پتھر گیلے، خشک، پھر گیلے ہوتے ہیں۔ مخلوقات
      چپک جاتی ہیں۔ پتھر رہائش گاہ ہے۔ مد و جزر کے تالاب کی تال پر غور کریں۔ پتھر کیا تجربہ کرتا ہے؟
    follow_ups:
      - پتھر کے بغیر تالاب کیسا ہوگا؟
      - پتھر کس طرح سطح بناتا ہے؟
      - پتھر اور مد و جزر کے درمیان کیا تعلق ہے؟
  - id: nmr_crystal_face
    name: کرسٹل کا چہرہ
    prompt: |
      کچھ پتھر کرسٹل کے چہرے دکھاتے ہیں — کٹے ہوئے طیارے، جیومیٹرک شکل۔
      کرسٹل ایک گہا میں، سست ترتیب سے بڑھا۔ جیومیٹری پر غور کریں۔ کن قوتوں نے اسے شکل دی؟
    follow_ups:
      - کرسٹل کے بغیر پتھر کیسا ہوگا؟
      - چہرہ ساخت کا انکشاف کیسے کرتا ہے؟
      - ترتیب اور معدنیات کے درمیان کیا تعلق ہے؟
  - id: nmr_dust_coating
    name: دھول کی کوٹنگ
    prompt: |
      پتھر پر دھول جمع ہوتی ہے — پولن، کوڑا، معدنیات۔ وقت کے ساتھ یہ سیاہ ہو جاتا ہے۔
      کوٹنگ جمع ہوتی ہے۔ اگر دھویا جائے تو پتھر کیسا نظر آئے گا؟ کوٹنگ اسے کیسے بدلتی ہے؟
    follow_ups:
      - کوٹنگ کے بغیر پتھر کیسا ہوگا؟
      - دھول ماحول کو کیسے نشان زد کرتی ہے؟
      - سطح اور جمع کے درمیان کیا تعلق ہے؟
  - id: nmr_river_sculpt
    name: دریا کی تراش
    prompt: |
      ایک دریا اپنے بستر کو تراشتا ہے — گھڑے، تالاب، چٹانیں۔ پتھر پانی اور
      تلچھٹ سے شکل لیتا ہے۔ ایک حصے کو تلاش کریں۔ تراش کو پڑھیں۔ شکل کیا ظاہر کرتی ہے؟
    follow_ups:
      - تراش کے بغیر دریا کا بستر کیسا ہوگا؟
      - بہاؤ پتھر کو کس طرح شکل دیتا ہے؟
      - پانی اور شکل کے درمیان کیا تعلق ہے؟
  - id: nmr_shard_edge
    name: ٹکڑے کا کنارہ
    prompt: |
      ایک چقماق کا ٹکڑا، ایک چِرت کا ٹکڑا — تیز، کام کیا ہوا یا قدرتی۔ کسی نے
      شاید اسے استعمال کیا ہو۔ کنارہ کارآمد ہے۔ توڑ پر غور کریں۔ یہ کیسے بنا؟
    follow_ups:
      - کنارے کے بغیر ٹکڑا کیسا ہوگا؟
      - توڑ کس طرح افادیت پیدا کرتا ہے؟
      - توڑ اور آلے کے درمیان کیا تعلق ہے؟
  - id: nmr_gravel_path
    name: بجری کا راستہ
    prompt: |
      ایک بجری کا راستہ — پاؤں کے نیچے کچلی ہوئی چٹان۔ کرچ، لچک۔ راستہ
      انسانی انتخاب ہے۔ یہ سطح کیوں؟ بجری کیا کرتی ہے جو مٹی نہیں کر سکتی؟
    follow_ups:
