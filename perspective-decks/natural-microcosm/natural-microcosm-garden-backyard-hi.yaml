# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# प्राकृतिक सूक्ष्म जगत — बाग और पिछवाड़ा (Hindi)

id: natural_microcosm_garden_backyard
name: प्राकृतिक सूक्ष्म जगत — बाग और पिछवाड़ा
description: 50 कार्ड जो घरेलू वन्यजीवों को देखने के आपके तरीके को बदल देंगे — परागणकों और मिट्टी से लेकर खरपतवार बनाम फसलें और पालतू प्रकृति के नृत्य तक।
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: मधुमक्खी का उतरना
    prompt: |
      एक मधुमक्खी को एक फूल पर उतरते हुए देखें। दृष्टिकोण, स्पर्श, मंडराना।
      मधुमक्खी शिकारी और परागणक दोनों है। फूल को क्या लाभ होता है? उसे क्या
      जोखिम है?
    follow_ups:
      - उतरने से अगली मुलाकात कैसे आकार लेती है?
      - मधुमक्खियों के बिना बगीचा कैसा होगा?
      - फूल और मधुमक्खी के बीच क्या संबंध है?
  - id: nmg_soil_crumble
    name: मिट्टी का चूरा
    prompt: |
      मुट्ठी भर मिट्टी उठाएं। बनावट महसूस करें — चूरा, दाने। उस मिट्टी में इतिहास,
      मृत्यु, पुनर्जन्म है। यहां पहले क्या जीवित था? इससे क्या उगेगा?
    follow_ups:
      - मिट्टी उस चीज़ को कैसे आकार देती है जो उगती है?
      - बाँझ मिट्टी का क्या मतलब होगा?
      - चूरे और जीवन के बीच क्या संबंध है?
  - id: nmg_weed_edge
    name: किनारे पर खरपतवार
    prompt: |
      लॉन जहां बिस्तर से मिलता है, वहां एक खरपतवार उगता है। इसे लगाया नहीं गया
      था। इसे आमंत्रित किया गया था — या इसने खुद को आमंत्रित किया था। सीमा पर
      विचार करें। खरपतवार और फूल के बीच रेखा कौन खींचता है?
    follow_ups:
      - खरपतवार के बिना बगीचा कैसा होगा?
      - किनारा तनाव कैसे पैदा करता है?
      - खरपतवार और इरादे के बीच क्या संबंध है?
  - id: nmg_compost_steam
    name: खाद की भाप
    prompt: |
      खाद के ढेर को पलटें। भाप उठती है — अपघटन प्रगति पर है। गर्मी सूक्ष्मजीवों
      का काम है। जो रसोई का स्क्रैप था वह मिट्टी बन जाता है। परिवर्तन का पता
      लगाएं।
    follow_ups:
      - खाद के बिना बगीचा क्या खो देगा?
      - गर्मी प्रक्रिया को कैसे चिह्नित करती है?
      - कचरे और उर्वरता के बीच क्या संबंध है?
  - id: nmg_seed_dormancy
    name: बीज की निष्क्रियता
    prompt: |
      मिट्टी में एक बीज वर्षों — दशकों तक इंतजार कर सकता है। यह जीवित है लेकिन
      रुका हुआ है। इसे क्या जगाता है? प्रकाश, पानी, आग, गड़बड़ी। बीज के धैर्य
      पर विचार करें।
    follow_ups:
      - निष्क्रियता के बिना अंकुरण क्या खो देगा?
      - इंतजार उत्तरजीविता को कैसे आकार देता है?
      - ठहराव और उद्भव के बीच क्या संबंध है?
  - id: nmg_bird_bath
    name: पक्षी स्नान
    prompt: |
      एक पक्षी स्नान एक निमंत्रण है। देखें कौन आता है — गौरैया, रॉबिन, शायद
      एक जय। स्नान मुठभेड़ बनाता है। इस छोटे से जल निकाय के बिना पिछवाड़ा
      कैसा होगा?
    follow_ups:
      - स्नान कौन आता है इसे कैसे आकार देता है?
      - आगमन का नृत्य क्या है?
      - पानी और पक्षी के बीच क्या संबंध है?
  - id: nmg_tomato_truss
    name: टमाटर का गुच्छा
    prompt: |
      एक टमाटर का गुच्छा हरे फल, फिर लाल रखता है। वास्तुकला का अध्ययन करें।
      तने, शाखाएँ, भार। पौधा एक इंजीनियरिंग है। इसे क्या सहारा देता है?
    follow_ups:
      - गुच्छे के बिना पौधा कैसा होगा?
      - संरचना कटाई को कैसे आकार देती है?
      - रूप और फल के बीच क्या संबंध है?
  - id: nmg_aphid_column
    name: एफिड स्तंभ
    prompt: |
      एफिड एक तने पर जमा होते हैं — चूसते हुए, गुणा करते हुए। वे कीट और शिकार
      दोनों हैं। लेडीबग आएंगे। पारिस्थितिकी पर ध्यान दें। प्रकोप और संतुलन
      के बीच क्या संबंध है?
    follow_ups:
      - एफिड के बिना पौधा कैसा होगा?
      - गुच्छा शिकारियों को कैसे आकर्षित करता है?
      - कीट और पारिस्थितिकी तंत्र के बीच क्या संबंध है?
  - id: nmg_hose_spray
    name: होज़ स्प्रे
    prompt: |
      होज़ से पानी मिट्टी से टकराता है। इसे जमा होते, सोखते, बहते हुए देखें।
      स्प्रे कृत्रिम वर्षा है। यह असली चीज़ से कैसे भिन्न है? पौधे को क्या
      मिलता है?
    follow_ups:
      - होज़ के बिना बगीचा कैसा होगा?
      - सिंचाई विकास को कैसे आकार देती है?
      - स्प्रे और बारिश के बीच क्या संबंध है?
  - id: nmg_lawn_mow
    name: लॉन घास कतरना
    prompt: |
      लॉन प्रबंधित जंगलीपन है — ऊंचाई तक काटा जाता है, हरा रखा जाता है। कतरना
      विकास को बाधित करता है। विचार करें कि यदि इसे अकेला छोड़ दिया जाए तो
      लॉन क्या बन जाएगा। हम क्या रोक रहे हैं?
    follow_ups:
      - कतरने के बिना यार्ड कैसा होगा?
      - कट पहचान को कैसे आकार देता है?
      - लॉन और नियंत्रण के बीच क्या संबंध है?
  - id: nmg_pot_bound
    name: गमले में बंधा हुआ
    prompt: |
      एक गमले में एक पौधा — जड़ें घूम रही हैं, तलाश रही हैं। गमला एक सीमा है।
      अनियंत्रित मिट्टी के साथ पौधा क्या करेगा? गमला जेल और सुरक्षा दोनों है।
      समझौते पर विचार करें।
    follow_ups:
      - गमले के बिना पौधा कैसा होगा?
      - रोकथाम विकास को कैसे आकार देती है?
      - जड़ और दीवार के बीच क्या संबंध है?
  - id: nmg_mulch_layer
    name: मल्च परत
    prompt: |
      मल्च मिट्टी को ढकता है — लकड़ी के चिप्स, पुआल, पत्तियां। यह नमी बनाए रखता
      है, खरपतवारों को दबाता है, अंततः मिट्टी बन जाता है। परत अस्थायी है।
      जब तक यह रहती है तब तक यह क्या करती है?
    follow_ups:
      - मल्च के बिना बिस्तर कैसा होगा?
      - परत सूक्ष्म-जलवायु कैसे बनाती है?
      - आवरण और मिट्टी के बीच क्या संबंध है?
  - id: nmg_hummingbird_hover
    name: हमिंगबर्ड मंडराना
    prompt: |
      एक हमिंगबर्ड एक फूल पर मंडराता है — पंख गति से अदृश्य। मंडराना महंगा
      है। अमृत इसके लायक होना चाहिए। मुलाकात की अर्थव्यवस्था पर विचार करें।
    follow_ups:
      - हमिंगबर्ड के बिना फूल कैसा होगा?
      - मंडराने से रिश्ता कैसे आकार लेता है?
      - लागत और इनाम के बीच क्या संबंध है?
  - id: nmg_fence_creep
    name: बाड़ पर चढ़ना
    prompt: |
      आइवी या मॉर्निंग ग्लोरी बाड़ के साथ रेंगती है। पौधे को नहीं पता कि बाड़
      मानव निर्मित है। वह फिर भी चढ़ता है। विकास और संरचना के बीच मुठभेड़
      पर विचार करें।
    follow_ups:
      - बाड़ के बिना पौधा क्या चढ़ेगा?
      - बाड़ बेल को कैसे आकार देती है?
      - चढ़ाई और समर्थन के बीच क्या संबंध है?
  - id: nmg_worm_cast
    name: केंचुए की बीट
    prompt: |
      केंचुए की बीट — मिट्टी के छोटे ढेर — लॉन पर दिखाई देते हैं। केंचुआ गुजर
      गया है, उर्वरता छोड़ गया है। बीट पुरातत्व है। केंचुए ने क्या संसाधित
      किया? उसने क्या पीछे छोड़ा?
    follow_ups:
      - केंचुओं के बिना मिट्टी कैसी होगी?
      - बीट केंचुए के काम को कैसे चिह्नित करती है?
      - बीट और वातन के बीच क्या संबंध है?
  - id: nmg_squirrel_cache
    name: गिलहरी का संग्रह
    prompt: |
      एक गिलहरी एक नट को दफन करती है — फिर भूल जाती है। नट अंकुरित हो सकता
      है। गिलहरी आकस्मिक माली है। स्मृति और फैलाव के बीच संबंध पर
      विचार करें। भूलने से क्या उगता है?
    follow_ups:
      - गिलहरी के बिना ओक कैसा होगा?
      - संग्रह जंगल के फैलाव को कैसे आकार देता है?
      - दफनाने और अंकुरित होने के बीच क्या संबंध है?
  - id: nmg_dew_morning
    name: ओस भरी सुबह
    prompt: |
      सुबह की ओस पत्तियों पर मोतियों की तरह चमकती है। प्रत्येक बूंद में प्रकाश
      होता है। ओस संघनन है — हवा से पानी। यह दोपहर तक वाष्पित हो जाएगा।
      संक्षिप्त उपहार पर विचार करें। पौधे को क्या मिलता है?
    follow_ups:
      - ओस के बिना पत्ती कैसी होगी?
      - बूँद सुबह को कैसे आकार देती है?
      - संघनन और पत्ती के बीच क्या संबंध है?
  - id: nmg_prune_scar
    name: छंटाई का निशान
    prompt: |
      एक छंटाई का निशान जहां से एक शाखा काटी गई थी। पेड़ ठीक हो गया है — या
      कोशिश की है। निशान इतिहास है। क्या हटाया गया था? क्यों? पेड़ क्या
      याद रखता है?
    follow_ups:
      - छंटाई के बिना पेड़ कैसा होगा?
      - कट विकास को कैसे आकार देता है?
      - घाव और रूप के बीच क्या संबंध है?
  - id: nmg_sunflower_turn
    name: सूरजमुखी का मुड़ना
    prompt: |
      एक युवा सूरजमुखी सूरज के साथ मुड़ता है — भोर में पूर्व, शाम को पश्चिम।
      आंदोलन हेलियोट्रोपिज्म है। पौधा प्रकाश को ट्रैक करता है। नृत्य पर
      विचार करें। स्थिर सामना करने का क्या मतलब होगा?
    follow_ups:
      - मुड़ने के बिना सूरजमुखी कैसा होगा?
      - ट्रैकिंग विकास को कैसे आकार देती है?
      - आंदोलन और प्रकाश के बीच क्या संबंध है?
  - id: nmg_slug_trail
    name: स्लाइम ट्रेल
    prompt: |
      एक घोंघा एक निशान छोड़ता है — चांदी जैसा, चिपचिपा। निशान गुजरने को चिह्नित
      करता है। यह घोंघे के पैर की रक्षा भी करता है। निशान को रिकॉर्ड और
      अनुकूलन दोनों के रूप में विचार करें। यह क्या संभव बनाता है?
    follow_ups:
      - निशान के बिना घोंघा कैसा होगा?
      - कीचड़ आंदोलन को कैसे आकार देता है?
      - निशान और शिकारी के बीच क्या संबंध है?
  - id: nmg_birdhouse_hole
    name: पक्षी घर का छेद
    prompt: |
      एक पक्षी घर में एक छेद होता है — एक विशिष्ट व्यास। यह कुछ पक्षियों को
      बाहर रखता है, दूसरों को आमंत्रित करता है। छेद एक फिल्टर है। यह किसके
      लिए डिज़ाइन किया गया था? किसने इसे अपना बताया है?
    follow_ups:
      - पक्षी घर के बिना यार्ड कैसा होगा?
      - छेद कौन घोंसला बनाता है इसे कैसे आकार देता है?
      - छेद और किरायेदार के बीच क्या संबंध है?
  - id: nmg_root_hair
    name: जड़ का बाल
    prompt: |
      जड़ के बाल ऊपर से अदृश्य हैं — छोटे विस्तार जो पानी और पोषक तत्वों को
      अवशोषित करते हैं। मिट्टी के साथ पौधे का इंटरफ़ेस। नीचे क्या होता है
      इस पर विचार करें। उनके बिना पौधा क्या खो देगा?
    follow_ups:
      - बाल अवशोषण को कैसे आकार देते हैं?
      - बाल और मिट्टी के बीच क्या संबंध है?
      - अगर आप उन्हें देख सकते तो क्या देखते?
  - id: nmg_frost_leaf
    name: पत्ती पर पाला
    prompt: |
      पत्ती पर पाले के पैटर्न — क्रिस्टलीय, नाजुक। पाला हवा से जमा हुआ पानी
      है। यह सूरज के साथ पिघल जाएगा। अस्थायी कला पर विचार करें। पत्ती को
      क्या अनुभव होता है?
    follow_ups:
      - पाले के बिना सुबह कैसी होगी?
      - पाला पत्ती के दिन को कैसे आकार देता है?
      - क्रिस्टल और कोशिका के बीच क्या संबंध है?
  - id: nmg_companion_plant
    name: साथी पौधा
    prompt: |
      टमाटर के बगल में तुलसी। स्क्वैश के बगल में गेंदा। साथी रोपण रणनीतिक
      निकटता है। कुछ पौधे दूर भगाते हैं; कुछ आकर्षित करते हैं। बिस्तर के
