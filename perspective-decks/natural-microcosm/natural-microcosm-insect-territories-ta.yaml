# இயற்கை நுண்ணிய உலகம் — பூச்சி பிரதேசங்கள் (Tamil)

id: natural_microcosm_insect_territories
name: இயற்கை நுண்ணிய உலகம் — பூச்சி பிரதேசங்கள்
description: பூச்சி வாழ்வை நீங்கள் பார்க்கும் விதத்தை மாற்ற 50 அட்டைகள் — எறும்புப் பாதைகள் மற்றும் தேனீப் போக்குவரத்திலிருந்து சிலந்தி வலைகள், பிராந்திய நாடகங்கள் மற்றும் காலனிகளின் நடனம் வரை.
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: எறும்புப் பாதை
    prompt: |
      எறும்புகள் பாதைகளை உருவாக்குகின்றன — கூடு மற்றும் உணவுக்கிடையேயான பெரோமோன் தடங்கள். ஓட்டத்தைக் கவனியுங்கள்.
      இரண்டு பாதைகள்: வெளிச்செல்லும் மற்றும் திரும்பும். இந்தப் பாதை பலரால் எடுக்கப்பட்ட ஒரு முடிவு.
      பாதையை எது உடைக்கும்?
    follow_ups:
      - பாதை எவ்வாறு தன்னை வலுப்படுத்துகிறது?
      - பாதைகள் இல்லாமல் காலனி எப்படி இருக்கும்?
      - பாதைக்கும் காலனிக்கும் என்ன உறவு?
  - id: nmi_bee_traffic
    name: தேனீப் போக்குவரத்து
    prompt: |
      ஒரு கூட்டில் நுழைவாயில் — தேனீக்கள் உள்ளேயும் வெளியேயும் பாய்கின்றன. போக்குவரத்து ஒரு தாளத்தைக் கொண்டுள்ளது. சிலர்
      மகரந்தத்தை சுமந்து செல்கிறார்கள்; சிலர் செல்லவில்லை. நடனத்தைக் கவனியுங்கள். யார் இந்த முறைப்படி முடிவு செய்கிறார்கள்?
    follow_ups:
      - போக்குவரத்துக்கு இல்லாமல் கூடு எப்படி இருக்கும்?
      - நுழைவாயில் ஓட்டத்தை எவ்வாறு வடிவமைக்கிறது?
      - தேனீக்கும் காலனிக்கும் என்ன உறவு?
  - id: nmi_spider_web
    name: சிலந்தி வலை
    prompt: |
      ஒரு சிலந்தி வலை ஒரு பிரதேசம் மற்றும் பொறி. சிலந்தி விளிம்பில் காத்திருக்கிறது.
      அதிர்வுகள் தகவல்களைக் கொண்டு செல்கின்றன. கட்டிடக்கலையைக் கவனியுங்கள். வலை என்ன பிடிக்கும்? அது எதை விலக்குகிறது?
    follow_ups:
      - வலை இல்லாமல் சிலந்தி எப்படி இருக்கும்?
      - வலை சிலந்தியின் புலன்களை எவ்வாறு விரிவுபடுத்துகிறது?
      - பட்டுக்கும் உயிர்வாழ்விற்கும் என்ன உறவு?
  - id: nmi_dragonfly_claim
    name: தும்பி உரிமை கோரல்
    prompt: |
      ஒரு தும்பி ஒரு குளம் பகுதியைச் சுற்றி வருகிறது — முன்னும் பின்னும். இது பிராந்தியமானது.
      போட்டியாளர்கள் துரத்தப்படுகிறார்கள். துணைகள் courtship செய்யப்படுகின்றன. பங்கு குறித்து கவனியுங்கள். என்ன பாதுகாக்கப்படுகின்றது?
    follow_ups:
      - பிரதேசம் இல்லாமல் தும்பி என்ன செய்யும்?
      - ரோந்துப்பணி உரிமையை எவ்வாறு தெரிவிக்கிறது?
      - இடத்திற்கும் இனப்பெருக்கத்திற்கும் என்ன உறவு?
  - id: nmi_caterpillar_munch
    name: கம்பளிப்புழு மெல்லுதல்
    prompt: |
      ஒரு கம்பளிப்புழு சாப்பிடுகிறது — இலை விளிம்பு மறைகிறது. சாப்பிடுவது தொடர்ச்சியானது.
      கம்பளிப்புழு ஒரு மாற்றும் இயந்திரம். வேகத்தைக் கவனியுங்கள். தாவரங்கள் தாவர உண்ணிகள் இல்லாமல் எப்படி இருக்கும்?
    follow_ups:
      - கம்பளிப்புழு இலையை எவ்வாறு வடிவமைக்கிறது?
      - மெல்லுதல் இல்லாமல் பட்டாம்பூச்சி எப்படி இருக்கும்?
      - நுகர்வுக்கும் வளர்ச்சிக்கும் என்ன உறவு?
  - id: nmi_beetle_battle
    name: வண்டுகளின் சண்டை
    prompt: |
      இரண்டு வண்டுகள் சந்திக்கின்றன — ஒருவேளை ஸ்டாக் வண்டுகள், ஒருவேளை சாண வண்டுகள். அவை போராடுகின்றன.
      சண்டை ஒரு சடங்கு. பங்கு குறித்து கவனியுங்கள். என்ன வெல்லப்படுகிறது? என்ன இழக்கப்படுகிறது?
    follow_ups:
      - தோற்றவர் என்ன செய்வார்?
      - சண்டை எவ்வாறு தீர்க்கப்படுகிறது?
      - சண்டைக்கும் இனப்பெருக்கத்திற்கும் என்ன உறவு?
  - id: nmi_firefly_flash
    name: மின்மினிப் பூச்சி மின்னல்
    prompt: |
      மின்மினிப் பூச்சிகள் மின்னுகின்றன — ஒவ்வொரு இனத்திற்கும் ஒரு குறியீடு உண்டு. அந்த முறை courtship. சமிக்ஞையைக் கவனியுங்கள்.
      தவறான மின்னல் என்ன அர்த்தம்? அவர்கள் இருட்டில் ஒருவரை ஒருவர் எவ்வாறு கண்டறிகிறார்கள்?
    follow_ups:
      - மின்னல் இனத்தை எவ்வாறு குறியாக்குகிறது?
      - மின்மினிப் பூச்சிகள் இல்லாமல் புல்வெளி எப்படி இருக்கும்?
      - ஒளிக்கும் துணையினத்திற்கும் என்ன உறவு?
  - id: nmi_aphid_farm
    name: அசுவினிப் பண்ணை
    prompt: |
      எறும்புகள் அசுவினிகளைப் பராமரிக்கின்றன — அவற்றை மென்மையாக்குகின்றன, பாதுகாக்கின்றன. அசுவினிகள் தேன் துளிகளை வெளியேற்றுகின்றன.
      எறும்புகள் அவற்றை அறுவடை செய்கின்றன. கூட்டாண்மையைக் கவனியுங்கள். யார் பயனடைகிறார்கள்? யார் சுரண்டப்படுகிறார்கள்?
    follow_ups:
      - எறும்புகள் இல்லாமல் அசுவினிகள் எப்படி இருக்கும்?
      - பண்ணை இரண்டு இனங்களையும் எவ்வாறு வடிவமைக்கிறது?
      - பராமரிப்பிற்கும் பிரித்தெடுப்பிற்கும் என்ன உறவு?
  - id: nmi_cicada_shell
    name: செம்பேன் கூடு
    prompt: |
      ஒரு செம்பேன் கூடு மரப் பட்டையில் ஒட்டிக்கொள்கிறது — இளம்பூச்சி வெளிவந்துள்ளது. கூடு காலியாக உள்ளது,
      முழுமையானது. உரிமாற்றத்தைக் கவனியுங்கள். பூச்சி என்ன விட்டுச் சென்றது? அது என்ன பெற்றது?
    follow_ups:
      - உரிமாற்றம் இல்லாமல் செம்பேன் எப்படி இருக்கும்?
      - கூடு மாற்றத்தை எவ்வாறு குறிக்கிறது?
      - உதிர்வுக்கும் வளர்ச்சிக்கும் என்ன உறவு?
  - id: nmi_leaf_miner
    name: இலை துளைப்பான்
    prompt: |
      இலைக்குள் ஒரு பாதை — ஒரு இலை துளைப்பானின் பாதை. புழு இலை அடுக்குகளுக்கு இடையில் சாப்பிடுகிறது.
      இலை பதிவை வைத்திருக்கிறது. சுரங்கத்தைக் கவனியுங்கள். உள்ளே இருந்து இலை எப்படி இருக்கும்?
    follow_ups:
      - துளைப்பான் இல்லாமல் இலை எப்படி இருக்கும்?
      - சுரங்கம் புழுவை எவ்வாறு பாதுகாக்கிறது?
      - உள்ளேயும் வெளியேயும் என்ன உறவு?
  - id: nmi_wasp_nest
    name: குளவி கூடு
    prompt: |
      ஒரு காகித குளவி கூடு — அறுகோண செல்கள், மெல்லப்பட்ட மரம். கூடு ஒரு கட்டிடக்கலை
      மற்றும் கோட்டை. காலனியைக் கவனியுங்கள். யார் கட்டுகிறார்கள்? யார் பாதுகாக்கிறார்கள்? யார் இனப்பெருக்கம் செய்கிறார்கள்?
    follow_ups:
      - கூடு இல்லாமல் குளவிகள் எப்படி இருக்கும்?
      - கூடு சமூக அமைப்பை எவ்வாறு வடிவமைக்கிறது?
      - காகிதத்திற்கும் காலனிக்கும் என்ன உறவு?
  - id: nmi_grasshopper_leap
    name: வெட்டுக்கிளி தாவிச்செல்லுதல்
    prompt: |
      ஒரு வெட்டுக்கிளி தாவுகிறது — கால்கள் நீண்டு, அது போய்விட்டது. தாவுதல் தப்பித்தல் அல்லது
      அணுகுதல். தூண்டுதலைக் கவனியுங்கள். வெட்டுக்கிளி என்ன பார்த்தது? அது என்ன கேட்டது?
    follow_ups:
      - தாவிச்செல்லுதல் இல்லாமல் வெட்டுக்கிளி எப்படி இருக்கும்?
      - தாவுதல் எவ்வாறு வேட்டையாடப்படுவதைத் தவிர்க்கிறது?
      - கால் மற்றும் பறத்தலுக்கு என்ன உறவு?
  - id: nmi_mantis_still
    name: புழு விரட்டி அசையாமல் இருத்தல்
    prompt: |
      ஒரு புழு விரட்டி காத்திருக்கிறது — அசையாமல். அது ஒரு வேட்டைக்காரன். இரையி வருகிறது. தாக்குதல்
      திடீரென நிகழ்கிறது. பொறுமையைக் கவனியுங்கள். இந்த அசையாமைக்கு என்ன விலை? அது எதை செயல்படுத்துகிறது?
    follow_ups:
