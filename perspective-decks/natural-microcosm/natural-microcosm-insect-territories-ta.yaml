      - அசையாமை எவ்வாறு ஏமாற்றுகிறது?
      - பொறுமைக்கும் பிடித்தத்திற்கும் என்ன உறவு?
  - id: nmi_bumblebee_buzz
    name: பெரிய தேனீ இரைச்சல்
    prompt: |
      ஒரு பெரிய தேனீ இரைச்சலிடுகிறது — அது அதிர்வுறும். சில மலர்களுக்கு இரைச்சல் மகரந்தச் சேர்க்கை தேவை.
      தேனீ மகரந்தத்தை குலுக்கி விடுகிறது. கூட்டாண்மையைக் கவனியுங்கள். இரைச்சல் இல்லாமல் மலர் எப்படி இருக்கும்?
    follow_ups:
      - இரைச்சல் எவ்வாறு மகரந்தத்தை வெளியிடுகிறது?
      - இரைச்சல் மகரந்தச் சேர்க்கை இல்லாமல் தேனீ எப்படி இருக்கும்?
      - அதிர்வுக்கும் கருத்தரிப்பிற்கும் என்ன உறவு?
  - id: nmi_butterfly_territory
    name: பட்டாம்பூச்சி பிரதேசம்
    prompt: |
      ஒரு பட்டாம்பூச்சி ஒரு உயரமான இடத்தில் அமர்ந்திருக்கிறது — மலை உச்சியில். அது துணைகளுக்காகக் காத்திருக்கிறது.
