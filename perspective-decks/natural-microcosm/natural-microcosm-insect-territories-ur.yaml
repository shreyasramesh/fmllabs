# قدرتی خرد — حشرات کے علاقے (Urdu)

id: natural_microcosm_insect_territories
name: قدرتی خرد — حشرات کے علاقے
description: کیڑوں کی زندگی کو دیکھنے کا انداز بدلنے کے لیے 50 کارڈز — چیونٹیوں کے راستوں اور مکھیوں کی آمد و رفت سے لے کر مکڑی کے جالوں، علاقائی ڈراموں اور کالونیوں کی کوریوگرافی تک۔
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: چیونٹی کا راستہ
    prompt: |
      چیونٹیاں راستے بناتی ہیں — گھونسلے اور خوراک کے درمیان فیرومون کے راستے
      ہیں۔ بہاؤ کو دیکھیں۔
      دو لین: باہر جانے والی اور واپسی والی۔ راستہ بہت ساروں کا فیصلہ ہے۔
      راستے کو کیا توڑ سکتا ہے؟
    follow_ups:
      - راستہ خود کو کیسے مضبوط کرتا ہے؟
      - راستوں کے بغیر کالونی کیا ہوگی؟
      - راستے اور کالونی کے درمیان کیا تعلق ہے؟
  - id: nmi_bee_traffic
    name: مکھیوں کی آمد و رفت
    prompt: |
      چھتے کا دروازہ — مکھیاں اندر اور باہر جا رہی ہیں۔ آمد و رفت میں تال ہے۔
      کچھ پولن لے جا رہی ہیں؛ کچھ نہیں۔ کوریوگرافی پر غور کریں۔
      نمونہ کون طے کرتا ہے؟
    follow_ups:
      - آمد و رفت کے بغیر چھتا کیا ہوگا؟
      - دروازہ بہاؤ کو کیسے شکل دیتا ہے؟
      - مکھی اور کالونی کے درمیان کیا تعلق ہے؟
  - id: nmi_spider_web
    name: مکڑی کا جال
    prompt: |
      مکڑی کا جال علاقہ اور جال ہے۔ مکڑی کنارے پر انتظار کرتی ہے۔
      کمپنات سے معلومات ملتی ہے۔ فن تعمیر پر غور کریں۔ جال کیا پکڑتا ہے؟
      یہ کیا خارج کرتا ہے؟
    follow_ups:
      - جال کے بغیر مکڑی کیا ہوگی؟
      - جال مکڑی کے احساسات کو کیسے بڑھاتا ہے؟
      - ریشم اور بقا کے درمیان کیا تعلق ہے؟
  - id: nmi_dragonfly_claim
    name: بھڑ کا دعویٰ
    prompt: |
      ایک بھڑ تالاب کے ایک حصے پر گشت کرتی ہے — ادھر ادھر۔ یہ علاقائی ہے۔
      مد مقابل کو بھگایا جاتا ہے۔ ساتھیوں کو منتر کیا جاتا ہے۔ داؤ پر غور کریں۔
      کیا بچایا جا رہا ہے؟
    follow_ups:
      - علاقے کے بغیر بھڑ کیا کرے گی؟
      - گشت ملکیت کا اعلان کیسے کرتا ہے؟
      - جگہ اور تولید کے درمیان کیا تعلق ہے؟
  - id: nmi_caterpillar_munch
    name: کیٹرپلر کا کھانا
    prompt: |
      ایک کیٹرپلر کھا رہا ہے — پتے کا کنارہ پیچھے ہٹ رہا ہے۔ کھانا مستقل ہے۔
      کیٹرپلر ایک کنورژن مشین ہے۔ شرح پر غور کریں۔
      نباتات کے بغیر جڑی بوٹیاں کیا ہوں گی؟
    follow_ups:
      - کیٹرپلر پتے کو کیسے شکل دیتا ہے؟
      - کھانے کے بغیر تتلی کیا ہوگی؟
      - کھپت اور نمو کے درمیان کیا تعلق ہے؟
  - id: nmi_beetle_battle
    name: بھونڈوں کی جنگ
    prompt: |
      دو بھونڈے ملتے ہیں — شاید سٹگ بھونڈے، شاید گوبر کے بھونڈے۔ وہ جھگڑتے ہیں۔
      لڑائی ایک رسم ہے۔ داؤ پر غور کریں۔ کیا جیتا جا رہا ہے؟ کیا
      کھویا جا رہا ہے؟
    follow_ups:
      - ہارنے والا کیا کرے گا؟
      - لڑائی کیسے حل ہوتی ہے؟
      - لڑائی اور ملاپ کے درمیان کیا تعلق ہے؟
  - id: nmi_firefly_flash
    name: آتشی کیڑے کی چمک
    prompt: |
      آتشی کیڑے چمکتے ہیں — ہر پرجاتی کا اپنا کوڈ ہوتا ہے۔ نمونہ ملاپ ہے۔
      سگنل پر غور کریں۔ غلط چمک کا کیا مطلب ہوگا؟ وہ اندھیرے میں ایک دوسرے کو
      کیسے تلاش کرتے ہیں؟
    follow_ups:
      - چمک پرجاتی کو کیسے کوڈ کرتی ہے؟
      - آتشی کیڑوں کے بغیر میدان کیا ہوگا؟
      - روشنی اور ساتھی کے درمیان کیا تعلق ہے؟
  - id: nmi_aphid_farm
    name: افاد کا کھیت
    prompt: |
      چیونٹیاں افاد کی دیکھ بھال کرتی ہیں — انہیں تھپتھپاتی ہیں، انہیں بچاتی ہیں۔
      افاد شہد رس خارج کرتی ہیں۔ چیونٹیاں اسے جمع کرتی ہیں۔ شراکت پر غور کریں۔
      کس کو فائدہ ہوتا ہے؟ کس کا استحصال ہوتا ہے؟
    follow_ups:
      - چیونٹیوں کے بغیر افاد کیا ہوں گے؟
      - کھیتی دونوں پرجاتیوں کو کیسے شکل دیتی ہے؟
      - دیکھ بھال اور نکالنے کے درمیان کیا تعلق ہے؟
  - id: nmi_cicada_shell
    name: سیکاڈا کا خول
    prompt: |
      ایک سیکاڈا کا خول چھال پر چپکا ہوا ہے — بچہ نکلا۔ خول خالی،
      کامل ہے۔ مولٹ پر غور کریں۔ کیڑے نے کیا پیچھے چھوڑا؟ اس نے کیا حاصل کیا؟
    follow_ups:
      - مولٹ کے بغیر سیکاڈا کیا ہوگا؟
      - خول تبدیلی کو کیسے نشان زد کرتا ہے؟
      - شیڈنگ اور نمو کے درمیان کیا تعلق ہے؟
  - id: nmi_leaf_miner
    name: پتے کا مائنر
    prompt: |
      پتے کے اندر ایک راستہ — پتے کے مائنر کا راستہ۔ لاروا پرتوں کے درمیان
      کھاتا ہے۔ پتا ریکارڈ رکھتا ہے۔ سرنگ پر غور کریں۔ پتے کے اندر سے
      پتا کیسا نظر آئے گا؟
    follow_ups:
      - مائنر کے بغیر پتا کیا ہوگا؟
      - مائن لاروا کو کیسے بچاتا ہے؟
      - اندر اور باہر کے درمیان کیا تعلق ہے؟
  - id: nmi_wasp_nest
    name: بھڑ کا گھونسلہ
    prompt: |
      ایک کاغذ کی بھڑ کا گھونسلہ — چھ کونے والے خانے، چبائی ہوئی لکڑی۔ گھونسلہ
      فن تعمیر اور قلعہ ہے۔ کالونی پر غور کریں۔ کون بناتا ہے؟ کون بچاتا ہے؟
      کون دوبارہ پیدا ہوتا ہے؟
    follow_ups:
      - گھونسلے کے بغیر بھڑیں کیا ہوں گی؟
      - گھونسلہ سماجی ڈھانچے کو کیسے شکل دیتا ہے؟
      - کاغذ اور کالونی کے درمیان کیا تعلق ہے؟
  - id: nmi_grasshopper_leap
    name: ٹڈی کا چھلانگ
    prompt: |
      ایک ٹڈی چھلانگ لگاتی ہے — ٹانگیں باہر نکلتی ہیں، یہ غائب ہو جاتی ہے۔
      چھلانگ فرار یا پہنچنا ہے۔ ٹریگر پر غور کریں۔ ٹڈی نے کیا دیکھا؟
      اس نے کیا سنا؟
    follow_ups:
      - چھلانگ کے بغیر ٹڈی کیا ہوگی؟
      - چھلانگ شکار سے کیسے بچتی ہے؟
      - ٹانگ اور اڑان کے درمیان کیا تعلق ہے؟
  - id: nmi_mantis_still
    name: مانٹس کی خاموشی
    prompt: |
      ایک مانٹس انتظار کرتی ہے — بے حرکت۔ یہ ایک شکاری ہے۔ شکار آتا ہے۔
      حملہ اچانک ہوتا ہے۔ صبر پر غور کریں۔ خاموشی کی کیا قیمت ہے؟ یہ کیا
      ممکن بناتی ہے؟
    follow_ups:
      - انتظار کے بغیر مانٹس کیا ہوگی؟
      - خاموشی کیسے دھوکہ دیتی ہے؟
      - صبر اور قبضہ کے درمیان کیا تعلق ہے؟
  - id: nmi_bumblebee_buzz
    name: بھونڈ مکھی کی گونج
    prompt: |
      ایک بھونڈ مکھی گونجتی ہے — یہ کمپن کرتی ہے۔ کچھ پھولوں کو گونج پولینیشن
      کی ضرورت ہوتی ہے۔ مکھی پولن کو جھٹک دیتی ہے۔ شراکت پر غور کریں۔
      گونج کے بغیر پھول کیا ہوگا؟
    follow_ups:
      - گونج پولن کو کیسے جاری کرتی ہے؟
      - گونج پولینیشن کے بغیر مکھی کیا ہوگی؟
      - کمپن اور فرٹیلائزیشن کے درمیان کیا تعلق ہے؟
  - id: nmi_butterfly_territory
    name: تتلی کا علاقہ
    prompt: |
      ایک تتلی اونچی جگہ پر بیٹھتی ہے — پہاڑیوں پر۔ یہ ساتھیوں کا انتظار کرتی ہے۔
      مد مقابل کو بھگایا جاتا ہے۔ حکمت عملی پر غور کریں۔ یہ جگہ کیوں؟
      یہ کیا قیمتی بناتی ہے؟
    follow_ups:
      - پرچ کے بغیر تتلی کیا کرے گی؟
      - پہاڑیوں پر چڑھنا ملاپ کو کیسے شکل دیتا ہے؟
      - جگہ اور ملاقات کے درمیان کیا تعلق ہے؟
  - id: nmi_earwig_pincer
    name: کان کی چمٹی
    prompt: |
      کان کی چمٹی ہوتی ہے — سرسی۔ وہ دفاع کے لیے، پروں کو فولڈ کرنے کے لیے،
      شکار کو سنبھالنے کے لیے ہوتی ہیں۔ آلے پر غور کریں۔ چمٹی کے بغیر کان
      کیا ہوگی؟
    follow_ups:
      - چمٹی رویے کو کیسے شکل دیتی ہے؟
      - اس کے بغیر دفاع کیسا نظر آئے گا؟
      - شکل اور فعل کے درمیان کیا تعلق ہے؟
  - id: nmi_katydid_call
    name: کٹیڈیڈ کی پکار
    prompt: |
      ایک کٹیڈیڈ پکارتا ہے — سٹریدولیشن، ٹانگوں کو پروں پر مارنا۔ پکار پرجاتی
      کے مطابق ہوتی ہے۔ یہ ملاپ، علاقہ ہے۔ آواز پر غور کریں۔
      اس کے بغیر رات کیا ہوگی؟
    follow_ups:
      - پکار ساتھیوں کو کیسے متوجہ کرتی ہے؟
      - پکارنے میں کٹیڈیڈ کیا خطرہ مول لے گا؟
      - آواز اور شکار کے درمیان کیا تعلق ہے؟
  - id: nmi_ladybug_cluster
    name: لیڈی بگ کا جھرمٹ
    prompt: |
      لیڈی بگ سردیوں میں جمع ہوتی ہیں — درجنوں، سینکڑوں۔ وہ گرمی،
      پناہ کے لیے جمع ہوتی ہیں۔ جمع ہونے پر غور کریں۔ کیا اسے متحرک کرتا ہے؟
      کیا اسے منتشر کرتا ہے؟
    follow_ups:
      - جھرمٹ کے بغیر لیڈی بگ کیا ہوں گی؟
      - جھرمٹ مائیکرو کلائمیٹ کیسے بناتا ہے؟
      - بہت سارے اور بقا کے درمیان کیا تعلق ہے؟
  - id: nmi_ant_carry
    name: چیونٹی کا اٹھانا
    prompt: |
      ایک چیونٹی دوسری کو اٹھا رہی ہے — مردہ یا زخمی۔ یہ مدد ہے۔
      کالونی اپنے لوگوں کا خیال رکھتی ہے۔ رویے پر غور کریں۔
      زخمی چیونٹی اکیلے کیا کرے گی؟ اٹھانے والے کو کیا فائدہ ہوتا ہے؟
    follow_ups:
      - اٹھانا کالونی کی خدمت کیسے کرتا ہے؟
      - تعاون کے بغیر کالونی کیا ہوگی؟
      - فرد اور مجموعہ کے درمیان کیا تعلق ہے؟
  - id: nmi_mosquito_hover
    name: مچھر کا منڈلانا
    prompt: |
      ایک مچھر منڈلاتا ہے — جانچتا، ٹٹولتا۔ یہ میزبان کی تلاش میں ہے۔
      منڈلانا تشخیص ہے۔ کاٹنے سے پہلے کے لمحے پر غور کریں۔ مچھر کیا
      کھوجتا ہے؟ کیا فیصلہ کرتا ہے؟
    follow_ups:
      - منڈلانے کے بغیر مچھر کیا کرے گا؟
      - منڈلانا پتہ لگانے کو کیسے کم کرتا ہے؟
      - ٹٹولنے اور کھلانے کے درمیان کیا تعلق ہے؟
  - id: nmi_weevil_curl
    name: ویول کا موڑ
    prompt: |
      ایک پتا مڑ جاتا ہے — ایک ویول یا گال مڈج نے اسے بنایا۔ پتا لاروا کے
      گرد لپٹ جاتا ہے۔ ہیرا پھیری پر غور کریں۔ پودا قائل ہو جاتا ہے۔
      کیڑے کے بغیر پتا کیا کرے گا؟
    follow_ups:
      - موڑ لاروا کو کیسے بچاتا ہے؟
      - موڑ کے بغیر پودا کیا ہوگا؟
      - کیڑے اور پودے کی شکل کے درمیان کیا تعلق ہے؟
  - id: nmi_honeybee_waggle
    name: شہد کی مکھی کا ویگل
    prompt: |
      ایک شہد کی مکھی ویگل کرتی ہے — یہ ایک رقص ہے۔ رقص پھولوں تک فاصلہ
      اور سمت کی نشاندہی کرتا ہے۔ دوسری مکھیاں دیکھتی ہیں۔ پیغام پر
      غور کریں۔ ویگل کے بغیر کالونی کیا ہوگی؟
    follow_ups:
      - رقص معلومات کو کیسے منتقل کرتا ہے؟
      - اس کے بغیر چارہ جوئی کیسی ہوگی؟
      - رقص اور دریافت کے درمیان کیا تعلق ہے؟
  - id: nmi_gnat_cloud
    name: مچھروں کا بادل
    prompt: |
      مچھر جھنڈ بناتے ہیں — ننھے کیڑوں کا بادل۔ جھنڈ ملاپ ہے۔ نر جمع ہوتے ہیں؛
      مادہ داخل ہوتی ہیں اور منتخب کرتی ہیں۔ مجموعے پر غور کریں۔
      اکیلا مچھر کیا کرے گا؟
    follow_ups:
      - جھنڈ ملاپ کو کیسے فعال کرتا ہے؟
      - بادل کے بغیر مچھر کیا ہوں گے؟
      - بہت سارے اور ملاقات کے درمیان کیا تعلق ہے؟
  - id: nmi_spider_wrap
    name: مکڑی کا لپیٹنا
    prompt: |
      ایک مکڑی شکار کو لپیٹتی ہے — ریشم جدوجہد کرنے والے کیڑے کے گرد۔ لپیٹ
      بے حرکت کر دیتی ہے۔ مکڑی انزائم انجیکٹ کرتی ہے۔ عمل پر غور کریں۔
      لپیٹنے کے بغیر مکڑی کیا کرے گی؟
    follow_ups:
      - لپیٹ شکار کو کیسے قابو پاتا ہے؟
      - اس کے بغیر مکڑی کیا خطرہ مول لے گی؟
      - ریشم اور ہاضمہ کے درمیان کیا تعلق ہے؟
  - id: nmi_ant_war
    name: چیونٹی کی جنگ
    prompt: |
      دو چیونٹیوں کی کالونیاں ملتی ہیں — تصادم۔ مزدور جھگڑتے ہیں، کاٹتے ہیں۔
