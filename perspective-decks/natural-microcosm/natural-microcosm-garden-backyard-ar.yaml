# الكون المصغر الطبيعي — حديقة وساحة منزل (Arabic)

id: natural_microcosm_garden_backyard
name: الكون المصغر الطبيعي — حديقة وساحة منزل
description: 50 بطاقة لتغيير نظرتك للحياة البرية المحلية — من الملقحات والتربة إلى الأعشاب الضارة مقابل المحاصيل ورقص الطبيعة المزروعة.
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: هبوط النحلة
    prompt: |
      شاهد نحلة تهبط على زهرة. الاقتراب، اللمس، التحويم. النحلة مفترسة وملقحة في آن واحد. ماذا تكسب الزهرة؟ ماذا تخاطر به؟
    follow_ups:
      - كيف يشكل الهبوط الزيارة التالية؟
      - ماذا ستكون الحديقة بدون النحل؟
      - ما هي العلاقة بين الزهرة والنحلة؟
  - id: nmg_soil_crumble
    name: تفتت التربة
    prompt: |
      التقط حفنة من التربة. اشعر بالملمس — التفتت، الحبيبات. تلك التربة تحمل التاريخ، الموت، إعادة الولادة. ماذا عاش هنا من قبل؟ ماذا سينمو منها؟
    follow_ups:
      - كيف تشكل التربة ما ينمو؟
      - ماذا يعني وجود تربة عقيمة؟
      - ما هي العلاقة بين التفتت والحياة؟
  - id: nmg_weed_edge
    name: العشب الضار على الحافة
    prompt: |
      ينمو عشب ضار حيث تلتقي الحديقة بالمرج. لم يُزرع. تمت دعوته — أو دعا نفسه. ضع في اعتبارك الحدود. من يرسم الخط الفاصل بين العشب الضار والزهرة؟
    follow_ups:
      - ماذا ستكون الحديقة بدون أعشاب ضارة؟
      - كيف تخلق الحافة التوتر؟
      - ما هي العلاقة بين العشب الضار والقصد؟
  - id: nmg_compost_steam
    name: بخار السماد العضوي
    prompt: |
      اقلب كومة سماد عضوي. يتصاعد البخار — التحلل قيد التنفيذ. الحرارة عمل ميكروبي. ما كان بقايا المطبخ يصبح تربة. تتبع التحول.
    follow_ups:
      - ماذا ستخسر الحديقة بدون سماد عضوي؟
      - كيف تشير الحرارة إلى العملية؟
      - ما هي العلاقة بين النفايات والخصوبة؟
  - id: nmg_seed_dormancy
    name: سبات البذور
    prompt: |
      يمكن للبذرة في التربة أن تنتظر سنوات — عقودًا. إنها حية ولكنها متوقفة. ما الذي يوقظها؟ الضوء، الماء، النار، الاضطراب. فكر في صبر البذرة.
    follow_ups:
      - ماذا سيخسر الإنبات بدون سبات؟
      - كيف يشكل الانتظار البقاء؟
      - ما هي العلاقة بين التوقف والظهور؟
  - id: nmg_bird_bath
    name: حوض طيور
    prompt: |
      حوض الطيور هو دعوة. شاهد من يأتي — العصافير، الشحرور، ربما غراب. يخلق الحوض لقاءً. ماذا ستكون الساحة بدون هذه المساحة الصغيرة من الماء؟
    follow_ups:
      - كيف يشكل الحوض من يزور؟
      - ما هو رقص الوصول؟
      - ما هي العلاقة بين الماء والطيور؟
  - id: nmg_tomato_truss
    name: عنقود الطماطم
    prompt: |
      عنقود الطماطم يحمل ثمارًا خضراء، ثم حمراء. ادرس الهندسة المعمارية. الساق، الفروع، الوزن. النبات هو هندسة. ما الذي يدعمه؟
    follow_ups:
      - ماذا سيكون النبات بدون العنقود؟
      - كيف يشكل الهيكل الحصاد؟
      - ما هي العلاقة بين الشكل والثمرة؟
  - id: nmg_aphid_column
    name: عمود المن
    prompt: |
      تتجمع حشرات المن على ساق — تمتص، تتكاثر. إنها آفة وفريسة في آن واحد. ستأتي الخنافس. لاحظ البيئة. ما هي العلاقة بين الانتشار والتوازن؟
    follow_ups:
      - ماذا سيكون النبات بدون المن؟
      - كيف تجذب المجموعة المفترسات؟
      - ما هي العلاقة بين الآفة والنظام البيئي؟
  - id: nmg_hose_spray
    name: رذاذ الخرطوم
    prompt: |
      يضرب الماء من الخرطوم التربة. شاهد كيف يتجمع، ويتشرب، ويجري. الرذاذ هو مطر اصطناعي. كيف يختلف عن الشيء الحقيقي؟ ماذا يتلقى النبات؟
    follow_ups:
      - ماذا ستكون الحديقة بدون الخرطوم؟
      - كيف يشكل الري النمو؟
      - ما هي العلاقة بين الرذاذ والمطر؟
  - id: nmg_lawn_mow
    name: جز العشب
    prompt: |
      المرج هو برية مُدارة — مقصوصة إلى ارتفاع محدد، خضراء. الجز يقاطع النمو. فكر فيما سيصبح عليه المرج إذا تُرك وحده. ما الذي نمنعه؟
    follow_ups:
      - ماذا ستكون الساحة بدون جز العشب؟
      - كيف يشكل القص الهوية؟
      - ما هي العلاقة بين المرج والتحكم؟
  - id: nmg_pot_bound
    name: مقيد بالوعاء
    prompt: |
      نبات في وعاء — جذور تتجول، تبحث. الوعاء هو حدود. ماذا سيفعل النبات بتربة غير مقيدة؟ الوعاء سجن وحماية في آن واحد. فكر في المقايضة.
    follow_ups:
      - ماذا سيكون النبات بدون الوعاء؟
      - كيف يشكل الاحتواء النمو؟
      - ما هي العلاقة بين الجذر والجدار؟
  - id: nmg_mulch_layer
    name: طبقة النشارة
    prompt: |
      تغطي النشارة التربة — رقائق خشب، قش، أوراق. تحتفظ بالرطوبة، تقمع الأعشاب الضارة، وتصبح في النهاية تربة. الطبقة مؤقتة. ماذا تفعل طالما دامت؟
    follow_ups:
      - ماذا سيكون السرير بدون نشارة؟
      - كيف تخلق الطبقة مناخًا مصغرًا؟
      - ما هي العلاقة بين الغطاء والتربة؟
  - id: nmg_hummingbird_hover
    name: تحويم الطائر الطنان
    prompt: |
      يحوم الطائر الطنان عند زهرة — أجنحة غير مرئية بسرعة. التحويم مكلف. يجب أن يكون الرحيق يستحق ذلك. فكر في اقتصاد الزيارة.
    follow_ups:
      - ماذا ستكون الزهرة بدون الطائر الطنان؟
      - كيف يشكل التحويم العلاقة؟
      - ما هي العلاقة بين التكلفة والمكافأة؟
  - id: nmg_fence_creep
    name: تسلق السياج
    prompt: |
      يتسلق اللبلاب أو زهرة الصباح على طول السياج. النبات لا يعرف أن السياج من صنع الإنسان. يتسلق على أي حال. فكر في اللقاء بين النمو والهيكل.
    follow_ups:
      - ماذا سيتسلقه النبات بدون السياج؟
      - كيف يشكل السياج الكرمة؟
      - ما هي العلاقة بين التسلق والدعم؟
  - id: nmg_worm_cast
    name: فضلات دودة الأرض
    prompt: |
      فضلات دودة الأرض — أكوام صغيرة من التربة — تنتشر في المرج. مرت الدودة، تاركةً خصوبة. الفضلات هي علم آثار. ماذا عالجت الدودة؟ ماذا تركت وراءها؟
    follow_ups:
      - ماذا ستكون التربة بدون ديدان الأرض؟
      - كيف تشير الفضلات إلى عمل الدودة؟
      - ما هي العلاقة بين الفضلات والتهوية؟
  - id: nmg_squirrel_cache
    name: مخبأ السنجاب
    prompt: |
      يدفن السنجاب جوزة — ثم ينسى. قد تنبت الجوزة. السنجاب بستاني عرضي. فكر في العلاقة بين الذاكرة والانتشار. ماذا ينمو من النسيان؟
    follow_ups:
      - ماذا ستكون شجرة البلوط بدون السنجاب؟
      - كيف يشكل التخزين انتشار الغابات؟
      - ما هي العلاقة بين الدفن والإنبات؟
  - id: nmg_dew_morning
    name: ندى الصباح
    prompt: |
      يتكون ندى الصباح على الأوراق. كل قطرة تحمل الضوء. الندى هو تكثف — ماء من الهواء. سيبخر بحلول الظهيرة. فكر في الهدية القصيرة. ماذا تتلقى النبتة؟
    follow_ups:
      - ماذا سيكون الورق بدون الندى؟
      - كيف تشكل القطرة الصباح؟
      - ما هي العلاقة بين التكثف والورق؟
  - id: nmg_prune_scar
    name: ندبة التقليم
    prompt: |
      تمثل ندبة التقليم مكان قطع فرع. الشجرة تعافت — أو حاولت. الندبة هي تاريخ. ماذا تمت إزالته؟ لماذا؟ ماذا تتذكر الشجرة؟
    follow_ups:
      - ماذا ستكون الشجرة بدون التقليم؟
      - كيف يشكل القطع النمو؟
      - ما هي العلاقة بين الجرح والشكل؟
  - id: nmg_sunflower_turn
    name: دوران دوار الشمس
    prompt: |
      يتبع دوار الشمس الصغير الشمس — شرقًا عند الفجر، وغربًا عند الغروب. الحركة هي انتحاء شمسي. تتعقب النبتة الضوء. فكر في الرقص. ماذا يعني التوجيه الثابت؟
    follow_ups:
      - ماذا سيكون دوار الشمس بدون الدوران؟
      - كيف يشكل التتبع النمو؟
      - ما هي العلاقة بين الحركة والضوء؟
  - id: nmg_slug_trail
    name: أثر الحلزون
    prompt: |
      يترك الحلزون أثرًا — فضيًا، لزجًا. الأثر يسجل المرور. كما أنه يحمي قدم الحلزون. فكر في الأثر كسجل وتكيف في آن واحد. ماذا يمكّن؟
    follow_ups:
      - ماذا سيكون الحلزون بدون الأثر؟
      - كيف يشكل اللعاب الحركة؟
      - ما هي العلاقة بين الأثر والمفترس؟
  - id: nmg_birdhouse_hole
    name: فتحة بيت الطيور
    prompt: |
      يحتوي بيت الطيور على فتحة — قطر محدد. يستثني بعض الطيور، ويدعو البعض الآخر. الفتحة هي مرشح. لمن صممت؟ من ادعى أنها له؟
    follow_ups:
      - ماذا ستكون الساحة بدون بيت الطيور؟
      - كيف تشكل الفتحة من يبني العش؟
      - ما هي العلاقة بين الفتحة والمستأجر؟
  - id: nmg_root_hair
    name: شعيرات الجذر
    prompt: |
      شعيرات الجذر غير مرئية من الأعلى — امتدادات صغيرة تمتص الماء والعناصر الغذائية. واجهة النبات مع التربة. فكر فيما يحدث في الأسفل. ماذا ستخسر النبتة بدونها؟
    follow_ups:
      - كيف تشكل الشعيرات الامتصاص؟
      - ما هي العلاقة بين الشعيرات والتربة؟
      - ماذا سترى إذا استطعت رؤيتها؟
  - id: nmg_frost_leaf
    name: الصقيع على الورقة
    prompt: |
      أنماط الصقيع على ورقة — بلورية، رقيقة. الصقيع هو ماء متجمد من الهواء. سيذوب مع الشمس. فكر في الفن المؤقت. ماذا تختبر الورقة؟
    follow_ups:
      - ماذا سيكون الصباح بدون الصقيع؟
      - كيف يشكل الصقيع يوم الورقة؟
      - ما هي العلاقة بين البلورة والخلية؟
  - id: nmg_companion_plant
    name: نبات مصاحب
    prompt: |
      الريحان بجانب الطماطم. القطيفة بجانب القرع. زراعة النباتات المصاحبة هي تجاور استراتيجي. بعض النباتات تطرد؛ بعضها يجذب. فكر في الحياة الاجتماعية للسرير.
    follow_ups:
      - ماذا ستكون الطماطم بدون الريحان؟
      - كيف يشكل التجاور الحديقة؟
      - ما هي العلاقة بين الجار والآفة؟
  - id: nmg_fallen_apple
    name: تفاحة ساقطة
    prompt: |
      تسقط تفاحة — لم تُقطف، ناضجة جدًا. ستتعفن، تطعم الدبابير، ربما تنبت شتلة. السقوط هو نفايات وبداية في آن واحد. فكر في القوس من الغصن إلى التربة.
    follow_ups:
      - ماذا ستكون الأرض بدون السقوط؟
      - كيف يشكل التعفن ما يأتي بعد ذلك؟
      - ما هي العلاقة بين السقوط والانتشار؟
  - id: nmg_spider_web_corner
    name: شبكة العنكبوت في الزاوية
    prompt: |
      تمتد شبكة عنكبوت في زاوية سقيفة. يلتقط الندى على الحرير. الشبكة هي فخ ومنزل في آن واحد. فكر في اقتصاد العنكبوت. ما الذي يستثمره؟ ما الذي يحصده؟
    follow_ups:
      - ماذا ستكون الزاوية بدون الشبكة؟
      - كيف تشكل الشبكة يوم العنكبوت؟
      - ما هي العلاقة بين الحرير والفريسة؟
  - id: nmg_seed_packet
    name: عبوة بذور
    prompt: |
      عبوة بذور — صورة على الأمام، تعليمات على الظهر. العبوة هي وعد. ماذا سينبثق من تلك النقاط الصغيرة؟ فكر في العلاقة بين الصورة والواقع.
    follow_ups:
      - ماذا ستكون الحديقة بدون العبوة؟
      - كيف تشكل العبوة التوقعات؟
      - ما هي العلاقة بين الوعد والنبات؟
  - id: nmg_rain_barrel
    name: برميل المطر
    prompt: |
      يلتقط برميل المطر المياه السطحية من السطح. الماء مجاني، ناعم، غير مكلور. البرميل هو بنية تحتية. فكر فيما يتدفق من السماء إلى البرميل إلى الجذر.
    follow_ups:
      - ماذا ستكون الحديقة بدون البرميل؟
      - كيف يختلف المطر المُلتقط عن ماء الصنبور؟
      - ما هي العلاقة بين السطح والجذر؟
  - id: nmg_garden_glove
    name: قفاز الحديقة
    prompt: |
      قفاز تُرك في السرير — أصابع متصلبة، ملطخة بالتربة. القفاز هو طرف اصطناعي. يمد اليد، ويحميها. فكر في الحدود بين الإنسان والتربة. ماذا يسمح به القفاز؟
    follow_ups:
      - ماذا سيشعر البستاني بدون القفاز؟
      - كيف يشكل القفاز العلاقة؟
      - ما هي العلاقة بين اليد والأرض؟
  - id: nmg_caterpillar_chew
    name: مضغ اليرقة
    prompt: |
      تأكل اليرقة ورقة — حافة تلو الأخرى. المضغ مسموع. اليرقة تحول الورقة إلى فراشة. فكر في التكلفة على النبات. ماذا يكسب من الاستضافة؟
    follow_ups:
      - ماذا ستكون الورقة بدون المضغ؟
      - كيف تشكل اليرقة النبات؟
      - ما هي العلاقة بين الأكل والتحول؟
  - id: nmg_fertilizer_burn
    name: حرق الأسمدة
    prompt: |
      الكثير من الأسمدة يحرق — أطراف بنية، جذور مقرمشة. الحديقة هي كيمياء. الأكثر ليس دائمًا أفضل. فكر في الخط الفاصل بين الغذاء والسم. أين هو الخط؟
    follow_ups:
      - ماذا سيكون النبات مع كمية أقل؟
      - كيف يشكل الزائد الورقة؟
      - ما هي العلاقة بين الجرعة والضرر؟
  - id: nmg_shade_cloth
    name: قماش الظل
    prompt: |
      يمتد قماش الظل فوق الشتلات. ينشر الضوء، ويقلل الحرارة. القماش هو توسط — بين الشمس والنبات. فكر فيما يضيفه القماش. ماذا يطرح؟
    follow_ups:
      - ماذا ستكون الشتلة بدون القماش؟
      - كيف يشكل الظل النمو المبكر؟
      - ما هي العلاقة بين المرشح والضوء؟
  - id: nmg_morning_glory_dawn
    name: زهرة الصباح عند الفجر
    prompt: |
      تتفتح زهور الصباح عند الفجر، وتغلق بحلول الظهيرة. للزهرة جدول زمني. فكر في الإيقاع. ماذا ستكون الحديقة إذا بقيت مفتوحة طوال اليوم؟
    follow_ups:
      - كيف يشكل التوقيت التلقيح؟
      - ما هي العلاقة بين الانفتاح والملقح؟
      - لماذا الفجر؟
  - id: nmg_garden_path
    name: ممر الحديقة
    prompt: |
      ممر عبر الحديقة — أحجار تدوس أو نشارة. الممر هو المكان الذي نسير فيه. الباقي هو المكان الذي لا نسير فيه. فكر في الخط. ماذا يحمي الممر؟ ماذا يستبعد؟
    follow_ups:
      - ماذا ستكون الحديقة بدون الممر؟
      - كيف يشكل الممر الحركة؟
      - ما هي العلاقة بين الخطوة والتربة؟
  - id: nmg_cross_pollination
    name: التلقيح الخلطي
    prompt: |
      يحمل النحل حبوب اللقاح من نبات إلى آخر. سيكون النسل هجينًا — غير مطابق لأي من الوالدين. فكر في المزيج. ماذا يخلق التلقيح؟ ماذا يخاطر به؟
    follow_ups:
      - ماذا ستكون التنوع بدون التلقيح؟
      - كيف يشكل النحل الجين؟
      - ما هي العلاقة بين الحمل والدمج؟
  - id: nmg_herb_scent
    name: رائحة الأعشاب
    prompt: |
      افرك إكليل الجبل أو النعناع. ترتفع الرائحة — الزيوت المتطايرة تتحرر. الرائحة هي دفاع ودعوة. فكر في الدور المزدوج. ماذا تطرد؟ ماذا تجذب؟
    follow_ups:
      - ماذا ستكون العشبة بدون الرائحة؟
      - كيف يشكل الزيت اللقاء؟
      - ما هي العلاقة بين اللمس والإطلاق؟
  - id: nmg_watering_can_pour
    name: سكب إبريق الري
    prompt: |
      الماء من إبريق — ألطف من الخرطوم. السكب متعمد. فكر في الطقوس. ماذا يسمح به الإبريق ولا يسمح به الخرطوم؟ ما هي العلاقة بين السكب والنبات؟
    follow_ups:
      - ماذا ستفضل الشتلة؟
      - كيف يشكل السكب التربة؟
      - ما هي العلاقة بين الطقوس والنمو؟
  - id: nmg_bird_seed_spill
    name: انسكاب بذور الطيور
    prompt: |
      تنسكب البذور من مغذاة — عباد الشمس، الدخن. تسقط على الأرض. تخدش العصافير. تنهب السناجب. الانسكاب يخلق مسرحًا. فكر بمن يستفيد. لمن كانت معدة؟
    follow_ups:
      - ماذا ستكون الأرض بدون الانسكاب؟
      - كيف يشكل الانسكاب السرب؟
      - ما هي العلاقة بين السقوط والمقيم؟
  - id: nmg_cutting_propagate
    name: استنساخ العقل
    prompt: |
      عقلة — ساق في الماء أو التربة — تجذر. لا توجد بذرة. النبات يستنسخ نفسه. فكر في الاختصار. ماذا يتجاوز الاستنساخ؟ ماذا يحافظ عليه؟
    follow_ups:
      - ماذا ستكون الحديقة بدون العقل؟
      - كيف يشكل الاستنساخ التنوع؟
      - ما هي العلاقة بين القطع والاستمرارية؟
  - id: nmg_leaf_miner_tunnel
    name: نفق حفار الأوراق
    prompt: |
      أثر حفار الأوراق — متعرج، شاحب، تحت السطح. اليرقة تأكل بين الطبقات. الورقة تبقى، مصابة بندبة. فكر في الغزو. ماذا تخسر الورقة؟ ماذا تحتفظ به؟
    follow_ups:
      - ماذا ستكون الورقة بدون النفق؟
      - كيف يشكل الحفار الورقة؟
      - ما هي العلاقة بين النفق والنسيج؟
  - id: nmg_greenhouse_condensation
    name: تكثف البيت الزجاجي
    prompt: |
      تتكون قطرات التكثف على زجاج البيت الزجاجي. الهواء في الداخل رطب — النباتات تزفر. الزجاج هو حدود. فكر في المناخ المصغر. ما الذي يحبس الدفء؟ ما الذي يحبس الرطوبة؟
    follow_ups:
      - ماذا سيكون البيت الزجاجي بدون الزجاج؟
      - كيف يشكل التكثف الداخل؟
      - ما هي العلاقة بين الزجاج والنمو؟
  - id: nmg_terrace_level
    name: مستوى الشرفة
    prompt: |
      سرير مدرج ينحدر على منحدر. كل مستوى يحتفظ بالتربة، يحتفظ بالماء. الشرفة هي وسيلة للتحكم في التعرية ومسرح. فكر في الهندسة المعمارية. ماذا سيكون المنحدر بدونها؟
    follow_ups:
      - كيف يشكل المستوى ما ينمو؟
      - ما هي العلاقة بين الخطوة والاستقرار؟
      - لماذا الشرفة؟
  - id: nmg_native_vs_exotic
    name: أصلي مقابل غريب
    prompt: |
      بعض النباتات أصلية — تنتمي. والبعض الآخر غريب — تم تقديمه. فكر في السرير. أيها أصلي؟ أيها غريب؟ هل هذا مهم؟ ماذا تقدم النباتات الأصلية ولا تقدمها النباتات الغريبة؟
    follow_ups:
      - ماذا ستكون الحديقة مع النباتات الأصلية فقط؟
      - كيف يشكل الأصل البيئة؟
      - ما هي العلاقة بين الانتماء والازدهار؟
  - id: nmg_garden_dusk
    name: حديقة عند الغسق
    prompt: |
      الحديقة عند الغسق — يتلاشى الضوء، تخرج العث. ينتهي نوبة النهار؛ تبدأ نوبة الليل. فكر في الانتقال. من يستيقظ؟ من ينام؟ ماذا تصبح الحديقة؟
    follow_ups:
      - ماذا ستكون الحديقة بدون الغسق؟
      - كيف يشكل التحول النظام البيئي؟
      - ما هي العلاقة بين النهار والليل؟
  - id: nmg_stake_tie
    name: وتد ورباط
    prompt: |
      نبات مربوط ب وتد — فول، طماطم. الوتد يصلح. بدونه، ستنتشر النبتة. فكر في الدعم. ماذا يمكّن الرباط؟ ماذا يقيد؟
    follow_ups:
      - ماذا ستكون النبتة بدون الوتد؟
      - كيف يشكل الرباط الشكل؟
      - ما هي العلاقة بين الدعم والنمو؟
  - id: nmg_first_frost
    name: الصقيع الأول
    prompt: |
      الصقيع الأول — النباتات الرقيقة تصبح سوداء. تتغير الحديقة. بعض الأشياء تنتهي؛ وبعضها يستمر. فكر في العتبة. ماذا يختار الصقيع؟ ماذا يدخر؟
    follow_ups:
      - ماذا ستكون الحديقة بدون صقيع؟
      - كيف يشكل الصقيع الأول الموسم؟
      - ما هي العلاقة بين البرد والإغلاق؟
  - id: nmg_garden_reflection
    name: انعكاس الحديقة
    prompt: |
      انظر إلى الحديقة. إنها تعكس الخيارات — ما زُرع، وما تم قلعه، وما تُرك. الحديقة مرآة. ماذا تظهر عن البستاني؟
    follow_ups:
      - ماذا ستقول الحديقة بدون كلمات؟
      - كيف تشكل الخيارات الكل؟
      - ما هي العلاقة بين البستاني وما نمى؟
