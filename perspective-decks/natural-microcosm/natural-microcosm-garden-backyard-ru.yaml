# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Естественный микромир — Сад и задний двор (Russian)

id: natural_microcosm_garden_backyard
name: Естественный микромир — Сад и задний двор
description: 50 карточек, чтобы изменить ваш взгляд на дикую природу в домашней среде — от опылителей и почвы до сорняков и посевов, а также хореографии культивированной природы.
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: Посадка пчелы
    prompt: |
      Наблюдайте, как пчела приземляется на цветок. Подлет, касание, зависание.
      Пчела — одновременно хищник и опылитель. Что получает цветок? Чем он рискует?
    follow_ups:
      - Как посадка влияет на следующий визит?
      - Каким был бы сад без пчел?
      - Каковы отношения между цветком и пчелой?
  - id: nmg_soil_crumble
    name: Почва в руке
    prompt: |
      Возьмите горсть земли. Почувствуйте ее текстуру — рассыпчатость, зернистость.
      Эта почва хранит историю, смерть, возрождение. Что здесь росло раньше?
      Что из нее вырастет?
    follow_ups:
      - Как почва влияет на то, что растет?
      - Что означала бы стерильная почва?
      - Каковы отношения между рассыпчатостью и жизнью?
  - id: nmg_weed_edge
    name: Сорняк на краю
    prompt: |
      Сорняк растет там, где газон встречается с клумбой. Его не сажали. Его
      пригласили — или он пригласил себя сам. Рассмотрите границу. Кто проводит черту
      между сорняком и цветком?
    follow_ups:
      - Каким был бы сад без сорняков?
      - Как край создает напряжение?
      - Каковы отношения между сорняком и намерением?
  - id: nmg_compost_steam
    name: Пар от компоста
    prompt: |
      Переверните компостную кучу. Поднимается пар — разложение в процессе. Тепло — это
      микробная работа. Кухонные отходы становятся почвой. проследите
      трансформацию.
    follow_ups:
      - Что потерял бы сад без компоста?
      - Как тепло отмечает процесс?
      - Каковы отношения между отходами и плодородием?
  - id: nmg_seed_dormancy
    name: Покой семени
    prompt: |
      Семечко в почве может ждать годы — десятилетия. Оно живое, но в паузе. Что
      его пробуждает? Свет, вода, огонь, возмущение. Рассмотрите терпение семени.
    follow_ups:
      - Что потеряет прорастание без покоя?
      - Как ожидание влияет на выживание?
      - Каковы отношения между паузой и появлением?
  - id: nmg_bird_bath
    name: Птичья купальня
    prompt: |
      Птичья купальня — это приглашение. Посмотрите, кто приходит — воробьи, малиновки, возможно, сойка.
      Купальня создает встречу. Каким был бы двор без этого
      маленького водоема?
    follow_ups:
      - Как купальня влияет на то, кто приходит?
      - Какова хореография прибытия?
      - Каковы отношения между водой и птицей?
  - id: nmg_tomato_truss
    name: Кисть помидора
    prompt: |
      Кисть помидора держит зеленые, а затем красные плоды. Изучите архитектуру.
      Стебель, ветви, вес. Растение — это инженерия. Что его поддерживает?
    follow_ups:
      - Каким было бы растение без кисти?
      - Как структура влияет на урожай?
      - Каковы отношения между формой и плодом?
  - id: nmg_aphid_column
    name: Колония тли
    prompt: |
      Тля скапливается на стебле — сосущая, размножающаяся. Это одновременно вредитель и
      добыча. Придут божьи коровки. Заметьте экологию. Каковы отношения между
      вспышкой и балансом?
    follow_ups:
      - Каким было бы растение без тли?
      - Как скопление привлекает хищников?
      - Каковы отношения между вредителем и экосистемой?
  - id: nmg_hose_spray
    name: Струя из шланга
    prompt: |
      Вода из шланга попадает на почву. Смотрите, как она собирается в лужицы, впитывается, течет. Струя — это
      искусственный дождь. Чем он отличается от настоящего? Что получает растение?
    follow_ups:
      - Каким был бы сад без шланга?
      - Как орошение влияет на рост?
      - Каковы отношения между струей и дождем?
  - id: nmg_lawn_mow
    name: Косьба газона
    prompt: |
      Газон — это управляемая дикость — подстриженный до нужной высоты, поддерживаемый зеленым. Косьба прерывает
      рост. Подумайте, во что бы превратился газон, если бы его оставили в покое. Что мы
      сдерживаем?
    follow_ups:
      - Каким был бы двор без косьбы?
      - Как стрижка формирует идентичность?
      - Каковы отношения между газоном и контролем?
  - id: nmg_pot_bound
    name: Корни в горшке
    prompt: |
      Растение в горшке — корни закручиваются, ищут. Горшок — это граница. Что
      сделало бы растение с неограниченной почвой? Горшок — это одновременно тюрьма и
      защита. Рассмотрите компромисс.
    follow_ups:
      - Каким было бы растение без горшка?
      - Как ограничение влияет на рост?
      - Каковы отношения между корнем и стенкой?
  - id: nmg_mulch_layer
    name: Слой мульчи
    prompt: |
      Мульча покрывает почву — древесная щепа, солома, листья. Она удерживает влагу,
      подавляет сорняки, в конечном итоге превращается в почву. Слой временный.
      Что он делает, пока существует?
    follow_ups:
      - Каким был бы участок без мульчи?
      - Как слой создает микроклимат?
      - Каковы отношения между покровом и почвой?
  - id: nmg_hummingbird_hover
    name: Зависание колибри
    prompt: |
      Колибри зависает у цветка — крылья невидимы от скорости. Зависание
      требует затрат. Нектар должен того стоить. Рассмотрите экономику
      визита.
    follow_ups:
      - Каким был бы цветок без колибри?
      - Как зависание влияет на отношения?
      - Каковы отношения между затратами и наградой?
  - id: nmg_fence_creep
    name: Ползучесть по забору
    prompt: |
      Плющ или вьюнок ползет вдоль забора. Растение не знает, что забор создан человеком.
      Оно все равно карабкается. Рассмотрите столкновение
      роста и структуры.
    follow_ups:
      - За что карабкалось бы растение без забора?
      - Как забор влияет на лозу?
      - Каковы отношения между лазанием и опорой?
  - id: nmg_worm_cast
    name: Дождевой червяк
    prompt: |
      Червячные комки — маленькие кучки почвы — усеивают газон. Червяк прошел,
      оставляя плодородие. Комок — это археология. Что переработал червяк?
      Что он оставил после себя?
    follow_ups:
      - Какой была бы почва без дождевых червей?
      - Как комок отмечает работу червяка?
      - Каковы отношения между комком и аэрацией?
  - id: nmg_squirrel_cache
    name: Запасы белки
    prompt: |
      Белка закапывает орех — а затем забывает. Орех может прорасти. Белка —
      случайный садовник. Рассмотрите отношения между памятью и
      распространением. Что вырастет из забывчивости?
    follow_ups:
      - Каким было бы дубовое дерево без белки?
      - Как запасы влияют на распространение леса?
      - Каковы отношения между закапыванием и прорастанием?
  - id: nmg_dew_morning
    name: Роса утром
    prompt: |
      Утренняя роса капельками блестит на листьях. Каждая капля держит свет. Роса — это
      конденсат — вода из воздуха. К полудню она испарится. Рассмотрите
      краткий подарок. Что получает растение?
    follow_ups:
      - Каким было бы утро без росы?
      - Как капля влияет на утро?
      - Каковы отношения между конденсатом и листом?
  - id: nmg_prune_scar
    name: Шрам от обрезки
    prompt: |
      Шрам от обрезки отмечает место, где была отрезана ветвь. Дерево зажило — или попыталось.
      Шрам — это история. Что было удалено? Почему? Что дерево помнит?
    follow_ups:
      - Каким было бы дерево без обрезки?
      - Как срез влияет на рост?
      - Каковы отношения между раной и формой?
  - id: nmg_sunflower_turn
    name: Поворот подсолнуха
    prompt: |
      Молодой подсолнух поворачивается за солнцем — на восток на рассвете, на запад на закате. Движение —
      гелиотропизм. Растение отслеживает свет. Рассмотрите
      хореографию. Что означало бы фиксированное направление?
    follow_ups:
      - Каким был бы подсолнух без поворота?
      - Как отслеживание света влияет на рост?
      - Каковы отношения между движением и светом?
  - id: nmg_slug_trail
    name: Слизневый след
    prompt: |
      Слизняк оставляет след — серебристый, липкий. След отмечает прохождение. Он
      также защищает ногу слизня. Рассмотрите след как запись и
      адаптацию. Что он позволяет?
    follow_ups:
      - Каким был бы слизень без следа?
      - Как слизь влияет на движение?
      - Каковы отношения между следом и хищником?
  - id: nmg_birdhouse_hole
    name: Отверстие в скворечнике
    prompt: |
      В скворечнике есть отверстие — определенного диаметра. Оно исключает одних птиц,
      приглашает других. Отверстие — это фильтр. Для кого оно было предназначено? Кто
      его занял?
    follow_ups:
      - Каким был бы двор без скворечника?
      - Как отверстие влияет на то, кто гнездится?
      - Каковы отношения между отверстием и жильцом?
  - id: nmg_root_hair
    name: Корневой волосок
    prompt: |
      Корневые волоски невидимы сверху — крошечные отростки, которые впитывают воду
      и питательные вещества. Связь растения с почвой. Рассмотрите, что происходит
      внизу. Что потеряло бы растение без них?
    follow_ups:
      - Как волосок влияет на впитывание?
      - Каковы отношения между волоском и почвой?
      - Что бы вы увидели, если бы могли их видеть?
  - id: nmg_frost_leaf
    name: Иней на листе
    prompt: |
      Узоры инея на листе — кристаллические, нежные. Иней — это вода,
      замерзшая из воздуха. Он растает под солнцем. Рассмотрите временное
      искусство. Что испытывает лист?
    follow_ups:
      - Каким было бы утро без инея?
      - Как иней влияет на день листа?
      - Каковы отношения между кристаллом и клеткой?
  - id: nmg_companion_plant
    name: Соседнее растение
    prompt: |
      Базилик рядом с помидорами. Бархатцы рядом с тыквой. Соседнее выращивание — это
      стратегическое размещение. Некоторые растения отпугивают; некоторые привлекают. Рассмотрите
      социальную жизнь грядки.
    follow_ups:
      - Каким был бы помидор без базилика?
      - Как соседство влияет на сад?
      - Каковы отношения между соседом и вредителем?
  - id: nmg_fallen_apple
    name: Упавшее яблоко
    prompt: |
      Яблоко падает — несобранное, перезревшее. Оно сгниет, накормит ос, возможно, даст росток.
      Падение — это одновременно отходы и начало. Рассмотрите дугу от
      ветки до почвы.
    follow_ups:
      - Каким была бы земля без падения?
      - Как гниение влияет на то, что происходит дальше?
      - Каковы отношения между падением и распространением?
  - id: nmg_spider_web_corner
    name: Паутина в углу
    prompt: |
      Паутина перекрывает угол сарая. Роса задерживается на шелке. Паутина — это одновременно ловушка и
      дом. Рассмотрите экономику паука. Во что он вкладывает?
      Что он собирает?
    follow_ups:
      - Каким был бы угол без паутины?
      - Как паутина влияет на день паука?
      - Каковы отношения между шелком и добычей?
  - id: nmg_seed_packet
    name: Пакетик семян
    prompt: |
      Пакетик семян — фото спереди, инструкции сзади. Пакетик — это обещание. Что
      появится из этих крошечных точек? Рассмотрите
      отношения между изображением и реальностью.
    follow_ups:
      - Каким был бы сад без пакетика?
      - Как пакетик влияет на ожидания?
      - Каковы отношения между обещанием и растением?
  - id: nmg_rain_barrel
    name: Дождевая бочка
    prompt: |
      Дождевая бочка собирает сток с крыши. Вода бесплатная, мягкая,
      нехлорированная. Бочка — это инфраструктура. Рассмотрите, что течет
      с неба в бочку и к корню.
    follow_ups:
      - Каким был бы сад без бочки?
      - Чем собранный дождь отличается от водопроводной воды?
      - Каковы отношения между крышей и корнем?
  - id: nmg_garden_glove
    name: Садовая перчатка
    prompt: |
      Перчатка, оставленная на грядке — пальцы жесткие, испачканные землей. Перчатка — это
      протез. Она удлиняет руку, защищает ее. Рассмотрите границу
      между человеком и почвой. Что позволяет перчатка?
    follow_ups:
      - Что почувствовал бы садовник без перчатки?
      - Как перчатка влияет на отношения?
      - Каковы отношения между рукой и землей?
  - id: nmg_caterpillar_chew
    name: Погрыз гусеницы
    prompt: |
      Гусеница ест лист — край за краем. Погрыз слышен. Гусеница
      превращает лист в бабочку. Рассмотрите цену для
      растения. Что оно получает от того, что его принимают?
    follow_ups:
      - Каким был бы лист без погрыза?
      - Как гусеница влияет на растение?
      - Каковы отношения между поеданием и превращением?
  - id: nmg_fertilizer_burn
    name: Ожог от удобрений
    prompt: |
      Избыток удобрений обжигает — кончики коричневеют, корни высыхают. Сад — это
      химия. Больше — не всегда лучше. Рассмотрите грань между питанием
      и ядом. Где проходит черта?
    follow_ups:
      - Каким было бы растение при меньшем количестве?
      - Как избыток влияет на лист?
      - Каковы отношения между дозой и повреждением?
  - id: nmg_shade_cloth
    name: Затеняющая ткань
    prompt: |
      Затеняющая ткань натянута над рассадой. Она рассеивает свет, снижает температуру. Ткань — это посредничество —
      между солнцем и растением. Рассмотрите, что добавляет ткань.
      Что она убирает?
    follow_ups:
      - Каким было бы растение без ткани?
      - Как тень влияет на ранний рост?
      - Каковы отношения между фильтром и светом?
  - id: nmg_morning_glory_dawn
    name: Вьюнок на рассвете
    prompt: |
      Вьюнки раскрываются на рассвете, закрываются к полудню. Цветок имеет
      расписание. Рассмотрите ритм. Каким был бы сад, если бы он оставался
      открытым весь день?
    follow_ups:
      - Как время влияет на опыление?
      - Каковы отношения между раскрытием и опылителем?
      - Почему рассвет?
  - id: nmg_garden_path
    name: Садовая дорожка
    prompt: |
      Дорожка через сад — каменные плиты или мульча. Дорожка — это место, где
      мы ходим. Остальное — где мы не ходим. Рассмотрите линию. Что
      защищает дорожка? Что она исключает?
    follow_ups:
      - Каким был бы сад без дорожки?
      - Как дорожка влияет на движение?
      - Каковы отношения между шагом и почвой?
  - id: nmg_cross_pollination
    name: Перекрестное опыление
    prompt: |
      Пчелы переносят пыльцу с одного растения на другое. Потомство будет
      гибридами — не идентичным ни одному из родителей. Рассмотрите смесь. Что
      создает перекрестное опыление? Чем оно рискует?
    follow_ups:
      - Каким было бы разнообразие без перекрестного опыления?
      - Как пчела влияет на ген?
      - Каковы отношения между переносом и соединением?
  - id: nmg_herb_scent
    name: Аромат травы
    prompt: |
      Прикоснитесь к розмарину или мяте. Поднимается аромат — высвобождаются летучие масла.
      Аромат — это защита и приглашение. Рассмотрите двойную роль. Что
      отпугивает? Что привлекает?
    follow_ups:
      - Каким была бы трава без аромата?
      - Как масло влияет на взаимодействие?
      - Каковы отношения между прикосновением и высвобождением?
  - id: nmg_watering_can_pour
    name: Лейка наливает
    prompt: |
      Вода из лейки — мягче, чем из шланга. Наливание — это намеренное действие. Рассмотрите
      ритуал. Что позволяет лейка, чего не позволяет шланг? Каковы
      отношения между наливанием и растением?
    follow_ups:
      - Что бы предпочла рассада?
      - Как наливание влияет на почву?
      - Каковы отношения между ритуалом и ростом?
  - id: nmg_bird_seed_spill
    name: Рассыпанный корм для птиц
    prompt: |
      Корм рассыпается из кормушки — подсолнечник, просо. Он попадает на землю.
      Воробьи копаются. Белки налетают. Рассыпанный корм создает сцену. Рассмотрите,
      кто получает выгоду. Для кого он предназначался?
    follow_ups:
      - Какой была бы земля без россыпи?
      - Как россыпь влияет на стаю?
      - Каковы отношения между россыпью и обедающим?
  - id: nmg_cutting_propagate
    name: Укоренение черенка
    prompt: |
      Черенок — стебель в воде или почве — укореняется. Без семени. Растение клонирует
      себя. Рассмотрите кратчайший путь. Что обходит вегетативное размножение?
      Что оно сохраняет?
    follow_ups:
      - Каким был бы сад без черенков?
      - Как клонирование влияет на разнообразие?
      - Каковы отношения между срезом и продолжением?
  - id: nmg_leaf_miner_tunnel
    name: Туннель листового минера
    prompt: |
      След листового минера — извилистый, бледный, под поверхностью. Личинка
      ест между слоями. Лист выживает, покрываясь шрамами. Рассмотрите
      вторжение. Что теряет лист? Что он сохраняет?
    follow_ups:
      - Каким был бы лист без туннеля?
      - Как минера влияет на лист?
      - Каковы отношения между туннелем и тканью?
  - id: nmg_greenhouse_condensation
    name: Конденсат в теплице
    prompt: |
      Конденсат капельками оседает на стекле теплицы. Воздух внутри влажный — растения
      выдыхают. Стекло — это граница. Рассмотрите микроклимат. Что удерживает
      тепло? Что удерживает влагу?
    follow_ups:
      - Какой была бы теплица без стекла?
      - Как конденсат влияет на внутреннюю среду?
      - Каковы отношения между стеклом и ростом?
  - id: nmg_terrace_level
    name: Терраса уровня
    prompt: |
      Террасная грядка ступенчато спускается по склону. Каждый уровень удерживает почву, удерживает воду.
      Терраса — это защита от эрозии и сцена. Рассмотрите архитектуру.
      Каким был бы склон без нее?
    follow_ups:
      - Как уровень влияет на то, что растет?
      - Каковы отношения между ступенькой и стабильностью?
      - Зачем террасировать?
  - id: nmg_native_vs_exotic
    name: Местный против экзотического
    prompt: |
      Некоторые растения местные — они принадлежат. Другие — экзотические — завезенные.
      Рассмотрите грядку. Которое есть которое? Имеет ли это значение? Что дает местное,
      чего не дает экзотическое?
    follow_ups:
      - Каким был бы сад только из местных растений?
      - Как происхождение влияет на экологию?
      - Каковы отношения между принадлежностью и процветанием?
  - id: nmg_garden_dusk
    name: Сад в сумерках
    prompt: |
      Сад в сумерках — свет угасает, появляются мотыльки. Смена дня заканчивается; ночная
      смена начинается. Рассмотрите переход. Кто просыпается? Кто спит?
      Чем становится сад?
    follow_ups:
      - Каким был бы сад без сумерек?
      - Как смена влияет на экосистему?
      - Каковы отношения между днем и ночью?
  - id: nmg_stake_tie
    name: Колышек и подвязка
    prompt: |
      Растение, подвязанное к колышку — фасоль, помидор. Колышек исправляет. Без него
      растение разрасталось бы. Рассмотрите поддержку. Что позволяет подвязка?
      Что она ограничивает?
    follow_ups:
      - Каким было бы растение без колышка?
      - Как подвязка влияет на форму?
      - Каковы отношения между поддержкой и ростом?
  - id: nmg_first_frost
    name: Первый заморозок
    prompt: |
      Первый заморозок — нежные растения чернеют. Сад меняется. Что-то
      заканчивается; что-то остается. Рассмотрите порог. Что отбирает заморозок?
      Что он щадит?
    follow_ups:
      - Каким был бы сад без заморозков?
      - Как первый заморозок влияет на сезон?
      - Каковы отношения между холодом и завершением?
  - id: nmg_garden_reflection
    name: Отражение сада
    prompt: |
      Посмотрите на сад. Он отражает решения — что было посажено, что было
      прополото, что было оставлено в покое. Сад — это зеркало. Что он показывает
      о садовнике?
    follow_ups:
      - Что бы сказал сад без слов?
      - Как решения влияют на целое?
      - Каковы отношения между садовником и выращенным?
