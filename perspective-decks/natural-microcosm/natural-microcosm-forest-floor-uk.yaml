# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природний Мікрокосм — Лісова Підстилка (Ukrainian)

id: natural_microcosm_forest_floor
name: Природний Мікрокосм — Лісова Підстилка
description: 50 карток, щоб змінити ваш погляд на лісову підстилку — від розкладання та міцелію до архітектури листяного опаду та невидимого життя під кронами дерев.
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: Жилка Листка
    prompt: |
      Візьміть опалий листок. Прослідкуйте його жилки. Вони несли воду, поживні речовини,
      цукри. Архітектура невидима, поки ви не придивитесь. Що підтримувала мережа жилок, коли листок був живим?
    follow_ups:
      - Чим відрізняється візерунок між видами?
      - Яким був би листок без жилок?
      - Який зв'язок між жилками та краєм?
  - id: nmf_leaf_litter_layer
    name: Шар Листяного Опаду
    prompt: |
      Лісова підстилка складається з шарів — свіжий опад зверху, минулорічний нижче, ще старіший ще нижче. Присядьте. Розгорніть шар. Який градієнт? Як накопичується час?
    follow_ups:
      - Що було б з лісом без опаду?
      - Як шар створює середовище існування?
      - Який зв'язок між шаром і розкладанням?
  - id: nmf_mushroom_fruiting
    name: Плодове Тіло Гриба
    prompt: |
      Гриб — це лише плодове тіло. Організм — міцелій — поширюється під землею, крізь ґрунт, крізь деревину. Розгляньте те, що ви бачите, як сигнал. Яка решта історії?
    follow_ups:
      - Що було б з лісом без грибів?
      - Як плодове тіло пов'язане з мережею?
      - Який зв'язок між грибом і розкладанням?
  - id: nmf_log_sponge
    name: Колода-Губка
    prompt: |
      Палала колода вбирає воду, утримує її. Притисніть до неї руку після дощу.
      Колода — це резервуар. Хто п'є з нього? Хто живе всередині?
    follow_ups:
      - Що було б з лісом без колод-нянь?
      - Як колода створює мікроклімат?
      - Який зв'язок між деревиною та водою?
  - id: nmf_moss_cushion
    name: Моховий Подушка
    prompt: |
      Мох утримує воду, як губка. Торкніться його. Подушка — це архітектура —
      дрібні рослини, щільно упаковані. Хто живе в проміжках?
    follow_ups:
      - Що було б з підстилкою без моху?
      - Як подушка створює вологість?
      - Який зв'язок між мохом і саджанцем?
  - id: nmf_fern_unfurl
    name: Розгортання Папороті
    prompt: |
      Листя папороті розгортається спіраллю — "павині голови". Рух повільний. Спостерігайте за одним протягом днів, якщо можете. Як розгортання формує листок?
    follow_ups:
      - Якою була б папороть без спіралі?
      - Як розгортання захищає лист?
      - Який зв'язок між завитком і ростом?
  - id: nmf_root_tangle
    name: Заплутаність Коренів
    prompt: |
      Корені заплутуються під поверхнею. Знайдіть місце, де впало дерево, і підніміть його кореневу грудку. Заплутаність — це карта пошуку. Чого прагнули корені?
    follow_ups:
      - Яким було б дерево без заплутаності?
      - Як корені ділять простір під землею?
      - Який зв'язок між коренем і грибком?
  - id: nmf_slug_trail
    name: Слід Слимака
    prompt: |
      Слід слимака блищить на листі — слиз, шлях, підпис. Слід позначає, куди пішов слимак. Що слід говорить хижакам? Жертвам?
    follow_ups:
      - Що втратить слимак без сліду?
      - Як слиз полегшує рух?
      - Який зв'язок між слідом і територією?
  - id: nmf_lichen_patch
    name: Ділянка Лишайника
    prompt: |
      Лишайник росте на корі, камені, ґрунті — повільно, композитно. Гриб і водорість разом. Знайдіть ділянку. Як довго вона там? Що вказує на її присутність?
    follow_ups:
      - Якою була б кора без лишайника?
      - Як лишайник позначає час?
      - Який зв'язок між лишайником і якістю повітря?
  - id: nmf_saprophyte
    name: Сапрофіт
    prompt: |
      Сапрофіти живляться мертвою речовиною — гриби, бактерії, комахи. Вони — переробники. Знайдіть докази розкладання. Хто їсть? Що трансформується?
    follow_ups:
      - Що було б з лісом без розкладачів?
      - Як розкладання живить новий ріст?
      - Який зв'язок між смертю та ґрунтом?
  - id: nmf_seedling_emergence
    name: Поява Саджанця
    prompt: |
      Саджанець пробивається крізь опале листя. Спочатку сім'ядолі, потім справжні листки.
      Відзначте силу. Що знадобилося, щоб пробитися? Що йому завадить?
    follow_ups:
      - Що було б з лісом без саджанців?
      - Від чого залежить поява саджанця від опалого листя?
      - Який зв'язок між саджанцем і світлом?
  - id: nmf_anthill_mound
    name: Мурашник
    prompt: |
      Мурашник підноситься з лісової підстилки — виритий ґрунт, організований.
      Спостерігайте за рухом. Куди вони йдуть? Що несуть?
    follow_ups:
      - Що було б з підстилкою без мурашника?
      - Як мурашник формує дренаж?
      - Який зв'язок між мурашником і колонією?
  - id: nmf_spider_silk
    name: Павутиння
    prompt: |
      Павутиння перекриває проміжки — між листям, гілками. Роса затримується на ньому. Павутина невидима, поки на неї не потрапить світло. Прослідкуйте одну нитку. Що вона з'єднує?
    follow_ups:
      - Яким був би проміжок без павутини?
      - Як павутина структурує простір?
      - Який зв'язок між павутиною і здобиччю?
  - id: nmf_bark_flake
    name: Лусочка Кори
    prompt: |
      Лусочка кори відпадає від стовбура — текстура, візерунок, вік. Кожна лусочка розповідає про сезон. Хто живе під корою? Що виявляє лусочка?
    follow_ups:
      - Яким було б дерево без кори?
      - Як кора захищає та ізолює?
      - Який зв'язок між лусочкою та оновленням?
  - id: nmf_acorn_fall
    name: Падіння Жолудя
    prompt: |
      Жолудь падає. Він важкий для свого розміру. Він пустить коріння або буде з'їдений.
      Розгляньте шанси. Що визначає, який шлях?
    follow_ups:
      - Що було б з лісом без жолудів?
      - Як падіння розповсюджує насіння?
      - Який зв'язок між жолудем і дубом?
  - id: nmf_fallen_branch
    name: Впала Гілка
    prompt: |
      Гілка лежить на підстилці — зламана, можливо, вітром. Тепер це міст.
      Що перетинає його? Що росте на ньому?
    follow_ups:
      - Що було б з підстилкою без упалих дерев?
      - Як гілка створює прибережне середовище?
      - Який зв'язок між гілкою та поживними речовинами?
  - id: nmf_humus_smell
    name: Запах Гумусу
    prompt: |
      Нахиліться до лісової підстилки. Запах — землі, розкладання, життя. Цей запах — це хімія. Що його створює? Що було б з лісом без нього?
    follow_ups:
      - Як запах позначає здоров'я?
      - Чим пахла б стерильна земля?
      - Який зв'язок між запахом і родючістю?
  - id: nmf_snail_shell
    name: Мушля Равлика
    prompt: |
      Порожня мушля равлика лежить в опалому листі. Спіраль, кальцій, покинута.
      Хто міг з'їсти равлика? Що використає мушлю?
    follow_ups:
      - Що було б з підстилкою без мушель?
      - Як мушля переробляє поживні речовини?
      - Який зв'язок між мушлею та кальцієм?
  - id: nmf_fungal_network
    name: Грибна Мережа
    prompt: |
      Міцелій з'єднує дерева — "лісова павутина". Ви її не бачите, але вона є. Поживні речовини течуть. Інформація тече. Розгляньте ліс як мережу.
    follow_ups:
      - Що було б з лісом без мережі?
      - Як мережа перерозподіляє ресурси?
      - Який зв'язок між грибом і деревом?
  - id: nmf_fern_spore
    name: Спори Папороті
    prompt: |
      Папороті розмножуються спорами — дрібними, незліченними. Подивіться на нижній бік листка. Соруси їх містять. Що потрібно, щоб прослідкувати шлях однієї спори?
    follow_ups:
      - Якою була б папороть без спор?
      - Як спора поширюється?
      - Який зв'язок між спорою та гаметофітом?
  - id: nmf_earthworm_cast
    name: Земляні Черв'яки-Відходи
    prompt: |
      Екскременти земляних черв'яків висипаються біля входів у нори — оброблений ґрунт, багатий.
      Черв'як їв і виділяв. Відходи — це подарунок поверхні.
    follow_ups:
      - Яким був би ґрунт без черв'яків?
      - Як відходи покращують структуру?
      - Який зв'язок між черв'яком і аерацією?
  - id: nmf_dappled_light
    name: Плямисте Світло
    prompt: |
      Світло падає крізь крони плямами — плямисте, рухоме. Лісова підстилка отримує менше, ніж відкрита місцевість. Як це формує те, що росте?
    follow_ups:
      - Якою була б підстилка під прямим сонцем?
      - Як плямистість створює мікросередовища?
      - Який зв'язок між світлом і саджанцем?
  - id: nmf_bracket_fungus
    name: Полипоровий Гриб
    prompt: |
      Полипоровий гриб росте зі стовбура — полиця, трутовик. Він перетравлює дерево зсередини. Дерево може стояти роками, поки це відбувається. Розгляньте повільне споживання.
    follow_ups:
      - Яким було б дерево без гриба?
      - Як полипоровий гриб поширює спори?
      - Який зв'язок між паразитом і господарем?
  - id: nmf_needle_mat
    name: Килим Хвої
    prompt: |
      Хвоя хвойних дерев накопичується під деревом — кисла, повільно розкладається. Килим змінює ґрунт. Що на ньому росте? Чого він уникає?
    follow_ups:
      - Що було б з підстилкою без килима?
      - Як килим хвої впливає на pH?
      - Який зв'язок між килимом і вогнем?
  - id: nmf_salamander_under
    name: Саламандра Під Ним
    prompt: |
      Саламандри живуть під колодами, каменями, опалим листям. Обережно підніміть щось —
      поверніть на місце. Вологість, темрява. Чому саламандра їх потребує?
    follow_ups:
      - Що було б з лісом без саламандр?
      - Як саламандра формує спільноту безхребетних?
      - Який зв'язок між вологістю та амфібією?
  - id: nmf_rot_hole
    name: Дірка від Гниття
    prompt: |
      Дірка в колоді — гниття, можливо, або тварина. Дірка — це порожнина. Хто там гніздиться? Хто там ховається?
    follow_ups:
      - Якою була б колода без дірки?
      - Як порожнина створює середовище існування?
      - Який зв'язок між гниттям і схованкою?
  - id: nmf_springtail_jump
    name: Стрибуни-Пташки
    prompt: |
      Стрибуни — крихітні, численні — стрибають при подразненні. Вони в опалому листі,
      ґрунті. Вони переробляють гриби, гниття. Відзначте, скільки ви не бачите.
    follow_ups:
      - Що було б з підстилкою без стрибунів?
      - Як стрибок допомагає втекти?
      - Який зв'язок між стрибуном і розкладанням?
  - id: nmf_bark_beetle_gallery
    name: Галерея Короволіка
    prompt: |
      Галереї короволіка вишкрябані під корою — канали, візерунки.
      Короволік їх проклав. Дерево відповіло. Яка історія?
    follow_ups:
      - Яким було б дерево без короволіка?
      - Як галерея формує долю дерева?
      - Який зв'язок між короволіком і грибом?
  - id: nmf_dew_on_litter
    name: Роса на Опалому Листі
    prompt: |
      Ранкова роса збирається краплями на листі, хвої, гілочках. Опале листя утримує вологу.
      Хто п'є на світанку? Як роса продовжує вологий сезон?
    follow_ups:
      - Що було б з підстилкою без роси?
      - Як роса створює джерело води?
      - Який зв'язок між росою та випаровуванням?
  - id: nmf_windfall_gap
    name: Прогалина від Вітролому
    prompt: |
      Впало дерево — вітер, вік, хвороба. Прогалина пропускає світло. Підстилка
      змінюється. Що росте в прогалині, що не могло раніше?
    follow_ups:
      - Що було б з лісом без прогалин?
      - Як прогалина перезапускає сукцесію?
      - Який зв'язок між прогалиною та різноманіттям?
  - id: nmf_mycorrhizal_tip
    name: Мікоризний Кінчик
    prompt: |
      Корені дерев зустрічаються з грибковими гіфами — мікориза. Гриб розширює досяжність кореня. Гриб годує дерево. Знайдіть кінчик кореня. Уявіть партнерство під землею.
    follow_ups:
      - Яким було б дерево без мікоризи?
      - Як партнерство розширює кореневу систему?
      - Який зв'язок між грибом і фосфором?
  - id: nmf_squirrel_cache
    name: Схованка Білки
    prompt: |
      Білка закопала горіх — забутий, можливо. Він може прорости. Схованка — це розповсюдження. Скільки дерев почалися з забутого насіння?
    follow_ups:
      - Що було б з лісом без тих, хто робить схованки?
      - Як схованки розширюють ареал насіння?
      - Який зв'язок між забуттям і лісом?
  - id: nmf_carpet_moss
    name: Килимовий Мох
    prompt: |
      Мох килимом вкриває землю в деяких місцях — м'який, зелений, утримує воду. Ходіть по ньому. Відчуйте пружність. Килим — це століття росту, шар за шаром.
    follow_ups:
      - Що було б з підстилкою без килима?
      - Як килим утримує вологу?
      - Який зв'язок між мохом і болотом?
  - id: nmf_burrow_entrance
    name: Вхід до Нори
    prompt: |
      Вхід у нору в ґрунті — миша, полівка, бурундук. Вхід — це поріг. Що заходить? Що виходить? Нора поширюється під землею.
    follow_ups:
      - Що було б з підстилкою без нір?
      - Як нора аерує ґрунт?
      - Який зв'язок між норою та хижаком?
  - id: nmf_twig_lattice
    name: Решітка з Гілочок
    prompt: |
      Гілочки збираються — вітер, тварини, гравітація. Вони утворюють решітку над опалим листям. Решітка утримує листя, затримує насіння. Це випадкова архітектура.
    follow_ups:
      - Що було б з підстилкою без решітки?
      - Як решітка уповільнює ерозію?
      - Який зв'язок між гілочкою та мікросередовищем?
  - id: nmf_rot_softness
    name: М'якість Гниття
    prompt: |
      Гнила деревина піддається під пальцями — губчаста, кришиться. Перехід
      від структури до ґрунту. Скільки часу це зайняло? Що залишилося?
    follow_ups:
      - Що було б з лісом без гниття?
      - Як м'якість сприяє колонізації?
      - Який зв'язок між гниттям і гумусом?
  - id: nmf_frost_needle
    name: Голка Морозу
    prompt: |
      Голки морозу піднімаються з ґрунту — кристали льоду, ніжні. Вони утворюються в холодні, нерухомі ночі. До полудня вони зникають. Розгляньте ефемерну структуру.
    follow_ups:
      - Що переживав би ґрунт без морозу?
      - Як морозне здимання впливає на коріння?
      - Який зв'язок між морозом і саджанцем?
  - id: nmf_millipede_curl
    name: Згортання Багатоніжки
    prompt: |
      Багатоніжка згортається при подразненні — захист. Вона живиться гниттям. Спостерігайте, як вона рухається крізь опале листя. Як тіло проходить крізь заплутаність?
    follow_ups:
      - Що було б з підстилкою без багатоніжок?
      - Як згортання захищає?
      - Який зв'язок між багатоніжкою та кальцієм?
  - id: nmf_pinecone_open
    name: Розкрита Шишка
    prompt: |
      Шишка відкривається, коли висохне — лусочки розходяться, насіння вивільняється. Шишка — це механізм. Тепло теж може його активувати. Розгляньте час.
    follow_ups:
      - Яким було б дерево без шишки?
      - Як волога контролює механізм?
      - Який зв'язок між вогнем і вивільненням?
  - id: nmf_hole_in_leaf
    name: Дірка в Листі
    prompt: |
      Лист має дірки — комахи, слимаки, гриби. Пошкодження розповідає історію. Хто їв?
      Коли? Решта листка все ще фотосинтезує. Який поріг?
    follow_ups:
      - Яким було б листя без дірок?
      - Як травоїдність формує рослину?
      - Який зв'язок між пошкодженням і захистом?
  - id: nmf_root_hair
    name: Кореневий Волосок
    prompt: |
      Кореневі волоски — мікроскопічні — збільшують площу поверхні для поглинання. Ви їх не бачите, але вони є. Коріння саджанця досліджують. Що вони знаходять?
    follow_ups:
      - Яким було б коріння без волосків?
      - Як кореневі волоски поглинають воду?
      - Який зв'язок між волоском і поживними речовинами?
  - id: nmf_forest_silence
    name: Лісова Тиша
    prompt: |
      Стійте нерухомо на лісовій підстилці. Тиша не порожня — вона наповнена
      малими звуками. Шурхіт, крапля, скрип. Що ви чуєте, коли зупиняєтеся?
    follow_ups:
      - Що було б з лісом без малих звуків?
      - Як тиша розкриває присутність?
      - Який зв'язок між слуханням і помічанням?
  - id: nmf_shade_adaptation
    name: Адаптація до Тіні
    prompt: |
      Рослини на лісовій підстилці пристосовані до тіні — більші листки, інший
      хлорофіл. Порівняйте сонячний листок з тіньовим. Який компроміс?
    follow_ups:
      - Якою була б рослина під прямим сонцем?
      - Як тінь формує листок?
      - Який зв'язок між світлом і інвестиціями?
  - id: nmf_nutrient_cycle
    name: Цикл Поживних Речовин
    prompt: |
      Все на лісовій підстилці циклічно — вуглець, азот, фосфор.
      Листок падає. Він поглинається. Він стає ґрунтом. Він живить дерево. Прослідкуйте один цикл.
    follow_ups:
      - Що було б з лісом без циклу?
      - Як розкладання завершує цикл?
      - Який зв'язок між смертю та ростом?
  - id: nmf_footprint_compression
    name: Стиснення Відбитка
    prompt: |
      Ваш відбиток стискає опале листя. Ґрунт під ним зберігає форму.
      Скільки кроків потрібно, щоб змінити підстилку? Хто ще тут ходив?
    follow_ups:
      - Що було б з підстилкою без руху?
      - Як стиснення впливає на дренаж?
      - Який зв'язок між стежкою та ущільненням?
  - id: nmf_seasonal_signal
    name: Сезонний Сигнал
    prompt: |
      Лісова підстилка сигналізує про сезон — новий ріст навесні, відмирання восени.
      Що зараз на землі? Що це вам говорить?
    follow_ups:
      - Якою була б підстилка в інший сезон?
      - Як сигнал синхронізує життя?
      - Який зв'язок між опалим листям і календарем?
  - id: nmf_stump_succession
    name: Сукцесія Пня
    prompt: |
      Зрізаний пень проростає грибами, саджанцями, мохом. Це етап сукцесії.
      Що було раніше? Що його замінить? Пень — це і кінець, і початок.
    follow_ups:
      - Якою була б галявина без пня?
      - Як пень створює можливості?
      - Який зв'язок між смертю та новим ростом?
  - id: nmf_forest_breath
    name: Дихання Лісу
    prompt: |
      Лісова підстилка дихає — кисень входить, вуглець виходить, або навпаки вночі.
      Ґрунт живий. Стійте нерухомо. Чи відчуваєте обмін?
    follow_ups:
      - Яким було б повітря без підстилки?
      - Як дихання формує крони?
      - Який зв'язок між ґрунтом і атмосферою?
  - id: nmf_leaf_miner_trail
    name: Слід Листового Мінера
    prompt: |
      Листовий мінер — личинка комахи — їсть між шарами. Слід — це біла лінія, звивистий шлях. Прослідкуйте його. Чого шукав мінер?
    follow_ups:
      - Яким було б листя без сліду?
      - Як мінер орієнтується, не бачачи?
      - Який зв'язок між внутрішнім і зовнішнім?
  - id: nmf_decomposer_shift
    name: Зміна Розкладачів
    prompt: |
      У міру розкладання матеріалу змінюються розкладачі — спочатку бактерії та
      гриби, потім жуки та земляні черв'яки. Знайдіть матеріал на різних стадіях.
      Хто працює зараз?
    follow_ups:
      - Що було б з розкладанням без сукцесії?
      - Як зміна формує темп?
      - Який зв'язок між стадією та споживачем?
