# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природний Мікрокосм — Сад та Подвір'я (Ukrainian)

id: natural_microcosm_garden_backyard
name: Природний Мікрокосм — Сад та Подвір'я
description: 50 карток, щоб змінити ваш погляд на дику природу у домашньому середовищі — від запилювачів та ґрунту до бур'янів проти овочів та хореографії культивованої природи.
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: Приземлення Бджоли
    prompt: |
      Спостерігайте, як бджола сідає на квітку. Підхід, дотик, зависання. Бджола
      одночасно хижак і запилювач. Що отримує квітка? Чим вона ризикує?
    follow_ups:
      - Як приземлення впливає на наступний візит?
      - Яким був би сад без бджіл?
      - Які стосунки між квіткою та бджолою?
  - id: nmg_soil_crumble
    name: Крихкість Ґрунту
    prompt: |
      Візьміть жменю ґрунту. Відчуйте текстуру — крихкість, зерна.
      Цей ґрунт містить історію, смерть, відродження. Хто тут жив раніше?
      Що з нього виросте?
    follow_ups:
      - Як ґрунт формує те, що росте?
      - Що означав би стерильний ґрунт?
      - Які стосунки між крихкістю та життям?
  - id: nmg_weed_edge
    name: Бур'ян на Краю
    prompt: |
      Бур'ян росте там, де газон зустрічається з грядкою. Його не садили. Його
      запросили — або він запросив себе сам. Розгляньте межу. Хто проводить лінію
      між бур'яном і квіткою?
    follow_ups:
      - Яким був би сад без бур'янів?
      - Як край створює напругу?
      - Які стосунки між бур'яном і задумом?
  - id: nmg_compost_steam
    name: Пара з Компосту
    prompt: |
      Переверніть купу компосту. Піднімається пара — розкладання в процесі. Тепло —
      це мікробна робота. Кухонні відходи стають ґрунтом. Простежте
      трансформацію.
    follow_ups:
      - Що б сад втратив без компосту?
      - Як тепло позначає процес?
      - Які стосунки між відходами та родючістю?
  - id: nmg_seed_dormancy
    name: Спокій Насіння
    prompt: |
      Насіння в ґрунті може чекати роками — десятиліттями. Воно живе, але в стані
      паузи. Що його пробуджує? Світло, вода, вогонь, збурення. Розгляньте терпіння
      насіння.
    follow_ups:
      - Що б втратило проростання без спокою?
      - Як очікування формує виживання?
      - Які стосунки між паузою та появою?
  - id: nmg_bird_bath
    name: Пташина Купіль
    prompt: |
      Пташина купіль — це запрошення. Подивіться, хто приходить — горобці,
      дрозди, можливо, сойка. Купіль створює зустріч. Яким було б подвір'я без
      цієї маленької водойми?
    follow_ups:
      - Як купіль впливає на тих, хто приходить?
      - Яка хореографія прибуття?
      - Які стосунки між водою та птахом?
  - id: nmg_tomato_truss
    name: Гроно Помідора
    prompt: |
      Гроно помідора тримає зелені плоди, потім червоні. Вивчіть його архітектуру.
      Стебло, гілки, вага. Рослина — це інженерія. Що її підтримує?
    follow_ups:
      - Якою була б рослина без грона?
      - Як структура формує врожай?
      - Які стосунки між формою та плодом?
  - id: nmg_aphid_column
    name: Колонія Попелиць
    prompt: |
      Попелиці скупчуються на стеблі — висмоктують, розмножуються. Вони одночасно
      шкідники і здобич. Прийдуть сонечка. Зверніть увагу на екологію. Які стосунки
      між спалахом і балансом?
    follow_ups:
      - Якою була б рослина без попелиць?
      - Як колонія приваблює хижаків?
      - Які стосунки між шкідником і екосистемою?
  - id: nmg_hose_spray
    name: Бризки з Шланга
    prompt: |
      Вода зі шланга падає на ґрунт. Спостерігайте, як вона збирається в калюжі,
      вбирається, стікає. Бризки — це штучний дощ. Чим вони відрізняються від
      справжнього? Що отримує рослина?
    follow_ups:
      - Яким був би сад без шланга?
      - Як полив формує ріст?
      - Які стосунки між бризками та дощем?
  - id: nmg_lawn_mow
    name: Косіння Газону
    prompt: |
      Газон — це керована дикість — підстрижена до певної висоти, зелена.
      Косіння перериває ріст. Розгляньте, чим би став газон, якби його залишили
      в спокої. Чого ми не дозволяємо?
    follow_ups:
      - Яким було б подвір'я без косіння?
      - Як стрижка формує ідентичність?
      - Які стосунки між газоном і контролем?
  - id: nmg_pot_bound
    name: Обмежений Горщиком
    prompt: |
      Рослина в горщику — коріння крутиться, шукає. Горщик — це межа. Що б
      робила рослина з необмеженим ґрунтом? Горщик — це одночасно в'язниця і
      захист. Розгляньте компроміс.
    follow_ups:
      - Якою була б рослина без горщика?
      - Як обмеження формує ріст?
      - Які стосунки між коренем і стінкою?
  - id: nmg_mulch_layer
    name: Шар Мульчі
    prompt: |
      Мульча покриває ґрунт — деревна тріска, солома, листя. Вона зберігає вологу,
      пригнічує бур'яни, з часом стає ґрунтом. Шар тимчасовий.
      Що він робить, поки існує?
    follow_ups:
      - Якою була б грядка без мульчі?
      - Як шар створює мікроклімат?
      - Які стосунки між покриттям і ґрунтом?
  - id: nmg_hummingbird_hover
    name: Зависання Колібрі
    prompt: |
      Колібрі зависає біля квітки — крила невидимі від швидкості. Зависання
      коштує дорого. Нектар повинен того вартувати. Розгляньте економіку
      візиту.
    follow_ups:
      - Якою була б квітка без колібрі?
      - Як зависання формує стосунки?
      - Які стосунки між витратами та винагородою?
  - id: nmg_fence_creep
    name: Плетіння Паркану
    prompt: |
      Плющ або берізка обвивають паркан. Рослина не знає, що паркан створений
      людиною. Вона все одно в'ється. Розгляньте зустріч між ростом і структурою.
    follow_ups:
      - На що б дерлася рослина без паркану?
      - Як паркан формує ліану?
      - Які стосунки між дертям і опорою?
  - id: nmg_worm_cast
    name: Черв'ячний Перегній
    prompt: |
      Черв'ячний перегній — маленькі купи ґрунту — розкидані по газону. Черв'як
      пройшов, залишивши родючість. Перегній — це археологія. Що переробив черв'як?
      Що він залишив після себе?
    follow_ups:
      - Яким був би ґрунт без черв'яків?
      - Як перегній позначає роботу черв'яка?
      - Які стосунки між перегноєм і аерацією?
  - id: nmg_squirrel_cache
    name: Схованка Білки
    prompt: |
      Білка ховає горіх, а потім забуває. Горіх може прорости. Білка — випадковий
      садівник. Розгляньте стосунки між пам'яттю та поширенням. Що виростає із
      забудькуватості?
    follow_ups:
      - Яким би було дубове дерево без білки?
      - Як ховання формує поширення лісу?
      - Які стосунки між хованням і проростанням?
  - id: nmg_dew_morning
    name: Росяний Ранок
    prompt: |
      Ранкова роса краплинами збирається на листках. Кожна крапля містить світло.
      Роса — це конденсат — вода з повітря. Вона випарується до полудня. Розгляньте
      цей короткий дар. Що отримує рослина?
    follow_ups:
      - Яким був би ранок без роси?
      - Як краплина формує ранок?
      - Які стосунки між конденсатом і листком?
  - id: nmg_prune_scar
    name: Шрам від Обрізки
    prompt: |
      Шрам від обрізки позначає місце, де було відрізано гілку. Дерево загоїлося —
      або спробувало. Шрам — це історія. Що було видалено? Чому? Що пам'ятає дерево?
    follow_ups:
      - Яким було б дерево без обрізки?
      - Як зріз формує ріст?
      - Які стосунки між раною та формою?
  - id: nmg_sunflower_turn
    name: Обертання Соняшника
    prompt: |
      Молодий соняшник обертається за сонцем — на схід на світанку, на захід на
      заході. Рух — це геліотропізм. Рослина стежить за світлом. Розгляньте
      хореографію. Що означало б фіксоване положення?
    follow_ups:
      - Яким був би соняшник без обертання?
      - Як стеження формує ріст?
      - Які стосунки між рухом і світлом?
  - id: nmg_slug_trail
    name: Слизний Слід
    prompt: |
      Слимак залишає слід — сріблястий, липкий. Слід позначає проходження. Він
      також захищає ногу слимака. Розгляньте слід як запис і адаптацію. Що він
      дозволяє?
    follow_ups:
      - Яким був би слимак без сліду?
      - Як слиз формує рух?
      - Які стосунки між слідом і хижаком?
  - id: nmg_birdhouse_hole
    name: Отвір у Шпаківні
    prompt: |
      У шпаківні є отвір — певного діаметра. Він виключає одних птахів, запрошує
      інших. Отвір — це фільтр. Для кого він був створений? Хто його зайняв?
    follow_ups:
      - Яким було б подвір'я без шпаківні?
      - Як отвір впливає на тих, хто гніздиться?
      - Які стосунки між отвором і мешканцем?
  - id: nmg_root_hair
    name: Коренева Волокно
    prompt: |
      Кореневі волокна невидимі зверху — крихітні розширення, що поглинають воду
      та поживні речовини. Інтерфейс рослини з ґрунтом. Розгляньте, що відбувається
      знизу. Що втратить рослина без них?
    follow_ups:
      - Як волокно формує поглинання?
      - Які стосунки між волокном і ґрунтом?
      - Що б ви побачили, якби могли їх побачити?
  - id: nmg_frost_leaf
    name: Мороз на Листку
    prompt: |
      Візерунки морозу на листку — кристалічні, витончені. Мороз — це вода,
      замерзла з повітря. Вона розтане від сонця. Розгляньте тимчасове
      мистецтво. Що відчуває листок?
    follow_ups:
      - Яким був би ранок без морозу?
      - Як мороз формує день листка?
      - Які стосунки між кристалом і клітиною?
  - id: nmg_companion_plant
    name: Супутня Рослина
    prompt: |
      Базилік біля помідорів. Чорнобривці біля гарбузів. Супутні посадки — це
      стратегічне сусідство. Деякі рослини відлякують; деякі приваблюють. Розгляньте
      соціальне життя грядки.
    follow_ups:
      - Яким був би помідор без базиліка?
      - Як сусідство формує сад?
      - Які стосунки між сусідом і шкідником?
  - id: nmg_fallen_apple
    name: Впале Яблуко
    prompt: |
      Яблуко падає — незібране, перезріле. Воно буде гнити, годувати ос, можливо,
      дасть початок новому дереву. Падіння — це одночасно марнотратство і початок.
      Розгляньте дугу від гілки до ґрунту.
    follow_ups:
      - Якою була б земля без падіння?
      - Як гниття формує наступний етап?
      - Які стосунки між падінням і поширенням?
  - id: nmg_spider_web_corner
    name: Павутиння в Кутку
    prompt: |
      Павутиння затягує куток сараю. Роса затримується на шовку. Павутиння — це
      одночасно пастка і дім. Розгляньте економіку павука. Що він вкладає? Що він
      збирає?
    follow_ups:
      - Яким був би куток без павутиння?
      - Як павутиння формує день павука?
      - Які стосунки між шовком і здобиччю?
  - id: nmg_seed_packet
    name: Пакетик Насіння
    prompt: |
      Пакетик насіння — фотографія спереду, інструкції ззаду. Пакетик — це
      обіцянка. Що з'явиться з тих крихітних точок? Розгляньте стосунки між
      зображенням і реальністю.
    follow_ups:
      - Яким був би сад без пакетика?
      - Як пакетик формує очікування?
      - Які стосунки між обіцянкою та рослиною?
  - id: nmg_rain_barrel
    name: Дощовий Бочка
    prompt: |
      Дощовий бочка збирає стік з даху. Вода вільна, м'яка, нехлорована. Бочка — це
      інфраструктура. Розгляньте, що стікає з неба до бочки до кореня.
    follow_ups:
      - Яким був би сад без бочки?
      - Чим дощова вода з бочки відрізняється від водопровідної?
      - Які стосунки між дахом і коренем?
  - id: nmg_garden_glove
    name: Садова Рукавичка
    prompt: |
      Рукавичка, залишена на грядці — пальці жорсткі, забруднені землею. Рукавичка —
      це протез. Вона подовжує руку, захищає її. Розгляньте межу між людиною і
      ґрунтом. Що дозволяє рукавичка?
    follow_ups:
      - Що б відчув садівник без рукавички?
      - Як рукавичка формує стосунки?
      - Які стосунки між рукою та землею?
  - id: nmg_caterpillar_chew
    name: Жування Гусені
    prompt: |
      Гусінь їсть листок — край за краєм. Жування чутно. Гусінь перетворює
      листок на метелика. Розгляньте ціну для рослини. Що вона отримує, будучи
      господарем?
    follow_ups:
      - Яким був би листок без жування?
      - Як гусінь впливає на рослину?
      - Які стосунки між їсти і ставати?
  - id: nmg_fertilizer_burn
    name: Опік від Добрива
    prompt: |
      Занадто багато добрива обпікає — кінчики буріють, коріння всихає. Сад — це
      хімія. Більше — не завжди краще. Розгляньте межу між кормом і отрутою. Де
      лінія?
    follow_ups:
      - Якою була б рослина з меншою кількістю?
      - Як надлишок формує листок?
      - Які стосунки між дозою та пошкодженням?
  - id: nmg_shade_cloth
    name: Тіньова Сітка
    prompt: |
      Тіньова сітка натягнута над розсадою. Вона розсіює світло, зменшує спеку.
      Сітка — це посередництво — між сонцем і рослиною. Розгляньте, що додає
      сітка. Що вона віднімає?
    follow_ups:
      - Якою була б розсада без сітки?
      - Як тінь формує ранній ріст?
      - Які стосунки між фільтром і світлом?
  - id: nmg_morning_glory_dawn
    name: В'юн Вранці
    prompt: |
      В'юни відкриваються на світанку, закриваються до обіду. Квітка має
      розклад. Розгляньте ритм. Яким був би сад, якби він залишався відкритим
      весь день?
    follow_ups:
      - Як час впливає на запилення?
      - Які стосунки між відкриттям і запилювачем?
      - Чому світанок?
  - id: nmg_garden_path
    name: Садова Стежка
    prompt: |
      Стежка через сад — кам'яні плити або мульча. Стежка — це там, де ми
      ходимо. Решта — там, де ми не ходимо. Розгляньте лінію. Що захищає
      стежка? Що вона виключає?
    follow_ups:
      - Яким був би сад без стежки?
      - Як стежка формує рух?
      - Які стосунки між кроком і ґрунтом?
  - id: nmg_cross_pollination
    name: Перехресне Запилення
    prompt: |
      Бджоли переносять пилок з однієї рослини на іншу. Потомство буде
      гібридним — не ідентичним жодному з батьків. Розгляньте суміш. Що
      створює схрещування? Чим воно ризикує?
    follow_ups:
      - Якою була б різноманітність без схрещування?
      - Як бджола формує ген?
      - Які стосунки між перенесенням і комбінуванням?
  - id: nmg_herb_scent
    name: Аромат Трави
    prompt: |
      Проведіть рукою по розмарину або м'яті. Піднімається аромат — виділяються
