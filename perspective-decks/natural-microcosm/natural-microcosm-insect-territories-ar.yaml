# العالم الطبيعي المصغر — أقاليم الحشرات (Arabic)

id: natural_microcosm_insect_territories
name: العالم الطبيعي المصغر — أقاليم الحشرات
description: 50 بطاقة لتغيير نظرتك لحياة الحشرات — من مسارات النمل، حركة النحل، إلى شبكات العنكبوت، دراما النزاعات الإقليمية، ورقص المستعمرات.
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: مسار النمل
    prompt: |
      يشكّل النمل مسارات — مسارات فيرمونية بين العش والطعام. راقب التدفق.
      مساران: خارجي وراجِع. المسار هو قرار يتخذه الكثيرون.
      ما الذي سيكسر المسار؟
    follow_ups:
      - كيف يعزز المسار نفسه؟
      - ماذا سيكون حال المستعمرة بدون مسارات؟
      - ما هي العلاقة بين المسار والمستعمرة؟
  - id: nmi_bee_traffic
    name: حركة النحل
    prompt: |
      مدخل خلية — النحل يتدفق للداخل والخارج. الحركة لها إيقاع. البعض
      يحمل حبوب اللقاح؛ والبعض لا. فكر في الرقصة. من يقرر النمط؟
    follow_ups:
      - ماذا ستكون حال الخلية بدون الحركة؟
      - كيف يشكل المدخل التدفق؟
      - ما هي العلاقة بين النحلة والمستعمرة؟
  - id: nmi_spider_web
    name: شبكة العنكبوت
    prompt: |
      شبكة العنكبوت هي إقليم وفخ. ينتظر العنكبوت على الحافة.
      الاهتزازات تنقل المعلومات. فكر في الهندسة المعمارية. ماذا تلتقط الشبكة؟ ماذا تستبعد؟
    follow_ups:
      - ماذا سيكون حال العنكبوت بدون الشبكة؟
      - كيف توسع الشبكة حواس العنكبوت؟
      - ما هي العلاقة بين الحرير والبقاء؟
  - id: nmi_dragonfly_claim
    name: سيادة اليعسوب
    prompt: |
      يعسوب يقوم بدوريات على امتداد من البركة — ذهابًا وإيابًا. إنه إقليمي.
      تُطارد المنافسون. تُغازل الشريكات. فكر في الرهان. ماذا يُدافع عنه؟
    follow_ups:
      - ماذا سيفعل اليعسوب بدون إقليم؟
      - كيف توصل الدوريات الملكية؟
      - ما هي العلاقة بين المساحة والتكاثر؟
  - id: nmi_caterpillar_munch
    name: قضم اليرقة
    prompt: |
      يرقة تأكل — حافة الورقة تتراجع. الأكل مستمر.
      اليرقة هي آلة تحويل. فكر في المعدل. ماذا سيكون حال النبات بدون الحيوانات العاشبة؟
    follow_ups:
      - كيف تشكل اليرقة الورقة؟
      - ماذا ستكون حال الفراشة بدون الأكل؟
      - ما هي العلاقة بين الاستهلاك والنمو؟
  - id: nmi_beetle_battle
    name: معركة الخنافس
    prompt: |
      تلتقي خنفسان — ربما خنافس الظلام، ربما خنافس الروث. يتصارعان.
      المعركة طقسية. فكر في الرهانات. ماذا يُربح؟ ماذا يُخسر؟
    follow_ups:
      - ماذا سيفعل الخاسر؟
      - كيف تحل المعركة؟
      - ما هي العلاقة بين القتال والتزاوج؟
  - id: nmi_firefly_flash
    name: وميض اليراعات
    prompt: |
      تومض اليراعات — لكل نوع رمزه الخاص. النمط هو مغازلة. فكر في الإشارة.
      ماذا سيعني الوميض الخاطئ؟ كيف يجدون بعضهم البعض في الظلام؟
    follow_ups:
      - كيف يشفر الوميض النوع؟
      - ماذا سيكون حال المرج بدون اليراعات؟
      - ما هي العلاقة بين الضوء والشريك؟
  - id: nmi_aphid_farm
    name: مزرعة المن
    prompt: |
      ترعى النمل المن — تداعبة، تحميه. يفرز المن الندوة العسلية.
      تحصده النمل. فكر في الشراكة. من يستفيد؟ من يُستغل؟
    follow_ups:
      - ماذا سيكون حال المن بدون النمل؟
      - كيف يشكل الزراعة كلا النوعين؟
      - ما هي العلاقة بين الرعاية والاستخلاص؟
  - id: nmi_cicada_shell
    name: قشرة الزيز
    prompt: |
      قشرة الزيز تلتصق باللحاء — خرجت الحورية. القشرة فارغة،
      مثالية. فكر في الانسلاخ. ماذا تركت الحشرة وراءها؟ ماذا اكتسبت؟
    follow_ups:
      - ماذا سيكون حال الزيز بدون الانسلاخ؟
      - كيف تميز القشرة الانتقال؟
      - ما هي العلاقة بين الانسلاخ والنمو؟
  - id: nmi_leaf_miner
    name: ناقب الأوراق
    prompt: |
      مسار داخل ورقة — مسار ناقب الأوراق. تأكل اليرقة بين
      الطبقات. الورقة تحمل السجل. فكر في النفق. كيف ستبدو الورقة من الداخل؟
    follow_ups:
      - ماذا سيكون حال الورقة بدون الناقب؟
      - كيف يحمي النفق اليرقة؟
      - ما هي العلاقة بين الداخل والخارج؟
  - id: nmi_wasp_nest
    name: عش الدبور
    prompt: |
      عش دبور ورقي — خلايا سداسية، خشب ممضوغ. العش هو هندسة معمارية
      وحصن. فكر في المستعمرة. من يبني؟ من يدافع؟ من يتكاثر؟
    follow_ups:
      - ماذا سيكون حال الدبابير بدون العش؟
      - كيف يشكل العش البنية الاجتماعية؟
      - ما هي العلاقة بين الورق والمستعمرة؟
  - id: nmi_grasshopper_leap
    name: قفزة الجرادة
    prompt: |
      جرادة تقفز — الأرجل تمتد، تختفي. القفزة هي هروب أو
      اقتراب. فكر في المحفز. ماذا رأت الجرادة؟ ماذا سمعت؟
    follow_ups:
      - ماذا ستكون حال الجرادة بدون القفزة؟
      - كيف تتجنب القفزة الافتراس؟
      - ما هي العلاقة بين الساق والطيران؟
  - id: nmi_mantis_still
    name: سكون السرعوف
    prompt: |
      سرعوف ينتظر — بلا حركة. إنه صياد. يقترب الفريسة. الضربة
      مفاجئة. فكر في الصبر. ماذا يكلف السكون؟ ماذا يتيح؟
    follow_ups:
      - ماذا سيكون حال السرعوف بدون الانتظار؟
      - كيف يخدع السكون؟
      - ما هي العلاقة بين الصبر والالتقاط؟
  - id: nmi_bumblebee_buzz
    name: طنين النحلة الطنانة
    prompt: |
      نحلة طنانة تطن — تهتز. بعض الزهور تتطلب تلقيحًا بالاهتزاز.
      يهز النحل حبوب اللقاح. فكر في الشراكة. ماذا سيكون حال الزهرة بدون الطنين؟
    follow_ups:
      - كيف يحرر الطنين حبوب اللقاح؟
      - ماذا سيكون حال النحلة بدون التلقيح بالاهتزاز؟
      - ما هي العلاقة بين الاهتزاز والإخصاب؟
  - id: nmi_butterfly_territory
    name: إقليم الفراشة
    prompt: |
      فراشة تقف على نقطة عالية — التلال. تنتظر الشركاء.
      تُطارد المنافسون. فكر في الاستراتيجية. لماذا هذا المكان؟ ماذا يجعله قيماً؟
    follow_ups:
      - ماذا ستفعل الفراشة بدون مكان الوقوف؟
      - كيف يشكل التلال التزاوج؟
      - ما هي العلاقة بين المكان واللقاء؟
  - id: nmi_earwig_pincer
    name: ملقط الأذن
    prompt: |
      حشرات الأذن لديها ملاقط — قرون استشعار. هي للدفاع، لطوي الأجنحة،
      للتعامل مع الفريسة. فكر في الأداة. ماذا سيكون حال حشرة الأذن بدون الملقط؟
    follow_ups:
      - كيف يشكل الملقط السلوك؟
      - كيف سيبدو الدفاع بدونها؟
      - ما هي العلاقة بين الشكل والوظيفة؟
  - id: nmi_katydid_call
    name: نداء الجنادب
    prompt: |
      جنادب تنادي — خشخشة، أرجل على أجنحة. النداء خاص بالنوع.
      إنه مغازلة، إقليم. فكر في الصوت. ماذا سيكون حال الليل بدونه؟
    follow_ups:
      - كيف يجذب النداء الشركاء؟
      - ماذا ستخاطر به الجنادب بالنداء؟
      - ما هي العلاقة بين الصوت والافتراس؟
  - id: nmi_ladybug_cluster
    name: تجمع الخنافس المنقطة
    prompt: |
      تتجمع الخنافس المنقطة في الشتاء — عشرات، مئات. تتجمع للدفء،
      للمأوى. فكر في التجمع. ما الذي يحفزه؟ ما الذي يفرقه؟
    follow_ups:
      - ماذا سيكون حال الخنافس المنقطة بدون التجمع؟
      - كيف يخلق التجمع مناخًا دقيقًا؟
      - ما هي العلاقة بين الكثرة والبقاء؟
  - id: nmi_ant_carry
    name: حمل النمل
    prompt: |
      نملة تحمل أخرى — ميتة أو مصابة. إنها مساعدة. المستعمرة تعتني
      بأفرادها. فكر في السلوك. ماذا ستفعل النملة المصابة وحدها؟
      ماذا يربح الحامل؟
    follow_ups:
      - كيف يفيد الحمل المستعمرة؟
      - ماذا ستكون حال المستعمرة بدون تعاون؟
      - ما هي العلاقة بين الفرد والجماعة؟
  - id: nmi_mosquito_hover
    name: تحويم البعوض
    prompt: |
      بعوضة تحوم — تفحص، تستكشف. إنها تبحث عن مضيف. التحويم هو
      تقييم. فكر في اللحظة قبل اللدغة. ماذا تكتشف البعوضة؟ ماذا تقرر؟
    follow_ups:
      - ماذا ستفعل البعوضة بدون التحويم؟
      - كيف يقلل التحويم الكشف؟
      - ما هي العلاقة بين الاستكشاف والتغذية؟
  - id: nmi_weevil_curl
    name: التفاف السوس
    prompt: |
      ورقة تلتف — سوس أو ذبابة غال جعلتها. تلتف الورقة حول
      اليرقة. فكر في التلاعب. تم إقناع النبات. ماذا ستفعل الورقة بدون الحشرة؟
    follow_ups:
      - كيف يحمي الالتفاف اليرقة؟
      - ماذا سيكون حال النبات بدون الالتفاف؟
      - ما هي العلاقة بين الحشرة وشكل النبات؟
  - id: nmi_honeybee_waggle
    name: رقصة الاهتزاز للعسل
    prompt: |
      نحلة عسل تهتز — إنها رقصة. الرقصة تشفر المسافة والاتجاه
      إلى الزهور. النحل الآخر يشاهد. فكر في الرسالة. ماذا ستكون حال المستعمرة بدون الرقصة؟
    follow_ups:
      - كيف تنقل الرقصة المعلومات؟
      - كيف سيبدو البحث عن الطعام بدونها؟
      - ما هي العلاقة بين الرقصة والاكتشاف؟
  - id: nmi_gnat_cloud
    name: سحابة البعوض
    prompt: |
      تتجمع البعوض — سحابة من الحشرات الصغيرة. السرب هو تزاوج. يتجمع الذكور؛
      تدخل الإناث وتختار. فكر في التجمع. ماذا ستفعل البعوضة وحدها؟
    follow_ups:
      - كيف يتيح السرب التزاوج؟
      - ماذا سيكون حال البعوض بدون السحابة؟
      - ما هي العلاقة بين الكثرة واللقاء؟
  - id: nmi_spider_wrap
    name: لف العنكبوت
    prompt: |
      عنكبوت يلف الفريسة — حرير حول الحشرة المتقلبة. اللف يشل الحركة.
      يحقن العنكبوت إنزيمًا. فكر في العملية. ماذا سيفعل العنكبوت بدون اللف؟
    follow_ups:
      - كيف يروض اللف الفريسة؟
      - ماذا سيخاطر به العنكبوت بدونها؟
      - ما هي العلاقة بين الحرير والهضم؟
  - id: nmi_ant_war
    name: حرب النمل
    prompt: |
      مستعمرتان من النمل تلتقيان — صراع. العمال يتصارعون، يعضون. الحدود
      متنازع عليها. فكر في المعركة. ما الذي على المحك؟ كيف يُحدد الحد؟
    follow_ups:
      - ماذا ستكون حال المستعمرات بدون الحرب؟
      - كيف تحل الحرب؟
      - ما هي العلاقة بين الإقليم والمورد؟
  - id: nmi_moth_flutter
    name: رفرفة العثة
    prompt: |
      عثة ترفرف عند ضوء — منجذبة، مرتبكة. الضوء يعطل
      الملاحة. فكر في الفخ. ماذا ستفعل العثة في الظلام؟
      لماذا يشتت الضوء؟
    follow_ups:
      - ماذا ستكون حال العثة بدون الضوء؟
      - كيف تستخدم العثة ضوء القمر بشكل طبيعي؟
      - ما هي العلاقة بين الضوء والاتجاه؟
  - id: nmi_stick_insect_still
    name: سكون عود الحشرات
    prompt: |
      عود الحشرات بلا حركة — يبدو كغصن. يمر المفترسون.
      فكر في الخداع. ماذا سيكون حال الحشرة بدون التمويه؟
      كم من الوقت يمكنها الحفاظ على الوضعية؟
    follow_ups:
      - كيف يحمي السكون؟
      - ماذا ستخاطر به الحشرة بالحركة؟
      - ما هي العلاقة بين الشكل والبقاء؟
  - id: nmi_leafcutter_carry
    name: حمل قاطعات الأوراق
    prompt: |
      نملة قاطعة الأوراق تحمل شظية ورقة — أكبر منها مرات عديدة. الورقة
      تذهب إلى العش. تصبح ركيزة للفطريات. فكر في
      الحصاد. ماذا سيكون حال المستعمرة بدون الأوراق؟
    follow_ups:
      - كيف تستخدم الفطريات الورقة؟
      - ماذا سيأكل النمل بدون الفطريات؟
      - ما هي العلاقة بين الحصاد والزراعة؟
  - id: nmi_housefly_clean
    name: تنظيف الذبابة المنزلية
    prompt: |
      ذبابة منزلية تنظف نفسها — تفرك الأرجل، تداعب الأجنحة. التنظيف يزيل
      الجزيئات، يحافظ على المستشعرات. فكر في الطقس. ماذا سيكون حال الذبابة بدون التنظيف؟
    follow_ups:
      - كيف يحافظ التنظيف على الوظيفة؟
      - ماذا سيحدث إذا لم تستطع الذبابة التنظيف؟
      - ما هي العلاقة بين النظافة والحس؟
  - id: nmi_termite_mound
    name: تل النمل الأبيض
    prompt: |
      يرتفع تل النمل الأبيض — طين، لعاب، خشب ممضوغ. إنها مدينة. بالداخل،
      أنفاق، غرف، حدائق فطر. فكر في الهندسة المعمارية. ماذا سيكون حال المستعمرة بدون التل؟
    follow_ups:
      - كيف ينظم التل المناخ؟
      - ماذا سيفعل النمل الأبيض بدون الهيكل؟
      - ما هي العلاقة بين التل والمستعمرة؟
  - id: nmi_cricket_chirp
    name: صرصور الصرصرة
    prompt: |
      صرصور يصرصر — أجنحة معًا. الصرصرة هي مغازلة. تختار الإناث
      بالصوت. فكر في النداء. ماذا سيفعل الصرصور بدون الصرصرة؟ من يستمع غير الإناث؟
    follow_ups:
      - كيف تشفر الصرصرة اللياقة؟
      - ماذا سيكون حال المرج بدون الصوت؟
      - ما هي العلاقة بين النداء والافتراس؟
  - id: nmi_damselfly_tandem
    name: موكب يعسوب متشابك
    prompt: |
      يعاسيب تتزاوج في موكب — يمسك الذكر بالأنثى خلف الرأس. هي
      تنحني لاستقبال الحيوانات المنوية. قد يطير الزوجان معًا. فكر في
      الاقتران. ماذا سيكون التزاوج بدون الإمساك؟
    follow_ups:
      - كيف يحمي الموكب استثمار الذكر؟
      - ماذا سيفعل الزوجان بدون الارتباط؟
      - ما هي العلاقة بين الإمساك والإخصاب؟
  - id: nmi_roach_scatter
    name: انتشار الصراصير
    prompt: |
      شغل الضوء — تنتشر الصراصير. تبحث عن الشقوق. الانتشار هو
      هروب. فكر في الاستجابة. ماذا ستفعل الصرصور في ضوء دائم؟ لماذا الظلام؟
    follow_ups:
      - كيف يقلل الانتشار من الافتراس؟
      - ماذا ستكون حال الصرصور بدون رد الفعل؟
      - ما هي العلاقة بين الضوء والاختباء؟
  - id: nmi_hopper_nymph
    name: حورية نطاطة
    prompt: |
      جرادة صغيرة — حورية. ليس لديها أجنحة بعد. تقفز. فكر في
      المرحلة. ماذا ستصبح الحورية؟ ماذا ينقصها الآن؟
    follow_ups:
      - ماذا ستكون حال الجرادة بدون مرحلة الحورية؟
      - كيف تتجنب الحورية المفترسين؟
      - ما هي العلاقة بين الانسلاخ والجناح؟
  - id: nmi_sweat_bee
    name: نحلة العرق
    prompt: |
      نحلة عرق تهبط على جلدك — تبحث عن الملح. العرق مورد.
      فكر في اللقاء. ماذا ستفعل النحلة بدون العرق؟ لماذا تحتاج الملح؟
    follow_ups:
      - كيف تستخدم النحلة الملح؟
      - ماذا ستخاطر به النحلة بالهبوط؟
      - ما هي العلاقة بين الإنسان والنحلة؟
  - id: nmi_army_ant_column
    name: عمود النمل الجيوش
    prompt: |
      نمل الجيوش يسير — عمود من الآلاف. يتدفقون. تُغمر الفريسة.
      فكر في السرب. ماذا ستكون حال النمل بدون العمود؟ كيف
      ينسقون؟
    follow_ups:
      - كيف يتيح العمود الافتراس؟
      - ماذا سيكون حال الغابة بدون نمل الجيوش؟
      - ما هي العلاقة بين الكثرة والقوة؟
  - id: nmi_water_strider_leg
    name: ساق حشرة الماء
    prompt: |
      أرجل حشرة الماء — طويلة، كارهة للماء. توزع الوزن.
      السطح يحملها. فكر في التكيف. ماذا ستكون حال الحشرة بدون تصميم الساق؟
    follow_ups:
      - كيف يشكل شكل الساق توزيع القوة؟
      - ماذا ستفعل الحشرة على الأرض؟
      - ما هي العلاقة بين الشكل والسطح؟
  - id: nmi_aphid_wing
    name: جناح المن
    prompt: |
      بعض المن لديها أجنحة — عند الازدحام أو عندما يتدهور المضيف. هم
      ينتشرون. فكر في التحويل. ما الذي يحفز تطور الأجنحة؟ ماذا يكلف الجناح؟
    follow_ups:
      - كيف يحفز الازدحام الأجنحة؟
      - ماذا ستكون حال المن بدون الخيار؟
      - ما هي العلاقة بين الجناح والانتشار؟
  - id: nmi_scale_armor
    name: درع الحرشفية
    prompt: |
      الحشرات القشرية تبدو ككتل — هي مدرعة. لا تتحرك كثيرًا.
      تضرب النبات، تتغذى. فكر في الاستراتيجية. ماذا سيكون حال الحرشفية بدون الدرع؟
    follow_ups:
      - كيف يحمي الدرع؟
      - ماذا سيكون حال النبات بدون الحرشفية؟
      - ما هي العلاقة بين السكون والدفاع؟
  - id: nmi_caddisfly_case
    name: غلاف حشرة الرعاش
    prompt: |
      يرقة حشرة الرعاش تبني غلافًا — عصي، رمال، حصى. تحمل الغلاف.
      الغلاف هو تمويه ودرع. فكر في البناء. ماذا سيكون حال اليرقة بدونه؟
    follow_ups:
      - كيف يحمي الغلاف؟
      - ماذا ستستخدم اليرقة إذا تغيرت المواد؟
      - ما هي العلاقة بين البناء والبقاء؟
  - id: nmi_leafhopper_flash
    name: وميض نطاط الورق
    prompt: |
      نطاط الورق يقفز — مفاجئ. يختفي. القفزة هروب. الأرجل تخزن
      الطاقة، تطلقها. فكر في الآلية. ماذا سيكون حال نطاط الورق بدون القفزة؟
    follow_ups:
      - كيف تتجنب القفزة الإمساك؟
      - ماذا سيكون حال الورقة بدون نطاط الورق؟
      - ما هي العلاقة بين القفزة والافتراس؟
  - id: nmi_bombardier_blast
    name: انفجار الخنفساء القاذفة
    prompt: |
      خنفساء قاذفة ترش — حارة، مؤذية. إنها دفاع. الرش هو
      كيمياء: غرفتان، تفاعل عند الخروج. فكر في السلاح. ماذا ستفعل الخنفساء بدونه؟
    follow_ups:
      - كيف يردع الرش المفترسين؟
      - ماذا ستخاطر به الخنفساء بالرش؟
      - ما هي العلاقة بين الكيمياء والدفاع؟
  - id: nmi_silverfish_slip
    name: انزلاق السمك الفضي
    prompt: |
      سمك فضي ينزلق في شق — سريع. مسطح. يناسب. فكر في
      الشكل. ماذا سيكون حال السمك الفضي بدون المسطحة؟ لماذا الإلحاح؟
    follow_ups:
      - كيف تمكّن المسطحة الهروب؟
      - ماذا سيفعل السمك الفضي في العراء؟
      - ما هي العلاقة بين الشكل والملاذ؟
  - id: nmi_ant_queen
    name: ملكة النمل
    prompt: |
      مستعمرة النمل لديها ملكة — أو عدة. تضع البيض. العمال يعتنون بها.
      فكر في المركز. ماذا سيكون حال المستعمرة بدون الملكة؟ كيف
      تستبدلها المستعمرة؟
    follow_ups:
      - كيف تشكل الملكة المستعمرة؟
      - ماذا سيفعل العمال بدونها؟
      - ما هي العلاقة بين الملكة والمستعمرة؟
  - id: nmi_owlfly_larva
    name: يرقة ذبابة البومة
    prompt: |
      يرقة ذبابة البومة تكمن في انتظار — في الرمل، في الحطام. تهاجم.
      الفكوك تضرب. فكر في الصياد. ماذا سيكون حال اليرقة بدون الكمين؟
      ماذا تصبح؟
    follow_ups:
      - كيف يتيح الكمين التغذية؟
      - ماذا ستكون حال ذبابة البومة بدون مرحلة اليرقة؟
      - ما هي العلاقة بين الانتظار والالتقاط؟
  - id: nmi_thrips_scatter
    name: تفرق الثربس
    prompt: |
      الثربس صغير — بالكاد مرئي. يتجمعون على الزهور، على الأوراق.
      يخترقون ويمتصون. فكر في الحجم. ماذا سيكون حال النبات بدون الثربس؟ ماذا سنلاحظ؟
    follow_ups:
      - كيف تشكل الثربس النبات؟
      - ماذا سيكون حال النظام البيئي بدونها؟
      - ما هي العلاقة بين الصغر والتأثير؟
  - id: nmi_sting_threat
    name: تهديد اللسعة
    prompt: |
      دبور يرفع بطنه — اللسعة جاهزة. إنه تهديد. الوضعية
      تتواصل. فكر في العرض. ماذا سيفعل الدبور إذا تم تجاهله؟
      ماذا تكلف الوضعية؟
    follow_ups:
      - كيف يردع التهديد؟
      - ماذا سيخاطر به الدبور باللسع؟
      - ما هي العلاقة بين العرض والدفاع؟
  - id: nmi_velvet_ant
    name: نملة المخمل
    prompt: |
      نملة مخمل تزحف — إنها دبور بلا أجنحة. إنها قوية. يتعلم المفترسون تجنبها.
      اللسعة شرسة. فكر في الاستراتيجية. ماذا ستكون حال نملة المخمل بدون اللسعة؟
    follow_ups:
      - كيف تحمي اللسعة؟
      - ماذا ستفعل نملة المخمل على السطح؟
      - ما هي العلاقة بين اللسعة والجرأة؟
  - id: nmi_ambush_predator
    name: مفترس الكمائن
    prompt: |
      حشرة كمائن تنتظر على زهرة — صفراء، متخفية. تقترب الفريسة.
      تضرب الحشرة. فكر في الصبر. ماذا ستفعل الحشرة بدون الزهرة؟ لماذا هذا المكان؟
    follow_ups:
      - كيف تجذب الزهرة الفريسة؟
      - ماذا ستكون حال الحشرة بدون الكمين؟
      - ما هي العلاقة بين المكان والالتقاط؟
  - id: nmi_nectar_flow
    name: تدفق الرحيق
    prompt: |
      الزهور تنتج الرحيق — النحل، الفراشات، الخنافس تشرب. التدفق
      يختلف. فكر في الاقتصاد. ماذا سيكون حال الزهرة بدون الرحيق؟ ماذا ستفعل الحشرة؟
    follow_ups:
      - كيف يشكل الرحيق الزيارات؟
      - ماذا سيكون حال التلقيح بدون المكافأة؟
      - ما هي العلاقة بين التدفق والخدمة؟
  - id: nmi_territory_mark
    name: علامة الإقليم
    prompt: |
      بعض الحشرات تحدد الإقليم — فيرمونات، عرض بصري. العلامة تقول "لي".
      فكر في الادعاء. ماذا سيكون حال المساحة بدون العلامة؟
      كيف يقرأها المنافسون؟
    follow_ups:
      - كيف تردع العلامة المتسللين؟
      - ماذا ستفعل الحشرة بدون الإقليم؟
      - ما هي العلاقة بين العلامة والمساحة؟
