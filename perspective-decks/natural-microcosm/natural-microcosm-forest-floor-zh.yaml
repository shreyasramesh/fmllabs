# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然微观—林下地面 (Mandarin Chinese)

id: natural_microcosm_forest_floor
name: 自然微观—林下地面
description: 50 张卡片，用于改变你看待林下地面的方式——从分解和菌丝体，到落叶的结构以及树冠下看不见的生命。
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: 叶脉
    prompt: |
      拿起一片落叶。沿着叶脉仔细观察。它们曾输送水分、养分和糖分。
      叶脉的结构在你看之前是看不见的。当叶子活着的时候，叶脉网络维持了什么？
    follow_ups:
      - 不同物种的叶脉图案有何不同？
      - 没有叶脉，叶子会是什么样子？
      - 叶脉和叶缘之间有什么关系？
  - id: nmf_leaf_litter_layer
    name: 落叶层
    prompt: |
      林下地面是分层的——上面是新近落下的，下面是去年的，更下面是更老的。
      跪下。剥开一层。这层级的变化是怎样的？时间是如何堆叠的？
    follow_ups:
      - 没有落叶层，森林会是什么样子？
      - 落叶层是如何创造栖息地的？
      - 层级和分解之间有什么关系？
  - id: nmf_mushroom_fruiting
    name: 蘑菇子实体
    prompt: |
      蘑菇只是子实体。整个有机体——菌丝体——在地下蔓延，穿过土壤，穿过木材。
      将你所见的视为一个信号。其余的故事是什么？
    follow_ups:
      - 没有真菌，森林会是什么样子？
      - 子实体与菌丝网络之间有什么关系？
      - 蘑菇和分解之间有什么关系？
  - id: nmf_log_sponge
    name: 朽木海绵
    prompt: |
      一根倒下的原木能吸收并保持水分。雨后，将手按在上面。
      这根原木是一个蓄水池。谁在那里饮水？什么生物住在里面？
    follow_ups:
      - 没有“育苗原木”，森林会是什么样子？
      - 原木是如何创造微气候的？
      - 木头和水之间有什么关系？
  - id: nmf_moss_cushion
    name: 苔藓垫
    prompt: |
      苔藓像海绵一样吸水。触摸它。苔藓垫是建筑——
      微小的植物紧密地聚集在一起。空间之间有什么生物？
    follow_ups:
      - 没有苔藓，地面会是什么样子？
      - 苔藓垫是如何创造湿度的？
      - 苔藓和幼苗之间有什么关系？
  - id: nmf_fern_unfurl
    name: 蕨类植物展开
    prompt: |
      蕨类植物的叶子呈螺旋状展开——称为“羊齿头”。
      这个运动很慢。如果可能，观察一天。展开是如何塑造叶子的？
    follow_ups:
      - 没有螺旋，蕨类植物会是什么样子？
      - 展开是如何保护叶片的？
      - 卷曲和生长之间有什么关系？
  - id: nmf_root_tangle
    name: 根系纠缠
    prompt: |
      树根在表面之下纠缠。找到一棵倒下的树，
      并提起它的根球。纠缠就像一张搜索的地图。根系在寻找什么？
    follow_ups:
      - 没有根系纠缠，树会是什么样子？
      - 根系在地下是如何共享空间的？
      - 根系和真菌之间有什么关系？
  - id: nmf_slug_trail
    name: 蛞蝓痕迹
    prompt: |
      蛞蝓在叶片上留下闪亮的痕迹——粘液，路径，标志。
      痕迹标记了蛞蝓的行进路线。痕迹告诉捕食者什么？猎物什么？
    follow_ups:
      - 没有痕迹，蛞蝓会失去什么？
      - 粘液是如何使其得以移动的？
      - 痕迹和领地之间有什么关系？
  - id: nmf_lichen_patch
    name: 地衣斑块
    prompt: |
      地衣生长在树皮、岩石、土壤上——生长缓慢，由真菌和藻类组成。
      寻找一块地衣。它在那里已经多久了？它的存在表明了什么？
    follow_ups:
      - 没有地衣，树皮会是什么样子？
      - 地衣是如何标记时间的？
      - 地衣和空气质量之间有什么关系？
  - id: nmf_saprophyte
    name: 腐生生物
    prompt: |
      腐生生物以死物质为食——真菌、细菌、昆虫。它们是分解者。
      寻找分解的证据。谁在进食？什么正在被转化？
    follow_ups:
      - 没有分解者，森林会是什么样子？
      - 分解是如何滋养新生命的？
      - 死亡和土壤之间有什么关系？
  - id: nmf_seedling_emergence
    name: 幼苗出土
    prompt: |
      一株幼苗穿过落叶层。首先是子叶，然后是真叶。
      注意它的力量。它需要付出什么才能穿透？什么会阻碍它？
    follow_ups:
      - 没有幼苗，森林会是什么样子？
      - 幼苗的出土是如何依赖落叶层的？
      - 幼苗和光照之间有什么关系？
  - id: nmf_anthill_mound
    name: 蚁丘
    prompt: |
      一个蚁丘从林下地面升起——挖出的土壤，有组织。
      观察交通。它们去哪里？它们携带什么？
    follow_ups:
      - 没有蚁丘，地面会是什么样子？
      - 蚁丘是如何影响排水的？
      - 蚁丘和蚁群之间有什么关系？
  - id: nmf_spider_silk
    name: 蜘蛛丝
    prompt: |
      蜘蛛丝跨越缝隙——在叶片、树枝之间。露珠会附着在上面。
      网在光线照射之前是看不见的。追踪一根丝。它连接着什么？
    follow_ups:
      - 没有蜘蛛丝，缝隙会是什么样子？
      - 网是如何构建空间的？
      - 蜘蛛丝和猎物之间有什么关系？
  - id: nmf_bark_flake
    name: 树皮碎片
    prompt: |
      树皮从树干上剥落——纹理，图案，年代。每一片碎片都讲述着一个季节。
      树皮下住着谁？树皮碎片揭示了什么？
    follow_ups:
      - 没有树皮，树会是什么样子？
      - 树皮是如何保护和隔热的？
      - 碎片和更新之间有什么关系？
  - id: nmf_acorn_fall
    name: 橡子落下
    prompt: |
      一颗橡子落下。它与其体积相比很重。它将生根或被吃掉。
      考虑一下几率。什么决定了哪条路？
    follow_ups:
      - 没有橡子，森林会是什么样子？
      - 落下是如何分布种子的？
      - 橡子和橡树之间有什么关系？
  - id: nmf_fallen_branch
    name: 倒下的树枝
    prompt: |
      一根树枝落在地上——折断了，可能是被风吹的。
      它现在是一座桥。谁会跨过它？什么会在它上面生长？
    follow_ups:
      - 没有倒下的木材，地面会是什么样子？
      - 树枝是如何创造边缘生境的？
      - 树枝和养分之间有什么关系？
  - id: nmf_humus_smell
    name: 腐殖质气味
    prompt: |
      靠近林下地面。那气味——泥土，腐烂，生命。那气味是化学物质。
      是什么创造了它？没有它，森林会是什么样子？
    follow_ups:
      - 气味是如何标志健康的？
      - 贫瘠土壤闻起来会是怎样的？
      - 气味和肥力之间有什么关系？
  - id: nmf_snail_shell
    name: 蜗牛壳
    prompt: |
      一个空蜗牛壳静静地躺在落叶中。螺旋，钙质，被遗弃。
      谁可能吃掉了蜗牛？什么生物会利用这个壳？
    follow_ups:
      - 没有壳，地面会是什么样子？
      - 壳是如何回收养分的？
      - 壳和钙之间有什么关系？
  - id: nmf_fungal_network
    name: 真菌网络
    prompt: |
      菌丝体连接着树木——一个“木材网”。你看不见它，但它确实存在。
      养分在流动。信息在流动。将森林视为一个网络。
    follow_ups:
      - 没有菌丝网络，森林会是什么样子？
      - 菌丝网络是如何重新分配资源的？
      - 真菌和树木之间有什么关系？
  - id: nmf_fern_spore
    name: 蕨类孢子
    prompt: |
      蕨类植物通过孢子繁殖——微小，无数。
      看看叶片的背面。孢子囊里装着它们。追踪一个孢子的旅程需要什么？
    follow_ups:
      - 没有孢子，蕨类植物会是什么样子？
      - 孢子是如何传播的？
      - 孢子和配子体之间有什么关系？
  - id: nmf_earthworm_cast
    name: 蚯蚓粪
    prompt: |
      蚯蚓粪堆积在隧道入口处——加工过的土壤，肥沃。
      蚯蚓吃进去了又排出来了。粪便是送给地表的礼物。
    follow_ups:
      - 没有蚯蚓，土壤会是什么样子？
      - 蚯蚓粪是如何改善土壤结构的？
      - 蚯蚓和土壤通气之间有什么关系？
  - id: nmf_dappled_light
    name: 斑驳光影
    prompt: |
      光线透过树冠洒落，形成斑驳、移动的色块。
      林下地面接收到的光照比开阔地少。这如何塑造了生长在其中的植物？
    follow_ups:
      - 在阳光直射下，地面会是什么样子？
      - 斑驳的光影是如何创造微生境的？
      - 光斑和幼苗之间有什么关系？
  - id: nmf_bracket_fungus
    name: 侧耳真菌
    prompt: |
      一个侧耳真菌从树干上长出来——像架子，像多孔菌。
      它正在从内部消化树木。树木在消化过程中可能还会站立多年。
      考虑这种缓慢的消耗。
    follow_ups:
      - 没有真菌，树会是什么样子？
      - 侧耳真菌是如何传播孢子的？
      - 寄生虫和宿主之间有什么关系？
  - id: nmf_needle_mat
    name: 针叶垫
    prompt: |
      针叶树的针叶堆积在树下——酸味，分解缓慢。
      针叶垫改变了土壤。上面长着什么？什么避开它？
    follow_ups:
      - 没有针叶垫，地面会是什么样子？
      - 针叶垫如何影响土壤 pH 值？
      - 针叶垫和火之间有什么关系？
  - id: nmf_salamander_under
    name: 蝾螈栖息处
    prompt: |
      蝾螈生活在原木、石头、落叶下。小心地抬起一样东西——
      然后放回原位。潮湿，黑暗。为什么蝾螈需要这样的环境？
    follow_ups:
      - 没有蝾螈，森林会是什么样子？
      - 蝾螈是如何塑造无脊椎动物群落的？
      - 潮湿和两栖动物之间有什么关系？
  - id: nmf_rot_hole
    name: 腐朽孔洞
    prompt: |
      原木上的一个孔洞——可能是腐朽，也可能是动物的。
      这个孔洞是一个空腔。什么在这里筑巢？什么在这里躲藏？
    follow_ups:
      - 没有孔洞，原木会是什么样子？
      - 空腔是如何创造栖息地的？
      - 腐朽和庇护所之间有什么关系？
  - id: nmf_springtail_jump
    name: 弹尾虫跳跃
    prompt: |
      弹尾虫——微小，数量众多——受到惊扰时会跳跃。
      它们存在于落叶层和土壤中。它们分解真菌和腐烂物。
      注意有多少你看不见的。
    follow_ups:
      - 没有弹尾虫，地面会是什么样子？
      - 弹跳是如何实现逃脱的？
      - 弹尾虫和分解之间有什么关系？
  - id: nmf_bark_beetle_gallery
    name: 树皮甲虫刻痕
    prompt: |
      树皮甲虫的刻痕蚀刻在树皮下的木材上——通道，图案。
      甲虫刻下了它们。树木对此做出了反应。这个故事是什么？
    follow_ups:
      - 没有树皮甲虫，树会是什么样子？
      - 刻痕是如何影响树木的命运的？
      - 树皮甲虫和真菌之间有什么关系？
  - id: nmf_dew_on_litter
    name: 落叶上的露水
    prompt: |
      晨露珠在叶片、针叶、小枝上滚动。落叶层保持水分。
      谁在黎明时饮水？露水如何延长湿润季节？
    follow_ups:
      - 没有露水，地面会是什么样子？
      - 露水是如何创造水源的？
      - 露水和蒸发之间有什么关系？
  - id: nmf_windfall_gap
    name: 风倒空隙
    prompt: |
      一棵树倒下了——风、年老、疾病。这个空隙让光线射入。地面发生了变化。
      以前长不出的植物，现在在空隙中是什么？
    follow_ups:
      - 没有空隙，森林会是什么样子？
      - 空隙是如何重置演替的？
      - 空隙和多样性之间有什么关系？
  - id: nmf_mycorrhizal_tip
    name: 菌根尖
    prompt: |
      树根遇到真菌菌丝——菌根。真菌扩展了根系的范围。
      树木滋养真菌。找到一个根尖。想象一下地下的合作关系。
    follow_ups:
      - 没有菌根，树会是什么样子？
      - 菌根合作是如何扩展根系的？
      - 真菌和磷之间有什么关系？
  - id: nmf_squirrel_cache
    name: 松鼠储藏
    prompt: |
      一只松鼠埋了一个坚果——可能被遗忘了。它可能会发芽。
      这个储藏就是传播。有多少树是以被遗忘的种子开始的？
    follow_ups:
      - 没有储藏者，森林会是什么样子？
      - 储藏是如何扩大种子传播范围的？
      - 遗忘和森林之间有什么关系？
  - id: nmf_carpet_moss
    name: 地毯苔藓
    prompt: |
      苔藓在某些地方覆盖地面——柔软，绿色，保持水分。走在上面。
      感受它的弹性。这张“地毯”是几个世纪的生长，层层叠叠。
    follow_ups:
      - 没有“地毯”，地面会是什么样子？
      - 苔藓地毯是如何保持水分的？
      - 苔藓和沼泽之间有什么关系？
  - id: nmf_burrow_entrance
    name: 洞穴入口
    prompt: |
      土壤中出现一个洞穴——老鼠、田鼠、花栗鼠的。
      入口是一个门槛。什么东西进去？什么东西出来？洞穴在地下延伸。
    follow_ups:
      - 没有洞穴，地面会是什么样子？
      - 洞穴是如何为土壤增氧的？
      - 洞穴和捕食者之间有什么关系？
  - id: nmf_twig_lattice
    name: 树枝网格
    prompt: |
      树枝堆积——风、动物、重力。它们在落叶层上形成了一个网格。
      这个网格会抓住叶片，收集种子。这是偶然的建筑。
    follow_ups:
      - 没有网格，地面会是什么样子？
      - 网格是如何减缓侵蚀的？
      - 树枝和微生境之间有什么关系？
  - id: nmf_rot_softness
    name: 腐朽的柔软
    prompt: |
      腐烂的木头在你手指下塌陷——海绵状，易碎。
      从结构到土壤的过渡。这花了多长时间？还剩下什么？
    follow_ups:
      - 没有腐朽，森林会是什么样子？
      - 柔软是如何促成定殖的？
      - 腐朽和腐殖质之间有什么关系？
  - id: nmf_frost_needle
    name: 霜针
    prompt: |
      霜针从土壤中升起——冰晶，精致。它们在寒冷而寂静的夜晚形成。
      中午时分就消失了。考虑一下这种短暂的结构。
    follow_ups:
      - 没有霜冻，土壤会经历什么？
      - 霜冻隆起对根系有什么影响？
      - 霜冻和幼苗之间有什么关系？
  - id: nmf_millipede_curl
    name: 千足虫卷曲
    prompt: |
      千足虫在受到惊扰时会卷曲——一种防御。它以腐烂物为食。
      观察它在落叶层中移动。它的身体是如何在纠缠中导航的？
    follow_ups:
      - 没有千足虫，地面会是什么样子？
      - 卷曲是如何保护自身的？
      - 千足虫和钙之间有什么关系？
  - id: nmf_pinecone_open
    name: 松果张开
    prompt: |
      松果在干燥时张开——鳞片散开，种子释放。
      松果是一个机制。热量也可以触发它。考虑一下时机。
    follow_ups:
      - 没有松果，树会是什么样子？
      - 湿度是如何控制这个机制的？
      - 火和种子释放之间有什么关系？
  - id: nmf_hole_in_leaf
    name: 叶片上的洞
    prompt: |
      一张叶子上有洞——昆虫、蛞蝓、真菌造成的。
      这些损伤讲述了一个故事。谁吃的？什么时候吃的？
      剩下的叶子仍在进行光合作用。这个阈值是什么？
    follow_ups:
      - 没有洞，叶子会是什么样子？
      - 草食性是如何塑造植物的？
      - 损伤和防御之间有什么关系？
  - id: nmf_root_hair
    name: 根毛
    prompt: |
      根毛——微观的——增加了吸收的表面积。你看不到它们，但它们就在那里。
      幼苗的根系在探索。它们找到了什么？
    follow_ups:
      - 没有根毛，根会是什么样子？
      - 根毛是如何吸收水分的？
      - 根毛和养分之间有什么关系？
  - id: nmf_forest_silence
    name: 森林寂静
    prompt: |
      静静地站在林下地面上。寂静并非空无一物——它充满了细微的声音。
      沙沙声，滴水声，吱呀声。当你停止时，你听到了什么？
    follow_ups:
      - 没有细微的声音，森林会是什么样子？
      - 寂静是如何揭示存在的？
      - 倾听和注意到之间有什么关系？
  - id: nmf_shade_adaptation
    name: 遮荫适应
    prompt: |
      林下地面的植物适应了阴凉——叶片更大，叶绿素不同。
      比较一片阳光下的叶子和一片阴影下的叶子。有什么权衡？
    follow_ups:
      - 在阳光直射下，植物会是什么样子？
      - 阴影是如何塑造叶子的？
      - 光照和投入之间有什么关系？
  - id: nmf_nutrient_cycle
    name: 养分循环
    prompt: |
      林下地面的所有物质都在循环——碳，氮，磷。
      一片叶子落下。它被分解。它变成土壤。它滋养一棵树。追踪一个循环。
    follow_ups:
      - 没有循环，森林会是什么样子？
      - 分解是如何完成循环的？
      - 死亡和生长之间有什么关系？
  - id: nmf_footprint_compression
    name: 脚印压实
    prompt: |
      你的脚印压实了落叶。下面的土壤保留着形状。
      需要多少脚步才能改变地面？谁曾在这里走过？
    follow_ups:
      - 没有行人交通，地面会是什么样子？
      - 压实是如何影响排水的？
      - 足迹和压实之间有什么关系？
  - id: nmf_seasonal_signal
    name: 季节信号
    prompt: |
      林下地面发出季节的信号——春天的新生，秋天的衰老。
      现在地面上有什么？它告诉你什么？
    follow_ups:
      - 在另一个季节，地面会是什么样子？
      - 信号是如何同步生命的？
      - 落叶和日历之间有什么关系？
  - id: nmf_stump_succession
    name: 树桩演替
    prompt: |
      一个被砍伐的树桩上长出了真菌、幼苗、苔藓。
      这是演替的一个阶段。之前是什么？它将被什么取代？
      树桩既是终结也是开端。
    follow_ups:
      - 没有树桩，空地会是什么样子？
      - 树桩是如何创造机会的？
      - 死亡和新生长之间有什么关系？
  - id: nmf_forest_breath
    name: 森林呼吸
    prompt: |
      林下地面在呼吸——白天氧气进，二氧化碳出，或反之。
      土壤是活的。站稳。你能感觉到这种交换吗？
    follow_ups:
      - 没有林下地面，空气会是什么样子？
      - 呼吸是如何塑造树冠的？
      - 土壤和大气之间有什么关系？
  - id: nmf_leaf_miner_trail
    name: 潜叶虫轨迹
    prompt: |
      潜叶虫——一种昆虫幼虫——在叶片层之间进食。
      痕迹是一条白线，一条蜿蜒的路径。追踪它。潜叶虫在寻找什么？
    follow_ups:
      - 没有轨迹，叶子会是什么样子？
      - 潜叶虫在看不见的情况下是如何导航的？
      - 内部和外部之间有什么关系？
  - id: nmf_decomposer_shift
    name: 分解者更替
    prompt: |
      随着物质的分解，不同的分解者接管——首先是细菌和真菌，然后是甲虫和蚯蚓。
      寻找处于不同阶段的物质。现在谁在工作？
    follow_ups:
      - 没有演替，分解会是什么样子？
      - 更替是如何影响速度的？
      - 阶段和消费者之间有什么关系？
