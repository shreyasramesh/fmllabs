# ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಕೀಟಗಳ ಪ್ರದೇಶಗಳು (Kannada)

id: natural_microcosm_insect_territories
name: ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಕೀಟಗಳ ಪ್ರದೇಶಗಳು
description: ಕೀಟಗಳ ಜೀವನವನ್ನು ನೋಡುವ ಬಗೆಯನ್ನು ಬದಲಾಯಿಸಲು 50 ಕಾರ್ಡ್‌ಗಳು—ಜೇನುನೊಣಗಳ ಹಾದಿಗಳು ಮತ್ತು ಜೇನುನೊಣಗಳ ಸಂಚಾರದಿಂದ ಹಿಡಿದು, ಜೇಡರ ಬಲೆಗಳು, ಪ್ರಾದೇಶಿಕ ನಾಟಕಗಳು ಮತ್ತು ಕಾಲೋನಿಗಳ ನೃತ್ಯದವರೆಗೆ.
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: ಇರುವೆ ಹಾದಿ
    prompt: |
      ಇರುವೆಗಳು ಹಾದಿಗಳನ್ನು ರೂಪಿಸುತ್ತವೆ—ಗೂಡು ಮತ್ತು ಆಹಾರದ ನಡುವೆ ಫೆರೊಮೋನ್ ಮಾರ್ಗಗಳು. ಹರಿವನ್ನು ನೋಡಿ.
      ಎರಡು ಲೇನ್ಗಳು: ಹೊರಗಿನ ಮತ್ತು ಹಿಂತಿರುಗುವಿಕೆ. ದಾರಿ ಅನೇಕರ ನಿರ್ಧಾರ.
      ದಾರಿಯನ್ನು ಏನು ಮುರಿಯಬಹುದು?
    follow_ups:
      - ದಾರಿಯು ತನ್ನನ್ನು ತಾನೇ ಹೇಗೆ ಬಲಪಡಿಸಿಕೊಳ್ಳುತ್ತದೆ?
      - ದಾರಿ ಇಲ್ಲದಿದ್ದರೆ ಕಾಲೋನಿ ಹೇಗಿರುತ್ತದೆ?
      - ದಾರಿ ಮತ್ತು ಕಾಲೋನಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_bee_traffic
    name: ಜೇನುನೊಣಗಳ ಸಂಚಾರ
    prompt: |
      ಜೇನುಗೂಡಿನ ಪ್ರವೇಶದ್ವಾರ—ಜೇನುನೊಣಗಳು ಒಳಗೆ ಮತ್ತು ಹೊರಗೆ ಹರಿಯುತ್ತವೆ. ಸಂಚಾರಕ್ಕೆ ಒಂದು ಲಯವಿದೆ. ಕೆಲವರು
      ಪರಾಗವನ್ನು ಹೊರುತ್ತಾರೆ; ಕೆಲವರು ಹೊರುವುದಿಲ್ಲ. ನೃತ್ಯವನ್ನು ಪರಿಗಣಿಸಿ. ಯಾರು ಕ್ರಮವನ್ನು ನಿರ್ಧರಿಸುತ್ತಾರೆ?
    follow_ups:
      - ಸಂಚಾರವಿಲ್ಲದಿದ್ದರೆ ಜೇನುಗೂಡು ಹೇಗಿರುತ್ತದೆ?
      - ಪ್ರವೇಶದ್ವಾರವು ಹರಿವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಜೇನುನೊಣ ಮತ್ತು ಕಾಲೋನಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_spider_web
    name: ಜೇಡರ ಬಲೆ
    prompt: |
      ಜೇಡರ ಬಲೆ ಪ್ರದೇಶ ಮತ್ತು ಬಲೆ. ಜೇಡನು ಅಂಚಿನಲ್ಲಿ ಕಾಯುತ್ತಾನೆ.
      ಕಂಪನಗಳು ಮಾಹಿತಿಯನ್ನು ಒಯ್ಯುತ್ತವೆ. ವಾಸ್ತುಶಿಲ್ಪವನ್ನು ಪರಿಗಣಿಸಿ. ಬಲೆಯು ಏನು ಹಿಡಿಯುತ್ತದೆ? ಏನು ಹೊರಗಿಡುತ್ತದೆ?
    follow_ups:
      - ಬಲೆಯಿಲ್ಲದಿದ್ದರೆ ಜೇಡ ಹೇಗಿರುತ್ತದೆ?
      - ಬಲೆಯು ಜೇಡನ ಇಂದ್ರಿಯಗಳನ್ನು ಹೇಗೆ ವಿಸ್ತರಿಸುತ್ತದೆ?
      - ರೇಷ್ಮೆ ಮತ್ತು ಬದುಕುಳಿಯುವಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_dragonfly_claim
    name: ಚಿಟ್ಟೆ ಹಕ್ಕು
    prompt: |
      ಒಂದು ಚಿಟ್ಟೆಯು ಕೊಳದ ಒಂದು ಭಾಗವನ್ನು ಗಸ್ತು ತಿರುಗುತ್ತದೆ—ಹಿಂದೆ ಮತ್ತು ಮುಂದೆ. ಅದು ಪ್ರಾದೇಶಿಕ.
      ಎದುರಾಳಿಗಳನ್ನು ಓಡಿಸಲಾಗುತ್ತದೆ. ಸಂಗಾತಿಗಳನ್ನು ಅರಸಲಾಗುತ್ತದೆ. ಪಾಲನ್ನು ಪರಿಗಣಿಸಿ. ಏನು ರಕ್ಷಿಸಲ್ಪಡುತ್ತಿದೆ?
    follow_ups:
      - ಪ್ರದೇಶವಿಲ್ಲದಿದ್ದರೆ ಚಿಟ್ಟೆಯು ಏನು ಮಾಡುತ್ತದೆ?
      - ಗಸ್ತು ತಿರುಗುವಿಕೆಯು ಒಡೆತನವನ್ನು ಹೇಗೆ ತಿಳಿಸುತ್ತದೆ?
      - ಸ್ಥಳ ಮತ್ತು ಸಂತಾನೋತ್ಪತ್ತಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_caterpillar_munch
    name: ಹುಳು ತಿನ್ನುವುದು
    prompt: |
      ಹುಳವು ತಿನ್ನುತ್ತಿದೆ—ಎಲೆಯ ಅಂಚು ಕಡಿಮೆಯಾಗುತ್ತಿದೆ. ತಿನ್ನುವುದು ನಿರಂತರ.
      ಹುಳವು ಒಂದು ಪರಿವರ್ತನೆ ಯಂತ್ರ. ದರವನ್ನು ಪರಿಗಣಿಸಿ. ಸಸ್ಯವು ಸಸ್ಯಹಾರಿಗಳಿಲ್ಲದಿದ್ದರೆ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಹುಳವು ಎಲೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತಿನ್ನುವಿಕೆಯಿಲ್ಲದಿದ್ದರೆ ಚಿಟ್ಟೆಯು ಹೇಗಿರುತ್ತದೆ?
      - ಬಳಕೆ ಮತ್ತು ಬೆಳವಣಿಗೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_beetle_battle
    name: ಜೂಜು ಹುಳು ಯುದ್ಧ
    prompt: |
      ಎರಡು ಜೂಜು ಹುಳುಗಳು ಭೇಟಿಯಾಗುತ್ತವೆ—ಆಗಿರಬಹುದು ಸ್ಟ್ಯಾಗ್ ಜೂಜು ಹುಳುಗಳು, ಆಗಿರಬಹುದು ಸಗಣಿ ಜೂಜು ಹುಳುಗಳು. ಅವು ಕುಸ್ತಿಮಾಡುತ್ತವೆ.
      ಹೋರಾಟವು ಆಚರಣೆ. ಪಾಲುಗಳನ್ನು ಪರಿಗಣಿಸಿ. ಏನು ಗೆಲ್ಲಲಾಗುತ್ತಿದೆ? ಏನು ಕಳೆದುಕೊಳ್ಳಲಾಗುತ್ತಿದೆ?
    follow_ups:
      - ಸೋತವನು ಏನು ಮಾಡುತ್ತಾನೆ?
      - ಯುದ್ಧವು ಹೇಗೆ ಪರಿಹರಿಸಲ್ಪಡುತ್ತದೆ?
      - ಯುದ್ಧ ಮತ್ತು ಸಂಭೋಗದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_firefly_flash
    name: ಮಿಂಚುಹುಳು ಹೊಳಪು
    prompt: |
      ಮಿಂಚುಹುಳುಗಳು ಹೊಳೆಯುತ್ತವೆ—ಪ್ರತಿ ಪ್ರಭೇದವು ಒಂದು ಸಂಕೇತವನ್ನು ಹೊಂದಿದೆ. ಕ್ರಮವು ಸಂಭೋಗ. ಸಂಕೇತವನ್ನು ಪರಿಗಣಿಸಿ.
      ತಪ್ಪು ಹೊಳಪು ಎಂದರೆ ಏನು? ಅವರು ಕತ್ತಲೆಯಲ್ಲಿ ಪರಸ್ಪರ ಹೇಗೆ ಕಂಡುಕೊಳ್ಳುತ್ತಾರೆ?
    follow_ups:
      - ಹೊಳಪು ಪ್ರಭೇದವನ್ನು ಹೇಗೆ ಎನ್ಕೋಡ್ ಮಾಡುತ್ತದೆ?
      - ಮಿಂಚುಹುಳುಗಳಿಲ್ಲದಿದ್ದರೆ ಹುಲ್ಲುಗಾವಲು ಹೇಗಿರುತ್ತದೆ?
      - ಬೆಳಕು ಮತ್ತು ಸಂಗಾತಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_aphid_farm
    name: ಎಫಿಡ್ ಕೃಷಿ
    prompt: |
      ಇರುವೆಗಳು ಎಫಿಡ್‌ಗಳನ್ನು ನೋಡಿಕೊಳ್ಳುತ್ತವೆ—ಅವುಗಳನ್ನು ಸವರುತ್ತವೆ, ಅವುಗಳನ್ನು ರಕ್ಷಿಸುತ್ತವೆ. ಎಫಿಡ್‌ಗಳು
      ಹನಿಡ್ಯೂ ಹೊರಹಾಕುತ್ತವೆ. ಇರುವೆಗಳು ಅದನ್ನು ಕೊಯ್ಲು ಮಾಡುತ್ತವೆ. ಪಾಲುದಾರಿಕೆಯನ್ನು ಪರಿಗಣಿಸಿ. ಯಾರು ಪ್ರಯೋಜನ ಪಡೆಯುತ್ತಾರೆ?
      ಯಾರು ಶೋಷಣೆಗೆ ಒಳಗಾಗುತ್ತಾರೆ?
    follow_ups:
      - ಇರುವೆಗಳಿಲ್ಲದಿದ್ದರೆ ಎಫಿಡ್‌ಗಳು ಹೇಗಿರುತ್ತವೆ?
      - ಕೃಷಿಯು ಎರಡೂ ಪ್ರಭೇದಗಳನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ನೋಡಿಕೊಳ್ಳುವುದು ಮತ್ತು ಹೊರತೆಗೆಯುವಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_cicada_shell
    name: ನೊಣದ ಚಿಪ್ಪು
    prompt: |
      ನೊಣದ ಚಿಪ್ಪು ತೊಗಟೆಗೆ ಅಂಟಿಕೊಂಡಿದೆ—ಕೀಟವು ಹೊರಬಂದಿದೆ. ಚಿಪ್ಪು ಖಾಲಿಯಾಗಿದೆ,
      ಪೂರ್ಣವಾಗಿದೆ. ರೂಪಾಂತರವನ್ನು ಪರಿಗಣಿಸಿ. ಕೀಟವು ಏನನ್ನು ಹಿಂದೆ ಬಿಟ್ಟಿತು? ಏನು ಗಳಿಸಿತು?
    follow_ups:
      - ರೂಪಾಂತರವಿಲ್ಲದಿದ್ದರೆ ನೊಣ ಹೇಗಿರುತ್ತದೆ?
      - ಚಿಪ್ಪು ಪರಿವರ್ತನೆಯನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ಬಿಡುಗಡೆ ಮತ್ತು ಬೆಳವಣಿಗೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_leaf_miner
    name: ಎಲೆಯ ಗಣಿಗಾರ
    prompt: |
      ಎಲೆಯೊಳಗೆ ಒಂದು ಹಾದಿ—ಎಲೆಯ ಗಣಿಗಾರನ ಹಾದಿ. ಲಾರ್ವಾ ಪದರಗಳ ನಡುವೆ ತಿನ್ನುತ್ತದೆ.
      ಎಲೆಯು ದಾಖಲೆಯನ್ನು ಹೊಂದಿದೆ. ಸುರಂಗವನ್ನು ಪರಿಗಣಿಸಿ. ಒಳಗಿನಿಂದ ಎಲೆ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಗಣಿಗಾರನಿಲ್ಲದಿದ್ದರೆ ಎಲೆ ಹೇಗಿರುತ್ತದೆ?
      - ಗಣಿಯು ಲಾರ್ವಾವನ್ನು ಹೇಗೆ ರಕ್ಷಿಸುತ್ತದೆ?
      - ಒಳಗೆ ಮತ್ತು ಹೊರಗಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_wasp_nest
    name: ಕಣಜದ ಗೂಡು
    prompt: |
      ಒಂದು ಕಾಗದದ ಕಣಜದ ಗೂಡು—ಷಡ್ಭುಜಾಕೃತಿಯ ಕೋಶಗಳು, ಅಗಿದ ಮರ. ಗೂಡು ವಾಸ್ತುಶಿಲ್ಪ
      ಮತ್ತು ಕೋಟೆ. ಕಾಲೋನಿಯನ್ನು ಪರಿಗಣಿಸಿ. ಯಾರು ನಿರ್ಮಿಸುತ್ತಾರೆ? ಯಾರು ರಕ್ಷಿಸುತ್ತಾರೆ? ಯಾರು ಸಂತಾನೋತ್ಪತ್ತಿ ಮಾಡುತ್ತಾರೆ?
    follow_ups:
      - ಗೂಡಿನಿಲ್ಲದಿದ್ದರೆ ಕಣಜಗಳು ಹೇಗಿರುತ್ತವೆ?
      - ಗೂಡು ಸಾಮಾಜಿಕ ರಚನೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಾಗದ ಮತ್ತು ಕಾಲೋನಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_grasshopper_leap
    name: ಮಿಡತೆ ಜಿಗಿತ
    prompt: |
      ಮಿಡತೆಯೊಂದು ಜಿಗಿಯುತ್ತದೆ—ಕಾಲುಗಳು ವಿಸ್ತರಿಸುತ್ತವೆ, ಅದು ಕಣ್ಮರೆಯಾಗುತ್ತದೆ. ಜಿಗಿತವು ತಪ್ಪಿಸಿಕೊಳ್ಳುವಿಕೆ ಅಥವಾ
      ಸಮೀಪಿಸುವಿಕೆ. ಪ್ರಚೋದಕವನ್ನು ಪರಿಗಣಿಸಿ. ಮಿಡತೆಯು ಏನು ನೋಡಿತು? ಏನು ಕೇಳಿತು?
    follow_ups:
      - ಜಿಗಿತವಿಲ್ಲದಿದ್ದರೆ ಮಿಡತೆಯು ಏನು ಮಾಡುತ್ತದೆ?
      - ಜಿಗಿತವು ಬೇಟೆಯನ್ನು ಹೇಗೆ ತಪ್ಪಿಸುತ್ತದೆ?
      - ಕಾಲು ಮತ್ತು ಹಾರಾಟದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_mantis_still
    name: ಕೀಟವು ಸ್ಥಿರ
    prompt: |
      ಕೀಟವು ಕಾಯುತ್ತಿದೆ—ಚಲನೆಯಿಲ್ಲದೆ. ಅದು ಬೇಟೆಗಾರ. ಬೇಟೆಯು ಸಮೀಪಿಸುತ್ತದೆ. ಹೊಡೆತವು
      ಆಕಸ್ಮಿಕ. ತಾಳ್ಮೆಯನ್ನು ಪರಿಗಣಿಸಿ. ಸ್ಥಿರತೆಯು ಏನು ವೆಚ್ಚವಾಗುತ್ತದೆ? ಏನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ಕಾಯುವಿಕೆಯಿಲ್ಲದಿದ್ದರೆ ಕೀಟವು ಹೇಗಿರುತ್ತದೆ?
      - ಸ್ಥಿರತೆಯು ಹೇಗೆ ಮೋಸಗೊಳಿಸುತ್ತದೆ?
      - ತಾಳ್ಮೆ ಮತ್ತು ಸೆರೆಹಿಡಿಯುವಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmi_bumblebee_buzz
