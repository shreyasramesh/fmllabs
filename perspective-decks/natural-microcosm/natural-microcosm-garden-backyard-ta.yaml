  - id: nmg_fence_creep
    name: வேலி ஊர்ந்து செல்லுதல்
    prompt: |
      ஐவி அல்லது மார்னிங் குளோரி ஒரு வேலியில் ஊர்ந்து செல்கிறது. வேலி மனிதனால்
