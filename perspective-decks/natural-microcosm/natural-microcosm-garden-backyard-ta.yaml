      - ஏறுவதற்கும் ஆதரவுக்கும் இடையிலான உறவு என்ன?
  - id: nmg_worm_cast
    name: மண்புழு எச்சம்
    prompt: |
      மண்புழு எச்சங்கள் — சிறிய மண் குவியல்கள் — புல்வெளியில் புள்ளிகள். புழு கடந்து
      விட்டது, வளத்தை விட்டுச் சென்றது. எச்சம் தொல்லியல். புழு என்ன செயலாக்கியது?
      அது என்ன விட்டுச் சென்றது?
    follow_ups:
      - மண்புழுக்கள் இல்லாமல் மண் எப்படி இருக்கும்?
      - எச்சம் எவ்வாறு புழுவின் வேலையைக் குறிக்கிறது?
      - எச்சம் மற்றும் காற்றோட்டத்திற்கு இடையிலான உறவு என்ன?
  - id: nmg_squirrel_cache
