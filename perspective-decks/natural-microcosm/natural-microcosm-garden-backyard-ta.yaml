    follow_ups:
      - உறைப்பூச்சு இல்லாமல் படுக்கை எப்படி இருக்கும்?
      - அடுக்கு எவ்வாறு நுண்காற்றை உருவாக்குகிறது?
      - உறைப்பூச்சுக்கும் மண்ணுக்கும் இடையிலான உறவு என்ன?
  - id: nmg_hummingbird_hover
    name: ஹம்மிங்பேர்ட் மிதத்தல்
    prompt: |
      ஒரு ஹம்மிங்பேர்ட் ஒரு பூவின் முன் மிதக்கிறது — சிறகுகள் வேகத்தில் காண முடியாதவை.
      மிதத்தல் விலை உயர்ந்தது. தேன் மதிப்புடையதாக இருக்க வேண்டும். வருகையின்
