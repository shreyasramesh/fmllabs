# இயற்கை நுண்ணுயிர் — தோட்டம் & வீட்டுத்தோட்டம் (Tamil)

id: natural_microcosm_garden_backyard
name: இயற்கை நுண்ணுயிர் — தோட்டம் & வீட்டுத்தோட்டம்
description: 50 அட்டைகள், வீட்டுத்தோட்டப் புழுக்கள், மண், களைகள் vs பயிர்கள், மற்றும் வளர்ப்பு இயற்கையின் நடனம் ஆகியவற்றைப் பார்க்கும் விதத்தை மாற்றியமைக்க.
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: தேனீ தரையிறங்குதல்
    prompt: |
      ஒரு பூவின் மீது தேனீ தரையிறங்குவதைப் பாருங்கள். அணுகுமுறை, தொடுதல், மிதத்தல்.
      தேனீ ஒரு வேட்டையாடி மற்றும் மகரந்தச் சேர்க்கை இரண்டும். பூ என்ன பெறுகிறது?
      அது என்ன ஆபத்தை எதிர்கொள்கிறது?
    follow_ups:
      - அடுத்த வருகையை தரையிறங்குதல் எவ்வாறு பாதிக்கிறது?
      - தேனீக்கள் இல்லாமல் தோட்டம் எப்படி இருக்கும்?
      - பூ மற்றும் தேனீக்கு இடையிலான உறவு என்ன?
  - id: nmg_soil_crumble
    name: மண் உதிர்வு
    prompt: |
      ஒரு கைப்பிடி மண்ணை எடுங்கள். அதன் அமைப்பை உணருங்கள் — உதிர்வு, துகள்கள்.
      அந்த மண் வரலாற்றை, மரணத்தை, மறுபிறப்பை கொண்டுள்ளது. இதற்கு முன் இங்கு என்ன வாழ்ந்தது?
      இதிலிருந்து என்ன வளரும்?
    follow_ups:
      - மண் எதை வளர்க்கிறது என்பதை எவ்வாறு வடிவமைக்கிறது?
      - மலடான மண் என்ன அர்த்தம்?
      - உதிர்வு மற்றும் வாழ்வுக்கு இடையிலான உறவு என்ன?
  - id: nmg_weed_edge
    name: விளிம்பில் களை
    prompt: |
      புல்வெளி படுக்கையை சந்திக்கும் இடத்தில் ஒரு களை வளர்கிறது. அது நடப்படவில்லை.
      அது அழைக்கப்பட்டிருக்கலாம் — அல்லது அது தன்னைத்தானே அழைத்துக் கொண்டிருக்கலாம்.
      எல்லையைக் கவனியுங்கள். களைக்கும் பூவுக்கும் இடையில் யார் கோடு போடுகிறார்கள்?
    follow_ups:
      - களைகள் இல்லாத தோட்டம் எப்படி இருக்கும்?
      - விளிம்பு எவ்வாறு பதட்டத்தை உருவாக்குகிறது?
      - களைக்கும் நோக்கத்திற்கும் இடையிலான உறவு என்ன?
  - id: nmg_compost_steam
    name: உரம் நீராவி
    prompt: |
      ஒரு உரம் குவியலை புரட்டவும். நீராவி உயர்கிறது — சிதைவு நடந்து கொண்டிருக்கிறது.
      வெப்பம் நுண்ணுயிரிகளின் வேலை. சமையலறை கழிவுகள் மண்ணாக மாறும்.
      மாற்றத்தை கண்டறியுங்கள்.
    follow_ups:
      - உரம் இல்லாமல் தோட்டம் என்ன இழக்கும்?
      - வெப்பம் எவ்வாறு செயல்முறையை குறிக்கிறது?
      - கழிவுக்கும் வளத்திற்கும் இடையிலான உறவு என்ன?
  - id: nmg_seed_dormancy
    name: விதை உறக்கம்
    prompt: |
      மண்ணில் உள்ள ஒரு விதை ஆண்டுகள் — தசாப்தங்கள் காத்திருக்க முடியும். அது உயிருடன்
      இருக்கிறது ஆனால் இடைநிறுத்தப்பட்டுள்ளது. அதை எது எழுப்புகிறது? ஒளி, நீர், நெருப்பு,
      குழப்பம். ஒரு விதையின் பொறுமையை கவனியுங்கள்.
    follow_ups:
      - உறக்கம் இல்லாமல் முளைப்பு என்ன இழக்கும்?
      - காத்திருப்பு எவ்வாறு உயிர்வாழ்வை வடிவமைக்கிறது?
      - இடைநிறுத்தம் மற்றும் தோற்றத்திற்கு இடையிலான உறவு என்ன?
  - id: nmg_bird_bath
    name: பறவை குளியல்
    prompt: |
      ஒரு பறவை குளியல் ஒரு அழைப்பு. யார் வருகிறார்கள் என்று பாருங்கள் — சிட்டுக்குருவிகள்,
      ராபின்ஸ், ஒருவேளை ஒரு ஜே. குளியல் சந்திப்பை உருவாக்குகிறது. இந்த சிறிய நீர் தேக்கம்
      இல்லாமல் முற்றம் எப்படி இருக்கும்?
    follow_ups:
      - குளியல் யார் வருகிறார்கள் என்பதை எவ்வாறு வடிவமைக்கிறது?
      - வருகையின் நடனம் என்ன?
      - நீர் மற்றும் பறவைக்கு இடையிலான உறவு என்ன?
  - id: nmg_tomato_truss
    name: தக்காளி கொத்து
    prompt: |
      ஒரு தக்காளி கொத்து பச்சை பழங்களையும், பிறகு சிவப்பு பழங்களையும் தாங்குகிறது.
      கட்டமைப்பை ஆய்வு செய்யுங்கள். தண்டு, கிளைகள், எடை. ஆலை பொறியியல்.
      எதை தாங்குகிறது?
    follow_ups:
      - கொத்து இல்லாமல் ஆலை எப்படி இருக்கும்?
      - கட்டமைப்பு அறுவடையை எவ்வாறு வடிவமைக்கிறது?
      - வடிவம் மற்றும் பழத்திற்கு இடையிலான உறவு என்ன?
  - id: nmg_aphid_column
    name: அசுவினி நெடுவரிசை
    prompt: |
      தண்டில் அசுவினி கூட்டமாக — உறிஞ்சுதல், பெருகி வருதல். அவை பூச்சி மற்றும் இரையும்.
      லேடிபக்ஸ் வரும். சூழலியலைக் கவனியுங்கள். வெடிப்புக்கும் சமநிலைக்கும் இடையிலான
      உறவு என்ன?
    follow_ups:
      - அசுவினி இல்லாமல் ஆலை எப்படி இருக்கும்?
      - கூட்டம் எவ்வாறு வேட்டையாடுபவர்களை ஈர்க்கிறது?
      - பூச்சிக்கும் சூழலியலுக்கும் இடையிலான உறவு என்ன?
  - id: nmg_hose_spray
    name: குழாய் தெளிப்பு
    prompt: |
      குழாயிலிருந்து வரும் நீர் மண்ணில் விழுகிறது. அது குளம், உறிஞ்சுதல், ஓடுவதைப் பாருங்கள்.
      தெளிப்பு செயற்கை மழை. உண்மையான விஷயத்திலிருந்து இது எவ்வாறு வேறுபடுகிறது?
      ஆலை என்ன பெறுகிறது?
    follow_ups:
      - குழாய் இல்லாமல் தோட்டம் எப்படி இருக்கும்?
      - நீர்ப்பாசனம் வளர்ச்சியை எவ்வாறு வடிவமைக்கிறது?
      - தெளிப்புக்கும் மழைக்கும் இடையிலான உறவு என்ன?
  - id: nmg_lawn_mow
    name: புல்வெளி வெட்டு
    prompt: |
      ஒரு புல்வெளி நிர்வகிக்கப்பட்ட காட்டுத்தனம் — உயரத்திற்கு வெட்டப்பட்டு, பச்சை நிறமாக
      வைக்கப்படுகிறது. வெட்டு வளர்ச்சியை குறுக்கிடுகிறது. தனித்து விடப்பட்டால் புல்வெளி
      என்னவாக மாறும் என்று கவனியுங்கள். எதை நாம் பின்னுக்குத் தள்ளுகிறோம்?
    follow_ups:
      - வெட்டுதல் இல்லாமல் முற்றம் எப்படி இருக்கும்?
      - வெட்டு எவ்வாறு அடையாளத்தை வடிவமைக்கிறது?
      - புல்வெளிக்கும் கட்டுப்பாட்டிற்கும் இடையிலான உறவு என்ன?
  - id: nmg_pot_bound
    name: தொட்டி கட்டு
    prompt: |
      ஒரு தொட்டியில் உள்ள ஆலை — வேர்கள் சுற்றி, தேடுகிறது. தொட்டி ஒரு எல்லை.
      வரம்பற்ற மண்ணுடன் ஆலை என்ன செய்யும்? தொட்டி சிறை மற்றும் பாதுகாப்பு இரண்டும்.
      வர்த்தகத்தை கவனியுங்கள்.
    follow_ups:
      - தொட்டி இல்லாமல் ஆலை எப்படி இருக்கும்?
      - கட்டுப்பாடு வளர்ச்சியை எவ்வாறு வடிவமைக்கிறது?
      - வேருக்கும் சுவருக்கும் இடையிலான உறவு என்ன?
  - id: nmg_mulch_layer
    name: உறைப்பூச்சு அடுக்கு
    prompt: |
      உறைப்பூச்சு மண்ணை மூடுகிறது — மர சில்லுகள், வைக்கோல், இலைகள். இது ஈரப்பதத்தை
      தக்கவைத்து, களைகளை அடக்குகிறது, இறுதியில் மண்ணாக மாறும். அடுக்கு தற்காலிகமானது.
