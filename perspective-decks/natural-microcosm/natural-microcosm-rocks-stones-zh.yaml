# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然微观 — 岩石与石头 (Mandarin Chinese)

id: natural_microcosm_rocks_stones
name: 自然微观 — 岩石与石头
description: 50 张卡片，改变你对岩石和石头的看法——从地质年代 和地衣到风化、侵蚀以及矿物的慢镜头生命。
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: 地衣地图
    prompt: |
      地衣生长在岩石上——缓慢而耐心。橙色、灰色、绿色。它不是一种
      生物，而是两种：真菌和藻类。考虑这种合作关系。岩石提供了什么？
      地衣又回报了什么？
    follow_ups:
      - 没有地衣的岩石会是什么样子？
      - 地衣如何标记时间？
      - 地衣与风化之间有什么关系？
  - id: nmr_pebble_smooth
    name: 圆润鹅卵石
    prompt: |
      河里的鹅卵石是圆润的——被水和沙磨圆的。握住一块。花了多少
      年？它的圆润是旅程的记录。锋利的边缘又意味着什么？
    follow_ups:
      - 圆润如何揭示历史？
      - 没有水，鹅卵石会是什么样子？
      - 形状与水流之间有什么关系？
  - id: nmr_crack_frost
    name: 霜冻裂缝
    prompt: |
      水在裂缝中结冰，膨胀。岩石裂开。这是缓慢的暴力。
      找一块有裂缝的岩石。考虑导致它形成的冻融循环。
    follow_ups:
      - 没有裂缝，岩石会是什么样子？
      - 霜冻如何塑造地貌？
      - 水与断裂之间有什么关系？
  - id: nmr_stone_warmth
    name: 石头温暖
    prompt: |
      被阳光晒暖的石头储存着热量。傍晚坐在上面。石头释放出它吸收
      的热量。考虑这种交换。没有太阳，石头会是什么样子？
    follow_ups:
      - 石头如何创造微气候？
      - 什么生物会利用这种温暖？
      - 岩石与热量之间有什么关系？
  - id: nmr_moss_crust
    name: 苔藓地壳
    prompt: |
      苔藓生长在石头上——形成一层薄薄的“地壳”。它保持水分，捕捉灰尘。
      石头变成了基质。岩石何时变成土壤？界限在哪里？
    follow_ups:
      - 没有苔藓，石头会是什么样子？
      - 这种“地壳”如何加速变化？
      - 矿物与有机物之间有什么关系？
  - id: nmr_vein_quartz
    name: 石英脉
    prompt: |
      一条石英脉穿过岩石——一种不同的矿物形成的“缝线”。它标志着
      一次断裂，一次填充。追踪这条线。是什么力量形成的？这条脉
      揭示了什么？
    follow_ups:
      - 没有石英脉，岩石会是什么样子？
      - 石英脉如何标记深邃的时间？
      - 断裂与美之间有什么关系？
  - id: nmr_puddle_reflect
    name: 石头上的水洼
    prompt: |
      雨后，岩石上的凹陷处积水。它是一个小水池——一个杯子。里面反
      映着什么？什么蒸发了？这块石头形成了一个容器。
    follow_ups:
      - 没有凹陷，岩石会是什么样子？
      - 水洼如何创造栖息地？
      - 空洞与时间之间有什么关系？
  - id: nmr_sand_grain
    name: 沙粒
    prompt: |
      沙子是破碎的小岩石。抓一把。每一粒沙曾经都是更大的东西的
      一部分。考虑尺度。一座山有多少粒沙？
    follow_ups:
      - 没有沙粒，沙滩会是什么样子？
      - 沙粒的大小如何讲述一个故事？
      - 整体与碎片之间有什么关系？
  - id: nmr_stone_circle
    name: 石头圈
    prompt: |
      石头由人手或冰川排列——形成一个圆圈、一个石堆、一面墙。有人
      或有东西把它们放在那里。考虑其意图。这种排列意味着什么？
    follow_ups:
      - 没有石头，这片空间会是什么样子？
      - 排列如何创造意义？
      - 岩石与仪式之间有什么关系？
  - id: nmr_erosion_edge
    name: 侵蚀边缘
    prompt: |
      风和水雕刻岩石。找一个边缘——悬崖，一块巨石。它的形状是移除
      的产物。之前那里有什么？还将剩下什么？
    follow_ups:
      - 没有侵蚀，地貌会是什么样子？
      - 边缘如何标记时间？
      - 损失与形态之间有什么关系？
  - id: nmr_color_streak
    name: 色彩条纹
    prompt: |
      岩石并非均匀——铁使之变红，锰使其变黑，铜使其变绿。
      追踪一条色带。颜色是化学作用。它揭示了岩石的什么历史？
    follow_ups:
      - 没有颜色，岩石会是什么样子？
      - 矿物学如何塑造色彩？
      - 元素与色调之间有什么关系？
  - id: nmr_scratch_glacier
    name: 冰川划痕
    prompt: |
      冰川擦痕——基岩上的划痕——标志着冰块拖着石头划过岩石。
      这些线条是平行的。考虑其力量。什么在移动？什么保持不动？
    follow_ups:
      - 没有划痕，岩石会展示什么？
      - 划痕如何标记方向？
      - 冰与石头之间有什么关系？
  - id: nmr_cobble_pattern
    name: 卵石图案
    prompt: |
      海滩或河床上的卵石——大小相似，形状各异。水将它们分拣了。
      考虑这种图案。分拣告诉你什么？
    follow_ups:
      - 没有分拣，海滩会是什么样子？
      - 水流如何塑造图案？
      - 大小与运输之间有什么关系？
  - id: nmr_cavern_drip
    name: 洞穴滴水
    prompt: |
      钟乳石是一滴一滴形成的——渗水矿物的沉积。生长是难以察觉的。
      考虑其时间尺度。如果加速播放，会看到什么？
    follow_ups:
      - 没有滴水，洞穴会是什么样子？
      - 滴水如何记录气候？
      - 水与石头之间有什么关系？
  - id: nmr_boulder_shadow
    name: 巨石阴影
    prompt: |
      一块巨石投下阴影。其下方的地面是不同的——更凉爽、更湿润、阳光更少。
      巨石创造了一个微气候。谁生活在阴影里？
    follow_ups:
      - 没有巨石，山坡会是什么样子？
      - 阴影如何塑造生命？
      - 岩石与庇护所之间有什么关系？
  - id: nmr_fossil_impression
    name: 化石印痕
    prompt: |
      化石是变成石头 the life——或在沉积物中留下的印记。
      如果你能找到一个。岩石承载着记忆。是什么生物留下了这个？
      什么时候？
    follow_ups:
      - 没有化石，岩石会是什么样子？
      - 印痕如何保存？
      - 生命与矿物之间有什么关系？
  - id: nmr_grit_texture
    name: 砂砾质感
    prompt: |
      用手摸岩石。砂岩与花岗岩感觉不同，石板岩与玄武岩也不同。
      质感是矿物、颗粒、结构的体现。触摸告诉你什么？
    follow_ups:
      - 没有质感，岩石会是什么样子？
      - 质感如何揭示起源？
      - 手感与成分之间有什么关系？
  - id: nmr_talus_slope
    name: 碎石坡
    prompt: |
      碎石坡——悬崖底部堆积的碎石。重力和风化将它们带下。
      这个坡是一个残余物的堆积。花了多长时间才积累起来？
    follow_ups:
      - 没有碎石，悬崖底部会是什么样子？
      - 碎石坡如何标记侵蚀？
      - 坠落与堆积之间有什么关系？
  - id: nmr_soil_horizon
    name: 土壤层
    prompt: |
      小心地挖。土壤有层次——上面是腐殖质，下面是矿物质，有时有
      清晰的条带。地平线就是历史。每个层次是如何形成的？
    follow_ups:
      - 没有层次，地面会是什么样子？
      - 地平线如何记录时间？
      - 岩石与土壤之间有什么关系？
  - id: nmr_drystone_wall
    name: 干砌石墙
    prompt: |
      干砌石墙——未使用砂浆。墙体靠重力和吻合度保持稳固。
      考虑其工艺。每一块石头如何支撑着下一块？
    follow_ups:
      - 没有墙，田野会是什么样子？
      - 墙如何标记疆域？
      - 岩石与边界之间有什么关系？
  - id: nmr_tide_pool_rock
    name: 潮汐池岩石
    prompt: |
      潮汐池中的岩石被浸湿、晾干、再浸湿。生物附着其上。
      岩石是栖息地。考虑潮汐的节律。岩石经历了什么？
    follow_ups:
      - 没有岩石，潮汐池会是什么样子？
      - 岩石如何创造表面？
      - 岩石与潮汐之间有什么关系？
  - id: nmr_crystal_face
    name: 晶面
    prompt: |
      有些岩石呈现晶面——劈开的平面，几何形状。
      晶体在空腔中缓慢生长。考虑其几何形状。是什么力量塑造了它？
    follow_ups:
      - 没有晶体，岩石会是什么样子？
      - 晶面如何揭示结构？
      - 秩序与矿物之间有什么关系？
  - id: nmr_dust_coating
    name: 尘埃覆盖
    prompt: |
      岩石会积聚尘埃——花粉、烟灰、矿物质。随着时间推移，它会变暗。
      这种覆盖是堆积的结果。如果冲洗掉，岩石会是什么样子？
      这种覆盖如何改变它？
    follow_ups:
      - 没有覆盖，岩石会是什么样子？
      - 尘埃如何标记环境？
      - 表面与堆积之间有什么关系？
  - id: nmr_river_sculpt
    name: 河流雕刻
    prompt: |
      河流雕刻着河床——壶穴、水潭、急流。岩石被水和沉积物塑造。
      找一段河道。解读它的雕刻。其形态揭示了什么？
    follow_ups:
      - 没有雕刻，河床会是什么样子？
      - 水流如何塑造岩石？
      - 水与形态之间有什么关系？
  - id: nmr_shard_edge
    name: 碎片边缘
    prompt: |
      燧石碎片，一块黑曜石——锋利，加工过或天然的。有人可能用过它。
      边缘具有功能性。考虑其断裂。它是如何制成的？
    follow_ups:
      - 没有边缘，碎片会是什么样子？
      - 断裂如何创造功用？
      - 断裂与工具之间有什么关系？
  - id: nmr_gravel_path
    name: 砾石小径
    prompt: |
      一条砾石小径——脚下是碎石。嘎吱作响，松软。这条小径是人类的选择。
      为什么选择这种路面？砾石的作用是泥土无法替代的？
    follow_ups:
      - 没有砾石，小径会是什么样子？
      - 小径如何塑造行进？
      - 岩石与行走之间有什么关系？
  - id: nmr_bedrock_exposure
    name: 基岩暴露
    prompt: |
      当土壤被剥离——侵蚀、施工——基岩就会显露出来。
      基础可见。考虑通常隐藏的东西。这种暴露揭示了什么？
    follow_ups:
      - 没有暴露，地貌会是什么样子？
      - 基岩如何塑造地表？
      - 隐藏与显露之间有什么关系？
  - id: nmr_wind_polish
    name: 风蚀抛光
    prompt: |
      沙漠岩石被风抛光——光滑，有棱角。沙子喷射表面。
      抛光是磨损的结果。考虑风。花了多长时间？
    follow_ups:
      - 没有抛光，岩石会是什么样子？
      - 风如何塑造石头？
      - 颗粒与表面之间有什么关系？
  - id: nmr_hot_cold_crack
    name: 冷热裂缝
    prompt: |
      岩石在高温时膨胀，在低温时收缩。反复的循环会导致应力，
      微裂缝。找一个裂缝。考虑导致它形成的温度波动。
    follow_ups:
      - 没有裂缝，岩石会是什么样子？
      - 热循环如何塑造地貌？
      - 温度与断裂之间有什么关系？
  - id: nmr_constellation_stone
    name: 星辰石
    prompt: |
      一块带有闪光点——云母、长石——的石头，它们捕捉光线。表面
      闪闪发光。考虑其矿物成分。是什么造成了闪光？
    follow_ups:
      - 没有闪光点，岩石会是什么样子？
      - 光线如何揭示结构？
      - 矿物与反射之间有什么关系？
  - id: nmr_stepping_stone
    name: 踏脚石
    prompt: |
      放在溪流或泥泞中的石头——踏脚石。放置是
      故意的。考虑路径。每一步需要什么？石头提供了什么便利？
    follow_ups:
      - 没有石头，渡口会是什么样子？
      - 石头如何创造通道？
      - 岩石与通道之间有什么关系？
  - id: nmr_moss_island
    name: 苔藓岛
    prompt: |
      溪流中的一块石头——上面长着苔藓。这块石头是一个岛屿。水流
      绕过它。考虑其孤立性。什么能到达苔藓？什么不能？
    follow_ups:
      - 没有这个岛，溪流会是什么样子？
      - 岩石如何创造庇护所？
      - 岩石与水流之间有什么关系？
  - id: nmr_weight_sunken
    name: 重石下沉
    prompt: |
      一块重石随着时间推移沉入土壤。周围形成凹陷。
      考虑其重力。下沉对地面有什么影响？对石头呢？
    follow_ups:
      - 没有这块石头，地面会是什么样子？
      - 重力如何塑造表面？
      - 质量与凹陷之间有什么关系？
  - id: nmr_layer_sediment
    name: 沉积层
    prompt: |
      沉积岩显示出层理——层理面。每一层曾经是泥土、
      沙子、贝壳。岩石是压缩的时间。考虑一个单独的层。
      它以前是什么？
    follow_ups:
      - 没有层理，岩石会是什么样子？
      - 层理如何记录环境？
      - 沉积物与石头之间有什么关系？
  - id: nmr_sunrise_heat
    name: 日出热量
    prompt: |
      一块平坦的岩石朝东。日出时它最先变暖。考虑其
      朝向。与太阳的角度决定了什么？谁能受益于
      最早的温暖？
    follow_ups:
      - 没有朝向，岩石会是什么样子？
      - 朝向如何决定温度？
      - 角度与热量之间有什么关系？
  - id: nmr_rain_rinse
    name: 雨水冲刷
    prompt: |
      雨水拍打岩石，流走。水带走了它溶解的、悬浮的物质。
      冲刷是持续的。岩石失去什么？水得到什么？
    follow_ups:
      - 没有雨水，岩石会是什么样子？
      - 径流如何塑造岩石？
      - 水与溶解之间有什么关系？
  - id: nmr_ice_wedge
    name: 冰楔
    prompt: |
      水在裂缝中结冰，将其扩大。冰楔作用使岩石破裂。
      如果可能，找找证据。考虑其力量。裂缝会变成什么？
    follow_ups:
      - 没有冰，岩石会是什么样子？
      - 冰楔如何传播？
      - 冻结与断裂之间有什么关系？
  - id: nmr_resting_place
    name: 休息之地
    prompt: |
      一块平坦的石头——一个座位，一张桌子，一个舞台。我们用石头休息、工作、
      做标记。考虑你可能会坐的那块石头。它支撑过什么？
      它将承载什么？
    follow_ups:
      - 没有这块石头，空间会是什么样子？
      - 岩石如何吸引使用？
      - 矿物与人类之间有什么关系？
  - id: nmr_boundary_marker
    name: 界碑
    prompt: |
      石头标记边界——地界、坟墓、小径。放置是
      故意的。考虑一块界碑。它分隔了什么？它连接了什么？
    follow_ups:
      - 没有石头，边界会是什么样子？
      - 岩石如何编码意义？
      - 标记与领土之间有什么关系？
  - id: nmr_exfoliation_sheet
    name: 剥落片
    prompt: |
      有些岩石会剥落——层层剥离，像洋葱一样。压力释放，热循环。
      找一块剥落的巨石。考虑其弧度。是什么力量造成的？
    follow_ups:
      - 没有剥落的片层，岩石会是什么样子？
      - 剥落如何塑造表面？
      - 压力与剥离之间有什么关系？
  - id: nmr_compass_orientation
    name: 指南针定向
    prompt: |
      石头可以排列——由冰川、河流或人手。这种排列
      讲述了一个故事。找一些排列的石头。它们指向什么？它们抵制什么？
    follow_ups:
      - 这种排列意味着什么？
      - 定向如何记录力量？
      - 方向与石头之间有什么关系？
  - id: nmr_echo_sound
    name: 回声石
    prompt: |
      石壁会反射声音。拍一下手。听回声。石头会回应你发出的声音。
      考虑其表面。它反射什么？它吸收什么？
    follow_ups:
      - 没有回声，空间会是什么样子？
      - 表面如何塑造声音？
      - 岩石与声音之间有什么关系？
  - id: nmr_anchor_hold
    name: 锚定点
    prompt: |
      一块岩石起着锚定作用——树根缠绕着它，电缆系在它上面。石头起着固定作用。
      考虑其抓力。岩石抵制什么？它促成了什么？
    follow_ups:
      - 没有石头，锚点会是什么样子？
      - 岩石如何创造稳定性？
      - 固定与质量之间有什么关系？
  - id: nmr_patina_age
    name: 年代包浆
    prompt: |
      老岩石会形成包浆——风化壳，氧化，污垢。表面
      在变化。包浆是可见的时间。新岩石会是什么样子？
    follow_ups:
      - 没有包浆，岩石会是什么样子？
      - 包浆如何保护或削弱？
      - 表面与年代之间有什么关系？
  - id: nmr_slow_narrative
    name: 慢叙事
    prompt: |
      一块石头讲述一个缓慢的故事——形成、运输、风化。时间尺度是地质的。
      坐下来，与一块石头相伴。考虑它的过去。它的未来会是怎样？
    follow_ups:
      - 如果我们无法解读这个故事，会失去什么？
      - 岩石如何与深邃的时间联系起来？
      - 岩石与记忆之间有什么关系？
  - id: nmr_cairn_stack
    name: 石堆
    prompt: |
      石堆——人手堆叠的石头。每块石头都保持平衡。堆叠是
      故意的，临时的。谁建造了它？它标志着什么？
    follow_ups:
      - 没有石堆，这个地方会是什么样子？
      - 堆叠如何创造意义？
      - 人与石头之间有什么关系？
  - id: nmr_shadow_cast
    name: 投射阴影
    prompt: |
      一块石头投下阴影。阴影随太阳移动。坐着看一个小时。
      考虑石头与光线的时钟。
    follow_ups:
      - 没有阴影，石头会是什么样子？
      - 阴影如何创造栖息地？
      - 岩石与时间之间有什么关系？
  - id: nmr_scree_slope
    name: 碎石斜坡
    prompt: |
      碎石——悬崖底部松散的岩石。每一块都曾坠落。斜坡是
      堆积。走在上面。感受不稳定性。是什么支撑着它？
      什么将会释放？
    follow_ups:
      - 没有坠落，斜坡会是什么样子？
      - 碎石如何塑造山谷？
      - 悬崖与地面之间有什么关系？
  - id: nmr_fossil_imprint
    name: 化石印模
    prompt: |
      岩石中的化石——贝壳，叶子，骨头。印模是一种记录。
      生物已消失；石头保留着它的形状。考虑其保存。
    follow_ups:
      - 没有化石，我们会知道什么？
      - 印模如何连接时间？
      - 生命与矿物之间有什么关系？
  - id: nmr_dry_stone_wall
    name: 干砌石墙
    prompt: |
      干砌石墙——没有砂浆。每块石头都靠吻合度和
      摩擦力支撑着下一块。这面墙是协作的成果。追踪接缝。
      一块松动的石头会怎样？
    follow_ups:
      - 没有墙，边界会是什么样子？
      - 吻合度如何创造强度？
      - 石头与结构之间有什么关系？
  - id: nmr_cobble_rest
    name: 卵石堆积
    prompt: |
      卵石堆积在水流遗留的地方——河洲，海滩。排列
      并非随机。大小、形状、位置都讲述了水流的故事。洪水会重排什么？
    follow_ups:
      - 这种堆积如何标记最后一次事件？
      - 石头会揭示关于水的什么？
      - 堆积与湍流之间有什么关系？
  - id: nmr_moon_dust
    name: 月尘
    prompt: |
      岩石变成尘土——风、水、根。最细小的颗粒会旅行。
      考虑一粒沙的旅程。它可能最终会到达哪里？
    follow_ups:
      - 没有尘土，地貌会是什么样子？
      - 尘土如何创造新土壤？
      - 岩石与空气之间有什么关系？
  - id: nmr_touch_stone
    name: 触摸石头
    prompt: |
      触摸一块石头。冷，暖，粗糙，光滑。石头没有回应——或者
      有吗？热量传递。水分转移。考虑边界处的交换。
    follow_ups:
      - 在不同时间触摸石头会有什么感觉？
      - 触摸如何改变石头？
      - 手与石头之间有什么关系？
  - id: nmr_shadow_noon
    name: 正午的阴影
    prompt: |
      正午时，石头的阴影最小。黎明和黄昏时，它会拉长。
      阴影是石头的延伸。考虑太阳如何改变石头能给予世界的。
    follow_ups:
      - 没有阴影，石头会提供什么？
      - 阴影如何创造栖息地？
      - 岩石与光线之间有什么关系？
  - id: nmr_stone_circle
    name: 石头圈
    prompt: |
      石头组成一个圆圈——由人手或冰川排列。圆圈
      围成了空间。里面是什么？外面是什么？考虑边界的几何形状。
    follow_ups:
      - 没有圆圈，空间意味着什么？
      - 排列如何创造意义？
      - 形式与仪式之间有什么关系？
