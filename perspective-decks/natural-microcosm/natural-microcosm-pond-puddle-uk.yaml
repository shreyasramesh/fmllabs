# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природний мікрокосм — Ставок і калюжа (Ukrainian)

id: natural_microcosm_pond_puddle
name: Природний мікрокосм — Ставок і калюжа
description: 50 карток, щоб змінити ваш погляд на воду в малих масштабах — від поверхневого натягу та віддзеркалень до водних комах, пуголовків і життя у тимчасових водоймах.
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: Поверхневий натяг
    prompt: |
      Водомірка ходить по воді. Поверхня тримає — молекули чіпляються. Акуратно опустіть шпильку. Вона плаває. Розгляньте невидиму плівку. Що її зламає?
    follow_ups:
      - Як поверхневий натяг впливає на те, хто може тут жити?
      - Яким був би ставок без нього?
      - Який зв'язок між поверхнею та межею?
  - id: nmp_skater_ripple
    name: Хвиля від водомірки
    prompt: |
      Лапки водомірки прогинають поверхню. Кожен крок створює хвилю. Спостерігайте за візерунком. Водомірка читає поверхню, як карту. Що вона відчуває?
    follow_ups:
      - Як хвиля несе інформацію?
      - Що б робила водомірка без поверхні?
      - Який зв'язок між хвилею та здобиччю?
  - id: nmp_reflection_sky
    name: Віддзеркалення неба
    prompt: |
      Калюжа віддзеркалює небо — або гілку, або вас. Віддзеркалення інвертується. Спокійна вода — це дзеркало. Що додає віддзеркалення? Що воно приховує?
    follow_ups:
      - Якою була б калюжа без віддзеркалення?
      - Як спокій формує те, що ми бачимо?
      - Який зв'язок між поверхнею та зображенням?
  - id: nmp_tadpole_tail
    name: Хвіст пуголовка
    prompt: |
      Пуголовок плаває — хвіст штовхає його. Хвіст буде поглинений. Тварина трансформується. Розгляньте проміжний стан. Що дає йому хвіст зараз?
    follow_ups:
      - Яким був би пуголовок без хвоста?
      - Як метаморфоз переписує тіло?
      - Який зв'язок між формою та функцією?
  - id: nmp_dragonfly_egg
    name: Яйце бабки
    prompt: |
      Бабки відкладають яйця у воду — або у стебла під водою. Личинка живе у воді роками, перш ніж з'явитися. Розгляньте подвійне життя. Що пов'язує воду та повітря?
    follow_ups:
      - Якою була б бабка без водного етапу?
      - Як личинка впливає на ставок?
      - Який зв'язок між личинкою та дорослою бабкою?
  - id: nmp_algae_bloom
    name: Цвітіння водоростей
    prompt: |
      Зелена пліснява на воді — водорості. Це цвітіння, імпульс. Занадто багато поживних речовин, занадто багато сонця. Ставок реагує. Що це викликає? Що йде за цим?
    follow_ups:
      - Яким був би ставок без водоростей?
      - Як цвітіння впливає на кисень?
      - Який зв'язок між поживними речовинами та зростанням?
  - id: nmp_reed_stem
    name: Стебло очерету
    prompt: |
      Очерет і рогіз піднімаються з краю. Вони порожнисті — повітряні канали проходять крізь них. Стебло з'єднує воду та повітря. Хто використовує очерет як драбину?
    follow_ups:
      - Яким був би край без очерету?
      - Як порожнистість сприяє виживанню?
      - Який зв'язок між стеблом та середовищем існування?
  - id: nmp_pond_skin
    name: Шкіра ставка
    prompt: |
      Ставок має шкіру — де вода зустрічається з повітрям. На неї падає пил. Розтікається олія. Шкіра ніжна. Торкніться її. Що розділяє шкіра?
    follow_ups:
      - Яким був би ставок без шкіри?
      - Як шкіра впливає на газообмін?
      - Який зв'язок між поверхнею та глибиною?
  - id: nmp_temporary_pool
    name: Тимчасова калюжа
    prompt: |
      Калюжа після дощу — вона висохне. Проте життя адаптувалося. Жаброноги, щитні рачки, яйця, що чекають. Розгляньте терміновість. Що має статися до того, як вода піде?
    follow_ups:
      - Якою була б калюжа, якби вона була постійною?
      - Як тимчасовість формує стратегію?
      - Який зв'язок між часом та адаптацією?
  - id: nmp_whirligig_gyre
    name: Вир водовертки
    prompt: |
      Водовертки крутяться на поверхні. Вони бачать вгорі та внизу — подвійні очі. Вони хижаки та здобич. Розгляньте подвійне бачення. Що воно дає?
    follow_ups:
      - Якою була б водомірка без подвійного бачення?
      - Як вир збиває з пантелику хижаків?
      - Який зв'язок між обертанням та виживанням?
  - id: nmp_diving_spider
    name: Водяний павук-пірнальник
    prompt: |
      Водяний павук-пірнальник несе бульбашку повітря — водолазну дзвон. Він дихає під водою. Бульбашка — це легені. Розгляньте винахід. Що б робив павук без неї?
    follow_ups:
      - Як бульбашка дозволяє полювати?
      - Що б сталося, якби бульбашка лопнула?
      - Який зв'язок між повітрям та водою?
  - id: nmp_pond_scum
    name: Трясовина
    prompt: |
      На краю утворюється пліснява — пилок, пил, водорості, комахи. Це прикордонний шар. Що там збирається? Хто на цьому харчується? Пліснява — це фільтр.
    follow_ups:
      - Яким був би ставок без плісняви?
      - Як край концентрує життя?
      - Який зв'язок між межею та накопиченням?
  - id: nmp_ice_surface
    name: Крижана поверхня
    prompt: |
      Взимку ставок замерзає. Лід тримає. Під ним життя триває — повільніше, холодніше. Розгляньте бар'єр. Що захищає лід? Що він блокує?
    follow_ups:
      - Яким був би ставок без льоду?
      - Як замерзання впливає на кисень?
      - Який зв'язок між льодом та виживанням?
  - id: nmp_minnow_school
    name: Зграя пліток
    prompt: |
      Плітки тримаються зграями — рухаються як одне ціле. Зграя — це захист, ефективність. Спостерігайте за синхронністю. Що їх координує? Який ризик для самотньої плітки?
    follow_ups:
      - Яким був би ставок без зграї?
      - Як зграйність зменшує хижацтво?
      - Який зв'язок між індивідом та групою?
  - id: nmp_lily_pad
    name: Латаття
    prompt: |
      Листок латаття плаває. Його нижня сторона відрізняється від верхньої — волоски, колір. Листок — це платформа. Що на ньому сідає? Що живе під ним?
    follow_ups:
      - Яким був би ставок без латаття?
      - Як листок впливає на світло під ним?
      - Який зв'язок між листком та тінню?
  - id: nmp_ripple_spread
    name: Поширення хвилі
    prompt: |
      Камінь падає. Хвилі поширюються. Вони перетинаються, накладаються. Візерунок несе енергію. Розгляньте згасання. Як далеко поширюються хвилі?
    follow_ups:
      - Якою була б поверхня без хвиль?
      - Як хвиля позначає вплив?
      - Який зв'язок між збуренням та поширенням?
  - id: nmp_mosquito_wiggle
    name: Рух личинки комара
    prompt: |
      Личинки комарів висять біля поверхні — "ворушилки". Вони дихають через сифон. Рух — це пересування, харчування. Розгляньте світ личинки. Що вона їсть?
    follow_ups:
      - Яким був би ставок без комарів?
      - Як рух уникає хижаків?
      - Який зв'язок між личинкою та дорослою комахою?
  - id: nmp_leaf_boat
    name: Лист-човен
    prompt: |
      Лист плаває — опалий, дрейфуючий. Для одних це пліт, для інших — їжа. Лист потоне, розкладеться. Простежте його подорож. Чим він стане?
    follow_ups:
      - Якою була б поверхня без плаваючого сміття?
      - Як лист створює мікросередовище?
      - Який зв'язок між плаванням та потопленням?
  - id: nmp_backswimmer_top
    name: Водомір-спинка догори
    prompt: |
      Водомір плаває догори дриґом — животом до неба. Він гребе ногами. Він дихає на поверхні, потім пірнає. Розгляньте інверсію. Чому догори дриґом?
    follow_ups:
      - Яким був би водомір, якби він був догори ногами?
      - Як постава допомагає полювати?
      - Який зв'язок між орієнтацією та здобиччю?
  - id: nmp_snail_trail
    name: Слід равлика
    prompt: |
      Ставочний равлик ковзає. Він залишає слід — слиз, рух. Слід позначає, де він був. Інші равлики можуть слідувати. Розгляньте шлях. Що повідомляє слід?
    follow_ups:
      - Яким був би равлик без сліду?
      - Як слиз дозволяє рухатися?
      - Який зв'язок між слідом та слідуванням?
  - id: nmp_dew_drop
    name: Крапля роси
    prompt: |
      Роса утворюється на лезі трави над водою — краплі, віддзеркалюють. Це конденсат. Крапля тримається. Потім падає. Розгляньте краплю. Що вона збільшує?
    follow_ups:
      - Яким було б лезо трави без роси?
      - Як крапля викривляє світло?
      - Який зв'язок між краплею та поверхнею?
  - id: nmp_spring_constant
    name: Постійна пружина
    prompt: |
      Джерело живить ставок — або ставок просочується. Рівень води — це баланс. Розгляньте вхід та вихід. Що підтримує водойму? Що її висушить?
    follow_ups:
      - Яким був би ставок без джерела?
      - Як джерело формує воду?
      - Який зв'язок між входом та життям?
  - id: nmp_edge_ecotone
    name: Крайовий екотон
    prompt: |
      Край ставка — це екотон — перехід. Волога зустрічає сушу. Рослини адаптуються. Тварини перетинають. Край — це різноманіття. Що процвітає в проміжку?
    follow_ups:
      - Яким був би ставок без краю?
      - Як екотон створює можливості?
      - Який зв'язок між межею та різноманіттям?
  - id: nmp_frog_eye
    name: Око жаби
    prompt: |
      Жаба сидить на краю. Її очі витріщені — вона бачить угорі та попереду. Жаба нерухома. Потім язик вистрілює. Розгляньте терпіння. Чого вона чекає?
    follow_ups:
      - Якою була б жаба без витріщених очей?
      - Як нерухомість дозволяє кидок?
      - Який зв'язок між очікуванням та здобиччю?
  - id: nmp_oxygen_bubble
    name: Бульбашка кисню
    prompt: |
      Рослини в ставку виробляють кисень — бульбашки піднімаються. У сонячний день вода дихає. Розгляньте обмін. Яким був би ставок без фотосинтезу?
    follow_ups:
      - Як кисень впливає на те, хто може тут жити?
      - Що відбувається, коли кисень вичерпується?
      - Який зв'язок між світлом та диханням?
  - id: nmp_detritus_floor
    name: Дно з детриту
    prompt: |
      Дно ставка — це детрит — опале листя, мертві комахи, осад. Це шар розкладання. Що в ньому живе? Хто на ньому харчується? Дно — це комора.
    follow_ups:
      - Яким був би ставок без детриту?
      - Як дно живить водний стовп?
      - Який зв'язок між дном і верхом?
  - id: nmp_rain_ring
    name: Кільце від дощу
    prompt: |
      Дощ падає на поверхню. Кожна крапля створює кільце — корону, потім кратер. Дощ текстурує воду. Розгляньте візерунок. Що б означала спокійна поверхня?
    follow_ups:
      - Як дощ насичує воду киснем?
      - Що руйнують кільця?
      - Який зв'язок між дощем та поверхнею?
  - id: nmp_duckweed_carpet
    name: Килим з ряски
    prompt: |
      Ряска покриває поверхню — маленькі плаваючі рослини. Вони швидко розмножуються. Килим затінює те, що внизу. Розгляньте покриття. Що означало б повне сонце?
    follow_ups:
      - Яким був би ставок без ряски?
      - Як килим впливає на температуру?
      - Який зв'язок між покриттям та життям під ним?
  - id: nmp_phantom_midgie
    name: Примарний мотиль
    prompt: |
      Личинки примарного мотиля прозорі — примарні. Вони висять у воді. Крізь них видно. Розгляньте невидимість. Що захищає прозорість?
    follow_ups:
      - Якою була б личинка, якби вона була непрозорою?
      - Як прозорість допомагає полювати?
      - Який зв'язок між прозорістю та виживанням?
  - id: nmp_skimmer_skip
    name: Стрибок від камінця
    prompt: |
      Камінь, кинутий по поверхні — раз, два, три. Кожен стрибок передає енергію. Камінь врешті-решт тоне. Розгляньте межу. Що визначає кількість стрибків?
    follow_ups:
      - Що б робив камінь без обертання?
      - Як кут впливає на стрибок?
      - Який зв'язок між кидком та стрибком?
  - id: nmp_pollinator_drink
    name: Питво для запилювачів
    prompt: |
      Бджола п'є на краю. Метелики збираються біля калюжі. Вода — це ресурс. Розгляньте, хто приходить. Що їм потрібно від води?
    follow_ups:
      - Що б робили запилювачі без калюжі?
      - Як край дозволяє пити?
      - Який зв'язок між водою та мінералами?
  - id: nmp_evaporation_skin
    name: Випаровувальна шкіра
    prompt: |
      Ставок втрачає воду через випаровування. Влітку рівень падає. Берег розширюється. Розгляньте відступ. Що оголюється? Хто залишається на мілині?
    follow_ups:
      - Яким був би ставок без випаровування?
      - Як падіння концентрації посилює життя?
      - Який зв'язок між втратою та концентрацією?
  - id: nmp_hydra_stalk
    name: Стебло гідри
    prompt: |
      Гідра — маленька, з щупальцями — прикріплюється до стебла. Вона жалить здобич, притягує її. Гідра може регенерувати. Розгляньте простоту. Який план тіла вона використовує?
    follow_ups:
      - Якими були б ставки без гідр?
      - Як регенерація сприяє виживанню?
      - Який зв'язок між простотою та стійкістю?
  - id: nmp_boatman_row
    name: Гребок човновика
    prompt: |
      Водяний човновик гребе — ноги схожі на весла. Він часто знаходиться догори дриґом, тримаючись за поверхню. Він харчується водоростями. Розгляньте весла. Що вони рухають?
    follow_ups:
      - Яким був би човновик без весел?
      - Чим гребок відрізняється від водомірки-спинка догори?
      - Який зв'язок між ногою та рухом?
  - id: nmp_caddisfly_case
    name: Кокон волохокрильця
    prompt: |
      Личинка волохокрильця будує кокон — гілочки, камінці, мушлі. Вона склеює їх шовком. Кокон — це броня та маскування. Розгляньте конструкцію. Що обирає личинка?
    follow_ups:
      - Якою була б личинка без кокона?
      - Як кокон відрізняється залежно від середовища?
      - Який зв'язок між матеріалом та захистом?
  - id: nmp_damselfly_emergence
    name: Вихід бабки
    prompt: |
      Бабка виходить — личинка вилазить по стеблу, розриває свою шкіру, доросла бабка вивільняється. Крила розгортаються. Момент вразливий. Розгляньте трансформацію. Що може піти не так?
    follow_ups:
      - Якою була б доросла бабка без вилазки?
      - Як вихід впливає на час?
      - Який зв'язок між личинкою та дорослою бабкою?
  - id: nmp_floating_feather
    name: Плаваюче перо
    prompt: |
      Перо плаває — викинуте птахом. Воно пливе по поверхні. На ньому збирається вода. Розгляньте перо. Що захищало птаха від води? Що робить перо зараз?
    follow_ups:
      - Якою була б поверхня без плаваючих об'єктів?
      - Як перо утримує повітря?
      - Який зв'язок між структурою та плавучістю?
  - id: nmp_moon_jelly
    name: Місячна медуза
    prompt: |
      У деяких ставках є медузи — місячні медузи. Вони пульсують. Вони переважно складаються з води. Розгляньте тіло. Що захоплює желе? Чого воно уникає?
    follow_ups:
      - Якими були б ставки без медуз?
      - Як пульсація створює рух?
      - Який зв'язок між водою та тілом?
  - id: nmp_seep_source
    name: Джерело просочування
    prompt: |
      Вода просочується з берега — джерело, повільний потік. Просочування живить ставок. Або ставок витікає. Розгляньте межу. Що перетинає? Що тримається?
    follow_ups:
      - Яким був би ставок без просочування?
      - Як просочування впливає на хімію?
      - Який зв'язок між джерелом та водоймою?
  - id: nmp_wind_wave
    name: Вітрова хвиля
    prompt: |
      Вітер штовхає поверхню. Утворюються маленькі хвилі. Вони розбиваються об край. Розгляньте фетч — відстань, яку вітер проходить над водою. Що формує хвилю?
    follow_ups:
      - Якою була б поверхня без вітру?
      - Як хвилі впливають на кисень?
      - Який зв'язок між вітром та перемішуванням?
  - id: nmp_rotifer_wheel
    name: Колесо коловертки
    prompt: |
      Коловертки мікроскопічні — у них є колесо вій. Воно обертається, притягує їжу. Коловертка — це двигун. Розгляньте масштаб. Що ще є у цій воді?
    follow_ups:
      - Якими були б ставки без коловерток?
      - Як колесо створює потік?
      - Який зв'язок між віями та харчуванням?
  - id: nmp_temperature_layer
    name: Температурний шар
    prompt: |
      Ставки можуть стратифікуватися — теплі зверху, холодні знизу. Шари нелегко змішуються. Розгляньте межу. Хто де живе? Що відбувається, коли ставок перевертається?
    follow_ups:
      - Яким був би ставок без стратифікації?
      - Як температура впливає на кисень?
      - Який зв'язок між шаром та життям?
  - id: nmp_predator_shadow
    name: Тінь хижака
    prompt: |
      Пропливає тінь риби. Здобич завмирає, розбігається. Тінь — це сигнал. Розгляньте реакцію. Що б означала постійна тінь? Що б означала відсутність тіні?
    follow_ups:
      - Як тінь запускає втечу?
      - Які ще сигнали, крім тіні, важливі?
      - Який зв'язок між тінню та виживанням?
  - id: nmp_surface_film
    name: Поверхнева плівка
    prompt: |
      Тонка плівка на воді — пилок, бактерії, органічні речовини. Вона може витримувати вагу. Деякі комахи ходять по ній. Розгляньте плівку. Що її зламає?
    follow_ups:
      - Якою була б поверхня без плівки?
      - Як плівка впливає на газообмін?
      - Який зв'язок між плівкою та межею?
  - id: nmp_dry_wait
    name: Очікування в суші
    prompt: |
      Калюжа висохне. Деякі організми мають яйця, стійкі до висихання. Вони чекають. Наступний дощ може бути за місяці. Розгляньте ставку. Що має збігтися для успіху?
    follow_ups:
      - Якою була б калюжа без очікування?
      - Як сплячка долає сухість?
      - Який зв'язок між яйцем та дощем?
  - id: nmp_shoreline_wrack
    name: Нанос на березі
    prompt: |
      Сміття накопичується на березі — листя, гілочки, мертві комахи. Нанос — це лінія. Він позначає найвищий рівень води. Розгляньте накопичення. Хто тут харчується?
    follow_ups:
      - Яким був би край без наносу?
      - Як нанос створює середовище існування?
      - Який зв'язок між лінією та рівнем?
  - id: nmp_duckweed_carpet
    name: Килим з ряски
    prompt: |
      Ряска покриває стоячу воду — маленькі зелені диски. Вона швидко поширюється. Поверхня стає суцільною. Розгляньте вторгнення. Що блокує килим? Що він дозволяє?
    follow_ups:
      - Яким був би ставок без ряски?
      - Як килим впливає на світло та кисень?
      - Який зв'язок між покриттям та життям під ним?
  - id: nmp_rain_ring
    name: Кільце від дощу
    prompt: |
      Крапля дощу падає на поверхню. Кільце розширюється, згасає. Під час зливи поверхня стає текстурною — кільця накладаються одне на одного. Розгляньте візерунок. Що дощ робить зі ставком?
    follow_ups:
      - Якою була б поверхня без дощу?
      - Як дощ перемішує воду?
      - Який зв'язок між краплею та кільцем?
  - id: nmp_minnow_school
    name: Зграя пліток
    prompt: |
      Плітки тримаються зграями — десятки рухаються як одне ціле. Зграя — це стратегія. Хижаки збивають з пантелику. Розгляньте координацію. Як вони вирішують? Якою була б ціна самотності?
    follow_ups:
      - Яким був би ставок без зграй?
      - Як зграя реагує на загрозу?
      - Який зв'язок між багатьма та одним?
  - id: nmp_ice_edge
    name: Крижаний край
    prompt: |
      Взимку лід росте від краю. Межа наступає. Під ним життя триває — холодніше, повільніше. Розгляньте край. Що виживає під льодом?
    follow_ups:
      - Яким був би ставок без льоду?
      - Як лід захищає чи загрожує?
      - Який зв'язок між замерзанням та киснем?
