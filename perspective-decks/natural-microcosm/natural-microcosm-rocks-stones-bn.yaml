# প্রাকৃতিক ক্ষুদ্র জগৎ — পাথর ও শিলা (Bengali)

id: natural_microcosm_rocks_stones
name: প্রাকৃতিক ক্ষুদ্র জগৎ — পাথর ও শিলা
description: পাথর ও শিলা সম্পর্কে আপনার দৃষ্টিভঙ্গি পরিবর্তন করার জন্য ৫০টি কার্ড—ভূতাত্ত্বিক সময়কাল এবং শ্যাওলা থেকে ক্ষয়, ভাঙন এবং খনিজ পদার্থের ধীর গতির জীবন পর্যন্ত।
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: শ্যাওলার মানচিত্র
    prompt: |
      পাথরের উপর শ্যাওলা জন্মায়—ধীর, ধৈর্যশীল। কমলা, ধূসর, সবুজ। এটি একটি
      জীব নয়, দুটি: ছত্রাক এবং শৈবাল। অংশীদারিত্ব বিবেচনা করুন। পাথর কী অফার করে? শ্যাওলা কী ফিরিয়ে দেয়?
    follow_ups:
      - শ্যাওলা ছাড়া পাথর দেখতে কেমন লাগবে?
      - শ্যাওলা কীভাবে সময় চিহ্নিত করে?
      - শ্যাওলা এবং ক্ষয়ের মধ্যে সম্পর্ক কী?
  - id: nmr_pebble_smooth
    name: মসৃণ নুড়ি
    prompt: |
      একটি নদীর নুড়ি মসৃণ—জল এবং বালি এটিকে ক্ষয় করেছে। একটি ধরুন। এটি কত
      বছর সময় নিয়েছে? মসৃণতা একটি যাত্রার রেকর্ড। তীক্ষ্ণ ধার মানে কি হবে?
    follow_ups:
      - মসৃণতা কীভাবে ইতিহাস প্রকাশ করে?
      - জল ছাড়া নুড়ি কী হবে?
      - আকৃতি এবং প্রবাহের মধ্যে সম্পর্ক কী?
  - id: nmr_crack_frost
    name: তুষার ফাটল
    prompt: |
      একটি ফাটলে জল জমে, প্রসারিত হয়। পাথর ফেটে যায়। এটি ধীর সহিংসতা।
      একটি ফাটলযুক্ত পাথর খুঁজুন। হিম এবং গলনের চক্রগুলো বিবেচনা করুন যা এটি তৈরি করেছে।
    follow_ups:
      - ফাটল ছাড়া পাথর কী হবে?
      - তুষার কীভাবে ভূদৃশ্য তৈরি করে?
      - জল এবং ভাঙনের মধ্যে সম্পর্ক কী?
  - id: nmr_stone_warmth
    name: পাথরের উষ্ণতা
    prompt: |
      সূর্য-উত্তপ্ত পাথর তাপ ধরে রাখে। সন্ধ্যায় একটিতে বসুন। পাথর যা শোষণ করেছে তা ছেড়ে দেয়।
      বিনিময় বিবেচনা করুন। সূর্য ছাড়া পাথর কী হবে?
    follow_ups:
      - পাথর কীভাবে ক্ষুদ্র জলবায়ু তৈরি করে?
      - কোন প্রাণী সেই উষ্ণতা ব্যবহার করে?
      - পাথর এবং তাপের মধ্যে সম্পর্ক কী?
  - id: nmr_moss_crust
    name: শ্যাওলার স্তর
    prompt: |
      পাথরের উপর শ্যাওলা জন্মায়—একটি পাতলা স্তর। এটি আর্দ্রতা ধরে রাখে, ধুলো আটকে রাখে।
      পাথর একটি স্তর হয়ে যায়। কখন পাথর মাটি হয়ে যায়? রেখাটি কোথায়?
    follow_ups:
      - শ্যাওলা ছাড়া পাথর কী হবে?
      - স্তর কীভাবে পরিবর্তনকে ত্বরান্বিত করে?
      - খনিজ এবং জৈব পদার্থের মধ্যে সম্পর্ক কী?
  - id: nmr_vein_quartz
    name: কোয়ার্টজ শিরা
    prompt: |
      একটি কোয়ার্টজ শিরা পাথরের মধ্য দিয়ে কাটে—ভিন্ন খনিজ পদার্থের একটি রেখা।
      এটি একটি ফাটল, একটি পূরণ চিহ্নিত করে। রেখাটি অনুসরণ করুন। কোন শক্তি এটি তৈরি করেছে? শিরাটি কী প্রকাশ করে?
    follow_ups:
      - শিরা ছাড়া পাথর কী হবে?
      - শিরা কীভাবে গভীর সময় চিহ্নিত করে?
      - ফাটল এবং সৌন্দর্যের মধ্যে সম্পর্ক কী?
  - id: nmr_puddle_reflect
    name: পাথরের মধ্যে ডোবা
    prompt: |
      বৃষ্টির পর পাথরের একটি গর্তে জল জমে। এটি একটি ছোট পুকুর—একটি কাপ। এতে কী প্রতিফলিত হয়? কী বাষ্পীভূত হয়? পাথরটি একটি পাত্র তৈরি করেছে।
    follow_ups:
      - গর্ত ছাড়া পাথর কী হবে?
      - পুকুর কীভাবে আবাস তৈরি করে?
      - গর্ত এবং সময়ের মধ্যে সম্পর্ক কী?
  - id: nmr_sand_grain
    name: বালির কণা
    prompt: |
      বালি হল ভাঙা ছোট পাথর। এক মুঠো ধরুন। প্রতিটি কণা একসময় বৃহত্তর কিছুর অংশ ছিল।
      স্কেল বিবেচনা করুন। একটি পাহাড়ে কতগুলি কণা থাকে?
    follow_ups:
      - কণা ছাড়া সৈকত কী হবে?
      - কণার আকার কীভাবে একটি গল্প বলে?
      - সমগ্র এবং অংশের মধ্যে সম্পর্ক কী?
  - id: nmr_stone_circle
    name: পাথরের বৃত্ত
    prompt: |
      হাত বা হিমবাহ দ্বারা সাজানো পাথর—একটি বৃত্ত, একটি স্তূপ, একটি প্রাচীর। কেউ
      বা কিছু সেগুলোকে স্থাপন করেছে। উদ্দেশ্য বিবেচনা করুন। বিন্যাস মানে কী?
    follow_ups:
      - পাথর ছাড়া স্থানটি কী হবে?
      - বিন্যাস কীভাবে অর্থ তৈরি করে?
      - পাথর এবং আচারের মধ্যে সম্পর্ক কী?
  - id: nmr_erosion_edge
    name: ক্ষয়প্রাপ্ত প্রান্ত
    prompt: |
      বাতাস এবং জল পাথর ক্ষয় করে। একটি প্রান্ত খুঁজুন—একটি ক্লিফ, একটি বোল্ডার।
      আকৃতি অপসারণের একটি ফল। আগে কি ছিল? কি থাকবে?
    follow_ups:
      - ক্ষয় ছাড়া ভূদৃশ্য কী হবে?
      - প্রান্ত কীভাবে সময় চিহ্নিত করে?
      - ক্ষতি এবং আকারের মধ্যে সম্পর্ক কী?
  - id: nmr_color_streak
    name: রঙের রেখা
    prompt: |
      পাথর একরকম নয়—লোহা লাল, ম্যাঙ্গানিজ কালো, তামা সবুজ দাগ তৈরি করে।
      একটি রেখা অনুসরণ করুন। রঙটি রসায়ন। এটি পাথরের ইতিহাস সম্পর্কে কী প্রকাশ করে?
    follow_ups:
      - রঙ ছাড়া পাথর কী হবে?
      - খনিজবিদ্যা কীভাবে রং তৈরি করে?
      - উপাদান এবং রঙের মধ্যে সম্পর্ক কী?
  - id: nmr_scratch_glacier
    name: হিমবাহের আঁচড়
    prompt: |
      হিমবাহের রেখা—ভিত্তি শিলার উপর আঁচড়—যেখানে বরফ পাথর টেনে পাথরের উপর দিয়ে গেছে তা চিহ্নিত করে। রেখাগুলি সমান্তরাল। বল বিবেচনা করুন। কী সরেছে? কী স্থির ছিল?
    follow_ups:
      - আঁচড় ছাড়া পাথর কী দেখাবে?
      - আঁচড় কীভাবে দিক নির্দেশ করে?
      - বরফ এবং পাথরের মধ্যে সম্পর্ক কী?
  - id: nmr_cobble_pattern
    name: নুড়িপাথরের প্যাটার্ন
    prompt: |
      নুড়িপাথরের একটি সৈকত বা নদীর তলদেশ—একই আকার, ভিন্ন আকৃতি। জল
      তাদের বাছাই করেছে। প্যাটার্ন বিবেচনা করুন। বাছাই আপনাকে কী বলে?
    follow_ups:
      - বাছাই ছাড়া সৈকত কী হবে?
      - প্রবাহ কীভাবে প্যাটার্ন তৈরি করে?
      - আকার এবং পরিবহনের মধ্যে সম্পর্ক কী?
  - id: nmr_cavern_drip
    name: গুহার ফোঁটা
    prompt: |
      স্টিলাকটাইটগুলি ফোঁটা ফোঁটা তৈরি হয়—চুইয়ে পড়া জল থেকে খনিজ জমা।
      বৃদ্ধি অদৃশ্য। সময়কাল বিবেচনা করুন। একটি দ্রুতগতির চলচ্চিত্র কী দেখাবে?
    follow_ups:
      - ফোঁটা ছাড়া গুহা কী হবে?
      - ফোঁটা কীভাবে জলবায়ু রেকর্ড করে?
      - জল এবং পাথরের মধ্যে সম্পর্ক কী?
  - id: nmr_boulder_shadow
    name: বোল্ডারের ছায়া
    prompt: |
      একটি বড় বোল্ডার ছায়া ফেলে। এর নিচের মাটি ভিন্ন—ঠান্ডা, আর্দ্র, কম রোদ।
      বোল্ডারটি একটি ক্ষুদ্র জলবায়ু তৈরি করে। ছায়ায় কারা বাস করে?
    follow_ups:
      - বোল্ডার ছাড়া ঢাল কী হবে?
      - ছায়া কীভাবে জীবন তৈরি করে?
      - পাথর এবং আশ্রয়ের মধ্যে সম্পর্ক কী?
  - id: nmr_fossil_impression
    name: জীবাশ্মের ছাপ
    prompt: |
      একটি জীবাশ্ম হল পাথরে পরিণত জীবন—বা পলিতে রেখে যাওয়া ছাপ।
      একটি খুঁজে পেলে। পাথর স্মৃতি ধারণ করে। কোন প্রাণী এটি রেখে গেছে? কখন?
    follow_ups:
      - জীবাশ্ম ছাড়া পাথর কী হবে?
      - ছাপ কীভাবে সংরক্ষণ করে?
      - জীবন এবং খনিজের মধ্যে সম্পর্ক কী?
  - id: nmr_grit_texture
    name: দানাদার গঠন
    prompt: |
      পাথরের উপর হাত চালান। বেলেপাথর গ্রানাইটের থেকে ভিন্ন, স্লেট
      ব্যাসল্টের থেকে ভিন্ন। গঠনটি খনিজ, কণা, কাঠামো। স্পর্শ আপনাকে কী বলে?
    follow_ups:
      - গঠন ছাড়া পাথর কী হবে?
      - গঠন কীভাবে উৎস প্রকাশ করে?
      - অনুভূতি এবং উপাদানের মধ্যে সম্পর্ক কী?
  - id: nmr_talus_slope
    name: পাথরের ঢাল
    prompt: |
      একটি পাথরের ঢাল—একটি ক্লিফের গোড়ায় ভাঙা পাথর। মহাকর্ষ এবং আবহাওয়া
      এগুলোকে নামিয়ে আনে। ঢালটি ধ্বংসাবশেষের একটি স্তূপ। এটি জমা হতে কত সময় লেগেছে?
    follow_ups:
      - পাথরের ঢাল ছাড়া ক্লিফের ভিত্তি কী হবে?
      - ঢাল কীভাবে ক্ষয় চিহ্নিত করে?
      - পতন এবং স্তূপের মধ্যে সম্পর্ক কী?
  - id: nmr_soil_horizon
    name: মাটির স্তর
    prompt: |
      সাবধানে খনন করুন। মাটির স্তর আছে—উপরে জৈব, নিচে খনিজ, কখনও কখনও
      স্পষ্ট ব্যান্ড। স্তরটি ইতিহাস। প্রতিটি স্তর কী তৈরি করেছে?
    follow_ups:
      - স্তর ছাড়া মাটি কী হবে?
      - স্তর কীভাবে সময় রেকর্ড করে?
      - পাথর এবং মাটির মধ্যে সম্পর্ক কী?
  - id: nmr_drystone_wall
    name: মর্টারবিহীন পাথরের দেওয়াল
    prompt: |
      একটি মর্টারবিহীন পাথরের দেওয়াল—মর্টার ছাড়া পাথর বসানো। দেওয়ালটি মহাকর্ষ
      এবং ফিট দ্বারা ধরে রাখে। কারুকার্য বিবেচনা করুন। প্রতিটি পাথর কীভাবে পরেরটিকে সমর্থন করে?
    follow_ups:
      - দেওয়াল ছাড়া মাঠ কী হবে?
      - দেওয়াল কীভাবে অঞ্চল চিহ্নিত করে?
      - পাথর এবং সীমানার মধ্যে সম্পর্ক কী?
  - id: nmr_tide_pool_rock
