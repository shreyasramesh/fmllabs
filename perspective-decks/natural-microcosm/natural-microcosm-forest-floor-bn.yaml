# প্রাকৃতিক ক্ষুদ্র বিশ্ব — অরণ্যের তলদেশ (Bengali)

id: natural_microcosm_forest_floor
name: প্রাকৃতিক ক্ষুদ্র বিশ্ব — অরণ্যের তলদেশ
description: অরণ্যের তলদেশকে নতুন চোখে দেখার জন্য ৫০টি কার্ড — পচন ও মাইসেলিয়াম থেকে শুরু করে পাতার স্তূপের স্থাপত্য এবং ছাউনির নীচের অদৃশ্য জীবন পর্যন্ত।
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: পাতার শিরা
    prompt: |
      একটি ঝরে পড়া পাতা তুলুন। শিরাগুলো অনুসরণ করুন। এগুলো জল, পুষ্টি, শর্করা বহন করত। স্থাপত্যটি অদৃশ্য থাকে যতক্ষণ না আপনি দেখেন। যখন পাতাটি জীবন্ত ছিল, তখন শিরার জালিকা কী টিকিয়ে রেখেছিল?
    follow_ups:
      - বিভিন্ন প্রজাতির মধ্যে নকশা কীভাবে ভিন্ন হয়?
      - শিরা ছাড়া পাতাটি কেমন হত?
      - শিরা এবং প্রান্তের মধ্যে সম্পর্ক কী?
  - id: nmf_leaf_litter_layer
    name: পাতার স্তূপের স্তর
    prompt: |
      অরণ্যের তলদেশ স্তরবদ্ধ — উপরে নতুন ঝরা পাতা, নিচে গত বছরের, তার নিচে আরও পুরনো। হাঁটু গেড়ে বসুন। একটি স্তর সরিয়ে ফেলুন। পরিবর্তনটি কী? সময় কীভাবে স্তূপীকৃত হয়?
    follow_ups:
      - পাতার স্তূপ ছাড়া অরণ্য কেমন হত?
      - স্তরটি কীভাবে বাসস্থান তৈরি করে?
      - স্তর এবং পচনের মধ্যে সম্পর্ক কী?
  - id: nmf_mushroom_fruiting
    name: মাশরুমের ফলন
    prompt: |
      একটি মাশরুম কেবল ফলনকারী অংশ। জীবটি — মাইসেলিয়াম — মাটির নীচে, মাটি ভেদ করে, কাঠের মধ্যে ছড়িয়ে পড়ে। যা দেখছেন তাকে একটি সংকেত হিসেবে বিবেচনা করুন। বাকি গল্পটা কী?
    follow_ups:
      - ছত্রাক ছাড়া অরণ্য কেমন হত?
      - ফলনকারী অংশটি জালের সাথে কীভাবে সম্পর্কিত?
      - মাশরুম এবং পচনের মধ্যে সম্পর্ক কী?
  - id: nmf_log_sponge
    name: কাঠের স্পঞ্জ
    prompt: |
      একটি পতিত গাছ জল শোষণ করে, ধরে রাখে। বৃষ্টির পর সেটিতে হাত রাখুন। গাছটি একটি জলাধার। এটি থেকে কে পান করে? এর ভিতরে কী বাস করে?
    follow_ups:
      - নার্স গাছ ছাড়া অরণ্য কেমন হত?
      - গাছটি কীভাবে মাইক্রোক্লাইমেট তৈরি করে?
      - কাঠ এবং জলের মধ্যে সম্পর্ক কী?
  - id: nmf_moss_cushion
    name: শ্যাওলার গদি
    prompt: |
      শ্যাওলা স্পঞ্জের মতো জল ধরে রাখে। স্পর্শ করুন। গদিটি একটি স্থাপত্য — ছোট ছোট গাছ একসাথে জমাট বাঁধা। ফাঁকা জায়গাগুলোতে কী বাস করে?
    follow_ups:
      - শ্যাওলা ছাড়া তলদেশ কেমন হত?
      - গদিটি কীভাবে আর্দ্রতা তৈরি করে?
      - শ্যাওলা এবং চারার মধ্যে সম্পর্ক কী?
  - id: nmf_fern_unfurl
    name: ফার্ন খোলা
    prompt: |
      ফার্নের পাতা সর্পিলভাবে খোলে — ফিডলহেড। আন্দোলন ধীর। সম্ভব হলে কয়েকদিন ধরে একটি দেখুন। পাতাটি খোলার ফলে এটি কীভাবে আকার নেয়?
    follow_ups:
      - সর্পিল ছাড়া ফার্ন কেমন হত?
      - খোলা পাতাটি কীভাবে ফ্রন্ডকে রক্ষা করে?
      - বাঁকানো এবং বৃদ্ধির মধ্যে সম্পর্ক কী?
  - id: nmf_root_tangle
    name: শিকড়ের জট
    prompt: |
      শিকড় পৃষ্ঠের নীচে জট পাকিয়ে থাকে। একটি গাছ পড়ে গেলে এবং তার শিকড়ের বলটি lifted হলে খুঁজে বের করুন। জটটি অনুসন্ধানের একটি মানচিত্র। শিকড়গুলো কী খুঁজছিল?
    follow_ups:
      - শিকড়ের জট ছাড়া গাছটি কেমন হত?
      - শিকড়গুলো মাটির নিচে কীভাবে স্থান ভাগ করে নেয়?
      - শিকড় এবং ছত্রাকের মধ্যে সম্পর্ক কী?
  - id: nmf_slug_trail
    name: শামুকের রেখা
    prompt: |
      একটি পাতার উপর শামুকের রেখা চকচক করে — শ্লেষ্মা, পথ, স্বাক্ষর। রেখাটি শামুক কোথায় গেছে তা চিহ্নিত করে। রেখাটি শিকারীদের কী বলে? শিকারদের কী বলে?
    follow_ups:
      - রেখা ছাড়া শামুক কী হারাবে?
      - শ্লেষ্মা কীভাবে চলাচলে সক্ষম করে?
      - রেখা এবং এলাকার মধ্যে সম্পর্ক কী?
  - id: nmf_lichen_patch
    name: লাইকেনের প্যাচ
    prompt: |
      লাইকেন ছালে, পাথরে, মাটিতে জন্মায় — ধীর, সমন্বিত। ছত্রাক এবং শৈবাল একসাথে। একটি প্যাচ খুঁজুন। এটি কতদিন ধরে সেখানে আছে? এর উপস্থিতি কী নির্দেশ করে?
    follow_ups:
      - লাইকেন ছাড়া ছাল কেমন হত?
      - লাইকেন কীভাবে সময় চিহ্নিত করে?
      - লাইকেন এবং বায়ুর মানের মধ্যে সম্পর্ক কী?
  - id: nmf_saprophyte
    name: মৃতজীবী
    prompt: |
      মৃতজীবী মৃত বস্তু — ছত্রাক, ব্যাকটেরিয়া, পোকামাকড় — থেকে খাবার খায়। তারাই পুনর্ব্যবহারকারী। পচনের প্রমাণ খুঁজুন। কে খাচ্ছে? কী রূপান্তরিত হচ্ছে?
    follow_ups:
      - বিয়োজক ছাড়া অরণ্য কেমন হত?
      - পচন কীভাবে নতুন বৃদ্ধিতে খাদ্য যোগায়?
      - মৃত্যু এবং মাটির মধ্যে সম্পর্ক কী?
  - id: nmf_seedling_emergence
    name: চারার উত্থান
    prompt: |
      একটি চারা পাতার স্তূপ ভেদ করে বেরিয়ে আসে। প্রথমে বীজপত্র, তারপর আসল পাতা। শক্তি লক্ষ্য করুন। বের হওয়ার জন্য কী লেগেছে? কী বাধা দেবে?
    follow_ups:
      - চারা ছাড়া অরণ্য কেমন হত?
      - উত্থান কীভাবে পাতার স্তূপের উপর নির্ভর করে?
      - চারা এবং আলোর মধ্যে সম্পর্ক কী?
  - id: nmf_anthill_mound
    name: পিঁপড়ের ঢিবি
    prompt: |
      অরণ্যের তলদেশ থেকে একটি পিঁপড়ের ঢিবি ওঠে — খনন করা মাটি, সুসংহত। যান চলাচল দেখুন। তারা কোথায় যায়? তারা কী বহন করে?
    follow_ups:
      - ঢিবি ছাড়া তলদেশ কেমন হত?
      - ঢিবি কীভাবে জল নিষ্কাশন নিয়ন্ত্রণ করে?
      - ঢিবি এবং কলোনির মধ্যে সম্পর্ক কী?
  - id: nmf_spider_silk
    name: মাকড়সার জাল
    prompt: |
      মাকড়সার জাল ফাঁক জুড়ে — পাতা, ডালের মাঝে। শিশির এটিকে ধরে। জালটি অদৃশ্য থাকে যতক্ষণ না আলো এর উপর পড়ে। একটি সুতো অনুসরণ করুন। এটি কীসের সাথে যুক্ত?
    follow_ups:
      - জাল ছাড়া ফাঁকা স্থান কেমন হত?
      - জাল কীভাবে স্থানকে গঠন করে?
      - জাল এবং শিকারের মধ্যে সম্পর্ক কী?
  - id: nmf_bark_flake
    name: ছালের টুকরা
    prompt: |
      একটি কাণ্ড থেকে ছালের টুকরা পড়ে — গঠন, নকশা, বয়স। প্রতিটি টুকরা একটি ঋতুর গল্প বলে। ছালের নিচে কে বাস করে? টুকরাটি কী প্রকাশ করে?
    follow_ups:
      - ছাল ছাড়া গাছটি কেমন হত?
      - ছাল কীভাবে রক্ষা করে এবং নিরোধ করে?
      - টুকরা এবং নবীকরণের মধ্যে সম্পর্ক কী?
  - id: nmf_acorn_fall
    name: ওক ফলের পতন
    prompt: |
      একটি ওক ফল পড়ে। এটি তার আকারের তুলনায় ভারী। এটি শিকড় গজাবে অথবা খাওয়া হবে। সম্ভাবনার কথা ভাবুন। কোনটি কোন পথ নির্ধারণ করে?
    follow_ups:
      - ওক ফল ছাড়া অরণ্য কেমন হত?
      - পতন কীভাবে বীজ বিতরণ করে?
      - ওক ফল এবং ওক গাছের মধ্যে সম্পর্ক কী?
  - id: nmf_fallen_branch
    name: পতিত ডাল
    prompt: |
      একটি ডাল মেঝেতে পড়ে আছে — ভেঙে গেছে, হয়তো বাতাসে। এটি এখন একটি সেতু। কে এর উপর দিয়ে যায়? এর উপর কী জন্মায়?
    follow_ups:
      - পতিত কাঠ ছাড়া তলদেশ কেমন হত?
      - ডালটি কীভাবে প্রান্তিক বাসস্থান তৈরি করে?
      - ডাল এবং পুষ্টির মধ্যে সম্পর্ক কী?
  - id: nmf_humus_smell
    name: হিউমাসের গন্ধ
    prompt: |
      অরণ্যের তলদেশের কাছে ঝুঁকুন। গন্ধ — মাটি, পচন, জীবন। সেই গন্ধটি রসায়ন। এটি কী তৈরি করে? গন্ধ ছাড়া অরণ্য কেমন হত?
    follow_ups:
      - গন্ধ কীভাবে স্বাস্থ্য চিহ্নিত করে?
      - জীবাণুমুক্ত মাটির গন্ধ কেমন হত?
      - গন্ধ এবং উর্বরতার মধ্যে সম্পর্ক কী?
  - id: nmf_snail_shell
    name: শামুকের খোলস
    prompt: |
      একটি খালি শামুকের খোলস স্তূপের মধ্যে বিশ্রাম নিচ্ছে। সর্পিল, ক্যালসিয়াম, পিছনে ফেলে রাখা। শামুকটিকে কে খেয়েছে? কে খোলসটি ব্যবহার করবে?
    follow_ups:
      - খোলস ছাড়া তলদেশ কেমন হত?
      - খোলস কীভাবে পুষ্টি পুনর্ব্যবহার করে?
      - খোলস এবং ক্যালসিয়ামের মধ্যে সম্পর্ক কী?
  - id: nmf_fungal_network
    name: ছত্রাকের জাল
    prompt: |
      মাইসেলিয়াম গাছগুলোকে সংযুক্ত করে — একটি উড ওয়াইড ওয়েব। আপনি এটি দেখতে পাবেন না, তবে এটি সেখানে আছে। পুষ্টি প্রবাহিত হয়। তথ্য প্রবাহিত হয়। অরণ্যকে একটি জালিকা হিসেবে বিবেচনা করুন।
    follow_ups:
      - জাল ছাড়া অরণ্য কেমন হত?
      - জাল কীভাবে সম্পদ পুনর্বন্টন করে?
      - ছত্রাক এবং গাছের মধ্যে সম্পর্ক কী?
  - id: nmf_fern_spore
    name: ফার্নের রেণু
    prompt: |
      ফার্ন রেণু দ্বারা প্রজনন করে — ক্ষুদ্র, অগণিত। একটি পাতার নীচের দিকে দেখুন। সোরিগুলো এগুলো ধারণ করে। একটি রেণুর যাত্রা অনুসরণ করতে কী লাগবে?
    follow_ups:
      - রেণু ছাড়া ফার্ন কেমন হত?
