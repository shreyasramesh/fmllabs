# العالم المصغر الطبيعي — أرضية الغابة (Arabic)

id: natural_microcosm_forest_floor
name: العالم المصغر الطبيعي — أرضية الغابة
description: 50 بطاقة لتغيير نظرتك لأرضية الغابة — من التحلل والميسيليوم إلى بنية أوراق الشجر والحياة الخفية تحت المظلة.
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: عرق الورقة
    prompt: |
      التقط ورقة ساقطة. تتبع العروق. لقد حملت الماء والمغذيات والسكريات. الهيكل غير مرئي حتى تنظر. ماذا دعمت شبكة العروق عندما كانت الورقة حية؟
    follow_ups:
      - كيف يختلف النمط بين الأنواع؟
      - ماذا ستكون الورقة بدون العروق؟
      - ما هي العلاقة بين العرق والحافة؟
  - id: nmf_leaf_litter_layer
    name: طبقة أوراق الشجر المتساقطة
    prompt: |
      أرضية الغابة طبقات — أوراق متساقطة جديدة في الأعلى، وأوراق العام الماضي تحتها، وأقدم منها أعمق. اركع. قشر طبقة. ما هو التدرج؟ كيف يتراكم الزمن؟
    follow_ups:
      - ماذا ستكون الغابة بدون الأوراق المتساقطة؟
      - كيف تخلق الطبقة موطنًا؟
      - ما هي العلاقة بين الطبقة والتحلل؟
  - id: nmf_mushroom_fruiting
    name: إثمار الفطر
    prompt: |
      الفطر هو مجرد الجسم المثمر. الكائن الحي — الميسيليوم — ينتشر تحت الأرض، عبر التربة، عبر الخشب. فكر فيما تراه كإشارة. ما هي بقية القصة؟
    follow_ups:
      - ماذا ستكون الغابة بدون الفطريات؟
      - كيف يرتبط الجسم المثمر بالشبكة؟
      - ما هي العلاقة بين الفطر والتحلل؟
  - id: nmf_log_sponge
    name: جذع الشجرة الإسفنجي
    prompt: |
      جذع شجرة ساقط يمتص الماء، يحتفظ به. اضغط بيدك عليه بعد المطر. الجذع هو خزان. من يشرب منه؟ من يعيش بداخله؟
    follow_ups:
      - ماذا ستكون الغابة بدون جذوع الشجر الممرضة؟
      - كيف يخلق الجذع مناخًا دقيقًا؟
      - ما هي العلاقة بين الخشب والماء؟
  - id: nmf_moss_cushion
    name: وسادة الطحلب
    prompt: |
      الطحلب يحتفظ بالماء مثل الإسفنج. المسها. الوسادة هي هيكل — نباتات صغيرة متراصة معًا. من يعيش في المساحات بينها؟
    follow_ups:
      - ماذا ستكون الأرضية بدون الطحلب؟
      - كيف تخلق الوسادة الرطوبة؟
      - ما هي العلاقة بين الطحلب والشتلة؟
  - id: nmf_fern_unfurl
    name: تفتح السرخس
    prompt: |
      تتفتح أوراق السرخس في شكل حلزوني — رؤوس الكمان. الحركة بطيئة. شاهد واحدة على مدار أيام إن استطعت. كيف يشكل التفتح الورقة؟
    follow_ups:
      - ماذا سيكون السرخس بدون اللولب؟
      - كيف يحمي التفتح الورقة؟
      - ما هي العلاقة بين الالتواء والنمو؟
  - id: nmf_root_tangle
    name: تشابك الجذور
    prompt: |
      تتشابك الجذور تحت السطح. ابحث عن مكان سقطت فيه شجرة وارفع كتلة جذورها. التشابك هو خريطة بحث. عن ماذا كانت الجذور تبحث؟
    follow_ups:
      - ماذا ستكون الشجرة بدون التشابك؟
      - كيف تشترك الجذور في المساحة تحت الأرض؟
      - ما هي العلاقة بين الجذر والفطريات؟
  - id: nmf_slug_trail
    name: أثر البزاقة
    prompt: |
      أثر بزاقة يلمع على ورقة — مخاط، مسار، توقيع. الأثر يحدد المكان الذي ذهبت إليه البزاقة. ماذا يقول الأثر للمفترسات؟ للفريسة؟
    follow_ups:
      - ماذا ستخسر البزاقة بدون الأثر؟
      - كيف يمكّن المخاط الحركة؟
      - ما هي العلاقة بين الأثر والإقليم؟
  - id: nmf_lichen_patch
    name: بقعة الأشنات
    prompt: |
      تنمو الأشنات على اللحاء، الصخور، التربة — بطيئة، مركبة. فطر وطحلب معًا. ابحث عن بقعة. منذ متى وهي هناك؟ ماذا يدل وجودها؟
    follow_ups:
      - ماذا سيكون اللحاء بدون الأشنات؟
      - كيف تحدد الأشنات الزمن؟
      - ما هي العلاقة بين الأشنات وجودة الهواء؟
  - id: nmf_saprophyte
    name: محلل رمي
    prompt: |
      تتغذى المحللات الرمية على المادة الميتة — فطريات، بكتيريا، حشرات. إنها المعيدات التدوير. ابحث عن دليل على التحلل. من يأكل؟ ماذا يتحول؟
    follow_ups:
      - ماذا ستكون الغابة بدون المحللات؟
      - كيف يغذي التحلل النمو الجديد؟
      - ما هي العلاقة بين الموت والتربة؟
  - id: nmf_seedling_emergence
    name: ظهور الشتلة
    prompt: |
      شتلة تخترق الأوراق المتساقطة. البادرات أولاً، ثم الأوراق الحقيقية. لاحظ القوة. ماذا تطلب اختراقها؟ ماذا سيمنعها؟
    follow_ups:
      - ماذا ستكون الغابة بدون الشتلات؟
      - كيف يعتمد الظهور على الأوراق المتساقطة؟
      - ما هي العلاقة بين الشتلة والضوء؟
  - id: nmf_anthill_mound
    name: تل النمل
    prompt: |
      تل نمل يرتفع من أرضية الغابة — تربة محفورة، منظمة. راقب حركة المرور. إلى أين يذهبون؟ ماذا يحملون؟
    follow_ups:
      - ماذا ستكون الأرضية بدون التل؟
      - كيف يشكل التل تصريف المياه؟
      - ما هي العلاقة بين التل والمستعمرة؟
  - id: nmf_spider_silk
    name: خيوط العنكبوت
    prompt: |
      خيوط العنكبوت تمتد عبر الفجوات — بين الأوراق، الأغصان. الندى يلتقطها. الشبكة غير مرئية حتى يضربها الضوء. تتبع خيطًا واحدًا. بماذا يتصل؟
    follow_ups:
      - ماذا ستكون الفجوة بدون الخيوط؟
      - كيف تنظم الشبكة المساحة؟
      - ما هي العلاقة بين الخيوط والفريسة؟
  - id: nmf_bark_flake
    name: قشرة اللحاء المتقشرة
    prompt: |
      قشرة لحاء تتساقط من الجذع — ملمس، نمط، عمر. كل قشرة تحكي موسمًا. من يعيش تحت اللحاء؟ ماذا تكشف القشرة؟
    follow_ups:
      - ماذا ستكون الشجرة بدون اللحاء؟
      - كيف يحمي اللحاء ويعزل؟
      - ما هي العلاقة بين القشرة والتجديد؟
  - id: nmf_acorn_fall
    name: سقوط البلوط
    prompt: |
      يسقط بلوط. إنه ثقيل لحجمه. سيجذر أو يؤكل. فكر في الاحتمالات. ما الذي يحدد المسار؟
    follow_ups:
      - ماذا ستكون الغابة بدون البلوط؟
      - كيف يوزع السقوط البذور؟
      - ما هي العلاقة بين البلوط والبلوط؟
  - id: nmf_fallen_branch
    name: غصن ساقط
    prompt: |
      غصن يستلقي على الأرض — مكسور، ربما بسبب الرياح. إنه جسر الآن. من يعبره؟ ما الذي ينمو عليه؟
    follow_ups:
      - ماذا ستكون الأرضية بدون الخشب الساقط؟
      - كيف يخلق الغصن موطنًا حديًا؟
      - ما هي العلاقة بين الغصن والمغذيات؟
  - id: nmf_humus_smell
    name: رائحة الدبال
    prompt: |
      انحنِ بالقرب من أرضية الغابة. الرائحة — تراب، تحلل، حياة. تلك الرائحة هي كيمياء. ما الذي يخلقها؟ ماذا ستكون الغابة بدونها؟
    follow_ups:
      - كيف تحدد الرائحة الصحة؟
      - كيف ستكون رائحة التربة المعقمة؟
      - ما هي العلاقة بين الرائحة والخصوبة؟
  - id: nmf_snail_shell
    name: صدفة الحلزون
    prompt: |
      صدفة حلزون فارغة تستقر في الأوراق المتساقطة. لولب، كالسيوم، تركت وراءها. من قد يكون أكل الحلزون؟ من سيستخدم الصدفة؟
    follow_ups:
      - ماذا ستكون الأرضية بدون الأصداف؟
      - كيف تعيد الصدفة تدوير المغذيات؟
      - ما هي العلاقة بين الصدفة والكالسيوم؟
  - id: nmf_fungal_network
    name: شبكة الفطريات
    prompt: |
      الميسيليوم يربط الأشجار — شبكة واسعة للخشب. لا يمكنك رؤيتها، لكنها موجودة. تتدفق المغذيات. تتدفق المعلومات. فكر في الغابة كشبكة.
    follow_ups:
      - ماذا ستكون الغابة بدون الشبكة؟
      - كيف تعيد الشبكة توزيع الموارد؟
      - ما هي العلاقة بين الفطريات والشجرة؟
  - id: nmf_fern_spore
    name: بوغ السرخس
    prompt: |
      تتكاثر السرخس عن طريق الأبواغ — صغيرة، لا تعد ولا تحصى. انظر إلى الجانب السفلي من الورقة. الأبواغ تحملها. ماذا سيتطلب تتبع رحلة بوغ واحد؟
    follow_ups:
      - ماذا سيكون السرخس بدون الأبواغ؟
      - كيف تنتشر البوغ؟
      - ما هي العلاقة بين البوغ والجامتوفيت؟
  - id: nmf_earthworm_cast
    name: فضلات دودة الأرض
    prompt: |
      تتجمع فضلات دودة الأرض عند مداخل الأنفاق — تربة معالجة، غنية. دودة الأرض أكلت وأخرجت. الفضلات هدية للسطح.
    follow_ups:
      - ماذا ستكون التربة بدون ديدان الأرض؟
      - كيف يحسن الإخراج الهيكل؟
      - ما هي العلاقة بين الدودة والتهوية؟
  - id: nmf_dappled_light
    name: الضوء المرقط
    prompt: |
      يسقط الضوء عبر المظلة في بقع — مرقط، متحرك. تتلقى أرضية الغابة أقل من المساحة المفتوحة. كيف يشكل ذلك ما ينمو؟
    follow_ups:
      - ماذا ستكون الأرضية في ضوء الشمس الكامل؟
      - كيف تخلق البقع موائل دقيقة؟
      - ما هي العلاقة بين الضوء والشتلة؟
  - id: nmf_bracket_fungus
    name: الفطر المقوس
    prompt: |
      ينمو فطر مقوس من الجذع — رف، بوليبور. إنه يهضم الشجرة من الداخل. قد تقف الشجرة لسنوات أثناء حدوث ذلك. فكر في الاستهلاك البطيء.
    follow_ups:
      - ماذا ستكون الشجرة بدون الفطر؟
      - كيف يوزع الفطر المقوس الأبواغ؟
      - ما هي العلاقة بين الطفيلي والعائل؟
  - id: nmf_needle_mat
    name: بساط الإبر
    prompt: |
      تتراكم إبر المخروطيات تحت الشجرة — حامضة، بطيئة التحلل. البساط يغير التربة. ما الذي ينمو فيه؟ ما الذي يتجنبه؟
    follow_ups:
      - ماذا ستكون الأرضية بدون البساط؟
      - كيف يؤثر بساط الإبر على درجة الحموضة؟
      - ما هي العلاقة بين البساط والنار؟
  - id: nmf_salamander_under
    name: السمندل بالأسفل
    prompt: |
      تعيش السمندل تحت الجذوع، الأحجار، الأوراق المتساقطة. ارفع شيئًا بحذر — أعده. الرطوبة، الظلام. لماذا يحتاجه السمندل؟
    follow_ups:
      - ماذا ستكون الغابة بدون السمندل؟
      - كيف يشكل السمندل مجتمع اللافقاريات؟
      - ما هي العلاقة بين الرطوبة والبرمائيات؟
  - id: nmf_rot_hole
    name: ثقب التعفن
    prompt: |
      ثقب في جذع — تعفن، ربما، أو حيوان. الثقب تجويف. من يتخذ منه عشا؟ من يختبئ فيه؟
    follow_ups:
      - ماذا سيكون الجذع بدون الثقب؟
      - كيف يخلق التجويف موطنًا؟
      - ما هي العلاقة بين التعفن والمأوى؟
  - id: nmf_springtail_jump
    name: قفزة زنبركية
    prompt: |
      الزنبركيات — صغيرة، عديدة — تقفز عند إزعاجها. إنها في الأوراق المتساقطة، التربة. تعالج الفطريات، التحلل. لاحظ كم عددها الذي لا يمكنك رؤيته.
    follow_ups:
      - ماذا ستكون الأرضية بدون الزنبركيات؟
      - كيف يمكّن الزنبرك الهروب؟
      - ما هي العلاقة بين الزنبرك والتحلل؟
  - id: nmf_bark_beetle_gallery
    name: معرض خنافس اللحاء
    prompt: |
      معارض خنافس اللحاء تحفر الخشب تحت اللحاء — قنوات، أنماط. الخنفساء نحتتها. استجابت الشجرة. ما هي القصة؟
    follow_ups:
      - ماذا ستكون الشجرة بدون الخنفساء؟
      - كيف يشكل المعرض مصير الشجرة؟
      - ما هي العلاقة بين الخنفساء والفطريات؟
  - id: nmf_dew_on_litter
    name: الندى على الأوراق المتساقطة
    prompt: |
      يتكثف الندى الصباحي على الأوراق، الإبر، الأغصان. تحتفظ الأوراق المتساقطة بالرطوبة. من يشرب عند الفجر؟ كيف يمد الندى موسم الرطوبة؟
    follow_ups:
      - ماذا ستكون الأرضية بدون الندى؟
      - كيف يخلق الندى مصدر مياه؟
      - ما هي العلاقة بين الندى والتبخر؟
  - id: nmf_windfall_gap
    name: فجوة الرياح
    prompt: |
      شجرة سقطت — ريح، عمر، مرض. الفجوة تسمح بدخول الضوء. تتغير الأرضية. ما الذي ينمو في الفجوة ولم يكن بإمكانه ذلك من قبل؟
    follow_ups:
      - ماذا ستكون الغابة بدون الفجوات؟
      - كيف تعيد الفجوة تأسيس التعاقب؟
      - ما هي العلاقة بين الفجوة والتنوع؟
  - id: nmf_mycorrhizal_tip
    name: طرف الفطريات الجذرية
    prompt: |
      تلتقي جذور الأشجار بخيوط الفطريات — الفطريات الجذرية. الفطر يمد مدى وصول الجذر. تغذي الشجرة الفطر. ابحث عن طرف جذر. تخيل الشراكة بالأسفل.
    follow_ups:
      - ماذا ستكون الشجرة بدون الفطريات الجذرية؟
      - كيف تمد الشراكة نظام الجذر؟
      - ما هي العلاقة بين الفطريات والفوسفور؟
  - id: nmf_squirrel_cache
    name: مخبأ السنجاب
    prompt: |
      سنجاب دفن جوزة — نسيت، ربما. قد تنبت. المخبأ هو انتشار. كم عدد الأشجار التي بدأت كبذور منسية؟
    follow_ups:
      - ماذا ستكون الغابة بدون المخابئ؟
      - كيف يمد التخزين نطاق البذور؟
      - ما هي العلاقة بين النسيان والغابة؟
  - id: nmf_carpet_moss
    name: طحلب السجاد
    prompt: |
      الطحلب يفرش الأرض في أماكن — ناعم، أخضر، يحتفظ بالماء. امشِ عليه. اشعر باللين. السجاد هو قرون من النمو، طبقة فوق طبقة.
    follow_ups:
      - ماذا ستكون الأرضية بدون السجاد؟
      - كيف يحتفظ السجاد بالرطوبة؟
      - ما هي العلاقة بين الطحلب والمستنقع؟
  - id: nmf_burrow_entrance
    name: مدخل الجحر
    prompt: |
      جحر يفتح في التربة — فأر، فئران، سنجاب. المدخل عتبة. ماذا يدخل؟ ماذا يخرج؟ الجحر يمتد تحت الأرض.
    follow_ups:
      - ماذا ستكون الأرضية بدون الجحور؟
      - كيف يهوّي الجحر التربة؟
      - ما هي العلاقة بين الجحر والمفترس؟
  - id: nmf_twig_lattice
    name: شبكة الأغصان
    prompt: |
      تتجمع الأغصان — رياح، حيوان، جاذبية. تشكل شبكة فوق الأوراق المتساقطة. الشبكة تحتفظ بالأوراق، تلتقط البذور. إنها بنية عرضية.
    follow_ups:
      - ماذا ستكون الأرضية بدون الشبكة؟
      - كيف تبطئ الشبكة التعرية؟
      - ما هي العلاقة بين الغصن والموئل الدقيق؟
  - id: nmf_rot_softness
    name: ليونة التعفن
    prompt: |
      الخشب المتعفن ينحني تحت أصابعك — إسفنجي، متفتت. الانتقال من الهيكل إلى التربة. كم استغرق الأمر؟ ما الذي تبقى؟
    follow_ups:
      - ماذا ستكون الغابة بدون التعفن؟
      - كيف تمكّن الليونة الاستعمار؟
      - ما هي العلاقة بين التعفن والدبال؟
  - id: nmf_frost_needle
    name: إبر الصقيع
    prompt: |
      إبر صقيع ترتفع من التربة — بلورات ثلج، دقيقة. تتشكل في ليال باردة وهادئة. بحلول الظهر تختفي. فكر في الهيكل الزائل.
    follow_ups:
      - ماذا ستختبر التربة بدون الصقيع؟
      - كيف يؤثر انتفاخ الصقيع على الجذور؟
      - ما هي العلاقة بين الصقيع والشتلة؟
  - id: nmf_millipede_curl
    name: التفاف ألفية الأرجل
    prompt: |
      ألفية أرجل تتكور عند إزعاجها — دفاع. تتغذى على التحلل. شاهد واحدة تتحرك عبر الأوراق المتساقطة. كيف يتنقل الجسم في التشابك؟
    follow_ups:
      - ماذا ستكون الأرضية بدون ألفية الأرجل؟
      - كيف يحمي الالتفاف؟
      - ما هي العلاقة بين ألفية الأرجل والكالسيوم؟
  - id: nmf_pinecone_open
    name: فتحة الصنوبر
    prompt: |
      تفتح مخروطية الصنوبر عندما تكون جافة — الحراشف تنتشر، البذور تتحرر. المخروط آلية. الحرارة يمكن أن تحفزها أيضًا. فكر في التوقيت.
    follow_ups:
      - ماذا ستكون الشجرة بدون المخروط؟
      - كيف تتحكم الرطوبة في الآلية؟
      - ما هي العلاقة بين النار والإطلاق؟
  - id: nmf_hole_in_leaf
    name: ثقب في ورقة
    prompt: |
      ورقة بها ثقوب — حشرة، بزاقة، فطريات. الضرر يحكي قصة. من أكل؟ متى؟ الورقة المتبقية لا تزال تقوم بالتمثيل الضوئي. ما هي العتبة؟
    follow_ups:
      - ماذا ستكون الورقة بدون الثقوب؟
      - كيف يشكل افتراس الأعشاب النبات؟
      - ما هي العلاقة بين الضرر والدفاع؟
  - id: nmf_root_hair
    name: شعيرة جذر
    prompt: |
      شعيرات الجذر — مجهرية — تزيد مساحة السطح للامتصاص. لا يمكنك رؤيتها، لكنها موجودة. جذور الشتلة تستكشف. ماذا تجد؟
    follow_ups:
      - ماذا سيكون الجذر بدون الشعيرات؟
      - كيف تمتص شعيرات الجذر الماء؟
      - ما هي العلاقة بين الشعيرة والمغذيات؟
  - id: nmf_forest_silence
    name: صمت الغابة
    prompt: |
      قف بثبات على أرضية الغابة. الصمت ليس فارغًا — إنه مليء بالأصوات الصغيرة. حفيف، قطرات، صرير. ماذا تسمع عندما تتوقف؟
    follow_ups:
      - ماذا ستكون الغابة بدون الأصوات الصغيرة؟
      - كيف يكشف الصمت عن الوجود؟
      - ما هي العلاقة بين الاستماع والملاحظة؟
  - id: nmf_shade_adaptation
    name: تكيف الظل
    prompt: |
      النباتات في أرضية الغابة متكيفة مع الظل — أوراق أكبر، كلوروفيل مختلف. قارن ورقة شمس بورقة ظل. ما هو المقايضة؟
    follow_ups:
      - ماذا سيكون النبات في ضوء الشمس الكامل؟
      - كيف يشكل الظل الورقة؟
      - ما هي العلاقة بين الضوء والاستثمار؟
  - id: nmf_nutrient_cycle
    name: دورة المغذيات
    prompt: |
      كل شيء على أرضية الغابة يدور — الكربون، النيتروجين، الفوسفور. ورقة تسقط. تُستهلك. تصبح تربة. تغذي شجرة. تتبع حلقة واحدة.
    follow_ups:
      - ماذا ستكون الغابة بدون الدورة؟
      - كيف يكمل التحلل الحلقة؟
      - ما هي العلاقة بين الموت والنمو؟
  - id: nmf_footprint_compression
    name: ضغط البصمة
    prompt: |
      بصمتك تضغط على الأوراق المتساقطة. التربة تحتها تحتفظ بالشكل. كم خطوة تستغرق لتغيير الأرضية؟ من آخر مشى هنا؟
    follow_ups:
      - ماذا ستكون الأرضية بدون حركة المرور؟
      - كيف يؤثر الضغط على تصريف المياه؟
      - ما هي العلاقة بين المسار والانضغاط؟
  - id: nmf_seasonal_signal
    name: إشارة الموسم
    prompt: |
      أرضية الغابة تشير إلى الموسم — نمو جديد في الربيع، شيخوخة في الخريف. ماذا يوجد على الأرض الآن؟ ماذا يخبرك؟
    follow_ups:
      - ماذا ستكون الأرضية في موسم آخر؟
      - كيف تزامن الإشارة الحياة؟
      - ما هي العلاقة بين الأوراق المتساقطة والتقويم؟
  - id: nmf_stump_succession
    name: تعاقب الجذع
    prompt: |
      جذع مقطوع تنبت منه فطريات، شتلات، طحالب. إنها مرحلة في التعاقب. ماذا جاء قبل؟ ماذا سيحل محله؟ الجذع هو نهاية وبداية.
    follow_ups:
      - ماذا ستكون المساحة الصافية بدون الجذع؟
      - كيف يخلق الجذع فرصة؟
      - ما هي العلاقة بين الموت والنمو الجديد؟
  - id: nmf_forest_breath
    name: تنفس الغابة
    prompt: |
      أرضية الغابة تتنفس — أكسجين في، كربون خارج، أو العكس ليلاً. التربة حية. قف بثبات. هل تشعر بالتبادل؟
    follow_ups:
      - ماذا سيكون الهواء بدون الأرضية؟
      - كيف يشكل التنفس المظلة؟
      - ما هي العلاقة بين التربة والغلاف الجوي؟
  - id: nmf_leaf_miner_trail
    name: أثر ماسح الورقة
    prompt: |
      ماسح الورقة — يرقة حشرة — يأكل بين الطبقات. الأثر خط أبيض، مسار متعرج. تتبعه. ماذا كان الماسح يبحث عنه؟
    follow_ups:
      - ماذا ستكون الورقة بدون الأثر؟
      - كيف يتنقل الماسح بدون رؤية؟
      - ما هي العلاقة بين الداخل والخارج؟
  - id: nmf_decomposer_shift
    name: تحول المحلل
    prompt: |
      مع تحلل المادة، تتولى المحللات المختلفة — أولاً البكتيريا والفطريات، ثم الخنافس ودود الأرض. ابحث عن مادة في مراحل مختلفة. من يعمل الآن؟
    follow_ups:
      - ماذا سيكون التحلل بدون تعاقب؟
      - كيف يشكل التحول الوتيرة؟
      - ما هي العلاقة بين المرحلة والمستهلك؟
