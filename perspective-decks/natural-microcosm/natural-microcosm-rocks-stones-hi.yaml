# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# प्राकृतिक सूक्ष्म जगत — चट्टानें और पत्थर (Hindi)

id: natural_microcosm_rocks_stones
name: प्राकृतिक सूक्ष्म जगत — चट्टानें और पत्थर
description: 50 कार्ड जो चट्टानों और पत्थरों को देखने के तरीके को बदलते हैं—भूवैज्ञानिक समय और लाइकेन से लेकर अपक्षय, कटाव और खनिज के धीमे जीवन तक।
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: लाइकेन का नक्शा
    prompt: |
      चट्टान पर लाइकेन उगता है—धीमा, धैर्यवान। नारंगी, ग्रे, हरा। यह एक जीव नहीं, बल्कि दो हैं: फफूंद और शैवाल। साझेदारी पर विचार करें। चट्टान क्या प्रदान करती है? लाइकेन क्या वापस देता है?
    follow_ups:
      - लाइकेन के बिना चट्टान कैसी दिखेगी?
      - लाइकेन समय को कैसे चिह्नित करता है?
      - लाइकेन और अपक्षय के बीच क्या संबंध है?
  - id: nmr_pebble_smooth
    name: चिकना कंकड़
    prompt: |
      नदी का कंकड़ चिकना होता है—पानी और रेत ने इसे घिस दिया है। एक पकड़ें। इसमें कितने साल लगे? चिकनाई एक यात्रा का रिकॉर्ड है। एक तेज किनारा क्या मतलब रखेगा?
    follow_ups:
      - चिकनाई इतिहास को कैसे प्रकट करती है?
      - पानी के बिना कंकड़ क्या होगा?
      - आकार और प्रवाह के बीच क्या संबंध है?
  - id: nmr_crack_frost
    name: पाला दरार
    prompt: |
      पानी एक दरार में जम जाता है, फैल जाता है। चट्टान फट जाती है। यह धीमी हिंसा है। एक दरार वाली चट्टान खोजें। उन चक्रों पर विचार करें जिन्होंने इसे बनाया।
    follow_ups:
      - दरार के बिना चट्टान क्या होगी?
      - पाला परिदृश्य को कैसे आकार देता है?
      - पानी और फ्रैक्चर के बीच क्या संबंध है?
  - id: nmr_stone_warmth
    name: पत्थर की गर्माहट
    prompt: |
      सूरज से गर्म चट्टान गर्मी रखती है। शाम को उस पर बैठें। पत्थर वह छोड़ता है जो उसने अवशोषित किया था। आदान-प्रदान पर विचार करें। सूरज के बिना चट्टान क्या होगी?
    follow_ups:
      - पत्थर सूक्ष्म जलवायु कैसे बनाता है?
      - कौन से जीव उस गर्मी का उपयोग करते हैं?
      - चट्टान और गर्मी के बीच क्या संबंध है?
  - id: nmr_moss_crust
    name: काई की परत
    prompt: |
      चट्टान पर काई उगती है—एक पतली परत। यह नमी रखती है, धूल फंसाती है। चट्टान एक आधार बन जाती है। चट्टान मिट्टी कब बनती है? रेखा कहाँ है?
    follow_ups:
      - काई के बिना चट्टान क्या होगी?
      - परत परिवर्तन को कैसे तेज करती है?
      - खनिज और जैविक के बीच क्या संबंध है?
  - id: nmr_vein_quartz
    name: क्वार्ट्ज की नस
    prompt: |
      एक क्वार्ट्ज की नस चट्टान को काटती है—अलग खनिज का एक सीम। यह एक फ्रैक्चर, एक भराई को चिह्नित करता है। रेखा का पता लगाएं। किन ताकतों ने इसे बनाया? नस क्या प्रकट करती है?
    follow_ups:
      - नस के बिना चट्टान क्या होगी?
      - नस गहरे समय को कैसे चिह्नित करती है?
      - फ्रैक्चर और सुंदरता के बीच क्या संबंध है?
  - id: nmr_puddle_reflect
    name: पत्थर में पोखर
    prompt: |
      चट्टान में एक अवसाद बारिश के बाद पानी रखता है। यह एक छोटा सा पूल है—एक कप। इसमें क्या प्रतिबिंबित होता है? क्या वाष्पित होता है? चट्टान ने एक बर्तन बनाया है।
    follow_ups:
      - अवसाद के बिना चट्टान क्या होगी?
      - पूल आवास कैसे बनाता है?
      - खोखले और समय के बीच क्या संबंध है?
  - id: nmr_sand_grain
    name: रेत का दाना
    prompt: |
      रेत चट्टान का छोटा रूप है। एक मुट्ठी पकड़ें। हर दाना कभी किसी बड़ी चीज़ का हिस्सा था। पैमाने पर विचार करें। एक पहाड़ में कितने दाने होते हैं?
    follow_ups:
      - दानों के बिना समुद्र तट क्या होगा?
      - दाने का आकार कहानी कैसे बताता है?
      - पूरे और टुकड़े के बीच क्या संबंध है?
  - id: nmr_stone_circle
    name: पत्थर का घेरा
    prompt: |
      हाथों से या ग्लेशियर से व्यवस्थित चट्टानें—एक घेरा, एक पाइरोट, एक दीवार। किसी ने या किसी चीज़ ने उन्हें रखा। इरादे पर विचार करें। व्यवस्था का क्या मतलब है?
    follow_ups:
      - पत्थरों के बिना जगह क्या होगी?
      - व्यवस्था अर्थ कैसे बनाती है?
      - चट्टान और अनुष्ठान के बीच क्या संबंध है?
  - id: nmr_erosion_edge
    name: कटाव का किनारा
    prompt: |
      हवा और पानी चट्टान को तराशते हैं। एक किनारा खोजें—एक चट्टान, एक बोल्डर। आकार हटाए जाने का उत्पाद है। पहले वहाँ क्या था? क्या बचेगा?
    follow_ups:
      - कटाव के बिना परिदृश्य क्या होगा?
      - किनारा समय को कैसे चिह्नित करता है?
      - नुकसान और रूप के बीच क्या संबंध है?
  - id: nmr_color_streak
    name: रंग की धारी
    prompt: |
      चट्टान एक समान नहीं होती—लोहा लाल, मैंगनीज काला, तांबा हरा। एक धारी का पता लगाएं। रंग रसायन शास्त्र है। यह चट्टान के इतिहास के बारे में क्या प्रकट करता है?
    follow_ups:
      - रंग के बिना चट्टान क्या होगी?
      - खनिज विज्ञान पैलेट को कैसे आकार देता है?
      - तत्व और रंग के बीच क्या संबंध है?
  - id: nmr_scratch_glacier
    name: ग्लेशियर का खरोंच
    prompt: |
      ग्लेशियल स्ट्रीएशन—चट्टान पर खरोंच—यह चिह्नित करते हैं कि बर्फ ने चट्टानों को पत्थर पर खींचा। रेखाएं समानांतर हैं। बल पर विचार करें। क्या चला? क्या स्थिर रहा?
    follow_ups:
      - खरोंच के बिना चट्टान क्या दिखाएगी?
      - खरोंच दिशा को कैसे चिह्नित करती है?
      - बर्फ और पत्थर के बीच क्या संबंध है?
  - id: nmr_cobble_pattern
    name: कोबल का पैटर्न
    prompt: |
      कोबल का एक समुद्र तट या नदी तल—समान आकार, विविध आकार। पानी ने उन्हें छांट दिया है। पैटर्न पर विचार करें। छँटाई आपको क्या बताती है?
    follow_ups:
      - छँटाई के बिना समुद्र तट क्या होगा?
      - प्रवाह पैटर्न को कैसे आकार देता है?
      - आकार और परिवहन के बीच क्या संबंध है?
  - id: nmr_cavern_drip
    name: गुफा की बूंद
    prompt: |
      स्टैलेक्टाइट्स बूंद-बूंद बनते हैं—रिसते पानी से खनिज जमा होते हैं। वृद्धि अप्रत्यक्ष है। समय-सीमा पर विचार करें। तेज गति वाली फिल्म क्या दिखाएगी?
    follow_ups:
      - बूंद के बिना गुफा क्या होगी?
      - बूंद जलवायु को कैसे रिकॉर्ड करती है?
      - पानी और पत्थर के बीच क्या संबंध है?
  - id: nmr_boulder_shadow
    name: बोल्डर की छाया
    prompt: |
      एक बड़ा बोल्डर छाया डालता है। उसके नीचे की जमीन अलग है—ठंडी, नम, कम धूप। बोल्डर एक सूक्ष्म जलवायु बनाता है। छाया में कौन रहता है?
    follow_ups:
      - बोल्डर के बिना ढलान क्या होगी?
      - छाया जीवन को कैसे आकार देती है?
      - चट्टान और शरण के बीच क्या संबंध है?
  - id: nmr_fossil_impression
    name: जीवाश्म की छाप
    prompt: |
      जीवाश्म जीवन है जो पत्थर बन गया है—या तलछट में छोड़ी गई छाप। एक खोजें यदि आप कर सकते हैं। चट्टान स्मृति रखती है। यह किस प्राणी ने छोड़ी? कब?
    follow_ups:
      - जीवाश्म के बिना चट्टान क्या होगी?
      - छाप कैसे संरक्षित करती है?
      - जीवन और खनिज के बीच क्या संबंध है?
  - id: nmr_grit_texture
    name: किरकिरा बनावट
    prompt: |
      अपना हाथ चट्टान पर फेरें। बलुआ पत्थर ग्रेनाइट, स्लेट से बेसाल्ट से अलग महसूस होता है। बनावट खनिज, दाने, संरचना है। स्पर्श आपको क्या बताता है?
    follow_ups:
      - बनावट के बिना चट्टान क्या होगी?
      - बनावट उत्पत्ति को कैसे प्रकट करती है?
      - अनुभव और संरचना के बीच क्या संबंध है?
  - id: nmr_talus_slope
    name: टैलस ढलान
    prompt: |
      एक टैलस ढलान—एक चट्टान के आधार पर टूटी हुई चट्टान। गुरुत्वाकर्षण और मौसम इसे नीचे लाते हैं। ढलान मलबे का ढेर है। इसे जमा होने में कितना समय लगा?
    follow_ups:
      - टैलस के बिना चट्टान का आधार क्या होगा?
      - ढलान कटाव को कैसे चिह्नित करती है?
      - गिरावट और ढेर के बीच क्या संबंध है?
  - id: nmr_soil_horizon
    name: मिट्टी का क्षितिज
    prompt: |
      सावधानी से खोदें। मिट्टी में परतें होती हैं—ऊपर जैविक, नीचे खनिज, कभी-कभी अलग बैंड। क्षितिज इतिहास है। प्रत्येक परत किसने बनाई?
    follow_ups:
      - क्षितिज के बिना जमीन क्या होगी?
      - क्षितिज समय को कैसे रिकॉर्ड करता है?
      - चट्टान और मिट्टी के बीच क्या संबंध है?
  - id: nmr_drystone_wall
    name: सूखी पत्थर की दीवार
    prompt: |
      एक सूखी पत्थर की दीवार—बिना गारे के फिट की गई चट्टानें। दीवार गुरुत्वाकर्षण और फिट द्वारा टिकी रहती है। शिल्प पर विचार करें। प्रत्येक पत्थर अगले का समर्थन कैसे करता है?
    follow_ups:
      - दीवार के बिना खेत क्या होगा?
      - दीवार क्षेत्र को कैसे चिह्नित करती है?
      - चट्टान और सीमा के बीच क्या संबंध है?
  - id: nmr_tide_pool_rock
    name: ज्वारीय पूल की चट्टान
    prompt: |
      ज्वारीय पूल में चट्टानें गीली, सूखी, फिर गीली होती हैं। जीव चिपक जाते हैं। चट्टान आवास है। ज्वार की लय पर विचार करें। चट्टान क्या अनुभव करती है?
    follow_ups:
      - चट्टान के बिना पूल क्या होगा?
      - चट्टान सतह कैसे बनाती है?
      - चट्टान और ज्वार के बीच क्या संबंध है?
  - id: nmr_crystal_face
    name: क्रिस्टल का फलक
    prompt: |
      कुछ चट्टानें क्रिस्टल फलक दिखाती हैं—विभाजित तल, ज्यामितीय रूप। क्रिस्टल एक गुहा में, धीमी गति से उगा। ज्यामिति पर विचार करें। किन ताकतों ने इसे आकार दिया?
    follow_ups:
      - क्रिस्टल के बिना चट्टान क्या होगी?
      - फलक संरचना को कैसे प्रकट करता है?
      - व्यवस्था और खनिज के बीच क्या संबंध है?
  - id: nmr_dust_coating
    name: धूल की परत
    prompt: |
      चट्टान पर धूल जमा होती है—पराग, कालिख, खनिज। समय के साथ यह गहरा हो जाता है। परत संचय है। अगर धोया जाए तो चट्टान कैसी दिखेगी? परत इसे कैसे बदलती है?
    follow_ups:
      - परत के बिना चट्टान क्या होगी?
      - धूल पर्यावरण को कैसे चिह्नित करती है?
      - सतह और संचय के बीच क्या संबंध है?
  - id: nmr_river_sculpt
    name: नदी की तराशी
    prompt: |
      एक नदी अपने तल को तराशती है—गड्ढे, पूल, रैफल्स। चट्टान पानी और तलछट द्वारा आकार लेती है। एक खिंचाव खोजें। तराशी को पढ़ें। आकार क्या प्रकट करता है?
    follow_ups:
      - तराशी के बिना नदी तल क्या होगा?
      - प्रवाह चट्टान को कैसे आकार देता है?
      - पानी और रूप के बीच क्या संबंध है?
  - id: nmr_shard_edge
    name: शार्ड का किनारा
    prompt: |
      एक चर्ट शार्ड, एक चेर्ट का टुकड़ा—तेज, काम किया हुआ या प्राकृतिक। किसी ने इसका इस्तेमाल किया हो सकता है। किनारा कार्यात्मक है। फ्रैक्चर पर विचार करें। इसे कैसे बनाया गया था?
    follow_ups:
      - किनारे के बिना शार्ड क्या होगा?
      - फ्रैक्चर उपयोगिता कैसे बनाता है?
      - ब्रेक और टूल के बीच क्या संबंध है?
  - id: nmr_gravel_path
    name: बजरी का रास्ता
    prompt: |
