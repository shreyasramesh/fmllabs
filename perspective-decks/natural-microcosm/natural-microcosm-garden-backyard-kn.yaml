# ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಉದ್ಯಾನ ಮತ್ತು ಹಿತ್ತಲು (Kannada)

id: natural_microcosm_garden_backyard
name: ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಉದ್ಯಾನ ಮತ್ತು ಹಿತ್ತಲು
description: 50 ಕಾರ್ಡ್‌ಗಳು, ಸ್ಥಳೀಯ ಕಾಡು ಪ್ರಪಂಚವನ್ನು ನೋಡುವ ಬಗೆಯನ್ನು ಬದಲಾಯಿಸಲು — ಪರಾಗಸ್ಪರ್ಶಕಗಳು ಮತ್ತು ಮಣ್ಣಿನಿಂದ ಕಳೆಗಳು ಮತ್ತು ಬೆಳೆಗಳು, ಹಾಗು ಕೃಷಿ ಮಾಡಲಾದ ಪ್ರಕೃತಿಯ ನೃತ್ಯದವರೆಗೂ.
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: ಜೇನುನೋಣದ ಇಳಿಯುವಿಕೆ
    prompt: |
      ಒಂದು ಹೂವಿನ ಮೇಲೆ ಜೇನುನೋಣ ಇಳಿಯುವುದನ್ನು ನೋಡಿ. ಅದರ ಹತ್ತಿರ ಬರುವಿಕೆ, ಸ್ಪರ್ಶ,
      ಮತ್ತು ಗಾಳಿಯಲ್ಲಿ ತೇಲುವಿಕೆ. ಜೇನುನೋಣವು ಬೇಟೆಯೂ ಹೌದು, ಪರಾಗಸ್ಪರ್ಶಕವೂ ಹೌದು.
      ಹೂವಿಗೆ ಏನಿದೆ ಲಾಭ? ಅದಕ್ಕೆ ಏನಿದೆ ಅಪಾಯ?
    follow_ups:
      - ಆ ಇಳಿಯುವಿಕೆಯು ಮುಂದಿನ ಭೇಟಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಜೇನುನೋಣಗಳಿಲ್ಲದ ಉದ್ಯಾನ ಹೇಗಿರುತ್ತದೆ?
      - ಹೂವಿನ ಮತ್ತು ಜೇನುನೋಣದ ಸಂಬಂಧವೇನು?
  - id: nmg_soil_crumble
    name: ಮಣ್ಣಿನ ಉದುರುವಿಕೆ
    prompt: |
      ಒಂದು ಹಿಡಿ ಮಣ್ಣನ್ನು ತೆಗೆದುಕೊಂಡು. ಅದರ ಸ್ಪರ್ಶವನ್ನು ಅನುಭವಿಸಿ — ಉದುರುವಿಕೆ,
      ಧಾನ್ಯಗಳು. ಆ ಮಣ್ಣು ಇತಿಹಾಸ, ಸಾವು, ಪುನರ್ಜನ್ಮವನ್ನು ಹೊಂದಿದೆ. ಇಲ್ಲಿ ಮೊದಲು
      ಏನು ಜೀವಿಸಿತ್ತು? ಇದರಿಂದ ಏನ ಬೆಳೆಯುತ್ತದೆ?
    follow_ups:
      - ಮಣ್ಣು ಬೆಳೆಯುವುದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಫಲವತ್ತಿಲ್ಲದ ಮಣ್ಣು ಏನನ್ನು ಸೂಚಿಸುತ್ತದೆ?
      - ಉದುರುವಿಕೆ ಮತ್ತು ಜೀವದ ಸಂಬಂಧವೇನು?
  - id: nmg_weed_edge
    name: ಅಂಚಿನಲ್ಲಿ ಕಳೆ
    prompt: |
      ಹುಲ್ಲುಗಾವಲು ಹಾಸಿಗೆಯನ್ನು ಸೇರುವಲ್ಲಿ ಒಂದು ಕಳೆ ಬೆಳೆಯುತ್ತದೆ. ಅದನ್ನು ನೆಡಲಾಗಿಲ್ಲ.
      ಅದನ್ನು ಆಹ್ವಾನಿಸಲಾಗಿದೆ — ಅಥವಾ ಅದು ತನ್ನನ್ನೇ ಆಹ್ವಾನಿಸಿಕೊಂಡಿದೆ. ಗಡಿಯನ್ನು
      ಪರಿಗಣಿಸಿ. ಕಳೆ ಮತ್ತು ಹೂವಿನ ನಡುವೆ ಯಾರು ಗಡಿ ಎಳೆಯುತ್ತಾರೆ?
    follow_ups:
      - ಕಳೆಗಳಿಲ್ಲದ ಉದ್ಯಾನ ಹೇಗಿರುತ್ತದೆ?
      - ಅಂಚು ಹೇಗೆ ಉದ್ವೇಗವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಕಳೆ ಮತ್ತು ಉದ್ದೇಶದ ಸಂಬಂಧವೇನು?
  - id: nmg_compost_steam
    name: ಕಾಂಪೋಸ್ಟ್ ಆವಿ
    prompt: |
      ಒಂದು ಕಾಂಪೋಸ್ಟ್ ರಾಶಿಯನ್ನು ತಿರುಗಿಸಿ. ಆವಿ ಏರುತ್ತದೆ — ವಿಘಟನೆ ಪ್ರಗತಿಯಲ್ಲಿದೆ.
      ಆ ಉಷ್ಣತೆಯು ಸೂಕ್ಷ್ಮಜೀವಿಗಳ ಕೆಲಸ. ಅಡುಗೆಮನೆಯ ತ್ಯಾಜ್ಯವು ಮಣ್ಣಾಗಿ
      ಪರಿವರ್ತನೆಯಾಗುತ್ತದೆ. ಆ ರೂಪಾಂತರವನ್ನು ಪತ್ತೆಹಚ್ಚಿ.
    follow_ups:
      - ಕಾಂಪೋಸ್ಟ್ ಇಲ್ಲದಿದ್ದರೆ ಉದ್ಯಾನ ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಉಷ್ಣತೆಯು ಪ್ರಕ್ರಿಯೆಯನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ತ್ಯಾಜ್ಯ ಮತ್ತು ಫಲವತ್ತತೆಯ ಸಂಬಂಧವೇನು?
  - id: nmg_seed_dormancy
    name: ಬೀಜದ ಸುಪ್ತತೆ
    prompt: |
      ಮಣ್ಣಿನಲ್ಲಿರುವ ಬೀಜವು ವರ್ಷಗಟ್ಟಲೆ — ದಶಕಗಳವರೆಗೆ ಕಾಯಬಹುದು. ಅದು ಜೀವಂತವಾಗಿದೆ
      ಆದರೆ ನಿಂತಿದೆ. ಯಾವುದೋ ಅದನ್ನು ಎಬ್ಬಿಸುತ್ತದೆ? ಬೆಳಕು, ನೀರು, ಬೆಂಕಿ,
      ಅಡಚಣೆ. ಬೀಜದ ಸಹನೆಯನ್ನು ಪರಿಗಣಿಸಿ.
    follow_ups:
      - ಸುಪ್ತತೆ ಇಲ್ಲದಿದ್ದರೆ ಮೊಳಕೆಯೊಡೆಯುವಿಕೆಯು ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಕಾಯುವಿಕೆಯು ಬದುಕುಳಿಯುವಿಕೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ವಿರಾಮ ಮತ್ತು ಉದಯದ ಸಂಬಂಧವೇನು?
  - id: nmg_bird_bath
    name: ಹಕ್ಕಿ ಸ್ನಾನ
    prompt: |
      ಹಕ್ಕಿ ಸ್ನಾನವು ಒಂದು ಆಹ್ವಾನ. ಯಾರು ಬರುತ್ತಾರೆ ನೋಡಿ — ಗುಬ್ಬಿ, ರಾಬಿನ್,
      ಒಂದು ಜೇ ಇರಬಹುದು. ಆ ಸ್ನಾನವು ಭೇಟಿಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ. ಈ ಸಣ್ಣ ನೀರಿನ
      ಮೂಲವಿಲ್ಲದ ಅಂಗಳ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಸ್ನಾನವು ಯಾರು ಭೇಟಿ ನೀಡುತ್ತಾರೆ ಎಂಬುದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಆಗಮನದ ನೃತ್ಯಕ್ಕೆ ಯಾರು ಕಾರಣ?
      - ನೀರು ಮತ್ತು ಹಕ್ಕಿಯ ಸಂಬಂಧವೇನು?
  - id: nmg_tomato_truss
    name: ಟೊಮೆಟೊ ಗೊಂಚಲು
    prompt: |
      ಒಂದು ಟೊಮೆಟೊ ಗೊಂಚಲು ಹಸಿರು ಹಣ್ಣುಗಳನ್ನು, ನಂತರ ಕೆಂಪು ಹಣ್ಣುಗಳನ್ನು ಹಿಡಿದಿರುತ್ತದೆ.
      ಆ ರಚನೆಯನ್ನು ಅಧ್ಯಯನ ಮಾಡಿ. ಕಾಂಡ, ಶಾಖೆಗಳು, ಭಾರ. ಆ ಸಸ್ಯವು ಎಂಜಿನಿಯರಿಂಗ್
      ಮಾಡಿದೆ. ಯಾವುದೋ ಅದನ್ನು ಬೆಂಬಲಿಸುತ್ತದೆ?
    follow_ups:
      - ಗೊಂಚಲು ಇಲ್ಲದಿದ್ದರೆ ಆ ಸಸ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ರಚನೆಯು ಇಳುವರಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ರೂಪ ಮತ್ತು ಹಣ್ಣಿನ ಸಂಬಂಧವೇನು?
  - id: nmg_aphid_column
    name: ಎಫಿಡ್ ಕಾಲಮ್
    prompt: |
      ಎಫಿಡ್‌ಗಳು ಕಾಂಡದ ಮೇಲೆ ಗುಂಪುಗೂಡುತ್ತವೆ — ಹೀರುತ್ತವೆ, ಗುಣಿಸುತ್ತವೆ. ಅವುಗಳು
      ಹಾನಿಕಾರಕವೂ ಹೌದು, ಬೇಟೆಯೂ ಹೌದು. ಲೇಡಿಬಗ್‌ಗಳು ಬರುತ್ತವೆ. ಪರಿಸರ ವಿಜ್ಞಾನವನ್ನು
      ಗಮನಿಸಿ. ಏಕಾಏಕಿ ಹೆಚ್ಚಾಗುವಿಕೆ ಮತ್ತು ಸಮತೋಲನದ ಸಂಬಂಧವೇನು?
    follow_ups:
      - ಎಫಿಡ್‌ಗಳಿಲ್ಲದ ಸಸ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಗುಂಪು ಬೇಟೆಗಾರರನ್ನು ಹೇಗೆ ಆಕರ್ಷಿಸುತ್ತದೆ?
      - ಹಾನಿಕಾರಕ ಮತ್ತು ಪರಿಸರ ವ್ಯವಸ್ಥೆಯ ಸಂಬಂಧವೇನು?
  - id: nmg_hose_spray
    name: ಹೋಸ್ ಸಿಂಪಡಣೆ
    prompt: |
      ಹೋಸ್‌ನಿಂದ ನೀರು ಮಣ್ಣನ್ನು ಹೊಡೆಯುತ್ತದೆ. ಅದು ಸಂಗ್ರಹವಾಗುವುದನ್ನು, ಒಳನುಗ್ಗುವುದನ್ನು,
      ಹರಿಯುವುದನ್ನು ನೋಡಿ. ಆ ಸಿಂಪಡಣೆಯು ಕೃತಕ ಮಳೆಯಾಗಿದೆ. ನಿಜವಾದದಕ್ಕಿಂತ
      ಇದು ಹೇಗೆ ಭಿನ್ನವಾಗಿದೆ? ಸಸ್ಯವು ಏನನ್ನು ಪಡೆಯುತ್ತದೆ?
    follow_ups:
      - ಹೋಸ್ ಇಲ್ಲದಿದ್ದರೆ ಉದ್ಯಾನ ಹೇಗಿರುತ್ತದೆ?
      - ನೀರಾವರಿ ಬೆಳವಣಿಗೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸಿಂಪಡಣೆ ಮತ್ತು ಮಳೆಯ ಸಂಬಂಧವೇನು?
  - id: nmg_lawn_mow
    name: ಹುಲ್ಲುಗಾವಲು ಕತ್ತರಿಸುವಿಕೆ
    prompt: |
      ಹುಲ್ಲುಗಾವಲು ನಿರ್ವಹಿಸಿದ ಕಾಡಿನ ಭಾಗ — ಎತ್ತರಕ್ಕೆ ಕತ್ತರಿಸಿ, ಹಸಿರಾಗಿಡಲಾಗಿದೆ.
      ಕತ್ತರಿಸುವಿಕೆಯು ಬೆಳವಣಿಗೆಯನ್ನು ಅಡ್ಡಿಪಡಿಸುತ್ತದೆ. ಅದು ಒಂಟಿಯಾಗಿ ಬಿಟ್ಟರೆ
      ಹುಲ್ಲುಗಾವಲು ಏನಾಗುತ್ತದೆ ಎಂದು ಪರಿಗಣಿಸಿ. ಯಾವುದನ್ನು ನಾವು ತಡೆಯುತ್ತಿದ್ದೇವೆ?
    follow_ups:
      - ಕತ್ತರಿಸುವಿಕೆಯಿಲ್ಲದ ಅಂಗಳ ಹೇಗಿರುತ್ತದೆ?
      - ಕತ್ತರಿಸುವಿಕೆಯು ಗುರುತನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಹುಲ್ಲುಗಾವಲು ಮತ್ತು ನಿಯಂತ್ರಣದ ಸಂಬಂಧವೇನು?
  - id: nmg_pot_bound
    name: ಕುಂಡದಲ್ಲಿ ಬಂಧಿತ
    prompt: |
      ಕುಂಡದಲ್ಲಿರುವ ಸಸ್ಯ — ಬೇರುಗಳು ಸುತ್ತುತ್ತವೆ, ಹುಡುಕುತ್ತವೆ. ಆ ಕುಂಡವು ಒಂದು
      ಗಡಿಯಾಗಿದೆ. ಅನಿರ್ಬಂಧಿತ ಮಣ್ಣಿನೊಂದಿಗೆ ಆ ಸಸ್ಯ ಏನನ್ನು ಮಾಡುತ್ತದೆ? ಕುಂಡವು
      ಜೈಲೂ ಹೌದು, ರಕ್ಷಣೆಯೂ ಹೌದು. ಆ ಒಪ್ಪಂದವನ್ನು ಪರಿಗಣಿಸಿ.
    follow_ups:
      - ಕುಂಡವಿಲ್ಲದಿದ್ದರೆ ಸಸ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಬಂಧನವು ಬೆಳವಣಿಗೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಬೇರು ಮತ್ತು ಗೋಡೆಯ ಸಂಬಂಧವೇನು?
  - id: nmg_mulch_layer
    name: ಮಲ್ಚ್ ಪದರ
    prompt: |
      ಮಲ್ಚ್ ಮಣ್ಣನ್ನು ಮುಚ್ಚುತ್ತದೆ — ಮರದ ಚೂರುಗಳು, ಒಣಹುಲ್ಲು, ಎಲೆಗಳು. ಇದು
      ತೇವಾಂಶವನ್ನು ಹಿಡಿದಿಡುತ್ತದೆ, ಕಳೆಗಳನ್ನು ತಡೆಯುತ್ತದೆ, ಅಂತಿಮವಾಗಿ
      ಮಣ್ಣಾಗುತ್ತದೆ. ಆ ಪದರವು ತಾತ್ಕಾಲಿಕ. ಅದು ಇರುವವರೆಗೂ ಏನನ್ನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಮಲ್ಚ್ ಇಲ್ಲದಿದ್ದರೆ ಹಾಸಿಗೆ ಹೇಗಿರುತ್ತದೆ?
      - ಪದರವು ಸೂಕ್ಷ್ಮ ಹವಾಮಾನವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಹೊದಿಕೆ ಮತ್ತು ಮಣ್ಣಿನ ಸಂಬಂಧವೇನು?
  - id: nmg_hummingbird_hover
    name: ಹಮ್ಮಿಂಗ್‌ಬರ್ಡ್ ತೇಲುವಿಕೆ
    prompt: |
      ಒಂದು ಹಮ್ಮಿಂಗ್‌ಬರ್ಡ್ ಹೂವಿನ ಬಳಿ ತೇಲುತ್ತದೆ — ವೇಗದಿಂದ ರೆಕ್ಕೆಗಳು ಅಗೋಚರವಾಗುತ್ತವೆ.
      ಆ ತೇಲುವಿಕೆಯು ದುಬಾರಿಯಾಗಿದೆ. ಮಕರಂದವು ಅದಕ್ಕೆ ಯೋಗ್ಯವಾಗಿರಬೇಕು.
      ಆ ಭೇಟಿಯ ಆರ್ಥಿಕತೆಯನ್ನು ಪರಿಗಣಿಸಿ.
    follow_ups:
      - ಹಮ್ಮಿಂಗ್‌ಬರ್ಡ್ ಇಲ್ಲದಿದ್ದರೆ ಹೂವು ಹೇಗಿರುತ್ತದೆ?
      - ತೇಲುವಿಕೆಯು ಸಂಬಂಧವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
