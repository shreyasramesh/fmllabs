# প্রাকৃতিক ক্ষুদ্র জগৎ — পুকুর ও ডোবা (Bengali)

id: natural_microcosm_pond_puddle
name: প্রাকৃতিক ক্ষুদ্র জগৎ — পুকুর ও ডোবা
description: ছোট স্কেলে জলকে দেখার উপায় পরিবর্তন করার জন্য ৫০টি কার্ড — পৃষ্ঠটান এবং প্রতিফলন থেকে শুরু করে জলজ পোকা, ব্যাঙাচি এবং অস্থায়ী ডোবার জীবন পর্যন্ত।
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: পৃষ্ঠটান
    prompt: |
      একটি জলজ পোকা জলের উপর দিয়ে হাঁটে। পৃষ্ঠ ধরে রাখে—অণু লেগে থাকে। আলতোভাবে
      একটি পিন ফেলুন। এটি ভেসে থাকে। অদৃশ্য ফিল্মটি বিবেচনা করুন। কী এটিকে ভাঙবে?
    follow_ups:
      - পৃষ্ঠটান এখানে কে বাস করতে পারে তা কীভাবে প্রভাবিত করে?
      - এটি ছাড়া পুকুর কেমন হবে?
      - পৃষ্ঠ এবং সীমানার মধ্যে সম্পর্ক কী?
  - id: nmp_skater_ripple
    name: পোকার ঢেউ
    prompt: |
      একটি জলজ পোকার পা পৃষ্ঠকে ডিম্বাকৃতি করে। প্রতিটি পদক্ষেপে একটি ঢেউ তৈরি হয়।
      প্যাটার্নটি দেখুন। পোকাটি পৃষ্ঠটিকে একটি মানচিত্রের মতো পড়ে। এটি কী অনুভব করে?
    follow_ups:
      - ঢেউ কীভাবে তথ্য বহন করে?
      - পৃষ্ঠ ছাড়া পোকাটি কী করত?
      - ঢেউ এবং শিকারের মধ্যে সম্পর্ক কী?
  - id: nmp_reflection_sky
    name: আকাশের প্রতিফলন
    prompt: |
      একটি ডোবা আকাশকে—বা একটি ডাল, বা আপনাকে প্রতিফলিত করে। প্রতিফলনটি উল্টে যায়।
      স্থির জল একটি আয়না। প্রতিফলন কী যোগ করে? এটি কী গোপন করে?
    follow_ups:
      - প্রতিফলন ছাড়া ডোবা কেমন হবে?
      - স্থিরতা আমরা যা দেখি তাকে কীভাবে আকার দেয়?
      - পৃষ্ঠ এবং ছবির মধ্যে সম্পর্ক কী?
  - id: nmp_tadpole_tail
    name: ব্যাঙাচির লেজ
    prompt: |
      একটি ব্যাঙাচি সাঁতার কাটে—লেজ এটিকে চালিত করে। লেজটি পুনরায় শোষিত হবে।
      প্রাণীটি রূপান্তরিত হচ্ছে। এর মধ্যবর্তী অবস্থা বিবেচনা করুন। লেজটি এখন কী সক্ষম করে?
    follow_ups:
      - লেজ ছাড়া ব্যাঙাচি কেমন হবে?
      - রূপান্তর কীভাবে শরীরকে নতুন করে লেখে?
      - রূপ এবং কার্যের মধ্যে সম্পর্ক কী?
  - id: nmp_dragonfly_egg
    name: ফড়িং এর ডিম
    prompt: |
      ফড়িংরা জলে—বা পৃষ্ঠের নিচে কাণ্ডে ডিম পাড়ে। নিম্ফ বের হওয়ার আগে
      বছরের পর বছর জলের নিচে বাস করে। দ্বৈত জীবন বিবেচনা করুন। জল এবং বাতাসের মধ্যে কী
      সংযোগ করে?
    follow_ups:
      - জলজ পর্যায় ছাড়া ফড়িং কেমন হবে?
      - নিম্ফ কীভাবে পুকুরকে আকার দেয়?
      - নিম্ফ এবং প্রাপ্তবয়স্কের মধ্যে সম্পর্ক কী?
  - id: nmp_algae_bloom
    name: শৈবালের প্রস্ফুটন
    prompt: |
      জলের উপর সবুজ স্তর—শৈবাল। এটি একটি প্রস্ফুটন, একটি স্পন্দন। অত্যধিক পুষ্টি,
      অত্যধিক রোদ। পুকুর প্রতিক্রিয়া জানায়। কী এটি শুরু করে? কী অনুসরণ করে?
    follow_ups:
      - শৈবাল ছাড়া পুকুর কেমন হবে?
      - প্রস্ফুটন কীভাবে অক্সিজেনকে প্রভাবিত করে?
      - পুষ্টি এবং বৃদ্ধির মধ্যে সম্পর্ক কী?
  - id: nmp_reed_stem
    name: নলখাগড়ার কাণ্ড
    prompt: |
      নলখাগড়া এবং Rushs ধার থেকে উঠে আসে। তারা ফাঁপা—বায়ু চ্যানেলগুলির মধ্য দিয়ে
      চলে। কাণ্ড জল এবং বাতাসকে সংযোগ করে। কে নলখাগড়াকে মই হিসেবে ব্যবহার করে?
    follow_ups:
      - নলখাগড়া ছাড়া ধার কেমন হবে?
      - ফাঁপা কীভাবে টিকে থাকতে সক্ষম করে?
      - কাণ্ড এবং বাসস্থানের মধ্যে সম্পর্ক কী?
  - id: nmp_pond_skin
    name: পুকুরের ত্বক
    prompt: |
      পুকুরের একটি ত্বক আছে—যেখানে জল বাতাসের সাথে মেশে। ধুলো পড়ে। তেল ছড়িয়ে পড়ে।
      ত্বকটি সূক্ষ্ম। এটি স্পর্শ করুন। ত্বক কী পৃথক করে?
    follow_ups:
      - ত্বক ছাড়া পুকুর কেমন হবে?
      - ত্বক কীভাবে গ্যাস বিনিময়কে প্রভাবিত করে?
      - পৃষ্ঠ এবং গভীরতার মধ্যে সম্পর্ক কী?
  - id: nmp_temporary_pool
    name: অস্থায়ী ডোবা
    prompt: |
      বৃষ্টির পর একটি ডোবা—এটি শুকিয়ে যাবে। তবুও জীবন অভিযোজিত হয়েছে। Fairy shrimp,
      tadpole shrimp, ডিম যা অপেক্ষা করে। জরুরিতা বিবেচনা করুন। জল চলে যাওয়ার আগে কী
      ঘটতে হবে?
    follow_ups:
      - যদি ডোবাটি স্থায়ী হত তবে এটি কেমন হত?
      - অস্থায়ীতা কীভাবে কৌশলকে আকার দেয়?
      - সময় এবং অভিযোজনের মধ্যে সম্পর্ক কী?
  - id: nmp_whirligig_gyre
    name: Whirligig Gyre
    prompt: |
      Whirligig beetles পৃষ্ঠের উপর ঘোরে। তারা উপরে এবং নিচে দেখে—বিভক্ত চোখ।
      তারা শিকারী এবং শিকার। দ্বৈত দৃষ্টি বিবেচনা করুন। এটি কী সক্ষম করে?
    follow_ups:
      - বিভক্ত দৃষ্টি ছাড়া beetle কেমন হবে?
      - Gyre কীভাবে শিকারীদের বিভ্রান্ত করে?
      - স্পিন এবং বেঁচে থাকার মধ্যে সম্পর্ক কী?
  - id: nmp_diving_spider
    name: ডুবন্ত মাকড়সা
    prompt: |
      একটি ডুবন্ত মাকড়সা একটি বায়ু বুদবুদ বহন করে—একটি ডুবন্ত বেল। এটি জলের নিচে
      শ্বাস নেয়। বুদবুদটি একটি ফুসফুস। উদ্ভাবন বিবেচনা করুন। এটি ছাড়া মাকড়সাটি কী করত?
    follow_ups:
      - বুদবুদ কীভাবে শিকারকে সক্ষম করে?
      - বুদবুদ ফেটে গেলে কী হবে?
      - বায়ু এবং জলের মধ্যে সম্পর্ক কী?
  - id: nmp_pond_scum
    name: পুকুরের ময়লা
    prompt: |
      ধারের উপর ময়লা জমে—পরাগ, ধুলো, শৈবাল, পোকামাকড়। এটি একটি সীমানা স্তর।
      কী সেখানে সংগ্রহ হয়? কে এটি খায়? ময়লা একটি ফিল্টার।
    follow_ups:
      - ময়লা ছাড়া পুকুর কেমন হবে?
      - ধার কীভাবে জীবনকে কেন্দ্রীভূত করে?
      - সীমানা এবং সঞ্চয়ের মধ্যে সম্পর্ক কী?
  - id: nmp_ice_surface
    name: বরফের পৃষ্ঠ
    prompt: |
      শীতকালে, পুকুর জমে বরফ হয়। বরফ ধরে রাখে। এর নিচে, জীবন চলতে থাকে—
      ধীর, ঠান্ডা। বাধা বিবেচনা করুন। বরফ কী রক্ষা করে? এটি কী ব্লক করে?
    follow_ups:
      - বরফ ছাড়া পুকুর কেমন হবে?
      - জমে যাওয়া কীভাবে অক্সিজেনকে প্রভাবিত করে?
      - বরফ এবং বেঁচে থাকার মধ্যে সম্পর্ক কী?
  - id: nmp_minnow_school
    name: Minnow School
    prompt: |
      Minnows দলবদ্ধভাবে সাঁতার কাটে—তারা একসাথে চলে। দলবদ্ধতা প্রতিরক্ষা, কার্যকারিতা।
      সিঙ্কটি দেখুন। তাদের কী সমন্বয় করে? একা Minnow কী ঝুঁকি নেবে?
    follow_ups:
      - দলবদ্ধতা ছাড়া পুকুর কেমন হবে?
      - দলবদ্ধতা কীভাবে শিকার থেকে রক্ষা করে?
      - ব্যক্তি এবং গোষ্ঠীর মধ্যে সম্পর্ক কী?
  - id: nmp_lily_pad
    name: পদ্ম পাতা
    prompt: |
      একটি পদ্ম পাতা ভাসে। এর নিচের দিকটি উপরের দিক থেকে আলাদা—চুল, রঙ।
      পাতাটি একটি প্ল্যাটফর্ম। কী এর উপর অবতরণ করে? নিচে কী বাস করে?
    follow_ups:
      - পদ্ম পাতা ছাড়া পুকুর কেমন হবে?
      - পাতাটি নিচের আলোকে কীভাবে আকার দেয়?
      - পাতা এবং ছায়ার মধ্যে সম্পর্ক কী?
  - id: nmp_ripple_spread
    name: ঢেউয়ের বিস্তার
    prompt: |
      একটি পাথর পড়ে। ঢেউ ছড়িয়ে পড়ে। তারা ছেদ করে, হস্তক্ষেপ করে। প্যাটার্ন
      শক্তি বহন করে। ক্ষয় বিবেচনা করুন। ঢেউ কতদূর ভ্রমণ করে?
    follow_ups:
      - ঢেউ ছাড়া পৃষ্ঠ কেমন হবে?
      - ঢেউ কীভাবে প্রভাবকে চিহ্নিত করে?
      - ব্যাঘাত এবং প্রসারের মধ্যে সম্পর্ক কী?
  - id: nmp_mosquito_wiggle
    name: মশার নড়াচড়া
    prompt: |
      মশার লার্ভা পৃষ্ঠ থেকে ঝুলে থাকে—wigglers। তারা একটি সাইফনের মাধ্যমে শ্বাস নেয়।
      নড়াচড়া হল গতি, খাদ্য গ্রহণ। লার্ভার জগৎ বিবেচনা করুন। এটি কী খায়?
    follow_ups:
      - মশা ছাড়া পুকুর কেমন হবে?
      - নড়াচড়া কীভাবে শিকারীদের এড়াতে পারে?
      - লার্ভা এবং প্রাপ্তবয়স্কের মধ্যে সম্পর্ক কী?
  - id: nmp_leaf_boat
    name: পাতার নৌকা
    prompt: |
      একটি পাতা ভাসে—পড়ে থাকা, ভেসে যাওয়া। এটি কিছুর জন্য একটি ভেলা, অন্যদের
      জন্য খাদ্য। পাতাটি ডুবে যাবে, পচে যাবে। এর যাত্রা অনুসরণ করুন। এটি কী হবে?
    follow_ups:
      - ভাসমান ধ্বংসাবশেষ ছাড়া পৃষ্ঠ কেমন হবে?
      - পাতা কীভাবে ক্ষুদ্র বাসস্থান তৈরি করে?
      - ভাসমান এবং ডোবার মধ্যে সম্পর্ক কী?
  - id: nmp_backswimmer_top
    name: Backswimmer Top
    prompt: |
      একটি Backswimmer উল্টো সাঁতার কাটে—পেট আকাশের দিকে। এটি তার পা দিয়ে
      চালায়। এটি পৃষ্ঠে শ্বাস নেয়, তারপর ডুব দেয়। উল্টোটা বিবেচনা করুন। কেন উল্টো?
    follow_ups:
      - সোজা থাকলে Backswimmer কেমন হবে?
      - ভঙ্গি কীভাবে শিকারকে সাহায্য করে?
      - ওরিয়েন্টেশন এবং শিকারের মধ্যে সম্পর্ক কী?
  - id: nmp_snail_trail
    name: শামুকের চিহ্ন
