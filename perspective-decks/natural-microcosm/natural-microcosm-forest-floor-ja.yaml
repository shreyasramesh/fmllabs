# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然の縮図 — 森の地面 (Japanese)

id: natural_microcosm_forest_floor
name: 自然の縮図 — 森の地面
description: 落ち葉の分解や菌糸から、落ち葉の構造、そして林冠下の見えない生命まで、森の地面の見方を変える50枚のカード。
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: 葉脈
    prompt: |
      落ち葉を拾い、葉脈をたどる。そこには水、栄養、糖分が流れていた。葉が生きている間、この葉脈のネットワークは何を支えていたのだろうか？
    follow_ups:
      - 種によって葉脈のパターンはどのように異なるか？
      - 葉脈がなかったら、葉はどうなるだろうか？
      - 葉脈と葉の縁の関係は？
  - id: nmf_leaf_litter_layer
    name: 落ち葉層
    prompt: |
      森の地面は層になっている。一番上は新しい落ち葉、その下は去年のもの、さらに下にはもっと古いものが重なっている。ひざまずいて、一枚剥がしてみよう。そこにはどのような階層があるか？ 時間はどのように積み重なっているか？
    follow_ups:
      - 落ち葉層がなかったら、森はどうなるだろうか？
      - この層はどのように生息地を作り出しているか？
      - 層と腐敗の関係は？
  - id: nmf_mushroom_fruiting
    name: キノコの結実
    prompt: |
      キノコは、地下に広がり、土や木の中を這う菌糸という生物体の「実」にすぎない。今見えているものを「合図」と考えてみよう。残りの物語は何だろうか？
    follow_ups:
      - キノコがなかったら、森はどうなるだろうか？
      - 結実体と菌糸ネットワークの関係は？
      - キノコと腐敗の関係は？
  - id: nmf_log_sponge
    name: 倒木のスポンジ
    prompt: |
      倒木は水を吸い込み、保持する。雨の後、それに手を触れてみよう。その木は貯水池だ。そこから誰が水を飲むのか？ 何がそこに住んでいるのか？
    follow_ups:
      - nurse log (子孫を育む倒木) がなかったら、森はどうなるだろうか？
      - 倒木はどのように微気候を作り出すか？
      - 木材と水の関係は？
  - id: nmf_moss_cushion
    name: コケのクッション
    prompt: |
      コケはスポンジのように水を保持する。触ってみよう。そのクッションは、小さな植物が密集した構造物だ。その隙間には何が住んでいるのだろうか？
    follow_ups:
      - コケがなかったら、森の地面はどうなるだろうか？
      - クッションはどのように湿度を作り出すか？
      - コケと苗の関係は？
  - id: nmf_fern_unfurl
    name: シダの展開
    prompt: |
      シダの葉は、らせん状に開いていく。これは「 fiddleheads 」と呼ばれる。その動きは遅い。可能なら数日間、一つを観察してみよう。展開の仕方が葉の形をどのように形作っているか？
    follow_ups:
      - らせんがなかったら、シダはどうなるだろうか？
      - 展開はどのように葉を保護しているか？
      - 巻きと成長の関係は？
  - id: nmf_root_tangle
    name: 根の絡まり
    prompt: |
      根は地表の下で絡み合っている。木が倒れて、その根鉢が持ち上がった場所を見つけてみよう。その絡まりは「探索」の地図だ。根は何を求めていたのだろうか？
    follow_ups:
      - 根の絡まりがなかったら、木はどうなるだろうか？
      - 地下で根はどのように空間を共有しているか？
      - 根と菌類の関係は？
  - id: nmf_slug_trail
    name: ナメクジの這跡
    prompt: |
      葉の上に、ナメクジの這跡が光っている。粘液、道、痕跡。その這跡はナメクジがどこを通ったかを示している。それは捕食者や獲物に何を伝えているのだろうか？
    follow_ups:
      - 這跡がなかったら、ナメクジは何を失うだろうか？
      - 粘液はどのように移動を可能にしているか？
      - 這跡と縄張りの関係は？
  - id: nmf_lichen_patch
    name: 地衣類のパッチ
    prompt: |
      地衣類は、樹皮、岩、土の上にゆっくりと、複合的に成長する。菌類と藻類が一緒になっている。そのパッチを見つけてみよう。そこにはどれくらいの期間存在しているのか？ その存在は何を示唆しているのか？
    follow_ups:
      - 地衣類がなかったら、樹皮はどうなるだろうか？
      - 地衣類はどのように時間を刻むか？
      - 地衣類と空気の質の関係は？
  - id: nmf_saprophyte
    name: 腐生生物
    prompt: |
      腐生生物は、死んだ物質（菌類、細菌、昆虫）を食べる。彼らはリサイクラーだ。腐敗の証拠を見つけよう。誰が食べているのか？ 何が変換されているのか？
    follow_ups:
      - 分解者がいなかったら、森はどうなるだろうか？
      - 腐敗はどのように新しい成長を育むか？
      - 死と土の関係は？
  - id: nmf_seedling_emergence
    name: 苗の出現
    prompt: |
      苗が落ち葉を突き破って現れる。まず子葉、次に本葉。その力を感じてみよう。それを突き破るために何が必要だったか？ 何がそれを妨げるだろうか？
    follow_ups:
      - 苗がなかったら、森はどうなるだろうか？
      - 出現はどのように落ち葉に依存しているか？
      - 苗と光の関係は？
  - id: nmf_anthill_mound
    name: アリ塚
    prompt: |
      森の地面からアリ塚が隆起している。掘り出された土が整理されている。その交通量を見てみよう。どこへ行くのか？ 何を運んでいるのか？
    follow_ups:
      - アリ塚がなかったら、森の地面はどうなるだろうか？
      - アリ塚はどのように排水を形作っているか？
      - アリ塚とコロニーの関係は？
  - id: nmf_spider_silk
    name: クモの糸
    prompt: |
      クモの糸が、葉と枝の間などの隙間を渡っている。露がそれを捉えている。巣は光が当たるまで見えない。一本の糸をたどってみよう。それは何と何をつないでいるのか？
    follow_ups:
      - 糸がなかったら、隙間はどうなるだろうか？
      - 巣はどのように空間を形作っているか？
      - 糸と獲物の関係は？
  - id: nmf_bark_flake
    name: 樹皮の剥がれ
    prompt: |
      幹から樹皮が剥がれ落ちている。質感、模様、樹齢。剥がれた一片は季節を物語る。その下には誰が住んでいるのか？ その一片は何を明らかにしているのか？
    follow_ups:
      - 樹皮がなかったら、木はどうなるだろうか？
      - 樹皮はどのように保護し、断熱するか？
      - 剥がれと更新の関係は？
  - id: nmf_acorn_fall
    name: ドングリの落下
    prompt: |
      ドングリが落ちる。その大きさの割には重い。それは根付くか、食べられるだろう。その確率を考えてみよう。どちらの道になるかを何が決めるのか？
    follow_ups:
      - ドングリがなかったら、森はどうなるだろうか？
      - 落下はどのように種を分散させるか？
      - ドングリとカシワの関係は？
  - id: nmf_fallen_branch
    name: 倒れた枝
    prompt: |
      地面に枝が横たわっている。風で折れたのだろう。それは今、橋になっている。それを何が渡るのか？ その上に何が育つのか？
    follow_ups:
      - 倒木がなかったら、森の地面はどうなるだろうか？
      - 枝はどのように縁辺の生息地を作り出すか？
      - 枝と栄養の関係は？
  - id: nmf_humus_smell
    name: 腐植の匂い
    prompt: |
      森の地面に顔を近づけてみよう。その匂い――土、腐敗、生命。その匂いは化学だ。何がそれを生み出しているのか？ それがなかったら、森はどうなるだろうか？
    follow_ups:
      - 匂いはどのように健康状態を示すか？
      - 無菌の土はどのような匂いがするか？
      - 匂いと肥沃度の関係は？
  - id: nmf_snail_shell
    name: カタツムリの殻
    prompt: |
      空のカタツムリの殻が落ち葉の上に静かに置かれている。らせん状、カルシウム、置き去りにされた。カタツムリは誰に食べられたのだろうか？ その殻を何が使うだろうか？
    follow_ups:
      - 殻がなかったら、森の地面はどうなるだろうか？
      - 殻はどのように栄養をリサイクルするか？
      - 殻とカルシウムの関係は？
  - id: nmf_fungal_network
    name: 菌糸ネットワーク
    prompt: |
      菌糸が木々をつないでいる――「ウッド・ワイド・ウェブ」。目には見えないが、そこにある。栄養が流れ、情報が流れる。森をネットワークとして考えてみよう。
    follow_ups:
      - ネットワークがなかったら、森はどうなるだろうか？
      - ネットワークはどのように資源を再配分するか？
      - 菌類と木の間の関係は？
  - id: nmf_fern_spore
    name: シダの胞子
    prompt: |
      シダは胞子で繁殖する――小さく、数えきれないほど。葉の裏を見てみよう。胞子嚢（ソーラス）がそれらを抱えている。一つの胞子の旅をたどるには何が必要だろうか？
    follow_ups:
      - 胞子がなかったら、シダはどうなるだろうか？
      - 胞子はどのように分散するか？
      - 胞子と配偶体（gametophyte）の関係は？
  - id: nmf_earthworm_cast
    name: ミミズの糞
    prompt: |
      ミミズの糞がトンネルの入り口に積もっている――加工された土、栄養豊富。ミミズは食べ、排泄した。その糞は地表への贈り物だ。
    follow_ups:
      - ミミズがいなかったら、土はどうなるだろうか？
      - 糞はどのように構造を改善するか？
      - ミミズと通気の関係は？
  - id: nmf_dappled_light
    name: 木漏れ日
    prompt: |
      木漏れ日が林冠を通してまだらに、動くように差し込んでいる。森の地面は開けた場所よりも光が少ない。それは何が育つかをどのように形作っているか？
    follow_ups:
      - 直射日光の下では、森の地面はどうなるだろうか？
      - 木漏れ日はどのように微細な生息地を作り出すか？
      - 光と苗の関係は？
  - id: nmf_bracket_fungus
    name: 蔓延菌 (キノコ)
    prompt: |
      蔓延菌が幹から成長している――棚、多孔菌。それは木を内側から消化している。木はそれが起こっている間、何年も立っているかもしれない。そのゆっくりとした消費を考えてみよう。
    follow_ups:
      - 蔓延菌がなかったら、木はどうなるだろうか？
      - 蔓延菌はどのように胞子を分散させるか？
      - 寄生生物と宿主の関係は？
  - id: nmf_needle_mat
    name: 針葉樹の葉のマット
    prompt: |
      針葉樹の葉が木の下に積み重なっている――酸っぱく、分解が遅い。そのマットは土を変える。そこに何が育つか？ 何がそれを避けるか？
    follow_ups:
      - マットがなかったら、森の地面はどうなるだろうか？
      - 針葉樹の葉のマットはpHにどのように影響するか？
      - マットと火の関係は？
  - id: nmf_salamander_under
    name: サラマンダーの下
    prompt: |
      サラマンダーは、倒木、石、落ち葉の下に住んでいる。何かを慎重に持ち上げ、元に戻す。湿気、暗闇。なぜサラマンダーはそれらを必要とするのか？
    follow_ups:
      - サラマンダーがいなかったら、森はどうなるだろうか？
      - サラマンダーはどのように無脊椎動物のコミュニティを形作っているか？
      - 湿気と両生類の関係は？
  - id: nmf_rot_hole
    name: 腐敗穴
    prompt: |
      倒木に穴が開いている――腐敗か、あるいは動物の仕業かもしれない。その穴は空洞だ。そこに何が巣を作り、何が隠れているのか？
    follow_ups:
      - 穴がなかったら、倒木はどうなるだろうか？
      - 空洞はどのように生息地を作り出すか？
      - 腐敗と隠れ場所の関係は？
  - id: nmf_springtail_jump
    name: トビムシのジャンプ
    prompt: |
      トビムシ――小さく、数が多い――は、邪魔されると跳ねる。それらは落ち葉や土の中にいる。それらは菌類や腐敗物を処理している。見えないものがどれだけいるか気づこう。
    follow_ups:
      - トビムシがいなかったら、森の地面はどうなるだろうか？
      - 跳躍はどのように逃走を可能にするか？
      - トビムシと分解の関係は？
  - id: nmf_bark_beetle_gallery
    name: カミキリムシのギャラリー
    prompt: |
      カミキリムシのギャラリーが樹皮の下の木に刻まれている――通路、模様。カミキリムシがそれを彫った。木は反応した。その物語は何だろう？
    follow_ups:
      - カミキリムシがいなかったら、木はどうなるだろうか？
      - ギャラリーは木の状態をどのように形作っているか？
      - カミキリムシと菌類の関係は？
  - id: nmf_dew_on_litter
    name: 落ち葉についた露
    prompt: |
      朝の露が葉、針葉、小枝に玉になる。落ち葉は水分を保持している。夜明けに誰が飲むのか？ 露はどのように湿った季節を延長するか？
    follow_ups:
      - 露がなかったら、森の地面はどうなるだろうか？
      - 露はどのように水源を作り出すか？
      - 露と蒸発の関係は？
  - id: nmf_windfall_gap
    name: 風倒によるギャップ
    prompt: |
      木が倒れた――風、年齢、病気。そのギャップは光を入れる。地面が変わる。以前は育たなかったものが、そのギャップで何が育つか？
    follow_ups:
      - ギャップがなかったら、森はどうなるだろうか？
      - ギャップはどのように遷移（succession）をリセットするか？
      - ギャップと多様性の関係は？
  - id: nmf_mycorrhizal_tip
    name: 菌根菌の先端
    prompt: |
      木の根が菌糸と出会う――菌根菌（マイコライザ）。菌類は根の範囲を広げる。木は菌類に栄養を与える。根の先端を見つけよう。地下のパートナーシップを想像してみよう。
    follow_ups:
      - 菌根菌がなかったら、木はどうなるだろうか？
      - パートナーシップはどのように根系を拡張するか？
      - 菌類とリンの関係は？
  - id: nmf_squirrel_cache
    name: リスの貯蔵場所
    prompt: |
      リスが木の実を埋めた――忘れてしまったのかもしれない。それは芽を出すかもしれない。その貯蔵は分散だ。いくつもの木が忘れられた種から始まったのだろうか？
    follow_ups:
      - 貯蔵する生き物がなかったら、森はどうなるだろうか？
      - 貯蔵はどのように種を広げるか？
      - 忘却と森の関係は？
  - id: nmf_carpet_moss
    name: カーペット状のコケ
    prompt: |
      コケが地面を覆っている――柔らかく、緑で、水を保持している。その上を歩いてみよう。その柔軟さを感じてみよう。そのカーペットは、何世紀にもわたる成長が層になったものだ。
    follow_ups:
      - カーペットがなかったら、森の地面はどうなるだろうか？
      - カーペットはどのように水分を保持するか？
      - コケと沼地の関係は？
  - id: nmf_burrow_entrance
    name: 巣穴の入り口
    prompt: |
      地面に巣穴が開いている――ネズミ、ハタネズミ、シマリス。その入り口は敷居だ。何が入って、何が出てくるのか？ 巣穴は地下に広がっている。
    follow_ups:
      - 巣穴がなかったら、森の地面はどうなるだろうか？
      - 巣穴はどのように土を耕すか？
      - 巣穴と捕食者の関係は？
  - id: nmf_twig_lattice
    name: 小枝の格子
    prompt: |
      小枝が集まっている――風、動物、重力。それらは落ち葉の上に格子を形成している。その格子は葉を捕らえ、種をキャッチする。それは偶然の建築だ。
    follow_ups:
      - 格子がなかったら、森の地面はどうなるだろうか？
      - 格子はどのように浸食を遅らせるか？
      - 小枝と微細な生息地の関係は？
  - id: nmf_rot_softness
    name: 腐敗の柔らかさ
    prompt: |
      腐った木は指で押すと崩れる――スポンジ状で、粉々になる。構造から土への移行。どれくらいの時間がかかったか？ 何が残ったか？
    follow_ups:
      - 腐敗がなかったら、森はどうなるだろうか？
      - 柔らかさはどのように植民化を可能にするか？
      - 腐敗と腐植の関係は？
  - id: nmf_frost_needle
    name: 霜の針
    prompt: |
      霜の針が土から立ち上がる――氷の結晶、繊細。それらは冷たい静かな夜に形成される。正午には消えている。その儚い構造を考えてみよう。
    follow_ups:
      - 霜がなかったら、土はどのような経験をするだろうか？
      - 霜柱は根にどのように影響するか？
      - 霜と苗の関係は？
  - id: nmf_millipede_curl
    name: ヤスデの丸まり
    prompt: |
      ヤスデは邪魔されると丸まる――防御。それらは腐敗物を食べる。落ち葉の中を移動する様子を見てみよう。その体はどのように絡まりの中をナビゲートするか？
    follow_ups:
      - ヤスデがいなかったら、森の地面はどうなるだろうか？
      - 丸まりはどのように保護するか？
      - ヤスデとカルシウムの関係は？
  - id: nmf_pinecone_open
    name: 松ぼっくりの開放
    prompt: |
      松ぼっくりは乾燥すると開く――鱗が開いて種が放出される。松ぼっくりはメカニズムだ。熱もそれを引き起こすことがある。そのタイミングを考えてみよう。
    follow_ups:
      - 松ぼっくりがなかったら、木はどうなるだろうか？
      - 水分はどのようにメカニズムを制御するか？
      - 火と放出の関係は？
  - id: nmf_hole_in_leaf
    name: 葉の穴
    prompt: |
      葉に穴が開いている――昆虫、ナメクジ、菌類。そのダメージは物語を語る。誰が食べたのか？ いつ？ 残りの葉は光合成を続けている。その閾値は？
    follow_ups:
      - 穴がなかったら、葉はどうなるだろうか？
      - 摂食はどのように植物を形作るか？
      - ダメージと防御の関係は？
  - id: nmf_root_hair
    name: 根毛
    prompt: |
      根毛――顕微鏡サイズ――は、吸収のための表面積を増やす。それらは目には見えないが、そこにある。苗の根は探査している。それらは何を見つけているのだろうか？
    follow_ups:
      - 根毛がなかったら、根はどうなるだろうか？
      - 根毛はどのように水を吸収するか？
      - 根毛と栄養の関係は？
  - id: nmf_forest_silence
    name: 森の静寂
    prompt: |
      森の地面にじっと立ってみよう。その静寂は空虚ではない――それは小さな音で満ちている。ざわめき、滴り、きしみ。立ち止まると何が聞こえるか？
    follow_ups:
      - 小さな音がなかったら、森はどうなるだろうか？
      - 静寂はどのように存在を明らかにするか？
      - 聴くことと気づくことの関係は？
  - id: nmf_shade_adaptation
    name: 日陰への適応
    prompt: |
      森の地面の植物は、日陰に適応している――より大きな葉、異なる葉緑素。太陽の下の葉と日陰の葉を比較してみよう。そのトレードオフは？
    follow_ups:
      - 直射日光の下では、植物はどうなるだろうか？
      - 日陰はどのように葉を形作るか？
      - 光と投資の関係は？
  - id: nmf_nutrient_cycle
    name: 栄養循環
    prompt: |
      森の地面のすべてが循環している――炭素、窒素、リン。葉が落ちる。それは消費される。それは土になる。それは木を養う。一つのループをたどってみよう。
    follow_ups:
      - 循環がなかったら、森はどうなるだろうか？
      - 分解はどのようにループを完了させるか？
      - 死と成長の関係は？
  - id: nmf_footprint_compression
    name: 足跡による圧縮
    prompt: |
      あなたの足跡が落ち葉を圧縮する。下の土はその形を保つ。地面を変えるのにいくつもの足跡が必要だろうか？ ここを他に誰が歩いただろうか？
    follow_ups:
      - 交通がなかったら、森の地面はどうなるだろうか？
      - 圧縮はどのように排水に影響するか？
      - 道と圧縮の関係は？
  - id: nmf_seasonal_signal
    name: 季節の信号
    prompt: |
      森の地面は季節を信号する――春の新芽、秋の衰退。今、地面には何があるか？ それは何を伝えているか？
    follow_ups:
      - 別の季節では、森の地面はどうなるだろうか？
      - 信号はどのように生命を同期させるか？
      - 落ち葉とカレンダーの関係は？
  - id: nmf_stump_succession
    name: 切り株の遷移
    prompt: |
      切り株からは菌類、苗、コケが芽生えている。それは遷移の段階だ。何がそれより前だったのか？ 何がそれに取って代わるのか？ 切り株は終わりでもあり、始まりでもある。
    follow_ups:
      - 切り株がなかったら、空き地はどうなるだろうか？
      - 切り株はどのように機会を作り出すか？
      - 死と新しい成長の関係は？
  - id: nmf_forest_breath
    name: 森の呼吸
    prompt: |
      森の地面は呼吸している――酸素を吸い込み、炭素を吐き出す、あるいは夜は逆だ。土は生きている。じっと立ってみよう。その交換を感じられるか？
    follow_ups:
      - 地面がなかったら、空気はどうなるだろうか？
      - 呼吸はどのように林冠を形作るか？
      - 土と大気の関係は？
  - id: nmf_leaf_miner_trail
    name: 葉食い虫の軌跡
    prompt: |
      葉食い虫――昆虫の幼虫――が葉の層の間を食べる。その軌跡は白い線、曲がりくねった道だ。それをたどってみよう。食い虫は何を求めていたのか？
    follow_ups:
      - 軌跡がなかったら、葉はどうなるだろうか？
      - 食い虫はどのように見えずにナビゲートするか？
      - 内側と外側の関係は？
  - id: nmf_decomposer_shift
    name: 分解者の交代
    prompt: |
      物質が腐敗するにつれて、異なる分解者が引き継ぐ――まず細菌と菌類、次に甲虫とミミズ。異なる段階の物質を見つけよう。今、誰が働いているのか？
    follow_ups:
      - 交代がなかったら、分解はどうなるだろうか？
      - 交代はどのようにペースを形作るか？
      - 段階と消費者の関係は？
