# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Естественный микрокосм — Лесная подстилка (Russian)

id: natural_microcosm_forest_floor
name: Естественный микрокосм — Лесная подстилка
description: |
  50 карточек, чтобы изменить ваше восприятие лесной подстилки — от разложения
  и мицелия до архитектуры листового опада и невидимой жизни под
  пологом леса.
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: Жилка листа
    prompt: |
      Возьмите опавший лист. Проследите жилки. Они несли воду, питательные вещества,
      сахара. Архитектура невидима, пока вы не присмотритесь. Что поддерживала
      сеть жилок, когда лист был жив?
    follow_ups:
      - Чем узор отличается у разных видов?
      - Чем бы был лист без жилок?
      - Какова связь между жилками и краем листа?
  - id: nmf_leaf_litter_layer
    name: Слой листового опада
    prompt: |
      Лесная подстилка состоит из слоев — свежий опад сверху, прошлогодний ниже,
      еще более старый еще ниже. Присядьте на колени. Разгребите один слой.
      Каков градиент? Как время накапливается?
    follow_ups:
      - Чем был бы лес без опавшего листа?
      - Как слой создает среду обитания?
      - Какова связь между слоем и разложением?
  - id: nmf_mushroom_fruiting
    name: Плодовое тело гриба
    prompt: |
      Гриб — это лишь плодовое тело. Организм — мицелий — распространяется
      под землей, сквозь почву, сквозь древесину. Рассматривайте то, что вы видите,
      как сигнал. Какова остальная часть истории?
    follow_ups:
      - Чем был бы лес без грибов?
      - Как плодовое тело связано с сетью?
      - Какова связь между грибом и разложением?
  - id: nmf_log_sponge
    name: Бревно-губка
    prompt: |
      Упавшее бревно впитывает воду, удерживает ее. Прикоснитесь к нему после
      дождя. Бревно — это резервуар. Кто пьет из него? Кто живет внутри?
    follow_ups:
      - Чем был бы лес без бревен-кормилиц?
      - Как бревно создает микроклимат?
      - Какова связь между древесиной и водой?
  - id: nmf_moss_cushion
    name: Подушка мха
    prompt: |
      Мох удерживает воду, как губка. Прикоснитесь к нему. Подушка — это архитектура —
      крошечные растения, плотно упакованные вместе. Кто живет в промежутках?
    follow_ups:
      - Чем была бы подстилка без мха?
      - Как подушка создает влажность?
      - Какова связь между мхом и саженцем?
  - id: nmf_fern_unfurl
    name: Развертывание папоротника
    prompt: |
      Ветви папоротника разворачиваются по спирали — "бараньи рожки". Движение
      медленное. Наблюдайте за одним в течение дней, если можете. Как развертывание
      формирует лист?
    follow_ups:
      - Чем был бы папоротник без спирали?
      - Как развертывание защищает ветвь?
      - Какова связь между изгибом и ростом?
  - id: nmf_root_tangle
    name: Переплетение корней
    prompt: |
      Корни переплетаются под поверхностью. Найдите место, где упало дерево,
      и поднимите его корневой ком. Это переплетение — карта поиска. К чему
      тянулись корни?
    follow_ups:
      - Чем было бы дерево без переплетения корней?
      - Как корни делят пространство под землей?
      - Какова связь между корнем и грибом?
  - id: nmf_slug_trail
    name: След слизня
    prompt: |
      След слизня блестит на листе — слизь, путь, подпись. След отмечает,
      где прошел слизень. Что след говорит хищникам? Добыче?
    follow_ups:
      - Что потерял бы слизень без следа?
      - Как слизь обеспечивает движение?
      - Какова связь между следом и территорией?
  - id: nmf_lichen_patch
    name: Участок лишайника
    prompt: |
      Лишайник растет на коре, камне, почве — медленно, составной. Гриб и водоросль
      вместе. Найдите участок. Как давно он там? Что указывает его присутствие?
    follow_ups:
      - Чем была бы кора без лишайника?
      - Как лишайник отмечает время?
      - Какова связь между лишайником и качеством воздуха?
  - id: nmf_saprophyte
    name: Сапрофит
    prompt: |
      Сапрофиты питаются мертвой материей — грибы, бактерии, насекомые. Они —
      переработчики. Найдите признаки разложения. Кто ест? Что трансформируется?
    follow_ups:
      - Чем был бы лес без редуцентов?
      - Как разложение питает новый рост?
      - Какова связь между смертью и почвой?
  - id: nmf_seedling_emergence
    name: Появление саженца
    prompt: |
      Саженец пробивается сквозь опавшую листву. Сначала семядоли, затем настоящие
      листья. Заметьте силу. Что потребовалось, чтобы пробиться? Что ему помешает?
    follow_ups:
      - Чем был бы лес без саженцев?
      - Как появление зависит от опада?
      - Какова связь между саженцем и светом?
  - id: nmf_anthill_mound
    name: Муравейник
    prompt: |
      Муравейник возвышается над лесной подстилкой — вырытая почва, организованная.
      Наблюдайте за движением. Куда они идут? Что несут?
    follow_ups:
      - Чем была бы подстилка без муравейника?
      - Как муравейник влияет на дренаж?
      - Какова связь между муравейником и колонией?
  - id: nmf_spider_silk
    name: Паутина
    prompt: |
      Паутина заполняет промежутки — между листьями, веточками. На ней оседает
      роса. Паутина невидима, пока свет не упадет на нее. Проследите одну нить.
      Что она соединяет?
    follow_ups:
      - Чем был бы промежуток без паутины?
      - Как паутина структурирует пространство?
      - Какова связь между паутиной и добычей?
  - id: nmf_bark_flake
    name: Чешуйка коры
    prompt: |
      Кора отслаивается от ствола — текстура, узор, возраст. Каждая чешуйка рассказывает
      о сезоне. Кто живет под корой? Что раскрывает чешуйка?
    follow_ups:
      - Чем было бы дерево без коры?
      - Как кора защищает и изолирует?
      - Какова связь между чешуйкой и обновлением?
  - id: nmf_acorn_fall
    name: Падение желудя
    prompt: |
      Желудь падает. Он тяжел для своего размера. Он прорастет или будет съеден.
      Рассмотрите шансы. Что определяет путь?
    follow_ups:
      - Чем был бы лес без желудей?
      - Как падение распределяет семена?
      - Какова связь между желудем и дубом?
  - id: nmf_fallen_branch
    name: Упавшая ветка
    prompt: |
      Ветка лежит на земле — сломанная, возможно, ветром. Теперь это мост.
      Что пересекает его? Что растет на нем?
    follow_ups:
      - Чем была бы подстилка без упавшей древесины?
      - Как ветка создает краевой ареал обитания?
      - Какова связь между веткой и питательными веществами?
  - id: nmf_humus_smell
    name: Запах перегноя
    prompt: |
      Наклонитесь к лесной подстилке. Запах — земли, разложения, жизни. Этот
      запах — химия. Что его создает? Чем был бы лес без него?
    follow_ups:
      - Как запах отмечает здоровье?
      - Как пахла бы стерильная почва?
      - Какова связь между запахом и плодородием?
  - id: nmf_snail_shell
    name: Раковина улитки
    prompt: |
      Пустая раковина улитки лежит в опавшей листве. Спираль, кальций, оставлено
      позади. Кто мог съесть улитку? Что воспользуется раковиной?
    follow_ups:
      - Чем была бы подстилка без раковин?
      - Как раковина перерабатывает питательные вещества?
      - Какова связь между раковиной и кальцием?
  - id: nmf_fungal_network
    name: Грибная сеть
    prompt: |
      Мицелий соединяет деревья — "грибная паутина". Вы ее не видите, но она
      существует. Поток питательных веществ. Поток информации. Рассматривайте
      лес как сеть.
    follow_ups:
      - Чем был бы лес без этой сети?
      - Как сеть перераспределяет ресурсы?
      - Какова связь между грибом и деревом?
  - id: nmf_fern_spore
    name: Споры папоротника
    prompt: |
      Папоротники размножаются спорами — крошечными, бесчисленными. Посмотрите
      на нижнюю сторону листа. Сор сор. Что потребуется, чтобы проследить
      путь одной споры?
    follow_ups:
      - Чем был бы папоротник без спор?
      - Как споры рассеиваются?
      - Какова связь между спорой и гаметофитом?
  - id: nmf_earthworm_cast
    name: Экскременты дождевого червя
    prompt: |
      Экскременты дождевых червей кучками у входов в норы — переработанная почва,
      богатая. Червь ел и выделял. Экскременты — дар поверхности.
    follow_ups:
      - Чем была бы почва без червей?
      - Как экскременты улучшают структуру?
      - Какова связь между червем и аэрацией?
  - id: nmf_dappled_light
    name: Пятнистый свет
    prompt: |
      Свет падает сквозь полог пятнами — пятнистый, движущийся. Лесная подстилка
      получает меньше света, чем открытое пространство. Как это формирует то,
      что растет?
    follow_ups:
      - Чем была бы подстилка при полном солнце?
      - Как пятнистый свет создает микросреду обитания?
      - Какова связь между светом и саженцем?
  - id: nmf_bracket_fungus
    name: Трутовик
    prompt: |
      Трутовик растет на стволе — полка, полипор. Он переваривает дерево изнутри.
      Дерево может стоять годами, пока это происходит. Рассмотрите медленное
      потребление.
    follow_ups:
      - Чем было бы дерево без гриба?
      - Как трутовик распространяет споры?
      - Какова связь между паразитом и хозяином?
  - id: nmf_needle_mat
    name: Ковер из хвои
    prompt: |
      Хвоя хвойных деревьев лежит под деревом — кислая, медленно разлагается.
      Ковер меняет почву. Что растет в нем? Что его избегает?
    follow_ups:
      - Чем была бы подстилка без ковра из хвои?
      - Как ковер из хвои влияет на pH?
      - Какова связь между ковром и огнем?
  - id: nmf_salamander_under
    name: Саламандра под...
    prompt: |
      Саламандры живут под бревнами, камнями, опавшей листвой. Осторожно поднимите
      что-нибудь — и положите обратно. Влажность, темнота. Почему саламандре
      это нужно?
    follow_ups:
      - Чем был бы лес без саламандр?
      - Как саламандра формирует сообщество беспозвоночных?
      - Какова связь между влажностью и амфибией?
  - id: nmf_rot_hole
    name: Дупло в гнили
    prompt: |
      Дыра в бревне — гниль, возможно, или животное. Дыра — это полость. Кто
      гнездится там? Кто прячется там?
    follow_ups:
      - Чем было бы бревно без дупла?
      - Как полость создает среду обитания?
      - Какова связь между гнилью и убежищем?
  - id: nmf_springtail_jump
    name: Прыжок ногохвостки
    prompt: |
      Новохвостки — крошечные, многочисленные — прыгают при беспокойстве. Они
      находятся в опавшей листве, почве. Они перерабатывают грибы, гниль.
      Заметьте, как много вы не видите.
    follow_ups:
      - Чем была бы подстилка без ногохвосток?
      - Как прыжок обеспечивает спасение?
      - Какова связь между ногохвосткой и разложением?
  - id: nmf_bark_beetle_gallery
    name: Ходы короеда
    prompt: |
      Ходы короеда вырезаны под корой — каналы, узоры. Жук их вырезал. Дерево
      отреагировало. Какова история?
    follow_ups:
      - Чем было бы дерево без жука?
      - Как ходы влияют на судьбу дерева?
      - Какова связь между жуком и грибом?
  - id: nmf_dew_on_litter
    name: Роса на подстилке
    prompt: |
      Утренняя роса скапливается на листьях, хвое, веточках. Подстилка удерживает
      влагу. Кто пьет на рассвете? Как роса продлевает влажный сезон?
    follow_ups:
      - Чем была бы подстилка без росы?
      - Как роса создает источник воды?
      - Какова связь между росой и испарением?
  - id: nmf_windfall_gap
    name: Прогалина от бурелома
    prompt: |
      Упало дерево — ветер, старость, болезнь. Прогалина пропускает свет. Подстилка
      меняется. Что растет в прогалине, что не могло раньше?
    follow_ups:
      - Чем был бы лес без прогалин?
      - Как прогалина сбрасывает сукцессию?
      - Какова связь между прогалиной и разнообразием?
  - id: nmf_mycorrhizal_tip
    name: Микоризный кончик
    prompt: |
      Корни деревьев встречаются с гифами грибов — микориза. Гриб расширяет
      досягаемость корня. Дерево питает гриб. Найдите кончик корня. Вообразите
      партнерство под землей.
    follow_ups:
      - Чем было бы дерево без микоризы?
      - Как партнерство расширяет корневую систему?
      - Какова связь между грибом и фосфором?
  - id: nmf_squirrel_cache
    name: Запасы белки
    prompt: |
      Белка спрятала орех — забыла, возможно. Он может прорасти. Тайник — это
      расселение. Сколько деревьев началось с забытого семени?
    follow_ups:
      - Чем был бы лес без запасливых животных?
      - Как запасы расширяют ареал семян?
      - Какова связь между забывчивостью и лесом?
  - id: nmf_carpet_moss
    name: Моховой ковер
    prompt: |
      Мох ковром покрывает землю в некоторых местах — мягкий, зеленый, удерживающий
      воду. Походите по нему. Почувствуйте податливость. Ковер — это века роста,
      слой за слоем.
    follow_ups:
      - Чем была бы подстилка без ковра?
      - Как ковер удерживает влагу?
      - Какова связь между мхом и болотом?
  - id: nmf_burrow_entrance
    name: Вход в нору
    prompt: |
      В земле открывается нора — мышь, полевка, бурундук. Вход — это порог.
      Что входит? Что выходит? Нора простирается под землей.
    follow_ups:
      - Чем была бы подстилка без нор?
      - Как нора аэрирует почву?
      - Какова связь между норой и хищником?
  - id: nmf_twig_lattice
    name: Решетка из веточек
    prompt: |
      Веточки собираются — ветер, животные, гравитация. Они образуют решетку
      над опавшей листвой. Решетка удерживает листья, ловит семена. Это случайная
      архитектура.
    follow_ups:
      - Чем была бы подстилка без решетки?
      - Как решетка замедляет эрозию?
      - Какова связь между веточкой и микросредой обитания?
  - id: nmf_rot_softness
    name: Мягкость гнили
    prompt: |
      Гниющая древесина подается под пальцами — губчатая, рассыпающаяся. Переход
      от структуры к почве. Сколько времени это заняло? Что осталось?
    follow_ups:
      - Чем был бы лес без гнили?
      - Как мягкость способствует колонизации?
      - Какова связь между гнилью и перегноем?
  - id: nmf_frost_needle
    name: Иглы мороза
    prompt: |
      Иглы мороза поднимаются из почвы — кристаллы льда, хрупкие. Они образуются
      в холодные, безветренные ночи. К полудню они исчезают. Рассмотрите эфемерную
      структуру.
    follow_ups:
      - Что переживает почва без мороза?
      - Как морозное пучение влияет на корни?
      - Какова связь между морозом и саженцем?
  - id: nmf_millipede_curl
    name: Свертывание многоножки
    prompt: |
      Многоножка сворачивается при беспокойстве — защита. Она питается гнилью.
      Наблюдайте, как она движется сквозь подстилку. Как тело преодолевает
      переплетение?
    follow_ups:
      - Чем была бы подстилка без многоножек?
      - Как свертывание защищает?
      - Какова связь между многоножкой и кальцием?
  - id: nmf_pinecone_open
    name: Раскрытая сосновая шишка
    prompt: |
      Сосновая шишка раскрывается, когда высохнет — чешуйки расходятся, семена
      высвобождаются. Шишка — это механизм. Тепло тоже может его активировать.
      Рассмотрите время.
    follow_ups:
      - Чем было бы дерево без шишки?
      - Как влажность управляет механизмом?
      - Какова связь между огнем и высвобождением?
  - id: nmf_hole_in_leaf
    name: Дыра в листе
    prompt: |
      В листе есть дыры — насекомое, слизень, грибок. Повреждение рассказывает
      историю. Кто ел? Когда? Оставшийся лист все еще фотосинтезирует. Каков
      порог?
    follow_ups:
      - Чем был бы лист без дыр?
      - Как травоядность формирует растение?
      - Какова связь между повреждением и защитой?
  - id: nmf_root_hair
    name: Корневой волосок
    prompt: |
      Корневые волоски — микроскопические — увеличивают площадь поверхности
      для поглощения. Вы их не видите, но они есть. Корни саженца исследуют.
      Что они находят?
    follow_ups:
      - Чем был бы корень без волосков?
      - Как корневые волоски поглощают воду?
      - Какова связь между волоском и питательным веществом?
  - id: nmf_forest_silence
    name: Лесная тишина
    prompt: |
      Стой на лесной подстилке неподвижно. Тишина не пуста — она полна
      маленьких звуков. Шорох, капля, скрип. Что вы слышите, когда останавливаетесь?
    follow_ups:
      - Чем был бы лес без маленьких звуков?
      - Как тишина выявляет присутствие?
      - Какова связь между слушанием и замечанием?
  - id: nmf_shade_adaptation
    name: Адаптация к тени
    prompt: |
      Растения на лесной подстилке приспособлены к тени — более крупные листья,
      другой хлорофилл. Сравните лист, растущий на солнце, с теневым. Каков
      компромисс?
    follow_ups:
      - Чем было бы растение при полном солнце?
      - Как тень формирует лист?
      - Какова связь между светом и инвестициями?
  - id: nmf_nutrient_cycle
    name: Цикл питательных веществ
    prompt: |
      Все на лесной подстилке циклирует — углерод, азот, фосфор. Падает лист.
      Он потребляется. Он становится почвой. Он питает дерево. Проследите один
      цикл.
    follow_ups:
      - Чем был бы лес без этого цикла?
      - Как разложение завершает цикл?
      - Какова связь между смертью и ростом?
  - id: nmf_footprint_compression
    name: Сжатие от следа
    prompt: |
      Ваш след сжимает подстилку. Почва под ним сохраняет форму. Сколько шагов
      требуется, чтобы изменить подстилку? Кто еще здесь ходил?
    follow_ups:
      - Чем была бы подстилка без движения?
      - Как сжатие влияет на дренаж?
      - Какова связь между тропой и уплотнением?
  - id: nmf_seasonal_signal
    name: Сезонный сигнал
    prompt: |
      Лесная подстилка сигнализирует о сезоне — новый рост весной, увядание
      осенью. Что сейчас на земле? Что это вам говорит?
    follow_ups:
      - Чем была бы подстилка в другой сезон?
      - Как сигнал синхронизирует жизнь?
      - Какова связь между опавшей листвой и календарем?
  - id: nmf_stump_succession
    name: Сукцессия на пне
    prompt: |
      Срубленный пень порождает грибы, саженцы, мох. Это стадия сукцессии.
      Что было до этого? Что придет ему на смену? Пень — это и конец, и начало.
    follow_ups:
      - Чем была бы поляна без пня?
      - Как пень создает возможности?
      - Какова связь между смертью и новым ростом?
  - id: nmf_forest_breath
    name: Легочное дыхание леса
    prompt: |
      Лесная подстилка дышит — кислород внутрь, углерод наружу, или наоборот
      ночью. Почва жива. Стой неподвижно. Чувствуешь ли ты обмен?
    follow_ups:
      - Чем был бы воздух без подстилки?
      - Как дыхание формирует полог?
      - Какова связь между почвой и атмосферой?
  - id: nmf_leaf_miner_trail
    name: Ход минирующего насекомого
    prompt: |
      Минирующее насекомое — личинка — ест между слоями. След — белая линия,
      извилистый путь. Проследите его. Что искал личинка?
    follow_ups:
      - Чем был бы лист без следа?
      - Как личинка ориентируется, не видя?
      - Какова связь между внутренним и внешним?
  - id: nmf_decomposer_shift
    name: Смена редуцентов
    prompt: |
      По мере разложения материала меняются и редуценты — сначала бактерии
      и грибы, затем жуки и дождевые черви. Найдите материал на разных стадиях.
      Кто работает сейчас?
    follow_ups:
      - Чем было бы разложение без сукцессии?
      - Как смена влияет на темп?
      - Какова связь между стадией и потребителем?
