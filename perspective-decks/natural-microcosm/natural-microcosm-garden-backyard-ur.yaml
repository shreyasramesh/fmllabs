# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# قدرتی خوردنما — باغ اور پچھواڑا (Urdu)

id: natural_microcosm_garden_backyard
name: قدرتی خوردنما — باغ اور پچھواڑا
description: 50 کارڈ جو آپ کے گھریلو جنگلی حیات کو دیکھنے کا انداز بدل دیں گے — پولینیٹرز اور مٹی سے لے کر، جڑی بوٹیوں بمقابلہ فصلوں اور کاشت شدہ فطرت کی کوریوگرافی تک۔
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: شہد کی مکھی کا اترنا
    prompt: |
      ایک شہد کی مکھی کو پھول پر اترتے ہوئے دیکھیں۔ انداز، لمس، اور منڈلانا۔
      شہد کی مکھی شکاری اور پولینیٹر دونوں ہے۔ پھول کو کیا فائدہ ہوتا ہے؟
      اسے کیا خطرہ ہے۔
    follow_ups:
      - یہ لینڈنگ اگلی وزٹ کو کیسے شکل دیتی ہے؟
      - شہد کی مکھیوں کے بغیر باغ کیسا ہوگا؟
      - پھول اور شہد کی مکھی کے درمیان کیا تعلق ہے؟
  - id: nmg_soil_crumble
    name: مٹی کا گُچّہ
    prompt: |
      ایک مٹھی بھر مٹی اٹھائیں۔ بناوٹ محسوس کریں — وہ گُچّہ، وہ دانے۔
      اس مٹی میں تاریخ، موت، اور دوبارہ جنم ہے۔ یہاں پہلے کیا رہتا تھا؟
      اس سے کیا اگے گا؟
    follow_ups:
      - مٹی اس چیز کو کیسے شکل دیتی ہے جو اگتی ہے؟
      - بانجھ مٹی کا کیا مطلب ہوگا؟
      - گُچّہ اور زندگی کے درمیان کیا تعلق ہے؟
  - id: nmg_weed_edge
    name: کنارے پر جڑی بوٹی
    prompt: |
      جہاں لان اور پھولوں کی کیاری ملتی ہے وہاں ایک جڑی بوٹی اگتی ہے۔
      یہ لگائی نہیں گئی تھی۔ اسے بلایا گیا تھا — یا اس نے خود کو بلایا تھا۔
      حدود پر غور کریں۔ جڑی بوٹی اور پھول کے درمیان لکیر کون کھینچتا ہے؟
    follow_ups:
      - جڑی بوٹیوں کے بغیر باغ کیسا ہوگا؟
      - کنارہ تناؤ کیسے پیدا کرتا ہے؟
      - جڑی بوٹی اور ارادے کے درمیان کیا تعلق ہے؟
  - id: nmg_compost_steam
    name: کمپوسٹ کا بھاپ
    prompt: |
      کھاد کے ڈھیر کو الٹیں۔ بھاپ اٹھتی ہے — گَلنے کا عمل جاری ہے۔
      حرارت خوردبینی کام ہے۔ جو کچن کا سکریپ تھا وہ مٹی بن جاتا ہے۔
      تبدیلی کو ٹریس کریں۔
    follow_ups:
      - کمپوسٹ کے بغیر باغ کیا کھو دے گا؟
      - عمل کو حرارت کیسے نشان زد کرتی ہے؟
      - فضلہ اور زرخیزی کے درمیان کیا تعلق ہے؟
  - id: nmg_seed_dormancy
    name: بیج کا جمود
    prompt: |
      مٹی میں ایک بیج سالوں — دہائیوں تک انتظار کر سکتا ہے۔
      یہ زندہ ہے لیکن رکا ہوا ہے۔ اسے کیا بیدار کرتا ہے؟ روشنی، پانی، آگ، خلل۔
      بیج کے صبر پر غور کریں۔
    follow_ups:
      - جمود کے بغیر انکرن کیا کھو دے گا؟
      - انتظار بقا کو کیسے شکل دیتا ہے؟
      - رُکاوٹ اور ابھرنے کے درمیان کیا تعلق ہے؟
  - id: nmg_bird_bath
    name: پرندوں کا غسل
    prompt: |
      پرندوں کا غسل ایک دعوت ہے۔ دیکھیں کون آتا ہے — چڑیاں، رابن، شاید ایک جے (jay)۔
      غسل ملاقات کا باعث بنتا ہے۔ اس چھوٹے سے پانی کے جسم کے بغیر
      صحن کیسا ہوگا؟
    follow_ups:
      - غسل وزٹ کرنے والوں کو کیسے شکل دیتا ہے؟
      - آمد کا کوریوگرافی کیا ہے؟
      - پانی اور پرندے کے درمیان کیا تعلق ہے؟
  - id: nmg_tomato_truss
    name: ٹماٹر کی گُچھّی
    prompt: |
      ٹماٹر کی گُچھّی سبز پھل رکھتی ہے، پھر سرخ۔ ڈھانچے کا مطالعہ کریں۔
      تنہ، شاخیں، وزن۔ پودا انجینئرنگ ہے۔ اسے کیا سہارا دیتا ہے؟
    follow_ups:
      - گُچھّی کے بغیر پودا کیسا ہوگا؟
      - ڈھانچہ فصل کو کیسے شکل دیتا ہے؟
      - شکل اور پھل کے درمیان کیا تعلق ہے؟
  - id: nmg_aphid_column
    name: افاد (Aphid) کی قطار
    prompt: |
      افاد (Aphids) ایک تنے پر جمع ہوتے ہیں — چوس رہے ہیں، بڑھ رہے ہیں۔
      وہ کیڑے اور شکار دونوں ہیں۔ لیڈی برڈز آئیں گی۔ ماحولیات پر توجہ دیں۔
      بڑھتی ہوئی تعداد اور توازن کے درمیان کیا تعلق ہے؟
    follow_ups:
      - افاد (aphids) کے بغیر پودا کیسا ہوگا؟
      - قطار شکاریوں کو کیسے متوجہ کرتی ہے؟
      - کیڑے اور ماحولیاتی نظام کے درمیان کیا تعلق ہے؟
  - id: nmg_hose_spray
    name: ہوز کی چھڑکاؤ
    prompt: |
      ہوز سے پانی مٹی پر گرتا ہے۔ اسے جمع ہوتے، جذب ہوتے، بہتے ہوئے دیکھیں۔
      چھڑکاؤ مصنوعی بارش ہے۔ یہ اصل چیز سے کیسے مختلف ہے؟
      پودے کو کیا ملتا ہے؟
    follow_ups:
      - ہوز کے بغیر باغ کیسا ہوگا؟
      - آبپاشی نشوونما کو کیسے شکل دیتی ہے؟
      - چھڑکاؤ اور بارش کے درمیان کیا تعلق ہے؟
  - id: nmg_lawn_mow
    name: لان کی کٹائی
    prompt: |
      لان ایک منظم جنگلی پن ہے — اونچائی تک کاٹا ہوا، سبز رکھا ہوا۔
      کٹائی نشوونما میں رکاوٹ ڈالتی ہے۔ غور کریں کہ اگر اسے اکیلا چھوڑ دیا جائے تو لان کیا بن جائے گا۔
      ہم کس چیز کو روک رہے ہیں؟
    follow_ups:
      - کٹائی کے بغیر صحن کیسا ہوگا؟
      - کٹائی شناخت کو کیسے شکل دیتی ہے؟
      - لان اور کنٹرول کے درمیان کیا تعلق ہے؟
  - id: nmg_pot_bound
    name: گملے میں بند
    prompt: |
      ایک گملے میں پودا — جڑیں گول گول گھوم رہی ہیں، تلاش کر رہی ہیں۔
      گملہ ایک حد ہے۔ اگر مٹی لامحدود ہو تو پودا کیا کرے گا؟
      گملہ قید اور تحفظ دونوں ہے۔ سمجھوتہ پر غور کریں۔
    follow_ups:
      - گملے کے بغیر پودا کیسا ہوگا؟
      - قید نشوونما کو کیسے شکل دیتی ہے؟
      - جڑ اور دیوار کے درمیان کیا تعلق ہے؟
  - id: nmg_mulch_layer
    name: ملچ کی تہہ
    prompt: |
      ملچ مٹی کو ڈھانپتا ہے — لکڑی کے چپس، بھوسہ، پتے۔
      یہ نمی کو روکتا ہے، جڑی بوٹیوں کو دباتا ہے، آخر کار مٹی بن جاتا ہے۔
      تہہ عارضی ہے۔ جب تک یہ قائم ہے، یہ کیا کرتا ہے؟
    follow_ups:
      - ملچ کے بغیر کیاری کیسی ہوگی؟
      - تہہ مائیکرو کلائمیٹ کیسے بناتی ہے؟
      - کور اور مٹی کے درمیان کیا تعلق ہے؟
  - id: nmg_hummingbird_hover
    name: ہمنگ برڈ کا منڈلانا
    prompt: |
      ایک ہمنگ برڈ پھول پر منڈلاتا ہے — پنکھ اتنی تیزی سے چلتے ہیں کہ نظر نہیں آتے۔
      منڈلانا مہنگا ہے۔ شہد کی افادیت اس کے قابل ہونی چاہیے۔
      وزٹ کی معیشت پر غور کریں۔
    follow_ups:
      - ہمنگ برڈ کے بغیر پھول کیسا ہوگا؟
      - منڈلانا تعلق کو کیسے شکل دیتا ہے؟
      - قیمت اور انعام کے درمیان کیا تعلق ہے؟
  - id: nmg_fence_creep
    name: باڑ پر چڑھنا
    prompt: |
      آئوی (Ivy) یا مارننگ گلوری (morning glory) باڑ کے ساتھ ساتھ رینگتی ہے۔
      پودا نہیں جانتا کہ باڑ انسان کی بنائی ہوئی ہے۔ وہ پھر بھی چڑھتا ہے۔
      نشوونما اور ڈھانچے کے درمیان تصادم پر غور کریں۔
    follow_ups:
      - باڑ کے بغیر پودا کس پر چڑھے گا؟
      - باڑ بیل کو کیسے شکل دیتی ہے؟
      - چڑھنا اور سہارا کے درمیان کیا تعلق ہے؟
  - id: nmg_worm_cast
    name: کیچوے کی گُلی
    prompt: |
      کیچوے کی گُلی — مٹی کے چھوٹے ڈھیر — لان میں نظر آتے ہیں۔
      کیچوا گزر گیا، زرخیزی چھوڑ گیا۔ گُلی آثار قدیمہ ہے۔
      کیچوے نے کیا پراسیس کیا؟ اس نے کیا چھوڑا؟
    follow_ups:
      - کیچووں کے بغیر مٹی کیسی ہوگی؟
      - گُلی کیچوے کے کام کو کیسے نشان زد کرتی ہے؟
      - گُلی اور ہوا بازی کے درمیان کیا تعلق ہے؟
  - id: nmg_squirrel_cache
    name: گلہری کا ذخیرہ
    prompt: |
      ایک گلہری ایک گری کو دفن کرتی ہے — پھر بھول جاتی ہے۔
      گری میں انکرن ہو سکتا ہے۔ گلہری حادثاتی باغبان ہے۔
      یادداشت اور پھیلاؤ کے درمیان تعلق پر غور کریں۔ بھولنے سے کیا اگتا ہے؟
    follow_ups:
      - گلہری کے بغیر بلوط (oak) کیسا ہوگا؟
      - ذخیرہ اندوزی جنگل کے پھیلاؤ کو کیسے شکل دیتی ہے؟
      - دفن اور انکرن کے درمیان کیا تعلق ہے؟
  - id: nmg_dew_morning
    name: شبنم والی صبح
    prompt: |
      صبح کی شبنم پتوں پر موتیوں کی طرح لٹکتی ہے۔ ہر قطرہ روشنی رکھتا ہے۔
      شبنم ہوا سے پانی کا جمع ہونا ہے۔ یہ دوپہر تک بخارات بن جائے گا۔
      عارضی تحفے پر غور کریں۔ پودے کو کیا ملتا ہے؟
    follow_ups:
      - شبنم کے بغیر پتا کیسا ہوگا؟
      - شبنم صبح کو کیسے شکل دیتی ہے؟
      - جمع ہونے والے پانی اور پتے کے درمیان کیا تعلق ہے؟
  - id: nmg_prune_scar
    name: تراشیدہ نشان
    prompt: |
      تراشیدہ نشان اس جگہ کو نشان زد کرتا ہے جہاں سے ایک شاخ کاٹی گئی تھی۔
      درخت ٹھیک ہو گیا ہے — یا کوشش کی ہے۔ نشان تاریخ ہے۔
      کیا ہٹایا گیا؟ کیوں؟ درخت کو کیا یاد ہے؟
    follow_ups:
      - تراشیدہ کے بغیر درخت کیسا ہوگا؟
      - کٹائی نشوونما کو کیسے شکل دیتی ہے؟
      - زخم اور شکل کے درمیان کیا تعلق ہے؟
  - id: nmg_sunflower_turn
    name: سورج مکھی کا رخ
    prompt: |
      ایک جوان سورج مکھی سورج کے ساتھ رخ بدلتی ہے — صبح مشرق میں، شام مغرب میں۔
      یہ حرکت ہیلیوٹرپزم (heliotropism) ہے۔ پودا روشنی کا تعاقب کرتا ہے۔
      کوریوگرافی پر غور کریں۔ مستقل رخ کا کیا مطلب ہوگا؟
    follow_ups:
      - رخ کے بغیر سورج مکھی کیسی ہوگی؟
      - تعاقب نشوونما کو کیسے شکل دیتا ہے؟
      - حرکت اور روشنی کے درمیان کیا تعلق ہے؟
  - id: nmg_slug_trail
    name: سلائم کا نشان
    prompt: |
      ایک سِلوگ (slug) ایک نشان چھوڑتا ہے — چاندی جیسا، چپکنے والا۔
      نشان گزرنے کو ظاہر کرتا ہے۔ یہ سِلوگ (slug) کے پاؤں کی حفاظت بھی کرتا ہے۔
      نشان کو ریکارڈ اور موافقت دونوں کے طور پر غور کریں۔ یہ کیا ممکن بناتا ہے؟
    follow_ups:
      - نشان کے بغیر سِلوگ (slug) کیسا ہوگا؟
      - سلائم حرکت کو کیسے شکل دیتا ہے؟
      - نشان اور شکاری کے درمیان کیا تعلق ہے؟
  - id: nmg_birdhouse_hole
    name: پرندے کے گھر کا سوراخ
    prompt: |
      پرندے کے گھر میں ایک سوراخ ہوتا ہے — ایک مخصوص قطر کا۔
      یہ کچھ پرندوں کو باہر رکھتا ہے، دوسروں کو بلاتا ہے۔ سوراخ ایک فلٹر ہے۔
      یہ کس کے لیے ڈیزائن کیا گیا تھا؟ کس نے اس پر دعویٰ کیا ہے؟
    follow_ups:
      - پرندے کے گھر کے بغیر صحن کیسا ہوگا؟
      - سوراخ گھونسلہ بنانے والوں کو کیسے شکل دیتا ہے؟
      - سوراخ اور کرایہ دار کے درمیان کیا تعلق ہے؟
  - id: nmg_root_hair
    name: جڑ کے بال
    prompt: |
      جڑ کے بال اوپر سے نظر نہیں آتے — ننھے سے توسیع جو پانی اور غذائی اجزاء جذب کرتے ہیں۔
      مٹی سے پودے کا رابطہ۔ نیچے کیا ہوتا ہے، اس پر غور کریں۔
      ان کے بغیر پودا کیا کھو دے گا؟
    follow_ups:
      - بال جذب کو کیسے شکل دیتے ہیں؟
      - بال اور مٹی کے درمیان کیا تعلق ہے؟
      - اگر آپ انہیں دیکھ سکتے تو کیا دیکھتے؟
  - id: nmg_frost_leaf
    name: پتے پر ٹھنڈ
    prompt: |
      پتے پر ٹھنڈ کے نمونے — کرسٹل جیسے، نازک۔
      ٹھنڈ ہوا سے جما ہوا پانی ہے۔ یہ سورج کے ساتھ پگھل جائے گا۔
      عارضی فن پر غور کریں۔ پتا کیا تجربہ کرتا ہے؟
    follow_ups:
      - ٹھنڈ کے بغیر صبح کیسی ہوگی؟
      - ٹھنڈ پتے کے دن کو کیسے شکل دیتی ہے؟
      - کرسٹل اور سیل کے درمیان کیا تعلق ہے؟
  - id: nmg_companion_plant
    name: ساتھی پودا
    prompt: |
      ٹماٹر کے ساتھ تلسی۔ کدو کے ساتھ میرگولڈ (Marigold)۔
      ساتھی پودا لگانا اسٹریٹجک adjacency ہے۔ کچھ پودے بھگاتے ہیں؛ کچھ متوجہ کرتے ہیں۔
      کیاری کی سماجی زندگی پر غور کریں۔
    follow_ups:
      - تلسی کے بغیر ٹماٹر کیسا ہوگا؟
