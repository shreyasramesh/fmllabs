    name: ヨコバイの跳躍
    prompt: |
      ヨコバイが跳躍する—突然。消える。その跳躍は逃避だ。脚はエネルギーを蓄え、放出する。
      そのメカニズムを考えてみよう。
      跳躍なしではヨコバイはどうなるのか？
    follow_ups:
      - 跳躍はどうやって捕獲を避けるのか？
