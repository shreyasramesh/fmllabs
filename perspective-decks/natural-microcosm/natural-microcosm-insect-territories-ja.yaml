    name: ミイデラゴミムシの噴射
    prompt: |
      ミイデラゴミムシが噴射する—熱く、有害。それは防御だ。噴射は化学反応：二つの部屋、出口での反応。
      その武器を考えてみよう。
      それなしではミイデラゴミムシはどうなるのか？
