# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然の縮図 — 昆虫の領域 (Japanese)

id: natural_microcosm_insect_territories
name: 自然の縮図 — 昆虫の領域
description: アリの行列やミツバチの交通、クモの巣、縄張り争い、コロニーの振り付けまで、昆虫の生活の見方を変える50枚のカード。
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: アリの行列
    prompt: |
      アリは行列を作る—巣と食料を結ぶフェロモンの道。その流れを見てみよう。
      行きと帰りの二車線。この道は多くの意思決定の成果だ。
      この行列を壊すものは何か？
    follow_ups:
      - 行列はどのように自己強化されるのか？
      - 行列がなければコロニーはどうなるのか？
      - 行列とコロニーの関係とは？
  - id: nmi_bee_traffic
    name: ミツバチの交通
    prompt: |
      巣の入り口—ミツバチが行き交う。その交通にはリズムがある。
      花粉を運ぶ者もいれば、そうでない者もいる。その振り付けを考えてみよう。
      誰がそのパターンを決めているのか？
    follow_ups:
      - 交通がなければ巣はどうなるのか？
      - 入り口はどのように流れを形作るのか？
      - ミツバチとコロニーの関係とは？
  - id: nmi_spider_web
    name: クモの巣
    prompt: |
      クモの巣は縄張りであり、罠でもある。クモは端で待っている。
      振動が情報を運ぶ。その構造を考えてみよう。
      巣は何を捕らえるのか？ 何を排除するのか？
    follow_ups:
      - 巣がなければクモはどうなるのか？
      - 巣はどのようにクモの感覚を拡張するのか？
      - 糸と生存の関係とは？
  - id: nmi_dragonfly_claim
    name: トンボの縄張り主張
    prompt: |
      トンボは池の一区画をパトロールする—行ったり来たり。それは縄張り行動だ。
      ライバルは追い払われ、仲間は誘われる。その主張を考えてみよう。
      何が守られているのか？
    follow_ups:
      - 縄張りなしではトンボはどうなるのか？
      - パトロールはどのように所有権を伝達するのか？
      - 空間と繁殖の関係とは？
  - id: nmi_caterpillar_munch
    name: イモムシのむしゃむしゃ
    prompt: |
      イモムシが食べる—葉の端が後退していく。食べることは絶え間ない。
      イモムシは変換機械だ。その速度を考えてみよう。
      草食動物がいなければ植物はどうなるのか？
    follow_ups:
      - イモムシはどのように葉を形作るのか？
      - 食べるものがなければチョウはどうなるのか？
      - 消費と成長の関係とは？
  - id: nmi_beetle_battle
    name: カブトムシの戦い
    prompt: |
      二匹のカブトムシが出会う—ノコギリクワガタかもしれないし、フンコロガシかもしれない。彼らは組み合う。
      戦いは儀式だ。その賭け金を考えてみよう。
      何が勝ち取られ、何が失われるのか？
    follow_ups:
      - 敗者はどうなるのか？
      - 戦いはどのように解決されるのか？
      - 戦闘と交配の関係とは？
  - id: nmi_firefly_flash
    name: ホタルの点滅
    prompt: |
      ホタルは点滅する—種ごとにコードがある。そのパターンは求愛だ。
      その信号を考えてみよう。
      間違った点滅は何を意味するのか？ 暗闇でどうやってお互いを見つけるのか？
    follow_ups:
      - 点滅はどのように種をコード化するのか？
      - ホタルがいなければ草原はどうなるのか？
      - 光と仲間との関係とは？
  - id: nmi_aphid_farm
    name: アブラムシの農耕
    prompt: |
      アリはアブラムシを世話する—撫で、守る。アブラムシは甘露を分泌する。アリはそれを収穫する。
      その提携を考えてみよう。
      誰が利益を得るのか？ 誰が搾取されるのか？
    follow_ups:
      - アリがいなければアブラムシはどうなるのか？
      - 農耕はどのように両種を形作るのか？
      - 世話と搾取の関係とは？
  - id: nmi_cicada_shell
    name: セミの抜け殻
    prompt: |
      セミの抜け殻が樹皮にくっついている—幼虫が這い出した跡だ。抜け殻は空っぽだが、完璧だ。
      脱皮を考えてみよう。
      昆虫は何を残してきたのか？ 何を得たのか？
    follow_ups:
      - 脱皮なしではセミはどうなるのか？
      - 抜け殻はどのように移行を印すのか？
      - 脱皮と成長の関係とは？
  - id: nmi_leaf_miner
    name: リーフマイナー（葉脈虫）
    prompt: |
      葉の中の道—リーフマイナーの通り道。幼虫は層の間を食べる。
      葉はその記録を保持している。そのトンネルを考えてみよう。
      内側から見ると葉はどう見えるのか？
    follow_ups:
      - リーフマイナーがいなければ葉はどうなるのか？
      - 葉脈はどうやって幼虫を守るのか？
      - 内側と外側の関係とは？
  - id: nmi_wasp_nest
    name: スズメバチの巣
    prompt: |
      ペーパーワスプの巣—六角形の部屋、噛み砕かれた木材。巣は建築であり、要塞でもある。
      コロニーを考えてみよう。
      誰が建て、誰が守り、誰が繁殖するのか？
    follow_ups:
      - 巣がなければスズメバチはどうなるのか？
      - 巣はどのように社会構造を形作るのか？
      - 紙とコロニーの関係とは？
  - id: nmi_grasshopper_leap
    name: バッタの跳躍
    prompt: |
      バッタが跳躍する—脚が伸び、消える。その跳躍は逃避か接近か。
      その引き金（トリガー）を考えてみよう。
      バッタは何を見て、何を聞いたのか？
    follow_ups:
      - 跳躍なしではバッタはどうなるのか？
      - 跳躍はどのように捕食を避けるのか？
      - 脚と飛行の関係とは？
  - id: nmi_mantis_still
    name: カマキリの静止
    prompt: |
      カマキリは静止して待つ—身動き一つしない。それは狩人だ。獲物が近づく。
      一撃は突然だ。その忍耐を考えてみよう。
      静止は何を犠牲にし、何をもたらすのか？
    follow_ups:
      - 待ち伏せなしではカマキリはどうなるのか？
      - 静止はどうやって欺くのか？
      - 忍耐と捕獲の関係とは？
  - id: nmi_bumblebee_buzz
    name: マルハナバチのブンブン
    prompt: |
      マルハナバチがブンブンと飛ぶ—振動している。一部の花は振動受粉を必要とする。
      ミツバチは花粉を振動させて落とす。その提携を考えてみよう。
      振動なしでは花はどうなるのか？
    follow_ups:
      - 振動はどうやって花粉を放出するのか？
      - 振動受粉なしではマルハナバチはどうなるのか？
      - 振動と受精の関係とは？
  - id: nmi_butterfly_territory
    name: チョウの縄張り
    prompt: |
      チョウが標高の高い場所で止まる—ヒル・トッピング。仲間を待っている。
      ライバルは追い払われる。その戦略を考えてみよう。
      なぜこの場所なのか？ 何がそれを価値あるものにしているのか？
    follow_ups:
      - 止まる場所がなければチョウはどうなるのか？
      - ヒル・トッピングはどのように交配を形作るのか？
      - 場所と出会いの関係とは？
  - id: nmi_earwig_pincer
    name: ハサミムシのハサミ
    prompt: |
      ハサミムシはハサミ（尾毛）を持つ—防御のため、翅を折りたたむため、獲物を扱うため。
      その道具を考えてみよう。
      ハサミなしではハサミムシはどうなるのか？
    follow_ups:
      - ハサミはどのように行動を形作るのか？
      - それなしでは防御はどうなるのか？
      - 形状と機能の関係とは？
  - id: nmi_katydid_call
    name: キリギリスの鳴き声
    prompt: |
      キリギリスが鳴く—翅をこすり合わせる。その鳴き声は種固有だ。
      それは求愛であり、縄張り主張だ。その音を考えてみよう。
      鳴き声なしでは夜はどうなるのか？
    follow_ups:
      - 鳴き声はどうやって仲間を引き寄せるのか？
      - 鳴くことでキリギリスは何を危険にさらすのか？
      - 音と捕食の関係とは？
  - id: nmi_ladybug_cluster
    name: テントウムシの集団
    prompt: |
      テントウムシは冬に集まる—数十匹、数百匹。暖かさ、隠れ場所のために集まる。
      その集まりを考えてみよう。
      何がそれを引き起こし、何がそれを分散させるのか？
    follow_ups:
      - 集団がなければテントウムシはどうなるのか？
      - 集団はどのように微気候を作り出すのか？
      - 多数と生存の関係とは？
  - id: nmi_ant_carry
    name: アリの運搬
    prompt: |
      アリが仲間を運ぶ—死んだり、傷ついたりしている。それは援助だ。コロニーは仲間の面倒を見る。
      その行動を考えてみよう。
      一人では怪我をしたアリはどうなるのか？ 運ぶ者は何を得るのか？
    follow_ups:
      - 運搬はどのようにコロニーに役立つのか？
      - 協力なしではコロニーはどうなるのか？
      - 個人と集合体の関係とは？
  - id: nmi_mosquito_hover
    name: カのホバリング
    prompt: |
      カがホバリングする—探り、突き刺す。宿主を探している。ホバリングは評価だ。
      噛む直前の瞬間を考えてみよう。
      カは何を検知するのか？ 何が決めるのか？
    follow_ups:
      - ホバリングなしではカはどうなるのか？
      - ホバリングはどうやって検出を最小限にするのか？
      - 探りと摂食の関係とは？
  - id: nmi_weevil_curl
    name: コガネムシの巻き込み
    prompt: |
      葉が丸まる—ゾウムシかタマバエが作った。葉は幼虫の周りに折りたたまれる。
      その操作を考えてみよう。植物は説得されている。
      虫がいなければ葉はどうなるのか？
    follow_ups:
      - 巻き込みはどうやって幼虫を守るのか？
      - 巻き込みなしでは植物はどうなるのか？
      - 虫と植物の形状の関係とは？
  - id: nmi_honeybee_waggle
    name: ミツバチのダンス（ワグルダンス）
    prompt: |
      ミツバチがワグルダンスをする—それは踊りだ。ダンスは花の距離と方向を符号化する。
      他のミツバチが見ている。そのメッセージを考えてみよう。
      ワグルダンスなしではコロニーはどうなるのか？
    follow_ups:
      - ダンスはどうやって情報を伝達するのか？
      - それなしでは採餌はどうなるのか？
      - ダンスと発見の関係とは？
  - id: nmi_gnat_cloud
    name: ブユの群れ
    prompt: |
      ブユが群がる—小さな昆虫の雲。その群れは交配のためだ。オスが集まり、メスが入り、選ぶ。
      その集合を考えてみよう。
      一人ではブユはどうなるのか？
    follow_ups:
      - 群れはどうやって交配を可能にするのか？
      - 群れがなければブユはどうなるのか？
      - 多数と出会いの関係とは？
  - id: nmi_spider_wrap
    name: クモの包み込み
    prompt: |
      クモが獲物を包む—糸で苦しむ昆虫を包む。包み込みは動きを止める。
      クモは酵素を注入する。そのプロセスを考えてみよう。
      包み込みなしではクモはどうなるのか？
    follow_ups:
      - 包み込みはどうやって獲物を鎮めるのか？
      - それなしではクモは何を危険にさらすのか？
      - 糸と消化の関係とは？
  - id: nmi_ant_war
    name: アリの戦争
    prompt: |
      二つのアリのコロニーが出会う—衝突。働きアリが組み合い、噛みつく。境界線は争われる。
      その戦いを考えてみよう。
      何が賭けられているのか？ 境界線はどう決まるのか？
    follow_ups:
      - 戦争なしではコロニーはどうなるのか？
      - 戦争はどのように解決されるのか？
      - 縄張り（テリトリー）と資源の関係とは？
  - id: nmi_moth_flutter
    name: ガの羽ばたき
    prompt: |
      ガが光に引き寄せられ、混乱して羽ばたく。光はナビゲーションを妨げる。
      その罠を考えてみよう。
      暗闇ではガはどうなるのか？ なぜ光は方向感覚を狂わせるのか？
    follow_ups:
      - 光なしではガはどうなるのか？
      - ガは通常、月光をどのように利用するのか？
      - 光と方向の関係とは？
  - id: nmi_stick_insect_still
    name: ナナフシの静止
    prompt: |
      ナナフシは動かない—小枝のように見える。捕食者は通り過ぎる。
      その欺瞞を考えてみよう。
      偽装なしではナナフシはどうなるのか？ どれくらいの時間、そのポーズを保てるのか？
    follow_ups:
      - 静止はどうやって身を守るのか？
      - 動くことでナナフシは何を危険にさらすのか？
      - 形状と生存の関係とは？
  - id: nmi_leafcutter_carry
    name: ハキリアリの運搬
    prompt: |
      ハキリアリが葉の断片を運ぶ—自分の体積の何倍もある。葉は巣に運ばれる。それは菌類の基質となる。
      その収穫を考えてみよう。
      葉がなければコロニーはどうなるのか？
    follow_ups:
      - 菌類はどうやって葉を利用するのか？
      - 菌類がなければアリは何を食べるのか？
      - 収穫と栽培の関係とは？
  - id: nmi_housefly_clean
    name: ハエの掃除
    prompt: |
      ハエが自分自身を掃除する—脚をこすり、翅をなでる。この手入れは粒子を取り除き、センサーを維持する。
      その儀式を考えてみよう。
      掃除なしではハエはどうなるのか？
    follow_ups:
      - 手入れはどうやって機能を維持するのか？
      - 掃除ができなくなったらどうなるのか？
      - 清潔さと感覚の関係とは？
  - id: nmi_termite_mound
    name: シロアリの巣（マウンド）
    prompt: |
      シロアリの巣がそびえ立つ—粘土、唾液、噛み砕かれた木材。それは都市だ。内部にはトンネル、部屋、菌類農園がある。
      その建築を考えてみよう。
      巣がなければコロニーはどうなるのか？
    follow_ups:
      - 巣はどうやって気候を調節するのか？
      - 構造がなければシロアリはどうなるのか？
      - 巣とコロニーの関係とは？
  - id: nmi_cricket_chirp
    name: コオロギの鳴き声
    prompt: |
      コオロギが鳴く—翅をこすり合わせる。その鳴き声は求愛だ。メスは音で選ぶ。
      その鳴き声を考えてみよう。
      鳴き声なしではコオロギはどうなるのか？ メス以外に何が聞いているのか？
    follow_ups:
      - 鳴き声はどうやって適応度を符号化するのか？
      - 鳴き声なしでは草原はどうなるのか？
      - 鳴き声と捕食の関係とは？
  - id: nmi_damselfly_tandem
    name: イトトンボのタンデム（連結）
    prompt: |
      イトトンボはタンデムで交尾する—オスがメスの頭の後ろを掴む。メスは精子を受け取るために曲がる。
      ペアは一緒に飛ぶかもしれない。その連結を考えてみよう。
      掴むことがなければ交配はどうなるのか？
    follow_ups:
      - タンデムはどうやってオスの投資を守るのか？
      - 連結がなければペアはどうなるのか？
      - 掴むことと受精の関係とは？
  - id: nmi_roach_scatter
    name: ゴキブリの散開
    prompt: |
      明かりをつけると—ゴキブリが散開する。彼らは隙間を探す。散開は逃避だ。
      その反応を考えてみよう。
      恒常的な明かりの下ではゴキブリはどうなるのか？ なぜ暗闇なのか？
    follow_ups:
      - 散開はどうやって捕食を減らすのか？
      - その反射なしではゴキブリはどうなるのか？
      - 光と隠れることの関係とは？
  - id: nmi_hopper_nymph
    name: イナゴの若虫（ニンフ）
    prompt: |
      若いバッタ—ニンフ。まだ翅がない。跳ねる。
      その段階を考えてみよう。
      ニンフは何になるのか？ 今、何が欠けているのか？
    follow_ups:
      - ニンフの段階なしではバッタはどうなるのか？
      - ニンフはどうやって捕食者を避けるのか？
      - 脱皮と翅の関係とは？
  - id: nmi_sweat_bee
    name: ハチ（汗を求めるハチ）
    prompt: |
      汗を求めるハチが皮膚に着地する—塩分を求めている。汗は資源だ。
      その遭遇を考えてみよう。
      汗がなければハチはどうなるのか？ なぜ塩分が必要なのか？
    follow_ups:
      - ハチはどうやって塩分を利用するのか？
      - 着地することでハチは何を危険にさらすのか？
      - 人間とハチの関係とは？
  - id: nmi_army_ant_column
    name: アーミーアント（軍隊アリ）の隊列
    prompt: |
      アーミーアントが行進する—数千匹の列。彼らは流れる。獲物は圧倒される。
      その群れを考えてみよう。
      隊列がなければアリはどうなるのか？ どうやって連携するのか？
    follow_ups:
      - 隊列はどうやって捕食を可能にするのか？
      - アーミーアントがいなければ森はどうなるのか？
      - 多数と力の関係とは？
  - id: nmi_water_strider_leg
    name: アメンボの脚
    prompt: |
      アメンボの脚—長く、疎水性。重さを分散させる。表面が支える。
      その適応を考えてみよう。
      脚のデザインなしではアメンボはどうなるのか？
    follow_ups:
      - 脚の形状はどうやって力を分散させるのか？
      - 陸上ではアメンボはどうなるのか？
      - 形状と表面の関係とは？
  - id: nmi_aphid_wing
    name: アブラムシの翅
    prompt: |
      一部のアブラムシは翅を持つ—混雑している時や、宿主が衰退する時。彼らは分散する。
      その切り替えを考えてみよう。
      何が翅の発達を誘発するのか？ 翅は何を犠牲にするのか？
    follow_ups:
      - 混雑はどうやって翅を誘発するのか？
      - 翅を持つ選択肢がなければアブラムシはどうなるのか？
      - 翅と分散の関係とは？
  - id: nmi_scale_armor
    name: コナジラミの鎧
    prompt: |
      コナジラミはこぶのように見える—彼らは鎧をまとっている。あまり動かない。
      植物に口を刺して食べる。その戦略を考えてみよう。
      鎧なしではコナジラミはどうなるのか？
    follow_ups:
      - 鎧はどうやって保護するのか？
      - コナジラミがいなければ植物はどうなるのか？
      - 静止と防御の関係とは？
  - id: nmi_caddisfly_case
    name: トビケラ（幼虫）のケース
    prompt: |
      トビケラの幼虫がケースを作る—小枝、砂、小石。そのケースを運ぶ。
