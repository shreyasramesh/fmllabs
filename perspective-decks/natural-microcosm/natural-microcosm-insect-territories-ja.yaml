    name: アリの女王
    prompt: |
      アリのコロニーには女王がいる—あるいは複数。彼女は卵を産む。働きアリが彼女の世話をする。
      中心を考えてみよう。
      女王がなければコロニーはどうなるのか？ どうやってコロニーは彼女を代替するのか？
    follow_ups:
      - 女王はどのようにコロニーを形作るのか？
      - 女王がいなければ働きアリはどうなるのか？
      - 女王とコロニーの関係とは？
