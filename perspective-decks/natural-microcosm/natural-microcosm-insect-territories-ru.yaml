# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природный Микрокосм — Территории Насекомых (Russian)

id: natural_microcosm_insect_territories
name: Природный Микрокосм — Территории Насекомых
description: 50 карточек, чтобы изменить ваш взгляд на жизнь насекомых — от муравьиных троп и пчелиного движения до паутины, территориальных драм и хореографии колоний.
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: Муравьиная тропа
    prompt: |
      Муравьи прокладывают тропы — феромонные пути между гнездом и пищей. Наблюдай за потоком.
      Две полосы: туда и обратно. Тропа — это решение, принятое многими.
      Что могло бы нарушить тропу?
    follow_ups:
      - Как тропа себя подкрепляет?
      - Чем была бы колония без троп?
      - Каковы отношения между тропой и колонией?
  - id: nmi_bee_traffic
    name: Пчелиный трафик
    prompt: |
      Вход в улей — пчелы влетают и вылетают. Движение имеет ритм. Одни
      несут пыльцу; другие нет. Рассмотри хореографию. Кто решает
      паттерн?
    follow_ups:
      - Чем был бы улей без движения?
      - Как вход формирует поток?
      - Каковы отношения между пчелой и колонией?
  - id: nmi_spider_web
    name: Паутина
    prompt: |
      Паутина — это территория и ловушка. Паук ждет на краю.
      Вибрации несут информацию. Рассмотри архитектуру. Что ловит паутина? Что она исключает?
    follow_ups:
      - Чем был бы паук без паутины?
      - Как паутина расширяет чувства паука?
      - Каковы отношения между шелком и выживанием?
  - id: nmi_dragonfly_claim
    name: Территория стрекозы
    prompt: |
      Стрекоза патрулирует участок пруда — туда и обратно. Она территориальна.
      Соперники изгоняются. Любовники ухаживаются. Рассмотри ставку. Что защищается?
    follow_ups:
      - Что бы делала стрекоза без территории?
      - Как патрулирование сообщает о владении?
      - Каковы отношения между пространством и размножением?
  - id: nmi_caterpillar_munch
    name: Гусеница жует
    prompt: |
      Гусеница ест — край листа исчезает. Поедание происходит постоянно.
      Гусеница — машина для преобразования. Рассмотри скорость. Чем было бы растение без травоядных?
    follow_ups:
      - Как гусеница формирует лист?
      - Чем была бы бабочка без поедания?
      - Каковы отношения между потреблением и ростом?
  - id: nmi_beetle_battle
    name: Битва жуков
    prompt: |
      Два жука встречаются — возможно, жуки-олени, возможно, навозные жуки. Они борются.
      Борьба — ритуал. Рассмотри ставки. Что выигрывается? Что теряется?
    follow_ups:
      - Что бы делал проигравший?
      - Как разрешается битва?
      - Каковы отношения между боем и спариванием?
  - id: nmi_firefly_flash
    name: Вспышка светлячка
    prompt: |
      Светлячки вспыхивают — у каждого вида свой код. Паттерн — это ухаживание. Рассмотри сигнал. Что означала бы неправильная вспышка? Как они находят друг друга в темноте?
    follow_ups:
      - Как вспышка кодирует вид?
      - Чем было бы луга без светлячков?
      - Каковы отношения между светом и парой?
  - id: nmi_aphid_farm
    name: Ферма тлей
    prompt: |
      Муравьи ухаживают за тлями — они их гладят, они их защищают. Тли выделяют падь.
      Муравьи ее собирают. Рассмотри партнерство. Кто выигрывает? Кто эксплуатируется?
    follow_ups:
      - Чем были бы тли без муравьев?
      - Как фермерство формирует оба вида?
      - Каковы отношения между уходом и извлечением?
  - id: nmi_cicada_shell
    name: Куколка цикады
    prompt: |
      Куколка цикады цепляется за кору — нимфа выбралась. Куколка пуста,
      идеальна. Рассмотри линьку. Что насекомое оставило позади? Что оно приобрело?
    follow_ups:
      - Чем была бы цикада без линьки?
      - Как куколка отмечает переход?
      - Каковы отношения между сброшенным и ростом?
  - id: nmi_leaf_miner
    name: Минер листа
    prompt: |
      Тропа внутри листа — путь минёра листа. Личинка ест между
      слоями. Лист хранит запись. Рассмотри туннель. Как бы выглядел лист изнутри?
    follow_ups:
      - Чем был бы лист без минёра?
      - Как мина защищает личинку?
      - Каковы отношения между внутренним и внешним?
  - id: nmi_wasp_nest
    name: Осиное гнездо
    prompt: |
      Бумажное осиное гнездо — шестиугольные ячейки, жеваная древесина. Гнездо — архитектура
      и крепость. Рассмотри колонию. Кто строит? Кто защищает? Кто размножается?
    follow_ups:
      - Чем были бы осы без гнезда?
      - Как гнездо формирует социальную структуру?
      - Каковы отношения между бумагой и колонией?
  - id: nmi_grasshopper_leap
    name: Прыжок кузнечика
    prompt: |
      Кузнечик прыгает — ноги разгибаются, он исчез. Прыжок — это побег или
      приближение. Рассмотри триггер. Что увидел кузнечик? Что
      услышал?
    follow_ups:
      - Чем был бы кузнечик без прыжка?
      - Как прыжок избегает хищничества?
      - Каковы отношения между ногой и полетом?
  - id: nmi_mantis_still
    name: Богомол замер
    prompt: |
      Богомол ждет — неподвижно. Он охотник. Добыча приближается. Удар
      внезапен. Рассмотри терпение. Чего стоит неподвижность? Что она позволяет?
    follow_ups:
      - Чем был бы богомол без ожидания?
      - Как неподвижность обманывает?
      - Каковы отношения между терпением и поимкой?
  - id: nmi_bumblebee_buzz
    name: Жужжание шмеля
    prompt: |
      Шмель жужжит — он вибрирует. Некоторые цветы требуют жужжащего опыления.
      Шмель стряхивает пыльцу. Рассмотри партнерство. Чем был бы цветок без жужжания?
    follow_ups:
      - Как жужжание высвобождает пыльцу?
      - Чем был бы шмель без жужжащего опыления?
      - Каковы отношения между вибрацией и опылением?
  - id: nmi_butterfly_territory
    name: Территория бабочки
    prompt: |
      Бабочка садится на возвышенность — холминг. Она ждет партнеров.
      Соперники изгоняются. Рассмотри стратегию. Почему это место? Что делает его ценным?
    follow_ups:
      - Что бы делала бабочка без присады?
      - Как холминг формирует спаривание?
      - Каковы отношения между местом и встречей?
  - id: nmi_earwig_pincer
    name: Клешня уховертки
    prompt: |
      У уховерток есть клешни — церки. Они для защиты, для складывания крыльев, для
      обращения с добычей. Рассмотри инструмент. Чем была бы уховертка без
      клешни?
    follow_ups:
      - Как клешня формирует поведение?
      - Как выглядела бы защита без нее?
      - Каковы отношения между формой и функцией?
  - id: nmi_katydid_call
    name: Зов дядловки
    prompt: |
      Дядловка зовет — стрекочет, ногами по крыльям. Зов видоспецифичен.
      Это ухаживание, территория. Рассмотри звук. Чем была бы ночь без него?
    follow_ups:
      - Как зов привлекает партнеров?
      - Чем рисковала бы дядловка, зовя?
      - Каковы отношения между звуком и хищничеством?
  - id: nmi_ladybug_cluster
    name: Скопление божьих коровок
    prompt: |
      Божьи коровки скапливаются зимой — десятки, сотни. Они агрегируются для тепла,
      для укрытия. Рассмотри сбор. Что его вызывает? Что его рассеивает?
    follow_ups:
      - Чем были бы божьи коровки без скопления?
      - Как скопление создает микроклимат?
      - Каковы отношения между многими и выживанием?
  - id: nmi_ant_carry
    name: Муравей несет
    prompt: |
      Муравей несет другого — мертвого или раненого. Это помощь. Колония заботится
      о своих. Рассмотри поведение. Что бы делал раненый муравей один?
      Что получает несущий?
    follow_ups:
      - Как несение служит колонии?
      - Чем была бы колония без сотрудничества?
      - Каковы отношения между индивидом и коллективом?
  - id: nmi_mosquito_hover
    name: Комариное зависание
    prompt: |
      Комар зависает — проверяет, зондирует. Он ищет хозяина. Зависание — это
      оценка. Рассмотри момент перед укусом. Что определяет комар? Что решает?
    follow_ups:
      - Что бы делал комар без зависания?
      - Как зависание минимизирует обнаружение?
      - Каковы отношения между зондированием и питанием?
  - id: nmi_weevil_curl
    name: Свертывание долгоносика
    prompt: |
      Лист сворачивается — это сделал долгоносик или галловая муха. Лист сворачивается вокруг
      личинки. Рассмотри манипуляцию. Растение уговаривается. Чем был бы лист без насекомого?
    follow_ups:
      - Как свертывание защищает личинку?
      - Чем было бы растение без свертывания?
      - Каковы отношения между формой насекомого и формой растения?
  - id: nmi_honeybee_waggle
    name: Пчелиный танец
    prompt: |
      Медоносная пчела виляет — это танец. Танец кодирует расстояние и направление
      к цветам. Другие пчелы наблюдают. Рассмотри сообщение. Чем была бы
      колония без танца?
    follow_ups:
      - Как танец передает информацию?
      - Как выглядел бы сбор пищи без него?
      - Каковы отношения между танцем и открытием?
  - id: nmi_gnat_cloud
    name: Облако комаров-звонцов
    prompt: |
      Комары-звонцы роятся — облако крошечных насекомых. Рой — это спаривание. Самцы собираются;
      самки входят и выбирают. Рассмотри скопление. Что делал бы комар один?
    follow_ups:
      - Как рой обеспечивает спаривание?
      - Чем были бы комары без облака?
      - Каковы отношения между многими и встречей?
  - id: nmi_spider_wrap
    name: Паучье обертывание
    prompt: |
      Паук обертывает добычу — шелк вокруг бьющегося насекомого. Обертывание обездвиживает.
      Паук впрыскивает фермент. Рассмотри процесс. Что делал бы паук без обертывания?
    follow_ups:
      - Как обертывание усмиряет добычу?
      - Чем рисковал бы паук без него?
      - Каковы отношения между шелком и пищеварением?
  - id: nmi_ant_war
    name: Муравьиная война
    prompt: |
      Две муравьиные колонии встречаются — конфликт. Рабочие борются, кусаются. Граница
      оспаривается. Рассмотри битву. Что на кону? Как решается граница?
    follow_ups:
      - Чем были бы колонии без войны?
      - Как разрешается война?
      - Каковы отношения между территорией и ресурсом?
  - id: nmi_moth_flutter
    name: Трепетание мотылька
    prompt: |
      Мотылек трепещет у света — притягивается, сбивается с толку. Свет нарушает
      навигацию. Рассмотри ловушку. Что делал бы мотылек в темноте?
      Почему свет дезориентирует?
    follow_ups:
      - Чем был бы мотылек без света?
      - Как мотылек обычно использует лунный свет?
      - Каковы отношения между светом и направлением?
  - id: nmi_stick_insect_still
    name: Палочник замер
    prompt: |
      Палочник неподвижен — он выглядит как веточка. Хищники проходят мимо.
      Рассмотри обман. Чем был бы насекомое без маскировки?
      Как долго оно может держать позу?
    follow_ups:
      - Как неподвижность защищает?
      - Чем рисковало бы насекомое, двигаясь?
      - Каковы отношения между формой и выживанием?
  - id: nmi_leafcutter_carry
    name: Листорез несет
    prompt: |
      Муравей-листорез несет фрагмент листа — во много раз больше себя. Лист
      относится в гнездо. Он становится субстратом для грибка. Рассмотри
      урожай. Чем была бы колония без листьев?
    follow_ups:
      - Как грибок использует лист?
      - Что бы ели муравьи без грибка?
      - Каковы отношения между сбором и культивацией?
  - id: nmi_housefly_clean
    name: Муха чистится
    prompt: |
      Комнатная муха чистится — трет лапки, поглаживает крылья. Чистка удаляет
      частицы, поддерживает сенсоры. Рассмотри ритуал. Чем была бы муха без чистки?
    follow_ups:
      - Как чистка поддерживает функцию?
      - Что бы произошло, если бы муха не могла чиститься?
      - Каковы отношения между чистотой и ощущением?
  - id: nmi_termite_mound
    name: Термитник
    prompt: |
      Термитник возвышается — глина, слюна, жеваная древесина. Это город. Внутри —
      туннели, камеры, грибные сады. Рассмотри архитектуру. Чем была бы колония без
      термитника?
    follow_ups:
      - Как термитник регулирует климат?
      - Что бы делали термиты без структуры?
      - Каковы отношения между термитником и колонией?
  - id: nmi_cricket_chirp
    name: Стрекот сверчка
    prompt: |
      Сверчок стрекочет — крылья вместе. Стрекот — это ухаживание. Самки выбирают
      по звуку. Рассмотри зов. Что делал бы сверчок без
      стрекота? Кто слушает, кроме самок?
    follow_ups:
      - Как стрекот кодирует пригодность?
      - Чем было бы луга без звука?
      - Каковы отношения между зовом и хищничеством?
  - id: nmi_damselfly_tandem
    name: Стрекозы в тандеме
    prompt: |
      Стрекозы спариваются в тандеме — самец обхватывает самку за голову. Она
      изгибается, чтобы принять сперму. Пара может лететь вместе. Рассмотри
      спаривание. Чем было бы спаривание без обхвата?
    follow_ups:
      - Как тандем защищает инвестиции самца?
      - Что бы делала пара без связи?
      - Каковы отношения между обхватом и оплодотворением?
  - id: nmi_roach_scatter
    name: Разбегание тараканов
    prompt: |
      Включи свет — тараканы разбегаются. Они ищут щели. Разбегание — это
      побег. Рассмотри реакцию. Что делал бы таракан при постоянном
      свете? Почему темнота?
    follow_ups:
      - Как разбегание уменьшает хищничество?
      - Чем был бы таракан без рефлекса?
      - Каковы отношения между светом и укрытием?
  - id: nmi_hopper_nymph
    name: Нимфа прыгуна
    prompt: |
      Молодой кузнечик — нимфа. У него еще нет крыльев. Он прыгает. Рассмотри
      стадию. Чем станет нимфа? Чего ей не хватает сейчас?
    follow_ups:
      - Чем был бы кузнечик без стадии нимфы?
      - Как нимфа избегает хищников?
      - Каковы отношения между линькой и крылом?
  - id: nmi_sweat_bee
    name: Потовый пчела
    prompt: |
      Потовый пчела садится на вашу кожу — ищет соль. Пот — это ресурс.
      Рассмотри встречу. Что делал бы пчела без пота? Зачем ей нужна соль?
    follow_ups:
      - Как пчела использует соль?
      - Чем рисковал бы пчела, садясь?
      - Каковы отношения между человеком и пчелой?
  - id: nmi_army_ant_column
    name: Колонна муравьев-солдат
    prompt: |
      Муравьи-солдаты маршируют — колонна тысяч. Они текут. Добыча подавляется.
      Рассмотри рой. Чем были бы муравьи без колонны? Как они координируются?
    follow_ups:
      - Как колонна обеспечивает хищничество?
      - Чем был бы лес без муравьев-солдат?
      - Каковы отношения между многими и силой?
  - id: nmi_water_strider_leg
    name: Нога водомерки
    prompt: |
      Ноги водомерки — длинные, гидрофобные. Они распределяют вес. Поверхность держит.
      Рассмотри адаптацию. Чем была бы водомерка без конструкции ног?
    follow_ups:
      - Как форма ноги распределяет силу?
      - Что бы делала водомерка на суше?
      - Каковы отношения между формой и поверхностью?
  - id: nmi_aphid_wing
    name: Крыло тли
    prompt: |
      У некоторых тлей есть крылья — когда тесно или когда хозяин ухудшается. Они
      рассеиваются. Рассмотри переключение. Что вызывает развитие крыльев? Чего стоит крыло?
    follow_ups:
      - Как теснота вызывает появление крыльев?
      - Чем была бы тля без возможности?
      - Каковы отношения между крылом и расселением?
  - id: nmi_scale_armor
    name: Броня щитовки
    prompt: |
      Щитовки выглядят как бугорки — они бронированы. Они мало двигаются.
      Они присасываются к растению, питаются. Рассмотри стратегию. Чем была бы щитовка без
      брони?
    follow_ups:
      - Как броня защищает?
      - Чем было бы растение без щитовки?
      - Каковы отношения между неподвижностью и защитой?
  - id: nmi_caddisfly_case
    name: Домик ручейника
    prompt: |
      Личинка ручейника строит домик — палочки, песок, камешки. Она носит домик.
