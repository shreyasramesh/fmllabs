# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然微观 — 池塘与水洼 (Mandarin Chinese)

id: natural_microcosm_pond_puddle
name: 自然微观 — 池塘与水洼
description: 50 张卡牌，视角从水面的张力、倒影，到水生昆虫、蝌蚪，再到临时水坑中的生命，全方位展现你对微小水体的认知。
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: 表面张力
    prompt: |
      水黾在水上行走。水面托住了它——水分子彼此吸引。轻轻地放下一个针。它会漂浮。思考这无形的薄膜。什么会打破它？
    follow_ups:
      - 表面张力如何塑造这里的生存者？
      - 没有它，池塘会是怎样的？
      - 表面与边界是什么关系？
  - id: nmp_skater_ripple
    name: 水黾涟漪
    prompt: |
      水黾的腿在水面划出涟漪。每一步都会产生波纹。观察这个图案。水黾像读地图一样解读水面。它感知到了什么？
    follow_ups:
      - 涟漪如何传递信息？
      - 没有水面，水黾会怎样？
      - 涟漪与猎物是什么关系？
  - id: nmp_reflection_sky
    name: 天空倒影
    prompt: |
      水洼倒映着天空——或者一根树枝，或者你。倒影是颠倒的。平静的水面就是一面镜子。倒影增加了什么？又隐藏了什么？
    follow_ups:
      - 没有倒影，水洼会是怎样的？
      - 平静如何塑造我们所见？
      - 表面与影像是什么关系？
  - id: nmp_tadpole_tail
    name: 蝌蚪尾巴
    prompt: |
      蝌蚪游动——靠尾巴推进。尾巴将被重新吸收。这个动物正在转变。思考这中间的过程。尾巴现在带来了什么？
    follow_ups:
      - 没有尾巴，蝌蚪会是怎样的？
      - 变态如何重塑身体？
      - 形态与功能是什么关系？
  - id: nmp_dragonfly_egg
    name: 蜻蜓卵
    prompt: |
      蜻蜓将卵产在水中——或水面下的茎中。幼虫在水下生活多年，然后才羽化。思考这分裂的生活。是什么连接了水与空气？
    follow_ups:
      - 没有水下阶段，蜻蜓会是怎样的？
      - 幼虫如何塑造池塘？
      - 幼虫与成虫是什么关系？
  - id: nmp_algae_bloom
    name: 藻类爆发
    prompt: |
      水面上的绿色浮沫——藻类。这是一次爆发，一次脉动。过多的养分，过多的阳光。池塘在回应。是什么触发了它？之后又会发生什么？
    follow_ups:
      - 没有藻类，池塘会是怎样的？
      - 藻类爆发如何影响氧气？
      - 养分与生长是什么关系？
  - id: nmp_reed_stem
    name: 芦苇茎
    prompt: |
      芦苇和灯芯草从边缘升起。它们是中空的——空气通道贯穿其中。茎连接着水与空气。谁会把芦苇当做梯子？
    follow_ups:
      - 没有芦苇，边缘会是怎样的？
      - 空心如何使其得以生存？
      - 茎与栖息地是什么关系？
  - id: nmp_pond_skin
    name: 池塘的“皮肤”
    prompt: |
      池塘有一层“皮肤”——水与空气交汇之处。灰尘落在上面。油会散开。这层“皮肤”很脆弱。触摸它。这层“皮肤”分隔了什么？
    follow_ups:
      - 没有这层“皮肤”，池塘会是怎样的？
      - 这层“皮肤”如何影响气体交换？
      - 表面与深度是什么关系？
  - id: nmp_temporary_pool
    name: 临时水坑
    prompt: |
      雨后的水洼——它会干涸。然而生命已经适应。仙女虾、蜎蜎虾、等待的卵。思考这紧迫感。在水干涸之前必须完成什么？
    follow_ups:
      - 如果水坑是永久的，它会是怎样的？
      - 临时性如何塑造策略？
      - 时间与适应是什么关系？
  - id: nmp_whirligig_gyre
    name: 龙虱旋涡
    prompt: |
      龙虱在水面旋转。它们能看到上方和下方——复眼。它们既是捕食者也是猎物。思考这双重视野。它带来了什么？
    follow_ups:
      - 没有复眼，龙虱会是怎样的？
      - 旋涡如何迷惑捕食者？
      - 旋转与生存是什么关系？
  - id: nmp_diving_spider
    name: 潜水蜘蛛
    prompt: |
      一只潜水蜘蛛带着一个气泡——一个潜水钟。它在水下呼吸。气泡就是肺。思考这项发明。没有气泡，蜘蛛会怎样？
    follow_ups:
      - 气泡如何帮助捕猎？
      - 如果气泡破裂会怎样？
      - 空气与水是什么关系？
  - id: nmp_pond_scum
    name: 池塘浮渣
    prompt: |
      浮渣聚集在边缘——花粉、灰尘、藻类、昆虫。这是一层边界。什么会聚集在那里？谁会以它为食？浮渣就是过滤器。
    follow_ups:
      - 没有浮渣，池塘会是怎样的？
      - 边缘如何集中生命？
      - 边界与聚集是什么关系？
  - id: nmp_ice_surface
    name: 冰面
    prompt: |
      冬天，池塘结冰。冰面保持着。冰面之下，生命仍在继续——更缓慢，更寒冷。思考这屏障。冰保护了什么？又阻碍了什么？
    follow_ups:
      - 没有冰，池塘会是怎样的？
      - 结冰如何影响氧气？
      - 冰与生存是什么关系？
  - id: nmp_minnow_school
    name: 鲦鱼鱼群
    prompt: |
      鲦鱼成群——它们作为一个整体移动。鱼群是防御，是效率。观察它们的同步。是什么协调了它们？单独一条鲦鱼会有什么风险？
    follow_ups:
      - 没有鱼群，池塘会是怎样的？
      - 群居如何减少被捕食？
      - 个体与群体是什么关系？
  - id: nmp_lily_pad
    name: 睡莲叶
    prompt: |
      睡莲叶漂浮着。它的底部与顶部不同——毛发、颜色。叶片是一个平台。什么会降落在上面？什么会生活在下方？
    follow_ups:
      - 没有睡莲叶，池塘会是怎样的？
      - 叶片如何塑造下方的光线？
      - 叶片与阴影是什么关系？
  - id: nmp_ripple_spread
    name: 涟漪扩散
    prompt: |
      一块石头落下。涟漪扩散开来。它们相交，互相干扰。图案传递着能量。思考能量的衰减。涟漪能传播多远？
    follow_ups:
      - 没有涟漪，水面会是怎样的？
      - 涟漪如何标记撞击？
      - 扰动与传播是什么关系？
  - id: nmp_mosquito_wiggle
    name: 蚊子摇摆
    prompt: |
      蚊子幼虫悬挂在水面——称为“摇蚊”。它们通过虹吸管呼吸。摇摆是运动，是进食。思考幼虫的世界。它吃什么？
    follow_ups:
      - 没有蚊子，池塘会是怎样的？
      - 摇摆如何躲避捕食者？
      - 幼虫与成虫是什么关系？
  - id: nmp_leaf_boat
    name: 落叶小船
    prompt: |
      一片叶子漂浮着——落下，漂流。对一些生物来说是筏子，对另一些生物来说是食物。叶子会沉没，腐烂。追踪它的旅程。它会变成什么？
    follow_ups:
      - 没有漂浮的碎片，水面会是怎样的？
      - 落叶如何创造微栖息地？
      - 漂浮与沉没是什么关系？
  - id: nmp_backswimmer_top
    name: 背泳虫（腹部朝上）
    prompt: |
      背泳虫倒着游——腹部朝向天空。它用腿划行。它在水面呼吸，然后潜入。思考这种颠倒。为什么是倒着游？
    follow_ups:
      - 如果背泳虫是正着游，它会是怎样的？
      - 这种姿势如何帮助捕猎？
      - 方向与猎物是什么关系？
  - id: nmp_snail_trail
    name: 蜗牛的痕迹
    prompt: |
      池塘蜗牛在滑行。它留下一条痕迹——粘液，移动的轨迹。痕迹标志着它去过的地方。其他蜗牛可能会跟着。思考这条路径。痕迹传达了什么？
    follow_ups:
      - 没有痕迹，蜗牛会是怎样的？
      - 粘液如何使其能够移动？
      - 痕迹与跟随是什么关系？
  - id: nmp_dew_drop
    name: 露珠
    prompt: |
      露珠在水面上的草叶上形成——水珠，反射。这是凝结。露珠会凝聚。然后滴落。思考这滴水。它放大了什么？
    follow_ups:
      - 没有露水，草叶会是怎样的？
      - 露珠如何弯曲光线？
      - 露珠与表面是什么关系？
  - id: nmp_spring_constant
    name: 泉水恒定
    prompt: |
      泉水滋养着池塘——或者池塘在渗漏。水位是一种平衡。思考输入与输出。什么维持着这个水坑？什么会让它干涸？
    follow_ups:
      - 没有泉水，池塘会是怎样的？
      - 源头如何塑造水体？
      - 输入与生命是什么关系？
  - id: nmp_edge_ecotone
    name: 边缘过渡带
    prompt: |
      池塘边缘是一个生态过渡带——湿润遇干燥。植物在此适应。动物在此穿梭。边缘意味着多样性。什么在中间地带茁壮成长？
    follow_ups:
      - 没有边缘，池塘会是怎样的？
      - 生态过渡带如何创造机会？
      - 边界与多样性是什么关系？
  - id: nmp_frog_eye
    name: 青蛙的眼睛
    prompt: |
      一只青蛙蹲在岸边。它的眼睛鼓出——它能看到上方和前方。青蛙一动不动。然后舌头射出。思考它的耐心。它在等待什么？
    follow_ups:
      - 没有鼓出的眼睛，青蛙会是怎样的？
      - 静止如何帮助它发动攻击？
      - 等待与捕获是什么关系？
  - id: nmp_oxygen_bubble
    name: 氧气泡
    prompt: |
      池塘里的植物产生氧气——气泡上升。阳光充足的日子里，水在呼吸。思考这种交换。没有光合作用，池塘会是怎样的？
    follow_ups:
      - 氧气如何塑造这里的生存者？
      - 当氧气不足时会发生什么？
      - 光线与呼吸是什么关系？
  - id: nmp_detritus_floor
    name: 碎屑堆积的底部
    prompt: |
      池塘底部是碎屑——落叶、死去的昆虫、沉积物。这是一层腐烂物。什么生活在里面？谁又以它为食？底部就是储藏室。
    follow_ups:
      - 没有碎屑，池塘会是怎样的？
      - 底部如何为水柱提供养分？
      - 底部与顶部是什么关系？
  - id: nmp_rain_ring
    name: 雨痕
    prompt: |
      雨水打在水面上。每一滴雨水都会形成一个环——一个冠，然后一个坑。雨水给水面增加了质感。思考这个图案。静止的水面意味着什么？
    follow_ups:
      - 雨水如何为水体提供氧气？
      - 环状图案扰乱了什么？
      - 雨水与表面的关系？
  - id: nmp_duckweed_carpet
    name: 浮萍地毯
    prompt: |
      浮萍覆盖着水面——微小的漂浮植物。它们繁殖得很快。这层“地毯”遮蔽了下方的物体。思考这覆盖。完全阳光意味着什么？
    follow_ups:
      - 没有浮萍，池塘会是怎样的？
      - “地毯”如何影响温度？
      - 覆盖与下方的生命是什么关系？
  - id: nmp_phantom_midgie
    name: 幽灵摇蚊
    prompt: |
      幽灵摇蚊幼虫是透明的——如同幽灵。它们悬浮在水中。你可以透过它们看到。思考这种隐形。透明保护了什么？
    follow_ups:
      - 如果幼虫不透明，它会是怎样的？
      - 透明如何帮助捕食？
      - 透明与生存是什么关系？
  - id: nmp_skimmer_skip
    name: 飞石跳跃
    prompt: |
      一块石头在水面跳跃——一次，两次，三次。每一次弹跳都传递能量。飞石最终会沉没。思考极限。是什么决定了跳跃的次数？
    follow_ups:
      - 如果石头没有旋转，它会怎样？
      - 角度如何影响跳跃？
      - 投掷与弹跳是什么关系？
  - id: nmp_pollinator_drink
    name: 授粉者的饮水点
    prompt: |
      一只蜜蜂在边缘饮水。蝴蝶聚集在泥泞的水坑边。水是一种资源。思考谁会来。它们需要从水中获得什么？
    follow_ups:
      - 没有水坑，授粉者会怎样？
      - 边缘如何帮助它们饮水？
      - 水与矿物质是什么关系？
  - id: nmp_evaporation_skin
    name: 蒸发“皮肤”
    prompt: |
      池塘通过蒸发失去水分。夏天，水位下降。岸边扩张。思考这种后退。什么暴露出来？谁被困住了？
    follow_ups:
      - 没有蒸发，池塘会是怎样的？
      - 水位的下降如何浓缩生命？
      - 损失与浓度是什么关系？
  - id: nmp_hydra_stalk
    name: 水螅固着
    prompt: |
      水螅——微小，有触手——固着在茎上。它蛰刺猎物，将其吸入。水螅可以再生。思考它的简单。它使用什么样的身体结构？
    follow_ups:
      - 没有水螅，池塘会是怎样的？
      - 再生如何帮助生存？
      - 简单与韧性是什么关系？
  - id: nmp_boatman_row
    name: 船夫划桨
    prompt: |
      一只船夫虫在划行——用桨状的腿。它经常倒着游，贴在水面。它以藻类为食。思考它的“桨”。它在推动什么？
    follow_ups:
      - 没有“桨”，船夫虫会是怎样的？
      - 它的划行与背泳虫有何不同？
      - 腿与运动是什么关系？
  - id: nmp_caddisfly_case
    name: Caddisfly 幼虫的巢穴
    prompt: |
      一只 Caddisfly 幼虫建造一个巢穴——用树枝、石头、贝壳。它用丝把它粘起来。这个巢穴是盔甲也是伪装。思考这个建造过程。幼虫选择什么？
    follow_ups:
      - 没有巢穴，幼虫会是怎样的？
      - 巢穴如何因栖息地而异？
      - 材料与保护是什么关系？
  - id: nmp_damselfly_emergence
    name: 豆娘羽化
    prompt: |
      一只豆娘羽化——幼虫爬上茎，裂开外壳，成虫挣脱出来。翅膀展开。这个时刻很脆弱。思考这次转变。什么可能出错？
    follow_ups:
      - 没有攀爬，成虫会是怎样的？
      - 羽化如何影响时机？
      - 幼虫与成虫是什么关系？
  - id: nmp_floating_feather
    name: 漂浮的羽毛
    prompt: |
      一根羽毛漂浮着——被鸟儿丢弃。它随波逐流。水珠在其上滚落。思考这根羽毛。它曾让鸟儿保持干燥。现在它做了什么？
    follow_ups:
      - 没有漂浮物，水面会是怎样的？
      - 羽毛如何捕捉空气？
      - 结构与漂浮是什么关系？
  - id: nmp_moon_jelly
    name: 月亮水母
    prompt: |
      在一些池塘里，有水母——月亮水母。它们脉动。它们主要由水组成。思考它们的身体。它们捕捉什么？它们躲避什么？
    follow_ups:
      - 没有水母，池塘会是怎样的？
      - 脉动如何产生运动？
      - 水与身体是什么关系？
  - id: nmp_seep_source
    name: 渗漏源
    prompt: |
      水从岸边渗出——一个泉眼，缓慢流动。渗漏滋养着池塘。或者池塘在漏水。思考边界。什么会穿过？什么会停留？
    follow_ups:
      - 没有渗漏，池塘会是怎样的？
      - 渗漏如何塑造水质？
      - 源头与水坑是什么关系？
  - id: nmp_wind_wave
    name: 风浪
    prompt: |
      风吹拂水面。小波浪形成。它们在岸边破裂。思考“吹拂距离”——风在水面移动的距离。什么塑造了波浪？
    follow_ups:
      - 没有风，水面会是怎样的？
      - 波浪如何影响氧气？
      - 风与混合是什么关系？
  - id: nmp_rotifer_wheel
    name: 轮虫的轮子
    prompt: |
      轮虫是微观的——它们有一个纤毛的轮子。它旋转，吸入食物。轮虫就像一台引擎。思考这个尺度。水中还有什么？
    follow_ups:
      - 没有轮虫，池塘会是怎样的？
      - 轮子如何产生流动？
      - 纤毛与进食是什么关系？
  - id: nmp_temperature_layer
    name: 温度分层
    prompt: |
      池塘可能会分层——上面暖，下面冷。这些层不容易混合。思考这边界。什么生活在哪里？当池塘“翻转”时会发生什么？
    follow_ups:
      - 没有分层，池塘会是怎样的？
      - 温度如何塑造氧气？
      - 层与生命是什么关系？
  - id: nmp_predator_shadow
    name: 捕食者阴影
    prompt: |
      一条鱼的影子掠过。猎物停止移动，四散逃跑。阴影是一个信号。思考这种反应。持续的阴影意味着什么？没有阴影又意味着什么？
    follow_ups:
      - 阴影如何触发逃跑？
      - 除了阴影，还有什么线索很重要？
      - 阴影与生存是什么关系？
  - id: nmp_surface_film
    name: 水面薄膜
    prompt: |
      水面上有一层薄膜——花粉、细菌、有机物。它可以支撑重量。有些昆虫在上面行走。思考这薄膜。什么会打破它？
    follow_ups:
      - 没有这层薄膜，水面会是怎样的？
      - 这层薄膜如何影响气体交换？
      - 薄膜与边界是什么关系？
  - id: nmp_dry_wait
    name: 干旱等待
    prompt: |
      水洼会干涸。有些生物有抗脱水的卵。它们等待着。下一场雨可能在几个月后。思考这个赌博。什么必须吻合才能成功？
    follow_ups:
      - 没有等待，水坑会是怎样的？
      - 休眠如何跨越干旱？
      - 卵与雨是什么关系？
  - id: nmp_shoreline_wrack
    name: 岸边残骸
    prompt: |
      杂物堆积在岸边——树叶、树枝、死去的昆虫。这些残骸构成一条线。它标记着高水位。思考这种堆积。谁在这里觅食？
    follow_ups:
      - 没有残骸，边缘会是怎样的？
      - 残骸如何创造栖息地？
      - 线与水位是什么关系？
  - id: nmp_duckweed_carpet
    name: 浮萍地毯
    prompt: |
      浮萍覆盖着静止的水面——微小的绿色圆盘。它繁殖得很快。水面变得坚实。思考这场入侵。这层“地毯”阻挡了什么？它又带来了什么？
    follow_ups:
      - 没有浮萍，池塘会是怎样的？
      - “地毯”如何影响光线和氧气？
      - 覆盖与下方的生命是什么关系？
  - id: nmp_rain_ring
    name: 雨滴环
    prompt: |
      雨滴落在水面上。一个环扩展开来，然后消失。在一场阵雨中，水面变得充满纹理——环重叠。思考这个图案。雨水对池塘做了什么？
    follow_ups:
      - 没有雨水，水面会是怎样的？
      - 雨水如何混合水体？
      - 雨滴与环是什么关系？
  - id: nmp_minnow_school
    name: 鲦鱼鱼群
    prompt: |
      鲦鱼成群——几十条鱼作为一个整体移动。鱼群是一种策略。捕食者感到困惑。思考这种协调。它们如何决定？孤独的代价是什么？
    follow_ups:
      - 没有成群，池塘会是怎样的？
      - 鱼群如何应对威胁？
      - 众多与一是什么关系？
  - id: nmp_ice_edge
    name: 冰缘
    prompt: |
      冬天，冰从边缘生长。边界向前推进。冰面之下，生命依然存在——更冷，更慢。思考这边缘。什么能在冰下生存？
    follow_ups:
      - 没有冰，池塘会是怎样的？
      - 冰如何保护或威胁？
      - 冻结与氧气是什么关系？
