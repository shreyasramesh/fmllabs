# প্রাকৃতিক ক্ষুদ্র জগৎ — বাগান ও পিছনের উঠান (Bengali)

id: natural_microcosm_garden_backyard
name: প্রাকৃতিক ক্ষুদ্র জগৎ — বাগান ও পিছনের উঠান
description: ৫০টি কার্ড যা আপনাকে আপনার বাড়ির চারপাশের বন্য জগৎকে দেখতে সাহায্য করবে — পরাগায়নকারী এবং মাটি থেকে আগাছা বনাম ফসল এবং চাষ করা প্রকৃতির নৃত্য পর্যন্ত।
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: মৌমাছির অবতরণ
    prompt: |
      একটি ফুল-এ একটি মৌমাছিকে নামতে দেখুন। তার আগমন, স্পর্শ, এবং স্থির হওয়া।
      মৌমাছি একই সাথে শিকারী এবং পরাগায়নকারী। ফুল কী পায়? এটি কী ঝুঁকি নেয়?
    follow_ups:
      - এই অবতরণ পরবর্তী পরিদর্শনের আকার কিভাবে পরিবর্তন করে?
      - মৌমাছি ছাড়া বাগান কেমন হবে?
      - ফুল এবং মৌমাছির মধ্যে সম্পর্ক কী?
  - id: nmg_soil_crumble
    name: মাটির গুঁড়ো
    prompt: |
      এক মুঠো মাটি হাতে নিন। এর স্পর্শ অনুভব করুন — গুঁড়ো, দানা।
      সেই মাটিতে ইতিহাস, মৃত্যু, পুনর্জন্ম নিহিত। এখানে আগে কী বেঁচে ছিল?
      এখান থেকে কী জন্মাবে?
    follow_ups:
      - মাটি কী জন্মানো জিনিসকে প্রভাবিত করে?
      - বন্ধ্যা মাটি কী অর্থ বহন করবে?
      - গুঁড়ো এবং জীবনের মধ্যে সম্পর্ক কী?
  - id: nmg_weed_edge
    name: কিনারে আগাছা
    prompt: |
      যেখানে লন বিছানা স্পর্শ করে সেখানে একটি আগাছা জন্মায়। এটি রোপণ করা হয়নি।
      এটি আমন্ত্রিত — অথবা এটি নিজেকে আমন্ত্রণ জানিয়েছে। সীমানা বিবেচনা করুন।
      আগাছা এবং ফুলের মধ্যে কে রেখা টানে?
    follow_ups:
      - আগাছা ছাড়া বাগান কেমন হবে?
      - সীমানা কিভাবে উত্তেজনা তৈরি করে?
      - আগাছা এবং উদ্দেশ্যের মধ্যে সম্পর্ক কী?
  - id: nmg_compost_steam
    name: কম্পোস্টের বাষ্প
    prompt: |
      একটি কম্পোস্ট স্তূপ উল্টে দিন। বাষ্প ওঠে — পচন প্রক্রিয়া চলছে।
      তাপ অণুজীবের কাজ। রান্নাঘরের বর্জ্য মাটিতে পরিণত হয়। রূপান্তর অনুসরণ করুন।
    follow_ups:
      - কম্পোস্ট ছাড়া বাগান কী হারাবে?
      - তাপ কিভাবে প্রক্রিয়াটিকে চিহ্নিত করে?
      - বর্জ্য এবং উর্বরতার মধ্যে সম্পর্ক কী?
  - id: nmg_seed_dormancy
    name: বীজের সুপ্ততা
    prompt: |
      মাটিতে একটি বীজ বছর — দশক ধরে অপেক্ষা করতে পারে। এটি জীবিত কিন্তু বিরতিপ্রাপ্ত।
      কী এটিকে জাগিয়ে তোলে? আলো, জল, আগুন, বিঘ্ন। একটি বীজের ধৈর্য বিবেচনা করুন।
    follow_ups:
      - সুপ্ততা ছাড়া অঙ্কুরোদগম কী হারাবে?
      - অপেক্ষা কিভাবে টিকে থাকাকে আকার দেয়?
      - বিরতি এবং উত্থানের মধ্যে সম্পর্ক কী?
  - id: nmg_bird_bath
    name: পাখির স্নান
    prompt: |
      একটি পাখির স্নান একটি আমন্ত্রণ। কে আসে দেখুন — চড়ুই, রবিন, হয়তো একটি জে।
      স্নান এনকাউন্টার তৈরি করে। এই ছোট্ট জলের দেহ ছাড়া উঠান কেমন হবে?
    follow_ups:
      - স্নান কিভাবে দর্শকদের আকার দেয়?
      - আগমনের নৃত্য কী?
      - জল এবং পাখির মধ্যে সম্পর্ক কী?
  - id: nmg_tomato_truss
    name: টমেটোর গুচ্ছ
    prompt: |
      একটি টমেটোর গুচ্ছ সবুজ ফল, তারপর লাল ধারণ করে। স্থাপত্য অধ্যয়ন করুন।
      কাণ্ড, শাখা, ওজন। উদ্ভিদটি প্রকৌশল। কী এটিকে ধরে রাখে?
    follow_ups:
      - গুচ্ছ ছাড়া উদ্ভিদ কী হবে?
      - গঠন কিভাবে ফসলকে আকার দেয়?
      - আকার এবং ফলের মধ্যে সম্পর্ক কী?
  - id: nmg_aphid_column
    name: এফিডের সারি
    prompt: |
      এফিড একটি ডালের উপর জড়ো হয় — চুষতে, বংশবৃদ্ধি করতে। তারা উভয়ই কীট এবং শিকার।
      লেডিবাগ আসবে। বাস্তুতন্ত্র লক্ষ্য করুন। প্রাদুর্ভাব এবং ভারসাম্যের মধ্যে সম্পর্ক কী?
    follow_ups:
      - এফিড ছাড়া উদ্ভিদ কী হবে?
      - সারি কিভাবে শিকারীদের আকর্ষণ করে?
      - কীট এবং বাস্তুতন্ত্রের মধ্যে সম্পর্ক কী?
  - id: nmg_hose_spray
    name: হোস স্প্রে
    prompt: |
      একটি হোস থেকে জল মাটিতে পড়ে। এটি পুলে, শোষণ করে, প্রবাহিত হয় তা দেখুন।
      স্প্রে কৃত্রিম বৃষ্টি। আসল জিনিস থেকে এটি কিভাবে আলাদা? উদ্ভিদ কী গ্রহণ করে?
    follow_ups:
      - হোস ছাড়া বাগান কেমন হবে?
      - সেচ কিভাবে বৃদ্ধিকে আকার দেয়?
      - স্প্রে এবং বৃষ্টির মধ্যে সম্পর্ক কী?
  - id: nmg_lawn_mow
    name: লন মোওয়া
    prompt: |
      একটি লন নিয়ন্ত্রিত বন্যতা — উচ্চতায় কাটা, সবুজ রাখা। মোওয়া বৃদ্ধিকে বাধা দেয়।
      যদি ছেড়ে দেওয়া হয় তবে লন কী হয়ে উঠবে তা বিবেচনা করুন। আমরা কী ফিরিয়ে ধরছি?
    follow_ups:
      - মোওয়া ছাড়া উঠান কেমন হবে?
      - কাটা কিভাবে পরিচয়কে আকার দেয়?
      - লন এবং নিয়ন্ত্রণের মধ্যে সম্পর্ক কী?
  - id: nmg_pot_bound
    name: পাত্রে আবদ্ধ
    prompt: |
      একটি পাত্রে একটি উদ্ভিদ — শিকড় বৃত্তাকারে ঘুরছে, খুঁজছে। পাত্রটি একটি সীমা।
      অসীম মাটি থাকলে উদ্ভিদটি কী করত? পাত্রটি একই সাথে কারাগার এবং সুরক্ষা।
      বাণিজ্য বিবেচনা করুন।
    follow_ups:
      - পাত্র ছাড়া উদ্ভিদ কী হবে?
      - ধারণ কিভাবে বৃদ্ধিকে আকার দেয়?
      - শিকড় এবং প্রাচীরের মধ্যে সম্পর্ক কী?
  - id: nmg_mulch_layer
    name: মালচ স্তর
    prompt: |
      মালচ মাটি ঢেকে রাখে — কাঠের চিপস, খড়, পাতা। এটি আর্দ্রতা ধরে রাখে,
      আগাছা দমন করে, অবশেষে মাটিতে পরিণত হয়। স্তরটি অস্থায়ী।
      এটি যতক্ষণ স্থায়ী হয় ততক্ষণ কী করে?
    follow_ups:
      - মালচ ছাড়া বিছানা কেমন হবে?
      - স্তরটি কিভাবে মাইক্রোক্লাইমেট তৈরি করে?
      - আচ্ছাদন এবং মাটির মধ্যে সম্পর্ক কী?
  - id: nmg_hummingbird_hover
    name: হামিংবার্ডের স্থির হওয়া
    prompt: |
      একটি হামিংবার্ড একটি ফুলের উপর স্থির হয় — গতিতে ডানা অদৃশ্য। স্থির হওয়া
      ব্যয়বহুল। অমৃত মূল্যবান হতে হবে। পরিদর্শনের অর্থনীতি বিবেচনা করুন।
    follow_ups:
      - হামিংবার্ড ছাড়া ফুল কী হবে?
      - স্থির হওয়া কিভাবে সম্পর্ককে আকার দেয়?
      - ব্যয় এবং পুরস্কারের মধ্যে সম্পর্ক কী?
  - id: nmg_fence_creep
    name: বেড়ার লতা
    prompt: |
      আইভি বা মর্নিং গ্লোরি একটি বেড়া বরাবর হামাগুড়ি দেয়। উদ্ভিদ জানে না যে বেড়াটি মানুষের তৈরি।
      এটি তবুও আরোহন করে। বৃদ্ধি এবং কাঠামোর মধ্যে এনকাউন্টার বিবেচনা করুন।
    follow_ups:
      - বেড়া ছাড়া উদ্ভিদ কী আরোহণ করত?
      - বেড়া কিভাবে লতাকে আকার দেয়?
      - আরোহণ এবং সমর্থনের মধ্যে সম্পর্ক কী?
  - id: nmg_worm_cast
    name: কেঁচোর মল
    prompt: |
      কেঁচোর মল — মাটির ছোট স্তূপ — লনে বিন্দু বিন্দু। কেঁচো চলে গেছে,
      উর্বরতা রেখে গেছে। মল প্রত্নতত্ত্ব। কেঁচো কী প্রক্রিয়া করেছে?
      এটি কী পিছনে রেখে গেছে?
    follow_ups:
      - কেঁচো ছাড়া মাটি কেমন হবে?
      - মল কিভাবে কেঁচোর কাজ চিহ্নিত করে?
      - মল এবং বায়ুচলাচলের মধ্যে সম্পর্ক কী?
  - id: nmg_squirrel_cache
    name: কাঠবিড়ালীর ভান্ডার
    prompt: |
      একটি কাঠবিড়ালী একটি বাদাম কবর দেয় — তারপর ভুলে যায়। বাদাম অঙ্কুরিত হতে পারে।
      কাঠবিড়ালী একটি দুর্ঘটনাজনিত উদ্যানপালক। স্মৃতি এবং বিস্তারের মধ্যে সম্পর্ক বিবেচনা করুন।
      ভুলে যাওয়া থেকে কী জন্মায়?
    follow_ups:
      - কাঠবিড়ালী ছাড়া ওক গাছ কেমন হবে?
      - ভান্ডার কিভাবে বন বিস্তারকে আকার দেয়?
      - কবর দেওয়া এবং অঙ্কুরিত হওয়ার মধ্যে সম্পর্ক কী?
  - id: nmg_dew_morning
    name: শিশির সকাল
    prompt: |
      সকালের শিশির পাতায় পুঁতি তৈরি করে। প্রতিটি ফোঁটা আলো ধরে রাখে।
      শিশির ঘনীভবন — বাতাস থেকে জল। এটি দুপুরের মধ্যে বাষ্পীভূত হবে।
      অস্থায়ী উপহার বিবেচনা করুন। উদ্ভিদ কী গ্রহণ করে?
    follow_ups:
      - শিশির ছাড়া পাতা কেমন হবে?
      - পুঁতি কিভাবে সকালকে আকার দেয়?
      - ঘনীভবন এবং পাতার মধ্যে সম্পর্ক কী?
  - id: nmg_prune_scar
    name: ছাঁটাইয়ের দাগ
    prompt: |
      একটি ডাল কাটার পর ছাঁটাইয়ের দাগ থাকে। গাছ সেরে উঠেছে — অথবা চেষ্টা করেছে।
      দাগটি ইতিহাস। কী সরানো হয়েছিল? কেন? গাছ কী মনে রাখে?
    follow_ups:
      - ছাঁটাই ছাড়া গাছ কেমন হবে?
      - কাটা কিভাবে বৃদ্ধিকে আকার দেয়?
      - ক্ষত এবং আকারের মধ্যে সম্পর্ক কী?
  - id: nmg_sunflower_turn
    name: সূর্যমুখী ঘোরা
    prompt: |
      একটি তরুণ সূর্যমুখী সূর্যোদয় থেকে সূর্যাস্ত পর্যন্ত সূর্যের সাথে ঘোরে — ভোরে পূর্ব দিকে,
