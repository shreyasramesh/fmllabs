# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然界微观 — 昆虫领地 (Mandarin Chinese)

id: natural_microcosm_insect_territories
name: 自然界微观 — 昆虫领地
description: 50 张卡牌，从蚂蚁的踪迹、蜜蜂的交通到蜘蛛网、领地争夺和蚁群的协作，颠覆你对昆虫世界的认知。
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: 蚂蚁踪迹
    prompt: |
      蚂蚁会形成踪迹——连接巢穴和食物的费洛蒙路径。观察其流动。
      双向车道：外出和返回。这条踪迹是群体决策的结果。
      什么会破坏这条踪迹？
    follow_ups:
      - 踪迹是如何自我强化的？
      - 没有踪迹，蚁群会怎样？
      - 踪迹与蚁群的关系是什么？
  - id: nmi_bee_traffic
    name: 蜜蜂交通
    prompt: |
      蜂巢入口——蜜蜂穿梭其中。交通有其节奏。有些携带花粉；有些不带。
      考虑一下这其中的编排。谁决定了这种模式？
    follow_ups:
      - 没有交通，蜂巢会怎样？
      - 入口如何塑造了流动？
      - 蜜蜂与蜂巢的关系是什么？
  - id: nmi_spider_web
    name: 蜘蛛网
    prompt: |
      蜘蛛网是领地也是陷阱。蜘蛛在边缘等待。
      振动传递信息。考虑其结构。蜘蛛网捕捉了什么？排斥了什么？
    follow_ups:
      - 没有蜘蛛网，蜘蛛会怎样？
      - 蜘蛛网如何延伸了蜘蛛的感知？
      - 丝线与生存的关系是什么？
  - id: nmi_dragonfly_claim
    name: 蜻蜓宣示领地
    prompt: |
      蜻蜓巡逻一段池塘——来回飞舞。它在宣示领地。
      驱赶竞争对手。追求配偶。考虑其所争夺的。它在捍卫什么？
    follow_ups:
      - 没有领地，蜻蜓会怎样？
      - 巡逻如何传达了所有权？
      - 空间与繁殖的关系是什么？
  - id: nmi_caterpillar_munch
    name: 毛毛虫啃食
    prompt: |
      毛毛虫在进食——叶子的边缘逐渐消失。进食持续不断。
      毛毛虫是一个转换机器。考虑其速率。没有了食草动物，植物会怎样？
    follow_ups:
      - 毛毛虫如何塑造了叶子？
      - 没有了啃食，蝴蝶会怎样？
      - 消耗与生长的关系是什么？
  - id: nmi_beetle_battle
    name: 甲虫之战
    prompt: |
      两只甲虫相遇——也许是锹甲，也许是粪金龟。它们扭打在一起。
      这场战斗充满仪式感。考虑其赌注。赢得了什么？失去了什么？
    follow_ups:
      - 失败者会怎样？
      - 战斗如何解决？
      - 战斗与交配的关系是什么？
  - id: nmi_firefly_flash
    name: 萤火虫闪烁
    prompt: |
      萤火虫闪烁——每个物种都有自己的代码。这种模式是求偶。
      考虑这个信号。错误的闪烁意味着什么？在黑暗中它们如何找到彼此？
    follow_ups:
      - 闪烁如何编码了物种信息？
      - 没有萤火虫，草地会怎样？
      - 光与配偶的关系是什么？
  - id: nmi_aphid_farm
    name: 蚜虫农场
    prompt: |
      蚂蚁饲养蚜虫——它们轻抚蚜虫，保护它们。蚜虫分泌蜜露。
      蚂蚁收集蜜露。考虑这种合作。谁受益？谁被剥削？
    follow_ups:
      - 没有蚂蚁，蚜虫会怎样？
      - 这种“农耕”如何塑造了这两种生物？
      - 饲养与掠取的（蜜露）关系是什么？
  - id: nmi_cicada_shell
    name: 蝉蜕
    prompt: |
      蝉蜕附着在树皮上——若虫已羽化。蜕下的壳是空的，但很完整。
      考虑这次蜕变。昆虫留下了什么？获得了什么？
    follow_ups:
      - 没有蜕变，蝉会怎样？
      - 蝉蜕如何标志着这种转变？
      - 蜕落与生长的关系是什么？
  - id: nmi_leaf_miner
    name: 潜叶虫
    prompt: |
      叶片内的一条路径——潜叶虫的轨迹。幼虫在叶片夹层中进食。
      叶子记录了它的行踪。考虑这个隧道。从内部看叶子会是怎样的？
    follow_ups:
      - 没有潜叶虫，叶子会怎样？
      - 虫道如何保护了幼虫？
      - 内部与外部的关系是什么？
  - id: nmi_wasp_nest
    name: 黄蜂巢
    prompt: |
      纸质黄蜂巢——六边形巢室，用嚼碎的木屑建造。巢穴既是建筑，也是堡垒。
      考虑这个群体。谁建造？谁防守？谁繁殖？
    follow_ups:
      - 没有巢穴，黄蜂会怎样？
      - 巢穴如何塑造了社会结构？
      - 纸（或巢材）与蜂群的关系是什么？
  - id: nmi_grasshopper_leap
    name: 蚱蜢跳跃
    prompt: |
      蚱蜢跳跃——腿部伸展，瞬间消失。跳跃是逃跑或接近。
      考虑其触发因素。蚱蜢看到了什么？听到了什么？
    follow_ups:
      - 没有跳跃，蚱蜢会怎样？
      - 跳跃如何避免被捕食？
      - 腿与飞行（或跳跃）的关系是什么？
  - id: nmi_mantis_still
    name: 螳螂静止
    prompt: |
      螳螂静止不动——它是一个猎手。猎物接近。突然出击。
      考虑其耐心。静止需要付出什么代价？又带来了什么？
    follow_ups:
      - 没有静止的等待，螳螂会怎样？
      - 静止如何进行欺骗？
      - 耐心与捕获的关系是什么？
  - id: nmi_bumblebee_buzz
    name: 熊蜂嗡鸣
    prompt: |
      熊蜂嗡鸣——它振动。有些花朵需要震动授粉。
      蜜蜂通过振动使花粉脱落。考虑这种合作。没有嗡鸣，花朵会怎样？
    follow_ups:
      - 嗡鸣如何释放花粉？
      - 没有震动授粉，熊蜂会怎样？
      - 振动与受精的关系是什么？
  - id: nmi_butterfly_territory
    name: 蝴蝶领地
    prompt: |
      蝴蝶栖息在高处——逐顶。它在那里等待配偶。
      驱赶竞争对手。考虑其策略。为什么是这个地点？它有什么价值？
    follow_ups:
      - 没有栖息点，蝴蝶会怎样？
      - 逐顶行为如何塑造了交配？
      - 地点与邂逅的关系是什么？
  - id: nmi_earwig_pincer
    name: 蠼螋钳
    prompt: |
      蠼螋有钳子——尾铗。它们用于防御、折叠翅膀、处理猎物。
      考虑这个工具。没有钳子，蠼螋会怎样？
    follow_ups:
      - 钳子如何塑造了行为？
      - 没有它，防御会是什么样子？
      - 形态与功能的关系是什么？
  - id: nmi_katydid_call
    name: 蝈蝈鸣叫
    prompt: |
      蝈蝈鸣叫——通过翅膀摩擦发声。叫声是物种特有的。
      它是求偶，是宣示领地。考虑这个声音。没有它，夜晚会是怎样？
    follow_ups:
      - 鸣叫如何吸引配偶？
      - 鸣叫会让蝈蝈承担什么风险？
      - 声音与被捕食的关系是什么？
  - id: nmi_ladybug_cluster
    name: 瓢虫聚集
    prompt: |
      瓢虫在冬天聚集——几十只，几百只。它们聚集是为了取暖，为了庇护。
      考虑这种聚集。是什么触发了它？又是什么使它们分散？
    follow_ups:
      - 没有聚集，瓢虫会怎样？
      - 聚集如何创造了微气候？
      - “群体”与生存的关系是什么？
  - id: nmi_ant_carry
    name: 蚂蚁搬运
    prompt: |
      一只蚂蚁搬运另一只——死去的或受伤的。这是帮助。蚁群关爱同类。
      考虑这种行为。受伤的蚂蚁独自会怎样？搬运者获得了什么？
    follow_ups:
      - 搬运如何服务于蚁群？
      - 没有合作，蚁群会怎样？
      - 个体与集体的关系是什么？
  - id: nmi_mosquito_hover
    name: 蚊子悬停
    prompt: |
      蚊子悬停——试探，探查。它在寻找宿主。悬停是评估。
      考虑叮咬前的这一刻。蚊子探测到了什么？是什么决定了（叮咬）？
    follow_ups:
      - 没有悬停，蚊子会怎样？
      - 悬停如何最大限度地减少被发现？
      - 探查与进食的关系是什么？
  - id: nmi_weevil_curl
    name: 象鼻虫卷叶
    prompt: |
      叶子卷曲——这是象鼻虫或瘿螨造成的。叶子卷起来包裹幼虫。
      考虑这种操纵。植物被说服了。没有昆虫，叶子会怎样？
    follow_ups:
      - 卷曲如何保护了幼虫？
      - 没有卷曲，植物会怎样？
      - 昆虫与植物形态的关系是什么？
  - id: nmi_honeybee_waggle
    name: 蜜蜂摇摆舞
    prompt: |
      蜜蜂跳摇摆舞——这是一种舞蹈。舞蹈编码了与花的距离和方向。
      其他蜜蜂会观察。考虑这个信息。没有摇摆舞，蜂群会怎样？
    follow_ups:
      - 舞蹈如何传递信息？
      - 没有它，觅食会是怎样？
      - 舞蹈与发现的关系是什么？
  - id: nmi_gnat_cloud
    name: 蠓虫云
    prompt: |
      蠓虫成群——一团微小的昆虫。这种聚集是为了交配。雄性聚集；
      雌性进入并选择。考虑这种聚集。蠓虫独自会怎样？
    follow_ups:
      - 聚集如何促成了交配？
      - 没有蠓虫云，蠓虫会怎样？
      - “群体”与邂逅的关系是什么？
  - id: nmi_spider_wrap
    name: 蜘蛛缠绕
    prompt: |
      蜘蛛缠绕猎物——用丝线包裹挣扎的昆虫。缠绕使其无法动弹。
      蜘蛛注入酶。考虑这个过程。没有缠绕，蜘蛛会怎样？
    follow_ups:
      - 缠绕如何制服猎物？
      - 没有它，蜘蛛会承担什么风险？
      - 丝线与消化的关系是什么？
  - id: nmi_ant_war
    name: 蚂蚁战争
    prompt: |
      两个蚁群相遇——发生冲突。工蚁搏斗，撕咬。边界被争夺。
      考虑这场战斗。有什么风险？边界如何决定？
    follow_ups:
      - 没有战争，蚁群会怎样？
      - 战争如何解决？
      - 领地与资源的关系是什么？
  - id: nmi_moth_flutter
    name: 飞蛾扑火
    prompt: |
      飞蛾在灯光下扑腾——被吸引，困惑。灯光扰乱了导航。
      考虑这个陷阱。在黑暗中飞蛾会怎样？为什么灯光会让它迷失方向？
    follow_ups:
      - 没有灯光，飞蛾会怎样？
      - 飞蛾通常如何利用月光？
      - 光与方向的关系是什么？
  - id: nmi_stick_insect_still
    name: 竹节虫静止
    prompt: |
      竹节虫一动不动——它看起来像一根树枝。捕食者经过。
      考虑这种伪装。没有这种伪装，竹节虫会怎样？它可以保持这个姿势多久？
    follow_ups:
      - 静止如何提供保护？
      - 移动会给竹节虫带来什么风险？
      - 形态与生存的关系是什么？
  - id: nmi_leafcutter_carry
    name: 切叶蚁搬运
    prompt: |
      一只切叶蚁搬运着一片叶子碎片——比它大几倍。叶子被运回巢穴。
      它成为真菌的基质。考虑这种收获。没有叶子，蚁群会怎样？
    follow_ups:
      - 真菌如何利用叶子？
      - 没有真菌，蚂蚁会吃什么？
      - 收获与栽培的关系是什么？
  - id: nmi_housefly_clean
    name: 家蝇自洁
    prompt: |
      家蝇清洁自身——摩擦腿部，抚摸翅膀。这种梳理能清除污垢，保持感官。
      考虑这个仪式。没有清洁，家蝇会怎样？
    follow_ups:
      - 梳理如何维持功能？
      - 如果家蝇无法清洁会发生什么？
      - 清洁与感官的关系是什么？
  - id: nmi_termite_mound
    name: 白蚁丘
    prompt: |
      白蚁丘高高耸起——用泥土、唾液、嚼碎的木头建造。它是一座城市。
      里面有隧道、房间、真菌花园。考虑这个建筑。没有白蚁丘，蚁群会怎样？
    follow_ups:
      - 白蚁丘如何调节气候？
      - 没有这个结构，白蚁会怎样？
      - 白蚁丘与蚁群的关系是什么？
  - id: nmi_cricket_chirp
    name: 蟋蟀鸣叫
    prompt: |
      蟋蟀鸣叫——翅膀摩擦。叫声是求偶。雌性通过声音来选择。
      考虑这个叫声。没有鸣叫，蟋蟀会怎样？除了雌性，还有谁在听？
    follow_ups:
      - 鸣叫如何编码了健康状况？
      - 没有声音，草地会怎样？
      - 叫声与被捕食的关系是什么？
  - id: nmi_damselfly_tandem
    name: 豆娘并排交配
    prompt: |
      豆娘并排交配——雄性抓住雌性的头部后面。雌性弯曲身体接受精子。
      它们可能一起飞舞。考虑这种结合。没有这种连接，交配会是怎样？
    follow_ups:
      - 并排交配如何保护了雄性的投资？
      - 没有这种连接，这对豆娘会怎样？
      - 连接与受精的关系是什么？
  - id: nmi_roach_scatter
    name: 蟑螂逃散
    prompt: |
      打开灯——蟑螂四散逃去。它们寻找缝隙。逃散是逃跑。
      考虑这种反应。在永久的光线下蟑螂会怎样？为什么需要黑暗？
    follow_ups:
      - 逃散如何减少被捕食？
      - 没有这种反射，蟑螂会怎样？
      - 光与躲藏的关系是什么？
  - id: nmi_hopper_nymph
    name: 跳蝽若虫
    prompt: |
      一只年轻的蚱蜢——若虫。它还没有翅膀。它跳跃。
      考虑这个阶段。若虫会变成什么？它现在缺少什么？
    follow_ups:
      - 没有若虫阶段，蚱蜢会怎样？
      - 若虫如何避免捕食者？
      - 蜕化与翅膀的关系是什么？
  - id: nmi_sweat_bee
    name: 汗蜂
    prompt: |
      汗蜂落在你的皮肤上——寻找盐分。汗水是一种资源。
      考虑这次相遇。没有汗水，汗蜂会怎样？它为什么需要盐？
    follow_ups:
      - 汗蜂如何利用盐分？
      - 落在皮肤上会给汗蜂带来什么风险？
      - 人类与汗蜂的关系是什么？
  - id: nmi_army_ant_column
    name: 行军蚁队列
    prompt: |
      行军蚁行进——成千上万的队伍。它们像水流一样。猎物被压倒。
      考虑这种蜂拥。没有队列，行军蚁会怎样？它们如何协调？
    follow_ups:
      - 队列如何促成了捕食？
      - 没有行军蚁，森林会怎样？
      - “群体”与力量的关系是什么？
  - id: nmi_water_strider_leg
    name: 水黾腿
    prompt: |
      水黾的腿——长而疏水。它们分散重量。水面支撑着它。
      考虑这种适应。没有腿的设计，水黾会怎样？
    follow_ups:
      - 腿部形状如何分散了力？
      - 在陆地上水黾会怎样？
      - 形态与表面的关系是什么？
  - id: nmi_aphid_wing
    name: 蚜虫翅膀
    prompt: |
      有些蚜虫有翅膀——当拥挤或宿主衰退时。它们开始扩散。
      考虑这种转变。什么触发了翅膀的发育？翅膀的代价是什么？
    follow_ups:
      - 拥挤如何诱发了翅膀？
      - 没有翅膀这个选项，蚜虫会怎样？
      - 翅膀与扩散的关系是什么？
  - id: nmi_scale_armor
    name: 介壳虫的盔甲
    prompt: |
      介壳虫看起来像凸起——它们有盔甲。它们很少移动。
      它们吸食植物的汁液。考虑这种策略。没有盔甲，介壳虫会怎样？
    follow_ups:
      - 盔甲如何提供保护？
      - 没有介壳虫，植物会怎样？
      - 静止与防御的关系是什么？
  - id: nmi_caddisfly_case
    name: 石蚕虫的巢
    prompt: |
      石蚕虫幼虫建造一个巢——用树枝、沙子、小石子。它背着这个巢。
      这个巢是伪装也是盔甲。考虑这种建造。没有它，幼虫会怎样？
    follow_ups:
      - 巢如何提供保护？
      - 如果材料改变，幼虫会用什么？
      - 建造与生存的关系是什么？
  - id: nmi_leafhopper_flash
    name: 叶蝉跳跃
    prompt: |
      叶蝉跳跃——突然消失。它不见了。跳跃是逃避。腿部储存能量，然后释放。
      考虑这个机制。没有跳跃，叶蝉会怎样？
    follow_ups:
      - 跳跃如何避免被捕获？
      - 没有叶蝉，叶子会怎样？
      - 跳跃与被捕食的关系是什么？
  - id: nmi_bombardier_blast
    name: 放射虫喷射
    prompt: |
      放射虫喷射——热的，有毒的。这是防御。喷射是化学反应：两个腔室，在出口处发生反应。
      考虑这个武器。没有它，放射虫会怎样？
    follow_ups:
      - 喷射如何威慑捕食者？
      - 喷射会给放射虫带来什么风险？
      - 化学与防御的关系是什么？
  - id: nmi_silverfish_slip
    name: 银鱼滑行
    prompt: |
      银鱼滑入缝隙——速度很快。它很扁平。它能钻进去。
      考虑它的形态。没有扁平的身体，银鱼会怎样？为什么如此急切？
    follow_ups:
      - 扁平的身体如何帮助它逃脱？
      - 在开阔的地方银鱼会怎样？
      - 形态与避难所的关系是什么？
  - id: nmi_ant_queen
    name: 蚁后
    prompt: |
      蚁群有一个蚁后——或几个。她产卵。工蚁照顾她。
      考虑这个中心。没有蚁后，蚁群会怎样？蚁群如何替换她？
    follow_ups:
      - 蚁后如何塑造了蚁群？
      - 没有她，工蚁会怎样？
      - 蚁后与蚁群的关系是什么？
  - id: nmi_owlfly_larva
    name: 脉翅目幼虫
    prompt: |
      脉翅目幼虫潜伏等待——藏在沙土里，藏在杂物中。它伏击。下颚猛击。
      考虑这个猎手。没有伏击，幼虫会怎样？它会变成什么？
    follow_ups:
      - 伏击如何促成了进食？
      - 没有幼虫阶段，脉翅目成虫会怎样？
      - 等待与捕获的关系是什么？
  - id: nmi_thrips_scatter
    name: 蓟马分散
    prompt: |
      蓟马非常小——几乎看不见。它们聚集在花朵、叶子上。
      它们刺吸汁液。考虑它们的尺度。没有蓟马，植物会怎样？我们会注意到什么？
    follow_ups:
      - 蓟马如何塑造植物？
      - 没有它们，生态系统会怎样？
      - “微小”与影响的关系是什么？
  - id: nmi_sting_threat
    name: 蜇刺威胁
    prompt: |
      一只黄蜂抬起腹部——准备蜇刺。这是一种威胁。这种姿势传达了信息。
      考虑这种展示。如果被忽视，黄蜂会怎样？这种姿势需要付出什么代价？
    follow_ups:
      - 威胁如何起到威慑作用？
      - 蜇刺会给黄蜂带来什么风险？
      - 展示与防御的关系是什么？
  - id: nmi_velvet_ant
    name: 绒蚁（无翅黄蜂）
    prompt: |
      一只绒蚁爬行——它是一种无翅的黄蜂。它很坚韧。捕食者学会避开它。
      它的蜇刺很厉害。考虑它的策略。没有蜇刺，绒蚁会怎样？
    follow_ups:
      - 蜇刺如何提供保护？
      - 在地表，绒蚁会怎样？
      - 蜇刺与勇气的关系是什么？
  - id: nmi_ambush_predator
    name: 伏击捕食者
    prompt: |
      一只伏击虫在花上等待——黄色的，伪装得很好。猎物到来。虫子发动攻击。
      考虑它的耐心。没有花，这只虫会怎样？为什么选择这个栖息点？
    follow_ups:
      - 花朵如何吸引猎物？
      - 没有伏击，这只虫会怎样？
      - 地点与捕获的关系是什么？
  - id: nmi_nectar_flow
    name: 花蜜流
    prompt: |
      花朵产生花蜜——蜜蜂、蝴蝶、甲虫会来饮用。花蜜的量各不相同。
      考虑这种经济。没有花蜜，花朵会怎样？昆虫会怎样？
    follow_ups:
      - 花蜜如何塑造了访问行为？
      - 没有这种奖励，授粉会怎样？
      - 流动（花蜜）与服务（授粉）的关系是什么？
  - id: nmi_territory_mark
    name: 领地标记
    prompt: |
      有些昆虫会标记领地——用费洛蒙，用视觉展示。标记表示“我的”。
      考虑这种宣告。没有标记，这片空间会怎样？竞争对手如何解读它？
    follow_ups:
      - 标记如何阻止入侵者？
      - 没有领地，昆虫会怎样？
      - 标记与空间的关系是什么？
