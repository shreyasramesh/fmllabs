# الكون المصغر الطبيعي — البركة والبركة الصغيرة (Arabic)

id: natural_microcosm_pond_puddle
name: الكون المصغر الطبيعي — البركة والبركة الصغيرة
description: 50 بطاقة لتغيير نظرتك إلى الماء على نطاق صغير — من التوتر السطحي والانعكاسات إلى الحشرات المائية، والشرغوف، والحياة في البرك المؤقتة.
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: التوتر السطحي
    prompt: |
      يسير ستريدر الماء على الماء. السطح يمسك — الجزيئات تتشبث. أسقط دبوسًا بلطف. إنه يطفو. فكر في الفيلم غير المرئي. ماذا سيكسره؟
    follow_ups:
      - كيف يشكل التوتر السطحي من يمكنه العيش هنا؟
      - ماذا ستكون البركة بدونه؟
      - ما هي العلاقة بين السطح والحدود؟
  - id: nmp_skater_ripple
    name: تموج السترايدر
    prompt: |
      تغوص أرجل ستريدر الماء في السطح. كل خطوة تخلق تموجًا. راقب النمط. يقرأ السترايدر السطح كخريطة. ماذا يستشعر؟
    follow_ups:
      - كيف يحمل التموج المعلومات؟
      - ماذا سيفعل السترايدر بدونه؟
      - ما هي العلاقة بين التموج والفريسة؟
  - id: nmp_reflection_sky
    name: انعكاس السماء
    prompt: |
      تعكس بركة صغيرة السماء — أو غصنًا، أو أنت. الانعكاس مقلوب. الماء الساكن مرآة. ماذا يضيف الانعكاس؟ ماذا يخفي؟
    follow_ups:
      - ماذا ستكون البركة الصغيرة بدون انعكاس؟
      - كيف يشكل السكون ما نراه؟
      - ما هي العلاقة بين السطح والصورة؟
  - id: nmp_tadpole_tail
    name: ذيل الشرغوف
    prompt: |
      يسبح الشرغوف — الذيل يدفعه. سيتم إعادة امتصاص الذيل. الحيوان يتحول. فكر في ما بينهما. ماذا يمكّن الذيل الآن؟
    follow_ups:
      - ماذا سيكون الشرغوف بدونه؟
      - كيف تعيد التحولات إعادة كتابة الجسم؟
      - ما هي العلاقة بين الشكل والوظيفة؟
  - id: nmp_dragonfly_egg
    name: بيوض اليعسوب
    prompt: |
      تضع اليعاسيب بيوضها في الماء — أو في سيقان تحت السطح. اليرقة تعيش تحت الماء لسنوات قبل الظهور. فكر في الحياة المنقسمة. ماذا يربط الماء والهواء؟
    follow_ups:
      - ماذا سيكون اليعسوب بدون المرحلة المائية؟
      - كيف تشكل اليرقة البركة؟
      - ما هي العلاقة بين اليرقة والبالغة؟
  - id: nmp_algae_bloom
    name: ازدهار الطحالب
    prompt: |
      طحالب خضراء على الماء — الطحالب. إنه ازدهار، نبض. الكثير من المغذيات، الكثير من الشمس. البركة تستجيب. ماذا يسبب ذلك؟ ماذا يتبع؟
    follow_ups:
      - ماذا ستكون البركة بدون الطحالب؟
      - كيف يؤثر الازدهار على الأكسجين؟
      - ما هي العلاقة بين المغذيات والنمو؟
  - id: nmp_reed_stem
    name: ساق القصب
    prompt: |
      ترتفع القصبات والروطان من الحافة. إنها مجوفة — قنوات هوائية تمر عبرها. الساق يربط الماء والهواء. من يستخدم القصب كسلم؟
    follow_ups:
      - ماذا ستكون الحافة بدون القصب؟
      - كيف يمكّن التجويف البقاء؟
      - ما هي العلاقة بين الساق والموطن؟
  - id: nmp_pond_skin
    name: جلد البركة
    prompt: |
      للبركة جلد — حيث يلتقي الماء بالهواء. الغبار يسقط عليه. الزيت ينتشر. الجلد رقيق. المسّه. ماذا يفصل الجلد؟
    follow_ups:
      - ماذا ستكون البركة بدون الجلد؟
      - كيف يؤثر الجلد على تبادل الغازات؟
      - ما هي العلاقة بين السطح والعمق؟
  - id: nmp_temporary_pool
    name: بركة مؤقتة
    prompt: |
      بركة صغيرة بعد المطر — ستجف. ومع ذلك، فقد تكيفت الحياة. الروبيان الخيالي، والروبيان الشرغوفي، والبيض الذي ينتظر. فكر في الإلحاح. ماذا يجب أن يحدث قبل أن يذهب الماء؟
    follow_ups:
      - ماذا ستكون البركة الصغيرة إذا كانت دائمة؟
      - كيف يشكل المؤقت الاستراتيجية؟
      - ما هي العلاقة بين الوقت والتكيف؟
  - id: nmp_whirligig_gyre
    name: دوامة الدوامة
    prompt: |
      تدور خنافس الدوامة على السطح. إنها ترى فوق وتحت — عيون مقسمة. إنها مفترسة وفريسة. فكر في الرؤية المزدوجة. ماذا تمكّن؟
    follow_ups:
      - ماذا ستكون الخنفساء بدون رؤية مقسمة؟
      - كيف تربك الدوامة المفترسات؟
      - ما هي العلاقة بين الدوران والبقاء؟
  - id: nmp_diving_spider
    name: عنكبوت الغوص
    prompt: |
      يحمل عنكبوت الغوص فقاعة هواء — جرس غوص. يتنفس تحت الماء. الفقاعة رئة. فكر في الاختراع. ماذا سيفعل العنكبوت بدونها؟
    follow_ups:
      - كيف تمكّن الفقاعة الصيد؟
      - ماذا سيحدث إذا انفجرت الفقاعة؟
      - ما هي العلاقة بين الهواء والماء؟
  - id: nmp_pond_scum
    name: طحالب البركة
    prompt: |
      تتكون الطحالب على الحافة — حبوب اللقاح، الغبار، الطحالب، الحشرات. إنها طبقة حدودية. ماذا يتجمع هناك؟ من يتغذى عليها؟ الطحالب مرشح.
    follow_ups:
      - ماذا ستكون البركة بدون الطحالب؟
      - كيف تركز الحافة الحياة؟
      - ما هي العلاقة بين الحدود والتراكم؟
  - id: nmp_ice_surface
    name: سطح الجليد
    prompt: |
      في الشتاء، تتجمد البركة. الجليد يحتفظ. تحته، تستمر الحياة — أبطأ، أبرد. فكر في الحاجز. ماذا يحمي الجليد؟ ماذا يمنع؟
    follow_ups:
      - ماذا ستكون البركة بدون الجليد؟
      - كيف يؤثر التجمد على الأكسجين؟
      - ما هي العلاقة بين الجليد والبقاء؟
  - id: nmp_minnow_school
    name: سرب أسماك المنوة
    prompt: |
      تتجمع أسماك المنوة — تتحرك كوحدة واحدة. السرب دفاع، كفاءة. راقب التزامن. ماذا ينسقها؟ ماذا سيخاطر سمك المنوة الوحيد؟
    follow_ups:
      - ماذا ستكون البركة بدون السرب؟
      - كيف يقلل التجمع من الافتراس؟
      - ما هي العلاقة بين الفرد والجماعة؟
  - id: nmp_lily_pad
    name: ورقة زنبق الماء
    prompt: |
      تطفو ورقة زنبق الماء. الجزء السفلي منها يختلف عن الجزء العلوي — شعيرات، لون. الورقة منصة. ماذا يهبط عليها؟ ماذا يعيش تحتها؟
    follow_ups:
      - ماذا ستكون البركة بدون أوراق زنبق الماء؟
      - كيف تشكل الورقة الضوء في الأسفل؟
      - ما هي العلاقة بين الورقة والظل؟
  - id: nmp_ripple_spread
    name: انتشار التموج
    prompt: |
      تسقط حجر. تنتشر الأمواج. تتداخل، تتفاعل. النمط يحمل الطاقة. فكر في التلاشي. إلى أي مدى تسافر الأمواج؟
    follow_ups:
      - ماذا سيكون السطح بدون تموجات؟
      - كيف يميز التموج التأثير؟
      - ما هي العلاقة بين الاضطراب والانتشار؟
  - id: nmp_mosquito_wiggle
    name: اهتزاز البعوض
    prompt: |
      تتدلى يرقات البعوض من السطح — زواحف. تتنفس عبر سيفون. الاهتزاز هو الحركة، التغذية. فكر في عالم اليرقة. ماذا تأكل؟
    follow_ups:
      - ماذا ستكون البركة بدون البعوض؟
      - كيف يتجنب الاهتزاز المفترسات؟
      - ما هي العلاقة بين اليرقة والبالغة؟
  - id: nmp_leaf_boat
    name: قارب الأوراق
    prompt: |
      ورقة تطفو — سقطت، تنجرف. إنها طوف لبعض، طعام لآخرين. الورقة ستغرق، تتحلل. تتبع رحلتها. ماذا ستصبح؟
    follow_ups:
      - ماذا سيكون السطح بدون حطام عائم؟
      - كيف تخلق الورقة موطنًا صغيرًا؟
      - ما هي العلاقة بين الطفو والغرق؟
  - id: nmp_backswimmer_top
    name: ظهر السباح العلوي
    prompt: |
      يسبح السباح الخلفي مقلوبًا — بطنه نحو السماء. يجدف بساقيه. يتنفس عند السطح، ثم يغوص. فكر في الانقلاب. لماذا مقلوبًا؟
    follow_ups:
      - ماذا سيكون السباح الخلفي إذا كان طبيعيًا؟
      - كيف يساعد الوضع على الصيد؟
      - ما هي العلاقة بين الاتجاه والفريسة؟
  - id: nmp_snail_trail
    name: أثر الحلزون
    prompt: |
      ينزلق حلزون البركة. يترك أثرًا — مخاط، حركة. الأثر يحدد أين ذهب. قد تتبعه حلزونات أخرى. فكر في المسار. ماذا يبلغ الأثر؟
    follow_ups:
      - ماذا سيكون الحلزون بدونه؟
      - كيف يمكّن المخاط الحركة؟
      - ما هي العلاقة بين الأثر والتتبع؟
  - id: nmp_dew_drop
    name: قطرة الندى
    prompt: |
      يتشكل الندى على نصل فوق الماء — حبات، انعكاسات. إنه تكثف. القطرة تحمل. ثم تسقط. فكر في القطيرة. ماذا تضخم؟
    follow_ups:
      - ماذا سيكون النصل بدون الندى؟
      - كيف تثني القطيرة الضوء؟
      - ما هي العلاقة بين القطرة والسطح؟
  - id: nmp_spring_constant
    name: ثابت الربيع
    prompt: |
      يغذي الربيع البركة — أو تتسرب البركة. مستوى الماء هو توازن. فكر في المدخلات والمخرجات. ماذا يدعم البركة؟ ماذا سيجففها؟
    follow_ups:
      - ماذا ستكون البركة بدون الربيع؟
      - كيف يشكل المصدر الماء؟
      - ما هي العلاقة بين المدخلات والحياة؟
  - id: nmp_edge_ecotone
    name: منطقة انتقالية للحافة
    prompt: |
      حافة البركة منطقة انتقالية — انتقال. الرطب يلتقي بالجاف. تتكيف النباتات. تعبر الحيوانات. الحافة تنوع. ماذا يزدهر في ما بينهما؟
    follow_ups:
      - ماذا ستكون البركة بدون الحافة؟
      - كيف تخلق المنطقة الانتقالية الفرصة؟
      - ما هي العلاقة بين الحدود والتنوع؟
  - id: nmp_frog_eye
    name: عين الضفدع
    prompt: |
      يجلس ضفدع على الحافة. عيناه تنتفخان — يرى فوقه وإلى الأمام. الضفدع ثابت. ثم يندفع اللسان. فكر في الصبر. ماذا ينتظر؟
    follow_ups:
      - ماذا سيكون الضفدع بدون العيون المنتفخة؟
      - كيف يمكّن السكون الانقضاض؟
      - ما هي العلاقة بين الانتظار والإمساك؟
  - id: nmp_oxygen_bubble
    name: فقاعة الأكسجين
    prompt: |
      تنتج النباتات في البركة الأكسجين — ترتفع الفقاعات. في يوم مشمس، تتنفس المياه. فكر في التبادل. ماذا ستكون البركة بدون التمثيل الضوئي؟
    follow_ups:
      - كيف يشكل الأكسجين من يمكنه العيش هنا؟
      - ماذا يحدث عندما ينخفض الأكسجين؟
      - ما هي العلاقة بين الضوء والتنفس؟
  - id: nmp_detritus_floor
    name: أرضية الركام
    prompt: |
      قاع البركة هو ركام — أوراق متساقطة، حشرات ميتة، رواسب. إنها طبقة تحلل. ماذا يعيش فيها؟ من يتغذى عليها؟ القاع مخزن.
    follow_ups:
      - ماذا ستكون البركة بدون الركام؟
      - كيف تغذي الأرضية عمود الماء؟
      - ما هي العلاقة بين القاع والقمة؟
  - id: nmp_rain_ring
    name: حلقة المطر
    prompt: |
      يضرب المطر السطح. كل قطرة تصنع حلقة — تاجًا، ثم فوهة. المطر ينقش الماء. فكر في النمط. ماذا سيعني السطح الساكن؟
    follow_ups:
      - كيف ينقي المطر الماء؟
      - ماذا تكسر الحلقات؟
      - ما هي العلاقة بين المطر والسطح؟
  - id: nmp_duckweed_carpet
    name: بساط طحلب الأشن
    prompt: |
      يشكل طحلب الأشن بساطًا على السطح — نباتات عائمة صغيرة. تتكاثر بسرعة. البساط يظلل ما بالأسفل. فكر في التغطية. ماذا تعني الشمس الكاملة؟
    follow_ups:
      - ماذا ستكون البركة بدون طحلب الأشن؟
      - كيف يؤثر البساط على درجة الحرارة؟
      - ما هي العلاقة بين التغطية والحياة بالأسفل؟
  - id: nmp_phantom_midgie
    name: يرقة الهاموش الشبح
    prompt: |
      يرقات الهاموش الشبح شفافة — شبحية. تتدلى في الماء. ترى من خلالها. فكر في الشفافية. ماذا تحمي الشفافية؟
    follow_ups:
      - ماذا ستكون اليرقة إذا كانت غير شفافة؟
      - كيف تساعد الشفافية في الصيد؟
      - ما هي العلاقة بين الشفافية والبقاء؟
  - id: nmp_skimmer_skip
    name: قفزة القاذف
    prompt: |
      حجر تم قذفه عبر السطح — واحد، اثنان، ثلاثة. كل ارتداد ينقل الطاقة. القاذف يغرق في النهاية. فكر في الحد. ماذا يحدد عدد القفزات؟
    follow_ups:
      - ماذا سيفعل الحجر بدون الدوران؟
      - كيف يشكل الزاوية القفزة؟
      - ما هي العلاقة بين الرمية والارتداد؟
  - id: nmp_pollinator_drink
    name: شرب الملقح
    prompt: |
      تشرب نحلة على الحافة. تجمع الفراشات عند بركة طينية. الماء مورد. فكر في من يأتي. ماذا يحتاجون من الماء؟
    follow_ups:
      - ماذا سيفعل الملقحون بدون البركة الصغيرة؟
      - كيف تمكّن الحافة الشرب؟
      - ما هي العلاقة بين الماء والمعدن؟
  - id: nmp_evaporation_skin
    name: جلد التبخر
    prompt: |
      تفقد البركة الماء بالتبخر. في الصيف، ينخفض المستوى. يتوسع الشاطئ. فكر في الانحسار. ماذا يتعرض؟ من يتم تقطعه؟
    follow_ups:
      - ماذا ستكون البركة بدون تبخر؟
      - كيف يركز الانخفاض الحياة؟
      - ما هي العلاقة بين الفقد والتركيز؟
  - id: nmp_hydra_stalk
    name: ساق الهيدرا
    prompt: |
      الهيدرا — صغيرة، مجسات — ترسو على ساق. تلسع الفريسة، وتسحبها. الهيدرا يمكنها التجدد. فكر في البساطة. ما هو نمط الجسم الذي تستخدمه؟
    follow_ups:
      - ماذا ستكون البركة بدون الهيدرا؟
      - كيف يساعد التجدد على البقاء؟
      - ما هي العلاقة بين البساطة والمرونة؟
  - id: nmp_boatman_row
    name: قارب رجل الصف
    prompt: |
      قارب رجل يجدف — أرجل تشبه المجاديف. غالبًا ما يكون مقلوبًا، يلتصق بالسطح. يتغذى على الطحالب. فكر في المجاديف. ماذا تدفع؟
    follow_ups:
      - ماذا سيكون قارب الرجل بدون المجاديف؟
      - كيف يختلف الصف عن السباح الخلفي؟
      - ما هي العلاقة بين الساق والحركة؟
  - id: nmp_caddisfly_case
    name: حافظة ذبابة القز
    prompt: |
      تبني يرقة ذبابة القز حافظة — عصي، أحجار، أصداف. تلصقها بالحرير. الحافظة درع وتمويه. فكر في البناء. ماذا تختار اليرقة؟
    follow_ups:
      - ماذا ستكون اليرقة بدون الحافظة؟
      - كيف تختلف الحافظة حسب الموطن؟
      - ما هي العلاقة بين المادة والحماية؟
  - id: nmp_damselfly_emergence
    name: ظهور اليعسوب
    prompt: |
      يظهر اليعسوب — يرقة تتسلق ساقًا، تشق جلدها، تخرج البالغة. تتفتح الأجنحة. اللحظة ضعيفة. فكر في التحول. ماذا يمكن أن يحدث بشكل خاطئ؟
    follow_ups:
      - ماذا ستكون البالغة بدون التسلق؟
      - كيف يشكل الظهور التوقيت؟
      - ما هي العلاقة بين اليرقة والبالغة؟
  - id: nmp_floating_feather
    name: ريشة عائمة
    prompt: |
      ريشة تطفو — تخلص منها طائر. تركب السطح. يتجمع الماء عليها. فكر في الريشة. ماذا أبقت الطائر جافًا؟ ماذا تفعل الريشة الآن؟
    follow_ups:
      - ماذا سيكون السطح بدون أشياء عائمة؟
      - كيف تحبس الريشة الهواء؟
      - ما هي العلاقة بين الهيكل والطفو؟
  - id: nmp_moon_jelly
    name: قنديل البحر القمري
    prompt: |
      في بعض البرك، قناديل البحر — قناديل البحر القمرية. تنبض. هي في الغالب ماء. فكر في الجسم. ماذا يلتقط الهلام؟ ماذا يتجنب؟
    follow_ups:
      - ماذا ستكون البركة بدون قناديل البحر؟
      - كيف يخلق النبض حركة؟
      - ما هي العلاقة بين الماء والجسم؟
  - id: nmp_seep_source
    name: مصدر التسرب
    prompt: |
      يتسرب الماء من الضفة — ربيع، تدفق بطيء. يغذي التسرب البركة. أو تسرب البركة. فكر في الحدود. ماذا يعبر؟ ماذا يحتفظ؟
    follow_ups:
      - ماذا ستكون البركة بدون التسرب؟
      - كيف يشكل التسرب الكيمياء؟
      - ما هي العلاقة بين المصدر والبركة؟
  - id: nmp_wind_wave
    name: موجة الرياح
    prompt: |
      تدفع الرياح السطح. تتشكل أمواج صغيرة. تكسر عند الحافة. فكر في الامتداد — المسافة التي تسافرها الرياح فوق الماء. ماذا يشكل الموجة؟
    follow_ups:
      - ماذا سيكون السطح بدون رياح؟
      - كيف تؤثر الأمواج على الأكسجين؟
      - ما هي العلاقة بين الرياح والخلط؟
  - id: nmp_rotifer_wheel
    name: عجلة العجلة الدوارة
    prompt: |
      العجلة الدوارة مجهرية — لديها عجلة من الأهداب. تدور، تجذب الطعام. العجلة الدوارة محرك. فكر في المقياس. ماذا آخر في هذا الماء؟
    follow_ups:
      - ماذا ستكون البركة بدون العجلة الدوارة؟
      - كيف تخلق العجلة التدفق؟
      - ما هي العلاقة بين الأهداب والتغذية؟
  - id: nmp_temperature_layer
    name: طبقة الحرارة
    prompt: |
      يمكن أن تتطبق البرك — دافئة في الأعلى، باردة في الأسفل. الطبقات لا تختلط بسهولة. فكر في الحدود. ماذا يعيش أين؟ ماذا يحدث عندما تنقلب البركة؟
    follow_ups:
      - ماذا ستكون البركة بدون طبقية؟
      - كيف تشكل الحرارة الأكسجين؟
      - ما هي العلاقة بين الطبقة والحياة؟
  - id: nmp_predator_shadow
    name: ظل المفترس
    prompt: |
      يمر ظل سمكة. الفريسة تتجمد، تتفرق. الظل إشارة. فكر في الاستجابة. ماذا سيعني الظل المستمر؟ ماذا سيعني لا ظل؟
    follow_ups:
      - كيف يحفز الظل الهروب؟
      - ما هي الإشارات الأخرى التي تهم؟
      - ما هي العلاقة بين الظل والبقاء؟
  - id: nmp_surface_film
    name: طبقة السطح
    prompt: |
      طبقة رقيقة على الماء — حبوب اللقاح، البكتيريا، المواد العضوية. يمكنها تحمل الوزن. بعض الحشرات تمشي عليها. فكر في الطبقة. ماذا سيكسرها؟
    follow_ups:
      - ماذا سيكون السطح بدون الطبقة؟
      - كيف تؤثر الطبقة على تبادل الغازات؟
      - ما هي العلاقة بين الطبقة والحدود؟
  - id: nmp_dry_wait
    name: انتظار جاف
    prompt: |
      ستجف البركة الصغيرة. بعض الكائنات لديها بيض مقاوم للجفاف. ينتظرون. قد يكون المطر التالي بعد أشهر. فكر في الرهان. ماذا يجب أن يتوافق للنجاح؟
    follow_ups:
      - ماذا ستكون البركة الصغيرة بدون الانتظار؟
      - كيف يمتد السكون الجفاف؟
      - ما هي العلاقة بين البيض والمطر؟
  - id: nmp_shoreline_wrack
    name: حطام الشاطئ
    prompt: |
      يتجمع الحطام على الشاطئ — أوراق، عصي، حشرات ميتة. الحطام خط. يحدد أعلى مستوى الماء. فكر في التراكم. من يتغذى هنا؟
    follow_ups:
      - ماذا ستكون الحافة بدون الحطام؟
      - كيف يخلق الحطام موطنًا؟
      - ما هي العلاقة بين الخط والمستوى؟
  - id: nmp_duckweed_carpet
    name: بساط طحلب الأشن
    prompt: |
      يشكل طحلب الأشن بساطًا على الماء الراكد — أقراص خضراء صغيرة. ينتشر بسرعة. يصبح السطح صلبًا. فكر في الغزو. ماذا يمنع البساط؟ ماذا يمكّن؟
    follow_ups:
      - ماذا ستكون البركة بدون طحلب الأشن؟
      - كيف يؤثر البساط على الضوء والأكسجين؟
      - ما هي العلاقة بين التغطية والحياة بالأسفل؟
  - id: nmp_rain_ring
    name: حلقة المطر
    prompt: |
      تقطر قطرة مطر على السطح. تتوسع حلقة، تتلاشى. في زخة، يصبح السطح نسيجًا — حلقات متداخلة. فكر في النمط. ماذا يفعل المطر بالبركة؟
    follow_ups:
      - ماذا سيكون السطح بدون مطر؟
      - كيف يمزج المطر الماء؟
      - ما هي العلاقة بين القطرة والحلقة؟
  - id: nmp_minnow_school
    name: سرب أسماك المنوة
    prompt: |
      تتجمع أسماك المنوة — العشرات تتحرك كوحدة واحدة. السرب استراتيجية. المفترسون مشوشون. فكر في التنسيق. كيف يقررون؟ ماذا سيكلف العزلة؟
    follow_ups:
      - ماذا ستكون البركة بدون التجمع؟
      - كيف يستجيب السرب للتهديد؟
      - ما هي العلاقة بين الكثير والواحد؟
  - id: nmp_ice_edge
    name: حافة الجليد
    prompt: |
      في الشتاء، ينمو الجليد من الحافة. يتقدم الحد. تحته، تستمر الحياة — أبرد، أبطأ. فكر في الحافة. ماذا ينجو تحت الجليد؟
    follow_ups:
      - ماذا ستكون البركة بدون الجليد؟
      - كيف يحمي الجليد أو يهدد؟
      - ما هي العلاقة بين التجمد والأكسجين؟
