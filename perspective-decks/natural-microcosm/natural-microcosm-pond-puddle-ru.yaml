# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Естественный микрокосм — Пруд и лужа (Russian)

id: natural_microcosm_pond_puddle
name: Естественный микрокосм — Пруд и лужа
description: 50 карточек, чтобы изменить ваше восприятие воды в малом масштабе — от поверхностного натяжения и отражений до водных насекомых, головастиков и жизни во временных водоемах.
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: Поверхностное натяжение
    prompt: |
      Водомерка идет по воде. Поверхность держит — молекулы сцеплены. Осторожно уроните
      булавку. Она будет плавать. Подумайте о невидимой пленке. Что ее нарушит?
    follow_ups:
      - Как поверхностное натяжение влияет на то, кто здесь может жить?
      - Что было бы с прудом без него?
      - Какова связь между поверхностью и границей?
  - id: nmp_skater_ripple
    name: Рябь водомерки
    prompt: |
      Лапки водомерки продавливают поверхность. Каждый шаг создает рябь.
      Наблюдайте за узором. Водомерка читает поверхность как карту. Что она чувствует?
    follow_ups:
      - Как рябь передает информацию?
      - Что бы делала водомерка без поверхности?
      - Какова связь между рябью и добычей?
  - id: nmp_reflection_sky
    name: Отражение неба
    prompt: |
      Лужа отражает небо — или ветку, или вас. Отражение инвертировано.
      Спокойная вода — зеркало. Что добавляет отражение? Что оно скрывает?
    follow_ups:
      - Что было бы с лужей без отражения?
      - Как спокойствие формирует то, что мы видим?
      - Какова связь между поверхностью и образом?
  - id: nmp_tadpole_tail
    name: Хвост головастика
    prompt: |
      Головастик плывет — хвост толкает его вперед. Хвост будет реабсорбирован. Животное
      преобразуется. Подумайте о промежуточном состоянии. Что позволяет хвост сейчас?
    follow_ups:
      - Что было бы с головастиком без хвоста?
      - Как метаморфоз переписывает тело?
      - Какова связь между формой и функцией?
  - id: nmp_dragonfly_egg
    name: Яйцо стрекозы
    prompt: |
      Стрекозы откладывают яйца в воду — или в стебли под водой. Личинка
      живет под водой годами, прежде чем вылупиться. Подумайте о двойной жизни.
      Что связывает воду и воздух?
    follow_ups:
      - Что было бы со стрекозой без водной стадии?
      - Как личинка формирует пруд?
      - Какова связь между личинкой и взрослой особью?
  - id: nmp_algae_bloom
    name: Цветение водорослей
    prompt: |
      Зеленая слизь на воде — водоросли. Это цветение, всплеск. Слишком много питательных веществ,
      слишком много солнца. Пруд реагирует. Что это вызывает? Что следует за этим?
    follow_ups:
      - Что было бы с прудом без водорослей?
      - Как цветение влияет на кислород?
      - Какова связь между питательными веществами и ростом?
  - id: nmp_reed_stem
    name: Стебель тростника
    prompt: |
      Тростники и камыши поднимаются с края. Они полые — через них проходят воздушные каналы.
      Стебель соединяет воду и воздух. Кто использует тростник как лестницу?
    follow_ups:
      - Что было бы с краем без тростников?
      - Как полый стебель обеспечивает выживание?
      - Какова связь между стеблем и средой обитания?
  - id: nmp_pond_skin
    name: Кожа пруда
    prompt: |
      У пруда есть кожа — место, где вода встречается с воздухом. На нее оседает пыль. Расплывается
      масло. Кожа нежна. Прикоснитесь к ней. Что разделяет кожа?
    follow_ups:
      - Что было бы с прудом без кожи?
      - Как кожа влияет на газообмен?
      - Какова связь между поверхностью и глубиной?
  - id: nmp_temporary_pool
    name: Временная лужа
    prompt: |
      Лужа после дождя — она высохнет. Однако жизнь адаптировалась. Рачки-щитни, рачки-триопы, яйца, которые ждут.
      Подумайте о срочности. Что должно произойти до того, как вода уйдет?
    follow_ups:
      - Что было бы с лужей, если бы она была постоянной?
      - Как временность формирует стратегию?
      - Какова связь между временем и адаптацией?
  - id: nmp_whirligig_gyre
    name: Вихрь вертячки
    prompt: |
      Жуки-вертячки вращаются на поверхности. Они видят сверху и снизу — разделенные глаза.
      Они хищники и добыча. Подумайте о двойном зрении. Что оно позволяет?
    follow_ups:
      - Что было бы с жуком без разделенного зрения?
      - Как вихрь сбивает с толку хищников?
      - Какова связь между вращением и выживанием?
  - id: nmp_diving_spider
    name: Ныряющий паук
    prompt: |
      Ныряющий паук несет пузырек воздуха — водолазный колокол. Он дышит
      под водой. Пузырек — это легкое. Подумайте об изобретении. Что бы делал паук без него?
    follow_ups:
      - Как пузырек позволяет охотиться?
      - Что произойдет, если пузырек лопнет?
      - Какова связь между воздухом и водой?
  - id: nmp_pond_scum
    name: Прудовая слизь
    prompt: |
      Слизь образуется на краю — пыльца, пыль, водоросли, насекомые. Это пограничный
      слой. Что там собирается? Кто на этом питается? Слизь — это фильтр.
    follow_ups:
      - Что было бы с прудом без слизи?
      - Как край концентрирует жизнь?
      - Какова связь между границей и накоплением?
  - id: nmp_ice_surface
    name: Ледяная поверхность
    prompt: |
      Зимой пруд замерзает. Лед держится. Под ним жизнь продолжается —
      медленнее, холоднее. Подумайте о барьере. Что защищает лед? Что он блокирует?
    follow_ups:
      - Что было бы с прудом без льда?
      - Как замораживание влияет на кислород?
      - Какова связь между льдом и выживанием?
  - id: nmp_minnow_school
    name: Стайка пескарей
    prompt: |
      Пескари держатся стайками — движутся как единое целое. Стайка — это защита, эффективность.
      Наблюдайте за синхронностью. Что их координирует? Какой риск для одинокого пескаря?
    follow_ups:
      - Что было бы с прудом без стайки?
      - Как стайное поведение уменьшает хищничество?
      - Какова связь между индивидуумом и группой?
  - id: nmp_lily_pad
    name: Кувшинка
    prompt: |
      Кувшинка плавает. Ее нижняя сторона отличается от верхней — волоски, цвет.
      Лист — это платформа. Что на нем приземляется? Что живет под ним?
    follow_ups:
      - Что было бы с прудом без кувшинок?
      - Как лист влияет на свет под ним?
      - Какова связь между листом и тенью?
  - id: nmp_ripple_spread
    name: Распространение ряби
    prompt: |
      Камень падает. Рябь распространяется. Они пересекаются, интерферируют. Узор
      переносит энергию. Подумайте об угасании. Как далеко распространяется рябь?
    follow_ups:
      - Что было бы с поверхностью без ряби?
      - Как рябь отмечает воздействие?
      - Какова связь между возмущением и распространением?
  - id: nmp_mosquito_wiggle
    name: Извивание комара
    prompt: |
      Личинки комаров висят у поверхности — "извивающиеся". Они дышат через сифон.
      Извивание — это движение, питание. Подумайте о мире личинки.
      Что она ест?
    follow_ups:
      - Что было бы с прудом без комаров?
      - Как извивание избегает хищников?
      - Какова связь между личинкой и взрослой особью?
  - id: nmp_leaf_boat
    name: Лист-лодка
    prompt: |
      Лист плавает — упавший, дрейфующий. Для одних он — плот, для других — пища.
      Лист утонет, разложится. Проследите его путь. Во что он превратится?
    follow_ups:
      - Что было бы с поверхностью без плавающего мусора?
      - Как лист создает микросреду обитания?
      - Какова связь между плавучестью и погружением?
  - id: nmp_backswimmer_top
    name: Глапирус (спинная плавучесть)
    prompt: |
      Глапирус плавает вверх ногами — брюхом к небу. Он гребет ногами.
      Он дышит у поверхности, затем ныряет. Подумайте об инверсии. Почему вверх ногами?
    follow_ups:
      - Что было бы с глапирусом, если бы он был нормальным?
      - Как поза помогает в охоте?
      - Какова связь между ориентацией и добычей?
  - id: nmp_snail_trail
    name: След улитки
    prompt: |
      Прудовик скользит. Он оставляет след — слизь, движение. След отмечает,
      где он был. Другие улитки могут следовать. Подумайте о пути. Что сообщает след?
    follow_ups:
      - Что было бы с улиткой без следа?
      - Как слизь позволяет двигаться?
      - Какова связь между следом и следованием?
  - id: nmp_dew_drop
    name: Капля росы
    prompt: |
      Роса образуется на травинке над водой — капли, отражения. Это конденсат.
      Капля держится. Затем падает. Подумайте о капле. Что она увеличивает?
    follow_ups:
      - Что было бы с травинкой без росы?
      - Как капля преломляет свет?
      - Какова связь между каплей и поверхностью?
  - id: nmp_spring_constant
    name: Постоянная источника
    prompt: |
      Источник питает пруд — или пруд просачивается. Уровень воды — это баланс.
      Подумайте о входе и выходе. Что поддерживает пруд? Что его высушит?
    follow_ups:
      - Что было бы с прудом без источника?
      - Как источник формирует воду?
      - Какова связь между входом и жизнью?
  - id: nmp_edge_ecotone
    name: Краевой экотон
    prompt: |
      Край пруда — это экотон — переход. Влажное встречается с сухим. Растения адаптируются.
      Животные пересекают. Край — это разнообразие. Что процветает в промежутке?
    follow_ups:
      - Что было бы с прудом без края?
      - Как экотон создает возможности?
      - Какова связь между границей и разнообразием?
  - id: nmp_frog_eye
    name: Глаз лягушки
    prompt: |
      Лягушка сидит на краю. Ее глаза выпучены — она видит сверху и впереди. Лягушка
      неподвижна. Затем язык выстреливает. Подумайте о терпении. Чего она ждет?
    follow_ups:
      - Что было бы с лягушкой без выпученных глаз?
      - Как неподвижность позволяет броситься?
      - Какова связь между ожиданием и поимкой?
  - id: nmp_oxygen_bubble
    name: Пузырек кислорода
    prompt: |
      Растения в пруду производят кислород — пузырьки поднимаются. В солнечный день
      вода дышит. Подумайте об обмене. Что было бы с прудом без фотосинтеза?
    follow_ups:
      - Как кислород формирует, кто здесь может жить?
      - Что происходит, когда кислород заканчивается?
      - Какова связь между светом и дыханием?
  - id: nmp_detritus_floor
    name: Детритовое дно
    prompt: |
      Дно пруда — это детрит — опавшие листья, мертвые насекомые, осадок. Это
      слой разложения. Что в нем живет? Кто на нем питается? Дно — это кладовая.
    follow_ups:
      - Что было бы с прудом без детрита?
      - Как дно питает водную толщу?
      - Какова связь между дном и верхом?
  - id: nmp_rain_ring
    name: Кольцо дождя
    prompt: |
      Дождь попадает на поверхность. Каждая капля создает кольцо — корону, затем кратер.
      Дождь текстурирует воду. Подумайте об узоре. Что означала бы спокойная поверхность?
    follow_ups:
      - Как дождь насыщает воду кислородом?
      - Что нарушают кольца?
      - Какова связь между дождем и поверхностью?
  - id: nmp_duckweed_carpet
    name: Ковер ряски
    prompt: |
      Ряска покрывает поверхность — крошечные плавающие растения. Они быстро размножаются.
      Ковер затеняет то, что под ним. Подумайте о покрытии. Что означало бы полное солнце?
    follow_ups:
      - Что было бы с прудом без ряски?
      - Как ковер влияет на температуру?
      - Какова связь между покрытием и жизнью под ним?
  - id: nmp_phantom_midgie
    name: Призрачная комариная личинка
    prompt: |
      Личинки комаров-звонцов прозрачны — призрачны. Они висят в воде.
      Сквозь них видно. Подумайте о невидимости. Что защищает прозрачность?
    follow_ups:
      - Что было бы с личинкой, если бы она была непрозрачной?
      - Как прозрачность помогает в охоте?
      - Какова связь между прозрачностью и выживанием?
  - id: nmp_skimmer_skip
    name: Прыжок камня
    prompt: |
      Камень, брошенный по воде — один, два, три. Каждый отскок передает энергию.
      Камень в конце концов тонет. Подумайте о пределе. Что определяет количество прыжков?
    follow_ups:
      - Что бы делал камень без вращения?
      - Как угол влияет на прыжок?
      - Какова связь между броском и отскоком?
  - id: nmp_pollinator_drink
    name: Питье опылителя
    prompt: |
      Пчела пьет на краю. Бабочки собираются у грязевой лужи. Вода — это ресурс.
      Подумайте, кто приходит. Что им нужно от воды?
    follow_ups:
      - Что бы делали опылители без лужи?
      - Как край позволяет пить?
      - Какова связь между водой и минералами?
  - id: nmp_evaporation_skin
    name: Испарительная кожа
    prompt: |
      Пруд теряет воду из-за испарения. Летом уровень падает. Берег
      расширяется. Подумайте об отступлении. Что обнажается? Кто остается на мели?
    follow_ups:
      - Что было бы с прудом без испарения?
      - Как понижение уровня концентрирует жизнь?
      - Какова связь между потерей и концентрацией?
  - id: nmp_hydra_stalk
    name: Стебель гидры
    prompt: |
      Гидра — крошечная, с щупальцами — прикрепляется к стеблю. Она жалит добычу, втягивает ее.
      Гидра может регенерировать. Подумайте о простоте. Какой план строения она использует?
    follow_ups:
      - Что было бы с прудом без гидр?
      - Как регенерация помогает выживанию?
      - Какова связь между простотой и устойчивостью?
  - id: nmp_boatman_row
    name: Гребля водомерки
    prompt: |
      Водяной клоп-лодочник гребет — ногами, похожими на весла. Он часто вверх ногами, цепляясь за
      поверхность. Он питается водорослями. Подумайте о веслах. Что они приводят в движение?
    follow_ups:
      - Что было бы с лодочником без весел?
      - Чем гребля отличается от гребли глапируса?
      - Какова связь между ногой и движением?
  - id: nmp_caddisfly_case
    name: Домик ручейника
    prompt: |
      Личинка ручейника строит домик — из веточек, камешков, ракушек. Она склеивает их
      шелковой нитью. Домик — это броня и камуфляж. Подумайте о строительстве.
      Что выбирает личинка?
    follow_ups:
      - Что было бы с личинкой без домика?
      - Как домик варьируется в зависимости от среды обитания?
      - Какова связь между материалом и защитой?
  - id: nmp_damselfly_emergence
    name: Появление стрекозы
    prompt: |
      Стрекоза появляется — личинка взбирается по стеблю, разрывает шкурку, взрослая особь выбирается.
      Крылья расправляются. Момент уязвим. Подумайте о
      преобразовании. Что может пойти не так?
    follow_ups:
      - Что было бы со взрослой особью без подъема?
      - Как появление определяет время?
      - Какова связь между личинкой и взрослой особью?
  - id: nmp_floating_feather
    name: Плавающее перо
    prompt: |
      Перо плавает — брошенное птицей. Оно скользит по поверхности. Вода
      скатывается с него. Подумайте о пере. Что сохраняло птицу сухой? Что делает перо теперь?
    follow_ups:
      - Что было бы с поверхностью без плавающих объектов?
      - Как перо удерживает воздух?
      - Какова связь между структурой и плавучестью?
  - id: nmp_moon_jelly
    name: Лунная медуза
    prompt: |
      В некоторых прудах водятся медузы — лунные медузы. Они пульсируют. Они состоят в основном из воды.
      Подумайте о теле. Что улавливает желе? Чего оно избегает?
    follow_ups:
      - Что было бы с прудом без медуз?
      - Как пульсация создает движение?
      - Какова связь между водой и телом?
  - id: nmp_seep_source
    name: Просачивающийся источник
    prompt: |
      Вода просачивается из берега — родник, медленный поток. Просачивание питает пруд.
      Или пруд утекает. Подумайте о границе. Что пересекает? Что удерживается?
    follow_ups:
      - Что было бы с прудом без просачивания?
      - Как просачивание влияет на химию?
      - Какова связь между источником и водоемом?
  - id: nmp_wind_wave
    name: Ветровая волна
    prompt: |
