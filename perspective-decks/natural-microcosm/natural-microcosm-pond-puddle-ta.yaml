# இயற்கை நுண்குடுகு — குளம் & குட்டை (Tamil)

id: natural_microcosm_pond_puddle
name: இயற்கை நுண்குடுகு — குளம் & குட்டை
description: 50 அட்டைகள், நீரின் சிறு அளவிலான பார்வையை மாற்றியமைக்க — மேற்பரப்பு இழுவிசை மற்றும் பிரதிபலிப்புகள் முதல் நீர்வாழ் பூச்சிகள், தலைப்பிரட்டைகள் மற்றும் தற்காலிக குளங்களில் உள்ள வாழ்க்கை வரை.
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: மேற்பரப்பு இழுவிசை
    prompt: |
      ஒரு நீர் பூச்சி தண்ணீரில் நடக்கிறது. மேற்பரப்பு தாங்குகிறது — மூலக்கூறுகள் ஒட்டிக்கொள்கின்றன.
      ஒரு ஊசியை மெதுவாக விடுங்கள். அது மிதக்கும். கண்ணுக்குத் தெரியாத படலத்தைக் கவனியுங்கள்.
      அது என்ன உடைக்கும்?
    follow_ups:
      - மேற்பரப்பு இழுவிசை இங்கு யார் வாழ முடியும் என்பதை எப்படி வடிவமைக்கிறது?
      - அது இல்லாமல் குளம் எப்படி இருக்கும்?
      - மேற்பரப்புக்கும் எல்லைக்கும் என்ன தொடர்பு?
  - id: nmp_skater_ripple
    name: பூச்சி அலை
    prompt: |
      ஒரு நீர் பூச்சியின் கால்கள் மேற்பரப்பை பள்ளமாக்குகின்றன. ஒவ்வொரு அடியும் ஒரு அலையை உருவாக்குகிறது.
      வடிவமைப்பைப் பாருங்கள். பூச்சி ஒரு வரைபடத்தைப் போல மேற்பரப்பைப் படிக்கிறது.
      அது என்ன உணர்கிறது?
    follow_ups:
      - அலை எப்படி தகவலைக் கொண்டு செல்கிறது?
      - மேற்பரப்பு இல்லாமல் பூச்சி என்ன செய்யும்?
      - அலைக்கும் இரைகளுக்கும் என்ன தொடர்பு?
  - id: nmp_reflection_sky
    name: வானத்தின் பிரதிபலிப்பு
    prompt: |
      ஒரு குட்டை வானத்தை — அல்லது ஒரு கிளையை, அல்லது உங்களை பிரதிபலிக்கிறது. பிரதிபலிப்பு தலைகீழாகிறது.
      அமைதியான நீர் ஒரு கண்ணாடி. பிரதிபலிப்பு என்ன சேர்க்கிறது? அது என்ன மறைக்கிறது?
    follow_ups:
      - பிரதிபலிப்பு இல்லாமல் குட்டை எப்படி இருக்கும்?
      - அமைதி நாம் பார்ப்பதை எப்படி வடிவமைக்கிறது?
      - மேற்பரப்புக்கும் பிம்பத்திற்கும் என்ன தொடர்பு?
  - id: nmp_tadpole_tail
    name: தலைப்பிரட்டை வால்
    prompt: |
      ஒரு தலைப்பிரட்டை நீந்துகிறது — வால் அதை செலுத்துகிறது. வால் மீண்டும் உறிஞ்சப்படும்.
      அந்த விலங்கு மாறுகிறது. இடைப்பட்டவற்றைக் கவனியுங்கள். வால் இப்போது என்ன சாத்தியமாக்குகிறது?
    follow_ups:
      - வால் இல்லாமல் தலைப்பிரட்டை எப்படி இருக்கும்?
      - உருமாற்றம் உடலை எப்படி மறுபடியும் எழுதுகிறது?
      - வடிவம் மற்றும் செயல்பாட்டிற்கு என்ன தொடர்பு?
  - id: nmp_dragonfly_egg
    name: தும்பி முட்டை
    prompt: |
      தும்பிகள் நீரில் — அல்லது மேற்பரப்புக்கு கீழே உள்ள தண்டுகளில் முட்டையிடுகின்றன.
      அதன் இளம் புழு பல வருடங்கள் தண்ணீருக்குள் வாழ்ந்த பிறகு வெளிப்படுகிறது.
      பிளவுபட்ட வாழ்க்கையைக் கவனியுங்கள். நீர் மற்றும் காற்றை எது இணைக்கிறது?
    follow_ups:
      - நீர்வாழ் நிலை இல்லாமல் தும்பி எப்படி இருக்கும்?
      - இளம் புழு குளத்தை எப்படி வடிவமைக்கிறது?
      - இளம் புழுவுக்கும் வயது வந்தோருக்கும் என்ன தொடர்பு?
  - id: nmp_algae_bloom
    name: பாசி மலர்ச்சி
    prompt: |
      நீரில் பச்சை பாசி — பாசி. இது ஒரு மலர்ச்சி, ஒரு துடிப்பு. அதிக ஊட்டச்சத்து, அதிக சூரியன்.
      குளம் பதிலளிக்கிறது. அதை எது தூண்டுகிறது? என்ன பின்தொடரும்?
    follow_ups:
      - பாசி இல்லாமல் குளம் எப்படி இருக்கும்?
      - மலர்ச்சி ஆக்சிஜனை எப்படி பாதிக்கிறது?
      - ஊட்டச்சத்துக்கும் வளர்ச்சிக்கும் என்ன தொடர்பு?
  - id: nmp_reed_stem
    name: நாணல் தண்டு
    prompt: |
      ஓரங்களில் நாணல்களும் புற்களும் உயர்ந்து நிற்கின்றன. அவை உள்ளீடற்றவை — காற்று வழிகள் ஓடுகின்றன.
      தண்டு நீர் மற்றும் காற்றை இணைக்கிறது. நாணலை ஏணியாக யார் பயன்படுத்துகிறார்கள்?
    follow_ups:
      - நாணல்கள் இல்லாமல் கரை எப்படி இருக்கும்?
      - உள்ளீடற்ற தன்மை எப்படி உயிர்வாழ்வை சாத்தியமாக்குகிறது?
      - தண்டுக்கும் வாழ்விடத்திற்கும் என்ன தொடர்பு?
  - id: nmp_pond_skin
    name: குளத்தின் தோல்
    prompt: |
      குளத்திற்கு ஒரு தோல் உண்டு — நீர் காற்றைச் சந்திக்கும் இடம். தூசு அதன் மீது விழுகிறது. எண்ணெய் பரவுகிறது.
      அந்தத் தோல் மென்மையானது. அதைத் தொடுங்கள். அந்தத் தோல் எதை பிரிக்கிறது?
    follow_ups:
      - தோல் இல்லாமல் குளம் எப்படி இருக்கும்?
      - தோல் வாயு பரிமாற்றத்தை எப்படி பாதிக்கிறது?
      - மேற்பரப்புக்கும் ஆழத்திற்கும் என்ன தொடர்பு?
  - id: nmp_temporary_pool
    name: தற்காலிக குட்டை
    prompt: |
      மழைக்குப் பிறகு ஒரு குட்டை — அது வறண்டுவிடும். ஆயினும்கூட வாழ்க்கை தழுவியுள்ளது.
      தேவதைப் புழுக்கள், தலைப்பிரட்டைப் புழுக்கள், காத்திருக்கும் முட்டைகள். அவசரத்தைக் கவனியுங்கள்.
      நீர் செல்வதற்கு முன் என்ன நடக்க வேண்டும்?
    follow_ups:
      - அது நிரந்தரமாக இருந்தால் குட்டை எப்படி இருக்கும்?
      - தற்காலிக தன்மை உத்தியை எப்படி வடிவமைக்கிறது?
      - நேரத்திற்கும் தழுவலுக்கும் என்ன தொடர்பு?
  - id: nmp_whirligig_gyre
    name: சுழல் பூச்சி சுழல்
    prompt: |
      சுழல் பூச்சிகள் மேற்பரப்பில் சுழல்கின்றன. அவை மேலும் கீழும் பார்க்கின்றன — பிளவுபட்ட கண்கள்.
      அவை இரைகொல்லிகள் மற்றும் இரைகள். இரட்டை பார்வையை கவனியுங்கள். அது என்ன சாத்தியமாக்குகிறது?
    follow_ups:
      - பிளவுபட்ட பார்வை இல்லாமல் பூச்சி எப்படி இருக்கும்?
      - சுழல் எப்படி இரைகொல்லிகளை குழப்புகிறது?
      - சுழற்சிக்கும் உயிர்வாழ்விற்கும் என்ன தொடர்பு?
  - id: nmp_diving_spider
    name: மூழ்கும் சிலந்தி
    prompt: |
      ஒரு மூழ்கும் சிலந்தி ஒரு காற்று குமிழியை — ஒரு மூழ்கும் மணியை எடுத்துச் செல்கிறது. அது தண்ணீருக்குள் சுவாசிக்கிறது.
      குமிழி ஒரு நுரையீரல். கண்டுபிடிப்பைக் கவனியுங்கள். அது இல்லாமல் சிலந்தி என்ன செய்யும்?
    follow_ups:
      - குமிழி எப்படி வேட்டையாட உதவுகிறது?
      - குமிழி வெடித்தால் என்ன நடக்கும்?
      - காற்றுக்கும் தண்ணீருக்கும் என்ன தொடர்பு?
  - id: nmp_pond_scum
    name: குளத்தின் பாசி
    prompt: |
      ஓரத்தில் பாசி படிகிறது — மகரந்தம், தூசு, பாசி, பூச்சிகள். இது ஒரு எல்லை அடுக்கு.
      அங்கு என்ன சேகரிக்கிறது? யார் அதை உண்கிறார்கள்? பாசி ஒரு வடிகட்டி.
    follow_ups:
      - பாசி இல்லாமல் குளம் எப்படி இருக்கும்?
      - கரை எப்படி உயிரை செறிவூட்டுகிறது?
      - எல்லைக்கும் சேகரிப்பிற்கும் என்ன தொடர்பு?
  - id: nmp_ice_surface
    name: பனிக்கட்டி மேற்பரப்பு
    prompt: |
      குளிர்காலத்தில், குளம் உறைகிறது. பனிக்கட்டி தாங்குகிறது. அதன் கீழ், வாழ்க்கை தொடர்கிறது —
      மெதுவாக, குளிராக. தடையைக் கவனியுங்கள். பனிக்கட்டி எதை பாதுகாக்கிறது? அது எதை தடுக்கிறது?
    follow_ups:
      - பனிக்கட்டி இல்லாமல் குளம் எப்படி இருக்கும்?
      - உறைதல் ஆக்சிஜனை எப்படி பாதிக்கிறது?
      - பனிக்கட்டிக்கும் உயிர்வாழ்விற்கும் என்ன தொடர்பு?
  - id: nmp_minnow_school
    name: சிறு மீன் கூட்டம்
    prompt: |
      சிறு மீன்கள் கூட்டமாக — அவை ஒன்றாக நகர்கின்றன. கூட்டம் தற்காப்பு, செயல்திறன்.
      ஒத்திசைவைப் பாருங்கள். அவற்றை எது ஒருங்கிணைக்கிறது? தனி மீன் என்ன ஆபத்தை சந்திக்கும்?
    follow_ups:
      - கூட்டம் இல்லாமல் குளம் எப்படி இருக்கும்?
      - கூட்டமாக செல்வது எப்படி இரையை குறைக்கிறது?
      - தனிநபருக்கும் குழுவிற்கும் என்ன தொடர்பு?
  - id: nmp_lily_pad
    name: அல்லி இலை
    prompt: |
      ஒரு அல்லி இலை மிதக்கிறது. அதன் அடிப்பகுதி அதன் மேற்புறத்திலிருந்து வேறுபட்டது — முடிகள், நிறம்.
      இலை ஒரு மேடை. அதில் என்ன விழுகிறது? அதன் கீழ் என்ன வாழ்கிறது?
    follow_ups:
      - அல்லி இலைகள் இல்லாமல் குளம் எப்படி இருக்கும்?
      - இலை எப்படி கீழே ஒளியை வடிவமைக்கிறது?
      - இலைக்கும் நிழலுக்கும் என்ன தொடர்பு?
  - id: nmp_ripple_spread
    name: அலை பரவுதல்
    prompt: |
      ஒரு கல் விழுகிறது. அலைகள் பரவுகின்றன. அவை குறுக்கிடுகின்றன, இடையூறு செய்கின்றன.
      வடிவம் ஆற்றலைக் கொண்டு செல்கிறது. சிதைவைக் கவனியுங்கள். அலைகள் எவ்வளவு தூரம் பயணிக்கின்றன?
