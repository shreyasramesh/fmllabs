# النموذج المصغر الطبيعي — الصخور والأحجار (Arabic)

id: natural_microcosm_rocks_stones
name: النموذج المصغر الطبيعي — الصخور والأحجار
description: 50 بطاقة لتغيير نظرتك للصخور والأحجار — من الزمن الجيولوجي والطحالب إلى التجوية، التعرية، والحياة البطيئة للمعادن.
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: خريطة الطحالب
    prompt: |
      تنمو الطحالب على الصخور — ببطء، بصبر. برتقالية، رمادية، خضراء. ليست كائنًا واحدًا بل اثنين: فطر وطحلب. فكر في الشراكة. ماذا تقدم الصخرة؟ ماذا تعطي الطحالب في المقابل؟
    follow_ups:
      - كيف ستبدو الصخرة بدون الطحالب؟
      - كيف تحدد الطحالب الزمن؟
      - ما هي العلاقة بين الطحالب والتجوية؟
  - id: nmr_pebble_smooth
    name: حصاة ملساء
    prompt: |
      حصاة النهر ملساء — صقلتها المياه والرمل. أمسك بواحدة. كم سنة استغرقت؟ النعومة هي سجل رحلة. ماذا يعني حافة حادة؟
    follow_ups:
      - كيف تكشف النعومة عن التاريخ؟
      - ماذا ستكون الحصاة بدون الماء؟
      - ما هي العلاقة بين الشكل والتدفق؟
  - id: nmr_crack_frost
    name: تشقق الصقيع
    prompt: |
      يتجمد الماء في شق، يتمدد. الصخرة تنقسم. إنها عنف بطيء. ابحث عن صخرة بها صدع. فكر في دورات التجمد والذوبان التي صنعته.
    follow_ups:
      - ماذا ستكون الصخرة بدون الشق؟
      - كيف يشكل الصقيع المناظر الطبيعية؟
      - ما هي العلاقة بين الماء والكسر؟
  - id: nmr_stone_warmth
    name: دفء الحجر
    prompt: |
      الصخرة التي تدفئها الشمس تحتفظ بالحرارة. اجلس على واحدة عند الغسق. الحجر يطلق ما امتصه. فكر في التبادل. ماذا ستكون الصخرة بدون الشمس؟
    follow_ups:
      - كيف يخلق الحجر مناخًا مصغرًا؟
      - أي مخلوقات تستخدم هذا الدفء؟
      - ما هي العلاقة بين الصخر والحرارة؟
  - id: nmr_moss_crust
    name: قشرة الطحلب
    prompt: |
      ينمو الطحلب على الحجر — قشرة رقيقة. يحتفظ بالرطوبة، يحبس الغبار. يصبح الحجر ركيزة. متى يصبح الحجر تربة؟ أين الخط الفاصل؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الطحلب؟
      - كيف تسرع القشرة التغيير؟
      - ما هي العلاقة بين المعدن والعضوي؟
  - id: nmr_vein_quartz
    name: عرق كوارتز
    prompt: |
      عرق كوارتز يقطع الصخر — طبقة من معدن مختلف. إنه يمثل صدعًا، وملءً. تتبع الخط. ما القوى التي صنعته؟ ماذا يكشف العرق؟
    follow_ups:
      - ماذا ستكون الصخرة بدون العرق؟
      - كيف يميز العرق الزمن السحيق؟
      - ما هي العلاقة بين الكسر والجمال؟
  - id: nmr_puddle_reflect
    name: بركة في الحجر
    prompt: |
      تجويف في الصخر يحتفظ بالماء بعد المطر. إنها بركة صغيرة — كوب. ماذا ينعكس فيها؟ ماذا يتبخر؟ الحجر صنع وعاءً.
    follow_ups:
      - ماذا ستكون الصخرة بدون التجويف؟
      - كيف تخلق البركة موطنًا؟
      - ما هي العلاقة بين التجويف والزمن؟
  - id: nmr_sand_grain
    name: حبة رمل
    prompt: |
      الرمل هو صخر مكسور إلى قطع صغيرة. أمسك حفنة. كل حبة كانت جزءًا من شيء أكبر. فكر في المقياس. كم عدد الحبات في جبل؟
    follow_ups:
      - ماذا ستكون الشاطئ بدون الحبات؟
      - كيف تحكي حجم الحبة قصة؟
      - ما هي العلاقة بين الكل والجزء؟
  - id: nmr_stone_circle
    name: دائرة حجرية
    prompt: |
      صخور مرتبة باليد أو بالجليد — دائرة، كومة حجارة، جدار. شخص ما أو شيء ما وضعها. فكر في النية. ماذا يعني الترتيب؟
    follow_ups:
      - ماذا ستكون المساحة بدون الصخور؟
      - كيف يخلق الترتيب معنى؟
      - ما هي العلاقة بين الحجر والطقوس؟
  - id: nmr_erosion_edge
    name: حافة التعرية
    prompt: |
      الرياح والماء ينحتان الصخر. ابحث عن حافة — جرف، صخرة. الشكل هو نتاج الإزالة. ماذا كان هناك من قبل؟ ماذا سيبقى؟
    follow_ups:
      - ماذا سيكون المنظر الطبيعي بدون التعرية؟
      - كيف تميز الحافة الزمن؟
      - ما هي العلاقة بين الفقد والشكل؟
  - id: nmr_color_streak
    name: خط لوني
    prompt: |
      الصخر ليس موحدًا — الحديد يصبغ بالأحمر، المنغنيز بالأسود، النحاس بالأخضر. تتبع خطًا. اللون هو كيمياء. ماذا يكشف عن تاريخ الصخر؟
    follow_ups:
      - ماذا ستكون الصخرة بدون اللون؟
      - كيف يشكل علم المعادن لوحة الألوان؟
      - ما هي العلاقة بين العنصر واللون؟
  - id: nmr_scratch_glacier
    name: خدش جليدي
    prompt: |
      الخدوش الجليدية — خدوش على الصخر الأساسي — تحدد المكان الذي سحب فيه الجليد الصخور عبر الحجر. الخطوط متوازية. فكر في القوة. ماذا تحرك؟ ماذا بقي ثابتًا؟
    follow_ups:
      - ماذا ستظهر الصخرة بدون الخدوش؟
      - كيف يحدد الخدش الاتجاه؟
      - ما هي العلاقة بين الجليد والحجر؟
  - id: nmr_cobble_pattern
    name: نمط الحصى
    prompt: |
      شاطئ أو قاع نهر من الحصى — حجم متشابه، شكل متنوع. الماء قد فرزها. فكر في النمط. ماذا يخبرك الفرز؟
    follow_ups:
      - ماذا سيكون الشاطئ بدون الفرز؟
      - كيف يشكل التدفق النمط؟
      - ما هي العلاقة بين الحجم والنقل؟
  - id: nmr_cavern_drip
    name: قطرة الكهف
    prompt: |
      تتشكل الهوابط قطرة بقطرة — رواسب معدنية من الماء المتسرب. النمو غير محسوس. فكر في النطاق الزمني. ماذا سيظهر فيلم مسرّع؟
    follow_ups:
      - ماذا سيكون الكهف بدون القطرة؟
      - كيف تسجل القطرة المناخ؟
      - ما هي العلاقة بين الماء والحجر؟
  - id: nmr_boulder_shadow
    name: ظل الصخرة الكبيرة
    prompt: |
      صخرة كبيرة تلقي بظلال. الأرض تحتها مختلفة — أبرد، أكثر رطوبة، أقل شمسًا. الصخرة تخلق مناخًا مصغرًا. من يعيش في الظل؟
    follow_ups:
      - ماذا سيكون المنحدر بدون الصخرة الكبيرة؟
      - كيف يشكل الظل الحياة؟
      - ما هي العلاقة بين الصخر والملاذ؟
  - id: nmr_fossil_impression
    name: بصمة أحفورية
    prompt: |
      الأحفورة هي حياة تحولت إلى حجر — أو بصمة تركت في الرواسب. ابحث عن واحدة إن استطعت. الصخر يحتفظ بالذاكرة. أي مخلوق ترك هذه؟ متى؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الأحفورة؟
      - كيف تحافظ البصمة؟
      - ما هي العلاقة بين الحياة والمعدن؟
  - id: nmr_grit_texture
    name: ملمس الحبيبات
    prompt: |
      مرر يدك فوق الصخر. الحجر الرملي ملمسه مختلف عن الجرانيت، والشيست عن البازلت. الملمس هو معدني، حبيبي، بنيوي. ماذا يقول اللمس؟
    follow_ups:
      - ماذا ستكون الصخرة بدون ملمسها؟
      - كيف يكشف الملمس عن الأصل؟
      - ما هي العلاقة بين الإحساس والتركيب؟
  - id: nmr_talus_slope
    name: منحدر الحطام الصخري
    prompt: |
      منحدر حطام صخري — صخور مكسورة في قاعدة جرف. الجاذبية والطقس يسقطانها. المنحدر هو كومة من آثار. كم من الوقت استغرق التراكم؟
    follow_ups:
      - ماذا ستكون قاعدة الجرف بدون الحطام الصخري؟
      - كيف يميز المنحدر التعرية؟
      - ما هي العلاقة بين السقوط والكومة؟
  - id: nmr_soil_horizon
    name: أفق التربة
    prompt: |
      احفر بعناية. التربة بها طبقات — عضوية في الأعلى، معدنية في الأسفل، أحيانًا نطاقات مميزة. الأفق هو تاريخ. ماذا خلق كل طبقة؟
    follow_ups:
      - ماذا ستكون الأرض بدون الآفاق؟
      - كيف يسجل الأفق الزمن؟
      - ما هي العلاقة بين الصخر والتربة؟
  - id: nmr_drystone_wall
    name: جدار حجري جاف
    prompt: |
      جدار حجري جاف — صخور متراصة بدون ملاط. الجدار يحتفظ بالوزن بالجاذبية والتراص. فكر في الحرفة. كيف يدعم كل حجر التالي؟
    follow_ups:
      - ماذا ستكون الحقول بدون الجدار؟
      - كيف يحدد الجدار الأراضي؟
      - ما هي العلاقة بين الحجر والحدود؟
  - id: nmr_tide_pool_rock
    name: صخرة بركة المد والجزر
    prompt: |
      الصخور في بركة المد والجزر تُبلل، وتجف، وتُبلل مرة أخرى. المخلوقات تلتصق. الصخرة موطن. فكر في إيقاع المد والجزر. ماذا تختبر الصخرة؟
    follow_ups:
      - ماذا ستكون البركة بدون الصخرة؟
      - كيف تخلق الصخرة سطحًا؟
      - ما هي العلاقة بين الصخر والمد والجزر؟
  - id: nmr_crystal_face
    name: وجه بلوري
    prompt: |
      بعض الصخور تظهر وجوه بلورية — مستويات انقسام، شكل هندسي. البلورة نمت في تجويف، بترتيب بطيء. فكر في الهندسة. ما القوى التي شكلتها؟
    follow_ups:
      - ماذا ستكون الصخرة بدون البلورة؟
      - كيف يكشف الوجه عن البنية؟
      - ما هي العلاقة بين النظام والمعدن؟
  - id: nmr_dust_coating
    name: طبقة الغبار
    prompt: |
      تتجمع الأتربة على الصخور — حبوب لقاح، سخام، معادن. مع مرور الوقت يصبح لونها داكنًا. الطبقة هي تراكم. كيف ستبدو الصخرة إذا غُسلت؟ كيف تغيرها الطبقة؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الطبقة؟
      - كيف يحدد الغبار البيئة؟
      - ما هي العلاقة بين السطح والتراكم؟
  - id: nmr_river_sculpt
    name: نحت النهر
    prompt: |
      ينحت النهر قاعه — حفر، برك، تيارات سريعة. الصخر يتشكل بفعل الماء والرواسب. ابحث عن امتداد. اقرأ النحت. ماذا يكشف الشكل؟
    follow_ups:
      - ماذا سيكون قاع النهر بدون النحت؟
      - كيف يشكل التدفق الصخر؟
      - ما هي العلاقة بين الماء والشكل؟
  - id: nmr_shard_edge
    name: حافة شظية
    prompt: |
      شظية صوان، قطعة من الشيرت — حادة، مشغولة أو طبيعية. قد يكون شخص ما استخدمها. الحافة وظيفية. فكر في الكسر. كيف صُنعت؟
    follow_ups:
      - ماذا ستكون الشظية بدون الحافة؟
      - كيف يخلق الكسر فائدة؟
      - ما هي العلاقة بين الكسر والأداة؟
  - id: nmr_gravel_path
    name: مسار حصى
    prompt: |
      مسار حصى — صخر مكسور تحت الأقدام. القرمشة، الانثناء. المسار هو اختيار بشري. لماذا هذا السطح؟ ماذا يفعل الحصى ولا تفعله التربة؟
    follow_ups:
      - ماذا سيكون المسار بدون الحصى؟
      - كيف يشكل المسار الحركة؟
      - ما هي العلاقة بين الحجر والمشي؟
  - id: nmr_bedrock_exposure
    name: انكشاف الصخر الأساسي
    prompt: |
      حيث جُرفت التربة — بفعل التعرية، البناء — يظهر الصخر الأساسي. الأساس مرئي. فكر فيما يُخفى عادة. ماذا يكشف الانكشاف؟
    follow_ups:
      - ماذا سيكون المنظر الطبيعي بدون الانكشاف؟
      - كيف يشكل الصخر الأساسي السطح؟
      - ما هي العلاقة بين المخفي والمكشوف؟
  - id: nmr_wind_polish
    name: صقل الرياح
    prompt: |
      صخور الصحراء مصقولة بفعل الرياح — ملساء، متعددة الأوجه. الرمل يضرب السطح. الصقل كاشط. فكر في الرياح. كم من الوقت استغرقت؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الصقل؟
      - كيف تشكل الرياح الحجر؟
      - ما هي العلاقة بين الجزيء والسطح؟
  - id: nmr_hot_cold_crack
    name: تشقق الحرارة والبرودة
    prompt: |
      يتمدد الصخر في الحرارة، وينكمش في البرد. الدورات المتكررة تسبب إجهادًا، وتشققًا دقيقًا. ابحث عن شق. فكر في تقلبات درجة الحرارة التي صنعته.
    follow_ups:
      - ماذا ستكون الصخرة بدون الشق؟
      - كيف تشكل الدورات الحرارية المناظر الطبيعية؟
      - ما هي العلاقة بين درجة الحرارة والكسر؟
  - id: nmr_constellation_stone
    name: حجر كوكبي
    prompt: |
      صخرة بها بقع — ميكا، فلسبار — تلتقط الضوء. السطح يلمع. فكر في علم المعادن. ماذا خلق البريق؟
    follow_ups:
      - ماذا ستكون الصخرة بدون البقع؟
      - كيف يكشف الضوء عن البنية؟
      - ما هي العلاقة بين المعدن والانعكاس؟
  - id: nmr_stepping_stone
    name: حجر خطوة
    prompt: |
      صخور وضعت في مجرى أو طين — أحجار خطوة. الوضع متعمد. فكر في المسار. ماذا يتطلب كل خطوة؟ ماذا يتيح الحجر؟
    follow_ups:
      - ماذا سيكون العبور بدون الأحجار؟
      - كيف يخلق الحجر وصولاً؟
      - ما هي العلاقة بين الحجر والمرور؟
  - id: nmr_moss_island
    name: جزيرة الطحلب
    prompt: |
      صخرة في مجرى — ينمو الطحلب فوقها. الصخرة جزيرة. الماء يتدفق حولها. فكر في العزلة. ماذا يصل إلى الطحلب؟ وماذا لا يصل؟
    follow_ups:
      - ماذا سيكون المجرى بدون الجزيرة؟
      - كيف تخلق الصخرة ملاذًا؟
      - ما هي العلاقة بين الصخر والتدفق؟
  - id: nmr_weight_sunken
    name: وزن غارق
    prompt: |
      صخرة ثقيلة تغوص في التربة بمرور الوقت. يتشكل التجويف حولها. فكر في الجاذبية. ماذا يفعل الغرق بالتربة؟ بالصخر؟
    follow_ups:
      - ماذا ستكون الأرض بدون الصخرة؟
      - كيف يشكل الوزن السطح؟
      - ما هي العلاقة بين الكتلة والتجويف؟
  - id: nmr_layer_sediment
    name: طبقة رواسب
    prompt: |
      الصخر الرسوبي يظهر طبقات — مستويات ترسيب. كل طبقة كانت يومًا طينًا، رملًا، قواقع. الصخر هو زمن مضغوط. فكر في طبقة واحدة. ماذا كانت من قبل؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الطبقات؟
      - كيف تسجل الطبقة البيئة؟
      - ما هي العلاقة بين الرواسب والحجر؟
  - id: nmr_sunrise_heat
    name: حرارة شروق الشمس
    prompt: |
      صخرة مسطحة تواجه الشرق. عند الشروق تسخن أولاً. فكر في الاتجاه. ماذا يحدد زاوية الشمس؟ من يستفيد من الدفء المبكر؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الاتجاه؟
      - كيف يشكل المنظر درجة الحرارة؟
      - ما هي العلاقة بين الزاوية والحرارة؟
  - id: nmr_rain_rinse
    name: غسل المطر
    prompt: |
      يضرب المطر الصخر، ويتدفق. الماء يحمل ما يذوب، وما يعلقه. الغسل مستمر. ماذا تفقد الصخرة؟ ماذا يكسب الماء؟
    follow_ups:
      - ماذا ستكون الصخرة بدون المطر؟
      - كيف يشكل الجريان السطحي الصخر؟
      - ما هي العلاقة بين الماء والذوبان؟
  - id: nmr_ice_wedge
    name: إسفين الجليد
    prompt: |
      يتجمد الماء في شق، يوسعها. إسفين الجليد يكسر الصخور. ابحث عن دليل إذا استطعت. فكر في القوة. ماذا سيصبح الشق؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الجليد؟
      - كيف ينتشر الإسفين؟
      - ما هي العلاقة بين التجمد والكسر؟
  - id: nmr_resting_place
    name: مكان راحة
    prompt: |
      صخرة مسطحة — مقعد، طاولة، مسرح. نستخدم الصخور للراحة، للعمل، للإشارة. فكر في الصخرة التي قد تجلس عليها. ماذا دعمت؟ ماذا ستحمل؟
    follow_ups:
      - ماذا ستكون المساحة بدون الصخرة؟
      - كيف تدعو الصخرة للاستخدام؟
      - ما هي العلاقة بين المعدن والبشر؟
  - id: nmr_boundary_marker
    name: علامة حدود
    prompt: |
      الصخور تحدد الحدود — خطوط الملكية، القبور، المسارات. الوضع متعمد. فكر في حجر حدود. ماذا يفصل؟ ماذا يربط؟
    follow_ups:
      - ماذا سيكون الحد بدون الحجر؟
      - كيف يشفر الحجر المعنى؟
      - ما هي العلاقة بين العلامة والإقليم؟
  - id: nmr_exfoliation_sheet
    name: لوح التقشير
    prompt: |
      بعض الصخور تتقشر — طبقات تنفصل كالبصل. إزالة الضغط، دورات حرارية. ابحث عن صخرة كبيرة تتقشر. فكر في المنحنى. ما القوى التي صنعته؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الألواح؟
      - كيف يشكل التقشير السطح؟
      - ما هي العلاقة بين الضغط والتقشير؟
  - id: nmr_compass_orientation
    name: توجيه بوصلة
    prompt: |
      يمكن لمحاذاة الصخور — بالجليد، بالنهر، بيد الإنسان. التوجيه يحكي قصة. ابحث عن أحجار متراصة. إلى ماذا تشير؟ ماذا تقاوم؟
    follow_ups:
      - ماذا سيعني التوجيه؟
      - كيف يسجل التوجيه القوة؟
      - ما هي العلاقة بين الاتجاه والحجر؟
  - id: nmr_echo_sound
    name: حجر الصدى
    prompt: |
      واجهة صخرية تعكس الصوت. صفق. استمع للصدى. الصخر يعيد ما ترسله. فكر في السطح. ماذا يعكس؟ ماذا يمتص؟
    follow_ups:
      - ماذا ستكون المساحة بدون الصدى؟
      - كيف يشكل السطح الصوت؟
      - ما هي العلاقة بين الصخر والصوت؟
  - id: nmr_anchor_hold
    name: إمساك المرساة
    prompt: |
      صخرة تثبت — جذر شجرة يلتف حولها، كابل مربوط بها. الصخرة تمسك. فكر في القبضة. ماذا تقاوم الصخرة؟ ماذا تتيح؟
    follow_ups:
      - ماذا ستكون المرساة بدون الصخرة؟
      - كيف تخلق الصخرة الاستقرار؟
      - ما هي العلاقة بين الإمساك والكتلة؟
  - id: nmr_patina_age
    name: طبقة الزمن
    prompt: |
      الصخر القديم يطور طبقة — قشرة تجوية، أكسدة، تلوث. السطح يتغير. الطبقة هي زمن مرئي. كيف ستبدو الصخرة جديدة؟
    follow_ups:
      - ماذا ستكون الصخرة بدون الطبقة؟
      - كيف تحمي الطبقة أو تضعف؟
      - ما هي العلاقة بين السطح والعمر؟
  - id: nmr_slow_narrative
    name: سرد بطيء
    prompt: |
      الصخر يروي قصة بطيئة — تشكل، نقل، تجوية. الجدول الزمني جيولوجي. اجلس مع صخرة. فكر في ماضيها. ما سيكون مستقبلها؟
    follow_ups:
      - ماذا سنخسر لو لم نستطع قراءة القصة؟
      - كيف يتصل الصخر بالزمن السحيق؟
      - ما هي العلاقة بين الصخر والذاكرة؟
  - id: nmr_cairn_stack
    name: كومة حجارة
    prompt: |
      كومة حجارة — أحجار مكدسة باليد. كل حجر يتوازن. الكومة متعمدة، مؤقتة. من بناها؟ ماذا تشير؟
    follow_ups:
      - ماذا سيكون المكان بدون الكومة؟
      - كيف تخلق الكومة معنى؟
      - ما هي العلاقة بين الإنسان والحجر؟
  - id: nmr_shadow_cast
    name: ظل مسقوط
    prompt: |
      صخرة تلقي بظلال. الظل يتحرك مع الشمس. اجلس معها لساعة. فكر في ساعة الحجر والضوء.
    follow_ups:
      - ماذا ستكون الصخرة بدون الظل؟
      - كيف يخلق الظل موطنًا؟
      - ما هي العلاقة بين الصخر والوقت؟
  - id: nmr_scree_slope
    name: منحدر الحتات
    prompt: |
      حتات — صخور مفككة في قاعدة جرف. كل قطعة سقطت. المنحدر هو تراكم. امشِ عليه. اشعر بعدم الاستقرار. ما الذي يثبته؟ ماذا سيتحرر؟
    follow_ups:
      - ماذا سيكون المنحدر بدون السقوط؟
      - كيف يشكل الحتات الوادي؟
      - ما هي العلاقة بين الجرف والأرض؟
  - id: nmr_fossil_imprint
    name: بصمة الأحفورة
    prompt: |
      أحفورة في صخر — قوقعة، ورقة، عظم. البصمة سجل. الكائن الحي اختفى؛ الحجر يحتفظ بشكله. فكر في الحفظ.
    follow_ups:
      - ماذا سنعرف بدون الأحفورة؟
      - كيف تربط البصمة بين الأزمنة؟
      - ما هي العلاقة بين الحياة والمعدن؟
  - id: nmr_dry_stone_wall
    name: جدار حجري جاف
    prompt: |
      جدار حجري جاف — بدون ملاط. كل حجر يدعم التالي بالتراص والاحتكاك. الجدار تعاون. تتبع المفاصل. ماذا ستفعل حجر واحد مفكوك؟
    follow_ups:
      - ماذا سيكون الحد بدون الجدار؟
      - كيف يخلق التراص القوة؟
      - ما هي العلاقة بين الحجر والبناء؟
  - id: nmr_cobble_rest
    name: راحة الحصى
    prompt: |
      الحصى ترتاح حيث تركها الماء — شاطئ نهر، شاطئ بحر. الترتيب ليس عشوائيًا. الحجم، الشكل، الموضع تحكي عن التدفق. ماذا ستعيد فيضان إعادة ترتيبه؟
    follow_ups:
      - كيف تحدد الراحة الحدث الأخير؟
      - ماذا ستكشف الحصى عن الماء؟
      - ما هي العلاقة بين الراحة والاضطراب؟
  - id: nmr_moon_dust
    name: غبار القمر
    prompt: |
      الصخر يتحول إلى غبار — رياح، ماء، جذور. أدق الجسيمات تسافر. فكر في رحلة حبة واحدة. أين قد تنتهي؟
    follow_ups:
      - ماذا سيكون المنظر الطبيعي بدون الغبار؟
      - كيف يخلق الغبار تربة جديدة؟
      - ما هي العلاقة بين الصخر والهواء؟
  - id: nmr_touch_stone
    name: لمس الحجر
    prompt: |
      المس صخرة. بارد، دافئ، خشن، ناعم. الصخر لا يستجيب — أو يستجيب؟ الحرارة تنتقل. الرطوبة تتغير. فكر في التبادل عند الحدود.
    follow_ups:
      - كيف سيشعر الحجر في وقت مختلف؟
      - كيف يغير اللمس الحجر؟
      - ما هي العلاقة بين اليد والحجر؟
  - id: nmr_shadow_noon
    name: ظل الظهيرة
    prompt: |
      في الظهيرة، ظل الصخرة يكون ضئيلاً. عند الفجر والغسق، يمتد. الظل هو مدى الصخرة. فكر كيف تغير الشمس ما تقدمه الصخرة للعالم.
    follow_ups:
      - ماذا ستقدم الصخرة بدون الظل؟
      - كيف يخلق الظل موطنًا؟
      - ما هي العلاقة بين الصخر والضوء؟
  - id: nmr_stone_circle
    name: دائرة حجرية
    prompt: |
      أحجار مرتبة في دائرة — بيد الإنسان أو بفعل الجليد. الدائرة تؤطر مساحة. ماذا بداخلها؟ ماذا بالخارج؟ فكر في هندسة الحدود.
    follow_ups:
      - ماذا ستعني المساحة بدون الدائرة؟
      - كيف يخلق الترتيب معنى؟
      - ما هي العلاقة بين الشكل والطقوس؟
