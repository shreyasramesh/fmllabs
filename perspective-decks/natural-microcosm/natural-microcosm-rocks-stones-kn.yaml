# ಸಹಜ ಸೂಕ್ಷ್ಮ ಪ್ರಪಂಚ — ಕಲ್ಲುಗಳು ಮತ್ತು ಶಿಲೆಗಳು (Kannada)

id: natural_microcosm_rocks_stones
name: ಸಹಜ ಸೂಕ್ಷ್ಮ ಪ್ರಪಂಚ — ಕಲ್ಲುಗಳು ಮತ್ತು ಶಿಲೆಗಳು
description: 50 ಕಾರ್ಡ್‌ಗಳು, ನೀವು ಕಲ್ಲುಗಳು ಮತ್ತು ಶಿಲೆಗಳನ್ನು ನೋಡುವ ರೀತಿಯನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ - ಭೂವೈಜ್ಞಾನಿಕ ಕಾಲ ಮತ್ತು ಪಾಚಿ ಯಿಂದ ಹವಾಮಾನ, ಸವೆತ ಮತ್ತು ಖನಿಜದ ನಿಧಾನಗತಿಯ ಜೀವನದವರೆಗೆ.
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: ಪಾಚಿ ನಕ್ಷೆ
    prompt: |
      ಕಲ್ಲಿನ ಮೇಲೆ ಪಾಚಿ ಬೆಳೆಯುತ್ತದೆ - ನಿಧಾನ, ತಾಳ್ಮೆ. ಕಿತ್ತಳೆ, ಬೂದು, ಹಸಿರು. ಇದು ಒಂದು
      ಜೀವಿ ಅಲ್ಲ, ಎರಡು: ಶಿಲೀಂಧ್ರ ಮತ್ತು ಆಲ್ಗಾ. ಪಾಲುದಾರಿಕೆಯ ಬಗ್ಗೆ ಯೋಚಿಸಿ. ಕಲ್ಲು ಏನು ನೀಡುತ್ತದೆ?
      ಪಾಚಿ ಏನು ಹಿಂತಿರುಗಿಸುತ್ತದೆ?
    follow_ups:
      - ಪಾಚಿ ಇಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರಬಹುದು?
      - ಪಾಚಿ ಹೇಗೆ ಕಾಲವನ್ನು ಗುರುತಿಸುತ್ತದೆ?
      - ಪಾಚಿ ಮತ್ತು ಸವೆತದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_pebble_smooth
    name: ನಯವಾದ ಗುಲಗಂಜಿ
    prompt: |
      ನದಿಯ ಗುಲಗಂಜಿ ನಯವಾಗಿರುತ್ತದೆ - ನೀರು ಮತ್ತು ಮರಳು ಅದನ್ನು ಸವೆಸಿವೆ. ಒಂದು ಹಿಡಿದುಕೊಳ್ಳಿ.
      ಎಷ್ಟು ವರ್ಷಗಳು ಬೇಕಾಯಿತು? ನಯವಾದದ್ದು ಪ್ರಯಾಣದ ದಾಖಲೆಯಾಗಿದೆ. ತೀಕ್ಷ್ಣವಾದ ಅಂಚು
      ಏನನ್ನು ಸೂಚಿಸುತ್ತದೆ?
    follow_ups:
      - ನಯವಾದದ್ದು ಹೇಗೆ ಇತಿಹಾಸವನ್ನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
      - ನೀರಿಲ್ಲದೆ ಗುಲಗಂಜಿ ಹೇಗಿರುತ್ತದೆ?
      - ಆಕಾರ ಮತ್ತು ಹರಿವಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_crack_frost
    name: ಹಿಮ ಬಿರುಕು
    prompt: |
      ಬಿರುಕಿನಲ್ಲಿ ನೀರು ಹೆಪ್ಪುಗಟ್ಟುತ್ತದೆ, ವಿಸ್ತರಿಸುತ್ತದೆ. ಕಲ್ಲು ಒಡೆಯುತ್ತದೆ. ಇದು ನಿಧಾನಗತಿಯ
      ಹಿಂಸೆ. ಒಂದು ಬಿರುಕುಳ್ಳ ಕಲ್ಲು ಹುಡುಕಿ. ಅದು ಉಂಟಾದ ಘನೀಕರಣ ಮತ್ತು ಕರಗುವಿಕೆಯ
      ಚಕ್ರಗಳ ಬಗ್ಗೆ ಯೋಚಿಸಿ.
    follow_ups:
      - ಬಿರುಕು ಇಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
      - ಹಿಮವು ಭೂದೃಶ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ನೀರು ಮತ್ತು ಬಿರುಕಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_stone_warmth
    name: ಕಲ್ಲಿನ ಉಷ್ಣತೆ
    prompt: |
      ಸೂರ್ಯನಿಂದ ಕಾದ ಕಲ್ಲು ಶಾಖವನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ. ಸಂಜೆ ಅದನ್ನು ಕುಳಿತುಕೊಳ್ಳಿ.
      ಕಲ್ಲು ಹೀರಿಕೊಂಡದ್ದನ್ನು ಬಿಡುಗಡೆ ಮಾಡುತ್ತದೆ. ವಿನಿಮಯದ ಬಗ್ಗೆ ಯೋಚಿಸಿ. ಸೂರ್ಯನಿಲ್ಲದೆ
      ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಕಲ್ಲು ಸೂಕ್ಷ್ಮ ಹವಾಮಾನವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಆ ಶಾಖವನ್ನು ಯಾವ ಜೀವಿಗಳು ಬಳಸುತ್ತವೆ?
      - ಕಲ್ಲು ಮತ್ತು ಶಾಖದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_moss_crust
    name: ಪಾಚಿಯ ಹೊರಪದರ
    prompt: |
      ಕಲ್ಲಿನ ಮೇಲೆ ಪಾಚಿ ಬೆಳೆಯುತ್ತದೆ - ತೆಳುವಾದ ಹೊರಪದರ. ಇದು ತೇವಾಂಶವನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ,
      ಧೂಳನ್ನು ಸಂಗ್ರಹಿಸುತ್ತದೆ. ಕಲ್ಲು ಒಂದು ಆಧಾರವಾಗುತ್ತದೆ. ಕಲ್ಲು ಯಾವಾಗ ಮಣ್ಣಾಗುತ್ತದೆ?
      ಮತ್ತು ಎಲ್ಲಿದೆ ಆ ರೇಖೆ?
    follow_ups:
      - ಪಾಚಿ ಇಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
      - ಹೊರಪದರವು ಬದಲಾವಣೆಯನ್ನು ಹೇಗೆ ವೇಗಗೊಳಿಸುತ್ತದೆ?
      - ಖನಿಜ ಮತ್ತು ಜೈವಿಕದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_vein_quartz
    name: ಕ್ವಾರ್ಟ್ಜ್ ರಕ್ತನಾಳ
    prompt: |
      ಒಂದು ಕ್ವಾರ್ಟ್ಜ್ ರಕ್ತನಾಳ ಕಲ್ಲಿನ ಮೂಲಕ ಹಾದುಹೋಗುತ್ತದೆ - ವಿಭಿನ್ನ ಖನಿಜದ ಒಂದು ತೆಳುವಾದ
      ಪಟ್ಟಿ. ಇದು ಬಿರುಕು, ತುಂಬುವಿಕೆಯನ್ನು ಗುರುತಿಸುತ್ತದೆ. ರೇಖೆಯನ್ನು ಗುರುತಿಸಿ. ಯಾವ ಶಕ್ತಿಗಳು
      ಅದನ್ನು ಉಂಟುಮಾಡಿದವು? ರಕ್ತನಾಳ ಏನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
    follow_ups:
      - ರಕ್ತನಾಳವಿಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
      - ರಕ್ತನಾಳವು ಆಳವಾದ ಕಾಲವನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ಬಿರುಕು ಮತ್ತು ಸೌಂದರ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_puddle_reflect
    name: ಕಲ್ಲಿನಲ್ಲಿ ಹೊಂಡ
    prompt: |
      ಮಳೆ ನಂತರ ಕಲ್ಲಿನ ಖಿನ್ನತೆ ನೀರನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ. ಇದು ಒಂದು ಸಣ್ಣ ಹೊಂಡ - ಒಂದು
      ಕಪ್. ಅದರಲ್ಲಿ ಏನನ್ನು ಪ್ರತಿಫಲಿಸುತ್ತದೆ? ಏನನ್ನು ಆವಿಯಾಗುತ್ತದೆ? ಕಲ್ಲು ಒಂದು ಪಾತ್ರೆಯನ್ನು
      ಮಾಡಿದೆ.
    follow_ups:
      - ಖಿನ್ನತೆಯಿಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
      - ಹೊಂಡವು ಆವಾಸಸ್ಥಾನವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಖಿನ್ನತೆ ಮತ್ತು ಕಾಲದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_sand_grain
    name: ಮರಳಿನ ಕಣ
    prompt: |
      ಮರಳು ಕಲ್ಲಿನ ಸಣ್ಣ ತುಂಡು. ಒಂದು ಹಿಡಿ ಹಿಡಿದುಕೊಳ್ಳಿ. ಪ್ರತಿ ಕಣವು ಒಮ್ಮೆ ದೊಡ್ಡದರ
      ಭಾಗವಾಗಿತ್ತು. ಪ್ರಮಾಣದ ಬಗ್ಗೆ ಯೋಚಿಸಿ. ಒಂದು ಪರ್ವತದಲ್ಲಿ ಎಷ್ಟು ಕಣಗಳಿವೆ?
    follow_ups:
      - ಕಣಗಳಿಲ್ಲದೆ ಕಡಲತೀರ ಹೇಗಿರುತ್ತದೆ?
      - ಕಣದ ಗಾತ್ರವು ಕಥೆಯನ್ನು ಹೇಗೆ ಹೇಳುತ್ತದೆ?
      - ಸಂಪೂರ್ಣ ಮತ್ತು ಭಾಗದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_stone_circle
    name: ಕಲ್ಲಿನ ವೃತ್ತ
    prompt: |
      ಕೈಯಿಂದ ಅಥವಾ ಹಿಮನದಿಯಿಂದ ಜೋಡಿಸಲಾದ ಕಲ್ಲುಗಳು - ಒಂದು ವೃತ್ತ, ಒಂದು ಕಲ್ಲುಗುಡ್ಡೆ,
      ಒಂದು ಗೋಡೆ. ಯಾರೋ ಅಥವಾ ಏನೋ ಅವುಗಳನ್ನು ಇರಿಸಿದೆ. ಉದ್ದೇಶದ ಬಗ್ಗೆ ಯೋಚಿಸಿ.
      ಜೋಡಣೆ ಏನು ಸೂಚಿಸುತ್ತದೆ?
    follow_ups:
      - ಕಲ್ಲುಗಳಿಲ್ಲದೆ ಸ್ಥಳ ಹೇಗಿರುತ್ತದೆ?
      - ಜೋಡಣೆಯು ಅರ್ಥವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಕಲ್ಲು ಮತ್ತು ವಿಧಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_erosion_edge
    name: ಸವೆತದ ಅಂಚು
    prompt: |
      ಗಾಳಿ ಮತ್ತು ನೀರು ಕಲ್ಲು ಕೆತ್ತನೆ ಮಾಡುತ್ತವೆ. ಒಂದು ಅಂಚನ್ನು ಹುಡುಕಿ - ಒಂದು ಬಂಡೆ,
      ಒಂದು ದೊಡ್ಡ ಕಲ್ಲು. ಆಕಾರವು ತೆಗೆದುಹಾಕುವಿಕೆಯ ಫಲಿತಾಂಶವಾಗಿದೆ. ಮೊದಲು ಏನಿದ್ದಿತು?
      ಏನು ಉಳಿಯುತ್ತದೆ?
    follow_ups:
      - ಸವೆತವಿಲ್ಲದೆ ಭೂದೃಶ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಅಂಚು ಕಾಲವನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ನಷ್ಟ ಮತ್ತು ರೂಪದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_color_streak
    name: ಬಣ್ಣದ ಗೆರೆ
    prompt: |
      ಕಲ್ಲು ಏಕರೂಪವಾಗಿರುವುದಿಲ್ಲ - ಕಬ್ಬಿಣ ಕೆಂಪು, ಮ್ಯಾಂಗನೀಸ್ ಕಪ್ಪು, ತಾಮ್ರ ಹಸಿರು.
      ಒಂದು ಗೆರೆಯನ್ನು ಗುರುತಿಸಿ. ಬಣ್ಣವು ರಸಾಯನಶಾಸ್ತ್ರವಾಗಿದೆ. ಕಲ್ಲಿನ ಇತಿಹಾಸದ ಬಗ್ಗೆ
      ಅದು ಏನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
    follow_ups:
      - ಬಣ್ಣವಿಲ್ಲದೆ ಕಲ್ಲು ಹೇಗಿರುತ್ತದೆ?
      - ಖನಿಜಶಾಸ್ತ್ರವು ಬಣ್ಣದ ಪ್ಯಾಲೆಟ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಮೂಲ ಮತ್ತು ಬಣ್ಣದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_scratch_glacier
    name: ಹಿಮನದಿ ಗೀರು
    prompt: |
      ಹಿಮನದಿ ಗೀರುಗಳು - ಮೂಲಶಿಲೆಯ ಮೇಲೆ ಗೀರುಗಳು - ಹಿಮವು ಕಲ್ಲುಗಳನ್ನು ಕಲ್ಲಿನ ಮೇಲೆ
      ಎಳೆದ ಸ್ಥಳವನ್ನು ಗುರುತಿಸುತ್ತವೆ. ರೇಖೆಗಳು ಸಮಾನಾಂತರವಾಗಿವೆ. ಶಕ್ತಿಯ ಬಗ್ಗೆ ಯೋಚಿಸಿ.
      ಏನು ಚಲಿಸಿತು? ಯಾವುದು ಸ್ಥಿರವಾಗಿತ್ತು?
    follow_ups:
      - ಗೀರುಗಳಿಲ್ಲದೆ ಕಲ್ಲು ಏನು ತೋರಿಸುತ್ತದೆ?
      - ಗೀರು ದಿಕ್ಕನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ಹಿಮ ಮತ್ತು ಕಲ್ಲಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_cobble_pattern
    name: ಗುಲಗಂಜಿ ಜೋಡಣೆ
    prompt: |
      ಗುಲಗಂಜಿಗಳ ಕಡಲತೀರ ಅಥವಾ ನದಿಪಾತ್ರ - ಒಂದೇ ಗಾತ್ರ, ವಿಭಿನ್ನ ಆಕಾರ. ನೀರು
      ಅವುಗಳನ್ನು ವಿಂಗಡಿಸಿದೆ. ಜೋಡಣೆಯ ಬಗ್ಗೆ ಯೋಚಿಸಿ. ವಿಂಗಡಣೆಯು ನಿಮಗೆ ಏನು ಹೇಳುತ್ತದೆ?
    follow_ups:
      - ವಿಂಗಡಣೆಯಿಲ್ಲದೆ ಕಡಲತೀರ ಹೇಗಿರುತ್ತದೆ?
      - ಹರಿವು ಜೋಡಣೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಗಾತ್ರ ಮತ್ತು ಸಾಗಣೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmr_cavern_drip
    name: ಗುಹೆ ಹನಿ
    prompt: |
      ಸ್ಟಾಲಕ್ಟೈಟ್‌ಗಳು ಹನಿ ಹನಿಯಾಗಿ ರೂಪುಗೊಳ್ಳುತ್ತವೆ - ಸೋರುವ ನೀರಿನಿಂದ ಖನಿಜ ನಿಕ್ಷೇಪಗಳು.
      ಬೆಳವಣಿಗೆಯನ್ನು ಗ್ರಹಿಸಲಾಗುವುದಿಲ್ಲ. ಕಾಲಾವಧಿಯ ಬಗ್ಗೆ ಯೋಚಿಸಿ. ವೇಗವರ್ಧಿತ ಚಲನಚಿತ್ರ
      ಏನು ತೋರಿಸುತ್ತದೆ?
    follow_ups:
      - ಹನಿಯಿಲ್ಲದೆ ಗುಹೆ ಹೇಗಿರುತ್ತದೆ?
