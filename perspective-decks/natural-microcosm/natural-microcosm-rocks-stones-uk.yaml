# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природний мікрокосм — Каміння та Скелі (Ukrainian)

id: natural_microcosm_rocks_stones
name: Природний мікрокосм — Каміння та Скелі
description: 50 карток, щоб змінити ваше сприйняття каміння та скель — від геологічного часу та лишайників до вивітрювання, ерозії та повільного життя мінералів.
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: Лишайникова карта
    prompt: |
      Лишайник росте на камені — повільно, терпляче. Помаранчевий, сірий, зелений. Це не один
      організм, а два: гриб і водорість. Розгляньте їхню співпрацю. Що пропонує камінь?
      Що дає лишайник у відповідь?
    follow_ups:
      - Як би виглядав камінь без лишайників?
      - Як лишайники відзначають час?
      - Який зв'язок між лишайниками та вивітрюванням?
  - id: nmr_pebble_smooth
    name: Гладенька галька
    prompt: |
      Річкова галька гладенька — вода та пісок сточили її. Візьміть її в руку. Скільки
      років це тривало? Гладкість — це свідчення подорожі. Що означав би гострий край?
    follow_ups:
      - Як гладкість розкриває історію?
      - Що б було з галькою без води?
      - Який зв'язок між формою та потоком?
  - id: nmr_crack_frost
    name: Морозний тріщин
    prompt: |
      Вода замерзає в тріщині, розширюється. Камінь розколюється. Це повільне насильство.
      Знайдіть камінь з тріщиною. Розгляньте цикли замерзання та відтавання,
      що її створили.
    follow_ups:
      - Що б було з каменем без тріщини?
      - Як мороз формує ландшафт?
      - Який зв'язок між водою та розколом?
  - id: nmr_stone_warmth
    name: Тепло каменю
    prompt: |
      Нагрітий сонцем камінь зберігає тепло. Сядьте на нього в сутінках. Камінь віддає те,
      що поглинув. Розгляньте обмін. Що б було з каменем без
      сонця?
    follow_ups:
      - Як камінь створює мікроклімат?
      - Які істоти використовують це тепло?
      - Який зв'язок між каменем і теплом?
  - id: nmr_moss_crust
    name: Мохова кірка
    prompt: |
      Мох росте на камені — тонка кірка. Він утримує вологу, затримує пил.
      Камінь стає субстратом. Коли камінь стає ґрунтом? Де межа?
    follow_ups:
      - Що б було з каменем без моху?
      - Як кірка прискорює зміни?
      - Який зв'язок між мінералом і органікою?
  - id: nmr_vein_quartz
    name: Кварцева жила
    prompt: |
      Кварцева жила проходить крізь камінь — прошарок іншого мінералу. Вона позначає
      розрив, заповнення. Прослідкуйте лінію. Які сили її створили? Що розкриває жила?
    follow_ups:
      - Що б було з каменем без жили?
      - Як жила відзначає глибокий час?
      - Який зв'язок між розколом і красою?
  - id: nmr_puddle_reflect
    name: Калюжа в камені
    prompt: |
      Заглиблення в камені утримує воду після дощу. Це маленька водойма — чаша. Що
      відбивається в ній? Що випаровується? Камінь створив посудину.
    follow_ups:
      - Що б було з каменем без заглиблення?
      - Як водойма створює середовище існування?
      - Який зв'язок між порожниною і часом?
  - id: nmr_sand_grain
    name: Піщинка
    prompt: |
      Пісок — це дрібно подрібнений камінь. Візьміть жменю. Кожна піщинка колись була частиною
      чогось більшого. Розгляньте масштаб. Скільки піщинок у горі?
    follow_ups:
      - Що б було з пляжем без піщинок?
      - Як розмір піщинки розповідає історію?
      - Який зв'язок між цілим і частиною?
  - id: nmr_stone_circle
    name: Кам'яне коло
    prompt: |
      Камені, розставлені рукою або льодовиком — коло, курган, стіна. Хтось
      або щось їх розмістив. Розгляньте намір. Що означає
      розстановка?
    follow_ups:
      - Що б було з простором без каменів?
      - Як розстановка створює значення?
      - Який зв'язок між каменем і ритуалом?
  - id: nmr_erosion_edge
    name: Край ерозії
    prompt: |
      Вітер і вода виточують камінь. Знайдіть край — скелю, валун. Форма
      є результатом видалення. Що було там раніше? Що залишиться?
    follow_ups:
      - Що б було з ландшафтом без ерозії?
      - Як край відзначає час?
      - Який зв'язок між втратою і формою?
  - id: nmr_color_streak
    name: Кольорова смуга
    prompt: |
      Камінь не однорідний — залізо фарбує червоним, марганець — чорним, мідь — зеленим.
      Прослідкуйте смугу. Колір — це хімія. Що він розкриває про історію
      каменя?
    follow_ups:
      - Що б було з каменем без кольору?
      - Як мінералогія формує палітру?
      - Який зв'язок між елементом і відтінком?
  - id: nmr_scratch_glacier
    name: Льодовикова подряпина
    prompt: |
      Льодовикові смуги — подряпини на корінній породі — позначають, де лід тягнув камені
      по каменю. Лінії паралельні. Розгляньте силу. Що рухалося?
      Що залишалося нерухомим?
    follow_ups:
      - Що б показував камінь без подряпин?
      - Як подряпина позначає напрямок?
      - Який зв'язок між льодом і каменем?
  - id: nmr_cobble_pattern
    name: Візерунок з гальки
    prompt: |
      Пляж або річкове дно з гальки — подібного розміру, різної форми. Вода
      розсортувала їх. Розгляньте візерунок. Що вам говорить сортування?
    follow_ups:
      - Що б було з пляжем без сортування?
      - Як потік формує візерунок?
      - Який зв'язок між розміром і транспортуванням?
  - id: nmr_cavern_drip
    name: Крапельниця в печері
    prompt: |
      Сталактити утворюються крапля за краплею — мінеральні відкладення від просочуваної води.
      Ріст непомітний. Розгляньте часовий масштаб. Що показав би прискорений
      фільм?
    follow_ups:
      - Що б було з печерою без крапель?
      - Як крапельниця записує клімат?
      - Який зв'язок між водою і каменем?
  - id: nmr_boulder_shadow
    name: Тінь валуна
    prompt: |
      Великий валун відкидає тінь. Земля під ним інша — прохолодніша, вологіша, менше сонця.
      Валун створює мікроклімат. Хто живе в тіні?
    follow_ups:
      - Що б було зі схилом без валуна?
      - Як тінь формує життя?
      - Який зв'язок між каменем і притулком?
  - id: nmr_fossil_impression
    name: Відбиток скам'янілості
    prompt: |
      Скам'янілість — це життя, перетворене на камінь — або відбиток, залишений у осаді.
      Знайдіть одну, якщо зможете. Камінь зберігає пам'ять. Яка істота залишила це?
      Коли?
    follow_ups:
      - Що б було з каменем без скам'янілості?
      - Як відбиток зберігає?
      - Який зв'язок між життям і мінералом?
  - id: nmr_grit_texture
    name: Текстура крупинок
    prompt: |
      Проведіть рукою по каменю. Пісковик відчувається інакше, ніж граніт, сланець
      інакше, ніж базальт. Текстура — це мінерал, зерно, структура. Що говорить дотик?
    follow_ups:
      - Що б було з каменем без його текстури?
      - Як текстура розкриває походження?
      - Який зв'язок між відчуттям і складом?
  - id: nmr_talus_slope
    name: Кам'яний осип
    prompt: |
      Кам'яний осип — подрібнене каміння біля підніжжя скелі. Гравітація та погода
      зносять його вниз. Схил — це купа наслідків. Скільки часу знадобилося,
      щоб він накопичився?
    follow_ups:
      - Що б було з підніжжям скелі без осипу?
      - Як осип відзначає ерозію?
      - Який зв'язок між падінням і купою?
  - id: nmr_soil_horizon
    name: Ґрунтовий горизонт
    prompt: |
      Копайте обережно. Ґрунт має шари — органічні зверху, мінеральні знизу, іноді
      чіткі смуги. Горизонт — це історія. Що створило кожен шар?
    follow_ups:
      - Що б було з землею без горизонтів?
      - Як горизонт записує час?
      - Який зв'язок між каменем і ґрунтом?
  - id: nmr_drystone_wall
    name: Суха кам'яна стіна
    prompt: |
      Суха кам'яна стіна — каміння, складене без розчину. Стіна тримається завдяки гравітації
      та підгону. Розгляньте майстерність. Як кожен камінь підтримує наступний?
    follow_ups:
      - Що б було з полем без стіни?
      - Як стіна позначає територію?
      - Який зв'язок між каменем і межею?
  - id: nmr_tide_pool_rock
    name: Камінь в припливній басейні
    prompt: |
      Камені в припливному басейні намокають, висихають, намокають знову. Істоти чіпляються.
      Камінь — це середовище існування. Розгляньте ритм припливу. Що відчуває камінь?
    follow_ups:
      - Що б було з басейном без каменю?
      - Як камінь створює поверхню?
      - Який зв'язок між каменем і припливом?
  - id: nmr_crystal_face
    name: Кристалічна грань
    prompt: |
      Деякі камені мають кристалічні грані — площини розколу, геометричну форму.
      Кристал ріс у порожнині, повільно. Розгляньте геометрію. Які сили її сформували?
    follow_ups:
      - Що б було з каменем без кристала?
      - Як грань розкриває структуру?
      - Який зв'язок між порядком і мінералом?
  - id: nmr_dust_coating
    name: Пил
    prompt: |
      Камінь збирає пил — пилок, сажу, мінерали. З часом він темніє.
      Наліт — це накопичення. Як би виглядав камінь, якби його помити? Як
      наліт його змінює?
    follow_ups:
      - Що б було з каменем без нальоту?
      - Як пил відзначає довкілля?
      - Який зв'язок між поверхнею та накопиченням?
  - id: nmr_river_sculpt
    name: Різьблення річки
    prompt: |
      Річка виточує своє русло — вири, плеса, перекати. Камінь формується водою та осадом.
      Знайдіть ділянку. Прочитайте різьблення. Що розкриває форма?
    follow_ups:
      - Що б було з річковим ложем без різьблення?
      - Як потік формує камінь?
      - Який зв'язок між водою і формою?
  - id: nmr_shard_edge
    name: Край уламка
    prompt: |
      Уламок кременю, шматок христопразу — гострий, оброблений або природний. Його могли
      використовувати. Край функціональний. Розгляньте розкол. Як він був зроблений?
    follow_ups:
      - Що б було з уламком без краю?
      - Як розкол створює корисність?
      - Який зв'язок між зламом і інструментом?
  - id: nmr_gravel_path
    name: Гравійна доріжка
    prompt: |
      Гравійна доріжка — подрібнене каміння під ногами. Хрускіт, просідання. Доріжка —
      це людський вибір. Чому така поверхня? Що гравій робить такого, чого не зробить ґрунт?
    follow_ups:
      - Що б було з доріжкою без гравію?
      - Як доріжка формує рух?
      - Який зв'язок між каменем і ходьбою?
  - id: nmr_bedrock_exposure
    name: Вихід корінної породи
    prompt: |
      Де ґрунт був змитий — ерозія, будівництво — з'являється корінна порода.
      Фундамент видимий. Розгляньте те, що зазвичай приховано. Що розкриває вихід?
    follow_ups:
      - Що б було з ландшафтом без виходу?
      - Як корінна порода формує поверхню?
      - Який зв'язок між прихованим і явним?
  - id: nmr_wind_polish
    name: Полірування вітром
    prompt: |
      Пустельні камені відполіровані вітром — гладкі, грановані. Пісок шліфує поверхню.
      Полірування абразивне. Розгляньте вітер. Скільки часу це тривало?
    follow_ups:
      - Що б було з каменем без полірування?
      - Як вітер формує камінь?
      - Який зв'язок між частинкою та поверхнею?
  - id: nmr_hot_cold_crack
    name: Тріщина від спеки-холоду
    prompt: |
      Камінь розширюється на спеці, стискається на холоді. Повторні цикли викликають напругу,
      мікротріщини. Знайдіть тріщину. Розгляньте перепади температур,
      що її створили.
    follow_ups:
      - Що б було з каменем без тріщини?
      - Як термічні цикли формують ландшафт?
      - Який зв'язок між температурою та розколом?
  - id: nmr_constellation_stone
    name: Камінь-сузір'я
    prompt: |
      Камінь з вкрапленнями — слюда, польовий шпат — що відбивають світло. Поверхня
      мерехтить. Розгляньте мінералогію. Що створило блиск?
    follow_ups:
      - Що б було з каменем без вкраплень?
      - Як світло розкриває структуру?
      - Який зв'язок між мінералом і відбиттям?
  - id: nmr_stepping_stone
    name: Брідівний камінь
    prompt: |
      Камені, покладені в струмок або болото — брідівні камені. Розміщення
      навмисне. Розгляньте шлях. Що вимагає кожен крок? Що камінь дозволяє?
    follow_ups:
      - Що б було з переправою без каменів?
      - Як камінь створює доступ?
      - Який зв'язок між каменем і переходом?
  - id: nmr_moss_island
    name: Моховий острів
    prompt: |
      Камінь у струмку — зверху росте мох. Камінь — це острів. Вода тече навколо.
      Розгляньте ізоляцію. Що досягає моху? Що ні?
    follow_ups:
      - Що б було зі струмком без острова?
      - Як камінь створює притулок?
      - Який зв'язок між каменем і потоком?
  - id: nmr_weight_sunken
    name: Занурена вага
    prompt: |
      Важкий камінь з часом занурюється в ґрунт. Навколо нього утворюється западина.
      Розгляньте гравітацію. Що робить занурення з землею? З каменем?
    follow_ups:
      - Що б було з землею без каменю?
      - Як вага формує поверхню?
      - Який зв'язок між масою та западиною?
  - id: nmr_layer_sediment
    name: Осадовий шар
    prompt: |
      Осадова порода показує шари — площини напластування. Кожен шар колись був мулом,
      піском, мушлями. Камінь — це стиснутий час. Розгляньте один шар.
      Чим він був раніше?
    follow_ups:
      - Що б було з каменем без шарів?
      - Як шар записує довкілля?
      - Який зв'язок між осадом і каменем?
  - id: nmr_sunrise_heat
    name: Схід сонця і тепло
    prompt: |
      Плаский камінь, що дивиться на схід. На світанку він нагрівається першим. Розгляньте
      орієнтацію. Що визначає кут до сонця? Хто отримує вигоду від раннього тепла?
    follow_ups:
      - Що б було з каменем без орієнтації?
      - Як аспект визначає температуру?
      - Який зв'язок між кутом і теплом?
  - id: nmr_rain_rinse
    name: Промивання дощем
    prompt: |
      Дощ падає на камінь, стікає. Вода несе те, що розчинила, те, що суспендувала.
      Промивання безперервне. Що втрачає камінь? Що здобуває вода?
    follow_ups:
      - Що б було з каменем без дощу?
      - Як стік формує камінь?
      - Який зв'язок між водою і розчиненням?
  - id: nmr_ice_wedge
    name: Льодяний клин
    prompt: |
      Вода замерзає в тріщині, розширює її. Льодяне клинове розбиття розколює камені.
      Знайдіть докази, якщо зможете. Розгляньте силу. Чим стане тріщина?
    follow_ups:
      - Що б було з каменем без льоду?
      - Як клин поширюється?
      - Який зв'язок між замерзанням і розколом?
  - id: nmr_resting_place
    name: Місце для відпочинку
    prompt: |
      Плаский камінь — сидіння, стіл, сцена. Ми використовуємо камені для відпочинку, роботи,
      позначення. Розгляньте камінь, на якому ви могли б сидіти. Що він підтримував? Що
      він буде тримати?
    follow_ups:
      - Що б було з простором без каменю?
      - Як камінь запрошує до використання?
      - Який зв'язок між мінералом і людиною?
  - id: nmr_boundary_marker
    name: Межовий знак
    prompt: |
      Камені позначають межі — межі власності, могили, стежки. Розміщення
      навмисне. Розгляньте межовий камінь. Що він розділяє? Що
      він з'єднує?
    follow_ups:
      - Що б було з межею без каменю?
      - Як камінь кодує значення?
      - Який зв'язок між знаком і територією?
  - id: nmr_exfoliation_sheet
    name: Відшаровується лист
    prompt: |
      Деякі камені відшаровуються — шари здираються, як цибуля. Звільнення тиску, термічні
      цикли. Знайдіть валун, що відшаровується. Розгляньте вигин. Які сили його створили?
    follow_ups:
      - Що б було з каменем без листів, що відшаровуються?
      - Як відшарування формує поверхню?
      - Який зв'язок між тиском і відшаруванням?
  - id: nmr_compass_orientation
    name: Орієнтація компаса
    prompt: |
      Камені можуть вирівнюватися — льодовиком, річкою, людською рукою. Орієнтація
      розповідає історію. Знайдіть вирівняні камені. Куди вони вказують? Чому вони
      чинять опір?
    follow_ups:
      - Що б означало вирівнювання?
      - Як орієнтація записує силу?
      - Який зв'язок між напрямком і каменем?
  - id: nmr_echo_sound
    name: Камінь-відлуння
    prompt: |
      Скельна стіна відбиває звук. Плесніть у долоні. Послухайте відлуння. Камінь повертає
      те, що ви надсилаєте. Розгляньте поверхню. Що вона відбиває? Що
      вона поглинає?
    follow_ups:
      - Що б було з простором без відлуння?
      - Як поверхня формує звук?
      - Який зв'язок між каменем і голосом?
  - id: nmr_anchor_hold
    name: Якірний кріплення
    prompt: |
      Камінь служить якорем — корінь дерева його обгортає, кабель прив'язаний до нього. Камінь тримає.
      Розгляньте хватку. Чому камінь чинить опір? Що він дозволяє?
    follow_ups:
      - Що б було з якорем без каменю?
      - Як камінь створює стабільність?
      - Який зв'язок між кріпленням і масою?
  - id: nmr_patina_age
    name: Патина часу
    prompt: |
      Старий камінь розвиває патину — кірку вивітрювання, окислення, забруднення.
      Поверхня змінюється. Патина — це видимий час. Як би виглядав камінь
      новим?
    follow_ups:
      - Що б було з каменем без патини?
      - Як патина захищає або послаблює?
      - Який зв'язок між поверхнею та віком?
  - id: nmr_slow_narrative
    name: Повільна оповідь
    prompt: |
      Камінь розповідає повільну історію — формування, транспортування, вивітрювання.
      Хронологія геологічна. Сядьте з каменем. Розгляньте його минуле. Яким буде його майбутнє?
    follow_ups:
      - Що б ми втратили, якби не могли читати історію?
      - Як камінь пов'язаний з глибоким часом?
      - Який зв'язок між каменем і пам'яттю?
  - id: nmr_cairn_stack
    name: Стопка каменів (курган)
    prompt: |
      Курган — камені, складені рукою. Кожен камінь збалансований. Стопка
      навмисна, тимчасова. Хто її побудував? Що вона позначає?
    follow_ups:
      - Що б було з місцем без кургану?
      - Як стопка створює значення?
      - Який зв'язок між людиною і каменем?
  - id: nmr_shadow_cast
    name: Відкинута тінь
    prompt: |
      Камінь відкидає тінь. Тінь рухається разом із сонцем. Сядьте з ним на годину.
      Розгляньте годинник з каменю та світла.
    follow_ups:
      - Що б було з каменем без тіні?
      - Як тінь створює середовище існування?
      - Який зв'язок між каменем і часом?
  - id: nmr_scree_slope
    name: Кам'яний осип (скрі)
    prompt: |
      Скрі — нестійке каміння біля підніжжя скелі. Кожна частина впала. Схил —
      це накопичення. Пройдіться по ньому. Відчуйте нестабільність. Що його тримає? Що
      вивільниться?
    follow_ups:
      - Що б було зі схилом без падіння?
      - Як скрі формує долину?
      - Який зв'язок між скелею і дном?
  - id: nmr_fossil_imprint
    name: Відбиток скам'янілості
    prompt: |
      Скам'янілість у камені — мушля, листок, кістка. Відбиток — це запис.
      Організм зник; камінь зберігає його форму. Розгляньте збереження.
    follow_ups:
      - Що б ми знали без скам'янілості?
      - Як відбиток з'єднує часи?
      - Який зв'язок між життям і мінералом?
  - id: nmr_dry_stone_wall
    name: Суха кам'яна стіна
    prompt: |
      Суха кам'яна стіна — без розчину. Кожен камінь тримає наступний завдяки підгону і
      тертю. Стіна — це співпраця. Прослідкуйте шви. Що зробить
      один пухкий камінь?
    follow_ups:
      - Що б було з межею без стіни?
      - Як підгін створює міцність?
      - Який зв'язок між каменем і структурою?
  - id: nmr_cobble_rest
    name: Відпочинок гальки
    prompt: |
      Галька лежить там, де її залишила вода — річковий бар, пляж. Розстановка
      не випадкова. Розмір, форма, положення говорять про потік. Що б
      змінив паводок?
    follow_ups:
      - Як відпочинок позначає останню подію?
      - Що б розкрила галька про воду?
      - Який зв'язок між спокоєм і турбулентністю?
  - id: nmr_moon_dust
    name: Місячний пил
    prompt: |
      Камінь стає пилом — вітер, вода, коріння. Найтонші частинки подорожують.
      Розгляньте подорож однієї піщинки. Де вона може опинитися?
    follow_ups:
      - Що б було з ландшафтом без пилу?
      - Як пил створює новий ґрунт?
      - Який зв'язок між каменем і повітрям?
  - id: nmr_touch_stone
    name: Торкання каменю
    prompt: |
      Торкніться каменю. Холодний, теплий, шорсткий, гладкий. Камінь не реагує — чи
      реагує? Тепло передається. Волога змінюється. Розгляньте обмін на межі.
    follow_ups:
      - Яким був би камінь в інший час?
      - Як дотик змінює камінь?
      - Який зв'язок між рукою і каменем?
  - id: nmr_shadow_noon
    name: Тінь опівдні
    prompt: |
      Опівдні тінь від каменя мінімальна. На світанку та заході сонця вона розтягується.
      Тінь — це простягнення каменю. Розгляньте, як сонце змінює те, що камінь пропонує світу.
    follow_ups:
      - Що б пропонував камінь без тіні?
      - Як тінь створює середовище існування?
      - Який зв'язок між каменем і світлом?
  - id: nmr_stone_circle
    name: Кам'яне коло
    prompt: |
      Камені, розташовані колом — людською рукою або льодовиком. Коло
      обрамляє простір. Що всередині? Що зовні? Розгляньте геометрію
      межі.
    follow_ups:
      - Що б означав простір без кола?
      - Як розстановка створює значення?
      - Який зв'язок між формою і ритуалом?
