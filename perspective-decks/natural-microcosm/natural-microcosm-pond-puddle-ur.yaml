# قدرتی خوردبینی — تالاب اور چھپڑ (Urdu)

id: natural_microcosm_pond_puddle
name: قدرتی خوردبینی — تالاب اور چھپڑ
description: |
  چھوٹے پیمانے پر پانی کے بارے میں آپ کے تصور کو بدلنے کے لیے 50 کارڈز —
  سطح کے تناؤ اور عکاسیوں سے لے کر آبی کیڑے، ٹاڈپول اور عارضی تالابوں میں
  زندگی تک۔
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: سطح کا تناؤ
    prompt: |
      ایک واٹر اسٹریڈر پانی پر چلتا ہے۔ سطح اسے سہتی ہے — سالمات چپکتے
      ہیں۔ آہستگی سے ایک پن گرائیں۔ یہ تیرتی ہے۔ پوشیدہ فلم پر غور کریں۔
      کیا اسے توڑے گا؟
    follow_ups:
      - سطح کا تناؤ یہاں کون رہ سکتا ہے اس کی تشکیل کیسے کرتا ہے؟
      - اس کے بغیر تالاب کیا ہوگا؟
      - سطح اور حد کے درمیان کیا تعلق ہے؟
  - id: nmp_skater_ripple
    name: اسکیٹر کی لہر
    prompt: |
      ایک واٹر اسٹریڈر کے پیر سطح کو خم دیتے ہیں۔ ہر قدم ایک لہر بناتا ہے۔
      پیٹرن دیکھیں۔ اسٹریڈر سطح کو نقشے کی طرح پڑھتا ہے۔ یہ کیا محسوس
      کرتا ہے؟
    follow_ups:
      - لہر معلومات کیسے لے جاتی ہے؟
      - سطح کے بغیر اسٹریڈر کیا کرے گا؟
      - لہر اور شکار کے درمیان کیا تعلق ہے؟
  - id: nmp_reflection_sky
    name: آسمان کی عکاسی
    prompt: |
      ایک چھپڑ آسمان — یا شاخ، یا آپ کی عکاسی کرتا ہے۔ عکاسی الٹ جاتی ہے۔
      ٹھہرا ہوا پانی آئینے کی طرح ہے۔ عکاسی کیا بڑھاتی ہے؟ یہ کیا چھپاتی
      ہے؟
    follow_ups:
      - عکاسی کے بغیر چھپڑ کیا ہوگا؟
      - ٹھہراؤ ہمیں جو نظر آتا ہے اسے کیسے شکل دیتا ہے؟
      - سطح اور تصویر کے درمیان کیا تعلق ہے؟
  - id: nmp_tadpole_tail
    name: ٹاڈپول کی دم
    prompt: |
      ایک ٹاڈپول تیرتا ہے — دم اسے آگے بڑھاتی ہے۔ دم دوبارہ جذب ہو جائے گی۔
      جانور تبدیل ہو رہا ہے۔ درمیانی حالت پر غور کریں۔ دم اب کیا ممکن
      بناتی ہے؟
    follow_ups:
      - دم کے بغیر ٹاڈپول کیا ہوگا؟
      - میٹامورفوسس جسم کو کیسے دوبارہ لکھتا ہے؟
      - شکل اور فعل کے درمیان کیا تعلق ہے؟
  - id: nmp_dragonfly_egg
    name: ڈریگن فلائی کا انڈا
    prompt: |
      ڈریگن فلائی پانی میں — یا سطح کے نیچے تنوں میں انڈے دیتی ہے۔ لاروا
      نکلنے سے پہلے سالوں تک پانی کے اندر رہتا ہے۔ دوہری زندگی پر غور
      کریں۔ پانی اور ہوا کو کیا جوڑتا ہے؟
    follow_ups:
      - آبی مرحلے کے بغیر ڈریگن فلائی کیا ہوگی؟
      - لاروا تالاب کی تشکیل کیسے کرتا ہے؟
      - لاروا اور بالغ کے درمیان کیا تعلق ہے؟
  - id: nmp_algae_bloom
    name: کائی کا پھول
    prompt: |
      پانی پر سبز کائی — کائی۔ یہ ایک پھول ہے، ایک دھڑکن۔ بہت زیادہ غذائیت،
      بہت زیادہ دھوپ۔ تالاب ردعمل کرتا ہے۔ کیا اسے متحرک کرتا ہے؟ اس کے
      بعد کیا ہوتا ہے؟
    follow_ups:
      - کائی کے بغیر تالاب کیا ہوگا؟
      - پھول آکسیجن کو کیسے متاثر کرتا ہے؟
      - غذائیت اور نشوونما کے درمیان کیا تعلق ہے؟
  - id: nmp_reed_stem
    name: سرکنڈے کا تنہ
    prompt: |
      کنارے سے سرکنڈے اور رسیاں اٹھتی ہیں۔ وہ کھوکھلے ہوتے ہیں — ہوا کی
      نالیاں گزرتی ہیں۔ تنہ پانی اور ہوا کو جوڑتا ہے۔ کون سرکنڈے کو
      سیڑھی کے طور پر استعمال کرتا ہے؟
    follow_ups:
      - سرکنڈوں کے بغیر کنارہ کیا ہوگا؟
      - کھوکھلا پن بقا کو کیسے ممکن بناتا ہے؟
      - تنہ اور رہائش کے درمیان کیا تعلق ہے؟
  - id: nmp_pond_skin
    name: تالاب کی جلد
    prompt: |
      تالاب کی ایک جلد ہوتی ہے — جہاں پانی ہوا سے ملتا ہے۔ اس پر دھول گرتی
      ہے۔ تیل پھیلتا ہے۔ جلد نازک ہوتی ہے۔ اسے چھویں۔ جلد کیا الگ کرتی
      ہے؟
    follow_ups:
      - جلد کے بغیر تالاب کیا ہوگا؟
      - جلد گیس کے تبادلے کو کیسے متاثر کرتی ہے؟
      - سطح اور گہرائی کے درمیان کیا تعلق ہے؟
  - id: nmp_temporary_pool
    name: عارضی تالاب
    prompt: |
      بارش کے بعد ایک چھپڑ — یہ سوکھ جائے گا۔ پھر بھی زندگی نے خود کو ڈھال
      لیا ہے۔ پریری شرمپ، ٹاڈپول شرمپ، انڈے جو انتظار کرتے ہیں۔ ہنگامی
      حالت پر غور کریں۔ پانی جانے سے پہلے کیا ہونا چاہیے؟
    follow_ups:
      - اگر مستقل ہوتا تو تالاب کیا ہوتا؟
      - عارضی حالت حکمت عملی کو کیسے شکل دیتی ہے؟
      - وقت اور موافقت کے درمیان کیا تعلق ہے؟
  - id: nmp_whirligig_gyre
    name: وہیلِگِگ گھومنا
    prompt: |
      وہیلِگِگ بھنورے سطح پر گھومتے ہیں۔ وہ اوپر اور نیچے دیکھتے ہیں — دو
      حصوں والی آنکھیں۔ وہ شکاری اور شکار ہیں۔ دوہری نظر پر غور کریں۔ یہ
      کیا ممکن بناتی ہے؟
    follow_ups:
      - دو حصوں والی نظر کے بغیر بھنورا کیا ہوگا؟
      - گھماؤ شکاریوں کو کیسے الجھاتا ہے؟
      - گھماؤ اور بقا کے درمیان کیا تعلق ہے؟
  - id: nmp_diving_spider
    name: غوطہ خور مکڑی
    prompt: |
      ایک غوطہ خور مکڑی ہوا کا بلبلہ — ایک غوطہ خور گھنٹی لے جاتی ہے۔ یہ
      پانی کے اندر سانس لیتی ہے۔ بلبلہ ایک پھیپھڑا ہے۔ ایجاد پر غور کریں۔
      بلبلے کے بغیر مکڑی کیا کرے گی؟
    follow_ups:
      - بلبلہ شکار کو کیسے ممکن بناتا ہے؟
      - اگر بلبلہ پھٹ جائے تو کیا ہوگا؟
      - ہوا اور پانی کے درمیان کیا تعلق ہے؟
  - id: nmp_pond_scum
    name: تالاب کی پھپھوندی
    prompt: |
      کنارے پر پھپھوندی بنتی ہے — جرگ، دھول، کائی، کیڑے مکوڑے۔ یہ ایک حد
      کی تہہ ہے۔ وہاں کیا جمع ہوتا ہے؟ کون اسے کھاتا ہے؟ پھپھوندی ایک فلٹر
      ہے۔
    follow_ups:
      - پھپھوندی کے بغیر تالاب کیا ہوگا؟
      - کنارہ زندگی کو کیسے مرتکز کرتا ہے؟
      - حد اور جمع ہونے کے درمیان کیا تعلق ہے؟
  - id: nmp_ice_surface
    name: برف کی سطح
    prompt: |
      موسم سرما میں، تالاب جم جاتا ہے۔ برف اسے سہتی ہے۔ اس کے نیچے، زندگی
      جاری رہتی ہے — سست، سرد۔ رکاوٹ پر غور کریں۔ برف کیا محفوظ رکھتی
      ہے؟ یہ کیا روکتی ہے؟
    follow_ups:
      - برف کے بغیر تالاب کیا ہوگا؟
      - جمنے سے آکسیجن پر کیا اثر پڑتا ہے؟
      - برف اور بقا کے درمیان کیا تعلق ہے؟
  - id: nmp_minnow_school
    name: منو کی فوج
    prompt: |
      منو کی فوج — وہ ایک ساتھ حرکت کرتے ہیں۔ فوج دفاع ہے، کارکردگی ہے۔
      تال میل دیکھیں۔ انہیں کیا مربوط کرتا ہے؟ اکیلا منو کیا خطرہ مول لے گا؟
    follow_ups:
      - فوج کے بغیر تالاب کیا ہوگا؟
      - فوج شکاریوں کو کیسے کم کرتی ہے؟
      - فرد اور گروپ کے درمیان کیا تعلق ہے؟
  - id: nmp_lily_pad
    name: لیلی پیڈ
    prompt: |
      ایک لیلی پیڈ تیرتا ہے۔ اس کا نچلا حصہ اس کے اوپر والے حصے سے مختلف
      ہے — بال، رنگ۔ پیڈ ایک پلیٹ فارم ہے۔ اس پر کیا اترتا ہے؟ اس کے
      نیچے کیا رہتا ہے؟
    follow_ups:
      - لیلی پیڈ کے بغیر تالاب کیا ہوگا؟
      - پیڈ نیچے روشنی کی تشکیل کیسے کرتا ہے؟
      - پیڈ اور سایہ کے درمیان کیا تعلق ہے؟
  - id: nmp_ripple_spread
    name: لہر کا پھیلاؤ
    prompt: |
      ایک پتھر گرتا ہے۔ لہریں پھیلتی ہیں۔ وہ آپس میں ملتی ہیں، مداخلت
      کرتی ہیں۔ پیٹرن توانائی لے جاتا ہے۔ زوال پر غور کریں۔ لہریں کتنی
      دور تک سفر کرتی ہیں؟
    follow_ups:
      - لہروں کے بغیر سطح کیا ہوگی؟
      - لہر اثر کو کیسے نشان زد کرتی ہے؟
      - خلل اور پھیلاؤ کے درمیان کیا تعلق ہے؟
  - id: nmp_mosquito_wiggle
    name: مچھر کی وِگل (لہر)
    prompt: |
      مچھر کے لاروا سطح سے لٹکتے ہیں — وِگلرز۔ وہ ایک سائفن کے ذریعے سانس
      لیتے ہیں۔ وِگل حرکت ہے، کھانا ہے۔ لاروا کی دنیا پر غور کریں۔ یہ کیا
      کھاتا ہے؟
    follow_ups:
      - مچھروں کے بغیر تالاب کیا ہوگا؟
      - وِگل شکاریوں سے کیسے بچتی ہے؟
      - لاروا اور بالغ کے درمیان کیا تعلق ہے؟
  - id: nmp_leaf_boat
    name: پتے کی کشتی
    prompt: |
      ایک پتا تیرتا ہے — گرا ہوا، بہتا ہوا۔ یہ کچھ کے لیے ایک کشتی ہے، دوسروں
      کے لیے کھانا ہے۔ پتا ڈوب جائے گا، سڑ جائے گا۔ اس کے سفر کا سراغ
      لگائیں۔ یہ کیا بنے گا؟
    follow_ups:
      - تیرتے ہوئے ملبے کے بغیر سطح کیا ہوگی؟
      - پتا مائیکرو ہیبیٹیٹ کیسے بناتا ہے؟
      - بہاؤ اور ڈوبنے کے درمیان کیا تعلق ہے؟
  - id: nmp_backswimmer_top
    name: بیک سویِمر کا اوپر والا حصہ
    prompt: |
      ایک بیک سویِمر الٹا تیرتا ہے — پیٹ آسمان کی طرف۔ وہ اپنے پیروں سے
      و aesthetic  row کرتا ہے۔ یہ سطح پر سانس لیتا ہے، پھر غوطہ لگاتا
      ہے۔ الٹ جانے پر غور کریں۔ الٹا کیوں؟
    follow_ups:
      - سیدھا ہونے والا بیک سویِمر کیا ہوگا؟
      - پوز اس کا شکار کرنے میں کیسے مدد کرتا ہے؟
      - سمت اور شکار کے درمیان کیا تعلق ہے؟
  - id: nmp_snail_trail
    name: گھونگھے کا نشان
    prompt: |
      ایک تالاب کا گھونگا پھسلتا ہے۔ وہ ایک نشان چھوڑتا ہے — لعاب، حرکت۔
      نشان بتاتا ہے کہ وہ کہاں سے گزرا ہے۔ دوسرے گھونگے پیروی کر سکتے
      ہیں۔ راستے پر غور کریں۔ نشان کیا بتاتا ہے؟
    follow_ups:
      - نشان کے بغیر گھونگا کیا ہوگا؟
      - لعاب حرکت کو کیسے ممکن بناتا ہے؟
      - نشان اور پیروی کے درمیان کیا تعلق ہے؟
  - id: nmp_dew_drop
    name: اوس کی بوند
    prompt: |
      پانی کے اوپر ایک بلیڈ پر اوس بنتی ہے — موتی، عکاسی۔ یہ کنڈنسیشن
      ہے۔ بوند ٹھہرتی ہے۔ پھر یہ گر جاتی ہے۔ بوند پر غور کریں۔ یہ کیا
      بڑا کرتی ہے؟
    follow_ups:
      - اوس کے بغیر بلیڈ کیا ہوگا؟
      - بوند روشنی کو کیسے موڑتی ہے؟
      - بوند اور سطح کے درمیان کیا تعلق ہے؟
  - id: nmp_spring_constant
    name: بہار کا مستقل
    prompt: |
      ایک چشمہ تالاب کو ફીڈ کرتا ہے — یا تالاب چھنتا ہے۔ پانی کی سطح توازن
      ہے۔ ان پٹ اور آؤٹ پٹ پر غور کریں۔ تالاب کو کیا برقرار رکھتا ہے؟ کیا
      اسے خشک کرے گا؟
    follow_ups:
      - چشمے کے بغیر تالاب کیا ہوگا؟
      - چشمہ پانی کی تشکیل کیسے کرتا ہے؟
      - ان پٹ اور زندگی کے درمیان کیا تعلق ہے؟
  - id: nmp_edge_ecotone
    name: کنارہ ایکوٹون
    prompt: |
      تالاب کا کنارہ ایک ایکوٹون ہے — تبدیلی۔ گیلا خشک سے ملتا ہے۔ پودے
      سازگار ہوتے ہیں۔ جانور عبور کرتے ہیں۔ کنارہ تنوع ہے۔ درمیان میں
      کیا پھلتا پھولتا ہے؟
    follow_ups:
      - کنارے کے بغیر تالاب کیا ہوگا؟
      - ایکوٹون موقع کیسے پیدا کرتا ہے؟
      - حد اور تنوع کے درمیان کیا تعلق ہے؟
  - id: nmp_frog_eye
    name: مینڈک کی آنکھ
    prompt: |
      ایک مینڈک کنارے پر بیٹھا ہے۔ اس کی آنکھیں ابھری ہوئی ہیں — یہ اوپر
      اور آگے دیکھتا ہے۔ مینڈک ساکت ہے۔ پھر زبان نکلتی ہے۔ صبر پر
      غور کریں۔ یہ کس کا انتظار کرتا ہے؟
    follow_ups:
      - ابھری ہوئی آنکھوں کے بغیر مینڈک کیا ہوگا؟
      - خاموشی حملے کو کیسے ممکن بناتی ہے؟
      - انتظار اور پکڑ کے درمیان کیا تعلق ہے؟
  - id: nmp_oxygen_bubble
    name: آکسیجن کا بلبلہ
    prompt: |
      تالاب میں پودے آکسیجن پیدا کرتے ہیں — بلبلے اٹھتے ہیں۔ دھوپ والے
      دن، پانی سانس لیتا ہے۔ تبادلے پر غور کریں۔ فوٹوسنتھیس کے بغیر
      تالاب کیا ہوگا؟
    follow_ups:
      - آکسیجن یہاں کون رہ سکتا ہے اس کی تشکیل کیسے کرتی ہے؟
