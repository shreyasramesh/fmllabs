# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然缩影 — 花园与后院 (Mandarin Chinese)

id: natural_microcosm_garden_backyard
name: 自然缩影 — 花园与后院
description: 50 张卡片，帮助您重新审视国内的野生动植物——从传粉者和土壤，到杂草与作物，以及栽培的自然如何编舞。
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: 蜜蜂降落
    prompt: |
      观察一只蜜蜂降落在花朵上。接近、触碰、盘旋。蜜蜂既是捕食者也是传粉者。花朵获得了什么？它又冒了什么风险？
    follow_ups:
      - 降落如何影响下一次拜访？
      - 没有蜜蜂，花园会怎样？
      - 花朵与蜜蜂的关系是什么？
  - id: nmg_soil_crumble
    name: 土壤碎屑
    prompt: |
      抓一把土壤。感受它的质地——它碎裂、颗粒。那土壤承载着历史、死亡、重生。这里以前有什么生物？它将长出什么？
    follow_ups:
      - 土壤如何塑造生长的事物？
      - 贫瘠的土壤意味着什么？
      - 碎屑与生命的关系是什么？
  - id: nmg_weed_edge
    name: 边缘的杂草
    prompt: |
      杂草在草坪与花坛的交界处生长。它不是被种下的。它是被邀请的——或者它自己邀请了自己。思考边界。谁划定了杂草和花朵之间的界限？
    follow_ups:
      - 没有杂草，花园会怎样？
      - 边缘如何制造张力？
      - 杂草与意图的关系是什么？
  - id: nmg_compost_steam
    name: 堆肥蒸汽
    prompt: |
      翻动堆肥堆。蒸汽升起——分解正在进行。热量是微生物在工作。厨房的残渣变成了土壤。追溯转化过程。
    follow_ups:
      - 没有堆肥，花园会失去什么？
      - 热量如何标志着过程？
      - 废物与肥沃的关系是什么？
  - id: nmg_seed_dormancy
    name: 种子休眠
    prompt: |
      土壤中的种子可以等待数年——甚至数十年。它是有生命的，但暂停了。是什么唤醒了它？光、水、火、扰动。思考种子的耐心。
    follow_ups:
      - 没有休眠，发芽会失去什么？
      - 等待如何塑造生存？
      - 暂停与萌发的关系是什么？
  - id: nmg_bird_bath
    name: 鸟浴盆
    prompt: |
      鸟浴盆是一种邀请。看看谁会来——麻雀、知更鸟，也许还有一只松鸦。浴盆创造了相遇。没有这小片水，庭院会是怎样？
    follow_ups:
      - 浴盆如何决定访客？
      - 到来的编舞是怎样的？
      - 水与鸟的关系是什么？
  - id: nmg_tomato_truss
    name: 番茄果穗
    prompt: |
      一个番茄果穗先是挂着绿色的果实，然后是红色的。研究它的结构。茎、枝、重量。这植物就是工程。是什么支撑着它？
    follow_ups:
      - 没有果穗，植物会怎样？
      - 结构如何塑造收成？
      - 形状与果实的关系是什么？
  - id: nmg_aphid_column
    name: 蚜虫群
    prompt: |
      蚜虫聚集在茎上——吮吸，繁殖。它们既是害虫也是猎物。瓢虫会来。注意生态系统。爆发与平衡的关系是什么？
    follow_ups:
      - 没有蚜虫，植物会怎样？
      - 虫群如何吸引捕食者？
      - 害虫与生态系统的关系是什么？
  - id: nmg_hose_spray
    name: 水管喷洒
    prompt: |
      水从水管喷到土壤上。观察它汇集、渗入、流淌。喷洒是人造雨。它与真正的雨有什么区别？植物得到了什么？
    follow_ups:
      - 没有水管，花园会怎样？
      - 灌溉如何塑造生长？
      - 喷洒与雨水关系是什么？
  - id: nmg_lawn_mow
    name: 割草
    prompt: |
      草坪是经过管理的野性——修剪到一定高度，保持绿色。割草打断了生长。考虑一下，如果任其自由生长，草坪会变成什么样子。我们正在阻止什么？
    follow_ups:
      - 没有割草，庭院会怎样？
      - 修剪如何塑造身份？
      - 草坪与控制的关系是什么？
  - id: nmg_pot_bound
    name: 盆栽束缚
    prompt: |
      盆栽植物——根部盘绕，寻找出路。花盆是一个界限。如果土壤不受限制，植物会做什么？花盆既是牢笼也是保护。考虑其中的权衡。
    follow_ups:
      - 没有花盆，植物会怎样？
      - 限制如何塑造生长？
      - 根与墙的关系是什么？
  - id: nmg_mulch_layer
    name: 覆盖层
    prompt: |
      覆盖层覆盖着土壤——木屑、稻草、落叶。它保持水分，抑制杂草，最终变成土壤。这一层是暂时的。在它还在的时候，它做了什么？
    follow_ups:
      - 没有覆盖层，花坛会怎样？
      - 覆盖层如何创造微气候？
      - 覆盖物与土壤的关系是什么？
  - id: nmg_hummingbird_hover
    name: 蜂鸟盘旋
    prompt: |
      一只蜂鸟在花朵前盘旋——翅膀快得几乎看不见。盘旋代价高昂。花蜜必须物有所值。考虑这次拜访的经济学。
    follow_ups:
      - 没有蜂鸟，花朵会怎样？
      - 盘旋如何塑造这种关系？
      - 代价与回报的关系是什么？
  - id: nmg_fence_creep
    name: 栅栏蔓延
    prompt: |
      常春藤或牵牛花沿着栅栏蔓延。植物不知道栅栏是人造的。它仍然攀爬。思考生长与结构的相遇。
    follow_ups:
      - 没有栅栏，植物会攀爬什么？
      - 栅栏如何塑造藤蔓？
      - 攀爬与支撑的关系是什么？
  - id: nmg_worm_cast
    name: 蚯蚓粪
    prompt: |
      蚯蚓粪——小堆土壤——散布在草坪上。蚯蚓经过了，留下了肥力。粪便就是考古。蚯蚓处理了什么？它留下了什么？
    follow_ups:
      - 没有蚯蚓，土壤会怎样？
      - 粪便如何标志着蚯蚓的工作？
      - 粪便与土壤通气关系是什么？
  - id: nmg_squirrel_cache
    name: 松鼠藏匿
    prompt: |
      一只松鼠埋下一个坚果——然后忘了。坚果可能会发芽。松鼠是偶然的园丁。思考记忆与传播的关系。遗忘会生长出什么？
    follow_ups:
      - 没有松鼠，橡树会怎样？
      - 藏匿如何塑造森林传播？
      - 埋藏与发芽的关系是什么？
  - id: nmg_dew_morning
    name: 露珠清晨
    prompt: |
      清晨的露珠附着在叶片上。每一滴都承载着光。露珠是凝结——空气中的水。它会在中午蒸发。思考这份短暂的馈赠。植物得到了什么？
    follow_ups:
      - 没有露珠，叶子会怎样？
      - 露珠如何塑造早晨？
      - 凝结与叶子的关系是什么？
  - id: nmg_prune_scar
    name: 修剪疤痕
    prompt: |
      修剪疤痕标记着曾经剪掉树枝的地方。树已经愈合——或者尝试愈合。疤痕就是历史。移除了什么？为什么？树记住了什么？
    follow_ups:
      - 没有修剪，树会怎样？
      - 修剪如何塑造生长？
      - 伤口与形态的关系是什么？
  - id: nmg_sunflower_turn
    name: 向日葵转动
    prompt: |
      一株幼小的向日葵随着太阳转动——早晨向东，傍晚向西。这种运动是向日性。植物追踪光线。思考它的编舞。固定朝向意味着什么？
    follow_ups:
      - 没有转动，向日葵会怎样？
      - 追踪如何塑造生长？
      - 运动与光的关系是什么？
  - id: nmg_slug_trail
    name: 蛞蝓的痕迹
    prompt: |
      蛞蝓留下一条痕迹——银色、黏腻。痕迹标志着它的经过。它也保护着蛞蝓的足。思考痕迹既是记录也是适应。它促成了什么？
    follow_ups:
      - 没有痕迹，蛞蝓会怎样？
      - 黏液如何塑造移动？
      - 痕迹与捕食者的关系是什么？
  - id: nmg_birdhouse_hole
    name: 鸟屋的洞
    prompt: |
      鸟屋有一个洞——特定直径。它排斥一些鸟，邀请另一些。这个洞是一个过滤器。它是为谁设计的？谁已经占据了它？
    follow_ups:
      - 没有鸟屋，庭院会怎样？
      - 洞如何塑造筑巢者？
      - 洞与住户的关系是什么？
  - id: nmg_root_hair
    name: 根毛
    prompt: |
      根毛从上方看不见——微小的延伸，吸收水分和养分。植物与土壤的界面。思考下方发生了什么。没有它们，植物会失去什么？
    follow_ups:
      - 根毛如何塑造吸收？
      - 根毛与土壤的关系是什么？
      - 如果能看见它们，会看到什么？
  - id: nmg_frost_leaf
    name: 叶片上的霜
    prompt: |
      叶片上的霜花——晶莹剔透，精致。霜是空气中的水结冰而成。它会随着太阳融化。思考这短暂的艺术。叶子经历了什么？
    follow_ups:
      - 没有霜，早晨会是怎样？
      - 霜如何塑造叶子的白天？
      - 晶体与细胞的关系是什么？
  - id: nmg_companion_plant
    name: 伴生植物
    prompt: |
      罗勒与番茄为伴。万寿菊与南瓜为伴。伴生种植是策略性的邻近。有些植物驱逐；有些吸引。思考花坛的社交生活。
    follow_ups:
      - 没有罗勒，番茄会怎样？
      - 邻近如何塑造花园？
      - 邻居与害虫的关系是什么？
  - id: nmg_fallen_apple
    name: 落下的苹果
    prompt: |
      一个苹果掉落——未采摘，过熟。它会腐烂，喂养黄蜂，也许会长出幼苗。坠落既是浪费也是开始。思考从枝头到土壤的弧线。
    follow_ups:
      - 没有坠落，地面会怎样？
      - 腐烂如何塑造接下来的事物？
      - 坠落与传播的关系是什么？
  - id: nmg_spider_web_corner
    name: 蜘蛛网角落
    prompt: |
      一个蜘蛛网横跨在棚屋的一角。露珠挂在网上。网既是陷阱也是家。思考蜘蛛的经济学。它投入了什么？它收获了什么？
    follow_ups:
      - 没有网，角落会怎样？
      - 网如何塑造蜘蛛的白天？
      - 丝线与猎物的关系是什么？
  - id: nmg_seed_packet
    name: 种子包
    prompt: |
      一个种子包——正面是照片，背面是说明。这个包是一种承诺。那些微小的点会冒出什么？思考图像与现实的关系。
    follow_ups:
      - 没有种子包，花园会怎样？
      - 种子包如何塑造期望？
      - 承诺与植物的关系是什么？
  - id: nmg_rain_barrel
    name: 雨水桶
    prompt: |
      雨水桶收集屋顶的雨水。水是免费的、温和的、无氯的。这个桶是基础设施。思考从天空到桶再到根部流淌的一切。
    follow_ups:
      - 没有雨水桶，花园会怎样？
      - 收集的雨水与自来水有何不同？
      - 屋顶与根部的关系是什么？
  - id: nmg_garden_glove
    name: 园艺手套
    prompt: |
      一只手套留在花坛里——手指僵硬，沾满泥土。手套是一种假肢。它延伸手，保护它。思考人类与土壤之间的界限。手套允许什么？
    follow_ups:
      - 没有手套，园丁会感觉到什么？
      - 手套如何塑造这种关系？
      - 手与土地的关系是什么？
  - id: nmg_caterpillar_chew
    name: 毛毛虫啃食
    prompt: |
      一只毛毛虫啃食一片叶子——一片一片地。啃食声清晰可闻。毛毛虫将叶子转化为蝴蝶。思考对植物的代价。它通过寄宿获得了什么？
    follow_ups:
      - 没有啃食，叶子会怎样？
      - 毛毛虫如何塑造植物？
      - 啃食与转变的关系是什么？
  - id: nmg_fertilizer_burn
    name: 肥料灼伤
    prompt: |
      过多的肥料会灼伤——叶尖发焦，根部枯脆。花园是化学的。多不一定更好。思考饲养与毒药之间的界限。界限在哪里？
    follow_ups:
      - 减少用量，植物会怎样？
      - 过量如何塑造叶子？
      - 剂量与损害的关系是什么？
  - id: nmg_shade_cloth
    name: 遮阳布
    prompt: |
      遮阳布搭在幼苗上方。它漫射光线，降低温度。布是介质——在阳光与植物之间。思考遮阳布增加了什么。它减去了什么？
    follow_ups:
      - 没有遮阳布，幼苗会怎样？
      - 阴影如何塑造早期生长？
      - 过滤器与光的关系是什么？
  - id: nmg_morning_glory_dawn
    name: 牵牛花拂晓
    prompt: |
      牵牛花在拂晓时开放，下午关闭。这种花有它的日程。思考它的节奏。如果它一整天都开放，花园会怎样？
    follow_ups:
      - 时机如何塑造授粉？
      - 开放与传粉者的关系是什么？
      - 为什么是拂晓？
  - id: nmg_garden_path
    name: 花园小径
    prompt: |
      一条穿过花园的小径——石板路或铺满覆盖物的路。小径是我们行走的地方。其余的地方是我们不走的地方。思考这条线。小径保护了什么？它排斥了什么？
    follow_ups:
      - 没有小径，花园会怎样？
      - 小径如何塑造行进？
      - 步伐与土壤的关系是什么？
  - id: nmg_cross_pollination
    name: 异花授粉
    prompt: |
      蜜蜂将花粉从一株植物带到另一株。后代将是杂交的——与亲本不完全相同。思考这种混合。杂交创造了什么？它冒了什么风险？
    follow_ups:
      - 没有杂交，品种会怎样？
      - 蜜蜂如何塑造基因？
      - 携带与组合的关系是什么？
  - id: nmg_herb_scent
    name: 香草气味
    prompt: |
      拂过迷迭香或薄荷。香气升腾——释放出挥发性精油。香气既是防御也是邀请。思考这种双重作用。什么驱逐？什么吸引？
    follow_ups:
      - 没有香气，香草会怎样？
      - 精油如何塑造这次相遇？
      - 触碰与释放的关系是什么？
  - id: nmg_watering_can_pour
    name: 喷壶倾倒
    prompt: |
      从喷壶倒水——比水管更温和。倾倒是有意为之的。思考这个仪式。喷壶能做到水管做不到什么？倾倒与植物的关系是什么？
    follow_ups:
      - 幼苗会更喜欢什么？
      - 倾倒如何塑造土壤？
      - 仪式与生长的关系是什么？
  - id: nmg_bird_seed_spill
    name: 鸟食撒漏
    prompt: |
      鸟食从喂食器撒漏——葵花籽，小米。它们落在地上。麻雀啄食。松鼠抢夺。撒漏创造了一个舞台。思考谁从中受益。它是为谁准备的？
    follow_ups:
      - 没有撒漏，地面会怎样？
      - 撒漏如何塑造鸟群？
      - 掉落与食客的关系是什么？
  - id: nmg_cutting_propagate
    name: 扦插繁殖
    prompt: |
      插枝——在水中或土壤中的茎——生根。没有种子。植物自我克隆。思考捷径。繁殖绕过了什么？它保留了什么？
    follow_ups:
      - 没有扦插，花园会怎样？
      - 克隆如何塑造多样性？
      - 剪断与延续的关系是什么？
  - id: nmg_leaf_miner_tunnel
    name: 潜叶虫隧道
    prompt: |
      潜叶虫的痕迹——蜿蜒，苍白，在表面之下。幼虫在叶片层之间取食。叶子幸存下来，留下了伤痕。思考入侵。叶子失去了什么？它保留了什么？
    follow_ups:
      - 没有隧道，叶子会怎样？
      - 潜叶虫如何塑造叶子？
      - 隧道与叶片组织的关系是什么？
  - id: nmg_greenhouse_condensation
    name: 温室凝露
    prompt: |
      温室玻璃上凝结着露珠。里面的空气湿润——植物在呼气。玻璃是一个界限。思考微气候。什么留住了温暖？什么留住了湿气？
    follow_ups:
      - 没有玻璃，温室会怎样？
      - 凝露如何塑造室内？
      - 玻璃与生长的关系是什么？
  - id: nmg_terrace_level
    name: 梯田层
    prompt: |
      梯田逐级而下。每一层都承载着土壤、承载着水分。梯田是侵蚀控制和舞台。思考它的建筑。没有它，斜坡会是怎样？
    follow_ups:
      - 层级如何塑造所生长的植物？
      - 阶梯与稳定性的关系是什么？
      - 为什么是梯田？
  - id: nmg_native_vs_exotic
    name: 本地 vs 外来
    prompt: |
      有些植物是本地的——它们属于这里。有些是外来的——被引进的。思考这个花坛。哪些是哪些？这重要吗？本地植物提供了外来植物所没有的什么？
    follow_ups:
      - 只有本地植物，花园会怎样？
      - 起源如何塑造生态系统？
      - 归属与繁盛的关系是什么？
  - id: nmg_garden_dusk
    name: 黄昏的花园
    prompt: |
      黄昏的花园——光线渐暗，飞蛾出现。白班结束；夜班开始。思考这种转变。谁醒来？谁睡去？花园变成了什么？
    follow_ups:
      - 没有黄昏，花园会怎样？
      - 转变如何塑造生态系统？
      - 白天与黑夜的关系是什么？
  - id: nmg_stake_tie
    name: 支撑与捆绑
    prompt: |
      一株植物绑在支撑物上——豆子、番茄。支撑物起纠正作用。没有它，植物会蔓延。思考这种支撑。捆绑带来了什么？它限制了什么？
    follow_ups:
      - 没有支撑物，植物会怎样？
      - 捆绑如何塑造形态？
      - 支持与生长的关系是什么？
  - id: nmg_first_frost
    name: 初霜
    prompt: |
      初霜——娇嫩的植物变黑。花园发生变化。有些事物结束了；有些事物仍在继续。思考这个阈值。霜选择了什么？它又放过了什么？
    follow_ups:
      - 没有初霜，花园会怎样？
      - 初霜如何塑造季节？
      - 寒冷与终结的关系是什么？
  - id: nmg_garden_reflection
    name: 花园的倒影
    prompt: |
      看看花园。它反映了选择——种了什么，拔了什么，放任了什么。花园就是一面镜子。它揭示了关于园丁的什么？
    follow_ups:
      - 没有语言，花园会说什么？
      - 选择如何塑造整体？
      - 园丁与种植的关系是什么？
