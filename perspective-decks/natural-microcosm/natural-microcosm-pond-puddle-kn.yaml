# ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಕೊಳ ಮತ್ತು ಗುಂಡಿ (Kannada)

id: natural_microcosm_pond_puddle
name: ನೈಸರ್ಗಿಕ ಸೂಕ್ಷ್ಮಜಗತ್ತು — ಕೊಳ ಮತ್ತು ಗುಂಡಿ
description: 50 ಕಾರ್ಡ್‌ಗಳು ಸಣ್ಣ ಪ್ರಮಾಣದಲ್ಲಿ ನೀರನ್ನು ನೋಡುವ ವಿಧಾನವನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ— ಮೇಲ್ಮೈ ಒತ್ತಡ ಮತ್ತು ಪ್ರತಿಬಿಂಬಗಳಿಂದ ಹಿಡಿದು ಜಲಚರ ಕೀಟಗಳು, ಕಪ್ಪೆಮರಿಗಳು ಮತ್ತು ತಾತ್ಕಾಲಿಕ ಗುಂಡಿಗಳಲ್ಲಿನ ಜೀವನದವರೆಗೆ.
domain: natural_microcosm
cards:
  - id: nmp_surface_tension
    name: ಮೇಲ್ಮೈ ಒತ್ತಡ
    prompt: |
      ಒಂದು ನೀರು-ಜೇಡರಂತೆ ನೀರಿನ ಮೇಲೆ ನಡೆಯುತ್ತದೆ. ಮೇಲ್ಮೈ ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ—ಅಣುಗಳು ಅಂಟಿಕೊಳ್ಳುತ್ತವೆ.
      ಒಂದು ಪಿನ್ ಅನ್ನು ನಿಧಾನವಾಗಿ ಬಿಡಿ. ಅದು ತೇಲುತ್ತದೆ. ಅಗೋಚರ ಫಿಲ್ಮ್ ಅನ್ನು ಪರಿಗಣಿಸಿ. ಏನದು ಒಡೆಯುತ್ತದೆ?
    follow_ups:
      - ಮೇಲ್ಮೈ ಒತ್ತಡವು ಇಲ್ಲಿ ಯಾರು ವಾಸಿಸಬಹುದು ಎಂಬುದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದೆ ಕೊಳ ಹೇಗಿರುತ್ತದೆ?
      - ಮೇಲ್ಮೈ ಮತ್ತು ಗಡಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_skater_ripple
    name: ಜೇಡರಂತೆ ಅಲಲೆ
    prompt: |
      ಒಂದು ನೀರು-ಜೇಡರಂತೆ ಕಾಲಿನಿಂದ ಮೇಲ್ಮೈಯಲ್ಲಿ ಅಲೆಗಳನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ. ಪ್ರತಿ ಹೆಜ್ಜೆಯೂ ಅಲೆಯೊಂದನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
      ನಮೂನೆಯನ್ನು ನೋಡಿ. ಜೇಡರಂತೆ ಮೇಲ್ಮೈಯನ್ನು ನಕ್ಷೆಯಂತೆ ಓದುತ್ತದೆ. ಅದು ಏನು ಗ್ರಹಿಸುತ್ತದೆ?
    follow_ups:
      - ಅಲೆಗಳು ಮಾಹಿತಿಯನ್ನು ಹೇಗೆ ಸಾಗಿಸುತ್ತವೆ?
      - ಮೇಲ್ಮೈ ಇಲ್ಲದೆ ಜೇಡರಂತೆ ಏನು ಮಾಡುತ್ತದೆ?
      - ಅಲೆ ಮತ್ತು ಬೇಟೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_reflection_sky
    name: ಆಕಾಶದ ಪ್ರತಿಬಿಂಬ
    prompt: |
      ಒಂದು ಗುಂಡಿಯು ಆಕಾಶವನ್ನು—ಅಥವಾ ಒಂದು ಕೊಂಬೆಯನ್ನು, ಅಥವಾ ನಿಮ್ಮನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತದೆ. ಪ್ರತಿಬಿಂಬವು ತಿರುಗುತ್ತದೆ.
      ಶಾಂತವಾದ ನೀರು ಒಂದು ಕನ್ನಡಿಯಾಗಿದೆ. ಪ್ರತಿಬಿಂಬವು ಏನು ಸೇರಿಸುತ್ತದೆ? ಅದು ಏನು ಮರೆಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಪ್ರತಿಬಿಂಬವಿಲ್ಲದೆ ಗುಂಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಶಾಂತ ಸ್ಥಿತಿಯು ನಾವು ಏನು ನೋಡುತ್ತೇವೆ ಎಂಬುದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಮೇಲ್ಮೈ ಮತ್ತು ಚಿತ್ರದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_tadpole_tail
    name: ಕಪ್ಪೆಮರಿ ಬಾಲ
    prompt: |
      ಒಂದು ಕಪ್ಪೆಮರಿ ಈಜುತ್ತದೆ—ಬಾಲ ಅದನ್ನು ಮುಂದೆ ತಳ್ಳುತ್ತದೆ. ಬಾಲವನ್ನು ಮರುಹೀರಿಕೊಳ್ಳಲಾಗುತ್ತದೆ. ಪ್ರಾಣಿಯು
      ರೂಪಾಂತರಗೊಳ್ಳುತ್ತಿದೆ. ನಡುವಿನ ಸ್ಥಿತಿಯನ್ನು ಪರಿಗಣಿಸಿ. ಬಾಲವು ಈಗ ಏನು ಸಶಕ್ತಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ಬಾಲವಿಲ್ಲದೆ ಕಪ್ಪೆಮರಿ ಹೇಗಿರುತ್ತದೆ?
      - ರೂಪಾಂತರವು ದೇಹವನ್ನು ಹೇಗೆ ಪುನಃ ಬರೆಯುತ್ತದೆ?
      - ಆಕಾರ ಮತ್ತು ಕಾರ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_dragonfly_egg
    name: ಗಬ್ಬಿಹಾರದ ಮೊಟ್ಟೆ
    prompt: |
      ಗಬ್ಬಿಹಾರಗಳು ನೀರಿನಲ್ಲಿ—ಅಥವಾ ಮೇಲ್ಮೈ ಕೆಳಗಿನ ಕಾಂಡಗಳಲ್ಲಿ ಮೊಟ್ಟೆ ಇಡುತ್ತವೆ. ಹುಳುವು ಹೊರಬರುವ ಮೊದಲು
      ವರ್ಷಗಳ ಕಾಲ ನೀರಿನಲ್ಲಿ ವಾಸಿಸುತ್ತದೆ. ವಿಭಜಿತ ಜೀವನವನ್ನು ಪರಿಗಣಿಸಿ. ನೀರು ಮತ್ತು ಗಾಳಿಯನ್ನು ಏನು ಜೋಡಿಸುತ್ತದೆ?
    follow_ups:
      - ಜಲವಾಸಿ ಹಂತವಿಲ್ಲದೆ ಗಬ್ಬಿಹಾರ ಹೇಗಿರುತ್ತದೆ?
      - ಹುಳುವು ಕೊಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಹುಳುವು ಮತ್ತು ವಯಸ್ಕರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_algae_bloom
    name: ಪಾಚಿ ಮೊದಲುಗೊಂಡು ಬೆಳೆಯುವುದು
    prompt: |
      ನೀರಿನ ಮೇಲೆ ಹಸಿರು ಕೆಸರು—ಪಾಚಿ. ಇದು ಒಂದು ಮೊದಲುಗೊಂಡು ಬೆಳೆಯುವಿಕೆ, ಒಂದು ನಾಡಿ. ಹೆಚ್ಚು ಪೋಷಕಾಂಶ,
      ಹೆಚ್ಚು ಸೂರ್ಯ. ಕೊಳವು ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತದೆ. ಏನದು ಪ್ರೇರೇಪಿಸುತ್ತದೆ? ಏನು ಅನುಸರಿಸುತ್ತದೆ?
    follow_ups:
      - ಪಾಚಿ ಇಲ್ಲದೆ ಕೊಳ ಹೇಗಿರುತ್ತದೆ?
      - ಮೊದಲುಗೊಂಡು ಬೆಳೆಯುವುದು ಆಮ್ಲಜನಕದ ಮೇಲೆ ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ?
      - ಪೋಷಕಾಂಶ ಮತ್ತು ಬೆಳವಣಿಗೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_reed_stem
    name: ಜವುಗು ಕಾಂಡ
    prompt: |
      ಜವುಗುಗಳು ಮತ್ತು ಉರುಳೆಗಳು ಅಂಚಿನಿಂದ ಏರುತ್ತವೆ. ಅವು ಕುಳಿಗಳಾಗಿವೆ—ಗಾಳಿಯ ಹಾದಿಗಳು ಒಳಗಿನಿಂದ ಸಾಗುತ್ತವೆ.
      ಕಾಂಡವು ನೀರು ಮತ್ತು ಗಾಳಿಯನ್ನು ಜೋಡಿಸುತ್ತದೆ. ಜವುಗನ್ನು ಏಣಿಯಾಗಿ ಯಾರು ಬಳಸುತ್ತಾರೆ?
    follow_ups:
      - ಜವುಗುಗಳಿಲ್ಲದೆ ಅಂಚು ಹೇಗಿರುತ್ತದೆ?
      - ಕುಳಿಗಳು ಬದುಕುವಿಕೆಯನ್ನು ಹೇಗೆ ಸಶಕ್ತಗೊಳಿಸುತ್ತವೆ?
      - ಕಾಂಡ ಮತ್ತು ಆವಾಸಸ್ಥಾನದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_pond_skin
    name: ಕೊಳದ ಚರ್ಮ
    prompt: |
      ಕೊಳವು ಒಂದು ಚರ್ಮವನ್ನು ಹೊಂದಿದೆ—ಅಲ್ಲಿ ನೀರು ಗಾಳಿಯನ್ನು ಭೇಟಿಯಾಗುತ್ತದೆ. ಧೂಳು ಅದರ ಮೇಲೆ ಬೀಳುತ್ತದೆ. ಎಣ್ಣೆ ಹರಡುತ್ತದೆ.
      ಚರ್ಮವು ಸೂಕ್ಷ್ಮವಾಗಿರುತ್ತದೆ. ಅದನ್ನು ಸ್ಪರ್ಶಿಸಿ. ಚರ್ಮವು ಏನು ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ?
    follow_ups:
      - ಚರ್ಮವಿಲ್ಲದೆ ಕೊಳ ಹೇಗಿರುತ್ತದೆ?
      - ಚರ್ಮವು ಅನಿಲ ವಿನಿಮಯದ ಮೇಲೆ ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ?
      - ಮೇಲ್ಮೈ ಮತ್ತು ಆಳದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_temporary_pool
    name: ತಾತ್ಕಾಲಿಕ ಗುಂಡಿ
    prompt: |
      ಮಳೆಯ ನಂತರ ಒಂದು ಗುಂಡಿ—ಅದು ಒಣಗುತ್ತದೆ. ಆದರೂ ಜೀವನವು ಹೊಂದಿಕೊಂಡಿದೆ. ಫೇರಿ ಷ್ರಿಂಪ್, ಕಪ್ಪೆಮರಿ ಷ್ರಿಂಪ್, ಕಾಯುತ್ತಿರುವ ಮೊಟ್ಟೆಗಳು.
      ತುರ್ತುಸ್ಥಿತಿಯನ್ನು ಪರಿಗಣಿಸಿ. ನೀರು ಹೋಗುವ ಮೊದಲು ಏನು ಆಗಬೇಕು?
    follow_ups:
      - ಅದು ಶಾಶ್ವತವಾಗಿದ್ದರೆ ಗುಂಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ತಾತ್ಕಾಲಿಕತೆಯು ಕಾರ್ಯತಂತ್ರವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸಮಯ ಮತ್ತು ಹೊಂದಾಣಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_whirligig_gyre
    name: ತಿರುಗುವ ಬೀಟಲ್ ಸುಳಿ
    prompt: |
      ತಿರುಗುವ ಬೀಟಲ್‌ಗಳು ಮೇಲ್ಮೈಯಲ್ಲಿ ಸುತ್ತುತ್ತವೆ. ಅವು ಮೇಲ್ಭಾಗ ಮತ್ತು ಕೆಳಭಾಗವನ್ನು ನೋಡುತ್ತವೆ—ವಿಭಜಿತ ಕಣ್ಣುಗಳು.
      ಅವು ಬೇಟೆಗಾರರು ಮತ್ತು ಬೇಟೆ. ದ್ವಂದ್ವ ದೃಷ್ಟಿಯನ್ನು ಪರಿಗಣಿಸಿ. ಅದು ಏನು ಸಶಕ್ತಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ವಿಭಜಿತ ದೃಷ್ಟಿಯಿಲ್ಲದೆ ಬೀಟಲ್ ಹೇಗಿರುತ್ತದೆ?
      - ಸುಳಿ ಬೇಟೆಗಾರರನ್ನು ಹೇಗೆ ಗೊಂದಲಗೊಳಿಸುತ್ತದೆ?
      - ತಿರುಗುವಿಕೆ ಮತ್ತು ಬದುಕುವಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_diving_spider
    name: ಧುಮುಕುವ ಜೇಡ
    prompt: |
      ಒಂದು ಧುಮುಕುವ ಜೇಡ ಗಾಳಿಯ ಗುಳ್ಳಿಯನ್ನು ಹೊತ್ತೊಯ್ಯುತ್ತದೆ—ಒಂದು ಧುಮುಕುವ ಗಂಟೆ. ಅದು ನೀರಿನ ಅಡಿಯಲ್ಲಿ ಉಸಿರಾಡುತ್ತದೆ.
      ಗುಳ್ಳಿಯು ಒಂದು ಶ್ವಾಸಕೋಶವಾಗಿದೆ. ಆವಿಷ್ಕಾರವನ್ನು ಪರಿಗಣಿಸಿ. ಅದು ಇಲ್ಲದೆ ಜೇಡ ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಗುಳ್ಳಿಯು ಬೇಟೆಗೆ ಹೇಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ?
      - ಗುಳ್ಳಿಯು ಒಡೆದರೆ ಏನಾಗುತ್ತದೆ?
      - ಗಾಳಿ ಮತ್ತು ನೀರಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_pond_scum
    name: ಕೊಳದ ಕೆಸರು
    prompt: |
      ಅಂಚಿನಲ್ಲಿ ಕೆಸರು ರೂಪುಗೊಳ್ಳುತ್ತದೆ—ಪರಾಗ, ಧೂಳು, ಪಾಚಿ, ಕೀಟಗಳು. ಇದು ಒಂದು ಗಡಿ ಪದರವಾಗಿದೆ. ಅಲ್ಲಿ ಏನು ಸಂಗ್ರಹವಾಗುತ್ತದೆ?
      ಯಾರು ಅದನ್ನು ತಿನ್ನುತ್ತಾರೆ? ಕೆಸರು ಒಂದು ಶೋಧಕವಾಗಿದೆ.
    follow_ups:
      - ಕೆಸರಿಲ್ಲದೆ ಕೊಳ ಹೇಗಿರುತ್ತದೆ?
      - ಅಂಚು ಜೀವನವನ್ನು ಹೇಗೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತದೆ?
      - ಗಡಿ ಮತ್ತು ಸಂಗ್ರಹದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: nmp_ice_surface
    name: ಹಿಮದ ಮೇಲ್ಮೈ
    prompt: |
      ಚಳಿಗಾಲದಲ್ಲಿ, ಕೊಳವು ಘನೀಭವಿಸುತ್ತದೆ. ಹಿಮವು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ. ಅದರ ಅಡಿಯಲ್ಲಿ, ಜೀವನವು ಮುಂದುವರಿಯುತ್ತದೆ—
      ನಿಧಾನವಾಗಿ, ತಂಪಾಗಿ. ತಡೆಗೋಡೆಯನ್ನು ಪರಿಗಣಿಸಿ. ಹಿಮವು ಏನು ರಕ್ಷಿಸುತ್ತದೆ? ಅದು ಏನು ತಡೆಯುತ್ತದೆ?
    follow_ups:
      - ಹಿಮವಿಲ್ಲದೆ ಕೊಳ ಹೇಗಿರುತ್ತದೆ?
