# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然の小宇宙 — 庭と裏庭 (Japanese)

id: natural_microcosm_garden_backyard
name: 自然の小宇宙 — 庭と裏庭
description: 50枚のカードで、身近な自然 — 花粉媒介者や土壌から、雑草か作物か、そして栽培された自然の演出まで、見方を変えましょう。
domain: natural_microcosm
cards:
  - id: nmg_bee_landing
    name: 蜂の着地
    prompt: |
      花に蜂が着地するのを見てみましょう。接近、接触、ホバリング。蜂は捕食者でもあり、花粉媒介者でもあります。花は何を得るのでしょうか？何を危険にさらすのでしょうか？
    follow_ups:
      - その着地は次の訪問にどう影響する？
      - 蜂がいなかったら庭はどうなる？
      - 花と蜂の関係とは？
  - id: nmg_soil_crumble
    name: 土の崩壊
    prompt: |
      一握りの土をつかんでみましょう。その質感 — 崩れやすさ、粒。その土には歴史、死、再生が宿っています。以前ここに何が生えていたのでしょうか？これから何が育つのでしょうか？
    follow_ups:
      - 土が育つものをどう形作る？
      - 不毛な土とは何を意味する？
      - 崩壊と生命の関係とは？
  - id: nmg_weed_edge
    name: 雑草の縁
    prompt: |
      芝生と花壇の境界に雑草が生えています。それは植えられたものではありません。招かれた — または自分から来たのです。境界線について考えてみましょう。誰が雑草と花の区別を決めるのでしょうか？
    follow_ups:
      - 雑草がいなかったら庭はどうなる？
      - 境界線はどのように緊張感を生み出す？
      - 雑草と意図の関係とは？
  - id: nmg_compost_steam
    name: コンポストの湯気
    prompt: |
      堆肥の山をかき混ぜてみましょう。湯気が立ち上る — 分解が進行中です。その熱は微生物の働きです。生ゴミが土になります。その変容をたどってみましょう。
    follow_ups:
      - コンポストがなかったら庭は何を失う？
      - 熱はその過程をどう示す？
      - 廃棄物と肥沃さの関係とは？
  - id: nmg_seed_dormancy
    name: 種子の休眠
    prompt: |
      土の中の種子は、何年も — 何十年も待つことができます。それは生きていますが、一時停止しています。何がそれを目覚めさせるのでしょうか？光、水、火、攪乱。種子の忍耐について考えてみましょう。
    follow_ups:
      - 休眠がなかったら発芽は何を失う？
      - 待つことは生存をどう形作る？
      - 停止と出現の関係とは？
  - id: nmg_bird_bath
    name: 鳥の浴場
    prompt: |
      鳥の浴場は誘いです。誰が来るか見てみましょう — スズメ、コマドリ、もしかしたらカケスも。その浴場は出会いを生み出します。この小さな水たまりがなかったら庭はどうなるでしょう？
    follow_ups:
      - 浴場は訪れる鳥をどう形作る？
      - 到着の演出とは？
      - 水と鳥の関係とは？
  - id: nmg_tomato_truss
    name: トマトの房
    prompt: |
      トマトの房は、最初は青い実、そして赤い実をつけます。その構造をよく見てみましょう。茎、枝、重さ。植物は工学です。何がそれを支えているのでしょうか？
    follow_ups:
      - 房がなかったら植物はどうなる？
      - 構造は収穫をどう形作る？
      - 形と果実の関係とは？
  - id: nmg_aphid_column
    name: アブラムシの列
    prompt: |
      アブラムシが茎に集まっています — 吸い付き、増殖しています。それらは害虫でもあり、餌でもあります。テントウムシが来るでしょう。その生態系に注目しましょう。発生とバランスの関係とは？
    follow_ups:
      - アブラムシがいなかったら植物はどうなる？
      - その集団は捕食者をどう引きつける？
      - 害虫と生態系の関係とは？
  - id: nmg_hose_spray
    name: ホースの噴霧
    prompt: |
      ホースからの水が土に当たります。水たまりができ、染み込み、流れるのを見てみましょう。その噴霧は人工の雨です。本物の雨とどう違うのでしょうか？植物は何を得るのでしょうか？
    follow_ups:
      - ホースがなかったら庭はどうなる？
      - 灌漑は成長をどう形作る？
      - 噴霧と雨の関係とは？
  - id: nmg_lawn_mow
    name: 芝刈り
    prompt: |
      芝生は管理された野生 — 高さに刈り込まれ、緑に保たれています。刈り込みは成長を中断させます。そのままにしておいたら芝生がどうなるか考えてみましょう。私たちは何を抑え込んでいるのでしょうか？
    follow_ups:
      - 芝刈りがなかったら庭はどうなる？
      - 刈り込みはアイデンティティをどう形作る？
      - 芝生と制御の関係とは？
  - id: nmg_pot_bound
    name: 鉢植えの根詰まり
    prompt: |
      鉢の中の植物 — 根が丸まり、探し求めています。鉢は境界です。もし根が伸ばし放題の土だったら、植物はどうするでしょうか？鉢は牢獄でもあり、保護でもあります。その取引について考えてみましょう。
    follow_ups:
      - 鉢がなかったら植物はどうなる？
      - 封じ込めは成長をどう形作る？
      - 根と壁の関係とは？
  - id: nmg_mulch_layer
    name: マルチの層
    prompt: |
      マルチが土を覆っています — 木のチップ、わら、葉。水分を保持し、雑草を抑え、最終的には土になります。その層は一時的です。それが続く間、何をするのでしょうか？
    follow_ups:
      - マルチがなかったら花壇はどうなる？
      - その層は微気候をどう作り出す？
      - カバーと土の関係とは？
  - id: nmg_hummingbird_hover
    name: ハチドリのホバリング
    prompt: |
      ハチドリが花の前でホバリングします — 翼は速すぎて見えません。ホバリングにはコストがかかります。蜜はその価値があるはずです。その訪問の経済について考えてみましょう。
    follow_ups:
      - ハチドリがいなかったら花はどうなる？
      - ホバリングはその関係をどう形作る？
      - コストと報酬の関係とは？
  - id: nmg_fence_creep
    name: 垣根の這い上がり
    prompt: |
      ツタやヒルガオが垣根に沿って這い上がっています。植物は垣根が人間が作ったものだと知りません。それでも登っていきます。成長と構造の出会いについて考えてみましょう。
    follow_ups:
      - 垣根がなかったら植物は何に登る？
      - 垣根はそのツルをどう形作る？
      - 這い上がることと支えの関係とは？
  - id: nmg_worm_cast
    name: ミミズの糞
    prompt: |
      ミミズの糞 — 小さな土の山が芝生に点在しています。ミミズが通り過ぎ、肥沃さを残しました。その糞は考古学です。ミミズは何を処理したのでしょうか？何を残したのでしょうか？
    follow_ups:
      - ミミズがいなかったら土はどうなる？
      - その糞はミミズの仕事をどう示す？
      - 糞と通気の関係とは？
  - id: nmg_squirrel_cache
    name: リスの貯蔵
    prompt: |
      リスが木の実を埋め — そして忘れます。その木の実が芽を出すかもしれません。リスは偶然の庭師です。記憶と分散の関係について考えてみましょう。忘れっぽさから何が育つのでしょうか？
    follow_ups:
      - リスがいなかったらオークはどうなる？
      - 貯蔵はその森の広がりをどう形作る？
      - 埋めることと芽を出すことの関係とは？
  - id: nmg_dew_morning
    name: 露に濡れた朝
    prompt: |
      朝露が葉に玉のようについています。それぞれの滴が光を宿しています。露は凝結 — 空気中の水分です。昼までには蒸発します。その束の間の贈り物について考えてみましょう。植物は何を得るのでしょうか？
    follow_ups:
      - 露がなかったら葉はどうなる？
      - 露は朝をどう形作る？
      - 凝結と葉の関係とは？
  - id: nmg_prune_scar
    name: 剪定の傷跡
    prompt: |
      剪定の傷跡は、枝が切り取られた場所を示しています。木は治った — あるいは治ろうとしています。その傷跡は歴史です。何が取り除かれたのでしょうか？なぜ？木は何を覚えているのでしょうか？
    follow_ups:
      - 剪定がなかったら木はどうなる？
      - 切り口は成長をどう形作る？
      - 傷と形の関係とは？
  - id: nmg_sunflower_turn
    name: ひまわりの回転
    prompt: |
      若いひまわりは太陽と共に回転します — 夜明けは東、夕暮れは西。その動きは向日性です。植物は光を追跡します。その演出について考えてみましょう。固定された向きはどうなるでしょうか？
    follow_ups:
      - 回転がなかったらひまわりはどうなる？
      - 追跡は成長をどう形作る？
      - 動きと光の関係とは？
  - id: nmg_slug_trail
    name: ナメクジの道
    prompt: |
      ナメクジは銀色で粘り気のある跡を残します。その跡は通り過ぎたことを示します。それはまたナメクジの足を保護します。その跡を記録と適応の両方として考えてみましょう。それは何をもたらすのでしょうか？
    follow_ups:
      - 跡がなかったらナメクジはどうなる？
      - 粘液はその動きをどう形作る？
      - 跡と捕食者の関係とは？
  - id: nmg_birdhouse_hole
    name: 鳥の巣箱の穴
    prompt: |
      鳥の巣箱には穴があります — 特定の直径です。それは一部の鳥を排除し、他の鳥を誘います。その穴はフィルターです。誰のために設計されたのでしょうか？誰がそれを占有したのでしょうか？
    follow_ups:
      - 鳥の巣箱がなかったら庭はどうなる？
      - 穴は誰が巣を作るかをどう形作る？
      - 穴と居住者の関係とは？
  - id: nmg_root_hair
    name: 根毛
    prompt: |
      根毛は上からは見えません — 水分と栄養分を吸収する小さな突起です。植物と土壌のインターフェース。地下で何が起こっているか考えてみましょう。それらがなかったら植物は何を失うでしょうか？
    follow_ups:
      - 根毛はその吸収をどう形作る？
      - 根毛と土の関係とは？
      - もしそれらが見えたら、何が見えるだろうか？
  - id: nmg_frost_leaf
    name: 葉の霜
    prompt: |
      葉に霜の模様 — 結晶的で繊細です。霜は空気中の水分が凍ったものです。太陽で溶けます。その一時的な芸術について考えてみましょう。葉は何を経験するのでしょうか？
    follow_ups:
      - 霜がなかったら朝はどうなる？
      - 霜は葉の日をどう形作る？
      - 結晶と細胞の関係とは？
  - id: nmg_companion_plant
    name: コンパニオンプラント
    prompt: |
      トマトの隣にバジル。カボチャの隣にマリーゴールド。コンパニオンプラントは戦略的な隣接です。一部の植物は寄せ付け、一部は引き寄せます。花壇の社会生活について考えてみましょう。
    follow_ups:
      - バジルがなかったらトマトはどうなる？
      - 隣接は庭をどう形作る？
      - 隣人と害虫の関係とは？
  - id: nmg_fallen_apple
    name: 落ちたリンゴ
    prompt: |
      リンゴが落ちました — 収穫されず、熟れすぎました。腐り、スズメバチを養い、おそらく苗木を育てるでしょう。その落下は無駄でもあり、始まりでもあります。枝から土への弧について考えてみましょう。
    follow_ups:
      - 落下がなかったら地面はどうなる？
      - 腐敗は次に何が起こるかをどう形作る？
      - 落下と分散の関係とは？
  - id: nmg_spider_web_corner
    name: 隅の蜘蛛の巣
    prompt: |
      蜘蛛の巣が物置の隅に張られています。露が糸に捕らえられています。その巣は罠でもあり、家でもあります。蜘蛛の経済について考えてみましょう。何を投資するのでしょうか？何を収穫するのでしょうか？
    follow_ups:
      - 巣がなかったら隅はどうなる？
      - 巣はその日をどう形作る？
      - 糸と獲物の関係とは？
  - id: nmg_seed_packet
    name: 種子の袋
    prompt: |
      種子の袋 — 表には写真、裏には説明書き。その袋は約束です。あの小さな点から何が現れるのでしょうか？イメージと現実の関係について考えてみましょう。
    follow_ups:
      - 袋がなかったら庭はどうなる？
      - 袋は期待をどう形作る？
      - 約束と植物の関係とは？
  - id: nmg_rain_barrel
    name: 雨水タンク
    prompt: |
      雨水タンクが屋根からの雨水を集めます。その水は無料、柔らかく、塩素なしです。そのタンクはインフラです。空からタンク、そして根へと流れるものについて考えてみましょう。
    follow_ups:
      - タンクがなかったら庭はどうなる？
      - 貯めた雨水は水道水とどう違う？
      - 屋根と根の関係とは？
  - id: nmg_garden_glove
    name: ガーデングローブ
    prompt: |
      花壇に置かれた手袋 — 指が硬くなり、土で汚れています。その手袋は義肢です。手を拡張し、保護します。人間と土壌の境界について考えてみましょう。その手袋は何を可能にするのでしょうか？
    follow_ups:
      - 手袋がなかったら庭師は何を感じる？
      - 手袋はその関係をどう形作る？
      - 手と大地の関係とは？
  - id: nmg_caterpillar_chew
    name: イモムシの食痕
    prompt: |
      イモムシが葉を食べています — 端から端まで。その食痕は聞こえます。イモムシは葉を蝶に変えています。植物へのコストについて考えてみましょう。宿主となることで何を得るのでしょうか？
    follow_ups:
      - 食痕がなかったら葉はどうなる？
      - イモムシはその植物をどう形作る？
      - 食べるということとなることの関係とは？
  - id: nmg_fertilizer_burn
    name: 肥料焼け
    prompt: |
      肥料が多すぎると焼けます — 先端が茶色く、根がパリパリになります。庭は化学です。多いほど良いとは限りません。餌と毒の境界線について考えてみましょう。その線はどこにあるのでしょうか？
    follow_ups:
      - 肥料が少なかったら植物はどうなる？
      - 過剰は葉をどう形作る？
      - 容量とダメージの関係とは？
  - id: nmg_shade_cloth
    name: 遮光布
    prompt: |
      遮光布が苗木の上に張られています。光を拡散し、熱を遮断します。その布は媒介 — 太陽と植物の間です。その布が何を加えるか考えてみましょう。何を減らすのでしょうか？
    follow_ups:
      - 布がなかったら苗木はどうなる？
      - 影は初期の成長をどう形作る？
      - フィルターと光の関係とは？
  - id: nmg_morning_glory_dawn
    name: 朝顔の夜明け
    prompt: |
      朝顔は夜明けに開き、午後に閉じます。その花にはスケジュールがあります。そのリズムについて考えてみましょう。一日中開いていたら庭はどうなるでしょうか？
    follow_ups:
      - タイミングは受粉をどう形作る？
      - 開くことと花粉媒介者の関係とは？
      - なぜ夜明け？
  - id: nmg_garden_path
    name: 庭の小道
    prompt: |
      庭を通る小道 — 踏み石かマルチです。小道は私たちが歩く場所です。残りは歩かない場所です。その線について考えてみましょう。小道は何を守るのでしょうか？何を排除するのでしょうか？
    follow_ups:
      - 小道がなかったら庭はどうなる？
      - 小道はその動きをどう形作る？
      - 歩くことと土の関係とは？
  - id: nmg_cross_pollination
    name: 交配受粉
    prompt: |
      蜂が一方の植物からもう一方の植物に花粉を運びます。その子孫は雑種になります — どちらの親にも似ていません。その交雑について考えてみましょう。交雑は何を生み出すのでしょうか？何を危険にさらすのでしょうか？
    follow_ups:
      - 交雑がなかったら品種はどうなる？
      - 蜂はその遺伝子をどう形作る？
      - 運ぶことと組み合わせることの関係とは？
  - id: nmg_herb_scent
    name: ハーブの香り
    prompt: |
      ローズマリーやミントに触れてみましょう。香りが立ち上る — 精油が放出されます。その香りは防御でもあり、誘いでもあります。その二重の役割について考えてみましょう。何が寄せ付け、何が遠ざけるのでしょうか？
    follow_ups:
      - 香りがなかったらハーブはどうなる？
      - 精油はその出会いをどう形作る？
      - 触れることと放出することの関係とは？
  - id: nmg_watering_can_pour
    name: じょうろの注ぎ
    prompt: |
      じょうろからの水 — ホースより優しいです。その注ぎは意図的です。その儀式について考えてみましょう。ホースにはできない、じょうろができることは何でしょうか？注ぐことと植物の関係とは？
    follow_ups:
      - 若い苗木は何を好む？
      - 注ぐことは土をどう形作る？
      - 儀式と成長の関係とは？
  - id: nmg_bird_seed_spill
    name: 鳥の餌のこぼれ
    prompt: |
      フィーダーから種がこぼれます — ひまわりの種、キビ。地面に落ちます。スズメがつつき、リスが襲います。そのこぼれは舞台を作り出します。誰が利益を得るか考えてみましょう。誰のためにあったのでしょうか？
    follow_ups:
      - こぼれがなかったら地面はどうなる？
      - こぼれはその群れをどう形作る？
      - こぼれることと食べる人の関係とは？
  - id: nmg_cutting_propagate
    name: 挿し木による繁殖
    prompt: |
      挿し木 — 水または土の中の茎 — が根付きます。種はありません。植物は自分自身をクローンします。その近道について考えてみましょう。繁殖は何を迂回するのでしょうか？何を保存するのでしょうか？
    follow_ups:
      - 挿し木がなかったら庭はどうなる？
      - クローンはその多様性をどう形作る？
      - 切ることと継続の関係とは？
  - id: nmg_leaf_miner_tunnel
    name: ハモグリバエのトンネル
    prompt: |
      ハモグリバエの跡 — 曲がりくねった、淡い、表面の下。幼虫が層の間を食い進みます。葉は生き残りますが、傷つきます。その侵入について考えてみましょう。葉は何を失うのでしょうか？何を残すのでしょうか？
    follow_ups:
      - トンネルがなかったら葉はどうなる？
      - ハモグリバエはその葉をどう形作る？
      - トンネルと組織の関係とは？
  - id: nmg_greenhouse_condensation
    name: 温室の結露
    prompt: |
      温室のガラスに結露が玉になります。中の空気は湿っています — 植物が息を吐き出します。ガラスは境界です。その微気候について考えてみましょう。何が暖かさを保ち、何が湿気を保つのでしょうか？
    follow_ups:
      - ガラスがなかったら温室はどうなる？
      - 結露はその内部をどう形作る？
      - ガラスと成長の関係とは？
  - id: nmg_terrace_level
    name: 段々畑の段
    prompt: |
      斜面に沿って階段状に作られた花壇。各段は土を、水を保持します。その段は浸食防止と舞台です。その建築について考えてみましょう。それがなかったら斜面はどうなるでしょうか？
    follow_ups:
      - 段はその育つものをどう形作る？
      - 段と安定の関係とは？
      - なぜ段々畑？
  - id: nmg_native_vs_exotic
    name: 在来種 vs 外来種
    prompt: |
      一部の植物は在来種 — それはそこに属しています。他は外来種 — 導入されたものです。花壇について考えてみましょう。どちらがどちらでしょうか？それは重要でしょうか？外来種にはない、在来種は何を提供するのでしょうか？
    follow_ups:
      - 在来種だけだったら庭はどうなる？
      - 起源はその生態系をどう形作る？
      - 属することと繁栄することの関係とは？
  - id: nmg_garden_dusk
    name: 夕暮れの庭
    prompt: |
      夕暮れの庭 — 光が消え、蛾が現れます。日中のシフトが終わり、夜間のシフトが始まります。その移行について考えてみましょう。誰が目覚め、誰が眠るのでしょうか？庭は何になるのでしょうか？
    follow_ups:
      - 夕暮れがなかったら庭はどうなる？
      - そのシフトは生態系をどう形作る？
      - 昼と夜の関係とは？
  - id: nmg_stake_tie
    name: 支柱と結束
    prompt: |
      植物が支柱に結びつけられています — マメ、トマト。支柱は正します。それがなければ、植物は広がるでしょう。その支えについて考えてみましょう。その結束は何を可能にし、何を制約するのでしょうか？
    follow_ups:
      - 支柱がなかったら植物はどうなる？
      - 結束はその形をどう形作る？
      - 支えと成長の関係とは？
  - id: nmg_first_frost
    name: 初霜
    prompt: |
      初霜 — 繊細な植物が黒くなります。庭が変化します。一部のものは終わり、他は残ります。その閾値について考えてみましょう。霜は何を選び、何を免がすのでしょうか？
    follow_ups:
      - 霜がなかったら庭はどうなる？
      - 初霜はその季節をどう形作る？
      - 寒さと終焉の関係とは？
  - id: nmg_garden_reflection
    name: 庭の反映
    prompt: |
      庭を見てみましょう。それは選択を反映しています — 何が植えられ、何が草刈りされ、何がそのままにされたか。庭は鏡です。それは庭師について何を語っていますか？
    follow_ups:
      - 言葉がなかったら庭は何を語る？
      - 選択はその全体をどう形作る？
      - 庭師と育つことの関係とは？
