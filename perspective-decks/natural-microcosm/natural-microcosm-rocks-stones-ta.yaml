# இயற்கையான நுண் உலகம் — பாறைகளும் கற்களும் (Tamil)

id: natural_microcosm_rocks_stones
name: இயற்கையான நுண் உலகம் — பாறைகளும் கற்களும்
description: பாறைகள் மற்றும் கற்களைப் பற்றிய உங்கள் பார்வையை மாற்ற 50 அட்டைகள்— புவியியல் காலம் மற்றும் பாசி முதல் தட்பவெப்பநிலை, அரிப்பு மற்றும் கனிமத்தின் மெதுவான இயக்கம் வரை.
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: பாசி வரைபடம்
    prompt: |
      பாறையின் மேல் பாசி வளர்கிறது—மெதுவாக, பொறுமையாக. ஆரஞ்சு, சாம்பல், பச்சை. இது ஒரு
      உயிரினம் அல்ல, இரண்டு: பூஞ்சை மற்றும் பாசி. கூட்டாண்மையைக் கருத்தில் கொள்ளுங்கள். பாறை என்ன வழங்குகிறது? பாசி என்ன திருப்பித் தருகிறது?
    follow_ups:
      - பாசி இல்லாமல் பாறை எப்படி இருக்கும்?
      - பாசி காலத்தை எவ்வாறு குறிக்கிறது?
      - பாசி மற்றும் அரிப்புக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_pebble_smooth
    name: கூழாங்கல் மென்மையானது
    prompt: |
      ஆற்று கூழாங்கல் மென்மையானது—நீர் மற்றும் மணல் அதைத் தேய்த்துள்ளன. ஒன்றை எடுத்துக் கொள்ளுங்கள். எத்தனை
      ஆண்டுகள் ஆனது? மென்மை என்பது பயணத்தின் பதிவு. கூர்மையான விளிம்பு எதைக் குறிக்கும்?
    follow_ups:
      - மென்மை வரலாற்றை எவ்வாறு வெளிப்படுத்துகிறது?
      - நீரின்றி கூழாங்கல் என்னவாக இருக்கும்?
      - வடிவம் மற்றும் ஓட்டத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_crack_frost
    name: உறைதல் விரிசல்
    prompt: |
      ஒரு விரிசலில் நீர் உறைந்து, விரிவடைகிறது. பாறை பிளக்கிறது. இது மெதுவான வன்முறை.
      ஒரு பிளவுள்ள பாறையைக் கண்டறியவும். அதை உருவாக்கிய உறைதல் மற்றும் உருகுதல் சுழற்சிகளைக் கருத்தில் கொள்ளுங்கள்.
    follow_ups:
      - விரிசல் இல்லாமல் பாறை என்னவாக இருக்கும்?
      - உறைதல் நிலப்பரப்பை எவ்வாறு வடிவமைக்கிறது?
      - நீர் மற்றும் பிளவுக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_stone_warmth
    name: கல் வெம்மை
    prompt: |
      சூரியனால் வெப்பமாக்கப்பட்ட கல் வெப்பத்தை வைத்திருக்கிறது. மாலையில் ஒன்றின் மீது அமருங்கள். கல் உறிஞ்சியதை வெளியிடுகிறது. பரிமாற்றத்தைக் கருத்தில் கொள்ளுங்கள். சூரியன் இல்லாமல் பாறை என்னவாக இருக்கும்?
    follow_ups:
      - கல் எவ்வாறு நுண் சூழலை உருவாக்குகிறது?
      - அந்த வெப்பத்தைப் பயன்படுத்தும் உயிரினங்கள் யாவை?
      - பாறை மற்றும் வெப்பத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_moss_crust
    name: பாசி மேலோடு
    prompt: |
      பாறையின் மீது பாசி வளர்கிறது—ஒரு மெல்லிய மேலோடு. அது ஈரப்பதத்தை வைத்திருக்கிறது, தூசியை தடுத்து நிறுத்துகிறது.
      பாறை ஒரு அடிப்படையாக மாறுகிறது. பாறை எப்போது மண்ணாக மாறும்? கோடு எங்கே?
    follow_ups:
      - பாசி இல்லாமல் கல் என்னவாக இருக்கும்?
      - மேலோடு மாற்றத்தை எவ்வாறு துரிதப்படுத்துகிறது?
      - கனிமம் மற்றும் உயிருக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_vein_quartz
    name: குவார்ட்ஸ் நரம்பு
    prompt: |
      ஒரு குவார்ட்ஸ் நரம்பு பாறை வழியாக செல்கிறது—வெவ்வேறு கனிமத்தின் ஒரு கோடு. இது ஒரு
      பிளவை, ஒரு நிரப்பலை குறிக்கிறது. கோட்டைத் தொடருங்கள். என்ன சக்திகள் அதை உருவாக்கின? நரம்பு என்ன வெளிப்படுத்துகிறது?
    follow_ups:
      - நரம்பு இல்லாமல் பாறை என்னவாக இருக்கும்?
      - நரம்பு ஆழமான காலத்தை எவ்வாறு குறிக்கிறது?
      - பிளவு மற்றும் அழகுக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_puddle_reflect
    name: கல்லில் குட்டை
    prompt: |
      மழைக்குப் பிறகு பாறையில் ஒரு பள்ளம் நீரை வைத்திருக்கிறது. அது ஒரு சிறிய குளம்—ஒரு கோப்பை. அதில் என்ன பிரதிபலிக்கிறது? என்ன ஆவியாகிறது? கல் ஒரு பாத்திரத்தை உருவாக்கியுள்ளது.
    follow_ups:
      - பள்ளம் இல்லாமல் பாறை என்னவாக இருக்கும்?
      - குட்டை எவ்வாறு வாழ்விடத்தை உருவாக்குகிறது?
      - பள்ளம் மற்றும் காலத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_sand_grain
    name: மணல் துகள்
    prompt: |
      மணல் என்பது பாறை சிறியதாக உடைந்ததாகும். ஒரு கைப்பிடி எடுக்கவும். ஒவ்வொரு துகளும் ஒரு காலத்தில் பெரிய ஒன்றின் பகுதியாக இருந்தது. அளவைக் கருத்தில் கொள்ளுங்கள். ஒரு மலையில் எத்தனை துகள்கள் உள்ளன?
    follow_ups:
      - துகள்கள் இல்லாமல் கடற்கரை என்னவாக இருக்கும்?
      - துகள் அளவு எவ்வாறு கதையைச் சொல்கிறது?
      - முழு மற்றும் துண்டுக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_stone_circle
    name: கல் வட்டம்
    prompt: |
      கைகளால் அல்லது பனிப்பாறையால் அமைக்கப்பட்ட பாறைகள்—ஒரு வட்டம், ஒரு கல் குவியல், ஒரு சுவர். யாரோ
      அல்லது ஏதோ ஒன்றை வைத்திருந்தது. நோக்கத்தைக் கருத்தில் கொள்ளுங்கள். அமைப்பின் அர்த்தம் என்ன?
    follow_ups:
      - கற்கள் இல்லாமல் இடம் என்னவாக இருக்கும்?
      - அமைப்பு எவ்வாறு அர்த்தத்தை உருவாக்குகிறது?
      - பாறை மற்றும் சடங்குக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_erosion_edge
    name: அரிப்பு விளிம்பு
    prompt: |
      காற்று மற்றும் நீர் பாறையை செதுக்குகின்றன. ஒரு விளிம்பைக் கண்டறியவும்—ஒரு பாறை, ஒரு பாறை. வடிவம்
      நீக்கத்தின் விளைவாகும். அதற்கு முன் என்ன இருந்தது? என்ன எஞ்சியிருக்கும்?
    follow_ups:
      - அரிப்பு இல்லாமல் நிலப்பரப்பு என்னவாக இருக்கும்?
      - விளிம்பு காலத்தை எவ்வாறு குறிக்கிறது?
      - இழப்பு மற்றும் வடிவத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_color_streak
    name: வண்ணக் கோடு
    prompt: |
      பாறை சீரானது அல்ல—இரும்பு சிவப்பு, மாங்கனீசு கருப்பு, தாமிரம் பச்சை.
      ஒரு கோட்டைத் தொடருங்கள். நிறம் வேதியியல். பாறையின் வரலாற்றைப் பற்றி அது என்ன வெளிப்படுத்துகிறது?
    follow_ups:
      - நிறம் இல்லாமல் பாறை என்னவாக இருக்கும்?
      - கனிமவியல் எவ்வாறு வண்ணத் தட்டை வடிவமைக்கிறது?
      - தனிமம் மற்றும் நிறத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_scratch_glacier
    name: பனிப்பாறை கீறல்
    prompt: |
      பனிப்பாறை கீறல்கள்—பாறைப் படுகையில் உள்ள கீறல்கள்—பனி பாறைகளை இழுத்த இடத்தைக் குறிக்கின்றன
      கல்லில். கோடுகள் இணையாக உள்ளன. சக்தியைக் கருத்தில் கொள்ளுங்கள். என்ன நகர்ந்தது? எது அசையாமல் இருந்தது?
    follow_ups:
      - கீறல்கள் இல்லாமல் பாறை என்ன காட்டும்?
      - கீறல் திசையை எவ்வாறு குறிக்கிறது?
      - பனி மற்றும் கல்லுக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_cobble_pattern
    name: கூழாங்கல் வடிவம்
    prompt: |
      ஒரே அளவு, மாறுபட்ட வடிவம் கொண்ட கூழாங்கற்கள்—கடற்கரை அல்லது ஆற்றுப்படுகை. நீர்
      அவற்றை வரிசைப்படுத்தியுள்ளது. வடிவத்தைக் கருத்தில் கொள்ளுங்கள். வரிசைப்படுத்தல் உங்களுக்கு என்ன சொல்கிறது?
    follow_ups:
      - வரிசைப்படுத்தல் இல்லாமல் கடற்கரை என்னவாக இருக்கும்?
      - ஓட்டம் எவ்வாறு வடிவத்தை வடிவமைக்கிறது?
      - அளவு மற்றும் போக்குவரத்துக்கிடையேயான தொடர்பு என்ன?
  - id: nmr_cavern_drip
    name: குகை சொட்டு
    prompt: |
      ஸ்டாலாக்டைட்டுகள் துளித்துளியாக உருவாகின்றன—வடிகட்டி நீரின் கனிம படிவுகள்.
      வளர்ச்சி புலப்படாதது. கால அளவைக் கருத்தில் கொள்ளுங்கள். வேகமான ஒரு திரைப்படம் என்ன காட்டும்?
    follow_ups:
      - சொட்டு இல்லாமல் குகை என்னவாக இருக்கும்?
      - சொட்டு எவ்வாறு காலநிலையைப் பதிவு செய்கிறது?
      - நீர் மற்றும் கல்லுக்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_boulder_shadow
    name: பாறை நிழல்
    prompt: |
      ஒரு பெரிய பாறை நிழலை உருவாக்குகிறது. அதன் அடியில் உள்ள தரை வேறுபட்டது—குளிர்ந்தது, ஈரமானது, குறைவான சூரியன். பாறை ஒரு நுண் சூழலை உருவாக்குகிறது. நிழலில் யார் வாழ்கிறார்கள்?
    follow_ups:
      - பாறை இல்லாமல் சரிவு என்னவாக இருக்கும்?
      - நிழல் எவ்வாறு வாழ்க்கையை வடிவமைக்கிறது?
      - பாறை மற்றும் புகலிடத்திற்கு இடையிலான தொடர்பு என்ன?
  - id: nmr_fossil_impression
    name: புதைபடிவ அச்சு
