# प्राकृतिक सूक्ष्म जगत — जंगल की ज़मीन (Hindi)

id: natural_microcosm_forest_floor
name: प्राकृतिक सूक्ष्म जगत — जंगल की ज़मीन
description: 50 कार्ड जो जंगल की ज़मीन को देखने के आपके तरीके को बदल देंगे—सड़न और फफूंद से लेकर पत्तियों के कचरे की संरचना और कैनोपी के नीचे के अदृश्य जीवन तक।
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: पत्ती की नस
    prompt: |
      एक गिरी हुई पत्ती उठाओ। नसों का पता लगाओ। वे पानी, पोषक तत्व, शर्करा ले जाती थीं।
      संरचना तब तक अदृश्य है जब तक आप देखते नहीं। जब पत्ती जीवित थी तो नस का नेटवर्क
      किसका पोषण करता था?
    follow_ups:
      - प्रजातियों के बीच पैटर्न कैसे भिन्न होता है?
      - नसों के बिना पत्ती क्या होगी?
      - नस और किनारे के बीच क्या संबंध है?
  - id: nmf_leaf_litter_layer
    name: पत्तियों के कचरे की परत
    prompt: |
      जंगल की ज़मीन परतों में होती है—ऊपर ताज़ी गिरी हुई, नीचे पिछले साल की,
      और भी पुरानी नीचे। घुटनों के बल बैठो। एक परत को हटाओ। ढाल क्या है? समय कैसे
      स्तरित होता है?
    follow_ups:
      - कचरे के बिना जंगल क्या होगा?
      - परत आवास कैसे बनाती है?
      - परत और सड़न के बीच क्या संबंध है?
  - id: nmf_mushroom_fruiting
    name: मशरूम का फलना
    prompt: |
      मशरूम केवल फलने वाला शरीर है। जीव—मायसेलियम—जमीन के नीचे, मिट्टी में,
      लकड़ी में फैलता है। जो आप देखते हैं उसे एक संकेत मानें। बाकी कहानी क्या है?
    follow_ups:
      - फफूंद के बिना जंगल क्या होगा?
      - फलने वाला शरीर नेटवर्क से कैसे संबंधित है?
      - मशरूम और सड़न के बीच क्या संबंध है?
  - id: nmf_log_sponge
    name: लॉग स्पंज
    prompt: |
      एक गिरा हुआ लॉग पानी सोखता है, उसे रखता है। बारिश के बाद उस पर अपना हाथ
      रखें। लॉग एक जलाशय है। कौन इससे पीता है? इसके अंदर कौन रहता है?
    follow_ups:
      - नर्स लॉग के बिना जंगल क्या होगा?
      - लॉग सूक्ष्म-जलवायु कैसे बनाता है?
      - लकड़ी और पानी के बीच क्या संबंध है?
  - id: nmf_moss_cushion
    name: मॉस कुशन
    prompt: |
      मॉस स्पंज की तरह पानी सोखता है। उसे छुएं। कुशन एक संरचना है—छोटे पौधे एक
      साथ पैक किए गए। उनके बीच की जगहों में कौन रहता है?
    follow_ups:
      - मॉस के बिना ज़मीन क्या होगी?
      - कुशन आर्द्रता कैसे बनाता है?
      - मॉस और अंकुर के बीच क्या संबंध है?
  - id: nmf_fern_unfurl
    name: फर्न का खुलना
    prompt: |
      फर्न के पत्ते सर्पिल रूप में खुलते हैं—फिडलहेड्स। गति धीमी है। यदि संभव हो तो
      दिनों तक एक को देखें। खुलने से पत्ती का आकार कैसे बदलता है?
    follow_ups:
      - सर्पिल के बिना फर्न क्या होगा?
      - खुलने से पत्ते की रक्षा कैसे होती है?
      - घुमाव और विकास के बीच क्या संबंध है?
  - id: nmf_root_tangle
    name: जड़ों का जाल
    prompt: |
      जड़ें सतह के नीचे उलझी रहती हैं। एक पेड़ को गिरा हुआ ढूंढें और उसके जड़
      पिंड को उठाएँ। जाल एक नक्शा है खोज का। जड़ें किस चीज़ की तलाश में थीं?
    follow_ups:
      - जाल के बिना पेड़ क्या होगा?
      - जड़ें जमीन के नीचे जगह कैसे साझा करती हैं?
      - जड़ और फफूंद के बीच क्या संबंध है?
  - id: nmf_slug_trail
    name: घोंघे का निशान
    prompt: |
      एक पत्ती पर घोंघे का निशान चमकता है—श्लेष्मा, रास्ता, हस्ताक्षर। निशान उस
      जगह को चिह्नित करता है जहां घोंघा गया था। निशान शिकारियों को क्या बताता है?
      शिकार को?
    follow_ups:
      - निशान के बिना घोंघा क्या खो देगा?
      - श्लेष्मा गति को कैसे सक्षम बनाता है?
      - निशान और क्षेत्र के बीच क्या संबंध है?
  - id: nmf_lichen_patch
    name: लाइकेन का पैच
    prompt: |
      लाइकेन छाल, पत्थर, मिट्टी पर उगता है—धीमा, मिश्रित। फफूंद और शैवाल
      एक साथ। एक पैच ढूंढें। यह कब से वहाँ है? इसकी उपस्थिति क्या संकेत देती है?
    follow_ups:
      - लाइकेन के बिना छाल क्या होगी?
      - लाइकेन समय को कैसे चिह्नित करता है?
      - लाइकेन और वायु गुणवत्ता के बीच क्या संबंध है?
  - id: nmf_saprophyte
    name: मृतोपजीवी
    prompt: |
      मृतोपजीवी मृत पदार्थ पर भोजन करते हैं—फफूंद, बैक्टीरिया, कीड़े। वे पुनर्चक्रण
      करने वाले हैं। सड़न का प्रमाण ढूंढें। कौन खा रहा है? क्या बदला जा रहा है?
    follow_ups:
      - अपघटक के बिना जंगल क्या होगा?
      - सड़न नए विकास को कैसे पोषित करती है?
      - मृत्यु और मिट्टी के बीच क्या संबंध है?
  - id: nmf_seedling_emergence
    name: अंकुर का निकलना
    prompt: |
      एक अंकुर कचरे से होकर निकलता है। पहले बीजपत्र, फिर असली पत्ते। बल पर
      ध्यान दें। बाहर निकलने में क्या लगा? क्या बाधा डालेगा?
    follow_ups:
      - अंकुर के बिना जंगल क्या होगा?
      - अंकुर का निकलना कचरे पर कैसे निर्भर करता है?
      - अंकुर और प्रकाश के बीच क्या संबंध है?
  - id: nmf_anthill_mound
    name: चींटी का टीला
    prompt: |
      जंगल की ज़मीन से एक चींटी का टीला उठता है—खुदी हुई मिट्टी, व्यवस्थित।
      यातायात देखें। वे कहाँ जाते हैं? वे क्या ले जाते हैं?
    follow_ups:
      - टीले के बिना ज़मीन क्या होगी?
      - टीला जल निकासी को कैसे आकार देता है?
      - टीले और कॉलोनी के बीच क्या संबंध है?
  - id: nmf_spider_silk
    name: मकड़ी का जाला
    prompt: |
      मकड़ी का जाला दरारों को पाटता है—पत्तियों, टहनियों के बीच। ओस इसे पकड़ती है।
      जाल तब तक अदृश्य है जब तक प्रकाश उस पर न पड़े। एक धागे का पता लगाएँ। यह क्या
      जोड़ता है?
    follow_ups:
      - जाले के बिना दरार क्या होगी?
      - जाल अंतरिक्ष को कैसे आकार देता है?
      - जाले और शिकार के बीच क्या संबंध है?
  - id: nmf_bark_flake
    name: छाल का टुकड़ा
    prompt: |
      तने से छाल का टुकड़ा गिरता है—बनावट, पैटर्न, उम्र। प्रत्येक टुकड़ा एक
      मौसम बताता है। छाल के नीचे कौन रहता है? टुकड़ा क्या प्रकट करता है?
    follow_ups:
      - छाल के बिना पेड़ क्या होगा?
      - छाल कैसे सुरक्षा और इन्सुलेशन करती है?
      - टुकड़े और नवीनीकरण के बीच क्या संबंध है?
  - id: nmf_acorn_fall
    name: बलूत का गिरना
    prompt: |
      एक बलूत का फल गिरता है। यह अपने आकार के लिए भारी है। यह जड़ें जमा लेगा या
      खा लिया जाएगा। संभावनाओं पर विचार करें। कौन सा रास्ता तय करता है?
    follow_ups:
      - बलूत के फल के बिना जंगल क्या होगा?
      - गिरना बीज को कैसे वितरित करता है?
      - बलूत और ओक के बीच क्या संबंध है?
  - id: nmf_fallen_branch
    name: गिरी हुई शाखा
    prompt: |
      एक शाखा ज़मीन पर पड़ी है—टूटी हुई, शायद हवा से। अब यह एक पुल है। कौन
      इसके ऊपर से गुजरता है? इस पर क्या उगता है?
    follow_ups:
      - गिरी हुई लकड़ी के बिना ज़मीन क्या होगी?
      - शाखा किनारा आवास कैसे बनाती है?
      - शाखा और पोषक तत्व के बीच क्या संबंध है?
  - id: nmf_humus_smell
    name: ह्यूमस की गंध
    prompt: |
      जंगल की ज़मीन के करीब झुकें। गंध—पृथ्वी, सड़न, जीवन। वह गंध रसायन शास्त्र
      है। इसे कौन बनाता है? इसके बिना जंगल क्या होगा?
    follow_ups:
      - गंध स्वास्थ्य को कैसे चिह्नित करती है?
      - बाँझ मिट्टी की गंध कैसी होगी?
      - गंध और उर्वरता के बीच क्या संबंध है?
  - id: nmf_snail_shell
    name: घोंघे का खोल
    prompt: |
      कचरे में एक खाली घोंघे का खोल पड़ा है। सर्पिल, कैल्शियम, पीछे छोड़ दिया।
      घोंघे को किसने खाया होगा? खोल का उपयोग कौन करेगा?
    follow_ups:
      - खोल के बिना ज़मीन क्या होगी?
      - खोल पोषक तत्वों को कैसे पुनर्चक्रित करता है?
      - खोल और कैल्शियम के बीच क्या संबंध है?
  - id: nmf_fungal_network
    name: फंगल नेटवर्क
    prompt: |
      मायसेलियम पेड़ों को जोड़ता है—एक वुड वाइड वेब। आप इसे देख नहीं सकते, लेकिन
      यह वहाँ है। पोषक तत्व प्रवाहित होते हैं। सूचना प्रवाहित होती है। जंगल को एक
      नेटवर्क के रूप में मानें।
    follow_ups:
      - नेटवर्क के बिना जंगल क्या होगा?
      - नेटवर्क संसाधनों को कैसे पुनर्वितरित करता है?
      - फफूंद और पेड़ के बीच क्या संबंध है?
  - id: nmf_fern_spore
    name: फर्न का बीजाणु
    prompt: |
      फर्न बीजाणुओं द्वारा प्रजनन करते हैं—छोटे, अनगिनत। पत्ते के नीचे देखें।
      सोरी उन्हें रखते हैं। एक बीजाणु की यात्रा का पता लगाने में क्या लगेगा?
    follow_ups:
      - बीजाणुओं के बिना फर्न क्या होगा?
      - बीजाणु कैसे फैलता है?
      - बीजाणु और युग्मकोद्भिद् के बीच क्या संबंध है?
  - id: nmf_earthworm_cast
    name: केंचुए की मींगनी
    prompt: |
      सुरंग के प्रवेश द्वार पर केंचुए की मींगनी जमा होती है—संसाधित मिट्टी, समृद्ध।
      केंचुए ने खाया और उत्सर्जित किया। मींगनी सतह को एक उपहार है।
    follow_ups:
      - केंचुओं के बिना मिट्टी क्या होगी?
      - मींगनी संरचना में कैसे सुधार करती है?
      - केंचुए और वातन के बीच क्या संबंध है?
  - id: nmf_dappled_light
    name: छिटपुट प्रकाश
    prompt: |
      कैनोपी से प्रकाश पैच में गिरता है—छिटपुट, हिलता हुआ। खुली हवा की तुलना में
      जंगल की ज़मीन को कम मिलता है। यह क्या उगाता है इसे कैसे आकार देता है?
    follow_ups:
      - पूरी धूप में ज़मीन क्या होगी?
      - छिटपुट प्रकाश सूक्ष्म-आवास कैसे बनाता है?
      - प्रकाश और अंकुर के बीच क्या संबंध है?
  - id: nmf_bracket_fungus
    name: ब्रैकेट फंगस
    prompt: |
      एक ब्रैकेट फंगस तने से उगता है—शेल्फ, पॉलीपोर। यह पेड़ को अंदर से पचा रहा
      है। ऐसा होने पर भी पेड़ वर्षों तक खड़ा रह सकता है। धीमी खपत पर विचार करें।
    follow_ups:
      - फफूंद के बिना पेड़ क्या होगा?
      - ब्रैकेट बीजाणुओं को कैसे फैलाता है?
      - परजीवी और मेजबान के बीच क्या संबंध है?
  - id: nmf_needle_mat
    name: सुइयों की चटाई
    prompt: |
      शंकुधारी पेड़ों के नीचे सुइयाँ जमा हो जाती हैं—खट्टी, धीरे-धीरे सड़ती है।
      चटाई मिट्टी को बदल देती है। इसमें क्या उगता है? क्या इससे बचता है?
    follow_ups:
      - चटाई के बिना ज़मीन क्या होगी?
      - सुई की चटाई पीएच को कैसे प्रभावित करती है?
      - चटाई और आग के बीच क्या संबंध है?
  - id: nmf_salamander_under
    name: सैलामैंडर के नीचे
    prompt: |
      सैलामैंडर लॉग, पत्थरों, कचरे के नीचे रहते हैं। सावधानी से कुछ उठाएँ—उसे
      वापस रख दें। नमी, अंधेरा। सैलामैंडर को इसकी आवश्यकता क्यों है?
    follow_ups:
      - सैलामैंडर के बिना जंगल क्या होगा?
      - सैलामैंडर अकशेरुकी समुदाय को कैसे आकार देता है?
      - नमी और उभयचर के बीच क्या संबंध है?
  - id: nmf_rot_hole
    name: सड़न का छेद
    prompt: |
      एक लॉग में एक छेद—शायद सड़न, या एक जानवर। छेद एक गुहा है। इसमें कौन
      घोंसला बनाता है? कौन छिपता है?
    follow_ups:
