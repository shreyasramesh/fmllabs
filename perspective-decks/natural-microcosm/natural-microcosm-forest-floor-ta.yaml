# இயற்கை நுண்கூறு — வனத்தளம் (Tamil)

id: natural_microcosm_forest_floor
name: இயற்கை நுண்கூறு — வனத்தளம்
description: 50 அட்டைகள், உங்கள் பார்வையை வனத்தளத்தைப் பற்றி மாற்றியமைக்க உதவும்—சிதைவு மற்றும் மைசீலியம் முதல் இலைகளின் கட்டுமானம் மற்றும் விதானத்திற்குக் கீழுள்ள கண்ணுக்குத் தெரியாத வாழ்க்கை வரை.
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: இலை நரம்பு
    prompt: |
      உதிர்ந்த ஒரு இலையைப் பொறுக்குங்கள். அதன் நரம்புகளைப் பின்தொடருங்கள். அவை நீர், ஊட்டச்சத்துக்கள்,
      சர்க்கரைகள் ஆகியவற்றைக் கொண்டு சென்றன. நீங்கள் உற்று நோக்கும் வரை அதன் கட்டமைப்பு கண்ணுக்குத் தெரியாது.
      இலை உயிரோடு இருந்தபோது நரம்பு வலையமைப்பு எதை நிலைநிறுத்தியது?
    follow_ups:
      - வெவ்வேறு இனங்களுக்கு இடையே உள்ள வடிவமைப்பு எவ்வாறு வேறுபடுகிறது?
      - நரம்புகள் இல்லாமல் இலை எப்படி இருக்கும்?
      - நரம்புக்கும் விளிம்புக்கும் என்ன தொடர்பு?
  - id: nmf_leaf_litter_layer
    name: இலை உதிர்வு அடுக்கு
    prompt: |
      வனத்தளம் என்பது அடுக்குகளால் ஆனது—மேலே புதிய உதிர்வுகள், கீழே கடந்த ஆண்டின் உதிர்வுகள், அதற்குக் கீழே இன்னும் பழையவை.
      மண்டியிட்டு, ஒரு அடுக்கைப் பிரிக்கவும். என்ன வேறுபாடு உள்ளது? காலம் எப்படி அடுக்கி வைக்கப்பட்டுள்ளது?
    follow_ups:
      - உதிர்வுகள் இல்லாமல் காடு எப்படி இருக்கும்?
      - இந்த அடுக்கு எவ்வாறு வாழ்விடத்தை உருவாக்குகிறது?
      - அடுக்குக்கும் சிதைவுக்கும் என்ன தொடர்பு?
  - id: nmf_mushroom_fruiting
    name: காளான் காய்ப்பு
    prompt: |
      காளான் என்பது அதன் காய்ப்பு உடல் மட்டுமே. உயிரினம்—மைசீலியம்—நிலத்தடியில், மண்ணின் வழியாக, மரத்தின் வழியாகப் பரவுகிறது.
      நீங்கள் பார்ப்பதை ஒரு சமிக்ஞையாகக் கருதுங்கள். மீதமுள்ள கதை என்ன?
    follow_ups:
      - பூஞ்சைகள் இல்லாமல் காடு எப்படி இருக்கும்?
      - காய்ப்பு உடல் வலையமைப்புடன் எவ்வாறு தொடர்புடையது?
      - காளானுக்கும் சிதைவுக்கும் என்ன தொடர்பு?
  - id: nmf_log_sponge
    name: மரக்கட்டை ஸ்பாஞ்ச்
    prompt: |
      சரிந்த மரக்கட்டை நீரை உறிஞ்சி, அதைத் தக்க வைத்துக் கொள்ளும். மழைக்குப் பிறகு அதை உங்கள் கைகளால் அழுத்தவும்.
      அந்த மரக்கட்டை ஒரு நீர்த்தேக்கம். அதிலிருந்து யார் குடிக்கிறார்கள்? அதில் என்ன வாழ்கிறது?
    follow_ups:
      - தாய் மரக்கட்டைகள் இல்லாமல் காடு எப்படி இருக்கும்?
      - மரக்கட்டை எவ்வாறு நுண் சூழலை உருவாக்குகிறது?
      - மரக்கட்டைக்கும் நீருக்கும் என்ன தொடர்பு?
  - id: nmf_moss_cushion
    name: பாசி குஷன்
    prompt: |
      பாசி ஒரு ஸ்பாஞ்சைப் போல நீரைத் தக்க வைத்துக் கொள்ளும். அதைத் தொட்டுப் பாருங்கள். அந்த குஷன் ஒரு கட்டமைப்பு—
      சிறிய தாவரங்கள் ஒன்றாகப் பொதிந்துள்ளன. அவற்றுக்கிடையேயான இடைவெளிகளில் என்ன வாழ்கிறது?
    follow_ups:
      - பாசி இல்லாமல் தளம் எப்படி இருக்கும்?
      - குஷன் எவ்வாறு ஈரப்பதத்தை உருவாக்குகிறது?
      - பாசிக்கும் நாற்றுக்கும் என்ன தொடர்பு?
  - id: nmf_fern_unfurl
    name: பெரணி விரிப்பு
    prompt: |
      பெரணி இலைகள் சுருளாக விரிகின்றன—ஃபிடில்ஹெட்கள். இந்த இயக்கம் மெதுவாக உள்ளது. உங்களால் முடிந்தால்,
      ஒன்றை நாட்களில் கவனிக்கவும். எப்படி அந்த விரிப்பு இலையை வடிவமைக்கிறது?
    follow_ups:
      - சுருள் இல்லாமல் பெரணி எப்படி இருக்கும்?
      - விரித்தல் இலைகளை எப்படிப் பாதுகாக்கிறது?
      - சுருளுக்கும் வளர்ச்சிக்கும் என்ன தொடர்பு?
  - id: nmf_root_tangle
    name: வேர் பின்னல்
    prompt: |
      வேர்கள் மேற்பரப்பிற்குக் கீழே பின்னிக் கிடக்கின்றன. ஒரு மரம் சரிந்து அதன் வேர் பந்தை தூக்கிய இடத்தைக் கண்டுபிடியுங்கள்.
      அந்தப் பின்னல் ஒரு தேடலின் வரைபடம். வேர்கள் எதைத் தேடின?
    follow_ups:
      - பின்னல் இல்லாமல் மரம் எப்படி இருக்கும்?
      - வேர்கள் நிலத்தடியில் இடத்தை எவ்வாறு பகிர்ந்து கொள்கின்றன?
      - வேருக்கும் பூஞ்சைக்கும் என்ன தொடர்பு?
  - id: nmf_slug_trail
    name: நத்தை தடம்
    prompt: |
      ஒரு நத்தை இலைகளில் பளபளக்கும் தடத்தை விட்டுச் செல்கிறது—சளி, பாதை, அடையாளம். நத்தை சென்ற இடத்தை அந்த தடம் குறிக்கிறது.
      அந்தத் தடம் வேட்டையாடுபவர்களுக்கு என்ன சொல்கிறது? இரைகளுக்கு என்ன?
    follow_ups:
      - தடங்கள் இல்லாமல் நத்தை எதை இழக்கும்?
      - சளி எவ்வாறு பயணத்தை எளிதாக்குகிறது?
      - தடம் மற்றும் எல்லைக்கு என்ன தொடர்பு?
  - id: nmf_lichen_patch
    name: லைக்கன் திட்டு
    prompt: |
      லைக்கன் மரப்பட்டை, பாறை, மண் மீது வளர்கிறது—மெதுவாக, கலவையாக. பூஞ்சை மற்றும் பாசி
      ஒன்றாக. ஒரு திட்டைப் பாருங்கள். அது எவ்வளவு காலமாக அங்கே உள்ளது? அதன் இருப்பு எதைக் குறிக்கிறது?
    follow_ups:
      - லைக்கன் இல்லாமல் மரப்பட்டை எப்படி இருக்கும்?
      - லைக்கன் எவ்வாறு காலத்தைக் குறிக்கிறது?
      - லைக்கனுக்கும் காற்றின் தரம் பற்றியதற்கும் என்ன தொடர்பு?
  - id: nmf_saprophyte
    name: சாப்ரோஃபைட்
    prompt: |
      சாப்ரோஃபைட்டுகள் இறந்தப் பொருட்களை உண்ணும்—பூஞ்சைகள், பாக்டீரியாக்கள், பூச்சிகள். அவை மறுசுழற்சியாளர்கள்.
      சிதைவின் ஆதாரத்தைக் கண்டறியவும். யார் சாப்பிடுகிறார்கள்? என்ன மாற்றப்படுகிறது?
    follow_ups:
      - சிதைப்பவர்கள் இல்லாமல் காடு எப்படி இருக்கும்?
      - சிதைவு புதிய வளர்ச்சியை எவ்வாறு ஊட்டுகிறது?
      - இறப்புக்கும் மண்ணுக்கும் என்ன தொடர்பு?
  - id: nmf_seedling_emergence
    name: நாற்று வெளிப்படுதல்
    prompt: |
      ஒரு நாற்று உதிர்வுகளைத் துளைத்து வெளிவருகிறது—முதலில் விதையிலை, பின்னர் உண்மையான இலைகள்.
      அந்த விசையை கவனிக்கவும். அது வெளியே வர என்ன தேவைப்பட்டது? என்ன அதைத் தடுக்கும்?
    follow_ups:
      - நாற்றுகள் இல்லாமல் காடு எப்படி இருக்கும்?
      - வெளிப்படுதல் உதிர்வுகளை எவ்வாறு சார்ந்துள்ளது?
      - நாற்றுக்கும் ஒளிக்கும் என்ன தொடர்பு?
  - id: nmf_anthill_mound
    name: எறும்பு புற்றின் மேடு
    prompt: |
      ஒரு எறும்பு புற்றின் மேடு வனத்தளத்திலிருந்து உயர்ந்து நிற்கிறது—தோண்டப்பட்ட மண், ஒழுங்கமைக்கப்பட்டது.
      அந்தப் போக்குவரத்தைக் கவனிக்கவும். அவை எங்கே செல்கின்றன? அவை எதைக் கொண்டு செல்கின்றன?
    follow_ups:
      - மேடு இல்லாமல் தளம் எப்படி இருக்கும்?
      - மேடு எவ்வாறு வடிகாலமைப்பை வடிவமைக்கிறது?
      - மேடு மற்றும் காலனிக்கு என்ன தொடர்பு?
  - id: nmf_spider_silk
    name: சிலந்தி வலை
    prompt: |
      சிலந்தி வலை இடைவெளிகளில் பரவுகிறது—இலைகள், குச்சிகளுக்கு இடையில். பனி அதில் படிகிறது. ஒளி படரும் வரை வலை கண்ணுக்குத் தெரியாது.
      ஒரு நூலைப் பின்தொடருங்கள். அது எதை இணைக்கிறது?
    follow_ups:
      - வலை இல்லாமல் இடைவெளி எப்படி இருக்கும்?
      - வலை எவ்வாறு இடத்தை கட்டமைக்கிறது?
      - வலைக்கும் இரைகளுக்கும் என்ன தொடர்பு?
  - id: nmf_bark_flake
    name: மரப்பட்டை செதில்
    prompt: |
      மரப்பட்டை ஒரு மரத்தின் தண்டிலிருந்து உதிர்கிறது—அமைப்பு, வடிவம், வயது. ஒவ்வொரு செதிலும் ஒரு பருவத்தைக்
      கூறுகிறது. அந்த மரப்பட்டைக்குக் கீழே யார் வாழ்கிறார்கள்? அந்தச் செதில் என்ன வெளிப்படுத்துகிறது?
    follow_ups:
      - மரப்பட்டை இல்லாமல் மரம் எப்படி இருக்கும்?
      - மரப்பட்டை எவ்வாறு பாதுகாத்து வெப்பத்தைத் தனிமைப்படுத்துகிறது?
      - செதிலுக்கும் புதுப்பித்தலுக்கும் என்ன தொடர்பு?
  - id: nmf_acorn_fall
    name: அக்ரான் வீழ்ச்சி
    prompt: |
      ஒரு அக்ரான் விழுகிறது. அதன் அளவிற்கு அது கனமானது. அது வேரூன்றும் அல்லது உண்ணப்படும்.
      அதன் வாய்ப்புகளைக் கருதுங்கள். எது பாதையைத் தீர்மானிக்கிறது?
    follow_ups:
      - அக்ரான் இல்லாமல் காடு எப்படி இருக்கும்?
      - வீழ்ச்சி எவ்வாறு விதையைப் பரப்புகிறது?
      - அக்ரானுக்கும் ஓக் மரத்திற்கும் என்ன தொடர்பு?
  - id: nmf_fallen_branch
    name: விழுந்த கிளை
    prompt: |
      ஒரு கிளை தரையில் கிடக்கிறது—உடைந்த, ஒருவேளை காற்றால். அது இப்போது ஒரு பாலம்.
