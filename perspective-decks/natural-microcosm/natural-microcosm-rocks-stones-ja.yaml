# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 自然の小宇宙 — 岩と石 (Japanese)

id: natural_microcosm_rocks_stones
name: 自然の小宇宙 — 岩と石
description: 岩や石の見方を変える50枚のカード。地質時代や地衣類から、風化、浸食、鉱物のゆっくりとした生命まで。
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: 地衣類の地図
    prompt: |
      岩の上に地衣類がゆっくり、辛抱強く育つ。オレンジ、灰色、緑。それは単一の生物ではなく、菌類と藻類の二つ。そのパートナーシップを考えてみて。岩は何を提供し、地衣類は何を返すのだろう？
    follow_ups:
      - 地衣類がなかったら、岩はどんな姿をしているだろう？
      - 地衣類はどのように時間を刻むのか？
      - 地衣類と風化の関係は？
  - id: nmr_pebble_smooth
    name: 丸い小石
    prompt: |
      川の小石は丸い。水と砂がそれを磨いたから。一つ手に取ってみて。何年かかっただろう？その丸さは旅の記録。鋭い縁はどういう意味を持つだろう？
    follow_ups:
      - 丸さはどのように歴史を明らかにするか？
      - 水がなかったら、小石はどうなるだろう？
      - 形と水の流れの関係は？
  - id: nmr_crack_frost
    name: 霜による割れ目
    prompt: |
      水が割れ目に凍り、膨張する。岩が割れる。それはゆっくりとした暴力。亀裂のある岩を見つけて。それができた凍結と融解のサイクルを考えてみて。
    follow_ups:
      - 亀裂がなかったら、岩はどうなるだろう？
      - 霜はどのように風景を形作るか？
      - 水と亀裂の関係は？
  - id: nmr_stone_warmth
    name: 石の温もり
    prompt: |
      太陽に暖められた石は熱を蓄える。夕暮れ時に座ってみて。石は吸収したものを放出する。その交換を考えてみて。太陽がなかったら、石はどうなるだろう？
    follow_ups:
      - 石はどのように微気候を作り出すか？
      - その温もりを利用する生き物は？
      - 岩と熱の関係は？
  - id: nmr_moss_crust
    name: コケの地殻
    prompt: |
      石の上にコケが生える。薄い地殻。水分を保持し、埃を捕らえる。岩は基盤となる。いつ岩は土になるのか？その線引きはどこにある？
    follow_ups:
      - コケがなかったら、石はどうなるだろう？
      - 地殻はどのように変化を加速させるか？
      - 鉱物と有機物の関係は？
  - id: nmr_vein_quartz
    name: 石英脈
    prompt: |
      石英脈が岩を横切る。異なる鉱物の筋。それは亀裂の跡、充填物。その線をたどってみて。どのような力がそれを生み出したのか？その脈は何を明らかにするのか？
    follow_ups:
      - 脈がなかったら、岩はどうなるだろう？
      - 脈はどのように深遠な時間を記録するか？
      - 亀裂と美の関係は？
  - id: nmr_puddle_reflect
    name: 石の上の水たまり
    prompt: |
      雨の後、岩の窪みに水が溜まる。それは小さな水たまり。何が映っている？何が蒸発する？その石は器を作った。
    follow_ups:
      - 窪みがなかったら、岩はどうなるだろう？
      - 水たまりはどのように生息地を作るか？
      - 窪みと時間の関係は？
  - id: nmr_sand_grain
    name: 砂粒
    prompt: |
      砂は岩が小さくなったもの。ひとつかみしてみて。それぞれの粒はかつてより大きなものの一部だった。そのスケールを考えてみて。山にいくつの粒があるだろう？
    follow_ups:
      - 砂粒がなかったら、浜辺はどうなるだろう？
      - 粒の大きさはどのように物語を語るか？
      - 全体と断片の関係は？
  - id: nmr_stone_circle
    name: 石の円
    prompt: |
      手や氷河によって配置された岩—円、石塚、壁。誰か、あるいは何かがそれらを置いた。その意図を考えてみて。その配置は何を意味するのか？
    follow_ups:
      - 石がなかったら、その空間はどうなるだろう？
      - 配置はどのように意味を生み出すか？
      - 岩と儀式の関係は？
  - id: nmr_erosion_edge
    name: 浸食の縁
    prompt: |
      風と水が岩を削る。縁を見つけて—崖、巨石。その形は除去の産物。その前には何があった？何が残るだろう？
    follow_ups:
      - 浸食がなかったら、風景はどうなるだろう？
      - 縁はどのように時間を刻むか？
      - 喪失と形の関係は？
  - id: nmr_color_streak
    name: 色の筋
    prompt: |
      岩は均一ではない—鉄は赤く、マンガンは黒く、銅は緑に染まる。その筋をたどってみて。その色は化学反応。岩の歴史について何がわかる？
    follow_ups:
      - 色がなかったら、岩はどうなるだろう？
      - 鉱物はどのように色彩を形作るか？
      - 元素と色の関係は？
  - id: nmr_scratch_glacier
    name: 氷河の傷跡
    prompt: |
      氷河の線条痕—基盤岩の傷跡—は、氷が岩を石の上で引きずった跡。線は平行。その力を考えてみて。何が動き、何が静止していたのか？
    follow_ups:
      - 傷跡がなかったら、岩は何を示すだろう？
      - 傷跡はどのように方向を刻むか？
      - 氷と石の関係は？
  - id: nmr_cobble_pattern
    name: 玉石の模様
    prompt: |
      玉石の浜辺や川底—似た大きさ、多様な形。水がそれらを分類した。その模様を考えてみて。その分類は何を教えてくれる？
    follow_ups:
      - 分類がなかったら、浜辺はどうなるだろう？
      - 流れはどのように模様を形作るか？
      - 大きさと運搬の関係は？
  - id: nmr_cavern_drip
    name: 洞窟の滴
    prompt: |
      鍾乳石は一滴ずつ形成される—染み出した水からの鉱物堆積。その成長は知覚できない。その時間スケールを考えてみて。早送り映像は何を示すだろう？
    follow_ups:
      - 滴がなかったら、洞窟はどうなるだろう？
      - 滴はどのように気候を記録するか？
      - 水と石の関係は？
  - id: nmr_boulder_shadow
    name: 巨石の影
    prompt: |
      大きな巨石が影を落とす。その下の地面は違う—より涼しく、より湿り、日照が少ない。巨石は微気候を作り出す。影の中には誰が住んでいる？
    follow_ups:
      - 巨石がなかったら、斜面はどうなるだろう？
      - 影はどのように生命を形作るか？
      - 岩と避難場所の関係は？
  - id: nmr_fossil_impression
    name: 化石の印象
    prompt: |
      化石は石になった生命—あるいは堆積物に残された印象。もし見つけられたら、探してみて。岩は記憶を宿している。どの生物がこれを残した？いつ？
    follow_ups:
      - 化石がなかったら、岩はどうなるだろう？
      - 印象はどのように保存されるか？
      - 生命と鉱物の関係は？
  - id: nmr_grit_texture
    name: 砂粒の質感
    prompt: |
      岩を手で触ってみて。砂岩は花崗岩とは違う感触、頁岩は玄武岩とは違う。その質感は鉱物、粒、構造。触感は何を教えてくれる？
    follow_ups:
      - 質感がないと、岩はどうなるだろう？
      - 質感はどのように起源を明らかにするか？
      - 手触りと組成の関係は？
  - id: nmr_talus_slope
    name: 岩屑斜面
    prompt: |
      岩屑斜面—崖の下に砕けた岩。重力と天候がそれを落とす。その斜面は後始末の山。どれくらいの時間がかかって堆積したのか？
    follow_ups:
      - 岩屑がなかったら、崖の下はどうなるだろう？
      - 斜面はどのように浸食を刻むか？
      - 落下と山の関係は？
  - id: nmr_soil_horizon
    name: 土壌の層
    prompt: |
      注意深く掘ってみて。土壌には層がある—上部に有機物、下部に鉱物、時には明確な帯。その層は歴史。それぞれの層は何が作ったのか？
    follow_ups:
      - 層がなかったら、地面はどうなるだろう？
      - 層はどのように時間を記録するか？
      - 岩と土壌の関係は？
  - id: nmr_drystone_wall
    name: 石積み壁
    prompt: |
      石積み壁—モルタルなしで石が組み合わされている。壁は重力と噛み合いで支えられる。その技術を考えてみて。それぞれの石が次の石をどう支えているか？
    follow_ups:
      - 壁がなかったら、野原はどうなるだろう？
      - 壁はどのように境界を刻むか？
      - 岩と境界の関係は？
  - id: nmr_tide_pool_rock
    name: 潮だまりの岩
    prompt: |
      潮だまりの岩は濡れて、乾き、また濡れる。生き物がくっつく。その岩は生息地。潮の満ち引きのリズムを考えてみて。岩は何を経験する？
    follow_ups:
      - 岩がなかったら、潮だまりはどうなるだろう？
      - 岩はどのように表面を作るか？
      - 岩と潮の関係は？
  - id: nmr_crystal_face
    name: 結晶面
    prompt: |
      一部の岩は結晶面を見せる—劈開面、幾何学的な形。その結晶は空洞で、ゆっくりと成長した。その幾何学を考えてみて。どのような力がそれを形作ったのか？
    follow_ups:
      - 結晶がなかったら、岩はどうなるだろう？
      - 面はどのように構造を明らかにするか？
      - 秩序と鉱物の関係は？
  - id: nmr_dust_coating
    name: 塵の覆い
    prompt: |
      岩は埃を集める—花粉、煤、鉱物。時間とともに黒ずむ。その覆いは堆積物。もし洗ったら、岩はどんな見た目になるだろう？その覆いはそれをどう変える？
    follow_ups:
      - 覆いがなかったら、岩はどうなるだろう？
      - 塵はどのように環境を刻むか？
      - 表面と堆積の関係は？
  - id: nmr_river_sculpt
    name: 川の彫刻
    prompt: |
      川はその川床を彫刻する—ポットホール、淵、瀬。岩は水と堆積物によって形作られる。その区間を見つけて。その彫刻を読んでみて。その形は何を明らかにする？
    follow_ups:
      - 彫刻がなかったら、川床はどうなるだろう？
      - 流れはどのように岩を形作るか？
      - 水と形の関係は？
  - id: nmr_shard_edge
    name: 破片の縁
    prompt: |
      火打石の破片、チャートの断片—鋭く、加工されたか自然なもの。誰かが使ったかもしれない。その縁は機能的。その破断面を考えてみて。どうやって作られた？
    follow_ups:
      - 縁がなかったら、破片はどうなるだろう？
      - 破断面はどのように有用性を生むか？
      - 壊れることと道具の関係は？
  - id: nmr_gravel_path
    name: 砂利道
    prompt: |
      砂利道—足元に砕かれた岩。その crunch、その yield。その道は人間の選択。なぜこの表面なのか？土ではできない砂利の利点は？
    follow_ups:
      - 砂利がなかったら、道はどうなるだろう？
      - 道はどのように動きを形作るか？
      - 岩と歩くことの関係は？
  - id: nmr_bedrock_exposure
    name: 基盤岩の露頭
    prompt: |
      土壌が剥ぎ取られた場所—浸食、建設—基盤岩が現れる。その基盤が見える。通常隠れているものを考えてみて。その露頭は何を明らかにする？
    follow_ups:
      - 露頭がなかったら、風景はどうなるだろう？
      - 基盤岩はどのように表面を形作るか？
      - 隠されたものと現れたものの関係は？
  - id: nmr_wind_polish
    name: 風による磨き
    prompt: |
      砂漠の岩は風に磨かれている—滑らかで、多面体。砂が表面を吹き付ける。その磨きは研磨的。風を考えてみて。どれくらいの時間がかかった？
    follow_ups:
      - 磨きがなかったら、岩はどうなるだろう？
      - 風はどのように石を形作るか？
      - 粒子と表面の関係は？
  - id: nmr_hot_cold_crack
    name: 熱冷え割れ
    prompt: |
      岩は熱で膨張し、冷えると収縮する。繰り返されるサイクルは応力、微細な亀裂を引き起こす。亀裂を見つけて。それを作った温度の変動を考えてみて。
    follow_ups:
      - 亀裂がなかったら、岩はどうなるだろう？
      - 熱サイクルはどのように風景を形作るか？
      - 温度と亀裂の関係は？
  - id: nmr_constellation_stone
    name: 星空の石
    prompt: |
      鉱物の斑点—雲母、長石—が光を反射する石。表面がキラキラする。その鉱物を考えてみて。何がその輝きを生み出したのか？
    follow_ups:
      - 斑点がなかったら、岩はどうなるだろう？
      - 光はどのように構造を明らかにするか？
      - 鉱物と反射の関係は？
  - id: nmr_stepping_stone
    name: 飛び石
    prompt: |
      小川や泥に置かれた石—飛び石。その配置は意図的。その道筋を考えてみて。それぞれのステップには何が必要か？その石は何を可能にする？
    follow_ups:
      - 石がなかったら、渡河はどうなるだろう？
      - 石はどのようにアクセスを作るか？
      - 岩と通路の関係は？
  - id: nmr_moss_island
    name: コケの島
    prompt: |
      小川の中の岩—その上にコケが生える。その岩は島。水が周りを流れる。その孤立を考えてみて。何がコケに届く？何が届かない？
    follow_ups:
      - 島がなかったら、小川はどうなるだろう？
      - 岩はどのように避難場所を作るか？
      - 岩と流れの関係は？
  - id: nmr_weight_sunken
    name: 沈んだ重さ
    prompt: |
      重い石は時間とともに土に沈む。その周りに窪みができる。その重力を考えてみて。その沈み込みは地面に何をする？石には？
    follow_ups:
      - 石がなかったら、地面はどうなるだろう？
      - 重さはどのように表面を形作るか？
      - 質量と窪みの関係は？
  - id: nmr_layer_sediment
    name: 堆積層
    prompt: |
      堆積岩は層を示す—堆積構造。それぞれの層はかつて泥、砂、貝殻だった。その岩は圧縮された時間。一つの層を考えてみて。それ以前は何だった？
    follow_ups:
      - 層がなかったら、岩はどうなるだろう？
      - 層はどのように環境を記録するか？
      - 堆積物と石の関係は？
  - id: nmr_sunrise_heat
    name: 日の出の熱
    prompt: |
      平らな岩が東を向く。日の出とともに最初に暖まる。その方角を考えてみて。太陽への角度は何を決定するか？その早い温もりから恩恵を受けるのは誰？
    follow_ups:
      - 方角がなかったら、岩はどうなるだろう？
      - 方位はどのように温度を形作るか？
      - 角度と熱の関係は？
  - id: nmr_rain_rinse
    name: 雨による洗い流し
    prompt: |
      雨が岩に当たり、流れ落ちる。水は溶かしたもの、懸濁させたものを運ぶ。その洗い流しは連続的。岩は何を失う？水は何を得る？
    follow_ups:
      - 雨がなかったら、岩はどうなるだろう？
      - 流水はどのように岩を形作るか？
      - 水と溶解の関係は？
  - id: nmr_ice_wedge
    name: 氷楔
    prompt: |
      水が亀裂に凍り、それを広げる。氷楔は岩を砕く。証拠があれば見つけてみて。その力を考えてみて。その亀裂はどうなるだろう？
    follow_ups:
      - 氷がなかったら、岩はどうなるだろう？
      - 楔はどのように広がるか？
      - 凍結と亀裂の関係は？
  - id: nmr_resting_place
    name: 休憩場所
    prompt: |
      平らな岩—椅子、テーブル、舞台。私たちは岩を休むため、作業するため、印をつけるために使う。座るかもしれない岩を考えてみて。それは何に耐えてきた？何を受け止めるだろう？
    follow_ups:
      - 岩がなかったら、その空間はどうなるだろう？
      - 岩はどのように利用を促すか？
      - 鉱物と人間の関係は？
  - id: nmr_boundary_marker
    name: 境界標
    prompt: |
      岩は境界を記す—土地の境界、墓、道。その配置は意図的。境界石を考えてみて。それは何を隔てる？何を繋ぐ？
    follow_ups:
      - 石がなかったら、境界はどうなるだろう？
      - 岩はどのように意味を符号化するか？
      - 標識と領土の関係は？
  - id: nmr_exfoliation_sheet
    name: 剥離層
    prompt: |
      一部の岩は剥離する—層が玉ねぎのように剥がれる。圧力解放、熱サイクル。剥離する巨石を見つけて。その曲線を考えてみて。どのような力がそれを生み出した？
    follow_ups:
      - 層がなかったら、岩はどうなるだろう？
      - 剥離はどのように表面を形作るか？
      - 圧力と剥離の関係は？
  - id: nmr_compass_orientation
    name: 方位の配置
    prompt: |
      岩は配置される—氷河、川、人の手によって。その配置は物語を語る。配置された石を見つけて。それらは何を指し示している？何に抵抗している？
    follow_ups:
      - その配置は何を意味するだろう？
      - 配置はどのように力を記録するか？
      - 方向と石の関係は？
  - id: nmr_echo_sound
    name: 反響石
    prompt: |
      岩の面が音を反響させる。手を叩いて。反響を聞いてみて。岩は送られたものを返す。その表面を考えてみて。何が反射され、何が吸収される？
    follow_ups:
      - 反響がなかったら、空間はどうなるだろう？
      - 表面はどのように音を形作るか？
      - 岩と声の関係は？
  - id: nmr_anchor_hold
    name: 錨の保持
    prompt: |
      岩が固定する—木の根がそれを巻き、ケーブルがそれに結びつく。その岩は保持する。その掴み方を考えてみて。岩は何に抵抗し、何が可能になる？
    follow_ups:
      - 岩がなかったら、錨はどうなるだろう？
      - 岩はどのように安定性を作るか？
      - 保持と質量の関係は？
  - id: nmr_patina_age
    name: 古さのパティーナ
    prompt: |
      古い岩はパティーナ—風化層、酸化、汚れ—を発達させる。表面が変わる。そのパティーナは目に見える時間。新しい岩はどんな見た目だろう？
    follow_ups:
      - パティーナがなかったら、岩はどうなるだろう？
      - パティーナはどのように保護または弱めるか？
      - 表面と古さの関係は？
  - id: nmr_slow_narrative
    name: ゆっくりとした物語
    prompt: |
      岩はゆっくりとした物語を語る—形成、運搬、風化。そのタイムラインは地質学的。岩と共に座ってみて。その過去を考えてみて。その未来はどうなる？
    follow_ups:
      - その物語を読めなかったら、私たちは何を失うだろう？
      - 岩はどのように深遠な時間と繋がるか？
      - 岩と記憶の関係は？
  - id: nmr_cairn_stack
    name: 石積みの塚
    prompt: |
      石積みの塚—手で積まれた石。それぞれの石がバランスを取る。その積み重ねは意図的で、一時的。誰がそれを建てた？それは何を示す？
    follow_ups:
      - 塚がなかったら、その場所はどうなるだろう？
      - 積み重ねはどのように意味を生み出すか？
      - 人間と石の関係は？
  - id: nmr_shadow_cast
    name: 投じられた影
    prompt: |
      岩が影を落とす。影は太陽とともに動く。一時間、それとともに座ってみて。岩と光の時計を考えてみて。
    follow_ups:
      - 影がなかったら、岩はどうなるだろう？
      - 影はどのように生息地を作るか？
      - 岩と時間の関係は？
  - id: nmr_scree_slope
    name: 浮石斜面
    prompt: |
      浮石—崖の下の緩い岩。それぞれの破片が落ちた。その斜面は堆積物。歩いてみて。不安定さを感じて。何がそれを支えている？何が解放されるだろう？
    follow_ups:
      - 落下がなかったら、斜面はどうなるだろう？
      - 浮石はどのように谷を形作るか？
      - 崖と床の関係は？
  - id: nmr_fossil_imprint
    name: 化石の刻印
    prompt: |
      岩の中の化石—貝殻、葉、骨。その刻印は記録。その生物はいない。石は形を宿している。その保存を考えてみて。
    follow_ups:
      - 化石がなかったら、私たちは何を知るだろう？
      - 刻印はどのように時間を繋ぐか？
      - 生命と鉱物の関係は？
  - id: nmr_dry_stone_wall
    name: 石積み壁
    prompt: |
      石積み壁—モルタルなし。それぞれの石が噛み合いと摩擦で次の石を保持する。その壁は協力。継ぎ目をたどってみて。緩んだ一つの石はどうなる？
    follow_ups:
      - 壁がなかったら、境界はどうなるだろう？
      - 噛み合いはどのように強度を生むか？
      - 石と構造の関係は？
  - id: nmr_cobble_rest
    name: 玉石の休息
    prompt: |
      水が残した場所に玉石が休んでいる—川岸、浜辺。その配置は偶然ではない。大きさ、形、位置が流れを語る。洪水は何を再配置するだろう？
    follow_ups:
      - その休息は最後の出来事をどのように刻むか？
      - 石は水について何を示すだろう？
      - 休息と乱流の関係は？
  - id: nmr_moon_dust
    name: 月の塵
    prompt: |
      岩は塵になる—風、水、根。最も細かい粒子が旅をする。一つの粒の旅を考えてみて。どこにたどり着くだろう？
    follow_ups:
      - 塵がなかったら、風景はどうなるだろう？
      - 塵はどのように新しい土を作るか？
      - 岩と空気の関係は？
  - id: nmr_touch_stone
    name: 石に触れる
    prompt: |
      岩に触れてみて。冷たい、暖かい、粗い、滑らか。岩は反応しない—あるいは反応する？熱が伝わる。湿気が動く。境界でのその交換を考えてみて。
    follow_ups:
      - 違う時間だったら、岩はどう感じるだろう？
      - 触れることは岩をどう変える？
      - 手と石の関係は？
  - id: nmr_shadow_noon
    name: 正午の影
    prompt: |
      正午、岩の影は最小限。夜明けと夕暮れには伸びる。その影は岩の広がり。太陽が岩の世界への提供を変えることを考えてみて。
    follow_ups:
      - 影がなかったら、岩は何を提供するだろう？
      - 影はどのように生息地を作るか？
      - 岩と光の関係は？
  - id: nmr_stone_circle
    name: 石の円
    prompt: |
      円形に配置された石—人の手や氷河によって。その円は空間を枠取る。中に何がある？外に何がある？境界の幾何学を考えてみて。
    follow_ups:
      - 円がなかったら、その空間はどう意味を持つだろう？
      - 配置はどのように意味を生み出すか？
      - 形と儀式の関係は？
