# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природний мікрокосм — Території комах (Ukrainian)

id: natural_microcosm_insect_territories
name: Природний мікрокосм — Території комах
description: 50 карток, щоб змінити ваш погляд на життя комах — від мурашиних стежок і бджолиного трафіку до павутинь, територіальних драм і хореографії колоній.
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: Мурашина стежка
    prompt: |
      Мурахи утворюють стежки — феромонні шляхи між гніздом і їжею. Спостерігайте за потоком.
      Дві смуги: вихідна та зворотна. Стежка — це рішення, прийняте багатьма.
      Що могло б зруйнувати стежку?
    follow_ups:
      - Як стежка самопідсилюється?
      - Якою була б колонія без стежок?
      - Який зв'язок між стежкою та колонією?
  - id: nmi_bee_traffic
    name: Бджолиний трафік
    prompt: |
      Вхід у вулик — бджоли стікаються всередину та назовні. Рух має ритм. Деякі
      несуть пилок; деякі ні. Розгляньте хореографію. Хто визначає
      візерунок?
    follow_ups:
      - Яким був би вулик без руху?
      - Як вхід формує потік?
      - Який зв'язок між бджолою та колонією?
  - id: nmi_spider_web
    name: Павутина
    prompt: |
      Павутина — це територія і пастка. Павук чекає на краю.
      Вібрації несуть інформацію. Розгляньте архітектуру. Що ловить павутина?
      Що вона виключає?
    follow_ups:
      - Яким був би павук без павутини?
      - Як павутина розширює чуття павука?
      - Який зв'язок між шовком і виживанням?
  - id: nmi_dragonfly_claim
    name: Заявка бабки
    prompt: |
      Бабка патрулює ділянку ставка — туди й назад. Це територіально.
      Суперників ганяють. Принцес залицяються. Розгляньте ставку. Що захищається?
    follow_ups:
      - Що б робила бабка без території?
      - Як патрулювання комунікує володіння?
      - Який зв'язок між простором і розмноженням?
  - id: nmi_caterpillar_munch
    name: Жування гусениці
    prompt: |
      Гусінь їсть — край листа відступає. Їжа постійна.
      Гусінь — це машина для перетворення. Розгляньте темп. Якою була б рослина без травоїдних?
    follow_ups:
      - Як гусінь формує лист?
      - Якою була б метелик без їжі?
      - Який зв'язок між споживанням і ростом?
  - id: nmi_beetle_battle
    name: Битва жуків
    prompt: |
      Два жуки зустрічаються — можливо, жуки-олені, можливо, гнойовики. Вони борються.
      Битва — це ритуал. Розгляньте ставки. Що виграється? Що
      втрачається?
    follow_ups:
      - Що б робив переможений?
      - Як вирішується битва?
      - Який зв'язок між боєм і спарюванням?
  - id: nmi_firefly_flash
    name: Спалах світлячків
    prompt: |
      Світлячки спалахують — кожен вид має код. Візерунок — це залицяння. Розгляньте
      сигнал. Що означав би неправильний спалах? Як вони знаходять один одного в темряві?
    follow_ups:
      - Як спалах кодує вид?
      - Якою була б галявина без світлячків?
      - Який зв'язок між світлом і партнером?
  - id: nmi_aphid_farm
    name: Ферма попелиці
    prompt: |
      Мурахи доглядають за попелицями — вони їх гладять, вони їх захищають. Попелиці виділяють
      медвяну росу. Мурахи її збирають. Розгляньте партнерство. Хто виграє?
      Хто експлуатується?
    follow_ups:
      - Якою була б попелиця без мурах?
      - Як фермерство формує обидва види?
      - Який зв'язок між доглядом і вилученням?
  - id: nmi_cicada_shell
    name: Оболонка цикади
    prompt: |
      Оболонка цикади прилипає до кори — німфа вилізла. Оболонка порожня,
      ідеальна. Розгляньте линяння. Що комаха залишила позаду? Що
      вона отримала?
    follow_ups:
      - Якою була б цикада без линяння?
      - Як оболонка позначає перехід?
      - Який зв'язок між скиданням і ростом?
  - id: nmi_leaf_miner
    name: Мінер листя
    prompt: |
      Слід усередині листа — шлях мінера листя. Личинка їсть між
      шарами. Лист зберігає запис. Розгляньте тунель. Яким би виглядав лист зсередини?
    follow_ups:
      - Яким був би лист без мінера?
      - Як міна захищає личинку?
      - Який зв'язок між внутрішнім і зовнішнім?
  - id: nmi_wasp_nest
    name: Гніздо ос
    prompt: |
      Гніздо паперової оси — шестикутні комірки, подрібнена деревина. Гніздо — це архітектура
      і фортеця. Розгляньте колонію. Хто будує? Хто захищає? Хто розмножується?
    follow_ups:
      - Якими були б оси без гнізда?
      - Як гніздо формує соціальну структуру?
      - Який зв'язок між папером і колонією?
  - id: nmi_grasshopper_leap
    name: Стрибок коника
    prompt: |
      Коник стрибає — ноги розгинаються, його немає. Стрибок — це втеча або
      наближення. Розгляньте тригер. Що побачив коник? Що
      він почув?
    follow_ups:
      - Яким був би коник без стрибка?
      - Як стрибок уникає хижацтва?
      - Який зв'язок між ногою та польотом?
  - id: nmi_mantis_still
    name: Завмирання богомола
    prompt: |
      Богомол чекає — нерухомо. Це мисливець. Здобич наближається. Кидок
      раптовий. Розгляньте терпіння. Чим обходиться нерухомість? Що
      вона дозволяє?
    follow_ups:
      - Яким був би богомол без очікування?
      - Як нерухомість обманює?
      - Який зв'язок між терпінням і захопленням?
  - id: nmi_bumblebee_buzz
    name: Дзижчання джмеля
    prompt: |
      Джміль дзижчить — він вібрує. Деякі квіти потребують дзижчання для запилення.
      Бджола струшує пилок. Розгляньте партнерство. Якою була б квітка без дзижчання?
    follow_ups:
      - Як дзижчання вивільняє пилок?
      - Яким був би джміль без дзижчання для запилення?
      - Який зв'язок між вібрацією та заплідненням?
  - id: nmi_butterfly_territory
    name: Територія метелика
    prompt: |
      Метелик сідає на високу точку — пагорб. Він чекає на партнерів.
      Суперників ганяють. Розгляньте стратегію. Чому саме це місце? Чим воно цінне?
    follow_ups:
      - Що б робив метелик без пристановища?
      - Як пагорб формує спарювання?
      - Який зв'язок між місцем і зустріччю?
  - id: nmi_earwig_pincer
    name: Клішня вуховертки
    prompt: |
      У вуховерток є клішні — церки. Вони для захисту, для складання крил, для
      обробки здобичі. Розгляньте інструмент. Якою була б вуховертка без клішні?
    follow_ups:
      - Як клішня формує поведінку?
      - Як би виглядав захист без неї?
      - Який зв'язок між формою та функцією?
  - id: nmi_katydid_call
    name: Клич коника-цвіркуна
    prompt: |
      Коник-цвіркун кличе — стридуляція, ноги по крилах. Клич специфічний для виду.
      Це залицяння, територія. Розгляньте звук. Якою була б ніч без нього?
    follow_ups:
      - Як клич приваблює партнерів?
      - Чим ризикував би коник-цвіркун, кличучи?
      - Який зв'язок між звуком і хижацтвом?
  - id: nmi_ladybug_cluster
    name: Скупчення сонечок
    prompt: |
      Сонечка скупчуються взимку — десятки, сотні. Вони збираються для тепла,
      для притулку. Розгляньте зібрання. Що його викликає? Що його розсіює?
    follow_ups:
      - Якими були б сонечка без скупчення?
      - Як скупчення створює мікроклімат?
      - Який зв'язок між багатьма і виживанням?
  - id: nmi_ant_carry
    name: Мурашка несе
    prompt: |
      Мураха несе іншу — мертву чи поранену. Це допомога. Колонія піклується
      про своїх. Розгляньте поведінку. Що б робила поранена мураха сама?
      Що отримує той, хто несе?
    follow_ups:
      - Як перенесення служить колонії?
      - Якою була б колонія без співпраці?
      - Який зв'язок між індивідом і колективом?
  - id: nmi_mosquito_hover
    name: Зависання комара
    prompt: |
      Комар зависає — тестує, промацує. Він шукає господаря. Зависання — це
      оцінка. Розгляньте момент перед укусом. Що виявляє комар? Що вирішує?
    follow_ups:
      - Що б робив комар без зависання?
      - Як зависання мінімізує виявлення?
      - Який зв'язок між промацуванням і годуванням?
  - id: nmi_weevil_curl
    name: Згортання довгоносика
    prompt: |
      Лист згортається — це зробив довгоносик або галова муха. Лист згортається навколо
      личинки. Розгляньте маніпуляцію. Рослина переконується. Що б
      робив лист без комахи?
    follow_ups:
      - Як згортання захищає личинку?
      - Якою була б рослина без згортання?
      - Який зв'язок між комахою та формою рослини?
  - id: nmi_honeybee_waggle
    name: Трясіння медоносної бджоли
    prompt: |
      Медоносна бджола трясеться — це танець. Танець кодує відстань і напрямок
      до квітів. Інші бджоли спостерігають. Розгляньте повідомлення. Якою була б
      колонія без трясіння?
    follow_ups:
      - Як танець передає інформацію?
      - Як би виглядала годівля без нього?
      - Який зв'язок між танцем і відкриттям?
  - id: nmi_gnat_cloud
    name: Хмара мошок
    prompt: |
      Мошки рояться — хмара дрібних комах. Рій — це спарювання. Самці збираються;
      самки входять і вибирають. Розгляньте агрегацію. Що б
      робили мошки поодинці?
    follow_ups:
      - Як рій сприяє спарюванню?
      - Якими були б мошки без хмари?
      - Який зв'язок між багатьма і зустріччю?
  - id: nmi_spider_wrap
    name: Обгортання павука
    prompt: |
      Павук обгортає здобич — шовк навколо боротьоної комахи. Обгортання знерухомлює.
      Павук вводить фермент. Розгляньте процес. Що б робив павук без обгортання?
    follow_ups:
      - Як обгортання приборкує здобич?
      - Чим ризикував би павук без нього?
      - Який зв'язок між шовком і травленням?
  - id: nmi_ant_war
    name: Війна мурах
    prompt: |
      Дві мурашині колонії зустрічаються — конфлікт. Робочі борються, кусаються. Кордон
      оскаржується. Розгляньте битву. Що на кону? Як визначається кордон?
    follow_ups:
      - Якими були б колонії без війни?
      - Як вирішується війна?
      - Який зв'язок між територією та ресурсом?
  - id: nmi_moth_flutter
    name: Тріпотіння молі
    prompt: |
      Моль тріпоче біля світла — приваблена, спантеличена. Світло порушує
      навігацію. Розгляньте пастку. Що б робила моль у темряві?
      Чому світло дезорієнтує?
    follow_ups:
      - Якою була б моль без світла?
      - Як моль зазвичай використовує місячне світло?
      - Який зв'язок між світлом і напрямком?
  - id: nmi_stick_insect_still
    name: Нерухомість палички
    prompt: |
      Паличник нерухомий — виглядає як гілочка. Хижаки проходять.
      Розгляньте обман. Якою була б комаха без маскування?
      Як довго вона може зберігати позу?
    follow_ups:
      - Як нерухомість захищає?
      - Чим ризикувала б комаха, рухаючись?
      - Який зв'язок між формою та виживанням?
  - id: nmi_leafcutter_carry
    name: Перенесення листорізами
    prompt: |
      Мураха-листоріз несе шматочок листка — у багато разів більше за себе. Листок
      відноситься до гнізда. Він стає субстратом для грибка. Розгляньте
      врожай. Якою була б колонія без листя?
    follow_ups:
      - Як грибок використовує листок?
      - Що б їли мурахи без грибка?
      - Який зв'язок між врожаєм і вирощуванням?
  - id: nmi_housefly_clean
    name: Чистота мухи хатньої
    prompt: |
      Муха хатня чистить себе — тре лапки, гладить крила. Чищення видаляє
      частинки, підтримує сенсори. Розгляньте ритуал. Якою була б муха без чищення?
    follow_ups:
      - Як чищення підтримує функцію?
      - Що б сталося, якби муха не могла чистити?
      - Який зв'язок між чистотою та чуттям?
  - id: nmi_termite_mound
    name: Термітник
    prompt: |
      Термітник піднімається — глина, слина, подрібнена деревина. Це місто. Всередині
      тунелі, камери, грибні сади. Розгляньте архітектуру. Якою була б
      колонія без термітника?
    follow_ups:
      - Як термітник регулює клімат?
      - Що б робили терміти без структури?
      - Який зв'язок між термітником і колонією?
  - id: nmi_cricket_chirp
    name: Цвірінькання цвіркуна
    prompt: |
      Цвіркун цвірінькає — крила разом. Цвірінькання — це залицяння. Самки обирають
      за звуком. Розгляньте клич. Що б робив цвіркун без цвірінькання? Хто слухає, крім самок?
    follow_ups:
      - Як цвірінькання кодує придатність?
      - Якою була б галявина без звуку?
      - Який зв'язок між кличем і хижацтвом?
  - id: nmi_damselfly_tandem
    name: Тандем бабок
    prompt: |
      Бабки спарюються в тандемі — самець обхоплює самку позаду голови. Вона
      вигинається, щоб отримати сперму. Пара може летіти разом. Розгляньте
      зчеплення. Яким було б спарювання без обхвату?
    follow_ups:
      - Як тандем захищає інвестиції самця?
      - Що б робила пара без зв'язку?
      - Який зв'язок між обхватом і заплідненням?
  - id: nmi_roach_scatter
    name: Розбігання тарганів
    prompt: |
      Увімкніть світло — таргани розбігаються. Вони шукають щілини. Розбігання — це
      втеча. Розгляньте реакцію. Що б робив тарган при постійному
      світлі? Чому темрява?
    follow_ups:
      - Як розбігання зменшує хижацтво?
      - Яким був би тарган без рефлексу?
      - Який зв'язок між світлом і хованками?
  - id: nmi_hopper_nymph
    name: Німфа стрибуна
    prompt: |
      Молодий коник — німфа. Він ще не має крил. Він стрибає. Розгляньте
      стадію. Чим стане німфа? Чого їй не вистачає зараз?
    follow_ups:
      - Яким був би коник без стадії німфи?
      - Як німфа уникає хижаків?
      - Який зв'язок між линянням і крилами?
  - id: nmi_sweat_bee
    name: Бджола-пітничка
    prompt: |
      Бджола-пітничка сідає на вашу шкіру — шукає сіль. Піт — це ресурс.
      Розгляньте зустріч. Що б робила бджола без поту? Навіщо їй сіль?
    follow_ups:
      - Як бджола використовує сіль?
      - Чим ризикувала б бджола, сідаючи?
      - Який зв'язок між людиною та бджолою?
  - id: nmi_army_ant_column
    name: Колона мурах-солдатів
    prompt: |
      Мурахи-солдати марширують — колона тисяч. Вони течуть. Здобич перевантажена.
      Розгляньте рій. Якими були б мурахи без колони? Як вони координуються?
    follow_ups:
