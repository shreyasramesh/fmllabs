# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Природный Микрокосм — Скалы и Камни (Russian)

id: natural_microcosm_rocks_stones
name: Природный Микрокосм — Скалы и Камни
description: 50 карточек, чтобы изменить ваш взгляд на скалы и камни — от геологического времени и лишайника до выветривания, эрозии и медленно текущей жизни минералов.
domain: natural_microcosm
cards:
  - id: nmr_lichen_map
    name: Карта Лишайника
    prompt: |
      Лишайник растет на камне — медленно, терпеливо. Оранжевый, серый, зеленый. Это не один
      организм, а два: гриб и водоросль. Подумайте о партнерстве. Что камень предлагает?
      Что взамен дает лишайник?
    follow_ups:
      - Как бы выглядел камень без лишайника?
      - Как лишайник отмечает время?
      - Какова связь между лишайником и выветриванием?
  - id: nmr_pebble_smooth
    name: Гладкая Галька
    prompt: |
      Речная галька гладкая — вода и песок стерли ее. Возьмите ее в руку. Сколько
      лет это заняло? Гладкая поверхность — это запись путешествия. Что означал бы
      острый край?
    follow_ups:
      - Как гладкость раскрывает историю?
      - Какой была бы галька без воды?
      - Какова связь между формой и течением?
  - id: nmr_crack_frost
    name: Морозная Трещина
    prompt: |
      Вода замерзает в трещине, расширяется. Камень раскалывается. Это медленное насилие.
      Найдите камень с трещиной. Подумайте о циклах замерзания и оттаивания,
      которые ее создали.
    follow_ups:
      - Какой был бы камень без трещины?
      - Как мороз формирует ландшафт?
      - Какова связь между водой и разломом?
  - id: nmr_stone_warmth
    name: Тепло Камня
    prompt: |
      Прогретый солнцем камень сохраняет тепло. Посидите на нем вечером. Камень отдает то,
      что поглотил. Подумайте об обмене. Каким был бы камень без
      солнца?
    follow_ups:
      - Как камень создает микроклимат?
      - Какие существа используют это тепло?
      - Какова связь между камнем и теплом?
  - id: nmr_moss_crust
    name: Моховая Корка
    prompt: |
      Мох растет на камне — тонкая корка. Он удерживает влагу, задерживает пыль.
      Камень становится субстратом. Когда камень становится почвой? Где проходит грань?
    follow_ups:
      - Каким был бы камень без мха?
      - Как корка ускоряет изменения?
      - Какова связь между минералом и органикой?
  - id: nmr_vein_quartz
    name: Кварцевая Жила
    prompt: |
      Кварцевая жила прорезает камень — прожилка другого минерала. Она отмечает
      разлом, заполнение. Проследите линию. Какие силы ее создали? Что раскрывает
      жила?
    follow_ups:
      - Каким был бы камень без жилы?
      - Как жила отмечает глубокое время?
      - Какова связь между разломом и красотой?
  - id: nmr_puddle_reflect
    name: Лужа в Камне
    prompt: |
      Углубление в камне удерживает воду после дождя. Это крошечный пруд — чаша. Что
      отражается в нем? Что испаряется? Камень создал сосуд.
    follow_ups:
      - Каким был бы камень без углубления?
      - Как пруд создает среду обитания?
      - Какова связь между впадиной и временем?
  - id: nmr_sand_grain
    name: Зерно Песка
    prompt: |
      Песок — это разбитая на мелкие части скала. Возьмите горсть. Каждое зерно когда-то было частью
      чего-то большего. Подумайте о масштабе. Сколько зерен в горе?
    follow_ups:
      - Какой была бы пляж без зерен?
      - Как размер зерна рассказывает историю?
      - Какова связь между целым и фрагментом?
  - id: nmr_stone_circle
    name: Каменный Круг
    prompt: |
      Камни, расположенные вручную или ледником — круг, курган, стена. Кто-то
      или что-то их разместило. Подумайте о намерении. Что означает
      расположение?
    follow_ups:
      - Каким было бы пространство без камней?
      - Как расположение создает смысл?
      - Какова связь между камнем и ритуалом?
  - id: nmr_erosion_edge
    name: Край Эрозии
    prompt: |
      Ветер и вода вырезают камень. Найдите край — утес, валун. Форма
      — результат удаления. Что было там раньше? Что останется?
    follow_ups:
      - Каким был бы ландшафт без эрозии?
      - Как край отмечает время?
      - Какова связь между потерей и формой?
  - id: nmr_color_streak
    name: Цветная Полоса
    prompt: |
      Камень не однороден — железо окрашивает в красный, марганец в черный, медь в зеленый.
      Проследите полосу. Цвет — это химия. Что она раскрывает об
      истории камня?
    follow_ups:
      - Каким был бы камень без цвета?
      - Как минералогия формирует палитру?
      - Какова связь между элементом и оттенком?
  - id: nmr_scratch_glacier
    name: Ледниковая Царапина
    prompt: |
      Ледниковые шрамы — царапины на коренной породе — отмечают место, где лед тащил камни
      по камню. Линии параллельны. Подумайте о силе. Что двигалось?
      Что оставалось неподвижным?
    follow_ups:
      - Что бы показал камень без царапин?
      - Как царапина отмечает направление?
      - Какова связь между льдом и камнем?
  - id: nmr_cobble_pattern
    name: Узор из Валунов
    prompt: |
      Пляж или дно реки из валунов — похожего размера, разной формы. Вода
      сортировала их. Подумайте о рисунке. Что говорит вам сортировка?
    follow_ups:
      - Каким был бы пляж без сортировки?
      - Как течение формирует рисунок?
      - Какова связь между размером и транспортировкой?
  - id: nmr_cavern_drip
    name: Капельная Пещера
    prompt: |
      Сталактиты образуются капля за каплей — минеральные отложения из просачивающейся воды.
      Рост незаметен. Подумайте о временном масштабе. Что показал бы ускоренный
      фильм?
    follow_ups:
      - Какой была бы пещера без капели?
      - Как капель записывает климат?
      - Какова связь между водой и камнем?
  - id: nmr_boulder_shadow
    name: Тень Валуна
    prompt: |
      Большой валун отбрасывает тень. Земля под ним другая — прохладнее, влажнее, меньше солнца.
      Валун создает микроклимат. Кто живет в тени?
    follow_ups:
      - Каким был бы склон без валуна?
      - Как тень формирует жизнь?
      - Какова связь между камнем и укрытием?
  - id: nmr_fossil_impression
    name: Отпечаток Ископаемого
    prompt: |
      Ископаемое — это жизнь, превратившаяся в камень, или отпечаток, оставленный в осадке.
      Найдите его, если можете. Камень хранит память. Какое существо оставило это?
      Когда?
    follow_ups:
      - Каким был бы камень без ископаемого?
      - Как отпечаток сохраняет?
      - Какова связь между жизнью и минералом?
  - id: nmr_grit_texture
    name: Зернистая Текстура
    prompt: |
      Проведите рукой по камню. Песчаник ощущается иначе, чем гранит, сланец
      — иначе, чем базальт. Текстура — это минерал, зерно, структура. Что говорит вам осязание?
    follow_ups:
      - Каким был бы камень без текстуры?
      - Как текстура раскрывает происхождение?
      - Какова связь между ощущением и составом?
  - id: nmr_talus_slope
    name: Каменистый Осып
    prompt: |
      Осыпь — обломки камня у подножия утеса. Гравитация и погода уносят их вниз.
      Склон — это куча последствий. Сколько времени потребовалось
      для накопления?
    follow_ups:
      - Каким было бы подножие утеса без осыпи?
      - Как склон отмечает эрозию?
      - Какова связь между падением и кучей?
  - id: nmr_soil_horizon
    name: Горизонт Почвы
    prompt: |
      Копайте осторожно. Почва имеет слои — органический сверху, минеральный ниже, иногда
      отчетливые полосы. Горизонт — это история. Что создало каждый слой?
    follow_ups:
      - Каким была бы земля без горизонтов?
      - Как горизонт записывает время?
      - Какова связь между камнем и почвой?
  - id: nmr_drystone_wall
    name: Сухая Каменная Стена
    prompt: |
      Сухая каменная стена — камни уложены без раствора. Стена держится за счет гравитации
      и подгонки. Подумайте об искусстве. Как каждый камень поддерживает следующий?
    follow_ups:
      - Каким было бы поле без стены?
      - Как стена отмечает территорию?
      - Какова связь между камнем и границей?
  - id: nmr_tide_pool_rock
    name: Камень в Приливной Луже
    prompt: |
      Камни в приливной луже намокают, высыхают, снова намокают. Существа цепляются.
      Камень — это среда обитания. Подумайте о ритме прилива. Что переживает камень?
    follow_ups:
      - Каким была бы лужа без камня?
      - Как камень создает поверхность?
      - Какова связь между камнем и приливом?
  - id: nmr_crystal_face
    name: Грани Кристалла
    prompt: |
      Некоторые камни имеют грани кристаллов — плоскости раскола, геометрическая форма.
      Кристалл рос в полости, медленно. Подумайте о геометрии. Какие
      силы ее сформировали?
    follow_ups:
      - Каким был бы камень без кристалла?
      - Как грань раскрывает структуру?
      - Какова связь между порядком и минералом?
  - id: nmr_dust_coating
    name: Пылевое Покрытие
    prompt: |
      Камень собирает пыль — пыльцу, сажу, минералы. Со временем он темнеет.
      Покрытие — это накопление. Как бы выглядел камень, если бы его помыли? Как
      покрытие его меняет?
    follow_ups:
      - Каким был бы камень без покрытия?
      - Как пыль отмечает окружающую среду?
      - Какова связь между поверхностью и накоплением?
  - id: nmr_river_sculpt
    name: Речная Скульптура
    prompt: |
      Река вырезает свое русло — котловины, заводи, перекаты. Камень формируется
      водой и осадком. Найдите участок. Прочитайте скульптуру. Что раскрывает форма?
    follow_ups:
      - Каким было бы русло реки без скульптуры?
      - Как течение формирует камень?
      - Какова связь между водой и формой?
  - id: nmr_shard_edge
    name: Осколок с Острым Краем
    prompt: |
      Осколок кремня, кусок чарта — острый, обработанный или естественный. Его могли использовать.
      Край функционален. Подумайте о разломе. Как он был сделан?
    follow_ups:
      - Каким был бы осколок без края?
      - Как разлом создает полезность?
      - Какова связь между изломом и инструментом?
  - id: nmr_gravel_path
    name: Гравийная Дорожка
    prompt: |
      Гравийная дорожка — дробленый камень под ногами. Хруст, податливость. Дорожка —
      это человеческий выбор. Почему такая поверхность? Что делает гравий, чего не сделает почва?
    follow_ups:
      - Каким был бы путь без гравия?
      - Как дорожка формирует движение?
      - Какова связь между камнем и ходьбой?
  - id: nmr_bedrock_exposure
    name: Выход Коренной Породы
    prompt: |
      Там, где почва была снята — эрозия, строительство — появляется коренная порода.
      Фундамент виден. Подумайте о том, что обычно скрыто. Что раскрывает
      выход?
    follow_ups:
      - Каким был бы ландшафт без выхода?
      - Как коренная порода формирует поверхность?
      - Какова связь между скрытым и явным?
  - id: nmr_wind_polish
    name: Полировка Ветром
    prompt: |
      Пустынные камни отполированы ветром — гладкие, граненые. Песок обдувает поверхность.
      Полировка — абразив. Подумайте о ветре. Сколько времени это заняло?
    follow_ups:
      - Каким был бы камень без полировки?
      - Как ветер формирует камень?
      - Какова связь между частицей и поверхностью?
  - id: nmr_hot_cold_crack
    name: Трещина от Жара-Холода
    prompt: |
      Камень расширяется при нагревании, сжимается при охлаждении. Повторяющиеся циклы вызывают напряжение,
      микротрещины. Найдите трещину. Подумайте о перепадах температур, которые
      ее создали.
    follow_ups:
      - Каким был бы камень без трещины?
      - Как температурные циклы формируют ландшафт?
      - Какова связь между температурой и разломом?
  - id: nmr_constellation_stone
    name: Камень-Созвездие
    prompt: |
      Камень с вкраплениями — слюда, полевой шпат — которые отражают свет. Поверхность
      мерцает. Подумайте о минералогии. Что вызвало блеск?
    follow_ups:
      - Каким был бы камень без вкраплений?
      - Как свет раскрывает структуру?
      - Какова связь между минералом и отражением?
  - id: nmr_stepping_stone
    name: Шаговый Камень
    prompt: |
      Камни, уложенные в ручей или грязь — шаговые камни. Расположение
      намеренное. Подумайте о пути. Что требует каждый шаг? Что камень
      обеспечивает?
    follow_ups:
      - Каким было бы пересечение без камней?
      - Как камень создает доступ?
      - Какова связь между камнем и переходом?
  - id: nmr_moss_island
    name: Остров Мха
    prompt: |
      Камень в ручье — сверху растет мох. Камень — это остров. Вода течет
      вокруг. Подумайте об изоляции. Что достигает мха? Что нет?
    follow_ups:
      - Каким был бы ручей без острова?
      - Как камень создает укрытие?
      - Какова связь между камнем и течением?
  - id: nmr_weight_sunken
    name: Утопленный Вес
    prompt: |
      Тяжелый камень со временем погружается в почву. Вокруг него образуется вмятина.
      Подумайте о гравитации. Что погружение делает с землей? С камнем?
    follow_ups:
      - Какой была бы земля без камня?
      - Как вес формирует поверхность?
      - Какова связь между массой и вмятиной?
  - id: nmr_layer_sediment
    name: Слой Осадка
    prompt: |
      Осадочная порода показывает слои — плоскости напластования. Каждый слой когда-то был грязью,
      песком, ракушками. Камень — это сжатое время. Подумайте об одном слое.
      Чем он был раньше?
    follow_ups:
      - Каким был бы камень без слоев?
      - Как слой записывает среду?
      - Какова связь между осадком и камнем?
  - id: nmr_sunrise_heat
    name: Солнечный Рассветный Тепло
    prompt: |
      Плоский камень обращен на восток. На рассвете он нагревается первым. Подумайте о
      ориентации. Что определяет угол к солнцу? Кто выигрывает от
      раннего тепла?
    follow_ups:
      - Каким был бы камень без ориентации?
      - Как аспект формирует температуру?
      - Какова связь между углом и теплом?
  - id: nmr_rain_rinse
    name: Промывка Дождем
    prompt: |
      Дождь ударяет по камню, стекает. Вода уносит то, что растворяет, то, что взвешивает.
      Промывка непрерывна. Что теряет камень? Что получает вода?
    follow_ups:
      - Каким был бы камень без дождя?
      - Как сток формирует камень?
      - Какова связь между водой и растворением?
  - id: nmr_ice_wedge
    name: Ледяной Клин
    prompt: |
      Вода замерзает в трещине, расширяет ее. Ледяное клинья разрушает камни.
      Найдите доказательства, если сможете. Подумайте о силе. Чем станет трещина?
    follow_ups:
      - Каким был бы камень без льда?
      - Как клин распространяется?
      - Какова связь между замерзанием и разломом?
  - id: nmr_resting_place
    name: Место Отдыха
    prompt: |
      Плоский камень — сиденье, стол, сцена. Мы используем камни для отдыха, работы, обозначения.
      Подумайте о камне, на котором вы могли бы сидеть. Что он поддерживал? Что
      будет держать?
    follow_ups:
      - Каким было бы пространство без камня?
      - Как камень приглашает к использованию?
      - Какова связь между минералом и человеком?
  - id: nmr_boundary_marker
    name: Пограничный Знак
    prompt: |
      Камни обозначают границы — земельные участки, могилы, тропы. Расположение
      намеренное. Подумайте о пограничном камне. Что он разделяет? Что
      соединяет?
    follow_ups:
      - Каким была бы граница без камня?
      - Как камень кодирует смысл?
      - Какова связь между маркером и территорией?
  - id: nmr_exfoliation_sheet
    name: Пластинка Отшелушивания
    prompt: |
      Некоторые камни отшелушиваются — слои отслаиваются, как луковица. Сброс давления, температурные
      циклы. Найдите отшелушивающийся валун. Подумайте о кривизне. Какие
      силы ее создали?
    follow_ups:
      - Каким был бы камень без пластинок?
      - Как отшелушивание формирует поверхность?
      - Какова связь между давлением и отслаиванием?
  - id: nmr_compass_orientation
    name: Ориентация по Компасу
    prompt: |
      Камни могут быть выровнены — ледником, рекой, рукой человека. Ориентация
      рассказывает историю. Найдите выровненные камни. Куда они указывают? Чему они
      сопротивляются?
    follow_ups:
      - Что бы означало выравнивание?
      - Как ориентация записывает силу?
      - Какова связь между направлением и камнем?
  - id: nmr_echo_sound
    name: Эхо Камень
    prompt: |
      Каменная стена отражает звук. Хлопните. Прислушайтесь к эху. Камень возвращает
      то, что вы послали. Подумайте о поверхности. Что она отражает? Что
      поглощает?
    follow_ups:
      - Каким было бы пространство без эха?
      - Как поверхность формирует звук?
      - Какова связь между камнем и голосом?
  - id: nmr_anchor_hold
    name: Якорный Захват
    prompt: |
      Камень служит якорем — корень дерева обвивает его, трос крепится к нему. Камень держит.
      Подумайте о захвате. Чему камень сопротивляется? Что он позволяет?
    follow_ups:
      - Каким был бы якорь без камня?
      - Как камень создает стабильность?
      - Какова связь между удержанием и массой?
  - id: nmr_patina_age
    name: Патина Времени
    prompt: |
      Старый камень развивает патину — корку выветривания, окисление, потемнение.
      Поверхность меняется. Патина — это видимое время. Как выглядел бы камень
      в молодости?
    follow_ups:
      - Каким был бы камень без патины?
      - Как патина защищает или ослабляет?
      - Какова связь между поверхностью и возрастом?
  - id: nmr_slow_narrative
    name: Медленное Повествование
    prompt: |
      Камень рассказывает медленную историю — образование, транспортировка, выветривание. Временная шкала
      геологическая. Посидите с камнем. Подумайте о его прошлом. Каким будет его будущее?
    follow_ups:
      - Что бы мы потеряли, если бы не могли прочитать историю?
      - Как камень связан с глубоким временем?
      - Какова связь между камнем и памятью?
  - id: nmr_cairn_stack
    name: Стопка Каирнов
    prompt: |
      Каирн — камни, сложенные вручную. Каждый камень сбалансирован. Стопка
      намеренная, временная. Кто ее построил? Что она отмечает?
    follow_ups:
      - Каким было бы место без каирна?
      - Как стопка создает смысл?
      - Какова связь между человеком и камнем?
  - id: nmr_shadow_cast
    name: Отброшенная Тень
    prompt: |
      Камень отбрасывает тень. Тень движется вместе с солнцем. Посидите с ней час.
      Подумайте о часах из камня и света.
    follow_ups:
      - Каким был бы камень без тени?
      - Как тень создает среду обитания?
      - Какова связь между камнем и временем?
  - id: nmr_scree_slope
    name: Осыпной Склон
    prompt: |
      Осыпь — рыхлый камень у подножия утеса. Каждый кусок упал. Склон —
      это накопление. Пройдитесь по нему. Почувствуйте нестабильность. Что его держит?
      Что отпустит?
    follow_ups:
      - Каким был бы склон без падения?
      - Как осыпь формирует долину?
      - Какова связь между утесом и дном?
  - id: nmr_fossil_imprint
    name: Отпечаток Ископаемого
    prompt: |
      Ископаемое в камне — ракушка, лист, кость. Отпечаток — это запись.
      Организм исчез; камень хранит его форму. Подумайте о сохранении.
    follow_ups:
      - Что бы мы знали без ископаемого?
      - Как отпечаток связывает время?
      - Какова связь между жизнью и минералом?
  - id: nmr_dry_stone_wall
    name: Сухая Каменная Стена
    prompt: |
      Сухая каменная стена — без раствора. Каждый камень удерживает следующий благодаря подгонке и
      трению. Стена — это сотрудничество. Проследите соединения. Что сделает
      один потерянный камень?
    follow_ups:
      - Каким был бы рубеж без стены?
      - Как подгонка создает прочность?
      - Какова связь между камнем и структурой?
  - id: nmr_cobble_rest
    name: Отдых Гальки
    prompt: |
      Галька лежит там, где ее оставила вода — речная коса, пляж. Расположение
      не случайно. Размер, форма, положение говорят о течении. Что бы перестроило наводнение?
    follow_ups:
      - Как отдых отмечает последнее событие?
      - Что бы камни рассказали о воде?
      - Какова связь между отдыхом и турбулентностью?
  - id: nmr_moon_dust
    name: Лунная Пыль
    prompt: |
      Камень превращается в пыль — ветер, вода, корни. Мельчайшие частицы путешествуют.
      Подумайте о путешествии одного зерна. Где оно может оказаться?
    follow_ups:
      - Каким был бы ландшафт без пыли?
      - Как пыль создает новую почву?
      - Какова связь между камнем и воздухом?
  - id: nmr_touch_stone
    name: Прикосновение к Камню
    prompt: |
      Прикоснитесь к камню. Холодный, теплый, шершавый, гладкий. Камень не отвечает — или
      отвечает? Тепло передается. Влага меняется. Подумайте об обмене на границе.
    follow_ups:
      - Каким камень ощущался бы в другое время?
      - Как прикосновение меняет камень?
      - Какова связь между рукой и камнем?
  - id: nmr_shadow_noon
    name: Тень в Полдень
    prompt: |
      В полдень тень от камня минимальна. На рассвете и закате она растягивается.
      Тень — это досягаемость камня. Подумайте, как солнце меняет то, что камень предлагает миру.
    follow_ups:
      - Что бы камень предлагал без тени?
      - Как тень создает среду обитания?
      - Какова связь между камнем и светом?
  - id: nmr_stone_circle
    name: Каменный Круг
    prompt: |
      Камни, расположенные в круге — рукой человека или ледником. Круг
      обрамляет пространство. Что внутри? Что снаружи? Подумайте о геометрии
      границы.
    follow_ups:
      - Что бы означало пространство без круга?
      - Как расположение создает смысл?
      - Какова связь между формой и ритуалом?
