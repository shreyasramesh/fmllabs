# प्राकृतिक सूक्ष्म जगत — कीट क्षेत्र (Hindi)

id: natural_microcosm_insect_territories
name: प्राकृतिक सूक्ष्म जगत — कीट क्षेत्र
description: 50 कार्ड जो कीट जीवन के प्रति आपके दृष्टिकोण को बदल देंगे — चींटियों की पगडंडियों और मधुमक्खियों के यातायात से लेकर मकड़ी के जालों, क्षेत्रीय नाटकों और कॉलोनियों के नृत्य तक।
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: चींटी की पगडंडी
    prompt: |
      चींटियाँ पगडंडी बनाती हैं—घोंसले और भोजन के बीच फेरोमोन के रास्ते। प्रवाह देखें।
      दो लेन: बाहर जाने वाली और लौटने वाली। पगडंडी कई लोगों द्वारा लिया गया एक निर्णय है।
      पगडंडी को क्या तोड़ देगा?
    follow_ups:
      - पगडंडी खुद को कैसे मजबूत करती है?
      - पगडंडियों के बिना कॉलोनी क्या होगी?
      - पगडंडी और कॉलोनी के बीच क्या संबंध है?
  - id: nmi_bee_traffic
    name: मधुमक्खी यातायात
    prompt: |
      एक छत्ते का प्रवेश द्वार—मधुमक्खियाँ अंदर और बाहर बहती हैं। यातायात में लय है। कुछ
      पराग ले जाती हैं; कुछ नहीं। नृत्य पर विचार करें। पैटर्न कौन तय करता है?
    follow_ups:
      - यातायात के बिना छत्ता क्या होगा?
      - प्रवेश द्वार प्रवाह को कैसे आकार देता है?
      - मधुमक्खी और कॉलोनी के बीच क्या संबंध है?
  - id: nmi_spider_web
    name: मकड़ी का जाला
    prompt: |
      एक मकड़ी का जाला एक क्षेत्र और जाल है। मकड़ी किनारे पर इंतजार करती है।
      कंपन सूचना ले जाते हैं। वास्तुकला पर विचार करें। जाला क्या पकड़ता है? यह क्या बाहर रखता है?
    follow_ups:
      - जाले के बिना मकड़ी क्या होगी?
      - जाला मकड़ी की इंद्रियों को कैसे बढ़ाता है?
      - रेशम और अस्तित्व के बीच क्या संबंध है?
  - id: nmi_dragonfly_claim
    name: ड्रैगनफ्लाई का दावा
    prompt: |
      एक ड्रैगनफ्लाई तालाब के एक हिस्से में गश्त करती है—आगे-पीछे। यह क्षेत्रीय है।
      प्रतिद्वंद्वियों को खदेड़ा जाता है। साथियों को मनाया जाता है। दांव पर विचार करें। क्या बचाया जा रहा है?
    follow_ups:
      - क्षेत्र के बिना ड्रैगनफ्लाई क्या करेगी?
      - गश्त स्वामित्व का संचार कैसे करती है?
      - अंतरिक्ष और प्रजनन के बीच क्या संबंध है?
  - id: nmi_caterpillar_munch
    name: कैटरपिलर का चबाना
    prompt: |
      एक कैटरपिलर खाता है—पत्ती का किनारा कम हो जाता है। खाना निरंतर होता है।
      कैटरपिलर एक रूपांतरण मशीन है। दर पर विचार करें। शाकाहारियों के बिना पौधा क्या होगा?
    follow_ups:
      - कैटरपिलर पत्ती को कैसे आकार देता है?
      - खाने के बिना तितली क्या होगी?
      - उपभोग और विकास के बीच क्या संबंध है?
  - id: nmi_beetle_battle
    name: बीटल लड़ाई
    prompt: |
      दो बीटल मिलते हैं—शायद स्टैग बीटल, शायद डंग बीटल। वे जूझते हैं।
      लड़ाई एक अनुष्ठान है। दांव पर विचार करें। क्या जीता जा रहा है? क्या खोया जा रहा है?
    follow_ups:
      - हारने वाला क्या करेगा?
      - लड़ाई कैसे हल होती है?
      - मुकाबले और प्रजनन के बीच क्या संबंध है?
  - id: nmi_firefly_flash
    name: जुगनू की चमक
    prompt: |
      जुगनू चमकते हैं—प्रत्येक प्रजाति का अपना कोड होता है। पैटर्न प्रेमालाप है। संकेत पर विचार करें।
      गलत चमक का क्या मतलब होगा? वे अंधेरे में एक-दूसरे को कैसे ढूंढते हैं?
    follow_ups:
      - चमक प्रजाति को कैसे एन्कोड करती है?
      - जुगनुओं के बिना घास का मैदान क्या होगा?
      - प्रकाश और साथी के बीच क्या संबंध है?
  - id: nmi_aphid_farm
    name: एफिड फार्म
    prompt: |
      चींटियाँ एफिड्स का पालन-पोषण करती हैं—उन्हें सहलाती हैं, उनकी रक्षा करती हैं। एफिड्स मीठा रस निकालते हैं।
      चींटियाँ उसे बटोरती हैं। साझेदारी पर विचार करें। किसे फायदा होता है? किसका शोषण होता है?
    follow_ups:
      - चींटियों के बिना एफिड्स क्या होंगे?
      - खेती दोनों प्रजातियों को कैसे आकार देती है?
      - पालन-पोषण और निष्कर्षण के बीच क्या संबंध है?
  - id: nmi_cicada_shell
    name: सिकाडा का खोल
    prompt: |
      एक सिकाडा का खोल छाल से चिपका रहता है—निम्फ निकल गया। खोल खाली है,
      उत्तम। निर्मोचन पर विचार करें। कीड़े ने क्या पीछे छोड़ा? उसे क्या हासिल हुआ?
    follow_ups:
      - निर्मोचन के बिना सिकाडा क्या होगा?
      - खोल संक्रमण को कैसे चिह्नित करता है?
      - झड़ने और विकास के बीच क्या संबंध है?
  - id: nmi_leaf_miner
    name: पत्ती माइनर
    prompt: |
      एक पत्ती के अंदर एक रास्ता—एक पत्ती माइनर का मार्ग। लार्वा परतों के बीच खाता है।
      पत्ती रिकॉर्ड रखती है। सुरंग पर विचार करें। पत्ती अंदर से कैसी दिखेगी?
    follow_ups:
      - माइनर के बिना पत्ती क्या होगी?
      - खदान लार्वा की रक्षा कैसे करती है?
      - अंदर और बाहर के बीच क्या संबंध है?
  - id: nmi_wasp_nest
    name: ततैया का घोंसला
    prompt: |
      एक कागज ततैया का घोंसला—षट्कोणीय कोशिकाएँ, चबाया हुआ लकड़ी। घोंसला वास्तुकला है
      और किला। कॉलोनी पर विचार करें। कौन बनाता है? कौन रक्षा करता है? कौन प्रजनन करता है?
    follow_ups:
      - घोंसले के बिना ततैया क्या होंगे?
      - घोंसला सामाजिक संरचना को कैसे आकार देता है?
      - कागज और कॉलोनी के बीच क्या संबंध है?
  - id: nmi_grasshopper_leap
    name: टिड्डे की छलांग
    prompt: |
      एक टिड्डा छलांग लगाता है—पैर फैलते हैं, वह चला जाता है। छलांग पलायन या
      दृष्टिकोण है। ट्रिगर पर विचार करें। टिड्डे ने क्या देखा? उसने क्या सुना?
    follow_ups:
      - छलांग के बिना टिड्डा क्या होगा?
      - छलांग शिकार से कैसे बचाती है?
      - पैर और उड़ान के बीच क्या संबंध है?
  - id: nmi_mantis_still
    name: मैंटिस की स्थिरता
    prompt: |
      एक मैंटिस इंतजार करता है—स्थिर। वह शिकारी है। शिकार आता है। प्रहार
      अचानक होता है। धैर्य पर विचार करें। स्थिरता की क्या कीमत है? यह क्या सक्षम बनाती है?
    follow_ups:
      - प्रतीक्षा के बिना मैंटिस क्या होगी?
      - स्थिरता कैसे धोखा देती है?
      - धैर्य और पकड़ के बीच क्या संबंध है?
  - id: nmi_bumblebee_buzz
    name: भंवरे की भिनभिनाहट
    prompt: |
      एक भंवरा भिनभिनाता है—वह कंपन करता है। कुछ फूल भिनभिनाहट परागण की आवश्यकता होती है।
      मधुमक्खी पराग को ढीला कर देती है। साझेदारी पर विचार करें। भिनभिनाहट के बिना फूल क्या होगा?
    follow_ups:
      - भिनभिनाहट पराग को कैसे छोड़ती है?
      - भिनभिनाहट परागण के बिना मधुमक्खी क्या होगी?
      - कंपन और निषेचन के बीच क्या संबंध है?
  - id: nmi_butterfly_territory
    name: तितली क्षेत्र
    prompt: |
      एक तितली ऊंचे स्थान पर बैठती है—हिलटॉपिंग। वह साथियों का इंतजार करती है।
      प्रतिद्वंद्वियों को खदेड़ा जाता है। रणनीति पर विचार करें। यह स्थान क्यों? यह मूल्यवान क्या बनाता है?
    follow_ups:
      - परच के बिना तितली क्या करेगी?
      - हिलटॉपिंग प्रेमालाप को कैसे आकार देता है?
      - स्थान और मुठभेड़ के बीच क्या संबंध है?
  - id: nmi_earwig_pincer
    name: ईयरविग चिमटी
    prompt: |
      ईयरविग के पास चिमटी होती है—सर्सी। वे रक्षा के लिए, पंखों को मोड़ने के लिए, शिकार को संभालने के लिए होती हैं।
      उपकरण पर विचार करें। चिमटी के बिना ईयरविग क्या होगी?
    follow_ups:
      - चिमटी व्यवहार को कैसे आकार देती है?
      - उसके बिना रक्षा कैसी दिखेगी?
      - रूप और कार्य के बीच क्या संबंध है?
  - id: nmi_katydid_call
    name: कैटिडिड की पुकार
    prompt: |
      एक कैटिडिड पुकारता है—स्ट्रिड्यूलेशन, पंखों पर पैर। पुकार प्रजाति-विशिष्ट है।
      यह प्रेमालाप है, क्षेत्र है। ध्वनि पर विचार करें। इसके बिना रात क्या होगी?
    follow_ups:
      - पुकार साथियों को कैसे आकर्षित करती है?
      - पुकारने के जोखिम पर कैटिडिड क्या जोखिम उठाएगा?
      - ध्वनि और शिकार के बीच क्या संबंध है?
  - id: nmi_ladybug_cluster
    name: लेडीबग क्लस्टर
    prompt: |
      लेडीबग सर्दियों में गुच्छे बनाती हैं—दर्जनों, सैकड़ों। वे गर्मी,
      आश्रय के लिए एकत्रित होते हैं। सभा पर विचार करें। क्या इसे ट्रिगर करता है? क्या इसे फैलाता है?
    follow_ups:
      - क्लस्टर के बिना लेडीबग क्या होंगे?
      - क्लस्टर सूक्ष्म-जलवायु कैसे बनाता है?
      - कई और अस्तित्व के बीच क्या संबंध है?
  - id: nmi_ant_carry
    name: चींटी का वहन
    prompt: |
      एक चींटी दूसरी को ले जाती है—मृत या घायल। यह सहायता है। कॉलोनी अपनी देखभाल करती है।
      व्यवहार पर विचार करें। अकेले घायल चींटी क्या करेगी?
      ढोने वाले को क्या मिलता है?
    follow_ups:
      - वहन कॉलोनी की सेवा कैसे करता है?
      - सहयोग के बिना कॉलोनी क्या होगी?
      - व्यक्ति और सामूहिक के बीच क्या संबंध है?
  - id: nmi_mosquito_hover
    name: मच्छर का मंडराना
    prompt: |
      एक मच्छर मंडराता है—परीक्षण, जांच। वह मेजबान की तलाश कर रहा है। मंडराना
      मूल्यांकन है। काटने से ठीक पहले के क्षण पर विचार करें। मच्छर क्या पता लगाता है? क्या तय करता है?
    follow_ups:
      - मंडराने के बिना मच्छर क्या करेगा?
      - मंडराना पहचान को कैसे कम करता है?
      - जांच और खिलाने के बीच क्या संबंध है?
  - id: nmi_weevil_curl
    name: वीविल कर्ल
    prompt: |
      एक पत्ती मुड़ जाती है—एक वीविल या गॉल मिज ने इसे बनाया। पत्ती लार्वा के चारों ओर मुड़ जाती है।
      हेरफेर पर विचार करें। पौधे को राजी किया जाता है। कीड़े के बिना पत्ती क्या होगी?
    follow_ups:
      - कर्ल लार्वा की रक्षा कैसे करता है?
      - कर्ल के बिना पौधा क्या होगा?
      - कीड़े और पौधे के रूप के बीच क्या संबंध है?
  - id: nmi_honeybee_waggle
    name: मधुमक्खी की वैगल
    prompt: |
      एक मधुमक्खी वैगल करती है—यह एक नृत्य है। नृत्य फूलों की दूरी और दिशा को कूटबद्ध करता है।
      अन्य मधुमक्खियाँ देखती हैं। संदेश पर विचार करें। वैगल के बिना कॉलोनी क्या होगी?
    follow_ups:
      - नृत्य सूचना कैसे स्थानांतरित करता है?
      - इसके बिना चराई कैसी दिखेगी?
      - नृत्य और खोज के बीच क्या संबंध है?
  - id: nmi_gnat_cloud
    name: एटकी का बादल
    prompt: |
      एटकी के झुंड—नन्हे कीड़ों का एक बादल। झुंड प्रेमालाप है। नर इकट्ठा होते हैं;
      मादाएँ प्रवेश करती हैं और चुनती हैं। एकत्रीकरण पर विचार करें। अकेले एटकी क्या करेगी?
    follow_ups:
      - झुंड प्रेमालाप को कैसे सक्षम बनाता है?
      - बादल के बिना एटकी क्या होंगे?
      - कई और मुठभेड़ के बीच क्या संबंध है?
  - id: nmi_spider_wrap
    name: मकड़ी का रैप
    prompt: |
      एक मकड़ी शिकार को लपेटती है—रेशम छटपटाते कीड़े के चारों ओर। लपेट निष्क्रिय कर देता है।
      मकड़ी एंजाइम इंजेक्ट करती है। प्रक्रिया पर विचार करें। लपेट के बिना मकड़ी क्या करेगी?
