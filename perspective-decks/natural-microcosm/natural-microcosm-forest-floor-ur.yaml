# قدرتی ننّھے مناظر — جنگل کا فرش (Urdu)

id: natural_microcosm_forest_floor
name: قدرتی ننّھے مناظر — جنگل کا فرش
description: 50 ایسے کارڈز جو جنگل کے فرش کو دیکھنے کے انداز کو بدل دیں — سڑنے گلنے اور فنگس سے لے کر پتوں کی تعمیر اور چھتری کے نیچے زندگی تک۔
domain: natural_microcosm
cards:
  - id: nmf_leaf_vein
    name: پتی کی رگ
    prompt: |
      ایک گری ہوئی پتی اٹھائیں۔ رگوں کو ٹریس کریں۔ وہ پانی، غذائیت، شکر لے جاتی تھیں۔ جب پتی زندہ تھی تو رگوں کا جال کیا برقرار رکھتا تھا؟
    follow_ups:
      - مختلف اقسام کے درمیان رگوں کا نمونہ کیسے مختلف ہوتا ہے؟
      - رگوں کے بغیر پتی کیسی ہوگی؟
      - رگ اور کنارے کے درمیان کیا تعلق ہے؟
  - id: nmf_leaf_litter_layer
    name: پتوں کی تہہ
    prompt: |
      جنگل کا فرش تہہ در تہہ ہوتا ہے — اوپر تازہ پتے، نیچے پچھلے سال کے، اور اس سے بھی پرانے اس کے نیچے۔ گھٹنوں کے بل بیٹھیں۔ ایک تہہ کو پلٹیں۔ ڈھلوان کیسی ہے؟ وقت کیسے اسٹاک ہوتا ہے؟
    follow_ups:
      - پتوں کی تہہ کے بغیر جنگل کیسا ہوگا؟
      - یہ تہہ رہائش گاہ کیسے بناتی ہے؟
      - تہہ اور سڑنے گلنے کے درمیان کیا تعلق ہے؟
  - id: nmf_mushroom_fruiting
    name: فنگس پھل دار
    prompt: |
      فنگس صرف پھل دار جسم ہے۔ حیاتیہ — فنگس — زیر زمین، مٹی کے ذریعے، لکڑی کے ذریعے پھیلتا ہے۔ جو آپ دیکھتے ہیں اسے ایک اشارے کے طور پر سمجھیں۔ باقی کہانی کیا ہے؟
    follow_ups:
      - فنگس کے بغیر جنگل کیسا ہوگا؟
      - پھل دار جسم نیٹ ورک سے کیسے متعلق ہے؟
      - فنگس اور سڑنے گلنے کے درمیان کیا تعلق ہے؟
  - id: nmf_log_sponge
    name: لکڑی کا اسفنج
    prompt: |
      گری ہوئی لکڑی پانی جذب کرتی ہے، اسے روکے رکھتی ہے۔ بارش کے بعد اسے ہاتھ سے دبائیں۔ لکڑی ایک ذخیرہ ہے۔ اس میں سے کون پیتا ہے؟ اس میں کیا رہتا ہے؟
    follow_ups:
      - نرس لاگز کے بغیر جنگل کیسا ہوگا؟
      - لکڑی مائیکرو کلائمیٹ کیسے بناتی ہے؟
      - لکڑی اور پانی کے درمیان کیا تعلق ہے؟
  - id: nmf_moss_cushion
    name: کائی کا گدّا
    prompt: |
      کائی اسفنج کی طرح پانی کو روکے رکھتی ہے۔ اسے چھویں۔ گدّا ایک تعمیر ہے۔ چھوٹے پودے ایک ساتھ پیک ہوتے ہیں۔ ان کے درمیان کی جگہوں میں کیا رہتا ہے؟
    follow_ups:
      - کائی کے بغیر فرش کیسا ہوگا؟
      - گدّا نمی کیسے پیدا کرتا ہے؟
      - کائی اور ننھے پودے کے درمیان کیا تعلق ہے؟
  - id: nmf_fern_unfurl
    name: پھن کے پتے کا کھلنا
    prompt: |
      پھن کے پتے ایک چکر میں کھلتے ہیں — فڈل ہیڈز۔ حرکت سست ہوتی ہے۔ اگر ممکن ہو تو اسے دنوں میں دیکھیں۔ کھلنے کا انداز پتے کو کیسے بناتا ہے؟
    follow_ups:
      - چکر کے بغیر پھن کا پتہ کیسا ہوگا؟
      - کھلنے سے پتے کا تحفظ کیسے ہوتا ہے؟
      - گھماؤ اور نشوونما کے درمیان کیا تعلق ہے؟
  - id: nmf_root_tangle
    name: جڑوں کا الجھن
    prompt: |
      جڑیں سطح کے نیچے الجھی ہوئی ہوتی ہیں۔ ایک درخت کو گرا ہوا ڈھونڈیں اور اس کی جڑوں کو اٹھا لیں۔ الجھن تلاش کا نقشہ ہے۔ جڑیں کس چیز کی تلاش میں تھیں؟
    follow_ups:
      - الجھن کے بغیر درخت کیسا ہوگا؟
      - جڑیں زیر زمین جگہ کیسے بانٹتی ہیں؟
      - جڑ اور فنگس کے درمیان کیا تعلق ہے؟
  - id: nmf_slug_trail
    name: سلگ کا راستہ
    prompt: |
      سلگ کا راستہ پتے پر چمکتا ہے — لعاب، راستہ، دستخط۔ راستہ بتاتا ہے کہ سلگ کہاں گیا۔ راستہ شکاریوں کو کیا بتاتا ہے؟ شکار کو؟
    follow_ups:
      - راستے کے بغیر سلگ کیا کھوئے گا؟
      - لعاب حرکت کو کیسے قابل بناتا ہے؟
      - راستے اور علاقے کے درمیان کیا تعلق ہے؟
  - id: nmf_lichen_patch
    name: لائکن کا پیچ
    prompt: |
      لائکن چھال، پتھر، مٹی پر اگتا ہے — سست، مرکب۔ فنگس اور طحالب ایک ساتھ۔ ایک پیچ تلاش کریں۔ یہ کتنی دیر سے وہاں ہے؟ اس کی موجودگی کیا ظاہر کرتی ہے؟
    follow_ups:
      - لائکن کے بغیر چھال کیسی ہوگی؟
      - لائکن وقت کا نشان کیسے بناتا ہے؟
      - لائکن اور ہوا کے معیار کے درمیان کیا تعلق ہے؟
  - id: nmf_saprophyte
    name: مردہ چیزوں سے غذا لینے والا
    prompt: |
      مردہ چیزوں سے غذا لینے والے مردہ مادے پر پلتے ہیں — فنگس، بیکٹیریا، کیڑے مکوڑے۔ وہ ری سائیکلر ہیں۔ سڑنے گلنے کا ثبوت تلاش کریں۔ کون کھا رہا ہے؟ کیا تبدیل ہو رہا ہے؟
    follow_ups:
      - گلنے والے اجزاء کے بغیر جنگل کیسا ہوگا؟
      - سڑنے گلنے سے نئی نشوونما کیسے ہوتی ہے؟
      - موت اور مٹی کے درمیان کیا تعلق ہے؟
  - id: nmf_seedling_emergence
    name: ننھے پودے کا نمودار ہونا
    prompt: |
      ایک ننھا پودا پتوں سے باہر نکلتا ہے۔ پہلے بیج پتے، پھر اصلی پتے۔ طاقت پر غور کریں۔ باہر نکلنے کے لیے کیا لگا؟ کیا روکے گا؟
    follow_ups:
      - ننھے پودوں کے بغیر جنگل کیسا ہوگا؟
      - نمودار ہونا پتوں پر کیسے منحصر ہے؟
      - ننھے پودے اور روشنی کے درمیان کیا تعلق ہے؟
  - id: nmf_anthill_mound
    name: چیونٹی کے گھر کا ٹیلہ
    prompt: |
      چیونٹی کا ٹیلہ جنگل کے فرش سے ابھرتا ہے — کھودی ہوئی مٹی، منظم۔ ٹریفک دیکھیں۔ وہ کہاں جاتے ہیں؟ وہ کیا اٹھاتے ہیں؟
    follow_ups:
      - ٹیلے کے بغیر فرش کیسا ہوگا؟
      - ٹیلہ نکاسی آب کو کیسے بناتا ہے؟
      - ٹیلے اور کالونی کے درمیان کیا تعلق ہے؟
  - id: nmf_spider_silk
    name: مکڑی کا جال
    prompt: |
      مکڑی کا جال خلا کو ڈھانپتا ہے — پتوں، ٹہنیوں کے درمیان۔ اوس اسے پکڑ لیتی ہے۔ جال تب تک نظر نہیں آتا جب تک روشنی اس پر نہ پڑے۔ ایک ڈوری کو ٹریس کریں۔ یہ کیا جوڑتا ہے؟
    follow_ups:
      - جال کے بغیر خلا کیسا ہوگا؟
      - جال جگہ کو کیسے منظم کرتا ہے؟
      - جال اور شکار کے درمیان کیا تعلق ہے؟
  - id: nmf_bark_flake
    name: چھال کا ٹکڑا
    prompt: |
      تنے سے چھال کا ٹکڑا گرتا ہے — ساخت، نمونہ، عمر۔ ہر ٹکڑا ایک موسم کی کہانی سناتا ہے۔ چھال کے نیچے کون رہتا ہے؟ ٹکڑا کیا ظاہر کرتا ہے؟
    follow_ups:
      - چھال کے بغیر درخت کیسا ہوگا؟
      - چھال تحفظ اور انسولیشن کیسے کرتی ہے؟
      - ٹکڑے اور تجدید کے درمیان کیا تعلق ہے؟
  - id: nmf_acorn_fall
    name: بلوط کا پھل گرنا
    prompt: |
      بلوط کا ایک پھل گرتا ہے۔ یہ اپنے سائز کے لحاظ سے بھاری ہوتا ہے۔ یہ جڑ پکڑے گا یا کھایا جائے گا۔ امکانات پر غور کریں۔ کون سا راستہ طے کرتا ہے؟
    follow_ups:
      - بلوط کے پھل کے بغیر جنگل کیسا ہوگا؟
      - گرنا بیج کو کیسے تقسیم کرتا ہے؟
      - بلوط کے پھل اور بلوط کے درخت کے درمیان کیا تعلق ہے؟
  - id: nmf_fallen_branch
    name: گری ہوئی شاخ
    prompt: |
      ایک شاخ فرش پر پڑی ہے — ٹوٹی ہوئی، شاید ہوا سے۔ اب یہ ایک پل ہے۔ کون اس پر سے گزرتا ہے؟ اس پر کیا اگتا ہے؟
    follow_ups:
      - گری ہوئی لکڑی کے بغیر فرش کیسا ہوگا؟
      - شاخ کنارے کی رہائش گاہ کیسے بناتی ہے؟
      - شاخ اور غذائیت کے درمیان کیا تعلق ہے؟
  - id: nmf_humus_smell
    name: ہموس کی خوشبو
    prompt: |
      جنگل کے فرش کے قریب جھکیں۔ خوشبو — مٹی، سڑنا، زندگی۔ وہ خوشبو کیمیا ہے۔ اسے کیا پیدا کرتا ہے؟ اس کے بغیر جنگل کیسا ہوگا؟
    follow_ups:
      - خوشبو صحت کا نشان کیسے بناتی ہے؟
      - بے ذائقہ مٹی کی بو کیسی ہوگی؟
      - خوشبو اور زرخیزی کے درمیان کیا تعلق ہے؟
  - id: nmf_snail_shell
    name: گھونگھے کا خول
    prompt: |
      پتوں میں ایک خالی گھونگھے کا خول پڑا ہے۔ چکر، کیلشیم، پیچھے رہ گیا۔ گھونگھے کو کس نے کھایا ہوگا؟ خول کا کون استعمال کرے گا؟
    follow_ups:
      - خول کے بغیر فرش کیسا ہوگا؟
      - خول غذائی اجزاء کو کیسے ری سائیکل کرتا ہے؟
      - خول اور کیلشیم کے درمیان کیا تعلق ہے؟
  - id: nmf_fungal_network
    name: فنگس کا نیٹ ورک
    prompt: |
      فنگس درختوں کو جوڑتا ہے — ایک وڈ وائڈ ویب۔ آپ اسے دیکھ نہیں سکتے، لیکن یہ وہاں ہے۔ غذائی اجزاء بہتے ہیں۔ معلومات بہتی ہے۔ جنگل کو ایک نیٹ ورک کے طور پر سمجھیں۔
    follow_ups:
      - نیٹ ورک کے بغیر جنگل کیسا ہوگا؟
      - نیٹ ورک وسائل کو کیسے دوبارہ تقسیم کرتا ہے؟
      - فنگس اور درخت کے درمیان کیا تعلق ہے؟
  - id: nmf_fern_spore
    name: پھن کا بیج
    prompt: |
      پھن بیج سے تولید کرتے ہیں — چھوٹے، بے شمار۔ پتے کے نیچے والے حصے کو دیکھیں۔ سورائی ان کو رکھتے ہیں۔ ایک بیج کے سفر کو ٹریس کرنے میں کیا لگے گا؟
    follow_ups:
      - بیج کے بغیر پھن کا پتہ کیسا ہوگا؟
      - بیج کیسے پھیلتا ہے؟
      - بیج اور گیمٹوفائٹ کے درمیان کیا تعلق ہے؟
  - id: nmf_earthworm_cast
    name: کینچوے کی کھاد
    prompt: |
      سرنگوں کے داخلی راستوں پر کینچوے کی کھاد کے ڈھیر لگے ہیں — پراسیس شدہ مٹی، بھرپور۔ کینچوے نے کھایا اور خارج کیا۔ کھاد سطح کے لیے ایک تحفہ ہے۔
    follow_ups:
      - کیڑے مکوڑوں کے بغیر مٹی کیسی ہوگی؟
      - کھاد ساخت کو کیسے بہتر بناتی ہے؟
      - کیچوے اور ہوا کے درمیان کیا تعلق ہے؟
  - id: nmf_dappled_light
    name: دھبوں والی روشنی
    prompt: |
      روشنی چھتری سے دھبوں میں گرتی ہے — دھبوں والی، حرکت کرتی ہوئی۔ کھلا علاقہ کی نسبت جنگل کا فرش کم روشنی وصول کرتا ہے۔ یہ کیا بڑھتا ہے اسے کیسے بناتا ہے؟
    follow_ups:
      - تیز دھوپ میں فرش کیسا ہوگا؟
      - دھبوں والی روشنی مائیکرو ہیبیٹیٹس کیسے بناتی ہے؟
      - روشنی اور ننھے پودے کے درمیان کیا تعلق ہے؟
  - id: nmf_bracket_fungus
    name: بریکٹ فنگس
    prompt: |
      ایک بریکٹ فنگس تنے سے اگتا ہے — شیلف، پولیپور۔ یہ درخت کو اندر سے ہضم کر رہا ہے۔ ایسا ہونے میں درخت برسوں تک کھڑا رہ سکتا ہے۔ سست کھپت پر غور کریں۔
    follow_ups:
      - فنگس کے بغیر درخت کیسا ہوگا؟
      - بریکٹ بیج کیسے پھیلاتا ہے؟
      - پرجیوی اور میزبان کے درمیان کیا تعلق ہے؟
  - id: nmf_needle_mat
    name: سوئیوں کا قالین
    prompt: |
      کونفیر کی سوئیاں درخت کے نیچے جمع ہوتی ہیں — کھٹی، سست سڑنے والی۔ قالین مٹی کو بدل دیتا ہے۔ اس میں کیا اگتا ہے؟ کیا اس سے بچتا ہے؟
    follow_ups:
      - قالین کے بغیر فرش کیسا ہوگا؟
      - سوئیوں کا قالین پی ایچ کو کیسے متاثر کرتا ہے؟
      - قالین اور آگ کے درمیان کیا تعلق ہے؟
  - id: nmf_salamander_under
    name: سلامینڈر کے نیچے
    prompt: |
      سلامینڈر لکڑی، پتھر، پتوں کے نیچے رہتے ہیں۔ احتیاط سے کچھ اٹھائیں — اسے واپس رکھ دیں۔ نمی، اندھیرا۔ سلامینڈر کو اس کی ضرورت کیوں ہے؟
    follow_ups:
      - سلامینڈر کے بغیر جنگل کیسا ہوگا؟
      - سلامینڈر غیر فقاریہ برادری کو کیسے بناتا ہے؟
      - نمی اور ایمفیبیئن کے درمیان کیا تعلق ہے؟
  - id: nmf_rot_hole
    name: سڑن کا سوراخ
    prompt: |
      لکڑی میں ایک سوراخ — سڑن، شاید، یا جانور۔ سوراخ ایک گہا ہے۔ کون وہاں بسیرا کرتا ہے؟ کون وہاں چھپتا ہے؟ سوراخ زیر زمین پھیلتا ہے۔
    follow_ups:
      - سوراخ کے بغیر لکڑی کیسی ہوگی؟
      - گہا رہائش گاہ کیسے بناتی ہے؟
