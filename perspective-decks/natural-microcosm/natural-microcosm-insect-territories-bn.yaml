# প্রাকৃতিক ক্ষুদ্র বিশ্ব — পতঙ্গ রাজ্য (Bengali)

id: natural_microcosm_insect_territories
name: প্রাকৃতিক ক্ষুদ্র বিশ্ব — পতঙ্গ রাজ্য
description: পতঙ্গের জীবনকে ভিন্ন চোখে দেখার জন্য ৫০টি কার্ড—পিঁপড়ের রেখা ও মৌমাছির চলাচল থেকে শুরু করে মাকড়সার জাল, আঞ্চলিক বিবাদ এবং কলোনির নৃত্যকলা পর্যন্ত।
domain: natural_microcosm
cards:
  - id: nmi_ant_trail
    name: পিঁপড়ের রেখা
    prompt: |
      পিঁপড়েরা রেখা তৈরি করে—বাসা এবং খাবারের মধ্যে ফেরোমোন পথের মাধ্যমে। এই প্রবাহটি দেখুন।
      দুটি লেন: বের হওয়া এবং ফিরে আসা। এই রেখাটি বহু মানুষের সিদ্ধান্ত।
      কী এই রেখাটি ভেঙে দিতে পারে?
    follow_ups:
      - রেখাটি কীভাবে নিজেকে শক্তিশালী করে?
      - রেখা ছাড়া কলোনি কেমন হবে?
      - রেখা এবং কলোনির মধ্যে সম্পর্ক কী?
  - id: nmi_bee_traffic
    name: মৌমাছির চলাচল
    prompt: |
      একটি মৌচাকের প্রবেশদ্বার—মৌমাছিরা ভিতরে এবং বাইরে স্রোতের মতো যায়। এই চলাচল একটি ছন্দ আছে। কিছু
      মৌমাছি পরাগ বহন করে; কিছু করে না। এই নৃত্যকলা বিবেচনা করুন। কে এই
      প্যাটার্নটি নির্ধারণ করে?
    follow_ups:
      - চলাচল ছাড়া মৌচাক কেমন হবে?
      - প্রবেশদ্বার কীভাবে প্রবাহকে আকার দেয়?
      - মৌমাছি এবং কলোনির মধ্যে সম্পর্ক কী?
  - id: nmi_spider_web
    name: মাকড়সার জাল
    prompt: |
      মাকড়সার জাল একটি অঞ্চল এবং একটি ফাঁদ। মাকড়সা প্রান্তে অপেক্ষা করে।
      কম্পন তথ্য বহন করে। এই স্থাপত্য বিবেচনা করুন। জাল কী ধরে? কী এটি বাদ দেয়?
    follow_ups:
      - জাল ছাড়া মাকড়সা কেমন হবে?
      - জাল কীভাবে মাকড়সার সংবেদন বাড়ায়?
      - রেশম এবং বেঁচে থাকার মধ্যে সম্পর্ক কী?
  - id: nmi_dragonfly_claim
    name: ফড়িংয়ের দাবি
    prompt: |
      একটি ফড়িং একটি পুকুরের অংশ টহল দেয়—এদিক-ওদিক। এটি আঞ্চলিক।
      প্রতিদ্বন্দ্বীদের তাড়িয়ে দেয়। সঙ্গীদের কামনা করে। এই অংশীদারিত্ব বিবেচনা করুন। কী রক্ষা করা হচ্ছে?
    follow_ups:
      - অঞ্চল ছাড়া ফড়িং কী করবে?
      - টহল কীভাবে মালিকানা যোগাযোগ করে?
      - স্থান এবং প্রজননের মধ্যে সম্পর্ক কী?
  - id: nmi_caterpillar_munch
    name: শুঁয়োপোকার খাওয়া
    prompt: |
      একটি শুঁয়োপোকা খায়—পাতার কিনারা সরে যায়। খাওয়া অবিরাম।
      শুঁয়োপোকা একটি রূপান্তর যন্ত্র। এই হার বিবেচনা করুন। তৃণভোজী ছাড়া গাছ কেমন হবে?
    follow_ups:
      - শুঁয়োপোকা কীভাবে পাতাকে আকার দেয়?
      - খাওয়া ছাড়া প্রজাপতি কেমন হবে?
      - ভোগ এবং বৃদ্ধির মধ্যে সম্পর্ক কী?
  - id: nmi_beetle_battle
    name: গুবরে পোকার লড়াই
    prompt: |
      দুটি গুবরে পোকা দেখা করে—হয়তো স্ট্যাগ গুবরে, হয়তো গোবর গুবরে। তারা লড়াই করে।
      এই লড়াই একটি রীতি। এই অংশীদারিত্ব বিবেচনা করুন। কী জেতা হচ্ছে? কী
      হারা হচ্ছে?
    follow_ups:
      - পরাজিত গুবরে কী করবে?
      - লড়াই কীভাবে শেষ হয়?
      - যুদ্ধ এবং মিলনের মধ্যে সম্পর্ক কী?
  - id: nmi_firefly_flash
    name: জোনাকির আলো
    prompt: |
      জোনাকিরা জ্বলে—প্রতিটি প্রজাতির নিজস্ব কোড আছে। এই প্যাটার্নটি হল সঙ্গীর সন্ধান। এই সংকেত বিবেচনা করুন।
      ভুল আলো কী অর্থ বহন করবে? তারা অন্ধকারে একে অপরকে কীভাবে খুঁজে পায়?
    follow_ups:
      - আলো কীভাবে প্রজাতিকে এনকোড করে?
      - জোনাকি ছাড়া তৃণভূমি কেমন হবে?
      - আলো এবং সঙ্গীর মধ্যে সম্পর্ক কী?
  - id: nmi_aphid_farm
    name: এফিড খামার
    prompt: |
      পিঁপড়েরা এফিডদের পালন করে—তাদের আদর করে, রক্ষা করে। এফিডরা হানিডিউ বের করে।
      পিঁপড়েরা তা সংগ্রহ করে। এই অংশীদারিত্ব বিবেচনা করুন। কে লাভবান হয়?
      কাকে শোষণ করা হয়?
    follow_ups:
      - এফিড ছাড়া এফিড কেমন হবে?
      - চাষাবাদ উভয় প্রজাতিকে কীভাবে আকার দেয়?
      - যত্ন নেওয়া এবং আহরণ করার মধ্যে সম্পর্ক কী?
  - id: nmi_cicada_shell
    name: ফড়িংয়ের খোলস
    prompt: |
      একটি ফড়িংয়ের খোলস গাছের ডালে লেগে থাকে—নিম্ফ বেরিয়ে এসেছে। খোলসটি খালি,
      নিখুঁত। এই খোলস বদল বিবেচনা করুন। পতঙ্গ কী পেছনে ফেলেছে? কী এটি লাভ করেছে?
    follow_ups:
      - খোলস বদল ছাড়া ফড়িং কেমন হবে?
      - খোলস কীভাবে পরিবর্তনকে চিহ্নিত করে?
      - ফেলে দেওয়া এবং বৃদ্ধির মধ্যে সম্পর্ক কী?
  - id: nmi_leaf_miner
    name: পাতার খনিজ
    prompt: |
      পাতার ভিতরে একটি রেখা—একটি পাতার খনিজীর পথ। লার্ভা স্তরগুলির মধ্যে খায়।
      পাতা এই রেকর্ড ধরে রাখে। এই সুড়ঙ্গ বিবেচনা করুন। ভেতর থেকে পাতাটি কেমন দেখাবে?
    follow_ups:
      - খনিজ ছাড়া পাতা কেমন হবে?
      - খনন কীভাবে লার্ভাকে রক্ষা করে?
      - ভিতরে এবং বাইরের মধ্যে সম্পর্ক কী?
  - id: nmi_wasp_nest
    name: বোলতার বাসা
    prompt: |
      একটি কাগজের বোলতার বাসা—ষড়ভুজাকার প্রকোষ্ঠ, চিবানো কাঠ। বাসাটি স্থাপত্য
      এবং দুর্গ। এই কলোনি বিবেচনা করুন। কে নির্মাণ করে? কে রক্ষা করে? কে প্রজনন করে?
    follow_ups:
      - বাসা ছাড়া বোলতা কেমন হবে?
      - বাসা সামাজিক কাঠামোকে কীভাবে আকার দেয়?
      - কাগজ এবং কলোনির মধ্যে সম্পর্ক কী?
  - id: nmi_grasshopper_leap
    name: ফড়িংয়ের লাফ
    prompt: |
      একটি ফড়িং লাফ দেয়—পা প্রসারিত হয়, এটি অদৃশ্য হয়ে যায়। লাফটি হয় পলায়ন বা
      আক্রমণ। এই ট্রিগার বিবেচনা করুন। ফড়িং কী দেখেছিল? কী এটি শুনেছিল?
    follow_ups:
      - লাফ ছাড়া ফড়িং কেমন হবে?
      - লাফ কীভাবে শিকার হওয়া এড়িয়ে চলে?
      - পা এবং উড়ার মধ্যে সম্পর্ক কী?
  - id: nmi_mantis_still
    name: ম্যান্টিসের স্থিরতা
    prompt: |
      একটি ম্যান্টিস অপেক্ষা করে—স্থির। এটি একজন শিকারী। শিকার কাছে আসে। আক্রমণটি
      হঠাৎ হয়। এই ধৈর্য বিবেচনা করুন। এই স্থিরতার জন্য কী হারাতে হয়? কী এটি সম্ভব করে তোলে?
    follow_ups:
      - অপেক্ষা ছাড়া ম্যান্টিস কেমন হবে?
      - স্থিরতা কীভাবে প্রতারণা করে?
      - ধৈর্য এবং ধরার মধ্যে সম্পর্ক কী?
  - id: nmi_bumblebee_buzz
    name: মৌমাছির গুঞ্জন
    prompt: |
      একটি মৌমাছি গুঞ্জন করে—এটি কম্পিত হয়। কিছু ফুল গুঞ্জন পরাগের উপর নির্ভর করে।
      মৌমাছি পরাগ ঝাঁকিয়ে ছেড়ে দেয়। এই অংশীদারিত্ব বিবেচনা করুন। গুঞ্জন ছাড়া ফুল কেমন হবে?
    follow_ups:
      - গুঞ্জন কীভাবে পরাগ মুক্ত করে?
      - গুঞ্জন পরাগ ছাড়া মৌমাছি কেমন হবে?
      - কম্পন এবং নিষিক্তকরণের মধ্যে সম্পর্ক কী?
  - id: nmi_butterfly_territory
    name: প্রজাপতির অঞ্চল
    prompt: |
      একটি প্রজাপতি উঁচু স্থানে বসে—পাহাড়ের চূড়ায়। এটি সঙ্গীর জন্য অপেক্ষা করে।
      প্রতিদ্বন্দ্বীদের তাড়িয়ে দেয়। এই কৌশল বিবেচনা করুন। কেন এই স্থান? কেন এটি মূল্যবান?
    follow_ups:
      - বসার স্থান ছাড়া প্রজাপতি কী করবে?
      - পাহাড়ের চূড়া কীভাবে মিলনকে আকার দেয়?
      - স্থান এবং সাক্ষাতের মধ্যে সম্পর্ক কী?
  - id: nmi_earwig_pincer
    name: কানের পোকার চিমটি
    prompt: |
      কানের পোকার চিমটি থাকে—সার্সি। এগুলো প্রতিরক্ষা, ডানা ভাঁজ করা এবং শিকার ধরার জন্য। এই সরঞ্জাম বিবেচনা করুন।
      চিমটি ছাড়া কানের পোকা কেমন হবে?
    follow_ups:
      - চিমটি আচরণকে কীভাবে আকার দেয়?
      - এটি ছাড়া প্রতিরক্ষা কেমন দেখাবে?
      - আকার এবং কার্যকারিতার মধ্যে সম্পর্ক কী?
  - id: nmi_katydid_call
    name: কাট্টিডিডের ডাক
    prompt: |
      একটি কাট্টিডিড ডাকে—ডানাগুলিতে পা ঘষে। ডাকটি প্রজাতি-নির্দিষ্ট।
      এটি সঙ্গীর খোঁজ, অঞ্চল। এই শব্দ বিবেচনা করুন। এটি ছাড়া রাত কেমন হবে?
    follow_ups:
      - ডাক কীভাবে সঙ্গীদের আকর্ষণ করে?
      - ডাকার সময় কাট্টিডিড কী ঝুঁকি নেবে?
      - শব্দ এবং শিকারের মধ্যে সম্পর্ক কী?
  - id: nmi_ladybug_cluster
    name: লেডিবাগ গুচ্ছ
    prompt: |
      লেডিবাগ শীতকালে গুচ্ছবদ্ধ হয়—দশ, শত শত। তারা উষ্ণতা এবং আশ্রয়ের জন্য একত্রিত হয়। এই জমায়েত বিবেচনা করুন। কী এটি শুরু করে? কী এটি ছড়িয়ে দেয়?
    follow_ups:
      - গুচ্ছ ছাড়া লেডিবাগ কেমন হবে?
      - গুচ্ছ কীভাবে মাইক্রোক্লাইমেট তৈরি করে?
      - অনেক এবং বেঁচে থাকার মধ্যে সম্পর্ক কী?
  - id: nmi_ant_carry
