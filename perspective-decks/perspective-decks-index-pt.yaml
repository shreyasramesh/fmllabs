# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Portuguese)

domains:
  art:
    name: Arte
    description: |
      Cartas para mudar sua perspectiva ao visualizar arte. Cada uma oferece uma
      lente diferente — de luz e sombra a introduções e emoção — para aprofundar como você
      vê e se envolve com obras de arte.
  urban_jungle:
    name: Selva Urbana
    description: |
      Em vez de apenas caminhar pela cidade, você a vê como um organismo vivo.
      As cartas focam nas cicatrizes de edifícios antigos, na coreografia do tráfego
      e nas vidas secretas dos becos.
  culinary_lab:
    name: Laboratório Culinário
    description: |
      Mudando do saboroso ao transformador. Explore a química de uma mordida,
      a história de um ingrediente e a trilha sonora de um restaurante.
  natural_microcosm:
    name: Microcosmo Natural
    description: |
      Perfeito para um parque ou quintal. Esta lente foca na engenharia invisível
      de uma folha, na vida em câmera lenta de uma rocha ou nos dramas
      territoriais de insetos.
  human_interface:
    name: A Interface Humana
    description: |
      Os espaços cotidianos onde os humanos se encontram — cafeterias, centros de transporte,
      locais de trabalho, varejo, parques públicos. As cartas focam na coreografia de filas,
      reivindicações territoriais, roteiros invisíveis e a antropologia do espaço compartilhado.
  california_superbloom:
    name: Superflorescimento da Califórnia
    description: |
      A explosão efêmera de flores silvestres após a chuva de inverno. As cartas focam em cor,
      escala, polinizadores, geologia, clima e o espetáculo fugaz da floração.
