# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# कला को देखने के तरीके (Hindi)

id: ways_of_looking_at_art
name: कला
description: |
  कला को देखते समय आपके दृष्टिकोण को बदलने के लिए कार्ड। प्रत्येक कलाकृतियों
  को गहराई से देखने और उनसे जुड़ने के लिए एक अलग लेंस प्रदान करता है।
domain: art
cards:
  - id: souvenir
    name: स्मृति चिन्ह
    prompt: |
      कलाकृति में से कुछ चुनें और उसे अगली जिस कलाकृति को आप देख रहे हैं, उसमें
      छिपा दें। आप इसे नई संरचना में कैसे फिट करेंगे?
    follow_ups:
      - आप क्या ले जाना चुनेंगे?
      - नए संदर्भ में इसे क्या मिलेगा या खो जाएगा?
      - यह नई कृति में कहाँ फिट होगा—या फिट होने का विरोध करेगा?
  - id: throw_a_party
    name: पार्टी आयोजित करें
    prompt: |
      कमरे में मौजूद सभी कलाकारों को आमंत्रित करें। वे क्या पहने होंगे?
      वे क्या सोच रहे होंगे?
    follow_ups:
      - कौन किसकी ओर आकर्षित होगा?
      - वे किस बारे में बहस करेंगे?
      - एक-दूसरे की कलाकृतियों में उन्हें क्या आश्चर्यजनक लगेगा?
  - id: time_out
    name: समय निकालें
    prompt: |
      बाहर निकलें। प्रकाश, ध्वनियों और संवेदनाओं पर ध्यान केंद्रित करें।
      अपने परिवेश के साथ उपस्थित रहें। कलाकृति को देखने का अनुभव कलाकृतियों
      के बीच के स्थानों के बारे में उतना ही है जितना कि कलाकृतियों के बारे में।
    follow_ups:
      - जब आप कला पर ध्यान केंद्रित करना बंद कर देते हैं तो आप क्या नोटिस करते हैं?
      - कमरा आपको जो दिखता है उसे कैसे आकार देता है?
      - यदि आप जल्दबाजी में निकलते तो क्या छूट जाता?
  - id: plan_a_trip
    name: यात्रा की योजना बनाएं
    prompt: |
      आज आप जो देखते हैं वह एक बहुत बड़ी यात्रा का पहला कदम हो सकता है।
      जब आप गैलरी या स्थान छोड़ते हैं, तो तय करें कि आप अगली कौन सी कलाकृति
      देखना चाहते हैं और उसके आसपास पूरी यात्रा की योजना बनाएं।
    follow_ups:
      - वह यात्रा आपको कहाँ ले जाएगी?
      - रास्ते में आपको क्या देखने की आवश्यकता होगी?
      - यह काम क्यों—यह यात्रा के लायक क्या बनाता है?
  - id: in_black_and_white
    name: श्वेत श्याम
    prompt: |
      प्रकाश और अंधकार के खेल पर ध्यान केंद्रित करें—आप मदद के लिए एक श्वेत श्याम
      तस्वीर भी ले सकते हैं। टोन सबसे गहरे कहाँ हैं? यह गहराई का सुझाव कैसे
      देता है या नहीं? यह संरचना की आपकी समझ में कैसे सहायता करता है?
    follow_ups:
      - रंग हटाने पर क्या गायब हो जाता है?
      - क्या स्पष्ट हो जाता है?
      - ग्रेस्केल संस्करण में आपकी आंख पहले कहाँ जाती है?
  - id: give_it_a_voice
    name: इसे आवाज़ दें
    prompt: |
      यह कलाकृति क्या ध्वनियाँ उत्पन्न करेगी? आप रंगों, आकृतियों और रूपों को
      कैसे सुन सकते हैं?
    follow_ups:
      - क्या यह तेज है या शांत? तीक्ष्ण या कोमल?
      - कौन सा वाद्य यंत्र या बनावट इसे पकड़ सकती है?
      - इस काम में मौन कैसा लगेगा?
  - id: find_the_middle_ground
    name: मध्यस्थता करें
    prompt: |
      कलाकृति आपसे कितनी दूर है? आपके आकार की तुलना में यह कितनी बड़ी है?
      कितनी भारी? यह कितना स्थान लेती है? क्या आप इसे घर में फिट कर सकते हैं?
    follow_ups:
      - यदि आप इसे अपने हाथ में पकड़ सकते तो क्या बदल जाता?
      - यदि यह कमरे के आकार का होता तो क्या होता?
      - पैमाना आपके साथ इसके संबंध को कैसे आकार देता है?
  - id: from_the_edges
    name: किनारों से
    prompt: |
      कलाकृति कहाँ समाप्त होती है और "वास्तविक दुनिया" कहाँ से शुरू होती है?
      क्या आप कलाकृति के किनारों को अपने लिए फिर से परिभाषित करने के लिए अपने हाथों
      का उपयोग व्यूफ़ाइंडर के रूप में कर सकते हैं? क्या कोई स्पष्ट किनारा है?
    follow_ups:
      - जब आप फ्रेम बदलते हैं तो क्या होता है?
      - क्या शामिल किया जाता है या बाहर रखा जाता है?
      - काम अपनी सीमाओं से परे कहाँ फैलना चाहता है?
  - id: transmogrify_it
    name: इसे रूपांतरित करें
    prompt: |
      यदि आप कलाकृति को किसी अन्य शैली में बदल सकते तो क्या होता? एक तस्वीर
      से एक एक्शन पेंटिंग या एक स्थापना से एक परिदृश्य? आप इसे कैसे करेंगे?
      क्या यह अनुवाद में भी अपना चरित्र बनाए रखेगा?
    follow_ups:
      - काम के लिए क्या आवश्यक है—क्या बदलना चाहिए?
      - अनुवाद में क्या मिलेगा या खो जाएगा?
      - कौन सी शैली इसके बारे में कुछ नया प्रकट करेगी?
  - id: the_hand_of_the_artist
    name: कलाकार का हाथ
    prompt: |
      कलाकार के ब्रशस्ट्रोक, छेनी के निशान, उंगलियों के निशान, यहाँ तक कि
      बालों के प्रमाण खोजें। कल्पना करें कि आप खुद वे निशान बना रहे हैं—आपको
      किस स्थिति में आना होगा? आप किन औजारों का उपयोग करेंगे?
    follow_ups:
      - निशान निर्माता के शरीर के बारे में क्या बताता है?
      - इशारा तेज या धीमा, निश्चित या झिझक वाला कहाँ है?
      - वह निशान बनाने में कैसा लगेगा?
  - id: tell_the_story
    name: कहानी सुनाएं
    prompt: |
      कला का इतिहास कथा से समृद्ध है, और आज कला, साहित्य और फिल्म के बीच एक
      रोमांचक संवाद है। क्या कलाकृति में कोई कहानी है? आप इसे कैसे बताते हैं?
    follow_ups:
      - इस क्षण से पहले या बाद में क्या होता है?
      - कथावाचक कौन है? किसकी आवाज गायब है?
      - क्या यह फिल्म, एक उपन्यास या एक कविता के रूप में काम करेगा?
  - id: shadowboxing
    name: शैडोबॉक्सिंग
    prompt: |
      घूमें। बहुत करीब जाएं। जितना संभव हो उतना दूर जाएं। दूसरी ओर मुड़ें।
      ऊपर जाएं। नीचे जाएं। विभिन्न कोणों का प्रयास करें। ज्यादा देर एक ही जगह
      पर न रहें। जब आप इसके चारों ओर घूमते हैं तो कलाकृति के प्रदर्शन में
      आने वाले बदलावों का आनंद लें।
    follow_ups:
      - जब आप अपनी स्थिति बदलते हैं तो क्या बदलता है?
      - किस कोण ने आपको आश्चर्यचकित किया?
      - आपके शरीर की हरकत आपको जो दिखती है उसे कैसे बदलती है?
  - id: six_degrees_of_francis_bacon
    name: फ्रांसिस बेकन के छह डिग्री
    prompt: |
      कलाकार अन्य कलाकारों को प्रभावित करते हैं। पीढ़ियों और सीमाओं के पार
      विषय और विचार विकसित होते हैं। कम से कम लिंक का उपयोग करके कलाकृति को
      गैलरी में किसी अन्य से जोड़ें।
    follow_ups:
      - आप सबसे छोटा रास्ता क्या ढूंढ सकते हैं?
      - किस तरह का लिंक सबसे मजबूत है—तकनीक, विषय, मूड या विचार?
      - कलाकार कनेक्शन के बारे में क्या सोचेगा?
  - id: headlines
    name: सुर्खियाँ
    prompt: |
      उस दिन की कल्पना करें जब कलाकृति बनाई गई थी और उस दिन के लिए एक समाचार पत्र
      की हेडलाइन ढूंढें या invent करें। आज के फ्रंट पेज से इसकी तुलना करें।
    follow_ups:
      - फोल्ड के ऊपर क्या रहा होगा?
      - क्या बदला है—और क्या नहीं?
      - "हेडलाइन काम को कैसे पुन: फ्रेम करती है?"
  - id: speed_date
    name: स्पीड डेट
    prompt: |
      प्रत्येक कलाकृति के साथ केवल 10 सेकंड बिताएं। जब तक आप सभी को न देख लें
      या जब तक आप थक न जाएं, तब तक ऐसा करें, फिर अपनी पसंदीदा कलाकृतियों पर
      वापस जाएं और linger करें। आप उन्हें अब कैसे देखते हैं? आप किस ओर आकर्षित
      हो रहे हैं?
    follow_ups:
      - त्वरित पास ने क्या प्रकट किया जो linger करने से छूट सकता था?
      - आप उन विशेष कार्यों पर क्यों लौटे?
      - दूसरी नज़र पहली नज़र से कैसे अलग थी?
  - id: make_connections
    name: कनेक्शन बनाएं
    prompt: |
      घर जाते समय, किसी ऐसी चीज़ की तलाश करें जो आपको कलाकृति, या उसके एक
      हिस्से की याद दिलाए—एक आकार या रंग, शायद एक शब्द, यहाँ तक कि एक भावना।
    follow_ups:
      - आपको क्या मिला?
      - गूंज ने आपको मूल को कैसे देखने का तरीका बदल दिया?
      - यदि आप कर सकते तो आप कलाकार को क्या दिखाएंगे?
  - id: dinner_party
    name: रात्रिभोज
    prompt: |
      एक कलाकृति को एक स्वाद से मिलाएं। यह आपको किस भोजन या पेय की याद दिलाता है?
      एक दावत इकट्ठा करो।
    follow_ups:
      - मेनू कैसा दिखेगा?
      - कौन कहाँ बैठेगा?
      - पहली बाइट का स्वाद कैसा होगा?
  - id: head_off_piste
    name: ऑफ-पिस्ट जाएं
    prompt: |
      गैलरी के कर्मचारी से पूछें कि वे अपना पसंदीदा काम क्या है, या कार्ड से
      दूर जाएं और देखें कि आप क्या पा सकते हैं।
    follow_ups:
      - आपको रास्ते से हटकर क्या मिला?
      - उनका पसंदीदा आपका पसंदीदा से कैसे भिन्न है?
      - आप किसी और को क्या सलाह देंगे?
  - id: make_it_anew
    name: इसे नया बनाएं
    prompt: |
      घर पर, केवल जो आपके हाथ में है उसका उपयोग करके एक कलाकृति को फिर से
      बनाएं। इसे लिखें, इसे बनाएं, इसे माचिस से बनाएं। आपकी विधि जितनी आसान
      और सरल होगी, उतना ही बेहतर होगा। देखें कि आपके दिमाग में क्या रहता है,
      आप अपने प्रस्तुतिकरण में क्या नोटिस करते हैं।
    follow_ups:
      - आपने बिना कोशिश किए क्या याद किया?
      - आपके संस्करण ने क्या गलत किया—और यह क्यों मायने रखता है?
      - यदि आपके पास एक मिनट और होता तो आप क्या जोड़ते?
  - id: origin_story
    name: उत्पत्ति की कहानी
    prompt: |
      क्या आपको पहली कलाकृति याद है जो आपने कभी देखी थी? आप कहाँ थे? आपकी उम्र
      कितनी थी? कमरे को याद करने की कोशिश करें जिसमें आप थे, प्रकाश और ध्वनियां,
      उसे देखने का एहसास। क्या कुछ ऐसा है जिसे आप अभी देख रहे कलाकृति से
      जोड़ सकते हैं?
    follow_ups:
      - कला को देखने के तरीके में क्या समान रहा है?
      - वह युवा स्व इस काम का क्या करेगा?
      - तब से अब तक कौन सा धागा चलता है?
  - id: words_and_images
    name: शब्द और चित्र
    prompt: |
      कलाकृति को देखे बिना, विवरण पढ़ें, अपनी आँखें बंद करें और उसे चित्रित
      करने का प्रयास करें। फिर उन्हें खोलें। क्या यह आपके संस्करण से मेल खाता है?
    follow_ups:
      - शब्दों ने क्या छोड़ दिया?
      - आपने क्या जोड़ा जो वहां नहीं था?
      - आपकी मानसिक छवि आपको वास्तविक को कैसे देखने का तरीका बदलती है?
  - id: keep_a_notebook
    name: एक नोटबुक रखें
    prompt: |
      तारीखों, कलाकृतियों और उन पर अपनी प्रतिक्रिया का एक लॉग बनाएं। अपने नोट्स
      को देखें और नई कलाकृतियों की तलाश करें।
    follow_ups:
      - अपने नोट्स पढ़ते समय क्या पैटर्न उभरता है?
      - आप अपने अतीत स्व को क्या बताएंगे?
      - नोटबुक आपको आगे कहाँ ले जाना चाहती है?
  - id: write_a_postcard
    name: एक पोस्टकार्ड लिखें
    prompt: |
      उस कलाकृति को एक पोस्टकार्ड लिखें जिससे आप विशेष रूप से जुड़ते हैं। आप क्या
      कहेंगे? वह कैसे जवाब दे सकती है?
    follow_ups:
      - आपको क्या कहना होगा जो आप ज़ोर से नहीं कह सके?
      - उसकी लिखावट कैसी दिखेगी?
      - आप क्या रखेंगे—और क्या आप कभी नहीं भेजेंगे?
  - id: here_today_gone
    name: आज यहाँ, चला गया...?
    prompt: |
      हर कलाकृति समय की कसौटी पर खरी नहीं उतरती, न ही हर कलाकार का इरादा
      यही होता है। एक घटना या प्रदर्शन एक शाम, शायद मिनट या सिर्फ सेकंड तक
      चल सकता है! शायद आप एक क्षणभंगुर, अस्थायी कलाकृति के दस्तावेजीकरण
      को देख रहे हैं। यह कब तक चलेगा?
    follow_ups:
      - यदि यह कल गायब हो गया तो क्या खो जाएगा?
      - स्मृति, तस्वीर या कहानी में क्या बचता है?
      - क्या इसकी क्षणभंगुरता आपको इसे देखने का तरीका बदल देती है?
  - id: wrap_it_up
    name: इसे लपेटें
    prompt: |
      यदि आप कलाकृति को लपेट सकते तो क्या होता? क्या आप अभी भी बता पाएंगे कि
      यह क्या था? क्या कोई दूसरी कलाकृति उसी पैकेज में फिट हो सकती है?
    follow_ups:
      - पैकेज का आकार क्या होगा?
      - रैपिंग पेपर कैसा दिखेगा?
      - क्या आवश्यक है—और क्या बदला जा सकता है?
  - id: trace_a_path
    name: एक पथ का पता लगाएं
    prompt: |
      जब आप किसी कलाकृति का सामना करते हैं तो आप क्या देखते हैं? आपकी आंखें
      अगला कहाँ जाती हैं? आपकी निगाह कहाँ टिकती है? बिंदुओं को प्लॉट करें और
      बिंदुओं को कनेक्ट करें।
    follow_ups:
      - आप कहाँ लौटते रहते हैं?
      - आपने क्या छोड़ दिया—और क्यों?
      - आपका पथ किसी और के पथ की तुलना में कैसा है?
  - id: superficial
    name: सतही
    prompt: |
      सतह कैसी है? क्या यह प्रकाश को सोखती है या परावर्तित करती है? क्या यह चिकनी
      है या छिद्रित? क्या यह स्तरित, परिष्कृत, या खुरदरी है? उथला होने से डरो
      मत!
    follow_ups:
      - इसे छूने में कैसा लगेगा?
      - सतह क्या प्रकट करती है—या छिपाती है?
      - जब आप सतह पर रहते हैं तो क्या होता है?
  - id: studio_visit
    name: स्टूडियो का दौरा
    prompt: |
      जितने कलाकार हैं, उतने ही कलाकार स्टूडियो हैं। उस स्थान की कल्पना करें
      जहां कलाकृति बनाई गई थी: ब्रुकलिन में एक गोदाम, पेरिस में एक एटेलीयर,
      एक व्यस्त पारिवारिक घर में किचन टेबल—या शायद कहीं और कम संभावित।
    follow_ups:
      - उस स्थान में आप क्या सुनेंगे?
      - यह किस समय बनाया गया था?
      - कल्पित स्थान काम को देखने के तरीके को कैसे बदलता है?
  - id: switch_channels
    name: चैनल बदलें
    prompt: |
      कला के बजाय लोगों को देखें। वे काम के प्रति कैसा व्यवहार करते हैं?
      वे क्या देख रहे हैं? क्या आप अनुमान लगा सकते हैं कि वे क्या महसूस कर रहे हैं?
    follow_ups:
      - कौन linger करता है—और कौन जल्दी से गुजर जाता है?
      - यदि आप पूछते तो वे क्या कहते?
      - दूसरों को देखना आपको क्या नोटिस करने का तरीका बदलता है?
  - id: light
    name: प्रकाश
    prompt: |
      प्रकाश के स्रोत को देखें। यह कहाँ से आ रहा है? छाया में क्या है? उस पर ध्यान
      केंद्रित करें जो कलाकार हमें देखना चाहता है और जो छाया में छिपा है।
    follow_ups:
      - प्रकाश क्या प्रकट करता है?
      - छायाएँ क्या छिपा सकती हैं?
      - अलग प्रकाश में काम कैसे बदलेगा?
  - id: introductions
    name: परिचय
    prompt: |
      किसी मित्र को किसी कलाकृति का परिचय ऐसे दें जैसे वह पार्टी में कोई परिचित
      हो। आप इसे ऐसे कैसे वर्णित करेंगे कि वह उनकी रुचि जगाएगा? क्या आपकी रुचि
      जगाता है?
    follow_ups:
      - आप पहले किस पर जोर देंगे?
      - आप क्या छोड़ देंगे?
      - कौन सा हुक उन्हें इससे मिलने की इच्छा पैदा करेगा?
  - id: tipping_point
    name: टिपिंग पॉइंट
    prompt: |
      कलाकृति का केंद्र कहाँ है? क्या यह संतुलन से बाहर है? टिपिंग पॉइंट देखें।
    follow_ups:
      - क्या इसे गिरा देगा?
      - क्या इसे जगह पर रखता है?
      - असंतुलन तनाव—या राहत कैसे पैदा करता है?
  - id: homing
    name: घर लौटना
    prompt: |
      लगातार वापस जाते रहें। दिन के अलग-अलग समय पर या अलग-अलग दिनों में
      पसंदीदा कलाकृति पर लौटें—सर्दियों में सबसे पहले, गर्मियों की शाम को
      सबसे अंत में। अपने आप को महसूस करने का एक रिकॉर्ड रखें; आपकी भावनाएं
      प्रत्येक यात्रा पर बदल जाती हैं।
    follow_ups:
      - यात्राओं में क्या समान रहा है?
      - यह आपको सबसे ज्यादा कब आश्चर्यचकित किया?
      - आप अपने अतीत स्व को इसके बारे में क्या बताएंगे?
  - id: one_and_only
    name: एक और केवल
    prompt: |
      अभिभूत होने से बचने के लिए, केवल एक कलाकृति देखें, या अधिक से अधिक
      मुट्ठी भर। एक गहरा गोता लगाएँ और प्रत्येक के साथ जितना संभव हो उतना
      समय बिताएँ। आप एक एकल कलाकृति के सामने इनमें से कितने कार्ड का उपयोग
      कर सकते हैं?
    follow_ups:
      - दूसरे पास पर आपने क्या नोटिस किया?
      - किन कार्डों ने कुछ नया प्रकट किया?
      - आपको कब पता चला कि आगे बढ़ने का समय आ गया है?
  - id: press_pause
    name: पॉज दबाएं
    prompt: |
      बहुत धीमा हो जाएं। अपनी आँखें बंद करके देखना शुरू करें, आराम करें और
      अपनी सांस पर ध्यान केंद्रित करें, धीरे-धीरे अपनी आँखें खोलें, फिर से
      फोकस करें, और कलाकृति को आपके सामने खुलने का समय दें।
    follow_ups:
      - जब आप धीमा हुए तो क्या दिखाई दिया?
      - जब आपने अपनी आँखें खोलीं तो आपने सबसे पहले क्या देखा?
      - आपकी सांस आपको कैसे देखने का तरीका बदलती है?
  - id: material
    name: सामग्री
    prompt: |
      कलाकृति किस चीज़ से बनी है? यदि यह किसी और चीज़ से बनी होती तो क्या होता?
      जितना अधिक असंगत, उतना ही बेहतर। क्या यह आपके बारे में महसूस करने
      के तरीके को बदल देगा?
    follow_ups:
      - सबसे आश्चर्यजनक विकल्प क्या होगा?
      - सामग्री अर्थ में क्या जोड़ती है?
      - स्वैप में क्या बचेगा—और क्या खो जाएगा?
  - id: patch_of_sky
    name: आकाश के एक टुकड़े में कितने रंग?
    prompt: |
      कलाकृति के एक क्षेत्र में ज़ूम इन करें। आप वहां कितने रंग देख सकते हैं?
      संग्रहालय के बाहर, ऊपर देखें और आकाश के एक टुकड़े में आप जितने रंग
      देख सकते हैं, उन्हें गिनने का प्रयास करें।
    follow_ups:
      - जब आप पूरे को देख रहे थे तो क्या छूट गया?
      - आकाश कलाकृति की तुलना कैसे करता है?
      - आपको सबसे ज्यादा कौन सा रंग आश्चर्यचकित किया?
  - id: greening
    name: हरा करना
    prompt: |
      कलाकृति किस तरह का पौधा होगी? क्या यह फलों से लदा हुआ एक मध्य-गर्मी
      का आड़ू का पेड़ होगा, या अधिक नाजुक फर्न की तरह? इसे विकसित होने
      के लिए किन परिस्थितियों की आवश्यकता है?
    follow_ups:
      - यह कहाँ पनपेगा—और कहाँ मुरझाएगा?
      - इसे खिलने के लिए क्या चाहिए?
      - वानस्पतिक रूपक इसे देखने का तरीका कैसे बदलता है?
