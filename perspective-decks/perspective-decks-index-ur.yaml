# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Urdu)

domains:
  art:
    name: فن کو دیکھنے کے طریقے
    description: |
      فن کو دیکھتے ہوئے آپ کے نقطہ نظر کو بدلنے کے لیے کارڈز۔ ہر ایک مختلف
      لینز پیش کرتا ہے—روشنی اور سایہ سے لے کر تعارف اور جذبات تک—آپ کس طرح
      مصنوعی کاموں کو دیکھتے اور ان کے ساتھ مشغول ہوتے ہیں اس کو گہرا کرنے کے لیے۔
  urban_jungle:
    name: شہری جنگل
    description: |
      شہر میں محض چلنے کے بجائے، آپ اسے ایک زندہ عضویہ کے طور پر دیکھتے ہیں۔
      کارڈز پرانے عمارتوں کے داغوں، ٹریفک کی کوریوگرافی،
      اور گلیوں کی خفیہ زندگیوں پر مرکوز ہیں۔
  culinary_lab:
    name: باورچی خانہ لیب
    description: |
      ذائقہ دار سے تبدیلی کی طرف بڑھنا۔ ایک نوالے کی کیمسٹری،
      ایک جزو کی تاریخ، اور ایک ریستوراں کی آواز کا تجربہ کریں۔
  natural_microcosm:
    name: قدرتی ننھا کائنات
    description: |
      ایک پارک یا پچھواڑے کے لیے بہترین۔ یہ لینز پتے کی پوشیدہ
      انجینئرنگ، چٹان کی سست رفتار زندگی، یا کیڑوں کے علاقائی
      ڈراموں پر مرکوز ہے۔
  human_interface:
    name: انسانی انٹرفیس
    description: |
      روزمرہ کے وہ جگہیں جہاں انسان ملتے ہیں—کافی شاپس، ٹرانزٹ ہبز،
      کام کی جگہیں، خوردہ فروشی، عوامی پارکس۔ کارڈز قطار کی کوریوگرافی،
      علاقائی دعووں، پوشیدہ اسکرپٹس، اور مشترکہ جگہ کی بشریات پر مرکوز ہیں۔
  california_superbloom:
    name: کیلیفورنیا سپر بلوم
    description: |
      موسم سرما کی بارش کے بعد جنگلی پھولوں کا عارضی پھوٹ۔ کارڈز رنگ،
      پیمانہ، پولینیٹر، ارضیات، موسم، اور پھول کے عارضی نظارے پر مرکوز ہیں۔
