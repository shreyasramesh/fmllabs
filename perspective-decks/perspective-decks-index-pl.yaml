# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Polish)

domains:
  art:
    name: Sztuka
    description: |
      Karty, które zmieniają perspektywę podczas oglądania sztuki. Każda oferuje
      inny punkt widzenia – od światła i cienia, po wprowadzenia i emocje –
      aby pogłębić sposób, w jaki postrzegasz i angażujesz się w dzieła sztuki.
  urban_jungle:
    name: Miejska dżungla
    description: |
      Zamiast tylko spacerować po mieście, patrzysz na nie jak na żywy organizm.
      Karty skupiają się na bliznach starych budynków, choreografii ruchu ulicznego
      i sekretnym życiu zaułków.
  culinary_lab:
    name: Laboratorium kulinarne
    description: |
      Przejście od smacznego do transformującego. Odkryj chemię kęsa,
      historię składnika i ścieżkę dźwiękową restauracji.
  natural_microcosm:
    name: Naturalny mikrokosmos
    description: |
      Idealne do parku lub ogrodu. Ten obiektyw skupia się na niewidzialnej
      inżynierii liścia, powolnym życiu skały lub terytorialnych
      dramatach owadów.
  human_interface:
    name: Interfejs ludzki
    description: |
      Codzienne przestrzenie, w których spotykają się ludzie – kawiarnie, węzły przesiadkowe,
      miejsca pracy, sklepy, parki publiczne. Karty skupiają się na choreografii kolejek,
      roszczeniach terytorialnych, niewidzialnych scenariuszach i antropologii przestrzeni wspólnej.
  california_superbloom:
    name: Superkwiat Kalifornii
    description: |
      Efemeryczny wybuch dzikich kwiatów po zimowych deszczach. Karty skupiają się na kolorze,
      skali, zapylaczach, geologii, pogodzie i ulotnym widowisku kwitnienia.
decks:
  - id: ways_of_looking_at_art
    name: Sztuka
    path: perspective-decks/ways-of-looking-at-art.yaml
