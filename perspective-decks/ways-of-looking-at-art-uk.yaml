# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# Способи погляду на мистецтво (Ukrainian)

id: ways_of_looking_at_art
name: Мистецтво
description: |
  Картки, що допоможуть змінити ваш погляд на мистецтво. Кожна пропонує іншу лінзу
  для поглиблення того, як ви бачите твори та взаємодієте з ними.
domain: art
cards:
  - id: souvenir
    name: Сувенір
    prompt: |
      Виберіть щось з твору мистецтва і "схованіть" це у наступному творі, на який дивитеся.
      Як би ви вписали це у нову композицію?
    follow_ups:
      - Що б ви обрали перенести?
      - Що б воно здобуло чи втратило в новому контексті?
      - Де б воно пасувало — або опиралося б пасуванню — у новій роботі?
  - id: throw_a_party
    name: Влаштуйте вечірку
    prompt: |
      Запросіть усіх митців до кімнати. У що б вони були вбрані?
      Про що б вони думали?
    follow_ups:
      - Хто б тягнувся до кого?
      - Про що б вони сперечалися?
      - Що б їх здивувало у роботах одне одного?
  - id: time_out
    name: Перерва
    prompt: |
      Вийдіть назовні. Зосередьтеся на світлі, звуках та відчуттях. Будьте присутніми
      у своєму оточенні. Досвід перегляду мистецтва — це стільки ж про проміжки між
      творами, скільки й про самі твори.
    follow_ups:
      - Що ви помічаєте, коли перестаєте зосереджуватися на мистецтві?
      - Як кімната формує те, що ви бачите?
      - Що б ви пропустили, якби поспішали?
  - id: plan_a_trip
    name: Заплануйте подорож
    prompt: |
      Те, що ви бачите сьогодні, може бути першим кроком у набагато більшій подорожі. Коли
      ви вийдете з галереї чи простору, вирішіть, який твір мистецтва ви хочете побачити наступним
      і сплануйте цілу подорож навколо нього.
    follow_ups:
      - Куди б вас завела ця подорож?
      - Що б вам знадобилося побачити по дорозі?
      - Чому саме ця робота — що робить її вартісною подорожі?
  - id: in_black_and_white
    name: У чорно-білому
    prompt: |
      Зосередьтеся на грі світла та тіні — ви можете навіть зробити фото у чорно-білому,
      щоб допомогти. Де тони найтемніші? Як це натякає на глибину чи ні? Як це допомагає
      зрозуміти композицію?
    follow_ups:
      - Що зникає, коли ви прибираєте колір?
      - Що стає зрозумілішим?
      - Куди спочатку прямує ваше око у версії відтінків сірого?
  - id: give_it_a_voice
    name: Надайте йому голос
    prompt: |
      Які звуки видавав би цей витвір мистецтва? Як би ви могли почути кольори,
      форми та об'єми?
    follow_ups:
      - Це гучно чи тихо? Різко чи м'яко?
      - Який інструмент чи текстура могли б це передати?
      - Як би звучала тиша у цій роботі?
  - id: find_the_middle_ground
    name: Знайдіть золоту середину
    prompt: |
      Як далеко твір мистецтва від вас? Наскільки він великий у відношенні до вашого
      росту? Скільки важить? Скільки місця займає? Чи могли б ви помістити його у будинок?
    follow_ups:
      - Що б змінилося, якби ви могли тримати його в руці?
      - А якби він був розміром з кімнату?
      - Як масштаб формує ваші стосунки з ним?
  - id: from_the_edges
    name: З країв
    prompt: |
      Де закінчується твір мистецтва і починається "реальний світ"? Чи можете ви спробувати
      використовувати свої руки як видошукач, щоб переосмислити краї твору для себе? Чи є
      відчутний край?
    follow_ups:
      - Що відбувається, коли ви змінюєте кадр?
      - Що включається чи виключається?
      - Де робота хоче вийти за свої межі?
  - id: transmogrify_it
    name: Трансформуйте його
    prompt: |
      Що, якби ви могли змінити твір мистецтва на інший жанр? Фотографію на екшн-живопис
      або інсталяцію на пейзаж? Як би ви це зробили? Чи зберіг би він свій характер навіть
      у перекладі?
    follow_ups:
      - Що є суттєвим для роботи — що має вижити під час зміни?
      - Що б здобулося чи втратилося у перекладі?
      - Який жанр розкрив би щось нове про нього?
  - id: the_hand_of_the_artist
    name: Рука митця
    prompt: |
      Шукайте свідчення мазків пензля, слідів від різця, відбитків пальців, навіть волосин
      митця. Уявіть, що ви самі робите ці позначки — в яку позу вам потрібно було б стати?
      Які інструменти ви б використали?
    follow_ups:
      - Що позначка розкриває про тіло творця?
      - Де жест швидкий чи повільний, впевнений чи невпевнений?
      - Якими були б відчуття від створення цієї позначки?
  - id: tell_the_story
    name: Розкажіть історію
    prompt: |
      Історія мистецтва багата на наративи, і сьогодні існує захоплюючий діалог між мистецтвом,
      літературою та кіно. Чи є історія у творі мистецтва? Як ви її розповідаєте?
    follow_ups:
      - Що відбувається до чи після цього моменту?
      - Хто оповідач? Чий голос відсутній?
      - Чи спрацювало б це як фільм, роман чи вірш?
  - id: shadowboxing
    name: Тіньовий бій
    prompt: |
      Рухайтеся. Підійдіть дуже близько. Відійдіть якомога далі. Перейдіть на інший бік.
      Вгору. Вниз. Спробуйте різні кути. Не залишайтеся довго на одному місці.
      Насолоджуйтеся змінами, які демонструє твір мистецтва, коли ви рухаєтеся навколо нього.
    follow_ups:
      - Що змінюється, коли ви змінюєте свою позицію?
      - Який кут здивував вас?
      - Як рух вашого тіла змінює те, що ви бачите?
  - id: six_degrees_of_francis_bacon
    name: Шість кроків від Френсіса Бекона
    prompt: |
      Митці впливають на інших митців. Теми та ідеї розвиваються протягом поколінь
      та через кордони. Пов'яжіть твір мистецтва з іншим у галереї, використовуючи якомога
      менше ланок.
    follow_ups:
      - Який найкоротший шлях ви можете знайти?
      - Який тип зв'язку найсильніший — техніка, суб'єкт, настрій чи ідея?
      - Що б подумав митець про цей зв'язок?
  - id: headlines
    name: Заголовки
    prompt: |
      Уявіть день, коли був створений твір мистецтва, і знайдіть або вигадайте газетний
      заголовок для цього дня. Порівняйте його з першими шпальтами сьогодні.
    follow_ups:
      - Що було б "над складкою" (на першій шпальті)?
      - Що змінилося — а що ні?
      - Як заголовок переосмислює роботу?
  - id: speed_date
    name: Швидке побачення
    prompt: |
      Проведіть лише 10 секунд з кожним твором мистецтва. Робіть це, доки не побачите
      їх усі, або поки не вичерпаєте сили, а потім поверніться до улюблених і затримайтеся.
      Як ви бачите їх тепер? До яких вас тягне повернутися?
    follow_ups:
      - Що розкрив швидкий огляд, чого міг пропустити тривалий перегляд?
      - Чому ви повернулися до цих конкретних робіт?
      - Чим другий погляд відрізнявся від першого?
  - id: make_connections
    name: Встановіть зв'язки
    prompt: |
      Дорогою додому знайдіть щось, що нагадує вам про твір мистецтва, або його частину —
      форму чи колір, можливо, слово, навіть відчуття.
    follow_ups:
      - Що ви знайшли?
      - Як відлуння змінило ваш погляд на оригінал?
      - Що б ви показали митцю, якби могли?
  - id: dinner_party
    name: Вечеря
    prompt: |
      Підберіть твір мистецтва до смаку. З чим він вам нагадує їжу чи напій?
      Складіть банкет.
    follow_ups:
      - Як би виглядав меню?
      - Хто б де сидів?
      - Яким би був смак першого шматочка?
  - id: head_off_piste
    name: Зійдіть з протоптаної стежки
    prompt: |
      Попросіть співробітника галереї показати його улюблену роботу, або відійдіть від карток
      і подивіться, що ви можете знайти.
    follow_ups:
      - Що ви відкрили, зійшовши зі звичного шляху?
      - Чим його улюблене відрізняється від вашого?
      - Що б ви порекомендували комусь іншому?
  - id: make_it_an_mixtape
    name: Зробіть мікстейп
    prompt: |
      Чи нагадує твір мистецтва про якусь пісню чи музичний твір? Мистецтво та музика
      перетинаються різними шляхами і часто мають спільну мову. Які якості вони мають спільного?
      Створіть плейлист для кожного відвідування галереї або для окремого митця.
    follow_ups:
      - Який відкриваючий трек?
      - Яка якість пов'язує роботу з музикою — ритм, настрій, текстура?
      - Як би змінився плейлист, якби ви повернулися до нього через рік?
  - id: read_in_context
    name: Читайте в контексті
    prompt: |
      Де знаходиться твір мистецтва? Як його оточення впливає на його сприйняття?
      Чи він на рекламному щиті, поза галереєю, посеред озера? Прислухайтеся до розмови
      між роботою та її оточенням.
    follow_ups:
      - Що б змінилося, якби він був деінде?
      - Що говорить кімната чи простір у відповідь?
      - Хто тут аудиторія — а кого не вистачає?
  - id: understand_it_less
    name: Зрозумійте менше
    prompt: |
      Прийміть свою цікавість. Запитайте себе, що дивного чи нового у вашому досвіді
      від роботи мистецтва? Як би ви могли зробити її ще більш дивною? Відпустіть те, що
      робота "має означати", намагаючись зрозуміти її трохи менше!
    follow_ups:
      - Що б вам потрібно було забути, щоб побачити її свіжо?
      - Яке питання не має відповіді — і чому це важливо?
      - Як би виглядало "неправильне розуміння"?
  - id: chaos_or_control
    name: Хаос чи контроль?
    prompt: |
      Це здається випадковим, чи є план? Шанс, випадковість та щасливий випадок
      відіграють роль — іноді значну — у створенні твору мистецтва. Спробуйте знайти
      те, що було дозволено відбутися природно, а що було контрольовано.
    follow_ups:
      - Де митець тримає кермо — а де він відпускає?
      - Що могло бути випадковістю, яка стала суттєвою?
      - Як би робота змінилася з більшим хаосом — чи більшим контролем?
  - id: palimpsest
    name: Палімпсест
    prompt: |
      Шукайте шари! Що приховано, а що розкрито? Наскільки товста робота? Чи поверхня
      була нарощена з часом?
    follow_ups:
      - Що лежить під поверхнею?
      - Що б ви знайшли, якби могли це зняти?
      - Як час проявляється у шарах?
  - id: pattern_recognition
    name: Розпізнавання візерунків
    prompt: |
      Шукайте повторювані елементи. Чи є візерунок? Чи є повторювані мотиви? Чи
      відлунюють певні форми одна одну?
    follow_ups:
      - Що ламає візерунок — і чому?
      - Куди повторення веде ваше око?
      - Що б сталося, якби ви простежили один мотив через усю роботу?
  - id: through_another_pair_of_eyes
    name: Іншими очима
    prompt: |
      Згадайте персонажа з роману, фільму, п'єси або історичну постать. Уявіть, що
      ви ведете з ними розмову про твір мистецтва. Чи погодилися б ви з їхньою думкою про нього?
    follow_ups:
      - Що б вони помітили, чого ви пропустили?
      - Де б ви не погодилися — і чому?
      - Яке запитання вони б вам поставили про нього?
  - id: thermostat
    name: Термостат
    prompt: |
      Яку температуру має колір? Шукайте найхолодніші кольори у творі мистецтва, а потім
      визначте теплі відтінки. Скільки екосистем ви можете знайти в одному творі мистецтва?
    follow_ups:
      - Де зустрічаються гаряче і холодне — і що там відбувається?
      - Який клімат викликає робота?
      - Якими були б відчуття, якби ви ступили в його температуру?
  - id: negative_space
    name: Негативний простір
    prompt: |
      Проміжки між окремими елементами твору мистецтва так само значущі, як і самі елементи.
      Як і в пазлі, зверніть увагу на відсутні шматочки. Негативний простір: як він обрамляє
      те, що є? Відчуйте його значущість.
    follow_ups:
      - Якої форми набуває порожнеча?
      - Що б заповнило прогалини — і чи варто це робити?
      - Як негативний простір утримує композицію разом?
  - id: make_yourself_at_home
    name: Почувайтеся як удома
    prompt: |
      Уявіть, що ви залазите всередину твору мистецтва. Де б ви сховалися? Що б ви побачили?
      Якими були б відчуття?
    follow_ups:
      - Що б ви почули зсередини?
      - Де б ви почувалися найбезпечніше — чи найвразливіше?
      - Що б ви взяли з собою, якби могли залишитися?
  - id: homage
    name: Дань поваги
    prompt: |
      Створіть вівтар або міні-виставку для свого улюбленого митця. Почніть з листівки з магазину
      або знайдіть предмети та зображення, що посилаються на його роботу та додають їй глибини та кольору.
    follow_ups:
      - Що б знаходилося в центрі вашого вівтаря?
      - Який предмет здивував би його?
      - Як акт кураторства змінює ваш погляд на його роботу?
  - id: warm_up
    name: Розминка
    prompt: |
      Пробудіть своє тіло, щоб підготувати свої чуття. Біжіть, стрибайте, розтягуйтеся, плесніть
      у долоні, поворушіть пальцями ніг. Зверніть увагу на будь-які фізичні відчуття у вашому
      тілі під час перегляду твору мистецтва.
    follow_ups:
      - Де у вашому тілі ви відчуваєте роботу?
      - Як рух змінює те, що ви бачите?
      - Яке відчуття залишається після того, як ви відвернулися?
  - id: make_it_anew
    name: Зробіть це по-новому
    prompt: |
      Вдома відтворіть твір мистецтва, використовуючи лише те, що є під рукою. Запишіть його,
      намалюйте, збудуйте з сірників. Чим простішим і легшим буде ваш метод, тим краще.
      Подивіться, що залишається у вашій пам'яті, що ви помічаєте у своїй інтерпретації.
    follow_ups:
      - Що ви запам'ятали без зусиль?
      - Що ваша версія зробила неправильно — і чому це важливо?
      - Що б ви додали, якби мали ще одну хвилину?
  - id: origin_story
    name: Історія походження
    prompt: |
      Чи можете ви згадати перший твір мистецтва, який ви коли-небудь бачили? Де ви були?
      Скільки вам було років? Спробуйте згадати кімнату, де ви були, світло та звуки, відчуття
      від перегляду. Чи є щось, що ви можете пов'язати з твором мистецтва, який ви бачите зараз?
    follow_ups:
      - Що залишилося незмінним у тому, як ви дивитеся на мистецтво?
      - Що б подумав той молодший "ви" про цю роботу?
      - Яка нитка тягнеться від тоді до зараз?
  - id: words_and_images
    name: Слова та образи
    prompt: |
      Не дивлячись на твір мистецтва, прочитайте опис, закрийте очі і спробуйте уявити його.
      Потім відкрийте їх. Чи відповідає це вашій версії?
    follow_ups:
      - Що пропустили слова?
      - Що ви додали, чого там не було?
      - Як ваш ментальний образ змінює ваш погляд на реальний?
  - id: keep_a_notebook
    name: Ведіть нотатник
    prompt: |
      Складайте журнал дат, творів мистецтва та вашої реакції на них. Переглядайте свої
      записи і шукайте нові твори мистецтва.
    follow_ups:
      - Який візерунок виникає, коли ви читаєте свої нотатки?
      - Що б ви сказали своєму минулому "я"?
      - Куди вас далі веде нотатник?
  - id: write_a_postcard
    name: Напишіть листівку
    prompt: |
      Напишіть листівку твору мистецтва, з яким ви особливо з'єднуєтеся. Що б ви сказали?
      Як би він міг відповісти?
    follow_ups:
      - Що б вам потрібно було сказати, чого ви не могли б сказати вголос?
      - Як би виглядав його почерк?
      - Що б ви залишили — а що б ніколи не відправили?
  - id: here_today_gone
    name: Тут сьогодні, зникне...?
    prompt: |
      Не кожен твір мистецтва витримує випробування часом, і не кожен митець має такий намір.
      Перформанс або хепенінг може існувати вечір, можливо, хвилини або лише секунди! Можливо,
      ви дивитеся на документацію швидкоплинного, тимчасового твору мистецтва. Як довго він проіснує?
    follow_ups:
      - Що буде втрачено, якщо він зникне завтра?
      - Що залишається в пам'яті, фотографії чи історії?
      - Чи змінює його нетривалість ваш погляд на нього?
  - id: wrap_it_up
    name: Загорніть це
    prompt: |
      Що, якби ви могли загорнути твір мистецтва? Чи змогли б ви все ще сказати, що це?
      Чи міг би інший твір мистецтва поміститися в ту саму упаковку?
    follow_ups:
      - Якої форми взяла б упаковка?
      - Як би виглядав пакувальний папір?
      - Що є суттєвим — а що можна було б замінити?
  - id: trace_a_path
    name: Прослідкуйте шлях
    prompt: |
      На що ви дивитеся, коли стикаєтеся з твором мистецтва? Куди наступним чином подорожує
      ваше око? Де ваш погляд зупиняється? Нанесіть точки і з'єднайте їх.
    follow_ups:
      - Куди ви постійно повертаєтеся?
      - Що ви пропустили — і чому?
      - Як ваш шлях порівнюється зі шляхом когось іншого?
  - id: superficial
    name: Поверхневе
    prompt: |
      Яка поверхня? Вона поглинає світло чи відбиває його? Вона гладка чи перфорована?
      Вона шарувата, витончена чи груба? Не бійтеся бути поверхневими!
    follow_ups:
      - Якими були б відчуття від дотику?
      - Що розкриває — чи приховує — поверхня?
      - Що відбувається, коли ви залишаєтеся на поверхні?
  - id: studio_visit
    name: Візит до студії
    prompt: |
      Існує стільки ж студій митців, скільки й митців. Уявіть простір, де був створений
      твір мистецтва: склад у Брукліні, ательє в Парижі, кухонний стіл у зайнятому сімейному
      будинку — або, можливо, десь зовсім несподіваному.
    follow_ups:
      - Що б ви почули в тому просторі?
      - О котрій годині це було створено?
      - Як уявне місце змінює ваш погляд на роботу?
  - id: switch_channels
    name: Переключіть канали
    prompt: |
      Подивіться на людей замість мистецтва. Як вони поводяться щодо роботи? На що вони
      дивляться? Чи можете ви вгадати, що вони відчувають?
    follow_ups:
      - Хто затримується — а хто поспішає повз?
      - Що б вони сказали, якби ви запитали?
      - Як спостереження за іншими змінює те, що ви помічаєте?
  - id: light
    name: Світло
    prompt: |
      Шукайте джерело світла. Звідки воно йде? Що знаходиться в тіні? Зосередьтеся на тому,
      що митець хоче, щоб ми бачили, і на тому, що приховано в тінях.
    follow_ups:
      - Що розкриває світло?
      - Що можуть приховувати тіні?
      - Як би робота змінилася при іншому освітленні?
  - id: introductions
    name: Знайомства
    prompt: |
      Представте твір мистецтва другові, ніби це знайомий на вечірці. Як би ви його описали
      так, щоб зацікавити? Що захоплює вас?
    follow_ups:
      - Що б ви наголосили в першу чергу?
      - Що б ви пропустили?
      - Який "гачок" змусив би їх захотіти зустрітися з ним?
  - id: tipping_point
    name: Точка перелому
    prompt: |
      Де центр твору мистецтва? Чи він не збалансований? Шукайте точку перелому.
    follow_ups:
      - Що б його перевернуло?
      - Що його тримає на місці?
      - Як незбалансованість створює напругу — або вивільнення?
  - id: homing
    name: Повернення додому
    prompt: |
      Повертайтеся знову і знову. Повертайтеся до улюбленого твору мистецтва в різні дні
      або в різний час доби — рано взимку, пізно влітку. Ведіть запис про те, як ви себе
      почуваєте; ваші почуття змінюються при кожному візиті.
    follow_ups:
      - Що залишилося незмінним між візитами?
      - Коли він здивував вас найбільше?
      - Що б ви сказали своєму минулому "я" про нього?
  - id: one_and_only
    name: Єдиний і неповторний
    prompt: |
      Щоб уникнути перевантаження, виберіть лише один твір мистецтва, або максимум кілька.
      Зануртеся глибоко і проведіть з кожним якомога більше часу. Скільки з цих карток ви можете
      використати перед одним твором мистецтва?
    follow_ups:
      - Що ви помітили під час другого перегляду?
      - Які картки розкрили щось нове?
      - Коли ви зрозуміли, що час рухатися далі?
  - id: press_pause
    name: Натисніть паузу
    prompt: |
      Уповільніться. Почніть дивитися, закривши очі, розслабтеся і сконцентруйтеся на диханні,
      повільно відкрийте очі, перефокусуйтеся і дайте твору мистецтва час розгорнутися перед вами.
    follow_ups:
      - Що з'явилося, коли ви уповільнилися?
      - Що ви помітили першим, коли відкрили очі?
      - Як ваше дихання змінює ваш погляд?
  - id: material
    name: Матеріал
    prompt: |
      З чого зроблений твір мистецтва? Що, якби він був зроблений з чогось іншого? Чим більш
      несумісним, тим краще. Чи змінило б це ваше ставлення до нього?
    follow_ups:
      - Якою була б найбільш дивовижна заміна?
      - Що матеріал додає до значення?
      - Що б пережило заміну — а що б втратилося?
  - id: patch_of_sky
    name: Скільки кольорів у клаптику неба?
    prompt: |
      Наблизьте одну ділянку твору мистецтва. Скільки кольорів ви там бачите?
      За межами музею подивіться вгору і спробуйте порахувати якомога більше кольорів, які ви
      бачите у клаптику неба.
    follow_ups:
      - Що ви пропустили, коли дивилися на ціле?
      - Як небо порівнюється з твором мистецтва?
      - Який колір здивував вас найбільше?
  - id: greening
    name: Озеленення
    prompt: |
      Якою рослиною був би твір мистецтва? Чи це було б персикове дерево середини літа,
      важке від плодів, чи скоріше ніжний папороть? Які умови йому потрібні для росту?
    follow_ups:
      - Де б воно процвітало — а де б зів'яло?
      - Що б йому було потрібно, щоб зацвісти?
      - Як ботафорична метафора змінює ваш погляд на нього?
