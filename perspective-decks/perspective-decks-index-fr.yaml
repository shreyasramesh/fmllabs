    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      50 cartes pour changer votre perspective lorsque vous regardez de l'art. Chaque carte offre une lentille différente — de la lumière et de l'ombre aux introductions et à l'émotion — pour approfondir votre façon de voir et d'interagir avec les œuvres d'art.
    domain: art
