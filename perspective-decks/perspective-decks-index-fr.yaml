# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (French)

domains:
  art:
    name: Manières de regarder l'art
    description: |
      Des cartes pour changer votre perspective lorsque vous regardez de l'art. Chacune offre une lentille différente — de la lumière et de l'ombre aux introductions et à l'émotion — pour approfondir votre façon de voir et d'interagir avec les œuvres d'art.
  urban_jungle:
    name: Jungle Urbaine
    description: |
      Au lieu de simplement marcher dans une ville, vous la regardez comme un organisme vivant. Les cartes se concentrent sur les cicatrices des vieux bâtiments, la chorégraphie de la circulation et les vies secrètes des ruelles.
  culinary_lab:
    name: Laboratoire Culinaire
    description: |
      Passer du savoureux au transformateur. Explorez la chimie d'une bouchée, l'histoire d'un ingrédient et la bande-son d'un restaurant.
  natural_microcosm:
    name: Microcosme Naturel
    description: |
      Parfait pour un parc ou un jardin. Cette lentille se concentre sur l'ingénierie invisible d'une feuille, la vie au ralenti d'une roche ou les drames territoriaux des insectes.
  human_interface:
    name: L'Interface Humaine
    description: |
      Les espaces quotidiens où les humains se rencontrent — cafés, centres de transport, lieux de travail, commerces, parcs publics. Les cartes se concentrent sur la chorégraphie des files d'attente, les revendications territoriales, les scripts invisibles et l'anthropologie de l'espace partagé.
  california_superbloom:
    name: Superfloraison Californienne
    description: |
      L'explosion éphémère de fleurs sauvages après la pluie d'hiver. Les cartes se concentrent sur la couleur, l'échelle, les pollinisateurs, la géologie, la météo et le spectacle fugace de la floraison.
decks:
  - id: ways_of_looking_at_art
