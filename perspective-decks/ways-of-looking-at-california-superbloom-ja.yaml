# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# カリフォルニアのスーパーブルームを眺める方法 (Japanese)

id: ways_of_looking_at_california_superbloom
name: カリフォルニアのスーパーブルームを眺める方法
description: |
  カリフォルニアのスーパーブルームを体験する際の視点を変えるためのカード集です。
  それぞれが、野花、斜面、冬の雨の後の儚い色彩の爆発を、より深く理解するための異なるレンズを提供します。
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: それを生み出した雨
    prompt: |
      花の前には、雨がありました。土壌を満たした嵐、地下で待つ種を想像してください。
      この開花が起こるために、どのような条件が揃う必要がありましたか？
      スーパーブルームをその起源まで遡って追ってみましょう。
    follow_ups:
      - もっと雨が降ったら、あるいは少なかったら、何が違っていたでしょうか？
      - 一つの斜面に、何年もの休眠期間があるでしょうか？
      - この瞬間が一度も保証されていなかったということは、何を意味するのでしょうか？
  - id: one_species_at_a_time
    name: 一度に一つの種
    prompt: |
      一つの花の種を選んで、それを追ってみましょう。オレンジのポピー、紫のルピナス、
      黄色のゴールドフィールズ—一瞬すべてを無視してください。
      一つに焦点を当てることで、見え方はどのように変わるでしょうか？
    follow_ups:
      - この種が支配的な場所はどこですか—そして、どこで譲っていますか？
      - もしこの種だけが咲いたとしたら、丘はどんな風に見えるでしょうか？
      - 他の花々の中で、どのように自分の場所を保っているのでしょうか？
  - id: pollinators_view
    name: 訪花昆虫の視点
    prompt: |
      ミツバチ、チョウ、ハチドリになったつもりで想像してください。
      何に惹かれますか？まずどの花を訪れますか？花びらから数インチ上の風景はどのように見えますか？
    follow_ups:
      - どんなパターンがあなたの道筋を導きますか？
      - どの花をスキップしますか—そしてその理由は？
      - スケールはどのように体験を変えますか？
  - id: ground_level
    name: 地面からの視点
    prompt: |
      低くなりましょう。うつ伏せになるか、ひざまずいてください。
      土壌の視点からスーパーブルームを見てください—茎が伸び、花びらがあなたの上をアーチを描き、
      空は遠くの帯です。
    follow_ups:
      - 立ったままの高さでは見落としたことに、何に気づきますか？
      - 下の地面はどんな感触ですか？
      - カブトムシはここから何を見るでしょうか？
  - id: time_lapse
    name: タイムラプス
    prompt: |
      スーパーブルームは、より長い物語の中の一瞬です。
      丘を早送りで想像してください：緑の芽、最初のつぼみ、ピークの色、そして色あせていく様子。
      この光景はどれくらいの期間続きますか？その前と後には何がありますか？
    follow_ups:
      - 一度しか行けないとしたら、いつ訪れることを選びますか？
      - あなたが到着する頃には、すでに何が失われていますか？
      - 色が褪せた後、何が残りますか？
  - id: the_chemistry_of_color
    name: 色彩の化学
    prompt: |
      顔料に焦点を当ててください。オレンジ、紫、黄色、青—それぞれの色合いは何からできていますか？
      それらはどのように相互作用しますか？どこで色がぶつかり合い、どこで調和しますか？
      丘をパレットとして扱ってください。
    follow_ups:
      - どんな色を追加しますか—あるいは削除しますか？
      - 光は一日を通して色をどのように変えますか？
      - 白黒ではどのように見えるでしょうか？
  - id: negative_space
    name: ネガティブスペース（余白）
    prompt: |
      花ではないものを見てください。空、裸の土のパッチ、花々の間の隙間。
      余白は、あなたが見るものをどのように形作りますか？
      そこにはないものの重要性を感じてください。
    follow_ups:
      - 余白はどこに集中していますか？
      - その隙間を何が埋めますか—そして、埋めるべきでしょうか？
      - ネガティブスペースはどのように構図をまとめますか？
  - id: the_path_through
    name: 通り抜ける道
    prompt: |
      小道—人間、動物、あるいは風によって作られたもの—に気づいてください。
      人々はどこを歩きますか？風景はどこを通過することに抵抗しますか？
      開花の中を一本の道筋をたどり、それをたどるには何が必要か問いかけてください。
    follow_ups:
      - そこを歩かないことで、何を保護しますか？
      - 道はあなたをどこへ連れて行きたいですか？
      - 小道に留まることで、何を失いますか？
  - id: geology_beneath
    name: 地下の地質
    prompt: |
      花々は、何百万年もの時の上に休んでいます。土の下にはどんな岩がありますか？
      これらの丘を形作ったものは何ですか？スーパーブルームに、足元の深遠な時間と繋がってください。
    follow_ups:
      - 地質は、ここで何が育つかにどのように影響しますか？
      - 丘が形成される前、この場所はどのように見えましたか？
      - 花がなくなった後、何が残りますか？
  - id: scent_and_sound
    name: 香りと音
    prompt: |
      目を閉じてください。何が匂いますか？花粉、塵、セージ、湿った土？
      何が聞こえますか？ミツバチ、風、足音、静寂？
      一時的に、視覚以外の感覚を導きましょう。
    follow_ups:
      - 体験を捉えるために、どんな音を追加しますか？
      - 移動するにつれて、香りはどのように変わりますか？
      - 見るだけだったら、何を見逃しますか？
  - id: light_and_shadow
    name: 光と影
    prompt: |
      光が丘をどのように横切るか見てください。朝、昼、夕方—太陽の角度は花をどのように変えますか？
      どこに影が落ちますか？何が明らかになり、何が隠されますか？
    follow_ups:
      - いつ光が最も生き生きと感じられますか？
      - 正午には見逃してしまうような、夜明けには何が見えますか？
      - 影は風景をどのように形作りますか？
  - id: seed_to_flower
    name: 種から花へ
    prompt: |
      一本の植物を種から花まで追ってください。それはどのようにしてここにたどり着いたのですか？
      風、動物、水？どれくらい待ちましたか？花びらが落ちたら、それは何になりますか？
      一つの命のサイクルを追ってください。
    follow_ups:
      - 種は地下で何を目撃したでしょうか？
      - 植物は何を残しますか？
      - この丘には、何世代が表現されているでしょうか？
  - id: micro_vs_macro
    name: ミクロ対マクロ
    prompt: |
      一つの花びら、露滴、花粉の粒にズームインしてください。
      次に、丘全体、谷、州まで引き戻してください。
      スケールは、スーパーブルームの意味をどのように変えますか？
    follow_ups:
      - あるスケールでは見えず、別のスケールでは明白なものは何ですか？
      - あなたの注意は自然にどこに落ち着きますか？
      - マクロビューはミクロに、そしてその逆はどのように影響しますか？
  - id: weathers_hand
    name: 天候の手
    prompt: |
      スーパーブルームは天候の共同作業です。雨、太陽、風、気温—それぞれに役割があります。
      天候を共同制作者として想像してください。それは何を決定しましたか？
      何を保留しましたか？
    follow_ups:
      - 違う冬だったら、何が生まれましたか？
      - 今日の天候は、あなたの体験をどのように形作っていますか？
      - もし花が話せたら、天候について何を言うでしょうか？
  - id: human_witness
    name: 人間の証人
    prompt: |
      あなただけがこれを見たわけではありません。他に誰がここに立っていましたか？
      牧場主、先住民、写真家、旅行者。あなたの存在は、その場所をどのように変えますか？
      目撃することとは、何を意味しますか？
    follow_ups:
      - あなたが見ないで、彼らが見たものは何ですか？
      - あなたは何を持ち帰りますか？
      - 目撃することは、所有したり奪ったりすることとどのように異なりますか？
  - id: the_next_year
    name: 来年
    prompt: |
      この開花は、正確には繰り返されません。来年は干ばつ、あるいは火災、
      あるいは異なる種類の植物の混合かもしれません。
      一年後に戻ることを想像してください。何を見つけたいと思いますか？
      何を失うことを覚悟しますか？
    follow_ups:
      - この瞬間をかけがえのないものにしているのは何ですか？
      - あなたの未来の自分に、何を伝えますか？
      - 儚さは、体験をどのように深めますか？
  - id: texture_and_touch
    name: テクスチャーと触感
    prompt: |
      花々を手で撫でると、どんな感触でしょうか？柔らかい花びら、脆い茎、粘り気のある花粉、
      ざらざらした葉。触れることなくテクスチャーを想像してください—あるいは、許可されている場所では、
      優しく触れて、注意深く見てください。
    follow_ups:
      - どのテクスチャーが最も驚かせますか？
      - 何を触るのを避けますか—そしてその理由は？
      - テクスチャーは、色だけでは伝えられないものをどのように加えますか？
  - id: before_and_after
    name: 前と後
    prompt: |
      乾季のこの丘を想像してください—茶色で、休眠状態で、見かけ上死んでいます。
      今、両方のイメージを保持してください：前と後。
      その対比は、回復力、忍耐、そして変容について何を明らかにしますか？
    follow_ups:
      - 乾季だけを見た人は、何を失いますか？
      - 休眠の記憶は、開花をどのように豊かにしますか？
      - これによって、他にどんな「前と後」の瞬間が呼び起こされますか？
  - id: make_it_a_mixtape
    name: ミックステープにしよう
    prompt: |
      この風景に、どんな音楽が伴うでしょうか？スーパーブルームのプレイリストを作りましょう。
      どんなテンポ、どんなムード、どんな楽器？花々にサウンドトラックを提案させてください。
    follow_ups:
      - オープニングトラックは何ですか？
      - 音楽と花々を結びつける質は何ですか—リズム、色、感情？
      - 一日の時間帯によって、プレイリストはどのように変わりますか？
  - id: take_one_thing_home
    name: 一つだけ持ち帰ろう
    prompt: |
      花を持ち帰ることはできません—それらはここに属しています。
      しかし、記憶、感覚、疑問を持ち帰ることができます。
      あなたは、何一つ持ち帰りますか？一輪の花も摘まずに、それをどのように保持しますか？
    follow_ups:
      - 来られなかった人に、何を見せますか？
      - 後でどのように説明しますか？
      - 意図的に、何を後に残しますか？
