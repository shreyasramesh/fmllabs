# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулінарна лабораторія — Китай (Ukrainian)

id: culinary_lab_chinese
name: Кулінарна лабораторія — Китай
description: 50 карток, щоб змінити ваш досвід китайської їжі — від хімії вок-хей та археології сої до хореографії круглого столу та наративу бенкету.
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: Вок-хей
    prompt: |
      Вок-хей — подих воку — це невловимий дим, що походить від екстремальної температури та швидкості. Це не зовсім димність; це трансформація.
      Чи можете ви його відчути? Якою була б смажена страва без нього?
    follow_ups:
      - Як хей формує страву?
      - Що його створює? Що його руйнує?
      - Який зв'язок між температурою та поспіхом?
  - id: chn_round_table
    name: Круглий стіл
    prompt: |
      Китайський бенкетний стіл круглий — з обертовою центральною тарілкою. Їжа обертається. Кожен тягнеться. Стіл — це хореографія. Хто обертає? Хто чекає?
      Які unspoken правила?
    follow_ups:
      - Що б означав прямокутний стіл?
      - Як кругла форма формує страву?
      - Який зв'язок між центром і краєм?
  - id: chn_soy_archeology
    name: Археологія сої
    prompt: |
      Соєвий соус — ферментований, витриманий, регіональний. Світлий, темний, грибний, подвійно-чорний.
      Він звідкись походить. Це зайняло час. Відстежте пляшку. Яку подорож вона здійснила? Чим жертвує промисловий соус?
    follow_ups:
      - Як походження формує наливання?
      - Якою була б страва без сої?
      - Який зв'язок між ферментацією та умамі?
  - id: chn_chopstick_grip
    name: Захоплення паличками
    prompt: |
      Палички розширюють руку. Рис, слизька локшина, пельмені — кожен вимагає різної техніки. Зверніть увагу на свій хват. Що вимагає посуд? Що він дозволяє?
    follow_ups:
      - Що б змінило виделка?
      - Як паличка формує шматок?
      - Який зв'язок між інструментом і темпом?
  - id: chn_dumpling_seam
    name: Шов пельменя
    prompt: |
      Зморшки пельменів — згин, шов. Цзяоцзи, шумай, сяолунбао — кожен має свою форму. Шов тримає або випускає. Дослідіть один. Що б означав вибух? Що захищає згин?
    follow_ups:
      - Як згин формує начинку?
      - Що б втратив відкритий пельмень?
      - Який зв'язок між швом і супом?
  - id: chn_tea_pour
    name: Наливання чаю
    prompt: |
      Китайський чай — наливається, поповнюється, ділиться. Чайник циркулює. Порожні чашки наповнюються перед запитанням. Наливання — це сервіс і турбота. Зверніть увагу на ритм.
      Якою була б страва без чаю?
    follow_ups:
      - Як чай формує темп?
      - Що комунікує наливання?
      - Який зв'язок між чашкою та столом?
  - id: chn_bone_plate
    name: Тарілка для кісток
    prompt: |
      Маленька тарілка для кісток — викинуті оболонки, курячі кістки, креветкові шкарлупи.
      Тарілка збирає те, що неїстівне. Це частина сервірування. Що дозволяє тарілка для кісток? Що станеться без неї?
    follow_ups:
      - Як тарілка формує страву?
      - Як би виглядав стіл без неї?
      - Який зв'язок між викиданням та гідністю?
  - id: chn_soup_spoon
    name: Ложка для супу
    prompt: |
      Китайська ложка для супу — широка, пласка, керамічна. Вона тримає бульйон та тверді інгредієнти.
      Ложка по-іншому прилягає до рота. Зверніть увагу на ковток. Що дозволяє форма?
    follow_ups:
      - Що б змінило кругла ложка?
      - Як ложка формує ковток?
      - Який зв'язок між формою та функцією?
  - id: chn_steam_basket
    name: Парова корзина
    prompt: |
      Дімсам подається в бамбукових кошиках — складених, шарованих. Пара піднімається.
      Кошик тримає форму. Розгляньте бамбук. Що б зробило б метал інакше? Що додає бамбук?
    follow_ups:
      - Як кошик формує пельмень?
      - Що б втратила тарілка?
      - Який зв'язок між бамбуком і парою?
  - id: chn_maillard_wok
    name: Майяр у воку
    prompt: |
      Вок досягає температур, які не можуть досягти домашні плити. Обсмажування миттєве.
      Білки коричневіють за секунди. Розгляньте хімію. Чим пожертвувало б нижче тепло? Що вимагає вок?
    follow_ups:
      - Як тепло формує смак?
      - Що б зробила електрична плита інакше?
      - Який зв'язок між полум'ям і скоринкою?
  - id: chn_glutinous_texture
    name: Клейка текстура
    prompt: |
      Клейкий рис — липкий, жувальний — має іншу хімію. Він використовується для
      цзунцзи, ло май гай, десертів. Зверніть увагу на текстуру. Чим вона відрізняється від довгозернистого? Що дозволяє липкість?
    follow_ups:
      - Що б зробив звичайний рис?
      - Як текстура формує страву?
      - Який зв'язок між липкістю та обгорткою?
  - id: chn_century_egg
    name: Столітнє яйце
    prompt: |
      Столітнє яйце — консервоване, трансформоване. Жовток темний, білок напівпрозорий.
      Хімія стародавня. Розгляньте консервацію. Що робить час?
      Що б означала свіжість?
    follow_ups:
      - Як консервація формує смак?
      - Яким би було яйце свіжим?
      - Який зв'язок між часом і трансформацією?
  - id: chn_oyster_sauce
    name: Устричний соус
    prompt: |
      Устричний соус — умамі, густий, кантонський. Це редукція та екстракція.
      Устриця віддає свою есенцію. Відстежте смак. Якою була б смажена страва без нього?
    follow_ups:
      - Як соус формує страву?
      - Який зв'язок між устрицею та овочем?
      - Що б зробив соєвий соус замість нього?
  - id: chn_ordering_ritual
    name: Ритуал замовлення
    prompt: |
      Замовлення в китайському ресторані — господар обирає, або стіл домовляється.
      Баланс: м'ясо, овочі, суп, рис. Порядок — це композиція. Зверніть увагу, хто вирішує.
      Які правила?
    follow_ups:
      - Як замовлення формує страву?
      - Що б кожен замовив собі?
      - Який зв'язок між вибором і колективом?
  - id: chn_crispy_skin
    name: Хрустка шкіра
    prompt: |
      Шкіра качки по-пекінськи — хрустка, глазурована. Або тріскіт кантонської смаженої свинини. Шкіра — це свідоме рішення. Тепло, повітря, цукор. Розгляньте архітектуру.
      Що б означала млява шкіра?
    follow_ups:
      - Як хрусткість формує шматок?
      - Що створює хрускіт?
      - Який зв'язок між шкірою та м'ясом?
  - id: chn_noodle_slip
    name: Ковзання локшини
    prompt: |
      Китайська локшина — пшенична, рисова, витягнута вручну — має різну текстуру. Деякі ковзають;
      деякі жуються. Те, як локшина тягнеться паличками. Зверніть увагу на опір. Що додає ковзання?
    follow_ups:
      - Як текстура формує поїдання?
      - Що б втратила розварена локшина?
      - Який зв'язок між ковзанням і задоволенням?
  - id: chn_bok_choy_wilt
    name: В'янення пак-чой
    prompt: |
      Пак-чой у воку — секунди. Він в'яне, але зберігає структуру. Зелень пом'якшується.
      Розгляньте трансформацію. Що б означало сире? Що б втратило пересмажене?
    follow_ups:
      - Як в'янення формує овоч?
      - Який зв'язок між теплом і зеленню?
      - Коли це готово?
  - id: chn_five_spice
    name: П'ять спецій
    prompt: |
      Суміш п'яти спецій — бадьян, гвоздика, кориця, сичуаньський перець, фенхель.
      Це суміш з історією. Кожна спеція має свій шлях. Відстежте один. Яку подорож він здійснив?
    follow_ups:
      - Якою була б страва без неї?
      - Як суміш створює ідентичність?
      - Який зв'язок між спецією та збереженням?
  - id: chn_banquet_progression
    name: Прогресія бенкету
    prompt: |
      Китайський бенкет має дугу — спочатку холодні страви, потім гарячі, суп, рис, десерт.
      Прогресія — це розповідь. Зверніть увагу на ритм. Що б зробив інший порядок?
    follow_ups:
      - Як послідовність формує страву?
      - Який зв'язок між першим і останнім?
      - Коли історія досягає кульмінації?
  - id: chn_white_rice_center
    name: Білий рис у центрі
    prompt: |
      Білий рис — простий, приготований на пару — це основа страви. Це полотно. Щоб збалансувати насичені страви, потрібен рис. Зверніть увагу, коли ви до нього тягнетеся.
      Якою була б страва без простого рису?
    follow_ups:
      - Як рис формує смакові відчуття?
      - Що б зробив смажений рис?
      - Який зв'язок між нейтральним і смаком?
  - id: chn_szechuan_numb
    name: Сичуаньське оніміння
    prompt: |
      Сичуаньський перець — ма ла — оніміючий, поколюючий. Це не гострота; це відчуття.
      Рот гуде. Розгляньте відчуття. Якою була б страва без оніміння?
    follow_ups:
      - Як ма ла формує досвід?
      - Який зв'язок між онімінням і гостротою?
      - Чому їх поєднують?
  - id: chn_dark_soy
    name: Темний соєвий соус
    prompt: |
      Темний соєвий соус — густіший, солодший, для кольору. Він фарбує рис, глазурує м'ясо.
      Це не для солі; це для відтінку. Розгляньте візуальний аспект. Що додає темний колір?
    follow_ups:
      - Що б зробив світлий соєвий соус?
      - Як колір формує очікування?
      - Який зв'язок між темним і карамеллю?
  - id: chn_hot_plate
    name: Гаряча тарілка
    prompt: |
      Шкварюючі тарілки — яловичина, кальмари — прибувають шиплячи. Залізна тарілка продовжує готувати.
      Звук — це театр. Якою була б страва без шипіння? Як гаряча тарілка продовжує приготування?
    follow_ups:
      - Як шипіння формує досвід?
      - Що б означала холодна тарілка?
      - Який зв'язок між звуком і теплом?
  - id: chn_congee_soft
    name: М'яка конджі
    prompt: |
      Конджі — рисовий пудинг — м'який, заспокійливий. Довго варений рис розпадається.
      Текстура — це розслаблення. Розгляньте трансформацію. Що б означало "аль денте" тут?
    follow_ups:
      - Як м'якість формує страву?
      - Що б зробила густа конджі?
      - Який зв'язок між водою та рисом?
  - id: chn_glass_noodle
    name: Скляна локшина
    prompt: |
      Скляна локшина — з крохмалю бобів мунг — прозора, слизька. Вона вбирає смак.
      Зверніть увагу на текстуру. Що б зробила пшенична локшина? Чому прозорість має значення?
    follow_ups:
      - Як локшина формує страву?
      - Який зв'язок між прозорістю та поглинанням?
      - Чому скляна?
  - id: chn_xlb_burst
    name: Вибух сяолунбао
    prompt: |
      Сяолунбао — пельмень із супом — містить бульйон всередині. Перший ковток може обпекти або прорвати.
      Техніка: надкусити, випити, з'їсти. Розгляньте ризик. Що б означало холодне сяолунбао?
    follow_ups:
      - Як суп формує досвід?
      - Що б ви втратили без вибуху?
      - Який зв'язок між температурою та небезпекою?
  - id: chn_tea_smell
    name: Аромат чаю
    prompt: |
      Улун, жасмин, пу-ер — кожен чай має різний аромат. Понюхайте перед ковтком.
      Аромат — це половина досвіду. Що обіцяє запах? Що він доставляє?
    follow_ups:
      - Як запах формує ковток?
      - Яким би був чай без аромату?
      - Який зв'язок між заварюванням і запахом?
  - id: chn_crab_crack
    name: Тріск краба
    prompt: |
      Краб на китайському бенкеті — подаються щипці. Тріск — це звук і праця.
      М'ясо видобувається. Розгляньте хореографію. Що б означало попередньо розколоте?
    follow_ups:
      - Як тріск формує страву?
      - Що б ви втратили без зусилля?
      - Який зв'язок між зусиллям і винагородою?
  - id: chn_turn_table
    name: Обертовий стіл
    prompt: |
      Обертова тарілка — хто її обертає? Коли? Страва, яку ви хочете, може бути попереду.
      Обертання — це етикет. Зверніть увагу на танець. Які правила? Коли ви чекаєте?
    follow_ups:
      - Як обертання формує страву?
      - Що б означали стаціонарні страви?
      - Який зв'язок між обертанням і діленням?
  - id: chn_ginger_slice
    name: Скибочка імбиру
    prompt: |
      Імбир до морепродуктів — тонкі скибочки, іноді обсмажені. Він нейтралізує рибний запах.
      Імбир — це і прикраса, і функція. Розгляньте його роль. Якою була б риба без нього?
    follow_ups:
      - Як імбир формує смакові відчуття?
      - Який зв'язок між скибочкою і ароматом?
      - Чому імбир до морепродуктів?
  - id: chn_hoisin_dip
    name: Соус хойсин для занурення
    prompt: |
      Хойсин до качки по-пекінськи — занурення — це ритуал. Млинець, качка, цибуля, соус.
      Кожен елемент має своє місце. Розгляньте композицію. Що б зробила відсутність одного елемента?
    follow_ups:
      - Як занурення формує шматок?
      - Що б зробив інший соус?
      - Який зв'язок між солодким і качкою?
  - id: chn_leaf_wrap
    name: Обгортка з листя
    prompt: |
      Обгортка з салату — подрібнене м'ясо, трави, соус, загорнуті в листя. Листя — це
      оболонка та текстура. Обгортка — це ручна робота. Розгляньте архітектуру.
      Що б зробила тортилья?
    follow_ups:
      - Як листя формує шматок?
      - Що б зробила тарілка?
      - Який зв'язок між обгорткою та рукою?
  - id: chn_fish_whole
    name: Риба ціла
    prompt: |
      Ціла риба — приготована на пару, з головою і хвостом. Риба подається цілком.
      Голова має значення. Розгляньте подачу. Чим би пожертвував філе?
    follow_ups:
      - Як цілісність формує страву?
      - Що означає голова?
      - Який зв'язок між цілим і повагою?
  - id: chn_scallion_oil
    name: Олія з цибулі-шалот
    prompt: |
      Олія з цибулі-шалот — шипляча олія на подрібненій цибулі-шалот та імбирі. Це
      заправка, завершення. Олія несе аромати. Зверніть увагу, коли вона застосовується.
      Що додає шипіння?
    follow_ups:
      - Якою була б страва без неї?
      - Як олія формує завершення?
      - Який зв'язок між олією та ароматом?
  - id: chn_black_vinegar
    name: Чорний оцет
    prompt: |
      Оцет Чіньк'янь — темний, складний, злегка солодкий. Він нейтралізує насиченість. Кілька крапель змінюють пельмень.
      Розгляньте кислотність. Що б зробив рисовий оцет? Що додає темний колір?
    follow_ups:
      - Як оцет формує шматок?
      - Якою була б пельмень без нього?
      - Який зв'язок між оцтом і балансом?
  - id: chn_sticky_rice
    name: Клейкий рис
    prompt: |
      Клейкий рис у листі лотоса — ло май гай. Листя надає смаку. Рис
