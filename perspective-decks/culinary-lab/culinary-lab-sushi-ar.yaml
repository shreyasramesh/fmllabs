# معمل الطهي — السوشي (Arabic)

id: culinary_lab_sushi
name: معمل الطهي — السوشي
description: 50 بطاقة لتغيير طريقة تجربتك للسوشي — من كيمياء الأرز والسمك إلى رقصة المنضدة وعلم الآثار لأصل كل نِيتَا.
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: درجة حرارة الأرز
    prompt: |
      أرز السوشي دافئ — درجة حرارة الجسم تقريبًا. ليس باردًا. الدفء يحمل
      الخل. اشعر به. ماذا سيفعل الأرز البارد؟ كيف تشكل درجة الحرارة
      اللقمة؟
    follow_ups:
      - ماذا سيضحي به أرز درجة حرارة الغرفة؟
      - كيف يحمل الدفء النكهة؟
      - ما هي العلاقة بين درجة الحرارة والملمس؟
  - id: sush_shari_balance
    name: توازن الشاري
    prompt: |
      الشاري — الأرز — هو نصف السوشي. توازن الخل والملح والسكر دقيق.
      تذوق الأرز وحده. ماذا يحضر؟ ماذا يعني الأرز الباهت؟
    follow_ups:
      - كيف يشكل الأرز النِيتَا؟
      - ماذا سيفعل الكثير من الخل؟
      - ما هي العلاقة بين الشاري والنِيتَا؟
  - id: sush_counter_ritual
    name: طقس المنضدة
    prompt: |
      أوماكاسي على المنضدة — تواجه الشيف. يصل السوشي قطعة بقطعة.
      المنضدة مسرح. لاحظ الرقصة. ما هو الإيقاع؟ من يحدد السرعة؟
    follow_ups:
      - ماذا سيغير المائدة؟
      - كيف تشكل المنضدة الوجبة؟
      - ما هي العلاقة بين الشيف والضيف؟
  - id: sush_net_origin
    name: أصل النِيتَا
    prompt: |
      كل نِيتَا — الإضافة — جاءت من مكان ما. تويوسو. تسوكيجي. قارب. مزرعة.
      اسأل. تتبع السمك. ما هي الرحلة التي قام بها؟ ماذا يعني التجميد من
      المستودع؟
    follow_ups:
      - كيف يشكل الأصل القطعة؟
      - ماذا ستفعل مصدر آخر؟
      - ما هي العلاقة بين المكان والجودة؟
  - id: sush_wasabi_hidden
    name: الواسابي المخفي
    prompt: |
      الواسابي الحقيقي — جذر مبشور — نادر. معظمه فجل حصان وصباغ.
      لكن عندما يكون حقيقيًا، يكون مختلفًا. حاد، أخضر، عابر. لاحظ الحرارة.
      ماذا سيضيف المزيف؟ يطرح؟
    follow_ups:
      - كيف يشكل الواسابي اللقمة؟
      - ماذا يعني عدم وجود الواسابي؟
      - ما هي العلاقة بين الحرارة والسمك؟
  - id: sush_finger_over_chopstick
    name: الإصبع فوق عيدان تناول الطعام
    prompt: |
      يؤكل النيجيري تقليديًا بالأصابع — وليس بعيدان تناول الطعام. تشعر
      الأصابع بالحرارة، والملمس. جربها. ماذا يضيف الإصبع ولا تستطيع عيدان
      تناول الطعام إضافته؟
    follow_ups:
      - كيف تشكل اليد التجربة؟
      - ماذا ستفعل عيدان تناول الطعام؟
      - ما هي العلاقة بين اللمس والتذوق؟
  - id: sush_piece_by_piece
    name: قطعة بقطعة
    prompt: |
      يصل السوشي قطعة واحدة في كل مرة — أو اثنتين. السرعة متعمدة. تأكل؛
      تنتظر. فكر في الإيقاع. ماذا ستضحي به طبق من عشر قطع دفعة واحدة؟
    follow_ups:
      - كيف تشكل السرعة الوجبة؟
      - ماذا ستفعل السرعة؟
      - ما هي العلاقة بين القطعة والانتباه؟
  - id: sush_gari_palate
    name: الجاري للحنك
    prompt: |
      الجاري — الزنجبيل المخلل — ينظف بين القطع. إنه ليس زينة؛ إنه إعادة
      ضبط. لاحظ متى تأكله. ماذا ستفعل القطع المتتالية بدون جاري للحنك؟
    follow_ups:
      - كيف يشكل الجاري التقدم؟
      - ماذا يعني عدم وجود الجاري؟
      - ما هي العلاقة بين إعادة الضبط والتذوق؟
  - id: sush_soy_minimal
    name: صلصة الصويا بشكل متقشف
    prompt: |
      صلصة الصويا — غمس خفيف، جانب السمك لأسفل. ليس الأرز. سيمتص الأرز
      الكثير. ربما يكون الشيف قد مسح صلصة الصويا بالفعل. لاحظ. ماذا سيفعل
      الغرق؟
    follow_ups:
      - كيف تشكل صلصة الصويا القطعة؟
      - ماذا يعني عدم وجود صلصة الصويا؟
      - ما هي العلاقة بين الغمس والتوازن؟
  - id: sush_knife_matters
    name: السكين مهم
    prompt: |
      سكين السوشي — ذو شفرة واحدة، حاد. القطع يؤثر على الملمس. عكس اتجاه
      الألياف أو معها. الزاوية. فكر فيما تفعله الشفرة. ماذا ستضحي به سكين
      غير حادة؟
    follow_ups:
      - كيف تشكل القطع السمك؟
      - ماذا ستفعل زاوية مختلفة؟
      - ما هي العلاقة بين الشفرة وإحساس الفم؟
  - id: sush_otoro_fat
    name: دهن الأوتورو
    prompt: |
      الأوتورو — أسمك تونة — يذوب. الدهن هو الهدف. فكر في التعريق. ماذا
      ستفعل الأكامي قليلة الدهن؟ كيف يشكل الدهن التجربة؟
    follow_ups:
      - ماذا ستكون القطعة بدون الدهن؟
      - كيف يخلق التعريق الرفاهية؟
      - ما هي العلاقة بين الدهن والذوبان؟
  - id: sush_unagi_glaze
    name: طبقة الأوناجي
    prompt: |
      الأوناجي — ثعبان البحر — يُدهن بصلصة حلوة، وأحيانًا يُشوى مرة أخرى.
      الطبقة ورنيش. فكر في اللمعان. ماذا يعني ثعبان البحر غير المدهون؟
    follow_ups:
      - كيف تشكل الطبقة القطعة؟
      - ما هي العلاقة بين الحلو وثعبان البحر؟
      - لماذا الطبقة؟
  - id: sush_nori crisp
    name: قرمشة النوري
    prompt: |
      نوري للموكي — محمص، مقرمش، أم طري؟ يختار الشيف المختلفون
      بشكل مختلف. يؤثر النوري على اللقمة. فكر في الملمس. ماذا سيفعل النوري
      اللزج؟
    follow_ups:
      - كيف يشكل النوري اللفافة؟
      - ماذا يعني تحميص مختلف؟
      - ما هي العلاقة بين القرمشة والانتعاش؟
  - id: sush_silence_counter
    name: الصمت على المنضدة
    prompt: |
      بعض مناضد السوشي هادئة — تركيز، احترام. والبعض الآخر حيوي. لاحظ
      البيئة الصوتية. ماذا يضيف الصمت؟ ماذا تضيف المحادثة؟
    follow_ups:
      - كيف يشكل الصوت الوجبة؟
      - ماذا ستفعل الموسيقى الصاخبة؟
      - ما هي العلاقة بين الهدوء والتركيز؟
  - id: sush_tamago_sweet
    name: حلاوة التاماغو
    prompt: |
      التاماغو — كاسترد البيض — غالبًا ما ينهي الوجبة. إنه حلو، طبقات.
      مهارة الشيف مرئية. فكر في النهاية. ماذا يعني السمك النيء كآخر قطعة؟
    follow_ups:
      - كيف تشكل التاماغو النهاية؟
      - ما هي العلاقة بين الحلاوة والخاتمة؟
      - لماذا البيض أخيراً؟
  - id: sush_tuna_spectrum
    name: طيف التونة
    prompt: |
      أكامي، تشوتورو، أوتورو — قليل الدهن إلى دهني. الطيف متعمد. تذوقها
      بالترتيب إن استطعت. كيف يعمل التقدم؟ ماذا تقدم كل منها؟
    follow_ups:
      - كيف يشكل الدهن الطيف؟
      - ماذا يعني درجة واحدة وحدها؟
      - ما هي العلاقة بين قليل الدهن والغني؟
  - id: sush_ume_shiso
    name: أومي شيزو
    prompt: |
      أومي — خوخ مخلل — وشيزو في بعض اللفائف. حامض، عشبي. يقطعان
      الدهون. لاحظ متى تظهر. ماذا ستكون اللفافة بدونها؟
    follow_ups:
      - كيف يشكل الأومي اللقمة؟
      - ما هي العلاقة بين الحامض والسمك؟
      - لماذا الشيزو؟
  - id: sush_gunkan_hold
    name: مسكة الغونكان
    prompt: |
      الغونكان — سفينة حربية — تحمل إضافات سائبة. بطارخ، قنفذ البحر. يحيط
      بها النوري. فكر في الشكل. ماذا ستفعل قطعة مسطحة؟
    follow_ups:
      - كيف يشكل الشكل الإضافة؟
      - ماذا يعني وعاء مختلف؟
      - ما هي العلاقة بين المسكة والانسكاب؟
  - id: sush_uni_risk
    name: مخاطرة أوني
    prompt: |
      الأوني — قنفذ البحر — مستقطب. حلو، مالح، ملمس. يمكن أن يكون مثاليًا
      أو سيئًا. فكر في المخاطرة. ماذا يعني سلمون آمن؟ ماذا تضيف المخاطرة؟
    follow_ups:
      - كيف يشكل الأوني التجربة؟
      - ماذا ستخسر بدون المخاطرة؟
      - ما هي العلاقة بين الاستقطاب والذكرى؟
  - id: sush_chef_choice
    name: اختيار الشيف
    prompt: |
      أوماكاسي — اختيار الشيف. تسلم السيطرة. يقرأ الشيف اليوم، والسمك،
      وأنت. فكر في الثقة. ماذا سيغير اختيارك بنفسك؟
    follow_ups:
      - كيف تشكل الاستسلام الوجبة؟
      - ماذا يعني طلب قائمة؟
      - ما هي العلاقة بين الثقة والتجربة؟
  - id: sush_sake_pair
    name: اقتران الساكي
    prompt: |
      الساكي مع السوشي — بارد، دافئ، معتق. الاقتران مدروس. لاحظ متى
      تشرب. هل ينظف؟ يعزز؟ فكر في دور المشروب.
    follow_ups:
      - كيف يشكل الساكي القطعة؟
      - ماذا ستفعل النبيذ؟
      - ما هي العلاقة بين الأرز ونبيذ الأرز؟
  - id: sush_ikura_pop
    name: فرقعة الإيكورا
    prompt: |
      الإيكورا — بطارخ السلمون — تفرقع. الفرقعة ملمس وملوحة. فكر في
      الإحساس. ماذا ستفعل البطارخ المطبوخة؟ كيف تشكل الفرقعة اللقمة؟
    follow_ups:
      - ماذا ستكون القطعة بدون الفرقعة؟
      - كيف يخلق الملمس المتعة؟
      - ما هي العلاقة بين الفرقعة والملح؟
  - id: sush_hirame_chew
    name: مضغة الهيرامي
    prompt: |
      الهيرامي — سمك موسى — له مضغة مختلفة عن التونة. إنه قليل الدهن،
      رقيق. لاحظ الملمس. ماذا ستفعل الأسماك الدهنية؟ كيف تختلف المضغة؟
    follow_ups:
      - كيف يشكل الملمس القطعة؟
      - ما هي العلاقة بين قليل الدهن والرقة؟
      - لماذا تطلب الهيرامي؟
  - id: sush_amaebi_head
    name: رأس الأماإيبي
    prompt: |
      الأماإيبي — الروبيان الحلو — يُقدم أحيانًا مع رأس مقلي. الرأس مقرمش،
      أومامي. فكر في استخدام الكل. ماذا سيضحي به الروبيان بدون رأس؟
    follow_ups:
      - كيف يشكل الرأس الطبق؟
      - ما هي العلاقة بين الكل والاحترام؟
      - لماذا قلي الرأس؟
  - id: sush_mirin_gloss
    name: لمعان الميرين
    prompt: |
      تُدهن بعض القطع بنيكيري — صلصة صويا، ميرين، ساكي. اللمعان
      هو اللمسة النهائية. الشيف قام بتتبيلها. فكر فيما إذا كنت ستضيف المزيد
      من صلصة الصويا. ماذا سيفعل الإفراط في الغمس؟
    follow_ups:
      - كيف تشكل الفرشاة القطعة؟
      - ماذا يعني عدم وجود الفرشاة؟
      - ما هي العلاقة بين يد الشيف ويدك؟
  - id: sush_anago_soft
    name: نعومة الأناجو
    prompt: |
      الأناجو — ثعبان البحر في المياه المالحة — أنعم من الأوناجي. أنواع
      مختلفة، تحضير مختلف. لاحظ الملمس. ماذا ستفعل صلابة الأوناجي؟
    follow_ups:
      - كيف تشكل النعومة القطعة؟
      - ما هي العلاقة بين الأناجو والأوناجي؟
      - لماذا كلا الثعبانين؟
  - id: sush_saba_silver
    name: فضة السابا
    prompt: |
      السبا — الماكريل — غالبًا ما يُخلل. الجلد الفضي، اللحم الزيتي. إنه
      قوي. فكر في الحفظ. ماذا يعني الماكريل النيء؟
    follow_ups:
      - كيف يشكل التخليل السمك؟
      - ما هي العلاقة بين الزيت والتخليل؟
      - لماذا يُخلل السبا؟
  - id: sush_ginger_between
    name: الزنجبيل بين القطع
    prompt: |
      الجاري بين القطع — إعادة الضبط. لكن متى؟ بعد كل قطعة؟ بعد عدة
      قطع؟ الإيقاع خاص بك. لاحظ نمطك. ماذا يعني عدم وجود إعادة ضبط؟
    follow_ups:
      - كيف يشكل التوقيت الجاري؟
      - ما هي العلاقة بين القطعة والقطعة؟
      - متى تحتاج إعادة ضبط؟
  - id: sush_maki_cut
    name: قطع الماكي
    prompt: |
      الماكي — اللفائف — تُقطع إلى قطع. ستة أو ثمانية. القطع يؤثر على
      المقطع العرضي. فكر في اللولب. ماذا ستفعل قطعة مختلفة؟
    follow_ups:
      - كيف تشكل القطع اللقمة؟
      - ماذا يعني قطع أقل؟
      - ما هي العلاقة بين الشريحة والكل؟
  - id: sush_tobiko_crunch
    name: قرقشة التوبيكو
    prompt: |
      التوبيكو — بطارخ سمك الطائر — تضيف القرمشة واللون. إنها إضافة،
      زينة. لاحظ متى تظهر. ماذا ستكون اللفافة بدونها؟
    follow_ups:
      - كيف يشكل التوبيكو اللقمة؟
      - ما هي العلاقة بين القرمشة واللون؟
      - لماذا سمك الطائر؟
  - id: sush_sashimi_contrast
    name: تباين الساشيمي
    prompt: |
      الساشيمي — بدون أرز — يسمح للسمك بالظهور بمفرده. النقاء مختلف.
      قارن الساشيمي بالنيجيري. ماذا يضيف الأرز؟ ماذا يكشف غيابه؟
    follow_ups:
      - كيف يشكل الأرز النيجيري؟
      - ماذا يعني كل الساشيمي؟
      - ما هي العلاقة بين السمك والأرز؟
  - id: sush_tea_rinse
    name: شطف الشاي
    prompt: |
      الشاي الأخضر على منضدة السوشي — يُعاد ملؤه، يُشارك. إنه ينظف.
      الشاي جزء من الإيقاع. فكر في دوره. ماذا ستفعل الماء؟ ماذا يعني عدم
      وجود مشروب؟
    follow_ups:
      - كيف يشكل الشاي الوجبة؟
      - ما هي العلاقة بين الشاي وإعادة الضبط؟
      - لماذا الشاي الأخضر؟
  - id: sush_bengara_tuna
    name: تونة البنغارا
    prompt: |
      البنغارا — تونة قليلة الدهن، غالبًا من الظهر — أغمق. النكهة مختلفة
      عن الأكامي. فكر في القطع. أي جزء من السمك؟ ماذا يفعل الموقع؟
    follow_ups:
      - كيف تشكل القطع النكهة؟
      - ما هي العلاقة بين الموقع والتذوق؟
      - لماذا هذه القطعة؟
  - id: sush_kohada_cure
    name: تخليل الكوهادا
    prompt: |
      الكوهادا — سمك الشاد — يُخلل، وأحيانًا يُتبل بالخل. إنه اختبار
      للشيف. الجلد الفضي، التوازن. فكر في المهارة. ماذا يعني غير مخلل؟
    follow_ups:
      - كيف يشكل التخليل السمك؟
      - ما هي العلاقة بين الخل والجلد الفضي؟
      - لماذا هو اختبار؟
  - id: sush_engawa_fin
    name: زعنفة الإنغوا
    prompt: |
      الإنغوا — عضلة الزعنفة لسمك موسى — تُقدر. لها ملمس مميز.
      فكر في الجزء. ماذا ستفعل الهيرامي العادية؟ كيف تختلف الزعنفة؟
    follow_ups:
      - كيف تشكل القطع القطعة؟
      - ما هي العلاقة بين الزعنفة والعضلة؟
      - لماذا تُقدر؟
  - id: sush_first_piece
    name: القطعة الأولى
    prompt: |
      القطعة الأولى تحدد النغمة. غالبًا شيء خفيف — ربما هيرامي أو تاي.
      الشيف يقوم بمعايرة. فكر في البداية. ماذا يعني أوتورو أولاً؟
    follow_ups:
      - كيف تحدد الأولى الوجبة؟
      - ما هي العلاقة بين الأولى والتقدم؟
      - لماذا البداية الخفيفة؟
  - id: sush_kampachi_fat
    name: دهن الكامباتشي
    prompt: |
      الكامباتشي — سمك القاروص الصغير — له دهن خفي. إنه بين قليل الدهن
      والغني. لاحظ المنطقة الوسطى. ماذا ستفعل البوري؟ ماذا ستفعل الأسماك
      قليلة الدهن؟
    follow_ups:
      - كيف يشكل الدهن القطعة؟
      - ما هي العلاقة بين العمر والدهن؟
