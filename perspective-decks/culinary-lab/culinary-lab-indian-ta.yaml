# சமையலறை ஆய்வகம் — இந்திய (Tamil)

id: culinary_lab_indian
name: சமையலறை ஆய்வகம் — இந்திய
description: இந்திய உணவை நீங்கள் அனுபவிக்கும் விதத்தை மாற்றியமைக்க 50 அட்டைகள்—மசாலாப் பொருட்களின் வேதியியல் மற்றும் வெப்பம் முதல், மூலப்பொருட்களின் தொல்லியல் மற்றும் பகிரப்பட்ட மேசையின் நடனம் வரை.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: தாளிப்பின் சத்தம்
    prompt: |
      தாளிப்பு—சூடான எண்ணெயில் கடுகு, சீரகம், கறிவேப்பிலை சேர்வது—இதுவே தொடக்க இசை. கேளுங்கள். இந்தச் சத்தம் ஒரு நிகழ்நேர வேதியியல். இதைச் சுவைக்கும் முன் கேட்கும்போது என்ன மாறுகிறது?
    follow_ups:
      - இந்த ஒலி எதிர்பார்ப்பை எப்படி உருவாக்குகிறது?
      - தாளிப்பு இல்லாமல் இந்த உணவு என்ன இழக்கும்?
      - ஒலிக்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: ind_spice_route
    name: மசாலாப் பாதைகள்
    prompt: |
      ஏலக்காய் கேரளாவிலிருந்து வந்தது. குங்குமப்பூ காஷ்மீரிலிருந்து. கருப்பு மிளகு ஒரு காலத்தில் தங்கத்தின் எடைக்கு சமமாக இருந்தது. உங்கள் தட்டில் உள்ள ஒரு மசாலாவின் மூலத்தைக் கண்டறியவும். அது உங்களை அடைய என்ன பயணம் செய்தது?
    follow_ups:
      - அதன் பாதையை அறிந்தால், சுவை எப்படி மாறும்?
      - அதே பாதையில் பயணித்த வேறு என்ன மசாலாக்கள் உள்ளன?
      - வர்த்தகத்திற்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: ind_thali_geometry
    name: தட்டின் வடிவியல்
    prompt: |
      தட்டு ஒரு ஓவியம்—வட்டமாக அடுக்கப்பட்ட கிண்ணங்கள், ஒவ்வொன்றும் ஒரு பங்குடன். அதன் அமைப்பைக் கவனியுங்கள். உங்கள் கண் முதலில் எங்கே விழுகிறது? வெற்று இடம் எங்கே உள்ளது?
    follow_ups:
      - ஒரு கிண்ணம் காணாமல் போனால் என்ன நடக்கும்?
      - இந்த அமைப்பு உணவை எப்படி வடிவமைக்கிறது?
      - வடிவியலுக்கும் சடங்குக்கும் என்ன தொடர்பு?
  - id: ind_hand_as_tool
    name: கையே ஒரு கருவி
    prompt: |
      ரோட்டியை கிள்ளி, சப்ஜியுடன் கலந்து, வாயில் போடுவது. கை ஒரு பாத்திரமாகவும், உணர்வியாகவும் செயல்படுகிறது. அதன் நடனத்தைக் கவனியுங்கள். கத்தி, முட்கரண்டி கொடுக்க முடியாததை தொடுதல் எப்படி சேர்க்கிறது?
    follow_ups:
      - கையால் சாப்பிடுவது எப்படி வேகத்தை மாற்றுகிறது?
      - வெள்ளிப் பாத்திரங்களால் என்ன இழக்கப்படும்?
      - தொடுவதற்கும் வெப்பநிலைக்கும் என்ன தொடர்பு?
  - id: ind_heat_layers
    name: காரத்தின் அடுக்குகள்
    prompt: |
      இந்திய காரம் அடுக்கடுக்கானது—மிளகாயின் எரிச்சல், மிளகின் இதமான சூடு, இஞ்சியின் தீவிரம். ஒரு கவளம் எடுத்து, ஒவ்வொரு காரமும் எங்கே தங்குகிறதென்று கவனியுங்கள். நாக்கு, தொண்டை, வயிறு. அவை எப்படி கட்டமைக்கப்படுகின்றன?
    follow_ups:
      - ஒரே ஒரு காரம் மட்டும் இருந்தால் இந்த உணவு எப்படி இருக்கும்?
      - அடுக்கடுக்காகச் சேர்ப்பது எப்படி சிக்கலை உருவாக்குகிறது?
      - காரத்திற்கும் காலத்திற்கும் என்ன தொடர்பு?
  - id: ind_yogurt_intervention
    name: தயிரின் தலையீடு
    prompt: |
      ரய்தா, தயிர், லஸ்ஸி—தயிர் குளிர்விக்கிறது, சமன்படுத்துகிறது, சுவையைக் கூட்டுகிறது. அதை நீங்கள் சேர்க்கும் தருணத்தைக் கவனியுங்கள். அமிலமும் கொழுப்பும், குளிரும் வெப்பமும் சந்திக்கின்றன. இந்த தலையீடு ஒரு வேதியியல் மாற்றம். இது எதை மாற்றுகிறது?
    follow_ups:
      - தயிர் இல்லாமல் உணவு எப்படி இருக்கும்?
      - இந்த முரண்பாடு எப்படி நிம்மதியை உருவாக்குகிறது?
      - தலையீட்டிற்கும் சமநிலைக்கும் என்ன தொடர்பு?
  - id: ind_betel_after
    name: பாக்கு இலைக்குப் பின்
    prompt: |
      சில பாரம்பரியங்களில், பாக்கு இலை—வெற்றிலை—உணவின் முடிவாக அமையும். அது இனிப்பு இல்லை. அது நிறைவு. சுவை மீண்டும் மாறுகிறது. இந்த முடிவு முழு உணவைப் பற்றி என்ன சொல்கிறது?
    follow_ups:
      - பாக்கு இலை எப்படி மாற்றத்தைக் குறிக்கிறது?
      - அது இல்லாமல் உணவு என்ன இழக்கும்?
      - முடிவுக்கும் நினைவிற்கும் என்ன தொடர்பு?
  - id: ind_street_chaos
    name: தெருவோரக் குழப்பம்
    prompt: |
      ஒரு சாட் கடைக்காரர் வேகமாக வேலை செய்கிறார்—பேல், பாப்ரி, சட்னிகள் நொடிகளில் அடுக்கப்படுகின்றன. அந்தக் காட்சியைப் பாருங்கள். அந்தக் கடை ஒரு நாடக மேடை. அதன் கதை என்ன? பார்வையாளர்கள் யார்?
    follow_ups:
      - அந்தக் காட்சி இல்லாமல் உணவு எப்படி இருக்கும்?
      - வேகம் அனுபவத்தை எப்படி வடிவமைக்கிறது?
      - குழப்பத்திற்கும் கைவினைத்திறனுக்கும் என்ன தொடர்பு?
  - id: ind_tandoor_breathe
    name: தந்தூரின் சுவாசம்
    prompt: |
      தந்தூர் சுவாசிக்கிறது—தீ, புகை, களிமண். நான் சுவரில் ஒட்டப்பட்டு, குமிழ்கள் வந்ததும் எடுக்கப்படுகிறது. அதன் அருகே நில்லுங்கள். வெப்பம், வாசனை. நெருப்புக்கும் சுவைக்கும் என்ன தொடர்பு?
    follow_ups:
      - தந்தூர் இல்லாமல் நான் எப்படி இருக்கும்?
      - களிமண் எப்படி சமையல்காரரை வடிவமைக்கிறது?
      - சுவாசம் மற்றும் ரொட்டிக்கு என்ன தொடர்பு?
  - id: ind_turmeric_stain
    name: மஞ்சள் கறை
    prompt: |
      மஞ்சள் கறை—விரல்கள், துணி, பிளாஸ்டிக். நிறம் நீடிக்கிறது. அது எதைக் குறிக்கிறது என்பதைக் கவனியுங்கள். அந்த கறை தொல்லியல். இந்த உணவு உங்களை அடைவதற்கு முன் எங்கே பயணித்தது?
    follow_ups:
      - நிறம் இல்லாமல் உணவு எப்படி இருக்கும்?
      - கறை எப்படி உழைப்பைக் குறிக்கிறது?
      - நிறமிக்கும் பாதுகாப்பிற்கும் என்ன தொடர்பு?
  - id: ind_rice_architecture
    name: அரிசியின் கட்டமைப்பு
    prompt: |
      பிரியாணி கட்டப்படுகிறது—அரிசி அடுக்கு, இறைச்சி அடுக்கு, குங்குமப்பூ, வறுத்த வெங்காயம். அதன் கட்டமைப்பு தாங்குவது. அதைக் கண்டறியுங்கள். அதன் கட்டமைப்பு ஒவ்வொரு கவளத்தையும் எப்படி பாதிக்கிறது?
    follow_ups:
      - அடுக்குகள் மிக விரைவில் கலந்தால் என்ன நடக்கும்?
      - கட்டமைப்பு எப்படி ஆச்சரியத்தை உருவாக்குகிறது?
      - கட்டுமானத்திற்கும் உண்பதற்கும் என்ன தொடர்பு?
  - id: ind_chutney_spectrum
    name: சட்னி நிறமாலை
    prompt: |
      புதினா, புளி, தேங்காய், தக்காளி—சட்னிகள் ஒரு வண்ணப் பலகை போல உள்ளன. ஒவ்வொன்றும் கவளத்தை மாற்றுகிறது. ஒரே உணவை மூன்று சட்னிகளுடன் சுவைக்கவும். அதே அடிப்படை எப்படி மூன்று வெவ்வேறு கதைகளாக மாறுகிறது?
    follow_ups:
      - ஒரே ஒரு சட்னி மட்டும் இருந்தால் உணவு எப்படி இருக்கும்?
      - தேர்வு எப்படி உரிமையை உருவாக்குகிறது?
      - நிறமாலைக்கும் விருப்பத்திற்கும் என்ன தொடர்பு?
  - id: ind_steam_rising
    name: நீராவி எழுகிறது
    prompt: |
      இட்லி, தோசை, பூரி—மூடியை உயர்த்தும்போது நீராவி எழுகிறது. அதைக் கவனியுங்கள். நீராவி சுவைக்கு முன் நறுமணத்தைக் கொண்டுவருகிறது. எது முதலில் வருகிறது? மூக்கா அல்லது வாயா?
    follow_ups:
      - நீராவி எப்படி எதிர்பார்ப்பை உருவாக்குகிறது?
      - மூடியைத் தூக்காமல் என்ன இழக்கப்படும்?
      - நீராவிற்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: ind_silver_versus_steel
    name: வெள்ளி Vs. எஃகு
    prompt: |
      சில மேசைகளில் எஃகு தட்டுகள், சில வெள்ளி, சில வாழை இலை. பாத்திரத்தைக் கவனியுங்கள். உணவின் கீழே உள்ள பரப்பு அனுபவத்தை எப்படி மாற்றுகிறது? எடை, ஒலி, பாரம்பரியம்.
    follow_ups:
      - வெவ்வேறு பரப்புகளில் உணவு எப்படி இருக்கும்?
      - பாத்திரம் எப்படி சடங்கை வடிவமைக்கிறது?
      - பொருளுக்கும் அர்த்தத்திற்கும் என்ன தொடர்பு?
  - id: ind_cumin_fragrance
    name: சீரக வாசனை
    prompt: |
      வறுத்த சீரக விதைகள் சுவைக்கு முன் நறுமணத்தை வெளியிடுகின்றன. ஒரு உணவைச் சுவைக்கும் முன் அதன் வாசனையை நுகருங்கள். சீரகம் அறை முழுவதும் பரவுகிறது. வாசனை எப்படி சுவை மொட்டுகளைத் தயார்படுத்துகிறது?
    follow_ups:
      - வாசனை இல்லாமல் உணவு எப்படி இருக்கும்?
      - வாசனை எப்படி சமையல்காரரின் இருப்பைக் குறிக்கிறது?
      - மூக்கிற்கும் நினைவிற்கும் என்ன தொடர்பு?
  - id: ind_shared_central
    name: பகிரப்பட்ட மையம்
    prompt: |
