# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 料理実験室 — 寿司 (Japanese)

id: culinary_lab_sushi
name: 料理実験室 — 寿司
description: 寿司体験をシフトさせる50枚のカード。シャリと魚の化学から、カウンターでの所作、ネタの起源の考古学まで。
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: シャリの温度
    prompt: |
      寿司飯は温かい――体温に近い。冷たくはない。温かさが酢を運ぶ。感じてみよう。冷たいご飯はどうなるだろう？温度は一口の体験をどう形作るか？
    follow_ups:
      - 常温では何が犠牲になるか？
      - 温かさはどのように風味を運ぶか？
      - 温度と食感の関係は？
  - id: sush_shari_balance
    name: シャリのバランス
    prompt: |
      シャリ――ご飯――は寿司の半分。酢、塩、砂糖のバランスは精密だ。ご飯だけを味わってみよう。何をもたらすか？味気ないご飯とは何を意味するか？
    follow_ups:
      - ご飯はネタをどう形作るか？
      - 酢が多すぎるとどうなるか？
      - シャリとネタの関係は？
  - id: sush_counter_ritual
    name: カウンターの儀式
    prompt: |
      カウンターでの「おまかせ」――あなたは職人の前に座る。寿司は一貫ずつ運ばれてくる。カウンターは舞台だ。所作に注目しよう。リズムは何か？ペースは誰が決めるか？
    follow_ups:
      - テーブル席だったらどう変わるか？
      - カウンターはどのように食事を形作るか？
      - 職人と客の関係は？
  - id: sush_net_origin
    name: ネタの起源
    prompt: |
      ネタ――魚介――はどこかに起源がある。豊洲。築地。船。牧場。尋ねてみよう。魚の辿った道を追ってみよう。どんな旅をしてきたか？冷凍庫から来たものとは何を意味するか？
    follow_ups:
      - 起源は一貫をどう形作るか？
      - 別の産地だったらどうなるか？
      - 場所と品質の関係は？
  - id: sush_wasabi_hidden
    name: 隠されたワサビ
    prompt: |
      本物のワサビ――すりおろした根――は稀だ。ほとんどは西洋ワサビと着色料。でも本物だと、違う。シャープで、緑で、儚い。辛味に気づこう。偽物は何を加えるか？何を減らすか？
    follow_ups:
      - ワサビは一口をどう形作るか？
      - ワサビがないとは何を意味するか？
      - 辛味と魚の関係は？
  - id: sush_finger_over_chopstick
    name: 指と箸
    prompt: |
      握り寿司は、伝統的には箸ではなく指で食べる。指は温度、食感を感じる。試してみよう。箸では得られない、指が加えるものは何か？
    follow_ups:
      - 手は体験をどう形作るか？
      - 箸だとどうなるか？
      - 触覚と味覚の関係は？
  - id: sush_piece_by_piece
    name: 一貫ずつ
    prompt: |
      寿司は一貫ずつ――あるいは二貫ずつ――運ばれてくる。ペースは意図的だ。あなたは食べ、待つ。リズムを考えてみよう。一度に10貫出てきたら、何が失われるか？
    follow_ups:
      - ペースは食事をどう形作るか？
      - 速さだとどうなるか？
      - 一貫と注意の関係は？
  - id: sush_gari_palate
    name: ガリと palate
    prompt: |
      ガリ――甘酢生姜――は、間をリセットする。飾りではない。リセットだ。食べるタイミングに注目しよう。ガリなしで連続して食べると、 palate にどう影響するか？
    follow_ups:
      - ガリは進みをどう形作るか？
      - ガリがないとは何を意味するか？
      - リセットと味の関係は？
  - id: sush_soy_minimal
    name: 最小限の醤油
    prompt: |
      醤油――軽くつける、魚の面を下にして。ご飯にはつけない。ご飯が吸いすぎてしまう。職人がすでに醤油を塗っているかもしれない。注意しよう。つけすぎるとどうなるか？
    follow_ups:
      - 醤油は一貫をどう形作るか？
      - 醤油がないとは何を意味するか？
      - つけ具合とバランスの関係は？
  - id: sush_knife_matters
    name: 包丁の重要性
    prompt: |
      寿司包丁――片刃、鋭利。切り方が食感に影響する。筋目と逆か、それに沿うか。角度。刃が何をするか考えてみよう。鈍い包丁だと何が失われるか？
    follow_ups:
      - 切り方は魚をどう形作るか？
      - 違う角度だとどうなるか？
      - 刃と口当たりの関係は？
  - id: sush_otoro_fat
    name: 大トロの脂
    prompt: |
      大トロ――最も脂の乗ったマグロ――はとろける。脂こそが要だ。霜降りに注目しよう。赤身のマグロだとどうなるか？脂は体験をどう形作るか？
    follow_ups:
      - 脂がなかったら、その一貫はどうなるか？
      - 霜降りが贅沢さをどう生み出すか？
      - 脂ととろけ具合の関係は？
  - id: sush_unagi_glaze
    name: うなぎの照り
    prompt: |
      うなぎ――甘いタレを塗り、時折再度焼かれる。照りは漆のようだ。艶に注目しよう。照りがないうなぎとは何を意味するか？
    follow_ups:
      - 照りは一貫をどう形作るか？
      - 甘みとうなぎの関係は？
      - なぜ照りを塗るのか？
  - id: sush_nori crisp
    name: 海苔のパリパリ感
    prompt: |
      巻き寿司の海苔――炙った、パリパリか、それとも柔らかいか？職人によって選び方が違う。海苔は一口の食感に影響する。食感を考えてみよう。湿った海苔だとどうなるか？
    follow_ups:
      - 海苔は巻きをどう形作るか？
      - 違う炙り方だとどうなるか？
      - パリパリ感と新鮮さの関係は？
  - id: sush_silence_counter
    name: カウンターの静寂
    prompt: |
      寿司カウンターが静かな場所もある――集中、敬意。他は賑やかだ。音の風景に注目しよう。静寂は何を加えるか？会話は何を加えるか？
    follow_ups:
      - 音は食事をどう形作るか？
      - 大音量の音楽だとどうなるか？
      - 静けさと集中力の関係は？
  - id: sush_tamago_sweet
    name: 玉子の甘さ
    prompt: |
      玉子――卵焼き――はしばしば食事の締めくくり。甘く、層になっている。職人の技が見える。締めの一品を考えてみよう。最後のネタが生魚だったら何を意味するか？
    follow_ups:
      - 玉子は終わりをどう形作るか？
      - 甘さと締めくくりとの関係は？
      - なぜ最後に卵か？
  - id: sush_tuna_spectrum
    name: マグロのスペクトラム
    prompt: |
      赤身、中トロ、大トロ――赤身から脂。この段階的な変化は意図的だ。可能なら順番に味わってみよう。この流れはどう機能するか？それぞれ何を提供するか？
    follow_ups:
      - 脂はスペクトラムをどう形作るか？
      - 一つの種類だけだと何を意味するか？
      - 赤身と濃厚さの関係は？
  - id: sush_ume_shiso
    name: 梅と紫蘇
    prompt: |
      梅――梅干し――と紫蘇が、一部の巻き寿司に入っている。酸っぱく、ハーブのような香り。濃厚さを和らげる。いつ登場するか注目しよう。それらがない巻き寿司はどうなるか？
    follow_ups:
      - 梅は一口をどう形作るか？
      - 酸味と魚の関係は？
      - なぜ紫蘇か？
  - id: sush_gunkan_hold
    name: 軍艦の保持力
    prompt: |
      軍艦――戦艦――は、ほぐれやすいネタを乗せる。いくら、うに。海苔の帯がそれを包み込む。形を考えてみよう。平らなネタだとどうなるか？
    follow_ups:
      - 形はネタをどう形作るか？
      - 違う容器だとどうなるか？
      - 保持力とこぼれることの関係は？
  - id: sush_uni_risk
    name: ウニのリスク
    prompt: |
      ウニ――海の宝石――は好みが分かれる。甘く、磯の香りがし、食感も独特。完璧な時もあれば、そうでない時もある。リスクを考えてみよう。安全なサーモンだとどうなるか？リスクは何を加えるか？
    follow_ups:
      - ウニは体験をどう形作るか？
      - リスクなしで何を失うか？
      - 好みが分かれることと記憶に残ることの関係は？
  - id: sush_chef_choice
    name: 職人の選択
    prompt: |
      おまかせ――職人の選択。あなたはコントロールを委ねる。職人はその日、魚、そしてあなたを読む。信頼を考えてみよう。自分で選ぶと何が変わるか？
    follow_ups:
      - 委ねることは食事をどう形作るか？
      - メニューから選ぶとは何を意味するか？
      - 信頼と体験の関係は？
  - id: sush_sake_pair
    name: 日本酒とのペアリング
    prompt: |
      寿司と日本酒――冷酒、熱燗、古酒。ペアリングは熟考されている。飲むタイミングに注目しよう。口の中を洗い流すか？それとも引き立てるか？飲み物の役割を考えてみよう。
    follow_ups:
      - 日本酒は一貫をどう形作るか？
      - ワインだとどうなるか？
      - 米と米酒の関係は？
  - id: sush_ikura_pop
    name: イクラの弾ける食感
    prompt: |
      イクラ――鮭の卵――は弾ける。その破裂は食感と塩味。感覚を考えてみよう。加熱したイクラだとどうなるか？弾ける食感は一口の体験をどう形作るか？
    follow_ups:
      - 弾ける食感がなかったら、その一貫はどうなるか？
      - 食感はどのように快感を生み出すか？
      - 弾ける食感と塩味の関係は？
  - id: sush_hirame_chew
    name: ヒラメの噛み応え
    prompt: |
      ヒラメ――カレイ科の魚――はマグロとは異なる噛み応えがある。淡白で繊細だ。食感に注目しよう。脂の乗った魚だとどうなるか？噛み応えはどのように変化するか？
    follow_ups:
      - 食感は一貫をどう形作るか？
      - 淡白さと繊細さの関係は？
      - なぜヒラメを注文するのか？
  - id: sush_amaebi_head
    name: 甘エビの頭
    prompt: |
      甘エビ――甘みのあるエビ――は、時折頭を唐揚げにして提供される。頭はパリパリで、旨味がある。全体を使うことを考えてみよう。頭がないエビだと何が失われるか？
    follow_ups:
      - 頭は料理をどう形作るか？
      - 全体を使うことと敬意の関係は？
      - なぜ頭を揚げるのか？
  - id: sush_mirin_gloss
    name: みりんの艶
    prompt: |
      一部のネタには、ニギリ――醤油、みりん、酒――が塗られている。その艶は仕上げだ。職人が味付けしたのだ。さらに醤油を足すかどうか考えてみよう。つけすぎるとどうなるか？
    follow_ups:
      - 塗ることは一貫をどう形作るか？
      - 塗らないとどうなるか？
      - 職人の手とあなたの手の関係は？
  - id: sush_anago_soft
    name: アナゴの柔らかさ
    prompt: |
      アナゴ――海水魚のウナギ――はウナギより柔らかい。種も調理法も違う。食感に注目しよう。ウナギのしっかりした食感だとどうなるか？
    follow_ups:
      - 柔らかさが一貫をどう形作るか？
      - アナゴとウナギの関係は？
      - なぜ両方のウナギがあるのか？
  - id: sush_saba_silver
    name: サバの銀色
    prompt: |
      サバ――マサバ――はしばしば〆られる。銀色の皮、脂の乗った身。力強い味わい。保存法を考えてみよう。生のマサバだとどうなるか？
    follow_ups:
      - 〆ることは魚をどう形作るか？
      - 脂と〆具合の関係は？
      - なぜサバを〆るのか？
  - id: sush_ginger_between
    name: 間のガリ
    prompt: |
      一貫ごとのガリ――リセット。しかし、いつ？毎回？数回に一度？リズムはあなた次第だ。自分のパターンに注目しよう。リセットがないとどうなるか？
    follow_ups:
      - タイミングはガリをどう形作るか？
      - 一貫と一貫の関係は？
      - いつリセットが必要だと感じるか？
  - id: sush_maki_cut
    name: 巻きの切り方
    prompt: |
      巻き寿司――巻かれたもの――は切り分けられる。6切れか8切れか。切り方が断面に影響する。渦巻きを考えてみよう。違う切り方だとどうなるか？
    follow_ups:
      - 切り方は一口の体験をどう形作るか？
      - 切れ数が少ないと何を意味するか？
      - スライスと全体の関係は？
  - id: sush_tobiko_crunch
    name: トビコのカリカリ感
    prompt: |
      トビコ――トビウオの卵――はカリカリ感と彩りを加える。トッピングであり、飾りでもある。いつ登場するか注目しよう。それがない巻き寿司はどうなるか？
    follow_ups:
      - トビコは一口をどう形作るか？
      - カリカリ感と彩りの関係は？
      - なぜトビウオの卵か？
  - id: sush_sashimi_contrast
    name: サシミの対比
    prompt: |
      サシミ――ご飯なし――は、魚を単独で味わえる。その純粋さは違う。サシミと握り寿司を比較してみよう。ご飯は何を加えるか？ご飯がないことで何が明らかになるか？
    follow_ups:
      - ご飯は握りをどう形作るか？
      - 全てサシミだとどうなるか？
      - 魚とご飯の関係は？
  - id: sush_tea_rinse
    name: お茶で洗い流す
    prompt: |
      寿司バーの緑茶――注がれ、共有される。口の中を洗い流す。お茶はリズムの一部だ。その役割を考えてみよう。水だとどうなるか？飲み物がないとどうなるか？
    follow_ups:
      - お茶は食事をどう形作るか？
      - お茶とリセットの関係は？
      - なぜ緑茶か？
  - id: sush_bengara_tuna
    name: ベンガラマグロ
    prompt: |
      ベンガラ――赤身のマグロ、しばしば背の部分――はより暗い。味は赤身とは違う。部位を考えてみよう。魚のどの部分か？場所は味をどう変えるか？
    follow_ups:
      - 部位は味をどう形作るか？
      - 場所と味の関係は？
      - なぜこの部位なのか？
  - id: sush_kohada_cure
    name: コハダの〆
    prompt: |
      コハダ――コノシロ――は〆られる、時に酢締めされる。職人の腕の見せ所だ。銀色の皮、バランス。技を考えてみよう。〆ていないとどうなるか？
    follow_ups:
      - 〆ることは魚をどう形作るか？
      - 酢と銀色の皮の関係は？
      - なぜそれが腕の見せ所なのか？
  - id: sush_engawa_fin
    name: エンガワの鰭
    prompt: |
      エンガワ――ヒラメの鰭の付け根の筋肉――は珍重される。独特の食感がある。部位を考えてみよう。普通のヒラメだとどうなるか？鰭はどう違うのか？
    follow_ups:
      - 部位は一貫をどう形作るか？
      - 鰭と筋肉の関係は？
      - なぜ珍重されるのか？
  - id: sush_first_piece
    name: 最初の一貫
    prompt: |
      最初の一貫がその場の雰囲気を決める。しばしば穏やかなもの――例えばヒラメやタイ。職人は calibrating（調整）している。冒頭を考えてみよう。最初が大トロだったら何を意味するか？
    follow_ups:
      - 最初の一貫は食事をどう形作るか？
      - 最初と進みの関係は？
      - なぜ穏やかなものを最初に？
  - id: sush_kampachi_fat
    name: カンパチの脂
    prompt: |
      カンパチ――若魚のブリ――には、繊細な脂がある。赤身と濃厚さの中間だ。中間の領域に注目しよう。ブリだとどうなるか？もっと赤身の魚だとどうなるか？
    follow_ups:
      - 脂は一貫をどう形作るか？
      - 年齢と脂の関係は？
      - なぜカンパチか？
  - id: sush_nodoguro_char
    name: ノドグロの炙り
    prompt: |
      ノドグロ――黒い喉の魚――は、しばしば軽く炙られる。皮、脂。炙りが加わる。火の当て方を考えてみよう。生だとどうなるか？
    follow_ups:
      - 炙りは魚をどう形作るか？
      - 炙りと脂の関係は？
      - なぜこれを炙るのか？
  - id: sush_choji_plate
    name: チョウジ皿
    prompt: |
      皿――あるいは木、石――が一貫を乗せる。盛り付けは最小限だ。器を考えてみよう。賑やかな皿だとどうなるか？最小限は何を可能にするか？
    follow_ups:
      - 皿は一貫をどう形作るか？
      - 器と集中力との関係は？
      - なぜ最小限なのか？
  - id: sush_tea_cup
    name: 茶碗
    prompt: |
      カウンターの茶碗――取っ手がなく、時に粗い。両手で包み込むように持つ。器を考えてみよう。マグカップだとどうなるか？茶碗は何を加えるか？
    follow_ups:
      - 茶碗は一杯をどう形作るか？
      - 器と儀式との関係は？
      - なぜ取っ手がないのか？
  - id: sush_silver_slide
    name: 銀色の滑り
    prompt: |
      一貫は皿から滑るように――あるいはきれいに持ち上げられるべきだ。シャリは保持するが、離れる。構造を考えてみよう。崩れるシャリだと何を意味するか？
    follow_ups:
      - 構造は食べ方をどう形作るか？
      - べちゃべちゃのシャリだとどうなるか？
      - 構造と一口の関係は？
  - id: sush_kinmedai_skin
    name: キンメダイの皮
    prompt: |
      キンメダイ――金色の目をしたタイ――は、しばしば皮付きで、軽く炙られる。皮が食感、脂を加える。炙りを考えてみよう。生の皮だとどうなるか？
    follow_ups:
      - 皮は一貫をどう形作るか？
      - 炙りと脂の関係は？
      - なぜ炙るのか？
  - id: sush_botan_ebi
    name: ボタンエビ
    prompt: |
      ボタンエビ――斑点のあるエビ――は甘く、しばしば生で提供される。尾は唐揚げになることもある。全体を考えてみよう。火を通したエビだとどうなるか？
    follow_ups:
      - 調理法は一貫をどう形作るか？
      - 生と甘さの関係は？
      - なぜボタンエビか？
  - id: sush_namida_heat
    name: 涙の辛さ
    prompt: |
      本物のワサビは涙――namida――を誘う。辛味は上がり、過ぎ去る。唐辛子とは違う。感覚を考えてみよう。西洋ワサビだとどう違うか？
    follow_ups:
      - 辛味は一口をどう形作るか？
      - ワサビと涙の関係は？
      - なぜ涙が出るのか？
  - id: sush_omakase_end
    name: おまかせの終わり
    prompt: |
      食事は終わる――玉子、おそらく味噌汁、あるいは果物。弧は完成する。締めくくりを考えてみよう。もう一貫だとどうなるか？いつ終わりだとわかるか？
    follow_ups:
      - 終わりは記憶をどう形作るか？
      - 終わりと満足感の関係は？
      - なぜ卵や汁物で終わるのか？
  - id: sush_counter_wait
    name: カウンターでの待ち時間
    prompt: |
      一貫の間、あなたは待つ。職人が準備する。その間はリズムの一部だ。期待感を注目しよう。即座のサービスだと何が失われるか？
    follow_ups:
      - 待ち時間は一貫をどう形作るか？
      - 休憩と注意の関係は？
      - なぜ事前に皿に盛らないのか？
  - id: sush_tsukiji_legacy
    name: 築地の遺産
    prompt: |
      築地はなくなった。豊洲が後を継いだ。しかし魚は今も東京を流れている。市場を考えてみよう。オークションなしの寿司とは？流通なしでは？
    follow_ups:
      - 市場は魚をどう形作るか？
      - オークションと品質の関係は？
      - 築地は何を意味したか？
  - id: sush_edomae_spirit
    name: 江戸前精神
    prompt: |
      江戸前――江戸風――寿司は東京の伝統から。冷蔵なしで機能するように保存、〆、熟成させた。歴史を考えてみよう。常に新鮮だとどうなるか？
    follow_ups:
      - 歴史は技術をどう形作るか？
      - 保存と風味の関係は？
      - なぜ江戸前か？
  - id: sush_gari_reset
    name: ガリのリセット
    prompt: |
      ガリ――甘酢生姜――は、一貫の合間に palate をリセットする。淡いピンクのスライスが palate を整える。いつ手を伸ばすか注目しよう。リセットなしの食事はどうなるか？生姜は進みをどう形作るか？
    follow_ups:
      - ガリがないとは何を意味するか？
      - リセットは次の a にどう影響するか？
      - 休憩と継続性の関係は？
  - id: sush_otoro_melt
    name: 大トロのとろけ具合
    prompt: |
      大トロ――最も脂の乗ったマグロ――は舌の上でほぼ溶ける。脂こそが要だ。食感を考えてみよう。赤身のマグロだとどうなるか？とろけ具合は食事のピークをどう刻むか？
    follow_ups:
      - 赤身だとどう違うか？
      - 脂は体験をどう形作るか？
      - とろけ具合と贅沢さの関係は？
