# کلینری لیب — سشی (Urdu)

id: culinary_lab_sushi
name: کلینری لیب — سشی
description: 50 کارڈز جو سشی کے آپ کے تجربے کو بدل دیں گے—چاول اور مچھلی کی کیمسٹری سے لے کر کاؤنٹر کی رقاصی اور ہر نیتا کی اصل کی पुरात पुरात تک۔
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: چاول کا درجہ حرارت
    prompt: |
      سشی کے چاول گرم ہوتے ہیں—جسم کے درجہ حرارت کے قریب، تقریباً۔ ٹھنڈے نہیں۔ گرمی سرکہ لے جاتی ہے۔ اسے محسوس کریں۔ سرد چاول کیا کریں گے؟ درجہ حرارت کاٹنے کو کیسے متاثر کرتا ہے؟
    follow_ups:
      - کمرے کے درجہ حرارت پر کیا قربان ہو گا؟
      - گرمی ذائقہ کیسے لے جاتی ہے؟
      - درجہ حرارت اور ساخت کے درمیان کیا تعلق ہے؟
  - id: sush_shari_balance
    name: شاری کا توازن
    prompt: |
      شاری—چاول—سشی کا آدھا حصہ ہے۔ سرکہ، نمک، چینی کا توازن درست ہے۔ صرف چاول کا ذائقہ چکھیں۔ وہ کیا لاتا ہے؟ بے ذائقہ چاول کا کیا مطلب ہوگا؟
    follow_ups:
      - چاول نیتا کو کیسے شکل دیتا ہے؟
      - زیادہ سرکہ کیا کرے گا؟
      - شاری اور نیتا کے درمیان کیا تعلق ہے؟
  - id: sush_counter_ritual
    name: کاؤنٹر کا رسم
    prompt: |
      کاؤنٹر پر اوماکاسے—آپ شیف کے سامنے بیٹھتے ہیں۔ سشی ایک ایک کر کے آتی ہے۔ کاؤنٹر ایک اسٹیج ہے۔ رقاصی پر غور کریں۔ تال کیا ہے؟ رفتار کون طے کرتا ہے؟
    follow_ups:
      - میز کو تبدیل کرنے سے کیا ہوگا؟
      - کاؤنٹر کھانے کو کیسے شکل دیتا ہے؟
      - شیف اور مہمان کے درمیان کیا تعلق ہے؟
  - id: sush_net_origin
    name: نیتا کی اصل
    prompt: |
      ہر نیتا—ٹاپنگ—کہیں سے آئی ہے۔ تویوسو۔ تسوکیجی۔ ایک کشتی۔ ایک رانچ۔ پوچھیں۔ مچھلی کا سراغ لگائیں۔ اس نے کیا سفر طے کیا؟ گودام سے منجمد کا کیا مطلب ہوگا؟
    follow_ups:
      - اصل ٹکڑے کو کیسے شکل دیتی ہے؟
      - دوسرا ذریعہ کیا کرے گا؟
      - جگہ اور معیار کے درمیان کیا تعلق ہے؟
  - id: sush_wasabi_hidden
    name: واسابی پوشیدہ
    prompt: |
      حقیقی واسابی—کدو کیا ہوا جڑ—نایاب ہے۔ زیادہ تر ہارسریڈش اور رنگ ہے۔ لیکن جب یہ حقیقی ہوتا ہے، تو یہ مختلف ہوتا ہے۔ تیز، سبز، لمحہ بہ لمحہ۔ گرمی پر غور کریں۔ نقلی کیا شامل کرے گا؟ گھٹائے گا؟
    follow_ups:
      - واسابی کاٹنے کو کیسے شکل دیتا ہے؟
      - واسابی کے بغیر کیا ہوگا؟
      - گرمی اور مچھلی کے درمیان کیا تعلق ہے؟
  - id: sush_finger_over_chopstick
    name: انگلی چمچ کے اوپر
    prompt: |
      نگری روایتی طور پر انگلیوں سے کھائی جاتی ہے—چمچ سے نہیں۔ انگلیاں درجہ حرارت، ساخت کو محسوس کرتی ہیں۔ اسے آزمائیں۔ چمچ کے مقابلے میں انگلی کیا اضافہ کرتی ہے؟
    follow_ups:
      - ہاتھ تجربے کو کیسے شکل دیتا ہے؟
      - چمچ کیا کرے گا؟
      - چھونے اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: sush_piece_by_piece
    name: ایک ایک کر کے ٹکڑا
    prompt: |
      سشی ایک وقت میں ایک ٹکڑا—یا دو آتی ہے۔ رفتار جان بوجھ کر ہوتی ہے۔ آپ کھاتے ہیں؛ آپ انتظار کرتے ہیں۔ تال پر غور کریں۔ ایک ساتھ دس کے پلیٹر سے کیا قربان ہو گا؟
    follow_ups:
      - رفتار کھانے کو کیسے شکل دیتی ہے؟
      - تیزی کیا کرے گی؟
      - ٹکڑے اور توجہ کے درمیان کیا تعلق ہے؟
  - id: sush_gari_palate
    name: گاری کا تالو
    prompt: |
      گاری—اچار میں بند ادرک—ٹکڑوں کے درمیان صاف کرتا ہے۔ یہ گارنش نہیں؛ یہ ری سیٹ ہے۔ دیکھیں کہ آپ اسے کب کھاتے ہیں۔ بغیر گاری کے مسلسل ٹکڑوں سے تالو کو کیا ہوگا؟
    follow_ups:
      - گاری ترقی کو کیسے شکل دیتا ہے؟
      - گاری کے بغیر کیا ہوگا؟
      - ری سیٹ اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: sush_soy_minimal
    name: سویا کم سے کم
    prompt: |
      سویا—ایک ہلکی ڈپ، مچھلی کی طرف نیچے کی طرف۔ چاول نہیں۔ چاول بہت زیادہ جذب کر لیں گے۔ شیف نے پہلے ہی سویا لگا دیا ہوگا۔ غور کریں۔ ڈبو دینے سے کیا ہوگا؟
    follow_ups:
      - سویا ٹکڑے کو کیسے شکل دیتا ہے؟
      - سویا کے بغیر کیا ہوگا؟
      - ڈپ اور توازن کے درمیان کیا تعلق ہے؟
  - id: sush_knife_matters
    name: چاقو کا معاملہ
    prompt: |
      سشی کا چاقو—سنگل بیول، تیز۔ کٹ ساخت کو متاثر کرتا ہے۔ اناج کے خلاف یا اس کے ساتھ۔ زاویہ۔ غور کریں کہ بلیڈ کیا کرتا ہے۔ کند چاقو سے کیا قربان ہو گا؟
    follow_ups:
      - کٹ مچھلی کو کیسے شکل دیتا ہے؟
      - مختلف زاویہ کیا کرے گا؟
      - بلیڈ اور منہ کے احساس کے درمیان کیا تعلق ہے؟
  - id: sush_otoro_fat
    name: اوٹورو فیٹ
    prompt: |
      اوٹورو—سب سے زیادہ چکنائی والا ٹونا—پگھل جاتا ہے۔ فیٹ ہی اصل مقصد ہے۔ ماربلنگ پر غور کریں۔ اکیامی کی طرح پتلی مچھلی کیا کرے گی؟ فیٹ تجربے کو کیسے شکل دیتا ہے؟
    follow_ups:
      - فیٹ کے بغیر ٹکڑا کیا ہوگا؟
      - ماربلنگ عیش و عشرت کیسے پیدا کرتی ہے؟
      - فیٹ اور پگھلنے کے درمیان کیا تعلق ہے؟
  - id: sush_unagi_glaze
    name: انوگی گلیز
    prompt: |
      انوگی—اییل—کو میٹھی چٹنی میں لگایا جاتا ہے، کبھی کبھی دوبارہ گرل کیا جاتا ہے۔ گلیز وارنش ہے۔ چمک پر غور کریں۔ بغیر گلیز کے اییل کا کیا مطلب ہوگا؟
    follow_ups:
      - گلیز ٹکڑے کو کیسے شکل دیتا ہے؟
      - میٹھے اور اییل کے درمیان کیا تعلق ہے؟
      - گلیز کیوں؟
  - id: sush_nori crisp
    name: نوری کرسپ
    prompt: |
      ماکی کے لیے نوری—تلا ہوا، کرسپ، یا نرم؟ مختلف شیف مختلف انتخاب کرتے ہیں۔ نوری کاٹنے کو متاثر کرتا ہے۔ ساخت پر غور کریں۔ گیلے نوری کا کیا ہوگا؟
    follow_ups:
      - نوری رول کو کیسے شکل دیتا ہے؟
      - مختلف تلائی کا کیا مطلب ہوگا؟
      - کرسپ اور تازہ کے درمیان کیا تعلق ہے؟
  - id: sush_silence_counter
    name: کاؤنٹر پر خاموشی
    prompt: |
      کچھ سشی کاؤنٹر خاموش ہوتے ہیں—توجہ، احترام۔ دیگر زندہ دل ہوتے ہیں۔ صوتی منظر پر غور کریں۔ خاموشی کیا اضافہ کرتی ہے؟ گفتگو کیا اضافہ کرتی ہے؟
    follow_ups:
      - آواز کھانے کو کیسے شکل دیتی ہے؟
      - تیز موسیقی کیا کرے گی؟
      - خاموشی اور توجہ کے درمیان کیا تعلق ہے؟
  - id: sush_tamago_sweet
    name: تامگو میٹھا
    prompt: |
      تامگو—انڈے کا کسٹارڈ—اکثر کھانے کا اختتام کرتا ہے۔ یہ میٹھا، تہہ دار ہوتا ہے۔ شیف کی مہارت نظر آتی ہے۔ اختتام پر غور کریں۔ آخری ٹکڑے کے طور پر کچی مچھلی کا کیا مطلب ہوگا؟
    follow_ups:
      - تامگو اختتام کو کیسے شکل دیتا ہے؟
      - میٹھے اور اختتام کے درمیان کیا تعلق ہے؟
      - انڈا آخر میں کیوں؟
  - id: sush_tuna_spectrum
    name: ٹونا سپیکٹرم
    prompt: |
      اکیامی، چوٹورو، اوٹورو—پتلی سے موٹی۔ سپیکٹرم جان بوجھ کر ہے۔ اگر ممکن ہو تو ترتیب میں ان کا ذائقہ چکھیں۔ ترقی کیسے کام کرتی ہے؟ ہر ایک کیا پیش کرتا ہے؟
    follow_ups:
      - فیٹ سپیکٹرم کو کیسے شکل دیتا ہے؟
      - ایک گریڈ اکیلے کیا کرے گا؟
      - پتلی اور بھرپور کے درمیان کیا تعلق ہے؟
  - id: sush_ume_shiso
    name: اومے شیسو
    prompt: |
      اومے—اچار میں بند الو بخارا—اور کچھ رولز میں شیسو۔ کھٹا، جڑی بوٹیوں والا۔ وہ چکنائی کو کم کرتے ہیں۔ دیکھیں کہ وہ کب ظاہر ہوتے ہیں۔ ان کے بغیر رول کیا ہوگا؟
    follow_ups:
      - اومے کاٹنے کو کیسے شکل دیتا ہے؟
      - کھٹے اور مچھلی کے درمیان کیا تعلق ہے؟
      - شیسو کیوں؟
  - id: sush_gunkan_hold
    name: گنکان ہولڈ
    prompt: |
      گنکان—جنگی جہاز—ڈھیلی ٹاپنگز رکھتا ہے۔ رو، سمندری ارچن۔ نوری کالر پر مشتمل ہوتا ہے۔ شکل پر غور کریں۔ چپٹا ٹکڑا کیا کرے گا؟
    follow_ups:
      - شکل ٹاپنگ کو کیسے شکل دیتی ہے؟
      - مختلف برتن کا کیا مطلب ہوگا؟
      - ہولڈ اور اسپل کے درمیان کیا تعلق ہے؟
  - id: sush_uni_risk
    name: یونی کا خطرہ
    prompt: |
      یونی—سمندری ارچن—پولرائزنگ ہے۔ میٹھا، نمکین، ساخت۔ یہ بہترین یا خراب ہو سکتا ہے۔ خطرے پر غور کریں۔ محفوظ سالمن کا کیا مطلب ہوگا؟ خطرہ کیا اضافہ کرتا ہے؟
    follow_ups:
      - یونی تجربے کو کیسے شکل دیتا ہے؟
      - خطرے کے بغیر آپ کیا کھو دیں گے؟
      - پولرائزنگ اور یادگار کے درمیان کیا تعلق ہے؟
  - id: sush_chef_choice
    name: شیف کی پسند
    prompt: |
      اوماکاسے—شیف کی پسند۔ آپ کنٹرول چھوڑ دیتے ہیں۔ شیف دن، مچھلی، اور آپ کو پڑھتا ہے۔ اعتماد پر غور کریں۔ خود منتخب کرنے سے کیا بدل جائے گا؟
    follow_ups:
      - سرینڈر کھانے کو کیسے شکل دیتا ہے؟
      - مینو آرڈر کا کیا مطلب ہوگا؟
      - اعتماد اور تجربے کے درمیان کیا تعلق ہے؟
  - id: sush_sake_pair
    name: سیک کی جوڑی
    prompt: |
      سشی کے ساتھ سیک—ٹھنڈا، گرم، پرانا۔ جوڑی پر غور کیا جاتا ہے۔ دیکھیں کہ آپ کب گھونٹ لیتے ہیں۔ کیا یہ صاف کرتا ہے؟ بہتر بناتا ہے؟ مشروب کے کردار پر غور کریں۔
    follow_ups:
      - سیک ٹکڑے کو کیسے شکل دیتا ہے؟
      - شراب کیا کرے گی؟
      - چاول اور چاول کی شراب کے درمیان کیا تعلق ہے؟
  - id: sush_ikura_pop
    name: اکورا پاپ
    prompt: |
      اکورا—سالمن رو—پاپ کرتا ہے۔ پاپ ساخت اور نمکین پن ہے۔ احساس پر غور کریں۔ پکا ہوا رو کیا کرے گا؟ پاپ کاٹنے کو کیسے شکل دیتا ہے؟
    follow_ups:
      - پاپ کے بغیر ٹکڑا کیا ہوگا؟
      - ساخت خوشی کیسے پیدا کرتی ہے؟
      - پاپ اور نمک کے درمیان کیا تعلق ہے؟
  - id: sush_hirame_chew
    name: ہیرا میں چباؤ
    prompt: |
      ہیرا میں—فلوؤنڈر—ٹونا سے مختلف چبانے والا ہوتا ہے۔ یہ پتلا، نازک ہے۔ ساخت پر غور کریں۔ چکنائی والی مچھلی کیا کرے گی؟ چبانے میں کیسے فرق آتا ہے؟
    follow_ups:
      - ساخت ٹکڑے کو کیسے شکل دیتی ہے؟
      - پتلی اور نازک کے درمیان کیا تعلق ہے؟
      - ہیرا میں کیوں آرڈر کریں؟
  - id: sush_amaebi_head
    name: اما ایبی سر
    prompt: |
      اما ایبی—میٹھے جھینگے—کبھی کبھی سر تلا ہوا کے ساتھ پیش کیا جاتا ہے۔ سر کرسپ، امامی ہے۔ پورے کے استعمال پر غور کریں۔ بغیر سر والے جھینگے سے کیا قربان ہو گا؟
    follow_ups:
      - سر ڈش کو کیسے شکل دیتا ہے؟
      - پورے اور احترام کے درمیان کیا تعلق ہے؟
      - سر کو کیوں تلا جاتا ہے؟
  - id: sush_mirin_gloss
    name: میرین گلاس
    prompt: |
      کچھ ٹکڑوں پر نیکیری—سویا، میرین، سیک لگایا جاتا ہے۔ گلاس فنش ہے۔ شیف نے اسے ساس کیا ہے۔ مزید سویا شامل کرنے پر غور کریں۔ زیادہ ڈبو دینے سے کیا ہوگا؟
    follow_ups:
      - برش ٹکڑے کو کیسے شکل دیتا ہے؟
      - برش کے بغیر کیا ہوگا؟
      - شیف کے ہاتھ اور آپ کے ہاتھ کے درمیان کیا تعلق ہے؟
  - id: sush_anago_soft
    name: اناگو نرم
    prompt: |
      اناگو—نمکین پانی کی اییل—انوگی سے نرم ہوتی ہے۔ مختلف پرجاتی، مختلف تیاری۔ ساخت پر غور کریں۔ انوگی کی مضبوطی کیا کرے گی؟
    follow_ups:
      - نرم ٹکڑے کو کیسے شکل دیتا ہے؟
      - اناگو اور انوگی کے درمیان کیا تعلق ہے؟
      - دونوں اییل کیوں؟
  - id: sush_saba_silver
    name: صبا سلور
    prompt: |
      صبا—میکریل—کو اکثر علاج کیا جاتا ہے۔ چاندی کی جلد، تیل والا گوشت۔ یہ مضبوط ہے۔ تحفظ پر غور کریں۔ کچی میکریل کا کیا مطلب ہوگا؟
