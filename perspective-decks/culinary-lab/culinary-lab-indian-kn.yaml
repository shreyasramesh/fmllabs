# ಹೂಟ ಪ್ರಯೋಗಾಲಯ — ಭಾರತೀಯ (Kannada)

id: culinary_lab_indian
name: ಹೂಟ ಪ್ರಯೋಗಾಲಯ — ಭಾರತೀಯ
description: 50 ಕಾರ್ಡ್‌ಗಳು ಭಾರತೀಯ ಆಹಾರದ ಅನುಭವವನ್ನು ಬದಲಾಯಿಸಲು – ಮಸಾಲೆಗಳು ಮತ್ತು ಖಾರದ ರಸಾಯನಶಾಸ್ತ್ರದಿಂದ ಹಿಡಿದು ಪದಾರ್ಥಗಳ ಪುರಾತತ್ವಶಾಸ್ತ್ರ ಮತ್ತು ಹಂಚಿಕೆಯ ಮೇಜಿನ ನೃತ್ಯದವರೆಗೆ.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: ತಾಡಕದ ಸದ್ದು
    prompt: |
      ತಾಡಕ — ಮಸಾಲೆ ಒಗ್ಗರಣೆ — ಇದು ಆರಂಭಿಕ ಸಂಗೀತ. ಬಿಸಿ ಎಣ್ಣೆ ಸಾಸಿವೆ, ಜೀರಿಗೆ, ಕರಿಬೇವಿನ ಎಲೆಯನ್ನು ಸಂಧಿಸುತ್ತದೆ. ಆಲಿಸಿ. ಈ ಸದ್ದು ನಿಜವಾದ ಸಮಯದಲ್ಲಿ ನಡೆಯುವ ರಸಾಯನಶಾಸ್ತ್ರ. ರುಚಿ ನೋಡುವ ಮೊದಲು ಕೇಳುವುದರಿಂದ ಏನಾಗುತ್ತದೆ?
    follow_ups:
      - ಶಬ್ದವು ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತಾಡಕವಿಲ್ಲದೆ ಖಾದ್ಯವು ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಶಬ್ದ ಮತ್ತು ರುಚಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_spice_route
    name: ಮಸಾಲೆಗಳ ಮಾರ್ಗ
    prompt: |
      ಏಲಕ್ಕಿ ಕೇರಳದಿಂದ ಬಂತು. ಕೇಸರಿ ಕಾಶ್ಮೀರದಿಂದ. ಕಪ್ಪು ಮೆಣಸು ಒಮ್ಮೆ ಚಿನ್ನದಷ್ಟು ಬೆಲೆಬಾಳುತ್ತಿತ್ತು. ನಿಮ್ಮ ತಟ್ಟೆಯಲ್ಲಿರುವ ಒಂದು ಮಸಾಲೆಯನ್ನು ಅದರ ಮೂಲಕ್ಕೆ ಪತ್ತೆಹಚ್ಚಿ. ಅದು ನಿಮ್ಮನ್ನು ತಲುಪಲು ಯಾವ ಪ್ರಯಾಣ ಮಾಡಿತು?
    follow_ups:
      - ಮಾರ್ಗವನ್ನು ತಿಳಿದುಕೊಳ್ಳುವುದರಿಂದ ರುಚಿ ಹೇಗೆ ಬದಲಾಗುತ್ತದೆ?
      - ಅದೇ ಮಾರ್ಗದಲ್ಲಿ ಯಾವ ಇತರ ಮಸಾಲೆಗಳು ಪ್ರಯಾಣಿಸಿವೆ?
      - ವ್ಯಾಪಾರ ಮತ್ತು ರುಚಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_thali_geometry
    name: ಥಾಲಿಯ ಜ್ಯಾಮಿತಿ
    prompt: |
      ಥಾಲಿ ಒಂದು ಕ್ಯಾನ್ವಾಸ್ — ಬಟ್ಟಲುಗಳನ್ನು ವೃತ್ತಾಕಾರದಲ್ಲಿ ಜೋಡಿಸಲಾಗಿದೆ, ಪ್ರತಿಯೊಂದಕ್ಕೂ ಒಂದು ಪಾತ್ರವಿದೆ. ಜೋಡಣೆಯನ್ನು ಅಧ್ಯಯನ ಮಾಡಿ. ಮೊದಲು ಕಣ್ಣು ಎಲ್ಲಿ ಬೀಳುತ್ತದೆ? ಖಾಲಿ ಜಾಗ ಯಾವುದು?
    follow_ups:
      - ಒಂದು ಬಟ್ಟಲು ಕಾಣೆಯಾದರೆ ಏನಾಗುತ್ತದೆ?
      - ಜೋಡಣೆಯು ಊಟವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಜ್ಯಾಮಿತಿ ಮತ್ತು ಆಚರಣೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_hand_as_tool
    name: ಕೈ ಒಂದು ಉಪಕರಣ
    prompt: |
      ರೊಟ್ಟಿ ಹರಿದು, ಸಬ್ಜಿಯೊಂದಿಗೆ ಬೆರೆಸಿ, ಬಾಯಿಗೆ. ಕೈಯು ಪಾತ್ರೆ ಮತ್ತು ಸಂವೇದಕ. ನೃತ್ಯವನ್ನು ಗಮನಿಸಿ. ಫೋರ್ಕ್ ಮತ್ತು ಚಾಕು ನೀಡಲು ಸಾಧ್ಯವಿಲ್ಲದ ಸ್ಪರ್ಶ ಏನು ಸೇರಿಸುತ್ತದೆ?
    follow_ups:
      - ಕೈಯಿಂದ ತಿನ್ನುವುದು ವೇಗವನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ?
      - ಬೆಳ್ಳಿ ಪಾತ್ರೆಗಳಿಂದ ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳಲಾಗುತ್ತದೆ?
      - ಸ್ಪರ್ಶ ಮತ್ತು ತಾಪಮಾನದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_heat_layers
    name: ಖಾರದ ಪದರಗಳು
    prompt: |
      ಭಾರತೀಯ ಖಾರವು ಪದರಗಳನ್ನು ಹೊಂದಿದೆ - ಮೆಣಸಿನಕಾಯಿಯ ಸುಡುವಿಕೆ, ಕಪ್ಪು ಮೆಣಸಿನ ಬೆಚ್ಚಗಿನ, ಶುಂಠಿಯ ಬೆಂಕಿ. ಒಂದು ತುತ್ತು ತಿಂದು ಪ್ರತಿ ಖಾರ ಎಲ್ಲಿ ಲ್ಯಾಂಡ್ ಆಗುತ್ತದೆ ಎಂಬುದನ್ನು ಮ್ಯಾಪ್ ಮಾಡಿ. ನಾಲಿಗೆ, ಗಂಟಲು, ಹೊಟ್ಟೆ. ಅವು ಹೇಗೆ ನಿರ್ಮಿಸುತ್ತವೆ?
    follow_ups:
      - ಕೇವಲ ಒಂದು ಖಾರವಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಪದರಗಳು ಸಂಕೀರ್ಣತೆಯನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತವೆ?
      - ಖಾರ ಮತ್ತು ಸಮಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_yogurt_intervention
    name: ಮೊಸರಿನ ಮಧ್ಯಸ್ಥಿಕೆ
    prompt: |
      ರೈತಾ, ದಹಿ, ಲಸ್ಸಿ — ಮೊಸರು ತಂಪಾಗಿಸುತ್ತದೆ, ಕತ್ತರಿಸುತ್ತದೆ, ಸಮತೋಲನಗೊಳಿಸುತ್ತದೆ. ನೀವು ಅದನ್ನು ಸೇರಿಸುವ ಕ್ಷಣವನ್ನು ಗಮನಿಸಿ. ಆಮ್ಲವು ಕೊಬ್ಬನ್ನು, ತಂಪು ಖಾರವನ್ನು ಸಂಧಿಸುತ್ತದೆ. ಮಧ್ಯಸ್ಥಿಕೆ ರಾಸಾಯನಿಕವಾಗಿದೆ. ಅದು ಏನನ್ನು ಅಡ್ಡಿಪಡಿಸುತ್ತದೆ?
    follow_ups:
      - ಮೊಸರಿಲ್ಲದೆ ಊಟ ಹೇಗಿರುತ್ತದೆ?
      - ವ್ಯತಿರಿಕ್ತತೆಯು ಉಪಶಮನವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಮಧ್ಯಸ್ಥಿಕೆ ಮತ್ತು ಸಮತೋಲನದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_betel_after
    name: ಅಡಿಕೆ ಎಲೆಯ ನಂತರ
    prompt: |
      ಪಾನ್ — ಅಡಿಕೆ ಎಲೆ — ಕೆಲವು ಸಂಪ್ರದಾಯಗಳಲ್ಲಿ ಊಟವನ್ನು ಕೊನೆಗೊಳಿಸುತ್ತದೆ. ಇದು ಸಿಹಿಭಕ್ಷ್ಯವಲ್ಲ. ಇದು ಮುಕ್ತಾಯ. ರುಚಿ ಮತ್ತೆ ಬದಲಾಗುತ್ತದೆ. ಕೊನೆಯುಟವು ಸಂಪೂರ್ಣದರ ಬಗ್ಗೆ ಏನು ಹೇಳುತ್ತದೆ?
    follow_ups:
      - ಪಾನ್ ಪರಿವರ್ತನೆಯನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದೆ ಊಟವು ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಕೊನೆಯುಟ ಮತ್ತು ನೆನಪಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_street_chaos
    name: ಬೀದಿ ಗದ್ದಲ
    prompt: |
      ಒಬ್ಬ ಚಾಟ್ ಮಾರಾಟಗಾರನು ವೇಗವಾಗಿ ಕೆಲಸ ಮಾಡುತ್ತಾನೆ — ಭೇಲ್, ಪಾಪಡಿ, ಚಟ್ನಿಗಳು ಸೆಕೆಂಡುಗಳಲ್ಲಿ ಜೋಡಿಸಲಾಗುತ್ತದೆ. ಪ್ರದರ್ಶನವನ್ನು ನೋಡಿ. ಅಂಗಡಿ ರಂಗಮಂದಿರ. ಸ್ಕ್ರಿಪ್ಟ್ ಏನು? ಪ್ರೇಕ್ಷಕರು ಯಾರು?
    follow_ups:
      - ಪ್ರದರ್ಶನವಿಲ್ಲದೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ವೇಗವು ಅನುಭವವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಗದ್ದಲ ಮತ್ತು ಕಲೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_tandoor_breathe
    name: ತಂದೂರ್ ಉಸಿರು
    prompt: |
      ತಂದೂರ್ ಉಸಿರಾಡುತ್ತದೆ — ಜ್ವಾಲೆ, ಹೊಗೆ, ಮಣ್ಣು. ನಾನ್ ಅನ್ನು ಗೋಡೆಗೆ ಹೊಡೆದು, ಸುಟ್ಟಾಗ ಹೊರತೆಗೆಯಲಾಗುತ್ತದೆ. ಅದರ ಬಳಿ ನಿಲ್ಲಿ. ಉಷ್ಣತೆ, ವಾಸನೆ. ಬೆಂಕಿ ಮತ್ತು ರುಚಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
    follow_ups:
      - ತಂದೂರ್ ಇಲ್ಲದೆ ನಾನ್ ಹೇಗಿರುತ್ತದೆ?
      - ಮಣ್ಣು ಬಾಣಸಿಗನನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಉಸಿರು ಮತ್ತು ರೊಟ್ಟಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_turmeric_stain
    name: ಅರಿಶಿನದ ಕಲೆ
    prompt: |
      ಅರಿಶಿನವು ಕಲೆಗಳನ್ನು ಮಾಡುತ್ತದೆ — ಬೆರಳುಗಳು, ಬಟ್ಟೆ, ಪ್ಲಾಸ್ಟಿಕ್. ಬಣ್ಣ ಉಳಿಯುತ್ತದೆ. ಅದು ಏನನ್ನು ಗುರುತಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಕಲೆ ಪುರಾತತ್ವಶಾಸ್ತ್ರ. ಅದು ನಿಮ್ಮನ್ನು ತಲುಪುವ ಮೊದಲು ಈ ಊಟ ಎಲ್ಲಿ ಪ್ರಯಾಣಿಸಿದೆ?
    follow_ups:
      - ಬಣ್ಣವಿಲ್ಲದೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಕಲೆಯು ಶ್ರಮವನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ವರ್ಣದ್ರವ್ಯ ಮತ್ತು ಸಂರಕ್ಷಣೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_rice_architecture
    name: ಅಕ್ಕಿಯ ವಾಸ್ತುಶಿಲ್ಪ
    prompt: |
      ಬಿರಿಯಾನಿಯನ್ನು ನಿರ್ಮಿಸಲಾಗಿದೆ — ಅಕ್ಕಿ ಪದರ, ಮಾಂಸ ಪದರ, ಕೇಸರಿ, ಕರಿದ ಈರುಳ್ಳಿ. ರಚನೆಯು ಉಳಿಯುತ್ತದೆ. ಅದನ್ನು ಅಗೆಯಿರಿ. ವಾಸ್ತುಶಿಲ್ಪವು ಪ್ರತಿ ತುತ್ತನ್ನು ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ?
    follow_ups:
      - ಪದರಗಳು ಬೇಗನೆ ಮಿಶ್ರಣವಾದರೆ ಏನಾಗುತ್ತದೆ?
      - ರಚನೆಯು ಆಶ್ಚರ್ಯವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ನಿರ್ಮಾಣ ಮತ್ತು ಊಟದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_chutney_spectrum
    name: ಚಟ್ನಿಯ ವರ್ಣಪಟಲ
    prompt: |
      ಪುದೀನಾ, ಹುಣಸೆ, ತೆಂಗಿನಕಾಯಿ, ಟೊಮೆಟೊ — ಚಟ್ನಿಗಳು ಒಂದು ಪ್ಯಾಲೆಟ್‌ನಂತೆ ಶ್ರೇಣೀಕೃತವಾಗಿವೆ. ಪ್ರತಿಯೊಂದೂ ತುತ್ತನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ. ಮೂರು ಚಟ್ನಿಗಳೊಂದಿಗೆ ಒಂದು ಖಾದ್ಯವನ್ನು ರುಚಿ ನೋಡಿ. ಅದೇ ಮೂಲವು ಮೂರು ವಿಭಿನ್ನ ಕಥೆಗಳಾಗುವುದು ಹೇಗೆ?
    follow_ups:
      - ಕೇವಲ ಒಂದು ಚಟ್ನಿಯೊಂದಿಗೆ ಊಟ ಹೇಗಿರುತ್ತದೆ?
      - ಆಯ್ಕೆಯು ಏಜೆನ್ಸಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ವರ್ಣಪಟಲ ಮತ್ತು ಆದ್ಯತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_steam_rising
    name: ಏರುತ್ತಿರುವ ಆವಿ
    prompt: |
      ಇಡ್ಲಿ, ದೋಸೆ, ಪೂರಿ — ಮುಚ್ಚಳ ತೆರೆದಾಗ ಆವಿ ಏರುತ್ತದೆ. ಅದನ್ನು ನೋಡಿ. ಆವಿಯು ರುಚಿಯ ಮೊದಲು ಪರಿಮಳವನ್ನು ಸಾಗಿಸುತ್ತದೆ. ಯಾವುದು ಮೊದಲು ಬರುತ್ತದೆ? ಮೂಗು ಅಥವಾ ಬಾಯಿ?
    follow_ups:
      - ಆವಿಯು ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತೆರೆವುದಿಲ್ಲವಾದರೆ ಏನನ್ನು ಕಳೆದುಕೊಳ್ಳಲಾಗುತ್ತದೆ?
      - ಆವಿ ಮತ್ತು ರುಚಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: ind_silver_versus_steel
    name: ಬೆಳ್ಳಿ ಮತ್ತು ಉಕ್ಕು
    prompt: |
