# भारतीय पाक कला प्रयोगशाला (Culinary Lab — Indian) (Hindi)

id: culinary_lab_indian
name: भारतीय पाक कला प्रयोगशाला (Culinary Lab — Indian)
description: 50 कार्ड जो भारतीय भोजन के आपके अनुभव को बदल देंगे—मसालों और तीखेपन की रसायन शास्त्र से लेकर सामग्री के पुरातत्व और साझा टेबल की कोरियोग्राफी तक।
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: तड़का की चरमराहट (The Tadka Crackle)
    prompt: |
      तड़का—भूनना—पहली धुन है। गर्म तेल सरसों के बीज, जीरा, करी पत्ते से मिलता है। सुनें। चरमराहट वास्तविक समय में रसायन शास्त्र है। जब आप इसे चखने से पहले सुनते हैं तो क्या बदलता है?
    follow_ups:
      - ध्वनि प्रत्याशा को कैसे आकार देती है?
      - चरमराहट के बिना व्यंजन क्या खो देगा?
      - ध्वनि और स्वाद के बीच क्या संबंध है?
  - id: ind_spice_route
    name: मसाला मार्ग (Spice Route)
    prompt: |
      इलायची केरल से आई। केसर कश्मीर से। काली मिर्च कभी सोने के बराबर थी। अपनी थाली में एक मसाले को उसके मूल स्थान तक ट्रेस करें। यह आप तक पहुँचने के लिए क्या यात्रा की?
    follow_ups:
      - मार्ग जानने से बाइट कैसे बदलती है?
      - कौन से अन्य मसाले उसी रास्ते से यात्रा किए?
      - व्यापार और स्वाद के बीच क्या संबंध है?
  - id: ind_thali_geometry
    name: थाली ज्यामिति (Thali Geometry)
    prompt: |
      थाली एक कैनवास है—कटोरियाँ एक वृत्त में व्यवस्थित, प्रत्येक की एक भूमिका। रचना का अध्ययन करें। आँख पहले कहाँ जाती है? नकारात्मक स्थान क्या है?
    follow_ups:
      - अगर एक कटोरी गायब हो जाए तो क्या होगा?
      - व्यवस्था भोजन को कैसे आकार देती है?
      - ज्यामिति और अनुष्ठान के बीच क्या संबंध है?
  - id: ind_hand_as_tool
    name: हाथ एक उपकरण के रूप में (Hand as Tool)
    prompt: |
      रोटी तोड़ी, सब्ज़ी के साथ मिलाई, मुँह में डाली। हाथ बर्तन और संवेदक है। कोरियोग्राफी पर ध्यान दें। छुअन ऐसी क्या जोड़ती है जो कांटा और चाकू नहीं कर सकते?
    follow_ups:
      - हाथों से खाने से गति कैसे बदलती है?
      - चांदी के बर्तनों से क्या खो जाएगा?
      - स्पर्श और तापमान के बीच क्या संबंध है?
  - id: ind_heat_layers
    name: तीखेपन की परतें (Heat Layers)
    prompt: |
      भारतीय तीखापन परतदार होता है—मिर्च की जलन, काली मिर्च की गरमाहट, अदरक की आग। एक बाइट लें और हर तीखेपन के उतरने की जगह को मैप करें। जीभ, गला, पेट। वे कैसे बनते हैं?
    follow_ups:
      - केवल एक तीखेपन के साथ व्यंजन क्या होगा?
      - परतें जटिलता कैसे बनाती हैं?
      - तीखेपन और समय के बीच क्या संबंध है?
  - id: ind_yogurt_intervention
    name: दही का हस्तक्षेप (Yogurt Intervention)
    prompt: |
      रायता, दही, लस्सी—दही ठंडा करता है, काटता है, संतुलित करता है। जब आप इसे डालते हैं, उस क्षण पर ध्यान दें। अम्ल वसा से मिलता है, ठंडक तीखेपन से। हस्तक्षेप रासायनिक है। यह किस चीज को बाधित करता है?
    follow_ups:
      - दही के बिना भोजन क्या होगा?
      - विरोधाभास राहत कैसे पैदा करता है?
      - हस्तक्षेप और संतुलन के बीच क्या संबंध है?
  - id: ind_betel_after
    name: पान के बाद (Betel After)
    prompt: |
      कुछ परंपराओं में, पान भोजन का अंत करता है। यह मिठाई नहीं है। यह समापन है। तालू फिर से बदलता है। अंत पूरे के बारे में क्या कहता है?
    follow_ups:
      - पान परिवर्तन को कैसे चिह्नित करता है?
      - इसके बिना भोजन में क्या कमी होगी?
      - अंत और स्मृति के बीच क्या संबंध है?
  - id: ind_street_chaos
    name: सड़क का कोलाहल (Street Chaos)
    prompt: |
      एक चाट वाला तेज़ी से काम करता है—भेल, पापड़ी, चटनी सेकंडों में परती जाती है। प्रदर्शन देखें। स्टॉल थिएटर है। स्क्रिप्ट क्या है? दर्शक कौन हैं?
    follow_ups:
      - प्रदर्शन के बिना व्यंजन क्या होगा?
      - तेज़ी अनुभव को कैसे आकार देती है?
      - कोलाहल और शिल्प के बीच क्या संबंध है?
  - id: ind_tandoor_breathe
    name: तंदूर की साँस (Tandoor Breathe)
    prompt: |
      तंदूर साँस लेता है—लपटें, धुआँ, मिट्टी। नान दीवार पर चिपकाया जाता है, छाले पड़ने पर निकाला जाता है। उसके पास खड़े हों। गर्मी, गंध। आग और स्वाद के बीच क्या संबंध है?
    follow_ups:
      - तंदूर के बिना नान क्या होगा?
      - मिट्टी बनाने वाले को कैसे आकार देती है?
      - साँस और रोटी के बीच क्या संबंध है?
  - id: ind_turmeric_stain
    name: हल्दी का दाग (Turmeric Stain)
    prompt: |
      हल्दी के दाग—उंगलियाँ, कपड़ा, प्लास्टिक। रंग बना रहता है। ध्यान दें कि यह क्या चिह्नित करता है। दाग पुरातत्व है। यह भोजन आप तक पहुँचने से पहले कहाँ यात्रा कर चुका है?
    follow_ups:
      - रंग के बिना व्यंजन क्या होगा?
      - दाग श्रम को कैसे चिह्नित करता है?
      - रंगद्रव्य और संरक्षण के बीच क्या संबंध है?
  - id: ind_rice_architecture
    name: चावल की वास्तुकला (Rice Architecture)
    prompt: |
      बिरयानी बनाई जाती है—चावल की परत, मांस की परत, केसर, तली हुई प्याज। संरचना बनी रहती है। इसे खंगालें। वास्तुकला हर बाइट को कैसे प्रभावित करती है?
    follow_ups:
      - अगर परतें बहुत जल्दी मिल जातीं तो क्या होता?
      - संरचना आश्चर्य कैसे पैदा करती है?
      - निर्माण और भोजन के बीच क्या संबंध है?
  - id: ind_chutney_spectrum
    name: चटनी का स्पेक्ट्रम (Chutney Spectrum)
    prompt: |
      पुदीना, इमली, नारियल, टमाटर—चटनियां एक पैलेट की तरह फैली हुई हैं। प्रत्येक बाइट को बदलता है। एक व्यंजन को तीन चटनी के साथ चखें। वही आधार तीन अलग-अलग कहानियाँ कैसे बन जाता है?
    follow_ups:
      - केवल एक चटनी के साथ भोजन क्या होगा?
      - पसंद एजेंसी को कैसे आकार देती है?
      - स्पेक्ट्रम और प्राथमिकता के बीच क्या संबंध है?
  - id: ind_steam_rising
    name: भाप उठती हुई (Steam Rising)
    prompt: |
      इडली, डोसा, पूड़ी—ढक्कन उठाते ही भाप उठती है। इसे देखें। भाप स्वाद से पहले सुगंध ले जाती है। पहले क्या आता है? नाक या मुँह?
    follow_ups:
      - भाप प्रत्याशा को कैसे आकार देती है?
      - लिफ्ट के बिना क्या खो जाएगा?
      - वाष्प और स्वाद के बीच क्या संबंध है?
  - id: ind_silver_versus_steel
    name: चांदी बनाम स्टील (Silver Versus Steel)
    prompt: |
      कुछ टेबल स्टील की थाली, कुछ चांदी, कुछ केले के पत्ते का उपयोग करते हैं। बर्तन पर ध्यान दें। भोजन के नीचे की सतह अनुभव को कैसे बदलती है? वजन, ध्वनि, परंपरा।
    follow_ups:
      - विभिन्न सतहों पर भोजन कैसा महसूस होगा?
      - बर्तन समारोह को कैसे आकार देता है?
      - सामग्री और अर्थ के बीच क्या संबंध है?
  - id: ind_cumin_fragrance
    name: जीरे की खुशबू (Cumin Fragrance)
    prompt: |
      भुने हुए जीरे के बीज स्वाद से पहले सुगंध छोड़ते हैं। किसी व्यंजन को चखने से पहले उसकी गंध लें। जीरा कमरे में फैलता है। सुगंध तालू को कैसे तैयार करती है?
    follow_ups:
      - गंध के बिना व्यंजन क्या होगा?
      - खुशबू बनाने वाले की उपस्थिति को कैसे चिह्नित करती है?
      - नाक और स्मृति के बीच क्या संबंध है?
  - id: ind_shared_central
    name: साझा केंद्रीय (Shared Central)
    prompt: |
      व्यंजन बीच में रखे जाते हैं। हर कोई पहुँचता है। इसमें "आपकी थाली" उसी तरह से नहीं होती है। पहुँचने, पास करने, लेने की कोरियोग्राफी का निरीक्षण करें। अनकहे नियम क्या हैं?
    follow_ups:
      - व्यक्तिगत हिस्से के साथ भोजन क्या होगा?
      - साझा करना संबंध कैसे बनाता है?
      - केंद्रीय और सांप्रदायिक के बीच क्या संबंध है?
  - id: ind_ghee_gloss
    name: घी की चमक (Ghee Gloss)
    prompt: |
      घी जमा होता है, चमकता है, लेप करता है। यह वसा स्वाद और फिनिश के रूप में है। ध्यान दें कि यह थाली पर कहाँ इकट्ठा होता है। वह चमक बनावट और तापमान को कैसे बदलती है?
    follow_ups:
      - तेल के बजाय व्यंजन क्या होगा?
      - घी अन्य स्वादों को कैसे ले जाता है?
      - चमक और समृद्धि के बीच क्या संबंध है?
  - id: ind_papad_crunch
    name: पापड़ की चरमराहट (Papad Crunch)
    prompt: |
      पापड़—कुरकुरा, पतला, चरचरा। यह विराम के रूप में बनावट है। एक तोड़ें। सुनें। चरमराहट भोजन का रिदम सेक्शन है। इसके बिना चुप्पी कैसी लगेगी?
    follow_ups:
      - चरमराहट विरोधाभास कैसे पैदा करती है?
      - पापड़ के बिना भोजन में क्या कमी होगी?
      - ध्वनि और संतुष्टि के बीच क्या संबंध है?
  - id: ind_sambar_depth
    name: सांभर की गहराई (Sambar Depth)
    prompt: |
      सांभर परतदार होता है—दाल, इमली, सब्जियां, मसाले। यह उबलता रहा है। परतों के लिए चखें। आप कितनी अलग कर सकते हैं? उस कटोरी का पुरातत्व क्या है?
    follow_ups:
      - कम परतों के साथ सांभर क्या होगा?
      - समय गहराई कैसे बनाता है?
      - उबलना और कहानी के बीच क्या संबंध है?
  - id: ind_pickle_punch
    name: अचार का पंच (Pickle Punch)
    prompt: |
      अचार—मोड़ है। एक छोटा सा बाइट सब कुछ बदल देता है। मीठा, खट्टा, तीखा, किण्वित। ध्यान दें कि यह कब प्रवेश करता है। यह क्या बाधित करता है?
    follow_ups:
      - अचार के बिना भोजन क्या होगा?
      - पंच आश्चर्य कैसे पैदा करता है?
      - मोड़ और स्मृति के बीच क्या संबंध है?
  - id: ind_bay_leaf_hunt
    name: तेज पत्ते की खोज (Bay Leaf Hunt)
    prompt: |
      पुलाव, बिरयानी, करी में तेज पत्ते छिपे रहते हैं। एक खोजें। आप इसे खाते नहीं हैं—यह पुरातत्व है। यह केरल या कश्मीर से आया था। इसे हटाने से पहले इसने क्या जोड़ा?
    follow_ups:
      - अखाद्य खाद्य को कैसे आकार देता है?
      - पत्ते के बिना व्यंजन क्या होगा?
      - छिपे हुए और मौजूद के बीच क्या संबंध है?
  - id: ind_dosa_edge
    name: डोसा का किनारा (Dosa Edge)
    prompt: |
      डोसे का एक किनारा होता है—कुरकुरा, जालीदार, सुनहरा। केंद्र नरम होता है। विरोधाभास वास्तुशिल्प है। आप पहले कहाँ काटते हैं? किनारा पूरे को कैसे फ्रेम करता है?
    follow_ups:
      - यदि डोसा समान रूप से कुरकुरा हो तो क्या होगा?
      - किनारा रुचि कैसे पैदा करता है?
      - सीमा और केंद्र के बीच क्या संबंध है?
  - id: ind_saffron_thread
    name: केसर का धागा (Saffron Thread)
    prompt: |
      केसर—कुछ धागे—एक पूरे व्यंजन को रंग और सुगंधित करते हैं। एक धागे का पता लगाएँ। यह कहाँ से आया? कश्मीर, ईरान, स्पेन? सबसे महंगा मसाला। कमी क्या जोड़ती है?
    follow_ups:
      - केसर विलासिता को कैसे आकार देता है?
      - हल्दी के बजाय व्यंजन क्या होगा?
      - धागे और क्षेत्र के बीच क्या संबंध है?
  - id: ind_chaat_texture
    name: चाट की बनावट (Chaat Texture)
    prompt: |
      चाट एक बाइट में बनावट की परतें—कुरकुरा, नरम, कुरकुरा, मलाईदार—परत दर परत। इसे डीकंस्ट्रक्ट करें। कितनी बनावट? वे एक साथ कैसे काम करते हैं? बाइट एक सहयोग है।
    follow_ups:
      - एक बनावट के साथ चाट क्या होगा?
      - परतें खेल कैसे बनाती हैं?
      - बनावट और आनंद के बीच क्या संबंध है?
  - id: ind_mustard_seed_pop
    name: सरसों के दाने की चरमराहट (Mustard Seed Pop)
    prompt: |
