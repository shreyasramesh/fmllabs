# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# पाक कला प्रयोगशाला — सुशी (Hindi)

id: culinary_lab_sushi
name: पाक कला प्रयोगशाला — सुशी
description: 50 कार्ड जो सुशी के आपके अनुभव को बदल देंगे - चावल और मछली की रसायन शास्त्र से लेकर काउंटर के नृत्य और प्रत्येक नेटा की उत्पत्ति के पुरातत्व तक।
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: चावल का तापमान
    prompt: |
      सुशी चावल गर्म होता है - लगभग शरीर के तापमान पर। ठंडा नहीं। गर्मी
      सिरके को ले जाती है। इसे महसूस करें। ठंडा चावल क्या करेगा? तापमान
      बाइट को कैसे आकार देता है?
    follow_ups:
      - कमरे के तापमान पर क्या त्याग होगा?
      - गर्मी स्वाद को कैसे ले जाती है?
      - तापमान और बनावट के बीच क्या संबंध है?
  - id: sush_shari_balance
    name: शारी संतुलन
    prompt: |
      शारी - चावल - सुशी का आधा हिस्सा है। सिरका, नमक, चीनी का संतुलन
      सटीक है। अकेले चावल का स्वाद लें। यह क्या लाता है? बेस्वाद चावल का
      क्या मतलब होगा?
    follow_ups:
      - चावल नेटा को कैसे आकार देता है?
      - बहुत ज़्यादा सिरका क्या करेगा?
      - शारी और नेटा के बीच क्या संबंध है?
  - id: sush_counter_ritual
    name: काउंटर अनुष्ठान
    prompt: |
      काउंटर पर ओमाकासे - आप शेफ का सामना करते हैं। सुशी एक-एक करके आती है।
      काउंटर एक मंच है। नृत्य पर ध्यान दें। लय क्या है? गति कौन निर्धारित
      करता है?
    follow_ups:
      - टेबल क्या बदल देगी?
      - काउंटर भोजन को कैसे आकार देता है?
      - शेफ और मेहमान के बीच क्या संबंध है?
  - id: sush_net_origin
    name: नेटा की उत्पत्ति
    prompt: |
      प्रत्येक नेटा - टॉपिंग - कहीं से आया है। टॉयोसु। त्सूकिजी। एक नाव।
      एक फार्म। पूछें। मछली का पता लगाएँ। इसने क्या यात्रा की? गोदाम से
      जमा हुआ क्या मतलब होगा?
    follow_ups:
      - उत्पत्ति टुकड़े को कैसे आकार देती है?
      - एक अलग स्रोत क्या करेगा?
      - स्थान और गुणवत्ता के बीच क्या संबंध है?
  - id: sush_wasabi_hidden
    name: छिपा हुआ वसाबी
    prompt: |
      असली वसाबी - कद्दूकस की हुई जड़ - दुर्लभ है। ज़्यादातर हॉर्सरैडिश और
      रंग होता है। लेकिन जब यह असली होता है, तो यह अलग होता है। तीखा, हरा,
      क्षणिक। गर्मी पर ध्यान दें। नकली क्या जोड़ेगा? घटाएगा?
    follow_ups:
      - वसाबी बाइट को कैसे आकार देता है?
      - कोई वसाबी क्या मतलब होगा?
      - गर्मी और मछली के बीच क्या संबंध है?
  - id: sush_finger_over_chopstick
    name: उंगली चॉपस्टिक के ऊपर
    prompt: |
      निगिरी पारंपरिक रूप से उंगलियों से खाई जाती है - चॉपस्टिक से नहीं।
      उंगलियाँ तापमान, बनावट को महसूस करती हैं। इसे आज़माएँ। उंगली क्या
      जोड़ती है जो चॉपस्टिक नहीं जोड़ सकती?
    follow_ups:
      - हाथ अनुभव को कैसे आकार देता है?
      - चॉपस्टिक क्या करेंगी?
      - स्पर्श और स्वाद के बीच क्या संबंध है?
  - id: sush_piece_by_piece
    name: एक-एक करके टुकड़ा
    prompt: |
      सुशी एक या दो टुकड़े करके आती है। गति जानबूझकर होती है। आप खाते
      हैं; आप इंतज़ार करते हैं। लय पर विचार करें। एक बार में दस के
      समूह से क्या त्याग होगा?
    follow_ups:
      - गति भोजन को कैसे आकार देती है?
      - गति क्या करेगी?
      - टुकड़े और ध्यान के बीच क्या संबंध है?
  - id: sush_gari_palate
    name: गारी पैलेट
    prompt: |
      गारी - अचार वाली अदरक - टुकड़ों के बीच साफ करती है। यह गार्निश नहीं
      है; यह रीसेट है। ध्यान दें कि आप इसे कब खाते हैं। बिना गारी के
      लगातार टुकड़े पैलेट को क्या करेंगे?
    follow_ups:
      - गारी प्रगति को कैसे आकार देती है?
      - कोई गारी क्या मतलब होगा?
      - रीसेट और स्वाद के बीच क्या संबंध है?
  - id: sush_soy_minimal
    name: न्यूनतम सोया
    prompt: |
      सोया - एक हल्का डिप, मछली की ओर नीचे। चावल नहीं। चावल बहुत ज़्यादा
      सोख लेगा। शेफ ने शायद पहले ही सोया लगा दिया होगा। ध्यान दें।
      डुबाने से क्या होगा?
    follow_ups:
      - सोया टुकड़े को कैसे आकार देता है?
      - कोई सोया क्या मतलब होगा?
      - डिप और संतुलन के बीच क्या संबंध है?
  - id: sush_knife_matters
    name: चाकू का महत्व
    prompt: |
      सुशी चाकू - सिंगल-बेवल, तेज। कट बनावट को प्रभावित करता है। अनाज
      के विपरीत या उसके साथ। कोण। विचार करें कि ब्लेड क्या करता है। एक
      कुंद चाकू क्या त्याग करेगा?
    follow_ups:
      - कट मछली को कैसे आकार देता है?
      - एक अलग कोण क्या करेगा?
      - ब्लेड और मुंह के स्वाद के बीच क्या संबंध है?
  - id: sush_otoro_fat
    name: ओटोरो फैट
    prompt: |
      ओटोरो - सबसे फैटी टूना - पिघल जाता है। फैट ही मुद्दा है। मार्बलिंग
      पर विचार करें। लीन अकामी क्या करेगा? फैट अनुभव को कैसे आकार
      देता है?
    follow_ups:
      - फैट के बिना टुकड़ा क्या होगा?
      - मार्बलिंग विलासिता कैसे बनाती है?
      - फैट और पिघलने के बीच क्या संबंध है?
  - id: sush_unagi_glaze
    name: उनागी ग्लेज
    prompt: |
      उनागी - ईल - मीठी चटनी से ब्रश की जाती है, कभी-कभी फिर से भुनी
      जाती है। ग्लेज वार्निश है। चमक पर विचार करें। बिना ग्लेज वाली ईल
      क्या मतलब होगी?
    follow_ups:
      - ग्लेज टुकड़े को कैसे आकार देता है?
      - मीठे और ईल के बीच क्या संबंध है?
      - ग्लेज क्यों?
  - id: sush_nori crisp
    name: नोरी क्रिस्प
    prompt: |
      माकी के लिए नोरी - टोस्टेड, क्रिस्प, या नरम? अलग-अलग शेफ अलग-अलग
      तरीके से चुनते हैं। नोरी बाइट को प्रभावित करती है। बनावट पर विचार
      करें। गीला नोरी क्या करेगा?
    follow_ups:
      - नोरी रोल को कैसे आकार देता है?
      - एक अलग टोस्ट क्या मतलब होगा?
      - क्रिस्प और फ्रेश के बीच क्या संबंध है?
  - id: sush_silence_counter
    name: काउंटर पर सन्नाटा
    prompt: |
      कुछ सुशी काउंटर शांत होते हैं - एकाग्रता, सम्मान। अन्य जीवंत
      होते हैं। ध्वनि परिदृश्य पर ध्यान दें। सन्नाटा क्या जोड़ता है?
      बातचीत क्या जोड़ती है?
    follow_ups:
      - ध्वनि भोजन को कैसे आकार देती है?
      - तेज़ संगीत क्या करेगा?
      - शांति और ध्यान के बीच क्या संबंध है?
  - id: sush_tamago_sweet
    name: तामागो मीठा
    prompt: |
      तामागो - अंडा कस्टर्ड - अक्सर भोजन समाप्त करता है। यह मीठा, बहुस्तरीय
      होता है। शेफ का कौशल दिखाई देता है। क्लोजर पर विचार करें। कच्ची
      मछली अंतिम टुकड़ा होने का क्या मतलब होगा?
    follow_ups:
      - तामागो अंत को कैसे आकार देता है?
      - मीठे और क्लोज के बीच क्या संबंध है?
      - अंडा आखिरी में क्यों?
  - id: sush_tuna_spectrum
    name: टूना स्पेक्ट्रम
    prompt: |
      अकामी, चुटोरो, ओटोरो - लीन से फैट तक। स्पेक्ट्रम जानबूझकर है। यदि
      संभव हो तो क्रम में उनका स्वाद लें। प्रगति कैसे काम करती है? प्रत्येक
      क्या प्रदान करता है?
    follow_ups:
      - फैट स्पेक्ट्रम को कैसे आकार देता है?
      - एक ग्रेड अकेले क्या मतलब होगा?
      - लीन और रिच के बीच क्या संबंध है?
  - id: sush_ume_shiso
    name: उमे शिज़ो
    prompt: |
      उमे - अचार वाला आलूबुखारा - और कुछ रोल में शिज़ो। खट्टा, जड़ी-बूटी
      वाला। वे समृद्धि को काटते हैं। ध्यान दें कि वे कब दिखाई देते हैं।
      उनके बिना रोल क्या होगा?
    follow_ups:
      - उमे बाइट को कैसे आकार देता है?
      - खट्टे और मछली के बीच क्या संबंध है?
      - शिज़ो क्यों?
  - id: sush_gunkan_hold
    name: गुंकन होल्ड
    prompt: |
      गुंकन - युद्धपोत - ढीले टॉपिंग रखता है। रो, समुद्री अर्चिन। नोरी
      कॉलर रखता है। रूप पर विचार करें। एक सपाट टुकड़ा क्या करेगा?
    follow_ups:
      - रूप टॉपिंग को कैसे आकार देता है?
      - एक अलग बर्तन क्या करेगा?
      - होल्ड और स्पिल के बीच क्या संबंध है?
  - id: sush_uni_risk
    name: युनि रिस्क
    prompt: |
      युनि - समुद्री अर्चिन - ध्रुवीकरण करने वाला है। मीठा, नमकीन, बनावट।
      यह सही या खराब हो सकता है। जोखिम पर विचार करें। सुरक्षित सामन क्या
      करेगा? जोखिम क्या जोड़ता है?
    follow_ups:
      - युनि अनुभव को कैसे आकार देता है?
      - जोखिम के बिना आप क्या खो देंगे?
      - ध्रुवीकरण और यादगार के बीच क्या संबंध है?
  - id: sush_chef_choice
    name: शेफ की पसंद
    prompt: |
      ओमाकासे - शेफ की पसंद। आप नियंत्रण छोड़ देते हैं। शेफ दिन, मछली,
      आपको पढ़ता है। विश्वास पर विचार करें। खुद चुनना क्या बदल देगा?
    follow_ups:
      - आत्मसमर्पण भोजन को कैसे आकार देता है?
      - मेनू ऑर्डर क्या करेगा?
      - विश्वास और अनुभव के बीच क्या संबंध है?
  - id: sush_sake_pair
    name: साके पेयर
    prompt: |
      सुशी के साथ साके - ठंडा, गर्म, पुराना। जोड़ी पर विचार किया जाता है।
      जब आप घूंट लेते हैं तो ध्यान दें। क्या यह साफ करता है? बढ़ाता है?
      पेय की भूमिका पर विचार करें।
    follow_ups:
      - साके टुकड़े को कैसे आकार देता है?
      - वाइन क्या करेगी?
      - चावल और चावल की शराब के बीच क्या संबंध है?
  - id: sush_ikura_pop
    name: इकुरा पॉप
    prompt: |
      इकुरा - सामन रो - पॉप। फटना बनावट और नमकीन है। सनसनी पर विचार
      करें। पके हुए रो क्या करेंगे? पॉप बाइट को कैसे आकार देता है?
    follow_ups:
      - पॉप के बिना टुकड़ा क्या होगा?
      - बनावट आनंद कैसे बनाती है?
      - पॉप और नमक के बीच क्या संबंध है?
  - id: sush_hirame_chew
    name: हिरामे च्यू
    prompt: |
      हिरामे - फ़ाउंडर - में टूना की तुलना में एक अलग च्यू होता है। यह लीन,
      नाजुक है। बनावट पर ध्यान दें। फैटी मछली क्या करेगी? च्यू कैसे
      भिन्न होता है?
    follow_ups:
      - बनावट टुकड़े को कैसे आकार देती है?
      - लीन और नाजुक के बीच क्या संबंध है?
      - हिरामे क्यों ऑर्डर करें?
  - id: sush_amaebi_head
    name: अमाएबी हेड
    prompt: |
      अमाएबी - मीठा झींगा - कभी-कभी सिर को तला हुआ परोसा जाता है। सिर
      कुरकुरा, उमामी होता है। पूरे के उपयोग पर विचार करें। बिना सिर वाले
      झींगे क्या त्याग करेंगे?
    follow_ups:
      - सिर व्यंजन को कैसे आकार देता है?
      - पूरे और सम्मान के बीच क्या संबंध है?
      - सिर क्यों तलें?
  - id: sush_mirin_gloss
    name: मिरिन ग्लोस
    prompt: |
      कुछ टुकड़ों को निकिरी - सोया, मिरिन, साके - से ब्रश किया जाता है।
      चमक फिनिश है। शेफ ने इसे सॉस किया है। अतिरिक्त सोया जोड़ने पर
      विचार करें। ज़्यादा डुबाने से क्या होगा?
    follow_ups:
      - ब्रश टुकड़े को कैसे आकार देता है?
      - कोई ब्रश क्या मतलब होगा?
      - शेफ के हाथ और आपके बीच क्या संबंध है?
  - id: sush_anago_soft
    name: एनागो सॉफ्ट
    prompt: |
      एनागो - खारे पानी की ईल - उनागी से नरम होती है। अलग प्रजातियां,
      अलग तैयारी। बनावट पर ध्यान दें। उनागी की दृढ़ता क्या करेगी?
    follow_ups:
      - नरम टुकड़े को कैसे आकार देता है?
