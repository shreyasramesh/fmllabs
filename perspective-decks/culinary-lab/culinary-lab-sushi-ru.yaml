# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулинарная лаборатория — Суши (Russian)

id: culinary_lab_sushi
name: Кулинарная лаборатория — Суши
description: 50 карточек, которые помогут вам по-новому взглянуть на суши — от химии риса и рыбы до хореографии у стойки и археологии происхождения каждого нэта.
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: Температура риса
    prompt: |
      Рис для суши теплый — примерно температура тела. Не холодный. Тепло
      переносит уксус. Почувствуйте это. Что сделал бы холодный рис? Как
      температура формирует укус?
    follow_ups:
      - Что потерял бы рис комнатной температуры?
      - Как тепло переносит вкус?
      - Какова связь между температурой и текстурой?
  - id: sush_shari_balance
    name: Баланс шари
    prompt: |
      Шари — рис — это половина суши. Баланс уксуса, соли, сахара точен.
      Попробуйте рис отдельно. Что он привносит? Что означал бы пресный
      рис?
    follow_ups:
      - Как рис формирует нэта?
      - Что сделал бы избыток уксуса?
      - Какова связь между шари и нэта?
  - id: sush_counter_ritual
    name: Ритуал у стойки
    prompt: |
      Омакасе у стойки — вы лицом к лицу с шеф-поваром. Суши подаются по
      одной штуке. Стойка — это сцена. Заметьте хореографию. Каков ритм?
      Кто задает темп?
    follow_ups:
      - Что изменил бы стол?
      - Как стойка формирует трапезу?
      - Какова связь между шеф-поваром и гостем?
  - id: sush_net_origin
    name: Происхождение нэта
    prompt: |
      Каждый нэта — топпинг — откуда-то родом. Тоёсу. Цукидзи. Лодка. Ферма.
      Спросите. Отследите рыбу. Какой путь она проделала? Что означал бы
      замороженный с склада?
    follow_ups:
      - Как происхождение формирует блюдо?
      - Что сделала бы другая поставка?
      - Какова связь между местом и качеством?
  - id: sush_wasabi_hidden
    name: Скрытый васаби
    prompt: |
      Настоящий васаби — тертый корень — редок. Большинство — хрен и краситель.
      Но когда он настоящий, он другой. Острый, зеленый, мимолетный.
      Заметьте остроту. Что добавило бы подделка? Отняла бы?
    follow_ups:
      - Как васаби формирует укус?
      - Что означало бы отсутствие васаби?
      - Какова связь между остротой и рыбой?
  - id: sush_finger_over_chopstick
    name: Палец вместо палочек
    prompt: |
      Нигири традиционно едят пальцами — не палочками. Пальцы чувствуют
      температуру, текстуру. Попробуйте. Что палец добавляет, чего не могут
      палочки?
    follow_ups:
      - Как рука формирует впечатление?
      - Что сделали бы палочки?
      - Какова связь между прикосновением и вкусом?
  - id: sush_piece_by_piece
    name: Поштучно
    prompt: |
      Суши подаются по одной штуке — или по две. Темп намерен. Вы едите;
      вы ждете. Подумайте о ритме. Что потеряла бы тарелка с десятью штуками
      сразу?
    follow_ups:
      - Как темп формирует трапезу?
      - Что сделала бы скорость?
      - Какова связь между штукой и вниманием?
  - id: sush_gari_palate
    name: Гари для неба
    prompt: |
      Гари — маринованный имбирь — очищает между кусочками. Это не гарнир;
      это сброс. Заметьте, когда вы его едите. Что сделали бы последовательные
      кусочки без гари с вашим вкусом?
    follow_ups:
      - Как гари формирует прогрессию?
      - Что означало бы отсутствие гари?
      - Какова связь между сбросом и вкусом?
  - id: sush_soy_minimal
    name: Минимальное соевое мясо
    prompt: |
      Соевый соус — легкое окунание, стороной рыбы вниз. Не рисом. Рис
      впитал бы слишком много. Шеф-повар, возможно, уже смазал соусом.
      Заметьте. Что сделало бы заливание?
    follow_ups:
      - Как соевый соус формирует блюдо?
      - Что означало бы отсутствие соевого соуса?
      - Какова связь между окунанием и балансом?
  - id: sush_knife_matters
    name: Важен нож
    prompt: |
      Нож для суши — однолезвийный, острый. Разрез влияет на текстуру.
      Поперек или вдоль волокон. Угол. Подумайте, что делает лезвие. Что
      потерял бы тупой нож?
    follow_ups:
      - Как разрез формирует рыбу?
      - Что сделал бы другой угол?
      - Какова связь между лезвием и ощущением во рту?
  - id: sush_otoro_fat
    name: Жир оторо
    prompt: |
      Оторо — самый жирный тунец — тает. Жир — это главное. Подумайте о
      мраморности. Что сделала бы постная аками? Как жир формирует
      впечатление?
    follow_ups:
      - Что было бы с куском без жира?
      - Как мраморность создает роскошь?
      - Какова связь между жиром и таянием?
  - id: sush_unagi_glaze
    name: Глазурь унаги
    prompt: |
      Унаги — угорь — смазывается сладким соусом, иногда снова поджаривается.
      Глазурь — это лак. Подумайте о блеске. Что означал бы угорь без
      глазури?
    follow_ups:
      - Как глазурь формирует блюдо?
      - Какова связь между сладким и угрем?
      - Зачем глазурь?
  - id: sush_nori crisp
    name: Хруст нори
    prompt: |
      Нори для маки — поджаренный, хрустящий или мягкий? Разные повара
      выбирают по-разному. Нори влияет на укус. Подумайте о текстуре. Что
      сделала бы размокшая нори?
    follow_ups:
      - Как нори формирует ролл?
      - Что означало бы другое поджаривание?
      - Какова связь между хрустом и свежестью?
  - id: sush_silence_counter
    name: Тишина у стойки
    prompt: |
      Некоторые стойки для суши тихие — сосредоточенность, уважение. Другие
      оживленные. Заметьте звуковой ландшафт. Что добавляет тишина? Что
      добавляет разговор?
    follow_ups:
      - Как звук формирует трапезу?
      - Что сделала бы громкая музыка?
      - Какова связь между тишиной и концентрацией?
  - id: sush_tamago_sweet
    name: Сладость тамаго
    prompt: |
      Тамаго — яичный заварной крем — часто завершает трапезу. Он сладкий,
      слоистый. Мастерство шеф-повара видно. Подумайте о финале. Что
      означал бы сырой рыбный кусочек в конце?
    follow_ups:
      - Как тамаго формирует завершение?
      - Какова связь между сладким и финалом?
      - Почему яйцо в конце?
  - id: sush_tuna_spectrum
    name: Спектр тунца
    prompt: |
      Аками, чуторо, оторо — от постного до жирного. Спектр намерен. Попробуйте
      их по порядку, если можете. Как работает прогрессия? Что предлагает
      каждый?
    follow_ups:
      - Как жир формирует спектр?
      - Что означал бы один сорт отдельно?
      - Какова связь между постным и насыщенным?
  - id: sush_ume_shiso
    name: Умэ сисо
    prompt: |
      Умэ — маринованная слива — и сисо в некоторых роллах. Кислое, травянистое.
      Они смягчают насыщенность. Заметьте, когда они появляются. Что был бы
      ролл без них?
    follow_ups:
      - Как умэ формирует укус?
      - Какова связь между кислотой и рыбой?
      - Зачем сисо?
  - id: sush_gunkan_hold
    name: Удержание гункана
    prompt: |
      Гунканы — «военные корабли» — удерживают рассыпчатые топпинги. Икра,
      морской ёж. Воротник из нори все удерживает. Подумайте о форме. Что
      сделал бы плоский кусочек?
    follow_ups:
      - Как форма формирует топпинг?
      - Что означал бы другой сосуд?
      - Какова связь между удержанием и рассыпанием?
  - id: sush_uni_risk
    name: Риск уни
    prompt: |
      Уни — морской ёж — поляризует. Сладкий, солоноватый, текстурный. Он
      может быть идеальным или испорченным. Подумайте о риске. Что означал
      бы безопасный лосось? Что добавляет риск?
    follow_ups:
      - Как уни формирует впечатление?
      - Что вы потеряли бы без риска?
      - Какова связь между поляризующим и запоминающимся?
  - id: sush_chef_choice
    name: Выбор шеф-повара
    prompt: |
      Омакасе — выбор шеф-повара. Вы отказываетесь от контроля. Шеф-повар
      читает день, рыбу, вас. Подумайте о доверии. Что изменил бы ваш собственный
      выбор?
    follow_ups:
      - Как отказ от контроля формирует трапезу?
      - Что означал бы заказ по меню?
      - Какова связь между доверием и впечатлением?
  - id: sush_sake_pair
    name: Пара к саке
    prompt: |
      Саке с суши — холодное, теплое, выдержанное. Пара продумана. Заметьте,
      когда вы пьете. Очищает ли оно? Усиливает? Подумайте о роли напитка.
    follow_ups:
      - Как саке формирует блюдо?
      - Что сделало бы вино?
      - Какова связь между рисом и рисовым вином?
  - id: sush_ikura_pop
    name: Хлопок икры
    prompt: |
      Икра — икра лосося — лопается. Хлопок — это текстура и рассол. Подумайте
      о ощущении. Что сделала бы вареная икра? Как хлопок формирует укус?
    follow_ups:
      - Что было бы с куском без хлопка?
      - Как текстура создает удовольствие?
      - Какова связь между хлопком и солью?
  - id: sush_hirame_chew
    name: Жевательная текстура камбалы
    prompt: |
      Хираме — камбала — имеет другую жевательную текстуру, чем тунец. Она
      постная, нежная. Заметьте текстуру. Что сделала бы жирная рыба? Как
      варьируется жевательная текстура?
    follow_ups:
      - Как текстура формирует блюдо?
      - Какова связь между постным и нежным?
      - Зачем заказывать хираме?
  - id: sush_amaebi_head
    name: Голова амаэби
    prompt: |
      Амаэби — сладкая креветка — иногда подается с жареной головой. Голова
      хрустящая, умами. Подумайте об использовании целого. Что потеряла бы
      безголовая креветка?
    follow_ups:
      - Как голова формирует блюдо?
      - Какова связь между целым и уважением?
      - Зачем жарить голову?
  - id: sush_mirin_gloss
    name: Блеск мирина
    prompt: |
      Некоторые кусочки смазываются никири — соевый соус, мирин, саке. Блеск
      — это завершение. Шеф-повар уже соусировал. Подумайте, стоит ли добавлять
      еще соевый соус. Что сделало бы перебор с окунанием?
    follow_ups:
      - Как кисть формирует блюдо?
      - Что означало бы отсутствие кисти?
      - Какова связь между рукой шеф-повара и вашей?
  - id: sush_anago_soft
    name: Мягкость анаго
    prompt: |
      Анаго — морской угорь — мягче, чем унаги. Другие виды, другая
      подготовка. Заметьте текстуру. Что сделала бы упругость унаги?
    follow_ups:
      - Как мягкость формирует блюдо?
      - Какова связь между анаго и унаги?
      - Зачем оба угря?
  - id: sush_saba_silver
    name: Серебро сабы
    prompt: |
      Саба — скумбрия — часто консервируется. Серебристая кожа, маслянистая
      мякоть. Она сильная. Подумайте о консервации. Что означала бы сырая
      скумбрия?
    follow_ups:
      - Как консервация формирует рыбу?
      - Какова связь между маслом и консервацией?
      - Зачем консервировать сабу?
  - id: sush_ginger_between
    name: Имбирь между
    prompt: |
      Гари между кусочками — сброс. Но когда? После каждого? После нескольких?
      Ритм ваш. Заметьте свой паттерн. Что сделало бы отсутствие сброса?
    follow_ups:
      - Как время формирования гари?
      - Какова связь между кусочком и кусочком?
      - Когда вам нужен сброс?
  - id: sush_maki_cut
    name: Нарезка маки
    prompt: |
      Маки — роллы — нарезаются на кусочки. Шесть или восемь. Нарезка влияет
      на срез. Подумайте о спирали. Что сделала бы другая нарезка?
    follow_ups:
      - Как нарезка формирует укус?
      - Что означало бы меньше кусочков?
      - Какова связь между ломтиком и целым?
  - id: sush_tobiko_crunch
    name: Хруст тобико
    prompt: |
      Тобико — икра летучей рыбы — добавляет хруст и цвет. Это топпинг,
      гарнир. Заметьте, когда он появляется. Что был бы ролл без него?
    follow_ups:
      - Как тобико формирует укус?
      - Какова связь между хрустом и цветом?
      - Зачем летучая рыба?
  - id: sush_sashimi_contrast
    name: Контраст сашими
    prompt: |
      Сашими — без риса — позволяет рыбе быть самостоятельной. Чистота другая.
      Сравните сашими с нигири. Что добавляет рис? Что раскрывает его
      отсутствие?
    follow_ups:
      - Как рис формирует нигири?
      - Что означало бы только сашими?
      - Какова связь между рыбой и рисом?
  - id: sush_tea_rinse
    name: Промывка чаем
    prompt: |
      Зеленый чай у стойки для суши — доливается, делится. Он очищает. Чай
      — часть ритма. Подумайте о его роли. Что сделала бы вода? Что означал
      бы напиток?
    follow_ups:
      - Как чай формирует трапезу?
      - Какова связь между чаем и сбросом?
      - Зачем зеленый чай?
  - id: sush_bengara_tuna
    name: Бенгара тунец
    prompt: |
      Бенгара — постный тунец, часто со спины — темнее. Вкус отличается от
      аками. Подумайте о разрезе. Из какой части рыбы? Что делает местоположение?
    follow_ups:
      - Как разрез формирует вкус?
      - Какова связь между местом и вкусом?
      - Зачем такой разрез?
  - id: sush_kohada_cure
    name: Засолка кохада
    prompt: |
      Кохада — сельдь — маринуется, иногда с уксусом. Это проверка шеф-повара.
      Серебристая кожа, баланс. Подумайте о мастерстве. Что означала бы
      немаринованная рыба?
    follow_ups:
      - Как засолка формирует рыбу?
      - Какова связь между уксусом и серебристой кожей?
      - Почему это проверка?
  - id: sush_engawa_fin
    name: Плавник энгава
    prompt: |
      Энгава — мышечный плавник камбалы — ценится. У нее особая текстура.
      Подумайте о части. Что сделала бы обычная камбала? Как отличается
      плавник?
    follow_ups:
      - Как разрез формирует блюдо?
      - Какова связь между плавником и мышцей?
      - Почему он ценится?
  - id: sush_first_piece
    name: Первый кусочек
    prompt: |
      Первый кусочек задает тон. Часто что-то мягкое — возможно, хираме или
      тай. Шеф-повар калибруется. Подумайте о начале. Что означал бы оторо
      первым?
    follow_ups:
      - Как начало формирует трапезу?
      - Какова связь между первым и прогрессией?
      - Почему сначала мягкое?
  - id: sush_kampachi_fat
    name: Жир кампачи
    prompt: |
      Кампачи — молодой желтохвост — имеет тонкий жир. Он находится между
      постным и насыщенным. Заметьте средний путь. Что сделала бы бури? Что
      сделала бы более постная рыба?
    follow_ups:
      - Как жир формирует блюдо?
      - Какова связь между возрастом и жиром?
      - Зачем кампачи?
  - id: sush_nodoguro_char
    name: Обугливание нодогуро
    prompt: |
      Нодогуро — окунь с черным горлом — часто слегка обжигается. Кожа, жир.
      Обугливание добавляет. Подумайте о применении тепла. Что сделала бы
      сырая рыба?
    follow_ups:
      - Как обжигание формирует рыбу?
      - Какова связь между обугливанием и жиром?
      - Зачем обжигать именно эту рыбу?
  - id: sush_choji_plate
    name: Тарелка чоджи
    prompt: |
      Тарелка — или дерево, или камень — держит блюдо. Подача минимальна.
      Подумайте о сосуде. Что сделала бы перегруженная тарелка? Что позволяет
      минимализм?
    follow_ups:
      - Как тарелка формирует блюдо?
      - Какова связь между сосудом и фокусом?
      - Зачем минимализм?
  - id: sush_tea_cup
    name: Чашка для чая
    prompt: |
      Чашка для чая у стойки — без ручки, иногда грубая. Вы держите ее обеими
      руками. Подумайте о сосуде. Что сделала бы кружка? Что добавляет
      чашка?
    follow_ups:
      - Как чашка формирует глоток?
      - Какова связь между сосудом и ритуалом?
      - Зачем без ручки?
  - id: sush_silver_slide
    name: Серебряный скольз
    prompt: |
      Кусочек должен соскользнуть с тарелки — или быть поднятым чисто. Рис
      держит, но отпускает. Подумайте о конструкции. Что означал бы разваливающийся
      рис?
    follow_ups:
      - Как конструкция формирует процесс поедания?
