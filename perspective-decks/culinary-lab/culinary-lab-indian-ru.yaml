# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулинарная лаборатория — Индийская (Russian)

id: culinary_lab_indian
name: Кулинарная лаборатория — Индийская
description: 50 карточек, чтобы изменить ваше восприятие индийской кухни — от химии специй и остроты до археологии ингредиентов и хореографии общего стола.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: Траск Тадки
    prompt: |
      Тадка — закалка — это первая нота. Горячее масло встречается с семенами горчицы, кумином, листьями карри. Слушайте. Траск — это химия в реальном времени. Что меняется, когда вы слышите это раньше, чем пробуете?
    follow_ups:
      - Как звук формирует ожидание?
      - Что блюдо потеряет без траска?
      - Какова связь между звуком и вкусом?
  - id: ind_spice_route
    name: Пряный путь
    prompt: |
      Кардамон прибыл из Кералы. Шафран из Кашмира. Черный перец когда-то стоил своего веса в золоте. Проследите один пряный ингредиент на вашей тарелке до его происхождения. Какое путешествие он совершил, чтобы попасть к вам?
    follow_ups:
      - Как знание маршрута меняет вкус?
      - Какие еще пряности прошли тем же путем?
      - Какова связь между торговлей и вкусом?
  - id: ind_thali_geometry
    name: Геометрия Тали
    prompt: |
      Тали — это холст — миски, расположенные по кругу, каждая со своей ролью. Изучите композицию. Куда первым падает взгляд? Что такое негативное пространство?
    follow_ups:
      - Что произойдет, если одна миска будет отсутствовать?
      - Как расположение формирует блюдо?
      - Какова связь между геометрией и ритуалом?
  - id: ind_hand_as_tool
    name: Рука как инструмент
    prompt: |
      Роти разрывается, смешивается с сабджи, отправляется в рот. Рука — это и посуда, и сенсор. Заметьте хореографию. Что добавляет прикосновение, чего не могут вилка и нож?
    follow_ups:
      - Как еда руками меняет темп?
      - Что будет упущено с использованием столовых приборов?
      - Какова связь между прикосновением и температурой?
  - id: ind_heat_layers
    name: Слои остроты
    prompt: |
      Индийская острота имеет слои — жжение чили, тепло черного перца, огонь имбиря. Сделайте один укус и отметьте, где ощущается каждый вид остроты. Язык, горло, живот. Как они накапливаются?
    follow_ups:
      - Каким было бы блюдо только с одним видом остроты?
      - Как наслоение создает сложность?
      - Какова связь между остротой и временем?
  - id: ind_yogurt_intervention
    name: Йогуртовое вмешательство
    prompt: |
      Райта, дахи, ласси — йогурт охлаждает, смягчает, балансирует. Заметьте момент, когда вы его добавляете. Кислота встречается с жиром, холод — с остротой. Вмешательство химическое. Что оно прерывает?
    follow_ups:
      - Каким было бы блюдо без йогурта?
      - Как контраст создает облегчение?
      - Какова связь между вмешательством и балансом?
  - id: ind_betel_after
    name: Бетель после
    prompt: |
      Пан — лист бетеля — завершает трапезу в некоторых традициях. Это не десерт. Это завершение. Палитра вкусов снова меняется. Что говорит конец о целом?
    follow_ups:
      - Как пан отмечает переход?
      - Чего не хватало бы блюду без него?
      - Какова связь между окончанием и памятью?
  - id: ind_street_chaos
    name: Уличный хаос
    prompt: |
      Уличный торговец чаатом работает на скорости — бхель, папди, чатни наслаиваются за секунды. Наблюдайте за представлением. Лоток — это театр. Каков сценарий? Кто зрители?
    follow_ups:
      - Каким было бы блюдо без представления?
      - Как скорость формирует опыт?
      - Какова связь между хаосом и мастерством?
  - id: ind_tandoor_breathe
    name: Дыхание Тандыра
    prompt: |
      Тандыр дышит — пламенем, дымом, глиной. Нааншлепается на стену, вынимается, когда вздуется. Постойте рядом с ним. Жар, запах. Какова связь между огнем и вкусом?
    follow_ups:
      - Каким был бы наан без тандыра?
      - Как глина формирует пекаря?
      - Какова связь между дыханием и хлебом?
  - id: ind_turmeric_stain
    name: Пятно куркумы
    prompt: |
      Куркума оставляет пятна — на пальцах, ткани, пластике. Цвет остается. Заметьте, что она отмечает. Пятно — это археология. Какой путь прошло это блюдо, прежде чем попасть к вам?
    follow_ups:
      - Каким было бы блюдо без этого цвета?
      - Как пятно отмечает труд?
      - Какова связь между пигментом и сохранением?
  - id: ind_rice_architecture
    name: Архитектура риса
    prompt: |
      Бирьяни построен — слой риса, слой мяса, шафран, жареный лук. Структура держится. Раскопайте его. Как архитектура влияет на каждый укус?
    follow_ups:
      - Что произойдет, если слои смешаются слишком рано?
      - Как структура создает сюрприз?
      - Какова связь между постройкой и едой?
  - id: ind_chutney_spectrum
    name: Спектр Чатни
    prompt: |
      Мята, тамаринд, кокос, томат — чатни располагаются как палитра. Каждый меняет вкус. Попробуйте одно блюдо с тремя разными чатни. Как одна и та же основа становится тремя разными историями?
    follow_ups:
      - Каким было бы блюдо только с одним чатни?
      - Как выбор формирует самостоятельность?
      - Какова связь между спектром и предпочтением?
  - id: ind_steam_rising
    name: Поднимающийся пар
    prompt: |
      Идли, доса, пури — пар поднимается, когда поднимают крышку. Посмотрите на него. Пар несет аромат раньше вкуса. Что прибывает первым? Нос или рот?
    follow_ups:
      - Как пар формирует ожидание?
      - Что было бы упущено без поднятия крышки?
      - Какова связь между паром и вкусом?
  - id: ind_silver_versus_steel
    name: Серебро против Стали
    prompt: |
      Некоторые столы используют стальные тали, некоторые — серебряные, некоторые — банановые листья. Обратите внимание на посуду. Как поверхность под едой меняет впечатления? Вес, звук, традиции.
    follow_ups:
      - Каким ощущалось бы блюдо на разных поверхностях?
      - Как посуда формирует церемонию?
      - Какова связь между материалом и смыслом?
  - id: ind_cumin_fragrance
    name: Аромат кумина
    prompt: |
      Поджаренные семена кумина выделяют аромат раньше вкуса. Понюхайте блюдо, прежде чем пробовать. Кумин распространяется по комнате. Как аромат готовит вкусовые рецепторы?
    follow_ups:
      - Каким было бы блюдо без запаха?
      - Как аромат отмечает присутствие повара?
      - Какова связь между обонянием и памятью?
  - id: ind_shared_central
    name: Общее центральное
    prompt: |
      Блюда стоят в центре. Все тянутся. Нет такого понятия, как "ваша тарелка". Наблюдайте за хореографией: как тянутся, передают, берут. Каковы негласные правила?
    follow_ups:
      - Каким было бы блюдо с индивидуальными порциями?
      - Как совместное употребление создает связь?
      - Какова связь между центральным и общинным?
  - id: ind_ghee_gloss
    name: Блеск Гхи
    prompt: |
      Гхи собирается лужицами, блестит, покрывает. Это жир как вкус и как завершение. Заметьте, где оно скапливается на тарелке. Как этот блеск меняет текстуру и температуру?
    follow_ups:
      - Каким было бы блюдо с маслом вместо гхи?
      - Как гхи несет другие вкусы?
      - Какова связь между блеском и насыщенностью?
  - id: ind_papad_crunch
    name: Хруст Папада
    prompt: |
      Папад — хрустящий, тонкий, трескучий. Это текстура как пунктуация. Разломайте один. Послушайте. Хруст — это ритм-секция блюда. Как бы звучала тишина без него?
    follow_ups:
      - Как хруст создает контраст?
      - Чего бы не хватало блюду без папада?
      - Какова связь между звуком и удовлетворением?
  - id: ind_sambar_depth
    name: Глубина Самбара
    prompt: |
      Самбар имеет слои — бобы, тамаринд, овощи, специи. Он кипел. Попробуйте, чтобы ощутить слои. Сколько вы можете различить? Какова археология этой миски?
    follow_ups:
      - Каким был бы самбар с меньшим количеством слоев?
      - Как время создает глубину?
      - Какова связь между томлением и историей?
  - id: ind_pickle_punch
    name: Удар Соленья
    prompt: |
      Ачар — соленье — это сюжетный поворот. Один крошечный укус меняет всё. Сладкий, кислый, острый, ферментированный. Заметьте, когда он появляется. Что он нарушает?
    follow_ups:
      - Каким было бы блюдо без соленья?
      - Как удар создает сюрприз?
      - Какова связь между поворотом и памятью?
  - id: ind_bay_leaf_hunt
    name: Охота на лавровый лист
    prompt: |
      Лавровые листья прячутся в пулао, бирьяни, карри. Найдите один. Вы его не едите — это археология. Он прибыл из Кералы или Кашмира. Что он добавил, прежде чем был удален?
    follow_ups:
      - Как несъедобное формирует съедобное?
      - Каким было бы блюдо без листа?
      - Какова связь между скрытым и присутствующим?
  - id: ind_dosa_edge
    name: Край Досы
    prompt: |
      Доса имеет край — хрустящий, кружевной, золотистый. Центр мягкий. Контраст архитектурный. Где вы кусаете первым? Как край обрамляет всё целое?
    follow_ups:
      - Какой была бы доса, если бы была равномерно хрустящей?
      - Как край создает интерес?
      - Какова связь между границей и центром?
  - id: ind_saffron_thread
    name: Нить Шафрана
    prompt: |
      Шафран — несколько нитей — окрашивает и ароматизирует всё блюдо. Проследите одну нить. Откуда она родом? Кашмир, Иран, Испания? Самая дорогая специя. Что добавляет дефицит?
    follow_ups:
      - Как шафран формирует роскошь?
      - Каким было бы блюдо с куркумой вместо шафрана?
      - Какова связь между нитью и территорией?
  - id: ind_chaat_texture
    name: Текстура Чаата
    prompt: |
      Чаат сочетает текстуры — хрустящую, мягкую, твердую, кремовую — в одном укусе. Деконструируйте его. Сколько текстур? Как они работают вместе? Укус — это сотрудничество.
    follow_ups:
      - Каким был бы чаат с одной текстурой?
      - Как наслаивание создает игру?
      - Какова связь между текстурой и восторгом?
  - id: ind_mustard_seed_pop
    name: Хлопок семян горчицы
    prompt: |
      Семена горчицы хлопают в масле — бенгальская, южно-индийская закалка. Хлопок — это химия. Семена высвобождают соединения. Понюхайте это. Что меняется, когда тепло активирует их?
    follow_ups:
      - Как хлопок отмечает время приготовления?
      - Каким было бы блюдо без этого?
      - Какова связь между хлопком и силой?
  - id: ind_dal_surface
    name: Поверхность Дала
    prompt: |
      У дала есть поверхность — иногда пленочка, иногда сверху плавает тадка. Пока не перемешивайте. Посмотрите на нее. Что поверхность раскрывает о том, что под ней?
    follow_ups:
      - Как поверхность приглашает или отталкивает?
      - Что произойдет, если никогда не перемешивать?
      - Какова связь между поверхностью и глубиной?
  - id: ind_banana_leaf_plate
    name: Тарелка из бананового листа
    prompt: |
      Банановый лист — это тарелка — органическая, одноразовая, традиционная. Лист имеет текстуру, запах. Еда на нем лежит иначе. Как лист меняет блюдо?
    follow_ups:
      - Каким было бы блюдо на керамике?
      - Как лист формирует ритуал?
      - Какова связь между листом и местом?
  - id: ind_fenugreek_haunt
    name: Навязчивость Пажитника
    prompt: |
      Пажитник — мети — имеет стойкий запах. Горький, похожий на кленовый. Он преследует кухню, одежду. Заметьте, где он остается. Что добавляет стойкость?
    follow_ups:
      - Как пажитник отмечает территорию?
      - Каким было бы блюдо без его стойкости?
      - Какова связь между навязчивостью и памятью?
  - id: ind_pani_puri_moment
    name: Момент Пани Пури
    prompt: |
      Пани пури — это история одного укуса — хрустящая оболочка, картофель, нут, тамариндовая вода. Его нужно съесть целиком, немедленно. Момент неповторим. Что делает его неотложным?
    follow_ups:
      - Что произойдет, если подождать?
      - Как неотложность создает удовольствие?
      - Какова связь между моментом и памятью?
  - id: ind_serving_order
    name: Порядок подачи
    prompt: |
      В некоторых случаях есть порядок — сначала старшие, определенные блюда раньше других. Наблюдайте. Кто подает? Кто ждет? Хореография кодирует уважение. Каковы правила?
    follow_ups:
      - Каким было бы блюдо без порядка?
      - Как последовательность создает смысл?
      - Какова связь между порядком и иерархией?
  - id: ind_cardamom_pod
    name: Коробочка Кардамона
    prompt: |
      Целая коробочка кардамона прячется в пулао или чае. Вы можете ее разжевать, можете отложить. Коробочка — это археология — зеленая из Кералы, черная с гор. Что она внесла?
    follow_ups:
      - Чем целая коробочка отличается от молотого кардамона?
      - Каким было бы блюдо без нее?
      - Какова связь между коробочкой и местом?
  - id: ind_kitchen_sounds
    name: Звуки кухни
    prompt: |
      Индийская кухня имеет звуковой ландшафт — измельчение, жарка, свист скороварки. Закройте глаза на кухне. Опишите звуки. Что постоянно? Каков ритм?
    follow_ups:
      - Каким было бы блюдо без этих звуков?
      - Как звук формирует ожидание?
      - Какова связь между кухней и столом?
  - id: ind_second_helping
    name: Вторая порция
    prompt: |
      "Возьмите еще" — это ритуал. Настойчивость, отказ, окончательное согласие. Наблюдайте за танцем. Что означает вторая порция, кроме голода?
    follow_ups:
      - Каким было бы блюдо без предложения?
      - Как настойчивость кодирует заботу?
      - Какова связь между "больше" и "достаточно"?
  - id: ind_coriander_finish
    name: Завершение кинзой
    prompt: |
      Свежая кинза (кориандр) украшает многие блюда. Это последнее, что добавляют. Завершение. Заметьте, как зелень меняет то, что было раньше. Яркая, травянистая, спорная.
    follow_ups:
      - Каким было бы блюдо без зелени?
      - Как завершение обрамляет целое?
      - Какова связь между последним и первым?
  - id: ind_lassi_cut
    name: Лимонад Ласси
    prompt: |
      Ласси смягчает остроту — прохладное, кислое, густое. Это облегчение. Заметьте момент, когда вы его пьете. Что оно прерывает? Что оно сбрасывает?
    follow_ups:
      - Каким было бы блюдо без ласси?
      - Как смягчение продлевает выносливость?
      - Какова связь между облегчением и ритмом?
  - id: ind_roti_stretch
    name: Растяжение Роти
    prompt: |
      Роти растягивается руками — круглое, тонкое, пузырится на огне. Смотрите, как его делают. Растяжение — это навык. Каким был бы хлеб без этого движения?
    follow_ups:
      - Как растяжение влияет на текстуру?
      - Что потеряет роти, сделанный машинным способом?
      - Какова связь между движением и результатом?
  - id: ind_jaljeera_pause
    name: Пауза Джалжиры
    prompt: |
      Джалжира — кумин, мята, тамаринд — это пищеварительное средство, пауза. Его часто подают в середине или после еды. Заметьте смену. Что позволяет пауза?
    follow_ups:
      - Каким было бы блюдо без паузы?
      - Как джалжира отмечает переход?
      - Какова связь между паузой и пищеварением?
  - id: ind_color_conversation
    name: Разговор Цветов
    prompt: |
      Индийские тарелки говорят цветом — желтый дал, зеленая сабджи, белый рис, красный чатни. Изучите палитру. Какой разговор? Что бы конфликтовало? Что гармонировало?
    follow_ups:
      - Как цвет формирует аппетит?
      - Каким было бы блюдо в монохроме?
      - Какова связь между палитрой и регионом?
  - id: ind_clove_buried
    name: Зарытая Гвоздика
    prompt: |
      Гвоздика прячется в бирьяни, гарам масала, чае. Она ароматная, теплая. Найдите одну. Вы можете ее разжевать. Гвоздика — реликт специй. Какие территории она связывает?
    follow_ups:
      - Чем целая гвоздика отличается от молотой?
      - Каким было бы блюдо без гвоздики?
      - Какова связь между гвоздикой и колониализмом?
  - id: ind_family_style
    name: Семейный стиль
    prompt: |
