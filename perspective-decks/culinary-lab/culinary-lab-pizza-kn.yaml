# ಪಾಕಶಾಸ್ತ್ರ ಪ್ರಯೋಗಾಲಯ — ಪಿಜ್ಜಾ (Kannada)

id: culinary_lab_pizza
name: ಪಾಕಶಾಸ್ತ್ರ ಪ್ರಯೋಗಾಲಯ — ಪಿಜ್ಜಾ
description: 50 ಕಾರ್ಡ್‌ಗಳು ಪಿಜ್ಜಾವನ್ನು ನೀವು ಅನುಭವಿಸುವ ರೀತಿಯನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ—ಹಿಟ್ಟು ಮತ್ತು ಬೆಂಕಿಯ ರಸಾಯನಶಾಸ್ತ್ರದಿಂದ ಹಿಡಿದು, ತುಂಡು ಮತ್ತು ಟಾಪಿಂಗ್‌ಗಳ ಪುರಾತತ್ತ್ವ ಶಾಸ್ತ್ರದವರೆಗೂ.
