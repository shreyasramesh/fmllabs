cards:
  - id: piz_dough_stretch
    name: ಹಿಟ್ಟು ಎಳೆಯುವಿಕೆ
    prompt: |
      ಹಿಟ್ಟನ್ನು ಎಳೆಯುವುದನ್ನು ನೋಡಿ—ಕೈಯಿಂದ ಎಸೆದದ್ದು, ಅಥವಾ ಒತ್ತಿದ್ದು. ಗ್ಲುಟೆನ್ ಜಾಲವು
