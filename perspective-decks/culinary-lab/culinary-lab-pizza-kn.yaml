  - id: piz_sauce_spiral
    name: ಸಾಸ್ ಸುರುಳಿ
    prompt: |
      ಸಾಸ್ ಅನ್ನು ಸಾಮಾನ್ಯವಾಗಿ ಸುರುಳಿಯಾಗಿ ಹಚ್ಚಲಾಗುತ್ತದೆ—ಅಂಚಿನಿಂದ ಅಂಚಿಗೆ ಹರಡಲ್ಲ. ಮಾದರಿಯನ್ನು
