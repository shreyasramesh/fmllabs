      - ಕೈ ಮತ್ತು ಆಕಾರದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: piz_oven_breath
    name: ಒಲೆಯ ಉಸಿರು
    prompt: |
      ಪಿಜ್ಜಾ ಒಲೆಯು ಉಸಿರಾಡುತ್ತದೆ—ಮರದ ಬೆಂಕಿ, ಅಥವಾ ಗ್ಯಾಸ್, ಅಥವಾ ವಿದ್ಯುತ್. ಗುಮ್ಮಟವು
      ಶಾಖವನ್ನು ಹಿಡಿದಿಡುತ್ತದೆ. ನೆಲವು ಅದನ್ನು ವರ್ಗಾಯಿಸುತ್ತದೆ. ಅದರ ಹತ್ತಿರ ನಿಲ್ಲಿ. ಒಲೆಯು
