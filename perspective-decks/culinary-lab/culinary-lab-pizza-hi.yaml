# पाकशाला — पिज़्ज़ा (Hindi)

id: culinary_lab_pizza
name: पाकशाला — पिज़्ज़ा
description: 50 कार्ड जो पिज़्ज़ा के आपके अनुभव को बदल देंगे - आटा और आग की रसायन शास्त्र से लेकर स्लाइस के थिएटर और टॉपिंग के पुरातत्व तक।
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: आटा खिंचाव
    prompt: |
      आटे को खींचते हुए देखें—हाथ से फेंका गया, या दबाया गया। ग्लूटेन नेटवर्क
      खिंचता है, हवा को फंसाता है। आकार चुना जाता है। एक चौकोर स्लाइस का
      त्रिकोण से अलग क्या मतलब होगा?
    follow_ups:
      - खिंचाव अनुभव को कैसे परिभाषित करता है?
      - खिंचाव के बिना पिज़्ज़ा क्या होगा?
      - हाथ और आकार के बीच क्या संबंध है?
  - id: piz_oven_breath
    name: ओवन की सांस
    prompt: |
      एक पिज़्ज़ा ओवन सांस लेता है—लकड़ी की आग, या गैस, या बिजली। गुंबद गर्मी को
      रोकता है। फर्श इसे स्थानांतरित करता है। एक के पास खड़े हों। ओवन एक
      पकाने वाले से क्या मांगता है? आटे से?
    follow_ups:
      - ओवन के बिना पिज़्ज़ा क्या होगा?
      - गर्मी पपड़ी को कैसे आकार देती है?
      - सांस और फफोले के बीच क्या संबंध है?
  - id: piz_sauce_spiral
    name: सॉस का सर्पिल
    prompt: |
      सॉस अक्सर सर्पिल में लगाई जाती है—किनारे से किनारे तक फैली हुई नहीं।
      पैटर्न का अध्ययन करें। क्या कवर किया गया है? क्या उजागर है? सर्पिल एक
      रचना है।
    follow_ups:
      - पूरी तरह से सॉस किया हुआ पिज़्ज़ा कैसा दिखेगा?
      - सर्पिल प्रत्येक बाइट को कैसे प्रभावित करता है?
      - पैटर्न और स्वाद के बीच क्या संबंध है?
  - id: piz_cheese_melt
    name: चीज़ का पिघलना
    prompt: |
      चीज़ अलग-अलग दरों पर पिघलती है। मोज़ेरेला खिंचता है; पुरानी चीज़ में
      तेल निकलता है। पिघलने को देखें। वसा और प्रोटीन, गर्मी और समय की
      रसायन शास्त्र। यह कब तैयार होता है?
    follow_ups:
      - खिंचाव के बिना स्लाइस क्या होगा?
      - पिघलाव बाइट को कैसे आकार देता है?
      - पिघलाव और स्मृति के बीच क्या संबंध है?
  - id: piz_crust_char
    name: पपड़ी का जलना
    prompt: |
      धब्बेदारपन—पपड़ी पर जले हुए धब्बे—लकड़ी से पके पिज़्ज़ा की निशानी हैं।
      प्रत्येक धब्बा अत्यधिक गर्मी के संपर्क का एक क्षण है। उन धब्बों से
      जुड़ने वाले स्वाद पर विचार करें। फीकी पपड़ी का क्या मतलब होगा?
    follow_ups:
      - जलना अनुभव को कैसे बदलता है?
      - उसके बिना पिज़्ज़ा क्या होगा?
      - जलने और शिल्प के बीच क्या संबंध है?
  - id: piz_slice_fold
    name: स्लाइस का मोड़
    prompt: |
      न्यूयॉर्क शैली: स्लाइस को मोड़ें। मोड़ संरचनात्मक है—यह टॉपिंग रखता है,
      चिकनाई को चैनलाइज़ करता है। मोड़ एक कोरियोग्राफी है। यह क्या सक्षम
      करता है?
    follow_ups:
      - मोड़ के बिना खाना क्या होगा?
      - मोड़ बाइट को कैसे आकार देता है?
      - मोड़ और स्थान के बीच क्या संबंध है?
  - id: piz_pepperoni_cup
    name: पेपरोनी कप
    prompt: |
      अच्छा पेपरोनी कप—किनारे कुरकुरे, बीच में तेल जमा हुआ। यह आकार और बनावट का
      रूपांतरण है। ध्यान दें कि यह कब होता है। कप किसने बनाया?
    follow_ups:
      - कप के बिना पेपरोनी क्या होगा?
      - कप स्वाद को कैसे बनाए रखता है?
      - वसा और रूप के बीच क्या संबंध है?
  - id: piz_basil_finish
    name: तुलसी का अंतिम स्पर्श
    prompt: |
      पिज़्ज़ा पर तुलसी अक्सर पकाने के बाद डाली जाती है—ताज़ी, ​​चमकदार। यह एक
      अंतिम स्पर्श है, आधार नहीं। कंट्रास्ट पर ध्यान दें। पके हुए में ताज़ा
      क्या जोड़ता है?
    follow_ups:
      - तुलसी के बिना पिज़्ज़ा क्या होगा?
      - समय जड़ी-बूटी को कैसे आकार देता है?
      - कच्चे और पके के बीच क्या संबंध है?
  - id: piz_margherita_minimal
    name: मार्गेरिटा मिनिमल
    prompt: |
      मार्गेरिटा तीन चीजें हैं: आटा, टमाटर, चीज़। प्रत्येक को ले जाना चाहिए।
      छिपने की कोई जगह नहीं है। अनुशासन पर विचार करें। मिनिमलिज्म क्या
      मांगता है?
    follow_ups:
      - एक गलत नोट क्या करेगा?
      - सादगी तालू को कैसे केंद्रित करती है?
      - कुछ और कई के बीच क्या संबंध है?
  - id: piz_pool_table
    name: पूल टेबल
    prompt: |
      कुछ पिज़्ज़ेरिया में लंबी सामुदायिक मेज होती है—अजनबी एक साथ जगह साझा
      करते हैं। पिज़्ज़ा आता है। मेज एक मंच है। आपके साथ कौन खाता है?
      अनकहा अनुबंध क्या है?
    follow_ups:
      - बूथ में भोजन क्या होगा?
      - मेज मुठभेड़ को कैसे आकार देती है?
      - साझा और निजी के बीच क्या संबंध है?
  - id: piz_box_flip
    name: बॉक्स फ्लिप
    prompt: |
      पिज़्ज़ा बॉक्स—कार्डबोर्ड, कभी-कभी बीच में प्लास्टिक त्रिपॉड के साथ।
      यह हवा के लिए, स्टैक करने के लिए डिज़ाइन किया गया है। बॉक्स बुनियादी ढांचा
      है। उसके बिना बाहर निकालना क्या होगा?
    follow_ups:
      - बॉक्स घर के सफर को कैसे आकार देता है?
      - जब बॉक्स खोला जाता है तो क्या होता है?
      - बॉक्स और अनुष्ठान के बीच क्या संबंध है?
  - id: piz_dough_ferment
    name: आटे का खमीरीकरण
    prompt: |
      पिज़्ज़ा का आटा खमीर होता है—घंटे या दिन। खमीर बुलबुले, स्वाद बनाता है।
      पुराने आटे में तीखापन होता है। प्रत्येक बाइट में समय पर विचार करें।
      तेज़ी से उठने वाला आटा क्या त्याग करेगा?
    follow_ups:
      - खमीर पपड़ी को कैसे आकार देता है?
      - समय और स्वाद के बीच क्या संबंध है?
      - एक ही दिन के आटे का क्या मतलब होगा?
  - id: piz_cornicione
    name: कॉर्निसियोन
    prompt: |
      कॉर्निसियोन—किनारा, पपड़ी—अक्सर सबसे अच्छा हिस्सा होता है। हवादार, फूला हुआ,
      शायद थोड़ा चबाने वाला। कुछ इसे छोड़ देते हैं; कुछ इसे पहले खाते हैं।
      किनारे से आपका क्या रिश्ता है?
    follow_ups:
      - कॉर्निसियोन के बिना पिज़्ज़ा क्या होगा?
      - किनारा केंद्र को कैसे फ्रेम करता है?
      - पपड़ी और केंद्र के बीच क्या संबंध है?
  - id: piz_olive_oil_drizzle
    name: जैतून का तेल छिड़काव
    prompt: |
      पकाने के बाद जैतून का तेल छिड़का जाता है—पपड़ी पर, या पूरे पाई पर।
      यह चमकता है। तेल स्वाद ले जाता है, समृद्धि जोड़ता है। ध्यान दें कि यह
      कब लगाया जाता है। छिड़काव क्या जोड़ता है?
    follow_ups:
      - उसके बिना पिज़्ज़ा क्या होगा?
      - तेल बाइट को कैसे बदलता है?
      - वसा और अंतिम स्पर्श के बीच क्या संबंध है?
  - id: piz_anchovy_salt
    name: एंकोवी नमक
    prompt: |
      पिज़्ज़ा पर एंकोवी—नमकीन, उमामी, विवादास्पद। वे सॉस में घुल जाते हैं, या
      ऊपर बैठ जाते हैं। एंकोवी पुरातत्व है: भूमध्यसागरीय, संरक्षित, प्राचीन।
      इसने क्या यात्रा की?
    follow_ups:
      - एंकोवी के बिना स्लाइस क्या होगा?
      - नमक अन्य स्वादों को कैसे आकार देता है?
      - संरक्षित और ताज़े के बीच क्या संबंध है?
  - id: piz_sound_crunch
    name: ध्वनि क्रंच
    prompt: |
      अच्छी तरह से बनाई गई पपड़ी का पहला बाइट—कुरकुरापन, लचीलापन। आँखें बंद
      करो। ध्वनि अनुभव का हिस्सा है। अगर पिज़्ज़ा खामोश होता तो क्या होता?
    follow_ups:
      - ध्वनि संतुष्टि को कैसे आकार देती है?
      - गीली पपड़ी कैसी लगती है?
      - क्रंच और गुणवत्ता के बीच क्या संबंध है?
  - id: piz_second_slice
    name: दूसरा स्लाइस
    prompt: |
      दूसरा स्लाइस पहले से अलग होता है—आप अब पिज़्ज़ा को जानते हैं। तालू समायोजित
      हो गया है। बदलाव पर ध्यान दें। क्या दूसरा स्लाइस एक जैसा लगता है? बेहतर?
      अलग?
    follow_ups:
      - दोहराव धारणा को कैसे बदलता है?
      - एक स्लाइस वाला भोजन क्या खोएगा?
      - पहले और दूसरे के बीच क्या संबंध है?
  - id: piz_neapolitan_rules
    name: नियोपोलिटन नियम
    prompt: |
      असली नियोपोलिटन पिज़्ज़ा के नियम हैं—आकार, सामग्री, विधि। वीपीएन स्टाम्प,
      प्रमाण पत्र। नियम पहचान बनाते हैं। नियम क्या सुरक्षित रखते हैं? वे क्या
      बाहर रखते हैं?
    follow_ups:
      - नियमों के बिना पिज़्ज़ा क्या होगा?
      - प्रमाणन अपेक्षा को कैसे आकार देता है?
      - नियम और शिल्प के बीच क्या संबंध है?
  - id: piz_detroit_edges
    name: डेट्रॉइट किनारे
    prompt: |
      डेट्रॉइट शैली—आयताकार, किनारे तक चीज़, पैन से मिलने पर कुरकुरा तला हुआ
      क्रस्ट। किनारे जानबूझकर हैं। वास्तुकला पर विचार करें। आकार क्या कहता है?
    follow_ups:
      - किनारों के बिना पिज़्ज़ा क्या होगा?
      - आकार पहचान कैसे बनाता है?
      - पैन और पपड़ी के बीच क्या संबंध है?
  - id: piz_garlic_knot
    name: लहसुन गांठ
    prompt: |
      लहसुन की गांठें—आटे के घुमाव, मक्खनयुक्त, लहसुनयुक्त। वे अक्सर पहले
      आती हैं। वे पिज़्ज़ा नहीं हैं, लेकिन वे एक ही दुनिया के हैं। गांठ और पाई
      के बीच क्या संबंध है?
    follow_ups:
      - गांठों के बिना भोजन क्या होगा?
      - गांठ मूड कैसे सेट करती है?
      - साइड और मेन के बीच क्या संबंध है?
  - id: piz_red_pepper_flake
    name: लाल मिर्च फ्लेक
    prompt: |
      लाल मिर्च फ्लेक्स का शेकर—अक्सर मेज पर। आप गर्मी चुनते हैं। फ्लेक
      लोकतंत्र है। हर कोई अपना स्वाद डालता है। वह विकल्प क्या मायने रखता है?
    follow_ups:
      - शेकर के बिना मेज क्या होगी?
      - स्व-सीजनिंग भोजन को कैसे आकार देती है?
      - विकल्प और स्वाद के बीच क्या संबंध है?
  - id: piz_sicilian_slab
    name: सिसिलियन स्लैब
    prompt: |
      सिसिलियन—मोटा, आयताकार, कभी-कभी उल्टा (ऊपर सॉस)। स्लैब में वजन होता
      है। वास्तुकला अलग है। मोटाई क्या जोड़ती है? यह क्या त्याग करती है?
    follow_ups:
      - पतली पपड़ी अलग क्या करेगी?
      - मोटाई बाइट को कैसे आकार देती है?
      - स्लैब और स्लाइस के बीच क्या संबंध है?
  - id: piz_wood_stack
    name: लकड़ी का ढेर
    prompt: |
      लकड़ी से पके पिज़्ज़ेरिया लकड़ी के लट्ठे ढेर करते हैं। ओक, कभी-कभी। लकड़ी
      ईंधन और स्वाद है। ढेर तैयारी है। विचार करें कि क्या जलता है। लकड़ी वह
      क्या जोड़ती है जो गैस नहीं जोड़ सकती?
    follow_ups:
      - लकड़ी के बिना पिज़्ज़ा क्या होगा?
      - ईंधन पपड़ी को कैसे आकार देता है?
      - आग और धुएं के बीच क्या संबंध है?
  - id: piz_topping_balance
    name: टॉपिंग संतुलन
    prompt: |
      टॉपिंग भारी पड़ सकती हैं—बहुत अधिक, और पिज़्ज़ा एक कैसरोल बन जाता है।
      संतुलन नाजुक होता है। एक लोडेड पाई का अध्ययन करें। यह रेखा कहाँ पार
      करती है? आप क्या हटाएंगे?
    follow_ups:
      - संयम पिज़्ज़ा को कैसे आकार देता है?
      - अधिक और कम के बीच क्या संबंध है?
      - विकल्प अराजकता कब बनता है?
  - id: piz_cold_leftover
    name: ठंडा बचा हुआ
    prompt: |
