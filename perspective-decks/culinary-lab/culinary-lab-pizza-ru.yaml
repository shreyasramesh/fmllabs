# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулинарная лаборатория — Пицца (Russian)

id: culinary_lab_pizza
name: Кулинарная лаборатория — Пицца
description: 50 карточек, которые изменят ваше восприятие пиццы — от химии теста и огня до театра нарезки и археологии начинок.
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: Растяжение теста
    prompt: |
      Наблюдайте за растяжением теста — вручную или на прессе. Сеть клейковины
      растягивается, захватывая воздух. Выбирается форма. Что означал бы квадратный
      кусок, отличающийся от треугольного?
    follow_ups:
      - Как растяжение определяет ощущения?
      - Какой была бы пицца без растяжения?
      - Какова связь между руками и формой?
  - id: piz_oven_breath
    name: Дыхание печи
    prompt: |
      Пицца-печь дышит — дровяной огонь, или газ, или электричество. Купол удерживает тепло.
      Пол передает его. Встаньте рядом с ней. Что требует печь от повара? От теста?
    follow_ups:
      - Какой была бы пицца без печи?
      - Как жар формирует корочку?
      - Какова связь между дыханием и пузырями?
  - id: piz_sauce_spiral
    name: Спираль соуса
    prompt: |
      Соус часто наносится по спирали — не размазывается от края до края. Изучите
      узор. Что покрыто? Что оставлено открытым? Спираль — это композиция.
    follow_ups:
      - Как выглядела бы пицца с полностью нанесенным соусом?
      - Как спираль влияет на каждый укус?
      - Какова связь между узором и вкусом?
  - id: piz_cheese_melt
    name: Плавление сыра
    prompt: |
      Сыр плавится с разной скоростью. Моцарелла тянется; выдержанный сыр выделяет масло.
      Наблюдайте за плавлением. Химия жира и белка, жара и времени. Когда это готово?
    follow_ups:
      - Какой был бы кусок без тягучести?
      - Как плавление формирует укус?
      - Какова связь между плавлением и памятью?
  - id: piz_crust_char
    name: Подгорелость корочки
    prompt: |
      Леопардовые пятна — обугленные пятна на корочке — характерны для пиццы, выпеченной в дровяной печи. Каждое пятно — это момент контакта с экстремальным жаром. Учтите вкус, который добавляют эти пятна. Что означала бы бледная корочка?
    follow_ups:
      - Как подгорелость меняет ощущения?
      - Какой была бы пицца без нее?
      - Какова связь между подгорелостью и мастерством?
  - id: piz_slice_fold
    name: Складывание куска
    prompt: |
      Нью-йоркский стиль: сложить кусок. Складывание — это структурное решение — оно удерживает
      начинку, направляет жир. Складывание — это хореография. Что оно позволяет?
    follow_ups:
      - Каким было бы поглощение без складывания?
      - Как складывание формирует укус?
      - Какова связь между складыванием и местом?
  - id: piz_pepperoni_cup
    name: Чашечка пепперони
    prompt: |
      Хорошие чашечки пепперони — края хрустящие, центр собирает масло. Это
      трансформация формы и текстуры. Заметьте, когда это происходит. Что создало
      чашечку?
    follow_ups:
      - Какой была бы пепперони без чашечки?
      - Как чашечка удерживает вкус?
      - Какова связь между жиром и формой?
  - id: piz_basil_finish
    name: Завершение базиликом
    prompt: |
      Базилик на пицце часто добавляется после выпечки — свежий, яркий. Это
      завершение, а не основа. Заметьте контраст. Что добавляет свежесть приготовленному?
    follow_ups:
      - Какой была бы пицца без базилика?
      - Как время формирует травы?
      - Какова связь между сырым и приготовленным?
  - id: piz_margherita_minimal
    name: Маргарита в стиле минимализма
    prompt: |
      Маргарита — это три составляющих: тесто, томат, сыр. Каждое должно быть безупречным.
      Скрыться негде. Учтите дисциплину. Что требует минимализм?
    follow_ups:
      - Что сделала бы одна ошибка?
      - Как простота фокусирует вкус?
      - Какова связь между малым и многим?
  - id: piz_pool_table
    name: Общий стол
    prompt: |
      В некоторых пиццериях есть длинный общий стол — незнакомцы делят пространство.
      Привозят пиццу. Стол — это сцена. Кто ест рядом с вами? Каков негласный договор?
    follow_ups:
      - Какой была бы трапеза в кабинке?
      - Как стол формирует встречу?
      - Какова связь между общим и частным?
  - id: piz_box_flip
    name: Переворачивание коробки
    prompt: |
      Коробка для пиццы — картон, иногда с пластиковым штативом посередине.
      Она спроектирована для вентиляции, для штабелирования. Коробка — это инфраструктура.
      Что было бы с едой на вынос без нее?
    follow_ups:
      - Как коробка формирует путешествие домой?
      - Что происходит, когда коробка открывается?
      - Какова связь между коробкой и ритуалом?
  - id: piz_dough_ferment
    name: Ферментация теста
    prompt: |
      Тесто для пиццы ферментируется — часы или дни. Дрожжи создают пузырьки, вкус.
      Старое тесто имеет кислинку. Учтите время в каждом укусе. Чем жертвовало бы тесто
      быстрого подъема?
    follow_ups:
      - Как ферментация формирует корочку?
      - Какова связь между временем и вкусом?
      - Что означало бы тесто, приготовленное за один день?
  - id: piz_cornicione
    name: Бортик
    prompt: |
      Бортик — край, корочка — часто самая вкусная часть. Воздушный, пузырчатый,
      может быть, немного жевательный. Некоторые оставляют его; некоторые едят его первым.
      Какова ваши отношения с краем?
    follow_ups:
      - Какой была бы пицца без бортика?
      - Как край обрамляет центр?
      - Какова связь между корочкой и центром?
  - id: piz_olive_oil_drizzle
    name: Сбрызгивание оливковым маслом
    prompt: |
      Оливковое масло, сбрызнутое после выпечки — на корочку или всю пиццу.
      Оно блестит. Масло несет вкус, добавляет насыщенность. Заметьте, когда оно нанесено.
      Что добавляет сбрызгивание?
    follow_ups:
      - Какой была бы пицца без него?
      - Как масло меняет укус?
      - Какова связь между жиром и завершением?
  - id: piz_anchovy_salt
    name: Анчоусы — соль
    prompt: |
      Анчоусы на пицце — соленые, умами, divisive. Они растворяются в
      соусе или лежат сверху. Анчоус — это археология: средиземноморский, консервированный,
      древний. Какое путешествие он совершил?
    follow_ups:
      - Какой был бы кусок без анчоусов?
      - Как соль формирует другие вкусы?
      - Какова связь между консервированным и свежим?
  - id: piz_sound_crunch
    name: Звук хруста
    prompt: |
      Первый укус хорошо сделанной корочки — хруст, податливость. Закройте глаза.
      Звук — часть ощущений. Какой была бы пицца, если бы она была беззвучной?
    follow_ups:
      - Как звук формирует удовлетворение?
      - Как звучит влажная корочка?
      - Какова связь между хрустом и качеством?
  - id: piz_second_slice
    name: Второй кусок
    prompt: |
      Второй кусок отличается от первого — вы уже знаете пиццу. Вкус
      приспособился. Заметьте сдвиг. Второй кусок кажется таким же? Лучше? Другим?
    follow_ups:
      - Как повторение меняет восприятие?
      - Чего бы не хватало трапезе из одного куска?
      - Какова связь между первым и вторым?
  - id: piz_neapolitan_rules
    name: Правила неаполитанской пиццы
    prompt: |
      Настоящая неаполитанская пицца имеет правила — размер, ингредиенты, метод.
      Штамп VPN, сертификация. Правила создают идентичность. Что защищают правила? Что
      они исключают?
    follow_ups:
      - Какой была бы пицца без правил?
      - Как сертификация формирует ожидания?
      - Какова связь между правилом и мастерством?
  - id: piz_detroit_edges
    name: Край Детройтской
    prompt: |
      Детройтский стиль — прямоугольный, сыр до самого края, хрустящая жареная корочка там,
      где она касается сковороды. Края сделаны намеренно. Учтите архитектуру.
      Что говорит форма?
    follow_ups:
      - Какой была бы пицца без краев?
      - Как форма создает идентичность?
      - Какова связь между сковородой и корочкой?
  - id: piz_garlic_knot
    name: Чесночный узелок
    prompt: |
      Чесночные узелки — скрученное тесто, смазанное маслом, с чесноком. Часто подаются первыми.
      Это не пицца, но из того же мира. Каковы отношения между узелком и пирогом?
    follow_ups:
      - Какой была бы трапеза без узелков?
      - Как узелок задает тон?
      - Какова связь между гарниром и основным блюдом?
  - id: piz_red_pepper_flake
    name: Хлопья красного перца
    prompt: |
      Шейкер с хлопьями красного перца — часто стоит на столе. Вы выбираете остроту.
      Хлопья — это демократия. Каждый приправляет сам. Что означает этот
      выбор?
    follow_ups:
      - Каким был бы стол без шейкера?
      - Как самостоятельная приправка формирует трапезу?
      - Какова связь между выбором и вкусом?
  - id: piz_sicilian_slab
    name: Сицилийская плита
    prompt: |
      Сицилийская — толстая, прямоугольная, иногда наоборот (соус сверху).
      Плита имеет вес. Архитектура другая. Что добавляет толщина?
      Чем она жертвует?
    follow_ups:
      - Что сделала бы тонкая корочка иначе?
      - Как толщина формирует укус?
      - Какова связь между плитой и куском?
  - id: piz_wood_stack
    name: Стопка дров
    prompt: |
      Пиццерии на дровах складывают поленья. Дуб, иногда. Дрова — это топливо и
      вкус. Стопка — это подготовка. Учтите, что горит. Что добавляют дрова, чего не может газ?
    follow_ups:
      - Какой была бы пицца без дров?
      - Как топливо формирует корочку?
      - Какова связь между огнем и дымом?
  - id: piz_topping_balance
    name: Баланс начинки
    prompt: |
      Начинки могут подавлять — слишком много, и пицца превращается в запеканку.
      Баланс тонок. Изучите нагруженную пиццу. Где она пересекает черту?
      Что бы вы убрали?
    follow_ups:
      - Как сдержанность формирует пиццу?
      - Какова связь между большим и меньшим?
      - Когда выбор становится хаосом?
  - id: piz_cold_leftover
    name: Холодные остатки
    prompt: |
      Холодная пицца на завтрак — некоторые клянутся этим. Вкусы осели.
      Текстура изменилась. Учтите пиццу следующего дня. Что добавляет время?
      Что оно отнимает?
    follow_ups:
      - Как холод меняет ощущения?
      - Что сделало бы разогревание?
      - Какова связь между свежим и остатками?
  - id: piz_sauce_sweet
    name: Сладкий соус
    prompt: |
      Томатный соус может быть сладким или ярким, в зависимости от помидора, повара.
      Попробуйте соус отдельно, если можете. Откуда берется сладость?
      Что сделала бы кислота?
    follow_ups:
      - Как соус задает тон?
      - Какова связь между сладким и кислым?
      - Что означали бы сырые помидоры?
  - id: piz_roman_taglio
    name: Римская "по куску"
    prompt: |
      Пицца аль тальо — продается на куски, на вес. Вы указываете, они режут.
      Прямоугольник, цена за килограмм. Сделка другая. Что означает покупка на вес?
    follow_ups:
      - Как тальо формирует ощущения?
      - Что означала бы целая пицца здесь?
      - Какова связь между куском и выбором?
  - id: piz_hot_honey
    name: Острый мед
    prompt: |
      Острый мед на пицце — новая традиция, теперь повсюду. Сладкий, острый, вязкий.
      Это завершающий штрих. Заметьте, когда его добавляют. Что делает мед с сыром?
    follow_ups:
      - Какой был бы кусок без него?
      - Как сладко-острое формирует укус?
      - Какова связь между трендом и традицией?
  - id: piz_pecorino_grate
    name: Тертый пекорино
    prompt: |
      Пекорино, натертый поверх пиццы — соленый, острый. Это слой. Сыр сверху
      отличается от сыра, который расплавился. Учтите иерархию. Что добавляет терка?
    follow_ups:
      - Какой была бы пицца без пекорино?
      - Как второй сыр формирует блюдо?
      - Какова связь между плавлением и теркой?
  - id: piz_paddle_slide
    name: Скольжение лопаты
    prompt: |
      Лопата — деревянная или металлическая. Тесто соскальзывает на нее, затем в
      печь. Движение отточено. Посмотрите на него. Что могло бы пойти не так без
      мастерства?
    follow_ups:
      - Как лопата обеспечивает выпечку?
      - Какова связь между инструментом и результатом?
      - Что означала бы упавшая пицца?
  - id: piz_sourdough_crust
    name: Хрустящая корочка из закваски
    prompt: |
      Корочка пиццы из закваски — длительная ферментация, кислинка. Корочка имеет характер.
      Она не нейтральна. Учтите, что добавляет закваска. Что бы сделала коммерческая
      дрожжь иначе?
    follow_ups:
      - Как закваска формирует укус?
      - Какова связь между ферментацией и вкусом?
      - Что означала бы более пресная корочка?
  - id: piz_white_pie
    name: Белая пицца
    prompt: |
      Белая пицца — без томата. Оливковое масло, сыр, возможно, чеснок. Отсутствие
      красного меняет все. Вкус ожидает томат. Что предлагает взамен белая пицца?
    follow_ups:
      - Какой была бы пицца с томатом?
      - Как отсутствие формирует ожидания?
      - Какова связь между красным и белым?
  - id: piz_bar_setting
    name: Барная стойка
    prompt: |
      Пицца в баре — вы едите там, где заказываете. Бар — это сцена. Вы наблюдаете
      за печью, за кусками. Атмосфера непринужденная, непосредственная. Что добавляет еда
      в баре?
    follow_ups:
      - Что изменил бы столик?
      - Как близость формирует ощущения?
      - Какова связь между баром и кухней?
  - id: piz_truffle_trend
    name: Трюфельный тренд
    prompt: |
      Трюфель на пицце — масло или стружка — стал синонимом роскоши.
      Аромат доминирует. Учтите тренд. Что добавляет трюфель? Что
      он маскирует?
    follow_ups:
      - Какой была бы пицца без трюфеля?
      - Как роскошь формирует укус?
      - Какова связь между трендом и вкусом?
  - id: piz_ricotta_dollop
    name: Ложка рикотты
    prompt: |
      Рикотта, добавленная ложкой на пиццу — прохладная, сливочная, контрастная. Она не плавится
      как моцарелла. Она лежит. Заметьте разницу температур. Что добавляет ложка?
    follow_ups:
      - Какой был бы кусок без рикотты?
      - Как холодное формирует горячее?
      - Какова связь между ложкой и плавлением?
  - id: piz_slice_count
    name: Количество кусков
    prompt: |
      Сколько кусков? Часто восемь — или шесть для пиццы поменьше.
      Число определяет порцию, долю. Учтите математику. Что означали бы
      четыре куска? Двенадцать?
    follow_ups:
      - Как количество кусков формирует трапезу?
      - Какова связь между нарезкой и долей?
      - Когда количество имеет значение?
  - id: piz_oven_window
    name: Окно печи
    prompt: |
      У печи есть окно — или нет. Наблюдение за выпечкой пиццы — это театр.
      Сыр пузырится. Корочка поднимается. Какими были бы ощущения без
      вида?
    follow_ups:
      - Как наблюдение формирует предвкушение?
      - Какова связь между видимым и скрытым?
      - Что вы узнаете из окна?
  - id: piz_ranch_dip
    name: Соус Ранч
    prompt: |
      Ранч с пиццей — американская традиция, часто с корочкой. Соус
      опционален, вызывает споры. Учтите добавление. Что добавляет ранч? Что
      он перебивает?
    follow_ups:
      - Какой была бы корочка без ранча?
      - Как соус формирует укус?
      - Какова связь между пуристом и практиком?
  - id: piz_capers_brine
    name: Рассол каперсов
    prompt: |
      Каперсы на пицце — солоноватые, острые. Они прорезают насыщенность. Каперс
      путешествовал — Средиземноморье, маринованный. Заметьте, когда они появляются. Что добавляет
      рассол?
    follow_ups:
      - Какой был бы кусок без каперсов?
      - Как рассол формирует вкус?
      - Какова связь между маринованным и свежим?
  - id: piz_calzone_seam
    name: Шов кальцоне
    prompt: |
