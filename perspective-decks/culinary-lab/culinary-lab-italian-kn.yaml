      ಪರಿಗಣಿಸಿ.
    follow_ups:
      - ಗುಳ್ಳೆಗಳಿಲ್ಲದಿದ್ದರೆ ಬ್ರೆಡ್ ಹೇಗಿರುತ್ತದೆ?
      - ಹಿಟ್ಟು (crumb) ಎಣ್ಣೆ ಮತ್ತು ಉಪ್ಪನ್ನು ಹೇಗೆ ಹಿಡಿದಿಡುತ್ತದೆ?
      - ಗಾಳಿ ಮತ್ತು ರಚನೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_prosciutto_slice
    name: ಪ್ರೊಶೂಟೊ (Prosciutto) ತುಂಡು
