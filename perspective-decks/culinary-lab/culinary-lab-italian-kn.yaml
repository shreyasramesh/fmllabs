# ಪಾಕಶಾಸ್ತ್ರ ಪ್ರಯೋಗಾಲಯ — ಇಟಾಲಿಯನ್ (Kannada)

id: culinary_lab_italian
name: ಪಾಕಶಾಸ್ತ್ರ ಪ್ರಯೋಗಾಲಯ — ಇಟಾಲಿಯನ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ಇಟಾಲಿಯನ್ ಆಹಾರವನ್ನು ನೀವು ಅನುಭವಿಸುವ ವಿಧಾನವನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ—ಆಲಿವ್ ಎಣ್ಣೆ ಮತ್ತು ಆಮ್ಲದ ರಸಾಯನಶಾಸ್ತ್ರದಿಂದ ಹಿಡಿದು, ಮೇಜಿನ ಸಾಮಾಜಿಕ ನೃತ್ಯ ಮತ್ತು ಪ್ರತಿ ಪದಾರ್ಥದ ಪುರಾತತ್ವಶಾಸ್ತ್ರದವರೆಗೆ.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: ಟೊಮೆಟೊ ರೂಪಾಂತರ
    prompt: |
      ಒಂದು ಹಸಿ ಟೊಮೆಟೊ ಶಾಖ ಮತ್ತು ಸಮಯದೊಂದಿಗೆ ಏನೋ ಆಗುತ್ತದೆ. ಆ ವಕ್ರತೆಯನ್ನು ಪತ್ತೆಹಚ್ಚಿ.
      ಅಮಲೇಯತೆ (acidity) ಏನು? ರಚನೆ ಏನು? ಟೊಮೆಟೊ ಒಂದು ಪ್ರಯಾಣವನ್ನು ಹೊಂದಿದೆ.
    follow_ups:
      - ಸಾಸ್ ರುಚಿಗೆ ಹೇಗೆ ಬದಲಾಗುತ್ತದೆ?
      - ರೂಪಾಂತರವಿಲ್ಲದೆ ಏನು ಕಳೆದುಹೋಗುತ್ತದೆ?
      - ಹಸಿ ಮತ್ತು ಬೇಯಿಸಿದದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_bread_arrival
    name: ಬ್ರೆಡ್ ಆಗಮನ
    prompt: |
      ಊಟಕ್ಕೆ ಮೊದಲು ಬ್ರೆಡ್ ಬರುತ್ತದೆ—ಕೆಲವೊಮ್ಮೆ ಬೆಚ್ಚಗಿನ, ಕೆಲವೊಮ್ಮೆ ಎಣ್ಣೆಯೊಂದಿಗೆ. ವಿಷಯಗಳ
      ಕ್ರಮವನ್ನು ಗಮನಿಸಿ. ಬ್ರೆಡ್ ಒಂದು ಆರಂಭ. ಯಾರು ಯಾವಾಗ ತಿನ್ನಬೇಕೆಂದು ನಿರ್ಧರಿಸುತ್ತಾರೆ?
    follow_ups:
      - ಬ್ರೆಡ್ ಇಲ್ಲದಿದ್ದರೆ ಊಟ ಹೇಗಿರುತ್ತದೆ?
      - ಬ್ರೆಡ್ ವೇಗವನ್ನು ಹೇಗೆ ನಿರ್ಧರಿಸುತ್ತದೆ?
      - ಬ್ರೆಡ್ ಮತ್ತು ನಿರೀಕ್ಷೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_pasta_shape
    name: ಪಾಸ್ತಾ ಆಕಾರ
    prompt: |
      ಪ್ರತಿಯೊಂದು ಪಾಸ್ತಾ ಆಕಾರವೂ ಸಾಸ್ ಅನ್ನು ವಿಭಿನ್ನವಾಗಿ ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ—ಅಂಚುಗಳು, ಕುಳಿಗಳು,
      ಬಾಹುಗಳು. ಒಂದು ಖಾದ್ಯವನ್ನು ಆರಿಸಿ ಮತ್ತು ಕೇಳಿ: ಈ ಸಾಸ್‌ಗೆ ಏಕೆ ಈ ಆಕಾರ?
      ರೂಪವು ಒಂದು ನಿರ್ಧಾರ.
    follow_ups:
      - ಬೇರೆ ಆಕಾರದಲ್ಲಿದ್ದರೆ ಏನು ಬದಲಾಗುತ್ತದೆ?
      - ಆಕಾರವು ಕಚ್ಚುವಿಕೆಯನ್ನು (bite) ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ?
      - ರೂಪ ಮತ್ತು ಕಾರ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_basil_fragrance
    name: ತುಳಸಿ ಪರಿಮಳ
    prompt: |
      ತುಳಸಿ ಬಾಯಿಯ ಮೊದಲು ಮೂಗಿಗೆ ತಲುಪುತ್ತದೆ. ಕಣ್ಣುಗಳನ್ನು ಮುಚ್ಚಿ ಮತ್ತು ಗಿಡಮೂಲಿಕೆಯನ್ನು
      ಕಂಡುಹಿಡಿಯಿರಿ. ಖಾದ್ಯದಲ್ಲಿ ಅದು ಎಲ್ಲಿರುತ್ತದೆ? ಪರಿಮಳ ಒಂದು ನಕ್ಷೆ.
    follow_ups:
      - ವಾಸನೆ ಇಲ್ಲದಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಪರಿಮಳ ರುಚಿಗೆ ಹೇಗೆ ಸಿದ್ಧಪಡಿಸುತ್ತದೆ?
      - ಪರಿಮಳ ಮತ್ತು ರುಚಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_olive_oil_pool
    name: ಆಲಿವ್ ಎಣ್ಣೆ ಕೆರೆ
    prompt: |
      ಆಲಿವ್ ಎಣ್ಣೆ ಮೇಲ್ಮೈಯಲ್ಲಿ ಕೆರೆಯಂತೆ ಅಥವಾ ತಟ್ಟೆಯನ್ನು ಹೊಳಪುಗೊಳಿಸುತ್ತದೆ. ಅದು ಹೇಗೆ
      ಚಲಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಎಣ್ಣೆಯು ರುಚಿ ಮತ್ತು ಕೊಬ್ಬನ್ನು ಸಾಗಿಸುತ್ತದೆ. ಅದು ಏನನ್ನು
      ಬಂಧಿಸುತ್ತದೆ?
    follow_ups:
      - ಎಣ್ಣೆ ಇಲ್ಲದಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಎಣ್ಣೆಯು ಬಾಯಿಯ ಅನುಭವವನ್ನು (mouthfeel) ಹೇಗೆ ಬದಲಿಸುತ್ತದೆ?
      - ಎಣ್ಣೆ ಮತ್ತು ಶಾಖದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_parmesan_shatter
    name: ಪಾರ್ಮೆಸನ್ ಛಿದ್ರ
    prompt: |
      ತಾಜಾವಾಗಿ ತುರಿದ ಪಾರ್ಮಿಜಾನೊವು ಸ್ಪಟಿಕದಂತಹ ಕುರುಕುತನವನ್ನು ಹೊಂದಿದೆ. ಅದನ್ನು ಕೇಳಿ.
      ಚೀಸ್ ರುಚಿಯಷ್ಟೇ ರಚನೆಯೂ ಆಗಿದೆ. ಅದು ಕಚ್ಚುವಿಕೆಯನ್ನು (bite) ಹೇಗೆ ಪಂಚಿಸುತ್ತದೆ?
    follow_ups:
      - ಕುರುಕುತನವಿಲ್ಲದಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಚೀಸ್ ರುಚಿಯನ್ನು (palate) ಹೇಗೆ ಪೂರ್ಣಗೊಳಿಸುತ್ತದೆ?
      - ಚೀಸ್ ಮತ್ತು ಉಪ್ಪಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_espresso_ritual
    name: ಎಸ್ಪ್ರೆಸೊ ವಿಧಿ
    prompt: |
      ಎಸ್ಪ್ರೆಸೊ ಕೊನೆಯಲ್ಲಿ ಬರುತ್ತದೆ—ಚಿಕ್ಕ ಕಪ್, ಹಾಲು ಇಲ್ಲ. ವಿಧಿಯು ಮುಕ್ತಾಯವನ್ನು ಗುರುತಿಸುತ್ತದೆ.
      ಯಾರು ನಿಂತುಕೊಂಡು ಕುಡಿಯುತ್ತಾರೆ? ಯಾರು ಕುಳಿತುಕೊಳ್ಳುತ್ತಾರೆ? ಎಸ್ಪ್ರೆಸೊ ಒಂದು ವಿರಾಮ ಚಿಹ್ನೆ.
    follow_ups:
      - ಎಸ್ಪ್ರೆಸೊ ಇಲ್ಲದಿದ್ದರೆ ಊಟ ಹೇಗಿರುತ್ತದೆ?
      - ವಿಧಿಯು ಸಮಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಾಫಿ ಮತ್ತು ಅಂತ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_antipasti_sequence
    name: ಆಂಟಿಪಾಸ್ಟಿ ಕ್ರಮ
    prompt: |
      ಆಂಟಿಪಾಸ್ಟಿ ಮೊದಲು ಬರುತ್ತವೆ—ಚಿಕ್ಕ ತಟ್ಟೆಗಳು, ಹಂಚಿಕೊಂಡ ಅಥವಾ ಹಂಚದ. ಕ್ರಮವನ್ನು ಗಮನಿಸಿ.
      ಕ್ರಮದ ತರ್ಕವೇನು? ಆರಂಭವು ಧ್ವನಿಯನ್ನು (tone) ನಿರ್ಧರಿಸುತ್ತದೆ.
    follow_ups:
      - ಕ್ರಮವನ್ನು ಹಿಮ್ಮುಖಗೊಳಿಸಿದರೆ ಏನು ಬದಲಾಗುತ್ತದೆ?
      - ಕ್ರಮವು ಹಸಿವನ್ನು (appetite) ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಮೊದಲನೆಯದು ಮತ್ತು ಕೊನೆಯದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_wine_pour
    name: ವೈನ್ ಸುರಿಯುವುದು
    prompt: |
      ವೈನ್ ಸುರಿಯಲಾಗುತ್ತದೆ—ಯಾರು ಸುರಿಯುತ್ತಾರೆ? ಎಷ್ಟು? ಸುರಿಯುವುದು ಸಾಮಾಜಿಕ ನೃತ್ಯ.
      ಸನ್ನೆಗಳನ್ನು (gestures) ಗಮನಿಸಿ. ಅವು ಏನು ಹೇಳುತ್ತವೆ?
    follow_ups:
      - ವೈನ್ ಇಲ್ಲದಿದ್ದರೆ ಮೇಜು ಹೇಗಿರುತ್ತದೆ?
      - ಸುರಿಯುವುದು ಸಮಾರಂಭವನ್ನು (ceremony) ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಸುರಿಯುವುದು ಮತ್ತು ವೇಗದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_risotto_stir
    name: ರಿಸೊಟ್ಟೊ ಕಲಕುವುದು
    prompt: |
      ರಿಸೊಟ್ಟೊ ನಿರಂತರ ಕಲಕುವಿಕೆಯನ್ನು (stirring) ಬಯಸುತ್ತದೆ. ಪಿಷ್ಟವು (starch) ನಿಧಾನವಾಗಿ ಬಿಡುಗಡೆಯಾಗುತ್ತದೆ.
      ಬೌಲ್‌ನಲ್ಲಿರುವ ಶ್ರಮವನ್ನು (labor) ಪರಿಗಣಿಸಿ. ಕಲಕುವಿಕೆ ಇಲ್ಲದಿದ್ದರೆ ಏನಾಗುತ್ತದೆ?
    follow_ups:
      - ಕೆನೆತನವಿಲ್ಲದಿದ್ದರೆ ಅಕ್ಕಿ ಹೇಗಿರುತ್ತದೆ?
      - ಕಲಕುವಿಕೆಯು ರಚನೆಯನ್ನು (texture) ಹೇಗೆ ಬದಲಿಸುತ್ತದೆ?
      - ಶ್ರಮ ಮತ್ತು ಫಲಿತಾಂಶದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_porcini_earth
    name: ಪೋರ್ಚಿನಿ ಮಣ್ಣು
    prompt: |
      ಪೋರ್ಚಿನಿ ಅಣಬೆಗಳು ಅರಣ್ಯದ ನೆಲದಂತೆ ರುಚಿ ನೀಡುತ್ತವೆ—ಉಮಾಮಿ (umami), ಮಣ್ಣು, ಕೊಳೆತ.
      ಅಣಬೆಯನ್ನು ಹಿಂದಕ್ಕೆ ಪತ್ತೆಹಚ್ಚಿ. ಅದು ಎಲ್ಲಿ ಬೆಳೆಯಿತು? ಯಾವ ಮರಗಳ ಅಡಿಯಲ್ಲಿ?
    follow_ups:
      - ಮಣ್ಣಿನ ರುಚಿ ಇಲ್ಲದಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಮೂಲವು ರುಚಿಯನ್ನು (flavor) ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅಣಬೆ ಮತ್ತು ಅರಣ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_plate_negative_space
    name: ತಟ್ಟೆ ಖಾಲಿ ಜಾಗ
    prompt: |
      ಇಟಾಲಿಯನ್ ಪ್ಲೇಟಿಂಗ್ ಆಗಾಗ್ಗೆ ಜಾಗ ಬಿಡುತ್ತದೆ—ತಟ್ಟೆ ತುಂಬಿರುವುದಿಲ್ಲ. ಖಾಲಿ ಜಾಗವನ್ನು
      ಪರಿಗಣಿಸಿ. ಅದು ಏನನ್ನು ಚೌಕಟ್ಟುಗೊಳಿಸುತ್ತದೆ? ಅದು ಏನನ್ನು ಅನುಮತಿಸುತ್ತದೆ?
    follow_ups:
      - ತಟ್ಟೆ ಸಂಪೂರ್ಣವಾಗಿ ಮುಚ್ಚಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಖಾಲಿ ಜಾಗವು ಕಣ್ಣನ್ನು (eye) ಹೇಗೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತದೆ?
      - ಖಾಲಿ ಮತ್ತು ತುಂಬಿದದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_garlic_sizzle
    name: ಬೆಳ್ಳುಳ್ಳಿ ಸಿಸ್ (sizzle)
    prompt: |
      ಬೆಳ್ಳುಳ್ಳಿ ಬಿಸಿಯಾದ ಎಣ್ಣೆಗೆ ಬೀಳುತ್ತದೆ—ಸಿಸ್ (sizzle) ರಸಾಯನಶಾಸ್ತ್ರ. ಕೇಳಿ. ವಾಸನೆ ನೋಡಿ.
      ಆ ಕ್ಷಣವು ಕ್ಷಣಿಕ. ಏನು ಸುಡುತ್ತದೆ? ಏನು ಕಳೆದುಹೋಗುತ್ತದೆ?
    follow_ups:
      - ಸಿಸ್ (sizzle) ಇಲ್ಲದಿದ್ದರೆ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಸಮಯವು ರುಚಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಶಾಖ ಮತ್ತು ಪರಿಮಳದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: it_crust_bubbles
    name: ಕ್ರಸ್ಟ್ (Crust) ಗುಳ್ಳೆಗಳು
    prompt: |
      ಫೊಕಾಸ್ಸಿಯಾ (Focaccia) ಅಥವಾ ಪಿಜ್ಜಾ ಕ್ರಸ್ಟ್ (Crust) ಒಲೆಯಲ್ಲಿ ಗುಳ್ಳೆಗಳನ್ನು
