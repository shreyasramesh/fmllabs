# کلنری لیب — پیزا (Urdu)

id: culinary_lab_pizza
name: کلنری لیب — پیزا
description: 50 کارڈز جو آپ کے پیزا کے تجربے کو بدل دیں گے — گوندھے ہوئے آٹے اور آگ کی کیمیا سے لے کر سلائس کے تھیٹر اور ٹوپنگز کی पुरातیاست تک۔
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: آٹے کو کھینچنا
    prompt: |
      آٹے کو کھینچتے ہوئے دیکھیں — ہاتھ سے اچھالا ہوا، یا دبایا ہوا۔ گلوٹین کا جال
      کھینچتا ہے، ہوا کو روکتا ہے۔ شکل کا انتخاب کیا جاتا ہے۔ ایک چوکور سلائس کا
      مثلث سے کیا مطلب ہوگا؟
    follow_ups:
      - کھینچنے سے تجربہ کیسے متعین ہوتا ہے؟
      - کھینچنے کے بغیر پیزا کیا ہوگا؟
      - ہاتھ اور شکل کے درمیان کیا تعلق ہے؟
  - id: piz_oven_breath
    name: اوون کی سانس
    prompt: |
      ایک پیزا اوون سانس لیتا ہے — لکڑی کی آگ، یا گیس، یا بجلی۔ گنبد گرمی کو
      روکتا ہے۔ فرش اسے منتقل کرتا ہے۔ ایک کے قریب کھڑے ہوں۔ اوون ایک نانبائی سے
      کیا مطالبہ کرتا ہے؟ آٹے سے؟
    follow_ups:
      - اوون کے بغیر پیزا کیا ہوگا؟
      - گرمی کس طرح کرسٹ کو شکل دیتی ہے؟
      - سانس اور بلبلے کے درمیان کیا تعلق ہے؟
  - id: piz_sauce_spiral
    name: ساس اسپائرل
    prompt: |
      ساس اکثر اسپائرل میں لگائی جاتی ہے — کنارے سے کنارے تک پھیلی نہیں۔ پیٹرن
      کا مطالعہ کریں۔ کیا ڈھکا ہوا ہے؟ کیا بے نقاب ہے؟ اسپائرل کمپوزیشن ہے۔
    follow_ups:
      - مکمل طور پر ساس والا پیزا کیسا نظر آئے گا؟
      - اسپائرل ہر بائٹ کو کیسے متاثر کرتا ہے؟
      - پیٹرن اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: piz_cheese_melt
    name: پنیر کا پگھلنا
    prompt: |
      پنیر مختلف شرحوں پر پگھلتا ہے۔ موزاریلا کھینچتا ہے؛ عمر رسیدہ پنیر تیل
      چھوڑتا ہے۔ پگھلنے کو دیکھیں. چربی اور پروٹین کی کیمسٹری، گرمی اور وقت۔
      یہ کب ہو جاتا ہے؟
    follow_ups:
      - کھینچنے کے بغیر سلائس کیا ہوگا؟
      - پگھلنے سے بائٹ کیسے بنتی ہے؟
      - پگھلنے اور یادداشت کے درمیان کیا تعلق ہے؟
  - id: piz_crust_char
    name: کرسٹ کا جلنا
    prompt: |
      لیپرڈنگ — کرسٹ پر جلنے کے داغ — لکڑی سے جلے ہوئے پیزا کی نشانی ہے۔ ہر
      داغ شدید گرمی کے ساتھ رابطے کا ایک لمحہ ہے۔ ان داغوں کے ذائقے پر غور
      کریں۔ ایک بے رنگ کرسٹ کا کیا مطلب ہوگا؟
    follow_ups:
      - جلنے سے تجربہ کیسے بدلتا ہے؟
      - اس کے بغیر پیزا کیا ہوگا؟
      - جلنے اور ہنر کے درمیان کیا تعلق ہے؟
  - id: piz_slice_fold
    name: سلائس فولڈ
    prompt: |
      نیویارک اسٹائل: سلائس کو فولڈ کریں۔ فولڈ ساختی ہے — یہ ٹوپنگز کو
      روکتا ہے، چکنائی کو چینل کرتا ہے۔ فولڈ کوریوگرافی ہے۔ یہ کیا قابل بناتا
      ہے؟
    follow_ups:
      - فولڈ کے بغیر کھانا کیا ہوگا؟
      - فولڈ بائٹ کو کیسے شکل دیتا ہے؟
      - فولڈ اور جگہ کے درمیان کیا تعلق ہے؟
  - id: piz_pepperoni_cup
    name: پیپرونی کپ
    prompt: |
      اچھے پیپرونی کپ — کنارے کرسپی، درمیان میں تیل جمع ہو جاتا ہے۔ یہ شکل
      اور بناوٹ کی تبدیلی ہے۔ اس پر غور کریں کہ یہ کب ہوتا ہے۔ کپ کس نے
      بنایا؟
    follow_ups:
      - کپ کے بغیر پیپرونی کیا ہوگا؟
      - کپ ذائقے کو کیسے رکھتا ہے؟
      - چربی اور شکل کے درمیان کیا تعلق ہے؟
  - id: piz_basil_finish
    name: تلسی کا فنش
    prompt: |
      پیزا پر تلسی اکثر بیکنگ کے بعد ڈالی جاتی ہے — تازہ، روشن۔ یہ بیس نہیں،
      بلکہ ایک فنش ہے۔ فرق پر غور کریں۔ تازہ کیا پکا ہوا میں شامل کرتا ہے؟
    follow_ups:
      - تلسی کے بغیر پیزا کیا ہوگا؟
      - وقت جڑی بوٹی کو کیسے شکل دیتا ہے؟
      - کچی اور پکی ہوئی کے درمیان کیا تعلق ہے؟
  - id: piz_margherita_minimal
    name: مارگریٹا مینیمال
    prompt: |
      مارگریٹا تین چیزیں ہیں: آٹا، ٹماٹر، پنیر۔ ہر ایک کو اٹھانا ہوتا ہے۔
      چھپانے کی کوئی جگہ نہیں۔ نظم و ضبط پر غور کریں۔ مینیمالزم کیا مطالبہ
      کرتا ہے؟
    follow_ups:
      - ایک غلط نوٹ کیا کرے گا؟
      - سادگی پیلیٹ کو کیسے مرکوز کرتی ہے؟
      - کم اور زیادہ کے درمیان کیا تعلق ہے؟
  - id: piz_pool_table
    name: پول ٹیبل
    prompt: |
      کچھ پزیریا میں لمبی اجتماعی میزیں ہوتی ہیں — اجنبی جگہ بانٹتے ہیں۔
      پیزا آتا ہے۔ میز ایک اسٹیج ہے۔ آپ کے ساتھ کون کھاتا ہے؟ کیا غیر کہی
      معاہدہ ہے؟
    follow_ups:
      - بوث میں کھانا کیا ہوگا؟
      - میز مقابلے کو کیسے شکل دیتی ہے؟
      - مشترکہ اور نجی کے درمیان کیا تعلق ہے؟
  - id: piz_box_flip
    name: باکس فلپ
    prompt: |
      پیزا کا باکس — گتہ، کبھی کبھی درمیان میں پلاسٹک تپائی کے ساتھ۔
      یہ وینٹیلیشن، اسٹیک کرنے کے لیے ڈیزائن کیا گیا ہے۔ باکس انفراسٹرکچر ہے۔
      اس کے بغیر ٹیک آؤٹ کیا ہوگا؟
    follow_ups:
      - باکس گھر کے سفر کو کیسے شکل دیتا ہے؟
      - جب باکس کھولا جاتا ہے تو کیا ہوتا ہے؟
      - باکس اور رسم کے درمیان کیا تعلق ہے؟
  - id: piz_dough_ferment
    name: آٹے کا ابال
    prompt: |
      پیزا کا آٹا ابالتا ہے — گھنٹے یا دن۔ خمیر بلبلے، ذائقہ بناتا ہے۔
      پرانے آٹے میں کھٹا پن ہوتا ہے۔ ہر بائٹ میں وقت پر غور کریں۔ کوئیک-رائز
      آٹا کیا قربان کرے گا؟
    follow_ups:
      - ابال کرسٹ کو کیسے شکل دیتا ہے؟
      - وقت اور ذائقہ کے درمیان کیا تعلق ہے؟
      - ایک دن کا آٹا کیا مطلب ہوگا؟
  - id: piz_cornicione
    name: کارنیشون
    prompt: |
      کارنیشون — کنارہ، کرسٹ — اکثر بہترین حصہ ہوتا ہے۔ ہوا دار، بلبلے والا،
      شاید تھوڑا چبانے والا۔ کچھ اسے چھوڑ دیتے ہیں؛ کچھ اسے پہلے کھاتے ہیں۔
      کنارے سے آپ کا کیا رشتہ ہے؟
    follow_ups:
      - کارنیشون کے بغیر پیزا کیا ہوگا؟
      - کنارہ مرکز کو کیسے فریم کرتا ہے؟
      - کرسٹ اور مرکز کے درمیان کیا تعلق ہے؟
  - id: piz_olive_oil_drizzle
    name: زیتون کا تیل چھڑکنا
    prompt: |
      پکنے کے بعد زیتون کا تیل چھڑکا جاتا ہے — کرسٹ پر، یا پورے پیزا پر۔
      یہ چمکتا ہے۔ تیل ذائقہ لے جاتا ہے، چربی بڑھاتا ہے۔ غور کریں کہ یہ کب
      لگایا جاتا ہے۔ چھڑکاؤ کیا شامل کرتا ہے؟
    follow_ups:
      - اس کے بغیر پیزا کیا ہوگا؟
      - تیل بائٹ کو کیسے بدلتا ہے؟
      - چربی اور فنش کے درمیان کیا تعلق ہے؟
  - id: piz_anchovy_salt
    name: اینکووی نمک
    prompt: |
      پیزا پر اینکوویز — نمکین، امامی، تقسیم کرنے والا۔ وہ ساس میں گھل جاتے
      ہیں، یا اوپر بیٹھ جاتے ہیں۔ اینکووی पुरातیاست ہے: بحیرہ روم، محفوظ، قدیم۔
      اس نے کیا سفر کیا؟
    follow_ups:
      - اینکووی کے بغیر سلائس کیا ہوگا؟
      - نمک دوسرے ذائقوں کو کیسے شکل دیتا ہے؟
      - محفوظ اور تازہ کے درمیان کیا تعلق ہے؟
  - id: piz_sound_crunch
    name: کرینچ کی آواز
    prompt: |
      اچھے کرسٹ کا پہلا کاٹنے — کرینچ، لچک۔ اپنی آنکھیں بند کر لیں۔ آواز تجربے
      کا حصہ ہے۔ اگر پیزا خاموش ہوتا تو کیا ہوتا؟
    follow_ups:
      - آواز اطمینان کو کیسے شکل دیتی ہے؟
      - گیلے کرسٹ کیسی آواز آتی ہے؟
      - کرینچ اور معیار کے درمیان کیا تعلق ہے؟
  - id: piz_second_slice
    name: دوسرا سلائس
    prompt: |
      دوسرا سلائس پہلے سے مختلف ہوتا ہے — آپ اب پیزا جانتے ہیں۔ پیلیٹ
      نے خود کو ایڈجسٹ کر لیا ہے۔ شفٹ پر غور کریں۔ کیا دوسرا سلائس وہی ذائقہ
      دیتا ہے؟ بہتر؟ مختلف؟
    follow_ups:
      - تکرار تاثر کو کیسے بدلتی ہے؟
      - ایک سلائس کا کھانا کیا کمی کرے گا؟
      - پہلے اور دوسرے کے درمیان کیا تعلق ہے؟
  - id: piz_neapolitan_rules
    name: نیپولیٹن قواعد
    prompt: |
      حقیقی نیپولیٹن پیزا کے قواعد ہیں — سائز، اجزاء، طریقہ۔ VPN
      مہر، سرٹیفکیٹ۔ قواعد شناخت بناتے ہیں۔ قواعد کیا محفوظ کرتے ہیں؟ وہ کیا
      خارج کرتے ہیں؟
    follow_ups:
      - قواعد کے بغیر پیزا کیا ہوگا؟
      - سرٹیفیکیشن توقعات کو کیسے شکل دیتا ہے؟
      - قاعدہ اور ہنر کے درمیان کیا تعلق ہے؟
  - id: piz_detroit_edges
    name: ڈیٹروائٹ کنارے
    prompt: |
      ڈیٹروائٹ اسٹائل — مستطیل، کنارے تک پنیر، جہاں یہ پین سے ملتا ہے
      وہاں کرسپی فرائیڈ کرسٹ۔ کنارے جان بوجھ کر بنائے گئے ہیں۔ فن تعمیر پر
      غور کریں۔ شکل کیا کہتی ہے؟
    follow_ups:
      - کنارے کے بغیر پیزا کیا ہوگا؟
      - شکل شناخت کیسے بناتی ہے؟
      - پین اور کرسٹ کے درمیان کیا تعلق ہے؟
  - id: piz_garlic_knot
    name: لہسن کا گرہ
    prompt: |
      لہسن کے گرہیں — آٹے کے موڑ، مکھن، لہسن۔ وہ اکثر پہلے آتے ہیں۔
      وہ پیزا نہیں ہیں، لیکن وہ ایک ہی دنیا کے ہیں۔ گرہ اور پائی کے درمیان
      کیا تعلق ہے؟
    follow_ups:
      - گرہوں کے بغیر کھانا کیا ہوگا؟
      - گرہ لہجہ کیسے قائم کرتی ہے؟
      - سائیڈ اور مین کے درمیان کیا تعلق ہے؟
  - id: piz_red_pepper_flake
    name: سرخ مرچ فلیک
    prompt: |
      سرخ مرچ فلیکس کا شیکر — اکثر میز پر۔ آپ گرمی کا انتخاب کرتے ہیں۔
      فلیک جمہوریت ہے۔ ہر کوئی اپنا موسم بدلتا ہے۔ وہ انتخاب کیا معنی
      رکھتا ہے؟
    follow_ups:
      - شیکر کے بغیر میز کیا ہوگی؟
      - خود موسم بدلنا کھانے کو کیسے شکل دیتا ہے؟
      - انتخاب اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: piz_sicilian_slab
    name: سسلی سلیب
    prompt: |
      سسلی — موٹی، مستطیل، کبھی کبھی الٹی (اوپر ساس)۔ سلیب کا وزن ہوتا ہے۔
      فن تعمیر مختلف ہے۔ موٹائی کیا بڑھاتی ہے؟ یہ کیا قربان کرتی ہے؟
    follow_ups:
      - پتلا کرسٹ مختلف کیا کرے گا؟
      - موٹائی بائٹ کو کیسے شکل دیتی ہے؟
      - سلیب اور سلائس کے درمیان کیا تعلق ہے؟
  - id: piz_wood_stack
    name: لکڑی کا ڈھیر
    prompt: |
      لکڑی سے جلے ہوئے پزیریا لکڑی کے لاگ ڈھیر کرتے ہیں۔ بلوط، کبھی کبھی۔
      لکڑی ایندھن اور ذائقہ ہے۔ ڈھیر تیاری ہے۔ غور کریں کہ کیا جلتا ہے۔
      لکڑی کیا شامل کرتی ہے جو گیس نہیں کر سکتی؟
    follow_ups:
      - لکڑی کے بغیر پیزا کیا ہوگا؟
      - ایندھن کرسٹ کو کیسے شکل دیتا ہے؟
      - آگ اور دھوئیں کے درمیان کیا تعلق ہے؟
  - id: piz_topping_balance
    name: ٹوپنگ بیلنس
    prompt: |
      ٹوپنگز بہت زیادہ ہو سکتی ہیں — بہت زیادہ، اور پیزا ایک کیسرول بن جاتا ہے۔
      بیلنس نازک ہے۔ ایک بھری ہوئی پائی کا مطالعہ کریں۔ یہ کہاں لائن کراس
      کرتی ہے؟ آپ کیا ہٹائیں گے؟
    follow_ups:
      - تحمل پیزا کو کیسے شکل دیتا ہے؟
      - زیادہ اور کم کے درمیان کیا تعلق ہے؟
      - انتخاب کب افراتفری بن جاتا ہے؟
  - id: piz_cold_leftover
    name: ٹھنڈا بچا ہوا
    prompt: |
      ناشتے کے لیے ٹھنڈا پیزا — کچھ لوگ اس کے قائل ہیں۔ ذائقے آباد ہو گئے
      ہیں۔ بناوٹ بدل گئی ہے۔ اگلے دن کی پائی پر غور کریں۔ وقت کیا بڑھاتا
      ہے؟ یہ کیا لیتا ہے؟
    follow_ups:
      - ٹھنڈا تجربہ کیسے بدلتا ہے؟
      - دوبارہ گرم کرنے سے کیا ہوگا؟
      - تازہ اور بچا ہوا کے درمیان کیا تعلق ہے؟
  - id: piz_sauce_sweet
    name: ساس میٹھا
    prompt: |
