# রন্ধনশালা — পিৎজা (Bengali)

id: culinary_lab_pizza
name: রন্ধনশালা — পিৎজা
description: পিৎজা আপনার অভিজ্ঞতায় পরিবর্তন আনবে এমন ৫০টি কার্ড—ডো এবং আগুনের রসায়ন থেকে শুরু করে স্লাইস এবং টপিংয়ের প্রত্নতত্ত্ব পর্যন্ত।
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: ময়দা টানি
    prompt: |
      ময়দা টানতে দেখুন—হাতে ছুঁড়ে বা চেপে। গ্লুটেন নেটওয়ার্ক প্রসারিত হয়, বাতাস ধরে রাখে। আকার নির্বাচন করা হয়। একটি চৌকো স্লাইসের অর্থ ত্রিভুজাকার স্লাইসের চেয়ে ভিন্ন কেন?
    follow_ups:
      - টানটি কীভাবে অভিজ্ঞতাকে সংজ্ঞায়িত করে?
      - টান ছাড়া পিৎজা কেমন হবে?
      - হাত এবং আকারের মধ্যে সম্পর্ক কী?
  - id: piz_oven_breath
    name: চুলা শ্বাস নেয়
    prompt: |
      একটি পিৎজা চুলা শ্বাস নেয়—কাঠের আগুন, বা গ্যাস, বা বৈদ্যুতিক। গম্বুজ তাপ ধরে রাখে। মেঝেতে তা স্থানান্তর করে। একটির কাছাকাছি দাঁড়ান। চুলা রাঁধুনিকে কী দাবি করে? ময়দাকে কী?
    follow_ups:
      - চুলা ছাড়া পিৎজা কেমন হবে?
      - তাপ কীভাবে ক্রাস্টকে আকার দেয়?
      - শ্বাস এবং ফোসকার মধ্যে সম্পর্ক কী?
  - id: piz_sauce_spiral
    name: সস সর্পিল
    prompt: |
      সস প্রায়শই সর্পিলের আকারে লাগানো হয়—ধার থেকে ধার পর্যন্ত ছড়িয়ে দেওয়া হয় না। প্যাটার্নটি অধ্যয়ন করুন। কী ঢাকা পড়েছে? কী অনাবৃত? সর্পিলটি হল রচনা।
    follow_ups:
      - সম্পূর্ণ সসযুক্ত পিৎজা কেমন দেখতে হবে?
      - সর্পিল প্রতিটি কামড়কে কীভাবে প্রভাবিত করে?
      - প্যাটার্ন এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: piz_cheese_melt
    name: চিজ গলে যাওয়া
    prompt: |
      চিজ বিভিন্ন হারে গলে। মোজারেলা প্রসারিত হয়; পুরানো চিজ তেল ছাড়ে। গলে যাওয়া দেখুন। চর্বি এবং প্রোটিনের রসায়ন, তাপ এবং সময়। কখন এটি সম্পন্ন হয়?
    follow_ups:
      - প্রসারণ ছাড়া স্লাইস কেমন হবে?
      - গলানো কামড়কে কীভাবে আকার দেয়?
      - গলানো এবং স্মৃতির মধ্যে সম্পর্ক কী?
  - id: piz_crust_char
    name: ক্রাস্ট পোড়া
    prompt: |
      চামড়ার দাগ—ক্রাস্টের উপর পোড়া দাগ—কাঠের আগুনের পিৎজার চিহ্ন। প্রতিটি দাগ চরম তাপের সংস্পর্শের মুহূর্ত। সেই দাগগুলির দ্বারা যোগ করা স্বাদ বিবেচনা করুন। ফ্যাকাশে ক্রাস্টের অর্থ কী হবে?
    follow_ups:
      - পোড়া কীভাবে অভিজ্ঞতা পরিবর্তন করে?
      - এটি ছাড়া পিৎজা কেমন হবে?
      - পোড়া এবং কারুকার্যের মধ্যে সম্পর্ক কী?
  - id: piz_slice_fold
    name: স্লাইস ভাঁজ
    prompt: |
      নিউ ইয়র্ক স্টাইল: স্লাইস ভাঁজ করুন। ভাঁজটি কাঠামোগত—এটি টপিং ধরে রাখে, গ্রীস পরিচালনা করে। ভাঁজটি একটি কোরিওগ্রাফি। এটি কী সক্ষম করে?
    follow_ups:
      - ভাঁজ ছাড়া খাওয়া কেমন হবে?
      - ভাঁজ কামড়কে কীভাবে আকার দেয়?
      - ভাঁজ এবং স্থানের মধ্যে সম্পর্ক কী?
  - id: piz_pepperoni_cup
    name: পেপারোনি কাপ
    prompt: |
      ভালো পেপারোনি কাপ—ধারগুলো মচমচে, কেন্দ্রে তেল জমে। এটি আকার এবং টেক্সচারের একটি রূপান্তর। এটি কখন ঘটে তা লক্ষ্য করুন। কাপটি কী তৈরি করেছে?
    follow_ups:
      - কাপ ছাড়া পেপারোনি কেমন হবে?
      - কাপ কীভাবে স্বাদ ধরে রাখে?
      - চর্বি এবং আকারের মধ্যে সম্পর্ক কী?
  - id: piz_basil_finish
    name: তুলসী ফিনিশ
    prompt: |
      পিৎজায় তুলসী প্রায়শই বেক করার পরে যোগ করা হয়—তাজা, উজ্জ্বল। এটি একটি ফিনিশ, বেস নয়। বৈসাদৃশ্য লক্ষ্য করুন। রান্না করা খাবারে তাজা কী যোগ করে?
    follow_ups:
      - তুলসী ছাড়া পিৎজা কেমন হবে?
      - সময় কীভাবে ভেষজকে আকার দেয়?
      - কাঁচা এবং রান্না করা খাবারের মধ্যে সম্পর্ক কী?
  - id: piz_margherita_minimal
    name: মার্গারিটা মিনিমাল
    prompt: |
      মার্গারিটা তিনটি জিনিস: ময়দা, টমেটো, চিজ। প্রত্যেকটিকে বহন করতে হবে।
      লুকানোর কোন জায়গা নেই। শৃঙ্খলা বিবেচনা করুন। মিনিমালিজম কী দাবি করে?
    follow_ups:
      - একটি ভুল নোট কী করবে?
      - সরলতা কীভাবে তালুকে কেন্দ্রীভূত করে?
      - অল্প এবং অনেকের মধ্যে সম্পর্ক কী?
  - id: piz_pool_table
    name: পুল টেবিল
    prompt: |
      কিছু পিৎজারিয়াতে লম্বা কমিউনিটি টেবিল থাকে—অপরিচিতরা স্থান ভাগ করে নেয়।
      পিৎজা আসে। টেবিলটি একটি মঞ্চ। আপনার পাশে কে খাচ্ছে? অলিখিত চুক্তি কী?
    follow_ups:
      - বুথে খাবার কেমন হবে?
      - টেবিল কীভাবে এনকাউন্টারকে আকার দেয়?
      - ভাগ করা এবং ব্যক্তিগতের মধ্যে সম্পর্ক কী?
  - id: piz_box_flip
    name: বাক্স ফ্লিপ
    prompt: |
      পিৎজা বাক্স—কার্ডবোর্ড, কখনও কখনও কেন্দ্রে প্লাস্টিকের ট্রাইপড সহ।
      এটি ভেন্ট করার জন্য, স্ট্যাক করার জন্য ডিজাইন করা হয়েছে। বাক্সটি হল পরিকাঠামো। এটি ছাড়া টেকঅ্যাউট কেমন হবে?
    follow_ups:
      - বাক্সটি বাড়ির পথকে কীভাবে আকার দেয়?
      - বাক্স খোলা হলে কী ঘটে?
      - বাক্স এবং আচারের মধ্যে সম্পর্ক কী?
  - id: piz_dough_ferment
    name: ময়দা গাঁজন
    prompt: |
      পিৎজা ময়দা গাঁজন হয়—ঘন্টা বা দিন। ইস্ট বুদবুদ, স্বাদ তৈরি করে।
      পুরানো ময়দার টক ভাব থাকে। প্রতিটি কামড়ে সময় বিবেচনা করুন। দ্রুত-রাইজ করা ময়দা কী ত্যাগ করবে?
    follow_ups:
      - গাঁজন কীভাবে ক্রাস্টকে আকার দেয়?
      - সময় এবং স্বাদের মধ্যে সম্পর্ক কী?
      - একই দিনের ময়দার অর্থ কী হবে?
  - id: piz_cornicione
    name: কর্নিসোন
    prompt: |
      কর্নিসোন—ধার, ক্রাস্ট—প্রায়শই সেরা অংশ। বাতাসপূর্ণ, ফোসকাযুক্ত,
      হয়তো একটু চিউয়ি। কেউ এটি ছেড়ে দেয়; কেউ এটি প্রথমে খায়। ধারের সাথে আপনার সম্পর্ক কী?
    follow_ups:
      - কর্নিসোন ছাড়া পিৎজা কেমন হবে?
      - ধার কেন্দ্রকে কীভাবে ফ্রেম করে?
      - ক্রাস্ট এবং কেন্দ্রের মধ্যে সম্পর্ক কী?
  - id: piz_olive_oil_drizzle
    name: জলপাই তেল ড্রিসল
    prompt: |
      বেক করার পরে জলপাই তেল ড্রিসল করা হয়—ক্রাস্টে, বা পুরো পাইতে।
      এটি চকচক করে। তেল স্বাদ বহন করে, সমৃদ্ধি যোগ করে। এটি কখন প্রয়োগ করা হয় তা লক্ষ্য করুন। ড্রিসল কী যোগ করে?
    follow_ups:
      - এটি ছাড়া পিৎজা কেমন হবে?
      - তেল কামড়কে কীভাবে পরিবর্তন করে?
      - চর্বি এবং ফিনিশের মধ্যে সম্পর্ক কী?
  - id: piz_anchovy_salt
    name: অ্যাঞ্চোভি লবণ
    prompt: |
      পিৎজায় অ্যাঞ্চোভি—নোনতা, উমামি, বিভেদ সৃষ্টিকারী। তারা সসে দ্রবীভূত হয়, বা উপরে বসে। অ্যাঞ্চোভি হল প্রত্নতত্ত্ব: ভূমধ্যসাগরীয়, সংরক্ষিত, প্রাচীন। এটি কী যাত্রা করেছিল?
    follow_ups:
      - অ্যাঞ্চোভি ছাড়া স্লাইস কেমন হবে?
      - লবণ কীভাবে অন্যান্য স্বাদকে আকার দেয়?
      - সংরক্ষিত এবং তাজা খাবারের মধ্যে সম্পর্ক কী?
  - id: piz_sound_crunch
    name: শব্দ মচমচে
    prompt: |
      একটি ভাল তৈরি ক্রাস্টের প্রথম কামড়—মচমচে, নমনীয়। চোখ বন্ধ করুন। শব্দ অভিজ্ঞতাটির অংশ। পিৎজা যদি নীরব হত তবে কী হত?
    follow_ups:
      - শব্দ কীভাবে সন্তুষ্টিকে আকার দেয়?
      - নরম ক্রাস্ট কেমন শোনায়?
      - মচমচে এবং মানের মধ্যে সম্পর্ক কী?
  - id: piz_second_slice
    name: দ্বিতীয় স্লাইস
    prompt: |
      দ্বিতীয় স্লাইসটি প্রথমটির চেয়ে আলাদা—আপনি এখন পিৎজা জানেন।
      তালু সামঞ্জস্য করেছে। পরিবর্তন লক্ষ্য করুন। দ্বিতীয় স্লাইসের স্বাদ কি একই? ভালো? ভিন্ন?
    follow_ups:
      - পুনরাবৃত্তি কীভাবে উপলব্ধি পরিবর্তন করে?
      - একটি একক-স্লাইস খাবারে কী অভাব হবে?
      - প্রথম এবং দ্বিতীয়ের মধ্যে সম্পর্ক কী?
  - id: piz_neapolitan_rules
    name: নেপোলিটান নিয়ম
    prompt: |
      আসল নেপোলিটান পিৎজার নিয়ম আছে—আকার, উপাদান, পদ্ধতি। ভিপিএন
      স্ট্যাম্প, শংসাপত্র। নিয়ম পরিচয় তৈরি করে। নিয়মগুলি কী রক্ষা করে? তারা কী বাদ দেয়?
    follow_ups:
      - নিয়ম ছাড়া পিৎজা কেমন হবে?
      - শংসাপত্র কীভাবে প্রত্যাশা তৈরি করে?
      - নিয়ম এবং কারুকার্যের মধ্যে সম্পর্ক কী?
  - id: piz_detroit_edges
    name: ডেট্রয়েট ধার
    prompt: |
      ডেট্রয়েট স্টাইল—আয়তক্ষেত্রাকার, প্রান্ত পর্যন্ত চিজ, প্যানের সাথে মিলিত
      হলে মচমচে ভাজা ক্রাস্ট। ধারগুলি ইচ্ছাকৃত। স্থাপত্য বিবেচনা করুন। আকার কী বলে?
    follow_ups:
      - ধার ছাড়া পিৎজা কেমন হবে?
      - আকার কীভাবে পরিচয় তৈরি করে?
      - প্যান এবং ক্রাস্টের মধ্যে সম্পর্ক কী?
  - id: piz_garlic_knot
