# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 烹饪实验室 — 印度 (Mandarin Chinese)

id: culinary_lab_indian
name: 烹饪实验室 — 印度
description: 50 张卡片，颠覆您对印度美食的体验——从香料和辣度的化学反应，到食材的考古学，再到共享餐桌的编排。
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: 塔德卡（Tadka）的噼啪声
    prompt: |
      塔德卡——调味——是开场的序曲。热油遇上芥末籽、孜然、咖喱叶。倾听。那噼啪声是实时发生的化学反应。在品尝之前听到它，会带来什么变化？
    follow_ups:
      - 声音如何塑造期待？
      - 没有了噼啪声，这道菜会失去什么？
      - 声音与风味之间是什么关系？
  - id: ind_spice_route
    name: 香料之路
    prompt: |
      豆蔻来自喀拉拉邦。藏红花来自克什米尔。黑胡椒曾重若黄金。追溯盘子里的某种香料回到它的起源。它经历了怎样的旅程才到达你手中？
    follow_ups:
      - 知道它的来路，会如何改变品尝时的感觉？
      - 还有哪些香料走过相同的路？
      - 贸易与风味之间是什么关系？
  - id: ind_thali_geometry
    name: 塔利（Thali）的几何
    prompt: |
      塔利是一块画布——碗呈圆形排列，每个碗都有其作用。研究一下构图。目光最先落在何处？留白空间在哪里？
    follow_ups:
      - 如果缺少一个碗会怎样？
      - 这种排列方式如何塑造了这顿饭？
      - 几何与仪式之间是什么关系？
  - id: ind_hand_as_tool
    name: 手作为工具
    prompt: |
      撕下罗提（Roti），与蔬菜一起，送入口中。手是餐具，也是感官。留意它的舞动。手触摸能带来什么，而刀叉无法做到？
    follow_ups:
      - 用手吃饭会如何改变进食的节奏？
      - 用餐具会有什么损失？
      - 触觉与温度之间是什么关系？
  - id: ind_heat_layers
    name: 辣度的层次
    prompt: |
      印度菜的辣度是分层的——辣椒的灼热，黑胡椒的温热，生姜的辛辣。吃一口，标记出每种辣度落在何处。舌尖、喉咙、腹部。它们是如何堆叠起来的？
    follow_ups:
      - 如果只有一种辣度，这道菜会怎样？
      - 分层如何创造出复杂性？
      - 辣度与时间之间是什么关系？
  - id: ind_yogurt_intervention
    name: 酸奶的干预
    prompt: |
      酸奶饭（Raita）、酸奶（Dahi）、拉西（Lassi）——酸奶能降温、解腻、平衡。注意你加入它的那一刻。酸味遇到脂肪，凉爽遇到辛辣。这种干预是化学的。它打断了什么？
    follow_ups:
      - 没有酸奶，这顿饭会是怎样？
      - 对比如何创造出缓解感？
      - 干预与平衡之间是什么关系？
  - id: ind_betel_after
    name: 槟榔之后
    prompt: |
      在某些传统中，宾榔叶（Paan）是餐后的收尾。它不是甜点。它是结束。味蕾再次变化。结尾说了关于整体的什么？
    follow_ups:
      - 宾榔如何标志着转变？
      - 没有它，这顿饭会缺少什么？
      - 结束与记忆之间是什么关系？
  - id: ind_street_chaos
    name: 街头混乱
    prompt: |
      一位街头小吃摊主飞快地工作——小吃（Bhel）、脆饼（Papdi）、酱料在几秒内层层叠叠。观看这场表演。摊位就是剧场。剧本是什么？观众是谁？
    follow_ups:
      - 没有了表演，这道小吃会是怎样？
      - 速度如何塑造体验？
      - 混乱与技艺之间是什么关系？
  - id: ind_tandoor_breathe
    name: 坦杜里（Tandoor）的呼吸
    prompt: |
      坦杜里在呼吸——火焰、烟雾、泥土。馕（Naan）被拍在墙上，烤至起泡后取出。靠近一个。热量，气味。火与风味之间是什么关系？
    follow_ups:
      - 没有坦杜里，馕会是怎样？
      - 泥土如何塑造厨师？
      - 呼吸与面包之间是什么关系？
  - id: ind_turmeric_stain
    name: 姜黄渍
    prompt: |
      姜黄会留下污渍——手指、布、塑料。颜色会持久。注意它留下了什么印记。这污渍就是考古学。这顿饭在你面前出现之前，去过哪里？
    follow_ups:
      - 没有这种颜色，这道菜会是怎样？
      - 污渍如何标志着劳动？
      - 色素与保存之间是什么关系？
  - id: ind_rice_architecture
    name: 米饭的建筑
    prompt: |
      香饭（Biryani）是层层堆砌的——米饭层、肉层、藏红花、炸洋葱。结构稳固。挖掘它。它的结构如何影响每一口？
    follow_ups:
      - 如果这些层次过早混合会怎样？
      - 结构如何创造惊喜？
      - 建造与饮食之间是什么关系？
  - id: ind_chutney_spectrum
    name: 酱料的频谱
    prompt: |
      薄荷酱、罗望子酱、椰子酱、番茄酱——酱料像调色板一样排列。每一种都改变了口感。用三种酱料品尝一道菜。相同的基底如何变成三个不同的故事？
    follow_ups:
      - 如果只有一种酱料，这顿饭会是怎样？
      - 选择如何塑造自主权？
      - 频谱与偏好之间是什么关系？
  - id: ind_steam_rising
    name: 蒸汽升腾
    prompt: |
      米糕（Idli）、薄饼（Dosa）、炸面包（Puri）——揭开盖子时蒸汽升腾。看着它。蒸汽在品尝之前就带来了香气。什么先到达？鼻子还是嘴巴？
    follow_ups:
      - 蒸汽如何塑造期待？
      - 没有揭盖的动作会失去什么？
      - 蒸汽与风味之间是什么关系？
  - id: ind_silver_versus_steel
    name: 银盘与钢盘
    prompt: |
      有的餐桌使用钢制塔利，有的用银制，有的用香蕉叶。注意盛放食物的器皿。下面的表面如何改变体验？重量、声音、传统。
    follow_ups:
      - 在不同的表面上，这顿饭会感觉如何？
      - 器皿如何塑造仪式？
      - 材料与意义之间是什么关系？
  - id: ind_cumin_fragrance
    name: 孜然香气
    prompt: |
      烤孜然籽在风味之前就散发出香气。在品尝菜肴之前先闻闻它。孜然的香气弥漫在房间里。香气如何准备好你的味蕾？
    follow_ups:
      - 没有气味，这道菜会是怎样？
      - 香气如何标记厨师的存在？
      - 鼻子与记忆之间是什么关系？
  - id: ind_shared_central
    name: 共享中心
    prompt: |
      菜肴放在中间。大家伸手去取。没有所谓的“你的盘子”。观察伸手、传递、取食的编排。有什么潜规则？
    follow_ups:
      - 如果是分餐制，这顿饭会是怎样？
      - 分享如何创造联系？
      - 中心与集体之间是什么关系？
  - id: ind_ghee_gloss
    name: 酥油光泽
    prompt: |
      酥油（Ghee）聚集成片，闪闪发光，覆盖食物。它是风味，也是点缀。注意它在盘子里聚集的地方。这种光泽如何改变质地和温度？
    follow_ups:
      - 如果用油代替酥油，这道菜会怎样？
      - 酥油如何承载其他风味？
      - 光泽与浓郁之间是什么关系？
  - id: ind_papad_crunch
    name: 帕帕德（Papad）的脆响
    prompt: |
      帕帕德——酥脆、薄、嘎吱作响。它就是口感的标点。掰开一个。听。那脆响是这顿饭的节奏部分。没有它，沉默听起来会是怎样？
    follow_ups:
      - 脆响如何创造对比？
      - 没有帕帕德，这顿饭会缺少什么？
      - 声音与满足感之间是什么关系？
  - id: ind_sambar_depth
    name: 桑巴（Sambar）的深度
    prompt: |
      桑巴是分层的——扁豆、罗望子、蔬菜、香料。它一直在炖煮。品尝其中的层次。你能分出多少层？那碗饭有什么考古学的意义？
    follow_ups:
      - 如果桑巴的层次更少，会是怎样？
      - 时间如何建立深度？
      - 慢炖与故事之间是什么关系？
  - id: ind_pickle_punch
    name: 腌菜的冲击
    prompt: |
      阿查尔（Achar）——腌菜——是情节的转折。一小口就能改变一切。甜、酸、辣、发酵。注意它什么时候出现。它打断了什么？
    follow_ups:
      - 没有腌菜，这顿饭会是怎样？
      - 这种冲击如何创造惊喜？
      - 转折与记忆之间是什么关系？
  - id: ind_bay_leaf_hunt
    name: 月桂叶寻踪
    prompt: |
      月桂叶藏在抓饭（Pulao）、香饭（Biryani）、咖喱里。找一片。你不吃它——它是考古学。它来自喀拉拉邦或克什米尔。它在被移除之前增加了什么？
    follow_ups:
      - 不可食用的东西如何塑造可食用的？
      - 没有月桂叶，这道菜会是怎样？
      - 隐藏与存在之间是什么关系？
  - id: ind_dosa_edge
    name: 多萨（Dosa）的边缘
    prompt: |
      多萨有边缘——酥脆、蕾丝状、金黄。中心是柔软的。这种对比是建筑式的。你先咬哪里？边缘如何勾勒出整体？
    follow_ups:
      - 如果多萨的酥脆度均匀，会是怎样？
      - 边缘如何创造趣味？
      - 边界与中心之间是什么关系？
  - id: ind_saffron_thread
    name: 藏红花丝
    prompt: |
      藏红花——几根细丝——为整道菜增添色彩和香气。追踪一根细丝。它来自哪里？克什米尔、伊朗、西班牙？最昂贵的香料。稀缺性带来了什么？
    follow_ups:
      - 藏红花如何塑造奢华感？
      - 如果用姜黄代替藏红花，这道菜会怎样？
      - 丝线与地域之间是什么关系？
  - id: ind_chaat_texture
    name: 恰特（Chaat）的质感
    prompt: |
      恰特在一口中融合了多种质感——酥脆、柔软、嘎吱作响、顺滑。解构它。有多少种质感？它们如何协同工作？这一口就是一次合作。
    follow_ups:
      - 如果恰特只有一种质感，会是怎样？
      - 层叠如何创造出趣味？
      - 质感与愉悦感之间是什么关系？
  - id: ind_mustard_seed_pop
    name: 芥末籽爆裂
    prompt: |
      芥末籽在油里爆裂——孟加拉、南印度调味。爆裂是化学反应。种子释放化合物。闻闻它。当热量激活它们时，发生了什么变化？
    follow_ups:
      - 爆裂如何标志着厨师的时机把握？
      - 没有它，这道菜会是怎样？
      - 爆裂与效力之间是什么关系？
  - id: ind_dal_surface
    name: 豆汤（Dal）的表面
    prompt: |
      豆汤有表面——有时是薄膜，有时是漂浮的调味油。先别搅动。看看它。表面揭示了下面的什么？
    follow_ups:
      - 表面如何引诱或抗拒？
      - 如果你从不搅拌，会发生什么？
      - 表面与深度之间是什么关系？
  - id: ind_banana_leaf_plate
    name: 香蕉叶盘
    prompt: |
      香蕉叶就是盘子——天然、可抛弃、传统。叶子有质感、气味。食物放在上面感觉不同。叶子如何改变这顿饭？
    follow_ups:
      - 在陶瓷盘上，这顿饭会是怎样？
      - 叶子如何塑造仪式？
      - 叶子与地域之间是什么关系？
  - id: ind_fenugreek_haunt
    name: 胡芦巴的萦绕
    prompt: |
      胡芦巴（Methi）有一种挥之不去的香味。苦涩，带点枫糖味。它萦绕在厨房、衣物上。注意它粘在哪儿。持久性带来了什么？
    follow_ups:
      - 胡芦巴如何标记领地？
      - 没有它的持久性，这道菜会是怎样？
      - 萦绕与记忆之间是什么关系？
  - id: ind_pani_puri_moment
    name: 帕尼普里（Pani Puri）的瞬间
    prompt: |
      帕尼普里是一个单口故事——脆壳、土豆、鹰嘴豆、罗望子水。必须一口吃完，立即吃。这个瞬间无法重现。是什么让它如此紧迫？
    follow_ups:
      - 如果你等待会怎样？
      - 紧迫感如何带来愉悦？
      - 瞬间与记忆之间是什么关系？
  - id: ind_serving_order
    name: 上菜顺序
    prompt: |
      在一些场合，有上菜顺序——先长者，某些菜肴先于其他菜。观察。谁来服务？谁等待？这种编排编码了尊重。有什么规则？
    follow_ups:
      - 没有顺序，这顿饭会是怎样？
      - 顺序如何创造意义？
      - 顺序与等级制度之间是什么关系？
  - id: ind_cardamom_pod
    name: 豆蔻荚
    prompt: |
      一个完整的豆蔻荚藏在抓饭或茶里。你可能会咬到它，或者把它推开。这个荚是考古学——绿色的来自喀拉拉邦，黑色的来自山区。它贡献了什么？
    follow_ups:
      - 完整的豆蔻荚与磨碎的有什么不同？
      - 没有它，这道菜会是怎样？
      - 豆荚与地域之间是什么关系？
  - id: ind_kitchen_sounds
    name: 厨房的声音
    prompt: |
      印度厨房有自己的声音图景——研磨声、油炸声、高压锅的嘶嘶声。在其中闭上眼睛。绘制声音图。什么是一成不变的？节奏是什么？
    follow_ups:
      - 没有这些声音，这顿饭会是怎样？
      - 声音如何塑造期待？
      - 厨房与餐桌之间是什么关系？
  - id: ind_second_helping
    name: 第二份
    prompt: |
      “再来一份”是一种仪式。坚持，拒绝，最终接受。观察这场舞蹈。第二份除了满足饥饿，还意味着什么？
    follow_ups:
      - 没有主动邀请，这顿饭会是怎样？
      - 坚持如何编码关怀？
      - 更多与足够之间是什么关系？
  - id: ind_coriander_finish
    name: 香菜点缀
    prompt: |
      新鲜香菜——芫荽——点缀着许多菜肴。这是最后添加的。画龙点睛。注意绿色的香菜如何改变了之前的味道。清新、草本、有争议。
    follow_ups:
      - 没有香菜，这道菜会是怎样？
      - 点缀如何勾勒出整体？
      - 最后与最初之间是什么关系？
  - id: ind_lassi_cut
    name: 拉西（Lassi）的舒缓
    prompt: |
      拉西能够中和辛辣——清凉、微酸、浓稠。它是舒缓。注意你喝它的时候。它打断了什么？它重置了什么？
    follow_ups:
      - 没有拉西，这顿饭会是怎样？
      - 这种舒缓如何延长耐受性？
      - 舒缓与节奏之间是什么关系？
  - id: ind_roti_stretch
    name: 罗提（Roti）的拉伸
    prompt: |
      罗提是用手拉伸——圆形、薄、在火上烤至起泡。看着它被制作出来。拉伸就是技巧。没有这个动作，面包会是怎样？
    follow_ups:
      - 拉伸如何影响质地？
      - 机器制作的罗提会失去什么？
      - 动作与结果之间是什么关系？
  - id: ind_jaljeera_pause
    name: 贾尔吉拉（Jaljeera）的停顿
    prompt: |
      贾尔吉拉——孜然、薄荷、罗望子——是一种消化饮品，一种停顿。它常常在用餐中途或之后出现。注意这种变化。停顿带来了什么？
    follow_ups:
      - 没有停顿，这顿饭会是怎样？
      - 贾尔吉拉如何标志着转变？
      - 停顿与消化之间是什么关系？
  - id: ind_color_conversation
    name: 色彩对话
    prompt: |
      印度菜肴色彩斑斓——黄色的豆汤，绿色的蔬菜，白色的米饭，红色的酱料。研究一下色彩。它们在说什么？什么会冲突？什么会和谐？
    follow_ups:
      - 颜色如何塑造食欲？
      - 单色版的盘子会是怎样？
      - 色彩与地域之间是什么关系？
  - id: ind_clove_buried
    name: 丁香埋藏
    prompt: |
      丁香藏在香饭、葛拉姆马萨拉（Garam Masala）、茶里。它们辛辣，温暖。找一个。你可能会咬到它。丁香是香料贸易的遗迹。它连接着哪些领土？
    follow_ups:
      - 完整的丁香与磨碎的有什么不同？
      - 没有丁香，这道菜会是怎样？
      - 丁香与殖民主义之间是什么关系？
  - id: ind_family_style
    name: 家庭式
    prompt: |
      食物被盛在碗里放在桌上。每个人都从碗里取食。这顿饭是一个共同的项目。观察谁取了什么，谁等待，谁服务。餐桌上的经济运行是怎样的？
    follow_ups:
      - 如果是分餐制，这顿饭会是怎样？
      - 分享如何编码价值观？
      - 风格与家庭之间是什么关系？
  - id: ind_asafoetida_whiff
    name: 阿魏（Asafoetida）的香气
    prompt: |
      阿魏（Hing）——生吃味道刺鼻，煮熟后却神奇。一小撮就能改变豆汤、蔬菜。这是秘密。注意你什么时候闻到它。这香气增加了什么？
    follow_ups:
      - 阿魏如何标记厨师的手艺？
      - 没有它，这道菜会是怎样？
      - 香气与转变之间是什么关系？
  - id: ind_gulab_jamun_weight
    name: 古拉卜·贾蒙（Gulab Jamun）的重量
    prompt: |
      古拉卜·贾蒙很浓稠——油炸的奶制品，浸泡在糖浆里。感受它在舌尖的重量。甜腻，厚重，收尾。甜点如何结束这顿饭？
    follow_ups:
      - 没有它，这顿饭会如何结束？
      - 重量如何创造结束感？
      - 甜点与饱足感之间是什么关系？
  - id: ind_temple_prasad
    name: 寺庙的普拉萨德（Prasad）
    prompt: |
      普拉萨德——受祝福的食物——在寺庙中分发。可能很简单：拉克杜（Laddu）、米饭。但它承载着另一层意义。带着那种意识去吃它。当食物被赠予时，会发生什么变化？
    follow_ups:
      - 普拉萨德与餐馆食物有何不同？
      - 祝福增加了什么？
      - 礼物与虔诚之间是什么关系？
  - id: ind_bone_suck
    name: 吮骨
    prompt: |
      一些印度菜——比如尼哈里（Nihari）、派亚（Paya）——鼓励吮吸骨头。在其他地方这可能不太礼貌。在这里却是期望的。骨髓，结缔组织。吮吸提取了什么？
    follow_ups:
      - 这种行为如何跨越礼仪？
      - 没有骨头，这道菜会失去什么？
      - 吮吸与屈服之间是什么关系？
  - id: ind_pressure_cooker_song
    name: 高压锅的歌声
    prompt: |
      高压锅发出哨声——一声，两声，三声。这是豆汤和米饭的背景音乐。那个声音意味着煮好了。没有它，厨房会是怎样？歌声如何塑造时间？
    follow_ups:
      - 哨声如何标志着煮好？
      - 如果用即时锅（Instant Pot），我们会失去什么？
      - 声音与安全之间是什么关系？
  - id: ind_curry_leaf_sizzle
    name: 咖喱叶的嘶嘶声
    prompt: |
      咖喱叶投入热油——南印度调味。它们会噼啪作响，释放香气。你不会吃它们；它们是为了增添风味。但它们在场。它们的出现增加了什么？
    follow_ups:
      - 没有咖喱叶，这道菜会是怎样？
      - 不可食用的东西如何承载风味？
      - 叶子与记忆之间是什么关系？
  - id: ind_mint_chutney_bright
    name: 薄荷酱的清新
    prompt: |
      薄荷酱非常清新——混合了香草、绿辣椒、酸橙。它能切断油腻，点亮盘子。注意它与其他塔利菜肴形成的绿色对比。绿色对构图有什么作用？
    follow_ups:
      - 没有薄荷酱，这顿饭会是怎样？
      - 清新如何打断叙事？
      - 清新与平衡之间是什么关系？
  - id: ind_wedding_feast
    name: 婚礼盛宴
    prompt: |
      印度婚礼的食物规模宏大——数百人，数千人用餐。自助餐，种类繁多，丰盛过剩。注意这种编排。规模如何改变这顿饭？庆祝与消费之间是什么关系？
    follow_ups:
      - 没有盛宴，婚礼会是怎样？
      - 丰盛如何编码好客？
      - 盛宴与地位之间是什么关系？
