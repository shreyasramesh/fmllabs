      ஒயின் ஊற்றப்படுகிறது — யார் ஊற்றுகிறார்கள்? எவ்வளவு? ஊற்றுதல் சமூக நடனம்.
      அசைவுகளைப் பாருங்கள். அவை என்ன சொல்கின்றன?
