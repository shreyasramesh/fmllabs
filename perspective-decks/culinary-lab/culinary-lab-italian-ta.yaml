  - id: it_plate_negative_space
    name: தட்டு எதிர்மறை இடம்
    prompt: |
      இத்தாலிய பிளேட்டிங்கில் பெரும்பாலும் இடம் விடப்படுகிறது — தட்டு நிரப்பப்படுவதில்லை.
      வெற்றிடத்தைக் கவனியுங்கள். அது எதைச் சுற்றியுள்ளது? அது எதை அனுமதிக்கிறது?
    follow_ups:
      - தட்டு முழுவதும் நிரம்பினால் உணவு எப்படி இருக்கும்?
      - எதிர்மறை இடம் எப்படி கண்ணை ஈர்க்கிறது?
