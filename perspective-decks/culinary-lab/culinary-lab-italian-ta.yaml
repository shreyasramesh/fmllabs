# Culinary Lab — இத்தாலியன் (Tamil)

id: culinary_lab_italian
name: Culinary Lab — இத்தாலியன்
description: 50 அட்டைகள், இத்தாலிய உணவை நீங்கள் அனுபவிக்கும் விதத்தை மாற்றியமைக்கும் — ஆலிவ் எண்ணெய் மற்றும் அமிலத்தின் வேதியியல் முதல் மேசையின் சமூக நடனம் மற்றும் ஒவ்வொரு பொருளின் தொல்லியல் வரை.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: தக்காளி மாற்றம்
    prompt: |
      ஒரு பச்சையான தக்காளி வெப்பம் மற்றும் நேரத்துடன் வேறொன்றாக மாறுகிறது. அந்தப் பயணத்தைக் கண்டறியுங்கள்.
      அமிலத்தன்மைக்கு என்ன நடக்கும்? அமைப்புக்கு? தக்காளி ஒரு பயணத்தைக் கொண்டுள்ளது.
    follow_ups:
      - சாஸ் சுவையை எப்படி மாற்றுகிறது?
      - மாற்றமின்றி என்ன இழக்கப்படும்?
      - பச்சை மற்றும் சமைத்தவைக்கு என்ன தொடர்பு?
  - id: it_bread_arrival
    name: ரொட்டி வருகை
    prompt: |
      சாப்பாட்டிற்கு முன் ரொட்டி வருகிறது — சில சமயங்களில் சூடாக, சில சமயங்களில் எண்ணெயுடன்.
      வரிசையைக் கவனியுங்கள். ரொட்டி ஒரு திறப்பு. யார் எப்போது சாப்பிட வேண்டும் என்று தீர்மானிப்பது?
    follow_ups:
      - ரொட்டி இல்லாமல் உணவு எப்படி இருக்கும்?
      - ரொட்டி எப்படி வேகத்தை அமைக்கிறது?
      - ரொட்டிக்கும் எதிர்பார்ப்புக்கும் என்ன தொடர்பு?
  - id: it_pasta_shape
    name: பாஸ்தா வடிவம்
    prompt: |
      ஒவ்வொரு பாஸ்தா வடிவமும் சாஸை வித்தியாசமாகத் தாங்கும் — விளிம்புகள், பள்ளங்கள், வளைவுகள்.
      ஒரு உணவைத் தேர்ந்தெடுத்து கேளுங்கள்: இந்த சாஸுக்கு ஏன் இந்த வடிவம்? வடிவம் ஒரு முடிவு.
    follow_ups:
      - வேறு வடிவத்துடன் என்ன மாறும்?
      - வடிவம் கடிக்கு எப்படி பாதிக்கிறது?
      - வடிவத்திற்கும் செயல்பாட்டிற்கும் என்ன தொடர்பு?
  - id: it_basil_fragrance
    name: துளசி வாசனை
    prompt: |
      துளசி வாய்க்கு முன் மூக்கைத் தாக்கும். கண்களை மூடி மூலிகையைக் கண்டறியுங்கள்.
      உணவில் அது எங்கே வாழ்கிறது? வாசனை ஒரு வரைபடம்.
    follow_ups:
      - வாசனை இல்லாமல் உணவு எப்படி இருக்கும்?
      - வாசனை எப்படி சுவைக்குத் தயார் செய்கிறது?
      - வாசனைக்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: it_olive_oil_pool
    name: ஆலிவ் எண்ணெய் குளம்
    prompt: |
      ஆலிவ் எண்ணெய் மேற்பரப்பில் குளமாகவோ அல்லது தட்டில் பளபளப்பாகவோ இருக்கும்.
      அது எப்படி நகர்கிறது என்று பாருங்கள். எண்ணெய் சுவையையும் கொழுப்பையும் கொண்டு செல்லும்.
      அது எதைப் பிணைக்கிறது?
    follow_ups:
      - எண்ணெய் இல்லாமல் உணவு எப்படி இருக்கும்?
      - எண்ணெய் வாயின் உணர்வை எப்படி மாற்றுகிறது?
      - எண்ணெய் மற்றும் வெப்பத்திற்கு என்ன தொடர்பு?
  - id: it_parmesan_shatter
    name: பர்மேசன் சிதறல்
    prompt: |
      புதிதாக துருவிய பர்மிஜியானோ ஒரு படிக நொறுக்கலைக் கொண்டுள்ளது. அதைக் கேளுங்கள்.
      சீஸ் சுவையுடன் கூடவே அமைப்பு. கடி எப்படி சுற்றியுள்ளது?
    follow_ups:
      - நொறுக்குதல் இல்லாமல் உணவு எப்படி இருக்கும்?
      - சீஸ் எப்படி சுவையை நிறைவு செய்கிறது?
      - சீஸ் மற்றும் உப்புக்கு என்ன தொடர்பு?
  - id: it_espresso_ritual
    name: எஸ்பிரெசோ சடங்கு
    prompt: |
      எஸ்பிரெசோ இறுதியில் வருகிறது — சிறிய கோப்பை, பால் இல்லை. சடங்கு முடிவைக் குறிக்கிறது.
      யார் நின்று குடிக்கிறார்கள்? யார் உட்காருகிறார்கள்? எஸ்பிரெசோ ஒரு நிறுத்தக்குறி.
    follow_ups:
      - எஸ்பிரெசோ இல்லாமல் உணவு எப்படி இருக்கும்?
      - சடங்கு எப்படி நேரத்தை வடிவமைக்கிறது?
      - காபிக்கும் முடிவிற்கும் என்ன தொடர்பு?
  - id: it_antipasti_sequence
    name: ஆண்டிபாஸ்டி வரிசை
    prompt: |
      ஆண்டிபாஸ்டிகள் முதலில் வருகின்றன — சிறிய தட்டுகள், பகிரப்பட்டவை அல்லது இல்லை.
      வரிசையைக் கவனியுங்கள். வரிசையின் தர்க்கம் என்ன? தொடக்கம் தொனியை அமைக்கிறது.
    follow_ups:
      - வரிசையை தலைகீழாக மாற்றினால் என்ன மாறும்?
      - வரிசை எப்படி பசியை உருவாக்குகிறது?
      - முதல் மற்றும் கடைசிக்கு என்ன தொடர்பு?
  - id: it_wine_pour
    name: ஒயின் ஊற்றுதல்
