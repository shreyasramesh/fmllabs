      ரிசொட்டோவுக்கு தொடர்ச்சியான கிளறுதல் தேவை. ஸ்டார்ச் மெதுவாக வெளியாகும்.
      கிண்ணத்தில் உள்ள உழைப்பைக் கவனியுங்கள். கிளறல் இல்லாமல் என்ன நடக்கும்?
