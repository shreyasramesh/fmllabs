# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 烹饪实验室 — 意大利 (Mandarin Chinese)

id: culinary_lab_italian
name: 烹饪实验室 — 意大利
description: 50 张卡片，颠覆您体验意大利美食的方式——从橄榄油和酸度的化学反应，到餐桌上的社交礼仪，再到每种食材的考古学。
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: 番茄的蜕变
    prompt: |
      生番茄经过加热和时间会变成其他东西。追踪这个过程。
      酸度会发生什么变化？结构呢？番茄承载着一段旅程。
    follow_ups:
      - 酱汁如何改变味觉？
      - 没有蜕变会失去什么？
      - 生与熟的关系是什么？
  - id: it_bread_arrival
    name: 面包上桌
    prompt: |
      餐前会上来面包——有时是温的，有时配上橄榄油。留意事物的顺序。
      面包是开胃。谁决定何时开始吃？
    follow_ups:
      - 没有面包，这顿饭会是什么样子？
      - 面包如何定下节奏？
      - 面包与期待的关系是什么？
  - id: it_pasta_shape
    name: 意面形状
    prompt: |
      每种意面形状承载酱汁的方式都不同——有纹路、有中空、有曲线。
      选择一道菜问：为什么这种酱汁配这种形状？形态是一种选择。
    follow_ups:
      - 换一种形状会改变什么？
      - 形状如何影响口感？
      - 形态与功能的关系是什么？
  - id: it_basil_fragrance
    name: 罗勒的香气
    prompt: |
      罗勒在入口前先触碰鼻腔。闭上眼睛，寻找香草。
      它在菜肴中占据何处？香气是一张地图。
    follow_ups:
      - 没有香味，这道菜会是什么样子？
      - 香气如何准备味蕾？
      - 香味与味道的关系是什么？
  - id: it_olive_oil_pool
    name: 橄榄油的凝集
    prompt: |
      橄榄油在表面凝集或为盘子增光。观察它的流动。
      油承载着风味和脂肪。它融合了什么？
    follow_ups:
      - 没有油，这道菜会是什么样子？
      - 油如何改变口感？
      - 油与热的关系是什么？
  - id: it_parmesan_shatter
    name: 帕玛森的酥脆
    prompt: |
      新鲜磨碎的帕玛森芝士有晶莹的酥脆声。仔细听。
      芝士既是质地也是味道。它如何为每一口画上句点？
    follow_ups:
      - 没有酥脆感，这道菜会是什么样子？
      - 芝士如何使味觉完整？
      - 芝士与咸的关系是什么？
  - id: it_espresso_ritual
    name: 浓缩咖啡的仪式
    prompt: |
      浓缩咖啡在最后上——小杯，无奶。这个仪式标志着结束。
      谁站着喝？谁坐着？浓缩咖啡是句点。
    follow_ups:
      - 没有浓缩咖啡，这顿饭会是什么样子？
      - 仪式如何塑造时间？
      - 咖啡与结束的关系是什么？
  - id: it_antipasti_sequence
    name: 开胃菜的顺序
    prompt: |
      开胃菜先上——小碟，可共享也可不共享。注意顺序。
      这个顺序的逻辑是什么？开端定下基调。
    follow_ups:
      - 如果顺序颠倒会改变什么？
      - 顺序如何激发食欲？
      - 开头与结尾的关系是什么？
  - id: it_wine_pour
    name: 倒酒
    prompt: |
      倒酒——谁倒？倒多少？倒酒是社交编排。观察手势。
      它们在说什么？
    follow_ups:
      - 没有酒，餐桌会是什么样子？
      - 倒酒如何营造仪式感？
      - 倒酒与节奏的关系是什么？
  - id: it_risotto_stir
    name: 意大利烩饭的搅拌
    prompt: |
      意大利烩饭需要不断搅拌。淀粉慢慢释放。
      考虑碗里的劳动。没有搅拌会怎样？
    follow_ups:
      - 没有奶油般顺滑，米饭会是什么样子？
      - 搅拌如何改变质地？
      - 劳动与结果的关系是什么？
  - id: it_porcini_earth
    name: 牛肝菌的泥土味
    prompt: |
      牛肝菌尝起来有森林地表的味道——鲜味、泥土味、腐殖质味。
      追溯菌菇的来源。它生长在哪里？在哪棵树下？
    follow_ups:
      - 没有泥土味，这道菜会是什么样子？
      - 起源如何塑造风味？
      - 菌菇与森林的关系是什么？
  - id: it_plate_negative_space
    name: 盘中的留白
    prompt: |
      意大利菜的摆盘常常留有空间——盘子不填满。考虑空白。
      它框定了什么？它允许了什么？
    follow_ups:
      - 如果盘子完全填满，这道菜看起来会怎样？
      - 留白如何聚焦视线？
      - 空与满的关系是什么？
  - id: it_garlic_sizzle
    name: 大蒜的嘶嘶声
    prompt: |
      大蒜接触热油——嘶嘶声是化学反应。听。闻。这一刻转瞬即逝。
      什么会烧焦？什么会丢失？
    follow_ups:
      - 没有嘶嘶声，这道菜会是什么样子？
      - 时间如何塑造风味？
      - 热量与香气之间的关系是什么？
  - id: it_crust_bubbles
    name: 面饼的泡沫
    prompt: |
      意式薄饼或披萨饼皮在烤箱中会产生气泡。每个气泡都是蒸汽的容器。
      考虑酥皮的结构。
    follow_ups:
      - 没有气泡，面包会是什么样子？
      - 酥皮如何吸收油和盐？
      - 空气与结构的关系是什么？
  - id: it_prosciutto_slice
    name: 帕尔马火腿的切片
    prompt: |
      帕尔马火腿切得非常薄——近乎半透明。刀工很重要。
      考虑这门手艺。厚切会怎样？
    follow_ups:
      - 没有薄片，这道意式风干火腿会是什么样子？
      - 厚度如何影响融化？
      - 切片与品尝的关系是什么？
  - id: it_balsamic_drop
    name: 香醋的滴落
    prompt: |
      陈年香醋以滴落的方式盛放——昂贵，珍贵。观察粘稠度。
      这一滴是浓缩。它添加了什么？
    follow_ups:
      - 没有酸味，这道菜会是什么样子？
      - 这一滴如何中和油腻？
      - 甜与酸的关系是什么？
  - id: it_gnocchi_pillow
    name: 团子的枕头般口感
    prompt: |
      团子应该轻盈——像枕头，而不是石头。感受质地。
      土豆和面粉的比例很微妙。是什么让它成功？
    follow_ups:
      - 如果太重，团子会是什么样子？
      - 质地如何定义这道菜？
      - 土豆与面粉的关系是什么？
  - id: it_salt_block
    name: 盐板
    prompt: |
      一些意大利厨房用盐板烧烤。考虑这种矿物质。
      盐从哪里来？它带来什么？
    follow_ups:
      - 没有盐，肉会是什么样子？
      - 盐板如何改变烹饪过程？
      - 盐与火的关系是什么？
  - id: it_cacio_e_pepe
    name: 奶酪胡椒意面
    prompt: |
      奶酪胡椒意面由奶酪、胡椒和意面水组成。三种食材。
      乳化是关键。是什么将它们结合在一起？又是什么让它失败？
    follow_ups:
      - 没有乳化，这道菜会是什么样子？
      - 意面水如何结合？
      - 简单与技巧的关系是什么？
  - id: it_cannoli_crunch
    name: 奶油卷的酥脆
    prompt: |
      奶油卷外壳酥脆；内馅顺滑。这种对比是故意的。
      考虑每一口的结构。
    follow_ups:
      - 没有对比，这份甜点会是什么样子？
      - 质地如何带来愉悦感？
      - 外壳与内馅的关系是什么？
  - id: it_risotto_clock
    name: 意大利烩饭的时间
    prompt: |
      意大利烩饭有一个最佳时机——弹牙，然后就过了。厨师在与时间赛跑。
      考虑精确度。多五分钟会怎样？
    follow_ups:
      - 如果煮过头，米饭会是什么样子？
      - 时间如何定义这道菜？
      - 时钟与技艺的关系是什么？
  - id: it_truffle_shave
    name: 松露刨片
    prompt: |
      松露在餐桌上刨片——仪式感，香气。松露是转瞬即逝的。
      它来自哪里？是什么动物找到的？
    follow_ups:
      - 没有仪式感，这道菜会是什么样子？
      - 刨片如何分配风味？
      - 仪式与稀有性的关系是什么？
  - id: it_spaghetti_twist
    name: 意大利面的卷转
    prompt: |
      意大利人用叉子卷意大利面——不带勺子。这种卷转是文化习惯。
      观察这个动作。它达到了什么目的？
    follow_ups:
      - 没有卷转，每一口会是什么样子？
      - 这个手势如何塑造这顿饭？
      - 餐具与传统的关联是什么？
  - id: it_caprese_layers
    name: 卡布里沙拉的层次
    prompt: |
      卡布里沙拉叠放番茄、马苏里拉奶酪和罗勒。层次简单。
      考虑颜色——红、白、绿。盘子像一面旗帜。
    follow_ups:
      - 没有这个顺序，这道菜会是什么样子？
      - 层次如何创造和谐？
      - 颜色与味道的关系是什么？
  - id: it_polenta_set
    name: 玉米糊的凝固
    prompt: |
      玉米糊冷却后会凝固——从软到硬。考虑温度。
      热的时候是什么样？冷的时候呢？质地是时间的功能。
    follow_ups:
      - 如果玉米糊从未冷却会是怎样？
      - 凝固如何改变这道菜？
      - 加热与结构的关系是什么？
  - id: it_amaro_finish
    name: 阿玛罗的收尾
    prompt: |
      阿玛罗结束一餐——苦，助消化。这种苦味是故意的。
      它对味蕾做了什么？对身体呢？
    follow_ups:
      - 没有阿玛罗，这顿饭会是什么样子？
      - 苦味如何重置舌头？
      - 苦与结束的关系是什么？
  - id: it_lardo_spread
    name: 意式肥猪肉酱的涂抹
    prompt: |
      意式肥猪肉酱是腌制猪脂肪——涂在面包上，融化。考虑脂肪。
      它来自哪里？它承载着什么？
    follow_ups:
      - 没有意式肥猪肉酱，面包会是什么样子？
      - 脂肪如何承载风味？
      - 脂肪与保存的关系是什么？
  - id: it_sardine_silver
    name: 沙丁鱼的银光
    prompt: |
      新鲜沙丁鱼闪闪发光——银色鱼皮，完整。鱼很小，油性。
      考虑鱼的尺寸。更大的鱼会改变什么？
    follow_ups:
      - 没有油脂，这道菜会是什么样子？
      - 尺寸如何影响烹饪？
      - 小与强烈的关系是什么？
  - id: it_burrata_break
    name: 布拉塔的破裂
    prompt: |
      布拉塔必须被切开——外层破裂，露出奶油。这一刻很具戏剧性。
      考虑对比。外壳，内液。
    follow_ups:
      - 没有破裂，这奶酪会是什么样子？
      - 破裂如何带来惊喜？
      - 结构与流动性之间的关系是什么？
  - id: it_osso_buco_marrow
    name: 炖牛膝骨的骨髓
    prompt: |
      炖牛膝骨的中心是骨髓——骨头里藏着宝藏。骨髓滑腻，浓郁。
      考虑如何取出。谁得到骨髓？
    follow_ups:
      - 没有骨头，这道菜会是什么样子？
      - 骨髓如何使炖肉完整？
      - 骨头与风味的关系是什么？
  - id: it_limoncello_shot
    name: 柠檬酒的烈酒杯
    prompt: |
      柠檬酒装在冰镇的杯子里——黄色，甜，烈。这杯酒是句点。
      柠檬来自哪里？它们承载着什么？
    follow_ups:
      - 没有柠檬酒，这顿饭会是什么样子？
      - 这杯酒如何标记结束？
      - 柠檬与地方的关系是什么？
  - id: it_sfogliatella_layers
    name: 千层酥的层次
    prompt: |
      千层酥有数百层薄如纸的酥皮——折叠，酥脆。
      考虑这门手艺。每一层都是一个决定。更少的层会怎样？
    follow_ups:
      - 没有这些层次，这份糕点会是什么样子？
      - 结构如何创造质地？
      - 技艺与酥脆的关系是什么？
  - id: it_saltimbocca_name
    name: 意式煎肉的名字
    prompt: |
      Saltimbocca 的意思是“入口即化”。名字许下了承诺。菜肴兑现了吗？
      考虑名字与体验之间的差距。
    follow_ups:
      - 没有名字，这道菜会是什么样子？
      - 命名如何塑造期望？
      - 词语与味道的关系是什么？
  - id: it_artichoke_prep
    name: 朝鲜蓟的准备
    prompt: |
      朝鲜蓟需要准备——去除花蕊，修剪尖刺。考虑浪费。
      什么被丢弃？什么被珍视？这种蔬菜是建筑。
    follow_ups:
      - 如果不加准备，朝鲜蓟会是什么样子？
      - 准备工作如何改变烹饪？
      - 努力与回报的关系是什么？
  - id: it_grappa_clear
    name: 格拉巴的清澈
    prompt: |
      格拉巴是清澈的——用葡萄渣蒸馏而成。这种烈酒承载着葡萄的灵魂。
      考虑这种转变。什么被留下了？
    follow_ups:
      - 没有格拉巴，这顿饭会是什么样子？
      - 蒸馏如何浓缩？
      - 葡萄与烈酒的关系是什么？
  - id: it_panzanella_soft
    name: 佛罗伦萨面包沙拉的软糯
    prompt: |
      佛罗伦萨面包沙拉使用隔夜面包——被番茄汁和醋软化。面包被复活了。
      考虑这种转变。新鲜面包会怎样？
    follow_ups:
      - 没有面包，这份沙拉会是什么样子？
      - 浸泡如何改变质地？
      - 陈旧与复活的关系是什么？
  - id: it_capers_brine
    name: 刺山柑的盐水
    prompt: |
      刺山柑是花蕾——腌制，咸。它们能增添风味。考虑盐水。
      盐来自哪里？腌制保存了什么？
    follow_ups:
      - 没有刺山柑，这道菜会是什么样子？
      - 盐水如何改变花蕾？
      - 保存与风味的关系是什么？
  - id: it_ravioli_seam
    name: 意式饺子的缝隙
    prompt: |
      意式饺子有缝隙——饺子皮被捏合的地方。缝隙可能会破裂。
      考虑手艺。是什么封住了馅料？
    follow_ups:
      - 没有缝隙，饺子会是什么样子？
      - 密封如何保护馅料？
      - 结构与惊喜的关系是什么？
  - id: it_negroni_orange
    name: 内格罗尼的橙子
    prompt: |
      内格罗尼搭配橙子——橙片或橙皮。柑橘漂浮着。
      考虑装饰。它添加了什么？何时能尝到？
    follow_ups:
      - 没有橙子，这款酒会是什么样子？
      - 装饰如何使平衡完整？
      - 苦味与柑橘的关系是什么？
  - id: it_focaccia_dimples
    name: 佛卡夏的凹痕
    prompt: |
      佛卡夏有凹痕——拇指印，充满油。凹痕能积聚油和盐。
      考虑表面。平顶会怎样？
    follow_ups:
      - 没有凹痕，面包会是什么样子？
      - 积聚的油如何产生风味？
      - 表面与调味的关系是什么？
  - id: it_arancini_crust
    name: 意式炸饭团的脆皮
    prompt: |
      意式炸饭团是炸米球——外脆内软。外皮包裹着爆炸性的美味。
      考虑这种对比。没有油炸会怎样？
    follow_ups:
      - 没有外皮，饭团会是什么样子？
      - 油炸如何产生包裹感？
      - 表面与内部的关系是什么？
  - id: it_pecorino_age
    name: 佩科里诺奶酪的陈年
    prompt: |
      佩科里诺奶酪根据陈年时间不同——新鲜、陈年。陈年会改变质地、口感、风味。
      考虑时间线。更陈年的奶酪会怎样？
    follow_ups:
      - 不同陈年时间，奶酪会是什么样子？
      - 陈年会如何浓缩风味？
      - 时间与味道的关系是什么？
  - id: it_crostini_support
    name: 烤面包片的支撑
    prompt: |
      烤面包片是容器——吐司承载顶部的配料。支撑很重要。
      太厚会压倒味道。太薄会断裂。考虑平衡。
    follow_ups:
      - 没有面包，顶部的配料会是什么样子？
      - 支撑如何塑造每一口？
      - 基底与构建的关系是什么？
  - id: it_ciabatta_holes
    name: 拖鞋面包的孔洞
    prompt: |
      拖鞋面包有不规则的孔洞——大，随意。孔洞能吸附酱汁。
      考虑面包的内部结构。紧实的内部结构会怎样？
    follow_ups:
      - 没有孔洞，面包会是什么样子？
      - 孔洞如何创造质地？
      - 结构与吸附的关系是什么？
  - id: it_zabaglione_foam
    name: 蛋黄酒的泡沫
    prompt: |
      蛋黄酒是鸡蛋和糖在热水中打发——轻盈，温热。泡沫很细腻。
      考虑这种转变。过度打发会怎样？
    follow_ups:
      - 没有泡沫，这份甜点会是什么样子？
      - 打发如何融入空气？
      - 热量与结构的关系是什么？
  - id: it_salt_crust_fish
    name: 盐焗鱼
    prompt: |
      鱼用盐焗外壳烹饪——盐形成外壳。鱼在里面蒸熟。
      考虑这个容器。盐带来了什么？
    follow_ups:
      - 没有外壳，鱼会是什么样子？
      - 盐如何保持水分？
      - 外壳与鱼肉的关系是什么？
  - id: it_panna_cotta_wobble
    name: 意式奶冻的晃动
    prompt: |
      意式奶冻应该晃动——几乎凝固。晃动是关键。
      考虑凝胶。更固定的凝固会怎样？
    follow_ups:
      - 没有晃动，这份甜点会是什么样子？
      - 质地如何带来愉悦感？
      - 凝固与丝滑的关系是什么？
  - id: it_sopressata_marbling
    name: 索普雷萨塔香肠的纹理
    prompt: |
      索普雷萨塔香肠有脂肪纹理——红色中夹杂白色。脂肪承载风味。
      考虑分布。瘦肉会怎样？
    follow_ups:
      - 没有脂肪，这香肠会是什么样子？
      - 纹理如何影响切片？
      - 脂肪与腌制的关系是什么？
  - id: it_affogato_melt
    name: 意式冰淇淋咖啡的融化
    prompt: |
      意式冰淇淋咖啡是冰淇淋浇上浓缩咖啡——热遇冷。观察融化。
      这种转变是即时的。考虑时间。
    follow_ups:
      - 没有融化，这份甜点会是什么样子？
      - 温度如何创造对比？
      - 冷与热的关系是什么？
  - id: it_breadcrumb_gold
    name: 面包屑的金色
    prompt: |
      意大利烹饪使用面包屑——烤至金黄，用于增添脆感。考虑其再利用。
      隔夜面包变成了质感。这道菜会缺少什么？
    follow_ups:
      - 没有面包屑，这道菜会是什么样子？
      - 烘烤如何增加脆度？
      - 陈旧与有用的关系是什么？
  - id: it_radicchio_bitter
    name: 菊苣的苦味
    prompt: |
      菊苣故意带有苦味——烤或生吃。这种苦味是一种选择。
      考虑味蕾。在浓郁的食物中，苦味有什么作用？
    follow_ups:
      - 没有苦味，这道菜会是什么样子？
      - 苦味如何中和脂肪？
      - 苦与平衡的关系是什么？
  - id: it_cacciucco_bowl
    name: 卡奇乌科海鲜汤的碗
    prompt: |
      卡奇乌科海鲜汤是鱼炖菜——多种鱼类，一锅炖。这个碗盛装着大海。
      考虑多样性。每种鱼贡献了什么？
    follow_ups:
      - 如果只有一种鱼，这炖菜会是什么样子？
      - 多样性如何创造深度？
      - 多与一的关系是什么？
  - id: it_panna_trace
    name: 奶油的痕迹
    prompt: |
      奶油会留下痕迹——在盘子上，在酱汁中。考虑粘稠度。
      奶油承载并包裹。没有它，这道菜会是怎样？
    follow_ups:
      - 没有奶油，酱汁会是什么样子？
      - 奶油如何改变口感？
      - 脂肪与丝滑的关系是什么？
  - id: it_orecchiette_cup
    name: 猫耳朵意面的杯状
    prompt: |
      猫耳朵意面的意思是“小耳朵”——它们能盛酱汁。这种形状很有用。
      考虑设计。扁平的意面会怎样？
    follow_ups:
      - 没有这个杯状，这道菜会是什么样子？
      - 这种形状如何盛放酱汁？
      - 形状与酱汁的关系是什么？
