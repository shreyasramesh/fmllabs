# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Culinary Lab — Italian (Japanese)

id: culinary_lab_italian
name: Culinary Lab — Italian
description: 50 cards to shift how you experience Italian food—from the chemistry of olive oil and acid to the social choreography of the table and the archaeology of each ingredient.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: トマトの変容
    prompt: |
      生のトマトは、熱と時間によって別のものに変わります。その軌跡をたどってください。
      酸味はどうなるか？ 構造はどうなるか？ トマトは旅を秘めています。
    follow_ups:
      - ソースはどのように味覚を変えるか？
      - 変容なしでは何が失われるか？
      - 生と火を通したものとの関係は何か？
  - id: it_bread_arrival
    name: パンの登場
    prompt: |
      食事の前にパンが運ばれてくる――温かいときもあれば、オイルが添えられるときもある。
      物事の順序に注意を払ってください。パンは始まりです。誰がいつ食べるかを決めるのか？
    follow_ups:
      - パンなしでは食事はどうなるか？
      - パンはどのようにペースを作るか？
      - パンと期待感との関係は何か？
  - id: it_pasta_shape
    name: パスタの形
    prompt: |
      パスタの形 each carries sauce differently—ridges, hollows, curves. Choose
      one dish and ask: why this shape for this sauce? The form is a decision.
    follow_ups:
      - 違う形だったら何が変わるか？
      - 形はどのように一口に影響するか？
      - 形と機能との関係は何か？
  - id: it_basil_fragrance
    name: バジルの香り
    prompt: |
      バジルは口に入る前に鼻に届く。目を閉じて、ハーブを探してください。
      料理のどこに存在するか？ 香りは地図です。
    follow_ups:
      - 匂いがなければ料理はどうなるか？
      - 香りはどのように味覚を準備するか？
      - 香りと味との関係は何か？
  - id: it_olive_oil_pool
    name: オリーブオイルのプール
    prompt: |
      オリーブオイルは表面にプールしたり、皿を覆ったりします。その動きを観察してください。
      オイルは風味と脂肪を運びます。それは何を結合するか？
    follow_ups:
      - オイルがなければ料理はどうなるか？
      - オイルはどのように口当たりを変えるか？
      - オイルと熱との関係は何か？
  - id: it_parmesan_shatter
    name: パルメザンの砕け方
    prompt: |
      挽きたてのパルミジャーノは、結晶のような歯ごたえがあります。それを耳を澄まして聞いてください。
      チーズは味覚と同じくらい食感も大切です。一口をどのように区切るか？
    follow_ups:
      - 歯ごたえがなければ料理はどうなるか？
      - チーズはどのように味覚を完成させるか？
      - チーズと塩との関係は何か？
  - id: it_espresso_ritual
    name: エスプレッソの儀式
    prompt: |
      エスプレッソは最後に運ばれてくる――小さなカップ、ミルクなし。その儀式は区切りをつけます。
      誰が立って飲むか？ 誰が座るか？ エスプレッソは句読点です。
    follow_ups:
      - エスプレッソなしでは食事はどうなるか？
      - 儀式はどのように時間を形作るか？
      - コーヒーと終わりとの関係は何か？
  - id: it_antipasti_sequence
    name: アンティパストの順序
    prompt: |
      アンティパストは最初に出てくる――小皿、シェアしたりしなかったり。順序に注意してください。
      その順序の論理は何か？ 始まりはトーンを設定します。
    follow_ups:
      - 順序を逆にしたら何が変わるか？
      - 順序はどのように食欲をそそるか？
      - 最初と最後との関係は何か？
  - id: it_wine_pour
    name: ワインの注ぎ方
    prompt: |
      ワインが注がれる――誰が注ぐか？ どれくらい？ その注ぎ方は社交的な振り付けです。
      そのジェスチャーを観察してください。それは何を語っているか？
    follow_ups:
      - ワインがなければテーブルはどうなるか？
      - 注ぎ方はどのように儀式を作るか？
      - 注ぎ方とペースとの関係は何か？
  - id: it_risotto_stir
    name: リゾットのかき混ぜ方
    prompt: |
      リゾットは絶えずかき混ぜる必要がある。デンプンがゆっくりと放出される。
      ボウルの中の労働を考えてください。かき混ぜないとどうなるか？
    follow_ups:
      - クリーミーさがなければ米はどうなるか？
      - かき混ぜることはどのように食感を変えるか？
      - 労働と結果との関係は何か？
  - id: it_porcini_earth
    name: ポルチーニの土っぽさ
    prompt: |
      ポルチーニは森の地面の味――うま味、土、腐葉土。キノコをたどってください。
      どこで育ったのか？ どの木の下で？
    follow_ups:
      - 土っぽさがなければ料理はどうなるか？
      - 産地はどのように風味を形作るか？
      - キノコと森との関係は何か？
  - id: it_plate_negative_space
    name: 皿の余白
    prompt: |
      イタリア料理の盛り付けでは、しばしば余白が残される――皿は満たされていない。
      その空虚さを考えてください。それは何を縁取るか？ それは何を可能にするか？
    follow_ups:
      - 皿が完全に覆われていたら料理はどう見えるか？
      - 余白はどのように目を集中させるか？
      - 空と満たすこととの関係は何か？
  - id: it_garlic_sizzle
    name: ニンニクのジュージュー音
    prompt: |
      ニンニクが熱い油に当たる――そのジュージュー音は化学反応だ。聞いてください。嗅いでください。
      その瞬間は儚い。何が焦げるか？ 何が失われるか？
    follow_ups:
      - ジュージュー音なしでは料理はどうなるか？
      - タイミングはどのように風味を形作るか？
      - 熱と香りと関係は何か？
  - id: it_crust_bubbles
    name: クラストの気泡
    prompt: |
      フォカッチャやピザのクラストは、オーブンの中で気泡ができます。それぞれの気泡は水蒸気のポケットです。
      クラムの構造を考えてください。
    follow_ups:
      - 気泡がなければパンはどうなるか？
      - クラムはどのようにオイルと塩を保持するか？
      - 空気と構造との関係は何か？
  - id: it_prosciutto_slice
    name: プロシュートの薄切り
    prompt: |
      プロシュートは薄くスライスされている――ほとんど半透明。ナイフが重要です。
      その職人技を考えてください。厚切りにしたらどうなるか？
    follow_ups:
      - 薄切りでなければ生ハムはどうなるか？
      - 厚さはどのように溶け方に影響するか？
      - スライスと味わいとの関係は何か？
  - id: it_balsamic_drop
    name: バルサミコ酢の滴
    prompt: |
      熟成バルサミコ酢は滴で提供される――高価で貴重。その粘度を観察してください。
      その滴は濃縮です。それは何を追加するか？
    follow_ups:
      - 酸がなければ料理はどうなるか？
      - 滴はどのように脂を切るか？
      - 甘味と酸味との関係は何か？
  - id: it_gnocchi_pillow
    name: ニョッキの枕
    prompt: |
      ニョッキは軽くなければならない――石ではなく、枕のように。その食感を味わってください。
      ジャガイモと小麦粉の比率は繊細です。何がそれをうまく機能させるか？
    follow_ups:
      - 重すぎたらニョッキはどうなるか？
      - 食感はどのように料理を定義するか？
      - ジャガイモと小麦粉との関係は何か？
  - id: it_salt_block
    name: 岩塩ブロック
    prompt: |
      一部のイタリアのキッチンでは、グリルに岩塩ブロックを使用します。そのミネラルを考えてください。
      その塩はどこから来たのか？ それは何を伝えるか？
    follow_ups:
      - 塩がなければ肉はどうなるか？
      - ブロックはどのように調理を変えるか？
      - 塩と炎との関係は何か？
  - id: it_cacio_e_pepe
    name: カチョ・エ・ペペ
    prompt: |
      カチョ・エ・ペペはチーズ、コショウ、パスタの茹で汁。3つの材料。
      乳化が鍵です。何がそれをまとめているのか？ 何がそれを壊すのか？
    follow_ups:
      - 乳化がなければ料理はどうなるか？
      - パスタの茹で汁はどのように結合するか？
      - シンプルさと技術との関係は何か？
  - id: it_cannoli_crunch
    name: カンノーリのカリカリ感
    prompt: |
      カンノーリの皮は砕け、フィリングは滑らか。その対比は意図的です。
      一口の構造を考えてください。
    follow_ups:
      - 対比がなければデザートはどうなるか？
      - 食感はどのように喜びを生み出すか？
      - 皮とフィリングとの関係は何か？
  - id: it_risotto_clock
    name: リゾットの時計
    prompt: |
      リゾットには「アルデンテ」という時期がある――それから失われていく。調理人は時間と競争しています。
      その正確さを考えてください。5分追加したらどうなるか？
    follow_ups:
      - 茹ですぎたら米はどうなるか？
      - タイミングはどのように料理を定義するか？
      - 時計と職人技との関係は何か？
  - id: it_truffle_shave
    name: トリュフの削り方
    prompt: |
      トリュフはテーブルで削られる――その儀式、その香り。トリュフは儚い。
      どこから来たのか？ どの動物が見つけたのか？
    follow_ups:
      - 儀式がなければ料理はどうなるか？
      - 削ることはどのように風味を分配するか？
      - 儀式と希少性との関係は何か？
  - id: it_spaghetti_twist
    name: スパゲッティの巻き方
    prompt: |
      イタリア人はスプーンなしでフォークでスパゲッティを巻く。その巻き方は文化的だ。
      その動きを観察してください。それは何を達成するか？
    follow_ups:
      - 巻くことがなければ一口はどうなるか？
      - ジェスチャーはどのように食事を形作るか？
      - 道具と伝統との関係は何か？
  - id: it_caprese_layers
    name: カプレーゼの層
    prompt: |
      カプレーゼはトマト、モッツァレラ、バジルを重ねる。その層はシンプルだ。
      その色――赤、白、緑――を考えてください。皿は旗です。
    follow_ups:
      - 順序がなければ料理はどうなるか？
      - 層はどのように調和を生み出すか？
      - 色と味との関係は何か？
  - id: it_polenta_set
    name: ポレンタの固まり方
    prompt: |
      ポレンタは冷めると固まる――柔らかいものからしっかりしたものへ。その温度を考えてください。
      熱いときはどうなるか？ 冷たいときは？ その食感は時間の関数です。
    follow_ups:
      - 全く冷まさなかったらポレンタはどうなるか？
      - 固まることはどのように料理を変えるか？
      - 熱と構造との関係は何か？
  - id: it_amaro_finish
    name: アマーロの締めくくり
    prompt: |
      アマーロは食事を締めくくる――苦く、消化を助ける。その苦味は意図的だ。
      それは味覚に何をするか？ 体に何をするか？
    follow_ups:
      - アマーロなしでは食事はどうなるか？
      - 苦味はどのように舌をリセットするか？
      - 苦味と締めくくりとの関係は何か？
  - id: it_lardo_spread
    name: ラードの塗り方
    prompt: |
      ラードは豚の脂身の塩漬け――パンに塗って溶かす。その脂身を考えてください。
      どこから来たのか？ それは何を運ぶのか？
    follow_ups:
      - ラードがなければパンはどうなるか？
      - 脂身はどのように風味を運ぶか？
      - 脂身と保存との関係は何か？
  - id: it_sardine_silver
    name: イワシの銀色
    prompt: |
      新鮮なイワシは輝いている――銀色の皮、丸ごと。魚は小さく、油っぽい。
      そのスケールを考えてください。大きな魚だったら何が変わるか？
    follow_ups:
      - 油がなければ料理はどうなるか？
      - サイズはどのように調理に影響するか？
      - 小ささと強烈さとの関係は何か？
  - id: it_burrata_break
    name: ブッラータの割れ方
    prompt: |
      ブッラータは割らなければならない――外側がクリームに道を譲る。その瞬間は演劇的だ。
      その対比を考えてください。外側の殻、内側の液体。
    follow_ups:
      - 割らなければチーズはどうなるか？
      - 破裂はどのように驚きを生み出すか？
      - 構造と流れとの関係は何か？
  - id: it_osso_buco_marrow
    name: オッソブーコの骨髄
    prompt: |
      オッソブーコは骨髄が中心――骨が宝を抱いている。骨髄は滑らかで、濃厚だ。
      その抽出を考えてください。誰が骨髄を得るのか？
    follow_ups:
      - 骨がなければ料理はどうなるか？
      - 骨髄はどのように煮込みを完成させるか？
      - 骨と風味との関係は何か？
  - id: it_limoncello_shot
    name: リモンチェッロのショット
    prompt: |
      リモンチェッロは冷えたグラスで運ばれてくる――黄色く、甘く、強い。そのショットは句読点だ。
      レモンはどこから来たのか？ それは何を運んでいるのか？
    follow_ups:
      - リモンチェッロなしでは食事はどうなるか？
      - ショットはどのように終わりを印付けるか？
      - レモンと場所との関係は何か？
  - id: it_sfogliatella_layers
    name: スフォリアテッラの層
    prompt: |
      スフォリアテッラは数百もの紙のように薄い層――折りたたまれ、パリパリしている。
      その労働を考えてください。それぞれの層は決断です。少ない層だったらどうなるか？
    follow_ups:
      - 層がなければペストリーはどうなるか？
      - 構造はどのように食感を作り出すか？
      - 工芸とカリカリ感との関係は何か？
  - id: it_saltimbocca_name
    name: サルティンボッカの名前
    prompt: |
      サルティンボッカは「口に飛び込む」という意味。その名前は約束する。料理はそれを満たすか？
      名前と経験とのギャップを考えてください。
    follow_ups:
      - 名前がなければ料理はどうなるか？
      - 名前はどのように期待を形作るか？
      - 言葉と味との関係は何か？
  - id: it_artichoke_prep
    name: アーティチョークの下準備
    prompt: |
      アーティチョークは下準備が必要――芯を取り除き、トゲをトリミングする。その無駄を考えてください。
      何が捨てられ、何が大切にされるか？ その野菜は建築物です。
    follow_ups:
      - 下準備がされていなかったらアーティチョークはどうなるか？
      - 下準備はどのように調理を変えるか？
      - 努力と報酬との関係は何か？
  - id: it_grappa_clear
    name: グラッパの透明さ
    prompt: |
      グラッパは透明――搾りかすから蒸留される。そのスピリッツはブドウの幽霊を運ぶ。
      その変容を考えてください。何が残されるか？
    follow_ups:
      - グラッパなしでは食事はどうなるか？
      - 蒸留はどのように濃縮するか？
      - ブドウとスピリッツとの関係は何か？
  - id: it_panzanella_soft
    name: パンザネッラの柔らかさ
    prompt: |
      パンザネッラは古くなったパンを使う――トマトジュースと酢で柔らかくする。そのパンは蘇る。
      その変容を考えてください。新鮮なパンだったらどうなるか？
    follow_ups:
      - パンがなければサラダはどうなるか？
      - 浸すことはどのように食感を変えるか？
      - 古くなったものと復活したものとの関係は何か？
  - id: it_capers_brine
    name: ケイパーの塩水
    prompt: |
      ケッパーはつぼみ――ピクルスにされ、塩辛い。それらはアクセントになる。
      その塩水を考えてください。塩はどこから来たのか？ ピクルスは何を保存するか？
    follow_ups:
      - ケッパーがなければ料理はどうなるか？
      - 塩水はどのようにつぼみを変えるか？
      - 保存と風味との関係は何か？
  - id: it_ravioli_seam
    name: ラビオリの縁
    prompt: |
      ラビオリには縁がある――パスタが閉じられている場所。その縁は破れることがある。
      その職人技を考えてください。何がフィリングを保持するか？
    follow_ups:
      - 縁がなければラビオリはどうなるか？
      - 封はどのようにフィリングを保護するか？
      - 構造と驚きとの関係は何か？
  - id: it_negroni_orange
    name: ネグローニのオレンジ
    prompt: |
      ネグローニはオレンジと共に提供される――スライスまたは皮。その柑橘類は浮かんでいる。
      その飾りを考えてください。それは何を追加するか？ いつそれを味わうか？
    follow_ups:
      - オレンジがなければ飲み物はどうなるか？
      - 飾りはどのようにバランスを完成させるか？
      - 苦味と柑橘類との関係は何か？
  - id: it_focaccia_dimples
    name: フォカッチャのくぼみ
    prompt: |
      フォカッチャにはくぼみがある――指の跡、油で満たされている。そのくぼみはプールと塩を保持する。
      その表面を考えてください。平らなトップだったらどうなるか？
    follow_ups:
      - くぼみがなければパンはどうなるか？
      - プールはどのように風味を作り出すか？
      - 表面と味付けとの関係は何か？
  - id: it_arancini_crust
    name: アランチーニの衣
    prompt: |
      アランチーニは揚げた米のボール――外はカリカリ、中は溶けている。その衣は爆発を封じ込める。
      その対比を考えてください。揚げなければどうなるか？
    follow_ups:
      - 衣がなければボールはどうなるか？
      - 揚げ物はどのように封じ込めを作り出すか？
      - 表面と内部との関係は何か？
  - id: it_pecorino_age
    name: ペコリーノの熟成
    prompt: |
      ペコリーノは熟成度によって異なる――フレスコ、スタジョナート。熟成は食感、風味、味を変える。
      そのタイムラインを考えてください。古いチーズだったらどうなるか？
    follow_ups:
      - 異なる熟成度だったらチーズはどうなるか？
      - 熟成はどのように濃縮するか？
      - 時間と味との関係は何か？
  - id: it_crostini_support
    name: クロスティーニの土台
    prompt: |
      クロスティーニは器――トーストがトッピングを支える。その土台が重要だ。厚すぎると圧倒し、薄すぎると壊れる。
      そのバランスを考えてください。
    follow_ups:
      - パンがなければトッピングはどうなるか？
