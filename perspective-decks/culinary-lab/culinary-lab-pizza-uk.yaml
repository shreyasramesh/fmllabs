# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулінарна лабораторія — Піца (Ukrainian)

id: culinary_lab_pizza
name: Кулінарна лабораторія — Піца
description: 50 карток, щоб змінити ваш досвід споживання піци — від хімії тіста та вогню до театральності скибки та археології начинок.
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: Розтягування тіста
    prompt: |
      Спостерігайте, як розтягується тісто — руками або пресом. Сітка глютену
      розтягується, захоплюючи повітря. Форма обирається. Що б означала
      квадратна скибка інакше, ніж трикутна?
    follow_ups:
      - Як розтягування визначає досвід?
      - Що б було з піцою без розтягування?
      - Який зв'язок між рукою та формою?
  - id: piz_oven_breath
    name: Подих печі
    prompt: |
      Пічна піч дихає — дровами, газом чи електрикою. Купол тримає тепло.
      Підлога передає його. Станьте поруч. Чого вимагає піч від кухаря? Від
      тіста?
    follow_ups:
      - Що б було з піцою без печі?
      - Як тепло формує скоринку?
      - Який зв'язок між подихом та пухирями?
  - id: piz_sauce_spiral
    name: Спіраль соусу
    prompt: |
      Соус часто наносять спірально — не розмазуючи від краю до краю.
      Вивчіть візерунок. Що покрито? Що оголено? Спіраль — це композиція.
    follow_ups:
      - Як би виглядала піца з повністю покритим соусом?
      - Як спіраль впливає на кожен шматок?
      - Який зв'язок між візерунком та смаком?
  - id: piz_cheese_melt
    name: Розплавлення сиру
    prompt: |
      Сири плавляться з різною швидкістю. Моцарела тягнеться; витримані сири
      виділяють олію. Спостерігайте за розплавленням. Хімія жиру та білка,
      тепла та часу. Коли це готово?
    follow_ups:
      - Що б було зі скибкою без тягучості?
      - Як розплавлення формує шматок?
      - Який зв'язок між розплавленням та пам'яттю?
  - id: piz_crust_char
    name: Обвуглення скоринки
    prompt: |
      Леопардовий візерунок — плями обвуглення на скоринці — ознака піци,
      спеченої на дровах. Кожна пляма — це момент контакту з екстремальним
      теплом. Розгляньте смак, який додають ці плями. Що б означала бліда
      скоринка?
    follow_ups:
      - Як обвуглення змінює досвід?
      - Що б було з піцою без нього?
      - Який зв'язок між обвугленням та майстерністю?
  - id: piz_slice_fold
    name: Складання скибки
    prompt: |
      У нью-йоркському стилі: складіть скибку. Згин є структурним — він
      утримує начинку, направляє жир. Згин — це хореографія. Що він дозволяє?
    follow_ups:
      - Що б було з їжею без згину?
      - Як згин формує шматок?
      - Який зв'язок між згином та місцем?
  - id: piz_pepperoni_cup
    name: Чашка пепероні
    prompt: |
      Гарні пепероні утворюють "чашечки" — краї хрусткі, центр збирає олію.
      Це трансформація форми та текстури. Зверніть увагу, коли це відбувається.
      Що створило чашку?
    follow_ups:
      - Що б було з пепероні без чашки?
      - Як чашка утримує смак?
      - Який зв'язок між жиром та формою?
  - id: piz_basil_finish
    name: Базиліковий штрих
    prompt: |
      Базилік на піці часто додають після випікання — свіжий, яскравий. Це
      завершальний штрих, а не основа. Зверніть увагу на контраст. Що додає
      свіжість до приготованого?
    follow_ups:
      - Що б було з піцою без базиліку?
      - Як час формує траву?
      - Який зв'язок між сирим та приготованим?
  - id: piz_margherita_minimal
    name: Маргарита мінімалістська
    prompt: |
      Маргарита — це три компоненти: тісто, томат, сир. Кожен має бути
      ідеальним. Немає куди сховатися. Розгляньте дисципліну. Чого вимагає
      мінімалізм?
    follow_ups:
      - Що б сталося з однією неправильною нотою?
      - Як простота фокусує смак?
      - Який зв'язок між малим і великим?
  - id: piz_pool_table
    name: Стіл для пулу
    prompt: |
      Деякі піцерії мають довгий спільний стіл — незнайомі люди ділять
      простір. Привозять піцу. Стіл — це сцена. Хто їсть поруч із вами? Який
      невисловлений договір?
    follow_ups:
      - Що б означала їжа в кабінці?
      - Як стіл формує зустріч?
      - Який зв'язок між спільним та приватним?
  - id: piz_box_flip
    name: Перевертання коробки
    prompt: |
      Коробка для піци — картон, іноді з пластиковим трикутником посередині.
      Вона призначена для вентиляції, для штабелювання. Коробка — це
      інфраструктура. Що б було з їжею на виніс без неї?
    follow_ups:
      - Як коробка формує подорож додому?
      - Що відбувається, коли коробка відкривається?
      - Який зв'язок між коробкою та ритуалом?
  - id: piz_dough_ferment
    name: Ферментація тіста
    prompt: |
      Тісто для піци ферментується — години або дні. Дріжджі створюють
      бульбашки, смак. Старе тісто має кислинку. Розгляньте час у кожному
      шматку. Чим би пожертвувало тісто швидкого підйому?
    follow_ups:
      - Як ферментація формує скоринку?
      - Який зв'язок між часом і смаком?
      - Що б означало тісто одного дня?
  - id: piz_cornicione
    name: Корнічоне
    prompt: |
      Корнічоне — край, скоринка — часто найкраща частина. Повітряна,
      з пухирями, можливо, трохи жувальна. Дехто залишає її; дехто їсть
      першою. Які ваші стосунки з краєм?
    follow_ups:
      - Що б було з піцою без корнічоне?
      - Як край обрамляє центр?
      - Який зв'язок між скоринкою та центром?
  - id: piz_olive_oil_drizzle
    name: Бризок оливкової олії
    prompt: |
      Оливкова олія, бризнута після випікання — на скоринку або на всю піцу.
      Вона блищить. Олія несе смак, додає насиченості. Зверніть увагу, коли
      її додають. Що додає бризок?
    follow_ups:
      - Що б було з піцою без нього?
      - Як олія змінює шматок?
      - Який зв'язок між жиром та фінішем?
  - id: piz_anchovy_salt
    name: Анчоусна сіль
    prompt: |
      Анчоуси на піці — солоні, умамі, розділяючі. Вони розчиняються в соусі
      або лежать зверху. Анчоус — це археологія: середземноморський,
      консервований, давній. Яку подорож він здійснив?
    follow_ups:
      - Що б було зі скибкою без анчоусів?
      - Як сіль формує інші смаки?
      - Який зв'язок між консервованим та свіжим?
  - id: piz_sound_crunch
    name: Звук хрускоту
    prompt: |
      Перший шматок добре приготованої скоринки — хрускіт, пружність.
      Заплющте очі. Звук — частина досвіду. Що б було з піцою, якби вона
      була беззвучною?
    follow_ups:
      - Як звук формує задоволення?
      - Як звучить мокра скоринка?
      - Який зв'язок між хрускотом та якістю?
  - id: piz_second_slice
    name: Друга скибка
    prompt: |
      Друга скибка відрізняється від першої — ви вже знаєте піцу. Смакові
      рецептори адаптувалися. Зверніть увагу на зміну. Чи смакує друга
      скибка так само? Краще? Інакше?
    follow_ups:
      - Як повторення змінює сприйняття?
      - Чого б бракувало страві з однієї скибки?
      - Який зв'язок між першим і другим?
  - id: piz_neapolitan_rules
    name: Правила Неаполітанської піци
    prompt: |
      Справжня неаполітанська піца має правила — розмір, інгредієнти, метод.
      Печатка VPN, сертифікат. Правила створюють ідентичність. Що захищають
      правила? Що вони виключають?
    follow_ups:
      - Що б було з піцою без правил?
      - Як сертифікація формує очікування?
      - Який зв'язок між правилом та майстерністю?
  - id: piz_detroit_edges
    name: Детройтські краї
    prompt: |
      Детройтський стиль — прямокутний, сир до країв, хрустка смажена скоринка
      там, де вона зустрічається з формою. Краї є навмисними. Розгляньте
      архітектуру. Що говорить форма?
    follow_ups:
      - Що б було з піцою без країв?
      - Як форма створює ідентичність?
      - Який зв'язок між формою та скоринкою?
  - id: piz_garlic_knot
    name: Часниковий вузлик
    prompt: |
      Часникові вузлики — вигини з тіста, змащені маслом, з часником. Часто
      приносяться першими. Вони не піца, але з того ж світу. Який зв'язок
      між вузликом та піцою?
    follow_ups:
      - Що б означала їжа без вузликів?
      - Як вузлик задає тон?
      - Який зв'язок між гарніром та основною стравою?
  - id: piz_red_pepper_flake
    name: Пластівці червоного перцю
    prompt: |
      Шейкер з пластівцями червоного перцю — часто на столі. Ви обираєте
      гостроту. Пластівці — це демократія. Кожен приправляє сам. Що означає
      цей вибір?
    follow_ups:
      - Що б було на столі без шейкера?
      - Як самоприправлення формує страву?
      - Який зв'язок між вибором і смаком?
  - id: piz_sicilian_slab
    name: Сицилійська плита
    prompt: |
      Сицилійська — товста, прямокутна, іноді догори дриґом (соус зверху).
      Плита має вагу. Архітектура інша. Що додає товщина? Чим вона жертвує?
    follow_ups:
      - Що б зробила тонка скоринка інакше?
      - Як товщина формує шматок?
      - Який зв'язок між плитою та скибкою?
  - id: piz_wood_stack
    name: Стопка дров
    prompt: |
      Піцерії на дровах складають колоди. Дуб, іноді. Дрова — це паливо та
      смак. Стопка — це підготовка. Розгляньте, що горить. Що додають дрова,
      чого не може газ?
    follow_ups:
      - Що б було з піцою без дров?
      - Як паливо формує скоринку?
      - Який зв'язок між вогнем та димом?
  - id: piz_topping_balance
    name: Баланс начинок
    prompt: |
      Начинки можуть перевантажити — занадто багато, і піца стає запіканкою.
      Баланс делікатний. Вивчіть піцу з великою кількістю начинок. Де вона
      перетинає межу? Що б ви прибрали?
    follow_ups:
      - Як стриманість формує піцу?
      - Який зв'язок між більше і менше?
      - Коли вибір стає хаосом?
  - id: piz_cold_leftover
    name: Холодні залишки
    prompt: |
      Холодна піца на сніданок — деякі клянуться нею. Смаки осіли. Текстура
      змінилася. Розгляньте піцу наступного дня. Що додає час? Що забирає?
    follow_ups:
      - Як холод змінює досвід?
      - Що б зробило розігрівання?
      - Який зв'язок між свіжим та залишками?
  - id: piz_sauce_sweet
    name: Солодкий соус
    prompt: |
      Томатний соус може бути солодким або яскравим, залежно від томата,
      кухаря. Скуштуйте соус окремо, якщо можете. Звідки береться солодкість?
      Що б зробила кислотність?
    follow_ups:
      - Як соус задає тон?
      - Який зв'язок між солодким і кислим?
      - Що б означав сирий томат?
  - id: piz_roman_taglio
    name: Римська "taglio" (на розріз)
    prompt: |
      Піца "al taglio" — продається на розріз, на вагу. Ви показуєте, вони
      ріжуть. Прямокутник, ціна за кілограм. Транзакція інша. Що означає
      купівля на вагу?
    follow_ups:
      - Як "taglio" формує досвід?
      - Що б означала ціла піца тут?
      - Який зв'язок між розрізом та вибором?
  - id: piz_hot_honey
    name: Гострий мед
    prompt: |
      Гострий мед на піці — нова традиція, тепер всюди. Солодкий, пряний,
      в'язкий. Це завершальний штрих. Зверніть увагу, коли його додають. Що
      мед робить з сиром?
    follow_ups:
      - Що б було зі скибкою без нього?
      - Як солодко-пряне формує шматок?
      - Який зв'язок між трендом та традицією?
  - id: piz_pecorino_grate
    name: Тертий пекоріно
    prompt: |
      Пекоріно, натертий поверх піци — солоний, гострий. Це шар. Сир зверху
      відрізняється від сиру, що розплавився. Розгляньте ієрархію. Що додає
      тертя?
    follow_ups:
      - Що б було з піцою без пекоріно?
      - Як другий сир формує страву?
      - Який зв'язок між плавленням та терням?
  - id: piz_paddle_slide
    name: Сковзання лопатою
    prompt: |
      Лопата, дошка — дерев'яна чи металева. Тісто ковзає на неї, потім у
      піч. Рух відточений. Спостерігайте за ним. Що могло б піти не так без
      цієї вправності?
    follow_ups:
      - Як лопата дозволяє випікання?
      - Який зв'язок між інструментом та результатом?
      - Що б означала впала піца?
  - id: piz_sourdough_crust
    name: Скоринка на заквасці
    prompt: |
      Скоринка піци на заквасці — тривала ферментація, кислинка. Скоринка має
      індивідуальність. Вона не нейтральна. Розгляньте, що додає закваска.
      Що б зробили комерційні дріжджі інакше?
    follow_ups:
      - Як закваска формує шматок?
      - Який зв'язок між ферментацією та смаком?
      - Що б означала більш прісна скоринка?
  - id: piz_white_pie
    name: Біла піца
    prompt: |
      Біла піца — без томатів. Оливкова олія, сир, можливо, часник. Відсутність
      червоного змінює все. Смакові рецептори очікують томата. Що пропонує
      натомість біла піца?
    follow_ups:
      - Що б було з піцою з томатом?
      - Як відсутність формує очікування?
      - Який зв'язок між червоним і білим?
  - id: piz_bar_setting
    name: Барна атмосфера
    prompt: |
      Піца в барі — ви їсте там, де замовляєте. Бар — це сцена. Ви спостерігаєте
      за піччю, за скибками. Атмосфера невимушена, миттєва. Що додає їжа в барі?
    follow_ups:
      - Що б змінив стіл?
      - Як близькість формує досвід?
      - Який зв'язок між баром та кухнею?
  - id: piz_truffle_trend
    name: Трюфельний тренд
    prompt: |
      Трюфель на піці — олія або стружка — став синонімом розкоші. Аромат
      домінує. Розгляньте тренд. Що додає трюфель? Що він маскує?
    follow_ups:
      - Що б було з піцою без трюфеля?
      - Як розкіш формує шматок?
      - Який зв'язок між трендом та смаком?
  - id: piz_ricotta_dollop
    name: Ложка рікоти
    prompt: |
      Рікота, додана ложками на піцу — прохолодна, кремова, контрастна. Вона
      не плавиться, як моцарела. Вона лежить. Зверніть увагу на різницю
      температур. Що додає ложка?
    follow_ups:
      - Що б було зі скибкою без рікоти?
      - Як холодне формує гаряче?
      - Який зв'язок між ложкою та плавленням?
  - id: piz_slice_count
    name: Кількість скибок
    prompt: |
      Скільки скибок? Часто вісім — або шість для меншої піци. Кількість
      визначає порцію, спільне споживання. Розгляньте математику. Що б
      означало чотири скибки? Дванадцять?
    follow_ups:
      - Як кількість скибок формує страву?
      - Який зв'язок між розрізом та спільним споживанням?
      - Коли кількість має значення?
  - id: piz_oven_window
    name: Вікно печі
    prompt: |
      У печі є вікно — або ні. Спостерігати, як печеться піца, — це театр.
      Сир пузириться. Скоринка піднімається. Яким би був досвід без
      цієї можливості спостерігати?
    follow_ups:
      - Як спостереження формує очікування?
      - Який зв'язок між видимим і прихованим?
      - Що ви дізнаєтеся через вікно?
  - id: piz_ranch_dip
    name: Соус "Ранч"
    prompt: |
      Соус "Ранч" до піци — американська традиція, часто до скоринки. Соус
      є необов'язковим, суперечливим. Розгляньте це доповнення. Що додає
      "Ранч"? Що він перекриває?
    follow_ups:
      - Що б було зі скоринкою без "Ранчу"?
      - Як соус формує шматок?
      - Який зв'язок між пуристом і практиком?
  - id: piz_capers_brine
    name: Розсіл з каперсів
    prompt: |
      Каперси на піці — солоні, різкі. Вони прорізають насиченість. Каперс
      мав подорож — Середземномор'я, маринований. Зверніть увагу, коли вони
      з'являються. Що додає розсіл?
    follow_ups:
      - Що б було зі скибкою без каперсів?
      - Як розсіл формує смак?
      - Який зв'язок між маринованим та свіжим?
  - id: piz_calzone_seam
    name: Шов кальцоне
    prompt: |
      Кальцоне — піца, складена, запечатана. Шов утримує начинку. Форма
      інша. Ви розрізаєте її. Виходить пара. Що додає складання? Що воно
      приховує?
    follow_ups:
      - Що б було з кальцоне розгорнутим?
      - Як шов створює несподіванку?
      - Який зв'язок між відкритим і закритим?
  - id: piz_mushroom_water
    name: Вода з грибів
    prompt: |
      Гриби на піці виділяють воду під час приготування. Добрий кухар знає,
      як попередньо приготувати або використовувати сухі сорти. Мокрі гриби
      роблять піцу водянистою. Розгляньте хімію. Що робить волога?
    follow_ups:
      - Як підготовка грибів формує скибку?
      - Який зв'язок між мокрим і хрустким?
      - Що б зробили сирі гриби?
  - id: piz_grease_absorb
    name: Поглинання жиру
    prompt: |
      Серветка на скибці — деякі промокають жир. Жир — це жир з сиру,
      пепероні. Промокнути чи ні? Розгляньте вибір. Що сприяє жир? Що
      прибирає промокання?
    follow_ups:
      - Як жир формує досвід?
      - Що б означала суха скибка?
      - Який зв'язок між жиром та смаком?
  - id: piz_oven_spring
    name: Випікання в печі
    prompt: |
      Випікання в печі — тісто пухне під високою температурою. Дріжджі
      працюють швидко. Структура застигає. Розгляньте момент. Що б сталося
      без достатнього тепла? Без правильного борошна?
    follow_ups:
      - Як випікання створює м'якуш?
      - Який зв'язок між теплом і підйомом?
      - Що б означала пласка скоринка?
  - id: piz_roma_tomato
    name: Томат Рома
    prompt: |
      Сан Марцано або Рома — томати мають значення. Вони з певного місця.
      Кампанія. DOP, терруар. Відстежте томат. Яку подорож він здійснив до
      вашої скибки?
    follow_ups:
      - Що б зробив інший томат?
      - Як походження формує соус?
      - Який зв'язок між місцем і смаком?
  - id: piz_pizza_napoli
    name: Піца Наполі
    prompt: |
      Неаполь її винайшов. Місто та їжа пов'язані. Їсти піцу в Неаполі —
      значить їсти її біля джерела. Розгляньте археологію. Що б означала
      та сама піца в іншому місці?
    follow_ups:
      - Як місце формує досвід?
      - Що б втратив переклад?
      - Який зв'язок між походженням та автентичністю?
  - id: piz_wine_pair
    name: Поєднання з вином
    prompt: |
      Піца та вино — пиво поширене, але вино теж підходить. Червоне, часто.
      Кислотність вина зустрічає кислотність томата. Розгляньте поєднання.
      Що вино додає до скибки?
    follow_ups:
      - Що б зробило пиво інакше?
      - Як напій формує страву?
      - Який зв'язок між келихом і тарілкою?
  - id: piz_pizza_party
    name: Піца-вечірка
    prompt: |
      Піца для натовпу — дні народження, футбольний матч, обід в офісі.
      Піца — це соціальне явище. Коробки стоять стопкою. Всі беруть скибку.
      Розгляньте хореографію. Як натовп змінює страву?
    follow_ups:
      - Що б означала піца на одну людину?
      - Як спільне споживання формує досвід?
      - Який зв'язок між піцою та зібранням?
