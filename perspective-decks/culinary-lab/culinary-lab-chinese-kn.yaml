# ಅಡುಗೆಮನೆ - ಚೀನೀಸ್ (Kannada)

id: culinary_lab_chinese
name: ಅಡುಗೆಮನೆ - ಚೀನೀಸ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ಚೀನೀಸ್ ಆಹಾರದ ನಿಮ್ಮ ಅನುಭವವನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ - ವೋಕ್ ಹೈಯ ರಸಾಯನಶಾಸ್ತ್ರದಿಂದ, ಸೋಯಾದ ಪುರಾತತ್ತ್ವ ಶಾಸ್ತ್ರದವರೆಗೆ, ದುಂಡು ಮೇಜಿನ ನೃತ್ಯದಿಂದ, ಭೋಜನದ ಕಥೆವರೆಗೆ.
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: ವೋಕ್ ಹೈ
    prompt: |
      ವೋಕ್ ಹೈ - ವೋಕ್‌ನ ಉಸಿರು - ಇದು ಅತಿಯಾದ ಶಾಖ ಮತ್ತು ವೇಗದಿಂದ ಬರುವ ಅಸಾಧಾರಣ ಹೊಗೆ. ಇದು ಸಂಪೂರ್ಣವಾಗಿ ಹೊಗೆಯಲ್ಲ; ಇದು ಪರಿವರ್ತನೆ.
      ಅದನ್ನು ಹಿಡಿಯಬಹುದೇ? ಅದು ಇಲ್ಲದೆ ಸ್ಟಿರ್-ಫ್ರೈ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಹೈ ಖಾದ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಏನು ಸೃಷ್ಟಿಸುತ್ತದೆ? ಯಾವುದು ಅದನ್ನು ನಾಶಪಡಿಸುತ್ತದೆ?
      - ಶಾಖ ಮತ್ತು ಅವಸರದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_round_table
    name: ದುಂಡು ಮೇಜು
    prompt: |
      ಚೀನೀಸ್ ಭೋಜನದ ಮೇಜು ದುಂಡಗಿದೆ - ಮಧ್ಯದಲ್ಲಿ ಲೇಜಿ ಸುಸಾನ್. ಆಹಾರ ತಿರುಗುತ್ತದೆ. ಎಲ್ಲರೂ ತಲುಪುತ್ತಾರೆ. ಮೇಜು ಒಂದು ನೃತ್ಯ. ಯಾರು ತಿರುಗಿಸುತ್ತಾರೆ? ಯಾರು ಕಾಯುತ್ತಾರೆ?
      ಅಸ್ಪಷ್ಟ ನಿಯಮಗಳೇನು?
    follow_ups:
      - ಆಯತಾಕಾರದ ಮೇಜು ಎಂದರೆ ಏನು?
      - ದುಂಡಾದ ಆಕಾರ ಊಟವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕೇಂದ್ರ ಮತ್ತು ಅಂಚಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_soy_archeology
    name: ಸೋಯಾ ಪುರಾತತ್ವ
    prompt: |
      ಸೋಯಾ ಸಾಸ್ - ಹುದುಗಿಸಿದ, ಹಳೆಯ, ಪ್ರಾದೇಶಿಕ. ತಿಳಿ, ಗಾಢ, ಅಣಬೆ, ಡಬಲ್-ಕಪ್ಪು.
      ಇದು ಎಲ್ಲೋಂದರಿಂದ ಬಂದಿದೆ. ಅದಕ್ಕೆ ಸಮಯ ಬೇಕಾಯಿತು. ಬಾಟಲಿಯ ಮೂಲವನ್ನು ಪತ್ತೆಹಚ್ಚಿ. ಅದು ಯಾವ ಪ್ರಯಾಣ ಮಾಡಿದೆ? ಕೈಗಾರಿಕಾ ಸೋಯಾ ಏನು ತ್ಯಾಗ ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಮೂಲವು ಸುರಿಯುವಿಕೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸೋಯಾ ಇಲ್ಲದ ಖಾದ್ಯ ಹೇಗಿರುತ್ತದೆ?
      - ಹುದುಗುವಿಕೆ ಮತ್ತು ಉಮಾಮಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_chopstick_grip
    name: ಚಾಪ್‌ಸ್ಟಿಕ್ ಹಿಡಿತ
    prompt: |
      ಚಾಪ್‌ಸ್ಟಿಕ್‌ಗಳು ಕೈಯ ವಿಸ್ತರಣೆ. ಅಕ್ಕಿ, ಜಾರುವ ನೂಡಲ್ಸ್, ಡುಂಪ್ಲಿಂಗ್ಸ್ - ಪ್ರತಿಯೊಂದಕ್ಕೂ ವಿಭಿನ್ನ ತಂತ್ರ ಬೇಕಾಗುತ್ತದೆ. ನಿಮ್ಮ ಹಿಡಿತವನ್ನು ಗಮನಿಸಿ. ಉಪಕರಣ ಏನು ಬೇಡುತ್ತದೆ?
      ಅದು ಏನು ಅನುಮತಿಸುತ್ತದೆ?
    follow_ups:
      - ಫೋರ್ಕ್ ಏನು ಬದಲಾಯಿಸುತ್ತದೆ?
      - ಸ್ಟಿಕ್ ಒಂದು ಕವಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಉಪಕರಣ ಮತ್ತು ವೇಗದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_dumpling_seam
    name: ಡುಂಪ್ಲಿಂಗ್ ಮಡಿಕೆ
    prompt: |
      ಡುಂಪ್ಲಿಂಗ್ ಮಡಿಕೆಗಳು - ಮಡಚುವಿಕೆ, ಮುಚ್ಚುವಿಕೆ. ಜಿಯೋಜಿ, ಷುಮೈ, ಕ್ಸಿಯಾವೊಲಾಂಗ್ಬಾವೊ - ಪ್ರತಿಯೊಂದೂ ತನ್ನದೇ ಆದ ಆಕಾರವನ್ನು ಹೊಂದಿದೆ. ಮಡಿಕೆಯು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ ಅಥವಾ ಬಿಡುಗಡೆ ಮಾಡುತ್ತದೆ. ಒಂದನ್ನು ಅಧ್ಯಯನ ಮಾಡಿ. ಒಡೆದರೆ ಏನು ಅರ್ಥ?
      ಮಡಿಕೆಯು ಏನು ರಕ್ಷಿಸುತ್ತದೆ?
    follow_ups:
      - ಮಡಿಕೆಯು ಒಳಭಾಗವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತೆರೆದ ಡುಂಪ್ಲಿಂಗ್ ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಮುದ್ರೆ ಮತ್ತು ಸೂಪ್ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_tea_pour
    name: ಚಹಾ ಸುರಿಯುವಿಕೆ
    prompt: |
      ಚೀನೀಸ್ ಚಹಾ - ಸುರಿಯಲಾಗುತ್ತದೆ, ಮರು நிரப்பப்படுகிறது, ಹಂಚಿಕೊಳ್ಳಲಾಗುತ್ತದೆ. ಮಡಕೆ ಸುತ್ತುತ್ತದೆ. ಖಾಲಿ ಕಪ್‌ಗಳನ್ನು ಕೇಳುವ ಮೊದಲು ತುಂಬಲಾಗುತ್ತದೆ. ಸುರಿಯುವಿಕೆಯು ಸೇವೆ ಮತ್ತು ಕಾಳಜಿ. ಲಯವನ್ನು ಗಮನಿಸಿ.
      ಚಹಾ ಇಲ್ಲದೆ ಊಟ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಚಹಾವು ವೇಗವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸುರಿಯುವಿಕೆಯು ಏನು ತಿಳಿಸುತ್ತದೆ?
      - ಕಪ್ ಮತ್ತು ಮೇಜಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_bone_plate
    name: ಎಲುಬು ತಟ್ಟೆ
    prompt: |
      ಎಲುಬುಗಳಿಗಾಗಿ ಒಂದು ಸಣ್ಣ ತಟ್ಟೆ - ತ್ಯಜಿಸಿದ ಚಿಪ್ಪುಗಳು, ಕೋಳಿ ಎಲುಬುಗಳು, ಸೀಗಡಿ ಸಿಪ್ಪೆಗಳು.
      ತಟ್ಟೆಯು ತಿನ್ನಲಾಗದದನ್ನು ಸಂಗ್ರಹಿಸುತ್ತದೆ. ಇದು ಸೆಟ್ಟಿಂಗ್‌ನ ಭಾಗವಾಗಿದೆ. ಎಲುಬು ತಟ್ಟೆಯು ಏನು ಅನುಮತಿಸುತ್ತದೆ? ಅದು ಇಲ್ಲದಿದ್ದರೆ ಏನಾಗುತ್ತದೆ?
    follow_ups:
      - ತಟ್ಟೆಯು ಊಟವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತಟ್ಟೆ ಇಲ್ಲದಿದ್ದರೆ ಮೇಜು ಹೇಗಿರುತ್ತದೆ?
      - ತ್ಯಜಿಸುವಿಕೆ ಮತ್ತು ಗೌರವದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_soup_spoon
    name: ಸೂಪ್ ಚಮಚ
    prompt: |
      ಚೀನೀಸ್ ಸೂಪ್ ಚಮಚ - ಅಗಲ, ಆಳವಿಲ್ಲದ, ಪಿಂಗಾಣಿ. ಇದು ಸಾರು ಮತ್ತು ಘನವನ್ನು ಹಿಡಿದಿಡುತ್ತದೆ.
      ಚಮಚವು ಬಾಯಿಗೆ ವಿಭಿನ್ನವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತದೆ. ಕವಳವನ್ನು ಗಮನಿಸಿ. ಆಕಾರವು ಏನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ದುಂಡಾದ ಚಮಚ ಏನು ಬದಲಾಯಿಸುತ್ತದೆ?
      - ಚಮಚವು ಕವಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ರೂಪ ಮತ್ತು ಕಾರ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_steam_basket
    name: ಆವಿ ಬುಟ್ಟಿ
    prompt: |
      ಡಿಮ್ ಸಮ್ ಬಿದಿರಿನ ಬುಟ್ಟಿಗಳಲ್ಲಿ ಬರುತ್ತದೆ - ಜೋಡಿಸಲಾಗಿದೆ, ಪದರಗಳಲ್ಲಿ. ಆವಿ ಏರುತ್ತದೆ.
      ಬುಟ್ಟಿಯು ಆಕಾರವನ್ನು ಹಿಡಿದಿಡುತ್ತದೆ. ಬಿದಿರನ್ನು ಪರಿಗಣಿಸಿ. ಲೋಹ ಏನು ಭಿನ್ನವಾಗಿ ಮಾಡುತ್ತದೆ? ಬಿದಿರು ಏನು ಸೇರಿಸುತ್ತದೆ?
    follow_ups:
      - ಬುಟ್ಟಿಯು ಡುಂಪ್ಲಿಂಗ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತಟ್ಟೆಯು ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತದೆ?
      - ಬಿದಿರು ಮತ್ತು ಆವಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_maillard_wok
    name: ಮೈಲಾರ್ಡ್ ವೋಕ್
    prompt: |
      ಮನೆಯ ಸ್ಟವ್‌ಗಳು ತಲುಪಲು ಸಾಧ್ಯವಿಲ್ಲದ ತಾಪಮಾನವನ್ನು ವೋಕ್ ತಲುಪುತ್ತದೆ. ಸೀರು ಕ್ಷಣಿಕ.
      ಪ್ರೋಟೀನ್‌ಗಳು ಸೆಕೆಂಡುಗಳಲ್ಲಿ ಕಂದು ಬಣ್ಣಕ್ಕೆ ತಿರುಗುತ್ತವೆ. ರಸಾಯನಶಾಸ್ತ್ರವನ್ನು ಪರಿಗಣಿಸಿ. ಕಡಿಮೆ ಶಾಖ ಏನು ತ್ಯಾಗ ಮಾಡುತ್ತದೆ? ವೋಕ್ ಏನು ಬೇಡುತ್ತದೆ?
    follow_ups:
      - ಶಾಖವು ರುಚಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಲೆಕ್ಟ್ರಿಕ್ ಏನು ಭಿನ್ನವಾಗಿ ಮಾಡುತ್ತದೆ?
      - ಜ್ವಾಲೆ ಮತ್ತು ಗರಿ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_glutinous_texture
    name: ಅಂಟಂಟಾದ ರಚನೆ
    prompt: |
      ಅಂಟಂಟಾದ ಅಕ್ಕಿ - ಅಂಟಿಕೊಳ್ಳುವ, ಅಗಿಯುವ - ವಿಭಿನ್ನ ರಸಾಯನಶಾಸ್ತ್ರವನ್ನು ಹೊಂದಿದೆ. ಇದನ್ನು ಜೋಂಗ್ಜಿ, ಲೋ ಮೈ ಗೈ, ಸಿಹಿತಿಂಡಿಗಳಿಗೆ ಬಳಸಲಾಗುತ್ತದೆ. ರಚನೆಯನ್ನು ಗಮನಿಸಿ. ಉದ್ದ ಧಾನ್ಯಕ್ಕಿಂತ ಇದು ಹೇಗೆ ಭಿನ್ನವಾಗಿದೆ?
      ಅಂಟಿಕೊಳ್ಳುವಿಕೆಯು ಏನು ಅನುಮತಿಸುತ್ತದೆ?
    follow_ups:
      - ಸಾಮಾನ್ಯ ಅಕ್ಕಿ ಏನು ಮಾಡುತ್ತದೆ?
      - ರಚನೆಯು ಖಾದ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅಂಟು ಮತ್ತು ಹೊದಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_century_egg
    name: ಶತಮಾನದ ಮೊಟ್ಟೆ
    prompt: |
      ಶತಮಾನದ ಮೊಟ್ಟೆ - ಸಂರಕ್ಷಿಸಿದ, ಪರಿವರ್ತಿಸಿದ. ಹಳದಿ ಗಾಢವಾಗಿರುತ್ತದೆ, ಬಿಳಿ ಪಾರದರ್ಶಕ.
      ರಸಾಯನಶಾಸ್ತ್ರವು ಪ್ರಾಚೀನವಾಗಿದೆ. ಸಂರಕ್ಷಣೆಯನ್ನು ಪರಿಗಣಿಸಿ. ಸಮಯ ಏನು ಮಾಡುತ್ತದೆ?
      ತಾಜಾತನ ಎಂದರೆ ಏನು?
    follow_ups:
      - ಸಂರಕ್ಷಣೆಯು ರುಚಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ತಾಜಾ ಮೊಟ್ಟೆ ಹೇಗಿರುತ್ತದೆ?
      - ಸಮಯ ಮತ್ತು ಪರಿವರ್ತನೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: chn_oyster_sauce
    name: ಸಿಂಪಿ ಸಾಸ್
    prompt: |
      ಸಿಂಪಿ ಸಾಸ್ - ಉಮಾಮಿ, ದಪ್ಪ, ಕ್ಯಾಂಟೋನೀಸ್. ಇದು ಕಡಿತ ಮತ್ತು ಹೊರತೆಗೆಯುವಿಕೆ.
      ಸಿಂಪಿ ತನ್ನ ಸಾರವನ್ನು ನೀಡುತ್ತದೆ. ರುಚಿಯನ್ನು ಪತ್ತೆಹಚ್ಚಿ. ಅದು ಇಲ್ಲದೆ ಸ್ಟಿರ್-ಫ್ರೈ ಹೇಗಿರುತ್ತದೆ?
    follow_ups:
      - ಸಾಸ್ ಖಾದ್ಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಸಿಂಪಿ ಮತ್ತು ತರಕಾರಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
      - ಬದಲು ಸೋಯಾ ಏನು ಮಾಡುತ್ತದೆ?
  - id: chn_ordering_ritual
    name: ಆರ್ಡರ್ ಮಾಡುವ ಸಂಪ್ರದಾಯ
