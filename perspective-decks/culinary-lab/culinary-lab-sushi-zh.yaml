# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 料理实验室 — 寿司 (Mandarin Chinese)

id: culinary_lab_sushi
name: 料理实验室 — 寿司
description: 50 张卡片，重新审视您体验寿司的方式——从米饭和鱼的化学反应，到吧台的编排艺术，再到每种食材起源的考古学。
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: 米饭温度
    prompt: |
      寿司米饭是温的——大概是体温。不是凉的。温热带走了醋的酸味。去感受它。凉米饭会怎样？温度如何塑造口感？
    follow_ups:
      - 室温下的米饭会损失什么？
      - 温热如何承载风味？
      - 温度与质地之间的关系是什么？
  - id: sush_shari_balance
    name: 醋饭平衡
    prompt: |
      Shari（醋饭）占寿司的一半。醋、盐、糖的比例非常精确。单独尝尝米饭。它带来了什么？无味的米饭意味着什么？
    follow_ups:
      - 米饭如何塑造食材？
      - 过多的醋会怎样？
      - 醋饭和食材之间的关系是什么？
  - id: sush_counter_ritual
    name: 吧台仪式
    prompt: |
      吧台的 Omakase（厨师发办）——你面对着厨师。寿司一块接一块地送上来。吧台是一个舞台。注意其中的编排。节奏是什么？谁来定调？
    follow_ups:
      - 在餐桌上会有什么不同？
      - 吧台如何塑造用餐体验？
      - 厨师与客人之间的关系是什么？
  - id: sush_net_origin
    name: 食材产地
    prompt: |
      每一种 Neta（食材）——上面的配料——都来自某个地方。丰洲。筑地。一条船。一个牧场。去问问。追溯鱼的来源。它走了多远的路？“从仓库冷冻”意味着什么？
    follow_ups:
      - 产地如何塑造寿司？
      - 其他来源会怎样？
      - 地点与品质之间的关系是什么？
  - id: sush_wasabi_hidden
    name: 芥末的隐藏
    prompt: |
      真正的芥末——磨碎的根茎——很少见。大部分是辣根和染料。但当它是真的，它就不同。辛辣、翠绿、转瞬即逝。注意那种辛辣感。假的会带来什么？会减弱什么？
    follow_ups:
      - 芥末如何塑造口感？
      - 没有芥末意味着什么？
      - 辛辣与鱼肉之间的关系是什么？
  - id: sush_finger_over_chopstick
    name: 手指而非筷子
    prompt: |
      传统上，寿司是用手指吃的——而不是筷子。手指能感受到温度、质地。试试看。筷子无法提供什么，而手指可以？
    follow_ups:
      - 手如何塑造体验？
      - 用筷子会怎样？
      - 触觉与味觉之间的关系是什么？
  - id: sush_piece_by_piece
    name: 一口一口
    prompt: |
      寿司是一次上来一块——或两块。节奏是深思熟虑的。你吃；你等待。考虑一下节奏。一次上来十块会牺牲什么？
    follow_ups:
      - 节奏如何塑造用餐体验？
      - 加快速度会怎样？
      - 份与注意力之间的关系是什么？
  - id: sush_gari_palate
    name: 姜片清口
    prompt: |
      Gari（腌姜片）用于清洁味蕾，夹在寿司之间。它不是装饰；它是重置。注意你何时食用它。连续几块不吃姜片会对味蕾产生什么影响？
    follow_ups:
      - 姜片如何塑造用餐过程？
      - 没有姜片意味着什么？
      - 重置与味道之间的关系是什么？
  - id: sush_soy_minimal
    name: 酱油适量
    prompt: |
      酱油——轻轻蘸一下，鱼肉面朝下。不要蘸米饭。米饭会吸收太多。厨师可能已经刷了酱油。注意这一点。过量蘸酱油会怎样？
    follow_ups:
      - 酱油如何塑造寿司？
      - 没有酱油意味着什么？
      - 蘸取与平衡之间的关系是什么？
  - id: sush_knife_matters
    name: 刀工重要
    prompt: |
      寿司刀——单刃，锋利。切割影响质地。顺纹或逆纹。角度。考虑刀刃的作用。一把钝刀会牺牲什么？
    follow_ups:
      - 切割如何塑造鱼肉？
      - 不同的角度会怎样？
      - 刀刃与口感之间的关系是什么？
  - id: sush_otoro_fat
    name: 肥金枪鱼的脂肪
    prompt: |
      Otoro（最肥的金枪鱼）入口即化。脂肪是关键。考虑其纹理。瘦的 Akami（赤身）会怎样？脂肪如何塑造体验？
    follow_ups:
      - 没有脂肪的寿司会是怎样的？
      - 纹理如何创造奢华感？
      - 脂肪与入口即化之间的关系是什么？
  - id: sush_unagi_glaze
    name: 鳗鱼酱汁
    prompt: |
      Unagi（鳗鱼）会刷上甜酱，有时会再次烤制。酱汁像漆一样。考虑其光泽。没有酱汁的鳗鱼意味着什么？
    follow_ups:
      - 酱汁如何塑造寿司？
      - 甜味与鳗鱼之间的关系是什么？
      - 为什么要刷酱汁？
  - id: sush_nori crisp
    name: 海苔的脆度
    prompt: |
      卷寿司的 Nori（海苔）——烤过，酥脆，还是软的？不同的厨师选择不同。海苔影响口感。考虑其质地。湿软的海苔会怎样？
    follow_ups:
      - 海苔如何塑造寿司卷？
      - 不同的烘烤程度意味着什么？
      - 酥脆与新鲜之间的关系是什么？
  - id: sush_silence_counter
    name: 吧台的宁静
    prompt: |
      有些寿司吧很安静——为了专注、尊重。有些则很热闹。注意声音的构成。宁静带来了什么？交谈带来了什么？
    follow_ups:
      - 声音如何塑造用餐体验？
      - 大声的音乐会怎样？
      - 安静与专注之间的关系是什么？
  - id: sush_tamago_sweet
    name: 甜味玉子烧
    prompt: |
      Tamago（玉子烧）——日式煎蛋卷，通常是餐的结尾。它很甜，层次丰富。厨师的手艺一目了然。考虑这收尾。最后一​​块是生鱼片意味着什么？
    follow_ups:
      - 玉子烧如何塑造餐的结尾？
      - 甜味与结尾之间的关系是什么？
      - 为什么最后是鸡蛋？
  - id: sush_tuna_spectrum
    name: 金枪鱼的层次
    prompt: |
      Akami（赤身）、chutoro（中脂）、otoro（大脂）——从瘦到肥。这种层次是刻意的。如果可以，按顺序品尝。这个过程是如何进行的？每种各提供什么？
    follow_ups:
      - 脂肪如何塑造这个层次？
      - 单独一种等级会意味着什么？
      - 瘦肉与浓郁之间的关系是什么？
  - id: sush_ume_shiso
    name: 梅子紫苏
    prompt: |
      一些寿司卷里有 Ume（梅子）——腌李子——和 Shiso（紫苏）。酸、草本。它们能中和油腻。注意它们何时出现。没有它们，寿司卷会是怎样的？
    follow_ups:
      - 梅子如何塑造口感？
      - 酸味与鱼肉之间的关系是什么？
      - 为什么用紫苏？
  - id: sush_gunkan_hold
    name: 军舰卷的承载
    prompt: |
      Gunkan（军舰卷）承载着散碎的配料。鱼籽、海胆。海苔的腰带将其固定。考虑其形状。一块平坦的寿司会怎样？
    follow_ups:
      - 形状如何塑造配料？
      - 不同的容器会怎样？
      - 承载与溢出之间的关系是什么？
  - id: sush_uni_risk
    name: 海胆的风险
    prompt: |
      Uni（海胆）——棘手。甜、咸、有质感。它可能完美，也可能糟糕。考虑其中的风险。安全的鲑鱼意味着什么？风险带来了什么？
    follow_ups:
      - 海胆如何塑造体验？
      - 没有风险你会失去什么？
      - 争议性与令人难忘之间的关系是什么？
  - id: sush_chef_choice
    name: 厨师的选择
    prompt: |
      Omakase——厨师发办。你放弃了控制权。厨师解读当天的情况、鱼的品质、你。考虑信任。自己选择会有什么改变？
    follow_ups:
      - 放弃如何塑造用餐体验？
      - 点菜单上的菜品意味着什么？
      - 信任与体验之间的关系是什么？
  - id: sush_sake_pair
    name: 清酒搭配
    prompt: |
      寿司搭配清酒——冷饮、温饮、陈酿。搭配是经过深思熟虑的。注意你何时啜饮。它能清洁味蕾吗？能增强风味吗？考虑饮品的作用。
    follow_ups:
      - 清酒如何塑造寿司？
      - 葡萄酒会怎样？
      - 米饭与米酒之间的关系是什么？
  - id: sush_ikura_pop
    name: 鱼籽的爆裂
    prompt: |
      Ikura（鲑鱼籽）会爆开。爆裂的口感是质地和咸鲜。考虑这种感觉。煮熟的鱼籽会怎样？爆裂如何塑造口感？
    follow_ups:
      - 没有爆裂的寿司会是怎样的？
      - 质地如何创造愉悦感？
      - 爆裂与咸味之间的关系是什么？
  - id: sush_hirame_chew
    name: 比目鱼的嚼劲
    prompt: |
      Hirame（比目鱼）的嚼劲与金枪鱼不同。它很瘦，很嫩。注意其质地。肥美的鱼肉会怎样？嚼劲如何变化？
    follow_ups:
      - 质地如何塑造寿司？
      - 瘦肉与嫩滑之间的关系是什么？
      - 为什么点比目鱼？
  - id: sush_amaebi_head
    name: 甜虾的头
    prompt: |
      Amaebi（甜虾）有时会连同虾头一起炸。虾头酥脆，鲜味十足。考虑整个虾的利用。没有虾头的虾会牺牲什么？
    follow_ups:
      - 虾头如何塑造这道菜？
      - 整体与尊重之间的关系是什么？
      - 为什么要炸虾头？
  - id: sush_mirin_gloss
    name: 味淋光泽
    prompt: |
      有些寿司会刷上 nikiri（酱油、味淋、清酒的混合物）。光泽是最后的点缀。厨师已经调过味了。考虑是否要再加酱油。过量蘸酱油会怎样？
    follow_ups:
      - 刷酱汁如何塑造寿司？
      - 没有刷酱汁会怎样？
      - 厨师的手和你的手之间的关系是什么？
  - id: sush_anago_soft
    name: 海鳗的软嫩
    prompt: |
      Anago（海水鳗）比 unagi（淡水鳗）更软。不同的物种，不同的烹饪方法。注意其质地。Unagi 的紧实感会怎样？
    follow_ups:
      - 软嫩如何塑造寿司？
      - Anago 和 Unagi 之间的关系是什么？
      - 为什么要有两种鳗鱼？
  - id: sush_saba_silver
    name: 鲭鱼的银色
    prompt: |
      Saba（鲭鱼）通常会腌制。银色的鱼皮，油润的鱼肉。它味道浓郁。考虑其保存方式。生鲭鱼会怎样？
    follow_ups:
      - 腌制如何塑造鱼肉？
      - 油脂与腌制之间的关系是什么？
      - 为什么要腌制鲭鱼？
  - id: sush_ginger_between
    name: 夹在中间的姜片
    prompt: |
      Gari（腌姜片）夹在寿司之间——用于重置味蕾。但何时吃？每块之后？几块之后？节奏由你定。注意你的模式。不重置味蕾会怎样？
    follow_ups:
      - 时机如何塑造姜片的作用？
      - 寿司与寿司之间的关系是什么？
      - 你何时需要重置？
  - id: sush_maki_cut
    name: 寿司卷的切割
    prompt: |
      Maki（寿司卷）被切成几块。六块或八块。切割影响横截面。考虑其螺旋。不同的切割会怎样？
    follow_ups:
      - 切割如何塑造口感？
      - 更少的块意味着什么？
      - 切片与整体之间的关系是什么？
  - id: sush_tobiko_crunch
    name: 飞鱼籽的脆度
    prompt: |
      Tobiko（飞鱼籽）增加了脆度和色彩。它是上面的配料，也是装饰。注意它何时出现。没有它，寿司卷会是怎样的？
    follow_ups:
      - 飞鱼籽如何塑造口感？
      - 脆度与色彩之间的关系是什么？
      - 为什么是飞鱼籽？
  - id: sush_sashimi_contrast
    name: 生鱼片的对比
    prompt: |
      Sashimi（生鱼片）——不加米饭——让鱼肉单独呈现。那种纯粹感是不同的。将生鱼片与寿司比较。米饭增添了什么？它的缺失揭示了什么？
    follow_ups:
      - 米饭如何塑造寿司？
      - 全是生鱼片会怎样？
      - 鱼与米饭之间的关系是什么？
  - id: sush_tea_rinse
    name: 茶水清洗
    prompt: |
      寿司吧的绿茶——不断续杯，分享。它能清洁味蕾。茶是节奏的一部分。考虑它的作用。水会怎样？不喝茶会怎样？
    follow_ups:
      - 茶如何塑造用餐体验？
      - 茶与重置之间的关系是什么？
      - 为什么是绿茶？
  - id: sush_bengara_tuna
    name: Bengara 金枪鱼
    prompt: |
      Bengara——瘦金枪鱼，常来自鱼背——颜色更深。味道与 Akami 不同。考虑其切割方式。是鱼的哪个部位？部位如何影响味道？
    follow_ups:
      - 切割方式如何塑造风味？
      - 部位与味道之间的关系是什么？
      - 为什么是这种切割？
  - id: sush_kohada_cure
    name: 鲱鱼的腌制
    prompt: |
      Kohada（鲱鱼）经过腌制，有时会用醋处理。这是对厨师技艺的考验。银色的鱼皮，平衡的味道。考虑其技艺。未腌制的会怎样？
    follow_ups:
      - 腌制如何塑造鱼肉？
      - 醋与银色鱼皮之间的关系是什么？
      - 为什么这是考验？
  - id: sush_engawa_fin
    name: 鳀鱼鳍
    prompt: |
      Engawa（比目鱼的鳍肌）很受欢迎。它有独特的质地。考虑这部位。普通的 Hirame（比目鱼）会怎样？鳍有何不同？
    follow_ups:
      - 切割方式如何塑造寿司？
      - 鳍与肌肉之间的关系是什么？
      - 为什么它很受欢迎？
  - id: sush_first_piece
    name: 第一块寿司
    prompt: |
      第一块寿司定下基调。通常是比较温和的——可能是 Hirame（比目鱼）或 Tai（鲷鱼）。厨师在进行校准。考虑开场。第一块就是 Otoro（肥金枪鱼）意味着什么？
    follow_ups:
      - 开场如何塑造用餐体验？
      - 开始与过程之间的关系是什么？
      - 为什么第一块是温和的？
  - id: sush_kampachi_fat
    name: 锦鲹的脂肪
    prompt: |
      Kampachi（年轻的黄鰤鱼）有微妙的脂肪。介于瘦肉和肥美之间。注意这种中间地带。Buri（鰤鱼）会怎样？更瘦的鱼会怎样？
    follow_ups:
      - 脂肪如何塑造寿司？
      - 年龄与脂肪之间的关系是什么？
      - 为什么是锦鲹？
  - id: sush_nodoguro_char
    name: 黑喉鱼的炙烤
    prompt: |
      Nodoguro（黑喉鱼）常常会轻微炙烤。鱼皮，脂肪。炙烤增添了风味。考虑热量的应用。生的会怎样？
    follow_ups:
      - 炙烤如何塑造鱼肉？
      - 炙烤与脂肪之间的关系是什么？
      - 为什么要炙烤这一种？
  - id: sush_choji_plate
    name: 简易的盘子
    prompt: |
      盘子——或是木头，或是石头——承载着寿司。摆盘非常简约。考虑容器。繁忙的盘子会怎样？简约带来了什么？
    follow_ups:
      - 盘子如何塑造寿司？
      - 容器与专注之间的关系是什么？
      - 为什么是简约的？
  - id: sush_tea_cup
    name: 茶杯
    prompt: |
      吧台上的茶杯——没有把手，有时表面粗糙。你双手捧着它。考虑容器。马克杯会怎样？茶杯带来了什么？
    follow_ups:
      - 茶杯如何塑造饮用体验？
      - 容器与仪式之间的关系是什么？
      - 为什么没有把手？
  - id: sush_silver_slide
    name: 顺滑脱落
    prompt: |
      寿司应该能从盘子上滑落——或被干净地夹起。米饭能粘住但也能释放。考虑其结构。散开的米饭意味着什么？
    follow_ups:
      - 结构如何塑造食用体验？
      - 粘稠的米饭会怎样？
      - 完整性与口感之间的关系是什么？
  - id: sush_kinmedai_skin
    name: 金眼鲷的鱼皮
    prompt: |
      Kinmedai（金眼鲷）——通常连鱼皮一起，轻微炙烤。鱼皮增添了质地、脂肪。考虑炙烤。生鱼皮会怎样？
    follow_ups:
      - 鱼皮如何塑造寿司？
      - 炙烤与脂肪之间的关系是什么？
      - 为什么要炙烤？
  - id: sush_botan_ebi
    name: 牡丹虾
    prompt: |
      Botan ebi（牡丹虾）——甜美，通常是生的。虾尾有时会炸。考虑整个虾。煮熟的虾会怎样？
    follow_ups:
      - 烹饪方式如何塑造寿司？
      - 生食与甜味之间的关系是什么？
      - 为什么是牡丹虾？
  - id: sush_namida_heat
    name: 泪水的辛辣
    prompt: |
      真正的芥末会让你流泪——namida。辛辣感升起，然后消失。它与辣椒不同。考虑这种感觉。辣根会带来什么不同？
    follow_ups:
      - 辛辣感如何塑造口感？
      - 芥末与眼泪之间的关系是什么？
      - 为什么会让你流泪？
  - id: sush_omakase_end
    name: Omakase 的结尾
    prompt: |
      餐结束了——玉子烧，也许是味噌汤，或许是水果。整个弧线完成了。考虑这结尾。再来一块会怎样？你何时知道已经结束了？
    follow_ups:
      - 结尾如何塑造记忆？
      - 结束与满足感之间的关系是什么？
      - 为什么以鸡蛋或汤结束？
  - id: sush_counter_wait
    name: 吧台的等待
    prompt: |
      在寿司之间，你等待着。厨师在准备。暂停是节奏的一部分。注意那种期待感。即时服务会牺牲什么？
    follow_ups:
      - 等待如何塑造寿司？
      - 暂停与专注之间的关系是什么？
      - 为什么不预先摆盘？
  - id: sush_tsukiji_legacy
    name: 筑地传承
    prompt: |
      筑地已经消失；丰洲取而代之。但鱼依然流淌在东京。考虑这个市场。没有了拍卖，寿司会是怎样？没有了分销呢？
    follow_ups:
      - 市场如何塑造鱼的品质？
      - 拍卖与品质之间的关系是什么？
      - 筑地意味着什么？
  - id: sush_edomae_spirit
    name: 江户前精神
    prompt: |
      Edomae（江户前）——东京传统的寿司风格。经过保存、腌制、陈年，以便在没有制冷的情况下食用。考虑其历史。永远新鲜会怎样？
    follow_ups:
      - 历史如何塑造技术？
      - 保存与风味之间的关系是什么？
      - 为什么是江户前？
  - id: sush_gari_reset
    name: 姜片重置
    prompt: |
      Gari（腌姜片）在寿司之间起到清洁味蕾的作用。那些淡粉色的切片会重置你的味觉。注意你何时会去拿它。没有了重置，这顿饭会是怎样的？姜片如何塑造用餐过程？
    follow_ups:
      - 没有姜片意味着什么？
      - 重置如何塑造下一块寿司？
      - 暂停与连续性之间的关系是什么？
  - id: sush_otoro_melt
    name: 肥金枪鱼的融化
    prompt: |
      Otoro（最肥的金枪鱼）几乎在舌尖融化。脂肪是关键。考虑其质地。瘦金枪鱼会怎样？融化如何标志着用餐的高潮？
    follow_ups:
      - Akami（赤身）会有什么不同？
      - 脂肪如何塑造体验？
      - 融化与奢华之间的关系是什么？
