# کلنری لیب — چینی (Urdu)

id: culinary_lab_chinese
name: کلنری لیب — چینی
description: 50 کارڈز جو چینی کھانے کے آپ کے تجربے کو بدل دیں گے — ووکے ہی کی کیمسٹری اور سوی کی آثار قدیمہ سے لے کر راؤنڈ ٹیبل کی کوریوگرافی اور ضیافت کی داستان تک۔
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: ووکے ہی
    prompt: |
      ووکے ہی—وووک کی سانس—انتہائی گرمی اور رفتار سے پیدا ہونے والا وہ مبہم دھواں ہے۔ یہ بالکل سگریٹ کا دھواں نہیں؛ یہ تبدیلی ہے۔
      کیا آپ اسے پکڑ سکتے ہیں؟ اس کے بغیر فرائی ڈش کیسی ہوگی؟
    follow_ups:
      - ہی ڈش کو کیسے بناتی ہے؟
      - اسے کیا بناتا ہے؟ کیا اسے ختم کرتا ہے؟
      - گرمی اور جلدی کے درمیان کیا تعلق ہے؟
  - id: chn_round_table
    name: راؤنڈ ٹیبل
    prompt: |
      چینی ضیافت کا دسترخوان گول ہوتا ہے—درمیان میں کرسی پر گھومنے والی میز۔ کھانا گھومتا ہے۔ سب پہنچتے ہیں۔ میز ایک کوریوگرافی ہے۔ کون گھماتا ہے؟ کون انتظار کرتا ہے؟
      کون سے غیر کہے اصول ہیں؟
    follow_ups:
      - مستطیل میز کا کیا مطلب ہوگا؟
      - گول شکل کھانے کو کیسے بناتی ہے؟
      - مرکز اور کنارے کے درمیان کیا تعلق ہے؟
  - id: chn_soy_archeology
    name: سوی آثار قدیمہ
    prompt: |
      سوی ساس—فرمنٹڈ، پرانی، علاقائی۔ ہلکی، گہری، مشروم، ڈبل بلیک۔
      یہ کہیں سے آئی تھی۔ اسے وقت لگا۔ بوتل کا سراغ لگائیں۔ اس نے کیا سفر طے کیا؟ صنعتی سوی کیا قربان کرے گی؟
    follow_ups:
      - اصل ڈالنے کے طریقے کو کیسے بناتا ہے؟
      - سوی کے بغیر ڈش کیا ہوگی؟
      - فرمنٹ اور امامی کے درمیان کیا تعلق ہے؟
  - id: chn_chopstick_grip
    name: چوپ اسٹک گرپ
    prompt: |
      چوپ اسٹکس ہاتھ کو لمبا کرتی ہیں۔ چاول، پھسلنے والے نوڈلز، ڈمپلنگ—ہر ایک کے لیے مختلف تکنیک درکار ہے۔ اپنی گرپ پر غور کریں۔ برتن کو کیا درکار ہے؟ یہ کیا اجازت دیتا ہے؟
    follow_ups:
      - کانٹا کیا بدلے گا؟
      - اسٹک کھانے کے انداز کو کیسے بناتی ہے؟
      - اوزار اور رفتار کے درمیان کیا تعلق ہے؟
  - id: chn_dumpling_seam
    name: ڈمپلنگ سیم
    prompt: |
      ڈمپلنگ کی پلیٹس—فولڈ، سیل۔ جیاؤزی، شومائی، ژیولونگباؤ—ہر ایک کی اپنی شکل ہوتی ہے۔ سیم قائم رہتی ہے یا کھل جاتی ہے۔ ایک کا مطالعہ کریں۔ پھٹنے کا کیا مطلب ہوگا؟ پلیٹ کیا محفوظ رکھتی ہے؟
    follow_ups:
      - فولڈنگ فلنگ کو کیسے بناتی ہے؟
      - کھلے ہوئے ڈمپلنگ میں کیا ضائع ہو جائے گا؟
      - سیل اور سوپ کے درمیان کیا تعلق ہے؟
  - id: chn_tea_pour
    name: چائے ڈالنا
    prompt: |
      چینی چائے—ڈالی جاتی ہے، دوبارہ بھری جاتی ہے، بانٹی جاتی ہے۔ برتن گھومتا ہے۔ خالی پیالوں کو پوچھے بغیر بھر دیا جاتا ہے۔ ڈالنا خدمت اور دیکھ بھال ہے۔ تال پر غور کریں۔ چائے کے بغیر کھانا کیا ہوگا؟
    follow_ups:
      - چائے کس طرح کھانے کی رفتار کو بناتی ہے؟
      - ڈالنا کیا بتاتا ہے؟
      - پیالے اور میز کے درمیان کیا تعلق ہے؟
  - id: chn_bone_plate
    name: بون پلیٹ
    prompt: |
      ہڈیوں کے لیے ایک چھوٹی پلیٹ—چھلکے، چکن کی ہڈیاں، جھینگے کے چھلکے۔ پلیٹ ناقابلِ خورد و نوش کو جمع کرتی ہے۔ یہ سیٹنگ کا حصہ ہے۔ ہڈی کی پلیٹ کیا اجازت دیتی ہے؟ اس کے بغیر کیا ہوگا؟
    follow_ups:
      - پلیٹ کھانے کو کیسے بناتی ہے؟
      - اس کے بغیر میز کیسی لگے گی؟
      - پھینکنے اور وقار کے درمیان کیا تعلق ہے؟
  - id: chn_soup_spoon
    name: سوپ چمچ
    prompt: |
      چینی سوپ کا چمچ—چوڑا، گہرا، سیرامک۔ یہ شوربہ اور ٹھوس چیزیں رکھتا ہے۔ چمچ منہ میں مختلف طرح سے فٹ ہوتا ہے۔ گھونٹ پر غور کریں۔ شکل کیا فعال کرتی ہے؟
    follow_ups:
      - گول چمچ کیا بدلے گا؟
      - چمچ گھونٹ کو کیسے بناتا ہے؟
      - شکل اور فعل کے درمیان کیا تعلق ہے؟
  - id: chn_steam_basket
    name: اسٹیم باسکٹ
    prompt: |
      ڈم سم بانس کی ٹوکریوں میں آتا ہے—اسٹیکڈ، لیئرز۔ بھاپ اٹھتی ہے۔ ٹوکری شکل کو برقرار رکھتی ہے۔ بانس پر غور کریں۔ دھات کیا مختلف کرے گی؟ بانس کیا اضافہ کرتا ہے؟
    follow_ups:
      - ٹوکری ڈمپلنگ کو کیسے بناتی ہے؟
      - پلیٹ میں کیا ضائع ہو جائے گا؟
      - بانس اور بھاپ کے درمیان کیا تعلق ہے؟
  - id: chn_maillard_wok
    name: مایارڈ وووک
    prompt: |
      وووک ان درجہ حرارت تک پہنچ جاتا ہے جو گھر کے چولہے نہیں پہنچ سکتے۔ سیز فوری ہوتا ہے۔ پروٹین سیکنڈوں میں بھورے ہو جاتے ہیں۔ کیمسٹری پر غور کریں۔ کم گرمی کیا قربان کرے گی؟ وووک کیا مانگتا ہے؟
    follow_ups:
      - گرمی ذائقہ کو کیسے بناتی ہے؟
      - الیکٹرک کیا مختلف کرے گا؟
      - شعلے اور کرسٹ کے درمیان کیا تعلق ہے؟
  - id: chn_glutinous_texture
    name: گلوٹینئس ٹیکسچر
    prompt: |
      گلوٹینئس چاول— چپکنے والے، چبانے والے—میں مختلف کیمسٹری ہوتی ہے۔ یہ زونگزی، لو مائی گائی، میٹھوں کے لیے استعمال ہوتا ہے۔ بناوٹ پر غور کریں۔ یہ لمبے دانے والے چاولوں سے کیسے مختلف ہے؟ چپکنے والی چیز کیا فعال کرتی ہے؟
    follow_ups:
      - عام چاول کیا کریں گے؟
      - بناوٹ ڈش کو کیسے بناتی ہے؟
      - چپکنے اور لپیٹنے کے درمیان کیا تعلق ہے؟
  - id: chn_century_egg
    name: صدی کا انڈا
    prompt: |
      صدی کا انڈا—محفوظ، تبدیل شدہ۔ زردی گہرا ہوتا ہے، سفیدی شفاف۔ کیمسٹری قدیم ہے۔ تحفظ پر غور کریں۔ وقت کیا کرتا ہے؟ تازگی کا کیا مطلب ہوگا؟
    follow_ups:
      - تحفظ ذائقہ کو کیسے بناتا ہے؟
      - انڈا تازہ کیا ہوگا؟
      - وقت اور تبدیلی کے درمیان کیا تعلق ہے؟
  - id: chn_oyster_sauce
    name: اوسٹر ساس
    prompt: |
      اوسٹر ساس—امامی، گاڑھا، کینٹونیز۔ یہ کمی اور اخراج ہے۔ اوسٹر اپنا جوہر دیتا ہے۔ ذائقہ کا سراغ لگائیں۔ اس کے بغیر سٹر فرائی کیا ہوگی؟
    follow_ups:
      - ساس ڈش کو کیسے بناتی ہے؟
      - اوسٹر اور سبزی کے درمیان کیا تعلق ہے؟
      - سوی اس کی جگہ کیا کرے گی؟
  - id: chn_ordering_ritual
    name: آرڈر کرنے کی رسم
    prompt: |
      چینی ریستوران میں آرڈر کرنا—مہمان منتخب کرتا ہے، یا میز مذاکرات کرتی ہے۔ توازن: گوشت، سبزی، سوپ، چاول۔ آرڈر ایک کمپوزیشن ہے۔ غور کریں کہ کون فیصلہ کرتا ہے۔ اصول کیا ہیں؟
    follow_ups:
      - آرڈر کرنے سے کھانا کیسے بنتا ہے؟
      - سب کچھ اپنے لیے کیا آرڈر کریں گے؟
      - انتخاب اور اجتماعی کے درمیان کیا تعلق ہے؟
  - id: chn_crispy_skin
    name: کرسپی اسکن
    prompt: |
      پیکن ڈک اسکن—کرسپی، گلیزڈ۔ یا کینٹونیز روسٹ پورک کریکلنک۔ جلد جان بوجھ کر بنائی جاتی ہے۔ گرمی، ہوا، چینی۔ فن تعمیر پر غور کریں۔ کیا سوجی ہوئی جلد کا مطلب ہوگا؟
    follow_ups:
      - کرسپی پن بائٹ کو کیسے بناتا ہے؟
      - کریکل کیا بناتا ہے؟
      - جلد اور گوشت کے درمیان کیا تعلق ہے؟
  - id: chn_noodle_slip
    name: نوڈل سلپ
    prompt: |
      چینی نوڈلز—گندم، چاول، ہاتھ سے کھینچے ہوئے—بناوٹ میں مختلف ہوتے ہیں۔ کچھ پھسلتے ہیں؛ کچھ چباتے ہیں۔ نوڈل کا چوپ اسٹکس کے خلاف گھسیٹنا۔ مزاحمت پر غور کریں۔ سلپ کیا اضافہ کرتا ہے؟
    follow_ups:
      - بناوٹ کھانے کے طریقے کو کیسے بناتی ہے؟
      - گوندے ہوئے نوڈل میں کیا ضائع ہو جائے گا؟
      - سلپ اور اطمینان کے درمیان کیا تعلق ہے؟
  - id: chn_bok_choy_wilt
    name: بوک چائے مرجھانا
    prompt: |
      وووک میں بوک چائے—سیکنڈ۔ یہ مرجھاتی ہے لیکن ساخت برقرار رکھتی ہے۔ سبز رنگ نرم ہو جاتا ہے۔ تبدیلی پر غور کریں۔ کچا ہونے کا کیا مطلب ہوگا؟ زیادہ پکا ہوا کیا ضائع کر دے گا؟
    follow_ups:
      - مرجھانا سبزی کو کیسے بناتا ہے؟
      - گرمی اور سبز کے درمیان کیا تعلق ہے؟
      - کب ہو جاتا ہے؟
  - id: chn_five_spice
    name: فائیو اسپائس
    prompt: |
      فائیو اسپائس پاؤڈر—اسٹار انیس، لونگ، دار چینی، سیچوان کالی مرچ، سونف۔ یہ تاریخ کے ساتھ ایک مرکب ہے۔ ہر مسالے کا ایک راستہ ہے۔ ایک کا سراغ لگائیں۔ اس نے کیا سفر طے کیا؟
    follow_ups:
      - اس کے بغیر ڈش کیا ہوگی؟
      - مرکب شناخت کیسے بناتا ہے؟
      - مسالے اور تحفظ کے درمیان کیا تعلق ہے؟
  - id: chn_banquet_progression
    name: ضیافت کا ارتقا
    prompt: |
      چینی ضیافت کا ایک محراب ہوتا ہے—پہلے ٹھنڈے پکوان، پھر گرم، سوپ، چاول، میٹھا کھانا۔ ارتقا ایک کہانی ہے۔ تال پر غور کریں۔ مختلف ترتیب کیا کرے گی؟
    follow_ups:
      - ترتیب کھانے کو کیسے بناتی ہے؟
      - پہلے اور آخری کے درمیان کیا تعلق ہے؟
      - کہانی کب عروج پر پہنچتی ہے؟
  - id: chn_white_rice_center
    name: سفید چاول کا مرکز
    prompt: |
      سفید چاول—سادہ، ابلا ہوا—کھانے کی بنیاد بنتا ہے۔ یہ کینوس ہے۔ بھرپور پکوانوں کو توازن کے لیے چاول کی ضرورت ہوتی ہے۔ غور کریں کہ آپ کب اس کی طرف پہنچتے ہیں۔ سادہ کے بغیر کھانا کیا ہوگا؟
    follow_ups:
      - چاول تالو کو کیسے بناتا ہے؟
      - فرائیڈ رائس کیا کرے گا؟
      - غیر جانبدار اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: chn_szechuan_numb
    name: سیچوان سن
    prompt: |
      سیچوان کالی مرچ—ما لا—سن کرنے والی، چبھننے والی۔ یہ گرمی نہیں؛ یہ احساس ہے۔ منہ میں جھنجھناہٹ ہوتی ہے۔ احساس پر غور کریں۔ سن کرنے والے کے بغیر ڈش کیا ہوگی؟
    follow_ups:
      - ما لا تجربے کو کیسے بناتا ہے؟
      - سن کرنے اور گرمی کے درمیان کیا تعلق ہے؟
      - انہیں کیوں جوڑا جائے؟
  - id: chn_dark_soy
    name: ڈارک سویا
    prompt: |
      ڈارک سویا—زیادہ گاڑھا، میٹھا، رنگ کے لیے۔ یہ چاولوں کو داغ دیتا ہے، گوشت کو گلیز کرتا ہے۔ یہ نمک کے لیے نہیں؛ یہ رنگ کے لیے ہے۔ بصری پر غور کریں۔ سیاہ کیا اضافہ کرتا ہے؟
    follow_ups:
      - لائٹ سویا کیا کرے گا؟
      - رنگ توقعات کو کیسے بناتا ہے؟
      - سیاہ اور کیریمل کے درمیان کیا تعلق ہے؟
  - id: chn_hot_plate
    name: گرم پلیٹ
    prompt: |
      سسلہ دار پلیٹیں—بیف، سکویڈ—سسلہ کے ساتھ آتی ہیں۔ لوہے کی پلیٹ پکاتی رہتی ہے۔ آواز تھیٹر ہے۔ سسلہ کے بغیر ڈش کیا ہوگی؟ گرم پلیٹ پکانے کو کیسے بڑھاتی ہے؟
    follow_ups:
      - سسلہ تجربے کو کیسے بناتا ہے؟
      - ٹھنڈی پلیٹ کا کیا مطلب ہوگا؟
      - آواز اور گرمی کے درمیان کیا تعلق ہے؟
  - id: chn_congee_soft
    name: کونجی سافٹ
    prompt: |
      کونجی—چاول کا دلیہ—نرم، آرام دہ ہے۔ لمبی پکائی ہوئی چاول ٹوٹ جاتی ہے۔ بناوٹ سرنڈر ہے۔ تبدیلی پر غور کریں۔ یہاں آل ڈینٹے کا کیا مطلب ہوگا؟
    follow_ups:
      - نرمی ڈش کو کیسے بناتی ہے؟
      - گاڑھا کونجی کیا کرے گا؟
      - پانی اور چاول کے درمیان کیا تعلق ہے؟
  - id: chn_glass_noodle
    name: گلاس نوڈل
    prompt: |
      گلاس نوڈلز—مونگ بین نشاستہ—شفاف، پھسلنے والے ہوتے ہیں۔ وہ ذائقہ جذب کرتے ہیں۔ بناوٹ پر غور کریں۔ گندم کے نوڈلز کیا کریں گے؟ شفافیت کا کیا مطلب ہے؟
    follow_ups:
