# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулинарная лаборатория — Итальянская кухня (Russian)

id: culinary_lab_italian
name: Кулинарная лаборатория — Итальянская кухня
description: |
  50 карточек, чтобы изменить ваше восприятие итальянской еды — от химии
  оливкового масла и кислоты до социальной хореографии застолья и
  археологии каждого ингредиента.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: Трансформация помидора
    prompt: |
      Сырой помидор под воздействием тепла и времени превращается во что-то другое.
      Проследите эту дугу. Что происходит с кислотностью? Со структурой? Помидор
      хранит путешествие.
    follow_ups:
      - Как соус меняет вкус?
      - Что было бы потеряно без этой трансформации?
      - Какова связь между сырым и приготовленным?
  - id: it_bread_arrival
    name: Появление хлеба
    prompt: |
      Хлеб подают перед едой — иногда теплым, иногда с маслом. Обратите внимание
      на порядок вещей. Хлеб — это вступление. Кто решает, когда начинать есть?
    follow_ups:
      - Чем было бы блюдо без хлеба?
      - Как хлеб задает темп?
      - Какова связь между хлебом и предвкушением?
  - id: it_pasta_shape
    name: Форма пасты
    prompt: |
      Каждая форма пасты по-разному удерживает соус — бороздочки, выемки, изгибы.
      Выберите одно блюдо и спросите: почему именно эта форма для этого соуса?
      Форма — это решение.
    follow_ups:
      - Что изменилось бы при другой форме?
      - Как форма влияет на вкус в каждом укусе?
      - Какова связь между формой и функцией?
  - id: it_basil_fragrance
    name: Аромат базилика
    prompt: |
      Базилик достигает носа раньше рта. Закройте глаза и найдите эту траву.
      Где она находится в блюде? Аромат — это карта.
    follow_ups:
      - Чем было бы блюдо без запаха?
      - Как аромат подготавливает вкусовые рецепторы?
      - Какова связь между ароматом и вкусом?
  - id: it_olive_oil_pool
    name: Лужица оливкового масла
    prompt: |
      Оливковое масло собирается на поверхности или глазирует тарелку.
      Смотрите, как оно движется. Масло несет вкус и жир. Что оно связывает?
    follow_ups:
      - Чем было бы блюдо без масла?
      - Как масло меняет ощущения во рту?
      - Какова связь между маслом и теплом?
  - id: it_parmesan_shatter
    name: Хруст пармезана
    prompt: |
      Свеженатертый пармезан имеет кристаллический хруст. Прислушайтесь к нему.
      Сыр — это столько же текстура, сколько и вкус. Как он завершает каждый укус?
    follow_ups:
      - Чем было бы блюдо без хруста?
      - Как сыр завершает вкус?
      - Какова связь между сыром и солью?
  - id: it_espresso_ritual
    name: Ритуал эспрессо
    prompt: |
      Эспрессо подают в конце — маленькая чашка, без молока. Ритуал отмечает
      завершение. Кто пьет его стоя? Кто сидит? Эспрессо — это пунктуация.
    follow_ups:
      - Чем было бы блюдо без эспрессо?
      - Как ритуал формирует время?
      - Какова связь между кофе и завершением?
  - id: it_antipasti_sequence
    name: Последовательность антипасти
    prompt: |
      Антипасти подаются первыми — маленькие тарелки, общие или индивидуальные.
      Обратите внимание на последовательность. Какова логика порядка? Начало задает
      тон.
    follow_ups:
      - Что изменилось бы, если бы порядок был обратным?
      - Как последовательность создает аппетит?
      - Какова связь между первым и последним?
  - id: it_wine_pour
    name: Наливание вина
    prompt: |
      Наливают вино — кто наливает? Сколько? Наливание — это социальная хореография.
      Наблюдайте за жестами. Что они говорят?
    follow_ups:
      - Чем был бы стол без вина?
      - Как наливание создает церемонию?
      - Какова связь между наливанием и темпом?
  - id: it_risotto_stir
    name: Помешивание ризотто
    prompt: |
      Ризотто требует постоянного помешивания. Крахмал высвобождается медленно.
      Подумайте о затраченном труде в этой тарелке. Что произошло бы без
      помешивания?
    follow_ups:
      - Чем был бы рис без кремообразности?
      - Как помешивание меняет текстуру?
      - Какова связь между трудом и результатом?
  - id: it_porcini_earth
    name: Земля белых грибов
    prompt: |
      Белые грибы имеют вкус лесной подстилки — умами, земля, гниение.
      Проследите путь гриба обратно. Где он рос? Под какими деревьями?
    follow_ups:
      - Чем было бы блюдо без землистости?
      - Как происхождение формирует вкус?
      - Какова связь между грибом и лесом?
  - id: it_plate_negative_space
    name: Свободное пространство тарелки
    prompt: |
      Итальянская подача часто оставляет пространство — тарелка не заполнена.
      Рассмотрите пустоту. Что она обрамляет? Что она позволяет?
    follow_ups:
      - Как выглядело бы блюдо, полностью заполненное?
      - Как свободное пространство фокусирует взгляд?
      - Какова связь между пустым и полным?
  - id: it_garlic_sizzle
    name: Шипение чеснока
    prompt: |
      Чеснок попадает в горячее масло — шипение это химия. Слушайте. Нюхайте.
      Этот момент мимолетен. Что бы подгорело? Что было бы упущено?
    follow_ups:
      - Чем было бы блюдо без шипения?
      - Как время формирует вкус?
      - Какова связь между теплом и ароматом?
  - id: it_crust_bubbles
    name: Пузырьки на корочке
    prompt: |
      Корочка фокаччи или пиццы образует пузырьки в духовке. Каждый пузырек —
      это карман пара. Рассмотрите структуру мякиша.
    follow_ups:
      - Чем был бы хлеб без пузырьков?
      - Как мякиш удерживает масло и соль?
      - Какова связь между воздухом и структурой?
  - id: it_prosciutto_slice
    name: Ломтик прошутто
    prompt: |
      Прошутто нарезано тонко — почти полупрозрачно. Нож имеет значение.
      Рассмотрите мастерство. Что сделает толстый ломтик?
    follow_ups:
      - Чем было бы мясное ассорти без тонкости?
      - Как толщина влияет на таяние?
      - Какова связь между ломтиком и наслаждением?
  - id: it_balsamic_drop
    name: Капля бальзамика
    prompt: |
      Выдержанный бальзамик подается каплями — дорогой, драгоценный.
      Наблюдайте за вязкостью. Капля — это концентрация. Что она добавляет?
    follow_ups:
      - Чем было бы блюдо без кислоты?
      - Как капля прорезает жир?
      - Какова связь между сладким и кислым?
  - id: it_gnocchi_pillow
    name: Подушечка ньокки
    prompt: |
      Ньокки должны быть легкими — как подушечки, а не камни. Ощутите текстуру.
      Соотношение картофеля и муки очень деликатно. Что делает их такими?
    follow_ups:
      - Какими были бы ньокки, если бы они были слишком тяжелыми?
      - Как текстура определяет блюдо?
      - Какова связь между картофелем и мукой?
  - id: it_salt_block
    name: Соляной блок
    prompt: |
      Некоторые итальянские кухни используют соляные блоки для гриля.
      Рассмотрите минерал. Откуда взялась соль? Что она придает?
    follow_ups:
      - Чем было бы мясо без соли?
      - Как блок меняет приготовление?
      - Какова связь между солью и огнем?
  - id: it_cacio_e_pepe
    name: Качо-э-пепе
    prompt: |
      Качо-э-пепе — это сыр, перец, вода из-под пасты. Три ингредиента.
      Эмульсия — вот в чем фокус. Что ее удерживает? Что ее разрушает?
    follow_ups:
      - Чем было бы блюдо без эмульсии?
      - Как вода из-под пасты связывает?
      - Какова связь между простотой и техникой?
  - id: it_cannoli_crunch
    name: Хруст канноли
    prompt: |
      Оболочка канноли хрустит, а начинка — нежная. Контраст намерен.
      Рассмотрите архитектуру укуса.
    follow_ups:
      - Чем был бы десерт без контраста?
      - Как текстура создает удовольствие?
      - Какова связь между оболочкой и начинкой?
  - id: it_risotto_clock
    name: Часы ризотто
    prompt: |
      У ризотто есть «окно» — аль денте, а затем оно готово. Повар соревнуется со
      временем. Рассмотрите точность. Что сделало бы пять дополнительных минут?
    follow_ups:
      - Каким был бы рис, если бы его переварили?
      - Как время определяет блюдо?
      - Какова связь между часами и мастерством?
  - id: it_truffle_shave
    name: Стружка трюфеля
    prompt: |
      Трюфель нарезают на стол — ритуал, аромат. Трюфель мимолетен. Откуда он
      взялся? Какое животное его нашло?
    follow_ups:
      - Чем было бы блюдо без церемонии?
      - Как нарезка распределяет вкус?
      - Какова связь между ритуалом и редкостью?
  - id: it_spaghetti_twist
    name: Скручивание спагетти
    prompt: |
      Итальянцы накручивают спагетти на вилку — без ложки. Это движение —
      культурная особенность. Наблюдайте за движением. Чего оно достигает?
    follow_ups:
      - Чем был бы укус без скручивания?
      - Как жест формирует трапезу?
      - Какова связь между столовым прибором и традицией?
  - id: it_caprese_layers
    name: Слои капрезе
    prompt: |
      Капрезе — это слои помидора, моцареллы, базилика. Слои просты.
      Рассмотрите цвета — красный, белый, зеленый. Тарелка — это флаг.
    follow_ups:
      - Что изменилось бы в блюде без порядка?
      - Как слои создают гармонию?
      - Какова связь между цветом и вкусом?
  - id: it_polenta_set
    name: Застывшая полента
    prompt: |
      Полента застывает по мере остывания — от мягкой к твердой. Рассмотрите
      температуру. Какой она была бы горячей? Холодной? Текстура — это функция
      времени.
    follow_ups:
      - Какая была бы полента, если бы ее никогда не остужали?
      - Как застывание меняет блюдо?
      - Какова связь между теплом и структурой?
  - id: it_amaro_finish
    name: Амаро как завершение
    prompt: |
      Амаро завершает трапезу — горький, пищеварительный. Горечь намеренна.
      Что она делает с вкусовыми рецепторами? С телом?
    follow_ups:
      - Чем была бы трапеза без амаро?
      - Как горечь очищает язык?
      - Какова связь между горечью и завершением?
  - id: it_lardo_spread
    name: Намазанное сало (лардо)
    prompt: |
      Лардо — это вяленое свиное сало, которое намазывают на хлеб, оно тает.
      Рассмотрите жир. Откуда он взялся? Что он несет?
    follow_ups:
      - Чем был бы хлеб без лардо?
      - Как жир несет вкус?
      - Какова связь между жиром и сохранением?
  - id: it_sardine_silver
    name: Серебристая сардина
    prompt: |
      Свежие сардины блестят — серебристая чешуя, целые. Рыба маленькая, жирная.
      Рассмотрите размер. Что изменила бы более крупная рыба?
    follow_ups:
      - Чем было бы блюдо без жира?
      - Как размер влияет на приготовление?
      - Какова связь между малым и интенсивным?
  - id: it_burrata_break
    name: Разрыв бурраты
    prompt: |
      Буррату нужно разорвать — внешняя оболочка уступает место крему. Этот
      момент — театрален. Рассмотрите контраст. Внешняя оболочка, внутренняя
      жидкость.
    follow_ups:
      - Чем был бы сыр без разрыва?
      - Как разрыв создает сюрприз?
      - Какова связь между структурой и потоком?
  - id: it_osso_buco_marrow
    name: Костный мозг оссобуко
    prompt: |
      Оссобуко сосредоточено на костном мозге — кость хранит сокровище. Мозг
      маслянистый, насыщенный. Рассмотрите извлечение. Кому достается мозг?
    follow_ups:
      - Чем было бы блюдо без кости?
      - Как мозг завершает тушение?
      - Какова связь между костью и вкусом?
  - id: it_limoncello_shot
    name: Стопка лимончелло
    prompt: |
      Лимончелло подают в охлажденной рюмке — желтый, сладкий, крепкий. Стопка
      — это пунктуация. Откуда лимоны? Что они несут?
    follow_ups:
      - Чем было бы блюдо без лимончелло?
      - Как стопка отмечает конец?
      - Какова связь между лимоном и местом?
  - id: it_sfogliatella_layers
    name: Слои сфольятеллы
    prompt: |
      Сфольятелла имеет сотни тончайших слоев — сложенных, хрустящих.
      Рассмотрите труд. Каждый слой — это решение. Что бы дали меньше слоев?
    follow_ups:
      - Чем было бы пирожное без слоев?
      - Как структура создает текстуру?
      - Какова связь между мастерством и хрустом?
  - id: it_saltimbocca_name
    name: Название сальтимбокка
    prompt: |
      Сальтимбокка означает «прыгает в рот». Название обещает. Оправдывает ли
      блюдо это обещание? Рассмотрите разрыв между названием и опытом.
    follow_ups:
      - Чем было бы блюдо без названия?
      - Как название формирует ожидания?
      - Какова связь между словом и вкусом?
  - id: it_artichoke_prep
    name: Подготовка артишока
    prompt: |
      Артишоки требуют подготовки — удалена сердцевина, обрезаны шипы.
      Рассмотрите отходы. Что выбрасывается? Что ценится? Овощ — это архитектура.
    follow_ups:
      - Каким был бы артишок без подготовки?
      - Как подготовка меняет приготовление?
      - Какова связь между усилием и наградой?
  - id: it_grappa_clear
    name: Чистая граппа
    prompt: |
      Граппа прозрачна — дистиллируется из выжимок. Дух несет призрака
      винограда. Рассмотрите трансформацию. Что остается позади?
    follow_ups:
      - Чем было бы блюдо без граппы?
      - Как дистилляция концентрирует?
      - Какова связь между виноградом и спиртом?
  - id: it_panzanella_soft
    name: Мягкая панцанелла
    prompt: |
      В панцанеллу идет черствый хлеб — размягченный томатным соком, уксусом.
      Хлеб воскрешен. Рассмотрите трансформацию. Что сделал бы свежий хлеб?
    follow_ups:
      - Чем был бы салат без хлеба?
      - Как замачивание меняет текстуру?
      - Какова связь между черствым и возрожденным?
  - id: it_capers_brine
    name: Рассол для каперсов
    prompt: |
      Каперсы — это почки, маринованные в соли. Они создают акценты.
      Рассмотрите рассол. Откуда взялась соль? Что сохраняет маринад?
    follow_ups:
      - Чем было бы блюдо без каперсов?
      - Как рассол меняет почку?
      - Какова связь между сохранением и вкусом?
  - id: it_ravioli_seam
    name: Шов равиоли
    prompt: |
      У равиоли есть шов — место, где тесто защипнуто. Шов может лопнуть.
      Рассмотрите мастерство. Что удерживает начинку?
    follow_ups:
      - Какими были бы равиоли без шва?
      - Как шов защищает начинку?
      - Какова связь между структурой и сюрпризом?
  - id: it_negroni_orange
    name: Апельсин в негрони
    prompt: |
      Негрони подают с апельсином — долькой или цедрой. Цитрус плавает.
      Рассмотрите гарнир. Что он добавляет? Когда вы его пробуете?
    follow_ups:
      - Чем был бы напиток без апельсина?
      - Как гарнир завершает баланс?
      - Какова связь между горечью и цитрусом?
  - id: it_focaccia_dimples
    name: Ямочки на фокачче
    prompt: |
      Фокачча имеет ямочки — оставленные пальцами, заполненные маслом.
      Ямочки удерживают жидкость и соль. Рассмотрите поверхность. Что сделала бы
      плоская верхушка?
    follow_ups:
      - Чем был бы хлеб без ямочек?
      - Как лужицы создают вкус?
      - Какова связь между поверхностью и приправой?
  - id: it_arancini_crust
    name: Корочка аранчини
    prompt: |
      Аранчини — это жареные рисовые шарики — хрустящие снаружи, расплавленные
      внутри. Корочка сдерживает взрыв. Рассмотрите контраст. Что случилось бы
      без жарки?
    follow_ups:
      - Чем был бы шарик без корочки?
      - Как жарка создает удержание?
      - Какова связь между поверхностью и внутренностью?
  - id: it_pecorino_age
    name: Выдержка пекорино
    prompt: |
      Пекорино различается по выдержке — фреско, стаджо́нато. Выдержка меняет
      текстуру, остроту, вкус. Рассмотрите временную шкалу. Что сделал бы более
      выдержанный сыр?
    follow_ups:
      - Какими были бы сыры разной выдержки?
      - Как выдержка концентрирует?
