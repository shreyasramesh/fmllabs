cards:
  - id: sush_rice_temp
    name: ಅಕ್ಕಿಯ ತಾಪಮಾನ
    prompt: |
      ಸುಶಿ ಅಕ್ಕಿ ಬೆಚ್ಚಗಿರುತ್ತದೆ—ದೇಹದ ಉಷ್ಣಾಂಶಕ್ಕೆ ಹತ್ತಿರ. ತಣ್ಣಗಲ್ಲ. ಆ ಬೆಚ್ಚಗಿನವು ವಿನೆಗರ್ ಅನ್ನು ಸಾಗಿಸುತ್ತದೆ. ಅದನ್ನು ಅನುಭವಿಸಿ. ತಣ್ಣಗಿನ ಅಕ್ಕಿ ಏನು ಮಾಡುತ್ತದೆ? ತಾಪಮಾನವು ಕಚ್ಚುವಿಕೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
    follow_ups:
