# المعمل الطهوي — البيتزا (Arabic)

id: culinary_lab_pizza
name: المعمل الطهوي — البيتزا
description: 50 بطاقة لتغيير طريقة تجربتك للبيتزا — من كيمياء العجين والنار إلى مسرح الشرائح وعلم آثار المكونات.
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: مد العجين
    prompt: |
      شاهد العجين وهو يُمد — يُرمى باليد، أو يُضغط. شبكة الغلوتين تتمدد، تحتجز الهواء. يتم اختيار الشكل. ماذا سيعني شريحة مربعة بشكل مختلف عن المثلث؟
    follow_ups:
      - كيف يحدد التمدد التجربة؟
      - ماذا ستكون البيتزا بدون التمدد؟
      - ما العلاقة بين اليد والشكل؟
  - id: piz_oven_breath
    name: أنفاس الفرن
    prompt: |
      فرن البيتزا يتنفس — نار خشب، أو غاز، أو كهرباء. القبة تحتفظ بالحرارة. الأرضية تنقلها. قف بالقرب من واحد. ماذا يتطلب الفرن من الطاهي؟ من العجين؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الفرن؟
      - كيف تشكل الحرارة القشرة؟
      - ما العلاقة بين النفس والبثور؟
  - id: piz_sauce_spiral
    name: حلزون الصلصة
    prompt: |
      غالباً ما تُطبق الصلصة في شكل حلزوني — لا تُوزع حافة إلى حافة. ادرس النمط. ما الذي تغطيه؟ ما الذي تتركه مكشوفاً؟ الحلزون هو تكوين.
    follow_ups:
      - كيف ستبدو البيتزا بالصلصة الكاملة؟
      - كيف يؤثر الحلزون على كل لقمة؟
      - ما العلاقة بين النمط والمذاق؟
  - id: piz_cheese_melt
    name: ذوبان الجبن
    prompt: |
      يذوب الجبن بمعدلات مختلفة. الموزاريلا تتمدد؛ الأجبان المعتقة تُخرج الزيوت. شاهد الذوبان. كيمياء الدهون والبروتين، الحرارة والوقت. متى ينتهي؟
    follow_ups:
      - ماذا ستكون الشريحة بدون التمدد؟
      - كيف يشكل الذوبان اللقمة؟
      - ما العلاقة بين الذوبان والذاكرة؟
  - id: piz_crust_char
    name: تفحم القشرة
    prompt: |
      النمش — بقع التفحم على القشرة — علامات على البيتزا المخبوزة بالخشب. كل بقعة هي لحظة تلامس مع حرارة شديدة. فكر في النكهة التي تضيفها تلك البقع. ماذا ستعني قشرة باهتة؟
    follow_ups:
      - كيف يغير التفحم التجربة؟
      - ماذا ستكون البيتزا بدونه؟
      - ما العلاقة بين التفحم والحرفية؟
  - id: piz_slice_fold
    name: طي الشريحة
    prompt: |
      أسلوب نيويورك: اطوِ الشريحة. الطي هيكلي — يحمل المكونات، ويوجه الدهون. الطي هو رقص. ماذا يُمكّن؟
    follow_ups:
      - ماذا سيكون الأكل بدون الطي؟
      - كيف يشكل الطي اللقمة؟
      - ما العلاقة بين الطي والمكان؟
  - id: piz_pepperoni_cup
    name: كوب البيبروني
    prompt: |
      أكواب البيبروني الجيدة — الحواف مقرمشة، المركز يجمع الزيت. إنه تحول في الشكل والملمس. لاحظ متى يحدث. ما الذي خلق الكوب؟
    follow_ups:
      - ماذا سيكون البيبروني بدون الكوب؟
      - كيف يحتفظ الكوب بالنكهة؟
      - ما العلاقة بين الدهن والشكل؟
  - id: piz_basil_finish
    name: لمسة الريحان النهائية
    prompt: |
      غالباً ما يُضاف الريحان على البيتزا بعد الخبز — طازج، لامع. إنه لمسة نهائية، وليس أساساً. لاحظ التباين. ماذا يضيف الطازج إلى المطبوخ؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الريحان؟
      - كيف يشكل التوقيت العشبة؟
      - ما العلاقة بين النيء والمطبوخ؟
  - id: piz_margherita_minimal
    name: مارغريتا البسيطة
    prompt: |
      مارغريتا هي ثلاثة أشياء: عجين، طماطم، جبن. كل منها يجب أن يتحمل. لا يوجد مكان للاختباء. فكر في الانضباط. ماذا تتطلب البساطة؟
    follow_ups:
      - ماذا ستفعل نغمة واحدة خاطئة؟
      - كيف تركز البساطة الحنك؟
      - ما العلاقة بين القليل والكثير؟
  - id: piz_pool_table
    name: طاولة البلياردو
    prompt: |
      بعض مطاعم البيتزا لديها طاولة جماعية طويلة — غرباء يتشاركون المساحة. تصل البيتزا. الطاولة مسرح. من يأكل بجانبك؟ ما هو العقد غير المعلن؟
    follow_ups:
      - ماذا ستكون الوجبة في كشك؟
      - كيف تشكل الطاولة اللقاء؟
      - ما العلاقة بين المشترك والخاص؟
  - id: piz_box_flip
    name: قلب الصندوق
    prompt: |
      صندوق البيتزا — كرتون، أحياناً مع حامل بلاستيكي ثلاثي في المنتصف. مصمم للتهوية، للتكديس. الصندوق بنية تحتية. ماذا سيكون الطلب الخارجي بدونه؟
    follow_ups:
      - كيف يشكل الصندوق الرحلة إلى المنزل؟
      - ماذا يحدث عندما يُفتح الصندوق؟
      - ما العلاقة بين الصندوق والطقوس؟
  - id: piz_dough_ferment
    name: تخمير العجين
    prompt: |
      عجين البيتزا يتخمر — ساعات أو أيام. الخميرة تخلق فقاعات، نكهة. العجين القديم له حموضة. فكر في الوقت في كل لقمة. ماذا ستضحي عجينة سريعة الارتفاع؟
    follow_ups:
      - كيف يشكل التخمير القشرة؟
      - ما العلاقة بين الوقت والمذاق؟
      - ماذا سيعني عجين نفس اليوم؟
  - id: piz_cornicione
    name: حافة البيتزا
    prompt: |
      الحافة — الطرف، القشرة — غالباً ما تكون الجزء الأفضل. هوائية، متفحمة، ربما لينة قليلاً. البعض يتركها؛ البعض يأكلها أولاً. ما هي علاقتك بالطرف؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الحافة؟
      - كيف تؤطر الحافة المركز؟
      - ما العلاقة بين القشرة والمركز؟
  - id: piz_olive_oil_drizzle
    name: رشة زيت الزيتون
    prompt: |
      زيت زيتون يُرش بعد الخبز — على القشرة، أو على الفطيرة بأكملها. تتلألأ. الزيت يحمل النكهة، ويضيف غنى. لاحظ متى يُطبق. ماذا تضيف الرشة؟
    follow_ups:
      - ماذا ستكون البيتزا بدونه؟
      - كيف يغير الزيت اللقمة؟
      - ما العلاقة بين الدهن واللمسة النهائية؟
  - id: piz_anchovy_salt
    name: ملح الأنشوجة
    prompt: |
      الأنشوجة على البيتزا — مالحة، أومامي، مثيرة للانقسام. تذوب في الصلصة، أو توضع فوقها. الأنشوجة هي علم آثار: متوسطية، محفوظة، قديمة. ما الرحلة التي قامت بها؟
    follow_ups:
      - ماذا ستكون الشريحة بدون الأنشوجة؟
      - كيف يشكل الملح النكهات الأخرى؟
      - ما العلاقة بين المحفوظ والطازج؟
  - id: piz_sound_crunch
    name: صوت القرمشة
    prompt: |
      اللقمة الأولى من قشرة جيدة الصنع — القرمشة، الاستجابة. أغمض عينيك. الصوت جزء من التجربة. ماذا ستكون البيتزا إذا كانت صامتة؟
    follow_ups:
      - كيف يشكل الصوت الرضا؟
      - ماذا يبدو صوت القشرة الرطبة؟
      - ما العلاقة بين القرمشة والجودة؟
  - id: piz_second_slice
    name: الشريحة الثانية
    prompt: |
      الشريحة الثانية تختلف عن الأولى — أنت تعرف البيتزا الآن. الحنك تكيف. لاحظ التحول. هل الشريحة الثانية بنفس الطعم؟ أفضل؟ مختلفة؟
    follow_ups:
      - كيف يغير التكرار الإدراك؟
      - ماذا سيفقد وجبة الشريحة الواحدة؟
      - ما العلاقة بين الأولى والثانية؟
  - id: piz_neapolitan_rules
    name: قواعد نابولي
    prompt: |
      بيتزا نابولي الحقيقية لها قواعد — الحجم، المكونات، الطريقة. ختم VPN، الشهادة. القواعد تخلق الهوية. ماذا تحمي القواعد؟ ماذا تستبعد؟
    follow_ups:
      - ماذا ستكون البيتزا بدون القواعد؟
      - كيف يشكل التصديق التوقعات؟
      - ما العلاقة بين القاعدة والحرفية؟
  - id: piz_detroit_edges
    name: حواف ديترويت
    prompt: |
      أسلوب ديترويت — مستطيل، جبن حتى الحافة، قشرة مقلية مقرمشة حيث تلتقي بالمقلاة. الحواف متعمدة. فكر في الهندسة المعمارية. ماذا يقول الشكل؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الحواف؟
      - كيف يخلق الشكل هوية؟
      - ما العلاقة بين المقلاة والقشرة؟
  - id: piz_garlic_knot
    name: عقدة الثوم
    prompt: |
      عقد الثوم — التواءات عجين، مدهونة بالزبدة، بالثوم. غالباً ما تصل أولاً. ليست بيتزا، لكنها من نفس العالم. ما العلاقة بين العقدة والفطيرة؟
    follow_ups:
      - ماذا ستكون الوجبة بدون العقد؟
      - كيف تحدد العقدة النغمة؟
      - ما العلاقة بين الجانب والرئيسي؟
  - id: piz_red_pepper_flake
    name: رقائق الفلفل الأحمر
    prompt: |
      رشاش رقائق الفلفل الأحمر — غالباً على الطاولة. أنت تختار الحرارة. الرقاقة هي ديمقراطية. الجميع يتبل طعامه الخاص. ماذا يعني هذا الاختيار؟
    follow_ups:
      - ماذا ستكون الطاولة بدون الرشاش؟
      - كيف يشكل التتبيل الذاتي الوجبة؟
      - ما العلاقة بين الاختيار والمذاق؟
  - id: piz_sicilian_slab
    name: لوح صقلي
    prompt: |
      صقلي — سميك، مستطيل، أحياناً مقلوب (الصلصة في الأعلى). اللوح له ثقل. الهندسة المعمارية مختلفة. ماذا يضيف السمك؟ ماذا يضحي؟
    follow_ups:
      - ماذا ستفعل القشرة الرقيقة بشكل مختلف؟
      - كيف يشكل السمك اللقمة؟
      - ما العلاقة بين اللوح والشريحة؟
  - id: piz_wood_stack
    name: كومة الحطب
    prompt: |
      مطاعم البيتزا المخبوزة بالخشب تكدس جذوع الأشجار. البلوط، أحياناً. الخشب هو وقود ونكهة. الكومة استعداد. فكر فيما يحترق. ماذا يضيف الخشب لا يستطيع الغاز إضافته؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الخشب؟
      - كيف يشكل الوقود القشرة؟
      - ما العلاقة بين النار والدخان؟
  - id: piz_topping_balance
    name: توازن المكونات
    prompt: |
      المكونات يمكن أن تطغى — الكثير منها، وتصبح البيتزا يخنة. التوازن دقيق. ادرس فطيرة محملة. أين تعبر الخط؟ ماذا ستزيل؟
    follow_ups:
      - كيف يشكل الامتناع البيتزا؟
      - ما العلاقة بين الأكثر والأقل؟
      - متى يصبح الاختيار فوضى؟
  - id: piz_cold_leftover
    name: بقايا باردة
    prompt: |
      بيتزا باردة على الإفطار — البعض يقسم بها. النكهات هدأت. الملمس تغير. فكر في فطيرة اليوم التالي. ماذا يضيف الوقت؟ ماذا يأخذ؟
    follow_ups:
      - كيف يغير البرد التجربة؟
      - ماذا سيفعل إعادة التسخين؟
      - ما العلاقة بين الطازج والبقايا؟
  - id: piz_sauce_sweet
    name: صلصة حلوة
    prompt: |
      صلصة الطماطم يمكن أن تكون حلوة أو لاذعة، اعتماداً على الطماطم، الطاهي. تذوق الصلصة وحدها إن استطعت. من أين تأتي الحلاوة؟ ماذا ستفعل الحموضة؟
    follow_ups:
      - كيف تحدد الصلصة النغمة؟
      - ما العلاقة بين الحلو والحامض؟
      - ماذا سيعني طماطم نيئة؟
  - id: piz_roman_taglio
    name: بيتزا قطع رومانية
    prompt: |
      بيتزا آل تاغليو — تباع بالقطع، بالوزن. تشير، يقطعون. المستطيل، السعر لكل كيلو. المعاملة مختلفة. ماذا يعني الشراء بالوزن؟
    follow_ups:
      - كيف يشكل التاغليو التجربة؟
      - ماذا سيعني فطيرة كاملة هنا؟
      - ما العلاقة بين القطع والاختيار؟
  - id: piz_hot_honey
    name: عسل حار
    prompt: |
      عسل حار على البيتزا — تقليد جديد، الآن في كل مكان. حلو، حار، لزج. إنه لمسة نهائية. لاحظ متى يُضاف. ماذا يفعل العسل بالجبن؟
    follow_ups:
      - ماذا ستكون الشريحة بدونه؟
      - كيف يشكل الحلو-الحار اللقمة؟
      - ما العلاقة بين الاتجاه والتقليد؟
  - id: piz_pecorino_grate
    name: برش البيكورينو
    prompt: |
      بيكورينو مبروش فوق البيتزا — مالح، حاد. إنه طبقة. الجبن في الأعلى يختلف عن الجبن الذي ذاب. فكر في التسلسل الهرمي. ماذا يضيف البرش؟
    follow_ups:
      - ماذا ستكون البيتزا بدون البيكورينو؟
      - كيف يشكل الجبن الثاني الطبق؟
      - ما العلاقة بين الذوبان والبرش؟
  - id: piz_paddle_slide
    name: انزلاق المجداف
    prompt: |
      المجداف، العصا — خشب أو معدن. يُنزلق العجين عليه، ثم إلى الفرن. الحركة مُتمرّسة. شاهدها. ماذا سيحدث خطأ بدون المهارة؟
    follow_ups:
      - كيف يُمكّن المجداف الخبز؟
      - ما العلاقة بين الأداة والنتيجة؟
      - ماذا سيعني بيتزا ساقطة؟
  - id: piz_sourdough_crust
    name: قشرة عجين مخمر
    prompt: |
      قشرة بيتزا عجين مخمر — تخمير طويل، حموضة. القشرة لها شخصية. ليست محايدة. فكر فيما يضيفه العجين المخمر. ماذا ستفعل الخميرة التجارية بشكل مختلف؟
    follow_ups:
      - كيف يشكل العجين المخمر اللقمة؟
      - ما العلاقة بين التخمير والنكهة؟
      - ماذا ستعني قشرة باهتة؟
  - id: piz_white_pie
    name: فطيرة بيضاء
    prompt: |
      بيتزا بيضاء — بدون طماطم. زيت زيتون، جبن، ربما ثوم. غياب الأحمر يغير كل شيء. يتوقع الحنك الطماطم. ماذا تقدم الفطيرة البيضاء بدلاً من ذلك؟
    follow_ups:
      - ماذا ستكون الفطيرة مع الطماطم؟
      - كيف يشكل الغياب التوقعات؟
      - ما العلاقة بين الأحمر والأبيض؟
  - id: piz_bar_setting
    name: أجواء البار
    prompt: |
      بيتزا في البار — تأكل حيث تطلب. البار مسرح. تشاهد الفرن، الشرائح. الأجواء عادية، فورية. ماذا يضيف الأكل في البار؟
    follow_ups:
      - ماذا سيغير الطاولة؟
      - كيف يشكل القرب التجربة؟
      - ما العلاقة بين البار والمطبخ؟
  - id: piz_truffle_trend
    name: اتجاه الكمأة
    prompt: |
      الكمأة على البيتزا — زيت أو رقائق — أصبحت اختصاراً للفخامة. الرائحة تهيمن. فكر في الاتجاه. ماذا تضيف الكمأة؟ ماذا تخفي؟
    follow_ups:
      - ماذا ستكون البيتزا بدون الكمأة؟
      - كيف تشكل الفخامة اللقمة؟
      - ما العلاقة بين الاتجاه والمذاق؟
  - id: piz_ricotta_dollop
    name: قطعة الريكوتا
    prompt: |
      ريكوتا تُوضع كقطع على البيتزا — باردة، كريمية، متناقضة. لا تذوب مثل الموزاريلا. تبقى. لاحظ فرق درجة الحرارة. ماذا تضيف القطعة؟
    follow_ups:
      - ماذا ستكون الشريحة بدون الريكوتا؟
      - كيف يشكل البرد الساخن؟
      - ما العلاقة بين القطعة والذوبان؟
  - id: piz_slice_count
    name: عدد الشرائح
    prompt: |
      كم عدد الشرائح؟ العدد غالباً ثمانية — أو ستة لفطيرة أصغر. العدد يحدد الحصة، المشاركة. فكر في الرياضيات. ماذا ستعني أربع شرائح؟ اثنتي عشرة؟
    follow_ups:
      - كيف يشكل عدد الشرائح الوجبة؟
      - ما العلاقة بين القطع والمشاركة؟
      - متى يكون العدد مهماً؟
  - id: piz_oven_window
    name: نافذة الفرن
    prompt: |
      الفرن له نافذة — أو لا. مشاهدة البيتزا وهي تُخبز هو مسرح. الجبن يتفجر. القشرة ترتفع. ماذا ستكون التجربة بدون المنظر؟
    follow_ups:
      - كيف يشكل المشاهدة الترقب؟
