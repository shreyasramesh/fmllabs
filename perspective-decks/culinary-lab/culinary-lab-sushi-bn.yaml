# কি কি ল্যাব — সুশি (Bengali)

id: culinary_lab_sushi
name: কি কি ল্যাব — সুশি
description: সুশি অভিজ্ঞতাকে বদলে দেওয়ার জন্য ৫০টি কার্ড — ভাত ও মাছের রসায়ন থেকে শুরু করে কাউন্টার এবং প্রতিটি নেটার উৎসের প্রত্নতত্ত্ব।
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: ভাতের তাপমাত্রা
    prompt: |
      সুশি ভাত উষ্ণ — শরীরের তাপমাত্রার কাছাকাছি, ঠান্ডা নয়। উষ্ণতা ভিনেগার বহন করে। অনুভব করুন। ঠান্ডা ভাত কী করবে? তাপমাত্রা কামড়কে কীভাবে আকার দেয়?
    follow_ups:
      - সাধারণ তাপমাত্রার চাল কি হারাবে?
      - উষ্ণতা কীভাবে স্বাদ বহন করে?
      - তাপমাত্রা এবং টেক্সচারের মধ্যে সম্পর্ক কী?
  - id: sush_shari_balance
    name: শারি (ভাত) ভারসাম্য
    prompt: |
      শারি — ভাত — সুশির অর্ধেক। ভিনেগার, লবণ, চিনির ভারসাম্য সুনির্দিষ্ট। শুধু ভাতটি খান। এটি কী নিয়ে আসে? বিবর্ণ ভাত কী বোঝাবে?
    follow_ups:
      - ভাত কীভাবে নেটা (টপিং) কে আকার দেয়?
      - বেশি ভিনেগার কী করবে?
      - শারি এবং নেটার মধ্যে সম্পর্ক কী?
  - id: sush_counter_ritual
    name: কাউন্টার রীতিনীতি
    prompt: |
      কাউন্টারে ওমাকাসে — আপনি শেফের মুখোমুখি। সুশি এক এক করে আসে। কাউন্টার একটি মঞ্চ। নৃত্যশৈলী লক্ষ্য করুন। ছন্দ কী? কে গতি ঠিক করে?
    follow_ups:
      - টেবিল কী পরিবর্তন করবে?
      - কাউন্টার কীভাবে খাবারকে আকার দেয়?
      - শেফ এবং অতিথির মধ্যে সম্পর্ক কী?
  - id: sush_net_origin
    name: নেটার উৎস
    prompt: |
      প্রতিটি নেটা — টপিং — কোথাও থেকে এসেছে। তোয়োসু। সুকিজি। একটি নৌকা। একটি খামার। জিজ্ঞাসা করুন। মাছটিকে অনুসরণ করুন। এটি কী যাত্রা করেছে? গুদাম থেকে হিমায়িত কী বোঝাবে?
    follow_ups:
      - উৎস কীভাবে টুকরোটিকে আকার দেয়?
      - অন্য উৎস কী করবে?
      - স্থান এবং মানের মধ্যে সম্পর্ক কী?
  - id: sush_wasabi_hidden
    name: লুকানো ওয়াসাবি
    prompt: |
      আসল ওয়াসাবি — কুড়ানো শিকড় — বিরল। বেশিরভাগই হর্সরেডিস এবং রং। কিন্তু যখন এটি আসল, এটি ভিন্ন। তীক্ষ্ণ, সবুজ, ক্ষণস্থায়ী। উষ্ণতা লক্ষ্য করুন। নকল কী যোগ করবে? বিয়োগ করবে?
    follow_ups:
      - ওয়াসাবি কীভাবে কামড়কে আকার দেয়?
      - ওয়াসাবি না থাকা কী বোঝাবে?
      - উষ্ণতা এবং মাছের মধ্যে সম্পর্ক কী?
  - id: sush_finger_over_chopstick
    name: আঙুল চপস্টিকের উপর
    prompt: |
      নিগিরি ঐতিহ্যগতভাবে আঙুল দিয়ে খাওয়া হয় — চপস্টিক দিয়ে নয়। আঙুল তাপমাত্রা, টেক্সচার অনুভব করে। চেষ্টা করুন। আঙুল কী যোগ করে যা চপস্টিক পারে না?
    follow_ups:
      - হাত কীভাবে অভিজ্ঞতাকে আকার দেয়?
      - চপস্টিক কী করবে?
      - স্পর্শ এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: sush_piece_by_piece
    name: টুকরো টুকরো করে
    prompt: |
      সুশি একবারে এক টুকরা — বা দুটি আসে। গতি ইচ্ছাকৃত। আপনি খান; আপনি অপেক্ষা করেন। ছন্দ বিবেচনা করুন। একবারে দশটি প্লেটার কী হারাবে?
    follow_ups:
      - গতি কীভাবে খাবারকে আকার দেয়?
      - দ্রুততা কী করবে?
      - টুকরা এবং মনোযোগের মধ্যে সম্পর্ক কী?
  - id: sush_gari_palate
    name: গারি (আদা) তালু
    prompt: |
      গারি — আচারযুক্ত আদা — টুকরোগুলির মধ্যে পরিষ্কার করে। এটি আলংকারিক নয়; এটি পুনরায় সেট করে। আপনি কখন এটি খান তা লক্ষ্য করুন। গারি ছাড়া পরপর টুকরা তালুকে কী করবে?
    follow_ups:
      - গারি কীভাবে অগ্রগতিকে আকার দেয়?
      - গারি না থাকা কী বোঝাবে?
      - রিসেট এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: sush_soy_minimal
    name: সয়া ন্যূনতম
    prompt: |
      সয়া — একটি হালকা ডুব, মাছের দিক নিচে। ভাত নয়। ভাত বেশি শোষণ করবে। শেফ হয়তো ইতিমধ্যেই সয়া ব্রাশ করেছেন। লক্ষ্য করুন। ডুবিয়ে দিলে কী হবে?
    follow_ups:
      - সয়া কীভাবে টুকরোটিকে আকার দেয়?
      - সয়া না থাকা কী বোঝাবে?
      - ডুব এবং ভারসাম্যের মধ্যে সম্পর্ক কী?
  - id: sush_knife_matters
    name: ছুরির গুরুত্ব
    prompt: |
      সুশি ছুরি — একক-বেভেল, তীক্ষ্ণ। কাটা টেক্সচারকে প্রভাবিত করে। শস্যের সাথে বা বিপরীতে। কোণ। ছুরি কী করে তা বিবেচনা করুন। ভোঁতা ছুরি কী হারাবে?
    follow_ups:
      - কাটা কীভাবে মাছকে আকার দেয়?
      - ভিন্ন কোণ কী করবে?
      - ফলক এবং মুখ অনুভূতির মধ্যে সম্পর্ক কী?
  - id: sush_otoro_fat
    name: ওটোরো ফ্যাট (চর্বি)
    prompt: |
      ওটোরো — সবচেয়ে চর্বিযুক্ত টুনা — গলে যায়। চর্বিই উদ্দেশ্য। মার্বলিং বিবেচনা করুন। চর্বিহীন আকামি কী করবে? চর্বি অভিজ্ঞতাকে কীভাবে আকার দেয়?
    follow_ups:
      - চর্বি ছাড়া টুকরাটি কী হবে?
      - মার্বলিং কীভাবে বিলাসবহুলতা তৈরি করে?
      - চর্বি এবং গলার মধ্যে সম্পর্ক কী?
  - id: sush_unagi_glaze
    name: উনাগি গ্লেজ (প্রলেপ)
    prompt: |
      উনাগি — ইল — মিষ্টি সস দিয়ে ব্রাশ করা হয়, কখনও কখনও আবার গ্রিল করা হয়। গ্লেজ হলো বার্নিশ। ঔজ্জ্বল্য বিবেচনা করুন। গ্লেজ ছাড়া ইল কী হবে?
    follow_ups:
      - গ্লেজ কীভাবে টুকরোটিকে আকার দেয়?
      - মিষ্টি এবং ইল মাছের মধ্যে সম্পর্ক কী?
      - কেন গ্লেজ?
  - id: sush_nori crisp
    name: নোরি মচমচে
    prompt: |
      মাকি-র জন্য নোরি — টোস্ট করা, মচমচে, নাকি নরম? বিভিন্ন শেফ ভিন্নভাবে বেছে নেন। নোরি কামড়কে প্রভাবিত করে। টেক্সচার বিবেচনা করুন। নরম নোরি কী করবে?
    follow_ups:
      - নোরি কীভাবে রোলকে আকার দেয়?
      - ভিন্ন টোস্টিং কী করবে?
      - মচমচে এবং তাজা এর মধ্যে সম্পর্ক কী?
  - id: sush_silence_counter
    name: কাউন্টারে নীরবতা
    prompt: |
      কিছু সুশি কাউন্টার নীরব — মনোযোগ, সম্মান। অন্যগুলো প্রাণবন্ত। শব্দ শুনুন। নীরবতা কী যোগ করে? কথোপকথন কী যোগ করে?
    follow_ups:
      - শব্দ কীভাবে খাবারকে আকার দেয়?
      - উচ্চ সঙ্গীত কী করবে?
      - নীরবতা এবং মনোযোগের মধ্যে সম্পর্ক কী?
  - id: sush_tamago_sweet
    name: তামাকো (ডিমের কাস্টার্ড) মিষ্টি
    prompt: |
      তামাকো — ডিমের কাস্টার্ড — প্রায়শই খাবার শেষ করে। এটি মিষ্টি, স্তরযুক্ত। শেফের দক্ষতা দৃশ্যমান। শেষ বিবেচনা করুন। কাঁচা মাছ শেষ টুকরা হলে কী হবে?
    follow_ups:
      - তামাকো কীভাবে শেষকে আকার দেয়?
      - মিষ্টি এবং সমাপ্তির মধ্যে সম্পর্ক কী?
      - কেন ডিম শেষে?
  - id: sush_tuna_spectrum
    name: টুনা স্পেকট্রাম (বর্ণালী)
    prompt: |
      আকামি, চুটোরো, ওটোরো — চর্বিহীন থেকে চর্বিযুক্ত। স্পেকট্রাম ইচ্ছাকৃত। সম্ভব হলে ক্রমে সেগুলি খান। অগ্রগতি কীভাবে কাজ করে? প্রতিটি কী প্রদান করে?
    follow_ups:
      - চর্বি কীভাবে স্পেকট্রামকে আকার দেয়?
      - একটি গ্রেড একা কী বোঝাবে?
      - চর্বিহীন এবং সমৃদ্ধের মধ্যে সম্পর্ক কী?
  - id: sush_ume_shiso
    name: উমে (প্লাম) শিসো
    prompt: |
      উমে — আচারযুক্ত প্লাম — এবং কিছু রোলে শিসো। টক, ভেষজ। তারা চর্বি কাটায়। তারা কখন আসে তা লক্ষ্য করুন। তারা ছাড়া রোলটি কী হবে?
    follow_ups:
      - উমে কীভাবে কামড়কে আকার দেয়?
      - টক এবং মাছের মধ্যে সম্পর্ক কী?
      - কেন শিসো?
  - id: sush_gunkan_hold
    name: গানকান (যুদ্ধজাহাজ) ধারণ
    prompt: |
      গানকান — যুদ্ধজাহাজ — আলগা টপিং ধারণ করে। রো, সামুদ্রিক আর্চিন। নোরির কলার ধারণ করে। আকার বিবেচনা করুন। একটি সমতল টুকরা কী করবে?
    follow_ups:
      - আকার কীভাবে টপিংকে আকার দেয়?
      - ভিন্ন পাত্র কী করবে?
      - ধারণ এবং ছিটকে পড়ার মধ্যে সম্পর্ক কী?
  - id: sush_uni_risk
    name: উনি (সামুদ্রিক আর্চিন) ঝুঁকি
    prompt: |
      উনি — সামুদ্রিক আর্চিন — বিতর্কিত। মিষ্টি, নোনতা, টেক্সচার। এটি নিখুঁত বা খারাপ হতে পারে। ঝুঁকি বিবেচনা করুন। নিরাপদ স্যামন কী হবে? ঝুঁকি কী যোগ করে?
    follow_ups:
      - উনি কীভাবে অভিজ্ঞতাকে আকার দেয়?
      - ঝুঁকি ছাড়া আপনি কী হারাবেন?
      - বিতর্কিত এবং স্মরণীয়ের মধ্যে সম্পর্ক কী?
  - id: sush_chef_choice
    name: শেফের পছন্দ
    prompt: |
      ওমাকাসে — শেফের পছন্দ। আপনি নিয়ন্ত্রণ ছেড়ে দেন। শেফ দিন, মাছ, আপনাকে বোঝেন। বিশ্বাস বিবেচনা করুন। নিজের পছন্দ করা কী পরিবর্তন করবে?
    follow_ups:
      - আত্মসমর্পণ কীভাবে খাবারকে আকার দেয়?
      - মেনুর অর্ডার কী বোঝাবে?
      - বিশ্বাস এবং অভিজ্ঞতার মধ্যে সম্পর্ক কী?
  - id: sush_sake_pair
