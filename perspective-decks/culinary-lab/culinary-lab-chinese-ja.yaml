# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 中華料理ラボ — 中国 (Japanese)

id: culinary_lab_chinese
name: 中華料理ラボ — 中国
description: 中華料理の体験を変える50枚のカード。鍋の気（wok hei）の化学、醤油の考古学、円卓の振り付け、宴の物語まで。
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: 鍋の気（Wok Hei）
    prompt: |
      鍋の気――鍋の息遣い――は、極度の熱と速さから生まれる捉えどころのない煙です。それは単なるスモーキーさではなく、変容です。
      それを捉えることはできますか？ それなしでは炒め物はどうなるでしょう？
    follow_ups:
      - 鍋の気が料理をどのように形作りますか？
      - それは何を生み出し、何を破壊しますか？
      - 熱と速さの関係は何ですか？
  - id: chn_round_table
    name: 円卓
    prompt: |
      中華料理の宴会テーブルは円形です――中央には回転台があります。料理が回ります。誰もが手を伸ばします。テーブルは振り付けです。誰が回し、誰が待つのか？
      暗黙のルールは何ですか？
    follow_ups:
      - 四角いテーブルはどういう意味でしょう？
      - 円形はどのように食事を形作りますか？
      - 中心と端の関係は何ですか？
  - id: chn_soy_archeology
    name: 醤油の考古学
    prompt: |
      醤油――発酵され、熟成され、地域的。淡口、濃口、きのこ、ダブルブラック。
      それはどこかから来たのです。時間がかかりました。ボトルの跡をたどってください。それはどのような旅をしたのでしょう？
      工業用の醤油は何を犠牲にするでしょう？
    follow_ups:
      - 産地はどのように注ぎ方を形作りますか？
      - 醤油なしでは料理はどうなるでしょう？
      - 発酵と旨味の関係は何ですか？
  - id: chn_chopstick_grip
    name: 箸の持ち方
    prompt: |
      箸は手を拡張します。米、滑りやすい麺、餃子――それぞれ異なる技術を要求します。あなたの握り方を見てください。
      道具は何を要求しますか？ それは何を可能にしますか？
    follow_ups:
      - フォークはどう変わるでしょう？
      - 箸はどのように一口を形作りますか？
      - 道具とペースの関係は何ですか？
  - id: chn_dumpling_seam
    name: 餃子のひだ
    prompt: |
      餃子のひだ――折り目、封。餃子、焼売、小籠包――それぞれに形があります。
      ひだは閉じたり開いたりします。一つを調べてください。破裂したらどうなるでしょう？
      ひだは何を守りますか？
    follow_ups:
      - 折り目はどのように具材を形作りますか？
      - 開いた餃子は何を失うでしょう？
      - ひだとスープの関係は何ですか？
  - id: chn_tea_pour
    name: お茶の注ぎ方
    prompt: |
      中華茶――注がれ、注ぎ足され、共有されます。急須が回ります。空のカップは頼まれる前に満たされます。
      注ぐことはサービスであり、気遣いです。リズムに気づいてください。お茶なしでは食事はどうなるでしょう？
    follow_ups:
      - お茶はどのようにペースを形作りますか？
      - 注ぎ方は何を伝えますか？
      - カップとテーブルの関係は何ですか？
  - id: chn_bone_plate
    name: 骨皿
    prompt: |
      骨のための小皿――食べ残した殻、鶏の骨、エビの殻。
      皿は食べられないものを集めます。それはセッティングの一部です。
      骨皿は何を可能にしますか？ それがないとどうなるでしょう？
    follow_ups:
      - 皿はどのように食事を形作りますか？
      - 皿なしではテーブルはどう見えるでしょう？
      - 廃棄と品位の関係は何ですか？
  - id: chn_soup_spoon
    name: スープスプーン
    prompt: |
      中華スープスプーン――広く、浅く、陶器製。スープと具材を両方すくえます。
      スプーンは口に合う形状が異なります。一口を味わってください。
      その形は何を可能にしますか？
    follow_ups:
      - 丸いスプーンはどう変わるでしょう？
      - スプーンはどのように一口を形作りますか？
      - 形と機能の関係は何ですか？
  - id: chn_steam_basket
    name: 蒸し器（竹かご）
    prompt: |
      点心は竹かごに入って届きます――積み重ねられ、層になっています。蒸気が立ち上ります。
      かごは形を保ちます。竹を考えてみてください。金属はどう違うでしょう？
      竹は何を加えますか？
    follow_ups:
      - かごはどのように餃子を形作りますか？
      - 皿は何を失うでしょう？
      - 竹と蒸気の関係は何ですか？
  - id: chn_maillard_wok
    name: 鍋（Maillard反応）
    prompt: |
      鍋は家庭用コンロでは到達できない温度に達します。焦げ付きは瞬時です。
      タンパク質は数秒で茶色くなります。化学反応を考えてください。
      低い温度では何を犠牲にするでしょう？ 鍋は何を要求しますか？
    follow_ups:
      - 熱はどのように風味を形作りますか？
      - 電熱鍋はどう違うでしょう？
      - 火と皮の関係は何ですか？
  - id: chn_glutinous_texture
    name: もち米の食感
    prompt: |
      もち米――粘り気があり、噛み応えがある――は異なる化学的性質を持っています。
      粽子、糯米鶏、デザートに使われます。食感を味わってください。
      長粒米とどう違いますか？ 粘り気は何を可能にしますか？
    follow_ups:
      - 普通の米はどうでしょう？
      - 食感はどのように料理を形作りますか？
      - 粘りと包むことの関係は何ですか？
  - id: chn_century_egg
    name: ピータン
    prompt: |
      ピータン――保存され、変容したものです。黄身は暗く、白身は半透明です。
      化学は古代のものです。保存を考えてみてください。時間は何をするのでしょう？
      新鮮な卵はどうなるでしょう？
    follow_ups:
      - 保存はどのように風味を形作りますか？
      - 卵が新鮮だったらどうなるでしょう？
      - 時間と変容の関係は何ですか？
  - id: chn_oyster_sauce
    name: オイスターソース
    prompt: |
      オイスターソース――旨味、濃厚、広東風。それは還元と抽出です。
      牡蠣がそのエッセンスを与えます。風味をたどってください。
      それなしでは炒め物はどうなるでしょう？
    follow_ups:
      - ソースはどのように料理を形作りますか？
      - 牡蠣と野菜の関係は何ですか？
      - 醤油ではどうでしょう？
  - id: chn_ordering_ritual
    name: 注文の儀式
    prompt: |
      中華料理店での注文――主人が選ぶか、テーブルで交渉するか。
      バランス：肉、野菜、スープ、米。注文は構成です。
      誰が決めるか見てください。ルールは何ですか？
    follow_ups:
      - 注文はどのように食事を形作りますか？
      - みんなが自分の分を注文したらどうなるでしょう？
      - 選択と集団の関係は何ですか？
  - id: chn_crispy_skin
    name: 皮のパリパリ感
    prompt: |
      北京ダックの皮――パリパリで、照りがあります。あるいは広東風ローストポークの皮。
      皮は意図的です。熱、空気、砂糖。建築を考えてください。
      湿った皮はどういう意味でしょう？
    follow_ups:
      - パリパリ感はどのように一口を形作りますか？
      - パリパリ音は何が生み出しますか？
      - 皮と肉の関係は何ですか？
  - id: chn_noodle_slip
    name: 麺の滑り
    prompt: |
      中華麺――小麦、米、手打ち――は食感が異なります。滑るものもあれば、噛み応えのあるものもあります。
      麺が箸に触れる感覚。抵抗に気づいてください。
      滑りは何を加えますか？
    follow_ups:
      - 食感はどのように食べ方を形作りますか？
      - ぐちゃぐちゃの麺は何を失うでしょう？
      - 滑りと満足感の関係は何ですか？
  - id: chn_bok_choy_wilt
    name: 青梗菜のしおれ
    prompt: |
      中華鍋の中の青梗菜――数秒。しおれますが、形は保ちます。緑が柔らかくなります。
      変容を考えてください。生のままはどうでしょう？ 茹ですぎると何を失うでしょう？
    follow_ups:
      - しおれはどのように野菜を形作りますか？
      - 熱と緑の関係は何ですか？
      - いつできあがりですか？
  - id: chn_five_spice
    name: 五香粉
    prompt: |
      五香粉――スターアニス、クローブ、シナモン、四川山椒、フェンネル。
      歴史のあるブレンドです。それぞれのスパイスにはルートがあります。一つをたどってください。
      それはどのような旅をしたのでしょう？
    follow_ups:
      - それなしでは料理はどうなるでしょう？
      - ブレンドはどのように個性を生み出しますか？
      - スパイスと保存の関係は何ですか？
  - id: chn_banquet_progression
    name: 宴の進行
    prompt: |
      中華料理の宴会には流れがあります――冷菜から始まり、温菜、スープ、ご飯、デザート。
      進行は物語です。リズムに気づいてください。
      違う順番だとどうなるでしょう？
    follow_ups:
      - 順番はどのように食事を形作りますか？
      - 最初と最後との関係は何ですか？
      - 物語はいつクライマックスを迎えますか？
  - id: chn_white_rice_center
    name: 白米の中心
    prompt: |
      白米――シンプルで蒸したもの――が食事を支えます。それはキャンバスです。
      濃厚な料理には、バランスを取るために米が必要です。
      いつ米に手を伸ばすか見てください。質素なものなしでは食事はどうなるでしょう？
    follow_ups:
      - 米はどのように味覚を形作りますか？
      - チャーハンはどうでしょう？
      - 中立と風味の関係は何ですか？
  - id: chn_szechuan_numb
    name: 麻辣（四川の痺れ）
    prompt: |
      花椒――麻辣――痺れ、ピリピリ感。辛さではなく、感覚です。
      口がビリビリします。感覚を考えてください。
      痺れなしでは料理はどうなるでしょう？
    follow_ups:
      - 麻辣はどのように体験を形作りますか？
      - 痺れと辛さの関係は何ですか？
      - なぜペアにするのですか？
  - id: chn_dark_soy
    name: 濃口醤油
    prompt: |
      濃口醤油――より濃厚で甘みがあり、色付け用。ご飯を染め、肉に照りをつけます。
      塩分のためではなく、色のためです。視覚を考えてください。
      濃い色は、何を加えますか？
    follow_ups:
      - 薄口醤油はどうでしょう？
      - 色はどのように期待を形作りますか？
      - 濃い色とキャラメルの関係は何ですか？
  - id: chn_hot_plate
    name: 熱々の鉄板
    prompt: |
      熱々の鉄板――牛肉、イカ――がジュージューと音を立てて運ばれてきます。鉄板は調理を続けます。
      音は劇場です。
      ジュージューという音なしでは料理はどうなるでしょう？ 熱々の鉄板は調理時間をどのように延長しますか？
    follow_ups:
      - ジュージューという音はどのように体験を形作りますか？
      - 冷たい鉄板はどういう意味でしょう？
      - 音と熱の関係は何ですか？
  - id: chn_congee_soft
    name: お粥（柔らかい）
    prompt: |
      お粥――米の粥――は柔らかく、心地よいです。長時間煮込まれた米が崩れます。
      食感は「降伏」です。変容を考えてください。
      アルデンテはどういう意味でしょう？
    follow_ups:
      - 柔らかさはどのように料理を形作りますか？
      - 濃いお粥はどうでしょう？
      - 水と米の関係は何ですか？
  - id: chn_glass_noodle
    name: 春雨
    prompt: |
      春雨――緑豆でんぷん――は透明で滑りやすいです。風味を吸収します。
      食感を味わってください。小麦麺はどうでしょう？
      透明さはなぜ重要ですか？
    follow_ups:
      - 麺はどのように料理を形作りますか？
      - 透明と吸収の関係は何ですか？
      - なぜガラス（透明）なのですか？
  - id: chn_xlb_burst
    name: 小籠包の破裂
    prompt: |
      小籠包――スープの包子――は中にスープが入っています。最初の一口は火傷するか、破裂する可能性があります。
      技法：つまんで、すすって、食べる。リスクを考えてください。
      冷めた小籠包はどういう意味でしょう？
    follow_ups:
      - スープはどのように体験を形作りますか？
      - 破裂なしでは何を失いますか？
      - 温度と危険の関係は何ですか？
  - id: chn_tea_smell
    name: お茶の香り
    prompt: |
      烏龍茶、ジャスミン茶、プーアル茶――それぞれのお茶は異なる香りを持ちます。一口飲む前に香りを嗅いでください。
      香りは体験の半分です。香りは何を約束しますか？
      それは何をもたらしますか？
    follow_ups:
      - 香りはどのように一口を形作りますか？
      - 香りなしではお茶はどうなるでしょう？
      - 蒸らしと香りの関係は何ですか？
  - id: chn_crab_crack
    name: カニの殻割り
    prompt: |
      中華宴会でのカニ――クラッカーが用意されています。殻を割る音と手間。
      身が取り出されます。振り付けを考えてください。
      すでに割られたものだったらどうなるでしょう？
    follow_ups:
      - 殻割りがどのように食事を形作りますか？
      - 手間なしでは何を失いますか？
      - 努力と報酬の関係は何ですか？
  - id: chn_turn_table
    name: 回転台
    prompt: |
      回転台――誰が回すのか？ いつ？ 欲しい料理がテーブルの向こう側にあるかもしれません。
      回転はエチケットです。ダンスに気づいてください。ルールは何ですか？
      いつ待ちますか？
    follow_ups:
      - 回転はどのように食事を形作りますか？
      - 固定された料理はどういう意味でしょう？
      - 回転と共有の関係は何ですか？
  - id: chn_ginger_slice
    name: 生姜のスライス
    prompt: |
      魚介類と生姜――細いスライス、時々揚げたもの。魚臭さを消します。
      生姜は飾りであり、機能でもあります。その役割を考えてください。
      それなしでは魚はどうなるでしょう？
    follow_ups:
      - 生姜はどのように味覚を形作りますか？
      - スライスと香りの関係は何ですか？
      - なぜ魚介類と生姜なのですか？
  - id: chn_hoisin_dip
    name: ホイシンソースのつけ方
    prompt: |
      北京ダックとホイシンソース――つけるのは儀式です。パンケーキ、ダック、ネギ、ソース。
      各要素には場所があります。構成を考えてください。
      一つ欠けたらどうなるでしょう？
    follow_ups:
      - つけ方がどのように一口を形作りますか？
      - 別のソースはどうでしょう？
      - 甘さとダックの関係は何ですか？
  - id: chn_leaf_wrap
    name: 葉っぱで包む
    prompt: |
      レタスラップ――ひき肉、ハーブ、ソースを葉で包みます。葉は容器であり、食感です。
      包むのは手作業です。建築を考えてください。
      トルティーヤはどうでしょう？
    follow_ups:
      - 葉はどのように一口を形作りますか？
      - 皿はどうでしょう？
      - 包むことと手の関係は何ですか？
  - id: chn_fish_whole
    name: 魚（丸ごと）
    prompt: |
      丸ごと魚――蒸し、頭と尾をつけたまま。魚はそのまま提供されます。
      頭には意味があります。提供方法を考えてください。
      切り身だと何を犠牲にするでしょう？
    follow_ups:
      - 丸ごとはどのように料理を形作りますか？
      - 頭は何を意味しますか？
      - 丸ごとと尊敬の関係は何ですか？
  - id: chn_scallion_oil
    name: ネギ油
    prompt: |
      ネギ油――刻んだネギと生姜に熱い油をかける。ドレッシングであり、仕上げです。
      油が香りを運びます。いつかけるか見てください。
      熱々の油は何を加えますか？
    follow_ups:
      - それなしでは料理はどうなるでしょう？
      - 油はどのように仕上げを形作りますか？
      - 油と香りの関係は何ですか？
  - id: chn_black_vinegar
    name: 黒酢
    prompt: |
      鎮江香醋――黒く、複雑で、わずかに甘い。濃厚さを和らげます。
      数滴で餃子を変えます。酸味を考えてください。
      米酢はどうでしょう？ 濃い色は、何を加えますか？
    follow_ups:
      - 酢はどのように一口を形作りますか？
      - それなしでは餃子はどうなるでしょう？
      - 酢とバランスの関係は何ですか？
  - id: chn_sticky_rice
    name: もち米
    prompt: |
      蓮の葉に包まれたもち米――糯米鶏。葉が風味を移します。米は包まれ、蒸されます。
      開けてみてください。香りを味わってください。
      アルミホイルはどうでしょう？
    follow_ups:
      - 葉はどのように米を形作りますか？
      - 包むことと蒸気の関係は何ですか？
      - 包まれていない状態はどういう意味でしょう？
  - id: chn_mooncake_mold
    name: 月餅の型
    prompt: |
      月餅――文字や模様が刻印されています。型は歴史です。
      デザインには意味があります。刻印を考えてください。
      プレーンなケーキだと何を失うでしょう？
    follow_ups:
      - 型はどのようにケーキを形作りますか？
      - 模様は何を意味しますか？
      - 刻印と伝統の関係は何ですか？
  - id: chn_egg_tart
    name: エッグタルト
    prompt: |
      エッグタルト――ポルトガルの影響、香港の洗練。カスタード、パイ生地。
      食感を考えてください。サクサク、とろとろ。
      違う生地だったらどうでしょう？
    follow_ups:
      - タルトはどのように食事の締めくくりを形作りますか？
      - カスタードとサクサク感の関係は何ですか？
      - なぜエッグタルトで締めるのですか？
  - id: chn_hand_pull
    name: 手打ち麺
    prompt: |
      手打ち麺――職人が伸ばし、折り、引きます。麺が増殖します。
      それはパフォーマンスです。見てください。
      機械麺だと何を犠牲にするでしょう？
    follow_ups:
      - 麺の引き方はどのように麺を形作りますか？
      - 手と食感の関係は何ですか？
      - 均一な麺はどういう意味でしょう？
  - id: chn_bird_nest
    name: 鳥の巣
    prompt: |
      鳥の巣――スープのツバメの巣ではなく、タロイモの巣、あるいは炒め物を乗せるパリパリの麺の巣。
      巣は建築です。形を考えてください。
      巣は何を加えますか？
    follow_ups:
      - 巣はどのように料理を形作りますか？
      - 皿はどうでしょう？
      - 器と内容物の関係は何ですか？
  - id: chn_red_envelope
    name: 赤い封筒
    prompt: |
      宴会では、赤い封筒が贈り物として添えられることがあります――キッチンへのお金、主催者へのお金。
      封筒は儀式です。交換を考えてください。
      赤は何を意味しますか？
    follow_ups:
      - 封筒はどのように機会を形作りますか？
      - 封筒がなかったらどうなるでしょう？
      - 贈り物と「面子」の関係は何ですか？
  - id: chn_toasting_ritual
    name: 乾杯の儀式
    prompt: |
      乾杯――「ガンベイ」――あるいはカジュアルな一口。乾杯は宴会を構造化します。
      誰が誰に乾杯しますか？ いつ？ 儀式は社会的です。振り付けに気づいてください。
      乾杯なしでは食事はどうなるでしょう？
    follow_ups:
      - 乾杯はどのように食事を形作りますか？
      - 乾杯と階級の関係は何ですか？
      - いつ飲みますか？
  - id: chn_preserved_veg
    name: 保存野菜
    prompt: |
      ザーサイ、漬け大根、発酵白菜――これらは深みを加えます。
      これらは古代の保存方法です。変容を考えてください。
      新鮮な野菜はどうでしょう？
    follow_ups:
      - 保存はどのように料理を形作りますか？
      - 漬物と旨味の関係は何ですか？
      - なぜ保存なのですか？
  - id: chn_sweet_sour
    name: 甘酢っぱい
    prompt: |
      甘酢っぱい――バランスは意図的です。砂糖、酢、時にはケチャップ。
      ソースは大胆です。組み合わせを考えてください。
      片方だけだったらどうなるでしょう？
    follow_ups:
      - バランスはどのように料理を形作りますか？
      - 甘さと酸っぱさの関係は何ですか？
      - なぜこの組み合わせなのですか？
  - id: chn_wonton_soup
    name: ワンタンスープ
    prompt: |
      澄んだスープに入ったワンタン――スープはシンプルです。ワンタンが浮かんでいます。スープは澄んでいます。
      揚げワンタンとの対比を考えてください。
      スープは何を加えますか？
    follow_ups:
      - スープはどのようにワンタンを形作りますか？
      - 揚げるとどうなるでしょう？
      - 透明と濃厚さの関係は何ですか？
  - id: chn_cold_dish_start
    name: 冷菜の始まり
    prompt: |
      冷菜で食事が始まります――酔っぱらい鶏、クラゲ、漬物。それらは味覚を目覚めさせます。
      その後の料理との対比。始まりを考えてください。
      熱い料理から始まったらどうなるでしょう？
    follow_ups:
      - 冷たい料理はどのように食事を形作りますか？
      - 最初と次との関係は何ですか？
      - なぜ冷たい料理から始まるのですか？
  - id: chn_fried_rice_wok
    name: チャーハン（中華鍋）
    prompt: |
      チャーハンには中華鍋が必要です――高温、素早い炒め。理想は一晩経ったご飯。
      粒が分かれます。技術を考えてください。
      フライパンだと何を犠牲にするでしょう？
    follow_ups:
      - 中華鍋はどのようにご飯を形作りますか？
      - 新しいご飯はどうでしょう？
      - 熱と分離の関係は何ですか？
  - id: chn_lychee_dessert
    name: ライチのデザート
    prompt: |
      デザートにライチ――生、缶詰、シロップ漬け。果物は食事を締めくくります。
      甘く、香りが高い。終わりを考えてください。
      他の果物だったらどうでしょう？
    follow_ups:
      - ライチはどのように締めくくりを形作りますか？
      - 果物とフィナーレの関係は何ですか？
      - なぜライチなのですか？
  - id: chn_fortune_cookie
    name: フォーチュンクッキー
    prompt: |
      フォーチュンクッキー――アメリカで生まれた中華料理。クッキーは劇場です。割ってみてください。
      占いを読んでください。クッキーは本格的ではありませんが、儀式です。
      その場所を考えてください。
    follow_ups:
      - それなしでは食事がどう終わるでしょう？
      - 占いはどのように締めくくりを形作りますか？
      - クッキーと期待の関係は何ですか？
  - id: chn_century_egg
    name: ピータン
    prompt: |
      ピータン――灰、粘土、石灰で保存されます。黄身は灰緑色になり、白身はゼリー状に濃くなります。
      数週間にわたる変容です。考古学を考えてください。
      新鮮な卵はどうなるでしょう？ 保存は何を加えますか？
    follow_ups:
      - 保存はどのように食感を形作りますか？
      - それなしでは料理はどうなるでしょう？
      - 時間と変容の関係は何ですか？
