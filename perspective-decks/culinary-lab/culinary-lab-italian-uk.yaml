# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулінарна лабораторія — Італія (Ukrainian)

id: culinary_lab_italian
name: Кулінарна лабораторія — Італія
description: 50 карток, щоб змінити ваше сприйняття італійської їжі — від хімії оливкової олії та кислоти до соціальної хореографії столу та археології кожного інгредієнта.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: Трансформація помідора
    prompt: |
      Сирий помідор стає чимось іншим під впливом тепла та часу. Відстежте цю дугу.
      Що відбувається з кислотністю? З текстурою? Помідор несе в собі подорож.
    follow_ups:
      - Як соус змінює смак?
      - Що було б втрачено без трансформації?
      - Який зв'язок між сирим і приготованим?
  - id: it_bread_arrival
    name: Прибуття хліба
    prompt: |
      Хліб подають перед їжею — іноді теплий, іноді з олією. Зверніть увагу
      на порядок речей. Хліб — це початок. Хто вирішує, коли їсти?
    follow_ups:
      - Чим би була страва без хліба?
      - Як хліб задає темп?
      - Який зв'язок між хлібом і очікуванням?
  - id: it_pasta_shape
    name: Форма пасти
    prompt: |
      Кожна форма пасти по-різному утримує соус — виступи, порожнини, вигини. Виберіть
      одну страву і запитайте: чому саме ця форма для цього соусу? Форма — це рішення.
    follow_ups:
      - Що змінилося б з іншою формою?
      - Як форма впливає на процес їжі?
      - Який зв'язок між формою та функцією?
  - id: it_basil_fragrance
    name: Аромат базиліку
    prompt: |
      Базилік досягає носа перед ротом. Заплющте очі та знайдіть трави.
      Де вона знаходиться в страві? Аромат — це карта.
    follow_ups:
      - Чим би була страва без запаху?
      - Як аромат готує смакові рецептори?
      - Який зв'язок між ароматом і смаком?
  - id: it_olive_oil_pool
    name: Калюжа оливкової олії
    prompt: |
      Оливкова олія утворює калюжу на поверхні або покриває тарілку. Спостерігайте, як вона рухається.
      Олія несе смак та жир. Що вона пов'язує?
    follow_ups:
      - Чим би була страва без олії?
      - Як олія змінює відчуття в роті?
      - Який зв'язок між олією та теплом?
  - id: it_parmesan_shatter
    name: Хрускіт пармезану
    prompt: |
      Свіжо натертий пармезан має кристалічний хрускіт. Прислухайтеся до нього.
      Сир — це текстура стільки ж, скільки й смак. Як він доповнює кожен шматок?
    follow_ups:
      - Чим би була страва без хрускоту?
      - Як сир доповнює смак?
      - Який зв'язок між сиром і сіллю?
  - id: it_espresso_ritual
    name: Ритуал еспресо
    prompt: |
      Еспресо подають наприкінці — маленька чашка, без молока. Ритуал означає завершення.
      Хто п'є його стоячи? Хто сидить? Еспресо — це пунктуація.
    follow_ups:
      - Чим би була їжа без еспресо?
      - Як ритуал формує час?
      - Який зв'язок між кавою та завершенням?
  - id: it_antipasti_sequence
    name: Послідовність антипасті
    prompt: |
      Антипасті подають спочатку — маленькі тарілки, спільні або індивідуальні. Зверніть увагу на послідовність.
      Яка логіка порядку? Початок задає тон.
    follow_ups:
      - Що змінилося б, якби порядок був зворотнім?
      - Як послідовність створює апетит?
      - Який зв'язок між першим і останнім?
  - id: it_wine_pour
    name: Розлив вина
    prompt: |
      Вино розливають — хто наливає? Скільки? Розлив — це соціальна хореографія. Спостерігайте
      за жестами. Що вони говорять?
    follow_ups:
      - Чим би був стіл без вина?
      - Як розлив створює церемонію?
      - Який зв'язок між розливом і темпом?
  - id: it_risotto_stir
    name: Помішування різотто
    prompt: |
      Різотто вимагає постійного помішування. Крохмаль вивільняється повільно. Розгляньте
      труд у цій мисці. Що сталося б без помішування?
    follow_ups:
      - Чим би був рис без кремоподібності?
      - Як помішування змінює текстуру?
      - Який зв'язок між працею та результатом?
  - id: it_porcini_earth
    name: Землястий смак білих грибів
    prompt: |
      Білі гриби мають смак лісової підстилки — умамі, земля, гниття. Відстежте гриб
      до його походження. Де він ріс? Під якими деревами?
    follow_ups:
      - Чим би була страва без землістості?
      - Як походження формує смак?
      - Який зв'язок між грибом і лісом?
  - id: it_plate_negative_space
    name: Негативний простір тарілки
    prompt: |
      Італійська подача часто залишає простір — тарілка не заповнена. Розгляньте
      порожнечу. Що вона обрамляє? Що вона дозволяє?
    follow_ups:
      - Як би виглядала страва, повністю покрита?
      - Як негативний простір фокусує погляд?
      - Який зв'язок між порожнім і повним?
  - id: it_garlic_sizzle
    name: Шипіння часнику
    prompt: |
      Часник потрапляє в гарячу олію — шипіння — це хімія. Слухайте. Нюхайте. Цей момент
      швидкоплинний. Що б згоріло? Що було б втрачено?
    follow_ups:
      - Чим би була страва без шипіння?
      - Як час формування смаку впливає на смак?
      - Який зв'язок між теплом і ароматом?
  - id: it_crust_bubbles
    name: Бульбашки скоринки
    prompt: |
      Скоринка фокаччі або піци утворює бульбашки в духовці. Кожна бульбашка — це
      кишеня пари. Розгляньте архітектуру м'якушки.
    follow_ups:
      - Чим би був хліб без бульбашок?
      - Як м'якушка утримує олію та сіль?
      - Який зв'язок між повітрям і структурою?
  - id: it_prosciutto_slice
    name: Скибочка прошутто
    prompt: |
      Прошутто нарізають тонко — майже напівпрозоро. Ніж має значення. Розгляньте
      майстерність. Що б зробила товста скибочка?
    follow_ups:
      - Чим би була м'ясна нарізка без тонкості?
      - Як товщина впливає на танення?
      - Який зв'язок між скибочкою та насолодою?
  - id: it_balsamic_drop
    name: Крапля бальзамічного оцту
    prompt: |
      Витриманий бальзамічний оцет видають краплями — дорогоцінний, цінний. Спостерігайте за
      в'язкістю. Крапля — це концентрат. Що вона додає?
    follow_ups:
      - Чим би була страва без кислоти?
      - Як крапля проникає крізь жир?
      - Який зв'язок між солодким і кислим?
  - id: it_gnocchi_pillow
    name: Подушка ньоккі
    prompt: |
      Ньоккі мають бути легкими — подушечками, а не камінням. Відчуйте текстуру.
      Співвідношення картоплі та борошна делікатне. Що робить їх вдалими?
    follow_ups:
      - Чим би були ньоккі, якби були надто важкими?
      - Як текстура визначає страву?
      - Який зв'язок між картоплею та борошном?
  - id: it_salt_block
    name: Соляний блок
    prompt: |
      Деякі італійські кухні використовують соляні блоки для гриля. Розгляньте мінерал.
      Звідки взялася сіль? Що вона надає?
    follow_ups:
      - Чим би було м'ясо без солі?
      - Як блок змінює приготування?
      - Який зв'язок між сіллю та вогнем?
  - id: it_cacio_e_pepe
    name: Качо е пепе
    prompt: |
      Качо е пепе — це сир, перець, вода від пасти. Три інгредієнти. Емульсія — це
      хитрість. Що її тримає разом? Що її руйнує?
    follow_ups:
      - Чим би була страва без емульсії?
      - Як вода від пасти пов'язує?
      - Який зв'язок між простотою та технікою?
  - id: it_cannoli_crunch
    name: Хрускіт каннолі
    prompt: |
      Оболонка каннолі розсипається; начинка гладенька. Контраст навмисний.
      Розгляньте архітектуру шматочка.
    follow_ups:
      - Чим би був десерт без контрасту?
      - Як текстура створює задоволення?
      - Який зв'язок між оболонкою та начинкою?
  - id: it_risotto_clock
    name: Годинник різотто
    prompt: |
      Різотто має вікно — аль денте, а потім зникає. Кухар змагається з часом.
      Розгляньте точність. Що зробили б п'ять додаткових хвилин?
    follow_ups:
      - Чим би був рис, якби його переварили?
      - Як час формування страви визначає страву?
      - Який зв'язок між годинником і майстерністю?
  - id: it_truffle_shave
    name: Нарізка трюфеля
    prompt: |
      Трюфель нарізають за столом — ритуал, аромат. Трюфель швидкоплинний. Звідки він взявся? Яка тварина його знайшла?
    follow_ups:
      - Чим би була страва без церемонії?
      - Як нарізка розподіляє смак?
      - Який зв'язок між ритуалом і рідкістю?
  - id: it_spaghetti_twist
    name: Скручування спагетті
    prompt: |
      Італійці скручують спагетті виделкою — без ложки. Скручування — це культурно.
      Спостерігайте за рухом. Чого це досягає?
    follow_ups:
      - Чим би був шматок без скручування?
      - Як жест формує страву?
      - Який зв'язок між столовим прибором і традицією?
  - id: it_caprese_layers
    name: Шари Капрезе
    prompt: |
      Капрезе складається з помідора, моцарели, базиліку. Шари прості. Розгляньте
      колір — червоний, білий, зелений. Тарілка — це прапор.
    follow_ups:
      - Чим би була страва без порядку?
      - Як шари створюють гармонію?
      - Який зв'язок між кольором і смаком?
  - id: it_polenta_set
    name: Застигання поленти
    prompt: |
      Полента застигає під час охолодження — від м'якої до твердої. Розгляньте температуру. Що
      було б з нею гарячою? Холодною? Текстура — це функція часу.
    follow_ups:
      - Чим би була полента, якби ніколи не охолола?
      - Як застигання змінює страву?
      - Який зв'язок між теплом і структурою?
  - id: it_amaro_finish
    name: Завершення амаро
    prompt: |
      Амаро завершує їжу — гіркий, травний. Гіркота навмисна.
      Що вона робить з язиком? З тілом?
    follow_ups:
      - Чим би була їжа без амаро?
      - Як гіркота очищує язик?
      - Який зв'язок між гіркотою та завершенням?
  - id: it_lardo_spread
    name: Розлив Лардо
    prompt: |
      Лардо — це в'ялене свиняче сало — намазують на хліб, воно тане. Розгляньте жир. Звідки
      він взявся? Що він несе?
    follow_ups:
      - Чим би був хліб без лардо?
      - Як жир несе смак?
      - Який зв'язок між жиром і збереженням?
  - id: it_sardine_silver
    name: Срібло сардин
    prompt: |
      Свіжі сардини блищать — срібляста шкіра, цілі. Риба невелика, жирна. Розгляньте
      масштаб. Що б змінила більша риба?
    follow_ups:
      - Чим би була страва без олії?
      - Як розмір впливає на приготування?
      - Який зв'язок між малим і інтенсивним?
  - id: it_burrata_break
    name: Розрив бурати
    prompt: |
      Бурату потрібно розривати — зовнішня оболонка поступається місцем крему. Цей момент
      театральний. Розгляньте контраст. Зовнішня оболонка, внутрішня рідина.
    follow_ups:
      - Чим би був сир без розриву?
      - Як розрив створює несподіванку?
      - Який зв'язок між структурою та потоком?
  - id: it_osso_buco_marrow
    name: Кістковий мозок оссобуко
    prompt: |
      Оссобуко зосереджується на кістковому мозку — кістка містить скарб. Мозок
      маслянистий, насичений. Розгляньте видобуток. Хто отримує кістковий мозок?
    follow_ups:
      - Чим би була страва без кістки?
      - Як кістковий мозок доповнює тушкування?
      - Який зв'язок між кісткою і смаком?
  - id: it_limoncello_shot
    name: Шот лімончелло
    prompt: |
      Лімончелло подають у охолодженій склянці — жовтий, солодкий, міцний. Шот — це пунктуація. Звідки беруться лимони? Що вони несуть?
    follow_ups:
      - Чим би була їжа без лімончелло?
      - Як шот позначає кінець?
      - Який зв'язок між лимоном і місцем?
  - id: it_sfogliatella_layers
    name: Шари сфольятелла
    prompt: |
      Сфольятелла має сотні тонких як папір шарів — складених, хрустких. Розгляньте
      труд. Кожен шар — це рішення. Що б зробили менше шарів?
    follow_ups:
      - Чим би був пиріг без шарів?
      - Як структура створює текстуру?
      - Який зв'язок між майстерністю та хрускотом?
  - id: it_saltimbocca_name
    name: Назва сальтімбокка
    prompt: |
      Сальтімбокка означає "стрибає в рот". Назва обіцяє. Чи виконує страва обіцянку?
      Розгляньте розрив між назвою та досвідом.
    follow_ups:
      - Чим би була страва без назви?
      - Як назва формує очікування?
      - Який зв'язок між словом і смаком?
  - id: it_artichoke_prep
    name: Підготовка артишока
    prompt: |
      Артишоки вимагають підготовки — видалення серцевини, обрізки колючок. Розгляньте відходи.
      Що викидається? Що цінується? Овоч — це архітектура.
    follow_ups:
      - Чим би був артишок без підготовки?
      - Як підготовка змінює приготування?
      - Який зв'язок між зусиллям і винагородою?
  - id: it_grappa_clear
    name: Чистота граппи
    prompt: |
      Граппа чиста — дистильована з виноградних вичавок. Напій несе привид
      винограду. Розгляньте трансформацію. Що залишається позаду?
    follow_ups:
      - Чим би була їжа без граппи?
      - Як дистиляція концентрує?
      - Який зв'язок між виноградом і напоєм?
  - id: it_panzanella_soft
    name: М'якість панцанелли
    prompt: |
      Панцанелла використовує черствий хліб — розм'якшений томатним соком, оцтом. Хліб
      відроджується. Розгляньте трансформацію. Що зробив би свіжий хліб?
    follow_ups:
      - Чим би був салат без хліба?
      - Як замочування змінює текстуру?
      - Який зв'язок між черствим і відродженим?
  - id: it_capers_brine
    name: Розсіл каперсів
    prompt: |
      Каперси — це бутони — мариновані, солоні. Вони доповнюють. Розгляньте розсіл. Звідки взялася сіль? Що зберігає маринад?
    follow_ups:
      - Чим би була страва без каперсів?
      - Як розсіл змінює бутон?
      - Який зв'язок між консервацією та смаком?
  - id: it_ravioli_seam
    name: Шов равіолі
    prompt: |
      Равіолі мають шов — де паста защіпнута. Шов може розірватися. Розгляньте
      майстерність. Що утримує начинку?
    follow_ups:
      - Чим би були равіолі без шва?
      - Як ущільнення захищає начинку?
      - Який зв'язок між структурою та несподіванкою?
  - id: it_negroni_orange
    name: Апельсин в Негроні
    prompt: |
      Негроні подають з апельсином — скибочкою або цедрою. Цитрус плаває. Розгляньте
      гарнір. Що він додає? Коли ви його відчуваєте?
    follow_ups:
