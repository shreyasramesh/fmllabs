# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 料理ラボ — インド (Japanese)

id: culinary_lab_indian
name: 料理ラボ — インド
description: インド料理の体験を変える50枚のカード。スパイスと熱の化学から、食材の考古学、そして共に囲む食卓の振付まで。
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: タドカのパチパチ音
    prompt: |
      タドカ（テンパリング）は、始まりの音。熱した油にマスタードシード、クミン、カレーリーフが触れる。耳を澄ませて。パチパチという音は、リアルタイムの化学反応。味わう前にその音を聞くと、何が変わるだろうか？
    follow_ups:
      - 音はどのように期待感を形作るか？
      - パチパチという音なしに、この料理は何を失うか？
      - 音と味の関係性とは？
  - id: ind_spice_route
    name: スパイスの道
    prompt: |
      カルダモンはケーララから。サフランはカシミールから。黒胡椒はかつて金と同等の価値があった。あなたの皿にあるスパイスを一つ、その起源まで辿ってみよう。そこからあなたのもとに届くまで、どんな旅をしたのだろうか？
    follow_ups:
      - その旅を知ることで、一口の味わいはどう変わるか？
      - 同じ道を旅した他のスパイスは？
      - 交易と味の関係性とは？
  - id: ind_thali_geometry
    name: タリの幾何学
    prompt: |
      タリはキャンバス。器が円形に配置され、それぞれが役割を持つ。その構成を観察しよう。まず目はどこに留まるか？ 余白とは何か？
    follow_ups:
      - 器が一つ欠けていたらどうなるか？
      - その配置はどのように食事を形作るか？
      - 幾何学と儀式の関係性とは？
  - id: ind_hand_as_tool
    name: 手という道具
    prompt: |
      ロティをちぎり、サブジと混ぜ、口に運ぶ。手は道具であり、感覚器でもある。その手さばきを観察しよう。フォークやナイフでは得られない、触覚が何を加えるだろうか？
    follow_ups:
      - 手で食べることは、どのようにペースを変えるか？
      - 銀食器では何が失われるか？
      - 触覚と温度の関係性とは？
  - id: ind_heat_layers
    name: 熱の層
    prompt: |
      インドの熱は層になっている。チリの辛味、黒胡椒の温かさ、生姜の燃えるような辛さ。一口味わい、それぞれの熱がどこに届くかマッピングしてみよう。舌、喉、腹。それらはどのように積み重なるのだろうか？
    follow_ups:
      - 一つの熱だけだったら、この料理はどうなるか？
      - 層にすることで、どのように複雑さが生まれるか？
      - 熱と時間との関係性とは？
  - id: ind_yogurt_intervention
    name: ヨーグルトの介入
    prompt: |
      ライタ、ダヒ、ラッシー。ヨーグルトは冷まし、切り、バランスを取る。加える瞬間を観察しよう。酸が脂と出会い、冷たさが熱と出会う。その介入は化学反応だ。それは何に割り込むのだろうか？
    follow_ups:
      - ヨーグルトなしでは、この食事はどうなるか？
      - その対比はどのように安らぎを生むか？
      - 介入とバランスの関係性とは？
  - id: ind_betel_after
    name: 食後のビンロウ
    prompt: |
      一部の伝統では、パール（ビンロウ）の葉が食事の締めくくりとなる。デザートではない。それは終結だ。味覚が再び変化する。その終わりは、全体について何を語っているだろうか？
    follow_ups:
      - パールはどのように移行を示すか？
      - それなしでは、この食事は何を欠くだろうか？
      - 終わりと記憶の関係性とは？
  - id: ind_street_chaos
    name: ストリートの混沌
    prompt: |
      チャートの屋台は素早く作業する。ビエル、パプディ、チャツネが数秒で重ねられる。そのパフォーマンスを観察しよう。屋台は劇場だ。台本は？観客は？
    follow_ups:
      - パフォーマンスなしでは、この料理はどうなるか？
      - スピードはどのように体験を形作るか？
      - 混沌と職人技の関係性とは？
  - id: ind_tandoor_breathe
    name: タンドールの息遣い
    prompt: |
      タンドールは息をしている。炎、煙、土。ナンは壁に叩きつけられ、焦げ目がつくと取り出される。その近くに立ってみよう。熱、匂い。火と味の関係性とは？
    follow_ups:
      - タンドールなしでは、ナンはどうなるか？
      - 土はどのように料理人を形作るか？
      - 息遣いとパンの関係性とは？
  - id: ind_turmeric_stain
    name: ウコンの染み
    prompt: |
      ウコンは指、布、プラスチックを染める。その色は残る。それが何に印をつけるか観察しよう。その染みは考古学だ。この料理は、あなたの元に届くまでにどこを旅してきたのだろうか？
    follow_ups:
      - 色なしでは、この料理はどうなるか？
      - その染みはどのように労働の痕跡を示すか？
      - 顔料と保存の関係性とは？
  - id: ind_rice_architecture
    name: 米の建築
    prompt: |
      ビリヤニは積み重ねられる。米の層、肉の層、サフラン、揚げ玉ねぎ。その構造は保たれる。それを掘り出してみよう。その建築は、一口の味わいにどう影響するか？
    follow_ups:
      - 層が早すぎると混ざったらどうなるか？
      - 構造はどのように驚きを生むか？
      - 建築と食事の関係性とは？
  - id: ind_chutney_spectrum
    name: チャツネのスペクトル
    prompt: |
      ミント、タマリンド、ココナッツ、トマト。チャツネはパレットのように並ぶ。それぞれが一口の味わいを変える。一つの料理を三種類のチャツネで味わってみよう。同じベースが、どのように三つの異なる物語になるのだろうか？
    follow_ups:
      - チャツネが一つだけだったら、この食事はどうなるか？
      - 選択はどのように主体性を形作るか？
      - スペクトルと好みとの関係性とは？
  - id: ind_steam_rising
    name: 立ち上る湯気
    prompt: |
      イドリ、ドーサ、プリ。蓋を持ち上げると湯気が立ち上る。それを見てみよう。湯気は味よりも先に香りを運ぶ。何が最初に届くか？鼻か、口か？
    follow_ups:
      - 湯気はどのように期待感を形作るか？
      - 蓋を持ち上げる動作なしでは、何が失われるか？
      - 蒸気と風味の関係性とは？
  - id: ind_silver_versus_steel
    name: 銀と鋼
    prompt: |
      テーブルによっては、鋼のタリ、銀のタリ、バナナの葉が使われる。器を観察しよう。食べ物の下の表面が、どのように体験を変えるのか？重さ、音、伝統。
    follow_ups:
      - 異なる表面では、この食事はどう感じられるか？
      - 器はどのように儀式を形作るか？
      - 素材と意味の関係性とは？
  - id: ind_cumin_fragrance
    name: クミンの香り
    prompt: |
      ローストしたクミンシードは、風味より先に香りを放つ。料理を味わう前に匂いを嗅いでみよう。クミンが部屋を漂う。香りはどのように味覚を準備するのだろうか？
    follow_ups:
      - 匂いなしでは、この料理はどうなるか？
      - 香りはどのように料理人の存在を示すか？
      - 鼻と記憶の関係性とは？
  - id: ind_shared_central
    name: 共有の中心
    prompt: |
      料理が中央に置かれる。皆がそこから取る。「あなたの皿」という感覚は、同じようにはない。手を伸ばし、回し、取るという振付を観察しよう。暗黙のルールとは？
    follow_ups:
      - 個別の盛り付けだったら、この食事はどうなるか？
      - 共有はどのように繋がりを生むか？
      - 中心と共同体の関係性とは？
  - id: ind_ghee_gloss
    name: ギーの光沢
    prompt: |
      ギーは集まり、輝き、コーティングする。それは風味であり、仕上げでもある脂だ。皿の上でどこに集まるか観察しよう。その光沢は、どのように食感と温度を変えるか？
    follow_ups:
      - 油だったら、この料理はどうなるか？
      - ギーはどのように他の風味を運ぶか？
      - 光沢と豊かさの関係性とは？
  - id: ind_papad_crunch
    name: パパドのパリパリ音
    prompt: |
      パパド。カリカリ、薄い、パリパリと割れる。それは食感の句読点だ。一つ割ってみよう。耳を澄ませて。そのパリパリという音は、食事のリズムセクションだ。それがなければ、沈黙はどんな音になるだろうか？
    follow_ups:
      - パリパリという音は、どのように対比を生むか？
      - パパドなしでは、この食事は何を欠くだろうか？
      - 音と満足感の関係性とは？
  - id: ind_sambar_depth
    name: サンバールの深み
    prompt: |
      サンバールは層になっている。豆、タマリンド、野菜、スパイス。煮込まれている。層を味わってみよう。いくつ分離できるか？あのボウルの考古学とは？
    follow_ups:
      - 層が少ないサンバールはどうなるか？
      - 時間はどのように深みを築くか？
      - 煮込みと物語の関係性とは？
  - id: ind_pickle_punch
    name: ピクルスのパンチ
    prompt: |
      アチャール（ピクルス）は、物語の転換点だ。一口で全てが変わる。甘い、酸っぱい、辛い、発酵。いつ加わるか観察しよう。それは何に割り込むのだろうか？
    follow_ups:
      - ピクルスなしでは、この食事はどうなるか？
      - そのパンチはどのように驚きを生むか？
      - 転換と記憶の関係性とは？
  - id: ind_bay_leaf_hunt
    name: 月桂樹の葉を探して
    prompt: |
      月桂樹の葉は、プラオやビリヤニ、カレーの中に隠れている。一つ見つけてみよう。食べない。それは考古学だ。ケーララやカシミールから旅してきた。取り除かれる前に、何を加えたのだろうか？
    follow_ups:
      - 食べられないものが、どのように食べられるものを形作るか？
      - 葉なしでは、この料理はどうなるか？
      - 隠されたものと存在するものの関係性とは？
  - id: ind_dosa_edge
    name: ドーサの縁
    prompt: |
      ドーサには縁がある。カリカリとした、レースのような、黄金色。中心は柔らかい。その対比は建築的だ。どこから最初に噛み付くか？その縁は、全体をどのように縁取るのだろうか？
    follow_ups:
      - 全てが均一にカリカリだったら、ドーサはどうなるか？
      - 縁はどのように興味を引くか？
      - 境界と中心の関係性とは？
  - id: ind_saffron_thread
    name: サフランの糸
    prompt: |
      サフラン。数本の糸が、料理全体に色と香りを加える。一本の糸を辿ってみよう。どこから来たのか？カシミール、イラン、スペイン？最も高価なスパイス。希少性は、何を加えるのか？
    follow_ups:
      - サフランはどのように贅沢を形作るか？
      - ウコンだったら、この料理はどうなるか？
      - 糸と領土の関係性とは？
  - id: ind_chaat_texture
    name: チャートの食感
    prompt: |
      チャートは一口で食感の層を重ねる。カリカリ、柔らかい、パリパリ、クリーミー。それを分解してみよう。いくつ食感があるか？それらはどのように協力し合っているか？一口はコラボレーションだ。
    follow_ups:
      - 食感が一つだったら、チャートはどうなるか？
      - 層にすることで、どのように遊びが生まれるか？
      - 食感と喜びの関係性とは？
  - id: ind_mustard_seed_pop
    name: マスタードシードの弾ける音
    prompt: |
      マスタードシードが油の中で弾ける。ベンガル、南インドのテンパリング。その弾ける音は化学反応だ。種が化合物を放出する。匂いを嗅いでみよう。熱がそれらを活性化させると、何が変わるか？
    follow_ups:
      - 弾ける音は、どのように料理人のタイミングを示すか？
      - それなしでは、この料理はどうなるか？
      - 弾ける音と効力との関係性とは？
  - id: ind_dal_surface
    name: ダルの表面
    prompt: |
      ダルには表面がある。時には皮、時には浮いたタドカ。まだ混ぜないで。見てみよう。表面は、下にあるものについて何を明らかにしているか？
    follow_ups:
      - 表面はどのように誘うか、あるいは拒むか？
      - 混ぜなかったらどうなるか？
      - 表面と深みの関係性とは？
  - id: ind_banana_leaf_plate
    name: バナナの葉の皿
    prompt: |
      バナナの葉は皿だ。オーガニックで、使い捨てで、伝統的。葉には質感、匂いがある。食べ物はその上に違ったように乗る。葉は、どのように食事を変えるのだろうか？
    follow_ups:
      - 陶器だったら、この食事はどうなるか？
      - 葉はどのように儀式を形作るか？
      - 葉と場所の関係性とは？
  - id: ind_fenugreek_haunt
    name: フェヌグリークの残り香
    prompt: |
      フェヌグリーク（メティ）は、 lingering scent を持つ。苦く、メープルに似た香り。キッチンや服に残り香を残す。どこに付着するか観察しよう。その持続性は、何を加えるのだろうか？
    follow_ups:
      - フェヌグリークはどのように縄張りを主張するか？
      - その持続性なしでは、この料理はどうなるか？
      - 残り香と記憶の関係性とは？
  - id: ind_pani_puri_moment
    name: パニプリの瞬間
    prompt: |
      パニプリは、一口の物語。カリカリの殻、ジャガイモ、ひよこ豆、タマリンド水。丸ごと、すぐに食べなければならない。その瞬間は二度と繰り返されない。何がそれを緊急にさせるのだろうか？
    follow_ups:
      - 待ったらどうなるか？
      - 緊急性はどのように喜びを生むか？
      - 瞬間と記憶の関係性とは？
  - id: ind_serving_order
    name: 配膳の順番
    prompt: |
      一部の場面では、順番がある。長老が最初、特定の料理が他の料理より前に。観察しよう。誰が配る？誰が待つ？その振付は尊敬をエンコードしている。ルールとは？
    follow_ups:
      - 順番なしでは、この食事はどうなるか？
      - 順序はどのように意味を築くか？
      - 順番と階層の関係性とは？
  - id: ind_cardamom_pod
    name: カルダモンの実
    prompt: |
      丸ごとのカルダモンの実が、プラオやチャイの中に隠れている。噛むかもしれない、脇に押しやるかもしれない。その実は考古学だ。ケーララや丘陵地帯から。何に貢献したのだろうか？
    follow_ups:
      - 粉末と実では、どのように違うか？
      - それなしでは、この料理はどうなるか？
      - 実と場所の関係性とは？
  - id: ind_kitchen_sounds
    name: キッチンの音
    prompt: |
      インドのキッチンには音景がある。挽く音、揚げる音、圧力鍋のシューという音。キッチンで目を閉じてみよう。音をマッピングする。何が一定で、何がリズムか？
    follow_ups:
      - これらの音なしでは、この食事はどうなるか？
      - 音はどのように期待感を形作るか？
      - キッチンとテーブルの関係性とは？
  - id: ind_second_helping
    name: おかわり
    prompt: |
      「もう一杯どうぞ」は儀式だ。しつこく勧めること、断ること、 eventual acceptance。そのダンスを観察しよう。空腹以上の意味はおかわりにあるだろうか？
    follow_ups:
      - 勧誘なしでは、この食事はどうなるか？
      - しつこさは、どのように思いやりをエンコードするか？
      - より多くと十分の関係性とは？
  - id: ind_coriander_finish
    name: コリアンダーの仕上げ
    prompt: |
      新鮮なコリアンダー（パクチー）が多くの料理のトップを飾る。最後に加えられるもの。仕上げ。緑色が、それ以前のものにどう影響するか観察しよう。明るく、ハーブらしく、意見が分かれる。
    follow_ups:
      - ハーブなしでは、この料理はどうなるか？
      - 仕上げは、どのように全体を縁取るか？
      - 最後と最初との関係性とは？
  - id: ind_lassi_cut
    name: ラッシーの切れ味
    prompt: |
      ラッシーはスパイスを切り刻む。冷たく、酸っぱく、濃厚。それは安らぎだ。飲む瞬間を観察しよう。それは何に割り込むのか？何をもとに戻すのか？
    follow_ups:
      - ラッシーなしでは、この食事はどうなるか？
      - その切れ味は、どのように耐久性を延長するか？
      - 安らぎとリズムの関係性とは？
  - id: ind_roti_stretch
    name: ロティのストレッチ
    prompt: |
      ロティは手で伸ばされる。丸く、薄く、炎で焦げ目がつく。作られる様子を観察しよう。そのストレッチは技術だ。その動きなしでは、パンはどうなるだろうか？
    follow_ups:
      - ストレッチは、どのように食感に影響するか？
      - 機械で作られたロティは何を失うか？
      - 動きと結果の関係性とは？
  - id: ind_jaljeera_pause
    name: ジャルジーラのポーズ
    prompt: |
      ジャルジーラ（クミン、ミント、タマリンド）は、消化剤であり、ポーズだ。しばしば食事の途中か後に提供される。その変化を観察しよう。そのポーズは何を可能にするのだろうか？
    follow_ups:
      - ポーズなしでは、この食事はどうなるか？
      - ジャルジーラはどのように移行を示すか？
      - ポーズと消化の関係性とは？
  - id: ind_color_conversation
    name: 色の会話
    prompt: |
      インドの皿は色で語る。黄色のダル、緑のサブジ、白い米、赤いチャツネ。そのパレットを観察しよう。会話とは？何がぶつかり合い、何が調和するか？
    follow_ups:
      - 色はどのように食欲を形作るか？
      - モノクロだったら、皿はどうなるか？
      - パレットと地域との関係性とは？
  - id: ind_clove_buried
    name: 埋もれたクローブ
    prompt: |
      クローブは、ビリヤニ、ガラムマサラ、チャイの中に隠れている。 pungentで温かい。一つ見つけてみよう。噛むかもしれない。そのクローブはスパイス貿易の遺物だ。それはどのような領域を繋ぐのだろうか？
    follow_ups:
      - 粉末と実では、どのように違うか？
      - それなしでは、この料理はどうなるか？
      - クローブと植民地主義の関係性とは？
  - id: ind_family_style
    name: ファミリースタイル
    prompt: |
      料理がボウルに入ってテーブルに運ばれる。皆がそこから食べる。食事は共有のプロジェクトだ。誰が何を取り、誰が待ち、誰が配るかを観察しよう。テーブルの経済とは？
    follow_ups:
      - 個別の皿だったら、この食事はどうなるか？
      - 共有はどのように価値観をエンコードするか？
      - スタイルと家族の関係性とは？
  - id: ind_asafoetida_whiff
    name: アサフェティダの香りの瞬間
    prompt: |
      ヒング（アサフェティダ）は、生では強烈、調理されると魔法のような匂いがする。ひとつまみがダルやサブジを変える。それは秘密だ。その香りがする瞬間を観察しよう。その香りの瞬間は何を加えるのだろうか？
    follow_ups:
      - ヒングはどのように料理人の手跡を示すか？
      - それなしでは、この料理はどうなるか？
      - 香りの瞬間と変容の関係性とは？
  - id: ind_gulab_jamun_weight
    name: グラブジャムンの重み
    prompt: |
      グラブジャムンは濃厚だ。揚げたミルク固形物にシロップを浸したもの。舌の上での重みを感じてみよう。甘く、重く、最後。そのデザートは、どのように食事を締めくくるのだろうか？
    follow_ups:
      - それなしでは、この食事の終わりはどうなるか？
      - 重みはどのように終結を築くか？
      - デザートと満腹感の関係性とは？
  - id: ind_temple_prasad
    name: 寺院のプラサード
    prompt: |
      プラサード（祝福された食べ物）は、寺院で配られる。それは単純かもしれない。ラドゥ、米。しかし、それは別の意味を持つ。その意識を持って食べよう。食べ物が贈られると、何が変わるだろうか？
    follow_ups:
      - プラサードは、レストランの食べ物とどう違うか？
      - 祝福は、何を加えるのか？
      - 贈り物と献身の関係性とは？
  - id: ind_bone_suck
    name: 骨をしゃぶる
    prompt: |
      一部のインド料理（ニハリ、パヤ）では、骨の髄までしゃぶることを促す。他の場所では上品ではない。ここでは期待される。骨髄、結合組織。そのしゃぶりは何を抽出するのだろうか？
    follow_ups:
      - その行為は、どのように上品さと対立するか？
      - 骨なしでは、この料理は何を失うか？
      - しゃぶることと降伏の関係性とは？
  - id: ind_pressure_cooker_song
    name: 圧力鍋の歌
    prompt: |
      圧力鍋が鳴る。一、二、三。ダルや米のサウンドトラックだ。その音は「出来上がり」を意味する。それなしでは、キッチンはどうなるだろうか？その歌は、どのように時間を形作るのか？
    follow_ups:
      - 鳴る音は、どのように出来上がりを示すか？
      - インスタントポットでは、何が失われるか？
      - 音と安全性との関係性とは？
  - id: ind_curry_leaf_sizzle
    name: カレーリーフのジューシー音
    prompt: |
      カレーリーフが熱い油に hits — 南インドのテンパリング。それはパチパチと音を立て、香りを放つ。食べないが、存在はする。その存在は、何を加えるのだろうか？
    follow_ups:
      - カレーリーフなしでは、この料理はどうなるか？
      - 食べられないものは、どのように風味を運ぶか？
      - 葉と記憶の関係性とは？
  - id: ind_mint_chutney_bright
    name: ミントチャツネの鮮やかさ
    prompt: |
      ミントチャツネはフレッシュだ。ハーブ、青唐辛子、ライムのブレンド。濃厚な味を切り、皿を明るくする。タバリの他のものに対するその色を観察しよう。緑色は、その構成に何をするのか？
    follow_ups:
      - チャツネなしでは、この食事はどうなるか？
      - フレッシュさは、どのように物語に割り込むか？
      - 鮮やかさとバランスの関係性とは？
  - id: ind_wedding_feast
    name: 結婚式の宴
    prompt: |
      インドの結婚式の食事は規模だ。数百、数千人が食事をする。ビュッフェ、多様性、過剰さ。その振付を観察しよう。その規模は、どのように食事を変えるのだろうか？祝祭と消費の関係性とは？
    follow_ups:
      - 宴なしでは、結婚式はどうなるか？
      - 過剰さは、どのようにもてなしをエンコードするか？
      - 宴と地位の関係性とは？
