# مختبر الطهي — هندي (Arabic)

id: culinary_lab_indian
name: مختبر الطهي — هندي
description: 50 بطاقة لتغيير طريقة تجربتك للطعام الهندي — من كيمياء التوابل والحرارة إلى علم الآثار للمكونات ورقصة المائدة المشتركة.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: طقطقة التادكا
    prompt: |
      التادكا — التقليب — هي النوتة الافتتاحية. يلتقي الزيت الساخن ببذور الخردل، الكمون، أوراق الكاري. استمع. الطقطقة هي كيمياء في الوقت الفعلي. ماذا يتغير عندما تسمعها قبل أن تتذوقها؟
    follow_ups:
      - كيف يشكل الصوت الترقب؟
      - ماذا سيفقد الطبق بدونه؟
      - ما هي العلاقة بين الصوت والنكهة؟
  - id: ind_spice_route
    name: طريق البهارات
    prompt: |
      الهيل جاء من كيرالا. الزعفران من كشمير. الفلفل الأسود كان يساوي وزنه ذهبًا. تتبع بهارًا واحدًا في طبقك إلى أصله. ما الرحلة التي قطعها ليصل إليك؟
    follow_ups:
      - كيف يغير معرفة الطريق اللقمة؟
      - ما هي البهارات الأخرى التي سلكت نفس المسار؟
      - ما هي العلاقة بين التجارة والتذوق؟
  - id: ind_thali_geometry
    name: هندسة الثالي
    prompt: |
      الثالي عبارة عن لوحة قماشية — أطباق مرتبة في دائرة، لكل منها دور. ادرس التكوين. أين تهبط العين أولاً؟ ما هي المساحة السلبية؟
    follow_ups:
      - ماذا سيحدث لو اختفى أحد الأطباق؟
      - كيف يشكل الترتيب الوجبة؟
      - ما هي العلاقة بين الهندسة والطقوس؟
  - id: ind_hand_as_tool
    name: اليد كأداة
    prompt: |
      قطعة الروتي، ممزوجة بالسابزي، توضع في الفم. اليد هي الأداة والمستشعر. لاحظ الرقصة. ماذا يضيف اللمس ما لا تستطيع الشوكة والسكين؟
    follow_ups:
      - كيف يغير الأكل باليد الإيقاع؟
      - ماذا سيفقد مع استخدام أدوات المائدة؟
      - ما هي العلاقة بين اللمس ودرجة الحرارة؟
  - id: ind_heat_layers
    name: طبقات الحرارة
    prompt: |
      الحرارة الهندية متعددة الطبقات — لسعة الفلفل الحار، دفء الفلفل الأسود، نار الزنجبيل. خذ لقمة واحدة وحدد مكان كل حرارة. اللسان، الحلق، البطن. كيف تتراكم؟
    follow_ups:
      - ماذا سيكون الطبق بحرارة واحدة فقط؟
      - كيف يخلق التراص تعقيدًا؟
      - ما هي العلاقة بين الحرارة والوقت؟
  - id: ind_yogurt_intervention
    name: تدخل الزبادي
    prompt: |
      الرايتا، الداهي، اللاسي — الزبادي يبرد، يخفف، يوازن. لاحظ اللحظة التي تضيفه فيها. يلتقي الحمض بالدهون، والبرودة بالحرارة. التدخل هو كيميائي. ماذا يقطع؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الزبادي؟
      - كيف يخلق التباين راحة؟
      - ما هي العلاقة بين التدخل والتوازن؟
  - id: ind_betel_after
    name: ما بعد أوراق التنبول
    prompt: |
      البان — أوراق التنبول — تنهي الوجبة في بعض التقاليد. ليست حلوى. إنها خاتمة. تتغير الحواس مرة أخرى. ماذا يقول الختام عن الكل؟
    follow_ups:
      - كيف يميز البان الانتقال؟
      - ماذا سيفقد الوجبة بدونه؟
      - ما هي العلاقة بين النهاية والذاكرة؟
  - id: ind_street_chaos
    name: فوضى الشارع
    prompt: |
      بائع الشات يعمل بسرعة — البهل، البابدي، الصلصات مصفوفة في ثوانٍ. شاهد الأداء. الكشك هو مسرح. ما هو النص؟ من هو الجمهور؟
    follow_ups:
      - ماذا سيكون الطبق بدون الأداء؟
      - كيف تشكل السرعة التجربة؟
      - ما هي العلاقة بين الفوضى والحرفية؟
  - id: ind_tandoor_breathe
    name: تنفس التنور
    prompt: |
      التنور يتنفس — لهب، دخان، طين. خبز النان يُلصق على الجدار، يُسحب عندما ينتفخ. قف بالقرب من واحد. الحرارة، الرائحة. ما هي العلاقة بين النار والنكهة؟
    follow_ups:
      - ماذا سيكون خبز النان بدون التنور؟
      - كيف يشكل الطين الطاهي؟
      - ما هي العلاقة بين النفس والخبز؟
  - id: ind_turmeric_stain
    name: بقعة الكركم
    prompt: |
      الكركم يترك بقعًا — أصابع، قماش، بلاستيك. اللون باقٍ. لاحظ ما يوسمه. البقعة هي علم آثار. إلى أين سافرت هذه الوجبة قبل أن تصل إليك؟
    follow_ups:
      - ماذا سيكون الطبق بدون اللون؟
      - كيف تحدد البقعة العمل؟
      - ما هي العلاقة بين الصبغة والحفظ؟
  - id: ind_rice_architecture
    name: هندسة الأرز
    prompt: |
      البرياني مبني — طبقة أرز، طبقة لحم، زعفران، بصل مقلي. الهيكل قائم. اكشف عنه. كيف يؤثر الهيكل على كل لقمة؟
    follow_ups:
      - ماذا سيحدث لو اختلطت الطبقات مبكرًا؟
      - كيف يخلق الهيكل المفاجأة؟
      - ما هي العلاقة بين البناء والأكل؟
  - id: ind_chutney_spectrum
    name: طيف الصلصة
    prompt: |
      النعناع، التمر الهندي، جوز الهند، الطماطم — الصلصات تتراص مثل لوحة ألوان. كل واحدة تغير اللقمة. تذوق طبقًا واحدًا بثلاث صلصات. كيف تصبح القاعدة نفسها ثلاث قصص مختلفة؟
    follow_ups:
      - ماذا ستكون الوجبة بصلصة واحدة فقط؟
      - كيف يشكل الاختيار الوكالة؟
      - ما هي العلاقة بين الطيف والتفضيل؟
  - id: ind_steam_rising
    name: تصاعد البخار
    prompt: |
      إيدلي، دوسا، بوري — يصعد البخار عند رفع الغطاء. شاهده. يحمل البخار الرائحة قبل الطعم. ماذا يصل أولاً؟ الأنف أم الفم؟
    follow_ups:
      - كيف يشكل البخار الترقب؟
      - ماذا سيفقد بدون الرفع؟
      - ما هي العلاقة بين البخار والنكهة؟
  - id: ind_silver_versus_steel
    name: الفضة مقابل الفولاذ
    prompt: |
      بعض الطاولات تستخدم ثالي فولاذ، وبعضها فضة، وبعضها أوراق موز. لاحظ الوعاء. كيف يغير السطح الذي تحت الطعام التجربة؟ الوزن، الصوت، التقليد.
    follow_ups:
      - كيف ستبدو الوجبة على أسطح مختلفة؟
      - كيف يشكل الوعاء الاحتفال؟
      - ما هي العلاقة بين المادة والمعنى؟
  - id: ind_cumin_fragrance
    name: رائحة الكمون
    prompt: |
      بذور الكمون المحمصة تطلق الرائحة قبل النكهة. شم طبقًا قبل أن تتذوقه. الكمون ينتشر في الغرفة. كيف يهيئ العطر الحواس؟
    follow_ups:
      - ماذا سيكون الطبق بدون الرائحة؟
      - كيف تحدد الرائحة وجود الطاهي؟
      - ما هي العلاقة بين الأنف والذاكرة؟
  - id: ind_shared_central
    name: المشاركة المركزية
    prompt: |
      الأطباق تجلس في المنتصف. الجميع يمد يده. لا يوجد "طبقك" بنفس الطريقة. لاحظ رقصة الوصول، التمرير، الأخذ. ما هي القواعد غير المعلنة؟
    follow_ups:
      - ماذا ستكون الوجبة بحصص فردية؟
      - كيف يخلق المشاركة اتصالًا؟
      - ما هي العلاقة بين المركزي والمشترك؟
  - id: ind_ghee_gloss
    name: لمعان السمن
    prompt: |
      السمن يتجمع، يلمع، يغلف. هو دهون كنكهة وكإنهاء. لاحظ أين يتجمع في الطبق. كيف يغير هذا اللمعان الملمس ودرجة الحرارة؟
    follow_ups:
      - ماذا سيكون الطبق بالزيت بدلاً من ذلك؟
      - كيف يحمل السمن نكهات أخرى؟
      - ما هي العلاقة بين اللمعان والثراء؟
  - id: ind_papad_crunch
    name: قرمشة الباباد
    prompt: |
      الباباد — مقرمش، رقيق، يفرقع. هو ملمس كعلامة ترقيم. اكسر واحدًا. استمع. القرمشة هي قسم الإيقاع للوجبة. كيف سيبدو الصمت بدونه؟
    follow_ups:
      - كيف يخلق القرمشة تباينًا؟
      - ماذا سيفقد الوجبة بدون الباباد؟
      - ما هي العلاقة بين الصوت والرضا؟
  - id: ind_sambar_depth
    name: عمق السامبر
    prompt: |
      السامبر متعدد الطبقات — عدس، تمر هندي، خضروات، بهارات. كان يغلي. تذوق الطبقات. كم عدد يمكنك فصله؟ ما هو علم الآثار لهذا الوعاء؟
    follow_ups:
      - ماذا سيكون السامبر بطبقات أقل؟
      - كيف يبني الوقت العمق؟
      - ما هي العلاقة بين الغليان والقصة؟
  - id: ind_pickle_punch
    name: نكهة المخلل
    prompt: |
      الأشار — المخلل — هو تحول القصة. لقمة واحدة صغيرة تغير كل شيء. حلو، حامض، حار، مخمر. لاحظ متى يدخل. ماذا يفسد؟
    follow_ups:
      - ماذا ستكون الوجبة بدون المخلل؟
      - كيف يخلق التأثير المفاجأة؟
      - ما هي العلاقة بين التحول والذاكرة؟
  - id: ind_bay_leaf_hunt
    name: البحث عن ورقة الغار
    prompt: |
      أوراق الغار تختبئ في البولاو، البرياني، الكاري. ابحث عن واحدة. أنت لا تأكلها — إنها علم آثار. سافرت من كيرالا أو كشمير. ماذا أضافت قبل أن تُزال؟
    follow_ups:
      - كيف يشكل غير القابل للأكل القابل للأكل؟
      - ماذا سيكون الطبق بدون الورقة؟
      - ما هي العلاقة بين المخفي والحاضر؟
  - id: ind_dosa_edge
    name: حافة الدوسا
    prompt: |
      للدوسا حافة — مقرمشة، شبيهة بالدانتيل، ذهبية. الوسط طري. التباين معماري. أين تعض أولاً؟ كيف تحدد الحافة الكل؟
    follow_ups:
      - ماذا ستكون الدوسا إذا كانت مقرمشة بالتساوي؟
      - كيف تخلق الحافة الاهتمام؟
      - ما هي العلاقة بين الحدود والمركز؟
  - id: ind_saffron_thread
    name: خيط الزعفران
    prompt: |
      الزعفران — بضعة خيوط — يلون ويعطر طبقًا كاملاً. تتبع خيطًا واحدًا. من أين أتى؟ كشمير، إيران، إسبانيا؟ أغلى بهار. ماذا يضيف الندرة؟
    follow_ups:
      - كيف يشكل الزعفران الرفاهية؟
      - ماذا سيكون الطبق بالكركم بدلاً من ذلك؟
      - ما هي العلاقة بين الخيط والإقليم؟
  - id: ind_chaat_texture
    name: ملمس الشات
    prompt: |
      الشات يجمع الملمس — مقرمش، طري، هش، كريمي — في لقمة واحدة. فككه. كم عدد الملامس؟ كيف تعمل معًا؟ اللقمة هي تعاون.
    follow_ups:
      - ماذا سيكون الشات بملمس واحد؟
      - كيف يخلق التراص اللعب؟
      - ما هي العلاقة بين الملمس والمتعة؟
  - id: ind_mustard_seed_pop
    name: فرقعة بذور الخردل
    prompt: |
      بذور الخردل تفرقع في الزيت — تقليب بنغالي، جنوب هندي. الفرقعة كيميائية. تطلق البذور مركبات. شمها. ماذا يتغير عندما تنشطها الحرارة؟
    follow_ups:
      - كيف تحدد الفرقعة توقيت الطاهي؟
      - ماذا سيكون الطبق بدونها؟
      - ما هي العلاقة بين الفرقعة والفعالية؟
  - id: ind_dal_surface
    name: سطح الدال
    prompt: |
      للدال سطح — أحيانًا قشرة، أحيانًا تادكا تطفو. لا تحرك بعد. انظر إليه. ماذا يكشف السطح عما تحته؟
    follow_ups:
      - كيف يدعو السطح أو يقاوم؟
      - ماذا سيحدث لو لم تحرك أبدًا؟
      - ما هي العلاقة بين السطح والعمق؟
  - id: ind_banana_leaf_plate
    name: طبق ورقة الموز
    prompt: |
      ورقة الموز هي طبق — عضوي، قابل للتصرف، تقليدي. للورقة ملمس، رائحة. الطعام يجلس عليها بشكل مختلف. كيف تغير الورقة الوجبة؟
    follow_ups:
      - ماذا ستكون الوجبة على الخزف؟
      - كيف تشكل الورقة الطقس؟
      - ما هي العلاقة بين الورقة والمكان؟
  - id: ind_fenugreek_haunt
    name: رائحة الحلبة
    prompt: |
      الحلبة — الميثي — لها رائحة تبقى. مرّة، تشبه شراب القيقب. تطارد المطبخ، الملابس. لاحظ أين تعلق. ماذا يضيف الإصرار؟
    follow_ups:
      - كيف تحدد الحلبة المكان؟
      - ماذا سيكون الطبق بدون إصرارها؟
      - ما هي العلاقة بين الملاحقة والذاكرة؟
  - id: ind_pani_puri_moment
    name: لحظة الباني بوري
    prompt: |
      الباني بوري هي قصة لقمة واحدة — قشرة مقرمشة، بطاطا، حمص، ماء تمر هندي. يجب أن تؤكل كاملة، فورًا. اللحظة لا تتكرر. ماذا يجعلها عاجلة؟
    follow_ups:
      - ماذا سيحدث لو انتظرت؟
      - كيف يخلق الإلحاح المتعة؟
      - ما هي العلاقة بين اللحظة والذاكرة؟
  - id: ind_serving_order
    name: ترتيب التقديم
    prompt: |
      في بعض الإعدادات، يوجد ترتيب — الكبار أولاً، أطباق معينة قبل أخرى. لاحظ. من يقدم؟ من ينتظر؟ الرقصة تشفر الاحترام. ما هي القواعد؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الترتيب؟
      - كيف يخلق التسلسل المعنى؟
      - ما هي العلاقة بين الترتيب والتسلسل الهرمي؟
  - id: ind_cardamom_pod
    name: قرن الهيل
    prompt: |
      قرن هيل كامل يختبئ في البولاو أو الشاي. قد تعضه، قد تبعده. القرن هو علم آثار — أخضر من كيرالا، أسود من التلال. ماذا ساهم؟
    follow_ups:
      - كيف يختلف القرن الكامل عن المطحون؟
      - ماذا سيكون الطبق بدونه؟
      - ما هي العلاقة بين القرن والمكان؟
  - id: ind_kitchen_sounds
    name: أصوات المطبخ
    prompt: |
      المطبخ الهندي لديه مشهد صوتي — طحن، قلي، صفير قدر الضغط. أغلق عينيك في واحد. حدد الأصوات. ما هو الثابت؟ ما هو الإيقاع؟
    follow_ups:
      - ماذا ستكون الوجبة بدون تلك الأصوات؟
      - كيف يشكل الصوت الترقب؟
      - ما هي العلاقة بين المطبخ والطاولة؟
  - id: ind_second_helping
    name: الحصة الثانية
    prompt: |
      "تناول المزيد" هو طقس. الإصرار، الرفض، القبول النهائي. شاهد الرقصة. ماذا تعني الحصة الثانية أبعد من الجوع؟
    follow_ups:
      - ماذا ستكون الوجبة بدون العرض؟
      - كيف يشفر الإصرار العناية؟
      - ما هي العلاقة بين المزيد والكفاية؟
  - id: ind_coriander_finish
    name: إنهاء الكزبرة
    prompt: |
      الكزبرة الطازجة — الكزبرة — تزين العديد من الأطباق. هي آخر ما يضاف. الإنهاء. لاحظ كيف يغير اللون الأخضر ما سبقه. مشرق، عشبي، مثير للانقسام.
    follow_ups:
      - ماذا سيكون الطبق بدون العشبة؟
      - كيف يحدد الإنهاء الكل؟
      - ما هي العلاقة بين الأخير والأول؟
  - id: ind_lassi_cut
    name: قطع اللاسي
    prompt: |
      اللاسي يقطع الحرارة — بارد، منعش، سميك. إنه راحة. لاحظ اللحظة التي تشربه فيها. ماذا يقطع؟ ماذا يعيد ضبطه؟
    follow_ups:
      - ماذا ستكون الوجبة بدون اللاسي؟
      - كيف يمد القطع القدرة على التحمل؟
      - ما هي العلاقة بين الراحة والإيقاع؟
  - id: ind_roti_stretch
    name: شد الروتي
    prompt: |
      الروتي يُشد باليد — دائري، رقيق، منتفخ على اللهب. شاهد صنعه. الشد هو مهارة. ماذا سيكون الخبز بدون هذه الحركة؟
    follow_ups:
      - كيف يؤثر الشد على الملمس؟
      - ماذا سيفقد الروتي المصنوع آليًا؟
      - ما هي العلاقة بين الحركة والنتيجة؟
  - id: ind_jaljeera_pause
    name: وقفة الجلجيرا
    prompt: |
      الجلجيرا — كمون، نعناع، تمر هندي — هو هاضم، وقفة. غالبًا ما يأتي في منتصف الوجبة أو بعدها. لاحظ التحول. ماذا تسمح به الوقفة؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الوقفة؟
      - كيف تحدد الجلجيرا الانتقال؟
      - ما هي العلاقة بين الوقفة والهضم؟
  - id: ind_color_conversation
    name: محادثة الألوان
    prompt: |
      الأطباق الهندية تتحدث بالألوان — دال أصفر، سبزي أخضر، أرز أبيض، صلصة حمراء. ادرس لوحة الألوان. ما هي المحادثة؟ ماذا سيتضارب؟ ما الذي سيتناغم؟
    follow_ups:
      - كيف يشكل اللون الشهية؟
      - ماذا ستكون اللوحة بالأبيض والأسود؟
      - ما هي العلاقة بين لوحة الألوان والمنطقة؟
  - id: ind_clove_buried
    name: القرنفل المدفون
    prompt: |
      القرنفل يختبئ في البرياني، الجارام ماسالا، الشاي. إنه لاذع، دافئ. ابحث عن واحد. قد تعضه. القرنفل هو بقايا تجارة التوابل. ما هي الأقاليم التي يربطها؟
    follow_ups:
      - كيف يختلف القرن الكامل عن المطحون؟
      - ماذا سيكون الطبق بدون القرنفل؟
      - ما هي العلاقة بين القرن والاستعمار؟
  - id: ind_family_style
    name: نمط العائلة
    prompt: |
      يصل الطعام في أطباق للطاولة. الجميع يأكل منها. الوجبة مشروع مشترك. راقب من يأخذ ماذا، من ينتظر، من يقدم. ما هو اقتصاد الطاولة؟
    follow_ups:
      - ماذا ستكون الوجبة بصحون فردية؟
      - كيف يشفر المشاركة القيم؟
      - ما هي العلاقة بين النمط والعائلة؟
  - id: ind_asafoetida_whiff
    name: نفحة الحلتيت
    prompt: |
      الحلتيت — الأمفورد — رائحته قوية نيئًا، سحرية مطبوخًا. رشة تحول الدال، السابزي. إنه السر. لاحظ متى تلتقطه. ماذا تضيف النفحة؟
    follow_ups:
      - كيف تحدد الحلتيت يد الطاهي؟
      - ماذا سيكون الطبق بدونه؟
      - ما هي العلاقة بين النفحة والتحول؟
  - id: ind_gulab_jamun_weight
    name: وزن الجلاب جامون
    prompt: |
      الجلاب جامون كثيف — حليب مقلي، مغموس في شراب. اشعر بوزنه على لسانك. حلو، ثقيل، نهائي. كيف تختم الحلوى الوجبة؟
    follow_ups:
      - كيف ستنتهي الوجبة بدونه؟
      - كيف يخلق الوزن الخاتمة؟
      - ما هي العلاقة بين الحلوى والشبع؟
  - id: ind_temple_prasad
    name: براد المعبد
    prompt: |
      البراد — طعام مبارك — يُعطى في المعابد. قد يكون بسيطًا: لاددو، أرز. لكنه يحمل معنى آخر. كُله مع هذا الوعي. ماذا يتغير عندما يُهدى الطعام؟
    follow_ups:
      - كيف يختلف البراد عن طعام المطاعم؟
      - ماذا يضيف المباركة؟
      - ما هي العلاقة بين الهدية والتفاني؟
  - id: ind_bone_suck
    name: مص العظم
    prompt: |
      بعض الأطباق الهندية — النهاري، البايا — تدعو لمص العظم. إنه ليس مهذبًا في مكان آخر. هنا متوقع. النخاع، النسيج الضام. ماذا يستخرج المص؟
    follow_ups:
      - كيف يتجاوز الفعل اللياقة؟
      - ماذا سيفقد الطبق بدون العظم؟
      - ما هي العلاقة بين المص والاستسلام؟
  - id: ind_pressure_cooker_song
    name: أغنية قدر الضغط
    prompt: |
      قدر الضغط يصفر — واحد، اثنان، ثلاثة. إنه الصوت الخلفي للدال والأرز. هذا الصوت يعني نضج. ماذا سيكون المطبخ بدونه؟ كيف تشكل الأغنية الوقت؟
    follow_ups:
      - كيف تحدد الصفارة النضج؟
      - ماذا سنفقد مع جهاز الطبخ الفوري؟
      - ما هي العلاقة بين الصوت والأمان؟
  - id: ind_curry_leaf_sizzle
    name: طقطقة أوراق الكاري
    prompt: |
      أوراق الكاري تسقط في الزيت الساخن — تقليب جنوب هندي. تفرقع، تطلق الرائحة. لا تأكلها؛ إنها للنكهة. لكنها حاضرة. ماذا يضيف حضورها؟
    follow_ups:
      - ماذا سيكون الطبق بدون أوراق الكاري؟
      - كيف يحمل غير القابل للأكل النكهة؟
      - ما هي العلاقة بين الورقة والذاكرة؟
  - id: ind_mint_chutney_bright
    name: صلصة النعناع الزاهية
    prompt: |
      صلصة النعناع طازجة — مزيج من العشب، فلفل أخضر، ليمون. تقطع الدسامة، تضيء الطبق. لاحظ اللون مقابل بقية الثالي. ماذا يفعل اللون الأخضر للتكوين؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الصلصة؟
