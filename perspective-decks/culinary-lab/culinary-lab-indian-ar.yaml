      - ما هي العلاقة بين الزاهي والتوازن؟
  - id: ind_wedding_feast
    name: وليمة الزفاف
    prompt: |
      طعام حفلات الزفاف الهندي هو حجم — مئات، آلاف يُطعمون. البوفيه، التنوع، الإفراط. لاحظ الرقصة. كيف يغير الحجم الوجبة؟ ما هي العلاقة بين الاحتفال والاستهلاك؟
    follow_ups:
      - ماذا سيكون الزفاف بدون الوليمة؟
