# مختبر الطهي — إيطالي (Arabic)

id: culinary_lab_italian
name: مختبر الطهي — إيطالي
description: 50 بطاقة لتغيير طريقة تجربتك للطعام الإيطالي — من كيمياء زيت الزيتون والحمض إلى الرقص الاجتماعي على المائدة وعلم الآثار لكل مكون.
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: تحول الطماطم
    prompt: |
      تتحول حبة الطماطم النيئة إلى شيء آخر بالحرارة والوقت. تتبع هذا المسار.
      ماذا يحدث للحموضة؟ للهيكل؟ الطماطم تحمل رحلة.
    follow_ups:
      - كيف يغير الصلصة الذوق؟
      - ماذا سيُفقد بدون التحول؟
      - ما هي العلاقة بين النيء والمطبوخ؟
  - id: it_bread_arrival
    name: وصول الخبز
    prompt: |
      يصل الخبز قبل الوجبة — أحيانًا دافئًا، وأحيانًا مع الزيت. لاحظ ترتيب الأشياء. الخبز هو مدخل. من يقرر متى يأكل؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الخبز؟
      - كيف يضع الخبز وتيرة الوجبة؟
      - ما هي العلاقة بين الخبز والترقب؟
  - id: it_pasta_shape
    name: شكل المعكرونة
    prompt: |
      يحمل كل شكل من أشكال المعكرونة الصلصة بشكل مختلف — نتوءات، تجاويف، منحنيات. اختر طبقًا واسأل: لماذا هذا الشكل لهذه الصلصة؟ الشكل هو قرار.
    follow_ups:
      - ماذا سيتغير بشكل مختلف؟
      - كيف يؤثر الشكل على اللقمة؟
      - ما هي العلاقة بين الشكل والوظيفة؟
  - id: it_basil_fragrance
    name: رائحة الريحان
    prompt: |
      يصل الريحان إلى الأنف قبل الفم. أغمض عينيك وابحث عن العشبة. أين توجد في الطبق؟ الرائحة هي خريطة.
    follow_ups:
      - ماذا سيكون الطبق بدون الرائحة؟
      - كيف تهيئ الرائحة الذوق؟
      - ما هي العلاقة بين الرائحة والذوق؟
  - id: it_olive_oil_pool
    name: بركة زيت الزيتون
    prompt: |
      يتجمع زيت الزيتون على السطح أو يلمع الطبق. شاهد كيف يتحرك. يحمل الزيت النكهة والدهون. ماذا يربط؟
    follow_ups:
      - ماذا سيكون الطبق بدون الزيت؟
      - كيف يغير الزيت ملمس الفم؟
      - ما هي العلاقة بين الزيت والحرارة؟
  - id: it_parmesan_shatter
    name: تفتت البارميزان
    prompt: |
      البارميزانو المبشور طازجًا له قرمشة بلورية. استمع إليها. الجبن هو ملمس بقدر ما هو طعم. كيف يعطي اللقمة نكهة؟
    follow_ups:
      - ماذا سيكون الطبق بدون القرمشة؟
      - كيف يكمل الجبن الذوق؟
      - ما هي العلاقة بين الجبن والملح؟
  - id: it_espresso_ritual
    name: طقس الإسبريسو
    prompt: |
      يصل الإسبريسو في النهاية — كوب صغير، بدون حليب. الطقس يمثل الإغلاق. من يشربه واقفًا؟ من يجلس؟ الإسبريسو هو علامة ترقيم.
    follow_ups:
      - ماذا ستكون الوجبة بدون الإسبريسو؟
      - كيف يشكل الطقس الوقت؟
      - ما هي العلاقة بين القهوة والنهاية؟
  - id: it_antipasti_sequence
    name: تسلسل المقبلات
    prompt: |
      تأتي المقبلات أولاً — أطباق صغيرة، مشتركة أم لا. لاحظ التسلسل. ما هو منطق الترتيب؟ البداية تحدد النغمة.
    follow_ups:
      - ماذا سيتغير إذا عكس الترتيب؟
      - كيف يخلق التسلسل الشهية؟
      - ما هي العلاقة بين الأول والأخير؟
  - id: it_wine_pour
    name: سكب النبيذ
    prompt: |
      يُسكب النبيذ — من يسكب؟ كم؟ السكب هو رقص اجتماعي. شاهد الإيماءات. ماذا تقول؟
    follow_ups:
      - ماذا ستكون المائدة بدون النبيذ؟
      - كيف يخلق السكب الاحتفال؟
      - ما هي العلاقة بين السكب والوتيرة؟
  - id: it_risotto_stir
    name: تحريك الريزوتو
    prompt: |
      يتطلب الريزوتو التحريك المستمر. يطلق النشا ببطء. فكر في الجهد المبذول في الوعاء. ماذا سيحدث بدون التحريك؟
    follow_ups:
      - ماذا سيكون الأرز بدون القوام الكريمي؟
      - كيف يغير التحريك الملمس؟
      - ما هي العلاقة بين الجهد والنتيجة؟
  - id: it_porcini_earth
    name: فطر البورشيني الترابي
    prompt: |
      فطر البورشيني له طعم أرض الغابة — أومامي، تراب، تحلل. تتبع الفطر إلى مصدره. أين نما؟ تحت أي أشجار؟
    follow_ups:
      - ماذا سيكون الطبق بدون الطعم الترابي؟
      - كيف يشكل الأصل النكهة؟
      - ما هي العلاقة بين الفطر والغابة؟
  - id: it_plate_negative_space
    name: المساحة السلبية في الطبق
    prompt: |
      غالبًا ما يترك التقديم الإيطالي مساحة — الطبق لا يُملأ. فكر في الفراغ. ماذا يؤطر؟ ماذا يسمح؟
    follow_ups:
      - كيف سيبدو الطبق مغطى بالكامل؟
      - كيف تركز المساحة السلبية العين؟
      - ما هي العلاقة بين الفارغ والممتلئ؟
  - id: it_garlic_sizzle
    name: طشيش الثوم
    prompt: |
      يصطدم الثوم بالزيت الساخن — الطشيش هو كيمياء. استمع. شم. اللحظة سريعة الزوال. ماذا سيحترق؟ ماذا سيُفقد؟
    follow_ups:
      - ماذا سيكون الطبق بدون الطشيش؟
      - كيف يشكل التوقيت النكهة؟
      - ما هي العلاقة بين الحرارة والرائحة؟
  - id: it_crust_bubbles
    name: فقاعات قشرة الخبز
    prompt: |
      تتكون فقاعات في قشرة الفوكاتشا أو البيتزا في الفرن. كل فقاعة هي جيب بخار. فكر في بنية اللب.
    follow_ups:
      - ماذا سيكون الخبز بدون الفقاعات؟
      - كيف يحتفظ اللب بالزيت والملح؟
      - ما هي العلاقة بين الهواء والهيكل؟
  - id: it_prosciutto_slice
    name: شريحة البروشوتو
    prompt: |
      يُقطع البروشوتو شرائح رفيعة — شبه شفافة. السكين مهم. فكر في الحرفة. ماذا ستفعل الشريحة السميكة؟
    follow_ups:
      - ماذا ستكون اللحم المعالج بدون الرفيع؟
      - كيف يؤثر السماكة على الذوبان؟
      - ما هي العلاقة بين الشريحة والتذوق؟
  - id: it_balsamic_drop
    name: قطرة البلسميك
    prompt: |
      يُقدم خل البلسميك المعتق قطرات — غالٍ، ثمين. شاهد اللزوجة. القطرة هي تركيز. ماذا تضيف؟
    follow_ups:
      - ماذا سيكون الطبق بدون الحمض؟
      - كيف تقطع القطرة الدهون؟
      - ما هي العلاقة بين الحلو والحامض؟
  - id: it_gnocchi_pillow
    name: وسادة النيوكي
    prompt: |
      يجب أن يكون النيوكي خفيفًا — مثل الوسائد، وليس مثل الحجارة. اشعر بالملمس. نسبة البطاطا والدقيق دقيقة. ما الذي يجعلها تعمل؟
    follow_ups:
      - ماذا سيكون النيوكي إذا كان ثقيلًا جدًا؟
      - كيف يحدد الملمس الطبق؟
      - ما هي العلاقة بين البطاطا والدقيق؟
  - id: it_salt_block
    name: كتلة الملح
    prompt: |
      تستخدم بعض المطابخ الإيطالية كتل الملح للشوي. فكر في المعدن. من أين جاء الملح؟ ماذا يضفي؟
    follow_ups:
      - ماذا سيكون اللحم بدون الملح؟
      - كيف تغير الكتلة عملية الطهي؟
      - ما هي العلاقة بين الملح واللهب؟
  - id: it_cacio_e_pepe
    name: كاشيو إي بيبي
    prompt: |
      كاشيو إي بيبي هو جبن، فلفل، ماء معكرونة. ثلاثة مكونات. الاستحلاب هو الحيلة. ما الذي يجعله متماسكًا؟ ما الذي يفسده؟
    follow_ups:
      - ماذا سيكون الطبق بدون الاستحلاب؟
      - كيف يربط ماء المعكرونة؟
      - ما هي العلاقة بين البساطة والتقنية؟
  - id: it_cannoli_crunch
    name: قرمشة الكانولي
    prompt: |
      قشرة الكانولي تتفتت؛ الحشوة ناعمة. التباين متعمد. فكر في بنية اللقمة.
    follow_ups:
      - ماذا ستكون الحلوى بدون التباين؟
      - كيف يخلق الملمس المتعة؟
      - ما هي العلاقة بين القشرة والحشوة؟
  - id: it_risotto_clock
    name: ساعة الريزوتو
    prompt: |
      لدي الريزوتو نافذة — أل دينتي، ثم يختفي. الطاهي يصارع الوقت. فكر في الدقة. ماذا ستفعل خمس دقائق إضافية؟
    follow_ups:
      - ماذا سيكون الأرز إذا تم طهيه أكثر من اللازم؟
      - كيف يحدد التوقيت الطبق؟
      - ما هي العلاقة بين الساعة والحرفة؟
  - id: it_truffle_shave
    name: بشر الكمأة
    prompt: |
      تُبشر الكمأة على الطاولة — الطقس، الرائحة. الكمأة زائلة. من أين جاءت؟ أي حيوان وجدها؟
    follow_ups:
      - ماذا سيكون الطبق بدون الاحتفال؟
      - كيف توزع البشر النكهة؟
      - ما هي العلاقة بين الطقس والندرة؟
  - id: it_spaghetti_twist
    name: لف السباغيتي
    prompt: |
      الإيطاليون يلفون السباغيتي بالشوكة — بدون ملعقة. اللف هو ثقافي. شاهد الحركة. ماذا تحقق؟
    follow_ups:
      - ماذا ستكون اللقمة بدون اللف؟
      - كيف تشكل الحركة الوجبة؟
      - ما هي العلاقة بين الأداة والتقاليد؟
  - id: it_caprese_layers
    name: طبقات الكابريزي
    prompt: |
      يكدس الكابريزي الطماطم والموزاريلا والريحان. الطبقات بسيطة. فكر في اللون — أحمر، أبيض، أخضر. الطبق هو علم.
    follow_ups:
      - ماذا سيكون الطبق بدون الترتيب؟
      - كيف تخلق الطبقات الانسجام؟
      - ما هي العلاقة بين اللون والذوق؟
  - id: it_polenta_set
    name: تماسك البولينتا
    prompt: |
      تتماسك البولينتا أثناء تبريدها — من طرية إلى ثابتة. فكر في درجة الحرارة. ماذا ستكون وهي ساخنة؟ باردة؟ الملمس هو وظيفة الوقت.
    follow_ups:
      - ماذا ستكون البولينتا إذا لم تبرد أبدًا؟
      - كيف يغير التماسك الطبق؟
      - ما هي العلاقة بين الحرارة والهيكل؟
  - id: it_amaro_finish
    name: إنهاء الأمارو
    prompt: |
      يُنهي الأمارو الوجبة — مر، هاضم. المرارة متعمدة. ماذا تفعل للذوق؟ للجسم؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الأمارو؟
      - كيف يعيد المرارة تجديد اللسان؟
      - ما هي العلاقة بين المرارة والإغلاق؟
  - id: it_lardo_spread
    name: دهن اللاردو
    prompt: |
      اللاردو هو دهن خنزير معالج — يُدهن على الخبز، يذوب. فكر في الدهون. من أين جاءت؟ ماذا تحمل؟
    follow_ups:
      - ماذا سيكون الخبز بدون اللاردو؟
      - كيف تحمل الدهون النكهة؟
      - ما هي العلاقة بين الدهون والحفظ؟
  - id: it_sardine_silver
    name: فضة السردين
    prompt: |
      تلمع السردين الطازج — جلد فضي، كامل. السمك صغير، زيتي. فكر في الحجم. ماذا سيغير السمك الأكبر؟
    follow_ups:
      - ماذا سيكون الطبق بدون الزيت؟
      - كيف يؤثر الحجم على الطهي؟
      - ما هي العلاقة بين الصغير والكثيف؟
  - id: it_burrata_break
    name: كسر البوراتا
    prompt: |
      يجب كسر البوراتا — الخارج يستسلم للكريمة. اللحظة مسرحية. فكر في التباين. قشرة خارجية، سائل داخلي.
    follow_ups:
      - ماذا سيكون الجبن بدون الكسر؟
      - كيف يخلق الانكسار المفاجأة؟
      - ما هي العلاقة بين الهيكل والتدفق؟
  - id: it_osso_buco_marrow
    name: نخاع عظم أوسو بوكو
    prompt: |
      يركز أوسو بوكو على النخاع — العظم يحمل كنزًا. النخاع غني، دهني. فكر في الاستخراج. من يحصل على النخاع؟
    follow_ups:
      - ماذا سيكون الطبق بدون العظم؟
      - كيف يكمل النخاع التخديس؟
      - ما هي العلاقة بين العظم والنكهة؟
  - id: it_limoncello_shot
    name: جرعة الليمونسيلو
    prompt: |
      يأتي الليمونسيلو في كوب مبرد — أصفر، حلو، قوي. الجرعة هي علامة ترقيم. من أين تأتي الليمونات؟ ماذا تحمل؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الليمونسيلو؟
      - كيف تميز الجرعة النهاية؟
      - ما هي العلاقة بين الليمون والمكان؟
  - id: it_sfogliatella_layers
    name: طبقات السفولياتيلا
    prompt: |
      للسفولياتيلا مئات الطبقات الرقيقة جدًا — مطوية، مقرمشة. فكر في الجهد. كل طبقة هي قرار. ماذا ستفعل الطبقات الأقل؟
    follow_ups:
      - ماذا ستكون المعجنات بدون الطبقات؟
      - كيف يخلق الهيكل الملمس؟
      - ما هي العلاقة بين الحرفة والقرمشة؟
  - id: it_saltimbocca_name
    name: اسم سالتيمبوكا
    prompt: |
      سالتيمبوكا تعني "يقفز في الفم". الاسم يعد. هل الطبق يفي بالوعد؟ فكر في الفجوة بين الاسم والتجربة.
    follow_ups:
      - ماذا سيكون الطبق بدون الاسم؟
      - كيف يشكل التسمية التوقعات؟
      - ما هي العلاقة بين الكلمة والذوق؟
  - id: it_artichoke_prep
    name: تحضير الخرشوف
    prompt: |
      الخرشوف يتطلب تحضيرًا — إزالة الشوك، تقليم الأشواك. فكر في النفايات. ماذا يُهدر؟ ماذا يُكنز؟ الخضار هو هندسة معمارية.
    follow_ups:
      - ماذا سيكون الخرشوف بدون تحضير؟
      - كيف يغير التحضير عملية الطهي؟
      - ما هي العلاقة بين الجهد والمكافأة؟
  - id: it_grappa_clear
    name: الجرابا الصافية
    prompt: |
      الجرابا صافية — مقطرة من مخلفات العنب. المشروب الروحي يحمل شبح العنب. فكر في التحول. ما الذي يبقى وراءه؟
    follow_ups:
      - ماذا ستكون الوجبة بدون الجرابا؟
      - كيف يركز التقطير؟
      - ما هي العلاقة بين العنب والمشروب الروحي؟
  - id: it_panzanella_soft
    name: بانزانيلا طرية
    prompt: |
      تستخدم البانزانيلا الخبز القديم — يُطرى بعصير الطماطم والخل. الخبز يُبعث من جديد. فكر في التحول. ماذا سيفعل الخبز الطازج؟
    follow_ups:
      - ماذا سيكون السلطة بدون الخبز؟
      - كيف يغير النقع الملمس؟
      - ما هي العلاقة بين القديم والمُعاد إحياؤه؟
  - id: it_capers_brine
    name: محلول الكبر
    prompt: |
      الكبر هو براعم — مخللة، مالحة. إنها تُضيف نكهة. فكر في المحلول. من أين جاء الملح؟ ماذا يحفظ المخلل؟
    follow_ups:
      - ماذا سيكون الطبق بدون الكبر؟
      - كيف يغير المحلول البرعم؟
      - ما هي العلاقة بين الحفظ والنكهة؟
  - id: it_ravioli_seam
    name: درزة الرافيولي
    prompt: |
      للرافيولي درزة — حيث تُضغط المعكرونة. يمكن أن تنفجر الدرزة. فكر في الحرفية. ما الذي يحمل الحشوة؟
    follow_ups:
      - ماذا سيكون الرافيولي بدون الدرزة؟
      - كيف تحمي الإغلاقات الحشوة؟
      - ما هي العلاقة بين الهيكل والمفاجأة؟
  - id: it_negroni_orange
    name: برتقال النغروني
    prompt: |
      يُقدم النغروني مع البرتقال — شريحة أو قشر. الحمضيات تطفو. فكر في الزينة. ماذا تضيف؟ متى تتذوقها؟
    follow_ups:
      - ماذا سيكون المشروب بدون البرتقال؟
      - كيف تكمل الزينة التوازن؟
      - ما هي العلاقة بين المر والحمضيات؟
  - id: it_focaccia_dimples
    name: تجاويف الفوكاتشا
    prompt: |
      للفوكاتشا تجاويف — بصمات إبهام، مملوءة بالزيت. التجاويف تحمل السائل والملح. فكر في السطح. ماذا ستفعل قمة مسطحة؟
    follow_ups:
      - ماذا سيكون الخبز بدون التجاويف؟
      - كيف تخلق البرك النكهة؟
      - ما هي العلاقة بين السطح والتوابل؟
  - id: it_arancini_crust
    name: قشرة الأرانشيني
    prompt: |
