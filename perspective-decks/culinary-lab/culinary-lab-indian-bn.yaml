# রন্ধনশালা — ভারতীয় (Bengali)

id: culinary_lab_indian
name: রন্ধনশালা — ভারতীয়
description: ৫০টি কার্ড যা ভারতীয় খাবারের অভিজ্ঞতাকে নতুনভাবে দেখতে সাহায্য করবে—মশলার রসায়ন ও ঝাঁঝ থেকে শুরু করে উপকরণের প্রত্নতত্ত্ব এবং ভাগ করে নেওয়া টেবিলের নৃত্যকলা পর্যন্ত।
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: তাডকার ফোঁটা
    prompt: |
      তাডকা—অর্থাৎ তেলে মশলা ফোঁটানো—হলো সুরের প্রথম স্বর। গরম তেলে সরিষার দানা, জিরা, কারি পাতা। শুনুন। ফোঁটা ফোঁটা শব্দ হলো রিয়েল-টাইম রসায়ন। শোনার পর মুখে দেওয়ার আগে কী পরিবর্তন হয়?
    follow_ups:
      - শব্দ কীভাবে প্রত্যাশাকে প্রভাবিত করে?
      - ফোঁটা ফোঁটা শব্দ ছাড়া খাবারটিতে কী হারাবে?
      - শব্দ এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: ind_spice_route
    name: মশলার পথ
    prompt: |
      এলাচ এসেছিল কেরালা থেকে। জাফরান কাশ্মীর থেকে। কালো মরিচ একসময় সোনার দামে বিক্রি হত। আপনার পাতে থাকা একটি মশলার উৎস সন্ধান করুন। আপনার কাছে পৌঁছাতে এটি কোন যাত্রা করেছিল?
    follow_ups:
      - পথ জানার পর কামড়ের অনুভূতি কীভাবে পরিবর্তিত হয়?
      - কোন মশলাগুলো একই পথে ভ্রমণ করেছিল?
      - বাণিজ্য এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: ind_thali_geometry
    name: থালির জ্যামিতি
    prompt: |
      একটি থালি হলো একটি ক্যানভাস—বাটিগুলি বৃত্তাকারে সাজানো, প্রতিটির একটি নির্দিষ্ট ভূমিকা। নকশাটি পর্যবেক্ষণ করুন। চোখ প্রথমে কোথায় পড়ে? খালি জায়গা কোথায়?
    follow_ups:
      - একটি বাটি অনুপস্থিত থাকলে কী হবে?
      - খাবার কীভাবে সাজানো হয় তা খাবারের অভিজ্ঞতাকে প্রভাবিত করে?
      - জ্যামিতি এবং আচারের মধ্যে সম্পর্ক কী?
  - id: ind_hand_as_tool
    name: হাত একটি যন্ত্র
    prompt: |
      রুটি ছেঁড়া, সবজির সাথে মেলা, মুখে ভরা। হাত হলো সরঞ্জাম এবং সংবেদী অঙ্গ। নৃত্যকলাটি লক্ষ্য করুন। কাঁটাচামচ ও ছুরির চেয়ে স্পর্শ কী বেশি যোগ করে?
    follow_ups:
      - হাত দিয়ে খাওয়া খাবারের গতি কীভাবে পরিবর্তন করে?
      - রূপোর সরঞ্জাম ব্যবহার করলে কী হারাবে?
      - স্পর্শ এবং তাপমাত্রার মধ্যে সম্পর্ক কী?
  - id: ind_heat_layers
    name: ঝাঁঝের স্তর
    prompt: |
      ভারতীয় খাবারে ঝাঁঝের স্তর থাকে—মরিচের জ্বালা, কালো মরিচের উষ্ণতা, আদার আগুন। এক কামড় নিন এবং প্রতিটি ঝাঁঝ কোথায় লাগছে তা ম্যাপ করুন। জিহ্বা, গলা, পেট। এগুলি কীভাবে তৈরি হয়?
    follow_ups:
      - কেবল একটি ঝাঁঝ থাকলে খাবারটি কেমন হত?
      - ঝাঁঝের স্তর কীভাবে জটিলতা তৈরি করে?
      - ঝাঁঝ এবং সময়ের মধ্যে সম্পর্ক কী?
  - id: ind_yogurt_intervention
    name: দইয়ের হস্তক্ষেপ
    prompt: |
      রায়তা, দই, লস্যি—দই ঠান্ডা করে, ঝাঁঝ কমায়, ভারসাম্য আনে। আপনি কখন এটি যোগ করছেন সেই মুহূর্তটি লক্ষ্য করুন। অ্যাসিড চর্বির সাথে মেশে, ঠান্ডা গরমে মেশে। এই হস্তক্ষেপ রাসায়নিক। এটি কী থামিয়ে দেয়?
    follow_ups:
      - দই ছাড়া খাবারটি কেমন হত?
      - বৈসাদৃশ্য কীভাবে স্বস্তি তৈরি করে?
      - হস্তক্ষেপ এবং ভারসাম্যের মধ্যে সম্পর্ক কী?
  - id: ind_betel_after
    name: পানের পরের অনুভূতি
    prompt: |
      কিছু ঐতিহ্য অনুযায়ী পান—সুপারি পাতা—খাবার শেষ করে। এটা মিষ্টি নয়। এটা সমাপ্তি। মুখের স্বাদ আবার পরিবর্তিত হয়। এই সমাপ্তি পুরো খাবারটি সম্পর্কে কী বলে?
    follow_ups:
      - পান কীভাবে পরিবর্তনকে চিহ্নিত করে?
      - এটি ছাড়া খাবারটিতে কী অভাব হত?
      - সমাপ্তি এবং স্মৃতির মধ্যে সম্পর্ক কী?
  - id: ind_street_chaos
    name: রাস্তার কোলাহল
    prompt: |
      একজন চাটওয়ালা দ্রুত হাতে কাজ করে—ভেড়, পাপড়ি, চাটনি মুহূর্তের মধ্যে সাজানো। পরিবেশনাটি দেখুন। এই দোকানটি একটি মঞ্চ। স্ক্রিপ্ট কী? দর্শক কারা?
    follow_ups:
      - পরিবেশনা ছাড়া খাবারটি কেমন হত?
      - দ্রুততা কীভাবে অভিজ্ঞতাকে প্রভাবিত করে?
      - কোলাহল এবং কারুকার্যের মধ্যে সম্পর্ক কী?
  - id: ind_tandoor_breathe
    name: তন্দুরের শ্বাস
    prompt: |
      একটি তন্দুর শ্বাস নেয়—আগুন, ধোঁয়া, মাটি। নান দেওয়ালে লেগে থাকে, ফোস্কা পড়লেই টেনে বের করা হয়। একটির কাছে দাঁড়ান। তাপ, গন্ধ। আগুন এবং স্বাদের মধ্যে সম্পর্ক কী?
    follow_ups:
      - তন্দুর ছাড়া নান কেমন হত?
      - মাটি কীভাবে রান্নাকে প্রভাবিত করে?
      - শ্বাস এবং রুটির মধ্যে সম্পর্ক কী?
  - id: ind_turmeric_stain
    name: হলুদের দাগ
    prompt: |
      হলুদ দাগ ফেলে—আঙুল, কাপড়, প্লাস্টিক। রঙটি রয়ে যায়। কী কী দাগ ফেলে তা লক্ষ্য করুন। এই দাগ প্রত্নতত্ত্বের মতো। আপনার কাছে পৌঁছানোর আগে এই খাবারটি কোথা থেকে ভ্রমণ করেছে?
    follow_ups:
      - রঙ ছাড়া খাবারটি কেমন হত?
      - দাগ কীভাবে শ্রম চিহ্নিত করে?
      - রঞ্জক এবং সংরক্ষণের মধ্যে সম্পর্ক কী?
  - id: ind_rice_architecture
    name: ভাতের স্থাপত্য
    prompt: |
      বিরিয়ানি তৈরি হয়—ভাতের স্তর, মাংসের স্তর, জাফরান, ভাজা পেঁয়াজ। গঠনটি ধরে রাখে। এটি উন্মোচন করুন। স্থাপত্য প্রতিটি কামড়কে কীভাবে প্রভাবিত করে?
    follow_ups:
      - স্তরগুলো খুব তাড়াতাড়ি মিশে গেলে কী হবে?
      - গঠন কীভাবে বিস্ময় তৈরি করে?
      - নির্মাণ এবং খাওয়ার মধ্যে সম্পর্ক কী?
  - id: ind_chutney_spectrum
    name: চাটনির বর্ণালী
    prompt: |
      পুদিনা, তেঁতুল, নারকেল, টমেটো—চাটনিগুলো প্যালেটের মতো সাজানো। প্রতিটি কামড় পরিবর্তন করে। তিনটি চাটনি দিয়ে একটি খাবার খান। একই ভিত্তি কীভাবে তিনটি ভিন্ন গল্প হয়ে ওঠে?
    follow_ups:
      - কেবল একটি চাটনি থাকলে খাবারটি কেমন হত?
      - পছন্দ কীভাবে স্বাধীনতা তৈরি করে?
      - বর্ণালী এবং পছন্দের মধ্যে সম্পর্ক কী?
  - id: ind_steam_rising
    name: উড়ে আসা ভাপ
    prompt: |
      ইডলি, ধোসা, পুরি—ঢাকনা তুললে ভাপ ওঠে। এটি দেখুন। ভাপ স্বাদের আগে সুগন্ধ বহন করে। কোনটি আগে আসে? নাক নাকি মুখ?
    follow_ups:
      - ভাপ কীভাবে প্রত্যাশাকে প্রভাবিত করে?
      - ঢাকনা না তুললে কী হারাবে?
      - বাষ্প এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: ind_silver_versus_steel
    name: রূপা বনাম স্টিল
    prompt: |
      কিছু টেবিলে স্টিলের থালা, কিছু রূপার, কিছু কলার পাতা ব্যবহার করা হয়। পাত্রটি লক্ষ্য করুন। খাবারের নীচের পৃষ্ঠ কীভাবে অভিজ্ঞতা পরিবর্তন করে? ওজন, শব্দ, ঐতিহ্য।
    follow_ups:
      - ভিন্ন পৃষ্ঠে খাবার খেলে কেমন লাগত?
      - পাত্র কীভাবে আচারকে প্রভাবিত করে?
      - উপাদান এবং অর্থের মধ্যে সম্পর্ক কী?
  - id: ind_cumin_fragrance
    name: জিরা সুগন্ধ
    prompt: |
      ভাজা জিরা দানা স্বাদের আগে সুগন্ধ ছড়ায়। খাবার মুখে দেওয়ার আগে শুঁকুন। জিরা ঘর জুড়ে ছড়িয়ে পড়ে। সুগন্ধ কীভাবে মুখের স্বাদ তৈরি করে?
    follow_ups:
      - গন্ধ ছাড়া খাবারটি কেমন হত?
      - সুগন্ধ কীভাবে রাঁধুনিকে চিহ্নিত করে?
      - নাক এবং স্মৃতির মধ্যে সম্পর্ক কী?
  - id: ind_shared_central
    name: কেন্দ্রীয় ভাগাভাগি
    prompt: |
      থালায় খাবার রাখা হয়। সবাই সেখান থেকে নেয়। "তোমার প্লেট" বলে কিছু থাকে না। হাত বাড়ানো, খাবার দেওয়া, নেওয়া—এই নৃত্যকলা পর্যবেক্ষণ করুন। অলিখিত নিয়মগুলো কী কী?
    follow_ups:
      - পৃথক অংশে খাবার পেলে কেমন হত?
      - ভাগাভাগি কীভাবে সংযোগ তৈরি করে?
      - কেন্দ্রীয় এবং গোষ্ঠীর মধ্যে সম্পর্ক কী?
  - id: ind_ghee_gloss
    name: ঘিয়ের দ্যুতি
    prompt: |
      ঘি জমে, চকচক করে, ঢেকে রাখে। এটি ফ্যাট হিসেবে স্বাদ এবং শেষাংশ। প্লেটে কোথায় জমা হয় তা লক্ষ্য করুন। সেই দ্যুতি কীভাবে গঠন এবং তাপমাত্রা পরিবর্তন করে?
    follow_ups:
      - তেলের বদলে ঘি ব্যবহার করলে খাবারটি কেমন হত?
      - ঘি কীভাবে অন্যান্য স্বাদ বহন করে?
      - দ্যুতি এবং সমৃদ্ধির মধ্যে সম্পর্ক কী?
  - id: ind_papad_crunch
    name: পাপড়ের মচমচে ভাব
    prompt: |
      পাপড়—মচমচে, পাতলা, শব্দ করে। এটি খাবারের একটি যতিচিহ্ন। একটি ভাঙুন। শুনুন। মচমচে শব্দটি খাবারের ছন্দের অংশ। এটি ছাড়া নীরবতা কেমন শোনাবে?
    follow_ups:
      - মচমচে ভাব কীভাবে বৈসাদৃশ্য তৈরি করে?
      - পাপড় ছাড়া খাবারটিতে কী অভাব হত?
      - শব্দ এবং তৃপ্তির মধ্যে সম্পর্ক কী?
  - id: ind_sambar_depth
