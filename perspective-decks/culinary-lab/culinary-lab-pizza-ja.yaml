# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# クッキングラボ — ピザ (Japanese)

id: culinary_lab_pizza
name: クッキングラボ — ピザ
description: |
  生地や炎の化学から、一切れやトッピングの考古学まで、ピザ体験を変える50枚のカード。
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: 生地を伸ばす
    prompt: |
      生地が伸ばされるのを見る—手で投げたり、プレスしたり。グルテンの網が伸び、空気を閉じ込める。形が決まる。
      四角い一切れは、三角のそれとどう違う意味を持つだろうか？
    follow_ups:
      - 伸ばし方は体験をどう定義するか？
      - 伸ばすことがなければピザはどうなるか？
      - 手と形の関係とは？
  - id: piz_oven_breath
    name: オーブンの息吹
    prompt: |
      ピザ窯は息をする—薪、ガス、電気。ドームは熱を保ち、床はそれを伝える。窯の近くに立ってみよう。
      窯は何を料理人に要求するか？生地には？
    follow_ups:
      - オーブンがなければピザはどうなるか？
      - 熱はどのようにクラストを形作るか？
      - 息吹と焦げ目の関係とは？
  - id: piz_sauce_spiral
    name: ソースの渦巻き
    prompt: |
      ソースは端から端まで広げず、渦巻き状に塗られることが多い。その模様を研究してみよう。
      何が覆われ、何が露出しているか？渦巻きは構成だ。
    follow_ups:
      - 全面にソースを塗ったらピザはどう見えるか？
      - 渦巻きは一口ごとにどう影響するか？
      - パターンと味の関係とは？
  - id: piz_cheese_melt
    name: チーズの溶け具合
    prompt: |
      チーズは異なる速さで溶ける。モッツァレラは伸び、熟成チーズは油を出す。
      溶ける様子を見てみよう。脂肪とタンパク質、熱と時間の化学反応。いつが完成か？
    follow_ups:
      - 溶け具合がなければ一切れはどうなるか？
      - 溶け具合は一口ごとにどう形作るか？
      - 溶け具合と記憶の関係とは？
  - id: piz_crust_char
    name: クラストの焦げ目
    prompt: |
      レオパルディング—クラストの焦げ目—は薪窯ピザの印だ。それぞれの焦げ目は、極度の熱との接触の瞬間。
      その焦げ目が加える風味を考えてみよう。色が薄いクラストとは？
    follow_ups:
      - 焦げ目は体験をどう変えるか？
      - 焦げ目がなければピザはどうなるか？
      - 焦げ目と職人技の関係とは？
  - id: piz_slice_fold
    name: 一切れの折り方
    prompt: |
      ニューヨークスタイル：一切れを折る。折り目は構造的—トッピングを支え、油を流す。
      折り目は振り付けだ。それは何をもたらすか？
    follow_ups:
      - 折り目がなければ食事はどうなるか？
      - 折り目は一口ごとにどう形作るか？
      - 折り目と場所の関係とは？
  - id: piz_pepperoni_cup
    name: ペパロニカップ
    prompt: |
      良いペパロニカップ—縁はカリカリ、中央は油が溜まる。形と食感の変化だ。
      それがいつ起こるか注目してみよう。カップは何によって作られたか？
    follow_ups:
      - カップがなければペパロニはどうなるか？
      - カップはどうやって風味を保つか？
      - 脂肪と形の関係とは？
  - id: piz_basil_finish
    name: バジルの仕上げ
    prompt: |
      ピザのバジルは、焼いた後—フレッシュで鮮やかな—に添えられることが多い。
      それはベースではなく、仕上げだ。コントラストに注目しよう。フレッシュなものは調理されたものに何を加えるか？
    follow_ups:
      - バジルがなければピザはどうなるか？
      - タイミングはハーブをどう形作るか？
      - 生と調理済みの関係とは？
  - id: piz_margherita_minimal
    name: マルゲリータ ミニマル
    prompt: |
      マルゲリータは3つの要素：生地、トマト、チーズ。それぞれが主役でなければならない。
      隠れる場所はない。規律を考えてみよう。ミニマリズムは何を要求するか？
    follow_ups:
      - 一つの間違いがどうなるか？
      - シンプルさは味覚をどう集中させるか？
      - 少数と多数の関係とは？
  - id: piz_pool_table
    name: プールテーブル
    prompt: |
      一部のピザ店には、見知らぬ人が空間を共有する長い共用テーブルがある。
      ピザが運ばれてくる。テーブルは舞台だ。誰があなたの隣で食べるか？暗黙の契約とは？
    follow_ups:
      - ブースでの食事はどうなるか？
      - テーブルは出会いをどう形作るか？
      - 共有とプライベートの関係とは？
  - id: piz_box_flip
    name: 箱のひっくり返し
    prompt: |
      ピザボックス—段ボール、中央にはプラスチックの三脚。
      換気や積み重ねのために設計されている。箱はインフラだ。それがなければテイクアウトはどうなるか？
    follow_ups:
      - 箱は家までの道のりをどう形作るか？
      - 箱が開けられると何が起こるか？
      - 箱と儀式との関係とは？
  - id: piz_dough_ferment
    name: 生地の発酵
    prompt: |
      ピザ生地は発酵する—数時間か数日。酵母が気泡と風味を生み出す。
      古い生地には旨味がある。一口ごとの時間を考えてみよう。すぐに膨らむ生地は何を犠牲にするか？
    follow_ups:
      - 発酵はクラストをどう形作るか？
      - 時間と味の関係とは？
      - 同日生地とは何か？
  - id: piz_cornicione
    name: コルニチョーネ
    prompt: |
      コルニチョーネ—縁、クラスト—はしばしば一番の部位だ。空気を含み、焦げ目があり、少し噛み応えがある。
      残す人もいれば、最初に食べる人もいる。縁との関係とは？
    follow_ups:
      - コルニチョーネがなければピザはどうなるか？
      - 縁は中心をどう縁取るか？
      - クラストと中心の関係とは？
  - id: piz_olive_oil_drizzle
    name: オリーブオイルの drizzle
    prompt: |
      焼いた後に drizzle されるオリーブオイル—クラストの上、または全体に。
      それは光沢を増す。オイルは風味を運び、豊かさを加える。いつ加えられるかに注目しよう。drizzle は何を加えるか？
    follow_ups:
      - それがなければピザはどうなるか？
      - オイルは一口ごとにどう変わるか？
      - 脂肪と仕上げの関係とは？
  - id: piz_anchovy_salt
    name: アンチョビの塩気
    prompt: |
      ピザのアンチョビ—塩辛く、旨味があり、好みが分かれる。ソースに溶け込むか、上に乗る。
      アンチョビは考古学：地中海、保存食、古代。それはどんな旅をしてきたか？
    follow_ups:
      - アンチョビがなければ一切れはどうなるか？
      - 塩は他の風味をどう形作るか？
      - 保存されたものとフレッシュなものの関係とは？
  - id: piz_sound_crunch
    name: 音のカリカリ感
    prompt: |
      よくできたクラストの最初の一口—カリカリとした音、歯ごたえ。目を閉じてみよう。
      音は体験の一部だ。ピザが静かだったらどうなるか？
    follow_ups:
      - 音は満足感をどう形作るか？
      - ふにゃふにゃのクラストはどんな音がするか？
      - カリカリ感と品質の関係とは？
  - id: piz_second_slice
    name: 二切れ目
    prompt: |
      二切れ目は最初の一切れとは違う—もうピザを知っている。味覚が調整された。
      その変化に気づこう。二切れ目は同じ味か？より良いか？違うか？
    follow_ups:
      - 繰り返しは認識をどう変えるか？
      - 一切れだけの食事は何を欠くか？
      - 最初と二番目の関係とは？
  - id: piz_neapolitan_rules
    name: ナポリピザのルール
    prompt: |
      真のナポリピザにはルールがある—サイズ、材料、方法。VPNのスタンプ、認証。
      ルールはアイデンティティを作る。ルールは何を守るか？何を除外するか？
    follow_ups:
      - ルールがなければピザはどうなるか？
      - 認証は期待をどう形作るか？
      - ルールと職人技の関係とは？
  - id: piz_detroit_edges
    name: デトロイトのエッジ
    prompt: |
      デトロイトスタイル—長方形、端までチーズ、パンに触れる部分はカリカリに焼かれたクラスト。
      エッジは意図的だ。建築を考えてみよう。その形は何を語るか？
    follow_ups:
      - エッジがなければピザはどうなるか？
      - 形はアイデンティティをどう作るか？
      - パンとクラストの関係とは？
  - id: piz_garlic_knot
    name: ガーリックノット
    prompt: |
      ガーリックノット—生地の結び目、バターとガーリック風味。しばしば最初に出てくる。
      ピザではないが、同じ世界の産物だ。ノットとパイの関係とは？
    follow_ups:
      - ノットがなければ食事はどうなるか？
      - ノットはどうやってトーンを設定するか？
      - サイドとメインの関係とは？
  - id: piz_red_pepper_flake
    name: 赤唐辛子フレーク
    prompt: |
      赤唐辛子フレークのシェーカー—しばしばテーブルの上にある。辛さを自分で選ぶ。
      フレークは民主主義だ。みんな自分で味付けする。その選択は何を意味するか？
    follow_ups:
      - シェーカーがなければテーブルはどうなるか？
      - 自己味付けは食事をどう形作るか？
      - 選択と味の関係とは？
  - id: piz_sicilian_slab
    name: シチリアンスラブ
    prompt: |
      シチリアン—厚く、長方形、時には逆さま（ソースが上）。
      スラブは重みがある。建築が違う。厚さは何を加えるか？何を犠牲にするか？
    follow_ups:
      - 薄いクラストならどう違うか？
      - 厚さは一口ごとにどう形作るか？
      - スラブとスライス（一切れ）の関係とは？
  - id: piz_wood_stack
    name: 薪の山
    prompt: |
      薪窯ピザ店は薪を積む。オークなど。薪は燃料であり風味だ。
      山は準備だ。何が燃えるか考えてみよう。ガスでは得られないものを薪は何で加えるか？
    follow_ups:
      - 薪がなければピザはどうなるか？
      - 燃料はクラストをどう形作るか？
      - 火と煙の関係とは？
  - id: piz_topping_balance
    name: トッピングのバランス
    prompt: |
      トッピングは圧倒的になりうる—多すぎると、ピザはカセロールになってしまう。
      バランスは繊細だ。たっぷりのパイを研究してみよう。どこで線を超えるか？
      何を取り除くか？
    follow_ups:
      - 抑制はピザをどう形作るか？
      - 多いと少ないの関係とは？
      - いつ選択は混沌になるか？
  - id: piz_cold_leftover
    name: 冷たい残り物
    prompt: |
      朝食の冷たいピザ—それを信じる人もいる。風味は落ち着いた。
      食感は変わった。翌日のパイを考えてみよう。時間は何を加えるか？
      何を取り除くか？
    follow_ups:
      - 冷たさは体験をどう変えるか？
      - 温め直したらどうなるか？
      - フレッシュと残り物の関係とは？
  - id: piz_sauce_sweet
    name: ソースの甘み
    prompt: |
      トマトソースは、トマトや調理人によって甘かったり、鮮やかだったりする。
      可能ならソースだけで味を見てみよう。甘みはどこから来るか？酸味があったらどうなるか？
    follow_ups:
      - ソースはトーンをどう設定するか？
      - 甘さと酸味の関係とは？
      - 生のトマトとは何か？
  - id: piz_roman_taglio
    name: ローマン・タグリオ
    prompt: |
      ピザ・アル・タグリオ—一切れ、重さで売られる。指差すと、切ってくれる。
      長方形、キログラムあたりの価格。取引が違う。重さで買うとはどういうことか？
    follow_ups:
      - タグリオは体験をどう形作るか？
      - 丸ごと一枚のピザならどうなるか？
      - カットと選択の関係とは？
  - id: piz_hot_honey
    name: ホットハニー
    prompt: |
      ピザのホットハニー—新しい伝統、今やどこにでもある。甘く、スパイシーで、とろりとしている。
      それは仕上げだ。いつ加えられるか注目しよう。ハニーはどうやってチーズに作用するか？
    follow_ups:
      - それがなければ一切れはどうなるか？
      - 甘辛は一口ごとにどう形作るか？
      - トレンドと伝統の関係とは？
  - id: piz_pecorino_grate
    name: ペコリーノのすりおろし
    prompt: |
      ピザの上にすりおろされたペコリーノ—塩辛く、シャープ。それは層だ。
      上のチーズは溶けたチーズとは違う。階層を考えてみよう。すりおろしは何を加えるか？
    follow_ups:
      - ペコリーノがなければピザはどうなるか？
      - 二番目のチーズは料理をどう形作るか？
      - 溶け具合とすりおろしの関係とは？
  - id: piz_paddle_slide
    name: パドルの滑らせ方
    prompt: |
      ピール、パドル—木製または金属製。生地はそれに滑らせ、オーブンに入れる。
      その動きは熟練している。見てみよう。技術なしでは何がうまくいかなくなるか？
    follow_ups:
      - パドルはどうやって焼きを可能にするか？
      - 道具と結果の関係とは？
      - 落ちたピザとは何か？
  - id: piz_sourdough_crust
    name: サワードウクラスト
    prompt: |
      サワードウピザクラスト—長い発酵、酸味。クラストには個性がある。
      中立ではない。サワードウが何を加えるか考えてみよう。市販の酵母ならどう違うか？
    follow_ups:
      - サワードウは一口ごとにどう形作るか？
      - 発酵と風味の関係とは？
      - 風味のないクラストとは何か？
  - id: piz_white_pie
    name: ホワイトパイ
    prompt: |
      ホワイトピザ—トマトなし。オリーブオイル、チーズ、おそらくガーリック。
      赤の不在はすべてを変える。味覚はトマトを期待している。ホワイトパイは代わりに何を提供するのか？
    follow_ups:
      - トマトがあったらパイはどうなるか？
      - 不在は期待をどう形作るか？
      - 赤と白の関係とは？
  - id: piz_bar_setting
    name: バーの設定
    prompt: |
      バーでのピザ—注文した場所で食べる。バーは舞台だ。
      オーブンや一切れを見る。雰囲気はカジュアルで、即時的だ。バーで食べること何を加えるか？
    follow_ups:
      - テーブルだったらどう変わるか？
      - 近さは体験をどう形作るか？
      - バーとキッチンの関係とは？
  - id: piz_truffle_trend
    name: トリュフのトレンド
    prompt: |
      ピザのトリュフ—オイルか削りたて—は贅沢の近道になった。
      香りが支配的だ。トレンドを考えてみよう。トリュフは何を加えるか？何を隠すか？
    follow_ups:
      - トリュフがなければピザはどうなるか？
      - 贅沢は一口ごとにどう形作るか？
      - トレンドと味の関係とは？
  - id: piz_ricotta_dollop
    name: リコッタのひとさじ
    prompt: |
      ピザに dollop されたリコッタ—冷たく、クリーミーで、対照的。
      モッツァレラのように溶けない。そのまま乗る。温度差に注目しよう。dollop は何を加えるか？
    follow_ups:
      - リコッタがなければ一切れはどうなるか？
      - 冷たさは熱をどう形作るか？
      - dollop と溶け具合の関係とは？
  - id: piz_slice_count
    name: 一切れの数
    prompt: |
      一切れは何枚か？数はしばしば8枚—または小さいパイなら6枚。
      その数は分け前、共有を決定する。数学を考えてみよう。4枚ならどうなるか？12枚なら？
    follow_ups:
      - 一切れの数は食事をどう形作るか？
      - カットと共有の関係とは？
      - いつ数は重要になるか？
  - id: piz_oven_window
    name: オーブンの窓
    prompt: |
      オーブンには窓がある—あるいは無い。ピザが焼けるのを見るのは劇場だ。
      チーズが泡立つ。クラストが膨らむ。眺めがなければ体験はどうなるか？
    follow_ups:
      - 眺めは期待をどう形作るか？
      - 見えるものと隠されたものの関係とは？
      - 窓から何が学べるか？
  - id: piz_ranch_dip
    name: ランチディップ
    prompt: |
      ピザのランチ—アメリカの伝統、しばしばクラストにつけて。
      ディップはオプションで、議論の的だ。追加を考えてみよう。ランチは何を加えるか？何を上書きするか？
    follow_ups:
      - ランチがなければクラストはどうなるか？
      - ディップは一口ごとにどう形作るか？
      - 純粋主義者と実用主義者の関係とは？
  - id: piz_capers_brine
    name: ケッパーの塩水
    prompt: |
      ピザのケッパー—塩辛く、シャープ。豊かさを断ち切る。
      ケッパーは旅をした—地中海、ピクルス。いつ現れるかに注目しよう。塩水は何を加えるか？
    follow_ups:
      - ケッパーがなければ一切れはどうなるか？
      - 塩水は味覚をどう形作るか？
      - ピクルスとフレッシュの関係とは？
  - id: piz_calzone_seam
    name: カルツォーネの継ぎ目
    prompt: |
      カルツォーネ—折りたたんで密封されたピザ。継ぎ目が中身を保持する。
      形が違う。切り開く。蒸気が逃げる。折り目は何を加えるか？何を隠すか？
    follow_ups:
      - 広げたらカルツォーネはどうなるか？
      - 継ぎ目はどうやって驚きを生むか？
      - 開いた状態と閉じた状態の関係とは？
  - id: piz_mushroom_water
    name: キノコの水分
    prompt: |
      ピザのキノコは、調理中に水分を放出する。良い料理人は、下処理するか、乾燥した種類を使うことを知っている。
      水分が多いキノコは、ぐちゃぐちゃのピザを作る。化学を考えてみよう。湿気は何をするか？
    follow_ups:
      - キノコの調理法は一切れをどう形作るか？
      - 湿ったものとカリカリしたものの関係とは？
      - 生のキノコならどうなるか？
  - id: piz_grease_absorb
    name: 脂の吸収
    prompt: |
      一切れのナプキン—一部の人は脂を拭き取る。脂はチーズやペパロニの脂肪だ。
      拭くか拭かないか？選択を考えてみよう。脂は何に貢献するか？拭き取ると何が取り除かれるか？
    follow_ups:
      - 脂は体験をどう形作るか？
      - 乾燥した一切れとは何か？
      - 脂肪と風味の関係とは？
  - id: piz_oven_spring
    name: オーブンスプリング
    prompt: |
      オーブンスプリング—生地は高温で膨らむ。酵母は速く働く。構造が固まる。
      その瞬間を考えてみよう。十分な熱がなければどうなるか？適切な粉がなければ？
    follow_ups:
      - スプリングはどうやってクラムを作るか？
      - 熱と膨らみの関係とは？
      - 平たいクラストとは何か？
  - id: piz_roma_tomato
    name: ローマトマト
    prompt: |
      サンマルツァーノ、またはローマ—トマトは重要だ。それらは場所から来ている。カンパニア。
      DOP、テロワール。トマトをたどってみよう。あなたの一切れにどうやってたどり着いたか？
    follow_ups:
      - 別のトマトならどうなるか？
      - 原産地はソースをどう形作るか？
      - 場所と味の関係とは？
  - id: piz_pizza_napoli
    name: ナポリピザ
    prompt: |
      ナポリが発明した。都市と食べ物は結びついている。ナポリでピザを食べることは、その源で食べることを意味する。
      考古学を考えてみよう。同じピザが他で食べられたらどうなるか？
    follow_ups:
      - 場所は体験をどう形作るか？
      - 翻訳は何を失うか？
      - 起源と真正性の関係とは？
  - id: piz_wine_pair
    name: ワインペアリング
    prompt: |
      ピザとワイン—ビールが一般的だが、ワインも合う。赤が多い。
      ワインの酸味はトマトの酸味と出会う。ペアリングを考えてみよう。ワインは一切れに何を加えるか？
    follow_ups:
      - ビールならどう違うか？
      - 飲み物は食事をどう形作るか？
      - グラスと皿の関係とは？
  - id: piz_pizza_party
    name: ピザパーティー
    prompt: |
