# Culinary Lab — Indian (Urdu)

id: culinary_lab_indian
name: Culinary Lab — Indian
description: 50 cards to shift how you experience Indian food—from the chemistry of spices and heat to the archaeology of ingredients and the choreography of the shared table.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: تڑکے کی کرکری
    prompt: |
      تڑکا—مصالحوں کو بھوننا—یہ ابتدائی نوٹ ہے۔ گرم تیل سرسوں کے بیج، زیرہ،
      کری پتے سے ملتا ہے۔ سنیں۔ کرکری آواز حقیقی وقت میں کیمسٹری ہے۔ جب آپ
      اسے چکھنے سے پہلے سنتے ہیں تو کیا بدلتا ہے؟
    follow_ups:
      - آواز توقع کو کیسے شکل دیتی ہے؟
      - تڑکے کے بغیر ڈش کیا کھو دے گی؟
      - آواز اور ذائقے کے درمیان کیا تعلق ہے؟
  - id: ind_spice_route
    name: مصالحوں کا راستہ
    prompt: |
      الائچی کیرالا سے آئی۔ زعفران کشمیر سے۔ کالی مرچ جو کبھی سونے کے وزن کے
      برابر تھی۔ اپنی پلیٹ پر ایک مصالحہ اس کی اصل تک تلاش کریں۔ یہ آپ تک
      پہنچنے کا کیا سفر کیا؟
    follow_ups:
      - راستہ جاننے سے بائٹ کیسے بدلتی ہے؟
      - کن مصالحوں نے اسی راستے کا سفر کیا؟
      - تجارت اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: ind_thali_geometry
    name: تھالی جیومیٹری
    prompt: |
      تھالی ایک کینوس ہے—پیالے دائرے میں رکھے ہوئے، ہر ایک کا اپنا کردار۔
      کمپوزیشن کا مطالعہ کریں۔ سب سے پہلے آنکھ کہاں ٹھہرتی ہے؟ منفی جگہ کیا
      ہے؟
    follow_ups:
      - اگر ایک پیالہ غائب ہو جائے تو کیا ہوگا؟
      - ترتیب کھانے کو کیسے شکل دیتی ہے؟
      - جیومیٹری اور رسم کے درمیان کیا تعلق ہے؟
  - id: ind_hand_as_tool
    name: ہاتھ بطور آلہ
    prompt: |
      روٹی توڑی، سبزی کے ساتھ ملا کر منہ میں ڈالی۔ ہاتھ ایک آلہ اور سینسر ہے۔
      رقص کا مشاہدہ کریں۔ چھونے سے کیا شامل ہوتا ہے جو کانٹے اور چاقو نہیں
      کر سکتے؟
    follow_ups:
      - ہاتھ سے کھانے سے رفتار کیسے بدلتی ہے؟
      - چاندی کے برتنوں سے کیا کھو جائے گا؟
      - چھونے اور درجہ حرارت کے درمیان کیا تعلق ہے؟
  - id: ind_heat_layers
    name: گرمی کی پرتیں
    prompt: |
      ہندوستانی گرمی کئی پرتوں والی ہوتی ہے—مرچ کی جلن، کالی مرچ کی گرمی،
      ادرک کی آگ۔ ایک بائٹ لیں اور نقشہ بنائیں کہ ہر گرمی کہاں اترتی ہے۔
      زبان، گلہ، پیٹ۔ یہ کیسے تعمیر ہوتی ہیں؟
    follow_ups:
      - صرف ایک قسم کی گرمی کے ساتھ ڈش کیسی ہوگی؟
      - پرتوں سے پیچیدگی کیسے پیدا ہوتی ہے؟
      - گرمی اور وقت کے درمیان کیا تعلق ہے؟
  - id: ind_yogurt_intervention
    name: دہی کا مداخلت
    prompt: |
      رائتہ، دہی، لسی—دہی ٹھنڈک دیتا ہے، کاٹتا ہے، توازن قائم کرتا ہے۔ اس لمحے
      کو نوٹ کریں جب آپ اسے شامل کرتے ہیں۔ تیزاب چربی سے، ٹھنڈک گرمی سے
      ملتی ہے۔ یہ مداخلت کیمیاوی ہے۔ یہ کیا ختم کرتا ہے؟
    follow_ups:
      - دہی کے بغیر کھانا کیسا ہوگا؟
      - تضاد سے سکون کیسے پیدا ہوتا ہے؟
      - مداخلت اور توازن کے درمیان کیا تعلق ہے؟
  - id: ind_betel_after
    name: پان کے بعد
    prompt: |
      پان—سپاری کا پتہ—کچھ روایات میں کھانا ختم کرتا ہے۔ یہ میٹھا نہیں ہے۔ یہ
      اختتام ہے۔ ذائقہ پھر سے بدل جاتا ہے۔ اختتام پورے کھانے کے بارے میں
      کیا کہتا ہے؟
    follow_ups:
      - پان تبدیلی کو کیسے نشان زد کرتا ہے؟
      - پان کے بغیر کھانا میں کیا کمی ہوگی؟
      - اختتام اور یادداشت کے درمیان کیا تعلق ہے؟
  - id: ind_street_chaos
    name: گلی کا ہنگامہ
    prompt: |
      ایک چاٹ والا تیزی سے کام کرتا ہے—بھیل، پاپڑی، چٹنیاں سیکنڈوں میں تہہ
      در تہہ۔ پرفارمنس دیکھیں. سٹال تھیٹر ہے۔ اسکرپٹ کیا ہے؟ سامعین کون
      ہیں؟
    follow_ups:
      - پرفارمنس کے بغیر ڈش کیسی ہوگی؟
      - رفتار تجربے کو کیسے شکل دیتی ہے؟
      - ہنگامہ اور کاریگری کے درمیان کیا تعلق ہے؟
  - id: ind_tandoor_breathe
    name: تندور کی سانس
    prompt: |
      تندور سانس لیتا ہے—آگ، دھواں، مٹی۔ نان دیوار پر چپکایا جاتا ہے، چھالے
      پڑنے پر نکالا جاتا ہے۔ اس کے قریب کھڑے ہوں۔ گرمی، بو۔ آگ اور ذائقہ
      کے درمیان کیا تعلق ہے؟
    follow_ups:
      - تندور کے بغیر نان کیسا ہوگا؟
      - مٹی باورچی کو کیسے شکل دیتی ہے؟
      - سانس اور روٹی کے درمیان کیا تعلق ہے؟
  - id: ind_turmeric_stain
    name: ہلدی کا داغ
    prompt: |
      ہلدی کے داغ—انگلیوں، کپڑوں، پلاسٹک پر۔ رنگ برقرار رہتا ہے۔ اس بات پر
      غور کریں کہ یہ کیا نشان لگاتا ہے۔ داغ آثار قدیمہ ہے۔ یہ کھانا آپ تک
      پہنچنے سے پہلے کہاں سفر کر چکا ہے؟
    follow_ups:
      - رنگ کے بغیر ڈش کیسی ہوگی؟
      - داغ محنت کو کیسے نشان زد کرتا ہے؟
      - رنگت اور تحفظ کے درمیان کیا تعلق ہے؟
  - id: ind_rice_architecture
    name: چاول کی عمارت
    prompt: |
      بریانی کی تعمیر کی جاتی ہے—چاول کی تہہ، گوشت کی تہہ، زعفران، تلی ہوئی
      پیاز۔ ڈھانچہ قائم رہتا ہے۔ اسے کھودیں۔ عمارت ہر بائٹ کو کیسے متاثر
      کرتی ہے؟
    follow_ups:
      - اگر تہہ بہت جلد مل جائیں تو کیا ہوگا؟
      - ڈھانچہ حیرت کیسے پیدا کرتا ہے؟
      - عمارت اور کھانے کے درمیان کیا تعلق ہے؟
  - id: ind_chutney_spectrum
    name: چٹنی کا سپیکٹرم
    prompt: |
      پودینہ، املی، ناریل، ٹماٹر—چٹنیاں رنگوں کی طرح پھیلی ہوئی ہیں۔ ہر ایک
      بائٹ کو بدل دیتا ہے۔ ایک ہی ڈش کو تین چٹنیوں کے ساتھ چکھیں۔ ایک ہی
      بیس تین مختلف کہانیاں کیسے بنتا ہے؟
    follow_ups:
      - صرف ایک چٹنی کے ساتھ کھانا کیسا ہوگا؟
      - انتخاب ایجنسی کو کیسے شکل دیتا ہے؟
      - سپیکٹرم اور ترجیح کے درمیان کیا تعلق ہے؟
  - id: ind_steam_rising
    name: اٹھتا ہوا بھاپ
    prompt: |
      اڈلی، ڈوسا، پوری—جب ڈھکن اٹھایا جاتا ہے تو بھاپ نکلتی ہے۔ اسے دیکھیں۔
      بھاپ چکھنے سے پہلے خوشبو لے جاتی ہے۔ پہلے کیا آتا ہے؟ ناک یا منہ؟
    follow_ups:
      - بھاپ توقع کو کیسے شکل دیتی ہے؟
      - اٹھانے کے بغیر کیا کھو جائے گا؟
      - بخارات اور ذائقے کے درمیان کیا تعلق ہے؟
  - id: ind_silver_versus_steel
    name: چاندی بمقابلہ اسٹیل
    prompt: |
      کچھ میزوں پر اسٹیل کی تھالیاں، کچھ چاندی، کچھ کیلے کے پتے استعمال
      ہوتے ہیں۔ برتن پر غور کریں۔ کھانے کے نیچے کی سطح تجربے کو کیسے
      بدلتی ہے؟ وزن، آواز، روایت۔
    follow_ups:
      - مختلف سطحوں پر کھانا کیسا محسوس ہوگا؟
      - برتن رسم کو کیسے شکل دیتا ہے؟
      - مواد اور معنی کے درمیان کیا تعلق ہے؟
  - id: ind_cumin_fragrance
    name: زیرے کی خوشبو
    prompt: |
      بھنا ہوا زیرہ، چکھنے سے پہلے خوشبو پھیلاتا ہے۔ ایک ڈش کو چکھنے سے
      پہلے سونگھیں۔ زیرہ کمرے میں پھیل جاتا ہے۔ خوشبو تالو کو کیسے تیار
      کرتی ہے؟
    follow_ups:
      - بو کے بغیر ڈش کیسی ہوگی؟
      - خوشبو باورچی کی موجودگی کو کیسے نشان زد کرتی ہے؟
      - ناک اور یادداشت کے درمیان کیا تعلق ہے؟
  - id: ind_shared_central
    name: مشترکہ مرکز
    prompt: |
      ڈشیں مرکز میں رکھی جاتی ہیں۔ سب پہنچتے ہیں۔ "آپ کی پلیٹ" اس طرح
      نہیں ہوتی۔ پہنچنے، پاس کرنے، لینے کے رقص کا مشاہدہ کریں۔ غیر کہے
      ہوئے قواعد کیا ہیں؟
    follow_ups:
      - انفرادی حصوں کے ساتھ کھانا کیسا ہوگا؟
      - اشتراک سے تعلق کیسے پیدا ہوتا ہے؟
      - مرکز اور فرقہ وارانہ کے درمیان کیا تعلق ہے؟
  - id: ind_ghee_gloss
    name: گھی کی چمک
    prompt: |
      گھی جمع ہوتا ہے، چمکتا ہے، لیپ کرتا ہے۔ یہ چربی ذائقے اور فنش کے
      طور پر ہے۔ پلیٹ پر جہاں یہ جمع ہوتا ہے اس پر غور کریں۔ وہ چمک ساخت
      اور درجہ حرارت کو کیسے بدلتی ہے؟
    follow_ups:
      - تیل کے بجائے ڈش کیسی ہوگی؟
      - گھی دوسرے ذائقوں کو کیسے لے جاتا ہے؟
      - چمک اور بھرپوریت کے درمیان کیا تعلق ہے؟
  - id: ind_papad_crunch
    name: پاپڑ کی کرچ
    prompt: |
      پاپڑ—کرسپی، پتلا، کراکلنگ۔ یہ پنکچوایشن کے طور پر ساخت ہے۔ ایک توڑیں۔
      سنیں۔ کرچ کھانے کا تال کا حصہ ہے۔ اس کے بغیر خاموشی کیسی سنائی دے گی؟
    follow_ups:
      - کرچ تضاد کیسے پیدا کرتا ہے؟
      - پاپڑ کے بغیر کھانے میں کیا کمی ہوگی؟
      - آواز اور اطمینان کے درمیان کیا تعلق ہے؟
  - id: ind_sambar_depth
    name: سامبر کی گہرائی
    prompt: |
      سامبر کئی پرتوں والا ہوتا ہے—دال، املی، سبزیاں، مصالحہ۔ یہ ابلتا رہا ہے۔
      پرتوں کے لیے چکھیں۔ کتنی آپ الگ کر سکتے ہیں؟ اس پیالے کی آثار قدیمہ
      کیا ہے؟
    follow_ups:
      - کم تہوں کے ساتھ سامبر کیسا ہوگا؟
      - وقت سے گہرائی کیسے بنتی ہے؟
      - ابال اور کہانی کے درمیان کیا تعلق ہے؟
  - id: ind_pickle_punch
    name: اچار کا جھٹکا
    prompt: |
      اچار—مٹھا، کھٹا، گرم، خمیر شدہ۔ ایک چھوٹا سا کاٹ سب کچھ بدل دیتا
      ہے۔ اس کے داخل ہونے کے وقت پر غور کریں۔ یہ کیا خراب کرتا ہے؟
    follow_ups:
      - اچار کے بغیر کھانا کیسا ہوگا؟
      - جھٹکا حیرت کیسے پیدا کرتا ہے؟
      - موڑ اور یادداشت کے درمیان کیا تعلق ہے؟
  - id: ind_bay_leaf_hunt
    name: تیز پتے کی تلاش
    prompt: |
      تیز پتے پلاؤ، بریانی، سالن میں چھپے ہوتے ہیں۔ ایک تلاش کریں۔ آپ اسے
      کھاتے نہیں—یہ آثار قدیمہ ہے۔ یہ کیرالا یا کشمیر سے سفر کر کے آیا۔
      نکالے جانے سے پہلے اس نے کیا اضافہ کیا؟
    follow_ups:
      - ناقابلِ خوراک ناقابلِ خوراک کو کیسے شکل دیتا ہے؟
      - پتے کے بغیر ڈش کیسی ہوگی؟
      - پوشیدہ اور موجود کے درمیان کیا تعلق ہے؟
  - id: ind_dosa_edge
    name: ڈوسا کا کنارہ
    prompt: |
      ڈوسا کا ایک کنارہ ہوتا ہے—کرسپی، لیس جیسا، سنہری۔ مرکز نرم ہوتا ہے۔
      تضاد تعمیراتی ہے۔ آپ پہلے کہاں کاٹتے ہیں؟ کنارہ پورے کو کیسے
      فریم کرتا ہے؟
    follow_ups:
      - اگر ڈوسا یکساں کرسپی ہو تو کیسا ہوگا؟
      - کنارہ دلچسپی کیسے پیدا کرتا ہے؟
      - سرحد اور مرکز کے درمیان کیا تعلق ہے؟
  - id: ind_saffron_thread
    name: زعفران کا دھاگا
    prompt: |
      زعفران—چند دھاگے—ایک پوری ڈش کو رنگ اور خوشبو دیتے ہیں۔ ایک دھاگہ
      تلاش کریں۔ یہ کہاں سے آیا؟ کشمیر، ایران، اسپین؟ سب سے مہنگا مسالا۔
      کمی کیا اضافہ کرتی ہے؟
    follow_ups:
      - زعفران عیش و عشرت کو کیسے شکل دیتا ہے؟
      - ہلدی کے بجائے ڈش کیسی ہوگی؟
      - دھاگہ اور علاقے کے درمیان کیا تعلق ہے؟
  - id: ind_chaat_texture
    name: چاٹ کی ساخت
    prompt: |
      چاٹ ایک بائٹ میں ساخت کی پرتیں بناتی ہے—کرسپی، نرم، کرچی، کریمی۔
      اسے توڑیں۔ کتنی بناوٹ ہیں؟ وہ کیسے مل کر کام کرتی ہیں؟ بائٹ ایک
      تعاون ہے۔
    follow_ups:
      - ایک ساخت کے ساتھ چاٹ کیسی ہوگی؟
      - پرتوں سے کھیل کیسے پیدا ہوتا ہے؟
      - ساخت اور خوشی کے درمیان کیا تعلق ہے؟
  - id: ind_mustard_seed_pop
    name: سرسوں کے دانے کا پاپ
    prompt: |
      سرسوں کے دانے تیل میں پاپ ہوتے ہیں—بنگالی، جنوبی ہندوستانی تڑکا۔ پاپ
      کیمیاوی ہے۔ دانے مرکبات چھوڑتے ہیں۔ اسے سونگھیں۔ جب گرمی انہیں
      فعال کرتی ہے تو کیا بدلتا ہے؟
