# চাইনিজ রান্নাঘর — চাইনিজ (Bengali)

id: culinary_lab_chinese
name: চাইনিজ রান্নাঘর — চাইনিজ
description: চাইনিজ খাবারকে আপনি কীভাবে অনুভব করেন তা পরিবর্তন করার জন্য ৫০টি কার্ড—ওক হেই-এর রসায়ন এবং সয়ার প্রত্নতত্ত্ব থেকে শুরু করে গোল টেবিলের কোরিওগ্রাফি এবং ভোজের আখ্যান পর্যন্ত।
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: ওক হেই
    prompt: |
      ওক হেই—ওকের শ্বাস—হল চরম তাপ এবং গতির কারণে আসা সেই অস্পষ্ট ধোঁয়া। এটা ঠিক ধোঁয়াটে নয়; এটি রূপান্তর।
      আপনি কি এটি ধরতে পারেন? এটি ছাড়া স্টাইর-ফ্রাই কেমন হবে?
    follow_ups:
      - হেই কীভাবে পদটিকে আকার দেয়?
      - এটি কী তৈরি করে? কী এটিকে ধ্বংস করে?
      - তাপ এবং ত্বরার মধ্যে সম্পর্ক কী?
  - id: chn_round_table
    name: গোল টেবিল
    prompt: |
      চাইনিজ ভোজের টেবিলটি গোলাকার—কেন্দ্রে অলস سوزানি। খাবার ঘোরে। সবাই নাগাল পায়। টেবিলটি কোরিওগ্রাফি। কে ঘোরায়? কে অপেক্ষা করে?
      অকথিত নিয়মগুলো কী কী?
    follow_ups:
      - আয়তক্ষেত্রাকার টেবিল কী বোঝাবে?
      - গোলাকার আকৃতি খাবারকে কীভাবে আকার দেয়?
      - কেন্দ্র এবং প্রান্তের মধ্যে সম্পর্ক কী?
  - id: chn_soy_archeology
    name: সয়া প্রত্নতত্ত্ব
    prompt: |
      সয়া সস—গাঁজন করা, পুরানো, আঞ্চলিক। হালকা, গাঢ়, মাশরুম, ডাবল-ব্ল্যাক।
      এটি কোথাও থেকে এসেছে। এর সময় লেগেছে। বোতলটি অনুসরণ করুন। এটি কোন যাত্রা করেছিল? শিল্পজাত সয়া কী উৎসর্গ করবে?
    follow_ups:
      - উৎস কীভাবে ঢালাকে আকার দেয়?
      - সয়া ছাড়া পদটি কী হবে?
      - গাঁজন এবং উমামির মধ্যে সম্পর্ক কী?
  - id: chn_chopstick_grip
    name: চপস্টিক গ্রিপ
    prompt: |
      চপস্টিক হাতকে প্রসারিত করে। ভাত, পিচ্ছিল নুডলস, ডাম্পলিং—প্রত্যেকটির জন্য ভিন্ন কৌশল প্রয়োজন। আপনার গ্রিপ লক্ষ্য করুন। ইউটেনসিলটি কী দাবি করে? এটি কী অনুমতি দেয়?
    follow_ups:
      - কাঁটাচামচ কী পরিবর্তন করবে?
      - স্টিক কামড়কে কীভাবে আকার দেয়?
      - সরঞ্জাম এবং গতির মধ্যে সম্পর্ক কী?
  - id: chn_dumpling_seam
    name: ডাম্পলিং ভাঁজ
    prompt: |
      ডাম্পলিং ভাঁজ—ভাঁজ, সিল। জিয়াওজি, Shumai, Xiaolongbao—প্রত্যেকটির নিজস্ব রূপ আছে। ভাঁজ ধরে রাখে বা ছেড়ে দেয়। একটি অধ্যয়ন করুন। একটি ফেটে যাওয়া কী বোঝাবে? ভাঁজ কী রক্ষা করে?
    follow_ups:
      - ভাঁজ কীভাবে ভর্তিকে আকার দেয়?
      - খোলা ডাম্পলিং কী হারাবে?
      - সিল এবং স্যুপের মধ্যে সম্পর্ক কী?
  - id: chn_tea_pour
    name: চা ঢালা
    prompt: |
      চাইনিজ চা—ঢালা, পুনরায় ভরা, ভাগ করা। পাত্রটি ঘুরছে। জিজ্ঞাসা করার আগেই খালি কাপগুলি পূরণ করা হয়। ঢালা হল পরিষেবা এবং যত্ন। ছন্দ লক্ষ্য করুন। চা ছাড়া খাবারটি কী হবে?
    follow_ups:
      - চা কীভাবে গতিকে আকার দেয়?
      - ঢালা কী যোগাযোগ করে?
      - কাপ এবং টেবিলের মধ্যে সম্পর্ক কী?
  - id: chn_bone_plate
    name: হাড়ের প্লেট
    prompt: |
      হাড়ের জন্য একটি ছোট প্লেট—বর্জ্য শেল, মুরগির হাড়, চিংড়ির খোসা।
      প্লেটটি যা খাওয়া যায় না তা সংগ্রহ করে। এটি সেটিংসের অংশ। হাড়ের প্লেট কী অনুমতি দেয়? এটি ছাড়া কী হবে?
    follow_ups:
      - প্লেট কীভাবে খাবারকে আকার দেয়?
      - এটি ছাড়া টেবিলটি দেখতে কেমন হবে?
      - বর্জ্য এবং মর্যাদার মধ্যে সম্পর্ক কী?
  - id: chn_soup_spoon
    name: স্যুপ চামচ
    prompt: |
      চাইনিজ স্যুপ চামচ—প্রশস্ত, অগভীর, সিরামিক। এটি ঝোল এবং কঠিন জিনিস ধরে রাখে। চামচটি ভিন্নভাবে মুখে ফিট করে। চুমুক লক্ষ্য করুন। আকৃতি কী সক্ষম করে?
    follow_ups:
      - গোলাকার চামচ কী পরিবর্তন করবে?
      - চামচ কীভাবে চুমুককে আকার দেয়?
      - আকৃতি এবং কার্যকারিতার মধ্যে সম্পর্ক কী?
  - id: chn_steam_basket
    name: স্টিম ঝুড়ি
    prompt: |
      ডিম সাম বাঁশের ঝুড়িতে আসে—স্তুপীকৃত, স্তরযুক্ত। বাষ্প ওঠে।
      ঝুড়ি আকৃতি ধরে রাখে। বাঁশ বিবেচনা করুন। ধাতু কী ভিন্নভাবে করবে? বাঁশ কী যোগ করে?
    follow_ups:
      - ঝুড়ি কীভাবে ডাম্পলিংকে আকার দেয়?
      - প্লেট কী হারাবে?
      - বাঁশ এবং বাষ্পের মধ্যে সম্পর্ক কী?
  - id: chn_maillard_wok
    name: মায়লার্ড ওক
    prompt: |
      ওক এমন তাপমাত্রায় পৌঁছায় যা বাড়ির চুল্লি পারে না। সিয়ার অবিলম্বে হয়।
      প্রোটিন সেকেন্ডের মধ্যে বাদামী হয়। রসায়ন বিবেচনা করুন। কম তাপ কী উৎসর্গ করবে? ওক কী দাবি করে?
    follow_ups:
      - তাপ কীভাবে স্বাদকে আকার দেয়?
      - ইলেকট্রিক কী ভিন্নভাবে করবে?
      - শিখা এবং খোসার মধ্যে সম্পর্ক কী?
  - id: chn_glutinous_texture
    name: আঠালো টেক্সচার
    prompt: |
      আঠালো চাল—চটচটে, চিবানো—এর ভিন্ন রসায়ন আছে। এটি জংজি, লো মাই গেই, ডেজার্টের জন্য ব্যবহৃত হয়। টেক্সচার লক্ষ্য করুন। এটি দীর্ঘ-শস্য থেকে কীভাবে আলাদা? আঠালোতা কী সক্ষম করে?
    follow_ups:
      - সাধারণ চাল কী করবে?
      - টেক্সচার কীভাবে পদটিকে আকার দেয়?
      - চটচটে এবং মোড়কের মধ্যে সম্পর্ক কী?
  - id: chn_century_egg
    name: সেঞ্চুরি ডিম
    prompt: |
      সেঞ্চুরি ডিম—সংরক্ষিত, রূপান্তরিত। কুসুম গাঢ়, সাদা স্বচ্ছ।
      রসায়ন প্রাচীন। সংরক্ষণ বিবেচনা করুন। সময় কী করে?
      তাজা অবস্থা কী বোঝাবে?
    follow_ups:
      - সংরক্ষণ কীভাবে স্বাদকে আকার দেয়?
      - ডিমটি তাজা হলে কী হবে?
      - সময় এবং রূপান্তরের মধ্যে সম্পর্ক কী?
  - id: chn_oyster_sauce
    name: ঝিনুক সস
    prompt: |
      ঝিনুক সস—উমামি, ঘন, ক্যান্টনিজ। এটি হ্রাস এবং নিষ্কাশন।
      ঝিনুক তার নির্যাস দেয়। স্বাদটি অনুসরণ করুন। এটি ছাড়া স্টাইর-ফ্রাই কী হবে?
    follow_ups:
      - সস কীভাবে পদটিকে আকার দেয়?
      - ঝিনুক এবং সবজির মধ্যে সম্পর্ক কী?
      - পরিবর্তে সয়া কী করবে?
  - id: chn_ordering_ritual
    name: অর্ডার করার রীতি
    prompt: |
      চাইনিজ রেস্তোরাঁয় অর্ডার করা—হোস্ট বেছে নেয়, অথবা টেবিল আলোচনা করে।
      ভারসাম্য: মাংস, সবজি, স্যুপ, ভাত। অর্ডার একটি রচনা। কে সিদ্ধান্ত নেয় তা লক্ষ্য করুন। নিয়মগুলো কী কী?
    follow_ups:
      - অর্ডার করা কীভাবে খাবারকে আকার দেয়?
      - প্রত্যেকে নিজের জন্য কী অর্ডার করবে?
      - পছন্দ এবং সমষ্টির মধ্যে সম্পর্ক কী?
  - id: chn_crispy_skin
    name: মচমচে চামড়া
    prompt: |
      পিকিং হাঁসের চামড়া—মচমচে, গ্লেজড। অথবা ক্যান্টনিজ রোস্ট শুয়োরের মাংসের ক্র্যাকলিং।
      চামড়া ইচ্ছাকৃত। তাপ, বাতাস, চিনি। স্থাপত্য বিবেচনা করুন। নরম চামড়া কী বোঝাবে?
    follow_ups:
      - মচমচে ভাব কামড়কে কীভাবে আকার দেয়?
      - ক্র্যাকল কী তৈরি করে?
      - চামড়া এবং মাংসের মধ্যে সম্পর্ক কী?
  - id: chn_noodle_slip
    name: নুডল স্লিপ
    prompt: |
      চাইনিজ নুডলস—গম, চাল, হাতে টানা—টেক্সচারে ভিন্ন হয়। কিছু পিছলে যায়;
      কিছু চিবানো হয়। চপস্টিকের বিরুদ্ধে নুডলের টান। প্রতিরোধ লক্ষ্য করুন। স্লিপ কী যোগ করে?
    follow_ups:
      - টেক্সচার কীভাবে খাওয়াকে আকার দেয়?
      - নরম নুডল কী হারাবে?
      - স্লিপ এবং সন্তুষ্টির মধ্যে সম্পর্ক কী?
  - id: chn_bok_choy_wilt
    name: বক চয় উইল্ট
    prompt: |
      ওকে বক চয়—সেকেন্ড। এটি নরম হয়ে যায় কিন্তু গঠন বজায় রাখে। সবুজ নরম হয়।
      রূপান্তর বিবেচনা করুন। কাঁচা মানে কী? অতিরিক্ত রান্না করা কী হারাবে?
    follow_ups:
      - উইল্ট কীভাবে সবজিকে আকার দেয়?
      - তাপ এবং সবুজের মধ্যে সম্পর্ক কী?
      - কখন এটি শেষ হয়?
  - id: chn_five_spice
    name: পাঁচ মশলা
    prompt: |
      পাঁচ-মশলা গুঁড়া—স্টার অ্যানিস, লবঙ্গ, দারুচিনি, সিচুয়ান মরিচ, মৌরি।
      এটি একটি মিশ্রণ যার ইতিহাস আছে। প্রতিটি মশলার একটি পথ আছে। একটি অনুসরণ করুন। এটি কোন যাত্রা করেছিল?
    follow_ups:
      - এটি ছাড়া পদটি কী হবে?
      - মিশ্রণটি কীভাবে পরিচয় তৈরি করে?
      - মশলা এবং সংরক্ষণের মধ্যে সম্পর্ক কী?
  - id: chn_banquet_progression
    name: ভোজের অগ্রগতি
    prompt: |
      একটি চাইনিজ ভোজে একটি চাপ থাকে—প্রথমে ঠান্ডা খাবার, তারপর গরম, স্যুপ, ভাত, ডেজার্ট।
      অগ্রগতি একটি আখ্যান। ছন্দ লক্ষ্য করুন। একটি ভিন্ন ক্রম কী করবে?
    follow_ups:
      - ক্রম কীভাবে খাবারকে আকার দেয়?
      - প্রথম এবং শেষটির মধ্যে সম্পর্ক কী?
