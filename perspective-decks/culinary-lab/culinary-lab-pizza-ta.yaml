# சமையலறை ஆய்வகம் — பீட்சா (Tamil)

id: culinary_lab_pizza
name: சமையலறை ஆய்வகம் — பீட்சா
description: பீட்சாவை நீங்கள் அனுபவிக்கும் விதத்தை மாற்றியமைக்க 50 அட்டைகள் — மாவு மற்றும் நெருப்பின் வேதியியல் முதல் துண்டு மற்றும் டாப்பிங்ஸின் தொல்பொருள் வரை.
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: மாவு இழுத்தல்
    prompt: |
      மாவை இழுப்பதை கவனியுங்கள் — கையால் வீசுதல் அல்லது அழுத்துதல். பசையம் வலையமைப்பு
      நீண்டு, காற்றை சிக்க வைக்கிறது. வடிவம் தேர்ந்தெடுக்கப்படுகிறது. ஒரு சதுர துண்டு
      முக்கோணத்தை விட வித்தியாசமாக என்ன அர்த்தம்?
    follow_ups:
      - இழுத்தல் அனுபவத்தை எவ்வாறு வரையறுக்கிறது?
      - இழுத்தல் இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - கைக்கும் வடிவத்திற்கும் என்ன தொடர்பு?
  - id: piz_oven_breath
    name: அடுப்பு சுவாசம்
    prompt: |
      பீட்சா அடுப்பு சுவாசிக்கிறது — மர நெருப்பு, அல்லது எரிவாயு, அல்லது மின்சாரம். குவிமாடம் வெப்பத்தை வைத்திருக்கிறது.
      தரை அதை மாற்றுகிறது. ஒன்றுக்கு அருகில் நில்லுங்கள். அடுப்பு சமையல்காரரிடமிருந்து என்ன கோருகிறது?
      மாவிலிருந்து என்ன?
    follow_ups:
      - அடுப்பு இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - வெப்பம் எப்படி மேல்புறத்தை வடிவமைக்கிறது?
      - சுவாசம் மற்றும் கொப்புளத்திற்கு என்ன தொடர்பு?
  - id: piz_sauce_spiral
    name: சாஸ் சுழல்
    prompt: |
      சாஸ் பெரும்பாலும் ஒரு சுழலில் பயன்படுத்தப்படுகிறது — விளிம்பிலிருந்து விளிம்பு வரை பரப்பப்படுவதில்லை. வடிவத்தை ஆய்வு செய்யுங்கள்.
      என்ன மூடப்பட்டுள்ளது? என்ன வெளிப்படுகிறது? சுழல் ஒரு கலவை.
    follow_ups:
      - முழுவதுமாக சாஸ் பூசப்பட்ட பீட்சா எப்படி இருக்கும்?
      - சுழல் ஒவ்வொரு கடியையும் எப்படி பாதிக்கிறது?
      - வடிவத்திற்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: piz_cheese_melt
    name: சீஸ் உருகும்
    prompt: |
      சீஸ் வெவ்வேறு வேகங்களில் உருகும். மொசரெல்லா இழுக்கும்; பதப்படுத்தப்பட்ட சீஸ் எண்ணெய்களை விடும்.
      உருகுவதைக் கவனியுங்கள். கொழுப்பு மற்றும் புரதம், வெப்பம் மற்றும் நேரம் ஆகியவற்றின் வேதியியல்.
      எப்போது அது முடிந்தது?
    follow_ups:
      - இழுத்தல் இல்லாமல் துண்டு என்னவாக இருக்கும்?
      - உருகும் தன்மை கடிக்கும் எப்படி வடிவமைக்கிறது?
      - உருகுவதற்கும் நினைவகத்திற்கும் என்ன தொடர்பு?
  - id: piz_crust_char
    name: மேலோடு கருகும்
    prompt: |
      Leoparding — மேலோட்டில் உள்ள கருகிய புள்ளிகள் — மரத்தால் சுடப்பட்ட பீட்சாவின் அடையாளம். ஒவ்வொரு புள்ளியும்
      அதிக வெப்பத்துடன் தொடர்பு கொள்ளும் ஒரு தருணம். அந்த புள்ளிகள் சேர்க்கும் சுவையை கருத்தில் கொள்ளுங்கள்.
      ஒரு வெளிறிய மேலோடு என்ன அர்த்தம்?
    follow_ups:
      - கருகும் தன்மை அனுபவத்தை எப்படி மாற்றுகிறது?
      - அது இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - கருகும் தன்மைக்கும் கைவினைக்கும் என்ன தொடர்பு?
  - id: piz_slice_fold
    name: துண்டு மடிப்பு
    prompt: |
      நியூயார்க் ஸ்டைல்: துண்டை மடியுங்கள். மடிப்பு ஒரு கட்டமைப்பு — அது டாப்பிங்ஸை தாங்குகிறது, கொழுப்பைக் கட்டுப்படுத்துகிறது.
      மடிப்பு நடனம். அது என்ன சாத்தியமாக்குகிறது?
    follow_ups:
      - மடிப்பு இல்லாமல் சாப்பிடுவது எப்படி இருக்கும்?
      - மடிப்பு கடிக்கும் எப்படி வடிவமைக்கிறது?
      - மடிப்புக்கும் இடத்திற்கும் என்ன தொடர்பு?
  - id: piz_pepperoni_cup
    name: பெப்பரோனி கப்
    prompt: |
      நல்ல பெப்பரோனி கப்கள் — விளிம்புகள் மொறுமொறுப்பானவை, மையத்தில் எண்ணெய் குளம். இது
      வடிவம் மற்றும் அமைப்பின் மாற்றம். எப்போது நடக்கிறது என்பதைக் கவனியுங்கள்.
      கப்பை உருவாக்கியது எது?
    follow_ups:
      - கப் இல்லாமல் பெப்பரோனி என்னவாக இருக்கும்?
      - கப் சுவையை எப்படி வைத்திருக்கிறது?
      - கொழுப்புக்கும் வடிவத்திற்கும் என்ன தொடர்பு?
  - id: piz_basil_finish
    name: துளசி அலங்காரம்
    prompt: |
      பீட்சாவில் துளசி பெரும்பாலும் சுட்ட பிறகு சேர்க்கப்படுகிறது — புதியது, பிரகாசமானது. இது
      ஒரு அலங்காரம், அடிப்படை அல்ல. வித்தியாசத்தைக் கவனியுங்கள். புதியது சமைத்ததில் என்ன சேர்க்கிறது?
    follow_ups:
      - துளசி இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - நேரம் எப்படி மூலிகையை வடிவமைக்கிறது?
      - மூலத்திற்கும் சமைத்ததற்கும் என்ன தொடர்பு?
  - id: piz_margherita_minimal
    name: மார்கெரிட்டா மினிமல்
    prompt: |
      மார்கெரிட்டா மூன்று விஷயங்கள்: மாவு, தக்காளி, சீஸ். ஒவ்வொன்றும் தாங்க வேண்டும்.
      மறைக்க இடம் இல்லை. ஒழுக்கத்தைக் கருத்தில் கொள்ளுங்கள். மினிமலிசம் என்ன கோருகிறது?
    follow_ups:
      - ஒரு தவறான குறிப்பு என்ன செய்யும்?
      - எளிமை எப்படி சுவை மொட்டுகளை மையப்படுத்துகிறது?
      - சிலவற்றிற்கும் பலவற்றிற்கும் என்ன தொடர்பு?
  - id: piz_pool_table
    name: பூல் டேபிள்
    prompt: |
      சில பீட்சேரியாக்களில் நீண்ட சமூக மேஜை இருக்கும் — அந்நியர்கள் இடத்தை பகிர்ந்து கொள்கிறார்கள்.
      பீட்சா வருகிறது. மேஜை ஒரு மேடை. உங்களுக்கு அருகில் யார் சாப்பிடுகிறார்கள்?
      பேசப்படாத ஒப்பந்தம் என்ன?
    follow_ups:
      - ஒரு தனியறையில் உணவு எப்படி இருக்கும்?
      - மேஜை எப்படி சந்திப்பை வடிவமைக்கிறது?
      - பகிரப்பட்டதற்கும் தனிப்பட்டதற்கும் என்ன தொடர்பு?
  - id: piz_box_flip
    name: பெட்டி புரட்டுதல்
    prompt: |
      பீட்சா பெட்டி — அட்டை, சில சமயங்களில் நடுவில் பிளாஸ்டிக் முக்காலியுடன்.
      இது காற்றோட்டம், அடுக்குதல் ஆகியவற்றிற்காக வடிவமைக்கப்பட்டுள்ளது. பெட்டி ஒரு உள்கட்டமைப்பு.
      அது இல்லாமல் டேக்அவுட் எப்படி இருக்கும்?
    follow_ups:
      - பெட்டி எப்படி வீட்டிற்கு செல்லும் பயணத்தை வடிவமைக்கிறது?
      - பெட்டியை திறக்கும்போது என்ன நடக்கும்?
      - பெட்டிக்கும் சடங்குக்கும் என்ன தொடர்பு?
  - id: piz_dough_ferment
    name: மாவு புளிக்க வைத்தல்
    prompt: |
      பீட்சா மாவு புளிக்க வைக்கப்படுகிறது — மணிநேரம் அல்லது நாட்கள். ஈஸ்ட் குமிழ்கள், சுவையை உருவாக்குகிறது.
      பழைய மாவிற்கு புளிப்பு சுவை இருக்கும். ஒவ்வொரு கடியிலும் உள்ள நேரத்தை கருத்தில் கொள்ளுங்கள்.
      விரைவாக எழும்பும் மாவு எதை தியாகம் செய்யும்?
    follow_ups:
      - புளித்தல் எப்படி மேல்புறத்தை வடிவமைக்கிறது?
      - நேரத்திற்கும் சுவைக்கும் என்ன தொடர்பு?
      - ஒரே நாளில் மாவு என்ன அர்த்தம்?
  - id: piz_cornicione
    name: கார்னிசோன்
    prompt: |
      கார்னிசோன் — விளிம்பு, மேலோடு — பெரும்பாலும் சிறந்த பகுதியாகும். காற்றோட்டமானது, கொப்புளமானது,
      ஒருவேளை சற்றே மெல்லும். சிலர் அதை விட்டுவிடுகிறார்கள்; சிலர் அதை முதலில் சாப்பிடுகிறார்கள்.
      விளிம்புடன் உங்கள் உறவு என்ன?
    follow_ups:
      - கார்னிசோன் இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - விளிம்பு எப்படி மையத்தை வடிவமைக்கிறது?
      - மேலோட்டிற்கும் மையத்திற்கும் என்ன தொடர்பு?
  - id: piz_olive_oil_drizzle
    name: ஆலிவ் எண்ணெய் தெளிப்பு
    prompt: |
      சுட்ட பிறகு ஆலிவ் எண்ணெய் தெளிப்பு — மேலோட்டில், அல்லது முழு பீட்சாவிலும்.
      அது பளபளக்கிறது. எண்ணெய் சுவையை கொண்டு செல்கிறது, செழுமையை சேர்க்கிறது.
      எப்போது பயன்படுத்தப்படுகிறது என்பதைக் கவனியுங்கள். தெளிப்பு என்ன சேர்க்கிறது?
    follow_ups:
      - அது இல்லாமல் பீட்சா என்னவாக இருக்கும்?
      - எண்ணெய் எப்படி கடிக்கும் மாற்றுகிறது?
      - கொழுப்புக்கும் அலங்காரத்திற்கும் என்ன தொடர்பு?
  - id: piz_anchovy_salt
    name: நெத்திலி உப்பு
    prompt: |
      பீட்சாவில் நெத்திலி — உப்பு, உமாமி, பிரிக்கும். அவை சாஸில் கரையும், அல்லது மேலே அமரும்.
      நெத்திலி தொல்பொருள்: மத்திய தரைக்கடல், பதப்படுத்தப்பட்ட, பழமையான.
      அது என்ன பயணத்தை மேற்கொண்டது?
    follow_ups:
