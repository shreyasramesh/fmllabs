# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулінарна Лабораторія — Індійська (Ukrainian)

id: culinary_lab_indian
name: Кулінарна Лабораторія — Індійська
description: 50 карток, щоб змінити ваше сприйняття індійської їжі — від хімії спецій та гостроти до археології інгредієнтів та хореографії спільного столу.
domain: culinary_lab
cards:
  - id: ind_tadka_crackle
    name: Тріск Тадки
    prompt: |
      Тадка — обсмажування — це перший акорд. Гаряча олія зустрічає гірчичне зерно, кмин, листя карі. Слухай. Тріск — це хімія в реальному часі. Що змінюється, коли ти чуєш це перед тим, як скуштувати?
    follow_ups:
      - Як звук формує очікування?
      - Що втратить страва без цього тріску?
      - Який зв'язок між звуком і смаком?
  - id: ind_spice_route
    name: Шлях Спецій
    prompt: |
      Кардамон прибув з Керали. Шафран з Кашміру. Чорний перець колись коштував свою вагу в золоті. Простеж один інгредієнт на своїй тарілці до його походження. Яку подорож він здійснив, щоб дістатися до тебе?
    follow_ups:
      - Як знання про шлях змінює кожен шматочок?
      - Які ще спеції подорожували тим самим шляхом?
      - Який зв'язок між торгівлею та смаком?
  - id: ind_thali_geometry
    name: Геометрія Талі
    prompt: |
      Талі — це полотно: мисочки, розташовані по колу, кожна зі своєю роллю. Розглянь композицію. Куди спочатку падає погляд? Де простір?
    follow_ups:
      - Що станеться, якщо одну мисочку прибрати?
      - Як розташування формує страву?
      - Який зв'язок між геометрією та ритуалом?
  - id: ind_hand_as_tool
    name: Рука Як Інструмент
    prompt: |
      Рота розірвана, змішана з сабзі, відправлена до рота. Рука — це і посуд, і датчик. Поміть хореографію. Що додає дотик, чого не можуть вилка та ніж?
    follow_ups:
      - Як їжа руками змінює темп?
      - Що втратиться зі столовими приборами?
      - Який зв'язок між дотиком та температурою?
  - id: ind_heat_layers
    name: Шари Гостроти
    prompt: |
      Індійська гострота має шари — печіння чилі, тепло чорного перцю, вогонь імбиру. Зроби один ковток і визнач, де відчувається кожна нотка гостроти. Язик, горло, живіт. Як вони нарощуються?
    follow_ups:
      - Якою була б страва лише з одним видом гостроти?
      - Як нашарування створюють складність?
      - Який зв'язок між гостротою та часом?
  - id: ind_yogurt_intervention
    name: Йогуртова Інтервенція
    prompt: |
      Райта, дахі, лассі — йогурт охолоджує, пом'якшує, балансує. Поміть момент, коли ти його додаєш. Кислота зустрічає жир, холод — тепло. Ця інтервенція хімічна. Що вона перериває?
    follow_ups:
      - Якою була б страва без йогурту?
      - Як контраст створює полегшення?
      - Який зв'язок між інтервенцією та балансом?
  - id: ind_betel_after
    name: Бетель Після
    prompt: |
      Пан — лист бетелю — завершує трапезу в деяких традиціях. Це не десерт. Це завершення. Смакові відчуття знову змінюються. Що говорить фінал про ціле?
    follow_ups:
      - Як пан позначає перехід?
      - Чого б бракувало страві без нього?
      - Який зв'язок між завершенням і пам'яттю?
  - id: ind_street_chaos
    name: Вуличний Хаос
    prompt: |
      Продавець чаат працює на швидкості — бхель, папді, чатні нашаровуються за секунди. Спостерігай за виставою. Кіоск — це театр. Який сценарій? Хто глядач?
    follow_ups:
      - Якою була б страва без вистави?
      - Як швидкість формує враження?
      - Який зв'язок між хаосом та майстерністю?
  - id: ind_tandoor_breathe
    name: Дихання Тандира
    prompt: |
      Тандир дихає — полум'ям, димом, глиною. Наан прилипає до стіни, знімається, коли з'являються пухирці. Стань поруч. Тепло, запах. Який зв'язок між вогнем та смаком?
    follow_ups:
      - Яким був би наан без тандира?
      - Як глина формує пекаря?
      - Який зв'язок між диханням і хлібом?
  - id: ind_turmeric_stain
    name: Пляма Куркуми
    prompt: |
      Куркума залишає плями — на пальцях, тканині, пластику. Колір залишається. Поміть, що вона позначає. Пляма — це археологія. Звідки ця страва подорожувала, перш ніж дістатися до тебе?
    follow_ups:
      - Якою була б страва без цього кольору?
      - Як пляма позначає працю?
      - Який зв'язок між пігментом та збереженням?
  - id: ind_rice_architecture
    name: Архітектура Рису
    prompt: |
      Бір'яні будується — шар рису, шар м'яса, шафран, смажена цибуля. Структура тримається. Розкопай її. Як архітектура впливає на кожен шматочок?
    follow_ups:
      - Що станеться, якщо шари перемішаються занадто рано?
      - Як структура створює несподіванку?
      - Який зв'язок між будівництвом та їжею?
  - id: ind_chutney_spectrum
    name: Спектр Чатні
    prompt: |
      М'ята, тамаринд, кокос, помідор — чатні вишиковуються, як палітра. Кожен змінює смак. Спробуй одну страву з трьома чатні. Як одна основа стає трьома різними історіями?
    follow_ups:
      - Якою була б страва лише з одним чатні?
      - Як вибір формує свободу волі?
      - Який зв'язок між спектром та уподобаннями?
  - id: ind_steam_rising
    name: Піднімається Пар
    prompt: |
      Ідлі, доса, пурі — коли піднімаєш кришку, здіймається пар. Спостерігай за ним. Пар несе аромат ще до смаку. Що приходить першим? Ніс чи рот?
    follow_ups:
      - Як пар формує очікування?
      - Що втратиться без підняття кришки?
      - Який зв'язок між парою та смаком?
  - id: ind_silver_versus_steel
    name: Срібло проти Сталі
    prompt: |
      Деякі столи використовують сталеві талі, деякі — срібні, деякі — бананове листя. Поміть посуд. Як поверхня під їжею змінює враження? Вага, звук, традиція.
    follow_ups:
      - Якою була б страва на різних поверхнях?
      - Як посуд формує церемонію?
      - Який зв'язок між матеріалом та значенням?
  - id: ind_cumin_fragrance
    name: Аромат Кмину
    prompt: |
      Смажений кмин виділяє аромат перед смаком. Понюхай страву перед тим, як її скуштувати. Кмин розноситься кімнатою. Як аромат готує смакові рецептори?
    follow_ups:
      - Якою була б страва без цього запаху?
      - Як аромат позначає присутність кухаря?
      - Який зв'язок між носом і пам'яттю?
  - id: ind_shared_central
    name: Спільне Центральне
    prompt: |
      Страви стоять посередині. Всі тягнуться. Немає такого поняття, як "твоя тарілка". Спостерігай за хореографією тягнутися, передавати, брати. Які неписані правила?
    follow_ups:
      - Якою була б страва з індивідуальними порціями?
      - Як спільне харчування створює зв'язок?
      - Який зв'язок між центральним і комунальним?
  - id: ind_ghee_gloss
    name: Блиск Гхі
    prompt: |
      Гхі збирається в калюжки, блищить, покриває. Це жир як смак і як фініш. Поміть, де воно накопичується на тарілці. Як цей блиск змінює текстуру та температуру?
    follow_ups:
      - Якою була б страва з олією замість гхі?
      - Як гхі несе інші смаки?
      - Який зв'язок між блиском і насиченістю?
  - id: ind_papad_crunch
    name: Хрускіт Папада
    prompt: |
      Папад — хрусткий, тонкий, потріскуючий. Це текстура як пунктуація. Розламайте один. Слухайте. Хрускіт — це секція ритму страви. Якою була б тиша без нього?
    follow_ups:
      - Як хрускіт створює контраст?
      - Чого бракувало б страві без папада?
      - Який зв'язок між звуком і задоволенням?
  - id: ind_sambar_depth
    name: Глибина Самбару
    prompt: |
      Самбар багатошаровий — бобові, тамаринд, овочі, спеції. Він довго кипів. Скуштуй, щоб відчути шари. Скільки ти можеш розділити? Яка археологія цієї миски?
    follow_ups:
      - Яким був би самбар з меншою кількістю шарів?
      - Як час створює глибину?
      - Який зв'язок між кипінням і історією?
  - id: ind_pickle_punch
    name: Удар Соління
    prompt: |
      Ачар — соління — це сюжетний поворот. Один крихітний шматочок змінює все. Солодкий, кислий, гострий, ферментований. Поміть, коли він з'являється. Що він руйнує?
    follow_ups:
      - Якою була б страва без соління?
      - Як удар створює несподіванку?
      - Який зв'язок між поворотом і пам'яттю?
  - id: ind_bay_leaf_hunt
    name: Пошук Лаврового Листка
    prompt: |
      Лаврове листя ховається в пулао, бір'яні, каррі. Знайдіть один. Ви його не їсте — це археологія. Він прибув з Керали чи Кашміру. Що він додав, перш ніж його прибрали?
    follow_ups:
      - Як неїстівне формує їстівне?
      - Якою була б страва без листка?
      - Який зв'язок між прихованим і присутнім?
  - id: ind_dosa_edge
    name: Край Доси
    prompt: |
      Доса має край — хрусткий, мереживний, золотистий. Центр м'який. Контраст архітектурний. Де ти кусаєш спочатку? Як край обрамляє ціле?
    follow_ups:
      - Якою була б доса, якби була однаково хрусткою?
      - Як край створює інтерес?
      - Який зв'язок між межею та центром?
  - id: ind_saffron_thread
    name: Ниточка Шафрану
    prompt: |
      Шафран — кілька ниточок — забарвлює та ароматизує всю страву. Простеж одну ниточку. Звідки вона взялася? Кашмір, Іран, Іспанія? Найдорожча спеція. Що додає дефіцит?
    follow_ups:
      - Як шафран формує розкіш?
      - Якою була б страва з куркумою замість шафрану?
      - Який зв'язок між ниткою та територією?
  - id: ind_chaat_texture
    name: Текстура Чаат
    prompt: |
      Чаат нашаровує текстури — хрусткі, м'які, хрусткі, кремові — в одному шматочку. Розберіть його. Скільки текстур? Як вони працюють разом? Шматочок — це співпраця.
    follow_ups:
      - Яким був би чаат з однією текстурою?
      - Як нашарування створює гру?
      - Який зв'язок між текстурою та насолодою?
  - id: ind_mustard_seed_pop
    name: Поп Гірчичного Зерна
    prompt: |
      Гірчичне зерно вибухає в олії — бенгальське, південноіндійське обсмажування. Цей вибух хімічний. Зерна виділяють сполуки. Понюхайте. Що змінюється, коли тепло активує їх?
    follow_ups:
      - Як вибух позначає час приготування кухаря?
      - Якою була б страва без цього?
      - Який зв'язок між вибухом та силою?
  - id: ind_dal_surface
    name: Поверхня Далу
    prompt: |
      Дал має поверхню — іноді плівку, іноді тадку, що плаває. Не перемішуйте ще. Подивіться на неї. Що поверхня розкриває про те, що під нею?
    follow_ups:
      - Як поверхня запрошує чи відштовхує?
      - Що станеться, якщо ніколи не перемішувати?
      - Який зв'язок між поверхнею та глибиною?
  - id: ind_banana_leaf_plate
    name: Тарілка з Бананового Листя
    prompt: |
      Бананове листя — це тарілка — органічна, одноразова, традиційна. Лист має текстуру, запах. Їжа на ньому лежить інакше. Як лист змінює страву?
    follow_ups:
      - Якою була б страва на кераміці?
      - Як лист формує ритуал?
      - Який зв'язок між листком і місцем?
  - id: ind_fenugreek_haunt
    name: Повискування Пажитника
    prompt: |
      Пажитник — метхі — має запах, який залишається. Гіркий, з відтінком кленового сиропу. Він оселяється на кухні, на одязі. Поміть, де він прилипає. Що додає наполегливість?
    follow_ups:
      - Як пажитник позначає територію?
      - Якою була б страва без його присутності?
      - Який зв'язок між повискуванням і пам'яттю?
  - id: ind_pani_puri_moment
    name: Момент Пані Пурі
    prompt: |
      Пані пурі — це історія на один шматочок — хрустка оболонка, картопля, нут, тамариндова вода. Його треба з'їсти цілим, негайно. Момент неповторний. Що робить його терміновим?
    follow_ups:
      - Що станеться, якщо зачекати?
      - Як терміновість створює задоволення?
      - Який зв'язок між моментом і пам'яттю?
  - id: ind_serving_order
    name: Порядок Подачі
    prompt: |
      У деяких ситуаціях існує порядок — спочатку старші, певні страви перед іншими. Спостерігайте. Хто подає? Хто чекає? Хореографія кодує повагу. Які правила?
    follow_ups:
      - Якою була б страва без порядку?
      - Як послідовність створює значення?
      - Який зв'язок між порядком і ієрархією?
  - id: ind_cardamom_pod
    name: Коробочка Кардамону
    prompt: |
      Ціла коробочка кардамону ховається в пулао або чаї. Можна її розжувати, можна відсунути. Коробочка — це археологія — зелена з Керали, чорна з гір. Що вона внесла?
    follow_ups:
      - Чим ціла коробочка відрізняється від меленої?
      - Якою була б страва без неї?
      - Який зв'язок між коробочкою і місцем?
  - id: ind_kitchen_sounds
    name: Звуки Кухні
    prompt: |
      Індійська кухня має звуковий ландшафт — шліфування, смаження, шипіння скороварки. Закрийте очі на кухні. Нанесіть на карту звуки. Що постійно? Який ритм?
    follow_ups:
      - Якою була б страва без цих звуків?
      - Як звук формує очікування?
      - Який зв'язок між кухнею та столом?
  - id: ind_second_helping
    name: Друга Порція
    prompt: |
      "Візьміть ще" — це ритуал. Наполягання, відмова, остаточне прийняття. Спостерігайте за танцем. Що означає друга порція, окрім голоду?
    follow_ups:
      - Якою була б страва без пропозиції?
      - Як наполягання кодує турботу?
      - Який зв'язок між "більше" та "достатньо"?
  - id: ind_coriander_finish
    name: Фініш Коріандру
    prompt: |
      Свіжий коріандр — кінза — увінчує багато страв. Це останнє, що додається. Фініш. Поміть, як зелень змінює те, що було до цього. Яскрава, трав'яна, суперечлива.
    follow_ups:
      - Якою була б страва без цієї зелені?
      - Як фініш обрамляє ціле?
      - Який зв'язок між останнім і першим?
  - id: ind_lassi_cut
    name: Розріз Лассі
    prompt: |
      Лассі розрізає гостроту — прохолодне, кислувате, густе. Це полегшення. Поміть момент, коли ти його п'єш. Що воно перериває? Що воно відновлює?
    follow_ups:
      - Якою була б страва без лассі?
      - Як "розріз" продовжує витривалість?
      - Який зв'язок між полегшенням і ритмом?
  - id: ind_roti_stretch
    name: Розтягнення Роти
    prompt: |
      Роти розтягують руками — круглі, тонкі, з пухирцями на вогні. Спостерігай, як її роблять. Розтягнення — це майстерність. Яким би був хліб без цього руху?
    follow_ups:
      - Як розтягнення впливає на текстуру?
