# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 烹饪实验室 — 中文 (Mandarin Chinese)

id: culinary_lab_chinese
name: 烹饪实验室 — 中文
description: 50 张卡片，改变您体验中国菜的方式——从锅气、酱油的考古学，到圆桌的编舞和宴席的叙事。
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: 锅气
    prompt: |
      锅气——锅的呼吸——是极高的温度和速度产生的缥缈的烟气。它不是烟熏味；它是一种转化。
      你能捕捉到它吗？没有它，炒菜会是怎样的？
    follow_ups:
      - 锅气如何塑造菜肴？
      - 是什么产生了它？又是什么摧毁了它？
      - 温度和急促之间有什么关系？
  - id: chn_round_table
    name: 圆桌
    prompt: |
      中式宴席的桌子是圆的——中间是转盘。食物旋转。大家伸手。桌子就是编舞。谁转？谁等？
      有哪些不成文的规矩？
    follow_ups:
      - 方桌会有什么意义？
      - 圆形如何塑造一餐？
      - 中心和边缘之间有什么关系？
  - id: chn_soy_archeology
    name: 酱油考古学
    prompt: |
      酱油——发酵、陈酿、地域性。生抽、老抽、草菇老抽、双老抽。
      它来自某处。它花了时间。追溯这瓶酱油。它经历了怎样的旅程？工业酱油会牺牲什么？
    follow_ups:
      - 起源如何塑造一勺酱油？
      - 没有酱油，这道菜会是什么样？
      - 发酵和鲜味之间有什么关系？
  - id: chn_chopstick_grip
    name: 筷子握法
    prompt: |
      筷子延伸了手。米饭、滑溜的面条、饺子——每一样都需要不同的技巧。注意你的握法。餐具需要什么？它又允许什么？
    follow_ups:
      - 叉子会有什么改变？
      - 筷子如何塑造一口食物？
      - 工具和节奏之间有什么关系？
  - id: chn_dumpling_seam
    name: 饺子褶
    prompt: |
      饺子的褶皱——折叠、封口。饺子、烧卖、小笼包——每一种都有自己的形状。褶皱能封住，也能漏掉。仔细观察一个。破裂会有什么意义？褶皱保护了什么？
    follow_ups:
      - 折叠如何塑造馅料？
      - 敞开的饺子会失去什么？
      - 封口和汤汁之间有什么关系？
  - id: chn_tea_pour
    name: 倒茶
    prompt: |
      中国茶——倒入、续杯、分享。茶壶在传递。空杯在要求之前就被添满。倒茶是服务和关怀。注意节奏。
      没有茶，这顿饭会是怎样的？
    follow_ups:
      - 倒茶如何塑造用餐节奏？
      - 倒茶能传达什么？
      - 杯子和桌子之间有什么关系？
  - id: chn_bone_plate
    name: 骨碟
    prompt: |
      一个小碟子用来放骨头——丢弃的壳、鸡骨、虾壳。
      碟子收集不可食用的东西。它是餐具的一部分。骨碟允许什么？没有它会发生什么？
    follow_ups:
      - 骨碟如何塑造一餐？
      - 没有它，桌子看起来会是怎样？
      - 丢弃和尊严之间有什么关系？
  - id: chn_soup_spoon
    name: 汤勺
    prompt: |
      中国汤匙——宽大、扁平、陶瓷。它盛汤和固体。
      汤匙与嘴巴的契合方式不同。注意品尝。它的形状带来了什么？
    follow_ups:
      - 圆形汤匙会有什么改变？
      - 汤匙如何塑造品尝？
      - 形状和功能之间有什么关系？
  - id: chn_steam_basket
    name: 蒸笼
    prompt: |
      点心装在竹笼里——叠放、分层。蒸汽升腾。
      笼子保持形状。考虑竹子。金属会有什么不同？竹子增加了什么？
    follow_ups:
      - 蒸笼如何塑造点心？
      - 盘子会失去什么？
      - 竹子和蒸汽之间有什么关系？
  - id: chn_maillard_wok
    name: 炒锅的美拉德反应
    prompt: |
      家用的灶台无法达到炒锅的温度。煎炒是即时的。
      蛋白质在几秒钟内变褐。考虑化学反应。较低的温度会牺牲什么？炒锅需要什么？
    follow_ups:
      - 温度如何塑造风味？
      - 电磁炉会有什么不同？
      - 火焰和焦壳之间有什么关系？
  - id: chn_glutinous_texture
    name: 糯米口感
    prompt: |
      糯米——粘稠、有嚼劲——具有不同的化学性质。它用于粽子、糯米鸡、甜点。注意其质地。与长粒米有何不同？粘性带来了什么？
    follow_ups:
      - 普通米饭会怎样？
      - 质地如何塑造菜肴？
      - 粘性和包裹之间有什么关系？
  - id: chn_century_egg
    name: 皮蛋
    prompt: |
      皮蛋——腌制、转化。蛋黄是深色的，蛋白是半透明的。
      这种化学作用是古老的。考虑腌制过程。时间会做什么？
      新鲜的鸡蛋意味着什么？
    follow_ups:
      - 腌制如何塑造风味？
      - 鸡蛋新鲜会是怎样？
      - 时间和转化之间有什么关系？
  - id: chn_oyster_sauce
    name: 蚝油
    prompt: |
      蚝油——鲜味、浓稠、粤菜。它是浓缩和提取。
      牡蛎赋予其精华。追溯风味。没有它，这道炒菜会是怎样的？
    follow_ups:
      - 蚝油如何塑造菜肴？
      - 牡蛎和蔬菜之间有什么关系？
      - 酱油可以替代吗？
  - id: chn_ordering_ritual
    name: 点菜仪式
    prompt: |
      在中餐馆点菜——主人选择，或大家商量。
      平衡：肉类、蔬菜、汤、米饭。点菜是一次创作。注意谁做决定。有哪些规矩？
    follow_ups:
      - 点菜如何塑造一餐？
      - 每个人都自己点菜会怎样？
      - 选择和集体之间有什么关系？
  - id: chn_crispy_skin
    name: 脆皮
    prompt: |
      北京烤鸭皮——酥脆、上釉。或粤式烧肉的脆皮。
      皮是精心制作的。火候、空气、糖。考虑其结构。酥烂的皮意味着什么？
    follow_ups:
      - 酥脆如何塑造口感？
      - 什么创造了咔嚓声？
      - 皮和肉之间有什么关系？
  - id: chn_noodle_slip
    name: 面条滑溜
    prompt: |
      中式面条——小麦、米、手擀——质地各异。有的滑溜；有的筋道。
      面条在筷子上摩擦。注意阻力。滑溜增加了什么？
    follow_ups:
      - 质地如何塑造进食？
      - 烂面条会失去什么？
      - 滑溜和满足感之间有什么关系？
  - id: chn_bok_choy_wilt
    name: 小白菜萎蔫
    prompt: |
      锅中的小白菜——几秒钟。它会萎蔫但保持结构。绿叶变软。
      考虑这种转变。生吃意味着什么？煮过头会失去什么？
    follow_ups:
      - 萎蔫如何塑造蔬菜？
      - 热量和绿色之间有什么关系？
      - 什么时候算熟？
  - id: chn_five_spice
    name: 五香粉
    prompt: |
      五香粉——八角、丁香、肉桂、花椒、小茴香。
      它是一种有历史的混合香料。每种香料都有自己的路线。追溯一种。它经历了怎样的旅程？
    follow_ups:
      - 没有它，这道菜会是怎样的？
      - 混合香料如何创造独特性？
      - 香料和保存之间有什么关系？
  - id: chn_banquet_progression
    name: 宴席顺序
    prompt: |
      中式宴席有其流程——先上凉菜，然后热菜，汤，米饭，甜点。
      这个顺序就是叙事。注意节奏。不同的顺序会有什么影响？
    follow_ups:
      - 顺序如何塑造一餐？
      - 开始和结束之间有什么关系？
      - 故事的高潮在哪里？
  - id: chn_white_rice_center
    name: 白米饭中心
    prompt: |
      白米饭——清淡、蒸熟——是这顿饭的基石。它是画布。丰盛的菜肴需要米饭来平衡。注意你什么时候夹它。
      没有清淡的米饭，这顿饭会是怎样的？
    follow_ups:
      - 米饭如何塑造味蕾？
      - 炒饭会怎样？
      - 平淡和风味之间有什么关系？
  - id: chn_szechuan_numb
    name: 川菜麻味
    prompt: |
      花椒——麻辣——麻、刺。这不是辣；这是一种感觉。
      嘴巴会嗡嗡作响。考虑这种感觉。没有麻味，这道菜会是怎样的？
    follow_ups:
      - 麻辣如何塑造体验？
      - 麻和辣之间有什么关系？
      - 为什么搭配它们？
  - id: chn_dark_soy
    name: 老抽
    prompt: |
      老抽——更浓稠、更甜，用于上色。它给米饭染色，给肉上釉。
      它不是为了咸味；而是为了色泽。考虑视觉效果。深色增加了什么？
    follow_ups:
      - 生抽会怎样？
      - 颜色如何塑造期待？
      - 深色和焦糖化之间有什么关系？
  - id: chn_hot_plate
    name: 热盘
    prompt: |
      滋滋作响的铁板——牛肉、鱿鱼——端上来还在嘶嘶作响。铁盘让食物持续烹饪。
      声音就是戏剧。没有嘶嘶声，这道菜会是怎样的？热盘如何延长烹饪时间？
    follow_ups:
      - 嘶嘶声如何塑造体验？
      - 冷盘会是什么意思？
      - 声音和热量之间有什么关系？
  - id: chn_congee_soft
    name: 粥的软糯
    prompt: |
      粥——米粥——是软糯、暖心的。长时间煮的米饭会分解。
      这种质地就是“妥协”。考虑这种转变。在这里，“弹牙”意味着什么？
    follow_ups:
      - 软糯如何塑造菜肴？
      - 浓稠的粥会怎样？
      - 水和米之间有什么关系？
  - id: chn_glass_noodle
    name: 粉丝
    prompt: |
      粉丝——绿豆淀粉——透明、滑溜。它们吸收风味。注意其质地。
      小麦面条会怎样？透明度为什么重要？
    follow_ups:
      - 粉丝如何塑造菜肴？
      - 透明和吸收之间有什么关系？
      - 为什么叫粉丝？
  - id: chn_xlb_burst
    name: 小笼包爆浆
    prompt: |
      小笼包——汤包——里面有汤汁。第一口可能会烫伤或爆浆。
      技巧：轻咬，吸吮，食用。考虑风险。冷的小笼包会是怎样的？
    follow_ups:
      - 汤汁如何塑造体验？
      - 没有爆浆，你会失去什么？
      - 温度和危险之间有什么关系？
  - id: chn_tea_smell
    name: 茶香
    prompt: |
      乌龙茶、茉莉花茶、普洱茶——每种茶都有不同的香气。先闻后品。
      香气是体验的一半。香气承诺了什么？它又交付了什么？
    follow_ups:
      - 香气如何塑造品饮？
      - 没有香气，茶会是怎样的？
      - 浸泡和香味之间有什么关系？
  - id: chn_crab_crack
    name: 蟹壳剥开
    prompt: |
      中式宴席上的螃蟹——配有敲蟹工具。敲击声和劳动。
      蟹肉被取出。考虑这种编舞。预先剥好的螃蟹意味着什么？
    follow_ups:
      - 敲开如何塑造一餐？
      - 没有劳动，你会失去什么？
      - 努力和回报之间有什么关系？
  - id: chn_turn_table
    name: 转盘
    prompt: |
      转盘——谁来转动？何时转动？你想要的菜可能在桌子的另一边。
      转动是礼仪。注意这种互动。有哪些规矩？何时该等待？
    follow_ups:
      - 转动如何塑造一餐？
      - 固定菜肴意味着什么？
      - 转动和分享之间有什么关系？
  - id: chn_ginger_slice
    name: 姜片
    prompt: |
      海鲜搭配的姜——细片，有时会炸过。它能去除腥味。
      姜既是装饰也是功能。考虑它的作用。没有它，鱼会是怎样的？
    follow_ups:
      - 姜如何塑造味蕾？
      - 切片和香气之间有什么关系？
      - 为什么海鲜要配姜？
  - id: chn_hoisin_dip
    name: 海鲜酱蘸料
    prompt: |
      烤鸭搭配海鲜酱——蘸料是一种仪式。薄饼、鸭肉、葱丝、酱料。
      每个元素都有其位置。考虑这种组合。少了一个会怎样？
    follow_ups:
      - 蘸料如何塑造一口？
      - 另一种酱料会怎样？
      - 甜味和鸭肉之间有什么关系？
  - id: chn_leaf_wrap
    name: 菜叶包裹
    prompt: |
      生菜包——肉末、香草、酱料，用叶子包裹。叶子是容器和质感。
      包裹是手工活。考虑这种结构。玉米饼会怎样？
    follow_ups:
      - 叶子如何塑造一口？
      - 盘子会怎样？
      - 包裹和手之间有什么关系？
  - id: chn_fish_whole
    name: 整鱼
    prompt: |
      整条鱼——清蒸，头尾俱全。鱼是完整呈现的。
      鱼头有意义。考虑这种呈现方式。鱼片会牺牲什么？
    follow_ups:
      - 整体如何塑造菜肴？
      - 鱼头意味着什么？
      - 整体和尊重之间有什么关系？
  - id: chn_scallion_oil
    name: 葱油
    prompt: |
      葱油——将滚烫的油浇在切碎的葱姜上。它是一种调味，一种点缀。
      油携带了香料的芳香。注意它是什么时候淋上的。滚烫的油增加了什么？
    follow_ups:
      - 没有它，这道菜会是怎样的？
      - 油如何塑造点缀？
      - 油和香气之间有什么关系？
  - id: chn_black_vinegar
    name: 黑醋
    prompt: |
      镇江香醋——深色、复杂、微甜。它能解腻。
      几滴就能改变饺子的味道。考虑其酸度。米醋会怎样？深色增加了什么？
    follow_ups:
      - 醋如何塑造口感？
      - 没有它，饺子会是怎样的？
      - 醋和平衡之间有什么关系？
  - id: chn_sticky_rice
    name: 糯米
    prompt: |
      荷叶糯米饭——糯米鸡。叶子散发风味。米饭被包裹、蒸熟。
      打开它。注意香气。锡纸会怎样？
    follow_ups:
      - 叶子如何塑造米饭？
      - 包裹和蒸气之间有什么关系？
      - 不包裹意味着什么？
  - id: chn_mooncake_mold
    name: 月饼模具
    prompt: |
      月饼——印有文字、图案。模具承载历史。
      图案有其意义。考虑印记。普通月饼会失去什么？
    follow_ups:
      - 模具如何塑造月饼？
      - 图案意味着什么？
      - 印记和传统之间有什么关系？
  - id: chn_egg_tart
    name: 蛋挞
    prompt: |
      蛋挞——葡萄牙影响，香港改良。蛋奶冻，酥皮。
      考虑其质地。酥脆、丝滑。不同的挞皮会有什么不同？
    follow_ups:
      - 蛋挞如何塑造用餐的结尾？
      - 蛋奶冻和酥脆之间有什么关系？
      - 为什么以蛋挞结尾？
  - id: chn_hand_pull
    name: 手擀
    prompt: |
      手工拉面——厨师拉伸、折叠、拉扯。面条增多。
      这是一种表演。观察它。机器做的面条会牺牲什么？
    follow_ups:
      - 拉扯如何塑造面条？
      - 手和质地之间有什么关系？
      - 均一的面条意味着什么？
  - id: chn_bird_nest
    name: 鸟巢
    prompt: |
      鸟巢——不是汤里的燕窝，而是芋头鸟巢，或炸脆面条的鸟巢，里面盛放着炒菜。
      巢是一种建筑。考虑其形状。巢增加了什么？
    follow_ups:
      - 巢如何塑造菜肴？
      - 盘子会怎样？
      - 容器和内容物之间有什么关系？
  - id: chn_red_envelope
    name: 红包
    prompt: |
      宴席上，红包可能伴随礼物——给厨房的钱，给主人的钱。
      红包是一种仪式。考虑这种交换。红色意味着什么？
    follow_ups:
      - 红包含如何塑造场合？
      - 没有红包会怎样？
      - 礼物和面子之间有什么关系？
  - id: chn_toasting_ritual
    name: 敬酒仪式
    prompt: |
      干杯——一饮而尽——或随意小酌。敬酒使宴席有条理。
      谁向谁敬酒？何时敬酒？这种仪式是社交性的。注意这种编舞。
      没有敬酒，这顿饭会是怎样的？
    follow_ups:
      - 敬酒如何塑造一餐？
      - 敬酒和等级制度之间有什么关系？
      - 何时饮酒？
  - id: chn_preserved_veg
    name: 腌菜
    prompt: |
      榨菜、腌萝卜、发酵的卷心菜——这些增加了深度。
      它们是古老的保存方式。考虑这种转变。新鲜蔬菜会怎样？
    follow_ups:
      - 腌制如何塑造菜肴？
      - 腌制物和鲜味之间有什么关系？
      - 为什么是腌制的？
  - id: chn_sweet_sour
    name: 糖醋
    prompt: |
