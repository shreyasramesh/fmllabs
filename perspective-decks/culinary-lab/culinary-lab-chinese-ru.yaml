# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулинарная Лаборатория — Китай (Russian)

id: culinary_lab_chinese
name: Кулинарная Лаборатория — Китай
description: 50 карточек, чтобы изменить ваше восприятие китайской кухни — от химии вок хэй и археологии соевого соуса до хореографии за круглым столом и повествования банкета.
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: Вок Хэй
    prompt: |
      Вок хэй — дыхание вока — это неуловимый дым, возникающий от сильного жара и скорости. Это не совсем дымность; это трансформация.
      Можете ли вы уловить это? Каким был бы стир-фрай без него?
    follow_ups:
      - Как хэй формирует блюдо?
      - Что его создает? Что его уничтожает?
      - Какова связь между жаром и спешкой?
  - id: chn_round_table
    name: Круглый Стол
    prompt: |
      Китайский банкетный стол круглый — в центре вращающийся поднос. Еда
      вращается. Все тянутся. Стол — это хореография. Кто поворачивает? Кто ждет?
      Каковы невысказанные правила?
    follow_ups:
      - Что означал бы прямоугольный стол?
      - Как круглая форма формирует трапезу?
      - Какова связь между центром и краем?
  - id: chn_soy_archeology
    name: Археология Соевого Соуса
    prompt: |
      Соевый соус — ферментированный, выдержанный, региональный. Светлый, темный, грибной, двойной черный.
      Он откуда-то появился. Это заняло время. Проследите бутылку. Какой путь она проделала? Что пожертвует промышленный соус?
    follow_ups:
      - Как происхождение формирует налив?
      - Каким было бы блюдо без соевого соуса?
      - Какова связь между ферментацией и умами?
  - id: chn_chopstick_grip
    name: Хват Палочек
    prompt: |
      Палочки для еды удлиняют руку. Рис, скользкая лапша, пельмени — каждая
      требует особой техники. Заметьте свой хват. Что требует утварь? Что она позволяет?
    follow_ups:
      - Что бы изменила вилка?
      - Как палочка формирует укус?
      - Какова связь между инструментом и темпом?
  - id: chn_dumpling_seam
    name: Шов Пельменя
    prompt: |
      Складки пельменя — складка, шов. Цзяоцзы, шумай, сяолунбао — у каждого своя форма.
      Шов держит или выпускает. Изучите один. Что бы означал разрыв? Что защищает складка?
    follow_ups:
      - Как складка формирует начинку?
      - Что бы потерял открытый пельмень?
      - Какова связь между швом и супом?
  - id: chn_tea_pour
    name: Наливание Чая
    prompt: |
      Китайский чай — наливается, доливается, делится. Чайник циркулирует. Пустые чашки
      наливаются до просьбы. Наливание — это услуга и забота. Заметьте ритм.
      Каким был бы обед без чая?
    follow_ups:
      - Как чай формирует темп?
      - Что сообщает наливание?
      - Какова связь между чашкой и столом?
  - id: chn_bone_plate
    name: Тарелка для Костей
    prompt: |
      Маленькая тарелка для костей — выброшенные раковины, куриные кости, креветочные панцири.
      Тарелка собирает то, что несъедобно. Это часть сервировки. Что позволяет тарелка для костей? Что произошло бы без нее?
    follow_ups:
      - Как тарелка формирует трапезу?
      - Как бы выглядел стол без нее?
      - Какова связь между отбросами и достоинством?
  - id: chn_soup_spoon
    name: Суповая Ложка
    prompt: |
      Китайская суповая ложка — широкая, неглубокая, керамическая. Она держит бульон и твердое.
      Ложка иначе прилегает ко рту. Заметьте глоток. Что позволяет форма?
    follow_ups:
      - Что бы изменила круглая ложка?
      - Как ложка формирует глоток?
      - Какова связь между формой и функцией?
  - id: chn_steam_basket
    name: Паровая Корзина
    prompt: |
      Димсам подается в бамбуковых корзинах — сложенных, многоярусных. Пар поднимается.
      Корзина держит форму. Подумайте о бамбуке. Что бы сделала сталь иначе? Что добавляет бамбук?
    follow_ups:
      - Как корзина формирует пельмень?
      - Что бы потеряла тарелка?
      - Какова связь между бамбуком и паром?
  - id: chn_maillard_wok
    name: Реакция Майяра в Воке
    prompt: |
      Вок достигает температур, недоступных домашним плитам. Обжарка мгновенна.
      Белки подрумяниваются за секунды. Подумайте о химии. Что бы пожертвовал низкий жар? Что требует вок?
    follow_ups:
      - Как жар формирует вкус?
      - Что бы сделала электрическая плита иначе?
      - Какова связь между пламенем и корочкой?
  - id: chn_glutinous_texture
    name: Клейкая Текстура
    prompt: |
      Клейкий рис — липкий, жевательный — имеет другую химию. Используется для
      цзунцзы, ломайгай, десертов. Заметьте текстуру. Чем он отличается от длиннозерного? Что позволяет липкость?
    follow_ups:
      - Что бы сделал обычный рис?
      - Как текстура формирует блюдо?
      - Какова связь между липкостью и оберткой?
  - id: chn_century_egg
    name: Столетнее Яйцо
    prompt: |
      Столетнее яйцо — консервированное, трансформированное. Желток темный, белок прозрачный.
      Химия древняя. Подумайте о консервации. Что делает время?
      Что означала бы свежесть?
    follow_ups:
      - Как консервация формирует вкус?
      - Каким было бы яйцо свежим?
      - Какова связь между временем и трансформацией?
  - id: chn_oyster_sauce
    name: Устричный Соус
    prompt: |
      Устричный соус — умами, густой, кантонский. Это восстановление и экстракция.
      Устрица отдает свою суть. Проследите вкус. Каким был бы стир-фрай без него?
    follow_ups:
      - Как соус формирует блюдо?
      - Какова связь между устрицей и овощами?
      - Что бы сделало соевый соус вместо него?
  - id: chn_ordering_ritual
    name: Ритуал Заказа
    prompt: |
      Заказ в китайском ресторане — хозяин выбирает, или стол обсуждает.
      Баланс: мясо, овощи, суп, рис. Заказ — это композиция. Заметьте,
      кто решает. Каковы правила?
    follow_ups:
      - Как заказ формирует трапезу?
      - Что бы каждый заказал для себя?
      - Какова связь между выбором и коллективом?
  - id: chn_crispy_skin
    name: Хрустящая Корочка
    prompt: |
      Кожица утки по-пекински — хрустящая, глазированная. Или треск жареной свинины по-кантонски.
      Кожица — это намеренность. Жар, воздух, сахар. Подумайте об архитектуре.
      Что бы означала мокрая кожица?
    follow_ups:
      - Как хруст формирует укус?
      - Что создает треск?
      - Какова связь между кожицей и мясом?
  - id: chn_noodle_slip
    name: Скольжение Лапши
    prompt: |
      Китайская лапша — пшеничная, рисовая, тянутая вручную — различается по текстуре. Некоторые скользят;
      другие жуются. Сопротивление лапши против палочек. Заметьте
      сопротивление. Что добавляет скольжение?
    follow_ups:
      - Как текстура формирует поедание?
      - Что бы потеряла кашеобразная лапша?
      - Какова связь между скольжением и удовлетворением?
  - id: chn_bok_choy_wilt
    name: Вялость Бок-Чоя
    prompt: |
      Бок-чой в воке — секунды. Он вянет, но сохраняет структуру. Зелень
      смягчается. Подумайте о трансформации. Что бы означало сырое? Что бы потеряло переготовленное?
    follow_ups:
      - Как вялость формирует овощ?
      - Какова связь между жаром и зеленью?
      - Когда это готово?
  - id: chn_five_spice
    name: Пять Специй
    prompt: |
      Порошок пяти специй — бадьян, гвоздика, корица, сычуаньский перец, фенхель.
      Это смесь с историей. Каждая специя имеет свой маршрут. Проследите одну. Какой
      путь она проделала?
    follow_ups:
      - Каким было бы блюдо без нее?
      - Как смесь создает идентичность?
      - Какова связь между специей и сохранением?
  - id: chn_banquet_progression
    name: Ход Банкета
    prompt: |
      Китайский банкет имеет дугу — сначала холодные блюда, затем горячие, суп, рис, десерт.
      Ход — это повествование. Заметьте ритм. Что бы означал другой
      порядок?
    follow_ups:
      - Как последовательность формирует трапезу?
      - Какова связь между первым и последним?
      - Когда достигает пика история?
  - id: chn_white_rice_center
    name: Белый Рис в Центре
    prompt: |
      Белый рис — простой, приготовленный на пару — является якорем трапезы.
      Это холст. Насыщенные блюда требуют риса для баланса. Заметьте, когда вы к нему тянетесь. Что бы означала трапеза без простого?
    follow_ups:
      - Как рис формирует вкус?
      - Что бы сделала жареный рис?
      - Какова связь между нейтральным и вкусом?
  - id: chn_szechuan_numb
    name: Сычуаньское Онемение
    prompt: |
      Сычуаньский перец — ма-ла — онемение, покалывание. Это не острота; это ощущение.
      Рот гудит. Подумайте об ощущении. Каким было бы блюдо без
      онемения?
    follow_ups:
      - Как ма-ла формирует восприятие?
      - Какова связь между онемением и остротой?
      - Зачем их сочетать?
  - id: chn_dark_soy
    name: Темный Соевый Соус
    prompt: |
      Темный соевый соус — гуще, слаще, для цвета. Он окрашивает рис, глазирует
      мясо. Это не для соли; это для цвета. Подумайте о визуальном. Что добавляет темный?
    follow_ups:
      - Что бы сделал светлый соевый соус?
      - Как цвет формирует ожидания?
      - Какова связь между темным и карамелью?
  - id: chn_hot_plate
    name: Горячая Тарелка
    prompt: |
      Шкворчащие тарелки — говядина, кальмары — прибывают шипя. Чугунная тарелка продолжает готовить.
      Звук — это театр. Каким было бы блюдо без шипения? Как
      горячая тарелка продлевает приготовление?
    follow_ups:
      - Как шипение формирует восприятие?
      - Что бы означала холодная тарелка?
      - Какова связь между звуком и жаром?
  - id: chn_congee_soft
    name: Каша Конджи — Мягкая
    prompt: |
      Конджи — рисовая каша — мягкая, утешительная. Долго вареный рис распадается.
      Текстура — это сдача. Подумайте о трансформации. Что бы означало аль денте
      здесь?
    follow_ups:
      - Как мягкость формирует блюдо?
      - Что бы сделала густая конджи?
      - Какова связь между водой и рисом?
  - id: chn_glass_noodle
    name: Стеклянная Лапша
    prompt: |
      Стеклянная лапша — крахмал из маша — прозрачная, скользкая. Она впитывает
      вкус. Заметьте текстуру. Что бы сделала пшеничная лапша? Почему
      прозрачность важна?
    follow_ups:
      - Как лапша формирует блюдо?
      - Какова связь между прозрачностью и впитыванием?
      - Почему стеклянная?
  - id: chn_xlb_burst
    name: Взрыв Сяолунбао
    prompt: |
      Сяолунбао — пельмень с супом — содержит бульон внутри. Первый укус может обжечь или
      разорваться. Техника: надкусить, хлебнуть, съесть. Подумайте о риске. Что бы означал холодный сяолунбао?
    follow_ups:
      - Как суп формирует восприятие?
      - Что бы вы потеряли без взрыва?
      - Какова связь между температурой и опасностью?
  - id: chn_tea_smell
    name: Запах Чая
    prompt: |
      Улун, жасмин, пуэр — у каждого чая свой аромат. Понюхайте перед глотком.
      Аромат — половина впечатления. Что обещает запах? Что
      он доставляет?
    follow_ups:
      - Как запах формирует глоток?
      - Каким был бы чай без аромата?
      - Какова связь между завариванием и запахом?
  - id: chn_crab_crack
    name: Раскалывание Краба
    prompt: |
      Краб на китайском банкете — подаются щипцы. Раскалывание — это звук и труд.
      Мясо извлекается. Подумайте о хореографии. Что бы означал заранее расколотый?
    follow_ups:
      - Как раскалывание формирует трапезу?
      - Что бы вы потеряли без труда?
      - Какова связь между усилием и наградой?
  - id: chn_turn_table
    name: Вращающийся Поднос
    prompt: |
      Lazy susan — кто его поворачивает? Когда? Блюдо, которое вы хотите, может быть через стол.
      Поворот — это этикет. Заметьте танец. Каковы правила?
      Когда вы ждете?
    follow_ups:
      - Как поворот формирует трапезу?
      - Что бы означали фиксированные блюда?
      - Какова связь между поворотом и обменом?
  - id: chn_ginger_slice
    name: Ломтик Имбиря
    prompt: |
      Имбирь с морепродуктами — тонкие ломтики, иногда жареные. Он нейтрализует рыбный запах.
      Имбирь — это и украшение, и функция. Подумайте о его роли. Какова была бы рыба без него?
    follow_ups:
      - Как имбирь формирует вкус?
      - Какова связь между ломтиком и запахом?
      - Почему имбирь с морепродуктами?
  - id: chn_hoisin_dip
    name: Соус Хойсин — Дип
    prompt: |
      Хойсин с уткой по-пекински — макание — это ритуал. Блинчик, утка,
      лук-шалот, соус. Каждый элемент имеет свое место. Подумайте о композиции.
      Что бы означало отсутствие одного?
    follow_ups:
      - Как макание формирует укус?
      - Что бы сделал другой соус?
      - Какова связь между сладостью и уткой?
  - id: chn_leaf_wrap
    name: Обертка в Лист
    prompt: |
      Обертка из салата — мясной фарш, травы, соус, завернутые в лист. Лист —
      это сосуд и текстура. Обертка — это ручная работа. Подумайте об архитектуре.
      Что бы сделала тортилья?
    follow_ups:
      - Как лист формирует укус?
      - Что бы сделала тарелка?
      - Какова связь между оберткой и рукой?
  - id: chn_fish_whole
    name: Рыба Целиком
    prompt: |
      Целая рыба — приготовленная на пару, с головой и хвостом. Рыба подается целиком.
      Голова имеет значение. Подумайте о подаче. Что бы потеряло филе?
    follow_ups:
      - Как целое формирует блюдо?
      - Что означает голова?
      - Какова связь между целым и уважением?
  - id: chn_scallion_oil
    name: Масло с Зеленым Луком
    prompt: |
      Масло с зеленым луком — горячее масло, вылитое на нарезанный зеленый лук и имбирь. Это
      заправка, финиш. Масло несет ароматы. Заметьте, когда оно применяется. Что добавляет шипение?
    follow_ups:
      - Каким было бы блюдо без него?
      - Как масло формирует финиш?
      - Какова связь между маслом и ароматом?
  - id: chn_black_vinegar
    name: Черный Уксус
    prompt: |
      Уксус Чинкианг — темный, сложный, слегка сладкий. Он срезает жирность. Несколько
      капель меняют пельмень. Подумайте об кислотности. Что бы сделал рисовый уксус? Что добавляет темный?
    follow_ups:
      - Как уксус формирует укус?
      - Каким был бы пельмень без него?
      - Какова связь между уксусом и балансом?
  - id: chn_sticky_rice
    name: Клейкий Рис
    prompt: |
      Клейкий рис в лотосовом листе — ломай гай. Лист придает вкус. Рис
      завернут, приготовлен на пару. Разверните его. Заметьте аромат. Что бы сделала фольга?
    follow_ups:
      - Как лист формирует рис?
      - Какова связь между оберткой и паром?
      - Что бы означало развернутое?
  - id: chn_mooncake_mold
    name: Форма для Лунного Пряника
    prompt: |
      Лунные пряники — штампованные иероглифами, узорами. Форма — это история.
      Дизайн что-то значит. Подумайте о штампе. Что бы потерял простой пряник?
    follow_ups:
      - Как форма формирует пряник?
      - Что означает узор?
      - Какова связь между отпечатком и традицией?
  - id: chn_egg_tart
    name: Яичный Тарт
    prompt: |
      Яичный тарт — португальское влияние, гонконгское совершенствование. Заварной крем,
      слоеное тесто. Подумайте о текстуре. Слоистое, шелковистое. Что бы сделала другая
      корочка?
    follow_ups:
      - Как тарт формирует конец трапезы?
      - Какова связь между заварным кремом и хрустом?
      - Почему яичный тарт на завершение?
  - id: chn_hand_pull
    name: Ручное Вытягивание
    prompt: |
      Лапша, вытянутая вручную — повар растягивает, складывает, тянет. Нити умножаются.
      Это представление. Посмотрите. Что бы потеряла машинная лапша?
    follow_ups:
      - Как вытягивание формирует лапшу?
      - Какова связь между рукой и текстурой?
