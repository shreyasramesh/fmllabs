# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Кулінарна лабораторія — Суші (Ukrainian)

id: culinary_lab_sushi
name: Кулінарна лабораторія — Суші
description: 50 карток, щоб змінити ваш досвід суші — від хімії рису та риби до хореографії біля стійки та археології походження кожного нета.
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: Температура рису
    prompt: |
      Рис для суші теплий — приблизно температура тіла. Не холодний. Тепло несе оцет. Відчуйте це. Що зробив би холодний рис? Як температура формує укус?
    follow_ups:
      - Що б втратив рис кімнатної температури?
      - Як тепло несе смак?
      - Який зв'язок між температурою та текстурою?
  - id: sush_shari_balance
    name: Баланс Шарi
    prompt: |
      Шарi — рис — це половина суші. Баланс оцту, солі, цукру є точним. Спробуйте рис окремо. Що він приносить? Що означав би прісний рис?
    follow_ups:
      - Як рис формує нета?
      - Що б сталося від занадто великої кількості оцту?
      - Який зв'язок між шарi та нета?
  - id: sush_counter_ritual
    name: Ритуал біля стійки
    prompt: |
      Омакасе біля стійки — ви перед шефом. Суші подаються поштучно. Стійка — це сцена. Зверніть увагу на хореографію. Який ритм? Хто задає темп?
    follow_ups:
      - Що б змінив стіл?
      - Як стійка формує трапезу?
      - Який зв'язок між шефом і гостем?
  - id: sush_net_origin
    name: Походження Нета
    prompt: |
      Кожен нета — начинка — походить звідкись. Тойосу. Цукідзі. Човен. Ранчо. Запитайте. Прослідкуйте шлях риби. Яку подорож вона здійснила? Що б означало заморожене зі складу?
    follow_ups:
      - Як походження формує страву?
      - Що б сталося від іншого джерела?
      - Який зв'язок між місцем і якістю?
  - id: sush_wasabi_hidden
    name: Васабі прихований
    prompt: |
      Справжній васабі — тертий корінь — рідкість. Більшість — хрін і барвник. Але коли він справжній, він інший. Різкий, зелений, швидкоплинний. Зверніть увагу на гостроту. Що б додало "підробка"? Відняло?
    follow_ups:
      - Як васабі формує укус?
      - Що б означало відсутність васабі?
      - Який зв'язок між гостротою та рибою?
  - id: sush_finger_over_chopstick
    name: Палець над паличками
    prompt: |
      Нігірі традиційно їдять пальцями — не паличками. Пальці відчувають температуру, текстуру. Спробуйте. Що пальці додають, чого не можуть палички?
    follow_ups:
      - Як рука формує досвід?
      - Що б зробили палички?
      - Який зв'язок між дотиком і смаком?
  - id: sush_piece_by_piece
    name: Поштучно
    prompt: |
      Суші подаються по одному шматку — або два. Темп навмисний. Ви їсте; ви чекаєте. Розгляньте ритм. Що б втратила тарілка з десятьма шматками одночасно?
    follow_ups:
      - Як темп формує трапезу?
      - Що б зробила швидкість?
      - Який зв'язок між шматком і увагою?
  - id: sush_gari_palate
    name: Гарі для палітри
    prompt: |
      Гарі — маринований імбир — очищає між шматками. Це не гарнір; це перезавантаження. Зверніть увагу, коли ви його їсте. Що б зробили послідовні шматки без гарі для смакових відчуттів?
    follow_ups:
      - Як гарі формує послідовність?
      - Що б означало відсутність гарі?
      - Який зв'язок між перезавантаженням і смаком?
  - id: sush_soy_minimal
    name: Соєвий мінімум
    prompt: |
      Соєвий соус — легке занурення, рибою вниз. Не рисом. Рис вбрав би занадто багато. Шеф, можливо, вже змастив соусом. Зверніть увагу. Що б зробило занурення донизу?
    follow_ups:
      - Як соєвий соус формує шматок?
      - Що б означало відсутність соєвого соусу?
      - Який зв'язок між зануренням і балансом?
  - id: sush_knife_matters
    name: Ніж має значення
    prompt: |
      Ніж для суші — односторонній, гострий. Розріз впливає на текстуру. Впоперек волокон або за ними. Кут. Розгляньте, що робить лезо. Що б втратив тупий ніж?
    follow_ups:
      - Як розріз формує рибу?
      - Що б зробив інший кут?
      - Який зв'язок між лезом і відчуттям у роті?
  - id: sush_otoro_fat
    name: Жир Оторо
    prompt: |
      Оторо — найжирніший тунець — тане. Жир — це головне. Розгляньте прожилки. Що б зробив пісний акамі? Як жир формує враження?
    follow_ups:
      - Що б було зі шматком без жиру?
      - Як прожилки створюють розкіш?
      - Який зв'язок між жиром і таненням?
  - id: sush_unagi_glaze
    name: Глазур Унагі
    prompt: |
      Унагі — вугор — змащується солодким соусом, іноді знову підсмажується. Глазур — це лак. Розгляньте блиск. Що б означав неглазурований вугор?
    follow_ups:
      - Як глазур формує шматок?
      - Який зв'язок між солодким і вугром?
      - Навіщо глазурувати?
  - id: sush_nori crisp
    name: Хрускіт норі
    prompt: |
      Норі для макі — підсмажені, хрусткі, чи м'які? Різні шефи вибирають по-різному. Норі впливає на укус. Розгляньте текстуру. Що б зробили розмоклі норі?
    follow_ups:
      - Як норі формує рол?
      - Що б означало інше підсмажування?
      - Який зв'язок між хрускотом і свіжістю?
  - id: sush_silence_counter
    name: Тиша біля стійки
    prompt: |
      Деякі суші-стійки тихі — концентрація, повага. Інші жваві. Зверніть увагу на звуковий ландшафт. Що додає тиша? Що додає розмова?
    follow_ups:
      - Як звук формує трапезу?
      - Що б зробила гучна музика?
      - Який зв'язок між тишею та зосередженістю?
  - id: sush_tamago_sweet
    name: Солодкий Тамаго
    prompt: |
      Тамаго — яєчний заварний крем — часто завершує страву. Він солодкий, шаруватий. Навичка шефа очевидна. Розгляньте завершення. Що б означала сира риба як останній шматок?
    follow_ups:
      - Як тамаго формує закінчення?
      - Який зв'язок між солодким і завершенням?
      - Чому яйце останнє?
  - id: sush_tuna_spectrum
    name: Спектр тунця
    prompt: |
      Акамі, чуторо, оторо — від пісного до жирного. Спектр навмисний. Спробуйте їх по порядку, якщо можете. Як працює прогресія? Що пропонує кожен?
    follow_ups:
      - Як жир формує спектр?
      - Що б означав один сорт окремо?
      - Який зв'язок між пісним і насиченим?
  - id: sush_ume_shiso
    name: Уме Шисо
    prompt: |
      Уме — маринований слива — і шисо в деяких ролах. Кислуваті, трав'яні. Вони врівноважують насиченість. Зверніть увагу, коли вони з'являються. Що б означав рол без них?
    follow_ups:
      - Як уме формує укус?
      - Який зв'язок між кислим і рибою?
      - Навіщо шисо?
  - id: sush_gunkan_hold
    name: Гункан тримає
    prompt: |
      Гункан — "броненосець" — тримає розсипчасті начинки. Ікра, морський їжак. Комір з норі утримує. Розгляньте форму. Що б зробив плоский шматок?
    follow_ups:
      - Як форма формує начинку?
      - Що б означала інша ємність?
      - Який зв'язок між утриманням і розсипанням?
  - id: sush_uni_risk
    name: Ризик Уні
    prompt: |
      Уні — морський їжак — викликає протилежні емоції. Солодкий, солоний, текстура. Він може бути ідеальним або зіпсованим. Розгляньте ризик. Що б означав безпечний лосось? Що додає ризик?
    follow_ups:
      - Як уні формує досвід?
      - Що б ви втратили без ризику?
      - Який зв'язок між суперечливістю та запам'ятовуваністю?
  - id: sush_chef_choice
    name: Вибір Шефа
    prompt: |
      Омакасе — вибір шефа. Ви відмовляєтеся від контролю. Шеф читає день, рибу, вас. Розгляньте довіру. Що б змінило самостійний вибір?
    follow_ups:
      - Як відмова від контролю формує трапезу?
      - Що б означав вибір з меню?
      - Який зв'язок між довірою та досвідом?
  - id: sush_sake_pair
    name: Парі з Саке
    prompt: |
      Саке з суші — холодне, тепле, витримане. Парі продумане. Зверніть увагу, коли ви робите ковток. Воно очищає? Посилює? Розгляньте роль напою.
    follow_ups:
      - Як саке формує шматок?
      - Що б зробило вино?
      - Який зв'язок між рисом і рисовим вином?
  - id: sush_ikura_pop
    name: Ікура — лопання
    prompt: |
      Ікура — лососева ікра — лопається. Вибух — це текстура та солоність. Розгляньте відчуття. Що б зробила варена ікра? Як лопання формує укус?
    follow_ups:
      - Що б було зі шматком без лопання?
      - Як текстура створює задоволення?
      - Який зв'язок між лопанням і сіллю?
  - id: sush_hirame_chew
    name: Хрускіт Хіраме
    prompt: |
      Хіраме — палтус — має інший хрускіт, ніж тунець. Він пісний, ніжний. Зверніть увагу на текстуру. Що б зробила жирна риба? Як варіюється хрускіт?
    follow_ups:
      - Як текстура формує шматок?
      - Який зв'язок між пісним і ніжним?
      - Чому замовляти хіраме?
  - id: sush_amaebi_head
    name: Голова Амаебі
    prompt: |
      Амаебі — креветка солодка — іноді подається зі смаженою головою. Голова хрустка, умамі. Розгляньте використання цілого. Що б втратила креветка без голови?
    follow_ups:
      - Як голова формує страву?
      - Який зв'язок між цілим і повагою?
      - Навіщо смажити голову?
  - id: sush_mirin_gloss
    name: Блиск міріну
    prompt: |
      Деякі шматки змащуються нікірі — соєвим соусом, міріном, саке. Блиск — це завершення. Шеф його вже соусував. Розгляньте, чи варто додавати ще соєвого соусу. Що б зробило надмірне занурення?
    follow_ups:
      - Як змащування формує шматок?
      - Що б означало відсутність змащування?
      - Який зв'язок між рукою шефа і вашою?
  - id: sush_anago_soft
    name: М'який Анаго
    prompt: |
      Анаго — морський вугор — м'якший за унагі. Різні види, різне приготування. Зверніть увагу на текстуру. Що б зробила пружність унагі?
    follow_ups:
      - Як м'якість формує шматок?
      - Який зв'язок між анаго та унагі?
      - Чому обидва види вугра?
  - id: sush_saba_silver
    name: Срібляста Саба
    prompt: |
      Саба — скумбрія — часто маринується. Срібляста шкіра, жирна м'якоть. Вона сильна. Розгляньте консервацію. Що б означала сира скумбрія?
    follow_ups:
      - Як маринування формує рибу?
      - Який зв'язок між олією та маринуванням?
      - Навіщо маринувати сабу?
  - id: sush_ginger_between
    name: Імбир між
    prompt: |
      Гарі між шматками — перезавантаження. Але коли? Після кожного? Після кількох? Ритм ваш. Зверніть увагу на свій шаблон. Що б означало відсутність перезавантаження?
    follow_ups:
      - Як час визначає гарі?
      - Який зв'язок між шматком і шматком?
      - Коли вам потрібне перезавантаження?
  - id: sush_maki_cut
    name: Розріз Макі
    prompt: |
      Макі — роли — розрізаються на шматки. Шість або вісім. Розріз впливає на поперечний зріз. Розгляньте спіраль. Що б зробив інший розріз?
    follow_ups:
      - Як розріз формує укус?
      - Що б означало менше шматків?
      - Який зв'язок між скибочкою та цілим?
  - id: sush_tobiko_crunch
    name: Хрускіт Тобіко
    prompt: |
      Тобіко — ікра летючої риби — додає хрускоту та кольору. Це начинка, гарнір. Зверніть увагу, коли вона з'являється. Що б означав рол без неї?
    follow_ups:
      - Як тобіко формує укус?
      - Який зв'язок між хрускотом і кольором?
      - Навіщо летюча риба?
  - id: sush_sashimi_contrast
    name: Контраст Сашимі
    prompt: |
      Сашимі — без рису — дозволяє рибі виступати самостійно. Чистота інша. Порівняйте сашимі з нігірі. Що додає рис? Що розкриває його відсутність?
    follow_ups:
      - Як рис формує нігірі?
      - Що б означало все сашимі?
      - Який зв'язок між рибою та рисом?
  - id: sush_tea_rinse
    name: Промивання чаєм
    prompt: |
      Зелений чай біля суші-бару — доливається, ділиться. Він очищає. Чай — частина ритму. Розгляньте його роль. Що б зробила вода? Що б означала відсутність напою?
    follow_ups:
      - Як чай формує трапезу?
      - Який зв'язок між чаєм і перезавантаженням?
      - Навіщо зелений чай?
  - id: sush_bengara_tuna
    name: Бенгара Тунець
    prompt: |
      Бенгара — пісний тунець, часто зі спини — темніший. Смак відрізняється від акамі. Розгляньте розріз. Яка частина риби? Що робить місце розташування?
    follow_ups:
      - Як розріз формує смак?
      - Який зв'язок між місцем розташування та смаком?
      - Навіщо цей розріз?
  - id: sush_kohada_cure
    name: Маринування Кохада
    prompt: |
      Кохада — лускар — маринується, іноді з оцтом. Це випробування для шефа. Срібляста шкіра, баланс. Розгляньте майстерність. Що б означало не мариноване?
    follow_ups:
      - Як маринування формує рибу?
      - Який зв'язок між оцтом і сріблястою шкірою?
      - Чому це випробування?
  - id: sush_engawa_fin
    name: Плавниковий м'яз Енгава
    prompt: |
      Енгава — плавникові м'язи палтуса — цінуються. Мають виразну текстуру. Розгляньте частину. Що б зробив звичайний хіраме? Як відрізняється плавник?
    follow_ups:
      - Як розріз формує шматок?
      - Який зв'язок між плавником і м'язом?
      - Чому він цінується?
  - id: sush_first_piece
    name: Перший шматок
    prompt: |
      Перший шматок задає тон. Часто щось нежирне — можливо, хіраме або тай. Шеф калібрує. Розгляньте початок. Що б означав оторо першим?
    follow_ups:
      - Як початок формує трапезу?
      - Який зв'язок між першим і прогресією?
      - Чому спочатку нежирне?
  - id: sush_kampachi_fat
    name: Жир Кампачі
    prompt: |
      Кампачі — молодий жовтохвіст — має тонкий жир. Він між пісним і насиченим. Зверніть увагу на середній рівень. Що б зробив бурі? Що б зробила пісніша риба?
    follow_ups:
      - Як жир формує шматок?
      - Який зв'язок між віком і жиром?
      - Чому кампачі?
  - id: sush_nodoguro_char
    name: Обвуглення Нодогуро
    prompt: |
      Нодогуро — окунь з чорним горлом — часто злегка обсмажується. Шкіра, жир. Обвуглення додає. Розгляньте застосування тепла. Що б зробила сира риба?
    follow_ups:
      - Як обсмажування формує рибу?
      - Який зв'язок між обвугленням і жиром?
      - Навіщо обсмажувати цю?
  - id: sush_choji_plate
    name: Тарілка Чодзі
    prompt: |
      Тарілка — або дерево, або камінь — тримає шматок. Презентація мінімальна. Розгляньте посуд. Що б зробила "зайнята" тарілка? Що дозволяє мінімалізм?
    follow_ups:
      - Як тарілка формує шматок?
      - Який зв'язок між посудом і фокусом?
      - Навіщо мінімалізм?
  - id: sush_tea_cup
    name: Чашка для чаю
    prompt: |
      Чашка для чаю біля стійки — без ручки, іноді шорстка. Ви тримаєте її обома руками. Розгляньте посуд. Що б зробила кружка? Що додає чашка?
    follow_ups:
      - Як чашка формує ковток?
      - Який зв'язок між посудом і ритуалом?
      - Навіщо без ручки?
  - id: sush_silver_slide
    name: Сріблястий ковзання
    prompt: |
      Шматок має легко зісковзнути з тарілки — або бути піднятим чисто. Рис тримає, але відпускає. Розгляньте конструкцію. Що б означав рис, що розвалюється?
    follow_ups:
      - Як структура формує їжу?
      - Що б зробив кашоподібний рис?
      - Який зв'язок між цілісністю та укусом?
  - id: sush_kinmedai_skin
    name: Шкіра Кінмедай
    prompt: |
      Кінмедай — золотоокий окунь — часто зі шкірою, злегка обпаленою. Шкіра додає текстури, жиру. Розгляньте обпалювання. Що б зробила сира шкіра?
    follow_ups:
      - Як шкіра формує шматок?
      - Який зв'язок між обпалюванням і жиром?
      - Навіщо обпалювати?
  - id: sush_botan_ebi
    name: Ботан Ебі
    prompt: |
      Ботан ебі — креветка тигрова — солодка, часто сира. Хвіст іноді подається смаженим. Розгляньте ціле. Що б зробила варена креветка?
    follow_ups:
      - Як приготування формує шматок?
      - Який зв'язок між сирим і солодким?
      - Навіщо тигрова креветка?
  - id: sush_namida_heat
    name: Наміда — гострота
    prompt: |
      Справжній васабі викликає сльозу — наміда. Гострота піднімається, проходить. Це відрізняється від чилі. Розгляньте відчуття. Що б зробив хрін інакше?
    follow_ups:
      - Як гострота формує укус?
      - Який зв'язок між васабі та сльозою?
      - Чому він змушує плакати?
  - id: sush_omakase_end
    name: Кінець Омакасе
    prompt: |
      Страва закінчується — тамаго, можливо, місо, можливо, фрукти. Дуга завершена. Розгляньте завершення. Що б зробив ще один шматок? Коли ви знаєте, що закінчили?
    follow_ups:
      - Як закінчення формує спогади?
      - Який зв'язок між завершенням і задоволенням?
      - Чому закінчувати яйцем або супом?
  - id: sush_counter_wait
    name: Очікування біля стійки
    prompt: |
      Між шматками ви чекаєте. Шеф готує. Пауза — частина ритму. Зверніть увагу на очікування. Що б втратила миттєва подача?
    follow_ups:
      - Як очікування формує шматок?
      - Який зв'язок між паузою та увагою?
      - Чому не попередньо на столі?
  - id: sush_tsukiji_legacy
    name: Спадщина Цукідзі
    prompt: |
      Цукідзі зник; Тойосу зайняв його місце. Але риба все ще пливе через Токіо. Розгляньте ринок. Що б було суші без аукціону? Без дистрибуції?
    follow_ups:
      - Як ринок формує рибу?
      - Який зв'язок між аукціоном і якістю?
      - Що означало Цукідзі?
  - id: sush_edomae_spirit
    name: Дух Едомае
    prompt: |
      Едомае — стиль Едо — суші з традиції Токіо. Консервовані, мариновані, витримані, щоб працювати без холодильника. Розгляньте історію. Що б означало "завжди свіже"?
    follow_ups:
      - Як історія формує техніку?
      - Який зв'язок між консервацією та смаком?
      - Навіщо Едомае?
  - id: sush_gari_reset
    name: Гарі — перезавантаження
    prompt: |
      Гарі — маринований імбир — очищає між шматками. Блідо-рожеві скибочки перезавантажують смакові рецептори. Зверніть увагу, коли ви тягнетеся до нього. Що б означала трапеза без перезавантаження? Як імбир формує прогресію?
    follow_ups:
      - Що б означало відсутність гарі?
      - Як перезавантаження формує наступний шматок?
      - Який зв'язок між паузою та безперервністю?
  - id: sush_otoro_melt
    name: Танення Оторо
    prompt: |
      Оторо — найжирніший тунець — майже розчиняється на язиці. Жир — це головне. Розгляньте текстуру. Що б зробив пісний тунець? Як танення позначає пік трапези?
    follow_ups:
      - Що б зробив акамі інакше?
      - Як жир формує досвід?
      - Який зв'язок між таненням і розкішшю?
