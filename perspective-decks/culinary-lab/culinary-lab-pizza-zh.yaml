# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 意式披萨实验室 — 披萨 (Mandarin Chinese)

id: culinary_lab_pizza
name: 意式披萨实验室 — 披萨
description: 50 张卡片，从面团和火焰的化学反应，到披萨切片和配料考古学的戏剧性，来改变你体验披萨的方式。
domain: culinary_lab
cards:
  - id: piz_dough_stretch
    name: 拉伸面团
    prompt: |
      观看面团被拉伸——手工抛掷或按压。面筋网络被拉伸，包裹住空气。形状被确定。一块方形披萨与一块三角形披萨在意义上会有何不同？
    follow_ups:
      - 拉伸如何定义体验？
      - 没有拉伸，披萨会是什么样？
      - 手与形状之间是什么关系？
  - id: piz_oven_breath
    name: 烤炉之息
    prompt: |
      披萨烤炉会“呼吸”——木火、燃气或电力。炉顶储存热量。炉底传递热量。靠近一个烤炉站着。烤炉对厨师有什么要求？对面团呢？
    follow_ups:
      - 没有烤炉，披萨会是什么样？
      - 热量是如何塑造饼底的？
      - 呼吸与气泡之间是什么关系？
  - id: piz_sauce_spiral
    name: 酱汁螺旋
    prompt: |
      酱汁通常以螺旋形涂抹——而不是从边缘到边缘地铺开。研究一下这个图案。哪些区域被覆盖了？哪些区域暴露了？螺旋是构图。
    follow_ups:
      - 完全涂满酱汁的披萨会是什么样子？
      - 螺旋如何影响每一口的味道？
      - 图案与味道之间是什么关系？
  - id: piz_cheese_melt
    name: 奶酪融化
    prompt: |
      奶酪以不同的速度融化。马苏里拉奶酪会拉丝；陈年奶酪会出油。观察融化过程。脂肪与蛋白质、热量与时间的化学反应。什么时候算完成？
    follow_ups:
      - 没有融化，披萨会是什么样？
      - 融化如何塑造口感？
      - 融化与记忆之间是什么关系？
  - id: piz_crust_char
    name: 饼底焦痕
    prompt: |
      豹纹斑——饼底上的焦痕，是木烤披萨的标志。每个斑点都是与极高热量接触的瞬间。考虑那些斑点增添的风味。一块苍白的饼底意味着什么？
    follow_ups:
      - 焦痕如何改变体验？
      - 没有焦痕，披萨会是什么样？
      - 焦痕与工艺之间是什么关系？
  - id: piz_slice_fold
    name: 切片折叠
    prompt: |
      纽约风格：折叠披萨片。折叠具有结构性——它能固定住配料，引导油脂。折叠是编舞。它带来了什么？
    follow_ups:
      - 没有折叠，吃披萨会是什么样？
      - 折叠如何塑造口感？
      - 折叠与地点之间是什么关系？
  - id: piz_pepperoni_cup
    name: 意式辣香肠杯
    prompt: |
      优质的意式辣香肠会形成“杯状”——边缘酥脆，中心积油。这是形状和质地的转变。注意它何时发生。是什么形成了这个“杯状”？
    follow_ups:
      - 没有“杯状”，意式辣香肠会是什么样？
      - “杯状”如何承载风味？
      - 脂肪与形状之间是什么关系？
  - id: piz_basil_finish
    name: 罗勒收尾
    prompt: |
      披萨上的罗勒通常是在烘烤后添加——新鲜、鲜亮。这是收尾，而不是基础。注意这种对比。新鲜的食材为烹饪的食材增添了什么？
    follow_ups:
      - 没有罗勒，披萨会是什么样？
      - 时间如何塑造香草？
      - 生食与熟食之间是什么关系？
  - id: piz_margherita_minimal
    name: 玛格丽特极简
    prompt: |
      玛格丽特披萨只有三样东西：面团、番茄、奶酪。每一样都必须出彩。没有地方可以隐藏。考虑这种严谨。极简主义需要什么？
    follow_ups:
      - 一个错误的音符会带来什么？
      - 简约如何聚焦味蕾？
      - 少与多之间是什么关系？
  - id: piz_pool_table
    name: 公共餐桌
    prompt: |
      有些披萨店设有长形的公共餐桌——陌生人共享空间。披萨送来了。餐桌是一个舞台。谁坐在你旁边用餐？你们之间有什么不成文的契约？
    follow_ups:
      - 在卡座里用餐会是什么样？
      - 餐桌如何塑造邂逅？
      - 共享与私密之间是什么关系？
  - id: piz_box_flip
    name: 盒子翻转
    prompt: |
      披萨盒——纸板，有时中间还有一个塑料三脚架。它被设计成可以通风、堆叠。盒子是基础设施。没有它，外卖会怎样？
    follow_ups:
      - 盒子如何塑造回家的旅程？
      - 打开盒子时会发生什么？
      - 盒子与仪式之间是什么关系？
  - id: piz_dough_ferment
    name: 面团发酵
    prompt: |
      披萨面团会发酵——数小时或数天。酵母产生气泡、风味。陈年的面团带有微酸。考虑每一口中蕴含的时间。快速发酵的面团会牺牲什么？
    follow_ups:
      - 发酵如何塑造饼底？
      - 时间与味道之间是什么关系？
      - 当天发酵的面团意味着什么？
  - id: piz_cornicione
    name: 饼边
    prompt: |
      Cornicione——饼边，饼皮——通常是最好的部分。蓬松、起泡，可能有点嚼劲。有些人会留下它；有些人会先吃它。你与饼边的关系如何？
    follow_ups:
      - 没有饼边，披萨会是什么样？
      - 饼边如何框定中心？
      - 饼皮与中心之间是什么关系？
  - id: piz_olive_oil_drizzle
    name: 橄榄油淋面
    prompt: |
      烘烤后淋上橄榄油——淋在饼边，或整个披萨上。它闪闪发光。橄榄油承载风味，增添丰富感。注意它何时被添加。淋面增添了什么？
    follow_ups:
      - 没有橄榄油淋面，披萨会是什么样？
      - 橄榄油如何改变口感？
      - 脂肪与收尾之间是什么关系？
  - id: piz_anchovy_salt
    name: 凤尾鱼的咸鲜
    prompt: |
      披萨上的凤尾鱼——咸鲜，鲜味，有争议。它们会溶解在酱汁中，或放在上面。凤尾鱼是考古学：地中海的、腌制的、古老的。它经历了怎样的旅程？
    follow_ups:
      - 没有凤尾鱼，披萨会是什么样？
      - 咸味如何塑造其他风味？
      - 腌制与新鲜之间是什么关系？
  - id: piz_sound_crunch
    name: 咬合声
    prompt: |
      咬第一口完美制作的饼底——清脆，有嚼劲。闭上眼睛。声音是体验的一部分。如果披萨是沉默的，会是什么样？
    follow_ups:
      - 声音如何塑造满足感？
      - 湿软的饼底听起来像什么？
      - 酥脆与品质之间是什么关系？
  - id: piz_second_slice
    name: 第二片披萨
    prompt: |
      第二片披萨与第一片不同——你现在已经了解了披萨。味蕾已经调整。注意这种转变。第二片披萨的味道一样吗？更好？不同？
    follow_ups:
      - 重复如何改变感知？
      - 一片披萨的餐食会缺少什么？
      - 第一与第二之间是什么关系？
  - id: piz_neapolitan_rules
    name: 那不勒斯规则
    prompt: |
      真正的玛格丽特披萨有规则——大小、配料、制作方法。VPN 认证标志。规则造就身份。规则保护什么？它们排除了什么？
    follow_ups:
      - 没有规则，披萨会是什么样？
      - 认证如何塑造期望？
      - 规则与工艺之间是什么关系？
  - id: piz_detroit_edges
    name: 底特律边缘
    prompt: |
      底特律风格——方形，奶酪铺到边缘，边缘处饼底被煎炸至酥脆。这些边缘是刻意为之。考虑它的结构。它的形状说明了什么？
    follow_ups:
      - 没有边缘，披萨会是什么样？
      - 形状如何创造身份？
      - 烤盘与饼底之间是什么关系？
  - id: piz_garlic_knot
    name: 蒜香结
    prompt: |
      蒜香结——面团扭成结，涂抹黄油和蒜蓉。它们通常最先上来。它们不是披萨，但属于同一个世界。蒜香结与披萨之间是什么关系？
    follow_ups:
      - 没有蒜香结，这餐饭会是什么样？
      - 蒜香结如何定下基调？
      - 配菜与主菜之间是什么关系？
  - id: piz_red_pepper_flake
    name: 红辣椒碎
    prompt: |
      桌上的红辣椒碎瓶——你选择辣度。辣椒碎是民主。每个人都可以为自己调味。这种选择意味着什么？
    follow_ups:
      - 没有辣椒碎瓶，桌子会是什么样？
      - 自助调味如何塑造餐食？
      - 选择与味道之间是什么关系？
  - id: piz_sicilian_slab
    name: 西西里厚饼
    prompt: |
      西西里风格——厚实，方形，有时是倒置的（酱汁在上面）。厚饼很有分量。它的结构不同。厚度增添了什么？它牺牲了什么？
    follow_ups:
      - 薄饼会做些什么不同的事情？
      - 厚度如何塑造口感？
      - 厚饼与切片之间是什么关系？
  - id: piz_wood_stack
    name: 木柴堆
    prompt: |
      木烤披萨店堆放着木柴。橡木，有时。木材是燃料和风味。木柴堆是准备工作。考虑燃烧的物质。木材能带来燃气无法提供的什么？
    follow_ups:
      - 没有木材，披萨会是什么样？
      - 燃料如何塑造饼底？
      - 火与烟之间是什么关系？
  - id: piz_topping_balance
    name: 配料平衡
    prompt: |
      配料可能会压倒一切——太多了，披萨就变成了砂锅菜。平衡很微妙。研究一个堆满配料的披萨。它在哪里越过了界限？你会移除什么？
    follow_ups:
      - 克制如何塑造披萨？
      - 多与少之间是什么关系？
      - 何时选择变成混乱？
  - id: piz_cold_leftover
    name: 隔夜冷披萨
    prompt: |
      早餐吃冷披萨——有些人对此深信不疑。风味已经沉淀。质地已经改变。考虑第二天的披萨。时间增添了什么？它又带走了什么？
    follow_ups:
      - 冰冷如何改变体验？
      - 加热会带来什么？
      - 新鲜与剩菜之间是什么关系？
  - id: piz_sauce_sweet
    name: 酱汁的甜味
    prompt: |
      番茄酱可以甜或酸，取决于番茄和厨师。如果可以，单独尝尝酱汁。甜味来自哪里？酸味会带来什么？
    follow_ups:
      - 酱汁如何定下基调？
      - 甜味与酸味之间是什么关系？
      - 生番茄意味着什么？
  - id: piz_roman_taglio
    name: 罗马切片披萨
    prompt: |
      Pizza al taglio——按切片、按重量出售。你指着，他们切。长方形，每公斤的价格。交易方式不同。按重量购买意味着什么？
    follow_ups:
      - Taglio 如何塑造体验？
      - 在这里，整块披萨意味着什么？
      - 切片与选择之间是什么关系？
  - id: piz_hot_honey
    name: 辣蜂蜜
    prompt: |
      披萨上的辣蜂蜜——新的传统，如今随处可见。甜、辣、粘稠。这是收尾。注意它何时添加。蜂蜜对奶酪有什么作用？
    follow_ups:
      - 没有辣蜂蜜，披萨会是什么样？
      - 甜辣如何塑造口感？
      - 潮流与传统之间是什么关系？
  - id: piz_pecorino_grate
    name: 佩克里诺奶酪擦丝
    prompt: |
      在披萨上擦上佩克里诺奶酪——咸、辛辣。这是一种层次。顶部的奶酪与融化的奶酪不同。考虑这种等级。擦丝增添了什么？
    follow_ups:
      - 没有佩克里诺奶酪，披萨会是什么样？
      - 第二种奶酪如何塑造菜肴？
      - 融化与擦丝之间是什么关系？
  - id: piz_paddle_slide
    name: 披萨铲滑动
    prompt: |
      披萨铲，木质或金属。面团被滑到铲上，然后送入烤炉。这个动作是熟练的。观察它。没有技巧会出错什么？
    follow_ups:
      - 披萨铲如何实现烘烤？
      - 工具与结果之间是什么关系？
      - 掉落的披萨意味着什么？
  - id: piz_sourdough_crust
    name: 酸面包饼底
    prompt: |
      酸面包披萨饼底——长时间发酵，微酸。饼底有性格。它不是中性的。考虑酸面包增添了什么。商业酵母会带来什么不同？
    follow_ups:
      - 酸面包如何塑造口感？
      - 发酵与风味之间是什么关系？
      - 味道平淡的饼底意味着什么？
  - id: piz_white_pie
    name: 白披萨
    prompt: |
      白披萨——没有番茄。橄榄油、奶酪，可能还有大蒜。缺少红色改变了一切。味蕾期望番茄。白披萨提供了什么替代？
    follow_ups:
      - 如果有番茄，披萨会是什么样？
      - 缺失如何塑造期望？
      - 红色与白色之间是什么关系？
  - id: piz_bar_setting
    name: 酒吧用餐环境
    prompt: |
      在酒吧吃披萨——你在哪里点餐就在哪里吃。酒吧是一个舞台。你看着烤炉，看着切片。这里的氛围很随意，很直接。在酒吧用餐增添了什么？
    follow_ups:
      - 在桌子用餐会改变什么？
      - 距离如何塑造体验？
      - 酒吧与厨房之间是什么关系？
  - id: piz_truffle_trend
    name: 松露潮流
    prompt: |
      披萨上的松露——油或刨片——已成为奢华的代名词。香气占主导。考虑这个潮流。松露增添了什么？它掩盖了什么？
    follow_ups:
      - 没有松露，披萨会是什么样？
      - 奢华如何塑造口感？
      - 潮流与味道之间是什么关系？
  - id: piz_ricotta_dollop
    name: 意大利乳清酪点缀
    prompt: |
      在披萨上点缀意大利乳清酪——冰凉、奶油状、形成对比。它不像马苏里拉奶酪那样融化。它就那样放在那里。注意温度差异。点缀增添了什么？
    follow_ups:
      - 没有意大利乳清酪，披萨会是什么样？
      - 冰凉如何塑造滚烫？
      - 点缀与融化之间是什么关系？
  - id: piz_slice_count
    name: 切片数量
    prompt: |
      多少片？通常是八片——小披萨是六片。数量决定了份量、分享。考虑这个数学。四片意味着什么？十二片呢？
    follow_ups:
      - 切片数量如何塑造餐食？
      - 切片与分享之间是什么关系？
      - 何时切片数量很重要？
  - id: piz_oven_window
    name: 烤炉窗口
    prompt: |
      烤炉有窗户——或没有。看着披萨烘烤是一种戏剧。奶酪冒泡。饼底膨胀。没有视野，体验会是怎样？
    follow_ups:
      - 观看如何塑造期待？
      - 可见与隐藏之间是什么关系？
      - 你从烤炉窗口学到了什么？
  - id: piz_ranch_dip
    name: 牧场酱蘸料
    prompt: |
      披萨配牧场酱——美国传统，通常配饼边。蘸料是可选的，有争议。考虑这种添加。牧场酱增添了什么？它覆盖了什么？
    follow_ups:
      - 没有牧场酱，饼边会是什么样？
      - 蘸料如何塑造口感？
      - 纯粹主义者与实用主义者之间是什么关系？
  - id: piz_capers_brine
    name: 续随子盐水
    prompt: |
      披萨上的续随子——咸、辛辣。它们能切断油腻。续随子是旅行过来的——地中海的，腌制的。注意它们何时出现。盐水增添了什么？
    follow_ups:
      - 没有续随子，披萨会是什么样？
      - 盐水如何塑造味蕾？
      - 腌制与新鲜之间是什么关系？
  - id: piz_calzone_seam
    name: 馅饼褶边
    prompt: |
      Calzone——折叠、密封的披萨。褶边包裹着馅料。它的形式不同。你将它切开。蒸汽冒出。折叠增添了什么？它隐藏了什么？
    follow_ups:
      - 不折叠的 Calzone 会是什么样？
      - 褶边如何创造惊喜？
      - 开放与封闭之间是什么关系？
  - id: piz_mushroom_water
    name: 蘑菇水
    prompt: |
      披萨上的蘑菇在烹饪时会释放水分。一个好的厨师知道要预先烹饪或使用干燥品种。湿润的蘑菇会让披萨变得湿 soggy。考虑其中的化学反应。水分会带来什么？
    follow_ups:
      - 蘑菇的准备方式如何塑造披萨？
      - 湿润与酥脆之间是什么关系？
      - 生蘑菇会怎样？
  - id: piz_grease_absorb
    name: 吸收油脂
    prompt: |
      用纸巾吸去披萨片上的油脂——有些人会这样做。油脂来自奶酪、意式辣香肠。吸还是不吸？考虑这个选择。油脂贡献了什么？吸油移除了什么？
    follow_ups:
      - 油脂如何塑造体验？
      - 干燥的披萨意味着什么？
      - 脂肪与风味之间是什么关系？
  - id: piz_oven_spring
    name: 烤箱弹力
    prompt: |
      Oven spring——面团在高温下膨胀。酵母快速作用。结构得以定型。考虑这一刻。如果没有足够的热量会怎样？没有合适的面粉呢？
    follow_ups:
      - 弹力如何创造出蜂窝状的内部？
      - 热量与膨胀之间是什么关系？
      - 扁平的饼底意味着什么？
  - id: piz_roma_tomato
    name: 罗马番茄
    prompt: |
      圣马扎诺番茄，或罗马番茄——番茄很重要。它们来自一个地方。坎帕尼亚。DOP 认证，风土。追溯番茄的来源。它为了来到你的披萨上，经历了怎样的旅程？
    follow_ups:
      - 用别的番茄会怎样？
      - 产地如何塑造酱汁？
      - 地点与味道之间是什么关系？
  - id: piz_pizza_napoli
    name: 那不勒斯披萨
    prompt: |
      那不勒斯发明了它。这座城市和食物紧密相连。在拿坡里吃披萨，就是去源头品尝。考虑它的历史。同样的披萨在别的地方意味着什么？
    follow_ups:
      - 地点如何塑造体验？
      - 翻译会失去什么？
      - 起源与真实性之间是什么关系？
  - id: piz_wine_pair
    name: 葡萄酒搭配
    prompt: |
      披萨与葡萄酒——啤酒很常见，但葡萄酒也很搭配。通常是红葡萄酒。酒中的酸与番茄中的酸相遇。考虑搭配。葡萄酒为披萨增添了什么？
    follow_ups:
      - 啤酒会有什么不同？
      - 饮品如何塑造餐食？
      - 酒杯与盘子之间是什么关系？
  - id: piz_pizza_party
    name: 披萨派对
    prompt: |
      为多人准备的披萨——生日、游戏之夜、办公室午餐。披萨是社交性的。披萨盒堆叠起来。每个人都拿一块。考虑它的编排。人群如何改变餐食？
    follow_ups:
      - 单独吃披萨意味着什么？
      - 分享如何塑造体验？
      - 披萨与聚会之间是什么关系？
