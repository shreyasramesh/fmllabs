# पाकशाला - चीनी (Hindi)

id: culinary_lab_chinese
name: पाकशाला - चीनी
description: 50 कार्ड जो चीनी भोजन के आपके अनुभव को बदल देंगे—वोक की केमिस्ट्री और सोया के पुरातत्व से लेकर गोल मेज की कोरियोग्राफी और दावत के आख्यान तक।
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: वोक की साँस
    prompt: |
      वोक की साँस (Wok hei)—वोक की हवा—अत्यधिक गर्मी और गति से आने वाला वह मायावी धुआँ है। यह पूरी तरह से धुएँ जैसा नहीं है; यह परिवर्तन है।
      क्या आप इसे पकड़ सकते हैं? इसके बिना स्टिर-फ्राई कैसा होगा?
    follow_ups:
      - साँस व्यंजन को कैसे आकार देती है?
      - यह क्या बनाता है? क्या इसे नष्ट करता है?
      - गर्मी और जल्दबाजी के बीच क्या संबंध है?
  - id: chn_round_table
    name: गोल मेज
    prompt: |
      चीनी दावत की मेज गोल है—बीच में लेज़ी सुसान। भोजन घूमता है। हर कोई पहुँचता है। मेज एक कोरियोग्राफी है। कौन घुमाता है? कौन इंतज़ार करता है?
      क्या अनकहे नियम हैं?
    follow_ups:
      - एक आयताकार मेज का क्या मतलब होगा?
      - गोल आकार भोजन को कैसे आकार देता है?
      - केंद्र और किनारे के बीच क्या संबंध है?
  - id: chn_soy_archeology
    name: सोया का पुरातत्व
    prompt: |
      सोया सॉस—किण्वित, पुराना, क्षेत्रीय। हल्का, गहरा, मशरूम, डबल-ब्लैक।
      यह कहीं से आया था। इसमें समय लगा। बोतल का पता लगाएँ। इसने क्या यात्रा की? औद्योगिक सोया क्या बलिदान करेगा?
    follow_ups:
      - उत्पत्ति डालने को कैसे आकार देती है?
      - सोया के बिना व्यंजन क्या होगा?
      - किण्वन और उमामी के बीच क्या संबंध है?
  - id: chn_chopstick_grip
    name: चॉपस्टिक की पकड़
    prompt: |
      चॉपस्टिक हाथ का विस्तार करती हैं। चावल, चिकने नूडल्स, पकौड़ी—प्रत्येक के लिए अलग तकनीक की आवश्यकता होती है। अपनी पकड़ पर ध्यान दें। बर्तन क्या माँगता है? यह क्या करने देता है?
    follow_ups:
      - कांटा क्या बदलेगा?
      - छड़ी खाने को कैसे आकार देती है?
      - उपकरण और गति के बीच क्या संबंध है?
  - id: chn_dumpling_seam
    name: पकौड़ी का जोड़
    prompt: |
      पकौड़ी की सिलवटें—मोड़, सील। जिआओज़ी, शुमाई, जियाओलोंगबाओ—हर किसी का अपना आकार होता है। जोड़ पकड़ता है या छोड़ देता है। एक का अध्ययन करें। फटने का क्या मतलब होगा? सिलवटें क्या बचाती हैं?
    follow_ups:
      - मोड़ भराई को कैसे आकार देता है?
      - एक खुली पकौड़ी क्या खो देगी?
      - सील और सूप के बीच क्या संबंध है?
  - id: chn_tea_pour
    name: चाय डालना
    prompt: |
      चीनी चाय—डाली जाती है, फिर से भरी जाती है, साझा की जाती है। बर्तन घूमता है। खाली कप माँगने से पहले भर दिए जाते हैं। डालना सेवा और देखभाल है। लय पर ध्यान दें।
      चाय के बिना भोजन क्या होगा?
    follow_ups:
      - चाय गति को कैसे आकार देती है?
      - डालना क्या संवाद करता है?
      - कप और मेज के बीच क्या संबंध है?
  - id: chn_bone_plate
    name: हड्डी की प्लेट
    prompt: |
      हड्डियों के लिए एक छोटी प्लेट—discarded शैल, चिकन की हड्डियाँ, झींगे का छिलका।
      प्लेट जो खाने योग्य नहीं है उसे इकट्ठा करती है। यह सेटिंग का हिस्सा है। हड्डी की प्लेट क्या करने देती है? इसके बिना क्या होगा?
    follow_ups:
      - प्लेट भोजन को कैसे आकार देती है?
      - इसके बिना मेज कैसी दिखेगी?
      - त्याग और गरिमा के बीच क्या संबंध है?
  - id: chn_soup_spoon
    name: सूप का चम्मच
    prompt: |
      चीनी सूप का चम्मच—चौड़ा, उथला, सिरेमिक। यह शोरबा और ठोस दोनों को रखता है। चम्मच मुँह में अलग तरह से फिट बैठता है। घूंट पर ध्यान दें। आकार क्या सक्षम बनाता है?
    follow_ups:
      - गोल चम्मच क्या बदलेगा?
      - चम्मच घूंट को कैसे आकार देता है?
      - रूप और कार्य के बीच क्या संबंध है?
  - id: chn_steam_basket
    name: स्टीम बास्केट
    prompt: |
      डििम सम बांस की टोकरियों में आता है—stacked, layered। भाप उठती है।
      टोकरी आकार बनाए रखती है। बांस पर विचार करें। धातु क्या अलग करेगी? बांस क्या जोड़ता है?
    follow_ups:
      - टोकरी पकौड़ी को कैसे आकार देती है?
      - एक प्लेट क्या खो देगी?
      - बांस और भाप के बीच क्या संबंध है?
  - id: chn_maillard_wok
    name: मैलार्ड वोक
    prompt: |
      वोक ऐसे तापमान तक पहुँचता है जो घरेलू स्टोव नहीं पहुँच सकते। सियर (sear) तुरंत होता है।
      प्रोटीन सेकंडों में भूरा हो जाता है। रसायन शास्त्र पर विचार करें। कम गर्मी क्या बलिदान करेगी? वोक क्या माँगता है?
    follow_ups:
      - गर्मी स्वाद को कैसे आकार देती है?
      - बिजली क्या अलग करेगी?
      - ज्वाला और परत के बीच क्या संबंध है?
  - id: chn_glutinous_texture
    name: चिपचिपा बनावट
    prompt: |
      चिपचिपा चावल—चिपचिपा, चबाने योग्य—एक अलग रसायन शास्त्र है। इसका उपयोग जोंगज़ी, लो माई गेई, मिठाइयों के लिए किया जाता है। बनावट पर ध्यान दें। यह लंबे दाने वाले चावल से कैसे भिन्न है? चिपचिपापन क्या सक्षम बनाता है?
    follow_ups:
      - सामान्य चावल क्या करेगा?
      - बनावट व्यंजन को कैसे आकार देती है?
      - चिपचिपा और लपेटने के बीच क्या संबंध है?
  - id: chn_century_egg
    name: सेंचुरी एग (सौ साल का अंडा)
    prompt: |
      सेंचुरी एग—संरक्षित, रूपांतरित। जर्दी गहरे रंग की होती है, सफेदी पारदर्शी।
      रसायन शास्त्र प्राचीन है। संरक्षण पर विचार करें। समय क्या करता है?
      ताजगी का क्या मतलब होगा?
    follow_ups:
      - संरक्षण स्वाद को कैसे आकार देता है?
      - अंडा ताज़ा क्या होगा?
      - समय और परिवर्तन के बीच क्या संबंध है?
  - id: chn_oyster_sauce
    name: सीप सॉस
    prompt: |
      सीप सॉस—उमामी, गाढ़ा, कैंटोनीज़। यह कमी और निष्कर्षण है।
      सीप अपना सार देती है। स्वाद का पता लगाएँ। इसके बिना स्टिर-फ्राई क्या होगा?
    follow_ups:
      - सॉस व्यंजन को कैसे आकार देता है?
      - सीप और सब्जी के बीच क्या संबंध है?
      - सोया इसके बजाय क्या करेगा?
  - id: chn_ordering_ritual
    name: ऑर्डर करने का अनुष्ठान
    prompt: |
      चीनी रेस्तरां में ऑर्डर करना—मेजबान चुनता है, या मेज बातचीत करती है।
      संतुलन: मांस, सब्जी, सूप, चावल। ऑर्डर एक रचना है। ध्यान दें कि कौन तय करता है। क्या नियम हैं?
    follow_ups:
      - ऑर्डरिंग भोजन को कैसे आकार देती है?
      - हर कोई अपने लिए क्या ऑर्डर करेगा?
      - चुनाव और सामूहिक के बीच क्या संबंध है?
  - id: chn_crispy_skin
    name: कुरकुरी त्वचा
    prompt: |
      पेकिंग बत्तख की त्वचा—कुरकुरी, ग्लेज्ड। या कैंटोनीज़ रोस्ट पोर्क क्रैक्लिंग।
      त्वचा जानबूझकर बनाई जाती है। गर्मी, हवा, चीनी। वास्तुकला पर विचार करें।
      नरम त्वचा का क्या मतलब होगा?
    follow_ups:
      - कुरकुरापन काटने को कैसे आकार देता है?
      - क्रैकल क्या बनाता है?
      - त्वचा और मांस के बीच क्या संबंध है?
  - id: chn_noodle_slip
    name: नूडल का फिसलन
    prompt: |
      चीनी नूडल्स—गेहूं, चावल, हाथ से खींचे गए—बनावट में भिन्न होते हैं। कुछ फिसलते हैं;
      कुछ चबाए जाते हैं। नूडल का चॉपस्टिक के खिलाफ घर्षण। प्रतिरोध पर ध्यान दें। फिसलन क्या जोड़ती है?
    follow_ups:
      - बनावट खाने को कैसे आकार देती है?
      - एक नरम नूडल क्या खो देगा?
      - फिसलन और संतुष्टि के बीच क्या संबंध है?
  - id: chn_bok_choy_wilt
    name: बोक चॉय का मुरझाना
    prompt: |
      वोक में बोक चॉय—सेकंड। यह मुरझा जाता है लेकिन संरचना बनाए रखता है। हरापन नरम हो जाता है।
      परिवर्तन पर विचार करें। कच्चा होने का क्या मतलब होगा? ज़्यादा पके होने पर क्या खो जाएगा?
    follow_ups:
      - मुरझाना सब्जी को कैसे आकार देता है?
      - गर्मी और हरेपन के बीच क्या संबंध है?
      - यह कब हो जाता है?
  - id: chn_five_spice
    name: पंच फोरन (Five Spice)
    prompt: |
      पंच फोरन पाउडर—स्टार सौंफ, लौंग, दालचीनी, सिचुआन काली मिर्च, सौंफ।
      यह इतिहास के साथ एक मिश्रण है। प्रत्येक मसाले का एक मार्ग होता है। एक का पता लगाएँ।
      इसने क्या यात्रा की?
    follow_ups:
      - इसके बिना व्यंजन क्या होगा?
      - मिश्रण पहचान कैसे बनाता है?
      - मसाला और संरक्षण के बीच क्या संबंध है?
  - id: chn_banquet_progression
    name: दावत का क्रम
    prompt: |
      चीनी दावत में एक चाप (arc) होता है—पहले ठंडे व्यंजन, फिर गर्म, सूप, चावल, मिठाई।
      यह प्रगति एक आख्यान है। लय पर ध्यान दें। एक अलग क्रम क्या करेगा?
    follow_ups:
      - क्रम भोजन को कैसे आकार देता है?
      - पहले और आखिरी के बीच क्या संबंध है?
      - कहानी कब चरम पर पहुँचती है?
  - id: chn_white_rice_center
    name: सफेद चावल का केंद्र
    prompt: |
      सफेद चावल—सादा, भाप में पका हुआ—भोजन का आधार बनता है। यह कैनवास है।
      समृद्ध व्यंजनों को संतुलित करने के लिए चावल की आवश्यकता होती है। ध्यान दें कि आप कब इसकी ओर पहुँचते हैं। सादे के बिना भोजन क्या होगा?
    follow_ups:
      - चावल तालू को कैसे आकार देता है?
      - फ्राइड राइस क्या करेगा?
      - तटस्थ और स्वाद के बीच क्या संबंध है?
  - id: chn_szechuan_numb
    name: सिचुआन सुन्नपन
    prompt: |
      सिचुआन काली मिर्च—मा ला—सुन्न करने वाली, झुनझुनी। यह गर्मी नहीं है; यह सनसनी है।
      मुँह buzzes। सनसनी पर विचार करें। सुन्नपन के बिना व्यंजन क्या होगा?
    follow_ups:
      - मा ला अनुभव को कैसे आकार देता है?
      - सुन्नपन और गर्मी के बीच क्या संबंध है?
      - उन्हें क्यों जोड़ा जाता है?
  - id: chn_dark_soy
    name: गहरा सोया
    prompt: |
      गहरा सोया—गाढ़ा, मीठा, रंग के लिए। यह चावल को दागता है, मांस को ग्लेज करता है।
      यह नमक के लिए नहीं है; यह रंग के लिए है। दृश्य पर विचार करें। गहरा क्या जोड़ता है?
    follow_ups:
      - हल्का सोया क्या करेगा?
      - रंग अपेक्षा को कैसे आकार देता है?
      - गहरे और कैरामेल के बीच क्या संबंध है?
  - id: chn_hot_plate
    name: गर्म तश्तरी
    prompt: |
      गरमागरम तश्तरियाँ—बीफ, स्क्विड—फिसफिसाहट के साथ आती हैं। लोहे की तश्तरी पकना जारी रखती है।
      आवाज़ रंगमंच है। सिज़ल (sizzle) के बिना व्यंजन क्या होगा? गर्म तश्तरी पकाने को कैसे बढ़ाती है?
    follow_ups:
      - सिज़ल अनुभव को कैसे आकार देता है?
      - एक ठंडी तश्तरी का क्या मतलब होगा?
      - ध्वनि और गर्मी के बीच क्या संबंध है?
  - id: chn_congee_soft
    name: खीर (Congee) नर्म
    prompt: |
      खीर (Congee)—चावल का दलिया—नरम, आरामदायक होता है। लंबे समय तक पकाया हुआ चावल टूट जाता है।
      बनावट समर्पण है। परिवर्तन पर विचार करें। यहाँ अल डेन्टे (al dente) का क्या मतलब होगा?
    follow_ups:
      - नरमी व्यंजन को कैसे आकार देती है?
      - गाढ़ी खीर क्या करेगी?
      - पानी और चावल के बीच क्या संबंध है?
  - id: chn_glass_noodle
    name: ग्लास नूडल
    prompt: |
