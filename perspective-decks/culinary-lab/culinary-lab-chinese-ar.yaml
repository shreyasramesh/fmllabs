# مختبر الطهي — صيني (Arabic)

id: culinary_lab_chinese
name: مختبر الطهي — صيني
description: 50 بطاقة لتغيير طريقة تجربتك للطعام الصيني — من كيمياء "ووك هي" (نفس القدر) وعلم الآثار الخاص بصلصة الصويا إلى الرقص المسرحي للطاولة المستديرة وسردية المأدبة.
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: وووك هي (نفس القدر)
    prompt: |
      وووك هي — نفس القدر — هو الدخان المراوغ الذي يأتي من الحرارة والسرعة القصوى. إنه ليس مجرد دخانية؛ إنه تحول.
      هل يمكنك التقاطه؟ ماذا سيكون طعم التحريك بدونها؟
    follow_ups:
      - كيف يشكل "هي" الطبق؟
      - ماذا يخلقها؟ وماذا يدمرها؟
      - ما العلاقة بين الحرارة والعجلة؟
  - id: chn_round_table
    name: الطاولة المستديرة
    prompt: |
      طاولة المأدبة الصينية مستديرة — مع قرص دوار في الوسط. الطعام يدور. الجميع يصل. الطاولة هي رقصة. من يدير؟ من ينتظر؟
      ما هي القواعد غير المعلنة؟
    follow_ups:
      - ماذا سيعني وجود طاولة مستطيلة؟
      - كيف يشكل الشكل المستدير الوجبة؟
      - ما العلاقة بين المركز والحافة؟
  - id: chn_soy_archeology
    name: علم الآثار الخاص بصلصة الصويا
    prompt: |
      صلصة الصويا — مخمرة، معتقة، إقليمية. فاتحة، داكنة، بالفطر، شديدة السواد.
      جاءت من مكان ما. استغرقت وقتًا. تتبع الزجاجة. ما الرحلة التي قامت بها؟ ماذا ستضحي صلصة الصويا الصناعية؟
    follow_ups:
      - كيف يشكل الأصل عملية الصب؟
      - ماذا سيكون الطبق بدون صلصة الصويا؟
      - ما العلاقة بين التخمير وأومامي (المذاق الخامس)؟
  - id: chn_chopstick_grip
    name: مسكة عيدان تناول الطعام
    prompt: |
      عيدان تناول الطعام تمد اليد. الأرز، والمعكرونة الزلقة، والفطائر — كل منها يتطلب تقنية مختلفة. لاحظ مسكتك. ماذا يتطلب الأداة؟ ماذا تسمح؟
    follow_ups:
      - ماذا سيغير الشوكة؟
      - كيف يشكل العود اللقمة؟
      - ما العلاقة بين الأداة والوتيرة؟
  - id: chn_dumpling_seam
    name: درزة الفطيرة
    prompt: |
      ثنيات الفطائر — الطية، الختم. جياوزي، شاوماي، شياولونغباو — كل منها له شكله. الدرزة تحتفظ أو تطلق. ادرس واحدة. ماذا ستعني الانفجار؟ ماذا تحمي الثنية؟
    follow_ups:
      - كيف يشكل الطي الحشوة؟
      - ماذا ستفقد فطيرة مفتوحة؟
      - ما العلاقة بين الختم والحساء؟
  - id: chn_tea_pour
    name: صب الشاي
    prompt: |
      الشاي الصيني — يُصب، يُعاد ملؤه، يُشارك. الإبريق يدور. تُملأ الأكواب الفارغة قبل الطلب. الصب هو خدمة وعناية. لاحظ الإيقاع. ماذا ستكون الوجبة بدون الشاي؟
    follow_ups:
      - كيف يشكل الشاي الوتيرة؟
      - ماذا يوصل الصب؟
      - ما العلاقة بين الكوب والطاولة؟
  - id: chn_bone_plate
    name: طبق العظام
    prompt: |
      طبق صغير للعظام — قشور مهملة، عظام دجاج، قشور جمبري. الطبق يجمع ما هو غير صالح للأكل. إنه جزء من التجهيز. ماذا يسمح طبق العظام؟ ماذا سيحدث بدونه؟
    follow_ups:
      - كيف يشكل الطبق الوجبة؟
      - كيف ستبدو الطاولة بدونه؟
      - ما العلاقة بين الإهمال والكرامة؟
  - id: chn_soup_spoon
    name: ملعقة الحساء
    prompt: |
      ملعقة الحساء الصينية — عريضة، ضحلة، خزفية. تحمل المرق والصلب. الملعقة تناسب الفم بشكل مختلف. لاحظ الرشفة. ماذا تمكّن الشكل؟
    follow_ups:
      - ماذا ستغير الملعقة المستديرة؟
      - كيف تشكل الملعقة الرشفة؟
      - ما العلاقة بين الشكل والوظيفة؟
  - id: chn_steam_basket
    name: سلة البخار
    prompt: |
      يصل ديم سام في سلال الخيزران — مكدسة، طبقات. البخار يتصاعد. السلة تحتفظ بالشكل. فكر في الخيزران. ماذا سيفعل المعدن بشكل مختلف؟ ماذا يضيف الخيزران؟
    follow_ups:
      - كيف تشكل السلة الفطيرة؟
      - ماذا ستفقد الصفيحة؟
      - ما العلاقة بين الخيزران والبخار؟
  - id: chn_maillard_wok
    name: قدر الووك (المشوي)
    prompt: |
      يصل قدر الووك إلى درجات حرارة لا تستطيع مواقد المنزل الوصول إليها. التحمير فوري. البروتينات تتحمر في ثوانٍ. فكر في الكيمياء. ماذا سيضحي الحرارة المنخفضة؟ ماذا يطلب قدر الووك؟
    follow_ups:
      - كيف تشكل الحرارة النكهة؟
      - ماذا سيفعل الكهرباء بشكل مختلف؟
      - ما العلاقة بين اللهب والقشرة؟
  - id: chn_glutinous_texture
    name: قوام الأرز اللزج
    prompt: |
      الأرز اللزج — دبق، مطاطي — له كيمياء مختلفة. يُستخدم في الزونغزي، ولو ماي غاي، والحلويات. لاحظ القوام. كيف يختلف عن الأرز طويل الحبة؟ ماذا تتيح اللزوجة؟
    follow_ups:
      - ماذا سيفعل الأرز العادي؟
      - كيف يشكل القوام الطبق؟
      - ما العلاقة بين الالتصاق واللف؟
  - id: chn_century_egg
    name: بيضة القرن
    prompt: |
      بيضة القرن — محفوظة، متحولة. الصفار داكن، والبياض شفاف. الكيمياء قديمة. فكر في الحفظ. ماذا يفعل الوقت؟ ماذا ستعني النضارة؟
    follow_ups:
      - كيف يشكل الحفظ النكهة؟
      - ماذا ستكون البيضة طازجة؟
      - ما العلاقة بين الوقت والتحول؟
  - id: chn_oyster_sauce
    name: صلصة المحار
    prompt: |
      صلصة المحار — أومامي، سميكة، كانتونية. إنها اختزال واستخلاص. المحار يعطي جوهره. تتبع النكهة. ماذا سيكون طعم التحريك بدونها؟
    follow_ups:
      - كيف تشكل الصلصة الطبق؟
      - ما العلاقة بين المحار والخضار؟
      - ماذا ستفعل صلصة الصويا بدلاً من ذلك؟
  - id: chn_ordering_ritual
    name: طقس الطلب
    prompt: |
      الطلب في مطعم صيني — يختار المضيف، أو تتفاوض الطاولة. التوازن: لحم، خضار، حساء، أرز. الطلب هو تكوين. لاحظ من يقرر. ما هي القواعد؟
    follow_ups:
      - كيف يشكل الطلب الوجبة؟
      - ماذا سيطلب الجميع لأنفسهم؟
      - ما العلاقة بين الاختيار والجماعة؟
  - id: chn_crispy_skin
    name: جلد مقرمش
    prompt: |
      جلد بط بكين — مقرمش، لامع. أو قشرة لحم خنزير مشوي كانتونية. الجلد متعمد. حرارة، هواء، سكر. فكر في البنية. ماذا سيعني الجلد الرطب؟
    follow_ups:
      - كيف يشكل القرمشة اللقمة؟
      - ما الذي يخلق الفرقعة؟
      - ما العلاقة بين الجلد واللحم؟
  - id: chn_noodle_slip
    name: انزلاق المعكرونة
    prompt: |
      المعكرونة الصينية — قمح، أرز، مسحوبة يدويًا — تختلف في قوامها. بعضها ينزلق؛ بعضها يمضغ. احتكاك المعكرونة بالعيدان. لاحظ المقاومة. ماذا يضيف الانزلاق؟
    follow_ups:
      - كيف يشكل القوام الأكل؟
      - ماذا ستفقد المعكرونة الطرية؟
      - ما العلاقة بين الانزلاق والرضا؟
  - id: chn_bok_choy_wilt
    name: ذبول البوك تشوي
    prompt: |
      بوك تشوي في قدر الووك — ثوانٍ. يذبل ولكنه يحتفظ بشكله. الخضرة تلين. فكر في التحول. ماذا سيعني نيئًا؟ ماذا سيفقد المطهو زيادة عن اللزوم؟
    follow_ups:
      - كيف يشكل الذبول الخضار؟
      - ما العلاقة بين الحرارة والخضرة؟
      - متى تكون جاهزة؟
  - id: chn_five_spice
    name: البهارات الخمسة
    prompt: |
      مسحوق البهارات الخمسة — نجم يانسون، قرنفل، قرفة، فلفل سيتشوان، شمر. إنها مزيج له تاريخ. كل بهار له مساره. تتبع واحدًا. ما الرحلة التي قام بها؟
    follow_ups:
      - ماذا سيكون الطبق بدونه؟
      - كيف يخلق المزيج الهوية؟
      - ما العلاقة بين البهار والحفظ؟
  - id: chn_banquet_progression
    name: تقدمية المأدبة
    prompt: |
      للمأدبة الصينية قوس — أطباق باردة أولاً، ثم ساخنة، حساء، أرز، حلوى. التقدمية هي سرد. لاحظ الإيقاع. ماذا سيعني ترتيب مختلف؟
    follow_ups:
      - كيف يشكل التسلسل الوجبة؟
      - ما العلاقة بين الأول والأخير؟
      - متى تصل القصة إلى ذروتها؟
  - id: chn_white_rice_center
    name: مركز الأرز الأبيض
    prompt: |
      الأرز الأبيض — عادي، مطهو بالبخار — يثبت الوجبة. إنه اللوحة القماشية. الأطباق الغنية تحتاج إلى الأرز لتحقيق التوازن. لاحظ متى تلجأ إليه. ماذا ستكون الوجبة بدون الشيء العادي؟
    follow_ups:
      - كيف يشكل الأرز اللسان؟
      - ماذا سيفعل الأرز المقلي؟
      - ما العلاقة بين الحياد والنكهة؟
  - id: chn_szechuan_numb
    name: خدر سيتشوان
    prompt: |
      فلفل سيتشوان — ما لا — مخدر، منعش. إنه ليس حرارة؛ إنه إحساس. الفم يدغدغ. فكر في الإحساس. ماذا سيكون الطبق بدون التخدير؟
    follow_ups:
      - كيف يشكل "ما لا" التجربة؟
      - ما العلاقة بين التخدير والحرارة؟
      - لماذا يتم جمعهما؟
  - id: chn_dark_soy
    name: صلصة الصويا الداكنة
    prompt: |
      صلصة الصويا الداكنة — أكثر سمكًا، وأحلى، ولون. إنها تصبغ الأرز، وتلمع اللحم. إنها ليست للملح؛ إنها للون. فكر في الجانب البصري. ماذا يضيف اللون الداكن؟
    follow_ups:
      - ماذا ستفعل صلصة الصويا الفاتحة؟
      - كيف يشكل اللون التوقع؟
      - ما العلاقة بين الداكن والكراميل؟
  - id: chn_hot_plate
    name: الطبق الساخن
    prompt: |
      تصل الأطباق الصاخبة — لحم، حبار — وهي تصدر أزيزًا. الطبق الحديدي يستمر في الطهي. الصوت مسرح. ماذا سيكون الطبق بدون الأزيز؟ كيف يمد الطبق الساخن الطهي؟
    follow_ups:
      - كيف يشكل الأزيز التجربة؟
      - ماذا سيعني طبق بارد؟
      - ما العلاقة بين الصوت والحرارة؟
  - id: chn_congee_soft
    name: عصيدة كونجي الطرية
    prompt: |
      الكونجي — عصيدة الأرز — طرية، مريحة. الأرز المطبوخ طويلاً يتحلل. القوام هو استسلام. فكر في التحول. ماذا سيعني "ألدنتي" (متماسكة قليلاً) هنا؟
    follow_ups:
      - كيف تشكل الطراوة الطبق؟
      - ماذا ستفعل كونجي سميكة؟
      - ما العلاقة بين الماء والأرز؟
  - id: chn_glass_noodle
    name: معكرونة زجاجية
    prompt: |
      المعكرونة الزجاجية — نشا الفول الأخضر — شفافة، زلقة. تمتص النكهة. لاحظ القوام. ماذا ستفعل معكرونة القمح؟ كيف يهم الشفافية؟
    follow_ups:
      - كيف تشكل المعكرونة الطبق؟
      - ما العلاقة بين الشفافية والامتصاص؟
      - لماذا زجاجية؟
  - id: chn_xlb_burst
    name: انفجار شياولونغباو
    prompt: |
      شياولونغباو — فطيرة حساء — تحتوي على مرق بداخلها. اللقمة الأولى يمكن أن تحرق أو تنفجر. التقنية: قرصة، رشفة، أكل. فكر في المخاطرة. ماذا سيعني شياولونغباو بارد؟
    follow_ups:
      - كيف يشكل الحساء التجربة؟
      - ماذا ستخسر بدون الانفجار؟
      - ما العلاقة بين درجة الحرارة والخطر؟
  - id: chn_tea_smell
    name: رائحة الشاي
    prompt: |
      أولونغ، ياسمين، بو-إير — كل شاي له رائحة مختلفة. شم قبل الرشفة. العطر هو نصف التجربة. ماذا يعد العطر؟ ماذا يقدم؟
    follow_ups:
      - كيف تشكل الرائحة الرشفة؟
      - ماذا سيكون الشاي بدون رائحة؟
      - ما العلاقة بين النقع والرائحة؟
  - id: chn_crab_crack
    name: كسر السلطعون
    prompt: |
      سلطعون في مأدبة صينية — توفر كسارات. الكسر هو صوت وعمل. يتم استخلاص اللحم. فكر في الرقص. ماذا سيعني السلطعون المكسور مسبقًا؟
    follow_ups:
      - كيف يشكل الكسر الوجبة؟
      - ماذا ستخسر بدون العمل؟
      - ما العلاقة بين الجهد والمكافأة؟
  - id: chn_turn_table
    name: القرص الدوار
    prompt: |
      القرص الدوار — من يديره؟ متى؟ الطبق الذي تريده قد يكون عبر الطاولة. الدوران هو آداب. لاحظ الرقصة. ما هي القواعد؟ متى تنتظر؟
    follow_ups:
      - كيف يشكل الدوران الوجبة؟
      - ماذا سيعني وجود أطباق ثابتة؟
      - ما العلاقة بين الدوران والمشاركة؟
  - id: chn_ginger_slice
    name: شريحة الزنجبيل
    prompt: |
      الزنجبيل مع المأكولات البحرية — شرائح رفيعة، أحيانًا مقلية. يقطع نكهة السمك. الزنجبيل هو زينة ووظيفة على حد سواء. فكر في دوره. ماذا سيكون السمك بدونه؟
    follow_ups:
      - كيف يشكل الزنجبيل اللسان؟
      - ما العلاقة بين الشريحة والرائحة؟
      - لماذا الزنجبيل مع المأكولات البحرية؟
  - id: chn_hoisin_dip
    name: صلصة هويسين الغموس
    prompt: |
      هويسين مع بط بكين — الغموس هو طقس. الفطيرة، البط، البصل الأخضر، الصلصة. كل عنصر له مكانه. فكر في التكوين. ماذا سيعني غياب أحدها؟
    follow_ups:
      - كيف يشكل الغموس اللقمة؟
      - ماذا ستفعل صلصة أخرى؟
      - ما العلاقة بين الحلو والبط؟
  - id: chn_leaf_wrap
    name: لفيفة ورقية
    prompt: |
      لفيفة الخس — لحم مفروم، أعشاب، صلصة، ملفوفة في ورقة. الورقة هي وعاء وقوام. اللفافة هي عمل يدوي. فكر في البنية. ماذا ستفعل التورتيلا؟
    follow_ups:
      - كيف تشكل الورقة اللقمة؟
      - ماذا ستفعل الصفيحة؟
      - ما العلاقة بين اللف واليد؟
  - id: chn_fish_whole
    name: سمكة كاملة
    prompt: |
      سمكة كاملة — مطهوة بالبخار، رأس وذيل. تُقدم السمكة كاملة. للرأس معنى. فكر في التقديم. ماذا سيضحي فيليه؟
    follow_ups:
      - كيف يشكل الكامل الطبق؟
      - ماذا يعني الرأس؟
      - ما العلاقة بين الكامل والاحترام؟
  - id: chn_scallion_oil
    name: زيت البصل الأخضر
    prompt: |
      زيت البصل الأخضر — زيت ساخن فوق البصل الأخضر المفروم والزنجبيل. إنه صلصة، ولمسة نهائية. الزيت يحمل الروائح العطرية. لاحظ متى يُطبق. ماذا يضيف الأزيز؟
    follow_ups:
      - ماذا سيكون الطبق بدونه؟
      - كيف يشكل الزيت اللمسة النهائية؟
      - ما العلاقة بين الزيت والرائحة؟
  - id: chn_black_vinegar
    name: خل أسود
    prompt: |
      خل تشينكيانغ — داكن، معقد، حلو قليلاً. يقطع الثراء. قطرات قليلة تغير الفطيرة. فكر في الحموضة. ماذا سيفعل خل الأرز؟ ماذا يضيف اللون الداكن؟
    follow_ups:
      - كيف يشكل الخل اللقمة؟
      - ماذا ستكون الفطيرة بدونه؟
      - ما العلاقة بين الخل والتوازن؟
  - id: chn_sticky_rice
    name: أرز لزج
    prompt: |
      أرز لزج في ورقة لوتس — لو ماي غاي. الورقة تمنح نكهة. الأرز ملفوف، مطهو بالبخار. فك اللف. لاحظ الرائحة. ماذا ستفعل رقائق الألومنيوم؟
    follow_ups:
      - كيف تشكل الورقة الأرز؟
      - ما العلاقة بين اللف والبخار؟
      - ماذا سيعني مفكوك اللف؟
  - id: chn_mooncake_mold
    name: قالب كعكة القمر
    prompt: |
