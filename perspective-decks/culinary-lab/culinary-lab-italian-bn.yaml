# কিচেন ল্যাব — ইতালীয় (Bengali)

id: culinary_lab_italian
name: কিচেন ল্যাব — ইতালীয়
description: ইতালীয় খাবার সম্পর্কে আপনার অভিজ্ঞতাকে নতুন করে সংজ্ঞায়িত করার জন্য ৫০টি কার্ড—জলপাই তেল এবং অ্যাসিডের রসায়ন থেকে শুরু করে টেবিলের সামাজিক বিন্যাস এবং প্রতিটি উপাদানের প্রত্নতত্ত্ব পর্যন্ত।
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: টমেটোর রূপান্তর
    prompt: |
      একটি কাঁচা টমেটো তাপ এবং সময়ের সাথে সাথে অন্য কিছুতে পরিণত হয়। সেই পথটি খুঁজে বের করুন।
      অ্যাসিডিটি বা অম্লতা কী হয়? গঠন কী হয়? টমেটো একটি যাত্রার ধারক।
    follow_ups:
      - সস কীভাবে তালুকে (palate) বদলে দেয়?
      - রূপান্তর ছাড়া কী হারিয়ে যাবে?
      - কাঁচা এবং রান্না করা জিনিসের মধ্যে সম্পর্ক কী?
  - id: it_bread_arrival
    name: রুটির আগমন
    prompt: |
      খাবারের আগে রুটি আসে—কখনও গরম, কখনও তেলের সাথে। জিনিসগুলির ক্রম লক্ষ্য করুন। রুটি একটি প্রবেশদ্বার। কে কখন খাবে তা ঠিক করে?
    follow_ups:
      - রুটি ছাড়া খাবারটি কী হবে?
      - রুটি কীভাবে গতির সৃষ্টি করে?
      - রুটি এবং প্রত্যাশার মধ্যে সম্পর্ক কী?
  - id: it_pasta_shape
    name: পাস্তার আকৃতি
    prompt: |
      প্রতিটি পাস্তার আকৃতি সস ভিন্নভাবে ধারণ করে—রেখা, গর্ত, বাঁক। একটি খাবার বেছে নিন এবং জিজ্ঞাসা করুন: এই সসের জন্য এই আকৃতি কেন? আকৃতি একটি সিদ্ধান্ত।
    follow_ups:
      - ভিন্ন আকৃতিতে কী পরিবর্তন হবে?
      - আকৃতি কামড়কে (bite) কীভাবে প্রভাবিত করে?
      - আকৃতি এবং কার্যাবলীর মধ্যে সম্পর্ক কী?
  - id: it_basil_fragrance
    name: তুলসীর সুগন্ধ
    prompt: |
      তুলসী মুখে আসার আগেই নাকে লাগে। চোখ বন্ধ করুন এবং ভেষজটি খুঁজুন।
      খাবারে এটি কোথায় থাকে? সুগন্ধ একটি মানচিত্র।
    follow_ups:
      - গন্ধ ছাড়া খাবারটি কী হবে?
      - সুগন্ধ কীভাবে তালুকে প্রস্তুত করে?
      - সুগন্ধ এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: it_olive_oil_pool
    name: জলপাই তেলের পুল
    prompt: |
      জলপাই তেল পৃষ্ঠের উপর পুল তৈরি করে বা প্লেটকে মসৃণ করে। এটি কীভাবে চলাচল করে তা দেখুন।
      তেল স্বাদ এবং চর্বি বহন করে। এটি কী বাঁধাই করে?
    follow_ups:
      - তেল ছাড়া খাবারটি কী হবে?
      - তেল মুখের অনুভূতি (mouthfeel) কীভাবে পরিবর্তন করে?
      - তেল এবং তাপের মধ্যে সম্পর্ক কী?
  - id: it_parmesan_shatter
    name: পারমেজান চূর্ণ
    prompt: |
      টাটকা গ্রেট করা পারমিগিয়ানোতে একটি স্ফটিকের মতো মচমচে ভাব থাকে। এটি শুনুন।
      চীজ স্বাদের মতোই একটি টেক্সচার। এটি কামড়কে কীভাবে শেষ করে?
    follow_ups:
      - মচমচে ভাব ছাড়া খাবারটি কী হবে?
      - পনির কীভাবে তালুকে পূর্ণতা দেয়?
      - পনির এবং নুনের মধ্যে সম্পর্ক কী?
  - id: it_espresso_ritual
    name: এসপ্রেসো রীতির
    prompt: |
      এসপ্রেসো শেষে আসে—ছোট কাপ, দুধ ছাড়া। এই রীতিটি সমাপ্তি চিহ্নিত করে।
      কে দাঁড়িয়ে এটি পান করে? কে বসে? এসপ্রেসো একটি বিরামচিহ্ন।
    follow_ups:
      - এসপ্রেসো ছাড়া খাবারটি কী হবে?
      - রীতি কীভাবে সময়কে আকার দেয়?
      - কফি এবং সমাপ্তির মধ্যে সম্পর্ক কী?
  - id: it_antipasti_sequence
    name: অ্যাপেটাইজার ক্রম
    prompt: |
      অ্যাপেটাইজার প্রথমে আসে—ছোট প্লেট, ভাগ করে নেওয়া বা না। ক্রমটি লক্ষ্য করুন।
      অর্ডারটির যুক্তি কী? শুরুটাই সুর ঠিক করে দেয়।
    follow_ups:
      - ক্রম উল্টে দিলে কী পরিবর্তন হবে?
      - ক্রম কীভাবে ক্ষুধা তৈরি করে?
      - প্রথম এবং শেষের মধ্যে সম্পর্ক কী?
  - id: it_wine_pour
    name: ওয়াইন ঢালা
    prompt: |
      ওয়াইন ঢালা হয়—কে ঢালে? কতটা? এই ঢালা একটি সামাজিক নৃত্য। অঙ্গভঙ্গিগুলো দেখুন। তারা কী বলে?
    follow_ups:
      - ওয়াইন ছাড়া টেবিলটি কী হবে?
      - ঢালা কীভাবে অনুষ্ঠান তৈরি করে?
      - ঢালা এবং গতির মধ্যে সম্পর্ক কী?
  - id: it_risotto_stir
    name: রিসোটো নাড়ানো
    prompt: |
      রিসোটোতে ক্রমাগত নাড়াচাড়া প্রয়োজন। শ্বেতসার ধীরে ধীরে বের হয়।
      বাটিতে থাকা পরিশ্রম বিবেচনা করুন। নাড়াচাড়া ছাড়া কী হবে?
    follow_ups:
      - ক্রিমি ভাব (creaminess) ছাড়া চালটি কী হবে?
      - নাড়ানো কীভাবে টেক্সচার পরিবর্তন করে?
      - শ্রম এবং ফলাফলের মধ্যে সম্পর্ক কী?
  - id: it_porcini_earth
    name: পোরচিনি মাটির
    prompt: |
      পোরচিনি মাটির স্বাদ—উমামি, মাটি, পচন। মাশরুমটিকে ফিরিয়ে আনুন।
      এটি কোথায় বেড়েছিল? কোন গাছের নীচে?
    follow_ups:
      - মাটির স্বাদ ছাড়া খাবারটি কী হবে?
      - উৎস কীভাবে স্বাদকে আকার দেয়?
      - মাশরুম এবং বনের মধ্যে সম্পর্ক কী?
  - id: it_plate_negative_space
    name: প্লেটের নেতিবাচক স্থান
    prompt: |
      ইতালীয় প্লেটিংয়ে প্রায়শই ফাঁকা জায়গা থাকে—প্লেট ভর্তি থাকে না। শূন্যতা বিবেচনা করুন।
      এটি কী ফ্রেম করে? এটি কী অনুমতি দেয়?
    follow_ups:
      - সম্পূর্ণভাবে ঢাকা থাকলে খাবারটি দেখতে কেমন হবে?
      - নেতিবাচক স্থান কীভাবে চোখকে কেন্দ্রীভূত করে?
      - খালি এবং ভর্তি জিনিসের মধ্যে সম্পর্ক কী?
  - id: it_garlic_sizzle
    name: রসুনের সিস
    prompt: |
      রসুন গরম তেলে পড়ে—এই সিস হলো রসায়ন। শুনুন। গন্ধ নিন। মুহূর্তটি ক্ষণস্থায়ী।
      কী পুড়ে যাবে? কী হারিয়ে যাবে?
    follow_ups:
      - সিস ছাড়া খাবারটি কী হবে?
      - সময় কীভাবে স্বাদকে আকার দেয়?
      - তাপ এবং গন্ধের মধ্যে সম্পর্ক কী?
  - id: it_crust_bubbles
    name: ক্রাস্টের বুদবুদ
    prompt: |
      ফোকাসিয়া বা পিৎজার ক্রাস্ট ওভেনে বুদবুদ তৈরি করে। প্রতিটি বুদবুদ বাষ্পের একটি পকেট।
      ক্রাম্বের (crumb) স্থাপত্য বিবেচনা করুন।
    follow_ups:
      - বুদবুদ ছাড়া রুটিটি কী হবে?
      - ক্রাম্ব কীভাবে তেল এবং লবণ ধারণ করে?
      - বায়ু এবং কাঠামোর মধ্যে সম্পর্ক কী?
  - id: it_prosciutto_slice
    name: প্রোসিয়ুত্তো স্লাইস
    prompt: |
      প্রোসিয়ুত্তো পাতলা করে কাটা হয়—প্রায় স্বচ্ছ। ছুরি গুরুত্বপূর্ণ।
      কারিগরী বিবেচনা করুন। একটি মোটা স্লাইস কী করবে?
    follow_ups:
      - পাতলা স্লাইস ছাড়া চ্যারকিউটেরি (charcuterie) কী হবে?
      - পুরুত্ব গলার অনুভূতিকে (melt) কীভাবে প্রভাবিত করে?
      - স্লাইস এবং স্বাদের মধ্যে সম্পর্ক কী?
  - id: it_balsamic_drop
    name: বালসামিক ফোঁটা
    prompt: |
      পুরাতন বালসামিক ফোঁটা ফোঁটা করে দেওয়া হয়—দামি, মূল্যবান। সান্দ্রতা (viscosity) দেখুন।
      ফোঁটাটি ঘনত্ব। এটি কী যোগ করে?
    follow_ups:
      - অম্লতা ছাড়া খাবারটি কী হবে?
      - ফোঁটা কীভাবে চর্বিকে কাটে?
      - মিষ্টি এবং টক এর মধ্যে সম্পর্ক কী?
  - id: it_gnocchi_pillow
    name: নোচ্চি বালিশ
    prompt: |
      নোচ্চি হালকা হওয়া উচিত—বালিশের মতো, পাথরের মতো নয়। টেক্সচার অনুভব করুন।
      আলু এবং ময়দার অনুপাত সূক্ষ্ম। কী এটিকে কাজ করায়?
    follow_ups:
      - খুব ভারী হলে নোচ্চি কী হবে?
      - টেক্সচার কীভাবে খাবারটিকে সংজ্ঞায়িত করে?
      - আলু এবং ময়দার মধ্যে সম্পর্ক কী?
  - id: it_salt_block
    name: নুনের ব্লক
    prompt: |
      কিছু ইতালীয় রান্নাঘরে গ্রিলিংয়ের জন্য নুনের ব্লক ব্যবহার করা হয়। খনিজ বিবেচনা করুন।
      নুন কোথা থেকে এসেছে? এটি কী দান করে?
    follow_ups:
      - নুন ছাড়া মাংসটি কী হবে?
      - ব্লক কীভাবে রান্নাকে পরিবর্তন করে?
      - নুন এবং আগুনের মধ্যে সম্পর্ক কী?
  - id: it_cacio_e_pepe
    name: ক্যাচিও ই পেপে
    prompt: |
      ক্যাচিও ই পেপে হলো পনির, মরিচ, পাস্তার জল। তিনটি উপাদান।
      ইমালশন (emulsion) হলো কৌশল। কী এটিকে একসাথে ধরে রাখে? কী এটিকে ভাঙে?
    follow_ups:
      - ইমালশন ছাড়া খাবারটি কী হবে?
      - পাস্তার জল কীভাবে বাঁধাই করে?
      - সরলতা এবং কৌশলের মধ্যে সম্পর্ক কী?
  - id: it_cannoli_crunch
    name: ক্যানোলি মচমচে
    prompt: |
      ক্যানোলি শেল ভেঙে যায়; ফিলিং মসৃণ। বৈপরীত্য ইচ্ছাকৃত।
      কামড়ের স্থাপত্য বিবেচনা করুন।
    follow_ups:
      - বৈপরীত্য ছাড়া ডেজার্টটি কী হবে?
      - টেক্সচার কীভাবে আনন্দ তৈরি করে?
      - শেল এবং ফিলিংয়ের মধ্যে সম্পর্ক কী?
  - id: it_risotto_clock
    name: রিসোটো ঘড়ি
    prompt: |
      রিসোটোর একটি সময়কাল আছে—আল দেন্তে, তারপর শেষ। রাঁধুনি সময়ের সাথে দৌড়াচ্ছে।
      নির্ভুলতা বিবেচনা করুন। পাঁচ মিনিট বেশি সময় কী করবে?
    follow_ups:
