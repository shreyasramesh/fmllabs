      - மொறுமொறுப்புக்கும் புத்துணர்ச்சிக்கும் என்ன தொடர்பு?
  - id: sush_silence_counter
    name: கவுண்டரில் அமைதி
    prompt: |
      சில சுஷி கவுண்டர்கள் அமைதியாக இருக்கும் — கவனம், மரியாதை. மற்றவை உயிரோட்டமாக இருக்கும். ஒலி சூழலைக் கவனியுங்கள். அமைதி என்ன சேர்க்கிறது? உரையாடல் என்ன சேர்க்கிறது?
