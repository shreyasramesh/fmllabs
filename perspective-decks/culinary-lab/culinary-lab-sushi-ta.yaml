      - அமைதிக்கும் கவனம் செலுத்துதலுக்கும் என்ன தொடர்பு?
  - id: sush_tamago_sweet
    name: தமாகோ இனிப்பு
    prompt: |
      தமகோ — முட்டை கஸ்டர்ட் — பெரும்பாலும் உணவை முடிக்கும். இது இனிப்பாக, அடுக்கு வாரியாக இருக்கும். செஃபின் திறமை தெரியும். முடிவைக் கவனியுங்கள். கடைசி துண்டாக பச்சை மீன் என்ன அர்த்தம்?
    follow_ups:
