# சமையல் ஆய்வகம் — சுஷி (Tamil)

id: culinary_lab_sushi
name: சமையல் ஆய்வகம் — சுஷி
description: 50 அட்டைகள், அரிசி மற்றும் மீன்களின் வேதியியல் முதல் கவுண்டரின் நடனம் மற்றும் ஒவ்வொரு நேட்டாவின் தோற்றத்தின் தொல்லியல் வரை, சுஷியை நீங்கள் அனுபவிக்கும் விதத்தை மாற்றியமைக்க.
domain: culinary_lab
cards:
  - id: sush_rice_temp
    name: அரிசி வெப்பநிலை
    prompt: |
      சுஷி அரிசி வெதுவெதுப்பாக இருக்கும் — உடல் வெப்பநிலைக்கு அருகில், குளிர்ச்சியாக இல்லை. சூடான அரிசி வினிகரை உணர்த்துகிறது. அதை உணருங்கள். குளிர்ந்த அரிசி என்ன செய்யும்? வெப்பநிலை சுவையை எவ்வாறு பாதிக்கிறது?
    follow_ups:
      - அறை வெப்பநிலை எதை இழக்கும்?
      - சூடு சுவையை எவ்வாறு உணர்த்துகிறது?
      - வெப்பநிலைக்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: sush_shari_balance
    name: ஷாரி சமநிலை
    prompt: |
      ஷாரி—அரிசி—சுஷியின் பாதி. வினிகர், உப்பு, சர்க்கரை சமநிலை துல்லியமானது. அரிசியை மட்டும் சுவைத்துப் பாருங்கள். அது என்ன கொண்டுவருகிறது? சுவையற்ற அரிசி என்ன அர்த்தம்?
    follow_ups:
      - அரிசி நேட்டாவை எவ்வாறு வடிவமைக்கிறது?
      - அதிகப்படியான வினிகர் என்ன செய்யும்?
      - ஷாரிக்கும் நேட்டாவுக்கும் என்ன தொடர்பு?
  - id: sush_counter_ritual
    name: கவுண்டர் சடங்கு
    prompt: |
      கவுண்டரில் ஓமாகாஸ் — நீங்கள் செஃபை எதிர்கொள்கிறீர்கள். சுஷி துண்டு துண்டாக வரும். கவுண்டர் ஒரு மேடை. நடனத்தைக் கவனியுங்கள். தாளம் என்ன? யார் வேகத்தை நிர்ணயிக்கிறார்கள்?
    follow_ups:
      - மேசை என்ன மாற்றத்தை ஏற்படுத்தும்?
      - கவுண்டர் உணவை எவ்வாறு வடிவமைக்கிறது?
      - செஃப் மற்றும் விருந்தினர் இடையே என்ன தொடர்பு?
  - id: sush_net_origin
    name: நேட்டா தோற்றம்
    prompt: |
      ஒவ்வொரு நேட்டாவும் — மேலே உள்ள பொருள் — எங்கிருந்தோ வந்தது. டொயோசு. சுகிஜி. ஒரு படகு. ஒரு பண்ணை. கேளுங்கள். மீனைப் பின்தொடருங்கள். அது என்ன பயணத்தை மேற்கொண்டது? கிடங்கில் இருந்து உறைந்தது என்ன அர்த்தம்?
    follow_ups:
      - தோற்றம் துண்டை எவ்வாறு வடிவமைக்கிறது?
      - வேறு மூலம் என்ன செய்யும்?
      - இடம் மற்றும் தரத்திற்கு என்ன தொடர்பு?
  - id: sush_wasabi_hidden
    name: வசாபி மறைக்கப்பட்டது
    prompt: |
      உண்மையான வசாபி — துருவிய வேர் — அரிதானது. பெரும்பாலானவை குதிரை முள்ளங்கி மற்றும் சாயம். ஆனால் அது உண்மையானதாக இருக்கும்போது, அது வேறுபட்டது. கூர்மையான, பச்சை, விரைவாக மறைந்துவிடும். காரத்தை கவனியுங்கள். போலியானது என்ன சேர்க்கும்? என்ன கழிக்கும்?
    follow_ups:
      - வசாபி சுவையை எவ்வாறு வடிவமைக்கிறது?
      - வசாபி இல்லாதது என்ன அர்த்தம்?
      - காரத்திற்கும் மீனுக்கும் என்ன தொடர்பு?
  - id: sush_finger_over_chopstick
    name: விரல், குச்சிகளுக்கு மேல்
    prompt: |
      நிகிரி பாரம்பரியமாக விரல்களால் உண்ணப்படுகிறது — குச்சிகளால் அல்ல. விரல்கள் வெப்பநிலையையும், அமைப்பையும் உணர்கின்றன. முயற்சி செய்யுங்கள். குச்சிகள் செய்ய முடியாததை விரல் என்ன சேர்க்கிறது?
    follow_ups:
      - கை அனுபவத்தை எவ்வாறு வடிவமைக்கிறது?
      - குச்சிகள் என்ன செய்யும்?
      - தொடுதலுக்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: sush_piece_by_piece
    name: துண்டு துண்டாக
    prompt: |
      சுஷி ஒரு நேரத்தில் ஒரு துண்டாக — அல்லது இரண்டு. வேகம் கவனமாக திட்டமிடப்பட்டுள்ளது. நீங்கள் சாப்பிடுங்கள்; நீங்கள் காத்திருங்கள். தாளத்தைக் கவனியுங்கள். ஒரே நேரத்தில் பத்து துண்டுகள் கொண்ட தட்டு எதை இழக்கும்?
    follow_ups:
      - வேகம் உணவை எவ்வாறு வடிவமைக்கிறது?
      - வேகம் என்ன செய்யும்?
      - துண்டுக்கும் கவனத்திற்கும் என்ன தொடர்பு?
  - id: sush_gari_palate
    name: காரி நாக்கு
    prompt: |
      காரி — ஊறுகாய் இஞ்சி — துண்டுகளுக்கு இடையில் சுத்தம் செய்கிறது. அது அலங்காரம் அல்ல; அது மீட்டமைத்தல். நீங்கள் அதை எப்போது சாப்பிடுகிறீர்கள் என்பதைக் கவனியுங்கள். காரியைத் தொடர்ந்து சாப்பிடுவது நாக்கிற்கு என்ன செய்யும்?
    follow_ups:
      - காரி முன்னேற்றத்தை எவ்வாறு வடிவமைக்கிறது?
      - காரி இல்லாதது என்ன அர்த்தம்?
      - மீட்டமைத்தலுக்கும் சுவைக்கும் என்ன தொடர்பு?
  - id: sush_soy_minimal
    name: சோயா குறைந்தபட்சம்
    prompt: |
      சோயா — ஒரு லேசான டிப், மீன் பக்கம் கீழே. அரிசி அல்ல. அரிசி அதிகமாக உறிஞ்சிவிடும். செஃப் ஏற்கனவே சோயாவை தடவி இருக்கலாம். கவனியுங்கள். அதிகமாக நனைப்பது என்ன செய்யும்?
    follow_ups:
      - சோயா துண்டை எவ்வாறு வடிவமைக்கிறது?
      - சோயா இல்லாதது என்ன அர்த்தம்?
      - டிப் மற்றும் சமநிலைக்கு என்ன தொடர்பு?
  - id: sush_knife_matters
    name: கத்தி முக்கியம்
    prompt: |
      சுஷி கத்தி — ஒற்றை-விளிம்பு, கூர்மையானது. வெட்டு அமைப்பை பாதிக்கிறது. தானியத்துடன் அல்லது எதிராக. கோணம். கத்தி என்ன செய்கிறது என்று பாருங்கள். மந்தமான கத்தி எதை இழக்கும்?
    follow_ups:
