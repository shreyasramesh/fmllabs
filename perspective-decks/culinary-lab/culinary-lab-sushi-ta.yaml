      - கத்திக்கும் வாய் உணர்வுக்கும் என்ன தொடர்பு?
  - id: sush_otoro_fat
    name: ஓடோரோ கொழுப்பு
    prompt: |
      ஓடோரோ — கொழுப்பு நிறைந்த டுனா — உருகிவிடும். கொழுப்புதான் முக்கியம். மார்பிளிங்கைக் கவனியுங்கள். மெல்லிய அகாமி என்ன செய்யும்? கொழுப்பு அனுபவத்தை எவ்வாறு வடிவமைக்கிறது?
    follow_ups:
      - கொழுப்பு இல்லாமல் துண்டு என்னவாக இருக்கும்?
      - மார்பிளிங் எவ்வாறு சொகுசை உருவாக்குகிறது?
      - கொழுப்புக்கும் உருகுதலுக்கும் என்ன தொடர்பு?
  - id: sush_unagi_glaze
    name: உனாகி மெருகூட்டல்
    prompt: |
      உனாகி — ஈல் — இனிப்பு சாஸ் உடன் தடவப்படுகிறது, சில சமயங்களில் மீண்டும் வறுக்கப்படுகிறது. மெருகூட்டல் லாக் போன்றது. பளபளப்பைக் கவனியுங்கள். மெருகூட்டப்படாத ஈல் என்ன அர்த்தம்?
    follow_ups:
      - மெருகூட்டல் துண்டை எவ்வாறு வடிவமைக்கிறது?
