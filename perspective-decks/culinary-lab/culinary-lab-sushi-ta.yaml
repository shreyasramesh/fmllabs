  - id: sush_nori crisp
    name: நோரி மொறுமொறுப்பு
    prompt: |
      மாகிக்கு நோரி — வறுத்த, மொறுமொறுப்பான அல்லது மென்மையானதா? வெவ்வேறு செஃப்கள் வித்தியாசமாக தேர்வு செய்கிறார்கள். நோரி சுவையை பாதிக்கிறது. அமைப்பைக் கவனியுங்கள். ஈரமான நோரி என்ன செய்யும்?
