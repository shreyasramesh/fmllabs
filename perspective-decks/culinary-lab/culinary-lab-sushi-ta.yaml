  - id: sush_tuna_spectrum
    name: டுனா நிறமாலை
    prompt: |
      அகாமி, சுட்டோரோ, ஓடோரோ — மெல்லியதிலிருந்து கொழுப்பு வரை. நிறமாலை கவனமாக திட்டமிடப்பட்டுள்ளது. முடிந்தால் வரிசையாக சுவைக்கவும். முன்னேற்றம் எவ்வாறு செயல்படுகிறது? ஒவ்வொன்றும் என்ன வழங்குகிறது?
    follow_ups:
      - கொழுப்பு நிறமாலையை எவ்வாறு வடிவமைக்கிறது?
      - ஒரு தரம் மட்டும் என்ன அர்த்தம்?
      - மெல்லியதிற்கும் செழுமைக்கும் என்ன தொடர்பு?
  - id: sush_ume_shiso
