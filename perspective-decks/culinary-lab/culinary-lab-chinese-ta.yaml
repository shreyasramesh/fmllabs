# சமையல் ஆய்வகம் — சீனம் (Tamil)

id: culinary_lab_chinese
name: சமையல் ஆய்வகம் — சீனம்
description: 50 அட்டைகள், சீன உணவை நீங்கள் அனுபவிக்கும் விதத்தை மாற்றும் — வோக் ஹீ-யின் வேதியியல், சோயா-வின் தொல்லியல் முதல் வட்ட மேஜையின் நடனம் மற்றும் விருந்தின் கதை வரை.
domain: culinary_lab
cards:
  - id: chn_wok_hei
    name: வோக் ஹீ
    prompt: |
      வோக் ஹீ—வாணலியின் சுவாசம்—தீவிர வெப்பம் மற்றும் வேகத்திலிருந்து வரும் பிடிக்க முடியாத புகை. இது புகைபோல் இல்லை; இது மாற்றம்.
      உங்களால் அதைப் பிடிக்க முடியுமா? அது இல்லாமல் வறுவல் எப்படி இருக்கும்?
    follow_ups:
      - ஹீ எப்படி உணவை வடிவமைக்கிறது?
      - அதை எது உருவாக்குகிறது? எது அதை அழிக்கிறது?
      - வெப்பத்திற்கும் அவசரத்திற்கும் என்ன தொடர்பு?
  - id: chn_round_table
    name: வட்ட மேஜை
    prompt: |
      சீன விருந்து மேஜை வட்டமானது—மையத்தில் சுழலும் தட்டு. உணவு சுழல்கிறது. அனைவரும் எட்டுகின்றனர். மேஜை நடனம். யார் சுழற்றுகிறார்கள்? யார் காத்திருக்கிறார்கள்?
      பேசப்படாத விதிகள் என்ன?
    follow_ups:
      - செவ்வக மேஜை என்ன அர்த்தம் தரும்?
      - வட்ட வடிவம் உணவை எப்படி வடிவமைக்கிறது?
      - மையத்திற்கும் விளிம்பிற்கும் என்ன தொடர்பு?
  - id: chn_soy_archeology
    name: சோயா தொல்லியல்
    prompt: |
      சோயா சாஸ்—புளிக்கவைக்கப்பட்டது, முதிர்ச்சியடைந்தது, பிராந்திய ரீதியானது. லேசானது, அடர்ந்தது, காளான், இரட்டை-கருப்பு.
      இது எங்கிருந்தோ வந்தது. இதற்கு நேரம் எடுத்தது. பாட்டிலைக் கண்டறியுங்கள். அது என்ன பயணத்தை மேற்கொண்டது? தொழில்துறை சோயா எதை தியாகம் செய்யும்?
    follow_ups:
      - தோற்றம் எப்படி ஊற்றுவதை வடிவமைக்கிறது?
      - சோயா இல்லாமல் உணவு எப்படி இருக்கும்?
      - நொதித்தலுக்கும் உமாமிக்கும் என்ன தொடர்பு?
  - id: chn_chopstick_grip
    name: குச்சிப் பிடி
    prompt: |
      குச்சிகள் கையை நீட்டிக்கின்றன. அரிசி, வழுக்கும் நூடுல்ஸ், டம்ப்ளிங்ஸ்—ஒவ்வொன்றும்
      வெவ்வேறு நுட்பத்தைக் கோருகின்றன. உங்கள் பிடியைக் கவனியுங்கள். உபகரணம் என்ன கோருகிறது?
      அது எதை அனுமதிக்கிறது?
    follow_ups:
      - முள்கரண்டி எதை மாற்றும்?
      - குச்சி எப்படி கடிப்பதை வடிவமைக்கிறது?
      - கருவிக்கும் வேகத்திற்கும் என்ன தொடர்பு?
  - id: chn_dumpling_seam
    name: டம்ப்ளிங் மடிப்பு
    prompt: |
      டம்ப்ளிங் மடிப்புகள்—மடிப்பு, சீல். ஜியாவோஸி, ஷுமா, சியாலோங்பாவோ—ஒவ்வொன்றுக்கும் அதன் வடிவம் உண்டு. மடிப்பு தாங்கும் அல்லது வெளியிடும். ஒன்றைக் கவனியுங்கள். வெடிப்பு என்ன அர்த்தம் தரும்?
      மடிப்பு எதை பாதுகாக்கிறது?
    follow_ups:
      - மடிப்பு உள்ளே இருப்பதை எப்படி வடிவமைக்கிறது?
      - திறந்த டம்ப்ளிங் எதை இழக்கும்?
      - சீலுக்கும் சூப்பிற்கும் என்ன தொடர்பு?
  - id: chn_tea_pour
    name: தேநீர் ஊற்றுதல்
    prompt: |
      சீன தேநீர்—ஊற்றப்பட்டது, மீண்டும் நிரப்பப்பட்டது, பகிரப்பட்டது. பானை சுழல்கிறது. காலிக் கோப்பைகள்
      கேட்பதற்கு முன் நிரப்பப்படுகின்றன. ஊற்றுதல் சேவை மற்றும் அக்கறை. தாளத்தைக் கவனியுங்கள்.
      தேநீர் இல்லாமல் உணவு எப்படி இருக்கும்?
    follow_ups:
      - தேநீர் எப்படி வேகத்தை வடிவமைக்கிறது?
      - ஊற்றுதல் எதைத் தெரிவிக்கிறது?
      - கோப்பைக்கும் மேசைக்கும் என்ன தொடர்பு?
  - id: chn_bone_plate
    name: எலும்புத் தட்டு
    prompt: |
      எலும்புகளுக்கான சிறிய தட்டு—தூக்கி எறியப்பட்ட ஓடுகள், கோழி எலும்புகள், இறால் ஓடுகள்.
      தட்டு உண்ண முடியாததை சேகரிக்கிறது. இது அமைப்பின் ஒரு பகுதி. எலும்புத் தட்டு எதை அனுமதிக்கிறது?
