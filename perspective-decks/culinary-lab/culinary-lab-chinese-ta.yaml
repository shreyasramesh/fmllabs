      - நேரத்திற்கும் மாற்றத்திற்கும் என்ன தொடர்பு?
  - id: chn_oyster_sauce
    name: சிப்பி சாஸ்
    prompt: |
      சிப்பி சாஸ்—உமாமி, தடித்தது, கேன்டோனீஸ். இது குறைத்தல் மற்றும் பிரித்தெடுத்தல்.
      சிப்பி அதன் சாரத்தை அளிக்கிறது. சுமையைக் கண்டறியுங்கள். அது இல்லாமல் வறுவல் எப்படி இருக்கும்?
    follow_ups:
