  - id: chn_ordering_ritual
    name: ஆர்டர் செய்யும் சடங்கு
    prompt: |
      சீன உணவகத்தில் ஆர்டர் செய்தல்—விருந்தினரின் தேர்வோ அல்லது மேஜையின் பேரம் பேசுதலோ.
