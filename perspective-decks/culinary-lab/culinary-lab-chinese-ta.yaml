      - தேர்வுக்கும் கூட்டத்திற்கும் என்ன தொடர்பு?
  - id: chn_crispy_skin
    name: மொறுமொறுப்பான தோல்
    prompt: |
      பெய்ஜிங் வாத்து தோல்—மொறுமொறுப்பானது, பளபளப்பானது. அல்லது கேன்டோனீஸ் வறுத்த பன்றி இறைச்சியின் கொழுப்பு. தோல் வேண்டுமென்றே செய்யப்பட்டது.
      வெப்பம், காற்று, சர்க்கரை. கட்டமைப்பைக் கவனியுங்கள். மெத்தென்ற தோல் என்ன அர்த்தம் தரும்?
    follow_ups:
      - மொறுமொறுப்பு எப்படி கடிப்பதை வடிவமைக்கிறது?
      - கிராக்கிள் எதை உருவாக்குகிறது?
      - தோலுக்கும் இறைச்சிக்கும் என்ன தொடர்பு?
  - id: chn_noodle_slip
