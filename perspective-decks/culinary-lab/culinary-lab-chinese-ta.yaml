      - நிராகரிப்புக்கும் மரியாதைக்கும் என்ன தொடர்பு?
  - id: chn_soup_spoon
    name: சூப் கரண்டி
    prompt: |
      சீன சூப் கரண்டி—அகலமானது, ஆழமற்றது, பீங்கான். இது குழம்பு மற்றும் திடப்பொருளைக் கொண்டுள்ளது.
      கரண்டி வாயில் வித்தியாசமாக பொருந்துகிறது. கடிப்பதை கவனியுங்கள். அதன் வடிவம் எதைச் சாத்தியமாக்குகிறது?
    follow_ups:
      - வட்ட கரண்டி எதை மாற்றும்?
      - கரண்டி எப்படி கடிப்பதை வடிவமைக்கிறது?
      - வடிவத்திற்கும் செயல்பாட்டிற்கும் என்ன தொடர்பு?
  - id: chn_steam_basket
    name: ஆவி கூடை
    prompt: |
      டிம் சம் மூங்கில் கூடைகளில் வருகிறது—அடுக்கு, அடுக்கடுக்காக. ஆவி உயர்கிறது.
      கூடை வடிவத்தைத் தாங்குகிறது. மூங்கிலைக் கவனியுங்கள். உலோகம் எப்படி வித்தியாசமாக இருக்கும்?
      மூங்கில் எதைச் சேர்க்கிறது?
    follow_ups:
      - கூடை எப்படி டம்ப்ளிங்கை வடிவமைக்கிறது?
