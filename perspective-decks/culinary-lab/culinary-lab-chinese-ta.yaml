  - id: chn_maillard_wok
    name: மாயிலார்ட் வோக்
    prompt: |
      வீட்டு அடுப்புகள் செய்ய முடியாத வெப்பநிலையை வோக் அடைகிறது. சீல் உடனடியாகிறது.
      புரதங்கள் நொடிகளில் பழுப்பு நிறமாக மாறும். வேதியியலைக் கவனியுங்கள். குறைந்த
      வெப்பம் எதை தியாகம் செய்யும்? வோக் எதைக் கோருகிறது?
    follow_ups:
      - வெப்பம் எப்படி சுவையை வடிவமைக்கிறது?
      - மின்சாரத்தால் என்ன வித்தியாசமாக இருக்கும்?
      - நெருப்புக்கும் மேல்தோலுக்கும் என்ன தொடர்பு?
  - id: chn_glutinous_texture
    name: பிசுபிசுப்பான பதம்
    prompt: |
      பிசுபிசுப்பான அரிசி—ஒட்டும், மெல்லும்—வேறுபட்ட வேதியியலைக் கொண்டுள்ளது. இது ஜோங்ஸி, லோ மை கை, இனிப்புகளுக்குப் பயன்படுத்தப்படுகிறது. பதத்தைக் கவனியுங்கள்.
      நீண்ட தானிய அரிசியிலிருந்து இது எப்படி வேறுபடுகிறது? ஒட்டும் தன்மை எதைச் சாத்தியமாக்குகிறது?
    follow_ups:
      - சாதாரண அரிசி என்ன செய்யும்?
      - பதம் எப்படி உணவை வடிவமைக்கிறது?
      - ஒட்டும் தன்மைக்கும் உறையுக்கும் என்ன தொடர்பு?
  - id: chn_century_egg
    name: நூற்றாண்டு முட்டை
    prompt: |
      நூற்றாண்டு முட்டை—பாதுகாக்கப்பட்டது, மாற்றப்பட்டது. மஞ்சள் கரு கருப்பாகவும், வெள்ளை நிறம் ஒளிஊடுருவக்கூடியதாகவும் இருக்கும்.
      வேதியியல் பழமையானது. பாதுகாப்பைக் கவனியுங்கள். நேரம் என்ன செய்யும்?
      புத்துணர்ச்சி என்ன அர்த்தம் தரும்?
    follow_ups:
