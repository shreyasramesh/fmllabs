      நூற்றாண்டு முட்டை—சாம்பல், களிமண், சுண்ணாம்பு ஆகியவற்றில் பாதுகாக்கப்பட்டது. மஞ்சள் கரு சாம்பல்-பச்சை நிறமாக மாறும்,
