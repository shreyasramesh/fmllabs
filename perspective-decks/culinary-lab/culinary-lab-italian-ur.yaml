# کلینری لیب — اطالوی (Urdu)

id: culinary_lab_italian
name: کلینری لیب — اطالوی
description: 50 کارڈز جو اطالوی کھانے کے تجربے کو بدل دیں گے—زیتون کے تیل اور تیزاب کی کیمسٹری سے لے کر ٹیبل کے سماجی رقص اور ہر جزو کی पुरात पुरातات تک۔
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: ٹماٹر کی تبدیلی
    prompt: |
      ایک کچا ٹماٹر گرمی اور وقت کے ساتھ کچھ اور بن جاتا ہے۔ اس قوس کو ٹریس کریں۔
      تیزابیت کا کیا ہوتا ہے؟ ساخت کا؟ ٹماٹر ایک سفر رکھتا ہے۔
    follow_ups:
      - ساس تالو کو کیسے بدلتی ہے؟
      - تبدیلی کے بغیر کیا کھو جائے گا؟
      - کچے اور پکے کے درمیان کیا تعلق ہے؟
  - id: it_bread_arrival
    name: روٹی کی آمد
    prompt: |
      کھانے سے پہلے روٹی آتی ہے—کبھی گرم، کبھی تیل کے ساتھ۔ ترتیب پر توجہ دیں۔
      روٹی ایک افتتاحی ہے۔ کون فیصلہ کرتا ہے کہ کب کھانا ہے؟
    follow_ups:
      - روٹی کے بغیر کھانا کیسا ہوگا؟
      - روٹی کس طرح رفتار طے کرتی ہے؟
      - روٹی اور انتظار کے درمیان کیا تعلق ہے؟
  - id: it_pasta_shape
    name: پاستا کی شکل
    prompt: |
      ہر پاستا کی شکل ساس کو مختلف طریقے سے اٹھاتی ہے—لہریں، کھوکھلی، خم۔ ایک ڈش کا انتخاب کریں اور پوچھیں: اس ساس کے لیے یہ شکل کیوں؟ شکل ایک فیصلہ ہے۔
    follow_ups:
      - مختلف شکل کے ساتھ کیا بدل جائے گا؟
      - شکل کا کاٹنے پر کیا اثر ہوتا ہے؟
      - شکل اور فعل کے درمیان کیا تعلق ہے؟
  - id: it_basil_fragrance
    name: تلسی کی خوشبو
    prompt: |
      تلسی منہ سے پہلے ناک سے ٹکراتی ہے۔ آنکھیں بند کریں اور جڑی بوٹی تلاش کریں۔
      یہ ڈش میں کہاں رہتی ہے؟ خوشبو ایک نقشہ ہے۔
    follow_ups:
      - خوشبو کے بغیر ڈش کیسی ہوگی؟
      - خوشبو تالو کو کیسے تیار کرتی ہے؟
      - خوشبو اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: it_olive_oil_pool
    name: زیتون کا تیل کا پول
    prompt: |
      زیتون کا تیل سطح پر جمع ہوتا ہے یا پلیٹ کو چکنا کر دیتا ہے۔ دیکھیں کہ یہ کیسے حرکت کرتا ہے۔
      تیل ذائقہ اور چکنائی لے جاتا ہے۔ یہ کیا باندھتا ہے؟
    follow_ups:
      - تیل کے بغیر ڈش کیسی ہوگی؟
      - تیل منہ کے احساس کو کیسے بدلتا ہے؟
      - تیل اور گرمی کے درمیان کیا تعلق ہے؟
  - id: it_parmesan_shatter
    name: پرمیسن کا شگاف
    prompt: |
      تازہ کسا ہوا پرمیجیانو کرسٹل کریک کے ساتھ آتا ہے۔ اسے سنیں۔ پنیر ذائقے کے ساتھ ساتھ ساخت بھی ہے۔ یہ کاٹنے کو کیسے برم کرتا ہے؟
    follow_ups:
      - کریک کے بغیر ڈش کیسی ہوگی؟
      - پنیر تالو کو کیسے مکمل کرتا ہے؟
      - پنیر اور نمک کے درمیان کیا تعلق ہے؟
  - id: it_espresso_ritual
    name: ایسپریسو رسم
    prompt: |
      ایسپریسو آخر میں آتا ہے—چھوٹا کپ، کوئی دودھ نہیں۔ رسم اختتام کا نشان لگاتی ہے۔
      کون کھڑے ہو کر پیتا ہے؟ کون بیٹھتا ہے؟ ایسپریسو ایک وقفہ ہے۔
    follow_ups:
      - ایسپریسو کے بغیر کھانا کیسا ہوگا؟
      - رسم وقت کو کیسے تشکیل دیتی ہے؟
      - کافی اور اختتام کے درمیان کیا تعلق ہے؟
  - id: it_antipasti_sequence
    name: اینٹیپاسٹی ترتیب
    prompt: |
      اینٹیپاسٹی پہلے آتی ہیں—چھوٹی پلیٹیں، مشترکہ یا نہیں۔ ترتیب پر توجہ دیں۔
      آرڈر کا کیا منطق ہے؟ آغاز لہجہ طے کرتا ہے۔
    follow_ups:
      - اگر ترتیب الٹ دی جائے تو کیا بدلے گا؟
      - ترتیب بھوک کیسے پیدا کرتی ہے؟
      - پہلے اور آخری کے درمیان کیا تعلق ہے؟
  - id: it_wine_pour
    name: شراب ڈالنا
    prompt: |
      شراب ڈالی جاتی ہے—کون ڈالتا ہے؟ کتنا؟ ڈالنا سماجی رقص ہے۔ اشاروں کو دیکھیں۔ وہ کیا کہتے ہیں؟
    follow_ups:
      - شراب کے بغیر ٹیبل کیسا ہوگا؟
      - ڈالنے سے تقریب کیسے بنتی ہے؟
      - ڈالنے اور رفتار کے درمیان کیا تعلق ہے؟
  - id: it_risotto_stir
    name: رسوٹو ہلانا
    prompt: |
      رسوٹو کو مسلسل ہلانے کی ضرورت ہوتی ہے۔ نشاستہ آہستہ آہستہ خارج ہوتا ہے۔ پیالے میں موجود محنت پر غور کریں۔ ہلانے کے بغیر کیا ہوگا؟
    follow_ups:
      - کریمی پن کے بغیر چاول کیسا ہوگا؟
      - ہلانے سے ساخت کیسے بدلتی ہے؟
      - محنت اور نتیجے کے درمیان کیا تعلق ہے؟
  - id: it_porcini_earth
    name: پورچینی مٹی
    prompt: |
      پورچینی جنگل کے فرش کا ذائقہ دار ہوتا ہے—اومی، مٹی، سڑنا۔ مشروم کو پیچھے ٹریس کریں۔
      یہ کہاں اگا؟ کن درختوں کے نیچے؟
    follow_ups:
      - مٹی کے ذائقے کے بغیر ڈش کیسی ہوگی؟
      - اصل ذائقے کو کیسے تشکیل دیتی ہے؟
      - مشروم اور جنگل کے درمیان کیا تعلق ہے؟
  - id: it_plate_negative_space
    name: پلیٹ نیگیٹو اسپیس
    prompt: |
      اطالوی پلیٹنگ میں اکثر جگہ چھوڑی جاتی ہے—پلیٹ بھری نہیں ہوتی۔ خالی جگہ پر غور کریں۔
      یہ کیا فریم کرتا ہے؟ یہ کیا اجازت دیتا ہے؟
    follow_ups:
      - اگر پلیٹ پوری بھری ہوتی تو ڈش کیسی نظر آتی؟
      - منفی جگہ آنکھ کو کیسے مرکوز کرتی ہے؟
      - خالی اور بھرے کے درمیان کیا تعلق ہے؟
  - id: it_garlic_sizzle
    name: لہسن کی سسکی
    prompt: |
      لہسن گرم تیل میں گرتا ہے—سسکی کیمسٹری ہے۔ سنیں۔ سونگھیں۔ لمحہ فانی ہے۔ کیا جل جائے گا؟ کیا کھو جائے گا؟
    follow_ups:
      - سسکی کے بغیر ڈش کیسی ہوگی؟
      - وقت ذائقے کو کیسے تشکیل دیتا ہے؟
      - گرمی اور خوشبو کے درمیان کیا تعلق ہے؟
  - id: it_crust_bubbles
    name: کرسٹ کے بلبلے
    prompt: |
      فوکاچیا یا پیزا کرسٹ اوون میں بلبلے بناتی ہے۔ ہر بلبلہ بھاپ کا ایک جیب ہے۔ کرم کی ساخت پر غور کریں۔
    follow_ups:
      - بلبلوں کے بغیر روٹی کیسی ہوگی؟
      - کرم تیل اور نمک کو کیسے رکھتا ہے؟
      - ہوا اور ساخت کے درمیان کیا تعلق ہے؟
  - id: it_prosciutto_slice
    name: پروشوٹو سلائس
    prompt: |
      پروشوٹو پتلی سلائس ہوتی ہے—تقریباً شفاف۔ چاقو اہم ہے۔ کاریگری پر غور کریں۔
      موٹی سلائس کا کیا ہوتا؟
    follow_ups:
      - پتلے پن کے بغیر چارکیوٹری کیسی ہوگی؟
      - موٹائی پگھلنے کو کیسے متاثر کرتی ہے؟
      - سلائس اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: it_balsamic_drop
    name: بالسامک ڈراپ
    prompt: |
      پرانا بالسامک ڈراپ کے طور پر دیا جاتا ہے—مہنگا، قیمتی۔ چپکنے والے پن کو دیکھیں۔
      ڈراپ ارتکاز ہے۔ یہ کیا شامل کرتا ہے؟
    follow_ups:
      - تیزاب کے بغیر ڈش کیسی ہوگی؟
      - ڈراپ چکنائی کو کیسے کاٹتا ہے؟
      - میٹھے اور کھٹے کے درمیان کیا تعلق ہے؟
  - id: it_gnocchi_pillow
    name: نوکی پلو
    prompt: |
      نوکی ہلکے ہونے چاہیے—تکیے، پتھر نہیں۔ ساخت کو محسوس کریں۔
      آلو اور آٹے کا تناسب نازک ہے۔ کیا اسے کام کرتا ہے؟
    follow_ups:
      - اگر نوکی بہت بھاری ہوں تو کیسی ہوں گی؟
      - ساخت ڈش کی تعریف کیسے کرتی ہے؟
      - آلو اور آٹے کے درمیان کیا تعلق ہے؟
  - id: it_salt_block
    name: نمک بلاک
    prompt: |
      کچھ اطالوی کچن گرلنگ کے لیے نمک کے بلاکس استعمال کرتے ہیں۔ معدنیات پر غور کریں۔
      نمک کہاں سے آیا؟ یہ کیا منتقل کرتا ہے؟
    follow_ups:
      - نمک کے بغیر گوشت کیسا ہوگا؟
      - بلاک کھانا پکانے کو کیسے بدلتا ہے؟
      - نمک اور شعلہ کے درمیان کیا تعلق ہے؟
  - id: it_cacio_e_pepe
    name: کاچو ای پیپ
    prompt: |
      کاچو ای پیپ پنیر، کالی مرچ، پاستا کا پانی ہے۔ تین اجزاء۔
      ایملشن چال ہے۔ اسے کیا جوڑے رکھتا ہے؟ کیا اسے توڑتا ہے؟
    follow_ups:
      - ایملشن کے بغیر ڈش کیسی ہوگی؟
      - پاستا کا پانی کیسے باندھتا ہے؟
      - سادگی اور تکنیک کے درمیان کیا تعلق ہے؟
  - id: it_cannoli_crunch
    name: کینولی کرچ
    prompt: |
      کینولی شیل ٹوٹ جاتا ہے؛ فلنگ ہموار ہے۔ تضاد جان بوجھ کر ہے۔
      کاٹنے کی ساخت پر غور کریں۔
    follow_ups:
      - تضاد کے بغیر میٹھا کیسا ہوگا؟
      - ساخت خوشی کیسے پیدا کرتی ہے؟
      - شیل اور فلنگ کے درمیان کیا تعلق ہے؟
  - id: it_risotto_clock
    name: رسوٹو گھڑی
    prompt: |
      رسوٹو کی ایک ونڈو ہوتی ہے—الڈینٹے، پھر ختم۔ پکانے والا وقت کے ساتھ دوڑ رہا ہے۔
      سچائی پر غور کریں۔ پانچ اور منٹ کیا کریں گے؟
    follow_ups:
      - اگر چاول زیادہ پک جائے تو کیسا ہوگا؟
      - وقت ڈش کی تعریف کیسے کرتا ہے؟
      - گھڑی اور دستکاری کے درمیان کیا تعلق ہے؟
  - id: it_truffle_shave
    name: ٹرفل شیو
    prompt: |
      ٹرفل ٹیبل پر شیو کیا جاتا ہے—رسم، خوشبو۔ ٹرفل فانی ہے۔
      یہ کہاں سے آیا؟ کس جانور نے اسے پایا؟
    follow_ups:
      - تقریب کے بغیر ڈش کیسی ہوگی؟
      - شیو ذائقہ کیسے تقسیم کرتی ہے؟
      - رسم اور نایاب کے درمیان کیا تعلق ہے؟
  - id: it_spaghetti_twist
    name: اسپیگیٹی ٹوسٹ
    prompt: |
      اطالوی کانٹے سے اسپیگیٹی کو گھماتے ہیں—چمچ نہیں۔ موڑ ثقافتی ہے۔
      حرکت دیکھیں۔ یہ کیا حاصل کرتا ہے؟
    follow_ups:
      - موڑ کے بغیر کاٹنے کیسا ہوگا؟
      - اشارہ کھانے کو کیسے تشکیل دیتا ہے؟
      - برتن اور روایت کے درمیان کیا تعلق ہے؟
  - id: it_caprese_layers
    name: کاپریسے لیئرز
    prompt: |
      کاپریسے ٹماٹر، موزاریلا، تلسی کو اسٹیک کرتا ہے۔ پرت سادہ ہیں۔
      رنگ پر غور کریں—سرخ، سفید، سبز۔ پلیٹ ایک پرچم ہے۔
    follow_ups:
      - ترتیب کے بغیر ڈش کیسی ہوگی؟
      - پرت ہم آہنگی کیسے پیدا کرتے ہیں؟
      - رنگ اور ذائقہ کے درمیان کیا تعلق ہے؟
  - id: it_polenta_set
    name: پولینٹا سیٹ
    prompt: |
      پولینٹا ٹھنڈا ہونے پر سیٹ ہو جاتا ہے—نرم سے سخت۔ درجہ حرارت پر غور کریں۔
      یہ گرم ہونے پر کیا ہوگا؟ ٹھنڈا؟ ساخت وقت کا ایک فعل ہے۔
    follow_ups:
      - اگر پولینٹا کبھی ٹھنڈا نہ ہو تو کیسا ہوگا؟
      - سیٹنگ ڈش کو کیسے بدلتی ہے؟
      - گرمی اور ساخت کے درمیان کیا تعلق ہے؟
  - id: it_amaro_finish
    name: امارو فنش
    prompt: |
      امارو کھانا ختم کرتا ہے—کڑوا، ہاضم۔ کڑوا پن جان بوجھ کر ہے۔
      یہ تالو کو کیا کرتا ہے؟ جسم کو؟
    follow_ups:
      - امارو کے بغیر کھانا کیسا ہوگا؟
      - کڑوا زبان کو کیسے دوبارہ ترتیب دیتا ہے؟
      - کڑوا پن اور اختتام کے درمیان کیا تعلق ہے؟
  - id: it_lardo_spread
    name: لارڈو اسپریڈ
    prompt: |
      لارڈو cured سور کا گوشت چربی ہے—روٹی پر پھیلایا جاتا ہے، پگھلتا ہے۔ چکنائی پر غور کریں۔
      یہ کہاں سے آیا؟ یہ کیا لے جاتا ہے؟
    follow_ups:
      - لارڈو کے بغیر روٹی کیسی ہوگی؟
      - چکنائی ذائقہ کیسے لے جاتی ہے؟
      - چکنائی اور تحفظ کے درمیان کیا تعلق ہے؟
  - id: it_sardine_silver
    name: سارڈین سلور
    prompt: |
      تازہ سارڈین چمکتی ہیں—سلور جلد، پوری۔ مچھلی چھوٹی، تیل والی ہے۔
      پیمانے پر غور کریں۔ بڑی مچھلی کیا کرے گی؟
    follow_ups:
      - تیل کے بغیر ڈش کیسی ہوگی؟
      - سائز کھانا پکانے کو کیسے متاثر کرتا ہے؟
      - چھوٹے اور شدید کے درمیان کیا تعلق ہے؟
  - id: it_burrata_break
    name: برراٹا بریک
    prompt: |
      برراٹا کو توڑا جانا چاہیے—باہرونی جلد کریم میں بدل جاتی ہے۔ لمحہ تھیٹر والا ہے۔
      تضاد پر غور کریں۔ باہر کا خول، اندر کا مائع۔
