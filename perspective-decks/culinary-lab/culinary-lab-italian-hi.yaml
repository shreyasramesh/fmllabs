# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Culinary Lab — Italian (Hindi)

id: culinary_lab_italian
name: Culinary Lab — Italian
description: 50 कार्ड जो इटैलियन भोजन के आपके अनुभव को बदलते हैं—जैतून के तेल और एसिड की रसायन शास्त्र से लेकर टेबल की सामाजिक तालमेल और प्रत्येक सामग्री के पुरातत्व तक।
domain: culinary_lab
cards:
  - id: it_tomato_transformation
    name: टमाटर का रूपांतरण
    prompt: |
      एक कच्चा टमाटर गर्मी और समय के साथ कुछ और बन जाता है। उस चाप का पता लगाएं।
      अम्लता का क्या होता है? संरचना का? टमाटर एक यात्रा को धारण करता है।
    follow_ups:
      - सॉस तालू को कैसे बदलता है?
      - रूपांतरण के बिना क्या खो जाएगा?
      - कच्चे और पके हुए के बीच क्या संबंध है?
  - id: it_bread_arrival
    name: ब्रेड का आगमन
    prompt: |
      भोजन से पहले ब्रेड आती है—कभी-कभी गर्म, कभी-कभी तेल के साथ। चीजों के क्रम पर ध्यान दें। ब्रेड एक शुरुआत है। कौन तय करता है कि कब खाना है?
    follow_ups:
      - ब्रेड के बिना भोजन क्या होगा?
      - ब्रेड गति कैसे निर्धारित करती है?
      - ब्रेड और प्रत्याशा के बीच क्या संबंध है?
  - id: it_pasta_shape
    name: पास्ता का आकार
    prompt: |
      प्रत्येक पास्ता का आकार सॉस को अलग तरह से ले जाता है—रिज, खोखलापन, वक्र। एक व्यंजन चुनें और पूछें: इस सॉस के लिए यह आकार क्यों? रूप एक निर्णय है।
    follow_ups:
      - एक अलग आकार के साथ क्या बदलेगा?
      - आकार काटने को कैसे प्रभावित करता है?
      - रूप और कार्य के बीच क्या संबंध है?
  - id: it_basil_fragrance
    name: तुलसी की सुगंध
    prompt: |
      तुलसी मुंह से पहले नाक से टकराती है। अपनी आँखें बंद करें और जड़ी-बूटी का पता लगाएं। यह व्यंजन में कहाँ रहती है? सुगंध एक नक्शा है।
    follow_ups:
      - गंध के बिना व्यंजन क्या होगा?
      - सुगंध तालू को कैसे तैयार करती है?
      - सुगंध और स्वाद के बीच क्या संबंध है?
  - id: it_olive_oil_pool
    name: जैतून के तेल का पूल
    prompt: |
      जैतून का तेल सतह पर जमा हो जाता है या प्लेट को चमकदार बना देता है। देखें कि यह कैसे चलता है। तेल स्वाद और वसा को ले जाता है। यह क्या बांधता है?
    follow_ups:
      - तेल के बिना व्यंजन क्या होगा?
      - तेल मुंह के अनुभव को कैसे बदलता है?
      - तेल और गर्मी के बीच क्या संबंध है?
  - id: it_parmesan_shatter
    name: पार्मेसन का टूटना
    prompt: |
      ताजा कद्दूकस किया हुआ पार्मिगियानो एक क्रिस्टलीय कुरकुरापन रखता है। इसे सुनें। पनीर स्वाद जितना ही बनावट है। यह काटने को कैसे विराम देता है?
    follow_ups:
      - कुरकुरेपन के बिना व्यंजन क्या होगा?
      - पनीर तालू को कैसे पूरा करता है?
      - पनीर और नमक के बीच क्या संबंध है?
  - id: it_espresso_ritual
    name: एस्प्रेसो का अनुष्ठान
    prompt: |
      एस्प्रेसो अंत में आता है—छोटा कप, कोई दूध नहीं। अनुष्ठान समापन का प्रतीक है। कौन खड़ा होकर पीता है? कौन बैठता है? एस्प्रेसो एक विराम चिह्न है।
    follow_ups:
      - एस्प्रेसो के बिना भोजन क्या होगा?
      - अनुष्ठान समय को कैसे आकार देता है?
      - कॉफी और अंत के बीच क्या संबंध है?
  - id: it_antipasti_sequence
    name: एंटीपास्टी अनुक्रम
    prompt: |
      एंटीपास्टी पहले आते हैं—छोटी प्लेटें, साझा या नहीं। अनुक्रम पर ध्यान दें। क्रम का तर्क क्या है? शुरुआत स्वर निर्धारित करती है।
    follow_ups:
      - अगर क्रम उलट दिया जाए तो क्या बदलेगा?
      - अनुक्रम भूख कैसे पैदा करता है?
      - पहले और आखिरी के बीच क्या संबंध है?
  - id: it_wine_pour
    name: शराब डालना
    prompt: |
      शराब डाली जाती है—कौन डालता है? कितना? डालना सामाजिक तालमेल है। इशारों को देखें। वे क्या कहते हैं?
    follow_ups:
      - शराब के बिना टेबल क्या होगी?
      - डालना समारोह कैसे बनाता है?
      - डालना और गति के बीच क्या संबंध है?
  - id: it_risotto_stir
    name: रिसोट्टो हिलाना
    prompt: |
      रिसोट्टो को लगातार हिलाने की आवश्यकता होती है। स्टार्च धीरे-धीरे निकलता है। कटोरे में श्रम पर विचार करें। हिलाने के बिना क्या होगा?
    follow_ups:
      - मलाईदारपन के बिना चावल क्या होगा?
      - हिलाने से बनावट कैसे बदलती है?
      - श्रम और परिणाम के बीच क्या संबंध है?
  - id: it_porcini_earth
    name: पोर्चिनी मिट्टी
    prompt: |
      पोर्चिनी वन तल का स्वाद लेते हैं—उमामी, मिट्टी, सड़न। मशरूम को वापस ट्रेस करें। यह कहाँ उगा? किन पेड़ों के नीचे?
    follow_ups:
      - मिट्टी के स्वाद के बिना व्यंजन क्या होगा?
      - उत्पत्ति स्वाद को कैसे आकार देती है?
      - मशरूम और जंगल के बीच क्या संबंध है?
  - id: it_plate_negative_space
    name: प्लेट में खाली जगह
    prompt: |
      इटैलियन प्लेटिंग में अक्सर खाली जगह छोड़ दी जाती है—प्लेट भरी नहीं होती। खालीपन पर विचार करें। यह क्या फ्रेम करता है? यह क्या अनुमति देता है?
    follow_ups:
      - पूरी तरह से भरी हुई डिश कैसी दिखेगी?
      - खाली जगह आंख को कैसे केंद्रित करती है?
      - खाली और भरे के बीच क्या संबंध है?
  - id: it_garlic_sizzle
    name: लहसुन की सिज़ल
    prompt: |
      लहसुन तेज तेल में जाता है—सिज़ल रसायन शास्त्र है। सुनें। सूंघें। क्षण क्षणभंगुर है। क्या जलेगा? क्या खो जाएगा?
    follow_ups:
      - सिज़ल के बिना व्यंजन क्या होगा?
      - समय स्वाद को कैसे आकार देता है?
      - गर्मी और सुगंध के बीच क्या संबंध है?
  - id: it_crust_bubbles
    name: क्रस्ट के बुलबुले
    prompt: |
      फोकासिया या पिज्जा क्रस्ट ओवन में बुलबुले विकसित करता है। प्रत्येक बुलबुला भाप का एक पॉकेट होता है। क्रम्ब की वास्तुकला पर विचार करें।
    follow_ups:
      - बुलबुले के बिना ब्रेड क्या होगी?
      - क्रम्ब तेल और नमक को कैसे पकड़ता है?
      - हवा और संरचना के बीच क्या संबंध है?
  - id: it_prosciutto_slice
    name: प्रोसियुटो का टुकड़ा
    prompt: |
      प्रोसियुटो पतला कटा हुआ होता है—लगभग पारभासी। चाकू मायने रखता है। शिल्प पर विचार करें। एक मोटा टुकड़ा क्या करेगा?
    follow_ups:
      - पतलेपन के बिना चारकुटेरी क्या होगी?
      - मोटाई पिघलने को कैसे प्रभावित करती है?
      - टुकड़ा और स्वाद के बीच क्या संबंध है?
  - id: it_balsamic_drop
    name: बाल्समिक की बूंद
    prompt: |
      पुरानी बाल्समिक बूंदों में डाली जाती है—महंगी, कीमती। चिपचिपाहट देखें। बूंद एकाग्रता है। यह क्या जोड़ती है?
    follow_ups:
      - एसिड के बिना व्यंजन क्या होगा?
      - बूंद वसा को कैसे काटती है?
      - मीठे और खट्टे के बीच क्या संबंध है?
  - id: it_gnocchi_pillow
    name: नोकी का तकिया
    prompt: |
      नोकी हल्का होना चाहिए—तकिये, पत्थर नहीं। बनावट महसूस करें। आलू और आटे का अनुपात नाजुक होता है। इसे क्या काम करता है?
    follow_ups:
      - अगर बहुत भारी हो तो नोकी क्या होगा?
      - बनावट व्यंजन को कैसे परिभाषित करती है?
      - आलू और आटे के बीच क्या संबंध है?
  - id: it_salt_block
    name: नमक का ब्लॉक
    prompt: |
      कुछ इटैलियन किचन ग्रिलिंग के लिए नमक ब्लॉक का उपयोग करते हैं। खनिज पर विचार करें। नमक कहाँ से आया? यह क्या देता है?
    follow_ups:
      - नमक के बिना मांस क्या होगा?
      - ब्लॉक पकाने को कैसे बदलता है?
      - नमक और लौ के बीच क्या संबंध है?
  - id: it_cacio_e_pepe
    name: कैसिओ ई पेपे
    prompt: |
      कैसिओ ई पेपे पनीर, काली मिर्च, पास्ता पानी है। तीन सामग्री। इमल्शन चाल है। इसे क्या एक साथ रखता है? क्या इसे तोड़ता है?
    follow_ups:
      - इमल्शन के बिना व्यंजन क्या होगा?
      - पास्ता पानी कैसे बांधता है?
      - सादगी और तकनीक के बीच क्या संबंध है?
  - id: it_cannoli_crunch
    name: कैनोली का कुरकुरापन
    prompt: |
      कैनोली का खोल टूट जाता है; भराई चिकनी होती है। विपरीत जानबूझकर होता है। काटने की वास्तुकला पर विचार करें।
    follow_ups:
      - विपरीत के बिना मिठाई क्या होगी?
      - बनावट आनंद कैसे पैदा करती है?
      - खोल और भराई के बीच क्या संबंध है?
  - id: it_risotto_clock
    name: रिसोट्टो घड़ी
    prompt: |
      रिसोट्टो का एक विंडो होता है—अल डेंटे, फिर चला जाता है। रसोइया समय के साथ दौड़ रहा है। सटीकता पर विचार करें। पाँच और मिनट क्या करेंगे?
    follow_ups:
      - अगर ज़्यादा पक जाए तो चावल क्या होगा?
      - समय व्यंजन को कैसे परिभाषित करता है?
      - घड़ी और शिल्प के बीच क्या संबंध है?
  - id: it_truffle_shave
    name: ट्रफल का छिलका
    prompt: |
      ट्रफल टेबल पर छिला जाता है—अनुष्ठान, सुगंध। ट्रफल क्षणभंगुर है। यह कहाँ से आया? किस जानवर ने इसे ढूंढा?
    follow_ups:
      - समारोह के बिना व्यंजन क्या होगा?
      - छिलका स्वाद कैसे वितरित करता है?
      - अनुष्ठान और दुर्लभता के बीच क्या संबंध है?
  - id: it_spaghetti_twist
    name: स्पेगेटी का मोड़
    prompt: |
      इतालवी स्पेगेटी को कांटे से घुमाते हैं—चम्मच नहीं। मोड़ सांस्कृतिक है। गति को देखें। यह क्या हासिल करता है?
    follow_ups:
      - मोड़ के बिना बाइट क्या होगी?
      - इशारा भोजन को कैसे आकार देता है?
      - बरतन और परंपरा के बीच क्या संबंध है?
  - id: it_caprese_layers
    name: कैपरी की परतें
    prompt: |
      कैपरी टमाटर, मोज़ेरेला, तुलसी की परतें लगाता है। परतें सरल हैं। रंग पर विचार करें—लाल, सफेद, हरा। प्लेट एक झंडा है।
    follow_ups:
      - क्रम के बिना व्यंजन क्या होगा?
      - परतें सद्भाव कैसे बनाती हैं?
      - रंग और स्वाद के बीच क्या संबंध है?
  - id: it_polenta_set
    name: पोलेंटा सेट
    prompt: |
      पोलेंटा ठंडा होने पर सेट हो जाता है—नरम से फर्म। तापमान पर विचार करें। गर्म होने पर क्या होगा? ठंडा? बनावट समय का एक कार्य है।
    follow_ups:
      - अगर कभी ठंडा न हो तो पोलेंटा क्या होगा?
      - सेटिंग व्यंजन को कैसे बदलती है?
      - गर्मी और संरचना के बीच क्या संबंध है?
  - id: it_amaro_finish
    name: अमरो का समापन
    prompt: |
      अमरो भोजन को समाप्त करता है—कड़वा, पाचक। कड़वाहट जानबूझकर होती है। यह तालू पर क्या करता है? शरीर पर?
    follow_ups:
      - अमरो के बिना भोजन क्या होगा?
      - कड़वा जीभ को कैसे रीसेट करता है?
      - कड़वा और समापन के बीच क्या संबंध है?
  - id: it_lardo_spread
    name: लार्डो का प्रसार
    prompt: |
      लार्डो ठीक किया हुआ सूअर का मांस वसा है—ब्रेड पर फैलाया हुआ, पिघलता हुआ। वसा पर विचार करें। यह कहाँ से आया? यह क्या ले जाता है?
    follow_ups:
      - लार्डो के बिना ब्रेड क्या होगी?
      - वसा स्वाद को कैसे ले जाती है?
      - वसा और संरक्षण के बीच क्या संबंध है?
  - id: it_sardine_silver
    name: सार्डिन चांदी
    prompt: |
      ताजा सार्डिन चमकते हैं—चांदी की त्वचा, साबुत। मछली छोटी, तैलीय होती है। पैमाने पर विचार करें। एक बड़ी मछली क्या बदलेगी?
    follow_ups:
      - तेल के बिना व्यंजन क्या होगा?
      - आकार पकाने को कैसे प्रभावित करता है?
      - छोटे और तीव्र के बीच क्या संबंध है?
  - id: it_burrata_break
    name: बुर्राटा का टूटना
    prompt: |
