# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Dutch)

domains:
  art:
    name: Manieren om naar Kunst te Kijken
    description: |
      Kaarten om je perspectief te verschuiven bij het bekijken van kunst. Elk biedt een ander
      perspectief - van licht en schaduw tot introducties en emotie - om te verdiepen hoe je
      kunstwerken ziet en ermee omgaat.
  urban_jungle:
    name: Stedelijke Jungle
    description: |
      In plaats van alleen door een stad te lopen, kijk je ernaar als een levend organisme.
      Kaarten richten zich op de littekens van oude gebouwen, de choreografie van verkeer,
      en de geheime levens van steegjes.
  culinary_lab:
    name: Culinaire Lab
    description: |
      Verschuiven van smakelijk naar transformerend. Verken de chemie van een hap,
      de geschiedenis van een ingrediënt, en de soundtrack van een restaurant.
  natural_microcosm:
    name: Natuurlijke Microkosmos
    description: |
      Perfect voor een park of een achtertuin. Deze lens richt zich op de onzichtbare
      techniek van een blad, het slow-motion leven van een rots, of de territoriale
      drama's van insecten.
  human_interface:
    name: De Menselijke Interface
    description: |
      De alledaagse ruimtes waar mensen elkaar ontmoeten - koffiehuizen, OV-knooppunten,
      werkplekken, winkels, openbare parken. Kaarten richten zich op wachtrij choreografie,
      territoriale claims, onzichtbare scripts, en de antropologie van gedeelde ruimte.
  california_superbloom:
    name: California Superbloom
    description: |
      De efemere uitbarsting van wilde bloemen na de winterregen. Kaarten richten zich op kleur,
      schaal, bestuivers, geologie, weer, en het vluchtige spektakel van de bloei.
decks:
  - id: ways_of_looking_at_art
    name: Manieren om naar Kunst te Kijken
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      50 kaarten om je perspectief te verschuiven bij het bekijken van kunst. Elke kaart biedt een
      ander perspectief - van licht en schaduw tot introducties en emotie - om te verdiepen hoe je
      kunstwerken ziet en ermee omgaat.
    domain: art
  - id: ways_of_looking_at_california_superbloom
    name: Manieren om naar de California Superbloom te Kijken
    path: perspective-decks/ways-of-looking-at-california-superbloom.yaml
    description: |
      20 kaarten om je perspectief te verschuiven bij het ervaren van de California
      superbloom. Elke kaart biedt een ander perspectief - van bestuivers en
      geologie tot licht, geur en vergankelijkheid - om te verdiepen hoe je
      wilde bloemen en de efemere kleuruitbarsting ziet.
    domain: california_superbloom
  - id: urban_jungle_new_york
