# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Arabic)

domains:
  art:
    name: الفن
    description: |
      بطاقات لتغيير منظورك عند مشاهدة الفن. كل بطاقة تقدم عدسة مختلفة—
      من الضوء والظل إلى المقدمات والعواطف—لتعميق كيفية رؤيتك للأعمال الفنية
      وتفاعلك معها.
  urban_jungle:
    name: الغابة الحضرية
    description: |
      بدلاً من مجرد المشي في المدينة، انظر إليها ككائن حي. تركز البطاقات على
      ندوب المباني القديمة، ورقصة المرور، والحياة السرية للأزقة.
  culinary_lab:
    name: المختبر الطهوي
    description: |
      الانتقال من المذاق إلى التحول. استكشف كيمياء اللقمة، وتاريخ المكون،
      والموسيقى التصويرية للمطعم.
  natural_microcosm:
    name: العالم المصغر الطبيعي
    description: |
      مثالي لحديقة أو فناء خلفي. تركز هذه العدسة على الهندسة غير المرئية
      للورقة، والحياة البطيئة للصخرة، أو الدراما الإقليمية للحشرات.
  human_interface:
    name: الواجهة البشرية
    description: |
      المساحات اليومية التي يلتقي فيها البشر—المقاهي، ومراكز النقل، وأماكن
      العمل، والمتاجر، والمتنزهات العامة. تركز البطاقات على رقصة الانتظار،
      المطالبات الإقليمية، النصوص غير المرئية، وأنثروبولوجيا المساحة المشتركة.
  california_superbloom:
    name: الإزهار الخارق في كاليفورنيا
    description: |
      الانفجار المؤقت للزهور البرية بعد أمطار الشتاء. تركز البطاقات على اللون،
      المقياس، الملقحات، الجيولوجيا، الطقس، والمشهد العابر للإزهار.
