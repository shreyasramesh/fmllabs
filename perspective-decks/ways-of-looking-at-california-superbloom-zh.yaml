# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# 观赏加州超级花展的不同视角 (Mandarin Chinese)

id: ways_of_looking_at_california_superbloom
name: 观赏加州超级花展的不同视角
description: |
  帮助您在体验加州超级花展时转变视角的卡片。
  每张卡片都提供了一个不同的视角，以加深您对野花、山坡以及冬季雨后短暂绚烂色彩的看法。
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: 造就这一切的雨水
    prompt: |
      在鲜花盛开之前，是雨水。想象一下滋养土壤的风暴，以及潜藏在地下的种子。
      需要什么样的条件才能促成这次盛开？追溯超级花展的起源。
    follow_ups:
      - 如果雨水更多或更少，会有什么不同？
      - 一片山坡上可能隐藏着多少年的休眠期？
      - 这个时刻从未有保证，这意味着什么？
  - id: one_species_at_a_time
    name: 一次只看一种植物
    prompt: |
      选择一种野花，并专注于它。橙色的罂粟花、紫色的鲁冰花、黄色的金田野——
      暂时忽略其他一切。只关注一种植物会如何改变您的所见？
    follow_ups:
      - 这种植物在哪里占主导地位——又在哪里退居次位？
      - 如果只有这种花盛开，山坡会是什么样子？
      - 在其他植物中，它如何保持自己的特色？
  - id: pollinators_view
    name: 传粉者的视角
    prompt: |
      想象您是一只蜜蜂、一只蝴蝶或一只蜂鸟。什么会吸引您？您会先拜访哪些花？
      从离花瓣只有几英寸的高度看，这片景色是什么样的？
    follow_ups:
      - 哪些图案会指引您的路径？
      - 您会跳过哪些花——为什么？
      - 尺度如何改变体验？
  - id: ground_level
    name: 地面视角
    prompt: |
      降低身姿。趴在地上或跪下。从土壤的角度看超级花展——茎秆向上生长，
      花瓣在您上方拱起，天空是遥远的条带。
    follow_ups:
      - 从站立的高度错过了什么？
      - 地面感觉如何？
      - 甲虫从这里会看到什么？
  - id: time_lapse
    name: 延时摄影
    prompt: |
      超级花展是一个更长故事中的一个瞬间。想象一下山坡的快进播放：
      绿色的嫩芽、初开的花蕾、色彩的顶峰，然后逐渐褪色。这场盛会持续多久？
      之前和之后是什么？
    follow_ups:
      - 如果只能去一次，您会选择什么时候去？
      - 当您到达时，什么已经消失了？
      - 当色彩褪去时，什么会留下？
  - id: the_chemistry_of_color
    name: 色彩的化学
    prompt: |
      专注于颜料。橙色、紫色、黄色、蓝色——是什么造就了每一种色调？
      它们如何相互作用？颜色在哪里冲突，在哪里和谐？
      将山坡视为一个调色板。
    follow_ups:
      - 您会添加或减去什么颜色？
      - 光线如何随着一天中的时间改变颜色？
      - 如果是黑白照片，会是什么样子？
  - id: negative_space
    name: 负空间
    prompt: |
      看看不是花的部分。天空、裸露的土壤、花丛间的空隙。
      空白空间如何塑造您所见？感受缺失之物的意义。
    follow_ups:
      - 空白在哪里集中？
      - 什么会填补这些空隙——它应该填补吗？
      - 负空间如何将构图凝聚在一起？
  - id: the_path_through
    name: 穿行之路
    prompt: |
      注意小径——无论是人类、动物还是风吹形成的。人们在哪里行走？
      景观在哪里抵抗通行？在花丛中描绘一条小径，并询问沿着它走需要付出什么代价。
    follow_ups:
      - 不在那里行走，您会保护什么？
      - 小径想带您去哪里？
      - 留在小径上，您会错过什么？
  - id: geology_beneath
    name: 地下的地质
    prompt: |
      鲜花坐落在数百万年的地质之上。土壤下面有什么岩石？
      是什么塑造了这些山丘？让超级花展将您与脚下的深厚时光联系起来。
    follow_ups:
      - 地质如何影响这里的生长？
      - 在山丘形成之前，这里会是什么样子？
      - 当鲜花消失后，什么会留下？
  - id: scent_and_sound
    name: 气味与声音
    prompt: |
      闭上眼睛。您闻到什么？花粉、尘土、鼠尾草、湿润的泥土？
      您听到什么？蜜蜂、风、脚步声、寂静？让非视觉感官引领片刻。
    follow_ups:
      - 您会添加什么声音来捕捉这次体验？
      - 随着您的移动，气味如何变化？
      - 如果只看，您会错过什么？
  - id: light_and_shadow
    name: 光与影
    prompt: |
      观察光线如何在山坡上移动。清晨、中午、傍晚——太阳的角度如何改变花朵？
      阴影落在哪里？什么被揭示，什么被隐藏？
    follow_ups:
      - 什么时候的光线感觉最生动？
      - 您在拂晓时会看到什么，而在正午会错过什么？
      - 阴影如何塑造景观？
  - id: seed_to_flower
    name: 从种子到花朵
    prompt: |
      追踪一株植物从种子到盛开的全过程。它是如何来到这里的？风、动物、水？
      它等了多久？当花瓣凋谢时，它会变成什么？
      跟随一个生命度过它的周期。
    follow_ups:
      - 种子在地下会看到什么？
      - 植物会留下什么？
      - 这片山坡上代表着多少代？
  - id: micro_vs_macro
    name: 微观与宏观
    prompt: |
      放大到一个花瓣、一滴露水、一粒花粉。然后退回到整个山坡、山谷、州。
      尺度如何改变超级花展的意义？
    follow_ups:
      - 在一个尺度上看不见而另一个尺度上显而易见的是什么？
      - 您的注意力自然会停留在哪里？
      - 宏观视角如何改变微观——反之亦然？
  - id: weathers_hand
    name: 天气的介入
    prompt: |
      超级花展是天气合作的成果。雨水、阳光、风、温度——
      每种都有其作用。将天气想象成一个共同创造者。它决定了什么？
      它又保留了什么？
    follow_ups:
      - 不同的冬天会产生什么？
      - 今天的天气如何影响您的体验？
      - 如果鲜花会说话，它们会对天气说什么？
  - id: human_witness
    name: 人类见证
    prompt: |
      您不是第一个看到这一切的人。还有谁曾站在这里？牧民、
      原住民、摄影师、旅行者。您的存在如何改变这个地方？见证意味着什么？
    follow_ups:
      - 他们会看到什么而您看不到？
      - 您会带走什么？
      - 见证与拥有或索取有何不同？
  - id: the_next_year
    name: 来年
    prompt: |
      这次盛开不会完全重现。明年可能是干旱、火灾，或不同物种的组合。
      想象一下一年后回来。您希望找到什么？您又会准备失去什么？
    follow_ups:
      - 是什么让这一刻不可替代？
      - 您会告诉未来的自己什么？
      - 无常如何加深体验？
  - id: texture_and_touch
    name: 纹理与触感
    prompt: |
      用手穿过花丛会是什么感觉？柔软的花瓣、脆弱的茎、粘稠的花粉、粗糙的叶子。
      想象一下触感而不触摸——或者，在允许的情况下，轻轻触摸并注意。
    follow_ups:
      - 哪种纹理最让您惊讶？
      - 您会避免触摸什么——为什么？
      - 纹理如何增添色彩本身无法传达的东西？
  - id: before_and_after
    name: 之前与之后
    prompt: |
      想象一下旱季的山坡——棕色、休眠、看似死亡。
      现在同时持有这两个画面：之前和之后。这种对比揭示了关于韧性、耐心和转变的什么？
    follow_ups:
      - 只看到旱季的人会错过什么？
      - 休眠的记忆如何丰富了这次盛开？
      - 这还唤起了哪些其他的“之前与之后”的时刻？
  - id: make_it_a_mixtape
    name: 制作一个混音带
    prompt: |
      什么样的音乐会伴随这片景色？为超级花展创建一个播放列表。
      什么样的节奏、什么样的情绪、什么样的乐器？让鲜花 gợi ý  the soundtrack。
    follow_ups:
      - 开场曲是什么？
      - 音乐与鲜花之间有什么共同点——节奏、色彩、感觉？
      - 播放列表在一天中的不同时间如何变化？
  - id: take_one_thing_home
    name: 带走一样东西
    prompt: |
      您不能带走鲜花——它们属于这里。但您可以带走一段记忆、一种感觉、一个问题。
      您会带走什么东西？您将如何保存它而不摘下一朵花？
    follow_ups:
      - 您会向无法来的人展示什么？
      - 您以后会如何描述它？
      - 您会故意留下什么？
