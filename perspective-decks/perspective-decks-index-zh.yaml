# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Mandarin Chinese)

domains:
  art:
    name: 观赏艺术的方式
    description: |
      用于转变您在观看艺术时的视角的卡片。每张卡片提供一个不同的视角——
      从光影到介绍和情感——以加深您如何看待和欣赏艺术作品。
  urban_jungle:
    name: 都市丛林
    description: |
      您不再仅仅是走过城市，而是将其视为一个生命有机体。卡片关注旧建筑的
      伤痕、交通的编排以及小巷里的秘密生活。
  culinary_lab:
    name: 烹饪实验室
    description: |
      从美味到革新。探索一咬的化学反应、食材的历史以及餐厅的背景音乐。
  natural_microcosm:
    name: 自然微观世界
    description: |
      非常适合公园或后院。这个视角关注一片叶子的无形工程、一块石头
      的慢动作生命，或昆虫的领地争夺战。
  human_interface:
    name: 人类界面
    description: |
      人类相遇的日常空间——咖啡馆、交通枢纽、工作场所、零售店、公园。
      卡片关注排队编排、领地宣示、无形脚本以及共享空间的人类学。
  california_superbloom:
    name: 加州超级花期
    description: |
      冬季降雨后短暂的野花爆发。卡片关注色彩、规模、传粉者、地质、天气
      以及花期转瞬即逝的奇观。
decks:
  - id: ways_of_looking_at_art
    name: 观赏艺术的方式
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      50 张卡片，用于转变您在观看艺术时的视角。每张卡片提供一个不同的视角——
      从光影到介绍和情感——以加深您如何看待和欣赏艺术作品。
    domain: art
  - id: ways_of_looking_at_california_superbloom
    name: 观赏加州超级花期的方式
    path: perspective-decks/ways-of-looking-at-california-superbloom.yaml
    description: |
      20 张卡片，用于转变您在体验加州超级花期时的视角。每张卡片提供一个不同的视角——
      从传粉者和地质到光线、气味和短暂性——以加深您如何看待野花和转瞬即逝的色彩爆发。
    domain: california_superbloom
