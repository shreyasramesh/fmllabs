# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Человеческий интерфейс — Кофейня (Russian)

id: human_interface_coffee_shop
name: Человеческий интерфейс — Кофейня
description: 50 карточек, чтобы изменить ваш взгляд на кофейню — от хореографии очереди и территорий ноутбуков до "третьего места", невидимых сценариев и кофе как ритуала.
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: Хореография очереди
    prompt: |
      Посмотрите на очередь у стойки. Тела выстраиваются — наклон вперед,
      проверка телефона, легкое переступание. В очереди есть ритм. Кто
      занимает пространство? Какие негласные правила определяют, кто где
      стоит?
    follow_ups:
      - Как очередь формирует предвкушение?
      - Что произойдет, если все проигнорируют порядок?
      - Какова связь между ожиданием и принадлежностью?
  - id: hi_cs_laptop_territory
    name: Территория ноутбука
    prompt: |
      Открытый ноутбук на столе занимает пространство. Чашка рядом, сумка
      на стуле. Наблюдайте за границами. Сколько реального пространства
      занимает один человек? Что сигнализирует "занято"?
    follow_ups:
      - Как ноутбук расширяет тело?
      - Каким было бы пространство без устройств?
      - Какова связь между территорией и продолжительностью?
  - id: hi_cs_third_place
    name: Третье место
    prompt: |
      Не дом, не работа — кофейня является "третьим местом". Люди приходят,
      чтобы побыть наедине вместе. Обратите внимание, кто остается. Кто
      быстро уходит? Пространство обладает другим социальным контрактом.
    follow_ups:
      - Каким был бы город без "третьих мест"?
      - Чем кофейня отличается от библиотеки?
      - Какова связь между местом и идентичностью?
  - id: hi_cs_invisible_script
    name: Невидимый сценарий
    prompt: |
      Заказать, оплатить, подождать, получить, найти место. Сценарий
      невидим, пока кто-то его не нарушит. Посмотрите на новичка. Чего
      он не знает? Сценарий кодирует принадлежность.
    follow_ups:
      - Как сценарий исключает?
      - Что произойдет, если сценарий будет записан?
      - Какова связь между сценарием и беглостью?
  - id: hi_cs_coffee_ritual
    name: Кофе как ритуал
    prompt: |
      Напиток вторичен. Ритуал первичнен — прогулка, заказ, первый глоток.
      Заметьте свои собственные движения. Что вы потеряете, если кофе
      привезут вам на дом?
    follow_ups:
      - Как ритуал отмечает переход?
      - Каким был бы день без остановки в кофейне?
      - Какова связь между ритуалом и готовностью?
  - id: hi_cs_counter_handoff
    name: Передача у стойки
    prompt: |
      Бариста зовет имя. Рука тянется. Передача — это момент контакта
      между незнакомцами. Наблюдайте за обменом. Что передается, кроме
      чашки?
    follow_ups:
      - Как передача создает связь?
      - Что изменится с бариста-роботом?
      - Какова связь между передачей и доверием?
  - id: hi_cs_power_outlet_hunt
    name: Охота за розеткой
    prompt: |
      Глаза сканируют стены, пол, под столами. Охота за розеткой — это
      территориальная борьба. Кто пришел первым? Розетка определяет, где
      сидеть. География следует за электричеством.
    follow_ups:
      - Как расположение розеток формирует пространство?
      - Каким было бы пространство с беспроводной зарядкой?
      - Какова связь между вилкой и постоянством?
  - id: hi_cs_solo_table
    name: Столик на одного
    prompt: |
      Один человек за столом на четверых. Пустые стулья — буфер.
      Наблюдайте за расстановкой. Это защита? Предпочтение? Столик на
      одного занимает место против толпы.
    follow_ups:
      - Как столик на одного сигнализирует о намерении?
      - Что произойдет, если кто-то попросит подсесть?
      - Какова связь между одиночеством и видимостью?
  - id: hi_cs_milk_pour
    name: Наливание молока
    prompt: |
      Бариста наливает молоко в эспрессо — с латте-артом или без. Наливание
      — это мастерство. Наблюдайте за движением. Что получает клиент,
      кроме напитка? Наливание — это представление.
    follow_ups:
      - Как наливание формирует ожидания?
      - Чем был бы напиток без мастерства?
      - Какова связь между наливанием и ценой?
  - id: hi_cs_name_on_cup
    name: Имя на чашке
    prompt: |
      Имя — настоящее, вымышленное, искаженное — на чашке. Оно
      персонализирует транзакцию. Имя передается от рта к руке к стойке.
      Что делает имя для обмена?
    follow_ups:
      - Как имя создает узнавание?
      - Чем был бы заказ без имени?
      - Какова связь между именем и анонимностью?
  - id: hi_cs_window_seat
    name: Место у окна
    prompt: |
      Место у окна — самое желанное. Вы смотрите на улицу; ваша спина
      защищена. Наблюдайте, кто его выбирает. Окно обрамляет внешний мир,
      пока вы остаетесь внутри. Что дает вид?
    follow_ups:
      - Как место у окна формирует опыт?
      - Каким было бы пространство без окон?
      - Какова связь между внутренним и внешним?
  - id: hi_cs_linger_versus_grab
    name: Остаться или взять с собой
    prompt: |
      Некоторые берут свою чашку и уходят. Другие остаются на часы.
      Одно и то же пространство вмещает обоих. Заметьте это разделение.
      Что определяет, кто остается? Кофейня вмещает разные скорости.
    follow_ups:
      - Как долгое пребывание влияет на бизнес?
      - Каким было бы пространство, если бы все уходили быстро?
      - Какова связь между скоростью и принадлежностью?
  - id: hi_cs_regular_recognition
    name: Узнавание постоянного клиента
    prompt: |
      "Как обычно?" Бариста знает. Постоянный клиент узнаваем. Наблюдайте
      за обменом. Что меняется, когда вас узнают? "Как обычно" — это
      сокращение и заявление о своем месте.
    follow_ups:
      - Как узнавание создает лояльность?
      - Что потерял бы постоянный клиент без этого?
      - Какова связь между "как обычно" и идентичностью?
  - id: hi_cs_soundscape
    name: Звуковой ландшафт
    prompt: |
      Пар, помол, болтовня, музыка. В кофейне есть свой звуковой
      ландшафт. Закройте глаза. Разберите слои. Что постоянно? Какой
      ритм? Звуковой ландшафт формирует настроение.
    follow_ups:
      - Как звуковой ландшафт влияет на концентрацию?
      - Каким было бы пространство в тишине?
      - Какова связь между звуком и продуктивностью?
  - id: hi_cs_shared_table
    name: Общий стол
    prompt: |
      Незнакомцы сидят за одним длинным столом. Никто не говорит. Общий
      стол — это близость без связи. Наблюдайте за границами. Насколько
      близко — слишком близко? Стол поддерживает хрупкий баланс.
    follow_ups:
      - Чем общий стол отличается от столика на одного?
      - Что произойдет, если кто-то начнет разговор?
      - Какова связь между близостью и конфиденциальностью?
  - id: hi_cs_tip_jar
    name: Банка для чаевых
    prompt: |
      Монеты и купюры накапливаются. Банка для чаевых видна, пассивна.
      Кто оставляет чаевые? Кто нет? Банка стоит на границе транзакции и
      подарка. Что означают чаевые?
    follow_ups:
      - Как банка для чаевых формирует обмен?
      - Каким был бы прилавок без нее?
      - Какова связь между чаевыми и благодарностью?
  - id: hi_cs_cup_sleeve
    name: Манжета для чашки
    prompt: |
      Манжета защищает руку от жара. Она одноразовая, брендированная.
      Обратите внимание, как люди держат чашку с ней. Манжета — это
      небольшой интерфейс между телом и напитком.
    follow_ups:
      - Как манжета меняет хватку?
      - Каким был бы опыт без нее?
      - Какова связь между манжетой и брендингом?
  - id: hi_cs_morning_rush
    name: Утренний час пик
    prompt: |
      Перед работой очередь вытягивается. Утренний час пик имеет свой
      темп. Наблюдайте за скоростью. Все идут куда-то еще. Кофейня — это
      перевалочный пункт. Что извлекает час пик?
    follow_ups:
      - Как час пик формирует персонал?
      - Каким было бы утро без остановки?
      - Какова связь между часом пик и ритуалом?
  - id: hi_cs_afternoon_slow
    name: Дневное затишье
    prompt: |
      Середина дня, толпа редеет. Те, кто остается, другие — студенты,
      фрилансеры, неспешные. Темп меняется. Заметьте перемену. День
      вмещает другой тип клиентов.
    follow_ups:
      - Чем день отличается от утра?
      - Каким было бы пространство без периода затишья?
      - Какова связь между временем и заполняемостью?
  - id: hi_cs_wifi_password
    name: Пароль WiFi
    prompt: |
      Пароль на стене, на чеке, на доске. Нужно спросить или посмотреть.
      WiFi — это плата за вход для некоторых. Наблюдайте, кто подключается.
      Кто не нуждается в этом?
    follow_ups:
      - Как WiFi определяет, кто остается?
      - Каким было бы пространство без него?
      - Какова связь между подключением и потреблением?
  - id: hi_cs_crossword_solver
    name: Решающий кроссворд
    prompt: |
      Кто-то решает кроссворд, в газете или на телефоне. Занятие
      индивидуальное, но видимое. Кроссворд отмечает время. Он говорит: "Я
      остаюсь". Что это занятие сигнализирует другим?
    follow_ups:
      - Как кроссворд создает "пузырь"?
      - Что делал бы решающий без него?
      - Какова связь между занятием и занятостью места?
  - id: hi_cs_meeting_here
    name: Встреча здесь
    prompt: |
      Два человека встречаются — собеседование, встреча старых друзей,
      первое свидание. Кофейня — нейтральная территория. Наблюдайте за
      организацией. Кто выбрал место? Стол становится сценой для встречи.
    follow_ups:
      - Как кофейня способствует встрече?
      - Какой была бы встреча в офисе?
      - Какова связь между местом и встречей?
  - id: hi_cs_bathroom_key
    name: Ключ от туалета
    prompt: |
      Ключ от туалета на цепочке к блоку, лопатке, гигантской ложке.
      Нужно спросить. Ключ — это небольшая проверка на принадлежность.
      Кто имеет право пользоваться туалетом?
    follow_ups:
      - Как ключ контролирует доступ?
      - Каким было бы пространство с открытыми туалетами?
      - Какова связь между ключом и доверием?
  - id: hi_cs_pastry_case
    name: Витрина с выпечкой
    prompt: |
      Круассаны, маффины, печенье за стеклом. Витрина — это соблазн и
      демонстрация. Обратите внимание, что продается. Что остается слишком
      долго? Витрина — это переговоры между желанием и отсрочкой.
    follow_ups:
      - Как витрина формирует заказ?
      - Каким был бы прилавок без нее?
      - Какова связь между демонстрацией и желанием?
  - id: hi_cs_phone_glance
    name: Взгляд на телефон
    prompt: |
      Все смотрят на свои телефоны. Взгляд — это перерыв, проверка,
      отступление. Наблюдайте за ритмом. Как часто? Как долго? Телефон —
      это портал из комнаты.
    follow_ups:
      - Как телефон формирует присутствие?
      - Каким было бы пространство без телефонов?
      - Какова связь между взглядом и вниманием?
  - id: hi_cs_steam_rise
    name: Поднимающийся пар
    prompt: |
      Пар поднимается из свежей чашки. Жар несет аромат. Пар эфемерный —
      исчезает за минуты. Заметьте его. Что пар добавляет к моменту перед
      первым глотком?
    follow_ups:
      - Как пар формирует предвкушение?
      - Чем был бы напиток без него?
      - Какова связь между паром и ритуалом?
  - id: hi_cs_bag_on_chair
    name: Сумка на стуле
    prompt: |
      Сумка занимает стул рядом с сидящим. Она сохраняет место, расширяет
      территорию. Сумка — это заполнитель. Наблюдайте за сообщением:
      "Это место занято". Что произойдет, если кто-то попросит сесть?
    follow_ups:
      - Как сумка занимает место?
      - Каким было бы помещение без "сохранения" стульев сумками?
      - Какова связь между предметом и территорией?
  - id: hi_cs_espresso_shot
    name: Шот эспрессо
    prompt: |
      Один шот — быстрый, интенсивный. Пьющий эспрессо часто стоит. Шот —
      это знак препинания в дне. Наблюдайте за ритуалом. Вошел, выпил, вышел.
      Что дает шот?
    follow_ups:
      - Чем шот отличается от латте?
      - Чем была бы кофейня без эспрессо?
      - Какова связь между шотом и скоростью?
  - id: hi_cs_cold_brew_tap
    name: Кран с колд-брю
    prompt: |
      Колд-брю из крана — как пиво. Подача другая. Нет пара, нет ожидания.
      Клиент колд-брю хочет чего-то другого. Обратите внимание на выбор.
      Что сигнализирует колд-брю?
    follow_ups:
      - Как колд-брю меняет опыт?
      - Чем было бы меню без него?
      - Какова связь между температурой и идентичностью?
  - id: hi_cs_chalkboard_menu
    name: Меню на меловой доске
    prompt: |
      Меню написано от руки — мел на доске. Оно меняется. Почерк — это
      индивидуальность. Обратите внимание, что перечислено, а что нет.
      Меловая доска говорит: "Мы принимаем решения здесь".
    follow_ups:
      - Как меловая доска формирует бренд?
      - Какая была бы стена с напечатанным меню?
      - Какова связь между рукой и аутентичностью?
  - id: hi_cs_leaving_cup
    name: Оставленная чашка
    prompt: |
      Чашка, оставленная на столе — пустая, брошенная. Некоторые убирают
      сами; некоторые — нет. Оставленная чашка — это небольшая проверка
      на внимательность. Кто убирает? Кто оставляет? Чашка отмечает конец
      пребывания.
    follow_ups:
      - Как уборка формирует пространство?
      - Чем была бы кофейня, если бы все оставляли чашки?
      - Какова связь между уходом и принадлежностью?
  - id: hi_cs_headphones_bubble
    name: Пузырь из наушников
    prompt: |
      Наушники создают пузырь. Носящий их присутствует, но недоступен.
      Пузырь говорит: "не прерывай". Наблюдайте за границей. Как пузырь
      формирует социальное поле?
    follow_ups:
      - Как наушники способствуют концентрации?
      - Каким было бы пространство без них?
      - Какова связь между пузырем и продуктивностью?
  - id: hi_cs_corner_booth
    name: Угловая кабинка
    prompt: |
      Угловая кабинка желанна — спиной к стене, обзор комнаты. Она
      защищена. Наблюдайте, кто ее занимает. Угол имеет другую психологию,
      чем центр.
    follow_ups:
      - Как угол формирует опыт?
      - Какой была бы комната без углов?
      - Какова связь между положением и безопасностью?
  - id: hi_cs_sugar_station
    name: Станция сахара
    prompt: |
      Сахар, салфетки, крышки, трубочки — станция самообслуживания. Люди
      здесь персонализируют. Станция — это пауза между стойкой и местом.
      Наблюдайте за выбором. Что люди добавляют?
    follow_ups:
      - Как станция расширяет транзакцию?
      - Каким был бы прилавок без нее?
      - Какова связь между персонализацией и контролем?
  - id: hi_cs_barista_banter
    name: Болтовня бариста
    prompt: |
      Бариста болтает с постоянным клиентом. Болтовня — это представление
      и связь. Другие слушают или нет. Болтовня создает атмосферу. Что она
      добавляет в комнату?
    follow_ups:
      - Как болтовня формирует культуру?
      - Каким был бы прилавок без нее?
      - Какова связь между болтовней и принадлежностью?
  - id: hi_cs_takeaway_stack
    name: Стопка заказов на вынос
    prompt: |
      Чашки стопкой у зоны выдачи — имена названы, чашки забраны. Стопка —
      это временный архив заказов. Наблюдайте за потоком. Кто ждет? Кто
      хватает и уходит? Стопка — это порядок, возникающий из хаоса.
    follow_ups:
      - Как стопка управляет часом пик?
      - Каким был бы прилавок без нее?
      - Какова связь между стопкой и последовательностью?
  - id: hi_cs_plant_by_window
    name: Растение у окна
    prompt: |
      У окна стоит растение — сциндапсус, суккулент. Это декор и жизнь.
      Растение никому не принадлежит. Оно смягчает пространство. Что
      растение добавляет в комнату?
    follow_ups:
      - Как растение формирует атмосферу?
      - Каким было бы окно без него?
      - Какова связь между растением и заботой?
  - id: hi_cs_closing_time
    name: Время закрытия
    prompt: |
      "Мы закрываемся через пятнадцать минут". Объявление меняет комнату.
