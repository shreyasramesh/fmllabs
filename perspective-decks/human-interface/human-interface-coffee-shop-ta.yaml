# மனித இடைமுகம் — காபி ஷாப் (Tamil)

id: human_interface_coffee_shop
name: மனித இடைமுகம் — காபி ஷாப்
description: காபி ஷாப்பை நீங்கள் பார்க்கும் விதத்தை மாற்ற 50 அட்டைகள் — வரிசை நடனம் மற்றும் மடிக்கணினிப் பகுதிகள் முதல் மூன்றாவது இடம், கண்ணுக்குத் தெரியாத திரைக்கதைகள் மற்றும் சடங்காகக் காபி வரை.
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: வரிசை நடனம்
    prompt: |
      கவுண்டரில் உள்ள வரிசையைப் பாருங்கள். உடல்கள் தங்களைத் தாங்களே
      அமைத்துக் கொள்கின்றன — முன்னோக்கிச் சாய்வது, தொலைபேசியைச் சோதிப்பது,
      மெதுவாக நகர்வது. வரிசைக்கு ஒரு தாளம் உண்டு. யார் இடத்தை வைத்திருக்கிறார்கள்?
      யார் எங்கே நிற்கிறார்கள் என்பதை எந்த எழுதப்படாத விதிகள் நிர்வகிக்கின்றன?
    follow_ups:
      - காத்திருப்பு எதிர்பார்ப்பை எவ்வாறு வடிவமைக்கிறது?
      - எல்லோரும் வரிசையைப் புறக்கணித்தால் என்ன நடக்கும்?
      - காத்திருப்புக்கும் சொந்தமாக இருப்பதற்கும் என்ன தொடர்பு?
  - id: hi_cs_laptop_territory
    name: மடிக்கணினிப் பகுதி
    prompt: |
      மேஜையில் திறந்திருக்கும் மடிக்கணினி ஒரு இடத்தை உரிமை கோருகிறது.
      அதற்கு அருகில் உள்ள கப், நாற்காலியில் உள்ள பை. எல்லைகளைக் கவனியுங்கள்.
      ஒரு நபர் எவ்வளவு இடத்தை ஆக்கிரமிக்கிறார்? "எடுக்கப்பட்டது" என்று என்ன
      சமிக்ஞைகள் காட்டுகின்றன?
    follow_ups:
      - மடிக்கணினி உடலை எவ்வாறு நீட்டிக்கிறது?
      - சாதனங்கள் இல்லாமல் அந்த இடம் எப்படி இருக்கும்?
      - பகுதிக்கும் கால அளவுக்கும் என்ன தொடர்பு?
  - id: hi_cs_third_place
    name: மூன்றாவது இடம்
    prompt: |
      வீடும் இல்லை, வேலையும் இல்லை — காபி ஷாப் ஒரு மூன்றாவது இடம்.
      மக்கள் தனியாக ஒன்றாக இருக்க வருகிறார்கள். யார் தங்குகிறார்கள், யார்
      விரைவாகச் செல்கிறார்கள் என்பதைக் கவனியுங்கள். அந்த இடம் ஒரு வெவ்வேறு
      சமூக ஒப்பந்தத்தைக் கொண்டுள்ளது.
    follow_ups:
      - மூன்றாவது இடங்கள் இல்லாமல் நகரம் எப்படி இருக்கும்?
      - நூலகத்திலிருந்து காபி ஷாப் எவ்வாறு வேறுபடுகிறது?
      - இடத்துக்கும் அடையாளத்துக்கும் என்ன தொடர்பு?
  - id: hi_cs_invisible_script
    name: கண்ணுக்குத் தெரியாத திரைக்கதை
    prompt: |
      ஆர்டர் செய், பணம் செலுத்து, காத்திரு, பெறு, இருக்கை கண்டுபிடி.
      யாராவது அதை மீறும் வரை திரைக்கதை கண்ணுக்குத் தெரியாது.
      முதல் முறை வருபவரைக் கவனியுங்கள். அவர்களுக்கு என்ன தெரியாது?
      திரைக்கதை சொந்தமாக இருப்பதைக் குறியீடாக்குகிறது.
    follow_ups:
      - திரைக்கதை எவ்வாறு விலக்குகிறது?
      - திரைக்கதை எழுதப்பட்டிருந்தால் என்ன நடக்கும்?
      - திரைக்கதைக்கும் சரளமாக இருப்பதற்கும் என்ன தொடர்பு?
  - id: hi_cs_coffee_ritual
    name: சடங்காகக் காபி
    prompt: |
      பானம் முக்கியமில்லை. சடங்கு முக்கியமானது — நடப்பது, ஆர்டர் செய்வது,
      முதல் சிப். உங்கள் சொந்த அசைவுகளைக் கவனியுங்கள். காபி உங்கள்
      கதவுக்கு வந்தால் நீங்கள் எதை இழப்பீர்கள்?
    follow_ups:
      - சடங்கு எவ்வாறு மாற்றத்தைக் குறிக்கிறது?
      - காபி நிறுத்தம் இல்லாமல் நாள் எப்படி இருக்கும்?
      - சடங்குக்கும் தயார்நிலைக்கும் என்ன தொடர்பு?
  - id: hi_cs_counter_handoff
    name: கவுண்டர் கைமாற்றம்
    prompt: |
      பாரிஸ்டா ஒரு பெயரை அழைக்கிறார். ஒரு கை நீள்கிறது. கைமாற்றம்
      அந்நியனுக்கும் அந்நியனுக்கும் இடையிலான ஒரு தொடர்பு தருணம்.
      பரிமாற்றத்தைக் கவனியுங்கள். கோப்பை தவிர வேறு என்ன பரிமாறப்படுகிறது?
    follow_ups:
      - கைமாற்றம் எவ்வாறு தொடர்பை உருவாக்குகிறது?
      - ஒரு ரோபோ பாரிஸ்டாவுடன் என்ன மாறும்?
      - கைமாற்றத்துக்கும் நம்பிக்கைக்கும் என்ன தொடர்பு?
  - id: hi_cs_power_outlet_hunt
    name: மின்சார அவுட்லெட் தேடல்
    prompt: |
      கண்கள் சுவர்கள், தரை, மேஜைகளுக்கு அடியில் தேடுகின்றன. அவுட்லெட்
      தேடல் பிராந்தியமானது. யார் முதலில் அங்கே சென்றார்கள்?
      அவுட்லெட் நீங்கள் எங்கே அமர்வீர்கள் என்பதை தீர்மானிக்கிறது.
      புவியியல் மின்சாரத்தைப் பின்பற்றுகிறது.
    follow_ups:
      - அவுட்லெட் அமைப்பு அறையை எவ்வாறு வடிவமைக்கிறது?
      - வயர்லெஸ் சக்தி இருந்தால் அந்த இடம் எப்படி இருக்கும்?
      - பிளகுக்கும் நிரந்தரத்துக்கும் என்ன தொடர்பு?
  - id: hi_cs_solo_table
    name: தனியான மேஜை
    prompt: |
      நான்கு பேருக்கான மேஜையில் ஒருவர். காலியான நாற்காலிகள் ஒரு இடையகமாக
      உள்ளன. ஏற்பாட்டைக் கவனியுங்கள். இது பாதுகாப்பா? விருப்பமா?
      தனியான மேஜை கூட்டத்திற்கு எதிராக இடத்தை வைத்திருக்கிறது.
    follow_ups:
      - தனியான மேஜை எவ்வாறு நோக்கத்தை சமிக்ஞை செய்கிறது?
      - யாராவது பகிர்ந்து கொள்ளக் கேட்டால் என்ன நடக்கும்?
      - தனிமைக்கும் தெரிவுநிலைக்கும் என்ன தொடர்பு?
  - id: hi_cs_milk_pour
    name: பால் ஊற்றுதல்
    prompt: |
      பாரிஸ்டா எஸ்பிரெசோவில் பால் ஊற்றுகிறார் — லேட்டே கலை இருந்தாலும் இல்லாவிட்டாலும்.
      ஊற்றுதல் ஒரு கைவினை. அசைவைக் கவனியுங்கள். பானத்தைத் தவிர வாடிக்கையாளர்
      வேறு என்ன பெறுகிறார்? ஊற்றுதல் ஒரு செயல்திறன்.
    follow_ups:
      - ஊற்றுதல் எதிர்பார்ப்பை எவ்வாறு வடிவமைக்கிறது?
      - கைவினை இல்லாமல் பானம் எப்படி இருக்கும்?
      - ஊற்றுதலுக்கும் விலைக்கும் என்ன தொடர்பு?
  - id: hi_cs_name_on_cup
    name: கோப்பையில் பெயர்
    prompt: |
      ஒரு பெயர் — உண்மையானது, போலியானது, தவறாக எழுதப்பட்டது — ஒரு கோப்பையில்.
      அது பரிமாற்றத்தை தனிப்பயனாக்குகிறது. பெயர் வாய் முதல் கை வரை,
      கவுண்டர் வரை பயணிக்கிறது. பரிமாற்றத்திற்காக பெயர் என்ன செய்கிறது?
    follow_ups:
      - பெயர் எவ்வாறு அங்கீகாரத்தை உருவாக்குகிறது?
      - பெயரில்லாமல் ஆர்டர் எப்படி இருக்கும்?
      - பெயருக்கும் அநாமதேயத்துக்கும் என்ன தொடர்பு?
  - id: hi_cs_window_seat
    name: ஜன்னல் இருக்கை
    prompt: |
      ஜன்னல் இருக்கை முக்கியமானது. நீங்கள் தெருவை எதிர்கொள்கிறீர்கள்; உங்கள்
      முதுகு பாதுகாக்கப்படுகிறது. யார் அதைத் தேர்ந்தெடுக்கிறார்கள் என்பதைக்
      கவனியுங்கள். ஜன்னல் வெளி உலகத்தை வடிவமைக்கிறது, நீங்கள் உள்ளே
      இருந்தாலும். பார்வை என்ன வழங்குகிறது?
    follow_ups:
      - ஜன்னல் இருக்கை அனுபவத்தை எவ்வாறு வடிவமைக்கிறது?
      - ஜன்னல்கள் இல்லாமல் அந்த இடம் எப்படி இருக்கும்?
      - உட்புறத்திற்கும் வெளிப்புறத்திற்கும் என்ன தொடர்பு?
  - id: hi_cs_linger_versus_grab
    name: தங்குவதா அல்லது விரைவாக எடுத்துச் செல்வதா
    prompt: |
      சிலர் தங்கள் கோப்பையை எடுத்துக்கொண்டு செல்கிறார்கள். மற்றவர்கள்
      பல மணிநேரம் தங்குகிறார்கள். ஒரே இடம் இரண்டையும் கொண்டுள்ளது.
      பிரிவினையைக் கவனியுங்கள். யார் தங்குகிறார்கள் என்பதை எது தீர்மானிக்கிறது?
      காபி ஷாப் வெவ்வேறு வேகங்களுக்கு இடமளிக்கிறது.
    follow_ups:
      - தங்குவது வணிகத்தை எவ்வாறு பாதிக்கிறது?
      - எல்லோரும் விரைவாக சென்றால் அந்த இடம் எப்படி இருக்கும்?
      - வேகத்துக்கும் சொந்தமாக இருப்பதற்கும் என்ன தொடர்பு?
  - id: hi_cs_regular_recognition
    name: வழக்கமான அங்கீகாரம்
    prompt: |
      "வழக்கமானதா?" பாரிஸ்டாவுக்குத் தெரியும். வழக்கமானவர் அறியப்படுகிறார்.
      பரிமாற்றத்தைக் கவனியுங்கள். நீங்கள் அங்கீகரிக்கப்படும்போது என்ன மாறுகிறது?
      வழக்கமானது ஒரு குறுக்குவழி — மற்றும் இடத்திற்கான ஒரு உரிமை.
    follow_ups:
      - அங்கீகாரம் எவ்வாறு விசுவாசத்தை உருவாக்குகிறது?
      - அதை இல்லாமல் வழக்கமானவர் என்ன இழப்பார்?
      - வழக்கமானதற்கும் அடையாளத்துக்கும் என்ன தொடர்பு?
  - id: hi_cs_soundscape
    name: ஒலிபரப்பு
    prompt: |
      நீராவி, அரைத்தல், அரட்டை, இசை. காபி ஷாப்புக்கு ஒரு ஒலிபரப்பு உண்டு.
      உங்கள் கண்களை மூடுங்கள். அடுக்குகளை வரைபடமாக்குங்கள். என்ன நிலையானது?
      தாளம் என்ன? ஒலிபரப்பு மனநிலையை வடிவமைக்கிறது.
    follow_ups:
      - ஒலிபரப்பு கவனத்தை எவ்வாறு பாதிக்கிறது?
      - அமைதியில் அந்த இடம் எப்படி இருக்கும்?
