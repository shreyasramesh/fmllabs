# ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಕಾಫಿ ಶಾಪ್ (Kannada)

id: human_interface_coffee_shop
name: ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಕಾಫಿ ಶಾಪ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ಕಾಫಿ ಶಾಪ್ ಅನ್ನು ನೀವು ನೋಡುವ ವಿಧಾನವನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ — ಸರದಿಯ ನೃತ್ಯ, ಲ್ಯಾಪ್‌ಟಾಪ್ ಪ್ರದೇಶಗಳಿಂದ ಹಿಡಿದು ಮೂರನೇ ಸ್ಥಳ, ಅಗೋಚರ ಲಿಪಿಗಳು, ಮತ್ತು ಕಾಫಿಯನ್ನು ಒಂದು ಆಚರಣೆಯಾಗಿ.
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: ಸರದಿ ನೃತ್ಯ
    prompt: |
      ಕೌಂಟರ್‌ನಲ್ಲಿನ ಸಾಲನ್ನು ಗಮನಿಸಿ. ದೇಹಗಳು ತಮ್ಮನ್ನು ಜೋಡಿಸಿಕೊಳ್ಳುತ್ತವೆ — ಮುಂದಕ್ಕೆ
      ಒರಗುವುದು, ಫೋನ್ ನೋಡುವುದು, ಸಣ್ಣ ಚಲನೆ. ಸಾಲಿನಲ್ಲಿ ಒಂದು ಲಯವಿದೆ. ಯಾರು ಜಾಗವನ್ನು
      ಹಿಡಿದಿದ್ದಾರೆ? ಯಾರು ಎಲ್ಲಿ ನಿಲ್ಲಬೇಕು ಎಂಬುದನ್ನು ಯಾವ ಅಲಿಖಿತ ನಿಯಮಗಳು
      ನಿರ್ವಹಿಸುತ್ತವೆ?
    follow_ups:
      - ಕಾಯುವಿಕೆ ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಲ್ಲರೂ ಆದೇಶವನ್ನು ಧಿಕ್ಕರಿಸಿದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಕಾಯುವಿಕೆ ಮತ್ತು ಸೇರಿದ್ದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_laptop_territory
    name: ಲ್ಯಾಪ್‌ಟಾಪ್ ಪ್ರದೇಶ
    prompt: |
      ಒಂದು ಟೇಬಲ್ ಮೇಲೆ ತೆರೆದ ಲ್ಯಾಪ್‌ಟಾಪ್ ಜಾಗವನ್ನು ಆಕ್ರಮಿಸಿಕೊಳ್ಳುತ್ತದೆ. ಅದರ ಪಕ್ಕದಲ್ಲಿರುವ
      ಕಪ್, ಕುರ್ಚಿಯ ಮೇಲಿರುವ ಬ್ಯಾಗ್. ಗಡಿಗಳನ್ನು ಗಮನಿಸಿ. ಒಬ್ಬ ವ್ಯಕ್ತಿ ಎಷ್ಟು ಜಾಗವನ್ನು
      ಆಕ್ರಮಿಸಿಕೊಳ್ಳುತ್ತಾನೆ? ಯಾವುದು "ಆಕ್ರಮಿಸಿಕೊಂಡಿದೆ" ಎಂದು ಸೂಚಿಸುತ್ತದೆ?
    follow_ups:
      - ಲ್ಯಾಪ್‌ಟಾಪ್ ದೇಹವನ್ನು ಹೇಗೆ ವಿಸ್ತರಿಸುತ್ತದೆ?
      - ಸಾಧನಗಳಿಲ್ಲದಿದ್ದರೆ ಆ ಜಾಗ ಹೇಗಿರಬಹುದು?
      - ಪ್ರದೇಶ ಮತ್ತು ಅವಧಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_third_place
    name: ಮೂರನೇ ಸ್ಥಳ
    prompt: |
      ಮನೆ ಅಲ್ಲ, ಕೆಲಸ ಅಲ್ಲ — ಕಾಫಿ ಶಾಪ್ ಒಂದು ಮೂರನೇ ಸ್ಥಳ. ಜನರು ಒಟ್ಟಿಗೆ ಏಕಾಂಗಿಯಾಗಿರಲು
      ಬರುತ್ತಾರೆ. ಯಾರು ಉಳಿಯುತ್ತಾರೆ, ಯಾರು ಬೇಗನೆ ಹೊರಡುತ್ತಾರೆ ಗಮನಿಸಿ? ಆ ಸ್ಥಳವು ವಿಭಿನ್ನ
      ಸಾಮಾಜಿಕ ಒಪ್ಪಂದವನ್ನು ಹೊಂದಿದೆ.
    follow_ups:
      - ಮೂರನೇ ಸ್ಥಳಗಳಿಲ್ಲದಿದ್ದರೆ ನಗರ ಹೇಗಿರಬಹುದು?
      - ಕಾಫಿ ಶಾಪ್ ಗ್ರಂಥಾಲಯಕ್ಕಿಂತ ಹೇಗೆ ಭಿನ್ನವಾಗಿದೆ?
      - ಸ್ಥಳ ಮತ್ತು ಗುರುತಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_invisible_script
    name: ಅಗೋಚರ ಲಿಪಿ
    prompt: |
      ಆದೇಶಿಸಿ, ಪಾವತಿಸಿ, ಕಾಯಿರಿ, ಸ್ವೀಕರಿಸಿ, ಆಸನ ಹುಡುಕಿ. ಯಾರಾದರೂ ಅದನ್ನು
      ಮುರಿದರೆ ಹೊರತು ಲಿಪಿ ಅಗೋಚರವಾಗಿರುತ್ತದೆ. ಮೊದಲ ಬಾರಿಗೆ ಬಂದವರನ್ನು ಗಮನಿಸಿ. ಅವರಿಗೆ
      ಏನು ತಿಳಿದಿಲ್ಲ? ಲಿಪಿಯು ಸೇರಿದ್ದನ್ನು ಎನ್ಕೋಡ್ ಮಾಡುತ್ತದೆ.
    follow_ups:
      - ಲಿಪಿ ಹೇಗೆ ಹೊರಗಿಡುತ್ತದೆ?
      - ಲಿಪಿಯನ್ನು ಬರೆದಿದ್ದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಲಿಪಿ ಮತ್ತು ಪ್ರಾವೀಣ್ಯತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_coffee_ritual
    name: ಕಾಫಿ ಒಂದು ಆಚರಣೆಯಾಗಿ
    prompt: |
      ಪಾನೀಯವು ದ್ವಿತೀಯ. ಆಚರಣೆಯೇ ಪ್ರಾಥಮಿಕ — ನಡೆಯು, ಆದೇಶ, ಮೊದಲ ಸಿಪ್. ನಿಮ್ಮ ಸ್ವಂತ
      ಚಲನೆಗಳನ್ನು ಗಮನಿಸಿ. ಕಾಫಿ ನಿಮ್ಮ ಬಾಗಿಲಿಗೆ ಬಂದರೆ ನೀವು ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತೀರಿ?
    follow_ups:
      - ಆಚರಣೆಯು ಪರಿವರ್ತನೆಯನ್ನು ಹೇಗೆ ಗುರುತಿಸುತ್ತದೆ?
      - ಕಾಫಿ ನಿಲುಗಡೆಯಿಲ್ಲದಿದ್ದರೆ ದಿನ ಹೇಗಿರಬಹುದು?
      - ಆಚರಣೆ ಮತ್ತು ಸಿದ್ಧತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_counter_handoff
    name: ಕೌಂಟರ್ ಹಸ್ತಾಂತರ
    prompt: |
      ಬರಿಸ್ಟಾ ಒಂದು ಹೆಸರನ್ನು ಕರೆಯುತ್ತಾರೆ. ಒಂದು ಕೈ ತಲುಪುತ್ತದೆ. ಹಸ್ತಾಂತರವು ಅಪರಿಚಿತ ಮತ್ತು
      ಅಪರಿಚಿತರ ನಡುವಿನ ಸಂಪರ್ಕದ ಕ್ಷಣ. ವಿನಿಮಯವನ್ನು ಗಮನಿಸಿ. ಕಪ್ ಹೊರತುಪಡಿಸಿ ಏನು
      ಹರಿಯುತ್ತದೆ?
    follow_ups:
      - ಹಸ್ತಾಂತರವು ಸಂಪರ್ಕವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ರೋಬೋಟ್ ಬರಿಸ್ಟಾ ಇದ್ದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಹಸ್ತಾಂತರ ಮತ್ತು ನಂಬಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_power_outlet_hunt
    name: ಪವರ್ ಔಟ್ಲೆಟ್ ಹುಡುಕಾಟ
    prompt: |
      ಕಣ್ಣುಗಳು ಗೋಡೆಗಳು, ನೆಲ, ಮೇಜುಗಳ ಅಡಿಯಲ್ಲಿ ಹುಡುಕುತ್ತವೆ. ಔಟ್ಲೆಟ್ಗಾಗಿ ಹುಡುಕಾಟವು
      ಪ್ರದೇಶದ್ದು. ಯಾರು ಮೊದಲು ತಲುಪಿದರು? ಔಟ್ಲೆಟ್ ನೀವು ಎಲ್ಲಿ ಕುಳಿತುಕೊಳ್ಳುತ್ತೀರಿ
      ಎಂಬುದನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ. ವಿದ್ಯುತ್ ಭೌಗೋಳಿಕತೆಯನ್ನು ಅನುಸರಿಸುತ್ತದೆ.
    follow_ups:
      - ಔಟ್ಲೆಟ್ನ ಸ್ಥಾನವು ಕೋಣೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ವೈರ್‌ಲೆಸ್ ವಿದ್ಯುತ್ ಇದ್ದರೆ ಆ ಜಾಗ ಹೇಗಿರಬಹುದು?
      - ಪ್ಲಗ್ ಮತ್ತು ಶಾಶ್ವತತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_solo_table
    name: ಒಬ್ಬರಿಗಾಗಿ ಟೇಬಲ್
    prompt: |
      ನಾಲ್ವರಿಗಾಗಿ ಟೇಬಲ್‌ನಲ್ಲಿ ಒಬ್ಬ ವ್ಯಕ್ತಿ. ಖಾಲಿ ಕುರ್ಚಿಗಳು ಒಂದು ಬಫರ್. ಜೋಡಣೆಯನ್ನು
      ಗಮನಿಸಿ. ಅದು ರಕ್ಷಣೆಯೇ? ಆದ್ಯತೆಯೇ? ಒಬ್ಬರಿಗಾಗಿ ಟೇಬಲ್ ಜನಸಂದಣಿಯ ವಿರುದ್ಧ ಜಾಗವನ್ನು
      ಹಿಡಿದಿಡುತ್ತದೆ.
    follow_ups:
      - ಒಬ್ಬರಿಗಾಗಿ ಟೇಬಲ್ ಉದ್ದೇಶವನ್ನು ಹೇಗೆ ಸೂಚಿಸುತ್ತದೆ?
      - ಯಾರಾದರೂ ಹಂಚಿಕೊಳ್ಳಲು ಕೇಳಿದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಏಕಾಂತ ಮತ್ತು ಗೋಚರತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_milk_pour
    name: ಹಾಲು ಸುರಿಯುವಿಕೆ
    prompt: |
      ಬರಿಸ್ಟಾ ಎಸ್ಪ್ರೆಸೋದಲ್ಲಿ ಹಾಲು ಸುರಿಯುತ್ತಾರೆ — ಲ್ಯಾಟ್ ಆರ್ಟ್ ಇರಲಿ, ಇಲ್ಲದಿರಲಿ. ಸುರಿಯುವಿಕೆ
      ಒಂದು ಕಲೆ. ಚಲನೆಯನ್ನು ಗಮನಿಸಿ. ಪಾನೀಯವನ್ನು ಹೊರತುಪಡಿಸಿ ಗ್ರಾಹಕರು ಏನು
      ಸ್ವೀಕರಿಸುತ್ತಾರೆ? ಸುರಿಯುವಿಕೆ ಒಂದು ಪ್ರದರ್ಶನ.
    follow_ups:
      - ಸುರಿಯುವಿಕೆ ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಲೆಯೇ ಇಲ್ಲದಿದ್ದರೆ ಪಾನೀಯ ಹೇಗಿರುತ್ತದೆ?
      - ಸುರಿಯುವಿಕೆ ಮತ್ತು ಬೆಲೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_name_on_cup
    name: ಕಪ್ ಮೇಲೆ ಹೆಸರು
    prompt: |
      ಒಂದು ಹೆಸರು — ನಿಜವಾದ, ಸುಳ್ಳು, ತಪ್ಪಾಗಿ ಬರೆದ — ಒಂದು ಕಪ್ ಮೇಲೆ. ಇದು ವಿನಿಮಯವನ್ನು
      ವೈಯಕ್ತೀಕರಿಸುತ್ತದೆ. ಹೆಸರು ಬಾಯಿಯಿಂದ ಕೈಗೆ, ಕೌಂಟರ್‌ಗೆ ಹರಿಯುತ್ತದೆ. ವಿನಿಮಯಕ್ಕೆ
      ಹೆಸರು ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಹೆಸರು ಗುರುತಿಸುವಿಕೆಯನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಹೆಸರಿಲ್ಲದಿದ್ದರೆ ಆದೇಶ ಹೇಗಿರುತ್ತದೆ?
      - ಹೆಸರು ಮತ್ತು ಅನಾಮಧೇಯತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_window_seat
    name: ಕಿಟಕಿಯ ಆಸನ
    prompt: |
      ಕಿಟಕಿಯ ಆಸನವು ಪ್ರಧಾನ. ನೀವು ಬೀದಿಗೆ ಮುಖ ಮಾಡಿದ್ದೀರಿ; ನಿಮ್ಮ ಬೆನ್ನು ಸುರಕ್ಷಿತವಾಗಿದೆ.
      ಯಾರು ಅದನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತಾರೆ ಗಮನಿಸಿ. ಕಿಟಕಿಯು ಹೊರಗಿನ ಪ್ರಪಂಚವನ್ನು ಚೌಕಟ್ಟುಗೊಳಿಸುತ್ತದೆ
      ಆದರೆ ನೀವು ಒಳಗೆ ಉಳಿಯುತ್ತೀರಿ. ನೋಟ ಏನು ನೀಡುತ್ತದೆ?
    follow_ups:
      - ಕಿಟಕಿಯ ಆಸನವು ಅನುಭವವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಿಟಕಿಗಳಿಲ್ಲದಿದ್ದರೆ ಆ ಜಾಗ ಹೇಗಿರಬಹುದು?
      - ಒಳಗೆ ಮತ್ತು ಹೊರಗಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_linger_versus_grab
    name: ನಿಧಾನವಾಗಿ ಕುಳಿತುಕೊಳ್ಳುವುದು ವರ್ಸಸ್ ಹೊರಟು ಹೋಗುವುದು
    prompt: |
      ಕೆಲವರು ತಮ್ಮ ಕಪ್ ತೆಗೆದುಕೊಂಡು ಹೊರಡುತ್ತಾರೆ. ಇತರರು ಗಂಟೆಗಟ್ಟಲೆ ನೆಲೆಸುತ್ತಾರೆ. ಅದೇ
      ಜಾಗ ಎರಡನ್ನೂ ಹೊಂದಿದೆ. ವಿಭಜನೆಯನ್ನು ಗಮನಿಸಿ. ಯಾರು ಉಳಿಯುತ್ತಾರೆ ಎಂಬುದನ್ನು ಏನು
      ನಿರ್ಧರಿಸುತ್ತದೆ? ಕಾಫಿ ಶಾಪ್ ವಿಭಿನ್ನ ವೇಗಗಳಿಗೆ ಆಶ್ರಯ ನೀಡುತ್ತದೆ.
    follow_ups:
      - ನಿಧಾನವಾಗಿ ಕುಳಿತುಕೊಳ್ಳುವುದು ವ್ಯವಹಾರದ ಮೇಲೆ ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ?
      - ಎಲ್ಲರೂ ಬೇಗನೆ ಹೊರಟು ಹೋದರೆ ಆ ಜಾಗ ಹೇಗಿರಬಹುದು?
      - ವೇಗ ಮತ್ತು ಸೇರಿದ್ದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_cs_regular_recognition
    name: ನಿಯಮಿತರ ಗುರುತಿಸುವಿಕೆ
