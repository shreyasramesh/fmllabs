# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Людський Інтерфейс — Транспортний Хаб (Ukrainian)

id: human_interface_transit_hub
name: Людський Інтерфейс — Транспортний Хаб
description: 50 карток, щоб змінити ваше сприйняття транспортного хабу — від платформ та очікування до потоку прибуття/відправлення та хореографії незнайомців у дорозі.
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: Край Платформи
    prompt: |
      Край платформи — це поріг. Жовта лінія, проміжок, колія. Люди стоять на різній відстані. Дехто нахиляється вперед; інші відступають. Спостерігайте за розподілом. Що означає край?
    follow_ups:
      - Як край формує очікування?
      - Якою була б платформа без лінії?
      - Який зв'язок між краєм та ризиком?
  - id: hi_th_waiting_posture
    name: Поза Очікування
    prompt: |
      Тіла розташовуються під час очікування — вага на одній нозі, телефон у руці, сумка між ногами. Поза кодує тривалість. Хто виглядає терплячим? Хто неспокійним? Очікування має мову тіла.
    follow_ups:
      - Як поза розкриває очікування?
      - Якою була б платформа без очікування?
      - Який зв'язок між позою та часом?
  - id: hi_th_arrival_flow
    name: Потік Прибуття
    prompt: |
      Двері поїзда відчиняються. Люди виходять — проти течії тих, хто сідає. Потік має фізику. Спостерігайте за зіткненням, обходом, злиттям. Які правила керують цим обміном?
    follow_ups:
      - Як потік формує платформу?
      - Що б сталося, якби всі поспішали?
      - Який зв'язок між потоком та ефективністю?
  - id: hi_th_strangers_transit
    name: Незнайомці у Дорозі
    prompt: |
      Ви ділите вагон з людьми, яких ніколи більше не побачите. Близькість без зв'язку. Спостерігайте за стислістю. Що незнайомці винні одне одному? Вагон — це тимчасове суспільство.
    follow_ups:
      - Як транспорт створює тимчасову спільноту?
      - Яким був би вагон з розмовами?
      - Який зв'язок між незнайомцем та ввічливістю?
  - id: hi_th_departure_board
    name: Табло Відправлень
    prompt: |
      Час, платформи, затримки — табло є джерелом істини. Очі піднімаються до нього. Табло диктує рух. Спостерігайте за колективним поглядом. Що табло робить з натовпом?
    follow_ups:
      - Як табло формує поведінку?
      - Яким був би хаб без нього?
      - Який зв'язок між відображенням та довірою?
  - id: hi_th_escalator_stand
    name: Ескалатор — Стій
    prompt: |
      Праворуч — стій, ліворуч — іди — або навпаки, залежно від міста. Ескалатор має правила. Спостерігайте, хто їх дотримується. Ескалатор — це рухома черга. Що дозволяють правила?
    follow_ups:
      - Як правило ескалатора формує потік?
      - Що б сталося, якби всі стояли?
      - Який зв'язок між правилом та ефективністю?
  - id: hi_th_ticket_gate
    name: Турнікет
    prompt: |
      Турнікет зчитує картку, пищить, відчиняється. Турнікет — це контрольно-пропускний пункт. Він розділяє оплачене від неоплаченого. Спостерігайте за ритмом. Хто плутається? Хто прослизає? Турнікет — це тест.
    follow_ups:
      - Як турнікет формує подорож?
      - Яким був би хаб без турнікетів?
      - Який зв'язок між турнікетом та належністю?
  - id: hi_th_luggage_drag
    name: Волочіння Багажу
    prompt: |
      Колеса по плитці. Валіза котиться слідом. Волочіння відзначає шлях мандрівників. Багаж продовжує тіло. Спостерігайте за тягарем. Що багаж говорить про подорож?
    follow_ups:
      - Як багаж формує рух?
      - Яким був би хаб без сумок?
      - Який зв'язок між тягарем та пунктом призначення?
  - id: hi_th_bench_occupation
    name: Зайняття Лавки
    prompt: |
      Лавки вздовж платформи. Дехто сидить; дехто стоїть поруч. Лавка — це обмежений ресурс. Спостерігайте, хто її займає. Як довго вони залишаються? Лавка — це невелика територія.
    follow_ups:
      - Як лавка формує очікування?
      - Якою була б платформа без лавок?
      - Який зв'язок між сидінням та тривалістю?
  - id: hi_th_announcement_voice
    name: Голос Оголошення
    prompt: |
      "Наступний поїзд..." Голос автоматичний чи людський. Він прорізає шум. Оголошення створює спільне знання. Спостерігайте, хто слухає. Хто вже перевірив свій телефон?
    follow_ups:
      - Як оголошення формує натовп?
      - Яким був би хаб без нього?
      - Який зв'язок між голосом та авторитетом?
  - id: hi_th_door_positioning
    name: Розташування Дверей
    prompt: |
      Постійні пасажири знають, де відчиняться двері. Вони розташовуються. Новоприбулі вгадують. Розташування — це стратегія. Спостерігайте за скупченням. Що визначає позиція?
    follow_ups:
      - Як розташування формує посадку?
      - Якою була б платформа, якби двері були випадковими?
      - Який зв'язок між позицією та перевагою?
  - id: hi_th_handrail_grip
    name: Захоплення Поручня
    prompt: |
      У вагоні руки знаходять поручень. Захоплення — це безпека. Спостерігайте, хто тримається, хто не потребує. Поручень — це спільний об'єкт. Що розкриває захоплення?
    follow_ups:
      - Як поручень формує стійкість?
      - Яким був би вагон без нього?
      - Який зв'язок між захопленням та довірою?
  - id: hi_th_window_reflection
    name: Відображення у Вікні
    prompt: |
      Вікно показує тунель, платформу та ваше власне обличчя. Відображення неминуче. Люди дивляться на себе або уникають цього. Спостерігайте за зв'язком між відображенням та поглядом.
    follow_ups:
      - Як відображення формує самосвідомість?
      - Якою була б поїздка без вікна?
      - Який зв'язок між відображенням та приватністю?
  - id: hi_th_seat_offer
    name: Пропозиція Місця
    prompt: |
      Хтось пропонує місце літній людині, батькам з дитиною. Пропозиція — це маленький моральний акт. Спостерігайте, коли це відбувається. Хто пропонує? Хто приймає? Місце — це подарунок.
    follow_ups:
      - Як пропозиція формує вагон?
      - Якою була б поїздка без таких пропозицій?
      - Який зв'язок між пропозицією та турботою?
  - id: hi_th_delay_sigh
    name: Зітхання Затримки
    prompt: |
      "Затримка." Колективне зітхання. Затримка — це спільна доля. Незнайомці обмінюються поглядами. Затримка створює момент солідарності. Спостерігайте за зміною. Що затримка робить з натовпом?
    follow_ups:
      - Як затримка формує очікування?
      - Яким був би хаб без затримок?
      - Який зв'язок між затримкою та роздратуванням?
  - id: hi_th_backpack_turn
    name: Повертання Рюкзака
    prompt: |
      У переповненому вагоні хтось повертає рюкзак вперед. Повертання — це уважність. Це створює простір. Спостерігайте, хто це робить. Повертання рюкзака — це маленький суспільний договір.
    follow_ups:
      - Як повертання формує близькість?
      - Яким був би вагон без нього?
      - Який зв'язок між повертанням та усвідомленням?
  - id: hi_th_exit_anticipation
    name: Очікування Виходу
    prompt: |
      Коли наближається зупинка, люди збираються біля дверей. Очікування видиме. Тіла рухаються. Двері відчиняться. Спостерігайте за підготовкою. Що вимагає очікування?
    follow_ups:
      - Як очікування формує вихід?
      - Якою була б зупинка без підготовки?
      - Який зв'язок між очікуванням та потоком?
  - id: hi_th_transfer_corridor
    name: Коридор Пересадки
    prompt: |
      Коридор з'єднує лінії. Люди йдуть з метою. Пересадка — це перехід між системами, між очікуваннями. Спостерігайте за темпом. Коридор має свій власний ритм.
    follow_ups:
      - Як коридор формує подорож?
      - Яким був би хаб без пересадок?
      - Який зв'язок між коридором та зв'язком?
  - id: hi_th_phone_glow
    name: Світіння Телефона
    prompt: |
      У тьмяному вагоні обличчя світяться від телефонів. Світіння індивідуальне. Кожна людина має своє світло. Спостерігайте за розподілом. Телефон створює приватний простір у громадському.
    follow_ups:
      - Як телефон формує поїздку?
      - Яким був би вагон без телефонів?
      - Який зв'язок між світінням та ізоляцією?
  - id: hi_th_stroller_navigation
    name: Навігація з Коляскою
    prompt: |
      Батьки проштовхують коляску крізь натовп. Навігація делікатна. Люди звільняють шлях. Коляска змінює потік. Спостерігайте за пристосуванням. Що вимагає коляска?
    follow_ups:
      - Як коляска формує натовп?
      - Яким був би хаб без колясок?
      - Який зв'язок між коляскою та турботою?
  - id: hi_th_vendor_station
    name: Кіноск для Продавця
    prompt: |
      Кіноск продає каву, закуски, газети. Продавець обслуговує людей у русі. Транзакція швидка. Спостерігайте за обміном. Продавець — це острів у потоці.
    follow_ups:
      - Як продавець формує хаб?
      - Яким був би хаб без продавців?
      - Який зв'язок між продавцем та очікуванням?
  - id: hi_th_track_gap
    name: Проміжок між Коліями
    prompt: |
      Обережно, проміжок. Простір між платформою та вагоном — це небезпека. Люди переступають його. Проміжок варіюється. Спостерігайте за обережністю. Що проміжок вимагає від тіла?
    follow_ups:
      - Як проміжок формує посадку?
      - Якою була б платформа без нього?
      - Який зв'язок між проміжком та увагою?
  - id: hi_th_schedule_check
    name: Перевірка Розкладу
    prompt: |
      Пальці торкаються телефону. Додаток показує час. Перевірка розкладу — постійна. Вона зменшує невизначеність. Спостерігайте за ритмом. Як часто люди перевіряють?
    follow_ups:
      - Як розклад формує очікування?
      - Яким був би хаб без додатків?
      - Який зв'язок між перевіркою та контролем?
  - id: hi_th_crowd_density
    name: Щільність Натовпу
    prompt: |
      Година пік заповнює платформу. Тіла стискаються. Щільність має межі. Спостерігайте за межею. Коли вона стає нестерпною? Натовп має фізику.
    follow_ups:
      - Як щільність формує досвід?
      - Яким був би хаб при низькій щільності?
      - Який зв'язок між щільністю та терпимістю?
  - id: hi_th_sleeping_commuter
    name: Сплячий Пасажир
    prompt: |
      Хтось спить — голова притулена до вікна, до плеча незнайомця. Сон — це довіра або виснаження. Спостерігайте за вразливістю. Що вимагає сон від вагона?
    follow_ups:
      - Як сплячий формує простір?
      - Якою була б поїздка без сплячих?
      - Який зв'язок між сном та безпекою?
  - id: hi_th_map_consultation
    name: Консультація з Картою
    prompt: |
      Відвідувач дивиться на карту на стіні. Карта — це порятунок. Інші плинуть повз. Консультація займає час. Спостерігайте за паузою. Що надає карта?
    follow_ups:
      - Як карта формує подорож?
      - Яким був би хаб без карт?
      - Який зв'язок між картою та впевненістю?
  - id: hi_th_platform_change
    name: Зміна Платформи
    prompt: |
      "Зміна платформи". Натовп рухається. Зміна — це порушення. Люди поспішають. Спостерігайте за метушнею. Що зміна витягує з натовпу?
    follow_ups:
      - Як зміна формує потік?
      - Яким був би хаб без змін?
      - Який зв'язок між зміною та стресом?
  - id: hi_th_briefcase_clutch
    name: Стиснення Портфеля
    prompt: |
      Портфель тримають близько — між ногами, на колінах. Він містить щось цінне. Стиснення — захисне. Спостерігайте за хватом. Що означає портфель для власника?
    follow_ups:
      - Як портфель формує поїздку?
      - Яким був би вагон без портфелів?
      - Який зв'язок між стисненням та ідентичністю?
  - id: hi_th_door_hold
    name: Утримання Дверей
    prompt: |
      Хтось тримає двері для людини позаду. Поїзд ось-ось відправиться. Утримання — це ризик і ввічливість. Спостерігайте за обміном. Чого коштує утримання?
    follow_ups:
      - Як утримання формує посадку?
      - Якою була б платформа без цього?
      - Який зв'язок між утриманням та ввічливістю?
  - id: hi_th_standing_balance
    name: Баланс Стоячи
    prompt: |
      Поїзд рухається. Пасажири, що стоять, переносять вагу. Баланс — динамічний. Ніхто не тримається за поручень. Спостерігайте за мікро-коригуваннями. Тіло вчиться руху.
    follow_ups:
      - Як баланс формує поїздку?
      - Яким був би вагон з більшою кількістю місць?
      - Який зв'язок між балансом та звичкою?
  - id: hi_th_conversation_overhear
    name: Підслухана Розмова
    prompt: |
      Двоє людей розмовляють. Ви чуєте уривки. Розмова приватна, але публічна. Спостерігайте за межею. Що незнайомці дізнаються одне про одного в дорозі?
    follow_ups:
      - Як підслуховування формує поїздку?
      - Яким був би вагон без розмов?
      - Який зв'язок між підслуховуванням та близькістю?
  - id: hi_th_ticket_inspection
    name: Перевірка Квитків
    prompt: |
      Контролер проходить через вагон. "Квитки, будь ласка." Перевірка випадкова або систематична. Спостерігайте за реакцією. Хто готовий? Хто плутається? Перевірка — це тест на легітимність.
    follow_ups:
      - Як перевірка формує поїздку?
      - Якою була б система без неї?
      - Який зв'язок між перевіркою та довірою?
  - id: hi_th_station_name_glance
    name: Погляд на Назву Станції
    prompt: |
      Назва промайне — на стіні, на вивісці. Постійні пасажири знають. Новоприбулі дивляться. Погляд орієнтує. Спостерігайте, хто дивиться. Що робить назва?
    follow_ups:
      - Як назва формує орієнтацію?
      - Якою була б поїздка без знаків?
      - Який зв'язок між назвою та місцем?
  - id: hi_th_benchmark_regular
    name: Звичний Регуляр
    prompt: |
      Регуляр знає ритм. Вони прибувають вчасно. Без очікування. Регуляр засвоїв розклад. Спостерігайте за впевненістю. Що знає регуляр?
    follow_ups:
      - Як регуляр формує хаб?
      - Яким був би хаб без регулярів?
      - Який зв'язок між регулярністю та плавністю?
  - id: hi_th_lost_look
    name: Загублений Погляд
    prompt: |
      Хтось виглядає загубленим — голова повертається, темп невпевнений. Погляд видимий. Спостерігайте за мовою тіла. Хто допомагає? Хто ігнорує? Загублений погляд — це сигнал. Що він запрошує?
    follow_ups:
      - Як загублений погляд формує хаб?
      - Яким був би хаб без загублених?
      - Який зв'язок між загубленістю та допомогою?
  - id: hi_th_earbud_insert
    name: Вставляння Навушників
    prompt: |
      Вставляються навушники. Світ віддаляється. Вставляння — це межа. Слухач присутній, але відсутній. Спостерігайте за зміною. Що створюють навушники?
    follow_ups:
      - Як навушники формують поїздку?
      - Яким був би вагон без них?
      - Який зв'язок між навушниками та приватністю?
  - id: hi_th_rush_hour_pack
    name: Натовп Години Пік
    prompt: |
      Вагон заповнений. Тіла торкаються. Натовп неминучий. Спостерігайте за терпимістю. Як люди справляються з близькістю? Натовп має свій етикет.
    follow_ups:
      - Як натовп формує поїздку?
      - Якою була б година пік без скупчень?
      - Який зв'язок між натовпом та витривалістю?
  - id: hi_th_destination_ask
    name: Запитання про Пункт Призначення
    prompt: |
      "Це поїзд до X?" Запитує незнайомець. Інший відповідає. Запитання створює момент зв'язку. Спостерігайте за обміном. Що вимагає запитання?
    follow_ups:
      - Як запитання формує вагон?
      - Якою була б поїздка без таких запитань?
      - Який зв'язок між запитанням та довірою?
  - id: hi_th_platform_choice
    name: Вибір Платформи
    prompt: |
      Дві платформи, один пункт призначення. Одна ближче; одна менш завантажена. Вибір — це стратегія. Спостерігайте, хто куди йде. Що визначає вибір?
    follow_ups:
      - Як вибір формує натовп?
      - Яким був би хаб з однією платформою?
      - Який зв'язок між вибором та результатом?
  - id: hi_th_wipe_down_seat
    name: Протирання Сидіння
    prompt: |
      Хтось протирає сидіння перед тим, як сісти. Протирання — це запобіжний захід. Спостерігайте за жестом. Що припускає протирання щодо простору? Протирання — це маленький акт розмежування.
    follow_ups:
      - Як протирання формує сидіння?
      - Яким був би вагон без таких жестів?
      - Який зв'язок між протиранням та чистотою?
  - id: hi_th_standing_offer
    name: Пропозиція Місця (стоячи)
    prompt: |
      "Чи хочете ви сісти?" Пропозиція робиться незнайомцю. Іноді приймається, іноді відхиляється. Спостерігайте за обміном. Що означає пропозиція?
    follow_ups:
      - Як пропозиція формує вагон?
      - Якою була б поїздка без пропозицій?
      - Який зв'язок між пропозицією та турботою?
  - id: hi_th_exit_block
    name: Блокування Виходу
    prompt: |
      Хтось стоїть у дверях. Іншим потрібно пройти. Блокування — неуважність або навмисність. Спостерігайте за перемовинами. Як люди проходять? Блокування — це маленький конфлікт.
    follow_ups:
      - Як блокування формує вихід?
      - Яким був би вагон без тих, хто блокує?
      - Який зв'язок між блокуванням та усвідомленням?
  - id: hi_th_train_rumble
    name: Гудіння Поїзда
    prompt: |
      Поїзд гуде — рейки, колеса, рух. Гудіння постійне. Воно стає фоном. Спостерігайте, коли ви його помічаєте. Що гудіння робить з тілом?
    follow_ups:
      - Як гудіння формує поїздку?
      - Якою була б вагон у тиші?
      - Який зв'язок між гудінням та ритмом?
  - id: hi_th_connection_run
    name: Біг на Пересадку
    prompt: |
      Хтось біжить — спізнюється на пересадку. Біг прорізає натовп. Люди розбігаються. Спостерігайте за порушенням. Що біг витягує з потоку?
    follow_ups:
      - Як біг формує хаб?
      - Яким був би хаб без бігунів?
      - Який зв'язок між бігом та терміновістю?
  - id: hi_th_seat_saving
    name: Збереження Місця
    prompt: |
      Сумка на сидінні. "Тут хтось сидить." Збереження тримає місце для відсутнього компаньйона. Спостерігайте за претензією. Як довго можна зберігати місце? Які межі?
    follow_ups:
      - Як збереження формує вагон?
      - Якою була б поїздка без збереження?
      - Який зв'язок між збереженням та правом?
  - id: hi_th_arrival_relief
    name: Полегшення Прибуття
    prompt: |
      Поїзд прибуває на кінцеву. Полегшення видиме. Плечі опускаються. Люди збирають свої речі. Подорож закінчено. Спостерігайте за зміною. Що надає прибуття?
    follow_ups:
      - Як прибуття формує вихід?
      - Якою була б подорож без прибуття?
      - Який зв'язок між полегшенням та завершенням?
  - id: hi_th_wayfinding_sign
    name: Знак Навігації
    prompt: |
      Стрілки показують. "До поїздів." "До виходів." Знаки керують потоком. Спостерігайте, хто їх дотримується. Хто ігнорує? Знак — це пропозиція. Що він припускає?
    follow_ups:
      - Як знаки формують потік?
      - Яким був би хаб без них?
      - Який зв'язок між знаком та довірою?
  - id: hi_th_waiting_room
    name: Зала Очікування
    prompt: |
      Стільці розташовані обличчям одне до одного або до табло. Зала очікування тримає людей між подорожами. Спостерігайте за розташуванням. Хто сидить? Хто ходить? Зала очікування — це пауза.
    follow_ups:
      - Як зала очікування формує очікування?
      - Яким був би хаб без неї?
      - Який зв'язок між залою та тривалістю?
  - id: hi_th_stranger_proximity
    name: Близькість Незнайомця
    prompt: |
      Незнайомець стоїть близько — це необхідно в натовпі. Близькість — безособова, але інтимна. Спостерігайте за терпимістю. Що дозволяє тіло? Близькість — це договір.
    follow_ups:
      - Як близькість формує поїздку?
      - Яким був би вагон з більшим простором?
      - Який зв'язок між близькістю та ввічливістю?
  - id: hi_th_last_train
    name: Останній Поїзд
    prompt: |
      Останній поїзд. Натовп інший — пізніший, вільніший. Останній поїзд має свою енергію. Спостерігайте за зміною. Що робить "останній" з натовпом?
    follow_ups:
      - Як останній поїзд формує хаб?
      - Якою була б ніч без нього?
      - Який зв'язок між останнім та терміновістю?
  - id: hi_th_transit_tribe
    name: Транзитне Плем'я
    prompt: |
      Ті ж люди, та ж лінія, той же час. Ви впізнаєте обличчя. Ви ніколи не розмовляєте. Транзитне плем'я — це мовчазна спільнота. Спостерігайте за впізнаванням. Що надає плем'я?
    follow_ups:
      - Як плем'я формує поїздку?
      - Якою була б поїздка без знайомих облич?
      - Який зв'язок між племенем та належністю?
