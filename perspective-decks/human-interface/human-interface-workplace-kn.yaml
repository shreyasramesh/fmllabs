  - id: hi_wp_desk_territory
    name: ಡೆಸ್ಕ್ ಪ್ರದೇಶ
    prompt: |
      ಒಂದು ಡೆಸ್ಕ್ ಅನ್ನು ಗುರುತಿಸಲಾಗಿದೆ — ಛಾಯಾಚಿತ್ರಗಳು, ಸಸ್ಯಗಳು, ಮಗ್‌ಗಳು. ಪ್ರದೇಶವು
