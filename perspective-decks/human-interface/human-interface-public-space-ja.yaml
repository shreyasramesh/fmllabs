# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人間のインターフェース — 公共空間 (Japanese)

id: human_interface_public_space
name: 人間のインターフェース — 公共空間
description: ベンチや小道から、見知らぬ人々の振り付け、お守りとしてのオブジェクトまで、公共空間の見方を変える50枚のカード。
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: ベンチの占有
    prompt: |
      ベンチは、体、バッグ、姿勢によって占有されている。ベンチは限られた資源だ。
      座る人、立つ人、通り過ぎる人を観察する。ベンチは人によって異なる意味を持つ。
      それは何を提供するのか？
    follow_ups:
      - ベンチは空間をどのように形作るか？
      - ベンチがなければ公園はどうなるか？
      - ベンチと休息の関係は？
  - id: hi_ps_pathway_flow
    name: 小道の流れ
    prompt: |
      小道は動きを誘導する。人々は一人で、ペアで、グループで歩く。
      流れには方向がある。衝突を観察する。誰が道を譲るのか？
      小道は共有の通路だ。それはどのような規則によって支配されているのか？
    follow_ups:
      - 小道は歩き方をどのように形作るか？
      - 小道がなければ空間はどうなるか？
      - 小道と目的地との関係は？
  - id: hi_ps_strangers_choreography
    name: 見知らぬ人々の振り付け
    prompt: |
      関係のない体が共有空間を移動する。振り付けは言葉にされない—
      すれ違い、立ち止まる、合流する。ダンスを観察する。誰も話さない。
      振り付けは純粋な身体の動きだ。それは何が必要か？
    follow_ups:
      - 振り付けは空間をどのように形作るか？
      - 全員が立ち止まったらどうなるか？
      - 振り付けと礼儀作法との関係は？
  - id: hi_ps_object_talisman
    name: お守りとしてのオブジェクト
    prompt: |
      ベンチの上の本。椅子の上のバッグ。オブジェクトは場所を確保する。
      「私はここにいる」または「すぐ戻る」と言う。オブジェクトはお守りだ。
      主張を観察する。それは何を保護するのか？
    follow_ups:
      - お守りは空間をどのように形作るか？
      - このような主張がなければ空間はどうなるか？
      - オブジェクトと存在との関係は？
  - id: hi_ps_bench_armrest
    name: ベンチのアームレスト
    prompt: |
      ベンチにはアームレストが付いているものがある。それらは座席を分割する。
      寝そべることを防ぐ。アームレストは意図的なデザインだ。
      それを使用する人を観察する。アームレストは何を排除するのか？
    follow_ups:
      - アームレストはベンチをどのように形作るか？
      - アームレストがなければベンチはどうなるか？
      - アームレストと制御との関係は？
  - id: hi_ps_pathway_intersection
    name: 小道の交差点
    prompt: |
      小道が交差する。体が合流する。交差点は衝突地点だ。
      合流を観察する。流れが出会うとき何が起こるか？
      交差点は交渉を必要とする。それは何を要求するか？
    follow_ups:
      - 交差点は流れをどのように形作るか？
      - 交差点がなければ空間はどうなるか？
      - 交差点と注意との関係は？
  - id: hi_ps_eye_contact_avoid
    name: 視線回避
    prompt: |
      見知らぬ人同士は視線を避ける。その回避は丁寧だ。
      見つめることは、つながりを危険にさらすことだ。視線を観察する。
      回避は契約だ。それは何をもたらし、何を守るのか？
    follow_ups:
      - 回避は空間をどのように形作るか？
      - もっと視線が交差したら空間はどうなるか？
      - 視線とプライバシーとの関係は？
  - id: hi_ps_bench_share
    name: ベンチの共有
    prompt: |
      二人の見知らぬ人がベンチを共有する。間にスペースがある。
      共有は、つながりのない近さだ。境界線を観察する。
      どれくらい近づくと近すぎるのか？共有は繊細なバランスだ。
    follow_ups:
      - 共有はベンチをどのように形作るか？
      - 一人だったらベンチはどうなるか？
      - 共有と寛容との関係は？
  - id: hi_ps_pathway_width
    name: 小道の幅
    prompt: |
      小道は広いか狭いかだ。幅は流れに影響する。
      二人が通れるか通れないかだ。幅を観察する。
      それは群衆について何を想定しているのか？幅はデザインだ。
      それは何をもたらすのか？
    follow_ups:
      - 幅は歩き方をどのように形作るか？
      - もっと広かったら小道はどうなるか？
      - 幅と快適さとの関係は？
  - id: hi_ps_bench_sun
    name: 日向のベンチ
    prompt: |
      ベンチは太陽に面している。あるいは日陰に。位置が重要だ。
      どちらを選ぶかを観察する。太陽は資源だ。それは何を提供するのか？
      日向のベンチは奪い合いになる。
    follow_ups:
      - 太陽はベンチをどのように形作るか？
      - 太陽がなければ空間はどうなるか？
      - 太陽と休息との関係は？
  - id: hi_ps_stranger_proximity
    name: 見知らぬ人との近さ
    prompt: |
      見知らぬ人が近くに立つ—列に並んでいるとき、バスに乗っているとき。
      近さは、非個人的だが親密だ。許容範囲を観察する。
      体は何を許容するのか？近さは契約だ。その条件は何か？
    follow_ups:
      - 近さは空間をどのように形作るか？
      - もっと余裕があったら空間はどうなるか？
      - 近さと礼儀作法との関係は？
  - id: hi_ps_object_left
    name: 置かれたオブジェクト
    prompt: |
      ベンチの上のジャケット。木の下のバッグ。置かれたオブジェクトは
      縄張りを主張する。主張を観察する。どれくらいの間、保持できるか？
      置かれたオブジェクトは試練だ。それは他者に何を要求するか？
    follow_ups:
      - オブジェクトは空間をどのように形作るか？
      - このような主張がなければ空間はどうなるか？
      - オブジェクトと信頼との関係は？
  - id: hi_ps_pathway_obstacle
    name: 小道の障害物
    prompt: |
      建設、群衆、パフォーマー—何かが小道を塞いでいる。
      障害物は流れを迂回させる。迂回を観察する。
      障害物は何を要求するか？小道は決して純粋ではない。
      それを遮るものは何か？
    follow_ups:
      - 障害物は流れをどのように形作るか？
      - 障害物がなければ小道はどうなるか？
      - 障害物と適応との関係は？
  - id: hi_ps_bench_alone
    name: 一人のベンチ
    prompt: |
      ベンチに一人の人間。その孤独は見える。ベンチは孤立を抱える。
      姿勢を観察する。一人きりのベンチは何を提供するのか？
      一人きりのベンチは選択だ。それは何をもたらすのか？
    follow_ups:
      - 一人きりはベンチをどのように形作るか？
      - ベンチがなければ空間はどうなるか？
      - 一人と休息との関係は？
  - id: hi_ps_nod_acknowledge
    name: 会釈による認識
    prompt: |
      かすかな会釈。短い笑顔。認識は最小限だ。
      「あなたが見えている」と言うが、関与はない。それがいつ起こるか観察する。
      会釈は小さな礼儀だ。それは何を生み出すか？
    follow_ups:
      - 会釈は空間をどのように形作るか？
      - それがなければ空間はどうなるか？
      - 会釈と安全との関係は？
  - id: hi_ps_pathway_edge
    name: 小道の縁
    prompt: |
      小道には縁がある—草、縁石、障壁。縁は小道を定義する。
      小道にとどまる人、横断する人を観察する。縁は境界線だ。
      それは何を含んでいるのか？
    follow_ups:
      - 縁は歩き方をどのように形作るか？
      - 縁がなければ小道はどうなるか？
      - 縁と自由との関係は？
  - id: hi_ps_bench_claim
    name: ベンチの主張
    prompt: |
      ベンチは占有されている—広げられた腕、姿勢、バッグによって。
      主張は「これは私のものだ」と言う。主張を観察する。
      それはどのように行われるのか？主張は縄張りだ。
      それは何を保護するのか？
    follow_ups:
      - 主張はベンチをどのように形作るか？
      - 主張がなければ空間はどうなるか？
      - 主張と快適さとの関係は？
  - id: hi_ps_stranger_help
    name: 見知らぬ人の助け
    prompt: |
      「手伝いましょうか？」見知らぬ人が申し出る。助けは予期せぬものだ。
      交換を観察する。受け入れるか断るか？
      見知らぬ人の助けは贈り物だ。それは何を要求するか？
    follow_ups:
      - 助けは空間をどのように形作るか？
      - このような申し出がなければ空間はどうなるか？
      - 助けと信頼との関係は？
  - id: hi_ps_object_temporary
    name: 一時的なオブジェクト
    prompt: |
      カップ、新聞、帽子。オブジェクトは場所を印す。それは一時的だ。
      所有者は戻ってくるだろう。主張を観察する。
      一時的なオブジェクトは他者に何を要求するか？オブジェクトはプレースホルダーだ。
    follow_ups:
      - 一時的なオブジェクトは空間をどのように形作るか？
      - それがなければ空間はどうなるか？
      - 一時的と信頼との関係は？
  - id: hi_ps_pathway_rhythm
    name: 小道のリズム
    prompt: |
      舗装された地面を踏む足音。リズムは個性的だ—速い、遅い、不規則。
      小道は多くのリズムを抱えている。同期と衝突を観察する。
      リズムは何を明らかにするのか？
    follow_ups:
      - リズムは歩き方をどのように形作るか？
      - 沈黙の中の小道はどうなるか？
      - リズムと目的地との関係は？
  - id: hi_ps_bench_face
    name: ベンチの向き
    prompt: |
      ベンチは特定の方向を向いている—眺め、太陽、群衆。
      向きは経験を形作る。どのベンチを選ぶかを観察する。
      向きはデザインだ。それは何を想定しているのか？
    follow_ups:
      - 向きはベンチをどのように形作るか？
      - 方向がなければベンチはどうなるか？
      - 向きと眺めとの関係は？
  - id: hi_ps_sidewalk_dance
    name: 歩道のダンス
    prompt: |
      二人が近づく。ダンス—どちらが動くのか？
      歩道のダンスは普遍的だ。すれ違いを観察する。
      ダンスは言葉にされない。それは何が必要か？
    follow_ups:
      - ダンスは歩き方をどのように形作るか？
      - それがなければ歩道はどうなるか？
      - ダンスと礼儀作法との関係は？
  - id: hi_ps_object_abandoned
    name: 忘れられたオブジェクト
    prompt: |
      地面に落ちた手袋。ベンチの上のスカーフ。オブジェクトは忘れられている。
      それを観察する。誰がそれを残したのか？誰がそれを拾うのか？
      忘れられたオブジェクトは小さな謎だ。それは何を明らかにするのか？
    follow_ups:
      - 忘れられたオブジェクトは空間をどのように形作るか？
      - このようなオブジェクトがなければ空間はどうなるか？
      - 忘れられたものと喪失との関係は？
  - id: hi_ps_pathway_surface
    name: 小道の表面
    prompt: |
      舗装、砂利、草。表面は歩き方に影響する。
      選択を観察する。表面は体に何を要求するか？
      表面はデザインだ。それは何をもたらすのか？
    follow_ups:
      - 表面は歩き方をどのように形作るか？
      - 異なる表面だったら小道はどうなるか？
      - 表面とアクセスとの関係は？
  - id: hi_ps_bench_weather
    name: ベンチと天気
    prompt: |
      雨、太陽、風。天気はベンチを形作る。雨の中誰が座るのか？
      誰が日陰を求めるのか？ベンチは露出している。
      ベンチと天気の関係を観察する。天気は何をするのか？
    follow_ups:
      - 天気はベンチをどのように形作るか？
      - 屋根があればベンチはどうなるか？
      - 天気と使用との関係は？
  - id: hi_ps_stranger_glance
    name: 見知らぬ人の視線
    prompt: |
      短い視線。視線は評価だ。安全か？脅威か？
      視線は自動的だ。自分の視線を観察する。
      視線は何をするのか？視線はサバイバルツールだ。
      それは何を要求するか？
    follow_ups:
      - 視線は空間をどのように形作るか？
      - 視線がなければ空間はどうなるか？
      - 視線と安全との関係は？
  - id: hi_ps_pathway_crowd
    name: 小道の群衆
    prompt: |
      小道は混雑している。体が圧縮される。群衆には独自の流れがある。
      動きを観察する。群衆は集合体だ。それは個人に何を要求するか？
    follow_ups:
      - 群衆は小道をどのように形作るか？
      - 空っぽだったら小道はどうなるか？
      - 群衆と流れとの関係は？
  - id: hi_ps_bench_curve
    name: ベンチの曲線
    prompt: |
      ベンチは曲がっているものがある。互いに向かい合ったり、中央を向いたりする。
      曲線は社会性を形作る。配置を観察する。
      曲線は何をもたらすのか？曲線はデザインだ。それは何を望んでいるのか？
    follow_ups:
      - 曲線はベンチをどのように形作るか？
      - まっすぐだったらベンチはどうなるか？
      - 曲線とつながりとの関係は？
  - id: hi_ps_object_traded
    name: 交換されるオブジェクト
    prompt: |
      手渡し。購入。贈り物。オブジェクトは見知らぬ人の間で移動する。
      交換を観察する。オブジェクト以外に何が渡されるのか？
      取引はつながりの瞬間だ。それは何を生み出すのか？
    follow_ups:
      - 取引は空間をどのように形作るか？
      - このような取引がなければ空間はどうなるか？
      - 取引と信頼との関係は？
  - id: hi_ps_pathway_light
    name: 小道の光
    prompt: |
      昼、夜、街灯。光は小道を形作る。違いを観察する。
      誰が夜に歩くのか？光は安全と雰囲気だ。
      それは何を提供するのか？
    follow_ups:
      - 光は小道をどのように形作るか？
      - 暗闇の中の小道はどうなるか？
      - 光と安全との関係は？
  - id: hi_ps_bench_armrest_gap
    name: ベンチのアームレストの隙間
    prompt: |
      アームレストは分割する。一人に一つの区画。隙間は共有を防ぐ。
      デザインを観察する。隙間は何を排除するのか？
      アームレストの隙間は敵対的な建築だ。それは何を想定しているのか？
    follow_ups:
      - 隙間はベンチをどのように形作るか？
      - アームレストがなければベンチはどうなるか？
      - 隙間と排除との関係は？
  - id: hi_ps_stranger_smile
    name: 見知らぬ人の笑顔
    prompt: |
      見知らぬ人からの笑顔。予期せぬものだ。笑顔は贈り物だ。
      反応を観察する。笑顔は何をするのか？
      笑顔は契約の小さな破れだ。それは何を生み出すのか？
    follow_ups:
      - 笑顔は空間をどのように形作るか？
      - もっと笑顔があったら空間はどうなるか？
      - 笑顔とつながりとの関係は？
  - id: hi_ps_object_touch
    name: オブジェクトの接触
    prompt: |
      手すりについた手。階段についた足。接触は体と空間をつなぐ。
      オブジェクトは共有されている。接触を観察する。
      接触は何をするのか？オブジェクトは接触点だ。
      それは何を持つのか？
    follow_ups:
      - 接触は空間をどのように形作るか？
      - 接触がなければ空間はどうなるか？
      - 接触と存在との関係は？
  - id: hi_ps_pathway_choice
    name: 小道の選択
    prompt: |
      小道が二股に分かれる。左か右か？選択は小さい。
      決定を観察する。それを何が決定するのか？
      小道の選択は、主体性の瞬間だ。それは何を示すのか？
    follow_ups:
      - 選択は歩き方をどのように形作るか？
      - 二股がなければ小道はどうなるか？
      - 選択と目的地との関係は？
  - id: hi_ps_bench_empty
    name: 空のベンチ
    prompt: |
      ベンチは空だ。利用可能だ。なぜか？
      空のベンチを観察する。場所？時間？天気？
      空のベンチは招待だ。それは何を提供するのか？
    follow_ups:
      - 空のベンチは空間をどのように形作るか？
      - 空のベンチがなければ空間はどうなるか？
      - 空と機会との関係は？
  - id: hi_ps_stranger_queue
    name: 見知らぬ人の列
    prompt: |
      列ができる。見知らぬ人たちが一緒に待つ。
      列は秩序だ。忍耐を観察する。
      列は一時的なコミュニティを創造する。列は何を要求し、何を提供するのか？
    follow_ups:
      - 列は空間をどのように形作るか？
      - 列がなければ空間はどうなるか？
      - 列と公平性との関係は？
  - id: hi_ps_object_talisman_trust
    name: お守りの信頼
    prompt: |
      あなたはバッグを置く。あなたは空間を信頼する。
      お守りは試練だ。信頼を観察する。
      それは何を想定しているのか？お守りの信頼は賭けだ。
      それは何をもたらすのか？
    follow_ups:
      - 信頼は空間をどのように形作るか？
      - このような信頼がなければ空間はどうなるか？
      - 信頼と脆弱性との関係は？
  - id: hi_ps_pathway_end
    name: 小道の終わり
    prompt: |
      小道が終わる。目的地、壁、ゲート。終わりは閾だ。
      到着を観察する。終わりは何を提供するのか？
      小道の終わりは終結だ。それは何を意味するのか？
    follow_ups:
      - 終わりは歩き方をどのように形作るか？
      - 終わりがなければ小道はどうなるか？
      - 終わりと完了との関係は？
  - id: hi_ps_bench_duo
    name: ベンチのデュオ
    prompt: |
      二人がベンチを共有する。友人、恋人、見知らぬ人。
      デュオには力学がある。距離を観察する。会話か沈黙か。
      ベンチのデュオは小さな社会単位だ。それは何を生み出すのか？
    follow_ups:
      - デュオはベンチをどのように形作るか？
      - 一人だったらベンチはどうなるか？
      - デュオとつながりとの関係は？
  - id: hi_ps_stranger_danger
    name: 見知らぬ人への警戒
    prompt: |
      体は評価する。安全か？評価は自動的だ。
      信号を観察する。何が注意を促すのか？
