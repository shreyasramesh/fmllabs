# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# واجهة الإنسان — التجزئة (Arabic)

id: human_interface_retail
name: واجهة الإنسان — التجزئة
description: 50 بطاقة لتغيير نظرتك إلى مساحة البيع بالتجزئة — من الممرات ورقصات التصفح إلى غرف القياس ورقصة الشراء.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: تدفق الممر
    prompt: |
      الممر يوجه الحركة. العربات تسير في اتجاه واحد؛ الأجساد تتنقل. راقب التدفق. من يتنازل؟ من يعيق؟ للممر فيزياء خاصة. ما هي القواعد التي تحكم هذه الرقصة؟
    follow_ups:
      - كيف يشكل الممر تجربة التصفح؟
      - ماذا سيكون المتجر بدونه؟
      - ما هي العلاقة بين التدفق والتصميم؟
  - id: hi_rt_browsing_choreography
    name: تصميم التصفح
    prompt: |
      الأصابع تلمس القماش. العيون تمسح الرفوف. للتصفح إيقاع — توقف، تأمل، انتقل. راقب تصميم الحركة. ماذا يفعل الجسد عندما لا يكون في وضع الشراء؟
    follow_ups:
      - كيف يشكل التصفح التجربة؟
      - ماذا سيكون المتجر بدونه؟
      - ما هي العلاقة بين التصفح والرغبة؟
  - id: hi_rt_fitting_room
    name: غرفة القياس
    prompt: |
      ستارة تغلق. غرفة القياس عتبة — من العام إلى الخاص. في الداخل، تجرب ذاتًا محتملة. راقب العودة. ماذا تقول الوجوه؟ غرفة القياس هي مسرح للقرار.
    follow_ups:
      - كيف تشكل غرفة القياس عملية الشراء؟
      - ماذا سيكون المتجر بدونها؟
      - ما هي العلاقة بين القياس والهوية؟
  - id: hi_rt_dance_of_purchase
    name: رقصة الشراء
    prompt: |
      اقترب، اختر، احمل، ادفع. للشراء خطوات. راقب التسلسل. أين يتردد الناس؟ ترقص هذه الرقصة حسب تصميم المتجر. ماذا تستخلص؟
    follow_ups:
      - كيف تشكل الرقصة النتيجة؟
      - ماذا سيكون المتجر بدون هذا التسلسل؟
      - ما هي العلاقة بين الرقصة والرغبة؟
  - id: hi_rt_cart_territory
    name: منطقة العربة
    prompt: |
      العربة توسع الجسد. تحمل الخيارات، وتعيق المرور. راقب مسار العربة. العربة هي إقليم متحرك. ماذا تطالب؟
    follow_ups:
      - كيف تشكل العربة الحركة؟
      - ماذا سيكون المتجر بدون عربات؟
      - ما هي العلاقة بين العربة والتراكم؟
  - id: hi_rt_endcap_display
    name: عرض نهاية الممر
    prompt: |
      نهاية الممر تحتوي على عرض — للحث، أو للبيع، أو موسمي. يلفت عرض نهاية الممر الانتباه. راقب من يتوقف. عرض نهاية الممر هو فخ. ماذا يفعل؟
    follow_ups:
      - كيف يشكل عرض نهاية الممر تجربة التصفح؟
      - ماذا سيكون الممر بدونه؟
      - ما هي العلاقة بين العرض والحث؟
  - id: hi_rt_checkout_line
    name: طابور الدفع
    prompt: |
      يتشكل الطابور. حلوى، مجلات، فرص أخيرة. نقطة الدفع هي اختبار أخير. راقب الانتظار. ماذا يفعل الناس؟ الطابور هو عتبة بين التصفح والخروج.
    follow_ups:
      - كيف يشكل الطابور عملية الشراء؟
      - ماذا سيكون المتجر بدون الانتظار؟
      - ما هي العلاقة بين الطابور والحث؟
  - id: hi_rt_shelf_height
    name: ارتفاع الرف
    prompt: |
      مستوى العين يبيع. ارتفاع الرف هو تصميم. راقب ما هو موجود في كل مكان. ماذا يوجد في الأسفل؟ ماذا يوجد في الأعلى؟ الارتفاع يرمز للقيمة. ماذا يفترض عن الجسد؟
    follow_ups:
      - كيف يشكل ارتفاع الرف تجربة التصفح؟
      - ماذا سيكون المتجر بارتفاع موحد؟
      - ما هي العلاقة بين الارتفاع والوصول؟
  - id: hi_rt_price_tag
    name: بطاقة السعر
    prompt: |
      البطاقة تقول السعر. أحيانًا مخفية، أحيانًا بارزة. راقب مكان وضعها. البطاقة هي معلومات وحاجز. ماذا تفعل البطاقة في لحظة اللمس؟
    follow_ups:
      - كيف تشكل البطاقة القرار؟
      - ماذا سيكون المنتج بدون البطاقة؟
      - ما هي العلاقة بين البطاقة والقيمة؟
  - id: hi_rt_store_entrance
    name: مدخل المتجر
    prompt: |
      الباب يفتح. تدخل. المدخل هو عتبة. راقب ما تراه أولاً. المدخل يحدد النغمة. ماذا يريد المتجر أن تشعر به؟
    follow_ups:
      - كيف يشكل المدخل الزيارة؟
      - ماذا سيكون المتجر بدون تصميم؟
      - ما هي العلاقة بين المدخل والتوقع؟
  - id: hi_rt_sales_associate
    name: مساعد المبيعات
    prompt: |
      "هل يمكنني مساعدتك في العثور على شيء؟" العرض مكتوب. راقب التفاعل. تقبل أم ترفض؟ المساعد هو مرشد وضغط. ماذا يفعل العرض؟
    follow_ups:
      - كيف يشكل المساعد تجربة التصفح؟
      - ماذا سيكون المتجر بدونهم؟
      - ما هي العلاقة بين العرض والالتزام؟
  - id: hi_rt_basket_versus_cart
    name: سلة مقابل عربة
    prompt: |
      سلة لبضع قطع. عربة لمزيد. الاختيار يتنبأ بالشراء. راقب من يأخذ ماذا. السلة تحد؛ العربة تدعو. ماذا يتيح هذا الاختيار؟
    follow_ups:
      - كيف تشكل السلة الزيارة؟
      - ماذا سيكون المتجر مع عربات فقط؟
      - ما هي العلاقة بين وعاء التخزين والتراكم؟
  - id: hi_rt_return_counter
    name: مكتب الإرجاع
    prompt: |
      طابور الإرجاع مختلف. يحمل الناس حقائب، إيصالات، ندمًا. الإرجاع هو عكس. راقب التفاعل. ماذا يكلف الإرجاع — عاطفيًا، اجتماعيًا؟ مكتب الإرجاع هو موقع للإلغاء.
    follow_ups:
      - كيف يشكل الإرجاع العلاقة؟
      - ماذا سيكون المتجر بدون عمليات الإرجاع؟
      - ما هي العلاقة بين الإرجاع والثقة؟
  - id: hi_rt_dressing_room_limit
    name: حد غرفة القياس
    prompt: |
      "ست قطع كحد أقصى." الحد يتحكم في تجربة القياس. راقب التفاوض. ماذا يحدث عندما يكون لديك سبع قطع؟ الحد يشكل تجربة غرفة القياس. ماذا يفترض؟
    follow_ups:
      - كيف يشكل الحد عملية القياس؟
      - ماذا ستكون غرفة القياس بدونه؟
      - ما هي العلاقة بين الحد والسرقة؟
  - id: hi_rt_impulse_buy
    name: شراء اندفاعي
    prompt: |
      لم يكن العنصر على القائمة. لفت الانتباه. الشراء الاندفاعي هو لحظة استسلام. راقب متى يحدث. ما الذي حفزه؟ الاندفاع هو التقاء التصميم بالرغبة.
    follow_ups:
      - كيف يشكل الاندفاع عملية الشراء؟
      - ماذا سيكون المتجر بدون الاندفاع؟
      - ما هي العلاقة بين الاندفاع والندم؟
  - id: hi_rt_store_music
    name: موسيقى المتجر
    prompt: |
      الموسيقى تُعزف — بطيئة، مألوفة، مصممة. الموسيقى تشكل المزاج والسرعة. راقب الإيقاع. متجر سريع، موسيقى بطيئة؟ الموسيقى هي تصميم غير مرئي. ماذا تفعل للجسد؟
    follow_ups:
      - كيف تشكل الموسيقى الزيارة؟
      - ماذا سيكون المتجر في صمت؟
      - ما هي العلاقة بين الموسيقى والمدة؟
  - id: hi_rt_mannequin
    name: عارض أزياء (مانيكان)
    prompt: |
      عارض الأزياء يرتدي الملابس. إنه جسد مثالي، اقتراح. راقب كيف ينظر إليه الناس. عارض الأزياء هو مرآة وخيال. ماذا يعد؟
    follow_ups:
      - كيف يشكل عارض الأزياء تجربة التصفح؟
      - ماذا سيكون المتجر بدونه؟
      - ما هي العلاقة بين عارض الأزياء والرغبة؟
  - id: hi_rt_sample_station
    name: محطة العينات
    prompt: |
      تذوق هذا. جرب هذا. العينة تدعو للمس. المحطة تخلق وقفة. راقب من يتوقف. العينة هي هدية صغيرة. ماذا تستخلص؟
    follow_ups:
      - كيف تشكل العينة عملية الشراء؟
      - ماذا سيكون المتجر بدون عينات؟
      - ما هي العلاقة بين العينة والالتزام؟
  - id: hi_rt_sale_rack
    name: رف التخفيضات
    prompt: |
      رف التخفيضات هو فوضى — مخفض، مجعد. الناس يبحثون. رف التخفيضات هو نوع مختلف من التصفح. راقب السلوك. ماذا يفعل الخصم للمس؟
    follow_ups:
      - كيف يشكل رف التخفيضات الزيارة؟
      - ماذا سيكون المتجر بدونه؟
      - ما هي العلاقة بين التخفيض والقيمة؟
  - id: hi_rt_mirror_encounter
    name: مواجهة المرآة
    prompt: |
      ترى نفسك في مرآة المتجر. المواجهة حتمية. راقب النظرة. ماذا تتحقق؟ المرآة هي اختبار. المتجر يوفر المرآة. ماذا يريد؟
    follow_ups:
      - كيف تشكل المرآة تجربة القياس؟
      - ماذا ستكون غرفة القياس بدونها؟
      - ما هي العلاقة بين المرآة والذات؟
  - id: hi_rt_cashier_small_talk
    name: حديث أمين الصندوق الودي
    prompt: |
      "هل وجدت كل شيء بخير؟" يسأل أمين الصندوق. الحديث الودي مكتوب. راقب التفاعل. ماذا تفعل هذه السؤال؟ أمين الصندوق هو آخر اتصال بشري. ماذا يخلق هذا الحديث؟
    follow_ups:
      - كيف يشكل الحديث الودي الخروج؟
      - ماذا سيكون نقطة الدفع بدونها؟
      - ما هي العلاقة بين الحديث والمعاملة؟
  - id: hi_rt_store_layout
    name: تصميم المتجر
    prompt: |
      المسار مصمم. أساسيات في الخلف. حث على الواجهة. تصميم المتجر يوجه الزيارة. راقب مسارك. ماذا أراد المصمم أن تمر به؟
    follow_ups:
      - كيف يشكل التصميم تجربة التصفح؟
      - ماذا سيكون المتجر بتصميم عشوائي؟
      - ما هي العلاقة بين التصميم والتعرض؟
  - id: hi_rt_touch_decide
    name: اللمس يقرر
    prompt: |
      الأصابع تلمس القماش، السطح. اللمس يقرر. راقب اللحظة. ماذا تتعلم اليد مما لا تستطيع العين رؤيته؟ اللمس هو عتبة. ماذا يتطلب؟
    follow_ups:
      - كيف يشكل اللمس القرار؟
      - ماذا سيكون المتجر بدون لمس؟
      - ما هي العلاقة بين اللمس والالتزام؟
  - id: hi_rt_receipt_handoff
    name: تسليم الإيصال
    prompt: |
      يُقدم الإيصال — في الحقيبة أو منفصلاً. البعض يأخذه؛ البعض يرفض. الإيصال هو دليل وسجل. راقب التفاعل. ماذا يفعل الإيصال للمعاملة؟
    follow_ups:
      - كيف يشكل الإيصال الخروج؟
      - ماذا سيكون نقطة الدفع بدونها؟
      - ما هي العلاقة بين الإيصال والختام؟
  - id: hi_rt_store_exit
    name: مخرج المتجر
    prompt: |
      الباب يفتح. تغادر بحقيبة — أو فارغ اليدين. الخروج هو عتبة. راقب الشعور. ماذا يستخلص الخروج؟ الخروج هو نهاية الرقصة. ماذا يبقى؟
    follow_ups:
      - كيف يشكل الخروج الزيارة؟
      - ماذا سيكون المتجر بدون الباب؟
      - ما هي العلاقة بين الخروج والرضا؟
  - id: hi_rt_loyalty_card_ask
    name: سؤال بطاقة الولاء
    prompt: |
      "هل لديك بطاقة مكافآتنا؟" السؤال روتيني. راقب الاستجابة. نعم، لا، اشترك. بطاقة الولاء توسع العلاقة. ماذا يخلق هذا السؤال؟
    follow_ups:
      - كيف تشكل بطاقة الولاء المعاملة؟
      - ماذا سيكون نقطة الدفع بدونها؟
      - ما هي العلاقة بين البطاقة والبيانات؟
  - id: hi_rt_abandoned_cart
    name: عربة مهجورة
    prompt: |
      عربة تقف في الممر — مليئة، غير مراقبة. العربة مهجورة. راقب المحتويات. ماذا فكروا؟ الهجران هو لحظة لا. ماذا يكشف؟
    follow_ups:
      - كيف تشكل العربة المهجورة المتجر؟
      - ماذا سيتعلم المتجر منها؟
      - ما هي العلاقة بين الهجران والرغبة؟
  - id: hi_rt_fitting_room_opinion
    name: رأي غرفة القياس
    prompt: |
      "كيف تبدو؟" يسأل أحدهم من خارج الستارة. الرأي مطلوب. غرفة القياس تصبح اجتماعية. راقب التفاعل. ماذا يفعل الرأي؟
    follow_ups:
      - كيف يشكل الرأي القرار؟
      - ماذا ستكون تجربة القياس لوحدك؟
      - ما هي العلاقة بين الرأي والشراء؟
  - id: hi_rt_store_scent
    name: رائحة المتجر
    prompt: |
      للمتجر رائحة — عطر، جلد، نظافة. الرائحة مصممة. تدخل قبل أن تلاحظها. راقب متى تشمها. ماذا تفعل الرائحة للجسد؟
    follow_ups:
      - كيف تشكل الرائحة الزيارة؟
      - ماذا سيكون المتجر بدونها؟
      - ما هي العلاقة بين الرائحة والذاكرة؟
  - id: hi_rt_compare_prices
    name: مقارنة الأسعار
    prompt: |
      الهاتف في اليد. المسح. فحص السعر هو بحث. راقب اللحظة. ماذا يكشف الهاتف؟ المقارنة تحدث في الممر. ماذا تفعل للقرار؟
    follow_ups:
      - كيف تشكل المقارنة عملية الشراء؟
      - ماذا سيكون المتجر بدون هواتف؟
      - ما هي العلاقة بين المقارنة والقوة؟
  - id: hi_rt_window_display
    name: عرض الواجهة
    prompt: |
      الواجهة تواجه الشارع. عارضات أزياء، دعائم، قصة. العرض يوقف المشي. راقب ما يلفت الانتباه. الواجهة هي دعوة. ماذا تعد؟
    follow_ups:
      - كيف تشكل الواجهة المدخل؟
      - ماذا سيكون المتجر بدونه؟
      - ما هي العلاقة بين العرض والرغبة؟
  - id: hi_rt_size_search
    name: البحث عن المقاس
    prompt: |
      الأصابع تقلب الشماعات. البحث عن المقاس. للبحث إيقاع. راقب الإحباط أو الارتياح. المقاس هو بوابة. ماذا يتطلب البحث؟
    follow_ups:
      - كيف يشكل البحث عن المقاس تجربة التصفح؟
      - ماذا سيكون المتجر مع جميع المقاسات مرئية؟
      - ما هي العلاقة بين المقاس والجسد؟
  - id: hi_rt_payment_choice
    name: خيار الدفع
    prompt: |
      بطاقة، نقد، هاتف. خيار الدفع هو لحظة المعاملة. راقب الطريقة. الخيار هو عادة وهوية. ماذا يوصل طريقة الدفع؟
    follow_ups:
      - كيف يشكل الدفع نقطة الدفع؟
      - ماذا سيكون المتجر بطريقة دفع واحدة؟
      - ما هي العلاقة بين الدفع والسرعة؟
  - id: hi_rt_store_regular
    name: زبون المتجر الدائم
    prompt: |
      الزبون الدائم يعرف تصميم المتجر. يتحرك بهدف. يومئ له المساعد. راقب الزبون الدائم. ماذا يعرف لا يعرفه الوافد الجديد؟ للزبون الدائم علاقة بالمكان.
    follow_ups:
      - كيف يشكل الزبون الدائم المتجر؟
      - ماذا سيكون المتجر بدون زبائن دائمين؟
      - ما هي العلاقة بين الزبون الدائم والولاء؟
  - id: hi_rt_bag_handoff
    name: تسليم الحقيبة
    prompt: |
      الحقيبة تُسلم — ممتلئة، عليها شعار. التسليم يكمل المعاملة. راقب التفاعل. ماذا تفعل الحقيبة للخروج؟ الحقيبة هي دليل وعبء.
    follow_ups:
      - كيف تشكل الحقيبة الخروج؟
      - ماذا سيكون الشراء بدونها؟
      - ما هي العلاقة بين الحقيبة والهوية؟
  - id: hi_rt_fitting_room_overflow
    name: تجاوز غرفة القياس
    prompt: |
      قطع كثيرة جدًا. يأخذها المساعد. "سأحتفظ بهذه." تجاوز الحد هو ثقة. راقب التفاعل. ماذا يحتفظ المساعد؟ تجاوز الحد يوسع تجربة القياس. ماذا يتيح؟
    follow_ups:
      - كيف يشكل تجاوز الحد عملية القياس؟
      - ماذا ستكون غرفة القياس بدونه؟
      - ما هي العلاقة بين تجاوز الحد والثقة؟
  - id: hi_rt_store_lighting
    name: إضاءة المتجر
    prompt: |
      الإضاءة مصممة — مكمّلة، ساطعة، دافئة. الإضاءة تشكل كيف تبدو الأشياء. راقب المرآة في هذا الضوء. ماذا تفعل الإضاءة للوجه، للقماش؟
    follow_ups:
