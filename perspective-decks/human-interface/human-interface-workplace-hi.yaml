# द ह्यूमन इंटरफ़ेस — कार्यस्थल (Hindi)

id: human_interface_workplace
name: द ह्यूमन इंटरफ़ेस — कार्यस्थल
description: 50 कार्ड जो कार्यस्थल को देखने के आपके तरीके को बदल देंगे—डेस्क के क्षेत्र और मीटिंग रूम से लेकर वॉटर कूलर और दृश्यमान बनाम अदृश्य पदानुक्रम तक।
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: डेस्क क्षेत्र
    prompt: |
      एक डेस्क पर दावा किया गया है—तस्वीरें, पौधे, मग। क्षेत्र सतह से परे
      फैलता है। सीमाओं का निरीक्षण करें। क्या "मेरा" चिह्नित करता है? डेस्क
      एक छोटा सा राज्य है। इसकी रक्षा कैसे की जाती है?
    follow_ups:
      - डेस्क पहचान को कैसे आकार देता है?
      - निजीकरण के बिना कार्यस्थल कैसा होगा?
      - क्षेत्र और अपनेपन के बीच क्या संबंध है?
  - id: hi_wp_meeting_room
    name: मीटिंग रूम
    prompt: |
      कमरे में एक मेज, कुर्सियाँ, एक स्क्रीन है। दरवाज़ा बंद हो जाता है। मीटिंग
      रूम प्रदर्शन के लिए एक मंच है। निरीक्षण करें कि कौन बोलता है, कौन नहीं।
      कमरा पदानुक्रम रखता है। स्थान क्या सक्षम करता है?
    follow_ups:
      - कमरा मीटिंग को कैसे आकार देता है?
      - मीटिंग रूम के बिना कार्यस्थल कैसा होगा?
      - कमरे और शक्ति के बीच क्या संबंध है?
  - id: hi_wp_water_cooler
    name: वॉटर कूलर
    prompt: |
      वॉटर कूलर एक चौराहा है। लोग वहां संयोग से मिलते हैं। मुलाकात अनौपचारिक
      है। बातचीत का निरीक्षण करें। मीटिंग में जो नहीं कहा जाएगा, वह कूलर
      पर क्या कहा जाता है?
    follow_ups:
      - कूलर संस्कृति को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - कूलर और संबंध के बीच क्या संबंध है?
  - id: hi_wp_visible_hierarchy
    name: दृश्यमान पदानुक्रम
    prompt: |
      कॉर्नर ऑफ़िस, खिड़की वाली सीटें, क्यूबिकल। स्थान रैंक को एन्कोड करता
      है। वितरण का निरीक्षण करें। किसे क्या मिलता है? पदानुक्रम वास्तुकला
      में बनाया गया है। यह क्या संचार करता है?
    follow_ups:
      - पदानुक्रम व्यवहार को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - स्थान और स्थिति के बीच क्या संबंध है?
  - id: hi_wp_invisible_hierarchy
    name: अदृश्य पदानुक्रम
    prompt: |
      कुछ लोगों को सुना जाता है; दूसरों को बाधित किया जाता है। पदानुक्रम
      संगठन चार्ट पर नहीं है। मीटिंग का निरीक्षण करें। कौन झुकता है? कौन
      हावी होता है? अदृश्य पदानुक्रम परिणामों को आकार देता है।
    follow_ups:
      - अदृश्य पदानुक्रम कैसे उभरता है?
      - कार्यस्थल कैसा होगा यदि यह दृश्यमान होता?
      - अदृश्य और शक्ति के बीच क्या संबंध है?
  - id: hi_wp_cubicle_wall
    name: क्यूबिकल दीवार
    prompt: |
      दीवार नीची है—आप इसके ऊपर देख सकते हैं। गोपनीयता आंशिक है। क्यूबिकल
      एक समझौता है। दृष्टि रेखाओं का निरीक्षण करें। आप क्या सुन सकते हैं?
      आप क्या देख सकते हैं? दीवार सीमा का भ्रम पैदा करती है।
    follow_ups:
      - क्यूबिकल फोकस को कैसे आकार देता है?
      - पूरी दीवारों वाले कार्यस्थल कैसा होगा?
      - दीवार और गोपनीयता के बीच क्या संबंध है?
  - id: hi_wp_corner_office
    name: कॉर्नर ऑफिस
    prompt: |
      कॉर्नर ऑफिस में दो खिड़कियाँ हैं। यह पुरस्कार है। निरीक्षण करें कि
      कौन इसे रखता है। कॉर्नर ऑफिस को फ़्लोर से देखा जा सकता है। यह एक
      प्रतीक है। कोना क्या संवाद करता है?
    follow_ups:
      - कॉर्नर ऑफिस आकांक्षा को कैसे आकार देता है?
      - इसके बिना फ़्लोर कैसा होगा?
      - कोने और अधिकार के बीच क्या संबंध है?
  - id: hi_wp_open_plan
    name: ओपन प्लान
    prompt: |
      कोई दीवार नहीं। पंक्तियों या पॉड्स में डेस्क। ओपन प्लान सहयोग का
      वादा करता है। वास्तविकता का निरीक्षण करें। हेडफ़ोन कौन पहनता है?
      ओपन प्लान निकटता बनाता है। इसकी लागत क्या है?
    follow_ups:
      - ओपन प्लान बातचीत को कैसे आकार देता है?
      - दीवारों वाले कार्यस्थल कैसा होगा?
      - खुला और फोकस के बीच क्या संबंध है?
  - id: hi_wp_calendar_invite
    name: कैलेंडर आमंत्रण
    prompt: |
      आमंत्रण आता है। स्वीकार करें, अस्वीकार करें, अनिश्चित। कैलेंडर दिन को
      संरचित करता है। ब्लॉकों का निरीक्षण करें। किसका समय कौन नियंत्रित
      करता है? कैलेंडर शक्ति का नक्शा है।
    follow_ups:
      - कैलेंडर दिन को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - आमंत्रण और दायित्व के बीच क्या संबंध है?
  - id: hi_wp_knock_before_enter
    name: प्रवेश से पहले दस्तक दें
    prompt: |
      कुछ दरवाज़े बंद हैं। दस्तक एक अनुरोध है। निरीक्षण करें कि कौन दस्तक
      देता है और कौन अंदर आता है। दस्तक सम्मान को एन्कोड करती है। बंद
      दरवाज़ा क्या बचाता है?
    follow_ups:
      - दस्तक मुठभेड़ को कैसे आकार देती है?
      - खुले दरवाजों वाले कार्यस्थल कैसा होगा?
      - दस्तक और सीमा के बीच क्या संबंध है?
  - id: hi_wp_headphones_signal
    name: हेडफ़ोन संकेत
    prompt: |
      हेडफ़ोन चालू का मतलब है "बाधा न डालें"। संकेत सार्वभौमिक है।
      निरीक्षण करें कि कौन इसका सम्मान करता है। हेडफ़ोन एक बुलबुला बनाते
      हैं। बुलबुला क्या सक्षम करता है?
    follow_ups:
      - हेडफ़ोन फ़्लोर को कैसे आकार देते हैं?
      - उनके बिना कार्यस्थल कैसा होगा?
      - हेडफ़ोन और फोकस के बीच क्या संबंध है?
  - id: hi_wp_lunch_room
    name: लंच रूम
    prompt: |
      लंच रूम में मेजें, माइक्रोवेव, फ्रिज हैं। लोग अकेले या साथ में खाते
      हैं। समूहों का निरीक्षण करें। किसके साथ कौन बैठता है? लंच रूम
      गठबंधन प्रकट करता है। व्यवस्था क्या कहती है?
    follow_ups:
      - लंच रूम संस्कृति को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - लंच और कनेक्शन के बीच क्या संबंध है?
  - id: hi_wp_slack_ping
    name: स्लैक पिंग
    prompt: |
      पिंग आता है। तत्काल, अतुल्यकालिक। पिंग बाधित कर सकता है या इंतजार
      कर सकता है। मानदंडों का निरीक्षण करें। कौन तुरंत प्रतिक्रिया करता है?
      पिंग संचार की एक नई लय बनाता है। यह क्या बदलता है?
    follow_ups:
      - पिंग दिन को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - पिंग और तात्कालिकता के बीच क्या संबंध है?
  - id: hi_wp_whiteboard_claim
    name: व्हाइटबोर्ड दावा
    prompt: |
      व्हाइटबोर्ड विचारों को रखता है—आरेख, सूचियाँ। किसी ने उन्हें लिखा
      है। बोर्ड एक साझा सतह है। निरीक्षण करें कि कौन लिखता है, कौन मिटाता
      है। बोर्ड क्षेत्र है। यह क्या रखता है?
    follow_ups:
      - व्हाइटबोर्ड सहयोग को कैसे आकार देता है?
      - इसके बिना मीटिंग कैसी होगी?
      - बोर्ड और विचार के बीच क्या संबंध है?
  - id: hi_wp_elevator_encounter
    name: लिफ्ट मुठभेड़
    prompt: |
      आप एक सहकर्मी के साथ लिफ्ट साझा करते हैं। तीस सेकंड। मुठभेड़ अजीब
      या आसान है। छोटी बातचीत का निरीक्षण करें। क्या कहा जाता है? लिफ्ट
      समय को संपीड़ित करती है। इसकी आवश्यकता क्या है?
    follow_ups:
      - लिफ्ट मुठभेड़ को कैसे आकार देती है?
      - लिफ्ट के बिना इमारत कैसी होगी?
      - लिफ्ट और शिष्टाचार के बीच क्या संबंध है?
  - id: hi_wp_cc_email
    name: सीसी ईमेल
    prompt: |
      आपको सीसी किया गया है। आप मुख्य प्राप्तकर्ता नहीं हैं। सीसी आपको
      लूप में शामिल करता है। निरीक्षण करें कि किसे सीसी किया गया है। सीसी
      प्रासंगिकता—या राजनीति का संकेत है। सीसी क्या करता है?
    follow_ups:
      - सीसी संचार को कैसे आकार देता है?
      - सीसी के बिना कार्यस्थल कैसा होगा?
      - सीसी और दृश्यता के बीच क्या संबंध है?
  - id: hi_wp_standing_desk
    name: स्टैंडिंग डेस्क
    prompt: |
      डेस्क ऊपर उठता है। कार्यकर्ता खड़ा होता है। स्टैंडिंग डेस्क एक
      चुनाव है—स्वास्थ्य, वरीयता, प्रदर्शन। निरीक्षण करें कि किसके पास
      एक है। स्टैंडिंग डेस्क क्या संकेत देता है?
    follow_ups:
      - स्टैंडिंग डेस्क शरीर को कैसे आकार देता है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - खड़ा होना और उत्पादकता के बीच क्या संबंध है?
  - id: hi_wp_conference_call
    name: कॉन्फ्रेंस कॉल
    prompt: |
      कहीं और से आवाजें। कॉल वितरित लोगों को जोड़ती है। निरीक्षण करें कि
      कौन बोलता है, कौन म्यूट करता है। कॉल एक आंशिक उपस्थिति है। कॉल
      क्या सक्षम करती है—और क्या खो जाती है?
    follow_ups:
      - कॉल मीटिंग को कैसे आकार देती है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - कॉल और उपस्थिति के बीच क्या संबंध है?
  - id: hi_wp_office_plant
    name: ऑफिस प्लांट
    prompt: |
      डेस्क पर एक पौधा—पोथोस, रसीला। यह सजावट और देखभाल है। पौधा कंपनी
      का नहीं है। निरीक्षण करें कि किसके पास एक है। पौधा स्थान में क्या
      जोड़ता है?
    follow_ups:
      - पौधा डेस्क को कैसे आकार देता है?
      - पौधों के बिना कार्यस्थल कैसा होगा?
      - पौधा और पहचान के बीच क्या संबंध है?
  - id: hi_wp_after_hours
    name: ऑफ-आवर्स
    prompt: |
      अधिकांश के जाने के बाद कार्यालय। रोशनी मंद है। ऑफ-आवर्स कार्यकर्ता
      दृश्यमान है—समर्पित या संघर्षरत। दृश्य का निरीक्षण करें। खाली
      कार्यालय क्या सक्षम करता है? इसकी लागत क्या है?
    follow_ups:
      - ऑफ-आवर्स संस्कृति को कैसे आकार देते हैं?
      - इसके बिना कार्यस्थल कैसा होगा?
      - घंटे और अपेक्षा के बीच क्या संबंध है?
  - id: hi_wp_nameplate
    name: नेमप्लेट
    prompt: |
      डेस्क पर, दरवाजे पर एक नाम। नेमप्लेट स्थान पर दावा करती है। निरीक्षण
      करें कि किसके पास एक है। नेमप्लेट पहचान और क्षेत्र है। यह राहगीरों
      को क्या संवाद करता है?
    follow_ups:
      - नेमप्लेट स्थान को कैसे आकार देती है?
      - इसके बिना कार्यस्थल कैसा होगा?
      - नेमप्लेट और उपस्थिति के बीच क्या संबंध है?
  - id: hi_wp_meeting_overrun
    name: मीटिंग ओवररन
    prompt: |
      मीटिंग समाप्त होनी थी। यह नहीं होती। ओवररन आम है। गतिशीलता का
      निरीक्षण करें। किसकी अगली मीटिंग है? कौन रह सकता है? ओवररन एक शक्ति
      चाल है। यह क्या निकालता है?
    follow_ups:
      - ओवररन दिन को कैसे आकार देता है?
      - सख्त अंत वाले कार्यस्थल कैसा होगा?
      - ओवररन और सम्मान के बीच क्या संबंध है?
  - id: hi_wp_quick_question
    name: त्वरित प्रश्न
    prompt: |
      "क्या आपके पास एक त्वरित प्रश्न है?" पूछना बाधित करता है। "त्वरित" एक
      वादा है। विनिमय का निरीक्षण करें। यह कितना त्वरित है? त्वरित प्रश्न
      समय का एक वार्ता है। इसकी लागत क्या है?
    follow_ups:
      - त्वरित प्रश्न प्रवाह को कैसे आकार देता है?
      - रुकावटों के बिना कार्यस्थल कैसा होगा?
      - त्वरित और सम्मान के बीच क्या संबंध है?
  - id: hi_wp_bathroom_encounter
    name: बाथरूम मुठभेड़
    prompt: |
