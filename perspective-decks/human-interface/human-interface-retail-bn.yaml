# দ্য হিউম্যান ইন্টারফেস — রিটেল (Bengali)

id: human_interface_retail
name: দ্য হিউম্যান ইন্টারফেস — রিটেল
description: রিটেল স্পেসটিকে আপনি কীভাবে দেখছেন তা পরিবর্তনের জন্য ৫০টি কার্ড—আইল এবং ব্রাউজিং কোরিওগ্রাফি থেকে শুরু করে ফিটিং রুম এবং কেনাকাটার নাচ পর্যন্ত।
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: আইলের প্রবাহ
    prompt: |
      আইল চলাচলকে নির্দেশ করে। কার্ট একদিকে যায়; মানুষ চলাচল করে। প্রবাহ পর্যবেক্ষণ করুন।
      কে পথ দেয়? কে বাধা দেয়? আইলের একটি নিজস্ব পদার্থবিদ্যা আছে। এই নৃত্যের
      নিয়ম কী?
    follow_ups:
      - ব্রাউজিং কীভাবে আইল দ্বারা প্রভাবিত হয়?
      - আইল ছাড়া স্টোর কেমন হবে?
      - প্রবাহ এবং নকশার মধ্যে সম্পর্ক কী?
  - id: hi_rt_browsing_choreography
    name: ব্রাউজিং কোরিওগ্রাফি
    prompt: |
      আঙুল কাপড়ে লাগে। চোখ তাক জুড়ে। ব্রাউজিং-এর একটি ছন্দ আছে—থামুন, বিবেচনা করুন,
      এগিয়ে যান। কোরিওগ্রাফি পর্যবেক্ষণ করুন। যখন শরীর কিনছে না তখন কী করে?
    follow_ups:
      - ব্রাউজিং অভিজ্ঞতাকে কীভাবে আকার দেয়?
      - ব্রাউজিং ছাড়া স্টোর কেমন হবে?
      - ব্রাউজিং এবং আকাঙ্ক্ষার মধ্যে সম্পর্ক কী?
  - id: hi_rt_fitting_room
    name: ফিটিং রুম
    prompt: |
      পর্দা বন্ধ। ফিটিং রুম একটি প্রবেশদ্বার—পাবলিক থেকে প্রাইভেট। ভেতরে, আপনি একটি
      সম্ভাব্য স্বত্বা পরিধান করেন। রিটার্ন পর্যবেক্ষণ করুন। মুখ কী বলে? ফিটিং রুম
      সিদ্ধান্তের একটি মঞ্চ।
    follow_ups:
      - ফিটিং রুম কেনাকাটাকে কীভাবে প্রভাবিত করে?
      - এটি ছাড়া স্টোর কেমন হবে?
      - ফিটিং এবং পরিচয়ের মধ্যে সম্পর্ক কী?
  - id: hi_rt_dance_of_purchase
    name: কেনাকাটার নাচ
    prompt: |
      কাছে যান, নির্বাচন করুন, বহন করুন, পেমেন্ট করুন। কেনাকাটার নির্দিষ্ট ধাপ আছে।
      সিকোয়েন্স পর্যবেক্ষণ করুন। মানুষ কোথায় দ্বিধা করে? নাচটি স্টোর দ্বারা কোরিওগ্রাফ করা
      হয়। এটি কী বের করে আনে?
    follow_ups:
      - নাচ ফলাফলকে কীভাবে প্রভাবিত করে?
      - এই সিকোয়েন্স ছাড়া স্টোর কেমন হবে?
      - নাচ এবং আকাঙ্ক্ষার মধ্যে সম্পর্ক কী?
  - id: hi_rt_cart_territory
    name: কার্ট টেরিটরি
    prompt: |
      কার্ট শরীরকে প্রসারিত করে। এটি পছন্দ ধারণ করে, পথ আটকায়। কার্টের পথ পর্যবেক্ষণ
      করুন। কার্ট একটি চলমান অঞ্চল। এটি কী দাবি করে?
    follow_ups:
      - কার্ট চলাচলকে কীভাবে প্রভাবিত করে?
      - কার্ট ছাড়া স্টোর কেমন হবে?
      - কার্ট এবং সঞ্চয়ের মধ্যে সম্পর্ক কী?
  - id: hi_rt_endcap_display
    name: এন্ডক্যাপ ডিসপ্লে
    prompt: |
      আইলের শেষে একটি ডিসপ্লে—ইমপালস, সেল, সিজনাল। এন্ডক্যাপ চোখ আকর্ষণ করে।
      পর্যবেক্ষণ করুন কে থামে। এন্ডক্যাপ একটি ফাঁদ। এটি কী করে?
    follow_ups:
      - এন্ডক্যাপ ব্রাউজিংকে কীভাবে প্রভাবিত করে?
      - এটি ছাড়া আইল কেমন হবে?
      - ডিসপ্লে এবং ইমপালসের মধ্যে সম্পর্ক কী?
  - id: hi_rt_checkout_line
    name: চেকআউট লাইন
    prompt: |
      লাইন তৈরি হয়। ক্যান্ডি, ম্যাগাজিন, শেষ সুযোগ। চেকআউট একটি চূড়ান্ত পরীক্ষা।
      অপেক্ষা পর্যবেক্ষণ করুন। মানুষ কী করে? লাইন ব্রাউজ এবং প্রস্থান করার মধ্যে একটি
      প্রবেশদ্বার।
    follow_ups:
      - লাইন কেনাকাটাকে কীভাবে প্রভাবিত করে?
      - অপেক্ষা ছাড়া স্টোর কেমন হবে?
      - লাইন এবং ইমপালসের মধ্যে সম্পর্ক কী?
  - id: hi_rt_shelf_height
    name: তাকের উচ্চতা
    prompt: |
      চোখের স্তরে বিক্রি হয়। তাকের উচ্চতা নকশা। কী কোথায় আছে তা পর্যবেক্ষণ করুন।
      নিচে কী আছে? উপরে কী আছে? উচ্চতা মূল্য এনকোড করে। এটি শরীর সম্পর্কে কী অনুমান
      করে?
    follow_ups:
      - তাকের উচ্চতা ব্রাউজিংকে কীভাবে প্রভাবিত করে?
      - সমান উচ্চতার স্টোর কেমন হবে?
      - উচ্চতা এবং অ্যাক্সেসের মধ্যে সম্পর্ক কী?
  - id: hi_rt_price_tag
    name: মূল্য ট্যাগ
    prompt: |
      ট্যাগ মূল্য বলে। কখনো লুকানো, কখনো প্রধান। প্লেসমেন্ট পর্যবেক্ষণ করুন।
      ট্যাগ তথ্য এবং বাধা। স্পর্শের মুহূর্তকে ট্যাগ কী করে?
    follow_ups:
      - ট্যাগ সিদ্ধান্তকে কীভাবে প্রভাবিত করে?
      - ট্যাগ ছাড়া আইটেম কেমন হবে?
      - ট্যাগ এবং মূল্যের মধ্যে সম্পর্ক কী?
  - id: hi_rt_store_entrance
    name: স্টোরের প্রবেশদ্বার
    prompt: |
      দরজা খোলে। আপনি প্রবেশ করেন। প্রবেশদ্বার একটি থ্রেশহোল্ড। আপনি প্রথমে কী দেখেন
      তা পর্যবেক্ষণ করুন। প্রবেশদ্বার টোন সেট করে। স্টোর আপনাকে কী অনুভব করাতে
      চায়?
    follow_ups:
      - প্রবেশদ্বার ভিজিটকে কীভাবে প্রভাবিত করে?
      - ডিজাইন ছাড়া স্টোর কেমন হবে?
      - প্রবেশদ্বার এবং প্রত্যাশার মধ্যে সম্পর্ক কী?
  - id: hi_rt_sales_associate
    name: সেলস অ্যাসোসিয়েট
    prompt: |
      "আমি কি আপনাকে কিছু খুঁজে পেতে সাহায্য করতে পারি?" অফারটি স্ক্রিপ্টেড।
      এক্সচেঞ্জ পর্যবেক্ষণ করুন। গ্রহণ করুন নাকি প্রত্যাখ্যান করুন? অ্যাসোসিয়েট একজন
      গাইড এবং একটি চাপ। অফার কী করে?
    follow_ups:
      - অ্যাসোসিয়েট ব্রাউজিংকে কীভাবে প্রভাবিত করে?
      - তারা ছাড়া স্টোর কেমন হবে?
      - অফার এবং বাধ্যবাধকতার মধ্যে সম্পর্ক কী?
  - id: hi_rt_basket_versus_cart
    name: ঝুড়ি বনাম কার্ট
    prompt: |
      কয়েকটি আইটেমের জন্য ঝুড়ি। বেশি আইটেমের জন্য কার্ট। পছন্দ কেনাকাটার পূর্বাভাস
      দেয়। কে কী নেয় তা পর্যবেক্ষণ করুন। ঝুড়ি সীমাবদ্ধ করে; কার্ট আমন্ত্রণ জানায়।
      পছন্দ কী সক্ষম করে?
    follow_ups:
      - ঝুড়ি ভিজিটকে কীভাবে প্রভাবিত করে?
      - শুধু কার্ট থাকলে স্টোর কেমন হবে?
      - পাত্র এবং সঞ্চয়ের মধ্যে সম্পর্ক কী?
  - id: hi_rt_return_counter
    name: রিটার্ন কাউন্টার
    prompt: |
      রিটার্ন লাইন ভিন্ন। লোকেরা ব্যাগ, রসিদ, অনুশোচনা বহন করে। রিটার্ন একটি
      বিপরীত। এক্সচেঞ্জ পর্যবেক্ষণ করুন। রিটার্ন কী খরচ করে—মানসিকভাবে, সামাজিকভাবে?
      রিটার্ন কাউন্টার একটি আনডুইং সাইট।
    follow_ups:
      - রিটার্ন সম্পর্ককে কীভাবে প্রভাবিত করে?
      - রিটার্ন ছাড়া স্টোর কেমন হবে?
      - রিটার্ন এবং বিশ্বাসের মধ্যে সম্পর্ক কী?
  - id: hi_rt_dressing_room_limit
    name: ড্রেসিং রুমের সীমা
    prompt: |
      "সর্বোচ্চ ছয়টি আইটেম।" সীমা চেষ্টা করাকে নিয়ন্ত্রণ করে। আলোচনা পর্যবেক্ষণ করুন।
      আপনার সাতটি হলে কী হয়? সীমা ফিটিং রুমের অভিজ্ঞতাকে প্রভাবিত করে। এটি কী
      অনুমান করে?
    follow_ups:
      - সীমা চেষ্টা করাকে কীভাবে প্রভাবিত করে?
      - এটি ছাড়া ফিটিং রুম কেমন হবে?
      - সীমা এবং চুরির মধ্যে সম্পর্ক কী?
  - id: hi_rt_impulse_buy
    name: ইমপালস বাই
    prompt: |
      আইটেমটি তালিকায় ছিল না। এটি চোখে পড়েছিল। ইমপালস বাই আত্মসমর্পণের একটি
      মুহূর্ত। কখন ঘটে তা পর্যবেক্ষণ করুন। এটি কী শুরু করেছিল? ইমপালস হল নকশার
      সাথে আকাঙ্ক্ষার সাক্ষাৎ।
    follow_ups:
      - ইমপালস কেনাকাটাকে কীভাবে প্রভাবিত করে?
      - ইমপালস ছাড়া স্টোর কেমন হবে?
      - ইমপালস এবং অনুশোচনার মধ্যে সম্পর্ক কী?
  - id: hi_rt_store_music
    name: স্টোর মিউজিক
    prompt: |
      মিউজিক বাজছে—ধীর, পরিচিত, পরিকল্পিত। মিউজিক মেজাজ এবং গতিকে প্রভাবিত করে।
      টেম্পো পর্যবেক্ষণ করুন। দ্রুত স্টোর, ধীর মিউজিক? মিউজিক হল অদৃশ্য নকশা। এটি
      শরীরের সাথে কী করে?
    follow_ups:
      - মিউজিক ভিজিটকে কীভাবে প্রভাবিত করে?
      - নীরবতায় স্টোর কেমন হবে?
      - মিউজিক এবং সময়কালের মধ্যে সম্পর্ক কী?
  - id: hi_rt_mannequin
    name: ম্যানিকুইন
    prompt: |
      ম্যানিকুইন জামাকাপড় পরে। এটি একটি আদর্শ শরীর, একটি পরামর্শ। মানুষ কীভাবে
      তা দেখে তা পর্যবেক্ষণ করুন। ম্যানিকুইন একটি আয়না এবং একটি ফ্যান্টাসি। এটি কী
      প্রতিশ্রুতি দেয়?
    follow_ups:
      - ম্যানিকুইন ব্রাউজিংকে কীভাবে প্রভাবিত করে?
      - এটি ছাড়া স্টোর কেমন হবে?
      - ম্যানিকুইন এবং আকাঙ্ক্ষার মধ্যে সম্পর্ক কী?
  - id: hi_rt_sample_station
    name: স্যাম্পেল স্টেশন
    prompt: |
      এটি স্বাদ নিন। এটি চেষ্টা করুন। স্যাম্পেল স্পর্শের জন্য আমন্ত্রণ জানায়। স্টেশন
      একটি বিরতি তৈরি করে। কে থামে তা পর্যবেক্ষণ করুন। স্যাম্পেল একটি ছোট উপহার।
      এটি কী বের করে আনে?
    follow_ups:
      - স্যাম্পেল কেনাকাটাকে কীভাবে প্রভাবিত করে?
