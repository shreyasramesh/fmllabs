# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# The Human Interface — Retail (Urdu)

id: human_interface_retail
name: The Human Interface — Retail
description: 50 cards to shift how you see the retail space—from aisles and browsing choreography to fitting rooms and the dance of purchase.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: گلیارے کا بہاؤ
    prompt: |
      گلیارہ حرکت کو چینلائز کرتا ہے۔ کارٹ ایک طرف جاتی ہیں؛ جسم راستہ بناتے ہیں۔
      بہاؤ کا مشاہدہ کریں۔ کون راستہ دیتا ہے؟ کون راستہ روکتا ہے؟ گلیارے کا اپنا فزکس ہوتا ہے۔
      رقص کو کون سے اصول چلاتے ہیں؟
    follow_ups:
      - گلیارے کا براؤزنگ کے تجربے پر کیا اثر پڑتا ہے؟
      - گلیاروں کے بغیر اسٹور کیسا ہوگا؟
      - بہاؤ اور ڈیزائن کے درمیان کیا تعلق ہے؟
  - id: hi_rt_browsing_choreography
    name: براؤزنگ کی کوریوگرافی
    prompt: |
      اُنگلیاں کپڑے کو چھوتی ہیں۔ آنکھیں شیلفوں کو سکین کرتی ہیں۔ براؤزنگ کا ایک
      ردھم ہوتا ہے — رُکنا، غور کرنا، آگے بڑھنا۔ کوریوگرافی کا مشاہدہ کریں۔ خرید
      نہیں رہے ہوں تو جسم کیا کرتا ہے؟
    follow_ups:
      - براؤزنگ کے تجربے کو کیسے ترتیب دیتا ہے؟
      - براؤزنگ کے بغیر اسٹور کیسا ہوگا؟
      - براؤزنگ اور خواہش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_fitting_room
    name: فٹنگ روم
    prompt: |
      پرده بند ہو جاتا ہے۔ فٹنگ روم ایک دہلیز ہے — عوامی سے نجی تک۔ اندر،
      آپ خود کا ایک ممکنہ روپ آزما رہے ہوتے ہیں۔ واپسی کا مشاہدہ کریں۔ چہرہ کیا
      کہتا ہے؟ فٹنگ روم فیصلہ سازی کا ایک مرحلہ ہے۔
    follow_ups:
      - فٹنگ روم خریداری کو کیسے ترتیب دیتا ہے؟
      - اس کے بغیر اسٹور کیسا ہوگا؟
      - فٹنگ اور شناخت کے درمیان کیا تعلق ہے؟
  - id: hi_rt_dance_of_purchase
    name: خریداری کا رقص
    prompt: |
      پاس آئیں، منتخب کریں، اٹھائیں، ادائیگی کریں۔ خریداری کے کچھ مراحل ہوتے ہیں۔
      ترتیب کا مشاہدہ کریں۔ لوگ کہاں ہچکچاتے ہیں؟ رقص کو اسٹور نے ترتیب دیا ہے۔
      یہ کیا حاصل کرتا ہے؟
    follow_ups:
      - رقص نتیجے کو کیسے ترتیب دیتا ہے؟
      - ترتیب کے بغیر اسٹور کیسا ہوگا؟
      - رقص اور خواہش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_cart_territory
    name: کارٹ علاقہ
    prompt: |
      کارٹ جسم کو بڑھاتی ہے۔ یہ انتخاب رکھتی ہے، گزرنے میں رکاوٹ ڈالتی ہے۔
      کارٹ کے راستے کا مشاہدہ کریں۔ کارٹ ایک موبائل علاقہ ہے۔ یہ کیا دعویٰ کرتا ہے؟
    follow_ups:
      - کارٹ حرکت کو کیسے ترتیب دیتا ہے؟
      - کارٹوں کے بغیر اسٹور کیسا ہوگا؟
      - کارٹ اور جمع کرنے کے درمیان کیا تعلق ہے؟
  - id: hi_rt_endcap_display
    name: اینڈ کیپ ڈسپلے
    prompt: |
      گلیارے کے آخر میں ایک ڈسپلے ہوتا ہے — فوراً خریدنے والا، رعایت والا، موسمی۔
      اینڈ کیپ نظر پکڑ لیتا ہے۔ مشاہدہ کریں کون رُکتا ہے۔ اینڈ کیپ ایک جال ہے۔
      یہ کیا کرتا ہے؟
    follow_ups:
      - اینڈ کیپ براؤزنگ کو کیسے ترتیب دیتا ہے؟
      - اس کے بغیر گلیارہ کیسا ہوگا؟
      - ڈسپلے اور فوری خواہش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_checkout_line
    name: چیک آؤٹ لائن
    prompt: |
      لائن بنتی ہے۔ کینڈی، میگزین، آخری مواقع۔ چیک آؤٹ ایک آخری امتحان ہے۔
      انتظار کا مشاہدہ کریں۔ لوگ کیا کرتے ہیں؟ لائن براؤز اور ایگزٹ کے درمیان ایک
      دہلیز ہے۔
    follow_ups:
      - لائن خریداری کو کیسے ترتیب دیتی ہے؟
      - انتظار کے بغیر اسٹور کیسا ہوگا؟
      - لائن اور فوری خواہش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_shelf_height
    name: شیلف کی اونچائی
    prompt: |
      آنکھ کی سطح پر فروخت ہوتی ہے۔ شیلف کی اونچائی ڈیزائن ہے۔ مشاہدہ کریں کہ
      کیا کہاں ہے۔ نیچے کیا ہے؟ اوپر کیا ہے؟ اونچائی قیمت کو انکوڈ کرتی ہے۔ یہ جسم
      کے بارے میں کیا فرض کرتی ہے؟
    follow_ups:
      - شیلف کی اونچائی براؤزنگ کو کیسے ترتیب دیتی ہے؟
      - یکساں اونچائی والے اسٹور کیسا ہوگا؟
      - اونچائی اور رسائی کے درمیان کیا تعلق ہے؟
  - id: hi_rt_price_tag
    name: قیمت کا ٹیگ
    prompt: |
      ٹیگ پر قیمت لکھی ہوتی ہے۔ کبھی چھپا ہوا، کبھی نمایاں۔ جگہ کا مشاہدہ کریں۔
      ٹیگ معلومات اور رکاوٹ ہے۔ چھونے کے لمحے پر ٹیگ کیا اثر ڈالتا ہے؟
    follow_ups:
      - ٹیگ فیصلے کو کیسے ترتیب دیتا ہے؟
      - ٹیگ کے بغیر شے کیسی ہوگی؟
      - ٹیگ اور قیمت کے درمیان کیا تعلق ہے؟
  - id: hi_rt_store_entrance
    name: اسٹور کا داخلی راستہ
    prompt: |
      دروازہ کھلتا ہے۔ آپ داخل ہوتے ہیں۔ داخلی راستہ ایک دہلیز ہے۔ سب سے پہلے
      کیا نظر آتا ہے اس کا مشاہدہ کریں۔ داخلی راستہ لہجہ طے کرتا ہے۔ اسٹور آپ کو
      کیسا محسوس کروانا چاہتا ہے؟
    follow_ups:
      - داخلی راستہ وزٹ کو کیسے ترتیب دیتا ہے؟
      - ڈیزائن کے بغیر اسٹور کیسا ہوگا؟
      - داخلی راستہ اور توقع کے درمیان کیا تعلق ہے؟
  - id: hi_rt_sales_associate
    name: سیلز ایسوسی ایٹ
    prompt: |
      "کیا میں آپ کو کچھ ڈھونڈنے میں مدد کر سکتا ہوں؟" یہ پیشکش اسکرپٹ شدہ ہے۔
      تبادلے کا مشاہدہ کریں۔ قبول کریں یا انکار؟ ایسوسی ایٹ ایک رہنما اور دباؤ ہے۔
      پیشکش کیا کرتی ہے؟
    follow_ups:
      - ایسوسی ایٹ براؤزنگ کو کیسے ترتیب دیتا ہے؟
      - ان کے بغیر اسٹور کیسا ہوگا؟
      - پیشکش اور ذمہ داری کے درمیان کیا تعلق ہے؟
  - id: hi_rt_basket_versus_cart
    name: باسکٹ بمقابلہ کارٹ
    prompt: |
      چند اشیاء کے لیے باسکٹ۔ زیادہ کے لیے کارٹ۔ انتخاب خریداری کی پیشین گوئی کرتا ہے۔
      مشاہدہ کریں کہ کون کیا لیتا ہے۔ باسکٹ محدود کرتی ہے؛ کارٹ دعوت دیتا ہے۔
      انتخاب کیا قابل بناتا ہے؟
    follow_ups:
      - باسکٹ وزٹ کو کیسے ترتیب دیتی ہے؟
      - صرف کارٹوں کے ساتھ اسٹور کیسا ہوگا؟
      - برتن اور جمع کرنے کے درمیان کیا تعلق ہے؟
  - id: hi_rt_return_counter
    name: واپسی کاؤنٹر
    prompt: |
      واپسی کی لائن مختلف ہوتی ہے۔ لوگ بیگ، رسیدیں، پچھتاوا لے کر آتے ہیں۔
      واپسی ایک الٹنا ہے۔ تبادلے کا مشاہدہ کریں۔ واپسی کی کیا قیمت پڑتی ہے — جذباتی،
      سماجی؟ واپسی کاؤنٹر دوبارہ کرنے کی ایک جگہ ہے۔
    follow_ups:
      - واپسی تعلق کو کیسے ترتیب دیتی ہے؟
      - واپسی کے بغیر اسٹور کیسا ہوگا؟
      - واپسی اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_rt_dressing_room_limit
    name: ڈریسنگ روم کی حد
    prompt: |
      "زیادہ سے زیادہ چھ اشیاء۔" حد ٹرائی-آن کو کنٹرول کرتی ہے۔ سمجھوتہ کا مشاہدہ کریں۔
      سات ہونے پر کیا ہوتا ہے؟ حد ڈریسنگ روم کے تجربے کو ترتیب دیتی ہے۔ یہ کیا فرض
      کرتی ہے؟
    follow_ups:
      - حد ٹرائی-آن کو کیسے ترتیب دیتی ہے؟
      - اس کے بغیر ڈریسنگ روم کیسا ہوگا؟
      - حد اور چوری کے درمیان کیا تعلق ہے؟
  - id: hi_rt_impulse_buy
    name: فوری خریداری
    prompt: |
      آئٹم فہرست میں نہیں تھا۔ اس نے نظر پکڑ لی۔ فوری خریداری ہتھیار ڈالنے کا ایک
      لمحہ ہے۔ مشاہدہ کریں کہ یہ کب ہوتا ہے۔ اسے کس نے متحرک کیا؟ فوری خواہش
      کا ڈیزائن سے ملنا ہے۔
    follow_ups:
      - فوری خریداری خریداری کو کیسے ترتیب دیتی ہے؟
      - فوری خواہش کے بغیر اسٹور کیسا ہوگا؟
      - فوری خواہش اور پچھتاوا کے درمیان کیا تعلق ہے؟
  - id: hi_rt_store_music
    name: اسٹور کا میوزک
    prompt: |
      میوزک بجتا ہے — سست، واقف، ڈیزائن شدہ۔ میوزک موڈ اور رفتار کو ترتیب دیتا
      ہے۔ ٹیمپو کا مشاہدہ کریں۔ تیز اسٹور، سست میوزک؟ میوزک پوشیدہ ڈیزائن ہے۔
      یہ جسم کے ساتھ کیا کرتا ہے؟
    follow_ups:
      - میوزک وزٹ کو کیسے ترتیب دیتا ہے؟
      - خاموشی میں اسٹور کیسا ہوگا؟
      - میوزک اور دورانیے کے درمیان کیا تعلق ہے؟
  - id: hi_rt_mannequin
    name: مینیکین
    prompt: |
      مینیکین کپڑے پہنتا ہے۔ یہ ایک مثالی جسم، ایک تجویز ہے۔ مشاہدہ کریں کہ لوگ
      اسے کیسے دیکھتے ہیں۔ مینیکین ایک آئینے اور ایک فینٹسی ہے۔ یہ کیا وعدہ کرتا ہے؟
    follow_ups:
      - مینیکین براؤزنگ کو کیسے ترتیب دیتا ہے؟
      - اس کے بغیر اسٹور کیسا ہوگا؟
      - مینیکین اور خواہش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_sample_station
    name: سیمپل اسٹیشن
    prompt: |
      اسے چکھیں. اسے آزمائیں۔ سیمپل چھونے کی دعوت دیتا ہے۔ اسٹیشن ایک توقف
      پیدا کرتا ہے۔ مشاہدہ کریں کون رُکتا ہے۔ سیمپل ایک چھوٹا تحفہ ہے۔ یہ کیا حاصل
      کرتا ہے؟
    follow_ups:
      - سیمپل خریداری کو کیسے ترتیب دیتا ہے؟
      - سیمپل کے بغیر اسٹور کیسا ہوگا؟
      - سیمپل اور ذمہ داری کے درمیان کیا تعلق ہے؟
  - id: hi_rt_sale_rack
    name: سیل رَیک
    prompt: |
      سیل رَیک افراتفری ہے — رعایت والے، میلے کُچیلے۔ لوگ کھودتے ہیں۔ سیل رَیک ایک
      مختلف قسم کا براؤز ہے۔ رویے کا مشاہدہ کریں۔ رعایت چھونے پر کیا اثر ڈالتی
      ہے؟
    follow_ups:
      - سیل رَیک وزٹ کو کیسے ترتیب دیتا ہے؟
      - اس کے بغیر اسٹور کیسا ہوگا؟
      - سیل اور قیمت کے درمیان کیا تعلق ہے؟
  - id: hi_rt_mirror_encounter
    name: آئینہ کا سامنا
    prompt: |
      آپ خود کو اسٹور کے آئینے میں دیکھتے ہیں۔ سامنا ناگزیر ہے۔ نگاہ کا مشاہدہ
      کریں۔ آپ کیا چیک کرتے ہیں؟ آئینہ ایک امتحان ہے۔ اسٹور آئینہ فراہم کرتا ہے۔
      وہ کیا چاہتا ہے؟
    follow_ups:
      - آئینہ ٹرائی-آن کو کیسے ترتیب دیتا ہے؟
      - اس کے بغیر ڈریسنگ روم کیسا ہوگا؟
      - آئینہ اور خود کے درمیان کیا تعلق ہے؟
  - id: hi_rt_cashier_small_talk
    name: کیشیر سے چھوٹی باتیں
    prompt: |
      "کیا سب کچھ ٹھیک ملا؟" کیشیر پوچھتا ہے۔ چھوٹی باتیں اسکرپٹ شدہ ہیں۔ تبادلے
      کا مشاہدہ کریں۔ سوال کیا کرتا ہے؟ کیشیر آخری انسانی رابطہ ہے۔ بات چیت کیا
      پیدا کرتی ہے؟
    follow_ups:
      - چھوٹی باتیں باہر نکلنے کو کیسے ترتیب دیتی ہیں؟
      - اس کے بغیر چیک آؤٹ کیسا ہوگا؟
      - بات چیت اور لین دین کے درمیان کیا تعلق ہے؟
  - id: hi_rt_store_layout
    name: اسٹور کا لے آؤٹ
    prompt: |
      راستہ ڈیزائن کیا گیا ہے۔ ضروری چیزیں پیچھے، فوری خواہش والی سامنے۔ لے
      آؤٹ وزٹ کی کوریوگرافی کرتا ہے۔ اپنے راستے کا مشاہدہ کریں۔ ڈیزائنر آپ کو
      کس چیز سے گزارنا چاہتا تھا؟
    follow_ups:
      - لے آؤٹ براؤزنگ کو کیسے ترتیب دیتا ہے؟
      - بے ترتیب لے آؤٹ والے اسٹور کیسا ہوگا؟
      - لے آؤٹ اور نمائش کے درمیان کیا تعلق ہے؟
  - id: hi_rt_touch_decide
    name: چھو کر فیصلہ کریں
    prompt: |
      اُنگلیاں کپڑے، سطح کو چھوتی ہیں۔ چھونا فیصلہ کرتا ہے۔ لمحے کا مشاہدہ
      کریں۔ ہاتھ کیا سیکھتا ہے جو آنکھ نہیں سیکھ سکتی؟ چھونا ایک دہلیز ہے۔ یہ کیا
      ضروری کرتا ہے؟
    follow_ups:
      - چھونا فیصلے کو کیسے ترتیب دیتا ہے؟
      - چھونے کے بغیر اسٹور کیسا ہوگا؟
      - چھونا اور عزم کے درمیان کیا تعلق ہے؟
  - id: hi_rt_receipt_handoff
    name: رسید کی حوالگی
    prompt: |
      رسید پیش کی جاتی ہے — بیگ میں یا الگ۔ کچھ لیتے ہیں؛ کچھ انکار کرتے ہیں۔
      رسید ثبوت اور ریکارڈ ہے۔ تبادلے کا مشاہدہ کریں۔ رسید لین دین کے لیے کیا
      کرتی ہے؟
    follow_ups:
