# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Людський інтерфейс — Кав'ярня (Ukrainian)

id: human_interface_coffee_shop
name: Людський інтерфейс — Кав'ярня
description: 50 карток, щоб змінити ваш погляд на кав'ярню — від хореографії черги та територій з ноутбуками до третього місця, невидимих сценаріїв і кави як ритуалу.
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: Хореографія черги
    prompt: |
      Спостерігайте за чергою біля стійки. Тіла вишиковуються — нахил вперед,
      перевірка телефону, ледь помітне переступання. Черга має свій ритм. Хто контролює простір?
      Які неписані правила визначають, хто де стоїть?
    follow_ups:
      - Як черга формує очікування?
      - Що станеться, якщо всі проігнорують порядок?
      - Який зв'язок між очікуванням і приналежністю?
  - id: hi_cs_laptop_territory
    name: Територія ноутбука
    prompt: |
      Відкритий ноутбук на столі займає місце. Чашка поруч, сумка на стільці.
      Спостерігайте за межами. Скільки простору займає одна людина?
      Які сигнали вказують, що місце "зайняте"?
    follow_ups:
      - Як ноутбук розширює тіло?
      - Яким був би простір без пристроїв?
      - Який зв'язок між територією та часом перебування?
  - id: hi_cs_third_place
    name: Третє місце
    prompt: |
      Не дім, не робота — кав'ярня є третім місцем. Люди приходять побути наодинці разом.
      Помітьте, хто залишається. Хто швидко йде? Простір має інший соціальний контракт.
    follow_ups:
      - Яким було б місто без третіх місць?
      - Чим кав'ярня відрізняється від бібліотеки?
      - Який зв'язок між місцем і ідентичністю?
  - id: hi_cs_invisible_script
    name: Невидимий сценарій
    prompt: |
      Замовити, заплатити, почекати, отримати, знайти місце. Сценарій невидимий, доки
      хтось його не порушить. Поспостерігайте за новачком. Чого він не знає?
      Сценарій визначає приналежність.
    follow_ups:
      - Як сценарій виключає?
      - Що станеться, якби сценарій був записаний?
      - Який зв'язок між сценарієм і вільним володінням?
  - id: hi_cs_coffee_ritual
    name: Кава як ритуал
    prompt: |
      Напій — це другорядне. Ритуал — первинне — дорога, замовлення, перший ковток.
      Зверніть увагу на свої рухи. Що б ви втратили, якби кава прибувала до вашого дому?
    follow_ups:
      - Як ритуал позначає перехід?
      - Яким був би день без зупинки в кав'ярні?
      - Який зв'язок між ритуалом і готовністю?
  - id: hi_cs_counter_handoff
    name: Передача біля стійки
    prompt: |
      Бариста називає ім'я. Рука тягнеться. Передача — це момент контакту між незнайомцями.
      Спостерігайте за обміном. Що передається, крім чашки?
    follow_ups:
      - Як передача створює зв'язок?
      - Що змінилося б із роботом-баристою?
      - Який зв'язок між передачею та довірою?
  - id: hi_cs_power_outlet_hunt
    name: Пошук розетки
    prompt: |
      Очі сканують стіни, підлогу, під столами. Пошук розетки — це територіальний
      процес. Хто зайняв першим? Розетка визначає, де ви сидите. Географія підпорядковується електриці.
    follow_ups:
      - Як розташування розеток формує простір?
      - Яким був би простір без бездротового живлення?
      - Який зв'язок між розеткою та постійністю?
  - id: hi_cs_solo_table
    name: Одиночний стіл
    prompt: |
      Одна людина за столом на чотирьох. Порожні стільці — це буфер.
      Спостерігайте за розташуванням. Це захист? Вподобання? Одиночний стіл зберігає простір від натовпу.
    follow_ups:
      - Як самотній стіл сигналізує про наміри?
      - Що станеться, якби хтось попросив підсісти?
      - Який зв'язок між самотністю та видимістю?
  - id: hi_cs_milk_pour
    name: Наливання молока
    prompt: |
      Бариста наливає молоко в еспресо — з візерунком чи без. Наливання — це майстерність.
      Спостерігайте за рухом. Що отримує клієнт, крім напою? Наливання — це виступ.
    follow_ups:
      - Як наливання формує очікування?
      - Яким був би напій без майстерності?
      - Який зв'язок між наливанням та ціною?
  - id: hi_cs_name_on_cup
    name: Ім'я на чашці
    prompt: |
      Ім'я — справжнє, вигадане, неправильно написане — на чашці. Це персоналізує транзакцію.
      Ім'я проходить від вуст до руки до стійки. Що робить ім'я для обміну?
    follow_ups:
      - Як ім'я створює впізнавання?
      - Яким було б замовлення без імені?
      - Який зв'язок між ім'ям та анонімністю?
  - id: hi_cs_window_seat
    name: Місце біля вікна
    prompt: |
      Місце біля вікна — привілейоване. Ви дивитесь на вулицю; ваша спина захищена.
      Спостерігайте, хто його обирає. Вікно обрамляє світ ззовні, поки ви залишаєтесь всередині.
      Що дає вид?
    follow_ups:
      - Як місце біля вікна формує досвід?
      - Яким був би простір без вікон?
      - Який зв'язок між внутрішнім та зовнішнім?
  - id: hi_cs_linger_versus_grab
    name: Затриматися проти забрати
    prompt: |
      Деякі беруть свою чашку і йдуть. Інші залишаються на години. Той самий простір вміщує обох.
      Помітьте цю різницю. Що визначає, хто залишається? Кав'ярня вміщує різні швидкості.
    follow_ups:
      - Як затримка впливає на бізнес?
      - Яким був би простір, якби всі йшли швидко?
      - Який зв'язок між швидкістю та приналежністю?
  - id: hi_cs_regular_recognition
    name: Впізнавання постійного клієнта
    prompt: |
      "Як зазвичай?" Бариста знає. Постійного клієнта впізнають. Спостерігайте за обміном.
      Що змінюється, коли вас впізнають? "Як зазвичай" — це скорочення шляху і заявка на місце.
    follow_ups:
      - Як впізнавання створює лояльність?
      - Що втратив би постійний клієнт без цього?
      - Який зв'язок між "зазвичай" та ідентичністю?
  - id: hi_cs_soundscape
    name: Звуковий ландшафт
    prompt: |
      Пар, гул кавомолки, балачки, музика. Кав'ярня має свій звуковий ландшафт.
      Заплющте очі. Нанесіть на карту шари. Що постійне? Який ритм? Звуковий ландшафт формує настрій.
    follow_ups:
      - Як звуковий ландшафт впливає на концентрацію?
      - Яким був би простір у тиші?
      - Який зв'язок між звуком і продуктивністю?
  - id: hi_cs_shared_table
    name: Спільний стіл
    prompt: |
      Незнайомі люди сидять за одним довгим столом. Ніхто не розмовляє. Спільний стіл — це близькість без зв'язку.
      Спостерігайте за межами. Наскільки близько — це занадто близько? Стіл підтримує делікатний баланс.
    follow_ups:
      - Чим спільний стіл відрізняється від одиночного?
      - Що станеться, якби хтось почав розмову?
      - Який зв'язок між близькістю та приватністю?
  - id: hi_cs_tip_jar
    name: Банка для чайових
    prompt: |
      Монети та купюри накопичуються. Банка для чайових видима, пасивна. Хто залишає чайові?
      Хто ні? Банка стоїть на межі транзакції та подарунка. Що означають чайові?
    follow_ups:
      - Як банка для чайових формує обмін?
      - Якою була б стійка без неї?
      - Який зв'язок між чайовими та вдячністю?
  - id: hi_cs_cup_sleeve
    name: Гільза для чашки
    prompt: |
      Гільза захищає руку від гарячого. Вона одноразова, брендована.
      Зверніть увагу, як люди тримають чашку з нею. Гільза — це маленький інтерфейс між тілом і напоєм.
    follow_ups:
      - Як гільза змінює хват?
      - Яким був би досвід без неї?
      - Який зв'язок між гільзою та брендингом?
  - id: hi_cs_morning_rush
    name: Ранкова метушня
    prompt: |
      Перед роботою черга розтягується. Ранкова метушня має свій темп.
      Спостерігайте за швидкістю. Всі кудись поспішають. Кав'ярня — це перевалочний пункт.
      Що вимагає метушня?
    follow_ups:
      - Як метушня формує персонал?
      - Яким був би ранок без зупинки?
      - Який зв'язок між метушнею та ритуалом?
  - id: hi_cs_afternoon_slow
    name: Післяобідній спокій
    prompt: |
      Серед дня натовп рідшає. Ті, хто залишається, інші — студенти,
      фрілансери, неквапливі. Темп змінюється. Помітьте цю зміну. Післяобідній час вміщує іншого клієнта.
    follow_ups:
      - Чим післяобідній час відрізняється від ранку?
      - Яким був би простір без періоду спокою?
      - Який зв'язок між часом і заповненістю?
  - id: hi_cs_wifi_password
    name: Пароль WiFi
    prompt: |
      Пароль на стіні, на чеку, на дошці. Треба запитати або подивитись.
      WiFi — це для деяких плата за вхід. Спостерігайте, хто підключається. Хто не потребує цього?
    follow_ups:
      - Як WiFi визначає, хто залишається?
      - Яким був би простір без нього?
      - Який зв'язок між підключенням і споживанням?
  - id: hi_cs_crossword_solver
    name: Той, хто розгадує кросворд
    prompt: |
      Хтось розгадує кросворд, газета чи телефон. Діяльність одиночна, але видима.
      Кросворд відзначає час. Він каже: "Я залишаюся". Що сигналізує ця діяльність іншим?
    follow_ups:
      - Як кросворд створює "бульбашку"?
      - Що робив би той, хто розгадує, без нього?
      - Який зв'язок між діяльністю та зайнятістю місця?
  - id: hi_cs_meeting_here
    name: Зустріч тут
    prompt: |
      Дві людини зустрічаються — співбесіда, зустріч, перше побачення. Кав'ярня —
      це нейтральна територія. Спостерігайте за обстановкою. Хто обрав місце? Стіл стає сценою для зустрічі.
    follow_ups:
      - Як кав'ярня сприяє зустрічі?
      - Якою була б зустріч в офісі?
      - Який зв'язок між місцем і зустріччю?
  - id: hi_cs_bathroom_key
    name: Ключ від туалету
    prompt: |
      Ключ від туалету на ланцюгу до блоку, до лопатки, до велетенської ложки. Треба запитати.
      Ключ — це маленька перевірка на приналежність. Хто має право користуватися туалетом?
    follow_ups:
      - Як ключ контролює доступ?
      - Яким був би простір з відкритими туалетами?
      - Який зв'язок між ключем і довірою?
  - id: hi_cs_pastry_case
    name: Вітрина з випічкою
    prompt: |
      Круасани, мафіни, печиво за склом. Вітрина — це спокуса та викладка.
      Зверніть увагу, що продається. Що залишається занадто довго? Вітрина — це переговори між бажанням і зволіканням.
    follow_ups:
      - Як вітрина формує замовлення?
      - Якою була б стійка без неї?
      - Який зв'язок між викладкою та бажанням?
  - id: hi_cs_phone_glance
    name: Погляд на телефон
    prompt: |
      Всі кидають погляд на телефон. Погляд — це перерва, перевірка, відступ.
      Спостерігайте за ритмом. Як часто? Як довго? Телефон — це портал з кімнати.
    follow_ups:
      - Як телефон формує присутність?
      - Яким був би простір без телефонів?
      - Який зв'язок між поглядом і увагою?
  - id: hi_cs_steam_rise
    name: Підйом пари
    prompt: |
      Пара здіймається з свіжої чашки. Тепло несе аромат. Пара ефемерна — зникає за хвилини.
      Помітьте її. Що пара додає моменту перед першим ковтком?
    follow_ups:
      - Як пара формує очікування?
      - Яким був би напій без неї?
      - Який зв'язок між парою та ритуалом?
  - id: hi_cs_bag_on_chair
    name: Сумка на стільці
    prompt: |
      Сумка займає стілець поруч із тим, хто сидить. Вона зберігає місце, розширює територію.
      Сумка — це замінник. Спостерігайте за повідомленням: "Це місце зайняте".
      Що станеться, якби хтось попросив підсісти?
    follow_ups:
      - Як сумка займає простір?
      - Якою була б кімната без "збереження" стільців сумками?
      - Який зв'язок між предметом і територією?
  - id: hi_cs_espresso_shot
    name: Шот еспресо
    prompt: |
      Один шот — швидкий, інтенсивний. Той, хто п'є еспресо, часто стоїть.
      Шот — це розділовий знак у дні. Спостерігайте за ритуалом. Зайшов, випив, вийшов.
      Що досягає шот?
    follow_ups:
      - Чим шот відрізняється від лате?
      - Якою була б кав'ярня без еспресо?
      - Який зв'язок між шотом і швидкістю?
  - id: hi_cs_cold_brew_tap
    name: Кран з холодним кава-брю
    prompt: |
      Холодний кава-брю з крана — як пиво. Спосіб подачі інший. Без пари, без очікування.
      Клієнт холодного кава-брю хоче чогось іншого. Зверніть увагу на вибір. Що сигналізує холодний кава-брю?
    follow_ups:
      - Як холодний кава-брю змінює досвід?
      - Яким було б меню без нього?
      - Який зв'язок між температурою та ідентичністю?
  - id: hi_cs_chalkboard_menu
    name: Меню на дошці
    prompt: |
      Меню написане від руки — крейда на дошці. Воно змінюється. Рукопис — це особистість.
      Зверніть увагу, що перелічено, а що ні. Дошка каже: "Ми тут приймаємо рішення".
    follow_ups:
      - Як дошка формує бренд?
      - Якою була б стіна з друкованим меню?
      - Який зв'язок між рукою та автентичністю?
  - id: hi_cs_leaving_cup
    name: Залишена чашка
    prompt: |
      Чашка, залишена на столі — порожня, покинута. Деякі прибирають самі; деякі — ні.
      Залишена чашка — це маленький тест на уважність. Хто прибирає? Хто залишає? Чашка позначає кінець перебування.
    follow_ups:
      - Як прибирання формує простір?
      - Якою була б кав'ярня, якби всі залишали чашки?
      - Який зв'язок між виходом і приналежністю?
  - id: hi_cs_headphones_bubble
    name: Бульбашка навушників
    prompt: |
      Навушники створюють бульбашку. Той, хто їх носить, присутній, але недоступний.
      Бульбашка каже: "Не перебивай". Спостерігайте за межею. Як бульбашка формує соціальне поле?
    follow_ups:
      - Як навушники сприяють концентрації?
      - Яким був би простір без них?
      - Який зв'язок між бульбашкою та продуктивністю?
  - id: hi_cs_corner_booth
    name: Кутовий диванчик
    prompt: |
      Кутовий диванчик — бажаний; спиною до стіни, огляд кімнати. Він захищений.
      Спостерігайте, хто його займає. Кут має іншу психологію, ніж центр.
    follow_ups:
      - Як кут формує досвід?
      - Якою була б кімната без кутів?
      - Який зв'язок між позицією та безпекою?
  - id: hi_cs_sugar_station
    name: Станція цукру
    prompt: |
      Цукор, серветки, кришки, соломинки — станція самообслуговування. Люди
      персоналізують тут. Станція — це пауза між стійкою та сидінням.
      Спостерігайте за вибором. Що додають люди?
    follow_ups:
