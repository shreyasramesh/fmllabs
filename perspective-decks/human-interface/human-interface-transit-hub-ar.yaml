# الواجهة البشرية — مركز العبور (Arabic)

id: human_interface_transit_hub
name: الواجهة البشرية — مركز العبور
description: 50 بطاقة لتغيير نظرتك لمركز العبور — من الأرصفة والانتظار إلى تدفق الوصول/المغادرة ورقص الغرباء العابرين.
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: حافة الرصيف
    prompt: |
      حافة الرصيف هي عتبة. خط أصفر، فجوة، سكة حديد. يقف الناس على مسافات مختلفة. البعض يميل للأمام؛ والبعض الآخر يتراجع. لاحظ التوزيع. ماذا تعني الحافة؟
    follow_ups:
      - كيف تشكل الحافة الترقب؟
      - ماذا سيكون الرصيف بدون الخط؟
      - ما هي العلاقة بين الحافة والخطر؟
  - id: hi_th_waiting_posture
    name: وضعية الانتظار
    prompt: |
      ترتب الأجساد نفسها أثناء الانتظار — ثقل على قدم واحدة، هاتف في اليد، حقيبة بين القدمين. الوضعية تشفر المدة. من يبدو صبورًا؟ من يبدو قلقًا؟ الانتظار له لغة جسد.
    follow_ups:
      - كيف تكشف الوضعية عن التوقعات؟
      - ماذا سيكون الرصيف بدون الانتظار؟
      - ما هي العلاقة بين الوضعية والوقت؟
  - id: hi_th_arrival_flow
    name: تدفق الوصول
    prompt: |
      تفتح أبواب القطار. يتدفق الناس للخارج — عكس تيار من يصعدون. للتدفق فيزياء. لاحظ التصادم، والمراوغة، والاندماج. ما هي القواعد التي تحكم التبادل؟
    follow_ups:
      - كيف يشكل التدفق الرصيف؟
      - ماذا سيحدث لو اندفع الجميع؟
      - ما هي العلاقة بين التدفق والكفاءة؟
  - id: hi_th_strangers_transit
    name: الغرباء في العبور
    prompt: |
      تشارك سيارة مع أشخاص لن تراهم مرة أخرى. قرب بدون اتصال. لاحظ الازدحام. ماذا يدين الغرباء لبعضهم البعض؟ سيارة العبور هي مجتمع مؤقت.
    follow_ups:
      - كيف يخلق العبور مجتمعًا مؤقتًا؟
      - ماذا ستكون السيارة مع وجود محادثة؟
      - ما هي العلاقة بين الغريب والتحضر؟
  - id: hi_th_departure_board
    name: لوحة المغادرة
    prompt: |
      الأوقات، الأرصفة، التأخيرات — اللوحة هي مصدر الحقيقة. ترفع العيون إليها. اللوحة توجه الحركة. راقب النظرة الجماعية. ماذا تفعل اللوحة بالجمهور؟
    follow_ups:
      - كيف تشكل اللوحة السلوك؟
      - ماذا سيكون المركز بدونها؟
      - ما هي العلاقة بين العرض والثقة؟
  - id: hi_th_escalator_stand
    name: الوقوف على السلم المتحرك
    prompt: |
      قف على اليمين، امشِ على اليسار — أو العكس، حسب المدينة. للسلم المتحرك قواعد. لاحظ من يتبعها. السلم المتحرك هو طابور متحرك. ماذا تتيح القاعدة؟
    follow_ups:
      - كيف تشكل قاعدة السلم المتحرك التدفق؟
      - ماذا سيحدث لو وقف الجميع؟
      - ما هي العلاقة بين القاعدة والكفاءة؟
  - id: hi_th_ticket_gate
    name: بوابة التذاكر
    prompt: |
      تقرأ البوابة البطاقة، تصدر صوتًا، وتفتح. البوابة هي نقطة تفتيش. تفصل المدفوع عن غير المدفوع. لاحظ الإيقاع. من يتعثر؟ من ينزلق عبرها؟ البوابة هي اختبار.
    follow_ups:
      - كيف تشكل البوابة الرحلة؟
      - ماذا سيكون المركز بدون بوابات؟
      - ما هي العلاقة بين البوابة والانتماء؟
  - id: hi_th_luggage_drag
    name: سحب الأمتعة
    prompt: |
      عجلات على البلاط. تتبع الحقيبة. السحب يحدد مسار المسافرين. الأمتعة تمد الجسم. لاحظ العبء. ماذا تقول الأمتعة عن الرحلة؟
    follow_ups:
      - كيف تشكل الأمتعة الحركة؟
      - ماذا سيكون المركز بدون حقائب؟
      - ما هي العلاقة بين العبء والوجهة؟
  - id: hi_th_bench_occupation
    name: شغل المقعد
    prompt: |
      تصطف المقاعد على الرصيف. يجلس البعض؛ ويقف البعض بجانبها. المقعد مورد نادر. لاحظ من يطالب به. كم من الوقت يبقون؟ المقعد منطقة صغيرة.
    follow_ups:
      - كيف يشكل المقعد الانتظار؟
      - ماذا سيكون الرصيف بدون مقاعد؟
      - ما هي العلاقة بين المقعد والمدة؟
  - id: hi_th_announcement_voice
    name: صوت الإعلان
    prompt: |
      "القطار التالي..." الصوت آلي أو بشري. يخترق الضوضاء. الإعلان يخلق معرفة مشتركة. لاحظ من يستمع. من تحقق من هاتفه بالفعل؟
    follow_ups:
      - كيف يشكل الإعلان الحشد؟
      - ماذا سيكون المركز بدون إعلانات؟
      - ما هي العلاقة بين الصوت والسلطة؟
  - id: hi_th_door_positioning
    name: تحديد موقع الباب
    prompt: |
      المنتظمون يعرفون مكان فتح الأبواب. يحددون موقعهم. يخمن الوافدون الجدد. تحديد الموقع استراتيجية. لاحظ التجمع. ماذا يحدد الموقع؟
    follow_ups:
      - كيف يشكل تحديد الموقع الصعود؟
      - ماذا سيكون الرصيف لو كانت الأبواب عشوائية؟
      - ما هي العلاقة بين الموقع والميزة؟
  - id: hi_th_handrail_grip
    name: مسكة الدرابزين
    prompt: |
      داخل السيارة، تجد الأيدي الدرابزين. المسكة هي الأمان. لاحظ من يمسك، ومن لا يحتاج لذلك. الدرابزين هو شيء مشترك. ماذا تكشف المسكة؟
    follow_ups:
      - كيف يشكل الدرابزين الثبات؟
      - ماذا ستكون السيارة بدونه؟
      - ما هي العلاقة بين المسكة والثقة؟
  - id: hi_th_window_reflection
    name: انعكاس النافذة
    prompt: |
      تعرض النافذة النفق، الرصيف، ووجهك. الانعكاس لا مفر منه. ينظر الناس إلى أنفسهم أو يتجنبونه. لاحظ العلاقة بين الانعكاس والنظرة.
    follow_ups:
      - كيف يشكل الانعكاس الوعي الذاتي؟
      - ماذا ستكون الرحلة بدون النافذة؟
      - ما هي العلاقة بين الانعكاس والخصوصية؟
  - id: hi_th_seat_offer
    name: عرض مقعد
    prompt: |
      يعرض شخص مقعدًا لكبير في السن، أو لأب مع طفل. العرض هو عمل أخلاقي صغير. لاحظ متى يحدث. من يعرض؟ من يقبل؟ المقعد هو هدية.
    follow_ups:
      - كيف يشكل العرض السيارة؟
      - ماذا ستكون الرحلة بدون مثل هذه العروض؟
      - ما هي العلاقة بين العرض والرعاية؟
  - id: hi_th_delay_sigh
    name: تنهيدة التأخير
    prompt: |
      "متأخر." تنهيدة جماعية. التأخير هو مصير مشترك. يتبادل الغرباء النظرات. يخلق التأخير لحظة تضامن. لاحظ التحول. ماذا يفعل التأخير بالجمهور؟
    follow_ups:
      - كيف يشكل التأخير الانتظار؟
      - ماذا سيكون المركز بدون تأخيرات؟
      - ما هي العلاقة بين التأخير والإحباط؟
  - id: hi_th_backpack_turn
    name: تدوير حقيبة الظهر
    prompt: |
      في سيارة مزدحمة، يقوم شخص بتدوير حقيبة ظهره إلى الأمام. التدوير هو مراعاة. يخلق مساحة. لاحظ من يفعل ذلك. تدوير حقيبة الظهر هو عقد اجتماعي صغير.
    follow_ups:
      - كيف يشكل التدوير القرب؟
      - ماذا ستكون السيارة بدونه؟
      - ما هي العلاقة بين التدوير والوعي؟
  - id: hi_th_exit_anticipation
    name: ترقب الخروج
    prompt: |
      مع اقتراب المحطة، يتجمع الناس بالقرب من الباب. الترقب واضح. تتحرك الأجساد. الباب سيفتح. لاحظ التحضير. ماذا يتطلب الترقب؟
    follow_ups:
      - كيف يشكل الترقب الخروج؟
      - ماذا ستكون المحطة بدون تحضير؟
      - ما هي العلاقة بين الترقب والتدفق؟
  - id: hi_th_transfer_corridor
    name: ممر التحويل
    prompt: |
      الممر يربط الخطوط. يمشي الناس بهدف. التحويل هو انتقال — بين الأنظمة، بين الانتظارات. لاحظ الوتيرة. للممر إيقاعه الخاص.
    follow_ups:
      - كيف يشكل الممر الرحلة؟
      - ماذا سيكون المركز بدون تحويلات؟
      - ما هي العلاقة بين الممر والاتصال؟
  - id: hi_th_phone_glow
    name: وهج الهاتف
    prompt: |
      في السيارة الخافتة، تضيء الوجوه من الهواتف. الوهج فردي. كل شخص لديه ضوءه الخاص. لاحظ التوزيع. الهاتف يخلق مساحة خاصة في مكان عام.
    follow_ups:
      - كيف يشكل الهاتف الرحلة؟
      - ماذا ستكون السيارة بدون هواتف؟
      - ما هي العلاقة بين الوهج والعزلة؟
  - id: hi_th_stroller_navigation
    name: ملاحقة عربة الأطفال
    prompt: |
      يدفع أحد الوالدين عربة أطفال عبر الحشد. الملاحقة دقيقة. يفسح الناس الطريق. عربة الأطفال تغير التدفق. لاحظ التكيف. ماذا تتطلب عربة الأطفال؟
    follow_ups:
      - كيف تشكل عربة الأطفال الحشد؟
      - ماذا سيكون المركز بدون عربات الأطفال؟
      - ما هي العلاقة بين عربة الأطفال والرعاية؟
  - id: hi_th_vendor_station
    name: كشك البائع
    prompt: |
      يبيع كشك القهوة، الوجبات الخفيفة، الصحف. البائع يخدم الناس أثناء الحركة. الصفقة سريعة. لاحظ التبادل. البائع جزيرة في التدفق.
    follow_ups:
      - كيف يشكل البائع المركز؟
      - ماذا سيكون المركز بدون بائعين؟
      - ما هي العلاقة بين البائع والانتظار؟
  - id: hi_th_track_gap
    name: فجوة السكة
    prompt: |
      انتبه للفجوة. المساحة بين الرصيف والسيارة هي خطر. يخطو الناس فوقها. تختلف الفجوة. لاحظ الحذر. ماذا تتطلب الفجوة من الجسد؟
    follow_ups:
      - كيف تشكل الفجوة الصعود؟
      - ماذا سيكون الرصيف بدونها؟
      - ما هي العلاقة بين الفجوة والانتباه؟
  - id: hi_th_schedule_check
    name: التحقق من الجدول الزمني
    prompt: |
      تنقر الأصابع على الهاتف. التطبيق يخبر بالوقت. التحقق من الجدول الزمني مستمر. يقلل عدم اليقين. لاحظ الإيقاع. كم مرة يتحقق الناس؟
    follow_ups:
      - كيف يشكل الجدول الزمني الانتظار؟
      - ماذا سيكون المركز بدون تطبيقات؟
      - ما هي العلاقة بين التحقق والتحكم؟
  - id: hi_th_crowd_density
    name: كثافة الحشد
    prompt: |
      ساعة الذروة تملأ الرصيف. تضغط الأجساد. للكثافة حدود. لاحظ الحدود. متى تصبح لا تطاق؟ للحشد فيزياء.
    follow_ups:
      - كيف تشكل الكثافة التجربة؟
      - ماذا سيكون المركز بكثافة منخفضة؟
      - ما هي العلاقة بين الكثافة والتحمل؟
  - id: hi_th_sleeping_commuter
    name: المسافر النائم
    prompt: |
      شخص ينام — الرأس على النافذة، أو على كتف غريب. النوم ثقة أو إرهاق. لاحظ الضعف. ماذا يتطلب النوم من السيارة؟
    follow_ups:
      - كيف يشكل النائم المساحة؟
      - ماذا ستكون الرحلة بدون نائمين؟
      - ما هي العلاقة بين النوم والأمان؟
  - id: hi_th_map_consultation
    name: استشارة الخريطة
    prompt: |
      ينظر زائر إلى الخريطة على الحائط. الخريطة هي شريان حياة. يتدفق الآخرون. الاستشارة تستغرق وقتًا. لاحظ التوقف. ماذا توفر الخريطة؟
    follow_ups:
      - كيف تشكل الخريطة الرحلة؟
      - ماذا سيكون المركز بدون خرائط؟
      - ما هي العلاقة بين الخريطة والثقة؟
  - id: hi_th_platform_change
    name: تغيير الرصيف
    prompt: |
      "تغيير الرصيف." يتحرك الحشد. التغيير هو تعطيل. يهرع الناس. لاحظ الهرولة. ماذا يستخرج التغيير من الحشد؟
    follow_ups:
      - كيف يشكل التغيير التدفق؟
      - ماذا سيكون المركز بدون تغييرات؟
      - ما هي العلاقة بين التغيير والضغط؟
  - id: hi_th_briefcase_clutch
    name: مسكة حقيبة العمل
    prompt: |
      حقيبة العمل تحمل بالقرب — بين القدمين، على الحجر. تحتوي على شيء ثمين. المسكة وقائية. لاحظ القبضة. ماذا تعني حقيبة العمل لحاملها؟
    follow_ups:
      - كيف تشكل حقيبة العمل الرحلة؟
      - ماذا ستكون السيارة بدون حقائب العمل؟
      - ما هي العلاقة بين المسكة والهوية؟
  - id: hi_th_door_hold
    name: الإمساك بالباب
    prompt: |
      يمسك شخص بالباب للشخص الذي خلفه. القطار على وشك المغادرة. الإمساك هو خطر وكياسة. لاحظ التبادل. كم يكلف الإمساك؟
    follow_ups:
      - كيف يشكل الإمساك الصعود؟
      - ماذا سيكون الرصيف بدونه؟
      - ما هي العلاقة بين الإمساك والتحضر؟
  - id: hi_th_standing_balance
    name: التوازن الواقف
    prompt: |
      يتحرك القطار. يغير الركاب الواقفون وزنهم. التوازن ديناميكي. لا أحد يمسك بالدرابزين. لاحظ التعديلات الدقيقة. يتعلم الجسد الحركة.
    follow_ups:
      - كيف يشكل التوازن الرحلة؟
      - ماذا ستكون السيارة مع المزيد من المقاعد؟
      - ما هي العلاقة بين التوازن والعادة؟
  - id: hi_th_conversation_overhear
    name: استراق السمع للمحادثة
    prompt: |
      شخصان يتحدثان. تسمع أجزاء. المحادثة خاصة ولكنها عامة. لاحظ الحدود. ماذا يتعلم الغرباء عن بعضهم البعض أثناء العبور؟
    follow_ups:
      - كيف يشكل استراق السمع الرحلة؟
      - ماذا ستكون السيارة بدون محادثة؟
      - ما هي العلاقة بين استراق السمع والحميمية؟
  - id: hi_th_ticket_inspection
    name: فحص التذاكر
    prompt: |
      يتحرك المفتش عبر السيارة. "التذاكر، من فضلك." الفحص عشوائي أو منهجي. لاحظ الاستجابة. من مستعد؟ من يتعثر؟ الفحص هو اختبار للشرعية.
    follow_ups:
      - كيف يشكل الفحص الرحلة؟
      - ماذا سيكون النظام بدونه؟
      - ما هي العلاقة بين الفحص والثقة؟
  - id: hi_th_station_name_glance
    name: لمحة اسم المحطة
    prompt: |
      يومض الاسم — على الحائط، على اللافتة. المنتظمون يعرفون. الوافدون الجدد يشاهدون. اللمحة توجه. لاحظ من ينظر. ماذا يفعل الاسم؟
    follow_ups:
      - كيف يشكل الاسم التوجيه؟
      - ماذا ستكون الرحلة بدون لافتات؟
      - ما هي العلاقة بين الاسم والمكان؟
  - id: hi_th_benchmark_regular
    name: المنتظم القياسي
    prompt: |
      المنتظم يعرف الإيقاع. يصل في الوقت المناسب بالضبط. لا انتظار. المنتظم استوعب الجدول الزمني. لاحظ الثقة. ماذا يعرف المنتظم؟
    follow_ups:
      - كيف يشكل المنتظم المركز؟
      - ماذا سيكون المركز بدون منتظمين؟
      - ما هي العلاقة بين المنتظم والطلاقة؟
  - id: hi_th_lost_look
    name: نظرة الضياع
    prompt: |
      شخص يبدو ضائعًا — الرأس يدور، الوتيرة غير مؤكدة. النظرة واضحة. لاحظ لغة الجسد. من يساعد؟ من يتجاهل؟ نظرة الضياع هي إشارة. ماذا تدعو إليه؟
    follow_ups:
      - كيف تشكل نظرة الضياع المركز؟
      - ماذا سيكون المركز بدون ضائعين؟
      - ما هي العلاقة بين الضياع والمساعدة؟
  - id: hi_th_earbud_insert
    name: إدخال سماعات الأذن
    prompt: |
      تدخل سماعات الأذن. يتراجع العالم. الإدخال هو حدود. مرتديها حاضر ولكنه غائب. لاحظ التحول. ماذا تخلق سماعة الأذن؟
    follow_ups:
      - كيف تشكل سماعات الأذن الرحلة؟
      - ماذا ستكون السيارة بدونها؟
      - ما هي العلاقة بين سماعة الأذن والخصوصية؟
  - id: hi_th_rush_hour_pack
    name: حشد ساعة الذروة
    prompt: |
      السيارة ممتلئة. تلامس الأجساد. الحشد لا مفر منه. لاحظ التحمل. كيف يدير الناس القرب؟ للحشد آدابه الخاصة.
    follow_ups:
      - كيف يشكل الحشد الرحلة؟
      - ماذا ستكون ساعة الذروة بدون ازدحام؟
      - ما هي العلاقة بين الحشد والتحمل؟
  - id: hi_th_destination_ask
    name: سؤال الوجهة
    prompt: |
      "هل هذا هو القطار إلى X؟" يسأل غريب. يجيب آخر. السؤال يخلق لحظة اتصال. لاحظ التبادل. ماذا يتطلب السؤال؟
    follow_ups:
      - كيف يشكل السؤال السيارة؟
      - ماذا ستكون الرحلة بدون مثل هذه الأسئلة؟
      - ما هي العلاقة بين السؤال والثقة؟
  - id: hi_th_platform_choice
    name: اختيار الرصيف
    prompt: |
      رصيفان، نفس الوجهة. أحدهما أقرب؛ والآخر أقل ازدحامًا. الاختيار استراتيجية. لاحظ من يذهب إلى أين. ماذا يحدد الاختيار؟
    follow_ups:
      - كيف يشكل الاختيار الحشد؟
      - ماذا سيكون المركز برصيف واحد؟
      - ما هي العلاقة بين الاختيار والنتيجة؟
  - id: hi_th_wipe_down_seat
    name: مسح المقعد
    prompt: |
      يمسح شخص المقعد قبل الجلوس. المسح هو وقاية. لاحظ الإيماءة. ماذا تفترض المسحة حول المساحة؟ المسح هو فعل حدود صغير.
    follow_ups:
      - كيف تشكل المسحة الجلسة؟
      - ماذا ستكون السيارة بدون مثل هذه الإيماءات؟
      - ما هي العلاقة بين المسح والنظافة؟
  - id: hi_th_standing_offer
    name: عرض الوقوف
    prompt: |
      "هل ترغب في الجلوس؟" يتم تقديم العرض لغريب. أحيانًا يقبل، وأحيانًا يرفض. لاحظ التبادل. ماذا يعني العرض؟
    follow_ups:
      - كيف يشكل العرض السيارة؟
      - ماذا ستكون الرحلة بدون عروض؟
      - ما هي العلاقة بين العرض والرعاية؟
  - id: hi_th_exit_block
    name: سد المخرج
    prompt: |
      يقف شخص في الممر. يحتاج الآخرون للمرور. السد هو عدم وعي أو متعمد. لاحظ التفاوض. كيف يمر الناس؟ السد هو صراع صغير.
    follow_ups:
      - كيف يشكل السد الخروج؟
      - ماذا ستكون السيارة بدون ساد؟
      - ما هي العلاقة بين السد والوعي؟
  - id: hi_th_train_rumble
    name: هدير القطار
    prompt: |
      يهدر القطار — السكك الحديدية، العجلات، الحركة. الهدير مستمر. يصبح خلفية. لاحظ متى تلاحظه. ماذا يفعل الهدير بالجسد؟
    follow_ups:
      - كيف يشكل الهدير الرحلة؟
      - ماذا ستكون السيارة في صمت؟
      - ما هي العلاقة بين الهدير والإيقاع؟
  - id: hi_th_connection_run
    name: الجري للاتصال
    prompt: |
      شخص يركض — متأخر عن رحلة ربط. الجري يخترق الحشد. يتفرق الناس. لاحظ التعطيل. ماذا يستخرج الجري من التدفق؟
    follow_ups:
      - كيف يشكل الجري المركز؟
      - ماذا سيكون المركز بدون عدائين؟
      - ما هي العلاقة بين الجري والإلحاح؟
  - id: hi_th_seat_saving
    name: حفظ المقعد
    prompt: |
      حقيبة على المقعد. "شخص ما يجلس هنا." الحفظ يحتفظ بالمقعد لرفيق غائب. لاحظ الادعاء. كم من الوقت يمكن حفظ مقعد؟ ما هي الحدود؟
    follow_ups:
      - كيف يشكل الحفظ السيارة؟
      - ماذا ستكون الرحلة بدون حفظ؟
      - ما هي العلاقة بين الحفظ والاستحقاق؟
  - id: hi_th_arrival_relief
    name: ارتياح الوصول
    prompt: |
      يصل القطار إلى المحطة النهائية. الارتياح واضح. ترتخي الأكتاف. يجمع الناس أمتعتهم. الرحلة انتهت. لاحظ التحول. ماذا يوفر الوصول؟
    follow_ups:
      - كيف يشكل الوصول الخروج؟
      - ماذا ستكون الرحلة بدون وصول؟
      - ما هي العلاقة بين الارتياح والإنجاز؟
  - id: hi_th_wayfinding_sign
    name: لافتة إرشاد الطريق
    prompt: |
      أسهم تشير. "إلى القطارات." "إلى المخارج." اللافتات توجه التدفق. لاحظ من يتبعها. من يتجاهل؟ اللافتة اقتراح. ماذا تفترض؟
    follow_ups:
      - كيف تشكل اللافتات التدفق؟
      - ماذا سيكون المركز بدونها؟
      - ما هي العلاقة بين اللافتة والثقة؟
  - id: hi_th_waiting_room
    name: غرفة الانتظار
    prompt: |
      كراسي تواجه بعضها البعض أو اللوحة. غرفة الانتظار تحتجز الناس بين الرحلات. لاحظ الترتيب. من يجلس؟ من يتجول؟ غرفة الانتظار هي وقفة.
    follow_ups:
      - كيف تشكل غرفة الانتظار الانتظار؟
      - ماذا سيكون المركز بدونها؟
      - ما هي العلاقة بين الغرفة والمدة؟
  - id: hi_th_stranger_proximity
    name: قرب الغريب
    prompt: |
      يقف غريب قريب — ضروري في حشد. القرب غير شخصي ولكنه حميمي. لاحظ التحمل. ماذا يسمح الجسد؟ القرب هو عقد.
    follow_ups:
      - كيف يشكل القرب الرحلة؟
      - ماذا ستكون السيارة مع مساحة أكبر؟
      - ما هي العلاقة بين القرب والتحضر؟
  - id: hi_th_last_train
    name: القطار الأخير
    prompt: |
      القطار الأخير. الحشد مختلف — متأخر، مرتاح. للقطار الأخير طاقته الخاصة. لاحظ التحول. ماذا يفعل "الأخير" بالحشد؟
    follow_ups:
      - كيف يشكل القطار الأخير المركز؟
      - ماذا ستكون الليلة بدونه؟
      - ما هي العلاقة بين الأخير والإلحاح؟
  - id: hi_th_transit_tribe
    name: قبيلة العبور
    prompt: |
      نفس الأشخاص، نفس الخط، نفس الوقت. تتعرف على الوجوه. لا تتحدث أبدًا. قبيلة العبور هي مجتمع صامت. لاحظ التعرف. ماذا توفر القبيلة؟
    follow_ups:
      - كيف تشكل القبيلة التنقل؟
      - ماذا ستكون الرحلة بدون وجوه مألوفة؟
      - ما هي العلاقة بين القبيلة والانتماء؟
