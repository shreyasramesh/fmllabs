# ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಸಾರಿಗೆ ಕೇಂದ್ರ (Kannada)

id: human_interface_transit_hub
name: ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಸಾರಿಗೆ ಕೇಂದ್ರ
description: 50 ಕಾರ್ಡ್‌ಗಳು ಸಾರಿಗೆ ಕೇಂದ್ರದ ಬಗ್ಗೆ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಾಯಿಸುತ್ತವೆ—ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ಗಳು ಮತ್ತು ಕಾಯುವಿಕೆಯಿಂದ ಹಿಡಿದು ಆಗಮನ/ನಿರ್ಗಮನ ಹರಿವು ಮತ್ತು ಸಾರಿಗೆಯಲ್ಲಿ ಅಪರಿಚಿತರ ನೃತ್ಯ ಸಂಯೋಜನೆಯವರೆಗೆ.
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಅಂಚು
    prompt: |
      ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ನ ಅಂಚು ಒಂದು ಗಡಿ. ಹಳದಿ ರೇಖೆ, ಅಂತರ, ಟ್ರ್ಯಾಕ್. ಜನರು ವಿವಿಧ ದೂರಗಳಲ್ಲಿ ನಿಲ್ಲುತ್ತಾರೆ. ಕೆಲವರು ಮುಂದೆ ವಾಲುತ್ತಾರೆ; ಇತರರು ಹಿಂದೆ ಸರಿಯುತ್ತಾರೆ. ವಿತರಣೆಯನ್ನು ಗಮನಿಸಿ. ಅಂಚು ಎಂದರೆ ಏನು?
    follow_ups:
      - ಅಂಚು ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ರೇಖೆ ಇಲ್ಲದಿದ್ದರೆ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಹೇಗಿರುತ್ತದೆ?
      - ಅಂಚು ಮತ್ತು ಅಪಾಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_waiting_posture
    name: ಕಾಯುವ ಭಂಗಿ
    prompt: |
      ಕಾಯುವಾಗ ದೇಹಗಳು ತಮ್ಮನ್ನು ಜೋಡಿಸಿಕೊಳ್ಳುತ್ತವೆ—ಒಂದು ಕಾಲಿನ ಮೇಲೆ ತೂಕ, ಕೈಯಲ್ಲಿ ಫೋನ್, ಕಾಲುಗಳ ನಡುವೆ ಚೀಲ. ಭಂಗಿಯು ಅವಧಿಯನ್ನು ಸಂಕೇತಿಸುತ್ತದೆ. ಯಾರು ತಾಳ್ಮೆಯಿಂದ ಕಾಣುತ್ತಾರೆ? ಯಾರು ಅಶಾಂತಿಯಿಂದ ಕಾಣುತ್ತಾರೆ? ಕಾಯುವಿಕೆಗೆ ದೇಹ ಭಾಷೆ ಇದೆ.
    follow_ups:
      - ಭಂಗಿಯು ನಿರೀಕ್ಷೆಯನ್ನು ಹೇಗೆ ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
      - ಕಾಯುವಿಕೆ ಇಲ್ಲದಿದ್ದರೆ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಹೇಗಿರುತ್ತದೆ?
      - ಭಂಗಿ ಮತ್ತು ಸಮಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_arrival_flow
    name: ಆಗಮನದ ಹರಿವು
    prompt: |
      ರೈಲಿನ ಬಾಗಿಲುಗಳು ತೆರೆದುಕೊಳ್ಳುತ್ತವೆ. ಜನರು ಹೊರಬರುತ್ತಾರೆ—ಹತ್ತುವವರ ಪ್ರವಾಹದ ವಿರುದ್ಧ. ಹರಿವಿಗೆ ಭೌತಶಾಸ್ತ್ರವಿದೆ. ಘರ್ಷಣೆ, ಪಕ್ಕಕ್ಕೆ ಸರಿದ, ವಿಲೀನವನ್ನು ಗಮನಿಸಿ. ವಿನಿಮಯವನ್ನು ಯಾವ ನಿಯಮಗಳು ನಿರ್ವಹಿಸುತ್ತವೆ?
    follow_ups:
      - ಹರಿವು ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಲ್ಲರೂ ಧಾವಿಸಿದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಹರಿವು ಮತ್ತು ದಕ್ಷತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_strangers_transit
    name: ಸಾರಿಗೆಯಲ್ಲಿ ಅಪರಿಚಿತರು
    prompt: |
      ನೀವು ಎಂದೂ ನೋಡದ ಜನರೊಂದಿಗೆ ಒಂದು ಬೋಗಿಯನ್ನು ಹಂಚಿಕೊಳ್ಳುತ್ತೀರಿ. ಸಂಪರ್ಕವಿಲ್ಲದ ಸಾಮೀಪ್ಯ. ಸಂಕೋಚವನ್ನು ಗಮನಿಸಿ. ಅಪರಿಚಿತರು ಪರಸ್ಪರ ಏನು ಋಣಿಯಾಗಿರುತ್ತಾರೆ? ಸಾರಿಗೆ ಬೋಗಿಯು ಒಂದು ತಾತ್ಕಾಲಿಕ ಸಮಾಜ.
    follow_ups:
      - ಸಾರಿಗೆ ತಾತ್ಕಾಲಿಕ ಸಮುದಾಯವನ್ನು ಹೇಗೆ ಸೃಷ್ಟಿಸುತ್ತದೆ?
      - ಸಂಭಾಷಣೆಯೊಂದಿಗೆ ಬೋಗಿಯು ಹೇಗಿರುತ್ತದೆ?
      - ಅಪರಿಚಿತ ಮತ್ತು ನಾಗರಿಕತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_departure_board
    name: ನಿರ್ಗಮನ ಫಲಕ
    prompt: |
      ಸಮಯಗಳು, ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ಗಳು, ವಿಳಂಬಗಳು—ಫಲಕವು ಸತ್ಯದ ಮೂಲವಾಗಿದೆ. ಕಣ್ಣುಗಳು ಅದರತ್ತ ಎತ್ತರಿಸುತ್ತವೆ. ಫಲಕವು ಚಲನೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ. ಸಾಮೂಹಿಕ ನೋಟವನ್ನು ಗಮನಿಸಿ. ಫಲಕವು ಜನಸಂದಣಿಗೆ ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಫಲಕವು ವರ್ತನೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದಿದ್ದರೆ ಕೇಂದ್ರ ಹೇಗಿರುತ್ತದೆ?
      - ಪ್ರದರ್ಶನ ಮತ್ತು ನಂಬಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_escalator_stand
    name: ಎಸ್ಕಲೇಟರ್ ನಿಲುವು
    prompt: |
      ಬಲಕ್ಕೆ ನಿಲ್ಲండి, ಎಡಕ್ಕೆ ನಡೆಯಿರಿ—ಅಥವಾ ಇದರ ವಿರುದ್ಧ, ನಗರವನ್ನು ಅವಲಂಬಿಸಿ. ಎಸ್ಕಲೇಟರ್‌ಗೆ ನಿಯಮಗಳಿವೆ. ಯಾರು ಅವುಗಳನ್ನು ಪಾಲಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಎಸ್ಕಲೇಟರ್ ಒಂದು ಚಲಿಸುವ ಸರದಿ. ನಿಯಮವು ಏನನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ಎಸ್ಕಲೇಟರ್ ನಿಯಮವು ಹರಿವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಲ್ಲರೂ ನಿಂತರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ನಿಯಮ ಮತ್ತು ದಕ್ಷತೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_ticket_gate
    name: ಟಿಕೆಟ್ ಗೇಟ್
    prompt: |
      ಗೇಟ್ ಕಾರ್ಡ್ ಅನ್ನು ಓದುತ್ತದೆ, ಬೀಪ್ ಮಾಡುತ್ತದೆ, ತೆರೆಯುತ್ತದೆ. ಗೇಟ್ ಒಂದು ಚೆಕ್‌ಪೋಸ್ಟ್. ಇದು ಪಾವತಿಸಿದವರನ್ನು ಪಾವತಿಸದವರಿಂದ ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ. ಲಯವನ್ನು ಗಮನಿಸಿ. ಯಾರು ಗೊಂದಲಕ್ಕೊಳಗಾಗುತ್ತಾರೆ? ಯಾರು ಸುಲಭವಾಗಿ ದಾಟುತ್ತಾರೆ? ಗೇಟ್ ಒಂದು ಪರೀಕ್ಷೆ.
    follow_ups:
      - ಗೇಟ್ ಪ್ರಯಾಣವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಗೇಟ್‌ಗಳು ಇಲ್ಲದಿದ್ದರೆ ಕೇಂದ್ರ ಹೇಗಿರುತ್ತದೆ?
      - ಗೇಟ್ ಮತ್ತು ಸೇರಿದ್ದರ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_luggage_drag
    name: ಲಗೇಜ್ ಎಳೆಯುವಿಕೆ
    prompt: |
      ಟೈಲ್ ಮೇಲೆ ಚಕ್ರಗಳು. ಸೂಟ್‌ಕೇಸ್ ಅನುಸರಿಸುತ್ತದೆ. ಎಳೆಯುವಿಕೆಯು ಪ್ರಯಾಣಿಕರ ಮಾರ್ಗವನ್ನು ಗುರುತಿಸುತ್ತದೆ. ಲಗೇಜ್ ದೇಹವನ್ನು ವಿಸ್ತರಿಸುತ್ತದೆ. ಭಾರವನ್ನು ಗಮನಿಸಿ. ಲಗೇಜು ಪ್ರಯಾಣದ ಬಗ್ಗೆ ಏನು ಹೇಳುತ್ತದೆ?
    follow_ups:
      - ಲಗೇಜು ಚಲನೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಚೀಲಗಳು ಇಲ್ಲದಿದ್ದರೆ ಕೇಂದ್ರ ಹೇಗಿರುತ್ತದೆ?
      - ಭಾರ ಮತ್ತು ಗಮ್ಯಸ್ಥಾನದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_bench_occupation
    name: ಬೆಂಚ್ ಆಕ್ರಮಣ
    prompt: |
      ಬೆలಂಚುಗಳು ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ಗೆ ಜೋಡಿಸಲ್ಪಟ್ಟಿವೆ. ಕೆಲವರು ಕುಳಿತುಕೊಳ್ಳುತ್ತಾರೆ; ಕೆಲವರು ಪಕ್ಕದಲ್ಲಿ ನಿಲ್ಲುತ್ತಾರೆ. ಬೆಂಚ್ ಒಂದು ದುರ್ಬಲ ಸಂಪನ್ಮೂಲ. ಯಾರು ಅದನ್ನು ಕ್ಲೈಮ್ ಮಾಡುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಅವರು ಎಷ್ಟು ಸಮಯ ಇರುತ್ತಾರೆ? ಬೆಂಚ್ ಒಂದು ಸಣ್ಣ ಪ್ರದೇಶ.
    follow_ups:
      - ಬೆಂಚ್ ಕಾಯುವಿಕೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಬೆಂಚುಗಳು ಇಲ್ಲದಿದ್ದರೆ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಹೇಗಿರುತ್ತದೆ?
      - ಆಸನ ಮತ್ತು ಅವಧಿಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_announcement_voice
    name: ಪ್ರಕಟಣೆ ಧ್ವನಿ
    prompt: |
      "ಮುಂದಿನ ರೈಲು..." ಧ್ವನಿ ಸ್ವಯಂಚಾಲಿತ ಅಥವಾ ಮಾನವ. ಇದು ಶಬ್ದದ ಮೂಲಕ ಕತ್ತರಿಸುತ್ತದೆ. ಪ್ರಕಟಣೆಯು ಹಂಚಿಕೆಯ ಜ್ಞಾನವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ. ಯಾರು ಕೇಳುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಯಾರು ಈಗಾಗಲೇ ತಮ್ಮ ಫೋನ್ ಪರಿಶೀಲಿಸಿದ್ದಾರೆ?
    follow_ups:
      - ಪ್ರಕಟಣೆಯು ಜನಸಂದಣಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದಿದ್ದರೆ ಕೇಂದ್ರ ಹೇಗಿರುತ್ತದೆ?
      - ಧ್ವನಿ ಮತ್ತು ಅಧಿಕಾರದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_door_positioning
    name: ಬಾಗಿಲು ಸ್ಥಾನ
    prompt: |
      ನಿಯಮಿತರು ಬಾಗಿಲು ಎಲ್ಲಿ ತೆರೆದುಕೊಳ್ಳುತ್ತದೆ ಎಂದು ತಿಳಿದಿದ್ದಾರೆ. ಅವರು ತಮ್ಮನ್ನು ಸ್ಥಾನಪರಿಪೂರ್ಣಗೊಳಿಸುತ್ತಾರೆ. ಹೊಸಬರು ಊಹಿಸುತ್ತಾರೆ. ಸ್ಥಾನಪರಿಪೂರ್ಣಗೊಳಿಸುವಿಕೆ ಒಂದು ಯುಕ್ತಿ. ಗುಂಪುಗೂಡುವುದನ್ನು ಗಮನಿಸಿ. ಸ್ಥಾನ ಏನು ನಿರ್ಧರಿಸುತ್ತದೆ?
    follow_ups:
      - ಸ್ಥಾನವು ಹತ್ತುವುದನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಬಾಗಿಲುಗಳು ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೆ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್ ಹೇಗಿರುತ್ತದೆ?
      - ಸ್ಥಾನ ಮತ್ತು ಪ್ರಯೋಜನದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_handrail_grip
    name: ಹ್ಯಾಂಡ್‌ರೈಲ್ ಹಿಡಿತ
    prompt: |
      ಬೋಗಿಯೊಳಗೆ, ಕೈಗಳು ರೈಲನ್ನು ಕಂಡುಕೊಳ್ಳುತ್ತವೆ. ಹಿಡಿತವು ಸುರಕ್ಷತೆ. ಯಾರು ಹಿಡಿದಿರುತ್ತಾರೆ, ಯಾರು ಅಗತ್ಯವಿಲ್ಲ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಹ್ಯಾಂಡ್‌ರೈಲ್ ಒಂದು ಹಂಚಿಕೆಯ ವಸ್ತುವಾಗಿದೆ. ಹಿಡಿತವು ಏನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ?
    follow_ups:
      - ಹ್ಯಾಂಡ್‌ರೈಲ್ ಸ್ಥಿರತೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದಿದ್ದರೆ ಬೋಗಿಯು ಹೇಗಿರುತ್ತದೆ?
      - ಹಿಡಿತ ಮತ್ತು ನಂಬಿಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_th_window_reflection
    name: ಕಿಟಕಿ ಪ್ರತಿಬಿಂಬ
    prompt: |
