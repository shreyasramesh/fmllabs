# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# மனித இடைமுகம் — போக்குவரத்து மையம் (Tamil)

id: human_interface_transit_hub
name: மனித இடைமுகம் — போக்குவரத்து மையம்
description: 50 அட்டைகள், போக்குவரத்து மையத்தைப் பார்க்கும் முறையை மாற்றியமைக்க — தளங்கள் மற்றும் காத்திருப்பு முதல் வருகை/புறப்பாடு ஓட்டம் மற்றும் போக்குவரத்தில் அந்நியர்களின் நடனம் வரை.
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: தள விளிம்பு
    prompt: |
      தளத்தின் விளிம்பு ஒரு வாசல். மஞ்சள் கோடு, இடைவெளி, பாதை. மக்கள் வெவ்வேறு தூரங்களில் நிற்கிறார்கள். சிலர் முன்னோக்கி சாய்ந்திருக்கிறார்கள்; மற்றவர்கள் பின்வாங்குகிறார்கள். விநியோகத்தை கவனிக்கவும். விளிம்பு என்ன அர்த்தம்?
    follow_ups:
      - விளிம்பு எவ்வாறு எதிர்பார்ப்பை உருவாக்குகிறது?
      - கோடு இல்லாமல் தளம் எப்படி இருக்கும்?
      - விளிம்புக்கும் ஆபத்துக்கும் என்ன தொடர்பு?
  - id: hi_th_waiting_posture
    name: காத்திருப்பு நிலை
    prompt: |
      காத்திருக்கும் போது உடல்கள் தங்களை அமைத்துக் கொள்கின்றன — ஒரு காலில் எடை, கையில் போன், கால்களுக்கு இடையில் பை. நிலை கால அளவைக் குறிக்கிறது. யார் பொறுமையாகத் தெரிகிறார்கள்? யார் அமைதியற்றுத் தெரிகிறார்கள்? காத்திருப்புக்கு ஒரு உடல் மொழி உண்டு.
    follow_ups:
      - நிலை எதிர்பார்ப்பை எவ்வாறு வெளிப்படுத்துகிறது?
      - காத்திருப்பு இல்லாமல் தளம் எப்படி இருக்கும்?
      - நிலைக்கும் காலத்திற்கும் என்ன தொடர்பு?
  - id: hi_th_arrival_flow
    name: வருகை ஓட்டம்
    prompt: |
      ரயில் கதவுகள் திறக்கின்றன. மக்கள் வெளியேறுகிறார்கள் — ஏறுபவர்களின் திசைக்கு எதிராக. ஓட்டத்திற்கு ஒரு இயற்பியல் உண்டு. மோதல், பக்கவாட்டு நகர்வு, ஒன்றுகலப்பு ஆகியவற்றைக் கவனிக்கவும். பரிமாற்றத்தை எந்த விதிகள் நிர்வகிக்கின்றன?
    follow_ups:
      - ஓட்டம் தளத்தை எவ்வாறு வடிவமைக்கிறது?
      - அனைவரும் அவசரமாகச் சென்றால் என்ன நடக்கும்?
      - ஓட்டத்திற்கும் செயல்திறனுக்கும் என்ன தொடர்பு?
  - id: hi_th_strangers_transit
    name: போக்குவரத்தில் அந்நியர்கள்
    prompt: |
      நீங்கள் ஒருபோதும் பார்க்காதவர்களுடன் ஒரு பெட்டியைப் பகிர்கிறீர்கள். இணைப்பு இல்லாத நெருக்கம். சுருக்கத்தைக் கவனிக்கவும். அந்நியர்கள் ஒருவருக்கொருவர் என்ன கடமைப்பட்டுள்ளார்கள்? போக்குவரத்துப் பெட்டி ஒரு தற்காலிக சமூகம்.
    follow_ups:
      - போக்குவரத்து தற்காலிக சமூகத்தை எவ்வாறு உருவாக்குகிறது?
      - உரையாடலுடன் கூடிய பெட்டி எப்படி இருக்கும்?
      - அந்நியருக்கும் நாகரிகத்திற்கும் என்ன தொடர்பு?
  - id: hi_th_departure_board
    name: புறப்பாடு பலகை
    prompt: |
      நேரங்கள், தளங்கள், தாமதங்கள் — பலகை உண்மையான ஆதாரமாகும். கண்கள் அதை நோக்கி உயர்கின்றன. பலகை இயக்கத்தை தீர்மானிக்கிறது. கூட்டத்தின் பார்வையை கவனிக்கவும். பலகை கூட்டத்தை என்ன செய்கிறது?
    follow_ups:
      - பலகை நடத்தையை எவ்வாறு வடிவமைக்கிறது?
      - அது இல்லாமல் மையம் எப்படி இருக்கும்?
      - காட்சிக்கும் நம்பிக்கைக்கும் என்ன தொடர்பு?
  - id: hi_th_escalator_stand
    name: எஸ்கலேட்டர் நிலை
    prompt: |
      வலதுபுறம் நிற்கவும், இடதுபுறம் நடக்கவும் — அல்லது நேர்மாறாக, நகரத்தைப் பொறுத்து. எஸ்கலேட்டருக்கு விதிகள் உண்டு. யார் அவற்றைப் பின்பற்றுகிறார்கள் என்பதைக் கவனிக்கவும். எஸ்கலேட்டர் ஒரு நகரும் வரிசை. விதி எதை செயல்படுத்துகிறது?
    follow_ups:
      - எஸ்கலேட்டர் விதி ஓட்டத்தை எவ்வாறு வடிவமைக்கிறது?
      - அனைவரும் நின்றால் என்ன நடக்கும்?
      - விதிக்கும் செயல்திறனுக்கும் என்ன தொடர்பு?
  - id: hi_th_ticket_gate
    name: டிக்கெட் கேட்
    prompt: |
      கேட் அட்டையைப் படித்து, பீப் அடித்து, திறக்கிறது. கேட் ஒரு சோதனைச் சாவடி. அது கட்டணம் செலுத்தியவர்களை கட்டணம் செலுத்தாதவர்களிடமிருந்து பிரிக்கிறது. ரிதத்தைக் கவனிக்கவும். யார் தடுமாறுகிறார்கள்? யார் எளிதாகச் செல்கிறார்கள்? கேட் ஒரு தேர்வு.
    follow_ups:
      - கேட் பயணத்தை எவ்வாறு வடிவமைக்கிறது?
      - கேட்கள் இல்லாமல் மையம் எப்படி இருக்கும்?
      - கேட் மற்றும் சொந்தமாக இருப்பதற்கும் என்ன தொடர்பு?
  - id: hi_th_luggage_drag
    name: லக்கேஜ் இழுவை
    prompt: |
      டைல் மீது சக்கரங்கள். சூட்கேஸ் தொடர்கிறது. இழுவை பயணிகளின் பாதையைக் குறிக்கிறது. லக்கேஜ் உடலை நீட்டிக்கிறது. சுமையைக் கவனிக்கவும். லக்கேஜ் பயணத்தைப் பற்றி என்ன சொல்கிறது?
    follow_ups:
      - லக்கேஜ் இயக்கத்தை எவ்வாறு வடிவமைக்கிறது?
      - பைகள் இல்லாமல் மையம் எப்படி இருக்கும்?
      - சுமைக்கும் இலக்கிற்கும் என்ன தொடர்பு?
  - id: hi_th_bench_occupation
    name: பெஞ்ச் ஆக்கிரமிப்பு
    prompt: |
      தளத்தில் பெஞ்சுகள் வரிசையாக உள்ளன. சிலர் அமர்ந்திருக்கிறார்கள்; சிலர் அருகில் நிற்கிறார்கள். பெஞ்ச் ஒரு அரிய ஆதாரம். யார் அதை உரிமை கோருகிறார்கள் என்பதைக் கவனிக்கவும். எவ்வளவு நேரம் தங்குகிறார்கள்? பெஞ்ச் ஒரு சிறிய பகுதி.
    follow_ups:
      - பெஞ்ச் காத்திருப்பை எவ்வாறு வடிவமைக்கிறது?
      - பெஞ்சுகள் இல்லாமல் தளம் எப்படி இருக்கும்?
      - இருக்கைக்கும் கால அளவுக்கும் என்ன தொடர்பு?
  - id: hi_th_announcement_voice
    name: அறிவிப்பு குரல்
    prompt: |
      "அடுத்த ரயில்..." குரல் தானியங்கி அல்லது மனிதனால் ஆனது. அது இரைச்சலைக் கிழித்துச் செல்கிறது. அறிவிப்பு பகிரப்பட்ட அறிவை உருவாக்குகிறது. யார் கேட்கிறார்கள் என்பதைக் கவனிக்கவும். யார் ஏற்கனவே தங்கள் தொலைபேசியை சரிபார்த்தார்கள்?
    follow_ups:
      - அறிவிப்பு கூட்டத்தை எவ்வாறு வடிவமைக்கிறது?
      - அது இல்லாமல் மையம் எப்படி இருக்கும்?
      - குரலுக்கும் அதிகாரத்திற்கும் என்ன தொடர்பு?
  - id: hi_th_door_positioning
    name: கதவு நிலைப்படுத்தல்
    prompt: |
      வழக்கமான பயணிகள் கதவுகள் எங்கே திறக்கும் என்று அறிவார்கள். அவர்கள் தங்களை நிலைநிறுத்திக் கொள்கிறார்கள். புதியவர்கள் யூகிக்கிறார்கள். நிலைப்படுத்தல் ஒரு உத்தி. கூட்டத்தைக் கவனிக்கவும். நிலை எதை தீர்மானிக்கிறது?
    follow_ups:
      - நிலை ஏறுவதை எவ்வாறு வடிவமைக்கிறது?
      - கதவுகள் சீரற்றதாக இருந்தால் தளம் எப்படி இருக்கும்?
      - நிலைக்கும் நன்மைக்கும் என்ன தொடர்பு?
  - id: hi_th_handrail_grip
    name: கைப்பிடி பிடிப்பு
    prompt: |
      பெட்டிக்குள், கைகள் கைப்பிடியைக் கண்டுபிடிக்கின்றன. பிடிப்பு ஒரு பாதுகாப்பு. யார் பிடிக்கிறார்கள், யாருக்குத் தேவையில்லை என்பதைக் கவனிக்கவும். கைப்பிடி ஒரு பகிரப்பட்ட பொருள். பிடிப்பு எதை வெளிப்படுத்துகிறது?
    follow_ups:
      - கைப்பிடி நிலைத்தன்மையை எவ்வாறு வடிவமைக்கிறது?
      - அது இல்லாமல் பெட்டி எப்படி இருக்கும்?
      - பிடிப்புக்கும் நம்பிக்கைக்கும் என்ன தொடர்பு?
  - id: hi_th_window_reflection
    name: சாளர பிரதிபலிப்பு
    prompt: |
      சாளரம் சுரங்கப்பாதை, தளம் மற்றும் உங்கள் சொந்த முகத்தைக் காட்டுகிறது. பிரதிபலிப்பை தவிர்க்க முடியாது. மக்கள் தங்களைப் பார்க்கிறார்கள் அல்லது அதைத் தவிர்க்கிறார்கள். பிரதிபலிப்புக்கும் பார்வைக்கும் உள்ள உறவைக் கவனிக்கவும்.
    follow_ups:
      - பிரதிபலிப்பு சுய விழிப்புணர்வை எவ்வாறு வடிவமைக்கிறது?
      - சாளரம் இல்லாமல் பயணம் எப்படி இருக்கும்?
      - பிரதிபலிப்புக்கும் தனியுரிமைக்கும் என்ன தொடர்பு?
  - id: hi_th_seat_offer
    name: இருக்கை சலுகை
    prompt: |
      ஒருவர் முதியவர்களுக்கோ, குழந்தையுடன் பெற்றோருக்குமோ இருக்கையை வழங்குகிறார். சலுகை ஒரு சிறிய தார்மீக செயல். அது எப்போது நடக்கிறது என்பதைக் கவனிக்கவும். யார் வழங்குகிறார்கள்? யார் ஏற்றுக்கொள்கிறார்கள்? இருக்கை ஒரு பரிசு.
    follow_ups:
      - சலுகை பெட்டியை எவ்வாறு வடிவமைக்கிறது?
      - அத்தகைய சலுகைகள் இல்லாமல் பயணம் எப்படி இருக்கும்?
      - சலுகைக்கும் அக்கறைக்கும் என்ன தொடர்பு?
  - id: hi_th_delay_sigh
    name: தாமத பெருமூச்சு
    prompt: |
