# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Людський інтерфейс — Роздрібна торгівля (Ukrainian)

id: human_interface_retail
name: Людський інтерфейс — Роздрібна торгівля
description: 50 карток, щоб змінити ваш погляд на роздрібний простір — від проходів і хореографії перегляду до примірочних та танцю покупки.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: Потік проходу
    prompt: |
      Прохід спрямовує рух. Кошики рухаються в один бік; люди маневрують. Спостерігайте
      за потоком. Хто поступається? Хто блокує? Прохід має свою фізику. Які правила
      керують цим танцем?
    follow_ups:
      - Як прохід формує процес перегляду?
      - Яким був би магазин без проходів?
      - Який зв'язок між потоком і дизайном?
  - id: hi_rt_browsing_choreography
    name: Хореографія перегляду
    prompt: |
      Пальці торкаються тканини. Очі сканують полиці. Перегляд має свій ритм — пауза,
      роздуми, рух далі. Спостерігайте за хореографією. Що робить тіло, коли
      воно не купує?
    follow_ups:
      - Як перегляд формує враження?
      - Яким був би магазин без перегляду?
      - Який зв'язок між переглядом і бажанням?
  - id: hi_rt_fitting_room
    name: Примірочна
    prompt: |
      Завіса зачиняється. Примірочна — це поріг, від публічного до приватного.
      Всередині ви приміряєте можливе "я". Спостерігайте за поверненням. Що говорить
      обличчя? Примірочна — це сцена для прийняття рішень.
    follow_ups:
      - Як примірочна формує покупку?
      - Яким був би магазин без неї?
      - Який зв'язок між приміркою та ідентичністю?
  - id: hi_rt_dance_of_purchase
    name: Танець покупки
    prompt: |
      Підійти, вибрати, взяти, заплатити. Покупка має свої кроки. Спостерігайте
      за послідовністю. Де люди вагаються? Танець хореографований
      магазином. Що він витягує?
    follow_ups:
      - Як танець формує результат?
      - Яким був би магазин без цієї послідовності?
      - Який зв'язок між танцем і бажанням?
  - id: hi_rt_cart_territory
    name: Територія візка
    prompt: |
      Візок розширює тіло. Він вміщує вибір, блокує прохід. Спостерігайте
      за траєкторією візка. Візок — це мобільна територія. Що він завойовує?
    follow_ups:
      - Як візок формує рух?
      - Яким був би магазин без візків?
      - Який зв'язок між візком і накопиченням?
  - id: hi_rt_endcap_display
    name: Торцевий дисплей
    prompt: |
      Кінець проходу містить дисплей — імпульс, знижка, сезонний товар.
      Торцевий дисплей привертає увагу. Спостерігайте, хто зупиняється. Торцевий дисплей — це пастка.
      Що він робить?
    follow_ups:
      - Як торцевий дисплей формує процес перегляду?
      - Яким був би прохід без нього?
      - Який зв'язок між дисплеєм та імпульсом?
  - id: hi_rt_checkout_line
    name: Черга на касі
    prompt: |
      Формується черга. Цукерки, журнали, останні шанси. Каса — це
      фінальний тест. Спостерігайте за очікуванням. Що роблять люди? Черга — це
      поріг між переглядом і виходом.
    follow_ups:
      - Як черга формує покупку?
      - Яким був би магазин без черги?
      - Який зв'язок між чергою та імпульсом?
  - id: hi_rt_shelf_height
    name: Висота полиці
    prompt: |
      На рівні очей продається найкраще. Висота полиці — це дизайн. Спостерігайте, що де лежить.
      Що знаходиться внизу? Що вгорі? Висота кодує цінність.
      Що вона припускає про тіло?
    follow_ups:
      - Як висота полиці формує процес перегляду?
      - Яким був би магазин з однаковою висотою полиць?
      - Який зв'язок між висотою та доступом?
  - id: hi_rt_price_tag
    name: Ціна
    prompt: |
      Ціна вказана на етикетці. Іноді прихована, іноді помітна. Спостерігайте
      за її розміщенням. Етикетка — це інформація і бар'єр. Що робить етикетка
      з моментом дотику?
    follow_ups:
      - Як етикетка формує рішення?
      - Яким був би товар без етикетки?
      - Який зв'язок між етикеткою та цінністю?
  - id: hi_rt_store_entrance
    name: Вхід до магазину
    prompt: |
      Двері відчиняються. Ви заходите. Вхід — це поріг. Спостерігайте, що
      ви бачите першим. Вхід задає тон. Що хоче, щоб ви відчували магазин?
    follow_ups:
      - Як вхід формує відвідування?
      - Яким був би магазин без дизайну?
      - Який зв'язок між входом та очікуванням?
  - id: hi_rt_sales_associate
    name: Консультант
    prompt: |
      "Допомогти вам щось знайти?" Пропозиція заздалегідь визначена. Спостерігайте
      за обміном. Прийняти чи відмовитись? Консультант — це гід і тиск.
      Що робить ця пропозиція?
    follow_ups:
      - Як консультант формує процес перегляду?
      - Яким був би магазин без них?
      - Який зв'язок між пропозицією та зобов'язанням?
  - id: hi_rt_basket_versus_cart
    name: Кошик проти візка
    prompt: |
      Кошик для кількох речей. Візок — для більшого. Вибір передбачає
      покупку. Спостерігайте, хто що бере. Кошик обмежує; візок
      запрошує. Що дозволяє цей вибір?
    follow_ups:
      - Як кошик формує відвідування?
      - Яким був би магазин тільки з візками?
      - Який зв'язок між ємністю та накопиченням?
  - id: hi_rt_return_counter
    name: Пункт повернення
    prompt: |
      Черга на повернення інша. Люди несуть пакети, чеки, жаль.
      Повернення — це реверс. Спостерігайте за обміном. Чого коштує повернення — емоційно, соціально?
      Пункт повернення — це місце скасування.
    follow_ups:
      - Як повернення формує відносини?
      - Яким був би магазин без повернень?
      - Який зв'язок між поверненням і довірою?
  - id: hi_rt_dressing_room_limit
    name: Обмеження примірочної
    prompt: |
      "Максимум шість речей". Обмеження контролює примірку. Спостерігайте
      за переговорами. Що відбувається, коли у вас сім? Обмеження формує
      досвід примірочної. Що воно припускає?
    follow_ups:
      - Як обмеження формує процес примірки?
      - Якою була б примірочна без нього?
      - Який зв'язок між обмеженням і крадіжкою?
  - id: hi_rt_impulse_buy
    name: Імпульсивна покупка
    prompt: |
      Цього товару не було в списку. Він привернув увагу. Імпульсивна покупка —
      це момент здачі. Спостерігайте, коли це відбувається. Що це спровокувало?
      Імпульс — це дизайн, що зустрічається з бажанням.
    follow_ups:
      - Як імпульс формує покупку?
      - Яким був би магазин без імпульсу?
      - Який зв'язок між імпульсом і жалем?
  - id: hi_rt_store_music
    name: Музика в магазині
    prompt: |
      Грає музика — повільна, знайома, навмисно підібрана. Музика формує настрій та темп.
      Спостерігайте за темпом. Швидкий магазин, повільна музика? Музика — це невидимий
      дизайн. Що вона робить з тілом?
    follow_ups:
      - Як музика формує відвідування?
      - Яким був би магазин у тиші?
      - Який зв'язок між музикою та тривалістю?
  - id: hi_rt_mannequin
    name: Манекен
    prompt: |
      Манекен одягнений. Це ідеальне тіло, пропозиція.
      Спостерігайте, як люди на нього дивляться. Манекен — це дзеркало і
      фантазія. Що він обіцяє?
    follow_ups:
      - Як манекен формує процес перегляду?
      - Яким був би магазин без нього?
      - Який зв'язок між манекеном і бажанням?
  - id: hi_rt_sample_station
    name: Станція зразків
    prompt: |
      Скуштуйте це. Спробуйте це. Зразок запрошує до дотику. Станція створює
      паузу. Спостерігайте, хто зупиняється. Зразок — це маленький подарунок. Що
      він витягує?
    follow_ups:
      - Як зразок формує покупку?
      - Яким був би магазин без зразків?
      - Який зв'язок між зразком і зобов'язанням?
  - id: hi_rt_sale_rack
    name: Стійка розпродажу
    prompt: |
      Стійка розпродажу — це хаос: зі знижками, пом'ятий. Люди копаються. Стійка розпродажу —
      це інший вид перегляду. Спостерігайте за поведінкою. Що робить
      знижка з дотиком?
    follow_ups:
      - Як стійка розпродажу формує відвідування?
      - Яким був би магазин без неї?
      - Який зв'язок між розпродажем і цінністю?
  - id: hi_rt_mirror_encounter
    name: Зустріч з дзеркалом
    prompt: |
      Ви бачите себе в дзеркалі магазину. Зустріч неминуча.
      Спостерігайте за поглядом. Що ви перевіряєте? Дзеркало — це тест. Магазин
      надає дзеркало. Чого він хоче?
    follow_ups:
      - Як дзеркало формує процес примірки?
      - Якою була б примірочна без нього?
      - Який зв'язок між дзеркалом і собою?
  - id: hi_rt_cashier_small_talk
    name: Розмова на касі
    prompt: |
      "Знайшли все, що шукали?" — запитує касир. Розмова заздалегідь визначена.
      Спостерігайте за обміном. Що робить це запитання? Касир — це
      останній контакт з людиною. Що створює ця розмова?
    follow_ups:
      - Як розмова формує вихід?
      - Якою була б каса без неї?
      - Який зв'язок між розмовою та транзакцією?
  - id: hi_rt_store_layout
    name: Планування магазину
    prompt: |
      Шлях спланований. Основні товари позаду. Імпульсні товари спереду.
      Планування хореографує відвідування. Спостерігайте за своїм маршрутом. Що
      хотів, щоб ви минули, дизайнер?
    follow_ups:
      - Як планування формує процес перегляду?
      - Яким був би магазин з випадковим плануванням?
      - Який зв'язок між плануванням та експозицією?
  - id: hi_rt_touch_decide
    name: Дотик вирішує
    prompt: |
      Пальці торкаються тканини, поверхні. Дотик вирішує. Спостерігайте
      за моментом. Чого навчає рука, чого не може побачити око? Дотик —
      це поріг. Чого він вимагає?
    follow_ups:
      - Як дотик формує рішення?
      - Яким був би магазин без дотику?
      - Який зв'язок між дотиком і зобов'язанням?
  - id: hi_rt_receipt_handoff
    name: Передача чека
    prompt: |
      Чек пропонується — в пакеті чи окремо. Дехто бере, дехто
      відмовляється. Чек — це доказ і запис. Спостерігайте за обміном. Що
      робить чек для транзакції?
    follow_ups:
      - Як чек формує вихід?
      - Якою була б каса без нього?
      - Який зв'язок між чеком і завершенням?
  - id: hi_rt_store_exit
    name: Вихід з магазину
    prompt: |
      Двері відчиняються. Ви виходите з пакетом — або з порожніми руками. Вихід — це
      поріг. Спостерігайте за відчуттями. Що витягує вихід? Вихід —
      це кінець танцю. Що залишається?
    follow_ups:
      - Як вихід формує відвідування?
      - Яким був би магазин без дверей?
      - Який зв'язок між виходом і задоволенням?
  - id: hi_rt_loyalty_card_ask
    name: Запитання про картку лояльності
    prompt: |
      "У вас є наша картка лояльності?" Запитання є рутинним. Спостерігайте
      за відповіддю. Так, ні, зареєструватись. Картка лояльності розширює зв'язок.
      Що створює це запитання?
    follow_ups:
      - Як картка лояльності формує транзакцію?
      - Якою була б каса без неї?
      - Який зв'язок між карткою та даними?
  - id: hi_rt_abandoned_cart
    name: Покинутий візок
    prompt: |
      Візок стоїть у проході — повний, без нагляду. Візок покинутий.
      Спостерігайте за вмістом. Що вони розглядали? Покидання — це
      момент "ні". Що це розкриває?
    follow_ups:
      - Як покинутий візок формує магазин?
      - Чого навчився б магазин з нього?
      - Який зв'язок між покиданням і бажанням?
  - id: hi_rt_fitting_room_opinion
    name: Думка про примірочну
    prompt: |
      "Як це виглядає?" — запитує хтось з-за завіси. Думка
      шукається. Примірочна стає соціальною. Спостерігайте за обміном.
      Що робить ця думка?
    follow_ups:
      - Як думка формує рішення?
      - Якою була б примірка наодинці?
      - Який зв'язок між думкою та покупкою?
  - id: hi_rt_store_scent
    name: Аромат магазину
    prompt: |
      У магазині є запах — парфуми, шкіра, чистота. Аромат навмисно створений.
      Він проникає ще до того, як ви його помітите. Спостерігайте, коли ви його відчуєте. Що
      аромат робить з тілом?
    follow_ups:
      - Як аромат формує відвідування?
      - Яким був би магазин без нього?
      - Який зв'язок між ароматом і пам'яттю?
  - id: hi_rt_compare_prices
    name: Порівняння цін
    prompt: |
      Телефон у руці. Сканування. Перевірка ціни — це дослідження. Спостерігайте
      за моментом. Що показує телефон? Порівняння відбувається в проході. Що
      це робить з рішенням?
    follow_ups:
      - Як порівняння формує покупку?
      - Яким був би магазин без телефонів?
      - Який зв'язок між порівнянням і силою?
  - id: hi_rt_window_display
    name: Вітрина
    prompt: |
      Вікно виходить на вулицю. Манекени, декорації, історія. Вітрина
      зупиняє рух. Спостерігайте, що привертає увагу. Вікно — це
      запрошення. Що воно обіцяє?
    follow_ups:
      - Як вікно формує вхід?
      - Яким був би магазин без нього?
      - Який зв'язок між вітриною та бажанням?
  - id: hi_rt_size_search
    name: Пошук розміру
    prompt: |
      Пальці гортають вішалки. Шукають розмір. Пошук має
      ритм. Спостерігайте за розчаруванням чи полегшенням. Розмір — це ворота.
      Чого вимагає пошук?
    follow_ups:
      - Як пошук розміру формує процес перегляду?
      - Яким був би магазин, якби всі розміри були видимі?
      - Який зв'язок між розміром і тілом?
  - id: hi_rt_payment_choice
    name: Вибір способу оплати
    prompt: |
      Карткою, готівкою, телефоном. Вибір способу оплати — це момент транзакції.
      Спостерігайте за методом. Вибір — це звичка та ідентичність. Що
      комунікує спосіб оплати?
    follow_ups:
      - Як оплата формує вихід?
      - Яким був би магазин з одним способом оплати?
      - Який зв'язок між оплатою та швидкістю?
  - id: hi_rt_store_regular
    name: Постійний покупець
    prompt: |
      Постійний покупець знає планування. Він рухається з метою. Консультант
      киває. Спостерігайте за постійним покупцем. Що він знає, чого не знає новачок?
      Постійний покупець має зв'язок з простором.
    follow_ups:
      - Як постійний покупець формує магазин?
      - Яким був би магазин без постійних покупців?
      - Який зв'язок між постійним покупцем і лояльністю?
  - id: hi_rt_bag_handoff
    name: Передача пакету
    prompt: |
      Пакет передається — повний, з логотипом. Передача завершує
      транзакцію. Спостерігайте за обміном. Що робить пакет для
      виходу? Пакет — це доказ і тягар.
    follow_ups:
      - Як пакет формує вихід?
      - Якою була б покупка без нього?
      - Який зв'язок між пакетом та ідентичністю?
  - id: hi_rt_fitting_room_overflow
    name: Переповнення примірочної
    prompt: |
      Забагато речей. Консультант бере надлишок. "Я їх потримаю".
      Надлишок — це довіра. Спостерігайте за обміном. Що тримає консультант?
      Надлишок розширює процес примірки. Що він дозволяє?
    follow_ups:
      - Як надлишок формує примірку?
      - Якою була б примірочна без нього?
      - Який зв'язок між надлишком і довірою?
  - id: hi_rt_store_lighting
    name: Освітлення магазину
    prompt: |
      Освітлення навмисно — приємне, яскраве, тепле. Освітлення формує
      те, як речі виглядають. Спостерігайте за дзеркалом при такому світлі. Що
      освітлення робить з обличчям, з тканиною?
    follow_ups:
      - Як освітлення формує покупку?
      - Яким був би магазин при жорсткому світлі?
      - Який зв'язок між світлом і правдою?
  - id: hi_rt_aisle_block
    name: Блокування проходу
    prompt: |
      Хтось стоїть у проході. Вам потрібно пройти. Блокування
      несвідоме або навмисне. Спостерігайте за переговорами. "Вибачте". Блокування — це
      невелика перешкода. Чого вона вимагає?
    follow_ups:
      - Як блокування формує потік?
      - Яким був би магазин з ширшими проходами?
      - Який зв'язок між блокуванням і ввічливістю?
  - id: hi_rt_clearance_section
    name: Розпродажна секція
    prompt: |
      Розпродажна секція — це задній кут. Минулий сезон, останній шанс.
      Секція має іншу енергію. Спостерігайте за переглядом. Що робить
      знижка з дотиком, з роздумами?
    follow_ups:
      - Як розпродажна секція формує відвідування?
      - Яким був би магазин без неї?
      - Який зв'язок між розпродажем і цінністю?
  - id: hi_rt_store_map
    name: Карта магазину
    prompt: |
      "Де знаходиться X?" Відповідає карта або консультант. У магазину є
      географія. Спостерігайте за дезорієнтацією. Що надає карта?
      Карта — це орієнтація. Що вона припускає?
    follow_ups:
      - Як карта формує відвідування?
      - Яким був би магазин без неї?
      - Який зв'язок між картою та швидкістю орієнтації?
  - id: hi_rt_try_on_stack
    name: Стопка примірених речей
    prompt: |
      Консультант повертає примірені речі. Вони складені, повішені. Стопка
      повертається на підлогу. Спостерігайте за роботою. Хто це торкався? Стопка
      примірених речей — це наслідок багатьох "можливо".
    follow_ups:
      - Як стопка формує підлогу?
      - Якою була б примірочна без неї?
      - Який зв'язок між стопкою і роботою?
  - id: hi_rt_store_hours
    name: Графік роботи магазину
    prompt: |
      На вивісці вказано, коли магазин відкривається, коли закривається. Години роботи —
      це межа. Спостерігайте за натовпом перед відкриттям. Графік структурує
      доступ. Що він припускає про покупця?
    follow_ups:
      - Як години роботи формують відвідування?
      - Яким був би магазин з цілодобовим доступом?
      - Який зв'язок між годинами роботи та доступністю?
  - id: hi_rt_shopping_list
    name: Список покупок
    prompt: |
      Телефон або папір. Список керує відвідуванням. Спостерігайте, хто його має.
      Список — це намір. Він протистоїть імпульсу — або ні. Що
      робить список для процесу перегляду?
    follow_ups:
      - Як список формує покупку?
      - Яким було б відвідування без нього?
      - Який зв'язок між списком і контролем?
  - id: hi_rt_store_emptiness
    name: Порожнеча магазину
    prompt: |
      Поза годиною пік, повільний день. Магазин порожній. Порожнеча змінює
      відчуття. Спостерігайте за простором. Що розкриває порожнеча? Порожній
      магазин — це інший вид сцени.
    follow_ups:
      - Як порожнеча формує процес перегляду?
      - Яким був би магазин, якби він завжди був порожній?
      - Який зв'язок між порожнечею і комфортом?
  - id: hi_rt_fitting_room_curtain
    name: Завіса примірочної
    prompt: |
      Завіса зачиняється. Приватність часткова — прогалини, звуки. Завіса —
      це поріг. Спостерігайте за межею. Що захищає завіса?
      Що вона не захищає?
    follow_ups:
      - Як завіса формує процес примірки?
      - Якою була б примірочна з дверима?
      - Який зв'язок між завісою та приватністю?
  - id: hi_rt_store_aroma
    name: Аромат магазину
    prompt: |
      Пекарня, кава, парфуми — у магазині є запах. Аромат — це перший
      контакт. Він готує до відвідування. Спостерігайте, коли ви його помічаєте. Що
      робить аромат до покупки?
    follow_ups:
      - Як аромат формує відвідування?
      - Яким був би магазин без нього?
      - Який зв'язок між ароматом і бажанням?
  - id: hi_rt_purchase_regret
    name: Шкодування покупки
    prompt: |
      Пакет у руці. Сум закрадається. Шкодування може прийти пізніше. Спостерігайте
      за обличчям, що виходить з магазину. Що означає покупка? Шкодування —
      це тінь танцю. Що його створює?
    follow_ups:
      - Як шкодування формує наступне відвідування?
      - Якою була б покупка без шкодування?
      - Який зв'язок між шкодуванням і бажанням?
  - id: hi_rt_store_thank_you
    name: Подяка магазину
    prompt: |
      "Дякуємо за покупки у нас". Фраза завершує транзакцію.
      Вона заздалегідь визначена. Спостерігайте за обміном. Що робить ця подяка?
      Фраза — це маленький ритуал. Що вона створює?
    follow_ups:
      - Як подяка формує вихід?
      - Якою була б каса без неї?
      - Який зв'язок між подякою та завершенням?
  - id: hi_rt_store_entrance_sensor
    name: Датчик входу
    prompt: |
      Двері відчиняються автоматично. Датчик виявляє ваш підхід. Вхід
      хореографований. Спостерігайте за порогом. Що роблять автоматичні двері
      з прибуттям? Датчик створює безшовний
      перехід.
    follow_ups:
      - Як датчик формує вхід?
      - Яким був би магазин з ручними дверима?
      - Який зв'язок між датчиком і привітанням?
  - id: hi_rt_price_match
    name: Збіг цін
    prompt: |
      "Ми зрівняємо ціни конкурентів". Пропозиція — це обіцянка. Спостерігайте, коли
      хтось нею користується. Збіг цін — це переговори. Що
      він вимагає від покупця? Збіг створює довіру — або підозру.
    follow_ups:
      - Як збіг цін формує покупку?
      - Яким був би магазин без нього?
      - Який зв'язок між збігом і лояльністю?
  - id: hi_rt_fitting_room_number
    name: Кількість примірочних
    prompt: |
      "Скільки?" — запитує консультант. Число обмежує примірку. Спостерігайте
      за переговорами. Що відбувається, коли у вас більше? Число — це
      контроль. Що воно припускає про покупця?
    follow_ups:
      - Як число формує примірку?
      - Якою була б примірочна без обмежень?
      - Який зв'язок між числом і довірою?
  - id: hi_rt_gift_receipt
    name: Подарунковий чек
    prompt: |
      "Бажаєте отримати подарунковий чек?" Пропозиція відділяє ціну від
      подарунка. Подарунковий чек дозволяє повернути товар без розголошення вартості.
      Спостерігайте за вибором. Що захищає подарунковий чек?
    follow_ups:
      - Як подарунковий чек формує покупку?
      - Яким був би подарунок без нього?
      - Який зв'язок між чеком і дискретністю?
