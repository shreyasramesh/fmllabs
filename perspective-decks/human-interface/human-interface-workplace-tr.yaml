    name: Toplantı Gündemi
    prompt: |
      Gündem toplantıyı yapılandırır. Veya yapmaz — toplantı sürüklenir. Dinamiği gözlemleyin. Kim gündemi takip eder? Kim etmez? Gündem bir sözleşmedir. Ne mümkün kılar?
    follow_ups:
