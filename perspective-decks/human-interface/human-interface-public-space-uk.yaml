# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Людський інтерфейс — Громадський простір (Ukrainian)

id: human_interface_public_space
name: Людський інтерфейс — Громадський простір
description: 50 карток, щоб змінити ваш погляд на громадський простір — від лавок і доріжок до хореографії незнайомців та предметів як талісманів.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: Зайняття лавки
    prompt: |
      Лавка зайнята — тілом, сумкою, позою. Лавка — це дефіцитний ресурс.
      Спостерігайте, хто сидить, хто стоїть, хто проходить повз. Лавка має
      різне значення для різних людей. Що вона надає?
    follow_ups:
      - Як лавка формує простір?
      - Яким був би парк без лавок?
      - Який зв'язок між лавкою та відпочинком?
  - id: hi_ps_pathway_flow
    name: Потік стежки
    prompt: |
      Стежка спрямовує рух. Люди йдуть — самі, парами, групами. Потік має
      напрямок. Спостерігайте за зіткненнями. Хто поступається? Стежка — це
      спільний коридор. Які правила ним керують?
    follow_ups:
      - Як стежка формує ходу?
      - Яким був би простір без стежок?
      - Який зв'язок між стежкою та пунктом призначення?
  - id: hi_ps_strangers_choreography
    name: Хореографія незнайомців
    prompt: |
      Сторонні тіла рухаються спільним простором. Хореографія є
      невисловленою — обійти, зупинитися, злитися. Спостерігайте за танцем.
      Ніхто не говорить. Хореографія — це чисте тіло. Чого вона вимагає?
    follow_ups:
      - Як хореографія формує простір?
      - Що сталося б, якби всі зупинилися?
      - Який зв'язок між хореографією та ввічливістю?
  - id: hi_ps_object_talisman
    name: Предмет як талісман
    prompt: |
      Книга на лавці. Сумка на стільці. Предмет займає місце. Він каже:
      "Я тут" або "Я повернуся". Предмет — це талісман. Спостерігайте за
      цим правом. Що він захищає?
    follow_ups:
      - Як талісман формує простір?
      - Яким був би простір без таких заяв?
      - Який зв'язок між предметом і присутністю?
  - id: hi_ps_bench_armrest
    name: Підлокітник лавки
    prompt: |
      Деякі лавки мають підлокітники. Вони розділяють сидіння. Вони
      запобігають лежання. Підлокітник — це продуманий дизайн.
      Спостерігайте, хто його використовує. Що виключає підлокітник?
    follow_ups:
      - Як підлокітник формує лавку?
      - Якою була б лавка без нього?
      - Який зв'язок між підлокітником і контролем?
  - id: hi_ps_pathway_intersection
    name: Перехрестя стежок
    prompt: |
      Стежки перетинаються. Тіла збігаються. Перехрестя — це точка зіткнення.
      Спостерігайте за злиттям. Що відбувається, коли потоки зустрічаються?
      Перехрестя вимагає узгодження. Що воно витягує?
    follow_ups:
      - Як перехрестя формує потік?
      - Яким був би простір без перехресть?
      - Який зв'язок між перехрестям і увагою?
  - id: hi_ps_eye_contact_avoid
    name: Уникнення зорового контакту
    prompt: |
      Незнайомці уникають зорового контакту. Це ввічливість. Подивитися —
      це ризикнути зв'язком. Спостерігайте за поглядом. Уникнення — це
      договір. Що воно дозволяє? Чого воно коштує?
    follow_ups:
      - Як уникнення формує простір?
      - Яким був би простір з більшою кількістю контакту?
      - Який зв'язок між поглядом і приватністю?
  - id: hi_ps_bench_share
    name: Спільне сидіння на лавці
    prompt: |
      Двоє незнайомців ділять лавку. Простір між ними. Це спільне
      розташування без зв'язку. Спостерігайте за межею. Наскільки близько —
      це занадто близько? Спільне сидіння — це делікатний баланс.
    follow_ups:
      - Як спільне сидіння формує лавку?
      - Якою була б лавка з однією людиною?
      - Який зв'язок між спільним сидінням і толерантністю?
  - id: hi_ps_pathway_width
    name: Ширина стежки
    prompt: |
      Стежка широка чи вузька. Ширина впливає на потік. Двоє людей
      можуть пройти чи ні. Спостерігайте за шириною. Що вона припускає
      щодо натовпу? Ширина — це дизайн. Що вона дозволяє?
    follow_ups:
      - Як ширина формує ходу?
      - Якою була б стежка, якби була ширшою?
      - Який зв'язок між шириною та комфортом?
  - id: hi_ps_bench_sun
    name: Лавка на сонці
    prompt: |
      Лавка звернена до сонця. Або до тіні. Позиція має значення.
      Спостерігайте, хто вибирає яку. Сонце — це ресурс. Що воно надає?
      Лавка на сонці — бажана.
    follow_ups:
      - Як сонце формує лавку?
      - Яким був би простір без сонця?
      - Який зв'язок між сонцем і відпочинком?
  - id: hi_ps_stranger_proximity
    name: Близькість незнайомця
    prompt: |
      Незнайомець стоїть близько — у черзі, в автобусі. Ця близькість є
      безособовою, але інтимною. Спостерігайте за толерантністю. Що дозволяє
      тіло? Близькість — це договір. Які його умови?
    follow_ups:
      - Як близькість формує простір?
      - Яким був би простір з більшим простором?
      - Який зв'язок між близькістю та ввічливістю?
  - id: hi_ps_object_left
    name: Залишений предмет
    prompt: |
      Куртка на лавці. Сумка під деревом. Залишений предмет позначає
      територію. Спостерігайте за цим правом. Як довго воно триває?
      Залишений предмет — це випробування. Чого він вимагає від інших?
    follow_ups:
      - Як предмет формує простір?
      - Яким був би простір без таких заяв?
      - Який зв'язок між предметом і довірою?
  - id: hi_ps_pathway_obstacle
    name: Перешкода на стежці
    prompt: |
      Щось блокує шлях — будівництво, натовп, виконавець. Перешкода
      відводить потік. Спостерігайте за об'їздом. Чого вимагає перешкода?
      Стежка ніколи не є чистою. Що її перериває?
    follow_ups:
      - Як перешкода формує потік?
      - Якою була б стежка без перешкод?
      - Який зв'язок між перешкодою та адаптацією?
  - id: hi_ps_bench_alone
    name: Самотня лавка
    prompt: |
      Одна людина на лавці. Самотність видима. Лавка утримує
      самотність. Спостерігайте за позою. Що надає самотня лавка?
      Самотня лавка — це вибір. Що вона дозволяє?
    follow_ups:
      - Як самотність формує лавку?
      - Яким був би простір без лавок?
      - Який зв'язок між самотністю та відпочинком?
  - id: hi_ps_nod_acknowledge
    name: Кивок як визнання
    prompt: |
      Легкий кивок. Коротка посмішка. Визнання мінімальне. Воно говорить:
      "Я бачу тебе" без залучення. Спостерігайте, коли це відбувається.
      Кивок — це невелика ввічливість. Що він створює?
    follow_ups:
      - Як кивок формує простір?
      - Яким був би простір без нього?
      - Який зв'язок між кивком і безпекою?
  - id: hi_ps_pathway_edge
    name: Край стежки
    prompt: |
      Стежка має краї — трава, бордюр, бар'єр. Край визначає стежку.
      Спостерігайте, хто залишається на стежці. Хто перетинає? Край — це
      межа. Що вона містить?
    follow_ups:
      - Як край формує ходу?
      - Якою була б стежка без країв?
      - Який зв'язок між краєм і свободою?
  - id: hi_ps_bench_claim
    name: Заява на лавку
    prompt: |
      Лавка зайнята — розкладена, позою, сумкою. Заява каже: "Це моє".
      Спостерігайте за заявою. Як вона робиться? Заява — це територія.
      Що вона захищає?
    follow_ups:
      - Як заява формує лавку?
      - Яким був би простір без таких заяв?
      - Який зв'язок між заявою та комфортом?
  - id: hi_ps_stranger_help
    name: Допомога незнайомця
    prompt: |
      "Потрібна допомога?" Незнайомець пропонує. Допомога несподівана.
      Спостерігайте за обміном. Прийняти чи відмовитися? Допомога
      незнайомця — це дар. Чого вона вимагає?
    follow_ups:
      - Як допомога формує простір?
      - Яким був би простір без таких пропозицій?
      - Який зв'язок між допомогою та довірою?
  - id: hi_ps_object_temporary
    name: Тимчасовий предмет
    prompt: |
      Чашка, газета, капелюх. Предмет займає місце. Він тимчасовий.
      Власник повернеться. Спостерігайте за цією заявою. Чого вимагає
      тимчасовий предмет від інших? Предмет — це заповнювач місця.
    follow_ups:
      - Як тимчасовий предмет формує простір?
      - Яким був би простір без нього?
      - Який зв'язок між тимчасовим і довірою?
  - id: hi_ps_pathway_rhythm
    name: Ритм стежки
    prompt: |
      Ноги по бруківці. Ритм індивідуальний — швидкий, повільний, нерівний.
      Стежка містить багато ритмів. Спостерігайте за синхронізацією та
      зіткненням. Що розкриває ритм?
    follow_ups:
      - Як ритм формує ходу?
      - Якою була б стежка в тиші?
      - Який зв'язок між ритмом і пунктом призначення?
  - id: hi_ps_bench_face
    name: Орієнтація лавки
    prompt: |
      Лавка звернена в певному напрямку — до краєвиду, сонця, натовпу.
      Орієнтація формує досвід. Спостерігайте, хто вибирає яку лавку.
      Орієнтація — це дизайн. Що вона припускає?
    follow_ups:
      - Як орієнтація формує лавку?
      - Якою була б лавка без напрямку?
      - Який зв'язок між орієнтацією та краєвидом?
  - id: hi_ps_sidewalk_dance
    name: Танець тротуару
    prompt: |
      Двоє наближаються. Танець — хто рухається? Танець тротуару є
      універсальним. Спостерігайте за обходом. Танець невисловлений. Чого він
      вимагає?
    follow_ups:
      - Як танець формує ходу?
      - Якою була б тротуар без нього?
      - Який зв'язок між танцем і ввічливістю?
  - id: hi_ps_object_abandoned
    name: Занедбаний предмет
    prompt: |
      Рукавичка на землі. Шарф на лавці. Предмет покинутий.
      Спостерігайте за ним. Хто його залишив? Хто його візьме? Занедбаний
      предмет — це маленька загадка. Що він розкриває?
    follow_ups:
      - Як занедбаний предмет формує простір?
      - Яким був би простір без таких предметів?
      - Який зв'язок між занедбаним і втратою?
  - id: hi_ps_pathway_surface
    name: Поверхня стежки
    prompt: |
      Бруківка, гравій, трава. Поверхня впливає на ходу. Спостерігайте за
      вибором. Що вимагає поверхня від тіла? Поверхня — це дизайн. Що вона
      дозволяє?
    follow_ups:
      - Як поверхня формує ходу?
      - Якою була б стежка з іншою поверхнею?
      - Який зв'язок між поверхнею та доступністю?
  - id: hi_ps_bench_weather
    name: Лавка та погода
    prompt: |
      Дощ, сонце, вітер. Погода формує лавку. Хто сидить під дощем?
      Хто шукає тінь? Лавка оголена. Спостерігайте за зв'язком
      між лавкою та погодою. Що робить погода?
    follow_ups:
      - Як погода формує лавку?
      - Якою була б лавка під прикриттям?
      - Який зв'язок між погодою та використанням?
  - id: hi_ps_stranger_glance
    name: Погляд незнайомця
    prompt: |
      Короткий погляд. Погляд — це оцінка. Безпечно? Загроза? Погляд
      автоматичний. Спостерігайте за своїми поглядами. Що робить погляд?
      Погляд — це інструмент виживання. Що він витягує?
    follow_ups:
      - Як погляд формує простір?
      - Яким був би простір без поглядів?
      - Який зв'язок між поглядом і безпекою?
  - id: hi_ps_pathway_crowd
    name: Натовп на стежці
    prompt: |
      Стежка заповнена. Тіла стискаються. Натовп має свій власний потік.
      Спостерігайте за рухом. Натовп — це колектив. Що він вимагає
      від індивіда?
    follow_ups:
      - Як натовп формує стежку?
      - Якою була б стежка порожньою?
      - Який зв'язок між натовпом і потоком?
  - id: hi_ps_bench_curve
    name: Вигин лавки
    prompt: |
      Деякі лавки вигнуті. Вони звернені одна до одної або до центру.
      Вигин формує соціальну взаємодію. Спостерігайте за розташуванням. Що
      дозволяє вигин? Вигин — це дизайн. Чого він прагне?
    follow_ups:
      - Як вигин формує лавку?
      - Якою була б лавка, якби була прямою?
      - Який зв'язок між вигином і зв'язком?
  - id: hi_ps_object_traded
    name: Обмін предметами
    prompt: |
      Передача. Покупка. Подарунок. Предмет переходить між незнайомцями.
      Спостерігайте за обміном. Що проходить, крім предмета? Обмін — це
      момент зв'язку. Що він створює?
    follow_ups:
      - Як обмін формує простір?
      - Яким був би простір без таких обмінів?
      - Який зв'язок між обміном і довірою?
  - id: hi_ps_pathway_light
    name: Освітлення стежки
    prompt: |
      День, ніч, вуличний ліхтар. Освітлення формує стежку. Спостерігайте за
      різницею. Хто йде вночі? Освітлення — це безпека та атмосфера.
      Що воно надає?
    follow_ups:
      - Як освітлення формує стежку?
      - Якою була б стежка в темряві?
      - Який зв'язок між освітленням і безпекою?
  - id: hi_ps_bench_armrest_gap
    name: Проміжок підлокітника лавки
    prompt: |
      Підлокітник розділяє. Одна людина на секцію. Проміжок запобігає
      спільному сидінню. Спостерігайте за дизайном. Що виключає проміжок?
      Проміжок підлокітника — це ворожа архітектура. Що вона припускає?
    follow_ups:
      - Як проміжок формує лавку?
      - Якою була б лавка без підлокітників?
      - Який зв'язок між проміжком і виключенням?
  - id: hi_ps_stranger_smile
    name: Посмішка незнайомця
    prompt: |
      Посмішка від незнайомця. Несподівана. Посмішка — це дар.
      Спостерігайте за реакцією. Що робить посмішка? Посмішка — це
      невелика пробоїна в договорі. Що вона створює?
    follow_ups:
      - Як посмішка формує простір?
      - Яким був би простір з більшою кількістю посмішок?
      - Який зв'язок між посмішкою та зв'язком?
  - id: hi_ps_object_touch
    name: Дотик до предмета
    prompt: |
      Рука на поручні. Нога на сходинці. Дотик з'єднує тіло і простір.
      Предмет є спільним. Спостерігайте за дотиком. Що робить дотик?
      Предмет — це точка контакту. Що він несе?
    follow_ups:
      - Як дотик формує простір?
      - Яким був би простір без дотику?
      - Який зв'язок між дотиком і присутністю?
  - id: hi_ps_pathway_choice
    name: Вибір стежки
    prompt: |
      Стежка роздвоюється. Вліво чи вправо? Вибір невеликий.
      Спостерігайте за рішенням. Що його визначає? Вибір стежки — це
      момент дії. Що він розкриває?
    follow_ups:
      - Як вибір формує ходу?
      - Якою була б стежка без розгалужень?
      - Який зв'язок між вибором і пунктом призначення?
  - id: hi_ps_bench_empty
    name: Порожня лавка
    prompt: |
