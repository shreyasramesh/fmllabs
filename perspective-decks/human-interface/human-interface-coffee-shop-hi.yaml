# द ह्यूमन इंटरफ़ेस — कॉफ़ी शॉप (Hindi)

id: human_interface_coffee_shop
name: द ह्यूमन इंटरफ़ेस — कॉफ़ी शॉप
description: 50 कार्ड जो आपको कॉफ़ी शॉप को देखने के तरीके को बदल देंगे—कतार नृत्य और लैपटॉप के क्षेत्रों से लेकर तीसरे स्थान, अदृश्य स्क्रिप्ट, और अनुष्ठान के रूप में कॉफ़ी तक।
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: कतार नृत्य
    prompt: |
      काउंटर पर लगी कतार को देखें। शरीर खुद को व्यवस्थित करते हैं—आगे की ओर झुकना,
      फ़ोन देखना, सूक्ष्म रूप से हिलना। कतार की एक लय है। जगह कौन संभालता है?
      कौन कहाँ खड़ा है, इसके लिए कौन से अलिखित नियम हैं?
    follow_ups:
      - कतार प्रत्याशा को कैसे आकार देती है?
      - अगर हर कोई क्रम को अनदेखा कर दे तो क्या होगा?
      - प्रतीक्षा और अपनेपन के बीच क्या संबंध है?
  - id: hi_cs_laptop_territory
    name: लैपटॉप क्षेत्र
    prompt: |
      टेबल पर खुला लैपटॉप जगह घेरता है। बगल में रखा कप, कुर्सी पर रखा बैग।
      सीमाओं का निरीक्षण करें। एक व्यक्ति कितनी जगह घेरता है? क्या "भरा हुआ" संकेत देता है?
    follow_ups:
      - लैपटॉप शरीर को कैसे बढ़ाता है?
      - उपकरणों के बिना जगह कैसी होगी?
      - क्षेत्र और अवधि के बीच क्या संबंध है?
  - id: hi_cs_third_place
    name: तीसरा स्थान
    prompt: |
      घर नहीं, काम नहीं—कॉफ़ी शॉप एक तीसरा स्थान है। लोग अकेले एक साथ रहने आते हैं।
      देखें कि कौन रुकता है। कौन जल्दी चला जाता है? यह जगह एक अलग सामाजिक अनुबंध रखती है।
    follow_ups:
      - तीसरे स्थान के बिना शहर कैसा होगा?
      - कॉफ़ी शॉप पुस्तकालय से कैसे भिन्न है?
      - स्थान और पहचान के बीच क्या संबंध है?
  - id: hi_cs_invisible_script
    name: अदृश्य स्क्रिप्ट
    prompt: |
      ऑर्डर करें, भुगतान करें, प्रतीक्षा करें, प्राप्त करें, बैठने की जगह ढूंढें। स्क्रिप्ट तब तक अदृश्य है जब तक कोई उसे तोड़ न दे।
      किसी नए व्यक्ति को देखें। उसे क्या नहीं पता? स्क्रिप्ट अपनेपन को एन्कोड करती है।
    follow_ups:
      - स्क्रिप्ट कैसे बहिष्कृत करती है?
      - अगर स्क्रिप्ट लिखी होती तो क्या होता?
      - स्क्रिप्ट और प्रवाह के बीच क्या संबंध है?
  - id: hi_cs_coffee_ritual
    name: अनुष्ठान के रूप में कॉफ़ी
    prompt: |
      पेय द्वितीयक है। अनुष्ठान प्राथमिक है—चलना, ऑर्डर करना, पहला घूंट।
      अपनी स्वयं की गतिविधियों पर ध्यान दें। अगर कॉफ़ी आपके दरवाजे पर पहुँच जाए तो आप क्या खो देंगे?
    follow_ups:
      - अनुष्ठान संक्रमण को कैसे चिह्नित करता है?
      - कॉफ़ी स्टॉप के बिना दिन कैसा होगा?
      - अनुष्ठान और तत्परता के बीच क्या संबंध है?
  - id: hi_cs_counter_handoff
    name: काउंटर पर सौंपना
    prompt: |
      बरिस्ता एक नाम पुकारता है। एक हाथ आगे बढ़ता है। सौंपना अजनबी और अजनबी के बीच संपर्क का एक क्षण है।
      विनिमय देखें। कप के अलावा और क्या गुजरता है?
    follow_ups:
      - सौंपना संबंध कैसे बनाता है?
      - रोबोट बरिस्ता के साथ क्या बदल जाएगा?
      - सौंपना और विश्वास के बीच क्या संबंध है?
  - id: hi_cs_power_outlet_hunt
    name: पावर आउटलेट की खोज
    prompt: |
      आँखें दीवारों, फर्श, मेजों के नीचे तलाशती हैं। आउटलेट की खोज क्षेत्रीय है।
      पहले कौन पहुँचा? आउटलेट तय करता है कि आप कहाँ बैठेंगे। भूगोल बिजली का अनुसरण करता है।
    follow_ups:
      - आउटलेट प्लेसमेंट कमरे को कैसे आकार देता है?
      - वायरलेस पावर के साथ जगह कैसी होगी?
      - प्लग और स्थायित्व के बीच क्या संबंध है?
  - id: hi_cs_solo_table
    name: अकेला टेबल
    prompt: |
      चार लोगों के टेबल पर एक व्यक्ति। खाली कुर्सियाँ एक बफर हैं। व्यवस्था का निरीक्षण करें।
      क्या यह बचाव है? पसंद? अकेला टेबल भीड़ के खिलाफ जगह रखता है।
    follow_ups:
      - अकेला टेबल इरादा कैसे दर्शाता है?
      - अगर कोई साझा करने के लिए पूछे तो क्या होगा?
      - एकांत और दृश्यता के बीच क्या संबंध है?
  - id: hi_cs_milk_pour
    name: दूध डालना
    prompt: |
      बरिस्ता एस्प्रेसो में दूध डालता है—लट्टे आर्ट हो या न हो। डालना एक शिल्प है।
      गति देखें। कप के अलावा ग्राहक को क्या मिलता है? डालना एक प्रदर्शन है।
    follow_ups:
      - डालना प्रत्याशा को कैसे आकार देता है?
      - शिल्प के बिना पेय कैसा होगा?
      - डालना और कीमत के बीच क्या संबंध है?
  - id: hi_cs_name_on_cup
    name: कप पर नाम
    prompt: |
      एक कप पर एक नाम—असली, नकली, गलत लिखा हुआ। यह लेन-देन को व्यक्तिगत बनाता है।
      नाम मुंह से हाथ और फिर काउंटर तक यात्रा करता है। नाम विनिमय के लिए क्या करता है?
    follow_ups:
      - नाम पहचान कैसे बनाता है?
      - नाम के बिना ऑर्डर कैसा होगा?
      - नाम और गुमनामी के बीच क्या संबंध है?
  - id: hi_cs_window_seat
    name: खिड़की वाली सीट
    prompt: |
      खिड़की वाली सीट प्रमुख है। आप सड़क की ओर मुँह करते हैं; आपकी पीठ सुरक्षित है।
      देखें कि कौन इसे चुनता है। खिड़की बाहर की दुनिया को फ्रेम करती है जबकि आप अंदर रहते हैं।
      दृश्य क्या प्रदान करता है?
    follow_ups:
      - खिड़की वाली सीट अनुभव को कैसे आकार देती है?
      - खिड़कियों के बिना जगह कैसी होगी?
      - अंदर और बाहर के बीच क्या संबंध है?
  - id: hi_cs_linger_versus_grab
    name: रुकना बनाम लेना
    prompt: |
      कुछ लोग अपना कप लेकर चले जाते हैं। दूसरे घंटों बैठते हैं। एक ही जगह दोनों को समायोजित करती है।
      विभाजन पर ध्यान दें। कौन तय करता है कि कौन रुकेगा? कॉफ़ी शॉप अलग-अलग गतियों को समायोजित करती है।
    follow_ups:
      - रुकने से व्यवसाय पर क्या असर पड़ता है?
      - अगर हर कोई जल्दी चला जाए तो जगह कैसी होगी?
      - गति और अपनेपन के बीच क्या संबंध है?
  - id: hi_cs_regular_recognition
    name: नियमित की पहचान
    prompt: |
      "हमेशा की तरह?" बरिस्ता जानता है। नियमित व्यक्ति जाना जाता है। विनिमय देखें।
      जब आप पहचाने जाते हैं तो क्या बदलता है? हमेशा की तरह एक शॉर्टकट है—और जगह का दावा।
    follow_ups:
      - पहचान वफादारी कैसे बनाती है?
      - नियमित व्यक्ति इसके बिना क्या खो देगा?
      - हमेशा की तरह और पहचान के बीच क्या संबंध है?
  - id: hi_cs_soundscape
    name: ध्वनि परिदृश्य
    prompt: |
      भाप, पीसना, बातचीत, संगीत। कॉफ़ी शॉप का एक ध्वनि परिदृश्य है। अपनी आँखें बंद करें।
      परतों का नक्शा बनाएं। क्या स्थिर है? लय क्या है? ध्वनि परिदृश्य मिजाज को आकार देता है।
    follow_ups:
      - ध्वनि परिदृश्य एकाग्रता को कैसे प्रभावित करता है?
      - खामोशी में जगह कैसी होगी?
      - ध्वनि और उत्पादकता के बीच क्या संबंध है?
  - id: hi_cs_shared_table
    name: साझा टेबल
    prompt: |
      अजनबी एक ही लंबी मेज पर बैठते हैं। कोई बात नहीं करता। साझा टेबल जुड़ाव के बिना निकटता है।
      सीमाओं का निरीक्षण करें। कितना करीब बहुत करीब है? टेबल एक नाजुक संतुलन रखती है।
    follow_ups:
      - साझा टेबल अकेले टेबल से कैसे भिन्न है?
      - अगर कोई बातचीत शुरू कर दे तो क्या होगा?
      - निकटता और गोपनीयता के बीच क्या संबंध है?
  - id: hi_cs_tip_jar
    name: टिप जार
    prompt: |
      सिक्के और बिल जमा होते हैं। टिप जार दिखाई दे रहा है, निष्क्रिय है। कौन टिप देता है?
      कौन नहीं? जार लेनदेन और उपहार की सीमा पर बैठता है। टिप का क्या मतलब है?
    follow_ups:
      - टिप जार विनिमय को कैसे आकार देता है?
      - इसके बिना काउंटर कैसा होगा?
      - टिप और कृतज्ञता के बीच क्या संबंध है?
  - id: hi_cs_cup_sleeve
    name: कप स्लीव
    prompt: |
      स्लीव हाथ को गर्मी से बचाती है। यह डिस्पोजेबल, ब्रांडेड है।
      ध्यान दें कि लोग इसे कप को कैसे पकड़ते हैं। स्लीव शरीर और पेय के बीच एक छोटा इंटरफ़ेस है।
    follow_ups:
      - स्लीव पकड़ को कैसे बदलती है?
      - इसके बिना अनुभव कैसा होगा?
      - स्लीव और ब्रांडिंग के बीच क्या संबंध है?
  - id: hi_cs_morning_rush
    name: सुबह की भीड़
    prompt: |
      काम से पहले, कतार लंबी हो जाती है। सुबह की भीड़ की अपनी गति होती है।
      गति देखें। हर कोई कहीं और जा रहा है। कॉफ़ी शॉप एक वे-स्टेशन है। भीड़ क्या निकालती है?
    follow_ups:
      - भीड़ कर्मचारियों को कैसे आकार देती है?
      - स्टॉप के बिना सुबह कैसी होगी?
      - भीड़ और अनुष्ठान के बीच क्या संबंध है?
  - id: hi_cs_afternoon_slow
    name: दोपहर की सुस्ती
    prompt: |
      दोपहर के मध्य में, भीड़ कम हो जाती है। जो लोग रुकते हैं वे अलग होते हैं—छात्र,
      फ्रीलांसर, बिना हड़बड़ी वाले। गति बदल जाती है। बदलाव पर ध्यान दें।
      दोपहर में एक अलग तरह का ग्राहक होता है।
    follow_ups:
      - दोपहर सुबह से कैसे भिन्न है?
      - सुस्ती की अवधि के बिना जगह कैसी होगी?
      - समय और अधिभोग के बीच क्या संबंध है?
  - id: hi_cs_wifi_password
    name: वाईफाई पासवर्ड
    prompt: |
      पासवर्ड दीवार पर, रसीद पर, चॉकबोर्ड पर है। आपको पूछना या देखना होगा।
      वाईफाई कुछ लोगों के लिए प्रवेश शुल्क है। देखें कि कौन कनेक्ट होता है। किसे कनेक्ट करने की आवश्यकता नहीं है?
    follow_ups:
      - वाईफाई कौन रुकता है इसे कैसे आकार देता है?
      - इसके बिना जगह कैसी होगी?
      - कनेक्शन और खपत के बीच क्या संबंध है?
  - id: hi_cs_crossword_solver
    name: क्रॉसवर्ड सॉल्वर
    prompt: |
      कोई व्यक्ति क्रॉसवर्ड, अखबार या फोन पर काम करता है। गतिविधि अकेले की है लेकिन दिखाई देती है।
      क्रॉसवर्ड समय को चिह्नित करता है। यह कहता है "मैं रुक रहा हूँ।" गतिविधि दूसरों को क्या संकेत देती है?
    follow_ups:
      - क्रॉसवर्ड एक बुलबुला कैसे बनाता है?
      - इसके बिना सॉल्वर क्या करेगा?
      - गतिविधि और अधिभोग के बीच क्या संबंध है?
  - id: hi_cs_meeting_here
    name: यहाँ मिलना
    prompt: |
      दो लोग मिलते हैं—साक्षात्कार, मिलना, पहली मुलाकात। कॉफ़ी शॉप तटस्थ मैदान है।
      व्यवस्था का निरीक्षण करें। जगह किसने चुनी? टेबल मुठभेड़ के लिए एक मंच बन जाती है।
    follow_ups:
      - कॉफ़ी शॉप मीटिंग को कैसे सक्षम करती है?
      - ऑफिस में मीटिंग कैसी होगी?
      - स्थान और मुठभेड़ के बीच क्या संबंध है?
  - id: hi_cs_bathroom_key
    name: बाथरूम की चाबी
    prompt: |
      बाथरूम की चाबी एक ब्लॉक, एक पैडल, एक विशाल चम्मच से बंधी होती है। आपको पूछना पड़ता है।
      चाबी अपनेपन की एक छोटी सी परीक्षा है। बाथरूम का उपयोग करने का अधिकार किसके पास है?
    follow_ups:
      - चाबी पहुँच को कैसे नियंत्रित करती है?
      - खुले बाथरूम के साथ जगह कैसी होगी?
      - चाबी और विश्वास के बीच क्या संबंध है?
  - id: hi_cs_pastry_case
    name: पेस्ट्री केस
    prompt: |
