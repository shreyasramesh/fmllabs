# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# コーヒーショップという人間インターフェース (Japanese)

id: human_interface_coffee_shop
name: コーヒーショップという人間インターフェース
description: |
  コーヒーショップの見方を変える50枚のカード。列の振付、ノートPCのテリトリーから、サードプレイス、目に見えないスクリプト、儀式としてのコーヒーまで。
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: 列の振付
    prompt: |
      カウンターの列を見る。身体は自然と配置される――前かがみ、スマホチェック、さりげないそぶり。列にはリズムがある。誰が空間を支配しているのか？
      誰がどこに立つかを決める、暗黙のルールは何だろうか？
    follow_ups:
      - 列はどのように期待感を形作るか？
      - 全員が順番を無視したらどうなるか？
      - 待つことと帰属意識の関係は？
  - id: hi_cs_laptop_territory
    name: ノートPCのテリトリー
    prompt: |
      テーブルに置かれた開いたノートPCは、空間を主張する。その横のカップ、椅子の上のバッグ。境界線を観察する。一人当たりの占有面積はどれくらいか？
      「使用中」の合図は何だろうか？
    follow_ups:
      - ノートPCはどのように身体を拡張するか？
      - デバイスがなければ、その空間はどうなるか？
      - テリトリーと滞在時間の関係は？
  - id: hi_cs_third_place
    name: サードプレイス
    prompt: |
      家でもなく、職場でもない――コーヒーショップはサードプレイスである。人々は一人でいるために集まる。誰が長く滞在し、誰がすぐに去るかに注意する。
      その空間は、異なる社会契約を保持している。
    follow_ups:
      - サードプレイスがなければ、都市はどうなるか？
      - コーヒーショップは図書館とどう違うか？
      - 場所とアイデンティティの関係は？
  - id: hi_cs_invisible_script
    name: 目に見えないスクリプト
    prompt: |
      注文、支払い、待つ、受け取る、席を見つける。スクリプトは、誰かが破るまで目に見えない。初めて来た人を見る。彼らは何を知らないのだろうか？
      スクリプトは帰属意識をエンコードする。
    follow_ups:
      - スクリプトはどのように排除するか？
      - スクリプトが書き出されたらどうなるか？
      - スクリプトと流暢さの関係は？
  - id: hi_cs_coffee_ritual
    name: コーヒーという儀式
    prompt: |
      飲み物は二の次。儀式が第一――歩くこと、注文すること、最初の一口。自分自身の動きに注意する。コーヒーがドアまで運ばれてきたら、何を失うだろうか？
    follow_ups:
      - 儀式はどのように移行をマークするか？
      - コーヒータイムがなければ、一日どうなるか？
      - 儀式と準備完了の関係は？
  - id: hi_cs_counter_handoff
    name: カウンターでの手渡し
    prompt: |
      バリスタが名前を呼ぶ。手が伸びる。手渡しは、見知らぬ人同士の接触の瞬間である。やり取りを観察する。カップ以外に何が渡されるのか？
    follow_ups:
      - 手渡しはどのように繋がりを生み出すか？
      - ロボットバリスタなら何が変わるか？
      - 手渡しと信頼の関係は？
  - id: hi_cs_power_outlet_hunt
    name: 電源コンセント探し
    prompt: |
      目は壁、床、テーブルの下をスキャンする。コンセント探しはテリトリー争いだ。誰が先に手に入れたのか？コンセントが座る場所を決める。
      電力によって地理が決まる。
    follow_ups:
      - コンセントの配置はどのように部屋を形作るか？
      - ワイヤレス電源があれば、その空間はどうなるか？
      - プラグと永続性の関係は？
  - id: hi_cs_solo_table
    name: 一人用テーブル
    prompt: |
      4人用テーブルに一人の人間。空席は緩衝材だ。配置を観察する。それは防御か？好みか？一人用テーブルは、群衆に対して空間を保持する。
    follow_ups:
      - 一人用テーブルはどのように意図を示すか？
      - 誰かが席を共有したいと頼んだらどうなるか？
      - 一人と可視性の関係は？
  - id: hi_cs_milk_pour
    name: ミルクの注ぎ方
    prompt: |
      バリスタがエスプレッソにミルクを注ぐ――ラテアートがあってもなくても。注ぎ方は技術だ。動きを観察する。顧客は飲み物以外に何を受け取るのか？
      注ぎ方はパフォーマンスだ。
    follow_ups:
      - 注ぎ方はどのように期待を形作るか？
      - 技術がなければ、その飲み物はどうなるか？
      - 注ぎ方と価格の関係は？
  - id: hi_cs_name_on_cup
    name: カップの名前
    prompt: |
      カップに書かれた名前――本名、偽名、スペルミス。それは取引をパーソナルにする。名前は口から手、そしてカウンターへと移動する。
      名前は交換に何をもたらすのか？
    follow_ups:
      - 名前はどのように認識を生み出すか？
      - 名前がなければ、注文はどうなるか？
      - 名前と匿名性の関係は？
  - id: hi_cs_window_seat
    name: 窓際席
    prompt: |
      窓際席は特別だ。あなたは通りに面し、背中は守られている。誰がそれを選ぶか観察する。窓は外の世界を縁取るが、あなたは中にいる。
      眺めは何を提供するのか？
    follow_ups:
      - 窓際席はどのように体験を形作るか？
      - 窓がなければ、その空間はどうなるか？
      - 内と外の関係は？
  - id: hi_cs_linger_versus_grab
    name: 長居か持ち帰りか
    prompt: |
      カップを持って立ち去る人もいれば、何時間も座り込む人もいる。同じ空間が両方を収容する。この違いに気づく。何が誰が留まるかを決めるのか？
      コーヒーショップは異なるペースを受け入れる。
    follow_ups:
      - 長居はビジネスにどう影響するか？
      - 全員がすぐに立ち去ったら、その空間はどうなるか？
      - スピードと帰属意識の関係は？
  - id: hi_cs_regular_recognition
    name: 常連客の認識
    prompt: |
      「いつもの？」バリスタは知っている。常連客は知られている。やり取りを観察する。認識されると何が変わるのか？いつものは近道――そして場所の主張だ。
    follow_ups:
      - 認識はどのようにロイヤリティを生むか？
      - それがなければ、常連客は何を失うか？
      - 「いつもの」とアイデンティティの関係は？
  - id: hi_cs_soundscape
    name: サウンドスケープ
    prompt: |
      蒸気、グラインダー、話し声、音楽。コーヒーショップにはサウンドスケープがある。目を閉じる。レイヤーをマッピングする。何が一定か？リズムは？
      サウンドスケープはムードを形作る。
    follow_ups:
      - サウンドスケープはどのように集中力に影響するか？
      - 静寂の中では、その空間はどうなるか？
      - 音と生産性の関係は？
  - id: hi_cs_shared_table
    name: シェアテーブル
    prompt: |
      見知らぬ人たちが同じ長いテーブルに座る。誰も話さない。シェアテーブルは、繋がりなしの近さである。境界線を観察する。どれくらい近いと近すぎるのか？
      テーブルは繊細なバランスを保持する。
    follow_ups:
      - シェアテーブルは一人用テーブルとどう違うか？
      - 誰かが会話を始めたらどうなるか？
      - 近さとプライバシーの関係は？
  - id: hi_cs_tip_jar
    name: チップジャー
    prompt: |
      コインと紙幣が集まる。チップジャーは目に見える、受動的だ。誰がチップをし、誰がしないのか？ジャーは取引と贈与の境界に置かれる。
      チップは何を意味するのか？
    follow_ups:
      - チップジャーはどのように交換を形作るか？
      - それがなければ、カウンターはどうなるか？
      - チップと感謝の関係は？
  - id: hi_cs_cup_sleeve
    name: カップスリーブ
    prompt: |
      スリーブは手を熱から守る。使い捨てで、ブランドロゴ入りだ。
      人々がスリーブでカップをどのように持つかに注意する。スリーブは、体と飲み物の間の小さなインターフェースだ。
    follow_ups:
      - スリーブはどのようにグリップを変えるか？
      - それがなければ、体験はどうなるか？
      - スリーブとブランディングの関係は？
  - id: hi_cs_morning_rush
    name: 朝のラッシュ
    prompt: |
      仕事前、列は伸びる。朝のラッシュには独自のテンポがある。
      ペースを観察する。誰もがどこか別の場所へ向かっている。コーヒーショップは中継地点だ。ラッシュは何を奪うのか？
    follow_ups:
      - ラッシュはどのようにスタッフを形作るか？
      - コーヒータイムがなければ、朝はどうなるか？
      - ラッシュと儀式の関係は？
  - id: hi_cs_afternoon_slow
    name: 午後のスロータイム
    prompt: |
      午後に近づくと、混雑は薄れる。残っている人々は異なる――学生、フリーランサー、急がない人々。ペースが変わる。変化に気づく。
      午後は、異なる種類の顧客を抱える。
    follow_ups:
      - 午後はどのように午前と異なるか？
      - スロータイムがなければ、その空間はどうなるか？
      - 時間と占有率の関係は？
  - id: hi_cs_wifi_password
    name: WiFiパスワード
    prompt: |
      パスワードは壁、レシート、黒板にある。尋ねるか、見る必要がある。WiFiは一部の人々にとって入場料だ。誰が接続し、誰が接続する必要がないかに注意する。
    follow_ups:
      - WiFiはどのように滞在者を形作るか？
      - それがなければ、その空間はどうなるか？
      - 接続と消費の関係は？
  - id: hi_cs_crossword_solver
    name: クロスワードパズル解き
    prompt: |
      新聞かスマホでクロスワードパズルを解く人がいる。その活動は一人だが、見える。クロスワードは時間をマークする。「ここにいる」と告げる。
      その活動は他者に何を伝えるのか？
    follow_ups:
      - クロスワードはどのようにバブルを作るか？
      - それがなければ、解く人は何をするか？
      - 活動と占有率の関係は？
  - id: hi_cs_meeting_here
    name: ここで待ち合わせ
    prompt: |
      二人が会う――面接、近況報告、初デート。コーヒーショップは中立地帯だ。配置を観察する。誰が場所を選んだのか？テーブルは出会いのための舞台となる。
    follow_ups:
      - コーヒーショップはどのように出会いを可能にするか？
      - オフィスで会ったら、その出会いはどうなるか？
      - 場所と出会いの関係は？
  - id: hi_cs_bathroom_key
    name: トイレの鍵
    prompt: |
      トイレの鍵は、ブロック、パドル、巨大なスプーンに繋がれている。尋ねる必要がある。鍵は帰属意識の小さなテストだ。誰がトイレを使う権利があるのか？
    follow_ups:
      - 鍵はどのようにアクセスを制御するか？
      - オープンなトイレがあれば、その空間はどうなるか？
      - 鍵と信頼の関係は？
  - id: hi_cs_pastry_case
    name: ペストリーケース
    prompt: |
      クロワッサン、マフィン、クッキーがガラス越しに並ぶ。ケースは誘惑であり、ディスプレイだ。何が売れ、何が長く残るかに注意する。
      ケースは欲望と遅延の交渉だ。
    follow_ups:
      - ケースはどのように注文を形作るか？
      - それがなければ、カウンターはどうなるか？
      - ディスプレイと欲望の関係は？
  - id: hi_cs_phone_glance
    name: スマホのちら見
    prompt: |
      誰もがスマホをちらっと見る。ちら見は休憩、チェック、逃避だ。リズムを観察する。どのくらいの頻度で？どのくらいの間？スマホは部屋から抜け出すポータルだ。
    follow_ups:
      - スマホはどのように存在感を形作るか？
      - スマホがなければ、その空間はどうなるか？
      - ちら見と注意の関係は？
  - id: hi_cs_steam_rise
    name: 湯気の上昇
    prompt: |
      湯気が新しいカップから立ち上る。熱は香りを運ぶ。湯気は儚く――数分で消える。それに気づく。最初の一口の前の瞬間に、湯気は何を加えるのか？
    follow_ups:
      - 湯気はどのように期待感を形作るか？
      - それがなければ、飲み物はどうなるか？
      - 蒸気と儀式の関係は？
  - id: hi_cs_bag_on_chair
    name: 椅子に置かれたバッグ
    prompt: |
      バッグが座っている人の隣の椅子を占めている。席を確保し、テリトリーを拡張する。バッグはプレースホルダーだ。「この空間は取られている」というメッセージだ。
      誰かが座りたいと頼んだらどうなるか？
    follow_ups:
      - バッグはどのように空間を主張するか？
      - バッグで席を確保することがなければ、部屋はどうなるか？
      - 物体とテリトリーの関係は？
  - id: hi_cs_espresso_shot
    name: エスプレッソショット
    prompt: |
      シングルショット――速く、濃厚。エスプレッソの飲み手はしばしば立つ。ショットは一日の句読点だ。儀式を観察する。入って、終わって、出る。
      ショットは何を達成するのか？
    follow_ups:
      - ショットはラテとどう違うか？
      - エスプレッソがなければ、コーヒーショップはどうなるか？
      - ショットとスピードの関係は？
  - id: hi_cs_cold_brew_tap
    name: コールドブリュータップ
    prompt: |
      タップから注がれるコールドブリュー――ビールのよう。注ぎ方が違う。蒸気も待つ時間もない。コールドブリューの顧客は何か別のものを求めている。選択に気づく。
      コールドブリューは何を示すのか？
    follow_ups:
      - コールドブリューはどのように体験を変えるか？
      - それがなければ、メニューはどうなるか？
      - 温度とアイデンティティの関係は？
  - id: hi_cs_chalkboard_menu
    name: 黒板メニュー
    prompt: |
      メニューは手書き――黒板にチョークで書かれている。それは変わる。手書きは個性だ。何がリストされ、何がリストされていないかに注意する。黒板は「ここで我々は決断を下す」と語る。
    follow_ups:
      - 黒板はどのようにブランドを形作るか？
      - 印刷されたメニューがあれば、壁はどうなるか？
      - 手と信憑性の関係は？
  - id: hi_cs_leaving_cup
    name: 置き去りにされたカップ
    prompt: |
      テーブルに置かれたカップ――空で、放棄されている。自分で片付ける人もいれば、そうでない人もいる。置き去りにされたカップは、配慮の小さなテストだ。誰が片付けるのか？誰が置いていくのか？
      カップは滞在の終わりをマークする。
    follow_ups:
      - 片付けはどのように空間を形作るか？
      - 全員がカップを置き去りにしたら、カフェはどうなるか？
      - 置き去りにすることと帰属意識の関係は？
  - id: hi_cs_headphones_bubble
    name: ヘッドフォンバブル
    prompt: |
      ヘッドフォンはバブルを作る。着用者はそこにいるが、利用可能ではない。バブルは「邪魔しないで」と告げる。境界線を観察する。
      バブルはどのようにソーシャルフィールドを形作るか？
    follow_ups:
      - ヘッドフォンはどのように集中を可能にするか？
      - それがなければ、その空間はどうなるか？
      - バブルと生産性の関係は？
  - id: hi_cs_corner_booth
    name: コーナーブース
    prompt: |
      コーナーブースは欲される――壁に背を向け、部屋を見渡せる。それは防御的だ。誰がそれを主張するか観察する。コーナーは中心部とは異なる心理を保持する。
    follow_ups:
      - コーナーはどのように体験を形作るか？
      - 角がなければ、部屋はどうなるか？
      - 位置と安全性の関係は？
  - id: hi_cs_sugar_station
    name: シュガーステーション
    prompt: |
      砂糖、ナプキン、蓋、ストロー――ステーションはセルフサービスだ。人々はここでカスタマイズする。ステーションはカウンターと席の間の小休止だ。選択肢を観察する。
      人々は何を加えるのか？
    follow_ups:
      - ステーションはどのように取引を拡張するか？
      - それがなければ、カウンターはどうなるか？
      - カスタマイズとコントロールの関係は？
  - id: hi_cs_barista_banter
    name: バリスタの世間話
    prompt: |
      バリスタは常連客と世間話をする。世間話はパフォーマンスと繋がりだ。他者は聞くか聞かないか。世間話は雰囲気を作り出す。
      それは部屋に何を加えるのか？
    follow_ups:
      - 世間話はどのように文化を形作るか？
      - それがなければ、カウンターはどうなるか？
      - 世間話と帰属意識の関係は？
  - id: hi_cs_takeaway_stack
    name: テイクアウトの山
    prompt: |
      カップがピックアップエリアに積まれる――名前が呼ばれ、カップが取られる。山は注文の一時的なアーカイブだ。流れを観察する。誰が待つのか？誰が掴んで去るのか？
      山は混沌から生まれる秩序だ。
    follow_ups:
      - 山はどのようにラッシュを管理するか？
      - それがなければ、カウンターはどうなるか？
      - 山と順序の関係は？
  - id: hi_cs_plant_by_window
    name: 窓際の植物
    prompt: |
      窓際に植物が置かれている――ポトス、多肉植物。それは装飾であり、生命だ。植物は誰のものでもない。それは空間を和らげる。
      植物は部屋に何を加えるのか？
    follow_ups:
      - 植物はどのように雰囲気を形作るか？
      - それがなければ、窓はどうなるか？
      - 植物とケアの関係は？
  - id: hi_cs_closing_time
    name: 閉店時間
    prompt: |
      「15分で閉店します」というアナウンスは部屋の雰囲気を変える。椅子が擦れ、ノートPCが閉じられる。コーヒーショップには境界がある。退去を観察する。
      閉店時間は何を取り出すのか？
    follow_ups:
      - 閉店はどのように滞在を形作るか？
      - 閉店がなければ、その空間はどうなるか？
      - 境界と帰属意識の関係は？
  - id: hi_cs_oat_milk_request
    name: オーツミルクの要望
    prompt: |
      「オーツミルクをお願いします」。その要望はアイデンティティと好みだ。代替ミルクはマーカーになった。誰が尋ねるかに注意する。その選択は、飲む人について何を意味するのか？
    follow_ups:
      - ミルクの選択はどのように注文を形作るか？
      - 代替品がなければ、メニューはどうなるか？
      - 選択とアイデンティティの関係は？
  - id: hi_cs_receipt_glance
    name: レシートのちら見
    prompt: |
      レシートが手渡される――たいてい頼んでいない。取る人もいれば、断る人もいる。レシートは証明であり、記録だ。交換を観察する。
      レシートは取引に何をもたらすのか？
    follow_ups:
      - レシートはどのように取引を拡張するか？
      - それがなければ、カウンターはどうなるか？
      - レシートと記憶の関係は？
  - id: hi_cs_door_hold
    name: ドアを開けて待つ
    prompt: |
      後ろの人にドアを開けて待つ人がいる。その待ちは小さな配慮だ。それは繋がりの瞬間を作り出す。いつ起こるかに注意する。
      待ちは何が必要なのか？
    follow_ups:
      - ドアを開けて待つことは、どのように入口を形作るか？
      - それがなければ、入口はどうなるか？
      - 待ちと礼儀の関係は？
  - id: hi_cs_study_group
    name: 学習グループ
    prompt: |
      学生たちがノート、ノートPC、本を広げる。テーブルはワークスペースになる。学習グループには独自のペースがある――議論、静寂、笑い。
      協力を観察する。コーヒーショップは何を提供するのか？
    follow_ups:
      - コーヒーショップはどのようにグループを可能にするか？
      - 図書館で勉強したら、その学習はどうなるか？
      - 場所と協力の関係は？
  - id: hi_cs_grind_sound
    name: グラインダーの音
    prompt: |
      グラインダーが叫ぶ。その音は工業的で、一時的だ。飲み物を作ることをマークする。音は会話を切り裂く。
      グラインドはサウンドスケープに何を加えるのか？
    follow_ups:
      - グラインドはどのように期待感を形作るか？
      - それがなければ、カフェはどうなるか？
      - 音と技術の関係は？
  - id: hi_cs_cup_stack_bus
    name: カップの山を片付ける
    prompt: |
      バスタブがカップ、蓋、ナプキンで満たされる。誰かがそれを片付けるだろう。山は多くの滞在の痕跡だ。蓄積を観察する。
      山は一日に何を示しているのか？
    follow_ups:
      - バス tub はどのように廃棄物を管理するか？
      - それがなければ、カウンターはどうなるか？
      - 山と労働の関係は？
  - id: hi_cs_first_sip
    name: 最初の一口
    prompt: |
      最初の一口――温度、風味、瞬間。誰かがそれを飲むのを観察する。顔が変わるかもしれない。最初の一口は待ったことへの報酬だ。
      それは何をもたらすのか？
    follow_ups:
      - 最初の一口はどのように残りを形作るか？
      - それがなければ、儀式はどうなるか？
      - 一口と満足の関係は？
  - id: hi_cs_neutral_ground
    name: 中立地帯
    prompt: |
      コーヒーショップは誰のテリトリーでもない。ここで見知らぬ人と会ったり、一人で仕事したり、関係を終わらせたりできる。中立性がポイントだ。
      中立地帯は何を可能にするのか？
    follow_ups:
      - 中立性はどのように出会いを形作るか？
      - 中立地帯がなければ、都市はどうなるか？
      - 中立性と安全性の関係は？
  - id: hi_cs_loyalty_card
    name: ロイヤルティカード
    prompt: |
      10個買えば1個無料。カードは訪問を追跡する。リターンを報いる。ロイヤルティカードは契約――暗黙のものだ。誰がそれを使うか観察する。
      カードは顧客と店の間で何を作るのか？
    follow_ups:
      - カードはどのように行動を形作るか？
      - それがなければ、取引はどうなるか？
      - パンチと帰属意識の関係は？
  - id: hi_cs_outlet_tethered
    name: コンセントに繋がれている
    prompt: |
      コンセントの場所で座る人がいる。コードは壁からノートPCまで走る。テザーは動きを制限する。コンセントが座席を決める。制約を観察する。
      テザーは何を要求するのか？
    follow_ups:
      - コンセントはどのように滞在を形作るか？
      - ワイヤレス充電があれば、その空間はどうなるか？
      - テザーと滞在時間の関係は？
  - id: hi_cs_eye_contact_avoid
    name: アイコンタクト回避
    prompt: |
      コーヒーショップの見知らぬ人たちはアイコンタクトを避ける。回避は丁寧だ。見ると、繋がりをリスクにさらすことになる。ダンスを観察する。誰がルールを破るのか？
      目が合ったとき、何が起こるのか？
    follow_ups:
      - 回避はどのようにソーシャルフィールドを形作るか？
      - もっと接触があれば、その空間はどうなるか？
      - 視線とプライバシーの関係は？
  - id: hi_cs_rainy_day_crowd
    name: 雨の日の群衆
    prompt: |
      雨が人々を屋内へ追い込む。コーヒーショップは満員になる。濡れたコート、傘がドアのそばに。雨は異なる群衆を作り出す。変化を観察する。
      天気は空間に何をするのか？
    follow_ups:
      - 雨はどのように占有率を形作るか？
      - 避難場所がなければ、その日はどうなるか？
      - 天気と避難の関係は？
  - id: hi_cs_saved_seat
    name: 確保された席
    prompt: |
      「誰かのために席を確保しています」。その主張は群衆に対して席を保持する。確保された席は約束だ。緊張を観察する。席はどれくらいの間確保しておけるのか？限界は？
    follow_ups:
      - 確保はどのように部屋を形作るか？
      - 誰もそれを尊重しなかったらどうなるか？
      - 主張と信頼の関係は？
  - id: hi_cs_quiet_conversation
    name: 静かな会話
    prompt: |
      二人が身を乗り出す。会話はプライベートだが、姿勢は見える。身を乗り出すことはバブルを作り出す。親密さを観察する。
      コーヒーショップは、他の場所にはない何を可能にするのか？
    follow_ups:
      - その空間はどのように会話を可能にするか？
      - レストランで話したら、その会話はどうなるか？
      - 場所と開示の関係は？
  - id: hi_cs_roaming_table
    name: 席を探して歩き回る
    prompt: |
      誰かが席を見つけられない。カップを持って歩き回る。その歩き回りは仮のものだ。最初の空きがあれば取るだろう。探すのを観察する。
      歩き回りは空間について何を示すのか？
    follow_ups:
      - 歩き回りはどのように体験を形作るか？
      - 席がもっとあれば、カフェはどうなるか？
      - 探し求めると帰属意識の関係は？
  - id: hi_cs_coffee_aroma
    name: コーヒーのアロマ
    prompt: |
      ドアで匂いがあなたを襲う。焙煎された、挽かれた、淹れられた。アロマは最初の接触だ。それは体験を準備する。
      注文する前に、匂いは何をするのか？
    follow_ups:
      - アロマはどのように欲求を形作るか？
      - それがなければ、入口はどうなるか？
      - 香りと記憶の関係は？
