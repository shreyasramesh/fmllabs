      - 部屋と所要時間の関係とは？
  - id: hi_th_stranger_proximity
    name: 見知らぬ人との近さ
    prompt: |
      見知らぬ人が近くに立っています—混雑時には必要です。その近さは個人的ではないが親密です。その許容度を観察してください。体は何を許容するか？その近さは契約です。
    follow_ups:
      - 近さはどのように乗車を形作るか？
      - もっとスペースがあれば、車両はどうなるか？
      - 近さと礼儀の関係とは？
