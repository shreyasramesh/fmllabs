# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# ヒューマンインターフェース —transit hub (Japanese)

id: human_interface_transit_hub
name: ヒューマンインターフェース —transit hub
description: 50枚のカードで、プラットフォームや待ち時間から、到着/出発の流れ、移動中の見知らぬ人々の振る舞いまで、transit hubの見方をシフトさせます。
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: プラットフォームの縁
    prompt: |
      プラットフォームの縁は敷居です。黄色い線、隙間、線路。人々はさまざまな距離で立っています。前かがみになる人もいれば、後ろに引く人もいます。その分布を観察してください。その縁は何を意味するのでしょうか？
    follow_ups:
      - その縁はどのように期待感を形作るか？
      - 線がなければ、プラットフォームはどうなるか？
      - 縁とリスクの関係とは？
  - id: hi_th_waiting_posture
    name: 待ちの姿勢
    prompt: |
      体は待ちながら配置されます—片足に体重をかけ、手に携帯電話を持ち、足の間にバッグを置きます。その姿勢は所要時間を符号化します。誰が忍耐強く見え、誰が落ち着きなく見えますか？待ち時間にはボディランゲージがあります。
    follow_ups:
      - 姿勢はどのように期待を明らかにするか？
      - 待ち時間がなければ、プラットフォームはどうなるか？
      - 姿勢と時間との関係とは？
  - id: hi_th_arrival_flow
    name: 到着の流れ
    prompt: |
      電車のドアが開きます。人々が溢れ出てきます—乗車する人々との逆流に。その流れには物理法則があります。衝突、回避、合流を観察してください。その交換を支配するルールは何ですか？
    follow_ups:
      - その流れはプラットフォームをどのように形作るか？
      - 全員が急いだらどうなるか？
      - 流れと効率の関係とは？
  - id: hi_th_strangers_transit
    name: 移動中の見知らぬ人々
    prompt: |
      二度と会うことのない人々と車両を共有します。つながりのない近さ。その緊密さを観察してください。見知らぬ人同士は何を負うべきか？ transit carは一時的な社会です。
    follow_ups:
      - transitはどのように一時的なコミュニティを創り出すか？
      - 会話があれば、車両はどうなるか？
      - 見知らぬ人と礼儀との関係とは？
  - id: hi_th_departure_board
    name: 出発案内板
    prompt: |
      時間、プラットフォーム、遅延—案内板は真実の源です。目はそこへ向けられます。案内板は移動を指示します。集合的な視線を観察してください。案内板は群衆に何をするのか？
    follow_ups:
      - 案内板はどのように行動を形作るか？
      - それがなければ、ハブはどうなるか？
      - 表示と信頼の関係とは？
  - id: hi_th_escalator_stand
    name: エスカレーターの立ち位置
    prompt: |
      右に立ち、左に歩く—またはその逆、都市によります。エスカレーターにはルールがあります。誰がそれに従うか観察してください。エスカレーターは動く列です。そのルールは何を可能にするのか？
    follow_ups:
      - エスカレーターのルールはどのように流れを形作るか？
      - 全員が立ったらどうなるか？
      - ルールと効率の関係とは？
  - id: hi_th_ticket_gate
    name: 改札口
    prompt: |
      ゲートはカードを読み取り、ピッと鳴り、開きます。ゲートはチェックポイントです。支払いを済ませた人とそうでない人を分けます。そのリズムを観察してください。誰が戸惑うか？誰がスムーズに通り抜けるか？ゲートはテストです。
    follow_ups:
      - ゲートはどのように旅を形作るか？
      - ゲートがなければ、ハブはどうなるか？
      - ゲートと所属意識の関係とは？
  - id: hi_th_luggage_drag
    name: 荷物の引きずり
    prompt: |
      タイル上の車輪。スーツケースが続きます。引きずる音は旅行者の道筋を刻みます。荷物は体を拡張します。その負担を観察してください。荷物は旅について何を語るか？
    follow_ups:
      - 荷物はどのように移動を形作るか？
      - バッグがなければ、ハブはどうなるか？
      - 負担と目的地との関係とは？
  - id: hi_th_bench_occupation
    name: ベンチの利用
    prompt: |
      プラットフォームにはベンチが並んでいます。座る人もいれば、横に立っている人もいます。ベンチは希少な資源です。誰がそれを占有するか観察してください。どれくらいの時間滞在しますか？ベンチは小さなテリトリーです。
    follow_ups:
      - ベンチはどのように待ち時間を形作るか？
      - ベンチがなければ、プラットフォームはどうなるか？
      - 座席と滞在時間との関係とは？
  - id: hi_th_announcement_voice
    name: アナウンスの声
    prompt: |
      「次の電車は…」声は自動か人間か。騒音を切り裂きます。アナウンスは共通の知識を創造します。誰が聞いているか観察してください。誰がもう携帯電話をチェックしたか？
    follow_ups:
      - アナウンスはどのように群衆を形作るか？
      - それがなければ、ハブはどうなるか？
      - 声と権威の関係とは？
  - id: hi_th_door_positioning
    name: ドアの位置決め
    prompt: |
      常連客はドアが開く場所を知っています。彼らは自分を配置します。新規参入者は推測します。その位置決めは戦略です。その集まりを観察してください。位置は何を決定するか？
    follow_ups:
      - 位置決めはどのように乗車を形作るか？
      - ドアがランダムだったら、プラットフォームはどうなるか？
      - 位置と優位性の関係とは？
  - id: hi_th_handrail_grip
    name: 手すりの握り
    prompt: |
      車両の中では、手は手すりを見つけます。その握りは安定です。誰が握り、誰が握る必要がないか観察してください。手すりは共有された物体です。その握りは何を明らかにしているか？
    follow_ups:
      - 手すりはどのように安定性を形作るか？
      - それがなければ、車両はどうなるか？
      - 握りと信頼の関係とは？
  - id: hi_th_window_reflection
    name: 窓の反射
    prompt: |
      窓はトンネル、プラットフォーム、そしてあなた自身の顔を映します。その反射は避けられません。人々は自分自身を見つめるか、それを避けます。反射と視線の関係を観察してください。
    follow_ups:
      - 反射はどのように自己認識を形作るか？
      - 窓がなければ、乗車はどうなるか？
      - 反射とプライバシーの関係とは？
  - id: hi_th_seat_offer
    name: 座席の譲り
    prompt: |
      誰かが高齢者や子供連れの親に座席を譲ります。その譲りは小さな道徳的な行為です。いつ起こるか観察してください。誰が譲るか？誰が受け入れるか？座席は贈り物です。
    follow_ups:
      - その譲りは車両をどのように形作るか？
      - そのような譲りがなければ、乗車はどうなるか？
      - 譲りと配慮の関係とは？
  - id: hi_th_delay_sigh
    name: 遅延のため息
    prompt: |
      「遅延。」集団のため息。その遅延は共有された運命です。見知らぬ人同士が視線を交わします。遅延は連帯の瞬間を創造します。その変化を観察してください。遅延は群衆に何をするのか？
    follow_ups:
      - 遅延はどのように待ち時間を形作るか？
      - 遅延がなければ、ハブはどうなるか？
      - 遅延と欲求不満との関係とは？
  - id: hi_th_backpack_turn
    name: バックパックを前にする
    prompt: |
      混雑した車両で、誰かがバックパックを前に向けます。その向きは配慮です。スペースを生み出します。誰がそれをするか観察してください。バックパックを前にすることは小さな社会契約です。
    follow_ups:
      - その向きは近さをどのように形作るか？
      - それがなければ、車両はどうなるか？
      - 向きと意識の関係とは？
  - id: hi_th_exit_anticipation
    name: 出口への期待
    prompt: |
      駅に近づくと、人々はドアの近くに集まります。その期待は目に見えます。体が動きます。ドアが開きます。その準備を観察してください。その期待は何を必要とするか？
    follow_ups:
      - 期待はどのように出口を形作るか？
      - 準備がなければ、駅はどうなるか？
      - 期待と流れの関係とは？
  - id: hi_th_transfer_corridor
    name: 乗り換え通路
    prompt: |
      通路は路線をつなぎます。人々は目的を持って歩きます。乗り換えは移行です—システム間、待ち時間間。そのペースを観察してください。通路には独自の ritmo があります。
    follow_ups:
      - 通路はどのように旅を形作るか？
      - 乗り換えがなければ、ハブはどうなるか？
      - 通路とつながりの関係とは？
  - id: hi_th_phone_glow
    name: 携帯電話の光
    prompt: |
      薄暗い車内で、携帯電話から顔が光ります。その光は個人的です。各人は自分自身の光を持っています。その分布を観察してください。携帯電話は公共の場にプライベートな空間を創造します。
    follow_ups:
      - 携帯電話はどのように乗車を形作るか？
      - それがなければ、車両はどうなるか？
      - 光と孤立の関係とは？
  - id: hi_th_stroller_navigation
    name: ベビーカーの操作
    prompt: |
      親がベビーカーを押して群衆の中を進みます。その操作は繊細です。人々は道を譲ります。ベビーカーは流れを変えます。その配慮を観察してください。ベビーカーは何を要求するか？
    follow_ups:
      - ベビーカーはどのように群衆を形作るか？
      - ベビーカーがなければ、ハブはどうなるか？
      - ベビーカーと配慮の関係とは？
  - id: hi_th_vendor_station
    name: 販売員ステーション
    prompt: |
      キオスクではコーヒー、軽食、新聞を販売しています。販売員は移動中の人々にサービスを提供します。取引は迅速です。その交換を観察してください。販売員は流れの中の島です。
    follow_ups:
      - 販売員はどのようにハブを形作るか？
      - 販売員がなければ、ハブはどうなるか？
      - 販売員と待ち時間の関係とは？
  - id: hi_th_track_gap
    name: 線路の隙間
    prompt: |
      隙間に注意。プラットフォームと車両の間の空間は危険です。人々はそれを乗り越えます。隙間は変動します。その注意を観察してください。隙間は体に何を要求するか？
    follow_ups:
      - 隙間はどのように乗車を形作るか？
      - 隙間がなければ、プラットフォームはどうなるか？
      - 隙間と注意の関係とは？
  - id: hi_th_schedule_check
    name: 予定表の確認
    prompt: |
      指が携帯電話をタップします。アプリが時間を示します。予定表の確認は絶え間ないです。不確実性を減らします。そのリズムを観察してください。人々はどれくらいの頻度で確認するか？
    follow_ups:
      - 予定表はどのように待ち時間を形作るか？
      - アプリがなければ、ハブはどうなるか？
      - 確認と制御の関係とは？
  - id: hi_th_crowd_density
    name: 群衆の密度
    prompt: |
      ラッシュアワーでプラットフォームが混雑します。体が圧縮されます。その密度には限界があります。その境界を観察してください。いつ耐え難くなるか？群衆には物理法則があります。
    follow_ups:
      - 密度はどのように体験を形作るか？
      - 低密度だったら、ハブはどうなるか？
      - 密度と許容度の関係とは？
  - id: hi_th_sleeping_commuter
    name: 眠る通勤者
    prompt: |
      誰かが眠っています—窓に頭を預け、見知らぬ人の肩にもたれかかっています。その眠りは信頼か疲労か。その脆弱性を観察してください。眠りは車両に何を要求するか？
    follow_ups:
      - 眠る人はどのように空間を形作るか？
      - 眠る人がいなければ、乗車はどうなるか？
      - 眠りと安全との関係とは？
  - id: hi_th_map_consultation
    name: 地図の閲覧
    prompt: |
      訪問者が壁の地図を見つめています。地図は命綱です。他の人々は通り過ぎていきます。その閲覧には時間がかかります。その一時停止を観察してください。地図は何を提供するのか？
    follow_ups:
      - 地図はどのように旅を形作るか？
      - 地図がなければ、ハブはどうなるか？
      - 地図と自信の関係とは？
  - id: hi_th_platform_change
    name: プラットフォームの変更
    prompt: |
      「プラットフォーム変更。」群衆が動きます。その変更は混乱です。人々は急ぎます。その殺到を観察してください。その変更は群衆から何を抽出するか？
    follow_ups:
      - その変更はどのように流れを形作るか？
      - 変更がなければ、ハブはどうなるか？
      - 変更とストレスの関係とは？
  - id: hi_th_briefcase_clutch
    name: ブリーフケースの保持
    prompt: |
      ブリーフケースは近くに持たれています—足の間、膝の上。中に貴重品が入っています。その保持は保護的です。その握りを観察してください。ブリーフケースはその所有者にとって何を意味するか？
    follow_ups:
      - ブリーフケースはどのように乗車を形作るか？
      - ブリーフケースがなければ、車両はどうなるか？
      - 保持とアイデンティティの関係とは？
  - id: hi_th_door_hold
    name: ドアを保持
    prompt: |
      誰かが後ろの人のためにドアを保持します。電車は出発しようとしています。その保持はリスクと礼儀です。その交換を観察してください。その保持はどれほどのコストがかかるか？
    follow_ups:
      - その保持はどのように乗車を形作るか？
      - それがなければ、プラットフォームはどうなるか？
      - 保持と礼儀の関係とは？
  - id: hi_th_standing_balance
    name: 立位のバランス
    prompt: |
      電車が動きます。立っている乗客は体重を移動させます。そのバランスは動的です。誰も手すりにつかまっていません。その微調整を観察してください。体はその動きを学習します。
    follow_ups:
      - バランスはどのように乗車を形作るか？
      - 座席がもっとあれば、車両はどうなるか？
      - バランスと習慣の関係とは？
  - id: hi_th_conversation_overhear
    name: 会話の盗み聞き
    prompt: |
      二人が話します。あなたは断片を聞きます。その会話はプライベートでありながらパブリックです。その境界を観察してください。移動中に見知らぬ人同士は何をお互いについて学びますか？
    follow_ups:
      - 盗み聞きはどのように乗車を形作るか？
      - 会話がなければ、車両はどうなるか？
      - 盗み聞きと親密さの関係とは？
  - id: hi_th_ticket_inspection
    name: 切符の検査
    prompt: |
      検査官が車両内を移動します。「切符を見せてください。」その検査はランダムか体系的か。その反応を観察してください。誰が準備ができているか？誰が戸惑うか？その検査は正当性のテストです。
    follow_ups:
      - その検査はどのように乗車を形作るか？
      - それがなければ、システムはどうなるか？
      - 検査と信頼の関係とは？
  - id: hi_th_station_name_glance
    name: 駅名のちら見
    prompt: |
      駅名が通り過ぎます—壁、看板の上。常連客は知っています。新規参入者は見ています。そのちら見は方向感覚を与えます。誰が見るか観察してください。駅名は一体何をするのか？
    follow_ups:
      - 駅名はどのように方向感覚を形作るか？
      - 看板がなければ、乗車はどうなるか？
      - 名前と場所の関係とは？
  - id: hi_th_benchmark_regular
    name: 定期利用者の基準
    prompt: |
      定期利用者はリズムを知っています。彼らはちょうど間に合って到着します。待ち時間なし。定期利用者はスケジュールを内面化しています。その自信を観察してください。定期利用者は何を知っているか？
    follow_ups:
      - 定期利用者はどのようにハブを形作るか？
      - 定期利用者がいなければ、ハブはどうなるか？
      - 定期利用者と流暢さの関係とは？
  - id: hi_th_lost_look
    name: 迷子の視線
    prompt: |
      誰かが迷っているように見えます—頭を巡らせ、ペースが不確か。その視線は目立ちます。ボディランゲージを観察してください。誰が助けるか？誰が無視するか？迷子の視線は合図です。それは何を招待するか？
    follow_ups:
      - 迷子の視線はどのようにハブを形作るか？
      - 迷子がいなければ、ハブはどうなるか？
      - 迷子と助けの関係とは？
  - id: hi_th_earbud_insert
    name: イヤホンの装着
    prompt: |
      イヤホンを装着します。世界は後退します。その装着は境界線です。装着者は存在しているが、不在です。その変化を観察してください。イヤホンは何を創造するか？
    follow_ups:
      - イヤホンはどのように乗車を形作るか？
      - それがなければ、車両はどうなるか？
      - イヤホンとプライバシーの関係とは？
  - id: hi_th_rush_hour_pack
    name: ラッシュアワーの混雑
    prompt: |
      車両はいっぱいです。体が触れ合います。その混雑は避けられません。その許容度を観察してください。人々はその近さをどのように管理するか？その混雑には独自の儀礼があります。
    follow_ups:
      - その混雑はどのように乗車を形作るか？
      - 混雑なしのラッシュアワーはどうなるか？
      - 混雑と忍耐の関係とは？
  - id: hi_th_destination_ask
    name: 目的地の質問
    prompt: |
      「X行きの電車ですか？」見知らぬ人が尋ねます。別の人（見知らぬ人）が答えます。その質問はつながりの瞬間を創造します。その交換を観察してください。その質問は何を必要とするか？
    follow_ups:
      - その質問は車両をどのように形作るか？
      - そのような質問がなければ、乗車はどうなるか？
      - 質問と信頼の関係とは？
  - id: hi_th_platform_choice
    name: プラットフォームの選択
    prompt: |
      二つのプラットフォーム、同じ目的地。一つは近い、一つは混雑していない。その選択は戦略です。誰がどこへ行くか観察してください。何がその選択を決定するか？
    follow_ups:
      - その選択はどのように群衆を形作るか？
      - プラットフォームが一つしかなかったら、ハブはどうなるか？
      - 選択と結果の関係とは？
  - id: hi_th_wipe_down_seat
    name: 座席を拭く
    prompt: |
      誰かが座る前に座席を拭きます。その拭き取りは予防措置です。そのジェスチャーを観察してください。その拭き取りはその空間について何を仮定するか？その拭き取りは境界の小さな行為です。
    follow_ups:
      - その拭き取りは座ることをどのように形作るか？
      - そのようなジェスチャーがなければ、車両はどうなるか？
      - 拭き取りと清潔さの関係とは？
  - id: hi_th_standing_offer
    name: 立ったままの申し出
    prompt: |
      「座りますか？」その申し出は見知らぬ人にされます。時には受け入れられ、時には断られます。その交換を観察してください。その申し出は何を意味するか？
    follow_ups:
      - その申し出は車両をどのように形作るか？
      - 申し出がなければ、乗車はどうなるか？
      - 申し出と配慮の関係とは？
  - id: hi_th_exit_block
    name: 出口の妨げ
    prompt: |
      誰かがドアの前に立っています。他の人々が通る必要があります。その妨げは無頓着か意図的か。その交渉を観察してください。人々はどうやって通り抜けるか？その妨げは小さな対立です。
    follow_ups:
      - その妨げはどのように出口を形作るか？
      - 妨げがなければ、車両はどうなるか？
      - 妨げと意識の関係とは？
  - id: hi_th_train_rumble
    name: 電車の振動
    prompt: |
      電車は振動します—線路、車輪、動き。その振動は一定です。それは背景になります。いつそれに気づくか観察してください。振動は体に何をするか？
    follow_ups:
      - 振動はどのように乗車を形作るか？
      - 沈黙があれば、車両はどうなるか？
      - 振動とリズムの関係とは？
  - id: hi_th_connection_run
    name: 乗り換えのための駆け足
    prompt: |
      誰かが走ります—乗り換えに遅れそうです。その走りは群衆を駆け抜けます。人々は散らばります。その混乱を観察してください。その走りは流れから何を抽出するか？
    follow_ups:
      - その走りはどのようにハブを形作るか？
      - ランナーがいなければ、ハブはどうなるか？
      - 走りと緊急性の関係とは？
  - id: hi_th_seat_saving
    name: 座席の確保
    prompt: |
      座席にバッグが置かれています。「誰か座る予定です。」その確保は不在の同伴者のために席を保持します。その主張を観察してください。どれくらいの時間座席を確保できますか？限界は何ですか？
    follow_ups:
      - その確保は車両をどのように形作るか？
      - 確保がなければ、乗車はどうなるか？
      - 確保と権利意識の関係とは？
  - id: hi_th_arrival_relief
    name: 到着の安堵
    prompt: |
      電車が終点に到着します。その安堵は目に見えます。肩が下がります。人々は自分の持ち物を集めます。旅は終わりました。その変化を観察してください。到着は何を提供するのか？
    follow_ups:
      - 到着はどのように出口を形作るか？
      - 到着がなければ、旅はどうなるか？
      - 安堵と完了の関係とは？
