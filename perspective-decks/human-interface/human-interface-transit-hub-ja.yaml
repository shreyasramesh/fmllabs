    name: 最終電車
    prompt: |
      最終電車。群衆は異なります—遅く、緩やかです。最終電車は独自のエネルギーを持っています。その変化を観察してください。「最後」は群衆に何をするのか？
    follow_ups:
      - 最終電車はどのようにハブを形作るか？
      - それがなければ、夜はどうなるか？
      - 最後と緊急性の関係とは？
