# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Людський інтерфейс — Робоче місце (Ukrainian)

id: human_interface_workplace
name: Людський інтерфейс — Робоче місце
description: 50 карток, щоб по-іншому поглянути на робоче місце — від територій робочих столів та переговорних кімнат до кулера з водою та видимих ​​чи невидимих ​​ієрархій.
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: Територія робочого столу
    prompt: |
      Робочий стіл зайнятий — фотографії, рослини, кружки. Територія виходить за межі
      поверхні. Спостерігайте за межами. Що позначає "моє"? Робочий стіл —
      це маленьке королівство. Як воно захищається?
    follow_ups:
      - Як робочий стіл формує ідентичність?
      - Яким було б робоче місце без персоналізації?
      - Який зв'язок між територією та приналежністю?
  - id: hi_wp_meeting_room
    name: Переговорна кімната
    prompt: |
      У кімнаті є стіл, стільці, екран. Двері зачиняються. Переговорна кімната —
      це сцена для виступу. Спостерігайте, хто говорить, хто мовчить.
      Кімната містить ієрархію. Що дозволяє простір?
    follow_ups:
      - Як кімната формує зустріч?
      - Яким було б робоче місце без переговорних кімнат?
      - Який зв'язок між кімнатою та владою?
  - id: hi_wp_water_cooler
    name: Кулер з водою
    prompt: |
      Кулер з водою — це перехрестя. Люди зустрічаються там випадково.
      Зустріч неформальна. Спостерігайте за розмовами. Що говорять біля
      кулера, чого б не сказали на зустрічі?
    follow_ups:
      - Як кулер формує культуру?
      - Яким було б робоче місце без нього?
      - Який зв'язок між кулером та спілкуванням?
  - id: hi_wp_visible_hierarchy
    name: Видима ієрархія
    prompt: |
      Кабінети на розі, крісла біля вікна, кубікли. Простір кодує ранг.
      Спостерігайте за розподілом. Хто що отримує? Ієрархія вбудована в
      архітектуру. Що вона комунікує?
    follow_ups:
      - Як ієрархія формує поведінку?
      - Яким було б робоче місце без неї?
      - Який зв'язок між простором і статусом?
  - id: hi_wp_invisible_hierarchy
    name: Невидима ієрархія
    prompt: |
      До деяких людей прислухаються; інших перебивають. Ієрархія
      не відображена в оргструктурі. Спостерігайте за зустрічами. Хто поступається?
      Хто домінує? Невидима ієрархія формує результати.
    follow_ups:
      - Як виникає невидима ієрархія?
      - Яким було б робоче місце, якби вона була видимою?
      - Який зв'язок між невидимим і владою?
  - id: hi_wp_cubicle_wall
    name: Стінка кубікла
    prompt: |
      Стінка низька — ви можете бачити крізь неї. Приватність часткова.
      Кубікл — це компроміс. Спостерігайте за лініями видимості. Що ви можете
      чути? Що ви можете бачити? Стінка створює ілюзію кордону.
    follow_ups:
      - Як кубікл формує зосередженість?
      - Яким було б робоче місце з повноцінними стінами?
      - Який зв'язок між стіною та приватністю?
  - id: hi_wp_corner_office
    name: Кутовий кабінет
    prompt: |
      Кутовий кабінет має два вікна. Це бажаний приз. Спостерігайте, хто його
      займає. Кутовий кабінет видно з поверху. Це символ. Що
      комунікує кутовий кабінет?
    follow_ups:
      - Як кутовий кабінет формує прагнення?
      - Яким був би поверх без нього?
      - Який зв'язок між кутом та авторитетом?
  - id: hi_wp_open_plan
    name: Відкритий план
    prompt: |
      Без стін. Робочі столи в рядах або групах. Відкритий план обіцяє співпрацю.
      Спостерігайте за реальністю. Хто носить навушники? Відкритий план створює
      близькість. Чого це коштує?
    follow_ups:
      - Як відкритий план формує взаємодію?
      - Яким було б робоче місце зі стінами?
      - Який зв'язок між відкритістю та зосередженістю?
  - id: hi_wp_calendar_invite
    name: Запрошення в календарі
    prompt: |
      З'являється запрошення. Прийняти, відхилити, можливо. Календар структурує
      день. Спостерігайте за блоками. Хто контролює чий час? Календар —
      це карта влади.
    follow_ups:
      - Як календар формує день?
      - Яким було б робоче місце без нього?
      - Який зв'язок між запрошенням та зобов'язанням?
  - id: hi_wp_knock_before_enter
    name: Постукати перед входом
    prompt: |
      Деякі двері зачинені. Стук — це прохання. Спостерігайте, хто стукає,
      а хто заходить. Стук кодує повагу. Що захищають зачинені двері?
    follow_ups:
      - Як стук формує зустріч?
      - Яким було б робоче місце з відчиненими дверима?
      - Який зв'язок між стуком та кордоном?
  - id: hi_wp_headphones_signal
    name: Сигнал навушниками
    prompt: |
      Навушники ввімкнені означають "не турбувати". Сигнал універсальний.
      Спостерігайте, хто його поважає. Навушники створюють бульбашку. Що
      дозволяє бульбашка?
    follow_ups:
      - Як навушники формують поверх?
      - Яким було б робоче місце без них?
      - Який зв'язок між навушниками та зосередженістю?
  - id: hi_wp_lunch_room
    name: Їдальня
    prompt: |
      У їдальні є столи, мікрохвильова піч, холодильник. Люди їдять наодинці або
      разом. Спостерігайте за групами. Хто з ким сидить? Їдальня
      розкриває альянси. Що говорить розташування?
    follow_ups:
      - Як їдальня формує культуру?
      - Яким було б робоче місце без неї?
      - Який зв'язок між обідом та спілкуванням?
  - id: hi_wp_slack_ping
    name: Сповіщення в Slack
    prompt: |
      Приходить сповіщення. Миттєве, асинхронне. Сповіщення може перервати або
      почекати. Спостерігайте за нормами. Хто відповідає одразу? Сповіщення створює
      новий ритм спілкування. Що воно замінює?
    follow_ups:
      - Як сповіщення формує день?
      - Яким було б робоче місце без нього?
      - Який зв'язок між сповіщенням та терміновістю?
  - id: hi_wp_whiteboard_claim
    name: Використання дошки для записів
    prompt: |
      Дошка для записів містить ідеї — схеми, списки. Хтось їх написав.
      Дошка — це спільна поверхня. Спостерігайте, хто пише, хто стирає.
      Дошка — це територія. Що вона містить?
    follow_ups:
      - Як дошка для записів формує співпрацю?
      - Якою була б зустріч без неї?
      - Який зв'язок між дошкою та думкою?
  - id: hi_wp_elevator_encounter
    name: Зустріч в ліфті
    prompt: |
      Ви в ліфті з колегою. Тридцять секунд. Зустріч незручна або легка.
      Спостерігайте за світською розмовою. Що говорять? Ліфт стискає
      час. Що він вимагає?
    follow_ups:
      - Як ліфт формує зустріч?
      - Якою була б будівля без ліфтів?
      - Який зв'язок між ліфтом та ввічливістю?
  - id: hi_wp_cc_email
    name: Копія в електронному листі
    prompt: |
      Ви в копії. Ви не основний отримувач. Копія включає вас у контекст.
      Спостерігайте, кого включають у копію. Копія — це сигнал релевантності —
      або політики. Що робить копія?
    follow_ups:
      - Як копія формує комунікацію?
      - Яким було б робоче місце без копії?
      - Який зв'язок між копією та видимістю?
  - id: hi_wp_standing_desk
    name: Стоячий стіл
    prompt: |
      Стіл піднімається. Працівник стоїть. Стоячий стіл — це вибір — здоров'я,
      вподобання, продуктивність. Спостерігайте, хто його має. Що
      сигналізує стоячий стіл?
    follow_ups:
      - Як стоячий стіл формує тіло?
      - Яким було б робоче місце без нього?
      - Який зв'язок між стоянням та продуктивністю?
  - id: hi_wp_conference_call
    name: Конференц-дзвінок
    prompt: |
      Голоси звідкись здалеку. Дзвінок з'єднує розподілених людей.
      Спостерігайте, хто говорить, хто вимикає мікрофон. Дзвінок — це часткова присутність.
      Що дозволяє дзвінок — і що він втрачає?
    follow_ups:
      - Як дзвінок формує зустріч?
      - Яким було б робоче місце без нього?
      - Який зв'язок між дзвінком та присутністю?
  - id: hi_wp_office_plant
    name: Офісна рослина
    prompt: |
      Рослина на столі — сциндапсус, сукулент. Це прикраса та догляд.
      Рослина не належить компанії. Спостерігайте, хто її має. Що
      додає рослина до простору?
    follow_ups:
      - Як рослина формує робочий стіл?
      - Яким було б робоче місце без рослин?
      - Який зв'язок між рослиною та ідентичністю?
  - id: hi_wp_after_hours
    name: Після робочого часу
    prompt: |
      Офіс після того, як більшість пішла. Світло приглушене. Працівник
      після робочого часу видимий — відданий справі або в біді. Спостерігайте
      за сценою. Що дозволяє порожній офіс? Чого він коштує?
    follow_ups:
      - Як робота після робочого часу формує культуру?
      - Яким було б робоче місце без цього?
      - Який зв'язок між часом та очікуваннями?
  - id: hi_wp_nameplate
    name: Табличка з ім'ям
    prompt: |
      Ім'я на столі, на дверях. Табличка з ім'ям заявляє про простір.
      Спостерігайте, хто її має. Табличка з ім'ям — це ідентичність та територія.
      Що вона комунікує перехожим?
    follow_ups:
      - Як табличка з ім'ям формує простір?
      - Яким було б робоче місце без неї?
      - Який зв'язок між табличкою з ім'ям та присутністю?
  - id: hi_wp_meeting_overrun
    name: Перевищення часу зустрічі
    prompt: |
      Зустріч мала закінчитися. Вона не закінчується. Перевищення часу —
      це звичне явище. Спостерігайте за динамікою. У кого наступна зустріч?
      Хто може залишитися? Перевищення часу — це прояв влади. Що воно вимагає?
    follow_ups:
      - Як перевищення часу формує день?
      - Яким було б робоче місце з чіткими закінченнями?
      - Який зв'язок між перевищенням часу та повагою?
  - id: hi_wp_quick_question
    name: Швидке запитання
    prompt: |
      "Чи є швидке запитання?" Прохання перериває. "Швидке" — це обіцянка.
      Спостерігайте за обміном. Наскільки швидке? Швидке запитання — це
      переговори про час. Чого воно коштує?
    follow_ups:
      - Як швидке запитання формує потік?
      - Яким було б робоче місце без переривань?
      - Який зв'язок між швидкістю та повагою?
  - id: hi_wp_bathroom_encounter
    name: Зустріч у ванній кімнаті
    prompt: |
      Ви бачите колегу у ванній кімнаті. Зустріч неоднозначна. Контакт очима чи ні?
      Ванна кімната — це граничний простір. Спостерігайте за нормами.
      Що вимагає ця зустріч?
    follow_ups:
      - Як ванна кімната формує робоче місце?
      - Яким було б робоче місце без спільних ванних кімнат?
      - Який зв'язок між ванною кімнатою та приватністю?
  - id: hi_wp_commute_talk
    name: Розмова про дорогу на роботу
    prompt: |
      "Як пройшла дорога?" Запитання розпочинає світську розмову. Дорога —
      це спільний досвід. Спостерігайте за обміном. Що дає розмова про дорогу
      для стосунків?
    follow_ups:
      - Як розмова про дорогу формує день?
      - Яким було б робоче місце без неї?
      - Який зв'язок між дорогою та спілкуванням?
  - id: hi_wp_parking_spot
    name: Паркувальне місце
    prompt: |
      Зарезервовані місця, місця для перших, хто приїхав. Паркування кодує ієрархію.
      Спостерігайте, хто де паркується. Місце — це невелика привілея.
      Що воно комунікує?
    follow_ups:
      - Як паркування формує робоче місце?
      - Якою була б парковка без зарезервованих місць?
      - Який зв'язок між місцем та статусом?
  - id: hi_wp_birthday_cake
    name: Торт на день народження
    prompt: |
      З'являється торт. Це чийсь день народження. Збирається команда.
      Торт — це ритуал. Спостерігайте за зібранням. Що робить момент дня народження
      для групи?
    follow_ups:
      - Як день народження формує культуру?
      - Яким було б робоче місце без нього?
      - Який зв'язок між тортом та приналежністю?
  - id: hi_wp_forwarded_email
    name: Пересланий лист
    prompt: |
      Лист пересилається. "До уваги" або "Я подумав, вам варто це побачити".
      Пересилання розширює розмову. Спостерігайте, кому пересилають.
      Пересилання — це сигнал. Що він означає?
    follow_ups:
      - Як пересилання формує комунікацію?
      - Яким було б робоче місце без нього?
      - Який зв'язок між пересиланням та довірою?
  - id: hi_wp_break_room
    name: Кімната для перерв
    prompt: |
      Кава, закуски, іноді диван. Кімната для перерв — це пауза. Люди
      йдуть туди, щоб відпочити. Спостерігайте, хто нею користується.
      Кімната для перерв — це притулок. Що вона надає?
    follow_ups:
      - Як кімната для перерв формує день?
      - Яким було б робоче місце без неї?
      - Який зв'язок між перервою та продуктивністю?
  - id: hi_wp_office_supply
    name: Канцелярське приладдя
    prompt: |
      Ручки, папір, степлери — у шафі з приладдям є інструменти. Хтось
      керує цим. Спостерігайте, хто що бере. Приладдя — це невелика спільна власність.
      Які правила?
    follow_ups:
      - Як приладдя формує робоче місце?
      - Яким було б робоче місце без нього?
      - Який зв'язок між приладдям та правом на нього?
  - id: hi_wp_remote_camera
    name: Віддалена камера
    prompt: |
      Камера увімкнена або вимкнена. Віддалений працівник обирає. Вибір
      видимий. Спостерігайте за нормами. Хто залишає її увімкненою? Камера — це вікно.
      Що вона викриває?
    follow_ups:
      - Як камера формує дзвінок?
      - Якою була б зустріч без неї?
      - Який зв'язок між камерою та присутністю?
  - id: hi_wp_side_conversation
    name: Побічна розмова
    prompt: |
      Двоє людей розмовляють, поки інші працюють. Побічна розмова приватна,
      але видима. Спостерігайте за динамікою. Чи вона заважає? Побічна
      розмова — це маленька революція. Що вона створює?
    follow_ups:
      - Як побічна розмова формує поверх?
      - Яким було б робоче місце без неї?
      - Який зв'язок між побічною розмовою та виключенням?
  - id: hi_wp_clean_desk
    name: Чистий робочий стіл
    prompt: |
      Деякі столи бездоганні — нічого особистого. Чистий стіл — це політика або
      вподобання. Спостерігайте за контрастом. Що комунікує чистий стіл?
      Стерильність? Дисципліну? Відстороненість?
    follow_ups:
      - Як чистий стіл формує працівника?
      - Яким було б робоче місце з брудними столами?
