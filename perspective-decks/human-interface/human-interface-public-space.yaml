# The Human Interface — Public Space

id: human_interface_public_space
name: The Human Interface — Public Space
description: 50 cards to shift how you see the public space—from benches and
  pathways to strangers' choreography and objects as talismans.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: Bench Occupation
    prompt: |
      A bench is claimed—by a body, a bag, a posture. The bench is a scarce
      resource. Observe who sits, who stands, who passes. The bench holds
      different meanings for different people. What does it provide?
    follow_ups:
      - How does the bench shape the space?
      - What would the park be without benches?
      - What's the relationship between bench and rest?
  - id: hi_ps_pathway_flow
    name: Pathway Flow
    prompt: |
      The path channels movement. People walk—alone, in pairs, in groups. The
      flow has direction. Observe the collision. Who yields? The pathway is
      a shared corridor. What rules govern it?
    follow_ups:
      - How does the pathway shape the walk?
      - What would the space be without paths?
      - What's the relationship between path and destination?
  - id: hi_ps_strangers_choreography
    name: Strangers' Choreography
    prompt: |
      Unrelated bodies move through shared space. The choreography is
      unspoken—sidestep, pause, merge. Observe the dance. No one speaks.
      The choreography is pure body. What does it require?
    follow_ups:
      - How does the choreography shape the space?
      - What would happen if everyone stopped?
      - What's the relationship between choreography and civility?
  - id: hi_ps_object_talisman
    name: Object as Talisman
    prompt: |
      A book on a bench. A bag on a chair. The object holds a place. It says
      "I'm here" or "I'll return." The object is a talisman. Observe the
      claim. What does it protect?
    follow_ups:
      - How does the talisman shape the space?
      - What would the space be without such claims?
      - What's the relationship between object and presence?
  - id: hi_ps_bench_armrest
    name: Bench Armrest
    prompt: |
      Some benches have armrests. They divide the seat. They prevent lying.
      The armrest is design with intent. Observe who uses it. What does the
      armrest exclude?
    follow_ups:
      - How does the armrest shape the bench?
      - What would the bench be without it?
      - What's the relationship between armrest and control?
  - id: hi_ps_pathway_intersection
    name: Pathway Intersection
    prompt: |
      Paths cross. Bodies converge. The intersection is a collision point.
      Observe the merge. What happens when flows meet? The intersection
      requires negotiation. What does it extract?
    follow_ups:
      - How does the intersection shape the flow?
      - What would the space be without intersections?
      - What's the relationship between intersection and attention?
  - id: hi_ps_eye_contact_avoid
    name: Eye Contact Avoid
    prompt: |
      Strangers avoid eye contact. The avoid is polite. To look is to risk
      connection. Observe the gaze. The avoid is a contract. What does it
      enable? What does it cost?
    follow_ups:
      - How does the avoid shape the space?
      - What would the space be with more contact?
      - What's the relationship between gaze and privacy?
  - id: hi_ps_bench_share
    name: Bench Share
    prompt: |
      Two strangers share a bench. Space between them. The share is
      proximity without connection. Observe the boundary. How close is
      too close? The share is a delicate balance.
    follow_ups:
      - How does the share shape the bench?
      - What would the bench be with one person?
      - What's the relationship between share and tolerance?
  - id: hi_ps_pathway_width
    name: Pathway Width
    prompt: |
      The path is wide or narrow. The width affects the flow. Two people
      can pass or not. Observe the width. What does it assume about the
      crowd? The width is design. What does it enable?
    follow_ups:
      - How does the width shape the walk?
      - What would the path be if wider?
      - What's the relationship between width and comfort?
  - id: hi_ps_bench_sun
    name: Bench in Sun
    prompt: |
      The bench faces the sun. Or the shade. The position matters. Observe
      who chooses which. The sun is a resource. What does it provide? The
      bench in sun is coveted.
    follow_ups:
      - How does the sun shape the bench?
      - What would the space be without sun?
      - What's the relationship between sun and rest?
  - id: hi_ps_stranger_proximity
    name: Stranger Proximity
    prompt: |
      A stranger stands close—in a queue, on a bus. The proximity is
      impersonal but intimate. Observe the tolerance. What does the body
      allow? The proximity is a contract. What are its terms?
    follow_ups:
      - How does proximity shape the space?
      - What would the space be with more room?
      - What's the relationship between proximity and civility?
  - id: hi_ps_object_left
    name: Object Left
    prompt: |
      A jacket on a bench. A bag under a tree. The object left marks
      territory. Observe the claim. How long can it hold? The object left
      is a test. What does it require of others?
    follow_ups:
      - How does the object shape the space?
      - What would the space be without such claims?
      - What's the relationship between object and trust?
  - id: hi_ps_pathway_obstacle
    name: Pathway Obstacle
    prompt: |
      Something blocks the path—construction, a crowd, a performer. The
      obstacle diverts the flow. Observe the detour. What does the obstacle
      require? The pathway is never pure. What interrupts it?
    follow_ups:
      - How does the obstacle shape the flow?
      - What would the path be without obstacles?
      - What's the relationship between obstacle and adaptation?
  - id: hi_ps_bench_alone
    name: Bench Alone
    prompt: |
      One person on a bench. The alone is visible. The bench holds
      solitude. Observe the posture. What does the alone bench provide?
      The bench alone is a choice. What does it enable?
    follow_ups:
      - How does the alone shape the bench?
      - What would the space be without benches?
      - What's the relationship between alone and rest?
  - id: hi_ps_nod_acknowledge
    name: Nod Acknowledge
    prompt: |
      A slight nod. A brief smile. The acknowledge is minimal. It says "I
      see you" without engagement. Observe when it happens. The nod is a
      small civility. What does it create?
    follow_ups:
      - How does the nod shape the space?
      - What would the space be without it?
      - What's the relationship between nod and safety?
  - id: hi_ps_pathway_edge
    name: Pathway Edge
    prompt: |
      The path has edges—grass, curb, barrier. The edge defines the path.
      Observe who stays on the path. Who crosses? The edge is a boundary.
      What does it contain?
    follow_ups:
      - How does the edge shape the walk?
      - What would the path be without edges?
      - What's the relationship between edge and freedom?
  - id: hi_ps_bench_claim
