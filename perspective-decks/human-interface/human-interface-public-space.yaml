    follow_ups:
      - How does the weather shape the bench?
      - What would the bench be with shelter?
      - What's the relationship between weather and use?
  - id: hi_ps_stranger_glance
    name: Stranger Glance
    prompt: |
      A brief look. The glance is assessment. Safe? Threat? The glance is
