# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Человеческий интерфейс — Транспортный узел (Russian)

id: human_interface_transit_hub
name: Человеческий интерфейс — Транспортный узел
description: 50 карточек, чтобы изменить ваш взгляд на транспортный узел — от платформ и ожидания до потока прибытия/отправления и хореографии незнакомцев в пути.
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: Край платформы
    prompt: |
      Край платформы — это порог. Желтая линия, зазор, рельсы. Люди стоят на разном расстоянии. Некоторые наклоняются вперед; другие отстают. Наблюдайте за распределением. Что означает край?
    follow_ups:
      - Как край формирует предвкушение?
      - Какой была бы платформа без линии?
      - Какова связь между краем и риском?
  - id: hi_th_waiting_posture
    name: Поза ожидания
    prompt: |
      Тела располагаются в ожидании — вес на одной ноге, телефон в руке, сумка между ног. Поза кодирует продолжительность. Кто выглядит терпеливым? Кто — беспокойным? Ожидание имеет язык тела.
    follow_ups:
      - Как поза раскрывает ожидание?
      - Что было бы на платформе без ожидания?
      - Какова связь между позой и временем?
  - id: hi_th_arrival_flow
    name: Поток прибытия
    prompt: |
      Двери поезда открываются. Люди выливаются — против потока тех, кто садится. У потока есть физика. Наблюдайте за столкновением, обходом, слиянием. Какие правила управляют этим обменом?
    follow_ups:
      - Как поток формирует платформу?
      - Что произошло бы, если бы все бросились?
      - Какова связь между потоком и эффективностью?
  - id: hi_th_strangers_transit
    name: Незнакомцы в пути
    prompt: |
      Вы делите вагон с людьми, которых никогда больше не увидите. Близость без связи. Наблюдайте за компактностью. Что незнакомцы должны друг другу? Вагон — временное общество.
    follow_ups:
      - Как транспорт создает временное сообщество?
      - Каким был бы вагон с разговорами?
      - Какова связь между незнакомцем и вежливостью?
  - id: hi_th_departure_board
    name: Табло отправления
    prompt: |
      Время, платформы, задержки — табло является источником правды. Глаза поднимаются к нему. Табло диктует движение. Наблюдайте за коллективным взглядом. Что табло делает с толпой?
    follow_ups:
      - Как табло формирует поведение?
      - Каким был бы узел без него?
      - Какова связь между дисплеем и доверием?
  - id: hi_th_escalator_stand
    name: Стоять на эскалаторе
    prompt: |
      Справа стоять, слева идти — или наоборот, в зависимости от города. У эскалатора есть правила. Наблюдайте, кто им следует. Эскалатор — это движущаяся очередь. Что позволяет правило?
    follow_ups:
      - Как правило эскалатора формирует поток?
      - Что произошло бы, если бы все стояли?
      - Какова связь между правилом и эффективностью?
  - id: hi_th_ticket_gate
    name: Турникет
    prompt: |
      Турникет считывает карту, издает звук, открывается. Турникет — это контрольно-пропускной пункт. Он отделяет оплативших от неоплативших. Наблюдайте за ритмом. Кто запинается? Кто проскальзывает? Турникет — это испытание.
    follow_ups:
      - Как турникет формирует путешествие?
      - Каким был бы узел без турникетов?
      - Какова связь между турникетом и принадлежностью?
  - id: hi_th_luggage_drag
    name: Перетаскивание багажа
    prompt: |
      Колеса по плитке. Чемодан следует. Перетаскивание отмечает путь путешественников. Багаж расширяет тело. Наблюдайте за ношей. Что багаж говорит о путешествии?
    follow_ups:
      - Как багаж формирует движение?
      - Каким был бы узел без сумок?
      - Какова связь между ношей и пунктом назначения?
  - id: hi_th_bench_occupation
    name: Занятие скамьи
    prompt: |
      Скамейки вдоль платформы. Некоторые сидят; некоторые стоят рядом. Скамья — дефицитный ресурс. Наблюдайте, кто ее занимает. Как долго они остаются? Скамья — небольшая территория.
    follow_ups:
      - Как скамья формирует ожидание?
      - Какой была бы платформа без скамеек?
      - Какова связь между сиденьем и продолжительностью?
  - id: hi_th_announcement_voice
    name: Голос объявления
    prompt: |
      «Следующий поезд...» Голос автоматический или человеческий. Он прорезает шум. Объявление создает общее знание. Наблюдайте, кто слушает. Кто уже проверил телефон?
    follow_ups:
      - Как объявление формирует толпу?
      - Каким был бы узел без него?
      - Какова связь между голосом и авторитетом?
  - id: hi_th_door_positioning
    name: Расположение дверей
    prompt: |
      Постоянные пассажиры знают, где откроются двери. Они занимают позицию. Новички угадывают. Позиционирование — это стратегия. Наблюдайте за скоплением. Что определяет позиция?
    follow_ups:
      - Как позиционирование формирует посадку?
      - Какой была бы платформа, если бы двери были случайными?
      - Какова связь между позицией и преимуществом?
  - id: hi_th_handrail_grip
    name: Хват поручня
    prompt: |
      Внутри вагона руки находят поручень. Хват — это безопасность. Наблюдайте, кто держится, кому не нужно. Поручень — общий объект. Что раскрывает хват?
    follow_ups:
      - Как поручень формирует устойчивость?
      - Каким был бы вагон без него?
      - Какова связь между хватом и доверием?
  - id: hi_th_window_reflection
    name: Отражение в окне
    prompt: |
      Окно показывает тоннель, платформу и ваше собственное лицо. Отражение неизбежно. Люди смотрят на себя или избегают этого. Наблюдайте за связью между отражением и взглядом.
    follow_ups:
      - Как отражение формирует самосознание?
      - Какой была бы поездка без окна?
      - Какова связь между отражением и приватностью?
  - id: hi_th_seat_offer
    name: Предложение места
    prompt: |
      Кто-то уступает место пожилому человеку, родителю с ребенком. Предложение — это небольшой моральный акт. Наблюдайте, когда это происходит. Кто предлагает? Кто принимает? Место — это подарок.
    follow_ups:
      - Как предложение формирует вагон?
      - Какой была бы поездка без таких предложений?
      - Какова связь между предложением и заботой?
  - id: hi_th_delay_sigh
    name: Вздох задержки
    prompt: |
      «Задержка». Коллективный вздох. Задержка — это общая судьба. Незнакомцы обмениваются взглядами. Задержка создает момент солидарности. Наблюдайте за изменением. Что задержка делает с толпой?
    follow_ups:
      - Как задержка формирует ожидание?
      - Каким был бы узел без задержек?
      - Какова связь между задержкой и разочарованием?
  - id: hi_th_backpack_turn
    name: Поворот рюкзака
    prompt: |
      В переполненном вагоне кто-то поворачивает рюкзак вперед. Поворот — это внимание. Он создает пространство. Наблюдайте, кто это делает. Поворот рюкзака — это небольшой общественный договор.
    follow_ups:
      - Как поворот формирует близость?
      - Каким был бы вагон без него?
      - Какова связь между поворотом и осознанностью?
  - id: hi_th_exit_anticipation
    name: Ожидание выхода
    prompt: |
      По мере приближения остановки люди собираются у двери. Ожидание заметно. Тела смещаются. Дверь откроется. Наблюдайте за подготовкой. Что требует ожидание?
    follow_ups:
      - Как ожидание формирует выход?
      - Какая была бы остановка без подготовки?
      - Какова связь между ожиданием и потоком?
  - id: hi_th_transfer_corridor
    name: Коридор пересадки
    prompt: |
      Коридор соединяет линии. Люди идут с целью. Пересадка — это переход между системами, между ожиданиями. Наблюдайте за темпом. У коридора свой ритм.
    follow_ups:
      - Как коридор формирует путешествие?
      - Каким был бы узел без пересадок?
      - Какова связь между коридором и соединением?
  - id: hi_th_phone_glow
    name: Свечение телефона
    prompt: |
      В тусклом вагоне лица светятся от телефонов. Свечение индивидуально. У каждого человека свой свет. Наблюдайте за распределением. Телефон создает личное пространство в общественном.
    follow_ups:
      - Как телефон формирует поездку?
      - Каким был бы вагон без телефонов?
      - Какова связь между свечением и изоляцией?
  - id: hi_th_stroller_navigation
    name: Навигация с коляской
    prompt: |
      Родитель ведет коляску сквозь толпу. Навигация деликатна. Люди уступают дорогу. Коляска меняет поток. Наблюдайте за приспособлением. Что требует коляска?
    follow_ups:
      - Как коляска формирует толпу?
      - Каким был бы узел без колясок?
      - Какова связь между коляской и заботой?
  - id: hi_th_vendor_station
    name: Точка продажи
    prompt: |
      Киоск продает кофе, закуски, газеты. Продавец обслуживает людей в движении. Сделка быстрая. Наблюдайте за обменом. Продавец — это остров в потоке.
    follow_ups:
      - Как продавец формирует узел?
      - Каким был бы узел без продавцов?
      - Какова связь между продавцом и ожиданием?
  - id: hi_th_track_gap
    name: Зазор между рельсами
    prompt: |
      Осторожно, зазор. Пространство между платформой и вагоном — это опасность. Люди перешагивают через него. Зазор варьируется. Наблюдайте за осторожностью. Что зазор требует от тела?
    follow_ups:
      - Как зазор формирует посадку?
      - Какой была бы платформа без него?
      - Какова связь между зазором и вниманием?
  - id: hi_th_schedule_check
    name: Проверка расписания
    prompt: |
      Пальцы стучат по телефону. Приложение показывает, когда. Проверка расписания постоянна. Она уменьшает неопределенность. Наблюдайте за ритмом. Как часто люди проверяют?
    follow_ups:
      - Как расписание формирует ожидание?
      - Каким был бы узел без приложений?
      - Какова связь между проверкой и контролем?
  - id: hi_th_crowd_density
    name: Плотность толпы
    prompt: |
      Час пик забивает платформу. Тела сжимаются. Плотность имеет пределы. Наблюдайте за границей. Когда она становится невыносимой? Толпа имеет свою физику.
    follow_ups:
      - Как плотность формирует опыт?
      - Каким был бы узел при низкой плотности?
      - Какова связь между плотностью и терпимостью?
  - id: hi_th_sleeping_commuter
    name: Спящий пассажир
    prompt: |
      Кто-то спит — голова прижата к окну, к плечу незнакомца. Сон — это доверие или усталость. Наблюдайте за уязвимостью. Что требует сон от вагона?
    follow_ups:
      - Как спящий формирует пространство?
      - Какой была бы поездка без спящих?
      - Какова связь между сном и безопасностью?
  - id: hi_th_map_consultation
    name: Консультация с картой
    prompt: |
      Посетитель смотрит на карту на стене. Карта — это спасательный круг. Другие проходят мимо. Консультация занимает время. Наблюдайте за паузой. Что предоставляет карта?
    follow_ups:
      - Как карта формирует путешествие?
      - Каким был бы узел без карт?
      - Какова связь между картой и уверенностью?
  - id: hi_th_platform_change
    name: Смена платформы
    prompt: |
      «Смена платформы». Толпа движется. Смена — это нарушение. Люди спешат. Наблюдайте за суетой. Что смена извлекает из толпы?
    follow_ups:
      - Как смена формирует поток?
      - Каким был бы узел без смен?
      - Какова связь между сменой и стрессом?
  - id: hi_th_briefcase_clutch
    name: Сжатие портфеля
    prompt: |
      Портфель держат близко — между ног, на коленях. Он содержит что-то ценное. Сжатие — это защита. Наблюдайте за хватом. Что означает портфель для держателя?
    follow_ups:
      - Как портфель формирует поездку?
      - Каким был бы вагон без портфелей?
      - Какова связь между сжатием и идентичностью?
  - id: hi_th_door_hold
    name: Удержание двери
    prompt: |
      Кто-то держит дверь для идущего за ним. Поезд вот-вот отправится. Удержание — это риск и вежливость. Наблюдайте за обменом. Чего стоит удержание?
    follow_ups:
      - Как удержание формирует посадку?
      - Какой была бы платформа без него?
      - Какова связь между удержанием и вежливостью?
  - id: hi_th_standing_balance
    name: Баланс стоя
    prompt: |
      Поезд движется. Стоящие пассажиры смещают вес. Баланс — динамичен. Никто не держится за поручень. Наблюдайте за микро-коррекциями. Тело изучает движение.
    follow_ups:
      - Как баланс формирует поездку?
      - Каким был бы вагон с большим количеством сидений?
      - Какова связь между балансом и привычкой?
  - id: hi_th_conversation_overhear
    name: Подслушанный разговор
    prompt: |
      Два человека разговаривают. Вы слышите обрывки. Разговор приватный, но публичный. Наблюдайте за границей. Что незнакомцы узнают друг о друге в пути?
    follow_ups:
      - Как подслушивание формирует поездку?
      - Каким был бы вагон без разговоров?
      - Какова связь между подслушиванием и интимностью?
  - id: hi_th_ticket_inspection
    name: Проверка билетов
    prompt: |
      Контролер проходит по вагону. «Билеты, пожалуйста». Проверка случайна или систематична. Наблюдайте за реакцией. Кто готов? Кто запинается? Проверка — это тест на легитимность.
    follow_ups:
      - Как проверка формирует поездку?
      - Какова была бы система без нее?
      - Какова связь между проверкой и доверием?
  - id: hi_th_station_name_glance
    name: Взгляд на название станции
    prompt: |
      Название мелькает — на стене, на указателе. Постоянные пассажиры знают. Новички смотрят. Взгляд ориентирует. Наблюдайте, кто смотрит. Что делает название?
    follow_ups:
      - Как название формирует ориентацию?
      - Какая была бы поездка без указателей?
      - Какова связь между названием и местом?
  - id: hi_th_benchmark_regular
    name: Обычный пассажир
    prompt: |
      Обычный пассажир знает ритм. Он приходит как раз вовремя. Без ожидания. Обычный пассажир усвоил расписание. Наблюдайте за уверенностью. Что знает обычный пассажир?
    follow_ups:
      - Как обычный пассажир формирует узел?
      - Каким был бы узел без обычных пассажиров?
      - Какова связь между обычным пассажиром и плавностью?
  - id: hi_th_lost_look
    name: Потерянный взгляд
    prompt: |
      Кто-то выглядит потерянным — голова поворачивается, шаг неуверенный. Взгляд заметен. Наблюдайте за языком тела. Кто помогает? Кто игнорирует? Потерянный взгляд — это сигнал. Что он приглашает?
    follow_ups:
      - Как потерянный взгляд формирует узел?
      - Каким был бы узел без потерянных?
      - Какова связь между потерянностью и помощью?
  - id: hi_th_earbud_insert
    name: Вставка наушников
    prompt: |
      Вставляются наушники. Мир отступает. Вставка — это граница. Носящий присутствует, но отсутствует. Наблюдайте за изменением. Что создает наушник?
    follow_ups:
      - Как наушники формируют поездку?
      - Каким был бы вагон без них?
      - Какова связь между наушником и приватностью?
  - id: hi_th_rush_hour_pack
    name: Толпа в час пик
    prompt: |
      Вагон полон. Тела соприкасаются. Толпа неизбежна. Наблюдайте за терпимостью. Как люди справляются с близостью? Толпа имеет свой этикет.
    follow_ups:
      - Как толпа формирует поездку?
      - Каким был бы час пик без толкотни?
      - Какова связь между толпой и выносливостью?
  - id: hi_th_destination_ask
    name: Вопрос о пункте назначения
    prompt: |
      «Это поезд до X?» Спрашивает незнакомец. Отвечает другой. Вопрос создает момент связи. Наблюдайте за обменом. Что требует вопрос?
    follow_ups:
      - Как вопрос формирует вагон?
      - Какая была бы поездка без таких вопросов?
      - Какова связь между вопросом и доверием?
  - id: hi_th_platform_choice
    name: Выбор платформы
    prompt: |
      Две платформы, один пункт назначения. Одна ближе; другая менее загружена. Выбор — это стратегия. Наблюдайте, кто куда идет. Что определяет выбор?
    follow_ups:
      - Как выбор формирует толпу?
      - Каким был бы узел с одной платформой?
      - Какова связь между выбором и результатом?
  - id: hi_th_wipe_down_seat
    name: Протереть сиденье
    prompt: |
      Кто-то протирает сиденье перед тем, как сесть. Протирание — это предосторожность. Наблюдайте за жестом. Что предполагает протирание о пространстве? Протирание — это небольшой акт установления границ.
    follow_ups:
      - Как протирание формирует сидение?
      - Каким был бы вагон без таких жестов?
      - Какова связь между протиранием и чистотой?
  - id: hi_th_standing_offer
    name: Предложение уступить место
    prompt: |
      «Хотите сесть?» Предложение делается незнакомцу. Иногда принимается, иногда отклоняется. Наблюдайте за обменом. Что означает предложение?
    follow_ups:
      - Как предложение формирует вагон?
      - Какая была бы поездка без предложений?
      - Какова связь между предложением и заботой?
  - id: hi_th_exit_block
    name: Блокировка выхода
    prompt: |
      Кто-то стоит в проходе. Другим нужно пройти. Блокировка — неосознанна или намеренна. Наблюдайте за переговорами. Как люди проходят? Блокировка — это небольшой конфликт.
    follow_ups:
      - Как блокировка формирует выход?
      - Каким был бы вагон без блокирующих?
      - Какова связь между блокировкой и осознанностью?
  - id: hi_th_train_rumble
    name: Гул поезда
    prompt: |
      Поезд гудит — рельсы, колеса, движение. Гул постоянный. Он становится фоном. Наблюдайте, когда вы его замечаете. Что гул делает с телом?
    follow_ups:
      - Как гул формирует поездку?
      - Каким был бы вагон в тишине?
      - Какова связь между гулом и ритмом?
  - id: hi_th_connection_run
    name: Бег к пересадке
    prompt: |
      Кто-то бежит — опаздывает на пересадку. Бег прорывается сквозь толпу. Люди разбегаются. Наблюдайте за нарушением. Что бег извлекает из потока?
    follow_ups:
      - Как бег формирует узел?
      - Каким был бы узел без бегущих?
      - Какова связь между бегом и срочностью?
  - id: hi_th_seat_saving
    name: Бронирование места
    prompt: |
      Сумка на сиденье. «Здесь кто-то сидит». Бронирование удерживает место для отсутствующего компаньона. Наблюдайте за претензией. Как долго можно бронировать место? Каковы пределы?
    follow_ups:
      - Как бронирование формирует вагон?
      - Какая была бы поездка без бронирования?
      - Какова связь между бронированием и правом?
  - id: hi_th_arrival_relief
    name: Облегчение прибытия
    prompt: |
      Поезд прибывает на конечную станцию. Облегчение заметно. Плечи опускаются. Люди собирают вещи. Путешествие окончено. Наблюдайте за изменением. Что дает прибытие?
    follow_ups:
      - Как прибытие формирует выход?
      - Каким было бы путешествие без прибытия?
      - Какова связь между облегчением и завершением?
  - id: hi_th_wayfinding_sign
    name: Указатель навигации
    prompt: |
      Стрелки указывают. «К поездам». «К выходам». Знаки направляют поток. Наблюдайте, кто им следует. Кто игнорирует? Знак — это предложение. Что он предполагает?
    follow_ups:
      - Как знаки формируют поток?
      - Каким был бы узел без них?
      - Какова связь между знаком и доверием?
  - id: hi_th_waiting_room
    name: Зал ожидания
    prompt: |
      Стулья расположены друг напротив друга или лицом к табло. Зал ожидания вмещает людей между путешествиями. Наблюдайте за расстановкой. Кто сидит? Кто ходит взад-вперед? Зал ожидания — это пауза.
    follow_ups:
      - Как зал ожидания формирует ожидание?
      - Каким был бы узел без него?
      - Какова связь между залом и продолжительностью?
  - id: hi_th_stranger_proximity
    name: Близость незнакомца
    prompt: |
      Незнакомец стоит близко — необходимо в толпе. Близость безлична, но интимна. Наблюдайте за терпимостью. Что позволяет тело? Близость — это договор.
    follow_ups:
      - Как близость формирует поездку?
      - Каким был бы вагон с большим пространством?
      - Какова связь между близостью и вежливостью?
  - id: hi_th_last_train
    name: Последний поезд
    prompt: |
      Последний поезд. Толпа другая — поздняя, более свободная. Последний поезд имеет свою энергию. Наблюдайте за изменением. Что делает «последний» с толпой?
    follow_ups:
      - Как последний поезд формирует узел?
      - Какой была бы ночь без него?
      - Какова связь между последним и срочностью?
  - id: hi_th_transit_tribe
    name: Транзитное племя
    prompt: |
      Те же люди, та же линия, то же время. Вы узнаете лица. Вы никогда не говорите. Транзитное племя — это молчаливое сообщество. Наблюдайте за узнаванием. Что дает племя?
    follow_ups:
      - Как племя формирует поездку?
      - Какая была бы поездка без знакомых лиц?
      - Какова связь между племенем и принадлежностью?
