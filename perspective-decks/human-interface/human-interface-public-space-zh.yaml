# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人类界面 — 公共空间 (Mandarin Chinese)

id: human_interface_public_space
name: 人类界面 — 公共空间
description: 50 张卡牌，助你重新审视公共空间——从长椅、小径到陌生人的即兴舞步和被视为护身符的物品。
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: 长椅占用
    prompt: |
      一把长椅被占据——被身体、背包或姿态。长椅是一种稀缺资源。观察谁坐，谁站，谁走过。长椅对不同的人有不同的含义。它提供了什么？
    follow_ups:
      - 长椅如何塑造空间？
      - 没有长椅的公园会怎样？
      - 长椅与休息的关系是什么？
  - id: hi_ps_pathway_flow
    name: 小径流向
    prompt: |
      小径引导着移动。人们行走——独自一人，成双成对，或成群结队。流向有方向。观察碰撞。谁让路？小径是一条共享的通道。它遵循什么规则？
    follow_ups:
      - 小径如何塑造行走？
      - 没有小径的空间会怎样？
      - 小径与目的地的关系是什么？
  - id: hi_ps_strangers_choreography
    name: 陌生人舞步
    prompt: |
      不相关的身体在共享空间中移动。这种舞步是无声的——侧身，停顿，融合。观察这场舞蹈。没有人说话。这种舞步纯粹是身体的。它需要什么？
    follow_ups:
      - 舞步如何塑造空间？
      - 如果每个人都停下来会怎样？
      - 舞步与礼仪的关系是什么？
  - id: hi_ps_object_talisman
    name: 物品作为护身符
    prompt: |
      长椅上的一本书。椅子上的包。物品占据了一个位置。它说“我在这里”或“我会回来”。物品是一个护身符。观察这种宣告。它保护什么？
    follow_ups:
      - 护身符如何塑造空间？
      - 没有这种宣告的空间会怎样？
      - 物品与存在的关系是什么？
  - id: hi_ps_bench_armrest
    name: 长椅扶手
    prompt: |
      有些长椅有扶手。它们分隔座位。它们阻止躺下。扶手是带有意图的设计。观察谁在使用它。扶手排斥了什么？
    follow_ups:
      - 扶手如何塑造长椅？
      - 没有扶手的长椅会怎样？
      - 扶手与控制的关系是什么？
  - id: hi_ps_pathway_intersection
    name: 小径交叉口
    prompt: |
      小径交叉。身体汇聚。交叉口是碰撞点。观察融合。当流向相遇时会发生什么？交叉口需要协商。它会带来什么？
    follow_ups:
      - 交叉口如何塑造流向？
      - 没有交叉口的空间会怎样？
      - 交叉口与注意力的关系是什么？
  - id: hi_ps_eye_contact_avoid
    name: 眼神回避
    prompt: |
      陌生人回避眼神接触。回避是出于礼貌。对视会带来联系的风险。观察目光。回避是一种契约。它促成了什么？它的代价是什么？
    follow_ups:
      - 回避如何塑造空间？
      - 更多眼神接触的空间会怎样？
      - 目光与隐私的关系是什么？
  - id: hi_ps_bench_share
    name: 长椅共享
    prompt: |
      两位陌生人共享一张长椅。他们之间有空间。这种共享是近距离但无联系。观察界限。多近才算太近？这种共享是一种微妙的平衡。
    follow_ups:
      - 共享如何塑造长椅？
      - 只有一个人坐的长椅会怎样？
      - 共享与宽容的关系是什么？
  - id: hi_ps_pathway_width
    name: 小径宽度
    prompt: |
      小径宽或窄。宽度影响流向。两个人可以擦肩而过或不行。观察宽度。它对人群有何假设？宽度是设计。它带来了什么？
    follow_ups:
      - 宽度如何塑造行走？
      - 如果小径更宽会怎样？
      - 宽度与舒适度的关系是什么？
  - id: hi_ps_bench_sun
    name: 阳光下的长椅
    prompt: |
      长椅面向阳光。或阴凉。位置很重要。观察谁选择哪一边。阳光是一种资源。它提供了什么？阳光下的长椅是抢手的。
    follow_ups:
      - 阳光如何塑造长椅？
      - 没有阳光的空间会怎样？
      - 阳光与休息的关系是什么？
  - id: hi_ps_stranger_proximity
    name: 陌生人近距离
    prompt: |
      一个陌生人站得很近——在排队时，在公交车上。这种近距离是非个人的，但却是亲密的。观察容忍度。身体允许什么？这种近距离是一种契约。它的条款是什么？
    follow_ups:
      - 近距离如何塑造空间？
      - 如果有更多空间会怎样？
      - 近距离与礼仪的关系是什么？
  - id: hi_ps_object_left
    name: 遗留的物品
    prompt: |
      长椅上的外套。树下的包。遗留的物品标记了领地。观察这种宣告。它能维持多久？遗留的物品是一种考验。它要求他人做什么？
    follow_ups:
      - 物品如何塑造空间？
      - 没有这种宣告的空间会怎样？
      - 物品与信任的关系是什么？
  - id: hi_ps_pathway_obstacle
    name: 小径障碍
    prompt: |
      有什么东西挡住了小径——施工、人群、表演者。障碍物改变了流向。观察绕行。障碍物要求什么？小径从未纯粹。是什么打断了它？
    follow_ups:
      - 障碍物如何塑造流向？
      - 没有障碍物的小径会怎样？
      - 障碍物与适应性的关系是什么？
  - id: hi_ps_bench_alone
    name: 独自的长椅
    prompt: |
      一个人坐长椅。这种孤独是显而易见的。长椅承载着独处。观察姿势。独自的长椅提供了什么？独自的长椅是一种选择。它带来了什么？
    follow_ups:
      - 独自如何塑造长椅？
      - 没有长椅的空间会怎样？
      - 孤独与休息的关系是什么？
  - id: hi_ps_nod_acknowledge
    name: 点头示意
    prompt: |
      轻轻点一下头。一个短暂的微笑。这种示意是最小化的。它说“我看见你了”，但没有进一步的互动。观察何时发生。点头是一种小小的礼貌。它创造了什么？
    follow_ups:
      - 点头如何塑造空间？
      - 没有点头的空间会怎样？
      - 点头与安全的关系是什么？
  - id: hi_ps_pathway_edge
    name: 小径边缘
    prompt: |
      小径有边缘——草地、路缘、障碍物。边缘定义了小径。观察谁留在小径上。谁越界？边缘是一种界限。它容纳了什么？
    follow_ups:
      - 边缘如何塑造行走？
      - 没有边缘的小径会怎样？
      - 边缘与自由的关系是什么？
  - id: hi_ps_bench_claim
    name: 长椅占有
    prompt: |
      长椅被占据——通过伸展身体、姿势或一个包。这种占有宣告“这是我的”。观察这种占有。它是如何做到的？这种占有是领地。它保护什么？
    follow_ups:
      - 占有如何塑造长椅？
      - 没有这种占有的空间会怎样？
      - 占有与舒适度的关系是什么？
  - id: hi_ps_stranger_help
    name: 陌生人的帮助
    prompt: |
      “需要帮忙吗？”一个陌生人伸出援手。这种帮助是意想不到的。观察这次互动。接受还是拒绝？陌生人的帮助是一种馈赠。它要求什么？
    follow_ups:
      - 帮助如何塑造空间？
      - 没有这种主动帮助的空间会怎样？
      - 帮助与信任的关系是什么？
  - id: hi_ps_object_temporary
    name: 临时物品
    prompt: |
      一个杯子、一份报纸、一顶帽子。物品标记了一个地方。它是临时的。主人会回来。观察这种宣告。临时物品要求他人做什么？物品是一个占位符。
    follow_ups:
      - 临时物品如何塑造空间？
      - 没有这种物品的空间会怎样？
      - 临时与信任的关系是什么？
  - id: hi_ps_pathway_rhythm
    name: 小径节奏
    prompt: |
      脚步落在人行道上。节奏是个体的——快、慢、不规律。小径容纳了许多节奏。观察同步与冲突。节奏揭示了什么？
    follow_ups:
      - 节奏如何塑造行走？
      - 在寂静中行走的小径会怎样？
      - 节奏与目的地的关系是什么？
  - id: hi_ps_bench_face
    name: 长椅朝向
    prompt: |
      长椅面向一个方向——风景、阳光、人群。这种朝向塑造了体验。观察谁选择了哪张长椅。这种朝向是设计。它假定了什么？
    follow_ups:
      - 朝向如何塑造长椅？
      - 没有方向的长椅会怎样？
      - 朝向与风景的关系是什么？
  - id: hi_ps_sidewalk_dance
    name: 人行道之舞
    prompt: |
      两人迎面走来。这场舞蹈——谁让路？人行道之舞是普遍的。观察侧身。这场舞蹈是无声的。它需要什么？
    follow_ups:
      - 舞蹈如何塑造行走？
      - 没有这场舞蹈的人行道会怎样？
      - 舞蹈与礼仪的关系是什么？
  - id: hi_ps_object_abandoned
    name: 被遗弃的物品
    prompt: |
      地上的手套。长椅上的围巾。物品被遗弃了。观察它。谁留下的？谁会拿走？被遗弃的物品是一个小小的谜团。它揭示了什么？
    follow_ups:
      - 被遗弃的物品如何塑造空间？
      - 没有这些物品的空间会怎样？
      - 被遗弃与失落的关系是什么？
  - id: hi_ps_pathway_surface
    name: 小径表面
    prompt: |
      铺装、砾石、草地。表面影响行走。观察选择。表面要求身体付出什么？表面是设计。它带来了什么？
    follow_ups:
      - 表面如何塑造行走？
      - 如果是不同的表面，小径会怎样？
      - 表面与可达性的关系是什么？
  - id: hi_ps_bench_weather
    name: 长椅与天气
    prompt: |
      雨、阳光、风。天气塑造了长椅。谁在雨中坐？谁在阴凉处？长椅是暴露的。观察长椅与天气的关系。天气做了什么？
    follow_ups:
      - 天气如何塑造长椅？
      - 有遮蔽的长椅会怎样？
      - 天气与使用的关系是什么？
  - id: hi_ps_stranger_glance
    name: 陌生人的瞥视
    prompt: |
      短暂的一瞥。瞥视是一种评估。安全吗？有威胁吗？瞥视是自动的。观察你自己的瞥视。瞥视做了什么？瞥视是一种生存工具。它提取了什么？
    follow_ups:
      - 瞥视如何塑造空间？
      - 没有瞥视的空间会怎样？
      - 瞥视与安全的关系是什么？
  - id: hi_ps_pathway_crowd
    name: 小径人群
    prompt: |
      小径拥挤不堪。身体被压缩。人群有自己的流向。观察移动。人群是一个集体。它要求个体付出什么？
    follow_ups:
      - 人群如何塑造小径？
      - 空荡荡的小径会怎样？
      - 人群与流向的关系是什么？
  - id: hi_ps_bench_curve
    name: 长椅曲线
    prompt: |
      有些长椅是弯曲的。它们互相面对或面向中心。曲线塑造了社交。观察布局。曲线带来了什么？曲线是设计。它想要什么？
    follow_ups:
      - 曲线如何塑造长椅？
      - 如果长椅是直的会怎样？
      - 曲线与连接的关系是什么？
  - id: hi_ps_object_traded
    name: 物品交换
    prompt: |
      交接。购买。赠送。物品在陌生人之间传递。观察这次交换。除了物品，还有什么传递？这次交换是一个连接的时刻。它创造了什么？
    follow_ups:
      - 交换如何塑造空间？
      - 没有这种交换的空间会怎样？
      - 交换与信任的关系是什么？
  - id: hi_ps_pathway_light
    name: 小径光线
    prompt: |
      白天、夜晚、路灯。光线塑造了小径。观察区别。谁在夜间行走？光线既是安全也是氛围。它提供了什么？
    follow_ups:
      - 光线如何塑造小径？
      - 在黑暗中的小径会怎样？
      - 光线与安全的关系是什么？
  - id: hi_ps_bench_armrest_gap
    name: 长椅扶手间隙
    prompt: |
      扶手进行分隔。一个人占用一个区域。间隙阻止了共享。观察设计。间隙排斥了什么？扶手间隙是敌对式建筑。它假定了什么？
    follow_ups:
      - 间隙如何塑造长椅？
      - 没有扶手的长椅会怎样？
      - 间隙与排斥的关系是什么？
  - id: hi_ps_stranger_smile
    name: 陌生人的微笑
    prompt: |
      一个陌生人的微笑。出乎意料。微笑是一种馈赠。观察回应。微笑做了什么？微笑是契约的一个小小的打破。它创造了什么？
    follow_ups:
      - 微笑如何塑造空间？
      - 更多微笑的空间会怎样？
      - 微笑与连接的关系是什么？
  - id: hi_ps_object_touch
    name: 物品接触
    prompt: |
      手扶栏杆。脚踩台阶。接触连接了身体与空间。物品被共享。观察接触。接触做了什么？物品是一个接触点。它承载着什么？
    follow_ups:
      - 接触如何塑造空间？
      - 没有接触的空间会怎样？
      - 接触与存在的关系是什么？
  - id: hi_ps_pathway_choice
    name: 小径选择
    prompt: |
      小径分叉。左还是右？这个选择很小。观察决定。是什么决定了它？小径选择是一个自主的时刻。它揭示了什么？
    follow_ups:
      - 选择如何塑造行走？
      - 没有分叉的小径会怎样？
      - 选择与目的地的关系是什么？
  - id: hi_ps_bench_empty
    name: 空的长椅
    prompt: |
      长椅是空的。可用的。为什么？观察空的长椅。位置？时间？天气？空的长椅是一种邀请。它提供了什么？
    follow_ups:
      - 空的长椅如何塑造空间？
      - 没有空的长椅的空间会怎样？
      - 空闲与机会的关系是什么？
  - id: hi_ps_stranger_queue
    name: 陌生人排队
    prompt: |
      队伍形成。陌生人一起等待。排队是一种秩序。观察耐心。排队创造了临时的社区。排队要求什么？它提供了什么？
    follow_ups:
      - 排队如何塑造空间？
      - 没有队伍的空间会怎样？
      - 排队与公平的关系是什么？
  - id: hi_ps_object_talisman_trust
    name: 护身符信任
    prompt: |
      你放下你的包。你信任这个空间。这个护身符是一种考验。观察信任。它假定了什么？护身符信任是一种冒险。它带来了什么？
    follow_ups:
      - 信任如何塑造空间？
      - 没有这种信任的空间会怎样？
      - 信任与脆弱的关系是什么？
  - id: hi_ps_pathway_end
    name: 小径尽头
    prompt: |
      小径结束。一个目的地、一堵墙、一扇门。尽头是一个阈值。观察到达。尽头提供了什么？小径的尽头是终结。它意味着什么？
    follow_ups:
      - 尽头如何塑造行走？
      - 没有尽头的小径会怎样？
      - 尽头与完成的关系是什么？
  - id: hi_ps_bench_duo
    name: 长椅双人
    prompt: |
      两个人共享一张长椅。朋友、恋人、陌生人。这种两人组合有动态。观察距离。谈话或沉默。长椅上的两人是一种小型社交单元。它创造了什么？
    follow_ups:
      - 两人组合如何塑造长椅？
      - 只有一个人坐的长椅会怎样？
      - 两人组合与连接的关系是什么？
  - id: hi_ps_stranger_danger
    name: 陌生人危险
    prompt: |
      身体进行评估。安全吗？这种评估是自动的。观察信号。什么触发了警惕？陌生人危险是一种生存反射。它保护什么？它的代价是什么？
    follow_ups:
      - 评估如何塑造空间？
      - 没有评估的空间会怎样？
      - 危险与开放的关系是什么？
  - id: hi_ps_object_marker
    name: 物品作为标记
    prompt: |
      长椅上的石头。树上的丝带。物品标记了某物。记忆、宣告、仪式。观察标记。它意味着什么？标记是一种信息。它说了什么？
    follow_ups:
      - 标记如何塑造空间？
      - 没有标记的空间会怎样？
      - 标记与意义的关系是什么？
  - id: hi_ps_pathway_grade
    name: 小径坡度
    prompt: |
      小径有坡度。向上或向下。坡度影响身体。观察付出的努力。坡度是设计。它对步行者有何假设？坡度对某些人来说是一种障碍。
    follow_ups:
      - 坡度如何塑造行走？
      - 如果小径是平坦的会怎样？
      - 坡度与可达性的关系是什么？
  - id: hi_ps_bench_public
    name: 公共长椅
    prompt: |
      长椅是公共的。任何人都可以坐。公共性是重点。观察谁在使用它。公共长椅是一种公共资源。它要求什么？它提供了什么？
    follow_ups:
      - 公共性如何塑造长椅？
      - 没有公共长椅的空间会怎样？
      - 公共性与归属感的关系是什么？
  - id: hi_ps_stranger_parallel
    name: 陌生人平行
    prompt: |
      你与一个陌生人并肩行走。相同的方向，相同的步速。这种平行是偶然的。观察动态。你们同步吗？分开吗？这种平行是一种临时的陪伴。它创造了什么？
    follow_ups:
      - 平行如何塑造行走？
      - 没有这种平行的小径会怎样？
      - 平行与独处的关系是什么？
  - id: hi_ps_object_shared
    name: 共享物品
    prompt: |
