# الواجهة البشرية — مكان العمل (Arabic)

id: human_interface_workplace
name: الواجهة البشرية — مكان العمل
description: 50 بطاقة لتغيير نظرتك إلى مكان العمل — من مناطق المكاتب وغرف الاجتماعات إلى ثلاجة المياه والتسلسل الهرمي المرئي وغير المرئي.
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: منطقة المكتب
    prompt: |
      تم الاستيلاء على مكتب — صور، نباتات، أكواب. تمتد المنطقة إلى ما
      وراء السطح. راقب الحدود. ما الذي يميز "ملكي"؟ المكتب مملكة صغيرة.
      كيف يتم الدفاع عنها؟
    follow_ups:
      - كيف يشكل المكتب الهوية؟
      - ماذا سيكون مكان العمل بدون تخصيص؟
      - ما هي العلاقة بين الإقليم والانتماء؟
  - id: hi_wp_meeting_room
    name: غرفة الاجتماعات
    prompt: |
      تحتوي الغرفة على طاولة، كراسي، شاشة. الباب يغلق. غرفة الاجتماعات
      هي مسرح للأداء. راقب من يتحدث، ومن لا يتحدث. الغرفة تحمل التسلسل
      الهرمي. ماذا تتيح المساحة؟
    follow_ups:
      - كيف تشكل الغرفة الاجتماع؟
      - ماذا سيكون مكان العمل بدون غرف اجتماعات؟
      - ما هي العلاقة بين الغرفة والسلطة؟
  - id: hi_wp_water_cooler
    name: ثلاجة المياه
    prompt: |
      ثلاجة المياه هي مفترق طرق. يلتقي الناس هناك بالصدفة. اللقاء غير
      رسمي. راقب المحادثات. ما الذي يقال عند الثلاجة ولا يمكن قوله في
      اجتماع؟
    follow_ups:
      - كيف تشكل الثلاجة الثقافة؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين الثلاجة والاتصال؟
  - id: hi_wp_visible_hierarchy
    name: التسلسل الهرمي المرئي
    prompt: |
      مكاتب الزاوية، مقاعد النوافذ، المكاتب المغلقة. تشفر المساحة الرتبة.
      راقب التوزيع. من يحصل على ماذا؟ التسلسل الهرمي مدمج في الهيكلية.
      ماذا تتواصل؟
    follow_ups:
      - كيف يشكل التسلسل الهرمي السلوك؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين المساحة والمكانة؟
  - id: hi_wp_invisible_hierarchy
    name: التسلسل الهرمي غير المرئي
    prompt: |
      يتم الاستماع إلى بعض الأشخاص؛ والبعض الآخر يتم مقاطعته. التسلسل
      الهرمي ليس على مخطط المؤسسة. راقب الاجتماعات. من يخضع؟ من
      يهيمن؟ التسلسل الهرمي غير المرئي يشكل النتائج.
    follow_ups:
      - كيف ينشأ التسلسل الهرمي غير المرئي؟
      - ماذا سيكون مكان العمل لو كان مرئيًا؟
      - ما هي العلاقة بين غير المرئي والسلطة؟
  - id: hi_wp_cubicle_wall
    name: جدار المكتب المغلق
    prompt: |
      الجدار منخفض — يمكنك الرؤية من فوقه. الخصوصية جزئية. المكتب المغلق
      هو حل وسط. راقب خطوط الرؤية. ماذا يمكنك سماع؟ ماذا يمكنك رؤية؟
      الجدار يخلق وهمًا بالحدود.
    follow_ups:
      - كيف يشكل المكتب المغلق التركيز؟
      - ماذا سيكون مكان العمل بجدران كاملة؟
      - ما هي العلاقة بين الجدار والخصوصية؟
  - id: hi_wp_corner_office
    name: مكتب الزاوية
    prompt: |
      يحتوي مكتب الزاوية على نافذتين. إنها الجائزة. راقب من يشغله.
      مكتب الزاوية مرئي من الطابق. إنه رمز. ماذا يتواصل المكتب؟
    follow_ups:
      - كيف يشكل مكتب الزاوية الطموح؟
      - ماذا سيكون الطابق بدونه؟
      - ما هي العلاقة بين الزاوية والسلطة؟
  - id: hi_wp_open_plan
    name: التصميم المفتوح
    prompt: |
      لا جدران. مكاتب في صفوف أو مجموعات. التصميم المفتوح يعد بالتعاون.
      راقب الواقع. من يرتدي سماعات الرأس؟ يخلق التصميم المفتوح
      القرب. ماذا يكلف؟
    follow_ups:
      - كيف يشكل التصميم المفتوح التفاعل؟
      - ماذا سيكون مكان العمل بجدران؟
      - ما هي العلاقة بين المفتوح والتركيز؟
  - id: hi_wp_calendar_invite
    name: دعوة التقويم
    prompt: |
      تظهر الدعوة. قبول، رفض، مؤقت. يحدد التقويم اليوم. راقب الفترات.
      من يتحكم في وقت من؟ التقويم خريطة للسلطة.
    follow_ups:
      - كيف يشكل التقويم اليوم؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين الدعوة والالتزام؟
  - id: hi_wp_knock_before_enter
    name: طرق قبل الدخول
    prompt: |
      بعض الأبواب مغلقة. الطرق هو طلب. راقب من يطرق ومن يدخل. الطرق
      يشفر الاحترام. ماذا يحمي الباب المغلق؟
    follow_ups:
      - كيف تشكل الطرق اللقاء؟
      - ماذا سيكون مكان العمل بأبواب مفتوحة؟
      - ما هي العلاقة بين الطرق والحدود؟
  - id: hi_wp_headphones_signal
    name: إشارة سماعات الرأس
    prompt: |
      سماعات الرأس قيد التشغيل تعني "عدم الإزعاج". الإشارة عالمية. راقب
      من يحترمها. تخلق سماعات الرأس فقاعة. ماذا تتيح الفقاعة؟
    follow_ups:
      - كيف تشكل سماعات الرأس الطابق؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين سماعات الرأس والتركيز؟
  - id: hi_wp_lunch_room
    name: غرفة الغداء
    prompt: |
      الغرفة تحتوي على طاولات، ميكروويف، ثلاجة. يأكل الناس وحدهم أو
      معًا. راقب التجمعات. من يجلس مع من؟ تكشف غرفة الغداء عن
      التحالفات. ماذا يقول الترتيب؟
    follow_ups:
      - كيف تشكل غرفة الغداء الثقافة؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين الغداء والاتصال؟
  - id: hi_wp_slack_ping
    name: صوت Slack
    prompt: |
      يصل الصوت. فوري، غير متزامن. يمكن للصوت المقاطعة أو الانتظار.
      راقب الأعراف. من يستجيب فورًا؟ يخلق الصوت إيقاعًا جديدًا
      للتواصل. ماذا يستبدل؟
    follow_ups:
      - كيف يشكل الصوت اليوم؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين الصوت والإلحاح؟
  - id: hi_wp_whiteboard_claim
    name: لوحة بيضاء
    prompt: |
      تحتوي اللوحة البيضاء على أفكار — رسوم بيانية، قوائم. كتبها شخص ما.
      اللوحة سطح مشترك. راقب من يكتب، ومن يمسح. اللوحة هي
      إقليم. ماذا تحتفظ؟
    follow_ups:
      - كيف تشكل اللوحة البيضاء التعاون؟
      - ماذا سيكون الاجتماع بدونها؟
      - ما هي العلاقة بين اللوحة والفكر؟
  - id: hi_wp_elevator_encounter
    name: لقاء المصعد
    prompt: |
      تشترك المصعد مع زميل. ثلاثون ثانية. اللقاء محرج أو سهل. راقب
      المحادثات الصغيرة. ماذا يقال؟ يضغط المصعد الوقت. ماذا يتطلب؟
    follow_ups:
      - كيف يشكل المصعد اللقاء؟
      - ماذا سيكون المبنى بدون مصاعد؟
      - ما هي العلاقة بين المصعد واللياقة؟
  - id: hi_wp_cc_email
    name: بريد إلكتروني بالنسخة الكربونية
    prompt: |
      تم إرسال نسخة كربونية لك. لست المستلم الرئيسي. النسخة الكربونية
      تضمك في الحلقة. راقب من يتم إرسال نسخة كربونية له. النسخة
      الكربونية إشارة للأهمية — أو للسياسة. ماذا تفعل النسخة الكربونية؟
    follow_ups:
      - كيف يشكل النسخ الكربوني التواصل؟
      - ماذا سيكون مكان العمل بدون النسخ الكربوني؟
      - ما هي العلاقة بين النسخ الكربوني والرؤية؟
  - id: hi_wp_standing_desk
    name: مكتب الوقوف
    prompt: |
      يرتفع المكتب. العامل يقف. مكتب الوقوف اختيار — صحة، تفضيل، أداء.
      راقب من لديه واحد. ماذا تشير مكتب الوقوف؟
    follow_ups:
      - كيف يشكل مكتب الوقوف الجسم؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين الوقوف والإنتاجية؟
  - id: hi_wp_conference_call
    name: مكالمة جماعية
    prompt: |
      أصوات من أماكن أخرى. المكالمة تربط الأشخاص الموزعين. راقب من
      يتحدث، ومن يصمت. المكالمة هي حضور جزئي. ماذا تتيح المكالمة —
      وماذا تخسر؟
    follow_ups:
      - كيف تشكل المكالمة الاجتماع؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين المكالمة والحضور؟
  - id: hi_wp_office_plant
    name: نبات المكتب
    prompt: |
      نبات على المكتب — بوتوس، عصاري. إنها زخرفة ورعاية. النبات لا
      ينتمي للشركة. راقب من لديه واحد. ماذا يضيف النبات إلى
      المساحة؟
    follow_ups:
      - كيف يشكل النبات المكتب؟
      - ماذا سيكون مكان العمل بدون نباتات؟
      - ما هي العلاقة بين النبات والهوية؟
  - id: hi_wp_after_hours
    name: بعد ساعات العمل
    prompt: |
      المكتب بعد مغادرة معظم الموظفين. الأضواء خافتة. العامل بعد ساعات
      العمل مرئي — متفانٍ أو يكافح. راقب المشهد. ماذا يتيح المكتب
      الفارغ؟ ماذا يكلف؟
    follow_ups:
      - كيف تشكل ساعات العمل المتأخرة الثقافة؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين الساعات والتوقعات؟
  - id: hi_wp_nameplate
    name: لوحة الاسم
    prompt: |
      اسم على المكتب، على الباب. لوحة الاسم تدعي المساحة. راقب من لديه
      واحدة. لوحة الاسم هي الهوية والمكان. ماذا تتواصل مع المارة؟
    follow_ups:
      - كيف تشكل لوحة الاسم المساحة؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين لوحة الاسم والحضور؟
  - id: hi_wp_meeting_overrun
    name: تجاوز مدة الاجتماع
    prompt: |
      كان من المفترض أن ينتهي الاجتماع. لا ينتهي. تجاوز المدة شائع.
      راقب الديناميكية. من لديه الاجتماع التالي؟ من يمكنه البقاء؟
      تجاوز المدة هو حركة سلطة. ماذا يستخلص؟
    follow_ups:
      - كيف يشكل تجاوز المدة اليوم؟
      - ماذا سيكون مكان العمل بنهايات صارمة؟
      - ما هي العلاقة بين تجاوز المدة والاحترام؟
  - id: hi_wp_quick_question
    name: سؤال سريع
    prompt: |
      "هل لديك سؤال سريع؟" الطلب يقاطع. "سريع" وعد. راقب التبادل.
      كم هو سريع؟ السؤال السريع هو تفاوض على الوقت. ماذا يكلف؟
    follow_ups:
      - كيف يشكل السؤال السريع التدفق؟
      - ماذا سيكون مكان العمل بدون مقاطعات؟
      - ما هي العلاقة بين السرعة والاحترام؟
  - id: hi_wp_bathroom_encounter
    name: لقاء الحمام
    prompt: |
      تقابل زميلًا في الحمام. اللقاء غامض. اتصال بالعين أم لا؟
      الحمام هو مساحة انتقالية. راقب الأعراف. ماذا يتطلب اللقاء؟
    follow_ups:
      - كيف يشكل الحمام مكان العمل؟
      - ماذا سيكون مكان العمل بدون حمامات مشتركة؟
      - ما هي العلاقة بين الحمام والخصوصية؟
  - id: hi_wp_commute_talk
    name: حديث التنقل
    prompt: |
      "كيف كان التنقل؟" السؤال يفتح محادثات قصيرة. التنقل تجربة مشتركة.
      راقب التبادل. ماذا يفعل حديث التنقل للعلاقة؟
    follow_ups:
      - كيف يشكل حديث التنقل اليوم؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين التنقل والاتصال؟
  - id: hi_wp_parking_spot
    name: مكان وقوف السيارات
    prompt: |
      أماكن مخصصة، أماكن أولاً. تشفر مواقف السيارات التسلسل الهرمي.
      راقب من يركن أين. المكان هو امتياز صغير. ماذا يتواصل؟
    follow_ups:
      - كيف يشكل موقف السيارات مكان العمل؟
      - ماذا سيكون موقف السيارات بدون أماكن مخصصة؟
      - ما هي العلاقة بين المكان والمكانة؟
  - id: hi_wp_birthday_cake
    name: كعكة عيد الميلاد
    prompt: |
      تظهر كعكة. إنه عيد ميلاد شخص ما. يتجمع الفريق. الكعكة طقس.
      راقب التجمع. ماذا تفعل لحظة عيد الميلاد للمجموعة؟
    follow_ups:
      - كيف تشكل عيد الميلاد الثقافة؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين الكعكة والانتماء؟
  - id: hi_wp_forwarded_email
    name: بريد إلكتروني مُعاد توجيهه
    prompt: |
      تم إعادة توجيه بريد إلكتروني. "للعلم" أو "ظننت أنه يجب عليك رؤية
      هذا". إعادة التوجيه توسع المحادثة. راقب من يتم إعادة
      توجيهه. إعادة التوجيه إشارة. ماذا تعني؟
    follow_ups:
      - كيف يشكل إعادة التوجيه التواصل؟
      - ماذا سيكون مكان العمل بدونه؟
      - ما هي العلاقة بين إعادة التوجيه والثقة؟
  - id: hi_wp_break_room
    name: غرفة الاستراحة
    prompt: |
      قهوة، وجبات خفيفة، أحيانًا أريكة. غرفة الاستراحة هي وقفة. يذهب
      الناس إلى هناك للابتعاد. راقب من يستخدمها. غرفة الاستراحة
      ملجأ. ماذا توفر؟
    follow_ups:
      - كيف تشكل غرفة الاستراحة اليوم؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين الاستراحة والإنتاجية؟
  - id: hi_wp_office_supply
    name: مستلزمات المكتب
    prompt: |
      أقلام، ورق، دبابيس — خزانة المستلزمات تحمل الأدوات. يديرها شخص ما.
      راقب من يأخذ ماذا. المستلزمات هي مشاع مشترك صغير. ما هي
      القواعد؟
    follow_ups:
      - كيف تشكل المستلزمات مكان العمل؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين المستلزمات والاستحقاق؟
  - id: hi_wp_remote_camera
    name: كاميرا عن بعد
    prompt: |
      الكاميرا تعمل أو متوقفة. العامل عن بعد يختار. الاختيار مرئي.
      راقب الأعراف. من يبقيها قيد التشغيل؟ الكاميرا نافذة. ماذا
      تكشف؟
    follow_ups:
      - كيف تشكل الكاميرا المكالمة؟
      - ماذا سيكون الاجتماع بدونها؟
      - ما هي العلاقة بين الكاميرا والحضور؟
  - id: hi_wp_side_conversation
    name: محادثة جانبية
    prompt: |
      شخصان يتحدثان أثناء عمل الآخرين. المحادثة الجانبية خاصة ولكنها
      مرئية. راقب الديناميكية. هل هي مزعجة؟ المحادثة الجانبية هي
      تمرد صغير. ماذا تخلق؟
    follow_ups:
      - كيف تشكل المحادثة الجانبية الطابق؟
      - ماذا سيكون مكان العمل بدونها؟
      - ما هي العلاقة بين الجانب والاستبعاد؟
  - id: hi_wp_clean_desk
    name: مكتب نظيف
    prompt: |
      بعض المكاتب نظيفة — لا شيء شخصي. المكتب النظيف سياسة أو تفضيل.
      راقب التباين. ماذا يتواصل المكتب النظيف؟ العقم؟ الانضباط؟
      الانفصال؟
    follow_ups:
      - كيف يشكل المكتب النظيف العامل؟
      - ماذا سيكون مكان العمل بمكاتب فوضوية؟
      - ما هي العلاقة بين النظيف والهوية؟
  - id: hi_wp_meeting_no_show
    name: عدم حضور الاجتماع
    prompt: |
      تم جدولة الاجتماع. شخص ما لا يحضر. عدم الحضور هو رسالة. راقب
      الاستجابة. هل يذكر أحد ذلك؟ عدم الحضور هو حركة سلطة صغيرة.
      ماذا تتواصل؟
    follow_ups:
      - كيف يشكل عدم الحضور الاجتماع؟
      - ماذا سيكون مكان العمل بدون عدم الحضور؟
      - ما هي العلاقة بين عدم الحضور والاحترام؟
  - id: hi_wp_cubicle_visit
    name: زيارة المكتب المغلق
    prompt: |
      شخص ما يمشي. يقف على حافة المكتب المغلق. الزيارة اختيار — كان
