# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# ザ・ヒューマン・インターフェース — 小売 (Japanese)

id: human_interface_retail
name: ザ・ヒューマン・インターフェース — 小売
description: 小売空間の見方を変える50枚のカード。通路、閲覧の振付、試着室、そして購入のダンスまで。
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: 通路の流れ
    prompt: |
      通路は動きを導く。カートは一方向に、人々はすり抜ける。その流れを観察せよ。誰が譲り、誰が道を塞ぐのか？通路には物理法則がある。どのようなルールがそのダンスを支配しているのか？
    follow_ups:
      - 通路はどのように閲覧を形作るか？
      - 通路がなければ、店はどうなるか？
      - 流れとデザインの関係性とは？
  - id: hi_rt_browsing_choreography
    name: 閲覧の振付
    prompt: |
      指が布に触れる。目が棚をなぞる。閲覧にはリズムがある—立ち止まり、吟味し、次に進む。その振付を観察せよ。買わないとき、体は何をするのか？
    follow_ups:
      - 閲覧はどのように体験を形作るか？
      - 閲覧がなければ、店はどうなるか？
      - 閲覧と欲望の関係性とは？
  - id: hi_rt_fitting_room
    name: 試着室
    prompt: |
      カーテンが閉まる。試着室は閾（しきい）—公から私へ。その中で、あなたは可能性のある自己を試着する。その表情を観察せよ。試着室は決断の舞台だ。
    follow_ups:
      - 試着室はどのように購入を形作るか？
      - 試着室がなければ、店はどうなるか？
      - 試着とアイデンティティの関係性とは？
  - id: hi_rt_dance_of_purchase
    name: 購入のダンス
    prompt: |
      近づき、選び、運び、支払う。購入にはステップがある。そのシーケンスを観察せよ。人々はどこでためらうのか？そのダンスは店によって振付られている。それは何を抽出するのか？
    follow_ups:
      - ダンスはどのように結果を形作るか？
      - シーケンスがなければ、店はどうなるか？
      - ダンスと欲望の関係性とは？
  - id: hi_rt_cart_territory
    name: カートの領域
    prompt: |
      カートは体を拡張する。選択肢を抱え、通路を塞ぐ。カートの軌跡を観察せよ。カートは移動する領域だ。それは何を主張するのか？
    follow_ups:
      - カートはどのように動きを形作るか？
      - カートがなければ、店はどうなるか？
      - カートと蓄積の関係性とは？
  - id: hi_rt_endcap_display
    name: エンドキャップディスプレイ
    prompt: |
      通路の端にはディスプレイがある—衝動買い、セール、季節もの。エンドキャップは目を引く。誰が立ち止まるかを観察せよ。エンドキャップは罠だ。それは何をするのか？
    follow_ups:
      - エンドキャップはどのように閲覧を形作るか？
      - エンドキャップがなければ、通路はどうなるか？
      - ディスプレイと衝動の関係性とは？
  - id: hi_rt_checkout_line
    name: レジの列
    prompt: |
      列ができる。キャンディー、雑誌、最後のチャンス。レジは最終試験だ。待ち時間を観察せよ。人々は何をするのか？列は閲覧と出口の間の閾だ。
    follow_ups:
      - 列はどのように購入を形作るか？
      - 待ち時間がなければ、店はどうなるか？
      - 列と衝動の関係性とは？
  - id: hi_rt_shelf_height
    name: 棚の高さ
    prompt: |
      目の高さが売れる。棚の高さはデザインだ。どこに何があるかを観察せよ。一番下には何がある？一番上には何がある？高さは価値を符号化する。それは体について何を仮定しているのか？
    follow_ups:
      - 棚の高さはどのように閲覧を形作るか？
      - 全て同じ高さだったら、店はどうなるか？
      - 高さへのアクセス関係性とは？
  - id: hi_rt_price_tag
    name: 値札
    prompt: |
      タグに値段が書いてある。時に隠され、時に目立つ。配置を観察せよ。タグは情報であり、障壁でもある。触れる瞬間にタグは何をするのか？
    follow_ups:
      - タグはどのように決断を形作るか？
      - タグがなければ、商品はどうなるか？
      - タグと価値の関係性とは？
  - id: hi_rt_store_entrance
    name: 店の入り口
    prompt: |
      ドアが開く。あなたは入る。入り口は閾だ。最初に何が見えるかを観察せよ。入り口は雰囲気を決定する。店はあなたに何を感じてほしいのか？
    follow_ups:
      - 入り口はどのように訪問を形作るか？
      - デザインがなければ、店はどうなるか？
      - 入り口と期待の関係性とは？
  - id: hi_rt_sales_associate
    name: 販売員
    prompt: |
      「何かお探しですか？」その申し出は定型的だ。やり取りを観察せよ。受け入れるか、断るか？店員は案内人であり、プレッシャーでもある。その申し出は何をするのか？
    follow_ups:
      - 販売員はどのように閲覧を形作るか？
      - 販売員がいなければ、店はどうなるか？
      - 申し出と義務の関係性とは？
  - id: hi_rt_basket_versus_cart
    name: バスケット対カート
    prompt: |
      バスケットは数点の商品に。カートはより多くに。その選択は購入を予測する。誰が何を取るかを観察せよ。バスケットは制限し、カートは誘う。その選択は何を可能にするのか？
    follow_ups:
      - バスケットはどのように訪問を形作るか？
      - カートしかなかったら、店はどうなるか？
      - 容器と蓄積の関係性とは？
  - id: hi_rt_return_counter
    name: 返品カウンター
    prompt: |
      返品の列は異なる。人々は袋、レシート、後悔を抱えてくる。返品は逆転だ。やり取りを観察せよ。返品は何を犠牲にするのか—感情的に、社会的に？返品カウンターは取り消しの場所だ。
    follow_ups:
      - 返品はどのように関係性を形作るか？
      - 返品がなければ、店はどうなるか？
      - 返品と信頼の関係性とは？
  - id: hi_rt_dressing_room_limit
    name: 試着室の制限
    prompt: |
      「最大6点まで。」その制限は試着を制御する。交渉を観察せよ。7点持っていたらどうなるか？制限は試着室の体験を形作る。それは何を仮定しているのか？
    follow_ups:
      - 制限はどのように試着を形作るか？
      - 制限がなければ、試着室はどうなるか？
      - 制限と万引きの関係性とは？
  - id: hi_rt_impulse_buy
    name: 衝動買い
    prompt: |
      その品はリストになかった。目に留まった。衝動買いは降伏の瞬間だ。いつ起こるかを観察せよ。何がそれを引き起こしたのか？衝動はデザインと欲望の出会いだ。
    follow_ups:
      - 衝動はどのように購入を形作るか？
      - 衝動がなければ、店はどうなるか？
      - 衝動と後悔の関係性とは？
  - id: hi_rt_store_music
    name: 店の音楽
    prompt: |
      音楽が流れる—ゆったり、馴染み深く、意図されている。音楽は気分とペースを形作る。テンポを観察せよ。速い店、遅い音楽？音楽は目に見えないデザインだ。それは体に何をするのか？
    follow_ups:
      - 音楽はどのように訪問を形作るか？
      - 無音だったら、店はどうなるか？
      - 音楽と時間の関係性とは？
  - id: hi_rt_mannequin
    name: マネキン
    prompt: |
      マネキンが服を着ている。それは理想の体、提案だ。人々がそれにどう目を向けるかを観察せよ。マネキンは鏡であり、幻想でもある。それは何を約束するのか？
    follow_ups:
      - マネキンはどのように閲覧を形作るか？
      - マネキンがなければ、店はどうなるか？
      - マネキンと欲望の関係性とは？
  - id: hi_rt_sample_station
    name: サンプルステーション
    prompt: |
      これを味見して。これを試して。サンプルは触れることを誘う。ステーションは一時停止を生み出す。誰が立ち止まるかを観察せよ。サンプルは小さな贈り物だ。それは何を抽出するのか？
    follow_ups:
      - サンプルはどのように購入を形作るか？
      - サンプルがなければ、店はどうなるか？
      - サンプルと義務の関係性とは？
  - id: hi_rt_sale_rack
    name: セールラック
    prompt: |
      セールラックは混沌—割引、しわくちゃ。人々は掘り出す。セールラックは異なる種類の閲覧だ。行動を観察せよ。割引は触覚に何をするのか？
    follow_ups:
      - セールラックはどのように訪問を形作るか？
      - セールラックがなければ、店はどうなるか？
      - セールと価値の関係性とは？
  - id: hi_rt_mirror_encounter
    name: 鏡との遭遇
    prompt: |
      店の鏡に自分が映る。その遭遇は避けられない。視線を観察せよ。何をチェックするのか？鏡は試練だ。店は鏡を提供する。それは何を求めているのか？
    follow_ups:
      - 鏡はどのように試着を形作るか？
      - 鏡がなければ、試着室はどうなるか？
      - 鏡と自己の関係性とは？
  - id: hi_rt_cashier_small_talk
    name: レジでの雑談
    prompt: |
      「何かお探しになりましたか？」レジ係は尋ねる。雑談は定型的だ。やり取りを観察せよ。その質問は何をするのか？レジ係は最後の人間との接触だ。その会話は何を生み出すのか？
    follow_ups:
      - 雑談はどのように出口を形作るか？
      - 雑談がなければ、レジはどうなるか？
      - 会話と取引の関係性とは？
  - id: hi_rt_store_layout
    name: 店のレイアウト
    prompt: |
      通路はデザインされている。必需品は奥に。衝動買いは手前に。レイアウトは訪問を振付る。自分のルートを観察せよ。デザイナーは何を通り抜けさせたいと思ったのか？
    follow_ups:
      - レイアウトはどのように閲覧を形作るか？
      - ランダムなレイアウトだったら、店はどうなるか？
      - レイアウトと露出の関係性とは？
  - id: hi_rt_touch_decide
    name: 触って決める
    prompt: |
      指が布、表面に触れる。その触感が決める。その瞬間を観察せよ。目は見えないものを手はどう学ぶのか？触感は閾だ。それは何を要求するのか？
    follow_ups:
      - 触感はどのように決断を形作るか？
      - 触感がなければ、店はどうなるか？
      - 触感とコミットメントの関係性とは？
  - id: hi_rt_receipt_handoff
    name: レシートの受け渡し
    prompt: |
      レシートが渡される—袋の中か、別か。取る人もいれば、断る人もいる。レシートは証拠であり、記録でもある。やり取りを観察せよ。レシートは取引に何をするのか？
    follow_ups:
      - レシートはどのように出口を形作るか？
      - レシートがなければ、レジはどうなるか？
      - レシートと完了の関係性とは？
  - id: hi_rt_store_exit
    name: 店の出口
    prompt: |
      ドアが開く。あなたは袋を持って—あるいは何も持たずに—去る。出口は閾だ。感覚を観察せよ。出口は何を抽出するのか？出口はそのダンスの終わりだ。何が残るのか？
    follow_ups:
      - 出口はどのように訪問を形作るか？
      - ドアがなければ、店はどうなるか？
      - 出口と満足の関係性とは？
  - id: hi_rt_loyalty_card_ask
    name: ロイヤルティカードの質問
    prompt: |
      「会員カードはお持ちですか？」その質問はルーチンだ。応答を観察せよ。はい、いいえ、入会します。ロイヤルティカードは関係性を広げる。その質問は何を生み出すのか？
    follow_ups:
      - ロイヤルティカードはどのように取引を形作るか？
      - 会員カードがなければ、レジはどうなるか？
      - カードとデータの関係性とは？
  - id: hi_rt_abandoned_cart
    name: 放置されたカート
    prompt: |
      カートが通路に置かれている—満杯で、放置されている。カートは放棄されている。中身を観察せよ。何を検討したのか？その放棄は「いいえ」の瞬間だ。それは何を明らかにするのか？
    follow_ups:
      - 放置されたカートはどのように店を形作るか？
      - それから店は何を学べるか？
      - 放棄と欲望の関係性とは？
  - id: hi_rt_fitting_room_opinion
    name: 試着室での意見
    prompt: |
      「どう見える？」カーテンの外から誰かが尋ねる。意見は求められる。試着室は社交的になる。やり取りを観察せよ。その意見は何をするのか？
    follow_ups:
      - 意見はどのように決断を形作るか？
      - 一人での試着はどうなるか？
      - 意見と購入の関係性とは？
  - id: hi_rt_store_scent
    name: 店の香り
    prompt: |
      店には匂いがある—香水、革、清潔さ。その香りは意図されている。気づく前にそれを吸い込む。いつ匂うかを観察せよ。その香りは体に何をするのか？
    follow_ups:
      - 香りはどのように訪問を形作るか？
      - 香りがなければ、店はどうなるか？
      - 香りと記憶の関係性とは？
  - id: hi_rt_compare_prices
    name: 価格比較
    prompt: |
      スマホを取り出す。スキャンする。価格チェックはリサーチだ。その瞬間を観察せよ。スマホは何を明らかにするのか？比較は通路で起こる。それは決断に何をするのか？
    follow_ups:
      - 比較はどのように購入を形作るか？
      - スマホがなければ、店はどうなるか？
      - 比較と力の関係性とは？
  - id: hi_rt_window_display
    name: ウィンドウディスプレイ
    prompt: |
      窓は通りに面している。マネキン、小道具、物語。ディスプレイは歩みを止める。何が目を引くかを観察せよ。窓は招待状だ。それは何を約束するのか？
    follow_ups:
      - 窓はどのように入り口を形作るか？
      - 窓がなければ、店はどうなるか？
      - ディスプレイと欲望の関係性とは？
  - id: hi_rt_size_search
    name: サイズ探し
    prompt: |
      指がハンガーをめくる。サイズを探している。その探し方にはリズムがある。欲求不満か安堵かを観察せよ。サイズは扉だ。その探しは何を必要とするのか？
    follow_ups:
      - サイズ探しはどのように閲覧を形作るか？
      - 全てのサイズが見えていたら、店はどうなるか？
      - サイズと体の関係性とは？
  - id: hi_rt_payment_choice
    name: 支払い方法の選択
    prompt: |
      カード、現金、スマホ。支払い方法の選択は取引の瞬間だ。方法を観察せよ。その選択は習慣であり、アイデンティティでもある。支払い方法は何を伝達するのか？
    follow_ups:
      - 支払いはどのようにレジを形作るか？
      - 支払い方法が一つしかなかったら、店はどうなるか？
      - 支払いとスピードの関係性とは？
  - id: hi_rt_store_regular
    name: 常連客
    prompt: |
      常連客はレイアウトを知っている。目的を持って動く。店員は頷く。常連客を観察せよ。新規客が知らない何を彼らは知っているのか？常連客はその空間と関係を持っている。
    follow_ups:
      - 常連客はどのように店を形作るか？
      - 常連客がいなければ、店はどうなるか？
      - 常連客とロイヤルティの関係性とは？
  - id: hi_rt_bag_handoff
    name: 袋の受け渡し
    prompt: |
      袋が渡される—満杯で、ブランドロゴ入り。その受け渡しは取引を完了させる。やり取りを観察せよ。袋は出口に何をするのか？袋は証拠であり、負担でもある。
    follow_ups:
      - 袋はどのように出口を形作るか？
      - 袋がなければ、購入はどうなるか？
      - 袋とアイデンティティの関係性とは？
  - id: hi_rt_fitting_room_overflow
    name: 試着室のオーバーフロー
    prompt: |
      アイテムが多すぎる。店員がオーバー分を受け取る。「これを預かります。」そのオーバーフローは信頼だ。やり取りを観察せよ。店員は何を預かるのか？オーバーフローは試着を拡張する。それは何を可能にするのか？
    follow_ups:
      - オーバーフローはどのように試着を形作るか？
      - オーバーフローがなければ、試着室はどうなるか？
      - オーバーフローと信頼の関係性とは？
  - id: hi_rt_store_lighting
    name: 店の照明
    prompt: |
      照明は意図されている—魅力的、明るい、暖かい。照明は物の見え方を形作る。その光の中での鏡を観察せよ。照明は顔、布地に何をするのか？
    follow_ups:
      - 照明はどのように購入を形作るか？
      - 強い光だったら、店はどうなるか？
      - 照明と真実の関係性とは？
  - id: hi_rt_aisle_block
    name: 通路の障害
    prompt: |
      誰かが通路に立っている。あなたは通る必要がある。その妨害は無頓着か、意図的か。交渉を観察せよ。「すみません。」その障害は小さな摩擦だ。それは何を要求するのか？
    follow_ups:
      - 障害はどのように流れを形作るか？
      - もっと広い通路だったら、店はどうなるか？
      - 障害と礼儀の関係性とは？
  - id: hi_rt_clearance_section
    name: クリアランスセクション
    prompt: |
      クリアランスセクションは奥、隅にある。昨シーズン、最後のチャンス。そのセクションは異なるエネルギーを持っている。閲覧を観察せよ。割引は触感、検討に何をするのか？
    follow_ups:
      - クリアランスはどのように訪問を形作るか？
      - クリアランスセクションがなければ、店はどうなるか？
      - クリアランスと価値の関係性とは？
  - id: hi_rt_store_map
    name: 店の地図
    prompt: |
      「Xはどこですか？」地図か店員が答える。店には地理がある。方向感覚の喪失を観察せよ。地図は何を提供するのか？地図は方向指示だ。それは何を仮定しているのか？
    follow_ups:
      - 地図はどのように訪問を形作るか？
      - 地図がなければ、店はどうなるか？
      - 地図と流暢さの関係性とは？
  - id: hi_rt_try_on_stack
    name: 試着品の山
    prompt: |
      店員が試着品を戻す。折りたたまれ、かけられている。その山は床に戻る。労働を観察せよ。誰がこれらに触れたのか？試着品の山は多くの「もし」の後の残骸だ。
    follow_ups:
      - 山はどのように床を形作るか？
      - 山がなければ、試着室はどうなるか？
      - 山と労働の関係性とは？
  - id: hi_rt_store_hours
    name: 店の営業時間
    prompt: |
      看板には開店時間、閉店時間が書かれている。営業時間は境界だ。開店前の群衆を観察せよ。営業時間はアクセスを構造化する。それは顧客について何を仮定しているのか？
    follow_ups:
      - 営業時間はどのように訪問を形作るか？
      - 24時間営業だったら、店はどうなるか？
      - 営業時間と可用性の関係性とは？
  - id: hi_rt_shopping_list
    name: 買い物リスト
    prompt: |
      スマホか紙。リストは訪問を導く。誰が持っているかを観察せよ。リストは意図だ。それは衝動に抵抗する—あるいはしない。リストは閲覧に何をするのか？
    follow_ups:
      - リストはどのように購入を形作るか？
      - リストがなければ、訪問はどうなるか？
      - リストとコントロールの関係性とは？
  - id: hi_rt_store_emptiness
    name: 店の空虚さ
    prompt: |
      営業時間外、暇な日。店は空虚だ。その空虚さは感覚を変える。空間を観察せよ。空虚さは何を明らかにするのか？空虚な店は異なる種類の舞台だ。
    follow_ups:
      - 空虚さはどのように閲覧を形作るか？
      - いつも空虚だったら、店はどうなるか？
      - 空虚さと快適さの関係性とは？
  - id: hi_rt_fitting_room_curtain
    name: 試着室のカーテン
    prompt: |
      カーテンが閉まる。プライバシーは部分的—隙間、音。カーテンは閾だ。境界を観察せよ。カーテンは何を守るのか？何を守らないのか？
    follow_ups:
      - カーテンはどのように試着を形作るか？
      - ドアがあったら、試着室はどうなるか？
      - カーテンとプライバシーの関係性とは？
  - id: hi_rt_store_aroma
    name: 店のアロマ
    prompt: |
      パン屋、コーヒー、香水—店には匂いがある。アロマは最初の接触だ。それは訪問を準備する。いつそれを気づくかを観察せよ。買う前にアロマは何をするのか？
    follow_ups:
      - アロマはどのように訪問を形作るか？
      - アロマがなければ、店はどうなるか？
      - アロマと欲望の関係性とは？
  - id: hi_rt_purchase_regret
    name: 購入後の後悔
    prompt: |
      手の中の袋。疑念が忍び寄る。後悔は後で来るかもしれない。店を出る顔を観察せよ。その購入は何を意味するのか？後悔はそのダンスの影だ。何がそれを作り出すのか？
    follow_ups:
      - 後悔はどのように次の訪問を形作るか？
      - 後悔がなければ、購入はどうなるか？
      - 後悔と欲望の関係性とは？
  - id: hi_rt_store_thank_you
    name: 店からの「ありがとう」
    prompt: |
      「ご利用ありがとうございました。」その言葉は取引を締めくくる。それは定型的だ。やり取りを観察せよ。ありがとうは何をするのか？その言葉は小さな儀式だ。何を生み出すのか？
    follow_ups:
      - 「ありがとう」はどのように出口を形作るか？
      - 「ありがとう」がなければ、レジはどうなるか？
      - 「ありがとう」と完了の関係性とは？
  - id: hi_rt_store_entrance_sensor
    name: 入り口センサー
    prompt: |
      ドアが自動で開く。センサーが接近を検知する。入り口は振付されている。閾を観察せよ。自動ドアは到着に何をするのか？センサーはシームレスな遷移を生み出す。
    follow_ups:
      - センサーはどのように入り口を形作るか？
      - 手動ドアだったら、店はどうなるか？
      - センサーと歓迎の関係性とは？
  - id: hi_rt_price_match
    name: 価格マッチ
    prompt: |
      「競合他社より安くします。」その申し出は約束だ。誰かがそれを使う時を観察せよ。価格マッチは交渉だ。それは顧客に何を要求するのか？マッチは信頼—あるいは疑念を生む。
    follow_ups:
      - 価格マッチはどのように購入を形作るか？
      - 価格マッチがなければ、店はどうなるか？
      - マッチとロイヤルティの関係性とは？
  - id: hi_rt_fitting_room_number
    name: 試着室の番号
    prompt: |
      「何点ですか？」店員は尋ねる。その番号は試着を制限する。交渉を観察せよ。より多く持っていたらどうなるか？番号は制御だ。それは顧客について何を仮定しているのか？
    follow_ups:
      - 番号はどのように試着を形作るか？
      - 制限がなければ、試着室はどうなるか？
      - 番号と信頼の関係性とは？
  - id: hi_rt_gift_receipt
    name: ギフトレシート
    prompt: |
      「ギフトレシートをご希望ですか？」その申し出は価格と贈り物を分ける。ギフトレシートは、コストを明かさずに返品を可能にする。選択を観察せよ。ギフトレシートは何を守るのか？
    follow_ups:
      - ギフトレシートはどのように購入を形作るか？
      - ギフトレシートがなければ、贈り物はどうなるか？
      - レシートと裁量権の関係性とは？
