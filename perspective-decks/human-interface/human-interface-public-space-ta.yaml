# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# மனித இடைமுகம் — பொது வெளி (Tamil)

id: human_interface_public_space
name: மனித இடைமுகம் — பொது வெளி
description: பொது வெளியைப் பார்க்கும் விதத்தை மாற்றியமைக்க 50 அட்டைகள் — பெஞ்சுகள் மற்றும் பாதைகளில் இருந்து அந்நியர்களின் நடனம் மற்றும் சின்னங்களாகப் பொருட்கள் வரை.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: பெஞ்ச் ஆக்கிரமிப்பு
    prompt: |
      ஒரு பெஞ்ச் ஒரு உடலால், ஒரு பையால், ஒரு நிலைப்பாட்டால் உரிமை கோரப்படுகிறது. பெஞ்ச் ஒரு பற்றாக்குறை
      வளம். யார் அமர்கிறார்கள், யார் நிற்கிறார்கள், யார் கடந்து செல்கிறார்கள் என்பதைக் கவனியுங்கள். பெஞ்ச்
      வெவ்வேறு நபர்களுக்கு வெவ்வேறு அர்த்தங்களைக் கொண்டுள்ளது. அது என்ன வழங்குகிறது?
    follow_ups:
      - பெஞ்ச் எப்படி இடத்தை வடிவமைக்கிறது?
      - பெஞ்சுகள் இல்லாமல் பூங்கா எப்படி இருக்கும்?
      - பெஞ்ச் மற்றும் ஓய்வுக்கு என்ன தொடர்பு?
  - id: hi_ps_pathway_flow
    name: பாதை ஓட்டம்
    prompt: |
      பாதை இயக்கத்தை வழிநடத்துகிறது. மக்கள் நடக்கிறார்கள்—தனியாக, ஜோடியாக, குழுக்களாக.
      ஓட்டம் திசை கொண்டது. மோதலைக் கவனியுங்கள். யார் வழிவிடுகிறார்கள்? பாதை
      ஒரு பகிரப்பட்ட நடைபாதை. அதை என்ன விதிகள் நிர்வகிக்கின்றன?
    follow_ups:
      - பாதை நடையை எப்படி வடிவமைக்கிறது?
      - பாதைகள் இல்லாமல் வெளி எப்படி இருக்கும்?
      - பாதை மற்றும் இலக்குக்கு என்ன தொடர்பு?
  - id: hi_ps_strangers_choreography
    name: அந்நியர்களின் நடனம்
    prompt: |
      தொடர்பில்லாத உடல்கள் பகிரப்பட்ட வெளியில் நகர்கின்றன. நடனம்
      பேசப்படாதது—பக்கவாட்டில் நகர்வது, நிற்பது, இணைவது. நடனத்தைக் கவனியுங்கள். யாரும் பேசுவதில்லை.
      நடனம் முற்றிலும் உடல் சார்ந்தது. அதற்கு என்ன தேவை?
    follow_ups:
      - நடனம் எப்படி இடத்தை வடிவமைக்கிறது?
      - எல்லோரும் நின்றால் என்ன நடக்கும்?
      - நடனம் மற்றும் நாகரிகத்துக்கு என்ன தொடர்பு?
  - id: hi_ps_object_talisman
    name: சின்னமான பொருள்
    prompt: |
      பெஞ்சில் ஒரு புத்தகம். நாற்காலியில் ஒரு பை. அந்தப் பொருள் ஒரு இடத்தைப் பிடித்துள்ளது. அது சொல்கிறது
      "நான் இங்கு இருக்கிறேன்" அல்லது "நான் திரும்புவேன்." அந்தப் பொருள் ஒரு சின்னம். உரிமையைக் கவனியுங்கள்.
      அது எதைக் காக்கிறது?
    follow_ups:
      - சின்னம் எப்படி இடத்தை வடிவமைக்கிறது?
      - இதுபோன்ற உரிமைகள் இல்லாமல் வெளி எப்படி இருக்கும்?
      - பொருள் மற்றும் இருப்புக்கு என்ன தொடர்பு?
  - id: hi_ps_bench_armrest
    name: பெஞ்ச் கைப்பிடி
    prompt: |
      சில பெஞ்சுகளில் கைப்பிடிகள் உள்ளன. அவை இருக்கையைப் பிரிக்கின்றன. அவை படுக்க விடுவதில்லை.
      கைப்பிடி வேண்டுமென்றே வடிவமைக்கப்பட்டது. அதைப் பயன்படுத்துபவரைக் கவனியுங்கள். கைப்பிடி எதை விலக்குகிறது?
    follow_ups:
      - கைப்பிடி பெஞ்சை எப்படி வடிவமைக்கிறது?
      - அது இல்லாமல் பெஞ்ச் எப்படி இருக்கும்?
      - கைப்பிடி மற்றும் கட்டுப்பாட்டுக்கு என்ன தொடர்பு?
  - id: hi_ps_pathway_intersection
    name: பாதை சந்திப்பு
    prompt: |
      பாதைகள் குறுக்கிடுகின்றன. உடல்கள் இணைகின்றன. சந்திப்பு ஒரு மோதல் புள்ளி.
      இணைப்பைக் கவனியுங்கள். ஓட்டங்கள் சந்திக்கும் போது என்ன நடக்கும்? சந்திப்பு
      பேச்சுவார்த்தை தேவைப்படுகிறது. அது என்ன கோருகிறது?
    follow_ups:
      - சந்திப்பு ஓட்டத்தை எப்படி வடிவமைக்கிறது?
      - சந்திப்புகள் இல்லாமல் வெளி எப்படி இருக்கும்?
      - சந்திப்பு மற்றும் கவனத்துக்கு என்ன தொடர்பு?
  - id: hi_ps_eye_contact_avoid
    name: கண் தொடர்பைத் தவிர்த்தல்
    prompt: |
      அந்நியர்கள் கண் தொடர்பைத் தவிர்க்கிறார்கள். தவிர்ப்பது நாகரிகமானது. பார்ப்பது தொடர்பை ஏற்படுத்தும்.
      பார்வையைக் கவனியுங்கள். தவிர்ப்பு ஒரு ஒப்பந்தம். அது எதை செயல்படுத்துகிறது? அதற்கு என்ன விலை?
    follow_ups:
      - தவிர்ப்பு எப்படி இடத்தை வடிவமைக்கிறது?
      - அதிக தொடர்புடன் வெளி எப்படி இருக்கும்?
      - பார்வை மற்றும் தனியுரிமைக்கு என்ன தொடர்பு?
  - id: hi_ps_bench_share
    name: பெஞ்ச் பகிர்வு
    prompt: |
      இரு அந்நியர்கள் ஒரு பெஞ்சைப் பகிர்கிறார்கள். அவர்களுக்கு இடையே இடைவெளி. இந்த பகிர்வு
      தொடர்பு இல்லாத நெருக்கம். எல்லையைக் கவனியுங்கள். எவ்வளவு நெருக்கம் அதிகம்? இந்த பகிர்வு ஒரு நுட்பமான சமநிலை.
    follow_ups:
      - பகிர்வு பெஞ்சை எப்படி வடிவமைக்கிறது?
      - ஒரு நபர் மட்டும் இருந்தால் பெஞ்ச் எப்படி இருக்கும்?
      - பகிர்வு மற்றும் சகிப்புத்தன்மைக்கு என்ன தொடர்பு?
  - id: hi_ps_pathway_width
    name: பாதை அகலம்
    prompt: |
      பாதை அகலமாகவோ அல்லது குறுகலாகவோ உள்ளது. அகலம் ஓட்டத்தைப் பாதிக்கிறது. இரண்டு பேர்
      செல்ல முடியுமா அல்லது முடியாதா? அகலத்தைக் கவனியுங்கள். கூட்டத்தைப் பற்றி அது என்ன அனுமானிக்கிறது?
      அகலம் வடிவமைப்பு. அது எதை செயல்படுத்துகிறது?
    follow_ups:
      - அகலம் நடையை எப்படி வடிவமைக்கிறது?
      - பாதை அகலமாக இருந்தால் எப்படி இருக்கும்?
      - அகலம் மற்றும் வசதிக்கு என்ன தொடர்பு?
  - id: hi_ps_bench_sun
    name: வெயிலில் பெஞ்ச்
    prompt: |
      பெஞ்ச் சூரியனை நோக்கி உள்ளது. அல்லது நிழலை நோக்கி. நிலை முக்கியம். யார் எதைத் தேர்வு செய்கிறார்கள் என்பதைக் கவனியுங்கள்.
      சூரியன் ஒரு வளம். அது என்ன வழங்குகிறது? வெயிலில் உள்ள பெஞ்ச் விரும்பப்படுகிறது.
    follow_ups:
      - சூரியன் பெஞ்சை எப்படி வடிவமைக்கிறது?
      - சூரியன் இல்லாமல் வெளி எப்படி இருக்கும்?
      - சூரியன் மற்றும் ஓய்வுக்கு என்ன தொடர்பு?
  - id: hi_ps_stranger_proximity
    name: அந்நியர் நெருக்கம்
    prompt: |
      ஒரு அந்நியர் அருகில் நிற்கிறார்—வரிசையில், பேருந்தில். நெருக்கம்
      தனிப்பட்டதாக இல்லாவிட்டாலும் நெருக்கமானது. சகிப்புத்தன்மையைக் கவனியுங்கள். உடல் என்ன அனுமதிக்கிறது?
      நெருக்கம் ஒரு ஒப்பந்தம். அதன் விதிமுறைகள் என்ன?
    follow_ups:
      - நெருக்கம் எப்படி இடத்தை வடிவமைக்கிறது?
      - அதிக இடம் இருந்தால் வெளி எப்படி இருக்கும்?
      - நெருக்கம் மற்றும் நாகரிகத்துக்கு என்ன தொடர்பு?
  - id: hi_ps_object_left
    name: விடப்பட்ட பொருள்
    prompt: |
      பெஞ்சில் ஒரு ஜாக்கெட். மரத்தின் கீழ் ஒரு பை. விடப்பட்ட பொருள் இடத்தை குறிக்கிறது.
      உரிமையைக் கவனியுங்கள். எவ்வளவு நேரம் அது இருக்கும்? விடப்பட்ட பொருள் ஒரு சோதனை.
      அது மற்றவர்களிடம் இருந்து என்ன கோருகிறது?
    follow_ups:
      - பொருள் எப்படி இடத்தை வடிவமைக்கிறது?
      - இதுபோன்ற உரிமைகள் இல்லாமல் வெளி எப்படி இருக்கும்?
      - பொருள் மற்றும் நம்பிக்கைக்கும் என்ன தொடர்பு?
  - id: hi_ps_pathway_obstacle
    name: பாதை தடை
    prompt: |
      ஏதோ பாதை தடுக்கிறது—கட்டுமானம், கூட்டம், ஒரு நிகழ்ச்சி. தடை
      ஓட்டத்தை திசை திருப்புகிறது. சுற்றி வருவதைக் கவனியுங்கள். தடை என்ன கோருகிறது?
      பாதை ஒருபோதும் தூய்மையாக இருப்பதில்லை. அதை என்ன தடுக்கிறது?
    follow_ups:
      - தடை ஓட்டத்தை எப்படி வடிவமைக்கிறது?
      - தடைகள் இல்லாமல் பாதை எப்படி இருக்கும்?
      - தடை மற்றும் தழுவலுக்கு என்ன தொடர்பு?
  - id: hi_ps_bench_alone
    name: தனியான பெஞ்ச்
    prompt: |
      ஒரு பெஞ்சில் ஒரு நபர். தனிமை காணப்படுகிறது. பெஞ்ச்
      தனிமையை தாங்குகிறது. நிலைப்பாட்டைக் கவனியுங்கள். தனியான பெஞ்ச் என்ன வழங்குகிறது?
      தனியான பெஞ்ச் ஒரு தேர்வு. அது எதை செயல்படுத்துகிறது?
    follow_ups:
      - தனிமை பெஞ்சை எப்படி வடிவமைக்கிறது?
      - பெஞ்சுகள் இல்லாமல் வெளி எப்படி இருக்கும்?
      - தனிமை மற்றும் ஓய்வுக்கு என்ன தொடர்பு?
  - id: hi_ps_nod_acknowledge
    name: தலையசைப்பு அங்கீகாரம்
    prompt: |
      சிறிய தலையசைப்பு. ஒரு சுருக்கமான புன்னகை. அங்கீகாரம் மிகக் குறைவு. அது "நான்
      உன்னைப் பார்க்கிறேன்" என்று சொல்கிறது, ஈடுபாடு இல்லாமல். எப்போது நடக்கிறது என்பதைக் கவனியுங்கள்.
      தலையசைப்பு ஒரு சிறிய நாகரிகம். அது என்ன உருவாக்குகிறது?
    follow_ups:
