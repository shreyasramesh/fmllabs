# انسانی انٹرفیس — پبلک اسپیس (Urdu)

id: human_interface_public_space
name: انسانی انٹرفیس — پبلک اسپیس
description: 50 کارڈز جو آپ کے پبلک اسپیس کے نظریہ کو تبدیل کرنے کے لیے ہیں—بینچز اور راستوں سے لے کر اجنبیوں کے رقص اور طلسماتی اشیاء تک۔
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: بینچ پر قبضہ
    prompt: |
      ایک بینچ پر قبضہ کر لیا گیا ہے—ایک جسم، ایک بیگ، ایک انداز سے۔ بینچ ایک محدود وسیلہ ہے۔ دیکھیں کون بیٹھتا ہے، کون کھڑا ہوتا ہے، کون گزرتا ہے۔ بینچ مختلف لوگوں کے لیے مختلف معنی رکھتی ہے۔ یہ کیا فراہم کرتی ہے؟
    follow_ups:
      - بینچ جگہ کو کیسے شکل دیتی ہے؟
      - بینچوں کے بغیر پارک کیسا ہوگا؟
      - بینچ اور آرام کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_flow
    name: راستے کا بہاؤ
    prompt: |
      راستہ حرکت کو منظم کرتا ہے۔ لوگ چلتے ہیں—تنہا، جوڑوں میں، گروہوں میں۔ بہاؤ کی سمت ہوتی ہے۔ ٹکر کو دیکھیں۔ کون راستہ دیتا ہے؟ راستہ ایک مشترکہ راہداری ہے۔ یہ کن اصولوں پر چلتا ہے؟
    follow_ups:
      - راستہ واک کو کیسے شکل دیتا ہے؟
      - راستوں کے بغیر جگہ کیسی ہوگی؟
      - راستے اور منزل کے درمیان کیا تعلق ہے؟
  - id: hi_ps_strangers_choreography
    name: اجنبیوں کا رقص
    prompt: |
      غیر متعلقہ جسم مشترکہ جگہ میں حرکت کرتے ہیں۔ رقص غیر کہی ہوئی ہے—سائیڈ سٹیپ، پاز، مرج۔ رقص کو دیکھیں۔ کوئی بات نہیں کرتا۔ رقص خالص جسم ہے۔ اس کے لیے کیا ضروری ہے؟
    follow_ups:
      - رقص جگہ کو کیسے شکل دیتا ہے؟
      - اگر سب رک جائیں تو کیا ہوگا؟
      - رقص اور تہذیب کے درمیان کیا تعلق ہے؟
  - id: hi_ps_object_talisman
    name: طلسماتی شے
    prompt: |
      بینچ پر ایک کتاب۔ کرسی پر ایک بیگ۔ شے ایک جگہ رکھتی ہے۔ یہ کہتی ہے "میں یہاں ہوں" یا "میں واپس آؤں گا۔" شے ایک طلسم ہے۔ دعویٰ کو دیکھیں۔ یہ کیا محفوظ کرتی ہے؟
    follow_ups:
      - طلسم جگہ کو کیسے شکل دیتا ہے؟
      - ایسے دعووں کے بغیر جگہ کیسی ہوگی؟
      - شے اور موجودگی کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_armrest
    name: بینچ کا آرم ریسٹ
    prompt: |
      کچھ بینچوں میں آرم ریسٹ ہوتے ہیں۔ وہ سیٹ کو تقسیم کرتے ہیں۔ وہ لیٹنے سے روکتے ہیں۔ آرم ریسٹ ارادے کے ساتھ ڈیزائن کیا گیا ہے۔ دیکھیں کون اسے استعمال کرتا ہے۔ آرم ریسٹ کس کو خارج کرتا ہے؟
    follow_ups:
      - آرم ریسٹ بینچ کو کیسے شکل دیتا ہے؟
      - اس کے بغیر بینچ کیسی ہوگی؟
      - آرم ریسٹ اور کنٹرول کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_intersection
    name: راستے کا چوراہا
    prompt: |
      راستے کراس کرتے ہیں۔ جسم ملتے ہیں۔ چوراہا تصادم کا مقام ہے۔ انضمام کو دیکھیں۔ جب بہاؤ ملتے ہیں تو کیا ہوتا ہے؟ چوراہے کے لیے مذاکرات کی ضرورت ہوتی ہے۔ یہ کیا نکالت ہے؟
    follow_ups:
      - چوراہا بہاؤ کو کیسے شکل دیتا ہے؟
      - چوراہوں کے بغیر جگہ کیسی ہوگی؟
      - چوراہا اور توجہ کے درمیان کیا تعلق ہے؟
  - id: hi_ps_eye_contact_avoid
    name: آنکھوں کے رابطے سے گریز
    prompt: |
      اجنبی آنکھوں کے رابطے سے گریز کرتے ہیں۔ یہ گریز تہذیب ہے۔ دیکھنا تعلق کا خطرہ مول لینا ہے۔ نگاہ کو دیکھیں۔ یہ گریز ایک معاہدہ ہے۔ یہ کیا ممکن بناتا ہے؟ اس کی کیا قیمت ہے؟
    follow_ups:
      - یہ گریز جگہ کو کیسے شکل دیتا ہے؟
      - زیادہ رابطے کے ساتھ جگہ کیسی ہوگی؟
      - نگاہ اور پرائیویسی کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_share
    name: بینچ شیئر
    prompt: |
      دو اجنبی بینچ بانٹتے ہیں۔ ان کے درمیان جگہ۔ یہ اشتراک قربت ہے بغیر تعلق کے۔ حد کو دیکھیں۔ کتنا قریب بہت قریب ہے؟ یہ اشتراک ایک نازک توازن ہے۔
    follow_ups:
      - یہ اشتراک بینچ کو کیسے شکل دیتا ہے؟
      - ایک شخص کے ساتھ بینچ کیسی ہوگی؟
      - اشتراک اور رواداری کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_width
    name: راستے کی چوڑائی
    prompt: |
      راستہ چوڑا یا تنگ ہے۔ چوڑائی بہاؤ کو متاثر کرتی ہے۔ دو لوگ گزر سکتے ہیں یا نہیں۔ چوڑائی کو دیکھیں۔ یہ ہجوم کے بارے میں کیا فرض کرتا ہے؟ چوڑائی ڈیزائن ہے۔ یہ کیا ممکن بناتا ہے؟
    follow_ups:
      - چوڑائی واک کو کیسے شکل دیتی ہے؟
      - اگر راستہ چوڑا ہوتا تو کیسا ہوتا؟
      - چوڑائی اور آرام کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_sun
    name: دھوپ میں بینچ
    prompt: |
      بینچ سورج کا سامنا کر رہی ہے۔ یا سایہ کا۔ پوزیشن اہم ہے۔ دیکھیں کون سا چنتا ہے۔ سورج ایک وسیلہ ہے۔ یہ کیا فراہم کرتا ہے؟ دھوپ میں بینچ مطلوب ہے۔
    follow_ups:
      - سورج بینچ کو کیسے شکل دیتا ہے؟
      - سورج کے بغیر جگہ کیسی ہوگی؟
      - سورج اور آرام کے درمیان کیا تعلق ہے؟
  - id: hi_ps_stranger_proximity
    name: اجنبی کی قربت
    prompt: |
      ایک اجنبی قریب کھڑا ہوتا ہے—قطار میں، بس میں۔ قربت غیر ذاتی لیکن قریبی ہے۔ رواداری کو دیکھیں۔ جسم کیا اجازت دیتا ہے؟ قربت ایک معاہدہ ہے۔ اس کی شرائط کیا ہیں؟
    follow_ups:
      - قربت جگہ کو کیسے شکل دیتی ہے؟
      - زیادہ جگہ کے ساتھ جگہ کیسی ہوگی؟
      - قربت اور تہذیب کے درمیان کیا تعلق ہے؟
  - id: hi_ps_object_left
    name: چھوڑی ہوئی شے
    prompt: |
      بینچ پر جیکٹ۔ درخت کے نیچے بیگ۔ چھوڑی ہوئی شے علاقہ کو نشان زد کرتی ہے۔ دعویٰ کو دیکھیں۔ یہ کب تک ٹھہر سکتا ہے؟ چھوڑی ہوئی شے ایک امتحان ہے۔ یہ دوسروں سے کیا مطالبہ کرتی ہے؟
    follow_ups:
      - شے جگہ کو کیسے شکل دیتی ہے؟
      - ایسے دعووں کے بغیر جگہ کیسی ہوگی؟
      - شے اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_obstacle
    name: راستے کی رکاوٹ
    prompt: |
      کچھ راستے کو روکتا ہے—تعمیر، ہجوم، فنکار۔ رکاوٹ بہاؤ کو موڑتی ہے۔ متبادل راستے کو دیکھیں۔ رکاوٹ کیا مطالبہ کرتی ہے؟ راستہ کبھی خالص نہیں ہوتا۔ اسے کیا روکتا ہے؟
    follow_ups:
      - رکاوٹ بہاؤ کو کیسے شکل دیتی ہے؟
      - رکاوٹوں کے بغیر راستہ کیسا ہوگا؟
      - رکاوٹ اور موافقت کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_alone
    name: اکیلی بینچ
    prompt: |
      بینچ پر ایک شخص۔ اکیلا پن نظر آتا ہے۔ بینچ تنہائی کو پناہ دیتی ہے۔ انداز کو دیکھیں۔ اکیلی بینچ کیا فراہم کرتی ہے؟ اکیلی بینچ ایک انتخاب ہے۔ یہ کیا ممکن بناتی ہے؟
    follow_ups:
      - یہ اکیلا پن بینچ کو کیسے شکل دیتا ہے؟
      - بینچوں کے بغیر جگہ کیسی ہوگی؟
      - اکیلا پن اور آرام کے درمیان کیا تعلق ہے؟
  - id: hi_ps_nod_acknowledge
    name: سر ہلانا تسلیم کرنا
    prompt: |
      ایک ہلکی سی سر ہلاؤ۔ ایک مختصر مسکراہٹ۔ تسلیم کم سے کم ہے۔ یہ کہتا ہے "میں تمہیں دیکھتا ہوں" بغیر کسی مشغولیت کے۔ دیکھیں کب ہوتا ہے۔ سر ہلانا ایک چھوٹی سی تہذیب ہے۔ یہ کیا پیدا کرتا ہے؟
    follow_ups:
      - یہ سر ہلانا جگہ کو کیسے شکل دیتا ہے؟
      - اس کے بغیر جگہ کیسی ہوگی؟
      - سر ہلانا اور حفاظت کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_edge
    name: راستے کا کنارہ
    prompt: |
      راستے کے کنارے ہوتے ہیں—گھاس، کرب، رکاوٹ۔ کنارہ راستے کی تعریف کرتا ہے۔ دیکھیں کون راستے پر رہتا ہے۔ کون کراس کرتا ہے؟ کنارہ ایک حد ہے۔ یہ کیا رکھتا ہے؟
    follow_ups:
      - کنارہ واک کو کیسے شکل دیتا ہے؟
      - کناروں کے بغیر راستہ کیسا ہوگا؟
      - کنارہ اور آزادی کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_claim
    name: بینچ کا دعویٰ
    prompt: |
      بینچ پر قبضہ کر لیا گیا ہے—پھیلاؤ سے، انداز سے، بیگ سے۔ دعویٰ کہتا ہے "یہ میرا ہے۔" دعویٰ کو دیکھیں۔ یہ کیسے کیا جاتا ہے؟ دعویٰ علاقہ ہے۔ یہ کیا محفوظ کرتا ہے؟
    follow_ups:
      - یہ دعویٰ بینچ کو کیسے شکل دیتا ہے؟
      - دعووں کے بغیر جگہ کیسی ہوگی؟
      - دعویٰ اور آرام کے درمیان کیا تعلق ہے؟
  - id: hi_ps_stranger_help
    name: اجنبی کی مدد
    prompt: |
      "مدد چاہیے؟" ایک اجنبی پیش کرتا ہے۔ مدد غیر متوقع ہے۔ تبادلے کو دیکھیں۔ قبول کریں یا انکار کریں؟ اجنبی کی مدد ایک تحفہ ہے۔ اس کے لیے کیا ضروری ہے؟
    follow_ups:
      - یہ مدد جگہ کو کیسے شکل دیتی ہے؟
      - ایسی پیشکشوں کے بغیر جگہ کیسی ہوگی؟
      - مدد اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_ps_object_temporary
    name: عارضی شے
    prompt: |
      ایک کپ، ایک اخبار، ایک ٹوپی۔ شے ایک جگہ کو نشان زد کرتی ہے۔ یہ عارضی ہے۔ مالک واپس آئے گا۔ دعویٰ کو دیکھیں۔ عارضی شے دوسروں سے کیا مطالبہ کرتی ہے؟ شے ایک جگہ رکھنے والی ہے۔
    follow_ups:
      - عارضی شے جگہ کو کیسے شکل دیتی ہے؟
      - اس کے بغیر جگہ کیسی ہوگی؟
      - عارضی اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_rhythm
    name: راستے کا تال
    prompt: |
      پیوست پر پاؤں۔ تال انفرادی ہے—تیز، سست، بے ترتیب۔ راستہ بہت سے تال رکھتا ہے۔ ہم آہنگی اور ٹکر کو دیکھیں۔ تال کیا ظاہر کرتی ہے؟
    follow_ups:
      - تال واک کو کیسے شکل دیتی ہے؟
      - خاموشی میں راستہ کیسا ہوگا؟
      - تال اور منزل کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_face
    name: بینچ کا رخ
    prompt: |
      بینچ ایک سمت کا سامنا کر رہی ہے—منظر، سورج، ہجوم۔ رخ تجربے کو شکل دیتا ہے۔ دیکھیں کون کون سی بینچ چنتا ہے۔ رخ ڈیزائن ہے۔ یہ کیا فرض کرتا ہے؟
    follow_ups:
      - یہ رخ بینچ کو کیسے شکل دیتا ہے؟
      - سمت کے بغیر بینچ کیسی ہوگی؟
      - رخ اور منظر کے درمیان کیا تعلق ہے؟
  - id: hi_ps_sidewalk_dance
    name: فٹ پاتھ کا رقص
    prompt: |
      دو لوگ قریب آتے ہیں۔ رقص—کون حرکت کرتا ہے؟ فٹ پاتھ کا رقص عالمگیر ہے۔ سائیڈ سٹیپ کو دیکھیں۔ رقص غیر کہی ہوئی ہے۔ اس کے لیے کیا ضروری ہے؟
    follow_ups:
      - رقص واک کو کیسے شکل دیتا ہے؟
      - اس کے بغیر فٹ پاتھ کیسا ہوگا؟
      - رقص اور تہذیب کے درمیان کیا تعلق ہے؟
  - id: hi_ps_object_abandoned
    name: چھوڑی ہوئی شے
    prompt: |
      زمین پر دستانہ۔ بینچ پر سکارف۔ شے چھوڑی ہوئی ہے۔ اسے دیکھیں۔ کس نے چھوڑی؟ کون اٹھائے گا؟ چھوڑی ہوئی شے ایک چھوٹا سا معمہ ہے۔ یہ کیا ظاہر کرتی ہے؟
    follow_ups:
      - چھوڑی ہوئی شے جگہ کو کیسے شکل دیتی ہے؟
      - ایسی اشیاء کے بغیر جگہ کیسی ہوگی؟
      - چھوڑی ہوئی اور نقصان کے درمیان کیا تعلق ہے؟
  - id: hi_ps_pathway_surface
    name: راستے کی سطح
    prompt: |
      پیوست، بجری، گھاس۔ سطح واک کو متاثر کرتی ہے۔ انتخاب کو دیکھیں۔ سطح جسم سے کیا مطالبہ کرتی ہے؟ سطح ڈیزائن ہے۔ یہ کیا ممکن بناتی ہے؟
    follow_ups:
      - سطح واک کو کیسے شکل دیتی ہے؟
      - مختلف سطح کے ساتھ راستہ کیسا ہوگا؟
      - سطح اور رسائی کے درمیان کیا تعلق ہے؟
  - id: hi_ps_bench_weather
