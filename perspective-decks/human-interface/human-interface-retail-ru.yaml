# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Человеческий интерфейс — Ритейл (Russian)

id: human_interface_retail
name: Человеческий интерфейс — Ритейл
description: |
  50 карточек, чтобы изменить ваше восприятие пространства магазина — от
  проходов и хореографии осмотра товаров до примерочных и танца покупки.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: Поток в проходе
    prompt: |
      Проход направляет движение. Тележки движутся в одном направлении;
      люди маневрируют. Наблюдайте за потоком. Кто уступает? Кто
      препятствует? Проход имеет свою физику. Какие правила управляют
      этим танцем?
    follow_ups:
      - Как проход влияет на процесс осмотра товаров?
      - Каким был бы магазин без проходов?
      - Какова связь между потоком и дизайном?
  - id: hi_rt_browsing_choreography
    name: Хореография осмотра
    prompt: |
      Пальцы касаются ткани. Глаза сканируют полки. Осмотр товаров имеет
      свой ритм — пауза, обдумывание, движение дальше. Наблюдайте за
      хореографией. Что делает тело, когда оно не покупает?
    follow_ups:
      - Как осмотр товаров формирует опыт?
      - Каким был бы магазин без осмотра товаров?
      - Какова связь между осмотром и желанием?
  - id: hi_rt_fitting_room
    name: Примерная комната
    prompt: |
      Занавеска закрывается. Примерная комната — это порог, от
      общественного к личному. Внутри вы примеряете возможное "я".
      Наблюдайте за возвращением. Что говорит лицо? Примерная комната —
      это сцена для принятия решений.
    follow_ups:
      - Как примерная комната влияет на покупку?
      - Каким был бы магазин без нее?
      - Какова связь между примеркой и идентичностью?
  - id: hi_rt_dance_of_purchase
    name: Танец покупки
    prompt: |
      Подход, выбор, переноска, оплата. Покупка имеет свои шаги.
      Наблюдайте за последовательностью. Где люди колеблются? Танец
      хореографируется магазином. Что он извлекает?
    follow_ups:
      - Как танец влияет на результат?
      - Каким был бы магазин без этой последовательности?
      - Какова связь между танцем и желанием?
  - id: hi_rt_cart_territory
    name: Территория тележки
    prompt: |
      Тележка расширяет тело. Она вмещает выбор, блокирует проход.
      Наблюдайте за траекторией тележки. Тележка — это мобильная
      территория. Что она занимает?
    follow_ups:
      - Как тележка влияет на движение?
      - Каким был бы магазин без тележек?
      - Какова связь между тележкой и накоплением?
  - id: hi_rt_endcap_display
    name: Торцевая выкладка
    prompt: |
      Конец прохода занимает выкладка — импульсная, распродажная,
      сезонная. Торцевая выкладка привлекает внимание. Наблюдайте, кто
      останавливается. Торцевая выкладка — это ловушка. Что она делает?
    follow_ups:
      - Как торцевая выкладка влияет на осмотр товаров?
      - Каким был бы проход без нее?
      - Какова связь между выкладкой и импульсом?
  - id: hi_rt_checkout_line
    name: Очередь на кассе
    prompt: |
      Формируется очередь. Конфеты, журналы, последние шансы. Касса —
      это финальное испытание. Наблюдайте за ожиданием. Что делают
      люди? Очередь — это порог между осмотром и выходом.
    follow_ups:
      - Как очередь влияет на покупку?
      - Каким был бы магазин без ожидания?
      - Какова связь между очередью и импульсом?
  - id: hi_rt_shelf_height
    name: Высота полки
    prompt: |
      Уровень глаз продает. Высота полки — это дизайн. Наблюдайте, что
      где находится. Что внизу? Что наверху? Высота кодирует ценность.
      Что она предполагает о теле?
    follow_ups:
      - Как высота полки влияет на осмотр товаров?
      - Каким был бы магазин с одинаковой высотой полок?
      - Какова связь между высотой и доступом?
  - id: hi_rt_price_tag
    name: Ценник
    prompt: |
      На ценнике указана цена. Иногда скрытая, иногда заметная.
      Наблюдайте за размещением. Что ценник делает с моментом прикосновения?
    follow_ups:
      - Как ценник влияет на решение?
      - Каким был бы товар без ценника?
      - Какова связь между ценником и стоимостью?
  - id: hi_rt_store_entrance
    name: Вход в магазин
    prompt: |
      Дверь открывается. Вы входите. Вход — это порог. Наблюдайте, что
      вы видите первым. Вход задает тон. Что магазин хочет, чтобы вы
      почувствовали?
    follow_ups:
      - Как вход влияет на визит?
      - Каким был бы магазин без дизайна?
      - Какова связь между входом и ожиданиями?
  - id: hi_rt_sales_associate
    name: Продавец-консультант
    prompt: |
      "Могу ли я вам чем-нибудь помочь?" Предложение заранее
      сформулировано. Наблюдайте за обменом. Принимаете или отказываетесь?
      Консультант — это проводник и давление. Что делает это предложение?
    follow_ups:
      - Как консультант влияет на осмотр товаров?
      - Каким был бы магазин без них?
      - Какова связь между предложением и обязательством?
  - id: hi_rt_basket_versus_cart
    name: Корзина против тележки
    prompt: |
      Корзина для нескольких предметов. Тележка — для большего. Выбор
      предсказывает покупку. Наблюдайте, кто что берет. Корзина
      ограничивает; тележка приглашает. Что позволяет сделать выбор?
    follow_ups:
      - Как корзина влияет на визит?
      - Каким был бы магазин только с тележками?
      - Какова связь между емкостью и накоплением?
  - id: hi_rt_return_counter
    name: Стол возврата
    prompt: |
      Очередь на возврат отличается. Люди несут пакеты, чеки, сожаление.
      Возврат — это обратный ход. Наблюдайте за обменом. Каковы
      эмоциональные, социальные затраты возврата? Стол возврата — это
      место аннулирования.
    follow_ups:
      - Как возврат влияет на отношения?
      - Каким был бы магазин без возвратов?
      - Какова связь между возвратом и доверием?
  - id: hi_rt_dressing_room_limit
    name: Ограничение примерной комнаты
    prompt: |
      "Максимум шесть предметов". Ограничение контролирует примерку.
      Наблюдайте за переговорами. Что происходит, когда у вас семь?
      Ограничение формирует опыт примерной комнаты. Что оно предполагает?
    follow_ups:
      - Как ограничение влияет на примерку?
      - Каким был бы примерная комната без него?
      - Какова связь между ограничением и кражей?
  - id: hi_rt_impulse_buy
    name: Импульсная покупка
    prompt: |
      Товар не был в списке. Он привлек внимание. Импульсная покупка —
      это момент уступки. Наблюдайте, когда это происходит. Что это
      вызвало? Импульс — это встреча дизайна и желания.
    follow_ups:
      - Как импульс влияет на покупку?
      - Каким был бы магазин без импульса?
      - Какова связь между импульсом и сожалением?
  - id: hi_rt_store_music
    name: Музыка в магазине
    prompt: |
      Играет музыка — медленная, знакомая, продуманная. Музыка влияет
      на настроение и темп. Наблюдайте за темпом. Быстрый магазин,
      медленная музыка? Музыка — это невидимый дизайн. Что она делает
      с телом?
    follow_ups:
      - Как музыка влияет на визит?
      - Каким был бы магазин в тишине?
      - Какова связь между музыкой и длительностью?
  - id: hi_rt_mannequin
    name: Манекен
    prompt: |
      Манекен носит одежду. Это идеальное тело, предложение.
      Наблюдайте, как люди смотрят на него. Манекен — это зеркало и
      фантазия. Что он обещает?
    follow_ups:
      - Как манекен влияет на осмотр товаров?
      - Каким был бы магазин без него?
      - Какова связь между манекеном и желанием?
  - id: hi_rt_sample_station
    name: Стойка с образцами
    prompt: |
      Попробуйте это. Пощупайте это. Образец приглашает к прикосновению.
      Стойка создает паузу. Наблюдайте, кто останавливается. Образец —
      это маленький подарок. Что он извлекает?
    follow_ups:
      - Как образец влияет на покупку?
      - Каким был бы магазин без образцов?
      - Какова связь между образцом и обязательством?
  - id: hi_rt_sale_rack
    name: Вешалка с распродажей
    prompt: |
      Вешалка с распродажей — это хаос: со скидкой, мятое. Люди роются.
      Вешалка с распродажей — это другой вид осмотра. Наблюдайте за
      поведением. Что скидка делает с прикосновением?
    follow_ups:
      - Как вешалка с распродажей влияет на визит?
      - Каким был бы магазин без нее?
      - Какова связь между распродажей и стоимостью?
  - id: hi_rt_mirror_encounter
    name: Встреча с зеркалом
    prompt: |
      Вы видите себя в зеркале магазина. Встреча неизбежна.
      Наблюдайте за взглядом. Что вы проверяете? Зеркало — это тест.
      Магазин предоставляет зеркало. Чего он хочет?
    follow_ups:
      - Как зеркало влияет на примерку?
      - Каким был бы примерная комната без него?
      - Какова связь между зеркалом и собой?
  - id: hi_rt_cashier_small_talk
    name: Светская беседа с кассиром
    prompt: |
      "Все нашли?" — спрашивает кассир. Светская беседа
      сформулирована. Наблюдайте за обменом. Что делает этот вопрос?
      Кассир — это последний человеческий контакт. Что создает этот разговор?
    follow_ups:
      - Как светская беседа влияет на выход?
      - Каким был бы расчет без нее?
      - Какова связь между разговором и транзакцией?
  - id: hi_rt_store_layout
    name: Планировка магазина
    prompt: |
      Путь спроектирован. Основные товары сзади. Импульсные покупки —
      спереди. Планировка создает хореографию визита. Наблюдайте за
      своим маршрутом. Что хотел, чтобы вы прошли, дизайнер?
    follow_ups:
      - Как планировка влияет на осмотр товаров?
      - Каким был бы магазин со случайной планировкой?
      - Какова связь между планировкой и демонстрацией?
  - id: hi_rt_touch_decide
    name: Прикоснись и реши
    prompt: |
      Пальцы касаются ткани, поверхности. Прикосновение решает.
      Наблюдайте за моментом. Что узнает рука, чего не видит глаз?
      Прикосновение — это порог. Что оно требует?
    follow_ups:
      - Как прикосновение влияет на решение?
      - Каким был бы магазин без прикосновений?
      - Какова связь между прикосновением и обязательством?
  - id: hi_rt_receipt_handoff
    name: Передача чека
    prompt: |
      Предлагается чек — в пакете или отдельно. Одни берут, другие
      отказываются. Чек — это доказательство и запись. Наблюдайте за
      обменом. Что чек делает для транзакции?
    follow_ups:
      - Как чек влияет на выход?
      - Каким был бы расчет без него?
      - Какова связь между чеком и завершением?
  - id: hi_rt_store_exit
    name: Выход из магазина
    prompt: |
      Дверь открывается. Вы выходите с пакетом — или с пустыми руками.
      Выход — это порог. Наблюдайте за чувством. Что извлекает выход?
      Выход — это конец танца. Что остается?
    follow_ups:
      - Как выход влияет на визит?
      - Каким был бы магазин без двери?
      - Какова связь между выходом и удовлетворением?
  - id: hi_rt_loyalty_card_ask
    name: Вопрос о карте лояльности
    prompt: |
      "У вас есть наша карта лояльности?" Вопрос рутинный.
      Наблюдайте за ответом. Да, нет, зарегистрироваться. Карта лояльности
      продлевает отношения. Что создает этот вопрос?
    follow_ups:
      - Как карта лояльности влияет на транзакцию?
      - Каким был бы расчет без нее?
      - Какова связь между картой и данными?
  - id: hi_rt_abandoned_cart
    name: Брошенная тележка
    prompt: |
      Тележка стоит в проходе — полная, без присмотра. Тележка брошена.
      Наблюдайте за содержимым. Что они рассматривали? Брошенная тележка —
      это момент "нет". Что она раскрывает?
    follow_ups:
      - Как брошенная тележка влияет на магазин?
      - Чему бы магазин научился из нее?
      - Какова связь между брошенным и желанием?
  - id: hi_rt_fitting_room_opinion
    name: Мнение из примерочной
    prompt: |
      "Как это выглядит?" — спрашивает кто-то из-за занавески. Мнение
      востребовано. Примерная комната становится социальной. Наблюдайте
      за обменом. Что делает мнение?
    follow_ups:
      - Как мнение влияет на решение?
      - Каким была бы примерка в одиночестве?
      - Какова связь между мнением и покупкой?
  - id: hi_rt_store_scent
    name: Аромат магазина
    prompt: |
      В магазине есть запах — парфюм, кожа, чистота. Запах
      спроектирован. Он проникает, прежде чем вы его заметите.
      Наблюдайте, когда вы его чувствуете. Что делает запах с телом?
    follow_ups:
      - Как аромат влияет на визит?
      - Каким был бы магазин без него?
      - Какова связь между ароматом и памятью?
  - id: hi_rt_compare_prices
    name: Сравнение цен
    prompt: |
      Телефон в руке. Сканирование. Проверка цены — это исследование.
      Наблюдайте за моментом. Что раскрывает телефон? Сравнение
      происходит в проходе. Что оно делает с решением?
    follow_ups:
      - Как сравнение влияет на покупку?
      - Каким был бы магазин без телефонов?
      - Какова связь между сравнением и властью?
  - id: hi_rt_window_display
    name: Витрина
    prompt: |
      Витрина выходит на улицу. Манекены, реквизит, история. Витрина
      останавливает прохожих. Наблюдайте, что привлекает взгляд. Витрина —
      это приглашение. Что она обещает?
    follow_ups:
      - Как витрина влияет на вход?
      - Каким был бы магазин без нее?
      - Какова связь между витриной и желанием?
  - id: hi_rt_size_search
    name: Поиск размера
    prompt: |
      Пальцы перебирают вешалки. Ищут размер. Поиск имеет свой ритм.
      Наблюдайте за разочарованием или облегчением. Размер — это врата.
      Что требует поиск?
    follow_ups:
      - Как поиск размера влияет на осмотр товаров?
      - Каким был бы магазин, если бы все размеры были видны?
      - Какова связь между размером и телом?
  - id: hi_rt_payment_choice
    name: Выбор способа оплаты
    prompt: |
      Карта, наличные, телефон. Выбор способа оплаты — это момент
      транзакции. Наблюдайте за методом. Выбор — это привычка и
      идентичность. Что сообщает способ оплаты?
    follow_ups:
      - Как оплата влияет на расчет?
      - Каким был бы магазин с одним способом оплаты?
      - Какова связь между оплатой и скоростью?
  - id: hi_rt_store_regular
    name: Постоянный покупатель
    prompt: |
      Постоянный покупатель знает планировку. Он движется целенаправленно.
      Консультант кивает. Наблюдайте за постоянным покупателем. Что он
      знает, чего не знает новичок? Постоянный покупатель имеет
      отношение к пространству.
    follow_ups:
      - Как постоянный покупатель влияет на магазин?
      - Каким был бы магазин без постоянных покупателей?
      - Какова связь между постоянным покупателем и лояльностью?
  - id: hi_rt_bag_handoff
    name: Передача пакета
    prompt: |
      Пакет передается — полный, брендированный. Передача завершает
      транзакцию. Наблюдайте за обменом. Что пакет делает для выхода?
      Пакет — это доказательство и бремя.
    follow_ups:
      - Как пакет влияет на выход?
      - Каким была бы покупка без него?
      - Какова связь между пакетом и идентичностью?
  - id: hi_rt_fitting_room_overflow
    name: Переполнение примерочной
    prompt: |
      Слишком много предметов. Консультант берет лишнее. "Я их подержу".
      Лишнее — это доверие. Наблюдайте за обменом. Что держит
      консультант? Лишнее расширяет примерку. Что оно позволяет?
    follow_ups:
      - Как переполнение влияет на примерку?
      - Каким был бы примерная комната без него?
      - Какова связь между переполнением и доверием?
  - id: hi_rt_store_lighting
    name: Освещение магазина
    prompt: |
      Освещение спроектировано — льстивое, яркое, теплое. Освещение
      влияет на то, как все выглядит. Наблюдайте за зеркалом при таком
      освещении. Что делает освещение с лицом, с тканью?
    follow_ups:
      - Как освещение влияет на покупку?
      - Каким был бы магазин при резком свете?
      - Какова связь между светом и правдой?
  - id: hi_rt_aisle_block
    name: Блокировка прохода
    prompt: |
      Кто-то стоит в проходе. Вам нужно пройти. Блокировка —
      неосознанная или намеренная. Наблюдайте за переговорами. "Простите".
      Блокировка — это небольшое трение. Что оно требует?
    follow_ups:
      - Как блокировка влияет на поток?
