# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人机交互 — 交通枢纽 (Mandarin Chinese)

id: human_interface_transit_hub
name: 人机交互 — 交通枢纽
description: 50 张卡片，改变您看待交通枢纽的方式 — 从站台和候车，到抵达/出发的客流，以及陌生人在旅途中的协作。
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: 站台边缘
    prompt: |
      站台边缘是一道门槛。黄线、空隙、轨道。人们站着，距离各不相同。有的前倾；有的后退。观察分布。边缘意味着什么？
    follow_ups:
      - 边缘如何塑造期待？
      - 没有这条线，站台会是怎样？
      - 边缘与风险的关系是什么？
  - id: hi_th_waiting_posture
    name: 等待的姿态
    prompt: |
      人们在等待时摆出各种姿势 — 一只脚着地，手中拿着手机，包放在脚间。姿势编码了时长。谁看起来有耐心？谁看起来焦躁不安？等待有其肢体语言。
    follow_ups:
      - 姿态如何揭示期望？
      - 没有等待，站台会是怎样？
      - 姿态与时间的关系是什么？
  - id: hi_th_arrival_flow
    name: 抵达客流
    prompt: |
      车门打开。人们涌出 — 逆着上车的人流。客流具有物理性。观察碰撞、侧身、汇合。什么样的规则支配着这种交换？
    follow_ups:
      - 客流如何塑造站台？
      - 如果所有人都匆忙挤上车会怎样？
      - 客流与效率的关系是什么？
  - id: hi_th_strangers_transit
    name: 旅途中的陌生人
    prompt: |
      您与一群您再也不会见到的人共处一节车厢。近距离却无关联。观察这种紧凑。陌生人之间应该互相尊重什么？交通车厢是一个临时社会。
    follow_ups:
      - 交通如何创造临时社区？
      - 如果车厢里充满交谈会怎样？
      - 陌生人与文明的关系是什么？
  - id: hi_th_departure_board
    name: 离站显示屏
    prompt: |
      时间、站台、延误 — 显示屏是真相的来源。人们抬头看它。显示屏决定了行动。观察集体的目光。显示屏对人群做了什么？
    follow_ups:
      - 显示屏如何塑造行为？
      - 没有它，枢纽会是怎样？
      - 显示与信任的关系是什么？
  - id: hi_th_escalator_stand
    name: 自动扶梯站立
    prompt: |
      右侧站立，左侧行走 — 或反之，取决于城市。自动扶梯有其规则。观察谁遵守了它们。自动扶梯是一个移动的队列。规则带来了什么？
    follow_ups:
      - 自动扶梯规则如何塑造客流？
      - 如果所有人都站着不动会怎样？
      - 规则与效率的关系是什么？
  - id: hi_th_ticket_gate
    name: 检票闸机
    prompt: |
      闸机读取卡片，发出“哔”声，然后打开。闸机是一个检查点。它分隔了付费者和未付费者。观察节奏。谁会卡住？谁能顺利通过？闸机是一场考验。
    follow_ups:
      - 闸机如何塑造旅程？
      - 没有闸机，枢纽会是怎样？
      - 闸机与归属感的关系是什么？
  - id: hi_th_luggage_drag
    name: 行李拖拽
    prompt: |
      轮子在瓷砖上滑动。行李箱跟着移动。拖拽的痕迹标记着旅客的路径。行李是身体的延伸。观察这份负担。行李诉说着旅程的什么？
    follow_ups:
      - 行李如何塑造移动？
      - 没有行李，枢纽会是怎样？
      - 负担与目的地的关系是什么？
  - id: hi_th_bench_occupation
    name: 长椅占用
    prompt: |
      长椅沿站台排列。有些人坐着；有些人站在旁边。长椅是一种稀缺资源。观察谁占用了它。他们待了多久？长椅是一个小领地。
    follow_ups:
      - 长椅如何塑造等待？
      - 没有长椅，站台会是怎样？
      - 座位与时长的关系是什么？
  - id: hi_th_announcement_voice
    name: 播报声音
    prompt: |
      “下一班火车……” 声音是自动的还是人为的。它穿透喧嚣。播报创造了共享信息。观察谁在听。谁已经查看了手机？
    follow_ups:
      - 播报如何塑造人群？
      - 没有播报，枢纽会是怎样？
      - 声音与权威的关系是什么？
  - id: hi_th_door_positioning
    name: 车门定位
    prompt: |
      常客知道车门会在哪里打开。他们会提前站好位置。新来的人只能猜测。定位是一种策略。观察这种聚集。位置决定了什么？
    follow_ups:
      - 定位如何塑造上车？
      - 如果车门是随机打开的，站台会是怎样？
      - 位置与优势的关系是什么？
  - id: hi_th_handrail_grip
    name: 扶手抓握
    prompt: |
      车厢内，手抓住了扶手。抓握是安全感。观察谁抓着，谁不需要。扶手是一个共享物品。抓握揭示了什么？
    follow_ups:
      - 扶手如何塑造稳定？
      - 没有扶手，车厢会是怎样？
      - 抓握与信任的关系是什么？
  - id: hi_th_window_reflection
    name: 车窗倒影
    prompt: |
      车窗映出隧道、站台，以及您自己的脸。倒影是无法避免的。人们看着自己，或避开它。观察倒影与目光的关系。
    follow_ups:
      - 倒影如何塑造自我意识？
      - 没有车窗，旅程会是怎样？
      - 倒影与隐私的关系是什么？
  - id: hi_th_seat_offer
    name: 让座
    prompt: |
      有人给老人、有小孩的家长让座。让座是一种小小的道德行为。观察它何时发生。谁提供？谁接受？座位是一种馈赠。
    follow_ups:
      - 让座如何塑造车厢？
      - 没有这样的让座，旅程会是怎样？
      - 提供与关怀的关系是什么？
  - id: hi_th_delay_sigh
    name: 延误叹息
    prompt: |
      “延误了。” 集体的叹息。延误是一种共同的命运。陌生人交换眼神。延误创造了团结的时刻。观察这种转变。延误对人群做了什么？
    follow_ups:
      - 延误如何塑造等待？
      - 没有延误，枢纽会是怎样？
      - 延误与沮丧的关系是什么？
  - id: hi_th_backpack_turn
    name: 背包转向
    prompt: |
      在拥挤的车厢里，有人把背包转到前面。转向是一种体贴。它创造了空间。观察谁这么做。背包转向是一种小小的社会契约。
    follow_ups:
      - 转向如何塑造近距离？
      - 没有转向，车厢会是怎样？
      - 转向与意识的关系是什么？
  - id: hi_th_exit_anticipation
    name: 出站期待
    prompt: |
      随着站点临近，人们聚集在门口。期待是显而易见的。身体移动。门将要打开。观察准备。期待需要什么？
    follow_ups:
      - 期待如何塑造出站？
      - 没有准备，站点会是怎样？
      - 期待与客流的关系是什么？
  - id: hi_th_transfer_corridor
    name: 换乘通道
    prompt: |
      通道连接着不同的线路。人们带着目的行走。换乘是一种过渡 — 在系统之间，在等待之间。观察节奏。通道有其自身的韵律。
    follow_ups:
      - 通道如何塑造旅程？
      - 没有换乘，枢纽会是怎样？
      - 通道与连接的关系是什么？
  - id: hi_th_phone_glow
    name: 手机的光芒
    prompt: |
      在昏暗的车厢里，脸庞因手机而发光。光芒是个人化的。每个人都有自己的光。观察这种分布。手机在公共场合创造了私人空间。
    follow_ups:
      - 手机如何塑造旅程？
      - 没有手机，车厢会是怎样？
      - 光芒与孤立的关系是什么？
  - id: hi_th_stroller_navigation
    name: 婴儿车导航
    prompt: |
      一位家长推着婴儿车穿过人群。导航很微妙。人们让路。婴儿车改变了客流。观察这种迁就。婴儿车需要什么？
    follow_ups:
      - 婴儿车如何塑造人群？
      - 没有婴儿车，枢纽会是怎样？
      - 婴儿车与关怀的关系是什么？
  - id: hi_th_vendor_station
    name: 售卖点
    prompt: |
      一个报刊亭售卖咖啡、零食、报纸。售卖员服务于赶路的人。交易很快。观察这种交换。售卖员是客流中的一个孤岛。
    follow_ups:
      - 售卖员如何塑造枢纽？
      - 没有售卖员，枢纽会是怎样？
      - 售卖员与等待的关系是什么？
  - id: hi_th_track_gap
    name: 站台与列车间的空隙
    prompt: |
      小心空隙。站台与车厢之间的空间是危险的。人们跨过它。空隙大小不一。观察这种谨慎。空隙要求身体如何应对？
    follow_ups:
      - 空隙如何塑造上车？
      - 没有空隙，站台会是怎样？
      - 空隙与注意力的关系是什么？
  - id: hi_th_schedule_check
    name: 查看时刻表
    prompt: |
      手指敲击手机。应用程序显示时间。查看时刻表是持续不断的。它减少了不确定性。观察这种节奏。人们多久查看一次？
    follow_ups:
      - 时刻表如何塑造等待？
      - 没有应用程序，枢纽会是怎样？
      - 查看与控制的关系是什么？
  - id: hi_th_crowd_density
    name: 人群密度
    prompt: |
      高峰时段人潮拥挤站台。身体紧贴。密度有其极限。观察边界。何时会变得难以忍受？人群具有物理性。
    follow_ups:
      - 密度如何塑造体验？
      - 低密度下的枢纽会是怎样？
      - 密度与宽容的关系是什么？
  - id: hi_th_sleeping_commuter
    name: 睡着的通勤者
    prompt: |
      有人睡着了 — 头靠着车窗，靠在陌生人的肩膀上。睡着是信任还是疲惫。观察这种脆弱。睡眠对车厢意味着什么？
    follow_ups:
      - 睡着的人如何塑造空间？
      - 没有睡着的人，旅程会是怎样？
      - 睡眠与安全的关系是什么？
  - id: hi_th_map_consultation
    name: 查看地图
    prompt: |
      一位游客盯着墙上的地图。地图是救命稻草。其他人从旁流过。查看需要时间。观察这种停顿。地图提供了什么？
    follow_ups:
      - 地图如何塑造旅程？
      - 没有地图，枢纽会是怎样？
      - 地图与信心的关系是什么？
  - id: hi_th_platform_change
    name: 站台变更
    prompt: |
      “站台变更。” 人群移动。变更是一种干扰。人们匆忙。观察这种混乱。变更从人群中榨取了什么？
    follow_ups:
      - 变更如何塑造客流？
      - 没有变更，枢纽会是怎样？
      - 变更与压力的关系是什么？
  - id: hi_th_briefcase_clutch
    name: 手提箱紧握
    prompt: |
      手提箱被紧紧抓住 — 夹在脚间，放在腿上。它装着贵重物品。紧握是保护性的。观察这种抓握。手提箱对持有者意味着什么？
    follow_ups:
      - 手提箱如何塑造旅程？
      - 没有手提箱，车厢会是怎样？
      - 紧握与身份的关系是什么？
  - id: hi_th_door_hold
    name: 挽留车门
    prompt: |
      有人为后面的人挽留车门。火车即将发车。挽留是一种风险和礼貌。观察这种交换。挽留的代价是什么？
    follow_ups:
      - 挽留如何塑造上车？
      - 没有挽留，站台会是怎样？
      - 挽留与文明的关系是什么？
  - id: hi_th_standing_balance
    name: 站立平衡
    prompt: |
      火车启动。站着的乘客调整重心。平衡是动态的。没有人抓着扶手。观察微调。身体逐渐适应了这种运动。
    follow_ups:
      - 平衡如何塑造旅程？
      - 如果有更多座位，车厢会是怎样？
      - 平衡与习惯的关系是什么？
  - id: hi_th_conversation_overhear
    name: 偷听谈话
    prompt: |
      两个人说话。您听到片段。谈话是私密的，但又是公开的。观察这种界限。陌生人在旅途中会了解彼此什么？
    follow_ups:
      - 偷听如何塑造旅程？
      - 没有谈话，车厢会是怎样？
      - 偷听与亲密的关系是什么？
  - id: hi_th_ticket_inspection
    name: 检票
    prompt: |
      检票员在车厢里巡视。“请出示车票。” 检票是随机的还是系统的。观察回应。谁准备好了？谁会卡住？检票是对合法性的考验。
    follow_ups:
      - 检票如何塑造旅程？
      - 没有检票，系统会是怎样？
      - 检票与信任的关系是什么？
  - id: hi_th_station_name_glance
    name: 瞥一眼站名
    prompt: |
      站名一闪而过 — 在墙上，在标志上。常客知道。新来的人看着。瞥一眼便能定位。观察谁在看。站名做了什么？
    follow_ups:
      - 站名如何塑造定位？
      - 没有标志，旅程会是怎样？
      - 站名与地点的关系是什么？
  - id: hi_th_benchmark_regular
    name: 标杆常客
    prompt: |
      常客知道其规律。他们正好准时到达。无需等待。常客已经内化了时刻表。观察这种自信。常客知道什么？
    follow_ups:
      - 常客如何塑造枢纽？
      - 没有常客，枢纽会是怎样？
      - 常客与熟练度的关系是什么？
  - id: hi_th_lost_look
    name: 迷茫的眼神
    prompt: |
      有人看起来迷茫 — 头部转动，步伐不确定。眼神是显而易见的。观察肢体语言。谁会帮助？谁会忽视？迷茫的眼神是一种信号。它会招致什么？
    follow_ups:
      - 迷茫的眼神如何塑造枢纽？
      - 没有迷茫的人，枢纽会是怎样？
      - 迷茫与帮助的关系是什么？
  - id: hi_th_earbud_insert
    name: 塞入耳塞
    prompt: |
      耳塞戴上。世界退去。塞入是一种界限。佩戴者在场却又缺席。观察这种转变。耳塞创造了什么？
    follow_ups:
      - 耳塞如何塑造旅程？
      - 没有耳塞，车厢会是怎样？
      - 耳塞与隐私的关系是什么？
  - id: hi_th_rush_hour_pack
    name: 高峰客流挤压
    prompt: |
      车厢挤满了人。身体紧贴。挤压是不可避免的。观察这种容忍度。人们如何应对近距离？挤压有其自身的礼仪。
    follow_ups:
      - 挤压如何塑造旅程？
      - 没有挤压，高峰时段会是怎样？
      - 挤压与耐力的关系是什么？
  - id: hi_th_destination_ask
    name: 询问目的地
    prompt: |
      “这是去X的火车吗？” 一个陌生人问道。另一个人回答。这样的询问创造了联系的瞬间。观察这种交换。询问需要什么？
    follow_ups:
      - 询问如何塑造车厢？
      - 没有这样的询问，旅程会是怎样？
      - 询问与信任的关系是什么？
  - id: hi_th_platform_choice
    name: 站台选择
    prompt: |
      两个站台，同一目的地。一个更近；一个更不拥挤。选择是一种策略。观察谁去哪边。什么决定了选择？
    follow_ups:
      - 选择如何塑造人群？
      - 如果只有一个站台，枢纽会是怎样？
      - 选择与结果的关系是什么？
  - id: hi_th_wipe_down_seat
    name: 擦拭座位
    prompt: |
      有人在坐下前擦拭座位。擦拭是一种预防。观察这个动作。擦拭假设了空间是怎样的？擦拭是一种小小的界限行为。
    follow_ups:
      - 擦拭如何塑造入座？
      - 没有这样的举动，车厢会是怎样？
      - 擦拭与清洁的关系是什么？
  - id: hi_th_standing_offer
    name: 主动让座
    prompt: |
      “你想坐吗？” 这个提议是向陌生人提出的。有时被接受，有时被拒绝。观察这种交换。提议意味着什么？
    follow_ups:
      - 提议如何塑造车厢？
      - 没有这样的提议，旅程会是怎样？
      - 提议与关怀的关系是什么？
  - id: hi_th_exit_block
    name: 出口阻塞
    prompt: |
      有人站在门口。其他人需要通过。阻塞是无意识的还是故意的。观察这种协商。人们如何通过？阻塞是一种小小的冲突。
    follow_ups:
      - 阻塞如何塑造出站？
      - 没有阻塞者，车厢会是怎样？
      - 阻塞与意识的关系是什么？
  - id: hi_th_train_rumble
    name: 火车轰鸣
    prompt: |
      火车轰鸣 — 轨道、车轮、运动。轰鸣声是持续不断的。它成为了背景。观察您何时注意到它。轰鸣声对身体做了什么？
    follow_ups:
      - 轰鸣如何塑造旅程？
      - 如果一片寂静，车厢会是怎样？
      - 轰鸣与节奏的关系是什么？
  - id: hi_th_connection_run
    name: 赶换乘
    prompt: |
      有人在跑 — 赶着换乘。跑步穿过人群。人们四散躲避。观察这种干扰。跑步从客流中榨取了什么？
    follow_ups:
      - 跑步如何塑造枢纽？
      - 没有跑步的人，枢纽会是怎样？
      - 跑步与紧迫感的关系是什么？
  - id: hi_th_seat_saving
    name: 占座
    prompt: |
      一个包放在座位上。“有人坐那儿。” 占座是为了缺席的同伴保留座位。观察这种主张。一个座位可以保留多久？有什么限制？
    follow_ups:
      - 占座如何塑造车厢？
      - 没有占座，旅程会是怎样？
      - 占座与特权的关系是什么？
  - id: hi_th_arrival_relief
    name: 抵达后的解脱
    prompt: |
      火车到达终点站。解脱感显而易见。肩膀放松。人们收拾行李。旅程结束了。观察这种转变。抵达提供了什么？
    follow_ups:
      - 抵达如何塑造出站？
      - 没有抵达，旅程会是怎样？
      - 解脱与完成的关系是什么？
  - id: hi_th_wayfinding_sign
    name: 导向标志
    prompt: |
      箭头指示。“前往列车。”“前往出口。” 标志引导着客流。观察谁跟着它们。谁忽视了？标志是一种建议。它假设了什么？
    follow_ups:
      - 标志如何塑造客流？
      - 没有标志，枢纽会是怎样？
      - 标志与信任的关系是什么？
  - id: hi_th_waiting_room
    name: 候车室
    prompt: |
      椅子相对而坐或面向显示屏。候车室容纳着处于旅程之间的人们。观察这种布置。谁坐着？谁在踱步？候车室是一个暂停。
    follow_ups:
      - 候车室如何塑造等待？
      - 没有候车室，枢纽会是怎样？
      - 房间与时长的关系是什么？
  - id: hi_th_stranger_proximity
    name: 陌生人的近距离
    prompt: |
      一个陌生人站得很近 — 在拥挤的人群中这是必要的。近距离是非个人化的，但又是亲密的。观察这种容忍度。身体允许什么？近距离是一种契约。
    follow_ups:
      - 近距离如何塑造旅程？
      - 如果有更多空间，车厢会是怎样？
      - 近距离与文明的关系是什么？
  - id: hi_th_last_train
    name: 末班车
    prompt: |
      末班车。人群不同 — 更晚，更松散。末班车有其自身的能量。观察这种转变。“末班”对人群做了什么？
    follow_ups:
      - 末班车如何塑造枢纽？
      - 没有末班车，夜晚会是怎样？
      - 末班与紧迫感的关系是什么？
  - id: hi_th_transit_tribe
    name: 交通部落
    prompt: |
      同一群人，同一条线路，同一时间。您认出一些面孔。您从不交谈。交通部落是一个无声的社区。观察这种识别。部落提供了什么？
    follow_ups:
      - 部落如何塑造通勤？
      - 没有熟悉的面孔，旅程会是怎样？
      - 部落与归属感的关系是什么？
