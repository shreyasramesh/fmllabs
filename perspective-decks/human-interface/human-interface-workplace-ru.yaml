# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Человеческий интерфейс — Рабочее место (Russian)

id: human_interface_workplace
name: Человеческий интерфейс — Рабочее место
description: 50 карточек, которые помогут вам по-новому взглянуть на рабочее место — от территорий за столом и переговорных комнат до кулера с водой и видимой или невидимой иерархии.
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: Территория за столом
    prompt: |
      Стол занят — фотографии, растения, кружки. Территория выходит за пределы
      поверхности. Наблюдайте за границами. Что обозначает "мое"? Стол — это
      маленькое королевство. Как оно защищается?
    follow_ups:
      - Как стол формирует идентичность?
      - Каким было бы рабочее место без персонализации?
      - Каковы отношения между территорией и принадлежностью?
  - id: hi_wp_meeting_room
    name: Переговорная комната
    prompt: |
      В комнате стол, стулья, экран. Дверь закрывается. Переговорная комната —
      это сцена для представления. Наблюдайте, кто говорит, кто нет. Комната
      содержит иерархию. Что позволяет пространство?
    follow_ups:
      - Как комната формирует встречу?
      - Каким было бы рабочее место без переговорных комнат?
      - Каковы отношения между комнатой и властью?
  - id: hi_wp_water_cooler
    name: Кулер с водой
    prompt: |
      Кулер с водой — это перекресток. Люди встречаются там случайно.
      Встреча неформальна. Наблюдайте за разговорами. Что говорят у кулера,
      чего не сказали бы на встрече?
    follow_ups:
      - Как кулер формирует культуру?
      - Каким было бы рабочее место без него?
      - Каковы отношения между кулером и связью?
  - id: hi_wp_visible_hierarchy
    name: Видимая иерархия
    prompt: |
      Кабинеты в углу, места у окна, кубиклы. Пространство кодирует ранг.
      Наблюдайте за распределением. Кто что получает? Иерархия встроена
      в архитектуру. Что она сообщает?
    follow_ups:
      - Как иерархия формирует поведение?
      - Каким было бы рабочее место без нее?
      - Каковы отношения между пространством и статусом?
  - id: hi_wp_invisible_hierarchy
    name: Невидимая иерархия
    prompt: |
      К некоторым прислушиваются; других перебивают. Иерархия
      не отражена в организационной структуре. Наблюдайте за встречами. Кто
      уступает? Кто доминирует? Невидимая иерархия формирует результаты.
    follow_ups:
      - Как возникает невидимая иерархия?
      - Каким было бы рабочее место, если бы она была видимой?
      - Каковы отношения между невидимым и властью?
  - id: hi_wp_cubicle_wall
    name: Стенка кубикла
    prompt: |
      Стенка низкая — ее можно переглядеть. Приватность частична. Кубикл —
      это компромисс. Наблюдайте за линиями обзора. Что вы слышите? Что
      вы видите? Стенка создает иллюзию границы.
    follow_ups:
      - Как кубикл формирует концентрацию?
      - Каким было бы рабочее место с полными стенами?
      - Каковы отношения между стенкой и приватностью?
  - id: hi_wp_corner_office
    name: Угловой кабинет
    prompt: |
      В угловом кабинете два окна. Это приз. Наблюдайте, кто его занимает.
      Угловой кабинет виден с этажа. Это символ. Что сообщает угол?
    follow_ups:
      - Как угловой кабинет формирует стремления?
      - Каким был бы этаж без него?
      - Каковы отношения между углом и авторитетом?
  - id: hi_wp_open_plan
    name: Открытый план
    prompt: |
      Нет стен. Столы в ряды или группы. Открытый план обещает сотрудничество.
      Наблюдайте за реальностью. Кто носит наушники? Открытый план создает
      близость. Чего это стоит?
    follow_ups:
      - Как открытый план формирует взаимодействие?
      - Каким было бы рабочее место со стенами?
      - Каковы отношения между открытым пространством и концентрацией?
  - id: hi_wp_calendar_invite
    name: Приглашение в календаре
    prompt: |
      Появляется приглашение. Принять, отклонить, возможно. Календарь структурирует
      день. Наблюдайте за блоками. Кто контролирует чье время? Календарь —
      это карта власти.
    follow_ups:
      - Как календарь формирует день?
      - Каким было бы рабочее место без него?
      - Каковы отношения между приглашением и обязательством?
  - id: hi_wp_knock_before_enter
    name: Постучать перед входом
    prompt: |
      Некоторые двери закрыты. Стук — это просьба. Наблюдайте, кто стучит
      и кто входит. Стук кодирует уважение. Что защищает закрытая дверь?
    follow_ups:
      - Как стук формирует встречу?
      - Каким было бы рабочее место с открытыми дверями?
      - Каковы отношения между стуком и границей?
  - id: hi_wp_headphones_signal
    name: Сигнал наушников
    prompt: |
      Наушники надеты — значит "не беспокоить". Сигнал универсален.
      Наблюдайте, кто его уважает. Наушники создают "пузырь". Что позволяет
      этот "пузырь"?
    follow_ups:
      - Как наушники формируют этаж?
      - Каким было бы рабочее место без них?
      - Каковы отношения между наушниками и концентрацией?
  - id: hi_wp_lunch_room
    name: Комната для обеда
    prompt: |
      В комнате для обеда столы, микроволновка, холодильник. Люди едят одни
      или вместе. Наблюдайте за группами. Кто с кем сидит? Комната для обеда
      раскрывает союзы. Что говорит расстановка?
    follow_ups:
      - Как комната для обеда формирует культуру?
      - Каким было бы рабочее место без нее?
      - Каковы отношения между обедом и связью?
  - id: hi_wp_slack_ping
    name: Оповещение в Slack
    prompt: |
      Приходит оповещение. Мгновенное, асинхронное. Оповещение может прервать
      или подождать. Наблюдайте за нормами. Кто отвечает немедленно? Оповещение
      создает новый ритм общения. Что оно заменяет?
    follow_ups:
      - Как оповещение формирует день?
      - Каким было бы рабочее место без него?
      - Каковы отношения между оповещением и срочностью?
  - id: hi_wp_whiteboard_claim
    name: Объявление на доске
    prompt: |
      Доска содержит идеи — схемы, списки. Кто-то их написал. Доска —
      это общая поверхность. Наблюдайте, кто пишет, кто стирает. Доска —
      это территория. Что она содержит?
    follow_ups:
      - Как доска формирует сотрудничество?
      - Какая была бы встреча без нее?
      - Каковы отношения между доской и мыслью?
  - id: hi_wp_elevator_encounter
    name: Встреча в лифте
    prompt: |
      Вы едете в лифте с коллегой. Тридцать секунд. Встреча неловкая или
      легкая. Наблюдайте за светской беседой. Что говорится? Лифт сжимает
      время. Что он требует?
    follow_ups:
      - Как лифт формирует встречу?
      - Какое было бы здание без лифтов?
      - Каковы отношения между лифтом и вежливостью?
  - id: hi_wp_cc_email
    name: Копия электронного письма
    prompt: |
      Вас поставили в копию. Вы не основной получатель. Копия включает вас
      в круг. Наблюдайте, кого ставят в копию. Копия — это сигнал релевантности
      или политики. Что делает копия?
    follow_ups:
      - Как копия формирует общение?
      - Каким было бы рабочее место без копий?
      - Каковы отношения между копией и видимостью?
  - id: hi_wp_standing_desk
    name: Стол для работы стоя
    prompt: |
      Стол поднимается. Работник стоит. Стол для работы стоя — это выбор —
      здоровье, предпочтение, производительность. Наблюдайте, у кого он есть.
      Что сигнализирует стол для работы стоя?
    follow_ups:
      - Как стол для работы стоя формирует тело?
      - Каким было бы рабочее место без него?
      - Каковы отношения между стоянием и продуктивностью?
  - id: hi_wp_conference_call
    name: Конференц-звонок
    prompt: |
      Голоса откуда-то еще. Звонок соединяет распределенных людей. Наблюдайте,
      кто говорит, кто выключает микрофон. Звонок — это частичное присутствие.
      Что позволяет звонок — и что теряется?
    follow_ups:
      - Как звонок формирует встречу?
      - Каким было бы рабочее место без него?
      - Каковы отношения между звонком и присутствием?
  - id: hi_wp_office_plant
    name: Офисное растение
    prompt: |
      Растение на столе — сциндапсус, суккулент. Это украшение и уход.
      Растение не принадлежит компании. Наблюдайте, у кого оно есть. Что
      добавляет растение в пространство?
    follow_ups:
      - Как растение формирует стол?
      - Каким было бы рабочее место без растений?
      - Каковы отношения между растением и идентичностью?
  - id: hi_wp_after_hours
    name: После рабочего дня
    prompt: |
      Офис после того, как большинство ушло. Освещение тусклое. Работник
      после рабочего дня виден — преданный делу или уставший. Наблюдайте
      за сценой. Что позволяет пустой офис? Чего это стоит?
    follow_ups:
      - Как рабочее время после окончания формирует культуру?
      - Каким было бы рабочее место без него?
      - Каковы отношения между часами и ожиданиями?
  - id: hi_wp_nameplate
    name: Табличка с именем
    prompt: |
      Имя на столе, на двери. Табличка с именем заявляет о территории.
      Наблюдайте, у кого она есть. Табличка с именем — это идентичность
      и территория. Что она сообщает проходящим мимо?
    follow_ups:
      - Как табличка с именем формирует пространство?
      - Каким было бы рабочее место без нее?
      - Каковы отношения между табличкой и присутствием?
  - id: hi_wp_meeting_overrun
    name: Задержка встречи
    prompt: |
      Встреча должна была закончиться. Но не закончилась. Задержка — это
      обычное дело. Наблюдайте за динамикой. У кого следующая встреча? Кто
      может остаться? Задержка — это ход власти. Что она извлекает?
    follow_ups:
      - Как задержка формирует день?
      - Каким было бы рабочее место со строгим окончанием?
      - Каковы отношения между задержкой и уважением?
  - id: hi_wp_quick_question
    name: Быстрый вопрос
    prompt: |
      "Есть быстрый вопрос?" Просьба прерывает. "Быстрый" — это обещание.
      Наблюдайте за обменом. Насколько он быстр? Быстрый вопрос — это
      переговоры о времени. Чего он стоит?
    follow_ups:
      - Как быстрый вопрос формирует поток?
      - Каким было бы рабочее место без прерываний?
      - Каковы отношения между скоростью и уважением?
  - id: hi_wp_bathroom_encounter
    name: Встреча в ванной
    prompt: |
      Вы видите коллегу в ванной. Встреча неоднозначна. Контакт глазами или
      нет? Ванная — это пограничное пространство. Наблюдайте за нормами.
      Что требует эта встреча?
    follow_ups:
      - Как ванная формирует рабочее место?
      - Каким было бы рабочее место без общих ванных комнат?
      - Каковы отношения между ванной и приватностью?
  - id: hi_wp_commute_talk
    name: Разговор о дороге на работу
    prompt: |
      "Как добрался?" Вопрос открывает светскую беседу. Дорога на работу —
      это общий опыт. Наблюдайте за обменом. Что дает разговор о дороге
      на работу для отношений?
    follow_ups:
      - Как разговор о дороге на работу формирует день?
      - Каким было бы рабочее место без него?
      - Каковы отношения между дорогой на работу и связью?
  - id: hi_wp_parking_spot
    name: Парковочное место
    prompt: |
      Зарезервированные места, места для первых прибывших. Парковка кодирует
      иерархию. Наблюдайте, кто где паркуется. Место — это небольшая привилегия.
      Что оно сообщает?
    follow_ups:
      - Как парковка формирует рабочее место?
      - Какая была бы стоянка без зарезервированных мест?
      - Каковы отношения между местом и статусом?
  - id: hi_wp_birthday_cake
    name: Торт на день рождения
    prompt: |
      Появляется торт. У кого-то день рождения. Команда собирается. Торт —
      это ритуал. Наблюдайте за сбором. Что дает момент дня рождения
      группе?
    follow_ups:
      - Как день рождения формирует культуру?
      - Каким было бы рабочее место без него?
      - Каковы отношения между тортом и принадлежностью?
  - id: hi_wp_forwarded_email
    name: Пересланное письмо
    prompt: |
      Письмо пересылается. "К сведению" или "Подумал, вам стоит это увидеть".
      Пересылка расширяет разговор. Наблюдайте, кому пересылают. Пересылка —
      это сигнал. Что она означает?
    follow_ups:
      - Как пересылка формирует общение?
      - Каким было бы рабочее место без нее?
      - Каковы отношения между пересылкой и доверием?
  - id: hi_wp_break_room
    name: Комната отдыха
    prompt: |
      Кофе, закуски, иногда диван. Комната отдыха — это пауза. Люди идут
      туда, чтобы отвлечься. Наблюдайте, кто ею пользуется. Комната отдыха —
      это убежище. Что она предоставляет?
    follow_ups:
      - Как комната отдыха формирует день?
      - Каким было бы рабочее место без нее?
      - Каковы отношения между перерывом и продуктивностью?
  - id: hi_wp_office_supply
    name: Канцелярские принадлежности
    prompt: |
      Ручки, бумага, степлеры — в шкафу для принадлежностей находятся инструменты.
      Кто-то ими распоряжается. Наблюдайте, кто что берет. Принадлежности —
      это маленький общий ресурс. Каковы правила?
    follow_ups:
      - Как принадлежности формируют рабочее место?
      - Каким было бы рабочее место без них?
      - Каковы отношения между принадлежностями и правом на них?
  - id: hi_wp_remote_camera
    name: Удаленная камера
    prompt: |
      Камера включена или выключена. Удаленный работник выбирает. Выбор
      видим. Наблюдайте за нормами. Кто держит ее включенной? Камера —
      это окно. Что оно раскрывает?
    follow_ups:
      - Как камера формирует звонок?
      - Какая была бы встреча без нее?
      - Каковы отношения между камерой и присутствием?
  - id: hi_wp_side_conversation
    name: Побочный разговор
    prompt: |
      Два человека говорят, пока другие работают. Побочный разговор —
      приватный, но видимый. Наблюдайте за динамикой. Это нарушает порядок?
      Побочный разговор — это маленькое восстание. Что он создает?
    follow_ups:
      - Как побочный разговор формирует этаж?
      - Каким было бы рабочее место без него?
      - Каковы отношения между побочным разговором и исключением?
  - id: hi_wp_clean_desk
    name: Чистый стол
    prompt: |
      Некоторые столы безупречны — ничего личного. Чистый стол — это политика
      или предпочтение. Наблюдайте за контрастом. Что сообщает чистый стол?
      Стерильность? Дисциплину? Отстраненность?
    follow_ups:
      - Как чистый стол формирует работника?
      - Каким было бы рабочее место с грязными столами?
      - Каковы отношения между чистотой и идентичностью?
  - id: hi_wp_meeting_no_show
    name: Неявка на встречу
    prompt: |
      Встреча была запланирована. Кто-то не пришел. Неявка — это сообщение.
      Наблюдайте за реакцией. Кто-нибудь упоминает об этом? Неявка — это
      маленький ход власти. Что она сообщает?
    follow_ups:
      - Как неявка формирует встречу?
      - Каким было бы рабочее место без неявок?
      - Каковы отношения между неявкой и уважением?
  - id: hi_wp_cubicle_visit
    name: Визит в кубикл
    prompt: |
      Кто-то подходит. Стоит у края кубикла. Визит — это выбор — они могли
      бы написать сообщение. Наблюдайте за динамикой. Что позволяет визит,
      чего не позволяет сообщение?
    follow_ups:
      - Как визит формирует взаимодействие?
      - Каким было бы рабочее место без визитов?
      - Каковы отношения между визитом и прерыванием?
  - id: hi_wp_shared_printer
    name: Общий принтер
    prompt: |
      Принтер общий. Документы накапливаются. Кто-то должен забрать. Принтер —
      это перекресток. Наблюдайте за встречами. Что происходит, когда два
      человека тянутся к одному результату?
    follow_ups:
      - Как принтер формирует этаж?
      - Каким было бы рабочее место без него?
      - Каковы отношения между принтером и терпением?
  - id: hi_wp_office_temperature
    name: Температура в офисе
    prompt: |
      "Слишком холодно." "Слишком жарко." Температура — предмет споров.
      Кто-то контролирует термостат. Наблюдайте за жалобами. Температура —
      это маленькое поле битвы за власть. Кто побеждает?
    follow_ups:
      - Как температура формирует рабочее место?
      - Каким было бы рабочее место с индивидуальным контролем?
      - Каковы отношения между температурой и комфортом?
  - id: hi_wp_handshake
