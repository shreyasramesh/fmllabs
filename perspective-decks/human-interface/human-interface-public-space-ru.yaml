# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# Человеческий Интерфейс — Общественное Пространство (Russian)

id: human_interface_public_space
name: Человеческий Интерфейс — Общественное Пространство
description: 50 карточек, чтобы изменить ваш взгляд на общественное пространство — от скамеек и дорожек до хореографии незнакомцев и предметов как талисманов.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: Занятие Скамейки
    prompt: |
      Скамейка занята — телом, сумкой, позой. Скамейка — дефицитный ресурс. Наблюдайте, кто садится, кто стоит, кто проходит мимо. Скамейка имеет разное значение для разных людей. Что она предоставляет?
    follow_ups:
      - Как скамейка формирует пространство?
      - Каким было бы место без скамеек?
      - Какова связь между скамейкой и отдыхом?
  - id: hi_ps_pathway_flow
    name: Поток Дорожки
    prompt: |
      Дорожка направляет движение. Люди идут — одни, парами, группами. Поток имеет направление. Наблюдайте столкновение. Кто уступает? Дорожка — общий коридор. Какие правила им управляют?
    follow_ups:
      - Как дорожка формирует прогулку?
      - Каким было бы пространство без дорожек?
      - Какова связь между дорожкой и пунктом назначения?
  - id: hi_ps_strangers_choreography
    name: Хореография Незнакомцев
    prompt: |
      Не связанные между собой тела движутся в общем пространстве. Хореография —
      невысказанная — шаг в сторону, пауза, слияние. Наблюдайте танец. Никто не говорит.
      Хореография — чистое тело. Что она требует?
    follow_ups:
      - Как хореография формирует пространство?
      - Что произойдет, если все остановятся?
      - Какова связь между хореографией и вежливостью?
  - id: hi_ps_object_talisman
    name: Предмет как Талисман
    prompt: |
      Книга на скамейке. Сумка на стуле. Предмет занимает место. Он говорит
      «я здесь» или «я скоро вернусь». Предмет — талисман. Наблюдайте
      занятие. Что он защищает?
    follow_ups:
      - Как талисман формирует пространство?
      - Каким было бы пространство без таких занятий?
      - Какова связь между предметом и присутствием?
  - id: hi_ps_bench_armrest
    name: Подлокотник Скамейки
    prompt: |
      У некоторых скамеек есть подлокотники. Они делят сиденье. Они мешают лежать.
      Подлокотник — это намеренный дизайн. Наблюдайте, кто им пользуется. Что подлокотник исключает?
    follow_ups:
      - Как подлокотник формирует скамейку?
      - Какой была бы скамейка без него?
      - Какова связь между подлокотником и контролем?
  - id: hi_ps_pathway_intersection
    name: Пересечение Дорожек
    prompt: |
      Дорожки пересекаются. Тела сходятся. Пересечение — точка столкновения.
      Наблюдайте слияние. Что происходит, когда потоки встречаются? Пересечение
      требует переговоров. Что оно извлекает?
    follow_ups:
      - Как пересечение формирует поток?
      - Каким было бы пространство без пересечений?
      - Какова связь между пересечением и вниманием?
  - id: hi_ps_eye_contact_avoid
    name: Избегание Зрительного Контакта
    prompt: |
      Незнакомцы избегают зрительного контакта. Избегание — это вежливость. Смотреть — значит рисковать
      связью. Наблюдайте за взглядом. Избегание — это контракт. Что оно
      позволяет? Чего оно стоит?
    follow_ups:
      - Как избегание формирует пространство?
      - Каким было бы пространство при большем контакте?
      - Какова связь между взглядом и конфиденциальностью?
  - id: hi_ps_bench_share
    name: Разделение Скамейки
    prompt: |
      Два незнакомца делят скамейку. Пространство между ними. Разделение —
      это близость без связи. Наблюдайте границу. Как близко — слишком близко?
      Разделение — это хрупкий баланс.
    follow_ups:
      - Как разделение формирует скамейку?
      - Какой была бы скамейка с одним человеком?
      - Какова связь между разделением и терпимостью?
  - id: hi_ps_pathway_width
    name: Ширина Дорожки
    prompt: |
      Дорожка широкая или узкая. Ширина влияет на поток. Два человека
      могут пройти или нет. Наблюдайте за шириной. Что она предполагает о
      толпе? Ширина — это дизайн. Что он позволяет?
    follow_ups:
      - Как ширина формирует прогулку?
      - Какой была бы дорожка, если бы была шире?
      - Какова связь между шириной и комфортом?
  - id: hi_ps_bench_sun
    name: Скамейка на Солнце
    prompt: |
      Скамейка лицом к солнцу. Или в тени. Положение имеет значение. Наблюдайте,
      кто какой выбирает. Солнце — это ресурс. Что оно предоставляет?
      Скамейка на солнце желанна.
    follow_ups:
      - Как солнце формирует скамейку?
      - Каким было бы пространство без солнца?
      - Какова связь между солнцем и отдыхом?
  - id: hi_ps_stranger_proximity
    name: Близость с Незнакомцем
    prompt: |
      Незнакомец стоит близко — в очереди, в автобусе. Близость —
      безличная, но интимная. Наблюдайте за терпимостью. Что тело
      допускает? Близость — это контракт. Каковы его условия?
    follow_ups:
      - Как близость формирует пространство?
      - Каким было бы пространство с большим количеством места?
      - Какова связь между близостью и вежливостью?
  - id: hi_ps_object_left
    name: Оставленный Предмет
    prompt: |
      Куртка на скамейке. Сумка под деревом. Оставленный предмет обозначает
      территорию. Наблюдайте за занятием. Как долго оно может длиться? Оставленный предмет —
      это испытание. Что оно требует от других?
    follow_ups:
      - Как предмет формирует пространство?
      - Каким было бы пространство без таких занятий?
      - Какова связь между предметом и доверием?
  - id: hi_ps_pathway_obstacle
    name: Препятствие на Дорожке
    prompt: |
      Что-то блокирует путь — строительство, толпа, исполнитель. Препятствие
      отвлекает поток. Наблюдайте объезд. Что требует препятствие?
      Дорожка никогда не бывает чистой. Что ее прерывает?
    follow_ups:
      - Как препятствие формирует поток?
      - Какой была бы дорожка без препятствий?
      - Какова связь между препятствием и адаптацией?
  - id: hi_ps_bench_alone
    name: Одинокая Скамейка
    prompt: |
      Один человек на скамейке. Одиночество — видимо. Скамейка вмещает
      уединение. Наблюдайте за позой. Что предоставляет одинокая скамейка?
      Одинокая скамейка — это выбор. Что он позволяет?
    follow_ups:
      - Как одиночество формирует скамейку?
      - Каким было бы пространство без скамеек?
      - Какова связь между одиночеством и отдыхом?
  - id: hi_ps_nod_acknowledge
    name: Кивок Признания
    prompt: |
      Легкий кивок. Краткая улыбка. Признание — минимально. Оно говорит «Я
      вижу тебя» без вовлечения. Наблюдайте, когда это происходит. Кивок — это малая вежливость. Что он создает?
    follow_ups:
      - Как кивок формирует пространство?
      - Каким было бы пространство без него?
      - Какова связь между кивком и безопасностью?
  - id: hi_ps_pathway_edge
    name: Край Дорожки
    prompt: |
      У дорожки есть края — трава, бордюр, барьер. Край определяет дорожку.
      Наблюдайте, кто остается на дорожке. Кто переходит? Край — это граница.
      Что он содержит?
    follow_ups:
      - Как край формирует прогулку?
      - Какой была бы дорожка без краев?
      - Какова связь между краем и свободой?
  - id: hi_ps_bench_claim
    name: Занятие Скамейки
    prompt: |
      Скамейка занята — развалом, позой, сумкой. Занятие говорит «это мое».
      Наблюдайте за занятием. Как оно сделано? Занятие — это территория.
      Что оно защищает?
    follow_ups:
      - Как занятие формирует скамейку?
      - Каким было бы пространство без занятий?
      - Какова связь между занятием и комфортом?
  - id: hi_ps_stranger_help
    name: Помощь Незнакомца
    prompt: |
      «Нужна помощь?» Незнакомец предлагает. Помощь неожиданна. Наблюдайте
      обмен. Принять или отказаться? Помощь незнакомца — это дар. Что она
      требует?
    follow_ups:
      - Как помощь формирует пространство?
      - Каким было бы пространство без таких предложений?
      - Какова связь между помощью и доверием?
  - id: hi_ps_object_temporary
    name: Временный Предмет
    prompt: |
      Чашка, газета, шляпа. Предмет отмечает место. Он временный.
      Владелец вернется. Наблюдайте за занятием. Что временный
      предмет требует от других? Предмет — это заполнитель места.
    follow_ups:
      - Как временный предмет формирует пространство?
      - Каким было бы пространство без него?
      - Какова связь между временным и доверием?
  - id: hi_ps_pathway_rhythm
    name: Ритм Дорожки
    prompt: |
      Шаги по асфальту. Ритм индивидуален — быстрый, медленный, неравномерный.
      Дорожка вмещает множество ритмов. Наблюдайте синхронизацию и столкновение. Что раскрывает ритм?
    follow_ups:
      - Как ритм формирует прогулку?
      - Какой была бы дорожка в тишине?
      - Какова связь между ритмом и пунктом назначения?
  - id: hi_ps_bench_face
    name: Направление Скамейки
    prompt: |
      Скамейка лицом в определенном направлении — к виду, к солнцу, к толпе. Направление
      формирует опыт. Наблюдайте, кто выбирает какую скамейку. Направление — это дизайн. Что он предполагает?
    follow_ups:
      - Как направление формирует скамейку?
      - Какой была бы скамейка без направления?
      - Какова связь между направлением и видом?
  - id: hi_ps_sidewalk_dance
    name: Танец на Тротуаре
    prompt: |
      Приближаются два человека. Танец — кто двигается? Танец на тротуаре —
      универсален. Наблюдайте шаг в сторону. Танец — невысказанный. Что
      он требует?
    follow_ups:
      - Как танец формирует прогулку?
      - Каким был бы тротуар без него?
      - Какова связь между танцем и вежливостью?
  - id: hi_ps_object_abandoned
    name: Покинутый Предмет
    prompt: |
      Перчатка на земле. Шарф на скамейке. Предмет покинут.
      Наблюдайте за ним. Кто его оставил? Кто его возьмет? Покинутый предмет —
      маленькая загадка. Что он раскрывает?
    follow_ups:
      - Как покинутый предмет формирует пространство?
      - Каким было бы пространство без таких предметов?
      - Какова связь между покинутым и потерей?
  - id: hi_ps_pathway_surface
    name: Поверхность Дорожки
    prompt: |
      Асфальт, гравий, трава. Поверхность влияет на прогулку. Наблюдайте
      выбор. Что требует поверхность от тела? Поверхность — это дизайн. Что он позволяет?
    follow_ups:
      - Как поверхность формирует прогулку?
      - Какой была бы дорожка с другой поверхностью?
      - Какова связь между поверхностью и доступностью?
  - id: hi_ps_bench_weather
    name: Скамейка и Погода
    prompt: |
      Дождь, солнце, ветер. Погода формирует скамейку. Кто сидит под дождем?
      Кто ищет тень? Скамейка — открыта. Наблюдайте связь
      между скамейкой и погодой. Что делает погода?
    follow_ups:
      - Как погода формирует скамейку?
      - Какой была бы скамейка с навесом?
      - Какова связь между погодой и использованием?
  - id: hi_ps_stranger_glance
    name: Взгляд Незнакомца
    prompt: |
      Краткий взгляд. Взгляд — это оценка. Безопасен? Угроза? Взгляд —
      автоматичен. Наблюдайте за своими взглядами. Что делает взгляд?
      Взгляд — это инструмент выживания. Что он извлекает?
    follow_ups:
      - Как взгляд формирует пространство?
      - Каким было бы пространство без взглядов?
      - Какова связь между взглядом и безопасностью?
  - id: hi_ps_pathway_crowd
    name: Толпа на Дорожке
    prompt: |
      Дорожка забита. Тела сжимаются. Толпа имеет свой собственный поток.
      Наблюдайте за движением. Толпа — это коллектив. Что она требует
      от индивидуума?
    follow_ups:
      - Как толпа формирует дорожку?
      - Какой была бы дорожка пустой?
      - Какова связь между толпой и потоком?
  - id: hi_ps_bench_curve
    name: Изгиб Скамейки
    prompt: |
      Некоторые скамейки изогнуты. Они обращены друг к другу или к центру. Изгиб
      формирует социальную среду. Наблюдайте за расположением. Что позволяет изгиб?
      Изгиб — это дизайн. Чего он хочет?
    follow_ups:
      - Как изгиб формирует скамейку?
      - Какой была бы скамейка, если бы была прямой?
      - Какова связь между изгибом и связью?
  - id: hi_ps_object_traded
    name: Обмененный Предмет
    prompt: |
      Передача. Покупка. Подарок. Предмет перемещается между незнакомцами.
      Наблюдайте обмен. Что передается, кроме предмета? Обмен —
      это момент связи. Что он создает?
    follow_ups:
      - Как обмен формирует пространство?
      - Каким было бы пространство без таких обменов?
      - Какова связь между обменом и доверием?
  - id: hi_ps_pathway_light
    name: Освещение Дорожки
    prompt: |
      День, ночь, уличный фонарь. Освещение формирует дорожку. Наблюдайте
      разницу. Кто гуляет ночью? Освещение — это безопасность и атмосфера.
      Что оно предоставляет?
    follow_ups:
      - Как освещение формирует дорожку?
      - Какой была бы дорожка в темноте?
      - Какова связь между освещением и безопасностью?
  - id: hi_ps_bench_armrest_gap
    name: Зазор Подлокотника Скамейки
    prompt: |
      Подлокотник разделяет. Один человек на секцию. Зазор мешает
      совместному использованию. Наблюдайте за дизайном. Что исключает зазор?
      Зазор подлокотника — это враждебная архитектура. Что он предполагает?
    follow_ups:
      - Как зазор формирует скамейку?
      - Какой была бы скамейка без подлокотников?
      - Какова связь между зазором и исключением?
  - id: hi_ps_stranger_smile
    name: Улыбка Незнакомца
    prompt: |
      Улыбка от незнакомца. Неожиданная. Улыбка — это дар. Наблюдайте
      реакцию. Что делает улыбка? Улыбка — это малое нарушение
      контракта. Что она создает?
    follow_ups:
      - Как улыбка формирует пространство?
      - Каким было бы пространство с большим количеством улыбок?
      - Какова связь между улыбкой и связью?
  - id: hi_ps_object_touch
    name: Прикосновение к Предмету
    prompt: |
      Рука на перилах. Нога на ступеньке. Прикосновение соединяет тело и
      пространство. Предмет — общий. Наблюдайте прикосновение. Что делает прикосновение?
      Предмет — это точка контакта. Что он несет?
    follow_ups:
      - Как прикосновение формирует пространство?
      - Каким было бы пространство без прикосновений?
      - Какова связь между прикосновением и присутствием?
  - id: hi_ps_pathway_choice
    name: Выбор Дорожки
    prompt: |
      Дорожка разветвляется. Налево или направо? Выбор — мал. Наблюдайте
      решение. Что им управляет? Выбор дорожки — это момент
      действия. Что он раскрывает?
    follow_ups:
      - Как выбор формирует прогулку?
      - Какой была бы дорожка без развилок?
      - Какова связь между выбором и пунктом назначения?
  - id: hi_ps_bench_empty
    name: Пустая Скамейка
    prompt: |
      Скамейка пуста. Доступна. Почему? Наблюдайте за пустой скамейкой. Местоположение?
      Время? Погода? Пустая скамейка — это приглашение. Что она предлагает?
    follow_ups:
      - Как пустая скамейка формирует пространство?
      - Каким было бы пространство без пустых скамеек?
      - Какова связь между пустотой и возможностью?
  - id: hi_ps_stranger_queue
    name: Очередь Незнакомцев
    prompt: |
      Формируется очередь. Незнакомцы ждут вместе. Очередь — это порядок. Наблюдайте
      терпение. Очередь создает временное сообщество. Что требует очередь?
      Что она предоставляет?
    follow_ups:
      - Как очередь формирует пространство?
      - Каким было бы пространство без очередей?
      - Какова связь между очередью и справедливостью?
  - id: hi_ps_object_talisman_trust
    name: Доверие Талисману
    prompt: |
      Вы оставляете сумку. Вы доверяете пространству. Талисман — это испытание. Наблюдайте
      за доверием. Что оно предполагает? Доверие талисману — это азартная игра. Что оно позволяет?
    follow_ups:
      - Как доверие формирует пространство?
      - Каким было бы пространство без такого доверия?
      - Какова связь между доверием и уязвимостью?
  - id: hi_ps_pathway_end
    name: Конец Дорожки
    prompt: |
      Дорожка заканчивается. Пункт назначения, стена, ворота. Конец — это порог.
