      Der Weg steigt an. Aufwärts oder abwärts. Die Steigung beeinflusst den Körper. Beobachten Sie die Anstrengung. Die Steigung ist Design. Was nimmt sie über den Gehenden an? Die Steigung ist für manche eine Barriere.
