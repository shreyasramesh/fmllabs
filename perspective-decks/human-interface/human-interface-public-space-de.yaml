      - Was ist die Beziehung zwischen Gefahr und Offenheit?
  - id: hi_ps_object_marker
    name: Objekt als Markierung
    prompt: |
      Ein Stein auf einer Bank. Ein Band an einem Baum. Das Objekt markiert etwas. Erinnerung, Anspruch, Ritual. Beobachten Sie die Markierung. Was bedeutet sie? Die Markierung ist eine Botschaft. Was sagt sie?
