      Zwei Personen teilen sich eine Bank. Freunde, Liebende, Fremde. Das Duo hat Dynamiken. Beobachten Sie die Distanz. Das Gespräch oder die Stille. Das Duo auf der Bank ist eine kleine soziale Einheit. Was schafft es?
