      "In Gedenken an." Die Bank hat eine Plakette. Jemand liebte diesen Ort. Die Gedenkbank trägt eine Geschichte. Beobachten Sie sie. Was fügt die Plakette hinzu? Die Gedenkbank ist ein Geschenk. Was schafft sie?
