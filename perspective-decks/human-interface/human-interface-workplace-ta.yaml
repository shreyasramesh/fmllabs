# மனித இடைமுகம் — பணியிடம் (Tamil)

id: human_interface_workplace
name: மனித இடைமுகம் — பணியிடம்
description: 50 அட்டைகள் பணியிடத்தைப் பார்க்கும் விதத்தை மாற்றியமைக்கின்றன — மேசைப் பகுதிகள் மற்றும் சந்திப்பு அறைகள் முதல் தண்ணீர் கூலர் மற்றும் புலப்படும் மறைவான படிநிலை வரை.
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: மேசைப் பகுதி
    prompt: |
      ஒரு மேசை உரிமை கோரப்பட்டுள்ளது — புகைப்படங்கள், செடிகள், கோப்பைகள். பகுதி
      மேற்பரப்பிற்கு அப்பால் நீண்டுள்ளது. எல்லைகளைக் கவனிக்கவும். "என்னுடையது"
      என்பதை எது குறிக்கிறது? மேசை ஒரு சிறிய இராச்சியம். அது எப்படிப் பாதுகாக்கப்படுகிறது?
    follow_ups:
      - மேசை அடையாளத்தை எவ்வாறு உருவாக்குகிறது?
      - தனிப்பயனாக்கம் இல்லாத பணியிடம் எப்படி இருக்கும்?
      - பகுதிக்கும் சொந்தமான உணர்வுக்கும் என்ன உறவு?
  - id: hi_wp_meeting_room
    name: சந்திப்பு அறை
    prompt: |
      அறையில் ஒரு மேசை, நாற்காலிகள், ஒரு திரை உள்ளது. கதவு மூடப்பட்டுள்ளது. சந்திப்பு
      அறை ஒரு செயல்திறன் மேடை. யார் பேசுகிறார்கள், யார் பேசுவதில்லை என்பதைக் கவனிக்கவும்.
      அறை படிநிலையை வைத்திருக்கிறது. இந்த இடம் எதைச் செயல்படுத்துகிறது?
    follow_ups:
      - அறை சந்திப்பை எவ்வாறு வடிவமைக்கிறது?
      - சந்திப்பு அறைகள் இல்லாத பணியிடம் எப்படி இருக்கும்?
      - அறைக்கும் சக்திக்கும் என்ன உறவு?
  - id: hi_wp_water_cooler
    name: தண்ணீர் கூலர்
    prompt: |
      தண்ணீர் கூலர் ஒரு குறுக்கு வழி. மக்கள் அங்கு தற்செயலாக சந்திக்கிறார்கள்.
      சந்திப்பு முறைசாரா. உரையாடல்களைக் கவனிக்கவும். சந்திப்பு அறையில் சொல்லப்படாதது
      கூலரில் என்ன சொல்லப்படுகிறது?
    follow_ups:
      - கூலர் கலாச்சாரத்தை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத பணியிடம் எப்படி இருக்கும்?
      - கூலருக்கும் இணைப்புக்கும் என்ன உறவு?
  - id: hi_wp_visible_hierarchy
    name: புலப்படும் படிநிலை
    prompt: |
      மூலை அலுவலகங்கள், ஜன்னல் இருக்கைகள், கியூபிகள்கள். இடம் தரவரிசையைக் குறிக்கிறது.
      பரவலைக் கவனிக்கவும். யார் என்ன பெறுகிறார்கள்? படிநிலை கட்டிடக்கலையில்
      கட்டப்பட்டுள்ளது. அது என்ன தெரிவிக்கிறது?
    follow_ups:
      - படிநிலை நடத்தையை எவ்வாறு வடிவமைக்கிறது?
      - அது இல்லாத பணியிடம் எப்படி இருக்கும்?
      - இடத்திற்கும் நிலைக்கும் என்ன உறவு?
  - id: hi_wp_invisible_hierarchy
    name: மறைவான படிநிலை
    prompt: |
      சிலர் கேட்கப்படுகிறார்கள்; மற்றவர்கள் குறுக்கிடப்படுகிறார்கள். படிநிலை
      நிறுவன வரைபடத்தில் இல்லை. சந்திப்புகளைக் கவனிக்கவும். யார் விட்டுக்கொடுக்கிறார்கள்?
      யார் ஆதிக்கம் செலுத்துகிறார்கள்? மறைவான படிநிலை முடிவுகளை உருவாக்குகிறது.
    follow_ups:
      - மறைவான படிநிலை எப்படி உருவாகிறது?
      - அது புலப்படும் பணியிடம் எப்படி இருக்கும்?
      - மறைவானதிற்கும் சக்திக்கும் என்ன உறவு?
  - id: hi_wp_cubicle_wall
    name: கியூபிகல் சுவர்
    prompt: |
      சுவர் தாழ்வானது — நீங்கள் அதன் மேல் பார்க்க முடியும். தனியுரிமை பகுதியளவு. கியூபிகல்
      ஒரு சமரசம். பார்வைக் கோடுகளைக் கவனிக்கவும். நீங்கள் என்ன கேட்கலாம்? நீங்கள் என்ன
      பார்க்கலாம்? சுவர் ஒரு எல்லையின் மாயையை உருவாக்குகிறது.
    follow_ups:
      - கியூபிகல் கவனத்தை எவ்வாறு உருவாக்குகிறது?
      - முழு சுவர்களுடன் கூடிய பணியிடம் எப்படி இருக்கும்?
      - சுவருக்கும் தனியுரிமைக்கும் என்ன உறவு?
  - id: hi_wp_corner_office
    name: மூலை அலுவலகம்
    prompt: |
      மூலை அலுவலகத்தில் இரண்டு ஜன்னல்கள் உள்ளன. இது பரிசு. அதை யார் ஆக்கிரமித்துள்ளார்கள்
      என்பதைக் கவனிக்கவும். மூலை அலுவலகம் தரையில் இருந்து தெரியும். இது ஒரு சின்னம்.
      மூலை என்ன தெரிவிக்கிறது?
    follow_ups:
      - மூலை அலுவலகம் லட்சியத்தை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத தளம் எப்படி இருக்கும்?
      - மூலைக்கும் அதிகாரத்திற்கும் என்ன உறவு?
  - id: hi_wp_open_plan
    name: திறந்த திட்டம்
    prompt: |
      சுவர்கள் இல்லை. வரிசைகளில் அல்லது குழுக்களில் மேசைகள். திறந்த திட்டம் ஒத்துழைப்பை
      வாக்குறுதி அளிக்கிறது. யதார்த்தத்தைக் கவனிக்கவும். யார் ஹெட்ஃபோன்கள் அணிகிறார்கள்?
      திறந்த திட்டம் நெருக்கத்தை உருவாக்குகிறது. அதன் விலை என்ன?
    follow_ups:
      - திறந்த திட்டம் தொடர்பை எவ்வாறு உருவாக்குகிறது?
      - சுவர்களுடன் கூடிய பணியிடம் எப்படி இருக்கும்?
      - திறந்ததிற்கும் கவனத்திற்கும் என்ன உறவு?
  - id: hi_wp_calendar_invite
    name: காலண்டர் அழைப்பு
    prompt: |
      அழைப்பு தோன்றுகிறது. ஏற்கவும், நிராகரிக்கவும், தற்காலிகமாக. காலண்டர்
      நாளை கட்டமைக்கிறது. பகுதிகளைக் கவனிக்கவும். யாருடைய நேரத்தை யார் கட்டுப்படுத்துகிறார்கள்?
      காலண்டர் அதிகாரத்தின் ஒரு வரைபடம்.
    follow_ups:
      - காலண்டர் நாளை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத பணியிடம் எப்படி இருக்கும்?
      - அழைப்பிற்கும் கடமைக்கும் என்ன உறவு?
  - id: hi_wp_knock_before_enter
    name: நுழையும் முன் தட்டுதல்
    prompt: |
      சில கதவுகள் மூடப்பட்டுள்ளன. தட்டுதல் ஒரு கோரிக்கை. யார் தட்டுகிறார்கள்
      யார் உள்ளே வருகிறார்கள் என்பதைக் கவனிக்கவும். தட்டுதல் மரியாதையை குறியாக்குகிறது.
      மூடிய கதவு எதைப் பாதுகாக்கிறது?
    follow_ups:
      - தட்டுதல் சந்திப்பை எவ்வாறு உருவாக்குகிறது?
      - திறந்த கதவுகளுடன் கூடிய பணியிடம் எப்படி இருக்கும்?
      - தட்டுதலுக்கும் எல்லைக்கும் என்ன உறவு?
  - id: hi_wp_headphones_signal
    name: ஹெட்ஃபோன் சமிக்ஞை
    prompt: |
      ஹெட்ஃபோன்கள் அணிந்திருப்பது "தொந்தரவு செய்யாதே" என்று பொருள். சமிக்ஞை
      உலகளாவியது. யார் அதை மதிக்கிறார்கள் என்பதைக் கவனிக்கவும். ஹெட்ஃபோன்கள்
      ஒரு குமிழியை உருவாக்குகின்றன. குமிழி எதைச் செயல்படுத்துகிறது?
    follow_ups:
      - ஹெட்ஃபோன்கள் தளத்தை எவ்வாறு உருவாக்குகின்றன?
      - அவை இல்லாத பணியிடம் எப்படி இருக்கும்?
      - ஹெட்ஃபோன்களுக்கும் கவனத்திற்கும் என்ன உறவு?
  - id: hi_wp_lunch_room
    name: மதிய உணவு அறை
    prompt: |
      மதிய உணவு அறையில் மேசைகள், மைக்ரோவேவ், குளிர்சாதன பெட்டி உள்ளது. மக்கள் தனியாக
      அல்லது ஒன்றாக சாப்பிடுகிறார்கள். குழுக்களைக் கவனிக்கவும். யார் யாருடன் உட்காருகிறார்கள்?
      மதிய உணவு அறை கூட்டணிகளை வெளிப்படுத்துகிறது. இந்த ஏற்பாடு என்ன சொல்கிறது?
    follow_ups:
      - மதிய உணவு அறை கலாச்சாரத்தை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத பணியிடம் எப்படி இருக்கும்?
      - மதிய உணவுக்கும் இணைப்புக்கும் என்ன உறவு?
  - id: hi_wp_slack_ping
    name: ஸ்லாக் பிங்
    prompt: |
      பிங் வருகிறது. உடனடி, ஒத்திசைவற்ற. பிங் குறுக்கிடலாம் அல்லது காத்திருக்கலாம்.
      நெறிமுறைகளைக் கவனிக்கவும். யார் உடனடியாக பதிலளிக்கிறார்கள்? பிங்
      தகவல்தொடர்புகளின் ஒரு புதிய ரிதத்தை உருவாக்குகிறது. அது எதை மாற்றுகிறது?
    follow_ups:
      - பிங் நாளை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத பணியிடம் எப்படி இருக்கும்?
      - பிங்கிற்கும் அவசரத்திற்கும் என்ன உறவு?
  - id: hi_wp_whiteboard_claim
    name: ஒயிட்போர்டு உரிமை
    prompt: |
      ஒயிட்போர்டு யோசனைகளைக் கொண்டுள்ளது — வரைபடங்கள், பட்டியல்கள். யாரோ அவற்றை எழுதினார்கள்.
      போர்டு ஒரு பகிரப்பட்ட மேற்பரப்பு. யார் எழுதுகிறார்கள், யார் அழிக்கிறார்கள் என்பதைக் கவனிக்கவும்.
      போர்டு ஒரு பகுதி. அது என்ன வைத்திருக்கிறது?
    follow_ups:
      - ஒயிட்போர்டு ஒத்துழைப்பை எவ்வாறு உருவாக்குகிறது?
      - அது இல்லாத சந்திப்பு எப்படி இருக்கும்?
      - போர்டுக்கும் சிந்தனைக்கும் என்ன உறவு?
  - id: hi_wp_elevator_encounter
    name: லிஃப்ட் சந்திப்பு
    prompt: |
      நீங்கள் ஒரு சக ஊழியருடன் லிஃப்டில் பயணிக்கிறீர்கள். முப்பது வினாடிகள். சந்திப்பு
       சங்கடமாக அல்லது எளிதாக இருக்கலாம். சிறிய உரையாடலைக் கவனிக்கவும். என்ன
