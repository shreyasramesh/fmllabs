# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人机界面 — 零售 (Mandarin Chinese)

id: human_interface_retail
name: 人机界面 — 零售
description: 50 张卡片，用于转变您对零售空间的看法 — 从过道和 购物动线到试衣间和购买过程。
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: 过道动线
    prompt: |
      过道引导人流。购物车朝一个方向前进；行人穿梭其中。观察
      人流。谁让路？谁阻碍？过道有其物理规律。什么规则
      支配着这场舞蹈？
    follow_ups:
      - 过道如何塑造了购物体验？
      - 没有过道的商店会是什么样子？
      - 动线与设计之间存在什么关系？
  - id: hi_rt_browsing_choreography
    name: 浏览动线编排
    prompt: |
      手指触碰面料。眼睛扫过货架。浏览有其节奏 — 停顿，
      考虑，继续前进。观察这种编排。当人们不打算购买时，
      身体会做什么？
    follow_ups:
      - 浏览如何塑造了购物体验？
      - 没有浏览的商店会是什么样子？
      - 浏览与欲望之间存在什么关系？
  - id: hi_rt_fitting_room
    name: 试衣间
    prompt: |
      帘子落下。试衣间是一个阈值 — 从公共到私密。
      在里面，你试穿一个可能的自我。观察试穿后的反应。
      表情说明了什么？试衣间是决策的舞台。
    follow_ups:
      - 试衣间如何塑造了购买行为？
      - 没有试衣间，商店会是什么样子？
      - 试穿与身份之间存在什么关系？
  - id: hi_rt_dance_of_purchase
    name: 购买之舞
    prompt: |
      走近，选择，携带，支付。购买有其步骤。观察
      这个过程。人们在哪里犹豫？这场舞蹈由
      商店编排。它提取了什么？
    follow_ups:
      - 购买过程如何塑造了结果？
      - 没有这个过程，商店会是什么样子？
      - 购买过程与欲望之间存在什么关系？
  - id: hi_rt_cart_territory
    name: 购物车领地
    prompt: |
      购物车延伸了身体。它承载着选择，阻碍了通道。观察
      购物车的路径。购物车是一个移动的领地。它宣示了什么？
    follow_ups:
      - 购物车如何塑造了移动？
      - 没有购物车，商店会是什么样子？
      - 购物车与积累之间存在什么关系？
  - id: hi_rt_endcap_display
    name: 货架端头展示
    prompt: |
      过道尽头有一个展示 — 冲动购买、促销、季节性商品。
      货架端头吸引目光。观察谁会驻足。货架端头是一个陷阱。
      它做了什么？
    follow_ups:
      - 货架端头如何塑造了浏览？
      - 没有货架端头，过道会是什么样子？
      - 展示与冲动之间存在什么关系？
  - id: hi_rt_checkout_line
    name: 结账队伍
    prompt: |
      队伍形成了。糖果、杂志、最后的诱惑。结账是
      最后的考验。观察等待的人们。他们在做什么？
      队伍是浏览与离开之间的阈值。
    follow_ups:
      - 队伍如何塑造了购买？
      - 没有等待，商店会是什么样子？
      - 队伍与冲动之间存在什么关系？
  - id: hi_rt_shelf_height
    name: 货架高度
    prompt: |
      视平线是黄金位置。货架高度是设计。观察商品的位置。
      底部有什么？顶部有什么？高度蕴含着价值。
      它对身体有什么假设？
    follow_ups:
      - 货架高度如何塑造了浏览？
      - 如果所有货架高度相同，商店会是什么样子？
      - 高度与可及性之间存在什么关系？
  - id: hi_rt_price_tag
    name: 价格标签
    prompt: |
      标签显示价格。有时隐藏，有时醒目。观察
      标签的放置。标签是信息和障碍。标签
      对触碰的瞬间产生了什么影响？
    follow_ups:
      - 标签如何塑造了决策？
      - 没有标签，商品会是什么样子？
      - 标签与价值之间存在什么关系？
  - id: hi_rt_store_entrance
    name: 商店入口
    prompt: |
      门开了。你进来了。入口是一个阈值。观察你第一眼看到什么。
      入口定下了基调。商店想让你有什么感觉？
    follow_ups:
      - 入口如何塑造了访问？
      - 没有入口设计，商店会是什么样子？
      - 入口与期望之间存在什么关系？
  - id: hi_rt_sales_associate
    name: 销售员
    prompt: |
      “需要帮忙找什么吗？” 这个提问是预设的。观察
      这次交流。接受还是拒绝？销售员既是向导，也是一种压力。
      这个提问有什么作用？
    follow_ups:
      - 销售员如何塑造了浏览？
      - 没有销售员，商店会是什么样子？
      - 提问与义务之间存在什么关系？
  - id: hi_rt_basket_versus_cart
    name: 购物篮与购物车
    prompt: |
      购物篮适合少量商品。购物车适合更多。这个选择预示着
      购买行为。观察谁选择了什么。购物篮有限制；购物车
      则鼓励。这个选择带来了什么？
    follow_ups:
      - 购物篮如何塑造了访问？
      - 如果只有购物车，商店会是什么样子？
      - 载体与积累之间存在什么关系？
  - id: hi_rt_return_counter
    name: 退货柜台
    prompt: |
      退货队伍不同。人们带着袋子、收据、遗憾。
      退货是一种逆转。观察这次交易。退货在情感上、社交上
      付出了什么代价？退货柜台是“撤销”的场所。
    follow_ups:
      - 退货如何塑造了关系？
      - 没有退货，商店会是什么样子？
      - 退货与信任之间存在什么关系？
  - id: hi_rt_dressing_room_limit
    name: 试衣间限制
    prompt: |
      “最多六件。” 这个限制控制了试穿。观察
      协商过程。如果你有七件会怎样？这个限制塑造了
      试衣间的体验。它有什么假设？
    follow_ups:
      - 限制如何塑造了试穿？
      - 没有限制，试衣间会是什么样子？
      - 限制与盗窃之间存在什么关系？
  - id: hi_rt_impulse_buy
    name: 冲动购买
    prompt: |
      这个商品不在购物清单上。它吸引了你的目光。冲动购买是一种
      屈服的时刻。观察它发生的时机。是什么触发了它？
      冲动是设计遇到了欲望。
    follow_ups:
      - 冲动如何塑造了购买？
      - 没有冲动，商店会是什么样子？
      - 冲动与后悔之间存在什么关系？
  - id: hi_rt_store_music
    name: 商店音乐
    prompt: |
      音乐播放 — 缓慢、熟悉、经过设计。音乐塑造了心情和节奏。
      观察音乐的节奏。快节奏的商店，慢节奏的音乐？
      音乐是无形的
      设计。它对身体做了什么？
    follow_ups:
      - 音乐如何塑造了访问？
      - 如果商店里一片寂静，会是什么样子？
      - 音乐与停留时间之间存在什么关系？
  - id: hi_rt_mannequin
    name: 衣架模特
    prompt: |
      衣架模特穿着衣服。它是一个理想的身体，一种建议。
      观察人们如何看着它。衣架模特既是镜子，也是
      一种幻想。它承诺了什么？
    follow_ups:
      - 衣架模特如何塑造了浏览？
      - 没有衣架模特，商店会是什么样子？
      - 衣架模特与欲望之间存在什么关系？
  - id: hi_rt_sample_station
    name: 试用样品台
    prompt: |
      尝尝这个。试试这个。样品邀请触摸。样品台创造了一个
      停顿。观察谁会停下。样品是一份小礼物。它提取了什么？
    follow_ups:
      - 样品如何塑造了购买？
      - 没有样品，商店会是什么样子？
      - 样品与义务之间存在什么关系？
  - id: hi_rt_sale_rack
    name: 打折货架
    prompt: |
      打折货架一片混乱 — 打折、皱巴巴。人们翻找。打折货架
      是一种不同类型的浏览。观察人们的行为。
      折扣对触碰产生了什么影响？
    follow_ups:
      - 打折货架如何塑造了访问？
      - 没有打折货架，商店会是什么样子？
      - 打折与价值之间存在什么关系？
  - id: hi_rt_mirror_encounter
    name: 镜子邂逅
    prompt: |
      你在商店的镜子里看到了自己。这种邂逅不可避免。
      观察你的目光。你在检查什么？镜子是一种考验。
      商店提供了镜子。它想要什么？
    follow_ups:
      - 镜子如何塑造了试穿？
      - 没有镜子，试衣间会是什么样子？
      - 镜子与自我之间存在什么关系？
  - id: hi_rt_cashier_small_talk
    name: 收银员闲聊
    prompt: |
      “一切都找齐了吗？” 收银员问道。闲聊是预设的。
      观察这次交流。这个问题有什么作用？收银员是
      最后的人际接触。闲聊创造了什么？
    follow_ups:
      - 闲聊如何塑造了离开？
      - 没有闲聊，结账会是什么样子？
      - 闲聊与交易之间存在什么关系？
  - id: hi_rt_store_layout
    name: 商店布局
    prompt: |
      路径是设计好的。必需品在后面。冲动购买品在前面。
      布局编排了访问过程。观察你的路线。
      设计师想让你经过什么？
    follow_ups:
      - 布局如何塑造了浏览？
      - 如果商店布局是随机的，会是什么样子？
      - 布局与曝光之间存在什么关系？
  - id: hi_rt_touch_decide
    name: 触摸决定
    prompt: |
      手指触摸面料，表面。触摸决定一切。观察
      这个瞬间。手能学到眼睛学不到什么？触摸是一种
      阈值。它需要什么？
    follow_ups:
      - 触摸如何塑造了决策？
      - 没有触摸，商店会是什么样子？
      - 触摸与承诺之间存在什么关系？
  - id: hi_rt_receipt_handoff
    name: 交接收据
    prompt: |
      收据被递出 — 装在袋子里或单独递出。有些人收下；有些人
      拒绝。收据是凭证和记录。观察这次交易。收据
      对交易有什么作用？
    follow_ups:
      - 收据如何塑造了离开？
      - 没有收据，结账会是什么样子？
      - 收据与了结之间存在什么关系？
  - id: hi_rt_store_exit
    name: 商店出口
    prompt: |
      门开了。你带着袋子 — 或者空手离开。出口是一个
      阈值。观察你的感受。出口提取了什么？
      出口是这场舞蹈的终点。剩下什么？
    follow_ups:
      - 出口如何塑造了访问？
      - 没有门，商店会是什么样子？
      - 出口与满意度之间存在什么关系？
  - id: hi_rt_loyalty_card_ask
    name: 询问会员卡
    prompt: |
      “您有我们的会员卡吗？” 这个询问是例行的。观察
      对方的反应。是，否，或者注册。会员卡延续了关系。
      这个询问创造了什么？
    follow_ups:
      - 会员卡如何塑造了交易？
      - 没有会员卡，结账会是什么样子？
      - 卡片与数据之间存在什么关系？
  - id: hi_rt_abandoned_cart
    name: 被遗弃的购物车
    prompt: |
      一个购物车被遗弃在过道 — 满载，无人看管。购物车被遗弃了。
      观察里面的商品。他们曾考虑过什么？这种遗弃是一种
      “不”的瞬间。它揭示了什么？
    follow_ups:
      - 被遗弃的购物车如何塑造了商店？
      - 商店能从中学习到什么？
      - 遗弃与欲望之间存在什么关系？
  - id: hi_rt_fitting_room_opinion
    name: 试衣间意见
    prompt: |
      “看起来怎么样？” 帘子外有人问道。意见被寻求。
      试衣间变得社交化。观察这次交流。
      这个意见有什么作用？
    follow_ups:
      - 意见如何塑造了决策？
      - 如果独自试穿，会是什么样子？
      - 意见与购买之间存在什么关系？
  - id: hi_rt_store_scent
    name: 商店气味
    prompt: |
      商店有气味 — 香水、皮革、清洁剂。气味是经过设计的。
      在你注意到之前它就已经进入了你的感官。观察你何时闻到它。
      气味在购买前对身体做了什么？
    follow_ups:
      - 气味如何塑造了访问？
      - 没有气味，商店会是什么样子？
      - 气味与记忆之间存在什么关系？
  - id: hi_rt_compare_prices
    name: 价格比较
    prompt: |
      拿出手机。扫描。价格检查是研究。观察这个瞬间。
      手机揭示了什么？比较发生在过道里。它对决策
      做了什么？
    follow_ups:
      - 价格比较如何塑造了购买？
      - 没有手机，商店会是什么样子？
      - 比较与权力之间存在什么关系？
  - id: hi_rt_window_display
    name: 橱窗展示
    prompt: |
      橱窗面向街道。模特、道具、一个故事。展示
      会吸引行人驻足。观察什么吸引了你的目光。
      橱窗是一种邀请。它承诺了什么？
    follow_ups:
      - 橱窗如何塑造了入口？
      - 没有橱窗，商店会是什么样子？
      - 展示与欲望之间存在什么关系？
  - id: hi_rt_size_search
    name: 寻找尺码
    prompt: |
      手指翻过衣架。寻找尺码。搜索有其节奏。
      观察遇到的沮丧或喜悦。尺码是一种门槛。
      搜索需要什么？
    follow_ups:
      - 寻找尺码如何塑造了浏览？
      - 如果所有尺码都一目了然，商店会是什么样子？
      - 尺码与身体之间存在什么关系？
  - id: hi_rt_payment_choice
    name: 支付选择
    prompt: |
      刷卡、现金、手机。支付选择是交易的瞬间。
      观察支付方式。这个选择是习惯和身份的体现。
      支付方式传达了什么？
    follow_ups:
      - 支付方式如何塑造了结账？
      - 如果只有一种支付方式，商店会是什么样子？
      - 支付与速度之间存在什么关系？
  - id: hi_rt_store_regular
    name: 商店常客
    prompt: |
      常客熟悉商店布局。他们目标明确地行动。店员点头示意。
      观察常客。他们知道什么而新顾客不知道？
      常客与这个空间有关系。
    follow_ups:
      - 常客如何塑造了商店？
      - 没有常客，商店会是什么样子？
      - 常客与忠诚度之间存在什么关系？
  - id: hi_rt_bag_handoff
    name: 交接购物袋
    prompt: |
      购物袋被递过 — 鼓鼓的，带有品牌标志。交接完成了
      交易。观察这次交换。购物袋对
      离开有什么作用？购物袋是凭证和负担。
    follow_ups:
      - 购物袋如何塑造了离开？
      - 没有购物袋，购买会是什么样子？
      - 购物袋与身份之间存在什么关系？
  - id: hi_rt_fitting_room_overflow
    name: 试衣间物品超量
    prompt: |
      物品太多了。店员会帮忙保管多余的。“我帮您拿着。”
      物品超量是一种信任。观察这次交流。
      店员拿着什么？物品超量延长了试穿时间。它带来了什么？
    follow_ups:
      - 物品超量如何塑造了试穿？
      - 没有物品超量，试衣间会是什么样子？
      - 物品超量与信任之间存在什么关系？
  - id: hi_rt_store_lighting
    name: 商店照明
    prompt: |
      灯光经过设计 — 柔和、明亮、温暖。灯光塑造了
      事物的外观。在这样的灯光下观察镜子。
      灯光对脸部、面料有什么作用？
    follow_ups:
      - 灯光如何塑造了购买？
      - 如果商店在刺眼的灯光下，会是什么样子？
      - 灯光与真实之间存在什么关系？
  - id: hi_rt_aisle_block
    name: 过道阻碍
    prompt: |
      有人站在过道上。你需要通过。这种阻碍是
      无意还是故意的。观察协商过程。“借过。”
      这种阻碍是一种小摩擦。它需要什么？
    follow_ups:
      - 阻碍如何塑造了动线？
      - 如果过道更宽，商店会是什么样子？
      - 阻碍与礼貌之间存在什么关系？
  - id: hi_rt_clearance_section
    name: 清仓区
    prompt: |
      清仓区在后面，在角落。上季商品，最后机会。
      这个区域有不同的能量。观察浏览。
      折扣对触碰、考虑有什么影响？
    follow_ups:
      - 清仓区如何塑造了访问？
      - 没有清仓区，商店会是什么样子？
      - 清仓与价值之间存在什么关系？
  - id: hi_rt_store_map
    name: 商店地图
    prompt: |
      “X 在哪儿？” 地图或店员会解答。商店有其地理。
      观察迷失方向。地图提供了什么？
      地图是导向。它有什么假设？
    follow_ups:
      - 地图如何塑造了访问？
      - 没有地图，商店会是什么样子？
      - 地图与流畅性之间存在什么关系？
  - id: hi_rt_try_on_stack
    name: 试穿物品堆
    prompt: |
      店员将试穿的衣物叠好、挂好。堆放好的物品回到了地板上。
      观察这个劳动过程。是谁碰过这些？
      试穿物品堆是无数“也许”之后的残余。
    follow_ups:
      - 物品堆如何塑造了卖场？
