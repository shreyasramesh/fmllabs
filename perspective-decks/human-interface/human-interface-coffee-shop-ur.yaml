# دی ہیومن انٹرفیس — کافی شاپ (Urdu)

id: human_interface_coffee_shop
name: دی ہیومن انٹرفیس — کافی شاپ
description: کافی شاپ کو دیکھنے کے انداز کو بدلنے کے لیے 50 کارڈز—کیو کوریوگرافی اور لیپ ٹاپ کے علاقوں سے لے کر تیسری جگہ، پوشیدہ سکرپٹس، اور رسم کے طور پر کافی تک۔
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: کیو کوریوگرافی
    prompt: |
      کاؤنٹر پر قطار دیکھیں۔ جسم خود کو سیدھا کر لیتے ہیں — آگے جھکنا،
      فون چیک کرنا، آہستہ سے قدم بدلنا۔ قطار میں ایک تال ہے۔ کون جگہ سنبھالتا ہے؟
      کون سے غیر اعلانیہ قواعد ہیں جو یہ طے کرتے ہیں کہ کون کہاں کھڑا ہو؟
    follow_ups:
      - قطار کس طرح توقعات کو ترتیب دیتی ہے؟
      - اگر سب لوگ حکم ماننا چھوڑ دیں تو کیا ہوگا؟
      - انتظار اور تعلق کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_laptop_territory
    name: لیپ ٹاپ کا علاقہ
    prompt: |
      میز پر کھلا لیپ ٹاپ جگہ کا دعویٰ کرتا ہے۔ اس کے ساتھ پڑا کپ، کرسی پر بیگ۔
      حدود کا مشاہدہ کریں۔ ایک شخص کتنی جگہ گھیرتا ہے؟ کیا چیز "مقبوضہ" کا اشارہ دیتی ہے؟
    follow_ups:
      - لیپ ٹاپ جسم کو کیسے بڑھاتا ہے؟
      - آلات کے بغیر جگہ کیسی ہوگی؟
      - علاقے اور مدت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_third_place
    name: تیسری جگہ
    prompt: |
      گھر نہیں، کام کی جگہ نہیں — کافی شاپ ایک تیسری جگہ ہے۔ لوگ اکیلے رہ کر
      بھی ایک ساتھ رہنے آتے ہیں۔ ان کا مشاہدہ کریں جو ٹھہرتے ہیں۔ کون جلدی چلا جاتا ہے؟
      یہ جگہ ایک مختلف سماجی معاہدہ رکھتی ہے۔
    follow_ups:
      - تیسری جگہوں کے بغیر شہر کیسا ہوگا؟
      - کافی شاپ لائبریری سے کس طرح مختلف ہے؟
      - جگہ اور شناخت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_invisible_script
    name: پوشیدہ سکرپٹ
    prompt: |
      آرڈر، ادائیگی، انتظار، وصول، سیٹ تلاش کرنا۔ سکرپٹ تب تک پوشیدہ ہے جب تک
      کوئی اسے توڑے نہیں۔ پہلی بار آنے والے کو دیکھیں۔ وہ کیا نہیں جانتے؟
      سکرپٹ تعلق کا کوڈ ہے۔
    follow_ups:
      - سکرپٹ کس طرح خارج کرتا ہے؟
      - اگر سکرپٹ لکھ دیا جائے تو کیا ہوگا؟
      - سکرپٹ اور روانی کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_coffee_ritual
    name: کافی بطور رسم
    prompt: |
      پیئنے کی چیز ثانوی ہے۔ رسم بنیادی ہے — چلنا، آرڈر کرنا، پہلا گھونٹ۔
      اپنی حرکات کا مشاہدہ کریں۔ اگر کافی آپ کے دروازے پر پہنچ جائے تو آپ کیا کھو دیں گے؟
    follow_ups:
      - رسم تبدیلی کو کیسے نشان زد کرتی ہے؟
      - کافی کا اسٹاپ نہ ہونے پر دن کیسا ہوگا؟
      - رسم اور تیاری کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_counter_handoff
    name: کاؤنٹر پر ہاتھ بدلنا
    prompt: |
      باریسٹا نام پکارتا ہے۔ ایک ہاتھ بڑھتا ہے۔ ہاتھ بدلنا اجنبی اور اجنبی کے درمیان
      رابطے کا ایک لمحہ ہے۔ تبادلے کا مشاہدہ کریں۔ کپ کے علاوہ کیا چیز گزرتی ہے؟
    follow_ups:
      - ہاتھ بدلنا تعلق کیسے بناتا ہے؟
      - روبوٹ باریسٹا کے ساتھ کیا بدلے گا؟
      - ہاتھ بدلنے اور اعتماد کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_power_outlet_hunt
    name: پاور آؤٹ لیٹ کی تلاش
    prompt: |
      آنکھیں دیواروں، فرش، میزوں کے نیچے ڈھونڈتی ہیں۔ آؤٹ لیٹ کی تلاش علاقائی
      ہے۔ پہلے کون پہنچا؟ آؤٹ لیٹ طے کرتا ہے کہ آپ کہاں بیٹھیں گے۔
      جغرافیہ بجلی کی پیروی کرتا ہے۔
    follow_ups:
      - آؤٹ لیٹ کی جگہ کمرے کو کیسے بناتی ہے؟
      - وائرلیس پاور کے ساتھ جگہ کیسی ہوگی؟
      - پلگ اور مستقل مزاجی کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_solo_table
    name: اکیلے کی میز
    prompt: |
      چار کی میز پر ایک شخص۔ خالی کرسیاں ایک رکاوٹ ہیں۔ ترتیب کا مشاہدہ کریں۔
      کیا یہ دفاع ہے؟ ترجیح؟ اکیلی میز بھیڑ کے خلاف جگہ سنبھالتی ہے۔
    follow_ups:
      - اکیلی میز ارادے کا اشارہ کیسے دیتی ہے؟
      - اگر کوئی بیٹھنے کی اجازت مانگے تو کیا ہوگا؟
      - تنہائی اور نمائش کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_milk_pour
    name: دودھ ڈالنا
    prompt: |
      باریسٹا ایسپریسو میں دودھ ڈالتا ہے — لیٹے آرٹ ہو یا نہ ہو۔ ڈالنا ایک ہنر ہے۔
      حرکت کو دیکھیں۔ گاہک کو مشروب کے علاوہ کیا ملتا ہے؟ ڈالنا ایک کارکردگی ہے۔
    follow_ups:
      - ڈالنا توقعات کو کیسے بناتا ہے؟
      - ہنر کے بغیر مشروب کیا ہوگا؟
      - ڈالنے اور قیمت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_name_on_cup
    name: کپ پر نام
    prompt: |
      ایک نام — اصلی، جعلی، غلط املا والا — ایک کپ پر۔ یہ لین دین کو ذاتی
      بنانے کے لیے ہے۔ نام منہ سے ہاتھ اور پھر کاؤنٹر تک جاتا ہے۔ نام
      تبادلے کے لیے کیا کرتا ہے؟
    follow_ups:
      - نام شناخت کیسے پیدا کرتا ہے؟
      - نام کے بغیر آرڈر کیا ہوگا؟
      - نام اور گمنامی کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_window_seat
    name: کھڑکی والی سیٹ
    prompt: |
      کھڑکی والی سیٹ بہترین ہے۔ آپ سڑک کی طرف منہ کرتے ہیں؛ آپ کی پیٹھ محفوظ ہے۔
      مشاہدہ کریں کہ کون اسے منتخب کرتا ہے۔ کھڑکی باہر کی دنیا کو فریم کرتی ہے جب کہ
      آپ اندر رہتے ہیں۔ نظارہ کیا فراہم کرتا ہے؟
    follow_ups:
      - کھڑکی والی سیٹ تجربے کو کیسے بناتی ہے؟
      - کھڑکیوں کے بغیر جگہ کیسی ہوگی؟
      - اندر اور باہر کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_linger_versus_grab
    name: دیر تک رکنا بمقابلہ جلدی اٹھانا
    prompt: |
      کچھ لوگ اپنا کپ لے کر چلے جاتے ہیں۔ دوسرے گھنٹوں بیٹھ جاتے ہیں۔ وہی جگہ
      دونوں کو سنبھالتی ہے۔ فرق کا مشاہدہ کریں۔ کون ٹھہرتا ہے یہ کیا طے کرتا ہے؟
      کافی شاپ مختلف رفتار کو سنبھالتی ہے۔
    follow_ups:
      - دیر تک رکنا کاروبار کو کیسے متاثر کرتا ہے؟
      - اگر سب جلدی چلے جائیں تو جگہ کیسی ہوگی؟
      - رفتار اور تعلق کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_regular_recognition
    name: باقاعدہ کی شناخت
    prompt: |
      "وہی معمول کا؟" باریسٹا جانتا ہے۔ باقاعدہ شخص جانا جاتا ہے۔
      تبادلے کا مشاہدہ کریں۔ جب آپ کی شناخت ہو تو کیا بدلتا ہے؟ معمول کا ایک شارٹ کٹ ہے —
      اور جگہ کا دعویٰ۔
    follow_ups:
      - شناخت وفاداری کیسے پیدا کرتی ہے؟
      - باقاعدہ شخص اس کے بغیر کیا کھو دے گا؟
      - معمول اور شناخت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_soundscape
    name: صوتی منظر
    prompt: |
      بھاپ، پیسنے کی آواز، گپ شپ، موسیقی۔ کافی شاپ کا ایک صوتی منظر ہوتا ہے۔
      اپنی آنکھیں بند کریں۔ تہوں کا نقشہ بنائیں۔ کیا مستقل ہے؟ تال کیا ہے؟
      صوتی منظر موڈ کو بناتا ہے۔
    follow_ups:
      - صوتی منظر توجہ کو کیسے متاثر کرتا ہے؟
      - خاموشی میں جگہ کیسی ہوگی؟
      - آواز اور پیداواری صلاحیت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_shared_table
    name: مشترکہ میز
    prompt: |
      اجنبی ایک ہی لمبی میز پر بیٹھتے ہیں۔ کوئی بات نہیں کرتا۔ مشترکہ میز
      بغیر تعلق کے قربت ہے۔ حدود کا مشاہدہ کریں۔ کتنا قریب بہت زیادہ ہے؟
      میز ایک نازک توازن سنبھالتی ہے۔
    follow_ups:
      - مشترکہ میز اکیلی میز سے کیسے مختلف ہے؟
      - اگر کوئی بات چیت شروع کر دے تو کیا ہوگا؟
      - قربت اور رازداری کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_tip_jar
    name: ٹپ جار
    prompt: |
      سکے اور نوٹ جمع ہوتے ہیں۔ ٹپ جار نظر آتا ہے، غیر فعال ہے۔ کون ٹپ دیتا ہے؟
      کون نہیں دیتا؟ جار لین دین اور تحفے کی حد پر بیٹھا ہے۔
      ٹپ کا کیا مطلب ہے؟
    follow_ups:
      - ٹپ جار تبادلے کو کیسے بناتا ہے؟
      - اس کے بغیر کاؤنٹر کیسا ہوگا؟
      - ٹپ اور شکریہ کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_cup_sleeve
    name: کپ سلیو
    prompt: |
      سلیو ہاتھ کو گرمی سے بچاتا ہے۔ یہ ڈسپوزایبل، برانڈ والا ہے۔
      مشاہدہ کریں کہ لوگ اسے کیسے پکڑتے ہیں۔ سلیو جسم اور مشروب کے درمیان ایک چھوٹا سا
      انٹرفیس ہے۔
    follow_ups:
      - سلیو گرفت کو کیسے بدلتا ہے؟
      - اس کے بغیر تجربہ کیا ہوگا؟
      - سلیو اور برانڈنگ کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_morning_rush
    name: صبح کی جلدی
    prompt: |
      کام سے پہلے، قطار لمبی ہو جاتی ہے۔ صبح کی جلدی کی اپنی رفتار ہوتی ہے۔
      رفتار کو دیکھیں۔ ہر کوئی کہیں اور جا رہا ہے۔ کافی شاپ ایک راستے کا اسٹاپ ہے۔
      جلدی کیا نکال لیتی ہے؟
    follow_ups:
      - جلدی عملے کو کیسے بناتی ہے؟
      - اسٹاپ کے بغیر صبح کیسی ہوگی؟
      - جلدی اور رسم کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_afternoon_slow
    name: دوپہر کی سستی
    prompt: |
      دوپہر کے وسط میں، ہجوم کم ہو جاتا ہے۔ جو لوگ باقی رہتے ہیں وہ مختلف ہوتے ہیں —
      طالب علم، فری لانسر، بے فکر لوگ۔ رفتار بدل جاتی ہے۔ تبدیلی کا مشاہدہ کریں۔
      دوپہر میں ایک مختلف قسم کا گاہک ہوتا ہے۔
    follow_ups:
      - دوپہر صبح سے کیسے مختلف ہے؟
      - سست مدت کے بغیر جگہ کیسی ہوگی؟
      - وقت اور قبضے کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_wifi_password
    name: وائی فائی پاس ورڈ
    prompt: |
      پاس ورڈ دیوار پر، رسید پر، یا چاک بورڈ پر ہوتا ہے۔ آپ کو پوچھنا یا دیکھنا
      پڑے گا۔ وائی فائی کچھ لوگوں کے لیے داخلے کی قیمت ہے۔ مشاہدہ کریں کہ کون جڑتا ہے۔
      کون نہیں کرتا؟
    follow_ups:
      - وائی فائی کسے ٹھہراتا ہے؟
      - اس کے بغیر جگہ کیسی ہوگی؟
      - کنکشن اور کھپت کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_crossword_solver
    name: کراس ورڈ حل کرنے والا
    prompt: |
      کوئی شخص کراس ورڈ، اخبار یا فون پر کام کرتا ہے۔ سرگرمی اکیلی لیکن
      دکھائی دیتی ہے۔ کراس ورڈ وقت کو نشان زد کرتا ہے۔ یہ کہتا ہے "میں ٹھہر رہا
      ہوں۔" سرگرمی دوسروں کو کیا اشارہ دیتی ہے؟
    follow_ups:
      - کراس ورڈ بلبلہ کیسے بناتا ہے؟
      - اس کے بغیر حل کرنے والا کیا کرے گا؟
      - سرگرمی اور قبضے کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_meeting_here
    name: یہاں ملاقات
    prompt: |
      دو لوگ ملتے ہیں — انٹرویو، ملاقات، پہلی تاریخ۔ کافی شاپ غیر جانبدار
      زمین ہے۔ ترتیب کا مشاہدہ کریں۔ کس نے جگہ کا انتخاب کیا؟ میز
      ملاقات کے لیے ایک اسٹیج بن جاتی ہے۔
    follow_ups:
      - کافی شاپ ملاقات کو کیسے قابل بناتی ہے؟
      - دفتر میں ملاقات کیسی ہوگی؟
      - جگہ اور ملاقات کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_bathroom_key
    name: باتھ روم کی چابی
    prompt: |
      باتھ روم کی چابی ایک بلاک، ایک پیڈل، یا ایک بڑے چمچ سے جڑی ہوتی ہے۔
      آپ کو پوچھنا پڑتا ہے۔ چابی تعلق کا ایک چھوٹا سا امتحان ہے۔
      باتھ روم استعمال کرنے کا حق کس کے پاس ہے؟
    follow_ups:
      - چابی رسائی کو کیسے کنٹرول کرتی ہے؟
      - کھلے باتھ رومز کے ساتھ جگہ کیسی ہوگی؟
      - چابی اور اعتماد کے درمیان کیا رشتہ ہے؟
  - id: hi_cs_pastry_case
    name: پیسٹری کیس
    prompt: |
      کروسینٹ، مفنز، کوکیز شیشے کے پیچھے ہیں۔ کیس لالچ اور نمائش ہے۔
      مشاہدہ کریں کہ کیا بکتا ہے۔ کیا بہت دیر تک پڑا رہتا ہے؟ کیس خواہش اور تاخیر
      کے درمیان ایک سودا ہے۔
    follow_ups:
      - کیس آرڈر کو کیسے بناتا ہے؟
      - اس کے بغیر کاؤنٹر کیسا ہوگا؟
