# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# मानव इंटरफ़ेस — सार्वजनिक स्थान (Hindi)

id: human_interface_public_space
name: मानव इंटरफ़ेस — सार्वजनिक स्थान
description: 50 कार्ड जो आपको सार्वजनिक स्थान को देखने का तरीका बदलते हैं—बेंच और रास्तों से लेकर अजनबियों की कोरियोग्राफी और ताबीज के रूप में वस्तुओं तक।
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: बेंच पर कब्जा
    prompt: |
      एक बेंच पर कब्जा कर लिया गया है—एक शरीर, एक बैग, एक मुद्रा द्वारा। बेंच एक दुर्लभ
      संसाधन है। देखें कि कौन बैठता है, कौन खड़ा होता है, कौन गुजरता है। बेंच अलग-अलग
      लोगों के लिए अलग-अलग अर्थ रखती है। यह क्या प्रदान करती है?
    follow_ups:
      - बेंच स्थान को कैसे आकार देती है?
      - बेंच के बिना पार्क कैसा होगा?
      - बेंच और आराम के बीच क्या संबंध है?
  - id: hi_ps_pathway_flow
    name: रास्ते का प्रवाह
    prompt: |
      रास्ता आवागमन को निर्देशित करता है। लोग चलते हैं—अकेले, जोड़ों में, समूहों में।
      प्रवाह की एक दिशा होती है। टकराव का निरीक्षण करें। कौन रास्ता देता है? रास्ता
      एक साझा गलियारा है। यह किन नियमों द्वारा शासित होता है?
    follow_ups:
      - रास्ता सैर को कैसे आकार देता है?
      - रास्तों के बिना स्थान कैसा होगा?
      - रास्ता और गंतव्य के बीच क्या संबंध है?
  - id: hi_ps_strangers_choreography
    name: अजनबियों की कोरियोग्राफी
    prompt: |
      असंबंधित शरीर साझा स्थान से गुजरते हैं। कोरियोग्राफी
      अनकही होती है—किनारा करना, रुकना, मिलना। नृत्य का निरीक्षण करें। कोई बोलता नहीं है।
      कोरियोग्राफी विशुद्ध रूप से शरीर है। इसके लिए क्या आवश्यक है?
    follow_ups:
      - कोरियोग्राफी स्थान को कैसे आकार देती है?
      - अगर हर कोई रुक जाए तो क्या होगा?
      - कोरियोग्राफी और शिष्टाचार के बीच क्या संबंध है?
  - id: hi_ps_object_talisman
    name: ताबीज के रूप में वस्तु
    prompt: |
      बेंच पर एक किताब। कुर्सी पर एक बैग। वस्तु एक जगह रखती है। यह कहती है
      "मैं यहाँ हूँ" या "मैं वापस आऊंगा।" वस्तु एक ताबीज है। दावे का निरीक्षण करें। यह क्या
      सुरक्षित रखता है?
    follow_ups:
      - ताबीज स्थान को कैसे आकार देता है?
      - ऐसे दावों के बिना स्थान कैसा होगा?
      - वस्तु और उपस्थिति के बीच क्या संबंध है?
  - id: hi_ps_bench_armrest
    name: बेंच की आर्मरेस्ट
    prompt: |
      कुछ बेंचों में आर्मरेस्ट होते हैं। वे सीट को विभाजित करते हैं। वे लेटने से रोकते हैं।
      आर्मरेस्ट का डिजाइन इरादे से किया गया है। देखें कि कौन इसका उपयोग करता है। आर्मरेस्ट
      क्या बाहर रखता है?
    follow_ups:
      - आर्मरेस्ट बेंच को कैसे आकार देता है?
      - उसके बिना बेंच कैसी होगी?
      - आर्मरेस्ट और नियंत्रण के बीच क्या संबंध है?
  - id: hi_ps_pathway_intersection
    name: रास्ते का चौराहा
    prompt: |
      रास्ते क्रॉस करते हैं। शरीर मिलते हैं। चौराहा टकराव का बिंदु है।
      मिलन का निरीक्षण करें। जब प्रवाह मिलते हैं तो क्या होता है? चौराहे को
      बातचीत की आवश्यकता होती है। यह क्या निकालता है?
    follow_ups:
      - चौराहा प्रवाह को कैसे आकार देता है?
      - चौराहों के बिना स्थान कैसा होगा?
      - चौराहा और ध्यान के बीच क्या संबंध है?
  - id: hi_ps_eye_contact_avoid
    name: आँखों के संपर्क से बचना
    prompt: |
      अजनबी आँखों के संपर्क से बचते हैं। बचना विनम्रता है। देखना कनेक्शन का जोखिम है।
      निगाह का निरीक्षण करें। यह बचना एक अनुबंध है। यह क्या सक्षम करता है? इसकी क्या कीमत है?
    follow_ups:
      - यह बचना स्थान को कैसे आकार देता है?
      - अधिक संपर्क वाले स्थान कैसा होगा?
      - निगाह और गोपनीयता के बीच क्या संबंध है?
  - id: hi_ps_bench_share
    name: बेंच साझा करना
    prompt: |
      दो अजनबी एक बेंच साझा करते हैं। उनके बीच जगह। साझा करना
      कनेक्शन के बिना निकटता है। सीमा का निरीक्षण करें। कितना करीब
      बहुत करीब है? साझा करना एक नाजुक संतुलन है।
    follow_ups:
      - साझा करना बेंच को कैसे आकार देता है?
      - एक व्यक्ति के साथ बेंच कैसी होगी?
      - साझा करना और सहनशीलता के बीच क्या संबंध है?
  - id: hi_ps_pathway_width
    name: रास्ते की चौड़ाई
    prompt: |
      रास्ता चौड़ा या संकरा है। चौड़ाई प्रवाह को प्रभावित करती है। दो लोग
      गुजर सकते हैं या नहीं। चौड़ाई का निरीक्षण करें। यह भीड़ के बारे में क्या मानता है?
      चौड़ाई डिजाइन है। यह क्या सक्षम करती है?
    follow_ups:
      - चौड़ाई सैर को कैसे आकार देती है?
      - अगर रास्ता चौड़ा होता तो कैसा होता?
      - चौड़ाई और आराम के बीच क्या संबंध है?
  - id: hi_ps_bench_sun
    name: धूप में बेंच
    prompt: |
      बेंच धूप की ओर या छाया की ओर मुख करती है। स्थिति मायने रखती है।
      कौन सा चुनता है इसका निरीक्षण करें। धूप एक संसाधन है। यह क्या प्रदान करती है?
      धूप में बेंच की चाहत होती है।
    follow_ups:
      - धूप बेंच को कैसे आकार देती है?
      - धूप के बिना स्थान कैसा होगा?
      - धूप और आराम के बीच क्या संबंध है?
  - id: hi_ps_stranger_proximity
    name: अजनबी की निकटता
    prompt: |
      एक अजनबी करीब खड़ा होता है—एक कतार में, बस में। निकटता
      अव्यक्तिगत लेकिन अंतरंग होती है। सहनशीलता का निरीक्षण करें। शरीर क्या
      अनुमति देता है? निकटता एक अनुबंध है। इसकी शर्तें क्या हैं?
    follow_ups:
      - निकटता स्थान को कैसे आकार देती है?
      - अधिक जगह के साथ स्थान कैसा होगा?
      - निकटता और शिष्टाचार के बीच क्या संबंध है?
  - id: hi_ps_object_left
    name: छोड़ी हुई वस्तु
    prompt: |
      बेंच पर एक जैकेट। पेड़ के नीचे एक बैग। छोड़ी हुई वस्तु क्षेत्र को चिह्नित करती है।
      दावे का निरीक्षण करें। यह कब तक बना रह सकता है? छोड़ी हुई वस्तु एक परीक्षा है।
      इसके लिए दूसरों से क्या आवश्यक है?
    follow_ups:
      - वस्तु स्थान को कैसे आकार देती है?
      - ऐसे दावों के बिना स्थान कैसा होगा?
      - वस्तु और विश्वास के बीच क्या संबंध है?
  - id: hi_ps_pathway_obstacle
    name: रास्ते में बाधा
    prompt: |
      कुछ रास्ते को अवरुद्ध करता है—निर्माण, भीड़, एक कलाकार। बाधा
      प्रवाह को मोड़ देती है। मोड़ का निरीक्षण करें। बाधा क्या आवश्यक है?
      रास्ता कभी शुद्ध नहीं होता। इसे क्या बाधित करता है?
    follow_ups:
      - बाधा प्रवाह को कैसे आकार देती है?
      - बाधाओं के बिना रास्ता कैसा होगा?
      - बाधा और अनुकूलन के बीच क्या संबंध है?
  - id: hi_ps_bench_alone
    name: अकेली बेंच
    prompt: |
      बेंच पर एक व्यक्ति। अकेलापन दिखाई देता है। बेंच एकांत को धारण करती है।
      मुद्रा का निरीक्षण करें। अकेली बेंच क्या प्रदान करती है?
      अकेली बेंच एक विकल्प है। यह क्या सक्षम करती है?
    follow_ups:
      - अकेलापन बेंच को कैसे आकार देता है?
      - बेंचों के बिना स्थान कैसा होगा?
      - अकेलापन और आराम के बीच क्या संबंध है?
  - id: hi_ps_nod_acknowledge
    name: सिर हिलाकर अभिवादन
    prompt: |
      एक हल्का सिर हिलाना। एक संक्षिप्त मुस्कान। अभिवादन न्यूनतम है। यह कहता है "मैं
      आपको देखता हूँ" बिना जुड़ाव के। देखें कि यह कब होता है। सिर हिलाना एक छोटी
      शिष्टता है। यह क्या बनाता है?
    follow_ups:
      - सिर हिलाना स्थान को कैसे आकार देता है?
      - इसके बिना स्थान कैसा होगा?
      - सिर हिलाना और सुरक्षा के बीच क्या संबंध है?
  - id: hi_ps_pathway_edge
    name: रास्ते का किनारा
    prompt: |
      रास्ते के किनारे होते हैं—घास, फुटपाथ, अवरोध। किनारा रास्ते को परिभाषित करता है।
      देखें कि कौन रास्ते पर रहता है। कौन पार करता है? किनारा एक सीमा है।
      यह क्या धारण करता है?
    follow_ups:
      - किनारा सैर को कैसे आकार देता है?
      - किनारों के बिना रास्ता कैसा होगा?
      - किनारा और स्वतंत्रता के बीच क्या संबंध है?
  - id: hi_ps_bench_claim
    name: बेंच का दावा
    prompt: |
      बेंच पर कब्जा कर लिया गया है—फैलाव से, मुद्रा से, बैग से। दावा कहता है "यह
      मेरा है।" दावे का निरीक्षण करें। यह कैसे किया जाता है? दावा क्षेत्र है।
      यह क्या सुरक्षित रखता है?
    follow_ups:
      - दावा बेंच को कैसे आकार देता है?
      - दावों के बिना स्थान कैसा होगा?
      - दावा और आराम के बीच क्या संबंध है?
  - id: hi_ps_stranger_help
    name: अजनबी की मदद
    prompt: |
      "मदद चाहिए?" एक अजनबी प्रस्ताव देता है। मदद अप्रत्याशित है। आदान-प्रदान का निरीक्षण करें।
      स्वीकार या अस्वीकार? अजनबी की मदद एक उपहार है। इसके लिए क्या आवश्यक है?
    follow_ups:
      - मदद स्थान को कैसे आकार देती है?
      - ऐसे प्रस्तावों के बिना स्थान कैसा होगा?
      - मदद और विश्वास के बीच क्या संबंध है?
  - id: hi_ps_object_temporary
    name: अस्थायी वस्तु
    prompt: |
      एक कप, एक अखबार, एक टोपी। वस्तु एक जगह को चिह्नित करती है। यह अस्थायी है।
      मालिक वापस आएगा। दावे का निरीक्षण करें। अस्थायी
      वस्तु दूसरों से क्या आवश्यक है? वस्तु एक प्लेसहोल्डर है।
    follow_ups:
      - अस्थायी वस्तु स्थान को कैसे आकार देती है?
      - इसके बिना स्थान कैसा होगा?
      - अस्थायी और विश्वास के बीच क्या संबंध है?
  - id: hi_ps_pathway_rhythm
    name: रास्ते की लय
    prompt: |
      फुटपाथ पर पैर। लय व्यक्तिगत है—तेज, धीमी, अनियमित।
      रास्ता कई लय धारण करता है। तालमेल और टकराव का निरीक्षण करें। लय क्या
      खुलासा करती है?
    follow_ups:
      - लय सैर को कैसे आकार देती है?
      - खामोशी में रास्ता कैसा होगा?
      - लय और गंतव्य के बीच क्या संबंध है?
  - id: hi_ps_bench_face
    name: बेंच का मुख
    prompt: |
      बेंच एक दिशा की ओर मुख करती है—दृश्य, धूप, भीड़। मुख
      अनुभव को आकार देता है। देखें कि कौन सी बेंच चुनता है। मुख
      डिजाइन है। यह क्या मानता है?
    follow_ups:
      - मुख बेंच को कैसे आकार देता है?
      - दिशा के बिना बेंच कैसी होगी?
      - मुख और दृश्य के बीच क्या संबंध है?
  - id: hi_ps_sidewalk_dance
    name: फुटपाथ नृत्य
    prompt: |
      दो लोग करीब आते हैं। नृत्य—कौन हिलता है? फुटपाथ नृत्य
      सार्वभौमिक है। किनारे हटने का निरीक्षण करें। नृत्य अनकहा है। इसके लिए क्या आवश्यक है?
    follow_ups:
      - नृत्य सैर को कैसे आकार देता है?
      - इसके बिना फुटपाथ कैसा होगा?
      - नृत्य और शिष्टाचार के बीच क्या संबंध है?
  - id: hi_ps_object_abandoned
    name: छोड़ी हुई वस्तु
    prompt: |
      जमीन पर एक दस्ताना। बेंच पर एक दुपट्टा। वस्तु छोड़ दी गई है।
      इसका निरीक्षण करें। इसे किसने छोड़ा? इसे कौन लेगा? छोड़ी हुई वस्तु एक छोटा
      रहस्य है। यह क्या प्रकट करती है?
