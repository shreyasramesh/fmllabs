# انسانی انٹرفیس — کام کی جگہ (Urdu)

id: human_interface_workplace
name: انسانی انٹرفیس — کام کی جگہ
description: 50 کارڈز جو آپ کے کام کی جگہ کو دیکھنے کا انداز بدل دیں گے—ڈیسک کے علاقے اور میٹنگ رومز سے لے کر واٹر کولر اور ظاہری بمقابلہ پوشیدہ درجہ بندی تک۔
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: ڈیسک کا علاقہ
    prompt: |
      ایک ڈیسک پر دعویٰ کیا گیا ہے — تصاویر، پودے، مگ۔ علاقہ سطح سے آگے بڑھتا ہے۔
      حدود کا مشاہدہ کریں۔ کیا چیز "میری" کہلاتی ہے؟ ڈیسک ایک چھوٹی سلطنت ہے۔
      اس کا دفاع کیسے ہوتا ہے؟
    follow_ups:
      - ڈیسک شناخت کو کیسے تشکیل دیتی ہے؟
      - شخصی سازی کے بغیر کام کی جگہ کیسی ہوگی؟
      - علاقے اور تعلق کے درمیان کیا تعلق ہے؟
  - id: hi_wp_meeting_room
    name: میٹنگ روم
    prompt: |
      کمرے میں ایک میز، کرسیاں، ایک اسکرین ہے۔ دروازہ بند ہو جاتا ہے۔ میٹنگ روم
      کارکردگی کے لیے ایک اسٹیج ہے۔ مشاہدہ کریں کون بولتا ہے، کون نہیں بولتا۔
      کمرہ درجہ بندی کو رکھتا ہے۔ جگہ کیا قابل بناتی ہے؟
    follow_ups:
      - کمرہ میٹنگ کو کیسے تشکیل دیتا ہے؟
      - میٹنگ رومز کے بغیر کام کی جگہ کیسی ہوگی؟
      - کمرے اور طاقت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_water_cooler
    name: واٹر کولر
    prompt: |
      واٹر کولر ایک چوراہے ہے۔ لوگ وہاں حادثاتی طور پر ملتے ہیں۔
      ملاقات غیر رسمی ہے۔ گفتگو کا مشاہدہ کریں۔ کولر پر کیا کہا جاتا ہے جو میٹنگ میں
      نہیں کہا جائے گا؟
    follow_ups:
      - کولر ثقافت کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - کولر اور تعلق کے درمیان کیا تعلق ہے؟
  - id: hi_wp_visible_hierarchy
    name: ظاہری درجہ بندی
    prompt: |
      کونے کے دفاتر، کھڑکی والی نشستیں، کیوبیکلز۔ جگہ رینک کو انکوڈ کرتی ہے۔
      تقسیم کا مشاہدہ کریں۔ کس کو کیا ملتا ہے؟ درجہ بندی فن تعمیر میں بنی ہوئی ہے۔
      یہ کیا بتاتی ہے؟
    follow_ups:
      - درجہ بندی رویے کو کیسے تشکیل دیتی ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - جگہ اور حیثیت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_invisible_hierarchy
    name: پوشیدہ درجہ بندی
    prompt: |
      کچھ لوگوں کو سنا جاتا ہے۔ دوسروں کو ٹوکا جاتا ہے۔ درجہ بندی
      آرگ چارٹ پر نہیں ہے۔ میٹنگز کا مشاہدہ کریں۔ کون ملتوی کرتا ہے؟ کون
      غالب ہوتا ہے؟ پوشیدہ درجہ بندی نتائج کو تشکیل دیتی ہے۔
    follow_ups:
      - پوشیدہ درجہ بندی کیسے ابھرتی ہے؟
      - کام کی جگہ کیسی ہوگی اگر وہ ظاہری ہوتی؟
      - پوشیدہ اور طاقت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_cubicle_wall
    name: کیوبیکل وال
    prompt: |
      دیوار کم ہے — آپ اس کے اوپر سے دیکھ سکتے ہیں۔ رازداری جزوی ہے۔ کیوبیکل
      ایک سمجھوتہ ہے۔ بصری لکیروں کا مشاہدہ کریں۔ آپ کیا سن سکتے ہیں؟ آپ کیا دیکھ سکتے ہیں؟
      دیوار سرحد کا ایک وہم پیدا کرتی ہے۔
    follow_ups:
      - کیوبیکل توجہ کو کیسے تشکیل دیتا ہے؟
      - پوری دیواروں کے ساتھ کام کی جگہ کیسی ہوگی؟
      - دیوار اور رازداری کے درمیان کیا تعلق ہے؟
  - id: hi_wp_corner_office
    name: کونے کا دفتر
    prompt: |
      کونے کے دفتر میں دو کھڑکیاں ہیں۔ یہ انعام ہے۔ مشاہدہ کریں کون اس پر قابض ہے۔
      کونے کا دفتر فرش سے نظر آتا ہے۔ یہ ایک علامت ہے۔ کونے کا کیا مطلب ہے؟
    follow_ups:
      - کونے کا دفتر خواہش کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر فرش کیسا ہوگا؟
      - کونے اور اختیار کے درمیان کیا تعلق ہے؟
  - id: hi_wp_open_plan
    name: اوپن پلان
    prompt: |
      کوئی دیوار نہیں۔ قطاروں یا پوڈز میں ڈیسک۔ اوپن پلان تعاون کا وعدہ کرتا ہے۔
      حقیقت کا مشاہدہ کریں۔ ہیڈ فون کون پہنتا ہے؟ اوپن پلان قربت پیدا کرتا ہے۔
      اس کی قیمت کیا ہے؟
    follow_ups:
      - اوپن پلان تعامل کو کیسے تشکیل دیتا ہے؟
      - دیواروں کے ساتھ کام کی جگہ کیسی ہوگی؟
      - اوپن اور فوکس کے درمیان کیا تعلق ہے؟
  - id: hi_wp_calendar_invite
    name: کیلنڈر دعوت
    prompt: |
      دعوت ظاہر ہوتی ہے۔ قبول کریں، انکار کریں، عارضی۔ کیلنڈر دن کو منظم کرتا ہے۔
      بلاک کا مشاہدہ کریں۔ کون کس کے وقت کو کنٹرول کرتا ہے؟ کیلنڈر
      طاقت کا نقشہ ہے۔
    follow_ups:
      - کیلنڈر دن کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - دعوت اور ذمہ داری کے درمیان کیا تعلق ہے؟
  - id: hi_wp_knock_before_enter
    name: داخل ہونے سے پہلے دستک
    prompt: |
      کچھ دروازے بند ہیں۔ دستک ایک درخواست ہے۔ مشاہدہ کریں کون دستک دیتا ہے اور
      کون اندر آتا ہے۔ دستک احترام کو انکوڈ کرتی ہے۔ بند دروازہ کیا
      محفوظ رکھتا ہے؟
    follow_ups:
      - دستک ملاقات کو کیسے تشکیل دیتی ہے؟
      - کھلے دروازوں کے ساتھ کام کی جگہ کیسی ہوگی؟
      - دستک اور سرحد کے درمیان کیا تعلق ہے؟
  - id: hi_wp_headphones_signal
    name: ہیڈ فون سگنل
    prompt: |
      ہیڈ فون آن کا مطلب ہے "پریشان نہ کریں"۔ سگنل عالمگیر ہے۔ مشاہدہ کریں
      کون اس کا احترام کرتا ہے۔ ہیڈ فون ایک بلبلہ بناتے ہیں۔ بلبلہ کیا
      قابل بناتا ہے؟
    follow_ups:
      - ہیڈ فون فرش کو کیسے تشکیل دیتے ہیں؟
      - ان کے بغیر کام کی جگہ کیسی ہوگی؟
      - ہیڈ فون اور فوکس کے درمیان کیا تعلق ہے؟
  - id: hi_wp_lunch_room
    name: لنچ روم
    prompt: |
      لنچ روم میں میزیں، مائکروویو، فرج ہیں۔ لوگ اکیلے یا
      مل کر کھاتے ہیں۔ جھرمٹ کا مشاہدہ کریں۔ کون کس کے ساتھ بیٹھتا ہے؟ لنچ روم
      اتحاد کو ظاہر کرتا ہے۔ ترتیب کیا کہتی ہے؟
    follow_ups:
      - لنچ روم ثقافت کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - لنچ اور تعلق کے درمیان کیا تعلق ہے؟
  - id: hi_wp_slack_ping
    name: سلیک پنگ
    prompt: |
      پنگ آتا ہے۔ فوری، غیر متزلزل۔ پنگ رکاوٹ ڈال سکتا ہے یا انتظار کر سکتا ہے۔
      معیارات کا مشاہدہ کریں۔ کون فوری جواب دیتا ہے؟ پنگ مواصلات کی
      ایک نئی تال پیدا کرتا ہے۔ یہ کیا بدلتا ہے؟
    follow_ups:
      - پنگ دن کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - پنگ اور عجلت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_whiteboard_claim
    name: وائٹ بورڈ کا دعویٰ
    prompt: |
      وائٹ بورڈ خیالات — ڈایاگرام، فہرستیں رکھتا ہے۔ کسی نے انہیں لکھا۔
      بورڈ ایک مشترکہ سطح ہے۔ مشاہدہ کریں کون لکھتا ہے، کون مٹاتا ہے۔ بورڈ
      علاقہ ہے۔ یہ کیا رکھتا ہے؟
    follow_ups:
      - وائٹ بورڈ تعاون کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر میٹنگ کیسی ہوگی؟
      - بورڈ اور سوچ کے درمیان کیا تعلق ہے؟
  - id: hi_wp_elevator_encounter
    name: لفٹ کا سامنا
    prompt: |
      آپ ایک ساتھی کے ساتھ لفٹ کا اشتراک کرتے ہیں۔ تیس سیکنڈ۔ سامنا
      غیر آرام دہ یا آسان ہے۔ چھوٹی گفتگو کا مشاہدہ کریں۔ کیا کہا جاتا ہے؟
      لفٹ وقت کو سکیڑتی ہے۔ اس میں کیا ضرورت ہے؟
    follow_ups:
      - لفٹ کا سامنا کیسے تشکیل دیتی ہے؟
      - لفٹوں کے بغیر عمارت کیسی ہوگی؟
      - لفٹ اور تہذیب کے درمیان کیا تعلق ہے؟
  - id: hi_wp_cc_email
    name: CC ای میل
    prompt: |
      آپ کو CC کیا گیا ہے۔ آپ مرکزی وصول کنندہ نہیں ہیں۔ CC آپ کو
      لوپ میں شامل کرتا ہے۔ مشاہدہ کریں کس کو CC کیا جاتا ہے۔ CC مطابقت کا
      اشارہ ہے — یا سیاست۔ CC کیا کرتا ہے؟
    follow_ups:
      - CC مواصلات کو کیسے تشکیل دیتا ہے؟
      - CC کے بغیر کام کی جگہ کیسی ہوگی؟
      - CC اور مرئیت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_standing_desk
    name: کھڑا ڈیسک
    prompt: |
      ڈیسک اٹھتا ہے۔ کارکن کھڑا ہوتا ہے۔ کھڑا ڈیسک ایک انتخاب ہے — صحت،
      ترجیح، کارکردگی۔ مشاہدہ کریں کس کے پاس ایک ہے۔ کھڑا ڈیسک کیا
      اشارہ کرتا ہے؟
    follow_ups:
      - کھڑا ڈیسک جسم کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - کھڑے ہونے اور پیداواری صلاحیت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_conference_call
    name: کانفرنس کال
    prompt: |
      دوسری جگہوں سے آوازیں۔ کال تقسیم شدہ لوگوں کو جوڑتی ہے۔ مشاہدہ کریں
      کون بولتا ہے، کون میوٹ کرتا ہے۔ کال ایک جزوی موجودگی ہے۔ کال کیا
      قابل بناتی ہے — اور کیا کھو دیتی ہے؟
    follow_ups:
      - کال میٹنگ کو کیسے تشکیل دیتی ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - کال اور موجودگی کے درمیان کیا تعلق ہے؟
  - id: hi_wp_office_plant
    name: دفتری پودا
    prompt: |
      ڈیسک پر ایک پودا — پوتھوس، سوکولنٹ۔ یہ سجاوٹ اور دیکھ بھال ہے۔
      پودا کمپنی کا نہیں ہے۔ مشاہدہ کریں کس کے پاس ایک ہے۔ پودا جگہ میں کیا
      شامل کرتا ہے؟
    follow_ups:
      - پودا ڈیسک کو کیسے تشکیل دیتا ہے؟
      - پودوں کے بغیر کام کی جگہ کیسی ہوگی؟
      - پودے اور شناخت کے درمیان کیا تعلق ہے؟
  - id: hi_wp_after_hours
    name: آفٹر آورز
    prompt: |
      زیادہ تر کے جانے کے بعد دفتر۔ لائٹس دھیمی ہیں۔ آفٹر آورز کارکن
      نظر آتا ہے — سرشار یا جدوجہد کرنے والا۔ منظر کا مشاہدہ کریں۔ خالی دفتر کیا
      قابل بناتا ہے؟ اس کی قیمت کیا ہے؟
    follow_ups:
      - آفٹر آورز ثقافت کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - آورز اور توقع کے درمیان کیا تعلق ہے؟
  - id: hi_wp_nameplate
    name: نیم پلیٹ
    prompt: |
      ڈیسک پر، دروازے پر نام۔ نیم پلیٹ جگہ کا دعویٰ کرتی ہے۔ مشاہدہ کریں
      کس کے پاس ایک ہے۔ نیم پلیٹ شناخت اور علاقہ ہے۔ یہ
      گزرنے والوں کو کیا بتاتی ہے؟
    follow_ups:
      - نیم پلیٹ جگہ کو کیسے تشکیل دیتی ہے؟
      - اس کے بغیر کام کی جگہ کیسی ہوگی؟
      - نیم پلیٹ اور موجودگی کے درمیان کیا تعلق ہے؟
  - id: hi_wp_meeting_overrun
    name: میٹنگ اوور رن
    prompt: |
      میٹنگ ختم ہونی تھی۔ یہ نہیں ہوتی۔ اوور رن عام ہے۔
      ڈائنامک کا مشاہدہ کریں۔ کس کی اگلی میٹنگ ہے؟ کون رہ سکتا ہے؟
      اوور رن ایک طاقت کا حربہ ہے۔ یہ کیا نکالتا ہے؟
    follow_ups:
      - اوور رن دن کو کیسے تشکیل دیتا ہے؟
      - سخت اختتام کے ساتھ کام کی جگہ کیسی ہوگی؟
      - اوور رن اور احترام کے درمیان کیا تعلق ہے؟
  - id: hi_wp_quick_question
    name: فوری سوال
    prompt: |
      "ایک فوری سوال ہے؟" پوچھنا رکاوٹ ڈالتا ہے۔ "فوری" ایک وعدہ ہے۔
      تبادلے کا مشاہدہ کریں۔ یہ کتنا فوری ہے؟ فوری سوال
      وقت کا سودا ہے۔ اس کی قیمت کیا ہے؟
    follow_ups:
      - فوری سوال بہاؤ کو کیسے تشکیل دیتا ہے؟
      - رکاوٹوں کے بغیر کام کی جگہ کیسی ہوگی؟
      - فوری اور احترام کے درمیان کیا تعلق ہے؟
  - id: hi_wp_bathroom_encounter
    name: باتھ روم کا سامنا
    prompt: |
      آپ باتھ روم میں ایک ساتھی کو دیکھتے ہیں۔ سامنا مبہم ہے۔ آنکھ سے رابطہ یا نہیں؟
      باتھ روم ایک حد بندی کی جگہ ہے۔ معیارات کا مشاہدہ کریں۔
      سامنا کیا ضروری ہے؟
    follow_ups:
      - باتھ روم کام کی جگہ کو کیسے تشکیل دیتا ہے؟
      - مشترکہ باتھ روم کے بغیر کام کی جگہ کیسی ہوگی؟
      - باتھ روم اور رازداری کے درمیان کیا تعلق ہے؟
  - id: hi_wp_commute_talk
    name: کمیوٹ ٹاک
