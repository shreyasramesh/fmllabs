# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# ヒューマン・インターフェース — 職場 (Japanese)

id: human_interface_workplace
name: ヒューマン・インターフェース — 職場
description: 職場に対する見方を変える50枚のカード。デスクのテリトリー、会議室、 ウォータークーラー、可視的・不可視的な階層構造まで。
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: デスクのテリトリー
    prompt: |
      写真、植物、マグカップ。デスクは占有されている。そのテリトリーは
      表面を超えて広がる。境界線を観察する。「私のもの」は何で示されるか？
      デスクは小さな王国だ。どのように守られているか？
    follow_ups:
      - デスクはどのようにアイデンティティを形成するか？
      - パーソナライゼーションのない職場とはどのようなものか？
      - テリトリーと所属意識の関係は？
  - id: hi_wp_meeting_room
    name: 会議室
    prompt: |
      部屋にはテーブル、椅子、スクリーンがある。ドアが閉まる。会議室は
      パフォーマンスの舞台だ。誰が話し、誰が話さないか観察する。
      部屋は階層を内包する。その空間は何を可能にするか？
    follow_ups:
      - 部屋は会議をどのように形作るか？
      - 会議室のない職場とはどのようなものか？
      - 部屋と権力の関係は？
  - id: hi_wp_water_cooler
    name: ウォータークーラー
    prompt: |
      ウォータークーラーは交差点だ。人々は偶然そこで出会う。
      その出会いはインフォーマルだ。会話を観察する。会議では話されないことが、
      クーラーで何を話されるか？
    follow_ups:
      - クーラーは文化をどのように形作るか？
      - それのない職場とはどのようなものか？
      - クーラーとつながりの関係は？
  - id: hi_wp_visible_hierarchy
    name: 可視的な階層
    prompt: |
      応接室、窓際の席、キュービクル。空間がランクを符号化している。
      分布を観察する。誰が何を得るか？階層は建築に組み込まれている。
      それは何を伝えているか？
    follow_ups:
      - 階層は行動をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 空間と地位の関係は？
  - id: hi_wp_invisible_hierarchy
    name: 不可視的な階層
    prompt: |
      ある人は聞かれるが、ある人は話を遮られる。階層は組織図にはない。
      会議を観察する。誰が譲り、誰が支配するか？不可視的な階層は
      結果を形作る。
    follow_ups:
      - 不可視的な階層はどのように現れるか？
      - それが見える職場とはどのようなものか？
      - 不可視的なものと権力の関係は？
  - id: hi_wp_cubicle_wall
    name: キュービクル壁
    prompt: |
      壁は低い――乗り越えて見える。プライバシーは部分的だ。
      キュービクルは妥協だ。視線を観察する。何が聞こえるか？何が見えるか？
      壁は境界の幻想を作り出す。
    follow_ups:
      - キュービクルは集中をどのように形作るか？
      - 完全な壁のある職場とはどのようなものか？
      - 壁とプライバシーの関係は？
  - id: hi_wp_corner_office
    name: コーナーオフィス
    prompt: |
      コーナーオフィスには窓が二つある。それはご褒美だ。
      誰がそれを占めているか観察する。コーナーオフィスはフロアから見える。
      それはシンボルだ。コーナーは何を伝えているか？
    follow_ups:
      - コーナーオフィスは野心をどのように形作るか？
      - それのないフロアとはどのようなものか？
      - コーナーと権威の関係は？
  - id: hi_wp_open_plan
    name: オープンフロア
    prompt: |
      壁がない。デスクは列またはポッドになっている。オープンフロアは
      協力を約束する。現実に観察する。誰がヘッドホンをしているか？
      オープンフロアは近接性を作り出す。それは何を犠牲にするか？
    follow_ups:
      - オープンフロアは交流をどのように形作るか？
      - 壁のある職場とはどのようなものか？
      - オープンと集中の関係は？
  - id: hi_wp_calendar_invite
    name: カレンダー招待
    prompt: |
      招待状が現れる。承諾、辞退、仮。カレンダーは一日を構造化する。
      ブロックを観察する。誰が誰の時間を管理しているか？カレンダーは
      権力の地図だ。
    follow_ups:
      - カレンダーは一日をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 招待と義務の関係は？
  - id: hi_wp_knock_before_enter
    name: 入る前にノック
    prompt: |
      いくつかのドアは閉まっている。ノックは要求だ。
      誰がノックし、誰がそのまま入るか観察する。ノックは敬意を符号化する。
      閉まったドアは何を守っているか？
    follow_ups:
      - ノックは出会いをどのように形作るか？
      - ドアが開いている職場とはどのようなものか？
      - ノックと境界の関係は？
  - id: hi_wp_headphones_signal
    name: ヘッドホンの合図
    prompt: |
      ヘッドホンをしているということは「邪魔しないで」ということ。
      その合図は普遍的だ。誰がそれを尊重するか観察する。ヘッドホンは
      バブルを作り出す。そのバブルは何を可能にするか？
    follow_ups:
      - ヘッドホンはフロアをどのように形作るか？
      - それのない職場とはどのようなものか？
      - ヘッドホンと集中の関係は？
  - id: hi_wp_lunch_room
    name: 休憩室
    prompt: |
      テーブル、電子レンジ、冷蔵庫がある。人々は一人で、または一緒に食事をする。
      クラスターを観察する。誰が誰と座るか？休憩室はアライアンスを明らかにする。
      その配置は何を物語っているか？
    follow_ups:
      - 休憩室は文化をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 休憩とつながりの関係は？
  - id: hi_wp_slack_ping
    name: Slackの通知音
    prompt: |
      通知音が鳴る。即時的、非同期。通知音は中断することも、待つこともできる。
      規範を観察する。誰がすぐに返信する？通知音は新しいコミュニケーションのリズムを
      作り出す。それは何を置き換えるか？
    follow_ups:
      - 通知音は一日をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 通知音と緊急の関係は？
  - id: hi_wp_whiteboard_claim
    name: ホワイトボードの占有
    prompt: |
      ホワイトボードにはアイデア――図、リスト――が書かれている。誰かが書いた。
      ボードは共有の表面だ。誰が書き、誰が消すか観察する。ボードは
      テリトリーだ。それは何を持っているか？
    follow_ups:
      - ホワイトボードは協力をどのように形作るか？
      - それのない会議とはどのようなものか？
      - ボードと思考の関係は？
  - id: hi_wp_elevator_encounter
    name: エレベーターでの遭遇
    prompt: |
      同僚とエレベーターを共有する。30秒。その遭遇はぎこちないか、
      または容易だ。雑談を観察する。何を話すか？エレベーターは時間を圧縮する。
      それは何を要求するか？
    follow_ups:
      - エレベーターは遭遇をどのように形作るか？
      - エレベーターのない建物とはどのようなものか？
      - エレベーターと礼儀の関係は？
  - id: hi_wp_cc_email
    name: CCメール
    prompt: |
      あなたにCCされている。あなたは主要な受信者ではない。CCはあなたを
      ループに含める。誰にCCされているか観察する。CCは関連性――
      または政治――のシグナルだ。CCは何をするか？
    follow_ups:
      - CCはコミュニケーションをどのように形作るか？
      - CCのない職場とはどのようなものか？
      - CCと可視性の関係は？
  - id: hi_wp_standing_desk
    name: スタンディングデスク
    prompt: |
      デスクが上がる。ワーカーが立つ。スタンディングデスクは選択――
      健康、好み、パフォーマンス。誰が持っているか観察する。スタンディングデスクは
      何をシグナルするか？
    follow_ups:
      - スタンディングデスクは身体をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 立っていることと生産性の関係は？
  - id: hi_wp_conference_call
    name: 会議通話
    prompt: |
      遠隔からの声。通話は分散した人々をつなぐ。誰が話し、誰がミュートするか
      観察する。通話は部分的な存在だ。通話は何を可能にし――そして何を失うか？
    follow_ups:
      - 通話は会議をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 通話と存在の関係は？
  - id: hi_wp_office_plant
    name: オフィス植物
    prompt: |
      デスクの上の植物――ポトス、多肉植物。それは装飾と世話だ。
      植物は会社のものではない。誰が持っているか観察する。植物は空間に
      何を加えるか？
    follow_ups:
      - 植物はデスクをどのように形作るか？
      - 植物のない職場とはどのようなものか？
      - 植物とアイデンティティの関係は？
  - id: hi_wp_after_hours
    name: 就業後
    prompt: |
      ほとんどの人が帰った後のオフィス。照明は暗い。就業後のワーカーは
      目立つ――献身的か、苦闘している。その光景を観察する。
      空のオフィスは何を可能にするか？それは何を犠牲にするか？
    follow_ups:
      - 就業後は文化をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 時間外労働と期待の関係は？
  - id: hi_wp_nameplate
    name: 名札
    prompt: |
      デスクの上、ドアの上に名前。名札は空間を主張する。
      誰が持っているか観察する。名札はアイデンティティとテリトリーだ。
      通りすがりの人に何を伝えるか？
    follow_ups:
      - 名札は空間をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 名札と存在の関係は？
  - id: hi_wp_meeting_overrun
    name: 会議の延長
    prompt: |
      会議は終わるはずだった。終わらない。延長は一般的だ。
      ダイナミクスを観察する。誰が次の会議を持っているか？誰が残れるか？
      延長はパワープレイだ。それは何を抽出するか？
    follow_ups:
      - 延長は一日をどのように形作るか？
      - 厳格な終了時刻のある職場とはどのようなものか？
      - 延長と敬意の関係は？
  - id: hi_wp_quick_question
    name: ちょっとした質問
    prompt: |
      「ちょっと質問いい？」その問いは中断を伴う。「ちょっと」は約束だ。
      やり取りを観察する。どれくらい「ちょっと」か？ちょっとした質問は
      時間の交渉だ。それは何を犠牲にするか？
    follow_ups:
      - ちょっとした質問は流れをどのように形作るか？
      - 中断のない職場とはどのようなものか？
      - 「ちょっと」と敬意の関係は？
  - id: hi_wp_bathroom_encounter
    name: トイレでの遭遇
    prompt: |
      トイレで同僚に会う。その遭遇は曖昧だ。アイコンタクトするかしないか？
      トイレはリミナル（境界的）な空間だ。規範を観察する。
      その遭遇は何を要求するか？
    follow_ups:
      - トイレは職場をどのように形作るか？
      - 共用トイレのない職場とはどのようなものか？
      - トイレとプライバシーの関係は？
  - id: hi_wp_commute_talk
    name: 通勤談義
    prompt: |
      「通勤はどうだった？」その質問は雑談のきっかけになる。通勤は
      共有された経験だ。やり取りを観察する。通勤談義は関係に
      何をもたらすか？
    follow_ups:
      - 通勤談義は一日をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 通勤とつながりの関係は？
  - id: hi_wp_parking_spot
    name: 駐車スペース
    prompt: |
      指定席、先着順のスペース。駐車スペースは階層を符号化する。
      誰がどこに駐車するか観察する。スペースは小さな特権だ。
      それは何を伝えるか？
    follow_ups:
      - 駐車は職場をどのように形作るか？
      - 指定席のない駐車場とはどのようなものか？
      - スペースと地位の関係は？
  - id: hi_wp_birthday_cake
    name: 誕生日ケーキ
    prompt: |
      ケーキが現れる。誰かの誕生日だ。チームが集まる。ケーキは
      儀式だ。集まりを観察する。その誕生日の瞬間はグループに
      何をもたらすか？
    follow_ups:
      - 誕生日が文化をどのように形作るか？
      - それのない職場とはどのようなものか？
      - ケーキと所属意識の関係は？
  - id: hi_wp_forwarded_email
    name: 転送メール
    prompt: |
      メールが転送される。「FYI」（参考情報）または「これを見てほしかった」。
      転送は会話を拡張する。誰に転送されるか観察する。転送は
      シグナルだ。それは何を意味するか？
    follow_ups:
      - 転送はコミュニケーションをどのように形作るか？
      - それのない職場とはどのようなものか？
      - 転送と信頼の関係は？
  - id: hi_wp_break_room
    name: 休憩室
    prompt: |
      コーヒー、スナック、時にはソファもある。休憩室は一時停止の場所だ。
      人々はそこへ離れるために行く。誰がそれを使うか観察する。休憩室は
      隠れ家だ。それは何を提供する？
    follow_ups:
      - 休憩室は一日をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 休憩と生産性の関係は？
  - id: hi_wp_office_supply
    name: オフィス用品
    prompt: |
      ペン、紙、ホッチキス――備品室には道具がある。誰かがそれを管理している。
      誰が何を取るか観察する。用品は小さな共有財産だ。
      ルールは何だ？
    follow_ups:
      - 用品は職場をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 用品と権利意識の関係は？
  - id: hi_wp_remote_camera
    name: リモートカメラ
    prompt: |
      カメラはオンかオフか。リモートワーカーが選択する。
      その選択は見える。規範を観察する。誰がオンのままにするか？カメラは窓だ。
      それは何を見せるか？
    follow_ups:
      - カメラは通話をどのように形作るか？
      - それのない会議とはどのようなものか？
      - カメラと存在の関係は？
  - id: hi_wp_side_conversation
    name: 内緒話
    prompt: |
      他の人が仕事をしている間に二人が話す。内緒話はプライベートだが
      見える。ダイナミクスを観察する。それは邪魔か？内緒話は
      小さな反逆だ。それは何を生み出すか？
    follow_ups:
      - 内緒話はフロアをどのように形作るか？
      - それのない職場とはどのようなものか？
      - 内緒話と排除の関係は？
  - id: hi_wp_clean_desk
    name: きれいなデスク
    prompt: |
      いくつかのデスクはきれいで――個人的なものは何もない。
      きれいなデスクはポリシーか好みだ。対比を観察する。
      きれいなデスクは何を伝えるか？無菌？規律？無関心？
    follow_ups:
      - きれいなデスクはワーカーをどのように形作るか？
      - 散らかったデスクのある職場とはどのようなものか？
      - きれいさとアイデンティティの関係は？
  - id: hi_wp_meeting_no_show
    name: 会議欠席
    prompt: |
      会議は予定されていた。誰かが来ない。欠席は
      メッセージだ。反応を観察する。誰かがそれに言及するか？欠席は
      小さなパワープレイだ。それは何を伝えるか？
    follow_ups:
      - 欠席は会議をどのように形作るか？
      - 欠席のない職場とはどのようなものか？
      - 欠席と敬意の関係は？
  - id: hi_wp_cubicle_visit
    name: キュービクル訪問
    prompt: |
      誰かが歩いてくる。キュービクルの端に立つ。その訪問は
      選択――メッセージすることもできた。ダイナミクスを観察する。
      メッセージではできない何が訪問によって可能になるか？
    follow_ups:
      - 訪問はやり取りをどのように形作るか？
      - 訪問のない職場とはどのようなものか？
      - 訪問と中断の関係は？
  - id: hi_wp_shared_printer
    name: 共有プリンター
    prompt: |
      プリンターは共有されている。書類が積み重なる。誰かが集めなければならない。
      プリンターは交差点だ。遭遇を観察する。二人が同じ出力を掴もうとしたとき
      何が起こるか？
    follow_ups:
      - プリンターはフロアをどのように形作るか？
      - それのない職場とはどのようなものか？
      - プリンターと忍耐の関係は？
  - id: hi_wp_office_temperature
    name: オフィス温度
    prompt: |
      「寒すぎる」「暑すぎる」。温度は争点となる。誰かが
      サーモスタットを操作する。苦情を観察する。温度は小さな権力の場だ。
      誰が勝つか？
    follow_ups:
      - 温度は職場をどのように形作るか？
      - 個人制御のある職場とはどのようなものか？
      - 温度と快適さの関係は？
  - id: hi_wp_handshake
    name: 握手
    prompt: |
      握手――初めての出会い、取引成立。握手は儀式だ。
      グリップ、持続時間を観察する。握手はフォーマルさを符号化する。
      それは何を伝えるか？
    follow_ups:
      - 握手は遭遇をどのように形作るか？
      - それのない職場とはどのようなものか？
      - 握手と信頼の関係は？
  - id: hi_wp_cc_removal
    name: CCからの削除
    prompt: |
      「全員に返信」か「返信」か？その選択は重要だ。スレッドから誰かを
      削除することはシグナルだ。ダイナミクスを観察する。誰が落とされるか？
      CCからの削除は小さな排除だ。それは何を意味するか？
    follow_ups:
      - 削除は会話をどのように形作るか？
      - 返信オプションのない職場とはどのようなものか？
      - 削除と権力の関係は？
  - id: hi_wp_office_tour
    name: オフィスツアー
    prompt: |
      新入社員がツアーを受ける。「ここがキッチンです。ここで会議をします」。
      ツアーはオリエンテーションだ。ガイドを観察する。ツアーは
      文化について何を伝えるか？
    follow_ups:
      - ツアーは新参者をどのように形作るか？
      - それのないオンボーディングとはどのようなものか？
      - ツアーと所属意識の関係は？
  - id: hi_wp_meeting_room_book
    name: 会議室予約
    prompt: |
      部屋は予約されている。またはダブルブッキング。カレンダーが仲介役だ。
      対立を観察する。誰が譲るか？予約は空間と時間の主張だ。
      それは何を要求するか？
    follow_ups:
      - 予約は一日をどのように形作るか？
      - 予約のない職場とはどのようなものか？
      - 予約と優先順位の関係は？
  - id: hi_wp_goodbye_ritual
    name: 別れの儀式
    prompt: |
      一日の終わり。「帰ります」。「また明日」。別れは儀式だ。
