# ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಸಾರ್ವಜನಿಕ ಸ್ಥಳ (Kannada)

id: human_interface_public_space
name: ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ಸಾರ್ವಜನಿಕ ಸ್ಥಳ
description: 50 ಕಾರ್ಡ್‌ಗಳು ಸಾರ್ವಜನಿಕ ಸ್ಥಳವನ್ನು ನೀವು ನೋಡುವ ರೀತಿಯಲ್ಲಿ ಬದಲಾಯಿಸಲು — ಬೆಂಚುಗಳು ಮತ್ತು ದಾರಗಳಿಂದ ಹಿಡಿದು ಅಪರಿಚಿತರ ನೃತ್ಯ ಮತ್ತು ವಸ್ತುಗಳವರೆಗೆ.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: ಬೆಂಚ್ ಆಕ್ರಮಣ
    prompt: |
      ಒಂದು ಬೆಂಚ್ ಅನ್ನು ಕ್ಲೈಮ್ ಮಾಡಲಾಗಿದೆ - ದೇಹ, ಚೀಲ, ಭಂಗಿ. ಬೆಂಚ್ ಒಂದು ವಿರಳ
      ಸಂಪನ್ಮೂಲ. ಯಾರು ಕುಳಿತುಕೊಳ್ಳುತ್ತಾರೆ, ಯಾರು ನಿಲ್ಲುತ್ತಾರೆ, ಯಾರು ಹಾದುಹೋಗುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಬೆಂಚ್ ವಿಭಿನ್ನ
      ಅರ್ಥಗಳನ್ನು ವಿಭಿನ್ನ ಜನರಿಗೆ ನೀಡುತ್ತದೆ. ಅದು ಏನು ಒದಗಿಸುತ್ತದೆ?
    follow_ups:
      - ಬೆಂಚ್ ಸ್ಥಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಬೆಂಚ್‌ಗಳಿಲ್ಲದಿದ್ದರೆ ಉದ್ಯಾನವನ ಹೇಗಿರುತ್ತದೆ?
      - ಬೆಂಚ್ ಮತ್ತು ವಿಶ್ರಾಂತಿಯ ನಡುವಿನ ಸಂಬಂಧ ಏನು?
  - id: hi_ps_pathway_flow
    name: ಮಾರ್ಗದ ಹರಿವು
    prompt: |
      ದಾರಿಯು ಚಲನೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ. ಜನರು ನಡೆಯುತ್ತಾರೆ - ಒಂಟಿಯಾಗಿ, ಜೋಡಿಯಾಗಿ, ಗುಂಪುಗಳಾಗಿ. ಹರಿವಿಗೆ
      ದಿಕ್ಕು ಇದೆ. ಘರ್ಷಣೆಯನ್ನು ಗಮನಿಸಿ. ಯಾರು ದಾರಿ ಬಿಡುತ್ತಾರೆ? ಮಾರ್ಗವು
      ಹಂಚಿಕೆಯ ಕಾರಿಡಾರ್ ಆಗಿದೆ. ಅದನ್ನು ಯಾವ ನಿಯಮಗಳು ನಿರ್ವಹಿಸುತ್ತವೆ?
    follow_ups:
      - ಮಾರ್ಗವು ನಡಿಗೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ದಾರಿಗಳಿಲ್ಲದಿದ್ದರೆ ಸ್ಥಳ ಹೇಗಿರುತ್ತದೆ?
      - ಮಾರ್ಗ ಮತ್ತು ಗಮ್ಯಸ್ಥಾನದ ನಡುವಿನ ಸಂಬಂಧ ಏನು?
  - id: hi_ps_strangers_choreography
    name: ಅಪರಿಚಿತರ ನೃತ್ಯ
    prompt: |
      ಸಂಬಂಧವಿಲ್ಲದ ದೇಹಗಳು ಹಂಚಿಕೆಯ ಸ್ಥಳದಲ್ಲಿ ಚಲಿಸುತ್ತವೆ. ನೃತ್ಯವು
      ಮಾತನಾಡದಂತಿದೆ — ಪಕ್ಕಕ್ಕೆ ಸರಿಯುವುದು, ವಿರಾಮ, ವಿಲೀನ. ನೃತ್ಯವನ್ನು ಗಮನಿಸಿ. ಯಾರೂ ಮಾತನಾಡುವುದಿಲ್ಲ.
      ನೃತ್ಯವು ಸಂಪೂರ್ಣ ದೇಹವಾಗಿದೆ. ಅದಕ್ಕೆ ಏನು ಬೇಕು?
    follow_ups:
      - ನೃತ್ಯವು ಸ್ಥಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಲ್ಲರೂ ನಿಂತರೆ ಏನಾಗುತ್ತದೆ?
      - ನೃತ್ಯ ಮತ್ತು ನಾಗರಿಕತೆಯ ನಡುವಿನ ಸಂಬಂಧ ಏನು?
  - id: hi_ps_object_talisman
    name: ವಸ್ತುವಿನ ತಾಲಿಸ್ಮನ್
    prompt: |
      ಬೆಂಚ್ ಮೇಲೆ ಒಂದು ಪುಸ್ತಕ. ಕುರ್ಚಿಯ ಮೇಲೆ ಒಂದು ಚೀಲ. ವಸ್ತುವೊಂದು ಸ್ಥಾನವನ್ನು
      ಒದಗಿಸುತ್ತದೆ. ಅದು "ನಾನು ಇಲ್ಲಿದ್ದೇನೆ" ಅಥವಾ "ನಾನು ಹಿಂತಿರುಗುತ್ತೇನೆ" ಎಂದು ಹೇಳುತ್ತದೆ. ವಸ್ತುವೊಂದು ತಾಲಿಸ್ಮನ್.
      ಆ ಕ್ಲೈಮ್ ಅನ್ನು ಗಮನಿಸಿ. ಅದು ಏನು ರಕ್ಷಿಸುತ್ತದೆ?
    follow_ups:
      - ತಾಲಿಸ್ಮನ್ ಸ್ಥಳವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅಂತಹ ಕ್ಲೈಮ್‌ಗಳಿಲ್ಲದಿದ್ದರೆ ಸ್ಥಳ ಹೇಗಿರುತ್ತದೆ?
      - ವಸ್ತುವಿನ ಮತ್ತು ಉಪಸ್ಥಿತಿಯ ನಡುವಿನ ಸಂಬಂಧ ಏನು?
  - id: hi_ps_bench_armrest
    name: ಬೆಂಚ್ ಆರ್ಮ್‌ರೆಸ್ಟ್
    prompt: |
      ಕೆಲವು ಬೆಂಚ್‌ಗಳಲ್ಲಿ ಆರ್ಮ್‌ರೆಸ್ಟ್‌ಗಳು ಇರುತ್ತವೆ. ಅವು ಆಸನವನ್ನು ವಿಭಜಿಸುತ್ತವೆ. ಅವು ಮಲಗುವುದನ್ನು ತಡೆಯುತ್ತವೆ.
      ಆರ್ಮ್‌ರೆಸ್ಟ್ ಉದ್ದೇಶಪೂರ್ವಕ ವಿನ್ಯಾಸ. ಅದನ್ನು ಯಾರು ಬಳಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಆರ್ಮ್‌ರೆಸ್ಟ್ ಏನು
      ಬಹಿಷ್ಕರಿಸುತ್ತದೆ?
    follow_ups:
      - ಆರ್ಮ್‌ರೆಸ್ಟ್ ಬೆಂಚ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಅದು ಇಲ್ಲದಿದ್ದರೆ ಬೆಂಚ್ ಹೇಗಿರುತ್ತದೆ?
      - ಆರ್ಮ್‌ರೆಸ್ಟ್ ಮತ್ತು ನಿಯಂತ್ರಣದ ನಡುವಿನ ಸಂಬಂಧ ಏನು?
  - id: hi_ps_pathway_intersection
    name: ಮಾರ್ಗದ ಛೇದಕ
    prompt: |
      ದಾರಿಗಳು ಛೇದಿಸುತ್ತವೆ. ದೇಹಗಳು ಸಂಗಮಿಸುತ್ತವೆ. ಛೇದಕವು ಘರ್ಷಣೆಯ
