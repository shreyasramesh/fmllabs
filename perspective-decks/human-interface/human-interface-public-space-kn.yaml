  - id: hi_ps_eye_contact_avoid
    name: ಕಣ್ಣಿನ ಸಂಪರ್ಕವನ್ನು ತಪ್ಪಿಸುವುದು
    prompt: |
      ಅಪರಿಚಿತರು ಕಣ್ಣಿನ ಸಂಪರ್ಕವನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ. ತಪ್ಪಿಸುವುದು ವಿನಯಪೂರ್ವಕ. ನೋಡುವುದು ಸಂಪರ್ಕಕ್ಕೆ
