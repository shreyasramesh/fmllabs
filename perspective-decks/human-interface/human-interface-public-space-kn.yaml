    name: ಮಾರ್ಗದ ಅಗಲ
    prompt: |
      ದಾರಿಯು ಅಗಲ ಅಥವಾ ಕಿರಿದಾಗಿದೆ. ಅಗಲವು ಹರಿವಿನ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇಬ್ಬರು
