# الواجهة البشرية — المقهى (Arabic)

id: human_interface_coffee_shop
name: الواجهة البشرية — المقهى
description: 50 بطاقة لتغيير نظرتك للمقهى — من تصميم الطوابير والمناطق المخصصة لأجهزة اللابتوب إلى المكان الثالث، النصوص غير المكتوبة، والقهوة كطقس.
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: تصميم الطابور
    prompt: |
      شاهد الصف عند المنضدة. الأجساد تنظم نفسها — ميل للأمام، تفقد الهاتف،
      تحرك خفيف. الطابور له إيقاع. من يملك المساحة؟
      ما هي القواعد غير المعلنة التي تحكم من يقف أين؟
    follow_ups:
      - كيف يشكل الطابور الترقب؟
      - ماذا سيحدث لو تجاهل الجميع النظام؟
      - ما هي العلاقة بين الانتظار والانتماء؟
  - id: hi_cs_laptop_territory
    name: منطقة اللابتوب
    prompt: |
      جهاز لابتوب مفتوح على طاولة يطالب بالمساحة. الكوب بجانبه، الحقيبة
      على الكرسي. لاحظ الحدود. كم عقار يحتله شخص واحد؟
      ما الذي تشير إليه "محجوز"؟
    follow_ups:
      - كيف يوسع اللابتوب الجسد؟
      - كيف ستكون المساحة بدون أجهزة؟
      - ما هي العلاقة بين المنطقة والمدة؟
  - id: hi_cs_third_place
    name: المكان الثالث
    prompt: |
      ليس المنزل، وليس العمل — المقهى هو مكان ثالث. يأتي الناس ليكونوا
      وحدهم معًا. لاحظ من يبقى. من يغادر بسرعة؟ المساحة تحمل عقدًا اجتماعيًا
      مختلفًا.
    follow_ups:
      - ماذا ستكون المدينة بدون أماكن ثالثة؟
      - كيف يختلف المقهى عن المكتبة؟
      - ما هي العلاقة بين المكان والهوية؟
  - id: hi_cs_invisible_script
    name: النص غير المكتوب
    prompt: |
      اطلب، ادفع، انتظر، استلم، ابحث عن مقعد. النص غير مرئي حتى
      يخرقه أحدهم. شاهد شخصًا لأول مرة. ما الذي لا يعرفه؟
      النص يشفر الانتماء.
    follow_ups:
      - كيف يستبعد النص؟
      - ماذا سيحدث لو كتب النص؟
      - ما هي العلاقة بين النص والطلاقة؟
  - id: hi_cs_coffee_ritual
    name: القهوة كطقس
    prompt: |
      المشروب ثانوي. الطقس هو الأساسي — المشي، الطلب، الرشفة الأولى.
      لاحظ حركاتك الخاصة. ماذا ستخسر لو وصلت القهوة إلى بابك؟
    follow_ups:
      - كيف يحدد الطقس الانتقال؟
      - ماذا سيكون اليوم بدون توقف القهوة؟
      - ما هي العلاقة بين الطقس والاستعداد؟
  - id: hi_cs_counter_handoff
    name: تسليم المنضدة
    prompt: |
      ينادي الباريستا اسمًا. تمتد يد. التسليم لحظة اتصال بين غريبين.
      شاهد التبادل. ما الذي ينتقل بجانب الكوب؟
    follow_ups:
      - كيف يخلق التسليم اتصالًا؟
      - ماذا سيتغير مع باريستا آلي؟
      - ما هي العلاقة بين التسليم والثقة؟
  - id: hi_cs_power_outlet_hunt
    name: البحث عن منفذ كهرباء
    prompt: |
      تتفحص العيون الجدران، الأرض، تحت الطاولات. البحث عن منفذ هو
      قضية سيادة. من وصل أولاً؟ المنفذ يحدد مكان جلوسك.
      الجغرافيا تتبع الكهرباء.
    follow_ups:
      - كيف يشكل وضع المنافذ الغرفة؟
      - كيف ستكون المساحة مع طاقة لاسلكية؟
      - ما هي العلاقة بين القابس والديمومة؟
  - id: hi_cs_solo_table
    name: طاولة لشخص واحد
    prompt: |
      شخص واحد على طاولة لأربعة. الكراسي الفارغة هي حاجز. لاحظ الترتيب.
      هل هو دفاع؟ تفضيل؟ طاولة الشخص الواحد تحتفظ بالمساحة ضد الزحام.
    follow_ups:
      - كيف تشير طاولة الشخص الواحد إلى النية؟
      - ماذا سيحدث لو طلب أحدهم المشاركة؟
      - ما هي العلاقة بين العزلة والرؤية؟
  - id: hi_cs_milk_pour
    name: صب الحليب
    prompt: |
      يصب الباريستا الحليب في الإسبريسو — فن لاتيه أم لا. الصب هو
      حرفة. شاهد الحركة. ماذا يتلقى الزبون بجانب المشروب؟
      الصب هو أداء.
    follow_ups:
      - كيف يشكل الصب الترقب؟
      - ماذا سيكون المشروب بدون الحرفة؟
      - ما هي العلاقة بين الصب والسعر؟
  - id: hi_cs_name_on_cup
    name: اسم على كوب
    prompt: |
      اسم — حقيقي، مزيف، مكتوب خطأ — على كوب. إنه يضفي طابعًا شخصيًا على
      المعاملة. الاسم ينتقل من الفم إلى اليد إلى المنضدة.
      ماذا يفعل الاسم للمعاملة؟
    follow_ups:
      - كيف يخلق الاسم التعرف؟
      - ماذا سيكون الطلب بدون الاسم؟
      - ما هي العلاقة بين الاسم وعدم الكشف عن الهوية؟
  - id: hi_cs_window_seat
    name: مقعد النافذة
    prompt: |
      مقعد النافذة هو الأفضل. تواجه الشارع؛ ظهرك محمي.
      لاحظ من يختاره. النافذة تؤطر العالم الخارجي بينما تبقى أنت في الداخل.
      ماذا يوفر المنظر؟
    follow_ups:
      - كيف يشكل مقعد النافذة التجربة؟
      - كيف ستكون المساحة بدون نوافذ؟
      - ما هي العلاقة بين الداخل والخارج؟
  - id: hi_cs_linger_versus_grab
    name: البقاء مقابل الاستلام السريع
    prompt: |
      بعضهم يأخذ كوبهم ويذهب. آخرون يجلسون لساعات. نفس المساحة
      تحتضن الاثنين. لاحظ الانقسام. ما الذي يحدد من يبقى؟
      المقهى يستوعب سرعات مختلفة.
    follow_ups:
      - كيف يؤثر البقاء على العمل؟
      - كيف ستكون المساحة لو غادر الجميع بسرعة؟
      - ما هي العلاقة بين السرعة والانتماء؟
  - id: hi_cs_regular_recognition
    name: التعرف على الزبون الدائم
    prompt: |
      "الطلب المعتاد؟" الباريستا يعرف. الزبون الدائم معروف. شاهد
      التبادل. ماذا يتغير عندما يتم التعرف عليك؟ الطلب المعتاد هو اختصار —
      وتأكيد على المكان.
    follow_ups:
      - كيف يخلق التعرف الولاء؟
      - ماذا سيخسر الزبون الدائم بدونه؟
      - ما هي العلاقة بين المعتاد والهوية؟
  - id: hi_cs_soundscape
    name: المشهد الصوتي
    prompt: |
      بخار، طحن، ثرثرة، موسيقى. للمقهى مشهد صوتي. أغمض عينيك.
      ارسم الطبقات. ما هو الثابت؟ ما هو الإيقاع؟
      المشهد الصوتي يشكل المزاج.
    follow_ups:
      - كيف يؤثر المشهد الصوتي على التركيز؟
      - كيف ستكون المساحة في صمت؟
      - ما هي العلاقة بين الصوت والإنتاجية؟
  - id: hi_cs_shared_table
    name: طاولة مشتركة
    prompt: |
      يجلس الغرباء على نفس الطاولة الطويلة. لا أحد يتكلم. الطاولة المشتركة
      هي قرب بدون اتصال. لاحظ الحدود. ما مدى القرب المفرط؟
      الطاولة تحتفظ بتوازن دقيق.
    follow_ups:
      - كيف تختلف الطاولة المشتركة عن طاولة لشخص واحد؟
      - ماذا سيحدث لو بدأ أحدهم محادثة؟
      - ما هي العلاقة بين القرب والخصوصية؟
  - id: hi_cs_tip_jar
    name: وعاء الإكراميات
    prompt: |
      تتراكم العملات المعدنية والأوراق النقدية. وعاء الإكراميات مرئي، سلبي.
      من يترك إكرامية؟ من لا يفعل؟ الوعاء يجلس على حدود المعاملة والهدية.
      ماذا تعني الإكرامية؟
    follow_ups:
      - كيف يشكل وعاء الإكراميات التبادل؟
      - كيف ستكون المنضدة بدونه؟
      - ما هي العلاقة بين الإكرامية والامتنان؟
  - id: hi_cs_cup_sleeve
    name: غلاف الكوب
    prompt: |
      الغلاف يحمي اليد من الحرارة. إنه قابل للتصرف، يحمل علامة تجارية.
      لاحظ كيف يمسك الناس الكوب به. الغلاف هو واجهة صغيرة بين الجسم والمشروب.
    follow_ups:
      - كيف يغير الغلاف القبضة؟
      - كيف ستكون التجربة بدونه؟
      - ما هي العلاقة بين الغلاف والعلامة التجارية؟
  - id: hi_cs_morning_rush
    name: عجلة الصباح
    prompt: |
      قبل العمل، يمتد الطابور. عجلة الصباح لها إيقاعها الخاص.
      شاهد السرعة. الجميع متجه إلى مكان آخر. المقهى هو محطة عبور.
      ماذا تستخرج العجلة؟
    follow_ups:
      - كيف تشكل العجلة الموظفين؟
      - ماذا سيكون الصباح بدون التوقف؟
      - ما هي العلاقة بين العجلة والطقس؟
  - id: hi_cs_afternoon_slow
    name: بطء الظهيرة
    prompt: |
      منتصف الظهيرة، يخف الازدحام. من يبقى مختلفون — طلاب،
      عاملون مستقلون، غير المستعجلين. تتغير السرعة. لاحظ التغيير.
      الظهيرة تحمل نوعًا مختلفًا من الزبائن.
    follow_ups:
      - كيف تختلف الظهيرة عن الصباح؟
      - كيف ستكون المساحة بدون فترة البطء؟
      - ما هي العلاقة بين الوقت والاشغال؟
  - id: hi_cs_wifi_password
    name: كلمة مرور الواي فاي
    prompt: |
      كلمة المرور على الحائط، الإيصال، السبورة. يجب أن تسأل أو تبحث.
      الواي فاي هو ثمن الدخول للبعض. لاحظ من يتصل. من لا يحتاج؟
    follow_ups:
      - كيف يشكل الواي فاي من يبقى؟
      - كيف ستكون المساحة بدونه؟
      - ما هي العلاقة بين الاتصال والاستهلاك؟
  - id: hi_cs_crossword_solver
    name: حال الكلمات المتقاطعة
    prompt: |
      شخص يعمل على الكلمات المتقاطعة، جريدة أو هاتف. النشاط فردي ولكنه
      مرئي. الكلمات المتقاطعة تحدد الوقت. تقول "سأبقى". ماذا يشير النشاط
      للآخرين؟
    follow_ups:
      - كيف تخلق الكلمات المتقاطعة فقاعة؟
      - ماذا سيفعل الحال بدونها؟
      - ما هي العلاقة بين النشاط والاشغال؟
  - id: hi_cs_meeting_here
    name: الاجتماع هنا
    prompt: |
      شخصان يلتقيان — مقابلة، لقاء، موعد أول. المقهى هو
      أرض محايدة. لاحظ الإعداد. من اختار المكان؟ الطاولة تصبح مسرحًا
      للالتقاء.
    follow_ups:
      - كيف يسهل المقهى الاجتماع؟
      - كيف سيكون الاجتماع في مكتب؟
      - ما هي العلاقة بين المكان واللقاء؟
  - id: hi_cs_bathroom_key
    name: مفتاح الحمام
    prompt: |
      مفتاح الحمام مربوط بسلسلة إلى كتلة، مجداف، ملعقة عملاقة. يجب أن تسأل.
      المفتاح هو اختبار صغير للانتماء. من له الحق في استخدام الحمام؟
    follow_ups:
      - كيف يتحكم المفتاح بالوصول؟
      - كيف ستكون المساحة مع حمامات مفتوحة؟
      - ما هي العلاقة بين المفتاح والثقة؟
  - id: hi_cs_pastry_case
    name: واجهة المعجنات
    prompt: |
      كرواسون، مافن، كوكيز خلف زجاج. الواجهة هي إغراء وعرض.
      لاحظ ما يباع. ما الذي يبقى طويلاً؟ الواجهة هي
      تفاوض بين الرغبة والتأخير.
    follow_ups:
      - كيف تشكل الواجهة الطلب؟
      - كيف ستكون المنضدة بدونها؟
      - ما هي العلاقة بين العرض والرغبة؟
  - id: hi_cs_phone_glance
    name: نظرة الهاتف
    prompt: |
      الجميع ينظرون إلى هواتفهم. النظرة هي استراحة، تفقد، انسحاب.
      لاحظ الإيقاع. كم مرة؟ كم من الوقت؟ الهاتف هو
      بوابة للخروج من الغرفة.
    follow_ups:
      - كيف تشكل الهواتف الحضور؟
      - كيف ستكون المساحة بدون هواتف؟
      - ما هي العلاقة بين النظرة والانتباه؟
  - id: hi_cs_steam_rise
    name: صعود البخار
    prompt: |
      يصعد البخار من كوب طازج. الحرارة تحمل الرائحة. البخار
      زائل — يختفي في دقائق. لاحظه. ماذا يضيف البخار إلى اللحظة
      قبل الرشفة الأولى؟
    follow_ups:
      - كيف يشكل البخار الترقب؟
      - ماذا سيكون المشروب بدونه؟
      - ما هي العلاقة بين البخار والطقس؟
  - id: hi_cs_bag_on_chair
    name: حقيبة على كرسي
    prompt: |
      حقيبة تشغل الكرسي بجانب الجالس. إنها تحجز المقعد، توسع المنطقة.
      الحقيبة هي مؤقت. لاحظ الرسالة: "هذه المساحة محجوزة".
      ماذا سيحدث لو طلب أحدهم الجلوس؟
    follow_ups:
      - كيف تطالب الحقيبة بالمساحة؟
      - كيف ستكون الغرفة بدون حجز الكراسي بالحقائب؟
      - ما هي العلاقة بين الشيء والمنطقة؟
  - id: hi_cs_espresso_shot
    name: جرعة إسبريسو
    prompt: |
      جرعة واحدة — سريعة، مكثفة. شارب الإسبريسو غالبًا ما يقف.
      الجرعة هي علامة ترقيم في اليوم. شاهد الطقس. دخول، انتهاء، خروج.
      ماذا تحقق الجرعة؟
    follow_ups:
      - كيف تختلف الجرعة عن اللاتيه؟
      - كيف سيكون المقهى بدون إسبريسو؟
      - ما هي العلاقة بين الجرعة والسرعة؟
  - id: hi_cs_cold_brew_tap
    name: صنبور الكولد برو
    prompt: |
      كولد برو من صنبور — مثل البيرة. طريقة التقديم مختلفة. لا بخار،
      لا انتظار. زبون الكولد برو يريد شيئًا آخر. لاحظ الاختيار.
      ماذا يشير الكولد برو؟
    follow_ups:
      - كيف يغير الكولد برو التجربة؟
      - كيف ستكون القائمة بدونه؟
      - ما هي العلاقة بين درجة الحرارة والهوية؟
  - id: hi_cs_chalkboard_menu
    name: قائمة السبورة
    prompt: |
      القائمة مكتوبة بخط اليد — طباشير على سبورة. إنها تتغير.
      الكتابة اليدوية هي شخصية. لاحظ ما هو مدرج، وما هو غير مدرج.
      السبورة تقول "نحن نتخذ قرارات هنا".
    follow_ups:
      - كيف تشكل السبورة العلامة التجارية؟
      - كيف سيكون الحائط مع قائمة مطبوعة؟
      - ما هي العلاقة بين اليد والأصالة؟
  - id: hi_cs_leaving_cup
    name: كوب متروك
    prompt: |
      الكوب المتروك على الطاولة — فارغ، مهجور. البعض ينظف طاولاته بنفسه؛
      البعض لا يفعل. الكوب المتروك هو اختبار صغير للاهتمام.
      من ينظف؟ من يترك؟ الكوب يحدد نهاية البقاء.
    follow_ups:
      - كيف يشكل التنظيف المساحة؟
      - كيف سيكون المقهى لو ترك الجميع أكوابهم؟
      - ما هي العلاقة بين المغادرة والانتماء؟
  - id: hi_cs_headphones_bubble
    name: فقاعة سماعات الرأس
    prompt: |
      تخلق سماعات الرأس فقاعة. مرتديها حاضر ولكنه غير متاح.
      الفقاعة تقول "لا تقاطع". لاحظ الحد. كيف تشكل الفقاعة المجال الاجتماعي؟
    follow_ups:
      - كيف تمكن سماعات الرأس التركيز؟
      - كيف ستكون المساحة بدونها؟
      - ما هي العلاقة بين الفقاعة والإنتاجية؟
  - id: hi_cs_corner_booth
    name: مقصورة الزاوية
    prompt: |
      مقصورة الزاوية مرغوبة — ظهرها للجدار، إطلالة على الغرفة. إنها
      قابلة للدفاع. لاحظ من يدعيها. الزاوية تحتفظ بسيكولوجية مختلفة عن
      المركز.
    follow_ups:
      - كيف تشكل الزاوية التجربة؟
      - كيف ستكون الغرفة بدون زوايا؟
      - ما هي العلاقة بين الموضع والأمان؟
  - id: hi_cs_sugar_station
    name: محطة السكر
    prompt: |
      سكر، مناديل، أغطية، مصاصات — المحطة خدمة ذاتية. الناس
      يكيفون الطلبات هنا. المحطة هي وقفة بين المنضدة والمقعد.
      لاحظ الخيارات. ماذا يضيف الناس؟
    follow_ups:
      - كيف تمد المحطة المعاملة؟
      - كيف ستكون المنضدة بدونها؟
      - ما هي العلاقة بين التخصيص والتحكم؟
  - id: hi_cs_barista_banter
    name: دردشة الباريستا
    prompt: |
      الباريستا يدردش مع زبون دائم. الدردشة هي أداء واتصال.
      الآخرون يستمعون أو لا. الدردشة تخلق الجو.
      ماذا تضيف إلى الغرفة؟
    follow_ups:
