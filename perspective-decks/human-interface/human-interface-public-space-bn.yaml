# মানব ইন্টারফেস — পাবলিক স্পেস (Bengali)

id: human_interface_public_space
name: মানব ইন্টারফেস — পাবলিক স্পেস
description: 50টি কার্ড যা পাবলিক স্পেসকে দেখার ভঙ্গি পরিবর্তন করবে—বেঞ্চ এবং পথ, অচেনা মানুষের কোরিওগ্রাফি থেকে শুরু করে প্রতীক হিসেবে বস্তুকে দেখা।
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: বেঞ্চ দখল
    prompt: |
      একটি বেঞ্চ দখল করা হয়েছে—একটি শরীর, একটি ব্যাগ, একটি অঙ্গভঙ্গি দিয়ে। বেঞ্চ একটি সীমিত সম্পদ। কে বসে, কে দাঁড়ায়, কে হেঁটে যায়, তা লক্ষ্য করুন। বেঞ্চ বিভিন্ন মানুষের জন্য বিভিন্ন অর্থ বহন করে। এটি কী প্রদান করে?
    follow_ups:
      - বেঞ্চ কীভাবে স্থানকে আকার দেয়?
      - বেঞ্চ ছাড়া পার্ক কেমন হবে?
      - বেঞ্চ এবং বিশ্রামের সম্পর্ক কী?
  - id: hi_ps_pathway_flow
    name: পথের প্রবাহ
    prompt: |
      পথ চলাকে নির্দেশ করে। মানুষ হাঁটে—একা, যুগলে, দলে। প্রবাহের একটি দিক আছে। সংঘর্ষ লক্ষ্য করুন। কে পথ ছেড়ে দেয়? পথটি একটি ভাগ করা করিডোর। এটি কোন নিয়ম দ্বারা পরিচালিত হয়?
    follow_ups:
      - পথটি হাঁটাকে কীভাবে আকার দেয়?
      - পথ ছাড়া স্থানটি কেমন হবে?
      - পথ এবং গন্তব্যের সম্পর্ক কী?
  - id: hi_ps_strangers_choreography
    name: অচেনা মানুষের কোরিওগ্রাফি
    prompt: |
      অপরিচিত শরীরগুলি ভাগ করা জায়গার মধ্য দিয়ে চলাচল করে। কোরিওগ্রাফিটি অলিখিত—পাশ কাটিয়ে যাওয়া, থামা, মিশে যাওয়া। নাচটি লক্ষ্য করুন। কেউ কথা বলে না। কোরিওগ্রাফিটি খাঁটি শরীরী। এর জন্য কী প্রয়োজন?
    follow_ups:
      - কোরিওগ্রাফি কীভাবে স্থানকে আকার দেয়?
      - সবাই যদি থেমে যায় তবে কী হবে?
      - কোরিওগ্রাফি এবং ভদ্রতার সম্পর্ক কী?
  - id: hi_ps_object_talisman
    name: প্রতীক হিসাবে বস্তু
    prompt: |
      বেঞ্চে একটি বই। চেয়ারে একটি ব্যাগ। বস্তুটি একটি স্থান দখল করে। এটি বলে "আমি এখানে" বা "আমি ফিরব।" বস্তুটি একটি প্রতীক। দখল লক্ষ্য করুন। এটি কী রক্ষা করে?
    follow_ups:
      - প্রতীকটি কীভাবে স্থানকে আকার দেয়?
      - এই ধরনের দখল ছাড়া স্থানটি কেমন হবে?
      - বস্তু এবং উপস্থিতির সম্পর্ক কী?
  - id: hi_ps_bench_armrest
    name: বেঞ্চের হাতল
    prompt: |
      কিছু বেঞ্চে হাতল থাকে। তারা আসনকে বিভক্ত করে। তারা শুয়ে থাকতে বাধা দেয়। হাতলটি উদ্দেশ্যমূলকভাবে ডিজাইন করা হয়েছে। এটি কে ব্যবহার করে তা লক্ষ্য করুন। হাতলটি কী বাদ দেয়?
    follow_ups:
      - হাতলটি বেঞ্চকে কীভাবে আকার দেয়?
      - এটি ছাড়া বেঞ্চটি কেমন হবে?
      - হাতল এবং নিয়ন্ত্রণের সম্পর্ক কী?
  - id: hi_ps_pathway_intersection
    name: পথের সংযোগস্থল
    prompt: |
      পথগুলি একে অপরের সাথে মিলিত হয়। শরীর একত্রিত হয়। সংযোগস্থল একটি সংঘর্ষের বিন্দু। মিশ্রণটি লক্ষ্য করুন। প্রবাহগুলি যখন মিলিত হয় তখন কী ঘটে? সংযোগস্থলের জন্য আলোচনার প্রয়োজন। এটি কী বের করে নেয়?
    follow_ups:
      - সংযোগস্থল কীভাবে প্রবাহকে আকার দেয়?
      - সংযোগস্থল ছাড়া স্থানটি কেমন হবে?
      - সংযোগস্থল এবং মনোযোগের সম্পর্ক কী?
  - id: hi_ps_eye_contact_avoid
    name: চক্ষু সংযোগ এড়িয়ে যাওয়া
    prompt: |
      অচেনা মানুষেরা চক্ষু সংযোগ এড়িয়ে চলে। এটি একটি ভদ্রতা। তাকালে সংযোগের ঝুঁকি থাকে। দৃষ্টি লক্ষ্য করুন। এটি একটি চুক্তি। এটি কী সক্ষম করে? এর দাম কত?
    follow_ups:
      - এই এড়িয়ে চলা কীভাবে স্থানকে আকার দেয়?
      - আরও সংযোগ থাকলে স্থানটি কেমন হবে?
      - দৃষ্টি এবং গোপনীয়তার সম্পর্ক কী?
  - id: hi_ps_bench_share
    name: বেঞ্চ ভাগাভাগি
    prompt: |
      দুই অচেনা মানুষ একটি বেঞ্চ ভাগ করে নেয়। তাদের মাঝে ফাঁকা জায়গা। ভাগাভাগি হল সংযোগ ছাড়াই নৈকট্য। সীমানা লক্ষ্য করুন। কতটা কাছে যাওয়া বেশি হয়ে যায়? ভাগাভাগি একটি সূক্ষ্ম ভারসাম্য।
    follow_ups:
      - ভাগাভাগি কীভাবে বেঞ্চকে আকার দেয়?
      - একজন ব্যক্তি থাকলে বেঞ্চটি কেমন হবে?
      - ভাগাভাগি এবং সহনশীলতার সম্পর্ক কী?
  - id: hi_ps_pathway_width
    name: পথের প্রস্থ
    prompt: |
      পথটি চওড়া বা সরু। প্রস্থ প্রবাহকে প্রভাবিত করে। দুজন লোক যেতে পারে বা নাও পারে। প্রস্থ লক্ষ্য করুন। এটি ভিড় সম্পর্কে কী অনুমান করে? প্রস্থ একটি নকশা। এটি কী সক্ষম করে?
    follow_ups:
      - প্রস্থ হাঁটাকে কীভাবে আকার দেয়?
      - পথটি আরও চওড়া হলে কেমন হত?
      - প্রস্থ এবং স্বাচ্ছন্দ্যের সম্পর্ক কী?
  - id: hi_ps_bench_sun
    name: রোদে বেঞ্চ
    prompt: |
      বেঞ্চটি সূর্যের দিকে মুখ করে। অথবা ছায়ার দিকে। অবস্থান গুরুত্বপূর্ণ। কে কোনটি বেছে নেয় তা লক্ষ্য করুন। রোদ একটি সম্পদ। এটি কী প্রদান করে? রোদে বেঞ্চটি কাঙ্ক্ষিত।
    follow_ups:
      - রোদ কীভাবে বেঞ্চকে আকার দেয়?
      - রোদ ছাড়া স্থানটি কেমন হবে?
      - রোদ এবং বিশ্রামের সম্পর্ক কী?
  - id: hi_ps_stranger_proximity
    name: অচেনা মানুষের নৈকট্য
    prompt: |
      একজন অচেনা মানুষ কাছে দাঁড়িয়ে আছে—লাইনে, বাসে। নৈকট্যটি ব্যক্তিগত নয় কিন্তু ঘনিষ্ঠ। সহনশীলতা লক্ষ্য করুন। শরীর কী অনুমতি দেয়? নৈকট্য একটি চুক্তি। এর শর্তাবলী কী?
    follow_ups:
      - নৈকট্য কীভাবে স্থানকে আকার দেয়?
      - আরও জায়গা থাকলে স্থানটি কেমন হবে?
      - নৈকট্য এবং ভদ্রতার সম্পর্ক কী?
  - id: hi_ps_object_left
    name: রেখে যাওয়া বস্তু
    prompt: |
      বেঞ্চে একটি জ্যাকেট। গাছের নিচে একটি ব্যাগ। রেখে যাওয়া বস্তুটি অঞ্চল চিহ্নিত করে। দখল লক্ষ্য করুন। এটি কতক্ষণ ধরে রাখতে পারে? রেখে যাওয়া বস্তুটি একটি পরীক্ষা। এর জন্য অন্যদের কাছ থেকে কী প্রয়োজন?
    follow_ups:
      - বস্তুটি কীভাবে স্থানকে আকার দেয়?
      - এই ধরনের দখল ছাড়া স্থানটি কেমন হবে?
      - বস্তু এবং আস্থার সম্পর্ক কী?
  - id: hi_ps_pathway_obstacle
    name: পথের বাধা
    prompt: |
      কিছু একটা পথ আটকেছে—নির্মাণ কাজ, ভিড়, একজন পারফর্মার। বাধাটি প্রবাহকে ঘুরিয়ে দেয়। পথের বাঁক লক্ষ্য করুন। বাধার জন্য কী প্রয়োজন? পথটি কখনোই খাঁটি থাকে না। কী এটিকে ব্যাহত করে?
    follow_ups:
      - বাধাটি কীভাবে প্রবাহকে আকার দেয়?
      - বাধা ছাড়া পথটি কেমন হবে?
      - বাধা এবং অভিযোজনের সম্পর্ক কী?
  - id: hi_ps_bench_alone
    name: একা বেঞ্চ
    prompt: |
      বেঞ্চে একজন ব্যক্তি। একা থাকা দৃশ্যমান। বেঞ্চ একাকীত্ব ধারণ করে। অঙ্গভঙ্গি লক্ষ্য করুন। একা বেঞ্চ কী প্রদান করে? একা বেঞ্চ একটি পছন্দ। এটি কী সক্ষম করে?
    follow_ups:
      - একাকীত্ব কীভাবে বেঞ্চকে আকার দেয়?
      - বেঞ্চ ছাড়া স্থানটি কেমন হবে?
      - একা থাকা এবং বিশ্রামের সম্পর্ক কী?
  - id: hi_ps_nod_acknowledge
    name: মাথা নাড়া স্বীকৃতি
    prompt: |
      একটু মাথা নাড়া। একটি সংক্ষিপ্ত হাসি। স্বীকৃতিটি ন্যূনতম। এটি বলে "আমি তোমাকে দেখছি" কিন্তু কোন মিথস্ক্রিয়া ছাড়াই। এটি কখন ঘটে তা লক্ষ্য করুন। মাথা নাড়া একটি ছোট ভদ্রতা। এটি কী তৈরি করে?
    follow_ups:
      - মাথা নাড়া কীভাবে স্থানকে আকার দেয়?
      - এটি ছাড়া স্থানটি কেমন হবে?
      - মাথা নাড়া এবং নিরাপত্তার সম্পর্ক কী?
  - id: hi_ps_pathway_edge
    name: পথের কিনারা
    prompt: |
      পথের কিনারা আছে—ঘাস, ফুটপাথ, ব্যারিয়ার। কিনারা পথকে সংজ্ঞায়িত করে। কে পথে থাকে তা লক্ষ্য করুন। কে পার হয়? কিনারা একটি সীমানা। এটি কী ধারণ করে?
    follow_ups:
      - কিনারা হাঁটাকে কীভাবে আকার দেয়?
      - কিনারা ছাড়া পথটি কেমন হবে?
      - কিনারা এবং স্বাধীনতার সম্পর্ক কী?
  - id: hi_ps_bench_claim
    name: বেঞ্চের দাবি
    prompt: |
      বেঞ্চটি দখল করা হয়েছে—ছড়িয়ে থাকা, অঙ্গভঙ্গি, বা ব্যাগ দিয়ে। দাবি বলে "এটি আমার।" দাবি লক্ষ্য করুন। এটি কীভাবে করা হয়? দাবিটি একটি অঞ্চল। এটি কী রক্ষা করে?
    follow_ups:
      - দাবি কীভাবে বেঞ্চকে আকার দেয়?
      - দাবি ছাড়া স্থানটি কেমন হবে?
      - দাবি এবং স্বাচ্ছন্দ্যের সম্পর্ক কী?
  - id: hi_ps_stranger_help
    name: অচেনা মানুষের সাহায্য
    prompt: |
      "সাহায্য লাগবে?" একজন অচেনা ব্যক্তি প্রস্তাব দেয়। সাহায্যটি অপ্রত্যাশিত। বিনিময় লক্ষ্য করুন। গ্রহণ করবেন না প্রত্যাখ্যান করবেন? অচেনা মানুষের সাহায্য একটি উপহার। এর জন্য কী প্রয়োজন?
