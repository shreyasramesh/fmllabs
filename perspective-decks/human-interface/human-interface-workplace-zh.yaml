# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人类交互 — 工作场所 (Mandarin Chinese)

id: human_interface_workplace
name: 人类交互 — 工作场所
description: 50 张卡片，帮助您转变对工作场所的看法——从工位区域 到会议室，再到茶水间，以及可见与不可见的层级。
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: 工位区域
    prompt: |
      一个工位被占领——摆放着照片、植物、马克杯。区域延伸到
      表面之外。观察边界。什么标志着“我的”？工位是一个小
      王国。它是如何被捍卫的？
    follow_ups:
      - 工位如何塑造身份？
      - 没有个性化的工作场所会是怎样的？
      - 区域与归属感之间有什么关系？
  - id: hi_wp_meeting_room
    name: 会议室
    prompt: |
      房间里有桌子、椅子、屏幕。门关上了。会议室是表演的舞台。
      观察谁在说话，谁没有。房间里蕴藏着层级。空间带来了什么？
    follow_ups:
      - 房间如何塑造会议？
      - 没有会议室的工作场所会是怎样的？
      - 房间与权力之间有什么关系？
  - id: hi_wp_water_cooler
    name: 茶水间
    prompt: |
      茶水间是十字路口。人们在那里偶然相遇。这种相遇是非正式的。
      观察谈话内容。在茶水间会说什么，而在会议中不会说？
    follow_ups:
      - 茶水间如何塑造文化？
      - 没有它，工作场所会是怎样的？
      - 茶水间与联系之间有什么关系？
  - id: hi_wp_visible_hierarchy
    name: 可见层级
    prompt: |
      总裁办公室、靠窗座位、隔间。空间编码了等级。观察分布情况。
      谁得到什么？层级被融入了建筑。它传达了什么？
    follow_ups:
      - 层级如何塑造行为？
      - 没有它，工作场所会是怎样的？
      - 空间与地位之间有什么关系？
  - id: hi_wp_invisible_hierarchy
    name: 不可见层级
    prompt: |
      有些人备受倾听；有些人被打断。层级不在组织图上。观察会议。
      谁会退让？谁会主导？不可见层级塑造了结果。
    follow_ups:
      - 不可见层级是如何产生的？
      - 如果层级可见，工作场所会是怎样的？
      - 不可见层级与权力之间有什么关系？
  - id: hi_wp_cubicle_wall
    name: 隔间墙
    prompt: |
      墙不高——你可以看到上面。隐私是部分的。隔间是一种妥协。
      观察视线。你能听到什么？你能看到什么？墙壁创造了边界的幻觉。
    follow_ups:
      - 隔间如何塑造专注力？
      - 有了完全封闭的墙壁，工作场所会是怎样的？
      - 墙壁与隐私之间有什么关系？
  - id: hi_wp_corner_office
    name: 拐角办公室
    prompt: |
      拐角办公室有两个窗户。这是奖品。观察谁占据它。拐角办公室
      从楼层上可见。它是一个象征。拐角传达了什么？
    follow_ups:
      - 拐角办公室如何塑造抱负？
      - 没有它，楼层会是怎样的？
      - 拐角与权威之间有什么关系？
  - id: hi_wp_open_plan
    name: 开放式办公
    prompt: |
      没有墙壁。工位排成行或小组。开放式办公承诺协作。
      观察现实。谁戴着耳机？开放式办公创造了近距离。它付出了什么代价？
    follow_ups:
      - 开放式办公如何塑造互动？
      - 有了墙壁，工作场所会是怎样的？
      - 开放与专注之间有什么关系？
  - id: hi_wp_calendar_invite
    name: 日历邀请
    prompt: |
      邀请出现。接受、拒绝、暂定。日历构成了一天。
      观察这些时间块。谁控制着谁的时间？日历是权力的地图。
    follow_ups:
      - 日历如何塑造一天？
      - 没有它，工作场所会是怎样的？
      - 邀请与义务之间有什么关系？
  - id: hi_wp_knock_before_enter
    name: 先敲门
    prompt: |
      有些门是关着的。敲门是一种请求。观察谁敲门，谁直接进来。
      敲门编码了尊重。关着的门保护了什么？
    follow_ups:
      - 敲门如何塑造相遇？
      - 门都开着的，工作场所会是怎样的？
      - 敲门与边界之间有什么关系？
  - id: hi_wp_headphones_signal
    name: 耳机信号
    prompt: |
      戴上耳机表示“请勿打扰”。这个信号是通用的。观察谁尊重它。
      耳机创造了一个气泡。这个气泡带来了什么？
    follow_ups:
      - 耳机如何塑造楼层？
      - 没有耳机，工作场所会是怎样的？
      - 耳机与专注之间有什么关系？
  - id: hi_wp_lunch_room
    name: 休息室
    prompt: |
      休息室有桌子、微波炉、冰箱。人们独自或一起用餐。
      观察人群。谁和谁一起坐？休息室揭示了联盟。安排说明了什么？
    follow_ups:
      - 休息室如何塑造文化？
      - 没有它，工作场所会是怎样的？
      - 午餐与联系之间有什么关系？
  - id: hi_wp_slack_ping
    name: Slack 提示音
    prompt: |
      提示音来了。即时，异步。提示音可以打断，也可以等待。
      观察惯例。谁立即回复？提示音创造了一种新的沟通节奏。
      它取代了什么？
    follow_ups:
      - 提示音如何塑造一天？
      - 没有它，工作场所会是怎样的？
      - 提示音与紧迫感之间有什么关系？
  - id: hi_wp_whiteboard_claim
    name: 白板认领
    prompt: |
      白板承载着想法——图表、列表。有人写了它们。
      白板是一个共享的表面。观察谁在写，谁在擦。白板是领土。
      它承载了什么？
    follow_ups:
      - 白板如何塑造协作？
      - 没有它，会议会是怎样的？
      - 白板与思想之间有什么关系？
  - id: hi_wp_elevator_encounter
    name: 电梯偶遇
    prompt: |
      你和同事一起乘电梯。三十秒。这次偶遇是尴尬还是轻松。
      观察闲聊。说了什么？电梯压缩了时间。它需要什么？
    follow_ups:
      - 电梯如何塑造偶遇？
      - 没有电梯，建筑会是怎样的？
      - 电梯与礼仪之间有什么关系？
  - id: hi_wp_cc_email
    name: 抄送邮件
    prompt: |
      你被抄送了。你不是主要收件人。抄送让你处于沟通循环中。
      观察谁被抄送。抄送是一种相关性——或政治的信号。
      抄送做了什么？
    follow_ups:
      - 抄送如何塑造沟通？
      - 没有抄送，工作场所会是怎样的？
      - 抄送与可见性之间有什么关系？
  - id: hi_wp_standing_desk
    name: 升降桌
    prompt: |
      桌子升高了。工人站着。升降桌是一种选择——健康、偏好、性能。
      观察谁拥有一个。升降桌代表了什么？
    follow_ups:
      - 升降桌如何塑造身体？
      - 没有它，工作场所会是怎样的？
      - 站立与生产力之间有什么关系？
  - id: hi_wp_conference_call
    name: 电话会议
    prompt: |
      来自远方的声音。电话会议连接了分散的人。
      观察谁在说话，谁静音了。电话会议是一种部分在场。
      电话会议带来了什么——又失去了什么？
    follow_ups:
      - 电话会议如何塑造会议？
      - 没有它，工作场所会是怎样的？
      - 电话会议与在场感之间有什么关系？
  - id: hi_wp_office_plant
    name: 办公室内植物
    prompt: |
      桌上的植物——绿萝、多肉。它是装饰和照料。
      植物不属于公司。观察谁有植物。植物为空间增添了什么？
    follow_ups:
      - 植物如何塑造工位？
      - 没有植物，工作场所会是怎样的？
      - 植物与身份之间有什么关系？
  - id: hi_wp_after_hours
    name: 下班后
    prompt: |
      大多数人都走了之后，办公室。灯光昏暗。下班后的工作人员
      很显眼——敬业或挣扎。观察场景。空办公室带来了什么？
      它付出了什么代价？
    follow_ups:
      - 下班后如何塑造文化？
      - 没有下班后的工作场所会是怎样的？
      - 工作时间与期望之间有什么关系？
  - id: hi_wp_nameplate
    name: 名牌
    prompt: |
      桌上、门上的名字。名牌认领了空间。观察谁有名牌。
      名牌是身份和领土。它向路过的人传达了什么？
    follow_ups:
      - 名牌如何塑造空间？
      - 没有名牌，工作场所会是怎样的？
      - 名牌与存在感之间有什么关系？
  - id: hi_wp_meeting_overrun
    name: 会议超时
    prompt: |
      会议本应结束。但没有。超时很常见。
      观察动态。谁有下一个会议？谁能留下？超时是一种权力举动。
      它榨取了什么？
    follow_ups:
      - 超时如何塑造一天？
      - 如果有严格的结束时间，工作场所会是怎样的？
      - 超时与尊重之间有什么关系？
  - id: hi_wp_quick_question
    name: 快速提问
    prompt: |
      “有个快速问题？”这个请求打断了。这里的“快速”是一种承诺。
      观察交流。有多快？快速提问是对时间的谈判。
      它付出了什么代价？
    follow_ups:
      - 快速提问如何塑造流程？
      - 没有打断的工作场所会是怎样的？
      - 快速与尊重之间有什么关系？
  - id: hi_wp_bathroom_encounter
    name: 卫生间偶遇
    prompt: |
      你在卫生间看到一位同事。这次偶遇很暧昧。眼神接触还是不接触？
      卫生间是一个过渡空间。观察惯例。这次偶遇需要什么？
    follow_ups:
      - 卫生间如何塑造工作场所？
      - 没有共用卫生间，工作场所会是怎样的？
      - 卫生间与隐私之间有什么关系？
  - id: hi_wp_commute_talk
    name: 通勤闲聊
    prompt: |
      “通勤怎么样？”这个问题开启了闲聊。通勤是一种共同的经历。
      观察交流。通勤闲聊对这段关系有什么作用？
    follow_ups:
      - 通勤闲聊如何塑造一天？
      - 没有它，工作场所会是怎样的？
      - 通勤与联系之间有什么关系？
  - id: hi_wp_parking_spot
    name: 停车位
    prompt: |
      预留车位，先到先得车位。停车编码了层级。
      观察谁停在哪里。车位是一种小特权。它传达了什么？
    follow_ups:
      - 停车如何塑造工作场所？
      - 没有预留车位，停车场会是怎样的？
      - 车位与地位之间有什么关系？
  - id: hi_wp_birthday_cake
    name: 生日蛋糕
    prompt: |
      蛋糕出现了。有人过生日。团队聚集起来。蛋糕是一种仪式。
      观察聚集。生日时刻对团队有什么作用？
    follow_ups:
      - 生日如何塑造文化？
      - 没有生日蛋糕，工作场所会是怎样的？
      - 蛋糕与归属感之间有什么关系？
  - id: hi_wp_forwarded_email
    name: 转发邮件
    prompt: |
      一封邮件被转发了。“仅供参考”或“认为你应该看看”。
      转发延续了对话。观察谁被转发了。转发是一种信号。
      它意味着什么？
    follow_ups:
      - 转发如何塑造沟通？
      - 没有它，工作场所会是怎样的？
      - 转发与信任之间有什么关系？
  - id: hi_wp_break_room
    name: 茶歇室
    prompt: |
      咖啡、零食，有时还有沙发。茶歇室是暂停的地方。人们去那里休息。
      观察谁在使用它。茶歇室是一个避难所。它提供了什么？
    follow_ups:
      - 茶歇室如何塑造一天？
      - 没有它，工作场所会是怎样的？
      - 茶歇与生产力之间有什么关系？
  - id: hi_wp_office_supply
    name: 办公用品
    prompt: |
      笔、纸、订书机——储藏室里有工具。有人管理它。
      观察谁拿了什么。用品是一个小公共资源。有什么规则？
    follow_ups:
      - 用品如何塑造工作场所？
      - 没有它们，工作场所会是怎样的？
      - 用品与权利感之间有什么关系？
  - id: hi_wp_remote_camera
    name: 远程摄像头
    prompt: |
      摄像头开着或关着。远程工作者选择。这个选择是可见的。
      观察惯例。谁一直开着？摄像头是一扇窗户。
      它揭示了什么？
    follow_ups:
      - 摄像头如何塑造会议？
      - 没有它，会议会是怎样的？
      - 摄像头与在场感之间有什么关系？
  - id: hi_wp_side_conversation
    name: 私下交谈
    prompt: |
      两个人一边工作一边交谈。私下交谈是私密的但可见的。
      观察动态。它是否具有破坏性？私下交谈是一种小小的反抗。
      它创造了什么？
    follow_ups:
      - 私下交谈如何塑造楼层？
      - 没有它，工作场所会是怎样的？
      - 私下交谈与排斥之间有什么关系？
  - id: hi_wp_clean_desk
    name: 整洁的工位
    prompt: |
      有些工位一尘不染——没有任何个人物品。整洁的工位是政策或
      偏好。观察对比。整洁的工位传达了什么？
      单调？纪律？超然？
    follow_ups:
      - 整洁的工位如何塑造员工？
      - 如果工位凌乱，工作场所会是怎样的？
      - 整洁与身份之间有什么关系？
  - id: hi_wp_meeting_no_show
    name: 会议缺席
    prompt: |
      会议已安排。但有人没来。缺席是一种信息。
      观察反应。有人提及吗？缺席是一种小小的权力举动。
      它传达了什么？
    follow_ups:
      - 缺席如何塑造会议？
      - 没有缺席，工作场所会是怎样的？
      - 缺席与尊重之间有什么关系？
  - id: hi_wp_cubicle_visit
    name: 隔间拜访
    prompt: |
      有人走过来。他们站在隔间边缘。这次拜访是一种选择——他们本可以
      发消息的。观察动态。这次拜访带来了什么，而消息无法带来？
    follow_ups:
      - 拜访如何塑造互动？
      - 没有拜访，工作场所会是怎样的？
      - 拜访与打断之间有什么关系？
  - id: hi_wp_shared_printer
    name: 共用打印机
    prompt: |
      打印机是共用的。文件堆积如山。必须有人取走。
      打印机是十字路口。观察相遇。当两个人同时去取同一份输出时会发生什么？
    follow_ups:
      - 打印机如何塑造楼层？
      - 没有它，工作场所会是怎样的？
      - 打印机与耐心之间有什么关系？
  - id: hi_wp_office_temperature
    name: 办公室温度
    prompt: |
      “太冷了。”“太热了。”温度存在争议。有人控制着恒温器。
      观察抱怨。温度是一个小的权力斗争场所。谁赢了？
    follow_ups:
      - 温度如何塑造工作场所？
      - 如果可以个人控制，工作场所会是怎样的？
      - 温度与舒适度之间有什么关系？
  - id: hi_wp_handshake
    name: 握手
    prompt: |
      握手——初次见面，交易达成。握手是一种仪式。
      观察握手的力度、持续时间。握手编码了正式性。它传达了什么？
    follow_ups:
      - 握手如何塑造相遇？
      - 没有握手，工作场所会是怎样的？
      - 握手与信任之间有什么关系？
  - id: hi_wp_cc_removal
    name: 移除抄送
    prompt: |
      “全部回复”还是“回复”？选择很重要。将某人从对话中移除是一种信号。
      观察动态。谁被剔除了？移除抄送是一种小小的排斥。
      它意味着什么？
    follow_ups:
      - 移除如何塑造对话？
      - 没有回复选项，工作场所会是怎样的？
      - 移除与权力之间有什么关系？
  - id: hi_wp_office_tour
    name: 办公室参观
    prompt: |
      一位新员工接受参观。“这是厨房。这是我们开会的地方。”
      参观是引导。观察导游。参观传达了关于文化的什么信息？
    follow_ups:
      - 参观如何塑造新员工？
      - 没有它，入职培训会是怎样的？
      - 参观与归属感之间有什么关系？
  - id: hi_wp_meeting_room_book
    name: 会议室预订
    prompt: |
      房间被预订了。或者被重复预订了。日历是裁判。
      观察冲突。谁让步？预订是对空间和时间的占有。
      它需要什么？
    follow_ups:
      - 预订如何塑造一天？
      - 没有预订，工作场所会是怎样的？
      - 预订与优先级之间有什么关系？
  - id: hi_wp_goodbye_ritual
    name: 告别仪式
    prompt: |
      一天结束。 “我走了。” “明天见。” 告别是一种仪式。
      观察交流。谁向谁告别？仪式标志着工作与非工作之间的界限。
    follow_ups:
      - 告别如何塑造一天？
      - 没有它，工作场所会是怎样的？
      - 告别与结束之间有什么关系？
  - id: hi_wp_promotion_announce
    name: 晋升宣布
    prompt: |
      “我们很高兴地宣布……”晋升是公开的。宣布创造了一个时刻。
      观察反应。祝贺、沉默、侧目。宣布对房间产生了什么影响？
    follow_ups:
      - 宣布如何塑造文化？
      - 没有公开的晋升，工作场所会是怎样的？
      - 宣布与层级之间有什么关系？
  - id: hi_wp_desk_move
    name: 工位调动
    prompt: |
      有人调动了工位。调动是晋升、重组或选择。
      观察过程。他们带走了什么？留下了什么？调动是一种过渡。
      它意味着什么？
    follow_ups:
      - 调动如何塑造员工？
      - 没有调动，工作场所会是怎样的？
      - 调动与身份之间有什么关系？
  - id: hi_wp_office_gossip
    name: 办公室八卦
    prompt: |
      信息传播——谁要走了，谁很沮丧。八卦是非正式的。
      观察它发生在何处。茶水间，走廊。八卦对团队有什么作用？
    follow_ups:
      - 八卦如何塑造文化？
      - 没有它，工作场所会是怎样的？
      - 八卦与归属感之间有什么关系？
  - id: hi_wp_meeting_agenda
    name: 会议议程
    prompt: |
      议程构成了会议。或者没有——会议偏离了主题。
      观察动态。谁遵循议程？谁不遵循？议程是一种契约。
      它带来了什么？
    follow_ups:
      - 议程如何塑造会议？
      - 没有它，会议会是怎样的？
      - 议程与权力之间有什么关系？
  - id: hi_wp_office_food
    name: 办公室食品
    prompt: |
      甜甜圈、水果、客户会议的剩菜。食物出现了。
      人们聚集在一起。观察分享。办公室食品是一种小礼物。
      它创造了什么？
    follow_ups:
      - 食品如何塑造工作场所？
      - 没有它，工作场所会是怎样的？
      - 食品与社区之间有什么关系？
  - id: hi_wp_last_day
    name: 最后一天
    prompt: |
      某人的最后一天。告别，也许有张卡片，也许有蛋糕。最后一天是
      一种告别仪式。观察情绪。最后一天对离开者和留下的人有什么作用？
    follow_ups:
      - 最后一天如何塑造文化？
      - 没有告别仪式，工作场所会是怎样的？
      - 最后一天与结束之间有什么关系？
  - id: hi_wp_office_hours
    name: 办公时间
    prompt: |
      “我的办公时间是周二下午 2-4 点。”这个时间段是开放的。人们可以随时来。
      观察谁会来。办公时间是一种邀请。它们带来了什么？
    follow_ups:
      - 办公时间如何塑造访问？
      - 没有它们，工作场所会是怎样的？
      - 办公时间与可用性之间有什么关系？
  - id: hi_wp_workspace_claim
    name: 工作空间认领
    prompt: |
      椅子上放着一件夹克。桌子底下放着包。认领表示“我在这里”或“我马上回来”。
      观察信号。认领可以维持多久？工作空间被暂时拥有。
      有什么规则？
    follow_ups:
      - 认领如何塑造楼层？
      - 没有认领，工作场所会是怎样的？
      - 认领与存在感之间有什么关系？
