# انسانی انٹرفیس — ٹرانزٹ ہب (Urdu)

id: human_interface_transit_hub
name: انسانی انٹرفیس — ٹرانزٹ ہب
description: 50 کارڈز جو ٹرانزٹ ہب کو دیکھنے کے آپ کے انداز کو بدل دیں گے— پلیٹ فارم اور انتظار سے لے کر آمد/روانگی کے بہاؤ اور سفر کرنے والے اجنبیوں کی کوریوگرافی تک۔
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: پلیٹ فارم کا کنارہ
    prompt: |
      پلیٹ فارم کا کنارہ ایک حد ہے۔ پیلی لائن، خلا، پٹڑی۔ لوگ مختلف فاصلوں پر کھڑے ہوتے ہیں۔ کچھ آگے جھکتے ہیں؛ کچھ پیچھے رہتے ہیں۔ تقسیم کا مشاہدہ کریں۔ کنارے کا کیا مطلب ہے؟
    follow_ups:
      - کنارہ توقعات کو کیسے تشکیل دیتا ہے؟
      - لائن کے بغیر پلیٹ فارم کیا ہوگا؟
      - کنارے اور خطرے کے درمیان کیا تعلق ہے؟
  - id: hi_th_waiting_posture
    name: انتظار کا انداز
    prompt: |
      انتظار کرتے ہوئے جسم خود کو منظم کرتے ہیں— وزن ایک پاؤں پر، فون ہاتھ میں، بیگ پاؤں کے درمیان۔ انداز دورانیے کو ظاہر کرتا ہے۔ کون صبر والا لگتا ہے؟ کون بے چین لگتا ہے؟ انتظار کی ایک جسمانی زبان ہے۔
    follow_ups:
      - انداز توقعات کو کیسے ظاہر کرتا ہے؟
      - انتظار کے بغیر پلیٹ فارم کیا ہوگا؟
      - انداز اور وقت کے درمیان کیا تعلق ہے؟
  - id: hi_th_arrival_flow
    name: آمد کا بہاؤ
    prompt: |
      ٹرین کے دروازے کھلتے ہیں۔ لوگ باہر نکلتے ہیں— چڑھنے والوں کے بہاؤ کے خلاف۔ بہاؤ کی اپنی فزکس ہوتی ہے۔ ٹکراؤ، پہلو بدلنا، ضم ہونا کا مشاہدہ کریں۔ تبادلے کو کون سے اصول چلاتے ہیں؟
    follow_ups:
      - بہاؤ پلیٹ فارم کو کیسے تشکیل دیتا ہے؟
      - اگر سب لوگ بھاگتے تو کیا ہوتا؟
      - بہاؤ اور کارکردگی کے درمیان کیا تعلق ہے؟
  - id: hi_th_strangers_transit
    name: سفر میں اجنبی
    prompt: |
      آپ ان لوگوں کے ساتھ گاڑی شیئر کرتے ہیں جنہیں آپ دوبارہ کبھی نہیں دیکھیں گے۔ تعلق کے بغیر قربت۔ سمجھوتے کا مشاہدہ کریں۔ اجنبی ایک دوسرے کے کس کے مقروض ہیں؟ ٹرانزٹ گاڑی ایک عارضی معاشرہ ہے۔
    follow_ups:
      - ٹرانزٹ عارضی برادری کیسے بناتا ہے؟
      - بات چیت کے ساتھ گاڑی کیا ہوگی؟
      - اجنبی اور تہذیب کے درمیان کیا تعلق ہے؟
  - id: hi_th_departure_board
    name: روانگی کا بورڈ
    prompt: |
      وقت، پلیٹ فارم، تاخیریں— بورڈ سچائی کا ماخذ ہے۔ نظریں اس کی طرف اٹھتی ہیں۔ بورڈ حرکت کو متعین کرتا ہے۔ اجتماعی نگاہ کا مشاہدہ کریں۔ بورڈ ہجوم کے ساتھ کیا کرتا ہے؟
    follow_ups:
      - بورڈ رویے کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر ہب کیا ہوگا؟
      - ڈسپلے اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_th_escalator_stand
    name: ایسکلیٹر پر کھڑے ہونا
    prompt: |
      دائیں کھڑے ہوں، بائیں چلیں— یا اس کے برعکس، شہر پر منحصر ہے۔ ایسکلیٹر کے اصول ہیں۔ مشاہدہ کریں کہ کون ان پر عمل کرتا ہے۔ ایسکلیٹر ایک چلتی ہوئی قطار ہے۔ قاعدہ کیا قابل بناتا ہے؟
    follow_ups:
      - ایسکلیٹر کا قاعدہ بہاؤ کو کیسے تشکیل دیتا ہے؟
      - اگر سب لوگ کھڑے ہوتے تو کیا ہوتا؟
      - قاعدہ اور کارکردگی کے درمیان کیا تعلق ہے؟
  - id: hi_th_ticket_gate
    name: ٹکٹ گیٹ
    prompt: |
      گیٹ کارڈ پڑھتا ہے، بیپ کرتا ہے، کھل جاتا ہے۔ گیٹ ایک چیک پوائنٹ ہے۔ یہ ادا شدہ کو غیر ادا شدہ سے الگ کرتا ہے۔ تال کا مشاہدہ کریں۔ کون گڑبڑ کرتا ہے؟ کون آسانی سے گزر جاتا ہے؟ گیٹ ایک امتحان ہے۔
    follow_ups:
      - گیٹ سفر کو کیسے تشکیل دیتا ہے؟
      - گیٹس کے بغیر ہب کیا ہوگا؟
      - گیٹ اور تعلق کے درمیان کیا تعلق ہے؟
  - id: hi_th_luggage_drag
    name: سامان کا گھسیٹا جانا
    prompt: |
      ٹائل پر پہیے۔ سوٹ کیس پیچھے چلتا ہے۔ گھسیٹا جانا مسافروں کے راستے کو نشان زد کرتا ہے۔ سامان جسم کو بڑھاتا ہے۔ بوجھ کا مشاہدہ کریں۔ سامان سفر کے بارے میں کیا کہتا ہے؟
    follow_ups:
      - سامان نقل و حرکت کو کیسے تشکیل دیتا ہے؟
      - بیگ کے بغیر ہب کیا ہوگا؟
      - بوجھ اور منزل کے درمیان کیا تعلق ہے؟
  - id: hi_th_bench_occupation
    name: بینچ پر قبضہ
    prompt: |
      بینچ پلیٹ فارم کے ساتھ لگے ہوتے ہیں۔ کچھ بیٹھتے ہیں؛ کچھ ساتھ کھڑے ہوتے ہیں۔ بینچ ایک محدود وسیلہ ہے۔ مشاہدہ کریں کہ کون اس کا دعویٰ کرتا ہے۔ وہ کتنی دیر تک رہتے ہیں؟ بینچ ایک چھوٹی سی علاقہ ہے۔
    follow_ups:
      - بینچ انتظار کو کیسے تشکیل دیتا ہے؟
      - بینچ کے بغیر پلیٹ فارم کیا ہوگا؟
      - سیٹ اور دورانیے کے درمیان کیا تعلق ہے؟
  - id: hi_th_announcement_voice
    name: اعلان کی آواز
    prompt: |
      "اگلی ٹرین..." آواز خودکار یا انسانی ہے۔ یہ شور کو چیر دیتی ہے۔ اعلان مشترکہ علم پیدا کرتا ہے۔ مشاہدہ کریں کہ کون سنتا ہے۔ کس نے پہلے ہی اپنا فون چیک کر لیا ہے؟
    follow_ups:
      - اعلان ہجوم کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر ہب کیا ہوگا؟
      - آواز اور اختیار کے درمیان کیا تعلق ہے؟
  - id: hi_th_door_positioning
    name: دروازے کی پوزیشننگ
    prompt: |
      باقاعدگی سے آنے والے جانتے ہیں کہ دروازے کہاں کھلیں گے۔ وہ خود کو پوزیشن کرتے ہیں۔ نئے آنے والے اندازہ لگاتے ہیں۔ پوزیشننگ ایک حکمت عملی ہے۔ کلسٹرنگ کا مشاہدہ کریں۔ پوزیشن کیا طے کرتی ہے؟
    follow_ups:
      - پوزیشننگ چڑھنے کو کیسے تشکیل دیتی ہے؟
      - اگر دروازے بے ترتیب ہوتے تو پلیٹ فارم کیا ہوتا؟
      - پوزیشن اور فائدے کے درمیان کیا تعلق ہے؟
  - id: hi_th_handrail_grip
    name: ہینڈریل کی گرفت
    prompt: |
      گاڑی کے اندر، ہاتھ ریل کو تلاش کرتے ہیں۔ گرفت حفاظت ہے۔ مشاہدہ کریں کہ کون پکڑتا ہے، کسے ضرورت نہیں ہے۔ ہینڈریل ایک مشترکہ شے ہے۔ گرفت کیا ظاہر کرتی ہے؟
    follow_ups:
      - ہینڈریل استحکام کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر گاڑی کیا ہوگی؟
      - گرفت اور اعتماد کے درمیان کیا تعلق ہے؟
  - id: hi_th_window_reflection
    name: کھڑکی کی عکاسی
    prompt: |
      کھڑکی سرنگ، پلیٹ فارم، اور آپ کے اپنے چہرے کو دکھاتی ہے۔ عکاسی ناگزیر ہے۔ لوگ خود کو دیکھتے ہیں یا اس سے بچتے ہیں۔ عکاسی اور نگاہ کے درمیان تعلق کا مشاہدہ کریں۔
    follow_ups:
      - عکاسی خود آگاہی کو کیسے تشکیل دیتی ہے؟
      - کھڑکی کے بغیر سواری کیا ہوگی؟
      - عکاسی اور رازداری کے درمیان کیا تعلق ہے؟
  - id: hi_th_seat_offer
    name: سیٹ کی پیشکش
    prompt: |
      کوئی بزرگ، بچے والے والدین کو سیٹ پیش کرتا ہے۔ پیشکش ایک چھوٹا سا اخلاقی عمل ہے۔ مشاہدہ کریں کہ یہ کب ہوتا ہے۔ کون پیش کرتا ہے؟ کون قبول کرتا ہے؟ سیٹ ایک تحفہ ہے۔
    follow_ups:
      - پیشکش گاڑی کو کیسے تشکیل دیتی ہے؟
      - ایسی پیشکشوں کے بغیر سواری کیا ہوگی؟
      - پیشکش اور دیکھ بھال کے درمیان کیا تعلق ہے؟
  - id: hi_th_delay_sigh
    name: تاخیر کی آہ
    prompt: |
      "تاخیر ہے۔" اجتماعی آہ۔ تاخیر مشترکہ قسمت ہے۔ اجنبی نظریں بدلتے ہیں۔ تاخیر نے یکجہتی کا ایک لمحہ پیدا کیا۔ شفٹ کا مشاہدہ کریں۔ تاخیر ہجوم کے ساتھ کیا کرتی ہے؟
    follow_ups:
      - تاخیر انتظار کو کیسے تشکیل دیتی ہے؟
      - تاخیر کے بغیر ہب کیا ہوگا؟
      - تاخیر اور مایوسی کے درمیان کیا تعلق ہے؟
  - id: hi_th_backpack_turn
    name: بیگ کا موڑنا
    prompt: |
      بھیڑ والی گاڑی میں، کوئی اپنا بیگ آگے کی طرف موڑتا ہے۔ موڑ غور و فکر ہے۔ یہ جگہ بناتا ہے۔ مشاہدہ کریں کہ کون کرتا ہے۔ بیگ کا موڑنا ایک چھوٹا سا سماجی معاہدہ ہے۔
    follow_ups:
      - موڑ قربت کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر گاڑی کیا ہوگی؟
      - موڑ اور آگاہی کے درمیان کیا تعلق ہے؟
  - id: hi_th_exit_anticipation
    name: نکلنے کی توقع
    prompt: |
      سٹاپ قریب آنے پر، لوگ دروازے کے قریب جمع ہو جاتے ہیں۔ توقع نظر آتی ہے۔ جسم ہلتے ہیں۔ دروازہ کھلے گا۔ تیاری کا مشاہدہ کریں۔ توقع کیا مطالبہ کرتی ہے؟
    follow_ups:
      - توقع نکلنے کو کیسے تشکیل دیتی ہے؟
      - تیاری کے بغیر سٹاپ کیا ہوگا؟
      - توقع اور بہاؤ کے درمیان کیا تعلق ہے؟
  - id: hi_th_transfer_corridor
    name: ٹرانسفر راہداری
    prompt: |
      راہداری لائنوں کو جوڑتی ہے۔ لوگ مقصد کے ساتھ چلتے ہیں۔ ٹرانسفر ایک منتقلی ہے— سسٹمز کے درمیان، انتظار کے درمیان۔ رفتار کا مشاہدہ کریں۔ راہداری کی اپنی ایک تال ہے۔
    follow_ups:
      - راہداری سفر کو کیسے تشکیل دیتی ہے؟
      - ٹرانسفر کے بغیر ہب کیا ہوگا؟
      - راہداری اور تعلق کے درمیان کیا تعلق ہے؟
  - id: hi_th_phone_glow
    name: فون کی چمک
    prompt: |
      دھندلی گاڑی میں، چہرے فون سے چمکتے ہیں۔ چمک انفرادی ہے۔ ہر شخص کی اپنی روشنی ہوتی ہے۔ تقسیم کا مشاہدہ کریں۔ فون عوام میں نجی جگہ بناتا ہے۔
    follow_ups:
      - فون سواری کو کیسے تشکیل دیتا ہے؟
      - فون کے بغیر گاڑی کیا ہوگی؟
      - چمک اور تنہائی کے درمیان کیا تعلق ہے؟
  - id: hi_th_stroller_navigation
    name: اسٹرولر نیویگیشن
    prompt: |
      ایک والدین ہجوم میں سے ایک اسٹرولر کو دھکیلتے ہیں۔ نیویگیشن نازک ہے۔ لوگ راستہ بناتے ہیں۔ اسٹرولر بہاؤ کو بدل دیتا ہے۔ موافقت کا مشاہدہ کریں۔ اسٹرولر کیا مطالبہ کرتا ہے؟
    follow_ups:
      - اسٹرولر ہجوم کو کیسے تشکیل دیتا ہے؟
      - اسٹرولرز کے بغیر ہب کیا ہوگا؟
      - اسٹرولر اور دیکھ بھال کے درمیان کیا تعلق ہے؟
  - id: hi_th_vendor_station
    name: دکاندار کا سٹیشن
    prompt: |
      ایک کِیوِسک کافی، ناشتے، اخبارات فروخت کرتا ہے۔ دکاندار چلتے پھرتے لوگوں کی خدمت کرتا ہے۔ لین دین جلدی ہوتا ہے۔ تبادلے کا مشاہدہ کریں۔ دکاندار بہاؤ میں ایک جزیرہ ہے۔
    follow_ups:
      - دکاندار ہب کو کیسے تشکیل دیتا ہے؟
      - دکانداروں کے بغیر ہب کیا ہوگا؟
      - دکاندار اور انتظار کے درمیان کیا تعلق ہے؟
  - id: hi_th_track_gap
    name: پٹڑی کا خلا
    prompt: |
      خلا کا خیال رکھیں۔ پلیٹ فارم اور گاڑی کے درمیان کا خلا ایک خطرہ ہے۔ لوگ اس پر قدم رکھتے ہیں۔ خلا مختلف ہوتا ہے۔ احتیاط کا مشاہدہ کریں۔ خلا کو جسم سے کیا مطالبہ ہوتا ہے؟
    follow_ups:
      - خلا چڑھنے کو کیسے تشکیل دیتا ہے؟
      - اس کے بغیر پلیٹ فارم کیا ہوگا؟
      - خلا اور توجہ کے درمیان کیا تعلق ہے؟
  - id: hi_th_schedule_check
    name: شیڈول چیک
    prompt: |
      اُنگلیاں فون پر تھپتھپاتی ہیں۔ ایپ بتاتی ہے کہ کب۔ شیڈول چیک مسلسل ہے۔ یہ غیر یقینی صورتحال کو کم کرتا ہے۔ تال کا مشاہدہ کریں۔ لوگ کتنی بار چیک کرتے ہیں؟
    follow_ups:
      - شیڈول انتظار کو کیسے تشکیل دیتا ہے؟
      - ایپس کے بغیر ہب کیا ہوگا؟
      - چیک اور کنٹرول کے درمیان کیا تعلق ہے؟
  - id: hi_th_crowd_density
    name: ہجوم کی کثافت
    prompt: |
      رش آور گھنٹے میں پلیٹ فارم بھر جاتا ہے۔ جسم دب جاتے ہیں۔ کثافت کی حدود ہوتی ہیں۔ حد کا مشاہدہ کریں۔ یہ کب ناقابل برداشت ہو جاتا ہے؟ ہجوم کی اپنی فزکس ہوتی ہے۔
    follow_ups:
