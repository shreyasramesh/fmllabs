# ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ರಿಟೇಲ್ (Kannada)

id: human_interface_retail
name: ಮಾನವ ಇಂಟರ್ಫೇಸ್ — ರಿಟೇಲ್
description: 50 ಕಾರ್ಡ್‌ಗಳು ರಿಟೇಲ್ ಜಾಗವನ್ನು ನೀವು ನೋಡುವ ರೀತಿಯನ್ನು ಬದಲಾಯಿಸಲು — ನಡಾವಳಿಗಳು ಮತ್ತು ಬ್ರೌಸಿಂಗ್ ಕೋರಿಯೋಗ್ರಫಿಯಿಂದ ಫಿಟ್ಟಿಂಗ್ ರೂಮ್‌ಗಳು ಮತ್ತು ಖರೀದಿಯ ನೃತ್ಯದವರೆಗೆ.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: ನಡಾವಳಿ ಪ್ರವಾಹ
    prompt: |
      ನಡಾವಳಿ ಚಲನೆಯನ್ನು ಚಾನಲ್ ಮಾಡುತ್ತದೆ. ಗಾಡಿಗಳು ಒಂದು ದಿಕ್ಕಿನಲ್ಲಿ ಹೋಗುತ್ತವೆ; ದೇಹಗಳು ನ್ಯಾವಿಗೇಟ್ ಮಾಡುತ್ತವೆ.
      ಪ್ರವಾಹವನ್ನು ಗಮನಿಸಿ. ಯಾರು ಬಿಟ್ಟುಕೊಡುತ್ತಾರೆ? ಯಾರು ಅಡ್ಡಿಪಡಿಸುತ್ತಾರೆ? ನಡಾವಳಿಗೆ ಭೌತಶಾಸ್ತ್ರವಿದೆ.
      ಯಾವ ನಿಯಮಗಳು ನೃತ್ಯವನ್ನು ನಿರ್ದೇಶಿಸುತ್ತವೆ?
    follow_ups:
      - ನಡಾವಳಿ ಬ್ರೌಸ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ನಡಾವಳಿಗಳಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಪ್ರವಾಹ ಮತ್ತು ವಿನ್ಯಾಸದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_browsing_choreography
    name: ಬ್ರೌಸಿಂಗ್ ಕೋರಿಯೋಗ್ರಫಿ
    prompt: |
      ಬೆರಳುಗಳು ಬಟ್ಟೆಯನ್ನು ಸ್ಪರ್ಶಿಸುತ್ತವೆ. ಕಣ್ಣುಗಳು ಷೆಲ್ಫ್‌ಗಳನ್ನು ಸ್ಕ್ಯಾನ್ ಮಾಡುತ್ತವೆ. ಬ್ರೌಸ್‌ಗೆ ಒಂದು ಲಯವಿದೆ — ನಿಲ್ಲಿಸಿ,
      ಪರಿಶೀಲಿಸಿ, ಮುಂದುವರಿಯಿರಿ. ಕೋರಿಯೋಗ್ರಫಿಯನ್ನು ಗಮನಿಸಿ. ಖರೀದಿಸದಿದ್ದಾಗ ದೇಹ ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಬ್ರೌಸಿಂಗ್ ಅನುಭವವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಬ್ರೌಸಿಂಗ್ ಇಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಬ್ರೌಸ್ ಮತ್ತು ಬಯಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_fitting_room
    name: ಫಿಟ್ಟಿಂಗ್ ರೂಮ್
    prompt: |
      ಪರದೆಯನ್ನು ಮುಚ್ಚಲಾಗುತ್ತದೆ. ಫಿಟ್ಟಿಂಗ್ ರೂಮ್ ಒಂದು ಗಡಿ — ಸಾರ್ವಜನಿಕದಿಂದ ಖಾಸಗಿಗೆ.
      ಒಳಗೆ, ನೀವು ಸಂಭಾವ್ಯ ಸ್ವಯಂ ಅನ್ನು ಪ್ರಯತ್ನಿಸುತ್ತೀರಿ. ರಿಟರ್ನ್ ಅನ್ನು ಗಮನಿಸಿ. ಮುಖ ಏನು ಹೇಳುತ್ತದೆ?
      ಫಿಟ್ಟಿಂಗ್ ರೂಮ್ ನಿರ್ಧಾರಕ್ಕಾಗಿ ಒಂದು ವೇದಿಕೆ.
    follow_ups:
      - ಫಿಟ್ಟಿಂಗ್ ರೂಮ್ ಖರೀದಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಫಿಟ್ಟಿಂಗ್ ರೂಮ್ ಇಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಫಿಟ್ಟಿಂಗ್ ಮತ್ತು ಗುರುತಿನ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_dance_of_purchase
    name: ಖರೀದಿಯ ನೃತ್ಯ
    prompt: |
      ಅಪ್ರೋಚ್, ಆಯ್ಕೆ, ಸಾಗಿಸು, ಪಾವತಿಸು. ಖರೀದಿಗೆ ಹಂತಗಳಿವೆ. ಕ್ರಮವನ್ನು ಗಮನಿಸಿ.
      ಜನರು ಎಲ್ಲಿ ಹಿಂಜರಿಯುತ್ತಾರೆ? ನೃತ್ಯವನ್ನು ಅಂಗಡಿ ಕೋರಿಯೋಗ್ರಫಿ ಮಾಡುತ್ತದೆ. ಅದು ಏನು ಹೊರತೆಗೆಯುತ್ತದೆ?
    follow_ups:
      - ನೃತ್ಯ ಫಲಿತಾಂಶವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕ್ರಮವಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ನೃತ್ಯ ಮತ್ತು ಬಯಕೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_cart_territory
    name: ಕಾರ್ಟ್ ಪ್ರದೇಶ
    prompt: |
      ಕಾರ್ಟ್ ದೇಹವನ್ನು ವಿಸ್ತರಿಸುತ್ತದೆ. ಅದು ಆಯ್ಕೆಗಳನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ, ಮಾರ್ಗವನ್ನು ನಿರ್ಬಂಧಿಸುತ್ತದೆ.
      ಕಾರ್ಟ್‌ನ ಮಾರ್ಗವನ್ನು ಗಮನಿಸಿ. ಕಾರ್ಟ್ ಒಂದು ಚಲಿಸುವ ಪ್ರದೇಶ. ಅದು ಏನು ಹಕ್ಕು ಸಾಧಿಸುತ್ತದೆ?
    follow_ups:
      - ಕಾರ್ಟ್ ಚಲನೆಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಾರ್ಟ್‌ಗಳಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಕಾರ್ಟ್ ಮತ್ತು ಸಂಗ್ರಹದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_endcap_display
    name: ಎಂಡ್‌ಕ್ಯಾಪ್ ಡಿಸ್‌ಪ್ಲೇ
    prompt: |
      ನಡಾವಳಿಯ ಕೊನೆಯಲ್ಲಿ ಒಂದು ಡಿಸ್‌ಪ್ಲೇ ಇದೆ — ಪ್ರಚೋದನೆ, ಮಾರಾಟ, ಕಾಲೋಚಿತ.
      ಎಂಡ್‌ಕ್ಯಾಪ್ ಕಣ್ಣನ್ನು ಸೆಳೆಯುತ್ತದೆ. ಯಾರು ನಿಲ್ಲುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಎಂಡ್‌ಕ್ಯಾಪ್ ಒಂದು ಬಲೆ.
      ಅದು ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಎಂಡ್‌ಕ್ಯಾಪ್ ಬ್ರೌಸ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಎಂಡ್‌ಕ್ಯಾಪ್ ಇಲ್ಲದ ನಡಾವಳಿ ಹೇಗಿರುತ್ತದೆ?
      - ಡಿಸ್‌ಪ್ಲೇ ಮತ್ತು ಪ್ರಚೋದನೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_checkout_line
    name: ಚೆಕ್‌ಔಟ್ ಲೈನ್
    prompt: |
      ಲೈನ್ ರೂಪುಗೊಳ್ಳುತ್ತದೆ. ಕ್ಯಾಂಡಿ, ಮ್ಯಾಗಜೀನ್‌ಗಳು, ಕೊನೆಯ ಅವಕಾಶಗಳು. ಚೆಕ್‌ಔಟ್ ಒಂದು ಅಂತಿಮ ಪರೀಕ್ಷೆ.
      ನಿರೀಕ್ಷೆಯನ್ನು ಗಮನಿಸಿ. ಜನರು ಏನು ಮಾಡುತ್ತಾರೆ? ಲೈನ್ ಬ್ರೌಸ್ ಮತ್ತು ನಿರ್ಗಮನದ ನಡುವಿನ ಗಡಿ.
    follow_ups:
      - ಲೈನ್ ಖರೀದಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ನಿರೀಕ್ಷೆಯಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಲೈನ್ ಮತ್ತು ಪ್ರಚೋದನೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_shelf_height
    name: ಷೆಲ್ಫ್ ಎತ್ತರ
    prompt: |
      ಕಣ್ಣಿನ ಮಟ್ಟ ಮಾರಾಟ ಮಾಡುತ್ತದೆ. ಷೆಲ್ಫ್ ಎತ್ತರ ವಿನ್ಯಾಸ. ಯಾವುದು ಎಲ್ಲಿರುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
      ಕೆಳಗೆ ಏನಿದೆ? ಮೇಲ್ಗಡೆ ಏನಿದೆ? ಎತ್ತರವು ಮೌಲ್ಯವನ್ನು ಎನ್‌ಕೋಡ್ ಮಾಡುತ್ತದೆ.
      ಅದು ದೇಹದ ಬಗ್ಗೆ ಏನು ಊಹಿಸುತ್ತದೆ?
    follow_ups:
      - ಷೆಲ್ಫ್ ಎತ್ತರ ಬ್ರೌಸ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಏಕರೂಪದ ಎತ್ತರದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಎತ್ತರ ಮತ್ತು ಪ್ರವೇಶದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_price_tag
    name: ಬೆಲೆ ಟ್ಯಾಗ್
    prompt: |
      ಟ್ಯಾಗ್ ಬೆಲೆಯನ್ನು ಹೇಳುತ್ತದೆ. ಕೆಲವೊಮ್ಮೆ ಮರೆಮಾಡಲಾಗಿದೆ, ಕೆಲವೊಮ್ಮೆ ಪ್ರಮುಖವಾಗಿದೆ.
      ಸ್ಥಳವನ್ನು ಗಮನಿಸಿ. ಟ್ಯಾಗ್ ಮಾಹಿತಿ ಮತ್ತು ಅಡೆತಡೆ. ಸ್ಪರ್ಶದ ಕ್ಷಣಕ್ಕೆ ಟ್ಯಾಗ್ ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಟ್ಯಾಗ್ ನಿರ್ಧಾರವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಟ್ಯಾಗ್ ಇಲ್ಲದ ವಸ್ತುವಾಗಿದ್ದರೆ ಏನಾಗುತ್ತಿತ್ತು?
      - ಟ್ಯಾಗ್ ಮತ್ತು ಮೌಲ್ಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_store_entrance
    name: ಅಂಗಡಿ ಪ್ರವೇಶ
    prompt: |
      ಬಾಗಿಲು ತೆರೆದುಕೊಳ್ಳುತ್ತದೆ. ನೀವು ಪ್ರವೇಶಿಸುತ್ತೀರಿ. ಪ್ರವೇಶ ಒಂದು ಗಡಿ.
      ನೀವು ಮೊದಲು ಏನು ನೋಡುತ್ತೀರಿ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಪ್ರವೇಶವು ಟೋನ್ ಅನ್ನು ಹೊಂದಿಸುತ್ತದೆ.
      ಅಂಗಡಿ ನಿಮಗೆ ಏನನ್ನು ಅನುಭವಿಸಲು ಬಯಸುತ್ತದೆ?
    follow_ups:
      - ಪ್ರವೇಶ ಭೇಟಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ವಿನ್ಯಾಸವಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಪ್ರವೇಶ ಮತ್ತು ನಿರೀಕ್ಷೆಯ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_sales_associate
    name: ಮಾರಾಟ ಸಹಾಯಕ
    prompt: |
      "ಏನಾದರೂ ಹುಡುಕಲು ಸಹಾಯ ಮಾಡಬಹುದೇ?" ಕೊಡುಗೆಯು ಸ್ಕ್ರಿಪ್ಟ್ ಮಾಡಲ್ಪಟ್ಟಿದೆ. ವಿನಿಮಯವನ್ನು ಗಮನಿಸಿ.
      ಅಂಗೀಕರಿಸುವಿರಾ ಅಥವಾ ತಿರಸ್ಕರಿಸುವಿರಾ? ಸಹಾಯಕನು ಒಬ್ಬ ಮಾರ್ಗದರ್ಶಿ ಮತ್ತು ಒತ್ತಡ.
      ಕೊಡುಗೆ ಏನು ಮಾಡುತ್ತದೆ?
    follow_ups:
      - ಸಹಾಯಕ ಬ್ರೌಸ್ ಅನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತಾನೆ?
      - ಅವರಿಲ್ಲದ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಕೊಡುಗೆ ಮತ್ತು ಕಡ್ಡಾಯದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_basket_versus_cart
    name: ಬುಟ್ಟಿ ವರ್ಸಸ್ ಕಾರ್ಟ್
    prompt: |
      ಕೆಲವು ವಸ್ತುಗಳಿಗಾಗಿ ಬುಟ್ಟಿ. ಹೆಚ್ಚು ವಸ್ತುಗಳಿಗಾಗಿ ಕಾರ್ಟ್. ಆಯ್ಕೆಯು ಖರೀದಿಯನ್ನು ಊಹಿಸುತ್ತದೆ.
      ಯಾರು ಏನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ. ಬುಟ್ಟಿ ಸೀಮಿತಗೊಳಿಸುತ್ತದೆ; ಕಾರ್ಟ್ ಆಹ್ವಾನಿಸುತ್ತದೆ.
      ಆಯ್ಕೆಯು ಏನನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ?
    follow_ups:
      - ಬುಟ್ಟಿ ಭೇಟಿಯನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತದೆ?
      - ಕಾರ್ಟ್‌ಗಳು ಮಾತ್ರ ಇದ್ದರೆ ಅಂಗಡಿ ಹೇಗಿರುತ್ತದೆ?
      - ಪಾತ್ರೆ ಮತ್ತು ಸಂಗ್ರಹದ ನಡುವಿನ ಸಂಬಂಧವೇನು?
  - id: hi_rt_return_counter
    name: ರಿಟರ್ನ್ ಕೌಂಟರ್
    prompt: |
      ರಿಟರ್ನ್ ಲೈನ್ ವಿಭಿನ್ನವಾಗಿದೆ. ಜನರು ಬ್ಯಾಗ್‌ಗಳು, ರಸೀದಿಗಳು, ವಿಷಾದಗಳನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತಾರೆ.
      ರಿಟರ್ನ್ ಒಂದು ವಿಲೋಮ. ವಿನಿಮಯವನ್ನು ಗಮನಿಸಿ. ರಿಟರ್ನ್ ಏನು ವೆಚ್ಚವಾಗುತ್ತದೆ — ಭಾವನಾತ್ಮಕವಾಗಿ, ಸಾಮಾಜಿಕವಾಗಿ?
      ರಿಟರ್ನ್ ಕೌಂಟರ್ ರದ್ದತಿಯ ಒಂದು ಸ್ಥಳ.
    follow_ups:
