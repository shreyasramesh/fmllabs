# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# मानव इंटरफ़ेस — ट्रांज़िट हब (Hindi)

id: human_interface_transit_hub
name: मानव इंटरफ़ेस — ट्रांज़िट हब
description: |
  50 कार्ड जो ट्रांज़िट हब को देखने के आपके तरीके को बदल देंगे—प्लेटफ़ॉर्म और
  प्रतीक्षा से लेकर आगमन/प्रस्थान प्रवाह और ट्रांज़िट में अजनबियों के नृत्य तक।
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: प्लेटफ़ॉर्म का किनारा
    prompt: |
      प्लेटफ़ॉर्म का किनारा एक दहलीज है। पीली रेखा, गैप, ट्रैक। लोग
      अलग-अलग दूरियों पर खड़े होते हैं। कुछ आगे झुकते हैं; अन्य पीछे हटते हैं।
      वितरण का निरीक्षण करें। किनारे का क्या मतलब है?
    follow_ups:
      - किनारा प्रत्याशा को कैसे आकार देता है?
      - लाइन के बिना प्लेटफ़ॉर्म क्या होगा?
      - किनारे और जोखिम के बीच क्या संबंध है?
  - id: hi_th_waiting_posture
    name: प्रतीक्षा मुद्रा
    prompt: |
      प्रतीक्षा करते समय शरीर खुद को व्यवस्थित करते हैं—एक पैर पर वज़न, हाथ में
      फ़ोन, पैरों के बीच बैग। मुद्रा अवधि को एन्कोड करती है। कौन धैर्यवान
      लगता है? कौन बेचैन लगता है? प्रतीक्षा की अपनी काया भाषा होती है।
    follow_ups:
      - मुद्रा अपेक्षा को कैसे प्रकट करती है?
      - प्रतीक्षा के बिना प्लेटफ़ॉर्म क्या होगा?
      - मुद्रा और समय के बीच क्या संबंध है?
  - id: hi_th_arrival_flow
    name: आगमन प्रवाह
    prompt: |
      ट्रेन के दरवाज़े खुलते हैं। लोग बाहर निकलते हैं—उन लोगों की धारा के
      विपरीत जो चढ़ रहे हैं। प्रवाह का अपना भौतिकी होता है। टक्कर, किनारे
      हटना, विलय का निरीक्षण करें। विनिमय को कौन से नियम नियंत्रित करते हैं?
    follow_ups:
      - प्रवाह प्लेटफ़ॉर्म को कैसे आकार देता है?
      - अगर हर कोई जल्दी करे तो क्या होगा?
      - प्रवाह और दक्षता के बीच क्या संबंध है?
  - id: hi_th_strangers_transit
    name: ट्रांज़िट में अजनबी
    prompt: |
      आप उन लोगों के साथ एक कार साझा करते हैं जिन्हें आप कभी दोबारा नहीं देखेंगे।
      संबंध के बिना निकटता। संविदा का निरीक्षण करें। अजनबियों का एक-दूसरे के
      प्रति क्या कर्तव्य है? ट्रांज़िट कार एक अस्थायी समाज है।
    follow_ups:
      - ट्रांज़िट अस्थायी समुदाय कैसे बनाता है?
      - बातचीत वाली कार क्या होगी?
      - अजनबी और सभ्यता के बीच क्या संबंध है?
  - id: hi_th_departure_board
    name: प्रस्थान बोर्ड
    prompt: |
      समय, प्लेटफ़ॉर्म, देरी—बोर्ड सत्य का स्रोत है। आँखें ऊपर उठती हैं।
      बोर्ड आंदोलन को निर्देशित करता है। सामूहिक नज़र का निरीक्षण करें। बोर्ड
      भीड़ के साथ क्या करता है?
    follow_ups:
      - बोर्ड व्यवहार को कैसे आकार देता है?
      - इसके बिना हब क्या होगा?
      - डिस्प्ले और विश्वास के बीच क्या संबंध है?
  - id: hi_th_escalator_stand
    name: एस्केलेटर पर खड़े होना
    prompt: |
      दाएं खड़े हों, बाएं चलें—या इसका उल्टा, शहर के आधार पर। एस्केलेटर के
      अपने नियम होते हैं। निरीक्षण करें कि कौन उनका पालन करता है। एस्केलेटर
      एक चलती हुई कतार है। नियम क्या सक्षम करता है?
    follow_ups:
      - एस्केलेटर नियम प्रवाह को कैसे आकार देता है?
      - अगर हर कोई खड़ा रहे तो क्या होगा?
      - नियम और दक्षता के बीच क्या संबंध है?
  - id: hi_th_ticket_gate
    name: टिकट गेट
    prompt: |
      गेट कार्ड पढ़ता है, बीप करता है, खुलता है। गेट एक चेकपॉइंट है। यह
      भुगतान किए गए को अनपेड से अलग करता है। लय का निरीक्षण करें। कौन
      गलती करता है? कौन आसानी से निकल जाता है? गेट एक परीक्षा है।
    follow_ups:
      - गेट यात्रा को कैसे आकार देता है?
      - गेटों के बिना हब क्या होगा?
      - गेट और अपनेपन के बीच क्या संबंध है?
  - id: hi_th_luggage_drag
    name: लगेज ड्रैग
    prompt: |
      टाइल पर पहिए। सूटकेस का अनुसरण करता है। ड्रैग यात्रियों के रास्ते को
      चिह्नित करता है। लगेज शरीर का विस्तार करता है। बोझ का निरीक्षण करें।
      लगेज यात्रा के बारे में क्या कहता है?
    follow_ups:
      - लगेज आंदोलन को कैसे आकार देता है?
      - बैग के बिना हब क्या होगा?
      - बोझ और गंतव्य के बीच क्या संबंध है?
  - id: hi_th_bench_occupation
    name: बेंच पर बैठना
    prompt: |
      बेंच प्लेटफ़ॉर्म के किनारे लगी होती हैं। कुछ बैठते हैं; कुछ बगल में
      खड़े होते हैं। बेंच एक दुर्लभ संसाधन है। निरीक्षण करें कि कौन उस पर
      दावा करता है। वे कितनी देर तक रहते हैं? बेंच एक छोटा क्षेत्र है।
    follow_ups:
      - बेंच प्रतीक्षा को कैसे आकार देती है?
      - बेंच के बिना प्लेटफ़ॉर्म क्या होगा?
      - सीट और अवधि के बीच क्या संबंध है?
  - id: hi_th_announcement_voice
    name: घोषणा की आवाज़
    prompt: |
      "अगली ट्रेन..." आवाज़ स्वचालित या मानवीय होती है। यह शोर को चीरती
      है। घोषणा साझा ज्ञान बनाती है। निरीक्षण करें कि कौन सुनता है। किसने
      पहले ही अपना फ़ोन देख लिया है?
    follow_ups:
      - घोषणा भीड़ को कैसे आकार देती है?
      - इसके बिना हब क्या होगा?
      - आवाज़ और अधिकार के बीच क्या संबंध है?
  - id: hi_th_door_positioning
    name: दरवाज़े की पोजिशनिंग
    prompt: |
      नियमित यात्री जानते हैं कि दरवाज़े कहाँ खुलेंगे। वे खुद को पोजीशन
      करते हैं। नए अनुमान लगाते हैं। पोजिशनिंग रणनीति है। क्लस्टरिंग का
      निरीक्षण करें। पोजीशन क्या निर्धारित करती है?
    follow_ups:
      - पोजिशनिंग बोर्डिंग को कैसे आकार देती है?
      - अगर दरवाज़े रैंडम हों तो प्लेटफ़ॉर्म क्या होगा?
      - पोजीशन और लाभ के बीच क्या संबंध है?
  - id: hi_th_handrail_grip
    name: हैंडरेल ग्रिप
    prompt: |
      कार के अंदर, हाथ रेल को ढूंढते हैं। ग्रिप सुरक्षा है। निरीक्षण करें
      कि कौन पकड़ता है, किसे ज़रूरत नहीं है। हैंडरेल एक साझा वस्तु है।
      ग्रिप क्या प्रकट करती है?
    follow_ups:
      - हैंडरेल स्थिरता को कैसे आकार देता है?
      - इसके बिना कार क्या होगी?
      - ग्रिप और विश्वास के बीच क्या संबंध है?
  - id: hi_th_window_reflection
    name: खिड़की का प्रतिबिंब
    prompt: |
      खिड़की सुरंग, प्लेटफ़ॉर्म और आपके अपने चेहरे को दिखाती है। प्रतिबिंब
      अपरिहार्य है। लोग खुद को देखते हैं या इससे बचते हैं। प्रतिबिंब और
      नज़र के बीच के संबंध का निरीक्षण करें।
    follow_ups:
      - प्रतिबिंब आत्म-जागरूकता को कैसे आकार देता है?
      - खिड़की के बिना सवारी क्या होगी?
      - प्रतिबिंब और गोपनीयता के बीच क्या संबंध है?
  - id: hi_th_seat_offer
    name: सीट की पेशकश
    prompt: |
      कोई व्यक्ति किसी बड़े, बच्चे वाले माता-पिता को सीट की पेशकश करता है।
      पेशकश एक छोटा नैतिक कार्य है। निरीक्षण करें कि कब होता है। कौन
      प्रदान करता है? कौन स्वीकार करता है? सीट एक उपहार है।
    follow_ups:
      - पेशकश कार को कैसे आकार देती है?
      - ऐसी पेशकशों के बिना सवारी क्या होगी?
      - पेशकश और देखभाल के बीच क्या संबंध है?
  - id: hi_th_delay_sigh
    name: देरी की आह
    prompt: |
      "विलंबित।" सामूहिक आह। देरी साझा भाग्य है। अजनबी नज़रें मिलाते हैं।
      देरी एकजुटता का क्षण बनाती है। बदलाव का निरीक्षण करें। देरी
      भीड़ के साथ क्या करती है?
    follow_ups:
      - देरी प्रतीक्षा को कैसे आकार देती है?
      - देरी के बिना हब क्या होगा?
      - देरी और निराशा के बीच क्या संबंध है?
  - id: hi_th_backpack_turn
    name: बैकपैक मोड़
    prompt: |
      एक भरी हुई कार में, कोई व्यक्ति अपने बैकपैक को सामने की ओर मोड़ता है।
      मोड़ विचारशीलता है। यह जगह बनाता है। निरीक्षण करें कि कौन करता है।
      बैकपैक मोड़ एक छोटा सामाजिक अनुबंध है।
    follow_ups:
      - मोड़ निकटता को कैसे आकार देता है?
      - इसके बिना कार क्या होगी?
      - मोड़ और जागरूकता के बीच क्या संबंध है?
  - id: hi_th_exit_anticipation
    name: निकास की प्रत्याशा
    prompt: |
      जैसे ही पड़ाव नज़दीक आता है, लोग दरवाज़े के पास इकट्ठा हो जाते हैं।
      प्रत्याशा दिखाई देती है। शरीर हिलते हैं। दरवाज़ा खुलेगा। तैयारी का
      निरीक्षण करें। प्रत्याशा क्या आवश्यक करती है?
    follow_ups:
      - प्रत्याशा निकास को कैसे आकार देती है?
      - तैयारी के बिना पड़ाव क्या होगा?
      - प्रत्याशा और प्रवाह के बीच क्या संबंध है?
  - id: hi_th_transfer_corridor
    name: ट्रांसफर कॉरिडोर
    prompt: |
      कॉरिडोर लाइनों को जोड़ता है। लोग उद्देश्य से चलते हैं। ट्रांसफर एक
      संक्रमण है—सिस्टम के बीच, प्रतीक्षा के बीच। गति का निरीक्षण करें।
      कॉरिडोर की अपनी लय होती है।
    follow_ups:
      - कॉरिडोर यात्रा को कैसे आकार देता है?
      - ट्रांसफर के बिना हब क्या होगा?
      - कॉरिडोर और कनेक्शन के बीच क्या संबंध है?
  - id: hi_th_phone_glow
    name: फ़ोन की चमक
    prompt: |
      मंद कार में, चेहरे फ़ोन से चमकते हैं। चमक व्यक्तिगत होती है। प्रत्येक
      व्यक्ति का अपना प्रकाश होता है। वितरण का निरीक्षण करें। फ़ोन
      सार्वजनिक स्थान पर निजी स्थान बनाता है।
    follow_ups:
      - फ़ोन सवारी को कैसे आकार देता है?
      - फ़ोन के बिना कार क्या होगी?
      - चमक और अलगाव के बीच क्या संबंध है?
  - id: hi_th_stroller_navigation
    name: स्ट्रॉलर नेविगेशन
    prompt: |
      एक माता-पिता भीड़ के बीच से स्ट्रॉलर को धक्का देता है। नेविगेशन
      नाजुक होता है। लोग रास्ता देते हैं। स्ट्रॉलर प्रवाह को बदलता है।
      समायोजन का निरीक्षण करें। स्ट्रॉलर क्या मांगता है?
    follow_ups:
      - स्ट्रॉलर भीड़ को कैसे आकार देता है?
      - स्ट्रॉलर के बिना हब क्या होगा?
      - स्ट्रॉलर और देखभाल के बीच क्या संबंध है?
  - id: hi_th_vendor_station
    name: विक्रेता स्टेशन
    prompt: |
      एक कियोस्क कॉफी, स्नैक्स, समाचार पत्र बेचता है। विक्रेता चलता फिरता
      सेवा करता है। लेन-देन त्वरित होता है। विनिमय का निरीक्षण करें। विक्रेता
      प्रवाह में एक द्वीप है।
    follow_ups:
      - विक्रेता हब को कैसे आकार देता है?
      - विक्रेताओं के बिना हब क्या होगा?
      - विक्रेता और प्रतीक्षा के बीच क्या संबंध है?
  - id: hi_th_track_gap
    name: ट्रैक गैप
    prompt: |
      गैप का ध्यान रखें। प्लेटफ़ॉर्म और कार के बीच की जगह एक खतरा है।
      लोग इसे पार करते हैं। गैप भिन्न होता है। सावधानी का निरीक्षण करें।
      गैप शरीर से क्या आवश्यक करता है?
    follow_ups:
      - गैप बोर्डिंग को कैसे आकार देता है?
      - इसके बिना प्लेटफ़ॉर्म क्या होगा?
      - गैप और ध्यान के बीच क्या संबंध है?
  - id: hi_th_schedule_check
    name: शेड्यूल जांच
    prompt: |
      उंगलियाँ फ़ोन पर टैप करती हैं। ऐप बताता है कब। शेड्यूल की जाँच
      लगातार होती है। यह अनिश्चितता को कम करता है। लय का निरीक्षण करें।
