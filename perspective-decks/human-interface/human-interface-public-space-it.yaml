    follow_ups:
      - Come l'aiuto modella lo spazio?
      - Come sarebbe lo spazio senza tali offerte?
      - Qual è la relazione tra aiuto e fiducia?
  - id: hi_ps_object_temporary
    name: Oggetto Temporaneo
    prompt: |
      Una tazza, un giornale, un cappello. L'oggetto segna un posto. È temporaneo.
      Il proprietario tornerà. Osserva l'occupazione. Cosa richiede l'oggetto temporaneo
      agli altri? L'oggetto è un segnaposto.
    follow_ups:
      - Come l'oggetto temporaneo modella lo spazio?
      - Come sarebbe lo spazio senza di esso?
      - Qual è la relazione tra temporaneità e fiducia?
  - id: hi_ps_pathway_rhythm
    name: Ritmo del Sentiero
    prompt: |
      Passi sul marciapiede. Il ritmo è individuale—veloce, lento, irregolare. Il
