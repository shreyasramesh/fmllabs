    follow_ups:
      - Come il ritmo modella la camminata?
      - Come sarebbe il sentiero in silenzio?
      - Qual è la relazione tra ritmo e destinazione?
  - id: hi_ps_bench_face
    name: Orientamento della Panchina
    prompt: |
      La panchina è rivolta in una direzione—verso la vista, il sole, la folla. L'orientamento
