      tra panchina e meteo. Cosa fa il meteo?
    follow_ups:
      - Come il meteo modella la panchina?
      - Come sarebbe la panchina con riparo?
      - Qual è la relazione tra meteo e uso?
  - id: hi_ps_stranger_glance
    name: Sguardo dell'Estraneo
    prompt: |
      Uno sguardo fugace. Lo sguardo è valutazione. Sicuro? Minaccia? Lo sguardo è
