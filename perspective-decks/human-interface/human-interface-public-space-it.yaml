    follow_ups:
      - Come l'occupazione modella la panchina?
      - Come sarebbe lo spazio senza occupazioni?
      - Qual è la relazione tra occupazione e comfort?
  - id: hi_ps_stranger_help
    name: Aiuto di un Estraneo
    prompt: |
      "Serve una mano?" Un estraneo si offre. L'aiuto è inaspettato. Osserva lo
