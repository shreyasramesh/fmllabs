# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# L'Interfaccia Umana — Spazio Pubblico (Italian)

id: human_interface_public_space
name: L'Interfaccia Umana — Spazio Pubblico
description: 50 carte per cambiare il tuo modo di vedere lo spazio pubblico—da panchine e sentieri alla coreografia degli estranei e agli oggetti come talismani.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: Occupazione della Panchina
    prompt: |
      Una panchina è occupata—da un corpo, una borsa, una postura. La panchina è una risorsa
      scarsa. Osserva chi siede, chi sta in piedi, chi passa. La panchina assume
      significati diversi per persone diverse. Cosa fornisce?
    follow_ups:
      - Come la panchina modella lo spazio?
      - Come sarebbe il parco senza panchine?
      - Qual è la relazione tra panchina e riposo?
  - id: hi_ps_pathway_flow
    name: Flusso del Sentiero
    prompt: |
      Il sentiero incanala il movimento. Le persone camminano—da sole, in coppia, in gruppo. Il
      flusso ha una direzione. Osserva la collisione. Chi cede? Il sentiero è
      un corridoio condiviso. Quali regole lo governano?
    follow_ups:
      - Come il sentiero modella la camminata?
      - Come sarebbe lo spazio senza sentieri?
      - Qual è la relazione tra sentiero e destinazione?
  - id: hi_ps_strangers_choreography
    name: Coreografia degli Estranei
    prompt: |
      Corpi non correlati si muovono attraverso lo spazio condiviso. La coreografia è
      non detta—un passo laterale, una pausa, una fusione. Osserva la danza. Nessuno parla.
      La coreografia è puro corpo. Cosa richiede?
    follow_ups:
      - Come la coreografia modella lo spazio?
      - Cosa succederebbe se tutti si fermassero?
      - Qual è la relazione tra coreografia e civiltà?
  - id: hi_ps_object_talisman
    name: Oggetto come Talismano
    prompt: |
      Un libro su una panchina. Una borsa su una sedia. L'oggetto occupa un posto. Dice
      "Sono qui" o "Tornerò". L'oggetto è un talismano. Osserva l'occupazione.
      Cosa protegge?
    follow_ups:
      - Come il talismano modella lo spazio?
      - Come sarebbe lo spazio senza tali occupazioni?
      - Qual è la relazione tra oggetto e presenza?
  - id: hi_ps_bench_armrest
    name: Bracciolo della Panchina
    prompt: |
      Alcune panchine hanno i braccioli. Dividono la seduta. Impediscono di sdraiarsi.
      Il bracciolo è un design con un intento. Osserva chi lo usa. Cosa esclude il
      bracciolo?
    follow_ups:
      - Come il bracciolo modella la panchina?
      - Come sarebbe la panchina senza di esso?
      - Qual è la relazione tra bracciolo e controllo?
  - id: hi_ps_pathway_intersection
    name: Incrocio del Sentiero
    prompt: |
      I sentieri si incrociano. I corpi convergono. L'incrocio è un punto di collisione.
      Osserva la fusione. Cosa succede quando i flussi si incontrano? L'incrocio
      richiede negoziazione. Cosa estrae?
    follow_ups:
      - Come l'incrocio modella il flusso?
      - Come sarebbe lo spazio senza incroci?
      - Qual è la relazione tra incrocio e attenzione?
  - id: hi_ps_eye_contact_avoid
    name: Evitare il Contatto Visivo
    prompt: |
      Gli estranei evitano il contatto visivo. L'evitamento è educato. Guardare è rischiare
      connessione. Osserva lo sguardo. L'evitamento è un contratto. Cosa abilita?
      Quanto costa?
    follow_ups:
      - Come l'evitamento modella lo spazio?
      - Come sarebbe lo spazio con più contatto?
      - Qual è la relazione tra sguardo e privacy?
  - id: hi_ps_bench_share
    name: Condivisione della Panchina
    prompt: |
      Due estranei condividono una panchina. Spazio tra di loro. La condivisione è
      prossimità senza connessione. Osserva il confine. Quanto è troppo vicino?
      La condivisione è un delicato equilibrio.
    follow_ups:
      - Come la condivisione modella la panchina?
      - Come sarebbe la panchina con una sola persona?
      - Qual è la relazione tra condivisione e tolleranza?
  - id: hi_ps_pathway_width
    name: Larghezza del Sentiero
    prompt: |
      Il sentiero è largo o stretto. La larghezza influisce sul flusso. Due persone
      possono passare o meno. Osserva la larghezza. Cosa presuppone sulla
      folla? La larghezza è design. Cosa abilita?
    follow_ups:
      - Come la larghezza modella la camminata?
      - Come sarebbe il sentiero se fosse più largo?
      - Qual è la relazione tra larghezza e comfort?
  - id: hi_ps_bench_sun
    name: Panchina al Sole
    prompt: |
      La panchina è rivolta verso il sole. O verso l'ombra. La posizione è importante. Osserva
      chi sceglie quale. Il sole è una risorsa. Cosa fornisce? La panchina al sole è ambita.
    follow_ups:
      - Come il sole modella la panchina?
      - Come sarebbe lo spazio senza sole?
      - Qual è la relazione tra sole e riposo?
  - id: hi_ps_stranger_proximity
    name: Prossimità dell'Estraneo
    prompt: |
      Un estraneo sta vicino—in coda, sull'autobus. La prossimità è
      impersonale ma intima. Osserva la tolleranza. Cosa permette il corpo?
      La prossimità è un contratto. Quali sono i suoi termini?
    follow_ups:
      - Come la prossimità modella lo spazio?
      - Come sarebbe lo spazio con più spazio?
      - Qual è la relazione tra prossimità e civiltà?
  - id: hi_ps_object_left
    name: Oggetto Lasciato
    prompt: |
      Una giacca su una panchina. Una borsa sotto un albero. L'oggetto lasciato segna
      territorio. Osserva l'occupazione. Quanto tempo può durare? L'oggetto lasciato
      è una prova. Cosa richiede agli altri?
    follow_ups:
      - Come l'oggetto modella lo spazio?
      - Come sarebbe lo spazio senza tali occupazioni?
      - Qual è la relazione tra oggetto e fiducia?
  - id: hi_ps_pathway_obstacle
    name: Ostacolo sul Sentiero
    prompt: |
      Qualcosa blocca il sentiero—lavori, una folla, un artista. L'ostacolo devia
      il flusso. Osserva la deviazione. Cosa richiede l'ostacolo? Il sentiero non è mai puro.
      Cosa lo interrompe?
    follow_ups:
      - Come l'ostacolo modella il flusso?
      - Come sarebbe il sentiero senza ostacoli?
      - Qual è la relazione tra ostacolo e adattamento?
  - id: hi_ps_bench_alone
    name: Panchina da Soli
    prompt: |
      Una persona su una panchina. La solitudine è visibile. La panchina ospita
      la solitudine. Osserva la postura. Cosa fornisce la panchina da soli?
      La panchina da soli è una scelta. Cosa abilita?
    follow_ups:
      - Come la solitudine modella la panchina?
      - Come sarebbe lo spazio senza panchine?
      - Qual è la relazione tra solitudine e riposo?
  - id: hi_ps_nod_acknowledge
    name: Cenno di Riconoscimento
    prompt: |
      Un leggero cenno. Un breve sorriso. Il riconoscimento è minimo. Dice "Ti vedo"
