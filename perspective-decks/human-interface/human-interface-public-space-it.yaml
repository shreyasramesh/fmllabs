      Cosa crea?
    follow_ups:
      - Come il cenno modella lo spazio?
      - Come sarebbe lo spazio senza di esso?
      - Qual è la relazione tra cenno e sicurezza?
  - id: hi_ps_pathway_edge
    name: Margine del Sentiero
    prompt: |
      Il sentiero ha dei margini—erba, marciapiede, barriera. Il margine definisce il sentiero.
      Osserva chi rimane sul sentiero. Chi lo attraversa? Il margine è un confine.
      Cosa contiene?
    follow_ups:
      - Come il margine modella la camminata?
      - Come sarebbe il sentiero senza margini?
      - Qual è la relazione tra margine e libertà?
  - id: hi_ps_bench_claim
    name: Occupazione della Panchina
    prompt: |
      La panchina è occupata—da una distesa, da una postura, da una borsa. L'occupazione dice "questo
      è mio". Osserva l'occupazione. Come viene fatta? L'occupazione è territorio.
