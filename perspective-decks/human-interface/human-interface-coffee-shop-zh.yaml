    name: 低语交谈
    prompt: |
      两个人凑近。谈话是私密的，但姿势是可见的。
      凑近的姿势创造了一个“泡泡”。观察这种亲密感。咖啡馆允许什么，而其他地方不能？
    follow_ups:
