# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# 人机界面 — 咖啡馆 (Mandarin Chinese)

id: human_interface_coffee_shop
name: 人机界面 — 咖啡馆
description: 50 张卡片，从排队编舞、笔记本电脑领地到“第三空间”、无形剧本和咖啡仪式， 改变你看待咖啡馆的方式。
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: 排队编舞
    prompt: |
      观察柜台前的队伍。人们排成一队——身体前倾、刷手机、轻微挪动。
      队伍有节奏。谁占有空间？什么潜规则决定了谁站在哪里？
    follow_ups:
      - 排队如何塑造期待？
      - 如果每个人都无视顺序会怎样？
      - 等待与归属感之间有什么关系？
  - id: hi_cs_laptop_territory
    name: 笔记本电脑领地
    prompt: |
      桌子上打开的笔记本电脑占据了空间。旁边的杯子，椅子上的包。
      观察界限。一个人占据了多少“地盘”？什么信号表示“已被占用”？
    follow_ups:
      - 笔记本电脑如何延伸身体？
      - 没有电子设备的空间会是怎样？
      - 领地与停留时间之间有什么关系？
  - id: hi_cs_third_place
    name: 第三空间
    prompt: |
      既不是家，也不是工作地——咖啡馆是“第三空间”。人们来这里独处。
      注意谁留下来了。谁匆匆离开？这个空间承载着不同的社会契约。
    follow_ups:
      - 没有“第三空间”的城市会怎样？
      - 咖啡馆与图书馆有何不同？
      - 空间与身份认同之间有什么关系？
  - id: hi_cs_invisible_script
    name: 无形剧本
    prompt: |
      点餐、付款、等待、取餐、找座位。这个剧本是无形的，直到有人打破它。
      观察第一次来的顾客。他们不知道什么？这个剧本编码了归属感。
    follow_ups:
      - 剧本如何排斥他人？
      - 如果剧本被写下来会怎样？
      - 剧本与流畅性之间有什么关系？
  - id: hi_cs_coffee_ritual
    name: 咖啡仪式
    prompt: |
      饮料是次要的。仪式是主要的——走过去、点餐、第一口。
      注意你自己的动作。如果咖啡直接送到你门口，你会失去什么？
    follow_ups:
      - 仪式如何标志着转变？
      - 没有咖啡停顿的一天会怎样？
      - 仪式与准备就绪之间有什么关系？
  - id: hi_cs_counter_handoff
    name: 柜台交接
    prompt: |
      咖啡师叫出一个名字。一只手伸过来。交接是陌生人之间的接触时刻。
      观察这次交流。除了杯子，还传递了什么？
    follow_ups:
      - 交接如何建立联系？
      - 有了机器人咖啡师会怎样？
      - 交接与信任之间有什么关系？
  - id: hi_cs_power_outlet_hunt
    name: 插座搜寻
    prompt: |
      目光扫视墙壁、地板、桌子底下。搜寻插座是一种占领地盘的行为。
      谁先到了？插座决定了你坐哪里。地理位置跟着电力走。
    follow_ups:
      - 插座的布局如何塑造房间？
      - 如果有无线电力，空间会是怎样？
      - 插头与持久性之间有什么关系？
  - id: hi_cs_solo_table
    name: 单人桌
    prompt: |
      一个人占着一张四人桌。空椅子是缓冲。观察布局。这是防御？偏好？
      单人桌在人群中占据了一席之地。
    follow_ups:
      - 单人桌如何暗示意图？
      - 如果有人要求拼桌会怎样？
      - 独处与可见性之间有什么关系？
  - id: hi_cs_milk_pour
    name: 倒牛奶
    prompt: |
      咖啡师将牛奶倒入浓缩咖啡——拉花或不拉花。倒牛奶是手艺。
      观察动作。顾客除了饮料还得到了什么？倒牛奶是一种表演。
    follow_ups:
      - 倒牛奶如何塑造期待？
      - 没有手艺的饮料会是怎样？
      - 倒牛奶与价格之间有什么关系？
  - id: hi_cs_name_on_cup
    name: 杯子上的名字
    prompt: |
      杯子上的名字——真实的、假的、拼写错误的。它使交易个性化。
      名字从嘴里传到手中，再到柜台。名字对这次交流有什么作用？
    follow_ups:
      - 名字如何创造识别度？
      - 没有名字的订单会是怎样？
      - 名字与匿名性之间有什么关系？
  - id: hi_cs_window_seat
    name: 靠窗座位
    prompt: |
      靠窗座位是最好的。你面对街道；你的背部得到保护。
      观察谁选择它。窗户框住了外面的世界，而你待在里面。景色提供了什么？
    follow_ups:
      - 靠窗座位如何塑造体验？
      - 没有窗户的空间会是怎样？
      - 室内与室外之间有什么关系？
  - id: hi_cs_linger_versus_grab
    name: 逗留还是即走
    prompt: |
      有些人拿着杯子就走。有些人则待上数小时。同一个空间容纳了两者。
      注意这种分化。什么决定了谁留下？咖啡馆迎合了不同的节奏。
    follow_ups:
      - 逗留如何影响生意？
      - 如果每个人都匆匆离开，空间会是怎样？
      - 速度与归属感之间有什么关系？
  - id: hi_cs_regular_recognition
    name: 老顾客识别
    prompt: |
      “老样子？”咖啡师知道。老顾客被认识。观察这次交流。
      当你被认可时，有什么改变？“老样子”是一种捷径——也是对空间的主张。
    follow_ups:
      - 认可如何创造忠诚度？
      - 老顾客会失去什么？
      - “老样子”与身份认同之间有什么关系？
  - id: hi_cs_soundscape
    name: 声景
    prompt: |
      蒸汽声、研磨声、聊天声、音乐声。咖啡馆有其声景。闭上眼睛。
      绘制出层次。什么是不变的？什么是节奏？声景塑造了氛围。
    follow_ups:
      - 声景如何影响专注力？
      - 在寂静中，空间会是怎样？
      - 声音与生产力之间有什么关系？
  - id: hi_cs_shared_table
    name: 公共长桌
    prompt: |
      陌生人坐在同一张长桌旁。没有人说话。公共长桌是近距离接触而非连接。
      观察界限。多近算太近？这张桌子维持着微妙的平衡。
    follow_ups:
      - 公共长桌与单人桌有何不同？
      - 如果有人开始聊天会怎样？
      - 亲密距离与隐私之间有什么关系？
  - id: hi_cs_tip_jar
    name: 小费罐
    prompt: |
      硬币和纸币累积。小费罐是可见的、被动的。谁给小费？
      谁不给？罐子放置在交易和赠予的边界。小费意味着什么？
    follow_ups:
      - 小费罐如何塑造交流？
      - 没有它，柜台会是怎样？
      - 小费与感激之间有什么关系？
  - id: hi_cs_cup_sleeve
    name: 杯套
    prompt: |
      杯套保护手不被烫到。它是可丢弃的、带有品牌标志的。
      注意人们如何拿着它。杯套是身体与饮料之间的小界面。
    follow_ups:
      - 杯套如何改变握持方式？
      - 没有它，体验会是怎样？
      - 杯套与品牌之间有什么关系？
  - id: hi_cs_morning_rush
    name: 早高峰
    prompt: |
      上班前，队伍拉得很长。早高峰有自己的节奏。
      观察速度。每个人都要去别的地方。咖啡馆是一个中转站。
      高峰期带来了什么？
    follow_ups:
      - 高峰如何塑造员工？
      - 没有早高峰的早晨会怎样？
      - 高峰与仪式之间有什么关系？
  - id: hi_cs_afternoon_slow
    name: 下午的悠闲
    prompt: |
      午后，人群稀少。留下来的都是不同的人——学生、自由职业者、悠闲的人。
      节奏发生变化。注意这种变化。下午迎来了不同类型的顾客。
    follow_ups:
      - 下午与上午有何不同？
      - 如果没有悠闲时段，空间会是怎样？
      - 时间与入住率之间有什么关系？
  - id: hi_cs_wifi_password
    name: WiFi 密码
    prompt: |
      密码写在墙上、收据上、黑板上。你必须询问或查找。
      WiFi 是某些人入场的代价。观察谁连接了。谁不需要？
    follow_ups:
      - WiFi 如何塑造留下的人？
      - 没有 WiFi 的空间会是怎样？
      - 连接与消费之间有什么关系？
  - id: hi_cs_crossword_solver
    name: 填字游戏玩家
    prompt: |
      有人在玩填字游戏，报纸或手机。这个活动是独自进行但可见的。
      填字游戏标记着时间。它表示“我要待着”。这个活动向其他人发出什么信号？
    follow_ups:
      - 填字游戏如何创造一个“泡泡”？
      - 没有它，填字游戏玩家会做什么？
      - 活动与占座时间之间有什么关系？
  - id: hi_cs_meeting_here
    name: 在这里见面
    prompt: |
      两个人见面——面试、叙旧、第一次约会。咖啡馆是中立的场地。
      观察布局。谁选择了地点？桌子变成了相遇的舞台。
    follow_ups:
      - 咖啡馆如何促成这次会面？
      - 在办公室里见面会是怎样？
      - 地点与相遇之间有什么关系？
  - id: hi_cs_bathroom_key
    name: 卫生间钥匙
    prompt: |
      卫生间钥匙与一个木块、一个板子、一把大勺子相连。你必须索取。
      钥匙是对归属感的小考验。谁有权使用卫生间？
    follow_ups:
      - 钥匙如何控制通行？
      - 如果卫生间是开放的，空间会是怎样？
      - 钥匙与信任之间有什么关系？
  - id: hi_cs_pastry_case
    name: 糕点柜
    prompt: |
      羊角面包、玛芬、饼干放在玻璃后面。柜台是诱惑和展示。
      注意什么卖得好。什么放太久了？柜台是欲望与延迟的谈判。
    follow_ups:
      - 糕点柜如何塑造订单？
      - 没有它，柜台会是怎样？
      - 展示与欲望之间有什么关系？
  - id: hi_cs_phone_glance
    name: 看手机
    prompt: |
      每个人都会看一眼手机。这一瞥是休息、检查、逃离。
      观察节奏。多久一次？多久？手机是通往房间外的门户。
    follow_ups:
      - 手机如何塑造在场感？
      - 没有手机的空间会是怎样？
      - 一瞥与注意力之间有什么关系？
  - id: hi_cs_steam_rise
    name: 蒸汽升腾
    prompt: |
      新鲜的杯子冒着热气。热气带来香气。蒸汽是短暂的——几分钟就消失了。
      注意它。在第一口之前，蒸汽为这一刻增添了什么？
    follow_ups:
      - 蒸汽如何塑造期待？
      - 没有蒸汽的饮品会是怎样？
      - 蒸汽与仪式之间有什么关系？
  - id: hi_cs_bag_on_chair
    name: 椅子上的包
    prompt: |
      一个包占据了旁边的一个椅子。它占住了座位，延伸了领地。
      这个包是一个占位符。观察这个信号：“这个座位有人了。”
      如果有人要求坐下会怎样？
    follow_ups:
      - 包如何占据空间？
      - 没有包占座，房间会是怎样？
      - 物体与领地之间有什么关系？
  - id: hi_cs_espresso_shot
    name: 浓缩咖啡
    prompt: |
      一份浓缩咖啡——快速、强烈。喝浓缩咖啡的人通常站着。
      这份浓缩咖啡是当天的一个标点。观察这个仪式。进，喝完，出。
      这份浓缩咖啡达到了什么目的？
    follow_ups:
      - 浓缩咖啡与拿铁有何不同？
      - 没有浓缩咖啡的咖啡馆会是怎样？
      - 浓缩咖啡与速度之间有什么关系？
  - id: hi_cs_cold_brew_tap
    name: 冷萃咖啡龙头
    prompt: |
      从龙头里出来的冷萃咖啡——就像啤酒。取用方式不同。
      没有蒸汽，没有等待。冷萃咖啡顾客想要些别的。注意这种选择。
      冷萃咖啡象征着什么？
    follow_ups:
      - 冷萃咖啡如何改变体验？
      - 没有冷萃咖啡的菜单会是怎样？
      - 温度与身份之间有什么关系？
  - id: hi_cs_chalkboard_menu
    name: 黑板菜单
    prompt: |
      菜单是手写的——粉笔写在黑板上。它会变化。
      手写字体是人格的体现。注意列出的和未列出的。黑板说明“我们在这里做决定”。
    follow_ups:
      - 黑板如何塑造品牌？
      - 如果墙上是打印菜单，会是怎样？
      - 手写与真实性之间有什么关系？
  - id: hi_cs_leaving_cup
    name: 留下的杯子
    prompt: |
      杯子留在桌上——空的，被遗弃的。有些人自己收拾；有些人不。
      留下的杯子是对考虑他人的小考验。谁清理？谁留下？杯子标志着停留的结束。
    follow_ups:
      - 收拾杯子如何塑造空间？
      - 如果每个人都留下杯子，咖啡馆会是怎样？
      - 离开与归属感之间有什么关系？
  - id: hi_cs_headphones_bubble
    name: 耳机泡泡
    prompt: |
      耳机创造了一个“泡泡”。佩戴者在场但不可打扰。
      这个泡泡表示“不要打断”。观察这个边界。泡泡如何塑造社交场域？
    follow_ups:
      - 耳机如何实现专注？
      - 没有耳机，空间会是怎样？
      - 泡泡与生产力之间有什么关系？
  - id: hi_cs_corner_booth
    name: 角落卡座
    prompt: |
      角落卡座是抢手的——背靠墙壁，可以俯瞰整个房间。它具有防御性。
      观察谁选择了它。角落比中心位置具有不同的心理学。
    follow_ups:
      - 角落如何塑造体验？
      - 没有角落，房间会是怎样？
      - 位置与安全感之间有什么关系？
  - id: hi_cs_sugar_station
    name: 糖包站
    prompt: |
      糖包、餐巾、盖子、吸管——这个站点是自助的。人们在这里定制。
      站点是柜台和座位之间的暂停。观察选择。人们添加了什么？
    follow_ups:
      - 站点如何延伸交易？
      - 没有站点，柜台会是怎样？
      - 定制与控制之间有什么关系？
  - id: hi_cs_barista_banter
    name: 咖啡师闲聊
    prompt: |
      咖啡师与老顾客闲聊。闲聊既是表演也是连接。
      其他人听或不听。闲聊营造了氛围。它给房间增添了什么？
    follow_ups:
      - 闲聊如何塑造文化？
      - 没有闲聊，柜台会是怎样？
      - 闲聊与归属感之间有什么关系？
  - id: hi_cs_takeaway_stack
    name: 外卖杯堆
    prompt: |
      杯子堆放在取餐区——叫名字，杯子被取走。这个堆叠是订单的临时存档。
      观察流程。谁在等待？谁拿到就走？这个堆叠是混乱中产生的秩序。
    follow_ups:
      - 堆叠如何管理高峰？
      - 没有堆叠，柜台会是怎样？
      - 堆叠与顺序之间有什么关系？
  - id: hi_cs_plant_by_window
    name: 窗边的植物
    prompt: |
      一盆植物放在窗边——绿萝、多肉。它是装饰也是生命。
      植物不属于任何人。它软化了空间。植物给房间增添了什么？
    follow_ups:
      - 植物如何塑造氛围？
      - 没有植物，窗户会是怎样？
      - 植物与关怀之间有什么关系？
  - id: hi_cs_closing_time
    name: 关门时间
    prompt: |
      “还有十五分钟就关门了。”这个通知改变了房间的气氛。
      椅子刮擦声，笔记本电脑合上。咖啡馆有结束的时候。
      观察人群的撤离。关门时间带来了什么？
    follow_ups:
      - 关门如何塑造停留时间？
      - 如果没有关门时间，空间会是怎样？
      - 边界与归属感之间有什么关系？
  - id: hi_cs_oat_milk_request
    name: 燕麦奶要求
    prompt: |
      “请加燕麦奶。”这个要求代表了身份和偏好。
      替代牛奶已成为一种标志。注意谁提出要求。这个选择对饮用者意味着什么？
    follow_ups:
      - 牛奶选择如何塑造订单？
      - 没有替代品，菜单会是怎样？
      - 选择与身份认同之间有什么关系？
  - id: hi_cs_receipt_glance
    name: 查看收据
    prompt: |
      收据被递过来——通常是未经要求。有些人收下，有些人拒绝。
      收据是凭证和记录。观察这次交流。收据对交易有什么作用？
    follow_ups:
      - 收据如何延伸交易？
      - 没有收据，柜台会是怎样？
      - 收据与记忆之间有什么关系？
  - id: hi_cs_door_hold
    name: 扶门
    prompt: |
      有人为后面的人扶着门。扶门是一种小小的礼貌。
      它创造了一个连接的时刻。观察它何时发生。扶门需要什么？
    follow_ups:
      - 扶门如何塑造入口？
      - 没有扶门，门槛会是怎样？
      - 扶持与礼貌之间有什么关系？
  - id: hi_cs_study_group
    name: 学习小组
    prompt: |
      学生们铺开笔记、笔记本电脑、书籍。桌子变成了工作区。
      学习小组有自己的节奏——讨论、沉默、笑声。
      观察协作。咖啡馆提供了什么？
    follow_ups:
      - 咖啡馆如何促成小组活动？
      - 在图书馆里学习会是怎样？
      - 地点与协作之间有什么关系？
  - id: hi_cs_grind_sound
    name: 研磨声
    prompt: |
      研磨机发出刺耳的声音。这声音工业化、短暂。
      它标志着一杯饮品的制作。这声音穿透了谈话。研磨声给声景增添了什么？
    follow_ups:
      - 研磨声如何塑造期待？
      - 没有研磨声，咖啡馆会是怎样？
      - 声音与手艺之间有什么关系？
  - id: hi_cs_cup_stack_bus
    name: 杯子堆叠清理
    prompt: |
      清洁桶里装满了杯子、盖子、餐巾。有人会来清理。
      这个堆叠是许多顾客停留后的残余。观察堆积。这个堆叠揭示了这一天什么？
    follow_ups:
      - 清洁桶如何处理垃圾？
      - 没有清洁桶，柜台会是怎样？
      - 堆叠与劳动力之间有什么关系？
  - id: hi_cs_first_sip
    name: 第一口
    prompt: |
      第一口——温度、风味、瞬间。观察某人喝第一口。
      他们的表情可能会变化。第一口是等待的回报。它带来了什么？
    follow_ups:
      - 第一口如何塑造后续？
      - 没有第一口，仪式会是怎样？
      - 一口与满足感之间有什么关系？
  - id: hi_cs_neutral_ground
    name: 中立场地
    prompt: |
      咖啡馆不属于任何人。你可以在这里与陌生人见面、独自工作、结束一段关系。
      这种中立性是关键。中立场地能带来什么？
    follow_ups:
      - 中立性如何塑造相遇？
      - 没有中立场地，城市会是怎样？
      - 中立与安全之间有什么关系？
  - id: hi_cs_loyalty_card
    name: 积分卡
    prompt: |
      买十送一。这张卡记录了到店次数。它奖励回头客。
      积分卡是一种隐含的合同。观察谁在使用它。这张卡在顾客和商店之间建立了什么？
    follow_ups:
      - 积分卡如何塑造行为？
      - 没有它，交易会是怎样？
      - 盖章与归属感之间有什么关系？
  - id: hi_cs_outlet_tethered
    name: 插座束缚
    prompt: |
      有人坐在有插座的地方。电线从墙壁连接到笔记本电脑。
      这个“束缚”限制了活动范围。插座决定了座位。观察这种限制。
      这个束缚需要什么？
    follow_ups:
      - 插座如何塑造停留时间？
      - 如果有无线充电，空间会是怎样？
      - 束缚与停留时间之间有什么关系？
  - id: hi_cs_eye_contact_avoid
    name: 避免眼神接触
    prompt: |
      咖啡馆里的陌生人会避免眼神接触。这种避免是一种礼貌。
      看向对方可能会冒着建立连接的风险。观察这种“舞蹈”。谁打破了规则？
      当目光相遇时会发生什么？
    follow_ups:
      - 避免眼神接触如何塑造社交场域？
      - 如果有更多眼神接触，空间会是怎样？
      - 凝视与隐私之间有什么关系？
  - id: hi_cs_rainy_day_crowd
    name: 雨天人群
    prompt: |
      雨水将人们驱赶进室内。咖啡馆挤满了人。湿外套、雨伞放在门口。
      雨天带来了不同的人群。观察这种变化。天气对空间做了什么？
    follow_ups:
      - 雨天如何塑造入住率？
      - 没有这个避难所，这一天会是怎样？
      - 天气与庇护之间有什么关系？
  - id: hi_cs_saved_seat
    name: 留下的座位
    prompt: |
      “我给别人留的。”这个声明阻止了别人占据座位。
      留下的座位是一种承诺。观察其中的张力。一个座位可以保留多久？有什么限制？
    follow_ups:
      - 留座如何塑造房间？
      - 如果没有人尊重这个留座，会发生什么？
      - 声明与信任之间有什么关系？
