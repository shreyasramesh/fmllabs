      - 在餐馆里交谈会是怎样？
      - 地点与倾诉之间有什么关系？
  - id: hi_cs_roaming_table
    name: 游走的顾客
    prompt: |
      有人找不到座位。他们端着杯子四处游走。这种游走是暂时的。
      他们会抓住第一个空位。观察这种搜索。游走揭示了关于这个空间什么？
    follow_ups:
