# মানুষের ইন্টারফেস — কর্মক্ষেত্র (Bengali)

id: human_interface_workplace
name: মানুষের ইন্টারফেস — কর্মক্ষেত্র
description: কর্মক্ষেত্রকে দেখার ভঙ্গি বদলাতে ৫০টি কার্ড — ডেস্কের এলাকা, মিটিং রুম, ওয়াটার কুলার এবং দৃশ্যমান বনাম অদৃশ্য পদমর্যাদা।
domain: human_interface
cards:
  - id: hi_wp_desk_territory
    name: ডেস্কের এলাকা
    prompt: |
      একটি ডেস্ক দখল করা হয়েছে — ছবি, গাছ, মগ। এলাকাটি পৃষ্ঠের বাইরেও প্রসারিত।
      সীমাগুলি পর্যবেক্ষণ করুন। কী "আমার" চিহ্ন দেয়? ডেস্ক একটি ছোট রাজ্য।
      এটি কীভাবে সুরক্ষিত থাকে?
    follow_ups:
      - ডেস্ক কীভাবে পরিচয় তৈরি করে?
      - ব্যক্তিগতকরণ ছাড়া কর্মক্ষেত্র কেমন হবে?
      - এলাকার সাথে অন্তর্ভুক্তির সম্পর্ক কী?
  - id: hi_wp_meeting_room
    name: মিটিং রুম
    prompt: |
      ঘরে একটি টেবিল, চেয়ার, একটি স্ক্রিন আছে। দরজা বন্ধ। মিটিং রুম
      পারফরম্যান্সের জন্য একটি মঞ্চ। কে কথা বলছে, কে বলছে না তা পর্যবেক্ষণ করুন।
      ঘরটি পদমর্যাদা ধারণ করে। স্থানটি কী সক্ষম করে?
    follow_ups:
      - ঘরটি মিটিংকে কীভাবে আকার দেয়?
      - মিটিং রুম ছাড়া কর্মক্ষেত্র কেমন হবে?
      - ঘরের সাথে ক্ষমতার সম্পর্ক কী?
  - id: hi_wp_water_cooler
    name: ওয়াটার কুলার
    prompt: |
      ওয়াটার কুলার একটি সংযোগস্থল। লোকেরা সেখানে দুর্ঘটনাক্রমে মিলিত হয়।
      মুখোমুখি হওয়া অনানুষ্ঠানিক। কথোপকথন পর্যবেক্ষণ করুন। মিটিংয়ে যা বলা হবে না,
      তা কুলারে কী বলা হয়?
    follow_ups:
      - কুলার সংস্কৃতিকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - কুলারের সাথে সংযোগের সম্পর্ক কী?
  - id: hi_wp_visible_hierarchy
    name: দৃশ্যমান পদমর্যাদা
    prompt: |
      কর্নার অফিস, জানালার পাশের আসন, কিউবিকল। স্থানটি পদমর্যাদা এনকোড করে।
      বন্টন পর্যবেক্ষণ করুন। কে কী পায়? পদমর্যাদা স্থাপত্যে তৈরি।
      এটি কী যোগাযোগ করে?
    follow_ups:
      - পদমর্যাদা আচরণকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - স্থানের সাথে মর্যাদার সম্পর্ক কী?
  - id: hi_wp_invisible_hierarchy
    name: অদৃশ্য পদমর্যাদা
    prompt: |
      কিছু লোকের কথা শোনা হয়; অন্যদের বাধা দেওয়া হয়। পদমর্যাদা
      অর্গ চার্টে নেই। মিটিং পর্যবেক্ষণ করুন। কে সম্মান দেখায়? কে
      প্রভাবশালী? অদৃশ্য পদমর্যাদা ফলাফলকে আকার দেয়।
    follow_ups:
      - অদৃশ্য পদমর্যাদা কীভাবে উদ্ভূত হয়?
      - এটি দৃশ্যমান হলে কর্মক্ষেত্র কেমন হবে?
      - অদৃশ্য এবং ক্ষমতার সম্পর্ক কী?
  - id: hi_wp_cubicle_wall
    name: কিউবিকল দেয়াল
    prompt: |
      দেয়ালটি নিচু — আপনি এর উপরে দেখতে পারেন। গোপনীয়তা আংশিক। কিউবিকল
      একটি সমঝোতা। দৃষ্টিসীমা পর্যবেক্ষণ করুন। আপনি কী শুনতে পান? আপনি কী দেখতে পান?
      দেয়ালটি সীমানার একটি বিভ্রম তৈরি করে।
    follow_ups:
      - কিউবিকল মনোযোগকে কীভাবে আকার দেয়?
      - পূর্ণ দেয়াল সহ কর্মক্ষেত্র কেমন হবে?
      - দেয়াল এবং গোপনীয়তার সম্পর্ক কী?
  - id: hi_wp_corner_office
    name: কর্নার অফিস
    prompt: |
      কর্নার অফিসে দুটি জানালা আছে। এটি একটি পুরস্কার। কে এটি দখল করে আছে তা পর্যবেক্ষণ করুন।
      কর্নার অফিস মেঝে থেকে দৃশ্যমান। এটি একটি প্রতীক। কর্নার কী যোগাযোগ করে?
    follow_ups:
      - কর্নার অফিস আকাঙ্ক্ষাকে কীভাবে আকার দেয়?
      - এটি ছাড়া মেঝে কেমন হবে?
      - কর্নার এবং কর্তৃত্বের সম্পর্ক কী?
  - id: hi_wp_open_plan
    name: ওপেন প্ল্যান
    prompt: |
      কোন দেয়াল নেই। সারি বা পডে ডেস্ক। ওপেন প্ল্যান সহযোগিতার প্রতিশ্রুতি দেয়।
      বাস্তবতা পর্যবেক্ষণ করুন। কে হেডফোন পরে? ওপেন প্ল্যান
      সান্নিধ্য তৈরি করে। এর দাম কত?
    follow_ups:
      - ওপেন প্ল্যান মিথস্ক্রিয়াকে কীভাবে আকার দেয়?
      - দেয়াল সহ কর্মক্ষেত্র কেমন হবে?
      - ওপেন এবং ফোকাসের সম্পর্ক কী?
  - id: hi_wp_calendar_invite
    name: ক্যালেন্ডার ইনভাইট
    prompt: |
      ইনভাইট দেখা যায়। গ্রহণ করুন, প্রত্যাখ্যান করুন, ঐচ্ছিক। ক্যালেন্ডার
      দিনকে গঠন করে। ব্লকগুলো পর্যবেক্ষণ করুন। কার সময় কে নিয়ন্ত্রণ করে?
      ক্যালেন্ডার ক্ষমতার একটি মানচিত্র।
    follow_ups:
      - ক্যালেন্ডার দিনকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - ইনভাইট এবং বাধ্যবাধকতার সম্পর্ক কী?
  - id: hi_wp_knock_before_enter
    name: প্রবেশ করার আগে নক
    prompt: |
      কিছু দরজা বন্ধ। নক একটি অনুরোধ। কে নক করে এবং কে প্রবেশ করে তা পর্যবেক্ষণ করুন।
      নক সম্মান এনকোড করে। বন্ধ দরজা কী রক্ষা করে?
    follow_ups:
      - নক সাক্ষাৎকে কীভাবে আকার দেয়?
      - খোলা দরজা সহ কর্মক্ষেত্র কেমন হবে?
      - নক এবং সীমানার সম্পর্ক কী?
  - id: hi_wp_headphones_signal
    name: হেডফোন সিগন্যাল
    prompt: |
      হেডফোন পরা মানে "বিরক্ত করবেন না।" সিগন্যালটি সার্বজনীন।
      কে সম্মান করে তা পর্যবেক্ষণ করুন। হেডফোন একটি বুদ্বুদ তৈরি করে।
      বুদ্বুদ কী সক্ষম করে?
    follow_ups:
      - হেডফোন ফ্লোরকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - হেডফোন এবং ফোকাসের সম্পর্ক কী?
  - id: hi_wp_lunch_room
    name: লাঞ্চ রুম
    prompt: |
      লাঞ্চ রুমে টেবিল, মাইক্রোওয়েভ, ফ্রিজ আছে। লোকেরা একা বা একসাথে খায়।
      ক্লাস্টারগুলি পর্যবেক্ষণ করুন। কে কার সাথে বসে? লাঞ্চ রুম
      জোট প্রকাশ করে। বিন্যাস কী বলে?
    follow_ups:
      - লাঞ্চ রুম সংস্কৃতিকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - লাঞ্চ এবং সংযোগের সম্পর্ক কী?
  - id: hi_wp_slack_ping
    name: স্ল্যাক পিং
    prompt: |
      পিং আসে। তাৎক্ষণিক, অ্যাসিনক্রোনাস। পিং বাধা দিতে পারে বা অপেক্ষা করতে পারে।
      নর্মস পর্যবেক্ষণ করুন। কে অবিলম্বে প্রতিক্রিয়া জানায়? পিং
      যোগাযোগের একটি নতুন ছন্দ তৈরি করে। এটি কী প্রতিস্থাপন করে?
    follow_ups:
      - পিং দিনকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - পিং এবং জরুরি অবস্থার সম্পর্ক কী?
  - id: hi_wp_whiteboard_claim
    name: হোয়াইটবোর্ড ক্লেইম
    prompt: |
      হোয়াইটবোর্ডে ধারণা থাকে — ডায়াগ্রাম, তালিকা। কেউ সেগুলো লিখেছে।
      বোর্ডটি একটি ভাগ করা পৃষ্ঠ। কে লেখে, কে মুছে ফেলে তা পর্যবেক্ষণ করুন।
      বোর্ডটি এলাকা। এটি কী ধরে রাখে?
    follow_ups:
      - হোয়াইটবোর্ড সহযোগিতাকে কীভাবে আকার দেয়?
      - এটি ছাড়া মিটিং কেমন হবে?
      - বোর্ড এবং চিন্তার সম্পর্ক কী?
  - id: hi_wp_elevator_encounter
    name: লিফট সাক্ষাৎ
    prompt: |
      আপনি একজন সহকর্মীর সাথে লিফট ভাগ করেন। ত্রিশ সেকেন্ড। সাক্ষাৎ
      অস্বস্তিকর বা সহজ। ছোটখাটো কথোপকথন পর্যবেক্ষণ করুন। কী বলা হয়?
      লিফট সময় সংকুচিত করে। এটি কী প্রয়োজন?
    follow_ups:
      - লিফট সাক্ষাৎকে কীভাবে আকার দেয়?
      - লিফট ছাড়া বিল্ডিং কেমন হবে?
      - লিফট এবং ভদ্রতার সম্পর্ক কী?
  - id: hi_wp_cc_email
    name: সিসি ইমেল
    prompt: |
      আপনাকে সিসি করা হয়েছে। আপনি মূল প্রাপক নন। সিসি আপনাকে লুপে অন্তর্ভুক্ত করে।
      কাকে সিসি করা হয় তা পর্যবেক্ষণ করুন। সিসি প্রাসঙ্গিকতার —
      বা রাজনীতির — একটি সংকেত। সিসি কী করে?
    follow_ups:
      - সিসি যোগাযোগকে কীভাবে আকার দেয়?
      - সিসি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - সিসি এবং দৃশ্যমানতার সম্পর্ক কী?
  - id: hi_wp_standing_desk
    name: স্ট্যান্ডিং ডেস্ক
    prompt: |
      ডেস্কটি ওঠে। কর্মী দাঁড়িয়ে থাকে। স্ট্যান্ডিং ডেস্ক একটি পছন্দ — স্বাস্থ্য,
      পছন্দ, পারফরম্যান্স। কে এটি ব্যবহার করে তা পর্যবেক্ষণ করুন। স্ট্যান্ডিং
      ডেস্ক কী সংকেত দেয়?
    follow_ups:
      - স্ট্যান্ডিং ডেস্ক শরীরকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
      - দাঁড়ানো এবং উৎপাদনশীলতার সম্পর্ক কী?
  - id: hi_wp_conference_call
    name: কনফারেন্স কল
    prompt: |
      অন্যান্য স্থান থেকে কণ্ঠস্বর। কলটি বিতরণ করা লোকেদের সংযুক্ত করে।
      কে কথা বলে, কে মিউট করে তা পর্যবেক্ষণ করুন। কলটি একটি আংশিক উপস্থিতি।
      কল কী সক্ষম করে — এবং কী হারায়?
    follow_ups:
      - কল মিটিংকে কীভাবে আকার দেয়?
      - এটি ছাড়া কর্মক্ষেত্র কেমন হবে?
