# மனித இடைமுகம் — சில்லறை வர்த்தகம் (Tamil)

id: human_interface_retail
name: மனித இடைமுகம் — சில்லறை வர்த்தகம்
description: சில்லறை வர்த்தக இடத்தை நீங்கள் பார்க்கும் விதத்தை மாற்ற 50 அட்டைகள் — நடைபாதைகள் மற்றும் ஷாப்பிங் செய்யும் முறை முதல் உடைகளை மாற்றிப் பார்க்கும் அறைகள் மற்றும் வாங்கும் செயல்முறை வரை.
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: நடைபாதை ஓட்டம்
    prompt: |
      நடைபாதை இயக்கத்தை வழிநடத்துகிறது. வண்டிகள் ஒரு திசையில் செல்கின்றன; மனிதர்கள் நகர்கிறார்கள்.
      ஓட்டத்தை கவனியுங்கள். யார் வழிவிடுகிறார்கள்? யார் தடுக்கிறார்கள்? நடைபாதைக்கும் இயற்பியல் விதிகள்
      உண்டு. இந்த நடனத்தை எந்த விதிகள் கட்டுப்படுத்துகின்றன?
    follow_ups:
      - நடைபாதை ஷாப்பிங் அனுபவத்தை எவ்வாறு வடிவமைக்கிறது?
      - நடைபாதைகள் இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - ஓட்டத்திற்கும் வடிவமைப்பிற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_browsing_choreography
    name: ஷாப்பிங் செய்யும் முறை
    prompt: |
      விரல்கள் துணியைத் தொடுகின்றன. கண்கள் அலமாரிகளை நோக்குகின்றன. ஷாப்பிங்கிற்கு ஒரு தாளம் உண்டு—நில்,
      யோசி, நகர். இந்த நடனத்தைக் கவனியுங்கள். வாங்காவிட்டால் உடல் என்ன செய்யும்?
    follow_ups:
      - ஷாப்பிங் செய்யும் முறை அனுபவத்தை எவ்வாறு வடிவமைக்கிறது?
      - ஷாப்பிங் செய்யும் முறை இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - ஷாப்பிங் மற்றும் ஆசைக்கு இடையிலான தொடர்பு என்ன?
  - id: hi_rt_fitting_room
    name: உடைகளை மாற்றிப் பார்க்கும் அறை
    prompt: |
      திரை மூடப்படுகிறது. உடைகளை மாற்றிப் பார்க்கும் அறை ஒரு நுழைவாயில்—பொது இடத்திலிருந்து தனிப்பட்ட
      இடத்திற்கு. உள்ளே, நீங்கள் ஒரு சாத்தியமான உங்களை முயற்சிக்கிறீர்கள். திரும்ப வருவதைக் கவனியுங்கள்.
      முகம் என்ன சொல்கிறது? உடைகளை மாற்றிப் பார்க்கும் அறை முடிவெடுப்பதற்கான ஒரு மேடை.
    follow_ups:
      - உடைகளை மாற்றிப் பார்க்கும் அறை வாங்குவதை எவ்வாறு வடிவமைக்கிறது?
      - இது இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - உடைகளை மாற்றிப் பார்ப்பதற்கும் அடையாளத்திற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_dance_of_purchase
    name: வாங்கும் செயல்முறை நடனம்
    prompt: |
      அணுகு, தேர்ந்தெடு, கொண்டு செல், பணம் செலுத்து. வாங்குவதற்கு படிகள் உண்டு. இந்த வரிசையைக்
      கவனியுங்கள். மக்கள் எங்கே தயங்குகிறார்கள்? இந்த நடனம் கடையால் வடிவமைக்கப்பட்டுள்ளது. இது என்ன
      எடுத்துக்கொள்கிறது?
    follow_ups:
      - இந்த நடனம் முடிவை எவ்வாறு வடிவமைக்கிறது?
      - வரிசை இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - நடனத்திற்கும் ஆசைக்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_cart_territory
    name: வண்டிப் பகுதி
    prompt: |
      வண்டி உடலை நீட்டிக்கிறது. இது தேர்வுகளை வைத்திருக்கிறது, பாதையை தடுக்கிறது. வண்டியின் பாதையைக்
      கவனியுங்கள். வண்டி ஒரு நகரும் பகுதி. இது என்ன கோருகிறது?
    follow_ups:
      - வண்டி இயக்கத்தை எவ்வாறு வடிவமைக்கிறது?
      - வண்டிகள் இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - வண்டிக்கும் சேகரிப்பிற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_endcap_display
    name: கடைமுகப்பு காட்சி
    prompt: |
      நடைபாதையின் முடிவில் ஒரு காட்சி — திடீர் விருப்பம், தள்ளுபடி, பருவகால. கடைமுகப்பு கண்ணை ஈர்க்கிறது.
      யார் நிற்கிறார்கள் என்று கவனியுங்கள். கடைமுகப்பு ஒரு பொறி. அது என்ன செய்கிறது?
    follow_ups:
      - கடைமுகப்பு ஷாப்பிங் செய்யும் முறையை எவ்வாறு வடிவமைக்கிறது?
      - கடைமுகப்பு இல்லாவிட்டால் நடைபாதை எப்படி இருக்கும்?
      - காட்சிக்கும் திடீர் விருப்பத்திற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_checkout_line
    name: பணம் செலுத்தும் வரிசை
    prompt: |
      வரிசை உருவாகிறது. மிட்டாய்கள், பத்திரிகைகள், கடைசி வாய்ப்புகள். பணம் செலுத்தும் இடம் ஒரு
      இறுதி சோதனை. காத்திருப்பதைக் கவனியுங்கள். மக்கள் என்ன செய்கிறார்கள்? வரிசை ஷாப்பிங்கிற்கும்
      வெளியேறுவதற்கும் இடையிலான ஒரு நுழைவாயில்.
    follow_ups:
      - வரிசை வாங்குவதை எவ்வாறு வடிவமைக்கிறது?
      - காத்திருப்பு இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - வரிசைக்கும் திடீர் விருப்பத்திற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_shelf_height
    name: அலமாரி உயரம்
    prompt: |
      கண் மட்டத்தில் விற்பனை. அலமாரி உயரம் ஒரு வடிவமைப்பு. எங்கே என்ன இருக்கிறது என்று கவனியுங்கள்.
      கீழே என்ன இருக்கிறது? மேலே என்ன இருக்கிறது? உயரம் மதிப்பை குறியாக்குகிறது. இது உடல் பற்றி என்ன
      ஊகிக்கிறது?
    follow_ups:
      - அலமாரி உயரம் ஷாப்பிங் செய்யும் முறையை எவ்வாறு வடிவமைக்கிறது?
      - சீரான உயரத்தில் கடை எப்படி இருக்கும்?
      - உயரம் மற்றும் அணுகலுக்கு இடையிலான தொடர்பு என்ன?
  - id: hi_rt_price_tag
    name: விலை குறிச்சீட்டு
    prompt: |
      குறிச்சீட்டு விலையைக் கூறுகிறது. சில சமயங்களில் மறைக்கப்பட்டுள்ளது, சில சமயங்களில் முக்கியமாக
      காட்டப்படுகிறது. அதன் அமைப்பைக் கவனியுங்கள். குறிச்சீட்டு தகவல் மற்றும் தடையாக உள்ளது. தொடும்
      அந்த கணத்தில் குறிச்சீட்டு என்ன செய்கிறது?
    follow_ups:
      - குறிச்சீட்டு முடிவை எவ்வாறு வடிவமைக்கிறது?
      - குறிச்சீட்டு இல்லாவிட்டால் பொருள் எப்படி இருக்கும்?
      - குறிச்சீட்டுக்கும் மதிப்புக்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_store_entrance
    name: கடை நுழைவாயில்
    prompt: |
      கதவு திறக்கிறது. நீங்கள் நுழைகிறீர்கள். நுழைவாயில் ஒரு எல்லை. நீங்கள் முதலில் என்ன பார்க்கிறீர்கள்
      என்று கவனியுங்கள். நுழைவாயில் தொனியை அமைக்கிறது. கடை உங்களை என்ன உணர வைக்க விரும்புகிறது?
    follow_ups:
      - நுழைவாயில் வருகையை எவ்வாறு வடிவமைக்கிறது?
      - வடிவமைப்பு இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - நுழைவாயிலுக்கும் எதிர்பார்ப்பிற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_sales_associate
    name: விற்பனை உதவியாளர்
    prompt: |
      "நான் உங்களுக்கு ஏதாவது கண்டுபிடிக்க உதவவா?" இந்த சலுகை குறிப்பிட்டது. இந்த பரிமாற்றத்தைக்
      கவனியுங்கள். ஏற்றுக்கொள்வீர்களா அல்லது மறுப்பீர்களா? உதவியாளர் ஒரு வழிகாட்டி மற்றும் ஒரு அழுத்தம்.
      இந்த சலுகை என்ன செய்கிறது?
    follow_ups:
      - உதவியாளர் ஷாப்பிங் செய்யும் முறையை எவ்வாறு வடிவமைக்கிறார்?
      - அவர்கள் இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - சலுகைக்கும் கடமைக்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_basket_versus_cart
    name: கூடை vs வண்டி
    prompt: |
      சிறிய பொருட்களுக்கு கூடை. அதிக பொருட்களுக்கு வண்டி. இந்த தேர்வு வாங்குவதை கணிக்கும். யார்
      எதை எடுக்கிறார்கள் என்று கவனியுங்கள். கூடை வரம்புகளை விதிக்கிறது; வண்டி அழைக்கிறது. இந்த தேர்வு
      என்ன சாத்தியமாக்குகிறது?
    follow_ups:
      - கூடை வருகையை எவ்வாறு வடிவமைக்கிறது?
      - கூடைகள் மட்டுமே இருந்தால் கடை எப்படி இருக்கும்?
      - பாத்திரத்திற்கும் சேகரிப்பிற்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_return_counter
    name: திரும்பப்பெறும் கவுண்டர்
    prompt: |
      திரும்பப்பெறும் வரிசை வேறுபட்டது. மக்கள் பைகள், ரசீதுகள், வருத்தத்துடன் வருகிறார்கள். திரும்பப்
      பெறுதல் ஒரு தலைகீழ் செயல். இந்த பரிமாற்றத்தைக் கவனியுங்கள். திரும்பப் பெறுவது என்ன செலவு—உணர்ச்சி ரீதியாக,
      சமூக ரீதியாக? திரும்பப்பெறும் கவுண்டர் ரத்து செய்யும் இடம்.
    follow_ups:
      - திரும்பப் பெறுதல் உறவை எவ்வாறு வடிவமைக்கிறது?
      - திரும்பப் பெறுதல் இல்லாவிட்டால் கடை எப்படி இருக்கும்?
      - திரும்பப் பெறுதலுக்கும் நம்பிக்கைக்கும் இடையிலான தொடர்பு என்ன?
  - id: hi_rt_dressing_room_limit
    name: உடைகளை மாற்றிப் பார்க்கும் அறை வரம்பு
    prompt: |
