# yaml-language-server: $schema=../../schema/perspective-deck-schema.json
# मानव इंटरफ़ेस — रिटेल (Hindi)

id: human_interface_retail
name: मानव इंटरफ़ेस — रिटेल
description: 50 कार्ड जो आपको रिटेल स्पेस को देखने का तरीका बदलते हैं—गलियारों और ब्राउज़िंग कोरियोग्राफी से लेकर फिटिंग रूम और खरीदारी के नृत्य तक।
domain: human_interface
cards:
  - id: hi_rt_aisle_flow
    name: गलियारे का प्रवाह
    prompt: |
      गलियारा आवाजाही को चैनल करता है। गाड़ियाँ एक तरफ जाती हैं; लोग नेविगेट करते हैं।
      प्रवाह का निरीक्षण करें। कौन रास्ता देता है? कौन रोकता है? गलियारे में भौतिकी होती है।
      नृत्य को कौन से नियम नियंत्रित करते हैं?
    follow_ups:
      - गलियारा ब्राउज़ को कैसे आकार देता है?
      - गलियारों के बिना स्टोर क्या होगा?
      - प्रवाह और डिज़ाइन के बीच क्या संबंध है?
  - id: hi_rt_browsing_choreography
    name: ब्राउज़िंग कोरियोग्राफी
    prompt: |
      उंगलियाँ कपड़े को छूती हैं। आँखें शेल्फ को स्कैन करती हैं। ब्राउज़ में एक लय होती है—रुकना,
      विचार करना, आगे बढ़ना। कोरियोग्राफी का निरीक्षण करें। जब शरीर खरीद नहीं रहा होता है तो वह क्या करता है?
    follow_ups:
      - ब्राउज़िंग अनुभव को कैसे आकार देती है?
      - ब्राउज़िंग के बिना स्टोर क्या होगा?
      - ब्राउज़ और इच्छा के बीच क्या संबंध है?
  - id: hi_rt_fitting_room
    name: फिटिंग रूम
    prompt: |
      पर्दा गिरता है। फिटिंग रूम एक दहलीज है—सार्वजनिक से निजी तक।
      अंदर, आप एक संभावित स्व को आज़माते हैं। वापसी का निरीक्षण करें। चेहरा क्या कहता है?
      फिटिंग रूम निर्णय के लिए एक मंच है।
    follow_ups:
      - फिटिंग रूम खरीदारी को कैसे आकार देता है?
      - इसके बिना स्टोर क्या होगा?
      - फिटिंग और पहचान के बीच क्या संबंध है?
  - id: hi_rt_dance_of_purchase
    name: खरीदारी का नृत्य
    prompt: |
      पहुँचें, चुनें, ले जाएं, भुगतान करें। खरीदारी के कदम होते हैं।
      अनुक्रम का निरीक्षण करें। लोग कहाँ हिचकिचाते हैं? नृत्य को स्टोर द्वारा कोरियोग्राफ किया गया है।
      यह क्या निकालता है?
    follow_ups:
      - नृत्य परिणाम को कैसे आकार देता है?
      - अनुक्रम के बिना स्टोर क्या होगा?
      - नृत्य और इच्छा के बीच क्या संबंध है?
  - id: hi_rt_cart_territory
    name: कार्ट क्षेत्र
    prompt: |
      कार्ट शरीर का विस्तार करता है। यह विकल्प रखता है, मार्ग अवरुद्ध करता है।
      कार्ट के मार्ग का निरीक्षण करें। कार्ट एक मोबाइल क्षेत्र है। यह क्या दावा करता है?
    follow_ups:
      - कार्ट आवाजाही को कैसे आकार देता है?
      - कार्ट के बिना स्टोर क्या होगा?
      - कार्ट और संचय के बीच क्या संबंध है?
  - id: hi_rt_endcap_display
    name: एंडकैप डिस्प्ले
    prompt: |
      गलियारे के अंत में एक डिस्प्ले होता है—आवेग, बिक्री, मौसमी।
      एंडकैप आँखें पकड़ता है। देखें कि कौन रुकता है। एंडकैप एक जाल है।
      यह क्या करता है?
    follow_ups:
      - एंडकैप ब्राउज़ को कैसे आकार देता है?
      - इसके बिना गलियारा क्या होगा?
      - डिस्प्ले और आवेग के बीच क्या संबंध है?
  - id: hi_rt_checkout_line
    name: चेकआउट लाइन
    prompt: |
      लाइन बनती है। कैंडी, पत्रिकाएं, अंतिम अवसर। चेकआउट एक अंतिम परीक्षा है।
      प्रतीक्षा का निरीक्षण करें। लोग क्या करते हैं? लाइन ब्राउज़ और निकास के बीच एक दहलीज है।
    follow_ups:
      - लाइन खरीदारी को कैसे आकार देती है?
      - प्रतीक्षा के बिना स्टोर क्या होगा?
      - लाइन और आवेग के बीच क्या संबंध है?
  - id: hi_rt_shelf_height
    name: शेल्फ की ऊंचाई
    prompt: |
      आँख का स्तर बिकता है। शेल्फ की ऊंचाई डिजाइन है। देखें कि कहाँ क्या है।
      नीचे क्या है? ऊपर क्या है? ऊंचाई मूल्य को एन्कोड करती है।
      यह शरीर के बारे में क्या मानती है?
    follow_ups:
      - शेल्फ की ऊंचाई ब्राउज़ को कैसे आकार देती है?
      - समान ऊंचाई वाले स्टोर का क्या होगा?
      - ऊंचाई और पहुंच के बीच क्या संबंध है?
  - id: hi_rt_price_tag
    name: मूल्य टैग
    prompt: |
      टैग कीमत बताता है। कभी छिपा हुआ, कभी प्रमुख।
      प्लेसमेंट का निरीक्षण करें। टैग जानकारी और बाधा है। स्पर्श के क्षण को टैग क्या करता है?
    follow_ups:
      - टैग निर्णय को कैसे आकार देता है?
      - टैग के बिना वस्तु क्या होगी?
      - टैग और मूल्य के बीच क्या संबंध है?
  - id: hi_rt_store_entrance
    name: स्टोर प्रवेश
    prompt: |
      दरवाजा खुलता है। आप प्रवेश करते हैं। प्रवेश एक दहलीज है।
      आप सबसे पहले क्या देखते हैं, उसका निरीक्षण करें। प्रवेश स्वर निर्धारित करता है।
      स्टोर आपको कैसा महसूस कराना चाहता है?
    follow_ups:
      - प्रवेश यात्रा को कैसे आकार देता है?
      - डिज़ाइन के बिना स्टोर क्या होगा?
      - प्रवेश और अपेक्षा के बीच क्या संबंध है?
  - id: hi_rt_sales_associate
    name: बिक्री सहयोगी
    prompt: |
      "क्या मैं आपको कुछ खोजने में मदद कर सकता हूँ?" प्रस्ताव स्क्रिप्टेड है।
      विनिमय का निरीक्षण करें। स्वीकार करें या अस्वीकार करें? सहयोगी एक मार्गदर्शक और एक दबाव है।
      प्रस्ताव क्या करता है?
    follow_ups:
      - सहयोगी ब्राउज़ को कैसे आकार देता है?
      - उनके बिना स्टोर क्या होगा?
      - प्रस्ताव और दायित्व के बीच क्या संबंध है?
  - id: hi_rt_basket_versus_cart
    name: बास्केट बनाम कार्ट
    prompt: |
      कुछ वस्तुओं के लिए बास्केट। अधिक के लिए कार्ट। विकल्प खरीदारी का अनुमान लगाता है।
      देखें कि कौन क्या लेता है। बास्केट सीमित करता है; कार्ट आमंत्रित करता है।
      विकल्प क्या सक्षम करता है?
    follow_ups:
      - बास्केट यात्रा को कैसे आकार देती है?
      - केवल कार्ट वाले स्टोर का क्या होगा?
      - बर्तन और संचय के बीच क्या संबंध है?
  - id: hi_rt_return_counter
    name: वापसी काउंटर
    prompt: |
      वापसी लाइन अलग है। लोग बैग, रसीदें, पछतावा ले जाते हैं।
      वापसी एक उलटफेर है। विनिमय का निरीक्षण करें। वापसी की कीमत क्या है—भावनात्मक, सामाजिक?
      वापसी काउंटर पूर्ववत करने का एक स्थान है।
    follow_ups:
      - वापसी रिश्ते को कैसे आकार देती है?
      - रिटर्न के बिना स्टोर क्या होगा?
      - वापसी और विश्वास के बीच क्या संबंध है?
  - id: hi_rt_dressing_room_limit
    name: ड्रेसिंग रूम सीमा
    prompt: |
      "अधिकतम छह वस्तुएँ।" सीमा कोशिश को नियंत्रित करती है।
      बातचीत का निरीक्षण करें। सात होने पर क्या होता है? सीमा फिटिंग रूम के अनुभव को आकार देती है।
      यह क्या मानती है?
    follow_ups:
      - सीमा कोशिश को कैसे आकार देती है?
      - इसके बिना फिटिंग रूम क्या होगा?
      - सीमा और चोरी के बीच क्या संबंध है?
  - id: hi_rt_impulse_buy
    name: आवेगपूर्ण खरीदारी
    prompt: |
      वस्तु सूची में नहीं थी। इसने नज़र पकड़ ली। आवेगपूर्ण खरीदारी समर्पण का एक क्षण है।
      देखें कि यह कब होता है। इसे क्या ट्रिगर किया? आवेग डिजाइन का इच्छा से मिलना है।
    follow_ups:
      - आवेग खरीदारी को कैसे आकार देता है?
      - आवेग के बिना स्टोर क्या होगा?
      - आवेग और पछतावा के बीच क्या संबंध है?
  - id: hi_rt_store_music
    name: स्टोर संगीत
    prompt: |
      संगीत बजता है—धीमा, परिचित, डिज़ाइन किया हुआ। संगीत मूड और गति को आकार देता है।
      गति का निरीक्षण करें। तेज़ स्टोर, धीमा संगीत? संगीत अदृश्य डिजाइन है।
      यह शरीर के साथ क्या करता है?
    follow_ups:
      - संगीत यात्रा को कैसे आकार देता है?
      - चुप्पी में स्टोर क्या होगा?
      - संगीत और अवधि के बीच क्या संबंध है?
  - id: hi_rt_mannequin
    name: पुतला
    prompt: |
      पुतला कपड़े पहनता है। यह एक आदर्श शरीर है, एक सुझाव है।
      देखें कि लोग इसे कैसे देखते हैं। पुतला एक दर्पण और एक कल्पना है।
      यह क्या वादा करता है?
    follow_ups:
      - पुतला ब्राउज़ को कैसे आकार देता है?
      - इसके बिना स्टोर क्या होगा?
      - पुतला और इच्छा के बीच क्या संबंध है?
  - id: hi_rt_sample_station
    name: सैंपल स्टेशन
    prompt: |
      इसका स्वाद चखें। इसे आजमाएं। सैंपल स्पर्श को आमंत्रित करता है। स्टेशन एक ठहराव बनाता है।
      देखें कि कौन रुकता है। सैंपल एक छोटा सा उपहार है। यह क्या निकालता है?
    follow_ups:
      - सैंपल खरीदारी को कैसे आकार देता है?
      - सैंपल के बिना स्टोर क्या होगा?
      - सैंपल और दायित्व के बीच क्या संबंध है?
  - id: hi_rt_sale_rack
    name: सेल रैक
    prompt: |
      सेल रैक अराजकता है—छूट, rumpled। लोग खोदते हैं। सेल रैक एक अलग तरह का ब्राउज़ है।
      व्यवहार का निरीक्षण करें। छूट स्पर्श को क्या करती है?
    follow_ups:
      - सेल रैक यात्रा को कैसे आकार देता है?
      - इसके बिना स्टोर क्या होगा?
      - बिक्री और मूल्य के बीच क्या संबंध है?
  - id: hi_rt_mirror_encounter
    name: दर्पण मुठभेड़
    prompt: |
      आप खुद को स्टोर के दर्पण में देखते हैं। मुठभेड़ अनिवार्य है।
      टकटकी का निरीक्षण करें। आप क्या जाँचते हैं? दर्पण एक परीक्षा है। स्टोर दर्पण प्रदान करता है।
      वह क्या चाहता है?
    follow_ups:
      - दर्पण कोशिश को कैसे आकार देता है?
      - इसके बिना फिटिंग रूम क्या होगा?
      - दर्पण और स्व के बीच क्या संबंध है?
  - id: hi_rt_cashier_small_talk
    name: कैशियर छोटी बातचीत
    prompt: |
      "सब कुछ ठीक मिला?" कैशियर पूछता है। छोटी बातचीत स्क्रिप्टेड है।
      विनिमय का निरीक्षण करें। प्रश्न क्या करता है? कैशियर अंतिम मानवीय संपर्क है।
      बातचीत क्या बनाती है?
    follow_ups:
      - छोटी बातचीत निकास को कैसे आकार देती है?
      - इसके बिना चेकआउट क्या होगा?
      - बातचीत और लेनदेन के बीच क्या संबंध है?
  - id: hi_rt_store_layout
    name: स्टोर लेआउट
    prompt: |
      पथ डिज़ाइन किया गया है। पीछे स्टेपल। सामने आवेग।
      लेआउट यात्रा को कोरियोग्राफ करता है। अपने मार्ग का निरीक्षण करें।
      डिज़ाइनर आपको क्या पास कराना चाहता था?
    follow_ups:
      - लेआउट ब्राउज़ को कैसे आकार देता है?
      - यादृच्छिक लेआउट वाले स्टोर का क्या होगा?
      - लेआउट और एक्सपोजर के बीच क्या संबंध है?
  - id: hi_rt_touch_decide
    name: स्पर्श निर्णय
    prompt: |
      उंगलियाँ कपड़े, सतह को छूती हैं। स्पर्श तय करता है।
      क्षण का निरीक्षण करें। हाथ क्या सीखता है जो आँख नहीं कर सकती?
      स्पर्श एक दहलीज है। इसकी क्या आवश्यकता है?
    follow_ups:
      - स्पर्श निर्णय को कैसे आकार देता है?
      - स्पर्श के बिना स्टोर क्या होगा?
      - स्पर्श और प्रतिबद्धता के बीच क्या संबंध है?
  - id: hi_rt_receipt_handoff
    name: रसीद हैंडऑफ़
    prompt: |
      रसीद की पेशकश की जाती है—बैग में या अलग से। कुछ इसे लेते हैं; कुछ
      अस्वीकार करते हैं। रसीद प्रमाण और रिकॉर्ड है। विनिमय का निरीक्षण करें।
      लेनदेन के लिए रसीद क्या करती है?
    follow_ups:
