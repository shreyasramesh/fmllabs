# মানুষের ইন্টারফেস — কফি শপ (Bengali)

id: human_interface_coffee_shop
name: মানুষের ইন্টারফেস — কফি শপ
description: কফি শপটিকে আপনি যেভাবে দেখেন তা বদলাতে ৫০টি কার্ড—কিউ কোরিওগ্রাফি এবং ল্যাপটপ অঞ্চল থেকে শুরু করে তৃতীয় স্থান, অদৃশ্য স্ক্রিপ্ট এবং আচার-অনুষ্ঠান হিসেবে কফি পর্যন্ত।
domain: human_interface
cards:
  - id: hi_cs_queue_choreography
    name: কিউয়ের কোরিওগ্রাফি
    prompt: |
      কাউন্টারে অপেক্ষারতদের লাইন দেখুন। শরীরগুলো নিজেদের সাজিয়ে নেয়—সামনে ঝুঁকে,
      মোবাইল দেখে, আলতোভাবে নড়াচড়া করে। কিউয়ের একটি ছন্দ আছে। কে জায়গা ধরে রাখে?
      কে কোথায় দাঁড়াবে তা কোন অলিখিত নিয়ম নিয়ন্ত্রণ করে?
    follow_ups:
      - অপেক্ষার সাথে প্রত্যাশা কীভাবে সম্পর্কযুক্ত?
      - যদি সবাই নিয়ম মেনে না চলে তবে কী হবে?
      - অপেক্ষা এবং অন্তর্ভুক্তির মধ্যে সম্পর্ক কী?
  - id: hi_cs_laptop_territory
    name: ল্যাপটপ অঞ্চল
    prompt: |
      টেবিলে খোলা ল্যাপটপ জায়গা দখল করে। পাশে রাখা কাপ, চেয়ারে ঝোলানো ব্যাগ।
      সীমানাগুলো লক্ষ্য করুন। একজন ব্যক্তি কতটা জায়গা দখল করে? কী "দখল" সংকেত দেয়?
    follow_ups:
      - ল্যাপটপ কীভাবে শরীরকে প্রসারিত করে?
      - ডিভাইস ছাড়া জায়গাটি কেমন হবে?
      - অঞ্চল এবং সময়ের মধ্যে সম্পর্ক কী?
  - id: hi_cs_third_place
    name: তৃতীয় স্থান
    prompt: |
      বাড়ি নয়, কর্মস্থলও নয়—কফি শপ একটি তৃতীয় স্থান। মানুষ একা থাকতে আসে, কিন্তু একা নয়।
      কারা বসে থাকে, কারা দ্রুত চলে যায় তা লক্ষ্য করুন। জায়গাটি একটি ভিন্ন সামাজিক চুক্তি ধারণ করে।
    follow_ups:
      - তৃতীয় স্থান ছাড়া শহর কেমন হবে?
      - কফি শপ লাইব্রেরি থেকে কীভাবে আলাদা?
      - স্থান এবং পরিচয়ের মধ্যে সম্পর্ক কী?
  - id: hi_cs_invisible_script
    name: অদৃশ্য স্ক্রিপ্ট
    prompt: |
      অর্ডার, পেমেন্ট, অপেক্ষা, গ্রহণ, বসার জায়গা খোঁজা। স্ক্রিপ্টটি অদৃশ্য যতক্ষণ না কেউ এটি ভাঙে।
      প্রথমবার আসা কাউকে দেখুন। তারা কী জানে না? স্ক্রিপ্টটি অন্তর্ভুক্তির এনকোড করে।
    follow_ups:
      - স্ক্রিপ্ট কীভাবে বর্জন করে?
      - স্ক্রিপ্টটি লেখা থাকলে কী হবে?
      - স্ক্রিপ্ট এবং সাবলীলতার মধ্যে সম্পর্ক কী?
  - id: hi_cs_coffee_ritual
    name: কফি একটি আচারের মতো
    prompt: |
      পানীয়টি গৌণ। আচারটিই প্রধান—হাঁটা, অর্ডার দেওয়া, প্রথম চুমুক। নিজের নড়াচড়াগুলো লক্ষ্য করুন।
      কফি যদি আপনার দরজায় এসে পৌঁছে যায় তবে আপনি কী হারাবেন?
    follow_ups:
      - আচার কীভাবে পরিবর্তন চিহ্নিত করে?
      - কফি বিরতি ছাড়া দিনটি কেমন হবে?
      - আচার এবং প্রস্তুতির মধ্যে সম্পর্ক কী?
  - id: hi_cs_counter_handoff
    name: কাউন্টার হস্তান্তর
    prompt: |
      বারিস্টা একটি নাম ধরে ডাকেন। একটি হাত এগিয়ে আসে। হস্তান্তরটি অপরিচিত এবং অপরিচিতের মধ্যে যোগাযোগের একটি মুহূর্ত।
      আদান-প্রদানটি লক্ষ্য করুন। কাপের চেয়ে আর কী বিনিময় হয়?
    follow_ups:
      - হস্তান্তর কীভাবে সংযোগ তৈরি করে?
      - রোবট বারিস্টা থাকলে কী পরিবর্তন হবে?
      - হস্তান্তর এবং আস্থার মধ্যে সম্পর্ক কী?
  - id: hi_cs_power_outlet_hunt
    name: পাওয়ার আউটলেট খোঁজা
    prompt: |
      চোখ দেয়াল, মেঝে, টেবিলের নিচে স্ক্যান করে। আউটলেট খোঁজা একটি আঞ্চলিক বিষয়।
      কে আগে পৌঁছেছে? আউটলেট নির্ধারণ করে আপনি কোথায় বসবেন। বিদ্যুৎ ভূগোলকে অনুসরণ করে।
    follow_ups:
      - আউটলেটের অবস্থান ঘরটিকে কীভাবে আকার দেয়?
      - ওয়্যারলেস পাওয়ার থাকলে জায়গাটি কেমন হবে?
      - প্লাগ এবং স্থায়িত্বের মধ্যে সম্পর্ক কী?
  - id: hi_cs_solo_table
    name: একক টেবিল
    prompt: |
      চারজনের টেবিলে একজন ব্যক্তি। খালি চেয়ারগুলো একটি বাধা। ব্যবস্থাটি লক্ষ্য করুন।
      এটা কি প্রতিরক্ষা? নাকি পছন্দ? একক টেবিল ভিড়ের বিরুদ্ধে জায়গা ধরে রাখে।
    follow_ups:
      - একক টেবিল কীভাবে উদ্দেশ্য সংকেত দেয়?
      - যদি কেউ ভাগ করে বসতে চায় তবে কী হবে?
      - একাকীত্ব এবং দৃশ্যমানতার মধ্যে সম্পর্ক কী?
  - id: hi_cs_milk_pour
    name: দুধ ঢালা
    prompt: |
      বারিস্টা এসপ্রেসোতে দুধ ঢালেন—ল্যাটে আর্ট হোক বা না হোক। ঢালাটা একটি শিল্প।
      নড়াচড়া লক্ষ্য করুন। পানীয়টি ছাড়া গ্রাহক আর কী পায়? ঢালা একটি পারফরম্যান্স।
    follow_ups:
      - ঢালা কীভাবে প্রত্যাশা তৈরি করে?
      - শিল্প ছাড়া পানীয়টি কী হবে?
      - ঢালা এবং দামের মধ্যে সম্পর্ক কী?
  - id: hi_cs_name_on_cup
    name: কাপে নাম
    prompt: |
      একটি নাম—আসল, নকল, ভুল বানান—একটি কাপের উপর। এটি লেনদেনকে ব্যক্তিগত করে তোলে।
      নামটি মুখ থেকে হাতে এবং কাউন্টারে যায়। নামের আদান-প্রদানটি কী করে?
    follow_ups:
      - নাম কীভাবে পরিচিতি তৈরি করে?
      - নাম ছাড়া অর্ডারটি কী হবে?
      - নাম এবং পরিচয়হীনতার মধ্যে সম্পর্ক কী?
  - id: hi_cs_window_seat
    name: জানালার পাশের আসন
    prompt: |
      জানালার পাশের আসনটি সেরা। আপনি রাস্তার দিকে মুখ করেন; আপনার পিঠ সুরক্ষিত থাকে।
      কে এটি নির্বাচন করে তা লক্ষ্য করুন। জানালা বাইরের বিশ্বকে ফ্রেম করে দেয় যখন আপনি ভিতরে থাকেন।
      দৃশ্যটি কী প্রদান করে?
    follow_ups:
      - জানালার পাশের আসন কীভাবে অভিজ্ঞতাকে আকার দেয়?
      - জানালা ছাড়া জায়গাটি কেমন হবে?
      - ভিতরের এবং বাইরের মধ্যে সম্পর্ক কী?
  - id: hi_cs_linger_versus_grab
    name: দীর্ঘক্ষণ থাকা বনাম দ্রুত নেওয়া
    prompt: |
      কিছু লোক তাদের কাপ নিয়ে চলে যায়। অন্যরা ঘণ্টার পর ঘণ্টা বসে থাকে। একই জায়গা উভয়কেই ধারণ করে।
      এই বিভেদ লক্ষ্য করুন। কে থাকবে তা কী নির্ধারণ করে? কফি শপ বিভিন্ন গতিকে accommodate করে।
    follow_ups:
      - দীর্ঘক্ষণ থাকা ব্যবসার উপর কীভাবে প্রভাব ফেলে?
      - যদি সবাই দ্রুত চলে যেত তবে জায়গাটি কেমন হত?
      - গতি এবং অন্তর্ভুক্তির মধ্যে সম্পর্ক কী?
  - id: hi_cs_regular_recognition
    name: নিয়মিত গ্রাহকের পরিচিতি
    prompt: |
      "আপনার নিয়মিতটা?" বারিস্টা জানেন। নিয়মিত গ্রাহক পরিচিত। আদান-প্রদানটি লক্ষ্য করুন।
      পরিচিত হলে কী পরিবর্তন হয়? আপনার নিয়মিত হল একটি শর্টকাট—এবং জায়গার উপর একটি দাবি।
    follow_ups:
      - পরিচিতি কীভাবে আনুগত্য তৈরি করে?
      - এটি ছাড়া নিয়মিত গ্রাহক কী হারাবে?
      - আপনার নিয়মিত এবং পরিচয়ের মধ্যে সম্পর্ক কী?
  - id: hi_cs_soundscape
    name: শব্দভূমি
    prompt: |
      বাষ্প, গ্রাইন্ড, বকবক, সঙ্গীত। কফি শপের একটি শব্দভূমি আছে। চোখ বন্ধ করুন। স্তরগুলো ম্যাপ করুন।
      কী ধ্রুবক? ছন্দ কী? শব্দভূমি মেজাজ তৈরি করে।
    follow_ups:
      - শব্দভূমি মনোযোগে কীভাবে প্রভাব ফেলে?
      - নীরবতায় জায়গাটি কেমন হবে?
      - শব্দ এবং উৎপাদনশীলতার মধ্যে সম্পর্ক কী?
  - id: hi_cs_shared_table
    name: ভাগ করা টেবিল
    prompt: |
      অপরিচিতরা একই লম্বা টেবিলে বসে। কেউ কথা বলে না। ভাগ করা টেবিল হল সংযোগ ছাড়া নৈকট্য।
      সীমানাগুলো লক্ষ্য করুন। কতটা কাছাকাছি বেশি কাছাকাছি? টেবিলটি একটি সূক্ষ্ম ভারসাম্য ধারণ করে।
    follow_ups:
      - ভাগ করা টেবিল একক টেবিল থেকে কীভাবে আলাদা?
      - যদি কেউ কথোপকথন শুরু করে তবে কী হবে?
      - নৈকট্য এবং গোপনীয়তার মধ্যে সম্পর্ক কী?
  - id: hi_cs_tip_jar
    name: টিপ জার
    prompt: |
      কয়েন এবং বিল জমা হয়। টিপ জার দৃশ্যমান, নিষ্ক্রিয়। কে টিপ দেয়? কে দেয় না?
      জারটি লেনদেন এবং উপহারের সীমানায় বসে। টিপের অর্থ কী?
    follow_ups:
      - টিপ জার কীভাবে আদান-প্রদানকে আকার দেয়?
      - এটি ছাড়া কাউন্টারটি কেমন হবে?
      - টিপ এবং কৃতজ্ঞতার মধ্যে সম্পর্ক কী?
  - id: hi_cs_cup_sleeve
    name: কাপ স্লিভ
    prompt: |
      স্লিভটি হাতকে তাপ থেকে রক্ষা করে। এটি ডিসপোজেবল, ব্র্যান্ডেড।
      লক্ষ্য করুন লোকেরা কীভাবে এটি দিয়ে কাপ ধরে। স্লিভটি শরীর এবং পানীয়ের মধ্যে একটি ছোট ইন্টারফেস।
    follow_ups:
      - স্লিভ কীভাবে গ্রিপ পরিবর্তন করে?
      - এটি ছাড়া অভিজ্ঞতাটি কেমন হবে?
      - স্লিভ এবং ব্র্যান্ডিংয়ের মধ্যে সম্পর্ক কী?
  - id: hi_cs_morning_rush
    name: সকালের ভিড়
