# الواجهة البشرية — المساحة العامة (Arabic)

id: human_interface_public_space
name: الواجهة البشرية — المساحة العامة
description: 50 بطاقة لتغيير نظرتك للمساحة العامة — من المقاعد والممرات إلى تصميم حركات الغرباء والأشياء كتمائم.
domain: human_interface
cards:
  - id: hi_ps_bench_occupation
    name: احتلال المقعد
    prompt: |
      مقعد محجوز — بجسد، أو حقيبة، أو وضعية. المقعد مورد شحيح. لاحظ من يجلس،
      ومن يقف، ومن يمر. المقعد يحمل معاني مختلفة لأشخاص مختلفين. ماذا يوفر؟
    follow_ups:
      - كيف يشكل المقعد المساحة؟
      - ماذا ستكون الحديقة بدون مقاعد؟
      - ما هي العلاقة بين المقعد والراحة؟
  - id: hi_ps_pathway_flow
    name: تدفق الممر
    prompt: |
      الممر يوجه الحركة. الناس يمشون — بمفردهم، في أزواج، في مجموعات. للتدفق
      اتجاه. لاحظ التصادم. من يتنازل؟ الممر هو ممر مشترك. ما هي القواعد التي
      تحكمه؟
    follow_ups:
      - كيف يشكل الممر المشي؟
      - ماذا ستكون المساحة بدون ممرات؟
      - ما هي العلاقة بين الممر والوجهة؟
  - id: hi_ps_strangers_choreography
    name: تصميم حركات الغرباء
    prompt: |
      تتحرك أجساد غير مرتبطة عبر مساحة مشتركة. تصميم الحركات غير منطوق —
      تجنب، توقف، اندماج. لاحظ الرقص. لا أحد يتحدث. تصميم الحركات هو جسد
      خالص. ماذا يتطلب؟
    follow_ups:
      - كيف يشكل تصميم الحركات المساحة؟
      - ماذا سيحدث لو توقف الجميع؟
      - ما هي العلاقة بين تصميم الحركات والكياسة؟
  - id: hi_ps_object_talisman
    name: الشيء كتميمة
    prompt: |
      كتاب على مقعد. حقيبة على كرسي. الشيء يحجز مكانًا. يقول "أنا هنا" أو "سأعود".
      الشيء تميمة. لاحظ الحجز. ماذا يحمي؟
    follow_ups:
      - كيف تشكل التميمة المساحة؟
      - ماذا ستكون المساحة بدون هذه الحجوزات؟
      - ما هي العلاقة بين الشيء والحضور؟
  - id: hi_ps_bench_armrest
    name: مسند ذراع المقعد
    prompt: |
      بعض المقاعد لها مساند أذرع. تقسم المقعد. تمنع الاستلقاء. مسند الذراع هو
      تصميم له غرض. لاحظ من يستخدمه. ماذا يستبعد مسند الذراع؟
    follow_ups:
      - كيف يشكل مسند الذراع المقعد؟
      - ماذا سيكون المقعد بدونه؟
      - ما هي العلاقة بين مسند الذراع والسيطرة؟
  - id: hi_ps_pathway_intersection
    name: تقاطع الممر
    prompt: |
      تتقاطع الممرات. تتلاقى الأجساد. التقاطع هو نقطة تصادم. لاحظ الاندماج.
      ماذا يحدث عندما تلتقي التدفقات؟ التقاطع يتطلب التفاوض. ماذا يستخرج؟
    follow_ups:
      - كيف يشكل التقاطع التدفق؟
      - ماذا ستكون المساحة بدون تقاطعات؟
      - ما هي العلاقة بين التقاطع والانتباه؟
  - id: hi_ps_eye_contact_avoid
    name: تجنب التواصل البصري
    prompt: |
      يتجنب الغرباء التواصل البصري. التجنب هو من باب اللباقة. النظر ينطوي على
      خطر التواصل. لاحظ النظرة. التجنب هو عقد. ماذا يمكّن؟ ماذا يكلف؟
    follow_ups:
      - كيف يشكل التجنب المساحة؟
      - ماذا ستكون المساحة مع المزيد من التواصل؟
      - ما هي العلاقة بين النظرة والخصوصية؟
  - id: hi_ps_bench_share
    name: مشاركة المقعد
    prompt: |
      شخصان غريبان يتشاركان مقعدًا. مسافة بينهما. المشاركة هي القرب بدون
      تواصل. لاحظ الحد. إلى أي مدى يكون القرب مفرطًا؟ المشاركة هي توازن دقيق.
    follow_ups:
      - كيف تشكل المشاركة المقعد؟
      - ماذا سيكون المقعد بشخص واحد؟
      - ما هي العلاقة بين المشاركة والتسامح؟
  - id: hi_ps_pathway_width
    name: عرض الممر
    prompt: |
      الممر عريض أو ضيق. العرض يؤثر على التدفق. يمكن لشخصين المرور أو لا.
      لاحظ العرض. ماذا يفترض عن الحشد؟ العرض هو تصميم. ماذا يمكّن؟
    follow_ups:
      - كيف يشكل العرض المشي؟
      - ماذا سيكون الممر لو كان أعرض؟
      - ما هي العلاقة بين العرض والراحة؟
  - id: hi_ps_bench_sun
    name: المقعد في الشمس
    prompt: |
      المقعد يواجه الشمس. أو الظل. الموقع مهم. لاحظ من يختار أيهما. الشمس مورد.
      ماذا توفر؟ المقعد في الشمس مطلوب.
    follow_ups:
      - كيف تشكل الشمس المقعد؟
      - ماذا ستكون المساحة بدون شمس؟
      - ما هي العلاقة بين الشمس والراحة؟
  - id: hi_ps_stranger_proximity
    name: قرب الغريب
    prompt: |
      يقف غريب قريب — في طابور، في حافلة. القرب غير شخصي ولكنه حميمي. لاحظ
      مدى التحمل. ماذا يسمح به الجسد؟ القرب عقد. ما هي شروطه؟
    follow_ups:
      - كيف يشكل القرب المساحة؟
      - ماذا ستكون المساحة مع مساحة أكبر؟
      - ما هي العلاقة بين القرب والكياسة؟
  - id: hi_ps_object_left
    name: الشيء المتروك
    prompt: |
      سترة على مقعد. حقيبة تحت شجرة. الشيء المتروك يحدد منطقة. لاحظ الحجز.
      كم من الوقت يمكن أن يستمر؟ الشيء المتروك هو اختبار. ماذا يتطلب من الآخرين؟
    follow_ups:
      - كيف يشكل الشيء المساحة؟
      - ماذا ستكون المساحة بدون مثل هذه الحجوزات؟
      - ما هي العلاقة بين الشيء والثقة؟
  - id: hi_ps_pathway_obstacle
    name: عائق الممر
    prompt: |
      شيء يسد الممر — بناء، حشد، فنان. العائق يحوّل التدفق. لاحظ الانحراف.
      ماذا يتطلب العائق؟ الممر ليس نقيًا أبدًا. ما الذي يقاطعه؟
    follow_ups:
      - كيف يشكل العائق التدفق؟
      - ماذا سيكون الممر بدون عوائق؟
      - ما هي العلاقة بين العائق والتكيف؟
  - id: hi_ps_bench_alone
    name: المقعد الفارغ لشخص واحد
    prompt: |
      شخص واحد على مقعد. الوحدة ظاهرة. المقعد يحمل العزلة. لاحظ الوضعية. ماذا
      يوفر المقعد لشخص واحد؟ المقعد لشخص واحد هو اختيار. ماذا يمكّن؟
    follow_ups:
      - كيف تشكل الوحدة المقعد؟
      - ماذا ستكون المساحة بدون مقاعد؟
      - ما هي العلاقة بين الوحدة والراحة؟
  - id: hi_ps_nod_acknowledge
    name: هز الرأس للتأكيد
    prompt: |
      هز رأس بسيط. ابتسامة سريعة. التأكيد بسيط. يقول "أراك" بدون تفاعل. لاحظ
      متى يحدث. هز الرأس هو كياسة صغيرة. ماذا تخلق؟
    follow_ups:
      - كيف يشكل هز الرأس المساحة؟
      - ماذا ستكون المساحة بدونه؟
      - ما هي العلاقة بين هز الرأس والسلامة؟
  - id: hi_ps_pathway_edge
    name: حافة الممر
    prompt: |
      للممر حواف — عشب، رصيف، حاجز. الحافة تحدد الممر. لاحظ من يبقى في الممر.
      من يعبر؟ الحافة هي حدود. ماذا تحتوي؟
    follow_ups:
      - كيف تشكل الحافة المشي؟
      - ماذا سيكون الممر بدون حواف؟
      - ما هي العلاقة بين الحافة والحرية؟
  - id: hi_ps_bench_claim
    name: حجز المقعد
    prompt: |
      تم احتلال المقعد — بالانتشار، بالوضعية، بالحقيبة. الحجز يقول "هذا ملكي".
      لاحظ الحجز. كيف يتم؟ الحجز هو أراضي. ماذا يحمي؟
    follow_ups:
      - كيف يشكل الحجز المقعد؟
      - ماذا ستكون المساحة بدون حجوزات؟
      - ما هي العلاقة بين الحجز والراحة؟
  - id: hi_ps_stranger_help
    name: مساعدة الغريب
    prompt: |
      "تحتاج مساعدة؟" يعرض غريب المساعدة. المساعدة غير متوقعة. لاحظ التبادل.
      هل تقبل أم ترفض؟ مساعدة الغريب هي هدية. ماذا تتطلب؟
    follow_ups:
      - كيف تشكل المساعدة المساحة؟
      - ماذا ستكون المساحة بدون مثل هذه العروض؟
      - ما هي العلاقة بين المساعدة والثقة؟
  - id: hi_ps_object_temporary
    name: الشيء المؤقت
    prompt: |
      كوب، جريدة، قبعة. الشيء يحدد مكانًا. إنه مؤقت. سيعود المالك. لاحظ الحجز.
      ماذا يتطلب الشيء المؤقت من الآخرين؟ الشيء هو مؤقت.
    follow_ups:
      - كيف يشكل الشيء المؤقت المساحة؟
      - ماذا ستكون المساحة بدونه؟
      - ما هي العلاقة بين المؤقت والثقة؟
  - id: hi_ps_pathway_rhythm
    name: إيقاع الممر
    prompt: |
      أقدام على الرصيف. الإيقاع فردي — سريع، بطيء، غير منتظم. الممر يحمل
      العديد من الإيقاعات. لاحظ التزامن والصدام. ماذا يكشف الإيقاع؟
    follow_ups:
      - كيف يشكل الإيقاع المشي؟
      - ماذا سيكون الممر في صمت؟
      - ما هي العلاقة بين الإيقاع والوجهة؟
  - id: hi_ps_bench_face
    name: واجهة المقعد
    prompt: |
      المقعد يواجه اتجاهًا — المنظر، الشمس، الحشد. الواجهة تشكل التجربة. لاحظ
      من يختار أي مقعد. الواجهة تصميم. ماذا تفترض؟
    follow_ups:
      - كيف تشكل الواجهة المقعد؟
      - ماذا سيكون المقعد بدون اتجاه؟
      - ما هي العلاقة بين الواجهة والمنظر؟
  - id: hi_ps_sidewalk_dance
    name: رقصة الرصيف
    prompt: |
      يقترب شخصان. الرقصة — من يتحرك؟ رقصة الرصيف عالمية. لاحظ الحركة الجانبية.
      الرقصة غير منطوقة. ماذا تتطلب؟
    follow_ups:
      - كيف تشكل الرقصة المشي؟
      - ماذا سيكون الرصيف بدونها؟
      - ما هي العلاقة بين الرقصة والكياسة؟
  - id: hi_ps_object_abandoned
    name: الشيء المهجور
    prompt: |
      قفاز على الأرض. وشاح على مقعد. الشيء مهجور. لاحظه. من تركه؟ من سيأخذه؟
      الشيء المهجور لغز صغير. ماذا يكشف؟
    follow_ups:
      - كيف يشكل الشيء المهجور المساحة؟
      - ماذا ستكون المساحة بدون مثل هذه الأشياء؟
      - ما هي العلاقة بين المهجور والفقد؟
  - id: hi_ps_pathway_surface
    name: سطح الممر
    prompt: |
      رصيف، حصى، عشب. السطح يؤثر على المشي. لاحظ الاختيار. ماذا يتطلب السطح
      من الجسد؟ السطح تصميم. ماذا يمكّن؟
    follow_ups:
      - كيف يشكل السطح المشي؟
      - ماذا سيكون الممر بسطح مختلف؟
      - ما هي العلاقة بين السطح والوصول؟
  - id: hi_ps_bench_weather
    name: المقعد والطقس
    prompt: |
      مطر، شمس، رياح. الطقس يشكل المقعد. من يجلس في المطر؟ من يبحث عن الظل؟
      المقعد مكشوف. لاحظ العلاقة بين المقعد والطقس. ماذا يفعل الطقس؟
    follow_ups:
      - كيف يشكل الطقس المقعد؟
      - ماذا سيكون المقعد مع سقف؟
      - ما هي العلاقة بين الطقس والاستخدام؟
  - id: hi_ps_stranger_glance
    name: نظرة الغريب
    prompt: |
      نظرة خاطفة. النظرة هي تقييم. آمن؟ خطر؟ النظرة تلقائية. لاحظ نظراتك.
      ماذا تفعل النظرة؟ النظرة أداة بقاء. ماذا تستخرج؟
    follow_ups:
      - كيف تشكل النظرة المساحة؟
      - ماذا ستكون المساحة بدون نظرات؟
      - ما هي العلاقة بين النظرة والسلامة؟
  - id: hi_ps_pathway_crowd
    name: حشد الممر
    prompt: |
      الممر مزدحم. الأجساد تنضغط. للحشد تدفقه الخاص. لاحظ الحركة. الحشد
      جماعة. ماذا يتطلب من الفرد؟
    follow_ups:
      - كيف يشكل الحشد الممر؟
      - ماذا سيكون الممر فارغًا؟
      - ما هي العلاقة بين الحشد والتدفق؟
  - id: hi_ps_bench_curve
    name: انحناء المقعد
    prompt: |
      بعض المقاعد منحنية. تواجه بعضها البعض أو المركز. الانحناء يشكل الجانب
      الاجتماعي. لاحظ الترتيب. ماذا يمكّن الانحناء؟ الانحناء تصميم. ماذا يريد؟
    follow_ups:
      - كيف يشكل الانحناء المقعد؟
      - ماذا سيكون المقعد لو كان مستقيمًا؟
      - ما هي العلاقة بين الانحناء والتواصل؟
  - id: hi_ps_object_traded
    name: الشيء المتبادل
    prompt: |
      تسليم باليد. شراء. هدية. الشيء ينتقل بين الغرباء. لاحظ التبادل. ماذا
      يمر إلى جانب الشيء؟ التبادل لحظة تواصل. ماذا يخلق؟
    follow_ups:
      - كيف يشكل التبادل المساحة؟
      - ماذا ستكون المساحة بدون مثل هذه التبادلات؟
      - ما هي العلاقة بين التبادل والثقة؟
  - id: hi_ps_pathway_light
    name: ضوء الممر
    prompt: |
      نهار، ليل، مصباح شارع. الضوء يشكل الممر. لاحظ الفرق. من يمشي ليلاً؟
      الضوء هو الأمان والجو. ماذا يوفر؟
    follow_ups:
      - كيف يشكل الضوء الممر؟
      - ماذا سيكون الممر في الظلام؟
      - ما هي العلاقة بين الضوء والسلامة؟
  - id: hi_ps_bench_armrest_gap
    name: فجوة مسند ذراع المقعد
    prompt: |
      مسند الذراع يقسم. شخص واحد لكل قسم. الفجوة تمنع المشاركة. لاحظ التصميم.
      ماذا تستبعد الفجوة؟ فجوة مسند الذراع هي هندسة معادية. ماذا تفترض؟
    follow_ups:
      - كيف تشكل الفجوة المقعد؟
      - ماذا سيكون المقعد بدون مساند أذرع؟
      - ما هي العلاقة بين الفجوة والاستبعاد؟
  - id: hi_ps_stranger_smile
    name: ابتسامة الغريب
    prompt: |
      ابتسامة من غريب. غير متوقعة. الابتسامة هدية. لاحظ الاستجابة. ماذا تفعل
      الابتسامة؟ الابتسامة خرق صغير للعقد. ماذا تخلق؟
    follow_ups:
      - كيف تشكل الابتسامة المساحة؟
      - ماذا ستكون المساحة مع المزيد من الابتسامات؟
      - ما هي العلاقة بين الابتسامة والتواصل؟
  - id: hi_ps_object_touch
    name: لمس الشيء
    prompt: |
      يد على سكة. قدم على درجة. اللمس يربط الجسد بالمساحة. الشيء مشترك. لاحظ
      اللمس. ماذا يفعل اللمس؟ الشيء هو نقطة اتصال. ماذا يحمل؟
    follow_ups:
      - كيف يشكل اللمس المساحة؟
      - ماذا ستكون المساحة بدون لمس؟
      - ما هي العلاقة بين اللمس والحضور؟
  - id: hi_ps_pathway_choice
    name: خيار الممر
    prompt: |
      الممر يتفرع. يمين أم يسار؟ الخيار صغير. لاحظ القرار. ما الذي يحدده؟
      خيار الممر هو لحظة وكالة. ماذا يكشف؟
    follow_ups:
      - كيف يشكل الخيار المشي؟
      - ماذا سيكون الممر بدون تفرعات؟
      - ما هي العلاقة بين الخيار والوجهة؟
  - id: hi_ps_bench_empty
    name: مقعد فارغ
    prompt: |
      المقعد فارغ. متاح. لماذا؟ لاحظ المقعد الفارغ. الموقع؟ الوقت؟ الطقس؟
      المقعد الفارغ دعوة. ماذا يعرض؟
    follow_ups:
      - كيف يشكل المقعد الفارغ المساحة؟
      - ماذا ستكون المساحة بدون مقاعد فارغة؟
      - ما هي العلاقة بين الفارغ والفرصة؟
  - id: hi_ps_stranger_queue
    name: طابور الغرباء
    prompt: |
      يتشكل صف. غرباء ينتظرون معًا. الطابور هو نظام. لاحظ الصبر. يخلق الطابور
      مجتمعًا مؤقتًا. ماذا يتطلب الطابور؟ ماذا يوفر؟
    follow_ups:
      - كيف يشكل الطابور المساحة؟
      - ماذا ستكون المساحة بدون طوابير؟
      - ما هي العلاقة بين الطابور والعدالة؟
  - id: hi_ps_object_talisman_trust
    name: ثقة التميمة
    prompt: |
      تترك حقيبتك. تثق بالمساحة. التميمة اختبار. لاحظ الثقة. ماذا تفترض؟
      ثقة التميمة مقامرة. ماذا تمكّن؟
    follow_ups:
