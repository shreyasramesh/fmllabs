# মানব ইন্টারফেস — ট্রানজিট হাব (Bengali)

id: human_interface_transit_hub
name: মানব ইন্টারফেস — ট্রানজিট হাব
description: ট্রানজিট হাবকে আপনি কীভাবে দেখেন তা পরিবর্তন করার জন্য ৫০টি কার্ড — প্ল্যাটফর্ম এবং অপেক্ষার সময় থেকে শুরু করে আগমন/প্রস্থানের প্রবাহ এবং ট্রানজিটে অপরিচিতদের কোরিওগ্রাফি পর্যন্ত।
domain: human_interface
cards:
  - id: hi_th_platform_edge
    name: প্ল্যাটফর্ম প্রান্ত
    prompt: |
      প্ল্যাটফর্মের প্রান্ত একটি দ্বার। হলুদ রেখা, ফাঁক, ট্র্যাক। লোকেরা বিভিন্ন দূরত্বে দাঁড়িয়ে থাকে। কেউ কেউ সামনে ঝুঁকে পড়ে; অন্যরা পিছিয়ে থাকে। বিতরণ পর্যবেক্ষণ করুন। প্রান্তের অর্থ কী?
    follow_ups:
      - প্রান্ত কীভাবে প্রত্যাশা তৈরি করে?
      - লাইন ছাড়া প্ল্যাটফর্ম কেমন হত?
      - প্রান্ত এবং ঝুঁকির মধ্যে সম্পর্ক কী?
  - id: hi_th_waiting_posture
    name: অপেক্ষার ভঙ্গি
    prompt: |
      অপেক্ষা করার সময় শরীরগুলি নিজেদের সাজিয়ে নেয় — এক পায়ে ভর, হাতে ফোন, পায়ের মাঝে ব্যাগ। ভঙ্গি সময়কাল নির্দেশ করে। কে ধৈর্যশীল দেখাচ্ছে? কে অধৈর্য দেখাচ্ছে? অপেক্ষার একটি শারীরিক ভাষা আছে।
    follow_ups:
      - ভঙ্গি কীভাবে প্রত্যাশা প্রকাশ করে?
      - অপেক্ষা ছাড়া প্ল্যাটফর্ম কেমন হত?
      - ভঙ্গি এবং সময়ের মধ্যে সম্পর্ক কী?
  - id: hi_th_arrival_flow
    name: আগমনের প্রবাহ
    prompt: |
      ট্রেনের দরজা খোলে। লোকেরা বেরিয়ে আসে — যারা উঠছে তাদের স্রোতের বিপরীতে। প্রবাহের একটি পদার্থবিদ্যা আছে। সংঘর্ষ, পাশ কাটানো, মিশে যাওয়া পর্যবেক্ষণ করুন। বিনিময় কোন নিয়ম দ্বারা নিয়ন্ত্রিত হয়?
    follow_ups:
      - প্রবাহ কীভাবে প্ল্যাটফর্ম তৈরি করে?
      - যদি সবাই তাড়াহুড়ো করত তবে কী হত?
      - প্রবাহ এবং দক্ষতার মধ্যে সম্পর্ক কী?
  - id: hi_th_strangers_transit
    name: ট্রানজিটে অপরিচিত
    prompt: |
      আপনি এমন লোকেদের সাথে একটি বগিতে আছেন যাদের আপনি আর কখনো দেখবেন না। সংযোগ ছাড়া নৈকট্য। কম্প্যাক্ট পর্যবেক্ষণ করুন। অপরিচিতদের একে অপরের প্রতি কী owes? ট্রানজিট গাড়ি একটি অস্থায়ী সমাজ।
    follow_ups:
      - ট্রানজিট কীভাবে অস্থায়ী সম্প্রদায় তৈরি করে?
      - কথোপকথন সহ গাড়ি কেমন হত?
      - অপরিচিত এবং ভদ্রতার মধ্যে সম্পর্ক কী?
  - id: hi_th_departure_board
    name: ছাড়ার সূচী
    prompt: |
      সময়, প্ল্যাটফর্ম, বিলম্ব — বোর্ড হলো সত্যের উৎস। চোখ সেদিকে ওঠে। বোর্ড চলাচল নির্ধারণ করে। সম্মিলিত দৃষ্টি পর্যবেক্ষণ করুন। বোর্ড ভিড়কে কী করে?
    follow_ups:
      - বোর্ড কীভাবে আচরণ তৈরি করে?
      - এটা ছাড়া হাব কেমন হত?
      - প্রদর্শন এবং বিশ্বাসের মধ্যে সম্পর্ক কী?
  - id: hi_th_escalator_stand
    name: এসকালেটর দাঁড়ানো
    prompt: |
      ডানদিকে দাঁড়ান, বামদিকে হাঁটুন — অথবা বিপরীত, শহরের উপর নির্ভর করে। এসকালেটরের নিয়ম আছে। কে সেগুলো অনুসরণ করছে তা পর্যবেক্ষণ করুন। এসকালেটর একটি চলন্ত সারি। নিয়মটি কী সক্ষম করে?
    follow_ups:
      - এসকালেটরের নিয়ম কীভাবে প্রবাহ তৈরি করে?
      - যদি সবাই দাঁড়াত তবে কী হত?
      - নিয়ম এবং দক্ষতার মধ্যে সম্পর্ক কী?
  - id: hi_th_ticket_gate
    name: টিকিট গেট
    prompt: |
      গেট কার্ড পড়ে, বিপ করে, খোলে। গেট হলো একটি চেকপয়েন্ট। এটি পরিশোধিত এবং অপরিশোধিতকে আলাদা করে। ছন্দ পর্যবেক্ষণ করুন। কে হোঁচট খায়? কে সাবলীলভাবে পার হয়? গেট একটি পরীক্ষা।
    follow_ups:
      - গেট কীভাবে যাত্রা তৈরি করে?
      - গেট ছাড়া হাব কেমন হত?
      - গেট এবং অন্তর্ভুক্তির মধ্যে সম্পর্ক কী?
  - id: hi_th_luggage_drag
    name: লাগেজ টানা
    prompt: |
      টাইলসের উপর চাকা। স্যুটকেস অনুসরণ করে। টান যাত্রীদের পথ চিহ্নিত করে। লাগেজ শরীরকে প্রসারিত করে। বোঝা পর্যবেক্ষণ করুন। লাগেজ ভ্রমণ সম্পর্কে কী বলে?
    follow_ups:
      - লাগেজ কীভাবে চলাচল তৈরি করে?
      - ব্যাগ ছাড়া হাব কেমন হত?
      - বোঝা এবং গন্তব্যের মধ্যে সম্পর্ক কী?
  - id: hi_th_bench_occupation
    name: বেঞ্চ দখল
    prompt: |
      বেঞ্চগুলি প্ল্যাটফর্মের ধারে সারি করে আছে। কেউ বসে; কেউ পাশে দাঁড়িয়ে। বেঞ্চ একটি দুষ্প্রাপ্য সম্পদ। কে এটি দখল করে তা পর্যবেক্ষণ করুন। তারা কতক্ষণ থাকে? বেঞ্চ একটি ছোট অঞ্চল।
    follow_ups:
      - বেঞ্চ কীভাবে অপেক্ষা তৈরি করে?
      - বেঞ্চ ছাড়া প্ল্যাটফর্ম কেমন হত?
      - আসন এবং সময়কালের মধ্যে সম্পর্ক কী?
  - id: hi_th_announcement_voice
    name: ঘোষণার কণ্ঠস্বর
    prompt: |
      "পরবর্তী ট্রেন..." কণ্ঠস্বর স্বয়ংক্রিয় বা মানব। এটি আওয়াজের মধ্যে দিয়ে কাটে। ঘোষণাটি একটি ভাগ করা জ্ঞান তৈরি করে। কে শোনে তা পর্যবেক্ষণ করুন। কে ইতিমধ্যেই তাদের ফোন পরীক্ষা করেছে?
    follow_ups:
      - ঘোষণা কীভাবে ভিড় তৈরি করে?
      - এটি ছাড়া হাব কেমন হত?
      - কণ্ঠস্বর এবং কর্তৃত্বের মধ্যে সম্পর্ক কী?
  - id: hi_th_door_positioning
    name: দরজার অবস্থান
    prompt: |
      নিয়মিত যাত্রীরা জানে দরজা কোথায় খুলবে। তারা নিজেদের অবস্থান করে। নতুনরা অনুমান করে। অবস্থানটি কৌশল। গুচ্ছবদ্ধতা পর্যবেক্ষণ করুন। অবস্থান কী নির্ধারণ করে?
    follow_ups:
      - অবস্থান কীভাবে ওঠা তৈরি করে?
      - দরজাগুলো এলোমেলো হলে প্ল্যাটফর্ম কেমন হত?
      - অবস্থান এবং সুবিধার মধ্যে সম্পর্ক কী?
  - id: hi_th_handrail_grip
    name: হ্যান্ড্রেল ধরা
    prompt: |
      গাড়ির ভিতরে, হাত রেল খুঁজে পায়। ধরাটি নিরাপত্তা। কে ধরেছে, কার প্রয়োজন নেই তা পর্যবেক্ষণ করুন। হ্যান্ড্রেল একটি ভাগ করা বস্তু। ধরাটি কী প্রকাশ করে?
    follow_ups:
      - হ্যান্ড্রেল কীভাবে স্থিরতা তৈরি করে?
      - এটি ছাড়া গাড়ি কেমন হত?
      - ধরা এবং বিশ্বাসের মধ্যে সম্পর্ক কী?
  - id: hi_th_window_reflection
    name: জানালার প্রতিচ্ছবি
    prompt: |
      জানালা টানেল, প্ল্যাটফর্ম এবং আপনার নিজের মুখ দেখায়। প্রতিচ্ছবি অনিবার্য। লোকেরা নিজেদের দিকে তাকায় বা এটি এড়িয়ে যায়। প্রতিচ্ছবি এবং দৃষ্টির মধ্যে সম্পর্ক পর্যবেক্ষণ করুন।
    follow_ups:
      - প্রতিচ্ছবি কীভাবে আত্ম-সচেতনতা তৈরি করে?
      - জানালা ছাড়া রাইড কেমন হত?
      - প্রতিচ্ছবি এবং গোপনীয়তার মধ্যে সম্পর্ক কী?
  - id: hi_th_seat_offer
    name: আসন প্রস্তাব
    prompt: |
      কেউ একজন বয়স্ক, শিশু সহ পিতামাতাকে একটি আসন প্রস্তাব করে। প্রস্তাবটি একটি ছোট নৈতিক কাজ। কখন এটি ঘটে তা পর্যবেক্ষণ করুন। কে প্রস্তাব করে? কে গ্রহণ করে? আসন একটি উপহার।
    follow_ups:
      - প্রস্তাবটি কীভাবে গাড়ি তৈরি করে?
      - এই ধরনের প্রস্তাব ছাড়া রাইড কেমন হত?
      - প্রস্তাব এবং যত্নের মধ্যে সম্পর্ক কী?
  - id: hi_th_delay_sigh
    name: বিলম্বের দীর্ঘশ্বাস
    prompt: |
      "বিলম্বিত।" সম্মিলিত দীর্ঘশ্বাস। বিলম্ব একটি ভাগ করা নিয়তি। অপরিচিতরা একে অপরের দিকে তাকায়। বিলম্ব এক মুহূর্তের সংহতি তৈরি করে। পরিবর্তন পর্যবেক্ষণ করুন। বিলম্ব ভিড়কে কী করে?
    follow_ups:
      - বিলম্ব কীভাবে অপেক্ষা তৈরি করে?
      - বিলম্ব ছাড়া হাব কেমন হত?
      - বিলম্ব এবং হতাশার মধ্যে সম্পর্ক কী?
  - id: hi_th_backpack_turn
    name: ব্যাকপ্যাক ঘোরানো
    prompt: |
      একটি ভিড়যুক্ত গাড়িতে, কেউ তাদের ব্যাকপ্যাক সামনে দিকে ঘোরায়। ঘোরানোটি বিবেচনা। এটি স্থান তৈরি করে। কে এটি করে তা পর্যবেক্ষণ করুন। ব্যাকপ্যাক ঘোরানো একটি ছোট সামাজিক চুক্তি।
    follow_ups:
      - ঘোরানো কীভাবে নৈকট্য তৈরি করে?
      - এটি ছাড়া গাড়ি কেমন হত?
      - ঘোরানো এবং সচেতনতার মধ্যে সম্পর্ক কী?
  - id: hi_th_exit_anticipation
    name: প্রস্থান প্রত্যাশা
    prompt: |
      থামার কাছাকাছি আসার সাথে সাথে, লোকেরা দরজার কাছে জড়ো হয়। প্রত্যাশা দৃশ্যমান। শরীর সরে যায়। দরজা খুলবে। প্রস্তুতি পর্যবেক্ষণ করুন। প্রত্যাশা কী প্রয়োজন?
    follow_ups:
      - প্রত্যাশা কীভাবে প্রস্থান তৈরি করে?
      - প্রস্তুতি ছাড়া স্টপ কেমন হত?
      - প্রত্যাশা এবং প্রবাহের মধ্যে সম্পর্ক কী?
  - id: hi_th_transfer_corridor
    name: স্থানান্তর করিডোর
    prompt: |
      করিডোর লাইনগুলি সংযোগ করে। লোকেরা উদ্দেশ্যমূলকভাবে হাঁটে। স্থানান্তর একটি পরিবর্তন — সিস্টেমের মধ্যে, অপেক্ষার মধ্যে। গতি পর্যবেক্ষণ করুন। করিডোরের নিজস্ব ছন্দ আছে।
