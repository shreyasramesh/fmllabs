# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Spanish)

domains:
  art:
    name: Maneras de Ver el Arte
    description: |
      Tarjetas para cambiar tu perspectiva al ver arte. Cada una ofrece una lente
      diferente —desde la luz y la sombra hasta presentaciones y emoción— para
      profundizar cómo ves e interactúas con las obras de arte.
  urban_jungle:
    name: Selva Urbana
    description: |
      En lugar de simplemente caminar por una ciudad, la miras como un organismo
      vivo. Las tarjetas se centran en las cicatrices de los edificios antiguos,
      la coreografía del tráfico y las vidas secretas de los callejones.
  culinary_lab:
    name: Laboratorio Culinario
    description: |
      Pasando de lo sabroso a lo transformador. Explora la química de un bocado,
      la historia de un ingrediente y la banda sonora de un restaurante.
  natural_microcosm:
    name: Microcosmos Natural
    description: |
      Perfecto para un parque o un patio trasero. Esta lente se centra en la
      ingeniería invisible de una hoja, la vida a cámara lenta de una roca o los
      dramas territoriales de los insectos.
  human_interface:
    name: La Interfaz Humana
    description: |
      Los espacios cotidianos donde se encuentran los humanos — cafeterías,
      centros de transporte, lugares de trabajo, comercios, parques públicos.
      Las tarjetas se centran en la coreografía de las colas, las reclamaciones
      territoriales, los guiones invisibles y la antropología del espacio
      compartido.
  california_superbloom:
    name: Superfloración de California
    description: |
      La efímera explosión de flores silvestres después de la lluvia de invierno.
      Las tarjetas se centran en el color, la escala, los polinizadores, la
      geología, el clima y el efímero espectáculo de la floración.
decks:
  - id: ways_of_looking_at_art
    name: Maneras de Ver el Arte
    path: perspective-decks/ways-of-looking-at-art.yaml
    description: |
      50 tarjetas para cambiar tu perspectiva al ver arte. Cada tarjeta ofrece
      una lente diferente —desde la luz y la sombra hasta presentaciones y
      emoción— para profundizar cómo ves e interactúas con las obras de arte.
    domain: art
  - id: ways_of_looking_at_california_superbloom
    name: Maneras de Ver la Superfloración de California
    path: perspective-decks/ways-of-looking-at-california-superbloom.yaml
