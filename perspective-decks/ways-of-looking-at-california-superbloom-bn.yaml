# ক্যালিফোর্নিয়া সুপারব্লুম দেখার উপায় (Bengali)

id: ways_of_looking_at_california_superbloom
name: ক্যালিফোর্নিয়া সুপারব্লুম দেখার উপায়
description: |
  ক্যালিফোর্নিয়া সুপারব্লুমের অভিজ্ঞতা লাভের সময় আপনার দৃষ্টিভঙ্গি পরিবর্তন করার জন্য কার্ড।
  প্রতিটি কার্ড শীতের বৃষ্টির পর বন্য ফুল, পাহাড়ের ঢাল এবং ক্ষণস্থায়ী রঙের বিস্ফোরণকে
  আপনি কীভাবে দেখেন তা গভীর করার জন্য একটি ভিন্ন লেন্স সরবরাহ করে।
domain: california_superbloom
cards:
  - id: the_rain_that_made_it
    name: যে বৃষ্টি এটি ঘটিয়েছে
    prompt: |
      ফুলের আগে বৃষ্টি ছিল। সেই ঝড়গুলোর কল্পনা করুন যা মাটি পূর্ণ করেছিল,
      বীজগুলো মাটির নিচে অপেক্ষা করছিল। এই ফুল ফোটার জন্য কী কী শর্ত পূরণ করতে হয়েছিল?
      সুপারব্লুমকে তার উৎপত্তির দিকে ফিরিয়ে নিয়ে যান।
    follow_ups:
      - বেশি বা কম বৃষ্টি হলে কী ভিন্ন হত?
      - একটি পাহাড়ের ঢালের জন্য কত বছরের সুপ্তাবস্থা থাকতে পারে?
      - এই মুহূর্তটি কখনোই নিশ্চিত ছিল না, এর অর্থ কী?
  - id: one_species_at_a_time
    name: একবারে একটি প্রজাতি
    prompt: |
      একটি একক ফুলের প্রজাতি বেছে নিন এবং সেটিকে অনুসরণ করুন। কমলা পপি,
      বেগুনি লুপিন, হলুদ গোল্ডফিল্ড—এই মুহূর্তে অন্য সব কিছু উপেক্ষা করুন।
      একটির উপর মনোযোগ দিলে আপনি কী দেখেন তা কীভাবে পরিবর্তিত হয়?
    follow_ups:
      - এই প্রজাতি কোথায় প্রভাবশালী—এবং কোথায় এটি ছেড়ে দেয়?
      - শুধুমাত্র এটি ফুটলে পাহাড়ের ঢাল কেমন দেখাত?
      - এটি অন্যদের মধ্যে কীভাবে নিজের স্থান ধরে রাখে?
  - id: pollinators_view
    name: পরাগায়নকারীদের দৃষ্টি
    prompt: |
      আপনি একটি মৌমাছি, একটি প্রজাপতি বা একটি হামিংবার্ড হিসাবে কল্পনা করুন।
      কী আপনাকে আকর্ষণ করবে? আপনি প্রথমে কোন ফুলগুলি পরিদর্শন করবেন?
      পাপড়ির কয়েক ইঞ্চি উপর থেকে দৃশ্যটি কেমন দেখায়?
    follow_ups:
      - আপনার পথ নির্দেশ করার জন্য কোন নিদর্শনগুলি কাজ করবে?
      - আপনি কোন ফুলগুলি এড়িয়ে যাবেন—এবং কেন?
      - স্কেল কীভাবে অভিজ্ঞতা পরিবর্তন করে?
  - id: ground_level
    name: মাটির স্তর
    prompt: |
      নিচু হন। পেটে শুয়ে পড়ুন বা হাঁটু গেড়ে বসুন। মাটির দৃষ্টিকোণ থেকে
      সুপারব্লুম দেখুন—কাণ্ড উঠছে, পাপড়ি আপনার উপর বাঁকানো, আকাশ উপরে
      একটি দূরবর্তী রেখা।
    follow_ups:
      - দাঁড়িয়ে থাকার উচ্চতা থেকে আপনি কী মিস করেছেন?
      - আপনার নীচের মাটি কেমন অনুভব করছেন?
      - একটি বিটল এখান থেকে কী দেখবে?
  - id: time_lapse
    name: টাইম-ল্যাপস
    prompt: |
      সুপারব্লুম একটি দীর্ঘ গল্পের একটি মুহূর্ত। পাহাড়ের ঢালকে দ্রুতগতিতে
      কল্পনা করুন: সবুজ অঙ্কুর, প্রথম কুঁড়ি, সর্বোচ্চ রঙ, তারপর বিবর্ণ হওয়া।
      এই দর্শনীয়তা কতক্ষণ স্থায়ী হয়? আগে এবং পরে কী আসে?
    follow_ups:
      - যদি একবারই যেতে পারতেন, তবে কখন যেতে বেছে নিতেন?
      - আপনি আসার আগেই কী চলে গেছে?
      - রঙ বিবর্ণ হয়ে যাওয়ার পর কী অবশিষ্ট থাকবে?
  - id: the_chemistry_of_color
    name: রঙের রসায়ন
    prompt: |
      পিগমেন্টের উপর মনোযোগ দিন। কমলা, বেগুনি, হলুদ, নীল—প্রতিটি রঙের
      কারণ কী? তারা কীভাবে একে অপরের সাথে মিথস্ক্রিয়া করে? কোথায় রঙগুলি
      সংঘর্ষ করে, এবং কোথায় তারা সামঞ্জস্যপূর্ণ হয়? পাহাড়ের ঢালকে একটি
      প্যালেট হিসাবে ব্যবহার করুন।
    follow_ups:
      - আপনি কোন রঙ যোগ করবেন—বা বিয়োগ করবেন?
      - দিনের বেলায় আলো কীভাবে রঙ পরিবর্তন করে?
      - এটি সাদা-কালোতে কেমন দেখাত?
  - id: negative_space
    name: নেতিবাচক স্থান
    prompt: |
      ফুলের বাইরে কী আছে তা দেখুন। আকাশ, মাটির খালি অংশ, ফুলের মধ্যে
      ফাঁকা স্থান। এই খালি জায়গাগুলি আপনি যা দেখেন তা কীভাবে আকার দেয়?
      যা নেই তার তাৎপর্য অনুভব করুন।
    follow_ups:
      - শূন্যতা কোথায় কেন্দ্রীভূত হয়?
      - কী সেই ফাঁকা জায়গাগুলি পূরণ করবে—এবং করা উচিত কি?
      - নেতিবাচক স্থান কীভাবে রচনাটিকে একসাথে ধরে রাখে?
  - id: the_path_through
    name: পথ দিয়ে
    prompt: |
      পথগুলি লক্ষ্য করুন—মানুষের, পশুর, বা বাতাসের। মানুষ কোথায় হাঁটে?
      প্রকৃতি কোথায় পথ চলাকে প্রতিরোধ করে? ফুলের মধ্যে দিয়ে একটি পথ
      অনুসরণ করুন এবং জিজ্ঞাসা করুন এটি অনুসরণ করতে কী মূল্য দিতে হবে।
    follow_ups:
      - সেখানে না হেঁটে আপনি কী রক্ষা করবেন?
      - পথ আপনাকে কোথায় নিয়ে যেতে চায়?
      - ট্রেইলে থাকলে আপনি কী মিস করবেন?
  - id: geology_beneath
    name: নিচের ভূতত্ত্ব
    prompt: |
      ফুলগুলি লক্ষ লক্ষ বছরের উপর বিশ্রাম নিচ্ছে। মাটির নিচে কোন পাথর আছে?
      এই পাহাড়গুলি কী তৈরি করেছে? সুপারব্লুমকে আপনার পায়ের নীচের
      গভীর সময়ের সাথে সংযুক্ত করুন।
    follow_ups:
      - ভূতত্ত্ব এখানে কী জন্মায় তা কীভাবে প্রভাবিত করে?
      - পাহাড় গঠনের আগে এই জায়গাটি কেমন দেখাত?
      - ফুল চলে যাওয়ার পর কী অবশিষ্ট থাকবে?
  - id: scent_and_sound
    name: গন্ধ এবং শব্দ
    prompt: |
      চোখ বন্ধ করুন। কী গন্ধ পাচ্ছেন? পরাগ, ধুলো, সেজ, ভেজা মাটি?
      কী শুনছেন? মৌমাছি, বাতাস, পায়ের শব্দ, নীরবতা? কিছুক্ষণের জন্য
      অ-দৃশ্য ইন্দ্রিয়গুলিকে নেতৃত্ব দিন।
    follow_ups:
      - অভিজ্ঞতাটি ধরার জন্য আপনি কোন শব্দ যোগ করবেন?
      - আপনি সরে যাওয়ার সাথে সাথে গন্ধ কীভাবে পরিবর্তিত হয়?
      - শুধু দেখলে আপনি কী মিস করবেন?
  - id: light_and_shadow
    name: আলো এবং ছায়া
    prompt: |
      সূর্যরশ্মি কীভাবে পাহাড়ের ঢালে চলাচল করে তা দেখুন। সকাল, দুপুর, সন্ধ্যা—
      সূর্যের কোণ কীভাবে ফুল পরিবর্তন করে? কোথায় ছায়া পড়ে?
      কী প্রকাশিত হয় এবং কী লুকানো থাকে?
    follow_ups:
      - কখন আলো সবচেয়ে প্রাণবন্ত মনে হয়?
      - দুপুরে আপনি যা মিস করবেন তা ভোরে কী দেখতে পাবেন?
      - ছায়াগুলি কীভাবে ল্যান্ডস্কেপ তৈরি করে?
  - id: seed_to_flower
    name: বীজ থেকে ফুল
    prompt: |
      একটি একক গাছকে বীজ থেকে ফুল পর্যন্ত অনুসরণ করুন। এটি এখানে কীভাবে এল?
      বাতাস, প্রাণী, জল? এটি কতক্ষণ অপেক্ষা করেছিল? পাপড়ি পড়ে যাওয়ার পর
      এটি কী হবে? এর জীবনচক্র ধরে একটি অনুসরণ করুন।
    follow_ups:
      - বীজ মাটির নিচে কী দেখেছে?
      - গাছটি কী পিছনে ছেড়ে যাবে?
      - এই পাহাড়ের ঢালে কত প্রজন্মের প্রতিনিধিত্ব আছে?
  - id: micro_vs_macro
    name: মাইক্রো বনাম ম্যাক্রো
    prompt: |
      একটি একক পাপড়ি, একটি শিশিরবিন্দু, একটি পরাগের দানাতে জুম করুন।
      তারপর পুরো পাহাড়ের ঢাল, উপত্যকা, রাজ্যের দিকে পিছিয়ে যান।
      স্কেল সুপারব্লুমের অর্থকে কীভাবে পরিবর্তন করে?
    follow_ups:
      - কোন স্কেলে কী অদৃশ্য এবং অন্যটিতে স্পষ্ট?
      - আপনার মনোযোগ স্বাভাবিকভাবে কোথায় বিশ্রাম নেয়?
      - ম্যাক্রো ভিউ কীভাবে মাইক্রোকে পরিবর্তন করে—এবং এর বিপরীতে?
  - id: weathers_hand
    name: আবহাওয়ার হাত
    prompt: |
      সুপারব্লুম হল আবহাওয়ার সহযোগিতা। বৃষ্টি, রোদ, বাতাস, তাপমাত্রা—
      প্রত্যেকের একটি ভূমিকা আছে। আবহাওয়াকে একজন সহ-স্রষ্টা হিসাবে কল্পনা করুন।
      এটি কী সিদ্ধান্ত নিয়েছে? এটি কী ধরে রেখেছে?
    follow_ups:
      - একটি ভিন্ন শীত কী তৈরি করত?
      - আজকের আবহাওয়া আপনার অভিজ্ঞতাকে কীভাবে আকার দেয়?
      - ফুল যদি বলতে পারত, তবে আবহাওয়া সম্পর্কে কী বলত?
  - id: human_witness
    name: মানব সাক্ষী
    prompt: |
      আপনিই প্রথম এটি দেখেননি। আর কে এখানে দাঁড়িয়েছে? পশুপালক, আদিবাসী,
      ফটোগ্রাফার, ভ্রমণকারী। আপনার উপস্থিতি কীভাবে স্থানটিকে পরিবর্তন করে?
      সাক্ষী হওয়ার অর্থ কী?
    follow_ups:
      - আপনি যা দেখছেন না, তারা কী দেখত?
      - আপনি কী সঙ্গে নিয়ে যাবেন?
      - মালিকানা বা নেওয়ার চেয়ে সাক্ষী হওয়া কীভাবে ভিন্ন?
  - id: the_next_year
    name: আগামী বছর
    prompt: |
      এই ফুল ফোটা ঠিক একইভাবে পুনরাবৃত্তি হবে না। আগামী বছর খরা,
      বা আগুন, বা বিভিন্ন প্রজাতির মিশ্রণ হতে পারে। এক বছর পর ফিরে আসার
      কল্পনা করুন। আপনি কী খুঁজে পেতে আশা করবেন? কী হারাতে প্রস্তুত থাকবেন?
    follow_ups:
