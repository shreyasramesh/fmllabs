# yaml-language-server: $schema=../schema/perspective-deck-index-schema.json
# Perspective Decks Index (Hindi)

domains:
  art:
    name: कला
    description: |
      कला को देखते समय अपने दृष्टिकोण को बदलने के लिए कार्ड। प्रत्येक एक अलग
      लेंस प्रदान करता है—प्रकाश और छाया से लेकर परिचय और भावना तक—आप कलाकृतियों को
      कैसे देखते हैं और उनसे जुड़ते हैं, इसे गहरा करने के लिए।
  urban_jungle:
    name: शहरी जंगल
    description: |
      शहर में सिर्फ चलने के बजाय, आप इसे एक जीवित जीव के रूप में देखते हैं।
      कार्ड पुराने भवनों के निशान, यातायात की कोरियोग्राफी,
      और गली-कूचों के गुप्त जीवन पर केंद्रित होते हैं।
  culinary_lab:
    name: पाकशाला
    description: |
      स्वादिष्ट से परिवर्तनकारी की ओर बढ़ना। एक बाइट की रसायन शास्त्र,
      एक सामग्री का इतिहास, और एक रेस्तरां का साउंडट्रैक।
  natural_microcosm:
    name: प्राकृतिक सूक्ष्म जगत
    description: |
      एक पार्क या पिछवाड़े के लिए एकदम सही। यह लेंस एक पत्ती की अदृश्य
      इंजीनियरिंग, एक चट्टान के धीमी गति वाले जीवन, या कीड़ों के क्षेत्रीय
      नाटकीय दृश्यों पर केंद्रित है।
  human_interface:
    name: मानव इंटरफ़ेस
    description: |
      रोजमर्रा के स्थान जहाँ मनुष्य मिलते हैं—कॉफी की दुकानें, ट्रांज़िट हब,
      कार्यस्थल, खुदरा, सार्वजनिक पार्क। कार्ड कतार कोरियोग्राफी,
      क्षेत्रीय दावे, अदृश्य स्क्रिप्ट, और साझा स्थान के मानव विज्ञान पर केंद्रित होते हैं।
  california_superbloom:
    name: कैलिफ़ोर्निया सुपरब्लूम
    description: |
      सर्दियों की बारिश के बाद जंगली फूलों का क्षणिक विस्फोट। कार्ड रंग,
      पैमाना, परागणक, भूविज्ञान, मौसम, और खिलने के क्षणभंगुर तमाशे पर केंद्रित होते हैं।
