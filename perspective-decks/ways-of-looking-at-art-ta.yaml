# yaml-language-server: $schema=../schema/perspective-deck-schema.json
# கலைகளைப் பார்க்கும் வழிகள் (Tamil)

id: ways_of_looking_at_art
name: கலைகளைப் பார்க்கும் வழிகள்
description: |
  கலைப் படைப்புகளைப் பார்க்கும்போது உங்கள் கண்ணோட்டத்தை மாற்றும் அட்டைகள். ஒவ்வொன்றும்
  நீங்கள் கலைப் படைப்புகளைப் பார்க்கும் மற்றும் ஈடுபடும் விதத்தை ஆழமாக்க ஒரு வித்தியாசமான
  லென்ஸை வழங்குகிறது.
domain: art
cards:
  - id: souvenir
    name: நினைவுப் பரிசு
    prompt: |
      கலைப் படைப்பில் இருந்து எதையாவது தேர்ந்தெடுத்து, நீங்கள் அடுத்துப் பார்க்கும்
      படைப்பில் மறைத்து விடுங்கள். புதிய கலவையில் அதை எப்படிப் பொருத்துவீர்கள்?
    follow_ups:
      - நீங்கள் எதைக் கொண்டு செல்லத் தேர்ந்தெடுப்பீர்கள்?
      - புதிய சூழலில் அது என்ன பெறுவதற்கும் இழப்பதற்கும் வாய்ப்புள்ளது?
      - புதிய படைப்பில் அது எங்கே பொருந்தும்—அல்லது பொருந்த மறுக்கும்?
  - id: throw_a_party
    name: விருந்து நடத்து
    prompt: |
      அறையில் உள்ள அனைத்து கலைஞர்களையும் அழையுங்கள். அவர்கள் என்ன அணிந்திருப்பார்கள்?
      அவர்கள் எதைப் பற்றி யோசிப்பார்கள்?
    follow_ups:
      - யார் யாரை நோக்கி ஈர்க்கப்படுவார்கள்?
      - அவர்கள் எதைப் பற்றி வாதிடுவார்கள்?
      - ஒருவருக்கொருவர் படைப்புகளில் அவர்களை எது ஆச்சரியப்படுத்தும்?
  - id: time_out
    name: நேர இடைவெளி
    prompt: |
      வெளியே செல்லுங்கள். ஒளி, ஒலிகள், மற்றும் உணர்வுகளில் கவனம் செலுத்துங்கள்.
      உங்கள் சுற்றுப்புறத்துடன் இணக்கமாக இருங்கள். கலைப் படைப்புகளைப் பார்க்கும் அனுபவம்,
      கலைப் படைப்புகளைப் போலவே, அவற்றுக்கிடையேயான இடைவெளிகளைப் பற்றியதும் ஆகும்.
    follow_ups:
      - கலையில் கவனம் செலுத்துவதை நிறுத்தும்போது நீங்கள் என்ன கவனிக்கிறீர்கள்?
      - அந்த அறை நீங்கள் பார்ப்பதை எப்படி வடிவமைக்கிறது?
      - அவசரமாகப் பார்த்தால் நீங்கள் எதை இழப்பீர்கள்?
  - id: plan_a_trip
    name: பயணம் திட்டமிடு
    prompt: |
      இன்று நீங்கள் பார்ப்பது ஒரு பெரிய பயணத்தின் முதல் படியாக இருக்கலாம். நீங்கள்
      கேலரி அல்லது இடத்திலிருந்து வெளியேறும்போது, அடுத்ததாக எந்தக் கலைப் படைப்பைப்
      பார்க்க விரும்புகிறீர்கள் என்பதைத் தீர்மானித்து, அதைச் சுற்றி ஒரு முழுப் பயணத்தைத்
      திட்டமிடுங்கள்.
    follow_ups:
      - அந்தப் பயணம் உங்களை எங்கே அழைத்துச் செல்லும்?
      - வழியில் நீங்கள் எதைப் பார்க்க வேண்டும்?
      - ஏன் இந்தப் படைப்பு—பயணம் செய்வதற்கு இது ஏன் தகுதியானது?
  - id: in_black_and_white
    name: கருப்பு வெள்ளையில்
    prompt: |
      ஒளி மற்றும் இருளின் விளையாட்டில் கவனம் செலுத்துங்கள்—நீங்கள் கருப்பு வெள்ளையில்
      புகைப்படம் எடுப்பதன் மூலமும் இதைப் பார்க்கலாம். எங்கே தொனிகள் மிகவும் இருட்டாக
      உள்ளன? இது ஆழத்தை எப்படி சுட்டிக்காட்டுகிறது அல்லது சுட்டிக்காட்டவில்லை?
      கலவையைப் புரிந்துகொள்ள இது எவ்வாறு உதவுகிறது?
    follow_ups:
      - வண்ணத்தை அகற்றும் போது என்ன மறைந்து போகிறது?
      - எது தெளிவாகிறது?
      - கிரேஸ்கேல் பதிப்பில் உங்கள் கண் முதலில் எங்கே செல்கிறது?
  - id: give_it_a_voice
    name: குரல் கொடு
    prompt: |
      இந்தக் கலைப் படைப்பு என்ன ஒலிகளை எழுப்பும்? வண்ணங்கள், வடிவங்கள் மற்றும்
      உருவங்களை நீங்கள் எப்படி கேட்பீர்கள்?
    follow_ups:
      - அது சத்தமாக இருக்குமா அல்லது அமைதியாக இருக்குமா? கூர்மையாக அல்லது மெதுவாக?
      - எந்த இசைக்கருவி அல்லது அமைப்பு அதைப் பிடிக்கும்?
      - இந்தப் படைப்பில் அமைதி எப்படி ஒலிக்கும்?
  - id: find_the_middle_ground
    name: நடுநிலையைக் கண்டுபிடி
    prompt: |
      கலைப் படைப்பு உங்களிடமிருந்து எவ்வளவு தூரத்தில் உள்ளது? உங்கள் அளவுக்கு
      ஒப்பீடாக அது எவ்வளவு பெரியது? எவ்வளவு கனமானது? அது எவ்வளவு இடத்தை எடுத்துக்கொள்கிறது?
      அதை ஒரு வீட்டில் வைக்க முடியுமா?
    follow_ups:
      - நீங்கள் அதை உங்கள் கைகளில் வைத்திருக்க முடிந்தால் என்ன மாறும்?
      - அது ஒரு அறையின் அளவு இருந்தால் என்ன?
      - அளவு உங்களுக்கு அதனுடன் உள்ள உறவை எப்படி வடிவமைக்கிறது?
  - id: from_the_edges
    name: விளிம்புகளிலிருந்து
    prompt: |
      கலைப் படைப்பு எங்கே முடிகிறது, "நிஜ உலகம்" எங்கே தொடங்குகிறது? கலைப்
      படைப்பின் விளிம்புகளை உங்களுக்காக மறுவரையறை செய்ய உங்கள் கைகளை வியூஃபைண்டராகப்
      பயன்படுத்திப் பார்க்க முடியுமா? ஒரு குறிப்பிட்ட விளிம்பு உள்ளதா?
    follow_ups:
      - சட்டத்தை மாற்றும்போது என்ன நடக்கும்?
      - எது சேர்க்கப்படுகிறது அல்லது விலக்கப்படுகிறது?
      - படைப்பு அதன் எல்லைகளைத் தாண்டி எங்கே பரவ விரும்புகிறது?
  - id: transmogrify_it
    name: உருமாற்று
    prompt: |
      கலைப் படைப்பை வேறு வகைக்கு மாற்ற முடிந்தால் என்ன? ஒரு புகைப்படத்தை ஆக்ஷன்
      பெயிண்டிங்காகவோ அல்லது ஒரு நிறுவலை நிலப்பரப்பாகவோ மாற்றினால்? அதை எப்படிச்
      செய்வீர்கள்? மொழிபெயர்ப்பிலும் அது தன் தன்மையைத் தக்கவைத்துக் கொள்ளுமா?
    follow_ups:
      - படைப்புக்கு எது அவசியம்—மாற்றத்தின் மூலம் எது தப்பிக்க வேண்டும்?
      - மொழிபெயர்ப்பில் எது பெறப்படும் அல்லது இழக்கப்படும்?
      - எந்த வகை அதைப் பற்றி புதியதைக் வெளிப்படுத்தும்?
  - id: the_hand_of_the_artist
    name: கலைஞரின் கை
    prompt: |
      கலைஞரின் தூரிகை வாதங்கள், உளி குறிகள், கைரேகைகள், முடிகள் கூட ஆதாரங்களைத்
      தேடுங்கள். அந்த வாதங்களை நீங்களே செய்வதாக கற்பனை செய்து பாருங்கள்—என்ன நிலையில்
      நீங்கள் இருக்க வேண்டும்? என்ன கருவிகளைப் பயன்படுத்துவீர்கள்?
    follow_ups:
      - அந்த அடையாளம் அதை உருவாக்கியவரின் உடலைப் பற்றி என்ன வெளிப்படுத்துகிறது?
      - எங்கே கைவசம் வேகமாக அல்லது மெதுவாக, உறுதியாக அல்லது தயக்கமாக உள்ளது?
      - அந்த அடையாளத்தை உருவாக்குவது எப்படி இருக்கும்?
  - id: tell_the_story
    name: கதையைச் சொல்
    prompt: |
      கலை வரலாறு கதைகளால் நிறைந்தது, இன்றும் கலை, இலக்கியம், மற்றும் திரைப்படம்
      ஆகியவற்றுக்கு இடையே ஒரு அற்புதமான உரையாடல் உள்ளது. கலைப் படைப்பில் ஒரு கதை
      உள்ளதா? அதை நீங்கள் எப்படிச் சொல்கிறீர்கள்?
    follow_ups:
      - இந்த நிகழ்வுக்கு முன்போ அல்லது பின்போ என்ன நடக்கும்?
      - கதைசொல்லி யார்? யாருடைய குரல் இல்லை?
      - அது ஒரு திரைப்படம், ஒரு நாவல், அல்லது ஒரு கவிதையாக வேலை செய்யுமா?
  - id: shadowboxing
    name: நிழல் குத்துச்சண்டை
    prompt: |
      நகருங்கள். மிக நெருக்கமாகச் செல்லுங்கள். முடிந்தவரை தூரமாகச் செல்லுங்கள்.
      பக்கங்களை மாற்றுங்கள். உயரமாகச் செல்லுங்கள். தாழ்வாகச் செல்லுங்கள். வெவ்வேறு
      கோணங்களை முயற்சிக்கவும். ஒரே இடத்தில் நீண்ட நேரம் நிற்க வேண்டாம்.
      நீங்கள் சுற்றி நகரும்போது கலைப் படைப்பு நிகழ்த்தும் மாற்றங்களை அனுபவிக்கவும்.
    follow_ups:
      - உங்கள் நிலையை மாற்றும்போது என்ன மாறுகிறது?
      - எந்த கோணம் உங்களை ஆச்சரியப்படுத்தியது?
      - உங்கள் உடலின் இயக்கம் நீங்கள் பார்ப்பதை எப்படி மாற்றுகிறது?
  - id: six_degrees_of_francis_bacon
    name: ஃபிரான்சிஸ் பேக்கனின் ஆறு டிகிரி
    prompt: |
      கலைஞர்கள் மற்ற கலைஞர்களை பாதிக்கிறார்கள். தலைப்புகள் மற்றும் கருத்துக்கள்
      தலைமுறைகள் முழுவதும் மற்றும் எல்லைகளைக் கடந்து உருவாகின்றன. முடிந்தவரை
      குறைந்த இணைப்புகளைப் பயன்படுத்தி, கலைப் படைப்பை கேலரியில் உள்ள மற்றொரு படைப்புடன்
      இணைக்கவும்.
    follow_ups:
      - நீங்கள் காணக்கூடிய குறுகிய பாதை எது?
      - எந்த வகையான இணைப்பு வலுவானது—நுட்பம், பொருள், மனநிலை, அல்லது யோசனை?
      - இணைப்பைப் பற்றி கலைஞர் என்ன நினைப்பார்?
  - id: headlines
    name: தலைப்புச் செய்திகள்
    prompt: |
      கலைப் படைப்பு உருவாக்கப்பட்ட நாளை கற்பனை செய்து, அன்றைய நாளுக்கு ஒரு
      செய்தித்தாள் தலைப்பைக் கண்டுபிடித்து அல்லது உருவாக்குங்கள். இன்றைய முதல்
      பக்கங்களுடன் அதை ஒப்பிடுங்கள்.
    follow_ups:
