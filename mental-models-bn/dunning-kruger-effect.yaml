# Dunning-Kruger Effect
# Mental Model / Cognitive Bias - Example Entry

id: dunning_kruger_effect
name: ডানিং-ক্রুগার প্রভাব

quick_introduction: |
  ডানিং-ক্রুগার প্রভাব হলো একটি জ্ঞানীয় পক্ষপাত যেখানে কোনো ডোমেইনে সীমিত জ্ঞান বা দক্ষতা সম্পন্ন ব্যক্তিরা তাদের যোগ্যতা বেশি করে অনুমান করে, অন্যদিকে বিশেষজ্ঞরা তাদের যোগ্যতা কম করে অনুমান করে। আপনি যত কম জানবেন, তত বেশি আত্মবিশ্বাসী হতে পারেন।

one_liner: আপনি যত কম জানবেন, তত বেশি আত্মবিশ্বাসী হতে পারেন।

try_this:
  - নতুন ডোমেইনে, অতিরিক্ত আত্মবিশ্বাসী হওয়ার অনুমান করুন—প্রতিক্রিয়া এবং ক্যালিব্রেশন চান।
  - বিশেষজ্ঞরা যখন সন্দেহ প্রকাশ করেন, তখন এটিকে গুরুত্ব সহকারে নিন; তারা ব্যতিক্রমী পরিস্থিতিগুলো জানতে পারে।
  - লক্ষ্য করুন যখন কোনো ক্ষেত্রে অনভিজ্ঞরা বিশেষজ্ঞদের চেয়ে বেশি নিশ্চিত থাকে।

ask_yourself:
  - আমি কি "মাউন্ট স্টুপিডের চূড়ায়" আছি নাকি "বিনয়ের উপত্যকায়"?
  - আমার কি এখানে নিজের যোগ্যতা মূল্যায়ন করার জন্য মেটাকগনিটিভ ক্ষমতা আছে?

in_more_detail: |
  ডানিং এবং ক্রুগারের গবেষণা দেখিয়েছে যে অযোগ্য ব্যক্তিদের নিজেদের অযোগ্যতা শনাক্ত করার জন্য মেটাকগনিটিভ ক্ষমতা থাকে না। আপনার পারফরম্যান্স মূল্যায়ন করার জন্য, আপনার একই দক্ষতার প্রয়োজন যা ভালোভাবে পারফর্ম করার জন্য প্রয়োজনীয়—সুতরাং অদক্ষরা দ্বিগুণ অসুবিধায় থাকে: তারা খারাপ পারফর্ম করে এবং এটি জানে না।

  যোগ্যতা বাড়ার সাথে সাথে, লোকেরা প্রায়শই "বিনয়ের উপত্যকা" অনুভব করে যেখানে তারা বুঝতে পারে যে তারা কতটা জানে না। সত্যিকারের বিশেষজ্ঞরা আত্মবিশ্বাসের অভাব বোধ করতে পারেন কারণ তারা সূক্ষ্মতা এবং ব্যতিক্রমী পরিস্থিতি সম্পর্কে তীব্রভাবে সচেতন।

why_this_is_important: |
  ডানিং-ক্রুগার প্রভাব শনাক্ত করা আপনাকে আপনার আত্মবিশ্বাস ক্যালিব্রেট করতে, অনভিজ্ঞদের মতামতকে অতিরিক্ত অনুমান করা এড়াতে এবং বিশেষজ্ঞদের বিনয়কে মূল্যায়ন করতে সহায়তা করে। এটি শেখা, নিয়োগ এবং সিদ্ধান্ত গ্রহণের জন্য অপরিহার্য।

when_to_use:
  - শেখা
  - সিদ্ধান্ত_গ্রহণ
  - নেতৃত্ব
  - কর্মজীবনের_পদক্ষেপ

how_can_you_spot_it:
  novice_overconfidence: |
    যাদের অভিজ্ঞতা কম, তারা শক্তিশালী, অপরিশোধিত মতামত প্রকাশ করে।
  expert_underconfidence: |
    অত্যন্ত দক্ষ ব্যক্তিরা কম দক্ষ লোকেদের চেয়ে বেশি অনিশ্চয়তা প্রকাশ করে এবং সংযম দেখায়।
  inability_to_recognize_quality: |
    দুর্বল পারফর্মাররা তাদের ডোমেইনে ভালো এবং খারাপ কাজের মধ্যে পার্থক্য করতে পারে না।
  confidence_competence_mismatch: |
    অনভিজ্ঞদের মধ্যে আত্মবিশ্বাস এবং প্রকৃত যোগ্যতা বিপরীতভাবে সম্পর্কযুক্ত।

examples:
  social_media: |
    কোনো বিষয়ে অগভীর জ্ঞানসম্পন্ন লোকেরা ডোমেইন বিশেষজ্ঞদের সাথে আত্মবিশ্বাসের সাথে বিতর্ক করে।
  hiring: |
    সাক্ষাৎকারে খারাপ পারফর্ম করা প্রার্থীরা কখনও কখনও তাদের নিজের পারফরম্যান্সকে উচ্চ রেট দেয়।
  investing: |
    নতুন বিনিয়োগকারীরা প্রাথমিক জয়ের পরে অতিরিক্ত আত্মবিশ্বাসী হতে পারে, ভাগ্যের স্বীকৃতি না দিয়ে।
  workplace: |
    জুনিয়র কর্মচারীরা পদোন্নতির জন্য তাদের প্রস্তুতির ব্যাপারে অতিরিক্ত অনুমান করতে পারে যখন সিনিয়ররা নিজেদের সন্দেহ করে।

real_world_implications: |
  ডানিং-ক্রুগার প্রভাব শিক্ষা, নিয়োগ, রাজনীতি এবং জনমতকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন খারাপ ধারণাগুলো ছড়িয়ে পড়ে এবং কেন বিশেষজ্ঞদের উপেক্ষা করা যেতে পারে। ব্যক্তিগত এবং সম্মিলিত সিদ্ধান্ত গ্রহণের জন্য ক্যালিব্রেশন গুরুত্বপূর্ণ।

professional_application:
  networking_and_relationship_building: |
    যখন কেউ খুব আত্মবিশ্বাসী হয়, তখন বিবেচনা করুন তারা ডানিং-ক্রুগার জোনে থাকতে পারে। বিভিন্ন দৃষ্টিকোণ সন্ধান করুন, যারা অনিশ্চয়তা প্রকাশ করে তাদের সহ।
  collaborative_learning_initiative: |
    এমন সংস্কৃতি তৈরি করুন যেখানে অনিশ্চয়তা স্বীকার করাকে মূল্য দেওয়া হয়। ক্যালিব্রেশন অনুশীলন এবং প্রতিক্রিয়া উৎসাহিত করুন যা লোকেদের তাদের যোগ্যতা সঠিকভাবে মূল্যায়ন করতে সহায়তা করে।

how_can_this_be_misapplied:
  dismissing_all_confidence: |
    আত্মবিশ্বাসী লোকেদের সর্বদা ভুল বলে মনে করা; কখনও কখনও আত্মবিশ্বাস ন্যায্য।
  false_modesty: |
    বিশেষজ্ঞরা বিনয়ী দেখাতে তাদের যা জানেন তার চেয়ে কম জানেন বলে ভান করে।
  gatekeeping: |
    "বিশেষজ্ঞদের" যুক্তিতে যুক্ত না হয়ে তাদের যুক্তির সাথে ভিন্নমত পোষণকারী কাউকে খারিজ করতে ডানিং-ক্রুগার ব্যবহার করা।
  self_doubt_paralysis: |
    নিজের বিচারকে কখনও বিশ্বাস না করার পর্যায়ে অতিরিক্ত সংশোধন করা।

