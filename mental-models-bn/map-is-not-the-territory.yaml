id: map_is_not_the_territory
name: মানচিত্র আসলে অঞ্চল নয়

quick_introduction: |
  "মানচিত্র আসলে অঞ্চল নয়" এর অর্থ হল বাস্তবতার একটি উপস্থাপনা নিজেই বাস্তবতা নয়।
  মডেল, তত্ত্ব এবং বর্ণনা দরকারী সরলীকরণ, কিন্তু তারা সবসময় কিছু বাদ দেয়।
  মানচিত্রকে অঞ্চলের সাথে বিভ্রান্ত করা ত্রুটির দিকে পরিচালিত করে।

one_liner: মানচিত্র আসলে অঞ্চল নয়—সমস্ত মডেল ভুল; কিছু দরকারী।

try_this:
  - যখন একটি মডেল বাস্তবতার সাথে মেলে না, তখন মানচিত্র আপডেট করুন—বাস্তবতাকে মানচিত্রের সাথে মানানসই করার চেষ্টা করবেন না।
  - জিজ্ঞাসা করুন: এই মডেলটি কী বাদ দিচ্ছে? কখন এটি ভেঙে যেতে পারে?
  - মডেলগুলিকে সত্য হিসাবে নয়, সরঞ্জাম হিসাবে বিবেচনা করুন।

ask_yourself:
  - আমি কি আমার মডেলকে বাস্তবতার সাথে বিভ্রান্ত করছি?
  - শেষবার দেখার পর থেকে অঞ্চলটি কি পরিবর্তিত হয়েছে?

in_more_detail: |
  আলফ্রেড করজিবস্কি সাধারণ শব্দার্থবিদ্যায় এই ধারণাটি প্রবর্তন করেছিলেন।
  একটি শহরের মানচিত্র নেভিগেশনের জন্য দরকারী, কিন্তু এটি শহর নয়—এটি বিস্তারিত বাদ দেয়,
  পুরাতন হয়ে যায় এবং কখনই সবকিছু ধারণ করতে পারে না। একই জিনিস মানসিক মডেল,
  বৈজ্ঞানিক তত্ত্ব এবং সাংগঠনিক চার্টের ক্ষেত্রে প্রযোজ্য।

  সমস্ত মডেল ভুল; কিছু দরকারী। বিপদ হল একটি মডেলকে এমনভাবে বিবেচনা করা যেন এটি
  সম্পূর্ণ সত্য, বিশেষ করে যখন অঞ্চলটি পরিবর্তিত হয়েছে। ভাল চিন্তাভাবনার জন্য
  বাস্তবতার সাথে না মিললে মানচিত্র আপডেট করার প্রয়োজন হয়।

why_this_is_important: |
  মানচিত্র অঞ্চলের থেকে ভিন্ন তাRecognizing overconfidence in models,
  encourages updating beliefs, and reduces the risk of acting on outdated or
  oversimplified information.

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - সমস্যা_সমাধান
  - শিক্ষা
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  model_reality_confusion: |
    বাস্তবতাকে সম্পূর্ণরূপে বর্ণনা করে এমনভাবে একটি কাঠামো বা তত্ত্বকে বিবেচনা করা।
  outdated_assumptions: |
    বর্তমান অবস্থার সাথে আর মেলে না এমন তথ্য বা মডেলের উপর ভিত্তি করে কাজ করা।
  oversimplification: |
    "মানচিত্রে" অন্তর্ভুক্ত না থাকার কারণে সূক্ষ্ম বিষয়গুলিকে উপেক্ষা করা।
  map_worship: |
    প্রমাণ বিরোধিতা করার পরেও মডেলকে আপডেট করার পরিবর্তে রক্ষা করা।

examples:
  organizational_charts: |
    প্রতিবেদনের কাঠামো যেভাবে কাজ আসলে সম্পন্ন হয় তা প্রতিফলিত করে এমনটা ধরে নেওয়া।
  financial_models: |
    একটি স্প্রেডশীট প্রজেকশনকে একটি পরিস্থিতি হিসাবে বিবেচনা করা, পূর্বাভাস হিসাবে নয়।
  stereotypes: |
    গোষ্ঠী-পর্যায়ের সাধারণীকরণ ব্যক্তিদের উপর প্রয়োগ করা।
  strategy_docs: |
    বাজার পরিবর্তিত হওয়ার পরেও যেমন লেখা আছে তেমনভাবে একটি পরিকল্পনা কার্যকর করা।

real_world_implications: |
  মানচিত্র-অঞ্চল পার্থক্য বিজ্ঞান, প্রকৌশল এবং দর্শনের মৌলিক বিষয়।
  এটি Bayesian updating, agile methodology, এবং epistemic humility-এর ভিত্তি।
  এটি উপেক্ষা করলে অনমনীয় চিন্তাভাবনা এবং ব্যর্থ কৌশল দেখা দেয়।

professional_application:
  networking_and_relationship_building: |
    একজন ব্যক্তির সম্পর্কে আপনার মানসিক মডেল পুরাতন হতে পারে। পুরানো ধারণার উপর নির্ভর করার
    পরিবর্তে সরাসরি যোগাযোগের মাধ্যমে এটি আপডেট করুন।
  collaborative_learning_initiative: |
    দলগুলোকে পরিকল্পনা এবং মডেলকে অনুমান হিসাবে বিবেচনা করতে উৎসাহিত করুন যা পরীক্ষা
    এবং সংশোধনের জন্য, স্থির সত্য হিসাবে নয়।

how_can_this_be_misapplied:
  radical_skepticism: |
    এই সিদ্ধান্তে আসা যে কোনও মানচিত্র দরকারী নয় এবং সমস্ত জ্ঞান সন্দেহজনক।
  constant_revision: |
    এত ঘন ঘন আপডেট করা যে কোনও স্থিতিশীল বোঝাপড়া উদ্ভূত হয় না।
  dismissing_models: |
    দরকারী সরলীকরণগুলি "অঞ্চল নয়" বলে প্রত্যাখ্যান করা।
  relativism: |
    সমস্ত মানচিত্র সমানভাবে বৈধ বলে দাবি করা যখন কিছু স্পষ্টতই অঞ্চলের সাথে ভালভাবে মিলে যায়।

