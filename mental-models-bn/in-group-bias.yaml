id: in_group_bias
name: অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত

quick_introduction: |
  অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত হলো আমরা যাদের নিজেদের গোষ্ঠীভুক্ত মনে করি, তাদের অন্য গোষ্ঠীর লোকদের চেয়ে বেশি পছন্দ করার প্রবণতা। আমরা প্রায়শই সামান্য বা খেয়ালী পার্থক্যের উপর ভিত্তি করে গোষ্ঠীভুক্ত সদস্যদের ইতিবাচক গুণাবলী এবং বহির্ভূত সদস্যদের নেতিবাচক গুণাবলী আরোপ করি।

one_liner: আমরা আমাদের গোষ্ঠীকে পছন্দ করি এবং বহির্ভূত গোষ্ঠীকে আরও কঠোরভাবে বিচার করি—প্রায়শই খেয়ালীভাবে।

try_this:
  - জিজ্ঞাসা করুন: যদি এই ব্যক্তি আমার গোষ্ঠীর হত, তবুও কি আমি তাকে একইভাবে বিচার করতাম?
  - সিদ্ধান্ত নেওয়ার সময় সক্রিয়ভাবে বহির্ভূত গোষ্ঠীর দৃষ্টিভঙ্গি সন্ধান করুন।
  - লক্ষ্য করুন কখন গোষ্ঠীর সীমা আপনার বিচারকে প্রভাবিত করছে।

ask_yourself:
  - আমি কি কাউকে "আমাদের লোক" হওয়ার কারণে পছন্দ করছি?
  - আমি কি বহির্ভূত গোষ্ঠীর সদস্যের ক্ষেত্রে একই মান প্রয়োগ করতাম?

in_more_detail: |
  এমনকি যখন গোষ্ঠীগুলি এলোমেলোভাবে বরাদ্দ করা হয় (যেমন, কয়েন টস করে), তখনও লোকেরা দ্রুত তাদের নিজেদের গোষ্ঠীর প্রতি পক্ষপাত তৈরি করে। আমরা নিজেদের গোষ্ঠীর সদস্যদের বেশি বিশ্বাস করি, তাদের প্রতি আরও উদারভাবে সম্পদ বরাদ্দ করি এবং তাদের কাজকে আরও করুণার সাথে বিচার করি। বহির্ভূত সদস্যরা বিপরীত আচরণ পান।

  অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত গোষ্ঠীস্বার্থ, বৈষম্য এবং সংঘাতকে বাড়িয়ে তোলে। এটি নিয়োগ, পদোন্নতি, সহযোগিতা এবং নীতিকে প্রভাবিত করে। এটি জাতি, জাতীয়তা, কোম্পানি, দল বা যেকোনো সাধারণ পরিচয়ের উপর ভিত্তি করে হতে পারে।

why_this_is_important: |
  অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত চিনতে পারা আপনাকে আরও ন্যায্য সিদ্ধান্ত নিতে, আরও অন্তর্ভুক্তিমূলক দল তৈরি করতে এবং পক্ষপাত এড়াতে সহায়তা করে। এটি ব্যাখ্যা করে কেন বৈচিত্র্যের উদ্যোগগুলি প্রতিরোধের সম্মুখীন হয়—অন্তর্ভূক্ত গোষ্ঠীর পছন্দ স্বতঃস্ফূর্ত।

when_to_use:
  - নেতৃত্ব
  - সিদ্ধান্ত_গ্রহণ
  - সম্পর্ক_গড়ে_তোলা
  - সংঘাত_সমাধান

how_can_you_spot_it:
  preferential_treatment: |
    "আমাদের" লোকদের সন্দেহ হলেও সুবিধা দেওয়া, কিন্তু "তাদের" লোকদের না দেওয়া।
  resource_allocation: |
    বহির্ভূত গোষ্ঠীর সদস্যদের সমান বা বেশি প্রয়োজন থাকা সত্ত্বেও অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের বেশি সম্পদ বরাদ্দ করা।
  attribution_asymmetry: |
    অন্তর্ভূক্ত গোষ্ঠীর সাফল্য = দক্ষতা; বহির্ভূত গোষ্ঠীর সাফল্য = ভাগ্য। অন্তর্ভূক্ত গোষ্ঠীর ব্যর্থতা = পরিস্থিতি; বহির্ভূত গোষ্ঠীর ব্যর্থতা = চরিত্র।
  minimal_group_effects: |
    এমনকি খেয়ালী গোষ্ঠী বরাদ্দের সাথেও পক্ষপাতিত্ব দেখা দেয়।

examples:
  hiring: |
    এমন প্রার্থীদের পছন্দ করা যারা আপনার প্রাক্তন ছাত্রাবাসের একই অথবা আপনার একই পটভূমির।
  performance_reviews: |
    একই রকম কর্মক্ষমতা থাকা সত্ত্বেও অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের বহির্ভূত গোষ্ঠীর সদস্যদের চেয়ে বেশি অনুকূলভাবে রেটিং দেওয়া।
  collaboration: |
    "আমাদের দল"কে বিশ্বাস করা এবং অন্তর্ভুক্ত করা, যখন "তাদের দল"কে বাদ দেওয়া বা সন্দেহ করা।
  politics: |
    অন্তর্ভূক্ত গোষ্ঠীর যুক্তিগুলি নিinkuভাবে গ্রহণ করার সময় বহির্ভূত গোষ্ঠীর যুক্তিগুলিকে বাতিল করে দেওয়া।

real_world_implications: |
  অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত বৈষম্যকে স্থায়ী করে, মেধাভিত্তিক ব্যবস্থাকে দুর্বল করে এবং সংঘাতকে বাড়িয়ে তোলে। এটি নিয়োগ, পদোন্নতি, বিনিয়োগ এবং নীতিকে প্রভাবিত করে। এটি কমাতে ইচ্ছাকৃত প্রচেষ্টা প্রয়োজন—এটি নিজে থেকে ঠিক হবে না।

professional_application:
  networking_and_relationship_building: |
    আপনার তাৎক্ষণিক বৃত্তের বাইরের লোকদের সক্রিয়ভাবে অন্তর্ভুক্ত করুন। বিভিন্ন দৃষ্টিভঙ্গি সন্ধান করুন। আপনি কাউকে "আপনার মতো" হওয়ার কারণে পছন্দ করছেন কিনা তা প্রশ্ন করুন।
  collaborative_learning_initiative: |
    নিয়োগ এবং মূল্যায়নে অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত কমাতে কাঠামোগত প্রক্রিয়া (অজ্ঞাত পর্যালোচনা, বৈচিত্র্যময় প্যানেল) ব্যবহার করুন। অভিন্ন পরিচয় তৈরি করতে আন্তঃগোষ্ঠী প্রকল্প তৈরি করুন।

how_can_this_be_misapplied:
  forced_diversity: |
    এমন কোটা বা নীতি প্রয়োগ করা যা অন্তর্নিহিত পক্ষপাতের সমাধান না করে বিরক্তি তৈরি করে।
  out_group_hostility: |
    শুধুমাত্র বহির্ভূত গোষ্ঠীর শত্রুতা বিদ্যমান থাকলেই অন্তর্ভূক্ত গোষ্ঠী পক্ষপাতকে একমাত্র সমস্যা হিসেবে বিবেচনা করা।
  ignoring_legitimate_differences: |
    সমস্ত গোষ্ঠীগত পার্থক্য পক্ষপাত নয়—কখনও কখনও গোষ্ঠীগুলির ভিন্ন বৈশিষ্ট্য থাকে। সব বৈষম্যকে বৈষম্য বলে ধরে নেবেন না।
  reverse_discrimination: |
    অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের প্রতি অন্যায্য উপায়ে বহির্ভূত গোষ্ঠীগুলির প্রতি অতিরিক্ত সংশোধনে যাওয়া।

