# ফ্রেমিং এফেক্ট
# মানসিক মডেল / কগনিটিভ বায়াস - উদাহরণ এন্ট্রি

id: framing_effect
name: ফ্রেমিং এফেক্ট

quick_introduction: |
  ফ্রেমিং এফেক্ট হলো আমাদের সিদ্ধান্তের পরিবর্তনশীলতা, অপশনগুলো যেভাবে উপস্থাপন করা হয় তার উপর ভিত্তি করে — এমনকি যখন অন্তর্নিহিত তথ্য একই থাকে। "৯০% বেঁচে যাওয়া" এবং "১০% মৃত্যুহার" একই ফলাফল বর্ণনা করে কিন্তু ভিন্ন পছন্দ তৈরি করে। ফ্রেমিং সিদ্ধান্তকে প্রভাবিত করে।

one_liner: একই তথ্য, ভিন্নভাবে ফ্রেম করা হলে, ভিন্ন সিদ্ধান্তের দিকে পরিচালিত করে।

try_this:
  - সিদ্ধান্ত নেওয়ার আগে একাধিক উপায়ে অপশনগুলোকে রিফ্রেম করুন — লাভ ফ্রেম এবং ক্ষতি ফ্রেম।
  - লক্ষ্য করুন যখন কোনো কিছুর শব্দচয়নের উপর ভিত্তি করে আপনার পছন্দ পরিবর্তিত হয়।
  - জিজ্ঞাসা করুন: ফ্রেমিং থেকে মুক্ত করে অন্তর্নিহিত তথ্যগুলো কী কী?

ask_yourself:
  - যদি এটি লাভ হিসাবে ফ্রেম করা হয় বনাম ক্ষতি হিসাবে ফ্রেম করা হয় তবে আমি কি ভিন্ন সিদ্ধান্ত নিতাম?
  - আমি কি ফ্রেমের প্রতি প্রতিক্রিয়া জানাচ্ছি নাকি প্রকৃত ফলাফলের প্রতি?

in_more_detail: |
  কানহম্যান এবং টভারস্কি দেখিয়েছেন যে লোকেরা লাভের হিসাবে ফ্রেম করা অপশনের ক্ষেত্রে ঝুঁকি এড়াতে চায় এবং ক্ষতির হিসাবে ফ্রেম করা অপশনের ক্ষেত্রে ঝুঁকি নিতে আগ্রহী হয় — একই ফলাফলের জন্য। ইতিবাচক ফ্রেমিং ("২০০ জীবন বাঁচান") বনাম নেতিবাচক ফ্রেমিং ("৪০০ জন মারা যাবে") পছন্দ পরিবর্তন করে। ক্ষতির ফ্রেম সমতুল্য লাভ ফ্রেমের চেয়ে শক্তিশালী আবেগিক প্রতিক্রিয়া ট্রিগার করে।

  ফ্রেমিং এফেক্ট চিকিৎসা সংক্রান্ত সিদ্ধান্ত, নীতি, বিপণন এবং আলোচনাকে প্রভাবিত করে। এটি সবচেয়ে শক্তিশালী এবং সু-নথিভুক্ত পক্ষপাতগুলির মধ্যে একটি। সচেতনতা সাহায্য করে, কিন্তু এটি সম্পূর্ণরূপে কাটিয়ে ওঠা কঠিন।

why_this_is_important: |
  ফ্রেমিং এফেক্টকে চেনা আপনাকে আরও সামঞ্জস্যপূর্ণ সিদ্ধান্ত নিতে, ম্যানিপুলেশন প্রতিরোধ করতে এবং আরও কার্যকরভাবে যোগাযোগ করতে সাহায্য করে। এটি ব্যাখ্যা করে কেন একই অফার উপস্থাপনার উপর নির্ভর করে গ্রহণ বা প্রত্যাখ্যান করা যেতে পারে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - আলোচনা
  - নেতৃত্ব
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  gain_loss_asymmetry: |
    একই ফলাফল লাভ বনাম ক্ষতি হিসাবে ফ্রেম করা হলে ভিন্ন পছন্দের সৃষ্টি হয়।
  presentation_dependence: |
    সিদ্ধান্ত পরিবর্তিত হয় যখন কেবল ফ্রেমিং পরিবর্তন হয়, মূল বিষয়বস্তু নয়।
  default_influence: |
    অপশনগুলোর ক্রম বা লেবেলিং পছন্দকে প্রভাবিত করে।
  emotional_trigger: |
    কিছু ফ্রেম শক্তিশালী আবেগিক প্রতিক্রিয়া ট্রিগার করে।

examples:
  medical: |
    একই পদ্ধতির জন্য "৯০% বেঁচে যাওয়া" বনাম "১০% মৃত্যুহার" —
    মানুষ ফ্রেমের উপর ভিত্তি করে ভিন্নভাবে নির্বাচন করে।
  sales: |
    "৫০ টাকা বাঁচান" বনাম "৫০ টাকা হারাবেন না" — সমতুল্য ফ্রেম, ভিন্ন
    মনস্তাত্ত্বিক প্রভাব।
  policy: |
    "কর ছাড়" বনাম "সরকারি ব্যয়" — একই নীতি, ভিন্ন
    রাজনৈতিক প্রতিক্রিয়া।
  negotiation: |
    একটি অফারকে "ছাড়" হিসাবে উপস্থাপন করা বনাম "সারচার্জ এড়ানো"
    গ্রহণের হার পরিবর্তন করে।

real_world_implications: |
  ফ্রেমিং এফেক্ট বিজ্ঞাপন, রাজনীতি এবং আলোচনায় কাজে লাগানো হয়। এটি চিকিৎসা সংক্রান্ত সিদ্ধান্ত এবং নীতিগত সমর্থনকে প্রভাবিত করে। রিফ্রেমিং সিদ্ধান্ত এবং যোগাযোগ উন্নত করতে পারে। সচেতন থাকা সাহায্য করে কিন্তু প্রভাবটি সম্পূর্ণরূপে দূর করে না।

professional_application:
  networking_and_relationship_building: |
    অপশনগুলো উপস্থাপন করার সময়, একাধিক ফ্রেম বিবেচনা করুন। বিভিন্ন ফ্রেমিং কীভাবে গ্রহণকে প্রভাবিত করে তা পরীক্ষা করুন। তথ্য গ্রহণ করার সময়, জিজ্ঞাসা করুন "এটি অন্য কীভাবে ফ্রেম করা যেতে পারে?"
  collaborative_learning_initiative: |
    সিদ্ধান্ত গ্রহণের ক্ষেত্রে, ফ্রেমিং এফেক্ট পরীক্ষা করার জন্য স্পষ্টভাবে বিকল্পগুলি রিফ্রেম করুন। "যদি আমরা এটিকে ক্ষতি হিসাবে ফ্রেম করতাম, তবে কি আমরা ভিন্ন সিদ্ধান্ত নিতাম?" ন্যায্যতা জন্য সামঞ্জস্যপূর্ণ ফ্রেমিং ব্যবহার করুন।

how_can_this_be_misapplied:
  manipulation: |
    ইচ্ছাকৃতভাবে ফ্রেমিং ব্যবহার করে তাদের অজান্তেই পছন্দসই ফলাফলের দিকে চালিত করা।
  false_equivalence: |
    সমস্ত ফ্রেমিং সমানভাবে বৈধ বলে ধরে নেওয়া যখন কিছু গুরুত্বপূর্ণ তথ্য গোপন করে।
  overcorrection: |
    সম্পূর্ণরূপে ফ্রেমিংকে উপেক্ষা করা এবং এটি কোনও ব্যাপার না বলে ধরে নেওয়া —
    এটি গুরুত্বপূর্ণ।
  spin: |
    বিভ্রান্ত করার জন্য ফ্রেমিং ব্যবহার করা, পরিষ্কার করার জন্য নয়।

