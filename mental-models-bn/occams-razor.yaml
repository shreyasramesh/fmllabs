# Occam's Razor
# Mental Model / Cognitive Bias - Example Entry

id: occams_razor
name: ওকামের ক্ষুর

quick_introduction: |
  ওকামের ক্ষুর (Occam's Razor) হলো সেই নীতি যা বলে যে একাধিক সম্ভাব্য অনুমানের মধ্যে,
  যে অনুমানে সবচেয়ে কম ধারণা জড়িত, সেটিকে অগ্রাধিকার দেওয়া উচিত। সরল ব্যাখ্যাগুলো
  প্রায়শই—সবসময় না হলেও—সঠিক হয়।

one_liner: প্রমাণের সাথে সামঞ্জস্যপূর্ণ সরলতম ব্যাখ্যাটিকেই অগ্রাধিকার দিন।

try_this:
  - তত্ত্বগুলো তুলনা করার সময় জিজ্ঞাসা করুন: কোনটিতে কম অনুমান আছে?
  - যে প্রমাণ দাবি করে না, সেখানে জটিলতা যোগ করবেন না।
  - লক্ষ্য করুন যখন আপনি একটি সরল ব্যাখ্যার চেয়ে একটি জটিল ব্যাখ্যাকে বেশি পছন্দ করছেন।

ask_yourself:
  - আমি কি অপ্রয়োজনীয় জটিলতা যোগ করছি?
  - এই স্তরের ব্যাখ্যার জন্য কি প্রমাণ প্রয়োজন?

in_more_detail: |
  উইলিয়াম অফ ওকামের নামানুসারে নামকরণ করা এই নীতিটি দাবি করে না যে সরল ব্যাখ্যাগুলো
  সর্বদা সত্য। এটি প্রস্তাব করে যে অপ্রয়োজনীয় জটিলতা প্রমাণ ছাড়া যোগ করা উচিত নয়।
  যদি দুটি তত্ত্ব একই ঘটনা ব্যাখ্যা করে, তবে প্রমাণ ভিন্ন কিছু দাবি না করা পর্যন্ত
  সরলতরটিকে অগ্রাধিকার দেওয়া উচিত।

  ওকামের ক্ষুর একটি হিউরিস্টিক, কোনো আইন নয়। মাঝে মাঝে সঠিক ব্যাখ্যাটি জটিল হতে পারে।
  কিন্তু এটি ওভারফিটিং, ষড়যন্ত্রমূলক চিন্তাভাবনা এবং অপ্রয়োজনীয় জটিলতা থেকে রক্ষা করে।
  এটি ব্যাখ্যার ক্ষেত্রে সরলতাকে অগ্রাধিকার দেয়।

why_this_is_important: |
  ওকামের ক্ষুর প্রয়োগ করলে সমস্যা সমাধান উন্নত হয়, মডেলগুলিতে ওভারফিটিং কমে যায়
  এবং আপনাকে জটিল কিন্তু অসমর্থিত তত্ত্ব এড়াতে সহায়তা করে। যখন প্রমাণ অস্পষ্ট থাকে,
  তখন এটি একটি উপযোগী ডিফল্ট।

when_to_use:
  - সমস্যা_সমাধান
  - সিদ্ধান্ত_গ্রহণ
  - শেখা
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  unnecessary_complexity: |
    একটি ব্যাখ্যায় অনেক বেশি অনুমান জড়িত থাকে যখন কম অনুমানই যথেষ্ট হতে পারে।
  conspiracy_tendencies: |
    যে ঘটনার সরল কারণ রয়েছে, তার জন্য একাধিক গোপন অভিনেতা জড়িত এমন জটিল ব্যাখ্যা।
  overfitting: |
    একটি মডেল বা তত্ত্ব যা অতীতের ডেটা নিখুঁতভাবে ব্যাখ্যা করে কিন্তু নতুন ডেটাতে ব্যর্থ হয়।
  elegance_in_explanation: |
    সেরা ব্যাখ্যাগুলো প্রায়শই পশ্চাৎদৃষ্টিতে "স্পষ্ট" মনে হয়।

examples:
  debugging: |
    যখন কোনও বাগ ঘটে, তখন স্থাপত্যগত সমস্যা অনুমান করার আগে সরলতম কারণগুলি (যেমন, টাইপো, ভুল কনফিগারেশন) পরীক্ষা করুন।
  conspiracy_theories: |
    "সরকার X-এর পরিকল্পনা করেছে" এমন তত্ত্বের জন্য অনেক গোপন অভিনেতার প্রয়োজন; "কয়েকজন মানুষ ভুল করেছে" অপেক্ষাকৃত সরল।
  product_failure: |
    ব্যবহারকারীরা একটি ফিচার গ্রহণ করছে না - সরলতম ব্যাখ্যা: এটি তাদের সমস্যা সমাধান করে না, এটি নয় যে তারা UI দ্বারা বিভ্রান্ত।
  medical_diagnosis: |
    "সাধারণ জিনিসগুলো সাধারণ"—বিরল রোগের আগে সাধারণ রোগগুলি বিবেচনা করুন।

real_world_implications: |
  ওকামের ক্ষুর বৈজ্ঞানিক অনুসন্ধান, প্রকৌশল এবং দৈনন্দিন যুক্তিতে পথ দেখায়।
  এটি জটিল ভুল তত্ত্বগুলিতে নষ্ট হওয়া প্রচেষ্টা হ্রাস করে। অপপ্রয়োগ করলে, এটি সত্যিকারের জটিল ঘটনাগুলোকে বাতিল করে দিতে পারে।

professional_application:
  networking_and_relationship_building: |
    অন্যদের আচরণ ব্যাখ্যা করার সময়, বিদ্বেষ বা জটিল উদ্দেশ্য অনুমান করার আগে সরল ব্যাখ্যাকে (তারা ব্যস্ত, তারা ভুলে গেছে) অগ্রাধিকার দিন।
  collaborative_learning_initiative: |
    সমস্যা সমাধানের সেশনগুলিতে, জটিল মডেল তৈরি করার আগে স্পষ্টভাবে জিজ্ঞাসা করুন "সবচেয়ে সরল ব্যাখ্যা কী?"

how_can_this_be_misapplied:
  oversimplification: |
    বৈধ জটিল ব্যাখ্যাগুলিকে "খুব জটিল" বলে বাতিল করে দেওয়া।
  status_quo_bias: |
    নতুন কিন্তু সঠিক ব্যাখ্যাগুলির উপর পরিচিত ব্যাখ্যাগুলিকে অগ্রাধিকার দেওয়ার জন্য ওকামের ক্ষুর ব্যবহার করা।
  scientific_rigidity: |
    নতুন তত্ত্বগুলিকে আরও জটিল হওয়ার কারণে প্রত্যাখ্যান করা, এমনকি যখন প্রমাণ তাদের সমর্থন করে।
  missing_nuance: |
    কিছু ক্ষেত্র (যেমন, মানুষের আচরণ, বাস্তুতন্ত্র) সহজাতভাবে জটিল; সরলতা বিভ্রান্তিকর হতে পারে।

