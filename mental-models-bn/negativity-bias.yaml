id: negativity_bias
name: নেতিবাচকতার পক্ষপাত

quick_introduction: |
  নেতিবাচকতার পক্ষপাত হলো ইতিবাচক তথ্যের চেয়ে নেতিবাচক তথ্যকে বেশি গুরুত্ব দেওয়ার প্রবণতা। খারাপ খবর, সমালোচনা এবং হুমকি আমাদের মনোযোগ আকর্ষণ করে এবং সমতুল্য ইতিবাচক উদ্দীপনার চেয়ে আমাদের সিদ্ধান্তকে দৃঢ়ভাবে প্রভাবিত করে।

one_liner: খারাপ খবর ভালো খবরের চেয়ে বেশি ওজন বহন করে—আমরা হুমকিকে অগ্রাধিকার দেওয়ার জন্য তৈরি।

try_this:
  - মূল্যায়নের সময় সক্রিয়ভাবে ইতিবাচক প্রমাণ খুঁজুন এবং সেগুলোকে গুরুত্ব দিন।
  - লক্ষ্য করুন কখন একটি সমালোচনা অনেক প্রশংসাকে ছাপিয়ে যাচ্ছে।
  - জিজ্ঞাসা করুন: আমি কি নেতিবাচক তথ্যকে তার প্রাপ্যতার চেয়ে বেশি গুরুত্ব দিচ্ছি?

ask_yourself:
  - আমি কি ইতিবাচক বিষয়গুলিকে উপেক্ষা করে নেতিবাচক বিষয়গুলিতে আটকে আছি?
  - আমি যদি ভালো প্রমাণের উপর মনোযোগ দিতাম তবে কি আমার অনুভূতি ভিন্ন হতো?

in_more_detail: |
  বিবর্তনগতভাবে, একটি হুমকি মিস করা মারাত্মক হতে পারে, যখন একটি সুযোগ মিস করা সাধারণত প্রাণঘাতী নয়। আমাদের মস্তিষ্ক নেতিবাচক তথ্যকে অগ্রাধিকার দেওয়ার জন্য তৈরি। একটি একক সমালোচনামূলক মন্তব্য অনেক প্রশংসাকে ছাড়িয়ে যেতে পারে। নেতিবাচক ঘটনাগুলি আরও স্পষ্টভাবে এবং দীর্ঘ সময়ের জন্য মনে রাখা হয়।

  এই পক্ষপাত সম্পর্ক, সিদ্ধান্ত গ্রহণ এবং সুস্থতাকে প্রভাবিত করে। আমরা ব্যর্থতার উপর আটকে থাকি, সবচেয়ে খারাপ পরিস্থিতি অনুমান করি এবং ইতিবাচক প্রমাণকে উপেক্ষা করি। এটি বোঝা আমাদের এটি সংশোধন করতে সাহায্য করে।

why_this_is_important: |
  নেতিবাচকতার পক্ষপাতকে চিনতে পারা আপনাকে প্রতিক্রিয়ার ভারসাম্য বজায় রাখতে, সমালোচনার প্রতি অতিরিক্ত প্রতিক্রিয়া এড়াতে এবং আরও সুসংহত সিদ্ধান্ত নিতে সাহায্য করে। এটি খারাপ খবর কেন প্রভাবশালী এবং কেন আমরা প্রায়শই পরিস্থিতির চেয়ে খারাপ অনুভব করি তাও ব্যাখ্যা করে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - সম্পর্ক_গড়ে_তোলা
  - নেতৃত্ব
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  disproportionate_impact_of_criticism: |
    একটি নেতিবাচক মন্তব্য অনেক ইতিবাচক মন্তব্যকে ছাপিয়ে যায়।
  threat_prioritization: |
    সম্ভাব্য খারাপ দিকগুলি সমতুল্য ভালো দিকগুলির চেয়ে বেশি মনোযোগ পায়।
  vivid_negative_memories: |
    নেতিবাচক অভিজ্ঞতাগুলি আরও সহজে এবং আরও আবেগের সাথে মনে পড়ে।
  discounting_positive_evidence: |
    ভালো খবর দ্রুত ভুলে যাওয়া হয় বা ব্যাখ্যা করে উড়িয়ে দেওয়া হয়।

examples:
  performance_reviews: |
    একজন কর্মচারী সমালোচনামূলক প্রতিক্রিয়ার একটি অংশকে আঁকড়ে ধরে এবং সামগ্রিক ইতিবাচক মূল্যায়নকে উপেক্ষা করে।
  news_consumption: |
    ইতিবাচক প্রবণতা সত্ত্বেও, নেতিবাচক শিরোনামগুলি মনোযোগ আকর্ষণ করে এবং বিশ্বদৃষ্টিকে আকার দেয়।
  relationships: |
    একটি একক যুক্তি অনেক ভালো মুহূর্তের চেয়ে বড় মনে হয়।
  investing: |
    বাজারের পতনগুলি সমতুল্য উত্থানের চেয়ে বেশি আতঙ্ক সৃষ্টি করে।

real_world_implications: |
  নেতিবাচকতার পক্ষপাত মিডিয়া, রাজনীতি এবং সাংগঠনিক সংস্কৃতিকে আকার দেয়। এটি উদ্বেগ, সংঘাত এবং সর্বোত্তম নয় এমন সিদ্ধান্তের দিকে পরিচালিত করে। ইচ্ছাকৃতভাবে এটিকে প্রতিহত করলে সুস্থতা এবং বিচার ক্ষমতা উন্নত হতে পারে।

professional_application:
  networking_and_relationship_building: |
    প্রতিক্রিয়া দেওয়ার সময়, মনে রাখবেন যে নেতিবাচক মন্তব্যগুলি বেশি ওজন বহন করবে—সেগুলির ভারসাম্য বজায় রাখুন এবং উন্নতির উপর জোর দিন। প্রতিক্রিয়া গ্রহণ করার সময়, সচেতনভাবে পুরো ছবিটি বিবেচনা করুন।
  collaborative_learning_initiative: |
    এমন সংস্কৃতি তৈরি করুন যা স্পষ্টভাবে নেতিবাচকতার পক্ষপাতকে প্রতিহত করে: বিজয় উদযাপন করুন, ইতিবাচক ফলাফল নথিভুক্ত করুন এবং "পোস্ট-মর্টেম" এর সাথে "প্রি-মর্টেম" (কি সঠিক হয়েছে তার) ভারসাম্য বজায় রাখুন।

how_can_this_be_misapplied:
  toxic_positivity: |
    "ইতিবাচক চিন্তাভাবনা" এর উপর জোর দিয়ে বৈধ উদ্বেগগুলিকে খারিজ করে দেওয়া।
  ignoring_real_threats: |
    প্রকৃত ঝুঁকি অবমূল্যায়ন করার পর্যায়ে অতিরিক্ত সংশোধন করা।
  feedback_suppression: |
    প্রয়োজনীয় সমালোচনা এড়িয়ে যাওয়া কারণ "নেতিবাচকতা খারাপ"।
  invalidation: |
    কারও নেতিবাচক অনুভূতিকে "শুধুমাত্র নেতিবাচকতার পক্ষপাত" বলে অভিহিত করা যখন তাদের উদ্বেগের বাস্তব কারণ রয়েছে।

