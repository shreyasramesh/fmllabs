# Inversion
# Mental Model / Cognitive Bias - Example Entry

id: inversion
name: ইনভার্সন

quick_introduction: |
  ইনভার্সন হলো একটি সমস্যা সমাধানের কৌশল যা একটি প্রশ্নকে ঘুরিয়ে দেয়। "আমি কিভাবে সফল হব?" জিজ্ঞাসা করার পরিবর্তে, আপনি জিজ্ঞাসা করেন "কী আমাকে ব্যর্থ করে তুলবে?" এবং সেই জিনিসগুলি এড়িয়ে চলুন। এটি এমন ঝুঁকি এবং অ্যান্টি-প্যাটার্নগুলিকে উন্মোচন করে যা সামনের চিন্তা প্রায়শই মিস করে।

one_liner: ঘুরিয়ে দিন—জিজ্ঞাসা করুন কী আপনাকে ব্যর্থ করে তুলবে, তারপর সেই জিনিসগুলি এড়িয়ে চলুন।

try_this:
  - যেকোনো লক্ষ্যের জন্য, ব্যর্থ হওয়ার প্রধান উপায়গুলি তালিকাভুক্ত করুন—তারপর সেগুলি এড়িয়ে চলুন।
  - নেতিবাচক কল্পনা ব্যবহার করুন: এটি কেন ভুল হতে পারে?
  - জিজ্ঞাসা করুন: একজন বুদ্ধিমান ব্যক্তি এটি নষ্ট করার জন্য কী করবে?

ask_yourself:
  - আমি কি ভেবেছি কী এটিকে ব্যর্থ করে তুলতে পারে?
  - কেবল সামনের দিকে চিন্তা করার মাধ্যমে আমি কী দেখতে পাচ্ছি না?

in_more_detail: |
  চার্লি মাঙ্গার দ্বারা জনপ্রিয় এবং গাণিতিক যুক্তির উপর ভিত্তি করে, ইনভার্সন এই সত্যের সুযোগ নেয় যে ব্যর্থতা এড়ানো প্রায়শই সাফল্যের চেয়ে সহজ। যদি আপনি কোনো কিছুর ভুল হওয়ার প্রধান উপায়গুলি চিহ্নিত করতে পারেন, তাহলে আপনি পদ্ধতিগতভাবে সেগুলি দূর করতে পারেন।

  কার্ল জ্যাকোবি কথিত আছে, "সর্বদা উল্টোভাবে চিন্তা করুন।" স্টোইকরা তাদের যা ছিল তা উপলব্ধি করার জন্য এবং প্রতিকূলতার জন্য প্রস্তুত হওয়ার জন্য নেতিবাচক কল্পনা—ক্ষতির কল্পনা—ব্যবহার করতেন। ইনভার্সন হলো নিরাশাवाद নয়; এটি বাধা দূর করে অগ্রগতি করার একটি কাঠামোগত উপায়।

why_this_is_important: |
  ইনভার্সন আপনাকে বিপর্যয়কর ভুল এড়াতে, পরিকল্পনা পরীক্ষা করতে এবং অ-স্পষ্ট সমাধান খুঁজে বের করতে সাহায্য করে। এটি গুরুত্বপূর্ণ ব্যর্থতার মোডগুলি উপেক্ষা না করে নিশ্চিত করার মাধ্যমে সামনের পরিকল্পনাকে পরিপূরক করে।

when_to_use:
  - সমস্যা_সমাধান
  - সিদ্ধান্ত_গ্রহণ
  - ঝুঁকি_মূল্যায়ন
  - কর্মজীবনের_পদক্ষেপ

how_can_you_spot_it:
  premortem_thinking: |
    একটি প্রকল্পের আগে, "এটি কেন ব্যর্থ হয়েছে?" জিজ্ঞাসা করুন যেন এটি ইতিমধ্যে হয়েছে।
  anti_goals: |
    আপনি যা অর্জন করতে চান তা যেমন স্পষ্ট করে সংজ্ঞায়িত করা, তেমনভাবে আপনি যা এড়াতে চান তা সংজ্ঞায়িত করা।
  reverse_engineering_failure: |
    কেবল সাফল্য অধ্যয়নের পরিবর্তে শিক্ষা বের করার জন্য ব্যর্থ কেসগুলি অধ্যয়ন করা।
  constraint_focus: |
    আপসাইডের জন্য অপ্টিমাইজ করার আগে সীমাবদ্ধতা এবং বাধাগুলি চিহ্নিত করা।

examples:
  investing: |
    "এই স্টকটি কেন উপরে উঠবে?" জিজ্ঞাসা করার পরিবর্তে, "কী আমাকে টাকা হারাতে বাধ্য করবে?" জিজ্ঞাসা করুন এবং সেই পরিস্থিতিগুলি এড়িয়ে চলুন।
  career: |
    "আমার খ্যাতি নষ্ট করবে কী?" এটি এড়ানোর জন্য আচরণের একটি তালিকা তৈরি করে।
  product_launch: |
    "বেশিরভাগ পণ্য লঞ্চ কেন ব্যর্থ হয়?" লঞ্চের আগেaddress করার জন্য ঝুঁকি উন্মোচন করে।
  health: |
    "কী অভ্যাস আয়ু কমিয়ে দেয়?" "কী আমাকে সুস্থ রাখে?" এর চেয়ে স্পষ্ট এড়ানোর তালিকা দেয়।

real_world_implications: |
  ইনভার্সন প্রকৌশল (ব্যর্থতার মোড বিশ্লেষণ), বিনিয়োগ এবং কৌশলে ব্যবহৃত হয়। এটি অতি-আত্মবিশ্বাস হ্রাস করে এবং ঝুঁকি ব্যবস্থাপনা উন্নত করে। অতিরিক্ত নির্ভরতা অতিরিক্ত সতর্কতার দিকে নিয়ে যেতে পারে।

professional_application:
  networking_and_relationship_building: |
    "এই সম্পর্কটি নষ্ট করবে কী?" এটি বিশ্বাস-ভঙ্গকারী আচরণ এড়াতে আপনাকে সাহায্য করে।
  collaborative_learning_initiative: |
    প্রকল্পগুলিতে প্রি-মর্টেম চালান: "এটি ব্যর্থ হয়েছে। কেন?" পরিকল্পনা এবং কার্যকরীকরণ উন্নত করতে উত্তরগুলি ব্যবহার করুন।

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    কেবল ব্যর্থতা এড়ানোর উপর মনোযোগ দেওয়া কর্মক্ষমতাকে পঙ্গু করে দিতে পারে এবং প্রয়োজনীয় ঝুঁকি গ্রহণ প্রতিরোধ করতে পারে।
  negativity_bias: |
    ইনভার্সন নেতিবাচক পক্ষপাতকে বাড়িয়ে তুলতে পারে যদি এটি সামনের সুযোগ সনাক্তকরণের সাথে ভারসাম্যপূর্ণ না হয়।
  analysis_paralysis: |
    ব্যর্থতার মোডগুলিতে এত বেশি সময় ব্যয় করা যে আপনি কখনই কার্যকর করতে পারেন না।
  missing_upside: |
    ইনভার্সন আপনাকে কী করতে হবে তা বলে না—কেবল কী এড়াতে হবে। আপনার এখনও ইতিবাচক লক্ষ্য প্রয়োজন।

