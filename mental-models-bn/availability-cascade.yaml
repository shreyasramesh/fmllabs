# Availability Cascade
# Mental Model / Cognitive Bias - Example Entry

id: availability_cascade
name: অ্যাভেইলেবিলিটি ক্যাসকেড

quick_introduction: |
  একটি অ্যাভেইলেবিলিটি ক্যাসকেড হল একটি স্ব-শক্তিশালী প্রক্রিয়া যেখানে একটি ধারণা
  জনপ্রিয় আলোচনার মাধ্যমে বিশ্বাসযোগ্যতা লাভ করে। যত বেশি এটি আলোচিত হয়,
  ততই এটি "সহজলভ্য" হয়, তত বেশি মানুষ এটি বিশ্বাস করে, এবং তত বেশি এটি আলোচিত হয়।
  একটি সম্মিলিত বিশ্বাস তার অন্তর্নিহিত সত্য নির্বিশেষে গতি লাভ করে।

one_liner: একটি ধারণা যত বেশি পুনরাবৃত্তি হয়, ততই বিশ্বাসযোগ্য মনে হয়—প্রমাণ নির্বিশেষে।

try_this:
  - জিজ্ঞাসা করুন: এই বিশ্বাসটি কি সত্য হওয়ার কারণে ব্যাপক, নাকি পুনরাবৃত্তি হওয়ার কারণে?
  - যা সবাই জানে তা গ্রহণ করার আগে প্রাথমিক উৎস সন্ধান করুন।
  - খেয়াল করুন কখন শুধুমাত্র পুনরাবৃত্তি আপনার বিশ্বাসযোগ্যতার অনুভূতিকে চালিত করছে।

ask_yourself:
  - যদি আমি এটি একবার শুনতাম তবে কি আমি এটি বিশ্বাস করতাম?
  - আমি কি "সবাই তাই বলে" এবং "প্রমাণ এটিকে সমর্থন করে" এর মধ্যে গুলিয়ে ফেলছি?

in_more_detail: |
  টিমুর কুরান এবং ক্যাস সানস্টেইন বর্ণনা করেছেন কিভাবে অ্যাভেইলেবিলিটি ক্যাসকেড কাজ করে:
  তথ্যের সহজলভ্যতা (আমরা কত ঘন ঘন কিছু শুনি) এবং বিশ্বাসযোগ্যতা (এটি কতটা বিশ্বাসযোগ্য মনে হয়)
  একে অপরকে শক্তিশালী করে। মিডিয়া কভারেজ, সোশ্যাল মিডিয়া এবং জনDiscourse নির্দিষ্ট ধারণাগুলিকে
  প্রচারিত করে। একবার একটি ধারণা সহজলভ্যতার একটি নির্দিষ্ট পর্যায়ে পৌঁছালে, এটি দ্রুত ছড়িয়ে
  পড়তে পারে এবং "সাধারণ জ্ঞান" হয়ে উঠতে পারে এমনকি যদি এটি মিথ্যা বা অতিরঞ্জিত হয়।

  অ্যাভেইলেবিলিটি ক্যাসকেড উপকারী (গুরুত্বপূর্ণ সতর্কতা ছড়িয়ে দেওয়া) বা ক্ষতিকর (আতঙ্ক বা ভুল তথ্য
  ছড়িয়ে দেওয়া) হতে পারে। এগুলি অ্যাভেইলেবিলিটি হিউরিস্টিক এবং সোশ্যাল প্রুফ দ্বারা চালিত হয়।

why_this_is_important: |
  অ্যাভেইলেবিলিটি ক্যাসকেড সনাক্তকরণ আপনাকে এটি মূল্যায়ন করতে সাহায্য করে যে ব্যাপক
  বিশ্বাস প্রমাণকে প্রতিফলিত করে নাকি কেবল পুনরাবৃত্তিকে। এটি ব্যাখ্যা করে কিভাবে ধারণাগুলি
  ভাইরাল হয় এবং কিভাবে সম্মিলিত বিশ্বাস ভুল হতে পারে। এটি মিডিয়া সাক্ষরতা এবং সমালোচনামূলক
  চিন্তাভাবনার জন্য অপরিহার্য।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - ঝুঁকি_মূল্যায়ন
  - শিক্ষা
  - নেতৃত্ব

how_can_you_spot_it:
  repetition_plausibility_spiral: |
    একটি ধারণা যত বেশি পুনরাবৃত্তি হয়, ততই বিশ্বাসযোগ্য মনে হয়।
  media_amplification: |
    কভারেজ বিশ্বাস চালিত করে যা আরও কভারেজ চালিত করে।
  social_proof_belief: |
    "সবাই এটি বিশ্বাস করে" বিশ্বাসের প্রমাণ হয়ে ওঠে।
  threshold_effects: |
    একবার একটি ধারণা দৃশ্যমানতার একটি নির্দিষ্ট পর্যায় অতিক্রম করলে, এটি দ্রুত ছড়িয়ে পড়ে।

examples:
  health_scares: |
    একটি গবেষণা পরামর্শ দেয় যে একটি পণ্য বিপজ্জনক; মিডিয়া এটিকে প্রচার করে;
    জনসাধারণ এটি এড়িয়ে চলে; আরও কভারেজ অনুসরণ করে। ঝুঁকিটি
    অতিরঞ্জিত হতে পারে।
  financial_panic: |
    ব্যাংকের ব্যর্থতার গুজব ছড়িয়ে পড়ে; লোকেরা টাকা তুলে নেয়; দৌড়টি
    স্ব-পূরণমূলক হয়ে ওঠে।
  social_media: |
    একটি আখ্যান ভাইরাল হয়; পুনরাবৃত্তি বিশ্বাস বাড়ায়; বিশ্বাস
    শেয়ারিং বাড়ায়। সত্য এবং ভাইরালিটি ভিন্ন হতে পারে।
  organizational: |
    কর্মী ছাঁটাইয়ের গুজব ছড়িয়ে পড়ে; উদ্বেগ বাড়ে; আচরণ
    পরিবর্তিত হয়; প্রতিক্রিয়ার মাধ্যমে গুজব বিশ্বাসযোগ্যতা অর্জন করে।

real_world_implications: |
  অ্যাভেইলেবিলিটি ক্যাসকেড জনমত, নীতি এবং বাজারকে প্রভাবিত করে।
  এগুলি গুরুত্বপূর্ণ সত্য এবং বিপজ্জনক মিথ্যা উভয়ই ছড়িয়ে দিতে পারে।
  সমালোচনামূলক চিন্তাভাবনার জন্য প্রমাণ-ভিত্তিক বিশ্বাসকে
  ক্যাসকেড-চালিত বিশ্বাস থেকে আলাদা করা প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    যখন একটি ধারণা "সর্বত্র" থাকে, তখন জিজ্ঞাসা করুন: এটি কি সত্য হওয়ার কারণে
    পুনরাবৃত্তি হচ্ছে, নাকি সত্য হওয়ার কারণে পুনরাবৃত্তি হচ্ছে? প্রাথমিক উৎস সন্ধান করুন।
  collaborative_learning_initiative: |
    প্রচার করার আগে যাচাই করার নিয়ম তৈরি করুন।
    "যা সবাই জানে" এর প্রশ্ন জিজ্ঞাসা করতে উৎসাহিত করুন। প্রমাণ প্রতিফলিত করে এমন
    ঐক্যমত এবং সহজলভ্যতা প্রতিফলিত করে এমন ঐকমত্যের মধ্যে পার্থক্য করুন।

how_can_this_be_misapplied:
  dismissing_all_consensus: |
    কখনও কখনও ব্যাপক বিশ্বাস সঠিক হয়। সমস্ত
    জনপ্রিয় ধারণা ক্যাসকেড বলে ধরে নেবেন না।
  conspiracy_thinking: |
    "অ্যাভেইলেবিলিটি ক্যাসকেড" ব্যবহার করে বৈধ
    উদ্বেগগুলিকে তৈরি বলে খারিজ করা।
  false_skepticism: |
    জনপ্রিয় হওয়ার কারণে সুপ্রতিষ্ঠিত ধারণা প্রত্যাখ্যান করা।
  contrarianism: |
    যা ব্যাপকভাবে বিশ্বাস করা হয় তা ভুল হতে হবে বলে ধরে নেওয়া।

