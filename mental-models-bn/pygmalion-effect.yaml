# Pygmalion Effect
# Mental Model / Cognitive Bias - Example Entry

id: pygmalion_effect
name: পিগম্যালিয়ন প্রভাব

quick_introduction: |
  পিগম্যালিয়ন প্রভাব (বা রোশেন্থাল প্রভাব) হলো এমন একটি ঘটনা যেখানে উচ্চতর প্রত্যাশা উন্নত পারফরম্যান্সের দিকে পরিচালিত করে। যখন শিক্ষক, ম্যানেজার বা অন্যরা কারো কাছ থেকে বেশি প্রত্যাশা করে, তখন সেই ব্যক্তি আরও ভালো পারফর্ম করতে থাকে। প্রত্যাশাগুলো আত্ম-পূরণকারী ভবিষ্যদ্বাণীতে পরিণত হয়।

one_liner: উচ্চতর প্রত্যাশা উন্নত পারফরম্যান্সের দিকে পরিচালিত করে—প্রত্যাশা বাস্তবতাকে রূপ দেয়।

try_this:
  - উচ্চ কিন্তু অর্জনযোগ্য প্রত্যাশা সেট করুন; সেগুলো স্পষ্টভাবে যোগাযোগ করুন।
  - লক্ষ্য করুন কখন কম প্রত্যাশা কারো পারফরম্যান্সকে সীমাবদ্ধ করতে পারে।
  - জিজ্ঞাসা করুন: আমি নিগূঢ়ভাবে কী আশা করছি—এবং তা ফলাফলে কীভাবে প্রভাব ফেলতে পারে?

ask_yourself:
  - আমার প্রত্যাশা কি এই ব্যক্তিকে সাহায্য করছে নাকি সীমাবদ্ধ করছে?
  - উচ্চতর প্রত্যাশা কি আমার তাদের সাথে আচরণ—এবং তাদের ফলাফল পরিবর্তন করবে?

in_more_detail: |
  রবার্ট রোশেন্থাল এবং লেনোর জ্যাকবসন শিক্ষকদের মিথ্যা তথ্য দিয়েছিলেন যে নির্দিষ্ট কিছু শিক্ষার্থী একাডেমিকভাবে "বিকশিত" হবে। সেই শিক্ষার্থীরা—যারা এলোমেলোভাবে নির্বাচিত হয়েছিল—আসলে অন্যদের চেয়ে বেশি উন্নতি করেছিল। শিক্ষকদের প্রত্যাশা তাদের আচরণকে (বেশি মনোযোগ, উষ্ণ প্রতিক্রিয়া) প্রভাবিত করেছিল, যা শিক্ষার্থীদের পারফরম্যান্সকে প্রভাবিত করেছিল। প্রত্যাশা বাস্তবতাকে রূপ দেয়।

  বিপরীতভাবে—কম প্রত্যাশা খারাপ পারফরম্যান্সের দিকে নিয়ে যায়—একে কখনও কখনও গোলেম প্রভাব বলা হয়। উভয়ই দেখায় যে অন্যদের সম্পর্কে আমাদের বিশ্বাস তাদের ফলাফলে প্রভাব ফেলতে পারে। এর নেতৃত্ব, শিক্ষা এবং প্যারেন্টিং-এর উপর গভীর প্রভাব রয়েছে।

why_this_is_important: |
  পিগম্যালিয়ন প্রভাব বোঝা আপনাকে প্রত্যাশার শক্তিকে কাজে লাগাতে সাহায্য করে। উচ্চ প্রত্যাশা, আন্তরিকভাবে যোগাযোগ করা হলে, পারফরম্যান্স উন্নত করতে পারে। কম প্রত্যাশা আত্ম-পূরণকারী ব্যর্থতা তৈরি করতে পারে। অন্যদের সম্পর্কে আপনার বিশ্বাস গুরুত্বপূর্ণ।

when_to_use:
  - নেতৃত্ব
  - সম্পর্ক_গঠন
  - শিক্ষা
  - সিদ্ধান্ত_গ্রহণ

how_can_you_spot_it:
  expectation_performance_link: |
    যাদের কাছ থেকে আমরা বেশি আশা করি তারা আরও ভালো পারফর্ম করে।
  differential_treatment: |
    আমরা আমাদের প্রত্যাশার উপর ভিত্তি করে মানুষকে ভিন্নভাবে বিবেচনা করি—প্রায়শই
    অচেতনভাবে।
  self_fulfilling_prophecy: |
    দক্ষতা সম্পর্কে বিশ্বাস এমন আচরণকে প্রভাবিত করে যা দক্ষতা তৈরি করে।
  teacher_student_dynamics: |
    শিক্ষকদের প্রত্যাশা ভিন্ন ভিন্ন আচরণের মাধ্যমে শিক্ষার্থীদের ফলাফলে প্রভাব ফেলে।

examples:
  education: |
    যেসব শিক্ষক শিক্ষার্থীদের সফল হওয়ার প্রত্যাশা করেন তারা বেশি সমর্থন দেন;
    সেই শিক্ষার্থীরা উন্নতি করে। যারা ব্যর্থতার প্রত্যাশা করেন তারা
    অনিচ্ছাকৃতভাবে এটি তৈরি করতে পারেন।
  workplace: |
    যেসব ম্যানেজার তাদের অধীনস্থদের কাছ থেকে উচ্চ পারফরম্যান্সের প্রত্যাশা করেন তারা
    বেশি সুযোগ এবং প্রতিক্রিয়া প্রদান করেন; পারফরম্যান্স উন্নত হয়।
  parenting: |
    যেসব অভিভাবক তাদের সন্তানদের দায়িত্বশীল হওয়ার প্রত্যাশা করেন তারা
    তাদের বেশি দায়িত্ব দেন; তারা সে অনুযায়ী কাজ করে।
  stereotypes: |
    স্টিরিওটাইপ থ্রেট হলো এর বিপরীত—নেতিবাচক প্রত্যাশা
    পারফরম্যান্সকে ক্ষতিগ্রস্ত করতে পারে।

real_world_implications: |
  পিগম্যালিয়ন প্রভাব শিক্ষা, ব্যবস্থাপনা এবং সম্পর্ককে প্রভাবিত করে। এটি পরামর্শ দেয় যে প্রত্যাশা বাড়ানো—যখন
  সহযোগিতামূলকভাবে করা হয়—ফলাফল উন্নত করতে পারে। এটি সতর্কও করে যে
  কম প্রত্যাশা ধ্বংসাত্মক হতে পারে।

professional_application:
  networking_and_relationship_building: |
    মানুষের কাছ থেকে উচ্চ প্রত্যাশা রাখুন—এবং সেগুলি পূরণ করার জন্য সহায়তা প্রদান করুন।
    সম্ভাবনায় বিশ্বাস রাখুন। আপনার প্রত্যাশা
    আপনার আচরণকে প্রভাবিত করে, যা তাদের ফলাফলকে প্রভাবিত করে।
  collaborative_learning_initiative: |
    উচ্চ সহায়তার সাথে উচ্চ প্রত্যাশার সংস্কৃতি তৈরি করুন।
    লোকদের "কম পারফর্মার" হিসাবে চিহ্নিত করা এড়িয়ে চলুন যাতে
    তারা আত্ম-পূরণকারী হয়ে ওঠে। যারা সফল হবে বলে আপনি আশা করেন তাদের মধ্যে বিনিয়োগ করুন।

how_can_this_be_misapplied:
  unrealistic_expectations: |
    সহায়তা ছাড়া পূরণ করা অসম্ভব এমন প্রত্যাশা তৈরি করলে
    ব্যর্থতা এবং নিরুৎসাহ তৈরি হয়।
  blame_shifting: |
    "তারা প্রত্যাশা পূরণ করেনি" যখন আমরা
    সাফল্যের জন্য সহায়তা বা শর্ত প্রদান করিনি।
  ignoring_constraints: |
    শুধুমাত্র প্রত্যাশা কাঠামোগত বাধা অতিক্রম করে না।
  pressure_without_support: |
    সম্পদ বা সহায়তা ছাড়া উচ্চ প্রত্যাশা ক্ষতিকর হতে পারে।

