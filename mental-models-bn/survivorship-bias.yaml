# Survivorship Bias
# Mental Model / Cognitive Bias - Example Entry

id: survivorship_bias
name: সারভাইভারশিপ বায়াস (Survivorship Bias)

quick_introduction: |
  সারভাইভারশিপ বায়াস হলো একটি যৌক্তিক ত্রুটি যেখানে আমরা শুধুমাত্র সেইসব ব্যক্তি বা বস্তুর উপর মনোযোগ দেই যারা কোনো প্রক্রিয়া থেকে "বেঁচে গেছে" এবং যারা তা পারেনি তাদের উপেক্ষা করি। আমরা বিজয়ীদের দেখি এবং পরাজিতদের ভুলে যাই, যা সাফল্য ও ব্যর্থতা সম্পর্কে অতিরিক্ত আশাবাদী সিদ্ধান্তে উপনীত করে।

one_liner: আমরা বিজয়ীদের দেখি এবং পরাজিতদের ভুলে যাই—যা অতিরিক্ত আশাবাদী সিদ্ধান্তে উপনীত করে।

try_this:
  - জিজ্ঞাসা করুন: কেউ কি একই রকম কিছু করতে গিয়ে ব্যর্থ হয়েছে? তাদের কাছ থেকে আমরা কী শিখতে পারি?
  - অদৃশ্য নমুনা খুঁজুন—যারা টিকে থাকেনি।
  - লক্ষ্য করুন যখন আপনি শুধুমাত্র সাফল্যের গল্প অধ্যয়ন করছেন।

ask_yourself:
  - আমি কি শুধুমাত্র টিকে থাকা ব্যক্তিদের কাছ থেকে শিখছি?
  - ব্যর্থতাগুলিকে অন্তর্ভুক্ত করলে সম্পূর্ণ ছবিটি কেমন দেখাবে?

in_more_detail: |
  দ্বিতীয় বিশ্বযুদ্ধের সময়, পরিসংখ্যানবিদ আব্রাহাম ওয়াল্ড বোমারু বিমানের বর্মের অবস্থান সংশোধন করেছিলেন বেঁচে যাওয়া বিমানগুলি কোথায় আঘাতপ্রাপ্ত হয়েছিল তা বিশ্লেষণ করে—এবং যেখানে *বেঁচে না থাকা* বিমানগুলি আঘাতপ্রাপ্ত হয়েছিল সেখানে বর্ম লাগানোর পরামর্শ দিয়েছিলেন, কারণ সেই বিমানগুলি আর ফিরে আসেনি। আমরা স্বাভাবিকভাবেই দৃশ্যমান নমুনার (যারা বেঁচে আছে) উপর মনোযোগ দেই এবং অদৃশ্য (যারা ব্যর্থ হয়েছে) তাদের উপেক্ষা করি।

  সারভাইভারশিপ বায়াস উদ্যোক্তা, বিনিয়োগ, কর্মজীবন এবং ইতিহাসের উপর আমাদের দৃষ্টিভঙ্গিকে বিকৃত করে। আমরা সফল কোম্পানিগুলির অধ্যয়ন করি এবং হাজার হাজার কোম্পানিকে উপেক্ষা করি যারা একই রকম কাজ করতে গিয়ে ব্যর্থ হয়েছে। আমরা ভাগ্যবানদের কথা শুনি এবং দুর্ভাগ্যবানদের ভুলে যাই।

why_this_is_important: |
  সারভাইভারশিপ বায়াসকে সংশোধন করলে আরও বাস্তবসম্মত প্রত্যাশা এবং ভাল সিদ্ধান্ত নেওয়া যায়। এটি আপনাকে কেবল সাফল্য নয়, ব্যর্থতা থেকেও শিখতে সাহায্য করে এবং কেবল ভাগ্যবান কয়েকজনের জন্য কাজ করা কৌশলগুলি অনুলিপি করা এড়াতে সাহায্য করে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision-making)
  - বিনিয়োগ (investing)
  - কর্মজীবন_পরিবর্তন (career_moves)
  - শেখা (learning)

how_can_you_spot_it:
  visible_success_stories: |
    আমরা সফল ব্যক্তিদের কাছ থেকে তাদের চেষ্টা করে ব্যর্থ হওয়া ব্যক্তিদের চেয়ে অনেক বেশি শুনি।
  missing_failures: |
    আমরা যে নমুনা পর্যবেক্ষণ করি তাতে যারা "সফল হয়নি" তাদের বাদ দেওয়া হয় এবং তাই তারা তাদের গল্প বলতে পারে না।
  copying_survivors: |
    ধরে নেওয়া যে বেঁচে থাকা ব্যক্তিরা যা করেছে তা তাদের সাফল্যের কারণ, যখন এটি ভাগ্য বা সারভাইভারশিপ হতে পারে।
  overly_optimistic_models: |
    সাফল্যের হারের অনুমান যা চেষ্টার সংখ্যা (denominator) উপেক্ষা করে।

examples:
  entrepreneurship: |
    "জাকারবার্গের মতো কলেজ ছেড়ে দাও" এই উক্তিটি সেইসব অসংখ্য ড্রপআউটদের উপেক্ষা করে যারা বিলিয়ন-ডলারের কোম্পানি প্রতিষ্ঠা করেনি।
  investing: |
    শুধুমাত্র টিকে থাকা ফান্ডগুলির অধ্যয়ন করা সেইসব ফান্ডগুলোকে উপেক্ষা করে যা খারাপ পারফরম্যান্সের পরে বন্ধ হয়ে গেছে, যার ফলে ঐতিহাসিক রিটার্ন ফুলিয়ে-ফাঁপিয়ে দেখানো হয়।
  career_advice: |
    সফল ব্যক্তিরা কঠোর পরিশ্রমকে সাফল্যের কারণ বলে উল্লেখ করেন; আমরা তাদের কথা শুনি না যারা কঠোর পরিশ্রম করে ব্যর্থ হয়েছে।
  historical_analysis: |
    "মহান" কোম্পানিগুলির অধ্যয়ন করা যা টিকে আছে, তারা একই রকম কৌশল নিয়ে ব্যর্থ হওয়া অনেক কোম্পানিকে উপেক্ষা করে।

real_world_implications: |
  সারভাইভারশিপ বায়াস অনুভূত সাফল্যের হারকে বাড়িয়ে তোলে, রোল মডেলকে বিকৃত করে এবং দুর্বল অনুকরণে পরিণত করে। এটিকে সংশোধন করার জন্য ব্যর্থতার ঘটনাগুলি খুঁজে বের করা এবং মৌলিক হার (base rates) বোঝা প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    পরামর্শ চাওয়ার সময়, যারা চেষ্টা করে ব্যর্থ হয়েছে তাদেরও খুঁজুন—তাদের দৃষ্টিভঙ্গি প্রায়শই টিকে থাকা ব্যক্তিদের চেয়ে বেশি তথ্যবহুল হয়।
  collaborative_learning_initiative: |
    ব্যর্থ প্রকল্প এবং বন্ধ হয়ে যাওয়া উদ্যোগগুলি অধ্যয়ন করুন, শুধু সফলগুলো নয়। "ব্যর্থতার পোস্টমর্টেম" পরিচালনা করুন যা কাজ করেনি তা থেকে শিখতে।

how_can_this_be_misapplied:
  excessive_pessimism: |
    অতিরিক্ত সংশোধন করে ধরে নেওয়া যে সাফল্য সবসময় ভাগ্য এবং প্রচেষ্টার কোনো মূল্য নেই।
  dismissing_success: |
    "সারভাইভারশিপ বায়াস" এর কারণে সফল ব্যক্তিদের কাছ থেকে শেখা অস্বীকার করা।
  analysis_paralysis: |
    ব্যর্থতার ঘটনাগুলির উপর এত বেশি মনোযোগ দেওয়া যে আপনি কখনই কোনও পদক্ষেপ নেন না।
  false_equivalence: |
    বেঁচে থাকা এবং বেঁচে না থাকা ব্যক্তিদের কৌশলগুলিকে সমানভাবে তথ্যবহুল হিসাবে বিবেচনা করা যখন প্রেক্ষাপট ভিন্ন হয়।

