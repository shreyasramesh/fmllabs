# বেস রেট ফ্যালাসি
# মানসিক মডেল / জ্ঞানীয় পক্ষপাত - উদাহরণ এন্ট্রি

id: base_rate_fallacy
name: বেস রেট ফ্যালাসি

quick_introduction: |
  বেস রেট ফ্যালাসি হল নির্দিষ্ট, প্রাণবন্ত তথ্যের (বেস রেট) পক্ষে সাধারণ পরিসংখ্যানগত তথ্য উপেক্ষা করার প্রবণতা। আমরা নির্দিষ্ট পরিস্থিতিকে বেশি গুরুত্ব দেই এবং পূর্বের সম্ভাবনাকে কম গুরুত্ব দেই। একটি একক শক্তিশালী গল্প সংখ্যার বক্তব্যকে ছাপিয়ে যেতে পারে।

one_liner: একটি শক্তিশালী গল্প সংখ্যার বক্তব্যকে ছাপিয়ে যেতে পারে।

try_this:
  - একটি কেস বিচার করার আগে জিজ্ঞাসা করুন: এই ধরণের পরিস্থিতির জন্য বেস রেট কী?
  - নির্দিষ্ট প্রমাণকে পূর্বের সম্ভাবনার সাথে একত্রিত করুন—কোনোটিকেই উপেক্ষা করবেন না।
  - লক্ষ্য করুন কখন একটি প্রাণবন্ত উদাহরণ পরিসংখ্যানকে ছাপিয়ে যাচ্ছে।

ask_yourself:
  - আমি কি এই নির্দিষ্ট কেসটিকে বেশি গুরুত্ব দিচ্ছি এবং বেস রেটকে কম গুরুত্ব দিচ্ছি?
  - যদি আমি শক্তিশালী গল্পটিকে সরিয়ে রাখি, তবে সংখ্যাগুলি কী বলবে?

in_more_detail: |
  যদি কোনও রোগ জনসংখ্যার ১% কে প্রভাবিত করে এবং একটি পরীক্ষার ৯৫% নির্ভুলতা থাকে, তবে একটি ইতিবাচক ফলাফল প্রায়শই বোঝায় যে ব্যক্তিটির এখনও সম্ভবত রোগটি নেই—কারণ বেস রেট খুব কম। কিন্তু আমরা বেস রেট উপেক্ষা করি এবং "তারা ইতিবাচক পরীক্ষা করেছে" এ ফোকাস করি। আমরা পরিসংখ্যানের চেয়ে নির্দিষ্ট বিষয় দ্বারা প্রভাবিত হই।

  এই ফ্যালাসি মেডিকেল ডায়াগনোসিস, নিয়োগ, ঝুঁকি মূল্যায়ন এবং আইনি বিচারকে প্রভাবিত করে। আমাদের বেস রেটগুলিকে কেস-নির্দিষ্ট প্রমাণের সাথে একত্রিত করতে হবে বায়েসিয়ান যুক্তির মাধ্যমে—কিন্তু আমরা প্রায়শই তা করি না।

why_this_is_important: |
  বেস রেট ফ্যালাসির জন্য সঠিক মূল্যায়ন রোগ নির্ণয়, ঝুঁকি মূল্যায়ন এবং সিদ্ধান্ত গ্রহণের মান উন্নত করে। এটি আমাদের প্রাণবন্ত কেসগুলির প্রতি অতিরিক্ত প্রতিক্রিয়া এবং পরিসংখ্যানগত বাস্তবতার প্রতি কম প্রতিক্রিয়াশীল হওয়া থেকে রক্ষা করে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - ঝুঁকি_মূল্যায়ন
  - সমস্যা_সমাধান
  - বিনিয়োগ

how_can_you_spot_it:
  ignoring_prior_probabilities: |
    বিচারগুলিতে পূর্বের সম্ভাবনা অন্তর্ভুক্ত করা হয় না।
  vividness_over_statistics: |
    একটি একক কেস বা গল্প সামগ্রিক ডেটার চেয়ে বেশি প্রাধান্য পায়।
  diagnostic_overweighting: |
    বেস রেট বিবেচনা না করে নতুন প্রমাণের (যেমন, পরীক্ষার ফলাফল) অতিরিক্ত ওজন দেওয়া।
  anecdote_override: |
    "আমি এমন কাউকে চিনি যিনি..." পরিসংখ্যানগত প্রমাণকে উপেক্ষা করে।

examples:
  medical: |
    একটি বিরল রোগের জন্য একটি ইতিবাচক পরীক্ষা—বেস রেট কম, তাই একটি ইতিবাচক প্রায়শই একটি মিথ্যা ইতিবাচক। আমরা এটি উপেক্ষা করি এবং ধরে নিই তাদের রোগ আছে।
  hiring: |
    একজন প্রার্থীর একটি দুর্দান্ত সাক্ষাৎকার হয়েছে—আমরা সাক্ষাৎকারের ভিত্তিতে চাকরির পারফরম্যান্সের পূর্বাভাসের বেস রেট উপেক্ষা করি।
  risk: |
    একটি বিমান দুর্ঘটনা প্রাণবন্ত—আমরা উড়ানের ঝুঁকিকে বেশি এবং গাড়ি চালানোর ঝুঁকিকে কম অনুমান করি, বেস রেট উপেক্ষা করে।
  startup_investing: |
    একজন প্রতিষ্ঠাতা ভালভাবে পিচ করেন—আমরা উপেক্ষা করি যে বেশিরভাগ স্টার্টআপ পিচের মান নির্বিশেষে ব্যর্থ হয়।

real_world_implications: |
  বেস রেট ফ্যালাসি চিকিৎসা সিদ্ধান্ত, আইনি বিচার এবং ব্যবসায়িক কৌশলকে প্রভাবিত করে। এটি সম্পদের অপব্যবহার এবং দুর্বল ঝুঁকি মূল্যায়নে অবদান রাখে। বায়েসিয়ান চিন্তাভাবনা এটি সংশোধন করে।

professional_application:
  networking_and_relationship_building: |
    মানুষের মূল্যায়ন করার সময়, বেস রেট বিবেচনা করুন: যেমন, এই ধরণের আচরণ কত ঘন ঘন ঘটে? একটি প্রাণবন্ত মিথস্ক্রিয়াকে বৃহত্তর প্যাটার্নের চেয়ে বেশি গুরুত্ব দেবেন না।
  collaborative_learning_initiative: |
    সিদ্ধান্ত নেওয়ার সময়, কেস-নির্দিষ্ট প্রমাণ অন্তর্ভুক্ত করার আগে স্পষ্টভাবে বেস রেট উল্লেখ করুন এবং বিবেচনা করুন। দলগুলিকে বায়েসিয়ান যুক্তির প্রশিক্ষণ দিন।

how_can_this_be_misapplied:
  base_rate_tyranny: |
    বেস রেট ভিন্ন কিছু ইঙ্গিত দিলেও শক্তিশালী কেস-নির্দিষ্ট প্রমাণ উপেক্ষা করা—কখনও কখনও ব্যক্তি কেসটি ব্যতিক্রম।
  stereotyping: |
    ব্যক্তিদের সম্পর্কে অন্যায্য বিচার করার জন্য বেস রেট ব্যবহার করা।
  false_precision: |
    বেস রেটগুলি যখন মোটামুটি অনুমান হয় তখন মিথ্যা নির্ভুলতার সাথে প্রয়োগ করা।
  dismissing_individuals: |
    "পরিসংখ্যান বলছে এক্স" যখন আপনার সামনে থাকা ব্যক্তি বিতরণের সাথে মানানসই নাও হতে পারে।

