id: zero_sum_thinking
name: শূন্য-যোগ চিন্তা (Zero-Sum Thinking)

quick_introduction: |
  শূন্য-যোগ চিন্তা হলো এই বিশ্বাস যে একজনের লাভ অবশ্যই অন্যজনের ক্ষতি—
  সম্পদ নির্দিষ্ট এবং আপনার যেকোনো সুবিধা মানে আমার অসুবিধা।
  আসলে, অনেক পরিস্থিতিই ইতিবাচক-যোগ: উভয় পক্ষই লাভবান হতে পারে।

one_liner: আপনার লাভ আমার ক্ষতি হওয়ার প্রয়োজন নেই—অনেক পরিস্থিতিই ইতিবাচক-যোগ।

try_this:
  - জিজ্ঞাসা করুন: আমরা কি কেক বড় করতে পারি? এটি কি আসলেই শূন্য-যোগ?
  - প্রতিযোগিতা অনুমান করার আগে সহযোগিতার সুযোগ খুঁজুন।
  - লক্ষ্য করুন কখন আপনি পরিস্থিতিকে স্থির-কেক হিসাবে দেখছেন যখন এটি তা নয়।

ask_yourself:
  - আমি কি এমন কিছু অনুমান করছি যেখানে আমরা কেক বড় করতে পারি?
  - প্রতিযোগিতা থেকে কি সহযোগিতা বেশি মূল্য তৈরি করবে?

in_more_detail: |
  একটি শূন্য-যোগ খেলায়, মোট পরিমাণ নির্দিষ্ট—আপনার লাভ আমার ক্ষতি। ইতিবাচক-যোগ
  পরিস্থিতিতে, সহযোগিতা মূল্য তৈরি করে। বাণিজ্য, উদ্ভাবন এবং সম্পর্ক
  গড়ে তোলা প্রায়শই ইতিবাচক-যোগ। শূন্য-যোগ চিন্তা অপ্রয়োজনীয়
  প্রতিযোগিতা, সহযোগিতার সুযোগ হারানো এবং ধ্বংসাত্মক
  শত্রুতার দিকে পরিচালিত করে।

  এই পক্ষপাতিত্ব আলোচনা, রাজনীতি এবং সাংগঠনিক গতিবিদ্যায় সাধারণ।
  এটি একটি স্থির কেক অনুমান করে যখন কেক প্রায়শই বড় করা যেতে পারে। এটি
  আত্ম-পূরণকারী হতে পারে: যদি আপনি অন্যদের প্রতিপক্ষ হিসাবে দেখেন, তারা প্রতিপক্ষ হয়ে ওঠে।

why_this_is_important: |
  শূন্য-যোগ চিন্তাকে চিনতে পারা সহযোগিতা এবং
  মূল্য তৈরির সুযোগ খুলে দেয়। এটি আলোচনা উন্নত করে, সংঘাত কমায় এবং
  জয়-জয় ফলাফলের সম্ভাবনা বাড়ায়। সেরা সুযোগগুলির অনেকগুলিই ইতিবাচক-যোগ।

when_to_use:
  - আলোচনা (negotiation)
  - নেতৃত্ব (leadership)
  - সম্পর্ক_গড়ে_তোলা (relationship_building)
  - সিদ্ধান্ত_গ্রহণ (decision-making)

how_can_you_spot_it:
  fixed_pie_assumption: |
    "যদি তারা জেতে, আমি হারব" যখন পরিস্থিতি উভয়কেই লাভবান হওয়ার সুযোগ দিতে পারে।
  competitive_ framing: |
    স্বয়ংক্রিয়ভাবে পরিস্থিতিকে আমাদের-বনাম-তাদের হিসাবে ফ্রেম করা।
  envy_of_others_gains: |
    অন্যের সাফল্যকে এমনভাবে ঈর্ষা করা যেন তা আপনার ক্ষতি করছে।
  missed_cooperation: |
    সহযোগিতার সুযোগ দেখতে ব্যর্থ হওয়া যা সকলের উপকারে আসবে।

examples:
  negotiation: |
    এই অনুমান করা যে অন্য পক্ষের জন্য একটি ভাল চুক্তি মানে আপনার জন্য একটি খারাপ চুক্তি—
    যখন সৃজনশীল সমাধানগুলি প্রায়শই উভয়ের জন্য মূল্য বৃদ্ধি করে।
  salary: |
    "যদি আমার সহকর্মী বেতন বৃদ্ধি পায়, তবে আমার জন্য কম থাকবে" যখন বাজেট
    নমনীয় হতে পারে বা মূল্য তৈরির উপর ভিত্তি করে বেতন বৃদ্ধি ন্যায়সঙ্গত হতে পারে।
  politics: |
    "তাদের দলের লাভ আমাদের ক্ষতি" যখন অনেক নীতিগত ফলাফল একাধিক গোষ্ঠীর উপকার করতে পারে।
  career: |
    "তাদের পদোন্নতি মানে আমার জন্য কম সুযোগ" যখন সাংগঠনিক বৃদ্ধি
    সবার জন্য বেশি সুযোগ তৈরি করতে পারে।

real_world_implications: |
  শূন্য-যোগ চিন্তা সংঘাত বাড়ায়, সহযোগিতা সীমিত করে এবং সুযোগ নষ্ট করে।
  এটি প্রায়শই অর্থনীতি, সম্পর্ক এবং
  উদ্ভাবনে ভুল প্রমাণিত হয়। ইতিবাচক-যোগ ফ্রেমকে স্থানান্তরিত করলে ফলাফল উন্নত হয়।

professional_application:
  networking_and_relationship_building: |
    অন্যদের জন্য মূল্য তৈরির উপায় খুঁজুন—তাদের সাফল্য আপনার জন্য
    সুযোগ তৈরি করতে পারে। এমন সম্পর্ক গড়ে তুলুন যেখানে উভয় পক্ষই লাভবান হয়।
  collaborative_learning_initiative: |
    দলীয় লক্ষ্যকে ইতিবাচক-যোগ হিসাবে ফ্রেম করুন: ভাগ করা সাফল্য, কেক বড় করা।
    অভ্যন্তরীণ প্রতিযোগিতার চেয়ে সহযোগিতাকে উৎসাহিত করুন।

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    কিছু পরিস্থিতি শূন্য-যোগ (যেমন, একটি একক পদোন্নতি, একটি নির্দিষ্ট বাজেট)।
    অন্যথায় ভান করা অজ্ঞতা হতে পারে।
  naive_cooperation: |
    এই অনুমান করা যে সবাই সহযোগিতা করবে যখন কিছু পক্ষ প্রকৃতই
    শত্রুতাপূর্ণ।
  undervaluing_competition: |
    প্রতিযোগিতা উন্নতিকে চালিত করতে পারে; সমস্ত শত্রুতা ধ্বংসাত্মক নয়।
  exploitation: |
    "ইতিবাচক-যোগ" ফ্রেম ব্যবহার করে অন্যদের কাছ থেকে মূল্য আদায় করা যারা
    লাভবান হয় না।

