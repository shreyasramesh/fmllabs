# The False Consensus Effect
# Mental Model / Cognitive Bias - Example Entry

id: false_consensus_effect
name: মিথ্যা ঐকমত্য প্রভাব

quick_introduction: |
  মিথ্যা ঐকমত্য প্রভাব হলো অন্যদের সঙ্গে আমাদের বিশ্বাস, মনোভাব এবং আচরণের মিল আছে বলে অতিরিক্ত অনুমান করার প্রবণতা। আমরা ধরে নিই আমাদের মতামত যতটা আছে তার চেয়ে বেশি সাধারণ, এবং আমরা কল্পনা করতে অসুবিধা বোধ করি যে যুক্তিসঙ্গত মানুষ ভিন্নমত পোষণ করতে পারে।

one_liner: আমরা বেশি অনুমান করি যে অন্যরা আমাদের সাথে একমত।

try_this:
  - যারা দ্বিমত পোষণ করেন তাদের সক্রিয়ভাবে সন্ধান করুন—ঐকমত্য অনুমান করবেন না।
  - শুরু করার আগে, যারা আপনার অনুমানগুলি ভাগ করেন না তাদের সাথে পরীক্ষা করুন।
  - জিজ্ঞাসা করুন: যিনি দ্বিমত পোষণ করেন তিনি কী বলবেন? এটিকে গুরুত্ব সহকারে নিন।

ask_yourself:
  - আমি কি অনুমান করছি যে অন্যরা আমার মতো ভাবে?
  - শেষ কবে আমি কারো ভিন্ন মতামত দেখে অবাক হয়েছি?

in_more_detail: |
  যখন আমরা কোনো অবস্থান ধরে রাখি, তখন আমরা সেটিকে স্বাভাবিক বলে মনে করি। আমরা নিজেদের সমমনা লোকেদের সাথে ঘেরা রাখি, নিশ্চিতকারী মিডিয়া গ্রহণ করি, এবং দ্ব্যর্থহীন প্রতিক্রিয়াকে ঐকমত্য হিসাবে ব্যাখ্যা করি। এটি একটি প্রতিধ্বনি চেম্বার তৈরি করে যা ঐকমত্যের বিভ্রমকে শক্তিশালী করে।

  গভীরভাবে পোষণ করা বিশ্বাসগুলির জন্য এবং যখন আমরা আমাদের অবস্থানের প্রতি অত্যন্ত প্রতিশ্রুতিবদ্ধ থাকি তখন এই প্রভাবটি আরও শক্তিশালী হয়। এটি অন্যদের দ্বিমত পোষণ করলে অবাক হতে, আলোচনায় অসুবিধা এবং আমরা যখন গ্রাহকদের আমাদের মতো ভাবার অনুমান করি তখন দুর্বল বাজার গবেষণার দিকে পরিচালিত করতে পারে।

why_this_is_important: |
  মিথ্যা ঐকমত্য প্রভাব শনাক্ত করা আপনাকে প্রকৃত মতভেদগুলির জন্য প্রস্তুত হতে, উন্নত গবেষণা পরিচালনা করতে এবং আরও কার্যকরভাবে যোগাযোগ করতে সহায়তা করে। এটি পণ্য উন্নয়ন, আলোচনা এবং নেতৃত্বের জন্য অপরিহার্য।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - আলোচনা
  - নেতৃত্ব
  - সমস্যা_সমাধান

how_can_you_spot_it:
  surprise_at_disagreement: |
    আপনি যা সহজ বলে মনে করেন তার সাথে যখন কেউ দ্বিমত পোষণ করে তখন আপনি সত্যিই হতবাক হন।
  assuming_shared_values: |
    আপনি এমনভাবে আচরণ করেন যেন অন্যরা আপনার অগ্রাধিকারগুলি ভাগ করে নেয়, পরীক্ষা না করেই।
  underestimating_opposition: |
    আপনি প্রত্যাশার চেয়ে কম প্রতিরোধের মুখোমুখি প্রস্তাবগুলি আশা করেন।
  echo_chamber_detection: |
    আপনার সামাজিক এবং তথ্য পরিবেশ আপনার মতামতকে খুব কমই চ্যালেঞ্জ করে।

examples:
  product_development: |
    একটি দল অনুমান করে যে ব্যবহারকারীরা বৈশিষ্ট্য X চায় কারণ দলের প্রত্যেকে এটি চায়—শুধুমাত্র কম গ্রহণীয়তা খুঁজে পেতে।
  politics: |
    একটি রাজনৈতিক বুদবুদের লোকেরা তাদের প্রত্যাশার সাথে মেলে না এমন নির্বাচনের ফলাফলে অবাক হয়।
  negotiation: |
    অন্য পক্ষ শর্তে সম্মত হবে এমন অনুমান করা কারণ সেগুলি আপনার কাছে "যুক্তিসঙ্গত" বলে মনে হয়।
  hiring: |
    "সংস্কৃতির মানানসই" হওয়ার জন্য নিয়োগের অর্থ হলো আপনার সাথে একমত হওয়া লোকদের নিয়োগ করা, মিথ্যা ঐকমত্যকে শক্তিশালী করা।

real_world_implications: |
  মিথ্যা ঐকমত্য প্রভাব মেরুকরণ, ব্যর্থ পণ্য লঞ্চ এবং ভাঙা আলোচনার ক্ষেত্রে অবদান রাখে। এটি আমাদের ভবিষ্যদ্বাণীগুলির প্রতি অতি আত্মবিশ্বাসী এবং ভিন্নমতের জন্য অপ্রস্তুত করে তোলে।

professional_application:
  networking_and_relationship_building: |
    সক্রিয়ভাবে ভিন্ন দৃষ্টিকোণযুক্ত ব্যক্তিদের সন্ধান করুন। ভাগ করা বিশ্বাসগুলি অনুমান করবেন না—জিজ্ঞাসা করুন এবং শুনুন।
  collaborative_learning_initiative: |
    দলগুলিতে, এটি ব্যয়বহুল হওয়ার আগে মতভেদগুলি প্রকাশ করার জন্য কাঠামোগত ভিন্নমত (যেমন, "প্রিমোর্টেম," ডেভিল'স অ্যাডভোকেট) ব্যবহার করুন।

how_can_this_be_misapplied:
  dismissing_dissent: |
    যারা দ্বিমত পোষণ করেন তাদের অযৌক্তিক বা অজ্ঞ বলে মনে করা, বরং তারা বৈধ ভিন্ন দৃষ্টিকোণ পোষণ করতে পারে তা বিবেচনা করার পরিবর্তে।
  poor_research: |
    গ্রাহক গবেষণা বাদ দেওয়া কারণ "আমরা ইতিমধ্যেই জানি তারা কী চায়।"
  overconfidence: |
    এই অনুমানের উপর ভিত্তি করে সাহসী বাজি তৈরি করা যে অন্যরা একমত হবে।
  groupthink_amplification: |
    যে দলগুলি মিথ্যা ঐকমত্য প্রভাবকে চ্যালেঞ্জ করে না তারা গ্রুপথিংকে প্রভাবিত করতে পারে।

