# নিয়ন্ত্রণের বিভ্রম
# মানসিক মডেল / জ্ঞানীয় পক্ষপাত - উদাহরণ এন্ট্রি

id: illusion_of_control
name: নিয়ন্ত্রণের বিভ্রম

quick_introduction: |
  নিয়ন্ত্রণের বিভ্রম হলো ফলাফলকে প্রভাবিত করার ক্ষমতাকে অতিরিক্ত মূল্যায়ন করার প্রবণতা। আমরা বিশ্বাস করি যে আমাদের যা নিয়ন্ত্রণ আছে তার চেয়ে বেশি আছে—এগুলো এলোমেলো ঘটনা, অন্য মানুষ এবং জটিল ব্যবস্থার উপর। আমরা সহ-সম্পর্ককে কার্যকারণ এবং কাজকে প্রভাবের সাথে গুলিয়ে ফেলি।

one_liner: আমরা ফলাফলের উপর আমাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করি—বিশেষ করে এলোমেলো ফলাফল।

try_this:
  - জিজ্ঞাসা করুন: যদি আমি কিছুই না করতাম তবে কী হত? আমার কাজ কি আসলে ফলাফল তৈরি করছে?
  - আপনি যা নিয়ন্ত্রণ করতে পারেন এবং যা করতে পারেন না তার মধ্যে পার্থক্য করুন।
  - লক্ষ্য করুন কখন আপনি আপনার কাজকে এলোমেলো ফলাফলের সাথে কুসংস্কারপূর্ণভাবে যুক্ত করছেন।

ask_yourself:
  - আমি কি সহ-সম্পর্ককে কার্যকারণ দিয়ে গুলিয়ে ফেলছি?
  - আমি যদি কাজ না করতাম তবে কি ফলাফল ভিন্ন হত?

in_more_detail: |
  মানুষ লটারিতে জেতার ব্যাপারে বেশি আত্মবিশ্বাসী বোধ করে যখন তারা তাদের নিজস্ব নম্বর বেছে নেয়—যদিও এটি জেতার সম্ভাবনাকে পরিবর্তন করে না। যখন আমরা উচ্চ সংখ্যা চাই তখন আমরা ডাইস আরও জোরে রোল করি। আমরা মনে করি আমাদের আচার-অনুষ্ঠান বা আচরণ এমন ফলাফলকে প্রভাবিত করে যা আসলে এলোমেলো বা আমাদের বাইরের কারণগুলির দ্বারা নির্ধারিত। এই বিভ্রমটি আরামদায়ক; এটি উদ্বেগ হ্রাস করে। কিন্তু এটি অতিরিক্ত আত্মবিশ্বাস এবং খারাপ সিদ্ধান্তের দিকে নিয়ে যেতে পারে।

  যখন আমরা প্রক্রিয়ার সাথে জড়িত থাকি, যখন আমাদের প্রাথমিক সাফল্য থাকে এবং যখন কাজটি পরিচিত হয় তখন এই বিভ্রমটি আরও শক্তিশালী হয়। এটি বিনিয়োগ, ব্যবস্থাপনা এবং দৈনন্দিন জীবনে প্রভাব ফেলে।

why_this_is_important: |
  নিয়ন্ত্রণের বিভ্রমকে চিনতে পারা আপনাকে আপনার প্রত্যাশা পরিমাপ করতে, অতিরিক্ত আত্মবিশ্বাস এড়াতে এবং প্রচেষ্টা সেখানে মনোনিবেশ করতে সাহায্য করে যেখানে এটি আসলে গুরুত্বপূর্ণ। এটি ব্যাখ্যা করে কেন আমরা কুসংস্কারপূর্ণ আচরণে লেগে থাকি এবং আমাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করি।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - ঝুঁকি_মূল্যায়ন
  - বিনিয়োগ
  - নেতৃত্ব

how_can_you_spot_it:
  overestimated_influence: |
    বিশ্বাস করা যে আমাদের কাজ ফলাফলের উপর প্রভাব ফেলে যখন আসলে তা করে না।
  ritual_superstition: |
    আচরণ যা আমরা বিশ্বাস করি ফলাফলকে প্রভাবিত করে (ভাগ্যবান শার্ট, খেলার আগে রুটিন) যখন আসলে তা করে না।
  choice_illusion: |
    অনুভব করা যে পছন্দ আমাদের নিয়ন্ত্রণ দেয় যখন আসলে পছন্দটি ফলাফলের উপর প্রভাব ফেলে না।
  action_bias: |
    "অপেক্ষা" করার চেয়ে "কিছু করা" পছন্দ করা এমনকি যখন কাজটি সহায়ক না হয়।

examples:
  gambling: |
    লটারির নম্বর বাছাই করা এলোমেলো নির্বাচনের চেয়ে বেশি নিয়ন্ত্রণযোগ্য বলে মনে হয়—সম্ভাবনা একই।
  investing: |
    সক্রিয় ব্যবসায়ীরা বাজারকে হারানোর ক্ষমতাকে অতিরিক্ত মূল্যায়ন করে; বেশিরভাগই খরচের পরে কম পারফর্ম করে।
  management: |
    নেতারা প্রতিষ্ঠানের ফলাফলের উপর তাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করে; অনেক কারণ তাদের নিয়ন্ত্রণের বাইরে থাকে।
  sports: |
    ভক্তরা বিশ্বাস করে যে তাদের উল্লাস খেলাকে প্রভাবিত করে; খেলোয়াড়দের ভাগ্যবান আচার-অনুষ্ঠান থাকে।

real_world_implications: |
  নিয়ন্ত্রণের বিভ্রম ঝুঁকি গ্রহণ, ব্যর্থ প্রচেষ্টায় অধ্যবসায় এবং ফলাফলের কৃতিত্বের উপর প্রভাব ফেলে। এটি কাজকে অনুপ্রাণিত করতে পারে (কখনও কখনও দরকারী) তবে অপচয় এবং অতিরিক্ত আত্মবিশ্বাসের দিকেও নিয়ে যেতে পারে। ক্যালিব্রেশন সিদ্ধান্ত গ্রহণের মান উন্নত করে।

professional_application:
  networking_and_relationship_building: |
    আপনি কী নিয়ন্ত্রণ করতে পারেন এবং কী করতে পারেন না তা চিনুন। প্রভাবিত করা যায় এমন বিষয়গুলির উপর শক্তি মনোনিবেশ করুন। যে ফলাফলগুলি আপনি তৈরি করেননি তার জন্য কৃতিত্ব নেবেন না—বা যেগুলি আপনি প্রতিরোধ করতে পারেননি তার জন্য দোষ দেবেন না।
  collaborative_learning_initiative: |
    পরিকল্পনা করার সময়, নিয়ন্ত্রণযোগ্য এবং অনিয়ন্ত্রিত বিষয়গুলির মধ্যে পার্থক্য করুন। প্রাথমিক জয় থেকে মিথ্যা আত্মবিশ্বাস এড়িয়ে চলুন। প্রত্যাশা পরিমাপ করতে সম্ভাব্যতার চিন্তাভাবনা ব্যবহার করুন।

how_can_this_be_misapplied:
  learned_helplessness: |
    অতিরিক্ত সংশোধন করে বিশ্বাস করা যে আমাদের কোনো নিয়ন্ত্রণ নেই যখন আসলে আমাদের অর্থপূর্ণ প্রভাব রয়েছে।
  dismissing_agency: |
    "সবই ভাগ্য" যখন অনেক ক্ষেত্রে দক্ষতা এবং প্রচেষ্টা গুরুত্বপূর্ণ।
  false_fatalism: |
    অক্রিয়তা ন্যায্যতা প্রমাণ করতে নিয়ন্ত্রণের বিভ্রম ব্যবহার করা।
  one_size_fits_all: |
    নিয়ন্ত্রণ ক্ষেত্র অনুসারে পরিবর্তিত হয়; কিছু পরিস্থিতি অন্যদের তুলনায় বেশি নিয়ন্ত্রণযোগ্য।

