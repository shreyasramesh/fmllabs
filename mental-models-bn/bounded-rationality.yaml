# Bounded Rationality
# Mental Model / Cognitive Bias - Example Entry

id: bounded_rationality
name: সীমিত যুক্তিবাদ

quick_introduction: |
  সীমিত যুক্তিবাদ হল এই ধারণা যে মানুষের সিদ্ধান্ত গ্রহণ তথ্য, জ্ঞানীয় ক্ষমতা এবং সময়ের দ্বারা সীমাবদ্ধ। আমরা অপ্টিমাইজ করি না; আমরা "সন্তোষজনক" সিদ্ধান্ত নিই—আমরা সেরা সম্ভাব্য বিকল্পের পরিবর্তে যথেষ্ট ভাল বিকল্পগুলি বেছে নিই।

one_liner: আমরা সন্তোষজনক সিদ্ধান্ত নিই—আমরা যথেষ্ট ভাল, সেরা নয়, এমনটি বেছে নিই।

try_this:
  - সম্ভব হলে পছন্দগুলি সরল করুন; অতিরিক্ত বিকল্প সীমিত যুক্তিবাদকে অভিভূত করে।
  - অন্তহীন অনুসন্ধান এড়াতে আগে থেকেই "যথেষ্ট ভাল" মানদণ্ড নির্ধারণ করুন।
  - যখন আপনি প্রান্তিক উপযোগিতা হ্রাসের সীমা অতিক্রম করে অপ্টিমাইজ করছেন তা লক্ষ্য করুন।

ask_yourself:
  - আমি কি নিখুঁত বিকল্প খোঁজার চেষ্টা করছি যখন যথেষ্ট ভালই যথেষ্ট হত?
  - কোন সীমাবদ্ধতাগুলি (সময়, তথ্য, মনোযোগ) আমার সিদ্ধান্তকে সীমিত করছে?

in_more_detail: |
  হার্বার্ট সাইমন এই ধারণাটি উপস্থাপন করেছিলেন নিখুঁত তথ্য সহ যুক্তিবাদী অভিনেতাদের শাস্ত্রীয় অর্থনৈতিক ধারণাকে চ্যালেঞ্জ করার জন্য। বাস্তবে, আমাদের সীমিত মনোযোগ, কার্যক্ষম স্মৃতি এবং সময় রয়েছে। আমরা হিউরিস্টিকস এবং শর্টকাট ব্যবহার করে সিদ্ধান্ত নিই যা আমাদের সীমাবদ্ধতার জন্য "যুক্তিসঙ্গত", এমনকি যদি সেগুলি আদর্শ অর্থে সর্বোত্তম না হয়।

  সীমিত যুক্তিবাদ ব্যাখ্যা করে কেন আমরা সবসময় সেরা বিকল্পটি বেছে নিই না, কেন আমরা সাধারণ নিয়মগুলির উপর নির্ভর করি এবং কেন প্রসঙ্গ এবং উপস্থাপনা এত গুরুত্বপূর্ণ। এটি একটি বর্ণনামূলক মডেল যা আমরা আসলে কীভাবে সিদ্ধান্ত নিই তা বোঝায়, আমরা কীভাবে সিদ্ধান্ত নেওয়া উচিত তার একটি নির্দেশনা নয়।

why_this_is_important: |
  সীমিত যুক্তিবাদ বোঝা আপনাকে আরও ভাল প্রক্রিয়া ডিজাইন করতে, অন্যদের জন্য পছন্দগুলি সহজ করতে এবং সিদ্ধান্ত মানের জন্য বাস্তবসম্মত প্রত্যাশা নির্ধারণ করতে সহায়তা করে। এটি ব্যাখ্যা করে কেন "অযৌক্তিক" আচরণ প্রায়শই সীমাবদ্ধতার অধীনে যুক্তিসঙ্গত।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - সমস্যা_সমাধান
  - নেতৃত্ব
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  satisficing_behavior: |
    লোকেরা পুঙ্খানুপুঙ্খভাবে তুলনা করার পরিবর্তে প্রথম গ্রহণযোগ্য বিকল্পটি বেছে নেয়।
  heuristic_reliance: |
    সিদ্ধান্তগুলি সম্পূর্ণ বিশ্লেষণ না করে সাধারণ নিয়ম ব্যবহার করে নেওয়া হয়।
  context_dependence: |
    একই ব্যক্তি বিকল্পগুলি কীভাবে উপস্থাপন করা হয় তার উপর নির্ভর করে বিভিন্ন পছন্দ করে।
  information_overload: |
    যখন অতিরিক্ত তথ্য উপলব্ধ থাকে, তখন সিদ্ধান্ত গ্রহণের মান হ্রাস পেতে পারে।

examples:
  hiring: |
    একজন ম্যানেজার "সেরা" প্রার্থীকে খুঁজে বের করার জন্য অনির্দিষ্টকাল সাক্ষাৎকার নেওয়ার পরিবর্তে যে প্রথম প্রার্থী যোগ্যতার মান পূরণ করে তাকে নিয়োগ করেন।
  consumer_choice: |
    ক্রেতারা দোকানের প্রতিটি পণ্য তুলনা করার পরিবর্তে তাকের প্রথম কয়েকটি বিকল্প থেকে বেছে নেয়।
  policy: |
    ভোটদাতারা প্রতিটি নীতি অবস্থান বিশ্লেষণ করার পরিবর্তে দলীয় আনুগত্য বা কয়েকটি মূল বিষয়কে শর্টকাট হিসেবে ব্যবহার করে।
  daily_routines: |
    লোকেরা প্রতিটি সিদ্ধান্ত পুনরায় অপ্টিমাইজ করার পরিবর্তে অভ্যাস এবং ডিফল্ট অনুসরণ করে।

real_world_implications: |
  সীমিত যুক্তিবাদ বাজার, নীতি নকশা এবং সাংগঠনিক আচরণকে রূপ দেয়। আমলাতন্ত্র এবং পছন্দ স্থাপত্য কাজ করে কারণ তারা আমাদের সীমাগুলিকে বিবেচনা করে। এটি উপেক্ষা করলে অতিরিক্ত জটিল সিস্টেম তৈরি হয় যা মানুষ কার্যকরভাবে ব্যবহার করতে পারে না।

professional_application:
  networking_and_relationship_building: |
    অন্যদের কাছ থেকে রিয়েল-টাইমে জটিল ট্রেড-অফ প্রক্রিয়া করার আশা করবেন না। পছন্দগুলি সরল করুন এবং স্পষ্ট ডিফল্ট প্রদান করুন।
  collaborative_learning_initiative: |
    সীমিত যুক্তিবাদ নিয়ে কাজ করে এমন প্রক্রিয়া ডিজাইন করুন: পছন্দগুলি হ্রাস করুন, ডিফল্ট প্রদান করুন এবং জটিল সিদ্ধান্তের জন্য চেকলিস্ট ব্যবহার করুন।

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    সীমাহীন জ্ঞানীয় ক্ষমতার অনুমান করে প্রক্রিয়া ডিজাইন করা, যা সিদ্ধান্ত ক্লান্তি এবং দুর্বল ফলাফলের দিকে পরিচালিত করে।
  blaming_irrationality: |
    অন্যদের সীমাবদ্ধতা বিবেচনা না করে তাদের পছন্দগুলিকে অযৌক্তিক বলে খারিজ করা।
  exploitation: |
    পছন্দসই ফলাফলের দিকে চালিত করার জন্য ইচ্ছাকৃতভাবে লোকেদের জটিলতার সাথে অভিভূত করা।
  perfectionism: |
    যখন সন্তোষজনক সিদ্ধান্ত প্রায়শই যুক্তিসঙ্গত পদ্ধতি, তখন সর্বোত্তম সিদ্ধান্তের আশা করা।

