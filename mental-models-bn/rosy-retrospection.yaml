# Rosy Retrospection
# Mental Model / Cognitive Bias - Example Entry

id: rosy_retrospection
name: গোলাপী স্মৃতিচারণ

quick_introduction: |
  গোলাপী স্মৃতিচারণ হল অতীতকে সেটির চেয়ে ভালো ছিল এমনভাবে মনে রাখার প্রবণতা।
  সময়ের সাথে সাথে আমরা অতীতের অভিজ্ঞতাগুলোকে আরও ইতিবাচকভাবে স্মরণ করি, অসুবিধাগুলোকে মসৃণ করে এবং ভালো জিনিসগুলোকে বাড়িয়ে তুলি। "ভালো পুরানো দিনগুলো" প্রায়শই আমরা মনে করি ততটা ভালো ছিল না।

one_liner: আমরা অতীতকে সেটির চেয়ে ভালো ছিল এমনভাবে মনে রাখি—"ভালো পুরানো দিনগুলো" ততটা ভালো ছিল না।

try_this:
  - যখন অতীতের সাথে তুলনা করছেন, জিজ্ঞাসা করুন: তখন আমি আসলে কেমন অনুভব করছিলাম?
  - পরে স্মৃতি এবং বাস্তবতার তুলনা করার জন্য একটি ডায়েরি রাখুন।
  - লক্ষ্য করুন কখন নস্টালজিয়া আপনার বর্তমানের বিচারকে প্রভাবিত করছে।

ask_yourself:
  - আমি কি অতীতকে আদর্শ বানাচ্ছি?
  - যদি আমি অতীতে সময় ভ্রমণ করতে পারতাম তবে কি আমি তখন খুশি হতাম?

in_more_detail: |
  আমরা অতীতের অভিজ্ঞতাগুলোর ইতিবাচক দিকগুলো মনে রাখি এবং নেতিবাচকগুলোকে ভুলে যাই বা কমিয়ে দিই। ছুটি, চাকরি এবং সম্পর্কগুলো নস্টালজিয়ার সময়ে মনে করার সময় ততকালীন মুহূর্তের চেয়ে ভালো মনে হয়। এটি অবাস্তব তুলনার দিকে নিয়ে যেতে পারে—আমরা একটি আদর্শ অতীতের সাথে বর্তমানের বিচার করি।

  গোলাপী স্মৃতিচারণ সিদ্ধান্ত গ্রহণকে প্রভাবিত করে যখন আমরা একই (স্মরণীয়) ফলাফলের প্রত্যাশা করে অতীতের পছন্দগুলো পুনরাবৃত্তি করি। এটি এমন সময়ের জন্য নস্টালজিয়াকেও বাড়াতে পারে যা বস্তুনিষ্ঠভাবে খারাপ ছিল। এটি স্মৃতিতে নেতিবাচকতা পক্ষপাতের বিপরীত।

why_this_is_important: |
  গোলাপী স্মৃতিচারণকে স্বীকৃতি দেওয়া আপনাকে আরও বাস্তবসম্মত তুলনা করতে এবং আদর্শ স্মৃতির উপর ভিত্তি করে অতীতের ভুলগুলি পুনরাবৃত্তি এড়াতে সাহায্য করে। এটি ব্যাখ্যা করে কেন আমরা কখনও কখনও বর্তমান অগ্রগতি সত্ত্বেও অতীতের জন্য আকাঙ্ক্ষা করি।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - কর্মজীবনের_সিদ্ধান্ত
  - সম্পর্ক_গড়ে_তোলা
  - শেখা

how_can_you_spot_it:
  idealized_past: |
    "তখন জিনিসগুলি ভাল ছিল" যখন উদ্দেশ্যমূলক পরিমাপগুলি ভিন্ন কিছু দেখাতে পারে।
  selective_positive_memory: |
    অতীতের অভিজ্ঞতা থেকে ভালো জিনিসগুলো মনে রাখা এবং খারাপগুলো ভুলে যাওয়া।
  nostalgia_as_evidence: |
    অতীতের পছন্দগুলো সঠিক ছিল এই প্রমাণ হিসাবে সুন্দর স্মৃতি ব্যবহার করা।
  present_undervaluation: |
    আমরা একটি আদর্শ অতীতের সাথে তুলনা করার কারণে বর্তমানকে সেটির চেয়ে খারাপ মনে হয়।

examples:
  career: |
    "আমার আগের চাকরিটা দারুণ ছিল" যখন আপনি ভাল কারণে চাকরি ছেড়েছিলেন—স্মৃতিতে বিরক্তিগুলো মসৃণ হয়ে গেছে।
  relationships: |
    একটি অতীতের সম্পর্ক সম্পর্কে "আমরা খুব খুশি ছিলাম"—সেই সংঘাতগুলো ভুলে যাওয়া যা এর শেষ পর্যন্ত নিয়ে গিয়েছিল।
  childhood: |
    "আমার দিনগুলিতে বাচ্চারা ভালো ছিল" যখন অনেক উদ্দেশ্যমূলক পরিমাপ (স্বাস্থ্য, সুরক্ষা, সুযোগ) উন্নত হয়েছে।
  projects: |
    "সেই প্রকল্পটি মসৃণভাবে সম্পন্ন হয়েছিল" যখন আসলে অনেক বিলম্ব ছিল—আমরা ফলাফল মনে রাখি, প্রক্রিয়া নয়।

real_world_implications: |
  গোলাপী স্মৃতিচারণ জীবন সন্তুষ্টি, কর্মজীবনের সিদ্ধান্ত এবং নস্টালজিয়া-চালিত পছন্দগুলোকে প্রভাবিত করে। এটি অতীতের ভুলগুলি পুনরাবৃত্তি বা অবাস্তব তুলনার দিকে নিয়ে যেতে পারে। এটি "ভালো পুরানো দিনে ফিরে যাওয়া" বক্তব্যের আবেদনকেও ব্যাখ্যা করে।

professional_application:
  networking_and_relationship_building: |
    অতীতের সহকর্মীদের সাথে পুনরায় সংযোগ স্থাপন বা অতীতের ভূমিকায় ফিরে যাওয়ার কথা বিবেচনা করার সময়, নস্টালজিয়াকে বাস্তবতার থেকে আলাদা করুন। ছাড়ার সময় আপনার কারণগুলো নথিভুক্ত করুন; ফিরে আসার আগে সেগুলো পর্যালোচনা করুন।
  collaborative_learning_initiative: |
    রেট্রোস্পেকটিভগুলিতে, আসলে কী ঘটেছিল তা মূল্যায়ন করার জন্য স্মৃতির পরিবর্তে সমসাময়িক নোট বা ডেটা ব্যবহার করুন। স্মৃতি অসুবিধাগুলোকে মসৃণ করে।

how_can_this_be_misapplied:
  dismissing_nostalgia: |
    সমস্ত নস্টালজিয়া বিভ্রান্তিকর নয়—কখনও কখনও অতীত কিছু উপায়ে সত্যিই ভালো ছিল।
  invalidating_memories: |
    লোকদের বলা যে তাদের ইতিবাচক স্মৃতি "ভুল" যখন তারা প্রকৃত ব্যক্তিগত অভিজ্ঞতা প্রতিফলিত করতে পারে।
  overcorrection: |
    এই ধারণা করা যে অতীত সবসময় আমরা যা মনে করি তার চেয়ে খারাপ ছিল—কখনও কখনও এটি ভাল ছিল।
  present_bias: |
    বর্তমান অবক্ষয় সম্পর্কে বৈধ উদ্বেগ উপেক্ষা করার অজুহাত হিসাবে গোলাপী স্মৃতিচারণ ব্যবহার করা।

