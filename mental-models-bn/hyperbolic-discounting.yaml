id: hyperbolic_discounting
name: হাইপারবোলিক ডিসকাউন্টিং

quick_introduction: |
  হাইপারবোলিক ডিসকাউন্টিং হল বর্তমানের ছোট পুরষ্কারের চেয়ে ভবিষ্যতের বড় পুরষ্কারকে কম মূল্য দেওয়ার প্রবণতা—এবং যুক্তিসঙ্গত মডেলের ভবিষ্যদ্বাণীর চেয়ে ভবিষ্যতে আরও বেশি ছাড় দেওয়া। আমরা বর্তমানকে অতিরিক্ত মূল্যায়ন করি এবং ভবিষ্যতের গুরুত্বকে অসঙ্গতভাবে অবমূল্যায়ন করি।

one_liner: আমরা বড় পুরস্কারের চেয়ে ছোট পুরস্কারকে অগ্রাধিকার দিই—এবং ভবিষ্যতকে অসঙ্গতভাবে ছাড় দিই।

try_this:
  - পূর্ব-প্রতিশ্রুতি: শান্ত অবস্থায় থাকাকালীন আপনার ভবিষ্যতের জন্য পছন্দ করুন।
  - 'পুনরায় ব্যাখ্যা করুন: "আমি কি এটা ১০ মিনিট পরে চাইব? ১০ মাস পরে?" অসঙ্গতি প্রকাশ করার জন্য।'
  - ভাল পছন্দের জন্য আপনার ভবিষ্যতের নিজেকে আবদ্ধ করতে প্রতিশ্রুতিবদ্ধ ডিভাইস ব্যবহার করুন।

ask_yourself:
  - আমি কি আমার ভবিষ্যতের কথা ভেবে বর্তমানকে অতিরিক্ত মূল্যায়ন করছি?
  - যদি পুরস্কার এক দিনের জন্য বিলম্বিত হয় তবে কি আমি এই পছন্দটি করতাম? এক বছরের জন্য?

in_more_detail: |
  আমরা হয়তো এক বছরে ১০০ টাকার পরিবর্তে আজ ৫০ টাকা পছন্দ করতে পারি, কিন্তু আবার দুই বছরে ১০০ টাকার পরিবর্তে এক বছরে ৫০ টাকা পছন্দ করতে পারি—যদিও এটি অসঙ্গত। আমাদের ডিসকাউন্টের হার ধ্রুবক নয়; এটি হাইপারবোলিক। নিকট ভবিষ্যতকে অনেক বেশি ছাড় দেওয়া হয়; দূর ভবিষ্যতকে কম ছাড় দেওয়া হয়। এটি দীর্ঘসূত্রিতা, আসক্তি এবং সঞ্চয়ের অভাব ব্যাখ্যা করে।

  বর্তমান পক্ষপাতিত্ব একটি সম্পর্কিত ধারণা: আমরা বর্তমান মুহূর্তকে
  অসামঞ্জস্যপূর্ণভাবে বেশি গুরুত্ব দিই। হাইপারবোলিক ডিসকাউন্টিং ব্যাখ্যা করে কেন আমরা প্রতিশ্রুতি করি যা আমরা রাখি না এবং কেন দীর্ঘমেয়াদী পরিকল্পনা করা কঠিন।

why_this_is_important: |
  হাইপারবোলিক ডিসকাউন্টিং বোঝা আপনাকে ভাল প্রণোদনা ডিজাইন করতে, আপনার ভবিষ্যতের জন্য প্রতিশ্রুতিবদ্ধ হতে এবং স্বল্পমেয়াদী ফাঁদ এড়াতে সাহায্য করে।
  এটি ব্যাখ্যা করে কেন আমরা দীর্ঘসূত্রিতা করি এবং কেন আমরা দীর্ঘমেয়াদী লক্ষ্যগুলির সাথে সংগ্রাম করি।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - কর্মজীবনের_সিদ্ধান্ত
  - বিনিয়োগ
  - নেতৃত্ব

how_can_you_spot_it:
  present_preference: |
    বিলম্বিত, বৃহত্তর পুরস্কারের চেয়ে তাৎক্ষণিক সন্তুষ্টিকে বেছে নেওয়া।
  inconsistent_time_preferences: |
    সময় অতিবাহিত হওয়ার সাথে সাথে বিপরীত হওয়া পছন্দগুলি (যেমন, আমরা আগামীকাল ডায়েট করতে চাই কিন্তু আজ খেতে চাই)।
  commitment_failures: |
    ভবিষ্যৎ যখন বর্তমানে পরিণত হয় তখন আমরা যে পরিকল্পনাগুলি অনুসরণ করি না তা তৈরি করা।
  procrastination: |
    তাৎক্ষণিক স্বাচ্ছন্দ্যের জন্য গুরুত্বপূর্ণ কাজগুলি বিলম্বিত করা।

examples:
  savings: |
    অবসরের জন্য সঞ্চয় করার পরিবর্তে এখনই খরচ করা বেছে নেওয়া—ভবিষ্যৎ বিমূর্ত মনে হয়।
  health: |
    আজ ব্যায়াম এড়িয়ে আরামের জন্য, যদিও আমরা জানি আমরা অনুতপ্ত হব—আগামীকালের অনুতাপ ছাড় দেওয়া হয়।
  addiction: |
    দীর্ঘমেয়াদী স্বাস্থ্যের চেয়ে তাৎক্ষণিক আনন্দ বেছে নেওয়া।
  deadlines: |
    সময়সীমা ঘনিয়ে না আসা পর্যন্ত কিছুই না করা—তারপর "বর্তমান" সময়সীমাকে অন্তর্ভুক্ত করে এবং আমরা কাজ করি।

real_world_implications: |
  হাইপারবোলিক ডিসকাউন্টিং সঞ্চয়, স্বাস্থ্য, শিক্ষা এবং আসক্তিকে প্রভাবিত করে। এটি আত্ম-নিয়ন্ত্রণের অনেক ব্যর্থতা ব্যাখ্যা করে। প্রতিশ্রুতিবদ্ধ ডিভাইস (যেমন, স্বয়ংক্রিয় সঞ্চয়, জবাবদিহিতা) ভবিষ্যতের পছন্দগুলিকে সীমাবদ্ধ করে সাহায্য করতে পারে।

professional_application:
  networking_and_relationship_building: |
    ভবিষ্যতের প্রতিশ্রুতির জন্য জিজ্ঞাসা করার সময়, জবাবদিহিতা তৈরি করুন যা ভবিষ্যতকে "বর্তমান" করে তোলে (যেমন, চেক-ইন, সময়সীমা)। কাঠামো ছাড়া লোকেদের অনুসরণ করবে বলে আশা করবেন না।
  collaborative_learning_initiative: |
    প্রতিশ্রুতিবদ্ধ ডিভাইস ব্যবহার করুন: জনসাধারণের প্রতিশ্রুতি, সময়সীমার প্রতি পূর্ব-প্রতিশ্রুতি, এবং এমন কাঠামো যা দীর্ঘমেয়াদী লক্ষ্যগুলিকে আরও তাৎক্ষণিক মনে করিয়ে দেয়। দীর্ঘ প্রকল্পগুলিকে ছোট মাইলফলকে ভাগ করুন।

how_can_this_be_misapplied:
  excessive_control: |
    "সাহায্য" করার নামে মানুষের পছন্দের উপর অতিরিক্ত নিয়ন্ত্রণ আরোপ করা।
  paternalism: |
    আমরা জানি কী অন্যদের দীর্ঘমেয়াদী স্বার্থের জন্য সেরা বলে অনুমান করা।
  ignoring_present_needs: |
    বিমূর্ত ভবিষ্যতের সুবিধার জন্য বৈধ বর্তমান চাহিদা উপেক্ষা করা।
  one_size_fits_all: |
    মানুষ ডিসকাউন্ট হারে ভিন্ন হয়; সবার একই প্রতিশ্রুতিবদ্ধ ডিভাইস দরকার হয় না।

