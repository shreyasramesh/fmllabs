# Gambler's Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: gamblers_fallacy
name: জুয়াড়ির ভ্রান্তি (Gambler's Fallacy)

quick_introduction: |
  জুয়াড়ির ভ্রান্তি হলো এই ভুল বিশ্বাস যে অতীতের স্বাধীন ঘটনাগুলি ভবিষ্যতের ঘটনাগুলিকে প্রভাবিত করে। পরপর হেড পড়ার পরে, আমরা ভাবি যে টেল "আসন্ন"—যদিও প্রতিটি টসই স্বাধীন। আমরা এলোমেলোতার মধ্যে প্যাটার্ন দেখি এবং যখন কোনো "সংশোধন" বা "পুনরুদ্ধার"-এর প্রয়োজন হয় না তখন তার আশা করি।

one_liner: অতীতের স্বাধীন ঘটনাগুলি ভবিষ্যতের ঘটনাগুলিকে প্রভাবিত করে না—মুদ্রার কোনো স্মৃতি নেই।

try_this:
  - যখন আপনি ভাবেন "আমি একটি জয়ের জন্য অধীর আগ্রহে অপেক্ষা করছি", জিজ্ঞাসা করুন: এই ঘটনাগুলি কি আসলেই স্বাধীন?
  - মিন-এ রিগ্রেশন (প্রকৃত) এবং জুয়াড়ির ভ্রান্তি (মিথ্যা) এর মধ্যে পার্থক্য করুন।
  - এলোমেলোতার মধ্যে প্যাটার্ন দেখলে তা লক্ষ্য করুন।

ask_yourself:
  - আমি কি ধরে নিচ্ছি যে অতীতের ফলাফলগুলি ভবিষ্যতের ফলাফলগুলিকে প্রভাবিত করবে যখন তারা স্বাধীন?
  - একজন পরিসংখ্যানবিদ কি আমার "বদলের জন্য অধীর আগ্রহে অপেক্ষা করছি" যুক্তির সাথে একমত হবেন?

in_more_detail: |
  একটি ন্যায্য মুদ্রা নিক্ষেপে, প্রতিটি নিক্ষেপ স্বাধীন। হেডের সম্ভাবনা সর্বদা ৫০%, অতীতের ফলাফলের নির্বিশেষে। কিন্তু আমরা অনুভব করি যে একটি দীর্ঘ সময় ধরে একটি নির্দিষ্ট ফলাফল অন্যটিকে আরও সম্ভাব্য করে তোলে। আমরা বড় সংখ্যার আইন (অনেক পরীক্ষার পরে, ফলাফলগুলি গড় হয়) এবং স্বল্প-মেয়াদী "সংশোধন" এর মধ্যে গুলিয়ে ফেলি। ক্যাসিনোর কোনো স্মৃতি নেই।

  এই ভ্রান্তি জুয়া, বিনিয়োগ এবং দৈনন্দিন সিদ্ধান্ত গ্রহণকে প্রভাবিত করে। আমরা ধরে নিই যে "ভাগ্য" ভারসাম্য রক্ষা করবে বা আমরা একটি জয়ের জন্য "অধীর আগ্রহে অপেক্ষা করছি"। কখনও কখনও আমরা সঠিক—কিন্তু ভুল কারণে।

why_this_is_important: |
  জুয়াড়ির ভ্রান্তি সনাক্তকরণ জুয়া এবং বিনিয়োগে ব্যয়বহুল ভুল প্রতিরোধ করে। এটি আপনাকে স্বল্প-মেয়াদী প্যাটার্নগুলির অতিরিক্ত ব্যাখ্যা করা এবং মিথ্যা পুনরুদ্ধার আশা করা এড়াতেও সহায়তা করে। এটি মিন-এ প্রকৃত রিগ্রেশন থেকে এই ভ্রান্তিটিকে আলাদা করে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision_making)
  - বিনিয়োগ (investing)
  - ঝুঁকি_মূল্যায়ন (risk_assessment)
  - সমস্যা_সমাধান (problem_solving)

how_can_you_spot_it:
  due_for_a_change: |
    "আমরা এতগুলি হেরেছি—আমরা একটি জয়ের জন্য অধীর আগ্রহে অপেক্ষা করছি।"
  pattern_in_randomness: |
    এলোমেলো ক্রমগুলিতে অর্থপূর্ণ প্যাটার্ন দেখা।
  hot_hand_fallacy: |
    বিশ্বাস করা যে একটি ধারা অব্যাহত থাকবে (সম্পর্কিত তবে বিপরীত ত্রুটি)।
  independence_ignorance: |
    স্বাধীন ঘটনাগুলিকে এমনভাবে বিবেচনা করা যেন তারা সংযুক্ত।

examples:
  gambling: |
    রুলেটে বেশ কয়েকটি লাল হওয়ার পরে, কালো বাজি ধরা কারণ "লাল লাগাতার আসতে পারে না।"
  investing: |
    "বাজার পড়ে গেছে—এটা উপরে যেতেই হবে।"
  hiring: |
    "আমরা বেশ কয়েকজন খারাপ প্রার্থী নিয়োগ করেছি—পরের জন অবশ্যই ভালো হবে।"
  sports: |
    "সে এতগুলি মিস করেছে—সে পরের শটটি নিতে প্রস্তুত।"

real_world_implications: |
  জুয়াড়ির ভ্রান্তি জুয়াতে ক্ষতি এবং খারাপ বিনিয়োগ সিদ্ধান্তের কারণ হয়। এটি ব্যাখ্যা করে কেন আমরা স্বল্প-মেয়াদী প্যাটার্নগুলির অতিরিক্ত ব্যাখ্যা করি। মিন-এ প্রকৃত রিগ্রেশন (যেখানে রিগ্রেস করার জন্য একটি বাস্তব মিন থাকে) থেকে এটিকে আলাদা করা গুরুত্বপূর্ণ।

professional_application:
  networking_and_relationship_building: |
    এইরকম মনে করবেন না যে অতীতের সম্পর্কীয় গতিবিদ্যা ভবিষ্যতে "সংশোধন" হবে—প্রতিটি মিথস্ক্রিয়া কিছুটা স্বাধীন। তবে, যখন কোনও বাস্তব অন্তর্নিহিত কারণ থাকে তখন প্যাটার্নগুলি থেকে শিখুন।
  collaborative_learning_initiative: |
    কর্মক্ষমতা মূল্যায়ন করার সময়, এলোমেলো বৈচিত্র্যকে পদ্ধতিগত পরিবর্তন থেকে আলাদা করুন। স্বল্প-মেয়াদী ধারাগুলি গোলমাল হতে পারে; "ধারা"-গুলিতে অতিরিক্ত প্রতিক্রিয়া জানাবেন না বা মিথ্যা পুনরুদ্ধার আশা করবেন না।

how_can_this_be_misapplied:
  ignoring_regression: |
    কখনও কখনও মিন-এ রিগ্রেশন বাস্তব হয় (যেমন, দক্ষতা কর্মক্ষমতা)। সমস্ত রিভার্সনকে জুয়াড়ির ভ্রান্তি বলে উড়িয়ে দেবেন না।
  false_independence: |
    ঘটনাগুলি স্বাধীন বলে ধরে নেওয়া যখন তারা নয় (যেমন, একই জিনিসের পুনরাবৃত্ত পরিমাপ)।
  overcorrection: |
    যখন রিগ্রেস করার জন্য একটি বাস্তব মিন থাকে তখন কখনও রিভার্সন আশা না করা।
  dismissing_patterns: |
    কিছু প্যাটার্ন বাস্তব—সব ক্রম এলোমেলো নয়।

