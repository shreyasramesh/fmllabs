# জ্ঞানের অভিশাপ
# মানসিক মডেল / জ্ঞানীয় পক্ষপাত - উদাহরণ এন্ট্রি

id: curse_of_knowledge
name: জ্ঞানের অভিশাপ

quick_introduction: |
  জ্ঞানের অভিশাপ হল কোনো কিছু জানার পর সেটা না জানার অনুভূতি কল্পনা করার অসুবিধা। বিশেষজ্ঞরা নতুনদের শেখাতে সংগ্রাম করেন কারণ তারা নতুনদের দৃষ্টিকোণ তৈরি করতে পারেন না। একবার জেনে গেলে, আপনি ভুলে যান যে না জানার অনুভূতি কেমন ছিল।

one_liner: একবার কিছু জানলে, আপনি ভুলে যান যে না জানার অনুভূতি কেমন ছিল।

try_this:
  - ব্যাখ্যা করার সময়, প্রথম নীতিগুলি থেকে শুরু করুন - ধরে নিন আপনার শ্রোতারা কিছুই জানেন না।
  - একজন নতুনকে ব্যাখ্যা করতে বলুন; তাদের বিভ্রান্তি আপনার অন্ধ দাগগুলি প্রকাশ করে।
  - খেয়াল করুন যখন আপনি ধাপগুলি এড়িয়ে যাচ্ছেন বা এমন জার্গন ব্যবহার করছেন যা অন্যেরা নাও জানতে পারে।

ask_yourself:
  - আমি কি ধরে নিচ্ছি অন্যদের আমার মতো একই প্রেক্ষাপট আছে?
  - আমার পটভূমি ছাড়া কেউ কি এটি বুঝবে?

in_more_detail: |
  একটি ক্লাসিক পরীক্ষায়, যারা একটি ধাঁধার উত্তর জানত তারা একটি গানের ছন্দ ট্যাপ করেছিল এবং অন্যদের অনুমান করার আশা করেছিল - তারা অতিমাত্রায় অনুমান করেছিল যে এটি কতটা স্পষ্ট ছিল। ট্যাপকারীরা তাদের মাথায় গানটি "আনহিয়ার" করতে পারেনি।
  জ্ঞান "আঠালো"; অজ্ঞতা অনুকরণ করা কঠিন।

  অভিশাপ শেখানো, যোগাযোগ, পণ্য নকশা এবং নেতৃত্বকে প্রভাবিত করে।
  আমরা ধরে নিই অন্যদের একই প্রেক্ষাপট আছে। আমরা জার্গন ব্যবহার করি। আমরা ধাপ এড়িয়ে যাই। মানুষ যখন "বোঝে না" তখন আমরা অবাক হই।

why_this_is_important: |
  জ্ঞানের অভিশাপকে স্বীকৃতি দেওয়া শিক্ষা, যোগাযোগ এবং পণ্য নকশাকে উন্নত করে। এটি আপনাকে যেখানে আপনি সেখানে না পৌঁছে, লোকেদের যেখানে আছে সেখানে দেখা করতে সহায়তা করে। এটি কার্যকর জ্ঞান স্থানান্তরের জন্য অপরিহার্য।

when_to_use:
  - শিখন
  - নেতৃত্ব
  - সমস্যা_সমাধান
  - সম্পর্ক_নির্মাণ

how_can_you_spot_it:
  obvious_to_you: |
    "এটা স্পষ্ট" যখন এটি কেবল স্পষ্ট কারণ আপনি উত্তরটি জানেন।
  jargon_use: |
    সংজ্ঞায়িত না করে শ্রোতারা জানেন না এমন শব্দ ব্যবহার করা।
  skipped_steps: |
    ধরে নেওয়া যে অন্যরা আপনি যা ছেড়ে দিয়েছেন তা পূরণ করবে।
  frustration_with_learners: |
    "তারা কেন এটা দেখতে পাচ্ছে না?" যখন তাদের আপনার প্রেক্ষাপট নেই।

examples:
  teaching: |
    একজন গণিত অধ্যাপক এমন ধাপগুলি এড়িয়ে যান যা তাদের কাছে "স্পষ্ট" কিন্তু
    ছাত্রদের জন্য অপরিহার্য।
  product_design: |
    ডিজাইনাররা এমন ইন্টারফেস তৈরি করেন যা তাদের কাছে বোধগম্য কিন্তু
    নতুন ব্যবহারকারীদের বিভ্রান্ত করে।
  onboarding: |
    অভিজ্ঞ কর্মচারীরা ভুলে যায় যে নতুন নিয়োগকারীরা কী জানে না এবং
    অপর্যাপ্ত প্রশিক্ষণ প্রদান করে।
  writing: |
    লেখকরা অনুমান করেন যে পাঠকদের একই পটভূমি রয়েছে এবং
    প্রয়োজনীয় প্রেক্ষাপট মিস করেন।

real_world_implications: |
  জ্ঞানের অভিশাপ যোগাযোগ ব্যবধান, ব্যর্থ পণ্য এবং অকার্যকর শিক্ষা তৈরি করে। বিশেষজ্ঞরা কেন খারাপ শিক্ষক হতে পারেন তার এটি একটি কারণ। এটিকে অতিক্রম করার জন্য শ্রোতাদের দৃষ্টিকোণ গ্রহণ করার জন্য ইচ্ছাকৃত প্রচেষ্টা প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    ব্যাখ্যা করার সময়, অন্য ব্যক্তির স্তর থেকে শুরু করুন। জিজ্ঞাসা করুন "তাদের
    ইতিমধ্যে কী জানা আছে?" আপনার পটভূমি নেই এমন কারো সাথে আপনার যোগাযোগ পরীক্ষা করুন।
  collaborative_learning_initiative: |
    "আমাকে পাঁচ বছরের বাচ্চার মতো ব্যাখ্যা করুন" অনুশীলন ব্যবহার করুন। বিশেষজ্ঞদের
    নতুনদের শেখান এবং প্রতিক্রিয়া পান। এমন ডকুমেন্টেশন তৈরি করুন যা কোনো পূর্ব জ্ঞানের
    প্রয়োজন নেই। সহকর্মী শিক্ষা ব্যবহার করুন - যারা সম্প্রতি শিখেছে তারা নতুনদের দৃষ্টিকোণ মনে রাখে।

how_can_this_be_misapplied:
  oversimplification: |
    অসততা বা অবজ্ঞার পর্যায়ে সরলীকরণ করা।
  false_assumption: |
    ধরে নেওয়া যে অন্যরা তাদের চেয়ে কম জানে - এটিও একটি ক্রমাঙ্কন ব্যর্থতা।
  one_size_fits_all: |
    সমস্ত শ্রোতাদের একই স্তরের ব্যাখ্যার প্রয়োজন হয় না; শ্রোতার সাথে মানানসই করুন।
  avoiding_complexity: |
    কিছু বিষয় জটিল; জ্ঞানের অভিশাপ মানে এই নয় যে আমরা কখনও প্রযুক্তিগত ভাষা ব্যবহার করব না যখন এটি উপযুক্ত।

