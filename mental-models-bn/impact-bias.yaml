id: impact_bias
name: প্রভাব পক্ষপাত

quick_introduction: |
  প্রভাব পক্ষপাত হলো ভবিষ্যতের ঘটনাগুলির প্রতি আমাদের আবেগিক প্রতিক্রিয়ার তীব্রতা এবং সময়কালকে অতিরিক্ত অনুমান করার প্রবণতা। আমরা মনে করি ভালো জিনিসগুলি আমাদের প্রত্যাশার চেয়ে বেশি খুশি করবে এবং খারাপ জিনিসগুলি প্রত্যাশার চেয়ে বেশি দুঃখ দেবে। আমরা আবেগিক পূর্বাভাসের ক্ষেত্রে খারাপ।

one_liner: আমরা অনুমান করি যে ঘটনাগুলি আমাদের সুখকে কতটা প্রভাবিত করবে—এবং কতক্ষণের জন্য।

try_this:
  - Ask: অতীতের অনুরূপ ঘটনাগুলির পরে আমি কেমন অনুভব করেছিলাম? আমরা প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই।
  - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
  - Notice when you're overestimating the lasting effect of a single outcome.

ask_yourself:
  - Am I overestimating how long I'll feel this way?
  - What does past experience say about similar events?

in_more_detail: |
  ড্যানিয়েল গিলবার্ট এবং টিমোথি উইলসন আবেগিক পূর্বাভাস নিয়ে গবেষণা করেছেন: আমরা একটি জয়ের পরে কতক্ষণ ভালো অনুভব করব বা একটি হারের পরে কতক্ষণ খারাপ অনুভব করব তা অতিরিক্ত অনুমান করি। আমরা প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই। আমরা একক ঘটনাগুলির প্রভাবও অতিরিক্ত অনুমান করি—আমরা মনে করি একটি ফলাফল আমাদের সুখকে সংজ্ঞায়িত করবে যখন অনেক কারণ অবদান রাখে। আমরা আমাদের ভবিষ্যতের অনুভূতিগুলির পূর্বাভাস দেওয়ার সময় ভুল জিনিসগুলিতে ফোকাস করি।

  প্রভাব পক্ষপাত প্রধান জীবন সিদ্ধান্তগুলিকে প্রভাবিত করে: আমরা একটি পদোন্নতি, সম্পর্ক বা ক্রয় আমাদের সুখকে কতটা পরিবর্তন করবে তা অতিরিক্ত অনুমান করি। আমরা ক্ষতির স্থায়ী বেদনাও অতিরিক্ত অনুমান করি।

why_this_is_important: |
  প্রভাব পক্ষপাতকে স্বীকৃতি দেওয়া আপনাকে সেই সিদ্ধান্তগুলি আরও ভালভাবে নিতে সাহায্য করে যা প্রকৃতপক্ষে আপনার জীবন উন্নত করবে। এটি সেই ফলাফলগুলিতে অতিরিক্ত বিনিয়োগ কমিয়ে দেয় যা আপনার ভাবনার চেয়ে বেশি গুরুত্বপূর্ণ হবে না, এবং সেই ফলাফলগুলির ভয় কমিয়ে দেয় যা আপনার প্রত্যাশার চেয়ে দীর্ঘস্থায়ী হবে না।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - কর্মজীবনের_পদক্ষেপ
  - ঝুঁকি_মূল্যায়ন
  - সম্পর্ক_গঠন

how_can_you_spot_it:
  overestimated_impact: |
    "এটা সবকিছু বদলে দেবে" যখন অতীতের অনুরূপ ঘটনাগুলির সামান্য স্থায়ী প্রভাব ছিল।
  duration_overestimation: |
    "আমি এটা থেকে কখনোই বের হতে পারব না" যখন আমরা সাধারণত প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই।
  focalism: |
    একটি ঘটনার উপর মনোযোগ দেওয়া এবং সুস্থতাকে প্রভাবিত করে এমন অন্যান্য কারণগুলিকে উপেক্ষা করা।
  adaptation_neglect: |
    ভালো এবং খারাপ উভয় পরিস্থিতিতেই আমরা মানিয়ে নিই তা ভুলে যাওয়া।

examples:
  career: |
    "যদি আমি এই পদোন্নতি পাই, তবে আমি অনেক খুশি হব" যখন অতীতের পদোন্নতিগুলির অস্থায়ী প্রভাব ছিল।
  purchases: |
    "এই গাড়িটি আমাকে খুশি করবে" যখন নতুনত্বের অনুভূতি দ্রুত ফুরিয়ে যায়।
  loss: |
    "আমি এই প্রত্যাখ্যান থেকে কখনোই সেরে উঠব না" যখন আমরা সাধারণত কয়েক মাসের মধ্যে মানিয়ে নিই।
  events: |
    একটি বিবাহ, ছুটি বা গুরুত্বপূর্ণ ঘটনা দীর্ঘমেয়াদী সুখকে কতটা প্রভাবিত করবে তা অতিরিক্ত অনুমান করা।

real_world_implications: |
  প্রভাব পক্ষপাত অর্থ, কর্মজীবন এবং সম্পর্ক সম্পর্কে খারাপ সিদ্ধান্তের দিকে পরিচালিত করে। আমরা সেই অভিজ্ঞতাগুলির জন্য বেশি অর্থ প্রদান করি যেগুলিতে আমরা মানিয়ে নেব এবং সেই ক্ষতিগুলির প্রতি অতিরিক্ত ভয় করি যেগুলি থেকে আমরা সেরে উঠব। এটি নীতি এবং ব্যক্তিগত পরিকল্পনাকে প্রভাবিত করে।

professional_application:
  networking_and_relationship_building: |
    কর্মজীবন বা সম্পর্ক সম্পর্কিত সিদ্ধান্ত নেওয়ার সময়, অতীতের অনুরূপ ঘটনাগুলির পরে আপনি কেমন অনুভব করেছিলেন তা বিবেচনা করুন। প্রত্যাশার চেয়ে প্রভাব কি দীর্ঘস্থায়ী হয়েছিল? ভবিষ্যতের পূর্বাভাসগুলি পরিমার্জন করার জন্য এটি ব্যবহার করুন।
  collaborative_learning_initiative: |
    যখন দলগুলি বাধা বা বিজয়ের মুখোমুখি হয়, তখন তাদের অভিযোজন (adaptation) মনে করিয়ে দিন। "আমরা ভাবার চেয়ে দ্রুত মানিয়ে নেব" এই কথাটি অতিরিক্ত উদযাপন এবং অতিরিক্ত হতাশা উভয়ই কমাতে পারে।

how_can_this_be_misapplied:
  dismissing_all_impact: |
    কিছু ঘটনার স্থায়ী প্রভাব থাকে—যেমন ট্রমা, বড় ক্ষতি। সমস্ত আবেগিক পূর্বাভাসকে পক্ষপাতদুষ্ট হিসাবে বাতিল করবেন না।
  cold_rationality: |
    "এটা কোনো ব্যাপার হবে না" যখন সেই মুহূর্তের অভিজ্ঞতাটি গুরুত্বপূর্ণ।
  undervaluing_experiences: |
    "আমরা যাই হোক না কেন মানিয়ে নেব" বলে ইতিবাচক অভিজ্ঞতা এড়িয়ে যাওয়া।
  invalidating_emotions: |
    মানুষকে তাদের অনুভূতি কেটে যাবে বলা যখন তাদের সেই মুহূর্তে সমর্থনের প্রয়োজন।

