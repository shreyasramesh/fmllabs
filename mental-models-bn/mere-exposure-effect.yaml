# Mere Exposure Effect
# Mental Model / Cognitive Bias - Example Entry

id: mere_exposure_effect
name: Mere Exposure Effect

quick_introduction: |
  Mere exposure effect হল পরিচিতির কারণে কোনো কিছুর প্রতি পছন্দ তৈরি হওয়ার প্রবণতা।
  বারবার দেখলেই—কোনো রকম সমর্থন ছাড়াই—পছন্দ বাড়ে। আমরা যা জানি, তাই বেশি পছন্দ করি।

one_liner: পরিচিতি পছন্দ তৈরি করে—আমরা যা আগে দেখেছি, তাই বেশি পছন্দ করি।

try_this:
  - Ask: আমি কি এটা ভালো বলে পছন্দ করছি, নাকি এটা আমার পরিচিত বলে?
  - When evaluating options, correct for exposure—new things start at a disadvantage. (বিকল্পগুলি মূল্যায়ন করার সময়, পরিচিতির জন্য সংশোধন করুন—নতুন জিনিসগুলি অসুবিধায় পড়ে শুরু করে।)
  - Notice when repetition is influencing your preference. (খেয়াল করুন কখন পুনরাবৃত্তি আপনার পছন্দকে প্রভাবিত করছে।)

ask_yourself:
  - Am I preferring something mainly because I've seen it before? (আমি কি প্রধানত কোনো কিছুকে তাই পছন্দ করছি কারণ আমি এটি আগে দেখেছি?)
  - Would I choose differently if exposure were equal? (যদি পরিচিতির পরিমাণ সমান হতো, তাহলে কি আমি অন্যভাবে নির্বাচন করতাম?)

in_more_detail: |
  রবার্ট জাজোন দেখিয়েছেন যে উদ্দীপনার (মুখ, শব্দ, আকার) বারবার সংস্পর্শ তাদের প্রতি ইতিবাচক অনুভূতি বাড়ায়—এমনকি যখন আমরা সচেতনভাবে সংস্পর্শে আসি না। পরিচিতি বিদ্বেষ নয়, বরং পছন্দ তৈরি করে (অনেক ক্ষেত্রে)। যখন আমরা বিশ্লেষণ করি না এবং যখন সংস্পর্শ সূক্ষ্ম হয় তখন প্রভাব বেশি শক্তিশালী হয়।

  Mere exposure effect ব্র্যান্ডের পছন্দ, আন্তঃব্যক্তিক আকর্ষণ এবং নান্দনিক বিচারকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন আমরা পরিচিত সঙ্গীত পছন্দ করি, কেন বিজ্ঞাপন পুনরাবৃত্তির মাধ্যমে কাজ করে এবং কেন আমরা যাদের আগে দেখেছি তাদের পছন্দ করি—এমনকি মিথস্ক্রিয়া ছাড়াই।

why_this_is_important: |
  Mere exposure effect কে চিনলে আপনি আপনার নিজের পছন্দ বুঝতে পারবেন এবং পুনরাবৃত্তির মাধ্যমে ম্যানিপুলেশন প্রতিরোধ করতে পারবেন। এটি সম্পর্ক এবং ব্র্যান্ডের জন্য দৃশ্যমানতা এবং উপস্থিতি কেন গুরুত্বপূর্ণ তাও ব্যাখ্যা করে। পরিচিতি একটি শক্তিশালী তবে প্রায়শই অচেতন প্রভাব।

when_to_use:
  - relationship_building (সম্পর্ক_গড়ে_তোলা)
  - decision_making (সিদ্ধান্ত_নেওয়া)
  - leadership (নেতৃত্ব)
  - learning (শেখা)

how_can_you_spot_it:
  familiarity_preference: |
    Preferring options we've seen before over novel ones. (নতুন বিকল্পগুলির চেয়ে আমরা আগে দেখেছি এমন বিকল্পগুলি পছন্দ করা।)
  repetition_influence: |
    Repeated exposure increases liking without explicit persuasion. (বারবার সংস্পর্শ স্পষ্ট প্ররোচনা ছাড়াই পছন্দ বাড়ায়।)
  unconscious_influence: |
    The effect works even when we're not aware of the exposure. (সংস্পর্শ সম্পর্কে আমরা সচেতন না থাকলেও এই প্রভাব কাজ করে।)
  brand_recognition: |
    Familiar brands are preferred even when we can't articulate why. (পরিচিত ব্র্যান্ডগুলি পছন্দ করা হয় এমনকি যখন আমরা কারণ ব্যাখ্যা করতে পারি না।)

examples:
  advertising: |
    Repeated exposure to a brand increases preference—even without persuasive messaging. (একটি ব্র্যান্ডের বারবার সংস্পর্শ পছন্দ বাড়ায়—এমনকি প্ররোচনামূলক বার্তা ছাড়াই।)
  music: |
    Songs we've heard before tend to be liked more than new ones on first listen. (আমরা আগে শুনেছি এমন গানগুলি প্রথমবার শোনার সময় নতুন গানের চেয়ে বেশি পছন্দ হয়।)
  people: |
    We tend to like people we've seen repeatedly (e.g., classmates, colleagues) more than strangers—even without interaction. (আমরা যাদের বারবার দেখেছি (যেমন, সহপাঠী, সহকর্মী) তাদের অপরিচিতদের চেয়ে বেশি পছন্দ করি—এমনকি কোনো মিথস্ক্রিয়া ছাড়াই।)
  ideas: |
    Ideas we've encountered before feel more comfortable and credible than novel ones. (আমরা আগে সম্মুখীন হয়েছি এমন ধারণাগুলি নতুন ধারণাগুলির চেয়ে বেশি আরামদায়ক এবং বিশ্বাসযোগ্য মনে হয়।)

real_world_implications: |
  Mere exposure effect গ্রাহকের আচরণ, রাজনৈতিক পছন্দ এবং সামাজিক আকর্ষণকে রূপ দেয়। এটি বিপণনে ব্যবহৃত হয় এবং পরিচিতদের জন্য অন্যায্য সুবিধা তৈরি করতে পারে। এটি ব্যাখ্যা করে কেন বৈচিত্র্যময় পরিচিতি গুরুত্বপূর্ণ—ভিন্নতার সাথে পরিচিতি পক্ষপাত কমায়।

professional_application:
  networking_and_relationship_building: |
    Visibility matters. Showing up, being present, and being seen creates familiarity that builds liking. Don't underestimate the value of repeated low-stakes contact. (দৃশ্যমানতা গুরুত্বপূর্ণ। উপস্থিত থাকা, সক্রিয় থাকা এবং দেখা হওয়া পরিচিতি তৈরি করে যা পছন্দ তৈরি করে। বারবার কম-গুরুত্বের যোগাযোগকে অবমূল্যায়ন করবেন না।)
  collaborative_learning_initiative: |
    Expose people to diverse perspectives and people repeatedly—familiarity can reduce bias. But be aware that mere exposure can also reinforce preference for the status quo. (মানুষকে বারবার বিভিন্ন দৃষ্টিকোণ এবং মানুষের সাথে পরিচিত করুন—পরিচিতি পক্ষপাত কমাতে পারে। তবে সচেতন থাকুন যে সাধারণ পরিচিতিও স্থিতাবস্থার প্রতি পছন্দকে শক্তিশালী করতে পারে।)

how_can_this_be_misapplied:
  manipulation: |
    Deliberately creating repeated exposure to manipulate preferences without consent. (সম্মতি ছাড়াই পছন্দকে ম্যানিপুলেট করার জন্য ইচ্ছাকৃতভাবে বারবার সংস্পর্শ তৈরি করা।)
  false_familiarity: |
    Assuming that familiarity equals quality—sometimes novel options are better. (এটা ধরে নেওয়া যে পরিচিতি মানেই গুণমান—কখনও কখনও নতুন বিকল্পগুলি ভাল হয়।)
  exclusion: |
    If only certain people get exposure, they get unfair advantage. Consider who has access to visibility. (যদি শুধুমাত্র নির্দিষ্ট কিছু লোক পরিচিতি পায়, তারা অন্যায্য সুবিধা পায়। বিবেচনা করুন কার দৃশ্যমানতার অ্যাক্সেস আছে।)
  stagnation: |
    Over-relying on familiarity and never trying new things. (পরিচিতির উপর অতিরিক্ত নির্ভর করা এবং কখনও নতুন জিনিস চেষ্টা না করা।)

