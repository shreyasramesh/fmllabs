id: pareto_principle
name: প্যারেটো নীতি

quick_introduction: |
  প্যারেটো নীতি (বা ৮০/২০ নিয়ম) বলে যে প্রায় ৮০% প্রভাব ২০% কারণ থেকে আসে। অল্প সংখ্যক ইনপুট প্রায়শই বেশিরভাগ আউটপুট তৈরি করে—বিক্রয়, ত্রুটি, গ্রাহক, প্রচেষ্টা, বৈশিষ্ট্য এবং আরও অনেক কিছুতে। অত্যাবশ্যকীয় অল্প সংখ্যক উপর মনোযোগ দিন।

one_liner: ৮০% প্রভাব ২০% কারণ থেকে আসে—অত্যাবশ্যকীয় অল্প সংখ্যক উপর মনোযোগ দিন।

try_this:
  - যে ২০% ইনপুট ৮০% ফলাফল তৈরি করে তা শনাক্ত করুন—সেখানেই দ্বিগুণ করুন।
  - যে ৮০% অল্প উৎপাদন করে তা বাদ দিন বা অগ্রাধিকার কমিয়ে দিন।
  - জিজ্ঞাসা করুন: যদি আমি কয়েকটি জিনিস ভালভাবে করি তবে কোনটি সবচেয়ে বেশি গুরুত্বপূর্ণ হবে?

ask_yourself:
  - আমি কি আমার প্রচেষ্টা সমানভাবে ছড়িয়ে দিচ্ছি যখন কয়েকটি জিনিস বেশি গুরুত্বপূর্ণ?
  - আমার উচ্চ-লিভারেজ ২০% কী?

in_more_detail: |
  ভিলফ্রেডো প্যারেটো পর্যবেক্ষণ করেছিলেন যে ইতালির ৮০% জমি ২০% জনসংখ্যা দ্বারা অধিকৃত ছিল। নীতিটি সাধারণীকরণ করা হয়েছে: গ্রাহকদের ২০% থেকে ৮০% বিক্রয়, কোডের ২০% থেকে ৮০% ত্রুটি, প্রচেষ্টার ২০% থেকে ৮০% ফলাফল। সঠিক অনুপাত পরিবর্তিত হয়, তবে প্যাটার্ন—অসম বন্টন—সাধারণ।

  নীতিটি sugiere করে যে উচ্চ-লিভারেজ ২০% শনাক্তকরণ এবং সেগুলিতে মনোযোগ দেওয়া ফলাফলের নাটকীয়ভাবে উন্নতি করতে পারে। এটি একটি অগ্রাধিকার হিউরিস্টিক, কোনো ভৌত আইন নয়।

why_this_is_important: |
  প্যারেটো নীতি প্রয়োগ করা আপনাকে কঠোরভাবে অগ্রাধিকার দিতে, কম-প্রভাবিত কার্যকলাপে প্রচেষ্টা নষ্ট করা এড়াতে এবং কম পরিশ্রমে বেশি কিছু অর্জন করতে সহায়তা করে। এটি উৎপাদনশীলতা এবং কৌশলের জন্য মৌলিক।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - সমস্যা_সমাধান
  - নেতৃত্ব
  - কর্মজীবনের_সিদ্ধান্ত

how_can_you_spot_it:
  uneven_distribution: |
    X এর একটি ক্ষুদ্র অংশ Y এর একটি বৃহৎ অংশের জন্য দায়ী।
  high_leverage_activities: |
    কয়েকটি ক্রিয়া বেশিরভাগ ফলাফল তৈরি করে।
  low_value_tail: |
    অনেক ক্রিয়াকলাপ অল্প অবদান রাখে; সেগুলিকে ছেঁটে ফেললে ন্যূনতম প্রভাব পড়ে।
  vital_few_vs_trivial_many: |
    মূল বিষয় হল কোনটি কয়েকটি সবচেয়ে গুরুত্বপূর্ণ তা শনাক্ত করা।

examples:
  sales: |
    গ্রাহকদের ২০% রাজস্বের ৮০% উৎপন্ন করে—তাদের ধরে রাখা এবং বৃদ্ধি করার উপর মনোযোগ দিন।
  software: |
    বৈশিষ্ট্যগুলির ২০% ব্যবহারের ৮০% চালিত করে—সেগুলিতে অগ্রাধিকার দিন।
  productivity: |
    কয়েকটি অভ্যাস বা রুটিন আপনার বেশিরভাগ আউটপুট তৈরি করে—সেগুলিতে দ্বিগুণ করুন।
  problems: |
    ত্রুটিগুলির ২০% ক্র্যাশের ৮০% কারণ হয়—প্রথমে সেগুলি ঠিক করুন।

real_world_implications: |
  প্যারেটো নীতি সম্পদ বরাদ্দ, পণ্যের কৌশল এবং ব্যক্তিগত উৎপাদনশীলতাকে নির্দেশ করে। এটিকে উপেক্ষা করলে প্রচেষ্টা খুব পাতলা ছড়িয়ে পড়ে। এটিকে অতিরিক্ত প্রয়োগ করলে "লং টেইল" উপেক্ষা করা হতে পারে যেখানে এটি গুরুত্বপূর্ণ।

professional_application:
  networking_and_relationship_building: |
    আপনার লক্ষ্যগুলির জন্য সবচেয়ে গুরুত্বপূর্ণ সম্পর্কগুলি শনাক্ত করুন। সমানভাবে প্রচেষ্টা ছড়িয়ে দেওয়ার পরিবর্তে সেগুলির উপর অসামঞ্জস্যপূর্ণভাবে বিনিয়োগ করুন।
  collaborative_learning_initiative: |
    দলের কার্যকারিতা উন্নত করার সময়, যে ২০% হস্তক্ষেপ ৮০% ফলাফল চালিত করে তা খুঁজুন। সেখানে প্রশিক্ষণ এবং প্রক্রিয়া পরিবর্তনগুলিতে মনোযোগ দিন।

how_can_this_be_misapplied:
  oversimplification: |
    সব জায়গায় ৮০/২০ প্রযোজ্য বলে ধরে নেওয়া; কিছু বন্টন বেশি সমান।
  neglecting_the_tail: |
    "তুচ্ছ অনেক" উপেক্ষা করা যখন সেগুলি সম্মিলিতভাবে গুরুত্বপূর্ণ (যেমন, অনেক ছোট গ্রাহক, প্রান্তের ঘটনা)।
  false_precision: |
    ৮০/২০ কে আক্ষরিক হিসাবে বিবেচনা করা একটি মোটামুটি হিউরিস্টিক এর পরিবর্তে।
  misidentifying_the_vital_few: |
    ত্রুটিপূর্ণ বিশ্লেষণের কারণে ভুল ২০% এর উপর মনোযোগ দেওয়া।

