# Hanlon's Razor
# Mental Model / Cognitive Bias - Example Entry

id: hanlons_razor
name: হ্যানলনের ক্ষুর (Hanlon's Razor)

quick_introduction: |
  হ্যানলনের ক্ষুর বলে: "যা বোকামি দিয়ে ভালোভাবে ব্যাখ্যা করা যায়, তাকে বিদ্বেষের উপর চাপানো উচিত নয়।" অন্য কথায়, যখন অযোগ্যতা, অবহেলা বা অজ্ঞতা আচরণকে ব্যাখ্যা করতে পারে, তখন খারাপ উদ্দেশ্য অনুমান করবেন না।

one_liner: বিদ্বেষ অনুমান করবেন না যখন অযোগ্যতা বা অবহেলা এটি ব্যাখ্যা করতে পারে।

try_this:
  - যখন কেউ আপনাকে হতাশ করে, তখন জিজ্ঞাসা করুন: এটি কি ভুল বা অজ্ঞতা দ্বারা ব্যাখ্যা করা যেতে পারে?
  - খারাপ উদ্দেশ্য অনুমান করার আগে সহজ ব্যাখ্যায় ডিফল্ট করুন।
  - লক্ষ্য করুন যখন আপনি "তারা আমাকে আঘাত করতে চেয়েছিল" এই ধারণায় ঝাঁপিয়ে পড়ছেন।

ask_yourself:
  - যা বোকামি দিয়ে ব্যাখ্যা করা যেতে পারে, তাকে কি আমি বিদ্বেষের উপর চাপিয়ে দিচ্ছি?
  - তাদের অবস্থানে থাকলে আমি কি একই সন্দেহের সুবিধা পেতাম?

in_more_detail: |
  এই নীতিটি মানুষকে সন্দেহের সুবিধা দেওয়ার জন্য উৎসাহিত করে। যখন কারো কাজ আপনাকে ক্ষতিগ্রস্থ করে বা হতাশ করে, তখন প্রায়শই ডিফল্ট অনুমান হল যে তারা আপনাকে আঘাত করতে চেয়েছিল। হ্যানলনের ক্ষুর প্রস্তাব করে যে এই ধরনের অনেক কাজ অসাবধানতা, তথ্যের অভাব বা খারাপ সম্পাদন থেকে উদ্ভূত হয়—মন্দ উদ্দেশ্য থেকে নয়।

  এর মানে এই নয় যে বিদ্বেষ কখনো বিদ্যমান থাকে না। এর অর্থ হল যখন একটি সহজ ব্যাখ্যা উপযুক্ত হয় তখন আমাদের সবচেয়ে খারাপ ব্যাখ্যায় ঝাঁপিয়ে পড়া উচিত নয়। ক্ষুরishness paranoia কমায়, সম্পর্ক উন্নত করে এবং সমস্যাগুলিতে আরও গঠনমূলকভাবে প্রতিক্রিয়া জানাতে আমাদের সাহায্য করে।

why_this_is_important: |
  হ্যানলনের ক্ষুর প্রয়োগ করলে দ্বন্দ্ব কমে, সম্পর্ক রক্ষা হয় এবং দোষারোপ করার পরিবর্তে সমস্যা সমাধানে শক্তি নিবদ্ধ থাকে। এটি আপনাকে এই অনুমান থেকে রক্ষা করে যে সবাই আপনার ক্ষতি করতে চাইছে।

when_to_use:
  - সংঘাত_সমাধান (conflict_resolution)
  - নেতৃত্ব (leadership)
  - সম্পর্ক_গড়ে_তোলা (relationship_building)
  - সিদ্ধান্ত_গ্রহণ (decision_making)

how_can_you_spot_it:
  quick_assumption_of_malice: |
    আপনি অবিলম্বে একটি নেতিবাচক ফলাফলকে ইচ্ছাকৃত ক্ষতি হিসাবে ব্যাখ্যা করেন।
  personalizing_mistakes: |
    যখন কিছু ভুল হয়, আপনি ধরে নেন এটি ব্যক্তিগতভাবে আপনার দিকে নির্দেশিত ছিল।
  ignoring_alternative_explanations: |
    আপনি অযোগ্যতা, ভুল বোঝাবুঝি বা অবহেলাকে সম্ভাবনা হিসাবে বিবেচনা করেন না।
  escalation_before_inquiry: |
    আপনি কী ঘটেছে তা জিজ্ঞাসা করার আগে রাগ বা প্রতিশোধ নিয়ে প্রতিক্রিয়া জানান।

examples:
  email_tone: |
    একটি রুক্ষ ইমেলকে প্যাসিভ-আগ্রাসী বলে ধরে নেওয়া যখন প্রেরক কেবল তাড়াহুড়োয় থাকতে পারে বা টোনে খারাপ হতে পারে।
  missed_deadline: |
    সহকর্মীর দেরিতে ডেলিভারিকে নাশকতা বলে ব্যাখ্যা করা যখন তারা অতিরিক্ত প্রতিশ্রুতিবদ্ধ হতে পারে বা বাধার সম্মুখীন হতে পারে।
  policy_decisions: |
    আপনার অপছন্দের একটি কোম্পানি নীতি কর্মীদের ক্ষতি করার জন্য ডিজাইন করা হয়েছিল বলে ধরে নেওয়া যখন এটি অন্য একটি সমস্যার সমাধান করার একটি আনাড়ি প্রচেষ্টা হতে পারে।
  traffic: |
    অন্য চালক আপনাকে ইচ্ছাকৃতভাবে কেটেছে বলে ধরে নেওয়া যখন তারা আপনাকে দেখতে না পেয়ে থাকতে পারে।

real_world_implications: |
  হ্যানলনের ক্ষুর কর্মক্ষেত্রের সংস্কৃতি উন্নত করে, মামলা কমায় এবং সংঘাতের সমাধান আরও কার্যকর করে তোলে। অতিরিক্ত ব্যবহার অবহেলাকে উৎসাহিত করতে পারে; কম ব্যবহার অপ্রয়োজনীয় দ্বন্দ্ব তৈরি করে।

professional_application:
  networking_and_relationship_building: |
    যখন কেউ আপনাকে হতাশ করে, তখন খারাপ উদ্দেশ্য অনুমান করার আগে স্পষ্টীকরণ চান। উদার ব্যাখ্যায় ডিফল্ট করে সম্পর্ক রক্ষা করুন।
  collaborative_learning_initiative: |
    দলগুলিতে, এমন একটি সংস্কৃতি তৈরি করুন যেখানে ভুলগুলি প্রমাণিত না হওয়া পর্যন্ত অনিচ্ছাকৃত বলে ধরে নেওয়া হয়। দোষারোপের পরিবর্তে সিস্টেম এবং প্রক্রিয়ার উপর ফোকাস করুন।

how_can_this_be_misapplied:
  excusing_negligence: |
    বারবার অযোগ্যতা বা অবহেলাকে "বিদ্বেষ নয়" বলে খারিজ করে দেওয়া যখন এটি জবাবদিহিতা দাবি করে।
  ignoring_genuine_malice: |
    ক্ষুরishness এত কঠোরভাবে প্রয়োগ করা যে আপনি আসল খারাপ অভিনেতা বা বিষাক্ত আচরণগুলি মিস করেন।
  avoiding_difficult_conversations: |
    কর্মক্ষমতা সংক্রান্ত সমস্যাগুলি মোকাবেলা না করার অজুহাত হিসাবে হ্যানলনের ক্ষুর ব্যবহার করা।
  gaslighting_victims: |
    যে ব্যক্তিকে সত্যিই অন্যায় করা হয়েছে তাকে বলা যে তারা "বিদ্বেষ অনুমান করছে" যখন বিদ্বেষ উপস্থিত ছিল।

