# Regression to the Mean
# Mental Model / Cognitive Bias - Example Entry

id: regression_to_the_mean
name: গড়-এর দিকে প্রত্যাবর্তন

quick_introduction: |
  গড়-এর দিকে প্রত্যাবর্তন হল পরিসংখ্যানগত একটি ঘটনা যেখানে চরম ফলাফলগুলি গড়-এর কাছাকাছি ফলাফল দ্বারা অনুসরণ করা হয়। অস্বাভাবিকভাবে ভালো বা খারাপ ফলাফলের পরে, পরবর্তী ফলাফল সম্ভবত কম চরম হবে—কোনও কার্যকারণ হস্তক্ষেপের কারণে নয়, বরং এলোমেলো ভিন্নতার কারণে।

one_liner: চরম ফলাফলগুলি গড়-এর কাছাকাছি ফলাফল দ্বারা অনুসরণ করা হয়।

try_this:
  - প্রত্যাবর্তন-কে আপনার হস্তক্ষেপের কারণ হিসেবে চিহ্নিত করবেন না—এটি প্রায়শই এমনিতেই ঘটত।
  - চরম ফলাফলের পরে, পরবর্তীটিকে কম চরম বলে আশা করুন।
  - জিজ্ঞাসা করুন: এই পরিবর্তন কি আমার কাজের কারণে হয়েছে, নাকি কেবল গড়-এর দিকে প্রত্যাবর্তন?

ask_yourself:
  - আমি কি আমার হস্তক্ষেপকে সেই সবের জন্য কৃতিত্ব দিচ্ছি বা দোষ দিচ্ছি যা এলোমেলো ভিন্নতা হতে পারে?
  - আমার কাজ ছাড়া কি এটা ঘটত?

in_more_detail: |
  যদি কোনও ছাত্র একটি পরীক্ষায় অস্বাভাবিকভাবে বেশি নম্বর পায়, তাহলে সে পরবর্তী পরীক্ষায় তার গড় নম্বরের কাছাকাছি নম্বর পাবে—কারণ সে "আলস" হয়ে গেছে তা নয়, বরং প্রথম নম্বরটি কিছুটা ভাগ্যের ফল ছিল। একই কথা প্রযোজ্য খেলাধুলা, শেয়ার বাজারের রিটার্ন এবং ব্যবসায়িক মেট্রিকের ক্ষেত্রে। আমরা প্রায়শই "প্রত্যাবর্তন"-কে আমাদের করা কোনও কিছুর (যেমন, শাস্তি বা পুরষ্কার) জন্য দায়ী করি, যখন এটি এমনিতেই ঘটত।

  ড্যানিয়েল কাহনেম্যান বর্ণনা করেছেন কিভাবে বিমান প্রশিক্ষকরা ভুলবশত এই সিদ্ধান্তে পৌঁছেছিলেন যে প্রশংসা কর্মক্ষমতা বাড়ায় এবং সমালোচনা উন্নত করে—তারা চরম কর্মক্ষমতার পরে গড়-এর দিকে প্রত্যাবর্তন পর্যবেক্ষণ করছিলেন।

why_this_is_important: |
  গড়-এর দিকে প্রত্যাবর্তন বোঝা কার্যকারণকে ভুলভাবে চিহ্নিত করা থেকে বিরত রাখে। এটি আপনাকে আউটলায়ারগুলিতে অতিরিক্ত প্রতিক্রিয়া জানানো এবং নয়েজের উপর ভিত্তি করে পরিবর্তন করা থেকে বিরত থাকতে সাহায্য করে। এটি হস্তক্ষেপ এবং কর্মক্ষমতা মূল্যায়নের জন্য অপরিহার্য।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - বিনিয়োগ
  - ঝুঁকি_মূল্যায়ন
  - নেতৃত্ব

how_can_you_spot_it:
  extreme_followed_by_average: |
    অস্বাভাবিকভাবে ভালো বা খারাপ ফলাফল গড়-এর কাছাকাছি একটি ফলাফল দ্বারা অনুসরণ করা হয়।
  spurious_causation: |
    হস্তক্ষেপের ফলে "পুনরুদ্ধার" বা "পতন" কে দায়ী করা যখন প্রত্যাবর্তন এমনিতেই ঘটত।
  overreaction_to_outliers: |
    একটি একক চরম ডেটা পয়েন্টের উপর ভিত্তি করে নীতি বা ব্যক্তিগত পরিবর্তন করা।
  reward_punishment_confusion: |
    বিশ্বাস করা যে শাস্তি "কাজ করেছে" যখন উন্নতি কেবল প্রত্যাবর্তন ছিল।

examples:
  sports: |
    একজন খেলোয়াড় তার কর্মজীবনের সেরা খেলা দেখায়, তারপর গড়ে ফিরে আসে—ভক্তরা "আত্মতুষ্টি"-কে দোষ দিতে পারে।
  investing: |
    একটি স্টক একটি দুর্দান্ত বছর কাটায়, তারপর ফিরে আসে—বিনিয়োগকারীরা খারাপ ব্যবস্থাপনার জন্য পতনকে দায়ী করতে পারে যখন এটি আংশিকভাবে প্রত্যাবর্তন।
  performance_reviews: |
    একজন কর্মচারী একটি খারাপ ত্রৈমাসিক কাটায়, প্রতিক্রিয়া পায়, উন্নতি করে—প্রতিক্রিয়াকে কৃতিত্ব দেওয়া হতে পারে যখন প্রত্যাবর্তন নির্বিশেষে ঘটত।
  medicine: |
    একজন রোগী খারাপ অনুভব করে, চিকিৎসা নেয়, উন্নতি করে—চিকিৎসার কৃতিত্ব দেওয়া হতে পারে যখন কিছু উন্নতি স্বাভাবিক ছিল।

real_world_implications: |
  গড়-এর দিকে প্রত্যাবর্তন শিক্ষক, ডাক্তার, তহবিল ব্যবস্থাপক এবং নিজেদের মূল্যায়নের পদ্ধতিকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন "যা উপরে যায় তা নিচে নামতে হবে" পরিসংখ্যানগতভাবে প্রায়শই সত্য হয়। এটিকে ভুলভাবে বোঝা নষ্ট হওয়া হস্তক্ষেপ এবং প্রতিকারের উপর মিথ্যা আত্মবিশ্বাস ঘটায়।

professional_application:
  networking_and_relationship_building: |
    একটি একক খারাপ মিথস্ক্রিয়াকে অতিরিক্ত ব্যাখ্যা করবেন না—এটি একটি আউটলায়ার হতে পারে যা সম্পর্কের গড়-এর দিকে প্রত্যাবর্তন করবে।
  collaborative_learning_initiative: |
    হস্তক্ষেপ (প্রশিক্ষণ, প্রক্রিয়া পরিবর্তন) মূল্যায়নের সময়, প্রভাবকে প্রত্যাবর্তন থেকে আলাদা করার জন্য নিয়ন্ত্রণ গোষ্ঠী এবং একাধিক ডেটা পয়েন্ট ব্যবহার করুন।

how_can_this_be_misapplied:
  dismissing_all_interventions: |
    ধরে নেওয়া যে কোনও হস্তক্ষেপের পরে যে কোনও উন্নতি "কেবল প্রত্যাবর্তন" যখন বাস্তব প্রভাব বিদ্যমান থাকে।
  underreacting: |
    প্রকৃত সমস্যাগুলি উপেক্ষা করা কারণ "এটি গড়-এর দিকে প্রত্যাবর্তন করবে।"
  statistical_illiteracy: |
    প্রত্যাবর্তনকে এমন একটি শক্তি হিসাবে বিভ্রান্ত করা যা ফলাফলকে "সঠিক" করে—এটি কেবল সম্ভাবনা।
  overconfidence: |
    ধরে নেওয়া যে গড় স্থিতিশীল থাকে যখন অন্তর্নিহিত প্রক্রিয়া পরিবর্তিত হতে পারে।

