# Parkinson's Law
# Mental Model / Cognitive Bias - Example Entry

id: parkinsons_law
name: পার্কিনসন'স ল (Parkinson's Law)

quick_introduction: |
  পার্কিনসন'স ল (Parkinson's Law) বলে যে, "কাজ সম্পন্ন করার জন্য উপলব্ধ সময় পূরণ করতে কাজ প্রসারিত হয়।" একটি কাজকে এক সপ্তাহ সময় দিন, এবং এটি এক সপ্তাহ সময় নেবে; একটি দিন সময় দিন, এবং এটি প্রায়শই একদিনে সম্পন্ন হয়। এটি বাজেট, দলের আকার এবং সম্পদের ক্ষেত্রেও প্রযোজ্য।

one_liner: কাজ সম্পন্ন করার জন্য উপলব্ধ সময় পূরণ করতে কাজ প্রসারিত হয়।

try_this:
  - ফোকাস তৈরি করতে এবং স্কোপ ক্রিপ (scope creep) প্রতিরোধ করতে কঠোর সময়সীমা নির্ধারণ করুন।
  - জিজ্ঞাসা করুন: এই কাজটি যুক্তিসঙ্গতভাবে ন্যূনতম কত সময় নিতে পারে?
  - লক্ষ্য করুন কখন আনুপাতিক মূল্য ছাড়াই অতিরিক্ত সময় বা সম্পদ ব্যবহার করা হচ্ছে।

ask_yourself:
  - আমি কি সময় পূরণ করছি, নাকি কাজটি সত্যিই এটির দাবি করছে?
  - একটি কঠোর সময়সীমা কি উন্নত অগ্রাধিকার তৈরিতে বাধ্য করবে?

in_more_detail: |
  সি. নর্থকোট পার্কিনসন পর্যবেক্ষণ করেছিলেন যে কাজ নির্বিশেষে আমলাতন্ত্র বৃদ্ধি পায়। তিনি আরও লক্ষ্য করেছিলেন যে কাজগুলি উপলব্ধ সময় পূরণ করতে প্রসারিত হয়—আমরা সময়সীমার সাথে আমাদের প্রচেষ্টা এবং গতি সামঞ্জস্য করি। কঠোর সময়সীমা ফোকাস বাড়াতে পারে; শিথিল সময়সীমা দীর্ঘসূত্রিতা এবং স্কোপ ক্রিপ (scope creep) আমন্ত্রণ জানায়।

  এই নিয়মের প্রকল্প পরিচালনা, ব্যক্তিগত উৎপাদনশীলতা এবং সাংগঠনিক নকশার উপর প্রভাব রয়েছে। এটি প্রস্তাব করে যে অগ্রাধিকার তৈরিতে বাধ্য করার মাধ্যমে সীমাবদ্ধতাগুলি ফলাফল উন্নত করতে পারে।

why_this_is_important: |
  পার্কিনসন'স ল (Parkinson's Law) বোঝা আপনাকে আরও ভাল সময়সীমা নির্ধারণ করতে, প্রকল্পগুলিতে অতিরিক্ত-সম্পদ বরাদ্দ এড়াতে এবং যখন "আরও সময়" বা "আরও লোক" সাহায্য করবে না—এবং ক্ষতি করতে পারে—তা চিনতে সাহায্য করে। সীমাবদ্ধতা উত্পাদনশীল হতে পারে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision_making)
  - নেতৃত্ব (leadership)
  - সমস্যা_সমাধান (problem_solving)
  - কর্মজীবনের_পদক্ষেপ (career_moves)

how_can_you_spot_it:
  deadline_driven_effort: |
    সময়সীমা কাছাকাছি আসার সাথে সাথে কাজ দ্রুত হয়; সময়সীমা দূরে থাকলে সামান্য অগ্রগতি হয়।
  scope_expansion: |
    প্রকল্পগুলি ফোকাস বজায় রাখার পরিবর্তে উপলব্ধ সম্পদ পূরণ করতে বৃদ্ধি পায়।
  bureaucratic_growth: |
    কর্মপ্রবাহ বৃদ্ধি না পেলেও সংস্থাগুলি লোক এবং প্রক্রিয়া যোগ করে।
  budget_exhaustion: |
    ব্যয় প্রয়োজনীয় ছিল কিনা তা নির্বিশেষে বাজেট বছরের শেষ নাগাদ সম্পূর্ণরূপে ব্যয় করা হয়।

examples:
  student_deadlines: |
    এক মাস পরে জমা দেওয়ার মতো একটি পেপার শেষ ৪৮ ঘন্টায় লেখা হয়।
  project_management: |
    ৬ মাসের সময়সীমার একটি প্রকল্প ৬ মাস সময় নেয়; ৩ মাসের সময়সীমার সাথে একই স্কোপও সম্পন্ন হতে পারে।
  meetings: |
    একটি ১ ঘন্টার মিটিংয়ে ৩০ মিনিটের মধ্যে কাজ হলেও পুরো ঘন্টা ভরে যায়।
  budgets: |
    আগামী বছরের জন্য একই বাজেট ন্যায্যতা প্রমাণ করতে একটি বিভাগ বছরের শেষ নাগাদ তাদের পূর্ণ বাজেট ব্যয় করে।

real_world_implications: |
  পার্কিনসন'স ল (Parkinson's Law) উৎপাদনশীলতা, সাংগঠনিক ফোলা এবং সম্পদ বরাদ্দের উপর প্রভাব ফেলে। এটি প্রস্তাব করে যে কৃত্রিম সীমাবদ্ধতা (ছোট সময়সীমা, ছোট দল) ফোকাস এবং দক্ষতা উন্নত করতে পারে।

professional_application:
  networking_and_relationship_building: |
    স্কোপ ক্রিপ (scope creep) প্রতিরোধ করতে এবং গতি বজায় রাখতে সহযোগী কাজের জন্য স্পষ্ট, কঠোর সময়সীমা নির্ধারণ করুন।
  collaborative_learning_initiative: |
    মিটিং এবং প্রকল্পের জন্য টাইম-বক্সিং (time-boxing) ব্যবহার করুন। গুণমান ত্যাগ না করেই ফোকাস উন্নত করে কিনা তা পরীক্ষা করার জন্য ছোট সময়সীমা নিয়ে পরীক্ষা করুন।

how_can_this_be_misapplied:
  unrealistic_deadlines: |
    অবাস্তবভাবে ছোট সময়সীমা নির্ধারণ করা যা বার্নআউট (burnout) বা নিম্নমানের কারণ হয়।
  underresourcing: |
    ধারণা করা যে কম সময় বা কম লোক সবসময় কাজ করবে—কিছু কাজের জন্য পর্যাপ্ত সংস্থান প্রয়োজন।
  blame_shifting: |
    "পার্কিনসন'স ল (Parkinson's Law)" এর উপর দোষ চাপানো যখন কাজটি প্রকৃতপক্ষে জটিল ছিল।
  ignoring_quality: |
    স্থায়ী ফলাফলের মূল্যে কৃত্রিম সীমাবদ্ধতা পূরণের জন্য তাড়াহুড়ো করা।

