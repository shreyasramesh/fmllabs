# Probabilistic Thinking
# Mental Model / Cognitive Bias - Example Entry

id: probabilistic_thinking
name: সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা

quick_introduction: |
  সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা হলো নিশ্চিততার পরিবর্তে সম্ভাবনার নিরিখে যুক্তি করার অভ্যাস। "এটা কি ঘটবে?" এই প্রশ্নের পরিবর্তে আমরা জিজ্ঞাসা করি "এটির ঘটার সম্ভাবনা কত?" এটি অনিশ্চয়তাকে আলিঙ্গন করে এবং উন্নত সিদ্ধান্ত নিতে এটি ব্যবহার করে।

one_liner: নিশ্চিততার বদলে সম্ভাবনার নিরিখে চিন্তা করুন—অনিশ্চয়তাকে আলিঙ্গন করুন।

try_this:
  - এটা কি ঘটবে? এর বদলে "এটির ঘটার সম্ভাবনা কত?" ব্যবহার করুন।
  - একাধিক পরিস্থিতি বিবেচনা করুন এবং আনুমানিক সম্ভাবনা নির্ধারণ করুন।
  - নতুন প্রমাণ আসার সাথে সাথে আপনার বিশ্বাস আপডেট করুন।

ask_yourself:
  - আমি কি বাইনারি (হ্যাঁ/না) শব্দে চিন্তা করছি যেখানে সম্ভাবনাগুলি আরও সঠিক হত?
  - সম্ভাব্য ফলাফলের পরিসীমা কত?

in_more_detail: |
  বাস্তব জগতের বেশিরভাগ ফলাফল অনিশ্চিত। সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা বাইনারি হ্যাঁ/না-এর পরিবর্তে graduated beliefs (ক্রমবর্ধমান বিশ্বাস) প্রতিস্থাপন করে। এতে একাধিক পরিস্থিতি বিবেচনা করা, আনুমানিক সম্ভাবনা নির্ধারণ করা এবং প্রমাণ আসার সাথে সাথে আপডেট করা অন্তর্ভুক্ত। এটি অতিরিক্ত আত্মবিশ্বাস এবং সাদা-কালো চিন্তাভাবনার বিপরীত।

  মূল অনুশীলনগুলির মধ্যে রয়েছে: পরিসীমার মধ্যে চিন্তা করা, ভিত্তি হার (base rates) বিবেচনা করা, প্রমাণের সাথে বিশ্বাস আপডেট করা এবং ঝুঁকি (ज्ञात সম্ভাবনা) ও অনিশ্চয়তা (অज्ञात সম্ভাবনা)-এর মধ্যে পার্থক্য করা। এটি ক্যালিব্রেশন (calibration) এবং সিদ্ধান্তের গুণমান উন্নত করে।

why_this_is_important: |
  সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা অতিরিক্ত আত্মবিশ্বাস কমায়, পূর্বাভাস উন্নত করে এবং অনিশ্চয়তার অধীনে উন্নত সিদ্ধান্তের দিকে পরিচালিত করে। এটি বিনিয়োগ, কৌশল এবং যেকোনো ক্ষেত্রে যেখানে ভবিষ্যত অনিশ্চিত, তার জন্য অপরিহার্য।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - ঝুঁকি_মূল্যায়ন
  - বিনিয়োগ
  - সমস্যা_সমাধান

how_can_you_spot_it:
  likelihood_language: |
    "সম্ভবত," "সম্ভাব্য," "অসম্ভব" — "হবে" বা "হবে না" এর পরিবর্তে।
  scenario_thinking: |
    আনুমানিক সম্ভাবনাসহ একাধিক সম্ভাব্য ভবিষ্যতের বিবেচনা।
  calibration: |
    সময়ের সাথে সাথে প্রকৃত ফলাফলের ফ্রিকোয়েন্সির সাথে মিলে যাওয়া পূর্বাভাস।
  uncertainty_acknowledgment: |
    আপনি যা জানেন না তা স্পষ্টভাবে উল্লেখ করা।

examples:
  forecasting: |
    "আমার মনে হয় ডেডলাইন পূরণ করার ৬০% সম্ভাবনা আছে" — "আমরা ডেডলাইন পূরণ করব" এর পরিবর্তে।
  investing: |
    "এটির ২ গুণ হওয়ার ৩০% সম্ভাবনা এবং -৫০% হওয়ার ৭০% সম্ভাবনা আছে" — "এটি রকেটের গতিতে উঠবে" এর পরিবর্তে।
  strategy: |
    একাধিক পরিস্থিতির (সর্বোত্তম, সাধারণ, সবচেয়ে খারাপ অবস্থা) জন্য আনুমানিক সম্ভাবনাসহ পরিকল্পনা করা।
  hiring: |
    "ইন্টারভিউয়ের ভিত্তিতে, আমি মনে করি তাদের সফল হওয়ার সম্ভাবনা ৭০%" — "তারা একটি দারুণ নিয়োগ" এর পরিবর্তে।

real_world_implications: |
  সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা ক্যালিব্রেশন উন্নত করে, বিস্ময় কমায় এবং উন্নত ঝুঁকি ব্যবস্থাপনা সক্ষম করে। এটি কার্যকর পূর্বাভাস এবং অনিশ্চয়তার অধীনে সিদ্ধান্ত গ্রহণের জন্য কেন্দ্রীয়।

professional_application:
  networking_and_relationship_building: |
    উপযুক্ত হলে সম্ভাবনার নিরিখে যোগাযোগ করুন — "আমি বেশ আত্মবিশ্বাসী" বনাম "আমি নিশ্চিত"। এটি জ্ঞানীয় বিনয় (epistemic humility) সংকেত দিয়ে বিশ্বাস তৈরি করে।
  collaborative_learning_initiative: |
    দলকে অনিশ্চয়তা প্রকাশ করতে উৎসাহিত করুন। সম্ভাব্যতা ভিত্তিক রায় উন্নত করতে পূর্বাভাস বাজার (prediction markets) বা ক্যালিব্রেশন অনুশীলন ব্যবহার করুন।

how_can_this_be_misapplied:
  false_precision: |
    এতটা নির্ভুল হতে না পারলেও সুনির্দিষ্ট সম্ভাবনা (যেমন, ৭৩%) নির্ধারণ করা।
  analysis_paralysis: |
    "আমরা নিশ্চিত হতে পারি না" বলে কখনো কাজ না করা।
  hedging_overuse: |
    সবকিছুকে এমনভাবে যোগ্য করে তোলা যে তা অর্থহীন হয়ে যায়।
  dismissing_intuition: |
    শক্তিশালী স্বজ্ঞাত অনুভূতি (gut feelings) যখন তারা বৈধ তথ্য বহন করতে পারে, সেগুলোকে উপেক্ষা করার জন্য অতিরিক্ত সংশোধন করা।

