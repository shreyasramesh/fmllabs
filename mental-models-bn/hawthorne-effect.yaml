# Hawthorne Effect
# Mental Model / Cognitive Bias - Example Entry

id: hawthorne_effect
name: হথর্ন প্রভাব

quick_introduction: |
  হথর্ন প্রভাব হল মানুষের আচরণ পরিবর্তনের প্রবণতা যখন তারা জানে যে তাদের পর্যবেক্ষণ করা হচ্ছে বা অধ্যয়ন করা হচ্ছে। পর্যবেক্ষণের কাজটি নিজেই পরিবর্তন তৈরি করতে পারে—পরীক্ষিত হস্তক্ষেপের কারণে নয়। মানুষ তাদের প্রাপ্ত মনোযোগের প্রতি প্রতিক্রিয়া জানায়।

one_liner: পর্যবেক্ষণ আচরণ পরিবর্তন করে—মনোযোগ নিজেই প্রভাব তৈরি করতে পারে।

try_this:
  - কোনো হস্তক্ষেপের মূল্যায়ন করার সময়, বিবেচনা করুন যে পর্যবেক্ষণ ফলাফল তৈরি করছে কিনা।
  - মনে রাখবেন যে মনোযোগ এবং মূল্যবান বোধ করা কর্মক্ষমতা উন্নত করতে পারে।
  - পর্যবেক্ষণের কারণে পরিবর্তন হলে নির্দিষ্ট হস্তক্ষেপের কারণে পরিবর্তনের জন্য সতর্ক হন।

ask_yourself:
  - এই উন্নতি কি হস্তক্ষেপের কারণে না পর্যবেক্ষণের কারণে?
  - যদি আমরা মনোযোগ দেওয়া বন্ধ করি তাহলে ফলাফল টিকে থাকবে কি?

in_more_detail: |
  হথর্ন ওয়ার্কস প্ল্যান্টে, গবেষকরা দেখতে পান যে যখন তারা আলোর পরিবর্তন করেছিলেন তখন উৎপাদনশীলতা উন্নত হয়েছিল—এবং যখন তারা এটিকে আগের অবস্থায় ফিরিয়ে নিয়ে এসেছিলেন তখনও। মনে হচ্ছে যে উন্নতি নির্দিষ্ট হস্তক্ষেপের কারণে নয়, বরং মনোযোগ এবং পর্যবেক্ষণের কারণে হয়েছিল। পরবর্তীকালে পুনরায় বিশ্লেষণ করে দেখা গেছে যে এই প্রভাবটি বেশি বাড়িয়ে বলা হতে পারে, তবে ধারণাটি দরকারী রয়ে গেছে: অধ্যয়ন করা হচ্ছে বলে আচরণ পরিবর্তন হয়।

  হথর্ন প্রভাব গবেষণা এবং মূল্যায়নকে জটিল করে তোলে। এটি হস্তক্ষেপের আপাত প্রভাবকে ফুলিয়ে-ফাঁপিয়ে দেখাতে পারে। এটি আরও ইঙ্গিত দেয় যে মনোযোগ এবং মূল্যবান বোধ করা কর্মক্ষমতা উন্নত করতে পারে—ব্যবস্থাপনার জন্য একটি শিক্ষা।

why_this_is_important: |
  হথর্ন প্রভাব বোঝা আপনাকে গবেষণার ফলাফল ব্যাখ্যা করতে, আরও ভাল পরীক্ষা ডিজাইন করতে এবং চিনতে সাহায্য করে যে কেবল মনোযোগই পরিবর্তন আনতে পারে। ব্যবস্থাপনার ক্ষেত্রে, এটি ইঙ্গিত দেয় যে মানুষের প্রতি মনোযোগ দেওয়া নির্দিষ্ট হস্তক্ষেপের মতোই গুরুত্বপূর্ণ হতে পারে।

when_to_use:
  - নেতৃত্ব
  - সিদ্ধান্ত_গ্রহণ
  - শিক্ষা
  - সমস্যা_সমাধান

how_can_you_spot_it:
  observation_induced_change: |
    মানুষ যখন জানে যে তাদের দেখা হচ্ছে বা অধ্যয়ন করা হচ্ছে তখন আচরণ পরিবর্তিত হয়।
  attention_effect: |
    মনোযোগ দেওয়ার কাজটি কেবল নির্দিষ্ট পরিবর্তন নয়, উন্নতিও তৈরি করে।
  placebo_analog: |
    একটি প্লেসিবোর মতো, অধ্যয়ন করার "চিকিৎসা" প্রভাব ফেলতে পারে।
  short_term_improvement: |
    পর্যবেক্ষণ শেষ হলে উন্নতি ম্লান হয়ে যেতে পারে।

examples:
  workplace_studies: |
    একটি অধ্যয়নের সময় উৎপাদনশীলতা বৃদ্ধি পায়—এটি কি নতুন প্রক্রিয়া নাকি কেউ দেখছে?
  medical_trials: |
    প্লেসবো গ্রুপগুলোর উন্নতি হয়—আংশিকভাবে কারণ তারা মনোযোগ পাচ্ছে।
  education: |
    শিক্ষার্থীরা যখন গবেষকরা উপস্থিত থাকেন তখন ভাল পারফর্ম করে—"পর্যবেক্ষক প্রভাব"।
  management: |
    ব্যবস্থাপনা যখন মনোযোগ দেয় তখন দলগুলোর উন্নতি হয়—এটি কি নতুন উদ্যোগ নাকি মনোযোগের কারণে?

real_world_implications: |
  হথর্ন প্রভাব গবেষণার বৈধতা এবং প্রোগ্রাম মূল্যায়নের উপর প্রভাব ফেলে। এটি হস্তক্ষেপের প্রভাবকে বেশি অনুমান করার কারণ হতে পারে। এটি একটি ইতিবাচক শিক্ষাও দেয়: মনোযোগ এবং অধ্যয়ন করার অনুভূতি উন্নতিকে অনুপ্রাণিত করতে পারে—সুতরাং যত্ন এবং দৃশ্যমানতা গুরুত্বপূর্ণ।

professional_application:
  networking_and_relationship_building: |
    মানুষের প্রতি মনোযোগ দেওয়া তাদের কর্মক্ষমতা উন্নত করতে পারে—হথর্ন প্রভাব ইঙ্গিত দেয় যে দেখা এবং মূল্যবান বোধ করা গুরুত্বপূর্ণ। এটি ইতিবাচকভাবে ব্যবহার করুন: নিয়মিত চেক-ইন, দৃশ্যমানতা এবং স্বীকৃতি।
  collaborative_learning_initiative: |
    হস্তক্ষেপের মূল্যায়ন করার সময়, নিয়ন্ত্রণ গোষ্ঠী ব্যবহার করুন এবং বিবেচনা করুন যে উন্নতিগুলি হস্তক্ষেপের কারণে না মনোযোগের কারণে হচ্ছে। হথর্ন প্রভাব আপাত সাফল্যকে বাড়িয়ে তুলতে পারে।

how_can_this_be_misapplied:
  surveillance_justification: |
    "হথর্ন প্রভাব" ব্যবহার করে অবিরাম নজরদারী ন্যায্যতা প্রমাণ করা—পর্যবেক্ষণ বিশ্বাস এবং অভ্যন্তরীণ প্রেরণা কমাতে পারে।
  dismissing_improvements: |
    অধ্যয়নের সময় সমস্ত উন্নতিকে হথর্ন বলে ধরে নেওয়া—কখনও কখনও হস্তক্ষেপগুলি সত্যিই কাজ করে।
  overgeneralization: |
    মূল হথর্ন অধ্যয়ন নিয়ে প্রশ্ন তোলা হয়েছে; প্রভাবটি একবার ভাবা চেয়ে ছোট বা ভিন্ন হতে পারে।
  manipulation: |
    আচরণ ম্যানিপুলেট করার জন্য মিথ্যা "পর্যবেক্ষণ" তৈরি করা।

