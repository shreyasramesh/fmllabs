# Confirmation Bias
# Mental Model / Cognitive Bias - Example Entry

id: confirmation_bias
name: নিশ্চিতকরণ পক্ষপাতের (Confirmation Bias)

quick_introduction: |
  নিশ্চিতকরণ পক্ষপাতের হলো সেই প্রবণতা যেখানে আমরা আমাদের বিদ্যমান বিশ্বাসকে নিশ্চিত করার জন্য তথ্য খুঁজি, ব্যাখ্যা করি এবং মনে রাখি। আমরা সহায়ক প্রমাণকে বেশি গুরুত্ব দিই এবং আমাদের মতামতের বিরোধী প্রমাণগুলিকে উপেক্ষা করি বা বাতিল করি। আমরা আমাদের অনুমানের পরীক্ষা করার চেয়ে নিশ্চিত করার জন্য প্রশ্ন জিজ্ঞাসা করি।

one_liner: আমরা আমাদের বিশ্বাসকে নিশ্চিত করে এমন জিনিস খুঁজি এবং মনে রাখি; যা আমাদের বিশ্বাসকে বিরোধিতা করে তা আমরা উপেক্ষা করি।

try_this:
  - জিজ্ঞাসা করুন: কী আমাকে ভুল প্রমাণ করবে? সক্রিয়ভাবে অমূলক প্রমাণ খুঁজুন।
  - লক্ষ্য করুন কখন আপনি সহায়ক তথ্যের চেয়ে বিরোধী তথ্যকে বেশি গুরুত্ব দিচ্ছেন।
  - নিজের মতামতের মতোই অন্য মতকেও গুরুত্ব সহকারে বিবেচনা করুন।

ask_yourself:
  - আমি কি আমার অনুমান পরীক্ষা করছি নাকি শুধু নিশ্চিত করছি?
  - নতুন প্রমাণের ভিত্তিতে আমি শেষ কবে আমার মন পরিবর্তন করেছি?

in_more_detail: |
  আমরা তথ্যের নিরপেক্ষ প্রক্রিয়াকরণকারী নই। আমরা নিশ্চিতকরণ খুঁজি, অস্পষ্টতাকে সমর্থন হিসেবে ব্যাখ্যা করি এবং মিসগুলির চেয়ে হিটগুলি বেশি মনে রাখি। আমরা সমমনা মানুষ এবং মিডিয়ার সাথে নিজেদের ঘিরে রাখি। আমরা "কেন আমি সঠিক?" জিজ্ঞাসা করি, "কী আমাকে ভুল প্রমাণ করবে?" জিজ্ঞাসা করার পরিবর্তে। এটি আমাদের অতি-আত্মবিশ্বাসী এবং আপডেট হতে ধীর করে তোলে।

  নিশ্চিতকরণ পক্ষপাতের সবচেয়ে ব্যাপক এবং সু-নথিভুক্ত পক্ষপাতের মধ্যে একটি।
  এটি বিজ্ঞান, রাজনীতি, সম্পর্ক এবং ব্যবসাকে প্রভাবিত করে। এটি কাটিয়ে ওঠার জন্য
  সচেতন প্রচেষ্টা এবং কাঠামোগত প্রক্রিয়ার প্রয়োজন।

why_this_is_important: |
  সঠিক সিদ্ধান্ত গ্রহণ এবং শেখার জন্য নিশ্চিতকরণ পক্ষপাতের চেনা অপরিহার্য।
  এটি আপনাকে অমূলক প্রমাণ খুঁজতে, বিকল্প অনুমান বিবেচনা করতে এবং
  প্রয়োজন অনুযায়ী আপনার বিশ্বাস আপডেট করতে সাহায্য করে। এটি বৈজ্ঞানিক চিন্তাভাবনার ভিত্তি।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - শেখা
  - সমস্যা_সমাধান
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  seeking_support: |
    আপনার মতামতের পরীক্ষা করার চেয়ে নিশ্চিত করার জন্য প্রমাণ খোঁজা।
  asymmetric_interpretation: |
    অস্পষ্ট প্রমাণকে আপনার অবস্থানের সমর্থনে ব্যাখ্যা করা।
  discounting_disconfirming: |
    আপনার বিশ্বাসের বিরোধী প্রমাণকে বাতিল করা বা কম গুরুত্ব দেওয়া।
  selective_exposure: |
    শুধুমাত্র আপনার সাথে একমত উত্স থেকে তথ্য গ্রহণ করা।

examples:
  hiring: |
    প্রথমে একটি ইতিবাচক ধারণা তৈরি করা এবং তারপর এমন প্রশ্ন জিজ্ঞাসা করা যা
    প্রার্থীকে দুর্দান্ত হিসাবে নিশ্চিত করে।
  investing: |
    একটি স্টক কেনার পর, ইতিবাচক খবর খোঁজা এবং নেতিবাচক
    বিশ্লেষণ উপেক্ষা করা।
  relationships: |
    সঙ্গীর ক্রিয়াগুলিকে এমনভাবে ব্যাখ্যা করা যা তাদের সম্পর্কে আপনার
    ধারণাকে নিশ্চিত করে (ভালো বা খারাপ)।
  politics: |
    আপনার পক্ষের তথ্য নির্বিচারে গ্রহণ করা এবং অন্য পক্ষের সমতুল্য তথ্য
    প্রত্যাখ্যান করা।

real_world_implications: |
  নিশ্চিতকরণ পক্ষপাতের মিথ্যা বিশ্বাসকে টিকিয়ে রাখে, মেরুকরণকে বাড়িয়ে তোলে এবং
  ব্যয়বহুল ভুলের কারণ হয়। এটি ভালো বিজ্ঞান এবং ভালো
  সিদ্ধান্ত গ্রহণের শত্রু। এটি কাটিয়ে ওঠার জন্য সচেতন অমূলক প্রমাণ
  খোঁজা প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    মানুষ সম্পর্কে ধারণা তৈরি করার সময়, সক্রিয়ভাবে অমূলক প্রমাণ খুঁজুন।
    জিজ্ঞাসা করুন "কী আমার মন পরিবর্তন করবে?" এবং সেটি খুঁজুন।
  collaborative_learning_initiative: |
    অমূলক দৃষ্টিভঙ্গি বের করতে শয়তানের উকিল, রেড টিম এবং প্রি-মর্টেম ব্যবহার করুন।
    ভালো প্রমাণ দিয়ে প্রচলিত মতকে চ্যালেঞ্জকারীদের পুরস্কৃত করুন।

how_can_this_be_misapplied:
  false_balance: |
    যখন প্রমাণ একটি পক্ষকে দৃঢ়ভাবে সমর্থন করে তখন সমস্ত মতকে সমানভাবে বৈধ বলে মনে করা।
  excessive_skepticism: |
    যখন কিছু বিশ্বাস সু-সমর্থিত হয় তখন সমস্ত প্রমাণকে "নিশ্চিতকরণ পক্ষপাতের" বলে বাতিল করা।
  contrarianism: |
    নিশ্চিতকরণ পক্ষপাতের এড়াতে কেবল বিপরীত মতামত গ্রহণ করা—যখন
    মূল মতামত সঠিক হতে পারে।
  analysis_paralysis: |
    "আমরা পক্ষপাতের শিকার হতে পারি" ভেবে কখনও কোনো মতামতে স্থির না হওয়া।

