# Ostrich Effect
# Mental Model / Cognitive Bias - Example Entry

id: ostrich_effect
name: উটপাখি প্রভাব (Ostrich Effect)

quick_introduction: |
  উটপাখি প্রভাব হল নেতিবাচক আর্থিক তথ্য এড়িয়ে যাওয়ার প্রবণতা—উটপাখির মতো "মাটি চাপা দেওয়া"। মানুষ বাজার পড়লে তাদের পোর্টফোলিও দেখতে এড়িয়ে যায়, বিল খুলতে দেরি করে এবং সতর্কীকরণ লক্ষণগুলি উপেক্ষা করে যা তাদের কাজ করতে সাহায্য করতে পারে।

one_liner: খারাপ খবর এড়িয়ে গেলে বাস্তবতা বদলায় না—এটা কেবল আপনার প্রতিক্রিয়া বিলম্বিত করে।

try_this:
  - নিয়মিত বিরতিতে চেক-ইন করার সময়সূচী তৈরি করুন যাতে আপনি সংখ্যাগুলি এড়াতে না পারেন।
  - লক্ষ্য করুন কখন আপনি কিছু খুলতে বা দেখতে বিলম্ব করছেন।
  - জিজ্ঞাসা করুন: আমি কী এড়িয়ে যাচ্ছি, এবং আমি যদি এটির মুখোমুখি হই তবে কী পরিবর্তন হবে?

ask_yourself:
  - আমি কি তথ্য এড়িয়ে যাচ্ছি কারণ এটি খারাপ হতে পারে?
  - পূর্বের সচেতনতা আমাকে আরও ভালভাবে কাজ করতে সাহায্য করবে কি?

in_more_detail: |
  এই শব্দটি আচরণগত অর্থায়নে তৈরি করা হয়েছিল বিনিয়োগকারীদের বর্ণনা করার জন্য যারা বাজার পতনের সময় তাদের বিনিয়োগ পরীক্ষা করা এড়িয়ে যায়। এই আচরণ অর্থায়নের বাইরেও প্রসারিত হয়: মেডিকেল চেক-আপ এড়িয়ে যাওয়া, সম্পর্কের সমস্যা উপেক্ষা করা এবং কঠিন কথোপকথন বিলম্বিত করা। আমরা খারাপ খবরের উদ্বেগ এড়াতে চেষ্টা করি, কিন্তু এড়িয়ে চলা প্রায়শই সময়মতো কাজ প্রতিরোধ করার মাধ্যমে ফলাফলকে আরও খারাপ করে তোলে।

  এই প্রভাবটি লোকসান এড়ানো (loss aversion) এবং মানসিক অস্বস্তি এড়ানোর ইচ্ছা দ্বারা চালিত হয়। দুর্ভাগ্যবশত, অজ্ঞতা বাস্তবতা পরিবর্তন করে না—এটি কেবল আমাদের প্রতিক্রিয়া বিলম্বিত করে।

why_this_is_important: |
  উটপাখি প্রভাব সনাক্ত করা আপনাকে সক্রিয়ভাবে কঠিন তথ্যের মুখোমুখি হতে সাহায্য করে। খারাপ খবর এড়িয়ে গেলে ফলাফল উন্নত হয় না; এটি সাধারণত সেগুলিকে বাড়িয়ে তোলে। সময়মতো সচেতনতা ভাল সিদ্ধান্ত নিতে সক্ষম করে।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision_making)
  - বিনিয়োগ (investing)
  - ঝুঁকি_মূল্যায়ন (risk_assessment)
  - কর্মজীবনের_সিদ্ধান্ত (career_moves)

how_can_you_spot_it:
  avoiding_portfolio_checks: |
    বাজার পড়লে বিনিয়োগ বিবৃতি না দেখা।
  delaying_difficult_information: |
    বিল, মেডিকেল ফলাফল বা পারফরম্যান্স ফিডব্যাক খোলা বিলম্বিত করা।
  information_avoidance: |
    খারাপ খবর থাকতে পারে এমন উৎসগুলি সক্রিয়ভাবে এড়িয়ে যাওয়া।
  procrastination_on_unpleasant_tasks: |
    সমস্যাগুলি উন্মোচন করবে বা সমাধান করবে এমন কাজগুলিতে বিলম্ব করা।

examples:
  investing: |
    একজন বিনিয়োগকারী একটি বিয়ার মার্কেটের সময় তাদের 401(k) দেখা বন্ধ করে দেয়, পুনরায় ভারসাম্য রক্ষার সুযোগগুলি হারিয়ে ফেলে।
  health: |
    খারাপ খবরের ভয়ে লক্ষণ থাকা সত্ত্বেও ডাক্তারের অ্যাপয়েন্টমেন্ট এড়িয়ে যাওয়া।
  finances: |
    ঋণ মোকাবেলা এড়াতে ক্রেডিট কার্ডের বিবৃতি বা ব্যাঙ্ক সতর্কতা খোলা এড়িয়ে যাওয়া।
  performance: |
    একজন ম্যানেজার বার্ষিক পর্যালোচনার আগ পর্যন্ত গুরুতর প্রতিক্রিয়া দেওয়া এড়িয়ে যায়, যখন পূর্বের হস্তক্ষেপ সাহায্য করত।

real_world_implications: |
  উটপাখি প্রভাবের ফলে আর্থিক ফলাফল খারাপ হয়, চিকিৎসার বিলম্বে চিকিৎসা হয় এবং সম্পর্ক ও কর্মক্ষেত্রে সমস্যাগুলি অমীমাংসিত থাকে। এটি এড়ানো যায় এমন ক্ষতিগুলিকে বাড়িয়ে তোলে। যে সিস্টেমগুলি তথ্য উপেক্ষা করা কঠিন করে তোলে তা সাহায্য করতে পারে।

professional_application:
  networking_and_relationship_building: |
    কঠিন কথোপকথন এড়িয়ে যাবেন না। সমস্যাগুলি নিজেরা সমাধান হয়ে যাবে এই আশায় থাকার চেয়ে তাড়াতাড়ি সমাধান করুন। নিয়মিত চেক-ইন তৈরি করুন যা সমস্যাগুলি বাড়ার আগে উন্মোচন করে।
  collaborative_learning_initiative: |
    ফিডব্যাক লুপ তৈরি করুন যা সমস্যাগুলি উপেক্ষা করা কঠিন করে তোলে—ড্যাশবোর্ড, নিয়মিত পর্যালোচনা এবং খারাপ খবরগুলির প্রাথমিক প্রকাশকে উৎসাহিত করার নিয়ম।

how_can_this_be_misapplied:
  information_overload: |
    যখন কিছু তথ্য এড়িয়ে চলা স্বাস্থ্যকর (যেমন, প্রতি মিনিটে স্টক চেক না করা) তখন অবিরাম পর্যবেক্ষণের জন্য জোর করা।
  anxiety_amplification: |
    সম্ভাব্য সমস্যাগুলির উপর এত বেশি মনোযোগ তৈরি করা যে এটি ফলাফল উন্নত না করে উদ্বেগ বাড়ায়।
  blame_shifting: |
    সমস্ত এড়িয়ে চলাকে "উটপাখি প্রভাব" হিসাবে চিহ্নিত করা যখন কিছু এড়িয়ে চলা যুক্তিসঙ্গত (যেমন, কোলাহল উপেক্ষা করা)।
  micromanagement: |
    অন্যদের অত্যধিক নজরদারির ন্যায্যতা প্রমাণ করতে ধারণাটি ব্যবহার করা।

