# Circle of Competence
# Mental Model / Cognitive Bias - Example Entry

id: circle_of_competence
name: দক্ষতার পরিধি (Circle of Competence)

quick_introduction: |
  দক্ষতার পরিধি একটি মানসিক মডেল যা আপনাকে আপনার দক্ষতার সীমা জানতে এবং গুরুত্বপূর্ণ সিদ্ধান্ত নেওয়ার সময় সেই সীমার মধ্যে থাকতে উৎসাহিত করে। ওয়ারেন বাফেট এবং চার্লি মাঙ্গার যা জানেন না তা জানার উপর জোর দেন।

one_liner: আপনার দক্ষতার সীমা জানুন—এবং যখন এটি গুরুত্বপূর্ণ তখন তার মধ্যে থাকুন।

try_this:
  - চিহ্নিত করুন কোথায় আপনার প্রকৃত দক্ষতা আছে বনাম কোথায় আপনি অনুমান করছেন।
  - আপনার পরিধির বাইরে থাকলে, পরামর্শ নিন বা অন্যকে দায়িত্ব দিন।
  - সৎ হন: এখানে কি একজন প্রকৃত বিশেষজ্ঞ আপনার রায়ের সাথে একমত হবেন?

ask_yourself:
  - আমি কি আমার দক্ষতার পরিধির মধ্যে আছি, নাকি অনুমান করছি?
  - এই ক্ষেত্রে শেষ কখন আমি "আমি জানি না" বলেছি?

in_more_detail: |
  প্রত্যেক ব্যক্তির কিছু নির্দিষ্ট ক্ষেত্র থাকে যেখানে তাদের প্রকৃত দক্ষতা রয়েছে—যেখানে তারা তথ্য মূল্যায়ন করতে পারে, ভুল ধরতে পারে এবং নির্ভরযোগ্য বিচার করতে পারে। সেই পরিধির বাইরে, তারা অন্যদের মতোই সাধারণ পক্ষপাত এবং ভুলের শিকার হয়। মূল বিষয় হলো সৎ আত্ম-মূল্যায়ন: আপনি কোথায় সত্যিই দক্ষ এবং কোথায় আপনি অনুমান করছেন?

  সচেতন শিক্ষার মাধ্যমে পরিধি প্রসারিত করা যেতে পারে, তবে এর বর্তমান সীমা স্বীকার করার জন্য নম্রতা প্রয়োজন। আপনার পরিধির বাইরে কাজ করলে ব্যয়বহুল ভুলের ঝুঁকি বাড়ে, বিশেষ করে যখন ঝুঁকি বেশি থাকে।

why_this_is_important: |
  আপনার দক্ষতার পরিধির মধ্যে থাকা ব্যয়বহুল ভুল কমায় এবং সিদ্ধান্তের গুণমান উন্নত করে। এটি আপনাকে জানতেও সাহায্য করে কখন পরামর্শ চাইতে হবে, অন্যকে দায়িত্ব দিতে হবে বা বিরত থাকতে হবে। আপনার পরিধির বাইরের অতিরিক্ত আত্মবিশ্বাস ব্যর্থতার একটি প্রধান উৎস।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ
  - বিনিয়োগ
  - কর্মজীবনের_পদক্ষেপ
  - ঝুঁকি_মূল্যায়ন

how_can_you_spot_it:
  honest_boundary_assessment: |
    আপনি কি কোনো ডোমেনে আপনার জ্ঞানের সীমা ব্যাখ্যা করতে পারেন? আপনি কি জানেন যে আপনি কী জানেন না?
  knowing_when_to_defer: |
    এমন পরিস্থিতি চিহ্নিত করা যেখানে আপনার একা সিদ্ধান্ত না নিয়ে বিশেষজ্ঞের ইনপুট নেওয়া উচিত।
  consistent_track_record: |
    আপনার পরিধির মধ্যে, আপনার বিচারগুলি সময়ের সাথে সাথে বৈধ হয়; বাইরে, তা হয় না।
  calibration: |
    একটি ডোমেনে আপনার আত্মবিশ্বাস সেই ডোমেনে আপনার প্রকৃত পারফরম্যান্সের সাথে মিলে যায়।

examples:
  investing: |
    বাফেট টেক স্টকগুলি এড়িয়ে চলেন কারণ তিনি বলেন যে সেগুলি তার দক্ষতার পরিধির বাইরে—তিনি সেগুলি নির্ভরযোগ্যভাবে মূল্যায়ন করতে পারেন না।
  career: |
    একজন বিশেষজ্ঞ যিনি তার ডোমেনে থাকেন বনাম এমন একজন যিনি একটি সম্পর্কহীন ক্ষেত্রে "চাপযুক্ত" ভূমিকা নেন।
  hiring: |
    কখন আপনার নিজের বিচারের উপর নির্ভর করতে হবে বনাম প্রযুক্তিগত ভূমিকার জন্য বিশেষজ্ঞদের আনতে হবে তা জানা।
  advice_giving: |
    অনুমান করার পরিবর্তে আপনার দক্ষতার বাইরের বিষয়গুলিতে মতামত দিতে অস্বীকার করা।

real_world_implications: |
  দক্ষতার পরিধি মূল্য বিনিয়োগ এবং পেশাদার সাফল্যের কেন্দ্রবিন্দু। এটি উপেক্ষা করলে অতিরিক্ত আত্মবিশ্বাস, ব্যর্থ উদ্যোগ এবং ভুল পরামর্শের জন্ম হয়। পরিধি প্রসারিত করার জন্য সচেতন প্রচেষ্টা এবং সৎ প্রতিক্রিয়ার প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    এমন লোকেদের সাথে সম্পর্ক তৈরি করুন যাদের দক্ষতার পরিধি আপনার পরিপূরক। কখন নিজে উত্তর দেওয়ার পরিবর্তে অন্যদের পরিচয় করিয়ে দিতে হবে তা জানুন।
  collaborative_learning_initiative: |
    ওভারল্যাপিং এবং পরিপূরক বৃত্ত সহ দল তৈরি করুন। যখন তারা তাদের দক্ষতার বাইরে কাজ করছে তখন ফ্ল্যাগ করার জন্য লোকদের উৎসাহিত করুন।

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    কখনো আপনার পরিধির বাইরে না যাওয়া বৃদ্ধি এবং শেখার সীমিত করতে পারে।
  false_modesty: |
    দায়বদ্ধতা বা কঠিন সিদ্ধান্ত এড়াতে একটি ক্ষুদ্র পরিধি দাবি করা।
  gatekeeping: |
    তাদের যুক্তিগুলির সাথে জড়িত না হয়ে অন্যদের খারিজ করার জন্য "দক্ষতার পরিধি" ব্যবহার করা।
  stagnation: |
    পরিধিকে স্থির হিসাবে বিবেচনা করা যা প্রচেষ্টার সাথে প্রসারিত হতে পারে তার পরিবর্তে।

