id: salience_bias
name: প্রধান্য পক্ষপাত (Salience Bias)

quick_introduction: |
  প্রধান্য পক্ষপাত হলো কোনো পরিস্থিতির সবচেয়ে সুস্পষ্ট বা দৃষ্টিগোচর
  বিষয়গুলিতে মনোযোগ দেওয়ার প্রবণতা, যেখানে কম স্পষ্ট কিন্তু সম্ভাব্য
  গুরুত্বপূর্ণ বিষয়গুলি উপেক্ষা করা হয়। যা চোখে পড়ে তা আমাদের
  সিদ্ধান্তগুলিতে অসম অনুপাতে মনোযোগ এবং গুরুত্ব পায়।

one_liner: যা চোখে পড়ে তা অসম অনুপাতে মনোযোগ পায়—সূক্ষ্ম বিষয়গুলি উপেক্ষিত হয়।

try_this:
  - Ask: What am I not seeing because it's not salient? (আমি কী দেখতে পাচ্ছি না কারণ এটি প্রধান্য নয়?)
  - Actively look for less obvious factors before deciding. (সিদ্ধান্ত নেওয়ার আগে কম স্পষ্ট বিষয়গুলির জন্য সক্রিয়ভাবে সন্ধান করুন।)
  - Notice when a vivid or dramatic element is dominating your judgment. (একটি প্রাণবন্ত বা নাটকীয় উপাদান আপনার রায়কে প্রভাবিত করছে কিনা তা লক্ষ্য করুন।)

ask_yourself:
  - Am I overweighting what's prominent and underweighting what's subtle? (আমি কি যা প্রধান্য তাকে বেশি গুরুত্ব দিচ্ছি এবং যা সূক্ষ্ম তাকে কম গুরুত্ব দিচ্ছি?)
  - What important factors might I be overlooking? (গুরুত্বপূর্ণ কোন বিষয়গুলি আমি উপেক্ষা করতে পারি?)

in_more_detail: |
  প্রধান্য তথ্য হলো স্পষ্ট, আবেগপ্রবণ বা সম্প্রতি সম্মুখীন হওয়া।
  এটি মনোযোগ আকর্ষণ করে এবং উচিতের চেয়ে বেশি সিদ্ধান্তকে প্রভাবিত করে।
  আমরা স্পষ্ট বিষয়গুলির উপর বেশি জোর দিই এবং সূক্ষ্ম বিষয়গুলির উপর কম।
  একটি নাটকীয় ঘটনা বা স্পষ্ট উদাহরণ আমাদের চিন্তাভাবনাকে প্রভাবিত করতে পারে,
  এমনকি যখন এটি প্রতিনিধি মূলক না হয় তখনও।

  প্রধান্য পক্ষপাত সহজলভ্যতার আনুমানিক পদ্ধতি (যা মনে আসে) এবং সাম্প্রতিকতার
  পক্ষপাতের (যা সম্প্রতি ঘটেছে) সাথে সম্পর্কিত। এটি ঝুঁকি উপলব্ধি,
  নিয়োগ এবং কৌশলে প্রভাব ফেলে। সবচেয়ে স্পষ্ট সমস্যাগুলি সমাধান করা হয়;
  অদৃশ্য সমস্যাগুলি থেকে যায়।

why_this_is_important: |
  প্রধান্য পক্ষপাতকে চিনতে পারা আপনাকে স্পষ্ট বিষয়ের বাইরে দেখতে এবং
  কম স্পষ্ট বিষয়গুলি বিবেচনা করতে সাহায্য করে। এটি ঝুঁকি মূল্যায়ন,
  সমস্যা নির্ণয় এবং সিদ্ধান্ত গ্রহণের মান উন্নত করে। গুরুত্বপূর্ণ জিনিসগুলি
  সবসময় প্রধান্য হয় না।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision_making)
  - সমস্যা_সমাধান (problem_solving)
  - ঝুঁকি_মূল্যায়ন (risk_assessment)
  - নেতৃত্ব (leadership)

how_can_you_spot_it:
  prominent_factor_dominance: |
    সবচেয়ে স্পষ্ট বিষয়টি সিদ্ধান্তকে চালিত করে।
  overlooking_background: |
    গুরুত্ব থাকা সত্ত্বেও কম স্পষ্ট বিষয়গুলি উপেক্ষা করা হয়।
  vividness_overweighting: |
    নাটকীয় বা আবেগিক তথ্য অসম অনুপাতে গুরুত্ব পায়।
  visibility_bias: |
    যা আমরা সহজে দেখতে বা পরিমাপ করতে পারি, তা সেগুলির চেয়ে বেশি মনোযোগ পায়
    যা আমরা পারি না।

examples:
  risk: |
    একটি বিমান দুর্ঘটনা প্রধান্যপূর্ণ—আমরা উড়ানের ঝুঁকিকে বেশি মনে করি।
    গাড়ির দুর্ঘটনা সামগ্রিকভাবে কম প্রধান্যপূর্ণ—আমরা গাড়ি চালানোর ঝুঁকিকে
    কম মনে করি।
  hiring: |
    একজন প্রার্থীর উপস্থাপনা দক্ষতা প্রধান্যপূর্ণ; তাদের
    কার্যকারিতা কম স্পষ্ট হতে পারে তবে সমানভাবে গুরুত্বপূর্ণ।
  strategy: |
    প্রতিযোগীদের চালগুলি প্রধান্যপূর্ণ; ধীরগতির বাজার পরিবর্তনগুলি
    কম স্পষ্ট তবে বেশি গুরুত্বপূর্ণ হতে পারে।
  problems: |
    সবচেয়ে জোরে অভিযোগটি সমাধান করা হয় যখন পদ্ধতিগত সমস্যাগুলি
    অলক্ষ্য থাকে।

real_world_implications: |
  প্রধান্য পক্ষপাত প্রভাবিত করে কি মনোযোগ, তহবিল এবং পদক্ষেপ পায়।
  এটি কারণগুলির পরিবর্তে উপসর্গগুলি সমাধান করার দিকে নিয়ে যেতে পারে এবং
  সম্পদের ভুল বরাদ্দ হতে পারে। ইচ্ছাকৃতভাবে অ-প্রধান্য তথ্য খোঁজা
  সিদ্ধান্ত উন্নত করে।

professional_application:
  networking_and_relationship_building: |
    মানুষদের শুধুমাত্র তাদের সবচেয়ে স্পষ্ট বৈশিষ্ট্য দ্বারা বিচার করবেন না।
    কম স্পষ্ট গুণাবলী সন্ধান করুন—নির্ভরযোগ্যতা, ধারাবাহিকতা, যারা তাদের সাহায্য করতে পারে না
    তাদের সাথে তারা কেমন আচরণ করে।
  collaborative_learning_initiative: |
    সমস্যা সমাধানে, স্পষ্টভাবে জিজ্ঞাসা করুন "আমরা কি দেখতে পাচ্ছি না?"
    এবং "কি কম স্পষ্ট তবে গুরুত্বপূর্ণ?" অ-প্রধান্য বিষয়গুলি উন্মোচন করার
    জন্য প্রক্রিয়া তৈরি করুন।

how_can_this_be_misapplied:
  ignoring_salient_info: |
    মাঝে মাঝে যা প্রধান্য তা গুরুত্বপূর্ণ। সবকিছু স্পষ্ট বলে উড়িয়ে দেবেন না।
  false_sophistication: |
    অস্পষ্ট বিষয়গুলি সবসময় স্পষ্ট বিষয়গুলির চেয়ে বেশি গুরুত্বপূর্ণ বলে ধরে নেওয়া।
  analysis_paralysis: |
    এত বেশি অ-প্রধান্য বিষয়গুলির সন্ধান করা যে আপনি কখনও প্রধান্য বিষয়গুলিতে
    কাজ করেন না।
  contrarianism: |
    ভিন্ন হওয়ার জন্য প্রধান্য তথ্য প্রত্যাখ্যান করা।

