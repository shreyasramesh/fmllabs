# Sunk Cost Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: sunk_cost_fallacy
name: সাক (Sunk) কস্টের ভ্রান্তি (Sunk Cost Fallacy)

quick_introduction: |
  সাক কস্টের ভ্রান্তি হলো যে কোনো সিদ্ধান্তে ইতিমধ্যে যে পরিমাণ সম্পদ ব্যয় হয়ে গেছে, তার উপর ভিত্তি করে সেই সিদ্ধান্ত চালিয়ে যাওয়ার প্রবণতা, ভবিষ্যতের প্রত্যাশিত রিটার্নের উপর ভিত্তি করে নয়।
  "আমরা এতদূর এসেছি" বা "আমি ইতিমধ্যেই অনেক কিছু বিনিয়োগ করেছি" এই কথাগুলো আরও খারাপ জায়গায় ভালো অর্থ ঢালতে প্ররোচিত করে।

one_liner: অতীতের বিনিয়োগ শেষ—শুধুমাত্র ভবিষ্যতের খরচ এবং সুবিধাই গুরুত্বপূর্ণ।

try_this:
  - Ask—If I were starting today, would I choose this path? (যদি আজ শুরু করতাম, তাহলে কি এই পথটি বেছে নিতাম?)
  - Define kill criteria in advance—conditions under which you will stop. (আগেই বাতিল করার মানদণ্ড ঠিক করুন—কোন পরিস্থিতিতে আপনি থামবেন।)
  - Evaluate the marginal decision—what do I gain or lose from here forward? (প্রান্তিক সিদ্ধান্ত মূল্যায়ন করুন: এখান থেকে সামনে কী লাভ বা ক্ষতি হবে?)

ask_yourself:
  - Am I continuing because of future value, or to justify past investment? (আমি কি ভবিষ্যতের মূল্যের জন্য চালিয়ে যাচ্ছি, নাকি অতীতের বিনিয়োগকে ন্যায্যতা দেওয়ার জন্য?)
  - What would I advise a friend who was in my position from scratch? (যদি আমার বন্ধু এই অবস্থানে থাকত, তাহলে আমি তাকে শুরু থেকে কী পরামর্শ দিতাম?)

in_more_detail: |
  সাক কস্ট হলো অতীতের খরচ যা আর উদ্ধার করা যায় না। যুক্তিসঙ্গত সিদ্ধান্ত গ্রহণ এগুলিকে উপেক্ষা করে—কেবল ভবিষ্যতের খরচ এবং সুবিধাই গুরুত্বপূর্ণ। কিন্তু আমরা আমাদের বিনিয়োগের সাথে মানসিকভাবে সংযুক্ত থাকি।
  আমরা যে খাবার উপভোগ করছি না তা শেষ করি, যে সিনেমাটি অপছন্দ করি তা দেখি, এবং যে প্রকল্পগুলি আর অর্থপূর্ণ নয় তা চালিয়ে যাই। আমরা যা বিনিয়োগ করেছি তা "অপচয় করতে চাই না", কিন্তু চালিয়ে গেলে প্রায়শই আরও বেশি অপচয় হয়।

  এই ভ্রান্তি বিশেষভাবে শক্তিশালী হয় যখন আমরা কেবল অর্থই নয়, সময়, শ্রম বা পরিচয়ও বিনিয়োগ করেছি। ভুল স্বীকার করা ব্যয়বহুল মনে হতে পারে, তাই আমরা আরও বেশি করে投入 করি।

why_this_is_important: |
  সাক কস্টের ভ্রান্তি চিনতে পারা আপনাকে ক্ষতি কমাতে, প্রয়োজনে দিক পরিবর্তন করতে এবং অতীতের বিনিয়োগের পরিবর্তে ভবিষ্যতের মূল্যের উপর ভিত্তি করে সিদ্ধান্ত নিতে সাহায্য করে।
  এটি প্রকল্প, কর্মজীবন এবং সম্পর্কের জন্য অপরিহার্য।

when_to_use:
  - সিদ্ধান্ত_গ্রহণ (decision-making)
  - বিনিয়োগ (investing)
  - কর্মজীবনের_সিদ্ধান্ত (career_moves)
  - ঝুঁকি_মূল্যায়ন (risk_assessment)

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    "আমরা এখন থামতে পারি না—আমরা ইতিমধ্যেই X পরিমাণ খরচ করেছি" যখন ভবিষ্যতের রিটার্ন চালিয়ে যাওয়ার ন্যায্যতা প্রমাণ করে না।
  escalation_of_commitment: |
    পূর্ববর্তী বিনিয়োগকে ন্যায্যতা দেওয়ার বা "উদ্ধার" করার জন্য আরও বেশি বিনিয়োগ করা।
  identity_investment: |
    ব্যর্থতা স্বীকার করলে আত্মসম্মান ক্ষুণ্ন হওয়ার ভয়ে চালিয়ে যাওয়া।
  ignoring_marginal_analysis: |
    মোট খরচের উপর ভিত্তি করে সিদ্ধান্ত নেওয়া, প্রান্তিক খরচ এবং সুবিধার উপর নয়।

examples:
  projects: |
    একটি ব্যর্থ প্রকল্প চালিয়ে যাওয়া কারণ "আমরা ইতিমধ্যেই এর উপর ৬ মাস ব্যয় করেছি" যখন ক্ষতি কমানো যুক্তিসঙ্গত হত।
  relationships: |
    একটি সম্পর্কে থাকা কারণ "আমরা ৫ বছর ধরে একসাথে আছি" ভবিষ্যতের মূল্যায়ন করার পরিবর্তে।
  careers: |
    একটি অপছন্দের কর্মজীবনে থাকা কারণ আপনি ডিগ্রির জন্য বা অভিজ্ঞতার জন্য বিনিয়োগ করেছেন।
  investments: |
    ক্ষতিগ্রস্ত স্টক ধরে রাখা "ব্রেক ইভেনে পৌঁছানোর জন্য" আরও ভালো সুযোগে পুনঃবিনিয়োগ করার পরিবর্তে।

real_world_implications: |
  সাক কস্টের ভ্রান্তির কারণে সম্পদের অপচয়, দীর্ঘস্থায়ী ব্যর্থতা এবং সুযোগ হাতছাড়া হয়। এটি ব্যক্তি, সংস্থা এবং সরকারদের প্রভাবিত করে।
  এটি অতিক্রম করার জন্য সুস্পষ্ট সিদ্ধান্ত কাঠামো প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    অতীতের বিনিয়োগের কারণে আর আপনার উপকারে না আসা সম্পর্ক বা সহযোগিতায় বিনিয়োগ চালিয়ে যাবেন না। ভবিষ্যতের মূল্য মূল্যায়ন করুন।
  collaborative_learning_initiative: |
    প্রকল্পগুলির জন্য "বাতিল করার মানদণ্ড" তৈরি করুন—এমন শর্তাবলী যার অধীনে আপনি অতীতের বিনিয়োগ নির্বিশেষে থামবেন। "শূন্য থেকে" দৃষ্টিকোণ থেকে পর্যায়ক্রমে প্রকল্পগুলি পর্যালোচনা করুন।

how_can_this_be_misapplied:
  quitting_too_early: |
    যে জিনিসগুলি পরিশোধ করতে আরও সময় প্রয়োজন সেগুলিকে পরিত্যাগ করার অজুহাত হিসাবে "সাক কস্ট" ব্যবহার করা।
  undervaluing_consistency: |
    কিছু প্রতিশ্রুতি (যেমন, সম্পর্ক, খ্যাতি) ধারাবাহিকতার মূল্য রাখে যা নিছক প্রান্তিক বিশ্লেষণ উপেক্ষা করে।
  cold_rationality: |
    মানসিক সংযুক্তিকে অযৌক্তিক বলে বাতিল করা যখন এটি প্রকৃত মূল্যবোধকে প্রতিফলিত করতে পারে।
  analysis_paralysis: |
    চালিয়ে যাওয়া উচিত কিনা তা নিয়ে অতিরিক্ত চিন্তা করা যখন উত্তরটি স্পষ্ট।

