# Groupthink
# Mental Model / Cognitive Bias - Example Entry

id: groupthink
name: দলবদ্ধ চিন্তা (Groupthink)

quick_introduction: |
  দলবদ্ধ চিন্তা হল এক ধরনের প্রবণতা যেখানে একটি সুসংহত গোষ্ঠী সমালোচনামূলক মূল্যায়নের চেয়ে ঐক্য এবং সম্প্রীতিকে বেশি অগ্রাধিকার দেয়। সদস্যরা ভিন্নমত দমন করে, আত্ম-নিয়ন্ত্রণ করে এবং গোষ্ঠীর অনুভূত মতামতের সাথে মানিয়ে নেয়। ঐক্যের আকাঙ্ক্ষা সর্বোত্তম সিদ্ধান্তের আকাঙ্ক্ষাকে ছাপিয়ে যায়।

one_liner: সত্যের চেয়ে সম্প্রীতি—গোষ্ঠীগুলি সমালোচনামূলক মূল্যায়নের চেয়ে ঐকমত্যকে অগ্রাধিকার দেয়।

try_this:
  - একজন প্রতিবাদী (devil's advocate) নিয়োগ করুন; ভিন্নমত প্রকাশকে প্রত্যাশিত এবং নিরাপদ করুন।
  - জিজ্ঞাসা করুন: আমরা কী বলছি না? আমরা যদি এই গোষ্ঠীতে না থাকতাম তবে কী বলতাম?
  - গোষ্ঠীগত সিদ্ধান্ত চূড়ান্ত করার আগে বাইরের দৃষ্টিভঙ্গি সন্ধান করুন।

ask_yourself:
  - আমি কি সম্প্রীতি বজায় রাখার জন্য আত্ম-নিয়ন্ত্রণ করছি?
  - আমাদের ঐকমত্য কি প্রকৃত নাকি রাজি হওয়ার চাপের ফলাফল?

in_more_detail: |
  আর্ভিং জ্যানিস বৈদেশিক নীতির ব্যর্থতা (বে অফ পিগস, ভিয়েতনাম) অধ্যয়ন করেছিলেন এবং নিদর্শনগুলি চিহ্নিত করেছিলেন: অপরাজেয়তার বিভ্রম, সম্মিলিত যুক্তিকরণ, সামঞ্জস্যের দিকে চাপ, আত্ম-নিয়ন্ত্রণ, ঐক্যের বিভ্রম এবং মাইন্ডগার্ড যারা গোষ্ঠীকে ভিন্নমত পোষণকারী তথ্য থেকে রক্ষা করে। উচ্চ সংহতি, বিচ্ছিন্নতা এবং চাপ দলবদ্ধ চিন্তাকে বাড়িয়ে তোলে।

  দলবদ্ধ চিন্তা খারাপ সিদ্ধান্তের দিকে নিয়ে যায় কারণ বিকল্পগুলি গুরুত্ব সহকারে বিবেচনা করা হয় না। ভিন্নমতকে আনুগত্যহীনতা হিসাবে দেখা হয়। গোষ্ঠী তার সঠিকতা সম্পর্কে অতিরিক্ত আত্মবিশ্বাসী হয় এবং ঝুঁকিগুলি কম অনুমান করে।

why_this_is_important: |
  দলবদ্ধ চিন্তার স্বীকৃতি আপনাকে আরও ভাল সিদ্ধান্ত গ্রহণের জন্য শর্ত তৈরি করতে সহায়তা করে: ভিন্নমতকে উত্সাহিত করুন, বাইরের দৃষ্টিভঙ্গি আনুন এবং অকাল ঐকমত্য এড়িয়ে চলুন। এটি গোষ্ঠীগত বিপর্যয়মূলক ব্যর্থতা এড়াতে অপরিহার্য।

when_to_use:
  - নেতৃত্ব (leadership)
  - সিদ্ধান্ত_গ্রহণ (decision_making)
  - সমস্যা_সমাধান (problem_solving)
  - সংঘাত_সমাধান (conflict_resolution)

how_can_you_spot_it:
  pressure_for_consensus: |
    ভিন্নমত নিরুৎসাহিত বা শাস্তিপ্রাপ্ত হয়; একমত হওয়াকে পুরস্কৃত করা হয়।
  illusion_of_unanimity: |
    নীরবতাকে একমত হিসাবে ব্যাখ্যা করা হয় যখন এটি আত্ম-নিয়ন্ত্রণ হতে পারে।
  collective_rationalization: |
    গোষ্ঠী সতর্কবার্তা উপেক্ষা করে এবং তার দৃষ্টিভঙ্গি শক্তিশালী করে।
  mindguards: |
    সদস্যরা এমন তথ্য থেকে গোষ্ঠীকে রক্ষা করে যা ঐকমত্যকে চ্যালেঞ্জ করবে।

examples:
  bay_of_pigs: |
    কেনেলির উপদেষ্টারা আক্রমণ পরিকল্পনার বিষয়ে সন্দেহ দমন করেছিলেন; এর ফল ছিল বিপর্যয়।
  corporate_decisions: |
    একটি নেতৃত্ব দল একটি একীভূতকরণের দিকে এগিয়ে যায় লাল পতাকা থাকা সত্ত্বেও কারণ কেউ নেতিবাচক হতে চায় না।
  product_launches: |
    একটি দল একটি ত্রুটিপূর্ণ পণ্য পাঠায় কারণ প্রত্যেকে পরিকল্পনায় বিনিয়োগ করেছে এবং কেউ উদ্বেগ প্রকাশ করেনি।
  boards: |
    বোর্ডের সদস্যরা সম্প্রীতি বজায় রাখতে ব্যবস্থাপনা প্রস্তাবগুলি অনুমোদন করে।

real_world_implications: |
  দলবদ্ধ চিন্তা নীতিগত ব্যর্থতা, কর্পোরেট বিপর্যয় এবং সুযোগ হারানোর কারণ হয়। এটি উচ্চ-ঝুঁকিপূর্ণ, উচ্চ-চাপের পরিস্থিতিতে বিশেষভাবে বিপজ্জনক। এটি প্রতিরোধ করার জন্য ইচ্ছাকৃত কাঠামোগত হস্তক্ষেপের প্রয়োজন।

professional_application:
  networking_and_relationship_building: |
    ভিন্নমতের জন্য মনস্তাত্ত্বিক নিরাপত্তা তৈরি করুন। যারা উদ্বেগ প্রকাশ করে তাদের ধন্যবাদ জানান। ভিন্নমত প্রকাশ করার সময়Disagreeable না হওয়ার মডেল তৈরি করুন।
  collaborative_learning_initiative: |
    প্রতিবাদী, রেড টিম এবং "প্রি-মর্টেম" ব্যবহার করুন। বিদ্যমান মতামতের বিরুদ্ধে যুক্তি দেওয়ার জন্য কাউকে বলুন। বাইরের দৃষ্টিভঙ্গি আনুন। নেতা শেষ কথা বলবেন যাতে anchoring এড়ানো যায়।

how_can_this_be_misapplied:
  false_dissent: |
    "নির্ধারিত ভিন্নমতাবলম্বী" তৈরি করা যারা প্রকৃতপক্ষে ভিন্নমত পোষণ করে না—গোষ্ঠী এটি বুঝতে পারে।
  excessive_conflict: |
    ধ্বংসাত্মক সংঘাত এবং পক্ষাঘাতের পর্যায়ে ভিন্নমতকে উত্সাহিত করা।
  dismissing_consensus: |
    সমস্ত ঐকমত্যকে দলবদ্ধ চিন্তা হিসাবে ধরে নেওয়া—কখনও কখনও গোষ্ঠী সঠিক হতে পারে।
  individualism: |
    এমনভাবে অতিরিক্ত সংশোধন করা যে কোনও গোষ্ঠীগত সিদ্ধান্ত সম্ভব নয়।

