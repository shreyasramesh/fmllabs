# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Bengali)

mental_models:
  - id: ambiguity_effect
    name: অস্পষ্টতার প্রভাব
    path: mental-models-bn/ambiguity-effect.yaml
    description: |
      অস্পষ্টতার প্রভাব হল সেই প্রবণতা যেখানে আমরা কোনো ফলাফলের সম্ভাব্যতা সম্পর্কে
      তথ্য না থাকলে বিকল্পগুলি এড়িয়ে চলি। আমরা অজানা ঝুঁকির চেয়ে পরিচিত ঝুঁকি
      পছন্দ করি—এমনকি অজানা ঝুঁকিগুলি আরও ভালো হলেও। অনিশ্চয়তা নিজেই
      বিরক্তিকর মনে হয়।

  - id: anchoring_bias
    name: অ্যাঙ্করিং বায়াস (Anchoring Bias)
    path: mental-models-bn/anchoring-bias.yaml
    description: |
      অ্যাঙ্করিং বায়াস হলো সিদ্ধান্ত নেওয়ার সময় প্রথম প্রাপ্ত তথ্যের উপর অতিরিক্ত নির্ভর করার প্রবণতা। সেই প্রাথমিক "অ্যাঙ্কর" পরবর্তী বিচারকে প্রভাবিত করে, এমনকি যখন তা অপ্রাসঙ্গিক বা ইচ্ছামতো (arbitrary) হয়।

  - id: availability_cascade
    name: অ্যাভেইলেবিলিটি ক্যাসকেড
    path: mental-models-bn/availability-cascade.yaml
    description: |
      একটি অ্যাভেইলেবিলিটি ক্যাসকেড হল একটি স্ব-শক্তিশালী প্রক্রিয়া যেখানে একটি ধারণা
      জনপ্রিয় আলোচনার মাধ্যমে বিশ্বাসযোগ্যতা লাভ করে। যত বেশি এটি আলোচিত হয়,
      ততই এটি "সহজলভ্য" হয়, তত বেশি মানুষ এটি বিশ্বাস করে, এবং তত বেশি এটি আলোচিত হয়।
      একটি সম্মিলিত বিশ্বাস তার অন্তর্নিহিত সত্য নির্বিশেষে গতি লাভ করে।

  - id: availability_heuristic
    name: সহজলভ্যতা অনুমান (Availability Heuristic)
    path: mental-models-bn/availability-heuristic.yaml
    description: |
      সহজলভ্যতা অনুমান হলো কোনো ঘটনার সম্ভাবনা বিচার করার প্রবণতা, যেখানে উদাহরণগুলো আমাদের মনে কতটা সহজে আসে তার উপর নির্ভর করে। যদি আমরা সহজেই কোনো ঘটনার দৃষ্টান্ত মনে করতে পারি, তবে আমরা ধরে নিই যে ঘটনাটি সাধারণ। প্রাণবন্ত, সাম্প্রতিক বা আবেগপূর্ণ উদাহরণগুলো আমাদের সম্ভাবনার অনুমানকে প্রভাবিত করে।

  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof Phenomenon
    path: mental-models-bn/baader-meinhof-phenomenon.yaml
    description: |
      Baader-Meinhof phenomenon (also called frequency illusion) is when you learn
      about something new and then suddenly notice it everywhere. It feels like a coincidence,
      but it's often selective attention—your brain is primed to notice what it recently
      encountered.

  - id: barnum_effect
    name: বার্নাম প্রভাব
    path: mental-models-bn/barnum-effect.yaml
    description: |
      বার্নাম প্রভাব (বা ফোরার প্রভাব) হল অস্পষ্ট, সাধারণ ব্যক্তিত্বের বর্ণনাগুলিকে
      অনন্যভাবে সঠিক বলে গ্রহণ করার প্রবণতা। রাশিফল, ভাগ্য গণনাকারী এবং ব্যক্তিত্ব পরীক্ষা
      এমন বিবৃতি ব্যবহার করে যা প্রায় প্রত্যেকের জন্যই প্রযোজ্য—কিন্তু আমরা বিশ্বাস করি
      যে সেগুলি আমাদের জন্য নির্দিষ্ট। আমরা নিজেদেরকে সাধারণের মধ্যে দেখতে পাই।

  - id: base_rate_fallacy
    name: বেস রেট ফ্যালাসি
    path: mental-models-bn/base-rate-fallacy.yaml
    description: |
      বেস রেট ফ্যালাসি হল নির্দিষ্ট, প্রাণবন্ত তথ্যের (বেস রেট) পক্ষে সাধারণ পরিসংখ্যানগত তথ্য উপেক্ষা করার প্রবণতা। আমরা নির্দিষ্ট পরিস্থিতিকে বেশি গুরুত্ব দেই এবং পূর্বের সম্ভাবনাকে কম গুরুত্ব দেই। একটি একক শক্তিশালী গল্প সংখ্যার বক্তব্যকে ছাপিয়ে যেতে পারে।

  - id: bayes_theorem
    name: বেইসের উপপাদ্য
    path: mental-models-bn/bayes-theorem.yaml
    description: |
      নতুন প্রমাণ পাওয়ার পর কোনো অনুমানের সম্ভাব্যতা কিভাবে পরিবর্তন করা যায়, বেইসের উপপাদ্য তা বর্ণনা করে। এটি এই ধারণাকে আনুষ্ঠানিক রূপ দেয় যে বিশ্বাসগুলো প্রমাণের সমর্থনের আনুপাতিক হারে পরিবর্তিত হওয়া উচিত—সব বা কিছুই নয়, বরং পর্যায়ক্রমে।

  - id: ben_franklin_effect
    name: বেন ফ্র্যাঙ্কলিন এফেক্ট
    path: mental-models-bn/ben-franklin-effect.yaml
    description: |
      বেন ফ্র্যাঙ্কলিন এফেক্ট হলো একটি মনস্তাত্ত্বিক ঘটনা, যার মাধ্যমে লোকেরা নিজের জন্য একটি উপকার করার পর কাউকে বেশি পছন্দ করে। আমাদের পছন্দের লোকদের জন্য আমরা উপকার করি - এই সাধারণ ধারণার বিপরীতে, আমরা প্রায়শই এমন লোকেদের পছন্দ করতে শুরু করি যাদের জন্য আমরা উপকার করেছি।

  - id: bounded_rationality
    name: সীমিত যুক্তিবাদ
    path: mental-models-bn/bounded-rationality.yaml
    description: |
      সীমিত যুক্তিবাদ হল এই ধারণা যে মানুষের সিদ্ধান্ত গ্রহণ তথ্য, জ্ঞানীয় ক্ষমতা এবং সময়ের দ্বারা সীমাবদ্ধ। আমরা অপ্টিমাইজ করি না; আমরা "সন্তোষজনক" সিদ্ধান্ত নিই—আমরা সেরা সম্ভাব্য বিকল্পের পরিবর্তে যথেষ্ট ভাল বিকল্পগুলি বেছে নিই।

  - id: bystander_effect
    name: Bystander Effect
    path: mental-models-bn/bystander-effect.yaml
    description: |
      Bystander effect হল যখন আশেপাশে অন্য লোক উপস্থিত থাকে তখন কেউ সাহায্য করার সম্ভাবনা কম থাকে। যত বেশি দর্শক থাকবে, তত কম সম্ভাবনা কোনো একজন ব্যক্তি কাজ করবে। দায়িত্ব ভাগ হয়ে যায়; আমরা ধরে নিই অন্য কেউ সাহায্য করবে।

  - id: circle_of_competence
    name: দক্ষতার পরিধি (Circle of Competence)
    path: mental-models-bn/circle-of-competence.yaml
    description: |
      দক্ষতার পরিধি একটি মানসিক মডেল যা আপনাকে আপনার দক্ষতার সীমা জানতে এবং গুরুত্বপূর্ণ সিদ্ধান্ত নেওয়ার সময় সেই সীমার মধ্যে থাকতে উৎসাহিত করে। ওয়ারেন বাফেট এবং চার্লি মাঙ্গার যা জানেন না তা জানার উপর জোর দেন।

  - id: cognitive_dissonance
    name: কগনিটিভ ডিসোন্যান্স (জ্ঞানীয় অসঙ্গতি)
    path: mental-models-bn/cognitive-dissonance.yaml
    description: |
      কগনিটিভ ডিসোন্যান্স হলো সেই মানসিক অস্বস্তি যা আমরা অনুভব করি যখন আমরা পরস্পরবিরোধী বিশ্বাস পোষণ করি, অথবা যখন আমাদের কাজ আমাদের বিশ্বাসের পরিপন্থী হয়। আমরা এই অস্বস্তি কমাতে অনুপ্রাণিত হই—প্রায়শই আমাদের কাজ পরিবর্তন করার চেয়ে আমাদের বিশ্বাসকে কাজের সাথে মেলানোর মাধ্যমে।

  - id: confirmation_bias
    name: নিশ্চিতকরণ পক্ষপাতের (Confirmation Bias)
    path: mental-models-bn/confirmation-bias.yaml
    description: |
      নিশ্চিতকরণ পক্ষপাতের হলো সেই প্রবণতা যেখানে আমরা আমাদের বিদ্যমান বিশ্বাসকে নিশ্চিত করার জন্য তথ্য খুঁজি, ব্যাখ্যা করি এবং মনে রাখি। আমরা সহায়ক প্রমাণকে বেশি গুরুত্ব দিই এবং আমাদের মতামতের বিরোধী প্রমাণগুলিকে উপেক্ষা করি বা বাতিল করি। আমরা আমাদের অনুমানের পরীক্ষা করার চেয়ে নিশ্চিত করার জন্য প্রশ্ন জিজ্ঞাসা করি।

  - id: curse_of_knowledge
    name: জ্ঞানের অভিশাপ
    path: mental-models-bn/curse-of-knowledge.yaml
    description: |
      জ্ঞানের অভিশাপ হল কোনো কিছু জানার পর সেটা না জানার অনুভূতি কল্পনা করার অসুবিধা। বিশেষজ্ঞরা নতুনদের শেখাতে সংগ্রাম করেন কারণ তারা নতুনদের দৃষ্টিকোণ তৈরি করতে পারেন না। একবার জেনে গেলে, আপনি ভুলে যান যে না জানার অনুভূতি কেমন ছিল।

  - id: default_effect
    name: ডিফল্ট এফেক্ট
    path: mental-models-bn/default-effect.yaml
    description: |
      ডিফল্ট এফেক্ট হল পছন্দের তালিকা দেখলে পূর্ব-নির্বাচিত বিকল্পটি বেছে নেওয়ার প্রবণতা। যা ডিফল্ট হিসাবে সেট করা হয় তার একটি শক্তিশালী সুবিধা থাকে—লোকেরা প্রায়শই এটিতে লেগে থাকে, তারা এর জন্য সেরা হোক বা না হোক।

  - id: dunning_kruger_effect
    name: ডানিং-ক্রুগার প্রভাব
    path: mental-models-bn/dunning-kruger-effect.yaml
    description: |
      ডানিং-ক্রুগার প্রভাব হলো একটি জ্ঞানীয় পক্ষপাত যেখানে কোনো ডোমেইনে সীমিত জ্ঞান বা দক্ষতা সম্পন্ন ব্যক্তিরা তাদের যোগ্যতা বেশি করে অনুমান করে, অন্যদিকে বিশেষজ্ঞরা তাদের যোগ্যতা কম করে অনুমান করে। আপনি যত কম জানবেন, তত বেশি আত্মবিশ্বাসী হতে পারেন।

  - id: empathy_gap
    name: সহানুভূতির ফাঁক
    path: mental-models-bn/empathy-gap.yaml
    description: |
      সহানুভূতির ফাঁক হল অন্যদের মানসিক অবস্থা বোঝার এবং ভবিষ্যদ্বাণী করার অসুবিধা, যখন আমরা নিজেদের ভিন্ন অবস্থায় থাকি। যখন আমরা শান্ত থাকি, তখন আমরা রাগ বা ক্ষুধার্ত অবস্থায় কেমন অনুভব করব তা কম অনুমান করি। যখন আমাদের পেট ভরা থাকে, তখন ক্ষুধার্ত অবস্থায় আমাদের কতটা খাবার চাইবে তা আমরা কম অনুমান করি।

  - id: endowment_effect
    name: স্বত্বাধিকারী প্রভাব
    path: mental-models-bn/endowment-effect.yaml
    description: |
      স্বত্বাধিকারী প্রভাব হল কেবল মালিকানার কারণে কোনো বস্তুর বেশি মূল্যায়ন করার প্রবণতা। 
      কোনো বস্তু ছেড়ে দেওয়ার জন্য আমরা তার অধিগ্রহণের জন্য যে মূল্য দিতাম, তার চেয়ে বেশি মূল্য দাবি করি। 
      মালিকানা সংযুক্তি তৈরি করে যা আমাদের মূল্যায়নকে বিকৃত করে।

  - id: false_consensus_effect
    name: মিথ্যা ঐকমত্য প্রভাব
    path: mental-models-bn/false-consensus-effect.yaml
    description: |
      মিথ্যা ঐকমত্য প্রভাব হলো অন্যদের সঙ্গে আমাদের বিশ্বাস, মনোভাব এবং আচরণের মিল আছে বলে অতিরিক্ত অনুমান করার প্রবণতা। আমরা ধরে নিই আমাদের মতামত যতটা আছে তার চেয়ে বেশি সাধারণ, এবং আমরা কল্পনা করতে অসুবিধা বোধ করি যে যুক্তিসঙ্গত মানুষ ভিন্নমত পোষণ করতে পারে।

  - id: framing_effect
    name: ফ্রেমিং এফেক্ট
    path: mental-models-bn/framing-effect.yaml
    description: |
      ফ্রেমিং এফেক্ট হলো আমাদের সিদ্ধান্তের পরিবর্তনশীলতা, অপশনগুলো যেভাবে উপস্থাপন করা হয় তার উপর ভিত্তি করে — এমনকি যখন অন্তর্নিহিত তথ্য একই থাকে। "৯০% বেঁচে যাওয়া" এবং "১০% মৃত্যুহার" একই ফলাফল বর্ণনা করে কিন্তু ভিন্ন পছন্দ তৈরি করে। ফ্রেমিং সিদ্ধান্তকে প্রভাবিত করে।

  - id: fundamental_attribution_error
    name: মৌলিক আরোপণ ত্রুটি
    path: mental-models-bn/fundamental-attribution-error.yaml
    description: |
      মৌলিক আরোপণ ত্রুটি হল অন্যের আচরণকে তাদের চরিত্র বা ব্যক্তিত্বের উপর আরোপ করার প্রবণতা, যখন নিজেদের আচরণকে পরিস্থিতিগত কারণগুলির উপর আরোপ করা হয়। আমরা অন্যদের তাদের কাজের দ্বারা বিচার করি এবং নিজেদের তাদের উদ্দেশ্য দ্বারা।

  - id: gamblers_fallacy
    name: জুয়াড়ির ভ্রান্তি (Gambler's Fallacy)
    path: mental-models-bn/gamblers-fallacy.yaml
    description: |
      জুয়াড়ির ভ্রান্তি হলো এই ভুল বিশ্বাস যে অতীতের স্বাধীন ঘটনাগুলি ভবিষ্যতের ঘটনাগুলিকে প্রভাবিত করে। পরপর হেড পড়ার পরে, আমরা ভাবি যে টেল "আসন্ন"—যদিও প্রতিটি টসই স্বাধীন। আমরা এলোমেলোতার মধ্যে প্যাটার্ন দেখি এবং যখন কোনো "সংশোধন" বা "পুনরুদ্ধার"-এর প্রয়োজন হয় না তখন তার আশা করি।

  - id: groupthink
    name: দলবদ্ধ চিন্তা (Groupthink)
    path: mental-models-bn/groupthink.yaml
    description: |
      দলবদ্ধ চিন্তা হল এক ধরনের প্রবণতা যেখানে একটি সুসংহত গোষ্ঠী সমালোচনামূলক মূল্যায়নের চেয়ে ঐক্য এবং সম্প্রীতিকে বেশি অগ্রাধিকার দেয়। সদস্যরা ভিন্নমত দমন করে, আত্ম-নিয়ন্ত্রণ করে এবং গোষ্ঠীর অনুভূত মতামতের সাথে মানিয়ে নেয়। ঐক্যের আকাঙ্ক্ষা সর্বোত্তম সিদ্ধান্তের আকাঙ্ক্ষাকে ছাপিয়ে যায়।

  - id: halo_effect
    name: হ্যালো এফেক্ট
    path: mental-models-bn/halo-effect.yaml
    description: |
      হ্যালো এফেক্ট হলো একটি প্রবণতা যেখানে কোনো ব্যক্তির একটি ইতিবাচক বৈশিষ্ট্য বা ধারণা আমাদের তার সম্পর্কে সামগ্রিক বিচারকে প্রভাবিত করে। যদি আমরা কারো চেহারা পছন্দ করি, তাহলে আমরা ধরে নিতে পারি তারা সক্ষম। যদি আমরা একটি দক্ষতাকে প্রশংসা করি, তাহলে আমরা ধরে নিতে পারি তারা সবকিছুতেই ভালো। একটি ইতিবাচক বৈশিষ্ট্য অন্যদের উপর "হ্যালো" (আলো) ফেলে।

  - id: hanlons_razor
    name: হ্যানলনের ক্ষুর (Hanlon's Razor)
    path: mental-models-bn/hanlons-razor.yaml
    description: |
      হ্যানলনের ক্ষুর বলে: "যা বোকামি দিয়ে ভালোভাবে ব্যাখ্যা করা যায়, তাকে বিদ্বেষের উপর চাপানো উচিত নয়।" অন্য কথায়, যখন অযোগ্যতা, অবহেলা বা অজ্ঞতা আচরণকে ব্যাখ্যা করতে পারে, তখন খারাপ উদ্দেশ্য অনুমান করবেন না।

  - id: hawthorne_effect
    name: হথর্ন প্রভাব
    path: mental-models-bn/hawthorne-effect.yaml
    description: |
      হথর্ন প্রভাব হল মানুষের আচরণ পরিবর্তনের প্রবণতা যখন তারা জানে যে তাদের পর্যবেক্ষণ করা হচ্ছে বা অধ্যয়ন করা হচ্ছে। পর্যবেক্ষণের কাজটি নিজেই পরিবর্তন তৈরি করতে পারে—পরীক্ষিত হস্তক্ষেপের কারণে নয়। মানুষ তাদের প্রাপ্ত মনোযোগের প্রতি প্রতিক্রিয়া জানায়।

  - id: hindsight_bias
    name: hindsight_bias
    path: mental-models-bn/hindsight-bias.yaml
    description: |
      Hindsight bias (or the "I knew it all along" effect) is the tendency to believe,
      after an event has occurred, that we would have predicted or expected it. We
      reconstruct the past to make outcomes seem more inevitable than they were.

  - id: hyperbolic_discounting
    name: হাইপারবোলিক ডিসকাউন্টিং
    path: mental-models-bn/hyperbolic-discounting.yaml
    description: |
      হাইপারবোলিক ডিসকাউন্টিং হল বর্তমানের ছোট পুরষ্কারের চেয়ে ভবিষ্যতের বড় পুরষ্কারকে কম মূল্য দেওয়ার প্রবণতা—এবং যুক্তিসঙ্গত মডেলের ভবিষ্যদ্বাণীর চেয়ে ভবিষ্যতে আরও বেশি ছাড় দেওয়া। আমরা বর্তমানকে অতিরিক্ত মূল্যায়ন করি এবং ভবিষ্যতের গুরুত্বকে অসঙ্গতভাবে অবমূল্যায়ন করি।

  - id: illusion_of_control
    name: নিয়ন্ত্রণের বিভ্রম
    path: mental-models-bn/illusion-of-control.yaml
    description: |
      নিয়ন্ত্রণের বিভ্রম হলো ফলাফলকে প্রভাবিত করার ক্ষমতাকে অতিরিক্ত মূল্যায়ন করার প্রবণতা। আমরা বিশ্বাস করি যে আমাদের যা নিয়ন্ত্রণ আছে তার চেয়ে বেশি আছে—এগুলো এলোমেলো ঘটনা, অন্য মানুষ এবং জটিল ব্যবস্থার উপর। আমরা সহ-সম্পর্ককে কার্যকারণ এবং কাজকে প্রভাবের সাথে গুলিয়ে ফেলি।

  - id: impact_bias
    name: প্রভাব পক্ষপাত
    path: mental-models-bn/impact-bias.yaml
    description: |
      প্রভাব পক্ষপাত হলো ভবিষ্যতের ঘটনাগুলির প্রতি আমাদের আবেগিক প্রতিক্রিয়ার তীব্রতা এবং সময়কালকে অতিরিক্ত অনুমান করার প্রবণতা। আমরা মনে করি ভালো জিনিসগুলি আমাদের প্রত্যাশার চেয়ে বেশি খুশি করবে এবং খারাপ জিনিসগুলি প্রত্যাশার চেয়ে বেশি দুঃখ দেবে। আমরা আবেগিক পূর্বাভাসের ক্ষেত্রে খারাপ।

  - id: in_group_bias
    name: অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত
    path: mental-models-bn/in-group-bias.yaml
    description: |
      অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত হলো আমরা যাদের নিজেদের গোষ্ঠীভুক্ত মনে করি, তাদের অন্য গোষ্ঠীর লোকদের চেয়ে বেশি পছন্দ করার প্রবণতা। আমরা প্রায়শই সামান্য বা খেয়ালী পার্থক্যের উপর ভিত্তি করে গোষ্ঠীভুক্ত সদস্যদের ইতিবাচক গুণাবলী এবং বহির্ভূত সদস্যদের নেতিবাচক গুণাবলী আরোপ করি।

  - id: inversion
    name: ইনভার্সন
    path: mental-models-bn/inversion.yaml
    description: |
      ইনভার্সন হলো একটি সমস্যা সমাধানের কৌশল যা একটি প্রশ্নকে ঘুরিয়ে দেয়। "আমি কিভাবে সফল হব?" জিজ্ঞাসা করার পরিবর্তে, আপনি জিজ্ঞাসা করেন "কী আমাকে ব্যর্থ করে তুলবে?" এবং সেই জিনিসগুলি এড়িয়ে চলুন। এটি এমন ঝুঁকি এবং অ্যান্টি-প্যাটার্নগুলিকে উন্মোচন করে যা সামনের চিন্তা প্রায়শই মিস করে।

  - id: law_of_diminishing_returns
    name: ক্রমহ্রাসমান প্রান্তিক আয়ের নিয়ম
    path: mental-models-bn/law-of-diminishing-returns.yaml
    description: |
      ক্রমহ্রাসমান প্রান্তিক আয়ের নিয়ম বলে যে, যখন অন্য সবকিছু স্থির রেখে একটি উপকরণের পরিমাণ বৃদ্ধি করা হয়, তখন প্রতিটি নতুন একক থেকে প্রাপ্ত অতিরিক্ত উৎপাদন শেষ পর্যন্ত কমে যেতে থাকে। বেশি সবসময় ভালো নয়—এমন একটি বিন্দু আছে যেখানে অতিরিক্ত প্রচেষ্টা কম থেকে কম ফল দেয়।

  - id: loss_aversion_bias
    name: ক্ষতি এড়ানোর পক্ষপাত (Loss Aversion Bias)
    path: mental-models-bn/loss-aversion-bias.yaml
    description: |
      ক্ষতি এড়ানোর পক্ষপাত হল সমপরিমাণ লাভের চেয়ে ক্ষতি এড়াতে অগ্রাধিকার দেওয়ার প্রবণতা।
      মানুষ লাভের আনন্দ উপভোগ করার চেয়ে ক্ষতির বেদনা প্রায় দ্বিগুণ বেশি অনুভব করে।

  - id: map_is_not_the_territory
    name: মানচিত্র আসলে অঞ্চল নয়
    path: mental-models-bn/map-is-not-the-territory.yaml
    description: |
      "মানচিত্র আসলে অঞ্চল নয়" এর অর্থ হল বাস্তবতার একটি উপস্থাপনা নিজেই বাস্তবতা নয়।
      মডেল, তত্ত্ব এবং বর্ণনা দরকারী সরলীকরণ, কিন্তু তারা সবসময় কিছু বাদ দেয়।
      মানচিত্রকে অঞ্চলের সাথে বিভ্রান্ত করা ত্রুটির দিকে পরিচালিত করে।

  - id: mere_exposure_effect
    name: Mere Exposure Effect
    path: mental-models-bn/mere-exposure-effect.yaml
    description: |
      Mere exposure effect হল পরিচিতির কারণে কোনো কিছুর প্রতি পছন্দ তৈরি হওয়ার প্রবণতা।
      বারবার দেখলেই—কোনো রকম সমর্থন ছাড়াই—পছন্দ বাড়ে। আমরা যা জানি, তাই বেশি পছন্দ করি।

  - id: narrative_fallacy
    name: ন্যারেটিভ ফ্যালাসি
    path: mental-models-bn/narrative-fallacy.yaml
    description: |
      ন্যারেটিভ ফ্যালাসি হলো অতীতের ঘটনাগুলো থেকে এমন গল্প তৈরি করার প্রবণতা, যা ঘটনাগুলোকে
      প্রকৃতপক্ষে যা ছিল তার চেয়ে বেশি সুসংগত, অনুমানযোগ্য এবং অর্থপূর্ণ বলে মনে হয়। আমরা
      অনিশ্চয়তাকে ব্যাখ্যা দিয়ে ঠিক করে নিই। আমরা ইতিহাসের জগাঘেঁচি থেকে একটি পরিপাটি
      গল্প তৈরি করি—এবং তারপরে বিশ্বাস করি যে গল্পটি অনিবার্য ছিল।

  - id: negativity_bias
    name: নেতিবাচকতার পক্ষপাত
    path: mental-models-bn/negativity-bias.yaml
    description: |
      নেতিবাচকতার পক্ষপাত হলো ইতিবাচক তথ্যের চেয়ে নেতিবাচক তথ্যকে বেশি গুরুত্ব দেওয়ার প্রবণতা। খারাপ খবর, সমালোচনা এবং হুমকি আমাদের মনোযোগ আকর্ষণ করে এবং সমতুল্য ইতিবাচক উদ্দীপনার চেয়ে আমাদের সিদ্ধান্তকে দৃঢ়ভাবে প্রভাবিত করে।

  - id: occams_razor
    name: ওকামের ক্ষুর
    path: mental-models-bn/occams-razor.yaml
    description: |
      ওকামের ক্ষুর (Occam's Razor) হলো সেই নীতি যা বলে যে একাধিক সম্ভাব্য অনুমানের মধ্যে,
      যে অনুমানে সবচেয়ে কম ধারণা জড়িত, সেটিকে অগ্রাধিকার দেওয়া উচিত। সরল ব্যাখ্যাগুলো
      প্রায়শই—সবসময় না হলেও—সঠিক হয়।

  - id: ostrich_effect
    name: উটপাখি প্রভাব (Ostrich Effect)
    path: mental-models-bn/ostrich-effect.yaml
    description: |
      উটপাখি প্রভাব হল নেতিবাচক আর্থিক তথ্য এড়িয়ে যাওয়ার প্রবণতা—উটপাখির মতো "মাটি চাপা দেওয়া"। মানুষ বাজার পড়লে তাদের পোর্টফোলিও দেখতে এড়িয়ে যায়, বিল খুলতে দেরি করে এবং সতর্কীকরণ লক্ষণগুলি উপেক্ষা করে যা তাদের কাজ করতে সাহায্য করতে পারে।

  - id: pareto_principle
    name: প্যারেটো নীতি
    path: mental-models-bn/pareto-principle.yaml
    description: |
      প্যারেটো নীতি (বা ৮০/২০ নিয়ম) বলে যে প্রায় ৮০% প্রভাব ২০% কারণ থেকে আসে। অল্প সংখ্যক ইনপুট প্রায়শই বেশিরভাগ আউটপুট তৈরি করে—বিক্রয়, ত্রুটি, গ্রাহক, প্রচেষ্টা, বৈশিষ্ট্য এবং আরও অনেক কিছুতে। অত্যাবশ্যকীয় অল্প সংখ্যক উপর মনোযোগ দিন।

  - id: parkinsons_law
    name: পার্কিনসন'স ল (Parkinson's Law)
    path: mental-models-bn/parkinsons-law.yaml
    description: |
      পার্কিনসন'স ল (Parkinson's Law) বলে যে, "কাজ সম্পন্ন করার জন্য উপলব্ধ সময় পূরণ করতে কাজ প্রসারিত হয়।" একটি কাজকে এক সপ্তাহ সময় দিন, এবং এটি এক সপ্তাহ সময় নেবে; একটি দিন সময় দিন, এবং এটি প্রায়শই একদিনে সম্পন্ন হয়। এটি বাজেট, দলের আকার এবং সম্পদের ক্ষেত্রেও প্রযোজ্য।

  - id: probabilistic_thinking
    name: সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা
    path: mental-models-bn/probabilistic-thinking.yaml
    description: |
      সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা হলো নিশ্চিততার পরিবর্তে সম্ভাবনার নিরিখে যুক্তি করার অভ্যাস। "এটা কি ঘটবে?" এই প্রশ্নের পরিবর্তে আমরা জিজ্ঞাসা করি "এটির ঘটার সম্ভাবনা কত?" এটি অনিশ্চয়তাকে আলিঙ্গন করে এবং উন্নত সিদ্ধান্ত নিতে এটি ব্যবহার করে।

  - id: pygmalion_effect
    name: পিগম্যালিয়ন প্রভাব
    path: mental-models-bn/pygmalion-effect.yaml
    description: |
      পিগম্যালিয়ন প্রভাব (বা রোশেন্থাল প্রভাব) হলো এমন একটি ঘটনা যেখানে উচ্চতর প্রত্যাশা উন্নত পারফরম্যান্সের দিকে পরিচালিত করে। যখন শিক্ষক, ম্যানেজার বা অন্যরা কারো কাছ থেকে বেশি প্রত্যাশা করে, তখন সেই ব্যক্তি আরও ভালো পারফর্ম করতে থাকে। প্রত্যাশাগুলো আত্ম-পূরণকারী ভবিষ্যদ্বাণীতে পরিণত হয়।

  - id: regression_to_the_mean
    name: গড়-এর দিকে প্রত্যাবর্তন
    path: mental-models-bn/regression-to-the-mean.yaml
    description: |
      গড়-এর দিকে প্রত্যাবর্তন হল পরিসংখ্যানগত একটি ঘটনা যেখানে চরম ফলাফলগুলি গড়-এর কাছাকাছি ফলাফল দ্বারা অনুসরণ করা হয়। অস্বাভাবিকভাবে ভালো বা খারাপ ফলাফলের পরে, পরবর্তী ফলাফল সম্ভবত কম চরম হবে—কোনও কার্যকারণ হস্তক্ষেপের কারণে নয়, বরং এলোমেলো ভিন্নতার কারণে।

  - id: rosy_retrospection
    name: গোলাপী স্মৃতিচারণ
    path: mental-models-bn/rosy-retrospection.yaml
    description: |
      গোলাপী স্মৃতিচারণ হল অতীতকে সেটির চেয়ে ভালো ছিল এমনভাবে মনে রাখার প্রবণতা।
      সময়ের সাথে সাথে আমরা অতীতের অভিজ্ঞতাগুলোকে আরও ইতিবাচকভাবে স্মরণ করি, অসুবিধাগুলোকে মসৃণ করে এবং ভালো জিনিসগুলোকে বাড়িয়ে তুলি। "ভালো পুরানো দিনগুলো" প্রায়শই আমরা মনে করি ততটা ভালো ছিল না।

  - id: salience_bias
    name: প্রধান্য পক্ষপাত (Salience Bias)
    path: mental-models-bn/salience-bias.yaml
    description: |
      প্রধান্য পক্ষপাত হলো কোনো পরিস্থিতির সবচেয়ে সুস্পষ্ট বা দৃষ্টিগোচর
      বিষয়গুলিতে মনোযোগ দেওয়ার প্রবণতা, যেখানে কম স্পষ্ট কিন্তু সম্ভাব্য
      গুরুত্বপূর্ণ বিষয়গুলি উপেক্ষা করা হয়। যা চোখে পড়ে তা আমাদের
      সিদ্ধান্তগুলিতে অসম অনুপাতে মনোযোগ এবং গুরুত্ব পায়।

  - id: scarcity_bias
    name: দুষ্প্রাপ্যতা পক্ষপাত (Scarcity Bias)
    path: mental-models-bn/scarcity-bias.yaml
    description: |
      দুষ্প্রাপ্যতা পক্ষপাত হলো সীমিত বা দুষ্প্রাপ্য বলে বিবেচিত জিনিসগুলির প্রতি বেশি মূল্য দেওয়ার প্রবণতা। "সীমিত সময়," "মাত্র ৩টি বাকি," এবং "একচেটিয়া অ্যাক্সেস" ইত্যাদি শব্দগুলি যুক্তিসঙ্গত মূল্যায়নকে ছাপিয়ে জরুরি অবস্থা এবং আকাঙ্ক্ষা জাগিয়ে তোলে, তা আমরা আসলে সেই জিনিসটি চাই বা প্রয়োজন কিনা তা বিবেচনা না করেই।

  - id: second_order_thinking
    name: দ্বিতীয়-পর্যায়ের চিন্তা
    path: mental-models-bn/second-order-thinking.yaml
    description: |
      দ্বিতীয়-পর্যায়ের চিন্তা হলো আপনার কাজের পরিণতির পরিণতিগুলি বিবেচনা করার অভ্যাস। প্রথম-পর্যায়ের চিন্তা জিজ্ঞাসা করে "যদি আমি X করি তাহলে কি হবে?" দ্বিতীয়-পর্যায়ের চিন্তা জিজ্ঞাসা করে "তারপর কি হবে?" এবং "তার পরে কী হবে?" এটি অনিচ্ছাকৃত প্রভাবগুলি প্রকাশ করে।

  - id: sunk_cost_fallacy
    name: সাক (Sunk) কস্টের ভ্রান্তি (Sunk Cost Fallacy)
    path: mental-models-bn/sunk-cost-fallacy.yaml
    description: |
      সাক কস্টের ভ্রান্তি হলো যে কোনো সিদ্ধান্তে ইতিমধ্যে যে পরিমাণ সম্পদ ব্যয় হয়ে গেছে, তার উপর ভিত্তি করে সেই সিদ্ধান্ত চালিয়ে যাওয়ার প্রবণতা, ভবিষ্যতের প্রত্যাশিত রিটার্নের উপর ভিত্তি করে নয়।
      "আমরা এতদূর এসেছি" বা "আমি ইতিমধ্যেই অনেক কিছু বিনিয়োগ করেছি" এই কথাগুলো আরও খারাপ জায়গায় ভালো অর্থ ঢালতে প্ররোচিত করে।

  - id: survivorship_bias
    name: সারভাইভারশিপ বায়াস (Survivorship Bias)
    path: mental-models-bn/survivorship-bias.yaml
    description: |
      সারভাইভারশিপ বায়াস হলো একটি যৌক্তিক ত্রুটি যেখানে আমরা শুধুমাত্র সেইসব ব্যক্তি বা বস্তুর উপর মনোযোগ দেই যারা কোনো প্রক্রিয়া থেকে "বেঁচে গেছে" এবং যারা তা পারেনি তাদের উপেক্ষা করি। আমরা বিজয়ীদের দেখি এবং পরাজিতদের ভুলে যাই, যা সাফল্য ও ব্যর্থতা সম্পর্কে অতিরিক্ত আশাবাদী সিদ্ধান্তে উপনীত করে।

  - id: zeigarnik_effect
    name: লেইগার্নিক এফেক্ট
    path: mental-models-bn/zeigarnik-effect.yaml
    description: |
      লেইগার্নিক এফেক্ট হল অসম্পূর্ণ বা বাধাগ্রস্ত কাজগুলো সম্পন্ন কাজের চেয়ে বেশি মনে থাকার প্রবণতা। অসম্পূর্ণ কাজগুলো মানসিক চাপ সৃষ্টি করে যা সেগুলোকে আমাদের মনে সক্রিয় রাখে। আমাদের মস্তিষ্ক অপূর্ণ কাজগুলোকে ধরে রাখে।

  - id: zero_sum_thinking
    name: শূন্য-যোগ চিন্তা (Zero-Sum Thinking)
    path: mental-models-bn/zero-sum-thinking.yaml
    description: |
      শূন্য-যোগ চিন্তা হলো এই বিশ্বাস যে একজনের লাভ অবশ্যই অন্যজনের ক্ষতি—
      সম্পদ নির্দিষ্ট এবং আপনার যেকোনো সুবিধা মানে আমার অসুবিধা।
      আসলে, অনেক পরিস্থিতিই ইতিবাচক-যোগ: উভয় পক্ষই লাভবান হতে পারে।
