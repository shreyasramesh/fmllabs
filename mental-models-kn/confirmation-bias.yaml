# ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ (Confirmation Bias)
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: confirmation_bias
name: ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ

quick_introduction: |
  ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ ಎಂದರೆ ನಮ್ಮ ಪೂರ್ವಭಾವಿ ನಂಬಿಕೆಗಳನ್ನು ದೃಢಪಡಿಸುವ ರೀತಿಯಲ್ಲಿ ಮಾಹಿತಿಯನ್ನು ಹುಡುಕುವ, ವ್ಯಾಖ್ಯಾನಿಸುವ ಮತ್ತು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಸಹಾಯಕ ಸಾಕ್ಷ್ಯಗಳಿಗೆ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆ ನೀಡುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮ ದೃಷ್ಟಿಕೋನಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ ಅಥವಾ ತಿರಸ್ಕರಿಸುತ್ತೇವೆ. ನಾವು ನಮ್ಮ ಕಲ್ಪನೆಗಳನ್ನು ಪರೀಕ್ಷಿಸುವ ಬದಲು ದೃಢಪಡಿಸುವ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳುತ್ತೇವೆ.

one_liner: ನಾವು ನಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ದೃಢಪಡಿಸುವದನ್ನು ಹುಡುಕುತ್ತೇವೆ ಮತ್ತು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೇವೆ; ನಾವು ಅವುಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವದನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ.

try_this:
  - ಕೇಳಿ: ನನ್ನನ್ನು ಯಾವುದು ತಪ್ಪು ಎಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ? ವಿರುದ್ಧ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ.
  - ಸಹಾಯಕ ಮಾಹಿತಿಗೆ, ವಿರುದ್ಧ ಮಾಹಿತಿಗಿಂತ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆ ನೀಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
  - ವಿರುದ್ಧ ದೃಷ್ಟಿಕೋನವನ್ನು ನಿಮ್ಮ ಸ್ವಂತದಷ್ಟು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಿ.

ask_yourself:
  - ನಾನು ನನ್ನ ಕಲ್ಪನೆಯನ್ನು ಪರೀಕ್ಷಿಸುತ್ತಿದ್ದೇನೆಯೇ ಅಥವಾ ಕೇವಲ ದೃಢಪಡಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ಹೊಸ ಸಾಕ್ಷ್ಯಗಳ ಆಧಾರದ ಮೇಲೆ ನಾನು ಕೊನೆಯ ಬಾರಿ ನನ್ನ ಮನಸ್ಸನ್ನು ಯಾವಾಗ ಬದಲಾಯಿಸಿಕೊಂಡೆ?

in_more_detail: |
  ನಾವು ಮಾಹಿತಿಯ ತಟಸ್ಥ ಪ್ರಕ್ರಿಯೆಗಾರರಲ್ಲ. ನಾವು ದೃಢೀಕರಣವನ್ನು ಹುಡುಕುತ್ತೇವೆ, ಅಸ್ಪಷ್ಟತೆಯನ್ನು ಬೆಂಬಲವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೇವೆ ಮತ್ತು ಹಿಟ್'ಗಳನ್ನು ಮಿಸ್'ಗಳಿಗಿಂತ ಹೆಚ್ಚು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೇವೆ. ನಾವು ನಮ್ಮಂತೆಯೇ ಯೋಚಿಸುವ ಜನರ ಮತ್ತು ಮಾಧ್ಯಮಗಳ ಸುತ್ತಲೂ ನಮ್ಮನ್ನು ಸುತ್ತುವರಿಯುತ್ತೇವೆ. ನಾವು "ನಾನು ಏಕೆ ಸರಿ?" ಎಂದು ಕೇಳುತ್ತೇವೆ, "ನನ್ನನ್ನು ಯಾವುದು ತಪ್ಪು ಎಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ?" ಎಂದು ಕೇಳುವ ಬದಲು. ಇದು ನಮ್ಮನ್ನು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನಾಗಿ ಮಾಡುತ್ತದೆ ಮತ್ತು ನವೀಕರಿಸಲು ನಿಧಾನಗೊಳಿಸುತ್ತದೆ.

  ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವು ಅತ್ಯಂತ ವ್ಯಾಪಕವಾಗಿ ಹರಡಿರುವ ಮತ್ತು ಉತ್ತಮವಾಗಿ ದಾಖಲಿಸಲ್ಪಟ್ಟ ಪಕ್ಷಪಾತಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ.
  ಇದು ವಿಜ್ಞಾನ, ರಾಜಕೀಯ, ಸಂಬಂಧಗಳು ಮತ್ತು ವ್ಯವಹಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದನ್ನು ಜಯಿಸಲು
  ಉದ್ದೇಶಪೂರ್ವಕ ಪ್ರಯತ್ನ ಮತ್ತು ರಚನಾತ್ಮಕ ಪ್ರಕ್ರಿಯೆಗಳ ಅಗತ್ಯವಿದೆ.

why_this_is_important: |
  ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ ಮತ್ತು ಕಲಿಯುವಿಕೆಗೆ ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ಅತ್ಯಗತ್ಯ.
  ಇದು ವಿರುದ್ಧ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಹುಡುಕಲು, ಪರ್ಯಾಯ ಕಲ್ಪನೆಗಳನ್ನು ಪರಿಗಣಿಸಲು ಮತ್ತು ಅಗತ್ಯವಿದ್ದಾಗ ನಿಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ವೈಜ್ಞಾನಿಕ ಚಿಂತನೆಯ ಅಡಿಪಾಯವಾಗಿದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಕಲಿಕೆ
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  seeking_support: |
    ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಪರೀಕ್ಷಿಸುವ ಬದಲು ದೃಢಪಡಿಸುವ ಸಾಕ್ಷ್ಯಗಳಿಗಾಗಿ ಹುಡುಕುವುದು.
  asymmetric_interpretation: |
    ಅಸ್ಪಷ್ಟ ಸಾಕ್ಷ್ಯಗಳನ್ನು ನಿಮ್ಮ ಸ್ಥಾನಕ್ಕೆ ಬೆಂಬಲವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುವುದು.
  discounting_disconfirming: |
    ನಿಮ್ಮ ನಂಬಿಕೆಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವ ಸಾಕ್ಷ್ಯಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು ಅಥವಾ ಕಡಿಮೆ ಮಾಡುವುದು.
  selective_exposure: |
    ನಿಮ್ಮೊಂದಿಗೆ ಒಪ್ಪುವ ಮೂಲಗಳಿಂದ ಮಾತ್ರ ಮಾಹಿತಿಯನ್ನು ಸೇವಿಸುವುದು.

examples:
  hiring: |
    ಆರಂಭಿಕ ಸಕಾರಾತ್ಮಕ ಅಭಿಪ್ರಾಯವನ್ನು ರೂಪಿಸಿ, ತದನಂತರ ಅಭ್ಯರ್ಥಿಯು ಉತ್ತಮವಾಗಿದ್ದಾನೆ ಎಂದು ದೃಢಪಡಿಸುವ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳುವುದು.
  investing: |
    ಷೇರು ಖರೀದಿಸಿದ ನಂತರ, ಸಕಾರಾತ್ಮಕ ಸುದ್ದಿಗಳಿಗಾಗಿ ಹುಡುಕುವುದು ಮತ್ತು ನಕಾರಾತ್ಮಕ ವಿಶ್ಲೇಷಣೆಯನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  relationships: |
    ನಿಮ್ಮ ಪಾಲುದಾರರ ಕ್ರಿಯೆಗಳನ್ನು ಅವರ ಬಗ್ಗೆ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ದೃಢಪಡಿಸುವ ಮಸೂರಗಳ ಮೂಲಕ ವ್ಯಾಖ್ಯಾನಿಸುವುದು (ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟದು).
  politics: |
    ನಿಮ್ಮ ಕಡೆಯಿಂದ ಮಾಹಿತಿಯನ್ನು ವಿವೇಚನೆ ಇಲ್ಲದೆ ಸ್ವೀಕರಿಸುವುದು ಮತ್ತು ಎದುರಾಳಿ ಕಡೆಯಿಂದ ಸಮಾನ ಮಾಹಿತಿಯನ್ನು ತಿರಸ್ಕರಿಸುವುದು.

real_world_implications: |
  ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವು ಸುಳ್ಳು ನಂಬಿಕೆಗಳನ್ನು ಮುಂದುವರಿಸುತ್ತದೆ, ಧ್ರುವೀಕರಣವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ ಮತ್ತು ದುಬಾರಿ ತಪ್ಪುಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
  ಇದು ಉತ್ತಮ ವಿಜ್ಞಾನ ಮತ್ತು ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಗೆ ಶತ್ರುವಾಗಿದೆ. ಅದನ್ನು ಜಯಿಸಲು
  ಉದ್ದೇಶಪೂರ್ವಕ ದೃಢೀಕರಣ ವಿರೋಧಿ ಹುಡುಕಾಟದ ಅಗತ್ಯವಿದೆ.

professional_application:
  networking_and_relationship_building: |
    ಜನರ ಬಗ್ಗೆ ಅಭಿಪ್ರಾಯಗಳನ್ನು ರೂಪಿಸುವಾಗ, ವಿರುದ್ಧ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ.
    "ನನ್ನ ಮನಸ್ಸನ್ನು ಯಾವುದು ಬದಲಾಯಿಸುತ್ತದೆ?" ಎಂದು ಕೇಳಿ ಮತ್ತು ಅದನ್ನು ಹುಡುಕಿ.
  collaborative_learning_initiative: |
    ವಿರುದ್ಧ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹೊರತರಲು ಡೆವಿಲ್'ಸ್ ಅಡ್ವೋಕೇಟ್, ರೆಡ್ ಟೀಮ್‌ಗಳು ಮತ್ತು ಪ್ರಿ-ಮೋರ್ಟಮ್‌ಗಳನ್ನು ಬಳಸಿ.
    ಉತ್ತಮ ಸಾಕ್ಷ್ಯಗಳೊಂದಿಗೆ ಪ್ರಚಲಿತ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಪ್ರಶ್ನಿಸುವ ಜನರಿಗೆ ಬಹುಮಾನ ನೀಡಿ.

how_can_this_be_misapplied:
  false_balance: |
    ಒಂದು ಕಡೆಯನ್ನು ಬಲವಾಗಿ ಬೆಂಬಲಿಸುವಾಗ ಎಲ್ಲಾ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಸಮಾನವಾಗಿ ಮಾನ್ಯವೆಂದು ಪರಿಗಣಿಸುವುದು.
  excessive_skepticism: |
    ಕೆಲವು ನಂಬಿಕೆಗಳು ಉತ್ತಮವಾಗಿ ಬೆಂಬಲಿತವಾಗಿರುವಾಗ ಎಲ್ಲಾ ಸಾಕ್ಷ್ಯಗಳನ್ನು "ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ" ಎಂದು ತಿರಸ್ಕರಿಸುವುದು.
  contrarianism: |
    ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ತಪ್ಪಿಸಲು ಎದುರಾಳಿ ದೃಷ್ಟಿಕೋನವನ್ನು ಅಳವಡಿಸಿಕೊಳ್ಳುವುದು — ಮೂಲ ದೃಷ್ಟಿಕೋನವು ಸರಿಯಾಗಿರಬಹುದು.
  analysis_paralysis: |
    "ನಾವು ಪಕ್ಷಪಾತಿಯಾಗಿರಬಹುದು" ಎಂದು ಹೇಳುತ್ತಾ ಯಾವುದೇ ದೃಷ್ಟಿಕೋನಕ್ಕೆ ಎಂದಿಗೂ ಬದ್ಧರಾಗದಿರುವುದು.

