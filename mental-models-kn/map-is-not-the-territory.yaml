# ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: map_is_not_the_territory
name: ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ

quick_introduction: |
  "ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ" ಎಂದರೆ ವಾಸ್ತವದ ಪ್ರಾತಿನಿಧ್ಯವು ವಾಸ್ತವವೇ ಅಲ್ಲ. ಮಾದರಿಗಳು, ಸಿದ್ಧಾಂತಗಳು ಮತ್ತು ವಿವರಣೆಗಳು ಉಪಯುಕ್ತ ಸರಳೀಕರಣಗಳಾಗಿವೆ, ಆದರೆ ಅವು ಯಾವಾಗಲೂ ಏನನ್ನಾದರೂ ಬಿಟ್ಟುಬಿಡುತ್ತವೆ. ನಕ್ಷೆಯನ್ನು ಭೂಪ್ರದೇಶಕ್ಕಾಗಿ ಗೊಂದಲಗೊಳಿಸುವುದರಿಂದ ದೋಷ ಉಂಟಾಗುತ್ತದೆ.

one_liner: ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ—ಎಲ್ಲಾ ಮಾದರಿಗಳು ತಪ್ಪಾಗಿವೆ; ಕೆಲವು ಉಪಯುಕ್ತವಾಗಿವೆ.

try_this:
  - ಮಾದರಿಯು ವಾಸ್ತವಕ್ಕೆ ಹೊಂದಿಕೆಯಾಗದಿದ್ದಾಗ, ನಕ್ಷೆಯನ್ನು ನವೀಕರಿಸಿ—ವಾಸ್ತವಕ್ಕೆ ಹೊಂದಿಕೆಯಾಗುವಂತೆ ಒತ್ತಾಯಿಸಬೇಡಿ.
  - ಕೇಳಿ: ಈ ಮಾದರಿ ಏನು ಬಿಟ್ಟುಬಿಡುತ್ತಿದೆ? ಇದು ಯಾವಾಗ ವಿಫಲವಾಗಬಹುದು?
  - ಮಾದರಿಗಳನ್ನು ಸತ್ಯವೆಂದು ಅಲ್ಲ, ಸಾಧನಗಳೆಂದು ಪರಿಗಣಿಸಿ.

ask_yourself:
  - ನನ್ನ ಮಾದರಿಯನ್ನು ವಾಸ್ತವದೊಂದಿಗೆ ಗೊಂದಲಗೊಳಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಾನು ಕೊನೆಯದಾಗಿ ನೋಡಿದಾಗಿನಿಂದ ಭೂಪ್ರದೇಶ ಬದಲಾಗಿದೆಯೇ?

in_more_detail: |
  ಆಲ್ಫ್ರೆಡ್ ಕೊರ್ಜಿಬ್ಸ್ಕಿ ಸಾಮಾನ್ಯ ಅರ್ಥಶಾಸ್ತ್ರದಲ್ಲಿ ಈ ಕಲ್ಪನೆಯನ್ನು ಪರಿಚಯಿಸಿದರು. ನಗರದ ನಕ್ಷೆಯು ಸಂಚರಿಸಲು ಉಪಯುಕ್ತವಾಗಿದೆ, ಆದರೆ ಅದು ನಗರವಲ್ಲ—ಇದು ವಿವರಗಳನ್ನು ಬಿಟ್ಟುಬಿಡುತ್ತದೆ, ಹಳೆಯದಾಗುತ್ತದೆ ಮತ್ತು ಎಲ್ಲವನ್ನೂ ಎಂದಿಗೂ ಸೆರೆಹಿಡಿಯಲು ಸಾಧ್ಯವಿಲ್ಲ. ಅದೇ ಮಾನಸಿಕ ಮಾದರಿಗಳು, ವೈಜ್ಞಾನಿಕ ಸಿದ್ಧಾಂತಗಳು ಮತ್ತು ಸಂಘಟನಾತ್ಮಕ ಪಟ್ಟಿಗಳಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ.

  ಎಲ್ಲಾ ಮಾದರಿಗಳು ತಪ್ಪಾಗಿವೆ; ಕೆಲವು ಉಪಯುಕ್ತವಾಗಿವೆ. ಅಪಾಯವೆಂದರೆ ಒಂದು ಮಾದರಿಯನ್ನು ಪೂರ್ಣ ಸತ್ಯವೆಂದು ಪರಿಗಣಿಸುವುದು, ವಿಶೇಷವಾಗಿ ಭೂಪ್ರದೇಶ ಬದಲಾದಾಗ. ವಾಸ್ತವವು ಹೊಂದಿಕೆಯಾಗದಿದ್ದಾಗ ನಕ್ಷೆಗಳನ್ನು ನವೀಕರಿಸುವುದರಿಂದ ಉತ್ತಮ ಚಿಂತನೆ ಉಂಟಾಗುತ್ತದೆ.

why_this_is_important: |
  ನಕ್ಷೆಗಳು ಭೂಪ್ರದೇಶದಿಂದ ಭಿನ್ನವಾಗಿರುತ್ತವೆ ಎಂದು ಗುರುತಿಸುವುದು ಮಾದರಿಗಳಲ್ಲಿ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಡೆಯುತ್ತದೆ, ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ ಮತ್ತು ಹಳೆಯದಾದ ಅಥವಾ ಅತಿಯಾಗಿ ಸರಳೀಕೃತ ಮಾಹಿತಿಯ ಮೇಲೆ ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಅಪಾಯವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
  - ಕಲಿಕೆ
  - ಅಪಾಯ_ಆಕಾರ
  - ಸಂವಹನ

how_can_you_spot_it:
  model_reality_confusion: |
    ಯಾವುದೇ ಚೌಕಟ್ಟನ್ನು ಅಥವಾ ಸಿದ್ಧಾಂತವನ್ನು ವಾಸ್ತವವನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ವಿವರಿಸುವಂತೆ ಪರಿಗಣಿಸುವುದು.
  outdated_assumptions: |
    ಪ್ರಸ್ತುತ ಪರಿಸ್ಥಿತಿಗಳಿಗೆ ಇನ್ನು ಮುಂದೆ ಹೊಂದಿಕೆಯಾಗದ ಮಾಹಿತಿ ಅಥವಾ ಮಾದರಿಗಳ ಮೇಲೆ ಕಾರ್ಯನಿರ್ವಹಿಸುವುದು.
  oversimplification: |
    "ನಕ್ಷೆ" ಅದನ್ನು ಒಳಗೊಳ್ಳದ ಕಾರಣ ಸೂಕ್ಷ್ಮ ವ್ಯತ್ಯಾಸಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು.
  map_worship: |
    ಸಾಕ್ಷ್ಯವು ವಿರುದ್ಧವಾದಾಗ ಮಾದರಿಯನ್ನು ನವೀಕರಿಸುವ ಬದಲು ರಕ್ಷಿಸುವುದು.

examples:
  organizational_charts: |
    ಕೆಲಸವು ನಿಜವಾಗಿ ಹೇಗೆ ನಡೆಯುತ್ತದೆ ಎಂಬುದನ್ನು ವರದಿ ಮಾಡುವ ರಚನೆಯು ಪ್ರತಿಬಿಂಬಿಸುತ್ತದೆ ಎಂದು ಊಹಿಸುವುದು.
  financial_models: |
    ಒಂದು ಸ್ಪ્રેಡ್‌ಶೀಟ್ ಮುನ್ಸೂಚನೆಯನ್ನು ಸನ್ನಿವೇಶದ ಬದಲು ಮುನ್ಸೂಚನೆಯಾಗಿ ಪರಿಗಣಿಸುವುದು.
  stereotypes: |
    ಗುಂಪು-ಮಟ್ಟದ ಸಾಮಾನ್ಯೀಕರಣಗಳನ್ನು ವ್ಯಕ್ತಿಗಳಿಗೆ ಅನ್ವಯಿಸುವುದು.
  strategy_docs: |
    ಮಾರುಕಟ್ಟೆಯು ಬದಲಾದಾಗ ಯೋಜನೆಯನ್ನು ಬರೆದಂತೆ ಕಾರ್ಯಗತಗೊಳಿಸುವುದು.

real_world_implications: |
  ನಕ್ಷೆ-ಭೂಪ್ರದೇಶದ ವ್ಯತ್ಯಾಸವು ವಿಜ್ಞಾನ, ಎಂಜಿನಿಯರಿಂಗ್ ಮತ್ತು ತತ್ವಶಾಸ್ತ್ರಕ್ಕೆ ಮೂಲಭೂತವಾಗಿದೆ. ಇದು ಬೈಸಿಯನ್ ನವೀಕರಿಸುವಿಕೆ, ಚುರುಕಾದ ಕಾರ್ಯವಿಧಾನ ಮತ್ತು ಜ್ಞಾನಶಾಸ್ತ್ರದ ವಿನಮ್ರತೆಗೆ ಆಧಾರವಾಗಿದೆ. ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಕಟ್ಟುನಿಟ್ಟಾದ ಚಿಂತನೆ ಮತ್ತು ವಿಫಲವಾದ ತಂತ್ರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಬಗ್ಗೆ ನಿಮ್ಮ ಮಾನಸಿಕ ಮಾದರಿಯು ಹಳೆಯದಾಗಿರಬಹುದು. ಹಳೆಯ ಅನಿಸಿಕೆಗಳ ಮೇಲೆ ಅವಲಂಬಿತರಾಗುವುದರ ಬದಲು ನೇರ ಸಂವಹನದ ಮೂಲಕ ಅದನ್ನು ನವೀಕರಿಸಿ.
  collaborative_learning_initiative: |
    ಯೋಜನೆಗಳು ಮತ್ತು ಮಾದರಿಗಳನ್ನು ಸ್ಥಿರ ಸತ್ಯಗಳೆಂದು ಅಲ್ಲ, ಪರೀಕ್ಷಿಸಲು ಮತ್ತು ಮಾರ್ಪಡಿಸಲು ಊಹೆಗಳೆಂದು ಪರಿಗಣಿಸಲು ತಂಡಗಳನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.

how_can_this_be_misapplied:
  radical_skepticism: |
    ಯಾವುದೇ ನಕ್ಷೆಯು ಉಪಯುಕ್ತವಲ್ಲ ಮತ್ತು ಎಲ್ಲಾ ಜ್ಞಾನವು ಅನುಮಾನಾಸ್ಪದವೆಂದು ತೀರ್ಮಾನಿಸುವುದು.
  constant_revision: |
    ಸ್ಥಿರವಾದ ತಿಳುವಳಿಕೆಯು ಉದ್ಭವಿಸದಂತೆ ಆಗಾಗ ನವೀಕರಿಸುವುದು.
  dismissing_models: |
    ಉಪಯುಕ್ತ ಸರಳೀಕರಣಗಳು "ಭೂಪ್ರದೇಶವಲ್ಲ" ಎಂದು ಅವುಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  relativism: |
    ಎಲ್ಲಾ ನಕ್ಷೆಗಳು ಸಮಾನವಾಗಿ ಮಾನ್ಯವಾಗಿರುತ್ತವೆ ಎಂದು ಹೇಳುವುದು, ಆದರೆ ಕೆಲವು ಸ್ಪಷ್ಟವಾಗಿ ಭೂಪ್ರದೇಶಕ್ಕೆ ಉತ್ತಮವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತವೆ.

