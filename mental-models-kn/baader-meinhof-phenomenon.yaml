# Baader-Meinhof ವಿದ್ಯಮಾನ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: baader_meinhof_phenomenon
name: Baader-Meinhof ವಿದ್ಯಮಾನ

quick_introduction: |
  Baader-Meinhof ವಿದ್ಯಮಾನ (ಇದನ್ನು ಆವರ್ತನ ಭ್ರಮೆ ಎಂದೂ ಕರೆಯಲಾಗುತ್ತದೆ) ಎಂದರೆ ನೀವು
  ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿಯುವಾಗ ಮತ್ತು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಅದನ್ನು ಎಲ್ಲೆಡೆ ಗಮನಿಸುವುದು. ಇದು ಕಾಕತಾಳೀಯವೆಂದು
  ಅನಿಸುತ್ತದೆ, ಆದರೆ ಇದು ಆಗಾಗ್ಗೆ ಆಯ್ಕೆಮಾಡಿದ ಗಮನ-ನಿಮ್ಮ ಮೆದುಳು ಇತ್ತೀಚೆಗೆ ಎದುರಿಸಿದ್ದನ್ನು ಗಮನಿಸಲು
  ಸಜ್ಜಾಗಿರುತ್ತದೆ.

one_liner: ನೀವು ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿಯುವಿರಿ ಮತ್ತು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಅದನ್ನು ಎಲ್ಲೆಡೆ ನೋಡುವಿರಿ-ಅದು
  ಯಾವಾಗಲೂ ಇತ್ತು.

try_this:
  - ಯಾವುದಾದರೂ ವಿಷಯವನ್ನು ಕಲಿತ ನಂತರ ಎಲ್ಲೆಡೆ ಕಾಣುತ್ತಿದೆ ಎಂದು ಅನಿಸಿದರೆ, ಮೂಲ ದರವನ್ನು ಪರಿಶೀಲಿಸಿ.
  - ಯಾವುದೇ ವಿಷಯವು ವಾಸ್ತವಕ್ಕಿಂತ ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿದೆ ಎಂದು ಅನಿಸುವಾಗ, ಇತ್ತೀಚೆಗೆ ಆದದ್ದನ್ನು ಗಮನಿಸಿ.
  - ಕೇಳಿ: ನಾನು ನಿಜವಾದ ಪ್ರವೃತ್ತಿಯನ್ನು ನೋಡುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ನಾನು ಗಮನಿಸಲು ಸಜ್ಜಾಗಿರುವುದನ್ನು ಮಾತ್ರ ನೋಡುತ್ತಿದ್ದೇನೆ?

ask_yourself:
  - ಇದು ನಿಜವಾಗಿಯೂ ಈಗ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆಯೇ, ಅಥವಾ ನಾನು ಅದನ್ನು ಹೆಚ್ಚು ಗಮನಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಾನು ಇತ್ತೀಚೆಗೆ ಕಲಿತುಕೊಳ್ಳದಿದ್ದರೆ ಈ ಮಾದರಿಯನ್ನು ನಾನು ನೋಡುತ್ತಿದ್ದೆನೇ?

in_more_detail: |
  Baader-Meinhof ಭಯೋತ್ಪಾದಕ ಗುಂಪಿನ ಬಗ್ಗೆ ಕೇಳಿದ ನಂತರ, ಒಬ್ಬ ವ್ಯಕ್ತಿಯು ದಿನಗಳಲ್ಲಿ ಸುದ್ದಿಗಳಲ್ಲಿ,
  ಸಂಭಾಷಣೆಯಲ್ಲಿ ಮತ್ತು ಲೇಖನಗಳಲ್ಲಿ ಅದರ ಉಲ್ಲೇಖಗಳನ್ನು ನೋಡಬಹುದು. ಈ ವಿದ್ಯಮಾನವು ಎರಡು
  ಘಟಕಗಳನ್ನು ಹೊಂದಿದೆ: ಆಯ್ಕೆಮಾಡಿದ ಗಮನ (ನೀವು ಹುಡುಕುತ್ತಿರುವುದನ್ನು ನೀವು ಗಮನಿಸುತ್ತೀರಿ) ಮತ್ತು
  ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ (ನೀವು ಯಶಸ್ಸುಗಳನ್ನು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೀರಿ ಮತ್ತು ಲೋಪಗಳನ್ನು ಮರೆತುಬಿಡುತ್ತೀರಿ).

  ಆ ವಿಷಯವು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆ ಎಂಬ ಭ್ರಮೆ. ವಾಸ್ತವದಲ್ಲಿ, ಅದು ಯಾವಾಗಲೂ
  ಇತ್ತು; ನೀವು ಅದಕ್ಕೆ ಒಗ್ಗಿಕೊಂಡಿರಲಿಲ್ಲ. ಇದು ಇತ್ತೀಚೆಗೆ ಕಲಿತ ಮಾಹಿತಿಯ ವ್ಯಾಪಕತೆ ಅಥವಾ
  ಪ್ರಮುಖತೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡಲು ಕಾರಣವಾಗಬಹುದು.

why_this_is_important: |
  Baader-Meinhof ವಿದ್ಯಮಾನವನ್ನು ಗುರುತಿಸುವುದು ಇತ್ತೀಚಿನ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯ ಆಧಾರದ ಮೇಲೆ
  ಏನಾದರೂ ಎಷ್ಟು ಸಾಮಾನ್ಯವಾಗಿದೆ ಅಥವಾ ಮಹತ್ವದ್ದಾಗಿದೆ ಎಂಬುದನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವುದನ್ನು
  ನಿವಾರಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನೀವು ಮೊದಲು ಗಮನಿಸಿದ ನಂತರ ಹೊಸ ಕಲ್ಪನೆಗಳು, ಉತ್ಪನ್ನಗಳು
  ಅಥವಾ ಪ್ರವೃತ್ತಿಗಳು ಏಕೆ "ಎಲ್ಲೆಡೆ" ಕಾಣಿಸಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಕಲಿಕೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ

how_can_you_spot_it:
  sudden_ubiquity: |
    ನೀವು ಹೊಸ ಪದ, ಪರಿಕಲ್ಪನೆ ಅಥವಾ ಉತ್ಪನ್ನವನ್ನು ಕಲಿಯುವಿರಿ ಮತ್ತು ದಿನಗಳಲ್ಲಿ ಅದನ್ನು ನಿರಂತರವಾಗಿ
    ನೋಡುತ್ತಿದ್ದೀರಿ ಎಂದು ಅನಿಸುತ್ತದೆ.
  recency_bias: |
    ಇತ್ತೀಚಿನ ಮಾಹಿತಿಯು ವಾಸ್ತವಕ್ಕಿಂತ ವಾಸ್ತವಕ್ಕೆ ಹೆಚ್ಚು ಪ್ರತಿನಿಧಿಸುವಂತೆ ಅನಿಸುತ್ತದೆ.
  pattern_seeking: |
    ನಿಮ್ಮ ಮೆದುಳು ಸಂಬಂಧವಿಲ್ಲದ ದೃಷ್ಟಿಗಳನ್ನು "ಇದು ಎಲ್ಲೆಡೆ ಇದೆ" ಎಂಬ ಕಥೆಯಾಗಿ
    ಜೋಡಿಸುತ್ತದೆ.
  forgetting_the_misses: |
    ವಿಷಯವನ್ನು ಎಷ್ಟು ಬಾರಿ ನೀವು ನೋಡದಿದ್ದನ್ನು ನೀವು ಟ್ರ್ಯಾಕ್ ಮಾಡುವುದಿಲ್ಲ - ನೀವು ನೋಡುವ
    ಬಾರಿಗಳನ್ನು ಮಾತ್ರ.

examples:
  vocabulary: |
    "serendipity" ಎಂಬ ಪದವನ್ನು ಕಲಿಯುವುದು ಮತ್ತು ಅದೇ ವಾರ ಮೂರು ವಿಭಿನ್ನ ಲೇಖನಗಳಲ್ಲಿ
    ಅದನ್ನು ಗಮನಿಸುವುದು.
  car_purchase: |
    ಒಂದು ನಿರ್ದಿಷ್ಟ ಕಾರು ಮಾದರಿಯನ್ನು ಖರೀದಿಸಲು ನಿರ್ಧರಿಸಿದ ನಂತರ, ನೀವು ಅದನ್ನು ಪ್ರತಿ
    ರಸ್ತೆಯಲ್ಲಿ ನೋಡುತ್ತೀರಿ - ಆದರೂ ಅದು ಯಾವಾಗಲೂ ಅಲ್ಲಿತ್ತು.
  health_anxiety: |
    ಒಂದು ಅಪರೂಪದ ರೋಗಲಕ್ಷಣದ ಬಗ್ಗೆ ಓದುವುದು ಮತ್ತು ನಂತರ ನಿಮ್ಮಲ್ಲಿ ಇದೇ ರೀತಿಯ ಸಂವೇದನೆಗಳನ್ನು
    ಗಮನಿಸುವುದು, ಅನಗತ್ಯ ಚಿಂತೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
  trends: |
    ಹೊಸ ಅಪ್ಲಿಕೇಶನ್ ಅಥವಾ ಪ್ರವೃತ್ತಿಯನ್ನು ಕಂಡುಹಿಡಿಯುವುದು ಮತ್ತು ಅದು ಇದ್ದಕ್ಕಿದ್ದಂತೆ
    ಆధిಪತ್ಯ ಸಾಧಿಸುತ್ತಿದೆ ಎಂದು ಅನಿಸುವುದು - ಅದು ಸಣ್ಣ ಬಳಕೆದಾರರ ನೆಲೆಯನ್ನು ಹೊಂದಿರಬಹುದು.

real_world_implications: |
  ಈ ವಿದ್ಯಮಾನವು ನಾವು ಪ್ರವೃತ್ತಿಗಳು, ಅಪಾಯಗಳು ಮತ್ತು ಅವಕಾಶಗಳನ್ನು ಗ್ರಹಿಸುವ ರೀತಿಯ ಮೇಲೆ
  ಪ್ರಭಾವ ಬೀರುತ್ತದೆ. ಮಾರಾಟಗಾರರು ಮತ್ತು ಮಾಧ್ಯಮಗಳು ಪುನರಾವರ್ತಿತ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯನ್ನು
  ಸೃಷ್ಟಿಸುವ ಮೂಲಕ ಅದನ್ನು ಬಳಸಿಕೊಳ್ಳಬಹುದು. ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ, ಇದು ಇತ್ತೀಚಿನ
  ಮಾಹಿತಿಯನ್ನು ಅತಿಯಾಗಿ ತೂಕ ಹಾಕಲು ಕಾರಣವಾಗಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    ಯಾರಾದರೂ ಕಲಿತ ನಂತರ ಒಂದು ವಿಷಯವನ್ನು ಪದೇ ಪದೇ ಉಲ್ಲೇಖಿಸಿದರೆ, ಅವರು ಆವರ್ತನ ಭ್ರಮೆಯನ್ನು
    ಅನುಭವಿಸುತ್ತಿರಬಹುದು ಎಂದು ಗುರುತಿಸಿ - ಆ ವಿಷಯವು ಅಗತ್ಯವಾಗಿ ಹೆಚ್ಚು ಸಂಬಂಧಿತವಲ್ಲ,
    ಅವರಿಗೆ ಹೆಚ್ಚು ಸ್ಪಷ್ಟವಾಗಿದೆ.
  collaborative_learning_initiative: |
    ತರಬೇತಿಯಲ್ಲಿ, ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿತ ನಂತರ "ಎಲ್ಲೆಡೆ ನೋಡುತ್ತಿರುವುದು" ಸಾಮಾನ್ಯ
    ಎಂಬುದನ್ನು ಬಲಪಡಿಸಿ; ಸರ್ವವ್ಯಾಪಕತೆಯ ಭಾವನೆಗಿಂತ ಮೂಲ ದರಗಳನ್ನು ಪರಿಶೀಲಿಸಲು
    ಪ್ರೋತ್ಸಾಹಿಸಿ.

how_can_this_be_misapplied:
  overestimating_prevalence: |
    ಇತ್ತೀಚೆಗೆ ಅದನ್ನು ಆಗಾಗ್ಗೆ ಗಮನಿಸಿದ್ದರಿಂದ ಏನಾದರೂ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆ ಅಥವಾ
    ಪ್ರಮುಖವಾಗಿದೆ ಎಂದು ಊಹಿಸುವುದು.
  confirmation_bias_amplification: |
    "ಎಲ್ಲೆಡೆ ನೋಡುತ್ತಿರುವ" ಭಾವನೆಯನ್ನು ನಂಬಿಕೆಯು ಸರಿಯಾಗಿದೆ ಎಂಬುದಕ್ಕೆ ಪುರಾವೆಯಾಗಿ
    ಬಳಸುವುದು.
  decision_distortion: |
    ಇತ್ತೀಚೆಗೆ ಕಲಿತ ಮಾಹಿತಿಯ ಆಧಾರದ ಮೇಲೆ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡುವುದು, ಅದು ಅಸಮಾನವಾಗಿ
    ಪ್ರಮುಖವೆಂದು ಅನಿಸುತ್ತದೆ.
  vulnerability_to_manipulation: |
    ಮಾರಾಟಗಾರರು ಮತ್ತು ಪ್ರಚಾರಕರು ಸರ್ವವ್ಯಾಪಕತೆ ಮತ್ತು ಪ್ರಮುಖತೆಯ ಭ್ರಮೆಯನ್ನು
    ಸೃಷ್ಟಿಸಲು ಪುನರಾವರ್ತಿತ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯನ್ನು ಬಳಸುತ್ತಾರೆ.

