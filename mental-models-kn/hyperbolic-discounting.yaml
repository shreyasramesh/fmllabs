# ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: hyperbolic_discounting
name: ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿ

quick_introduction: |
  ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿ ಎಂದರೆ ದೊಡ್ಡ, ನಂತರದ ಬಹುಮಾನಗಳಿಗಿಂತ ಚಿಕ್ಕ, ತಕ್ಷಣದ ಬಹುಮಾನಗಳನ್ನು ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ - ಮತ್ತು ತಾರ್ಕಿಕ ಮಾದರಿಗಳು ಊಹಿಸುವದಕ್ಕಿಂತ ಭವಿಷ್ಯವನ್ನು ಹೆಚ್ಚು ತೀವ್ರವಾಗಿ ರಿಯಾಯಿತಿ ಮಾಡುವುದು. ನಾವು ವರ್ತಮಾನವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ ಮತ್ತು ಭವಿಷ್ಯವನ್ನು ಅಸಮಂಜಸವಾದ ರೀತಿಯಲ್ಲಿ ಕಡಿಮೆ ಅಂದಾಜಿಸುತ್ತೇವೆ.

one_liner: ನಾವು ದೊಡ್ಡದಕ್ಕಿಂತ ಚಿಕ್ಕದನ್ನು, ನಂತರದಕ್ಕಿಂತ ತಕ್ಷಣದದನ್ನು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ - ಮತ್ತು ಭವಿಷ್ಯವನ್ನು ಅಸಮಂಜಸವಾಗಿ ರಿಯಾಯಿತಿ ನೀಡುತ್ತೇವೆ.

try_this:
  - ಮುಂಗಡ-ಒಪ್ಪಂದ: ನೀವು ಶಾಂತ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾಗ ನಿಮ್ಮ ಭವಿಷ್ಯದ ಸ್ವಯಂವಕ್ಕಾಗಿ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡಿ.
  - 'ಪುನರ್ನಿರ್ಮಾಣ: "ನನಗೆ ಇದು 10 ನಿಮಿಷಗಳಲ್ಲಿ ಬೇಕಾಗುತ್ತದೆಯೇ? 10 ತಿಂಗಳಲ್ಲಿ ಬೇಕಾಗುತ್ತದೆಯೇ?" ಅಸಮಂಜಸತೆಯನ್ನು ಬಹಿರಂಗಪಡಿಸಲು.'
  - ಉತ್ತಮ ಆಯ್ಕೆಗಳಿಗೆ ನಿಮ್ಮ ಭವಿಷ್ಯದ ಸ್ವಯಂವವನ್ನು ಬಂಧಿಸಲು ಬದ್ಧತೆಯ ಸಾಧನಗಳನ್ನು ಬಳಸಿ.

ask_yourself:
  - ನನ್ನ ಭವಿಷ್ಯದ ಸ್ವಯಂವದ ವೆಚ್ಚದಲ್ಲಿ ನಾನು ವರ್ತಮಾನವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇನೆಯೇ?
  - ಬಹುಮಾನವನ್ನು ಒಂದು ದಿನ, ಒಂದು ವರ್ಷ ವಿಳಂಬಗೊಳಿಸಿದರೆ ನಾನು ಈ ಆಯ್ಕೆ ಮಾಡುತ್ತೇನೆಯೇ?

in_more_detail: |
  ನಾವು ಒಂದು ವರ್ಷದಲ್ಲಿ $100 ಪಡೆಯುವುದಕ್ಕಿಂತ ಇಂದೇ $50 ಪಡೆಯಲು ಆದ್ಯತೆ ನೀಡಬಹುದು, ಆದರೆ ಎರಡು ವರ್ಷಗಳಲ್ಲಿ $100 ಪಡೆಯುವುದನ್ನು ಒಂದು ವರ್ಷದಲ್ಲಿ $50 ಪಡೆಯುವುದಕ್ಕಿಂತ ಆದ್ಯತೆ ನೀಡಬಹುದು - ಅದು ಅಸಮಂಜಸವಾಗಿದ್ದರೂ ಸಹ. ನಮ್ಮ ರಿಯಾಯಿತಿ ದರ ಸ್ಥಿರವಾಗಿರುವುದಿಲ್ಲ; ಇದು ಹೈಪರ್ಬೋಲಿಕ್ ಆಗಿದೆ. ಹತ್ತಿರದ ಭವಿಷ್ಯವನ್ನು ಹೆಚ್ಚು ರಿಯಾಯಿತಿ ನೀಡಲಾಗುತ್ತದೆ; ದೂರದ ಭವಿಷ್ಯವನ್ನು ಕಡಿಮೆ ತೀವ್ರವಾಗಿ ರಿಯಾಯಿತಿ ನೀಡಲಾಗುತ್ತದೆ. ಇದು ಮುಂದೂಡುವಿಕೆ, ವ್ಯಸನ ಮತ್ತು ಕಡಿಮೆ ಉಳಿತಾಯವನ್ನು ವಿವರಿಸುತ್ತದೆ.

  ವರ್ತಮಾನದ ಪಕ್ಷಪಾತವು ಸಂಬಂಧಿತ ಪರಿಕಲ್ಪನೆಯಾಗಿದೆ: ನಾವು ವರ್ತಮಾನ ಕ್ಷಣಕ್ಕೆ ಅಸಮಾನವಾದ ಮಹತ್ವವನ್ನು ನೀಡುತ್ತೇವೆ. ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿಯು ನಾವು ಮಾಡಿದ ಬದ್ಧತೆಗಳನ್ನು ಏಕೆ ಉಳಿಸಿಕೊಳ್ಳುವುದಿಲ್ಲ ಮತ್ತು ದೀರ್ಘಕಾಲೀನ ಯೋಜನೆ ಏಕೆ ಕಷ್ಟಕರವಾಗಿದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.

why_this_is_important: |
  ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ಪ್ರೋತ್ಸಾಹಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಲು, ನಿಮ್ಮ ಭವಿಷ್ಯದ ಸ್ವಯಂವವನ್ನು ಬದ್ಧಗೊಳಿಸಲು ಮತ್ತು ಅಲ್ಪಾವಧಿಯ ಬಲೆಗಳನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಾವು ಏಕೆ ಮುಂದೂಡುತ್ತೇವೆ ಮತ್ತು ನಾವು ಏಕೆ ದೀರ್ಘಕಾಲೀನ ಗುರಿಗಳೊಂದಿಗೆ ಹೆಣಗಾಡುತ್ತೇವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ-ಮಾಡುವುದು
  - ವೃತ್ತಿ-ಚಲನೆಗಳು
  - ಹೂಡಿಕೆ
  - ನಾಯಕತ್ವ

how_can_you_spot_it:
  present_preference: |
    ವಿಳಂಬಿತ, ದೊಡ್ಡ ಬಹುಮಾನಗಳಿಗಿಂತ ತಕ್ಷಣದ ತೃಪ್ತಿಯನ್ನು ಆರಿಸುವುದು.
  inconsistent_time_preferences: |
    ಸಮಯ ಕಳೆದಂತೆ ಬದಲಾಗುವ ಆದ್ಯತೆಗಳು (ಉದಾಹರಣೆಗೆ, ನಾವು ನಾಳೆ ಆಹಾರಕ್ರಮದಲ್ಲಿರಲು ಬಯಸುತ್ತೇವೆ ಆದರೆ ಇಂದು ತಿನ್ನುತ್ತೇವೆ).
  commitment_failures: |
    ಭವಿಷ್ಯವು ವರ್ತಮಾನವಾದಾಗ ನಾವು ಅನುಸರಿಸದ ಯೋಜನೆಗಳನ್ನು ಮಾಡುವುದು.
  procrastination: |
    ತಕ್ಷಣದ ಸೌಕರ್ಯಕ್ಕಾಗಿ ಪ್ರಮುಖ ಕಾರ್ಯಗಳನ್ನು ಮುಂದೂಡುವುದು.

examples:
  savings: |
    ನಿವೃತ್ತಿಗಾಗಿ ಉಳಿಸುವ ಬದಲು ಈಗ ಖರ್ಚು ಮಾಡಲು ಆರಿಸುವುದು - ಭವಿಷ್ಯವು ಅಮೂರ್ತವೆಂದು ಅನಿಸುತ್ತದೆ.
  health: |
    ಇಂದು ವ್ಯಾಯಾಮವನ್ನು ಸೌಕರ್ಯಕ್ಕಾಗಿ ಬಿಟ್ಟುಬಿಡುವುದು, ನಾವು ವಿಷಾದಿಸುತ್ತೇವೆ ಎಂದು ತಿಳಿದಿದ್ದರೂ - ನಾಳೆಯ ವಿಷಾದವನ್ನು ರಿಯಾಯಿತಿ ನೀಡಲಾಗುತ್ತದೆ.
  addiction: |
    ದೀರ್ಘಕಾಲೀನ ಆರೋಗ್ಯಕ್ಕಿಂತ ತಕ್ಷಣದ ಉನ್ನತಿಗೆ ಆದ್ಯತೆ ನೀಡುವುದು.
  deadlines: |
    ಗಡುವು ಹತ್ತಿರ ಬರುವವರೆಗೆ ಏನನ್ನೂ ಮಾಡದಿರುವುದು - ಆಗ "ವರ್ತಮಾನ"ವು ಗಡುವನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ ಮತ್ತು ನಾವು ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತೇವೆ.

real_world_implications: |
  ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿಯು ಉಳಿತಾಯ, ಆರೋಗ್ಯ, ಶಿಕ್ಷಣ ಮತ್ತು ವ್ಯಸನದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಅನೇಕ ಸ್ವಯಂ-ನಿಯಂತ್ರಣ ವೈಫಲ್ಯಗಳನ್ನು ವಿವರಿಸುತ್ತದೆ. ಬದ್ಧತೆಯ ಸಾಧನಗಳು (ಉದಾ., ಸ್ವಯಂಚಾಲಿತ ಉಳಿತಾಯ, ಹೊಣೆಗಾರಿಕೆ) ಭವಿಷ್ಯದ ಆಯ್ಕೆಗಳನ್ನು ನಿರ್ಬಂಧಿಸುವ ಮೂಲಕ ಸಹಾಯ ಮಾಡಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    ಭವಿಷ್ಯದ ಬದ್ಧತೆಗಳನ್ನು ಕೇಳುವಾಗ, ಭವಿಷ್ಯವನ್ನು "ವರ್ತಮಾನ"ವನ್ನಾಗಿ ಮಾಡುವ ಹೊಣೆಗಾರಿಕೆಯನ್ನು ರಚಿಸಿ (ಉದಾ., ಪರಿಶೀಲನೆಗಳು, ಗಡುವುಗಳು). ರಚನೆ ಇಲ್ಲದೆ ಜನರು ಅನುಸರಿಸುತ್ತಾರೆ ಎಂದು ಊಹಿಸಬೇಡಿ.
  collaborative_learning_initiative: |
    ಬದ್ಧತೆಯ ಸಾಧನಗಳನ್ನು ಬಳಸಿ: ಸಾರ್ವಜನಿಕ ಬದ್ಧತೆಗಳು, ಗಡುವುಗಳಿಗೆ ಮುಂಗಡ-ಬದ್ಧತೆ, ಮತ್ತು ದೀರ್ಘಕಾಲೀನ ಗುರಿಗಳನ್ನು ಹೆಚ್ಚು ತಕ್ಷಣದವೆಂದು ಭಾವಿಸುವ ರಚನೆಗಳು. ದೀರ್ಘ ಯೋಜನೆಗಳನ್ನು ಸಣ್ಣ ಮೈಲಿಗಲ್ಲುಗಳಾಗಿ ವಿಭಜಿಸಿ.

how_can_this_be_misapplied:
  excessive_control: |
    "ಸಹಾಯ" ಮಾಡುವ ಹೆಸರಿನಲ್ಲಿ ಜನರ ಆಯ್ಕೆಗಳನ್ನು ಅತಿಯಾಗಿ ನಿರ್ಬಂಧಿಸುವುದು ಅವರ ಭವಿಷ್ಯದ ಸ್ವಯಂವಗಳಿಗೆ.
  paternalism: |
    ಇತರರ ದೀರ್ಘಕಾಲೀನ ಹಿತಾಸಕ್ತಿಗಳಿಗೆ ಯಾವುದು ಉತ್ತಮ ಎಂದು ನಾವು ತಿಳಿದಿದ್ದೇವೆ ಎಂದು ಊಹಿಸುವುದು.
  ignoring_present_needs: |
    ಅಮೂರ್ತ ಭವಿಷ್ಯದ ಪ್ರಯೋಜನಗಳಿಗಾಗಿ ಕಾನೂನುಬದ್ಧವಾದ ವರ್ತಮಾನದ ಅಗತ್ಯಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು.
  one_size_fits_all: |
    ಜನರು ರಿಯಾಯಿತಿ ದರಗಳಲ್ಲಿ ಭಿನ್ನರಾಗಿರುತ್ತಾರೆ; ಎಲ್ಲರಿಗೂ ಒಂದೇ ಬದ್ಧತೆಯ ಸಾಧನಗಳ ಅಗತ್ಯವಿಲ್ಲ.

