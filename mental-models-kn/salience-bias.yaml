ญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญalien bias, availability heuristic, and recency bias. It affects risk perception, hiring, and strategy. The most visible problems get addressed; the invisible ones fester.

why_this_is_important: |
  Recognizing salience bias helps you look beyond what's obvious and
  consider less visible factors. It improves risk assessment, problem
  diagnosis, and decision quality. Important things aren't always
  salient.

