name: เฒธเฒฒเณยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญยญย