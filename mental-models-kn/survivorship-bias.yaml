id: survivorship_bias
name: ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ

quick_introduction: |
  ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ ಎಂದರೆ ಒಂದು ಪ್ರಕ್ರಿಯೆಯಲ್ಲಿ "ಬದುಕಿ ಉಳಿದ" ವ್ಯಕ್ತಿಗಳು ಅಥವಾ ವಿಷಯಗಳ ಮೇಲೆ ಮಾತ್ರ ಗಮನ ಕೇಂದ್ರೀಕರಿಸಿ, ಬದುಕಿ ಉಳಿಯದವರನ್ನು ಕಡೆಗಣಿಸುವ ತಾರ್ಕಿಕ ದೋಷವಾಗಿದೆ. ನಾವು ವಿಜೇತರನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಸೋತವರನ್ನು ಮರೆಯುತ್ತೇವೆ, ಇದು ಯಶಸ್ಸು ಮತ್ತು ವೈಫಲ್ಯದ ಬಗ್ಗೆ ಅತಿಯಾದ ಆಶಾವಾದಿ ತೀರ್ಮಾನಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

one_liner: ನಾವು ವಿಜೇತರನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಸೋತವರನ್ನು ಮರೆಯುತ್ತೇವೆ—ಇದು ಅತಿಯಾದ ಆಶಾವಾದಿ ತೀರ್ಮಾನಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

try_this:
  - ಕೇಳಿ: ಇದೇ ರೀತಿಯದನ್ನು ಮಾಡುವಾಗ ಯಾರು ವಿಫಲರಾದರು? ಅವರಿಂದ ನಾವು ಏನು ಕಲಿಯಬಹುದು?
  - ಅದೃಶ್ಯ ಮಾದರಿಯನ್ನು ಹುಡುಕಿ—ಅದು ಬದುಕಿ ಉಳಿಯದವರು.
  - ನೀವು ಕೇವಲ ಯಶಸ್ಸಿನ ಕಥೆಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡುತ್ತಿದ್ದೀರಿ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಕೇವಲ ಬದುಕುಳಿದವರಿಂದ ಕಲಿಯುತ್ತಿದ್ದೇನೆಯೇ?
  - ವೈಫಲ್ಯಗಳನ್ನು ಸೇರಿಸಿದರೆ ಸಂಪೂರ್ಣ ಚಿತ್ರಣ ಹೇಗಿರಬಹುದು?

in_more_detail: |
  ಎರಡನೆಯ ಮಹಾಯುದ್ಧದ ಸಮಯದಲ್ಲಿ, ಸಂಖ್ಯಾಶಾಸ್ತ್ರಜ್ಞ ಅಬ್ರಹಾಂ ವಾಲ್ಡ್, ಬದುಕುಳಿದ ವಿಮಾನಗಳು ಎಲ್ಲಿ ಹೊಡೆತ ತಿಂದಿವೆ ಎಂಬುದನ್ನು ವಿಶ್ಲೇಷಿಸುವ ಮೂಲಕ ಬಾಂಬರ್‌ಗಳ ರಕ್ಷಾಕವಚದ ಸ್ಥಳವನ್ನು ಸರಿಪಡಿಸಿದರು—ಮತ್ತು *ಬದುಕಿ ಉಳಿಯದ* ವಿಮಾನಗಳು ಹೊಡೆತ ತಿಂದ ಸ್ಥಳಗಳಲ್ಲಿ ರಕ್ಷಾಕವಚವನ್ನು ಶಿಫಾರಸು ಮಾಡಿದರು, ಏಕೆಂದರೆ ಆ ವಿಮಾನಗಳು ಎಂದಿಗೂ ಹಿಂದಿರುಗಲಿಲ್ಲ. ನಾವು ಸಹಜವಾಗಿ ಗೋಚರಿಸುವ ಮಾದರಿಯ (ಬದುಕುಳಿದವರು) ಮೇಲೆ ಗಮನ ಹರಿಸುತ್ತೇವೆ ಮತ್ತು ಅದೃಶ್ಯವಾದ (ವಿಫಲರಾದವರು) ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.

  ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ ಉದ್ಯಮಶೀಲತೆ, ಹೂಡಿಕೆ, ವೃತ್ತಿಗಳು ಮತ್ತು ಇತಿಹಾಸದ ಬಗ್ಗೆ ನಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ತಿರುಚುತ್ತದೆ. ನಾವು ಯಶಸ್ವಿ ಕಂಪನಿಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡುತ್ತೇವೆ ಮತ್ತು ಇದೇ ರೀತಿಯ ಕೆಲಸಗಳನ್ನು ಮಾಡುತ್ತಾ ವಿಫಲರಾದ ಸಾವಿರಾರು ಕಂಪನಿಗಳನ್ನು ಕಡೆಗಣಿಸುತ್ತೇವೆ. ನಾವು ಅದೃಷ್ಟಶಾಲಿಗಳಿಂದ ಕೇಳುತ್ತೇವೆ ಮತ್ತು ದುರದೃಷ್ಟಶಾಲಿಗಳನ್ನು ಮರೆಯುತ್ತೇವೆ.

why_this_is_important: |
  ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತವನ್ನು ಸರಿಪಡಿಸುವುದರಿಂದ ಹೆಚ್ಚು ವಾಸ್ತವಿಕ ನಿರೀಕ್ಷೆಗಳು ಮತ್ತು ಉತ್ತಮ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ವೈಫಲ್ಯಗಳಿಂದ ಕಲಿಯಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಯಶಸ್ಸಿನಿಂದ ಮಾತ್ರವಲ್ಲ, ಮತ್ತು ಅದೃಷ್ಟಶಾಲಿ ಕೆಲವರಿಗೆ ಮಾತ್ರ ಕೆಲಸ ಮಾಡಿದ ತಂತ್ರಗಳನ್ನು ನಕಲಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಹೂಡಿಕೆ
  - ವೃತ್ತಿ_ಬದಲಾವಣೆಗಳು
  - ಕಲಿಯುವಿಕೆ

how_can_you_spot_it:
  visible_success_stories: |
    ನಾವು ಯಶಸ್ವಿ ವ್ಯಕ್ತಿಗಳಿಂದ ಪ್ರಯತ್ನಿಸಿ ವಿಫಲರಾದವರಿಗಿಂತ ಹೆಚ್ಚು ಕೇಳುತ್ತೇವೆ.
  missing_failures: |
    ನಾವು ಗಮನಿಸುವ ಮಾದರಿಯು "ಯಶಸ್ವಿಯಾಗದ"ವರನ್ನು ಹೊರತುಪಡಿಸುತ್ತದೆ ಮತ್ತು ಆದ್ದರಿಂದ ಅವರ ಕಥೆಗಳನ್ನು ಹೇಳಲು ಸಾಧ್ಯವಿಲ್ಲ.
  copying_survivors: |
    ಬದುಕುಳಿದವರು ಯಶಸ್ವಿಯಾಗಲು ಕಾರಣರಾದರು ಎಂದು ಊಹಿಸುವುದು, ಆದರೆ ಅದು ಅದೃಷ್ಟ ಅಥವಾ ಬದುಕುಳಿಯುವಿಕೆಯಾಗಿರಬಹುದು.
  overly_optimistic_models: |
    ಪ್ರಯತ್ನಗಳ ಛೇದಕವನ್ನು ನಿರ್ಲಕ್ಷಿಸುವ ಯಶಸ್ಸಿನ ದರಗಳ ಅಂದಾಜುಗಳು.

examples:
  entrepreneurship: |
    "ಝುಕರ್‌ಬರ್ಗ್‌ನಂತೆ ಕಾಲೇಜಿನಿಂದ ಹೊರಬೀಳು" ಎಂಬುದು ಶತಕೋಟಿ ಡಾಲರ್ ಕಂಪನಿಗಳನ್ನು ಸ್ಥಾಪಿಸದ ಅನೇಕ ಡ್ರಾಪೌಟ್‌ಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತದೆ.
  investing: |
    ಉಳಿದಿರುವ ನಿಧಿಗಳನ್ನು ಮಾತ್ರ ಅಧ್ಯಯನ ಮಾಡುವುದು ಕಳಪೆ ಪ್ರದರ್ಶನದ ನಂತರ ಮುಚ್ಚಿದ ನಿಧಿಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತದೆ, ಐತಿಹಾಸಿಕ ಲಾಭವನ್ನು ಉಬ್ಬಿಸುತ್ತದೆ.
  career_advice: |
    ಯಶಸ್ವಿ ಜನರು ಯಶಸ್ಸನ್ನು ಕಠಿಣ ಪರಿಶ್ರಮಕ್ಕೆ ಕಾರಣವೆಂದು ಹೇಳುತ್ತಾರೆ; ಕಠಿಣ ಪರಿಶ್ರಮ ಮಾಡಿ ವಿಫಲರಾದವರಿಂದ ನಾವು ಕೇಳುವುದಿಲ್ಲ.
  historical_analysis: |
    ಬದುಕಿ ಉಳಿದ "ಶ್ರೇಷ್ಠ" ಕಂಪನಿಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡುವುದು ಇದೇ ರೀತಿಯ ತಂತ್ರಗಳೊಂದಿಗೆ ವಿಫಲರಾದ ಅನೇಕ ಕಂಪನಿಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತದೆ.

real_world_implications: |
  ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ ಗ್ರಹಿಸಿದ ಯಶಸ್ಸಿನ ದರಗಳನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ಆದರ್ಶ ವ್ಯಕ್ತಿಗಳನ್ನು ತಿರುಚುತ್ತದೆ ಮತ್ತು ಕಳಪೆ ಅನುಕರಣೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಅದನ್ನು ಸರಿಪಡಿಸಲು ವೈಫಲ್ಯ ಪ್ರಕರಣಗಳನ್ನು ಹುಡುಕುವ ಮತ್ತು ಮೂಲ ದರಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವ ಅಗತ್ಯವಿದೆ.

professional_application:
  networking_and_relationship_building: |
    ಸಲಹೆ ಪಡೆಯುವಾಗ, ಪ್ರಯತ್ನಿಸಿ ವಿಫಲರಾದವರನ್ನು ಸಹ ಹುಡುಕಿ—ಅವರ ದೃಷ್ಟಿಕೋನಗಳು ಸಾಮಾನ್ಯವಾಗಿ ಬದುಕುಳಿದವರಿಗಿಂತ ಹೆಚ್ಚು ಮಾಹಿತಿ ನೀಡುತ್ತವೆ.
  collaborative_learning_initiative: |
    ಕೇವಲ ಯಶಸ್ವಿ ಯೋಜನೆಗಳನ್ನು ಮಾತ್ರವಲ್ಲದೆ, ವಿಫಲವಾದ ಯೋಜನೆಗಳು ಮತ್ತು ಸ್ಥಗಿತಗೊಂಡ ಉಪಕ್ರಮಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡಿ. ಕೆಲಸ ಮಾಡದವುಗಳಿಂದ ಕಲಿಯಲು "ವೈಫಲ್ಯ ಪೋಸ್ಟ್-ಮಾರ್ಟೆಮ್" ಗಳನ್ನು ನಡೆಸಿ.

how_can_this_be_misapplied:
  excessive_pessimism: |
    ಯಶಸ್ಸು ಯಾವಾಗಲೂ ಅದೃಷ್ಟ ಮತ್ತು ಪ್ರಯತ್ನಕ್ಕೆ ಪ್ರಾಮುಖ್ಯತೆ ಇಲ್ಲ ಎಂದು ಊಹಿಸಲು ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
  dismissing_success: |
    "ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ" ಎಂದು ಹೇಳಿ ಯಶಸ್ವಿ ಜನರಿಂದ ಕಲಿಯಲು ನಿರಾಕರಿಸುವುದು.
  analysis_paralysis: |
    ವೈಫಲ್ಯ ಪ್ರಕರಣಗಳ ಮೇಲೆ ಅತಿಯಾಗಿ ಗಮನಹರಿಸಿ, ನೀವು ಎಂದಿಗೂ ಕ್ರಿಯೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳುವುದಿಲ್ಲ.
  false_equivalence: |
    ಬದುಕುಳಿದ ಮತ್ತು ಬದುಕಿ ಉಳಿಯದ ತಂತ್ರಗಳನ್ನು ಸಂದರ್ಭ ಭಿನ್ನವಾಗಿರುವಾಗ ಸಮಾನವಾಗಿ ಮಾಹಿತಿ ನೀಡುವಂತೆ ಪರಿಗಣಿಸುವುದು.

