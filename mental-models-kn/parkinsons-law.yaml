# ಯೆಮಲ್-ಭಾಷಾ-ಸರ್ವರ್: $ಸ್ಕೀಮಾ=../ಸ್ಕೀಮಾ/mental-model-schema.json
# ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: parkinsons_law
name: ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮ

quick_introduction: |
  ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವು "ಕೆಲಸವು ಅದರ ಪೂರ್ಣಗೊಳ್ಳುವಿಕೆಗೆ ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತದೆ" ಎಂದು ಹೇಳುತ್ತದೆ. ಒಂದು ಕಾರ್ಯಕ್ಕೆ ಒಂದು ವಾರ ನೀಡಿದರೆ, ಅದು ಒಂದು ವಾರ ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ; ಒಂದು ದಿನ ನೀಡಿದರೆ, ಅದು ಆಗಾಗ್ಗೆ ಒಂದು ದಿನದಲ್ಲಿ ಪೂರ್ಣಗೊಳ್ಳುತ್ತದೆ. ಇದೇ ಬಜೆಟ್, ತಂಡದ ಗಾತ್ರ ಮತ್ತು ಸಂಪನ್ಮೂಲಗಳಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ.

one_liner: ಕೆಲಸವು ಪೂರ್ಣಗೊಳ್ಳುವಿಕೆಗೆ ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತದೆ.

try_this:
  - ಕೇಂದ್ರೀಕರಿಸಲು ಮತ್ತು ವ್ಯಾಪ್ತಿಯ ವಿಸ್ತರಣೆಯನ್ನು ತಡೆಯಲು ಕಠಿಣ ಗಡುವನ್ನು ನಿಗದಿಪಡಿಸಿ.
  - ಕೇಳಿ: ಇದಕ್ಕೆ ಕನಿಷ್ಠ ಎಷ್ಟು ಸಮಯ ಬೇಕಾಗಬಹುದು?
  - ಅನುಪಾತದ ಮೌಲ್ಯವಿಲ್ಲದೆ ಹೆಚ್ಚುವರಿ ಸಮಯ ಅಥವಾ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಬಳಸಲಾಗುತ್ತಿದೆ ಎಂದು ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಸಮಯವನ್ನು ತುಂಬುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ಕೆಲಸವು ನಿಜವಾಗಿಯೂ ಅದನ್ನು ಒತ್ತಾಯಿಸುತ್ತಿದೆಯೇ?
  - ಕಠಿಣ ಗಡುವು ಉತ್ತಮ ಆದ್ಯತೆಯನ್ನು ಒತ್ತಾಯಿಸುತ್ತದೆಯೇ?

in_more_detail: |
  ಸಿ. ನಾರ್ತ್‌ಕೋಟ್ ಪಾರ್ಕಿನ್ಸನ್ ಗಮನಿಸಿದರು, ಮಾಡಬೇಕಾದ ಕೆಲಸದ ಪ್ರಮಾಣವನ್ನು ಲೆಕ್ಕಿಸದೆ ಆಡಳಿತಗಳು ಬೆಳೆಯುತ್ತವೆ. ಕಾರ್ಯಗಳು ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತವೆ ಎಂದು ಅವರು ಗಮನಿಸಿದರು - ನಾವು ಗಡುವಿಗೆ ನಮ್ಮ ಪ್ರಯತ್ನ ಮತ್ತು ವೇಗವನ್ನು ಸರಿಹೊಂದಿಸುತ್ತೇವೆ. ಕಠಿಣ ಗಡುವುಗಳು ಗಮನವನ್ನು ಒತ್ತಾಯಿಸಬಹುದು; ಸಡಿಲವಾದವುಗಳು ಮುಂದೂಡಿಕೆ ಮತ್ತು ವ್ಯಾಪ್ತಿಯ ವಿಸ್ತರಣೆಯನ್ನು ಆಹ್ವಾನಿಸುತ್ತವೆ.

  ಈ ನಿಯಮವು ಯೋಜನೆ ನಿರ್ವಹಣೆ, ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆ ಮತ್ತು ಸಾಂಸ್ಥಿಕ ವಿನ್ಯಾಸಕ್ಕೆ ಪರಿಣಾಮಗಳನ್ನು ಹೊಂದಿದೆ. ಆದ್ಯತೆಯನ್ನು ಒತ್ತಾಯಿಸುವ ಮೂಲಕ ನಿರ್ಬಂಧಗಳು ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂದು ಇದು ಸೂಚಿಸುತ್ತದೆ.

why_this_is_important: |
  ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ಗಡುವುಗಳನ್ನು ಹೊಂದಿಸಲು, ಯೋಜನೆಗಳಿಗೆ ಅತಿಯಾದ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಹೊಂದಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು "ಹೆಚ್ಚಿನ ಸಮಯ" ಅಥವಾ "ಹೆಚ್ಚು ಜನರು" ಸಹಾಯ ಮಾಡುವುದಿಲ್ಲ - ಮತ್ತು ಹಾನಿ ಮಾಡಬಹುದು - ಎಂದು ಗುರುತಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನಿರ್ಬಂಧಗಳು ಉತ್ಪಾದಕವಾಗಬಹುದು.

when_to_use:
  - ನಿರ್ಧಾರ-ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ನಾಯಕತ್ವ
  - ಸಮಸ್ಯೆ-ಪರಿಹಾರ
  - ವೃತ್ತಿ-ಜೀವನ

how_can_you_spot_it:
  deadline_driven_effort: |
    ಗಡುವು ಸಮೀಪಿಸುತ್ತಿದ್ದಂತೆ ಕೆಲಸವು ವೇಗಗೊಳ್ಳುತ್ತದೆ; ಗಡುವು ದೂರವಿದ್ದಾಗ ಕಡಿಮೆ ಪ್ರಗತಿ.
  scope_expansion: |
    ಯೋಜನೆಗಳು ಗಮನಹರಿಸುವುದರ ಬದಲಿಗೆ ಲಭ್ಯವಿರುವ ಸಂಪನ್ಮೂಲಗಳನ್ನು ತುಂಬಲು ಬೆಳೆಯುತ್ತವೆ.
  bureaucratic_growth: |
    ಕೆಲಸದ ಹೊರೆ ಹೆಚ್ಚಾಗದಿದ್ದರೂ ಸಹ ಸಂಸ್ಥೆಗಳು ಜನರನ್ನು ಮತ್ತು ಪ್ರಕ್ರಿಯೆಯನ್ನು ಸೇರಿಸುತ್ತವೆ.
  budget_exhaustion: |
    ಖರ್ಚು ಅಗತ್ಯವಿದೆಯೇ ಎಂಬುದನ್ನು ಲೆಕ್ಕಿಸದೆ ಬಜೆಟ್‌ಗಳು ಸಂಪೂರ್ಣವಾಗಿ ಖರ್ಚಾಗುತ್ತವೆ.

examples:
  student_deadlines: |
    ಒಂದು ತಿಂಗಳೊಳಗೆ ಬರಬೇಕಾದ ಕಾಗದವನ್ನು ಕೊನೆಯ 48 ಗಂಟೆಗಳಲ್ಲಿ ಬರೆಯಲಾಗುತ್ತದೆ.
  project_management: |
    6 ತಿಂಗಳ ಸಮಯಾವಧಿಯ ಯೋಜನೆಯು 6 ತಿಂಗಳು ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ; 3 ತಿಂಗಳ ಗಡುವಿನೊಂದಿಗೆ ಅದೇ ವ್ಯಾಪ್ತಿಯನ್ನು ಸಹ ಪೂರ್ಣಗೊಳಿಸಬಹುದು.
  meetings: |
    30 ನಿಮಿಷಗಳು ಸಾಕಾಗುತ್ತದೆಯೇ ಎಂಬುದನ್ನು ಲೆಕ್ಕಿಸದೆ 1-ಗಂಟೆಯ ಸಭೆಯು ಗಂಟೆಯನ್ನು ತುಂಬುತ್ತದೆ.
  budgets: |
    ಮುಂದಿನ ವರ್ಷ ಅದೇ ಬಜೆಟ್ ಅನ್ನು ಸಮರ್ಥಿಸಲು ಒಂದು ಇಲಾಖೆಯು ವರ್ಷಾಂತ್ಯದ ವೇಳೆಗೆ ತನ್ನ ಸಂಪೂರ್ಣ ಬಜೆಟ್ ಅನ್ನು ಖರ್ಚು ಮಾಡುತ್ತದೆ.

real_world_implications: |
  ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವು ಉತ್ಪಾದಕತೆ, ಸಾಂಸ್ಥಿಕ ಉಬ್ಬುವಿಕೆ ಮತ್ತು ಸಂಪನ್ಮೂಲ ಹಂಚಿಕೆಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಕೃತಕ ನಿರ್ಬಂಧಗಳು (ಚಿಕ್ಕ ಗಡುವುಗಳು, ಸಣ್ಣ ತಂಡಗಳು) ಗಮನ ಮತ್ತು ದಕ್ಷತೆಯನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂದು ಸೂಚಿಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ವ್ಯಾಪ್ತಿಯ ವಿಸ್ತರಣೆಯನ್ನು ತಡೆಯಲು ಮತ್ತು ವೇಗವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ಸಹಯೋಗದ ಕೆಲಸಕ್ಕೆ ಸ್ಪಷ್ಟ, ಕಠಿಣ ಗಡುವುಗಳನ್ನು ಹೊಂದಿಸಿ.
  collaborative_learning_initiative: |
    ಸಭೆಗಳು ಮತ್ತು ಯೋಜನೆಗಳಿಗೆ ಟೈಮ್-ಬಾಕ್ಸಿಂಗ್ ಬಳಸಿ. ಗುಣಮಟ್ಟವನ್ನು ತ್ಯಾಗ ಮಾಡದೆ ಗಮನವನ್ನು ಸುಧಾರಿಸುತ್ತದೆಯೇ ಎಂದು ಪರೀಕ್ಷಿಸಲು ಚಿಕ್ಕ ಗಡುವುಗಳೊಂದಿಗೆ ಪ್ರಯೋಗಿಸಿ.

how_can_this_be_misapplied:
  unrealistic_deadlines: |
    ಸುಸ್ತಾಗುವಿಕೆ ಅಥವಾ ಕಳಪೆ ಗುಣಮಟ್ಟಕ್ಕೆ ಕಾರಣವಾಗುವ ಅನಿಯಂತ್ರಿತವಾಗಿ ಚಿಕ್ಕ ಗಡುವುಗಳನ್ನು ಹೊಂದಿಸುವುದು.
  underresourcing: |
    ಕಡಿಮೆ ಸಮಯ ಅಥವಾ ಕಡಿಮೆ ಜನರು ಯಾವಾಗಲೂ ಕೆಲಸ ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸುವುದು - ಕೆಲವು ಕಾರ್ಯಗಳಿಗೆ ಸಾಕಷ್ಟು ಸಂಪನ್ಮೂಲಗಳು ಬೇಕಾಗುತ್ತವೆ.
  blame_shifting: |
    ಕೆಲಸವು ನಿಜವಾಗಿಯೂ ಸಂಕೀರ್ಣವಾಗಿದ್ದಾಗ "ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮ"ಕ್ಕೆ ವಿಳಂಬಗಳನ್ನು ಆರೋಪಿಸುವುದು.
  ignoring_quality: |
    ಸ್ಥಿರವಾದ ಫಲಿತಾಂಶಗಳ ವೆಚ್ಚದಲ್ಲಿ ಕೃತಕ ನಿರ್ಬಂಧಗಳನ್ನು ಪೂರೈಸಲು ಅವಸರ.

