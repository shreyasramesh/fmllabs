# ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆಯ ನಮೂದು

id: regression_to_the_mean
name: ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ

quick_introduction: |
  ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಎನ್ನುವುದು ಒಂದು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ವಿದ್ಯಮಾನವಾಗಿದ್ದು, ಅಸಾಧಾರಣ ಫಲಿತಾಂಶಗಳು
  ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಫಲಿತಾಂಶಗಳಿಂದ ಅನುಸರಿಸಲ್ಪಡುತ್ತವೆ. ಅಸಾಮಾನ್ಯವಾಗಿ ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟ
  ಫಲಿತಾಂಶದ ನಂತರ, ಮುಂದಿನ ಫಲಿತಾಂಶವು ಕಡಿಮೆ ತೀವ್ರವಾಗಿರುತ್ತದೆ - ಯಾವುದೇ ಕಾರಣಿಕ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ,
  ಆದರೆ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸದಿಂದಾಗಿ.

one_liner: ಅಸಾಧಾರಣ ಫಲಿತಾಂಶಗಳು ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಫಲಿತಾಂಶಗಳಿಂದ ಅನುಸರಿಸಲ್ಪಡುತ್ತವೆ.

try_this:
  - ನಿಮ್ಮ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ "ಹಿಂಜರಿಕೆಯನ್ನು" ಕಾರಣ ಮಾಡಬೇಡಿ - ಅದು ಆಗಾಗ್ಗೆ ಹಾಗೆಯೇ ಸಂಭವಿಸಿರುತ್ತಿತ್ತು.
  - ಅಸಾಧಾರಣ ಫಲಿತಾಂಶದ ನಂತರ, ಮುಂದಿನದು ಕಡಿಮೆ ತೀವ್ರವಾಗಿರುತ್ತದೆ ಎಂದು ನಿರೀಕ್ಷಿಸಿ.
  - ಕೇಳಿ: ಈ ಬದಲಾವಣೆಗೆ ನಾನು ಮಾಡಿದ ಕಾರ್ಯ ಕಾರಣವೇ, ಅಥವಾ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಮಾತ್ರವೇ?

ask_yourself:
  - ನಾನು ಮಾಡಿದ ಕಾರ್ಯಕ್ಕೆ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸವನ್ನು ಕಾರಣವೆಂದು ನನ್ನ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ ಕ್ರೆಡಿಟ್ ನೀಡುತ್ತಿದ್ದೇನೆ ಅಥವಾ ದೂಷಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನನ್ನ ಕ್ರಿಯೆಯಿಲ್ಲದೆ ಇದು ಸಂಭವಿಸುತ್ತಿತ್ತೇ?

in_more_detail: |
  ಒಬ್ಬ ವಿದ್ಯಾರ್ಥಿಯು ಒಂದು ಪರೀಕ್ಷೆಯಲ್ಲಿ ಅಸಾಮಾನ್ಯವಾಗಿ ಹೆಚ್ಚಿನ ಅಂಕ ಪಡೆದರೆ, ಅವರು ಮುಂದಿನ ಪರೀಕ್ಷೆಯಲ್ಲಿ
  ಅವರ ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಅಂಕಗಳನ್ನು ಪಡೆಯುವ ಸಾಧ್ಯತೆಯಿದೆ - ಅವರು "ಆಲಸಿಗಳಾದರು" ಎಂಬ ಕಾರಣದಿಂದಲ್ಲ,
  ಆದರೆ ಮೊದಲ ಅಂಕವು ಸ್ವಲ್ಪ ಅದೃಷ್ಟದಿಂದ ಕೂಡಿತ್ತು. ಇದು ಕ್ರೀಡಾ ಪ್ರದರ್ಶನ, ಷೇರುಗಳ ಆದಾಯ ಮತ್ತು
  ವ್ಯಾಪಾರ ಮಾಪನಗಳಿಗೂ ಅನ್ವಯಿಸುತ್ತದೆ. ನಾವು ಆಗಾಗ್ಗೆ "ಹಿಂಜರಿಕೆಯನ್ನು" ನಾವು ಮಾಡಿದ ಯಾವುದಕ್ಕಾದರೂ
  (ಉದಾಹರಣೆಗೆ, ಶಿಕ್ಷೆ ಅಥವಾ ಬಹುಮಾನ) ಕಾರಣವೆಂದು ಹೇಳುತ್ತೇವೆ, ಅದು ಹಾಗೆಯೇ ಸಂಭವಿಸಬೇಕಿದ್ದರೂ ಸಹ.

  ಡ್ಯಾನಿಯಲ್ ಕಹ್ನೆಮನ್ ವಿವರಿಸುವಂತೆ ವಿಮಾನ ತರಬೇತುದಾರರು ಪ್ರಶಂಸೆ ಪ್ರದರ್ಶನವನ್ನು ಹದಗೆಡಿಸುತ್ತದೆ
  ಮತ್ತು ಟೀಕೆ ಸುಧಾರಿಸುತ್ತದೆ ಎಂದು ತಪ್ಪು ನಿರ್ಣಯಕ್ಕೆ ಬಂದರು - ಅವರು ಅಸಾಧಾರಣ ಪ್ರದರ್ಶನಗಳ ನಂತರ
  ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ಗಮನಿಸುತ್ತಿದ್ದರು.

why_this_is_important: |
  ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಕಾರಣಿಕವನ್ನು ತಪ್ಪಾಗಿ ಹೇಳುವುದನ್ನು ತಡೆಯುತ್ತದೆ.
  ಇದು ಹೊರಗಿನ ಡೇಟಾಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ಮತ್ತು ಶಬ್ದದ ಆಧಾರದ ಮೇಲೆ ಬದಲಾವಣೆಗಳನ್ನು
  ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಹಸ್ತಕ್ಷೇಪಗಳು ಮತ್ತು ಪ್ರದರ್ಶನವನ್ನು ಮೌಲ್ಯಮಾಪನ
  ಮಾಡಲು ಅತ್ಯಗತ್ಯ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಹೂಡಿಕೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
  - ನಾಯಕತ್ವ

how_can_you_spot_it:
  extreme_followed_by_average: |
    ಅಸಾಮಾನ್ಯವಾಗಿ ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟ ಫಲಿತಾಂಶವನ್ನು ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಒಂದರಿಂದ ಅನುಸರಿಸಲಾಗುತ್ತದೆ.
  spurious_causation: |
    ಹಿಂಜರಿಕೆ ಸಂಭವಿಸಬಹುದಾದಾಗ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ "ಚೇತರಿಕೆ" ಅಥವಾ "ಇಳಿಮುಖ" ವನ್ನು ಕಾರಣವೆಂದು ಹೇಳುವುದು.
  overreaction_to_outliers: |
    ಒಂದೇ ಒಂದು ತೀವ್ರ ಡೇಟಾ ಪಾಯಿಂಟ್ ಆಧಾರದ ಮೇಲೆ ನೀತಿ ಅಥವಾ ವೈಯಕ್ತಿಕ ಬದಲಾವಣೆಗಳನ್ನು ಮಾಡುವುದು.
  reward_punishment_confusion: |
    ಶಿಕ್ಷೆ "ಕೆಲಸ ಮಾಡಿದೆ" ಎಂದು ನಂಬುವುದು, ಸುಧಾರಣೆಯು ಕೇವಲ ಹಿಂಜರಿಕೆಯಾಗಿದ್ದಾಗ.

examples:
  sports: |
    ಒಬ್ಬ ಆಟಗಾರನು ತನ್ನ ವೃತ್ತಿಜೀವನದ ಅತ್ಯುತ್ತಮ ಪಂದ್ಯವನ್ನು ಆಡುತ್ತಾನೆ, ನಂತರ ಸರಾಸರಿಗೆ ಹಿಂತಿರುಗುತ್ತಾನೆ -
    ಅಭಿಮಾನಿಗಳು "ಅಲಸಿಕೆ"ಯನ್ನು ದೂಷಿಸಬಹುದು.
  investing: |
    ಒಂದು ಷೇರು ಉತ್ತಮ ವರ್ಷವನ್ನು ಹೊಂದಿದೆ, ನಂತರ ಹಿಂತಿರುಗುತ್ತದೆ - ಹೂಡಿಕೆದಾರರು ಕೆಟ್ಟ ನಿರ್ವಹಣೆಯನ್ನು
    ಇಳಿಮುಖಕ್ಕೆ ಕಾರಣವೆಂದು ಹೇಳಬಹುದು, ಆದರೆ ಅದು ಭಾಗಶಃ ಹಿಂಜರಿಕೆಯಾಗಿದೆ.
  performance_reviews: |
    ಒಬ್ಬ ಉದ್ಯೋಗಿ ಕೆಟ್ಟ ತ್ರೈಮಾಸಿಕವನ್ನು ಹೊಂದುತ್ತಾನೆ, ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಪಡೆಯುತ್ತಾನೆ, ಸುಧಾರಿಸುತ್ತಾನೆ -
    ಹಿಂಜರಿಕೆ ಯಾವುದೇ ರೀತಿಯಲ್ಲಿ ಸಂಭವಿಸುತ್ತಿದ್ದಾಗ ಪ್ರತಿಕ್ರಿಯೆಗೆ ಕ್ರೆಡಿಟ್ ನೀಡಬಹುದು.
  medicine: |
    ಒಬ್ಬ ರೋಗಿಯು ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತಾನೆ, ಚಿಕಿತ್ಸೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾನೆ, ಸುಧಾರಿಸುತ್ತಾನೆ - ಕೆಲವು ಸುಧಾರಣೆ
    ಸಹಜವಾಗಿದ್ದಾಗ ಚಿಕಿತ್ಸೆಗೆ ಕ್ರೆಡಿಟ್ ನೀಡಬಹುದು.

real_world_implications: |
  ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಶಿಕ್ಷಕರು, ವೈದ್ಯರು, ನಿಧಿ ವ್ಯವಸ್ಥಾಪಕರು ಮತ್ತು ನಮ್ಮನ್ನು ನಾವು ಮೌಲ್ಯಮಾಪನ
  ಮಾಡುವ ರೀತಿಯನ್ನು ಪ್ರಭಾವಿಸುತ್ತದೆ. "ಏರಿದ್ದು ಕೆಳಗೆ ಬರಬೇಕು" ಎಂಬುದು ಏಕೆ ಆಗಾಗ್ಗೆ
  ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯವಾಗಿ ನಿಜವಾಗಿದೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ. ಇದನ್ನು ತಪ್ಪುಗ್ರಹಿಸುವುದರಿಂದ
  ವ್ಯರ್ಥ ಹಸ್ತಕ್ಷೇಪಗಳು ಮತ್ತು ಪರಿಹಾರಗಳಲ್ಲಿ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸ ಉಂಟಾಗುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಒಂದೇ ಒಂದು ಕೆಟ್ಟ ಸಂವಹನವನ್ನು ಅತಿಯಾಗಿ ಅರ್ಥೈಸಬೇಡಿ - ಅದು ಸಂಬಂಧದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಯುವ
    ಒಂದು ಹೊರಗಿನ ಡೇಟಾ ಪಾಯಿಂಟ್ ಆಗಿರಬಹುದು.
  collaborative_learning_initiative: |
    ಹಸ್ತಕ್ಷೇಪಗಳನ್ನು (ತರಬೇತಿ, ಪ್ರಕ್ರಿಯೆ ಬದಲಾವಣೆಗಳು) ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಪರಿಣಾಮವನ್ನು
    ಹಿಂಜರಿಕೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸಲು ನಿಯಂತ್ರಣ ಗುಂಪುಗಳು ಮತ್ತು ಬಹು ಡೇಟಾ ಪಾಯಿಂಟ್‌ಗಳನ್ನು ಬಳಸಿ.

how_can_this_be_misapplied:
  dismissing_all_interventions: |
    ಹಸ್ತಕ್ಷೇಪದ ನಂತರ ಯಾವುದೇ ಸುಧಾರಣೆಯು "ಕೇವಲ ಹಿಂಜರಿಕೆ" ಎಂದು ಊಹಿಸುವುದು, ನಿಜವಾದ ಪರಿಣಾಮಗಳಿದ್ದರೂ ಸಹ.
  underreacting: |
    "ಅದು ಸರಾಸರಿಗೆ ಹಿಂಜರಿಯುತ್ತದೆ" ಎಂದು ಹೇಳಿ ನಿಜವಾದ ಸಮಸ್ಯೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು.
  statistical_illiteracy: |
    ಹಿಂಜರಿಕೆಯನ್ನು ಫಲಿತಾಂಶಗಳನ್ನು "ಸರಿಪಡಿಸುವ" ಶಕ್ತಿಯೊಂದಿಗೆ ಗೊಂದಲಗೊಳಿಸುವುದು - ಅದು ಕೇವಲ
    ಸಂಭವನೀಯತೆಯಾಗಿದೆ.
  overconfidence: |
    ಆಧಾರವಾಗಿರುವ ಪ್ರಕ್ರಿಯೆಯು ಬದಲಾಗಿರಬಹುದಾದರೂ ಸರಾಸರಿ ಸ್ಥಿರವಾಗಿದೆ ಎಂದು ಊಹಿಸುವುದು.

