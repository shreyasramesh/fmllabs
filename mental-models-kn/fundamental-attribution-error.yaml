id: fundamental_attribution_error
name: ಮೂಲ ಕಾರಣ ದೋಷ

quick_introduction: |
  ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅವರ ಗುಣ ಅಥವಾ ವ್ಯಕ್ತಿತ್ವಕ್ಕೆ ಆರೋಪಿಸುವ ಪ್ರವೃತ್ತಿಯೇ ಮೂಲ ಕಾರಣ ದೋಷ.
  ಆದರೆ ನಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ಸಂದರ್ಭಕ್ಕೆ ತಕ್ಕಂತೆ ವಿವರಿಸುತ್ತೇವೆ. ನಾವು ಇತರರನ್ನು ಅವರ
  ಕೆಲಸಗಳ ಮೂಲಕ ತೀರ್ಮಾನಿಸುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮನ್ನು ನಮ್ಮ ಉದ್ದೇಶಗಳ ಮೂಲಕ.

one_liner: ನಾವು ಇತರರನ್ನು ಅವರ ಕೆಲಸಗಳ ಮೂಲಕ, ನಮ್ಮನ್ನು ನಮ್ಮ ಉದ್ದೇಶಗಳ ಮೂಲಕ ತೀರ್ಮಾನಿಸುತ್ತೇವೆ.

try_this:
  - ಯಾರಾದರೂ ನಿಮಗೆ ಕಿರಿಕಿರಿ ಉಂಟು ಮಾಡಿದರೆ, ಹೀಗೆ ಕೇಳಿ: ಯಾವ ಸಂದರ್ಭಗಳು ಇದನ್ನು ವಿವರಿಸಬಹುದು?
  - ನೀವು ನಿಮಗಾಗಿ ತೋರಿಸುವ ಉದಾರತೆಯನ್ನು ಇತರರಿಗೂ ತೋರಿಸಿ.
  - ನೀವು ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅವರ ಗುಣಲಕ್ಷಣಗಳಿಗೆ ಆರೋಪಿಸುತ್ತಿರುವುದನ್ನು ಗಮನಿಸಿ, ಸಂದರ್ಭಗಳಿಗೆ ಅಲ್ಲ.

ask_yourself:
  - ನಾನು ಅವರ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವ ರೀತಿಯಲ್ಲಿಯೇ ನನ್ನ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುತ್ತೇನೆಯೇ?
  - ಅವರ ಪರಿಸ್ಥಿತಿಯ ಬಗ್ಗೆ ನಾನು ಏನನ್ನು ತಪ್ಪಾಗಿ ಅರ್ಥೈಸಿಕೊಳ್ಳುತ್ತಿದ್ದೇನೆ?

in_more_detail: |
  ಯಾರಾದರೂ ಟ್ರಾಫಿಕ್‌ನಲ್ಲಿ ನಮ್ಮ ಮುಂದೆ ಹೋದರೆ, ನಾವು "ಎಂತಹ ಮೂರ್ಖ" ಎಂದು ಯೋಚಿಸುತ್ತೇವೆ.
  ನಾವು ಯಾರಾದರೂ ಮುಂದೆ ಹೋದರೆ, ನಾವು "ನಾನು ಹೋಗಲೇಬೇಕಿತ್ತು - ನಾನು ಅವಸರದಲ್ಲಿದ್ದೆ" ಎಂದು ಯೋಚಿಸುತ್ತೇವೆ.
  ನಮ್ಮ ಸ್ವಂತ ವೈಫಲ್ಯಗಳನ್ನು ನಾವು ಸಂದರ್ಭಕ್ಕೆ ("ಟ್ರಾಫಿಕ್ ಭಯಾನಕವಾಗಿತ್ತು") ಮತ್ತು ಇತರರ ವೈಫಲ್ಯಗಳನ್ನು
  ಗುಣಲಕ್ಷಣಕ್ಕೆ ("ಅವರು ಸೋಮಾರಿಗಳು") ಆರೋಪಿಸುತ್ತೇವೆ. ಯಶಸ್ಸಿಗೆ ಇದರ ವಿಪರೀತ ಅನ್ವಯಿಸುತ್ತದೆ:
  ನಾವು ನಮ್ಮ ಯಶಸ್ಸಿಗೆ ಕಾರಣ ನಮ್ಮನ್ನು ನೀಡುತ್ತೇವೆ, ಇತರರ ಯಶಸ್ಸನ್ನು ಅದೃಷ್ಟಕ್ಕೆ ಆರೋಪಿಸುತ್ತೇವೆ.

  ಈ ದೋಷವು "ಮೂಲ" ವಾಗಿದೆ ಏಕೆಂದರೆ ಇದು ಸರ್ವವ್ಯಾಪಿಯಾಗಿದೆ ಮತ್ತು ಸ್ಥಿರವಾಗಿದೆ. ಇದು ಸಹಾನುಭೂತಿಯನ್ನು
  ಹಾನಿಗೊಳಿಸುತ್ತದೆ, ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೌಲ್ಯಮಾಪನವನ್ನು ವಿಕೃತಗೊಳಿಸುತ್ತದೆ.

why_this_is_important: |
  ಮೂಲ ಕಾರಣ ದೋಷವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಸಂಬಂಧಗಳು ಸುಧಾರಿಸುತ್ತವೆ, ಸಂಘರ್ಷ ಕಡಿಮೆಯಾಗುತ್ತದೆ ಮತ್ತು
  ನ್ಯಾಯಯುತವಾದ ತೀರ್ಪುಗಳು ಮೂಡುತ್ತವೆ. ಇದು ಯಾರಾದರೂ "ಹಾಗೆ" ಇದ್ದಾರೆ ಎಂದು ತೀರ್ಮಾನಿಸುವ ಮೊದಲು
  ಸಂದರ್ಭವನ್ನು ಪರಿಗಣಿಸಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ.

when_to_use:
  - ಸಂಬಂಧ_ಬೆಳೆಸುವಿಕೆ
  - ಸಂಘರ್ಷ_ಪರಿಹಾರ
  - ನಾಯಕತ್ವ
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    ಇತರರ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವಾಗ "ಅವರು ಅಂತಹ ವ್ಯಕ್ತಿ" ಎಂದು ಹೇಳುವುದು.
  situational_explanation_for_self: |
    ನಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವಾಗ "ನನಗೆ ಬೇರೆ ದಾರಿಯಿರಲಿಲ್ಲ" ಅಥವಾ "ಪರಿಸ್ಥಿತಿಗಳು ನನ್ನನ್ನು
    ಬಲವಂತಪಡಿಸಿದವು" ಎಂದು ಹೇಳುವುದು.
  character_vs_context: |
    ಸಂದರ್ಭವು ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸಬಹುದಾಗಿದ್ದರೂ, ಗುಣಲಕ್ಷಣಗಳನ್ನು ಊಹಿಸುವುದು.
  asymmetric_standards: |
    ನಾವು ನಮ್ಮ ಮೇಲೆ ಇಟ್ಟುಕೊಳ್ಳುವ ಮಾನದಂಡಗಳಿಗಿಂತ ಕಠಿಣ ಮಾನದಂಡಗಳನ್ನು ಇತರರ ಮೇಲೆ ಇಡುವುದು.

examples:
  traffic: |
    ಇನ್ನೊಬ್ಬ ಚಾಲಕನ ತಪ್ಪು = "ಕೆಟ್ಟ ಚಾಲಕ". ನಮ್ಮ ತಪ್ಪು = "ನಿವಾರಿಸಲಾಗದ ಪರಿಸ್ಥಿತಿ".
  workplace: |
    ಸಹೋದ್ಯೋಗಿಯ ಗಡುವು ತಪ್ಪಿರುವುದು = "ಹಣೆಗಾರಿಕೆ ಇಲ್ಲದ". ನಮ್ಮ ಗಡುವು ತಪ್ಪಿರುವುದು =
    "ಅತಿಯಾದ ಕೆಲಸ ಮತ್ತು ಯಾರೂ ಉತ್ತಮವಾಗಿ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ".
  politics: |
    ವಿರೋಧಿಗಳ ಅಭಿಪ್ರಾಯಗಳು = "ಅವರು ಮೂರ್ಖರು ಅಥವಾ ಕೆಟ್ಟವರು". ನಮ್ಮ ಅಭಿಪ್ರಾಯಗಳು =
    "ವಾಸ್ತವದ ತಾರ್ಕಿಕ ಪ್ರತಿಕ್ರಿಯೆ".
  performance: |
    ಇತರರ ಯಶಸ್ಸು = "ಅದೃಷ್ಟ". ನಮ್ಮ ಯಶಸ್ಸು = "ಕಠಿಣ ಶ್ರಮದಿಂದ ಗಳಿಸಿದ್ದು".

real_world_implications: |
  ಮೂಲ ಕಾರಣ ದೋಷವು ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ತಂಡದ ಕೆಲಸವನ್ನು ಹಾನಿಗೊಳಿಸುತ್ತದೆ ಮತ್ತು
  ನೇಮಕಾತಿ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೌಲ್ಯಮಾಪನವನ್ನು ವಿಕೃತಗೊಳಿಸುತ್ತದೆ. ಇದನ್ನು ಸರಿಪಡಿಸುವುದರಿಂದ
  ಸಂಸ್ಥೆಯ ಸಂಸ್ಕೃತಿ ಮತ್ತು ವೈಯಕ್ತಿಕ ಸಂಬಂಧಗಳು ಸುಧಾರಿಸುತ್ತವೆ.

professional_application:
  networking_and_relationship_building: |
    ಯಾರಾದರೂ ನಿಮಗೆ ನಿರಾಶೆಗೊಳಿಸಿದರೆ, ಅವರು ವಿಶ್ವಾಸಾರ್ಹರಲ್ಲ ಅಥವಾ ಕಷ್ಟಪಟ್ಟು ಕೆಲಸ ಮಾಡುವವರು
    ಎಂದು ತೀರ್ಮಾನಿಸುವ ಮೊದಲು "ಯಾವ ಸಂದರ್ಭಗಳು ಇದನ್ನು ವಿವರಿಸಬಹುದು?" ಎಂದು ಕೇಳಿ.
  collaborative_learning_initiative: |
    ಪ್ರತಿಕ್ರಿಯೆ ಮತ್ತು ವಿಮರ್ಶೆಗಳಲ್ಲಿ, "ಮೊದಲು ಪರಿಸ್ಥಿತಿ" ವ್ಯಾಖ್ಯಾನಗಳನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.
    ವ್ಯವಸ್ಥಾಪಕರಿಗೆ ಗುಣಲಕ್ಷಣಗಳಿಗೆ ಆರೋಪಿಸುವ ಮೊದಲು ಸಂದರ್ಭವನ್ನು ಪರಿಗಣಿಸಲು ತರಬೇತಿ ನೀಡಿ.

how_can_this_be_misapplied:
  excusing_all_behavior: |
    ಕೆಲವು ನಡವಳಿಕೆಗಳು ಗುಣಲಕ್ಷಣಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತಿದ್ದರೂ, ಪ್ರತಿ ಕ್ರಿಯೆಯನ್ನು "ಸಂದರ್ಭೋಚಿತ"
    ಎಂದು ವಜಾಗೊಳಿಸುವುದು.
  no_accountability: |
    ಜನರು ನಿಜವಾಗಿಯೂ ಮಾಡಿದ ಆಯ್ಕೆಗಳಿಗೆ ಜವಾಬ್ದಾರರಾಗಿರುವುದನ್ನು ತಪ್ಪಿಸಲು ದೋಷವನ್ನು
    ಬಳಸುವುದು.
  self_deprecation: |
    ಅತಿಯಾಗಿ ಸರಿಪಡಿಸಿ, ಯಾವಾಗಲೂ ನಿಮ್ಮನ್ನು ದೂಷಿಸುವುದು ಮತ್ತು ಇತರರ ಜವಾಬ್ದಾರಿಯನ್ನು
    ಯಾವಾಗಲೂ ಒಪ್ಪಿಕೊಳ್ಳದಿರುವುದು.
  ignoring_patterns: |
    ಯಾರಾದರೂ ಸಂದರ್ಭಗಳಲ್ಲಿ ಪದೇ ಪದೇ ಕೆಟ್ಟದಾಗಿ ವರ್ತಿಸಿದರೆ, ಗುಣಲಕ್ಷಣವು ಸಂಬಂಧಿತವಾಗಿರಬಹುದು.

