# ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆಯ ನಮೂದು

id: base_rate_fallacy
name: ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ

quick_introduction: |
  ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ ಎಂದರೆ ನಿರ್ದಿಷ್ಟ, ಸ್ಪಷ್ಟವಾದ ಮಾಹಿತಿಯ ಪರವಾಗಿ
  ಸಾಮಾನ್ಯ ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ಮಾಹಿತಿಯನ್ನು (ಬೇಸ್ ರೇಟ್‌ಗಳು) ನಿರ್ಲಕ್ಷಿಸುವ ಪ್ರವೃತ್ತಿ.
  ನಾವು ನಿರ್ದಿಷ್ಟ ಪ್ರಕರಣವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ ಮತ್ತು ಪೂರ್ವ ಸಂಭವನೀಯತೆಯನ್ನು
  ಕಡಿಮೆಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ. ಒಂದು ಪ್ರಬಲವಾದ ಕಥೆಯು ಸಂಖ್ಯೆಗಳು ಹೇಳುವುದನ್ನು
  ಮೀರಿಸಬಹುದು.

one_liner: ಒಂದು ಪ್ರಬಲವಾದ ಕಥೆಯು ಸಂಖ್ಯೆಗಳು ಹೇಳುವುದನ್ನು ಮೀರಿಸಬಹುದು.

try_this:
  - ಒಂದು ಪ್ರಕರಣವನ್ನು ನಿರ್ಣಯಿಸುವ ಮೊದಲು, ಕೇಳಿ: ಈ ರೀತಿಯ ಪರಿಸ್ಥಿತಿಗೆ ಬೇಸ್ ರೇಟ್ ಏನು?
  - ನಿರ್ದಿಷ್ಟ ಪುರಾವೆಯನ್ನು ಪೂರ್ವ ಸಂಭವನೀಯತೆಯೊಂದಿಗೆ ಸಂಯೋಜಿಸಿ — ಯಾವುದನ್ನೂ ನಿರ್ಲಕ್ಷಿಸಬೇಡಿ.
  - ಒಂದು ಸ್ಪಷ್ಟವಾದ ಉದಾಹರಣೆಯು ಸಂಖ್ಯಾಶಾಸ್ತ್ರವನ್ನು ಮುಳುಗಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಈ ನಿರ್ದಿಷ್ಟ ಪ್ರಕರಣವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಿದ್ದೇನೆಯೇ ಮತ್ತು ಬೇಸ್ ರೇಟ್ ಅನ್ನು
    ಕಡಿಮೆಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಾನು ಆ ಪ್ರಬಲವಾದ ಕಥೆಯನ್ನು ಬದಿಗೆ ಇಟ್ಟರೆ, ಸಂಖ್ಯೆಗಳು ಏನು ಹೇಳುತ್ತವೆ?

in_more_detail: |
  ಒಂದು ರೋಗವು ಜನಸಂಖ್ಯೆಯ 1% ರಷ್ಟು ಪರಿಣಾಮ ಬೀರಿದರೆ ಮತ್ತು ಪರೀಕ್ಷೆಯು 95% ನಿಖರವಾಗಿದ್ದರೆ,
  ಒಂದು ಧನಾತ್ಮಕ ಫಲಿತಾಂಶವು ವ್ಯಕ್ತಿಗೆ ಇನ್ನೂ ರೋಗವಿಲ್ಲದಿರಬಹುದು ಎಂದರ್ಥ — ಏಕೆಂದರೆ ಬೇಸ್ ರೇಟ್
  ಅತ್ಯಂತ ಕಡಿಮೆಯಾಗಿದೆ. ಆದರೆ ನಾವು ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ ಮತ್ತು "ಅವರು
  ಧನಾತ್ಮಕ ಪರೀಕ್ಷೆ ಮಾಡಿದ್ದಾರೆ" ಎಂಬುವುದರ ಮೇಲೆ ಗಮನಹರಿಸುತ್ತೇವೆ. ನಾವು ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ
  ಮೇಲೆ ನಿರ್ದಿಷ್ಟತೆಯಿಂದ ಪ್ರಭಾವಿತರಾಗುತ್ತೇವೆ.

  ಈ ತಪ್ಪು ಕಲ್ಪನೆಯು ವೈದ್ಯಕೀಯ ರೋಗನಿರ್ಣಯ, ನೇಮಕಾತಿ, ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು
  ಕಾನೂನು ತೀರ್ಪಿನ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ಮತ್ತು ಪ್ರಕರಣ-ನಿರ್ದಿಷ್ಟ
  ಪುರಾವೆಗಳನ್ನು ಬೈಯೆಸಿಯನ್ ತರ್ಕವನ್ನು ಬಳಸಿ ಸಂಯೋಜಿಸಬೇಕಾಗಿದೆ — ಆದರೆ ನಾವು ಆಗಾಗ್ಗೆ
  ಮಾಡುವುದಿಲ್ಲ.

why_this_is_important: |
  ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆಯನ್ನು ಸರಿಪಡಿಸುವುದರಿಂದ ರೋಗನಿರ್ಣಯ, ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು
  ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ. ಇದು ಸ್ಪಷ್ಟ ಪ್ರಕರಣಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು
  ಮತ್ತು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ವಾಸ್ತವಕ್ಕೆ ಕಡಿಮೆ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ತಡೆಯುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
  - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ
  - ಹೂಡಿಕೆ

how_can_you_spot_it:
  ignoring_prior_probabilities: |
    ತೀರ್ಪುಗಳಲ್ಲಿ ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ಸೇರಿಸಲಾಗುವುದಿಲ್ಲ.
  vividness_over_statistics: |
    ಒಂದೇ ಪ್ರಕರಣ ಅಥವಾ ಕಥೆಯು ಒಟ್ಟು ಡೇಟಾವನ್ನು ಮೀರಿಸುತ್ತದೆ.
  diagnostic_overweighting: |
    ಬೇಸ್ ರೇಟ್ ಅನ್ನು ಪರಿಗಣಿಸದೆ ಹೊಸ ಪುರಾವೆಗಳನ್ನು (ಉದಾ., ಪರೀಕ್ಷಾ ಫಲಿತಾಂಶ) ಅತಿಯಾಗಿ
    ಅಂದಾಜಿಸುವುದು.
  anecdote_override: |
    "ನನಗೆ ಒಬ್ಬ ವ್ಯಕ್ತಿ ಗೊತ್ತು..." ಎಂಬುದು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ಪುರಾವೆಯನ್ನು ಮೀರಿಸುತ್ತದೆ.

examples:
  medical: |
    ಒಂದು ಅಪರೂಪದ ರೋಗಕ್ಕೆ ಧನಾತ್ಮಕ ಪರೀಕ್ಷೆ — ಬೇಸ್ ರೇಟ್ ಕಡಿಮೆ, ಆದ್ದರಿಂದ ಧನಾತ್ಮಕ
    ಫಲಿತಾಂಶವು ಆಗಾಗ್ಗೆ ತಪ್ಪು ಧನಾತ್ಮಕವಾಗಿರುತ್ತದೆ. ನಾವು ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸಿ ಅವರಿಗೆ
    ರೋಗವಿದೆ ಎಂದು ಊಹಿಸುತ್ತೇವೆ.
  hiring: |
    ಒಬ್ಬ ಅಭ್ಯರ್ಥಿಗೆ ಉತ್ತಮ ಸಂದರ್ಶನವಿದೆ — ಸಂದರ್ಶನಗಳು ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಎಷ್ಟು
    ಉತ್ತಮವಾಗಿ ಊಹಿಸುತ್ತವೆ ಎಂಬುದರ ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ನಾವು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.
  risk: |
    ವಿಮಾನ ಅಪಘಾತವು ಸ್ಪಷ್ಟವಾಗಿದೆ — ನಾವು ವಿಮಾನ ಪ್ರಯಾಣದ ಅಪಾಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ
    ಮತ್ತು ಕಾರು ಪ್ರಯಾಣದ ಅಪಾಯವನ್ನು ಕಡಿಮೆ ಅಂದಾಜಿಸುತ್ತೇವೆ, ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.
  startup_investing: |
    ಒಬ್ಬ ಸಂಸ್ಥಾಪಕ ಉತ್ತಮ ಪ್ರಸ್ತಾಪ ನೀಡುತ್ತಾನೆ — ಹೆಚ್ಚಿನ ಸ್ಟಾರ್ಟ್‌ಅಪ್‌ಗಳು ಪ್ರಸ್ತಾಪದ
    ಗುಣಮಟ್ಟವನ್ನು ಲೆಕ್ಕಿಸದೆ ವಿಫಲವಾಗುತ್ತವೆ ಎಂಬುದನ್ನು ನಾವು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.

real_world_implications: |
  ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆಯು ವೈದ್ಯಕೀಯ ನಿರ್ಧಾರಗಳು, ಕಾನೂನು ತೀರ್ಪುಗಳು ಮತ್ತು ವ್ಯವಹಾರ
  ವ್ಯೂಹದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಸಂಪನ್ಮೂಲಗಳ ದುರುಪಯೋಗ ಮತ್ತು ಕಳಪೆ ಅಪಾಯದ
  ಮೌಲ್ಯಮಾಪನಕ್ಕೆ ಕಾರಣವಾಗುತ್ತದೆ. ಬೈಯೆಸಿಯನ್ ಚಿಂತನೆಯು ಇದನ್ನು ಸರಿಪಡಿಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಜನರನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ಪರಿಗಣಿಸಿ: ಉದಾ., ಈ ರೀತಿಯ
    ಆಚರಣೆ ಎಷ್ಟು ಬಾರಿ ಸಂಭವಿಸುತ್ತದೆ? ಒಂದು ಸ್ಪಷ್ಟ ಸಂವಾದವು ವಿಶಾಲವಾದ ಮಾದರಿಯನ್ನು ಮೀರಿಸಲು
    ಬಿಡಬೇಡಿ.
  collaborative_learning_initiative: |
    ನಿರ್ಧಾರಗಳನ್ನು ಮಾಡುವಾಗ, ಪ್ರಕರಣ-ನಿರ್ದಿಷ್ಟ ಪುರಾವೆಗಳನ್ನು ಸೇರಿಸುವ ಮೊದಲು ಬೇಸ್
    ರೇಟ್‌ಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಹೇಳಿ ಮತ್ತು ಪರಿಗಣಿಸಿ. ತಂಡಗಳಿಗೆ ಬೈಯೆಸಿಯನ್ ತರ್ಕದಲ್ಲಿ ತರಬೇತಿ
    ನೀಡಿ.

how_can_this_be_misapplied:
  base_rate_tyranny: |
    ಬೇಸ್ ರೇಟ್‌ಗಳು ವಿಭಿನ್ನವಾಗಿ ಸೂಚಿಸಿದಾಗ ಬಲವಾದ ಪ್ರಕರಣ-ನಿರ್ದಿಷ್ಟ ಪುರಾವೆಗಳನ್ನು
    ನಿರ್ಲಕ್ಷಿಸುವುದು — ಕೆಲವೊಮ್ಮೆ ವೈಯಕ್ತಿಕ ಪ್ರಕರಣವು ಅಪವಾದವಾಗಿರುತ್ತದೆ.
  stereotyping: |
    ವ್ಯಕ್ತಿಗಳ ಬಗ್ಗೆ ಅನ್ಯಾಯದ ತೀರ್ಪುಗಳನ್ನು ಮಾಡಲು ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ಬಳಸುವುದು.
  false_precision: |
    ಬೇಸ್ ರೇಟ್‌ಗಳು ಕೇವಲ ಅಂದಾಜುಗಳಾಗಿದ್ದಾಗ ನಕಲಿ ನಿಖರತೆಯೊಂದಿಗೆ ಅನ್ವಯಿಸುವುದು.
  dismissing_individuals: |
    "ಸಂಖ್ಯೆಗಳು X ಎಂದು ಹೇಳುತ್ತವೆ" ಎಂಬುದು ನಿಮ್ಮ ಮುಂದೆ ಇರುವ ವ್ಯಕ್ತಿಯು ವಿತರಣೆಗೆ
    ಹೊಂದಿಕೆಯಾಗದಿರಬಹುದು.

