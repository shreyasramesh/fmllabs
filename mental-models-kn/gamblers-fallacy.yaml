# Gambler's Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: gamblers_fallacy
name: ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ

quick_introduction: |
  ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಎಂದರೆ ಹಿಂದಿನ ಸ್ವತಂತ್ರ ಘಟನೆಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂಬ ತಪ್ಪು ನಂಬಿಕೆಯಾಗಿದೆ. ಸತತವಾಗಿ 'ತಲೆ' ಬಂದ ನಂತರ, 'ಬಾಲ' ಬರಲು 'ಸಮಯ'ವಾಗಿದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ - ಪ್ರತಿ ಎಸೆತವೂ ಸ್ವತಂತ್ರವಾಗಿದ್ದರೂ ಸಹ. ನಾವು ಯಾದೃಚ್ಛಿಕತೆಯಲ್ಲಿ ಮಾದರಿಗಳನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಅಗತ್ಯವಿಲ್ಲದಿದ್ದಾಗ "ಸರಿಪಡಿಸುವಿಕೆ" ಅಥವಾ "ಹಿಮ್ಮುಖ"ವನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತೇವೆ.

one_liner: ಹಿಂದಿನ ಸ್ವತಂತ್ರ ಘಟನೆಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುವುದಿಲ್ಲ - ನಾಣ್ಯಕ್ಕೆ ನೆನಪು ಇರುವುದಿಲ್ಲ.

try_this:
  - ನಾನು ಗೆಲ್ಲಲು 'ಸಮಯ'ವಾಗಿದೆ ಎಂದು ನೀವು ಯೋಚಿಸಿದಾಗ, ಕೇಳಿ: ಈ ಘಟನೆಗಳು ನಿಜವಾಗಿಯೂ ಸ್ವತಂತ್ರವೇ?
  - ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ (ನಿಜ) ಮತ್ತು ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ (ಸುಳ್ಳು) ಇವುಗಳನ್ನು ಪ್ರತ್ಯೇಕಿಸಿ.
  - ಯಾದೃಚ್ಛಿಕತೆಯಲ್ಲಿ ಮಾದರಿಗಳನ್ನು ನೀವು ನೋಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ಹಿಂದಿನ ಫಲಿತಾಂಶಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂದು ನಾನು ಊಹಿಸುತ್ತಿದ್ದೇನೆಯೇ, ಆದರೆ ಅವು ಸ್ವತಂತ್ರವಾಗಿರುವಾಗ?
  - ಒಬ್ಬ ಸಂಖ್ಯಾಶಾಸ್ತ್ರಜ್ಞ ನನ್ನ "ಬದಲಾವಣೆಗಾಗಿ 'ಸಮಯ'ವಾಗಿದೆ" ಎಂಬ ತಾರ್ಕಿಕತೆಯನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆಯೇ?

in_more_detail: |
  ಒಂದು ನ್ಯಾಯೋಚಿತ ನಾಣ್ಯ ಎಸೆತದಲ್ಲಿ, ಪ್ರತಿ ಎಸೆತವೂ ಸ್ವತಂತ್ರವಾಗಿರುತ್ತದೆ. ಹಿಂದಿನ ಫಲಿತಾಂಶಗಳ ಹೊರತಾಗಿಯೂ, ತಲೆಯ ಸಂಭವನೀಯತೆ ಯಾವಾಗಲೂ 50% ಆಗಿರುತ್ತದೆ. ಆದರೆ ಒಂದು ಫಲಿತಾಂಶದ ಸುದೀರ್ಘ ಸರಣಿಯು ಇನ್ನೊಂದನ್ನು ಹೆಚ್ಚು ಸಂಭವನೀಯವಾಗಿಸುತ್ತದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ನಾವು ದೊಡ್ಡ ಸಂಖ್ಯೆಗಳ ಕಾನೂನನ್ನು (ಅನೇಕ ಪ್ರಯೋಗಗಳಲ್ಲಿ, ಫಲಿತಾಂಶಗಳು ಸರಾಸರಿ ಆಗುತ್ತವೆ) ಅಲ್ಪಾವಧಿಯ "ಸರಿಪಡಿಸುವಿಕೆಯೊಂದಿಗೆ" ಗೊಂದಲಗೊಳಿಸುತ್ತೇವೆ. ಕ್ಯಾಸಿನೋಗೆ ನೆನಪಿಲ್ಲ.

  ಈ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಜೂಜು, ಹೂಡಿಕೆ ಮತ್ತು ದೈನಂದಿನ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. "ಅದೃಷ್ಟ" ಸಮತೋಲನಗೊಳ್ಳುತ್ತದೆ ಅಥವಾ ನಾವು ಗೆಲ್ಲಲು "ಸಮಯ"ವಾಗಿದೆ ಎಂದು ನಾವು ಊಹಿಸುತ್ತೇವೆ. ಕೆಲವೊಮ್ಮೆ ನಾವು ಸರಿಯಾಗಿರುತ್ತೇವೆ - ಆದರೆ ತಪ್ಪು ಕಾರಣಗಳಿಗಾಗಿ.

why_this_is_important: |
  ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆಯನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಜೂಜು ಮತ್ತು ಹೂಡಿಕೆಯಲ್ಲಿ ದುಬಾರಿ ತಪ್ಪುಗಳನ್ನು ತಡೆಯಬಹುದು. ಇದು ಅಲ್ಪಾವಧಿಯ ಸರಣಿಗಳನ್ನು ಅತಿಯಾಗಿ ಅರ್ಥೈಸುವುದನ್ನು ಮತ್ತು ಸುಳ್ಳು ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಿಜವಾದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ತಪ್ಪು ತಿಳುವಳಿಕೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಹೂಡಿಕೆ
  - ಅಪಾಯ_ಅಂದಾಜು
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ

how_can_you_spot_it:
  due_for_a_change: |
    "ನಾವು ಹಲವು ನಷ್ಟಗಳನ್ನು ಅನುಭವಿಸಿದ್ದೇವೆ - ನಾವು ಗೆಲ್ಲಲು 'ಸಮಯ'ವಾಗಿದೆ."
  pattern_in_randomness: |
    ಯಾದೃಚ್ಛಿಕ ಸರಣಿಗಳಲ್ಲಿ ಅರ್ಥಪೂರ್ಣ ಮಾದರಿಗಳನ್ನು ನೋಡುವುದು.
  hot_hand_fallacy: |
    ಒಂದು ಸರಣಿಯು ಮುಂದುವರಿಯುತ್ತದೆ ಎಂದು ನಂಬುವುದು (ಸಂಬಂಧಿತ ಆದರೆ ವಿರುದ್ಧ ತಪ್ಪು).
  independence_ignorance: |
    ಸ್ವತಂತ್ರ ಘಟನೆಗಳನ್ನು ಅವು ಸಂಪರ್ಕಗೊಂಡಿರುವಂತೆ ಪರಿಗಣಿಸುವುದು.

examples:
  gambling: |
    ರೂಲೆಟ್‌ನಲ್ಲಿ ಹಲವು ಕೆಂಪು ಬಣ್ಣಗಳು ಬಂದ ನಂತರ, "ಕೆಂಪು ಬಣ್ಣ ಮುಂದುವರಿಯಲು ಸಾಧ್ಯವಿಲ್ಲ" ಎಂದು ಕಪ್ಪು ಬಣ್ಣದ ಮೇಲೆ ಪಣತೊಡುವುದು.
  investing: |
    "ಮಾರುಕಟ್ಟೆಯು ಕುಸಿದಿದೆ - ಅದು ಏರಲೇಬೇಕು."
  hiring: |
    "ನಾವು ಹಲವು ಕೆಟ್ಟ ಅಭ್ಯರ್ಥಿಗಳನ್ನು ನೇಮಿಸಿಕೊಂಡಿದ್ದೇವೆ - ಮುಂದಿನವರು ಉತ್ತಮರಾಗಿರಲೇಬೇಕು."
  sports: |
    "ಅವರು ಬಹಳಷ್ಟು ಶಾಟ್‌ಗಳನ್ನು ತಪ್ಪಿಸಿಕೊಂಡಿದ್ದಾರೆ - ಅವರು ಮುಂದಿನ ಶಾಟ್ ಮಾಡಲು 'ಸಮಯ'ವಾಗಿದೆ."

real_world_implications: |
  ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆಯು ಜೂಜು ನಷ್ಟ ಮತ್ತು ಕಳಪೆ ಹೂಡಿಕೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಅಲ್ಪಾವಧಿಯ ಮಾದರಿಗಳನ್ನು ನಾವು ಏಕೆ ಅತಿಯಾಗಿ ಅರ್ಥೈಸುತ್ತೇವೆ ಎಂಬುದನ್ನೂ ಇದು ವಿವರಿಸುತ್ತದೆ. ನಿಜವಾದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯಿಂದ (ಇಲ್ಲಿ ಹಿಂಜರಿಯಲು ನಿಜವಾದ ಸರಾಸರಿ ಇದೆ) ಇದನ್ನು ಪ್ರತ್ಯೇಕಿಸುವುದು ಮುಖ್ಯವಾಗಿದೆ.

professional_application:
  networking_and_relationship_building: |
    ಹಿಂದಿನ ಸಂಬಂಧದ ಸನ್ನಿವೇಶಗಳು ಭವಿಷ್ಯದಲ್ಲಿ "ಸರಿಪಡುತ್ತವೆ" ಎಂದು ಊಹಿಸಬೇಡಿ - ಪ್ರತಿ ಸಂವಹನವೂ ಸ್ವಲ್ಪ ಸ್ವತಂತ್ರವಾಗಿರುತ್ತದೆ. ಆದರೆ ನಿಜವಾದ ಅಂತರ್ಲೀನ ಕಾರಣವಿದ್ದಾಗ ಮಾದರಿಗಳಿಂದ ಕಲಿಯಿರಿ.
  collaborative_learning_initiative: |
    ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸವನ್ನು ವ್ಯವಸ್ಥಿತ ಬದಲಾವಣೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸಿ. ಅಲ್ಪಾವಧಿಯ ಸರಣಿಗಳು ಶಬ್ದವಾಗಬಹುದು; "ಸರಣಿ"ಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸಬೇಡಿ ಅಥವಾ ಸುಳ್ಳು ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸಬೇಡಿ.

how_can_this_be_misapplied:
  ignoring_regression: |
    ಕೆಲವೊಮ್ಮೆ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ನಿಜವಾಗಿರುತ್ತದೆ (ಉದಾಹರಣೆಗೆ, ಕೌಶಲ್ಯದ ಕಾರ್ಯಕ್ಷಮತೆ). ಎಲ್ಲಾ ಹಿಮ್ಮುಖವನ್ನು ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಎಂದು ತಳ್ಳಿಹಾಕಬೇಡಿ.
  false_independence: |
    ಘಟನೆಗಳು ಸ್ವತಂತ್ರವಾಗಿಲ್ಲದಿದ್ದಾಗ ಅವು ಸ್ವತಂತ್ರ ಎಂದು ಊಹಿಸುವುದು (ಉದಾಹರಣೆಗೆ, ಒಂದೇ ವಿಷಯದ ಪುನರಾವರ್ತಿತ ಅಳತೆಗಳು).
  overcorrection: |
    ಹಿಂಜರಿಯಲು ನಿಜವಾದ ಸರಾಸರಿ ಇರುವಾಗ ಎಂದಿಗೂ ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸದಿರುವುದು.
  dismissing_patterns: |
    ಕೆಲವು ಮಾದರಿಗಳು ನಿಜವಾಗಿರುತ್ತವೆ - ಎಲ್ಲಾ ಸರಣಿಗಳು ಯಾದೃಚ್ಛಿಕವಾಗಿರುವುದಿಲ್ಲ.

