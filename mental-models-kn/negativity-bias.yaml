# ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆಯ ನಮೂದು

id: negativity_bias
name: ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತ

quick_introduction: |
  ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವು ಸಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗಿಂತ ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಹೆಚ್ಚಿನ ಮಹತ್ವ ನೀಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಗಳು, ಟೀಕೆಗಳು ಮತ್ತು ಬೆದರಿಕೆಗಳು ನಮ್ಮ ಗಮನವನ್ನು ಸೆಳೆಯುತ್ತವೆ ಮತ್ತು ಸಮಾನವಾದ ಸಕಾರಾತ್ಮಕ ಪ್ರಚೋದನೆಗಳಿಗಿಂತ ನಮ್ಮ ನಿರ್ಧಾರಗಳನ್ನು ಬಲವಾಗಿ ಪ್ರಭಾವಿಸುತ್ತವೆ.

one_liner: ಕೆಟ್ಟ ಸುದ್ದಿಗಳು ಒಳ್ಳೆಯ ಸುದ್ದಿಗಳಿಗಿಂತ ಹೆಚ್ಚು ತೂಗುತ್ತವೆ - ಬೆದರಿಕೆಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಲು ನಾವು ರೂಪುಗೊಂಡಿದ್ದೇವೆ.

try_this:
  - ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ ಸಕ್ರಿಯವಾಗಿ ಸಕಾರಾತ್ಮಕ ಪುರಾವೆಗಳನ್ನು ಹುಡುಕಿ ಮತ್ತು ತೂಕ ಮಾಡಿ.
  - ಅನೇಕ ಹೊಗಳಿಕೆಗಳಿಗಿಂತ ಒಂದು ಟೀಕೆಯು ಹೆಚ್ಚು ತೂಗುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
  - ಕೇಳಿ: ನಾನು ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಅದು ಅರ್ಹತೆಗಿಂತ ಹೆಚ್ಚಿನ ಮಹತ್ವ ನೀಡುತ್ತಿದ್ದೇನೆ?

ask_yourself:
  - ನಾನು ಸಕಾರಾತ್ಮಕತೆಯನ್ನು ನಿರ್ಲಕ್ಷಿಸಿ ನಕಾರಾತ್ಮಕತೆಯ ಮೇಲೆ ಧ್ಯಾನಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಾನು ಒಳ್ಳೆಯ ಪುರಾವೆಗಳ ಮೇಲೆ ಗಮನಹರಿಸಿದರೆ ವಿಭಿನ್ನವಾಗಿ ಅನುಭವಿಸುತ್ತೇನೆಯೇ?

in_more_detail: |
  ವಿಕಸನೀಯವಾಗಿ, ಬೆದರಿಕೆಯನ್ನು ಕಳೆದುಕೊಳ್ಳುವುದು ಮಾರಣಾಂತಿಕವಾಗಬಹುದು, ಆದರೆ ಅವಕಾಶವನ್ನು ಕಳೆದುಕೊಳ್ಳುವುದು ಸಾಮಾನ್ಯವಾಗಿ ಬದುಕಬಲ್ಲದ್ದಾಗಿತ್ತು. ನಮ್ಮ ಮೆದುಳು ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಆದ್ಯತೆ ನೀಡಲು ರೂಪುಗೊಂಡಿದೆ. ಒಂದು ಏಕೈಕ ಟೀಕಾತ್ಮಕ ಕಾಮೆಂಟ್ ಅನೇಕ ಹೊಗಳಿಕೆಗಳಿಗಿಂತ ಹೆಚ್ಚು ತೂಗಬಹುದು. ನಕಾರಾತ್ಮಕ ಘಟನೆಗಳು ಹೆಚ್ಚು ಸ್ಪಷ್ಟವಾಗಿ ಮತ್ತು ದೀರ್ಘಕಾಲ ನೆನಪಿನಲ್ಲಿರುತ್ತವೆ.

  ಈ ಪಕ್ಷಪಾತವು ಸಂಬಂಧಗಳು, ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವುದು ಮತ್ತು ಯೋಗಕ್ಷೇಮದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ವೈಫಲ್ಯಗಳ ಮೇಲೆ ಧ್ಯಾನಿಸುತ್ತೇವೆ, ಕೆಟ್ಟ ಸಂದರ್ಭಗಳನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತೇವೆ ಮತ್ತು ಸಕಾರಾತ್ಮಕ ಪುರಾವೆಗಳನ್ನು ಕಡಿತಗೊಳಿಸುತ್ತೇವೆ. ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಅದನ್ನು ಸರಿಪಡಿಸಲು ನಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.

why_this_is_important: |
  ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಸಮತೋಲನಗೊಳಿಸಲು, ಟೀಕೆಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ಹೆಚ್ಚು ಮಾಪನಗೊಳಿಸಿದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಗಳು ಏಕೆ ಪ್ರಾಬಲ್ಯ ಸಾಧಿಸುತ್ತವೆ ಮತ್ತು ಪರಿಸ್ಥಿತಿಗಳು ಅರ್ಹತೆಗಿಂತ ಏಕೆ ನಾವು ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಸಂಬಂಧ_ಗಳ_ನಿರ್ಮಾಣ
  - ನಾಯಕತ್ವ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  disproportionate_impact_of_criticism: |
    ಒಂದು ನಕಾರಾತ್ಮಕ ಕಾಮೆಂಟ್ ಅನೇಕ ಸಕಾರಾತ್ಮಕ ಕಾಮೆಂಟ್ ಗಳನ್ನು ಮರೆಮಾಡುತ್ತದೆ.
  threat_prioritization: |
    ಸಂಭವನೀಯ ಕೆಟ್ಟ ಪರಿಣಾಮಗಳು ಸಮಾನವಾದ ಒಳ್ಳೆಯ ಪರಿಣಾಮಗಳಿಗಿಂತ ಹೆಚ್ಚು ಗಮನವನ್ನು ಪಡೆಯುತ್ತವೆ.
  vivid_negative_memories: |
    ನಕಾರಾತ್ಮಕ ಅನುಭವಗಳನ್ನು ಸುಲಭವಾಗಿ ಮತ್ತು ಹೆಚ್ಚು ಭಾವನೆಯೊಂದಿಗೆ ನೆನಪಿಸಿಕೊಳ್ಳಲಾಗುತ್ತದೆ.
  discounting_positive_evidence: |
    ಒಳ್ಳೆಯ ಸುದ್ದಿಗಳನ್ನು ತ್ವರಿತವಾಗಿ ಮರೆತುಬಿಡಲಾಗುತ್ತದೆ ಅಥವಾ ಕಾರಣಗಳನ್ನು ವಿವರಿಸಲಾಗುತ್ತದೆ.

examples:
  performance_reviews: |
    ಒಬ್ಬ ಉದ್ಯೋಗಿ ಏಕೈಕ ಟೀಕಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಯ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುತ್ತಾನೆ ಮತ್ತು ಒಟ್ಟಾರೆ ಸಕಾರಾತ್ಮಕ ಮೌಲ್ಯಮಾಪನವನ್ನು ಕಡಿತಗೊಳಿಸುತ್ತಾನೆ.
  news_consumption: |
    ಸಕಾರಾತ್ಮಕ ಪ್ರವೃತ್ತಿಗಳ ಹೊರತಾಗಿಯೂ ನಕಾರಾತ್ಮಕ ಶೀರ್ಷಿಕೆಗಳು ಗಮನವನ್ನು ಪ್ರಾಬಲ್ಯಗೊಳಿಸುತ್ತವೆ ಮತ್ತು ಜಗತ್ತಿನ ನೋಟವನ್ನು ರೂಪಿಸುತ್ತವೆ.
  relationships: |
    ಒಂದೇ ವಾದವು ಅನೇಕ ಒಳ್ಳೆಯ ಕ್ಷಣಗಳಿಗಿಂತ ದೊಡ್ಡದಾಗಿ ಕಾಣುತ್ತದೆ.
  investing: |
    ಸಮಾನವಾದ ಏರಿಕೆಗಳು ಉತ್ಸಾಹವನ್ನು ಉಂಟುಮಾಡುವುದಕ್ಕಿಂತ ಮಾರುಕಟ್ಟೆಯ ಕುಸಿತಗಳು ಹೆಚ್ಚು ಭಯವನ್ನು ಉಂಟುಮಾಡುತ್ತವೆ.

real_world_implications: |
  ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವು ಮಾಧ್ಯಮ, ರಾಜಕೀಯ ಮತ್ತು ಸಾಂಸ್ಥಿಕ ಸಂಸ್ಕೃತಿಯನ್ನು ರೂಪಿಸುತ್ತದೆ. ಇದು ಆತಂಕ, ಸಂಘರ್ಷ ಮತ್ತು ಉಪ-ಉತ್ತಮ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಅದನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಎದುರಿಸುವುದು ಯೋಗಕ್ಷೇಮ ಮತ್ತು ತೀರ್ಪನ್ನು ಸುಧಾರಿಸಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ನೀಡುವಾಗ, ನಕಾರಾತ್ಮಕ ಕಾಮೆಂಟ್ ಗಳು ಹೆಚ್ಚು ತೂಗುತ್ತವೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ - ಅವುಗಳನ್ನು ಸಮತೋಲನಗೊಳಿಸಿ ಮತ್ತು ಬೆಳವಣಿಗೆಯನ್ನು ಒತ್ತಿಹೇಳಿ. ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಸ್ವೀಕರಿಸುವಾಗ, ಸಂಪೂರ್ಣ ಚಿತ್ರವನ್ನು ಸಮಾಲೋಚನಾತ್ಮಕವಾಗಿ ಪರಿಗಣಿಸಿ.
  collaborative_learning_initiative: |
    ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಎದುರಿಸುವ ಸಂಸ್ಕೃತಿಗಳನ್ನು ರಚಿಸಿ: ವಿಜಯಗಳನ್ನು ಆಚರಿಸಿ, ಸಕಾರಾತ್ಮಕ ಫಲಿತಾಂಶಗಳನ್ನು ದಾಖಲಿಸಿ, ಮತ್ತು ಪೋಸ್ಟ್-ಮೋರ್ಟಮ್ ಗಳನ್ನು ಸರಿಯಾಗಿ ನಡೆದ "ಪೂರ್ವ-ಮೋರ್ಟಮ್" ಗಳಿಂದ ಸಮತೋಲನಗೊಳಿಸಿ.

how_can_this_be_misapplied:
  toxic_positivity: |
    "ಸಕಾರಾತ್ಮಕ ಚಿಂತನೆ" ದಲ್ಲಿ ಒತ್ತಾಯಿಸುವ ಮೂಲಕ ಕಾನೂನುಬದ್ಧ ಕಾಳಜಿಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  ignoring_real_threats: |
    ಅಸಲಿ ಅಪಾಯಗಳನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುವ ಹಂತಕ್ಕೆ ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
  feedback_suppression: |
    "ನಕಾರಾತ್ಮಕತೆ ಕೆಟ್ಟದು" ಎಂದು ಹೇಳುವ ಮೂಲಕ ಅಗತ್ಯವಾದ ಟೀಕೆಯನ್ನು ತಪ್ಪಿಸುವುದು.
  invalidation: |
    ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ನಕಾರಾತ್ಮಕ ಭಾವನೆಗಳು "ಕೇವಲ ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತ" ಎಂದು ಹೇಳುವುದು, ಅವರಿಗೆ ನಿಜವಾದ ಕಾಳಜಿಗೆ ಕಾರಣವಿದ್ದಾಗ.

