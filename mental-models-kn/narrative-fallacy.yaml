# Narrative Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: narrative_fallacy
name: ಕಥನ ದೋಷ (Narrative Fallacy)

quick_introduction: |
  ಕಥನ ದೋಷ (Narrative Fallacy) ಎಂದರೆ ಹಿಂದಿನ ಘಟನೆಗಳಿಂದ ಕಥೆಗಳನ್ನು
  ನಿರ್ಮಿಸುವ ಪ್ರವೃತ್ತಿ. ಈ ಕಥೆಗಳು ವಾಸ್ತವಕ್ಕಿಂತ ಹೆಚ್ಚು ಸುಸಂಬದ್ಧ, ಊಹಿಸಬಹುದಾದ
  ಮತ್ತು ಅರ್ಥಪೂರ್ಣವಾಗಿ ಕಾಣುವಂತೆ ಮಾಡುತ್ತದೆ. ನಾವು ಯಾದೃಚ್ಛಿಕತೆಗೆ
  ವಿವರಣೆಗಳನ್ನು ಅನ್ವಯಿಸುತ್ತೇವೆ. ಇತಿಹಾಸದ ಗೊಂದಲವನ್ನು ಅಚ್ಚುಕಟ್ಟಾದ ಕಥೆಯಾಗಿ
  ರೂಪಿಸುತ್ತೇವೆ—ಅದರ ನಂತರ ಆ ಕಥೆಯು ಅನಿವಾರ್ಯವಾಗಿತ್ತು ಎಂದು ನಂಬುತ್ತೇವೆ.

one_liner: ನಾವು ಯಾದೃಚ್ಛಿಕತೆಗೆ ಸುಸಂಬದ್ಧ ಕಥೆಗಳನ್ನು ಅನ್ವಯಿಸುತ್ತೇವೆ—ಅದರ ನಂತರ ಅವು ಅನಿವಾರ್ಯವಾಗಿತ್ತು ಎಂದು ನಂಬುತ್ತೇವೆ.

try_this:
  - ಕೇಳಿ: ಈ ಕಥೆಯ ಎಷ್ಟು ಭಾಗವು ಹಿಂದಿನ ಘಟನೆಗಳ ಹಿನ್ನೋಟ? ಅದೃಷ್ಟದ ಪಾತ್ರ ಏನು?
  - ಅಚ್ಚುಕಟ್ಟಾದ ವಿವರಣೆಗಳ ಬಗ್ಗೆ ಸಂದೇಹಪಡುತ್ತಿರಿ—ಹಿಂದಿನದು ನಮ್ಮ ಕಥೆಗಳಿಗಿಂತ ಹೆಚ್ಚು ಗೊಂದಲಮಯವಾಗಿತ್ತು.
  - ಅರ್ಥವಾಗುತ್ತದೆ ಎಂಬುದು "ಊಹಿಸಬಹುದಾಗಿತ್ತು" ಎಂಬ ಕಾರ್ಯವನ್ನು ಮಾಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ಹಿಂದಿನದನ್ನು ಅದು ಇದ್ದುದಕ್ಕಿಂತ ಹೆಚ್ಚು ಅನಿವಾರ್ಯವೆಂದು ತೋರುವ ಕಥೆಯನ್ನು ನಾನು ನಿರ್ಮಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ಇದು ಸಂಭವಿಸುವ ಮೊದಲು ನಾನು ಇದನ್ನು ಊಹಿಸಬಹುದಿತ್ತೇ?

in_more_detail: |
  ನಸ್ಸೀಮ್ ಟಲೆಬ್ ಈ ಪದವನ್ನು ಜನಪ್ರಿಯಗೊಳಿಸಿದರು. ನಾವು ಕಥನಕ್ಕಾಗಿ ಹಂಬಲಿಸುತ್ತೇವೆ—ಕಾರಣ ಮತ್ತು ಪರಿಣಾಮ,
  ನಾಯಕರು ಮತ್ತು ಖಳನಾಯಕರು, ಸ್ಪಷ್ಟವಾದ ಘಟನೆಗಳ ಸರಣಿ. ಆದ್ದರಿಂದ ನಾವು ಹಿಂದಿನ ಘಟನೆಗಳ
  ಹಿನ್ನೋಟದಲ್ಲಿ ಘಟನೆಗಳನ್ನು ಸಂಪರ್ಕಿಸುವ ಕಥೆಗಳನ್ನು ನಿರ್ಮಿಸುತ್ತೇವೆ. ಕಥೆಯು ಸುಸಂಬದ್ಧ
  ವಾಗಿರುವುದರಿಂದ ಅದು ನಿಜವೆಂದು ಅನಿಸುತ್ತದೆ—ಆದರೆ ಸುಸಂಬದ್ಧತೆ ಎಂದರೆ ಅದು ಸರಿಯಾಗಿದೆ
  ಎಂದರ್ಥವಲ್ಲ. ನಾವು "ಅರ್ಥವಾಗುತ್ತದೆ" ಎಂಬುದನ್ನು "ಊಹಿಸಬಹುದಾಗಿತ್ತು" ಎಂಬುದರೊಂದಿಗೆ
  ಗೊಂದಲಗೊಳಿಸುತ್ತೇವೆ. ನಾವು ಅದೃಷ್ಟ ಮತ್ತು ಯಾದೃಚ್ಛಿಕತೆಯ ಪಾತ್ರವನ್ನು ಕಡಿಮೆ ಅಂದಾಜು
  ಮಾಡುತ್ತೇವೆ.

  ಕಥನ ದೋಷವು ನಾವು ಇತಿಹಾಸದಿಂದ ಹೇಗೆ ಕಲಿಯುತ್ತೇವೆ, ಯಶಸ್ಸನ್ನು ಹೇಗೆ ಮೌಲ್ಯಮಾಪನ
  ಮಾಡುತ್ತೇವೆ ಮತ್ತು ಭವಿಷ್ಯವಾಣಿಗಳನ್ನು ಹೇಗೆ ಮಾಡುತ್ತೇವೆ ಎಂಬುದರ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
  ನಾವು ಕಥೆಗಳ ವಿವರಣಾತ್ಮಕ ಶಕ್ತಿಗೆ ಹೆಚ್ಚು ಒತ್ತು ನೀಡುತ್ತೇವೆ ಮತ್ತು ಅವಕಾಶದ
  ಪಾತ್ರಕ್ಕೆ ಕಡಿಮೆ ಒತ್ತು ನೀಡುತ್ತೇವೆ.

why_this_is_important: |
  ಕಥನ ದೋಷವನ್ನು ಗುರುತಿಸುವುದು ಹಿಂದಿನ ಘಟನೆಗಳಿಂದ ಅತಿಯಾಗಿ ಕಲಿಯುವುದನ್ನು ಮತ್ತು
  ಊಹಿಸುವಿಕೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
  ಇದು ಕಾರಣಗಳು ಮತ್ತು ಭವಿಷ್ಯವಾಣಿಗಳ ಬಗ್ಗೆ ವಿನಮ್ರತೆಯನ್ನು ಉತ್ತೇಜಿಸುತ್ತದೆ.
  ಒಳ್ಳೆಯ ಕಥೆಯನ್ನು ರೂಪಿಸುವ ಎಲ್ಲವೂ ನಿಜ ಅಥವಾ ಸಾಮಾನ್ಯೀಕರಿಸಬಹುದಾದದ್ದಲ್ಲ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಕಲಿಕೆ
  - ಅಪಾಯ_ಅಂದಾಜು
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ

how_can_you_spot_it:
  hindsight_coherence: |
    ಹಿಂದಿನ ಘಟನೆಗಳನ್ನು ಆ ಸಮಯದಲ್ಲಿ ಗೋಚರಿಸದ, ಅಚ್ಚುಕಟ್ಟಾದ ಕಥೆಯಿಂದ
    ವಿವರವಾಗಿ ಹೇಳಲಾಗುತ್ತದೆ.
  cause_effect_overconfidence: |
    ಅನೇಕ ಅಂಶಗಳು ಕೊಡುಗೆ ನೀಡಿದ ಫಲಿತಾಂಶಗಳಿಗೆ ನಾವು ಸ್ಪಷ್ಟ ಕಾರಣಗಳನ್ನು
    ಆರೋಪಿಸುತ್ತೇವೆ.
  luck_minimization: |
    ಯಶಸ್ಸು ಮತ್ತು ವೈಫಲ್ಯಗಳನ್ನು ಕೌಶಲ್ಯ ಮತ್ತು ಕಾರ್ಯತಂತ್ರದಿಂದ ವಿವರಿಸಲಾಗುತ್ತದೆ,
    ಅದೃಷ್ಟದಿಂದಲ್ಲ.
  story_over_evidence: |
    ಆಕರ್ಷಕವಾದ ಕಥನವು ಸಾಂಖ್ಯಿಕ ಸಾಕ್ಷ್ಯವನ್ನು ಮೀರಿಸುತ್ತದೆ.

examples:
  business_success: |
    "ಅವರು X ಕಾರಣದಿಂದ ಯಶಸ್ವಿಯಾದರು" ಆದರೆ ಅನೇಕ ಅಂಶಗಳು ಮತ್ತು ಅದೃಷ್ಟ
    ಜೊತೆಯಲ್ಲಿತ್ತು—ನಾವು ಹೊಂದಿಕೆಯಾಗುವ ಕಥೆಯನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
  investing: |
    ತೃಪ್ತಿಕರವಾಗಿ ಅನಿಸುವ ಕಥನಗಳೊಂದಿಗೆ ಮಾರುಕಟ್ಟೆಯ ಚಲನೆಗಳನ್ನು ವಿವರಿಸುವುದು
    ಆದರೆ ಅದು ನಂತರದ ವಿವರಣೆಯಾಗಿರಬಹುದು.
  history: |
    ಐತಿಹಾಸಿಕ ಘಟನೆಗಳನ್ನು ಅನೇಕ ಅಂಶಗಳ ಮೇಲೆ ಅವಲಂಬಿತವಾಗಿದ್ದಾಗ ಅವು
    ಅನಿವಾರ್ಯ ಪ್ರಗತಿಗಳಂತೆ ಹೇಳಲಾಗುತ್ತದೆ.
  career: |
    "ನಾನು X ಮಾಡಿದ್ದರಿಂದ ಇಲ್ಲಿಗೆ ಬಂದೆ" ಆದರೆ ಅದೃಷ್ಟ ಮತ್ತು ಸಮಯವು
    ಪ್ರಮುಖ ಪಾತ್ರ ವಹಿಸಿತ್ತು.

real_world_implications: |
  ಕಥನ ದೋಷವು ಕಲಿಕೆಯನ್ನು ವಿರೂಪಗೊಳಿಸುತ್ತದೆ, ಭವಿಷ್ಯವಾಣಿಯಲ್ಲಿ ಅತಿಯಾದ
  ವಿಶ್ವಾಸವನ್ನು ಮತ್ತು ಯಶಸ್ಸು ಮತ್ತು ವೈಫಲ್ಯದ ಕಾರಣಗಳನ್ನು ನೀಡುತ್ತದೆ.
  ಇದು ಹಿಂದಿನದನ್ನು ಅದು ಇದ್ದುದಕ್ಕಿಂತ ಹೆಚ್ಚು ಊಹಿಸಬಹುದಾದಂತೆ ಮತ್ತು
  ಭವಿಷ್ಯವನ್ನು ಅದು ಇರುವುದಕ್ಕಿಂತ ಹೆಚ್ಚು ಊಹಿಸಬಹುದಾದಂತೆ ಮಾಡುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಯಾರಾದರೂ ತಮ್ಮ ಯಶಸ್ಸಿನ ಕಥೆಯನ್ನು ಹೇಳಿದಾಗ, ಅದು ಕಥನ ಎಂದು ನೆನಪಿಡಿ—
    ಸುಸಂಬದ್ಧ ಮತ್ತು ಆಕರ್ಷಕ, ಆದರೆ ಬಹುಶಃ ಸರಳೀಕೃತ. ಅದೃಷ್ಟ ಮತ್ತು
    ಅದೃಶ್ಯ ಅಂಶಗಳನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡಿರಬಹುದು.
  collaborative_learning_initiative: |
    ಹಿನ್ನೋಟ ವಿಮರ್ಶೆಗಳಲ್ಲಿ, ಕಥನವನ್ನು ಸಾಕ್ಷ್ಯದಿಂದ ಪ್ರತ್ಯೇಕಿಸಿ.
    "ಆ ಸಮಯದಲ್ಲಿ ನಾವು ಏನು ಹೇಳುತ್ತಿದ್ದೆವು?" ಎಂದು ಕೇಳಿ. ಫಲಿತಾಂಶಗಳು
    ತಿಳಿಯುವ ಮೊದಲು ಅನिश्चितತೆಯನ್ನು ಸೆರೆಹಿಡಿಯಲು ನಿರ್ಧಾರದ ಜರ್ನಲ್‌ಗಳನ್ನು
    ಬಳಸಿ.

how_can_this_be_misapplied:
  dismissing_all_explanation: |
    ಕೆಲವು ಕಥನಗಳು ಸರಿಯಾಗಿವೆ—ಎಲ್ಲವೂ ಕಥನ ದೋಷವಲ್ಲ. ಕಾರಣಗಳು ಅಸ್ತಿತ್ವದಲ್ಲಿವೆ.
  excessive_skepticism: |
    "ಕಥನ ದೋಷ" ದಿಂದಾಗಿ ಹಿಂದಿನ ಘಟನೆಗಳಿಂದ ಕಲಿಯುವುದನ್ನು ನಿರಾಕರಿಸುವುದು.
    ನಾವು ಇನ್ನೂ ಉಪಯುಕ್ತ ಪಾಠಗಳನ್ನು ಹೊರತೆಗೆಯಬಹುದು.
  false_randomness: |
    ಕೆಲವು ಫಲಿತಾಂಶಗಳು ಅರ್ಥಪೂರ್ಣವಾಗಿ ಕಾರಣವಾಗಿದ್ದರೂ, ಎಲ್ಲವೂ ಯಾದೃಚ್ಛಿಕ
    ಎಂದು ಊಹಿಸುವುದು.
  undermining_storytelling: |
    ಸಂವಹನ ಮತ್ತು ಅರ್ಥಕ್ಕಾಗಿ ಕಥೆಗಳಿಗೆ ಮೌಲ್ಯವಿದೆ—ದೋಷವೆಂದರೆ ಅವು
    ಸಂಪೂರ್ಣವಾಗಿವೆ ಅಥವಾ ಊಹಿಸಬಹುದಾದವು ಎಂದು ನಂಬುವುದು, ಅವು ಅಸ್ತಿತ್ವದಲ್ಲಿಲ್ಲ
    ಎಂದಲ್ಲ.

