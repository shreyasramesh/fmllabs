id: anchoring_bias
name: ಆಂಕರಿಂಗ್ ಬಯಾಸ್

quick_introduction: |
  ಆಂಕರಿಂಗ್ ಬಯಾಸ್ ಎಂದರೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಎದುರಾದ ಮೊದಲ ಮಾಹಿತಿಯ ಮೇಲೆ ಅತಿಯಾಗಿ ಅವಲಂಬಿತರಾಗುವ ಪ್ರವೃತ್ತಿ. ಆ ಮೊದಲ "ಆಂಕರ್" ನಂತರದ ತೀರ್ಪುಗಳನ್ನು ತಿರುಚಿಹಾಕುತ್ತದೆ, ಅದು ಅಪ್ರಸ್ತುತ ಅಥವಾ ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೂ ಸಹ.

one_liner: ನೀವು ನೋಡುವ ಮೊದಲ ಸಂಖ್ಯೆಯು ನಂತರ ಬರುವ ಎಲ್ಲವನ್ನೂ ರೂಪಿಸುತ್ತದೆ.

try_this:
  - ಮಾತುಕತೆಗೆ ಮೊದಲು, ನಿಮ್ಮ ಗುರಿ ಸಂಖ್ಯೆಯನ್ನು ನಿರ್ಧರಿಸಿ ಮತ್ತು ಅವರದರಿಂದ ಆಂಕರ್ ಆಗುವುದನ್ನು ತಪ್ಪಿಸಿ.
  - ಅಂದಾಜು ಮಾಡುವಾಗ, ಇತರರ ಮಾತು ಕೇಳುವ ಮೊದಲು ನಿಮ್ಮದೇ ಆದ ಸಂಖ್ಯೆಯನ್ನು ರಚಿಸಿ.
  - ಕೇಳಿ: ನಾನು ಮೊದಲಿಗೆ ವಿಭಿನ್ನ ಸಂಖ್ಯೆಯನ್ನು ನೋಡಿದ್ದಿದ್ದರೆ ವಿಭಿನ್ನವಾಗಿ ಯೋಚಿಸುತ್ತಿದ್ದೇನೆಯೇ?

ask_yourself:
  - ನಾನು ಮೊದಲು ಯಾವ ಸಂಖ್ಯೆ ಅಥವಾ ಕಲ್ಪನೆಯನ್ನು ಎದುರಿಸಿದೆ - ಮತ್ತು ಅದು ನನ್ನ ತೀರ್ಪನ್ನು ತಿರುಚುತ್ತಿದೆಯೇ?
  - ನಾನು ಆಂಕರ್‌ನಿಂದ ಸಾಕಷ್ಟು ಹೊಂದಾಣಿಕೆ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ, ಅಥವಾ ಇನ್ನೂ ಹತ್ತಿರದಲ್ಲಿದ್ದೇನೆಯೇ?

in_more_detail: |
  ಒಂದು ಕ್ಲಾಸಿಕ್ ಪ್ರಯೋಗದಲ್ಲಿ, ವಿಶ್ವಸಂಸ್ಥೆಯಲ್ಲಿನ ಆಫ್ರಿಕನ್ ರಾಷ್ಟ್ರಗಳ ಶೇಕಡಾವಾರು ಪ್ರಮಾಣವನ್ನು ಅಂದಾಜು ಮಾಡಲು ಕೇಳಿದ ಜನರು, ಹೆಚ್ಚಿನ ಸಂಖ್ಯೆಯನ್ನು (ಉದಾಹರಣೆಗೆ, 65 ರ ಬದಲಿಗೆ 10) ನೋಡಿದ್ದಕ್ಕಿಂತ ಹೆಚ್ಚಿನ ಅಂದಾಜುಗಳನ್ನು ನೀಡಿದರು. ಆಂಕರ್ - ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೂ ಸಹ - ಅವರ ಉತ್ತರಗಳನ್ನು ಪ್ರಭಾವಿಸಿತು. ಆಂಕರಿಂಗ್ ಮಾತುಕತೆಗಳು, ಬೆಲೆ ನಿಗದಿ, ನೇಮಕಾತಿ ಮತ್ತು ಮುನ್ಸೂಚನೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.

  ನಾವು ನೋಡುವ ಮೊದಲ ಸಂಖ್ಯೆಯು ಉಲ್ಲೇಖದ ಬಿಂದುವಾಗುತ್ತದೆ. ನಾವು ಅದರಿಂದ ದೂರ ಸರಿಯುತ್ತೇವೆ, ಆದರೆ ಸಾಮಾನ್ಯವಾಗಿ ಸಾಕಷ್ಟಲ್ಲ. ಆಂಕರ್ ಯಾದೃಚ್ಛಿಕವಾಗಿದೆ ಎಂದು ನಮಗೆ ತಿಳಿದಿದ್ದರೂ ಸಹ, ಅದು ನಮ್ಮನ್ನು ಪ್ರಭಾವಿಸಬಹುದು. ತಜ್ಞರು ಇದಕ್ಕೆ ಹೊರತಾಗಿಲ್ಲ.

why_this_is_important: |
  ಆಂಕರಿಂಗ್ ಅನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು, ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಮಾತುಕತೆ ನಡೆಸಲು ಮತ್ತು ಕುಶಲತೆಯಿಂದ ತಪ್ಪಿಸಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಮಾಹಿತಿಯ ಕ್ರಮ ಮತ್ತು ರೂಪಿಸುವಿಕೆ ಏಕೆ ಅಷ್ಟು ಮುಖ್ಯವೆಂದು ಇದು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಮಾತುಕತೆ
  - ಹೂಡಿಕೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  first_number_dominance: |
    ಮಾತುಕತೆ ಅಥವಾ ಅಂದಾಜಿನಲ್ಲಿನ ಮೊದಲ ಸಂಖ್ಯೆಯು ಫಲಿತಾಂಶದ ಮೇಲೆ ಅಸಮಾನವಾಗಿ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ.
  insufficient_adjustment: |
    ಆಂಕರ್‌ನಿಂದ ಹೊಂದಾಣಿಕೆ ಮಾಡುವಾಗ, ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಸಾಕಷ್ಟಲ್ಲ.
  arbitrary_anchor_influence: |
    ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ಅಪ್ರಸ್ತುತ ಸಂಖ್ಯೆಗಳು (ಉದಾಹರಣೆಗೆ, ಸಾಮಾಜಿಕ ಭದ್ರತಾ ಸಂಖ್ಯೆಯ ಕೊನೆಯ ಅಂಕೆಗಳು) ಅಂದಾಜುಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರಬಹುದು.
  order_effects: |
    ಆಯ್ಕೆಗಳನ್ನು ಪ್ರಸ್ತುತಪಡಿಸುವ ಕ್ರಮವು ಆಯ್ಕೆಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ.

examples:
  salary_negotiation: |
    ಉದ್ಯೋಗಿ ಅಥವಾ ಅಭ್ಯರ್ಥಿಯು ಹೇಳಿದ ಮೊದಲ ಸಂಖ್ಯೆಯು ಅಂತಿಮ ಕೊಡುಗೆಯನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತದೆ.
  real_estate: |
    ಪಟ್ಟಿ ಬೆಲೆಯು ಖರೀದಿದಾರರ ಮೌಲ್ಯದ ಗ್ರಹಿಕೆಯನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತದೆ, ಅದು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಹೆಚ್ಚು ಅಥವಾ ಕಡಿಮೆಯಾಗಿ ನಿಗದಿಪಡಿಸಿದರೂ ಸಹ.
  retail: |
    "ಹಿಂದೆ $99, ಈಗ $49" ಎಂಬುದು ಮಾರಾಟದ ಬೆಲೆಯನ್ನು ಒಪ್ಪಂದವೆಂದು ತೋರುವಂತೆ ಮಾಡಲು ಮೂಲ ಬೆಲೆಯನ್ನು ಆಂಕರ್ ಆಗಿ ಬಳಸುತ್ತದೆ.
  forecasting: |
    ಯೋಜನಾ ಸಭೆಗಳಲ್ಲಿನ ಆರಂಭಿಕ ಅಂದಾಜುಗಳು ನಂತರದ ಮುನ್ಸೂಚನೆಗಳನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತವೆ, ಮೊದಲ ಅಂದಾಜು ಊಹೆಯಾಗಿದ್ದರೂ ಸಹ.

real_world_implications: |
  ಆಂಕರಿಂಗ್ ಮಾರುಕಟ್ಟೆಗಳು, ಮಾತುಕತೆಗಳು ಮತ್ತು ನೀತಿಗಳನ್ನು ರೂಪಿಸುತ್ತದೆ. ಇದನ್ನು ನೈತಿಕವಾಗಿ (ಉದಾಹರಣೆಗೆ, ಸಮಂಜಸವಾದ ನಿರೀಕ್ಷೆಗಳನ್ನು ನಿಗದಿಪಡಿಸುವುದು) ಅಥವಾ ಅನೈತಿಕವಾಗಿ (ಉದಾಹರಣೆಗೆ, ಕುಶಲತೆಯಿಂದ ಬೆಲೆ ನಿಗದಿ) ಬಳಸಬಹುದು. ಅದನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಮಾತುಕತೆಗಳಲ್ಲಿ, ಆಂಕರ್ ಅನ್ನು ನಿಗದಿಪಡಿಸಲು ಮೊದಲ ಕೊಡುಗೆಯನ್ನು ನೀಡಲು ಪರಿಗಣಿಸಿ - ಅಥವಾ ಇತರ ಪಕ್ಷವು ಹಾಗೆ ಮಾಡುತ್ತಿದೆ ಎಂದು ತಿಳಿದಿರಲಿ.
  collaborative_learning_initiative: |
    ಸಭೆಗಳಲ್ಲಿ, ಅಂದಾಜುಗಳ ಮೇಲೆ ಯಾರು ಮೊದಲು ಮಾತನಾಡುತ್ತಾರೆ ಎಂಬ ಬಗ್ಗೆ ಎಚ್ಚರದಿಂದಿರಿ; ಚರ್ಚೆಯ ಮೊದಲು ಸ್ವತಂತ್ರ ಅಂದಾಜುಗಳನ್ನು ಸಂಗ್ರಹಿಸಲು ಪರಿಗಣಿಸಿ.

how_can_this_be_misapplied:
  manipulation: |
    ಇತರರನ್ನು ಅಪೇಕ್ಷಿತ ಫಲಿತಾಂಶಗಳ ಕಡೆಗೆ ನಿರ್ದೇಶಿಸಲು ತೀವ್ರವಾದ ಆಂಕರ್‌ಗಳನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಬಳಸುವುದು.
  overconfidence_in_anchors: |
    ನಿಮ್ಮ ಸ್ವಂತ ಮೊದಲ ಅಂದಾಜನ್ನು ಪುನಃ ಪರಿಶೀಲಿಸದೆ ಅತಿಯಾಗಿ ನಂಬುವುದು.
  ignoring_relevant_information: |
    ಆಂಕರ್ ಹೆಚ್ಚು ಸಂಬಂಧಿತ ಡೇಟಾವನ್ನು ಮೀರಿಸಲು ಬಿಡುವುದು.
  exploitation: |
    ವಾಸ್ತವಿಕ ಬೆಲೆಗಳನ್ನು ಸಮಂಜಸವೆಂದು ತೋರುವಂತೆ ಮಾಡಲು ಉಬ್ಬಿಕೊಂಡಿರುವ "ಹೋಲಿಸಿ" ಬೆಲೆಗಳನ್ನು ಬಳಸುವ ಮಾರಾಟ ತಂತ್ರಗಳು.

