# Second-Order Thinking
# Mental Model / Cognitive Bias - Example Entry

id: second_order_thinking
name: ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆ

quick_introduction: |
  ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ನಿಮ್ಮ ಕ್ರಿಯೆಗಳ ಪರಿಣಾಮಗಳ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಗಣಿಸುವ ಅಭ್ಯಾಸವಾಗಿದೆ. ಮೊದಲ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಾನು X ಮಾಡಿದರೆ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಂತರ ಏನಾಗುತ್ತದೆ?" ಮತ್ತು "ಅದರ ನಂತರ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಇದು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ಮೇಲ್ಮೈಗೆ ತರುತ್ತದೆ.

one_liner: ನಂತರ ಏನಾಗುತ್ತದೆ? ಎಂದು ಕೇಳಿ—ಪರಿಣಾಮಗಳ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಗಣಿಸಿ.

try_this:
  - ಯಾವುದೇ ನಿರ್ಧಾರಕ್ಕಾಗಿ, ಕನಿಷ್ಠ ಎರಡು ಬಾರಿ ನಂತರ ಏನಾಗುತ್ತದೆ? ಎಂದು ಕೇಳಿ.
  - ನಿಮ್ಮ ಕ್ರಿಯೆಗೆ ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ—ಮತ್ತು ನಂತರ ಆ ಪ್ರತಿಕ್ರಿಯೆಗೆ.
  - ಸರಪಳಿಯಲ್ಲಿ ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ವಿಲೋಮಗೊಳ್ಳುವಾಗ ಅಥವಾ ಜಟಿಲವಾಗುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಎರಡನೇ-ಶ್ರೇಣಿಯ (ಮತ್ತು ಮೂರನೇ-ಶ್ರೇಣಿಯ) ಪರಿಣಾಮಗಳನ್ನು ಯೋಚಿಸಿದ್ದೇನೆಯೇ?
  - ನಾನು ಯಾವ ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ತಪ್ಪಿಸಿಕೊಳ್ಳಬಹುದು?

in_more_detail: |
  ಹೋವಾರ್ಡ್ ಮಾರ್ಕ್ಸ್ ಅವರು ಹೂಡಿಕೆಯಲ್ಲಿ ಈ ಪರಿಕಲ್ಪನೆಯನ್ನು ಜನಪ್ರಿಯಗೊಳಿಸಿದರು. ಮೊದಲ-ಶ್ರೇಣಿ: "ಇದು ಏರುತ್ತದೆ." ಎರಡನೇ-ಶ್ರೇಣಿ: "ಇದು ಏರಿದರೆ, ಇತರರು ಗಮನಿಸುತ್ತಾರೆ, ಹೆಚ್ಚು ಜನರು ಖರೀದಿಸುತ್ತಾರೆ, ಇದು ಮತ್ತಷ್ಟು ಏರುತ್ತದೆ—ಅದು ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನಗೊಂಡು ಕುಸಿಯುವವರೆಗೆ." ಪರಿಣಾಮಗಳ ಸರಪಳಿಯು ಸಾಮಾನ್ಯವಾಗಿ ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮವನ್ನು ವಿಲೋಮಗೊಳಿಸುತ್ತದೆ ಅಥವಾ ಜಟಿಲಗೊಳಿಸುತ್ತದೆ.

  ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಕಷ್ಟಕರವಾಗಿದೆ—ಇದಕ್ಕೆ ಹೆಚ್ಚು ಮಾನಸಿಕ ಶ್ರಮ ಮತ್ತು ಕಲ್ಪನೆ ಬೇಕಾಗುತ್ತದೆ. ಆದರೆ ಇದು ಅನೇಕ ತಪ್ಪುಗಳನ್ನು ತಡೆಯುತ್ತದೆ. ಉತ್ತಮ ತಂತ್ರಜ್ಞರು ಹಲವಾರು ಹಂತಗಳ ಮುಂದೆ ಯೋಚಿಸುತ್ತಾರೆ ಮತ್ತು ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸುತ್ತಾರೆ.

why_this_is_important: |
  ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ತಡೆಯುತ್ತದೆ ಮತ್ತು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ. ಇದು ತಂತ್ರ, ನೀತಿ ಮತ್ತು ಕ್ರಿಯೆಗಳು ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಪ್ರಚೋದಿಸುವ ಯಾವುದೇ ಕ್ಷೇತ್ರಕ್ಕೆ ಅತ್ಯಗತ್ಯ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವುದು
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವುದು
  - ತಂತ್ರ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  consequence_chains: |
    "ನಾನು X ಮಾಡಿದರೆ, ನಂತರ Y ಸಂಭವಿಸುತ್ತದೆ, ನಂತರ Z ಸಂಭವಿಸುತ್ತದೆ..."
  reaction_anticipation: |
    ನಿಮ್ಮ ಕ್ರಿಯೆಗೆ ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸುವುದು.
  unintended_effects: |
    ಉಪ-ಪರಿಣಾಮಗಳು ಮತ್ತು ಪ್ರತಿಕ್ರಿಯೆ ಲೂಪ್‌ಗಳಿಗಾಗಿ ನೋಡುವುದು.
  reversals: |
    ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳನ್ನು ವಿರೋಧಿಸುವ ಅಥವಾ ವಿಲೋಮಗೊಳಿಸುವ ಎರಡನೇ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು.

examples:
  investing: |
    "ಎಲ್ಲರೂ ಇದು ಉತ್ತಮ ಹೂಡಿಕೆ ಎಂದು ಯೋಚಿಸಿದರೆ, ಅದು ಬಹುಶಃ ಜನರಿಂದ ತುಂಬಿದೆ—
    ಅಂಚು ಹೋಗಿರಬಹುದು."
  policy: |
    "ನಾವು X ಗೆ ಸಬ್ಸಿಡಿ ನೀಡಿದರೆ, ಬೇಡಿಕೆ ಹೆಚ್ಚಾಗುತ್ತದೆ, ಬೆಲೆಗಳು ಏರುತ್ತವೆ—ಸಬ್ಸಿಡಿಯು
    ವಾಸ್ತವವಾಗಿ ಸಹಾಯ ಮಾಡುತ್ತದೆಯೇ?"
  negotiation: |
    "ನಾನು ಇಲ್ಲಿ ಕಠಿಣವಾಗಿ ಒತ್ತಾಯಿಸಿದರೆ, ಅವರು ಅಲ್ಲಿ ಪ್ರತೀಕಾರ ತೀರಿಸುತ್ತಾರೆ—ನಿವ್ವಳ ಪರಿಣಾಮವೇನು?"
  incentives: |
    "ನಾವು ಈ ಅಳತೆಗೆ ಬಹುಮಾನ ನೀಡಿದರೆ, ಜನರು ಅದನ್ನು ದುರುಪಯೋಗಪಡಿಸಿಕೊಳ್ಳುತ್ತಾರೆ—ಅವರು
    ವಾಸ್ತವವಾಗಿ ಏನನ್ನು ಮಾಡುತ್ತಾರೆ?"

real_world_implications: |
  ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಕಾರ್ಯತಂತ್ರದ ಚಿಂತನೆಯ ಲಕ್ಷಣವಾಗಿದೆ. ಇದು ನೀತಿ ವೈಫಲ್ಯಗಳು, ಅನಿರೀಕ್ಷಿತ ಪ್ರೋತ್ಸಾಹಗಳು ಮತ್ತು ಅಮಾಯಕ ಆಶಾವಾದವನ್ನು ತಡೆಯುತ್ತದೆ. ಇದು ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವವರನ್ನು ಶ್ರೇಷ್ಠರಿಂದ ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಯಾವುದೇ ಕ್ರಿಯೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳುವ ಮೊದಲು, "ಅವರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ? ಮತ್ತು ನಾನು
    ಅದಕ್ಕೆ ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತೇನೆ?" ಎಂದು ಕೇಳಿ. ತಕ್ಷಣದ ವಿನಿಮಯವನ್ನು ಮಾತ್ರವಲ್ಲದೆ, ಸಂಬಂಧದ
    ಗತಿವಿಜ್ಞಾನವನ್ನು ಪರಿಗಣಿಸಿ.
  collaborative_learning_initiative: |
    ಯೋಜನೆಯಲ್ಲಿ, "ನಂತರ ಏನಾಗುತ್ತದೆ?" ವ್ಯಾಯಾಮಗಳನ್ನು ನಡೆಸಿ. ಪರಿಣಾಮಗಳ ಸರಪಳಿಗಳನ್ನು ನಕ್ಷೆ
    ಮಾಡಿ. ಮೇಲ್ಮೈಗೆ ಬರುವ ಮೊದಲು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ಗುರುತಿಸಿ.

how_can_this_be_misapplied:
  analysis_paralysis: |
    ಯಾವಾಗಲೂ ಕ್ರಿಯೆ ತೆಗೆದುಕೊಳ್ಳಲು ಸಾಧ್ಯವಾಗದಷ್ಟು ಹಂತಗಳ ಮುಂದೆ ಯೋಚಿಸುವುದು.
  false_complexity: |
    ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ಸಾಕಾಗುವಾಗ ಎರಡನೇ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ಯಾವಾಗಲೂ ಪ್ರಾಬಲ್ಯ
    ಹೊಂದುತ್ತವೆ ಎಂದು ಊಹಿಸುವುದು.
  overconfidence: |
    ಅನಿಶ್ಚಿತತೆ ಸಂಯುಕ್ತವಾಗುವಾಗ ಉದ್ದವಾದ ಸರಪಳಿಗಳನ್ನು ಊಹಿಸಬಹುದು ಎಂದು ನಂಬುವುದು.
  pessimism: |
    ಪರಿಣಾಮಗಳ ಸರಪಳಿಯಲ್ಲಿ ಯಾವಾಗಲೂ ಕೆಟ್ಟದನ್ನು ಊಹಿಸುವುದು.

