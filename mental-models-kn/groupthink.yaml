# Groupthink
# Mental Model / Cognitive Bias - Example Entry

id: groupthink
name: ಗುಂಪು ಆಲೋಚನೆ (Groupthink)

quick_introduction: |
  ಗುಂಪು ಆಲೋಚನೆ ಎಂದರೆ, ಸಮಾನ ಮನಸ್ಕ ಗುಂಪುಗಳು ಟೀಕಾತ್ಮಕ ಮೌಲ್ಯಮಾಂಕನಕ್ಕಿಂತ ಒಮ್ಮತ ಮತ್ತು ಸಾಮರಸ್ಯಕ್ಕೆ ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ. ಸದಸ್ಯರು ಭಿನ್ನಾಭಿಪ್ರಾಯಗಳನ್ನು ಹತ್ತಿಕ್ಕುತ್ತಾರೆ, ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಿಂದ ವರ್ತಿಸುತ್ತಾರೆ ಮತ್ತು ಗ್ರಹಿಸಿದ ಗುಂಪಿನ ದೃಷ್ಟಿಕೋನಕ್ಕೆ ಹೊಂದಿಕೊಳ್ಳುತ್ತಾರೆ. ಏಕಮತದ ಬಯಕೆ ಉತ್ತಮ ನಿರ್ಧಾರದ ಬಯಕೆಗಿಂತ ಹೆಚ್ಚಾಗುತ್ತದೆ.

one_liner: ಸತ್ಯದ ಮೇಲಿನ ಸಾಮರಸ್ಯ—ಗುಂಪುಗಳು ಟೀಕಾತ್ಮಕ ಮೌಲ್ಯಮಾಂಕನಕ್ಕಿಂತ ಒಮ್ಮತಕ್ಕೆ ಆದ್ಯತೆ ನೀಡುತ್ತವೆ.

try_this:
  - ಒಬ್ಬ 'ವಿರೋಧಿ ವಕೀಲ'ರನ್ನು ನೇಮಿಸಿ; ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿರೀಕ್ಷಿತ ಮತ್ತು ಸುರಕ್ಷಿತವಾಗಿಸಿ.
  - ಕೇಳಿ: ನಾವು ಏನು ಹೇಳುತ್ತಿಲ್ಲ? ನಾವು ಈ ಗುಂಪಿನಲ್ಲಿ ಇಲ್ಲದಿದ್ದರೆ ಏನು ಹೇಳುತ್ತಿದ್ದೆವು?
  - ಗುಂಪಿನ ನಿರ್ಧಾರಗಳನ್ನು ಅಂತಿಮಗೊಳಿಸುವ ಮೊದಲು ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹುಡುಕಿ.

ask_yourself:
  - ಸಾಮರಸ್ಯವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ನಾನು ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಿಂದ ವರ್ತಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಮ್ಮ ಒಮ್ಮತವು ನಿಜವಾಗಿದೆಯೇ ಅಥವಾ ಒಪ್ಪಿಕೊಳ್ಳುವ ಒತ್ತಡದ ಫಲಿತಾಂಶವೇ?

in_more_detail: |
  ಇರ್ವಿಂಗ್ ಜಾನಿಸ್ ಅವರು ವಿದೇಶಾಂಗ ನೀತಿಯ ವೈಫಲ್ಯಗಳನ್ನು (ಬೇ ಆಫ್ ಪಿಗ್ಸ್, ವಿಯೆಟ್ನಾಂ) ಅಧ್ಯಯನ ಮಾಡಿದರು ಮತ್ತು ಮಾದರಿಗಳನ್ನು ಗುರುತಿಸಿದರು: ಅಜೇಯತೆಯ ಭ್ರಮೆ, ಸಾಮೂಹಿಕ ತರ್ಕಬದ್ಧತೆ, ಒಗ್ಗೂಡುವಿಕೆಯ ಕಡೆಗೆ ಒತ್ತಡ, ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆ, ಏಕಮತದ ಭ್ರಮೆ, ಮತ್ತು ಗುಂಪನ್ನು ಭಿನ್ನಾಭಿಪ್ರಾಯದ ಮಾಹಿತಿಯಿಂದ ರಕ್ಷಿಸುವ 'ಮೈಂಡ್‌ಗಾರ್ಡ್‌ಗಳು'. ಹೆಚ್ಚಿನ ಒಗ್ಗಟ್ಟು, ಏಕಾಂತ ಮತ್ತು ಒತ್ತಡವು ಗುಂಪು ಆಲೋಚನೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.

  ಗುಂಪು ಆಲೋಚನೆಯು ಕಳಪೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ ಏಕೆಂದರೆ ಪರ್ಯಾಯಗಳನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಲಾಗುವುದಿಲ್ಲ. ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿಷ್ಠೆಗೇಡಿತನವೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ಗುಂಪು ತನ್ನ ಸರಿಯಾದಿಕೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತದೆ ಮತ್ತು ಅಪಾಯಗಳನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತದೆ.

why_this_is_important: |
  ಗುಂಪು ಆಲೋಚನೆಯನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವ ಪರಿಸ್ಥಿತಿಗಳನ್ನು ರಚಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ: ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ, ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ತಂದುಕೊಳ್ಳಿ ಮತ್ತು ಅಕಾಲಿಕ ಒಮ್ಮತವನ್ನು ತಪ್ಪಿಸಿ. ಇದು ವಿಪತ್ಕಾರಕ ಗುಂಪು ವೈಫಲ್ಯಗಳನ್ನು ತಪ್ಪಿಸಲು ಅವಶ್ಯಕವಾಗಿದೆ.

when_to_use:
  - ನಾಯಕತ್ವ (leadership)
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ (decision_making)
  - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ (problem_solving)
  - ಸಂಘರ್ಷ_ಪರಿಹರಣೆ (conflict_resolution)

how_can_you_spot_it:
  pressure_for_consensus: |
    ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿರುತ್ಸಾಹಗೊಳಿಸಲಾಗುತ್ತದೆ ಅಥವಾ ಶಿಕ್ಷಿಸಲಾಗುತ್ತದೆ; ಒಪ್ಪಿಗೆಗೆ ಬಹುಮಾನ ನೀಡಲಾಗುತ್ತದೆ.
  illusion_of_unanimity: |
    ಮೌನವನ್ನು ಒಪ್ಪಿಗೆಯೆಂದು ವ್ಯಾಖ್ಯಾನಿಸಲಾಗುತ್ತದೆ, ಆದರೆ ಅದು ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಾಗಿರಬಹುದು.
  collective_rationalization: |
    ಗುಂಪು ಎಚ್ಚರಿಕೆಗಳನ್ನು ತಿರಸ್ಕರಿಸುತ್ತದೆ ಮತ್ತು ತನ್ನ ದೃಷ್ಟಿಕೋನವನ್ನು ಬಲಪಡಿಸುತ್ತದೆ.
  mindguards: |
    ಸದಸ್ಯರು ಒಮ್ಮತವನ್ನು ಪ್ರಶ್ನಿಸುವ ಮಾಹಿತಿಯಿಂದ ಗುಂಪನ್ನು ರಕ್ಷಿಸುತ್ತಾರೆ.

examples:
  bay_of_pigs: |
    ಕೆನೆಡಿ ಅವರ ಸಲಹೆಗಾರರು ಆಕ್ರಮಣ ಯೋಜನೆಯ ಬಗ್ಗೆ ಸಂದೇಹಗಳನ್ನು ಹತ್ತಿಕ್ಕಿದರು; ಇದರ ಫಲಿತಾಂಶ ವಿಪತ್ತು.
  corporate_decisions: |
    ಒಂದು ನಾಯಕತ್ವ ತಂಡವು ಕೆಂಪು ಧ್ವಜಗಳ ಹೊರತಾಗಿಯೂ ವಿಲೀನದೊಂದಿಗೆ ಮುಂದುವರಿಯುತ್ತದೆ ಏಕೆಂದರೆ ಯಾರೂ ವಿರೋಧಿಸಲು ಬಯಸುವುದಿಲ್ಲ.
  product_launches: |
    ಒಂದು ತಂಡವು ದೋಷಪೂರಿತ ಉತ್ಪನ್ನವನ್ನು ಹೊರತರುತ್ತದೆ ಏಕೆಂದರೆ ಎಲ್ಲರೂ ಯೋಜನೆಯಲ್ಲಿ ಹೂಡಿಕೆ ಮಾಡಿದ್ದಾರೆ ಮತ್ತು ಯಾರೂ ಕಾಳಜಿ ವ್ಯಕ್ತಪಡಿಸುವುದಿಲ್ಲ.
  boards: |
    ಮಂಡಳಿಯ ಸದಸ್ಯರು ಸಾಮರಸ್ಯವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ನಿರ್ವಹಣಾ ಪ್ರಸ್ತಾವನೆಗಳನ್ನು ಅಂಧವಾಗಿ ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆ.

real_world_implications: |
  ಗುಂಪು ಆಲೋಚನೆಯು ನೀತಿ ವೈಫಲ್ಯಗಳು, ಕಾರ್ಪೊರೇಟ್ ವಿಪತ್ತುಗಳು ಮತ್ತು ಕಳೆದುಹೋದ ಅವಕಾಶಗಳಿಗೆ ಕೊಡುಗೆ ನೀಡುತ್ತದೆ. ಇದು ವಿಶೇಷವಾಗಿ ಹೆಚ್ಚಿನ-ಪಣ, ಹೆಚ್ಚಿನ-ಒತ್ತಡದ ಸಂದರ್ಭಗಳಲ್ಲಿ ಅಪಾಯಕಾರಿ. ಇದನ್ನು ತಡೆಗಟ್ಟಲು ಉದ್ದೇಶಪೂರ್ವಕ ರಚನಾತ್ಮಕ ಮಧ್ಯಸ್ಥಿಕೆಗಳು ಬೇಕಾಗುತ್ತವೆ.

professional_application:
  networking_and_relationship_building: |
    ಭಿನ್ನಾಭಿಪ್ರಾಯಕ್ಕೆ ಮಾನಸಿಕ ಸುರಕ್ಷತೆಯನ್ನು ಸೃಷ್ಟಿಸಿ. ಕಾಳಜಿ ವ್ಯಕ್ತಪಡಿಸುವವರಿಗೆ ಧನ್ಯವಾದ ಹೇಳಿ. ಅಸಮ್ಮತಿಸುವುದನ್ನು ಅಸಹ್ಯಕರವಾಗದಂತೆ ಮಾದರಿಯಾಗಿ ತೋರಿಸಿ.
  collaborative_learning_initiative: |
    'ವಿರೋಧಿ ವಕೀಲ', 'ರೆಡ್ ಟೀಮ್‌ಗಳು' ಮತ್ತು 'ಪ್ರೀಮೋರ್ಟೆಮ್‌ಗಳನ್ನು' ಬಳಸಿ. ಪ್ರಬಲವಾದ ದೃಷ್ಟಿಕೋನದ ವಿರುದ್ಧ ವಾದಿಸಲು ಯಾರಾದರೂ ಅಗತ್ಯವೆಂದು ಹೇಳಿ. ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ತಂದುಕೊಳ್ಳಿ. ನಾಯಕನು ಕೊನೆಯಲ್ಲಿ ಮಾತನಾಡುತ್ತಾನೆ, ಇದರಿಂದ ಇತರರ ಅಭಿಪ್ರಾಯಗಳು ಪ್ರಭಾವಿತವಾಗುವುದಿಲ್ಲ.

how_can_this_be_misapplied:
  false_dissent: |
    "ನಿಯೋಜಿತ ಭಿನ್ನಾಭಿಪ್ರಾಯಕಾರರನ್ನು" ರಚಿಸುವುದು, ಅವರು ನಿಜವಾಗಿಯೂ ಭಿನ್ನಾಭಿಪ್ರಾಯ ಹೊಂದಿಲ್ಲ - ಗುಂಪು ಅದನ್ನು ಗ್ರಹಿಸುತ್ತದೆ.
  excessive_conflict: |
    ವಿನಾಶಕಾರಿ ಸಂಘರ್ಷ ಮತ್ತು ಪಕ್ಷವಾಯುವಿನವರೆಗೆ ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ಪ್ರೋತ್ಸಾಹಿಸುವುದು.
  dismissing_consensus: |
    ಎಲ್ಲಾ ಒಮ್ಮತವನ್ನು ಗುಂಪು ಆಲೋಚನೆ ಎಂದು ಊಹಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಗುಂಪು ಸರಿಯಾಗಿರುತ್ತದೆ.
  individualism: |
    ಸಮೂಹ ನಿರ್ಧಾರ ಅಸಾಧ್ಯವಾಗುವ ಮಟ್ಟಿಗೆ ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.

