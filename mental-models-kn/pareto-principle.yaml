# Pareto Principle
# Mental Model / Cognitive Bias - Example Entry

id: pareto_principle
name: ಪರೆಟೊ ತತ್ವ

quick_introduction: |
  ಪರೆಟೊ ತತ್ವ (ಅಥವಾ 80/20 ನಿಯಮ) ಹೇಳುವ ಪ್ರಕಾರ, ಸುಮಾರು 80% ಪರಿಣಾಮಗಳು 20% ಕಾರಣಗಳಿಂದ ಉಂಟಾಗುತ್ತವೆ. ಕಡಿಮೆ ಪ್ರಮಾಣದ ಒಳಹರಿವುಗಳು ಹೆಚ್ಚಾಗಿ ಹೆಚ್ಚಿನ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತವೆ—ಮಾರಾಟ, ದೋಷಗಳು, ಗ್ರಾಹಕರು, ಶ್ರಮ, ವೈಶಿಷ್ಟ್ಯಗಳು ಮತ್ತು ಇತರ ಹಲವು ವಿಷಯಗಳಲ್ಲಿ. ಮುಖ್ಯವಾದ ಕೆಲವೇ ವಿಷಯಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.

one_liner: 80% ಪರಿಣಾಮಗಳು 20% ಕಾರಣಗಳಿಂದ ಬರುತ್ತವೆ—ಮುಖ್ಯವಾದ ಕೆಲವೇ ವಿಷಯಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.

try_this:
  - 80% ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವ 20% ಒಳಹರಿವುಗಳನ್ನು ಗುರುತಿಸಿ—ಅಲ್ಲಿ ನಿಮ್ಮ ಗಮನವನ್ನು ಹೆಚ್ಚಿಸಿ.
  - ಕಡಿಮೆ ಫಲಿತಾಂಶ ನೀಡುವ 80% ಅನ್ನು ಕಡಿತಗೊಳಿಸಿ ಅಥವಾ ಆದ್ಯತೆ ಕಡಿಮೆ ಮಾಡಿ.
  - ಕೇಳಿ: ಯಾವ ಕೆಲವು ವಿಷಯಗಳನ್ನು ನಾನು ಉತ್ತಮವಾಗಿ ಮಾಡಿದರೆ, ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿರುತ್ತದೆ?

ask_yourself:
  - ಕೆಲವು ವಿಷಯಗಳು ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿರುವಾಗ ನಾನು ನನ್ನ ಶ್ರಮವನ್ನು ಸಮಾನವಾಗಿ ಹಂಚುತ್ತಿದ್ದೇನೆಯೇ?
  - ನನ್ನ ಹೆಚ್ಚಿನ-ಪ್ರಭಾವದ 20% ಯಾವುದು?

in_more_detail: |
  ವಿಲ್ಲಫ್ರೆಡೋ ಪರೆಟೊ ಇಟಲಿಯ 80% ಭೂಮಿ 20% ಜನರಿಂದ ಒಡೆತನದಲ್ಲಿದೆ ಎಂದು ಗಮನಿಸಿದರು. ಈ ತತ್ವವನ್ನು ಸಾಮಾನ್ಯವಾಗಿ ವಿಸ್ತರಿಸಲಾಗಿದೆ: 80% ಮಾರಾಟ 20% ಗ್ರಾಹಕರಿಂದ, 80% ದೋಷಗಳು 20% ಕೋಡ್‌ನಿಂದ, 80% ಫಲಿತಾಂಶಗಳು 20% ಶ್ರಮದಿಂದ. ನಿಖರವಾದ ಅನುಪಾತ ಬದಲಾಗಬಹುದು, ಆದರೆ ವಿತರಣೆಯ ಮಾದರಿ—ಅಸಮಾನ ವಿತರಣೆ—ಸಾಮಾನ್ಯವಾಗಿದೆ.

  ಈ ತತ್ವವು ಹೆಚ್ಚಿನ-ಪ್ರಭಾವದ 20% ಅನ್ನು ಗುರುತಿಸಿ ಮತ್ತು ಕೇಂದ್ರೀಕರಿಸುವುದರಿಂದ ಫಲಿತಾಂಶಗಳನ್ನು ಗಮನಾರ್ಹವಾಗಿ ಸುಧಾರಿಸಬಹುದು ಎಂದು ಸೂಚಿಸುತ್ತದೆ. ಇದು ಆದ್ಯತಾ ನಿರ್ಣಯದ ಸಾಧನ, ಭೌತಿಕ ನಿಯಮವಲ್ಲ.

why_this_is_important: |
  ಪರೆಟೊ ತತ್ವವನ್ನು ಅನ್ವಯಿಸುವುದರಿಂದ ನೀವು ನಿರ್ದಾಕ್ಷಿಣ್ಯವಾಗಿ ಆದ್ಯತೆ ನೀಡಲು, ಕಡಿಮೆ-ಪರಿಣಾಮದ ಚಟುವಟಿಕೆಗಳಲ್ಲಿ ಶ್ರಮ ವ್ಯರ್ಥ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ಕಡಿಮೆ ಸಂಪನ್ಮೂಲಗಳೊಂದಿಗೆ ಹೆಚ್ಚು ಸಾಧಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಉತ್ಪಾದಕತೆ ಮತ್ತು ಕಾರ್ಯತಂತ್ರಕ್ಕೆ ಮೂಲಭೂತವಾಗಿದೆ.

when_to_use:
  - ನಿರ್ಣಯ_ಮಾಡುವಿಕೆ
  - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
  - ನಾಯಕತ್ವ
  - ವೃತ್ತಿ_ಜೀವನದ_ಕ್ರಮಗಳು

how_can_you_spot_it:
  uneven_distribution: |
    X ನ ಸಣ್ಣ ಭಾಗವು Y ನ ದೊಡ್ಡ ಭಾಗವನ್ನು ಲೆಕ್ಕಾಚಾರ ಮಾಡುತ್ತದೆ.
  high_leverage_activities: |
    ಕೆಲವು ಕ್ರಿಯೆಗಳು ಹೆಚ್ಚಿನ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತವೆ.
  low_value_tail: |
    ಅನೇಕ ಚಟುವಟಿಕೆಗಳು ಕಡಿಮೆ ಕೊಡುಗೆ ನೀಡುತ್ತವೆ; ಅವುಗಳನ್ನು ಕತ್ತರಿಸುವುದರಿಂದ ಸಣ್ಣ ಪರಿಣಾಮ ಉಂಟಾಗುತ್ತದೆ.
  vital_few_vs_trivial_many: |
    ಯಾವುದು ಹೆಚ್ಚು ಮುಖ್ಯ ಎಂಬುದನ್ನು ಗುರುತಿಸುವುದೇ ಇಲ್ಲಿನ ರಹಸ್ಯ.

examples:
  sales: |
    20% ಗ್ರಾಹಕರು 80% ಆದಾಯವನ್ನು ಉತ್ಪಾದಿಸುತ್ತಾರೆ—ಅವರನ್ನು ಉಳಿಸಿಕೊಳ್ಳಲು ಮತ್ತು ಬೆಳೆಸಲು ಗಮನ ಹರಿಸಿ.
  software: |
    20% ವೈಶಿಷ್ಟ್ಯಗಳು 80% ಬಳಕೆಗೆ ಕಾರಣವಾಗಿವೆ—ಅವುಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಿ.
  productivity: |
    ಕೆಲವು ಅಭ್ಯಾಸಗಳು ಅಥವಾ ದಿನಚರಿಗಳು ನಿಮ್ಮ ಹೆಚ್ಚಿನ ಔಟ್‌ಪುಟ್ ಅನ್ನು ಉತ್ಪಾದಿಸುತ್ತವೆ—ಅವುಗಳ ಮೇಲೆ ಹೆಚ್ಚು ಗಮನ ಹರಿಸಿ.
  problems: |
    20% ದೋಷಗಳು 80% ಕ್ರ್ಯಾಶ್‌ಗಳಿಗೆ ಕಾರಣವಾಗಿವೆ—ಮೊದಲು ಅವುಗಳನ್ನು ಸರಿಪಡಿಸಿ.

real_world_implications: |
  ಪರೆಟೊ ತತ್ವವು ಸಂಪನ್ಮೂಲ ಹಂಚಿಕೆ, ಉತ್ಪನ್ನ ಕಾರ್ಯತಂತ್ರ ಮತ್ತು ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ. ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಶ್ರಮವನ್ನು ಅತಿಯಾಗಿ ಹರಡುವುದಕ್ಕೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದನ್ನು ಅತಿಯಾಗಿ ಅನ್ವಯಿಸುವುದರಿಂದ "ಉದ್ದದ ಬಾಲ"ದ (long tail) ನಿರ್ಲಕ್ಷಕ್ಕೆ ಕಾರಣವಾಗಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    ನಿಮ್ಮ ಗುರಿಗಳಿಗೆ ಮುಖ್ಯವಾದ ಸಂಬಂಧಗಳನ್ನು ಗುರುತಿಸಿ. ಸಮಾನವಾಗಿ ಶ್ರಮವನ್ನು ಹಂಚುವ ಬದಲು, ಅವುಗಳಲ್ಲಿ ಅಸಮಾನವಾಗಿ ಹೂಡಿಕೆ ಮಾಡಿ.
  collaborative_learning_initiative: |
    ತಂಡದ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸುವಾಗ, 80% ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವ 20% ಮಧ್ಯಸ್ಥಿಕೆಗಳನ್ನು ಹುಡುಕಿ. ಅಲ್ಲಿ ತರಬೇತಿ ಮತ್ತು ಪ್ರಕ್ರಿಯೆ ಬದಲಾವಣೆಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.

how_can_this_be_misapplied:
  oversimplification: |
    80/20 ಎಲ್ಲೆಡೆ ಅನ್ವಯಿಸುತ್ತದೆ ಎಂದು ಊಹಿಸುವುದು; ಕೆಲವು ವಿತರಣೆಗಳು ಹೆಚ್ಚು ಸಮಾನವಾಗಿರುತ್ತವೆ.
  neglecting_the_tail: |
    "ಅಲ್ಪಪ್ರಮಾಣದ ಅನೇಕ" (trivial many) ವಿಷಯಗಳು ಸಾಮೂಹಿಕವಾಗಿ ಮುಖ್ಯವಾದಾಗ ಅವುಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು (ಉದಾ., ಅನೇಕ ಸಣ್ಣ ಗ್ರಾಹಕರು, ಅಂಚಿನ ಪ್ರಕರಣಗಳು).
  false_precision: |
    80/20 ಅನ್ನು ನಿಖರವಾದ ನಿಯಮದಂತೆ ಪರಿಗಣಿಸುವುದು, ಕೇವಲ ಅಂದಾಜು ಮಾಡಬಹುದಾದ ಸಾಧನವಾಗಿಲ್ಲ.
  misidentifying_the_vital_few: |
    ದೋಷಪೂರಿತ ವಿಶ್ಲೇಷಣೆಯಿಂದಾಗಿ ತಪ್ಪಾದ 20% ಮೇಲೆ ಗಮನ ಹರಿಸುವುದು.

