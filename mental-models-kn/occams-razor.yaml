# Occam's Razor
# Mental Model / Cognitive Bias - Example Entry

id: occams_razor
name: ಓಕಂ'ಸ್ ರೇಜರ್

quick_introduction: |
  ಓಕಂ'ಸ್ ರೇಜರ್ (ಅಥವಾ ಓಕ್'ಹ್ಯಾಮ್'ಸ್ ರೇಜರ್) ಎಂಬುದು ಸ್ಪರ್ಧಾತ್ಮಕ ಊಹೆಗಳ ನಡುವೆ,
  ಅತಿ ಕಡಿಮೆ ಊಹೆಗಳಿರುವ ಊಹೆಗೆ ಆದ್ಯತೆ ನೀಡಬೇಕು ಎಂಬ ತತ್ವವಾಗಿದೆ. ಸರಳವಾದ ವಿವರಣೆಗಳು
  ಹೆಚ್ಚಾಗಿ (ಆದರೆ ಯಾವಾಗಲೂ ಅಲ್ಲ) ಸರಿಯಾಗಿರುತ್ತವೆ.

one_liner: ಸಾಕ್ಷ್ಯಕ್ಕೆ ಹೊಂದಿಕೆಯಾಗುವ ಸರಳವಾದ ವಿವರಣೆಗೆ ಆದ್ಯತೆ ನೀಡಿ.

try_this:
  - ಸಿದ್ಧಾಂತಗಳನ್ನು ಹೋಲಿಸುವಾಗ, ಹೀಗೆ ಕೇಳಿ: ಯಾವುದಕ್ಕೆ ಕಡಿಮೆ ಊಹೆಗಳಿವೆ?
  - ಸಾಕ್ಷ್ಯವು ಒತ್ತಾಯಿಸದ ಹೊರತು ಸಂಕೀರ್ಣತೆಯನ್ನು ಸೇರಿಸಬೇಡಿ.
  - ನೀವು ಸರಳವಾದ ವಿವರಣೆಯ ಬದಲು ಕ್ಲಿಷ್ಟಕರವಾದ ವಿವರಣೆಗೆ ಆದ್ಯತೆ ನೀಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಅನಗತ್ಯ ಸಂಕೀರ್ಣತೆಯನ್ನು ಸೇರಿಸುತ್ತಿದ್ದೇನೆ?
  - ಈ ಮಟ್ಟದ ವಿವರಣೆಗೆ ಸಾಕ್ಷ್ಯ ಬೇಕಾಗಿದೆಯೇ?

in_more_detail: |
  ವಿಲಿಯಂ ಆಫ್ ಓಕ್'ಹ್ಯಾಮ್ ಹೆಸರಿಡಲಾದ ಈ ತತ್ವವು ಸರಳವಾದ ವಿವರಣೆಗಳು
  ಯಾವಾಗಲೂ ನಿಜ ಎಂದು ಹೇಳುವುದಿಲ್ಲ. ಇದು ಸಾಕ್ಷ್ಯವಿಲ್ಲದೆ ಅನಗತ್ಯ ಸಂಕೀರ್ಣತೆಯನ್ನು
  ಸೇರಿಸಬಾರದು ಎಂದು ಸೂಚಿಸುತ್ತದೆ. ಎರಡು ಸಿದ್ಧಾಂತಗಳು ಒಂದೇ ವಿದ್ಯಮಾನಗಳನ್ನು ವಿವರಿಸಿದರೆ,
  ಸಾಕ್ಷ್ಯವು ಬೇರೆ ರೀತಿ ಸೂಚಿಸುವವರೆಗೆ ಸರಳವಾದದ್ದು ಉತ್ತಮ.

  ಓಕಂ'ಸ್ ರೇಜರ್ ಒಂದು ಮಾರ್ಗದರ್ಶಿಯಾಗಿದೆ, ನಿಯಮವಲ್ಲ. ಕೆಲವೊಮ್ಮೆ ಸರಿಯಾದ ವಿವರಣೆ
  ಸಂಕೀರ್ಣವಾಗಿರುತ್ತದೆ. ಆದರೆ ಇದು ಅತಿಯಾದ ಹೊಂದಾಣಿಕೆ, ಷಡ್ಯಂತ್ರದ ಚಿಂತನೆ ಮತ್ತು
  ಅನಗತ್ಯ ಸಂಕೀರ್ಣತೆಯನ್ನು ತಡೆಯುತ್ತದೆ. ಇದು ವಿವರಣೆಯಲ್ಲಿ ಸರಳತೆಗೆ ಆದ್ಯತೆ ನೀಡುತ್ತದೆ.

why_this_is_important: |
  ಓಕಂ'ಸ್ ರೇಜರ್ ಅನ್ನು ಅನ್ವಯಿಸುವುದರಿಂದ ಸಮಸ್ಯೆ-ಪರಿಹಾರ ಸುಧಾರಿಸುತ್ತದೆ, ಮಾದರಿಗಳಲ್ಲಿ
  ಅತಿಯಾದ ಹೊಂದಾಣಿಕೆ ಕಡಿಮೆಯಾಗುತ್ತದೆ ಮತ್ತು ನೀವು ಕ್ಲಿಷ್ಟಕರವಾದ ಆದರೆ ಬೆಂಬಲವಿಲ್ಲದ
  ಸಿದ್ಧಾಂತಗಳನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಸಾಕ್ಷ್ಯ ಅಸ್ಪಷ್ಟವಾಗಿರುವಾಗ ಇದು ಉಪಯುಕ್ತ
  ಡಿಫಾಲ್ಟ್ ಆಗಿದೆ.

when_to_use:
  - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಕಲಿಕೆ
  - ಅಪಾಯ_ಅಂದಾಜು

how_can_you_spot_it:
  unnecessary_complexity: |
    ಒಂದು ವಿವರಣೆಯು ಕಡಿಮೆ ಊಹೆಗಳು ಸಾಕು ಎಂದಿರುವಾಗ ಅನೇಕ ಊಹೆಗಳನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ.
  conspiracy_tendencies: |
    ಸರಳ ಕಾರಣಗಳಿರುವ ಘಟನೆಗಳಿಗೆ ಸಂಕೀರ್ಣ, ಬಹು-ಪಾತ್ರದ ವಿವರಣೆಗಳು.
  overfitting: |
    ಹಿಂದಿನ ಡೇಟಾವನ್ನು ಪರಿಪೂರ್ಣವಾಗಿ ವಿವರಿಸುವ ಆದರೆ ಹೊಸ ಡೇಟಾದಲ್ಲಿ ವಿಫಲವಾಗುವ ಮಾದರಿ
    ಅಥವಾ ಸಿದ್ಧಾಂತ.
  elegance_in_explanation: |
    ಅತ್ಯುತ್ತಮ ವಿವರಣೆಗಳು ಸಾಮಾನ್ಯವಾಗಿ ಹಿಂತಿರುಗಿ ನೋಡಿದಾಗ "ಸ್ಪಷ್ಟ"ವೆಂದು
    ಅನಿಸುತ್ತದೆ.

examples:
  debugging: |
    ಒಂದು ದೋಷ ಸಂಭವಿಸಿದಾಗ, ವಾಸ್ತುಶಿಲ್ಪದ ಸಮಸ್ಯೆಗಳನ್ನು ಊಹಿಸುವ ಮೊದಲು ಸರಳವಾದ
    ಕಾರಣಗಳನ್ನು (ಉದಾ., ಟೈಪೊ, ತಪ್ಪಾದ ಕಾನ್ಫಿಗರೇಶನ್) ಪರಿಶೀಲಿಸಿ.
  conspiracy_theories: |
    "ಸರ್ಕಾರವು X ಅನ್ನು ಆಯೋಜಿಸಿದೆ" ಎಂದರೆ ಅನೇಕ ಗುಪ್ತ ಪಾತ್ರಗಳು ಬೇಕಾಗುತ್ತವೆ;
    "ಕೆಲವು ಜನರು ತಪ್ಪು ಮಾಡಿದ್ದಾರೆ" ಎಂಬುದು ಸರಳವಾಗಿದೆ.
  product_failure: |
    ಬಳಕೆದಾರರು ಒಂದು ವೈಶಿಷ್ಟ್ಯವನ್ನು ಸ್ವೀಕರಿಸುತ್ತಿಲ್ಲ - ಸರಳವಾದ ವಿವರಣೆ: ಅವರು UI ನಿಂದ
    ಗೊಂದಲಕ್ಕೊಳಗಾಗಿದ್ದಾರೆ ಎಂಬುದಲ್ಲ, ಅದು ಅವರ ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸುವುದಿಲ್ಲ.
  medical_diagnosis: |
    "ಸಾಮಾನ್ಯ ವಿಷಯಗಳು ಸಾಮಾನ್ಯ" - ಅಪರೂಪದ ರೋಗನಿರ್ಣಯಗಳಿಗಿಂತ ಹೆಚ್ಚಾಗಿ ಸಂಭವಿಸುವ
    ರೋಗನಿರ್ಣಯಗಳನ್ನು ಪರಿಗಣಿಸಿ.

real_world_implications: |
  ಓಕಂ'ಸ್ ರೇಜರ್ ವೈಜ್ಞಾನಿಕ ವಿಚಾರಣೆ, ಎಂಜಿನಿಯರಿಂಗ್ ಮತ್ತು ದೈನಂದಿನ ತಾರ್ಕಿಕತೆಯನ್ನು
  ಮಾರ್ಗದರ್ಶಿಸುತ್ತದೆ. ಇದು ಕ್ಲಿಷ್ಟಕರವಾದ ತಪ್ಪು ಸಿದ್ಧಾಂತಗಳ ಮೇಲೆ ವ್ಯರ್ಥವಾಗುವ
  ಪ್ರಯತ್ನವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ. ತಪ್ಪಾಗಿ ಅನ್ವಯಿಸಿದರೆ, ಇದು ನಿಜವಾಗಿಯೂ ಸಂಕೀರ್ಣ
  ವಿದ್ಯಮಾನಗಳನ್ನು ತಿರಸ್ಕರಿಸಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅರ್ಥೈಸುವಾಗ, ದುರುದ್ದೇಶ ಅಥವಾ ಸಂಕೀರ್ಣ ಉದ್ದೇಶಗಳನ್ನು
    ಊಹಿಸುವ ಮೊದಲು ಸರಳವಾದ ವಿವರಣೆಗಳಿಗೆ (ಅವರು തിരೆಯಾಗಿದ್ದಾರೆ, ಅವರು ಮರೆತಿದ್ದಾರೆ)
    ಆದ್ಯತೆ ನೀಡಿ.
  collaborative_learning_initiative: |
    ಸಮಸ್ಯೆ-ಪರಿಹಾರ ಅಧಿವೇಶನಗಳಲ್ಲಿ, ಸಂಕೀರ್ಣ ಮಾದರಿಗಳನ್ನು ನಿರ್ಮಿಸುವ ಮೊದಲು "ಸರಳವಾದ
    ವಿವರಣೆ ಯಾವುದು?" ಎಂದು ಸ್ಪಷ್ಟವಾಗಿ ಕೇಳಿ.

how_can_this_be_misapplied:
  oversimplification: |
    "ಅತಿಯಾದ ಸಂಕೀರ್ಣ" ಎಂದು ಹೇಳಿ ನಿಜವಾದ ಸಂಕೀರ್ಣ ವಿವರಣೆಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  status_quo_bias: |
    ಪರಿಚಿತ ವಿವರಣೆಗಳಿಗೆ, ಹೊಸ ಆದರೆ ಸರಿಯಾದ ವಿವರಣೆಗಳಿಗಿಂತ ಓಕಂ'ಸ್ ರೇಜರ್ ಬಳಸಿ ಆದ್ಯತೆ
    ನೀಡುವುದು.
  scientific_rigidity: |
    ಹೊಸ ಸಿದ್ಧಾಂತಗಳು ಹೆಚ್ಚು ಸಂಕೀರ್ಣವಾಗಿವೆ ಎಂಬ ಕಾರಣಕ್ಕಾಗಿ, ಸಾಕ್ಷ್ಯವು ಬೆಂಬಲಿಸಿದರೂ
    ಅವುಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  missing_nuance: |
    ಕೆಲವು ಕ್ಷೇತ್ರಗಳು (ಉದಾ., ಮಾನವ ನಡವಳಿಕೆ, ಪರಿಸರ ವ್ಯವಸ್ಥೆಗಳು) ಅಂತರ್ಗತವಾಗಿ
    ಸಂಕೀರ್ಣವಾಗಿರುತ್ತವೆ; ಸರಳತೆ ತಪ್ಪು ದಾರಿಗೆಳೆಯಬಹುದು.

