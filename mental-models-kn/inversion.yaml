# Inversion
# Mental Model / Cognitive Bias - Example Entry

id: inversion
name: ವಿಲೋಮ (Inversion)

quick_introduction: |
  ವಿಲೋಮವು (Inversion) ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸುವ ಒಂದು ತಂತ್ರವಾಗಿದ್ದು, ಇದು ಪ್ರಶ್ನೆಯನ್ನು ತಲೆಕೆಳಗಾಗಿ ತಿರುಗಿಸುತ್ತದೆ. "ನಾನು ಹೇಗೆ ಯಶಸ್ವಿಯಾಗಲಿ?" ಎಂದು ಕೇಳುವ ಬದಲು, ನೀವು "ನನ್ನನ್ನು ವಿಫಲಗೊಳಿಸುವುದು ಯಾವುದು?" ಎಂದು ಕೇಳಿ, ಆ ವಿಷಯಗಳನ್ನು ತಪ್ಪಿಸಿ. ಇದು ಮುಂದೆ ಯೋಚಿಸುವಿಕೆಯು ಆಗಾಗ್ಗೆ ತಪ್ಪಿಸಿಕೊಳ್ಳುವ ಅಪಾಯಗಳು ಮತ್ತು ವಿರೋಧಾಭಾಸಗಳನ್ನು ಮೇಲಕ್ಕೆ ತರುತ್ತದೆ.

one_liner: ವಿಲೋಮಿಸಿ - ನಿಮ್ಮನ್ನು ಯಾವುದು ವಿಫಲಗೊಳಿಸುತ್ತದೆ ಎಂದು ಕೇಳಿ, ನಂತರ ಆ ವಿಷಯಗಳನ್ನು ತಪ್ಪಿಸಿ.

try_this:
  - ಯಾವುದೇ ಗುರಿಗಾಗಿ, ನೀವು ವಿಫಲಗೊಳ್ಳಬಹುದಾದ ಮುಖ್ಯ ಮಾರ್ಗಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ - ನಂತರ ಅವುಗಳನ್ನು ತಪ್ಪಿಸಿ.
  - ಋಣಾತ್ಮಕ ದೃಶ್ಯೀಕರಣವನ್ನು ಬಳಸಿ: ಇದು ಯಾಕೆ ತಪ್ಪು ಹೋಗಬಹುದು?
  - ಕೇಳಿ: ಇದನ್ನು ಹಾಳುಮಾಡಲು ಬುದ್ಧಿವಂತ ವ್ಯಕ್ತಿ ಏನು ಮಾಡಬಹುದು?

ask_yourself:
  - ಇದು ಯಾಕೆ ವಿಫಲಗೊಳ್ಳಬಹುದು ಎಂಬುದರ ಬಗ್ಗೆ ನಾನು ಯೋಚಿಸಿದ್ದೇನೆಯೇ?
  - ಮುಂದೆ ಮಾತ್ರ ಯೋಚಿಸುವ ಮೂಲಕ ನಾನು ಏನು ನೋಡುತ್ತಿಲ್ಲ?

in_more_detail: |
  ಚಾರ್ಲಿ ಮಂಗರ್ (Charlie Munger) ರವರಿಂದ ಜನಪ್ರಿಯಗೊಂಡ ಮತ್ತು ಗಣಿತದ ತರ್ಕದಲ್ಲಿ ಬೇರೂರಿರುವ ವಿಲೋಮವು, ಯಶಸ್ಸನ್ನು ಸಾಧಿಸುವುದಕ್ಕಿಂತ ವೈಫಲ್ಯವನ್ನು ತಪ್ಪಿಸುವುದು ಆಗಾಗ್ಗೆ ಸುಲಭ ಎಂಬ ಸಂಗತಿಯನ್ನು ಬಳಸಿಕೊಳ್ಳುತ್ತದೆ. ಒಂದು ವಿಷಯ ಯಾಕೆ ತಪ್ಪು ಹೋಗುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಗುರುತಿಸಬಹುದಾದರೆ, ನೀವು ಅವುಗಳನ್ನು ವ್ಯವಸ್ಥಿತವಾಗಿ ತೆಗೆದುಹಾಕಬಹುದು.

  ಕಾರ್ಲ್ ಜಾಕೋಬಿ (Carl Jacobi) ಹೇಳಿದರಂತೆ, "ವಿಲೋಮಿಸಿ, ಯಾವಾಗಲೂ ವಿಲೋಮಿಸಿ." ಸ್ಟೋಯಿಕ್ಸ್ (Stoics) ತಮ್ಮ ಬಳಿ ಇದ್ದದ್ದನ್ನು ಮೆಚ್ಚಲು ಮತ್ತು ಪ್ರತಿಕೂಲತೆಗೆ ಸಿದ್ಧರಾಗಲು ಋಣಾತ್ಮಕ ದೃಶ್ಯೀಕರಣವನ್ನು - ನಷ್ಟವನ್ನು ಊಹಿಸಿಕೊಳ್ಳುವುದು - ಬಳಸಿದರು. ವಿಲೋಮವು ನಿರಾಶಾವಾದವಲ್ಲ; ಇದು ಅಡೆತಡೆಗಳನ್ನು ನಿವಾರಿಸುವ ಮೂಲಕ ಪ್ರಗತಿ ಸಾಧಿಸಲು ಒಂದು ರಚನಾತ್ಮಕ ಮಾರ್ಗವಾಗಿದೆ.

why_this_is_important: |
  ವಿಲೋಮವು ನಿಮಗೆ ವಿಪತ್ತು ಎದುರಾಗುವ ತಪ್ಪುಗಳನ್ನು ತಪ್ಪಿಸಲು, ಯೋಜನೆಗಳನ್ನು ಒತ್ತಡ ಪರೀಕ್ಷಿಸಲು ಮತ್ತು ಸ್ಪಷ್ಟವಲ್ಲದ ಪರಿಹಾರಗಳನ್ನು ಕಂಡುಹಿಡಿಯಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ವಿಫಲತೆಯ ನಿರ್ಣಾಯಕ ವಿಧಾನಗಳನ್ನು ಕಡೆಗಣಿಸದಂತೆ ಖಚಿತಪಡಿಸಿಕೊಳ್ಳುವ ಮೂಲಕ ಮುಂದಿನ ಯೋಜನೆಯನ್ನು ಪೂರಕಗೊಳಿಸುತ್ತದೆ.

when_to_use:
  - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ (problem_solving)
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ (decision_making)
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ (risk_assessment)
  - ವೃತ್ತಿ_ಜೀವನದ_ಚಲನೆಗಳು (career_moves)

how_can_you_spot_it:
  premortem_thinking: |
    ಯಾವುದೇ ಪ್ರಾಜೆಕ್ಟ್ ಪ್ರಾರಂಭಿಸುವ ಮೊದಲು, ಅದು ಈಗಾಗಲೇ ವಿಫಲವಾಗಿದೆ ಎಂದು ಊಹಿಸಿ "ಇದು ಏಕೆ ವಿಫಲವಾಯಿತು?" ಎಂದು ಕೇಳಿ.
  anti_goals: |
    ನೀವು ಸಾಧಿಸಲು ಬಯಸುವುದನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸುವಂತೆ, ನೀವು ತಪ್ಪಿಸಲು ಬಯಸುವುದನ್ನು ವ್ಯಾಖ್ಯಾನಿಸುವುದು.
  reverse_engineering_failure: |
    ಯಶಸ್ಸುಗಳ ಅಧ್ಯಯನ ಮಾತ್ರ ಮಾಡದೆ, ಪಾಠಗಳನ್ನು ಹೊರತೆಗೆಯಲು ವಿಫಲವಾದ ಪ್ರಕರಣಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡುವುದು.
  constraint_focus: |
    ಲಾಭವನ್ನು ಆಪ್ಟಿಮೈಸ್ ಮಾಡುವ ಮೊದಲು ನಿರ್ಬಂಧಗಳು ಮತ್ತು ಅಡೆತಡೆಗಳನ್ನು ಗುರುತಿಸುವುದು.

examples:
  investing: |
    "ಈ ಷೇರು ಬೆಲೆ ಏರಲು ಏನು ಕಾರಣವಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುವ ಬದಲು, "ನಾನು ಹಣವನ್ನು ಕಳೆದುಕೊಳ್ಳಲು ಏನು ಕಾರಣವಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳಿ, ಮತ್ತು ಆ ಸಂದರ್ಭಗಳನ್ನು ತಪ್ಪಿಸಿ.
  career: |
    "ನನ್ನ ಖ್ಯಾತಿಯನ್ನು ಯಾವುದು ಹಾಳು ಮಾಡುತ್ತದೆ?" ಎಂಬುದು ತಪ್ಪಿಸಬೇಕಾದ ನಡತೆಗಳ ಪಟ್ಟಿಯನ್ನು ನೀಡುತ್ತದೆ.
  product_launch: |
    "ಹೆಚ್ಚಿನ ಉತ್ಪನ್ನ ಬಿಡುಗಡೆಗಳು ಏಕೆ ವಿಫಲವಾಗುತ್ತವೆ?" ಎಂಬುದು ಬಿಡುಗಡೆಗೂ ಮೊದಲು ಪರಿಹರಿಸಬೇಕಾದ ಅಪಾಯಗಳನ್ನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ.
  health: |
    "ಯಾವ ಅಭ್ಯಾಸಗಳು ಜೀವಿತಾವಧಿಯನ್ನು ಕಡಿಮೆಗೊಳಿಸುತ್ತವೆ?" ಎಂಬುದು "ನನ್ನನ್ನು ಆರೋಗ್ಯವಾಗಿಡುವುದು ಯಾವುದು?" ಎಂಬುದಕ್ಕಿಂತ ಸ್ಪಷ್ಟವಾದ ತಪ್ಪಿಸುವ ಪಟ್ಟಿಯನ್ನು ನೀಡುತ್ತದೆ.

real_world_implications: |
  ವಿಲೋಮವು ಎಂಜಿನಿಯರಿಂಗ್ (ವೈಫಲ್ಯ ಮೋಡ್ ವಿಶ್ಲೇಷಣೆ), ಹೂಡಿಕೆ ಮತ್ತು ಕಾರ್ಯತಂತ್ರಗಳಲ್ಲಿ ಬಳಸಲಾಗುತ್ತದೆ. ಇದು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಮತ್ತು ಅಪಾಯ ನಿರ್ವಹಣೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ. ಅತಿಯಾದ ಅವಲಂಬನೆಯು ಅಧಿಕ ಎಚ್ಚರಿಕೆಗೆ ಕಾರಣವಾಗಬಹುದು.

professional_application:
  networking_and_relationship_building: |
    "ಈ ಸಂಬಂಧವನ್ನು ಯಾವುದು ಹಾನಿ ಮಾಡುತ್ತದೆ?" ಎಂಬುದು ವಿಶ್ವಾಸವನ್ನು ಮುರಿಯುವ ನಡತೆಗಳನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
  collaborative_learning_initiative: |
    ಪ್ರಾಜೆಕ್ಟ್‌ಗಳ ಮೇಲೆ ಪ್ರೀಮೋರ್ಟೆಮ್‌ಗಳನ್ನು (premortems) ನಡೆಸಿ: "ಇದು ವಿಫಲವಾಯಿತು. ಏಕೆ?" ಯೋಜನೆಯನ್ನು ಮತ್ತು ಕಾರ್ಯಗತಗೊಳಿಸುವಿಕೆಯನ್ನು ಸುಧಾರಿಸಲು ಉತ್ತರಗಳನ್ನು ಬಳಸಿ.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    ವೈಫಲ್ಯವನ್ನು ತಪ್ಪಿಸುವ ಮೇಲೆ ಮಾತ್ರ ಗಮನ ಹರಿಸುವುದು ಕ್ರಿಯೆಯನ್ನು ಸ್ಥಗಿತಗೊಳಿಸಬಹುದು ಮತ್ತು ಅಗತ್ಯವಿರುವ ಅಪಾಯಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವುದನ್ನು ತಡೆಯಬಹುದು.
  negativity_bias: |
    ಮುಂದೆ ನೋಡುವ ಅವಕಾಶದ ಗುರುತಿಸುವಿಕೆಯೊಂದಿಗೆ ಸಮತೋಲನವಿಲ್ಲದಿದ್ದರೆ ವಿಲೋಮವು ಋಣಾತ್ಮಕ ಪಕ್ಷಪಾತವನ್ನು ಹೆಚ್ಚಿಸಬಹುದು.
  analysis_paralysis: |
    ವಿಫಲ ಮೋಡ್‌ಗಳ ಮೇಲೆ ಅತಿಯಾದ ಸಮಯವನ್ನು ವ್ಯಯಿಸುವುದರಿಂದ ಎಂದಿಗೂ ಕಾರ್ಯಗತಗೊಳಿಸುವುದಿಲ್ಲ.
  missing_upside: |
    ವಿಲೋಮವು ಏನು ಮಾಡಬೇಕೆಂದು ಹೇಳುವುದಿಲ್ಲ - ಕೇವಲ ಏನು ತಪ್ಪಿಸಬೇಕೆಂದು ಹೇಳುತ್ತದೆ. ನಿಮಗೆ ಇನ್ನೂ ಧನಾತ್ಮಕ ಗುರಿಗಳ ಅಗತ್ಯವಿದೆ.

