# Mere Exposure Effect
# Mental Model / Cognitive Bias - Example Entry

id: mere_exposure_effect
name: ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮ

quick_introduction: |
  ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮವು ನಾವು ಪರಿಚಿತರಾಗಿರುವುದರಿಂದ ವಸ್ತುಗಳ ಕಡೆಗೆ ಒಲವನ್ನು ಬೆಳೆಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಪುನರಾವರ್ತಿತ ಪರಿಚಯವು - ಬಲವರ್ಧನೆ ಇಲ್ಲದಿದ್ದರೂ ಸಹ - ಇಷ್ಟಪಡುವಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ನಮಗೆ ತಿಳಿದಿರುವದನ್ನು ನಾವು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ.

one_liner: ಪರಿಚಿತತೆ ಇಷ್ಟವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ- ನಾವು ಹಿಂದೆ ನೋಡಿದ್ದನ್ನು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ.

try_this:
  - Ask: ನಾನು ಇದನ್ನು ಇಷ್ಟಪಡುತ್ತಿದ್ದೇನೆ ಏಕೆಂದರೆ ಇದು ಒಳ್ಳೆಯದೇ, ಅಥವಾ ಇದು ಪರಿಚಿತವಾದುದರಿಂದ?
  - When evaluating options, correct for exposure—new things start at a disadvantage.
  - Notice when repetition is influencing your preference.

ask_yourself:
  - Am I preferring something mainly because I've seen it before?
  - Would I choose differently if exposure were equal?

in_more_detail: |
  ರಾಬರ್ಟ್ ಝಾಜೋಂಕ್ ತೋರಿಸಿದಂತೆ, ಪುನರಾವರ್ತಿತವಾಗಿ ಪ್ರಚೋದನೆಗಳಿಗೆ (ಮುಖಗಳು, ಪದಗಳು, ಆಕಾರಗಳು) ಒಡ್ಡಿಕೊಳ್ಳುವುದರಿಂದ ಅವುಗಳ ಕಡೆಗೆ ಸಕಾರಾತ್ಮಕ ಭಾವನೆ ಹೆಚ್ಚಾಗುತ್ತದೆ - ನಾವು ಪ್ರಜ್ಞಾಪೂರ್ವಕವಾಗಿ ಪರಿಚಿತರಾಗದಿದ್ದರೂ ಸಹ. ಪರಿಚಿತತೆ ಇಷ್ಟವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ಅಸಹ್ಯವಲ್ಲ (ಅನೇಕ ಸಂದರ್ಭಗಳಲ್ಲಿ). ನಾವು ವಿಶ್ಲೇಷಿಸದಿದ್ದಾಗ ಮತ್ತು ಪರಿಚಯವು ಸೂಕ್ಷ್ಮವಾಗಿದ್ದಾಗ ಪರಿಣಾಮವು ಬಲವಾಗಿರುತ್ತದೆ.

  ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮವು ಬ್ರ್ಯಾಂಡ್ ಆದ್ಯತೆ, ಪರಸ್ಪರ ಆಕರ್ಷಣೆ ಮತ್ತು ಸೌಂದರ್ಯದ ತೀರ್ಪಿನ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಏಕೆ ಪರಿಚಿತ ಸಂಗೀತವನ್ನು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ, ಏಕೆ ಜಾಹೀರಾತು ಪುನರಾವರ್ತನೆಯ ಮೂಲಕ ಕೆಲಸ ಮಾಡುತ್ತದೆ ಮತ್ತು ಏಕೆ ನಾವು ಹಿಂದೆ ನೋಡಿದ ಜನರನ್ನು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ - ಸಂವಹನವಿಲ್ಲದಿದ್ದರೂ ಸಹ, ಇದನ್ನು ವಿವರಿಸುತ್ತದೆ.

why_this_is_important: |
  ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದು ನಿಮ್ಮ ಸ್ವಂತ ಆದ್ಯತೆಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಮತ್ತು ಪುನರಾವರ್ತನೆಯ ಮೂಲಕ ಕುಶಲತೆಯನ್ನು ವಿರೋಧಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಸಂಬಂಧಗಳು ಮತ್ತು ಬ್ರ್ಯಾಂಡ್‌ಗಳಿಗೆ ಗೋಚರತೆ ಮತ್ತು ಉಪಸ್ಥಿತಿಯು ಏಕೆ ಮುಖ್ಯವಾಗಿದೆ ಎಂಬುದನ್ನು ಸಹ ವಿವರಿಸುತ್ತದೆ. ಪರಿಚಿತತೆ ಶಕ್ತಿಯುತವಾದ ಆದರೆ ಆಗಾಗ್ಗೆ ಅಪ್ರಜ್ಞಾಪೂರ್ವಕ ಪ್ರಭಾವವಾಗಿದೆ.

when_to_use:
  - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
  - ನಿರ್ಧಾರ_ಮಾಡುವುದು
  - ನಾಯಕತ್ವ
  - ಕಲಿಕೆ

how_can_you_spot_it:
  familiarity_preference: |
    ಹೊಸ ಆಯ್ಕೆಗಳಿಗಿಂತ ಹಿಂದೆ ನೋಡಿದ ಆಯ್ಕೆಗಳನ್ನು ಆದ್ಯತೆ ನೀಡುವುದು.
  repetition_influence: |
    ಪುನರಾವರ್ತಿತ ಪರಿಚಯವು ಸ್ಪಷ್ಟ ಮನವೊಲಿಕೆ ಇಲ್ಲದೆ ಇಷ್ಟಪಡುವಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.
  unconscious_influence: |
    ಪರಿಚಯದ ಬಗ್ಗೆ ನಮಗೆ ತಿಳಿದಿಲ್ಲದಿದ್ದರೂ ಸಹ ಪರಿಣಾಮವು ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತದೆ.
  brand_recognition: |
    ಏಕೆ ಎಂದು ಹೇಳಲು ಸಾಧ್ಯವಾಗದಿದ್ದರೂ ಸಹ ಪರಿಚಿತ ಬ್ರ್ಯಾಂಡ್‌ಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಲಾಗುತ್ತದೆ.

examples:
  advertising: |
    ಬ್ರ್ಯಾಂಡ್‌ನ ಪುನರಾವರ್ತಿತ ಪರಿಚಯವು ಆದ್ಯತೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ - ಮನವೊಲಿಸುವ ಸಂದೇಶವಿಲ್ಲದಿದ್ದರೂ ಸಹ.
  music: |
    ಮೊದಲ ಬಾರಿ ಕೇಳಿದಾಗ, ಹಿಂದೆ ಕೇಳಿದ ಹಾಡುಗಳು ಹೊಸ ಹಾಡುಗಳಿಗಿಂತ ಹೆಚ್ಚು ಇಷ್ಟವಾಗುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿವೆ.
  people: |
    ನಾವು ಪದೇ ಪದೇ ನೋಡಿದ ಜನರನ್ನು (ಉದಾಹರಣೆಗೆ, ಸಹಪಾಠಿಗಳು, ಸಹೋದ್ಯೋಗಿಗಳು) ಅಪರಿಚಿತರಿಗಿಂತ ಹೆಚ್ಚು ಇಷ್ಟಪಡುತ್ತೇವೆ - ಸಂವಹನವಿಲ್ಲದಿದ್ದರೂ ಸಹ.
  ideas: |
    ನಾವು ಹಿಂದೆ ಎದುರಿಸಿದ ಕಲ್ಪನೆಗಳು ಹೊಸದಕ್ಕಿಂತ ಹೆಚ್ಚು ಆರಾಮದಾಯಕ ಮತ್ತು ನಂಬಲರ್ಹವೆಂದು ಅನಿಸುತ್ತದೆ.

real_world_implications: |
  ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮವು ಗ್ರಾಹಕರ ನಡವಳಿಕೆ, ರಾಜಕೀಯ ಆದ್ಯತೆಗಳು ಮತ್ತು ಸಾಮಾಜಿಕ ಆಕರ್ಷಣೆಯನ್ನು ರೂಪಿಸುತ್ತದೆ. ಇದನ್ನು ಮಾರ್ಕೆಟಿಂಗ್‌ನಲ್ಲಿ ಬಳಸಿಕೊಳ್ಳಲಾಗುತ್ತದೆ ಮತ್ತು ಪರಿಚಿತರಿಗೆ ಅನಿಯಂತ್ರಿತ ಪ್ರಯೋಜನಗಳನ್ನು ಸೃಷ್ಟಿಸಬಹುದು. ಇದು ವೈವಿಧ್ಯಮಯ ಪರಿಚಯ ಏಕೆ ಮುಖ್ಯವಾಗಿದೆ ಎಂಬುದನ್ನು ಸಹ ವಿವರಿಸುತ್ತದೆ - ಭಿನ್ನತೆಯ ಪರಿಚಿತತೆ ಪಕ್ಷಪಾತವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಗೋಚರತೆ ಮುಖ್ಯ. ಕಾಣಿಸಿಕೊಳ್ಳುವುದು, ಉಪಸ್ಥಿತರಾಗಿರುವುದು ಮತ್ತು ಕಾಣಿಸಿಕೊಳ್ಳುವುದು ಇಷ್ಟವನ್ನು ನಿರ್ಮಿಸುವ ಪರಿಚಿತತೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ. ಪುನರಾವರ್ತಿತ ಕಡಿಮೆ-ಬೆಟ್ಟಿಂಗ್ ಸಂಪರ್ಕದ ಮೌಲ್ಯವನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡಬೇಡಿ.
  collaborative_learning_initiative: |
    ಜನರನ್ನು ಪುನರಾವರ್ತಿತವಾಗಿ ವೈವಿಧ್ಯಮಯ ದೃಷ್ಟಿಕೋನಗಳು ಮತ್ತು ಜನರಿಗೆ ಒಡ್ಡಿಕೊಳ್ಳಿ - ಪರಿಚಿತತೆ ಪಕ್ಷಪಾತವನ್ನು ಕಡಿಮೆ ಮಾಡಬಹುದು. ಆದರೆ ಕೇವಲ ಪರಿಚಯವು ಯಥಾಸ್ಥಿತಿಯ ಆದ್ಯತೆಯನ್ನು ಬಲಪಡಿಸಬಹುದು ಎಂಬುದನ್ನು ಅರಿತುಕೊಳ್ಳಿ.

how_can_this_be_misapplied:
  manipulation: |
    ಸಮ್ಮತಿಯಿಲ್ಲದೆ ಆದ್ಯತೆಗಳನ್ನು ಕುಶಲತೆಯಿಂದ ನಿರ್ವಹಿಸಲು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಪುನರಾವರ್ತಿತ ಪರಿಚಯವನ್ನು ಸೃಷ್ಟಿಸುವುದು.
  false_familiarity: |
    ಪರಿಚಿತತೆ ಗುಣಮಟ್ಟಕ್ಕೆ ಸಮನಾಗಿರುತ್ತದೆ ಎಂದು ಊಹಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಹೊಸ ಆಯ್ಕೆಗಳು ಉತ್ತಮವಾಗಿರುತ್ತವೆ.
  exclusion: |
    ಕೆಲವು ಜನರಿಗೆ ಮಾತ್ರ ಪರಿಚಯ ಸಿಕ್ಕಿದರೆ, ಅವರು ಅನಿಯಂತ್ರಿತ ಪ್ರಯೋಜನವನ್ನು ಪಡೆಯುತ್ತಾರೆ. ಯಾರು ಗೋಚರತೆಗೆ ಪ್ರವೇಶವನ್ನು ಹೊಂದಿದ್ದಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ.
  stagnation: |
    ಪರಿಚಿತತೆಯ ಮೇಲೆ ಅತಿಯಾಗಿ ಅವಲಂಬಿಸಿ ಮತ್ತು ಹೊಸ ವಿಷಯಗಳನ್ನು ಎಂದಿಗೂ ಪ್ರಯತ್ನಿಸದಿರುವುದು.

