# Impact Bias
# Mental Model / Cognitive Bias - Example Entry

id: impact_bias
name: ಪ್ರಭಾವ ಪಕ್ಷಪಾತ

quick_introduction: |
  ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಭವಿಷ್ಯದ ಘಟನೆಗಳಿಗೆ ನಮ್ಮ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳ ತೀವ್ರತೆ ಮತ್ತು ಅವಧಿಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಒಳ್ಳೆಯ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ಸಂತೋಷಪಡಿಸುವುದಿಲ್ಲ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಮತ್ತು ಕೆಟ್ಟ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ದುಃಖಿತರನ್ನಾಗಿ ಮಾಡುವುದಿಲ್ಲ. ನಾವು ಭಾವನಾತ್ಮಕ ಮುನ್ಸೂಚನೆಯಲ್ಲಿ ಕೆಟ್ಟವರು.

one_liner: ಘಟನೆಗಳು ನಮ್ಮ ಸಂತೋಷದ ಮೇಲೆ ಎಷ್ಟು ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಮತ್ತು ಎಷ್ಟು ಕಾಲ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.

try_this:
  - Ask: ಹಿಂದಿನ ಇದೇ ರೀತಿಯ ಘಟನೆಗಳ ನಂತರ ನಾನು ಹೇಗೆ ಭಾವಿಸಿದ್ದೆ? ನಾವು ನಿರೀಕ್ಷಿಸಿದ್ದಕ್ಕಿಂತ ವೇಗವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತೇವೆ.
  - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
  - Notice when you're overestimating the lasting effect of a single outcome.

ask_yourself:
  - Am I overestimating how long I'll feel this way?
  - What does past experience say about similar events?

in_more_detail: |
  ಡೇನಿಯಲ್ ಗಿಲ್ಬರ್ಟ್ ಮತ್ತು ಟಿಮೋತಿ ವಿಲ್ಸನ್ ಅವರು ಭಾವನಾತ್ಮಕ ಮುನ್ಸೂಚನೆಯ ಸಂಶೋಧನೆ ನಡೆಸಿದ್ದಾರೆ: ಗೆಲುವಿನ ನಂತರ ನಾವು ಎಷ್ಟು ಕಾಲ ಉತ್ತಮವಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಅಥವಾ ನಷ್ಟದ ನಂತರ ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ನಿರೀಕ್ಷಿಸಿದ್ದಕ್ಕಿಂತ ವೇಗವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತೇವೆ. ನಾವು ಒಂದೇ ಘಟನೆಗಳ ಪ್ರಭಾವವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ - ಒಂದು ಫಲಿತಾಂಶ ನಮ್ಮ ಸಂತೋಷವನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಆದರೆ ಅನೇಕ ಅಂಶಗಳು ಕೊಡುಗೆ ನೀಡುತ್ತವೆ. ನಮ್ಮ ಭವಿಷ್ಯದ ಭಾವನೆಗಳನ್ನು ಊಹಿಸುವಾಗ ನಾವು ತಪ್ಪು ವಿಷಯಗಳ ಮೇಲೆ ಗಮನಹರಿಸುತ್ತೇವೆ.

  ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಪ್ರಮುಖ ಜೀವನ ನಿರ್ಧಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ: ಪದೋನ್ನತಿ, ಸಂಬಂಧ ಅಥವಾ ಖರೀದಿಯು ನಮ್ಮ ಸಂತೋಷವನ್ನು ಎಷ್ಟು ಬದಲಾಯಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ನಷ್ಟಗಳ ಶಾಶ್ವತ ನೋವನ್ನು ಸಹ ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.

why_this_is_important: |
  ಪ್ರಭಾವ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ನಿಮ್ಮ ಜೀವನವನ್ನು ನಿಜವಾಗಿ ಸುಧಾರಿಸುವ ವಿಷಯಗಳ ಬಗ್ಗೆ ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನೀವು ಯೋಚಿಸುವಷ್ಟು ಮಹತ್ವದ್ದಲ್ಲದ ಫಲಿತಾಂಶಗಳಲ್ಲಿ ಅತಿಯಾದ ಹೂಡಿಕೆಯನ್ನು ಇದು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ, ಮತ್ತು ನೀವು ನಿರೀಕ್ಷಿಸುವಷ್ಟು ಕಾಲ ನೋಯಿಸದ ಫಲಿತಾಂಶಗಳ ಭಯವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ವೃತ್ತಿ_ಬದಲಾವಣೆಗಳು
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
  - ಸಂಬಂಧ_ನಿರ್ಮಾಣ

how_can_you_spot_it:
  overestimated_impact: |
    "This will change everything" when similar past events had modest
    lasting impact.
  duration_overestimation: |
    "I'll never get over this" when we typically adapt faster than
    we expect.
  focalism: |
    Focusing on one event and ignoring other factors that affect
    well-being.
  adaptation_neglect: |
    Forgetting that we adapt to both good and bad circumstances.

examples:
  career: |
    "If I get this promotion, I'll be so much happier" when past
    promotions had temporary impact.
  purchases: |
    "This car will make me happy" when the novelty wears off quickly.
  loss: |
    "I'll never recover from this rejection" when we typically
    adapt within months.
  events: |
    Overestimating how much a wedding, vacation, or milestone will
    affect long-term happiness.

real_world_implications: |
  ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಹಣ, ವೃತ್ತಿ ಮತ್ತು ಸಂಬಂಧಗಳ ಬಗ್ಗೆ ಕಳಪೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ನಾವು ನಾವು ಹೊಂದಿಕೊಳ್ಳುವ ಅನುಭವಗಳಿಗೆ ಅತಿಯಾಗಿ ಪಾವತಿಸುತ್ತೇವೆ ಮತ್ತು ನಾವು ಚೇತರಿಸಿಕೊಳ್ಳುವ ನಷ್ಟಗಳಿಗೆ ಅತಿಯಾಗಿ ಭಯಪಡುತ್ತೇವೆ. ಇದು ನೀತಿ ಮತ್ತು ವೈಯಕ್ತಿಕ ಯೋಜನೆಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    When making career or relationship decisions, consider how you
    felt after similar past events. Did the impact last as long
    as you expected? Use that to calibrate future predictions.
  collaborative_learning_initiative: |
    When teams face setbacks or wins, remind them of adaptation.
    "We'll adapt faster than we think" can reduce both excessive
    celebration and excessive despair.

how_can_this_be_misapplied:
  dismissing_all_impact: |
    Some events do have lasting impact—trauma, major loss. Don't
    dismiss all affective forecasting as biased.
  cold_rationality: |
    "It won't matter" when the experience in the moment does matter.
  undervaluing_experiences: |
    Avoiding positive experiences because "we'll adapt anyway."
  invalidating_emotions: |
    Telling people their feelings will pass when they need support
    in the moment.

