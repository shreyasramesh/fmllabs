# ಹಾಲೊ ಎಫೆಕ್ಟ್
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: halo_effect
name: ಹಾಲೊ ಎಫೆಕ್ಟ್

quick_introduction: |
  ಹಾಲೊ ಎಫೆಕ್ಟ್ ಎಂದರೆ ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣ ಅಥವಾ ಗ್ರಹಿಕೆ
  ಅವರ ಬಗ್ಗೆ ನಮ್ಮ ಒಟ್ಟಾರೆ ನಿರ್ಣಯದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರಲು ಬಿಡುವುದು.
  ನಮಗೆ ಒಬ್ಬರ ನೋಟ ಇಷ್ಟವಾದರೆ, ಅವರು ಸಮರ್ಥರು ಎಂದು ನಾವು ಊಹಿಸಬಹುದು.
  ಒಂದು ಕೌಶಲ್ಯವನ್ನು ಮೆಚ್ಚಿದರೆ, ಅವರು ಎಲ್ಲದರಲ್ಲೂ ಉತ್ತಮರೆಂದು ಊಹಿಸುತ್ತೇವೆ.
  ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ಉಳಿದವುಗಳ ಮೇಲೆ "ಹಾಲೊ"ವನ್ನು ಬೀರುತ್ತದೆ.

one_liner: ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ವ್ಯಕ್ತಿಯ ನಮ್ಮ ಒಟ್ಟಾರೆ ನಿರ್ಣಯದ ಮೇಲೆ ಒಂದು ಹಾಲೊವನ್ನು ಬೀರುತ್ತದೆ.

try_this:
  - ಗುಣಲಕ್ಷಣಗಳನ್ನು ಸ್ವತಂತ್ರವಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡಿ—ಒಂದು ಬಲವು ಇತರರನ್ನು ಸೂಚಿಸಲು ಬಿಡಬೇಡಿ.
  - ಆಕರ್ಷಣೆ, ಚಾರ್ಮ್, ಅಥವಾ ಒಂದು ಯಶಸ್ಸು ನಿಮ್ಮ ನೋಟವನ್ನು ಹೇಗೆ ಬಣ್ಣಿಸುತ್ತಿದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
  - ಕೇಳಿ: ಆ ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವಿಲ್ಲದೆ ನಾನು ಈ ವ್ಯಕ್ತಿಯನ್ನು ಅದೇ ರೀತಿ ನಿರ್ಣಯಿಸುತ್ತಿದ್ದೆನೇ?

ask_yourself:
  - ನಾನು ಒಂದು ಗುಣದಿಂದ ಇಡೀ ವ್ಯಕ್ತಿಗೆ ಸಾಮಾನ್ಯೀಕರಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನಾನು ಒಂದು ಬಲದಿಂದ ಪ್ರಭಾವಿತನಾಗದಿದ್ದರೆ ನಾನು ದೌರ್ಬಲ್ಯಗಳನ್ನು ನೋಡುತ್ತಿದ್ದನೇ?

in_more_detail: |
  ಎಡ್ವರ್ಡ್ ಥೋರ್ನ್‌ಡೈಕ್ ಗಮನಿಸಿದರು, ಒಬ್ಬ ಸೈನಿಕನ ಮೇಲೆ ಒಂದು ಗುಣದಲ್ಲಿ
  ಹೆಚ್ಚು ಅಂಕ ನೀಡಿದ ಅಧಿಕಾರಿಗಳು, ಇತರ—ಸಂಬಂಧವಿಲ್ಲದ ಗುಣಗಳ ಮೇಲೂ—ಹೆಚ್ಚು ಅಂಕ
  ನೀಡಲು ಒಲವು ತೋರಿಸುತ್ತಿದ್ದರು. ನಾವು ನಿರ್ದಿಷ್ಟದಿಂದ ಒಟ್ಟಾರೆಯಾಗಿ ಸಾಮಾನ್ಯೀಕರಿಸುತ್ತೇವೆ.
  ಆಕರ್ಷಣೆ, ಚಾರ್ಮ್, ಅಥವಾ ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿನ ಯಶಸ್ಸು ಹಾಲೊವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ, ಅದು
  ಹರಡುತ್ತದೆ.

  ವಿರುದ್ಧವಾದುದು—ಒಂದು ನಕಾರಾತ್ಮಕ ಗುಣವು ಎಲ್ಲವನ್ನೂ ಬಣ್ಣಿಸುವುದು—ಇದನ್ನು ಕೆಲವೊಮ್ಮೆ
  "ಹಾರ್ನ್ ಎಫೆಕ್ಟ್" ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಇವೆರಡೂ ಅನಗತ್ಯ ಸಾಮಾನ್ಯೀಕರಣದ ರೂಪಗಳಾಗಿವೆ.
  ಹಾಲೊ ಎಫೆಕ್ಟ್ ನೇಮಕಾತಿ, ಕಾರ್ಯಕ್ಷಮತೆ ವಿಮರ್ಶೆಗಳು, ಮತ್ತು ದೈನಂದಿನ
  ಗ್ರಹಿಕೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.

why_this_is_important: |
  ಹಾಲೊ ಎಫೆಕ್ಟ್ ಅನ್ನು ಗುರುತಿಸುವುದು ಹೆಚ್ಚು ನಿಖರವಾದ ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಮಾಡಲು
  ಮತ್ತು ಅತಿಯಾಗಿ ಸಾಮಾನ್ಯೀಕರಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
  ಇದು ನ್ಯಾಯಯುತ ನೇಮಕಾತಿ, ಕಾರ್ಯಕ್ಷಮತೆ ನಿರ್ವಹಣೆ, ಮತ್ತು ಸಂಬಂಧಗಳ
  ಮೌಲ್ಯಮಾಪನಕ್ಕೆ ಅತ್ಯಗತ್ಯ. ಒಂದು ಬಲವು ಎಲ್ಲ ಬಲಗಳನ್ನು ಸೂಚಿಸುವುದಿಲ್ಲ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ನಾಯಕತ್ವ
  - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
  - ನೇಮಕಾತಿ

how_can_you_spot_it:
  trait_spillover: |
    ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ಸಂಬಂಧವಿಲ್ಲದ ಗುಣಗಳ ನಿರ್ಣಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
  attractiveness_bias: |
    ಆಕರ್ಷಕ ವ್ಯಕ್ತಿಗಳನ್ನು ಸಮರ್ಥತೆ, ವಿಶ್ವಾಸಾರ್ಹತೆ ಇತ್ಯಾದಿಗಳಲ್ಲಿ ಹೆಚ್ಚು ರೇಟ್ ಮಾಡಲಾಗುತ್ತದೆ.
  success_generalization: |
    ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿನ ಯಶಸ್ಸು ಇತರರಲ್ಲಿ ಊಹಿಸಿದ ಸಮರ್ಥತೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
  first_impression_dominance: |
    ಆರಂಭಿಕ ಸಕಾರಾತ್ಮಕ ಗ್ರಹಿಕೆಯು ನಂತರದ ಎಲ್ಲಾ ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಬಣ್ಣಿಸುತ್ತದೆ.

examples:
  hiring: |
    ಒಬ್ಬ ಅಭ್ಯರ್ಥಿಯು ಮಾತಾಡಲು ಚೆನ್ನಾಗಿದ್ದು ಮತ್ತು ಇಷ್ಟವಾಗುವಂತವನಾಗಿದ್ದರೆ,
    ಅವನು ತಾಂತ್ರಿಕವಾಗಿ ಬಲಶಾಲಿ ಎಂದು ಊಹಿಸಲಾಗುತ್ತದೆ—ಅವು ಕೌಶಲ್ಯಗಳು
    ಸಂಬಂಧವಿಲ್ಲದಿದ್ದರೂ ಸಹ.
  performance_reviews: |
    ಒಂದು ಅತ್ಯುತ್ತಮ ಯೋಜನೆ ಎಲ್ಲಾ ಆಯಾಮಗಳಲ್ಲಿ ಉನ್ನತ ರೇಟಿಂಗ್‌ಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
  politics: |
    ಒಬ್ಬ ರಾಜಕಾರಣಿಯ ಚಾರ್ಮ್ ನೀತಿಯ ಮೇಲೆ ಸಮರ್ಥತೆಯ ಊಹೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
  branding: |
    ಒಂದು ಉತ್ಪನ್ನದಲ್ಲಿನ ಕಂಪನಿಯ ಯಶಸ್ಸು ಎಲ್ಲಾ ಉತ್ಪನ್ನಗಳ ಗುಣಮಟ್ಟದ
    ಊಹೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

real_world_implications: |
  ಹಾಲೊ ಎಫೆಕ್ಟ್ ನೇಮಕಾತಿ, ಕಾರ್ಯಕ್ಷಮತೆ ಮೌಲ್ಯಮಾಪನ, ಮತ್ತು
  ಹೂಡಿಕೆ ನಿರ್ಧಾರಗಳನ್ನು ವಿಕೃತಗೊಳಿಸುತ್ತದೆ. ಇದು ಆಕರ್ಷಕ, ಮಾತಾಡಲು ಚೆನ್ನಾಗಿರುವ,
  ಮತ್ತು ಈಗಾಗಲೇ ಯಶಸ್ವಿಯಾದವರಿಗೆ ಅನುಕೂಲ ಮಾಡಿಕೊಡುತ್ತದೆ. ಇದನ್ನು ಕಡಿಮೆ ಮಾಡಲು
  ರಚನಾತ್ಮಕ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು ಆಯಾಮಗಳ ಪ್ರತ್ಯೇಕತೆ ಅಗತ್ಯ.

professional_application:
  networking_and_relationship_building: |
    ಒಟ್ಟಾರೆ ಗ್ರಹಿಕೆಯ ಬದಲಿಗೆ ನಿರ್ದಿಷ್ಟ ಆಯಾಮಗಳ ಮೇಲೆ ವ್ಯಕ್ತಿಗಳನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡಿ.
    ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ಇತರರ ಬಗ್ಗೆ ನಿಮ್ಮ ನಿರ್ಣಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತಿದೆ
    ಎಂದು ಗಮನಿಸಿ. ವಿರೋಧಿಸುವ ಪುರಾವೆಗಳನ್ನು ಹುಡುಕಿ.
  collaborative_learning_initiative: |
    ರಚನಾತ್ಮಕ ಸಂದರ್ಶನಗಳು ಮತ್ತು ಆಯಾಮಗಳನ್ನು ಸ್ವತಂತ್ರವಾಗಿ ರೇಟ್ ಮಾಡುವ
    ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಬಳಸಿ. ಮೌಲ್ಯಮಾಪಕರಲ್ಲಿ ರೇಟಿಂಗ್‌ಗಳನ್ನು ಸರಿಹೊಂದಿಸಿ.
    ಒಟ್ಟಾರೆ "ಒಳನೋಟ"ದ ಮೇಲಿನ ಅವಲಂಬನೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಿ.

how_can_this_be_misapplied:
  dismissing_all_positive_impressions: |
    ಪ್ರತಿಯೊಂದು ಸಕಾರಾತ್ಮಕ ಗ್ರಹಿಕೆಯೂ ಹಾಲೊ ಅಲ್ಲ—ಕೆಲವೊಮ್ಮೆ ಜನರು ನಿಜವಾಗಿಯೂ
    ವಿವಿಧ ಆಯಾಮಗಳಲ್ಲಿ ಬಲಶಾಲಿಗಳಾಗಿರುತ್ತಾರೆ.
  false_objectivity: |
    ಹಾಲೊ ಎಫೆಕ್ಟ್ ಅನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ನಿವಾರಿಸಬಹುದು ಎಂದು ಊಹಿಸುವುದು—ಇದು
    ವ್ಯಾಪಕವಾಗಿದೆ ಮತ್ತು ಅರೆ-ಸ್ವಯಂಚಾಲಿತವಾಗಿದೆ.
  overcorrection: |
    ವಿರುದ್ಧ ತುದಿಗೆ ಹೋಗಿ ಆಕರ್ಷಕ ಅಥವಾ ಚಾರ್ಮ್‌ಮಯ ವ್ಯಕ್ತಿಗಳು
    ಕಡಿಮೆ ಸಮರ್ಥರಿದ್ದಾರೆ ಎಂದು ಊಹಿಸುವುದು.
  stereotyping: |
    ಮಾನ್ಯ ಸಕಾರಾತ್ಮಕ ಗುಣಗಳನ್ನು ತಳ್ಳಿಹಾಕಲು "ಹಾಲೊ ಎಫೆಕ್ಟ್" ಅನ್ನು ಬಳಸುವುದು.

