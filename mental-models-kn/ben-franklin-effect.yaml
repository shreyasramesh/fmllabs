# ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: ben_franklin_effect
name: ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮ

quick_introduction: |
  ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವು ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡಿದ ನಂತರ ಅವರು ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡುತ್ತಾರೆ ಎಂಬ ಮಾನಸಿಕ ವಿದ್ಯಮಾನವಾಗಿದೆ. ನಾವು ಇಷ್ಟಪಡುವ ಜನರಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತೇವೆ ಎಂಬ ಅಂತರ್ಜ್ಞಾನಕ್ಕೆ ವ್ಯತಿರಿಕ್ತವಾಗಿ, ನಾವು ಅನೇಕವೇಳೆ ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ಇಷ್ಟಪಡುತ್ತೇವೆ.

one_liner: ನಾವು ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ಇಷ್ಟಪಡುತ್ತೇವೆ - ನಮ್ಮ ಮನೋಭಾವಗಳು ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಅನುಸರಿಸುತ್ತವೆ.

try_this:
  - ನೀವು ಸಂಬಂಧವನ್ನು ಸುಧಾರಿಸಲು ಬಯಸಿದರೆ, ಸಣ್ಣ ಸಹಾಯವನ್ನು ಕೇಳುವುದನ್ನು ಪರಿಗಣಿಸಿ.
  - ಸಹಾಯ ಮಾಡುವುದು ಯಾರೊಬ್ಬರ ಬಗ್ಗೆ ನಿಮ್ಮ ಭಾವನೆಗಳನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
  - ಸಹಾಯ ಮಾಡಿದ ನಂತರ ಇತರರು ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡಬಹುದು ಎಂಬುದನ್ನು ಅರಿತುಕೊಳ್ಳಿ.

ask_yourself:
  - ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡುವುದು ಅವರ ಬಗ್ಗೆ ನನ್ನ ಭಾವನೆಗಳನ್ನು ಬದಲಾಯಿಸಿದೆಯೇ?
  - ನಾನು ಅವರ ಬಗ್ಗೆ ನನ್ನ ಗೌರವವನ್ನು ಹೆಚ್ಚಿಸುವ ಮೂಲಕ ನನ್ನ ಪ್ರಯತ್ನವನ್ನು ಸಮರ್ಥಿಸಿಕೊಳ್ಳುತ್ತೇನೆಯೇ?

in_more_detail: |
  ಬೆಂಜಮಿನ್ ಫ್ರಾಂಕ್ಲಿನ್ ತಮ್ಮ ಗ್ರಂಥಾಲಯದಿಂದ ಅಪರೂಪದ ಪುಸ್ತಕವನ್ನು ಎರವಲು ಕೇಳುವ ಮೂಲಕ ಎದುರಾಳಿ ಶಾಸಕರನ್ನು ಗೆದ್ದುಕೊಂಡ ಬಗ್ಗೆ ಪ್ರಸಿದ್ಧವಾಗಿ ವಿವರಿಸಿದ್ದಾರೆ. ಆ ವ್ಯಕ್ತಿ ಒಪ್ಪಿಕೊಂಡ ನಂತರ, ಫ್ರಾಂಕ್ಲಿನ್ ಧನ್ಯವಾದ ಹೇಳುವ ಟಿಪ್ಪಣಿಯೊಂದಿಗೆ ಅದನ್ನು ಹಿಂದಿರುಗಿಸಿದರು. ಸಂಬಂಧವು ಗಮನಾರ್ಹವಾಗಿ ಸುಧಾರಿಸಿತು. ನಮ್ಮ ಮನೋಭಾವಗಳು ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಅನುಸರಿಸುತ್ತವೆ ಎಂದು ಈ ಪರಿಣಾಮವು ಸೂಚಿಸುತ್ತದೆ: ನಾವು ಯಾರಿಗಾದರೂ ಸಹಾಯ ಮಾಡಲು ಪ್ರಯತ್ನವನ್ನು ಹೂಡಿದಾಗ, ನಾವು ಅವರ ಬಗ್ಗೆ ನಮ್ಮ ಸಕಾರಾತ್ಮಕ ಗೌರವವನ್ನು ಹೆಚ್ಚಿಸುವ ಮೂಲಕ ಆ ಪ್ರಯತ್ನವನ್ನು ಸಮರ್ಥಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.

  ಅರಿವಿನ ಸಂಘರ್ಷದ ಸಿದ್ಧಾಂತವು ಇದನ್ನು ವಿವರಿಸುತ್ತದೆ: ನಾವು ಇಷ್ಟಪಡದ ಅಥವಾ ತಟಸ್ಥರಾಗಿರುವ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡಿದಾಗ, ನಮ್ಮ ಕ್ರಿಯೆ (ಸಹಾಯ) ಮತ್ತು ನಮ್ಮ ಮನೋಭಾವ (ಅನಿಷ್ಟ) ನಡುವೆ ನಾವು ಉದ್ವಿಗ್ನತೆಯನ್ನು ಅನುಭವಿಸುತ್ತೇವೆ. ಅವರನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡುವುದರ ಮೂಲಕ ಆ ಉದ್ವಿಗ್ನತೆಯನ್ನು ಪರಿಹರಿಸುವುದು, ನಮ್ಮ ಆದ್ಯತೆಗಳ ವಿರುದ್ಧ ನಾವು ಕಾರ್ಯನಿರ್ವಹಿಸಿದ್ದೇವೆ ಎಂದು ಒಪ್ಪಿಕೊಳ್ಳುವುದಕ್ಕಿಂತ ಸುಲಭವಾಗಿದೆ.

why_this_is_important: |
  ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಸಂಬಂಧಗಳನ್ನು ಕಾರ್ಯತಂತ್ರವಾಗಿ ನಿರ್ಮಿಸಲು ಮತ್ತು ನಿಮ್ಮ ಸ್ವಂತ ಭಾವನೆಗಳು ಹಿಂದಿನ ಸಹಾಯಗಳಿಂದ ಪ್ರಭಾವಿತವಾಗಬಹುದು ಎಂಬುದನ್ನು ಗುರುತಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಸಂಬಂಧವನ್ನು ಸುಧಾರಿಸಲು ಪ್ರಯತ್ನಿಸುವಾಗ ಸಣ್ಣ ಸಹಾಯಗಳನ್ನು ಕೇಳುವುದು ಅವುಗಳನ್ನು ನೀಡುವದಕ್ಕಿಂತ ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿರಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
