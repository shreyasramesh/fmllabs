# Bayes Theorem
# Mental Model / Cognitive Bias - Example Entry

id: bayes_theorem
name: ಬೇಯ್ಸ್ ಪ್ರಮೇಯ

quick_introduction: |
  ಬೇಯ್ಸ್ ಪ್ರಮೇಯವು ಹೊಸ ಪುರಾವೆಗಳು ಬಂದಾಗ ಒಂದು ಊಹೆಯ ಸಂಭವನೀಯತೆಯನ್ನು ಹೇಗೆ ನವೀಕರಿಸಬೇಕು ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ. ನಂಬಿಕೆಗಳು ಪುರಾವೆಗಳು ಅವುಗಳನ್ನು ಎಷ್ಟು ಚೆನ್ನಾಗಿ ಬೆಂಬಲಿಸುತ್ತವೆಯೋ ಅದಕ್ಕೆ ಅನುಗುಣವಾಗಿ ಬದಲಾಗಬೇಕು ಎಂಬ ಕಲ್ಪನೆಯನ್ನು ಇದು ಔಪಚಾರಿಕಗೊಳಿಸುತ್ತದೆ - ಸಂಪೂರ್ಣವಾಗಿ ಅಥವಾ ಏನೂ ಇಲ್ಲ, ಆದರೆ ಹೆಚ್ಚಳವಾಗಿ.

one_liner: ನಂಬಿಕೆಗಳು ಪುರಾವೆಗಳು ಅವುಗಳನ್ನು ಎಷ್ಟು ಚೆನ್ನಾಗಿ ಬೆಂಬಲಿಸುತ್ತವೆಯೋ ಅದಕ್ಕೆ ಅನುಗುಣವಾಗಿ ನವೀಕರಿಸಿ.

try_this:
  - ನಿಮ್ಮ ಪೂರ್ವಗ್ರಹದಿಂದ ಪ್ರಾರಂಭಿಸಿ; ನೀವು ತಪ್ಪಾಗಿದ್ದರೆ ಪುರಾವೆ ಎಷ್ಟು ಸಂಭವನೀಯವಾಗಿರುತ್ತದೆ ಎಂದು ಕೇಳಿ.
  - ಹೆಚ್ಚಳವಾಗಿ ನವೀಕರಿಸಿ - ಒಂದೇ ಡೇಟಾ ಪಾಯಿಂಟ್‌ನಲ್ಲಿ 0% ರಿಂದ 100% ವರೆಗೆ ಬದಲಾಗಬೇಡಿ.
  - ಪರ್ಯಾಯ ಊಹೆಗಳನ್ನು ಪರಿಗಣಿಸಿ: ಪುರಾವೆಗಳು ಅವುಗಳಿಗೂ ಹೊಂದಿಕೊಳ್ಳುತ್ತವೆಯೇ?

ask_yourself:
  - ಈ ಪುರಾವೆಯು ನಿಜವಾಗಿ ಸಂಭವನೀಯತೆಯನ್ನು ಎಷ್ಟು ಬದಲಾಯಿಸುತ್ತದೆ?
  - ನಾನು ನನ್ನ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ನಾನು ಈಗಾಗಲೇ ಯೋಚಿಸಿದ್ದನ್ನು ದೃಢೀಕರಿಸುತ್ತಿದ್ದೇನೆ?

in_more_detail: |
  ಪುರಾವೆಯನ್ನು ನೀಡಿದ ಊಹೆಯ ಸಂಭವನೀಯತೆಯು, ಊಹೆಯನ್ನು ನೀಡಿದ ಪುರಾವೆಯ ಸಂಭವನೀಯತೆಯಿಂದ ಗುಣಿಸಿದ ಪೂರ್ವ ಸಂಭವನೀಯತೆಗೆ ಸಮನಾಗಿರುತ್ತದೆ, ಪುರಾವೆಯ ಸಂಭವನೀಯತೆಯಿಂದ ಭಾಗಿಸಲ್ಪಡುತ್ತದೆ ಎಂದು ಪ್ರಮೇಯ ಹೇಳುತ್ತದೆ. ಆಚರಣೆಯಲ್ಲಿ: ನಿಮ್ಮ ಪೂರ್ವ ನಂಬಿಕೆಯಿಂದ ಪ್ರಾರಂಭಿಸಿ, ಹೊಸ ಪುರಾವೆಯು ನಿಮ್ಮ ಊಹೆಗೆ ಎಷ್ಟು ಸ್ಥಿರವಾಗಿದೆ ಎಂಬುದನ್ನು ನೋಡಿ, ಪರ್ಯಾಯಗಳ ವಿರುದ್ಧ, ಮತ್ತು ಅದಕ್ಕೆ ಅನುಗುಣವಾಗಿ ನವೀಕರಿಸಿ.

  ನೀವು ತಪ್ಪಾಗಿದ್ದರೆ ಪುರಾವೆ ಎಷ್ಟು ಸಂಭವನೀಯವಾಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸುವ ಮೂಲಕ ಬೇಯ್ಸಿಯನ್ ಚಿಂತನೆಯು ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಎದುರಿಸುತ್ತದೆ. ಇದು ಸಂಭವನೀಯ ತಾರ್ಕಿಕತೆ ಮತ್ತು ವೈಜ್ಞಾನಿಕ ನವೀಕರಣದ ಅಡಿಪಾಯವಾಗಿದೆ.

why_this_is_important: |
  ಬೇಯ್ಸಿಯನ್ ಚಿಂತನೆಯು ಅನಿಶ್ಚಿತತೆಯ ಅಡಿಯಲ್ಲಿ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ, ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ ಮತ್ತು ಪುರಾವೆಗಳಿಂದ ಕಲಿಯಲು ಒಂದು ಚೌಕಟ್ಟನ್ನು ಒದಗಿಸುತ್ತದೆ. ರೋಗನಿರ್ಣಯ, ಮುನ್ಸೂಚನೆ ಮತ್ತು ಅನಿಶ್ಚಿತತೆ ಹೊಂದಿರುವ ಯಾವುದೇ ಡೊಮೇನ್‌ಗೆ ಇದು ಅತ್ಯಗತ್ಯ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
  - ಕಲಿಕೆ

how_can_you_spot_it:
  prior_and_update: |
    ಆರಂಭಿಕ ನಂಬಿಕೆಯಿಂದ ಪ್ರಾರಂಭಿಸಿ ಮತ್ತು ಹೊಸ ಪುರಾವೆಗಳ ಆಧಾರದ ಮೇಲೆ ಅದನ್ನು ಸರಿಹೊಂದಿಸುವುದು.
  likelihood_ratio_thinking: |
    "ನಾನು ಸರಿ ಇದ್ದರೆ ಮತ್ತು ತಪ್ಪು ಇದ್ದರೆ ಈ ಪುರಾವೆ ಎಷ್ಟು ಸಂಭವನೀಯವಾಗಿದೆ?" ಎಂದು ಕೇಳುವುದು.
  incremental_updating: |
    ನಂಬಿಕೆಗಳು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಬದಲಾಗುವ ಬದಲು ಪುರಾವೆಗಳೊಂದಿಗೆ ಕ್ರಮೇಣ ಬದಲಾಗುತ್ತವೆ.
  base_rate_respect: |
    ಆರಂಭಿಕ ಸಂಭವನೀಯತೆಗಳು (ಆರಂಭಿಕ ದರಗಳು) ಮುಖ್ಯ, ಕೇವಲ ಇತ್ತೀಚಿನ ಡೇಟಾ ಪಾಯಿಂಟ್ ಅಲ್ಲ.

examples:
  medical_diagnosis: |
    ಅಪರೂಪದ ರೋಗಕ್ಕೆ ಧನಾತ್ಮಕ ಪರೀಕ್ಷೆ - ಪೂರ್ವಗ್ರಹ (ಕಡಿಮೆ ಪ್ರಚಲಿತ) ಎಂದರೆ ಧನಾತ್ಮಕ ಫಲಿತಾಂಶವು ಆಗಾಗ್ಗೆ ತಪ್ಪು ಧನಾತ್ಮಕವಾಗಿರುತ್ತದೆ. ಬೇಯ್ಸ್ ಸಂಭವನೀಯತೆಯನ್ನು ನವೀಕರಿಸುತ್ತದೆ.
  forecasting: |
    ಆರಂಭಿಕ ಅಂದಾಜುಗಳಿಗೆ ಅಂಟಿಕೊಳ್ಳುವ ಬದಲು ಹೊಸ ಡೇಟಾ ಬರುವಂತೆ ಮುನ್ಸೂಚನೆಗಳನ್ನು ನವೀಕರಿಸುವುದು.
  hiring: |
    ಪಾತ್ರದ ಹೊಂದಾಣಿಕೆಗಾಗಿ ಆರಂಭಿಕ ದರಗಳೊಂದಿಗೆ ಪ್ರಾರಂಭಿಸಿ, ನಂತರ ಸಂದರ್ಶನ ಕಾರ್ಯಕ್ಷಮತೆಯ ಆಧಾರದ ಮೇಲೆ ನವೀಕರಿಸುವುದು.
  investing: |
    ಹೊಸ ಮಾಹಿತಿ (ಆದಾಯ, ಸುದ್ದಿಗಳು) ಬರುವಂತೆ ಕಂಪನಿಯು ಯಶಸ್ವಿಯಾಗುವ ಸಂಭವನೀಯತೆಯನ್ನು ನವೀಕರಿಸುವುದು.

real_world_implications: |
  ಬೇಯ್ಸಿಯನ್ ಚಿಂತನೆಯು ಆಧುನಿಕ AI, ವೈದ್ಯಕೀಯ ರೋಗನಿರ್ಣಯ ಮತ್ತು ವೈಜ್ಞಾನಿಕ ಅನುಮಾನಕ್ಕೆ ಅಡಿಪಾಯವಾಗಿದೆ. ಇದು ಆರಂಭಿಕ ದರವನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದನ್ನು ಮತ್ತು ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಸರಿಪಡಿಸುತ್ತದೆ. ಅನಿಶ್ಚಿತತೆ ಹೊಂದಿರುವ ಯಾವುದೇ ಡೊಮೇನ್‌ಗೆ ಇದು ಶಕ್ತಿಯುತವಾದ ಸಾಧನವಾಗಿದೆ.

professional_application:
  networking_and_relationship_building: |
    ಸ್ಥಿರ ಮೊದಲ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಇಟ್ಟುಕೊಳ್ಳುವ ಬದಲು ಹೊಸ ಪುರಾವೆಗಳ ಆಧಾರದ ಮೇಲೆ ಜನರ ಬಗ್ಗೆ ನಿಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಿ. ಕ್ರಿಯೆಗಳನ್ನು ಅರ್ಥೈಸುವಾಗ ಆರಂಭಿಕ ದರಗಳನ್ನು (ಉದಾ., ಈ ನಡವಳಿಕೆ ಎಷ್ಟು ಸಾಮಾನ್ಯವಾಗಿದೆ?) ಪರಿಗಣಿಸಿ.
  collaborative_learning_initiative: |
    ಚರ್ಚೆಗಳ ಮೊದಲು ಪೂರ್ವಗ್ರಹಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಹೇಳಲು ತಂಡಗಳನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ, ನಂತರ ಪುರಾವೆಗಳನ್ನು ನೀಡಿದಾಗ ನವೀಕರಿಸಿ. ಆಂಕರಿಂಗ್ ಮತ್ತು ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.

how_can_this_be_misapplied:
  overprecision: |
    ಅನಿಶ್ಚಿತತೆ ಹೆಚ್ಚಿರುವಾಗ ನಿಖರವಾದ ಸಂಭವನೀಯತೆಗಳನ್ನು ನಿಯೋಜಿಸುವುದು.
  prior_rigidity: |
    ಬಲವಾದ ಪೂರ್ವಗ್ರಹಗಳಿಗೆ ಅಂಟಿಕೊಳ್ಳುವುದು ಮತ್ತು ಹೊಸ ಪುರಾವೆಗಳೊಂದಿಗೆ ಸಾಕಷ್ಟು ನವೀಕರಿಸದಿರುವುದು.
  base_rate_tyranny: |
    ಆರಂಭಿಕ ದರಗಳು ಸೂಚಿಸಿದರೂ ಬಲವಾದ ಪುರಾವೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಪುರಾವೆಯು ಪ್ರಾಬಲ್ಯ ಸಾಧಿಸಬೇಕು.
  false_sophistication: |
    ನಿಜವಾದ ತಾರ್ಕಿಕತೆಯನ್ನು ಮಾಡದೆ ಕಠಿಣವಾಗಿ ಧ್ವನಿಸಲು ಬೇಯ್ಸಿಯನ್ ಭಾಷೆಯನ್ನು ಬಳಸುವುದು.

