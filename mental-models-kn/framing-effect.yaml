id: framing_effect
name: ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್

quick_introduction: |
  ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಎಂದರೆ, ಮೂಲಭೂತ ಸಂಗತಿಗಳು ಒಂದೇ ಆಗಿದ್ದರೂ, ಆಯ್ಕೆಗಳನ್ನು
  ಪ್ರಸ್ತುತಪಡಿಸುವ ವಿಧಾನವನ್ನು ಆಧರಿಸಿ ನಮ್ಮ ನಿರ್ಧಾರಗಳು ಬದಲಾಗುವ ಪ್ರವೃತ್ತಿ. "90%
  ಬದುಕುಳಿಯುವಿಕೆ" ಮತ್ತು "10% ಮರಣ" ಒಂದೇ ಫಲಿತಾಂಶವನ್ನು ವಿವರಿಸಿದರೂ ವಿಭಿನ್ನ
  ಆಯ್ಕೆಗಳನ್ನು ನೀಡುತ್ತವೆ. ಫ್ರೇಮ್ ನಿರ್ಧಾರವನ್ನು ರೂಪಿಸುತ್ತದೆ.

one_liner: ಅದೇ ಸಂಗತಿಗಳು, ವಿಭಿನ್ನವಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ, ವಿಭಿನ್ನ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತವೆ.

try_this:
  - ನಿರ್ಧರಿಸುವ ಮೊದಲು ಆಯ್ಕೆಗಳನ್ನು ಹಲವು ರೀತಿಯಲ್ಲಿ ಫ್ರೇಮ್ ಮಾಡಿ - ಲಾಭದ ಫ್ರೇಮ್ ಮತ್ತು ನಷ್ಟದ ಫ್ರೇಮ್.
  - ಯಾವುದಾದರೂ ಒಂದು ವಿಷಯವನ್ನು ಯಾವ ರೀತಿ ಹೇಳಲಾಗುತ್ತದೆ ಎಂಬುದರ ಆಧಾರದ ಮೇಲೆ ನಿಮ್ಮ ಆಯ್ಕೆ ಬದಲಾದಾಗ ಗಮನಿಸಿ.
  - ಕೇಳಿ: ಫ್ರೇಮ್‌ನಿಂದ ಹೊರತುಪಡಿಸಿ, ಮೂಲಭೂತ ಸಂಗತಿಗಳು ಯಾವುವು?

ask_yourself:
  - ಇದನ್ನು ಲಾಭ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ ಮತ್ತು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ ನಾನು ವಿಭಿನ್ನವಾಗಿ ನಿರ್ಧರಿಸುತ್ತೇನೆಯೇ?
  - ನಾನು ಫ್ರೇಮ್‌ಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಿದ್ದೇನೆಯೇ ಅಥವಾ ನಿಜವಾದ ಫಲಿತಾಂಶಕ್ಕೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಿದ್ದೇನೆಯೇ?

in_more_detail: |
  ಕಾಹ್ನೆಮನ್ ಮತ್ತು ಟ್ವರ್ಸ್ಕಿ ತೋರಿಸಿದಂತೆ, ಜನರು ಲಾಭಗಳಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ಅಪಾಯದಿಂದ ದೂರವಿರುತ್ತಾರೆ ಮತ್ತು ನಷ್ಟಗಳಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ಅಪಾಯವನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ - ಒಂದೇ ಫಲಿತಾಂಶಗಳಿಗೂ ಸಹ. ಧನಾತ್ಮಕ ಫ್ರೇಮಿಂಗ್ ("200 ಜೀವಗಳನ್ನು ಉಳಿಸಿ") ವಿರುದ್ಧ ಋಣಾತ್ಮಕ ಫ್ರೇಮಿಂಗ್ ("400 ಜನರು ಸಾಯುತ್ತಾರೆ") ಆದ್ಯತೆಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ. ನಷ್ಟ ಫ್ರೇಮ್‌ಗಳು ಸಮಾನ ಲಾಭದ ಫ್ರೇಮ್‌ಗಳಿಗಿಂತ ಬಲವಾದ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತವೆ.

  ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ವೈದ್ಯಕೀಯ ನಿರ್ಧಾರಗಳು, ನೀತಿ, ಮಾರ್ಕೆಟಿಂಗ್ ಮತ್ತು
  ಮಾತುಕತೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಅತ್ಯಂತ ಶಕ್ತಿಶಾಲಿ ಮತ್ತು ಉತ್ತಮವಾಗಿ ದಾಖಲಾದ ಪಕ್ಷಪಾತಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ.
  ಅರಿವು ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಆದರೆ ಸಂಪೂರ್ಣವಾಗಿ ನಿವಾರಿಸುವುದು ಕಷ್ಟ.

why_this_is_important: |
  ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಅನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನೀವು ಹೆಚ್ಚು ಸ್ಥಿರವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು,
  ಮೋಸಕ್ಕೆ ಒಳಗಾಗುವುದನ್ನು ತಡೆಯಲು ಮತ್ತು ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಸಂವಹನ ನಡೆಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.
  ಅದೇ ಕೊಡುಗೆಯನ್ನು ಪ್ರಸ್ತುತಿಯನ್ನು ಅವಲಂಬಿಸಿ ಏಕೆ ಸ್ವೀಕರಿಸಬಹುದು ಅಥವಾ ತಿರಸ್ಕರಿಸಬಹುದು ಎಂಬುದನ್ನೂ ಇದು ವಿವರಿಸುತ್ತದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
  - ಮಾತುಕತೆ
  - ನಾಯಕತ್ವ
  - ಅಪಾಯ_ಅಂದಾಜು

how_can_you_spot_it:
  gain_loss_asymmetry: |
    ಒಂದೇ ಫಲಿತಾಂಶವನ್ನು ಲಾಭ ಮತ್ತು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ವಿಭಿನ್ನ ಆಯ್ಕೆಗಳು ಉಂಟಾಗುತ್ತವೆ.
  presentation_dependence: |
    ವಿಷಯವಲ್ಲ, ಫ್ರೇಮಿಂಗ್ ಬದಲಾದಾಗ ನಿರ್ಧಾರಗಳು ಬದಲಾಗುತ್ತವೆ.
  default_influence: |
    ಆಯ್ಕೆಗಳನ್ನು ಯಾವ ಕ್ರಮದಲ್ಲಿ ಅಥವಾ ಯಾವ ಹೆಸರಿನಲ್ಲಿ ನೀಡಲಾಗಿದೆ ಎಂಬುದು ಆಯ್ಕೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
  emotional_trigger: |
    ಕೆಲವು ಫ್ರೇಮ್‌ಗಳು ಬಲವಾದ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತವೆ.

examples:
  medical: |
    ಒಂದೇ ಕಾರ್ಯವಿಧಾನಕ್ಕಾಗಿ "90% ಬದುಕುಳಿಯುವಿಕೆ" ವಿರುದ್ಧ "10% ಮರಣ" -
    ಜನರು ಫ್ರೇಮ್ ಅನ್ನು ಆಧರಿಸಿ ವಿಭಿನ್ನವಾಗಿ ಆಯ್ಕೆ ಮಾಡುತ್ತಾರೆ.
  sales: |
    "₹50 ಉಳಿಸಿ" ವಿರುದ್ಧ "₹50 ಕಳೆದುಕೊಳ್ಳಬೇಡಿ" - ಸಮಾನ ಫ್ರೇಮ್‌ಗಳು, ವಿಭಿನ್ನ
    ಮಾನಸಿಕ ಪರಿಣಾಮ.
  policy: |
    "ತೆರಿಗೆ ಪರಿಹಾರ" ವಿರುದ್ಧ "ಸರ್ಕಾರದ ಖರ್ಚು" - ಒಂದೇ ನೀತಿ, ವಿಭಿನ್ನ
    ರಾಜಕೀಯ ಪ್ರತಿಕ್ರಿಯೆ.
  negotiation: |
    ಒಂದು ಕೊಡುಗೆಯನ್ನು "ರಿಯಾಯಿತಿ" ಎಂದು ಅಥವಾ "ಹೆಚ್ಚುವರಿ ಶುಲ್ಕವನ್ನು ತಪ್ಪಿಸುವುದು" ಎಂದು
    ಪ್ರಸ್ತುತಪಡಿಸುವುದು ಸ್ವೀಕಾರ ದರವನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ.

real_world_implications: |
  ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಅನ್ನು ಜಾಹೀರಾತು, ರಾಜಕೀಯ ಮತ್ತು
  ಮಾತುಕತೆಗಳಲ್ಲಿ ಬಳಸಲಾಗುತ್ತದೆ. ಇದು ವೈದ್ಯಕೀಯ ನಿರ್ಧಾರಗಳು ಮತ್ತು ನೀತಿ ಬೆಂಬಲದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
  ಮರುಫ್ರೇಮಿಂಗ್ ನಿರ್ಧಾರಗಳು ಮತ್ತು ಸಂವಹನವನ್ನು ಸುಧಾರಿಸಬಹುದು. ಅರಿವು
  ಸಹಾಯ ಮಾಡುತ್ತದೆ ಆದರೆ ಪರಿಣಾಮವನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ನಿವಾರಿಸುವುದಿಲ್ಲ.

professional_application:
  networking_and_relationship_building: |
    ಆಯ್ಕೆಗಳನ್ನು ಪ್ರಸ್ತುತಪಡಿಸುವಾಗ, ಹಲವು ಫ್ರೇಮ್‌ಗಳನ್ನು ಪರಿಗಣಿಸಿ.
    ವಿಭಿನ್ನ ಫ್ರೇಮಿಂಗ್‌ಗಳು ಗ್ರಹಿಕೆಯನ್ನು ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂಬುದನ್ನು ಪರೀಕ್ಷಿಸಿ. ಮಾಹಿತಿಯನ್ನು ಸ್ವೀಕರಿಸುವಾಗ,
    "ಇದನ್ನು ಬೇರೆ ಹೇಗೆ ಫ್ರೇಮ್ ಮಾಡಬಹುದು?" ಎಂದು ಕೇಳಿ.
  collaborative_learning_initiative: |
    ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಾಗ, ಫ್ರೇಮಿಂಗ್ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಶೀಲಿಸಲು ಆಯ್ಕೆಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಮರುಫ್ರೇಮ್ ಮಾಡಿ.
    "ಇದನ್ನು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ, ನಾವು ವಿಭಿನ್ನವಾಗಿ ನಿರ್ಧರಿಸುತ್ತೀವೇ?" ಎಂದು ಕೇಳಿ. ನ್ಯಾಯಸಮ್ಮತತೆಗಾಗಿ ಸ್ಥಿರವಾದ ಫ್ರೇಮಿಂಗ್ ಬಳಸಿ.

how_can_this_be_misapplied:
  manipulation: |
    ಜನರ ಅರಿವಿಲ್ಲದೆ, ಅಪೇಕ್ಷಿತ ಫಲಿತಾಂಶಗಳ ಕಡೆಗೆ ಅವರನ್ನು ನಿರ್ದೇಶಿಸಲು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಫ್ರೇಮ್ ಮಾಡುವುದು.
  false_equivalence: |
    ಕೆಲವು ಫ್ರೇಮ್‌ಗಳು ಪ್ರಮುಖ ಮಾಹಿತಿಯನ್ನು ಮರೆಮಾಡಿದರೂ, ಎಲ್ಲಾ ಫ್ರೇಮ್‌ಗಳು ಸಮಾನವಾಗಿ ಮಾನ್ಯವಾಗಿವೆ ಎಂದು ಊಹಿಸುವುದು.
  overcorrection: |
    ಫ್ರೇಮಿಂಗ್ ಅನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ನಿರ್ಲಕ್ಷಿಸಿ ಮತ್ತು ಅದು ಮುಖ್ಯವಲ್ಲ ಎಂದು ಊಹಿಸುವುದು -
    ಇದು ಮುಖ್ಯ.
  spin: |
    ಸ್ಪಷ್ಟಪಡಿಸುವುದಕ್ಕಿಂತ ತಪ್ಪು ದಾರಿ ಹಿಡಿಸಲು ಫ್ರೇಮಿಂಗ್ ಬಳಸುವುದು.

