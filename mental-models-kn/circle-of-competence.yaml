# ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: circle_of_competence
name: ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ

quick_introduction: |
  ಸಾಮರ್ಥ್ಯದ ವೃತ್ತವು ಒಂದು ಮಾನಸಿಕ ಮಾದರಿಯಾಗಿದ್ದು, ನಿಮ್ಮ ಪರಿಣತಿಯ ಮಿತಿಗಳನ್ನು ತಿಳಿದುಕೊಳ್ಳಲು
  ಮತ್ತು ಪ್ರಮುಖ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಅವುಗಳೊಳಗೆ ಇರಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ. ವಾರೆನ್ ಬಫೆಟ್
  ಮತ್ತು ಚಾರ್ಲಿ ಮುಂಗರ್ ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ ಎಂಬುದನ್ನು ತಿಳಿಯುವ ಬಗ್ಗೆ ಒತ್ತಿಹೇಳುತ್ತಾರೆ.

one_liner: ನಿಮ್ಮ ಪರಿಣತಿಯ ಮಿತಿಗಳನ್ನು ತಿಳಿಯಿರಿ—ಮತ್ತು ಅದು ಮುಖ್ಯವಾದಾಗ ಅವುಗಳೊಳಗೆ ಇರಿ.

try_this:
  - ನಿಮಗೆ ನಿಜವಾದ ಪರಿಣತಿ ಎಲ್ಲಿ ಇದೆ ಮತ್ತು ಎಲ್ಲಿ ನೀವು ಊಹಿಸುತ್ತಿದ್ದೀರಿ ಎಂಬುದನ್ನು ಗುರುತಿಸಿ.
  - ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಇರುವಾಗ, ಸಲಹೆ ಪಡೆಯಿರಿ ಅಥವಾ ಕಾರ್ಯವನ್ನು ನಿಯೋಜಿಸಿ.
  - ಪ್ರಾಮಾಣಿಕರಾಗಿರಿ: ನಿಜವಾದ ಪರಿಣಿತರು ನಿಮ್ಮ ನಿರ್ಣಯಕ್ಕೆ ಇಲ್ಲಿ ಒಪ್ಪುತ್ತಾರೆಯೇ?

ask_yourself:
  - ನಾನು ನನ್ನ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದೊಳಗೆ ಇದ್ದೇನೆಯೇ, ಅಥವಾ ನಾನು ಊಹೆ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ?
  - ಈ ಕ್ಷೇತ್ರದಲ್ಲಿ "ನನಗೆ ತಿಳಿದಿಲ್ಲ" ಎಂದು ನಾನು ಕೊನೆಯ ಬಾರಿ ಒಪ್ಪಿಕೊಂಡದ್ದು ಯಾವಾಗ?

in_more_detail: |
  ಪ್ರತಿಯೊಬ್ಬ ವ್ಯಕ್ತಿಗೂ ಅವರು ನಿಜವಾದ ಪರಿಣತಿಯನ್ನು ಹೊಂದಿರುವ ಕ್ಷೇತ್ರಗಳಿವೆ—ಅಲ್ಲಿ ಅವರು ಮಾಹಿತಿಯನ್ನು
  ಮೌಲ್ಯಮಾಪನ ಮಾಡಬಹುದು, ದೋಷಗಳನ್ನು ಗುರುತಿಸಬಹುದು ಮತ್ತು ವಿಶ್ವಾಸಾರ್ಹ ನಿರ್ಣಯಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಬಹುದು.
  ಆ ವೃತ್ತದ ಹೊರಗೆ, ಅವರು ಇತರರಂತೆ ಅದೇ ಪಕ್ಷಪಾತಗಳು ಮತ್ತು ತಪ್ಪುಗಳಿಗೆ ಗುರಿಯಾಗುತ್ತಾರೆ. ಕೀಲಿಯು
  ಪ್ರಾಮಾಣಿಕ ಸ್ವಯಂ-ಮೌಲ್ಯಮಾಪನವಾಗಿದೆ: ನೀವು ನಿಜವಾಗಿಯೂ ಸಮರ್ಥರಾಗಿರುವಲ್ಲಿ ಮತ್ತು ನೀವು ಊಹಿಸುತ್ತಿರುವಲ್ಲಿ
  ಯಾವುದು?

  ಯೋಜಿತ ಕಲಿಕೆಯ ಮೂಲಕ ವೃತ್ತವನ್ನು ವಿಸ್ತರಿಸಬಹುದು, ಆದರೆ ಅದರ ಪ್ರಸ್ತುತ ಮಿತಿಗಳನ್ನು ಗುರುತಿಸಲು
  ವಿನಯವು ಅಗತ್ಯವಿದೆ. ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಕಾರ್ಯನಿರ್ವಹಿಸುವುದರಿಂದ ದುಬಾರಿ ತಪ್ಪುಗಳ ಅಪಾಯ ಹೆಚ್ಚಾಗುತ್ತದೆ,
  ವಿಶೇಷವಾಗಿ ಅಪಾಯಗಳು ಹೆಚ್ಚಾದಾಗ.

why_this_is_important: |
  ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದೊಳಗೆ ಇರುವುದರಿಂದ ದುಬಾರಿ ತಪ್ಪುಗಳು ಕಡಿಮೆಯಾಗುತ್ತವೆ ಮತ್ತು ನಿರ್ಧಾರದ
  ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ. ಸಲಹೆ ಪಡೆಯಲು, ನಿಯೋಜಿಸಲು ಅಥವಾ ಹಿಂಜರಿಯಲು ಯಾವಾಗ ಎಂದು ತಿಳಿಯಲು
  ಇದು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗಿನ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವು ವೈಫಲ್ಯದ ಪ್ರಮುಖ
  ಮೂಲವಾಗಿದೆ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಹೂಡಿಕೆ
  - ವೃತ್ತಿ_ಜೀವನದ_ಕ್ರಮಗಳು
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  honest_boundary_assessment: |
    ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ಜ್ಞಾನದ ಮಿತಿಗಳನ್ನು ನೀವು ವಿವರಿಸಬಹುದೇ? ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ
    ಎಂಬುದು ನಿಮಗೆ ತಿಳಿದಿದೆಯೇ?
  knowing_when_to_defer: |
    ಒಂಟಿಯಾಗಿ ನಿರ್ಧರಿಸುವ ಬದಲು ತಜ್ಞರ ಅಭಿಪ್ರಾಯವನ್ನು ಯಾವಾಗ ಪಡೆಯಬೇಕು ಎಂಬುದನ್ನು ಗುರುತಿಸುವುದು.
  consistent_track_record: |
    ನಿಮ್ಮ ವೃತ್ತದೊಳಗೆ, ನಿಮ್ಮ ನಿರ್ಣಯಗಳು ಕಾಲಾನಂತರದಲ್ಲಿ ಧೃಡೀಕರಣಗೊಳ್ಳುತ್ತವೆ; ಹೊರಗೆ, ಅವು
    ಧೃಡೀಕರಣಗೊಳ್ಳುವುದಿಲ್ಲ.
  calibration: |
    ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ವಿಶ್ವಾಸವು ಆ ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ನಿಜವಾದ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಹೊಂದಿಕೆಯಾಗುತ್ತದೆ.

examples:
  investing: |
    ಬಫೆಟ್ ಟೆಕ್ ಸ್ಟಾಕ್‌ಗಳನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ತಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದ ಹೊರಗೆ
    ಇವೆ ಎಂದು ಹೇಳುತ್ತಾರೆ—ಅವರನ್ನು ವಿಶ್ವಾಸಾರ್ಹವಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ.
  career: |
    ತಮ್ಮ ಕ್ಷೇತ್ರದಲ್ಲೇ ಉಳಿಯುವ ತಜ್ಞರು, ಸಂಬಂಧವಿಲ್ಲದ ಪ್ರದೇಶದಲ್ಲಿ "ಸ್ಟ್ರೆಚ್" ಪಾತ್ರವನ್ನು
    ತೆಗೆದುಕೊಳ್ಳುವವರ ವಿರುದ್ಧ.
  hiring: |
    ತಾಂತ್ರಿಕ ಪಾತ್ರಗಳಿಗಾಗಿ ತಜ್ಞರನ್ನು ಕರೆತರುವುದಕ್ಕಿಂತ ನಿಮ್ಮ ಸ್ವಂತ ನಿರ್ಣಯದ ಮೇಲೆ ಯಾವಾಗ
    ಆಧಾರಪಡಬೇಕು ಎಂದು ತಿಳಿಯುವುದು.
  advice_giving: |
    ಊಹೆ ಮಾಡುವ ಬದಲು ನಿಮ್ಮ ಪರಿಣತಿಯ ಹೊರಗಿನ ವಿಷಯಗಳ ಬಗ್ಗೆ ಅಭಿಪ್ರಾಯ ನೀಡಲು ನಿರಾಕರಿಸುವುದು.

real_world_implications: |
  ಸಾಮರ್ಥ್ಯದ ವೃತ್ತವು ಮೌಲ್ಯದ ಹೂಡಿಕೆ ಮತ್ತು ವೃತ್ತಿಪರ ಯಶಸ್ಸಿಗೆ ಕೇಂದ್ರವಾಗಿದೆ.
  ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ, ವಿಫಲವಾದ ಸಾಹಸಗಳು ಮತ್ತು ಕಳಪೆ ಸಲಹೆಗಳು
  ಉಂಟಾಗುತ್ತವೆ. ವೃತ್ತವನ್ನು ವಿಸ್ತರಿಸಲು ಯೋಜಿತ ಪ್ರಯತ್ನ ಮತ್ತು ಪ್ರಾಮಾಣಿಕ ಪ್ರತಿಕ್ರಿಯೆ
  ಅಗತ್ಯ.

professional_application:
  networking_and_relationship_building: |
    ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತಗಳನ್ನು ಪೂರೈಸುವ ಜನರೊಂದಿಗೆ ಸಂಬಂಧಗಳನ್ನು ಬೆಳೆಸಿಕೊಳ್ಳಿ.
    ನಿಮ್ಮ ಸ್ವಂತ ಉತ್ತರ ನೀಡುವ ಬದಲು ಇತರರನ್ನು ಪರಿಚಯಿಸಲು ಯಾವಾಗ ಎಂದು ತಿಳಿಯಿರಿ.
  collaborative_learning_initiative: |
    ಅತಿಕ್ರಮಿಸುವ ಮತ್ತು ಪೂರಕ ವೃತ್ತಗಳನ್ನು ಹೊಂದಿರುವ ತಂಡಗಳನ್ನು ರಚಿಸಿ. ಜನರು ತಮ್ಮ
    ಸಾಮರ್ಥ್ಯದ ಹೊರಗೆ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಿದ್ದಾರೆ ಎಂದು ಗುರುತಿಸಲು ಅವರನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಎಂದಿಗೂ ಹೋಗದಿರುವುದು ಬೆಳವಣಿಗೆ ಮತ್ತು ಕಲಿಕೆಯನ್ನು ಸೀಮಿತಗೊಳಿಸಬಹುದು.
  false_modesty: |
    ಜವಾಬ್ದಾರಿಯಿಂದ ತಪ್ಪಿಸಿಕೊಳ್ಳಲು ಅಥವಾ ಕಷ್ಟಕರವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳದಿರಲು ಒಂದು
    ಸಣ್ಣ ವೃತ್ತವನ್ನು ಹೇಳಿಕೊಳ್ಳುವುದು.
  gatekeeping: |
    ಇತರರ ವಾದಗಳನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸದೆ ಅವರನ್ನು ತಿರಸ್ಕರಿಸಲು "ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ" ವನ್ನು
    ಬಳಸುವುದು.
  stagnation: |
    ವೃತ್ತವನ್ನು ಸ್ಥಿರವೆಂದು ಪರಿಗಣಿಸುವುದು, ಪ್ರಯತ್ನದಿಂದ ವಿಸ್ತರಿಸಬಹುದಾದ ವಿಷಯವೆಂದು
    ಪರಿಗಣಿಸದಿರುವುದು.

