# ಲಭ್ಯತೆಯ ಕುಸಿತ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: availability_cascade
name: ಲಭ್ಯತೆಯ ಕುಸಿತ

quick_introduction: |
  ಲಭ್ಯತೆಯ ಕುಸಿತ ಎನ್ನುವುದು ಒಂದು ಸ್ವಯಂ-ಬಲವರ್ಧಿಸುವ ಪ್ರಕ್ರಿಯೆಯಾಗಿದ್ದು, ಇದರಲ್ಲಿ ಒಂದು ಕಲ್ಪನೆ
  ಪುನರಾವರ್ತಿತ ಸಾರ್ವಜನಿಕ ಚರ್ಚೆಯ ಮೂಲಕ ಹೆಚ್ಚು ಸಂಭವನೀಯವೆಂದು ತೋರುತ್ತದೆ.
  ಇದು ಎಷ್ಟು ಹೆಚ್ಚು ಚರ್ಚಿಸಲ್ಪಡುತ್ತದೆಯೋ, ಅಷ್ಟು ಹೆಚ್ಚು "ಲಭ್ಯ"ವಾಗುತ್ತದೆ,
  ಅಷ್ಟು ಹೆಚ್ಚು ಜನರು ಅದನ್ನು ನಂಬುತ್ತಾರೆ, ಮತ್ತು ಅಷ್ಟು ಹೆಚ್ಚು ಅದನ್ನು ಚರ್ಚಿಸಲಾಗುತ್ತದೆ.
  ಒಂದು ಸಾಮೂಹಿಕ ನಂಬಿಕೆಯು ಅದರ ಮೂಲ ಸತ್ಯವನ್ನು ಲೆಕ್ಕಿಸದೆ ವೇಗವನ್ನು ಪಡೆಯುತ್ತದೆ.

one_liner: ಒಂದು ಕಲ್ಪನೆಯು ಎಷ್ಟು ಹೆಚ್ಚು ಪುನರಾವರ್ತನೆಯಾಗುತ್ತದೆಯೋ, ಅಷ್ಟು ಹೆಚ್ಚು ಅದು ಸಂಭವನೀಯವೆಂದು ತೋರುತ್ತದೆ—ಆಧಾರಗಳ ಹೊರತಾಗಿಯೂ.

try_this:
  - ಕೇಳಿ: ಈ ನಂಬಿಕೆ ನಿಜವಾದ ಕಾರಣಕ್ಕೆ ವ್ಯಾಪಕವಾಗಿದೆಯೇ, ಅಥವಾ ಪುನರಾವರ್ತನೆಯಾದ ಕಾರಣಕ್ಕೆ?
  - ಎಲ್ಲರಿಗೂ ತಿಳಿದಿರುವದನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುವ ಮೊದಲು ಪ್ರಾಥಮಿಕ ಮೂಲಗಳನ್ನು ಹುಡುಕಿ.
  - ಪುನರಾವರ್ತನೆಯು ನಿಮ್ಮ ಸಂಭವನೀಯತೆಯ ಗ್ರಹಿಕೆಯನ್ನು ಓಡಿಸುತ್ತಿದೆಯೇ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.

ask_yourself:
  - ಇದನ್ನು ಒಮ್ಮೆ ಮಾತ್ರ ಕೇಳಿದ್ದರೆ ನಂಬುತ್ತಿದ್ದೆನೇ?
  - ಎಲ್ಲರೂ ಹೇಳುತ್ತಾರೆ ಎಂಬುದನ್ನು "ಆಧಾರಗಳು ಅದನ್ನು ಬೆಂಬಲಿಸುತ್ತವೆ" ಎಂಬುದರೊಂದಿಗೆ ಗೊಂದಲಪಡುತ್ತಿದ್ದೇನೆಯೇ?

in_more_detail: |
  ತಿಮೂರ್ ಕುರಾನ್ ಮತ್ತು ಕ್ಯಾಸ್ ಸನ್‌ಸ್ಟೈನ್ ಲಭ್ಯತೆಯ ಕುಸಿತಗಳು ಹೇಗೆ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತವೆ ಎಂಬುದನ್ನು ವಿವರಿಸಿದ್ದಾರೆ:
  ಮಾಹಿತಿಯ ಲಭ್ಯತೆ (ನಾವು ಎಷ್ಟು ಬಾರಿ ಏನನ್ನಾದರೂ ಕೇಳುತ್ತೇವೆ) ಮತ್ತು ಸಂಭವನೀಯತೆ
  (ಇದು ಎಷ್ಟು ನಂಬಲರ್ಹವೆಂದು ತೋರುತ್ತದೆ) ಪರಸ್ಪರ ಬಲವರ್ಧಿಸುತ್ತವೆ. ಮಾಧ್ಯಮ ಪ್ರಸಾರ, ಸಾಮಾಜಿಕ
  ಮಾಧ್ಯಮ, ಮತ್ತು ಸಾರ್ವಜನಿಕ ಚರ್ಚೆಗಳು ಕೆಲವು ಕಲ್ಪನೆಗಳನ್ನು ವಿಸ್ತರಿಸುತ್ತವೆ.
  ಒಂದು ಕಲ್ಪನೆಯು ಲಭ್ಯತೆಯ ಒಂದು ಮಿತಿಯನ್ನು ತಲುಪಿದಾಗ, ಅದು ವೇಗವಾಗಿ ಹರಡಬಹುದು ಮತ್ತು
  ಅದು ಸುಳ್ಳು ಅಥವಾ ಅತಿಶಯೋಕ್ತಿಯಾಗಿದ್ದರೂ ಸಹ "ಸಾಮಾನ್ಯ ಜ್ಞಾನ"ವಾಗಬಹುದು.

  ಲಭ್ಯತೆಯ ಕುಸಿತಗಳು ಪ್ರಯೋಜನಕಾರಿಯಾಗಬಹುದು (ಪ್ರಮುಖ ಎಚ್ಚರಿಕೆಗಳನ್ನು ಹರಡುವುದು)
  ಅಥವಾ ಹಾನಿಕಾರಕವಾಗಬಹುದು (ಆತಂಕ ಅಥವಾ ತಪ್ಪು ಮಾಹಿತಿ ಹರಡುವುದು).
  ಅವು ಲಭ್ಯತೆಯ ಹ್ಯೂರಿಸ್ಟಿಕ್ ಮತ್ತು ಸಾಮಾಜಿಕ ಪುರಾವೆಯಿಂದ ನಡೆಸಲ್ಪಡುತ್ತವೆ.

why_this_is_important: |
  ಲಭ್ಯತೆಯ ಕುಸಿತಗಳನ್ನು ಗುರುತಿಸುವುದು, ವ್ಯಾಪಕ ನಂಬಿಕೆಯು ಆಧಾರಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತದೆಯೇ
  ಅಥವಾ ಕೇವಲ ಪುನರಾವರ್ತನೆಯೇ ಎಂಬುದನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
  ಇದು ಕಲ್ಪನೆಗಳು ಹೇಗೆ ವೈರಲ್ ಆಗುತ್ತವೆ ಮತ್ತು ಸಾಮೂಹಿಕ ನಂಬಿಕೆಗಳು ಹೇಗೆ ತಪ್ಪಾಗಬಹುದು ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
  ಇದು ಮಾಧ್ಯಮ ಸಾಕ್ಷರತೆ ಮತ್ತು ವಿಮರ್ಶಾತ್ಮಕ ಚಿಂತನೆಗೆ ಅತ್ಯಗತ್ಯ.

