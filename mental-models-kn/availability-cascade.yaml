  - ಕಲಿಕೆ
  - ನಾಯಕತ್ವ

how_can_you_spot_it:
  repetition_plausibility_spiral: |
    ಒಂದು ಕಲ್ಪನೆಯು ಎಷ್ಟು ಹೆಚ್ಚು ಪುನರಾವರ್ತನೆಯಾಗುತ್ತದೆಯೋ, ಅಷ್ಟು ಹೆಚ್ಚು ಅದು ಸಂಭವನೀಯವೆಂದು ತೋರುತ್ತದೆ.
  media_amplification: |
    ಪ್ರಸಾರವು ನಂಬಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ಇದು ಹೆಚ್ಚು ಪ್ರಸಾರಕ್ಕೆ ಕಾರಣವಾಗುತ್ತದೆ.
  social_proof_belief: |
    "ಎಲ್ಲರೂ ಇದನ್ನು ನಂಬುತ್ತಾರೆ" ಎಂಬುದು ನಂಬಿಕೆಗೆ ಆಧಾರವಾಗುತ್ತದೆ.
  threshold_effects: |
    ಒಂದು ಕಲ್ಪನೆಯು ಗೋಚರತೆಯ ಮಿತಿಯನ್ನು ದಾಟಿದಾಗ, ಅದು ವೇಗವಾಗಿ ಹರಡುತ್ತದೆ.

examples:
  health_scares: |
    ಒಂದು ಅಧ್ಯಯನವು ಒಂದು ಉತ್ಪನ್ನವು ಅಪಾಯಕಾರಿ ಎಂದು ಸೂಚಿಸುತ್ತದೆ; ಮಾಧ್ಯಮವು ಅದನ್ನು ವಿಸ್ತರಿಸುತ್ತದೆ;
    ಸಾರ್ವಜನಿಕರು ಅದನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ; ಹೆಚ್ಚು ಪ್ರಸಾರವು ಅನುಸರಿಸುತ್ತದೆ. ಅಪಾಯವನ್ನು
    ಅತಿಶಯೋಕ್ತಿ ಮಾಡಿರಬಹುದು.
  financial_panic: |
    ಬ್ಯಾಂಕ್ ವೈಫಲ್ಯದ ವದಂತಿಗಳು ಹರಡುತ್ತವೆ; ಜನರು ಹಣವನ್ನು ಹಿಂಪಡೆಯುತ್ತಾರೆ; ಈ ಓಟವು
    ಸ್ವಯಂ-ಪೂರೈಸುವಂತಾಗುತ್ತದೆ.
  social_media: |
    ಒಂದು ನಿರೂಪಣೆಯು ವೈರಲ್ ಆಗುತ್ತದೆ; ಪುನರಾವರ್ತನೆಯು ನಂಬಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ; ನಂಬಿಕೆಯು
    ಹಂಚಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಸತ್ಯ ಮತ್ತು ವೈರಲ್ ಆಗುವಿಕೆಯು ಭಿನ್ನವಾಗಬಹುದು.
  organizational: |
    ಉದ್ಯೋಗ ಕಡಿತದ ಬಗ್ಗೆ ವದಂತಿಯು ಹರಡುತ್ತದೆ; ಆತಂಕ ಹೆಚ್ಚಾಗುತ್ತದೆ; ನಡವಳಿಕೆ ಬದಲಾಗುತ್ತದೆ;
    ಪ್ರತಿಕ್ರಿಯೆಯ ಮೂಲಕ ವದಂತಿಯು ಸಂಭವನೀಯತೆಯನ್ನು ಪಡೆಯುತ್ತದೆ.

real_world_implications: |
  ಲಭ್ಯತೆಯ ಕುಸಿತಗಳು ಸಾರ್ವಜನಿಕ ಅಭಿಪ್ರಾಯ, ನೀತಿ ಮತ್ತು ಮಾರುಕಟ್ಟೆಗಳನ್ನು ರೂಪಿಸುತ್ತವೆ.
  ಅವು ಪ್ರಮುಖ ಸತ್ಯಗಳು ಮತ್ತು ಅಪಾಯಕಾರಿ ಸುಳ್ಳುಗಳೆರಡನ್ನೂ ಹರಡಬಹುದು.
  ವಿಮರ್ಶಾತ್ಮಕ ಚಿಂತನೆಯು ಆಧಾರ-ಆಧಾರಿತ ನಂಬಿಕೆಯನ್ನು
  ಕುಸಿತ-ಚಾಲಿತ ನಂಬಿಕೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸುವುದನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ಒಂದು ಕಲ್ಪನೆಯು "ಎಲ್ಲೆಲ್ಲೂ" ಇದ್ದಾಗ, ಕೇಳಿ: ಅದು ನಿಜವಾದ ಕಾರಣಕ್ಕೆ ಪುನರಾವರ್ತನೆಯಾಗುತ್ತಿದೆಯೇ,
    ಅಥವಾ ಅದು ಪುನರಾವರ್ತನೆಯಾದ ಕಾರಣಕ್ಕೆ ನಿಜವಾಗಿದೆಯೇ? ಪ್ರಾಥಮಿಕ ಮೂಲಗಳನ್ನು ಹುಡುಕಿ.
  collaborative_learning_initiative: |
    ವಿಸ್ತರಿಸುವ ಮೊದಲು ಪರಿಶೀಲಿಸುವ ರೂಢಿಗಳನ್ನು ರಚಿಸಿ. "ಎಲ್ಲರಿಗೂ ತಿಳಿದಿರುವದರ"
    ಬಗ್ಗೆ ಪ್ರಶ್ನಿಸುವುದನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ. ಆಧಾರಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸುವ ಒಮ್ಮತವನ್ನು
    ಲಭ್ಯತೆಯನ್ನು ಪ್ರತಿಬಿಂಬಿಸುವ ಒಮ್ಮತದಿಂದ ಪ್ರತ್ಯೇಕಿಸಿ.

how_can_this_be_misapplied:
  dismissing_all_consensus: |
    ಕೆಲವೊಮ್ಮೆ ವ್ಯಾಪಕ ನಂಬಿಕೆಯು ಸರಿಯಾಗಿರುತ್ತದೆ. ಎಲ್ಲಾ ಜನಪ್ರಿಯ ಕಲ್ಪನೆಗಳು ಕುಸಿತಗಳೆಂದು
    ಊಹಿಸಬೇಡಿ.
  conspiracy_thinking: |
    "ಲಭ್ಯತೆಯ ಕುಸಿತ"ವನ್ನು ಬಳಸಿಕೊಂಡು ನಿಜವಾದ ಕಾಳಜಿಗಳನ್ನು ತಯಾರಿಸಿದವು ಎಂದು ತಳ್ಳಿಹಾಕುವುದು.
  false_skepticism: |
    ಜನಪ್ರಿಯವಾಗಿರುವ ಕಾರಣ ಸು-ಆಧಾರಿತ ಕಲ್ಪನೆಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
  contrarianism: |
    ಯಾವುದೇ ವಿಷಯವನ್ನು ವ್ಯಾಪಕವಾಗಿ ನಂಬಲಾಗಿದ್ದರೂ ಅದು ತಪ್ಪಾಗಿರಬೇಕು ಎಂದು ಊಹಿಸುವುದು.

