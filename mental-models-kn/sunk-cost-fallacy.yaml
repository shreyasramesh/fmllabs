# Sunk Cost Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: sunk_cost_fallacy
name: ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆ

quick_introduction: |
  ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆ ಎಂದರೆ, ಭವಿಷ್ಯದ ನಿರೀಕ್ಷಿತ ಲಾಭಗಳ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಧರಿಸುವ ಬದಲು,
  ಇಾಗಲೇ ಖರ್ಚು ಮಾಡಿದ ಸಂಪನ್ಮೂಲಗಳಿಂದಾಗಿ ಒಂದು ನಿರ್ಧಾರದಲ್ಲಿ ಮುಂದುವರಿಯುವ ಪ್ರವೃತ್ತಿ.
  "ಇಲ್ಲಿಯವರೆಗೆ ಬಂದಿದ್ದೇವೆ" ಅಥವಾ "ನಾನು ಈಗಾಗಲೇ ಇಷ್ಟು ಹೂಡಿಕೆ ಮಾಡಿದ್ದೇನೆ" ಎಂಬುದು ಕೆಟ್ಟದರಲ್ಲಿಯೇ ಒಳ್ಳೆಯದನ್ನು
  ಹೂಡಲು ಕಾರಣವಾಗುತ್ತದೆ.

one_liner: ಹಿಂದಿನ ಹೂಡಿಕೆ ಹೋಗಿದೆ—ಭವಿಷ್ಯದ ವೆಚ್ಚಗಳು ಮತ್ತು ಲಾಭಗಳು ಮಾತ್ರ ಮುಖ್ಯ.

try_this:
  - Ask—If I were starting today, would I choose this path? (ನಾನು ಇಂದೇ ಪ್ರಾರಂಭಿಸುತ್ತಿದ್ದರೆ, ಈ ಮಾರ್ಗವನ್ನು ಆಯ್ಕೆ ಮಾಡುತ್ತೇನೆಯೇ?)
  - Define kill criteria in advance—conditions under which you will stop. (ಮುಕ್ತಾಯದ ಮಾನದಂಡಗಳನ್ನು ಮುಂಚಿತವಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸಿ—ಯಾವ ಪರಿಸ್ಥಿತಿಗಳಲ್ಲಿ ನೀವು ನಿಲ್ಲಿಸುತ್ತೀರಿ.)
  - Evaluate the marginal decision—what do I gain or lose from here forward? (ಅಂಚಿನ ನಿರ್ಧಾರವನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡಿ: ಇಲ್ಲಿಂದ ಮುಂದೆ ನಾನು ಏನು ಪಡೆಯುತ್ತೇನೆ ಅಥವಾ ಕಳೆದುಕೊಳ್ಳುತ್ತೇನೆ?)

ask_yourself:
  - Am I continuing because of future value, or to justify past investment? (ನಾನು ಭವಿಷ್ಯದ ಮೌಲ್ಯಕ್ಕಾಗಿ ಮುಂದುವರಿಯುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ಹಿಂದಿನ ಹೂಡಿಕೆಯನ್ನು ಸಮರ್ಥಿಸಲು?)
  - What would I advise a friend who was in my position from scratch? (ನನ್ನ ಸ್ಥಾನದಲ್ಲಿರುವ ಸ್ನೇಹಿತನಿಗೆ ನಾನು ಮೊದಲಿನಿಂದಲೂ ಏನು ಸಲಹೆ ನೀಡುತ್ತೇನೆ?)

in_more_detail: |
  ಮುಳುಗಿದ ವೆಚ್ಚಗಳು ಹಿಂದಿನ ವೆಚ್ಚಗಳಾಗಿವೆ, ಅವುಗಳನ್ನು ಮರಳಿ ಪಡೆಯಲು ಸಾಧ್ಯವಿಲ್ಲ. ತರ್ಕಬದ್ಧ ನಿರ್ಧಾರ
  ಮಾಡುವಿಕೆಯು ಅವುಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತದೆ—ಭವಿಷ್ಯದ ವೆಚ್ಚಗಳು ಮತ್ತು ಲಾಭಗಳು ಮಾತ್ರ ಮುಖ್ಯ. ಆದರೆ ನಾವು ನಮ್ಮ ಹೂಡಿಕೆಗಳೊಂದಿಗೆ
  ಭಾವನಾತ್ಮಕವಾಗಿ ಬದ್ಧರಾಗಿರುತ್ತೇವೆ. ನಾವು ಆನಂದಿಸದ ಊಟವನ್ನು ಪೂರ್ಣಗೊಳಿಸುತ್ತೇವೆ, ನಮಗೆ ಇಷ್ಟವಿಲ್ಲದ ಸಿನಿಮಾದಲ್ಲಿಯೇ
  ಇರುತ್ತೇವೆ, ಮತ್ತು ಅರ್ಥವಿಲ್ಲದ ಯೋಜನೆಗಳನ್ನು ಮುಂದುವರಿಸುತ್ತೇವೆ. ನಾವು ಹಾಕಿದ್ದನ್ನು "ವ್ಯರ್ಥಮಾಡಲು" ಬಯಸುವುದಿಲ್ಲ,
  ಆದರೆ ಮುಂದುವರಿಯುವುದು ಆಗಾಗ್ಗೆ ಹೆಚ್ಚು ವ್ಯರ್ಥ ಮಾಡುತ್ತದೆ.

  ಹಣ ಮಾತ್ರವಲ್ಲದೆ, ಸಮಯ, ಪ್ರಯತ್ನ, ಅಥವಾ ಗುರುತನ್ನು ಹೂಡಿಕೆ ಮಾಡಿದಾಗ ಈ ತಪ್ಪುಗ್ರಹಿಕೆಯು ವಿಶೇಷವಾಗಿ ಬಲವಾಗಿರುತ್ತದೆ.
  ನಾವು ತಪ್ಪಾಗಿದ್ದೇವೆ ಎಂದು ಒಪ್ಪಿಕೊಳ್ಳುವುದು ವೆಚ್ಚದಾಯಕವೆಂದು ಅನಿಸಬಹುದು, ಆದ್ದರಿಂದ ನಾವು ಇನ್ನಷ್ಟು ಹೂಡಿಕೆ ಮಾಡುತ್ತೇವೆ.

why_this_is_important: |
  ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆಯನ್ನು ಗುರುತಿಸುವುದು ನಷ್ಟಗಳನ್ನು ಕಡಿಮೆ ಮಾಡಲು, ಅಗತ್ಯವಿದ್ದಾಗ ದಿಕ್ಕನ್ನು
  ಬದಲಾಯಿಸಲು, ಮತ್ತು ಹಿಂದಿನ ಹೂಡಿಕೆಯ ಬದಲಿಗೆ ಭವಿಷ್ಯದ ಮೌಲ್ಯದ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು
  ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಯೋಜನೆಗಳು, ವೃತ್ತಿಗಳು ಮತ್ತು ಸಂಬಂಧಗಳಿಗೆ ಅತ್ಯಗತ್ಯ.

when_to_use:
  - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
  - ಹೂಡಿಕೆ
  - ವೃತ್ತಿ_ಬದಲಾವಣೆಗಳು
  - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    "ನಾವು ಈಗಲೇ ನಿಲ್ಲಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ—ನಾವು ಈಗಾಗಲೇ X ಖರ್ಚು ಮಾಡಿದ್ದೇವೆ" ಭವಿಷ್ಯದ ಲಾಭಗಳು ಮುಂದುವರಿಯುವುದನ್ನು
    ಸಮರ್ಥಿಸದಿದ್ದಾಗ.
  escalation_of_commitment: |
    ಹಿಂದಿನ ಹೂಡಿಕೆಯನ್ನು ಸಮರ್ಥಿಸಲು ಅಥವಾ "ಉಳಿಸಲು" ಇನ್ನಷ್ಟು ಹೂಡಿಕೆ ಮಾಡುವುದು.
  identity_investment: |
    ವೈಫಲ್ಯವನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುವುದು ಸ್ವಯಂ-ಚಿತ್ರಣಕ್ಕೆ ಬೆದರಿಕೆ ಹಾಕುತ್ತದೆ ಎಂಬ ಕಾರಣಕ್ಕೆ ಮುಂದುವರಿಯುವುದು.
  ignoring_marginal_analysis: |
    ಒಟ್ಟು ವೆಚ್ಚದ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವುದು, ಹೆಚ್ಚುವರಿ ವೆಚ್ಚ ಮತ್ತು ಲಾಭದ ಆಧಾರದ ಮೇಲೆ ಅಲ್ಲ.

examples:
  projects: |
    "ನಾವು ಈಗಾಗಲೇ 6 ತಿಂಗಳು ಕೆಲಸ ಮಾಡಿದ್ದೇವೆ" ಎಂಬ ಕಾರಣಕ್ಕೆ ವಿಫಲವಾದ ಯೋಜನೆಯನ್ನು ಮುಂದುವರಿಸುವುದು,
    ನಷ್ಟವನ್ನು ಕಡಿಮೆ ಮಾಡುವುದು ತರ್ಕಬದ್ಧವಾಗಿದ್ದಾಗ.
  relationships: |
    "ನಾವು 5 ವರ್ಷಗಳಿಂದ ಒಟ್ಟಿಗೆ ಇದ್ದೇವೆ" ಎಂಬ ಕಾರಣಕ್ಕೆ ಸಂಬಂಧದಲ್ಲಿಯೇ ಉಳಿಯುವುದು, ಭವಿಷ್ಯವನ್ನು ಮೌಲ್ಯಮಾಪನ
    ಮಾಡುವ ಬದಲು.
  careers: |
    ನೀವು ಪದವಿ ಅಥವಾ ಅನುಭವದ ವರ್ಷಗಳಲ್ಲಿ ಹೂಡಿಕೆ ಮಾಡಿದ್ದೀರಿ ಎಂಬ ಕಾರಣಕ್ಕೆ ನಿಮಗೆ ಇಷ್ಟವಿಲ್ಲದ ವೃತ್ತಿಯಲ್ಲಿಯೇ
    ಉಳಿಯುವುದು.
  investments: |
    "ಸಮಾನ ಸ್ಥಾನಕ್ಕೆ ಮರಳಲು" ನಷ್ಟದ ಷೇರುಗಳನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುವುದು, ಉತ್ತಮ ಅವಕಾಶಗಳಿಗೆ ಮರುಹಂಚಿಕೆ
    ಮಾಡುವ ಬದಲು.

real_world_implications: |
  ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆ ವ್ಯರ್ಥ ಸಂಪನ್ಮೂಲಗಳು, ದೀರ್ಘಕಾಲದ ವೈಫಲ್ಯಗಳು ಮತ್ತು ತಪ್ಪಿದ ಅವಕಾಶಗಳಿಗೆ
  ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ವ್ಯಕ್ತಿಗಳು, ಸಂಸ್ಥೆಗಳು ಮತ್ತು ಸರ್ಕಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
  ಅದನ್ನು ಮೀರುವುದು ಸ್ಪಷ್ಟವಾದ ನಿರ್ಧಾರದ ಚೌಕಟ್ಟುಗಳನ್ನು ಬಯಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ನಿಮ್ಮ ಸಂಬಂಧಗಳು ಅಥವಾ ಸಹಯೋಗಗಳಲ್ಲಿ ಹಿಂದಿನ ಹೂಡಿಕೆಯ ಕಾರಣಕ್ಕೆ ಇನ್ನು ಮುಂದೆ ನಿಮಗೆ ಪ್ರಯೋಜನವಾಗದಿದ್ದರೂ
    ಮುಂದುವರಿಯಬೇಡಿ. ಭವಿಷ್ಯದ ಮೌಲ್ಯವನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡಿ.
  collaborative_learning_initiative: |
    ಯೋಜನೆಗಳಿಗೆ "ಮುಕ್ತಾಯದ ಮಾನದಂಡಗಳನ್ನು" ರಚಿಸಿ—ಹಿಂದಿನ ಹೂಡಿಕೆಯನ್ನು ಲೆಕ್ಕಿಸದೆ ನೀವು ನಿಲ್ಲಿಸುವ ಪರಿಸ್ಥಿತಿಗಳು.
    "ಮೊದಲಿನಿಂದ" ಎಂಬ ದೃಷ್ಟಿಕೋನದಿಂದ ಯೋಜನೆಗಳನ್ನು ನಿಯಮಿತವಾಗಿ ಪರಿಶೀಲಿಸಿ.

how_can_this_be_misapplied:
  quitting_too_early: |
    ಫಲ ನೀಡಲು ಹೆಚ್ಚು ಸಮಯ ಬೇಕಾದ ವಿಷಯಗಳನ್ನು ತ್ಯಜಿಸಲು "ಮುಳುಗಿದ ವೆಚ್ಚ"ವನ್ನು ನೆಪವಾಗಿ ಬಳಸುವುದು.
  undervaluing_consistency: |
    ಕೆಲವು ಬದ್ಧತೆಗಳು (ಉದಾ., ಸಂಬಂಧಗಳು, ಖ್ಯಾತಿ) ಸ್ಥಿರತೆಯಲ್ಲಿ ಮೌಲ್ಯವನ್ನು ಹೊಂದಿವೆ, ಇದನ್ನು ಶುದ್ಧ ಅಂಚಿನ
    ವಿಶ್ಲೇಷಣೆಯು ತಪ್ಪಿಸುತ್ತದೆ.
  cold_rationality: |
    ಭಾವನಾತ್ಮಕ ಬದ್ಧತೆಯನ್ನು ಅತಾರ್ಕಿಕವೆಂದು ತಳ್ಳಿಹಾಕುವುದು, ಅದು ನಿಜವಾದ ಮೌಲ್ಯಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸಬಹುದು.
  analysis_paralysis: |
    ಉತ್ತರ ಸ್ಪಷ್ಟವಾಗಿದ್ದಾಗ ಮುಂದುವರಿಯಬೇಕೆ ಅಥವಾ ಬೇಡವೇ ಎಂದು ಅತಿಯಾಗಿ ಚಿಂತಿಸುವುದು.

