# ಜ್ಞಾನದ ಶಾಪ
# ಮಾನಸಿಕ ಮಾದರಿ / ಅರಿವಿನ ಪಕ್ಷಪಾತ - ಉದಾಹರಣೆ ನಮೂದು

id: curse_of_knowledge
name: ಜ್ಞಾನದ ಶಾಪ

quick_introduction: |
  ಒಂದು ವಿಷಯ ಗೊತ್ತಾದ ನಂತರ, ಅದು ಗೊತ್ತಿಲ್ಲದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ಊಹಿಸಲು ಇರುವ ಕಷ್ಟವೇ ಜ್ಞಾನದ ಶಾಪ. ಪರಿಣಿತರು ಆರಂಭಿಕರಿಗೆ ಕಲಿಸಲು ಹೆಣಗಾಡುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ಆರಂಭಿಕರ ದೃಷ್ಟಿಕೋನವನ್ನು ಮರುಸೃಷ್ಟಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ. ಒಮ್ಮೆ ನಿಮಗೆ ಗೊತ್ತಾದ ನಂತರ, ನಿಮಗೆ ಗೊತ್ತಿರದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಮರೆತುಬಿಡುತ್ತೀರಿ.

one_liner: ನಿಮಗೆ ಏನಾದರೂ ಗೊತ್ತಾದ ನಂತರ, ನಿಮಗೆ ಗೊತ್ತಿರದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಮರೆತುಬಿಡುತ್ತೀರಿ.

try_this:
  - ವಿವರಿಸುವಾಗ, ಮೊದಲ ತತ್ವಗಳಿಂದ ಪ್ರಾರಂಭಿಸಿ - ನಿಮ್ಮ ಪ್ರೇಕ್ಷಕರಿಗೆ ಏನೂ ಗೊತ್ತಿಲ್ಲ ಎಂದು ಊಹಿಸಿ.
  - ಒಬ್ಬ ಆರಂಭಿಕರಿಗೆ ಹಿಂತಿರುಗಿ ವಿವರಿಸಲು ಕೇಳಿ; ಅವರ ಗೊಂದಲ ನಿಮ್ಮ ಕುರುಡು ತಾಣಗಳನ್ನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ.
  - ನೀವು ಹಂತಗಳನ್ನು ಬಿಟ್ಟುಬಿಡುತ್ತಿದ್ದೀರಿ ಅಥವಾ ಇತರರಿಗೆ ಗೊತ್ತಿಲ್ಲದ ಪದಗಳನ್ನು ಬಳಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.

ask_yourself:
  - ನಾನು ಇತರರು ನನ್ನಂತೆಯೇ ಸಂದರ್ಭವನ್ನು ಹೊಂದಿದ್ದಾರೆಂದು ಊಹಿಸುತ್ತಿದ್ದೇನೆಯೇ?
  - ನನ್ನ ಹಿನ್ನೆಲೆ ಇಲ್ಲದ ಯಾರಾದರೂ ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುತ್ತಾರೆಯೇ?

in_more_detail: |
  ಒಂದು ಶ್ರೇಷ್ಠ ಪ್ರಯೋಗದಲ್ಲಿ, ಒಗಟಿನ ಉತ್ತರ ತಿಳಿದಿದ್ದ ಜನರು ಹಾಡಿನ ತಾಳವನ್ನು ಬಡಿಯುತ್ತಿದ್ದರು ಮತ್ತು ಇತರರು ಊಹಿಸುತ್ತಾರೆ ಎಂದು ನಿರೀಕ್ಷಿಸುತ್ತಿದ್ದರು - ಅದು ಎಷ್ಟು ಸ್ಪಷ್ಟವಾಗಿದೆ ಎಂದು ಅವರು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸಿದ್ದರು. ಬಡಿಯುವವರಿಗೆ ತಮ್ಮ ತಲೆಯಲ್ಲಿ ಹಾಡನ್ನು "ಅಳಿಸಲು" ಸಾಧ್ಯವಾಗಲಿಲ್ಲ. ಜ್ಞಾನವು "ಒಣಗುತ್ತದೆ"; ಅಜ್ಞಾನವನ್ನು ಅನುಕರಿಸುವುದು ಕಷ್ಟ.

  ಈ ಶಾಪವು ಬೋಧನೆ, ಸಂವಹನ, ಉತ್ಪನ್ನ ವಿನ್ಯಾಸ ಮತ್ತು ನಾಯಕತ್ವದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಇತರರು ನಮ್ಮಂತೆಯೇ ಸಂದರ್ಭವನ್ನು ಹೊಂದಿದ್ದಾರೆಂದು ಊಹಿಸುತ್ತೇವೆ. ನಾವು ವಿಶೇಷ ಪದಗಳನ್ನು ಬಳಸುತ್ತೇವೆ. ನಾವು ಹಂತಗಳನ್ನು ಬಿಟ್ಟುಬಿಡುತ್ತೇವೆ. ಜನರು "ಅರ್ಥಮಾಡಿಕೊಳ್ಳದಿದ್ದಾಗ" ನಾವು ಆಶ್ಚರ್ಯಪಡುತ್ತೇವೆ.

why_this_is_important: |
  ಜ್ಞಾನದ ಶಾಪವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಬೋಧನೆ, ಸಂವಹನ ಮತ್ತು ಉತ್ಪನ್ನ ವಿನ್ಯಾಸ ಸುಧಾರಿಸುತ್ತದೆ. ಇದು ನಿಮ್ಮಲ್ಲಿರುವ ಸ್ಥಳಕ್ಕಿಂತ, ಜನರು ಇರುವ ಸ್ಥಳದಲ್ಲಿ ಅವರನ್ನು ಭೇಟಿಯಾಗಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಪರಿಣಾಮಕಾರಿ ಜ್ಞಾನ ವರ್ಗಾವಣೆಗೆ ಅತ್ಯಗತ್ಯ.

when_to_use:
  - ಕಲಿಕೆ
  - ನಾಯಕತ್ವ
  - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ
  - ಸಂಬಂಧ_ಗಳ_ನಿರ್ಮಾಣ

how_can_you_spot_it:
  obvious_to_you: |
    "ಇದು ಸ್ಪಷ್ಟವಾಗಿದೆ" ಎಂದರೆ, ಉತ್ತರ ನಿಮಗೆ ತಿಳಿದಿರುವ ಕಾರಣದಿಂದ ಮಾತ್ರ ಅದು ಸ್ಪಷ್ಟವಾಗಿದೆ.
  jargon_use: |
    ಪ್ರೇಕ್ಷಕರಿಗೆ ಗೊತ್ತಿಲ್ಲದ ಪದಗಳನ್ನು ವ್ಯಾಖ್ಯಾನಿಸದೆ ಬಳಸುವುದು.
  skipped_steps: |
    ನೀವು ಬಿಟ್ಟುಬಿಟ್ಟದ್ದನ್ನು ಇತರರು ತುಂಬುತ್ತಾರೆ ಎಂದು ಊಹಿಸುವುದು.
  frustration_with_learners: |
    "ಅವರಿಗೆ ಇದು ಹೇಗೆ ಕಾಣುತ್ತಿಲ್ಲ?" ಎಂಬುದು, ಅವರು ನಿಮ್ಮ ಸಂದರ್ಭವನ್ನು ಹೊಂದಿಲ್ಲದಿದ್ದಾಗ.

examples:
  teaching: |
    ಒಬ್ಬ ಗಣಿತ ಪ್ರಾಧ್ಯಾಪಕರು ತಮಗೆ "ಸ್ಪಷ್ಟವಾಗಿರುವ" ಆದರೆ ವಿದ್ಯಾರ್ಥಿಗಳಿಗೆ ಅಗತ್ಯವಿರುವ ಹಂತಗಳನ್ನು ಬಿಟ್ಟುಬಿಡುತ್ತಾರೆ.
  product_design: |
    ವಿನ್ಯಾಸಕರು ತಮಗೆ ಅರ್ಥವಾಗುವ ಇಂಟರ್ಫೇಸ್‌ಗಳನ್ನು ರಚಿಸುತ್ತಾರೆ ಆದರೆ ಹೊಸ ಬಳಕೆದಾರರನ್ನು ಗೊಂದಲಗೊಳಿಸುತ್ತಾರೆ.
  onboarding: |
    ಅನುಭವಿ ನೌಕರರು ಹೊಸದಾಗಿ ಸೇರಿದವರಿಗೆ ಏನು ಗೊತ್ತಿಲ್ಲ ಎಂಬುದನ್ನು ಮರೆತುಬಿಡುತ್ತಾರೆ ಮತ್ತು ಅಸಮರ್ಪಕ ತರಬೇತಿಯನ್ನು ನೀಡುತ್ತಾರೆ.
  writing: |
    ಲೇಖಕರು ಓದುಗರು ಒಂದೇ ಹಿನ್ನೆಲೆಯನ್ನು ಹೊಂದಿದ್ದಾರೆಂದು ಊಹಿಸುತ್ತಾರೆ ಮತ್ತು ಅಗತ್ಯ ಸಂದರ್ಭವನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತಾರೆ.

real_world_implications: |
  ಜ್ಞಾನದ ಶಾಪವು ಸಂವಹನ ಅಂತರಗಳು, ವಿಫಲ ಉತ್ಪನ್ನಗಳು ಮತ್ತು ಪರಿಣಾಮಕಾರಿಯಲ್ಲದ ಬೋಧನೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಪರಿಣಿತರು ಏಕೆ ಕೆಟ್ಟ ಶಿಕ್ಷಕರಾಗಬಹುದು ಎಂಬುದಕ್ಕೆ ಇದು ಒಂದು ಕಾರಣ. ಅದನ್ನು ನಿವಾರಿಸಲು ಪ್ರೇಕ್ಷಕರ ದೃಷ್ಟಿಕೋನವನ್ನು ಅಳವಡಿಸಿಕೊಳ್ಳಲು ಸಕ್ರಿಯ ಪ್ರಯತ್ನ ಬೇಕಾಗುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ವಿವರಿಸುವಾಗ, ಇತರ ವ್ಯಕ್ತಿಯ ಮಟ್ಟದಿಂದ ಪ್ರಾರಂಭಿಸಿ. "ಅವರಿಗೆ ಈಗಾಗಲೇ ಏನು ಗೊತ್ತು?" ಎಂದು ಕೇಳಿ. ನಿಮ್ಮ ಹಿನ್ನೆಲೆ ಇಲ್ಲದವರೊಂದಿಗೆ ನಿಮ್ಮ ಸಂವಹನವನ್ನು ಪರೀಕ್ಷಿಸಿ.
  collaborative_learning_initiative: |
    "ನಾನು ಐದು ವರ್ಷದವನಂತೆ ವಿವರಿಸು" ವ್ಯಾಯಾಮಗಳನ್ನು ಬಳಸಿ. ಪರಿಣಿತರು ಆರಂಭಿಕರಿಗೆ ಕಲಿಸಲು ಮತ್ತು ಪ್ರತಿಕ್ರಿಯೆ ಪಡೆಯಲು ಕೇಳಿ. ಯಾವುದೇ ಪೂರ್ವ ಜ್ಞಾನವನ್ನು ಊಹಿಸದ ದಾಖಲಾತಿಗಳನ್ನು ರಚಿಸಿ. ಸಹಪಾಠಿ ಬೋಧನೆಯನ್ನು ಬಳಸಿ - ಇತ್ತೀಚೆಗೆ ಕಲಿತವರು ಆರಂಭಿಕರ ದೃಷ್ಟಿಕೋನವನ್ನು ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತಾರೆ.

how_can_this_be_misapplied:
  oversimplification: |
    ಅನಿಶ್ಚಿತತೆ ಅಥವಾ ಕೀಳರಿಮೆಯ ಮಟ್ಟಕ್ಕೆ ಸರಳೀಕರಿಸುವುದು.
  false_assumption: |
    ಇತರರು ತಮ್ಮಿಗಿಂತ ಕಡಿಮೆ ತಿಳಿದಿದ್ದಾರೆ ಎಂದು ಊಹಿಸುವುದು - ಇದು ಕೂಡ ಕ್ಯಾಲಿಬ್ರೇಶನ್ ವೈಫಲ್ಯವಾಗಿದೆ.
  one_size_fits_all: |
    ಎಲ್ಲಾ ಪ್ರೇಕ್ಷಕರಿಗೆ ಒಂದೇ ಮಟ್ಟದ ವಿವರಣೆ ಅಗತ್ಯವಿಲ್ಲ; ಪ್ರೇಕ್ಷಕರಿಗೆ ತಕ್ಕಂತೆ ರೂಪಿಸಿ.
  avoiding_complexity: |
    ಕೆಲವು ವಿಷಯಗಳು ಸಂಕೀರ್ಣವಾಗಿರುತ್ತವೆ; ಜ್ಞಾನದ ಶಾಪ ಎಂದರೆ ನಾವು ತಾಂತ್ರಿಕ ಭಾಷೆಯನ್ನು ಸೂಕ್ತವಾದಾಗ ಬಳಸಬಾರದು ಎಂದಲ್ಲ.

