how_can_you_spot_it:
  overestimated_influence: |
    ನಮ್ಮ ಕ್ರಿಯೆಗಳು ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ ಎಂದು ನಂಬುವುದು, ಆದರೆ ವಾಸ್ತವದಲ್ಲಿ ಅವು ಬೀರುವುದಿಲ್ಲ.
  ritual_superstition: |
    ನಮ್ಮ ನಡವಳಿಕೆಗಳು ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ (ಅದೃಷ್ಟದ ಶರ್ಟ್, ಪಂದ್ಯದ ಮೊದಲು ಅಭ್ಯಾಸ) ಆದರೆ ವಾಸ್ತವದಲ್ಲಿ ಅವು ಬೀರುವುದಿಲ್ಲ.
  choice_illusion: |
    ಆಯ್ಕೆ ಮಾಡುವುದರಿಂದ ನಮಗೆ ನಿಯಂತ್ರಣ ಸಿಗುತ್ತದೆ ಎಂದು ಅನಿಸುವುದು, ಆದರೆ ಆಯ್ಕೆಯು ಫಲಿತಾಂಶದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುವುದಿಲ್ಲ.
  action_bias: |
    "ಕಾದು ನೋಡುವ" ಬದಲಿಗೆ "ಏನಾದರೂ ಮಾಡುವ" ಆದ್ಯತೆ, ಕ್ರಿಯೆಯು ಸಹಾಯ ಮಾಡದಿದ್ದರೂ ಸಹ.

examples:
  gambling: |
    ಯಾದೃಚ್ಛಿಕ ಆಯ್ಕೆಗಿಂತ ಲಾಭಾಂಶ ಸಂಖ್ಯೆಗಳನ್ನು ಆರಿಸುವುದು ಹೆಚ್ಚು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿದೆ ಎಂದು ಅನಿಸುತ್ತದೆ—ಸಂಭವನೀಯತೆಗಳು ಒಂದೇ.
  investing: |
    ಸಕ್ರಿಯ ವ್ಯಾಪಾರಿಗಳು ಮಾರುಕಟ್ಟೆಯನ್ನು ಸೋಲಿಸುವ ತಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತಾರೆ; ಹೆಚ್ಚಿನವರು ವೆಚ್ಚಗಳ ನಂತರ ಕಡಿಮೆ ಕಾರ್ಯಕ್ಷಮತೆ ತೋರುತ್ತಾರೆ.
  management: |
    ನಾಯಕರು ಸಂಸ್ಥೆಯ ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ತಮ್ಮ ಪ್ರಭಾವವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತಾರೆ; ಅನೇಕ ಅಂಶಗಳು ಅವರ ನಿಯಂತ್ರಣಕ್ಕೆ ಮೀರಿದವು.
  sports: |
    ಅಭಿಮಾನಿಗಳು ತಮ್ಮ ಚಪ್ಪಾಳೆಯು ಆಟದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ ಎಂದು ನಂಬುತ್ತಾರೆ; ಆಟಗಾರರು ಅದೃಷ್ಟದ ಆಚರಣೆಗಳನ್ನು ಹೊಂದಿದ್ದಾರೆ.

real_world_implications: |
  ನಿಯಂತ್ರಣದ ಭ್ರಮೆಯು ಅಪಾಯ ಎದುರಿಸುವುದು, ನಿರರ್ಥಕ ಪ್ರಯತ್ನಗಳಲ್ಲಿ ಮುಂದುವರಿಯುವುದು ಮತ್ತು ಫಲಿತಾಂಶಗಳನ್ನು ಕಾರಣವಾಗಿಸುವುದರ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಕ್ರಿಯೆಗೆ ಪ್ರೇರೇಪಿಸಬಹುದು (ಕೆಲವೊಮ್ಮೆ ಉಪಯುಕ್ತ) ಆದರೆ ವ್ಯರ್ಥ ಪ್ರಯತ್ನ ಮತ್ತು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸಕ್ಕೂ ಕಾರಣವಾಗಬಹುದು. ನಿಖರತೆಯು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ.

professional_application:
  networking_and_relationship_building: |
    ನೀವು ಏನು ನಿಯಂತ್ರಿಸಬಹುದು ಮತ್ತು ಏನನ್ನು ನಿಯಂತ್ರಿಸಲಾಗುವುದಿಲ್ಲ ಎಂಬುದನ್ನು ಗುರುತಿಸಿ. ಪ್ರಭಾವಕ್ಕೆ ಒಳಪಟ್ಟಿರುವ ಅಂಶಗಳ ಮೇಲೆ ಶಕ್ತಿಯನ್ನು ಕೇಂದ್ರೀಕರಿಸಿ. ನೀವು ಕಾರಣವಾಗದ ಫಲಿತಾಂಶಗಳಿಗೆ (ಅಥವಾ ನೀವು ತಡೆಯಲಾಗದ ಫಲಿತಾಂಶಗಳಿಗೆ) ದೂಷಿಸಬೇಡಿ.
  collaborative_learning_initiative: |
    ಯೋಜನೆಯಲ್ಲಿ, ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿರುವ ಮತ್ತು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಡದ ಅಂಶಗಳನ್ನು ಪ್ರತ್ಯೇಕಿಸಿ. ಆರಂಭಿಕ ಗೆಲುವುಗಳಿಂದ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಪ್ಪಿಸಿ. ನಿರೀಕ್ಷೆಗಳನ್ನು ನಿಖರಗೊಳಿಸಲು ಸಂಭವನೀಯ ಚಿಂತನೆಯನ್ನು ಬಳಸಿ.

how_can_this_be_misapplied:
  learned_helplessness: |
    ನಾವು ನಿಜವಾಗಿಯೂ ಗಮನಾರ್ಹವಾದ ಪ್ರಭಾವವನ್ನು ಹೊಂದಿರುವಾಗ, ನಮಗೆ ಯಾವುದೇ ನಿಯಂತ್ರಣವಿಲ್ಲ ಎಂದು ನಂಬಲು ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
  dismissing_agency: |
    "ಇದೆಲ್ಲ ಅದೃಷ್ಟ" ಎಂದು ಹೇಳುವುದು, ಆದರೆ ಅನೇಕ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಕೌಶಲ್ಯ ಮತ್ತು ಪ್ರಯತ್ನವು ಮುಖ್ಯವಾಗಿರುತ್ತದೆ.
  false_fatalism: |
    ಕ್ರಿಯೆಯಿಲ್ಲದಿರುವುದನ್ನು ಸಮರ್ಥಿಸಲು ನಿಯಂತ್ರಣದ ಭ್ರಮೆಯನ್ನು ಬಳಸುವುದು.
  one_size_fits_all: |
    ನಿಯಂತ್ರಣವು ಡೊಮೇನ್‌ನಿಂದ ಬದಲಾಗುತ್ತದೆ; ಕೆಲವು ಪರಿಸ್ಥಿತಿಗಳು ಇತರರಿಗಿಂತ ಹೆಚ್ಚು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿರುತ್ತವೆ.

