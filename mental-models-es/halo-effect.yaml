id: halo_effect
name: Efecto Halo

quick_introduction: |
  El efecto halo es la tendencia a dejar que un rasgo o impresión positiva
  influya en nuestro juicio general de una persona. Si nos gusta la
  apariencia de alguien, podemos asumir que es competente. Si admiramos una
  habilidad, asumimos que es buena en todo. Un atributo positivo proyecta un
  "halo" sobre el resto.

one_liner: Un rasgo positivo proyecta un halo sobre nuestro juicio completo de una persona.

try_this:
  - Evalúa los rasgos de forma independiente; no dejes que una fortaleza implique otras.
  - Observa cuándo el atractivo, el carisma o un éxito tiñen tu visión.
  - Pregunta: ¿Juzgaría a esta persona igual sin ese atributo positivo?

ask_yourself:
  - ¿Estoy generalizando de un rasgo a toda la persona?
  - ¿Vería debilidades si no estuviera impresionado por una fortaleza?

in_more_detail: |
  Edward Thorndike observó que los oficiales militares que calificaban alto a los soldados en un rasgo tendían a calificarlos alto en otros, incluso en rasgos no relacionados. Generalizamos de lo particular a lo general. El atractivo, el carisma o el éxito en un dominio crean un halo que se extiende.

  Lo inverso, un rasgo negativo que tiñe todo, a veces se llama "efecto cuerno". Ambos son formas de generalización injustificada. El efecto halo afecta la contratación, las revisiones de desempeño y las impresiones cotidianas.

why_this_is_important: |
  Reconocer el efecto halo te ayuda a hacer evaluaciones más precisas y a evitar generalizaciones excesivas. Es esencial para una contratación justa, gestión del desempeño y evaluación de relaciones. Una fortaleza no implica todas las fortalezas.

when_to_use:
  - toma_de_decisiones
  - liderazgo
  - construccion_de_relaciones
  - contratacion

how_can_you_spot_it:
  trait_spillover: |
    Un rasgo positivo influye en el juicio de rasgos no relacionados.
  attractiveness_bias: |
    Las personas atractivas son calificadas más alto en competencia, confiabilidad, etc.
  success_generalization: |
    El éxito en un área lleva a asumir competencia en otras.
  first_impression_dominance: |
    Una impresión positiva temprana tiñe toda la evaluación posterior.

examples:
  hiring: |
    Se asume que un candidato elocuente y agradable es técnicamente fuerte, incluso cuando las habilidades no están relacionadas.
  performance_reviews: |
    Un proyecto destacado lleva a altas calificaciones en todas las dimensiones.
  politics: |
    El carisma de un político lleva a asumir competencia en políticas.
  branding: |
    El éxito de una empresa en un producto lleva a asumir la calidad de todos los productos.

real_world_implications: |
  El efecto halo distorsiona la contratación, la evaluación del desempeño y las decisiones de inversión. Favorece a los atractivos, elocuentes y ya exitosos. Reducirlo requiere una evaluación estructurada y la separación de dimensiones.

professional_application:
  networking_and_relationship_building: |
    Evalúa a las personas según dimensiones específicas en lugar de una impresión general. Ten en cuenta cuándo un rasgo positivo influye en tu juicio sobre los demás. Busca evidencia que lo contradiga.
  collaborative_learning_initiative: |
    Utiliza entrevistas y evaluaciones estructuradas que califiquen las dimensiones de forma independiente. Calibra las calificaciones entre los evaluadores. Reduce la dependencia de una "intuición" general.

how_can_this_be_misapplied:
  dismissing_all_positive_impressions: |
    No todas las impresiones positivas son un halo; a veces las personas son genuinamente fuertes en varias dimensiones.
  false_objectivity: |
    Asumir que podemos eliminar por completo el efecto halo; es generalizado y parcialmente automático.
  overcorrection: |
    Ir al extremo opuesto y asumir que las personas atractivas o carismáticas son menos competentes.
  stereotyping: |
    Usar el "efecto halo" para descartar atributos positivos legítimos.

