# Pensamiento de suma cero
# Modelo Mental / Sesgo Cognitivo - Entrada de Ejemplo

id: zero_sum_thinking
name: Pensamiento de suma cero

quick_introduction: |
  El pensamiento de suma cero es la creencia de que la ganancia de una persona debe ser la pérdida de otra, que los recursos son fijos y que cualquier ventaja para ti significa una desventaja para mí.
  En realidad, muchas situaciones son de suma positiva: ambas partes pueden ganar.

one_liner: Tu ganancia no tiene por qué ser mi pérdida—muchas situaciones son de suma positiva.

try_this:
  - Preguntar: ¿Podemos expandir el pastel? ¿Es esto realmente de suma cero?
  - Buscar la cooperación antes de asumir la competencia.
  - Notar cuándo estás tratando una situación como de pastel fijo cuando no lo es.

ask_yourself:
  - ¿Estoy asumiendo un pastel fijo cuando podríamos expandirlo?
  - ¿La cooperación crearía más valor que la competencia?

in_more_detail: |
  En un juego de suma cero, el total es fijo: tu ganancia es mi pérdida. En situaciones de suma positiva,
  la cooperación crea valor. El comercio, la innovación y la construcción de relaciones
  suelen ser de suma positiva. El pensamiento de suma cero conduce a una competencia innecesaria,
  oportunidades perdidas de cooperación y rivalidad destructiva.

  El sesgo es común en negociaciones, política y dinámicas organizacionales.
  Asume un pastel fijo cuando el pastel a menudo se puede expandir. Puede volverse
  autocumplido: si tratas a los demás como adversarios, se convierten en adversarios.

why_this_is_important: |
  Reconocer el pensamiento de suma cero abre oportunidades para la cooperación y la creación de valor.
  Mejora la negociación, reduce el conflicto y permite resultados en los que todos ganan.
  Muchas de las mejores oportunidades son de suma positiva.

when_to_use:
  - negociacion
  - liderazgo
  - construccion_de_relaciones
  - toma_de_decisiones

how_can_you_spot_it:
  fixed_pie_assumption: |
    "Si ellos ganan, yo pierdo" cuando la situación podría permitir que ambos ganen.
  competitive_ framing: |
    Enmarcar automáticamente las situaciones como nosotros contra ellos.
  envy_of_others_gains: |
    Resentir el éxito de los demás como si disminuyera el tuyo.
  missed_cooperation: |
    No ver oportunidades de colaboración que beneficiarían a todos.

examples:
  negotiation: |
    Asumir que un mejor trato para la otra parte significa un peor trato para
    ti, cuando las soluciones creativas a menudo expanden el valor para ambos.
  salary: |
    "Si mi colega recibe un aumento, hay menos para mí" cuando los presupuestos pueden ser
    flexibles o los aumentos pueden justificarse por el valor creado.
  politics: |
    "Las ganancias de su partido son nuestras pérdidas" cuando muchos resultados políticos podrían
    beneficiar a múltiples grupos.
  career: |
    "Su promoción significa menos oportunidades para mí" cuando el crecimiento organizacional
    puede crear más oportunidades para todos.

real_world_implications: |
  El pensamiento de suma cero alimenta el conflicto, limita la cooperación y causa oportunidades perdidas.
  A menudo es incorrecto en economía, relaciones e innovación. Cambiar a un marco de suma positiva
  mejora los resultados.

professional_application:
  networking_and_relationship_building: |
    Busca formas de crear valor para los demás: su éxito puede crear
    oportunidades para ti. Construye relaciones donde ambas partes se beneficien.
  collaborative_learning_initiative: |
    Enmarca los objetivos del equipo como de suma positiva: éxito compartido, expandiendo el pastel.
    Fomenta la colaboración por encima de la competencia interna.

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    Algunas situaciones son de suma cero (por ejemplo, una sola promoción, un presupuesto fijo).
    Pretender lo contrario puede ser ingenuo.
  naive_cooperation: |
    Asumir que todos cooperarán cuando algunos actores son genuinamente
    adversarios.
  undervaluing_competition: |
    La competencia puede impulsar la mejora; no toda rivalidad es destructiva.
  exploitation: |
    Usar un marco de "suma positiva" para extraer valor de otros que no se benefician.

related_content:
