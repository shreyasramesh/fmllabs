id: probabilistic_thinking
name: Pensamiento Probabilístico

quick_introduction: |
  El pensamiento probabilístico es el hábito de razonar en términos de probabilidades en
  lugar de certezas. En lugar de "¿esto sucederá?", preguntamos "¿qué tan probable es esto?"
  Abraza la incertidumbre y la utiliza para tomar mejores decisiones.

one_liner: Piensa en probabilidades, no en certezas; abraza la incertidumbre.

try_this:
  - Reemplaza "¿sucederá?" con "¿qué tan probable es?"
  - Considera múltiples escenarios y asigna probabilidades aproximadas.
  - Actualiza tus creencias a medida que llega nueva evidencia.

ask_yourself:
  - ¿Estoy pensando en términos binarios cuando las probabilidades serían más precisas?
  - ¿Cuál es el rango de resultados plausibles?

in_more_detail: |
  La mayoría de los resultados del mundo real son inciertos. El pensamiento probabilístico reemplaza el
  sí/no binario con creencias graduadas. Implica considerar múltiples escenarios,
  asignar probabilidades aproximadas y actualizar a medida que llega la evidencia. Es lo opuesto
  a la excesiva confianza y al pensamiento en blanco y negro.

  Las prácticas clave incluyen: pensar en rangos, considerar tasas base, actualizar
  creencias con evidencia y distinguir entre riesgo (probabilidades conocidas)
  y incertidumbre (probabilidades desconocidas). Mejora la calibración y
  la calidad de las decisiones.

why_this_is_important: |
  El pensamiento probabilístico reduce la excesiva confianza, mejora la previsión y
  conduce a mejores decisiones bajo incertidumbre. Es esencial para la inversión,
  la estrategia y cualquier dominio donde el futuro sea incierto.

when_to_use:
  - toma_de_decisiones
  - evaluacion_de_riesgos
  - inversion
  - resolucion_de_problemas

how_can_you_spot_it:
  likelihood_language: |
    "Probablemente", "es probable", "es poco probable" en lugar de "sucederá" o "no sucederá".
  scenario_thinking: |
    Considerar múltiples futuros posibles con probabilidades aproximadas.
  calibration: |
    Predicciones que coinciden con las frecuencias reales de los resultados a lo largo del tiempo.
  uncertainty_acknowledgment: |
    Declarar explícitamente lo que no sabes.

examples:
  forecasting: |
    "Creo que hay un 60% de posibilidades de que cumplamos el plazo" en lugar de "Cumpliremos
    el plazo".
  investing: |
    "Esto tiene un 30% de posibilidades de ser 2x y un 70% de posibilidades de ser -50%" en lugar de
    "Esto se disparará".
  strategy: |
    Planificar para múltiples escenarios (el mejor, el base, el peor caso) con probabilidades aproximadas.
  hiring: |
    "Basado en la entrevista, le daría un 70% de probabilidad de que tenga éxito" en lugar de
    "Es una gran contratación".

real_world_implications: |
  El pensamiento probabilístico mejora la calibración, reduce las sorpresas y permite
  una mejor gestión de riesgos. Es fundamental para una previsión y
  una toma de decisiones efectivas bajo incertidumbre.

professional_application:
  networking_and_relationship_building: |
    Comunícate en probabilidades cuando sea apropiado: "Tengo bastante confianza" frente a
    "Estoy seguro". Genera confianza al señalar humildad epistémica.
  collaborative_learning_initiative: |
    Anima a los equipos a expresar incertidumbre. Utiliza mercados de predicción o
    ejercicios de calibración para mejorar el juicio probabilístico.

how_can_this_be_misapplied:
  false_precision: |
    Asignar probabilidades exactas (por ejemplo, 73%) cuando no puedes ser tan preciso.
  analysis_paralysis: |
    No actuar nunca porque "no podemos estar seguros".
  hedging_overuse: |
    Calificar todo hasta el punto de ser inútil.
  dismissing_intuition: |
    Sobrecorregir para ignorar fuertes corazonadas cuando pueden contener información válida.

