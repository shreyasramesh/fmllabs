id: hindsight_bias
name: Sesgo de retrospectiva

quick_introduction: |
  El sesgo de retrospectiva (o el efecto "ya lo sabía") es la tendencia a creer,
  después de que un evento ha ocurrido, que lo habríamos predicho o esperado.
  Reconstruimos el pasado para que los resultados parezcan más inevitables de lo que fueron.

one_liner: Después del hecho, creemos que ya lo sabíamos todo.

try_this:
  - Antes de juzgar decisiones pasadas, pregunta: ¿Qué sabían en ese momento?
  - Registra tus predicciones antes de los resultados; compáralas después.
  - Date cuenta de cuándo haces que el pasado parezca más inevitable de lo que fue.

ask_yourself:
  - ¿Estoy juzgando con información que no estaba disponible en ese momento?
  - ¿Realmente predije esto, o simplemente ahora parece obvio?

in_more_detail: |
  Una vez que conocemos el resultado, parece obvio. Olvidamos la incertidumbre que sentimos
  de antemano. Este sesgo distorsiona el aprendizaje: creemos que "sabíamos" algo cuando no era así,
  por lo que no actualizamos nuestros modelos. También conduce a culpas injustas: "Deberían haberlo visto venir"
  cuando el futuro era genuinamente incierto.

  El sesgo de retrospectiva afecta los análisis post-mortem, los juicios legales y el análisis histórico.
  Juzgamos las decisiones pasadas con información que no estaba disponible en ese momento.

why_this_is_important: |
  Reconocer el sesgo de retrospectiva mejora el aprendizaje de los resultados, la evaluación justa de
  las decisiones y una evaluación de riesgos más precisa. Previene la falsa confianza en nuestras
  capacidades predictivas.

when_to_use:
  - toma_de_decisiones
  - aprendizaje
  - evaluacion_de_riesgos
  - liderazgo

how_can_you_spot_it:
  inevitability_feeling: |
    Después de un evento, se siente como si "tuviera" que suceder.
  reconstructed_certainty: |
    Recordamos haber estado más seguros antes del evento de lo que realmente estábamos.
  blame_for_failure: |
    "Deberían haberlo sabido" cuando el resultado era genuinamente incierto.
  undervaluing_luck: |
    Atribuir resultados a la habilidad o la previsión cuando la suerte jugó un papel.

examples:
  investing: |
    "Sabía que el mercado colapsaría" después de que colapsa, cuando no actuaste sobre ese
    "conocimiento" de antemano.
  project_failures: |
    "Deberíamos haber visto los riesgos" en un análisis post-mortem cuando los riesgos eran genuinamente
    ambiguos.
  elections: |
    Después de un resultado sorpresa, los comentaristas explican por qué fue "obvio" en retrospectiva.
  medical: |
    "Las señales estaban ahí" al diagnosticar una condición rara después del hecho.

real_world_implications: |
  El sesgo de retrospectiva distorsiona la responsabilidad legal, la evaluación del desempeño y el aprendizaje.
  Nos hace demasiado confiados en nuestro juicio e injustos con quienes tomaron
  decisiones razonables con información limitada.

professional_application:
  networking_and_relationship_building: |
    Al evaluar las decisiones pasadas de otros, separa conscientemente lo que se sabía
    entonces de lo que sabes ahora. Evita el "te lo dije" cuando en realidad no predijiste el resultado.
  collaborative_learning_initiative: |
    En los análisis post-mortem, utiliza técnicas de "pre-mortem" o "diario de decisiones" para
    capturar la incertidumbre en el momento de la decisión. Compara la incertidumbre real
    con la reconstrucción retrospectiva.

how_can_this_be_misapplied:
  excusing_all_failures: |
    Desestimar todos los fracasos como "impredecibles" cuando algunos eran previsibles.
  no_accountability: |
    Usar el sesgo de retrospectiva para evitar responsabilizar a las personas por negligencia.
  false_uncertainty: |
    Sobrecambiar para creer que nunca podemos predecir nada.
  undermining_learning: |
    Negarse a extraer lecciones porque "la retrospectiva es 20/20" (es decir, obvia), todavía podemos aprender
    de los resultados.

related_content:
