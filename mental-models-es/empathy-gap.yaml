# yaml-language-server: $schema=../schema/mental-model-schema.json
# Brecha de Empatía
# Modelo Mental / Sesgo Cognitivo - Entrada de Ejemplo

id: empathy_gap
name: Brecha de Empatía

quick_introduction: |
  La brecha de empatía es la dificultad para comprender y predecir los estados
  mentales de los demás cuando nosotros mismos nos encontramos en un estado
  diferente. Cuando estamos tranquilos, subestimamos cómo nos sentiremos
  cuando estemos enfadados o hambrientos. Cuando estamos saciados, subestimamos
  cuánto desearemos comida cuando tengamos hambre.

one_liner: Subestimamos cómo nos sentiremos —y cómo se sienten los demás— en diferentes estados.

try_this:
  - Cuando estés tranquilo, haz compromisos para cuando estés estresado; comprométete de antemano.
  - No juzgues a los demás en un estado en el que tú no estás: hambriento, cansado, asustado.
  - Pregúntate: ¿Estoy proyectando mi estado actual en mi yo futuro o en los demás?

ask_yourself:
  - ¿Estoy subestimando cómo me sentiré en un estado diferente?
  - ¿Entendería mejor a esta persona si estuviera en su estado?

in_more_detail: |
  Tenemos problemas para imaginar cómo nos sentiremos en circunstancias
  diferentes —y cómo se sienten los demás cuando están en estados en los que
  nosotros no nos encontramos actualmente. Una persona sobria subestima el
  atractivo de la adicción. Una persona bien descansada subestima el impacto
  de la privación del sueño. Proyectamos nuestro estado actual en los demás
  y en nuestros yoes futuros.

  La brecha de empatía afecta las decisiones que tomamos para nuestros yoes
  futuros (por ejemplo, comprometernos a hacer ejercicio cuando estamos
  motivados), las decisiones que tomamos para los demás y nuestra capacidad
  para comprender a personas en diferentes estados.

why_this_is_important: |
  Reconocer la brecha de empatía mejora la toma de decisiones para tu yo
  futuro, la empatía hacia los demás y la comprensión de nuestra propia
  variabilidad. Explica por qué hacemos compromisos que no podemos cumplir
  y por qué malinterpretamos a otros en apuros.

when_to_use:
  - toma_de_decisiones
  - construccion_de_relaciones
  - liderazgo
  - resolucion_de_conflictos

how_can_you_spot_it:
  current_state_projection: |
    Asumir que los demás se sienten como nosotros ahora, o que nuestro yo
    futuro se sentirá como nosotros ahora.
  underestimating_emotional_state: |
    "¿Cuál es el gran problema?" cuando no estamos en el estado en el que
    ellos están.
  commitment_failures: |
    Tomar decisiones basadas en la motivación actual que no cumpliremos
    cuando la motivación disminuya.
  misunderstanding_others: |
    Desestimar las experiencias de los demás porque no podemos imaginarlas
    desde nuestro estado actual.

examples:
  hunger: |
    Ir de compras cuando estás saciado —compramos menos de lo que
    querremos cuando tengamos hambre.
  addiction: |
    Los no adictos subestiman la dificultad de dejarlo; los adictos en
    recuperación pueden subestimar el atractivo cuando están consumiendo.
  conflict: |
    Cuando estamos tranquilos, subestimamos cómo reaccionaremos en el
    momento de la confrontación.
  motivation: |
    Inscribirse en una clase de las 6 am cuando estamos motivados —y no
    ir cuando tenemos sueño.

real_world_implications: |
  La brecha de empatía afecta el tratamiento de la adicción, las políticas
  y la comprensión interpersonal. Explica por qué hacemos compromisos que
  rompemos y por qué a menudo no logramos comprender las perspectivas de los
  demás. Es una barrera para la empatía y una buena toma de decisiones.

professional_application:
  networking_and_relationship_building: |
    Cuando alguien está estresado, enfadado o en un estado diferente, no
    asumas que razonará como tú. Intenta imaginar su estado. Al hacer
    compromisos, considera cómo te sentirás cuando la motivación
    disminuya.
  collaborative_learning_initiative: |
    Al planificar, considera cómo se sentirá el equipo cuando esté cansado,
    bajo presión o frustrado. Diseña para esos estados, no solo para el
    estado de planificación motivada.

how_can_this_be_misapplied:
  overattribution: |
    Desestimar toda malinterpretación como "brecha de empatía" cuando a
    veces las personas tienen genuinamente valores diferentes.
  excusing_behavior: |
    "No pudieron evitarlo —brecha de empatía" cuando las personas son
    responsables de gestionar sus estados.
  false_relativism: |
    Asumir que nunca podremos entender a los demás cuando podemos mejorar
    con esfuerzo y experiencia.
  self_excuse: |
    Usar la brecha de empatía para justificar nuestras propias fallas en el
    seguimiento.

related_content:
  - impact_bias
  - hyperbolic_discounting
  - fundamental_attribution_error
  - availability_heuristic
