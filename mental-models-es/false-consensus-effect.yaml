id: false_consensus_effect
name: El efecto del falso consenso

quick_introduction: |
  El efecto del falso consenso es la tendencia a sobreestimar cuánto están de acuerdo los demás con
  nuestras creencias, actitudes y comportamientos. Asumimos que nuestras opiniones son más comunes de lo que son y nos cuesta imaginar que personas razonables puedan estar en desacuerdo.

one_liner: Sobreestimamos cuánto están de acuerdo los demás con nosotros.

try_this:
  - Busca activamente personas que no estén de acuerdo; no asumas consenso.
  - Antes de lanzar, prueba con personas que no compartan tus suposiciones.
  - Pregunta: ¿Qué diría alguien que no está de acuerdo? Tómalo en serio.

ask_yourself:
  - ¿Estoy asumiendo que los demás piensan como yo?
  - ¿Cuándo fue la última vez que me sorprendió la opinión diferente de alguien?

in_more_detail: |
  Cuando sostenemos una postura, tendemos a pensar que es la norma. Nos rodeamos de
  personas con ideas afines, consumimos medios de comunicación que confirman nuestras creencias e interpretamos la retroalimentación ambigua como acuerdo. Esto crea una cámara de eco que refuerza la ilusión de consenso.

  El efecto es más fuerte para las creencias profundamente arraigadas y cuando estamos muy comprometidos con nuestra postura. Puede generar sorpresa cuando otros no están de acuerdo, dificultad en la negociación e investigación de mercado deficiente cuando asumimos que los clientes piensan como nosotros.

why_this_is_important: |
  Reconocer el efecto del falso consenso te ayuda a prepararte para desacuerdos genuinos,
  realizar mejores investigaciones y comunicarte de manera más efectiva. Es esencial para
  el desarrollo de productos, la negociación y el liderazgo.

when_to_use:
  - toma_de_decisiones
  - negociacion
  - liderazgo
  - resolucion_de_problemas

how_can_you_spot_it:
  surprise_at_disagreement: |
    Te sorprende genuinamente cuando alguien no está de acuerdo con lo que consideras obvio.
  assuming_shared_values: |
    Actúas como si los demás compartieran tus prioridades sin comprobarlo.
  underestimating_opposition: |
    Esperas que las propuestas encuentren menos resistencia de la que encuentran.
  echo_chamber_detection: |
    Tu entorno social y de información rara vez desafía tus puntos de vista.

examples:
  product_development: |
    Un equipo asume que los usuarios quieren la función X porque todos en el equipo la quieren, solo para
    descubrir una baja adopción.
  politics: |
    Las personas en una burbuja política se sorprenden por los resultados electorales que no coinciden
    con sus expectativas.
  negotiation: |
    Asumir que la otra parte aceptará los términos porque te parecen "razonables".
  hiring: |
    Contratar por "encaje cultural" puede significar contratar personas que están de acuerdo contigo, reforzando
    el falso consenso.

real_world_implications: |
  El efecto del falso consenso contribuye a la polarización, lanzamientos de productos fallidos
  y negociaciones rotas. Nos hace tener una confianza excesiva en nuestras predicciones y
  estar mal preparados para la disidencia.

professional_application:
  networking_and_relationship_building: |
    Busca activamente personas con perspectivas diferentes. No asumas creencias compartidas;
    pregunta y escucha.
  collaborative_learning_initiative: |
    En equipos, utiliza la disidencia estructurada (por ejemplo, "pre-mortem", abogado del diablo) para sacar a la luz
    desacuerdos antes de que se vuelvan costosos.

how_can_this_be_misapplied:
  dismissing_dissent: |
    Asumir que quienes no están de acuerdo no son razonables o no están informados, en lugar de considerar
    que pueden tener perspectivas diferentes y válidas.
  poor_research: |
    Omitir la investigación de clientes porque "ya sabemos lo que quieren".
  overconfidence: |
    Hacer apuestas audaces basándose en la suposición de que los demás estarán de acuerdo.
  groupthink_amplification: |
    Los equipos que no desafían el efecto del falso consenso pueden caer en un pensamiento grupal.

related_content:
