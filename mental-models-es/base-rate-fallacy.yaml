id: base_rate_fallacy
name: Falacia de la Tasa Base

quick_introduction: |
  La falacia de la tasa base es la tendencia a ignorar información estadística general
  (tasas base) a favor de información específica y vívida. Sobreevaluamos el
  caso particular y subestimamos la probabilidad previa. Una sola historia convincente
  puede anular lo que dicen los números.

one_liner: Una historia convincente puede anular lo que dicen los números.

try_this:
  - Antes de juzgar un caso, pregunta: ¿Cuál es la tasa base para este tipo de situación?
  - Combina la evidencia específica con la probabilidad previa, no ignores ninguna.
  - Observa cuándo un ejemplo vívido está ahogando las estadísticas.

ask_yourself:
  - ¿Estoy sobrevalorando este caso específico y subestimando la tasa base?
  - ¿Qué dirían los números si dejara a un lado la historia convincente?

in_more_detail: |
  Si una enfermedad afecta al 1% de la población y una prueba es 95% precisa, un
  resultado positivo a menudo significa que la persona todavía probablemente no tiene la
  enfermedad, porque la tasa base es muy baja. Pero ignoramos las tasas base y
  nos centramos en "dio positivo". Nos dejamos llevar por lo específico sobre lo
  estadístico.

  La falacia afecta el diagnóstico médico, la contratación, la evaluación de riesgos y el juicio legal.
  Necesitamos combinar las tasas base con la evidencia específica del caso utilizando
  el razonamiento bayesiano, pero a menudo no lo hacemos.

why_this_isimportant: |
  Corregir la falacia de la tasa base mejora el diagnóstico, la evaluación de riesgos y la calidad de las decisiones.
  Nos evita reaccionar exageradamente a casos vívidos y reaccionar poco a la realidad estadística.

when_to_use:
  - toma_de_decisiones
  - evaluacion_de_riesgos
  - resolucion_de_problemas
  - inversion

how_can_you_spot_it:
  ignoring_prior_probabilities: |
    Las tasas base no se incorporan en los juicios.
  vividness_over_statistics: |
    Un solo caso o historia domina sobre los datos agregados.
  diagnostic_overweighting: |
    Sobreevaluar nueva evidencia (p. ej., resultado de una prueba) sin considerar la tasa base.
  anecdote_override: |
    "Conozco a alguien que..." anula la evidencia estadística.

examples:
  medical: |
    Una prueba positiva para una enfermedad rara: la tasa base es baja, por lo que un positivo
    a menudo es un falso positivo. Ignoramos esto y asumimos que tienen la enfermedad.
  hiring: |
    Un candidato tiene una gran entrevista: ignoramos las tasas base sobre cuán bien
    las entrevistas predicen el rendimiento.
  risk: |
    Un accidente de avión es vívido: sobreestimamos el riesgo de volar y subestimamos
    el riesgo de conducir, ignorando las tasas base.
  startup_investing: |
    Un fundador presenta bien: ignoramos que la mayoría de las startups fracasan independientemente de la calidad de la presentación.

real_world_implications: |
  La falacia de la tasa base afecta las decisiones médicas, los juicios legales y la
  estrategia empresarial. Contribuye a la mala asignación de recursos y a
  una pobre evaluación de riesgos. El pensamiento bayesiano lo corrige.

professional_application:
  networking_and_relationship_building: |
    Al evaluar personas, considera las tasas base: p. ej., ¿con qué frecuencia ocurre este tipo de comportamiento?
    No dejes que una interacción vívida anule el patrón más amplio.
  collaborative_learning_initiative: |
    Al tomar decisiones, declara y considera explícitamente las tasas base antes de
    incorporar evidencia específica del caso. Capacita a los equipos en razonamiento bayesiano.

how_can_this_be_misapplied:
  base_rate_tyranny: |
    Ignorar evidencia sólida específica del caso cuando las tasas base sugieren lo contrario:
    a veces el caso individual es la excepción.
  stereotyping: |
    Usar tasas base para hacer juicios injustos sobre individuos.
  false_precision: |
    Aplicar tasas base con falsa precisión cuando son estimaciones aproximadas.
  dismissing_individuals: |
    "Las estadísticas dicen X" cuando el individuo frente a ti puede no ajustarse a la
    distribución.

related_content:
