id: illusion_of_control
name: Ilusión de Control

quick_introduction: |
  La ilusión de control es la tendencia a sobreestimar nuestra capacidad para
  influir en los resultados. Creemos que tenemos más control del que realmente tenemos, sobre
  eventos aleatorios, otras personas y sistemas complejos. Confundimos correlación
  con causalidad y acción con impacto.

one_liner: Sobreestimamos nuestra capacidad para influir en los resultados, especialmente en los aleatorios.

try_this:
  - Pregunta: ¿Qué pasaría si no hiciera nada? ¿Está mi acción causando realmente el resultado?
  - Distingue lo que puedes controlar de lo que no.
  - Observa cuándo vinculas supersticiosamente tus acciones a resultados aleatorios.

ask_yourself:
  - ¿Estoy confundiendo correlación con causalidad?
  - ¿Sería diferente el resultado si no hubiera actuado?

in_more_detail: |
  Las personas se sienten más seguras al ganar una lotería cuando eligen
  sus propios números, aunque esto no cambie las probabilidades. Tiramos los dados
  más fuerte cuando queremos números altos. Pensamos que nuestros rituales o comportamientos
  influyen en resultados que son en realidad aleatorios o determinados por factores
  fuera de nuestro control. La ilusión es reconfortante; reduce la ansiedad. Pero puede
  llevar a la exceso de confianza y a malas decisiones.

  La ilusión es más fuerte cuando estamos involucrados en el proceso, cuando
  obtenemos éxito temprano y cuando la tarea nos resulta familiar. Afecta
  a la inversión, la gestión y la vida cotidiana.

why_this_is_important: |
  Reconocer la ilusión de control te ayuda a calibrar tus
  expectativas, evitar el exceso de confianza y enfocar tus esfuerzos donde
  realmente importan. También explica por qué persistimos en comportamientos supersticiosos
  y sobreestimamos nuestra influencia.

when_to_use:
  - toma_de_decisiones
  - evaluacion_de_riesgos
  - inversion
  - liderazgo

how_can_you_spot_it:
  overestimated_influence: |
    Creer que nuestras acciones afectan los resultados cuando no es así.
  ritual_superstition: |
    Comportamientos que creemos que influyen en los resultados (camisa de la suerte, rutina previa al partido) cuando no es así.
  choice_illusion: |
    Sentir que la elección nos da control cuando la elección
    no afecta el resultado.
  action_bias: |
    Preferir "hacer algo" en lugar de "esperar" incluso cuando la acción
    no ayuda.

examples:
  gambling: |
    Elegir números de lotería se siente más controlable que la
    selección aleatoria; las probabilidades son las mismas.
  investing: |
    Los operadores activos sobreestiman su capacidad para superar al
    mercado; la mayoría tiene un rendimiento inferior después de los costos.
  management: |
    Los líderes sobreestiman su impacto en los resultados organizacionales; muchos factores están fuera de su control.
  sports: |
    Los aficionados creen que sus vítores afectan el juego; los jugadores
    tienen rituales de suerte.

real_world_implications: |
  La ilusión de control afecta la toma de riesgos, la persistencia
  en esfuerzos fútiles y la atribución de resultados. Puede
  motivar la acción (a veces útil) pero también puede llevar a
  esfuerzos desperdiciados y a exceso de confianza. La calibración mejora
  la calidad de las decisiones.

professional_application:
  networking_and_relationship_building: |
    Reconoce lo que puedes y no puedes controlar. Enfoca tu energía
    en los factores influenciables. No te atribuyas el mérito de
    resultados que no causaste, ni te culpes por aquellos que
    no pudiste prevenir.
  collaborative_learning_initiative: |
    Al planificar, distingue los factores controlables de los incontrolables.
    Evita la falsa confianza por victorias tempranas. Usa
    el pensamiento probabilístico para calibrar las expectativas.

how_can_this_be_misapplied:
  learned_helplessness: |
    Sobrecorregir para creer que no tenemos control cuando sí
    tenemos una influencia significativa.
  dismissing_agency: |
    "Todo es suerte" cuando la habilidad y el esfuerzo sí importan en
    muchos dominios.
  false_fatalism: |
    Usar la ilusión de control para justificar la inacción.
  one_size_fits_all: |
    El control varía según el dominio; algunas situaciones son más
    controlables que otras.

