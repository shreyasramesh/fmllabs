id: bystander_effect
name: Efecto Espectador

quick_introduction: |
  El efecto espectador es la tendencia de los individuos a ser menos propensos a
  ofrecer ayuda cuando hay otras personas presentes. Cuantos más espectadores haya, menos
  probable será que una persona actúe. La responsabilidad se difumina; asumimos
  que alguien más ayudará.

one_liner: Cuantas más personas presentes, menos probable es que una persona actúe.

try_this:
  - En emergencias, asigna la responsabilidad directamente: "Tú, llama al 911."
  - No asumas que alguien más ayudará; actúa o delega explícitamente.
  - Date cuenta cuando esperas a que otros actúen primero.

ask_yourself:
  - ¿Estoy difuminando la responsabilidad porque hay otros presentes?
  - ¿Actuaría diferente si estuviera solo?

in_more_detail: |
  Tras el asesinato de Kitty Genovese (aunque la historia fue parcialmente mitificada),
  los investigadores descubrieron que la presencia de otros reduce la ayuda. Buscamos
  en los demás señales; si nadie actúa, interpretamos que "no se necesita acción".
  También experimentamos la difusión de la responsabilidad: con muchas personas presentes,
  cada uno se siente menos personalmente responsable. Puede ocurrir ignorancia pluralista:
  todos piensan que algo anda mal pero nadie actúa porque nadie más está actuando.

  El efecto es más fuerte cuando la situación es ambigua y cuando
  los espectadores no se conocen entre sí. Se puede superar mediante la asignación directa
  de responsabilidad ("Tú, llama al 911").

why_this_is_important: |
  Comprender el efecto espectador te ayuda a tomar medidas cuando otros no lo hacen,
  y a diseñar sistemas que lo superen. Si tienes problemas, señala a una persona específica.
  Si eres un espectador, no esperes a que otros actúen.

when_to_use:
  - liderazgo
  - creacion_de_redes
  - resolucion_de_conflictos
  - toma_de_decisiones

how_can_you_spot_it:
  diffusion_of_responsibility: |
    "Alguien más lo hará" cuando hay muchos presentes.
  pluralistic_ignorance: |
    Todos piensan que se necesita acción pero nadie actúa porque nadie
    más está actuando.
  social_proof_inaction: |
    La inacción de otros se interpreta como "no se necesita acción".
  audience_inhibition: |
    El miedo a parecer tonto o a reaccionar de forma exagerada impide la acción.

examples:
  emergency: |
    Una persona se desmaya; con muchos espectadores, es menos probable que cada uno
    llame a emergencias.
  workplace: |
    Todos ven un problema pero nadie lo menciona; cada uno asume
    que alguien más lo hará.
  harassment: |
    Los testigos de acoso no intervienen, pensando cada uno
    que otros actuarán.
  meetings: |
    Una mala idea no es cuestionada porque todos asumen
    que alguien más hablará.

real_world_implications: |
  El efecto espectador puede tener consecuencias trágicas en emergencias
  y permite que los problemas persistan en las organizaciones. Superarlo
  requiere una asignación directa de responsabilidades y normas que fomenten
  la intervención.

professional_application:
  networking_and_relationship_building: |
    Cuando necesites ayuda, pide a una persona específica. Cuando veas
    algo mal, actúa; no asumas que otros lo harán. Crea normas
    en las que se espere y recompense que se hable.
  collaborative_learning_initiative: |
    Entrena a las personas para que reconozcan el efecto espectador e intervengan.
    Utiliza "si ves algo, di algo" y asigna roles explícitos.
    Recompensa a quienes hablan primero.

how_can_this_be_misapplied:
  blaming_bystanders: |
    Juzgar duramente a los individuos cuando el efecto es una poderosa
    fuerza situacional; céntrate en cambiar la situación.
  false_assumption: |
    Asumir que alguien siempre ayudará si hay suficientes personas
    presentes; a menudo ocurre lo contrario.
  overcorrection: |
    Hacer que todos sean responsables para que nadie lo sea; la difusión
    aún puede ocurrir.
  individualizing: |
    Tratar el efecto espectador como un defecto de carácter en lugar
    de un fenómeno situacional.

