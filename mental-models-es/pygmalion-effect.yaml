id: pygmalion_effect
name: Efecto Pigmalión

quick_introduction: |
  El efecto Pigmalión (o efecto Rosenthal) es el fenómeno por el cual las
  expectativas más altas conducen a un mejor rendimiento. Cuando los
  profesores, gerentes u otras personas esperan más de alguien, esa
  persona tiende a rendir mejor. Las expectativas se convierten en
  profecías autocumplidas.

one_liner: Las expectativas más altas conducen a un mejor rendimiento; las expectativas moldean la realidad.

try_this:
  - Establece expectativas altas pero alcanzables; comunícalas claramente.
  - Observa cuándo las expectativas bajas pueden estar limitando el rendimiento de alguien.
  - Pregunta: ¿Qué estoy esperando implícitamente y cómo podría eso influir en los resultados?

ask_yourself:
  - ¿Mis expectativas están ayudando o limitando a esta persona?
  - ¿Las expectativas más altas cambiarían mi trato hacia ellos y sus resultados?

in_more_detail: |
  Robert Rosenthal y Lenore Jacobson dieron a los profesores información falsa
  de que ciertos estudiantes "florecerían" académicamente. Esos estudiantes,
  seleccionados al azar, en realidad mejoraron más que los otros. Las
  expectativas de los profesores influyeron en su comportamiento (más
  atención, comentarios más cálidos), lo que a su vez influyó en el
  rendimiento de los estudiantes. Las expectativas moldean la realidad.

  Lo contrario, las bajas expectativas que conducen a un peor rendimiento,
  a veces se llama el efecto Golem. Ambos demuestran que nuestras creencias
  sobre los demás pueden influir en sus resultados. Esto tiene profundas
  implicaciones para el liderazgo, la educación y la crianza de los hijos.

why_this_is_important: |
  Comprender el efecto Pigmalión te ayuda a aprovechar el poder de las
  expectativas. Las expectativas altas, comunicadas genuinamente, pueden
  mejorar el rendimiento. Las bajas expectativas pueden crear fracasos
  autocumplidos. Tus creencias sobre los demás importan.

when_to_use:
  - liderazgo
  - construccion_de_relaciones
  - aprendizaje
  - toma_de_decisiones

how_can_you_spot_it:
  expectation_performance_link: |
    Aquellos de quienes esperamos más tienden a rendir mejor.
  differential_treatment: |
    Tratamos a las personas de manera diferente según nuestras
    expectativas, a menudo inconscientemente.
  self_fulfilling_prophecy: |
    Las creencias sobre la capacidad influyen en el comportamiento
    que moldea la capacidad.
  teacher_student_dynamics: |
    Las expectativas del educador influyen en los resultados de
    los estudiantes a través de un trato diferencial.

examples:
  education: |
    Los profesores que esperan que los estudiantes tengan éxito les
    brindan más apoyo; esos estudiantes mejoran. Los profesores que
    esperan el fracaso pueden crearlo inadvertidamente.
  workplace: |
    Los gerentes que esperan un alto rendimiento de sus subordinados
    brindan más oportunidades y comentarios; el rendimiento mejora.
  parenting: |
    Los padres que esperan que sus hijos sean responsables les
    brindan más responsabilidad; estos se esfuerzan por asumirla.
  stereotypes: |
    La amenaza del estereotipo es lo contrario: las expectativas
    negativas pueden perjudicar el rendimiento.

real_world_implications: |
  El efecto Pigmalión afecta la educación, la gestión y las
  relaciones. Sugiere que elevar las expectativas, cuando se hace de
  manera solidaria, puede mejorar los resultados. También advierte que
  las bajas expectativas pueden ser destructivas.

professional_application:
  networking_and_relationship_building: |
    Establece altas expectativas para las personas y brinda el apoyo
    para cumplirlas. Cree en el potencial. Tus expectativas influyen
    en tu comportamiento, que influye en sus resultados.
  collaborative_learning_initiative: |
    Crea culturas de altas expectativas con alto apoyo. Evita
    etiquetar a las personas como "bajo rendimiento" de maneras que
    se vuelvan autocumplidas. Invierte en aquellos de quienes esperas
    el éxito.

how_can_this_be_misapplied:
  unrealistic_expectations: |
    Establecer expectativas que son imposibles de cumplir sin apoyo
    crea fracaso y desmoralización.
  blame_shifting: |
    "No cumplieron las expectativas" cuando no proporcionamos el
    apoyo o las condiciones para el éxito.
  ignoring_constraints: |
    Las expectativas por sí solas no superan las barreras estructurales.
  pressure_without_support: |
    Las altas expectativas sin recursos o apoyo pueden ser perjudiciales.

related_content:
