id: sesgo_de_salience
name: Sesgo de Salience

quick_introduction: |
  El sesgo de salience es la tendencia a centrarse en los aspectos más prominentes o notables
  de una situación, pasando por alto factores menos obvios pero potencialmente
  importantes. Lo que destaca recibe atención y peso desproporcionados en nuestros juicios.

one_liner: Lo que destaca recibe atención desproporcionada; lo sutil se pasa por alto.

try_this:
  - Pregunta: ¿Qué no estoy viendo porque no es saliente?
  - Busca activamente factores menos obvios antes de decidir.
  - Observa cuándo un elemento vívido o dramático está dominando tu juicio.

ask_yourself:
  - ¿Estoy dando demasiado peso a lo prominente y muy poco a lo sutil?
  - ¿Qué factores importantes podría estar pasando por alto?

in_more_detail: |
  La información saliente es vívida, cargada emocionalmente o encontrada recientemente.
  Capta la atención e influye en las decisiones más de lo que debería. Damos
  más peso a lo conspicuo y menos peso a lo sutil. Un evento dramático
  o un ejemplo vívido pueden dominar nuestro pensamiento incluso cuando no es
  representativo.

  El sesgo de salience se superpone con la heurística de disponibilidad (lo que viene a la mente)
  y el sesgo de recencia (lo que sucedió recientemente). Afecta la percepción del riesgo,
  la contratación y la estrategia. Los problemas más visibles se abordan; los
  invisibles se pudren.

why_this_is_important: |
  Reconocer el sesgo de salience te ayuda a mirar más allá de lo obvio y
  a considerar factores menos visibles. Mejora la evaluación de riesgos, el diagnóstico de problemas
  y la calidad de las decisiones. Las cosas importantes no siempre
  son salientes.

when_to_use:
  - toma_de_decisiones
  - resolucion_de_problemas
  - evaluacion_de_riesgos
  - liderazgo

how_can_you_spot_it:
  prominent_factor_dominance: |
    El aspecto más notable impulsa la decisión.
  overlooking_background: |
    Se ignoran factores menos visibles a pesar de su importancia.
  vividness_overweighting: |
    La información dramática o emocional recibe un peso desproporcionado.
  visibility_bias: |
    Lo que podemos ver o medir fácilmente recibe más atención que
    lo que no podemos.

examples:
  risk: |
    Un accidente de avión es saliente: sobreestimamos el riesgo de volar. Los accidentes
    de coche son menos salientes en su conjunto: subestimamos el riesgo de conducir.
  hiring: |
    Las habilidades de presentación de un candidato son salientes; su
    seguimiento puede ser menos visible pero igualmente importante.
  strategy: |
    Los movimientos de los competidores son salientes; los cambios graduales del mercado
    son menos notables pero pueden importar más.
  problems: |
    La queja más fuerte se aborda mientras las cuestiones sistémicas
    pasan desapercibidas.

real_world_implications: |
  El sesgo de salience afecta lo que recibe atención, financiación y acción.
  Puede llevar a abordar síntomas en lugar de causas y
  a recursos mal asignados. La búsqueda deliberada de información no saliente
  mejora las decisiones.

professional_application:
  networking_and_relationship_building: |
    No juzgues a las personas solo por sus rasgos más visibles. Busca
    cualidades menos obvias: confiabilidad, consistencia, cómo
    tratan a las personas que no pueden ayudarles.
  collaborative_learning_initiative: |
    En la resolución de problemas, pregunta explícitamente "¿Qué no estamos viendo?"
    y "¿Qué es menos obvio pero importante?". Crea procesos
    que hagan aflorar cuestiones no salientes.

how_can_this_be_misapplied:
  ignoring_salient_info: |
    A veces, lo que es saliente es importante. No descartes
    todo lo obvio.
  false_sophistication: |
    Asumir que los factores oscuros son siempre más importantes
    que los obvios.
  analysis_paralysis: |
    Buscar tantos factores no salientes que nunca actúas sobre los salientes.
  contrarianism: |
    Rechazar información saliente solo por ser diferente.

related_content:
  - availability_heuristic
  - anchoring_bias
  - baader_meinhof_phenomenon
  - confirmation_bias
