id: framing_effect
name: Efecto de Marco (Framing Effect)

quick_introduction: |
  El efecto de marco es la tendencia a que nuestras decisiones cambien según cómo
  se presenten las opciones, incluso cuando los hechos subyacentes son idénticos.
  "90% de supervivencia" y "10% de mortalidad" describen el mismo resultado pero
  generan diferentes elecciones. El marco moldea la decisión.

one_liner: Los mismos hechos, presentados de manera diferente, llevan a decisiones distintas.

try_this:
  - Replantee las opciones de múltiples maneras antes de decidir: marco de ganancia y marco de pérdida.
  - Note cuándo su elección cambia según cómo se redacta algo.
  - Pregúntese: ¿Cuáles son los hechos subyacentes, despojados del marco?

ask_yourself:
  - ¿Decidiría de manera diferente si esto se presentara como una ganancia frente a una pérdida?
  - ¿Estoy reaccionando al marco o al resultado real?

in_more_detail: |
  Kahneman y Tversky demostraron que las personas evitan el riesgo cuando las
  opciones se presentan como ganancias y buscan el riesgo cuando se presentan
  como pérdidas, incluso para los mismos resultados. El encuadre positivo
  ("salvar 200 vidas") frente al encuadre negativo ("morirán 400") cambia las
  preferencias. Los marcos de pérdida desencadenan respuestas emocionales más
  fuertes que los marcos de ganancia equivalentes.

  El efecto de marco afecta las decisiones médicas, las políticas, el marketing y
  la negociación. Es uno de los sesgos más poderosos y bien documentados.
  La conciencia ayuda, pero es difícil de superar por completo.

why_this_is_important: |
  Reconocer el efecto de marco le ayuda a tomar decisiones más consistentes,
  resistir la manipulación y comunicarse de manera más efectiva. También explica
  por qué la misma oferta puede ser aceptada o rechazada según la presentación.

when_to_use:
  - toma_de_decisiones
  - negociacion
  - liderazgo
  - evaluacion_de_riesgos

how_can_you_spot_it:
  gain_loss_asymmetry: |
    El mismo resultado presentado como ganancia frente a pérdida produce
    diferentes elecciones.
  presentation_dependence: |
    Las decisiones cambian cuando solo cambia el marco, no la sustancia.
  default_influence: |
    El orden o el etiquetado de las opciones afecta las elecciones.
  emotional_trigger: |
    Ciertos marcos desencadenan respuestas emocionales más fuertes.

examples:
  medical: |
    "90% de supervivencia" frente a "10% de mortalidad" para el mismo procedimiento:
    las personas eligen de manera diferente según el marco.
  sales: |
    "Ahorra $50" frente a "No pierdas $50": marcos equivalentes, diferente
    impacto psicológico.
  policy: |
    "Alivio fiscal" frente a "Gasto gubernamental": misma política, diferente
    respuesta política.
  negotiation: |
    Presentar una oferta como un "descuento" frente a "evitar un recargo"
    cambia las tasas de aceptación.

real_world_implications: |
  El efecto de marco se explota en la publicidad, la política y la
  negociación. Afecta las decisiones médicas y el apoyo a las políticas.
  Replantear puede mejorar las decisiones y la comunicación. Ser consciente
  ayuda, pero no elimina por completo el efecto.

professional_application:
  networking_and_relationship_building: |
    Al presentar opciones, considere múltiples marcos. Pruebe cómo
    diferentes marcos afectan la recepción. Al recibir información,
    pregúntese: "¿De qué otra manera se podría presentar esto?"
  collaborative_learning_initiative: |
    En la toma de decisiones, replantee explícitamente las opciones para verificar
    los efectos del marco. "¿Si replantearamos esto como una pérdida, decidiríamos
    de manera diferente?" Use un marco consistente para la equidad.

how_can_this_be_misapplied:
  manipulation: |
    Presentar deliberadamente para dirigir a las personas hacia resultados deseados
    sin su conocimiento.
  false_equivalence: |
    Asumir que todos los marcos son igualmente válidos cuando algunos oscurecen
    información importante.
  overcorrection: |
    Ignorar el marco por completo y asumir que no importa; sí importa.
  spin: |
    Usar el marco para engañar en lugar de para aclarar.

related_content:
