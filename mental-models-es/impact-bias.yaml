id: impact_bias
name: Sesgo de impacto

quick_introduction: |
  El sesgo de impacto es la tendencia a sobreestimar la intensidad y duración
  de nuestras reacciones emocionales ante eventos futuros. Pensamos que las cosas buenas nos
  harán más felices de lo que realmente lo hacen, y las cosas malas nos harán más miserables de lo
  que realmente nos hacen. Somos malos en la predicción afectiva.

one_liner: Sobreestimamos cuánto nos afectarán los eventos en nuestra felicidad, y por cuánto tiempo.

try_this:
  - Pregunta: ¿Cómo me sentí después de eventos pasados similares? Nos adaptamos más rápido de lo que esperamos.
  - No dejes que el impacto anticipado impulse tus decisiones: somos malos prediciendo sentimientos.
  - Observa cuándo sobreestimas el efecto duradero de un solo resultado.

ask_yourself:
  - ¿Estoy sobreestimando cuánto tiempo me sentiré así?
  - ¿Qué dice la experiencia pasada sobre eventos similares?

in_more_detail: |
  Daniel Gilbert y Timothy Wilson investigan la predicción afectiva:
  sobreestimamos cuánto tiempo nos sentiremos bien después de una victoria o mal después de una derrota.
  Nos adaptamos más rápido de lo que esperamos. También sobreestimamos el impacto de
  eventos únicos: pensamos que un resultado definirá nuestra felicidad cuando
  muchos factores contribuyen. Nos centramos en las cosas equivocadas al predecir
  nuestros sentimientos futuros.

  El sesgo de impacto afecta las decisiones importantes de la vida: sobreestimamos cuánto
  una promoción, relación o compra cambiará nuestra felicidad. También
  sobreestimamos el dolor duradero de las pérdidas.

why_this_is_important: |
  Reconocer el sesgo de impacto te ayuda a tomar mejores decisiones sobre lo que
  realmente mejorará tu vida. Reduce la sobreinversión en resultados
  que no importarán tanto como crees, y reduce el miedo a resultados
  que no dolerán tanto como esperas.

when_to_use:
  - toma_de_decisiones
  - movimientos_profesionales
  - evaluacion_de_riesgos
  - construccion_de_relaciones

how_can_you_spot_it:
  overestimated_impact: |
    "Esto lo cambiará todo" cuando eventos pasados similares tuvieron un impacto duradero modesto.
  duration_overestimation: |
    "Nunca superaré esto" cuando normalmente nos adaptamos más rápido de lo que esperamos.
  focalism: |
    Centrarse en un evento e ignorar otros factores que afectan el bienestar.
  adaptation_neglect: |
    Olvidar que nos adaptamos tanto a las circunstancias buenas como a las malas.

examples:
  career: |
    "Si consigo esta promoción, seré mucho más feliz" cuando las promociones pasadas tuvieron un impacto temporal.
  purchases: |
    "Este coche me hará feliz" cuando la novedad se desvanece rápidamente.
  loss: |
    "Nunca me recuperaré de este rechazo" cuando normalmente nos adaptamos en unos meses.
  events: |
    Sobreestimar cuánto afectará una boda, unas vacaciones o un hito a la felicidad a largo plazo.

real_world_implications: |
  El sesgo de impacto conduce a malas decisiones sobre dinero, carrera y
  relaciones. Pagamos de más por experiencias a las que nos adaptaremos y
  tememos en exceso pérdidas de las que nos recuperaremos. Afecta las políticas y la
  planificación personal.

professional_application:
  networking_and_relationship_building: |
    Al tomar decisiones profesionales o de relaciones, considera cómo te sentiste después de eventos pasados similares. ¿El impacto duró tanto como esperabas? Usa eso para calibrar predicciones futuras.
  collaborative_learning_initiative: |
    Cuando los equipos enfrentan contratiempos o victorias, recuérdales la adaptación.
    "Nos adaptaremos más rápido de lo que pensamos" puede reducir tanto la celebración excesiva como la desesperación excesiva.

how_can_this_be_misapplied:
  dismissing_all_impact: |
    Algunos eventos sí tienen un impacto duradero: trauma, pérdida importante. No
    desestimes toda predicción afectiva como sesgada.
  cold_rationality: |
    "No importará" cuando la experiencia en el momento sí importa.
  undervaluing_experiences: |
    Evitar experiencias positivas porque "de todos modos nos adaptaremos".
  invalidating_emotions: |
    Decirle a la gente que sus sentimientos pasarán cuando necesitan apoyo en el momento.

