id: hyperbolic_discounting
name: Descuento hiperbólico

quick_introduction: |
  El descuento hiperbólico es la tendencia a preferir recompensas más pequeñas e inmediatas
  en lugar de otras más grandes y futuras, y a descontar el futuro de forma más drástica de lo que predicen los modelos racionales. Sobrecargamos el presente y subestimamos el futuro de maneras inconsistentes.

one_liner: Preferimos lo pequeño e inmediato a lo grande y futuro, y descontamos el futuro de forma inconsistente.

try_this:
  - Pre-compromiso: toma decisiones para tu yo futuro cuando estés en un estado de calma.
  - Reformula: ¿Querría esto en 10 minutos? ¿En 10 meses? para revelar inconsistencias.
  - Utiliza dispositivos de compromiso para atar a tu yo futuro a mejores decisiones.

ask_yourself:
  - ¿Estoy sobrevalorando el presente a expensas de mi yo futuro?
  - ¿Tomaría esta decisión si la recompensa se retrasara un día? ¿Un año?

in_more_detail: |
  Podríamos preferir 50€ hoy en lugar de 100€ en un año, pero también preferir 100€ en
  dos años en lugar de 50€ en un año, aunque eso sea inconsistente. Nuestra
  tasa de descuento no es constante; es hiperbólica. El futuro cercano
  se descuenta fuertemente; el futuro lejano se descuenta de forma menos drástica. Esto
  explica la procrastinación, la adicción y la falta de ahorro.

  El sesgo de presente es un concepto relacionado: damos al momento
  presente un peso desproporcionado. El descuento hiperbólico explica por qué
  hacemos compromisos que no cumplimos y por qué la planificación a largo plazo es difícil.

why_this_is_important: |
  Comprender el descuento hiperbólico te ayuda a diseñar mejores
  incentivos, a comprometer a tu yo futuro y a evitar trampas a corto plazo.
  Explica por qué procrastinamos y por qué luchamos con
  objetivos a largo plazo.

when_to_use:
  - toma_de_decisiones
  - movimientos_profesionales
  - inversión
  - liderazgo

how_can_you_spot_it:
  present_preference: |
    Elegir la gratificación inmediata sobre recompensas mayores y retrasadas.
  inconsistent_time_preferences: |
    Preferencias que se revierten a medida que pasa el tiempo (por ejemplo, queremos hacer dieta
    mañana pero comemos hoy).
  commitment_failures: |
    Hacer planes que no seguimos cuando el futuro se convierte en presente.
  procrastination: |
    Retrasar tareas importantes en favor de la comodidad inmediata.

examples:
  savings: |
    Elegir gastar ahora en lugar de ahorrar para la jubilación; el futuro
    parece abstracto.
  health: |
    Saltarse el ejercicio hoy por comodidad, a pesar de saber que nos arrepentiremos;
    el arrepentimiento de mañana se descuenta.
  addiction: |
    Elegir el subidón inmediato sobre la salud a largo plazo.
  deadlines: |
    No hacer nada hasta que se acerca la fecha límite; entonces el "presente" incluye
    la fecha límite y actuamos.

real_world_implications: |
  El descuento hiperbólico afecta al ahorro, la salud, la educación y
  la adicción. Explica muchos fallos de autocontrol. Los dispositivos de compromiso
  (por ejemplo, ahorros automáticos, rendición de cuentas) pueden ayudar
  restringiendo las elecciones futuras.

professional_application:
  networking_and_relationship_building: |
    Al pedir compromisos futuros, crea rendición de cuentas que
    haga el futuro "presente" (por ejemplo, seguimientos, fechas límite). No
    asumas que la gente cumplirá sin una estructura.
  collaborative_learning_initiative: |
    Utiliza dispositivos de compromiso: compromisos públicos, pre-compromiso con
    fechas límite y estructuras que hagan que los objetivos a largo plazo parezcan más
    inmediatos. Divide los proyectos largos en hitos más cortos.

how_can_this_be_misapplied:
  excessive_control: |
    Restringir excesivamente las opciones de las personas en nombre de "ayudar"
    a sus yo futuros.
  paternalism: |
    Asumir que sabemos lo que es mejor para los intereses a largo plazo de los demás.
  ignoring_present_needs: |
    Desestimar las necesidades presentes legítimas en favor de beneficios
    futuros abstractos.
  one_size_fits_all: |
    Las personas difieren en sus tasas de descuento; no todo el mundo necesita los mismos
    dispositivos de compromiso.

related_content:
