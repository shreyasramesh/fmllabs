# Maldición del conocimiento
# Modelo Mental / Sesgo Cognitivo - Entrada de ejemplo

id: curse_of_knowledge
name: Maldición del conocimiento

quick_introduction: |
  La maldición del conocimiento es la dificultad de imaginar cómo es no
  saber algo una vez que lo sabes. Los expertos tienen dificultades para enseñar a los principiantes porque
  no pueden recrear la perspectiva del principiante. Una vez que sabes, olvidas
  cómo era no saber.

one_liner: Una vez que sabes algo, olvidas cómo era no saberlo.

try_this:
  - Al explicar, empieza desde los primeros principios: asume que tu audiencia no sabe nada.
  - Pídele a un principiante que te lo explique de vuelta; su confusión revela tus puntos ciegos.
  - Date cuenta cuando te saltas pasos o usas jerga que otros podrían no conocer.

ask_yourself:
  - ¿Estoy asumiendo que otros tienen el mismo contexto que yo?
  - ¿Alguien sin mi experiencia entendería esto?

in_more_detail: |
  En un experimento clásico, personas que sabían la respuesta a un acertijo golpearon el
  ritmo de una canción y esperaban que otros la adivinaran; sobreestimaron lo
  obvia que era. Los que golpeaban el ritmo no podían "desoír" la canción en sus cabezas.
  El conocimiento es "pegajoso"; es difícil simular la ignorancia.

  La maldición afecta la enseñanza, la comunicación, el diseño de productos y el liderazgo.
  Asumimos que otros tienen el mismo contexto que nosotros. Usamos jerga. Nos saltamos
  pasos. Nos sorprende cuando la gente no "lo capta".

why_this_is_important: |
  Reconocer la maldición del conocimiento mejora la enseñanza, la comunicación y
  el diseño de productos. Te ayuda a encontrarte con las personas donde están, en lugar de
  donde estás tú. Es esencial para una transferencia de conocimiento efectiva.

when_to_use:
  - aprendizaje
  - liderazgo
  - resolucion_de_problemas
  - construccion_de_relaciones

how_can_you_spot_it:
  obvious_to_you: |
    "Es obvio" cuando solo es obvio porque sabes la respuesta.
  jargon_use: |
    Usar términos que la audiencia no conoce sin definirlos.
  skipped_steps: |
    Asumir que otros completarán lo que has dejado fuera.
  frustration_with_learners: |
    "¿Cómo no pueden verlo?" cuando carecen de tu contexto.

examples:
  teaching: |
    Un profesor de matemáticas se salta pasos que son "obvios" para él, pero
    esenciales para los estudiantes.
  product_design: |
    Los diseñadores crean interfaces que tienen sentido para ellos, pero confunden
    a los nuevos usuarios.
  onboarding: |
    Los empleados experimentados olvidan lo que los nuevos empleados no saben y
    proporcionan una capacitación inadecuada.
  writing: |
    Los autores asumen que los lectores tienen el mismo bagaje y omiten
    el contexto necesario.

real_world_implications: |
  La maldición del conocimiento crea brechas de comunicación, productos fallidos
  y enseñanza ineficaz. Es una razón por la que los expertos pueden ser malos
  maestros. Superarla requiere un esfuerzo deliberado para adoptar la
  perspectiva de la audiencia.

professional_application:
  networking_and_relationship_building: |
    Al explicar, comienza desde el nivel de la otra persona. Pregunta "¿Qué
    saben ya?". Pon a prueba tu comunicación con alguien
    que no tenga tu experiencia.
  collaborative_learning_initiative: |
    Utiliza ejercicios de "explica como si tuviera cinco años". Haz que los expertos enseñen
    a los principiantes y obtén retroalimentación. Crea documentación que asuma
    ningún conocimiento previo. Usa la enseñanza entre pares: las personas que han aprendido
    recientemente recuerdan la perspectiva del principiante.

how_can_this_be_misapplied:
  oversimplification: |
    Simplificar hasta el punto de la inexactitud o la condescendencia.
  false_assumption: |
    Asumir que otros saben menos de lo que realmente saben; también es un fallo de
    calibración.
  one_size_fits_all: |
    No todas las audiencias necesitan el mismo nivel de explicación; adáptala
    a la audiencia.
  avoiding_complexity: |
    Algunos temas son complejos; la maldición del conocimiento no significa
    que nunca debamos usar lenguaje técnico cuando sea apropiado.

related_content:
  - dunning_kruger_effect
  - false_consensus_effect
  - empathy_gap
  - availability_heuristic
