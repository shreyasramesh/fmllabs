# Principio de Pareto
# Modelo Mental / Sesgo Cognitivo - Entrada de ejemplo

id: pareto_principle
name: Principio de Pareto

quick_introduction: |
  El principio de Pareto (o regla del 80/20) establece que aproximadamente el 80% de los efectos provienen
  del 20% de las causas. Una pequeña minoría de entradas a menudo produce la mayoría de los resultados—
  en ventas, errores, clientes, esfuerzo, características y más. Enfócate en lo vitalmente importante.

one_liner: El 80% de los efectos provienen del 20% de las causas—enfócate en lo vitalmente importante.

try_this:
  - Identifica el 20% de las entradas que producen el 80% de los resultados—enfócate ahí.
  - Elimina o prioriza el 80% que produce poco.
  - Pregunta: ¿Qué pocas cosas, si las hiciera bien, importarían más?

ask_yourself:
  - ¿Estoy distribuyendo el esfuerzo de manera uniforme cuando unas pocas cosas importan más?
  - ¿Cuál es mi 20% de alto impacto?

in_more_detail: |
  Vilfredo Pareto observó que el 80% de la tierra de Italia era propiedad del 20% de la
  población. El principio se ha generalizado: el 80% de las ventas provienen del 20% de
  los clientes, el 80% de los errores provienen del 20% del código, el 80% de los resultados provienen del 20% del esfuerzo.
  La proporción exacta varía, pero el patrón —distribución desigual— es común.

  El principio sugiere que identificar y enfocarse en el 20% de alto impacto
  puede mejorar drásticamente los resultados. Es una heurística de priorización, no una
  ley física.

why_this_is_important: |
  Aplicar el principio de Pareto te ayuda a priorizar implacablemente, evitar desperdiciar
  esfuerzo en actividades de bajo impacto y lograr más con menos. Es fundamental
  para la productividad y la estrategia.

when_to_use:
  - toma_de_decisiones
  - resolucion_de_problemas
  - liderazgo
  - movimientos_de_carrera

how_can_you_spot_it:
  uneven_distribution: |
    Una pequeña fracción de X representa una gran fracción de Y.
  high_leverage_activities: |
    Pocas acciones producen la mayoría de los resultados.
  low_value_tail: |
    Muchas actividades contribuyen poco; recortarlas tiene un impacto mínimo.
  vital_few_vs_trivial_many: |
    La clave es identificar cuáles pocas importan más.

examples:
  sales: |
    El 20% de los clientes genera el 80% de los ingresos—enfócate en retenerlos y hacerlos crecer.
  software: |
    El 20% de las características impulsa el 80% del uso—prioriza esas.
  productivity: |
    Unos pocos hábitos o rutinas producen la mayor parte de tu producción—enfócate en ellos.
  problems: |
    El 20% de los errores causa el 80% de las caídas—arregla esas primero.

real_world_implications: |
  El principio de Pareto guía la asignación de recursos, la estrategia de productos y la
  productividad personal. Ignorarlo lleva a distribuir el esfuerzo de manera demasiado delgada.
  Aplicarlo en exceso puede causar la negligencia de la "larga cola" donde sí importa.

professional_application:
  networking_and_relationship_building: |
    Identifica las relaciones que más importan para tus objetivos. Invierte
    desproporcionadamente en esas en lugar de distribuir el esfuerzo equitativamente.
  collaborative_learning_initiative: |
    Al mejorar el rendimiento del equipo, encuentra el 20% de las intervenciones que impulsan
    el 80% de los resultados. Enfoca la capacitación y los cambios de proceso ahí.

how_can_this_be_misapplied:
  oversimplification: |
    Asumir que el 80/20 se aplica en todas partes; algunas distribuciones son más equitativas.
  neglecting_the_tail: |
    Ignorar el "trivial many" cuando colectivamente importa (por ejemplo, muchos clientes pequeños, casos extremos).
  false_precision: |
    Tratar el 80/20 como literal en lugar de una heurística aproximada.
  misidentifying_the_vital_few: |
    Enfocarse en el 20% equivocado debido a un análisis defectuoso.

