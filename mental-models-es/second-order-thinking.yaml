# Pensamiento de segundo orden
# Modelo Mental / Sesgo Cognitivo - Entrada de Ejemplo

id: second_order_thinking
name: Pensamiento de segundo orden

quick_introduction: |
  El pensamiento de segundo orden es la práctica de considerar las consecuencias de las
  consecuencias de tus acciones. El pensamiento de primer orden pregunta "¿qué pasa si
  hago X?" El pensamiento de segundo orden pregunta "¿y luego qué?" y "¿y luego qué después
  de eso?" Revela efectos no intencionados.

one_liner: Pregunta "¿y luego qué?" — considera las consecuencias de las consecuencias.

try_this:
  - Para cualquier decisión, pregunta "¿y luego qué?" al menos dos veces.
  - Considera cómo responderán otros a tu acción, y luego a esa respuesta.
  - Observa cuándo los efectos de primer orden se revierten o complican en la cadena.

ask_yourself:
  - ¿He considerado los efectos de segundo (y tercer) orden?
  - ¿Qué consecuencias no intencionadas podría estar pasando por alto?

in_more_detail: |
  Howard Marks popularizó el concepto en el ámbito de la inversión. Primer orden: "Esto va a subir".
  Segundo orden: "Si sube, otros se darán cuenta, comprarán más, subirá más, hasta que
  se sobrevalore y colapse". La cadena de consecuencias a menudo invierte o complica el efecto de primer orden.

  El pensamiento de segundo orden es más difícil, requiere más esfuerzo mental e
  imaginación. Pero previene muchos errores. Los buenos estrategas piensan varios
  pasos por adelantado y consideran cómo responderán los demás.

why_this_is_important: |
  El pensamiento de segundo orden previene consecuencias no intencionadas y mejora la
  calidad de las decisiones. Es esencial para la estrategia, la política y cualquier dominio
  donde las acciones desencadenen reacciones.

when_to_use:
  - toma_de_decisiones
  - resolucion_de_problemas
  - estrategia
  - evaluacion_de_riesgos

how_can_you_spot_it:
  consequence_chains: |
    "Si hago X, entonces sucederá Y, luego Z..."
  reaction_anticipation: |
    Considerar cómo responderán otros a tu acción.
  unintended_effects: |
    Buscar efectos secundarios y bucles de retroalimentación.
  reversals: |
    Efectos de segundo orden que contradicen o revierten los efectos de primer orden.

examples:
  investing: |
    "Si todo el mundo piensa que esta es una buena inversión, probablemente esté saturada;
    la ventaja puede haber desaparecido".
  policy: |
    "Si subsidiamos X, la demanda aumenta, los precios suben, ¿el subsidio realmente
    ayuda?"
  negotiation: |
    "Si presiono mucho aquí, ellos tomarán represalias allí, ¿cuál es el efecto neto?"
  incentives: |
    "Si recompensamos esta métrica, la gente la manipulará, ¿qué harán realmente?"

real_world_implications: |
  El pensamiento de segundo orden es el sello distintivo del pensamiento estratégico.
  Previene fallos en políticas, incentivos no intencionados y optimismo ingenuo.
  Distingue a los buenos de los grandes tomadores de decisiones.

professional_application:
  networking_and_relationship_building: |
    Antes de tomar una acción, pregunta "¿Cómo responderán? ¿Y cómo responderé yo a eso?"
    Considera la dinámica de la relación, no solo el intercambio inmediato.
  collaborative_learning_initiative: |
    Al planificar, realiza ejercicios de "y luego qué". Mapea las cadenas de consecuencias.
    Identifica los efectos no intencionados antes de que se manifiesten.

how_can_this_be_misapplied:
  analysis_paralysis: |
    Pensar tantos pasos por adelantado que nunca actúas.
  false_complexity: |
    Asumir que los efectos de segundo orden siempre dominan cuando los efectos de primer
    orden pueden ser suficientes.
  overconfidence: |
    Creer que puedes predecir largas cadenas cuando la incertidumbre se acumula.
  pessimism: |
    Asumir siempre lo peor en la cadena de consecuencias.

related_content:
