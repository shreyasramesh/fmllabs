id: default_effect
name: Efecto por Defecto

quick_introduction: |
  El efecto por defecto es la tendencia a elegir la opción preseleccionada cuando
  se presentan opciones. Lo que sea que esté configurado como el valor predeterminado
  tiene una gran ventaja: las personas a menudo se quedan con él, independientemente
  de si es óptimo para ellas.

one_liner: Lo que sea que esté configurado como el valor predeterminado tiene una gran ventaja—nos quedamos con él.

try_this:
  - Observa cuándo aceptas el valor predeterminado sin evaluar alternativas.
  - Al diseñar opciones, establece valores predeterminados que sirvan a los mejores intereses de los usuarios.
  - Pregúntate: ¿Elegiría esto si no estuviera preseleccionado?

ask_yourself:
  - ¿Estoy eligiendo el valor predeterminado por inercia, o porque es lo mejor para mí?
  - ¿Quién estableció este valor predeterminado y qué podría ganar de él?

in_more_detail: |
  Los valores predeterminados funcionan por inercia, aversión a la pérdida (cambiar se siente como perder el valor predeterminado) y respaldo implícito (asumimos que el valor predeterminado es recomendado).
  Las tasas de donación de órganos varían drásticamente según el país, basándose en gran medida en si
  el valor predeterminado es de opt-in (participación voluntaria) u opt-out (exclusión voluntaria). La participación en el ahorro para la jubilación aumenta
  cuando la inscripción es automática.

  Los valores predeterminados se pueden usar para el bien (impulsar hacia mejores resultados) o para la
  manipulación (ocultar términos desfavorables en casillas premarcadas). Comprender
  el efecto te ayuda a diseñar mejores sistemas y a resistir valores predeterminados no deseados.

why_this_is_important: |
  Comprender el efecto por defecto te ayuda a diseñar una arquitectura de elección que
  mejora los resultados, y te ayuda a reconocer cuándo tus elecciones están siendo
  moldeadas por valores predeterminados en lugar de preferencias deliberadas.

when_to_use:
  - toma_de_decisiones
  - liderazgo
  - resolucion_de_problemas
  - evaluacion_de_riesgos

how_can_you_spot_it:
  inertia_toward_default: |
    La mayoría de las personas se quedan con lo que sea que esté preseleccionado.
  implied_recommendation: |
    Interpretamos el valor predeterminado como "lo que quieren que elijamos".
  opt_in_vs_opt_out: |
    El encuadre cambia drásticamente la participación (opt-in vs. opt-out).
  pre_checked_boxes: |
    Las opciones preseleccionadas tienen una fuerte ventaja en formularios y configuraciones.

examples:
  organ_donation: |
    Los países con exclusión voluntaria (opt-out) tienen tasas de donación mucho más altas que los países con participación voluntaria (opt-in):
    el valor predeterminado importa más que las actitudes.
  retirement_savings: |
    La inscripción automática aumenta drásticamente la participación en 401(k).
  software_installers: |
    Las opciones "recomendadas" y los complementos premarcados moldean lo que los usuarios instalan.
  subscriptions: |
    Las pruebas gratuitas que por defecto pasan a ser inscripciones de pago capturan a muchos que no
    elegirían activamente suscribirse.

real_world_implications: |
  El efecto por defecto es uno de los impulsos (nudges) más poderosos. Moldea el ahorro,
  la salud, la privacidad y el comportamiento del consumidor. La arquitectura de elección ética utiliza
  los valores predeterminados para mejorar los resultados; los patrones oscuros los utilizan para explotar.

professional_application:
  networking_and_relationship_building: |
    Al diseñar procesos para otros, elige valores predeterminados que sirvan a sus
    intereses. Evita patrones oscuros que utilicen valores predeterminados para extraer valor.
  collaborative_learning_initiative: |
    Establece valores predeterminados para las prácticas de equipo (por ejemplo, por defecto asíncrono, por defecto
    documentación) que se alineen con el comportamiento deseado. Haz que la elección correcta sea la elección fácil.

how_can_this_be_misapplied:
  dark_patterns: |
    Usar valores predeterminados para engañar a las personas a tomar decisiones desfavorables (por ejemplo, cargos ocultos,
    suscripciones no deseadas).
  paternalism: |
    Imponer valores predeterminados que anulan la preferencia genuina sin consentimiento.
  manipulation: |
    Ocultar términos desfavorables en valores predeterminados y contar con la inercia.
  one_size_fits_all: |
    Asumir que el mismo valor predeterminado es correcto para todos cuando las preferencias varían.

related_content:
  - anchoring_bias
  - framing_effect
  - loss_aversion_bias
  - bounded_rationality
