id: anchoring_bias
name: Sesgo de anclaje

quick_introduction: |
  El sesgo de anclaje es la tendencia a depender demasiado de la primera información
  que se encuentra al tomar decisiones. Ese "ancla" inicial sesga los juicios posteriores,
  incluso cuando es irrelevante o arbitraria.

one_liner: El primer número que ves moldea a todos los que le siguen.

try_this:
  - Antes de una negociación, decide tu número objetivo y evita ser anclado por el suyo.
  - Al estimar, genera tu propio número antes de escuchar el de los demás.
  - Pregunta: ¿Pensaría diferente si hubiera visto un número diferente primero?

ask_yourself:
  - ¿Qué número o idea encontré primero y está sesgando mi juicio?
  - ¿Me estoy ajustando lo suficiente desde el ancla, o sigo demasiado cerca de ella?

in_more_detail: |
  En un experimento clásico, las personas a las que se les pidió que estimaran el porcentaje de naciones africanas
  en la ONU dieron estimaciones más altas si acababan de ver un número más alto (por ejemplo, 65 frente a 10).
  El ancla, incluso cuando es aleatoria, influyó en sus respuestas. El anclaje afecta las negociaciones,
  la fijación de precios, la contratación y la previsión.

  El primer número que vemos se convierte en un punto de referencia. Nos ajustamos a partir de él, pero
  generalmente de manera insuficiente. Incluso cuando sabemos que el ancla es arbitraria, aún puede influirnos.
  Los expertos no son inmunes.

why_this_is_important: |
  Comprender el anclaje te ayuda a tomar mejores decisiones, negociar de manera más efectiva y evitar ser manipulado.
  También explica por qué el orden y el encuadre de la información son tan importantes.

when_to_use:
  - toma_de_decisiones
  - negociacion
  - inversion
  - evaluacion_de_riesgos

how_can_you_spot_it:
  first_number_dominance: |
    El primer número en una negociación o estimación influye desproporcionadamente en el resultado.
  insufficient_adjustment: |
    Al ajustarse desde un ancla, las personas típicamente no se ajustan lo suficiente.
  arbitrary_anchor_influence: |
    Incluso los números obviamente irrelevantes (por ejemplo, los últimos dígitos de un número de seguro social)
    pueden afectar las estimaciones.
  order_effects: |
    La secuencia en la que se presentan las opciones cambia las elecciones.

examples:
  salary_negotiation: |
    El primer número mencionado, ya sea por el empleador o el candidato, a menudo ancla la oferta final.
  real_estate: |
    El precio de lista ancla las percepciones de valor de los compradores, incluso cuando se establece deliberadamente
    alto o bajo.
  retail: |
    "Antes $99, ahora $49" utiliza el precio original como ancla para que el precio de venta parezca una ganga.
  forecasting: |
    Las estimaciones iniciales en las reuniones de planificación anclan las proyecciones posteriores, incluso cuando
    la primera estimación fue una suposición.

real_world_implications: |
  El anclaje moldea mercados, negociaciones y políticas. Puede usarse éticamente (por ejemplo,
  estableciendo expectativas razonables) o sin ética (por ejemplo, precios manipuladores).
  Reconocerlo mejora la calidad de las decisiones.

professional_application:
  networking_and_relationship_building: |
    En las negociaciones, considera hacer la primera oferta para establecer el ancla, o sé consciente
    de cuándo la otra parte lo está haciendo.
  collaborative_learning_initiative: |
    En las reuniones, ten cuidado con quién habla primero sobre las estimaciones; considera
    recopilar estimaciones independientes antes de la discusión.

how_can_this_be_misapplied:
  manipulation: |
    Usar deliberadamente anclas extremas para dirigir a otros hacia resultados deseados.
  overconfidence_in_anchors: |
    Confiar demasiado en tu propia primera estimación sin revisarla.
  ignoring_relevant_information: |
    Permitir que un ancla anule datos más relevantes.
  exploitation: |
    Tácticas de venta que utilizan precios inflados de "comparar a" para hacer que los precios reales parezcan
    razonables.

related_content:
