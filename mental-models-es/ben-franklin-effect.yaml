id: ben_franklin_effect
name: El Efecto Ben Franklin

quick_introduction: |
  El efecto Ben Franklin es el fenómeno psicológico por el cual las personas quieren más
  a alguien después de haberle hecho un favor. Contrariamente a la intuición de que hacemos favores a personas que nos gustan, a menudo llegamos a querer a personas para las que hemos hecho favores.

one_liner: Llegamos a querer a las personas a las que les hemos hecho favores—nuestras actitudes siguen nuestras acciones.

try_this:
  - Si quieres mejorar una relación, considera pedir un pequeño favor.
  - Date cuenta de cuándo hacer un favor cambia tus sentimientos hacia alguien.
  - Sé consciente de que los demás pueden quererte más después de ayudarte.

ask_yourself:
  - ¿Hacerle un favor a alguien ha cambiado mi opinión sobre esa persona?
  - ¿Estoy racionalizando mi esfuerzo aumentando mi estima hacia ellos?

in_more_detail: |
  Benjamín Franklin describió famosamente cómo ganarse a un legislador rival pidiéndole prestado un libro raro de su biblioteca. Después de que el hombre accediera, Franklin se lo devolvió con una nota de agradecimiento. La relación mejoró notablemente. El efecto sugiere que nuestras actitudes siguen nuestras acciones: cuando invertimos esfuerzo en ayudar a alguien, racionalizamos ese esfuerzo aumentando nuestra estima positiva hacia esa persona.

  La teoría de la disonancia cognitiva explica esto: cuando le hacemos un favor a alguien que nos desagrada o hacia quien nos sentimos neutrales, experimentamos tensión entre nuestra acción (ayudar) y nuestra actitud (desagrado). Resolver esa tensión queriéndolos más es a menudo más fácil que admitir que actuamos en contra de nuestras preferencias.

why_this_is_important: |
  Comprender el efecto Ben Franklin te ayuda a construir relaciones estratégicamente y a reconocer cuándo tus propios sentimientos pueden estar influenciados por favores pasados. También explica por qué pedir pequeños favores puede ser más efectivo que ofrecerlos cuando intentas mejorar una relación.

when_to_use:
  - construccion_de_relaciones
  - negociacion
  - liderazgo
  - resolucion_de_conflictos

how_can_you_spot_it:
  liking_after_helping: |
    Observa cuándo te sientes más a gusto con alguien después de haberle hecho un favor, incluso si previamente te sentías neutral o negativo.
  others_requesting_small_favors: |
    Cuando alguien pide repetidamente pequeños favores, puede estar aprovechando consciente o inconscientemente este efecto para crear una conexión.
  attitude_shift_post_investment: |
    Después de invertir tiempo o esfuerzo en ayudar a alguien, observa si tu opinión sobre esa persona ha cambiado positivamente.
  reciprocal_relationship_dynamics: |
    Las relaciones en las que una persona ha hecho muchos favores pueden sentirse desequilibradas en afecto a pesar de parecer equilibradas en acción.

examples:
  networking: |
    Pedirle a un colega su opinión sobre un borrador, lo que lleva a esa persona a sentirse más involucrada en tu éxito y más dispuesta positivamente hacia ti.
  sales: |
    Un vendedor le pide a un prospecto un pequeño favor (por ejemplo, una referencia o una introducción), lo que aumenta el compromiso y la simpatía del prospecto.
  conflict_resolution: |
    Después de un desacuerdo, pedirle a la otra parte ayuda con algo no relacionado puede suavizar las tensiones y reconstruir la buena voluntad.
  mentoring: |
    Cuando una persona mayor le pide a una persona más joven su opinión o ayuda, la persona más joven a menudo se siente más valorada y conectada.

real_world_implications: |
  El efecto Ben Franklin influye en la contratación, las ventas, la diplomacia y las dinámicas sociales cotidianas. Puede usarse éticamente para construir puentes o de forma poco ética para manipular el afecto. Reconocerlo te ayuda a entender por qué algunas relaciones se sienten más fuertes después de dar favores asimétricos.

professional_application:
  networking_and_relationship_building: |
    Al construir relaciones, considera pedir favores pequeños y razonables en lugar de solo ofrecerlos. El acto de ayudar crea inversión y estima positiva.
  collaborative_learning_initiative: |
    En los equipos, que los miembros se ayuden mutuamente (por ejemplo, revisión por pares, capacitación cruzada) puede fortalecer la cohesión. Estructura la colaboración para que todos den y reciban ayuda.

how_can_this_be_misapplied:
  manipulation: |
    Pedir favores deliberadamente solo para que alguien te quiera, sin una necesidad genuina, puede sentirse explotador si se descubre.
  overreliance_on_favors: |
    Asumir que los favores por sí solos arreglarán una relación rota; algunos conflictos requieren una conversación directa y rendición de cuentas.
  asymmetric_exploitation: |
    Pedir favores repetidamente sin reciprocidad puede ser contraproducente y generar resentimiento.
  misattributing_motives: |
    Asumir que la calidez de alguien es puramente genuina cuando puede ser en parte el resultado de favores que te ha hecho.

