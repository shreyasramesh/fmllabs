id: availability_cascade
name: Cascada de disponibilidad

quick_introduction: |
  Una cascada de disponibilidad es un proceso de auto-refuerzo donde una idea gana
  plausibilidad a través de la discusión pública repetida. Cuanto más se discute,
  más "disponible" se vuelve, más gente la cree, y más se discute. Una creencia colectiva gana impulso independientemente de su
  verdad subyacente.

one_liner: Cuanto más se repite una idea, más plausible parece, independientemente de la evidencia.

try_this:
  - Pregunta: ¿Esta creencia está generalizada porque es cierta, o porque se repite?
  - Busca fuentes primarias antes de aceptar "lo que todo el mundo sabe".
  - Observa cuándo la repetición por sí sola está impulsando tu sentido de plausibilidad.

ask_yourself:
  - ¿Creería esto si lo hubiera oído solo una vez?
  - ¿Estoy confundiendo "todo el mundo lo dice" con "la evidencia lo respalda"?

in_more_detail: |
  Timur Kuran y Cass Sunstein describieron cómo funcionan las cascadas de disponibilidad:
  la disponibilidad de información (con qué frecuencia oímos algo) y la plausibilidad
  (qué tan creíble parece) se refuerzan mutuamente. La cobertura mediática, las redes sociales
  y el discurso público amplifican ciertas ideas. Una vez que una idea alcanza
  un umbral de disponibilidad, puede propagarse rápidamente y convertirse en "conocimiento común"
  incluso si es falsa o exagerada.

  Las cascadas de disponibilidad pueden ser beneficiosas (difundiendo advertencias importantes)
  o perjudiciales (difundiendo pánico o desinformación). Están impulsadas por la
  heurística de disponibilidad y la prueba social.

why_this_is_important: |
  Reconocer las cascadas de disponibilidad te ayuda a evaluar si la creencia generalizada
  refleja evidencia o mera repetición. Explica cómo las ideas se vuelven virales
  y cómo las creencias colectivas pueden estar equivocadas. Es esencial para
  la alfabetización mediática y el pensamiento crítico.

when_to_use:
  - toma_de_decisiones
  - evaluacion_de_riesgos
  - aprendizaje
  - liderazgo

how_can_you_spot_it:
  repetition_plausibility_spiral: |
    Cuanto más se repite una idea, más plausible parece.
  media_amplification: |
    La cobertura impulsa la creencia, que impulsa más cobertura.
  social_proof_belief: |
    "Todo el mundo lo cree" se convierte en evidencia para la creencia.
  threshold_effects: |
    Una vez que una idea cruza un umbral de visibilidad, se propaga rápidamente.

examples:
  health_scares: |
    Un estudio sugiere que un producto es peligroso; los medios lo amplifican;
    el público lo evita; sigue más cobertura. El riesgo puede ser
    exagerado.
  financial_panic: |
    Se difunden rumores de quiebra de bancos; la gente retira su dinero; la corrida
    se vuelve auto-cumplida.
  social_media: |
    Una narrativa se vuelve viral; la repetición aumenta la creencia; la creencia
    aumenta el intercambio. La verdad y la viralidad pueden divergir.
  organizational: |
    Se difunde un rumor sobre despidos; la ansiedad aumenta; el comportamiento
    cambia; el rumor gana plausibilidad a través de la reacción.

real_world_implications: |
  Las cascadas de disponibilidad moldean la opinión pública, la política y los mercados.
  Pueden difundir tanto verdades importantes como falsedades peligrosas.
  El pensamiento crítico requiere distinguir la creencia basada en evidencia
  de la creencia impulsada por cascadas.

professional_application:
  networking_and_relationship_building: |
    Cuando una idea está "en todas partes", pregunta: ¿Es cierta porque se
    repite, o se repite porque es cierta? Busca fuentes primarias.
  collaborative_learning_initiative: |
    Crea normas de verificación antes de amplificar. Fomenta
    el cuestionamiento de "lo que todo el mundo sabe". Distingue el consenso
    que refleja evidencia del consenso que refleja
    disponibilidad.

how_can_this_be_misapplied:
  dismissing_all_consensus: |
    A veces la creencia generalizada es correcta. No asumas que todas
    las ideas populares son cascadas.
  conspiracy_thinking: |
    Usar la "cascada de disponibilidad" para descartar preocupaciones legítimas
    como fabricadas.
  false_skepticism: |
    Rechazar ideas bien respaldadas porque son populares.
  contrarianism: |
    Asumir que todo lo que es ampliamente creído debe estar equivocado.

related_content:
