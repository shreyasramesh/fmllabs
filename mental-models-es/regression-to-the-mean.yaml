id: regression_to_the_mean
name: Regresión a la media

quick_introduction: |
  La regresión a la media es el fenómeno estadístico por el cual los resultados extremos tienden
  a ser seguidos por resultados más cercanos al promedio. Después de un resultado inusualmente bueno o malo,
  el siguiente resultado probablemente será menos extremo, no por ninguna intervención causal, sino debido a la variación aleatoria.

one_liner: Los resultados extremos tienden a ser seguidos por resultados más cercanos al promedio.

try_this:
  - No atribuyas la "regresión" a tu intervención; a menudo habría ocurrido de todos modos.
  - Después de un resultado extremo, espera que el siguiente sea menos extremo.
  - Pregunta: ¿Este cambio se debe a lo que hice, o solo a la regresión a la media?

ask_yourself:
  - ¿Estoy atribuyendo a mi intervención méritos o culpas por lo que podría ser variación aleatoria?
  - ¿Habría ocurrido esto sin mi acción?

in_more_detail: |
  Si un estudiante obtiene una puntuación inusualmente alta en un examen, probablemente obtendrá una puntuación más cercana a
  su promedio en el siguiente, no porque se haya "vuelto perezoso", sino porque la primera puntuación fue en parte suerte. Lo mismo se aplica al rendimiento deportivo, los rendimientos de las acciones y las métricas empresariales. A menudo atribuimos la "regresión" a algo que hicimos (por ejemplo,
  castigo o recompensa), cuando en realidad habría ocurrido de todos modos.

  Daniel Kahneman describe cómo los instructores de vuelo concluyeron erróneamente que
  el elogio empeoraba el rendimiento y la crítica lo mejoraba; estaban observando
  la regresión a la media después de actuaciones extremas.

why_this_is_important: |
  Comprender la regresión a la media evita atribuir erróneamente la causalidad.
  Te ayuda a evitar reaccionar de forma exagerada a los valores atípicos y a realizar cambios basados en el ruido.
  Es esencial para evaluar intervenciones y rendimiento.

when_to_use:
  - toma_de_decisiones
  - inversion
  - evaluacion_de_riesgos
  - liderazgo

how_can_you_spot_it:
  extreme_followed_by_average: |
    Un resultado inusualmente bueno o malo va seguido de otro más cercano a la media.
  spurious_causation: |
    Atribuir la "recuperación" o "disminución" a una intervención cuando la regresión
    habría ocurrido de todos modos.
  overreaction_to_outliers: |
    Realizar cambios de política o personales basados en un único punto de datos extremo.
  reward_punishment_confusion: |
    Creer que el castigo "funcionó" cuando la mejora fue solo regresión.

examples:
  sports: |
    Un jugador tiene un partido de su carrera y luego vuelve a la media; los aficionados pueden culpar a la "complacencia".
  investing: |
    Una acción tiene un gran año y luego revierte; los inversores pueden atribuir la disminución
    a una mala gestión cuando es en parte reversión.
  performance_reviews: |
    Un empleado tiene un mal trimestre, recibe retroalimentación y mejora; la retroalimentación puede recibir
    crédito cuando la regresión habría ocurrido independientemente.
  medicine: |
    Un paciente se siente peor, toma un tratamiento y mejora; el tratamiento puede recibir
    crédito cuando parte de la mejora fue natural.

real_world_implications: |
  La regresión a la media afecta cómo evaluamos a profesores, médicos, gestores de fondos y a nosotros mismos.
  Explica por qué "lo que sube tiene que bajar" a menudo se mantiene
  estadísticamente. Malinterpretarla conduce a intervenciones desperdiciadas y a una falsa confianza en los remedios.

professional_application:
  networking_and_relationship_building: |
    No sobreinterpretes una mala interacción aislada; puede ser un valor atípico que regresará
    a la media de la relación.
  collaborative_learning_initiative: |
    Al evaluar intervenciones (capacitación, cambios de proceso), utiliza grupos de control
    y múltiples puntos de datos para distinguir el efecto de la regresión.

how_can_this_be_misapplied:
  dismissing_all_interventions: |
    Asumir que cualquier mejora después de una intervención es "solo regresión"
    cuando existen efectos reales.
  underreacting: |
    Ignorar problemas reales porque "regresará a la media".
  statistical_illiteracy: |
    Confundir regresión con una fuerza que "corrige" los resultados; es solo
    probabilidad.
  overconfidence: |
    Asumir que la media es estable cuando el proceso subyacente puede haber cambiado.

