# yaml-language-server: $schema=../schema/mental-model-schema.json
# உறுதிப்படுத்தல் சார்பு (Confirmation Bias)
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரணப் பதிவு

id: confirmation_bias
name: உறுதிப்படுத்தல் சார்பு

quick_introduction: |
  உறுதிப்படுத்தல் சார்பு என்பது நமது ஏற்கனவே உள்ள நம்பிக்கைகளை உறுதிப்படுத்தும் தகவல்களைத் தேடுவது, விளக்குவது மற்றும் நினைவில் கொள்வது ஆகும். நாம் ஆதரவான ஆதாரங்களுக்கு அதிக முக்கியத்துவம் கொடுக்கிறோம், நமது கருத்துக்களை எதிர்க்கும் ஆதாரங்களை புறக்கணிக்கிறோம் அல்லது நிராகரிக்கிறோம். நமது கருதுகோள்களைச் சோதிப்பதை விட, உறுதிப்படுத்தும் கேள்விகளைக் கேட்கிறோம்.

one_liner: நாம் நமது நம்பிக்கைகளை உறுதிப்படுத்துவதைத் தேடுகிறோம், நினைவில் கொள்கிறோம்; அவற்றிற்கு முரணானவற்றை புறக்கணிக்கிறோம்.

try_this:
  - கேள்: என்னை எது தவறென்று நிரூபிக்கும்? மாற்று ஆதாரங்களைத் தீவிரமாகத் தேடுங்கள்.
  - ஆதரவான தகவல்களுக்கு முரணான தகவல்களை விட அதிக முக்கியத்துவம் கொடுக்கும்போது கவனியுங்கள்.
  - எதிர்தரப்பு பார்வையை உங்கள் பார்வையை போலவே தீவிரமாக கருதுங்கள்.

ask_yourself:
  - நான் எனது கருதுகோளை சோதிக்கிறேனா அல்லது உறுதிப்படுத்துகிறேனா?
  - புதிய ஆதாரங்களின் அடிப்படையில் நான் கடைசியாக எப்போது என் மனதை மாற்றிக்கொண்டேன்?

in_more_detail: |
  நாம் தகவல்களை நடுநிலையாகப் பார்ப்பதில்லை. நாம் உறுதிப்படுத்தலைத் தேடுகிறோம், தெளிவற்ற தன்மையை ஆதரவாக விளக்குகிறோம், தவறுகளை விட சரியானவற்றையே அதிகம் நினைவில் கொள்கிறோம். நம்மைப் போன்ற எண்ணம் கொண்டவர்களுடனும், ஊடகங்களுடனும் நம்மைச் சூழ்ந்துகொள்கிறோம். "நான் ஏன் சரியாக இருக்கிறேன்?" என்று கேட்பதற்குப் பதிலாக "என்னை எது தவறென்று நிரூபிக்கும்?" என்று கேட்கிறோம். இது நம்மை அதிக நம்பிக்கையுடன் இருக்க வைக்கிறது, புதுப்பிக்க தாமதப்படுத்துகிறது.

  உறுதிப்படுத்தல் சார்பு மிகவும் பரவலான மற்றும் நன்கு ஆவணப்படுத்தப்பட்ட சார்புகளில் ஒன்றாகும்.
  இது அறிவியல், அரசியல், உறவுகள் மற்றும் வணிகம் ஆகியவற்றைப் பாதிக்கிறது. அதை வெல்வதற்கு
  கவனமான முயற்சி மற்றும் கட்டமைக்கப்பட்ட செயல்முறைகள் தேவை.

why_this_is_important: |
  சிறந்த முடிவெடுப்பதற்கும், கற்றலுக்கும் உறுதிப்படுத்தல் சார்பை அங்கீகரிப்பது அவசியம்.
  இது மாற்று ஆதாரங்களைத் தேடவும், மாற்று கருதுகோள்களைக் கருத்தில் கொள்ளவும், தேவைப்படும்போது
  உங்கள் நம்பிக்கைகளைப் புதுப்பிக்கவும் உதவுகிறது. இது அறிவியல் சிந்தனையின் அடித்தளம்.

when_to_use:
  - முடிவெடுத்தல் (decision-making)
  - கற்றல் (learning)
  - சிக்கல்_தீர்த்தல் (problem_solving)
  - இடர்_மதிப்பீடு (risk_assessment)

how_can_you_spot_it:
  seeking_support: |
    உங்கள் பார்வையைச் சோதிப்பதை விட, உறுதிப்படுத்தும் ஆதாரங்களைத் தேடுதல்.
  asymmetric_interpretation: |
    தெளிவற்ற ஆதாரங்களை உங்கள் நிலைக்கு ஆதரவாக விளக்குதல்.
  discounting_disconfirming: |
    உங்கள் நம்பிக்கைகளுக்கு முரணான ஆதாரங்களை நிராகரித்தல் அல்லது குறைத்து மதிப்பிடுதல்.
  selective_exposure: |
    உங்களுக்கு உடன்படும் ஆதாரங்களில் இருந்து மட்டுமே தகவல்களைப் பெறுதல்.

examples:
  hiring: |
    ஆரம்பத்தில் ஒரு நல்ல அபிப்பிராயத்தை உருவாக்கி, பின்னர் அந்த வேட்பாளர் சிறந்தவர் என்பதை உறுதிப்படுத்தும் கேள்விகளைக் கேட்டல்.
  investing: |
    ஒரு பங்குகளை வாங்கிய பிறகு, நேர்மறையான செய்திகளைத் தேடுவது மற்றும் எதிர்மறையான பகுப்பாய்வுகளைப் புறக்கணித்தல்.
  relationships: |
    உங்கள் பார்வையை (நல்லது அல்லது கெட்டது) உறுதிப்படுத்தும் ஒரு கண்ணோட்டத்தில் ஒரு துணையின் செயல்களை விளக்குதல்.
  politics: |
    உங்கள் தரப்பிலிருந்து வரும் தகவல்களை விமர்சனமின்றி ஏற்றுக்கொள்வது மற்றும் எதிர்தரப்பிலிருந்து வரும் சமமான தகவல்களை நிராகரிப்பது.

real_world_implications: |
  உறுதிப்படுத்தல் சார்பு தவறான நம்பிக்கைகளைத் தக்கவைக்கிறது, துருவமுனைப்பைத் தூண்டுகிறது, மற்றும் விலையுயர்ந்த தவறுகளுக்கு வழிவகுக்கிறது. இது நல்ல அறிவியல் மற்றும் நல்ல முடிவெடுப்பதன் எதிரி. அதை வெல்வதற்கு கவனமான மறுப்புத் தேடல் அவசியம்.

professional_application:
  networking_and_relationship_building: |
    மனிதர்களைப் பற்றிய கருத்துக்களை உருவாக்கும்போது, ​​மாற்று ஆதாரங்களைத் தீவிரமாகத் தேடுங்கள். "எது என் மனதை மாற்றும்?" என்று கேட்டு, அதைக் கண்டறியுங்கள்.
  collaborative_learning_initiative: |
    எதிர்வாதக்காரர் (devil's advocate), சிவப்பு அணிகள் (red teams), மற்றும் முன்-மரணப் பரிசோதனைகள் (pre-mortems) ஆகியவற்றைப் பயன்படுத்தி மாற்று பார்வைகளை வெளிக்கொணருங்கள். நல்ல ஆதாரங்களுடன் நிலவும் கருத்துக்களை சவால் செய்யும் நபர்களுக்குப் பரிசளிக்கவும்.

how_can_this_be_misapplied:
  false_balance: |
    ஒரு பக்கம் ஆதாரங்கள் கடுமையாக ஆதரிக்கும்போது அனைத்துப் பார்வைகளையும் சமமாகச் செல்லுபடியாகும் என்று கருதுதல்.
  excessive_skepticism: |
    சில நம்பிக்கைகள் நன்கு ஆதரிக்கப்படும்போது அனைத்து ஆதாரங்களையும் "உறுதிப்படுத்தல் சார்பு" என்று நிராகரித்தல்.
  contrarianism: |
    உறுதிப்படுத்தல் சார்பைத் தவிர்க்கவே எதிர்தரப்பு பார்வையை ஏற்றுக்கொள்வது - அசல் பார்வை சரியாக இருக்கலாம்.
  analysis_paralysis: |
    "நாம் சார்புடையவர்களாக இருக்கலாம்" என்பதால் ஒருபோதும் ஒரு பார்வைக்கு உறுதியளிக்காமல் இருப்பது.

