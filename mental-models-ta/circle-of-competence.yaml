id: circle_of_competence
name: தகுதி வட்டம்

quick_introduction: |
  தகுதி வட்டம் என்பது ஒரு மன மாதிரி ஆகும். இது உங்கள் நிபுணத்துவத்தின் எல்லைகளை அறிந்து, முக்கியமான முடிவுகளை எடுக்கும்போது அவற்றுக்குள்ளேயே இருக்குமாறு வலியுறுத்துகிறது. வாரன் பப்பெட் மற்றும் சார்லி முங்கர், உங்களுக்குத் தெரியாததை அறிந்துகொள்வதை வலியுறுத்துகின்றனர்.

one_liner: உங்கள் நிபுணத்துவத்தின் எல்லைகளை அறிந்து கொள்ளுங்கள் - அது முக்கியமாக இருக்கும்போது அவற்றுக்குள்ளேயே இருங்கள்.

try_this:
  - உங்களுக்கு உண்மையான நிபுணத்துவம் உள்ள இடங்களையும், நீங்கள் ஊகிக்கும் இடங்களையும் பட்டியலிடுங்கள்.
  - உங்கள் வட்டத்திற்கு வெளியே இருக்கும்போது, ​​ஆலோசனை கேளுங்கள் அல்லது பொறுப்பை ஒப்படையுங்கள்.
  - நேர்மையாக இருங்கள்: ஒரு உண்மையான நிபுணர் உங்கள் தீர்ப்பை இங்கே ஏற்றுக்கொள்வாரா?

ask_yourself:
  - நான் எனது தகுதி வட்டத்திற்குள் இருக்கிறேனா, அல்லது ஊகிக்கிறேனா?
  - இந்தத் துறையில் கடைசியாக "எனக்குத் தெரியாது" என்று எப்போது ஒப்புக்கொண்டேன்?

in_more_detail: |
  ஒவ்வொரு நபருக்கும் உண்மையான நிபுணத்துவம் உள்ள பகுதிகள் உள்ளன - அங்கு அவர்கள் தகவல்களை மதிப்பிடலாம், பிழைகளைக் கண்டறியலாம் மற்றும் நம்பகமான தீர்ப்புகளை வழங்கலாம். அந்த வட்டத்திற்கு வெளியே, அவர்கள் மற்றவர்களைப் போலவே சார்புகளுக்கும் தவறுகளுக்கும் ஆளாகிறார்கள். முக்கியமானது நேர்மையான சுய மதிப்பீடு: நீங்கள் உண்மையில் எதில் திறமையானவர், எதில் ஊகிக்கிறீர்கள்?

  முறையான கற்றல் மூலம் வட்டம் விரிவுபடுத்தப்படலாம், ஆனால் அதன் தற்போதைய எல்லைகளை அங்கீகரிக்க பணிவு தேவை. உங்கள் வட்டத்திற்கு வெளியே செயல்படுவது, குறிப்பாக ஆபத்து அதிகமாக இருக்கும்போது, ​​விலையுயர்ந்த தவறுகளின் அபாயத்தை அதிகரிக்கிறது.

why_this_is_important: |
  உங்கள் தகுதி வட்டத்திற்குள் இருப்பது விலையுயர்ந்த தவறுகளைக் குறைக்கிறது மற்றும் முடிவெடுக்கும் தரத்தை மேம்படுத்துகிறது. இது எப்போது ஆலோசனை கேட்பது, பொறுப்பை ஒப்படையுங்கள் அல்லது தவிர்ப்பது என்பதையும் அறிய உதவுகிறது. உங்கள் வட்டத்திற்கு வெளியே உள்ள அதீத நம்பிக்கை தோல்விக்கான ஒரு முக்கிய ஆதாரமாகும்.

when_to_use:
  - முடிவு_எடுத்தல்
  - முதலீடு
  - தொழில்_முன்னேற்றங்கள்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  honest_boundary_assessment: |
    ஒரு துறையில் உங்கள் அறிவின் வரம்புகளை உங்களால் விளக்க முடியுமா? உங்களுக்குத் தெரியாததை உங்களுக்குத் தெரியுமா?
  knowing_when_to_defer: |
    தனியாக முடிவெடுப்பதற்குப் பதிலாக நிபுணத்துவ உள்ளீட்டைக் கேட்க வேண்டிய சூழ்நிலைகளை அங்கீகரித்தல்.
  consistent_track_record: |
    உங்கள் வட்டத்திற்குள், உங்கள் தீர்ப்புகள் காலப்போக்கில் சரிபார்க்கப்படும்; வெளியே, அவை சரிபார்க்கப்படுவதில்லை.
  calibration: |
    ஒரு துறையில் உங்கள் நம்பிக்கை அந்தத் துறையில் உங்கள் உண்மையான செயல்திறனுடன் பொருந்துகிறது.

examples:
  investing: |
    டெக் ஸ்டாக்குகளை பப்பெட் தவிர்க்கிறார், ஏனெனில் அவை அவரது தகுதி வட்டத்திற்கு வெளியே இருப்பதாக அவர் கூறுகிறார் - அவற்றை நம்பத்தகுந்த வகையில் அவரால் மதிப்பிட முடியாது.
  career: |
    தங்கள் துறையில் நிலைத்திருக்கும் ஒரு நிபுணர், தொடர்பில்லாத பகுதியில் "நீட்டிப்பு" பாத்திரத்தை எடுக்கும் ஒருவரை விட.
  hiring: |
    உங்கள் சொந்த தீர்ப்பை நம்புவது எப்போது, ​​தொழில்நுட்பப் பணிகளுக்கு நிபுணர்களை அழைப்பது எப்போது என்பதை அறிதல்.
  advice_giving: |
    ஊகிப்பதை விட, உங்கள் நிபுணத்துவத்திற்கு அப்பாற்பட்ட தலைப்புகளில் கருத்து தெரிவிக்க மறுப்பது.

real_world_implications: |
  தகுதி வட்டம் மதிப்பு முதலீடு மற்றும் தொழில்முறை வெற்றிக்கு மையமானது. அதை புறக்கணிப்பது அதீத நம்பிக்கை, தோல்வியுற்ற முயற்சிகள் மற்றும் மோசமான ஆலோசனைக்கு வழிவகுக்கிறது. வட்டத்தை விரிவுபடுத்துவதற்கு முறையான முயற்சி மற்றும் நேர்மையான பின்னூட்டம் தேவை.

professional_application:
  networking_and_relationship_building: |
    உங்கள் தகுதி வட்டங்களை நிறைவு செய்யும் நபர்களுடன் உறவுகளை உருவாக்குங்கள். உங்களை நீங்களே பதிலளிப்பதற்குப் பதிலாக மற்றவர்களை அறிமுகப்படுத்த வேண்டிய நேரம் எப்போது என்பதை அறிந்து கொள்ளுங்கள்.
  collaborative_learning_initiative: |
    ஒன்றுடன் ஒன்று இணைந்த மற்றும் நிரப்பு வட்டங்களைக் கொண்ட குழுக்களை உருவாக்குங்கள். தங்கள் திறமைக்கு வெளியே செயல்படும்போது அதைத் தெரிவிக்குமாறு மக்களை ஊக்குவிக்கவும்.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    ஒருபோதும் உங்கள் வட்டத்திற்கு வெளியே செல்லாமல் இருப்பது வளர்ச்சி மற்றும் கற்றலைக் கட்டுப்படுத்தலாம்.
  false_modesty: |
    பொறுப்புக்கூறல் அல்லது கடினமான முடிவுகளைத் தவிர்ப்பதற்காக ஒரு சிறிய வட்டத்தை உரிமை கோருதல்.
  gatekeeping: |
    அவர்களின் வாதங்களில் ஈடுபடாமல் மற்றவர்களை நிராகரிக்க "தகுதி வட்டம்" என்பதைப் பயன்படுத்துதல்.
  stagnation: |
    முயற்சியால் விரிவாக்கக்கூடிய ஒன்றாக வட்டத்தை நடத்துவது.

