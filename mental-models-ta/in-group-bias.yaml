id: in_group_bias
name: அகக் குழு சார்பு (In-Group Bias)

quick_introduction: |
  அகக் குழு சார்பு என்பது, நம் குழுவைச் சேர்ந்தவர்கள் என்று நாம் கருதுபவர்களுக்கு, நம் குழுவைச் சாராதவர்களை விட சாதகமாகச் செயல்படும் ஒரு போக்கு ஆகும். நாம் மிகச் சிறிய அல்லது தன்னிச்சையான வேறுபாடுகளின் அடிப்படையில், அகக் குழு உறுப்பினர்களுக்கு நேர்மறையான குணங்களையும், புறக் குழு உறுப்பினர்களுக்கு எதிர்மறையான குணங்களையும் அளிக்கிறோம்.

one_liner: நாம் நமது அகக் குழுவிற்குச் சாதகமாக செயல்படுகிறோம், புறக் குழுக்களைக் கடுமையாக எடை போடுகிறோம் - பெரும்பாலும் தன்னிச்சையாக.

try_this:
  - கேளுங்கள்: அவர்கள் என் குழுவில் இருந்திருந்தால் இந்த நபரை நான் இப்படித்தான் மதிப்பிடுவேனா?
  - முடிவெடுக்கும் போது, புறக் குழுவின் கருத்துக்களை தீவிரமாகத் தேடுங்கள்.
  - உங்கள் தீர்ப்பை குழு எல்லைகள் எவ்வாறு வடிவமைக்கின்றன என்பதை கவனியுங்கள்.

ask_yourself:
  - நான் "நம் ஆட்கள்" என்பதால் ஒருவருக்குச் சாதகமாகச் செயல்படுகிறேனா?
  - புறக் குழு உறுப்பினருக்கு நான் அதே விதிகளைப் பயன்படுத்துவேனா?

in_more_detail: |
  குழுக்கள் தன்னிச்சையாக ஒதுக்கப்பட்டாலும் (எ.கா., நாணயம் சுண்டுவதன் மூலம்), மக்கள் விரைவாக தங்கள் அகக் குழுவிற்கு ஆதரவை வளர்த்துக் கொள்கிறார்கள். அகக் குழு உறுப்பினர்களை நாங்கள் அதிகம் நம்புகிறோம், அவர்களுக்கு தாராளமாக வளங்களை ஒதுக்கிறோம், மேலும் அவர்களின் செயல்களை இன்னும் கனிவாக மதிப்பிடுகிறோம். புறக் குழு உறுப்பினர்கள் இதற்கு நேர்மாறான சிகிச்சையைப் பெறுகிறார்கள்.

  அகக் குழு சார்பு பழங்குடிவாதம், பாகுபாடு மற்றும் மோதலைத் தூண்டுகிறது. இது பணியமர்த்தல், பதவி உயர்வு, ஒத்துழைப்பு மற்றும் கொள்கையை பாதிக்கிறது. இது இனம், தேசியம், நிறுவனம், குழு அல்லது எந்தவொரு பகிரப்பட்ட அடையாளத்தையும் அடிப்படையாகக் கொள்ளலாம்.

why_this_is_important: |
  அகக் குழு சார்பை அங்கீகரிப்பது, நியாயமான முடிவுகளை எடுக்கவும், மேலும் உள்ளடக்கிய குழுக்களை உருவாக்கவும், மற்றும் சலுகையைத் தவிர்க்கவும் உங்களுக்கு உதவுகிறது. பன்முகத்தன்மை முயற்சிகள் ஏன் எதிர்ப்பை எதிர்கொள்கின்றன என்பதையும் இது விளக்குகிறது - அகக் குழு விருப்பம் தானியங்கி.

when_to_use:
  - தலைமைத்துவம் (leadership)
  - முடிவெடுத்தல் (decision-making)
  - உறவுகளை உருவாக்குதல் (relationship_building)
  - மோதல் தீர்வு (conflict_resolution)

how_can_you_spot_it:
  preferential_treatment: |
    "நமக்கு" சந்தேகத்தின் பலனை வழங்குதல், ஆனால் "அவர்களுக்கு" வழங்காமல் இருப்பது.
  resource_allocation: |
    புறக் குழு உறுப்பினர்கள் சமமான அல்லது அதிகத் தேவையில் இருக்கும்போது, அகக் குழு உறுப்பினர்களுக்கு அதிக வளங்களை ஒதுக்குதல்.
  attribution_asymmetry: |
    அகக் குழு வெற்றி = திறமை; புறக் குழு வெற்றி = அதிர்ஷ்டம். அகக் குழு தோல்வி = சூழ்நிலை; புறக் குழு தோல்வி = குணம்.
  minimal_group_effects: |
    தன்னிச்சையான குழு ஒதுக்கீடுகளுடன் கூட சாதகமான நிலை உருவாகிறது.

examples:
  hiring: |
    உங்கள் அதே பல்கலைக்கழகத்தில் படித்த அல்லது உங்கள் பின்னணியைப் பகிர்ந்து கொள்ளும் வேட்பாளர்களுக்கு முன்னுரிமை அளித்தல்.
  performance_reviews: |
    ஒத்த செயல்திறன் கொண்ட புறக் குழு உறுப்பினர்களை விட அகக் குழு உறுப்பினர்களுக்கு சாதகமாக மதிப்பிடுதல்.
  collaboration: |
    "நமது குழுவை" நம்புதல் மற்றும் சேர்த்துக் கொள்ளுதல், அதே நேரத்தில் "அவர்களது குழுவை" விலக்கி வைத்தல் அல்லது சந்தேகப்படுதல்.
  politics: |
    புறக் குழு வாதங்களை நிராகரிக்கும் போது, அகக் குழு வாதங்களை விமர்சனமின்றி ஏற்றுக்கொள்வது.

real_world_implications: |
  அகக் குழு சார்பு சமத்துவமின்மையைத் தக்க வைத்துக் கொள்கிறது, தகுதி அடிப்படையிலான அமைப்பை பலவீனப்படுத்துகிறது, மேலும் மோதலைத் தூண்டுகிறது. இது பணியமர்த்தல், பதவி உயர்வு, முதலீடு மற்றும் கொள்கையைப் பாதிக்கிறது. அதைக் குறைக்க வேண்டுமென்றால், அது தானாகச் சரிசெய்யாது - வேண்டுமென்றே முயற்சி தேவை.

professional_application:
  networking_and_relationship_building: |
    உங்கள் உடனடி வட்டத்திற்கு வெளியே உள்ள நபர்களை தீவிரமாகச் சேர்க்கவும். பல்வேறுபட்ட கண்ணோட்டங்களைத் தேடுங்கள். நீங்கள் "உங்களைப் போன்றவர்கள்" என்பதால் ஒருவருக்குச் சாதகமாகச் செயல்படுகிறீர்களா என்று கேள்வி கேளுங்கள்.
  collaborative_learning_initiative: |
    பணியமர்த்தல் மற்றும் மதிப்பீட்டில் அகக் குழு சார்பைக் குறைக்க கட்டமைக்கப்பட்ட செயல்முறைகளைப் (மறைக்கப்பட்ட மதிப்பாய்வுகள், பன்முகக் குழுக்கள்) பயன்படுத்தவும். பகிரப்பட்ட அடையாளத்தை உருவாக்க குழுக்களுக்கிடையேயான திட்டங்களை உருவாக்கவும்.

how_can_this_be_misapplied:
  forced_diversity: |
    அடிப்படை சார்புகளை நிவர்த்தி செய்யாமல் வெறுப்பை உருவாக்கும் ஒதுக்கீடுகள் அல்லது கொள்கைகளைச் செயல்படுத்துதல்.
  out_group_hostility: |
    புறக் குழு பகைமையும் இருக்கும்போது, அகக் குழு சார்பை மட்டுமே பிரச்சனையாகக் கருதுதல்.
  ignoring_legitimate_differences: |
    எல்லா குழு வேறுபாடுகளும் சார்பு அல்ல - சில சமயங்களில் குழுக்கள் வெவ்வேறு குணாதிசயங்களைக் கொண்டுள்ளன. எல்லா ஏற்றத்தாழ்வுகளையும் பாகுபாடு என்று கருத வேண்டாம்.
  reverse_discrimination: |
    அகக் குழு உறுப்பினர்களுக்கு நியாயமற்ற முறையில் புறக் குழுக்களுக்குச் சாதகமாக மிக அதிகமாகச் செயல்படுதல்.

