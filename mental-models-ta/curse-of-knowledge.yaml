# அறிவின் சாபம்
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரணப் பதிவு

id: curse_of_knowledge
name: அறிவின் சாபம்

quick_introduction: |
  நீங்கள் ஏதோ ஒன்றை அறிந்த பிறகு, அதை அறியாத நிலை எப்படி இருக்கும் என்பதை கற்பனை செய்ய முடியாததே அறிவின் சாபம். நிபுணர்கள் ஆரம்பநிலையினருக்குக் கற்பிப்பதில் சிரமப்படுகிறார்கள், ஏனெனில் அவர்களால் ஆரம்பநிலையாளரின் பார்வையை மீண்டும் உருவாக்க முடியாது. நீங்கள் அறிந்தவுடன், அறியாதிருந்த நிலையை மறந்து விடுகிறீர்கள்.

one_liner: ஏதோ ஒன்றை அறிந்த பிறகு, அறியாதிருந்த நிலையை மறந்து விடுகிறீர்கள்.

try_this:
  - விளக்கும்போது, ​​முதல் கொள்கைகளில் இருந்து தொடங்குங்கள்—உங்கள் பார்வையாளர்கள் எதையும் அறியாதவர்கள் என்று கருதுங்கள்.
  - ஒரு ஆரம்பநிலையாளரை விளக்குமாறு கேளுங்கள்; அவர்களின் குழப்பம் உங்கள் குருட்டுப் புள்ளிகளை வெளிப்படுத்தும்.
  - நீங்கள் படிகளைத் தவிர்க்கிறீர்களா அல்லது மற்றவர்களுக்குத் தெரியாத சொற்களைப் பயன்படுத்துகிறீர்களா என்பதைக் கவனியுங்கள்.

ask_yourself:
  - மற்றவர்களுக்கும் என்னிடம் உள்ள அதே சூழல் இருப்பதாக நான் கருதுகிறேனா?
  - எனது பின்னணி இல்லாத ஒருவருக்கு இது புரியுமா?

in_more_detail: |
  ஒரு கிளாசிக் சோதனையில், ஒரு புதிரின் பதிலைத் தெரிந்தவர்கள் ஒரு பாடலின் தாளத்தை தட்டி, மற்றவர்கள் அதைக் யூகிக்க எதிர்பார்தார்கள்—அது எவ்வளவு தெளிவாக இருந்தது என்பதை அவர்கள் அதிகமாக மதிப்பிட்டனர். தட்டுபவர்கள் தங்கள் தலையில் பாடலை "கேட்காமல்" இருக்க முடியவில்லை. அறிவு "ஒட்டும் தன்மையுடையது"; அறியாமையை உருவகப்படுத்துவது கடினம்.

  இந்த சாபம் கற்பித்தல், தொடர்பு, தயாரிப்பு வடிவமைப்பு மற்றும் தலைமைத்துவத்தை பாதிக்கிறது. மற்றவர்களுக்கும் நம்மைப் போன்ற அதே சூழல் இருப்பதாக நாம் கருதுகிறோம். நாம் சொற்களைப் பயன்படுத்துகிறோம். நாம் படிகளைத் தவிர்க்கிறோம். மக்கள் "புரிந்துகொள்ளாதபோது" நாம் ஆச்சரியப்படுகிறோம்.

why_this_is_important: |
  அறிவின் சாபத்தை அங்கீகரிப்பது கற்பித்தல், தொடர்பு மற்றும் தயாரிப்பு வடிவமைப்பை மேம்படுத்துகிறது. இது நீங்கள் இருக்கும் இடத்தில் இருந்து மக்களை சந்திப்பதை விட, அவர்கள் இருக்கும் இடத்திலிருந்து அவர்களை சந்திக்க உதவுகிறது. இது பயனுள்ள அறிவுப் பரிமாற்றத்திற்கு அவசியம்.

when_to_use:
  - கற்றல்
  - தலைமைத்துவம்
  - சிக்கல்_தீர்த்தல்
  - உறவு_கட்டமைத்தல்

how_can_you_spot_it:
  obvious_to_you: |
    பதில் உங்களுக்குத் தெரிந்தால் மட்டுமே அது "தெளிவாக" இருக்கும்.
  jargon_use: |
    பார்வையாளர்களுக்குத் தெரியாத சொற்களை வரையறுக்காமல் பயன்படுத்துதல்.
  skipped_steps: |
    நீங்கள் விட்டுச் சென்றவற்றை மற்றவர்கள் நிரப்புவார்கள் என்று கருதுதல்.
  frustration_with_learners: |
    அவர்களுக்கு உங்கள் சூழல் இல்லாதபோது "அவர்களுக்கு ஏன் அது தெரியவில்லை?"

examples:
  teaching: |
    ஒரு கணிதப் பேராசிரியர் தனக்கு "தெளிவாக" இருக்கும் படிகளை, மாணவர்களுக்கு இன்றியமையாததாக இருந்தபோதிலும், தவிர்க்கிறார்.
  product_design: |
    வடிவமைப்பாளர்கள் தங்களுக்குப் புரியும் இடைமுகங்களை உருவாக்குகிறார்கள், ஆனால் புதிய பயனர்களைக் குழப்புகிறார்கள்.
  onboarding: |
    அனுபவம் வாய்ந்த ஊழியர்கள் புதிய பணியாளர்களுக்குத் தெரியாததை மறந்து, போதுமான பயிற்சி அளிப்பதில்லை.
  writing: |
    ஆசிரியர்கள் வாசகர்களுக்கு அதே பின்னணி இருப்பதாகக் கருதி, தேவையான சூழலைத் தவறவிடுகிறார்கள்.

real_world_implications: |
  அறிவின் சாபம் தொடர்பு இடைவெளிகள், தோல்வியுற்ற தயாரிப்புகள் மற்றும் பயனற்ற கற்பித்தலை உருவாக்குகிறது. நிபுணர்கள் ஏன் மோசமான ஆசிரியர்களாக இருக்க முடியும் என்பதற்கு இது ஒரு காரணம். அதை வெல்வதற்கு, பார்வையாளர்களின் பார்வையை ஏற்றுக்கொள்வதற்கு கவனமான முயற்சி தேவை.

professional_application:
  networking_and_relationship_building: |
    விளக்கும்போது, ​​மற்ற நபரின் மட்டத்திலிருந்து தொடங்குங்கள். "அவர்கள் ஏற்கனவே என்ன அறிந்திருக்கிறார்கள்?" என்று கேளுங்கள். உங்கள் பின்னணி இல்லாத ஒருவருடன் உங்கள் தொடர்பை சோதிக்கவும்.
  collaborative_learning_initiative: |
    "நான் ஐந்து வயது குழந்தைக்கு விளக்குவது போல் விளக்கு" பயிற்சிகளைப் பயன்படுத்தவும். நிபுணர்கள் ஆரம்பநிலையாளர்களுக்குக் கற்பித்து பின்னூட்டம் பெறட்டும். முன்னறிவிப்பு அறிவு தேவையில்லை என்று கருதி ஆவணங்களை உருவாக்கவும். சக கற்பித்தலைப் பயன்படுத்தவும்—சமீபத்தில் கற்றுக்கொண்டவர்கள் ஆரம்பநிலையாளரின் பார்வையை நினைவில் கொள்கிறார்கள்.

how_can_this_be_misapplied:
  oversimplification: |
    தவறான அல்லது இழிவான நிலைக்கு எளிமைப்படுத்துதல்.
  false_assumption: |
    மற்றவர்கள் தாங்கள் நினைப்பதை விடக் குறைவாக அறிவார்கள் என்று கருதுவது—இதுவும் அளவுத்திருத்தத்தின் தோல்வி.
  one_size_fits_all: |
    அனைத்து பார்வையாளர்களுக்கும் ஒரே மாதிரியான விளக்க நிலை தேவையில்லை; பார்வையாளர்களுக்கு ஏற்ப சரிசெய்யவும்.
  avoiding_complexity: |
    சில தலைப்புகள் சிக்கலானவை; அறிவின் சாபம் என்றால், பொருத்தமாக இருக்கும்போது தொழில்நுட்ப மொழியைப் பயன்படுத்தக்கூடாது என்று அர்த்தமல்ல.

