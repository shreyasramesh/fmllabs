# டன்னிங்-க்ரூகர் விளைவு
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரண உள்ளீடு

id: dunning_kruger_effect
name: டன்னிங்-க்ரூகர் விளைவு

quick_introduction: |
  டன்னிங்-க்ரூகர் விளைவு என்பது ஒரு அறிவாற்றல் சார்புநிலையை விவரிக்கிறது, இதில் ஒரு துறையில் குறைந்த அறிவு அல்லது திறன் உள்ளவர்கள் தங்கள் திறனை அதிகமாக மதிப்பிடுகிறார்கள், அதேசமயம் நிபுணர்கள் தங்கள் திறனை குறைத்து மதிப்பிட முனைகிறார்கள். உங்களுக்கு எவ்வளவு குறைவாகத் தெரியுமோ, அவ்வளவு நம்பிக்கையுடன் நீங்கள் இருக்கலாம்.

one_liner: உங்களுக்கு எவ்வளவு குறைவாகத் தெரியுமோ, அவ்வளவு நம்பிக்கையுடன் நீங்கள் இருக்கலாம்.

try_this:
  - புதிய துறைகளில், நீங்கள் அதிகமாக மதிப்பிடுகிறீர்கள் என்று கருதுங்கள்—கருத்துக்களைக் கேட்டு, சரிபார்த்துக் கொள்ளுங்கள்.
  - நிபுணர்கள் சந்தேகத்தை வெளிப்படுத்தும் போது, ​​அதை தீவிரமாக எடுத்துக் கொள்ளுங்கள்; அவர்கள் விளிம்பு நிலைகளை அறிந்திருக்கலாம்.
  - ஒரு துறையில் நிபுணர்களை விட புதியவர்கள் அதிக உறுதியுடன் இருக்கும்போது கவனிக்கவும்.

ask_yourself:
  - நான் "முட்டாள்தனத்தின் உச்சியில்" அல்லது "தாழ்மையின் பள்ளத்தாக்கில்" இருக்கிறேனா?
  - எனது சொந்த திறனை மதிப்பிடும் அறிவாற்றல் திறனை நான் இங்கு பெற்றிருக்கிறேனா?

in_more_detail: |
  டன்னிங் மற்றும் க்ரூகரின் ஆராய்ச்சி, திறமையற்ற தனிநபர்களுக்கு தங்கள் சொந்த திறமையின்மையை அங்கீகரிக்கும் அறிவாற்றல் திறன் இல்லை என்பதைக் காட்டியது. உங்கள் செயல்திறனை மதிப்பிடுவதற்கு, திறம்பட செயல்படத் தேவையான அதே திறன்கள் தேவை—எனவே திறமையற்றவர்கள் இரட்டை பின்னடைவை எதிர்கொள்கிறார்கள்: அவர்கள் மோசமாக செயல்படுகிறார்கள், அது அவர்களுக்குத் தெரியாது.

  திறமை அதிகரிக்கும் போது, ​​மக்கள் பெரும்பாலும் "தாழ்மையின் பள்ளத்தாக்கை" அனுபவிக்கிறார்கள், அங்கு அவர்களுக்கு எவ்வளவு தெரியாது என்பதை அவர்கள் உணர்கிறார்கள். உண்மையான நிபுணர்கள் குறைந்த நம்பிக்கையுடன் இருக்கலாம், ஏனெனில் அவர்கள் நுணுக்கங்கள் மற்றும் விளிம்பு நிலைகளை மிகத் தெளிவாக அறிந்திருக்கிறார்கள்.

why_this_is_important: |
  டன்னிங்-க்ரூகர் விளைவை அங்கீகரிப்பது உங்கள் சொந்த நம்பிக்கையை சரிசெய்யவும், புதியவர்களின் கருத்துக்களை அதிகமாக மதிப்பிடுவதைத் தவிர்க்கவும், நிபுணர்களின் தாழ்மையை மதிக்கவும் உதவுகிறது. இது கற்றல், பணியமர்த்தல் மற்றும் முடிவெடுப்பதற்கு அவசியம்.

when_to_use:
  - கற்றல்
  - முடிவெடுத்தல்
  - தலைமைத்துவம்
  - தொழில்_முன்னேற்றம்

how_can_you_spot_it:
  novice_overconfidence: |
    குறைந்த அனுபவம் உள்ள ஒருவர் வலுவான, தகுதிவாய்ந்த கருத்துக்களை வெளிப்படுத்துகிறார்.
  expert_underconfidence: |
    அதிக திறமையானவர்கள், குறைந்த திறமையானவர்களை விட அதிகமாக சந்தேகம் தெரிவிக்கிறார்கள்.
  inability_to_recognize_quality: |
    மோசமான செயல்திறன் கொண்டவர்கள் தங்கள் துறையில் நல்ல மற்றும் கெட்ட வேலைகளுக்கு இடையில் வேறுபடுத்த முடியாது.
  confidence_competence_mismatch: |
    ஆரம்பநிலையாளர்களிடையே நம்பிக்கை மற்றும் உண்மையான திறமை நேர்மாறாக தொடர்புடையவை.

examples:
  social_media: |
    ஒரு தலைப்பைப் பற்றிய மேலோட்டமான அறிவு உள்ளவர்கள், அந்தத் துறையின் நிபுணர்களுடன் நம்பிக்கையுடன் வாதிடுகிறார்கள்.
  hiring: |
    நேர்காணல்களில் மோசமாக செயல்பட்ட வேட்பாளர்கள் சில சமயங்களில் தங்கள் சொந்த செயல்திறனை அதிகமாக மதிப்பிடுகிறார்கள்.
  investing: |
    புதிய முதலீட்டாளர்கள் ஆரம்ப வெற்றிகளுக்குப் பிறகு அதிகமாக நம்பிக்கையுடன் இருக்கலாம், அதிர்ஷ்டத்தை அவர்கள் அங்கீகரிக்காமல் இருக்கலாம்.
  workplace: |
    இளைய ஊழியர்கள் பதவி உயர்வுக்கான தங்கள் தயார்நிலையை அதிகமாக மதிப்பிடலாம், அதே நேரத்தில் மூத்தவர்கள் தங்களை சந்தேகிப்பார்கள்.

real_world_implications: |
  டன்னிங்-க்ரூகர் விளைவு கல்வி, பணியமர்த்தல், அரசியல் மற்றும் பொது விவாதங்களை பாதிக்கிறது. கெட்ட யோசனைகள் ஏன் பெருக்கப்படுகின்றன என்பதையும், நிபுணர்கள் ஏன் புறக்கணிக்கப்படலாம் என்பதையும் இது விளக்குகிறது. தனிப்பட்ட மற்றும் கூட்டு முடிவெடுப்பதற்கு சரிபார்த்தல் முக்கியம்.

professional_application:
  networking_and_relationship_building: |
    ஒருவர் மிகுந்த நம்பிக்கையுடன் இருக்கும்போது, ​​அவர்கள் டன்னிங்-க்ரூகர் மண்டலத்தில் இருக்கலாம் என்று கருதுங்கள். சந்தேகத்தை வெளிப்படுத்துபவர்களிடமிருந்தும், பல்வேறு கண்ணோட்டங்களை நாடுங்கள்.
  collaborative_learning_initiative: |
    சந்தேகத்தை ஒப்புக்கொள்வது பாராட்டப்படும் கலாச்சாரங்களை உருவாக்குங்கள். சரிபார்த்தல் பயிற்சிகள் மற்றும் தங்கள் திறனை துல்லியமாக மதிப்பிடுவதற்கு மக்களை உதவும் கருத்துக்களை ஊக்குவிக்கவும்.

how_can_this_be_misapplied:
  dismissing_all_confidence: |
    நம்பிக்கையானவர்கள் எப்போதும் தவறு என்று கருதுவது; சில சமயங்களில் நம்பிக்கை நியாயமானது.
  false_modesty: |
    நிபுணர்கள் தாழ்மையாக தோன்றுவதற்காக தங்களுக்குத் தெரிந்ததை விட குறைவாக நடிப்பது.
  gatekeeping: |
    "நிபுணர்களின்" கருத்துக்களுடன் உடன்படாத எவரையும் அவர்களின் வாதங்களில் ஈடுபடாமல் புறக்கணிக்க டன்னிங்-க்ரூகரைப் பயன்படுத்துதல்.
  self_doubt_paralysis: |
    உங்கள் சொந்த தீர்ப்பை ஒருபோதும் நம்பாத அளவுக்கு அதிகமாக சரிசெய்வது.

