# பூஜ்ஜிய-கூட்டல் சிந்தனை
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரண உள்ளீடு

id: zero_sum_thinking
name: பூஜ்ஜிய-கூட்டல் சிந்தனை

quick_introduction: |
  பூஜ்ஜிய-கூட்டல் சிந்தனை என்பது ஒருவருடைய வெற்றி மற்றவருடைய இழப்பாக இருக்க வேண்டும் என்ற நம்பிக்கை - வளங்கள் நிலையானவை மற்றும் உங்களுக்கு கிடைக்கும் எந்தவொரு நன்மையும் எனக்கு பாதகமானது.
  உண்மையில், பல சூழ்நிலைகள் நேர்மறை-கூட்டல்: இரு தரப்பினரும் பயனடையலாம்.

one_liner: உங்கள் வெற்றி என் இழப்பாக இருக்கத் தேவையில்லை—பல சூழ்நிலைகள் நேர்மறை-கூட்டல்.

try_this:
  - கேளுங்கள்: நாம் பையை விரிவாக்க முடியுமா? இது உண்மையில் பூஜ்ஜிய-கூட்டலா?
  - போட்டி இருப்பதாகக் கருதுவதற்கு முன் ஒத்துழைப்பைத் தேடுங்கள்.
  - ஒரு சூழ்நிலையை நிலையான-பை என்று நீங்கள் கருதும் போது கவனியுங்கள், உண்மையில் அப்படி இல்லை.

ask_yourself:
  - நாம் அதை விரிவாக்கக்கூடிய போது, நான் ஒரு நிலையான பையை அனுமானிக்கிறேனா?
  - ஒத்துழைப்பு போட்டியால் ஏற்படும் மதிப்பை விட அதிக மதிப்பை உருவாக்குமா?

in_more_detail: |
  ஒரு பூஜ்ஜிய-கூட்டல் விளையாட்டில், மொத்தம் நிலையானது—உங்கள் வெற்றி என் இழப்பு. நேர்மறை-கூட்டல்
  சூழ்நிலைகளில், ஒத்துழைப்பு மதிப்பை உருவாக்குகிறது. வர்த்தகம், புதுமை மற்றும் உறவு
  கட்டுதல் பெரும்பாலும் நேர்மறை-கூட்டல். பூஜ்ஜிய-கூட்டல் சிந்தனை தேவையற்ற போட்டிக்கு, ஒத்துழைப்புக்கான தவறவிட்ட வாய்ப்புகளுக்கு, மற்றும் அழிவுகரமான
  போட்டிக்கு வழிவகுக்கிறது.

  இந்த சார்பு பேச்சுவார்த்தைகள், அரசியல் மற்றும் நிறுவன இயக்கவியலில் பொதுவானது.
  பை எப்போதும் விரிவாக்கக்கூடியதாக இருக்கும்போது ஒரு நிலையான பையை இது அனுமானிக்கிறது. இது சுய-நிறைவேற்றமாக மாறும்:
  நீங்கள் மற்றவர்களை எதிரிகளாக நடத்தினால், அவர்கள் எதிரிகளாக மாறிவிடுவார்கள்.

why_this_is_important: |
  பூஜ்ஜிய-கூட்டல் சிந்தனையை அங்கீகரிப்பது ஒத்துழைப்பு மற்றும்
  மதிப்பு உருவாக்கத்திற்கான வாய்ப்புகளைத் திறக்கிறது. இது பேச்சுவார்த்தையை மேம்படுத்துகிறது, மோதலைக் குறைக்கிறது, மற்றும் வெற்றி-வெற்றி
  முடிவுகளை செயல்படுத்துகிறது. சிறந்த வாய்ப்புகளில் பல நேர்மறை-கூட்டல்.

when_to_use:
  - பேச்சுவார்த்தை
  - தலைமைத்துவம்
  - உறவு_கட்டுதல்
  - முடிவெடுத்தல்

how_can_you_spot_it:
  fixed_pie_assumption: |
    "அவர்கள் வென்றால், நான் தோற்கிறேன்" என்று சூழ்நிலை இருவருக்கும் லாபம் தரும் போது.
  competitive_ framing: |
    சூழ்நிலைகளை தானாகவே நாvs-அவர்கள் என்று கட்டமைத்தல்.
  envy_of_others_gains: |
    மற்றவர்களின் வெற்றியை உங்கள் வெற்றியை குறைப்பதாக வெறுப்பது.
  missed_cooperation: |
    அனைவருக்கும் பயனளிக்கும் ஒத்துழைப்புக்கான வாய்ப்புகளைக் காணத் தவறுதல்.

examples:
  negotiation: |
    மற்ற தரப்பினருக்கான சிறந்த ஒப்பந்தம் உங்களுக்கு மோசமான ஒப்பந்தம் என்று அனுமானிப்பது—படைப்புத்திறன் மிக்க தீர்வுகள் பெரும்பாலும் இருவருக்கும் மதிப்பை விரிவுபடுத்தும் போது.
  salary: |
    "என் சக ஊழியர் சம்பள உயர்வு பெற்றால், எனக்கு குறைவாக இருக்கும்" என்று பட்ஜெட்டுகள் நெகிழ்வாக இருக்கும் போது அல்லது உருவாக்கப்பட்ட மதிப்பால் உயர்வுகள் நியாயப்படுத்தப்படலாம்.
  politics: |
    "அவர்களின் கட்சியின் வெற்றிகள் எங்கள் இழப்புகள்" என்று பல கொள்கை விளைவுகள் பல குழுக்களுக்கு பயனளிக்கும் போது.
  career: |
    "அவர்களின் பதவி உயர்வு எனக்கு குறைவான வாய்ப்பு என்று அர்த்தம்" என்று நிறுவன வளர்ச்சி அனைவருக்கும் அதிக வாய்ப்புகளை உருவாக்கும் போது.

real_world_implications: |
  பூஜ்ஜிய-கூட்டல் சிந்தனை மோதலைத் தூண்டுகிறது, ஒத்துழைப்பைக் கட்டுப்படுத்துகிறது, மற்றும் தவறவிட்ட வாய்ப்புகளை ஏற்படுத்துகிறது.
  இது பொருளாதாரம், உறவுகள் மற்றும்
  புதுமைகளில் பெரும்பாலும் தவறானது. நேர்மறை-கூட்டல் கட்டமைப்பிற்கு மாறுவது விளைவுகளை மேம்படுத்துகிறது.

professional_application:
  networking_and_relationship_building: |
    மற்றவர்களுக்கு மதிப்பை உருவாக்குவதற்கான வழிகளைத் தேடுங்கள்—அவர்களின் வெற்றி உங்களுக்காக வாய்ப்புகளை உருவாக்கலாம். இரு தரப்பினரும் பயனடையும் உறவுகளை உருவாக்குங்கள்.
  collaborative_learning_initiative: |
    குழு இலக்குகளை நேர்மறை-கூட்டல் என்று கட்டமைக்கவும்: பகிரப்பட்ட வெற்றி, பையை வளர்ப்பது.
    உள் போட்டிக்கு பதிலாக ஒத்துழைப்பை ஊக்குவிக்கவும்.

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    சில சூழ்நிலைகள் பூஜ்ஜிய-கூட்டல் (எ.கா., ஒரு பதவி உயர்வு, ஒரு நிலையான பட்ஜெட்).
    அப்படி இல்லை என்று பாசாங்கு செய்வது அப்பாவியாக இருக்கலாம்.
  naive_cooperation: |
    சில நடிகர்கள் உண்மையான எதிரிகளாக இருக்கும்போது அனைவரும் ஒத்துழைப்பார்கள் என்று அனுமானிப்பது.
  undervaluing_competition: |
    போட்டி மேம்பாட்டைத் தூண்டலாம்; எல்லா போட்டியும் அழிவுகரமானது அல்ல.
  exploitation: |
    பயனடையாதவர்களிடமிருந்து மதிப்பை எடுக்க "நேர்மறை-கூட்டல்" கட்டமைப்பைப் பயன்படுத்துதல்.

