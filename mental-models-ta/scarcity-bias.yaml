# அரிதான தன்மை சார்பு
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரணப் பதிவு

id: scarcity_bias
name: அரிதான தன்மை சார்பு

quick_introduction: |
  அரிதான தன்மை சார்பு என்பது, ஒரு பொருள் அரிதாக அல்லது குறைவாகக் கிடைக்கும்போது, அதற்கு அதிக மதிப்பளிக்கும் போக்காகும். "வரையறுக்கப்பட்ட நேரம்," "இன்னும் 3 மட்டுமே உள்ளன," மற்றும் "பிரத்தியேக அணுகல்" போன்ற வார்த்தைகள் அவசரத்தையும் ஆசையையும் தூண்டுகின்றன. இதனால், அந்தப் பொருளை நாம் உண்மையில் விரும்புகிறோமா அல்லது தேவையா என்பதைப் பகுத்தறிந்து மதிப்பிடுவதற்குப் பதிலாக, இந்த உணர்வுகள் நம்மை ஆட்கொள்கின்றன.

one_liner: அரிதான தன்மை, உணரப்பட்ட மதிப்பை அதிகரிக்கிறது—"வரையறுக்கப்பட்ட" என்பது பகுத்தறிவை மீறி அவசரத்தைத் தூண்டுகிறது.

try_this:
  - கேளுங்கள்: இது அரிதாக இல்லையென்றால் இதை நான் விரும்புவேனா? அவசரத்தை நீக்கிப் பாருங்கள்.
  - வரையறுக்கப்பட்ட நேரம் அல்லது "இன்னும் X மட்டுமே உள்ளன" போன்ற சலுகைகளில் செயல்படுவதற்கு முன் சற்று நிறுத்துங்கள்.
  - உண்மையான மதிப்பை விட, அரிதான தன்மையே உங்கள் விருப்பத்தைத் தூண்டுகிறதா என்பதைக் கவனியுங்கள்.

ask_yourself:
  - இது அரிதாக இருப்பதால் இதை நான் மதிக்கிறேனா, அல்லது உண்மையில் எனக்கு இது தேவைப்படுவதால் மதிக்கிறேனா?
  - அரிதான தன்மையின் பின்னணி இல்லாமல் இந்த முடிவை எடுப்பேனா?

in_more_detail: |
  அரிதான தன்மை, உணரப்பட்ட மதிப்பை அதிகரிக்கிறது. ஒரு பொருள் அரிதாகவோ அல்லது மறைந்து கொண்டோ இருக்கும்போது, அதை நாம் அதிகம் விரும்புகிறோம்—ஏனென்றால் அரிதான தன்மை தரத்தைக் குறிக்கலாம், மேலும் இழப்பு வெறுப்பு (loss aversion) நம்மை எதையாவது இழந்துவிடுவோமோ என்ற பயத்தில் ஆழ்த்துகிறது. சந்தைப்படுத்துபவர்களும் பேச்சுவார்த்தையாளர்களும் அவசரத்தை உருவாக்க அரிதான தன்மையைப் பயன்படுத்துகின்றனர். இந்த சார்பு, அவசரமான முடிவுகள், அதிகப்படியான செலவுகள் மற்றும் மோசமான முன்னுரிமைகள் ஆகியவற்றிற்கு வழிவகுக்கும்.

  மேலும், உண்மையான வளப் பற்றாக்குறையால் பாதிக்கப்படுபவர்களின் அறிவாற்றல் திறன்களையும் அரிதான தன்மை பாதிக்கிறது; வறுமை மற்ற முடிவுகளுக்கான "மன வளத்தை" குறைக்கலாம்.

why_this_is_important: |
  அரிதான தன்மை சார்பை அங்கீகரிப்பது, உங்களைத் தந்திரமான உத்திகளில் இருந்து தப்பிக்கவும், மிகவும் கவனமான தேர்வுகளைச் செய்யவும் உதவுகிறது. இது, வரையறுக்கப்பட்ட பதிப்புகளை நாம் ஏன் அதிகமாக மதிக்கிறோம் என்பதையும், தேவைப்படாதபோது நாம் ஏன் அவசரமாகச் செயல்படுகிறோம் என்பதையும் விளக்குகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - பேச்சுவார்த்தை
  - முதலீடு
  - இடர் மதிப்பீடு

how_can_you_spot_it:
  urgency_trigger: |
    "வரையறுக்கப்பட்ட நேரம்" அல்லது "இன்னும் X மட்டுமே உள்ளன" என்பது நியாயமற்ற ஆசையை உருவாக்குகிறது.
  fear_of_missing_out: |
    அணுகலை இழக்கும் சாத்தியக்கூறு, உள்ளார்ந்த மதிப்பை விட செயலைத் தூண்டுகிறது.
  impulsive_purchases: |
    அரிதாக இருப்பதால் பொருட்களை வாங்குவது, உங்களுக்குத் தேவைப்படுவதால் அல்ல.
  artificial_scarcity: |
    அரிதான தன்மை செயற்கையாக உருவாக்கப்படுகிறது (எ.கா., போலி கவுண்ட்டவுன்கள்) உண்மையானது அல்ல.

examples:
  sales: |
    "இன்னும் 2 மட்டுமே கையிருப்பில் உள்ளன" அல்லது "விற்பனை இன்று இரவு முடிகிறது" என்பது, அவசரத்தின்றி நடக்காத வாங்குதல்களைத் தூண்டுகிறது.
  auctions: |
    ஏலதாரர்கள் வெற்றி பெறுவதில் ஈடுபட்டு, போட்டி அரிதான தன்மையால் திட்டமிட்டதை விட அதிகமாகச் செலுத்துகிறார்கள்.
  exclusivity: |
    "உறுப்பினர்களுக்கு மட்டும்" அல்லது "அழைப்புக்கு மட்டும்" அணுகல், உணரப்பட்ட மதிப்பை அதிகரிக்கிறது.
  genuine_scarcity: |
    வளங்கள் உண்மையாகவே குறைவாக இருக்கும்போது, அரிதான அழுத்தத்தில் உள்ளவர்கள் மோசமான முடிவுகளை எடுக்கிறார்கள் (எ.கா., ஏழைகள், நேரம் குறைவாக இருப்பவர்கள்).

real_world_implications: |
  அரிதான தன்மை சார்பு நுகர்வோர் நடத்தையையும், பேச்சுவார்த்தை முடிவுகளையும், கொள்கை பதில்களையும் இயக்குகிறது. இது அறரீதியாக (எ.கா., முறையான காலக்கெடு) அல்லது நேர்மையற்ற முறையில் (எ.கா., போலி அரிதான தன்மை) பயன்படுத்தப்படலாம். இதைப் புரிந்துகொள்வது, முடிவின் தரத்தை மேம்படுத்துகிறது.

professional_application:
  networking_and_relationship_building: |
    மற்றவர்கள் செயற்கையான அரிதான தன்மையை உருவாக்கும்போது கவனமாக இருங்கள் ("நான் ஒரு சில வாடிக்கையாளர்களை மட்டுமே ஏற்றுக்கொள்கிறேன்"). அரிதான தன்மை உண்மையானதா என்பதைச் சரிபார்க்கவும். உறவுகளை உருவாக்கும்போது, உங்கள் நேரத்தின் உண்மையான அரிதான தன்மை மதிப்பைக் குறிக்கலாம்—ஆனால் அதிகமாகப் பயன்படுத்துவது தந்திரமாகத் தோன்றலாம்.
  collaborative_learning_initiative: |
    முயற்சிகளுக்கு அவசரத்தை உருவாக்கும்போது, அது முறையானது என்பதை உறுதிப்படுத்தவும். போலி காலக்கெடு கண்டறியப்படும்போது நம்பிக்கையைச் சிதைக்கிறது.

how_can_this_be_misapplied:
  manipulation: |
    மற்றவர்களை முடிவுகளுக்கு அழுத்தம் கொடுக்க, வேண்டுமென்றே தவறான அரிதான தன்மையை உருவாக்குதல்.
  impulsive_decisions: |
    செயற்கையான அவசரத்தின் கீழ் முக்கியமான தேர்வுகளைச் செய்தல், அதிக நேரம் சிறந்த முடிவுகளுக்கு வழிவகுக்கும் போது.
  overvaluing_scarcity: |
    அரிதான விஷயங்கள் எப்போதும் சிறந்தவை என்று கருதுதல்—சில சமயங்களில் அரிதான தன்மை தற்செயலானது.
  exploiting_vulnerability: |
    ஏற்கனவே வள அழுத்தத்தில் உள்ளவர்களிடம் அரிதான உத்திகளைப் பயன்படுத்துதல்.

