id: impact_bias
name: தாக்க சார்பு

quick_introduction: |
  தாக்க சார்பு என்பது எதிர்கால நிகழ்வுகளுக்கு நாம் உணர்ச்சி ரீதியான எதிர்வினைகளை எவ்வாறு உணர்வோம் மற்றும் எவ்வளவு காலம் உணர்வோம் என்பதை அதிகமாக மதிப்பிடும் போக்காகும். நல்ல விஷயங்கள் நம்மை அவை செய்வதை விட மகிழ்ச்சியாக மாற்றும் என்றும், கெட்ட விஷயங்கள் நம்மை அவை செய்வதை விட மிகவும் துயரமாக மாற்றும் என்றும் நாம் நினைக்கிறோம். நாம் உணர்ச்சிகரமான முன்னறிவிப்புகளில் மோசமானவர்கள்.

one_liner: நிகழ்வுகள் நமது மகிழ்ச்சியை எவ்வளவு பாதிக்கும், எவ்வளவு காலம் பாதிக்கும் என்பதை நாம் அதிகமாக மதிப்பிடுகிறோம்.

try_this:
  - கேளுங்கள்: ஒத்த கடந்தகால நிகழ்வுகளுக்குப் பிறகு நான் எப்படி உணர்ந்தேன்? நாம் எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம்.
  - எதிர்பார்க்கப்படும் தாக்கம் முடிவுகளை இயக்க அனுமதிக்காதீர்கள் - நாம் உணர்வுகளை முன்னறிவிப்பதில் மோசமானவர்கள்.
  - ஒரு முடிவின் நீடித்த விளைவை நீங்கள் அதிகமாக மதிப்பிடும்போது கவனிக்கவும்.

ask_yourself:
  - நான் இதை எவ்வளவு காலம் உணர்வேன் என்பதை அதிகமாக மதிப்பிடுகிறேனா?
  - ஒத்த நிகழ்வுகள் குறித்து கடந்தகால அனுபவம் என்ன சொல்கிறது?

in_more_detail: |
  டேனியல் கில்பர்ட் மற்றும் டிமோதி வில்சன் ஆகியோர் உணர்ச்சிகரமான முன்னறிவிப்புகளை ஆராய்ச்சி செய்கிறார்கள்: ஒரு வெற்றிக்குப் பிறகு நாம் எவ்வளவு காலம் நன்றாக உணர்வோம் அல்லது ஒரு இழப்புக்குப் பிறகு எவ்வளவு காலம் மோசமாக உணர்வோம் என்பதை நாங்கள் அதிகமாக மதிப்பிடுகிறோம். நாம் எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம். ஒற்றை நிகழ்வுகளின் தாக்கத்தையும் நாங்கள் அதிகமாக மதிப்பிடுகிறோம் - ஒரு முடிவு எங்கள் மகிழ்ச்சியை வரையறுக்கும் என்று நாங்கள் நினைக்கிறோம், பல காரணிகள் பங்களிக்கின்றன. எங்கள் எதிர்கால உணர்வுகளை கணிக்கும்போது நாங்கள் தவறான விஷயங்களில் கவனம் செலுத்துகிறோம்.

  தாக்க சார்பு முக்கிய வாழ்க்கை முடிவுகளைப் பாதிக்கிறது: ஒரு பதவி உயர்வு, உறவு அல்லது வாங்குதல் நமது மகிழ்ச்சியை எவ்வளவு மாற்றும் என்பதை நாங்கள் அதிகமாக மதிப்பிடுகிறோம். இழப்புகளின் நீடித்த வலியையும் நாங்கள் அதிகமாக மதிப்பிடுகிறோம்.

why_this_is_important: |
  தாக்க சார்பை அங்கீகரிப்பது உங்கள் வாழ்க்கையை உண்மையில் மேம்படுத்தும் விஷயங்களைப் பற்றி சிறந்த முடிவுகளை எடுக்க உதவுகிறது. நீங்கள் நினைப்பதை விட முக்கியமில்லாத விளைவுகளில் அதிகப்படியான முதலீட்டைக் குறைக்கிறது, மேலும் நீங்கள் எதிர்பார்ப்பதை விட நீண்ட காலம் துன்பமடையாத விளைவுகளைப் பற்றிய பயத்தைக் குறைக்கிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - தொழில்_நகர்வுகள்
  - இடர்_மதிப்பீடு
  - உறவு_கட்டுமானம்

how_can_you_spot_it:
  overestimated_impact: |
    "இது எல்லாவற்றையும் மாற்றும்" அதேசமயம் ஒத்த கடந்தகால நிகழ்வுகள் மிதமான நீடித்த தாக்கத்தைக் கொண்டிருந்தன.
  duration_overestimation: |
    "நான் இதிலிருந்து ஒருபோதும் மீள மாட்டேன்" அதேசமயம் நாம் பொதுவாக எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம்.
  focalism: |
    ஒரு நிகழ்வில் கவனம் செலுத்துதல் மற்றும் நல்வாழ்வைப் பாதிக்கும் பிற காரணிகளைப் புறக்கணித்தல்.
  adaptation_neglect: |
    நல்ல மற்றும் கெட்ட சூழ்நிலைகளுக்கு நாம் தழுவிக்கொள்வதை மறந்துவிடுதல்.

examples:
  career: |
    "நான் இந்தப் பதவி உயர்வைப் பெற்றால், நான் மிகவும் மகிழ்ச்சியாக இருப்பேன்" அதேசமயம் கடந்த கால பதவி உயர்வுகள் தற்காலிக தாக்கத்தைக் கொண்டிருந்தன.
  purchases: |
    "இந்த கார் என்னை மகிழ்ச்சியாக்கும்" அதேசமயம் புதுமை விரைவில் மறைந்துவிடும்.
  loss: |
    "நான் இந்த நிராகரிப்பிலிருந்து ஒருபோதும் மீள மாட்டேன்" அதேசமயம் நாம் பொதுவாக மாதங்களுக்குள் தழுவிக்கொள்கிறோம்.
  events: |
    ஒரு திருமணம், விடுமுறை அல்லது மைல்கல் நீண்ட கால மகிழ்ச்சியை எவ்வளவு பாதிக்கும் என்பதை அதிகமாக மதிப்பிடுதல்.

real_world_implications: |
  தாக்க சார்பு பணம், தொழில் மற்றும் உறவுகள் பற்றிய மோசமான முடிவுகளுக்கு வழிவகுக்கிறது. நாம் தழுவிக்கொள்ளும் அனுபவங்களுக்கு அதிகமாகச் செலுத்துகிறோம், மேலும் நாம் மீண்டுவரும் இழப்புகளுக்கு அதிகமாகப் பயப்படுகிறோம். இது கொள்கை மற்றும் தனிப்பட்ட திட்டமிடலைப் பாதிக்கிறது.

professional_application:
  networking_and_relationship_building: |
    தொழில் அல்லது உறவு முடிவுகளை எடுக்கும்போது, ஒத்த கடந்தகால நிகழ்வுகளுக்குப் பிறகு நீங்கள் எப்படி உணர்ந்தீர்கள் என்பதைக் கவனியுங்கள். நீங்கள் எதிர்பார்த்ததை விட தாக்கம் நீடித்ததா? எதிர்கால கணிப்புகளைச் சரிசெய்ய அதைப் பயன்படுத்தவும்.
  collaborative_learning_initiative: |
    குழுக்கள் பின்னடைவுகள் அல்லது வெற்றிகளை எதிர்கொள்ளும்போது, தழுவலை அவர்களுக்கு நினைவூட்டவும். "நாம் நினைப்பதை விட வேகமாகத் தழுவுவோம்" என்பது அதிகப்படியான கொண்டாட்டத்தையும் அதிகப்படியான விரக்தியையும் குறைக்கும்.

how_can_this_be_misapplied:
  dismissing_all_impact: |
    சில நிகழ்வுகள் நீடித்த தாக்கத்தைக் கொண்டுள்ளன - அதிர்ச்சி, பெரிய இழப்பு. அனைத்து உணர்ச்சிகரமான முன்னறிவிப்புகளையும் சார்புடையதாக நிராகரிக்க வேண்டாம்.
  cold_rationality: |
    "இது ஒரு பொருட்டல்ல" அதேசமயம் அந்த நேரத்தில் அனுபவம் முக்கியமானது.
  undervaluing_experiences: |
    "நாம் எப்படியும் தழுவிக்கொள்வோம்" என்பதால் நேர்மறையான அனுபவங்களைத் தவிர்த்தல்.
  invalidating_emotions: |
    மக்கள் அந்த நேரத்தில் ஆதரவு தேவைப்படும்போது அவர்களின் உணர்வுகள் கடந்து செல்லும் என்று கூறுதல்.

