# yaml-language-server: $schema=../schema/mental-model-schema.json
# அடிப்படை விகிதப் பிழை (Base Rate Fallacy)
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரணப் பதிவு

id: base_rate_fallacy
name: அடிப்படை விகிதப் பிழை (Base Rate Fallacy)

quick_introduction: |
  அடிப்படை விகிதப் பிழை என்பது குறிப்பிட்ட, தெளிவான தகவல்களுக்குச் சாதகமாக,
  பொதுவான புள்ளிவிவரத் தகவல்களை (அடிப்படை விகிதங்கள்) புறக்கணிக்கும் போக்கு ஆகும்.
  நாம் குறிப்பிட்ட வழக்கை அதிகப்படுத்துகிறோம் மற்றும் முந்தைய நிகழ்தகவைக் குறைக்கிறோம்.
  ஒரு கவர்ச்சிகரமான கதை எண்களை மீறிச் செல்லலாம்.

one_liner: ஒரு கவர்ச்சிகரமான கதை எண்களை மீறிச் செல்லலாம்.

try_this:
  - ஒரு வழக்கைப் பற்றி தீர்ப்பளிக்கும் முன், கேளுங்கள்: இந்த வகைச் சூழ்நிலைக்கு அடிப்படை விகிதம் என்ன?
  - குறிப்பிட்ட ஆதாரத்தை முந்தைய நிகழ்தகவுடன் இணைக்கவும் - இரண்டையும் புறக்கணிக்க வேண்டாம்.
  - ஒரு தெளிவான உதாரணம் புள்ளிவிவரங்களை மூழ்கடிப்பதை எப்போது கவனிக்கவும்.

ask_yourself:
  - நான் இந்த குறிப்பிட்ட வழக்கை அதிகப்படுத்தி, அடிப்படை விகிதத்தைக் குறைக்கிறேனா?
  - கவர்ச்சிகரமான கதையை ஒதுக்கி வைத்தால் எண்கள் என்ன சொல்லும்?

in_more_detail: |
  ஒரு நோய் மக்களில் 1% பேரை பாதித்து, ஒரு சோதனை 95% துல்லியமாக இருந்தால்,
  ஒரு நேர்மறை முடிவு என்பது பொதுவாக அந்த நபருக்கு இன்னும் நோய் இல்லை என்பதைக் குறிக்கும் -
  ஏனென்றால் அடிப்படை விகிதம் மிகக் குறைவு. ஆனால் நாம் அடிப்படை விகிதங்களைப் புறக்கணித்து,
  "அவர்கள் நேர்மறையாகச் சோதனை செய்தார்கள்" என்பதில் கவனம் செலுத்துகிறோம்.
  புள்ளிவிவரங்களை விட குறிப்பிட்டவை நம்மை ஈர்க்கின்றன.

  இந்தத் தவறு மருத்துவ நோயறிதல், பணியமர்த்தல், இடர் மதிப்பீடு மற்றும் சட்டத் தீர்ப்புகளில்
  பாதிப்பை ஏற்படுத்துகிறது. பேய்சியன் பகுத்தறிவைப் பயன்படுத்தி அடிப்படை விகிதங்களை
  வழக்கு-குறிப்பிட்ட ஆதாரங்களுடன் இணைக்க வேண்டும் - ஆனால் நாம் பெரும்பாலும் செய்வதில்லை.

why_this_is_important: |
  அடிப்படை விகிதப் பிழையைச் சரிசெய்வது நோயறிதல், இடர் மதிப்பீடு மற்றும் முடிவெடுக்கும்
  தரத்தை மேம்படுத்துகிறது. இது தெளிவான நிகழ்வுகளுக்கு அதிகப்படியாக எதிர்வினையாற்றுவதையும்,
  புள்ளிவிவர யதார்த்தத்திற்கு குறைவாக எதிர்வினையாற்றுவதையும் தடுக்கிறது.

when_to_use:
  - முடிவெடுத்தல் (decision_making)
  - இடர் மதிப்பீடு (risk_assessment)
  - சிக்கல் தீர்த்தல் (problem_solving)
  - முதலீடு செய்தல் (investing)

how_can_you_spot_it:
  ignoring_prior_probabilities: |
    தீர்ப்புகளில் முந்தைய நிகழ்தகவுகள் சேர்க்கப்படுவதில்லை.
  vividness_over_statistics: |
    ஒரு தனிப்பட்ட வழக்கு அல்லது கதை திரட்டப்பட்ட தரவுகளை விட மேலோங்குகிறது.
  diagnostic_overweighting: |
    அடிப்படை விகிதத்தைக் கருத்தில் கொள்ளாமல் புதிய ஆதாரத்தை (எ.கா., சோதனை முடிவு)
    அதிகப்படுத்துதல்.
  anecdote_override: |
    "எனக்கு ஒரு நண்பர் இருக்கிறார்..." என்பது புள்ளிவிவர ஆதாரங்களை மீறுகிறது.

examples:
  medical: |
    ஒரு அரிதான நோய்க்கான நேர்மறை சோதனை - அடிப்படை விகிதம் குறைவு, எனவே நேர்மறை
    பெரும்பாலும் தவறான நேர்மறை. நாம் இதை புறக்கணித்து, அவர்களுக்கு நோய் இருப்பதாகக் கருதுகிறோம்.
  hiring: |
    ஒரு வேட்பாளர் சிறந்த நேர்காணலைக் கொண்டிருக்கிறார் - நேர்காணல்கள் செயல்திறனை எவ்வளவு
    நன்றாகக் கணிக்கின்றன என்பதற்கான அடிப்படை விகிதங்களை நாம் புறக்கணிக்கிறோம்.
  risk: |
    ஒரு விமான விபத்து தெளிவாகத் தெரிகிறது - நாம் பறக்கும் அபாயத்தை அதிகமாக மதிப்பிட்டு,
    வாகன ஓட்டுதல் அபாயத்தைக் குறைக்கிறோம், அடிப்படை விகிதங்களைப் புறக்கணிக்கிறோம்.
  startup_investing: |
    ஒரு நிறுவனர் நன்றாக விளக்கக்காட்சி அளிப்பார் - பெரும்பாலான தொடக்க நிறுவனங்கள்
    விளக்கக்காட்சி தரத்தைப் பொருட்படுத்தாமல் தோல்வியடைகின்றன என்பதை நாம் புறக்கணிக்கிறோம்.

real_world_implications: |
  அடிப்படை விகிதப் பிழை மருத்துவ முடிவுகள், சட்டத் தீர்ப்புகள் மற்றும் வணிக உத்திகளில்
  பாதிப்பை ஏற்படுத்துகிறது. இது வளங்களை தவறாக ஒதுக்கீடு செய்வதற்கும், மோசமான இடர் மதிப்பீட்டிற்கும்
  வழிவகுக்கிறது. பேய்சியன் சிந்தனை அதைச் சரிசெய்கிறது.

professional_application:
  networking_and_relationship_building: |
    நபர்களை மதிப்பிடும்போது, அடிப்படை விகிதங்களைக் கருத்தில் கொள்ளுங்கள்: எ.கா., இந்த வகை
    நடத்தை எவ்வளவு அடிக்கடி நிகழ்கிறது? ஒரு தெளிவான தொடர்பு பரந்த வடிவத்தை மீற அனுமதிக்காதீர்கள்.
  collaborative_learning_initiative: |
    முடிவெடுக்கும்போது, வழக்கு-குறிப்பிட்ட ஆதாரங்களைச் சேர்ப்பதற்கு முன், அடிப்படை விகிதங்களை
    வெளிப்படையாகக் கூறி கருத்தில் கொள்ளவும். பேய்சியன் பகுத்தறிவில் குழுக்களுக்குப் பயிற்சி அளிக்கவும்.

how_can_this_be_misapplied:
  base_rate_tyranny: |
    அடிப்படை விகிதங்கள் வேறுவிதமாகச் சுட்டிக்காட்டினாலும், வலுவான வழக்கு-குறிப்பிட்ட
    ஆதாரங்களைப் புறக்கணித்தல் - சில சமயங்களில் தனிப்பட்ட வழக்கு விதிவிலக்காக இருக்கலாம்.
  stereotyping: |
    தனிநபர்களைப் பற்றி நியாயமற்ற தீர்ப்புகளைச் செய்ய அடிப்படை விகிதங்களைப் பயன்படுத்துதல்.
  false_precision: |
    அடிப்படை விகிதங்கள் தோராயமான மதிப்பீடுகளாக இருக்கும்போது, தவறான துல்லியத்துடன்
    அவற்றைப் பயன்படுத்துதல்.
  dismissing_individuals: |
    "புள்ளிவிவரங்கள் X என்று கூறுகின்றன" - உங்களுக்கு முன்னால் உள்ள தனிநபர் விநியோகத்திற்கு
    பொருந்தாமல் போகலாம்.

