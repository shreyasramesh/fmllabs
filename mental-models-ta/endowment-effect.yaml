id: endowment_effect
name: உடைமைப் பற்றுக் கோளாறு

quick_introduction: |
  உடைமைப் பற்றுக் கோளாறு என்பது, நாம் எதையாவது சொந்தமாகக் கொண்டிருப்பதால் மட்டும் அதன் மதிப்பை அதிகமாகக் கருதும் போக்கு ஆகும். அதை இழக்க நாம் அதிகமாகக் கேட்போம், அதை வாங்குவதற்கு நாம் செலவிட விரும்பும் தொகையை விட. உடைமை என்பது ஒரு பற்றை உருவாக்குகிறது, அது நமது மதிப்பீட்டைத் திரித்துக் காட்டுகிறது.

one_liner: நாம் சொந்தமாக வைத்திருப்பதை, சொந்தமாக இல்லாததை விட அதிகமாக மதிக்கிறோம்—உடைமை ஒரு பற்றை உருவாக்குகிறது.

try_this:
  - Ask: இதை நான் சொந்தமாக வைத்திருக்கவில்லை என்றால், இதை வாங்க நான் என்ன செலவிடுவேன்?
  - விற்கும்போது, ​​நீங்கள் வாங்குவதாக கற்பனை செய்து பாருங்கள்—உங்கள் கேட்கும் விலையை நீங்கள் செலுத்துவீர்களா?
  - உங்கள் உடைமை உங்கள் மதிப்பீட்டைப் பெருக்குவதை எப்போது கவனிக்கிறீர்கள்.

ask_yourself:
  - நான் இதை சொந்தமாக வைத்திருப்பதால் அதிகமாக மதிப்பிடுகிறேனா?
  - ஒரு நடுநிலையான வாங்குபவர் எனது விலையுடன் ஒப்புக்கொள்வாரா?

in_more_detail: |
  சோதனைகளில், தோராயமாக ஒரு குவளை வழங்கப்பட்டவர்கள், அதை விற்கக் கேட்பது, மற்றவர்கள் அதை வாங்க விரும்புவதை விட சுமார் இரு மடங்கு அதிகமாக இருந்தது. உடைமையின் வெறுமையான உண்மை உணரப்பட்ட மதிப்பை அதிகரிக்கிறது. இது இழப்புத் தவிர்ப்பு-க்குத் தொடர்புடையது—எதையாவது விட்டுக்கொடுப்பது இழப்பாகத் தோன்றுகிறது, மேலும் நாம் இழப்பு-தவிர்ப்பாளர்கள். ஆனால் இதன் விளைவு அதற்கு அப்பாற்பட்டது: நாம் சொந்தமான பொருட்களை நமது அடையாளத்துடன் இணைக்கிறோம்.

  உடைமைப் பற்றுக் கோளாறு பேச்சுவார்த்தைகள், நுகர்வோர் நடத்தை மற்றும் நிறுவன மாற்றங்களைப் பாதிக்கிறது. மக்கள் தங்கள் வீடுகள், தங்கள் யோசனைகள் மற்றும் தற்போதைய பாத்திரங்களை ஏன் அதிகமாக மதிப்பிடுகிறார்கள் என்பதை இது விளக்குகிறது. இது வர்த்தகம் மற்றும் மாற்றங்களில் உராய்வை உருவாக்குகிறது.

why_this_is_important: |
  உடைமைப் பற்றுக் கோளாறை அங்கீகரிப்பது, நீங்கள் மிகவும் திறம்பட பேச்சுவார்த்தை நடத்தவும், எதை வைத்திருக்க வேண்டும் அல்லது விட்டுவிட வேண்டும் என்பது குறித்து தெளிவான முடிவுகளை எடுக்கவும், மற்றவர்கள் அவர்களிடம் உள்ளதை ஏன் அதிகமாக மதிப்பிடுகிறார்கள் என்பதைப் புரிந்துகொள்ளவும் உதவுகிறது. இது மாற்றத்திற்கான எதிர்ப்பையும் விளக்குகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - பேச்சுவார்த்தை
  - முதலீடு
  - தொழில்_மாற்றங்கள்

how_can_you_spot_it:
  ownership_premium: |
    "நான் அதை அந்த விலைக்கு விற்க மாட்டேன்" நீங்கள் அதை வாங்க அந்த விலையைச் செலுத்த மாட்டீர்கள் என்றால்.
  attachment_to_possession: |
    நாம் எதையாவது வைத்த பிறகு அதை அதிகமாக மதிப்பிடுகிறோம்.
  resistance_to_trading: |
    அது பகுத்தறிவுக்குட்பட்டதாக இருந்தாலும் கூட வர்த்தகம் அல்லது பரிமாற்றம் செய்ய தயங்குதல்.
  overvaluation_of_own_ideas: |
    நமது யோசனைகள், திட்டங்கள் அல்லது பாத்திரங்கள் நமக்கு சொந்தமானவை என்பதால் அதிக மதிப்புள்ளதாகத் தோன்றுகிறது.

examples:
  real_estate: |
    வீட்டு உரிமையாளர்கள் பெரும்பாலும் தங்கள் வீடுகளுக்கு அதிக விலை நிர்ணயிக்கிறார்கள்—சந்தையை விட அவர்கள் அதை அதிகமாக மதிப்பிடுகிறார்கள்.
  negotiations: |
    விற்பவர்கள் வாங்குபவர்கள் செலுத்த விரும்புவதை விட அதிகமாகக் கேட்கிறார்கள்; அந்த இடைவெளி உடைமைப் பற்றுக் கோளாறைப் பிரதிபலிக்கிறது.
  career: |
    ஒரு மாற்றத்தைக் கருத்தில் கொள்ளும்போது நமது தற்போதைய வேலை, நிறுவனம் அல்லது பாத்திரத்தை அதிகமாக மதிப்பிடுதல்.
  ideas: |
    "இங்கு கண்டுபிடிக்கப்படவில்லை" மற்றும் "எனது யோசனை" சார்பு—நாம் உருவாக்கிய அல்லது சொந்தமானவற்றை அதிகமாக மதிப்பிடுகிறோம்.

real_world_implications: |
  உடைமைப் பற்றுக் கோளாறு சந்தை உராய்வை உருவாக்குகிறது, நன்மை பயக்கும் பரிமாற்றங்களை மெதுவாக்குகிறது, மேலும் மாற்றத்திற்கான எதிர்ப்பை அதிகரிக்கிறது. இது இணைப்புகள், மறுசீரமைப்புகள் மற்றும் தனிப்பட்ட மாற்றங்களைப் பாதிக்கிறது. அதைப் புரிந்துகொள்வது பேச்சுவார்த்தை மற்றும் மாற்ற மேலாண்மையை மேம்படுத்துகிறது.

professional_application:
  networking_and_relationship_building: |
    யாராவது மாற்றத்தை எதிர்க்கும்போது, ​​அவர்கள் உடைமைப் பற்றுக் கோளாறை அனுபவிக்கக்கூடும் என்று கருதுங்கள்—அவர்கள் நிலைமையை "சொந்தமாக" வைத்திருப்பதால் அதை அதிகமாக மதிப்பிடுகிறார்கள். எதைக் கொடுக்கிறார்கள் என்பதை மட்டும் குறிப்பிடாமல், அவர்கள் என்ன பெறுகிறார்கள் என்பதை அடிப்படையாகக் கொண்டு மாற்றத்தை வடிவமைக்கவும்.
  collaborative_learning_initiative: |
    புதிய செயல்முறைகளை அறிமுகப்படுத்தும்போது, ​​மக்கள் தற்போதைய வழிகளில் பற்றுக் கொண்டுள்ளனர் என்பதை ஒப்புக் கொள்ளுங்கள். புதியதை ஏற்றுக்கொள்வதற்கு முன்பு பழையதை "விட்டுக்கொடுக்க" உளவியல் பாதுகாப்பை உருவாக்கவும்.

how_can_this_be_misapplied:
  dismissing_legitimate_attachment: |
    சில பற்றுதல் பகுத்தறிவுக்குட்பட்டது—உணர்ச்சிப்பூர்வமான மதிப்பு, மாற்றுச் செலவுகள். எல்லா எதிர்ப்பும் உடைமைப் பற்றுக் கோளாறு அல்ல.
  manipulation: |
    அதிக விலைகளைப் பெற ஒரு போலி உடைமை உணர்வை உருவாக்குதல் (எ.கா., உடைமைப் பற்றைத் தூண்டுவதற்கு "இலவசமாக முயற்சி செய்யுங்கள்").
  undervaluing_continuity: |
    எல்லா மாற்ற எதிர்ப்பும் பகுத்தறிவற்றது என்று கருதுவது, தொடர்ச்சிக்கு உண்மையான மதிப்பு இருக்கும்போது.
  cold_rationality: |
    உணர்ச்சிப்பூர்வமான பற்றை "வெறும் உடைமைப் பற்றுக் கோளாறு" என்று புறக்கணித்தல், அது உண்மையான மதிப்புகளைப் பிரதிபலிக்கும் போது.

