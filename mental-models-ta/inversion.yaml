# தலைகீழாக்குதல் (Inversion)
# மன மாதிரி / அறிவாற்றல் சார்பு - எடுத்துக்காட்டு பதிவு

id: inversion
name: தலைகீழாக்குதல்

quick_introduction: |
  தலைகீழாக்குதல் என்பது ஒரு சிக்கலைத் தீர்க்கும் முறையாகும், இது கேள்வியை வேறு கோணத்தில் பார்க்க உதவுகிறது.
  "நான் எப்படி வெற்றி பெறுவது?" என்று கேட்பதற்குப் பதிலாக, "எது என்னை தோல்வியடையச் செய்யும்?" என்று கேட்டு,
  அந்த விஷயங்களைத் தவிர்க்கலாம். இது முன்னோக்கி சிந்திக்கும் போது பெரும்பாலும் கவனிக்கப்படாத அபாயங்களையும்,
  தவறான அணுகுமுறைகளையும் வெளிக்கொணர்கிறது.

one_liner: தலைகீழாக்குங்கள் — எது உங்களை தோல்வியடையச் செய்யும் என்று கேட்டு, பின்னர் அந்த விஷயங்களைத் தவிர்க்கவும்.

try_this:
  - எந்த இலக்கிற்கும், நீங்கள் தோல்வியடையக்கூடிய முக்கிய வழிகளைப் பட்டியலிடுங்கள் — பின்னர் அவற்றைத் தவிர்க்கவும்.
  - எதிர்மறை காட்சிப்படுத்தலைப் பயன்படுத்தவும்: இதை என்ன தவறாகப் போகச் செய்யும்?
  - கேளுங்கள்: ஒரு புத்திசாலி எப்படி இதை குழப்பமடையச் செய்வார்?

ask_yourself:
  - இது ஏன் தோல்வியடையும் என்பதைப் பற்றி நான் யோசித்தேனா?
  - முன்னோக்கி சிந்திப்பதன் மூலம் நான் எதைக் காணவில்லை?

in_more_detail: |
  சார்லி முங்கர் என்பவரால் பிரபலப்படுத்தப்பட்டு, கணித தர்க்கத்தின் அடிப்படையில் அமைந்த தலைகீழாக்குதல்,
  வெற்றியைத் துரத்துவதை விட தோல்வியைத் தவிர்ப்பது பெரும்பாலும் எளிது என்ற உண்மையை பயன்படுத்துகிறது.
  ஒரு விஷயம் தவறாகப் போகக்கூடிய முக்கிய வழிகளை உங்களால் அடையாளம் காண முடிந்தால், அவற்றை நீங்கள்
  முறையாக அகற்றலாம்.

  கார்ல் ஜேகோபி கூறியதாகக் கூறப்படுகிறது, "எப்போதும் தலைகீழாக்குங்கள்." ஸ்டோயிக்ஸ் தத்துவவாதிகள்
  தங்களிடம் இருந்ததைப் பாராட்டவும், adversity-க்குத் தயாராகவும் எதிர்மறை காட்சிப்படுத்தலைப் பயன்படுத்தினர்
  — இழப்பைக் கற்பனை செய்தல். தலைகீழாக்குதல் என்பது அவநம்பிக்கை அல்ல; இது தடைகளை அகற்றுவதன் மூலம்
  முன்னேறுவதற்கான ஒரு கட்டமைக்கப்பட்ட வழியாகும்.

why_this_is_important: |
  தலைகீழாக்குதல் பேரழிவுகரமான தவறுகளைத் தவிர்க்கவும், திட்டங்களை stress-test செய்யவும்,
  மற்றும் வெளிப்படையான தீர்வுகள் அல்லாதவற்றைக் கண்டறியவும் உதவுகிறது. இது முக்கியமான தோல்வி முறைகளை
  நீங்கள் கவனிக்காமல் இருப்பதை உறுதி செய்வதன் மூலம் முன்னோக்கி திட்டமிடலுக்கு துணையாக நிற்கிறது.

when_to_use:
  - சிக்கல்_தீர்த்தல்
  - முடிவெடுத்தல்
  - இடர்_மதிப்பீடு
  - தொழில்_நகர்வுகள்

how_can_you_spot_it:
  premortem_thinking: |
    ஒரு திட்டத்திற்கு முன், அது ஏற்கனவே தோல்வியடைந்ததாகக் கருதி, "இது ஏன் தோல்வியடைந்தது?" என்று கேட்பது.
  anti_goals: |
    நீங்கள் அடைய விரும்புவதை தெளிவாக வரையறுப்பது போல், தவிர்க்க விரும்புவதையும் வரையறுப்பது.
  reverse_engineering_failure: |
    வெற்றிகளை மட்டும் படிப்பதற்குப் பதிலாக, பாடங்களைப் பிரித்தெடுக்க தோல்வியுற்ற நிகழ்வுகளை ஆய்வு செய்தல்.
  constraint_focus: |
    மேம்பாட்டிற்காக மேம்படுத்துவதற்கு முன், கட்டுப்பாடுகளையும் தடைகளையும் கண்டறிதல்.

examples:
  investing: |
    "இந்த பங்கு ஏன் உயரும்?" என்பதற்குப் பதிலாக, "எது பணத்தை இழக்கச் செய்யும்?" என்று கேட்டு,
    அந்த காட்சிகளைத் தவிர்க்கவும்.
  career: |
    "என் நற்பெயரை எது அழிக்கும்?" என்பது தவிர்க்க வேண்டிய நடத்தைகளின் பட்டியலைத் தருகிறது.
  product_launch: |
    "பெரும்பாலான தயாரிப்பு வெளியீடுகள் ஏன் தோல்வியடைகின்றன?" என்பது வெளியீட்டிற்கு முன் தீர்க்கப்பட வேண்டிய
    அபாயங்களை வெளிக்கொணர்கிறது.
  health: |
    "எந்த பழக்கங்கள் ஆயுளைக் குறைக்கின்றன?" என்பது "எது என்னை ஆரோக்கியமாக்குகிறது?" என்பதை விட
    தெளிவான தவிர்ப்பு பட்டியலைத் தருகிறது.

real_world_implications: |
  தலைகீழாக்குதல் பொறியியல் (failure mode analysis), முதலீடு மற்றும் வியூகங்களில் பயன்படுத்தப்படுகிறது.
  இது அதீத தன்னம்பிக்கையைக் குறைத்து, இடர் நிர்வாகத்தை மேம்படுத்துகிறது. அதிகமாகச் சார்ந்திருப்பது
  அதிகப்படியான எச்சரிக்கைக்கு வழிவகுக்கும்.

professional_application:
  networking_and_relationship_building: |
    "இந்த உறவை எது சேதப்படுத்தும்?" என்பது நம்பிக்கையை உடைக்கும் நடத்தைகளைத் தவிர்க்க உதவுகிறது.
  collaborative_learning_initiative: |
    திட்டங்களில் premortems-ஐ நடத்துங்கள்: "இது தோல்வியடைந்தது. ஏன்?" திட்டமிடல் மற்றும்
    செயல்பாட்டை மேம்படுத்த பதில்களைப் பயன்படுத்தவும்.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    தோல்வியைத் தவிர்ப்பதில் மட்டுமே கவனம் செலுத்துவது செயல்களை முடக்கி, அவசியமான இடர் எடுப்பதைத்
    தடுக்கக்கூடும்.
  negativity_bias: |
    முன்னோக்கிச் செல்லும் வாய்ப்புகளை அடையாளம் காணும் சமநிலையுடன் இல்லாவிட்டால், தலைகீழாக்குதல்
    எதிர்மறைச் சார்பை அதிகரிக்கக்கூடும்.
  analysis_paralysis: |
    தோல்வி முறைகளில் அதிக நேரத்தைச் செலவழித்து, ஒருபோதும் செயல்படாமல் இருப்பது.
  missing_upside: |
    தலைகீழாக்குதல் என்ன செய்ய வேண்டும் என்று சொல்லாது — எதைத் தவிர்க்க வேண்டும் என்று மட்டுமே சொல்லும்.
    உங்களுக்கு இன்னும் நேர்மறை இலக்குகள் தேவை.

