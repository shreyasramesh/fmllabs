id: default_effect
name: இயல்புநிலை விளைவு

quick_introduction: |
  கொடுக்கப்பட்ட தேர்வுகளில், ஏற்கனவே தேர்ந்தெடுக்கப்பட்ட விருப்பத்தை தேர்ந்தெடுக்கும் போக்கு இயல்புநிலை விளைவு ஆகும். இயல்புநிலையாக அமைக்கப்பட்ட எந்தவொரு விஷயத்திற்கும் வலுவான நன்மை உண்டு - அது அவர்களுக்கு உகந்ததா இல்லையா என்பதைப் பொருட்படுத்தாமல் மக்கள் பெரும்பாலும் அதிலேயே நிலைத்து நிற்கிறார்கள்.

one_liner: இயல்புநிலையாக அமைக்கப்பட்ட எந்தவொரு விஷயத்திற்கும் வலுவான நன்மை உண்டு - நாம் அதிலேயே நிலைத்து நிற்கிறோம்.

try_this:
  - மாற்று வழிகளை மதிப்பீடு செய்யாமல் இயல்புநிலையை ஏற்றுக்கொள்வதை கவனியுங்கள்.
  - தேர்வுகளை வடிவமைக்கும்போது, பயனர்களின் நலனுக்காக இயல்புநிலைகளை அமைக்கவும்.
  - கேளுங்கள்: இது முன்கூட்டியே தேர்ந்தெடுக்கப்படவில்லை என்றால் இதை நான் தேர்ந்தெடுப்பேனா?

ask_yourself:
  - நான் செயலற்ற தன்மை காரணமாக இயல்புநிலையை தேர்ந்தெடுக்கிறேனா, அல்லது அது எனக்கு சிறந்ததா என்பதால் தேர்ந்தெடுக்கிறேனா?
  - இந்த இயல்புநிலையை யார் அமைத்தார்கள், அதிலிருந்து அவர்கள் என்ன ஆதாயம் அடையக்கூடும்?

in_more_detail: |
  செயலற்ற தன்மை, இழப்பு தவிர்ப்பு (இயல்புநிலையை இழப்பதாக மாறுவது உணர்கிறது), மற்றும் மறைமுகமான ஒப்புதல் (இயல்புநிலை பரிந்துரைக்கப்படுகிறது என்று நாங்கள் கருதுகிறோம்) காரணமாக இயல்புநிலைகள் செயல்படுகின்றன. உறுப்பு தானம் விகிதங்கள் நாடு வாரியாக, இயல்புநிலை விருப்பத்தேர்வு அல்லது விருப்பத்தவிர்ப்பு என்பதைப் பொறுத்து வியத்தகு முறையில் வேறுபடுகின்றன. தானாகவே பதிவுசெய்தால் ஓய்வூதிய சேமிப்பு பங்கேற்பு அதிகரிக்கிறது.

  இயல்புநிலைகளை நன்மைக்காக (சிறந்த விளைவுகளை நோக்கி இட்டுச் செல்ல) அல்லது கையாளுதலுக்காக (முன்பே சரிபார்க்கப்பட்ட பெட்டிகளில் பாதகமான விதிமுறைகளை மறைக்க) பயன்படுத்தலாம். விளைவைப் புரிந்துகொள்வது சிறந்த அமைப்புகளை வடிவமைக்கவும் தேவையற்ற இயல்புநிலைகளை எதிர்க்கவும் உங்களுக்கு உதவுகிறது.

why_this_is_important: |
  இயல்புநிலை விளைவைப் புரிந்துகொள்வது, விளைவுகளை மேம்படுத்தும் தேர்வு கட்டமைப்பை வடிவமைக்க உதவுகிறது, மேலும் உங்கள் தேர்வுகள் வேண்டுமென்றே விருப்பத்தை விட இயல்புநிலைகளால் வடிவமைக்கப்படுகின்றன என்பதை அங்கீகரிக்க உதவுகிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - தலைமைத்துவம்
  - சிக்கல்_தீர்த்தல்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  inertia_toward_default: |
    பெரும்பாலான மக்கள் முன்கூட்டியே தேர்ந்தெடுக்கப்பட்ட எதையும் அப்படியே ஏற்றுக்கொள்கிறார்கள்.
  implied_recommendation: |
    நாங்கள் தேர்ந்தெடுக்கும் என்று அவர்கள் விரும்புவது "இயல்புநிலை" என்று நாங்கள் விளக்குகிறோம்.
  opt_in_vs_opt_out: |
    வடிவமைப்பு பங்கேற்பை வியத்தகு முறையில் மாற்றுகிறது (விருப்பத்தேர்வு vs. விருப்பத்தவிர்ப்பு).
  pre_checked_boxes: |
    படிவங்கள் மற்றும் அமைப்புகளில் முன்கூட்டியே தேர்ந்தெடுக்கப்பட்ட விருப்பங்களுக்கு வலுவான நன்மை உண்டு.

examples:
  organ_donation: |
    விருப்பத்தவிர்ப்பு நாடுகள், விருப்பத்தேர்வு நாடுகளை விட அதிக தானம் விகிதங்களைக் கொண்டுள்ளன - மனப்பான்மைகளை விட இயல்புநிலை முக்கியமானது.
  retirement_savings: |
    தானியங்கி பதிவு 401(k) பங்கேற்பை வியத்தகு முறையில் அதிகரிக்கிறது.
  software_installers: |
    "பரிந்துரைக்கப்பட்ட" விருப்பங்கள் மற்றும் முன்கூட்டியே சரிபார்க்கப்பட்ட கூடுதல் மென்பொருள்கள் பயனர்கள் என்ன நிறுவுகிறார்கள் என்பதை வடிவமைக்கின்றன.
  subscriptions: |
    கட்டணப் பதிவுக்கு இயல்புநிலையாக இருக்கும் இலவச சோதனைகள், செயலில் சந்தா செய்ய விரும்பாத பலரைப் பிடிக்கின்றன.

real_world_implications: |
  இயல்புநிலை விளைவு மிகவும் சக்திவாய்ந்த தூண்டுதல்களில் ஒன்றாகும். இது சேமிப்பு, சுகாதாரம், தனியுரிமை மற்றும் நுகர்வோர் நடத்தையை வடிவமைக்கிறது. நெறிமுறை தேர்வு கட்டமைப்பு விளைவுகளை மேம்படுத்த இயல்புநிலைகளைப் பயன்படுத்துகிறது; இருண்ட வடிவங்கள் அவற்றைப் சுரண்ட பயன்படுத்துகின்றன.

professional_application:
  networking_and_relationship_building: |
    மற்றவர்களுக்கான செயல்முறைகளை வடிவமைக்கும்போது, அவர்களின் நலன்களுக்கு உதவும் இயல்புநிலைகளைத் தேர்ந்தெடுக்கவும். மதிப்பைப் பெறுவதற்காக இயல்புநிலைகளைப் பயன்படுத்தும் இருண்ட வடிவங்களைத் தவிர்க்கவும்.
  collaborative_learning_initiative: |
    குழு நடைமுறைகளுக்கு இயல்புநிலைகளை அமைக்கவும் (எ.கா., ஒத்திசைவுக்கு இயல்புநிலை, ஆவணப்படுத்தலுக்கு இயல்புநிலை) அவை விரும்பிய நடத்தையுடன் சீரமைக்கப்படுகின்றன. சரியான தேர்வை எளிதான தேர்வாக ஆக்குங்கள்.

how_can_this_be_misapplied:
  dark_patterns: |
    மக்கள் பாதகமான தேர்வுகளில் சிக்க வைப்பதற்கு இயல்புநிலைகளைப் பயன்படுத்துதல் (எ.கா., மறைக்கப்பட்ட கட்டணங்கள், தேவையற்ற சந்தாக்கள்).
  paternalism: |
    சம்மதம் இல்லாமல் உண்மையான விருப்பத்தை மீறும் இயல்புநிலைகளை திணித்தல்.
  manipulation: |
    பாதகமான விதிமுறைகளை இயல்புநிலைகளில் மறைத்து செயலற்ற தன்மையை நம்புதல்.
  one_size_fits_all: |
    விருப்பத்தேர்வுகள் வேறுபடும்போது அனைவருக்கும் ஒரே இயல்புநிலை சரியானது என்று கருதுதல்.

