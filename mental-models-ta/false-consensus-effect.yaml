id: false_consensus_effect
name: தவறான ஒருமித்த கருத்து விளைவு

quick_introduction: |
  தவறான ஒருமித்த கருத்து விளைவு என்பது மற்றவர்கள் நமது நம்பிக்கைகள், அணுகுமுறைகள் மற்றும் நடத்தைகளுடன் எவ்வளவு உடன்படுகிறார்கள் என்பதை மிகைப்படுத்தி மதிப்பிடும் ஒரு போக்கு ஆகும். நமது பார்வைகள் உண்மையில் இருப்பதை விட பொதுவானவை என்று நாம் கருதுகிறோம், மேலும் நியாயமானவர்கள் கூட மாறுபட முடியும் என்று கற்பனை செய்ய நாம் சிரமப்படுகிறோம்.

one_liner: மற்றவர்கள் நம்முடன் எவ்வளவு உடன்படுகிறார்கள் என்பதை நாம் மிகைப்படுத்தி மதிப்பிடுகிறோம்.

try_this:
  - கருத்து வேறுபாடு கொண்டவர்களை தீவிரமாகத் தேடுங்கள் - ஒருமித்த கருத்தை யூகிக்க வேண்டாம்.
  - தொடங்கும் முன், உங்கள் அனுமானங்களைப் பகிர்ந்து கொள்ளாதவர்களுடன் சோதிக்கவும்.
  - கேளுங்கள்: கருத்து வேறுபாடு கொண்ட ஒருவர் என்ன சொல்வார்? அதை தீவிரமாக எடுத்துக் கொள்ளுங்கள்.

ask_yourself:
  - மற்றவர்கள் என்னைப் போலவே சிந்திக்கிறார்கள் என்று நான் யூகிக்கிறேனா?
  - மற்றவரின் மாறுபட்ட பார்வையில் நான் கடைசியாக எப்போது ஆச்சரியப்பட்டேன்?

in_more_detail: |
  நாம் ஒரு நிலைப்பாட்டை வைத்திருக்கும்போது, ​​அதுவே இயல்பு என்று நாம் நினைக்க முனைகிறோம். நாம் நம்மைப் போன்ற எண்ணம் கொண்டவர்களால் சூழப்பட்டிருப்போம், உறுதிப்படுத்தும் ஊடகங்களை உட்கொள்வோம், மேலும் தெளிவற்ற பின்னூட்டங்களை உடன்பாடாகப் புரிந்துகொள்வோம். இது ஒருமித்த கருத்தின் மாயையை வலுப்படுத்தும் ஒரு எதிரொலி அறையை உருவாக்குகிறது.

  ஆழமாகப் பதிக்கப்பட்ட நம்பிக்கைகளுக்கும், நமது நிலைப்பாட்டில் நாம் அதிகமாக முதலீடு செய்திருக்கும்போதும் இந்த விளைவு வலுவாக இருக்கும். மற்றவர்கள் மாறுபடும்போது ஆச்சரியம், பேச்சுவார்த்தையில் சிரமம், மற்றும் வாடிக்கையாளர்கள் நம்மைப் போலவே சிந்திக்கிறார்கள் என்று நாம் யூகிக்கையில் மோசமான சந்தை ஆராய்ச்சிக்கு இது வழிவகுக்கும்.

why_this_is_important: |
  தவறான ஒருமித்த கருத்து விளைவை அங்கீகரிப்பது, உண்மையான கருத்து வேறுபாடுகளுக்கு உங்களைத் தயார்படுத்தவும், சிறந்த ஆராய்ச்சியை நடத்தவும், மேலும் திறம்பட தொடர்பு கொள்ளவும் உதவுகிறது. இது தயாரிப்பு மேம்பாடு, பேச்சுவார்த்தை மற்றும் தலைமைத்துவத்திற்கு அவசியமானது.

when_to_use:
  - முடிவெடுத்தல்
  - பேச்சுவார்த்தை
  - தலைமைத்துவம்
  - சிக்கல்_தீர்வு

how_can_you_spot_it:
  surprise_at_disagreement: |
    உங்களுக்குத் தெளிவாகத் தோன்றுவதோடு ஒருவர் மாறுபடும்போது நீங்கள் உண்மையில் அதிர்ச்சியடைகிறீர்கள்.
  assuming_shared_values: |
    சரிபார்க்காமல் மற்றவர்கள் உங்கள் முன்னுரிமைகளைப் பகிர்ந்து கொள்கிறார்கள் என்று நீங்கள் செயல்படுகிறீர்கள்.
  underestimating_opposition: |
    திட்டங்கள் அவர்கள் எதிர்கொள்வதை விட குறைவான எதிர்ப்பை சந்திக்கும் என்று நீங்கள் எதிர்பார்க்கிறீர்கள்.
  echo_chamber_detection: |
    உங்கள் சமூக மற்றும் தகவல் சூழல் அரிதாகவே உங்கள் கருத்துக்களை சவால் செய்கிறது.

examples:
  product_development: |
    ஒரு குழு ஒரு அம்சத்தை பயனர்கள் விரும்புவார்கள் என்று யூகிக்கிறது, ஏனெனில் குழுவில் உள்ள அனைவரும் அதை விரும்புகிறார்கள் - ஆனால் குறைந்த பயன்பாட்டைக் கண்டறிகிறார்கள்.
  politics: |
    ஒரு அரசியல் குமிழியில் உள்ளவர்கள், தேர்தல் முடிவுகள் தங்கள் எதிர்பார்ப்புகளுடன் பொருந்தாமல் அதிர்ச்சியடைகிறார்கள்.
  negotiation: |
    மற்ற தரப்பினர் விதிமுறைகளுக்கு உடன்படுவார்கள் என்று கருதுவது, ஏனெனில் அவை உங்களுக்கு "நியாயமானதாக" தோன்றுகின்றன.
  hiring: |
    "கலாச்சாரப் பொருத்தம்" என்பதற்காக பணியமர்த்துவது, உங்களுடன் உடன்படும் நபர்களை பணியமர்த்துவதைக் குறிக்கலாம், தவறான ஒருமித்த கருத்தை வலுப்படுத்தும்.

real_world_implications: |
  தவறான ஒருமித்த கருத்து விளைவு துருவப்படுத்தல், தோல்வியுற்ற தயாரிப்பு வெளியீடுகள் மற்றும் முறிந்த பேச்சுவார்த்தைகளுக்கு பங்களிக்கிறது. இது நமது கணிப்புகளில் நம்மை அதிக நம்பிக்கையுள்ளவர்களாகவும், கருத்து வேறுபாடுகளுக்கு குறைவான தயார்நிலையுடனும் ஆக்குகிறது.

professional_application:
  networking_and_relationship_building: |
    வெவ்வேறு கண்ணோட்டங்கள் கொண்டவர்களை தீவிரமாகத் தேடுங்கள். பகிரப்பட்ட நம்பிக்கைகளை யூகிக்க வேண்டாம் - கேளுங்கள் மற்றும் கேளுங்கள்.
  collaborative_learning_initiative: |
    குழுக்களில், கருத்து வேறுபாடு செலவு மிக்கதாக மாறுவதற்கு முன்பு வெளிக்கொணர கட்டமைக்கப்பட்ட கருத்து வேறுபாட்டை (எ.கா., "முன் மரணங்கள்," சாத்தானின் வழக்கறிஞர்) பயன்படுத்தவும்.

how_can_this_be_misapplied:
  dismissing_dissent: |
    மாறுபடுபவர்கள் நியாயமற்றவர்கள் அல்லது அறியாதவர்கள் என்று கருதுவது, அவர்களுக்கு செல்லுபடியாகும் மாறுபட்ட கண்ணோட்டங்கள் இருக்கலாம் என்பதை கருத்தில் கொள்வதற்குப் பதிலாக.
  poor_research: |
    "அவர்களுக்கு என்ன வேண்டும் என்று எங்களுக்கு ஏற்கனவே தெரியும்" என்பதால் வாடிக்கையாளர் ஆராய்ச்சியைத் தவிர்ப்பது.
  overconfidence: |
    மற்றவர்கள் உடன்படுவார்கள் என்ற அனுமானத்தின் அடிப்படையில் தைரியமான பந்தயங்களைச் செய்வது.
  groupthink_amplification: |
    தவறான ஒருமித்த கருத்து விளைவை சவால் செய்யாத குழுக்கள் குழு சிந்தனையில் சுழலக்கூடும்.

