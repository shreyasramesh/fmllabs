id: hindsight_bias
name: பின்னோக்கு சார்பு

quick_introduction: |
  பின்னோக்கு சார்பு (அல்லது "எனக்கு எல்லாம் முன்பே தெரியும்" விளைவு) என்பது,
  ஒரு நிகழ்வு நடந்த பிறகு, அதை நாம் கணித்திருக்கலாம் அல்லது எதிர்பார்த்திருக்கலாம்
  என்று நம்பும் ஒரு போக்காகும். முடிவுகளை அவை இருந்ததை விட தவிர்க்க முடியாதவை
  என்று தோன்றும்படி கடந்த காலத்தை நாம் மறுகட்டமைக்கிறோம்.

one_liner: நடந்த பிறகு, எல்லாம் முன்பே தெரியும் என்று நினைக்கிறோம்.

try_this:
  - கடந்த கால முடிவுகளை மதிப்பிடுவதற்கு முன் கேளுங்கள்: அப்போது அவர்களுக்கு என்ன தெரியும்?
  - முடிவுகளுக்கு முன் உங்கள் கணிப்புகளைப் பதிவு செய்யுங்கள் - பிறகு ஒப்பிடுங்கள்.
  - கடந்த காலத்தை தவிர்க்க முடியாததாக தோற்றமளிக்கும் போது கவனியுங்கள்.

ask_yourself:
  - அப்போது கிடைக்காத தகவல்களுடன் நான் மதிப்பிடுகிறேனா?
  - நான் இதை உண்மையில் கணித்தேனா, அல்லது இப்போது இது வெளிப்படையாகத் தோன்றுகிறதா?

in_more_detail: |
  முடிவு தெரிந்ததும், அது வெளிப்படையாகத் தோன்றுகிறது. அதற்கு முன் நாம் உணர்ந்த
  நிச்சயமற்ற தன்மையை நாம் மறந்துவிடுகிறோம். இந்த சார்பு கற்றலை சிதைக்கிறது -
  நாம் உண்மையில் அறியாத ஒன்றை "தெரியும்" என்று நினைக்கிறோம், அதனால் நமது
  மாதிரிகளை புதுப்பிப்பதில்லை. இது நியாயமற்ற குற்றச்சாட்டுக்கும் வழிவகுக்கிறது:
  எதிர்காலம் உண்மையாகவே நிச்சயமற்றதாக இருந்தபோதும், "அவர்கள் இதை வரப்போகிறது
  என்று பார்த்திருக்க வேண்டும்".

  பின்னோக்கு சார்பு பிந்தைய ஆய்வுகள், சட்ட தீர்ப்புகள் மற்றும் வரலாற்று பகுப்பாய்வுகளை
  பாதிக்கிறது. கடந்த கால முடிவுகளை அப்போது கிடைக்காத தகவல்களுடன் மதிப்பிடுகிறோம்.

why_this_is_important: |
  பின்னோக்கு சார்பை அங்கீகரிப்பது, முடிவுகளில் இருந்து கற்றலை மேம்படுத்துகிறது,
  முடிவுகளின் நியாயமான மதிப்பீடு மற்றும் மிகவும் துல்லியமான இடர் மதிப்பீடு.
  இது நமது கணிப்பு திறன்களில் தவறான நம்பிக்கையைத் தடுக்கிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - கற்றல்
  - இடர்_மதிப்பீடு
  - தலைமைத்துவம்

how_can_you_spot_it:
  inevitability_feeling: |
    ஒரு நிகழ்வுக்குப் பிறகு, அது "நடந்தே ஆக வேண்டும்" என்று தோன்றுகிறது.
  reconstructed_certainty: |
    நிகழ்வுக்கு முன் நாம் உண்மையில் இருந்ததை விட அதிக நிச்சயத்துடன் இருந்ததாக நாம்
    நினைக்கிறோம்.
  blame_for_failure: |
    முடிவு உண்மையாகவே நிச்சயமற்றதாக இருந்தபோது, "அவர்கள் அதை அறிந்திருக்க
    வேண்டும்".
  undervaluing_luck: |
    திறமை அல்லது தொலைநோக்கு பார்வைக்கு முடிவுகளைக் காரணமாகக் கூறுவது,
    அதிர்ஷ்டம் ஒரு பங்கு வகித்தபோது.

examples:
  investing: |
    சந்தை சரிந்த பிறகு "சந்தை சரியும் என்று எனக்குத் தெரியும்" - நீங்கள் முன்கூட்டியே
    அந்த "அறிவை" கொண்டு செயல்படாதபோது.
  project_failures: |
    பிந்தைய ஆய்வில் "நாங்கள் அபாயங்களை அறிந்திருக்க வேண்டும்" - அபாயங்கள்
    உண்மையாகவே தெளிவற்றதாக இருந்தபோது.
  elections: |
    ஆச்சரியமான முடிவுக்குப் பிறகு, நிபுணர்கள் பின்னோக்கி இது "வெளிப்படையாக"
    இருந்ததற்கான காரணங்களை விளக்குகிறார்கள்.
  medical: |
    ஒரு அரிய நோயைக் கண்டறிந்த பிறகு, "அறிகுறிகள் அங்கேயே இருந்தன".

real_world_implications: |
  பின்னோக்கு சார்பு சட்டப் பொறுப்பு, செயல்திறன் மதிப்பீடு மற்றும் கற்றலை
  சிதைக்கிறது. இது நமது தீர்ப்பில் அதிக நம்பிக்கையை அளிக்கிறது மற்றும்
  வரையறுக்கப்பட்ட தகவல்களுடன் நியாயமான முடிவுகளை எடுத்தவர்களுக்கு நியாயமற்றதாக
  ஆகும்.

professional_application:
  networking_and_relationship_building: |
    மற்றவர்களின் கடந்த கால முடிவுகளை மதிப்பிடும்போது, அப்போது அறியப்பட்டதையும்,
    நீங்கள் இப்போது அறிவதையும் உணர்வுபூர்வமாக பிரிக்கவும். நீங்கள் உண்மையில்
    முடிவை கணிக்கவில்லை என்றால் "நான் சொன்னேன்" என்பதைத் தவிர்க்கவும்.
  collaborative_learning_initiative: |
    பிந்தைய ஆய்வுகளில், முடிவின் நேரத்தில் நிச்சயமற்ற தன்மையைப் பிடிக்க
    "முன்-மரண" அல்லது "முடிவு இதழ்" நுட்பங்களைப் பயன்படுத்தவும். உண்மையான
    நிச்சயமற்ற தன்மையை பின்னோக்கு மறுகட்டமைப்புடன் ஒப்பிடவும்.

how_can_this_be_misapplied:
  excusing_all_failures: |
    சிலவை கணிக்கக்கூடியதாக இருந்தபோதும், ஒவ்வொரு தோல்வியையும்
    "கணிக்க முடியாதது" என்று கூறி ஒதுக்கி விடுவது.
  no_accountability: |
    அலட்சியத்திற்காக மக்களை பொறுப்புக்கூற வைப்பதை தவிர்க்க பின்னோக்கு சார்பைப்
    பயன்படுத்துவது.
  false_uncertainty: |
    எதையும் கணிக்க முடியாது என்று நம்புவதற்கு மிகைப்படுத்துவது.
  undermining_learning: |
    "பின்னோக்கு 20/20" என்பதால் பாடங்களை எடுப்பதை மறுப்பது - நாம் இன்னும்
    முடிவுகளில் இருந்து கற்றுக்கொள்ளலாம்.

