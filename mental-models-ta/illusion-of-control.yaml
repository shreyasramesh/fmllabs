# கட்டுப்பாட்டின் மாயத்தோற்றம்
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரண உள்ளீடு

id: illusion_of_control
name: கட்டுப்பாட்டின் மாயத்தோற்றம்

quick_introduction: |
  கட்டுப்பாட்டின் மாயத்தோற்றம் என்பது விளைவுகளைப் பாதிக்கும் நமது திறனை அதிகமாக மதிப்பிடும் ஒரு போக்கு. சீரற்ற நிகழ்வுகள், மற்றவர்கள் மற்றும் சிக்கலான அமைப்புகள் மீது நாம் நினைப்பதை விட நமக்கு அதிக கட்டுப்பாடு இருப்பதாக நம்புகிறோம். நாம் தொடர்பை காரணத்தோடு குழப்புகிறோம், செயலையும் தாக்கத்தையும் குழப்புகிறோம்.

one_liner: நாம் விளைவுகளைப் பாதிக்கும் நமது திறனை அதிகமாக மதிப்பிடுகிறோம்—குறிப்பாக சீரற்றவை.

try_this:
  - கேளுங்கள்: நான் எதுவும் செய்யாவிட்டால் என்ன நடக்கும்? எனது செயல் உண்மையில் விளைவை ஏற்படுத்துகிறதா?
  - நீங்கள் கட்டுப்படுத்தக்கூடியவற்றையும், கட்டுப்படுத்த முடியாதவற்றையும் வேறுபடுத்துங்கள்.
  - உங்கள் செயல்களை சீரற்ற முடிவுகளுடன் சூனியம் போல் இணைக்கும்போது கவனியுங்கள்.

ask_yourself:
  - நான் தொடர்பை காரணத்தோடு குழப்புகிறேனா?
  - நான் செயல்படாமல் இருந்திருந்தால் முடிவு வித்தியாசமாக இருக்குமா?

in_more_detail: |
  மக்கள் லாட்டரியில் வெற்றி பெறுவது பற்றி அதிக நம்பிக்கையுடன் உணர்கிறார்கள், அவர்கள் தங்கள் சொந்த எண்களைத் தேர்ந்தெடுக்கும்போது—இது வாய்ப்புகளை மாற்றாவிட்டாலும். நாம் அதிக எண்களை விரும்பும்போது பகடைகளை வேகமாக உருட்டுகிறோம். நமது சடங்குகள் அல்லது நடத்தைகள் உண்மையில் சீரற்ற அல்லது நமக்கு அப்பாற்பட்ட காரணிகளால் தீர்மானிக்கப்படும் விளைவுகளைப் பாதிக்கின்றன என்று நாம் நினைக்கிறோம். இந்த மாயத்தோற்றம் ஆறுதலானது; இது பதட்டத்தைக் குறைக்கிறது. ஆனால் இது அதிக நம்பிக்கை மற்றும் தவறான முடிவுகளுக்கு வழிவகுக்கும்.

  நாம் செயல்முறையில் ஈடுபடும்போது, ​​ஆரம்பகால வெற்றி கிடைக்கும்போது, ​​மற்றும் பணி பழக்கமானதாக இருக்கும்போது இந்த மாயத்தோற்றம் வலுவாக இருக்கும். இது முதலீடு, மேலாண்மை மற்றும் அன்றாட வாழ்வைப் பாதிக்கிறது.

why_this_is_important: |
  கட்டுப்பாட்டின் மாயத்தோற்றத்தை அங்கீகரிப்பது உங்கள் எதிர்பார்ப்புகளைச் சரிசெய்யவும், அதிக நம்பிக்கையைத் தவிர்க்கவும், முயற்சி உண்மையில் முக்கியத்துவம் வாய்ந்த இடத்தில் கவனம் செலுத்தவும் உதவுகிறது. சூனிய நடத்தைகளில் நாம் ஏன் தொடர்கிறோம் மற்றும் நமது தாக்கத்தை ஏன் அதிகமாக மதிப்பிடுகிறோம் என்பதையும் இது விளக்குகிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - இடர்_மதிப்பீடு
  - முதலீடு
  - தலைமைத்துவம்

how_can_you_spot_it:
  overestimated_influence: |
    நமது செயல்கள் விளைவுகளை பாதிக்கின்றன என்று நம்புவது, உண்மையில் பாதிக்காத போது.
  ritual_superstition: |
    நமது நடத்தைகள் முடிவுகளைப் பாதிக்கின்றன என்று நினைப்பது (அதிர்ஷ்ட சட்டை, விளையாட்டுக்கு முந்தைய வழக்கம்) உண்மையில் பாதிக்காத போது.
  choice_illusion: |
    தேர்வு முடிவைப் பாதிக்காதபோது, ​​தேர்வு நமக்குக் கட்டுப்பாடு தருவதாக உணர்வது.
  action_bias: |
    செயல் உதவாத போதும், "காத்திருப்பதை" விட "ஏதாவது செய்வதை" விரும்புவது.

examples:
  gambling: |
    லாட்டரி எண்களைத் தேர்ந்தெடுப்பது சீரற்ற தேர்வை விட அதிகக் கட்டுப்பாட்டைக் கொண்டதாக உணர்கிறது—வாய்ப்புகள் அப்படியே இருக்கின்றன.
  investing: |
    செயல்திறன்மிக்க வர்த்தகர்கள் சந்தையை வெல்லும் தங்கள் திறனை அதிகமாக மதிப்பிடுகிறார்கள்; பெரும்பாலானோர் செலவுகளுக்குப் பிறகு குறைவான செயல்திறனை வெளிப்படுத்துகிறார்கள்.
  management: |
    தலைவர்கள் நிறுவன விளைவுகளில் தங்கள் தாக்கத்தை அதிகமாக மதிப்பிடுகிறார்கள்; பல காரணிகள் அவர்களின் கட்டுப்பாட்டிற்கு அப்பாற்பட்டவை.
  sports: |
    ரசிகர்கள் தங்கள் ஆரவாரங்கள் விளையாட்டைப் பாதிக்கின்றன என்று நம்புகிறார்கள்; வீரர்கள் அதிர்ஷ்ட சடங்குகளைக் கொண்டுள்ளனர்.

real_world_implications: |
  கட்டுப்பாட்டின் மாயத்தோற்றம் ஆபத்தை எதிர்கொள்ளல், பயனற்ற முயற்சிகளில் விடாமுயற்சி, மற்றும் விளைவுகளின் பங்களிப்பு ஆகியவற்றை பாதிக்கிறது. இது செயல்களைத் தூண்டும் (சில சமயங்களில் பயனுள்ளது) ஆனால் வீணான முயற்சி மற்றும் அதிக நம்பிக்கைக்கு வழிவகுக்கும். சரிசெய்தல் முடிவின் தரத்தை மேம்படுத்துகிறது.

professional_application:
  networking_and_relationship_building: |
    நீங்கள் கட்டுப்படுத்தக்கூடியவற்றையும், கட்டுப்படுத்த முடியாதவற்றையும் அங்கீகரிக்கவும். பாதிக்கக்கூடிய காரணிகளில் ஆற்றலைக் குவிக்கவும். நீங்கள் ஏற்படுத்தாத விளைவுகளுக்குப் பெருமை பாராட்டாதீர்கள்—அல்லது உங்களால் தடுக்க முடியாதவற்றுக்குக் குறை கூறாதீர்கள்.
  collaborative_learning_initiative: |
    திட்டமிடும்போது, ​​கட்டுப்படுத்தக்கூடிய மற்றும் கட்டுப்படுத்த முடியாத காரணிகளை வேறுபடுத்துங்கள். ஆரம்பகால வெற்றிகளால் ஏற்படும் தவறான நம்பிக்கையைத் தவிர்க்கவும். எதிர்பார்ப்புகளைச் சரிசெய்ய நிகழ்தகவு சிந்தனையைப் பயன்படுத்தவும்.

how_can_this_be_misapplied:
  learned_helplessness: |
    நாம் குறிப்பிடத்தக்க தாக்கத்தை வைக்கும்போது, ​​நமக்கு எந்தக் கட்டுப்பாடும் இல்லை என்று நம்புவதற்கு அதிகமாகச் சரிசெய்வது.
  dismissing_agency: |
    பல துறைகளில் திறமையும் முயற்சியும் முக்கியமாக இருக்கும்போது, ​​"எல்லாம் அதிர்ஷ்டம்".
  false_fatalism: |
    செயலின்மையை நியாயப்படுத்த கட்டுப்பாட்டின் மாயத்தோற்றத்தைப் பயன்படுத்துவது.
  one_size_fits_all: |
    கட்டுப்பாடு களத்திற்கு ஏற்ப மாறுபடும்; சில சூழ்நிலைகள் மற்றவற்றை விடக் கட்டுப்படுத்தக்கூடியவை.

