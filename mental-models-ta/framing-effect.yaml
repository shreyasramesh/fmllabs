id: framing_effect
name: சட்டக விளைவு

quick_introduction: |
  சட்டக விளைவு என்பது, ஒரே மாதிரியான உண்மைகள் இருந்தாலும், விருப்பங்கள் எவ்வாறு வழங்கப்படுகின்றன என்பதைப் பொறுத்து நமது முடிவுகள் மாறும் போக்காகும். "90% உயிர்வாழ்வு" மற்றும் "10% இறப்பு" ஆகியவை ஒரே விளைவை விவரிக்கின்றன, ஆனால் வெவ்வேறு தேர்வுகளைத் தூண்டுகின்றன. சட்டகம் முடிவை வடிவமைக்கிறது.

one_liner: ஒரே உண்மைகள், வெவ்வேறு சட்டகங்களில், வெவ்வேறு முடிவுகளுக்கு வழிவகுக்கும்.

try_this:
  - முடிவு செய்வதற்கு முன் விருப்பங்களை பல வழிகளில் மறுசட்டகம் செய்யுங்கள் - ஆதாய சட்டகம் மற்றும் இழப்பு சட்டகம்.
  - ஏதேனும் ஒன்று எவ்வாறு வார்த்தைப்படுத்தப்படுகிறது என்பதைப் பொறுத்து உங்கள் தேர்வு மாறும் போது கவனியுங்கள்.
  - கேளுங்கள்: சட்டகம் நீக்கப்பட்டு, அடிப்படை உண்மைகள் என்ன?

ask_yourself:
  - இது ஒரு ஆதாயமாக சட்டகப்படுத்தப்பட்டால் vs. ஒரு இழப்பாக சட்டகப்படுத்தப்பட்டால் நான் வித்தியாசமாக முடிவு செய்வேனா?
  - நான் சட்டகத்திற்குப் பதிலளிக்கிறேனா அல்லது உண்மையான விளைவுக்குப் பதிலளிக்கிறேனா?

in_more_detail: |
  கான்மன் மற்றும் ட்வர்ஸ்கி ஆகியோர், விருப்பங்கள் ஆதாயங்களாக சட்டகப்படுத்தப்படும்போது மக்கள் இழப்புத் தவிர்ப்பவர்களாகவும், இழப்புகளாக சட்டகப்படுத்தப்படும்போது இழப்பு நாடுபவர்களாகவும் இருப்பார்கள் என்று காட்டினர் - ஒரே விளைவுகளுக்கும் கூட. நேர்மறை சட்டகம் ("200 உயிர்களைக் காப்பாற்று") vs. எதிர்மறை சட்டகம் ("400 பேர் இறப்பார்கள்") விருப்பங்களை மாற்றுகிறது. இழப்பு சட்டகங்கள் சமமான ஆதாய சட்டகங்களை விட வலுவான உணர்ச்சிபூர்வமான பதில்களைத் தூண்டுகின்றன.

  சட்டக விளைவு மருத்துவ முடிவுகள், கொள்கை, சந்தைப்படுத்தல் மற்றும் பேச்சுவார்த்தைகளில் தாக்கத்தை ஏற்படுத்துகிறது. இது மிகவும் சக்திவாய்ந்த மற்றும் நன்கு ஆவணப்படுத்தப்பட்ட சார்புகளில் ஒன்றாகும். விழிப்புணர்வு உதவுகிறது, ஆனால் அதை முழுமையாக சமாளிப்பது கடினம்.

why_this_is_important: |
  சட்டக விளைவை அங்கீகரிப்பது, நீங்கள் மிகவும் சீரான முடிவுகளை எடுக்கவும், கையாளுதலை எதிர்க்கவும், மிகவும் திறம்பட தொடர்புகொள்ளவும் உதவுகிறது. இது ஏன் ஒரே சலுகை விளக்கத்தைப் பொறுத்து ஏற்றுக்கொள்ளப்படலாம் அல்லது நிராகரிக்கப்படலாம் என்பதையும் விளக்குகிறது.

when_to_use:
  - முடிவு_செய்தல்
  - பேச்சுவார்த்தை
  - தலைமைத்துவம்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  gain_loss_asymmetry: |
    ஒரே விளைவை ஆதாயம் vs. இழப்பாக சட்டகப்படுத்துவது வெவ்வேறு தேர்வுகளை உருவாக்குகிறது.
  presentation_dependence: |
    சாராம்சத்தை மாற்றாமல், சட்டகம் மாறும்போது முடிவுகள் மாறும்.
  default_influence: |
    விருப்பங்கள் எவ்வாறு வரிசைப்படுத்தப்படுகின்றன அல்லது பெயரிடப்படுகின்றன என்பது தேர்வுகளை பாதிக்கிறது.
  emotional_trigger: |
    சில சட்டகங்கள் வலுவான உணர்ச்சிபூர்வமான பதில்களைத் தூண்டுகின்றன.

examples:
  medical: |
    ஒரே நடைமுறைக்கான "90% உயிர்வாழ்வு" vs. "10% இறப்பு" -
    மக்கள் சட்டகத்தைப் பொறுத்து வித்தியாசமாகத் தேர்வு செய்கிறார்கள்.
  sales: |
    "$50 சேமிப்பு" vs. " $50 இழக்காதீர்கள்" - சமமான சட்டகங்கள், வெவ்வேறு
    உளவியல் தாக்கம்.
  policy: |
    "வரி நிவாரணம்" vs. "அரசு செலவினம்" - ஒரே கொள்கை, வெவ்வேறு
    அரசியல் பதில்.
  negotiation: |
    ஒரு சலுகையை "தள்ளுபடி" vs. "கூடுதல் கட்டணத்தைத் தவிர்த்தல்" என வழங்குவது
    ஏற்பு விகிதங்களை மாற்றுகிறது.

real_world_implications: |
  சட்டக விளைவு விளம்பரம், அரசியல் மற்றும் பேச்சுவார்த்தைகளில் பயன்படுத்தப்படுகிறது. இது மருத்துவ முடிவுகள் மற்றும் கொள்கை ஆதரவை பாதிக்கிறது. மறுசட்டகம் செய்வது முடிவுகளையும் தொடர்பையும் மேம்படுத்தும். விழிப்புணர்வு உதவுகிறது ஆனால் விளைவை முழுமையாக அகற்றாது.

professional_application:
  networking_and_relationship_building: |
    விருப்பங்களை வழங்கும் போது, பல சட்டகங்களைக் கவனியுங்கள். வெவ்வேறு சட்டகங்கள் எவ்வாறு வரவேற்பைப் பாதிக்கின்றன என்பதைச் சோதிக்கவும். தகவலைப் பெறும்போது, "இதை வேறு எப்படி சட்டகப்படுத்தலாம்?" என்று கேளுங்கள்.
  collaborative_learning_initiative: |
    முடிவு செய்யும் போது, சட்டக விளைவுகளைச் சரிபார்க்க விருப்பங்களை வெளிப்படையாக மறுசட்டகம் செய்யுங்கள். "நாம் இதை இழப்பாக சட்டகப்படுத்தினால், வித்தியாசமாக முடிவெடுப்போமா?" என்று கேளுங்கள். நியாயத்திற்காக சீரான சட்டகத்தைப் பயன்படுத்தவும்.

how_can_this_be_misapplied:
  manipulation: |
    மக்கள் அறியாமலேயே விரும்பிய விளைவுகளை நோக்கி அவர்களை வழிநடத்த வேண்டுமென்றே சட்டகப்படுத்துதல்.
  false_equivalence: |
    சில சட்டகங்கள் முக்கியமான தகவல்களை மறைக்கும் போது, அனைத்து சட்டகங்களும் சமமாக செல்லுபடியாகும் என்று கருதுவது.
  overcorrection: |
    முழுவதுமாக சட்டகத்தைப் புறக்கணித்து, அது முக்கியமில்லை என்று கருதுவது -
    அது முக்கியம்.
  spin: |
    தெளிவுபடுத்துவதற்குப் பதிலாக திசை திருப்புவதற்கு சட்டகத்தைப் பயன்படுத்துதல்.

