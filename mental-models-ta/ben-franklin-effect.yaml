id: ben_franklin_effect
name: பென் ஜான்சன் விளைவு

quick_introduction: |
  பென் ஜான்சன் விளைவு என்பது, ஒருவர் நமக்கு உதவிய பிறகு, நாம் அவரை அதிகமாக விரும்புவோம் என்ற உளவியல் நிகழ்வு ஆகும். நாம் விரும்புபவர்களுக்காகவே உதவிகளைச் செய்கிறோம் என்ற உள்ளுணர்வுக்கு மாறாக, நாம் யாருக்காக உதவிகளைச் செய்தோமோ அவர்களை நாம் அதிகமாக விரும்பிவிடுவோம்.

one_liner: நாம் யாருக்காக உதவிகளைச் செய்தோமோ அவர்களை நாம் விரும்பிவிடுகிறோம் - நம் மனப்பான்மைகள் நம் செயல்களைப் பின்பற்றுகின்றன.

try_this:
  - ஒரு உறவை மேம்படுத்த விரும்பினால், ஒரு சிறிய உதவி கேட்கவும்.
  - ஒருவருக்கு உதவி செய்வது அவர் மீது உங்கள் உணர்வுகளை எவ்வாறு மாற்றுகிறது என்பதைக் கவனியுங்கள்.
  - மற்றவர்கள் உங்களுக்கு உதவிய பிறகு உங்களை அதிகமாக விரும்பக்கூடும் என்பதை அறிந்து கொள்ளுங்கள்.

ask_yourself:
  - ஒருவருக்கு உதவி செய்தது அவரைப் பற்றிய என் உணர்வை மாற்றியிருக்கிறதா?
  - அவர்களைப் பற்றிய என் மரியாதையை அதிகரிப்பதன் மூலம் என் முயற்சியை நான் பகுத்தறிந்து கொள்கிறேனா?

in_more_detail: |
  பெஞ்சமின் ஜான்சன் தனது நூலகத்திலிருந்து ஒரு அரிய புத்தகத்தை இரவல் கேட்கும்படி ஒரு போட்டியாளரிடம் கேட்டு, அவரை வென்றதை விவரித்தார். அந்த நபர் ஒப்புக்கொண்ட பிறகு, ஜான்சன் அதை ஒரு நன்றி குறிப்புடன் திருப்பி அளித்தார். உறவு கணிசமாக மேம்பட்டது. இந்த விளைவு நமது மனப்பான்மைகள் நமது செயல்களைப் பின்பற்றுகின்றன என்று கூறுகிறது: நாம் ஒருவருக்கு உதவ முயற்சிக்கும்போது, ​​அவரைப் பற்றிய நமது நேர்மறையான பார்வையை அதிகரிப்பதன் மூலம் அந்த முயற்சியை நாம் பகுத்தறிந்து கொள்கிறோம்.

  அறிவாற்றல் முரண்பாட்டுக் கோட்பாடு இதை விளக்குகிறது: நாம் விரும்பாத அல்லது நடுநிலையான ஒருவருக்கு உதவினால், நமது செயல் (உதவி) மற்றும் நமது மனப்பான்மை (விருப்புமின்மை) இடையே ஒரு பதற்றத்தை அனுபவிக்கிறோம். அந்த பதற்றத்தை அவர்களை அதிகமாக விரும்புவதன் மூலம் தீர்ப்பது, நமது விருப்பங்களுக்கு எதிராக நாம் செயல்பட்டதை ஒப்புக்கொள்வதை விட எளிதாக இருக்கும்.

why_this_is_important: |
  பென் ஜான்சன் விளைவைப் புரிந்துகொள்வது, உறவுகளை உத்திபூர்வமாக உருவாக்கவும், கடந்தகால உதவிகளால் உங்கள் சொந்த உணர்வுகள் எவ்வாறு பாதிக்கப்படக்கூடும் என்பதை அங்கீகரிக்கவும் உதவுகிறது. உறவை மேம்படுத்த முயற்சிக்கும்போது, ​​உதவிகளை வழங்குவதை விட சிறிய உதவிகளைக் கேட்பது ஏன் மிகவும் பயனுள்ளதாக இருக்கும் என்பதையும் இது விளக்குகிறது.

when_to_use:
  - உறவு_கட்டுதல்
  - பேச்சுவார்த்தை
  - தலைமைத்துவம்
  - முரண்பாடு_தீர்வு

how_can_you_spot_it:
  liking_after_helping: |
    முன்பு நீங்கள் நடுநிலையாக அல்லது எதிர்மறையாக உணர்ந்திருந்தாலும், ஒருவருக்கு நீங்கள் உதவி செய்த பிறகு அவரைப் பற்றி உங்களுக்கு வெப்பமாக உணர்கிறீர்களா என்பதைக் கவனியுங்கள்.
  others_requesting_small_favors: |
    ஒருவர் மீண்டும் மீண்டும் சிறிய உதவிகளைக் கேட்கும்போது, ​​அவர் இந்த விளைவைப் பயன்படுத்தி உறவை வளர்க்க முயலலாம்.
  attitude_shift_post_investment: |
    ஒருவருக்கு உதவ நேரம் அல்லது முயற்சி எடுத்த பிறகு, அவரைப் பற்றிய உங்கள் கருத்து நேர்மறையாக மாறியுள்ளதா என்பதைக் கவனியுங்கள்.
  reciprocal_relationship_dynamics: |
    ஒரு நபர் பல உதவிகளைச் செய்த உறவுகள், செயலில் சமமாகத் தோன்றினாலும், பாசத்தில் சமநிலையற்றதாக உணரலாம்.

examples:
  networking: |
    ஒரு சக ஊழியரிடம் ஒரு வரைவு குறித்த கருத்தைக் கேட்கிறீர்கள், இது அவர் உங்கள் வெற்றிக்கு அதிக முதலீடு செய்திருப்பதாகவும், உங்களை நேர்மறையாகக் கருதுவதாகவும் உணர வைக்கிறது.
  sales: |
    ஒரு விற்பனையாளர் ஒரு வாடிக்கையாளரிடம் ஒரு சிறிய உதவி கேட்கிறார் (எ.கா., பரிந்துரை அல்லது அறிமுகம்), இது வாடிக்கையாளரின் ஈடுபாடு மற்றும் விருப்பத்தை அதிகரிக்கிறது.
  conflict_resolution: |
    ஒரு கருத்து வேறுபாடு ஏற்பட்ட பிறகு, மற்ற தரப்பினரிடம் தொடர்பில்லாத ஒன்றில் உதவி கேட்பது பதட்டத்தை மென்மையாக்கி நல்லெண்ணத்தை மீண்டும் கட்டியெழுப்ப உதவும்.
  mentoring: |
    ஒரு மூத்த நபர் ஒரு இளைய நபரிடம் உள்ளீடு அல்லது உதவி கேட்கும்போது, ​​அந்த இளைய நபர் அதிக மதிப்பையும் இணைப்பையும் உணர்கிறார்.

real_world_implications: |
  பென் ஜான்சன் விளைவு வேலைவாய்ப்பு, விற்பனை, இராஜதந்திரம் மற்றும் அன்றாட சமூக இயக்கவியலில் தாக்கத்தை ஏற்படுத்துகிறது. பாலங்களை உருவாக்க இது நேர்மையாகப் பயன்படுத்தப்படலாம் அல்லது பாசத்தை கையாள இது நேர்மையற்ற முறையில் பயன்படுத்தப்படலாம். இதை அங்கீகரிப்பது, சில உறவுகள் ஏன் சமமற்ற உதவி-கொடுத்தலுக்குப் பிறகு வலுவாக உணர்கின்றன என்பதைப் புரிந்துகொள்ள உதவுகிறது.

professional_application:
  networking_and_relationship_building: |
    உறவுகளை உருவாக்கும் போது, ​​உதவிகளை வழங்குவதை விட, சிறிய, நியாயமான உதவிகளைக் கேட்பதைக் கருத்தில் கொள்ளுங்கள். உதவி செய்யும் செயல் முதலீடு மற்றும் நேர்மறை மரியாதையை உருவாக்குகிறது.
  collaborative_learning_initiative: |
    குழுக்களில், உறுப்பினர்கள் ஒருவருக்கொருவர் உதவுவது (எ.கா., சக மதிப்பாய்வு, குறுக்குப் பயிற்சி) ஒற்றுமையை வலுப்படுத்தும். அனைவரும் உதவி அளித்து பெறுவதை உறுதிசெய்ய ஒத்துழைப்பை கட்டமைக்கவும்.

how_can_this_be_misapplied:
  manipulation: |
    உண்மையான தேவை இல்லாமல், உங்களை விரும்புவதற்காக மட்டுமே ஒருவரிடம் உதவிகளைக் கேட்பது, கண்டறியப்பட்டால், சுரண்டலாக உணரலாம்.
  overreliance_on_favors: |
    உதவிகள் மட்டுமே ஒரு உடைந்த உறவை சரிசெய்யும் என்று கருதுவது; சில முரண்பாடுகளுக்கு நேரடி உரையாடல் மற்றும் பொறுப்புக்கூறல் தேவை.
  asymmetric_exploitation: |
    பதிலுக்கு எந்த உதவியும் செய்யாமல் மீண்டும் மீண்டும் உதவிகளைக் கேட்பது பின்வாங்கலாம் மற்றும் மனக்கசப்பை வளர்க்கலாம்.
  misattributing_motives: |
    ஒருவரின் சூடான தன்மையை அது உங்களுக்கு செய்த உதவிகளின் பகுதியாக இருக்கலாம் என்று கருதுவது.

