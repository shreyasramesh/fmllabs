id: bayes_theorem
name: பேயஸ் தேற்றம்

quick_introduction: |
  பேயஸ் தேற்றம், புதிய ஆதாரம் கிடைக்கும்போது ஒரு கருதுகோளின் நிகழ்தகவை எவ்வாறு புதுப்பிப்பது என்பதை விவரிக்கிறது. இது நம்பிக்கைகள் ஆதரிக்கும் அளவுக்கு விகிதாசாரமாக மாற வேண்டும் என்ற கருத்தை முறைப்படுத்துகிறது—அனைத்தும் அல்லது எதுவும் இல்லை, ஆனால் படிப்படியாக.

one_liner: ஆதாரங்கள் ஆதரிக்கும் அளவுக்கு விகிதாசாரமாக நம்பிக்கைகளைப் புதுப்பிக்கவும்.

try_this:
  - உங்கள் முந்தைய நம்பிக்கையுடன் தொடங்குங்கள்; நீங்கள் தவறாக இருந்தால் ஆதாரம் எவ்வளவு சாத்தியமானது என்று கேளுங்கள்.
  - படிப்படியாக புதுப்பிக்கவும்—ஒரு தரவுப் புள்ளியில் 0% இலிருந்து 100% ஆக மாற வேண்டாம்.
  - மாற்று கருதுகோள்களைக் கவனியுங்கள்: ஆதாரம் அவற்றுக்கும் பொருந்துமா?

ask_yourself:
  - இந்த ஆதாரம் உண்மையில் நிகழ்தகவை எவ்வளவு மாற்றுகிறது?
  - நான் எனது நம்பிக்கைகளை புதுப்பிக்கிறேனா, அல்லது நான் ஏற்கனவே நினைத்ததை உறுதிப்படுத்துகிறேனா?

in_more_detail: |
  தேற்றம் என்னவென்றால், ஆதாரத்தின் அடிப்படையில் ஒரு கருதுகோளின் நிகழ்தகவு, கருதுகோளின் அடிப்படையில் ஆதாரத்தின் நிகழ்தகவு, ஆதாரத்தின் நிகழ்தகவால் வகுக்கப்படும். நடைமுறையில்: உங்கள் முந்தைய நம்பிக்கையுடன் தொடங்குங்கள், புதிய ஆதாரம் உங்கள் கருதுகோளுக்கு எதிராக மாற்று வழிகளுடன் எவ்வளவு ஒத்துப்போகிறது என்பதைப் பாருங்கள், அதற்கேற்ப புதுப்பிக்கவும்.

  நீங்கள் தவறாக இருந்தால் ஆதாரம் எவ்வளவு சாத்தியமானதாக இருக்கும் என்பதைக் கருத்தில் கொள்ளுமாறு பேய்சியன் சிந்தனை உறுதிப்படுத்தல் சார்பை எதிர்க்கிறது. இது நிகழ்தகவு பகுத்தறிவு மற்றும் அறிவியல் புதுப்பித்தலின் அடித்தளமாகும்.

why_this_is_important: |
  பேய்சியன் சிந்தனை நிச்சயமற்ற தன்மையின் கீழ் முடிவெடுப்பதை மேம்படுத்துகிறது, அதிகப்படியான நம்பிக்கையைத் தவிர்க்க உதவுகிறது, மேலும் ஆதாரங்களில் இருந்து கற்றுக்கொள்வதற்கான ஒரு கட்டமைப்பை வழங்குகிறது. இது நோயறிதல், முன்னறிவிப்பு மற்றும் நிச்சயமற்ற தன்மையைக் கொண்ட எந்தவொரு களத்திற்கும் அவசியம்.

when_to_use:
  - முடிவெடுத்தல்
  - சிக்கல்_தீர்த்தல்
  - இடர்_மதிப்பீடு
  - கற்றல்

how_can_you_spot_it:
  prior_and_update: |
    ஒரு அடிப்படை நம்பிக்கையுடன் தொடங்கி, புதிய ஆதாரங்களின் அடிப்படையில் அதைச் சரிசெய்தல்.
  likelihood_ratio_thinking: |
    "நான் சரியாக இருந்தால் ஆதாரத்தின் நிகழ்தகவு என்ன vs. தவறாக இருந்தால்?" என்று கேட்பது.
  incremental_updating: |
    நம்பிக்கைகள் திடீரென மாறுவதற்குப் பதிலாக ஆதாரங்களுடன் படிப்படியாக மாறுகின்றன.
  base_rate_respect: |
    முந்தைய நிகழ்தகவுகள் (அடிப்படை விகிதங்கள்) முக்கியமானவை, சமீபத்திய தரவுப் புள்ளி மட்டுமல்ல.

examples:
  medical_diagnosis: |
    அரிதான நோய்க்கான நேர்மறை சோதனை—முந்தைய (குறைந்த பரவல்) ஒரு நேர்மறை முடிவு பெரும்பாலும் தவறான நேர்மறையாகும். பேயஸ் நிகழ்தகவைப் புதுப்பிக்கிறது.
  forecasting: |
    ஆரம்பகால மதிப்பீடுகளுடன் ஒட்டிக்கொள்வதற்குப் பதிலாக புதிய தரவு வரும்போது கணிப்புகளைப் புதுப்பித்தல்.
  hiring: |
    பணிப் பொருத்தத்திற்கான அடிப்படை விகிதங்களுடன் தொடங்கி, நேர்காணல் செயல்திறனின் அடிப்படையில் புதுப்பித்தல்.
  investing: |
    ஒரு நிறுவனம் வெற்றி பெறும் நிகழ்தகவைப் புதுப்பித்தல், ஏனெனில் புதிய தகவல் (வருவாய், செய்தி) வருகிறது.

real_world_implications: |
  பேய்சியன் சிந்தனை நவீன AI, மருத்துவ நோயறிதல் மற்றும் அறிவியல் அனுமானம் ஆகியவற்றின் அடிப்படையாக உள்ளது. இது அடிப்படை விகித புறக்கணிப்பு மற்றும் உறுதிப்படுத்தல் சார்பை சரிசெய்கிறது. நிச்சயமற்ற தன்மையைக் கொண்ட எந்தவொரு களத்திற்கும் இது ஒரு சக்திவாய்ந்த கருவியாகும்.

professional_application:
  networking_and_relationship_building: |
    நிலையான முதல் எண்ணங்களைப் பிடித்து வைப்பதற்குப் பதிலாக, புதிய ஆதாரங்களின் அடிப்படையில் மக்களைப் பற்றிய உங்கள் நம்பிக்கைகளைப் புதுப்பிக்கவும். செயல்களை விளக்கும்போது அடிப்படை விகிதங்களைக் (எ.கா., இந்த நடத்தை எவ்வளவு பொதுவானது?) கருத்தில் கொள்ளுங்கள்.
  collaborative_learning_initiative: |
    கலந்துரையாடல்களுக்கு முன்பு வெளிப்படையாக முந்தைய நம்பிக்கைகளைத் தெரிவிக்க குழுக்களை ஊக்குவிக்கவும், பின்னர் ஆதாரம் வழங்கப்படும்போது புதுப்பிக்கவும். நங்கூரமிடுதல் மற்றும் உறுதிப்படுத்தல் சார்பைக் குறைக்கிறது.

how_can_this_be_misapplied:
  overprecision: |
    நிச்சயமற்ற தன்மை அதிகமாக இருக்கும்போது துல்லியமான நிகழ்தகவுகளை ஒதுக்குதல்.
  prior_rigidity: |
    வலுவான முந்தைய நம்பிக்கைகளுடன் ஒட்டிக்கொண்டு புதிய ஆதாரங்களுடன் போதுமான அளவு புதுப்பிக்காமல் இருத்தல்.
  base_rate_tyranny: |
    அடிப்படை விகிதங்கள் வேறுவிதமாகக் கூறினாலும் வலுவான ஆதாரங்களைப் புறக்கணித்தல்—சில சமயங்களில் ஆதாரம் ஆதிக்கம் செலுத்த வேண்டும்.
  false_sophistication: |
    உண்மையான பகுத்தறிவைச் செய்யாமல் கடுமையாகத் தோன்ற பேய்சியன் மொழியைப் பயன்படுத்துதல்.

