id: bounded_rationality
name: வரையறுக்கப்பட்ட பகுத்தறிவு

quick_introduction: |
  வரையறுக்கப்பட்ட பகுத்தறிவு என்பது, கிடைக்கக்கூடிய தகவல், அறிவாற்றல் திறன் மற்றும் நேரம் ஆகியவற்றால் மனிதர்களின் முடிவெடுக்கும் திறன் வரையறுக்கப்பட்டுள்ளது என்ற கருத்தாகும். நாம் உகந்ததாகச் செய்வதில்லை; மாறாக "திருப்தி அடைகிறோம்" – அதாவது, சிறந்த சாத்தியமான விருப்பங்களை விட போதுமானதாக இருக்கும் விருப்பங்களைத் தேர்ந்தெடுக்கிறோம்.

one_liner: நாம் திருப்தி அடைகிறோம்—போதுமானதாக இருக்கும் ஒன்றைத் தேர்ந்தெடுக்கிறோம், உகந்ததை அல்ல.

try_this:
  - சாத்தியமான இடங்களில் தேர்வுகளை எளிமைப்படுத்துங்கள்; பல விருப்பங்கள் வரையறுக்கப்பட்ட பகுத்தறிவை அதிகமாகக் குழப்புகின்றன.
  - முடிவில்லாத தேடலைத் தவிர்க்க, முன்பே "போதுமானது" என்ற அளவுகோல்களை அமைக்கவும்.
  - குறைந்துவரும் வருமானத்தின் புள்ளிக்கு அப்பால் மேம்படுத்துவதை நீங்கள் எப்போது கவனிக்கிறீர்கள் என்பதை அறியவும்.

ask_yourself:
  - போதுமானதாக இருக்கும் போது, ​​சிறந்த விருப்பத்தைக் கண்டுபிடிக்க முயற்சிக்கிறேனா?
  - என் முடிவை வரையறுக்கும் தடைகள் (நேரம், தகவல், கவனம்) யாவை?

in_more_detail: |
  Herbert Simon, முழுமையான தகவல்களுடன் பகுத்தறிவுள்ள நடிகர்கள் என்ற பாரம்பரிய பொருளாதார அனுமானத்தை சவால் செய்ய இந்தக் கருத்தை அறிமுகப்படுத்தினார். உண்மையில், நமக்கு வரையறுக்கப்பட்ட கவனம், வேலை செய்யும் நினைவகம் மற்றும் நேரம் மட்டுமே உள்ளன. நமது வரம்புகளுக்கு "பகுத்தறிவுள்ள" முடிவுகளை எடுக்க நாம் ஹெயூரிஸ்டிக்ஸ் மற்றும் குறுக்குவழிகளைப் பயன்படுத்துகிறோம், அவை ஒரு சிறந்த அர்த்தத்தில் உகந்ததாக இல்லாவிட்டாலும் கூட.

  வரையறுக்கப்பட்ட பகுத்தறிவு, நாம் ஏன் எப்போதும் சிறந்த விருப்பத்தைத் தேர்ந்தெடுப்பதில்லை, ஏன் நாம் பொதுவான விதிகளையே நம்புகிறோம், ஏன் சூழல் மற்றும் பின்னல் மிகவும் முக்கியம் என்பதை விளக்குகிறது. இது நாம் உண்மையில் எவ்வாறு முடிவெடுக்கிறோம் என்பதை விவரிக்கும் ஒரு மாதிரி, நாம் எப்படி செய்ய வேண்டும் என்பதற்கான பரிந்துரை அல்ல.

why_this_is_important: |
  வரையறுக்கப்பட்ட பகுத்தறிவைப் புரிந்துகொள்வது சிறந்த செயல்முறைகளை வடிவமைக்கவும், மற்றவர்களுக்கான தேர்வுகளை எளிமைப்படுத்தவும், முடிவுகளின் தரத்திற்கான யதார்த்தமான எதிர்பார்ப்புகளை அமைக்கவும் உதவுகிறது. இது "பகுத்தறிவற்ற" நடத்தை பெரும்பாலும் வரம்புகளின் கீழ் ஏன் பகுத்தறிவுள்ளது என்பதையும் விளக்குகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - சிக்கல்_தீர்த்தல்
  - தலைமைத்துவம்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  satisficing_behavior: |
    மக்கள் முழுமையாக ஒப்பிடுவதற்குப் பதிலாக ஏற்றுக்கொள்ளக்கூடிய முதல் விருப்பத்தைத் தேர்ந்தெடுக்கிறார்கள்.
  heuristic_reliance: |
    முழுமையான பகுப்பாய்வுக்குப் பதிலாக பொதுவான விதிகளின் உதவியுடன் முடிவுகள் எடுக்கப்படுகின்றன.
  context_dependence: |
    விருப்பங்கள் எவ்வாறு வழங்கப்படுகின்றன என்பதைப் பொறுத்து ஒரே நபர் வெவ்வேறு தேர்வுகளைச் செய்கிறார்.
  information_overload: |
    அதிகப்படியான தகவல்கள் கிடைக்கும்போது, ​​முடிவுகளின் தரம் குறையக்கூடும்.

examples:
  hiring: |
    ஒரு மேலாளர், "சிறந்த" வேட்பாளரைக் கண்டுபிடிக்க முடிவில்லாமல் நேர்காணல் செய்வதற்குப் பதிலாக, தகுதியைப் பூர்த்தி செய்யும் முதல் வேட்பாளரை நியமிக்கிறார்.
  consumer_choice: |
    கடையில் உள்ள ஒவ்வொரு பொருளையும் ஒப்பிடுவதற்குப் பதிலாக, வாங்குபவர்கள் அலமாரியில் உள்ள முதல் சில விருப்பங்களிலிருந்து தேர்ந்தெடுக்கிறார்கள்.
  policy: |
    வாக்காளர்கள் ஒவ்வொரு கொள்கை நிலைப்பாட்டையும் பகுப்பாய்வு செய்வதற்குப் பதிலாக, கட்சித் தொடர்புகள் அல்லது சில முக்கியப் பிரச்சனைகளைப் பயன்படுத்துகின்றனர்.
  daily_routines: |
    மக்கள் ஒவ்வொரு முடிவையும் மீண்டும் உகந்ததாக்குவதற்குப் பதிலாக, பழக்கவழக்கங்களையும் இயல்புநிலைகளையும் பின்பற்றுகிறார்கள்.

real_world_implications: |
  வரையறுக்கப்பட்ட பகுத்தறிவு சந்தைகள், கொள்கை வடிவமைப்பு மற்றும் நிறுவன நடத்தைகளை வடிவமைக்கிறது. எள்ளல்கள் (Nudges) மற்றும் தேர்வு கட்டமைப்பு (choice architecture) நம் வரம்புகளைக் கணக்கில் எடுத்துக்கொள்வதால் வேலை செய்கின்றன. இதைப் புறக்கணிப்பது, மக்கள் திறம்பட பயன்படுத்த முடியாத மிக சிக்கலான அமைப்புகளுக்கு வழிவகுக்கிறது.

professional_application:
  networking_and_relationship_building: |
    மற்றவர்கள் சிக்கலான வர்த்தகப் பரிமாற்றங்களை நிகழ்நேரத்தில் செயலாக்குவார்கள் என்று எதிர்பார்க்க வேண்டாம். தேர்வுகளை எளிமைப்படுத்தி, தெளிவான இயல்புநிலைகளை வழங்கவும்.
  collaborative_learning_initiative: |
    வரையறுக்கப்பட்ட பகுத்தறிவுடன் செயல்படும் செயல்முறைகளை வடிவமைக்கவும்: தேர்வுகளைக் குறைக்கவும், இயல்புநிலைகளை வழங்கவும், சிக்கலான முடிவுகளுக்கு சரிபார்ப்புப் பட்டியல்களைப் பயன்படுத்தவும்.

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    முடிவெடுக்கும் சோர்வு மற்றும் மோசமான விளைவுகளுக்கு வழிவகுக்கும், வரம்பற்ற அறிவாற்றல் திறனை அனுமானிக்கும் செயல்முறைகளை வடிவமைத்தல்.
  blaming_irrationality: |
    தடைகளைக் கருத்தில் கொள்ளாமல், மற்றவர்களின் தேர்வுகளை பகுத்தறிவற்றவை என்றுdismissal செய்தல்.
  exploitation: |
    விரும்பிய விளைவுகளை நோக்கி அவர்களை வழிநடத்த, வேண்டுமென்றே சிக்கலான தன்மையால் மக்களை அதிகமாக மூழ்குதல்.
  perfectionism: |
    திருப்தி அடையும் போது பகுத்தறிவு அணுகுமுறையாக இருக்கும்போது உகந்த முடிவுகளை எதிர்பார்ப்பது.

