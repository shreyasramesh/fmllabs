id: barnum_effect
name: பர்னம் விளைவு

quick_introduction: |
  பர்னம் விளைவு (அல்லது ஃபோரர் விளைவு) என்பது, தெளிவற்ற, பொதுவான ஆளுமை விளக்கங்களை தனித்துவமாக துல்லியமானதாக ஏற்கும் போக்காகும். ஜாதகம், ஜோதிடர்கள் மற்றும் ஆளுமை சோதனைகள் கிட்டத்தட்ட அனைவருக்கும் பொருந்தக்கூடிய கூற்றுகளைப் பயன்படுத்துகின்றன - ஆனால் நாம் அவற்றை நமக்கே பிரத்யேகமாக நம்புகிறோம். நாம் பொதுவானவற்றில் நம்மைக் காண்கிறோம்.

one_liner: தெளிவற்ற கூற்றுகள் தனிப்பட்டதாகத் தோன்றுகின்றன, ஏனெனில் அவை கிட்டத்தட்ட அனைவருக்கும் பொருந்தும்.

try_this:
  - Ask: Could this description apply to many people? Test it on someone else.
    கேள்வி: இந்த விளக்கம் பலருக்கும் பொருந்துமா? இதை வேறொருவரிடமும் சோதித்துப் பாருங்கள்.
  - Seek specific, behavioral feedback instead of vague praise or criticism.
    தெளிவற்ற பாராட்டுகள் அல்லது விமர்சனங்களுக்குப் பதிலாக, குறிப்பிட்ட, நடத்தை சார்ந்த கருத்துக்களைத் தேடுங்கள்.
  - Notice when "personalized" insights feel too good to be discriminating.
    "தனிப்பயனாக்கப்பட்ட" நுண்ணறிவுகள் பாகுபடுத்த முடியாத அளவுக்கு நன்றாகத் தோன்றும்போது கவனியுங்கள்.

ask_yourself:
  - Would this feedback feel accurate if given to a stranger?
    இந்தக் கருத்து அந்நியருக்குக் கூறப்பட்டால் துல்லியமாகத் தோன்றுமா?
  - Am I remembering the hits and forgetting the misses?
    நான் சரியாகப் பொருந்தியவற்றை நினைவில் வைத்துக்கொண்டு, பொருந்தாதவற்றை மறந்துவிடுகிறேனா?

in_more_detail: |
  உளவியலாளர் பெர்ட்ரம் ஃபோரர் மாணவர்களுக்கு ஒரே மாதிரியான "தனிப்பயனாக்கப்பட்ட" பின்னூட்டங்களை (எ.கா., "மற்றவர்கள் உங்களை விரும்பவும் புகழவும் நீங்கள் விரும்புகிறீர்கள்") வழங்கினார், மேலும் அவர்கள் அதை மிகவும் துல்லியமானதாக மதிப்பிட்டனர். அந்தக் கூற்றுகள் யாருக்கும் பொருந்தக்கூடிய அளவுக்கு போதுமானதாக இருந்தன. பி.டி. பர்னம் கூறுவதைப் போல "ஒவ்வொரு நிமிடமும் ஒரு ஏமாளி பிறக்கிறான்" - இந்த விளைவு தனிப்பட்டதாகத் தோன்றும் பொதுவான தன்மைகளால் வெகுஜனங்களை ஈர்க்கும் அவரது திறனுக்காக பெயரிடப்பட்டுள்ளது.

  இந்த விளைவு வேலை செய்கிறது, ஏனெனில் நாம் தெளிவற்ற கூற்றுகளில் தனிப்பட்ட பொருத்தத்தைக் கண்டறிவதில் திறமையானவர்கள். நாம் பொருந்தும் தருணங்களை நினைவில் வைத்துக்கொண்டு, பொருந்தாதவற்றை மறந்துவிடுகிறோம். இது "கோல்ட் ரீடிங்" மற்றும் பல "ஆளுமை" தயாரிப்புகளின் அடிப்படையாகும்.

why_this_is_important: |
  பர்னம் விளைவை அங்கீகரிப்பது, ஆளுமை மதிப்பீடுகளை மதிப்பிடவும், கையாளுதலுக்கு எதிர்ப்புத் தெரிவிக்கவும், தெளிவற்ற பின்னூட்டங்களை அதிகமாகப் புரிந்துகொள்வதைத் தவிர்க்கவும் உதவுகிறது. இது ஜாதகங்கள் ஏன் துல்லியமாகத் தோன்றுகின்றன என்பதையும், சில "தனிப்பயனாக்கப்பட்ட" ஆலோசனைகள் ஏன் பொதுவானவை என்பதையும் விளக்குகிறது.

when_to_use:
  - decision-making: முடிவு_எடுத்தல்
  - learning: கற்றல்
  - risk_assessment: இடர்_மதிப்பீடு
  - relationship_building: உறவு_வளர்த்தல்

how_can_you_spot_it:
  vague_accuracy: |
    தனிப்பட்டதாகத் தோன்றும் பின்னூட்டம், ஆனால் பலருக்கும் பொருந்தக்கூடியது.
  selective_fit: |
    பொருந்தும் விஷயங்களில் கவனம் செலுத்தி, பொருந்தாதவற்றை புறக்கணிக்கிறோம்.
  cold_reading: |
    யாரோ ஒருவர் உங்களை உண்மையில் பொதுவான கூற்றுகளுடன் "படிக்கிறார்".
  personality_test_enthusiasm: |
    மதிப்பீட்டு முடிவுகளை தனித்துவமான நுண்ணறிவாக விமர்சனமின்றி ஏற்றுக்கொள்வது.

examples:
  horoscopes: |
    "நீங்கள் சில சமயங்களில் உங்கள் முடிவுகளை சந்தேகிக்கிறீர்கள்" என்பது தனிப்பட்டதாகத் தோன்றினாலும், பெரும்பாலானவர்களுக்குப் பொருந்தும்.
  fortune_telling: |
    நம்முடைய சூழ்நிலைக்குத் தனித்துவமானதாக நாம் பொருள் கொள்ளும் தெளிவற்ற கணிப்புகள்.
  personality_tests: |
    சில மதிப்பீடுகள் பர்னம் கூற்றுகளைப் பயன்படுத்துகின்றன, மேலும் பாகுபாடு காட்டாமல் துல்லியமாகத் தோன்றுகின்றன.
  feedback: |
    நாம் ஆழ்ந்து தனிப்பயனாக்கப்பட்டதாகப் பொருள் கொள்ளும் பொதுவான செயல்திறன் பின்னூட்டம்.

real_world_implications: |
  பர்னம் விளைவு வானியல், சில பயிற்சி, மற்றும் குறைந்த தர மதிப்பீடுகளில் சுரண்டப்படுகிறது. இது தவறான கருவிகளில் தவறான நம்பிக்கையை உருவாக்க முடியும். இது ஏன் நாம் புகழ்ச்சிக்கும் தெளிவான நேர்மறையான பின்னூட்டத்திற்கும் பாதிக்கப்படக்கூடியவர்களாக இருக்கிறோம் என்பதையும் விளக்குகிறது.

professional_application:
  networking_and_relationship_building: |
    பின்னூட்டத்தைப் பெறும்போது, "இது பலருக்கும் பொருந்துமா?" என்று கேளுங்கள். தெளிவற்ற பாராட்டுகள் அல்லது விமர்சனங்களுக்குப் பதிலாக, குறிப்பிட்ட, நடத்தை சார்ந்த பின்னூட்டங்களைத் தேடுங்கள். மிகவும் நன்றாகத் தோன்றும் "தனிப்பயனாக்கப்பட்ட" நுண்ணறிவுகள் குறித்து சந்தேகமாக இருங்கள்.
  collaborative_learning_initiative: |
    மதிப்பீடுகளைப் பயன்படுத்தும்போது, பாகுபடுத்தும் செல்லுபடியாகும் (discriminant validity) கருவிகளைத் தேர்ந்தெடுக்கவும். பர்னம் கூற்றுகளை நம்பியிருக்கும் கருவிகளைத் தவிர்க்கவும். தெளிவற்ற பின்னூட்டத்தை அங்கீகரிக்க மக்களுக்குப் பயிற்சி அளிக்கவும்.

how_can_this_be_misapplied:
  dismissing_all_feedback: |
    அனைத்து தனிப்பயனாக்கப்பட்ட பின்னூட்டங்களும் பர்னம் விளைவு அல்ல - சில உண்மையாகவே குறிப்பிட்டவை. அனைத்தையும் தெளிவற்றது என நிராகரிக்காதீர்கள்.
  invalidating_experience: |
    ஒருவர் தனது நுண்ணறிவின் அனுபவம் "பர்னம் விளைவு" என்று கூறுவது, அது அவர்களுக்கு மதிப்புள்ளதாக இருக்கும்போது.
  overcorrection: |
    சில ஆளுமை கட்டமைப்புகள் பர்னம் கூற்றுகளைப் பயன்படுத்துவதால் அனைத்தையும் நிராகரிப்பது.
  false_skepticism: |
    ஏனெனில் ஏதோ ஒன்று துல்லியமாகத் தோன்றுவதால் அது பர்னம் விளைவாகத்தான் இருக்க வேண்டும் என்று அனுமானிப்பது - சில சமயங்களில் விஷயங்கள் துல்லியமானவை.

