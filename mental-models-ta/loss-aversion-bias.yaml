# Loss Aversion Bias
# Mental Model / Cognitive Bias - Example Entry

id: loss_aversion_bias
name: இழப்பு தவிர்ப்பு சார்பு

quick_introduction: |
  இழப்பு தவிர்ப்பு என்பது சமமான ஆதாயங்களைப் பெறுவதை விட இழப்புகளைத் தவிர்ப்பதை விரும்பும் ஒரு போக்கு.
  மக்கள் பெறும் இன்பத்தை விட, இழக்கும் வலியை தோராயமாக இரண்டு மடங்கு அதிகமாக உணர்கிறார்கள்.

one_liner: சமமான ஆதாயங்கள் எவ்வளவு இனிமையாக உணர்கின்றனவோ, அதைவிட தோராயமாக இரண்டு மடங்கு வலிமையாக இழப்புகள் உணர்கின்றன.

try_this:
  - "உங்களையே கேட்டுக்கொள்ளுங்கள்: நான் இழக்கப் போவதை விட, அடையப் போவதை அதிகமாக மதிப்பிடுகிறேனா?"
  - "தேர்வை இழப்புகளாக அல்லாமல் ஆதாயங்களாக மறுபரிசீலனை செய்து, உங்கள் பார்வை மாறுகிறதா என்று பாருங்கள்."
  - "உண்மையான சாதகத்தை விட, இழப்பு பயம் முடிவை இயக்குவதைக் கவனியுங்கள்."

ask_yourself:
  - "நான் பூஜ்ஜியத்திலிருந்து தொடங்கினால் என்ன தேர்வு செய்வேன்?"
  - "நான் இழக்கப் போவதால் தக்கவைக்கிறேனா, அல்லது எதிர்காலம் உண்மையாகவே சிறப்பாக இருப்பதால் தக்கவைக்கிறேனா?"

in_more_detail: |
  டேனியல் கானேமன் மற்றும் அமோஸ் ட்வெர்ஸ்கி ஆகியோரால் உருவாக்கப்பட்ட, இழப்பு தவிர்ப்பு என்பது இழப்புகளும் ஆதாயங்களும்
  சமச்சீரற்ற முறையில் உணரப்படுகின்றன என்பதை விளக்குகிறது. $100 இழப்பதன் உளவியல் தாக்கம் பொதுவாக $100 பெறுவதன்
  திருப்தியை விட அதிகமாக இருக்கும். இந்த சார்பு நிதி, பேச்சுவார்த்தைகள் மற்றும் அன்றாடத் தேர்வுகள் முழுவதும் முடிவுகளை பாதிக்கிறது,
  சாத்தியமான இழப்புகள் முக்கியமாக இருக்கும்போது பெரும்பாலும் இடர்-தவிர்ப்பு நடத்தையை ஏற்படுத்துகிறது.

why_this_is_important: |
  இழப்பு தவிர்ப்பைப் புரிந்துகொள்வது, பகுத்தறிவு பகுப்பாய்வை விட இழப்பு பயம் எப்போது முடிவுகளை இயக்குகிறது என்பதை
  அங்கீகரிக்க உதவுகிறது. இது ஏன் மக்கள் இழக்கும் முதலீடுகளைத் தக்கவைக்கிறார்கள், தேவையான மாற்றங்களைத் தவிர்க்கிறார்கள்,
  மற்றும் பேச்சுவார்த்தைகள் மற்றும் தொழில் முடிவுகளில் உகந்ததல்லாத தேர்வுகளைச் செய்கிறார்கள் என்பதை விளக்குகிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - முதலீடு_செய்தல்
  - தொழில்_மாற்றங்கள்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    ஒரு பொருளை இழக்கும் வாய்ப்பு, சாத்தியமான ஆதாயத்தின் சாதகத்துடன் ஒப்பிடும்போது, சமச்சீரற்ற பதட்டம்
    அல்லது எதிர்ப்பைத் தூண்டும் போது கவனிக்கவும்.
  reluctance_to_change: |
    முறைகள், வேலை, அல்லது சொத்துக்களை விற்பனை செய்வதைத் தவிர்க்க தயங்குதல், புறநிலை பகுப்பாய்வு
    அது சிறந்த விருப்பம் என்று பரிந்துரைத்தாலும் கூட.
  framing_sensitivity: |
    முடிவுகள், விருப்பங்கள் ஆதாயங்களாக அல்லது இழப்புகளாக பிரிக்கப்பட்டால், விளைவுகள் சமமாக இருந்தாலும் கூட,
    அதற்கேற்ப வியத்தகு முறையில் மாறும்.
  overvaluing_what_you_have: |
    உரிமைப்படுத்தும் விளைவு—நீங்கள் வைத்திருப்பதை, நீங்கள் வைத்திருப்பதால் மட்டுமே அதிக மதிப்புடன் மதிப்பிடுவது—பெரும்பாலும்
    இழப்பு தவிர்ப்புடன் இணைகிறது.

examples:
  investing: |
    "இழப்பை உணர்வதைத் தவிர்க்க" குறைந்துவரும் பங்குகளை வைத்திருப்பது, மற்ற இடங்களில்
    சிறந்த முதலீட்டு வாய்ப்புகளைத் தவறவிடுதல்.
  career: |
    தன்னைத்தானே திருப்திப்படுத்தாத வேலையில் இருப்பது, ஏனெனில் வெளியேறுவது பாதுகாப்பு இழப்பாகத் தோன்றும்,
    புதிய வாய்ப்பு அதிக வளர்ச்சியை வழங்கினாலும் கூட.
  negotiations: |
    ஒரு நியாயமான சலுகையை நிராகரிப்பது, ஏனெனில் அது ஒரு உடன்படிக்கையை "விட்டுக்கொடுப்பதாக" பிரிக்கப்படுகிறது,
    ஒரு உடன்பாட்டை "பெறுவதை" விட.
  product_design: |
    கட்டணச் சேவையாக மாறும் இலவச சோதனைகள்—பயனர்கள் சோதனை முடிந்ததும் சேவையை "இழப்பதாக" உணர்கிறார்கள்,
    இது புதிய சேவையை "பெறுவதை" விட சந்தா செலுத்துவதை ஊக்குவிக்கிறது.

real_world_implications: |
  இழப்பு தவிர்ப்பு சந்தைகள், கொள்கைகள் மற்றும் தனிப்பட்ட நடத்தைகளை வடிவமைக்கிறது. இது
  காப்பீடு மற்றும் உத்தரவாதங்கள் ஏன் நன்றாக விற்கின்றன, மக்கள் ஏன் பயனுள்ள மாற்றத்தைத் தவிர்க்கிறார்கள்,
  மற்றும் எதிர்மறை செய்திகள் ஏன் பெரிய தாக்கத்தை ஏற்படுத்துகின்றன என்பதை விளக்குகிறது. அதை அங்கீகரிப்பது
  முடிவு தரத்தை மேம்படுத்தவும் மற்றும் வருத்தத்தால் தூண்டப்பட்ட தேர்வுகளைக் குறைக்கவும் முடியும்.

professional_application:
  networking_and_relationship_building: |
    உற்பத்தித்திறன் இல்லாத உறவுகள் அல்லது ஒத்துழைப்புகளை முடிப்பதை மக்கள் இழப்பு தவிர்ப்பால் எதிர்க்கக்கூடும்
    என்பதை அறிந்திருங்கள்—அவர்கள் இணைப்பை "இழக்க" பயப்படுகிறார்கள்.
    எதிர்ப்பைக் குறைக்க புதிய வாய்ப்புகளை இழப்புகளுக்கு பதிலாக ஆதாயங்களாக பிரிக்கவும்.
  collaborative_learning_initiative: |
    புதிய செயல்முறைகள் அல்லது கருவிகளை அறிமுகப்படுத்தும்போது, குழு இழக்கும் விஷயங்களை விட,
    அவர்கள் என்ன "விட்டுக்கொடுக்கிறார்கள்" என்பதை விட, என்ன ஆதாயம் பெறுகிறது என்பதை வலியுறுத்துங்கள்.
    இழப்பு-பிரிக்கப்பட்ட மாற்ற முயற்சிகள் பெரும்பாலும் வலுவான எதிர்ப்பைத் தூண்டுகின்றன.

how_can_this_be_misapplied:
  manipulation: |
    முடிவுகளை அழுத்த இழப்பு தவிர்ப்பைப் பயன்படுத்துதல்—எ.கா., "வரையறுக்கப்பட்ட நேரச் சலுகைகள்"
    அல்லது "தவறவிடாதீர்கள்" என்று பிரிக்கப்பட்டால், உண்மையான மதிப்பு மதிப்பீட்டை விட
    இழப்பு பயத்தைத் தூண்டுகிறது.
  misinterpreting_relationships: |
    ஒருவரின் மாற்றத்திற்கான எதிர்ப்பை முற்றிலும் பகுத்தறிவு என்று கருதுவது, அது
    இழப்பு தவிர்ப்பால் இயக்கப்படக்கூடும். நோக்கங்களை தவறாகக் கணிப்பது நம்பிக்கையை சேதப்படுத்தும்.
  overcommitment: |
    தவறான திட்டம்—ஒரு தோல்வியுற்ற திட்டத்தில் தொடர்ந்து முதலீடு செய்வது,
    "நாம் ஏற்கனவே நிறைய முதலீடு செய்துள்ளோம்" என்பதால், இழப்புகளைக் குறைப்பதை விட.
  missed_opportunities_for_conflict_resolution: |
    எந்தவொரு சமரசமும் இழப்பாக உணர்வதால் சமரசம் செய்ய மறுப்பது,
    மாற்று அனைவருக்கும் மோசமான விளைவாக இருந்தாலும் கூட.
  vulnerability_to_exploitation: |
    நீங்கள் செயல்படவில்லை என்றால் "இழக்கப் போவதை" வலியுறுத்தும் விற்பனை உத்திகள் போன்றவை,
    இழப்பு தவிர்ப்பைத் தூண்டும் வகையில் தேர்வுகள் பிரிக்கும் மற்றவர்களால் கையாளப்படுதல்.
  reinforcing_negative_perceptions: |
    சாத்தியமான பின்னடைவுகளில் அதிக கவனம் செலுத்துவது ஒரு அவநம்பிக்கையான
    பார்வையை உருவாக்கக்கூடும், இது சுய-நிறைவேற்றமாகிறது, வளர்ச்சிக்குரிய வாய்ப்புகளைத் தவறவிடுகிறது.

