# Bystander Effect
# Mental Model / Cognitive Bias - Example Entry

id: bystander_effect
name: பார்வையாளர் விளைவு

quick_introduction: |
  பார்வையாளர் விளைவு என்பது, மற்றவர்கள் இருக்கும்போது தனிநபர்கள் உதவி செய்ய வாய்ப்பு குறைவதாகும். பார்வையாளர்கள் அதிகமாக இருந்தால், எந்த ஒரு தனிநபரும் செயல்படுவதற்கான வாய்ப்பு குறையும். பொறுப்பு பரவலாகிறது; யாராவது ஒருவர் உதவுவார் என்று நாம் கருதுகிறோம்.

one_liner: மக்கள் அதிகமாக இருந்தால், எந்த ஒரு தனிநபரும் செயல்படுவதற்கான வாய்ப்பு குறையும்.

try_this:
  - அவசர காலங்களில், பொறுப்பை நேரடியாக ஒதுக்குங்கள்: "நீங்கள், 911-க்கு அழைக்கவும்."
  - யாராவது ஒருவர் உதவுவார் என்று கருத வேண்டாம்—செயல்படுங்கள் அல்லது வெளிப்படையாக பொறுப்பை ஒப்படையுங்கள்.
  - மற்றவர்கள் முதலில் செயல்படுவதற்காக காத்திருக்கும்போது கவனியுங்கள்.

ask_yourself:
  - மற்றவர்கள் இருப்பதால் நான் பொறுப்பை பரப்புகிறேனா?
  - நான் தனியாக இருந்தால் வித்தியாசமாக செயல்படுவேனா?

in_more_detail: |
  கேட்டி ஜெனோவீஸ் கொலைக்குப் பிறகு (அந்தக் கதை ஓரளவு கட்டுக்கதையாக இருந்தாலும்),
  மற்றவர்களின் இருப்பு உதவி செய்வதைக் குறைப்பதாக ஆராய்ச்சியாளர்கள் கண்டறிந்தனர்.
  நாங்கள் குறிப்புகளுக்காக மற்றவர்களைப் பார்க்கிறோம்—யாரும் செயல்படவில்லை என்றால்,
  "நடவடிக்கை தேவையில்லை" என்று அதை விளக்குகிறோம்.
  நாங்கள் பொறுப்புப் பரவலையும் அனுபவிக்கிறோம்: பல மக்கள் இருக்கும்போது,
  ஒவ்வொருவரும் தனிப்பட்ட பொறுப்பை குறைவாக உணர்கிறார்கள். பன்முக அறியாமை ஏற்படலாம்:
  எல்லோரும் ஏதோ தவறு என்று நினைக்கிறார்கள் ஆனால் யாரும் செயல்படவில்லை, ஏனெனில் வேறு யாரும் செயல்படவில்லை.

  நிலைமை தெளிவாக இல்லாதபோது மற்றும்
  பார்வையாளர்கள் ஒருவருக்கொருவர் தெரியாதபோது இந்த விளைவு வலுவாக இருக்கும்.
  பொறுப்பை நேரடியாக ஒதுக்குவதன் மூலம் இதை சமாளிக்க முடியும் ("நீங்கள், 911-க்கு அழைக்கவும்").

why_this_is_important: |
  பார்வையாளர் விளைவைப் புரிந்துகொள்வது, மற்றவர்கள் செய்யாதபோது நீங்கள் நடவடிக்கை எடுக்கவும்,
  அதை சமாளிக்கும் அமைப்புகளை வடிவமைக்கவும் உதவுகிறது. நீங்கள் சிக்கலில் இருந்தால்,
  ஒரு குறிப்பிட்ட நபரை தனிமைப்படுத்துங்கள். நீங்கள் ஒரு பார்வையாளராக இருந்தால்,
  மற்றவர்கள் செயல்படுவதற்காக காத்திருக்க வேண்டாம்.

when_to_use:
  - தலைமைத்துவம்
  - உறவு_கட்டுதல்
  - மோதல்_தீர்வு
  - முடிவெடுக்கும்_செயல்முறை

how_can_you_spot_it:
  diffusion_of_responsibility: |
    பலர் இருக்கும்போது "யாரோ ஒருவர் அதைச் செய்வார்".
  pluralistic_ignorance: |
    நடவடிக்கை தேவை என்று எல்லோரும் நினைக்கிறார்கள் ஆனால் வேறு யாரும் செயல்படாததால் யாரும் செயல்படவில்லை.
  social_proof_inaction: |
    மற்றவர்களின் செயலற்ற தன்மை "நடவடிக்கை தேவையில்லை" என்று விளக்கப்படுகிறது.
  audience_inhibition: |
    முட்டாள்தனமாக தோன்றுவதையோ அல்லது மிகையாக செயல்படுவதையோ பயம் நடவடிக்கையை தடுக்கிறது.

examples:
  emergency: |
    ஒருவர் மயக்கமடைகிறார்; பலர் பார்வையாளர்களாக இருக்கும்போது,
    யாரும் உதவிக்கு அழைக்க வாய்ப்பில்லை.
  workplace: |
    எல்லோரும் ஒரு பிரச்சனையை பார்க்கிறார்கள் ஆனால் யாரும் அதை எழுப்பவில்லை—ஒவ்வொருவரும்
    யாரோ ஒருவர் செய்வார் என்று கருதுகிறார்கள்.
  harassment: |
    தொந்தரவை சாட்சியாக பார்ப்பவர்கள் தலையிடுவதில்லை, ஒவ்வொருவரும்
    மற்றவர்கள் செயல்படுவார்கள் என்று நினைக்கிறார்கள்.
  meetings: |
    ஒரு மோசமான யோசனை சவால் செய்யப்படாமல் செல்கிறது, ஏனெனில் எல்லோரும்
    யாரோ ஒருவர் பேசுவார் என்று கருதுகிறார்கள்.

real_world_implications: |
  பார்வையாளர் விளைவு அவசர காலங்களில் துயரமான விளைவுகளை ஏற்படுத்தலாம்
  மற்றும் நிறுவனங்களில் பிரச்சனைகள் நீடிக்க அனுமதிக்கலாம். அதை சமாளிக்க
  நேரடி பொறுப்பு ஒதுக்குதல் மற்றும் தலையிடுவதை ஊக்குவிக்கும் விதிமுறைகள் தேவை.

professional_application:
  networking_and_relationship_building: |
    உங்களுக்கு உதவி தேவைப்படும்போது, ஒரு குறிப்பிட்ட நபரிடம் கேளுங்கள்.
    தவறான ஒன்றைக் காணும்போது, செயல்படுங்கள்—மற்றவர்கள் செய்வார்கள் என்று கருத வேண்டாம்.
    பேசுவது எதிர்பார்க்கப்படுகிறது மற்றும் வெகுமதி அளிக்கப்படுகிறது என்ற விதிமுறைகளை உருவாக்குங்கள்.
  collaborative_learning_initiative: |
    பார்வையாளர் விளைவை அடையாளம் காணவும், தலையிடவும் மக்களுக்கு பயிற்சி அளிக்கவும்.
    "நீங்கள் ஒன்றைக் கண்டால், அதைச் சொல்லுங்கள்" என்று பயன்படுத்தி, வெளிப்படையான
    பாத்திரங்களை ஒதுக்குங்கள். முதலில் பேசுபவர்களுக்கு வெகுமதி அளியுங்கள்.

how_can_this_be_misapplied:
  blaming_bystanders: |
    சக்தி வாய்ந்த சூழ்நிலை சக்தியான விளைவு இருக்கும்போது தனிநபர்களை கடுமையாக மதிப்பிடுவது—சூழ்நிலையை மாற்றுவதில் கவனம் செலுத்துங்கள்.
  false_assumption: |
    போதுமான மக்கள் இருக்கும்போது யாராவது எப்போதும் உதவுவார்கள் என்று கருதுவது—எதிர்மாறானது பெரும்பாலும் உண்மை.
  overcorrection: |
    யாரும் பொறுப்பாகாதவாறு எல்லோருக்கும் பொறுப்பு கொடுப்பது—பரவல்
    இன்னும் ஏற்படலாம்.
  individualizing: |
    பார்வையாளர் விளைவை ஒரு சூழ்நிலை நிகழ்வாகக் கருதாமல் ஒரு குணாதிசயக் குறைபாடாகக் கருதுவது.

