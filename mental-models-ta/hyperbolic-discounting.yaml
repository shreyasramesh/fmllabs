id: hyperbolic_discounting
name: அதிபரவளைய தள்ளுபடி

quick_introduction: |
  அதிபரவளைய தள்ளுபடி என்பது பெரிய, தாமதமான பரிசுகளை விட சிறிய, உடனடி பரிசுகளுக்கு முன்னுரிமை அளிக்கும் போக்காகும்—மேலும் எதிர்காலத்தை பகுத்தறிவு மாதிரிகள் கணிப்பதை விட அதிகமாக தள்ளுபடி செய்கிறது. நாம் நிகழ்காலத்தை மிகைப்படுத்தி, எதிர்காலத்தை சீரற்ற வழிகளில் குறைத்து மதிப்பிடுகிறோம்.

one_liner: பெரிய தாமதமானவைக்கு மேல் சிறிய உடனடிக்கு முன்னுரிமை அளிக்கிறோம்—மேலும் எதிர்காலத்தை சீரற்ற முறையில் தள்ளுபடி செய்கிறோம்.

try_this:
  - முன்-உறுதிமொழி: நீங்கள் அமைதியான நிலையில் இருக்கும்போது உங்கள் எதிர்கால சுயத்திற்காக தேர்வுகளைச் செய்யுங்கள்.
  - 'மறுவடிவமைப்பு: "இது 10 நிமிடங்களில் வேண்டுமா? 10 மாதங்களில் வேண்டுமா?" என கேட்டால் சீரற்ற தன்மையை வெளிப்படுத்தும்.'
  - சிறந்த தேர்வுகளுக்கு உங்கள் எதிர்கால சுயத்தைக் கட்டுப்படுத்த உறுதிமொழி சாதனைகளைப் பயன்படுத்தவும்.

ask_yourself:
  - எனது எதிர்கால சுயத்தின் விலையில் நான் நிகழ்காலத்தை மிகைப்படுத்துகிறேனா?
  - ஒரு நாள் தாமதமானால், ஒரு வருடம் தாமதமானால் இந்த தேர்வை நான் செய்வேனா?

in_more_detail: |
  நாம் ஒரு வருடத்தில் $100 ஐ விட இன்று $50 ஐ விரும்பலாம், ஆனால் ஒரு வருடத்தில் $50 ஐ விட இரண்டு ஆண்டுகளில் $100 ஐ விரும்பலாம்—அது சீரற்றதாக இருந்தாலும். நமது தள்ளுபடி விகிதம் நிலையானது அல்ல; அது அதிபரவளையமானது. அருகிலுள்ள எதிர்காலம் அதிகமாக தள்ளுபடி செய்யப்படுகிறது; தொலைதூர எதிர்காலம் குறைவாக தள்ளுபடி செய்யப்படுகிறது. இது தள்ளிப்போடுதல், அடிமையாதல் மற்றும் குறைந்த சேமிப்பு ஆகியவற்றை விளக்குகிறது.

  தற்போதைய சார்பு என்பது ஒரு தொடர்புடைய கருத்து: நாம் தற்போதைய தருணத்திற்கு விகிதாசாரமற்ற முக்கியத்துவம் கொடுக்கிறோம். அதிபரவளைய தள்ளுபடி நாம் செய்யும் உறுதிமொழிகளை நாம் ஏன் காப்பாற்றாமல் போகிறோம் என்பதையும், நீண்ட கால திட்டமிடல் ஏன் கடினம் என்பதையும் விளக்குகிறது.

why_this_is_important: |
  அதிபரவளைய தள்ளுபடியைப் புரிந்துகொள்வது சிறந்த ஊக்கங்களை வடிவமைக்கவும், உங்கள் எதிர்கால சுயத்தை ஈடுபடுத்தவும், குறுகிய கால பொறிகளைத் தவிர்க்கவும் உதவுகிறது. இது நாம் ஏன் தள்ளிப்போடுகிறோம் என்பதையும், நீண்ட கால இலக்குகளுடன் நாம் ஏன் போராடுகிறோம் என்பதையும் விளக்குகிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - தொழில்_நகர்வுகள்
  - முதலீடு
  - தலைமைத்துவம்

how_can_you_spot_it:
  present_preference: |
    தாமதமான, பெரிய பரிசுகளை விட உடனடி திருப்தியை தேர்ந்தெடுப்பது.
  inconsistent_time_preferences: |
    காலம் செல்லச் செல்ல தலைகீழான விருப்பங்கள் (எ.கா., நாம் நாளை டயட் செய்ய விரும்புகிறோம் ஆனால் இன்று சாப்பிட வேண்டும்).
  commitment_failures: |
    எதிர்காலம் நிகழ்காலமாக மாறும்போது நாம் பின்பற்றாத திட்டங்களைச் செய்தல்.
  procrastination: |
    உடனடி வசதிக்காக முக்கியமான பணிகளைத் தள்ளிப்போடுதல்.

examples:
  savings: |
    ஓய்வூதியத்திற்காக சேமிப்பதை விட இப்போது செலவிட தேர்ந்தெடுப்பது—எதிர்காலம் அருவமாக உணரப்படுகிறது.
  health: |
    இன்று உடற்பயிற்சியைத் தவிர்ப்பது, வசதிக்காக, நாம் வருந்துவோம் என்று தெரிந்தாலும்—நாளைய வருத்தம் தள்ளுபடி செய்யப்படுகிறது.
  addiction: |
    நீண்ட கால ஆரோக்கியத்தை விட உடனடி உற்சாகத்தை தேர்ந்தெடுப்பது.
  deadlines: |
    காலக்கெடு வரும் வரை எதுவும் செய்யாமல் இருப்பது—பின்னர் "நிகழ்காலம்" காலக்கெடுவை உள்ளடக்கியது மற்றும் நாம் செயல்படுகிறோம்.

real_world_implications: |
  அதிபரவளைய தள்ளுபடி சேமிப்பு, ஆரோக்கியம், கல்வி மற்றும் அடிமையாதல் ஆகியவற்றை பாதிக்கிறது. இது பல சுய-கட்டுப்பாடு தோல்விகளை விளக்குகிறது. உறுதிமொழி சாதனைகள் (எ.கா., தானியங்கி சேமிப்பு, பொறுப்புக்கூறல்) எதிர்கால தேர்வுகளைக் கட்டுப்படுத்துவதன் மூலம் உதவக்கூடும்.

professional_application:
  networking_and_relationship_building: |
    எதிர்கால உறுதிமொழிகளைக் கேட்கும்போது, ​​எதிர்காலத்தை "நிகழ்காலமாக" மாற்றும் பொறுப்புக்கூறலை உருவாக்கவும் (எ.கா., சரிபார்ப்புகள், காலக்கெடு). அமைப்பு இல்லாமல் மக்கள் பின்பற்றுவார்கள் என்று கருத வேண்டாம்.
  collaborative_learning_initiative: |
    உறுதிமொழி சாதனைகளைப் பயன்படுத்தவும்: பொது உறுதிமொழிகள், காலக்கெடுவுக்கு முன்-உறுதிமொழி, மற்றும் நீண்ட கால இலக்குகளை மிகவும் உடனடியாக உணர வைக்கும் கட்டமைப்புகள். நீண்ட திட்டங்களை குறுகிய மைல்கற்களாக உடைக்கவும்.

how_can_this_be_misapplied:
  excessive_control: |
    "உதவுதல்" என்ற பெயரில் மக்களின் தேர்வுகளை அதிகமாகக் கட்டுப்படுத்துவது அவர்களின் எதிர்கால சுயங்களுக்கு.
  paternalism: |
    மற்றவர்களின் நீண்ட கால நலன்களுக்கு எது சிறந்தது என்று நாம் நினைக்கிறோம் என்று கருதுவது.
  ignoring_present_needs: |
    அருவமான எதிர்கால நன்மைகளுக்காக நியாயமான தற்போதைய தேவைகளை நிராகரிப்பது.
  one_size_fits_all: |
    தள்ளுபடி விகிதங்களில் மக்கள் வேறுபடுகிறார்கள்; அனைவருக்கும் ஒரே மாதிரியான உறுதிமொழி சாதனைகள் தேவையில்லை.

