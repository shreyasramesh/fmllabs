# சூதாட்டக்காரரின் தவறான நம்பிக்கை
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரணப் பதிவு

id: gamblers_fallacy
name: சூதாட்டக்காரரின் தவறான நம்பிக்கை

quick_introduction: |
  சூதாட்டக்காரரின் தவறான நம்பிக்கை என்பது கடந்த கால சுயாதீனமான நிகழ்வுகள்
  எதிர்காலத்தை பாதிக்கும் என்ற தவறான நம்பிக்கையாகும். தொடர்ச்சியான தலைகள்
  விழுந்த பிறகு, வால் "வர வேண்டிய நேரம்" என்று நாம் நினைக்கிறோம்—ஒவ்வொரு
  சுழற்சியும் சுயாதீனமானதாக இருந்தாலும். நாம் சீரற்ற தன்மையில் வடிவங்களைக்
  காண்கிறோம் மற்றும் தேவைப்படாதபோது "திருத்தம்" அல்லது "மீள்வீழ்ச்சியை"
  எதிர்பார்க்கிறோம்.

one_liner: கடந்த கால சுயாதீனமான நிகழ்வுகள் எதிர்காலத்தை பாதிக்காது—நாணயத்திற்கு நினைவாற்றல் இல்லை.

try_this:
  - நான் வெற்றி பெற வேண்டிய நேரம் வந்துவிட்டது என்று நீங்கள் நினைக்கும்போது, கேளுங்கள்: இந்த நிகழ்வுகள் உண்மையில் சுயாதீனமானவையா?
  - சராசரிக்கு மீள்வீழ்ச்சியை (உண்மையானது) சூதாட்டக்காரரின் தவறான நம்பிக்கையிலிருந்து (தவறானது) வேறுபடுத்துங்கள்.
  - நீங்கள் சீரற்ற தன்மையில் வடிவங்களைக் காணும்போது கவனியுங்கள்.

ask_yourself:
  - அவை சுயாதீனமானவையாக இருக்கும்போது, கடந்த கால முடிவுகள் எதிர்காலத்தை பாதிக்கும் என்று நான் கருதுகிறேனா?
  - ஒரு புள்ளிவிவர நிபுணர் எனது "மாற்றத்திற்கான நேரம்" என்ற காரணத்தை ஒப்புக்கொள்வாரா?

in_more_detail: |
  நியாயமான நாணய சுழற்சியில், ஒவ்வொரு சுழற்சியும் சுயாதீனமானது.
  தலை விழுவதற்கான நிகழ்தகவு எப்போதும் 50% ஆகும், கடந்த கால முடிவுகளைப்
  பொருட்படுத்தாமல். ஆனால் ஒரு முடிவின் நீண்ட ஓட்டம் மற்றொன்றை
  அதிக நிகழ்தகவாக ஆக்குகிறது என்று நாம் உணர்கிறோம். நாம் பெரிய
  எண்களின் விதியை (பல சோதனைகளில், முடிவுகள் சராசரியாகின்றன) குறுகிய
  கால "திருத்தத்துடன்" குழப்புகிறோம். சூதாட்ட விடுதிக்கு நினைவாற்றல்
  இல்லை.

  இந்த தவறான நம்பிக்கை சூதாட்டம், முதலீடு மற்றும் அன்றாட முடிவெடுத்தல்
  ஆகியவற்றை பாதிக்கிறது. "அதிர்ஷ்டம்" சமன் செய்யும் அல்லது நாம் வெற்றி
  பெற "வேண்டிய நேரம்" என்று நாம் கருதுகிறோம். சில சமயங்களில் நாம்
  சரியாக இருக்கிறோம்—ஆனால் தவறான காரணங்களுக்காக.

why_this_is_important: |
  சூதாட்டக்காரரின் தவறான நம்பிக்கையை அங்கீகரிப்பது சூதாட்டம் மற்றும்
  முதலீட்டில் விலையுயர்ந்த தவறுகளைத் தடுக்கிறது. இது குறுகிய ஓட்டங்களை
  அதிகமாக விளக்குவதையும் மற்றும் தவறான மீள்வீழ்ச்சியை எதிர்பார்ப்பதையும்
  தவிர்க்க உதவுகிறது. இது உண்மையான சராசரிக்கு மீள்வீழ்ச்சியை தவறான
  நம்பிக்கையிலிருந்து வேறுபடுத்துகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - முதலீடு
  - இடர்_மதிப்பீடு
  - சிக்கல்_தீர்த்தல்

how_can_you_spot_it:
  due_for_a_change: |
    "நாம் பல இழப்புகளை சந்தித்தோம்—நாம் வெற்றி பெற வேண்டிய நேரம்."
  pattern_in_randomness: |
    சீரற்ற வரிசைகளில் அர்த்தமுள்ள வடிவங்களைக் காணுதல்.
  hot_hand_fallacy: |
    ஒரு தொடர் தொடரும் என்று நம்புதல் (தொடர்புடையது ஆனால் எதிர் பிழை).
  independence_ignorance: |
    சுயாதீனமான நிகழ்வுகளை அவை இணைக்கப்பட்டவை போல நடத்துதல்.

examples:
  gambling: |
    ரவுலட்டில் பல சிவப்பு எண்கள் விழுந்த பிறகு, கருப்பு மீது பந்தயம்
    கட்டுதல், ஏனெனில் "சிவப்பு தொடர்ந்து வர முடியாது."
  investing: |
    "சந்தை வீழ்ச்சியடைந்துள்ளது—அது உயர வேண்டும்."
  hiring: |
    "நாம் பல மோசமான வேட்பாளர்களை வேலைக்கு எடுத்தோம்—அடுத்தவர்
    நிச்சயமாக நன்றாக இருப்பார்."
  sports: |
    "அவர் பல ஷாட்க்களைத் தவறவிட்டார்—அவர் அடுத்த ஷாட்டை அடிக்க
    வேண்டிய நேரம்."

real_world_implications: |
  சூதாட்டக்காரரின் தவறான நம்பிக்கை சூதாட்ட இழப்புகளையும் மோசமான
  முதலீட்டு முடிவுகளையும் ஏற்படுத்துகிறது. குறுகிய கால வடிவங்களை நாம்
  அதிகமாக விளக்குவதையும் இது விளக்குகிறது. உண்மையான சராசரிக்கு
  மீள்வீழ்ச்சியிலிருந்து (ஒரு உண்மையான சராசரி மீள்வதற்கு இருக்கும்போது)
  இதை வேறுபடுத்துவது முக்கியம்.

professional_application:
  networking_and_relationship_building: |
    கடந்த கால உறவு இயக்கவியல் எதிர்காலத்தில் "சீரமைக்கப்படும்" என்று
    நம்ப வேண்டாம்—ஒவ்வொரு தொடர்பும் ஓரளவு சுயாதீனமானது. ஆனால் உண்மையான
    அடிப்படை காரணம் இருக்கும்போது வடிவங்களிலிருந்து கற்றுக்கொள்ளுங்கள்.
  collaborative_learning_initiative: |
    செயல்திறனை மதிப்பிடும்போது, ​​சீரற்ற மாறுபாட்டை முறையான
    மாற்றத்திலிருந்து வேறுபடுத்துங்கள். குறுகிய ஓட்டங்கள் இரைச்சலாக
    இருக்கலாம்; "தொடர்களை" அதிகமாக எதிர்வினையாற்றவோ அல்லது தவறான
    மீள்வீழ்ச்சியை எதிர்பார்க்கவோ வேண்டாம்.

how_can_this_be_misapplied:
  ignoring_regression: |
    சில சமயங்களில் சராசரிக்கு மீள்வீழ்ச்சி உண்மையானது (எ.கா., திறன்
    செயல்திறன்). அனைத்து மீள்வீழ்ச்சியையும் சூதாட்டக்காரரின் தவறான
    நம்பிக்கை என்று நிராகரிக்க வேண்டாம்.
  false_independence: |
    நிகழ்வுகள் சுயாதீனமானவை அல்லாதபோது அவற்றை சுயாதீனமானவை என்று
    கருதுதல் (எ.கா., ஒரே விஷயத்தின் மீண்டும் மீண்டும் அளவீடுகள்).
  overcorrection: |
    மீள்வதற்கு ஒரு உண்மையான சராசரி இருக்கும்போது மீள்ச்சியை ஒருபோதும்
    எதிர்பார்க்காமல் இருத்தல்.
  dismissing_patterns: |
    சில வடிவங்கள் உண்மையானவை—அனைத்து வரிசைகளும் சீரற்றவை அல்ல.

