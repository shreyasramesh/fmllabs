id: availability_heuristic
name: இருப்புக்கான ஆய்வறிக்கை (Availability Heuristic)

quick_introduction: |
  ஒரு நிகழ்வின் நிகழ்தகவை, அது எவ்வளவு எளிதாக நினைவுக்கு வருகிறது என்பதைப் பொறுத்து மதிப்பிடும் ஒரு போக்குதான் இருப்புக்கான ஆய்வறிக்கை. நாம் உடனடியாக நினைவுகூரக்கூடிய உதாரணங்கள் இருந்தால், அந்த நிகழ்வு பொதுவானது என்று கருதுகிறோம். தெளிவாக, சமீபத்திய அல்லது உணர்ச்சிகரமான உதாரணங்கள் நமது நிகழ்தகவு மதிப்பீடுகளை ஆதிக்கம் செலுத்துகின்றன.

one_liner: எளிதில் நினைவுக்கு வருவது அதிக நிகழ்தகவுடையதாகத் தோன்றும்—அது உண்மையாக இல்லாவிட்டாலும் கூட.

try_this:
  - கேளுங்கள்: அடிப்படை விகிதம் என்ன? தெளிவான அல்லது சமீபத்திய உதாரணங்களுக்கு நான் அதிக முக்கியத்துவம் கொடுக்கிறேனா?
  - உங்கள் உள்ளுணர்வு "இது பொதுவானதாகத் தோன்றுகிறது" அல்லது "இது அரிதாகத் தோன்றுகிறது" என்று சொல்லும்போது தரவுகளைத் தேடுங்கள்.
  - ஒரு வியத்தகு கதை உங்கள் இடர் மதிப்பீட்டைத் தீர்மானிக்கும்போது அதைக் கவனியுங்கள்.

ask_yourself:
  - உண்மையான அதிர்வெண்ணுக்குப் பதிலாக, நினைவுகூரலின் எளிமையால் நிகழ்தகவை நான் மதிப்பிடுகிறேனா?
  - அந்தச் செய்தியை நான் பார்த்த உடனேயே வேறுவிதமாக யோசிப்பேனா?

in_more_detail: |
  அதிர்வெண் மற்றும் நிகழ்தகவை மதிப்பிடுவதற்கு நாம் மனதின் குறுக்குவழிகளைப் பயன்படுத்துகிறோம். ஒரு குறுக்குவழிதான் இருப்பு: எளிதில் நினைவுக்கு வருவது எது? விமான விபத்துக்கள் தெளிவாகவும், பரவலாகவும் அறிவிக்கப்படுகின்றன—அவற்றின் நிகழ்தகவை நாம் அதிகமாக மதிப்பிடுகிறோம். கார் விபத்துக்கள் பொதுவானவை ஆனால் குறைந்த கவனத்தை ஈர்க்கின்றன—நாம் அவற்றை குறைவாக மதிப்பிடுகிறோம். சமீபத்திய தன்மை, தெளிவு மற்றும் உணர்ச்சி தாக்கம் அனைத்தும் இருப்பை அதிகரிக்கின்றன.

  இருப்பு உண்மையான அதிர்வெண்ணுடன் தொடர்பு கொள்ளும்போது இந்த ஆய்வறிக்கை பயனுள்ளதாக இருக்கும். ஆனால் ஊடகங்கள், தனிப்பட்ட அனுபவம் மற்றும் கவன ஈர்ப்பு ஆகியவை தொடர்பை பெரும்பாலும் சிதைக்கின்றன. நாம் அரிதான ஆனால் தெளிவான இடர்களைப் பயப்படுகிறோம் மற்றும் பொதுவான ஆனால் சாதாரணமானவற்றை புறக்கணிக்கிறோம்.

why_this_is_important: |
  இருப்புக்கான ஆய்வறிக்கையை அங்கீகரிப்பது நிகழ்தகவு மதிப்பீடுகளைச் சரிசெய்யவும், தெளிவான செய்திகளுக்கு அதிகமாகப் பதிலளிப்பதைத் தவிர்க்கவும், சிறந்த இடர் மதிப்பீடுகளைச் செய்யவும் உதவுகிறது. இது தீர்ப்புகளில் பல முறையான பிழைகளை விளக்குகிறது.

when_to_use:
  - முடிவு_எடுத்தல்
  - இடர்_மதிப்பீடு
  - முதலீடு
  - சிக்கல்_தீர்த்தல்

how_can_you_spot_it:
  vividness_dominance: |
    வியத்தகு அல்லது உணர்ச்சிபூர்வமான உதாரணங்கள் மதிப்பீடுகளை விகிதாசாரமாக பாதிக்கின்றன.
  recency_effect: |
    சமீபத்திய நிகழ்வுகள் மீண்டும் நிகழும் வாய்ப்புகள் அதிகம் என்று தோன்றுகிறது.
  personal_experience_overweighting: |
    "எனக்கு ஒருவரைத் தெரியும்..." என்பது நிகழ்தகவு மதிப்பீடுகளை வடிவமைக்கிறது.
  media_distortion: |
    அறிவிக்கப்படுவது பெரும்பாலும் அதிர்வெண்ணுடன் பொருந்தாது.

examples:
  risk_perception: |
    பயங்கரவாத இடரை அதிகமாக மதிப்பிடுதல் (தெளிவான, அறிவிக்கப்பட்டது) மற்றும் இதய நோய் இடரைக் குறைவாக மதிப்பிடுதல் (பொதுவான, குறைந்த வியத்தகு).
  investing: |
    சமீபத்திய சந்தை நிகழ்வுகள் (வீழ்ச்சி, ஏற்றம்) எதிர்காலத்திற்கான எதிர்பார்ப்புகளை ஆதிக்கம் செலுத்துகின்றன.
  hiring: |
    ஒரு குறிப்பிட்ட பள்ளியில் இருந்து மோசமான வேலைவாய்ப்பு குறித்த ஒரு தெளிவான கதை, அந்தப் பள்ளியில் இருந்து வரும் அனைத்து வேட்பாளர்களின் மதிப்பீட்டையும் பாதிக்கிறது.
  health: |
    நண்பரின் புற்றுநோய் கண்டறிதல், புற்றுநோய் அடிப்படை விகிதங்கள் பரிந்துரைப்பதை விட அதிக நிகழ்தகவுடையதாகத் தோன்றச் செய்கிறது.

real_world_implications: |
  காப்பீடு வாங்குதல், கொள்கை முன்னுரிமைகள் மற்றும் தனிப்பட்ட முடிவுகளை இருப்புக்கான ஆய்வறிக்கை பாதிக்கிறது. இது ஊடகங்கள் மற்றும் சந்தைப்படுத்துபவர்களால் சுரண்டப்படுகிறது. இதற்காகச் சரிசெய்வதற்கு அடிப்படை விகிதங்களைத் தேடுவதும், "நினைவுக்கு வருவது என்ன" என்று கேள்வி கேட்பதும் தேவை.

professional_application:
  networking_and_relationship_building: |
    ஒரு நபர் அல்லது குழுவுடன் ஒரு தெளிவான எதிர்மறையான அனுபவம் உங்கள் தீர்ப்பை சிதைக்கக்கூடும் என்பதை அறிந்திருங்கள். அடிப்படை விகிதங்களையும் பல தரவுப் புள்ளிகளையும் தேடுங்கள்.
  collaborative_learning_initiative: |
    இடர்கள் அல்லது வாய்ப்புகளை மதிப்பிடும்போது, "அடிப்படை விகிதம் என்ன?" மற்றும் "நான் தெளிவான உதாரணங்களுக்கு அதிக முக்கியத்துவம் கொடுக்கிறேனா?" என்று வெளிப்படையாகக் கேளுங்கள். இருப்பு-சார்ந்த மதிப்பீடுகளைச் சரிசெய்ய தரவுகளைப் பயன்படுத்துங்கள்.

how_can_this_be_misapplied:
  dismissing_intuition: |
    சில சமயங்களில் இருப்பு தகவல் தரும்—சமீபத்திய அனுபவம் மாற்றத்தைக் குறிக்கலாம். இருப்பு-சார்ந்த அனைத்து தீர்ப்புகளும் தவறானவை என்று கருத வேண்டாம்.
  analysis_paralysis: |
    சரியான எச்சரிக்கை அறிகுறிகளை தெளிவான அனுபவத்திலிருந்து புறக்கணிக்கும் அளவுக்கு அதிகமாகச் சரிசெய்வது.
  false_objectivity: |
    அடிப்படை விகிதங்கள் எப்போதும் சரியாக இருக்கும் என்று கருதுவது, அவை காலாவதியானவையாக அல்லது பொருந்தாதவையாக இருக்கலாம்.
  manipulation: |
    மற்றவர்களின் தீர்ப்புகளை வழிநடத்த குறிப்பிட்ட உதாரணங்களை வேண்டுமென்றே தெளிவாக உருவாக்குவது.

