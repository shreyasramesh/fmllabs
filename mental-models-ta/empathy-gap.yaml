id: empathy_gap
name: இரக்க இடைவெளி

quick_introduction: |
  நாம் ஒரு வித்தியாசமான மனநிலையில் இருக்கும்போது, மற்றவர்களின் மனநிலையை
  புரிந்துகொள்வதிலும் கணிப்பதிலும் உள்ள சிரமம் இரக்க இடைவெளி ஆகும்.
  நாம் அமைதியாக இருக்கும்போது, கோபமாக அல்லது பசியாக இருக்கும்போது நாம் எப்படி
  உணர்வோம் என்பதை குறைத்து மதிப்பிடுகிறோம். நாம் வயிறார சாப்பிட்டிருக்கும்போது,
  பசியாக இருக்கும்போது நமக்கு எவ்வளவு உணவு தேவைப்படும் என்பதை குறைத்து மதிப்பிடுகிறோம்.

one_liner: நாம் வித்தியாசமான மனநிலைகளில் எப்படி உணர்வோம்—மற்றும் மற்றவர்கள் எப்படி உணர்வார்கள்—என்பதை நாம் குறைத்து மதிப்பிடுகிறோம்.

try_this:
  - அமைதியாக இருக்கும்போது, நீங்கள் மன அழுத்தத்தில் இருக்கும்போது உங்களுக்காக வாக்குறுதிகளை மேற்கொள்ளுங்கள்; முன்கூட்டியே வாக்குறுதி கொடுங்கள்.
  - நீங்கள் இல்லாத ஒரு நிலையில் உள்ள மற்றவர்களைத் தீர்ப்பளிக்காதீர்கள்—பசியாக, களைப்பாக, பயமாக.
  - கேளுங்கள்: நான் எனது தற்போதைய நிலையை எனது எதிர்கால சுயத்திற்கோ அல்லது மற்றவர்களுக்கோ திணிக்கிறேனா?

ask_yourself:
  - நான் ஒரு வித்தியாசமான நிலையில் எப்படி உணர்வேன் என்பதை குறைத்து மதிப்பிடுகிறேனா?
  - நான் அவர்களின் நிலையில் இருந்திருந்தால் இந்த நபரை நான் நன்றாகப் புரிந்துகொள்வேனா?

in_more_detail: |
  வெவ்வேறு சூழ்நிலைகளில் நாம் எப்படி உணர்வோம்—மற்றும் நாம் தற்போது இல்லாத நிலைகளில் மற்றவர்கள் எப்படி உணர்கிறார்கள் என்பதை கற்பனை செய்வதில் எங்களுக்கு சிரமம் உள்ளது. ஒரு மது அருந்தாதவர் அடிமைத்தனத்தின் கவர்ச்சியை குறைத்து மதிப்பிடுகிறார். நன்கு ஓய்வெடுத்தவர் தூக்கமின்மையின் தாக்கத்தை குறைத்து மதிப்பிடுகிறார். நமது தற்போதைய நிலையை மற்றவர்களுக்கும் நமது எதிர்கால சுயத்திற்கும் திணிக்கிறோம்.

  இரக்க இடைவெளி நமது எதிர்கால சுயத்திற்காக நாம் எடுக்கும் முடிவுகளை (எ.கா., நாம் ஊக்கத்துடன் இருக்கும்போது உடற்பயிற்சிக்கு உறுதியளித்தல்), நாம் மற்றவர்களுக்காக எடுக்கும் முடிவுகளை, மற்றும் வெவ்வேறு நிலைகளில் உள்ளவர்களைப் புரிந்துகொள்ளும் நமது திறனைப் பாதிக்கிறது.

why_this_is_important: |
  இரக்க இடைவெளியை அங்கீகரிப்பது எதிர்கால உங்களுக்கான முடிவெடுக்கும் திறனை, மற்றவர்களுக்கான இரக்கத்தை, மற்றும் நமது சொந்த மாறுபாட்டைப் பற்றிய புரிதலை மேம்படுத்துகிறது. நாம் ஏன் நிறைவேற்ற முடியாத வாக்குறுதிகளை அளிக்கிறோம் என்பதையும், துயரத்தில் உள்ள மற்றவர்களை நாம் ஏன் தவறாகப் புரிந்துகொள்கிறோம் என்பதையும் இது விளக்குகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - உறவு_கட்டுதல்
  - தலைமைத்துவம்
  - மோதல்_தீர்வு

how_can_you_spot_it:
  current_state_projection: |
    மற்றவர்கள் இப்போது நாம் எப்படி உணர்கிறோமோ அப்படி உணர்வார்கள், அல்லது எதிர்காலத்தில் நாம் இப்போது எப்படி உணர்கிறோமோ அப்படி உணர்வார்கள் என்று கருதுவது.
  underestimating_emotional_state: |
    அவர்கள் இருக்கும் நிலையில் நாம் இல்லாதபோது, "என்ன பெரிய விஷயம்?"
  commitment_failures: |
    தற்போதைய உந்துதலின் அடிப்படையில் நாம் பின்பற்ற முடியாத தேர்வுகளைச் செய்தல், உந்துதல் குறையும்போது.
  misunderstanding_others: |
    நமது தற்போதைய நிலையிலிருந்து கற்பனை செய்ய முடியாததால் மற்றவர்களின் அனுபவங்களை நிராகரிப்பது.

examples:
  hunger: |
    வயிறார சாப்பிட்டிருக்கும்போது மளிகை சாமான்கள் வாங்குவது—பசியாக இருக்கும்போது நமக்குத் தேவையானதை விட குறைவாக வாங்குகிறோம்.
  addiction: |
    போதைக்கு அடிமையாகாதவர்கள் நிறுத்துவதில் உள்ள சிரமத்தை குறைத்து மதிப்பிடுகிறார்கள்; மீண்டு வருபவர்கள் அவர்கள் பயன்படுத்தும்போது அதன் கவர்ச்சியை குறைத்து மதிப்பிடலாம்.
  conflict: |
    அமைதியாக இருக்கும்போது, மோதலின் போது நாம் எப்படி எதிர்வினையாற்றுவோம் என்பதை நாம் குறைத்து மதிப்பிடுகிறோம்.
  motivation: |
    நாம் ஊக்கத்துடன் இருக்கும்போது காலை 6 மணி வகுப்பிற்கு பதிவு செய்வது—மற்றும் நாம் தூக்கக் கலக்கத்தில் இருக்கும்போது செல்லாமல் இருப்பது.

real_world_implications: |
  இரக்க இடைவெளி போதைப்பொருள் சிகிச்சை, கொள்கை, மற்றும் தனிப்பட்ட புரிதல் ஆகியவற்றைப் பாதிக்கிறது. நாம் உடைக்கும் வாக்குறுதிகளை இது விளக்குகிறது மற்றும் மற்றவர்களின் கண்ணோட்டங்களைப் புரிந்துகொள்வதில் நாம் அடிக்கடி ஏன் தோல்வியடைகிறோம் என்பதையும் விளக்குகிறது. இது இரக்கம் மற்றும் நல்ல முடிவெடுப்பதற்கு ஒரு தடையாகும்.

professional_application:
  networking_and_relationship_building: |
    ஒருவர் மன அழுத்தத்தில், கோபமாக, அல்லது வேறு நிலையில் இருக்கும்போது, அவர்கள் நீங்கள் சிந்திப்பதைப் போலவே சிந்திப்பார்கள் என்று கருதாதீர்கள். அவர்களின் நிலையை கற்பனை செய்ய முயற்சிக்கவும். வாக்குறுதிகளைச் செய்யும்போது, உந்துதல் குறையும்போது நீங்கள் எப்படி உணர்வீர்கள் என்பதைக் கவனியுங்கள்.
  collaborative_learning_initiative: |
    திட்டமிடும்போது, குழுவினர் சோர்வாக, அழுத்தத்தில், அல்லது விரக்தியாக இருக்கும்போது எப்படி உணர்வார்கள் என்பதைக் கவனியுங்கள். ஊக்கமளிக்கும் திட்டமிடும் நிலைக்கு மட்டுமல்லாமல், அந்த நிலைகளுக்காக வடிவமைக்கவும்.

how_can_this_be_misapplied:
  overattribution: |
    சில சமயங்களில் மக்கள் உண்மையாகவே வெவ்வேறு மதிப்புகளைக் கொண்டிருக்கும்போது, எல்லா தவறான புரிதல்களையும் "இரக்க இடைவெளி" என்று நிராகரிப்பது.
  excusing_behavior: |
    மக்கள் தங்கள் நிலைகளை நிர்வகிப்பதற்குப் பொறுப்பாக இருக்கும்போது, "அவர்களால் உதவ முடியவில்லை—இரக்க இடைவெளி".
  false_relativism: |
    முயற்சி மற்றும் அனுபவத்துடன் நாம் மேம்பட முடியும் என்பதை உணராமல், நாம் ஒருபோதும் மற்றவர்களைப் புரிந்துகொள்ள முடியாது என்று கருதுவது.
  self_excuse: |
    நமது சொந்த நிறைவேற்ற முடியாத செயல்களுக்கு நியாயப்படுத்த இரக்க இடைவெளியைப் பயன்படுத்துவது.

