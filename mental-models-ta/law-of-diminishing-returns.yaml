id: law_of_diminishing_returns
name: குறைந்து வரும் வருவாயின் விதி

quick_introduction: |
  குறைந்து வரும் வருவாயின் விதி கூறுவதாவது, மற்றவை நிலையாக இருக்கும்போது, ​​ஒரு உள்ளீட்டின் அளவை நீங்கள் அதிகரிக்கும்போது, ​​ஒவ்வொரு புதிய உள்ளீட்டு அலகிலிருந்தும் கிடைக்கும் கூடுதல் உற்பத்தி இறுதியில் குறையும். அதிகமாக இருப்பது எப்போதும் சிறந்தது அல்ல - கூடுதல் முயற்சி குறைவாகவும் குறைவாகவும் பலனளிக்கும் ஒரு புள்ளி உள்ளது.

one_liner: அதிக உள்ளீடு இறுதியில் குறைந்த வெளியீட்டைத் தரும் - உகந்த புள்ளி உள்ளது.

try_this:
  - Ask: கூடுதல் முயற்சி அர்த்தமுள்ள வருவாயைத் தரும் புள்ளியை நான் கடந்துவிட்டேனா?
  - Prioritize the highest-leverage inputs; stop when marginal returns drop. (மிகவும் பயனுள்ள உள்ளீடுகளுக்கு முன்னுரிமை கொடுங்கள்; விளிம்பு வருவாய் குறையும்போது நிறுத்துங்கள்.)
  - Notice when you're over-investing in something that's already paid off. (ஏற்கனவே பலன் அளித்த ஒன்றில் நீங்கள் அதிகமாக முதலீடு செய்வதைக் கவனியுங்கள்.)

ask_yourself:
  - What would I gain from one more unit of effort here? (இங்கு ஒரு அலகு கூடுதல் முயற்சியால் நான் என்ன பெறுவேன்?)
  - Am I optimizing past the point of diminishing returns? (குறைந்து வரும் வருவாயின் புள்ளியைக் கடந்து நான் மேம்படுத்துகிறேனா?)

in_more_detail: |
  பொருளாதாரத்தில், ஒரு நிலையான நிலத்தில் அதிக தொழிலாளர்களைச் சேர்ப்பது இறுதியில் சிறிய அதிகரித்த ஆதாயங்களை ஏற்படுத்தும். தனிப்பட்ட உற்பத்தித்திறனில், ஆய்வின் முதல் மணிநேரம் பத்தாவது மணிநேரத்தை விட அதிக மதிப்பைக் கூட்டக்கூடும். இந்த கோட்பாடு வளங்கள், முயற்சி, நேரம் மற்றும் அம்சங்கள் ஆகியவற்றிற்குப் பொருந்தும். ஒரு உகந்த புள்ளி உள்ளது; அதற்கு அப்பால், விளிம்பு வருவாய் குறையும் மற்றும் எதிர்மறையாகவும் மாறக்கூடும்.

  குறைந்து வரும் வருவாயை அங்கீகரிப்பது, வளங்களை திறம்பட ஒதுக்கீடு செய்யவும், ஏற்கனவே அதன் மதிப்பின் பெரும்பகுதியை வழங்கிய பகுதிகளில் அதிகமாக முதலீடு செய்வதைத் தவிர்க்கவும் உதவுகிறது.

why_this_is_important: |
  குறைந்து வரும் வருவாயைப் புரிந்துகொள்வது அதிக முதலீட்டைத் தடுக்கிறது, முன்னுரிமைக்கு வழிகாட்டுகிறது, எப்போது நிறுத்த வேண்டும் என்பதை அறிய உதவுகிறது. இது வள ஒதுக்கீடு மற்றும் பரிபூரணத்தைத் தவிர்ப்பதற்கு அவசியம்.

when_to_use:
  - முடிவு-எடுத்தல் (decision_making)
  - சிக்கல்-தீர்வு (problem_solving)
  - முதலீடு (investing)
  - தொழில்-நகர்வுகள் (career_moves)

how_can_you_spot_it:
  incremental_gains_decreasing: |
    முயற்சி அல்லது வளத்தின் ஒவ்வொரு கூடுதல் அலகும் முந்தையதை விட குறைவான வெளியீட்டை உருவாக்குகிறது.
  perfectionism_trap: |
    தரத்தின் கடைசி 10% ஐப் பெற முயற்சிப்பது விகிதாசாரமற்ற முயற்சியை எடுக்கும்.
  overinvestment: |
    விளிம்பு வருவாய் குறைவாக அல்லது எதிர்மறையாக இருக்கும்போது வளங்களைச் சேர்ப்பதைத் தொடர்வது.
  optimal_point_passed: |
    நீங்கள் அதிக உள்ளீடு விளைவுகளை மேம்படுத்தும் புள்ளியைக் கடந்துவிட்டீர்கள்.

examples:
  studying: |
    தேர்வு தயாரிப்பின் முதல் 2 மணிநேரம் 7-8 மணிநேரத்தை விட அதிக பலனைத் தருகிறது; குறைந்து வரும் வருவாயின் ஒரு புள்ளி உள்ளது.
  product_features: |
    ஒரு பயன்பாட்டில் அதிக அம்சங்களைச் சேர்ப்பது பயனர்களைக் குழப்பக்கூடும்; 20வது அம்சம் 5வது அம்சத்தை விட குறைவான மதிப்பை சேர்க்கிறது.
  hiring: |
    ஒரு திட்டத்தில் அதிக நபர்களைச் சேர்ப்பது ஒரு கட்டத்திற்குப் பிறகு அதை மெதுவாக்கும் (Brooks's Law).
  marketing: |
    விளம்பரச் செலவை இரட்டிப்பாக்குவது முடிவுகளை இரட்டிப்பாக்காது; சந்தையை நிறைவு செய்யும் போது வருவாய் குறைகிறது.

real_world_implications: |
  குறைந்து வரும் வருவாயின் விதி பொருளாதாரக் கொள்கை, வணிக உத்தி மற்றும் தனிப்பட்ட உற்பத்தித்திறனுக்கு வழிகாட்டுகிறது. அதை புறக்கணிப்பது வீணான வளங்கள் மற்றும் உகந்ததல்லாத விளைவுகளுக்கு வழிவகுக்கும். இது Pareto கோட்பாட்டையும் கவனத்தையும் ஆதரிக்கிறது.

professional_application:
  networking_and_relationship_building: |
    ஒரு சில ஆழமான உறவுகளில் முதலீடு செய்வது பலவற்றில் பரவலாக முயற்சியைப் பரப்புவதை விட அதிக பலனைத் தரக்கூடும். கூடுதல் நெட்வொர்க்கிங் குறைந்து வரும் வருவாயைக் கொண்டிருக்கும்போது அங்கீகரிக்கவும்.
  collaborative_learning_initiative: |
    அதிக பயிற்சி மணிநேரங்கள் எப்போதும் சிறந்த விளைவுகளை அர்த்தப்படுத்துவதில்லை. உகந்த அளவைக் கண்டறிந்து அதிக சுமையைத் தவிர்க்கவும்.

how_can_this_be_misapplied:
  premature_optimization: |
    ஒரு நியாயமான தர நிலையை அடைவதற்கு முன் மிக விரைவில் நிறுத்துவது.
  undershooting: |
    போதுமான முயற்சிக்கு ஒரு சாக்காக குறைந்து வரும் வருவாயைப் பயன்படுத்துவது.
  misidentifying_the_curve: |
    நீங்கள் உண்மையில் வளைவின் வேறு ஒரு பகுதியில் (எ.கா., ஆரம்ப கால வளர்ச்சி நிலை) இருக்கும்போது குறைந்து வரும் வருவாயை கருதுவது.
  one_size_fits_all: |
    வளைவுகள் வேறுபடும் வெவ்வேறு சூழல்களில் ஒரே "உகந்த புள்ளி" ஐப் பயன்படுத்துவது.

