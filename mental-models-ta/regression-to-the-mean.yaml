# சராசரிக்கு திரும்புதல்
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரண பதிவு

id: regression_to_the_mean
name: சராசரிக்கு திரும்புதல்

quick_introduction: |
  சராசரிக்கு திரும்புதல் என்பது ஒரு புள்ளியியல் நிகழ்வு ஆகும், இதில் உச்சகட்ட விளைவுகள் சராசரிக்கு நெருக்கமான விளைவுகளால் பின்பற்றப்படுகின்றன. அசாதாரணமாக நல்ல அல்லது கெட்ட முடிவு ஏற்பட்ட பிறகு, அடுத்த முடிவு குறைவான உச்சகட்டமாக இருக்கும் - இது எந்தவொரு காரண காரிய தலையீட்டாலும் அல்ல, சீரற்ற மாறுபாடு காரணமாகும்.

one_liner: உச்சகட்ட விளைவுகள் சராசரிக்கு நெருக்கமான விளைவுகளால் பின்பற்றப்படுகின்றன.

try_this:
  - திரும்புகையை உங்கள் தலையீட்டிற்கு காரணமாக கூறாதீர்கள் - இது பெரும்பாலும் எப்படியும் நடந்திருக்கும்.
  - ஒரு உச்சகட்ட முடிவுக்குப் பிறகு, அடுத்தது குறைவான உச்சகட்டமாக இருக்கும் என்று எதிர்பார்க்கவும்.
  - கேளுங்கள்: இந்த மாற்றம் நான் செய்ததால் ஏற்பட்டதா, அல்லது சராசரிக்கு திரும்புவதால் ஏற்பட்டதா?

ask_yourself:
  - நான் சீரற்ற மாறுபாடாக இருக்கலாம் என்பதை எனது தலையீட்டிற்கு காரணமாகக் கூறுகிறேனா அல்லது குறை கூறுகிறேனா?
  - எனது நடவடிக்கை இல்லாமல் இது நடந்திருக்குமா?

in_more_detail: |
  ஒரு மாணவர் ஒரு தேர்வில் அசாதாரணமாக அதிக மதிப்பெண் பெற்றால், அடுத்த தேர்வில் அவர்களின் சராசரிக்கு நெருக்கமாக மதிப்பெண் பெறுவார் - அவர்கள் "சோம்பேறித்தனமாகிவிட்டார்கள்" என்பதனால் அல்ல, முதல் மதிப்பெண் பகுதி அதிர்ஷ்டம் என்பதால். விளையாட்டு செயல்திறன், பங்கு வருவாய் மற்றும் வணிக அளவீடுகளுக்கும் இது பொருந்தும். நாம் பெரும்பாலும் "திரும்புகையை" நாம் செய்த ஒன்றுக்கு (எ.கா., தண்டனை அல்லது வெகுமதி) காரணமாகக் கூறுகிறோம், அது எப்படியும் நடந்திருக்கும் போது.

  டேனியல் கஹ்னெமேன், விமானப் பயிற்றுனர்கள் பாராட்டல் செயல்திறனை மோசமாக்கியது என்றும் விமர்சனம் மேம்படுத்தியது என்றும் தவறுதலாக முடிவுக்கு வந்ததை விவரிக்கிறார் - அவர்கள் உச்சகட்ட செயல்திறன்களுக்குப் பிறகு சராசரிக்கு திரும்புதலைக் கவனித்துக் கொண்டிருந்தனர்.

why_this_is_important: |
  சராசரிக்கு திரும்புதலைப் புரிந்துகொள்வது காரண காரியத்தை தவறாகக் கூறுவதைத் தடுக்கிறது. இது வெளிப்புறங்களை மிகையாக மதிப்பிடுவதையும், இரைச்சலின் அடிப்படையில் மாற்றங்களைச் செய்வதையும் தவிர்க்க உதவுகிறது. தலையீடுகள் மற்றும் செயல்திறனை மதிப்பிடுவதற்கு இது அவசியம்.

when_to_use:
  - முடிவெடுத்தல்
  - முதலீடு
  - இடர் மதிப்பீடு
  - தலைமைத்துவம்

how_can_you_spot_it:
  extreme_followed_by_average: |
    அசாதாரணமாக நல்ல அல்லது கெட்ட விளைவு சராசரிக்கு நெருக்கமான ஒன்றால் பின்பற்றப்படுகிறது.
  spurious_causation: |
    தலையீட்டிற்கு "மீட்பு" அல்லது "சரிவு" காரணமாகக் கூறுவது, சராசரிக்கு திரும்புதல் எப்படியும் நடந்திருக்கும் போது.
  overreaction_to_outliers: |
    ஒரே ஒரு உச்சகட்ட தரவுப் புள்ளியின் அடிப்படையில் கொள்கை அல்லது தனிப்பட்ட மாற்றங்களைச் செய்தல்.
  reward_punishment_confusion: |
    தண்டனை "வேலை செய்தது" என்று நம்புவது, முன்னேற்றம் சராசரிக்கு திரும்புதலாக இருக்கும் போது.

examples:
  sports: |
    ஒரு வீரர் தனது வாழ்க்கையில் ஒரு சிறந்த ஆட்டத்தை விளையாடுகிறார், பின்னர் சராசரிக்கு திரும்புகிறார் - ரசிகர்கள் "திருப்தியை" குற்றம் சாட்டலாம்.
  investing: |
    ஒரு பங்கு ஒரு சிறந்த ஆண்டைக் கொண்டுள்ளது, பின்னர் திரும்புகிறது - முதலீட்டாளர்கள் மோசமான நிர்வாகத்திற்கு சரிவை காரணமாகக் கூறலாம், அது பகுதியளவு மீள்தல் இருக்கும் போது.
  performance_reviews: |
    ஒரு ஊழியர் ஒரு கெட்ட காலாண்டைக் கொண்டுள்ளார், கருத்துக்களைப் பெறுகிறார், மேம்படுகிறார் - கருத்துக்கள் பாராட்டப்படலாம், சராசரிக்கு திரும்புதல் எப்படியும் நடந்திருக்கும் போது.
  medicine: |
    ஒரு நோயாளி மோசமாக உணர்கிறார், சிகிச்சை எடுக்கிறார், மேம்படுகிறார் - சிகிச்சை பாராட்டப்படலாம், சில முன்னேற்றம் இயற்கையானதாக இருந்தபோது.

real_world_implications: |
  சராசரிக்கு திரும்புதல் ஆசிரியர்கள், மருத்துவர்கள், நிதி மேலாளர்கள் மற்றும் நம்மை நாமே எவ்வாறு மதிப்பிடுகிறோம் என்பதை பாதிக்கிறது. "ஏறியது எல்லாம் இறங்கும்" என்பது ஏன் பெரும்பாலும் புள்ளிவிவர ரீதியாகப் பொருந்தும் என்பதை இது விளக்குகிறது. இதை தவறாகப் புரிந்துகொள்வது வீணான தலையீடுகளுக்கும், தீர்வுகளில் தவறான நம்பிக்கைகளுக்கும் வழிவகுக்கிறது.

professional_application:
  networking_and_relationship_building: |
    ஒரு மோசமான தொடர்பை மிகையாக விளக்காதீர்கள் - அது உறவின் சராசரிக்கு திரும்புவதற்கான ஒரு வெளிப்புறமாக இருக்கலாம்.
  collaborative_learning_initiative: |
    தலையீடுகளை (பயிற்சி, செயல்முறை மாற்றங்கள்) மதிப்பிடும் போது, தாக்கத்தை சராசரிக்கு திரும்புதலிலிருந்து வேறுபடுத்த, கட்டுப்பாட்டு குழுக்கள் மற்றும் பல தரவுப் புள்ளிகளைப் பயன்படுத்தவும்.

how_can_this_be_misapplied:
  dismissing_all_interventions: |
    ஒரு தலையீட்டிற்குப் பிறகு எந்தவொரு முன்னேற்றமும் "சராசரிக்கு திரும்புதல்" என்று கருதுவது, உண்மையான விளைவுகள் இருக்கும் போது.
  underreacting: |
    "அது சராசரிக்கு திரும்பும்" என்பதால் உண்மையான பிரச்சினைகளைப் புறக்கணிப்பது.
  statistical_illiteracy: |
    சராசரிக்கு திரும்புதலை விளைவுகளை "சரிசெய்யும்" ஒரு சக்தியுடன் குழப்புதல் - இது நிகழ்தகவு மட்டுமே.
  overconfidence: |
    அடிப்படை செயல்முறை மாறியிருக்கக்கூடும் போது, சராசரி நிலையானது என்று கருதுவது.

