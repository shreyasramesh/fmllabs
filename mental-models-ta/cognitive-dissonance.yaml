# அறிவாற்றல் முரண்பாடு
# மன மாதிரி / அறிவாற்றல் சார்பு - எடுத்துக்காட்டு பதிவு

id: cognitive_dissonance
name: அறிவாற்றல் முரண்பாடு

quick_introduction: |
  அறிவாற்றல் முரண்பாடு என்பது நாம் முரண்பாடான நம்பிக்கைகளைக் கொண்டிருக்கும்போது, ​​அல்லது நமது செயல்கள் நமது நம்பிக்கைகளுக்கு முரணாக இருக்கும்போது நாம் உணரும் மன அசௌகரியம் ஆகும். இந்த அசௌகரியத்தைக் குறைக்க நாம் தூண்டப்படுகிறோம்—பெரும்பாலும் நமது செயல்களை மாற்றுவதை விட, நமது செயல்களுக்குப் பொருந்த நமது நம்பிக்கைகளை மாற்றுவதன் மூலம்.

one_liner: நாம் நமது செயல்களை விட நமது நம்பிக்கைகளை மாற்றிக்கொள்ளும் வாய்ப்பு அதிகம்.

try_this:
  - நடத்தை மாற்றாமல் அசௌகரியத்தைக் குறைக்க நீங்கள் நியாயப்படுத்துவதைக் கவனியுங்கள்.
  - கேளுங்கள்: நான் என்ன செய்தேன் என்பதை நியாயப்படுத்த எனது நம்பிக்கைகளைச் சரிசெய்கிறேனா?
  - நம்பிக்கையை மாற்றுவதை விட செயலை மாற்றுவது மிகவும் நேர்மையாக இருக்குமா என்று கருதுங்கள்.

ask_yourself:
  - நான் நியாயப்படுத்துவதன் மூலம் முரண்பாட்டை குறைக்கிறேனா, அல்லது உண்மையில் மாற்றுவதன் மூலம் குறைக்கிறேனா?
  - நான் ஏற்கனவே இப்படி செயல்படவில்லை என்றால் இந்த நம்பிக்கையை வைத்திருப்பேனா?

in_more_detail: |
  லியோன் ஃபெஸ்டிங்கரின் கோட்பாடு நாம் நிலைத்தன்மையை நாடுகிறோம் என்பதை விளக்குகிறது. நமது மதிப்புகளுக்கு எதிராக நாம் செயல்படும்போது (எ.கா., பொய் சொல்வது, பணத்தை வீணடிப்பது), நாம் முரண்பாட்டை அனுபவிக்கிறோம். அதைக் குறைக்க, நமது நம்பிக்கையை மாற்றலாம் ("அது உண்மையில் பொய்யாக இல்லை") அல்லது செயலைக் குறைக்கலாம் ("அது அவ்வளவு மோசமாக இல்லை"). நாம் சீர்திருத்தத்தை விட பெரும்பாலும் நியாயப்படுத்துகிறோம்.

  அறிவாற்றல் முரண்பாடு பென் ஃபிராங்க்ளின் விளைவை (நாம் உதவியவர்களுக்குப் பிடிக்கும்) இயக்குகிறது, கடந்தகால முடிவுகளை நாம் ஏன் நியாயப்படுத்துகிறோம் என்பதை விளக்குகிறது, மேலும் பல சுய-ஏமாற்றங்களுக்கு அடிப்படையாக அமைகிறது. இது நம்பிக்கை உருவாக்கம் மற்றும் மாற்றத்தில் ஒரு சக்திவாய்ந்த சக்தியாகும்.

why_this_is_important: |
  அறிவாற்றல் முரண்பாட்டைப் புரிந்துகொள்வது உங்கள் சொந்த நியாயப்படுத்துதல்களை அங்கீகரிக்கவும், மக்கள் ஏன் தங்கள் மனதை மாற்ற எதிர்க்கிறார்கள் என்பதைப் புரிந்துகொள்ளவும் உதவுகிறது. ஈடுபாடு மற்றும் நிலைத்தன்மை சக்திவாய்ந்த தூண்டுதல் கொள்கைகள் ஏன் என்பதையும் இது விளக்குகிறது.

when_to_use:
  - முடிவெடுத்தல்
  - உறவை உருவாக்குதல்
  - தலைமைத்துவம்
  - முரண்பாடு தீர்த்தல்

how_can_you_spot_it:
  post_decision_rationalization: |
    ஒரு தேர்வுக்குப் பிறகு, நமது தேர்வின் நேர்மறைகளையும் நிராகரிக்கப்பட்ட விருப்பங்களின் எதிர்மறைகளையும் நாம் வலியுறுத்துகிறோம்.
  belief_action_alignment: |
    நாம் ஏற்கனவே எடுத்த செயல்களுக்குப் பொருந்த நம்பிக்கைகளைச் சரிசெய்கிறோம்.
  discomfort_with_inconsistency: |
    நமது நடத்தை நமது கூறப்பட்ட மதிப்புகளுடன் பொருந்தவில்லை என்பதை நாம் உணரும்போது ஒருவித அமைதியின்மை.
  resistance_to_disconfirming_evidence: |
    நமது ஈடுபாடுகளுக்கு முரணான தகவல்களைப் புறக்கணிப்பது அல்லது குறைப்பது.

examples:
  purchase_justification: |
    ஒரு விலையுயர்ந்த பொருளை வாங்கிய பிறகு, அதன் நன்மைகளை வலியுறுத்துகிறோம் மற்றும் செலவைக் குறைக்கிறோம்.
  relationship: |
    நல்லதை வலியுறுத்தி, கெட்டதை குறைப்பதன் மூலம் ஒரு மோசமான உறவில் இருப்பதைக் நியாயப்படுத்துகிறோம்.
  career: |
    "இருக்க வேண்டும்" என்ற காரணங்களை வலியுறுத்துவதன் மூலம் நாம் விரும்பாத வேலையில் இருப்பதை நியாயப்படுத்துகிறோம்.
  beliefs: |
    நமது செயல்கள் நமது மதிப்புகளுக்கு முரணாக இருக்கும்போது, ​​நமது செயல்களுக்குப் பதிலாக நமது மதிப்புகளை மாற்றிக்கொள்கிறோம் ("நான் உண்மையில் ஒரு சைவ உணவு உண்பவர் அல்ல—நான் அவ்வப்போது இறைச்சி சாப்பிடுகிறேன்").

real_world_implications: |
  அறிவாற்றல் முரண்பாடு நம்பிக்கை உருவாக்கம், நுகர்வோர் நடத்தை மற்றும் அரசியல் மனப்பான்மைகளை வடிவமைக்கிறது. மோசமான முடிவுகளுக்குப் பிறகு மக்கள் ஏன் மீண்டும் வலியுறுத்துகிறார்கள் என்பதையும், நடத்தை மாற்றுவது நம்பிக்கைகளை எப்படி மாற்ற முடியும் என்பதையும் இது விளக்குகிறது.

professional_application:
  networking_and_relationship_building: |
    சிறிய ஈடுபாடுகள் பெரிய ஈடுபாடுகளுக்கு வழிவகுக்கும்—மக்கள் தங்கள் கடந்தகால செயல்களை நியாயப்படுத்துகிறார்கள். இதை நெறிமுறையாகப் பயன்படுத்துங்கள்: சிறிய கோரிக்கைகளுடன் தொடங்குங்கள். உங்கள் சொந்த நடத்தையை நீங்கள் நியாயப்படுத்துகிறீர்களா என்பதை அறிந்திருங்கள்.
  collaborative_learning_initiative: |
    மாற்றத்தை அறிமுகப்படுத்தும்போது, ​​ஆரம்பகால ஒப்புதலைப் பெறுங்கள் மற்றும் சிறிய ஈடுபாடுகளைப் பெறுங்கள்—அவை பெரிய தத்தெடுப்பைத் தூண்டும் முரண்பாட்டை உருவாக்குகின்றன. மனக்கசப்பை உருவாக்கும் பொது ஈடுபாடுகளைத் திணிப்பதைத் தவிர்க்கவும்.

how_can_this_be_misapplied:
  manipulation: |
    இணக்கத்திற்கு மக்களை அழுத்துவதற்கு வேண்டுமென்றே முரண்பாட்டை உருவாக்குதல்.
  dismissing_genuine_change: |
    மக்கள் சில சமயங்களில் உண்மையாகவே புதுப்பிக்கும்போது அனைத்து நம்பிக்கை மாற்றத்தையும் நியாயப்படுத்துதல் என்று கருதுதல்.
  forced_consistency: |
    மக்கள் நியாயமாக தங்கள் கருத்துக்கள் உருவாகியுள்ளன போது "நிலையானதாக" இருக்க அழுத்தம் கொடுப்பது.
  self_deception: |
    நம்மைப் பற்றிய சங்கடமான உண்மைகளைத் தவிர்ப்பதை நியாயப்படுத்த முரண்பாடு கோட்பாட்டைப் பயன்படுத்துதல்.

