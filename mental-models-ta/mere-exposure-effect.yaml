# வெறும் வெளிப்பாடு விளைவு
# மன மாதிரி / அறிவாற்றல் சார்பு - உதாரண நுழைவு

id: mere_exposure_effect
name: வெறும் வெளிப்பாடு விளைவு

quick_introduction: |
  வெறும் வெளிப்பாடு விளைவு என்பது நாம் ஒரு விஷயத்துடன் பழக்கப்பட்டுவிட்டோம் என்பதற்காகவே அதை விரும்புவதற்கான போக்காகும். மீண்டும் மீண்டும் பார்ப்பது - வலுவூட்டல் இல்லாமலேயே - விருப்பத்தை அதிகரிக்கிறது. நாம் அறிந்தவற்றை நாம் விரும்புகிறோம்.

one_liner: பழக்கம் விருப்பத்தை வளர்க்கிறது—நாம் முன்பு பார்த்ததை விரும்புகிறோம்.

try_this:
  - Ask: இது நன்றாக இருப்பதால் நான் இதை விரும்புகிறேனா, அல்லது எனக்கு இது பழக்கமாகிவிட்டதால் விரும்புகிறேனா?
  - When evaluating options, correct for exposure—new things start at a disadvantage. (விருப்பங்களை மதிப்பிடும்போது, வெளிப்பாட்டிற்காக சரிசெய்யவும்—புதிய விஷயங்கள் ஒரு குறைபாட்டுடன் தொடங்குகின்றன.)
  - Notice when repetition is influencing your preference. (மீண்டும் மீண்டும் பார்ப்பது உங்கள் விருப்பத்தை எவ்வாறு பாதிக்கிறது என்பதைக் கவனியுங்கள்.)

ask_yourself:
  - Am I preferring something mainly because I've seen it before? (நான் முன்பு பார்த்ததால் மட்டுமே ஒன்றை விரும்புகிறேனா?)
  - Would I choose differently if exposure were equal? (வெளிப்பாடு சமமாக இருந்தால் நான் வித்தியாசமாக தேர்ந்தெடுப்பேனா?)

in_more_detail: |
  ராபர்ட் சைஜோன்க் (Robert Zajonc) காட்டினார், தூண்டுதல்களை (முகங்கள், வார்த்தைகள், வடிவங்கள்) மீண்டும் மீண்டும் வெளிப்படுத்துவது அவற்றுக்கு எதிரான நேர்மறை உணர்வை அதிகரிக்கிறது—நாம் வெளிப்பாட்டை நனவாக அறிந்திருக்காவிட்டாலும் கூட. பழக்கம் வெறுப்பை அல்ல, விருப்பத்தை வளர்க்கிறது (பல சந்தர்ப்பங்களில்). நாம் பகுப்பாய்வு செய்யாதபோதும், வெளிப்பாடு நுட்பமாக இருக்கும்போதும் இந்த விளைவு வலுவாக இருக்கும்.

  வெறும் வெளிப்பாடு விளைவு பிராண்ட் விருப்பம், பரஸ்பர ஈர்ப்பு மற்றும் அழகியல் தீர்ப்பு ஆகியவற்றை பாதிக்கிறது. நாம் ஏன் பழக்கமான இசையை விரும்புகிறோம், விளம்பரம் ஏன் மீண்டும் மீண்டும் வருவதன் மூலம் வேலை செய்கிறது, மேலும் நாம் ஏன் முன்பு பார்த்த நபர்களை விரும்பலாம்—அவர்களுடன் எந்த தொடர்பும் இல்லாவிட்டாலும் கூட—இது விளக்குகிறது.

why_this_is_important: |
  வெறும் வெளிப்பாடு விளைவை அங்கீகரிப்பது உங்கள் சொந்த விருப்பங்களைப் புரிந்துகொள்ளவும், மீண்டும் மீண்டும் வருவதன் மூலம் ஏற்படும் கையாளுதலை எதிர்க்கவும் உதவுகிறது. உறவுகள் மற்றும் பிராண்டுகளுக்கு ஏன் தெரிவுநிலை மற்றும் இருப்பு முக்கியம் என்பதையும் இது விளக்குகிறது. பழக்கம் ஒரு சக்திவாய்ந்த ஆனால் பெரும்பாலும் ஆழ்மனதில் பாதிக்கும் ஒரு விஷயமாகும்.

when_to_use:
  - உறவு_கட்டுதல்
  - முடிவு_எடுத்தல்
  - தலைமைத்துவம்
  - கற்றல்

how_can_you_spot_it:
  familiarity_preference: |
    புதிய விருப்பங்களை விட முன்பு பார்த்த விருப்பங்களை விரும்புதல்.
  repetition_influence: |
    வெளிப்படையான வற்புறுத்தல் இல்லாமல் மீண்டும் மீண்டும் பார்ப்பது விருப்பத்தை அதிகரிக்கிறது.
  unconscious_influence: |
    வெளிப்பாட்டை நாம் அறியாதபோதும் இந்த விளைவு வேலை செய்கிறது.
  brand_recognition: |
    காரணம் சொல்ல முடியாவிட்டாலும் பழக்கமான பிராண்டுகள் விரும்பப்படுகின்றன.

examples:
  advertising: |
    ஒரு பிராண்டின் மீண்டும் மீண்டும் வரும் வெளிப்பாடு, கவர்ச்சியான செய்திகள் இல்லாவிட்டாலும் கூட, விருப்பத்தை அதிகரிக்கிறது.
  music: |
    நாம் முன்பு கேட்ட பாடல்களை முதல் முறை கேட்கும்போது புதிய பாடல்களை விட அதிகமாக விரும்புகிறோம்.
  people: |
    தொடர்பு இல்லாவிட்டாலும் கூட, நாம் மீண்டும் மீண்டும் பார்த்த நபர்களை (எ.கா., வகுப்புத் தோழர்கள், சக ஊழியர்கள்) அந்நியர்களை விட அதிகமாக விரும்புகிறோம்.
  ideas: |
    நாம் முன்பு சந்தித்த யோசனைகள் புதிய யோசனைகளை விட மிகவும் வசதியானதாகவும் நம்பகமானதாகவும் தோன்றுகின்றன.

real_world_implications: |
  வெறும் வெளிப்பாடு விளைவு நுகர்வோர் நடத்தை, அரசியல் விருப்பங்கள் மற்றும் சமூக ஈர்ப்பை உருவாக்குகிறது. இது சந்தைப்படுத்தலில் சுரண்டப்படுகிறது மற்றும் பழக்கமானவற்றுக்கு நியாயமற்ற நன்மைகளை உருவாக்க முடியும். வெளிப்பாட்டின் பன்முகத்தன்மை ஏன் முக்கியம் என்பதையும் இது விளக்குகிறது—வேறுபாடுகளுடன் பழகுவது சார்புகளைக் குறைக்கிறது.

professional_application:
  networking_and_relationship_building: |
    தெரிவுநிலை முக்கியம். வந்து, இருப்பில் இருந்து, பார்க்கப்படுவது பழக்கத்தை உருவாக்கி விருப்பத்தை வளர்க்கிறது. மீண்டும் மீண்டும் நிகழும் குறைந்த-அளவிலான தொடர்புகளின் மதிப்பை குறைத்து மதிப்பிடாதீர்கள்.
  collaborative_learning_initiative: |
    பல்வேறு கண்ணோட்டங்கள் மற்றும் நபர்களை மீண்டும் மீண்டும் மக்களுக்கு வெளிப்படுத்துங்கள்—பழக்கம் சார்புகளைக் குறைக்கலாம். ஆனால் வெறும் வெளிப்பாடு தற்போதைய நிலையை விரும்புவதை வலுப்படுத்தக்கூடும் என்பதையும் அறிந்து கொள்ளுங்கள்.

how_can_this_be_misapplied:
  manipulation: |
    ஒப்புதல் இல்லாமல் விருப்பங்களை கையாளும் வகையில் மீண்டும் மீண்டும் வெளிப்பாட்டை வேண்டுமென்றே உருவாக்குதல்.
  false_familiarity: |
    பழக்கத்தை தரத்துடன் ஒப்பிடுவது—சில சமயங்களில் புதிய விருப்பங்கள் சிறந்தவை.
  exclusion: |
    சில நபர்கள் மட்டுமே வெளிப்பாட்டைப் பெற்றால், அவர்களுக்கு நியாயமற்ற நன்மை கிடைக்கும். யாருக்கு தெரிவுநிலைக்கான அணுகல் உள்ளது என்பதை கவனியுங்கள்.
  stagnation: |
    பழக்கத்தை அதிகமாக சார்ந்திருப்பது மற்றும் புதிய விஷயங்களை ஒருபோதும் முயற்சிக்காமல் இருப்பது.

