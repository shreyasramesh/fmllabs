# வரைபடம் என்பது நிலப்பரப்பு அல்ல
# மன மாதிரி / அறிவாற்றல் சார்பு - எடுத்துக்காட்டு உள்ளீடு

id: map_is_not_the_territory
name: வரைபடம் என்பது நிலப்பரப்பு அல்ல

quick_introduction: |
  "வரைபடம் என்பது நிலப்பரப்பு அல்ல" என்பதன் பொருள் என்னவென்றால், யதார்த்தத்தின் ஒரு பிரதிநிதித்துவம் யதார்த்தம் அல்ல. மாதிரிகள், கோட்பாடுகள் மற்றும் விளக்கங்கள் பயனுள்ள எளிமைப்படுத்தல்கள், ஆனால் அவை எப்போதும் எதையாவது விட்டுவிடுகின்றன. நிலப்பரப்பிற்கான வரைபடத்தை குழப்புவது தவறுக்கு வழிவகுக்கிறது.

one_liner: வரைபடம் என்பது நிலப்பரப்பு அல்ல—அனைத்து மாதிரிகளும் தவறானவை; சில பயனுள்ளவை.

try_this:
  - ஒரு மாதிரி யதார்த்தத்துடன் பொருந்தவில்லை என்றால், நிலப்பரப்பை பொருத்த வரைபடத்தைப் புதுப்பிக்கவும்.
  - கேட்கவும்: இந்த மாதிரி எதை விட்டுவிடுகிறது? இது எப்போது தோல்வியடையும்?
  - மாதிரிகளை உண்மைகளாக அல்ல, கருவிகளாகக் கருதவும்.

ask_yourself:
  - எனது மாதிரியை யதார்த்தத்துடன் குழப்புகிறேனா?
  - நான் கடைசியாக பார்த்ததிலிருந்து நிலப்பரப்பு மாறிவிட்டதா?

in_more_detail: |
  ஆல்ஃபிரட் கோர்ஜிப்ஸ்கி பொது சொற்பிறப்பியலில் இந்த யோசனையை அறிமுகப்படுத்தினார். ஒரு நகரத்தின் வரைபடம் வழிசெலுத்தலுக்கு பயனுள்ளதாக இருக்கும், ஆனால் அது நகரம் அல்ல—அது விவரங்களை விட்டுவிடுகிறது, காலாவதியாகிறது, மேலும் எதையும் ஒருபோதும் பிடிக்க முடியாது. மன மாதிரிகள், அறிவியல் கோட்பாடுகள் மற்றும் நிறுவன விளக்கப்படங்களுக்கும் இதுவே பொருந்தும்.

  அனைத்து மாதிரிகளும் தவறானவை; சில பயனுள்ளவை. நிலப்பரப்பு மாறியிருக்கும்போது, ஒரு மாதிரியை முழு உண்மையாகக் கருதுவதே ஆபத்து. யதார்த்தம் பொருந்தாதபோது வரைபடங்களைப் புதுப்பிப்பதை நல்ல சிந்தனை கோருகிறது.

why_this_is_important: |
  வரைபடங்கள் நிலப்பரப்பிலிருந்து வேறுபடுகின்றன என்பதை அங்கீகரிப்பது, மாதிரிகளில் அதிகப்படியான நம்பிக்கையைத் தடுக்கிறது, நம்பிக்கைகளைப் புதுப்பிக்க ஊக்குவிக்கிறது, மேலும் காலாவதியான அல்லது மிக எளிமைப்படுத்தப்பட்ட தகவல்களின் அடிப்படையில் செயல்படும் அபாயத்தைக் குறைக்கிறது.

when_to_use:
  - முடிவெடுத்தல்
  - சிக்கல்_தீர்த்தல்
  - கற்றல்
  - இடர்_மதிப்பீடு

how_can_you_spot_it:
  model_reality_confusion: |
    ஒரு கட்டமைப்பு அல்லது கோட்பாட்டை யதார்த்தத்தை முழுமையாக விவரிப்பதாகக் கருதுதல்.
  outdated_assumptions: |
    தற்போதைய நிலைமைகளுடன் பொருந்தாத தகவல்கள் அல்லது மாதிரிகளின் அடிப்படையில் செயல்படுதல்.
  oversimplification: |
    "வரைபடத்தில்" அது சேர்க்கப்படாததால் நுணுக்கத்தை புறக்கணித்தல்.
  map_worship: |
    புதுப்பிப்பதற்கு பதிலாக ஆதாரங்கள் முரண்படும்போது ஒரு மாதிரியைப் பாதுகாத்தல்.

examples:
  organizational_charts: |
    வேலை உண்மையில் எவ்வாறு செய்யப்படுகிறது என்பதை அறிக்கையிடும் கட்டமைப்பு பிரதிபலிக்கிறது என்று கருதுதல்.
  financial_models: |
    ஒரு நிதிநிலை அறிக்கையை ஒரு காட்சிப்படுத்தல் என்று கருதாமல், ஒரு காட்சியாகக் கருதுதல்.
  stereotypes: |
    தனிநபர்களுக்கு குழு-நிலை பொதுமைப்படுத்தல்களைப் பயன்படுத்துதல்.
  strategy_docs: |
    சந்தை மாறியிருக்கும் போது ஒரு திட்டத்தை எழுதியபடி செயல்படுத்துதல்.

real_world_implications: |
  வரைபடம்-நிலப்பரப்பு வேறுபாடு அறிவியல், பொறியியல் மற்றும் தத்துவத்திற்கு அடிப்படையானது. இது Bayesian புதுப்பித்தல், சுறுசுறுப்பான முறை மற்றும் அறிவாற்றல் பணிவுக்கு அடிப்படையாக உள்ளது. அதை புறக்கணிப்பது கடுமையான சிந்தனை மற்றும் தோல்வியுற்ற உத்திகளுக்கு வழிவகுக்கிறது.

professional_application:
  networking_and_relationship_building: |
    ஒரு நபரைப் பற்றிய உங்கள் மன மாதிரி காலாவதியானதாக இருக்கலாம். பழைய எண்ணங்களை நம்புவதற்கு பதிலாக நேரடி தொடர்பு மூலம் அதை புதுப்பிக்கவும்.
  collaborative_learning_initiative: |
    திட்டங்கள் மற்றும் மாதிரிகளை நிலையான உண்மைகளாக அல்ல, சோதிக்கப்பட வேண்டிய மற்றும் திருத்தப்பட வேண்டிய கருதுகோள்களாகக் கருத குழுக்களை ஊக்குவிக்கவும்.

how_can_this_be_misapplied:
  radical_skepticism: |
    எந்த வரைபடமும் பயனுள்ளதாக இல்லை என்றும் அனைத்து அறிவும் சந்தேகத்திற்குரியது என்றும் முடிவுக்கு வருதல்.
  constant_revision: |
    நிலையான புரிதல் எழாத அளவுக்கு அடிக்கடி புதுப்பித்தல்.
  dismissing_models: |
    "நிலப்பரப்பு அல்ல" என்பதால் பயனுள்ள எளிமைப்படுத்தல்களை நிராகரித்தல்.
  relativism: |
    அனைத்து வரைபடங்களும் சமமாக செல்லுபடியாகும் என்று கூறுதல், சில தெளிவாக நிலப்பரப்புக்கு சிறப்பாகப் பொருந்துகின்றன.

