# அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை
# மன மாதிரி / அறிவாற்றல் சார்பு - எடுத்துக்காட்டு பதிவு

id: fundamental_attribution_error
name: அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை

quick_introduction: |
  மற்றவர்களின் நடத்தையை அவர்களின் குணம் அல்லது ஆளுமையுடன் தொடர்புபடுத்தி, ஆனால் நமது சொந்த நடத்தையை சூழ்நிலைக் காரணிகளுடன் தொடர்புபடுத்தும் போக்கு அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை எனப்படும். நாம் மற்றவர்களை அவர்களின் செயல்களால் மதிப்பிடுகிறோம், நம்மை நமது நோக்கங்களால் மதிப்பிடுகிறோம்.

one_liner: நாம் மற்றவர்களை அவர்களின் செயல்களால், நம்மை நமது நோக்கங்களால் மதிப்பிடுகிறோம்.

try_this:
  - யாராவது உங்களை எரிச்சலூட்டினால், கேளுங்கள்: இதை விளக்க என்ன சூழ்நிலைக் காரணிகள் இருக்கலாம்?
  - நீங்கள் உங்களுக்கு அளிக்கும் அதே தாராள மனப்பான்மையை மற்றவர்களுக்கும் பயன்படுத்துங்கள்.
  - மற்றவர்களின் நடத்தையை சூழ்நிலைக்குப் பதிலாக குணத்துடன் தொடர்புபடுத்தும்போது கவனியுங்கள்.

ask_yourself:
  - நான் அவர்களின் நடத்தையை விளக்கும் விதத்திலேயே எனது சொந்த நடத்தையை விளக்குவேனா?
  - அவர்களின் சூழ்நிலையைப் பற்றி நான் எதையாவது தவறவிட்டேனா?

in_more_detail: |
  ஒருவர் போக்குவரத்தில் நம்மை வெட்டிச் சென்றால், "என்ன முட்டாள்" என்று நினைக்கிறோம். நாம் யாரையாவது வெட்டிச் சென்றால், "நான் செய்ய வேண்டியிருந்தது—நான் அவசரத்தில் இருந்தேன்" என்று நினைக்கிறோம். நமது சொந்த தோல்விகளை சூழ்நிலையால் ("போக்குவரத்து மோசமாக இருந்தது") விளக்குகிறோம், மற்றவர்களின் தோல்விகளை மனநிலையால் ("அவர்கள் சோம்பேறிகள்") விளக்குகிறோம். இதற்கு நேர்மாறாகவும் நடக்கிறது: நாம் நம்மைப் பாராட்டுகிறோம், மற்றவர்களின் வெற்றியை அதிர்ஷ்டம் என்று கூறுகிறோம்.

  இந்த பிழை "அடிப்படை" ஆனது, ஏனெனில் இது பரவலாகவும், விடாப்பிடியாகவும் உள்ளது. இது பச்சாதாபத்தை குறைக்கிறது, மோதலைத் தூண்டுகிறது, மற்றும் செயல்திறன் மதிப்பீட்டைத் திரித்துக் காட்டுகிறது.

why_this_is_important: |
  அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழையை அங்கீகரிப்பது உறவுகளை மேம்படுத்துகிறது, மோதலைக் குறைக்கிறது, மற்றும் நியாயமான தீர்ப்புகளுக்கு வழிவகுக்கிறது. ஒருவரின் "குணம் இதுதான்" என்று முடிவு செய்வதற்கு முன் சூழலைக் கருத்தில் கொள்ள இது ஊக்குவிக்கிறது.

when_to_use:
  - உறவு_கட்டுமானம்
  - மோதல்_தீர்வு
  - தலைமைத்துவம்
  - முடிவெடுத்தல்

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    மற்றவர்களின் நடத்தையை விளக்கும்போது "அவர்கள் அப்படித்தான்"
  situational_explanation_for_self: |
    நமது சொந்த நடத்தையை விளக்கும்போது "எனக்கு வேறு வழியில்லை" அல்லது "சூழ்நிலைகள் என்னை கட்டாயப்படுத்தின"
  character_vs_context: |
    சூழ்நிலை நடத்தையை விளக்கும்போது குணத்தை அனுமானித்தல்.
  asymmetric_standards: |
    மற்றவர்களுக்கு நம்மை விட கடுமையான தரநிலைகளை வைத்திருத்தல்.

examples:
  traffic: |
    மற்றொரு ஓட்டுநரின் தவறு = "மோசமான ஓட்டுநர்." நமது தவறு = "தவிர்க்க முடியாத சூழ்நிலை."
  workplace: |
    ஒரு சக ஊழியரின் காலக்கெடுவை தவறவிடுதல் = "பொறுப்பற்றவர்." நமது காலக்கெடுவை தவறவிடுதல் =
    "அதிக சுமை மற்றும் இதைவிட சிறப்பாக யாராலும் செய்திருக்க முடியாது."
  politics: |
    எதிர்ப்பாளர்களின் கருத்துக்கள் = "அவர்கள் முட்டாள் அல்லது தீயவர்கள்." நமது கருத்துக்கள் =
    "உண்மைகளுக்கு பகுத்தறிவு பதில்."
  performance: |
    மற்றவர்களின் வெற்றி = "அதிர்ஷ்டம்." நமது வெற்றி = "கடின உழைப்பால் சம்பாதித்தது."

real_world_implications: |
  அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை மோதலைத் தூண்டுகிறது, குழுப்பணியைக் குறைக்கிறது, மற்றும் பணியமர்த்தல் மற்றும் செயல்திறன் மதிப்பீட்டைத் திரித்துக் காட்டுகிறது. இதைச் சரிசெய்வது நிறுவன கலாச்சாரம் மற்றும் தனிப்பட்ட உறவுகளை மேம்படுத்துகிறது.

professional_application:
  networking_and_relationship_building: |
    யாராவது உங்களை ஏமாற்றினால், அவர்கள் நம்பகத்தன்மையற்றவர்கள் அல்லது கடினமானவர்கள் என்று முடிவு செய்வதற்கு முன், "இதை விளக்க என்ன சூழ்நிலைக் காரணிகள் இருக்கலாம்?" என்று கேளுங்கள்.
  collaborative_learning_initiative: |
    பின்னூட்டம் மற்றும் மதிப்புரைகளில், "முதலில் சூழ்நிலை" விளக்கங்களை ஊக்குவிக்கவும்.
    குணத்துடன் தொடர்புபடுத்துவதற்கு முன் சூழலைக் கருத்தில் கொள்ள மேலாளர்களுக்கு பயிற்சி அளிக்கவும்.

how_can_this_be_misapplied:
  excusing_all_behavior: |
    சில நடத்தை குணத்தை பிரதிபலிக்கும் போது, எல்லா செயல்களையும் "சூழ்நிலை" என்று கூறி ஒதுக்குதல்.
  no_accountability: |
    மக்கள் எடுத்த தேர்வுகளுக்கு பொறுப்பேற்காமல் தவிர்க்க இந்தப் பிழையைப் பயன்படுத்துதல்.
  self_deprecation: |
    எப்போதும் உங்களை நீங்களே குறை கூறுவதற்கும், மற்றவர்களின் பொறுப்பை ஒருபோதும் ஒப்புக்கொள்ளாததற்கும் மிகைப்படுத்துதல்.
  ignoring_patterns: |
    ஒருவர் சூழ்நிலைகள் முழுவதும் மீண்டும் மீண்டும் மோசமாக நடந்து கொண்டால், மனநிலை பொருத்தமானதாக இருக்கலாம்.

