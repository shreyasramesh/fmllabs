# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Urdu)

mental_models:
  - id: ambiguity_effect
    name: ابہام کا اثر
    path: mental-models-ur/ambiguity-effect.yaml
    description: |
      ابہام کا اثر یہ رجحان ہے کہ ہم ان اختیارات سے گریز کرتے ہیں جب ہمیں نتائج کے امکانات کے بارے میں معلومات کی کمی ہوتی ہے۔ ہم نامعلوم خطرات پر معلوم خطرات کو ترجیح دیتے ہیں — یہاں تک کہ جب نامعلوم خطرات بہتر ہو سکتے ہیں۔ خود غیر یقینی صورتحال ناگوار محسوس ہوتی ہے۔

  - id: anchoring_bias
    name: اینکرنگ تعصب (Anchoring Bias)
    path: mental-models-ur/anchoring-bias.yaml
    description: |
      اینکرنگ تعصب (Anchoring bias) یہ ہے کہ فیصلے کرتے وقت پہلی بار ملنے والی معلومات پر بہت زیادہ انحصار کرنے کا رجحان۔ وہ ابتدائی "اینکر" بعد کے فیصلوں کو متاثر کرتا ہے، یہاں تک کہ جب وہ غیر متعلقہ یا بے ترتیب ہو۔

  - id: availability_cascade
    name: دستیابی کا کیسکیڈ
    path: mental-models-ur/availability-cascade.yaml
    description: |
      دستیابی کا کیسکیڈ ایک خود کو تقویت دینے والا عمل ہے جہاں کوئی خیال
      عوامی بحث کے اعادہ کے ذریعے قابلِ اعتبار بن جاتا ہے۔ جتنا زیادہ اس پر بات ہوگی،
      اتنا ہی وہ "دستیاب" ہوگا، اتنے ہی زیادہ لوگ اس پر یقین کریں گے، اور اتنی ہی زیادہ اس پر بات ہوگی۔
      مجموعی یقین اپنی بنیادی سچائی سے قطع نظر رفتار پکڑ لیتا ہے۔

  - id: availability_heuristic
    name: دستیابی کا استدلال
    path: mental-models-ur/availability-heuristic.yaml
    description: |
      دستیابی کا استدلال وہ رجحان ہے جس میں واقعات کے امکان کا اندازہ اس آسانی سے لگایا جاتا ہے جس سے ان کی مثالیں ذہن میں آتی ہیں۔ اگر ہم آسانی سے مثالیں یاد کر سکتے ہیں، تو ہم فرض کرتے ہیں کہ یہ واقعہ عام ہے۔ واضح، حالیہ، یا جذباتی مثالیں ہمارے امکان کے تخمینوں پر حاوی ہوتی ہیں۔

  - id: baader_meinhof_phenomenon
    name: باڈر-مین ہاف فینومینن
    path: mental-models-ur/baader-meinhof-phenomenon.yaml
    description: |
      باڈر-مین ہاف فینومینن (جسے فریکوئنسی الیوژن بھی کہا جاتا ہے) اس وقت ہوتا ہے جب آپ کسی نئی چیز کے بارے میں سیکھتے ہیں اور پھر اچانک اسے ہر جگہ دیکھنے لگتے ہیں۔ یہ اتفاق لگتا ہے، لیکن یہ اکثر انتخابی توجہ ہوتی ہے—آپ کا دماغ حال ہی میں دیکھی ہوئی چیزوں کو نوٹس کرنے کے لیے تیار ہو جاتا ہے۔

  - id: barnum_effect
    name: بارنم اثر
    path: mental-models-ur/barnum-effect.yaml
    description: |
      بارنم اثر (یا فورر اثر) یہ رجحان ہے کہ مبہم، عمومی
      شخصیت کی تفصیلات کو منفرد طور پر درست قبول کیا جائے۔ زائچے، قسمت بتانے والے،
      اور شخصیت کے ٹیسٹ ایسے بیانات استعمال کرتے ہیں جو تقریباً ہر کسی پر لاگو ہوتے ہیں—لیکن ہم
      یقین رکھتے ہیں کہ وہ ہمارے لیے مخصوص ہیں۔ ہم خود کو عمومی میں دیکھتے ہیں۔

  - id: base_rate_fallacy
    name: بیس ریٹ کی غلطی (Base Rate Fallacy)
    path: mental-models-ur/base-rate-fallacy.yaml
    description: |
      بیس ریٹ کی غلطی عام شماریاتی معلومات (بیس ریٹ) کو نظر انداز کرنے کا رجحان ہے جو مخصوص، واضح معلومات کے حق میں ہوتی ہے۔ ہم خاص معاملے کو زیادہ اہمیت دیتے ہیں اور پچھلی امکان کو کم سمجھا جاتا ہے۔ ایک زبردست کہانی اعداد و شمار کی بات کو بدل سکتی ہے۔

  - id: bayes_theorem
    name: بائز کا نظریہ
    path: mental-models-ur/bayes-theorem.yaml
    description: |
      بائز کا نظریہ یہ بیان کرتا ہے کہ نیا ثبوت ملنے پر کسی مفروضے کے امکان کو کیسے اپ ڈیٹ کیا جائے۔ یہ اس خیال کو باقاعدہ بناتا ہے کہ عقائد کو اس تناسب سے تبدیل ہونا چاہئے کہ ثبوت ان کی کتنی اچھی طرح حمایت کرتا ہے—سب کچھ یا کچھ نہیں، بلکہ بتدریج۔

  - id: ben_franklin_effect
    name: بنجامن فرینکلن کا اثر
    path: mental-models-ur/ben-franklin-effect.yaml
    description: |
      بنجامن فرینکلن کا اثر ایک نفسیاتی رجحان ہے جس کے تحت لوگ احسان کرنے کے بعد کسی سے زیادہ پسند کرنے لگتے ہیں۔ اس کے برخلاف کہ ہم ان لوگوں کی مدد کرتے ہیں جنہیں ہم پسند کرتے ہیں، ہم اکثر ان لوگوں کو پسند کرنے لگتے ہیں جن کی ہم نے مدد کی ہو۔

  - id: bounded_rationality
    name: محدود منطقیت
    path: mental-models-ur/bounded-rationality.yaml
    description: |
      محدود منطقیت یہ خیال ہے کہ انسانی فیصلے دستیاب معلومات، ادراک کی صلاحیت اور وقت سے محدود ہوتے ہیں۔ ہم زیادہ سے زیادہ حاصل کرنے کی کوشش نہیں کرتے؛ ہم "اطمینان بخش" رویہ اختیار کرتے ہیں — ہم بہترین ممکنہ کے بجائے کافی اچھے اختیارات کا انتخاب کرتے ہیں۔

  - id: bystander_effect
    name: تماشائی اثر (Bystander Effect)
    path: mental-models-ur/bystander-effect.yaml
    description: |
      تماشائی اثر افراد کا مدد پیش کرنے کا امکان کم ہونے کا رجحان ہے جب دوسرے لوگ موجود ہوں۔ جتنے زیادہ تماشائی ہوں گے، اتنے ہی کم امکان ہے کہ کوئی ایک شخص عمل کرے گا۔ ذمہ داری تقسیم ہو جاتی ہے؛ ہم فرض کرتے ہیں کہ کوئی اور مدد کرے گا۔

  - id: circle_of_competence
    name: دائرہ اختیار
    path: mental-models-ur/circle-of-competence.yaml
    description: |
      دائرہ اختیار ایک ذہنی ماڈل ہے جو آپ کو اپنی مہارت کی حدود جاننے اور اہم فیصلے کرتے وقت ان کے اندر رہنے پر زور دیتا ہے۔ وارن بفٹ اور چارلی منگر اس بات پر زور دیتے ہیں کہ آپ جو نہیں جانتے اسے جانیں۔

  - id: cognitive_dissonance
    name: ذہنی تضاد
    path: mental-models-ur/cognitive-dissonance.yaml
    description: |
      ذہنی تضاد وہ ذہنی تکلیف ہے جو ہمیں تب محسوس ہوتی ہے جب ہم متضاد عقائد رکھتے ہیں، یا جب ہمارے اعمال ہمارے عقائد کے برعکس ہوتے ہیں۔ ہم اس تکلیف کو کم کرنے کے لیے مجبور ہوتے ہیں—اکثر اپنے اعمال سے ملنے کے لیے اپنے عقائد کو تبدیل کر کے، بجائے اس کے کہ اپنے اعمال کو تبدیل کریں۔

  - id: confirmation_bias
    name: تصدیقاتی تعصب
    path: mental-models-ur/confirmation-bias.yaml
    description: |
      تصدیقاتی تعصب وہ رجحان ہے جس میں ہم اپنی موجودہ توہمات کی تصدیق کرنے والے
      معلومات کی تلاش، تشریح اور یاد کرتے ہیں۔ ہم معاون ثبوتوں کو زیادہ وزن دیتے ہیں
      اور ان ثبوتوں کو نظر انداز یا رد کر دیتے ہیں جو ہمارے نظریات کے خلاف ہوں۔ ہم
      اپنے مفروضات کو جانچنے کے بجائے تصدیق کرنے والے سوالات پوچھتے ہیں۔

  - id: curse_of_knowledge
    name: علم کا عذاب
    path: mental-models-ur/curse-of-knowledge.yaml
    description: |
      علم کا عذاب وہ مشکل ہے جو کسی چیز کو جاننے کے بعد یہ تصور کرنے میں پیش آتی ہے کہ اسے نہ جاننا کیسا ہوتا ہے۔ ماہرین نئے لوگوں کو سکھانے میں مشکل محسوس کرتے ہیں کیونکہ وہ نئے لوگوں کے نقطہ نظر کو دوبارہ تخلیق نہیں کر سکتے۔ جب آپ کوئی چیز جانتے ہیں، تو آپ بھول جاتے ہیں کہ اسے نہ جاننا کیسا تھا۔

  - id: default_effect
    name: ڈیفالٹ اثر
    path: mental-models-ur/default-effect.yaml
    description: |
      ڈیفالٹ اثر انتخاب پیش کیے جانے پر پہلے سے منتخب شدہ آپشن کو منتخب کرنے کا رجحان ہے۔
      جو کچھ بھی ڈیفالٹ کے طور پر سیٹ کیا گیا ہے اس کا ایک مضبوط فائدہ ہے — لوگ اکثر
      اس کے ساتھ قائم رہتے ہیں چاہے وہ ان کے لیے بہترین ہو یا نہیں۔

  - id: dunning_kruger_effect
    name: ڈننگ-کُروگر اثر
    path: mental-models-ur/dunning-kruger-effect.yaml
    description: |
      ڈننگ-کُروگر اثر ایک معلوماتی تعصب کی وضاحت کرتا ہے جہاں کسی ڈومین میں محدود علم یا مہارت رکھنے والے افراد اپنی اہلیت کو زیادہ سمجھ لیتے ہیں، جبکہ ماہرین اسے کم سمجھنے کا رجحان رکھتے ہیں۔ آپ جتنا کم جانتے ہیں، اتنے ہی زیادہ پُراعتماد ہو سکتے ہیں۔

  - id: empathy_gap
    name: ہمدردی کا خلا
    path: mental-models-ur/empathy-gap.yaml
    description: |
      جب ہم خود کسی مختلف حالت میں ہوں تو دوسروں کے ذہنی حالات کو سمجھنے اور ان کی پیشین گوئی کرنے میں درپیش دشواری کو ہمدردی کا خلا کہتے ہیں۔ جب ہم پرسکون ہوں، تو ہم اس بات کو کم سمجھیں گے کہ ہمیں غصہ یا بھوک لگنے پر کیسا محسوس ہوگا۔ جب ہم سیر ہوں، تو ہم اس بات کو کم سمجھیں گے کہ بھوکے ہونے پر ہمیں کھانے کی کتنی خواہش ہوگی۔

  - id: endowment_effect
    name: انعطاف الملکیت (Endowment Effect)
    path: mental-models-ur/endowment-effect.yaml
    description: |
      انعطاف الملکیت وہ رجحان ہے جس میں ہم کسی چیز کی زیادہ قدر کرتے ہیں صرف اس لیے کہ ہم اس کے مالک ہیں۔ ہم اسے دینے کے لیے اس قیمت سے زیادہ کا مطالبہ کرتے ہیں جو اسے حاصل کرنے کے لیے ادا کرنے کو تیار ہوتے ہیں۔ ملکیت ایسی وابستگی پیدا کرتی ہے جو ہماری قدر کو مسخ کرتی ہے۔

  - id: false_consensus_effect
    name: جھوٹے اتفاق کا اثر
    path: mental-models-ur/false-consensus-effect.yaml
    description: |
      جھوٹے اتفاق کا اثر دوسروں کے ہمارے عقائد، رویوں اور رویوں سے اتفاق کرنے کی حد کو زیادہ سمجھنے کا رجحان ہے۔ ہم فرض کرتے ہیں کہ ہماری آراء اس سے زیادہ عام ہیں جتنی وہ ہیں، اور ہم یہ تصور کرنے کے لیے جدوجہد کرتے ہیں کہ معقول لوگ متفق نہیں ہو سکتے۔

  - id: framing_effect
    name: فریمینگ اثر
    path: mental-models-ur/framing-effect.yaml
    description: |
      فریمینگ اثر اس رجحان کا نام ہے جس میں ہمارے فیصلے اس بات پر منحصر ہوتے ہیں کہ اختیارات کس طرح پیش کیے جاتے ہیں—یہاں تک کہ جب بنیادی حقائق یکساں ہوں۔ "90% بقا" اور "10% موت" ایک ہی نتیجے کو بیان کرتے ہیں لیکن مختلف انتخاب کو جنم دیتے ہیں۔ فریم فیصلے کو شکل دیتا ہے۔

  - id: fundamental_attribution_error
    name: بنیادی استناد کی غلطی
    path: mental-models-ur/fundamental-attribution-error.yaml
    description: |
      بنیادی استناد کی غلطی دوسروں کے رویے کو ان کے کردار یا شخصیت سے منسوب کرنے کا رجحان ہے جبکہ اپنے رویے کو صورتحال کے عوامل سے منسوب کیا جاتا ہے۔ ہم دوسروں کو ان کے اعمال سے اور خود کو اپنی نیتوں سے جانچتے ہیں۔

  - id: gamblers_fallacy
    name: جواری کا مغالطہ
    path: mental-models-ur/gamblers-fallacy.yaml
    description: |
      جواری کا مغالطہ یہ غلط یقین ہے کہ ماضی کے آزاد واقعات مستقبل کے واقعات کو متاثر کرتے ہیں۔
      اچھی کارکردگی کے بعد، ہم سمجھتے ہیں کہ بری کارکردگی "باقی" ہے — حالانکہ ہر نتیجہ آزاد ہوتا ہے۔
      ہم بے ترتیب پن میں نمونے دیکھتے ہیں اور "اصلاح" یا "واپسی" کی توقع کرتے ہیں جب اس کی ضرورت نہیں ہوتی۔

  - id: groupthink
    name: گروپ تھنک (Groupthink)
    path: mental-models-ur/groupthink.yaml
    description: |
      گروپ تھنک یہ رجحان ہے کہ ہم آہنگ گروہ تنقیدی جانچ پر اتفاق اور ہم آہنگی کو ترجیح دیتے ہیں۔ اراکین اختلاف کو دباتے ہیں، خود سینسر کرتے ہیں، اور سمجھے گئے گروپ کے نظریہ کو قبول کرتے ہیں۔ اتحاد کی خواہش بہترین فیصلے کی خواہش پر غالب آجاتی ہے۔

  - id: halo_effect
    name: Halo Effect
    path: mental-models-ur/halo-effect.yaml
    description: |
      ہیلو اثر ایک ایسا رجحان ہے جس میں کسی شخص کی ایک مثبت خوبی یا تاثر ہمارے مجموعی فیصلے کو متاثر کرتا ہے۔ اگر ہمیں کسی کی ظاہری شکل پسند آتی ہے، تو ہم یہ فرض کر سکتے ہیں کہ وہ قابل ہے۔ اگر ہم کسی ایک ہنر کی تعریف کرتے ہیں، تو ہم یہ فرض کر سکتے ہیں کہ وہ ہر کام میں اچھا ہے۔ ایک مثبت خصوصیت باقی چیزوں پر ایک "ہالو" ڈال دیتی ہے۔

  - id: hanlons_razor
    name: ہینلون کا استرا
    path: mental-models-ur/hanlons-razor.yaml
    description: |
      ہینلون کے استرا کا کہنا ہے: "بدنیتی کو کبھی بھی اس کی وجہ سے منسوب نہ کریں جو جہالت کی وجہ سے بخوبی سمجھائی جا سکتی ہے۔" دوسرے الفاظ میں، جب نااہلی، غفلت، یا لاعلمی رویے کی وضاحت کر سکتی ہو تو بری نیت کا تصور نہ کریں۔

  - id: hawthorne_effect
    name: ہاوتھورن اثر
    path: mental-models-ur/hawthorne-effect.yaml
    description: |
      ہاوتھورن اثر یہ رجحان ہے کہ جب لوگوں کو معلوم ہوتا ہے کہ ان کا مشاہدہ کیا جا رہا ہے یا ان کا مطالعہ کیا جا رہا ہے تو وہ اپنے رویے کو تبدیل کر لیتے ہیں۔ مشاہدے کا عمل خود تبدیلی پیدا کر سکتا ہے — ضروری نہیں کہ وہ مداخلت جو آزمائی جا رہی ہے۔ لوگ ان توجہ کا جواب دیتے ہیں جو انہیں ملتی ہے۔

  - id: hindsight_bias
    name: hindsight_bias
    path: mental-models-ur/hindsight-bias.yaml
    description: |
      Hindsight bias (or the "I knew it all along" effect) is the tendency to believe,
      after an event has occurred, that we would have predicted or expected it. We
      reconstruct the past to make outcomes seem more inevitable than they were.

  - id: hyperbolic_discounting
    name: ہائپربولک ڈسکاؤنٹنگ
    path: mental-models-ur/hyperbolic-discounting.yaml
    description: |
      ہائپربولک ڈسکاؤنٹنگ وہ رجحان ہے جس میں ہم بڑے، بعد میں ملنے والے انعامات کے مقابلے میں چھوٹے، جلد ملنے والے انعامات کو ترجیح دیتے ہیں — اور مستقبل کو عقلی ماڈلز کی پیشین گوئی سے زیادہ تیزی سے رد کرتے ہیں۔ ہم غیر مستقل طریقوں سے حال کو زیادہ اہمیت دیتے ہیں اور مستقبل کو کم۔

  - id: illusion_of_control
    name: کنٹرول کا وہم
    path: mental-models-ur/illusion-of-control.yaml
    description: |
      کنٹرول کا وہم ہمارے نتائج کو متاثر کرنے کی صلاحیت کو زیادہ سمجھنے کا رجحان ہے۔ ہم سمجھتے ہیں کہ ہم بے ترتیب واقعات، دوسرے لوگوں، اور پیچیدہ نظاموں پر جتنا ہمارا کنٹرول ہے اس سے زیادہ کنٹرول رکھتے ہیں۔ ہم رابطے کو وجہ سے اور عمل کو اثر سے خلط ملط کر دیتے ہیں۔

  - id: impact_bias
    name: اثر کا تعصب
    path: mental-models-ur/impact-bias.yaml
    description: |
      اثر کا تعصب مستقبل کے واقعات پر ہمارے جذباتی ردعمل کی شدت اور مدت کو زیادہ سے زیادہ سمجھنے کا رجحان ہے۔ ہم سوچتے ہیں کہ اچھی چیزیں ہمیں ان سے زیادہ خوش کریں گی، اور بری چیزیں ہمیں ان سے زیادہ بدبخت کریں گی۔ ہم جذباتی پیشین گوئی میں برے ہیں۔

  - id: in_group_bias
    name: اندرونی گروہ کا تعصب
    path: mental-models-ur/in-group-bias.yaml
    description: |
      اندرونی گروہ کا تعصب وہ رجحان ہے جس میں ہم ان لوگوں کو ترجیح دیتے ہیں جنہیں ہم اپنا گروہ سمجھتے ہیں، ان کے مقابلے میں جنہیں ہم باہر والے سمجھتے ہیں۔ ہم اندرونی گروہ کے اراکین کو مثبت خصوصیات اور باہر والے گروہ کے اراکین کو منفی خصوصیات سے منسوب کرتے ہیں، جو اکثر کم یا غیر ضروری امتیازات پر مبنی ہوتا ہے۔

  - id: inversion
    name: الٹنا (Inversion)
    path: mental-models-ur/inversion.yaml
    description: |
      الٹنا ایک مسئلہ حل کرنے کی تکنیک ہے جو سوال کو الٹ کر پیش کرتی ہے۔ "میں کیسے کامیاب ہو سکتا ہوں؟" پوچھنے کے بجائے، آپ پوچھتے ہیں "کیا مجھے ناکام بنا دے گا؟" اور ان چیزوں سے گریز کرتے ہیں۔ یہ ان خطرات اور مخالف نمونوں کو سامنے لاتا ہے جنہیں آگے کی سوچ اکثر نظر انداز کر دیتی ہے۔

  - id: law_of_diminishing_returns
    name: منافع میں کمی کا قانون
    path: mental-models-ur/law-of-diminishing-returns.yaml
    description: |
      منافع میں کمی کا قانون یہ بیان کرتا ہے کہ جب آپ ایک مقررہ مقدار میں اضافے کے ساتھ ساتھ
      دیگر عوامل کو مستقل رکھتے ہوئے ایک ان پٹ میں اضافہ کرتے ہیں، تو ہر نئی ان پٹ یونٹ سے
      حاصل ہونے والا اضافی آؤٹ پٹ آخر کار کم ہو جاتا ہے۔ زیادہ ہمیشہ بہتر نہیں ہوتا — ایک ایسا
      نقطہ ہوتا ہے جہاں اضافی کوشش کم سے کم نتیجہ دیتی ہے۔

  - id: loss_aversion_bias
    name: نقصان سے بچاؤ کا تعصب (Loss Aversion Bias)
    path: mental-models-ur/loss-aversion-bias.yaml
    description: |
      نقصان سے بچاؤ وہ رجحان ہے جو افراد کو مساوی فوائد حاصل کرنے کی بجائے نقصانات سے بچنے کو ترجیح دینے پر مجبور کرتا ہے۔
      لوگ فائدہ حاصل کرنے کی خوشی کے مقابلے میں نقصان اٹھانے کا درد تقریباً دو گنا زیادہ محسوس کرتے ہیں۔

  - id: map_is_not_the_territory
    name: نقش علاقے کا متبادل نہیں ہے
    path: mental-models-ur/map-is-not-the-territory.yaml
    description: |
      "نقش علاقے کا متبادل نہیں ہے" کا مطلب ہے کہ حقیقت کی نمائندگی خود حقیقت نہیں ہے۔ ماڈلز، تھیوریز، اور وضاحتیں مفید سادہ بنانے والے ہیں، لیکن وہ ہمیشہ کچھ چھوڑ دیتے ہیں۔ نقش کو علاقے سمجھنے سے غلطی ہوتی ہے۔

  - id: mere_exposure_effect
    name: محض نمائش کا اثر
    path: mental-models-ur/mere-exposure-effect.yaml
    description: |
      محض نمائش کا اثر یہ رجحان ہے کہ چیزوں کے ساتھ ترجیح پیدا ہو جاتی ہے
      صرف اس لیے کہ ہم ان سے واقف ہیں۔ بار بار نمائش - بغیر کسی
      توثیق کے بھی - پسندیدگی میں اضافہ کرتی ہے۔ ہم وہی پسند کرتے ہیں جسے ہم جانتے ہیں۔

  - id: narrative_fallacy
    name: بیانیے کی غلط فہمی (Narrative Fallacy)
    path: mental-models-ur/narrative-fallacy.yaml
    description: |
      بیانیے کی غلط فہمی ماضی کے واقعات سے کہانیاں بنانے کا رجحان ہے
      جو انہیں حقیقت سے زیادہ مربوط، قابل پیشین گوئی اور بامعنی ظاہر کرتی ہیں۔
      ہم بے ترتیبی پر وضاحتیں دوبارہ ڈالتے ہیں۔ ہم تاریخ کی بد نظمی کو
      ایک صاف ستھری کہانی میں بدل دیتے ہیں - اور پھر یقین کر لیتے ہیں کہ کہانی ناگزیر تھی۔

  - id: negativity_bias
    name: منفی رجحان
    path: mental-models-ur/negativity-bias.yaml
    description: |
      منفی رجحان وہ رجحان ہے جس میں مثبت معلومات کے مقابلے میں منفی معلومات کو زیادہ اہمیت دی جاتی ہے۔ بری خبریں، تنقید، اور خطرات ہماری توجہ کو اپنی طرف کھینچتے ہیں اور ہماری زندگی کے فیصلوں پر مثبت محرکات کے مقابلے میں زیادہ مضبوطی سے اثر انداز ہوتے ہیں۔

  - id: occams_razor
    name: اوکام کا اصول
    path: mental-models-ur/occams-razor.yaml
    description: |
      اوکام کا اصول (یا اوکم کا استرا) وہ اصول ہے کہ مسابقتی مفروضات میں سے،
      کم ترین مفروضات والے کو ترجیح دینی چاہیے۔ آسان وضاحتیں اکثر - حالانکہ ہمیشہ نہیں - درست ہوتی ہیں۔

  - id: ostrich_effect
    name: شتر مرغ کا اثر
    path: mental-models-ur/ostrich-effect.yaml
    description: |
      شتر مرغ کا اثر منفی مالی معلومات سے بچنے کا رجحان ہے—شتر مرغ کی طرح "اپنا سر ریت میں چھپانا"۔ لوگ مارکیٹیں گرنے پر اپنے پورٹ فولیو کو دیکھنے سے گریز کرتے ہیں، بل کھولنے میں تاخیر کرتے ہیں، اور ان وارننگ سائنز کو نظر انداز کرتے ہیں جو انہیں کارروائی کرنے میں مدد دے سکتے ہیں۔

  - id: pareto_principle
    name: پیریٹو کا اصول
    path: mental-models-ur/pareto-principle.yaml
    description: |
      پیریٹو کا اصول (یا 80/20 اصول) کہتا ہے کہ تقریباً 80% اثرات 20% وجوہات سے آتے ہیں۔
      کم وسائل والے ان پٹس اکثر زیادہ آؤٹ پٹس پیدا کرتے ہیں—
      سیلز، کیڑے، گاہک، کوشش، خصوصیات، اور بہت کچھ میں۔ اہم چند پر توجہ دیں۔

  - id: parkinsons_law
    name: پارکنسن کا قانون
    path: mental-models-ur/parkinsons-law.yaml
    description: |
      پارکنسن کا قانون بیان کرتا ہے کہ "کام اس وقت کو پر کرنے کے لیے پھیل جاتا ہے جو اس کی تکمیل کے لیے دستیاب ہوتا ہے۔" کام کو ایک ہفتہ دیں، اور اسے ایک ہفتہ لگتا ہے؛ اسے ایک دن دیں، اور یہ اکثر ایک دن میں ہو جاتا ہے۔ یہی بات بجٹ، ٹیم کے سائز اور وسائل پر بھی لاگو ہوتی ہے۔

  - id: probabilistic_thinking
    name: احتمالی سوچ
    path: mental-models-ur/probabilistic-thinking.yaml
    description: |
      احتمالی سوچ، یقین دہانیوں کے بجائے امکانات کے لحاظ سے استدلال کرنے کی عادت ہے۔ "کیا یہ ہوگا؟" کے بجائے، ہم پوچھتے ہیں "اس کے ہونے کا کتنا امکان ہے؟" یہ غیر یقینی صورتحال کو قبول کرتا ہے اور بہتر فیصلے کرنے کے لیے اسے استعمال کرتا ہے۔

  - id: pygmalion_effect
    name: پیگمالین اثر
    path: mental-models-ur/pygmalion-effect.yaml
    description: |
      پیگمالین اثر (یا روزینتھل اثر) وہ رجحان ہے جہاں اعلیٰ توقعات بہتر کارکردگی کا باعث بنتی ہیں۔ جب اساتذہ، مینیجرز، یا دیگر افراد کسی سے زیادہ توقعات رکھتے ہیں، تو وہ شخص بہتر کارکردگی دکھانے لگتا ہے۔ توقعات خود کو پورا کرنے والی پیش گوئیاں بن جاتی ہیں۔

  - id: regression_to_the_mean
    name: رجوع کا اوسط کی طرف رجحان
    path: mental-models-ur/regression-to-the-mean.yaml
    description: |
      رجوع کا اوسط کی طرف رجحان ایک شماریاتی رجحان ہے جہاں انتہائی نتائج کے بعد اوسط کے قریب کے نتائج کا رجحان ہوتا ہے۔ غیر معمولی طور پر اچھے یا برے نتائج کے بعد، اگلا نتیجہ شاید کم انتہائی ہوگا — کسی بھی وجہ سے مداخلت کی وجہ سے نہیں، بلکہ بے ترتیب تغیر کی وجہ سے۔

  - id: rosy_retrospection
    name: گلابی ریٹرو سپیکشن (Rosy Retrospection)
    path: mental-models-ur/rosy-retrospection.yaml
    description: |
      گلابی ریٹرو سپیکشن ماضی کو اس سے بہتر یاد رکھنے کا رجحان ہے جیسا وہ حقیقت میں تھا۔
      وقت گزرنے کے ساتھ ساتھ ہم ماضی کے تجربات کو زیادہ مثبت انداز میں یاد کرتے ہیں، مشکلات کو نرم کر دیتے ہیں
      اور اچھی چیزوں کو بڑھا چڑھا کر پیش کرتے ہیں۔ "اچھے پرانے دن" اکثر اتنے اچھے نہیں ہوتے جتنے ہمیں یاد ہیں۔

  - id: salience_bias
    name: نمایاں پن کا تعصب
    path: mental-models-ur/salience-bias.yaml
    description: |
      نمایاں پن کا تعصب کسی صورتحال کے سب سے نمایاں یا قابل توجہ پہلوؤں پر توجہ مرکوز کرنے کا رجحان ہے، جبکہ کم واضح لیکن ممکنہ طور پر اہم عوامل کو نظر انداز کر دیا جاتا ہے۔ جو چیز نمایاں ہوتی ہے اسے ہمارے فیصلوں میں غیر متناسب توجہ اور وزن ملتا ہے۔

  - id: scarcity_bias
    name: قلت کی تعصب
    path: mental-models-ur/scarcity-bias.yaml
    description: |
      قلت کی تعصب وہ رجحان ہے جس میں چیزوں کو اس وقت زیادہ اہمیت دی جاتی ہے جب وہ نایاب یا محدود نظر آتی ہیں۔ "محدود وقت،" "صرف 3 باقی،" اور "خصوصی رسائی" فوری ضرورت اور خواہش کو جنم دیتے ہیں، جو اکثر اس بات کی عقلی تشخیص پر غالب آ جاتی ہے کہ آیا ہمیں واقعی وہ چیز درکار ہے یا چاہتے ہیں۔

  - id: second_order_thinking
    name: دوسرے درجے کی سوچ
    path: mental-models-ur/second-order-thinking.yaml
    description: |
      دوسرے درجے کی سوچ آپ کے اعمال کے نتائج کے نتائج پر غور کرنے کا عمل ہے۔
      پہلے درجے کی سوچ پوچھتی ہے "اگر میں X کروں تو کیا ہوگا؟" دوسرے درجے کی سوچ
      پوچھتی ہے "اور پھر کیا؟" اور "اس کے بعد پھر کیا؟" یہ غیر ارادی اثرات کو
      سامنے لاتا ہے۔

  - id: sunk_cost_fallacy
    name: ڈوبے ہوئے اخراجات کا مغالطہ
    path: mental-models-ur/sunk-cost-fallacy.yaml
    description: |
      ڈوبے ہوئے اخراجات کا مغالطہ یہ رجحان ہے کہ پہلے سے خرچ کیے گئے وسائل کی وجہ سے کسی فیصلے میں سرمایہ کاری جاری رکھی جائے، بجائے اس کے کہ مستقبل میں متوقع منافع کی بنیاد پر فیصلہ کیا جائے۔
      "ہم اتنی دور آ گئے ہیں" یا "میں نے پہلے ہی بہت زیادہ سرمایہ کاری کر دی ہے" کے خیالات سے مزید نقصان اٹھانے کا سلسلہ جاری رہتا ہے۔

  - id: survivorship_bias
    name: بچت کا تعصب
    path: mental-models-ur/survivorship-bias.yaml
    description: |
      بچت کا تعصب ایک منطقی غلطی ہے جس میں کسی عمل میں "بچ جانے" والے لوگوں یا چیزوں پر توجہ مرکوز کی جاتی ہے جبکہ جو لوگ یا چیزیں ناکام ہو گئیں انہیں نظر انداز کر دیا جاتا ہے۔ ہم فاتحین کو دیکھتے ہیں اور ہارنے والوں کو بھول جاتے ہیں، جس سے کامیابی اور ناکامی کے بارے میں بہت زیادہ پرامید نتائج نکلتے ہیں۔

  - id: zeigarnik_effect
    name: زیگارنک اثر
    path: mental-models-ur/zeigarnik-effect.yaml
    description: |
      زیگارنک اثر نامکمل یا منقطع کاموں کو مکمل کاموں کے مقابلے میں بہتر یاد رکھنے کا رجحان ہے۔ نامکمل کام ذہنی تناؤ پیدا کرتے ہیں جو انہیں ہمارے ذہنوں میں متحرک رکھتا ہے۔ ہمارا دماغ ان چیزوں کو قائم رکھتا ہے جو نامکمل ہیں۔

  - id: zero_sum_thinking
    name: زیرو سم سوچ
    path: mental-models-ur/zero-sum-thinking.yaml
    description: |
      زیرو سم سوچ یہ یقین ہے کہ ایک شخص کا فائدہ دوسرے کا نقصان ہونا چاہیے —
      کہ وسائل مقرر ہیں اور آپ کے لیے کوئی بھی فائدہ میرے لیے نقصان کا باعث ہے۔
      حقیقت میں، بہت سی صورتیں مثبت سم ہوتی ہیں: دونوں فریق فائدہ اٹھا سکتے ہیں۔
