# Fundamental Attribution Error
# Mental Model / Cognitive Bias - Example Entry

id: fundamental_attribution_error
name: Fundamental Attribution Error

quick_introduction: |
  The fundamental attribution error is the tendency to attribute others' behavior
  to their character or personality while attributing our own behavior to
  situational factors. We judge others by their actions and ourselves by our
  intentions.

one_liner: We judge others by their actions, ourselves by our intentions.

try_this:
  - When someone frustrates you, ask: What situational factors might explain this?
  - Apply the same generosity to others that you apply to yourself.
  - Notice when you're attributing others' behavior to character, not circumstance.

ask_yourself:
  - Would I explain my own behavior the same way I'm explaining theirs?
  - What might I be missing about their situation?

in_more_detail: |
  When someone cuts us off in traffic, we think "what a jerk." When we cut someone
  off, we think "I had to—I was in a rush." We explain our own failures by
  circumstance ("the traffic was terrible") and others' failures by disposition
  ("they're lazy"). The reverse holds for success: we credit ourselves, we
  attribute others' success to luck.

  The error is "fundamental" because it's pervasive and persistent. It
  undermines empathy, fuels conflict, and distorts performance evaluation.

why_this_is_important: |
  Recognizing the fundamental attribution error improves relationships,
  reduces conflict, and leads to fairer judgments. It encourages considering
  context before concluding someone "is" a certain way.

when_to_use:
  - relationship_building
  - conflict_resolution
  - leadership
  - decision-making

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    "They're just that kind of person" when explaining others' behavior.
  situational_explanation_for_self: |
    "I had no choice" or "The circumstances forced me" when explaining our own.
  character_vs_context: |
    Assuming character when situation could explain the behavior.
  asymmetric_standards: |
    Holding others to stricter standards than we hold ourselves.

examples:
  traffic: |
    Another driver's mistake = "bad driver." Our mistake = "unavoidable situation."
  workplace: |
    A colleague's missed deadline = "irresponsible." Our missed deadline =
    "overloaded and no one could have done better."
  politics: |
    Opponents' views = "they're stupid or evil." Our views = "rational response
    to the facts."
  performance: |
    Others' success = "lucky." Our success = "earned through hard work."

real_world_implications: |
  The fundamental attribution error fuels conflict, undermines teamwork, and
  distorts hiring and performance evaluation. Correcting for it improves
  organizational culture and personal relationships.

professional_application:
  networking_and_relationship_building: |
    When someone disappoints you, ask "What situational factors might explain
    this?" before concluding they're unreliable or difficult.
  collaborative_learning_initiative: |
    In feedback and reviews, encourage "situation first" interpretations.
    Train managers to consider context before attributing to character.

how_can_this_be_misapplied:
  excusing_all_behavior: |
    Dismissing every action as "situational" when some behavior does reflect
    character.
  no_accountability: |
    Using the error to avoid holding people accountable for choices they did
    make.
  self_deprecation: |
    Overcorrecting to always blame yourself and never acknowledge others'
    responsibility.
  ignoring_patterns: |
    When someone repeatedly behaves badly across situations, disposition may
    be relevant.

related_content:
  - hanlons_razor
  - in_group_bias
  - confirmation_bias
  - halo_effect
