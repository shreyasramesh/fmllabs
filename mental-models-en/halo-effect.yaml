# Halo Effect
# Mental Model / Cognitive Bias - Example Entry

id: halo_effect
name: Halo Effect

quick_introduction: |
  The halo effect is the tendency to let one positive trait or impression
  influence our overall judgment of a person. If we like someone's
  appearance, we may assume they're competent. If we admire one skill,
  we assume they're good at everything. One positive attribute casts a
  "halo" over the rest.

one_liner: One positive trait casts a halo over our entire judgment of a person.

try_this:
  - Evaluate traits independently—don't let one strength imply others.
  - Notice when attractiveness, charisma, or one success is coloring your view.
  - Ask: Would I judge this person the same without that one positive attribute?

ask_yourself:
  - Am I generalizing from one trait to the whole person?
  - Would I see weaknesses if I weren't impressed by one strength?

in_more_detail: |
  Edward Thorndike observed that military officers who rated soldiers
  high on one trait tended to rate them high on others—even unrelated
  traits. We generalize from the particular to the whole. Attractiveness,
  charisma, or success in one domain creates a halo that spills over.

  The reverse—one negative trait coloring everything—is sometimes called
  the "horn effect." Both are forms of unwarranted generalization. The
  halo effect affects hiring, performance reviews, and everyday
  impressions.

why_this_is_important: |
  Recognizing the halo effect helps you make more accurate evaluations
  and avoid overgeneralizing. It's essential for fair hiring, performance
  management, and relationship assessment. One strength doesn't imply
  all strengths.

when_to_use:
  - decision-making
  - leadership
  - relationship_building
  - hiring

how_can_you_spot_it:
  trait_spillover: |
    One positive trait influences judgment of unrelated traits.
  attractiveness_bias: |
    Attractive people are rated higher on competence, trustworthiness, etc.
  success_generalization: |
    Success in one area leads to assumed competence in others.
  first_impression_dominance: |
    Early positive impression colors all subsequent evaluation.

examples:
  hiring: |
    A candidate who is articulate and likable is assumed to be
    technically strong—even when skills are unrelated.
  performance_reviews: |
    One standout project leads to high ratings across all dimensions.
  politics: |
    A politician's charisma leads to assumed competence on policy.
  branding: |
    A company's success in one product leads to assumed quality
    of all products.

real_world_implications: |
  The halo effect distorts hiring, performance evaluation, and
  investment decisions. It favors the attractive, articulate, and
  already-successful. Reducing it requires structured evaluation
  and separation of dimensions.

professional_application:
  networking_and_relationship_building: |
    Evaluate people on specific dimensions rather than overall
    impression. Be aware when one positive trait is influencing
    your judgment of others. Seek disconfirming evidence.
  collaborative_learning_initiative: |
    Use structured interviews and evaluations that rate dimensions
    independently. Calibrate ratings across evaluators. Reduce
    reliance on overall "gut feel."

how_can_this_be_misapplied:
  dismissing_all_positive_impressions: |
    Not every positive impression is halo—sometimes people are
    genuinely strong across dimensions.
  false_objectivity: |
    Assuming we can fully eliminate the halo effect—it's
    pervasive and partly automatic.
  overcorrection: |
    Going to the opposite extreme and assuming attractive or
    charismatic people are less competent.
  stereotyping: |
    Using "halo effect" to dismiss legitimate positive attributes.

related_content:
