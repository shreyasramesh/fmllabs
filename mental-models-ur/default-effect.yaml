# Default Effect
# Mental Model / Cognitive Bias - Example Entry

id: default_effect
name: ڈیفالٹ اثر

quick_introduction: |
  ڈیفالٹ اثر انتخاب پیش کیے جانے پر پہلے سے منتخب شدہ آپشن کو منتخب کرنے کا رجحان ہے۔
  جو کچھ بھی ڈیفالٹ کے طور پر سیٹ کیا گیا ہے اس کا ایک مضبوط فائدہ ہے — لوگ اکثر
  اس کے ساتھ قائم رہتے ہیں چاہے وہ ان کے لیے بہترین ہو یا نہیں۔

one_liner: جو کچھ بھی ڈیفالٹ کے طور پر سیٹ کیا گیا ہے اس کا ایک مضبوط فائدہ ہے — ہم اس کے ساتھ قائم رہتے ہیں۔

try_this:
  - متبادلات کا جائزہ لیے بغیر ڈیفالٹ کو قبول کرتے وقت نوٹس لیں۔
  - انتخاب ڈیزائن کرتے وقت، ایسے ڈیفالٹس سیٹ کریں جو صارفین کے بہترین مفاد میں ہوں۔
  - پوچھیں: کیا میں اسے منتخب کروں گا اگر یہ پہلے سے منتخب نہ ہوتا؟

ask_yourself:
  - کیا میں جمود کی وجہ سے ڈیفالٹ کا انتخاب کر رہا ہوں، یا اس لیے کہ یہ میرے لیے بہترین ہے؟
  - یہ ڈیفالٹ کس نے سیٹ کیا، اور اس سے انہیں کیا فائدہ ہو سکتا ہے؟

in_more_detail: |
  ڈیفالٹس جمود، نقصان سے بچاؤ (تبدیلی کا احساس ڈیفالٹ کو کھو دینا ہے)، اور
  مضمون کی منظوری (ہم فرض کرتے ہیں کہ ڈیفالٹ کی سفارش کی گئی ہے) کی وجہ سے کام کرتے ہیں۔
  ملک کے لحاظ سے اعضاء کے عطیہ کی شرحیں نمایاں طور پر مختلف ہوتی ہیں، جو زیادہ تر اس پر مبنی
  ہوتی ہیں کہ ڈیفالٹ آپٹ-ان ہے یا آپٹ-آؤٹ۔ ریٹائرمنٹ بچت کی شرکت میں تیزی آتی ہے
  جب اندراج خودکار ہوتا ہے۔

  ڈیفالٹس کا استعمال اچھے کے لیے (بہتر نتائج کی طرف بڑھانا) یا
  ہیرا پھیری کے لیے (پہلے سے چیک شدہ خانوں میں ناموافق شرائط کو چھپانا) کیا جا سکتا ہے۔
  اس اثر کو سمجھنا آپ کو بہتر نظام ڈیزائن کرنے اور ناپسندیدہ ڈیفالٹس کا مقابلہ کرنے میں مدد کرتا ہے۔

why_this_is_important: |
  ڈیفالٹ اثر کو سمجھنا آپ کو انتخاب کی وہ فن تعمیر ڈیزائن کرنے میں مدد کرتا ہے جو
  نتائج کو بہتر بناتی ہے، اور یہ آپ کو یہ پہچاننے میں مدد کرتا ہے کہ آپ کے انتخاب
  جان بوجھ کر ترجیح کے بجائے ڈیفالٹس سے کیسے متاثر ہو رہے ہیں۔

when_to_use:
  - فیصلہ_سازی
  - قیادت
  - مسئلہ_حل
  - خطرہ_تشخیص

how_can_you_spot_it:
  inertia_toward_default: |
    زیادہ تر لوگ جو کچھ بھی پہلے سے منتخب کیا گیا ہے اس کے ساتھ قائم رہتے ہیں۔
  implied_recommendation: |
    ہم ڈیفالٹ کو "وہ جو ہم سے منتخب کروانا چاہتے ہیں" کے طور پر تعبیر کرتے ہیں۔
  opt_in_vs_opt_out: |
    فریمنگ نے شرکت کو نمایاں طور پر تبدیل کر دیا (آپٹ-ان بمقابلہ آپٹ-آؤٹ)۔
  pre_checked_boxes: |
    پہلے سے منتخب شدہ آپشنز کے فارمز اور سیٹنگز میں ایک مضبوط فائدہ ہوتا ہے۔

examples:
  organ_donation: |
    آپٹ-آؤٹ ممالک میں آپٹ-ان ممالک کے مقابلے میں بہت زیادہ عطیات کی شرح ہے —
    ڈیفالٹ رویوں سے زیادہ اہم ہے۔
  retirement_savings: |
    خودکار اندراج 401(k) کی شرکت میں نمایاں اضافہ کرتا ہے۔
  software_installers: |
    "تجویز کردہ" آپشنز اور پہلے سے چیک شدہ ایڈ-آنز صارفین کے انسٹال کرنے کے طریقے کو
    شکل دیتے ہیں۔
  subscriptions: |
    مفت ٹرائلز جو خودکار طور پر ادا شدہ اندراج میں ڈیفالٹ ہوتے ہیں وہ بہت سے لوگوں کو
    قبضہ کر لیتے ہیں جو فعال طور پر سبسکرائب کرنے کا انتخاب نہیں کریں گے۔

real_world_implications: |
  ڈیفالٹ اثر سب سے طاقتور نجز میں سے ایک ہے۔ یہ بچت،
  صحت، رازداری، اور صارفین کے رویے کو تشکیل دیتا ہے۔ اخلاقی انتخاب کی فن تعمیر
  نتائج کو بہتر بنانے کے لیے ڈیفالٹس کا استعمال کرتی ہے۔ تاریک پیٹرن ان کا استحصال کرنے کے لیے استعمال کرتے ہیں۔

professional_application:
  networking_and_relationship_building: |
    دوسروں کے لیے عمل کو ڈیزائن کرتے وقت، ایسے ڈیفالٹس کا انتخاب کریں جو ان کے
    مفادات میں ہوں۔ تاریک پیٹرن سے بچیں جو قدر نکالنے کے لیے ڈیفالٹس کا استعمال کرتے ہیں۔
  collaborative_learning_initiative: |
    ٹیم کے طریقوں کے لیے ڈیفالٹس سیٹ کریں (مثلاً، غیر مطابقت پذیر کے لیے ڈیفالٹ،
    دستاویزات کے لیے ڈیفالٹ) جو مطلوبہ رویے کے ساتھ منسلک ہوں۔ صحیح انتخاب کو آسان انتخاب بنائیں۔

how_can_this_be_misapplied:
  dark_patterns: |
    لوگوں کو ناگوار انتخاب میں پھنسانے کے لیے ڈیفالٹس کا استعمال (مثلاً، چھپی ہوئی
    فیس، ناپسندیدہ سبسکرپشنز)۔
  paternalism: |
    ایسے ڈیفالٹس مسلط کرنا جو حقیقی ترجیح کو رضامندی کے بغیر اوور رائڈ کرتے ہیں۔
  manipulation: |
    ڈیفالٹس میں ناگوار شرائط کو چھپانا اور جمود پر بھروسہ کرنا۔
  one_size_fits_all: |
    یہ فرض کرنا کہ وہی ڈیفالٹ سب کے لیے صحیح ہے جب ترجیحات مختلف ہوتی ہیں۔

