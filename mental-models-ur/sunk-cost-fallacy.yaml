# Sunk Cost Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: sunk_cost_fallacy
name: ڈوبے ہوئے اخراجات کا مغالطہ

quick_introduction: |
  ڈوبے ہوئے اخراجات کا مغالطہ یہ رجحان ہے کہ پہلے سے خرچ کیے گئے وسائل کی وجہ سے کسی فیصلے میں سرمایہ کاری جاری رکھی جائے، بجائے اس کے کہ مستقبل میں متوقع منافع کی بنیاد پر فیصلہ کیا جائے۔
  "ہم اتنی دور آ گئے ہیں" یا "میں نے پہلے ہی بہت زیادہ سرمایہ کاری کر دی ہے" کے خیالات سے مزید نقصان اٹھانے کا سلسلہ جاری رہتا ہے۔

one_liner: گزشتہ سرمایہ کاری ختم ہو چکی ہے — صرف مستقبل کے اخراجات اور فوائد اہمیت رکھتے ہیں۔

try_this:
  - پوچھیں: اگر میں آج شروع کرتا، تو کیا میں یہ راستہ منتخب کرتا؟
  - پہلے سے "ختم کرنے کے معیار" کی تعریف کریں — وہ شرائط جن کے تحت آپ رک جائیں گے۔
  - معمولی فیصلے کا جائزہ لیں: یہاں سے آگے مجھے کیا حاصل ہو گا یا کیا نقصان ہو گا؟

ask_yourself:
  - کیا میں مستقبل کے قدر کی وجہ سے جاری رکھ رہا ہوں، یا گزشتہ سرمایہ کاری کو درست ثابت کرنے کے لیے؟
  - اگر کوئی دوست بالکل نئے سرے سے میری پوزیشن میں ہوتا تو میں اسے کیا مشورہ دیتا؟

in_more_detail: |
  ڈوبے ہوئے اخراجات وہ گزشتہ اخراجات ہیں جنہیں واپس حاصل نہیں کیا جا سکتا۔ عقلی فیصلے میں انہیں نظر انداز کیا جاتا ہے — صرف مستقبل کے اخراجات اور فوائد اہمیت رکھتے ہیں۔ لیکن ہم اپنی سرمایہ کاری سے جذباتی طور پر جڑے ہوتے ہیں۔ ہم وہ کھانا ختم کرتے ہیں جس سے لطف اندوز نہیں ہو رہے، وہ فلم دیکھتے ہیں جو ہمیں ناپسند ہے، اور ان منصوبوں کو جاری رکھتے ہیں جن کا اب کوئی مطلب نہیں رہا۔ ہم چاہتے ہیں کہ جو ہم نے لگایا ہے وہ "ضائع نہ ہو"، لیکن جاری رکھنے سے اکثر زیادہ ضائع ہوتا ہے۔

  یہ مغالطہ خاص طور پر اس وقت مضبوط ہوتا ہے جب ہم نے صرف رقم ہی نہیں، بلکہ وقت، کوشش، یا اپنی شناخت کی بھی سرمایہ کاری کی ہو۔ یہ تسلیم کرنا کہ ہم غلط تھے، مہنگا محسوس ہو سکتا ہے، لہذا ہم مزید سرمایہ کاری کر دیتے ہیں۔

why_this_is_important: |
  ڈوبے ہوئے اخراجات کے مغالطے کو پہچاننا آپ کو نقصان کو کم کرنے، ضرورت پڑنے پر سمت تبدیل کرنے، اور گزشتہ سرمایہ کاری کے بجائے مستقبل کی قدر کی بنیاد پر فیصلے کرنے میں مدد کرتا ہے۔
  یہ منصوبوں، کیریئرز اور رشتوں کے لیے ضروری ہے۔

when_to_use:
  - فیصلہ سازی
  - سرمایہ کاری
  - کیریئر میں تبدیلی
  - خطرے کا اندازہ

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    "ہم اب نہیں رک سکتے — ہم پہلے ہی X خرچ کر چکے ہیں" جب مستقبل کا منافع جاری رکھنے کو جائز نہیں ٹھہراتا۔
  escalation_of_commitment: |
    گزشتہ سرمایہ کاری کو درست ثابت کرنے یا "محفوظ" کرنے کے لیے مزید سرمایہ کاری کرنا۔
  identity_investment: |
    اس لیے جاری رکھنا کہ ناکامی کو تسلیم کرنے سے خود کی شبیہ کو خطرہ لاحق ہو گا۔
  ignoring_marginal_analysis: |
    کل اخراجات کی بنیاد پر فیصلے کرنا، نہ کہ اضافی اخراجات اور فوائد کی بنیاد پر۔

examples:
  projects: |
    کسی ناکام منصوبے کو اس لیے جاری رکھنا کہ "ہم نے اس پر پہلے ہی 6 مہینے لگا دیے ہیں" جب نقصان کو کم کرنا عقلی ہوتا۔
  relationships: |
    کسی رشتے میں اس لیے رہنا کہ "ہم 5 سال سے ساتھ ہیں" بجائے اس کے کہ مستقبل کا جائزہ لیا جائے۔
  careers: |
    کسی ناپسندیدہ کیریئر میں اس لیے رہنا کہ آپ نے ڈگری یا تجربے کے سالوں میں سرمایہ کاری کی ہے۔
  investments: |
    کسی نقصان دہ اسٹاک کو "برابر پر واپس آنے" کے لیے رکھنا، بجائے اس کے کہ بہتر مواقع میں دوبارہ سرمایہ کاری کی جائے۔

real_world_implications: |
  ڈوبے ہوئے اخراجات کا مغالطہ وسائل کا ضیاع، ناکامیوں کا طول پکڑنا، اور مواقع کا ضائع ہونا کا سبب بنتا ہے۔
  یہ افراد، تنظیموں اور حکومتوں کو متاثر کرتا ہے۔ اس پر قابو پانے کے لیے واضح فیصلہ سازی کے فریم ورک کی ضرورت ہے۔

professional_application:
  networking_and_relationship_building: |
    ایسے رشتوں یا تعاون میں مزید سرمایہ کاری جاری نہ رکھیں جو اب آپ کے لیے فائدہ مند نہیں ہیں، صرف گزشتہ سرمایہ کاری کی وجہ سے۔ مستقبل کی قدر کا جائزہ لیں۔
  collaborative_learning_initiative: |
    منصوبوں کے لیے "ختم کرنے کے معیار" بنائیں — وہ شرائط جن کے تحت آپ گزشتہ سرمایہ کاری سے قطع نظر رک جائیں گے۔ منصوبوں کا وقتاً فوقتاً "بالکل نئے سرے سے" کے نقطہ نظر سے جائزہ لیں۔

how_can_this_be_misapplied:
  quitting_too_early: |
    "ڈوبے ہوئے اخراجات" کو ایسی چیزوں کو ترک کرنے کے بہانے کے طور پر استعمال کرنا جنہیں نتیجہ دینے کے لیے مزید وقت کی ضرورت ہے۔
  undervaluing_consistency: |
    کچھ وابستگیوں (مثلاً، رشتے، ساکھ) میں تسلسل کی وجہ سے قدر ہوتی ہے جسے محض معمولی تجزیے نظر انداز کر دیتے ہیں۔
  cold_rationality: |
    جذباتی وابستگی کو غیر منطقی سمجھ کر مسترد کرنا جب یہ حقیقی اقدار کی عکاسی کر سکتا ہے۔
  analysis_paralysis: |
    جاری رکھنے کے بارے میں زیادہ سوچنا جب جواب واضح ہو۔

