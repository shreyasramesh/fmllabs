# Loss Aversion Bias
# Mental Model / Cognitive Bias - Example Entry

id: loss_aversion_bias
name: نقصان سے بچاؤ کا تعصب (Loss Aversion Bias)

quick_introduction: |
  نقصان سے بچاؤ وہ رجحان ہے جو افراد کو مساوی فوائد حاصل کرنے کی بجائے نقصانات سے بچنے کو ترجیح دینے پر مجبور کرتا ہے۔
  لوگ فائدہ حاصل کرنے کی خوشی کے مقابلے میں نقصان اٹھانے کا درد تقریباً دو گنا زیادہ محسوس کرتے ہیں۔

one_liner: نقصانات، مساوی فوائد کے احساس سے تقریباً دو گنا زیادہ تکلیف دہ محسوس ہوتے ہیں۔

try_this:
  - "خود سے پوچھیں: کیا میں جو کھو سکتا ہوں اس کی قدر، جو حاصل کر سکتا ہوں اس سے زیادہ تو نہیں کر رہا؟"
  - انتخاب کو نقصانات کے بجائے فوائد کے تناظر میں دوبارہ پیش کریں اور دیکھیں کہ کیا آپ کا نقطہ نظر بدلتا ہے۔
  - اس بات کا نوٹس لیں جب نقصان کا خوف، اصل فوائد سے زیادہ فیصلہ سازی کو متاثر کر رہا ہو۔

ask_yourself:
  - اگر میں صفر سے شروع کروں تو میں کیا منتخب کروں گا؟
  - کیا میں اس لیے رکا ہوا ہوں کہ میں کیا کھو دوں گا، یا اس لیے کہ مستقبل واقعی بہتر ہے؟

in_more_detail: |
  ڈینیئل کین مین اور ایموس ٹیورسکی نے تیار کیا، نقصان سے بچاؤ بیان کرتا ہے کہ نقصانات اور فوائد کو کس طرح غیر متناسب طور پر سمجھا جاتا ہے۔
  $100 کھونے کا نفسیاتی اثر عام طور پر $100 حاصل کرنے کی اطمینان سے بہت زیادہ ہوتا ہے۔ یہ تعصب مالیات، بات چیت، اور روزمرہ کے انتخاب میں فیصلہ سازی کو متاثر کرتا ہے،
  جس کی وجہ سے جب ممکنہ نقصانات نمایاں ہوتے ہیں تو اکثر خطرہ سے بچنے والے طرز عمل کا مظاہرہ ہوتا ہے۔

why_this_is_important: |
  نقصان سے بچاؤ کو سمجھنے سے آپ کو یہ تسلیم کرنے میں مدد ملتی ہے کہ کب نقصان کا خوف، عقلی تجزیے سے زیادہ فیصلہ سازی کو متاثر کر رہا ہے۔
  یہ بتاتا ہے کہ لوگ کیوں نقصان میں جانے والی سرمایہ کاری کو برقرار رکھتے ہیں، ضروری تبدیلیوں سے گریز کرتے ہیں، اور بات چیت اور کیریئر کے فیصلوں میں غیر معمولی انتخاب کرتے ہیں۔

when_to_use:
  - فیصلہ_سازی (decision_making)
  - سرمایہ_کاری (investing)
  - کیریئر_میں_اقدامات (career_moves)
  - خطرے_کا_اندازہ (risk_assessment)

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    اس بات کا نوٹس لیں جب کسی چیز کو کھونے کا امکان، ممکنہ فائدے کے مقابلے میں غیر متناسب تشویش یا مزاحمت کو جنم دیتا ہے۔
  reluctance_to_change: |
    جب مقصدی تجزیہ بہتر آپشن کی نشاندہی کرتا ہے تب بھی حکمت عملی تبدیل کرنے، نوکری چھوڑنے، یا اثاثہ فروخت کرنے میں ہچکچاہٹ۔
  framing_sensitivity: |
    انتخابات کے فریم کرنے کے طریقے (فوائد یا نقصانات کے طور پر) کی بنیاد پر فیصلے میں ڈرامائی طور پر تبدیلی، یہاں تک کہ جب نتائج مساوی ہوں۔
  overvaluing_what_you_have: |
    تحفہ اثر (Endowment effect)—صرف اس لیے کہ آپ کے پاس چیزیں ہیں، ان کو زیادہ اہمیت دینا—اکثر نقصان سے بچاؤ کے ساتھ آتا ہے۔

examples:
  investing: |
    گرتی ہوئی اسٹاک کو "نقصان کو محسوس کرنے سے بچنے" کے لیے برقرار رکھنا، جبکہ کہیں اور بہتر سرمایہ کاری کے مواقع سے محروم رہنا۔
  career: |
    غیر اطمینان بخش ملازمت میں رہنا کیونکہ اسے چھوڑنا سیکورٹی کھونے جیسا لگتا ہے، یہاں تک کہ جب نیا موقع زیادہ ترقی کی پیشکش کرتا ہے۔
  negotiations: |
    ایک منصفانہ پیشکش کو مسترد کرنا کیونکہ اسے کچھ "دینے" کے طور پر پیش کیا گیا ہے، نہ کہ معاہدے "حاصل کرنے" کے طور پر۔
  product_design: |
    مفت ٹرائل جو پیڈ میں تبدیل ہوتے ہیں—صارفین جب ٹرائل ختم ہوتا ہے تو سروس "کھونے" کا تجربہ کرتے ہیں، جو نئی سروس "حاصل کرنے" سے زیادہ سبسکرپشن کو متاثر کرتا ہے۔

real_world_implications: |
  نقصان سے بچاؤ مارکیٹوں، پالیسی، اور انفرادی رویے کو تشکیل دیتا ہے۔ یہ بتاتا ہے کہ انشورنس اور وارنٹی اچھی طرح کیوں فروخت ہوتے ہیں، لوگ فائدہ مند تبدیلی سے کیوں گریز کرتے ہیں،
  اور منفی خبروں کا اثر زیادہ کیوں ہوتا ہے۔ اسے تسلیم کرنے سے فیصلہ سازی کی بہتری اور پشیمانی سے چلنے والے فیصلوں میں کمی آ سکتی ہے۔

professional_application:
  networking_and_relationship_building: |
    آگاہ رہیں کہ لوگ نقصان سے بچاؤ کی وجہ سے ناکارہ تعلقات یا تعاون کو ختم کرنے میں مزاحمت کر سکتے ہیں—وہ کنکشن "کھونے" سے ڈرتے ہیں۔
    مزاحمت کو کم کرنے کے لیے نئے مواقع کو نقصانات کے بجائے فوائد کے طور پر پیش کریں۔
  collaborative_learning_initiative: |
    نئے عمل یا ٹولز متعارف کراتے وقت، اس بات پر زور دیں کہ ٹیم کیا حاصل کرتی ہے بجائے اس کے کہ وہ کیا "چھوڑ" رہی ہے۔
    نقصان سے تیار کردہ تبدیلی کی پہل اکثر زیادہ مضبوط مزاحمت کو جنم دیتی ہے۔

how_can_this_be_misapplied:
  manipulation: |
    فیصلوں پر دباؤ ڈالنے کے لیے نقصان سے بچاؤ کا استحصال کرنا—مثلاً، "محدود وقت کی پیشکشیں" یا "ضائع نہ کریں" کی صورت میں جو حقیقی قدر کے جائزے کے بجائے نقصان کے خوف کو جنم دیتی ہیں۔
  misinterpreting_relationships: |
    کسی شخص کی تبدیلی کے لیے مزاحمت کو مکمل طور پر عقلی سمجھنا جب کہ یہ نقصان سے بچاؤ سے چل رہا ہو۔ محرکات کو غلط منسوب کرنے سے اعتماد کو نقصان پہنچ سکتا ہے۔
  overcommitment: |
    ڈوبے ہوئے اخراجات کا مغالطہ (Sunk cost fallacy)—ناکام منصوبے میں سرمایہ کاری جاری رکھنا کیونکہ "ہم نے پہلے ہی اتنا کچھ ڈال دیا ہے" بجائے اس کے کہ نقصانات کو کم کیا جائے۔
  missed_opportunities_for_conflict_resolution: |
    مفاہمت سے انکار کرنا کیونکہ کوئی بھی رعایت نقصان محسوس ہوتی ہے، یہاں تک کہ جب متبادل سب کے لیے بدتر نتیجہ ہو۔
  vulnerability_to_exploitation: |
    ان لوگوں کے ذریعہ ہیرا پھیری کا شکار ہونا جو نقصان سے بچاؤ کو جنم دینے والے انتخاب کو فریم کرتے ہیں،
    جیسے سیلز کی حکمت عملی جو اس بات پر زور دیتی ہیں کہ اگر آپ عمل نہیں کرتے تو آپ کیا "کھو" دیں گے۔
  reinforcing_negative_perceptions: |
    ممکنہ نقصانات پر حد سے زیادہ توجہ مرکوز کرنے سے ایک مایوس کن نقطہ نظر پیدا ہو سکتا ہے جو خود پورا ہو جاتا ہے، ترقی کے مواقع سے محروم رہتا ہے۔

