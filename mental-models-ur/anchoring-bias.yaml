# Anchoring Bias
# Mental Model / Cognitive Bias - Example Entry

id: anchoring_bias
name: اینکرنگ تعصب (Anchoring Bias)

quick_introduction: |
  اینکرنگ تعصب (Anchoring bias) یہ ہے کہ فیصلے کرتے وقت پہلی بار ملنے والی معلومات پر بہت زیادہ انحصار کرنے کا رجحان۔ وہ ابتدائی "اینکر" بعد کے فیصلوں کو متاثر کرتا ہے، یہاں تک کہ جب وہ غیر متعلقہ یا بے ترتیب ہو۔

one_liner: آپ جو پہلا نمبر دیکھتے ہیں وہی آگے آنے والے تمام نمبروں کو تشکیل دیتا ہے۔

try_this:
  - بات چیت سے پہلے، اپنے ہدف کا نمبر طے کریں اور ان کے بتائے ہوئے اینکر سے بچیں۔
  - تخمینہ لگاتے وقت، دوسروں کا سننے سے پہلے اپنا نمبر خود تیار کریں۔
  - پوچھیں: کیا میں مختلف سوچوں گا اگر میں نے پہلے کوئی اور نمبر دیکھا ہوتا؟

ask_yourself:
  - مجھے سب سے پہلے کون سا نمبر یا خیال ملا - اور کیا یہ میرے فیصلے کو متاثر کر رہا ہے؟
  - کیا میں اینکر سے کافی ایڈجسٹ کر رہا ہوں، یا اب بھی اس کے بہت قریب ہوں؟

in_more_detail: |
  ایک کلاسک تجربے میں، اقوام متحدہ میں افریقی ممالک کے فیصد کا تخمینہ لگانے کے لیے کہا گیا لوگوں نے بلند تخمینے دیے اگر انہوں نے حال ہی میں ایک بڑا نمبر (مثلاً، 65 بمقابلہ 10) دیکھا ہو۔ اینکر - یہاں تک کہ جب بے ترتیب ہو - نے ان کے جوابات کو متاثر کیا۔ اینکرنگ بات چیت، قیمتوں، بھرتی اور پیشین گوئیوں کو متاثر کرتی ہے۔

  جو پہلا نمبر ہم دیکھتے ہیں وہ ایک حوالہ نقطہ بن جاتا ہے۔ ہم اس سے دور ایڈجسٹ کرتے ہیں، لیکن عام طور پر ناکافی طور پر۔ یہاں تک کہ جب ہم جانتے ہیں کہ اینکر بے ترتیب ہے، یہ اب بھی ہمیں متاثر کر سکتا ہے۔ ماہرین اس سے محفوظ نہیں ہیں۔

why_this_is_important: |
  اینکرنگ کو سمجھنا آپ کو بہتر فیصلے کرنے، زیادہ مؤثر طریقے سے بات چیت کرنے اور دھوکہ دہی سے بچنے میں مدد کرتا ہے۔ یہ یہ بھی بتاتا ہے کہ معلومات کا ترتیب اور فریمنگ اتنی اہم کیوں ہے۔

when_to_use:
  - decision-making (فیصلہ سازی)
  - negotiation (بات چیت)
  - investing (سرمایہ کاری)
  - risk_assessment (خطرات کا اندازہ)

how_can_you_spot_it:
  first_number_dominance: |
    بات چیت یا تخمینہ میں پہلا نمبر حتمی نتیجے پر غیر متناسب طور پر اثر انداز ہوتا ہے۔
  insufficient_adjustment: |
    جب اینکر سے ایڈجسٹ کیا جاتا ہے، تو لوگ عام طور پر اتنا ایڈجسٹ نہیں کرتے۔
  arbitrary_anchor_influence: |
    یہاں تک کہ واضح طور پر غیر متعلقہ نمبر (مثلاً، سوشل سیکیورٹی نمبر کے آخری ہندسے) بھی تخمینوں کو متاثر کر سکتے ہیں۔
  order_effects: |
    جس ترتیب میں اختیارات پیش کیے جاتے ہیں وہ انتخاب کو بدل دیتا ہے۔

examples:
  salary_negotiation: |
    ذکر کیا گیا پہلا نمبر - چاہے آجر کی طرف سے ہو یا امیدوار کی طرف سے - اکثر حتمی پیشکش کو اینکر کرتا ہے۔
  real_estate: |
    لسٹنگ کی قیمت خریداروں کے قدر کے ادراک کو اینکر کرتی ہے، یہاں تک کہ جب اسے جان بوجھ کر زیادہ یا کم مقرر کیا گیا ہو۔
  retail: |
    "99$ تھا، اب 49$" فروخت کی قیمت کو ایک سودا بنانے کے لیے اصل قیمت کو اینکر کے طور پر استعمال کرتا ہے۔
  forecasting: |
    پلاننگ میٹنگز میں ابتدائی تخمینے بعد کی پیشین گوئیوں کو اینکر کرتے ہیں، یہاں تک کہ جب پہلا تخمینہ ایک اندازہ تھا۔

real_world_implications: |
  اینکرنگ بازاروں، بات چیت اور پالیسیوں کو تشکیل دیتی ہے۔ اسے اخلاقی طور پر (مثلاً، معقول توقعات طے کرنا) یا غیر اخلاقی طور پر (مثلاً، جوڑ توڑ والی قیمتیں) استعمال کیا جا سکتا ہے۔ اسے تسلیم کرنے سے فیصلہ سازی کا معیار بہتر ہوتا ہے۔

professional_application:
  networking_and_relationship_building: |
    بات چیت میں، اینکر طے کرنے کے لیے پہلی پیشکش کرنے پر غور کریں - یا جب دوسرا فریق ایسا کر رہا ہو تو اس سے آگاہ رہیں۔
  collaborative_learning_initiative: |
    میٹنگز میں، اس بات سے ہوشیار رہیں کہ تخمینوں پر کون پہلے بولتا ہے؛ بحث سے پہلے آزادانہ تخمینے جمع کرنے پر غور کریں۔

how_can_this_be_misapplied:
  manipulation: |
    مطلوبہ نتائج کی طرف دوسروں کو موڑنے کے لیے جان بوجھ کر انتہائی اینکرز کا استعمال۔
  overconfidence_in_anchors: |
    اپنے پہلے تخمینے پر نظر ثانی کیے بغیر بہت زیادہ بھروسہ کرنا۔
  ignoring_relevant_information: |
    اینکر کو زیادہ متعلقہ ڈیٹا کو اوور رائڈ کرنے دینا۔
  exploitation: |
    سیلز کی حکمت عملی جو اصل قیمتوں کو مناسب بنانے کے لیے مبالغہ آمیز "مقابلے میں" قیمتوں کا استعمال کرتی ہیں۔

