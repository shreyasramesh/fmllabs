# Salience Bias
# Mental Model / Cognitive Bias - Example Entry

id: salience_bias
name: نمایاں پن کا تعصب

quick_introduction: |
  نمایاں پن کا تعصب کسی صورتحال کے سب سے نمایاں یا قابل توجہ پہلوؤں پر توجہ مرکوز کرنے کا رجحان ہے، جبکہ کم واضح لیکن ممکنہ طور پر اہم عوامل کو نظر انداز کر دیا جاتا ہے۔ جو چیز نمایاں ہوتی ہے اسے ہمارے فیصلوں میں غیر متناسب توجہ اور وزن ملتا ہے۔

one_liner: جو چیز نمایاں ہوتی ہے اسے غیر متناسب توجہ ملتی ہے - باریک بینی نظر انداز ہو جاتی ہے۔

try_this:
  - Ask: میں ایسی کیا چیز نہیں دیکھ رہا ہوں کیونکہ وہ نمایاں نہیں ہے؟
  - فیصلہ کرنے سے پہلے کم واضح عوامل کو فعال طور پر تلاش کریں۔
  - نوٹس کریں جب کوئی واضح یا ڈرامائی عنصر آپ کے فیصلے پر حاوی ہو رہا ہو۔

ask_yourself:
  - کیا میں نمایاں چیز کو زیادہ وزن اور باریک چیز کو کم وزن دے رہا ہوں؟
  - میں کن اہم عوامل کو نظر انداز کر رہا ہوں؟

in_more_detail: |
  نمایاں معلومات واضح، جذباتی طور پر چارج شدہ، یا حال ہی میں سامنے آنے والی ہوتی ہے۔ یہ توجہ حاصل کرتی ہے اور اس سے زیادہ فیصلوں کو متاثر کرتی ہے جتنی اسے کرنی چاہیے۔ ہم نمایاں چیز کو زیادہ وزن دیتے ہیں اور باریک بینی کو کم وزن۔ ایک ڈرامائی واقعہ یا واضح مثال ہماری سوچ پر حاوی ہو سکتی ہے، یہاں تک کہ جب وہ نمائندہ نہ ہو۔

  نمایاں پن کا تعصب دستیابی کے تخمینے (جو ذہن میں آتا ہے) اور حالیہ پن کے تعصب (جو حال ہی میں ہوا) کے ساتھ اوورلیپ ہوتا ہے۔ یہ خطرے کے ادراک، ملازمت، اور حکمت عملی کو متاثر کرتا ہے۔ سب سے زیادہ نظر آنے والے مسائل کو حل کیا جاتا ہے؛ پوشیدہ مسائل بڑھتے رہتے ہیں۔

why_this_is_important: |
  نمایاں پن کے تعصب کو پہچاننے سے آپ کو واضح چیزوں سے آگے دیکھنے اور کم نظر آنے والے عوامل پر غور کرنے میں مدد ملتی ہے۔ یہ خطرے کے تجزیے، مسئلہ کی تشخیص، اور فیصلے کے معیار کو بہتر بناتا ہے۔ اہم چیزیں ہمیشہ نمایاں نہیں ہوتیں۔

when_to_use:
  - فیصلہ_سازی
  - مسئلہ_حل_کرنا
  - خطرے_کا_تجزیہ
  - قیادت

how_can_you_spot_it:
  prominent_factor_dominance: |
    سب سے زیادہ قابل توجہ پہلو فیصلے کو چلاتا ہے۔
  overlooking_background: |
    کم نظر آنے والے عوامل کو ان کی اہمیت کے باوجود نظر انداز کر دیا جاتا ہے۔
  vividness_overweighting: |
    ڈرامائی یا جذباتی معلومات کو غیر متناسب وزن ملتا ہے۔
  visibility_bias: |
    جو چیز ہم آسانی سے دیکھ یا ناپ سکتے ہیں اسے اس چیز سے زیادہ توجہ ملتی ہے جسے ہم نہیں کر سکتے۔

examples:
  risk: |
    طیارے کا حادثہ نمایاں ہوتا ہے - ہم پرواز کے خطرے کو زیادہ اندازہ کرتے ہیں۔ کار حادثات مجموعی طور پر کم نمایاں ہوتے ہیں - ہم گاڑی چلانے کے خطرے کو کم اندازہ کرتے ہیں۔
  hiring: |
    ایک امیدوار کی پریزنٹیشن کی مہارتیں نمایاں ہوتی ہیں؛ ان کی فالو-تھرو کم واضح ہو سکتی ہے لیکن اتنی ہی اہم ہے۔
  strategy: |
    حریف کی چالیں نمایاں ہوتی ہیں؛ بتدریج مارکیٹ کی تبدیلیاں کم قابل توجہ ہوتی ہیں لیکن شاید زیادہ اہمیت رکھتی ہوں۔
  problems: |
    سب سے بلند شکایت کا ازالہ کیا جاتا ہے جبکہ نظاماتی مسائل نظر انداز ہو جاتے ہیں۔

real_world_implications: |
  نمایاں پن کا تعصب اس بات کو متاثر کرتا ہے کہ کس چیز کو توجہ، فنڈنگ، اور کارروائی ملتی ہے۔ یہ علامات کو حل کرنے کی طرف لے جا سکتا ہے بجائے وجوہات کے اور وسائل کی غلط تقسیم کی طرف۔ جان بوجھ کر غیر نمایاں معلومات کی تلاش فیصلوں کو بہتر بناتی ہے۔

professional_application:
  networking_and_relationship_building: |
    لوگوں کو صرف ان کی سب سے زیادہ نمایاں خصوصیات سے نہ جانچیں۔ کم واضح خصوصیات کی تلاش کریں - قابل اعتماد، مستقل مزاجی، وہ لوگوں کے ساتھ کیسا سلوک کرتے ہیں جو ان کی مدد نہیں کر سکتے۔
  collaborative_learning_initiative: |
    مسئلہ حل کرنے میں، واضح طور پر پوچھیں "ہم کیا نہیں دیکھ رہے ہیں؟" اور "کیا کم واضح ہے لیکن اہم ہے؟" ایسے عمل بنائیں جو غیر نمایاں مسائل کو سامنے لائیں۔

how_can_this_be_misapplied:
  ignoring_salient_info: |
    کبھی کبھی جو چیز نمایاں ہوتی ہے وہ اہم ہوتی ہے۔ ہر واضح چیز کو رد نہ کریں۔
  false_sophistication: |
    یہ فرض کرنا کہ مبہم عوامل ہمیشہ واضح عوامل سے زیادہ اہم ہوتے ہیں۔
  analysis_paralysis: |
    اتنے سارے غیر نمایاں عوامل کی تلاش کرنا کہ آپ کبھی بھی نمایاں عوامل پر عمل نہیں کر پاتے۔
  contrarianism: |
    صرف مختلف ہونے کے لیے نمایاں معلومات کو مسترد کرنا۔

