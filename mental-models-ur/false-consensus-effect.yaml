# جھوٹے اتفاق کا اثر
# ذہنی ماڈل / ادراکی تعصب - مثال اندراج

id: false_consensus_effect
name: جھوٹے اتفاق کا اثر

quick_introduction: |
  جھوٹے اتفاق کا اثر دوسروں کے ہمارے عقائد، رویوں اور رویوں سے اتفاق کرنے کی حد کو زیادہ سمجھنے کا رجحان ہے۔ ہم فرض کرتے ہیں کہ ہماری آراء اس سے زیادہ عام ہیں جتنی وہ ہیں، اور ہم یہ تصور کرنے کے لیے جدوجہد کرتے ہیں کہ معقول لوگ متفق نہیں ہو سکتے۔

one_liner: ہم زیادہ اندازہ لگاتے ہیں کہ دوسرے ہم سے کتنا متفق ہیں۔

try_this:
  - فعال طور پر ان لوگوں کو تلاش کریں جو متفق نہیں ہیں - اتفاق کا دعویٰ نہ کریں۔
  - شروع کرنے سے پہلے، ان لوگوں کے ساتھ تجربہ کریں جو آپ کے مفروضات کا اشتراک نہیں کرتے ہیں۔
  - پوچھیں: وہ شخص کیا کہے گا جو متفق نہیں ہے؟ اسے سنجیدگی سے لیں۔

ask_yourself:
  - کیا میں فرض کر رہا ہوں کہ دوسرے میری طرح سوچتے ہیں؟
  - میں آخری بار کسی کے مختلف نظریے سے کب حیران ہوا تھا؟

in_more_detail: |
  جب ہم کوئی موقف رکھتے ہیں، تو ہم اسے معمول سمجھتے ہیں۔ ہم خود کو ہم خیال لوگوں سے گھیر لیتے ہیں، تصدیق شدہ میڈیا استعمال کرتے ہیں، اور مبہم رائے کو اتفاق کے طور پر سمجھتے ہیں۔ یہ ایک گونج والا چیمبر بناتا ہے جو اتفاق کے وہم کو تقویت دیتا ہے۔

  یہ اثر گہرے عقائد کے لیے اور جب ہم اپنے موقف میں زیادہ سرمایہ کاری کرتے ہیں تو یہ زیادہ مضبوط ہوتا ہے۔ یہ دوسروں کے متفق نہ ہونے پر حیرت، مذاکرات میں دشواری، اور ناقص مارکیٹ ریسرچ کا باعث بن سکتا ہے جب ہم فرض کرتے ہیں کہ گاہک ہماری طرح سوچتے ہیں۔

why_this_is_important: |
  جھوٹے اتفاق کے اثر کو تسلیم کرنا آپ کو حقیقی اختلاف کے لیے تیار کرنے، بہتر تحقیق کرنے اور زیادہ مؤثر طریقے سے بات چیت کرنے میں مدد کرتا ہے۔ یہ مصنوعات کی ترقی، مذاکرات، اور قیادت کے لیے ضروری ہے۔

when_to_use:
  - فیصلہ_لینا
  - مذاکرات
  - قیادت
  - مسئلہ_حل_کرنا

how_can_you_spot_it:
  surprise_at_disagreement: |
    آپ اس وقت حقیقی طور پر حیران ہوتے ہیں جب کوئی اس سے متفق نہیں ہوتا جسے آپ واضح سمجھتے ہیں۔
  assuming_shared_values: |
    آپ اس طرح عمل کرتے ہیں جیسے دوسرے آپ کی ترجیحات کا اشتراک کرتے ہیں بغیر تصدیق کے۔
  underestimating_opposition: |
    آپ توقع کرتے ہیں کہ تجاویز کو اس سے کم مزاحمت کا سامنا کرنا پڑے گا جتنا وہ کرتے ہیں۔
  echo_chamber_detection: |
    آپ کا سماجی اور معلوماتی ماحول شاذ و نادر ہی آپ کے خیالات کو چیلنج کرتا ہے۔

examples:
  product_development: |
    ایک ٹیم فرض کرتی ہے کہ صارفین فیچر X چاہتے ہیں کیونکہ ٹیم کا ہر فرد اسے چاہتا ہے - صرف کم اپنانے کی شرح پانے کے لیے۔
  politics: |
    ایک سیاسی حلقے کے لوگ انتخابی نتائج سے حیران ہوتے ہیں جو ان کی توقعات سے میل نہیں کھاتے۔
  negotiation: |
    یہ فرض کرنا کہ دوسرا فریق شرائط پر متفق ہو جائے گا کیونکہ وہ آپ کو "معقول" لگتے ہیں۔
  hiring: |
    "کلچر فٹ" کے لیے بھرتی کا مطلب یہ ہو سکتا ہے کہ ایسے لوگوں کو بھرتی کیا جائے جو آپ سے متفق ہوں، جھوٹے اتفاق کو بڑھاوا دیں۔

real_world_implications: |
  جھوٹے اتفاق کا اثر دھ्रुویकरण، ناکام مصنوعات کے آغاز، اور ناکام مذاکرات میں حصہ ڈالتا ہے۔ یہ ہمیں اپنی پیشین گوئیوں میں زیادہ پر اعتماد اور اختلاف کے لیے غیر تیار بناتا ہے۔

professional_application:
  networking_and_relationship_building: |
    فعال طور پر مختلف نقطہ نظر والے لوگوں کو تلاش کریں۔ مشترکہ عقائد کا دعویٰ نہ کریں - پوچھیں اور سنیں۔
  collaborative_learning_initiative: |
    ٹیموں میں، مہنگا ہونے سے پہلے اختلاف کو ظاہر کرنے کے لیے منظم اختلاف (مثلاً، "پریمارٹمز،" شیطان کا وکیل) استعمال کریں۔

how_can_this_be_misapplied:
  dismissing_dissent: |
    یہ فرض کرنا کہ متفق نہ ہونے والے غیر معقول یا نا واقف ہیں بجائے اس کے کہ وہ درست مختلف نقطہ نظر رکھتے ہوں اس پر غور کریں۔
  poor_research: |
    کسٹمر ریسرچ چھوڑ دینا کیونکہ "ہم پہلے سے جانتے ہیں کہ وہ کیا چاہتے ہیں۔"
  overconfidence: |
    یہ فرض کرنے کی بنیاد پر پرجوش دعوے کرنا کہ دوسرے متفق ہوں گے۔
  groupthink_amplification: |
    ٹیمیں جو جھوٹے اتفاق کے اثر کو چیلنج نہیں کرتی ہیں وہ گروپ تھنک میں پھنس سکتی ہیں۔

