# Fundamental Attribution Error
# Mental Model / Cognitive Bias - Example Entry

id: fundamental_attribution_error
name: بنیادی استناد کی غلطی

quick_introduction: |
  بنیادی استناد کی غلطی دوسروں کے رویے کو ان کے کردار یا شخصیت سے منسوب کرنے کا رجحان ہے جبکہ اپنے رویے کو صورتحال کے عوامل سے منسوب کیا جاتا ہے۔ ہم دوسروں کو ان کے اعمال سے اور خود کو اپنی نیتوں سے جانچتے ہیں۔

one_liner: ہم دوسروں کو ان کے اعمال سے، خود کو اپنی نیتوں سے جانچتے ہیں۔

try_this:
  - جب کوئی آپ کو مایوس کرے، تو پوچھیں: اس کی وضاحت کے لیے کون سے صورتحال کے عوامل ہو سکتے ہیں؟
  - دوسروں کے ساتھ وہی سخاوت کا اطلاق کریں جو آپ خود پر کرتے ہیں۔
  - جب آپ دوسروں کے رویے کو حالات کے بجائے کردار سے منسوب کر رہے ہوں تو اس پر توجہ دیں۔

ask_yourself:
  - کیا میں اپنے رویے کی ویسے ہی وضاحت کروں گا جیسے میں ان کے رویے کی وضاحت کر رہا ہوں؟
  - ان کی صورتحال کے بارے میں میں کیا چیز یاد کر رہا ہوں گا؟

in_more_detail: |
  جب کوئی ہمیں ٹریفک میں کاٹتا ہے، تو ہم سوچتے ہیں "کیا بدتمیز آدمی ہے"۔ جب ہم کسی کو کاٹتے ہیں، تو ہم سوچتے ہیں "مجھے ایسا کرنا پڑا—میں جلدی میں تھا۔" ہم اپنی ناکامیوں کی وضاحت حالات سے کرتے ہیں ("ٹریفک بہت خراب تھی") اور دوسروں کی ناکامیوں کی وضاحت ان کی فطرت سے کرتے ہیں ("وہ سست ہیں")۔ کامیابی کے لیے اس کے برعکس ہوتا ہے: ہم خود کو کریڈٹ دیتے ہیں، ہم دوسروں کی کامیابی کو قسمت سے منسوب کرتے ہیں۔

  یہ غلطی "بنیادی" ہے کیونکہ یہ وسیع اور مستقل ہے۔ یہ ہمدردی کو کمزور کرتی ہے، تنازعات کو ہوا دیتی ہے، اور کارکردگی کی تشخیص کو مسخ کرتی ہے۔

why_this_is_important: |
  بنیادی استناد کی غلطی کو تسلیم کرنے سے تعلقات بہتر ہوتے ہیں، تنازعات کم ہوتے ہیں، اور منصفانہ فیصلے ہوتے ہیں۔ یہ کسی کے "ہونے" کے بارے میں نتیجہ اخذ کرنے سے پہلے سیاق و سباق پر غور کرنے کی ترغیب دیتا ہے۔

when_to_use:
  - تعلقات_بنانا
  - تنازعہ_حل_کرنا
  - قیادت
  - فیصلہ_کرنا

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    "وہ بس اسی قسم کے شخص ہیں" دوسروں کے رویے کی وضاحت کرتے وقت۔
  situational_explanation_for_self: |
    "میرا کوئی چارہ نہیں تھا" یا "حالات نے مجھے مجبور کیا" جب اپنے رویے کی وضاحت کر رہے ہوں۔
  character_vs_context: |
    کردار کا مفروضہ قائم کرنا جب صورتحال رویے کی وضاحت کر سکتی ہو۔
  asymmetric_standards: |
    خود پر لاگو کرنے والے معیارات سے زیادہ دوسروں پر سخت معیارات لاگو کرنا۔

examples:
  traffic: |
    دوسرے ڈرائیور کی غلطی = "برا ڈرائیور"۔ ہماری غلطی = "ناگزیر صورتحال"۔
  workplace: |
    ساتھی کی میعاد ختم شدہ ڈیڈلائن = "غیر ذمہ دار"۔ ہماری میعاد ختم شدہ ڈیڈلائن =
    "بہت زیادہ کام اور کوئی بھی بہتر نہیں کر سکتا تھا۔"
  politics: |
    مخالفین کے خیالات = "وہ بیوقوف یا بدکار ہیں"۔ ہمارے خیالات =
    "حقائق کا عقلی جواب"۔
  performance: |
    دوسروں کی کامیابی = "قسمت"۔ ہماری کامیابی = "سخت محنت سے حاصل کی گئی"۔

real_world_implications: |
  بنیادی استناد کی غلطی تنازعات کو ہوا دیتی ہے، ٹیم ورک کو کمزور کرتی ہے، اور بھرتی اور کارکردگی کی تشخیص کو مسخ کرتی ہے۔ اس کو درست کرنے سے تنظیمی ثقافت اور ذاتی تعلقات بہتر ہوتے ہیں۔

professional_application:
  networking_and_relationship_building: |
    جب کوئی آپ کو مایوس کرے، تو اس نتیجے پر پہنچنے سے پہلے کہ وہ ناقابل اعتبار یا مشکل ہیں، پوچھیں "اس کی وضاحت کے لیے کون سے صورتحال کے عوامل ہو سکتے ہیں؟"
  collaborative_learning_initiative: |
    فیڈ بیک اور ریویو میں، "پہلے صورتحال" کی تشریحات کی حوصلہ افزائی کریں۔
    مینیجرز کو کردار سے منسوب کرنے سے پہلے سیاق و سباق پر غور کرنے کی تربیت دیں۔

how_can_this_be_misapplied:
  excusing_all_behavior: |
    ہر عمل کو "صورتحال کے مطابق" سمجھ کر مسترد کرنا جب کچھ رویے کردار کی عکاسی کرتے ہیں۔
  no_accountability: |
    لوگوں کو ان کے کیے گئے انتخاب کے لیے جوابدہ ٹھہرانے سے بچنے کے لیے غلطی کا استعمال کرنا۔
  self_deprecation: |
    خود کو ہمیشہ قصور وار ٹھہرانے اور کبھی دوسروں کی ذمہ داری کو تسلیم نہ کرنے کے لیے زیادہ سے زیادہ درست کرنا۔
  ignoring_patterns: |
    جب کوئی صورتحال سے قطع نظر بار بار برا سلوک کرتا ہے، تو فطرت متعلقہ ہو سکتی ہے۔

