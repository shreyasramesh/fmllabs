# Mere Exposure Effect
# Mental Model / Cognitive Bias - Example Entry

id: mere_exposure_effect
name: محض نمائش کا اثر

quick_introduction: |
  محض نمائش کا اثر یہ رجحان ہے کہ چیزوں کے ساتھ ترجیح پیدا ہو جاتی ہے
  صرف اس لیے کہ ہم ان سے واقف ہیں۔ بار بار نمائش - بغیر کسی
  توثیق کے بھی - پسندیدگی میں اضافہ کرتی ہے۔ ہم وہی پسند کرتے ہیں جسے ہم جانتے ہیں۔

one_liner: واقفیت پسندیدگی کو جنم دیتی ہے - ہم وہی پسند کرتے ہیں جو ہم نے پہلے دیکھا ہے۔

try_this:
  - پوچھیں: کیا میں اسے اس لیے پسند کرتا ہوں کہ یہ اچھا ہے، یا اس لیے کہ یہ واقف ہے؟
  - اختیارات کا جائزہ لیتے وقت، نمائش کے لیے درست کریں - نئی چیزیں نقصان میں شروع ہوتی ہیں۔
  - جب دہرائی جانے والی چیز آپ کی ترجیح کو متاثر کر رہی ہو تو اس پر توجہ دیں۔

ask_yourself:
  - کیا میں کسی چیز کو بنیادی طور پر اس لیے ترجیح دے رہا ہوں کیونکہ میں نے اسے پہلے دیکھا ہے؟
  - کیا میں مختلف انتخاب کرتا اگر نمائش برابر ہوتی؟

in_more_detail: |
  رابرٹ زاجونک نے دکھایا کہ محرکات (چہرے، الفاظ، شکلیں) کی بار بار نمائش
  ان کی طرف مثبت جذبات کو بڑھاتی ہے - یہاں تک کہ جب ہم نمائش سے شعوری طور پر
  آگاہ نہ ہوں۔ واقفیت پسندیدگی کو جنم دیتی ہے، ناپسندیدگی کو نہیں (بہت سے
  معاملات میں)۔ یہ اثر اس وقت زیادہ ہوتا ہے جب ہم تجزیہ نہیں کر رہے ہوتے اور جب نمائش
  لطیف ہوتی ہے۔

  محض نمائش کا اثر برانڈ کی ترجیح، باہمی کشش، اور جمالیاتی فیصلے کو متاثر کرتا ہے۔
  یہ بتاتا ہے کہ ہم واقف موسیقی کو کیوں ترجیح دیتے ہیں، اشتہارات دہرائے جانے سے کیوں کام کرتے ہیں،
  اور ہم ان لوگوں کو کیوں ترجیح دے سکتے ہیں جنہیں ہم نے پہلے دیکھا ہے - یہاں تک کہ بغیر کسی تعامل کے۔

why_this_is_important: |
  محض نمائش کے اثر کو پہچاننا آپ کو اپنی ترجیحات کو سمجھنے اور دہرائی جانے والی
  چیزوں کے ذریعے ہیرا پھیری سے بچنے میں مدد کرتا ہے۔ یہ یہ بھی بتاتا ہے کہ تعلقات اور
  برانڈز کے لیے مرئیت اور موجودگی کیوں اہمیت رکھتی ہے۔ واقفیت ایک طاقتور لیکن اکثر
  غیر شعوری اثر ہے۔

when_to_use:
  - تعلقات_بنانا
  - فیصلہ_کرنا
  - قیادت
  - سیکھنا

how_can_you_spot_it:
  familiarity_preference: |
    نئی چیزوں کے مقابلے میں پہلے دیکھی گئی چیزوں کو ترجیح دینا۔
  repetition_influence: |
    دہرائی جانے والی نمائش بغیر کسی واضح قائل کرنے کے پسندیدگی میں اضافہ کرتی ہے۔
  unconscious_influence: |
    یہ اثر اس وقت بھی کام کرتا ہے جب ہم نمائش سے ناواقف ہوتے ہیں۔
  brand_recognition: |
    واقف برانڈز کو ترجیح دی جاتی ہے یہاں تک کہ جب ہم واضح نہیں کر سکتے کہ کیوں۔

examples:
  advertising: |
    کسی برانڈ کی بار بار نمائش ترجیح میں اضافہ کرتی ہے - بغیر کسی
    قائل کرنے والے پیغام کے بھی۔
  music: |
    وہ گانے جو ہم نے پہلے سنے ہیں، پہلی بار سننے پر نئے گانوں کے مقابلے میں زیادہ پسند کیے جاتے ہیں۔
  people: |
    ہم ان لوگوں کو زیادہ پسند کرتے ہیں جنہیں ہم نے بار بار دیکھا ہے (مثلاً، کلاس میٹ،
    ساتھی) اجنبیوں کے مقابلے میں - یہاں تک کہ بغیر کسی تعامل کے بھی۔
  ideas: |
    وہ خیالات جن کا ہم نے پہلے سامنا کیا ہے، نئے خیالات کے مقابلے میں زیادہ آرام دہ اور
    قابل اعتبار محسوس ہوتے ہیں۔

real_world_implications: |
  محض نمائش کا اثر صارفین کے رویے، سیاسی ترجیحات، اور سماجی کشش کو تشکیل دیتا ہے۔
  اس کا مارکیٹنگ میں استحصال کیا جاتا ہے اور واقف چیزوں کو غیر منصفانہ فوائد حاصل ہو سکتے ہیں۔
  یہ یہ بھی بتاتا ہے کہ نمائش کی مختلف قسم کیوں اہم ہے - فرق سے واقفیت تعصب کو کم کرتی ہے۔

professional_application:
  networking_and_relationship_building: |
    مرئیت اہم ہے۔ حاضر رہنا، موجود ہونا، اور نظر آنا واقفیت پیدا کرتا ہے جو پسندیدگی کو بڑھاتا ہے۔
    بار بار کم خطرے والے رابطے کی قدر کو کم نہ سمجھیں۔
  collaborative_learning_initiative: |
    لوگوں کو بار بار مختلف نظریات اور لوگوں سے متعارف کروائیں -
    واقفیت تعصب کو کم کر سکتی ہے۔ لیکن ہوشیار رہیں کہ محض نمائش
    موجودہ صورتحال کے لیے ترجیح کو بھی مضبوط کر سکتی ہے۔

how_can_this_be_misapplied:
  manipulation: |
    بغیر رضامندی کے ترجیحات میں ہیرا پھیری کرنے کے لیے جان بوجھ کر بار بار نمائش پیدا کرنا۔
  false_familiarity: |
    یہ فرض کرنا کہ واقفیت کا مطلب معیار ہے - بعض اوقات نئے
    اختیارات بہتر ہوتے ہیں۔
  exclusion: |
    اگر صرف مخصوص لوگوں کو ہی نمائش ملے، تو انہیں غیر منصفانہ
    فائدہ حاصل ہوگا۔ غور کریں کہ مرئیت کس کی رسائی میں ہے۔
  stagnation: |
    واقفیت پر زیادہ انحصار کرنا اور کبھی بھی نئی چیزیں نہ آزمانا۔

