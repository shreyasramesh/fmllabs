# دائرہ اختیار
# ذہنی ماڈل / علمی تعصب - مثال اندراج

id: circle_of_competence
name: دائرہ اختیار

quick_introduction: |
  دائرہ اختیار ایک ذہنی ماڈل ہے جو آپ کو اپنی مہارت کی حدود جاننے اور اہم فیصلے کرتے وقت ان کے اندر رہنے پر زور دیتا ہے۔ وارن بفٹ اور چارلی منگر اس بات پر زور دیتے ہیں کہ آپ جو نہیں جانتے اسے جانیں۔

one_liner: اپنی مہارت کی حدود جانیں — اور جب یہ اہم ہو تو ان کے اندر رہیں۔

try_this:
  - نقشہ بنائیں کہ آپ کہاں حقیقی مہارت رکھتے ہیں بمقابلہ کہاں آپ اندازہ لگا رہے ہیں۔
  - جب آپ اپنے دائرہ سے باہر ہوں، تو مشورہ طلب کریں یا کام سونپیں۔
  - ایماندار بنیں: کیا کوئی حقیقی ماہر آپ کے فیصلے سے متفق ہوگا؟

ask_yourself:
  - کیا میں اپنے دائرہ اختیار کے اندر ہوں، یا میں اندازہ لگا رہا ہوں؟
  - میں نے اس شعبے میں آخری بار "میں نہیں جانتا" کب تسلیم کیا؟

in_more_detail: |
  ہر شخص کے پاس ایسے شعبے ہوتے ہیں جہاں وہ حقیقی مہارت رکھتے ہیں — جہاں وہ معلومات کا جائزہ لے سکتے ہیں، غلطیاں پکڑ سکتے ہیں، اور قابل اعتماد فیصلے کر سکتے ہیں۔ اس دائرہ سے باہر، وہ کسی دوسرے کی طرح تعصبات اور غلطیوں کا شکار ہوتے ہیں۔ کلید ایماندار خود کا تجزیہ ہے: آپ کہاں واقعی قابل ہیں، اور کہاں آپ اندازہ لگا رہے ہیں؟

  دائرہ جان بوجھ کر سیکھنے کے ذریعے بڑھ سکتا ہے، لیکن اس کی موجودہ حدود کو پہچاننے کے لیے عاجزی کی ضرورت ہوتی ہے۔ اپنے دائرہ سے باہر کام کرنے سے مہنگے غلطیوں کے خطرات بڑھ جاتے ہیں، خاص طور پر جب داؤ پر لگا ہو تو۔

why_this_is_important: |
  اپنے دائرہ اختیار کے اندر رہنے سے مہنگی غلطیاں کم ہوتی ہیں اور فیصلے کا معیار بہتر ہوتا ہے۔ یہ آپ کو یہ جاننے میں بھی مدد کرتا ہے کہ کب مشورہ طلب کرنا ہے، کام سونپنا ہے، یا دستبردار ہونا ہے۔ اپنے دائرہ سے باہر زیادہ اعتماد ناکامی کا ایک بڑا ذریعہ ہے۔

