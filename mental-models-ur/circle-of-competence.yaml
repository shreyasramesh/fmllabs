how_can_you_spot_it:
  honest_boundary_assessment: |
    کیا آپ کسی شعبے میں اپنے علم کی حدود بیان کر سکتے ہیں؟ کیا آپ جانتے ہیں کہ آپ کیا نہیں جانتے؟
  knowing_when_to_defer: |
    ایسی صورتحال کو پہچاننا جہاں آپ کو اکیلے فیصلہ کرنے کے بجائے ماہر کی رائے طلب کرنی چاہئے۔
  consistent_track_record: |
    آپ کے دائرہ کے اندر، آپ کے فیصلے وقت کے ساتھ درست ثابت ہوتے ہیں؛ باہر، وہ نہیں۔
  calibration: |
    کسی شعبے میں آپ کا اعتماد اس شعبے میں آپ کی حقیقی کارکردگی سے میل کھاتا ہے۔

examples:
  investing: |
    بفٹ ٹیکنالوجی اسٹاک سے گریز کرتے ہیں کیونکہ وہ کہتے ہیں کہ وہ ان کے دائرہ اختیار سے باہر ہیں — وہ ان کا قابل اعتماد اندازہ نہیں لگا سکتے۔
  career: |
    ایک ماہر جو اپنے شعبے میں رہتا ہے بمقابلہ وہ جو ایک غیر متعلقہ علاقے میں "اسٹریچ" کردار ادا کرتا ہے۔
  hiring: |
    یہ جاننا کہ کب اپنی رائے پر انحصار کرنا ہے بمقابلہ تکنیکی کرداروں کے لیے ماہرین کو لانا ہے۔
  advice_giving: |
    اندازہ لگانے کے بجائے اپنی مہارت سے باہر کے موضوعات پر رائے دینے سے انکار کرنا۔

real_world_implications: |
  دائرہ اختیار ویلیو انویسٹنگ اور پیشہ ورانہ کامیابی کا مرکزی حصہ ہے۔ اسے نظر انداز کرنے سے زیادہ اعتماد، ناکام منصوبے، اور ناقص مشورہ ہوتا ہے۔ دائرہ کو بڑھانے کے لیے جان بوجھ کر کوشش اور ایماندار فیڈ بیک کی ضرورت ہوتی ہے۔

professional_application:
  networking_and_relationship_building: |
    ان لوگوں کے ساتھ تعلقات بنائیں جن کے دائرہ اختیار آپ کے ساتھ تکمیل کرتے ہیں۔ جانیں کہ کب دوسروں کا تعارف کرانا ہے بجائے خود جواب دینے کے۔
  collaborative_learning_initiative: |
    اوورلیپنگ اور مکمل دائروں والی ٹیمیں بنائیں۔ لوگوں کی حوصلہ افزائی کریں کہ وہ بتائیں جب وہ اپنی صلاحیت سے باہر کام کر رہے ہوں۔

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    کبھی بھی اپنے دائرہ سے باہر نہ نکلنا ترقی اور سیکھنے کو محدود کر سکتا ہے۔
  false_modesty: |
    جوابدہی یا مشکل فیصلوں سے بچنے کے لیے ایک چھوٹا دائرہ ہونے کا دعویٰ کرنا۔
  gatekeeping: |
    دلیل میں شامل ہوئے بغیر دوسروں کو رد کرنے کے لیے "دائرہ اختیار" کا استعمال کرنا۔
  stagnation: |
    دائرہ کو ایک ایسی چیز کے طور پر برتاؤ کرنا جو مقرر ہے بجائے اس کے کہ وہ کوشش سے بڑھ سکتی ہے۔

