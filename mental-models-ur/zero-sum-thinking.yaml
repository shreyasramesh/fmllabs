# زیرو سم سوچ
# ذہنی ماڈل / علمی تعصب - مثال اندراج

id: zero_sum_thinking
name: زیرو سم سوچ

quick_introduction: |
  زیرو سم سوچ یہ یقین ہے کہ ایک شخص کا فائدہ دوسرے کا نقصان ہونا چاہیے —
  کہ وسائل مقرر ہیں اور آپ کے لیے کوئی بھی فائدہ میرے لیے نقصان کا باعث ہے۔
  حقیقت میں، بہت سی صورتیں مثبت سم ہوتی ہیں: دونوں فریق فائدہ اٹھا سکتے ہیں۔

one_liner: آپ کا فائدہ میرا نقصان ہونا ضروری نہیں — بہت سی صورتیں مثبت سم ہوتی ہیں۔

try_this:
  - پوچھیں: کیا ہم پائی کو بڑھا سکتے ہیں؟ کیا یہ واقعی زیرو سم ہے؟
  - مقابلہ فرض کرنے سے پہلے تعاون کی تلاش کریں۔
  - جب آپ کسی صورتحال کو فکسڈ پائی سمجھ رہے ہوں تو اسے نوٹ کریں جب کہ وہ نہ ہو۔

ask_yourself:
  - کیا میں فکسڈ پائی فرض کر رہا ہوں جب ہم اسے بڑھا سکتے ہیں؟
  - کیا تعاون مقابلے سے زیادہ قدر پیدا کرے گا؟

in_more_detail: |
  زیرو سم گیم میں، کل مقرر ہوتا ہے — آپ کا فائدہ میرا نقصان ہے۔ مثبت سم
  صورتحال میں، تعاون قدر پیدا کرتا ہے۔ تجارت، جدت، اور تعلقات
  کی تعمیر اکثر مثبت سم ہوتی ہیں۔ زیرو سم سوچ غیر ضروری کی طرف لے جاتی ہے
  مقابلہ، تعاون کے مواقع ضائع، اور تباہ کن
  رقیبت۔

  یہ تعصب مذاکرات، سیاست، اور تنظیمی حرکیات میں عام ہے۔
  یہ فکسڈ پائی فرض کرتا ہے جب پائی اکثر بڑھائی جا سکتی ہے۔ یہ بن سکتا ہے
  خود کو پورا کرنے والا: اگر آپ دوسروں کو دشمن کے طور پر پیش کرتے ہیں، تو وہ دشمن بن جاتے ہیں۔

why_this_is_important: |
  زیرو سم سوچ کو تسلیم کرنا تعاون اور
  قدر کی تخلیق کے مواقع کھولتا ہے۔ یہ مذاکرات کو بہتر بناتا ہے، تنازعہ کو کم کرتا ہے، اور قابل بناتا ہے
  جیت کی صورتحال۔ بہترین مواقع میں سے بہت سی مثبت سم ہیں۔

when_to_use:
  - مذاکرات
  - قیادت
  - تعلقات_کی_تعمیر
  - فیصلے_کرنا

how_can_you_spot_it:
  fixed_pie_assumption: |
    "اگر وہ جیت گئے، تو میں ہار جاؤں گا" جب صورتحال دونوں کو فائدہ اٹھانے کی اجازت دے سکتی ہے۔
  competitive_ framing: |
    صورتحال کو خود بخود ہم بمقابلہ وہ کے طور پر فریم کرنا۔
  envy_of_others_gains: |
    دوسروں کی کامیابی پر حسد کرنا گویا کہ یہ آپ کی کامیابی کو کم کرتی ہے۔
  missed_cooperation: |
    سب کے لیے فائدہ مند تعاون کے مواقع دیکھنے میں ناکام ہونا۔

examples:
  negotiation: |
    یہ فرض کرنا کہ دوسرے فریق کے لیے ایک بہتر سودا آپ کے لیے ایک بدتر سودا ہے — جب کہ تخلیقی حل اکثر دونوں کے لیے قدر بڑھاتے ہیں۔
  salary: |
    "اگر میرے ساتھی کو تنخواہ میں اضافہ ملا، تو میرے لیے کم ہے" جب بجٹ لچکدار ہو سکتا ہے یا پیدا کی گئی قدر کی وجہ سے اضافے کو درست ٹھہرایا جا سکتا ہے۔
  politics: |
    "ان کی جماعت کے فوائد ہمارے نقصانات ہیں" جب بہت سے پالیسی نتائج متعدد گروہوں کو فائدہ پہنچا سکتے ہیں۔
  career: |
    "ان کی ترقی کا مطلب میرے لیے کم موقع ہے" جب تنظیمی ترقی ہر کسی کے لیے زیادہ مواقع پیدا کر سکتی ہے۔

real_world_implications: |
  زیرو سم سوچ تنازعہ کو ہوا دیتی ہے، تعاون کو محدود کرتی ہے، اور ضائع شدہ مواقع کا سبب بنتی ہے۔ یہ اکثر
  معیشت، تعلقات، اور
  جدت میں غلط ہوتا ہے۔ مثبت سم فریم کی طرف منتقل کرنے سے نتائج بہتر ہوتے ہیں۔

professional_application:
  networking_and_relationship_building: |
    دوسروں کے لیے قدر پیدا کرنے کے طریقے تلاش کریں — ان کی کامیابی آپ کے لیے
    مواقع پیدا کر سکتی ہے۔ ایسے تعلقات بنائیں جہاں دونوں فریقوں کو فائدہ ہو۔
  collaborative_learning_initiative: |
    ٹیم کے مقاصد کو مثبت سم کے طور پر فریم کریں: مشترکہ کامیابی، پائی کو بڑھانا۔
    داخلی مقابلے کے بجائے تعاون کی حوصلہ افزائی کریں۔

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    کچھ صورتیں زیرو سم ہوتی ہیں (مثلاً، ایک ہی پروموشن، ایک مقررہ بجٹ)۔
    اس کے برعکس بہانے کو ناپختہ پن سمجھا جا سکتا ہے۔
  naive_cooperation: |
    یہ فرض کرنا کہ ہر کوئی تعاون کرے گا جب کچھ اداکار واقعی
    دشمن ہوں۔
  undervaluing_competition: |
    مقابلہ بہتری کو فروغ دے سکتا ہے؛ ہر رقیبت تباہ کن نہیں ہوتی۔
  exploitation: |
    "مثبت سم" فریم کا استعمال دوسروں سے قدر نکالنے کے لیے جو فائدہ نہیں اٹھاتے۔

