# Inversion
# Mental Model / Cognitive Bias - Example Entry

id: inversion
name: الٹنا (Inversion)

quick_introduction: |
  الٹنا ایک مسئلہ حل کرنے کی تکنیک ہے جو سوال کو الٹ کر پیش کرتی ہے۔ "میں کیسے کامیاب ہو سکتا ہوں؟" پوچھنے کے بجائے، آپ پوچھتے ہیں "کیا مجھے ناکام بنا دے گا؟" اور ان چیزوں سے گریز کرتے ہیں۔ یہ ان خطرات اور مخالف نمونوں کو سامنے لاتا ہے جنہیں آگے کی سوچ اکثر نظر انداز کر دیتی ہے۔

one_liner: الٹیں—پوچھیں کہ کیا آپ کو ناکام بنا دے گا، پھر ان چیزوں سے گریز کریں۔

try_this:
  - کسی بھی مقصد کے لیے، ناکامی کے اہم طریقے درج کریں — پھر ان سے گریز کریں۔
  - منفی تصور کا استعمال کریں: کیا اس کو غلط کر دے گا؟
  - پوچھیں: کوئی ہوشیار شخص اسے خراب کرنے کے لیے کیا کرے گا؟

ask_yourself:
  - کیا میں نے اس چیز کے بارے میں سوچا ہے جو اسے ناکام بنا دے گی؟
  - آگے کی سوچ کر میں کیا نظر انداز کر رہا ہوں؟

in_more_detail: |
  چارلی منگر نے اسے مقبول بنایا اور یہ ریاضی کی منطق پر مبنی ہے۔ الٹنا اس حقیقت کا فائدہ اٹھاتا ہے کہ ناکامی سے گریز کرنا اکثر کامیابی کے حصول سے آسان ہوتا ہے۔ اگر آپ ناکامی کے اہم طریقے پہچان سکتے ہیں، تو آپ انہیں منظم طریقے سے ختم کر سکتے ہیں۔

  کارل جیکوبی نے مبینہ طور پر کہا، "الٹنا، ہمیشہ الٹنا۔" سٹویوں نے منفی تصور کا استعمال کیا—نقصان کا تصور کرنا—جو ان کے پاس تھا اس کی تعریف کرنے اور مشکلات کے لیے تیار رہنے کے لیے۔ الٹنا مایوسی نہیں ہے؛ یہ رکاوٹوں کو دور کر کے ترقی کرنے کا ایک منظم طریقہ ہے۔

why_this_is_important: |
  الٹنا آپ کو تباہ کن غلطیوں سے بچنے، منصوبوں کو جانچنے اور غیر واضح حل تلاش کرنے میں مدد کرتا ہے۔ یہ تنقیدی ناکامی کے طریقوں کو نظر انداز نہ کرنے کو یقینی بنا کر آگے کی منصوبہ بندی کی تکمیل کرتا ہے۔

when_to_use:
  - مسئلہ_حل_کرنا (problem_solving)
  - فیصلہ_سازی (decision-making)
  - خطرہ_تشخیص (risk_assessment)
  - کیریئر_کی_حرکتیں (career_moves)

how_can_you_spot_it:
  premortem_thinking: |
    کسی پروجیکٹ سے پہلے، یہ پوچھنا کہ "یہ ناکام کیوں ہوا؟" گویا یہ پہلے ہی ہو چکا ہو۔
  anti_goals: |
    آپ جو حاصل کرنا چاہتے ہیں اسے واضح طور پر بیان کرنے کے ساتھ ساتھ آپ جو بچانا چاہتے ہیں اس کی تعریف کرنا۔
  reverse_engineering_failure: |
    صرف کامیابیوں کا مطالعہ کرنے کے بجائے سبق حاصل کرنے کے لیے ناکام کیسز کا مطالعہ کرنا۔
  constraint_focus: |
    بڑھوتری کے لیے بہتر بنانے سے پہلے رکاوٹوں اور تنگ گلیوں کی نشاندہی کرنا۔

examples:
  investing: |
    "یہ اسٹاک اوپر کیوں جائے گا؟" پوچھنے کے بجائے، پوچھیں "مجھے پیسہ کیوں کھوئے گا؟"
    اور ان منظرناموں سے گریز کریں۔
  career: |
    "میری ساکھ کو کیا تباہ کر دے گا؟" سے بچنے والے طرز عمل کی فہرست بنتی ہے۔
  product_launch: |
    "زیادہ تر پراڈکٹ لانچ کیوں ناکام ہوتے ہیں؟" لانچ سے پہلے حل کرنے کے لیے خطرات سامنے لاتا ہے۔
  health: |
    "کون سی عادتیں زندگی کو مختصر کرتی ہیں؟" "کیا مجھے صحت مند بناتا ہے؟" کے مقابلے میں بچاؤ کی ایک واضح فہرست دیتا ہے۔

real_world_implications: |
  الٹنا انجینئرنگ (ناکامی کے طریقوں کا تجزیہ)، سرمایہ کاری اور حکمت عملی میں استعمال ہوتا ہے۔
  یہ زیادہ خود اعتمادی کو کم کرتا ہے اور خطرہ انتظام کو بہتر بناتا ہے۔ زیادہ انحصار ضرورت سے زیادہ احتیاط کا باعث بن سکتا ہے۔

professional_application:
  networking_and_relationship_building: |
    "اس رشتے کو کیا نقصان پہنچائے گا؟" آپ کو اعتماد توڑنے والے طرز عمل سے بچنے میں مدد کرتا ہے۔
  collaborative_learning_initiative: |
    پروجیکٹس پر پریمورٹم چلائیں: "یہ ناکام ہو گیا۔ کیوں؟" منصوبہ بندی اور عمل درآمد کو بہتر بنانے کے لیے جوابات استعمال کریں۔

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    صرف ناکامی سے بچنے پر توجہ دینے سے عمل سست ہو سکتا ہے اور ضروری خطرات مول لینے سے روکا جا سکتا ہے۔
  negativity_bias: |
    اگر آگے کی سوچ اور مواقع کی شناخت کے ساتھ متوازن نہ کیا جائے تو الٹنا منفی تعصب کو بڑھا سکتا ہے۔
  analysis_paralysis: |
    ناکام ہونے کے طریقوں پر اتنا وقت صرف کرنا کہ آپ کبھی عمل درآمد نہ کریں۔
  missing_upside: |
    الٹنا یہ نہیں بتاتا کہ کیا کرنا ہے — صرف کیا بچنا ہے۔ آپ کو اب بھی مثبت مقاصد کی ضرورت ہے۔

