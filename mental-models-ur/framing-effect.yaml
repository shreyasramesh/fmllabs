# فریمینگ اثر
# مینٹل ماڈل / کاگنیٹو بائس - مثال اندراج

id: framing_effect
name: فریمینگ اثر

quick_introduction: |
  فریمینگ اثر اس رجحان کا نام ہے جس میں ہمارے فیصلے اس بات پر منحصر ہوتے ہیں کہ اختیارات کس طرح پیش کیے جاتے ہیں—یہاں تک کہ جب بنیادی حقائق یکساں ہوں۔ "90% بقا" اور "10% موت" ایک ہی نتیجے کو بیان کرتے ہیں لیکن مختلف انتخاب کو جنم دیتے ہیں۔ فریم فیصلے کو شکل دیتا ہے۔

one_liner: ایک ہی حقائق، مختلف فریم میں، مختلف فیصلوں کی طرف لے جاتے ہیں۔

try_this:
  - فیصلہ کرنے سے پہلے اختیارات کو کئی طریقوں سے دوبارہ فریم کریں — گین فریم اور لاس فریم۔
  - اس بات پر توجہ دیں کہ جب آپ کی پسند کسی چیز کی الفاظ کی تبدیلی کی وجہ سے بدل جاتی ہے۔
  - پوچھیں: فریم سے ہٹ کر، بنیادی حقائق کیا ہیں؟

ask_yourself:
  - کیا میں اس کے فائدے بمقابلہ نقصان کے طور پر فریم کیے جانے پر مختلف فیصلہ کروں گا؟
  - کیا میں فریم پر رد عمل ظاہر کر رہا ہوں یا اصل نتیجے پر؟

in_more_detail: |
  کاہن مین اور ٹورسکی نے دکھایا کہ جب اختیارات کو فوائد کے طور پر فریم کیا جاتا ہے تو لوگ نقصان سے بچنے والے ہوتے ہیں اور جب انہیں نقصانات کے طور پر فریم کیا جاتا ہے تو وہ نقصان اٹھانے کے لیے زیادہ تیار ہوتے ہیں—یہاں تک کہ ایک ہی نتائج کے لیے بھی۔ مثبت فریمینگ ("200 جانیں بچائیں") بمقابلہ منفی فریمینگ ("400 مر جائیں گے") ترجیحات کو بدل دیتا ہے۔ نقصان کے فریم مساوی فوائد کے فریموں سے زیادہ مضبوط جذباتی رد عمل پیدا کرتے ہیں۔

  فریمینگ اثر طبی فیصلوں، پالیسی، مارکیٹنگ اور مذاکرات کو متاثر کرتا ہے۔ یہ سب سے طاقتور اور اچھی طرح سے دستاویزی تعصبات میں سے ایک ہے۔ آگاہی مددگار ہے، لیکن اسے پوری طرح سے قابو پانا مشکل ہے۔

why_this_is_important: |
  فریمینگ اثر کو تسلیم کرنا آپ کو زیادہ مستقل فیصلے کرنے، ہیرا پھیری کا مقابلہ کرنے اور زیادہ مؤثر طریقے سے بات چیت کرنے میں مدد کرتا ہے۔ یہ یہ بھی بتاتا ہے کہ ایک ہی پیشکش کو پیش کرنے کے طریقے پر منحصر قبول یا مسترد کیا جا سکتا ہے۔

when_to_use:
  - فیصلہ_سازی
  - مذاکرات
  - قیادت
  - رسک_تشخیص

how_can_you_spot_it:
  gain_loss_asymmetry: |
    ایک ہی نتیجے کو فوائد بمقابلہ نقصانات کے طور پر فریم کرنے سے مختلف انتخاب پیدا ہوتے ہیں۔
  presentation_dependence: |
    جب صرف فریم بدلتا ہے، مادے میں نہیں، تو فیصلے بدل جاتے ہیں۔
  default_influence: |
    اختیارات کو کس طرح ترتیب دیا یا لیبل کیا گیا ہے، یہ انتخاب کو متاثر کرتا ہے۔
  emotional_trigger: |
    بعض فریم مضبوط جذباتی رد عمل کو جنم دیتے ہیں۔

examples:
  medical: |
    ایک ہی طریقہ کار کے لیے "90% بقا" بمقابلہ "10% موت" —
    لوگ فریم کی بنیاد پر مختلف انتخاب کرتے ہیں۔
  sales: |
    "$50 بچائیں" بمقابلہ " $50 نہ گنوائیں"—مساوی فریم، مختلف
    نفسیاتی اثر۔
  policy: |
    "ٹیکس ریلیف" بمقابلہ "حکومتی اخراجات"—ایک ہی پالیسی، مختلف
    سیاسی رد عمل۔
  negotiation: |
    پیشکش کو " چھوٹ" بمقابلہ "سرچارج سے بچنا" کے طور پر پیش کرنا
    قبولیت کی شرح کو بدل دیتا ہے۔

real_world_implications: |
  فریمینگ اثر کا استحصال اشتہارات، سیاست اور
  مذاکرات میں کیا جاتا ہے۔ یہ طبی فیصلوں اور پالیسی کی حمایت کو متاثر کرتا ہے۔
  دوبارہ فریم کرنے سے فیصلے اور بات چیت بہتر ہو سکتی ہے۔ باخبر رہنا
  مدد کرتا ہے لیکن اثر کو مکمل طور پر ختم نہیں کرتا۔

professional_application:
  networking_and_relationship_building: |
    جب اختیارات پیش کر رہے ہوں، تو متعدد فریم پر غور کریں۔ تجربہ کریں کہ
    مختلف فریم کس طرح استقبال کو متاثر کرتے ہیں۔ معلومات وصول کرتے وقت،
    پوچھیں "اسے اور کس طرح فریم کیا جا سکتا ہے؟"
  collaborative_learning_initiative: |
    فیصلہ سازی میں، فریمینگ اثرات کی جانچ کے لیے اختیارات کو واضح طور پر دوبارہ فریم کریں۔
    "اگر ہم نے اسے نقصان کے طور پر فریم کیا، تو کیا ہم مختلف فیصلہ کریں گے؟"
    منصفانہ ہونے کے لیے مستقل فریم کا استعمال کریں۔

how_can_this_be_misapplied:
  manipulation: |
    لوگوں کو ان کی آگاہی کے بغیر مطلوبہ نتائج کی طرف موڑنے کے لیے جان بوجھ کر فریم کرنا۔
  false_equivalence: |
    یہ فرض کرنا کہ تمام فریم برابر طور پر درست ہیں جب کہ کچھ اہم
    معلومات کو چھپاتے ہیں۔
  overcorrection: |
    فریمینگ کو مکمل طور پر نظر انداز کرنا اور یہ فرض کرنا کہ یہ کوئی معنی نہیں رکھتا —
    یہ رکھتا ہے۔
  spin: |
    واضح کرنے کے بجائے گمراہ کرنے کے لیے فریمینگ کا استعمال کرنا۔

