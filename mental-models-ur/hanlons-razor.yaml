# ہینلون کا استرا
# ذہنی ماڈل / علمی تعصب - مثال اندراج

id: hanlons_razor
name: ہینلون کا استرا

quick_introduction: |
  ہینلون کے استرا کا کہنا ہے: "بدنیتی کو کبھی بھی اس کی وجہ سے منسوب نہ کریں جو جہالت کی وجہ سے بخوبی سمجھائی جا سکتی ہے۔" دوسرے الفاظ میں، جب نااہلی، غفلت، یا لاعلمی رویے کی وضاحت کر سکتی ہو تو بری نیت کا تصور نہ کریں۔

one_liner: بدنیتی کا تصور اس وقت نہ کریں جب نااہلی یا غفلت اس کی وضاحت کر سکتی ہو۔

try_this:
  - جب کوئی آپ کو مایوس کرے، تو پوچھیں: کیا یہ غلطی یا لاعلمی سے سمجھایا جا سکتا ہے؟
  - بری نیت کا تصور کرنے سے پہلے آسان ترین وضاحت کو ترجیح دیں۔
  - جب آپ "انہوں نے مجھے تکلیف پہنچانے کا ارادہ کیا" پر پہنچیں تو اس پر غور کریں۔

ask_yourself:
  - کیا میں بدنیتی کو اس کی وجہ سے منسوب کر رہا ہوں جو جہالت کی وجہ سے سمجھائی جا سکتی ہے؟
  - کیا میں ان کے جوتوں میں اسی فائدے کا شک کرنا چاہوں گا؟

in_more_detail: |
  یہ اصول لوگوں کو فائدہ کا شک دینے کی ترغیب دیتا ہے۔ جب کسی کے اعمال آپ کو نقصان پہنچاتے ہیں یا مایوس کرتے ہیں، تو عام طور پر یہ فرض کیا جاتا ہے کہ انہوں نے آپ کو تکلیف پہنچانے کا ارادہ کیا تھا۔ ہینلون کا استرا تجویز کرتا ہے کہ ایسے بہت سے اعمال لاپرواہی، معلومات کی کمی، یا خراب عمل درآمد سے پیدا ہوتے ہیں - بری نیت سے نہیں۔

  اس کا مطلب یہ نہیں ہے کہ بدنیتی کبھی موجود نہیں ہوتی۔ اس کا مطلب یہ ہے کہ جب کوئی آسان وضاحت درست ہو تو ہمیں بدترین تشریح پر نہیں پہنچنا چاہیے۔ استرا شک و شبہ کو کم کرتا ہے، تعلقات کو بہتر بناتا ہے، اور ہمیں مسائل پر زیادہ تعمیری طور پر رد عمل ظاہر کرنے میں مدد کرتا ہے۔

why_this_is_important: |
  ہینلون کے استرا کو لاگو کرنے سے تنازعہ کم ہوتا ہے، تعلقات قائم رہتے ہیں، اور الزام لگانے کے بجائے مسائل کو حل کرنے پر توجہ مرکوز ہوتی ہے۔ یہ آپ کو اس تناؤ سے بھی بچاتا ہے کہ سب لوگ آپ کے خلاف ہیں۔

