# Hawthorne Effect
# Mental Model / Cognitive Bias - Example Entry

id: hawthorne_effect
name: ہاوتھورن اثر

quick_introduction: |
  ہاوتھورن اثر یہ رجحان ہے کہ جب لوگوں کو معلوم ہوتا ہے کہ ان کا مشاہدہ کیا جا رہا ہے یا ان کا مطالعہ کیا جا رہا ہے تو وہ اپنے رویے کو تبدیل کر لیتے ہیں۔ مشاہدے کا عمل خود تبدیلی پیدا کر سکتا ہے — ضروری نہیں کہ وہ مداخلت جو آزمائی جا رہی ہے۔ لوگ ان توجہ کا جواب دیتے ہیں جو انہیں ملتی ہے۔

one_liner: مشاہدہ کیے جانے سے رویہ تبدیل ہو جاتا ہے — خود توجہ سے اثر پیدا ہو سکتا ہے۔

try_this:
  - جب کسی مداخلت کا جائزہ لے رہے ہوں، تو غور کریں کہ آیا مشاہدہ نتائج کو بڑھا رہا ہے۔
  - تسلیم کریں کہ توجہ اور قدر محسوس کرنے سے کارکردگی بہتر ہو سکتی ہے۔
  - جب مشاہدہ تبدیل ہو جائے تو نتائج کو کسی مخصوص مداخلت سے منسوب کرنے میں محتاط رہیں۔

ask_yourself:
  - کیا یہ بہتری مداخلت سے ہے یا مشاہدہ کیے جانے سے؟
  - اگر ہم توجہ دینا بند کر دیں تو کیا نتائج برقرار رہیں گے؟

in_more_detail: |
  ہاوتھورن ورکس پلانٹ میں، محققین نے پایا کہ جب انہوں نے روشنی کو تبدیل کیا تو پیداواری صلاحیت میں اضافہ ہوا — اور جب انہوں نے اسے واپس تبدیل کیا تب بھی۔ ایسا لگتا تھا کہ بہتری خود توجہ اور مشاہدے سے آئی ہے، نہ کہ مخصوص مداخلت سے۔ بعد میں دوبارہ تجزیہ سے پتہ چلتا ہے کہ اثر کو زیادہ بڑھا چڑھا کر پیش کیا گیا ہو سکتا ہے، لیکن یہ تصور مفید ہے: مطالعہ کیے جانے سے رویہ بدل جاتا ہے۔

  ہاوتھورن اثر تحقیق اور تشخیص کو پیچیدہ بناتا ہے۔ یہ مداخلتوں کے ظاہر اثر کو بڑھا سکتا ہے۔ یہ یہ بھی تجویز کرتا ہے کہ توجہ اور قدر محسوس کرنے سے کارکردگی بہتر ہو سکتی ہے — مینجمنٹ کے لیے ایک سبق۔

why_this_is_important: |
  ہاوتھورن اثر کو سمجھنا آپ کو تحقیقی نتائج کی تشریح کرنے، بہتر تجربات ڈیزائن کرنے اور یہ تسلیم کرنے میں مدد کرتا ہے کہ خود توجہ سے تبدیلی آ سکتی ہے۔ مینجمنٹ میں، یہ تجویز کرتا ہے کہ لوگوں پر توجہ دینا مخصوص مداخلت کی طرح اہم ہو سکتا ہے۔

when_to_use:
  - قیادت (leadership)
  - فیصلہ سازی (decision-making)
  - سیکھنا (learning)
  - مسئلہ حل کرنا (problem_solving)

how_can_you_spot_it:
  observation_induced_change: |
    جب لوگ جانتے ہیں کہ انہیں دیکھا جا رہا ہے یا ان کا مطالعہ کیا جا رہا ہے تو رویے میں تبدیلی آتی ہے۔
  attention_effect: |
    توجہ دینے کے عمل سے بہتری پیدا ہوتی ہے، نہ کہ صرف مخصوص تبدیلی سے۔
  placebo_analog: |
    پلیسبو کی طرح، مطالعہ کیے جانے کے "علاج" کے اثرات ہو سکتے ہیں۔
  short_term_improvement: |
    جب مشاہدہ ختم ہو جاتا ہے تو بہتری ختم ہو سکتی ہے۔

examples:
  workplace_studies: |
    کسی مطالعہ کے دوران پیداواری صلاحیت میں اضافہ — کیا یہ نیا عمل ہے یا یہ حقیقت کہ کوئی دیکھ رہا ہے؟
  medical_trials: |
    پلیسبو گروپوں میں بہتری — جزوی طور پر اس لیے کہ انہیں توجہ مل رہی ہے۔
  education: |
    طلباء بہتر کارکردگی کا مظاہرہ کرتے ہیں جب محقق موجود ہوتے ہیں — "مبصر اثر"۔
  management: |
    جب مینجمنٹ توجہ دیتی ہے تو ٹیموں میں بہتری آتی ہے — کیا یہ نیا اقدام ہے یا خود توجہ؟

real_world_implications: |
  ہاوتھورن اثر تحقیق کی صداقت اور پروگرام کی تشخیص کو متاثر کرتا ہے۔ یہ مداخلت کے اثرات کو زیادہ سمجھنے کا سبب بن سکتا ہے۔ اس کا ایک مثبت سبق بھی ہے: توجہ اور مطالعہ کیے جانے کا احساس بہتری کے لیے حوصلہ افزائی کر سکتا ہے — لہذا دیکھ بھال اور بصارت اہم ہے۔

professional_application:
  networking_and_relationship_building: |
    لوگوں پر توجہ دینے سے ان کی کارکردگی بہتر ہو سکتی ہے — ہاوتھورن اثر تجویز کرتا ہے کہ مشاہدہ اور قدر محسوس کرنا اہم ہے۔ اس کا مثبت استعمال کریں: باقاعدہ چیک ان، بصارت، اور پہچان۔
  collaborative_learning_initiative: |
    جب مداخلتوں کا جائزہ لے رہے ہوں، تو کنٹرول گروپ استعمال کریں اور غور کریں کہ آیا بہتری مداخلت کی وجہ سے ہے یا اس توجہ کی وجہ سے جو یہ لاتی ہے۔ ہاوتھورن اثر ظاہر کامیابی کو بڑھا سکتا ہے۔

how_can_this_be_misapplied:
  surveillance_justification: |
    "ہاوتھورن اثر" کو مسلسل نگرانی کے جواز کے طور پر استعمال کرنا — مشاہدہ اعتماد اور اندرونی محرک کو بھی کم کر سکتا ہے۔
  dismissing_improvements: |
    یہ فرض کرنا کہ مطالعے کے دوران تمام بہتری ہاوتھورن اثر کی وجہ سے ہے — کبھی کبھی مداخلتیں واقعی کام کرتی ہیں۔
  overgeneralization: |
    اصل ہاوتھورن مطالعات پر سوال اٹھایا گیا ہے۔ اثر پہلے کے خیال سے چھوٹا یا مختلف ہو سکتا ہے۔
  manipulation: |
    روئیے کو ہیرا پھیری کرنے کے لیے جھوٹی "مشاہدہ" پیدا کرنا۔

