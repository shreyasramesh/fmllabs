# Empathy Gap
# Mental Model / Cognitive Bias - Example Entry

id: empathy_gap
name: ہمدردی کا خلا

quick_introduction: |
  جب ہم خود کسی مختلف حالت میں ہوں تو دوسروں کے ذہنی حالات کو سمجھنے اور ان کی پیشین گوئی کرنے میں درپیش دشواری کو ہمدردی کا خلا کہتے ہیں۔ جب ہم پرسکون ہوں، تو ہم اس بات کو کم سمجھیں گے کہ ہمیں غصہ یا بھوک لگنے پر کیسا محسوس ہوگا۔ جب ہم سیر ہوں، تو ہم اس بات کو کم سمجھیں گے کہ بھوکے ہونے پر ہمیں کھانے کی کتنی خواہش ہوگی۔

one_liner: ہم کم سمجھ لیتے ہیں کہ ہمیں مختلف حالتوں میں کیسا محسوس ہوگا—اور دوسروں کو کیسا محسوس ہوگا۔

try_this:
  - جب پرسکون ہوں، تو دباؤ میں ہونے کے لیے عہد کریں؛ پیشگی عہد کریں۔
  - ان لوگوں کو تنقید کا نشانہ نہ بنائیں جو ایسی حالت میں ہیں جس میں آپ نہیں ہیں — بھوکے، تھکے ہوئے، خوفزدہ۔
  - پوچھیں: کیا میں اپنی موجودہ حالت کو اپنے مستقبل کے خود یا دوسروں پر مسلط کر رہا ہوں؟

ask_yourself:
  - کیا میں کم سمجھ رہا ہوں کہ مجھے کسی مختلف حالت میں کیسا محسوس ہوگا؟
  - کیا میں اس شخص کو بہتر سمجھوں گا اگر میں ان کی حالت میں ہوتا؟

in_more_detail: |
  ہمیں یہ تصور کرنے میں دشواری ہوتی ہے کہ ہمیں مختلف حالات میں کیسا محسوس ہوگا—اور جب لوگ ان حالتوں میں ہوں جن میں ہم اس وقت نہیں ہیں تو انہیں کیسا محسوس ہوتا ہے۔ ایک ہوش مند شخص نشے کی کشش کو کم سمجھتا ہے۔ ایک اچھی طرح سے آرام کیا ہوا شخص نیند کی کمی کے اثر کو کم سمجھتا ہے۔ ہم اپنی موجودہ حالت کو دوسروں اور اپنے مستقبل کے خود پر مسلط کرتے ہیں۔

  ہمدردی کا خلا ہمارے مستقبل کے لیے کیے گئے فیصلوں (مثلاً، جب ہم حوصلہ افزائی میں ہوں تو ورزش کرنے کا عہد کرنا)، دوسروں کے لیے کیے گئے فیصلوں، اور مختلف حالتوں میں لوگوں کو سمجھنے کی ہماری صلاحیت کو متاثر کرتا ہے۔

why_this_is_important: |
  ہمدردی کے خلا کو تسلیم کرنے سے آپ کے مستقبل کے لیے فیصلے کرنے، دوسروں کے لیے ہمدردی، اور اپنی تبدیلیوں کو سمجھنے میں بہتری آتی ہے۔ یہ واضح کرتا ہے کہ ہم ایسے عہد کیوں کرتے ہیں جنہیں ہم پورا نہیں کر سکتے اور ہم تکلیف میں دوسروں کو کیوں غلط سمجھتے ہیں۔

when_to_use:
  - فیصلہ_کرنا
  - تعلقات_بنانا
  - قیادت
  - تنازعہ_حل_کرنا

how_can_you_spot_it:
  current_state_projection: |
    یہ فرض کرنا کہ دوسروں کو ویسا ہی محسوس ہوتا ہے جیسا ہم اب کرتے ہیں، یا یہ کہ مستقبل میں ہمیں ویسا ہی محسوس ہوگا جیسا ہم اب کرتے ہیں۔
  underestimating_emotional_state: |
    "اس میں کیا بڑی بات ہے؟" جب ہم اس حالت میں نہیں ہوتے جس میں وہ ہیں۔
  commitment_failures: |
    موجودہ حوصلہ افزائی کی بنیاد پر ایسے انتخاب کرنا جنہیں ہم حوصلہ افزائی ختم ہونے پر پورا نہیں کریں گے۔
  misunderstanding_others: |
    دوسروں کے تجربات کو رد کرنا کیونکہ ہم اپنی موجودہ حالت سے ان کا تصور نہیں کر سکتے۔

examples:
  hunger: |
    جب پیٹ بھرا ہو تو گروسری کی خریداری—ہم اتنا کم خریدتے ہیں جتنا بھوکے ہونے پر ہمیں چاہیے۔
  addiction: |
    غیر نشے کے عادی افراد کے لیے چھوڑنے کی دشواری کو کم سمجھنا؛ صحت یاب ہونے والے نشے کے عادی افراد جب وہ استعمال کر رہے ہوں تو کشش کو کم سمجھ سکتے ہیں۔
  conflict: |
    جب پرسکون ہوں، تو ہم اس بات کو کم سمجھتے ہیں کہ ہم تصادم کے وقت کیسا رد عمل ظاہر کریں گے۔
  motivation: |
    جب ہم حوصلہ افزائی میں ہوں تو 6 بجے کی کلاس کے لیے سائن اپ کرنا—اور جب ہم نیند میں ہوں تو نہ جانا۔

real_world_implications: |
  ہمدردی کا خلا نشے کے علاج، پالیسی، اور باہمی سمجھ بوجھ کو متاثر کرتا ہے۔ یہ واضح کرتا ہے کہ ہم ایسے عہد کیوں کرتے ہیں جنہیں ہم توڑتے ہیں اور ہم اکثر دوسروں کے نقطہ نظر کو سمجھنے میں کیوں ناکام رہتے ہیں۔ یہ ہمدردی اور اچھے فیصلے کرنے میں ایک رکاوٹ ہے۔

professional_application:
  networking_and_relationship_building: |
    جب کوئی دباؤ، غصے، یا کسی مختلف حالت میں ہو، تو یہ فرض نہ کریں کہ وہ ویسے ہی دلیل کریں گے جیسے آپ کرتے ہیں۔ ان کی حالت کا تصور کرنے کی کوشش کریں۔ جب عہد کر رہے ہوں، تو اس بات پر غور کریں کہ جب حوصلہ افزائی ختم ہو جائے تو آپ کو کیسا محسوس ہوگا۔
  collaborative_learning_initiative: |
    جب منصوبہ بندی کر رہے ہوں، تو اس بات پر غور کریں کہ ٹیم کو کیسا محسوس ہوگا جب وہ تھکے ہوئے، دباؤ میں، یا مایوس ہوں گے۔ صرف حوصلہ افزائی والے منصوبہ بندی کے بجائے ان حالتوں کے لیے ڈیزائن کریں۔

how_can_this_be_misapplied:
  overattribution: |
    تمام غلط فہمی کو "ہمدردی کا خلا" سمجھنا جب کبھی لوگ واقعی مختلف اقدار رکھتے ہوں۔
  excusing_behavior: |
    "وہ اس سے مدد نہیں کر سکے—ہمدردی کا خلا" جب لوگ اپنی حالتوں کا انتظام کرنے کے ذمہ دار ہوں۔
  false_relativism: |
    یہ فرض کرنا کہ ہم کبھی بھی دوسروں کو نہیں سمجھ سکتے جب ہم کوشش اور تجربے سے بہتر ہو سکتے ہیں۔
  self_excuse: |
    اپنے وعدوں کو پورا کرنے میں ناکامی کی وضاحت کے لیے ہمدردی کے خلا کا استعمال کرنا۔

