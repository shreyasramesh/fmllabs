# In-Group Bias
# Mental Model / Cognitive Bias - Example Entry

id: in_group_bias
name: اندرونی گروہ کا تعصب

quick_introduction: |
  اندرونی گروہ کا تعصب وہ رجحان ہے جس میں ہم ان لوگوں کو ترجیح دیتے ہیں جنہیں ہم اپنا گروہ سمجھتے ہیں، ان کے مقابلے میں جنہیں ہم باہر والے سمجھتے ہیں۔ ہم اندرونی گروہ کے اراکین کو مثبت خصوصیات اور باہر والے گروہ کے اراکین کو منفی خصوصیات سے منسوب کرتے ہیں، جو اکثر کم یا غیر ضروری امتیازات پر مبنی ہوتا ہے۔

one_liner: ہم اپنے اندرونی گروہ کو ترجیح دیتے ہیں اور باہر والے گروہوں کو زیادہ سختی سے جانچتے ہیں — اکثر غیر ضروری طور پر۔

try_this:
  - Ask: کیا میں اس شخص کو اسی طرح جانچوں گا اگر وہ میرے گروہ میں ہوتا؟
  - Actively seek out-group perspectives when making decisions.
  - فیصلہ سازی کرتے وقت باہر والے گروہوں کے نقطہ نظر کو فعال طور پر تلاش کریں۔
  - اس بات پر غور کریں کہ جب گروہی حدود آپ کی جانچ کو متاثر کر رہی ہوں۔

ask_yourself:
  - Am I favoring someone because they're "one of us"?
  - کیا میں کسی شخص کو اس لیے ترجیح دے رہا ہوں کہ وہ "ہمارے لوگ" میں سے ہے؟
  - Would I apply the same standards to an out-group member?
  - کیا میں باہر والے گروہ کے رکن پر وہی معیار لاگو کروں گا؟

in_more_detail: |
  یہاں تک کہ جب گروہوں کو اتفاقی طور پر تفویض کیا جاتا ہے (مثلاً، سکہ اچھال کر)، لوگ جلدی سے اپنے اندرونی گروہ کے لیے ترجیح پیدا کر لیتے ہیں۔ ہم اندرونی گروہ کے اراکین پر زیادہ بھروسہ کرتے ہیں، انہیں زیادہ سخاوت سے وسائل مختص کرتے ہیں، اور ان کے اعمال کو زیادہ خیر سگالی سے جانچتے ہیں۔ باہر والے گروہ کے اراکین کو اس کے برعکس سلوک ملتا ہے۔

  اندرونی گروہ کا تعصب قبائلیت، امتیازی سلوک اور تنازعات کو ہوا دیتا ہے۔ یہ ملازمت، ترقی، تعاون اور پالیسی کو متاثر کرتا ہے۔ یہ نسل، قومیت، کمپنی، ٹیم، یا کسی بھی مشترکہ شناخت پر مبنی ہو سکتا ہے۔

why_this_is_important: |
  اندرونی گروہ کے تعصب کو تسلیم کرنے سے آپ کو منصفانہ فیصلے کرنے، زیادہ جامع ٹیمیں بنانے اور جانبداری سے بچنے میں مدد ملتی ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ تنوع کے اقدامات مزاحمت کا سامنا کیوں کرتے ہیں — اندرونی گروہ کی ترجیح خودکار ہے۔

when_to_use:
  - leadership
  - قیادت
  - decision-making
  - فیصلہ سازی
  - relationship_building
  - تعلقات کی تعمیر
  - conflict_resolution
  - تنازعہ کا حل

how_can_you_spot_it:
  preferential_treatment: |
    Giving the benefit of the doubt to "us" but not "them."
    "ہمیں" شک کا فائدہ دینا لیکن "انہیں" نہیں۔
  resource_allocation: |
    Allocating more to in-group members when out-group members have equal
    or greater need.
    جب باہر والے گروہ کے اراکین کی ضرورت برابر یا زیادہ ہو تو اندرونی گروہ کے اراکین کو زیادہ مختص کرنا۔
  attribution_asymmetry: |
    In-group success = skill; out-group success = luck. In-group failure =
    circumstance; out-group failure = character.
    اندرونی گروہ کی کامیابی = ہنر؛ باہر والے گروہ کی کامیابی = قسمت۔ اندرونی گروہ کی ناکامی = حالات؛ باہر والے گروہ کی ناکامی = کردار۔
  minimal_group_effects: |
    Favoritism emerges even with arbitrary group assignments.
    غیر ضروری گروہی تفویضات کے ساتھ بھی جانبداری ابھرتی ہے۔

examples:
  hiring: |
    Preferring candidates who went to your alma mater or share your background.
    ان امیدواروں کو ترجیح دینا جنہوں نے آپ کے ہی مدرسے سے تعلیم حاصل کی ہو یا آپ کا پس منظر مشترک ہو۔
  performance_reviews: |
    Rating in-group members more favorably than out-group members with
    similar performance.
    ایک جیسی کارکردگی رکھنے والے باہر والے گروہ کے اراکین کے مقابلے میں اندرونی گروہ کے اراکین کو زیادہ سازگار درجہ دینا۔
  collaboration: |
    Trusting and including "our team" while excluding or doubting "their team."
    "اپنی ٹیم" پر بھروسہ کرنا اور اسے شامل کرنا جبکہ "ان کی ٹیم" کو خارج کرنا یا شک کرنا۔
  politics: |
    Dismissing out-group arguments while accepting in-group arguments
    uncritically.
    باہر والے گروہ کے دلائل کو مسترد کرنا جبکہ اندرونی گروہ کے دلائل کو بلا تنقید قبول کرنا۔

real_world_implications: |
  In-group bias perpetuates inequality, undermines meritocracy, and fuels
  conflict. It affects hiring, promotion, investment, and policy. Reducing
  it requires deliberate effort—it won't fix itself.
  اندرونی گروہ کا تعصب عدم مساوات کو برقرار رکھتا ہے، میرٹاکریسی کو نقصان پہنچاتا ہے، اور تنازعات کو ہوا دیتا ہے۔ یہ ملازمت، ترقی، سرمایہ کاری اور پالیسی کو متاثر کرتا ہے۔ اسے کم کرنے کے لیے جان بوجھ کر کوششوں کی ضرورت ہے — یہ خود ٹھیک نہیں ہوگا۔

professional_application:
  networking_and_relationship_building: |
    Actively include people outside your immediate circle. Seek diverse
    perspectives. Question whether you're favoring someone because they're
    "like you."
    اپنے قریبی حلقے کے باہر کے لوگوں کو فعال طور پر شامل کریں۔ متنوع نقطہ نظر تلاش کریں۔ سوال کریں کہ کیا آپ کسی کو اس لیے ترجیح دے رہے ہیں کہ وہ "آپ کی طرح" ہے۔
  collaborative_learning_initiative: |
    Use structured processes (blinded reviews, diverse panels) to reduce
    in-group bias in hiring and evaluation. Create cross-group projects
    to build shared identity.
    ملازمت اور تشخیص میں اندرونی گروہ کے تعصب کو کم کرنے کے لیے منظم عمل (بلائنڈ ریویو، متنوع پینل) استعمال کریں۔ مشترکہ شناخت بنانے کے لیے گروہوں کے درمیان منصوبے بنائیں۔

how_can_this_be_misapplied:
  forced_diversity: |
    Implementing quotas or policies that create resentment without addressing
    underlying bias.
    کوٹے یا پالیسیاں لاگو کرنا جو بنیادی تعصب کو حل کیے بغیر ناراضی پیدا کرتی ہیں۔
  out_group_hostility: |
    Treating in-group bias as the only problem when out-group hostility
    also exists.
    جب باہر والے گروہ کی دشمنی بھی موجود ہو تو اندرونی گروہ کے تعصب کو واحد مسئلہ سمجھنا۔
  ignoring_legitimate_differences: |
    Not all group differences are bias—sometimes groups have different
    characteristics. Don't assume all disparities are discrimination.
    تمام گروہی اختلافات تعصب نہیں ہوتے — کبھی کبھی گروہوں کی مختلف خصوصیات ہوتی ہیں۔ یہ نہ فرض کریں کہ تمام فرق جانبداری ہیں۔
  reverse_discrimination: |
    Overcorrecting to favor out-groups in ways that are unfair to in-group
    members.
    اندرونی گروہ کے اراکین کے لیے ناانصافی والے طریقوں سے باہر والے گروہوں کو ترجیح دینے کے لیے زیادہ درستگی کرنا۔

