# Zeigarnik Effect
# Mental Model / Cognitive Bias - Example Entry

id: zeigarnik_effect
name: زیگارنک اثر

quick_introduction: |
  زیگارنک اثر نامکمل یا منقطع کاموں کو مکمل کاموں کے مقابلے میں بہتر یاد رکھنے کا رجحان ہے۔ نامکمل کام ذہنی تناؤ پیدا کرتے ہیں جو انہیں ہمارے ذہنوں میں متحرک رکھتا ہے۔ ہمارا دماغ ان چیزوں کو قائم رکھتا ہے جو نامکمل ہیں۔

one_liner: نامکمل کام ہمارے ذہنوں میں جم جاتے ہیں—ہمارا دماغ ان چیزوں کو قائم رکھتا ہے جو نامکمل ہیں۔

try_this:
  - کاموں کو اپنی ذہنی بوجھ سے "خارج" کرنے کے لیے تکمیل کا استعمال کریں — انہیں مکمل کریں یا باضابطہ طور پر ترک کر دیں۔
  - نتیجہ خیز کھلے دائرے بنانے کے لیے کام کو قابل انتظام حصوں میں تقسیم کریں۔
  - نوٹس لیں جب آپ نامکمل کاروبار پر غور کر رہے ہوں — دائرہ بند کریں یا اسے جانے دینے کا فیصلہ کریں۔

ask_yourself:
  - کون سے نامکمل کام میرے ذہن میں تناؤ پیدا کر رہے ہیں؟
  - کیا یہ کھلا دائرہ رکھنے کے قابل ہے، یا میں اسے بند کر سکتا ہوں؟

in_more_detail: |
  بلوما زیگارنک نے مشاہدہ کیا کہ ویٹر ادا شدہ آرڈرز کے مقابلے میں غیر ادا شدہ آرڈرز کو بہتر یاد رکھتے تھے — جب کام مکمل ہو جاتا، تو اسے یادداشت سے "خارج" کر دیا جاتا تھا۔ نامکمل کام ایک کھلا دائرہ بناتے ہیں جس کے لیے بندش کا مطالبہ ہوتا ہے۔ یہ نتیجہ خیز توجہ (ہم ختم کرنا چاہتے ہیں) اور اضطراب (ہم ان کاموں کے بارے میں سوچنا بند نہیں کر سکتے جو نہیں ہوئے) دونوں کو چلاتی ہے۔

  یہ اثر مارکیٹنگ (کلف ہینگرز، نامکمل کہانیاں) اور پیداواری صلاحیت (متعدد "کھلے دائرے" بنانے کے لیے کام کو حصوں میں تقسیم کرنا) میں استعمال ہوتا ہے۔ یہ واضح کرتا ہے کہ ہم نامکمل کاروبار پر کیوں غور کرتے ہیں اور ٹو-ڈو لسٹ کیوں مغلوب کن محسوس ہو سکتی ہیں۔

why_this_is_important: |
  زیگارنک اثر کو سمجھنے سے آپ کو ذہنی بوجھ کا انتظام کرنے، دلکش تجربات ڈیزائن کرنے اور تعطل کو حکمت عملی کے ساتھ استعمال کرنے میں مدد ملتی ہے۔ یہ واضح کرتا ہے کہ ہم نامکمل کام کے بارے میں سوچنا کیوں بند نہیں کر سکتے — اور کیوں اسے استعمال کیا جا سکتا ہے یا نقصان دہ ہو سکتا ہے۔

