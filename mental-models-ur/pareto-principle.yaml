# Pareto Principle
# Mental Model / Cognitive Bias - Example Entry

id: pareto_principle
name: پیریٹو کا اصول

quick_introduction: |
  پیریٹو کا اصول (یا 80/20 اصول) کہتا ہے کہ تقریباً 80% اثرات 20% وجوہات سے آتے ہیں۔
  کم وسائل والے ان پٹس اکثر زیادہ آؤٹ پٹس پیدا کرتے ہیں—
  سیلز، کیڑے، گاہک، کوشش، خصوصیات، اور بہت کچھ میں۔ اہم چند پر توجہ دیں۔

one_liner: 80% اثرات 20% وجوہات سے آتے ہیں—اہم چند پر توجہ دیں۔

try_this:
  - ان 20% ان پٹس کی شناخت کریں جو 80% نتائج پیدا کرتے ہیں—وہاں زیادہ سرمایہ کاری کریں۔
  - ان 80% کو کاٹ دیں یا ترجیح کم کر دیں جو کم پیدا کرتے ہیں۔
  - پوچھیں: چند چیزیں، اگر میں نے انہیں اچھی طرح کیا، تو سب سے زیادہ اہم ہوں گی؟

ask_yourself:
  - کیا میں اپنی کوششیں برابر بانٹ رہا ہوں جب چند چیزیں زیادہ اہم ہیں؟
  - میرا اعلیٰ فائدہ مند 20% کیا ہے؟

in_more_detail: |
  ويلفرڈو پیریٹو نے مشاہدہ کیا کہ اٹلی کی 80% زمین 20% آبادی کی ملکیت تھی۔
  اس اصول کو عام کیا گیا ہے: 80% سیلز 20% گاہکوں سے، 80% کیڑے 20% کوڈ سے، 80% نتائج 20% کوشش سے۔
  صحیح تناسب مختلف ہوتا ہے، لیکن پیٹرن—غیر مساوی تقسیم—عام ہے۔

  یہ اصول بتاتا ہے کہ اعلیٰ فائدہ مند 20% کی شناخت اور اس پر توجہ مرکوز کرنے سے
  نتائج میں نمایاں بہتری آسکتی ہے۔ یہ ایک ترجیحی ہدایت ہے، کوئی طبعی قانون نہیں۔

why_this_is_important: |
  پیریٹو کے اصول کو لاگو کرنے سے آپ کو سختی سے ترجیح دینے، کم اثر والی سرگرمیوں پر
  کوششیں ضائع کرنے سے بچنے، اور کم وسائل میں زیادہ حاصل کرنے میں مدد ملتی ہے۔
  یہ پیداواری صلاحیت اور حکمت عملی کے لیے بنیادی ہے۔

when_to_use:
  - فیصلہ_سازی
  - مسئلہ_حل_کرنا
  - قیادت
  - کیریئر_کی_حرکتیں

how_can_you_spot_it:
  uneven_distribution: |
    X کا ایک چھوٹا سا حصہ Y کے ایک بڑے حصے کا ذمہ دار ہے۔
  high_leverage_activities: |
    چند اعمال زیادہ تر نتائج پیدا کرتے ہیں۔
  low_value_tail: |
    بہت سی سرگرمیاں کم حصہ ڈالتی ہیں؛ انہیں کاٹنے کا اثر کم ہوتا ہے۔
  vital_few_vs_trivial_many: |
    اہم بات یہ ہے کہ کون سے چند اہم ہیں ان کی شناخت کی جائے۔

examples:
  sales: |
    20% گاہک 80% آمدنی پیدا کرتے ہیں—انہیں برقرار رکھنے اور بڑھانے پر توجہ دیں۔
  software: |
    20% خصوصیات 80% استعمال کی وجہ بنتی ہیں—ان کو ترجیح دیں۔
  productivity: |
    چند عادات یا معمولات آپ کی زیادہ تر پیداوار پیدا کرتے ہیں—ان پر زیادہ توجہ دیں۔
  problems: |
    20% کیڑے 80% کریش کی وجہ بنتے ہیں—پہلے انہیں ٹھیک کریں۔

real_world_implications: |
  پیریٹو کا اصول وسائل کی تقسیم، مصنوعات کی حکمت عملی، اور
  ذاتی پیداواری صلاحیت کی رہنمائی کرتا ہے۔ اسے نظر انداز کرنے سے کوششیں بہت زیادہ پھیل جاتی ہیں۔
  اسے زیادہ لاگو کرنے سے "لانگ ٹیل" کی نظر اندازی ہو سکتی ہے جہاں یہ اہم ہے۔

professional_application:
  networking_and_relationship_building: |
    اپنے مقاصد کے لیے سب سے اہم تعلقات کی شناخت کریں۔
    کوششوں کو برابر بانٹنے کے بجائے ان پر غیر متناسب طور پر سرمایہ کاری کریں۔
  collaborative_learning_initiative: |
    ٹیم کی کارکردگی کو بہتر بنانے کے لیے، ان 20% مداخلتوں کا پتہ لگائیں جو 80% نتائج کو
     চালনা کرتی ہیں۔ وہاں تربیت اور عمل میں تبدیلیوں پر توجہ مرکوز کریں۔

how_can_this_be_misapplied:
  oversimplification: |
    یہ فرض کرنا کہ 80/20 ہر جگہ لاگو ہوتا ہے؛ کچھ تقسیمات زیادہ یکساں ہوتی ہیں۔
  neglecting_the_tail: |
    "غیر اہم بہت سے" کو نظر انداز کرنا جب وہ مجموعی طور پر اہم ہوتے ہیں (مثال کے طور پر، بہت سے چھوٹے
    گاہک، ایج کیسز)۔
  false_precision: |
    80/20 کو لفظی کے بجائے ایک تخمینی ہدایت کے طور پر سمجھنا۔
  misidentifying_the_vital_few: |
    غلط تجزیے کی وجہ سے غلط 20% پر توجہ مرکوز کرنا۔

