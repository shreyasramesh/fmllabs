# Pygmalion Effect
# Mental Model / Cognitive Bias - Example Entry

id: pygmalion_effect
name: پیگمالین اثر

quick_introduction: |
  پیگمالین اثر (یا روزینتھل اثر) وہ رجحان ہے جہاں اعلیٰ توقعات بہتر کارکردگی کا باعث بنتی ہیں۔ جب اساتذہ، مینیجرز، یا دیگر افراد کسی سے زیادہ توقعات رکھتے ہیں، تو وہ شخص بہتر کارکردگی دکھانے لگتا ہے۔ توقعات خود کو پورا کرنے والی پیش گوئیاں بن جاتی ہیں۔

one_liner: اعلیٰ توقعات بہتر کارکردگی کا باعث بنتی ہیں — توقعات حقیقت کو تشکیل دیتی ہیں۔

try_this:
  - اعلیٰ مگر حاصل کرنے کے قابل توقعات طے کریں؛ انہیں واضح طور پر بتائیں۔
  - اس بات پر توجہ دیں کہ کب کم توقعات کسی کی کارکردگی کو محدود کر رہی ہیں۔
  - پوچھیں: میں پوشیدہ طور پر کیا توقع کر رہا ہوں — اور یہ نتائج کو کیسے متاثر کر سکتا ہے؟

ask_yourself:
  - کیا میری توقعات اس شخص کی مدد کر رہی ہیں یا اسے محدود کر رہی ہیں؟
  - کیا اعلیٰ توقعات میرے ساتھ ان کے سلوک — اور ان کے نتائج کو بدل دیں گی؟

in_more_detail: |
  رابرٹ روزینتھل اور لینور جیکبسن نے اساتذہ کو غلط معلومات دی کہ کچھ طلباء تعلیمی طور پر "ب blom" کریں گے۔ ان طلباء — جو بے ترتیب طور پر منتخب کیے گئے تھے — نے درحقیقت دوسروں سے زیادہ بہتری دکھائی۔ اساتذہ کی توقعات نے ان کے رویے کو متاثر کیا (زیادہ توجہ، گرمجوشانہ رائے)، جس نے طالب علم کی کارکردگی کو متاثر کیا۔ توقعات حقیقت کو تشکیل دیتی ہیں۔

  اس کے برعکس — کم توقعات جو بدتر کارکردگی کا باعث بنتی ہیں — اسے بعض اوقات گولیم اثر کہا جاتا ہے۔ دونوں ظاہر کرتے ہیں کہ دوسروں کے بارے میں ہمارے عقائد ان کے نتائج کو متاثر کر سکتے ہیں۔ اس کے قیادت، تعلیم، اور والدین کے لیے گہرے اثرات ہیں۔

why_this_is_important: |
  پیگمالین اثر کو سمجھنا آپ کو توقعات کی طاقت کو بروئے کار لانے میں مدد کرتا ہے۔ اعلیٰ توقعات، خلوص کے ساتھ بیان کی جائیں، کارکردگی کو بہتر بنا سکتی ہیں۔ کم توقعات خود کو پورا کرنے والی ناکامی پیدا کر سکتی ہیں۔ دوسروں کے بارے میں آپ کے عقائد اہم ہیں۔

when_to_use:
  - قیادت
  - تعلقات_بنانا
  - سیکھنا
  - فیصلہ_کرنا

how_can_you_spot_it:
  expectation_performance_link: |
    جن سے ہم زیادہ توقع کرتے ہیں وہ بہتر کارکردگی دکھانے لگتے ہیں۔
  differential_treatment: |
    ہم اپنی توقعات کی بنیاد پر لوگوں کے ساتھ مختلف سلوک کرتے ہیں — اکثر
    غیر شعوری طور پر۔
  self_fulfilling_prophecy: |
    صلاحیت کے بارے میں عقائد اس رویے کو متاثر کرتے ہیں جو صلاحیت کو تشکیل دیتا ہے۔
  teacher_student_dynamics: |
    اساتذہ کی توقعات مختلف سلوک کے ذریعے طالب علم کے نتائج کو متاثر کرتی ہیں۔

examples:
  education: |
    وہ اساتذہ جو طلباء کی کامیابی کی توقع رکھتے ہیں وہ زیادہ مدد فراہم کرتے ہیں؛
    وہ طلباء بہتر کارکردگی دکھاتے ہیں۔ وہ اساتذہ جو ناکامی کی توقع رکھتے ہیں وہ
    غیر ارادی طور پر اسے پیدا کر سکتے ہیں۔
  workplace: |
    وہ مینیجر جو اپنے ماتحتوں سے اعلیٰ کارکردگی کی توقع رکھتے ہیں وہ
    زیادہ مواقع اور رائے فراہم کرتے ہیں؛ کارکردگی بہتر ہوتی ہے۔
  parenting: |
    وہ والدین جو اپنے بچوں سے ذمہ دار ہونے کی توقع رکھتے ہیں وہ
    انہیں زیادہ ذمہ داری دیتے ہیں؛ وہ اس پر پورا اترتے ہیں۔
  stereotypes: |
    اسٹیرائپ کا دھمکی اس کے برعکس ہے — منفی توقعات
    کارکردگی کو خراب کر سکتی ہیں۔

real_world_implications: |
  پیگمالین اثر تعلیم، انتظام، اور
  رشتوں کو متاثر کرتا ہے۔ یہ بتاتا ہے کہ توقعات کو بڑھانا — جب
  حمایتی انداز میں کیا جائے — نتائج کو بہتر بنا سکتا ہے۔ یہ تنبیہ بھی کرتا ہے کہ
  کم توقعات تباہ کن ہو سکتی ہیں۔

professional_application:
  networking_and_relationship_building: |
    لوگوں سے اعلیٰ توقعات رکھیں — اور انہیں پورا کرنے کے لیے مدد فراہم کریں۔
    صلاحیت پر یقین رکھیں۔ آپ کی توقعات آپ کے رویے کو متاثر کرتی ہیں، جو ان کے نتائج کو متاثر کرتی ہیں۔
  collaborative_learning_initiative: |
    اعلیٰ حمایت کے ساتھ اعلیٰ توقعات کے کلچر بنائیں۔
    لوگوں کو "کم کارکردگی دکھانے والے" کے طور پر لیبل کرنے سے گریز کریں جس طرح سے
    یہ خود کو پورا کرنے والا بن جاتا ہے۔ ان میں سرمایہ کاری کریں جن سے آپ
    کامیابی کی توقع رکھتے ہیں۔

how_can_this_be_misapplied:
  unrealistic_expectations: |
    ایسی توقعات طے کرنا جو بغیر
    حمایت کے پوری نہیں کی جا سکتیں، ناکامی اور مایوسی پیدا کرتی ہیں۔
  blame_shifting: |
    "انہوں نے توقعات پوری نہیں کیں" جب ہم نے حمایت
    یا کامیابی کے لیے حالات فراہم نہیں کیے۔
  ignoring_constraints: |
    صرف توقعات ساختی رکاوٹوں پر قابو نہیں پاتیں۔
  pressure_without_support: |
    وسائل یا حمایت کے بغیر اعلیٰ توقعات نقصان دہ ہو سکتی ہیں۔

