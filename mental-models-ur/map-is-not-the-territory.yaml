# نقش علاقے کا متبادل نہیں ہے
# ذہنی ماڈل / علمی تعصب - مثال اندراج

id: map_is_not_the_territory
name: نقش علاقے کا متبادل نہیں ہے

quick_introduction: |
  "نقش علاقے کا متبادل نہیں ہے" کا مطلب ہے کہ حقیقت کی نمائندگی خود حقیقت نہیں ہے۔ ماڈلز، تھیوریز، اور وضاحتیں مفید سادہ بنانے والے ہیں، لیکن وہ ہمیشہ کچھ چھوڑ دیتے ہیں۔ نقش کو علاقے سمجھنے سے غلطی ہوتی ہے۔

one_liner: نقش علاقے کا متبادل نہیں ہے—سبھی ماڈلز غلط ہیں؛ کچھ مفید ہیں۔

try_this:
  - جب کوئی ماڈل حقیقت سے میل نہیں کھاتا، تو نقش کو اپ ڈیٹ کریں—حقیقت کو اس میں فٹ کرنے کے لیے مجبور نہ کریں۔
  - پوچھیں: یہ ماڈل کیا چھوڑ رہا ہے؟ یہ کب ناکام ہو سکتا ہے؟
  - ماڈلز کو سچائی کے بجائے اوزار کے طور پر سمجھیں۔

ask_yourself:
  - کیا میں اپنے ماڈل کو حقیقت سے گڑبڑ کر رہا ہوں؟
  - کیا علاقے میں اس وقت سے تبدیلی آئی ہے جب میں نے آخری بار دیکھا تھا؟

in_more_detail: |
  الفریڈ کورزیبسکی نے جنرل سیمنٹکس میں یہ خیال پیش کیا۔ ایک شہر کا نقشہ نیویگیشن کے لیے مفید ہے، لیکن وہ شہر نہیں ہے—یہ تفصیلات کو چھوڑ دیتا ہے، پرانا ہو جاتا ہے، اور کبھی بھی سب کچھ حاصل نہیں کر سکتا۔ یہی حال ذہنی ماڈلز، سائنسی تھیوریز، اور تنظیمی چارٹس کا ہے۔

  سبھی ماڈلز غلط ہیں؛ کچھ مفید ہیں۔ خطرہ یہ ہے کہ کسی ماڈل کو مکمل سچائی کے طور پر سمجھا جائے، خاص طور پر جب علاقے میں تبدیلی آئی ہو۔ اچھی سوچ کے لیے جب حقیقت سے میل نہ کھائے تو نقشوں کو اپ ڈیٹ کرنے کی ضرورت ہوتی ہے۔

why_this_is_important: |
  یہ تسلیم کرنا کہ نقش علاقے سے مختلف ہوتے ہیں، ماڈلز میں زیادہ اعتماد کو روکتا ہے، عقائد کو اپ ڈیٹ کرنے کی حوصلہ افزائی کرتا ہے، اور پرانی یا زیادہ سادہ معلومات پر عمل کرنے کے خطرے کو کم کرتا ہے۔

when_to_use:
  - فیصلہ_کرنا
  - مسئلہ_حل_کرنا
  - سیکھنا
  - خطرہ_کا_جائزہ

how_can_you_spot_it:
  model_reality_confusion: |
    کسی فریم ورک یا تھیوری کو ایسے سمجھنا جیسے یہ حقیقت کو مکمل طور پر بیان کرتا ہے۔
  outdated_assumptions: |
    ایسی معلومات یا ماڈلز پر عمل کرنا جو اب موجودہ حالات سے میل نہیں کھاتے۔
  oversimplification: |
    بنیادی باتوں کو نظر انداز کرنا کیونکہ "نقش" میں وہ شامل نہیں ہیں۔
  map_worship: |
    ثبوتوں کے متضاد ہونے کے باوجود ماڈل کا دفاع کرنا بجائے اس کے کہ اسے اپ ڈیٹ کیا جائے۔

examples:
  organizational_charts: |
    یہ فرض کرنا کہ رپورٹنگ کا ڈھانچہ کام کرنے کے اصل طریقے کو ظاہر کرتا ہے۔
  financial_models: |
    اسپریڈ شیٹ پروجیکشن کو منظر نامے کے بجائے پیشین گوئی کے طور پر سمجھنا۔
  stereotypes: |
    گروپ کی سطح کی عمومیات کو افراد پر لاگو کرنا۔
  strategy_docs: |
    ایک منصوبے پر عمل کرنا جیسا کہ لکھا گیا تھا جب مارکیٹ بدل چکی ہو۔

real_world_implications: |
  نقش-علاقے کا فرق سائنس، انجینئرنگ، اور فلسفہ کا بنیادی حصہ ہے۔ یہ Bayesian اپ ڈیٹ، چست طریقہ کار، اور معرفتی عاجزی کی بنیاد ہے۔ اس کو نظر انداز کرنے سے سخت سوچ اور ناکام حکمت عملی ہوتی ہے۔

professional_application:
  networking_and_relationship_building: |
    کسی شخص کے بارے میں آپ کا ذہنی ماڈل پرانا ہو سکتا ہے۔ پرانے تاثرات پر انحصار کرنے کے بجائے براہ راست بات چیت کے ذریعے اسے اپ ڈیٹ کریں۔
  collaborative_learning_initiative: |
    ٹیموں کو منصوبوں اور ماڈلز کو پرکھنے اور نظر ثانی کرنے کے لیے فرضیات کے طور پر سمجھنے کی حوصلہ افزائی کریں، نہ کہ مقررہ سچائیوں کے طور پر۔

how_can_this_be_misapplied:
  radical_skepticism: |
    یہ نتیجہ اخذ کرنا کہ کوئی نقشہ مفید نہیں ہے اور تمام علم مشکوک ہے۔
  constant_revision: |
    اتنی کثرت سے نظر ثانی کرنا کہ کوئی مستحکم سمجھ پیدا نہ ہو۔
  dismissing_models: |
    مفید سادہ بنانے والوں کو اس لیے رد کرنا کیونکہ وہ "علاقے نہیں ہیں"۔
  relativism: |
    یہ دعویٰ کرنا کہ تمام نقش برابر کے قابل ہیں جب کچھ واضح طور پر علاقے کو بہتر طور پر فٹ کرتے ہیں۔

