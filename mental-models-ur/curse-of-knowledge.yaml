# علم کا عذاب
# ذہنی ماڈل / علمی تعصب - مثال اندراج

id: curse_of_knowledge
name: علم کا عذاب

quick_introduction: |
  علم کا عذاب وہ مشکل ہے جو کسی چیز کو جاننے کے بعد یہ تصور کرنے میں پیش آتی ہے کہ اسے نہ جاننا کیسا ہوتا ہے۔ ماہرین نئے لوگوں کو سکھانے میں مشکل محسوس کرتے ہیں کیونکہ وہ نئے لوگوں کے نقطہ نظر کو دوبارہ تخلیق نہیں کر سکتے۔ جب آپ کوئی چیز جانتے ہیں، تو آپ بھول جاتے ہیں کہ اسے نہ جاننا کیسا تھا۔

one_liner: جب آپ کوئی چیز جانتے ہیں، تو آپ بھول جاتے ہیں کہ اسے نہ جاننا کیسا ہوتا ہے۔

try_this:
  - وضاحت کرتے وقت، بنیادی اصولوں سے شروع کریں—فرض کریں کہ آپ کے سامعین کچھ نہیں جانتے۔
  - کسی نئے شخص سے کہیں کہ وہ واپس سمجھائے؛ ان کی الجھن آپ کے اندھے سپاٹس کو ظاہر کرتی ہے۔
  - اس وقت محسوس کریں جب آپ مراحل چھوڑ رہے ہوں یا ایسی اصطلاحات استعمال کر رہے ہوں جنہیں دوسرے شاید نہ جانتے ہوں۔

ask_yourself:
  - کیا میں فرض کر رہا ہوں کہ دوسروں کے پاس وہی سیاق و سباق ہے جو میرے پاس ہے؟
  - کیا میری پس منظر کے بغیر کوئی شخص اسے سمجھے گا؟

in_more_detail: |
  ایک کلاسیکی تجربے میں، جن لوگوں کو ایک پہیلی کا جواب معلوم تھا انہوں نے گانے کی دھن کو ٹیپ کیا اور دوسروں سے اس کا اندازہ لگانے کی توقع کی—انہوں نے اس کی واضحیت کو زیادہ سمجھا۔ ٹیپ کرنے والے اپنے ذہن میں گانے کو "سننا بند" نہیں کر سکتے تھے۔ علم "چپکنے والا" ہوتا ہے؛ جہالت کی نقل کرنا مشکل ہے۔

  یہ عذاب تدریس، مواصلات، پروڈکٹ ڈیزائن اور قیادت کو متاثر کرتا ہے۔ ہم فرض کرتے ہیں کہ دوسروں کے پاس وہی سیاق و سباق ہے جو ہمارے پاس ہے۔ ہم اصطلاحات استعمال کرتے ہیں۔ ہم مراحل چھوڑتے ہیں۔ ہم حیران ہوتے ہیں جب لوگ "سمجھ نہیں پاتے"۔

why_this_is_important: |
  علم کے عذاب کو تسلیم کرنے سے تدریس، مواصلات اور پروڈکٹ ڈیزائن میں بہتری آتی ہے۔ یہ آپ کو لوگوں سے وہاں ملنے میں مدد کرتا ہے جہاں وہ ہیں، نہ کہ جہاں آپ ہیں. یہ مؤثر علم کی منتقلی کے لیے ضروری ہے۔

when_to_use:
  - سیکھنا
  - قیادت
  - مسئلہ_حل_کرنا
  - رشتہ_سازی

how_can_you_spot_it:
  obvious_to_you: |
    یہ "ظاہر ہے" تب ہوتا ہے جب یہ صرف اس لیے ظاہر ہوتا ہے کیونکہ آپ جواب جانتے ہیں۔
  jargon_use: |
    ایسی اصطلاحات کا استعمال کرنا جو سامعین نہیں جانتے، انہیں تعریف کیے بغیر۔
  skipped_steps: |
    یہ فرض کرنا کہ دوسرے اس خلا کو پر کریں گے جو آپ نے چھوڑ دیا ہے۔
  frustration_with_learners: |
    "وہ اسے کیوں نہیں دیکھ سکتے؟" جب ان کے پاس آپ کا سیاق و سباق نہ ہو۔

examples:
  teaching: |
    ایک ریاضی کا پروفیسر ایسے مراحل کو چھوڑ دیتا ہے جو ان کے لیے "ظاہر" ہوتے ہیں لیکن
    طلباء کے لیے ضروری ہوتے ہیں۔
  product_design: |
    ڈیزائنرز ایسے انٹرفیس بناتے ہیں جو ان کے لیے معنی خیز ہوتے ہیں لیکن
    نئے صارفین کو الجھا دیتے ہیں۔
  onboarding: |
    تجربہ کار ملازمین بھول جاتے ہیں کہ نئے ملازمین کیا نہیں جانتے اور
    ناقص تربیت فراہم کرتے ہیں۔
  writing: |
    مصنفین فرض کرتے ہیں کہ قارئین کے پاس وہی پس منظر ہے اور وہ
    ضروری سیاق و سباق سے محروم رہتے ہیں۔

real_world_implications: |
  علم کا عذاب مواصلات کے فرق، ناکام مصنوعات اور ناکارہ تدریس پیدا کرتا ہے۔ یہی وجہ ہے کہ ماہرین خراب
  استاد ہو سکتے ہیں۔ اس پر قابو پانے کے لیے سامعین کے نقطہ نظر کو اپنانے کے لیے جان بوجھ کر کوشش کرنے کی ضرورت ہے۔

professional_application:
  networking_and_relationship_building: |
    وضاحت کرتے وقت، دوسرے شخص کی سطح سے شروع کریں۔ پوچھیں "وہ
    پہلے سے کیا جانتے ہیں؟" اپنی مواصلات کو کسی ایسے شخص کے ساتھ جانچیں
    جس کے پاس آپ کا پس منظر نہ ہو۔
  collaborative_learning_initiative: |
    "مجھے ایسے سمجھاؤ جیسے میں پانچ سال کا ہوں" مشقوں کا استعمال کریں۔ ماہرین سے
    نئے لوگوں کو سکھانے اور رائے حاصل کرنے کو کہیں۔ ایسی دستاویزات بنائیں جو
    کسی بھی سابقہ ​​علم کو فرض نہ کریں۔ ہم مرتبہ تدریس کا استعمال کریں—وہ لوگ جنہوں نے حال ہی میں
    سیکھا ہے وہ نئے شخص کے نقطہ نظر کو یاد رکھتے ہیں۔

how_can_this_be_misapplied:
  oversimplification: |
    اس حد تک سادہ بنانا جہاں غلطی ہو یا تحقیر ہو۔
  false_assumption: |
    یہ فرض کرنا کہ دوسرے ان سے کم جانتے ہیں—یہ بھی کیلیبریشن کی ناکامی ہے۔
  one_size_fits_all: |
    تمام سامعین کو ایک ہی سطح کی وضاحت کی ضرورت نہیں ہوتی؛ سامعین کے مطابق
    ڈھالیں۔
  avoiding_complexity: |
    کچھ موضوعات پیچیدہ ہوتے ہیں۔ علم کا عذاب کا مطلب یہ نہیں ہے کہ
    جب مناسب ہو تو ہمیں کبھی بھی تکنیکی زبان کا استعمال نہیں کرنا چاہیے۔

