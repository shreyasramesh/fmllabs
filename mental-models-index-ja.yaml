# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Japanese)

mental_models:
  - id: ambiguity_effect
    name: あいまいさ効果
    path: mental-models-ja/ambiguity-effect.yaml
    description: |
      あいまいさ効果とは、結果の確率に関する情報がない場合に、選択肢を避ける傾向のことです。
      たとえ未知のリスクの方が優れている可能性がある場合でも、私たちは既知のリスクを未知のリスクよりも好みます。
      不確実性そのものが嫌悪感を与えます。

  - id: anchoring_bias
    name: アンカリングバイアス
    path: mental-models-ja/anchoring-bias.yaml
    description: |
      アンカリングバイアスとは、意思決定を行う際に、最初に出会った情報に過度に依存する傾向のことです。その最初の「アンカー」は、たとえそれが無関係または恣意的なものであっても、その後の判断を歪めます。

  - id: availability_cascade
    name: アベイラビリティ・カスケード
    path: mental-models-ja/availability-cascade.yaml
    description: |
      アベイラビリティ・カスケードとは、アイデアが公の議論で繰り返し共有されることで、そのもっともらしさを増していく自己強化的なプロセスです。議論されるほど「利用可能」になり、より多くの人がそれを信じるようになり、さらに議論されるようになります。集合的な信念は、その根拠となる真実にかかわらず、勢いを増します。

  - id: availability_heuristic
    name: 利用可能性ヒューリスティック
    path: mental-models-ja/availability-heuristic.yaml
    description: |
      利用可能性ヒューリスティックとは、出来事の起こりやすさを、どれだけ簡単に例が思い浮かぶかで判断する傾向のことです。すぐに例を思い出すことができれば、その出来事は一般的だと仮定します。鮮明で、最近の、または感情的な例が、確率の見積もりを支配します。

  - id: baader_meinhof_phenomenon
    name: バアダー・マインホフ現象
    path: mental-models-ja/baader-meinhof-phenomenon.yaml
    description: |
      バアダー・マインホフ現象（周波数幻想とも呼ばれる）は、新しいことを学んだ後に、突然どこでもそれを見るようになる現象です。偶然のように感じられますが、それはしばしば選択的注意によるものです。脳が最近遭遇したものに注意を払うように調整されるためです。

  - id: barnum_effect
    name: バーナム効果
    path: mental-models-ja/barnum-effect.yaml
    description: |
      バーナム効果（またはフォアラー効果）とは、曖昧で一般的な性格記述を、
      自分だけにあてはまる正確なものとして受け入れてしまう傾向のことです。
      占いや占い師、性格診断テストは、ほとんどすべての人に当てはまるような
      記述を使用しますが、私たちはそれが自分に固有のものであると信じてしまいます。
      私たちは、ありきたりなものの中に自分自身を見出します。

  - id: base_rate_fallacy
    name: ベイジアン・フォールシー（基本確率の誤謬）
    path: mental-models-ja/base-rate-fallacy.yaml
    description: |
      ベイジアン・フォールシーとは、特定の鮮明な情報に飛びついて、一般的な統計情報（基本確率）を無視する傾向のことです。個別の事例を過大評価し、事前確率を過小評価してしまいます。説得力のある一つの話が、数字が示すものを覆してしまうことがあります。

  - id: bayes_theorem
    name: ベイズの定理
    path: mental-models-ja/bayes-theorem.yaml
    description: |
      ベイズの定理は、新しい証拠を得たときに仮説の確率を更新する方法を説明します。
      これは、信念は証拠がそれをどれだけうまく支持しているかに比例して変化すべきであるという考え方を形式化したものであり、全か無かではなく、段階的に変化するものです。

  - id: ben_franklin_effect
    name: ベン・フランクリン効果
    path: mental-models-ja/ben-franklin-effect.yaml
    description: |
      ベン・フランクリン効果とは、人は誰かのために好意を施した後、その人をより好きになるという心理現象のことです。好意を寄せる人に好意を施すという直感に反して、私たちはしばしば好意を施した相手を好きになるのです。

  - id: bounded_rationality
    name: 限定合理性
    path: mental-models-ja/bounded-rationality.yaml
    description: |
      限定合理性とは、人間の意思決定は、利用可能な情報、認知能力、時間によって制限されるという考え方です。私たちは最適化するのではなく、「満足」します。つまり、可能な限り最善の選択肢ではなく、十分な選択肢を選びます。

  - id: bystander_effect
    name: バイスタンダー効果
    path: mental-models-ja/bystander-effect.yaml
    description: |
      バイスタンダー効果とは、他人がいる場合に、個人が助けを提供する可能性が低くなる傾向のことです。目撃者が多ければ多いほど、一人一人が行動を起こす可能性は低くなります。責任が分散され、私たちは「誰かが助けてくれるだろう」と想定してしまいます。

  - id: circle_of_competence
    name: コンピタンスの範囲
    path: mental-models-ja/circle-of-competence.yaml
    description: |
      コンピタンスの範囲とは、自身の専門知識の限界を知り、重要な意思決定を行う際にその範囲内に留まることを促すメンタルモデルです。ウォーレン・バフェットとチャーリー・マンガーは、自分が知らないことを知ることの重要性を強調しています。

  - id: cognitive_dissonance
    name: 認知的不協和
    path: mental-models-ja/cognitive-dissonance.yaml
    description: |
      認知的不協和とは、相反する信念を持っているとき、あるいは自分の行動が信念と矛盾するときに感じる精神的な不快感のことです。私たちはこの不快感を軽減しようと動機づけられます。しばしば、行動を変えるのではなく、信念を自分の行動に合わせるように変更します。

  - id: confirmation_bias
    name: 確証バイアス
    path: mental-models-ja/confirmation-bias.yaml
    description: |
      確証バイアスとは、既存の信念を裏付けるような情報を探し、解釈し、記憶する傾向のことです。私たちは、支持する証拠により重きを置き、自分たちの見解に反する証拠を軽視したり却下したりします。仮説を検証するのではなく、確認するような質問をします。

  - id: curse_of_knowledge
    name: 知識の呪い
    path: mental-models-ja/curse-of-knowledge.yaml
    description: |
      知識の呪いとは、一度知ってしまうと、それを知らない状態がどういうものかを想像するのが難しくなることです。専門家は、初心者の視点を再現できないため、初心者に教えるのに苦労します。知ってしまうと、知らなかった頃のことを忘れてしまいます。

  - id: default_effect
    name: デフォルト効果
    path: mental-models-ja/default-effect.yaml
    description: |
      デフォルト効果とは、選択肢を提示された際に、あらかじめ選択されている選択肢を選びがちな傾向のことです。デフォルトとして設定されたものは強い利点を持つため、それが最適でなかったとしても、人々はしばしばそれに固執します。

  - id: dunning_kruger_effect
    name: ダニング＝クルーガー効果
    path: mental-models-ja/dunning-kruger-effect.yaml
    description: |
      ダニング＝クルーガー効果とは、ある分野において知識やスキルが限定的な人々が自身の能力を過大評価し、逆に専門家は自身の能力を過小評価する傾向があるという認知バイアスを指します。知れば知るほど、自信がなくなることがあります。

  - id: empathy_gap
    name: 共感ギャップ
    path: mental-models-ja/empathy-gap.yaml
    description: |
      共感ギャップとは、自分自身が異なる状態にあるときに、他者の精神状態を理解し予測することが困難になることです。穏やかな状態にあるとき、怒りや空腹を感じているときの自分の感情を過小評価します。満腹のとき、空腹のときの自分の食欲を過小評価します。

  - id: endowment_effect
    name: エンドーメント効果
    path: mental-models-ja/endowment-effect.yaml
    description: |
      エンドーメント効果とは、単に所有しているという理由だけで、ある物事の価値を高く評価してしまう傾向のことです。私たちは、それを手に入れるために支払うであろう金額よりも、それを手放すためにより多くの金額を要求します。所有は、私たちの評価を歪める愛着を生み出します。

  - id: false_consensus_effect
    name: 偽りの合意効果
    path: mental-models-ja/false-consensus-effect.yaml
    description: |
      偽りの合意効果とは、他者が私たちの信念、態度、行動にどれだけ同意しているかを過大評価する傾向のことです。私たちは自分の見解が実際よりも一般的であると仮定し、合理的な人々が同意しないということを想像するのが難しいと感じます。

  - id: framing_effect
    name: フレーミング効果
    path: mental-models-ja/framing-effect.yaml
    description: |
      フレーミング効果とは、根本的な事実は同じであっても、選択肢がどのように提示されるかによって、私たちの決定が変化する傾向のことです。「生存率90%」と「死亡率10%」は同じ結果を表しますが、異なる選択を促します。フレーミングが意思決定を形作ります。

  - id: fundamental_attribution_error
    name: 基本的帰属の誤り
    path: mental-models-ja/fundamental-attribution-error.yaml
    description: |
      基本的帰属の誤りとは、他者の行動をその人の性格や性質に帰属させる傾向があるのに対し、
      自分自身の行動は状況要因に帰属させる傾向のことです。私たちは他者をその行動で判断し、
      自分自身をその意図で判断します。

  - id: gamblers_fallacy
    name: ギャンブラーの誤謬
    path: mental-models-ja/gamblers-fallacy.yaml
    description: |
      ギャンブラーの誤謬とは、過去の独立した事象が将来の事象に影響を与えるという誤った信念です。連続して表が出た後、私たちは裏が出る「番」だと考えがちですが、実際には各コイン投げは独立しています。私たちはランダム性の中にパターンを見出し、必要のない「修正」や「反転」を期待してしまうのです。

  - id: groupthink
    name: 集団思考
    path: mental-models-ja/groupthink.yaml
    description: |
      集団思考とは、結束力の強い集団が、批判的な評価よりも合意と調和を優先する傾向のことです。メンバーは反対意見を抑圧し、自己検閲を行い、集団の認識されている見解に同調します。意見の一致を求める願望が、最良の決定を求める願望を凌駕します。

  - id: halo_effect
    name: ハロー効果
    path: mental-models-ja/halo-effect.yaml
    description: |
      ハロー効果とは、人の持つ一つの肯定的な特徴や印象が、その人全体に対する判断に影響を与える傾向のことです。外見が気に入れば、その人が有能だと仮定するかもしれません。一つのスキルを賞賛すれば、何でもうまくやれると仮定するかもしれません。一つの肯定的な属性が、他のすべてに「ハロー（光輪）」を投げかけるのです。

  - id: hanlons_razor
    name: ハンロンの剃刀
    path: mental-models-ja/hanlons-razor.yaml
    description: |
      ハンロンの剃刀とは、「無能で十分に説明できることを悪意に帰するな」という原則です。言い換えれば、無能、見落とし、無知がその行動を説明できる場合に、悪い意図を仮定しないでください。

  - id: hawthorne_effect
    name: ホーソン効果
    path: mental-models-ja/hawthorne-effect.yaml
    description: |
      ホーソン効果とは、人々が観察されている、あるいは研究されていることを知っている場合に、自身の行動を変化させる傾向のことです。観測そのものが変化を引き起こす可能性があり、必ずしもテストされている介入によるものではありません。人々は受けた注目に反応します。

  - id: hindsight_bias
    name: 後知恵バイアス
    path: mental-models-ja/hindsight-bias.yaml
    description: |
      後知恵バイアス（「知っていた、あの時」効果とも呼ばれる）は、
      出来事が起こった後で、それを予測または予期できただろうと信じる傾向のことです。
      結果が実際よりも避けられなかったように思えるように、過去を再構築します。

  - id: hyperbolic_discounting
    name: ハイパーボリック・ディスカウンティング
    path: mental-models-ja/hyperbolic-discounting.yaml
    description: |
      ハイパーボリック・ディスカウンティングとは、より大きくて将来の報酬よりも、小さくて近い報酬を優先する傾向であり、合理的なモデルが予測するよりも将来を急激に割り引くことです。私たちは、一貫性のない方法で現在を過大評価し、将来を過小評価します。

  - id: illusion_of_control
    name: 統制の幻想
    path: mental-models-ja/illusion-of-control.yaml
    description: |
      統制の幻想とは、私たちが結果に影響を与える能力を過大評価する傾向のことです。
      私たちは、ランダムな出来事、他人、複雑なシステムに対して、実際よりも多くのコントロールを持っていると信じてしまいます。
      相関関係を因果関係と、行動を影響力と混同します。

  - id: impact_bias
    name: インパクトバイアス
    path: mental-models-ja/impact-bias.yaml
    description: |
      インパクトバイアスとは、将来の出来事に対する感情的な反応の激しさや持続時間を過大評価する傾向のことです。良い出来事は期待していたほど幸福感を高めず、悪い出来事は期待していたほど不幸にしないと考えてしまいます。私たちは感情予測が苦手なのです。

  - id: in_group_bias
    name: イングループバイアス
    path: mental-models-ja/in-group-bias.yaml
    description: |
      イングループバイアスとは、自分たちのグループに属していると認識している人々を、外部の人間と認識している人々よりもひいきする傾向のことです。最小限または任意の違いに基づいて、イングループのメンバーには肯定的な資質を、アウトグループのメンバーには否定的な資質を帰属させることがよくあります。

  - id: inversion
    name: 逆転の発想
    path: mental-models-ja/inversion.yaml
    description: |
      逆転の発想とは、問題をひっくり返して考える問題解決手法です。「どうすれば成功できるか？」と問う代わりに、「何が私を失敗させるか？」と問い、それらを避けるのです。これは、前向きな思考では見落としがちなリスクやアンチパターンを明らかにします。

  - id: law_of_diminishing_returns
    name: 収穫逓減の法則
    path: mental-models-ja/law-of-diminishing-returns.yaml
    description: |
      収穫逓減の法則とは、他の要素を一定に保ったまま、ある一つの投入要素を増やしていくと、
      投入要素の各新規単位からの追加的産出は最終的に減少するという法則である。
      多ければ多いほど良いとは限らない――余分な労力がますます少ない成果しか生まなくなる時点がある。

  - id: loss_aversion_bias
    name: 損失回避バイアス
    path: mental-models-ja/loss-aversion-bias.yaml
    description: |
      損失回避とは、同等の利益を得ることよりも損失を避けることを好む傾向のことです。
      人は、得る喜びよりも失う痛みを約2倍強く感じると言われています。

  - id: map_is_not_the_territory
    name: 地図は領土ではない
    path: mental-models-ja/map-is-not-the-territory.yaml
    description: |
      「地図は領土ではない」とは、現実の表象は現実そのものではないという意味です。
      モデル、理論、説明は有用な単純化ですが、常に何かを省略しています。
      地図を領土と混同すると、誤りに陥ります。

  - id: mere_exposure_effect
    name: 単純接触効果
    path: mental-models-ja/mere-exposure-effect.yaml
    description: |
      単純接触効果とは、単にそれらに慣れ親しんでいるという理由だけで、物事に対する好みを育む傾向のことです。たとえ強化がなくても、繰り返し接触することで好感度が増します。私たちは知っているものを好む傾向があります。

  - id: narrative_fallacy
    name: ナラティブの誤謬
    path: mental-models-ja/narrative-fallacy.yaml
    description: |
      ナラティブの誤謬とは、過去の出来事から、実際よりも首尾一貫していて、予測可能で、意味のあるように見える物語を構築する傾向のことです。私たちはランダムな出来事に後付けで説明をします。歴史の混乱を整然とした物語に変え、そしてその物語が必然だったと信じます。

  - id: negativity_bias
    name: ネガティビティ・バイアス（否定性バイアス）
    path: mental-models-ja/negativity-bias.yaml
    description: |
      ネガティビティ・バイアスとは、肯定的な情報よりも否定的な情報に重きを置く傾向のことです。
      悪いニュース、批判、脅威は、同等の肯定的な刺激よりも私たちの注意を引きつけ、意思決定に強く影響します。

  - id: occams_razor
    name: オッカムの剃刀
    path: mental-models-ja/occams-razor.yaml
    description: |
      オッカムの剃刀（またはオッカムの原則）とは、競合する仮説の中から、最も仮定の少ないものを優先すべきであるという原則です。単純な説明は、常に正しいわけではありませんが、しばしば正しいのです。

  - id: ostrich_effect
    name: オーストリッチ効果
    path: mental-models-ja/ostrich-effect.yaml
    description: |
      オーストリッチ効果とは、ダチョウのように「砂に頭を埋める」ように、否定的な金融情報から逃避する傾向のことです。人々は、市場が下落しているときにポートフォリオを見るのを避けたり、請求書の開封を遅らせたり、行動に役立つ警告サインを無視したりします。

  - id: pareto_principle
    name: パレートの法則
    path: mental-models-ja/pareto-principle.yaml
    description: |
      パレートの法則（または80/20ルール）は、結果の約80％が原因の約20％から生じるというものです。
      入力のわずかな少数派が、しばしば出力の大多数を生み出します。
      売上、バグ、顧客、労力、機能など、多岐にわたります。
      重要な少数に焦点を当てましょう。

  - id: parkinsons_law
    name: パーキンソンの法則
    path: mental-models-ja/parkinsons-law.yaml
    description: |
      パーキンソンの法則とは、「仕事の量は、完成のために与えられた時間をすべて満たすまで膨張する」というものである。タスクに1週間与えれば1週間かかるが、1日与えれば多くの場合1日で完了する。これは予算、チームの規模、リソースにも同様に当てはまる。

  - id: probabilistic_thinking
    name: 確率的思考
    path: mental-models-ja/probabilistic-thinking.yaml
    description: |
      確率的思考とは、確実性ではなく、可能性（確率）の観点から推論する習慣です。「これが起こるか？」と問う代わりに、「これはどれくらい起こりそうか？」と問います。不確実性を受け入れ、それを利用してより良い意思決定を行います。

  - id: pygmalion_effect
    name: ピグマリオン効果
    path: mental-models-ja/pygmalion-effect.yaml
    description: |
      ピグマリオン効果（またはローゼンタール効果）とは、高い期待がパフォーマンスの向上につながる現象のことです。教師、上司、あるいは他者が誰かに対してより多くを期待すると、その人はより良いパフォーマンスを発揮する傾向があります。期待は自己成就予言となります。

  - id: regression_to_the_mean
    name: 平均への逆行
    path: mental-models-ja/regression-to-the-mean.yaml
    description: |
      平均への逆行とは、極端な結果の後には平均値に近い結果が続くという統計現象です。
      異常に良い結果や悪い結果の後には、原因となる介入がなくても、ランダムな変動によって次の結果は極端でなくなる可能性が高いです。

  - id: rosy_retrospection
    name: バラ色の回顧
    path: mental-models-ja/rosy-retrospection.yaml
    description: |
      バラ色の回顧とは、過去を実際よりも良く覚えてしまう傾向のことです。
      私たちは時間の経過とともに過去の経験をより肯定的に思い出し、困難を円滑にし、良い点を増幅させます。「あの頃は良かった」というのは、しばしば私たちが覚えているほど良かったわけではありません。

  - id: salience_bias
    name: サリエンスバイアス (顕著性バイアス)
    path: mental-models-ja/salience-bias.yaml
    description: |
      サリエンスバイアスとは、状況の最も目立つ、あるいは気づきやすい側面に焦点を当て、
      それほど明白ではないが潜在的に重要な要因を見落としがちな傾向のことです。
      際立っているものが、私たちの判断において不釣り合いな注意と重みを与えられます。

  - id: scarcity_bias
    name: 富豪バイアス
    path: mental-models-ja/scarcity-bias.yaml
    description: |
      希少性バイアスとは、物事が希少である、あるいは限定的であると認識されたときに、それらの価値を高く評価する傾向のことです。「期間限定」「残り3点のみ」「限定アクセス」といった言葉は、合理的な評価をしばしば超えて、緊急性と欲求を刺激します。

  - id: second_order_thinking
    name: 第二次思考
    path: mental-models-ja/second-order-thinking.yaml
    description: |
      第二次思考とは、自分の行動の結果の、さらにその結果までを考慮する実践のことです。一次思考は「Xをしたらどうなるか？」と問いますが、第二次思考は「その次は？」「さらにその次は？」と問います。これは意図しない影響を浮き彫りにします。

  - id: sunk_cost_fallacy
    name: サンクコストの誤謬
    path: mental-models-ja/sunk-cost-fallacy.yaml
    description: |
      サンクコストの誤謬とは、将来の期待リターンに基づいてではなく、
      すでに費やしたリソースのために、意思決定を継続する傾向のことです。
      「ここまで来たのだから」とか「もうたくさん投資した」という考えは、
      悪いものにさらに良いものを投げ込むことにつながります。

  - id: survivorship_bias
    name: 生存者バイアス
    path: mental-models-ja/survivorship-bias.yaml
    description: |
      生存者バイアスとは、プロセスを「生き残った」人々や物事に焦点を当て、
      そうでないものを無視してしまう論理的誤謬です。勝者を見て敗者を忘れ、
      成功と失敗について過度に楽観的な結論に至ります。

  - id: zeigarnik_effect
    name: ツァイガルニク効果
    path: mental-models-ja/zeigarnik-effect.yaml
    description: |
      ツァイガルニク効果とは、完了したタスクよりも、未完了または中断されたタスクをよりよく記憶する傾向のことです。未完了のタスクは心理的な緊張を生み出し、それが私たちの心の中でアクティブに保ちます。私たちの脳は、未完成のものにしがみつきます。

  - id: zero_sum_thinking
    name: ゼロサム思考
    path: mental-models-ja/zero-sum-thinking.yaml
    description: |
      ゼロサム思考とは、誰かの利益は誰かの損失でなければならない、つまり資源は固定されており、自分にとってのどんな有利も私にとっての不利になるという考え方です。実際には、多くの状況はポジティブサム（両者が利益を得られる）です。
