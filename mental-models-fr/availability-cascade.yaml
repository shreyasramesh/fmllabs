id: availability_cascade
name: Cascade de Disponibilité

quick_introduction: |
  Une cascade de disponibilité est un processus auto-renforcé où une idée gagne
  en plausibilité par la discussion publique répétée. Plus elle est discutée,
  plus elle devient "disponible", plus les gens y croient, et plus elle est discutée.
  Une croyance collective prend de l'élan indépendamment de sa vérité sous-jacente.

one_liner: Plus une idée est répétée, plus elle semble plausible — indépendamment des preuves.

try_this:
  - Demander : Cette croyance est-elle répandue parce qu'elle est vraie, ou parce qu'elle est répétée ?
  - Rechercher les sources primaires avant d'accepter "ce que tout le monde sait".
  - Remarquer quand la répétition seule motive votre sentiment de plausibilité.

ask_yourself:
  - Croirais-je cela si je l'avais entendu une seule fois ?
  - Suis-je en train de confondre "tout le monde le dit" avec "les preuves le soutiennent" ?

in_more_detail: |
  Timur Kuran et Cass Sunstein ont décrit le fonctionnement des cascades de disponibilité :
  la disponibilité de l'information (fréquence à laquelle nous entendons quelque chose) et la plausibilité
  (à quel point cela semble crédible) se renforcent mutuellement. La couverture médiatique, les médias sociaux
  et le discours public amplifient certaines idées. Une fois qu'une idée atteint un seuil de disponibilité,
  elle peut se propager rapidement et devenir une "connaissance commune" même si elle est fausse ou exagérée.

  Les cascades de disponibilité peuvent être bénéfiques (diffusion d'avertissements importants)
  ou nuisibles (propagation de la panique ou de la désinformation). Elles sont motivées par
  l'heuristique de disponibilité et la preuve sociale.

why_this_is_important: |
  Reconnaître les cascades de disponibilité vous aide à évaluer si une croyance répandue reflète des preuves
  ou une simple répétition. Cela explique comment les idées deviennent virales et comment les croyances collectives peuvent être fausses.
  C'est essentiel pour la littératie médiatique et la pensée critique.

when_to_use:
  - prise_de_decision
  - évaluation_des_risques
  - apprentissage
  - leadership

how_can_you_spot_it:
  repetition_plausibility_spiral: |
    Plus une idée est répétée, plus elle semble plausible.
  media_amplification: |
    La couverture médiatique alimente la croyance qui alimente plus de couverture médiatique.
  social_proof_belief: |
    "Tout le monde y croit" devient une preuve de croyance.
  threshold_effects: |
    Une fois qu'une idée franchit un seuil de visibilité, elle se propage rapidement.

examples:
  health_scares: |
    Une étude suggère qu'un produit est dangereux ; les médias l'amplifient ;
    le public l'évite ; davantage de couverture médiatique s'ensuit. Le risque peut être
    exagéré.
  financial_panic: |
    Des rumeurs de faillite bancaire se répandent ; les gens retirent leur argent ; la ruée
    devient auto-réalisatrice.
  social_media: |
    Un récit devient viral ; la répétition augmente la croyance ; la croyance
    augmente le partage. La vérité et la viralité peuvent diverger.
  organizational: |
    Une rumeur de licenciements se répand ; l'anxiété augmente ; les comportements
    changent ; la rumeur gagne en plausibilité par la réaction.

real_world_implications: |
  Les cascades de disponibilité façonnent l'opinion publique, les politiques et les marchés.
  Elles peuvent propager à la fois des vérités importantes et des falsités dangereuses.
  La pensée critique exige de distinguer la croyance basée sur des preuves
  de la croyance motivée par une cascade.

professional_application:
  networking_and_relationship_building: |
    Lorsqu'une idée est "partout", demandez-vous : est-elle vraie parce qu'elle est
    répétée, ou répétée parce qu'elle est vraie ? Recherchez les sources primaires.
  collaborative_learning_initiative: |
    Créez des normes de vérification avant amplification. Encouragez
    la remise en question de "ce que tout le monde sait". Distinguez le consensus
    qui reflète des preuves du consensus qui reflète
    la disponibilité.

how_can_this_be_misapplied:
  dismissing_all_consensus: |
    Parfois, la croyance répandue est correcte. Ne supposez pas que toutes
    les idées populaires sont des cascades.
  conspiracy_thinking: |
    Utiliser la "cascade de disponibilité" pour rejeter des préoccupations légitimes
    comme étant fabriquées.
  false_skepticism: |
    Rejeter des idées bien étayées parce qu'elles sont populaires.
  contrarianism: |
    Supposer que tout ce qui est largement cru doit être faux.

