id: ambiguity_effect
name: Effet d'ambiguïté

quick_introduction: |
  L'effet d'ambiguïté est la tendance à éviter les options lorsque nous manquons d'informations
  sur les probabilités des résultats. Nous préférons les risques connus aux risques
  inconnus, même lorsque les risques inconnus pourraient être meilleurs. L'incertitude elle-même semble
  aversion.

one_liner: Nous préférons les risques connus aux risques inconnus, même lorsque les risques inconnus pourraient être meilleurs.

try_this:
  - Demandez : Est-ce que j'évite cette option principalement à cause de l'incertitude, ou y a-t-il un inconvénient réel ?
  - Quantifiez ce que vous savez ; parfois, l'option « ambiguë » a un potentiel de gain plus clair.
  - Remarquez lorsque vous optez par défaut pour le familier simplement parce qu'il semble plus sûr.

ask_yourself:
  - Est-ce que je rejette quelque chose parce que c'est ambigu, ou parce que c'est vraiment pire ?
  - Que faudrait-il savoir pour être à l'aise avec l'option incertaine ?

in_more_detail: |
  Dans le paradoxe d'Ellsberg, les gens préfèrent parier sur une urne aux proportions connues
  plutôt que sur une urne aux proportions inconnues, même lorsque l'urne inconnue
  pourrait offrir de meilleures chances. Nous n'aimons pas l'ambiguïté ; nous préférons avoir une probabilité claire
  (même si elle est mauvaise) plutôt qu'une probabilité peu claire.

  Cet effet influence les décisions en matière d'investissement, de choix de carrière et de politique.
  Il peut conduire à des choix sous-optimaux lorsque nous évitons des options ambiguës
  mais potentiellement supérieures. Il explique également pourquoi nous préférons les marques familières
  et les quantités connues.

why_this_is_important: |
  Reconnaître l'effet d'ambiguïté vous aide à éviter de trop préférer le familier
  et de sous-préférer l'incertain. Il peut entraîner des opportunités manquées lorsque
  l'ambiguïté est gérable. Il explique également pourquoi la transparence et la clarté
  réduisent l'anxiété.

when_to_use:
  - prise_de_decision
  - evaluation_du_risque
  - investissement
  - evolution_professionnelle

how_can_you_spot_it:
  preference_for_known_risks: |
    Choisir des options avec des probabilités claires (même si moins bonnes) plutôt que des options ambiguës.
  avoidance_of_uncertainty: |
    Rejeter des options principalement parce que « nous n'en savons pas assez ».
  familiarity_over_optimality: |
    Préférer le connu au potentiel mieux inconnu.
  information_seeking: |
    Volonté de payer pour des informations qui réduisent l'ambiguïté, même lorsque cela
    ne change pas la décision.

examples:
  investing: |
    Préférer les actions nationales aux actions internationales parce que « nous les comprenons
    mieux », malgré les avantages de la diversification.
  employment: |
    Rester dans un emploi connu plutôt que d'accepter un poste avec un potentiel incertain.
  product_choice: |
    Choisir une marque familière plutôt qu'une nouvelle option à la qualité incertaine.
  medical: |
    Préférer un traitement aux effets secondaires connus plutôt qu'un autre aux résultats incertains,
    même lorsque ce dernier pourrait être meilleur.

real_world_implications: |
  L'effet d'ambiguïté façonne les marchés, les choix de carrière et la politique. Il peut être
  réduit en fournissant des informations plus claires ou en reformulant les décisions. Il
  explique également pourquoi la transparence et la communication réduisent l'anxiété.

professional_application:
  networking_and_relationship_building: |
    Réduire l'ambiguïté dans les relations : clarifier les attentes, communiquer
    explicitement et réduire l'incertitude. Les gens préfèrent les situations connues.
  collaborative_learning_initiative: |
    Lors de l'introduction d'un changement, réduire l'ambiguïté : fournir des informations claires sur
    ce qui se passera, quand et pourquoi. L'ambiguïté accroît la résistance.

how_can_this_be_misapplied:
  manipulation: |
    Créer délibérément de l'ambiguïté pour orienter les gens vers des options préférées.
  false_clarity: |
    Fournir une fausse certitude lorsqu'une incertitude réelle existe.
  overconfidence: |
    Supposer que la réduction de l'ambiguïté améliore toujours les décisions ; parfois,
    l'option ambiguë est réellement meilleure.
  analysis_paralysis: |
    Attendre des informations parfaites avant de décider lorsqu'une certaine ambiguïté
    est inévitable.

