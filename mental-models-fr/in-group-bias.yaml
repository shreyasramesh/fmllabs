# Biais de groupe
# Modèle mental / Biais cognitif - Entrée exemple

id: in_group_bias
name: Biais de groupe

quick_introduction: |
  Le biais de groupe est la tendance à favoriser les personnes que nous percevons comme appartenant à notre groupe par rapport à celles que nous percevons comme extérieures. Nous attribuons des qualités positives aux membres du groupe interne et des qualités négatives aux membres du groupe externe, souvent sur la base de distinctions minimes ou arbitraires.

one_liner: Nous favorisons notre groupe interne et jugeons les groupes externes plus sévèrement—souvent arbitrairement.

try_this:
  - Ask: Jugerais-je cette personne de la même manière si elle appartenait à mon groupe ?
  - Recherchez activement les perspectives des groupes externes lors de la prise de décisions.
  - Observez comment les frontières du groupe façonnent votre jugement.

ask_yourself:
  - Est-ce que je favorise quelqu'un parce qu'il fait "partie des nôtres" ?
  - Appliquerais-je les mêmes critères à un membre d'un groupe externe ?

in_more_detail: |
  Même lorsque les groupes sont attribués aléatoirement (par exemple, par tirage au sort), les gens développent rapidement une préférence pour leur groupe interne. Nous faisons davantage confiance aux membres de notre groupe, leur attribuons des ressources plus généreusement et jugeons leurs actions de manière plus charitable. Les membres du groupe externe reçoivent le traitement inverse.

  Le biais de groupe alimente le tribalisme, la discrimination et les conflits. Il affecte l'embauche, la promotion, la collaboration et les politiques. Il peut être basé sur la race, la nationalité, l'entreprise, l'équipe ou toute identité partagée.

why_this_is_important: |
  Reconnaître le biais de groupe vous aide à prendre des décisions plus justes, à constituer des équipes plus inclusives et à éviter le favoritisme. Cela explique également pourquoi les initiatives de diversité rencontrent des résistances—la préférence pour le groupe interne est automatique.

when_to_use:
  - leadership
  - prise_de_decision
  - creation_de_liens
  - resolution_de_conflits

how_can_you_spot_it:
  preferential_treatment: |
    Accorder le bénéfice du doute aux "nôtres" mais pas aux "autres".
  resource_allocation: |
    Allouer davantage aux membres du groupe interne alors que les membres du groupe externe ont des besoins égaux ou plus importants.
  attribution_asymmetry: |
    Succès du groupe interne = compétence ; succès du groupe externe = chance. Échec du groupe interne = circonstance ; échec du groupe externe = caractère.
  minimal_group_effects: |
    Le favoritisme apparaît même avec des attributions de groupe arbitraires.

examples:
  hiring: |
    Préférer des candidats qui sont allés à votre ancienne école ou partagent votre parcours.
  performance_reviews: |
    Évaluer les membres du groupe interne plus favorablement que les membres du groupe externe avec des performances similaires.
  collaboration: |
    Faire confiance et inclure "notre équipe" tout en excluant ou en doutant de "leur équipe".
  politics: |
    Rejeter les arguments du groupe externe tout en acceptant les arguments du groupe interne sans critique.

real_world_implications: |
  Le biais de groupe perpétue les inégalités, mine la méritocratie et alimente les conflits. Il affecte l'embauche, la promotion, l'investissement et les politiques. Le réduire demande un effort délibéré—il ne se résoudra pas de lui-même.

professional_application:
  networking_and_relationship_building: |
    Incluez activement des personnes en dehors de votre cercle immédiat. Recherchez des perspectives diverses. Interrogez-vous si vous favorisez quelqu'un parce qu'il est "comme vous".
  collaborative_learning_initiative: |
    Utilisez des processus structurés (évaluations anonymes, panels diversifiés) pour réduire le biais de groupe dans l'embauche et l'évaluation. Créez des projets inter-groupes pour construire une identité commune.

how_can_this_be_misapplied:
  forced_diversity: |
    Mettre en œuvre des quotas ou des politiques qui créent du ressentiment sans aborder les biais sous-jacents.
  out_group_hostility: |
    Considérer le biais de groupe comme le seul problème alors que l'hostilité envers le groupe externe existe également.
  ignoring_legitimate_differences: |
    Toutes les différences de groupe ne sont pas des biais—parfois les groupes ont des caractéristiques différentes. Ne supposez pas que toutes les disparités sont de la discrimination.
  reverse_discrimination: |
    Surcompenser pour favoriser les groupes externes de manière injuste pour les membres du groupe interne.

related_content:
