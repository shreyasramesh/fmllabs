id: bounded_rationality
name: Rationalité limitée

quick_introduction: |
  La rationalité limitée est l'idée que la prise de décision humaine est limitée par les informations
  disponibles, la capacité cognitive et le temps. Nous n'optimisons pas ; nous "satisfaisons" – nous choisissons
  des options qui sont suffisamment bonnes plutôt que les meilleures possibles.

one_liner: Nous satisfaisons – nous choisissons ce qui est suffisamment bon, pas optimal.

try_this:
  - Simplifiez les choix lorsque c'est possible ; trop d'options submergent la rationalité limitée.
  - Définissez des critères de "suffisamment bon" à l'avance pour éviter une recherche interminable.
  - Remarquez lorsque vous optimisez au-delà du point de rendements décroissants.

ask_yourself:
  - Cherche-je à trouver l'option parfaite alors qu'une option suffisamment bonne suffirait ?
  - Quelles contraintes (temps, informations, attention) limitent ma décision ?

in_more_detail: |
  Herbert Simon a introduit le concept pour contester l'hypothèse économique classique
  des acteurs rationnels avec des informations parfaites. En réalité, notre attention est limitée,
  notre mémoire de travail et notre temps. Nous utilisons des heuristiques et des raccourcis pour prendre des décisions
  qui sont "rationnelles" compte tenu de nos contraintes, même si elles ne sont pas optimales au sens idéal.

  La rationalité limitée explique pourquoi nous ne choisissons pas toujours la meilleure option, pourquoi nous
  nous fions à des règles empiriques, et pourquoi le contexte et le cadrage sont si importants. C'est un modèle descriptif
  de la façon dont nous décidons réellement, pas une prescription de la façon dont nous devrions.

why_this_is_important: |
  Comprendre la rationalité limitée vous aide à concevoir de meilleurs processus, à simplifier
  les choix pour les autres et à fixer des attentes réalistes quant à la qualité des décisions. Cela explique également
  pourquoi un comportement "irrationnel" est souvent rationnel sous contrainte.

when_to_use:
  - prise_de_decision
  - résolution_de_problèmes
  - leadership
  - évaluation_des_risques

how_can_you_spot_it:
  satisficing_behavior: |
    Les gens choisissent la première option acceptable plutôt que de comparer exhaustivement.
  heuristic_reliance: |
    Les décisions sont prises en utilisant des règles empiriques plutôt qu'une analyse complète.
  context_dependence: |
    La même personne prend des décisions différentes selon la manière dont les options sont présentées.
  information_overload: |
    Lorsque trop d'informations sont disponibles, la qualité des décisions peut diminuer.

examples:
  hiring: |
    Un manager embauche le premier candidat qui répond aux critères plutôt que d'interviewer
    indéfiniment pour trouver le "meilleur" candidat.
  consumer_choice: |
    Les acheteurs choisissent parmi les premières options sur une étagère plutôt que de comparer tous les
    produits du magasin.
  policy: |
    Les électeurs utilisent l'affiliation au parti ou quelques enjeux clés comme raccourcis plutôt que d'analyser toutes les positions politiques.
  daily_routines: |
    Les gens suivent des habitudes et des choix par défaut plutôt que de ré-optimiser chaque décision.

real_world_implications: |
  La rationalité limitée façonne les marchés, la conception des politiques et le comportement organisationnel.
  Les "coups de pouce" (nudges) et l'architecture des choix fonctionnent parce qu'ils tiennent compte de nos limites. Les ignorer
  conduit à des systèmes trop complexes que les gens ne peuvent pas utiliser efficacement.

professional_application:
  networking_and_relationship_building: |
    Ne vous attendez pas à ce que les autres traitent des compromis complexes en temps réel. Simplifiez les choix
    et fournissez des options par défaut claires.
  collaborative_learning_initiative: |
    Concevez des processus qui fonctionnent avec la rationalité limitée : réduisez les choix, fournissez
    des options par défaut et utilisez des listes de contrôle pour les décisions complexes.

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    Concevoir des processus qui supposent une capacité cognitive illimitée, conduisant à la fatigue décisionnelle et à de mauvais résultats.
  blaming_irrationality: |
    Rejeter les choix des autres comme irrationnels sans tenir compte de leurs contraintes.
  exploitation: |
    Submerger délibérément les gens avec de la complexité pour les orienter vers des résultats souhaités.
  perfectionism: |
    Attendre des décisions optimales alors que la satisfaction est souvent l'approche rationnelle.

