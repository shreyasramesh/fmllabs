# Effet Hawthorne
# Modèle mental / Biais cognitif - Entrée exemple

id: hawthorne_effect
name: Effet Hawthorne

quick_introduction: |
  L'effet Hawthorne est la tendance des personnes à modifier leur comportement
  lorsqu'elles savent qu'elles sont observées ou étudiées. L'acte d'observation
  lui-même peut produire le changement — pas nécessairement l'intervention testée.
  Les gens répondent à l'attention qu'ils reçoivent.

one_liner: Être observé modifie le comportement — l'attention elle-même peut produire l'effet.

try_this:
  - Lors de l'évaluation d'une intervention, déterminez si l'observation est à l'origine des résultats.
  - Reconnaissez que l'attention et le sentiment d'être valorisé peuvent améliorer les performances.
  - Soyez prudent en attribuant un changement à une intervention spécifique lorsque l'observation a changé.

ask_yourself:
  - Cette amélioration provient-elle de l'intervention ou du fait d'être observé ?
  - Les résultats persisteraient-ils si nous arrêtions de faire attention ?

in_more_detail: |
  Dans l'usine Hawthorne Works, les chercheurs ont constaté que la productivité
  s'améliorait lorsqu'ils modifiaient l'éclairage — et aussi lorsqu'ils le rétablissaient.
  L'amélioration semblait provenir de l'attention et de l'observation, et non de
  l'intervention spécifique. Une réanalyse ultérieure a suggéré que l'effet avait pu
  être exagéré, mais le concept reste utile : le fait d'être étudié
  modifie le comportement.

  L'effet Hawthorne complique la recherche et l'évaluation. Il peut
  gonfler l'impact apparent des interventions. Il suggère également que
  l'attention et le sentiment d'être valorisé peuvent améliorer les performances — une leçon pour
  le management.

why_this_is_important: |
  Comprendre l'effet Hawthorne vous aide à interpréter les résultats de recherche,
  à concevoir de meilleures expériences et à reconnaître que l'attention
  elle-même peut entraîner un changement. En management, cela suggère que porter
  attention aux gens peut être aussi important que l'intervention spécifique.

when_to_use:
  - leadership
  - prise_de_decision
  - apprentissage
  - resolution_de_problemes

how_can_you_spot_it:
  observation_induced_change: |
    Le comportement change lorsque les gens savent qu'ils sont surveillés ou étudiés.
  attention_effect: |
    L'acte de porter attention produit une amélioration, pas seulement le
    changement spécifique.
  placebo_analog: |
    Comme un placebo, le "traitement" d'être étudié peut avoir des effets.
  short_term_improvement: |
    Les améliorations peuvent s'estomper lorsque l'observation cesse.

examples:
  workplace_studies: |
    La productivité augmente pendant une étude — est-ce le nouveau processus ou
    le fait que quelqu'un regarde ?
  medical_trials: |
    Les groupes placebo s'améliorent — en partie parce qu'ils reçoivent de l'attention.
  education: |
    Les élèves obtiennent de meilleurs résultats lorsque les chercheurs sont présents — l'"effet observateur".
  management: |
    Les équipes s'améliorent lorsque le management porte attention — est-ce la nouvelle
    initiative ou l'attention elle-même ?

real_world_implications: |
  L'effet Hawthorne affecte la validité de la recherche et l'évaluation des programmes.
  Il peut conduire à surestimer les effets d'une intervention.
  Il a également une leçon positive : l'attention et le sentiment d'être étudié
  peuvent motiver l'amélioration — donc le soin et la visibilité sont importants.

professional_application:
  networking_and_relationship_building: |
    Porter attention aux gens peut améliorer leurs performances —
    l'effet Hawthorne suggère que le sentiment d'être observé et
    valorisé est important. Utilisez cela positivement : points de contact réguliers,
    visibilité et reconnaissance.
  collaborative_learning_initiative: |
    Lors de l'évaluation d'interventions, utilisez des groupes témoins et
    déterminez si les améliorations sont dues à l'intervention
    ou à l'attention qu'elle suscite. L'effet Hawthorne peut
    gonfler le succès apparent.

how_can_this_be_misapplied:
  surveillance_justification: |
    Utiliser "l'effet Hawthorne" pour justifier une surveillance constante —
    l'observation peut également réduire la confiance et la motivation intrinsèque.
  dismissing_improvements: |
    Supposer que toute amélioration pendant les études est due à l'effet Hawthorne —
    parfois les interventions fonctionnent réellement.
  overgeneralization: |
    Les études originales de Hawthorne ont été remises en question ;
    l'effet peut être plus faible ou différent qu'on ne le pensait autrefois.
  manipulation: |
    Créer une fausse "observation" pour manipuler le comportement.

