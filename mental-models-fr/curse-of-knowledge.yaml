# Malédiction de la connaissance
# Modèle mental / Biais cognitif - Entrée exemple

id: curse_of_knowledge
name: Malédiction de la connaissance

quick_introduction: |
  La malédiction de la connaissance est la difficulté d'imaginer ce que c'est que de ne pas savoir quelque chose une fois que vous le savez. Les experts ont du mal à enseigner aux débutants car ils ne peuvent pas recréer la perspective du débutant. Une fois que vous savez, vous oubliez ce que c'était de ne pas savoir.

one_liner: Une fois que vous savez quelque chose, vous oubliez ce que c'était de ne pas savoir.

try_this:
  - Lorsque vous expliquez, partez des principes premiers - supposez que votre public ne sait rien.
  - Demandez à un débutant de reformuler ; leur confusion révèle vos angles morts.
  - Remarquez quand vous sautez des étapes ou utilisez du jargon que d'autres pourraient ne pas connaître.

ask_yourself:
  - Est-ce que je suppose que les autres ont le même contexte que moi ?
  - Une personne sans mon parcours comprendrait-elle cela ?

in_more_detail: |
  Dans une expérience classique, des personnes qui connaissaient la réponse à une énigme ont tapé le rythme d'une chanson et s'attendaient à ce que d'autres la devinent - elles ont surestimé à quel point c'était évident. Les tapeurs ne pouvaient pas "désentendre" la chanson dans leur tête. La connaissance est "collante" ; il est difficile de simuler l'ignorance.

  La malédiction affecte l'enseignement, la communication, la conception de produits et le leadership. Nous supposons que les autres ont le même contexte que nous. Nous utilisons du jargon. Nous sautons des étapes. Nous sommes surpris quand les gens ne "comprennent pas".

why_this_is_important: |
  Reconnaître la malédiction de la connaissance améliore l'enseignement, la communication et la conception de produits. Cela vous aide à rencontrer les gens là où ils sont plutôt que là où vous êtes. C'est essentiel pour un transfert de connaissances efficace.

when_to_use:
  - apprentissage
  - leadership
  - résolution_de_problèmes
  - développement_de_relations

how_can_you_spot_it:
  obvious_to_you: |
    "C'est évident" lorsque c'est seulement évident parce que vous connaissez la réponse.
  jargon_use: |
    Utiliser des termes que le public ne connaît pas sans les définir.
  skipped_steps: |
    Supposer que les autres combleront les lacunes que vous avez laissées.
  frustration_with_learners: |
    "Comment peuvent-ils ne pas le voir ?" lorsqu'ils manquent de votre contexte.

examples:
  teaching: |
    Un professeur de mathématiques saute des étapes qui lui sont "évidentes" mais
    essentielles pour les étudiants.
  product_design: |
    Les concepteurs créent des interfaces qui ont du sens pour eux mais qui
    confusent les nouveaux utilisateurs.
  onboarding: |
    Les employés expérimentés oublient ce que les nouveaux employés ne savent pas et
    fournissent une formation inadéquate.
  writing: |
    Les auteurs supposent que les lecteurs ont le même parcours et manquent
    le contexte nécessaire.

real_world_implications: |
  La malédiction de la connaissance crée des lacunes de communication, des produits ratés et un enseignement inefficace. C'est l'une des raisons pour lesquelles les experts peuvent être de mauvais
  enseignants. La surmonter demande un effort délibéré pour adopter la
  perspective du public.

professional_application:
  networking_and_relationship_building: |
    Lorsque vous expliquez, commencez au niveau de l'autre personne. Demandez "Que
    savent-ils déjà ?" Testez votre communication avec quelqu'un
    qui n'a pas votre parcours.
  collaborative_learning_initiative: |
    Utilisez des exercices de type "expliquez comme si j'avais cinq ans". Demandez aux experts d'enseigner
    aux débutants et d'obtenir des retours. Créez une documentation qui ne présuppose aucune connaissance préalable. Utilisez l'enseignement par les pairs - ceux qui ont récemment
    appris se souviennent de la perspective du débutant.

how_can_this_be_misapplied:
  oversimplification: |
    Simplifier à l'excès au point d'être inexact ou condescendant.
  false_assumption: |
    Supposer que les autres en savent moins qu'ils ne le font - également un échec de
    calibrage.
  one_size_fits_all: |
    Tous les publics n'ont pas besoin du même niveau d'explication ; adaptez
    l'explication au public.
  avoiding_complexity: |
    Certains sujets sont complexes ; la malédiction de la connaissance ne signifie pas
    que nous ne devrions jamais utiliser de langage technique lorsque c'est approprié.

related_content:
  - dunning_kruger_effect
  - false_consensus_effect
  - empathy_gap
  - availability_heuristic
