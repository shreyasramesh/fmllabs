# Bayes Theorem
# Mental Model / Cognitive Bias - Example Entry

id: bayes_theorem
name: Bayes Theorem

quick_introduction: |
  Bayes' theorem describes how to update the probability of a hypothesis when
  you receive new evidence. It formalizes the idea that beliefs should change
  in proportion to how well the evidence supports them—not all-or-nothing,
  but incrementally.

one_liner: Update beliefs in proportion to how well the evidence supports them.

try_this:
  - Start with your prior; ask how likely the evidence would be if you were wrong.
  - Update incrementally—don't flip from 0% to 100% on one data point.
  - Consider alternative hypotheses: would the evidence fit them too?

ask_yourself:
  - How much does this evidence actually shift the probability?
  - Am I updating my beliefs, or just confirming what I already thought?

in_more_detail: |
  The theorem states that the probability of a hypothesis given evidence equals
  the prior probability times the likelihood of the evidence given the
  hypothesis, divided by the probability of the evidence. In practice: start
  with your prior belief, see how consistent the new evidence is with your
  hypothesis vs. alternatives, and update accordingly.

  Bayesian thinking counters confirmation bias by requiring you to consider
  how likely the evidence would be if you were wrong. It's the foundation of
  probabilistic reasoning and scientific updating.

why_this_is_important: |
  Bayesian thinking improves decision-making under uncertainty, helps you
  avoid overconfidence, and provides a framework for learning from evidence.
  It's essential for diagnosis, forecasting, and any domain with uncertainty.

when_to_use:
  - decision-making
  - problem_solving
  - risk_assessment
  - learning

how_can_you_spot_it:
  prior_and_update: |
    Starting with a baseline belief and adjusting it based on new evidence.
  likelihood_ratio_thinking: |
    Asking "How likely is this evidence if I'm right vs. wrong?"
  incremental_updating: |
    Beliefs shift gradually with evidence rather than flipping abruptly.
  base_rate_respect: |
    Prior probabilities (base rates) matter, not just the latest data point.

examples:
  medical_diagnosis: |
    A positive test for a rare disease—the prior (low prevalence) means a
    positive result is often a false positive. Bayes updates the probability.
  forecasting: |
    Updating predictions as new data arrives rather than sticking to initial
    estimates.
  hiring: |
    Starting with base rates for role fit, then updating based on interview
    performance.
  investing: |
    Updating the probability that a company will succeed as new information
    (earnings, news) arrives.

real_world_implications: |
  Bayesian thinking underlies modern AI, medical diagnosis, and scientific
  inference. It corrects for base rate neglect and confirmation bias. It's
  a powerful tool for any domain with uncertainty.

professional_application:
  networking_and_relationship_building: |
    Update your beliefs about people based on new evidence rather than
    holding fixed first impressions. Consider base rates (e.g., how common
    is this behavior?) when interpreting actions.
  collaborative_learning_initiative: |
    Encourage teams to state priors explicitly before discussions, then
    update as evidence is presented. Reduces anchoring and confirmation bias.

how_can_this_be_misapplied:
  overprecision: |
    Assigning exact probabilities when uncertainty is high.
  prior_rigidity: |
    Sticking to strong priors and not updating enough with new evidence.
  base_rate_tyranny: |
    Ignoring strong evidence because base rates suggest otherwise—sometimes
    the evidence should dominate.
  false_sophistication: |
    Using Bayesian language to sound rigorous without doing the actual
    reasoning.

