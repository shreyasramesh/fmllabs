# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Romanian)
# Translated from mental-models-en.yaml

mental_models:
  - id: ambiguity_effect
    name: Efectul Ambiguității
    quick_introduction: |
      Efectul ambiguității este tendința de a evita opțiunile atunci când ne lipsesc informații
      despre probabilitățile rezultatelor. Preferăm riscurile cunoscute în detrimentul riscurilor
      necunoscute—chiar și atunci când riscurile necunoscute ar putea fi mai bune. Incertitudinea în sine se simte
      aversivă.
    one_liner: Preferăm riscurile cunoscute în detrimentul riscurilor necunoscute—chiar și atunci când necunoscutul ar putea fi mai bun.
    try_this:
      - Ask: Evit această opțiune în principal din cauza incertitudinii sau există un dezavantaj real?
      - Quantify what you do know; sometimes the "ambiguous" option has clearer upside.
      - Notice when you default to the familiar just because it feels safer.
    ask_yourself:
      - Resping ceva pentru că este ambiguu sau pentru că este în mod real mai rău?
      - Ce ar trebui să știu pentru a mă simți confortabil cu opțiunea incertă?
    in_more_detail: |
      În paradoxul lui Ellsberg, oamenii preferă să parieze pe o urnă cu proporții cunoscute
      de bile decât pe o urnă cu proporții necunoscute, chiar și atunci când urna necunoscută
      ar putea oferi șanse mai bune. Nu ne place ambiguitatea—am prefera o probabilitate clară
      (chiar dacă proastă) decât una neclară.

      Efectul influențează deciziile în investiții, alegeri de carieră și politici.
      Poate duce la alegeri suboptimale atunci când evităm opțiuni ambigue
      dar potențial superioare. De asemenea, explică de ce preferăm brandurile familiare
      și cantitățile cunoscute.
    why_this_is_important: |
      Recunoașterea efectului ambiguității te ajută să eviți supra-preferarea familiarului
      și sub-preferarea incertului. Poate duce la oportunități ratate atunci când
      ambiguitatea este gestionabilă. De asemenea, explică de ce transparența și claritatea
      reduc anxietatea.
    when_to_use:
      - luarea_deciziilor
      - evaluarea_riscurilor
      - investiții
      - schimbări_de_carieră
    how_can_you_spot_it:
      preference_for_known_risks: |
        Alegerea opțiunilor cu probabilități clare (chiar dacă mai proaste) în detrimentul celor ambigue.
      avoidance_of_uncertainty: |
        Respingerea opțiunilor în principal pentru că "nu știm suficient".
      familiarity_over_optimality: |
        Preferința pentru cunoscut în detrimentul potențialului mai bun necunoscut.
      information_seeking: |
        Disponibilitatea de a plăti pentru informații care reduc ambiguitatea—chiar și atunci când nu schimbă decizia.
    examples:
      investing: |
        Preferința pentru acțiuni domestice în detrimentul celor internaționale pentru că "le înțelegem
        mai bine", în ciuda beneficiilor de diversificare.
      employment: |
        Rămânerea într-un loc de muncă cunoscut în loc să accepți un rol cu un potențial incert.
      product_choice: |
        Alegerea unui brand familiar în detrimentul unei opțiuni noi cu o calitate incertă.
      medical: |
        Preferința pentru un tratament cu efecte secundare cunoscute în detrimentul unuia cu rezultate incerte,
        chiar și atunci când acesta din urmă ar putea fi mai bun.
    real_world_implications: |
      Efectul ambiguității modelează piețele, alegerile de carieră și politicile. Poate fi
      redus prin furnizarea de informații mai clare sau prin reîncadrarea deciziilor. De
      asemenea, explică de ce transparența și comunicarea reduc anxietatea.
    professional_application:
      networking_and_relationship_building: |
        Reduceți ambiguitatea în relații: clarificați așteptările, comunicați
        explicit și reduceți incertitudinea. Oamenii preferă situațiile cunoscute.
      collaborative_learning_initiative: |
        Când introduceți schimbări, reduceți ambiguitatea—furnizați informații clare despre
        ce se va întâmpla, când și de ce. Ambiguitatea crește rezistența.
    how_can_this_be_misapplied:
      manipulation: |
        Crearea deliberată a ambiguității pentru a îndruma oamenii către opțiuni preferate.
      false_clarity: |
        Furnizarea unei certitudini false atunci când există o incertitudine reală.
      overconfidence: |
        Presupunerea că reducerea ambiguității îmbunătățește întotdeauna deciziile—uneori
        opțiunea ambiguă este în mod real mai bună.
      analysis_paralysis: |
        Așteptarea informațiilor perfecte înainte de a lua o decizie atunci când o anumită ambiguitate
        este inevitabilă.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Biasul de Ancorare
    quick_introduction: |
      Biasul de ancorare este tendința de a te baza prea mult pe prima informație
      întâlnită atunci când iei decizii. Acea "ancoră" inițială distorsionează judecățile ulterioare,
      chiar și atunci când este irelevantă sau arbitrară.
    one_liner: Primul număr pe care îl vezi îi modelează pe toți cei care urmează.
    try_this:
      - Înainte de o negociere, stabilește-ți numărul țintă și evită să fii ancorat de cel al celuilalt.
      - Când estimezi, generează-ți propriul număr mai întâi înainte de a asculta alții.
      - Întreabă: Aș gândi diferit dacă aș fi văzut un număr diferit mai întâi?
    ask_yourself:
      - Ce număr sau idee am întâlnit prima dată — și îmi distorsionează judecata?
      - Mă ajustez suficient față de ancoră, sau sunt încă prea aproape de ea?
    in_more_detail: |
      Într-un experiment clasic, persoanele cărora li s-a cerut să estimeze procentul națiunilor africane
      din ONU au dat estimări mai mari dacă tocmai văzuseră un număr mai mare (de exemplu, 65 față de 10).
      Ancora — chiar și atunci când este aleatorie — le-a influențat răspunsurile. Ancorarea afectează negocierile,
      stabilirea prețurilor, angajările și prognozele.

      Primul număr pe care îl vedem devine un punct de referință. Ne ajustăm de la el, dar
      de obicei insuficient. Chiar și atunci când știm că ancora este arbitrară, aceasta ne poate influența. Experții nu sunt imuni.
    why_this_is_important: |
      Înțelegerea biasului de ancorare te ajută să iei decizii mai bune, să negociezi mai eficient
      și să eviți să fii manipulat. De asemenea, explică de ce ordinea și încadrarea
      informațiilor contează atât de mult.
    when_to_use:
      - luare_decizii
      - negociere
      - investiții
      - evaluare_riscuri
    how_can_you_spot_it:
      first_number_dominance: |
        Primul număr dintr-o negociere sau estimare influențează nejustificat
        rezultatul.
      insufficient_adjustment: |
        Când se ajustează de la o ancoră, oamenii, de obicei, nu se ajustează suficient.
      arbitrary_anchor_influence: |
        Chiar și numerele evident irelevante (de exemplu, ultimele cifre ale unui număr de securitate socială)
        pot afecta estimările.
      order_effects: |
        Secvența în care sunt prezentate opțiunile modifică alegerile.
    examples:
      salary_negotiation: |
        Primul număr menționat — fie de către angajator, fie de către candidat — ancorează adesea
        oferta finală.
      real_estate: |
        Prețul de listă ancorează percepția cumpărătorilor asupra valorii, chiar și atunci când este intenționat
        stabilit ridicat sau scăzut.
      retail: |
        „Era 99 USD, acum 49 USD” folosește prețul original ca ancoră pentru a face ca prețul de vânzare
        să pară o afacere.
      forecasting: |
        Estimările inițiale din ședințele de planificare ancorează proiecțiile ulterioare, chiar și atunci când
        prima estimare a fost o ghicire.
    real_world_implications: |
      Ancorarea modelează piețele, negocierile și politicile. Poate fi folosită etic (de exemplu,
      stabilind așteptări rezonabile) sau neetic (de exemplu, stabilind prețuri manipulative).
      Recunoașterea sa îmbunătățește calitatea deciziilor.
    professional_application:
      networking_and_relationship_building: |
        În negocieri, ia în considerare să faci prima ofertă pentru a seta ancora — sau fii conștient
        când cealaltă parte face acest lucru.
      collaborative_learning_initiative: |
        În întâlniri, fii precaut cu privire la cine vorbește primul despre estimări; ia în considerare
        colectarea estimărilor independente înainte de discuție.
    how_can_this_be_misapplied:
      manipulation: |
        Utilizarea deliberată a ancorelor extreme pentru a direcționa pe alții către rezultatele dorite.
      overconfidence_in_anchors: |
        Încrederea prea mare în propria primă estimare, fără a o revizui.
      ignoring_relevant_information: |
        Permițând unei ancore să suprascrie date mai relevante.
      exploitation: |
        Tactici de vânzare care folosesc prețuri „compară la” umflate pentru a face prețurile reale să pară
        rezonabile.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Cascadă de Disponibilitate
    quick_introduction: |
      O cascadă de disponibilitate este un proces de autointărire prin care o idee dobândește
      plauzibilitate prin discuții publice repetate. Cu cât este mai mult discutată,
      cu atât devine mai "disponibilă", cu atât mai mulți oameni o cred, și cu atât mai mult
      este discutată. O credință colectivă capătă un impuls indiferent de adevărul
      său fundamental.
    one_liner: Cu cât o idee este repetată mai mult, cu atât pare mai plauzibilă—indiferent de dovezi.
    try_this:
      - Întreabă: Această credință este răspândită pentru că este adevărată, sau pentru că este repetată?
      - Caută surse primare înainte de a accepta "ceea ce știe toată lumea".
      - Observă când simpla repetare conduce simțul tău de plauzibilitate.
    ask_yourself:
      - Aș crede asta dacă aș fi auzit-o o singură dată?
      - Confund "toată lumea zice așa" cu "dovezile o susțin"?
    in_more_detail: |
      Timur Kuran și Cass Sunstein au descris modul în care funcționează cascadele de disponibilitate:
      disponibilitatea informației (cât de des auzim ceva) și plauzibilitatea
      (cât de credibil pare) se întăresc reciproc. Acoperirea mediatică, social media și
      discursul public amplifică anumite idei. Odată ce o idee atinge un prag de disponibilitate,
      se poate răspândi rapid și poate deveni "cunoaștere comună", chiar dacă este falsă sau exagerată.

      Cascadele de disponibilitate pot fi benefice (răspândind avertismente importante)
      sau dăunătoare (răspândind panică sau dezinformare). Ele sunt conduse de
      euristica disponibilității și de dovada socială.
    why_this_is_important: |
      Recunoașterea cascadelor de disponibilitate te ajută să evaluezi dacă credința generalizată reflectă
      dovezi sau simpla repetare. Explică modul în care ideile devin virale și cum credințele colective pot greși.
      Este esențială pentru alfabetizarea mediatică și gândirea critică.
    when_to_use:
      - luare_de_decizii
      - evaluarea_riscului
      - învățare
      - leadership
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Cu cât o idee este repetată mai mult, cu atât pare mai plauzibilă.
      media_amplification: |
        Acoperirea mediatică determină credința, care la rândul ei determină mai multă acoperire.
      social_proof_belief: |
        "Toată lumea crede asta" devine o dovadă pentru credință.
      threshold_effects: |
        Odată ce o idee depășește un prag de vizibilitate, se răspândește rapid.
    examples:
      health_scares: |
        Un studiu sugerează că un produs este periculos; mass-media îl amplifică;
        publicul îl evită; urmează mai multă acoperire. Riscul poate fi
        exagerat.
      financial_panic: |
        Se răspândesc zvonuri despre falimentul unei bănci; oamenii retrag bani; cursa
        devine autorealizatoare.
      social_media: |
        O narațiune devine virală; repetarea crește credința; credința
        crește partajarea. Adevărul și viralitatea pot diverge.
      organizational: |
        Se răspândește un zvon despre concedieri; crește anxietatea; comportamentul
        se schimbă; zvonul capătă plauzibilitate prin reacție.
    real_world_implications: |
      Cascadele de disponibilitate modelează opinia publică, politicile și piețele.
      Ele pot răspândi atât adevăruri importante, cât și falsuri periculoase.
      Gândirea critică necesită distincția între credința bazată pe dovezi
      și credința determinată de cascade.
    professional_application:
      networking_and_relationship_building: |
        Când o idee este "peste tot", întreabă: Este adevărată pentru că este
        repetată, sau repetată pentru că este adevărată? Caută surse primare.
      collaborative_learning_initiative: |
        Creează norme de verificare înainte de amplificare. Încurajează
        punerea sub semnul întrebării a "ceea ce știe toată lumea". Distinge consensul
        care reflectă dovezi de consensul care reflectă
        disponibilitatea.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Uneori credința generalizată este corectă. Nu presupune că toate
        ideile populare sunt cascade.
      conspiracy_thinking: |
        Folosirea "cascadei de disponibilitate" pentru a respinge preocupări legitime
        ca fiind fabricate.
      false_skepticism: |
        Respingerea ideilor bine susținute deoarece sunt populare.
      contrarianism: |
        Presupunerea că orice este crezut pe scară largă trebuie să fie greșit.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Euristică a disponibilității
    quick_introduction: |
      Euristiga disponibilității este tendința de a judeca probabilitatea evenimentelor
      în funcție de cât de ușor ne vin în minte exemple. Dacă ne putem aminti cu ușurință instanțe,
      presupunem că evenimentul este comun. Exemplele vii, recente sau emoționale domină
      estimările noastre de probabilitate.
    one_liner: Ceea ce ne vine ușor în minte pare mai probabil – chiar și atunci când nu este.
    try_this:
      - Întrebați: Care este rata de bază? Supraestimez exemplele vii sau recente?
      - Căutați date atunci când intuiția vă spune „acest lucru pare comun” sau „acest lucru pare rar”.
      - Observați când o singură poveste dramatică vă determină evaluarea riscurilor.
    ask_yourself:
      - Judec probabilitatea după ușurința reamintirii, în loc de frecvența reală?
      - Aș gândi diferit dacă nu aș fi văzut chiar acum acel titlu?
    in_more_detail: |
      Folosim scurtături mentale pentru a estima frecvența și probabilitatea. O scurtătură
      este disponibilitatea: ce ne vine ușor în minte? Accidentele de avion sunt vii și
      larg mediatizate – supraestimăm probabilitatea lor. Accidentele de mașină sunt
      comune, dar mai puțin evidente – subestimăm. Recența, vivacitatea și
      impactul emoțional cresc disponibilitatea.

      Euristiga este utilă atunci când disponibilitatea corelează cu frecvența reală.
      Dar mass-media, experiența personală și saliența distorsionează adesea corelația.
      Ne temem de riscuri rare, dar vii, și ignorăm pe cele comune, dar banale.
    why_this_is_important: |
      Recunoașterea euristici disponibilității vă ajută să corectați estimările de probabilitate,
      să evitați reacțiile exagerate la știri vii și să faceți evaluări mai bune ale riscurilor.
      Explică multe erori sistematice de judecată.
    when_to_use:
      - luarea_deciziilor
      - evaluarea_riscurilor
      - investiții
      - rezolvarea_problemelor
    how_can_you_spot_it:
      vividness_dominance: |
        Exemplele dramatice sau emoționale influențează disproporționat estimările.
      recency_effect: |
        Evenimentele recente par mai susceptibile să se repete.
      personal_experience_overweighting: |
        „Cunosc pe cineva care…” modelează estimările de probabilitate.
      media_distortion: |
        Ceea ce este raportat adesea nu corespunde cu ceea ce este frecvent.
    examples:
      risk_perception: |
        Supraestimarea riscului de terorism (viu, raportat) și subestimarea
        riscului de boli de inimă (comun, mai puțin dramatic).
      investing: |
        Evenimentele recente de pe piață (prăbușire, boom) domină așteptările pentru viitor.
      hiring: |
        O singură poveste vie despre o angajare proastă de la o anumită școală afectează
        evaluarea tuturor candidaților de la acea școală.
      health: |
        Diagnosticul de cancer al unui prieten face ca boala să pară mai probabilă decât sugerează ratele de bază.
    real_world_implications: |
      Euristiga disponibilității afectează achiziționarea de asigurări, prioritățile politice
      și deciziile personale. Este exploatată de mass-media și marketeri. Corectarea
      ei necesită căutarea ratelor de bază și punerea sub semnul întrebării a ceea ce „ne vine în minte”.
    professional_application:
      networking_and_relationship_building: |
        Fiți conștient că o singură experiență negativă vie cu o persoană sau un grup poate
        distorsiona judecata. Căutați rate de bază și puncte de date multiple.
      collaborative_learning_initiative: |
        Atunci când evaluați riscuri sau oportunități, întrebați explicit „Care este rata de bază?”
        și „Supraestimez exemplele vii?”. Folosiți date pentru a corecta estimările bazate pe disponibilitate.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Uneori, disponibilitatea este informativă – experiența recentă poate semnala
        o schimbare. Nu presupuneți că toate judecățile bazate pe disponibilitate sunt greșite.
      analysis_paralysis: |
        Supra-corectarea până la punctul de a ignora semne de avertizare legitime din
        experiența vie.
      false_objectivity: |
        Presupunerea că ratele de bază sunt întotdeauna corecte, când ar putea fi învechite sau
        inaplicabile.
      manipulation: |
        Crearea deliberată a unor exemple vii pentru a direcționa judecățile altora.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Fenomenul Baader-Meinhof
    quick_introduction: |
      Fenomenul Baader-Meinhof (numit și iluzia frecvenței) apare atunci când afli despre
      ceva nou și apoi, brusc, îl observi peste tot. Pare o coincidență, dar adesea este
      atenție selectivă – creierul tău este pregătit să observe ceea ce a întâlnit recent.
    one_liner: Afli ceva nou și brusc îl vezi peste tot – era mereu acolo.
    try_this:
      - Când ceva pare "peste tot" după ce l-ai învățat, verifică rata de bază.
      - Observă când recența face ca ceva să pară mai semnificativ decât este.
      - Întreabă: Văd o tendință reală sau doar observ ceea ce sunt pregătit să observ?
    ask_yourself:
      - Este acest lucru de fapt mai comun acum, sau îl observ doar mai mult?
      - Aș fi văzut acest tipar dacă nu aș fi învățat despre el recent?
    in_more_detail: |
      După ce a auzit despre grupul terorist Baader-Meinhof, o persoană ar putea vedea
      referințe la acesta în știri, în conversații și în articole în câteva zile. Fenomenul
      are două componente: atenție selectivă (observi ceea ce cauți) și bias de confirmare
      (ții minte succesele și uiți eșecurile).

      Iluzia este că lucrul a devenit brusc mai comun. În realitate, a fost
      întotdeauna prezent; pur și simplu nu erai atent la el. Acest lucru poate duce la
      supraestimarea prevalenței sau importanței informațiilor învățate recent.
    why_this_is_important: |
      Recunoașterea fenomenului Baader-Meinhof te ajută să eviți supraestimarea cât de comun
      sau semnificativ este ceva pe baza expunerii recente. De asemenea, explică de ce ideile,
      produsele sau tendințele noi pot părea că sunt "peste tot" după ce le observi pentru prima dată.
    when_to_use:
      - luarea_deciziilor
      - învățarea
      - evaluarea_riscurilor
      - rezolvarea_problemelor
    how_can_you_spot_it:
      sudden_ubiquity: |
        Înveți un cuvânt nou, un concept sau un produs și în câteva zile simți că îl vezi
        constant.
      recency_bias: |
        Informațiile recente par mai reprezentative pentru realitate decât sunt de fapt.
      pattern_seeking: |
        Creierul tău conectează observații nelegate într-o narațiune de genul "asta e peste tot".
      forgetting_the_misses: |
        Nu urmărești cât de des nu vezi lucrul – doar momentele în care îl vezi.
    examples:
      vocabulary: |
        A învăța cuvântul "serendipitate" și apoi a-l observa în trei articole diferite
        în aceeași săptămână.
      car_purchase: |
        După ce te-ai hotărât să cumperi un anumit model de mașină, îl vezi pe fiecare stradă – deși
        era mereu acolo.
      health_anxiety: |
        Citind despre un simptom rar și apoi observând senzații similare la tine,
        ducând la îngrijorare inutilă.
      trends: |
        Descoperind o aplicație sau o tendință nouă și simțind că domină brusc – când ar putea
        avea o bază mică de utilizatori.
    real_world_implications: |
      Fenomenul afectează modul în care percepem tendințele, riscurile și oportunitățile.
      Agenții de marketing și mass-media îl pot exploata prin crearea unei expuneri repetate.
      În luarea deciziilor, poate duce la supraponderarea informațiilor recente.
    professional_application:
      networking_and_relationship_building: |
        Când cineva menționează un subiect în mod repetat după ce l-a învățat, recunoaște că ar putea
        experimenta iluzia frecvenței – subiectul nu este neapărat mai relevant, ci doar
        mai vizibil pentru ei.
      collaborative_learning_initiative: |
        În training, întărește ideea că "a vedea peste tot" după ce ai învățat ceva nou
        este normal; încurajează verificarea ratelor de bază în loc să te bazezi pe sentimentul
        de omniprezență.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Presupunând că ceva este mai comun sau mai important decât este pentru că l-ai observat
        frecvent recent.
      confirmation_bias_amplification: |
        Folosind sentimentul de "a vedea peste tot" ca dovadă că o credință este corectă.
      decision_distortion: |
        Luarea unor decizii bazate pe informații învățate recent care par disproporționat de semnificative.
      vulnerability_to_manipulation: |
        Publicitatea și propagandă folosesc expunerea repetată pentru a crea iluzia
        omniprezenței și a importanței.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: Efectul Barnum
    quick_introduction: |
      Efectul Barnum (sau efectul Forer) este tendința de a accepta descrieri vagi și generale ale personalității ca fiind unice și precise. Horoscoapele, ghicitorii și testele de personalitate folosesc afirmații care se aplică aproape oricui – dar noi credem că sunt specifice nouă. Ne regăsim în generic.
    one_liner: Afirmațiile vagi par personale deoarece se aplică aproape oricui.
    try_this:
      - Ask: Ar putea descrierea aceasta să se aplice multor persoane? Testează-o pe altcineva.
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - Ar părea corect acest feedback dacă ar fi dat unui străin?
      - Îmi amintesc loviturile (ceea ce a fost corect) și uit ratările (ceea ce nu a fost corect)?
    in_more_detail: |
      Psihologul Bertram Forer a oferit studenților feedback identic "personalizat" (de exemplu, "Aveți nevoie ca ceilalți să vă placă și să vă admire") și aceștia l-au evaluat ca fiind foarte precis. Afirmațiile erau suficient de vagi pentru a se aplica oricui. Se spune că P.T. Barnum a afirmat "Există un prost născut în fiecare minut" – efectul îi poartă numele datorită abilității sale de a atrage masele cu generalități ce par personalizate.

      Efectul funcționează deoarece suntem buni la a găsi relevanță personală în afirmații ambigue. Ne amintim ce ni se potrivește și uităm ce nu. Aceasta este baza lecturii la rece și a multor produse de "personalitate".
    why_this_is_important: |
      Recunoașterea efectului Barnum te ajută să evaluezi evaluările de personalitate, să rezisti manipulării și să eviți suprainterpretarea feedback-ului vag. Explică de ce horoscoapele par precise și de ce unele sfaturi "personalizate" sunt generice.
    when_to_use:
      - luare_de_decizii
      - învățare
      - evaluarea_riscului
      - construirea_relațiilor
    how_can_you_spot_it:
      vague_accuracy: |
        Feedback care pare personal, dar s-ar putea aplica multor persoane.
      selective_fit: |
        Ne concentrăm pe ceea ce se potrivește și ignorăm ceea ce nu se potrivește.
      cold_reading: |
        Cineva te "citește" cu afirmații care sunt, de fapt, generice.
      personality_test_enthusiasm: |
        Acceptarea necritică a rezultatelor evaluărilor ca fiind unic perceptive.
    examples:
      horoscopes: |
        "Uneori te îndoiești de deciziile tale" pare personal, dar se aplică majorității oamenilor.
      fortune_telling: |
        Predicții vagi pe care le interpretăm ca fiind specifice situației noastre.
      personality_tests: |
        Unele evaluări folosesc afirmații Barnum și par precise, fără a fi discriminative.
      feedback: |
        Feedback generic de performanță pe care îl interpretăm ca fiind profund personalizat.
    real_world_implications: |
      Efectul Barnum este exploatat în astrologie, în unele coaching-uri și în evaluări de calitate inferioară. Poate crea o falsă încredere în instrumente invalide. De asemenea, explică de ce suntem susceptibili la lingușire și feedback pozitiv vag.
    professional_application:
      networking_and_relationship_building: |
        Atunci când primești feedback, întreabă "Ar putea acest lucru să se aplice multor persoane?". Caută feedback specific, comportamental, în locul laudei sau criticii vagi. Fii sceptic la perspectivele "personalizate" care par prea bune.
      collaborative_learning_initiative: |
        Când folosești evaluări, alege instrumente validate cu validitate discriminantă. Evită instrumentele care se bazează pe afirmații Barnum. Instruiește oamenii să recunoască feedback-ul vag.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Nu tot feedback-ul personalizat este Barnum – unele este cu adevărat specific. Nu respinge tot ceea ce este vag.
      invalidating_experience: |
        A spune cuiva că experiența sa de insight este "doar Barnum" când ar putea avea valoare pentru acea persoană.
      overcorrection: |
        Respingerea tuturor cadrelor de personalitate deoarece unele folosesc afirmații Barnum.
      false_skepticism: |
        A presupune că, doar pentru că ceva pare precis, trebuie să fie Barnum – uneori, lucrurile sunt precise.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Falacia Ratei de Bază
    quick_introduction: |
      Falacia ratei de bază este tendința de a ignora informațiile statistice generale
      (rate de bază) în favoarea informațiilor specifice, vii. Supraevaluăm
      cazul particular și subevaluăm probabilitatea anterioară. O singură poveste convingătoare
      poate înlocui ceea ce spun cifrele.
    one_liner: O poveste convingătoare poate înlocui ceea ce spun cifrele.
    try_this:
      - Înainte de a judeca un caz, întreabă: Care este rata de bază pentru acest tip de situație?
      - Combină dovezile specifice cu probabilitatea anterioară — nu ignora niciuna dintre ele.
      - Observă când un singur exemplu viu înlocuiește statisticile.
    ask_yourself:
      - Supraevaluez acest caz specific și subevaluez rata de bază?
      - Ce ar spune cifrele dacă aș lăsa deoparte povestea convingătoare?
    in_more_detail: |
      Dacă o boală afectează 1% din populație și un test are o acuratețe de 95%, un
      rezultat pozitiv înseamnă adesea că persoana probabil nu are încă boala —
      deoarece rata de bază este atât de scăzută. Dar noi ignorăm ratele de bază și ne
      concentrăm pe „persoana a testat pozitiv”. Suntem influențați de specific în detrimentul
      statisticilor.

      Falacia afectează diagnosticul medical, angajarea, evaluarea riscurilor și judecata legală.
      Trebuie să combinăm ratele de bază cu dovezi specifice cazului folosind
      raționamentul bayesian — dar adesea nu o facem.
    why_this_is_important: |
      Corectarea falaciei ratei de bază îmbunătățește diagnosticul, evaluarea riscurilor
      și calitatea deciziilor. Ne împiedică să reacționăm exagerat la cazuri vii și
      să reacționăm insuficient la realitatea statistică.
    when_to_use:
      - luarea_deciziilor
      - evaluarea_riscurilor
      - rezolvarea_problemelor
      - investiții
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Ratele de bază nu sunt încorporate în judecăți.
      vividness_over_statistics: |
        Un singur caz sau o poveste domină peste datele agregate.
      diagnostic_overweighting: |
        Supraevaluarea noilor dovezi (de ex., rezultatul unui test) fără a lua în considerare rata de bază.
      anecdote_override: |
        „Cunosc pe cineva care...” înlocuiește dovezile statistice.
    examples:
      medical: |
        Un test pozitiv pentru o boală rară — rata de bază este scăzută, deci un rezultat pozitiv
        este adesea un fals pozitiv. Ignorăm acest lucru și presupunem că au boala.
      hiring: |
        Un candidat are un interviu grozav — ignorăm ratele de bază pentru cât de bine
        interviurile prezic performanța.
      risk: |
        Un accident de avion este vivid — supraestimăm riscul de a zbura și subestimăm
        riscul de a merge cu mașina, ignorând ratele de bază.
      startup_investing: |
        Un fondator prezintă bine — ignorăm că majoritatea startup-urilor eșuează indiferent
        de calitatea prezentării.
    real_world_implications: |
      Falacia ratei de bază afectează deciziile medicale, judecățile legale și
      strategiile de afaceri. Contribuie la alocarea greșită a resurselor și la
      evaluarea slabă a riscurilor. Gândirea bayesiană corectează acest lucru.
    professional_application:
      networking_and_relationship_building: |
        Atunci când evaluați oamenii, luați în considerare ratele de bază: de ex., cât de des apare acest
        tip de comportament? Nu lăsați o singură interacțiune vie să înlocuiască tiparul mai larg.
      collaborative_learning_initiative: |
        Atunci când luați decizii, afirmați și luați în considerare explicit ratele de bază înainte de
        a încorpora dovezi specifice cazului. Antrenați echipele în raționament bayesian.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Ignorarea dovezilor specifice puternice ale cazului atunci când ratele de bază sugerează altceva —
        uneori, cazul individual este excepția.
      stereotyping: |
        Folosirea ratelor de bază pentru a face judecăți nedrepte despre indivizi.
      false_precision: |
        Aplicarea ratelor de bază cu precizie falsă atunci când sunt estimări aproximative.
      dismissing_individuals: |
        „Statisticile spun X” atunci când individul din fața ta s-ar putea să nu se potrivească distribuției.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Teorema lui Bayes
    quick_introduction: |
      Teorema lui Bayes descrie cum să actualizezi probabilitatea unei ipoteze atunci
      când primești noi dovezi. Formalizează ideea că opiniile ar trebui să se schimbe
      proporțional cu cât de bine dovezile le susțin — nu totul sau nimic,
      ci incremental.
    one_liner: Actualizează opiniile proporțional cu cât de bine dovezile le susțin.
    try_this:
      - Începe cu probabilitatea anterioară; întreabă cât de probabilă ar fi dovada dacă ai greși.
      - Actualizează incremental — nu trece de la 0% la 100% dintr-un singur punct de date.
      - Ia în considerare ipoteze alternative: ar potrivi dovada și pe acestea?
    ask_yourself:
      - Cât de mult schimbă probabilitatea această dovadă?
      - Îmi actualizez părerile sau doar confirm ceea ce gândeam deja?
    in_more_detail: |
      Teorema afirmă că probabilitatea unei ipoteze dată fiind dovada este egală cu
      probabilitatea anterioară înmulțită cu probabilitatea dovezii dată fiind ipoteza,
      împărțită la probabilitatea dovezii. În practică: începe
      cu opinia anterioară, vezi cât de consecventă este noua dovadă cu ipoteza ta faţă de alternative,
      și actualizează în consecință.

      Gândirea bayesiană contracarează biasul de confirmare prin faptul că te obligă să iei în considerare
      cât de probabilă ar fi dovada dacă ai greși. Este fundamentul
      raționamentului probabilistic și al actualizării științifice.
    why_this_is_important: |
      Gândirea bayesiană îmbunătățește luarea deciziilor în condiții de incertitudine, te ajută
      să eviți supraîncrederea și oferă un cadru pentru a învăța din dovezi.
      Este esențială pentru diagnostic, prognoză și orice domeniu cu incertitudine.
    when_to_use:
      - luarea_deciziilor
      - rezolvarea_problemelor
      - evaluarea_riscurilor
      - învățare
    how_can_you_spot_it:
      prior_and_update: |
        Pornind de la o opinie de bază și ajustând-o pe baza noilor dovezi.
      likelihood_ratio_thinking: |
        Întrebând "Cât de probabilă este această dovadă dacă am dreptate versus dacă greșesc?"
      incremental_updating: |
        Opiniile se schimbă treptat cu dovezi, în loc să se răstoarne brusc.
      base_rate_respect: |
        Probabilitățile anterioare (ratele de bază) contează, nu doar cel mai recent punct de date.
    examples:
      medical_diagnosis: |
        Un test pozitiv pentru o boală rară — probabilitatea anterioară (prevalență scăzută) înseamnă că un
        rezultat pozitiv este adesea un fals pozitiv. Bayes actualizează probabilitatea.
      forecasting: |
        Actualizarea predicțiilor pe măsură ce sosesc noi date, în loc să te agăți de estimările inițiale.
      hiring: |
        Pornind de la ratele de bază pentru potrivirea cu rolul, apoi actualizând pe baza performanței la interviu.
      investing: |
        Actualizarea probabilității ca o companie să aibă succes pe măsură ce sosesc informații noi
        (venituri, știri).
    real_world_implications: |
      Gândirea bayesiană stă la baza inteligenței artificiale moderne, a diagnosticului medical și a inferenței științifice. Corectează neglijarea ratei de bază și biasul de confirmare. Este
      un instrument puternic pentru orice domeniu cu incertitudine.
    professional_application:
      networking_and_relationship_building: |
        Actualizează-ți părerile despre oameni pe baza noilor dovezi, în loc să
        păstrezi impresii inițiale fixe. Ia în considerare ratele de bază (de exemplu, cât de comună
        este acest comportament?) atunci când interpretezi acțiunile.
      collaborative_learning_initiative: |
        Încurajează echipele să declare explicit opiniile anterioare înainte de discuții, apoi
        să actualizeze pe măsură ce sunt prezentate dovezi. Reduce ancorarea și biasul de confirmare.
    how_can_this_be_misapplied:
      overprecision: |
        Atribuirea unor probabilități exacte atunci când incertitudinea este ridicată.
      prior_rigidity: |
        A te agăța de opinii anterioare puternice și a nu te actualiza suficient cu dovezi noi.
      base_rate_tyranny: |
        Ignorarea dovezilor puternice, deoarece ratele de bază sugerează altceva — uneori
        dovada ar trebui să domine.
      false_sophistication: |
        Folosirea limbajului bayesian pentru a suna riguros, fără a face raționamentul real.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
  - id: ben_franklin_effect
    name: Efectul Ben Franklin
    quick_introduction: |
      Efectul Ben Franklin este fenomenul psihologic prin care oamenii ajung să placă mai mult
      pe cineva după ce i-au făcut o favoare. Contrar intuiției că facem favoruri oamenilor care ne plac,
      adesea ajungem să placem oamenii pentru care am făcut favoruri.
    one_liner: Ajungem să placem oamenii pentru care am făcut favoruri — atitudinile noastre urmează acțiunile noastre.
    try_this:
      - Dacă dorești să îmbunătățești o relație, ia în considerare să ceri o mică favoare.
      - Observă când o favoare îți schimbă sentimentele față de cineva.
      - Fii conștient că ceilalți te pot aprecia mai mult după ce te-au ajutat.
    ask_yourself:
      - A schimbat facerea unei favori pentru cineva modul în care mă simt în legătură cu el/ea?
      - Îmi rationalizez efortul prin creșterea considerației mele față de el/ea?
    in_more_detail: |
      Benjamin Franklin a descris faimos modul în care a câștigat de partea sa un legislator rival,
      cerându-i să-i împrumute o carte rară din biblioteca sa. După ce omul a acceptat, Franklin i-a returnat-o
      cu o notă de mulțumire. Relația s-a îmbunătățit vizibil. Efectul sugerează că atitudinile noastre urmează
      acțiunile noastre: când investim efort în a ajuta pe cineva, raționalizăm acel efort prin creșterea considerației
      noastre pozitive față de el/ea.

      Teoria disonanței cognitive explică acest lucru: când facem o favoare cuiva pe care nu-l placem
      sau față de care suntem neutri, experimentăm tensiune între acțiunea noastră (ajutorul) și atitudinea noastră
      (displăcerea). Rezolvarea acelei tensiuni prin a-l aprecia mai mult este adesea mai ușor decât a recunoaște
      că am acționat împotriva preferințelor noastre.
    why_this_is_important: |
      Înțelegerea efectului Ben Franklin te ajută să construiești relații strategic și să recunoști
      când propriile tale sentimente pot fi influențate de favorurile trecute. De asemenea, explică de ce cererea
      de mici favoruri poate fi mai eficientă decât oferirea lor atunci când încerci să îmbunătățești o relație.
    when_to_use:
      - construirea_relatiilor
      - negociere
      - leadership
      - rezolvarea_conflictelor
    how_can_you_spot_it:
      liking_after_helping: |
        Observă când te simți mai cald față de cineva după ce i-ai făcut o favoare, chiar dacă
        anterior te simțeai neutru sau negativ.
      others_requesting_small_favors: |
        Când cineva îți cere în mod repetat mici favoruri, poate folosi conștient sau inconștient
        acest efect pentru a construi o relație.
      attitude_shift_post_investment: |
        După ce ai investit timp sau efort în a ajuta pe cineva, observă dacă opinia ta despre el/ea
        s-a schimbat pozitiv.
      reciprocal_relationship_dynamics: |
        Relațiile în care o persoană a făcut multe favoruri pot părea dezechilibrate în afecțiune,
        chiar dacă par echilibrate în acțiuni.
    examples:
      networking: |
        Cererea către un coleg de feedback pentru un draft, ceea ce îl determină să se simtă mai investit
        în succesul tău și mai pozitiv dispus față de tine.
      sales: |
        Un agent de vânzări cere unui potențial client o mică favoare (de exemplu, o recomandare sau o introducere),
        ceea ce îi sporește angajamentul și afecțiunea potențialului client.
      conflict_resolution: |
        După o neînțelegere, cererea către cealaltă parte de ajutor pentru ceva nelegat de subiect
        poate atenua tensiunile și reconstrui bunăvoința.
      mentoring: |
        Când o persoană mai experimentată cere unei persoane mai tinere un input sau ajutor, persoana mai tânără
        se simte adesea mai valorizată și conectată.
    real_world_implications: |
      Efectul Ben Franklin influențează angajarea, vânzările, diplomația și dinamica socială de zi cu zi.
      Poate fi folosit etic pentru a construi punți sau neetic pentru a manipula afecțiunea. Recunoașterea sa te ajută
      să înțelegi de ce unele relații par mai puternice după un schimb asimetric de favoruri.
    professional_application:
      networking_and_relationship_building: |
        Atunci când construiești relații, ia în considerare să ceri mici favoruri rezonabile, în loc
        să le oferi doar pe ale tale. Actul de a ajuta creează implicare și considerație pozitivă.
      collaborative_learning_initiative: |
        În echipe, faptul că membrii se ajută reciproc (de exemplu, revizuire colegială, formare reciprocă)
        poate consolida coeziunea. Structurează colaborarea astfel încât toată lumea să ofere și să primească ajutor.
    how_can_this_be_misapplied:
      manipulation: |
        Cererea deliberată de favoruri doar pentru a face pe cineva să te placă, fără o nevoie reală,
        poate părea exploatatoare dacă este descoperită.
      overreliance_on_favors: |
        Presupunerea că favorurile singure vor rezolva o relație stricată; unele conflicte necesită
        discuții directe și responsabilitate.
      asymmetric_exploitation: |
        Cererea repetată de favoruri fără reciprocitate poate avea efecte adverse și poate genera resentimente.
      misattributing_motives: |
        Presupunerea că bunăvoința cuiva este pur autentică, atunci când poate este parțial rezultatul
        favorurilor pe care le-a făcut pentru tine.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Raționalitate limitată
    quick_introduction: |
      Raționalitatea limitată este ideea că luarea deciziilor umane este limitată de informațiile
      disponibile, capacitatea cognitivă și timpul. Nu optimizăm; "satisfacem"—alegem
      opțiuni care sunt suficient de bune, mai degrabă decât cele mai bune posibile.
    one_liner: Satisfacem—alegem suficient de bun, nu optim.
    try_this:
      - Simplificați alegerile atunci când este posibil; prea multe opțiuni copleșesc raționalitatea limitată.
      - Stabiliți criterii de "suficient de bun" în avans pentru a evita căutarea nesfârșită.
      - Observați când optimizați dincolo de punctul de randament descrescător.
    ask_yourself:
      - Încerc să găsesc opțiunea perfectă când suficient de bun ar fi de ajuns?
      - Ce constrângeri (timp, informații, atenție) îmi limitează decizia?
    in_more_detail: |
      Herbert Simon a introdus conceptul pentru a contesta presupunerea economică clasică
      a actorilor raționali cu informații perfecte. În realitate, avem atenție limitată,
      memorie de lucru și timp. Folosim euristici și scurtături pentru a lua decizii care
      sunt "raționale" având în vedere constrângerile noastre, chiar dacă nu sunt optime într-un sens ideal.

      Raționalitatea limitată explică de ce nu alegem întotdeauna cea mai bună opțiune, de ce
      ne bazăm pe reguli generale și de ce contextul și formularea contează atât de mult. Este
      un model descriptiv al modului în care luăm decizii în realitate, nu o prescripție despre cum ar trebui să o facem.
    why_this_is_important: |
      Înțelegerea raționalității limitate vă ajută să proiectați procese mai bune, să simplificați
      alegerile pentru alții și să stabiliți așteptări realiste pentru calitatea deciziilor. De asemenea,
      explică de ce comportamentul "irațional" este adesea rațional sub constrângeri.
    when_to_use:
      - luare_a_deciziilor
      - rezolvarea_problemelor
      - leadership
      - evaluarea_riscurilor
    how_can_you_spot_it:
      satisficing_behavior: |
        Oamenii aleg prima opțiune acceptabilă, mai degrabă decât să compare exhaustiv.
      heuristic_reliance: |
        Deciziile sunt luate folosind reguli generale, mai degrabă decât analiză completă.
      context_dependence: |
        Aceeași persoană ia decizii diferite în funcție de modul în care sunt prezentate opțiunile.
      information_overload: |
        Când sunt disponibile prea multe informații, calitatea deciziilor poate scădea.
    examples:
      hiring: |
        Un manager angajează primul candidat care îndeplinește cerințele, mai degrabă decât să
        intervieweze la nesfârșit pentru a găsi candidatul "cel mai bun".
      consumer_choice: |
        Cumpărătorii aleg din primele câteva opțiuni de pe un raft, mai degrabă decât să compare fiecare
        produs din magazin.
      policy: |
        Votanții folosesc afilierea la partid sau câteva probleme cheie ca scurtături, mai degrabă decât
        să analizeze fiecare poziție politică.
      daily_routines: |
        Oamenii urmează obiceiuri și setări implicite, mai degrabă decât să re-optimizeze fiecare decizie.
    real_world_implications: |
      Raționalitatea limitată modelează piețele, proiectarea politicilor și comportamentul organizațional.
      "Nudges" (împingeri subtile) și arhitectura alegerilor funcționează deoarece iau în considerare limitele noastre. Ignorarea
      ei duce la sisteme prea complexe pe care oamenii nu le pot folosi eficient.
    professional_application:
      networking_and_relationship_building: |
        Nu vă așteptați ca alții să proceseze compromisuri complexe în timp real. Simplificați alegerile
        și oferiți opțiuni implicite clare.
      collaborative_learning_initiative: |
        Proiectați procese care funcționează cu raționalitatea limitată: reduceți alegerile, oferiți
        opțiuni implicite și folosiți liste de verificare pentru decizii complexe.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Proiectarea proceselor care presupun o capacitate cognitivă nelimitată, ducând la
        oboseala decizională și la rezultate slabe.
      blaming_irrationality: |
        Respingerea alegerilor altora ca fiind iraționale fără a lua în considerare constrângerile lor.
      exploitation: |
        Copleșirea deliberată a oamenilor cu complexitate pentru a-i îndrepta către rezultatele dorite.
      perfectionism: |
        Așteptarea deciziilor optime atunci când satisfacerea este adesea abordarea rațională.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Efectul martorului
    quick_introduction: |
      Efectul martorului este tendința indivizilor de a fi mai puțin predispuși
      să ofere ajutor atunci când sunt prezente alte persoane. Cu cât sunt mai mulți
      martori, cu atât este mai puțin probabil ca o persoană să acționeze. Responsabilitatea
      este difuzată; presupunem că altcineva va ajuta.
    one_liner: Cu cât sunt mai multe persoane prezente, cu atât este mai puțin probabil ca o persoană să acționeze.
    try_this:
      - În situații de urgență, atribuiți direct responsabilitatea: Dumneavoastră, sunați la 112.
      - Nu presupuneți că altcineva va ajuta—acționați sau delegați explicit.
      - Observați când așteptați ca alții să acționeze primii.
    ask_yourself:
      - Difuzez responsabilitatea pentru că sunt prezente și alte persoane?
      - Aș acționa diferit dacă aș fi singur?
    in_more_detail: |
      După uciderea lui Kitty Genovese (deși povestea a fost parțial mitologizată),
      cercetătorii au descoperit că prezența altora reduce ajutorul. Ne uităm la
      ceilalți pentru indicii—dacă nimeni nu acționează, interpretăm asta ca "nu este necesară nicio acțiune".
      Experimentăm, de asemenea, difuzarea responsabilității: cu multe persoane prezente,
      fiecare se simte mai puțin personal responsabil. Poate apărea ignoranța pluralistă:
      toată lumea crede că ceva nu este în regulă, dar nimeni nu acționează pentru că nimeni altcineva
      nu acționează.

      Efectul este cel mai puternic atunci când situația este ambiguă și când
      martorii nu se cunosc între ei. Poate fi depășit prin atribuirea directă
      a responsabilității ("Dumneavoastră, sunați la 112").
    why_this_is_important: |
      Înțelegerea efectului martorului vă ajută să acționați atunci când alții
      nu o fac și să proiectați sisteme care să-l depășească. Dacă sunteți în dificultate,
      identificați o singură persoană. Dacă sunteți martor, nu așteptați ca alții să acționeze.
    when_to_use:
      - leadership
      - construire_relatii
      - rezolvare_conflict
      - luare_decizii
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "Altcineva o va face" atunci când sunt mulți prezenți.
      pluralistic_ignorance: |
        Toată lumea crede că este necesară acțiune, dar nimeni nu acționează
        pentru că nimeni altcineva nu acționează.
      social_proof_inaction: |
        Inacțiunea altora este interpretată ca "nu este necesară nicio acțiune".
      audience_inhibition: |
        Frica de a părea ridicol sau de a reacționa exagerat împiedică acțiunea.
    examples:
      emergency: |
        O persoană leșină; cu mulți martori, fiecare este mai puțin probabil
        să solicite ajutor.
      workplace: |
        Toată lumea vede o problemă, dar nimeni nu o ridică—fiecare presupune
        că altcineva o va face.
      harassment: |
        Martorii la hărțuire nu intervin, fiecare gândindu-se
        că alții vor acționa.
      meetings: |
        O idee proastă rămâne necontestată, deoarece toată lumea presupune
        că altcineva va vorbi.
    real_world_implications: |
      Efectul martorului poate avea consecințe tragice în situații de urgență
      și permite problemelor să persiste în organizații. Depășirea lui
      necesită atribuirea directă a responsabilității și norme care încurajează
      intervenția.
    professional_application:
      networking_and_relationship_building: |
        Când aveți nevoie de ajutor, cereți unei persoane specifice. Când vedeți
        ceva greșit, acționați—nu presupuneți că alții vor face-o. Creați norme
        în care a vorbi este așteptat și recompensat.
      collaborative_learning_initiative: |
        Antrenați oamenii să recunoască efectul martorului și să intervină.
        Folosiți "dacă vezi ceva, spune ceva" și atribuiți roluri explicite.
        Recompensați-i pe cei care vorbesc primii.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Judecarea individuală aspră atunci când efectul este o forță situațională puternică—concentrați-vă pe schimbarea situației.
      false_assumption: |
        Presupunerea că cineva va ajuta întotdeauna dacă sunt suficiente persoane
        prezente—adesea este adevărat opusul.
      overcorrection: |
        A face pe toată lumea responsabil, astfel încât nimeni să nu fie—difuzarea
        poate apărea totuși.
      individualizing: |
        Tratarea efectului martorului ca pe o defect de caracter, mai degrabă
        decât ca pe un fenomen situațional.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Cercul de competență
    quick_introduction: |
      Cercul de competență este un model mental care te îndeamnă să cunoști limitele
      expertizei tale și să rămâi în ele atunci când iei decizii importante. Warren Buffett
      și Charlie Munger subliniază importanța de a ști ceea ce nu știi.
    one_liner: Cunoaște-ți limitele expertizei—și rămâi în ele atunci când contează.
    try_this:
      - Stabilește unde ai expertiză reală vs. unde ghicești.
      - Când ești în afara cercului tău, caută sfaturi sau deleagă.
      - Fii onest: ar fi de acord un adevărat expert cu judecata ta aici?
    ask_yourself:
      - Sunt în cercul meu de competență sau ghicesc?
      - Când am recunoscut ultima dată „Nu știu” în acest domeniu?
    in_more_detail: |
      Fiecare persoană are domenii în care posedă o expertiză reală—unde poate evalua
      informații, depista erori și lua decizii fiabile. În afara acestui cerc, suntem
      predispuși la aceleași prejudecăți și greșeli ca oricine altcineva. Cheia este
      autoevaluarea onestă: unde ești cu adevărat competent și unde ghicești?

      Cercul se poate extinde prin învățare deliberată, dar necesită umilință pentru
      a recunoaște limitele sale actuale. Operarea în afara cercului tău crește
      riscul de erori costisitoare, în special atunci când miza este mare.
    why_this_is_important: |
      A rămâne în cercul tău de competență reduce greșelile costisitoare și îmbunătățește
      calitatea deciziilor. De asemenea, te ajută să știi când să ceri sfaturi, să delezi
      sau să te abții. Supraîncrederea în afara cercului tău este o sursă majoră de eșec.
    when_to_use:
      - luare_de_decizii
      - investiții
      - mișcări_de_cariera
      - evaluare_risc
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Poți explica limitele cunoștințelor tale într-un domeniu? Știi ce nu știi?
      knowing_when_to_defer: |
        Recunoașterea situațiilor în care ar trebui să cauți o opinie de expert, mai degrabă decât să decizi singur.
      consistent_track_record: |
        În interiorul cercului tău, judecățile tale tind să fie validate în timp; în afara lui, nu.
      calibration: |
        Încrederea ta într-un domeniu corespunde performanței tale reale în acel domeniu.
    examples:
      investing: |
        Buffett evită acțiunile tehnologice deoarece spune că sunt în afara cercului său de
        competență—nu le poate evalua în mod fiabil.
      career: |
        Un specialist care rămâne în domeniul său vs. unul care preia un rol „ambitios” într-o
        zonă nelegată.
      hiring: |
        Știind când să te bazezi pe propria judecată vs. când să aduci specialiști pentru
        roluri tehnice.
      advice_giving: |
        Refuzul de a te pronunța pe subiecte din afara expertizei tale, mai degrabă decât să ghicești.
    real_world_implications: |
      Cercul de competență este central pentru investițiile de valoare și succesul profesional.
      Ignorarea lui duce la supraîncredere, afaceri eșuate și sfaturi proaste. Extinderea
      cercului necesită efort deliberat și feedback onest.
    professional_application:
      networking_and_relationship_building: |
        Construiește relații cu oameni ale căror cercuri de competență le completează pe ale tale.
        Știi când să introduci pe alții, mai degrabă decât să răspunzi tu însuți.
      collaborative_learning_initiative: |
        Creează echipe cu cercuri suprapuse și complementare. Încurajează oamenii să semnaleze când operează în afara competenței lor.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        A nu ieși niciodată din cercul tău poate limita creșterea și învățarea.
      false_modesty: |
        A pretinde un cerc minuscul pentru a evita responsabilitatea sau deciziile dificile.
      gatekeeping: |
        Utilizarea „cercului de competență” pentru a respinge argumentele altora fără a le angaja.
      stagnation: |
        Tratarea cercului ca fiind fix, mai degrabă decât ceva ce se poate extinde cu efort.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Disonanță Cognitivă
    quick_introduction: |
      Disonanța cognitivă este disconfortul mental pe care îl simțim atunci când deținem
      convingeri conflictuale sau când acțiunile noastre contrazic
      convingerile noastre. Suntem motivați să
      reducem acest disconfort—adesea schimbându-ne convingerile pentru a se potrivi acțiunilor noastre
      mai degrabă decât schimbându-ne acțiunile.
    one_liner: Ne schimbăm convingerile pentru a se potrivi acțiunilor noastre mai des decât invers.
    try_this:
      - Observați când raționalizați pentru a reduce disconfortul în loc să schimbați comportamentul.
      - Întrebați: Îmi ajustez convingerile pentru a justifica ceea ce am făcut?
      - Luați în considerare dacă schimbarea acțiunii ar fi mai onestă decât schimbarea convingerii.
    ask_yourself:
      - Reduc disonanța prin raționalizare sau prin schimbare efectivă?
      - Aș avea această convingere dacă nu aș fi acționat deja în acest fel?
    in_more_detail: |
      Teoria lui Leon Festinger explică faptul că noi căutăm consistență. Când acționăm
      împotriva valorilor noastre (de ex., mințind, risipind bani), experimentăm disonanță.
      Pentru a o reduce, am putea schimba convingerea noastră ("Nu a fost chiar o minciună") sau
      am putea minimiza acțiunea ("Nu a fost așa de rău"). Adesea raționalizăm mai degrabă
      decât să ne reformăm.

      Disonanța cognitivă conduce efectul Ben Franklin (ne plac oamenii pe care i-am
      ajutat), explică de ce justificăm deciziile anterioare și stă la baza multor
      auto-înșelăciuni. Este o forță puternică în formarea și schimbarea convingerilor.
    why_this_is_important: |
      Înțelegerea disonanței cognitive vă ajută să vă recunoașteți propriile
      raționalizări și să înțelegeți de ce oamenii se opun schimbării opiniei.
      Explică, de asemenea, de ce angajamentul și consistența sunt principii puternice de persuasiune.
    when_to_use:
      - luarea_deciziilor
      - construirea_relațiilor
      - leadership
      - rezolvarea_conflictelor
    how_can_you_spot_it:
      post_decision_rationalization: |
        După o alegere, subliniem aspectele pozitive ale alegerii noastre și
        pe cele negative ale opțiunilor respinse.
      belief_action_alignment: |
        Ajustăm convingerile pentru a se potrivi acțiunilor pe care le-am întreprins deja.
      discomfort_with_inconsistency: |
        Neliniște atunci când observăm că comportamentul nostru nu se aliniază cu valorile noastre declarate.
      resistance_to_disconfirming_evidence: |
        Respingerea sau minimizarea informațiilor care contrazic angajamentele noastre.
    examples:
      purchase_justification: |
        După achiziționarea unui obiect scump, subliniem beneficiile sale și minimizăm
        costul.
      relationship: |
        Raționalizăm faptul că rămânem într-o relație proastă concentrându-ne pe ce e bun
        și minimizând ce e rău.
      career: |
        Justificăm faptul că rămânem într-un loc de muncă pe care nu-l apreciem, subliniind motivele pentru care "trebuie"
        să rămânem.
      beliefs: |
        Când acțiunile noastre contrazic valorile noastre, ne schimbăm valorile ("Nu sunt
        cu adevărat vegetarian—doar mănânc carne uneori") în loc de acțiunile noastre.
    real_world_implications: |
      Disonanța cognitivă modelează formarea convingerilor, comportamentul consumatorilor și
      atitudinile politice. Explică de ce oamenii insistă după decizii proaste
      și de ce schimbarea comportamentului poate schimba convingerile.
    professional_application:
      networking_and_relationship_building: |
        Angajamentele mici pot duce la altele mai mari—oamenii își raționalizează
        acțiunile anterioare. Folosiți acest lucru etic: începeți cu cereri mici. Fiți conștienți
        când vă raționalizați propriul comportament.
      collaborative_learning_initiative: |
        Când introduceți schimbări, obțineți o aprobare timpurie și angajamente mici—acestea
        creează disonanță care motivează o adoptare mai mare. Evitați să forțați
        angajamente publice care creează resentimente.
    how_can_this_be_misapplied:
      manipulation: |
        Crearea deliberată a disonanței pentru a presa oamenii să se conformeze.
      dismissing_genuine_change: |
        Presupunerea că orice schimbare de convingere este raționalizare, când oamenii uneori
        se actualizează cu adevărat.
      forced_consistency: |
        Presarea oamenilor să fie "consistenți" când opiniile lor au evoluat legitim.
      self_deception: |
        Folosirea teoriei disonanței pentru a justifica evitarea adevărurilor incomode despre
        noi înșine.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Biasul de confirmare
    quick_introduction: |
      Biasul de confirmare este tendința de a căuta, interpreta și reține informații
      în moduri care ne confirmă credințele existente. Acordăm mai multă greutate
      probelor care ne susțin și ignorăm sau respingem probele care contrazic
      părerile noastre. Punem întrebări care confirmă mai degrabă decât să ne
      testeze ipotezele.
    one_liner: Căutăm și ne amintim ce ne confirmă credințele; ignorăm ce le contrazice.
    try_this:
      - Întreabă-te: Ce m-ar contrazice? Caută activ dovezi infirmatoare.
      - Observă când acorzi mai multă greutate informațiilor care te susțin decât celor care te contrazic.
      - Consideră perspectiva opusă la fel de serios ca pe a ta.
    ask_yourself:
      - Îmi testez ipoteza sau doar o confirm?
      - Când mi-am schimbat ultima dată părerea pe baza unor dovezi noi?
    in_more_detail: |
      Nu suntem procesatori neutri de informații. Căutăm confirmarea, interpretăm
      ambiguitatea ca un sprijin și ne amintim mai bine succeselor decât eșecurilor.
      Ne înconjurăm de oameni și media cu opinii similare. Ne întrebăm „De ce am
      dreptate?” mai degrabă decât „Ce m-ar contrazice?” Acest lucru ne face prea
      încrezători și lenți în a ne actualiza opiniile.

      Biasul de confirmare este unul dintre cele mai răspândite și bine documentate
      biasuri. Afectează știința, politica, relațiile și afacerile. Depășirea lui
      necesită efort deliberat și procese structurate.
    why_this_is_important: |
      Recunoașterea biasului de confirmare este esențială pentru luarea unor
      decizii bune și pentru învățare. Te ajută să cauți dovezi infirmatoare, să
      consideri ipoteze alternative și să-ți actualizezi credințele atunci când
      este cazul. Este fundamentul gândirii științifice.
    when_to_use:
      - luare_decizii
      - invatare
      - rezolvare_probleme
      - evaluare_risc
    how_can_you_spot_it:
      seeking_support: |
        Căutarea de dovezi care confirmă, mai degrabă decât să testeze,
        perspectiva ta.
      asymmetric_interpretation: |
        Interpretarea dovezilor ambigue ca sprijin pentru poziția ta.
      discounting_disconfirming: |
        Respingerea sau minimizarea dovezilor care contrazic credințele tale.
      selective_exposure: |
        Consumarea doar a informațiilor din surse care sunt de acord cu tine.
    examples:
      hiring: |
        Formarea unei impresii pozitive timpurii și apoi punerea unor întrebări
        care să confirme că candidatul este grozav.
      investing: |
        După cumpărarea unei acțiuni, căutarea de știri pozitive și ignorarea
        analizelor negative.
      relationships: |
        Interpretarea acțiunilor unui partener printr-o lentilă care confirmă
        părerea ta despre el (bună sau rea).
      politics: |
        Acceptarea necondiționată a informațiilor din propria tabără și
        respingerea informațiilor echivalente din partea cealaltă.
    real_world_implications: |
      Biasul de confirmare perpetuează credințe false, alimentează polarizarea
      și cauzează greșeli costisitoare. Este dușmanul unei științe bune și al
      unei bune luări de decizii. Depășirea lui necesită căutarea deliberată a
      infirmării.
    professional_application:
      networking_and_relationship_building: |
        Atunci când îți formezi opinii despre oameni, caută activ dovezi
        infirmatoare. Întreabă-te „Ce m-ar schimba?” și caută acele dovezi.
      collaborative_learning_initiative: |
        Folosește avocatul diavolului, echipe roșii (red teams) și pre-mortem pentru
        a expune perspective infirmatoare. Recompensează persoanele care contestă
        părerile predominante cu dovezi bune.
    how_can_this_be_misapplied:
      false_balance: |
        Tratarea tuturor perspectivelor ca fiind la fel de valide, când dovezile
        susțin puternic o parte.
      excessive_skepticism: |
        Respingerea tuturor dovezilor ca fiind „bias de confirmare”, când unele
        credințe sunt bine susținute.
      contrarianism: |
        Adoptarea perspectivei opuse doar pentru a evita biasul de confirmare
        – când perspectiva originală poate fi corectă.
      analysis_paralysis: |
        Neangajarea niciodată într-o opinie pentru că „am putea fi biasati”.
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Blestemul Cunoașterii
    quick_introduction: |
      Blestemul cunoașterii este dificultatea de a-ți imagina cum este să nu știi ceva odată ce îl cunoști. Experții se luptă să-i învețe pe începători deoarece nu pot recrea perspectiva începătorului. Odată ce știi, uiți cum era să nu știi.
    one_liner: Odată ce știi ceva, uiți cum era să nu știi.
    try_this:
      - Când explici, începe de la principii fundamentale – presupune că audiența ta nu știe nimic.
      - Roagă un începător să explice înapoi; confuzia lui dezvăluie punctele tale oarbe.
      - Observă când sari peste pași sau folosești jargon pe care alții s-ar putea să nu-l știe.
    ask_yourself:
      - Presupun că alții au același context ca mine?
      - Ar înțelege cineva fără background-ul meu asta?
    in_more_detail: |
      Într-un experiment clasic, oamenii care știau răspunsul la un puzzle au bătut ritmul unui cântec și s-au așteptat ca alții să-l ghicească – au supraestimat cât de evident era. Cei care au bătut ritmul nu puteau "dezasculta" cântecul din capul lor. Cunoașterea este "lipicioasă"; este greu să simulezi ignoranța.

      Blestemul afectează predarea, comunicarea, designul produselor și leadership-ul. Presupunem că alții au același context ca noi. Folosim jargon. Sărim peste pași. Ne surprinde când oamenii "nu înțeleg".
    why_this_is_important: |
      Recunoașterea blestemului cunoașterii îmbunătățește predarea, comunicarea și designul produselor. Te ajută să te întâlnești cu oamenii acolo unde sunt ei, nu unde ești tu. Este esențial pentru transferul eficient al cunoștințelor.
    when_to_use:
      - învățare
      - leadership
      - rezolvarea_problemelor
      - construirea_relațiilor
    how_can_you_spot_it:
      obvious_to_you: |
        "Este evident" atunci când este evident doar pentru că știi răspunsul.
      jargon_use: |
        Folosirea de termeni pe care audiența nu îi cunoaște fără a-i defini.
      skipped_steps: |
        Presupunerea că alții vor completa ce ai lăsat în urmă.
      frustration_with_learners: |
        "Cum de nu văd?" atunci când le lipsește contextul tău.
    examples:
      teaching: |
        Un profesor de matematică sare peste pași care sunt "evidenți" pentru el, dar
        esențiali pentru studenți.
      product_design: |
        Designerii creează interfețe care au sens pentru ei, dar îi confundă pe
        utilizatorii noi.
      onboarding: |
        Angajații experimentați uită ce nu știu noii angajați și
        oferă instruire inadecvată.
      writing: |
        Autorii presupun că cititorii au același background și omit
        contextul necesar.
    real_world_implications: |
      Blestemul cunoașterii creează lacune în comunicare, produse eșuate și predare ineficientă. Este unul dintre motivele pentru care experții pot fi profesori slabi. Depășirea lui necesită un efort deliberat de a adopta perspectiva audienței.
    professional_application:
      networking_and_relationship_building: |
        Când explici, începe de la nivelul celuilalt. Întreabă "Ce
        știu deja?". Testează-ți comunicarea cu cineva
        care nu are background-ul tău.
      collaborative_learning_initiative: |
        Folosește exerciții de tip "explică-mi ca și cum aș avea cinci ani". Roagă experții să-i învețe
        pe începători și să primească feedback. Creează documentație care presupune
        cunoștințe anterioare zero. Folosește predarea între egali – cei care au învățat recent
        își amintesc perspectiva începătorului.
    how_can_this_be_misapplied:
      oversimplification: |
        Simplificarea excesivă până la punctul de inexactitate sau condescendență.
      false_assumption: |
        Presupunerea că alții știu mai puțin decât știu – de asemenea, o eșuare a
        calibrării.
      one_size_fits_all: |
        Nu toate audiențele au nevoie de același nivel de explicație; adaptează-te
        la audiență.
      avoiding_complexity: |
        Unele subiecte sunt complexe; blestemul cunoașterii nu înseamnă
        că nu ar trebui să folosim niciodată limbaj tehnic atunci când este cazul.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Efect implicit
    quick_introduction: |
      Efectul implicit reprezintă tendința de a alege opțiunea pre-selectată atunci
      când suntem prezentați cu alegeri. Ceea ce este setat ca implicit are un avantaj puternic—
      oamenii aderă adesea la el, indiferent dacă este optim pentru ei.
    one_liner: Ceea ce este setat ca implicit are un avantaj puternic—aderăm la el.
    try_this:
      - Observă când accepți implicitul fără a evalua alternativele.
      - Când proiectezi alegeri, setează implicite care servesc intereselor utilizatorilor.
      - Întreabă-te: Aș alege asta dacă nu ar fi pre-selectat?
    ask_yourself:
      - Aleg implicitul din inerție sau pentru că este cel mai bun pentru mine?
      - Cine a setat acest implicit și ce ar putea câștiga din asta?
    in_more_detail: |
      Implicitele funcționează datorită inerției, aversiunii față de pierdere (schimbarea pare o pierdere a implicitului) și a recomandării implicite (presupunem că implicitul este recomandat).
      Ratele de donare de organe variază dramatic în funcție de țară, în mare parte în funcție de faptul dacă implicitul este opt-in (optare activă) sau opt-out (optare pasivă). Participarea la economiile pentru pensie crește brusc
      când înrolarea este automată.

      Implicitele pot fi folosite în bine (pentru a încuraja rezultate mai bune) sau pentru
      manipulare (ascunderea termenilor nefavorabili în căsuțe pre-selectate). Înțelegerea
      efectului te ajută să proiectezi sisteme mai bune și să reziști implicitelor nedorite.
    why_this_is_important: |
      Înțelegerea efectului implicit te ajută să proiectezi o arhitectură a alegerilor care
      îmbunătățește rezultatele și te ajută să recunoști când alegerile tale sunt modelate de implicite, mai degrabă decât de preferințe deliberate.
    when_to_use:
      - luarea_deciziilor
      - leadership
      - rezolvarea_problemelor
      - evaluarea_riscului
    how_can_you_spot_it:
      inertia_toward_default: |
        Majoritatea oamenilor aderă la ceea ce este pre-selectat.
      implied_recommendation: |
        Interpretăm implicitul ca "ceea ce vor să alegem."
      opt_in_vs_opt_out: |
        Modul de prezentare schimbă dramatic participarea (optare activă vs. optare pasivă).
      pre_checked_boxes: |
        Opțiunile pre-selectate au un avantaj puternic în formulare și setări.
    examples:
      organ_donation: |
        Țările cu optare pasivă au rate de donare mult mai mari decât țările cu optare activă—
        implicitul contează mai mult decât atitudinile.
      retirement_savings: |
        Înrolarea automată crește dramatic participarea la fondurile de pensii 401(k).
      software_installers: |
        Opțiunile "recomandate" și add-on-urile pre-selectate modelează ceea ce instalează utilizatorii.
      subscriptions: |
        Perioadele de probă gratuite care trec implicit la înrolarea plătită captează mulți care nu ar
        alege activ să se aboneze.
    real_world_implications: |
      Efectul implicit este unul dintre cele mai puternice instrumente de influență. Modelează economiile,
      sănătatea, confidențialitatea și comportamentul consumatorilor. Arhitectura etică a alegerilor folosește
      implicitele pentru a îmbunătăți rezultatele; tiparele întunecate le folosesc pentru a exploata.
    professional_application:
      networking_and_relationship_building: |
        Când proiectezi procese pentru alții, alege implicite care servesc intereselor lor. Evită tiparele întunecate care folosesc implicitele pentru a extrage valoare.
      collaborative_learning_initiative: |
        Setează implicite pentru practicile echipei (de exemplu, implicit la asincron, implicit la
        documentare) care se aliniază cu comportamentul dorit. Fă ca alegerea corectă să fie alegerea ușoară.
    how_can_this_be_misapplied:
      dark_patterns: |
        Folosirea implicitelor pentru a păcăli oamenii să facă alegeri nefavorabile (de exemplu, taxe ascunse, abonamente nedorite).
      paternalism: |
        Impunerea implicitelor care înlocuiesc preferințele reale fără consimțământ.
      manipulation: |
        Ascunderea termenilor nefavorabili în implicite și bazarea pe inerție.
      one_size_fits_all: |
        Presupunerea că același implicit este corect pentru toată lumea atunci când preferințele variază.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Efectul Dunning-Kruger
    quick_introduction: |
      Efectul Dunning-Kruger descrie o prejudecată cognitivă prin care persoanele cu cunoștințe sau abilități limitate într-un domeniu își supraestimează competența, în timp ce experții tind să și-o subestimeze. Cu cât știi mai puțin, cu atât poți fi mai încrezător.
    one_liner: Cu cât știi mai puțin, cu atât poți fi mai încrezător.
    try_this:
      - În domenii noi, presupune că ești prea încrezător – caută feedback și calibrare.
      - Când experții își exprimă îndoiala, ia-o în serios; s-ar putea să cunoască cazurile limită.
      - Observă când novicii sunt mai siguri decât experții într-un domeniu.
    ask_yourself:
      - Sunt în "vârful Muntelui Proști" sau în "vale a umilinței"?
      - Am capacitatea metacognitivă de a-mi evalua propria competență aici?
    in_more_detail: |
      Cercetările lui Dunning și Kruger au arătat că indivizii incompetenți nu posedă capacitatea metacognitivă de a-și recunoaște propria incompetență. Pentru a-ți evalua performanța, ai nevoie de aceleași abilități necesare pentru a performa bine – astfel încât cei necalificați sunt dezavantajați dublu: performează slab și nu știu asta.

      Pe măsură ce competența crește, oamenii experimentează adesea o „vale a umilinței” în care recunosc cât de mult nu știu. Adevărații experți pot fi subîncrezători deoarece sunt conștienți de nuanțe și cazuri limită.
    why_this_is_important: |
      Recunoașterea efectului Dunning-Kruger te ajută să-ți calibrezi propria încredere, să eviți supraestimarea opiniilor novicilor și să apreciezi umilința experților. Este esențial pentru învățare, angajare și luarea deciziilor.
    when_to_use:
      - învățare
      - luare_decizii
      - leadership
      - mutări_în_carieră
    how_can_you_spot_it:
      novice_overconfidence: |
        O persoană cu puțină experiență exprimă opinii puternice, necalificate.
      expert_underconfidence: |
        Persoanele cu abilități înalte ezită și exprimă incertitudine mai mult decât persoanele mai puțin calificate.
      inability_to_recognize_quality: |
        Performanții slabi nu pot distinge munca bună de cea proastă în domeniul lor.
      confidence_competence_mismatch: |
        Încrederea și abilitatea reală sunt corelate invers în rândul începătorilor.
    examples:
      social_media: |
        Persoanele cu cunoștințe superficiale despre un subiect argumentează încrezător cu experți în domeniu.
      hiring: |
        Candidații care performează slab la interviuri își evaluează uneori performanța înalt.
      investing: |
        Investitorii noi pot fi prea încrezători după primele câștiguri, neconștientizând norocul.
      workplace: |
        Angajații juniori pot supraestima pregătirea lor pentru promovare, în timp ce seniorii se îndoiesc de ei.
    real_world_implications: |
      Efectul Dunning-Kruger afectează educația, angajarea, politica și discursul public. Explică de ce ideile proaste sunt amplificate și de ce experții pot fi ignorați. Calibrarea contează pentru luarea deciziilor individuale și colective.
    professional_application:
      networking_and_relationship_building: |
        Când cineva este foarte încrezător, ia în considerare dacă ar putea fi în zona Dunning-Kruger. Caută perspective diverse, inclusiv de la cei care exprimă incertitudine.
      collaborative_learning_initiative: |
        Creează culturi în care admiterea incertitudinii este valorizată. Încurajează exercițiile de calibrare și feedback-ul care ajută oamenii să-și evalueze cu precizie competența.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Presupunând că persoanele încrezătoare greșesc mereu; uneori încrederea este justificată.
      false_modesty: |
        Experții pretind că știu mai puțin decât știu pentru a părea umili.
      gatekeeping: |
        Folosirea Dunning-Kruger pentru a respinge pe oricine nu este de acord cu "experții", fără a le angaja argumentele.
      self_doubt_paralysis: |
        Supra-corectarea până la punctul de a nu-ți mai crede niciodată propriile judecăți.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Decalajul Empatic
    quick_introduction: |
      Decalajul empatic este dificultatea de a înțelege și de a prezice stările mentale ale altora atunci când noi înșine ne aflăm într-o stare diferită. Când suntem calmi, subestimăm cum ne vom simți când suntem furioși sau flămânzi. Când suntem sătui, subestimăm cât de mult ne va fi foame când vom fi înfometați.
    one_liner: Subestimăm cum ne vom simți — și cum se simt alții — în stări diferite.
    try_this:
      - Când ești calm, fă-ți angajamente pentru momentul în care vei fi stresat; pre-angajează-te.
      - Nu judeca alții într-o stare în care nu te afli — flămând, obosit, speriat.
      - Întreabă: Îmi proiectez starea actuală asupra sinelui meu viitor sau asupra altora?
    ask_yourself:
      - Subestimez cum mă voi simți într-o stare diferită?
      - Aș înțelege mai bine această persoană dacă aș fi în starea ei?
    in_more_detail: |
      Avem probleme în a ne imagina cum ne vom simți în circumstanțe diferite — și cum se simt alții când se află în stări în care noi nu ne aflăm în prezent. O persoană trează subestimează atracția dependenței. O persoană odihnită subestimează impactul privării de somn. Ne proiectăm starea actuală asupra altora și asupra propriilor noastre eu viitoare.

      Decalajul empatic afectează deciziile pe care le luăm pentru propriile noastre eu viitoare (de exemplu, angajamentul de a face exerciții fizice când suntem motivați), deciziile pe care le luăm pentru alții și capacitatea noastră de a înțelege persoanele aflate în stări diferite.
    why_this_is_important: |
      Recunoașterea decalajului empatic îmbunătățește luarea deciziilor pentru "tu" viitor, empatia pentru alții și înțelegerea propriei noastre variabilități. Explică de ce ne facem angajamente pe care nu le putem respecta și de ce îi înțelegem greșit pe cei aflați în suferință.
    when_to_use:
      - luarea_deciziilor
      - construirea_relatiilor
      - leadership
      - rezolvarea_conflictelor
    how_can_you_spot_it:
      current_state_projection: |
        Presupunerea că alții se simt așa cum ne simțim noi acum, sau că viitorul "eu" se va simți așa cum ne simțim noi acum.
      underestimating_emotional_state: |
        "Care e mare lucru?" când nu ne aflăm în starea în care se află ei.
      commitment_failures: |
        Luarea deciziilor bazate pe motivația actuală, pe care nu le vom duce la îndeplinire când motivația dispare.
      misunderstanding_others: |
        Respingerea experiențelor altora deoarece nu ni le putem imagina din starea noastră actuală.
    examples:
      hunger: |
        Cumpărături când suntem sătui — cumpărăm mai puțin decât ne va fi poftă când ne va fi foame.
      addiction: |
        Persoanele care nu suferă de dependență subestimează dificultatea renunțării; dependenții în recuperare pot subestima atracția în timp ce consumă.
      conflict: |
        Când suntem calmi, subestimăm cum vom reacționa în momentul confruntării.
      motivation: |
        Înscrierea la o clasă la ora 6 dimineața când suntem motivați — și neprezentarea când suntem somnoroși.
    real_world_implications: |
      Decalajul empatic afectează tratamentul dependențelor, politicile și înțelegerea interpersonală. Explică de ce facem angajamente pe care le încălcăm și de ce adesea nu reușim să înțelegem perspectivele altora. Este o barieră în calea empatiei și a luării unor decizii bune.
    professional_application:
      networking_and_relationship_building: |
        Când cineva este stresat, furios sau într-o stare diferită, nu presupune că va raționa așa cum ai face tu. Încearcă să-ți imaginezi starea lui. Când faci angajamente, ia în considerare cum te vei simți când motivația va dispărea.
      collaborative_learning_initiative: |
        Când planifici, ia în considerare cum se va simți echipa când este obosită, sub presiune sau frustrată. Proiectează pentru acele stări, nu doar pentru starea de planificare motivată.
    how_can_this_be_misapplied:
      overattribution: |
        Atribuirea oricărei neînțelegeri la "decalaj empatic" când uneori oamenii au, în mod real, valori diferite.
      excusing_behavior: |
        "Nu au putut face altfel — decalaj empatic" când oamenii sunt responsabili pentru gestionarea stărilor lor.
      false_relativism: |
        Presupunerea că nu vom înțelege niciodată pe alții când ne putem îmbunătăți prin efort și experiență.
      self_excuse: |
        Folosirea decalajului empatic pentru a justifica propriile noastre eșecuri de a duce la bun sfârșit lucrurile.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Efectul de dotare
    quick_introduction: |
      Efectul de dotare este tendința de a acorda o valoare mai mare unui obiect
      pur și simplu pentru că îl deținem. Cerem mai mult pentru a renunța la un obiect
      decât am plăti pentru a-l achiziționa. Proprietatea creează atașament,
      ceea ce distorsionează evaluarea noastră.
    one_liner: Valorizăm mai mult ceea ce deținem decât ceea ce nu avem—proprietatea creează atașament.
    try_this:
      - Întreabă: Cât aș plăti pentru a achiziționa asta dacă nu aș deține-o?
      - Când vinzi, imaginează-ți că ești cumpărător—ai plăti prețul cerut de tine?
      - Observă când proprietatea îți umflă evaluarea.
    ask_yourself:
      - Supra-evaluez asta pentru că o dețin?
      - Ar fi un cumpărător neutru de acord cu prețul meu?
    in_more_detail: |
      În experimente, persoanele cărora li s-a dat aleatoriu o cană cer aproximativ
      de două ori mai mult pentru a o vinde decât sunt dispuși alții să plătească
      pentru a o cumpăra. Simplul fapt al proprietății crește valoarea percepută.
      Acest lucru este legat de aversiunea față de pierdere—a renunța la ceva
      se simte ca o pierdere, iar noi suntem aversi față de pierdere. Dar efectul
      depășește acest aspect: incorporăm lucrurile deținute în identitatea noastră.

      Efectul de dotare afectează negocierile, comportamentul consumatorului și
      schimbările organizaționale. Explică de ce oamenii își supra-evaluează casele,
      ideile și rolurile actuale. Creează fricțiuni în tranzacții
      și tranziții.
    why_this_is_important: |
      Recunoașterea efectului de dotare te ajută să negociezi mai eficient,
      să iei decizii mai clare despre ce să păstrezi sau să renunți, și să înțelegi
      de ce alții își supra-evaluează ceea ce au. Explică și rezistența la
      schimbare.
    when_to_use:
      - luarea_deciziilor
      - negociere
      - investiții
      - schimbări_în_carieră
    how_can_you_spot_it:
      ownership_premium: |
        „Nu l-aș vinde pentru atâta” când nu ai plăti atâta pentru a-l cumpăra.
      attachment_to_possession: |
        Valorizarea lucrurilor mai mult odată ce le avem.
      resistance_to_trading: |
        Reticență de a schimba sau tranzacționa chiar și atunci când ar fi rațional.
      overvaluation_of_own_ideas: |
        Ideile, proiectele sau rolurile noastre par mai valoroase pentru că sunt
        ale noastre.
    examples:
      real_estate: |
        Proprietarii de case își supra-evaluează adesea locuințele—le valorizează mai mult decât
        o face piața.
      negotiations: |
        Vânzătorii cer mai mult decât sunt dispuși cumpărătorii să plătească; decalajul reflectă
        efectul de dotare.
      career: |
        Supra-evaluarea jobului, companiei sau rolului actual atunci când se ia în considerare
        o schimbare.
      ideas: |
        Bias-ul „nu a fost inventat aici” și „ideea mea”—supra-eualuăm ceea ce am
        creat sau deținem.
    real_world_implications: |
      Efectul de dotare creează fricțiuni pe piață, încetinește schimburile benefice
      și alimentează rezistența la schimbare. Afectează fuziunile,
      reorganizările și tranzițiile personale. Înțelegerea sa
      îmbunătățește negocierile și managementul schimbării.
    professional_application:
      networking_and_relationship_building: |
        Când cineva se opune schimbării, ia în considerare că ar putea experimenta
        efectul de dotare—valorizează status quo-ul mai mult pentru că îl „deține”.
        Prezintă schimbarea în termeni de ceea ce câștigă, nu doar de ceea ce renunță.
      collaborative_learning_initiative: |
        La introducerea unor noi procese, recunoaște că oamenii sunt atașați
        de modurile actuale. Creează siguranță psihologică pentru a „renunța” la
        vechi înainte de a îmbrățișa nou.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        O parte din atașament este rațională—valoare sentimentală, costuri de comutare.
        Nu toată rezistența este efect de dotare.
      manipulation: |
        Crearea unui fals sentiment de proprietate pentru a extrage prețuri mai mari (de exemplu,
        „încearcă gratuit” pentru a declanșa efectul de dotare).
      undervaluing_continuity: |
        Presupunerea că toată rezistența la schimbare este irațională atunci când continuitatea
        are valoare reală.
      cold_rationality: |
        Respingerea atașamentului emoțional ca „doar efect de dotare” atunci când
        reflectă valori autentice.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Efectul falsului consens
    quick_introduction: |
      Efectul falsului consens este tendința de a supraestima cât de mult alții sunt de acord
      cu credințele, atitudinile și comportamentele noastre. Presupunem că opiniile noastre sunt
      mai comune decât sunt în realitate și ne este greu să ne imaginăm că oameni rezonabili ar putea
      să nu fie de acord.
    one_liner: Supraestimăm cât de mult sunt alții de acord cu noi.
    try_this:
      - Caută în mod activ persoane care nu sunt de acord — nu presupune consens.
      - Înainte de a lansa, testează cu persoane care nu împărtășesc presupunerile tale.
      - Întreabă: Ce ar spune cineva care nu este de acord? Ia-o în serios.
    ask_yourself:
      - Presupun că alții gândesc ca mine?
      - Când am fost ultima dată surprins de o opinie diferită a cuiva?
    in_more_detail: |
      Când deținem o poziție, tindem să credem că este norma. Ne înconjurăm de oameni
      cu aceleași idei, consumăm medii care ne confirmă și interpretăm feedback-ul ambiguu ca
      fiind acord. Acest lucru creează o cameră de ecou care întărește iluzia consensului.

      Efectul este mai puternic pentru credințele profunde și când suntem foarte investiți
      în poziția noastră. Poate duce la surpriză atunci când alții nu sunt de acord, dificultăți
      în negociere și cercetare de piață slabă atunci când presupunem că clienții gândesc
      ca noi.
    why_this_is_important: |
      Recunoașterea efectului falsului consens te ajută să te pregătești pentru dezacorduri reale,
      să efectuezi cercetări mai bune și să comunici mai eficient. Este esențial pentru
      dezvoltarea de produse, negociere și leadership.
    when_to_use:
      - luarea_deciziilor
      - negociere
      - leadership
      - rezolvarea_problemelor
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Ești sincer șocat când cineva nu este de acord cu ceea ce consideri evident.
      assuming_shared_values: |
        Acționezi ca și cum alții îți împărtășesc prioritățile fără să verifici.
      underestimating_opposition: |
        Te aștepți ca propunerile să întâmpine mai puțină rezistență decât o fac.
      echo_chamber_detection: |
        Mediul tău social și informațional rareori îți contestă opiniile.
    examples:
      product_development: |
        O echipă presupune că utilizatorii doresc funcționalitatea X deoarece toată lumea din
        echipă și-o dorește — doar pentru a constata o adopție scăzută.
      politics: |
        Oamenii dintr-o bulă politică sunt surprinși de rezultatele alegerilor care nu corespund
        așteptărilor lor.
      negotiation: |
        Presupunerea că cealaltă parte va fi de acord cu termenii, deoarece aceștia li se par
        "rezonabili" ție.
      hiring: |
        Angajarea pentru "potrivire culturală" poate însemna angajarea de persoane care sunt
        de acord cu tine, întărind falsul consens.
    real_world_implications: |
      Efectul falsului consens contribuie la polarizare, lansări de produse eșuate și negocieri
      eșuate. Ne face prea încrezători în predicțiile noastre și subpregătiți pentru dezacord.
    professional_application:
      networking_and_relationship_building: |
        Caută în mod activ persoane cu perspective diferite. Nu presupune credințe comune —
        întreabă și ascultă.
      collaborative_learning_initiative: |
        În echipe, folosește dezacordul structurat (de exemplu, "premortem", avocat al diavolului)
        pentru a scoate la iveală dezacorduri înainte ca acestea să devină costisitoare.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Presupunerea că cei care nu sunt de acord sunt nerezonabili sau neinformați, în loc să
        se ia în considerare că ar putea avea perspective diferite, valide.
      poor_research: |
        Omiterea cercetării clienților, deoarece "știm deja ce vor".
      overconfidence: |
        Realizarea de pariuri îndrăznețe pe baza presupunerii că alții vor fi de acord.
      groupthink_amplification: |
        Echipele care nu contestă efectul falsului consens se pot transforma în groupthink.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Efectul de încadrare
    quick_introduction: |
      Efectul de încadrare este tendința deciziilor noastre de a se schimba în funcție de modul în care sunt prezentate opțiunile — chiar și atunci când faptele subiacente sunt identice. „90% supraviețuire” și „10% mortalitate” descriu același rezultat, dar generează alegeri diferite. Încadrarea modelează decizia.
    one_liner: Aceleași fapte, încadrate diferit, duc la decizii diferite.
    try_this:
      - Reîncadrați opțiunile în mai multe moduri înainte de a decide — încadrare de câștig și încadrare de pierdere.
      - Observați când alegerea dvs. se schimbă în funcție de modul în care este formulată ceva.
      - Întrebați: Care sunt faptele subiacente, dezbrăcate de încadrare?
    ask_yourself:
      - Aș decide altfel dacă aceasta ar fi încadrată ca un câștig față de o pierdere?
      - Reacționez la încadrare sau la rezultatul real?
    in_more_detail: |
      Kahneman și Tversky au arătat că oamenii sunt avari la risc atunci când opțiunile sunt încadrate ca și câștiguri și caută riscul atunci când sunt încadrate ca și pierderi — chiar și pentru aceleași rezultate. Încadrarea pozitivă („salvați 200 de vieți”) versus încadrarea negativă („400 vor muri”) schimbă preferințele. Încadrările de pierdere declanșează răspunsuri emoționale mai puternice decât încădrările de câștig echivalente.

      Efectul de încadrare afectează deciziile medicale, politicile, marketingul și negocierile. Este una dintre cele mai puternice și bine documentate distorsiuni.
      Conștientizarea ajută, dar este greu de depășit complet.
    why_this_is_important: |
      Recunoașterea efectului de încadrare vă ajută să luați decizii mai consecvente, să rezistați manipulării și să comunicați mai eficient. De asemenea, explică de ce aceeași ofertă poate fi acceptată sau respinsă în funcție de prezentare.
    when_to_use:
      - luare_decizii
      - negociere
      - conducere
      - evaluare_risc
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Același rezultat încadrat ca și câștig versus pierdere produce alegeri diferite.
      presentation_dependence: |
        Deciziile se schimbă atunci când doar încadrarea se modifică, nu și substanța.
      default_influence: |
        Modul în care sunt ordonate sau etichetate opțiunile afectează alegerile.
      emotional_trigger: |
        Anumite încadraări declanșează răspunsuri emoționale mai puternice.
    examples:
      medical: |
        „90% supraviețuire” versus „10% mortalitate” pentru aceeași procedură —
        oamenii aleg diferit în funcție de încadrare.
      sales: |
        „Economisiți 50 USD” versus „Nu pierdeți 50 USD” — încadraări echivalente, impact psihologic diferit.
      policy: |
        „Reducere de taxe” versus „cheltuieli guvernamentale” — aceeași politică, răspuns politic diferit.
      negotiation: |
        Prezentarea unei oferte ca „reducere” versus „evitarea unei suprataxe”
        modifică ratele de acceptare.
    real_world_implications: |
      Efectul de încadrare este exploatat în publicitate, politică și
      negociere. Afectează deciziile medicale și sprijinul politic.
      Reîncadrarea poate îmbunătăți deciziile și comunicarea. Conștientizarea
      ajută, dar nu elimină complet efectul.
    professional_application:
      networking_and_relationship_building: |
        Atunci când prezentați opțiuni, luați în considerare încadraări multiple. Testați cum
        încadrările diferite afectează recepția. Atunci când primiți informații,
        întrebați „Cum altfel ar putea fi încadrat acest lucru?”
      collaborative_learning_initiative: |
        În luarea deciziilor, reîncadrați explicit opțiunile pentru a verifica
        efectele de încadrare. „Dacă am încadra acest lucru ca o pierdere, am decide
        diferit?” Folosiți o încadrare consecventă pentru corectitudine.
    how_can_this_be_misapplied:
      manipulation: |
        Încadrarea deliberată pentru a direcționa oamenii către rezultate dorite
        fără știrea lor.
      false_equivalence: |
        Presupunerea că toate încadraările sunt la fel de valabile atunci când unele ascund
        informații importante.
      overcorrection: |
        Ignorarea completă a încadraării și presupunerea că nu contează —
        contează.
      spin: |
        Utilizarea încadraării pentru a induce în eroare, mai degrabă decât pentru a clarifica.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Eroarea Fundamentală de Atribuire
    quick_introduction: |
      Eroarea fundamentală de atribuire este tendința de a atribui comportamentul altora
      caracterului sau personalității lor, în timp ce propriul nostru comportament îl atribuim
      factorilor situaționali. Judecăm pe ceilalți după acțiunile lor și pe noi înșine după intențiile noastre.
    one_liner: Judecăm pe alții după acțiunile lor, pe noi înșine după intențiile noastre.
    try_this:
      - Când cineva te frustrează, întreabă-te: Ce factori situaționali ar putea explica acest lucru?
      - Aplică-le altora aceeași generozitate pe care ți-o aplici ție însuți.
      - Observă când atribui comportamentul altora caracterului, nu circumstanțelor.
    ask_yourself:
      - Mi-aș explica propriul comportament în același mod în care îi explic pe al lor?
      - Ce aș putea rata în legătură cu situația lor?
    in_more_detail: |
      Când cineva ne taie fața în trafic, ne gândim "ce nesimțit". Când tăiem fața altuia, ne gândim "a trebuit – eram în grabă". Ne explicăm propriile eșecuri prin circumstanțe ("traficul era groaznic") și eșecurile altora prin dispoziție ("sunt leneși"). Inversul se aplică succesului: ne credităm pe noi înșine, atribuim succesul altora norocului.

      Eroarea este "fundamentală" deoarece este omniprezentă și persistentă. Ea
      subminează empatia, alimentează conflictul și distorsionează evaluarea performanței.
    why_this_is_important: |
      Recunoașterea erorii fundamentale de atribuire îmbunătățește relațiile,
      reduce conflictul și duce la judecăți mai corecte. Încurajează luarea în considerare a
      contextului înainte de a concluziona că cineva "este" într-un anumit fel.
    when_to_use:
      - construirea_relatiilor
      - rezolvarea_conflictelor
      - leadership
      - luarea_deciziilor
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "Pur și simplu este din fire așa" atunci când explici comportamentul altora.
      situational_explanation_for_self: |
        "Nu am avut de ales" sau "Circumstanțele m-au forțat" atunci când explici propriul comportament.
      character_vs_context: |
        Presupunerea unui caracter atunci când situația ar putea explica comportamentul.
      asymmetric_standards: |
        Aplicarea unor standarde mai stricte altora decât nouă înșine.
    examples:
      traffic: |
        Greșeala altui șofer = "șofer prost". Greșeala noastră = "situație inevitabilă".
      workplace: |
        Termenul limită ratat de un coleg = "iresponsabil". Termenul nostru limită ratat =
        "supraîncărcat și nimeni nu ar fi putut face mai bine".
      politics: |
        Vederile opozanților = "sunt proști sau răi". Vederile noastre = "răspuns rațional
        la fapte".
      performance: |
        Succesul altora = "norocos". Succesul nostru = "câștigat prin muncă grea".
    real_world_implications: |
      Eroarea fundamentală de atribuire alimentează conflictul, subminează munca în echipă și
      distorsionează angajarea și evaluarea performanței. Corectarea ei îmbunătățește
      cultura organizațională și relațiile personale.
    professional_application:
      networking_and_relationship_building: |
        Când cineva te dezamăgește, întreabă "Ce factori situaționali ar putea explica
        acest lucru?" înainte de a concluziona că este nesigur sau dificil.
      collaborative_learning_initiative: |
        În feedback și recenzii, încurajează interpretările "situația mai întâi".
        Antrenează managerii să ia în considerare contextul înainte de a atribui caracterului.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Respingerea oricărei acțiuni ca fiind "situațională" atunci când un comportament reflectă într-adevăr
        caracterul.
      no_accountability: |
        Folosirea erorii pentru a evita a trage oamenii la răspundere pentru alegerile pe care le-au făcut.
      self_deprecation: |
        Supracorectarea pentru a te învinovăți mereu pe tine și a nu recunoaște niciodată responsabilitatea altora.
      ignoring_patterns: |
        Atunci când cineva se comportă în mod repetat greșit în diverse situații, dispoziția poate
        fi relevantă.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Eroarea jucătorului
    quick_introduction: |
      Eroarea jucătorului este credința greșită că evenimentele independente trecute
      afectează evenimentele viitoare. După o serie de "capete", credem că "este rândul" lui "pajură"—chiar
      și atunci când fiecare aruncare este independentă. Vedem tipare în aleatoriu și
      așteptăm o "corecție" sau "reversiune" atunci când nu este necesară.
    one_liner: Evenimentele independente trecute nu afectează evenimentele viitoare—moneda nu are memorie.
    try_this:
      - Când te gândești "Îmi vine rândul la o victorie", întreabă-te: sunt aceste evenimente cu adevărat independente?
      - Distinge regresia spre medie (reală) de eroarea jucătorului (falsă).
      - Observă când vezi tipare în aleatoriu.
    ask_yourself:
      - Presupun că rezultatele anterioare afectează pe cele viitoare atunci când sunt independente?
      - Ar fi un statistician de acord cu raționamentul meu "este rândul unei schimbări"?
    in_more_detail: |
      Într-o aruncare corectă a monedei, fiecare aruncare este independentă. Probabilitatea de "cap"
      este întotdeauna de 50%, indiferent de rezultatele anterioare. Dar simțim că o serie lungă
      dintr-un rezultat face ca celălalt să fie mai probabil. Confundăm legea numerelor mari
      (peste multe încercări, rezultatele se mediază) cu "corecția" pe termen scurt. Cazinoul nu are memorie.

      Eroarea afectează jocurile de noroc, investițiile și deciziile cotidiene.
      Presupunem că "norocul" se va echilibra sau că ne "vine rândul" la o victorie.
      Uneori avem dreptate—dar din motive greșite.
    why_this_is_important: |
      Recunoașterea erorii jucătorului previne greșeli costisitoare în jocurile de noroc
      și investiții. De asemenea, te ajută să eviți suprainterpretarea seriilor scurte
      și așteptarea unei reversiuni false. Distinge regresia autentică
      spre medie de eroare.
    when_to_use:
      - luarea_deciziilor
      - investiții
      - evaluarea_riscului
      - rezolvarea_problemelor
    how_can_you_spot_it:
      due_for_a_change: |
        "Am avut atâtea pierderi—ne vine rândul la o victorie."
      pattern_in_randomness: |
        Observarea unor tipare semnificative în secvențe aleatorii.
      hot_hand_fallacy: |
        Credința că o serie va continua (eroare înrudită, dar opusă).
      independence_ignorance: |
        Tratarea evenimentelor independente ca și cum ar fi conectate.
    examples:
      gambling: |
        După mai multe roșii la ruletă, parierea pe negru deoarece "roșu nu poate continua să apară".
      investing: |
        "Piața a fost în scădere—trebuie să crească."
      hiring: |
        "Am angajat mai mulți candidați slabi—următorul va fi sigur bun."
      sports: |
        "A ratat atât de multe—îi vine rândul să facă următorul șut."
    real_world_implications: |
      Eroarea jucătorului provoacă pierderi la jocurile de noroc și decizii de investiții proaste.
      Explică, de asemenea, de ce suprainterpretăm tiparele pe termen scurt.
      Distincția față de regresia autentică spre medie (unde există o medie reală spre care se regresează) este importantă.
    professional_application:
      networking_and_relationship_building: |
        Nu presupune că dinamica trecută a relațiilor se va "corecta" în viitor—fiecare interacțiune este oarecum independentă. Dar învață din
        tipare atunci când există o cauză reală subiacentă.
      collaborative_learning_initiative: |
        La evaluarea performanței, distinge variația aleatorie de
        schimbarea sistematică. Serile scurte pot fi zgomot; nu reacționa exagerat la
        "serii" sau nu aștepta o reversiune falsă.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Uneori, regresia spre medie este reală (de exemplu, performanța bazată pe abilități).
        Nu respinge toată reversiunea ca fiind eroarea jucătorului.
      false_independence: |
        Presupunerea că evenimentele sunt independente atunci când nu sunt (de exemplu, măsurători repetate
        ale aceluiași lucru).
      overcorrection: |
        Niciodată să nu te aștepți la o reversiune atunci când există o medie reală spre care să se regreseze.
      dismissing_patterns: |
        Unele tipare sunt reale—nu întreaga secvență este aleatorie.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Gândire de grup
    quick_introduction: |
      Gândirea de grup este tendința grupurilor coezive de a prioritiza consensul și
      armonia în detrimentul evaluării critice. Membrii reprimă dezacordul, se auto-cenzurează și
      se conformează viziunii percepute a grupului. Dorința de unanimitate înlocuiește
      dorința celei mai bune decizii.
    one_liner: Armonie în locul adevărului—grupurile prioritizează consensul în detrimentul evaluării critice.
    try_this:
      - Desemnați un avocat al diavolului; faceți dezacordul așteptat și sigur.
      - Întrebați: Ce nu spunem? Ce am spune dacă nu am fi în acest grup?
      - Căutați perspective externe înainte de a finaliza deciziile grupului.
    ask_yourself:
      - Mă auto-cenzurez pentru a menține armonia?
      - Consensul nostru este autentic sau rezultatul presiunii de a fi de acord?
    in_more_detail: |
      Irving Janis a studiat eșecurile în politica externă (Invasion Bay of Pigs, Vietnam) și
      a identificat modele: iluzia invulnerabilității, raționalizarea colectivă,
      presiunea spre conformitate, auto-cenzura, iluzia unanimității și gardienii minții care protejează grupul de informații dezaprobatoare. Coeziunea înaltă, izolarea și stresul cresc gândirea de grup.

      Gândirea de grup duce la decizii proaste deoarece alternativele nu sunt
      serios luate în considerare. Dezacordul este văzut ca lipsă de loialitate. Grupul
      își supraestimează corectitudinea și își subestimează riscurile.
    why_this_is_important: |
      Recunoașterea gândirii de grup vă ajută să creați condiții pentru o mai bună
      luare a deciziilor: încurajați dezacordul, aduceți perspective externe și
      evitați consensul prematur. Este esențială pentru a evita
      eșecurile catastrofale ale grupului.
    when_to_use:
      - leadership
      - luare-de-decizii
      - rezolvare-de-probleme
      - rezolvarea-conflictelor
    how_can_you_spot_it:
      pressure_for_consensus: |
        Dezacordul este descurajat sau pedepsit; acordul este recompensat.
      illusion_of_unanimity: |
        Tăcerea este interpretată ca acord atunci când ar putea fi auto-cenzură.
      collective_rationalization: |
        Grupul respinge avertismentele și își întărește viziunea.
      mindguards: |
        Membrii protejează grupul de informațiile care ar contesta
        consensul.
    examples:
      bay_of_pigs: |
        Consilierii lui Kennedy au reprimat îndoielile cu privire la planul de invazie;
        rezultatul a fost un dezastru.
      corporate_decisions: |
        O echipă de conducere continuă cu o fuziune, în ciuda semnalelor de alarmă,
        deoarece nimeni nu vrea să fie cel care se opune.
      product_launches: |
        O echipă lansează un produs defect, deoarece toată lumea este investită
        în plan și nimeni nu ridică probleme.
      boards: |
        Membrii consiliului de administrație aprobă propunerile conducerii pentru a menține
        armonia.
    real_world_implications: |
      Gândirea de grup contribuie la eșecuri politice, dezastre corporative și
      oportunități ratate. Este deosebit de periculoasă în situații cu miză mare și stres ridicat. Prevenirea sa necesită intervenții
      structurale deliberate.
    professional_application:
      networking_and_relationship_building: |
        Creați siguranță psihologică pentru dezacord. Mulțumiți oamenilor care
        ridică probleme. Modelați dezacordul fără a fi neplăcut.
      collaborative_learning_initiative: |
        Folosiți avocatul diavolului, echipe roșii și "premortemuri". Cereți
        ca cineva să argumenteze împotriva viziunii dominante. Aduceți
        perspective externe. Liderul vorbește ultimul pentru a evita ancorarea.
    how_can_this_be_misapplied:
      false_dissent: |
        Crearea de "dezaprobatori desemnați" care nu dezaprobă cu adevărat—
        grupul își dă seama.
      excessive_conflict: |
        Încurajarea dezacordului până la punctul de conflict distructiv
        și paralizie.
      dismissing_consensus: |
        Presupunerea că tot consensul este gândire de grup—uneori grupul
        are dreptate.
      individualism: |
        Supracorecție până la punctul în care nicio decizie colectivă
        nu este posibilă.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Efectul de Aură
    quick_introduction: |
      Efectul de aură este tendința de a lăsa o trăsătură sau o impresie pozitivă
      să ne influențeze judecata generală despre o persoană. Dacă ne place
      aspectul cuiva, putem presupune că este competent. Dacă admirăm o abilitate,
      presupunem că este bun la toate. O trăsătură pozitivă aruncă o
      "aură" asupra restului.
    one_liner: O trăsătură pozitivă aruncă o aură asupra întregii noastre judecăți despre o persoană.
    try_this:
      - Evaluează trăsăturile independent – nu lăsa ca o singură forță să implice altele.
      - Observă când atractivitatea, carisma sau un succes colorează perspectiva ta.
      - Întreabă: Aș judeca această persoană la fel fără acea singură trăsătură pozitivă?
    ask_yourself:
      - Generalizez de la o trăsătură la întreaga persoană?
      - Aș vedea slăbiciuni dacă nu aș fi impresionat de o singură forță?
    in_more_detail: |
      Edward Thorndike a observat că ofițerii militari care calificau soldații
      înalt la o trăsătură tindeau să-i califice înalt și la altele – chiar și la
      trăsături nelegate. Generalizăm de la particular la întreg. Atractivitatea,
      carisma sau succesul într-un domeniu creează o aură care se extinde.

      Inversul – o trăsătură negativă care colorează totul – este uneori numit
      "efectul coarnelor". Ambele sunt forme de generalizare nejustificată. Efectul
      de aură afectează angajările, evaluările performanței și impresiile cotidiene.
    why_this_is_important: |
      Recunoașterea efectului de aură te ajută să faci evaluări mai precise și să
      eviți supra-generalizarea. Este esențial pentru angajări corecte, managementul
      performanței și evaluarea relațiilor. O singură forță nu implică toate forțele.
    when_to_use:
      - luare_decizii
      - leadership
      - construirea_relatiilor
      - angajare
    how_can_you_spot_it:
      trait_spillover: |
        O singură trăsătură pozitivă influențează judecata asupra trăsăturilor nelegate.
      attractiveness_bias: |
        Persoanele atractive sunt evaluate mai înalt la competență, încredere etc.
      success_generalization: |
        Succesul într-un domeniu duce la presupunerea competenței în altele.
      first_impression_dominance: |
        O primă impresie pozitivă timpurie colorează toată evaluarea ulterioară.
    examples:
      hiring: |
        Un candidat care este elocvent și agreabil este presupus a fi
        tehnic puternic – chiar și atunci când abilitățile sunt nelegate.
      performance_reviews: |
        Un proiect remarcabil duce la evaluări înalte pe toate dimensiunile.
      politics: |
        Carisma unui politician duce la presupunerea competenței în materie de politici.
      branding: |
        Succesul unei companii la un produs duce la presupunerea calității
        tuturor produselor.
    real_world_implications: |
      Efectul de aură distorsionează angajările, evaluarea performanței și
      deciziile de investiții. Favorizează persoanele atractive, elocvente și
      deja-succes. Reducerea sa necesită evaluare structurată
      și separarea dimensiunilor.
    professional_application:
      networking_and_relationship_building: |
        Evaluează persoanele pe dimensiuni specifice, mai degrabă decât pe impresia generală. Fii conștient când o trăsătură pozitivă îți influențează judecata asupra altora. Caută dovezi de infirmare.
      collaborative_learning_initiative: |
        Folosește interviuri și evaluări structurate care califică dimensiunile
        independent. Calibrează evaluările între evaluatori. Reduce
        dependența de "intuiția generală".
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Nu orice impresie pozitivă este o aură – uneori oamenii sunt
        genuin puternici pe mai multe dimensiuni.
      false_objectivity: |
        Presupunerea că putem elimina complet efectul de aură – este
        omniprezent și parțial automat.
      overcorrection: |
        A merge la extremul opus și a presupune că persoanele atractive sau
        carismatice sunt mai puțin competente.
      stereotyping: |
        Folosirea "efectului de aură" pentru a respinge atribute pozitive legitime.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Bărbierul lui Hanlon
    quick_introduction: |
      Bărbierul lui Hanlon afirmă: „Niciodată nu atribui răutății ceea ce poate fi explicat în mod adecvat prin prostie.” Cu alte cuvinte, nu presupune intenții rele atunci când incompetența, omisiunea sau ignoranța ar putea explica comportamentul.
    one_liner: Nu presupune răutate atunci când incompetența sau omisiunea o pot explica.
    try_this:
      - Când cineva te frustrează, întreabă-te: Ar putea acest lucru să fie explicat prin greșeală sau ignoranță?
      - Optează pentru explicația mai simplă înainte de a presupune intenție rea.
      - Observă momentele în care sari la concluzia „m-a vrut să mă rănească”.
    ask_yourself:
      - Atribui răutății ceea ce ar putea fi explicat prin prostie?
      - Aș vrea același beneficiu al îndoielii în locul lor?
    in_more_detail: |
      Principiul încurajează acordarea beneficiului îndoielii. Atunci când acțiunile cuiva te rănesc sau te frustrează, presupunerea implicită este adesea că au intenționat să te rănească. Bărbierul lui Hanlon sugerează că multe astfel de acțiuni provin din neglijență, lipsă de informații sau execuție slabă – nu din rea-voință.

      Aceasta nu înseamnă că răutatea nu există niciodată. Înseamnă că nu ar trebui să sărim la cea mai proastă interpretare atunci când una mai simplă se potrivește. Bărbierul reduce paranoia, îmbunătățește relațiile și ne ajută să răspundem mai constructiv la probleme.
    why_this_is_important: |
      Aplicarea Bărbierului lui Hanlon reduce conflictele, păstrează relațiile și concentrează energia pe rezolvarea problemelor, în loc de a atribui vina. De asemenea, te protejează de stresul de a presupune că toată lumea îți vrea răul.
    when_to_use:
      - rezolvarea_conflictelor
      - leadership
      - construirea_relatiilor
      - luarea_deciziilor
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Interpretezi imediat un rezultat negativ ca pe un prejudiciu intenționat.
      personalizing_mistakes: |
        Când ceva merge prost, presupui că a fost îndreptat împotriva ta personal.
      ignoring_alternative_explanations: |
        Nu iei în considerare incompetența, neînțelegerea sau omisiunea ca posibilități.
      escalation_before_inquiry: |
        Răspunzi cu furie sau retalieri înainte de a întreba ce s-a întâmplat.
    examples:
      email_tone: |
        Presupui că un e-mail sec este un atac pasiv-agresiv, când expeditorul ar putea fi pur și simplu grăbit sau slab la ton.
      missed_deadline: |
        Interpretezi livrarea cu întârziere a unui coleg ca pe un sabotaj, când acesta ar fi putut să se supra-angajeze sau să întâmpine obstacole.
      policy_decisions: |
        Presupui că o politică a companiei care nu îți place a fost concepută pentru a dăuna angajaților, când ar putea fi o încercare stângace de a aborda o altă problemă.
      traffic: |
        Presupui că un alt șofer te-a tăiat intenționat, când este posibil să nu te fi văzut.
    real_world_implications: |
      Bărbierul lui Hanlon îmbunătățește cultura la locul de muncă, reduce litigiile și face rezolvarea conflictelor mai eficientă. Suprautilizarea poate permite neglijența; subutilizarea creează conflicte inutile.
    professional_application:
      networking_and_relationship_building: |
        Când cineva te dezamăgește, cere clarificări înainte de a presupune intenție rea. Păstrează relațiile optând pentru interpretări caritabile.
      collaborative_learning_initiative: |
        În echipe, creează o cultură în care greșelile sunt presupuse ca fiind neintenționate până la proba contrarie. Concentrează-te pe sisteme și procese, nu pe vină.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Respingi incompetența sau neglijența repetată ca „nefiind răutate” atunci când necesită responsabilitate.
      ignoring_genuine_malice: |
        Aplici bărbierul atât de rigid încât ratezi actori răi reali sau comportamente toxice.
      avoiding_difficult_conversations: |
        Folosești Bărbierul lui Hanlon ca scuză pentru a nu aborda problemele de performanță.
      gaslighting_victims: |
        Spui cuiva care a fost cu adevărat nedreptățit că „presupune răutate” atunci când răutatea a fost prezentă.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: harta_nu_este_teritoriu
    name: Harta nu este teritoriul
    quick_introduction: |
      „Harta nu este teritoriul” înseamnă că o reprezentare a realității nu este realitatea
      în sine. Modelele, teoriile și descrierile sunt simplificări utile, dar ele
      omită întotdeauna ceva. Confundarea hărții cu teritoriul duce la erori.
    one_liner: Harta nu este teritoriul – toate modelele sunt greșite; unele sunt utile.
    try_this:
      - Când un model nu se potrivește cu realitatea, actualizează harta – nu forța realitatea să se potrivească.
      - Întreabă: Ce omite acest model? Când ar putea eșua?
      - Tratează modelele ca instrumente, nu ca adevăruri.
    ask_yourself:
      - Îmi confund modelul cu realitatea?
      - S-a schimbat teritoriul de când m-am uitat ultima dată?
    in_more_detail: |
      Alfred Korzybski a introdus această idee în semantica generală. O hartă a unui oraș este
      utilă pentru navigație, dar nu este orașul – omite detalii, devine învechită și
      nu poate surprinde niciodată totul. Același lucru se aplică modelelor mentale, teoriilor științifice
      și organigramelor.

      Toate modelele sunt greșite; unele sunt utile. Pericolul este să tratezi un model ca și cum ar fi
      adevărul complet, mai ales când teritoriul s-a schimbat. Gândirea bună
      necesită actualizarea hărților atunci când realitatea nu se potrivește.
    why_this_is_important: |
      Recunoașterea faptului că hărțile diferă de teritoriu previne supraîncrederea în modele,
      încurajează actualizarea convingerilor și reduce riscul de a acționa pe baza unor informații învechite sau
      simplificate excesiv.
    when_to_use:
      - luarea_deciziilor
      - rezolvarea_problemelor
      - învățare
      - evaluarea_riscurilor
    how_can_you_spot_it:
      model_reality_confusion: |
        Tratarea unui cadru sau a unei teorii ca și cum ar descrie complet realitatea.
      outdated_assumptions: |
        Acționarea pe baza unor informații sau modele care nu se mai potrivesc cu condițiile actuale.
      oversimplification: |
        Ignorarea nuanțelor deoarece „harta” nu le include.
      map_worship: |
        Apărarea unui model atunci când dovezi contradictorii apar, în loc să fie actualizat.
    examples:
      organizational_charts: |
        Presupunerea că structura ierarhică reflectă modul în care se desfășoară efectiv munca.
      financial_models: |
        Tratarea unei proiecții dintr-un spreadsheet ca o predicție, nu ca un scenariu.
      stereotypes: |
        Aplicarea generalizărilor la nivel de grup la indivizi.
      strategy_docs: |
        Executarea unui plan așa cum este scris, atunci când piața s-a schimbat.
    real_world_implications: |
      Distincția hartă-teritoriu este fundamentală pentru știință, inginerie și
      filosofie. Stă la baza actualizării bayesiene, a metodologiei agile și a umilinței epistemice. Ignorarea ei
      duce la gândire rigidă și strategii eșuate.
    professional_application:
      networking_and_relationship_building: |
        Modelul tău mental al unei persoane poate fi învechit. Actualizează-l prin interacțiune directă
        în loc să te bazezi pe impresii vechi.
      collaborative_learning_initiative: |
        Încurajează echipele să trateze planurile și modelele ca ipoteze care urmează să fie testate și
        revizuite, nu ca adevăruri fixe.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Concluzia că nicio hartă nu este utilă și tot cunoașterea este suspectă.
      constant_revision: |
        Actualizări atât de frecvente încât nu apare nicio înțelegere stabilă.
      dismissing_models: |
        Respingerea simplificărilor utile deoarece „nu sunt teritoriul”.
      relativism: |
        Afirmarea că toate hărțile sunt la fel de valabile, atunci când unele se potrivesc clar mai bine teritoriului.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hawthorne_effect
    name: Efectul Hawthorne
    quick_introduction: |
      Efectul Hawthorne este tendința oamenilor de a-și modifica comportamentul
      atunci când știu că sunt observați sau studiați. Actul observației
      în sine poate produce schimbarea — nu neapărat intervenția testată.
      Oamenii răspund atenției pe care o primesc.
    one_liner: Observarea schimbă comportamentul — atenția în sine poate produce efectul.
    try_this:
      - Când evaluați o intervenție, luați în considerare dacă observația conduce rezultatele.
      - Recunoașteți că atenția și sentimentul de a fi apreciat pot îmbunătăți performanța.
      - Fiți precaut în a atribui schimbarea unei intervenții specifice atunci când observația a schimbat-o.
    ask_yourself:
      - Este această îmbunătățire cauzată de intervenție sau de faptul că sunt observați?
      - Ar persista rezultatele dacă am înceta să mai fim atenți?
    in_more_detail: |
      La uzina Hawthorne Works, cercetătorii au descoperit că productivitatea
      a crescut atunci când au schimbat iluminatul — și, de asemenea, atunci când l-au
      adus înapoi la starea inițială.
      Îmbunătățirea părea să provină din atenția și observația acordată, nu din
      intervenția specifică. O reanaliză ulterioară a sugerat că efectul ar fi putut
      fi exagerat, dar conceptul rămâne util: a fi studiat
      schimbă comportamentul.

      Efectul Hawthorne complică cercetarea și evaluarea. Poate
      infla impactul aparent al intervențiilor. Sugerează, de asemenea, că
      atenția și sentimentul de a fi apreciat pot îmbunătăți performanța — o lecție pentru
      management.
    why_this_is_important: |
      Înțelegerea efectului Hawthorne vă ajută să interpretați rezultatele cercetării,
      să proiectați experimente mai bune și să recunoașteți că atenția
      în sine poate genera schimbare. În management, sugerează că acordarea
      de atenție oamenilor poate conta la fel de mult ca și intervenția specifică.
    when_to_use:
      - conducere
      - luare-de-decizii
      - invatare
      - rezolvare-de-probleme
    how_can_you_spot_it:
      observation_induced_change: |
        Comportamentul se schimbă atunci când oamenii știu că sunt priviți sau studiați.
      attention_effect: |
        Actul de a acorda atenție produce îmbunătățiri, nu doar schimbarea
        specifică.
      placebo_analog: |
        Similar unui placebo, "tratamentul" de a fi studiat poate avea efecte.
      short_term_improvement: |
        Îmbunătățirile se pot estompa atunci când observația se încheie.
    examples:
      workplace_studies: |
        Productivitatea crește în timpul unui studiu — este noul proces sau
        faptul că cineva privește?
      medical_trials: |
        Grupurile placebo se îmbunătățesc — parțial deoarece primesc atenție.
      education: |
        Elevii performează mai bine atunci când cercetătorii sunt prezenți —
        "efectul observatorului".
      management: |
        Echipele se îmbunătățesc atunci când managementul acordă atenție — este noua
        inițiativă sau atenția în sine?
    real_world_implications: |
      Efectul Hawthorne afectează validitatea cercetării și evaluarea programelor.
      Poate duce la supraestimarea efectelor intervențiilor.
      Are și o lecție pozitivă: atenția și sentimentul de a fi studiat
      pot motiva îmbunătățirea — așa că grija și vizibilitatea contează.
    professional_application:
      networking_and_relationship_building: |
        Acordarea atenției oamenilor le poate îmbunătăți performanța —
        efectul Hawthorne sugerează că sentimentul de a fi observat și
        apreciat contează. Folosiți acest lucru în mod pozitiv: verificări regulate,
        vizibilitate și recunoaștere.
      collaborative_learning_initiative: |
        Când evaluați intervențiile, folosiți grupuri de control și
        luați în considerare dacă îmbunătățirile se datorează intervenției
        sau atenției pe care o aduce. Efectul Hawthorne poate
        infla succesul aparent.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Utilizarea "efectului Hawthorne" pentru a justifica monitorizarea constantă —
        observația poate, de asemenea, reduce încrederea și motivația intrinsecă.
      dismissing_improvements: |
        Presupunerea că toată îmbunătățirea în timpul studiilor este Hawthorne —
        uneori intervențiile chiar funcționează.
      overgeneralization: |
        Studiile originale Hawthorne au fost puse sub semnul întrebării;
        efectul poate fi mai mic sau diferit decât s-a crezut inițial.
      manipulation: |
        Crearea unei "observații" false pentru a manipula comportamentul.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Biasul retrospectiv
    quick_introduction: |
      Biasul retrospectiv (sau efectul „știam eu asta de dinainte”) este tendința de a crede,
      după ce un eveniment a avut loc, că am fi putut să-l prezicem sau să-l anticipăm.
      Reconstruim trecutul pentru a face ca rezultatele să pară mai inevitabile decât au fost.
    one_liner: După fapt, credem că știam totul de dinainte.
    try_this:
      - Înainte de a judeca decizii trecute, întreabă-te: Ce știau la momentul respectiv?
      - Înregistrează-ți predicțiile înainte de rezultate – compară mai târziu.
      - Observă când faci ca trecutul să pară mai inevitabil decât a fost.
    ask_yourself:
      - Judec cu informații care nu erau disponibile atunci?
      - Chiar am prezis asta, sau acum doar mi se pare evident?
    in_more_detail: |
      Odată ce cunoaștem rezultatul, acesta ni se pare evident. Uitmăm incertitudinea pe care am simțit-o
      înainte. Acest bias distorsionează învățarea – credem că „știam” ceva când de fapt nu, așa că nu ne
      actualizăm modelele. Duce, de asemenea, la acuzații nedrepte: „Ar fi trebuit să prevadă asta” când viitorul a fost
      cu adevărat incert.

      Biasul retrospectiv afectează analizele post-mortem, judecățile legale și analizele istorice.
      Judecăm deciziile trecute cu informații care nu erau disponibile la momentul respectiv.
    why_this_is_important: |
      Recunoașterea biasului retrospectiv îmbunătățește învățarea din rezultate, evaluarea mai corectă a deciziilor
      și evaluarea mai precisă a riscurilor. Previne falsa încredere în capacitățile noastre predictive.
    when_to_use:
      - luare_decizii
      - invatare
      - evaluare_riscuri
      - leadership
    how_can_you_spot_it:
      inevitability_feeling: |
        După un eveniment, pare că acesta „trebuia” să se întâmple.
      reconstructed_certainty: |
        Ne amintim că am fost mai siguri înainte de eveniment decât am fost de fapt.
      blame_for_failure: |
        „Ar fi trebuit să știe” când rezultatul a fost cu adevărat incert.
      undervaluing_luck: |
        Atribuirea rezultatelor abilității sau previziunii, când norocul a jucat un rol.
    examples:
      investing: |
        „Știam că piața va prăbuși” după ce se prăbușește – când nu ai acționat pe baza acelei
        „cunoștințe” înainte.
      project_failures: |
        „Ar fi trebuit să vedem riscurile” într-o analiză post-mortem, când riscurile erau cu adevărat
        ambigue.
      elections: |
        După un rezultat surprinzător, experții explică de ce a fost „evident” în retrospectivă.
      medical: |
        „Semnele erau acolo” când se diagnostichează o afecțiune rară după fapt.
    real_world_implications: |
      Biasul retrospectiv distorsionează răspunderea legală, evaluarea performanței și învățarea.
      Ne face prea încrezători în judecata noastră și nedrepți față de cei care au luat
      decizii rezonabile cu informații limitate.
    professional_application:
      networking_and_relationship_building: |
        Când evaluați deciziile trecute ale altora, separați conștient ceea ce se știa
        atunci de ceea ce știți acum. Evitați „Ți-am zis eu” când, de fapt, nu ați prezis
        rezultatul.
      collaborative_learning_initiative: |
        În analizele post-mortem, folosiți tehnici de „pre-mortem” sau „jurnal de decizii” pentru a
        surprinde incertitudinea la momentul deciziei. Comparați incertitudinea reală
        cu reconstrucția retrospectivă.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Respingerea fiecărui eșec ca fiind „imprevizibil”, când unele au fost previzibile.
      no_accountability: |
        Utilizarea biasului retrospectiv pentru a evita tragerea la răspundere a persoanelor pentru neglijență.
      false_uncertainty: |
        Supra-corectarea pentru a crede că nu putem prezice nimic.
      undermining_learning: |
        Refuzul de a extrage lecții deoarece „retrospectiva este 20/20” – putem totuși învăța
        din rezultate.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Hyperbolic Discounting
    quick_introduction: |
      Hyperbolic discounting is the tendency to prefer smaller, sooner rewards
      over larger, later ones—and to discount the future more steeply than
      rational models predict. We overweight the present and underweight the
      future in inconsistent ways.
    one_liner: We prefer smaller sooner over larger later—and discount the future inconsistently.
    try_this:
      - Pre-commit: make choices for your future self when you're in a calm state.
      - 'Reframe: "Would I want this in 10 minutes? In 10 months?" to reveal inconsistency.'
      - Use commitment devices to bind your future self to better choices.
    ask_yourself:
      - Am I overweighting the present at the expense of my future self?
      - Would I make this choice if the reward were delayed by a day? A year?
    in_more_detail: |
      We might prefer $50 today over $100 in a year, but also prefer $100 in
      two years over $50 in one year—even though that's inconsistent. Our
      discount rate isn't constant; it's hyperbolic. The near future is
      heavily discounted; the far future is discounted less steeply. This
      explains procrastination, addiction, and undersaving.

      Present bias is a related concept: we give the present moment
      disproportionate weight. Hyperbolic discounting explains why we
      make commitments we don't keep and why long-term planning is hard.
    why_this_is_important: |
      Understanding hyperbolic discounting helps you design better
      incentives, commit your future self, and avoid short-term traps.
      It explains why we procrastinate and why we struggle with
      long-term goals.
    when_to_use:
      - decision-making
      - career_moves
      - investing
      - leadership
    how_can_you_spot_it:
      present_preference: |
        Choosing immediate gratification over delayed, larger rewards.
      inconsistent_time_preferences: |
        Preferences that reverse as time passes (e.g., we want to diet
        tomorrow but eat today).
      commitment_failures: |
        Making plans we don't follow when the future becomes the present.
      procrastination: |
        Delaying important tasks in favor of immediate comfort.
    examples:
      savings: |
        Choosing to spend now rather than save for retirement—the future
        feels abstract.
      health: |
        Skipping exercise today for comfort, despite knowing we'll regret
        it—tomorrow's regret is discounted.
      addiction: |
        Choosing the immediate high over long-term health.
      deadlines: |
        Doing nothing until the deadline looms—then the "present" includes
        the deadline and we act.
    real_world_implications: |
      Hyperbolic discounting affects savings, health, education, and
      addiction. It explains many self-control failures. Commitment
      devices (e.g., automatic savings, accountability) can help by
      constraining future choices.
    professional_application:
      networking_and_relationship_building: |
        When asking for future commitments, create accountability that
        makes the future "present" (e.g., check-ins, deadlines). Don't
        assume people will follow through without structure.
      collaborative_learning_initiative: |
        Use commitment devices: public commitments, pre-commitment to
        deadlines, and structures that make long-term goals feel more
        immediate. Break long projects into shorter milestones.
    how_can_this_be_misapplied:
      excessive_control: |
        Over-constraining people's choices in the name of "helping"
        their future selves.
      paternalism: |
        Assuming we know what's best for others' long-term interests.
      ignoring_present_needs: |
        Dismissing legitimate present needs in favor of abstract
        future benefits.
      one_size_fits_all: |
        People differ in discount rates; not everyone needs the same
        commitment devices.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Iluzia controlului
    quick_introduction: |
      Iluzia controlului este tendința de a supraestima capacitatea noastră de a
      influența rezultatele. Credem că avem mai mult control decât avem—asupra
      evenimentelor aleatorii, asupra altor persoane și asupra sistemelor complexe.
      Confundăm corelația
      cu cauzalitatea și acțiunea cu impactul.
    one_liner: Supraestimăm capacitatea noastră de a influența rezultatele—în special pe cele aleatorii.
    try_this:
      - Întreabă-te: Ce s-ar întâmpla dacă nu aș face nimic? Acțiunea mea cauzează de fapt rezultatul?
      - Distinge ceea ce poți controla de ceea ce nu poți.
      - Observă când legi în mod superstițios acțiunile tale de rezultate aleatorii.
    ask_yourself:
      - Confund corelația cu cauzalitatea?
      - Ar fi diferit rezultatul dacă nu aș fi acționat?
    in_more_detail: |
      Oamenii se simt mai încrezători în câștigarea la loterie atunci când își aleg
      propriile numere—chiar dacă acest lucru nu le schimbă șansele. Aruncăm zarurile
      mai tare când vrem numere mari. Credem că ritualurile sau comportamentele noastre
      influențează rezultatele care sunt, de fapt, aleatorii sau determinate de factori
      din afara controlului nostru. Iluzia este reconfortantă; reduce anxietatea. Dar
      poate duce la supraîncredere și decizii proaste.

      Iluzia este mai puternică atunci când suntem implicați în proces, când
      avem succes timpuriu și când sarcina este familiară. Afectează
      investițiile, managementul și viața de zi cu zi.
    why_this_is_important: |
      Recunoașterea iluziei controlului te ajută să-ți calibrezi
      așteptările, să eviți supraîncrederea și să-ți concentrezi eforturile acolo unde contează
      cu adevărat. Explică, de asemenea, de ce persistăm în comportamente superstițioase
      și supraestimăm influența noastră.
    when_to_use:
      - luarea_deciziilor
      - evaluarea_riscurilor
      - investiții
      - leadership
    how_can_you_spot_it:
      overestimated_influence: |
        A crede că acțiunile noastre afectează rezultatele atunci când nu o fac.
      ritual_superstition: |
        Comportamente despre care credem că influențează rezultatele (cămașă norocoasă,
        rutină pre-meci) atunci când nu o fac.
      choice_illusion: |
        A simți că alegerea ne dă control atunci când alegerea
        nu afectează rezultatul.
      action_bias: |
        A prefera să "faci ceva" în loc să "aștepți" chiar și atunci când acțiunea
        nu ajută.
    examples:
      gambling: |
        Alegerea numerelor la loterie pare mai controlabilă decât
        selecția aleatorie—șansele sunt aceleași.
      investing: |
        Traderii activi își supraestimează capacitatea de a învinge
        piața; majoritatea au performanțe slabe după costuri.
      management: |
        Liderii își supraestimează impactul asupra rezultatelor organizaționale;
        mulți factori sunt în afara controlului lor.
      sports: |
        Fanii cred că aplauzele lor afectează jocul; jucătorii
        au ritualuri norocoase.
    real_world_implications: |
      Iluzia controlului afectează asumarea riscurilor, persistența
      în eforturi inutile și atribuirea rezultatelor. Poate
      motiva acțiunea (uneori utilă), dar poate duce și la
      eforturi irosite și supraîncredere. Calibrarea îmbunătățește
      calitatea deciziilor.
    professional_application:
      networking_and_relationship_building: |
        Recunoaște ce poți și ce nu poți controla. Concentrează-ți energia
        pe factorii influențabili. Nu-ți asuma meritul pentru
        rezultatele pe care nu le-ai cauzat—sau nu te învinovăți pentru cele pe care
        nu le-ai putut preveni.
      collaborative_learning_initiative: |
        În planificare, distinge factorii controlabili de cei necontrolabili.
        Evită falsa încredere din victoriile timpurii. Folosește
        gândirea probabilistică pentru a-ți calibra așteptările.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Supra-corectarea pentru a crede că nu avem niciun control atunci când
        avem o influență semnificativă.
      dismissing_agency: |
        "Totul este noroc" atunci când abilitatea și efortul contează în
        multe domenii.
      false_fatalism: |
        Folosirea iluziei controlului pentru a justifica inacțiunea.
      one_size_fits_all: |
        Controlul variază în funcție de domeniu; unele situații sunt mai
        controlabile decât altele.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Biasul impactului
    quick_introduction: |
      Biasul impactului este tendința de a supraestima intensitatea și durata
      reacțiilor noastre emoționale la evenimente viitoare. Credem că lucrurile bune
      ne vor face mai fericiți decât o fac, iar lucrurile rele ne vor face mai nefericiți decât o fac.
      Suntem slabi la prognozarea afectivă.
    one_liner: Supraestimăm cât de mult ne vor afecta evenimentele fericirea—și pentru cât timp.
    try_this:
      - Ask: Cum m-am simțit după evenimente similare din trecut? Ne adaptăm mai repede decât ne așteptăm.
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings. Nu lăsați impactul anticipat să vă conducă deciziile—suntem slabi la prognozarea sentimentelor.
      - Notice when you're overestimating the lasting effect of a single outcome. Observați când supraestimați efectul de durată al unui singur rezultat.
    ask_yourself:
      - Supraestimez cât timp mă voi simți așa?
      - Ce spun experiențele trecute despre evenimente similare?
    in_more_detail: |
      Daniel Gilbert și Timothy Wilson cercetează prognozarea afectivă:
      supraestimăm cât timp ne vom simți bine după o victorie sau prost după o pierdere.
      Ne adaptăm mai repede decât ne așteptăm. De asemenea, supraestimăm impactul
      evenimentelor unice—credem că un rezultat va defini fericirea noastră, când
      mulți factori contribuie. Ne concentrăm pe lucrurile greșite atunci când prezicem
      sentimentele noastre viitoare.

      Biasul impactului afectează deciziile majore din viață: supraestimăm cât de mult
      o promovare, o relație sau o achiziție ne va schimba fericirea. De asemenea,
      supraestimăm durerea de durată a pierderilor.
    why_this_is_important: |
      Recunoașterea biasului impactului vă ajută să luați decizii mai bune cu privire la ceea ce
      vă va îmbunătăți cu adevărat viața. Reduce supra-investiția în rezultate
      care nu vor conta atât de mult pe cât credeți, și reduce frica de rezultate
      care nu vor răni atât de mult pe cât vă așteptați.
    when_to_use:
      - luarea_deciziilor
      - mutari_de_cariera
      - evaluarea_riscurilor
      - construirea_relatiilor
    how_can_you_spot_it:
      overestimated_impact: |
        „Asta va schimba totul” când evenimentele similare din trecut au avut un impact modest de durată.
      duration_overestimation: |
        „Nu voi trece niciodată peste asta” când, de obicei, ne adaptăm mai repede decât ne așteptăm.
      focalism: |
        Concentrarea pe un singur eveniment și ignorarea altor factori care afectează bunăstarea.
      adaptation_neglect: |
        Uită că ne adaptăm atât la circumstanțele bune, cât și la cele rele.
    examples:
      career: |
        „Dacă obțin această promovare, voi fi mult mai fericit” când promovările anterioare au avut un impact temporar.
      purchases: |
        „Această mașină mă va face fericit” când noutatea dispare repede.
      loss: |
        „Nu voi recupera niciodată după această respingere” când, de obicei, ne adaptăm în câteva luni.
      events: |
        Supraestimarea cât de mult o nuntă, o vacanță sau un eveniment important va afecta fericirea pe termen lung.
    real_world_implications: |
      Biasul impactului duce la decizii proaste cu privire la bani, carieră și relații.
      Plătim prea mult pentru experiențe la care ne vom adapta și ne temem prea mult de pierderi de la care ne vom recupera.
      Afectează politicile și planificarea personală.
    professional_application:
      networking_and_relationship_building: |
        Când luați decizii de carieră sau de relație, luați în considerare cum v-ați simțit după evenimente similare din trecut.
        A durat impactul atât de mult pe cât vă așteptați? Folosiți acest lucru pentru a vă calibra predicțiile viitoare.
      collaborative_learning_initiative: |
        Când echipele se confruntă cu eșecuri sau succese, amintiți-le despre adaptare.
        „Ne vom adapta mai repede decât credem” poate reduce atât celebrarea excesivă, cât și disperarea excesivă.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Unele evenimente au un impact de durată—trauma, pierdere majoră. Nu respingeți toată prognozarea afectivă ca fiind biasată.
      cold_rationality: |
        „Nu va conta” când experiența din momentul respectiv contează.
      undervaluing_experiences: |
        Evitarea experiențelor pozitive pentru că „ne vom adapta oricum”.
      invalidating_emotions: |
        Să spunem oamenilor că sentimentele lor vor trece când au nevoie de sprijin în momentul respectiv.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Părtinirea față de grupul propriu
    quick_introduction: |
      Părtinirea față de grupul propriu este tendința de a favoriza persoanele pe care le percepem ca aparținând grupului nostru în detrimentul celor pe care îi percepem ca fiind din exterior. Atribuim calități pozitive membrilor grupului propriu și calități negative membrilor grupurilor externe, adesea pe baza unor distincții minime sau arbitrare.
    one_liner: Favorizăm grupul nostru și judecăm grupurile externe mai aspru—adesea în mod arbitrar.
    try_this:
      - Întreabă: Aș judeca această persoană la fel dacă ar fi din grupul meu?
      - Caută activ perspective din grupuri externe atunci când iei decizii.
      - Observă când granițele grupurilor îți influențează judecata.
    ask_yourself:
      - Favorizez pe cineva pentru că este „de-al nostru”?
      - Aș aplica aceleași standarde unui membru al grupului extern?
    in_more_detail: |
      Chiar și atunci când grupurile sunt alocate aleatoriu (de exemplu, prin tragere la sorți), oamenii dezvoltă rapid o preferință pentru grupul lor. Avem mai multă încredere în membrii grupului propriu, le alocăm resurse mai generos și le judecăm acțiunile mai îngăduitor. Membrii grupurilor externe primesc tratamentul invers.

      Părtinirea față de grupul propriu alimentează tribalismul, discriminarea și conflictul. Afectează angajarea, promovarea, colaborarea și politicile. Poate fi bazată pe rasă, naționalitate, companie, echipă sau orice identitate comună.
    why_this_is_important: |
      Recunoașterea părtinirii față de grupul propriu te ajută să iei decizii mai corecte, să construiești echipe mai incluzive și să eviți favoritismul. De asemenea, explică de ce inițiativele de diversitate întâmpină rezistență—preferința față de grupul propriu este automată.
    when_to_use:
      - leadership
      - luarea_deciziilor
      - construirea_relatiilor
      - rezolvarea_conflictelor
    how_can_you_spot_it:
      preferential_treatment: |
        Acordarea prezumției de nevinovăție „celor din noi” dar nu „celorlalți”.
      resource_allocation: |
        Alocarea mai multor resurse membrilor grupului propriu atunci când membrii grupurilor externe au nevoi egale sau mai mari.
      attribution_asymmetry: |
        Succesul grupului propriu = abilitate; succesul grupului extern = noroc. Eșecul grupului propriu = circumstanță; eșecul grupului extern = caracter.
      minimal_group_effects: |
        Favoritismul apare chiar și în cazul alocărilor arbitrare de grupuri.
    examples:
      hiring: |
        Preferarea candidaților care au absolvit aceeași universitate ca tine sau care îți împărtășesc background-ul.
      performance_reviews: |
        Evaluarea membrilor grupului propriu mai favorabil decât a membrilor grupurilor externe cu performanțe similare.
      collaboration: |
        Având încredere și incluzând „echipa noastră” în timp ce excludem sau ne îndoim de „echipa lor”.
      politics: |
        Respingerea argumentelor grupurilor externe în timp ce acceptăm argumentele grupului propriu neanalizate critic.
    real_world_implications: |
      Părtinirea față de grupul propriu perpetuează inegalitatea, subminează meritocrația și alimentează conflictul. Afectează angajarea, promovarea, investițiile și politicile. Reducerea acesteia necesită un efort deliberat—nu se va rezolva de la sine.
    professional_application:
      networking_and_relationship_building: |
        Include activ persoane din afara cercului tău imediat. Caută perspective diverse. Întreabă-te dacă favorizezi pe cineva pentru că este „ca tine”.
      collaborative_learning_initiative: |
        Folosește procese structurate (recenzii anonimizate, paneluri diverse) pentru a reduce părtinirea față de grupul propriu în angajare și evaluare. Creează proiecte inter-grupuri pentru a construi identitate comună.
    how_can_this_be_misapplied:
      forced_diversity: |
        Implementarea unor cote sau politici care creează resentimente fără a aborda părtinirea de bază.
      out_group_hostility: |
        Tratarea părtinirii față de grupul propriu ca fiind singura problemă atunci când există și ostilitate față de grupul extern.
      ignoring_legitimate_differences: |
        Nu toate diferențele între grupuri sunt părtinire—uneori grupurile au caracteristici diferite. Nu presupune că toate disparitățile sunt discriminare.
      reverse_discrimination: |
        Supra-corectarea pentru a favoriza grupurile externe în moduri care sunt incorecte pentru membrii grupului propriu.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Inversiune
    quick_introduction: |
      Inversiunea este o tehnică de rezolvare a problemelor care răstoarnă o întrebare. În loc să
      întrebați „Cum reușesc?”, întrebați „Ce m-ar face să eșuez?” și evitați acele lucruri.
      Scoate la iveală riscuri și anti-modele pe care gândirea prospectivă adesea le ratează.
    one_liner: Inversează – întreabă ce te-ar face să eșuezi, apoi evită acele lucruri.
    try_this:
      - Pentru orice obiectiv, listați principalele modalități prin care ați putea eșua – apoi evitați-le.
      - Folosiți vizualizarea negativă: ce ar face să meargă prost?
      - Întrebați: Ce ar face un om inteligent pentru a strica asta?
    ask_yourself:
      - M-am gândit la ce ar face ca asta să eșueze?
      - Ce nu văd gândind doar înainte?
    in_more_detail: |
      Popularizată de Charlie Munger și înrădăcinată în logica matematică, inversiunea exploatează
      faptul că evitarea eșecului este adesea mai ușoară decât urmărirea succesului. Dacă puteți
      identifica principalele modalități prin care ceva merge prost, le puteți elimina sistematic.

      Carl Jacobi a spus, se pare, „Inversează, mereu inversează”. Stoicii foloseau vizualizarea
      negativă – imaginarea pierderii – pentru a aprecia ceea ce aveau și pentru a se pregăti pentru adversitate.
      Inversiunea nu este pesimism; este o modalitate structurată de a progresa prin eliminarea
      obstacolelor.
    why_this_is_important: |
      Inversiunea vă ajută să evitați greșeli catastrofale, să testați planurile și să găsiți
      soluții neevidente. Complementează planificarea prospectivă asigurându-vă că nu
      omiteți moduri critice de eșec.
    when_to_use:
      - rezolvarea_problemelor
      - luarea_deciziilor
      - evaluarea_riscurilor
      - decizii_de_cariera
    how_can_you_spot_it:
      premortem_thinking: |
        Înainte de un proiect, întrebând „De ce a eșuat acest proiect?” ca și cum ar fi eșuat deja.
      anti_goals: |
        Definirea a ceea ce doriți să evitați la fel de clar ca și ceea ce doriți să realizați.
      reverse_engineering_failure: |
        Studierea cazurilor eșuate pentru a extrage lecții, mai degrabă decât studierea doar a succeselor.
      constraint_focus: |
        Identificarea constrângerilor și a blocajelor înainte de a optimiza pentru beneficii.
    examples:
      investing: |
        În loc să întrebați „Ce va face ca această acțiune să crească?”, întrebați „Ce m-ar face să pierd bani?”
        și evitați acele scenarii.
      career: |
        „Ce mi-ar ruina reputația?” duce la o listă de comportamente de evitat.
      product_launch: |
        „De ce eșuează majoritatea lansărilor de produse?” scoate la iveală riscuri de abordat înainte de lansare.
      health: |
        „Ce obiceiuri scurtează durata de viață?” oferă o listă de evitare mai clară decât „Ce mă face
        sănătos?”
    real_world_implications: |
      Inversiunea este folosită în inginerie (analiza modurilor de defectare), investiții și strategie.
      Reduce supraîncrederea și îmbunătățește managementul riscurilor. Suprautilizarea poate duce la
      prudență excesivă.
    professional_application:
      networking_and_relationship_building: |
        „Ce ar dăuna acestei relații?” vă ajută să evitați comportamentele care distrug încrederea.
      collaborative_learning_initiative: |
        Rulați premortem-uri pe proiecte: „Acesta a eșuat. De ce?” Folosiți răspunsurile pentru a îmbunătăți
        planificarea și execuția.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Concentrarea doar pe evitarea eșecului poate paraliza acțiunea și poate împiedica asumarea de riscuri necesare.
      negativity_bias: |
        Inversiunea poate amplifica biasul de negativitate dacă nu este echilibrată cu identificarea oportunităților orientate spre viitor.
      analysis_paralysis: |
        Petrecerea atât de mult timp pe moduri de eșec încât nu executați niciodată.
      missing_upside: |
        Inversiunea nu vă spune ce să faceți – doar ce să evitați. Aveți încă nevoie de
        obiective pozitive.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Legea randamentelor descrescătoare
    quick_introduction: |
      Legea randamentelor descrescătoare afirmă că pe măsură ce adăugați mai mult dintr-un singur factor de producție, menținând ceilalți constanți, producția suplimentară din fiecare nouă unitate de factor de producție scade în cele din urmă. Mai mult nu este întotdeauna mai bine—există un punct în care efortul suplimentar generează din ce în ce mai puțin.
    one_liner: Mai mult input generează în cele din urmă mai puțin output—există un punct optim.
    try_this:
      - Ask: Am depășit punctul în care efortul suplimentar generează randamente semnificative?
      - Prioritize the highest-leverage inputs; stop when marginal returns drop.
      - Observă când investești prea mult într-un lucru care a adus deja rezultate.
    ask_yourself:
      - Ce aș câștiga din încă o unitate de efort aici?
      - Optimizez dincolo de punctul randamentelor descrescătoare?
    in_more_detail: |
      În economie, adăugarea mai multor lucrători la o cantitate fixă de teren produce în cele din urmă câștiguri incrementale mai mici. În productivitatea personală, prima oră de studiu poate adăuga mai multă valoare decât a zecea. Principiul se aplică resurselor, efortului, timpului și funcționalităților. Există un punct optim; dincolo de acesta, randamentele marginale scad și pot deveni chiar negative.

      Recunoașterea randamentelor descrescătoare vă ajută să alocați resursele eficient și să evitați supra-investiția în domenii care și-au generat deja cea mai mare parte a valorii.
    why_this_is_important: |
      Înțelegerea randamentelor descrescătoare previne supra-investiția, ghidează prioritizarea și vă ajută să știți când să vă opriți. Este esențială pentru alocarea resurselor și evitarea perfecționismului.
    when_to_use:
      - luarea_deciziilor
      - rezolvarea_problemelor
      - investiții
      - decizii_de_carieră
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Fiecare unitate suplimentară de efort sau resursă produce mai puțin output decât cea anterioară.
      perfectionism_trap: |
        Efortul de a obține ultimii 10% din calitate consumă un efort disproporționat.
      overinvestment: |
        Continuarea adăugării de resurse atunci când randamentul marginal este scăzut sau negativ.
      optimal_point_passed: |
        Ați depășit punctul în care mai mult input îmbunătățește rezultatele.
    examples:
      studying: |
        Primele 2 ore de pregătire pentru examen adaugă mai mult decât orele 7–8; există un punct al randamentelor descrescătoare.
      product_features: |
        Adăugarea mai multor funcționalități la o aplicație poate confuza utilizatorii; a 20-a funcționalitate adaugă mai puțină valoare decât a 5-a.
      hiring: |
        Adăugarea mai multor oameni la un proiect îl poate încetini (Legea lui Brooks) după un anumit punct.
      marketing: |
        Dublarea cheltuielilor cu publicitatea nu dublează rezultatele; randamentele scad pe măsură ce saturați piața.
    real_world_implications: |
      Legea randamentelor descrescătoare ghidează politica economică, strategia de afaceri și productivitatea personală. Ignorarea ei duce la resurse irosite și rezultate suboptimale. Susține principiul Pareto și concentrarea.
    professional_application:
      networking_and_relationship_building: |
        Investiția în câteva relații profunde poate genera mai mult decât dispersarea efortului pe un număr mare de contacte. Recunoașteți când networking-ul suplimentar are randamente descrescătoare.
      collaborative_learning_initiative: |
        Mai multe ore de formare nu înseamnă întotdeauna rezultate mai bune. Găsiți doza optimă și evitați suprasolicitarea.
    how_can_this_be_misapplied:
      premature_optimization: |
        Oprirea prea devreme, înainte de a atinge un nivel rezonabil de calitate.
      undershooting: |
        Folosirea randamentelor descrescătoare ca scuză pentru efort insuficient.
      misidentifying_the_curve: |
        Presupunerea randamentelor descrescătoare atunci când vă aflați de fapt pe o altă parte a curbei (de exemplu, faza incipientă exponențială).
      one_size_fits_all: |
        Aplicarea aceluiași "punct optim" în contexte diferite, unde curbele diferă.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Biasul de aversiune față de pierdere
    quick_introduction: |
      We often feel the pain of losing something more intensely than the
      pleasure of gaining something of equal value.
    one_liner: Pierderile par de aproximativ două ori mai dureroase decât se simt câștigurile echivalente.
    try_this:
      - "Întreabă-te: Supra-evaluez ceea ce aș pierde comparativ cu ceea ce aș câștiga?"
      - Reformulează alegerea ca fiind câștiguri în loc de pierderi și vezi dacă perspectiva ta se schimbă.
      - Fii atent când teama de a pierde conduce decizia mai mult decât potențialul real.
    ask_yourself:
      - Ce aș alege dacă aș începe de la zero?
      - Continui din cauza a ceea ce aș pierde sau pentru că viitorul este cu adevărat mai bun?
    in_more_detail: |
      Dezvoltat de Daniel Kahneman și Amos Tversky, aversiunea față de pierdere descrie modul în care pierderile și câștigurile
      sunt percepute asimetric. Impactul psihologic al pierderii a 100 de dolari este, de obicei, mult
      mai mare decât satisfacția obținerii a 100 de dolari. Acest bias influențează deciziile în domeniul
      finanțelor, negocierilor și alegerilor cotidiene, conducând adesea la un comportament de evitare a riscului
      atunci când pierderile potențiale sunt proeminente.
    why_this_is_important: |
      Înțelegerea aversiunii față de pierdere te ajută să recunoști când teama de pierdere conduce deciziile
      mai mult decât analiza rațională. Explică de ce oamenii păstrează investiții în pierdere, evită
      schimbările necesare și iau decizii suboptimale în negocieri și decizii de carieră.
    when_to_use:
      - luarea_deciziilor
      - investiții
      - mutări_de_carieră
      - evaluarea_riscului
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Observă când perspectiva pierderii a ceva declanșează o anxietate
        sau o rezistență disproporționată comparativ cu beneficiul unui câștig potențial.
      reluctance_to_change: |
        Ezitare în a schimba strategii, a părăsi un loc de muncă sau a vinde un activ chiar și atunci când
        analiza obiectivă sugerează că este opțiunea mai bună.
      framing_sensitivity: |
        Deciziile se schimbă dramatic în funcție de modul în care sunt prezentate opțiunile, ca și câștiguri
        sau pierderi, chiar și atunci când rezultatele sunt echivalente.
      overvaluing_what_you_have: |
        Efectul de dotare—acordarea unei valori mai mari lucrurilor pe care le deții pur și simplu pentru că
        le deții—însoțește adesea aversiunea față de pierdere.
    examples:
      investing: |
        Păstrarea unei acțiuni în declin pentru a "evita realizarea pierderii", ratând
        oportunități de investiții mai bune în altă parte.
      career: |
        Rămânerea într-un loc de muncă neîmplinit deoarece plecarea pare o pierdere de siguranță,
        chiar și atunci când noua oportunitate oferă o creștere mai mare.
      negotiations: |
        Respingerea unei oferte corecte pentru că este prezentată ca "renunțare" la ceva,
        în loc de "obținerea" unui acord.
      product_design: |
        Perioade de probă gratuite care se convertesc în plătite—utilizatorii experimentează "pierderea" serviciului
        când perioada de probă se încheie, ceea ce motivează abonarea mai mult decât "obținerea"
        unui serviciu nou ar face-o.
    real_world_implications: |
      Aversiunea față de pierdere modelează piețele, politicile și comportamentul individual. Explică
      de ce asigurările și garanțiile se vând bine, de ce oamenii evită schimbările benefice
      și de ce știrile negative au un impact disproporționat. Recunoașterea ei poate îmbunătăți
      calitatea deciziilor și reduce regretul cauzat de alegeri.
    professional_application:
      networking_and_relationship_building: |
        Fii conștient că oamenii pot rezista încheierii unor relații sau
        colaborări neproductive din cauza aversiunii față de pierdere—le este teamă să "piardă" conexiunea.
        Prezintă noile oportunități ca pe niște câștiguri, nu pierderi, pentru a reduce rezistența.
      collaborative_learning_initiative: |
        Când introduci noi procese sau instrumente, accentuează ce câștigă echipa
        în loc de ce "renunță". Inițiativele de schimbare prezentate ca pierderi
        declanșează adesea o rezistență mai puternică.
    how_can_this_be_misapplied:
      manipulation: |
        Exploatarea aversiunii față de pierdere pentru a presa decizii—de exemplu, oferte cu "timp limitat"
        sau prezentări de tipul "nu rata" care declanșează teama de pierdere, în loc de
        o evaluare reală a valorii.
      misinterpreting_relationships: |
        Presupunerea că rezistența cuiva la schimbare este pur rațională, când poate
        este condusă de aversiune față de pierdere. Atribuirea greșită a motivelor poate dăuna încrederii.
      overcommitment: |
        Eroarea costurilor irecuperabile—continuarea investiției într-un proiect eșuat pentru că
        "am investit deja atât de mult"—în loc de a limita pierderile.
      missed_opportunities_for_conflict_resolution: |
        Refuzul de a face compromisuri deoarece orice concesie pare o pierdere,
        chiar și atunci când alternativa este un rezultat mai prost pentru toți.
      vulnerability_to_exploitation: |
        Fiind manipulat de alții care prezintă alegerile pentru a declanșa aversiunea față de pierdere,
        cum ar fi tacticile de vânzare care subliniază ce vei "pierde" dacă nu acționezi.
      reinforcing_negative_perceptions: |
        Concentrarea excesivă pe dezavantaje potențiale poate crea o perspectivă pesimistă
        care devine auto-îndeplinită, ratând oportunități de creștere.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: mere_exposure_effect
    name: Efectul expunerii repetate
    quick_introduction: |
      Efectul expunerii repetate este tendința de a dezvolta o preferință pentru lucruri
      pur și simplu pentru că ne sunt familiare. Expunerea repetată – chiar și fără
      întărire – crește aprecierea. Tendem să preferăm ceea ce cunoaștem.
    one_liner: Familiaritatea generează apreciere—preferăm ceea ce am văzut înainte.
    try_this:
      - Ask: Îmi place asta pentru că e bun, sau pentru că îmi este familiar?
      - When evaluating options, correct for exposure—new things start at a disadvantage. (Evaluând opțiunile, corectează pentru expunere—lucrurile noi pornesc cu un dezavantaj.)
      - Notice when repetition is influencing your preference. (Observă când repetiția îți influențează preferința.)
    ask_yourself:
      - Prefer ceva în principal pentru că l-am mai văzut?
      - Aș alege diferit dacă expunerea ar fi egală?
    in_more_detail: |
      Robert Zajonc a demonstrat că expunerea repetată la stimuli (fețe, cuvinte, forme)
      crește afectul pozitiv față de aceștia—chiar și atunci când nu suntem conștienți
      de expunere. Familiaritatea generează apreciere, nu dispreț (în multe
      cazuri). Efectul este mai puternic atunci când nu analizăm și când expunerea
      este subtilă.

      Efectul expunerii repetate afectează preferința pentru marcă, atracția interpersonală
      și judecata estetică. Explică de ce preferăm muzica familiară, de ce publicitatea
      funcționează prin repetiție și de ce putem prefera
      persoanele pe care le-am mai văzut—chiar și fără interacțiune.
    why_this_is_important: |
      Recunoașterea efectului expunerii repetate te ajută să înțelegi propriile
      preferințe și să reziști manipulării prin repetiție. De asemenea,
      explică de ce vizibilitatea și prezența contează pentru relații și
      mărci. Familiaritatea este o influență puternică, dar adesea inconștientă.
    when_to_use:
      - construirea_relatiilor
      - luarea_deciziilor
      - leadership
      - invatare
    how_can_you_spot_it:
      familiarity_preference: |
        Preferarea opțiunilor pe care le-am mai văzut în detrimentul celor noi.
      repetition_influence: |
        Expunerea repetată crește aprecierea fără persuasiune explicită.
      unconscious_influence: |
        Efectul funcționează chiar și atunci când nu suntem conștienți de expunere.
      brand_recognition: |
        Mărcile familiare sunt preferate chiar și atunci când nu putem articula de ce.
    examples:
      advertising: |
        Expunerea repetată la o marcă crește preferința—chiar și fără
        mesaje persuasive.
      music: |
        Cântecele pe care le-am mai auzit tind să fie mai apreciate decât cele noi
        la prima ascultare.
      people: |
        Tendința de a aprecia mai mult persoanele pe care le-am văzut în mod repetat (de ex., colegi de clasă,
        colegi de muncă) decât străinii—chiar și fără interacțiune.
      ideas: |
        Ideile pe care le-am întâlnit anterior par mai confortabile și
        credibile decât cele noi.
    real_world_implications: |
      Efectul expunerii repetate modelează comportamentul consumatorilor,
      preferințele politice și atracția socială. Este exploatat în marketing
      și poate crea avantaje neechitabile pentru cei familiarizați. De asemenea,
      explică de ce diversitatea expunerii contează—familiarizarea cu
      diferența reduce prejudecățile.
    professional_application:
      networking_and_relationship_building: |
        Vizibilitatea contează. Prezența, apariția și a fi
        văzut creează familiaritate care construiește aprecierea. Nu
        subestima valoarea contactului repetat cu miză mică.
      collaborative_learning_initiative: |
        Expune oamenii la perspective și persoane diverse în mod repetat—
        familiaritatea poate reduce prejudecățile. Dar fii conștient că expunerea simplă
        poate, de asemenea, întări preferința pentru status quo-ul existent.
    how_can_this_be_misapplied:
      manipulation: |
        Crearea deliberată a expunerii repetate pentru a manipula
        preferințele fără consimțământ.
      false_familiarity: |
        Presupunerea că familiaritatea este echivalentă cu calitatea—uneori opțiuni noi
        sunt mai bune.
      exclusion: |
        Dacă doar anumite persoane au parte de expunere, acestea obțin un avantaj neechitabil.
        Ia în considerare cine are acces la vizibilitate.
      stagnation: |
        Bazarea excesivă pe familiaritate și refuzul de a încerca lucruri noi.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Eroarea narativă
    quick_introduction: |
      Eroarea narativă este tendința de a construi povești din evenimente trecute
      care le fac să pară mai coerente, previzibile și semnificative decât au fost.
      Rearanjăm explicații asupra aleatoriei. Transformăm dezordinea
      istoriei într-o poveste ordonată – și apoi credem că povestea a fost inevitabilă.
    one_liner: Rearanjăm povești coerente asupra aleatoriei – și apoi credem că au fost inevitabile.
    try_this:
      - Întreabă: Cât din această poveste este retrospectivă? Ce rol a jucat norocul?
      - Fii sceptic față de explicațiile ordonate – trecutul a fost mai dezordonat decât poveștile noastre.
      - Observă când „are sens” face munca de „a fost previzibil”.
    ask_yourself:
      - Construiesc o poveste care face trecutul să pară mai inevitabil decât a fost?
      - Aș fi prevăzut asta înainte ca se întâmple?
    in_more_detail: |
      Nassim Taleb a popularizat termenul. Căutăm cu disperare narative – cauză și efect,
      eroi și răufăcători, arcuri narative clare. Așa că construim povești care conectează
      evenimentele în retrospectivă. Povestea pare adevărată pentru că este coerentă – dar
      coerența nu înseamnă că este corectă. Confundăm „are sens” cu
      „a fost previzibil”. Subestimăm rolul norocului și
      al aleatoriei.

      Eroarea narativă afectează modul în care învățăm din istorie, evaluăm
      succesul și facem predicții. Supraestimăm puterea explicativă
      a poveștilor și subestimăm rolul șansei.
    why_this_is_important: |
      Recunoașterea erorii narative te ajută să eviți supraînvățarea din
      trecut și supraestimarea predictibilității. Încurajează umilința
      în ceea ce privește cauzalitatea și predicția. Nu tot ce face o poveste bună
      este adevărat sau generalizabil.
    when_to_use:
      - luarea_deciziilor
      - invatare
      - evaluarea_riscurilor
      - rezolvarea_problemelor
    how_can_you_spot_it:
      hindsight_coherence: |
        Evenimentele trecute sunt explicate printr-o poveste ordonată care nu era
        vizibilă la momentul respectiv.
      cause_effect_overconfidence: |
        Atribuim cauze clare unor rezultate care au avut mulți
        factori contributivi.
      luck_minimization: |
        Succesul și eșecul sunt explicate prin pricepere și strategie,
        nu prin noroc.
      story_over_evidence: |
        O narațiune convingătoare înlocuiește dovezile statistice.
    examples:
      business_success: |
        „Au reușit din cauza lui X” când mulți factori și norocul
        au fost implicați – alegem povestea care se potrivește.
      investing: |
        Explicarea mișcărilor pieței cu narațiuni care par
        satisfăcătoare, dar pot fi post-hoc.
      history: |
        Evenimentele istorice sunt prezentate ca progrese inevitabile
        când au fost condiționate de mulți factori.
      career: |
        „Am ajuns aici pentru că am făcut X” când norocul și momentul
        au jucat roluri importante.
    real_world_implications: |
      Eroarea narativă distorsionează învățarea, supraîncrederea
      în predicții și atribuirea succesului și eșecului.
      Face ca trecutul să pară mai previzibil decât a fost
      și viitorul să pară mai previzibil decât este.
    professional_application:
      networking_and_relationship_building: |
        Când cineva își spune povestea succesului, amintește-ți că
        este o narațiune – coerentă și convingătoare, dar posibil
        simplificată. Norocul și factorii nevăzuți ar putea fi subestimați.
      collaborative_learning_initiative: |
        În retrospective, distinge narațiunea de dovezi.
        Întreabă „Ce am fi spus la momentul respectiv?” Folosește
        jurnale de decizii pentru a captura incertitudinea înainte
        ca rezultatele să fie cunoscute.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Unele narațiuni sunt corecte – nu totul este
        eroare narativă. Cauzalitatea există.
      excessive_skepticism: |
        Refuzul de a învăța din trecut pentru că „eroarea
        narativă”. Putem extrage încă lecții utile.
      false_randomness: |
        Presupunerea că totul este aleatoriu când unele rezultate
        sunt atribuibile în mod semnificativ.
      undermining_storytelling: |
        Poveștile au valoare pentru comunicare și sens –
        eroarea este să crezi că sunt complete sau
        predictive, nu că există.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
  - id: negativity_bias
    name: Biasul negativității
    quick_introduction: |
      Biasul negativității este tendința de a acorda mai multă greutate informațiilor negative decât celor pozitive. Știrile proaste, criticile și amenințările captează atenția noastră și influențează deciziile noastre mai puternic decât stimuli pozitivi echivalenți.
    one_liner: Știrile proaste cântăresc mai mult decât cele bune—suntem programați să prioritizăm amenințările.
    try_this:
      - Caută și cântărește activ dovezi pozitive atunci când evaluezi.
      - Observă când o critică depășește multe complimente.
      - Întreabă: Acord mai multă greutate informațiilor negative decât merită?
    ask_yourself:
      - Mă concentrez pe negativ și ignor pozitivul?
      - M-aș simți diferit dacă m-aș concentra pe dovezile bune?
    in_more_detail: |
      Din punct de vedere evoluționist, ratarea unei amenințări putea fi fatală, în timp ce ratarea unei oportunități
      era, de obicei, supraviețuibilă. Creierele noastre sunt construite pentru a prioritiza informațiile negative.
      O singură remarcă critică poate depăși multe complimente. Evenimentele negative sunt
      amintite mai viu și pentru mai mult timp.

      Acest bias afectează relațiile, luarea deciziilor și bunăstarea. Ne concentrăm pe
      eșecuri, anticipăm cele mai rele scenarii și ignorăm dovezile pozitive. Înțelegerea
      lui ne ajută să-l corectăm.
    why_this_is_important: |
      Recunoașterea biasului negativității te ajută să echilibrezi feedback-ul, să eviți reacțiile exagerate la
      critici și să iei decizii mai calibrate. De asemenea, explică de ce știrile proaste
      domină și de ce adesea ne simțim mai rău decât o justifică circumstanțele.
    when_to_use:
      - luare_decizii
      - construirea_relatiilor
      - leadership
      - evaluare_risc
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Un singur comentariu negativ umbrește multe pozitive.
      threat_prioritization: |
        Potențialele dezavantaje primesc mai multă atenție decât avantaje echivalente.
      vivid_negative_memories: |
        Experiențele negative sunt reamintite mai ușor și cu mai multă emoție.
      discounting_positive_evidence: |
        Știrile bune sunt uitate rapid sau explicate.
    examples:
      performance_reviews: |
        Un angajat se fixează pe o singură piesă de feedback critic și ignoră evaluarea generală
        pozitivă.
      news_consumption: |
        Titlurile negative domină atenția și modelează viziunea asupra lumii, în ciuda tendințelor
        pozitive.
      relationships: |
        O singură ceartă pare mai mare decât multe momente bune.
      investing: |
        Scăderile pieței declanșează mai multă panică decât urcările echivalente declanșează euforie.
    real_world_implications: |
      Biasul negativității modelează mass-media, politica și cultura organizațională. El
      contribuie la anxietate, conflict și decizii suboptimale. Contracararea deliberată
      a acestuia poate îmbunătăți bunăstarea și judecata.
    professional_application:
      networking_and_relationship_building: |
        Atunci când oferi feedback, fii conștient că comentariile negative vor cântări mai greu—
        echilibrează-le și accentuează creșterea. Când primești feedback, ia în considerare în mod conștient
        întreaga imagine.
      collaborative_learning_initiative: |
        Creează culturi care contracarează în mod explicit biasul negativității: celebrează succesele,
        documentează rezultatele pozitive și echilibrează analizele post-mortem cu "pre-mortem"-uri
        ale ceea ce a mers bine.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Respingerea preocupărilor legitime prin insistarea pe „gândire pozitivă”.
      ignoring_real_threats: |
        Supra-corectarea până la punctul în care se subestimează riscurile reale.
      feedback_suppression: |
        Evitarea criticilor necesare deoarece „negativitatea este rea”.
      invalidation: |
        A spune cuiva că sentimentele sale negative sunt „doar biasul negativității”
        atunci când au motive reale de îngrijorare.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Principiul lui Occam
    quick_introduction: |
      Principiul lui Occam (sau lama lui Ockham) este principiul conform căruia, dintre ipotezele concurente,
      cea cu cele mai puține presupuneri ar trebui preferată. Explicațiile mai simple sunt
      adesea—dar nu întotdeauna—corecte.
    one_liner: Preferă cea mai simplă explicație care se potrivește dovezilor.
    try_this:
      - Când compari teorii, întreabă: Care are mai puține presupuneri?
      - Nu adăuga complexitate fără dovezi care o cer.
      - Observă când preferi o explicație elaborată în locul uneia simple.
    ask_yourself:
      - Introduc complexitate inutilă?
      - Dovezile necesită acest nivel de explicație?
    in_more_detail: |
      Numit după William de Ockham, principiul nu pretinde că explicațiile simple
      sunt întotdeauna adevărate. Sugerează că complexitatea inutilă nu ar trebui introdusă
      fără dovezi. Dacă două teorii explică aceleași fenomene, cea mai simplă este
      preferabilă până când dovezile cer altfel.

      Principiul lui Occam este o euristică, nu o lege. Uneori, explicația corectă este
      complexă. Dar ne ferește de supra-potrivire, gândire conspiraționistă și complicații inutile.
      Favorizează parcimonia în explicație.
    why_this_is_important: |
      Aplicarea Principiului lui Occam îmbunătățește rezolvarea problemelor, reduce supra-potrivirea în modele
      și te ajută să eviți teorii elaborate, dar nesuportate. Este un punct de plecare util
      atunci când dovezile sunt ambigue.
    when_to_use:
      - rezolvarea_problemelor
      - luarea_deciziilor
      - învățare
      - evaluarea_riscurilor
    how_can_you_spot_it:
      unnecessary_complexity: |
        O explicație invocă multe presupuneri când ar fi suficiente mai puține.
      conspiracy_tendencies: |
        Explicații complexe, cu mai mulți actori, pentru evenimente care au cauze mai simple.
      overfitting: |
        Un model sau o teorie care explică perfect datele anterioare, dar eșuează pe date noi.
      elegance_in_explanation: |
        Cele mai bune explicații par adesea "evidente" retrospectiv.
    examples:
      debugging: |
        Când apare un bug, verifică mai întâi cauzele cele mai simple (ex. greșeală de scriere, configurație greșită)
        înainte de a presupune probleme arhitecturale.
      conspiracy_theories: |
        „Guvernul a orchestrat X” necesită mulți actori ascunși; „câțiva oameni
        au făcut greșeli” este mai simplu.
      product_failure: |
        Utilizatorii nu adoptă o funcție—explicația cea mai simplă: nu le rezolvă problema, nu faptul că
        sunt confuzi de interfața grafică.
      medical_diagnosis: |
        „Lucrurile comune sunt comune”—ia în considerare diagnostice frecvente înainte de cele rare.
    real_world_implications: |
      Principiul lui Occam ghidează investigația științifică, ingineria și raționamentul zilnic.
      Reduce efortul irosit pe teorii greșite elaborate. Aplicat greșit, poate respinge
      fenomene cu adevărat complexe.
    professional_application:
      networking_and_relationship_building: |
        Când interpretezi comportamentul altora, preferă explicații simple (sunt ocupați,
        au uitat) înainte de a presupune rea-voință sau motive complexe.
      collaborative_learning_initiative: |
        În sesiunile de rezolvare a problemelor, întreabă explicit „Care este cea mai simplă explicație?”
        înainte de a construi modele complexe.
    how_can_this_be_misapplied:
      oversimplification: |
        Respingerea explicațiilor complexe valide pentru că sunt „prea complicate”.
      status_quo_bias: |
        Utilizarea Principiului lui Occam pentru a prefera explicații familiare în locul celor noi, dar corecte.
      scientific_rigidity: |
        Respingerea teoriilor noi pentru că sunt mai complexe, chiar și atunci când dovezile le susțin.
      missing_nuance: |
        Unele domenii (ex. comportamentul uman, ecosistemele) sunt inerent complexe;
        simplitatea poate fi înșelătoare.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Efectul Struțului
    quick_introduction: |
      Efectul struțului este tendința de a evita informațiile financiare negative – de a
      "îngropa capul în nisip" ca un struț. Oamenii evită să își verifice
      portofoliile atunci când piețele sunt în scădere, amână deschiderea facturilor și ignoră semnele de avertizare
      care i-ar putea ajuta să acționeze.
    one_liner: Evitarea veștilor proaste nu schimbă realitatea – doar îți întârzie răspunsul.
    try_this:
      - Stabilește verificări regulate, astfel încât să nu poți evita cifrele.
      - Observă când amâni deschiderea sau verificarea a ceva.
      - Întreabă-te: Ce evit și ce s-ar schimba dacă aș înfrunta asta?
    ask_yourself:
      - Evit informații pentru că ar putea fi proaste?
      - O conștientizare timpurie m-ar ajuta să acționez mai bine?
    in_more_detail: |
      Termenul a fost creat în finanțe comportamentale pentru a descrie investitorii care evită
      verificarea investițiilor lor în timpul scăderilor pieței. Comportamentul se extinde
      dincolo de finanțe: evitarea controalelor medicale, ignorarea problemelor în relații
      și amânarea conversațiilor dificile. Căutăm să evităm anxietatea
      veștilor proaste, dar evitarea face adesea ca rezultatele să fie mai proaste, prevenind acțiunea la timp.

      Efectul este determinat de aversiunea la pierdere și dorința de a evita disconfortul emoțional.
      Din păcate, ignoranța nu schimbă realitatea – doar ne întârzie răspunsul.
    why_this_is_important: |
      Recunoașterea efectului struțului te ajută să confrunți informațiile dificile
      proactiv. Evitarea veștilor proaste rareori îmbunătățește rezultatele; de obicei
      le agravează. Conștientizarea la timp permite decizii mai bune.
    when_to_use:
      - luare_decizii
      - investiții
      - evaluare_riscuri
      - mișcări_în_carieră
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Nu te uiți la declarațiile de investiții atunci când piețele sunt în scădere.
      delaying_difficult_information: |
        Amâni deschiderea facturilor, a rezultatelor medicale sau a feedback-ului de performanță.
      information_avoidance: |
        Eviti activ sursele care ar putea conține vești proaste.
      procrastination_on_unpleasant_tasks: |
        Amâni acțiuni care ar expune sau ar aborda probleme.
    examples:
      investing: |
        Un investitor încetează să-și verifice fondul de pensii în timpul unei piețe "bear", ratând
        oportunități de reechilibrare.
      health: |
        Eviti o programare la medic, în ciuda simptomelor, din cauza fricii de vești proaste.
      finances: |
        Nu deschizi extrasele de pe cardul de credit sau alertele bancare pentru a evita să te confrunți cu datoriile.
      performance: |
        Un manager evită să ofere feedback critic până la evaluarea anuală, când
        o intervenție mai timpurie ar fi ajutat.
    real_world_implications: |
      Efectul struțului duce la rezultate financiare mai proaste, tratamente medicale întârziate
      și probleme nerezolvate în relații și la locul de muncă. El
      agravează pierderile evitabile. Sistemele care fac informația greu de ignorat
      pot ajuta.
    professional_application:
      networking_and_relationship_building: |
        Nu evita conversațiile dificile. Abordează problemele devreme, în loc să
        speri că se vor rezolva singure. Creează verificări regulate care expun
        problemele înainte ca acestea să escaladeze.
      collaborative_learning_initiative: |
        Construiește bucle de feedback care fac dificilă ignorarea problemelor – panouri de control,
        revizuiri regulate și norme care încurajează dezvăluirea timpurie a veștilor proaste.
    how_can_this_be_misapplied:
      information_overload: |
        Forțarea monitorizării constante atunci când o anumită evitare a informațiilor este sănătoasă
        (de exemplu, a nu verifica acțiunile la fiecare minut).
      anxiety_amplification: |
        Crearea unui accent atât de mare pe problemele potențiale încât crește anxietatea
        fără a îmbunătăți rezultatele.
      blame_shifting: |
        Atribuirea tuturor evitării la "efectul struțului" atunci când o parte a evitării este
        rațională (de exemplu, ignorarea zgomotului de fond).
      micromanagement: |
        Utilizarea conceptului pentru a justifica supravegherea excesivă a celorlalți.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Principiul Pareto
    quick_introduction: |
      Principiul Pareto (sau regula 80/20) afirmă că aproximativ 80% din efecte provin din
      20% din cauze. O mică minoritate de intrări produce adesea majoritatea ieșirilor —
      în vânzări, bug-uri, clienți, efort, funcționalități și multe altele. Concentrează-te pe puținele vitale.
    one_liner: 80% din efecte provin din 20% din cauze — concentrează-te pe puținele vitale.
    try_this:
      - Identifică cele 20% din intrări care produc 80% din rezultate — investește mai mult acolo.
      - Elimină sau prioritizează invers cele 80% care produc puțin.
      - Întreabă-te: Care puține lucruri, dacă le-aș face bine, ar conta cel mai mult?
    ask_yourself:
      - Îmi distribui efortul uniform când câteva lucruri contează mai mult?
      - Care este 20% din mine cu efect de levier ridicat?
    in_more_detail: |
      Vilfredo Pareto a observat că 80% din pământul Italiei era deținut de 20% din
      populație. Principiul a fost generalizat: 80% din vânzări de la 20% din
      clienți, 80% din bug-uri de la 20% din cod, 80% din rezultate de la 20% din efort.
      Raportul exact variază, dar modelul — distribuția neuniformă — este comun.

      Principiul sugerează că identificarea și concentrarea pe 20% cu efect de levier ridicat
      poate îmbunătăți dramatic rezultatele. Este o euristică de prioritizare, nu o
      lege fizică.
    why_this_is_important: |
      Aplicarea principiului Pareto te ajută să prioritizezi nemilos, să eviți irosirea
      efortului pe activități cu impact redus și să obții mai mult cu mai puțin. Este fundamental
      pentru productivitate și strategie.
    when_to_use:
      - luarea_deciziilor
      - rezolvarea_problemelor
      - leadership
      - mutari_in_cariera
    how_can_you_spot_it:
      uneven_distribution: |
        O mică fracțiune din X explică o mare fracțiune din Y.
      high_leverage_activities: |
        Câteva acțiuni produc majoritatea rezultatelor.
      low_value_tail: |
        Multe activități contribuie puțin; eliminarea lor are un impact minim.
      vital_few_vs_trivial_many: |
        Cheia este identificarea căror puține contează cel mai mult.
    examples:
      sales: |
        20% din clienți generează 80% din venit — concentrează-te pe păstrarea și creșterea lor.
      software: |
        20% din funcționalități determină 80% din utilizare — prioritizează-le pe acelea.
      productivity: |
        Câteva obiceiuri sau rutine produc majoritatea rezultatelor tale — investește mai mult în ele.
      problems: |
        20% din bug-uri cauzează 80% din blocări — rezolvă-le pe acelea mai întâi.
    real_world_implications: |
      Principiul Pareto ghidează alocarea resurselor, strategia de produs și
      productivitatea personală. Ignorarea lui duce la o distribuire prea subțire a efortului.
      Aplicarea exagerată poate duce la neglijarea "cozii lungi" acolo unde contează.
    professional_application:
      networking_and_relationship_building: |
        Identifică relațiile care contează cel mai mult pentru obiectivele tale. Investește
        disproporționat în acelea, în loc să distribui efortul în mod egal.
      collaborative_learning_initiative: |
        Când îmbunătățești performanța echipei, găsește 20% din intervențiile care determină
        80% din rezultate. Concentrează formarea și schimbările de proces acolo.
    how_can_this_be_misapplied:
      oversimplification: |
        Presupunerea că 80/20 se aplică peste tot; unele distribuții sunt mai uniforme.
      neglecting_the_tail: |
        Ignorarea "minorității triviale" atunci când acestea contează colectiv (de exemplu, mulți clienți mici, cazuri marginale).
      false_precision: |
        Tratarea 80/20 ca literal, mai degrabă decât ca o euristică aproximativă.
      misidentifying_the_vital_few: |
        Concentrarea pe 20% greșit din cauza unei analize defectuoase.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Legea lui Parkinson
    quick_introduction: |
      Legea lui Parkinson afirmă că „munca se extinde pentru a umple timpul disponibil pentru finalizarea acesteia.” Acordați unei sarcini o săptămână și durează o săptămână; acordați-i o zi și adesea este finalizată într-o zi. Același lucru se aplică bugetelor, dimensiunii echipei și resurselor.
    one_liner: Munca se extinde pentru a umple timpul disponibil pentru finalizarea acesteia.
    try_this:
      - Stabiliți termene limită mai stricte pentru a forța concentrarea și a preveni extinderea scopului.
      - Întrebați: Cât timp minim ar putea dura în mod rezonabil acest lucru?
      - Observați când timp suplimentar sau resurse suplimentare sunt consumate fără valoare proporțională.
    ask_yourself:
      - Umplu eu timpul, sau munca îl solicită de fapt?
      - Ar forța un termen limită mai strict o prioritizare mai bună?
    in_more_detail: |
      C. Northcote Parkinson a observat că birocrațiile cresc indiferent de cantitatea de muncă ce trebuie efectuată. El a remarcat, de asemenea, că sarcinile se extind pentru a umple timpul disponibil — ne ajustăm efortul și ritmul în funcție de termenul limită. Termenele limită stricte pot forța concentrarea; cele relaxate invită la amânare și la extinderea scopului.

      Legea are implicații pentru managementul proiectelor, productivitatea personală și designul organizațional. Sugerează că constrângerile pot îmbunătăți rezultatele prin forțarea prioritizării.
    why_this_is_important: |
      Înțelegerea Legii lui Parkinson vă ajută să stabiliți termene limită mai bune, să evitați supra-resursarea proiectelor și să recunoașteți când „mai mult timp” sau „mai mulți oameni” nu vor ajuta — și pot dăuna. Constrângerile pot fi productive.
    when_to_use:
      - luarea_deciziilor
      - leadership
      - rezolvarea_problemelor
      - mutari_in_cariera
    how_can_you_spot_it:
      deadline_driven_effort: |
        Munca accelerează pe măsură ce se apropie termenul limită; puțin progres atunci când termenul limită este îndepărtat.
      scope_expansion: |
        Proiectele cresc pentru a umple resursele disponibile, în loc să rămână concentrate.
      bureaucratic_growth: |
        Organizațiile adaugă personal și procese chiar și atunci când volumul de muncă nu crește.
      budget_exhaustion: |
        Bugetele sunt cheltuite integral, indiferent dacă cheltuiala a fost necesară.
    examples:
      student_deadlines: |
        Un eseu ce trebuie predat peste o lună este scris în ultimele 48 de ore.
      project_management: |
        Un proiect cu un termen limită de 6 luni durează 6 luni; același scop cu un termen limită de 3 luni s-ar putea realiza, de asemenea.
      meetings: |
        O ședință de 1 oră umple ora, chiar dacă 30 de minute ar fi suficiente.
      budgets: |
        Un departament își cheltuiește întregul buget până la sfârșitul anului pentru a justifica același buget anul următor.
    real_world_implications: |
      Legea lui Parkinson afectează productivitatea, balonarea organizațională și alocarea resurselor. Sugerează că constrângerile artificiale (termene limită mai scurte, echipe mai mici) pot îmbunătăți concentrarea și eficiența.
    professional_application:
      networking_and_relationship_building: |
        Stabiliți termene limită clare și stricte pentru munca colaborativă, pentru a preveni extinderea scopului și a menține impulsul.
      collaborative_learning_initiative: |
        Utilizați „time-boxing” pentru ședințe și proiecte. Experimentați cu termene limită mai scurte pentru a testa dacă acestea îmbunătățesc concentrarea fără a sacrifica calitatea.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Stabilirea unor termene limită arbitrar de scurte care provoacă epuizare sau calitate slabă.
      underresourcing: |
        Presupunerea că mai puțin timp sau mai puțini oameni vor funcționa întotdeauna — unele sarcini necesită resurse adecvate.
      blame_shifting: |
        Atribuirea întârzierilor „Legii lui Parkinson” atunci când munca a fost cu adevărat complexă.
      ignoring_quality: |
        Grăbirea pentru a respecta constrângeri artificiale în detrimentul rezultatelor durabile.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Gândire Probabilistică
    quick_introduction: |
      Gândirea probabilistică este obiceiul de a raționa în termeni de probabilități, mai degrabă
      decât de certitudini. În loc de „se va întâmpla asta?”, întrebăm „cât de probabil este ca asta să se întâmple?”
      Îmbrățișează incertitudinea și o folosește pentru a lua decizii mai bune.
    one_liner: Gândește în probabilități, nu în certitudini — îmbrățișează incertitudinea.
    try_this:
      - Înlocuiește „se va întâmpla?” cu „cât de probabil este ca asta să se întâmple?”
      - Ia în considerare multiple scenarii și atribuie probabilități aproximative.
      - Actualizează-ți convingerile pe măsură ce noi dovezi apar.
    ask_yourself:
      - Gândesc în termeni binari când probabilitățile ar fi mai precise?
      - Care este intervalul de rezultate plauzibile?
    in_more_detail: |
      Majoritatea rezultatelor din lumea reală sunt incerte. Gândirea probabilistică înlocuiește
      afirmațiile binare da/nu cu convingeri gradate. Implică luarea în considerare a multiple scenarii,
      atribuirea de probabilități aproximative și actualizarea pe măsură ce apar dovezi. Este opusul
      supraîncrederii și gândirii în alb și negru.

      Practicile cheie includ: gândirea în intervale, luarea în considerare a ratelor de bază, actualizarea
      convingerilor cu dovezi și distincția între risc (probabilități cunoscute)
      și incertitudine (probabilități necunoscute). Îmbunătățește calibrarea și
      calitatea deciziilor.
    why_this_is_important: |
      Gândirea probabilistică reduce supraîncrederea, îmbunătățește prognozarea și
      conduce la decizii mai bune în condiții de incertitudine. Este esențială pentru investiții,
      strategie și orice domeniu în care viitorul este incert.
    when_to_use:
      - luarea_deciziilor
      - evaluarea_riscurilor
      - investiții
      - rezolvarea_problemelor
    how_can_you_spot_it:
      likelihood_language: |
        „Probabil”, „probabil”, „improbabil” în loc de „va” sau „nu va”.
      scenario_thinking: |
        Luarea în considerare a multiple viitoruri posibile cu probabilități aproximative.
      calibration: |
        Predicții care corespund frecvențelor reale ale rezultatelor în timp.
      uncertainty_acknowledgment: |
        Declararea explicită a ceea ce nu știi.
    examples:
      forecasting: |
        „Cred că există o șansă de 60% să respectăm termenul limită”, mai degrabă decât „Vom
        respecta termenul limită.”
      investing: |
        „Aceasta are o șansă de 30% de 2x și o șansă de 70% de -50%”, mai degrabă decât
        „Aceasta va exploda.”
      strategy: |
        Planificarea pentru multiple scenarii (cel mai bun, mediu, cel mai rău caz) cu probabilități
        aproximative.
      hiring: |
        „Pe baza interviului, aș atribui o probabilitate de 70% succesului lor”, mai degrabă
        decât „Sunt o angajare grozavă.”
    real_world_implications: |
      Gândirea probabilistică îmbunătățește calibrarea, reduce surprizele și permite
      o mai bună gestionare a riscurilor. Este centrală pentru prognozarea eficientă și
      luarea deciziilor în condiții de incertitudine.
    professional_application:
      networking_and_relationship_building: |
        Comunicați în probabilități atunci când este cazul — „Sunt destul de sigur” versus
        „Sunt sigur”. Construiește încredere prin semnalarea umilinței epistemice.
      collaborative_learning_initiative: |
        Încurajați echipele să își exprime incertitudinea. Folosiți piețe de predicții sau
        exerciții de calibrare pentru a îmbunătăți judecata probabilistică.
    how_can_this_be_misapplied:
      false_precision: |
        Atribuirea unor probabilități exacte (de ex., 73%) atunci când nu poți fi atât de precis.
      analysis_paralysis: |
        Nu se acționează niciodată deoarece „nu putem fi siguri”.
      hedging_overuse: |
        Calificarea a totul la punctul de inutilitate.
      dismissing_intuition: |
        Supra-corectarea pentru a ignora sentimentele puternice, când acestea pot purta informații valabile.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Efectul Pigmalion
    quick_introduction: |
      Efectul Pigmalion (sau efectul Rosenthal) este fenomenul prin care așteptările
      mai mari conduc la performanțe îmbunătățite. Când profesorii, managerii sau
      alții se așteaptă mai mult de la cineva, acea persoană tinde să performeze mai bine.
      Așteptările devin profeții auto-împlinite.
    one_liner: Așteptările mai mari duc la performanțe mai bune—așteptările modelează realitatea.
    try_this:
      - Stabilește așteptări înalte, dar realizabile; comunică-le clar.
      - Observă când așteptările scăzute ar putea limita performanța cuiva.
      - Întreabă: Ce aștept implicit—și cum ar putea asta să influențeze rezultatele?
    ask_yourself:
      - Așteptările mele ajută sau limitează această persoană?
      - Ar schimba așteptările mai înalte modul în care o tratez—și rezultatele ei?
    in_more_detail: |
      Robert Rosenthal și Lenore Jacobson au furnizat profesorilor informații false că
      anumite elevi "vor înflori" academic. Acei elevi—selectați aleatoriu—s-au
      îmbunătățit de fapt mai mult decât ceilalți. Așteptările profesorilor le-au
      influențat comportamentul (mai multă atenție, feedback mai cald), ceea ce a
      influențat performanța elevilor. Așteptările modelează realitatea.

      Inversul—așteptările scăzute care duc la performanțe mai slabe—este uneori
      numit efectul Golem. Ambele arată că credințele noastre despre ceilalți pot
      influența rezultatele lor. Acest lucru are implicații profunde pentru
      leadership, educație și parenting.
    why_this_is_important: |
      Înțelegerea efectului Pigmalion te ajută să valorifici puterea
      așteptărilor. Așteptările înalte, comunicate sincer, pot îmbunătăți
      performanța. Așteptările scăzute pot crea eșec auto-împlinit.
      Credințele tale despre ceilalți contează.
    when_to_use:
      - leadership
      - construirea_relatiilor
      - invatare
      - luarea_deciziilor
    how_can_you_spot_it:
      expectation_performance_link: |
        Cei de la care ne așteptăm mai mult tind să performeze mai bine.
      differential_treatment: |
        Tratăm oamenii diferit pe baza așteptărilor noastre—adesea
        inconștient.
      self_fulfilling_prophecy: |
        Credințele despre capacitate influențează comportamentul care modelează
        capacitatea.
      teacher_student_dynamics: |
        Așteptările educatorilor influențează rezultatele elevilor prin
        tratament diferențiat.
    examples:
      education: |
        Profesorii care se așteaptă ca elevii să reușească oferă mai mult sprijin;
        acei elevi se îmbunătățesc. Profesorii care se așteaptă la eșec pot
        involuntar să-l creeze.
      workplace: |
        Managerii care se așteaptă la performanțe înalte de la subalterni oferă
        mai multe oportunități și feedback; performanța se îmbunătățește.
      parenting: |
        Părinții care se așteaptă ca copiii lor să fie responsabili le oferă
        mai multă responsabilitate; aceștia se ridică la nivelul așteptărilor.
      stereotypes: |
        Amenințarea stereotipurilor este inversul—așteptările negative
        pot afecta performanța.
    real_world_implications: |
      Efectul Pigmalion afectează educația, managementul și
      relațiile. Sugerează că ridicarea așteptărilor—atunci când
      este făcută în mod susținător—poate îmbunătăți rezultatele. De asemenea, avertizează că
      așteptările scăzute pot fi distructive.
    professional_application:
      networking_and_relationship_building: |
        Stabilește așteptări înalte pentru oameni—și oferă sprijinul
        pentru a le atinge. Crede în potențial. Așteptările tale
        influențează comportamentul tău, care le influențează rezultatele.
      collaborative_learning_initiative: |
        Creează culturi ale așteptărilor înalte cu sprijin înalt.
        Evită să etichetezi oamenii drept "performanți slabi" în moduri care
        devin auto-împlinite. Investește în cei de la care te aștepți
        să reușească.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Stabilirea unor așteptări imposibil de atins fără
        sprijin creează eșec și demoralizare.
      blame_shifting: |
        "Nu și-au atins așteptările" când noi nu am oferit
        sprijinul sau condițiile pentru succes.
      ignoring_constraints: |
        Așteptările singure nu depășesc barierele structurale.
      pressure_without_support: |
        Așteptările înalte fără resurse sau sprijin pot fi
        dăunătoare.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Regresia spre medie
    quick_introduction: |
      Regresia spre medie este fenomenul statistic prin care rezultatele extreme
      sunt urmate de rezultate mai apropiate de medie. După un rezultat neobișnuit
      de bun sau de rău, următorul rezultat va fi, probabil, mai puțin extrem — nu
      datorită vreunei intervenții cauzale, ci datorită variației aleatorii.
    one_liner: Rezultatele extreme tind să fie urmate de rezultate mai apropiate de medie.
    try_this:
      - Nu atribuiți "regresia" intervenției dumneavoastră — adesea s-ar fi întâmplat oricum.
      - După un rezultat extrem, așteptați-vă ca următorul să fie mai puțin extrem.
      - Întrebați: Această schimbare se datorează a ceea ce am făcut, sau doar regresiei spre medie?
    ask_yourself:
      - Atribuiți sau blamați intervenția mea pentru ceea ce ar putea fi variație aleatorie?
      - S-ar fi întâmplat acest lucru fără acțiunea mea?
    in_more_detail: |
      Dacă un elev obține un scor neobișnuit de mare la un test, probabil va obține un
      scor mai apropiat de media sa la următorul — nu pentru că a "devenit leneș", ci
      pentru că primul scor a fost parțial noroc. Același lucru este valabil pentru
      performanța sportivă, randamentele bursiere și metricile de afaceri. Adesea
      atribuim "regresia" la ceva ce am făcut (de ex., pedeapsă sau recompensă), când
      ar fi avut loc oricum.

      Daniel Kahneman descrie cum instructorii de zbor au concluzionat greșit că
      lauda a înrăutățit performanța, iar critica a îmbunătățit-o — observau
      regresia spre medie după performanțe extreme.
    why_this_is_important: |
      Înțelegerea regresiei spre medie previne atribuirea greșită a cauzalității.
      Vă ajută să evitați suprareacția la valori extreme și să faceți schimbări
      bazate pe zgomot. Este esențial pentru evaluarea intervențiilor și a
      performanței.
    when_to_use:
      - luarea_deciziilor
      - investiții
      - evaluarea_riscului
      - leadership
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Un rezultat neobișnuit de bun sau de rău este urmat de unul mai apropiat de
        medie.
      spurious_causation: |
        Atribuirea "recuperării" sau "declinului" unei intervenții atunci când
        regresia s-ar fi produs oricum.
      overreaction_to_outliers: |
        Luarea de decizii politice sau personale bazate pe un singur punct de date
        extrem.
      reward_punishment_confusion: |
        Credința că pedeapsa a "funcționat" atunci când îmbunătățirea a fost doar
        regresie.
    examples:
      sports: |
        Un jucător are un meci de carieră, apoi revine la medie — fanii pot blama
        "complacerea".
      investing: |
        O acțiune are un an grozav, apoi revine — investitorii pot atribui declinul
        unei management proaste, când este parțial o revenire.
      performance_reviews: |
        Un angajat are un trimestru slab, primește feedback, se îmbunătățește — feedback-ul
        ar putea fi creditat, când regresia ar fi avut loc indiferent.
      medicine: |
        Un pacient se simte mai rău, ia un tratament, se îmbunătățește — tratamentul
        ar putea fi creditat, când o parte din îmbunătățire a fost naturală.
    real_world_implications: |
      Regresia spre medie afectează modul în care evaluăm profesori, medici, manageri
      de fonduri și pe noi înșine. Explică de ce "ceea ce urcă, trebuie să coboare"
      adesea este valabil statistic. Neînțelegerea ei duce la intervenții
      ieritate și la o încredere falsă în remedii.
    professional_application:
      networking_and_relationship_building: |
        Nu suprainterpretați o singură interacțiune negativă — ar putea fi o valoare
        extremă care va regresa spre media relației.
      collaborative_learning_initiative: |
        Atunci când evaluați intervențiile (formare, schimbări de proces), utilizați
        grupuri de control și puncte de date multiple pentru a distinge efectul de
        regresie.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Presupunerea că orice îmbunătățire după o intervenție este "doar regresie"
        atunci când există efecte reale.
      underreacting: |
        Ignorarea problemelor reale deoarece "va regresa spre medie".
      statistical_illiteracy: |
        Confundarea regresiei cu o forță care "corectează" rezultatele — este doar
        probabilitate.
      overconfidence: |
        Presupunerea că media este stabilă atunci când procesul subiacent s-ar
        putea să se fi schimbat.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Retrospecție roz
    quick_introduction: |
      Retrospecția roz este tendința de a aminti trecutul ca fiind mai bun decât a fost.
      Ne amintim experiențele trecute mai pozitiv în timp, atenuând dificultățile
      și amplificând aspectele pozitive. "Vremurile bune de altădată" nu au fost adesea la fel de bune cum ne amintim.
    one_liner: Ne amintim trecutul ca fiind mai bun decât a fost - "vremurile bune de altădată" nu au fost chiar atât de bune.
    try_this:
      - Când compari cu trecutul, întreabă-te: Ce simțeam de fapt atunci?
      - Ține un jurnal pentru a compara memoria cu realitatea mai târziu.
      - Observă când nostalgia îți colorează judecata asupra prezentului.
    ask_yourself:
      - Idealizez trecutul?
      - Aș fi fost fericit atunci dacă aș fi putut călători înapoi în timp?
    in_more_detail: |
      Avem tendința de a ne aminti aspectele pozitive ale experiențelor trecute și de a uita sau
      minimiza aspectele negative. Vacanțele, joburile și relațiile par mai bune în
      nostalgie decât au fost în momentul respectiv. Acest lucru poate duce la comparații nerealiste—judecăm prezentul în raport cu un trecut idealizat.

      Retrospecția roz afectează luarea deciziilor atunci când repetăm alegeri trecute
      sperând la același rezultat (amintit). Poate, de asemenea, alimenta nostalgia pentru
      epoci care au fost obiectiv mai rele. Este opusul biasului de negativitate
      în memorie.
    why_this_is_important: |
      Recunoașterea retrospecției roz te ajută să faci comparații mai realiste
      și să eviți repetarea greșelilor din trecut bazate pe amintiri idealizate. De asemenea,
      explică de ce uneori tânjim după trecut, în ciuda progresului actual.
    when_to_use:
      - luarea_deciziilor
      - schimbari_de_cariera
      - construirea_relatiilor
      - invatare
    how_can_you_spot_it:
      idealized_past: |
        "Lucrurile erau mai bune atunci" când măsurătorile obiective pot arăta altceva.
      selective_positive_memory: |
        Amintirea lucrurilor bune și uitarea celor rele din experiențele trecute.
      nostalgia_as_evidence: |
        Folosirea amintirilor plăcute ca dovadă că alegerile trecute au fost corecte.
      present_undervaluation: |
        Prezentul pare mai rău decât este, deoarece ne comparăm cu un trecut idealizat.
    examples:
      career: |
        "Vechiul meu job era grozav" când ai plecat din motive întemeiate—memoria a atenuat
        frustrările.
      relationships: |
        "Eram atât de fericiți" despre o relație trecută—uitând conflictele care
        au dus la sfârșitul ei.
      childhood: |
        "Copiii o duceau mai bine pe vremea mea" când multe măsuri obiective (sănătate,
        siguranță, oportunități) s-au îmbunătățit.
      projects: |
        "Proiectul acela a decurs fără probleme" când de fapt a avut multe întârzieri—ne amintim
        rezultatul, nu procesul.
    real_world_implications: |
      Retrospecția roz afectează satisfacția în viață, deciziile de carieră și
      alegerile determinate de nostalgie. Poate duce la repetarea greșelilor din trecut sau la
      comparații nerealiste. Explică, de asemenea, atractivitatea retoricii "înapoi la vremurile bune de altădată".
    professional_application:
      networking_and_relationship_building: |
        Atunci când iei în considerare reconectarea cu foști colegi sau revenirea la roluri anterioare,
        separă nostalgia de realitate. Documentează-ți motivele pentru care ai plecat la momentul respectiv;
        revizuiește-le înainte de a te întoarce.
      collaborative_learning_initiative: |
        În retrospective, folosește note sau date contemporane, mai degrabă decât memoria,
        pentru a evalua ce s-a întâmplat de fapt. Memoria atenuează dificultățile.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Nu toată nostalgia este înșelătoare—uneori trecutul a fost cu adevărat mai bun
        în anumite privințe.
      invalidating_memories: |
        A spune oamenilor că amintirile lor pozitive sunt "greșite" când acestea pot reflecta
        experiențe subiective autentice.
      overcorrection: |
        Presupunând că trecutul a fost întotdeauna mai rău decât ne amintim—uneori a fost
        mai bun.
      present_bias: |
        Folosind retrospecția roz ca scuză pentru a ignora preocupări legitime
        despre declinul actual.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Biasul de saliență
    quick_introduction: |
      Biasul de saliență este tendința de a ne concentra pe cele mai proeminente sau vizibile
      aspecte ale unei situații, neglijând factori mai puțin evidenți, dar potențial
      importanți. Ceea ce iese în evidență primește o atenție și o pondere disproporționată în judecățile noastre.
    one_liner: Ceea ce iese în evidență primește o atenție disproporționată – subtilul este neglijat.
    try_this:
      - Ask: Ce nu văd pentru că nu este proeminent?
      - Caută în mod activ factori mai puțin evidenți înainte de a lua o decizie.
      - Observă când un element viu sau dramatic domină judecata ta.
    ask_yourself:
      - Supraestimez ceea ce este proeminent și subestimez ceea ce este subtil?
      - Ce factori importanți aș putea neglija?
    in_more_detail: |
      Informația proeminentă este vie, încărcată emoțional sau întâlnită recent.
      Captează atenția și influențează deciziile mai mult decât ar trebui. Supraestimăm
      ceea ce este vizibil și subestimăm ceea ce este subtil. Un eveniment dramatic
      sau un exemplu viu ne poate domina gândirea, chiar dacă nu este
      reprezentativ.

      Biasul de saliență se suprapune cu euristica disponibilității (ceea ce ne vine în minte)
      și cu biasul de recență (ceea ce s-a întâmplat recent). Afectează percepția riscului,
      angajarea personalului și strategia. Cele mai vizibile probleme sunt abordate;
      cele invizibile se agravează.
    why_this_is_important: |
      Recunoașterea biasului de saliență te ajută să privești dincolo de ceea ce este evident și
      să iei în considerare factori mai puțin vizibili. Îmbunătățește evaluarea riscurilor, diagnosticul problemelor
      și calitatea deciziilor. Lucrurile importante nu sunt întotdeauna
      proeminente.
    when_to_use:
      - luarea_deciziilor
      - rezolvarea_problemelor
      - evaluarea_riscurilor
      - leadership
    how_can_you_spot_it:
      prominent_factor_dominance: |
        Cel mai vizibil aspect determină decizia.
      overlooking_background: |
        Factorii mai puțin vizibili sunt ignorați, în ciuda importanței lor.
      vividness_overweighting: |
        Informația dramatică sau emoțională primește o pondere disproporționată.
      visibility_bias: |
        Ceea ce putem vedea sau măsura cu ușurință primește mai multă atenție decât
        ceea ce nu putem.
    examples:
      risk: |
        Un accident de avion este proeminent – supraestimăm riscul de a zbura. Accidentele
        de mașină sunt mai puțin proeminente în ansamblu – subestimăm riscul de a conduce.
      hiring: |
        Abilitățile de prezentare ale unui candidat sunt proeminente; respectarea angajamentelor
        poate fi mai puțin vizibilă, dar la fel de importantă.
      strategy: |
        Mișcările concurenților sunt proeminente; schimbările graduale ale pieței sunt
        mai puțin vizibile, dar pot conta mai mult.
      problems: |
        Cea mai vocală plângere este abordată, în timp ce problemele sistemice
        rămân nerezolvate.
    real_world_implications: |
      Biasul de saliență afectează ceea ce primește atenție, finanțare și acțiune.
      Poate duce la abordarea simptomelor în loc de cauze și la resurse alocate greșit.
      Căutarea deliberată a informațiilor ne-proeminente îmbunătățește deciziile.
    professional_application:
      networking_and_relationship_building: |
        Nu judeca oamenii doar după cele mai vizibile trăsături ale lor. Caută
        calități mai puțin evidente – fiabilitate, consecvență, modul în care
        îi tratează pe cei care nu le pot fi de ajutor.
      collaborative_learning_initiative: |
        În rezolvarea problemelor, întreabă explicit „Ce nu vedem?”
        și „Ce este mai puțin evident, dar important?”. Creează procese
        care scot la iveală problemele ne-proeminente.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Uneori, ceea ce este proeminent este important. Nu respinge
        tot ceea ce este evident.
      false_sophistication: |
        Presupunerea că factorii obscuri sunt întotdeauna mai importanți
        decât cei evidenți.
      analysis_paralysis: |
        Căutarea atât de multor factori ne-proeminenti încât nu acționezi niciodată
        asupra celor proeminenți.
      contrarianism: |
        Respingerea informațiilor proeminente doar pentru a fi diferit.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Biasul de Raritate
    quick_introduction: |
      Biasul de raritate este tendința de a acorda o valoare mai mare lucrurilor atunci când acestea par rare sau limitate. "Timp limitat", "au mai rămas doar 3" și "acces exclusiv" declanșează urgență și dorință, adesea anulând evaluarea rațională a dacă avem nevoie sau ne dorim cu adevărat lucrul respectiv.
    one_liner: Raritatea amplifică valoarea percepută—"limitat" declanșează urgență în detrimentul raționalității.
    try_this:
      - Ask: Aș vrea asta dacă nu ar fi rară? Eliminați urgența.
      - Pause before acting on "limited time" or "only X left" offers.
      - Observați când raritatea determină dorința dumneavoastră mai mult decât valoarea reală.
    ask_yourself:
      - Acord valoare acestui lucru pentru că este rar sau pentru că am nevoie de el în realitate?
      - Aș lua această decizie fără încadrarea rarității?
    in_more_detail: |
      Raritatea amplifică valoarea percepută. Când ceva este rar sau pe cale de dispariție, ni-l dorim mai mult—parțial pentru că raritatea poate semnala calitate și parțial pentru că aversiunea față de pierdere ne face să ne temem să ratăm oportunități. Marketingul și negocierile folosesc raritatea pentru a crea urgență. Acest bias poate duce la decizii impulsive, cheltuieli excesive și prioritizare proastă.

      Raritatea afectează, de asemenea, banda cognitivă a celor care sunt cu adevărat constrânși de resurse; sărăcia poate reduce "banda mentală" pentru alte decizii.
    why_this_is_important: |
      Recunoașterea biasului de raritate vă ajută să rezistați tacticilor manipulative și să luați decizii mai deliberate. De asemenea, explică de ce supraevaluăm edițiile limitate și ne grăbim când nu este necesar.
    when_to_use:
      - luarea_deciziilor
      - negociere
      - investiții
      - evaluarea_riscurilor
    how_can_you_spot_it:
      urgency_trigger: |
        "Timp limitat" sau "au mai rămas doar X" creează o dorință disproporționată.
      fear_of_missing_out: |
        Posibilitatea de a pierde accesul determină acțiunea mai mult decât valoarea intrinsecă.
      impulsive_purchases: |
        Cumpărarea de lucruri pentru că sunt rare, mai degrabă decât pentru că aveți nevoie de ele.
      artificial_scarcity: |
        Raritatea este fabricată (de exemplu, contoare false) mai degrabă decât reală.
    examples:
      sales: |
        "Au mai rămas doar 2 în stoc" sau "Reducerea se termină în seara asta" declanșează achiziții care nu s-ar fi întâmplat fără urgență.
      auctions: |
        Participanții la licitații se lasă prinși în dorința de a câștiga și plătesc mai mult decât au planificat din cauza rarității competitive.
      exclusivity: |
        Accesul "doar pentru membri" sau "doar pe bază de invitație" crește valoarea percepută.
      genuine_scarcity: |
        Când resursele sunt cu adevărat limitate, persoanele aflate sub stresul rarității iau decizii mai proaste (de exemplu, cei săraci, cei presați de timp).
    real_world_implications: |
      Biasul de raritate determină comportamentul consumatorilor, rezultatele negocierilor și răspunsurile politice. Poate fi folosit etic (de exemplu, termene limită legitime) sau neetic (de exemplu, raritate falsă). Înțelegerea acestuia îmbunătățește calitatea deciziilor.
    professional_application:
      networking_and_relationship_building: |
        Fiți precauți atunci când alții creează raritate artificială ("Accept doar câțiva clienți"). Verificați dacă raritatea este reală. Atunci când construiți relații, raritatea reală a timpului dumneavoastră poate semnala valoare—dar suprasolicitarea se simte manipulativă.
      collaborative_learning_initiative: |
        Când creați urgență pentru inițiative, asigurați-vă că este legitimă. Termenele limită false erodează încrederea atunci când sunt descoperite.
    how_can_this_be_misapplied:
      manipulation: |
        Crearea deliberată a unei rarități false pentru a presa pe alții să ia decizii.
      impulsive_decisions: |
        Luarea unor decizii importante sub urgență artificială atunci când mai mult timp ar îmbunătăți rezultatele.
      overvaluing_scarcity: |
        Presupunerea că lucrurile rare sunt întotdeauna mai bune—uneori raritatea este arbitrară.
      exploiting_vulnerability: |
        Folosirea tacticilor de raritate asupra persoanelor care sunt deja sub stres din cauza resurselor.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Gândire de ordin secundar
    quick_introduction: |
      Gândirea de ordin secundar este practica de a considera consecințele
      consecințelor acțiunilor dumneavoastră. Gândirea de prim ordin întreabă "ce se întâmplă dacă
      fac X?" Gândirea de ordin secundar întreabă "și apoi ce?" și "și apoi ce după
      aceasta?" Ea scoate la iveală efecte neintenționate.
    one_liner: Întrebați-vă "și apoi ce?" — luați în considerare consecințele consecințelor.
    try_this:
      - Pentru orice decizie, întrebați-vă "și apoi ce?" de cel puțin două ori.
      - Luați în considerare cum vor reacționa alții la acțiunea dumneavoastră — și apoi la acea reacție.
      - Observați când efectele de prim ordin se inversează sau se complică în lanț.
    ask_yourself:
      - M-am gândit la efectele de ordin secundar (și de ordin terțiar)?
      - Ce consecințe neintenționate aș putea să omit?
    in_more_detail: |
      Howard Marks a popularizat conceptul în investiții. Prim ordin: "Acesta va
      crește." Ordin secundar: "Dacă va crește, alții vor observa, mai mulți vor cumpăra,
      va crește mai mult — până va deveni supraevaluat și va prăbuși." Lanțul de
      consecințe adesea inversează sau complică efectul de prim ordin.

      Gândirea de ordin secundar este mai dificilă — necesită mai mult efort mental și
      imaginație. Dar previne multe greșeli. Strategii buni gândesc mai mulți
      pași înainte și iau în considerare cum vor reacționa alții.
    why_this_is_important: |
      Gândirea de ordin secundar previne consecințele neintenționate și îmbunătățește
      calitatea deciziilor. Este esențială pentru strategie, politică și orice domeniu
      în care acțiunile declanșează reacții.
    when_to_use:
      - luare_decizii
      - rezolvare_probleme
      - strategie
      - evaluare_risc
    how_can_you_spot_it:
      consequence_chains: |
        "Dacă fac X, atunci se va întâmpla Y, apoi se va întâmpla Z..."
      reaction_anticipation: |
        Luarea în considerare a modului în care alții vor reacționa la acțiunea dumneavoastră.
      unintended_effects: |
        Căutarea efectelor secundare și a buclelor de feedback.
      reversals: |
        Efecte de ordin secundar care contrazic sau inversează efectele de prim ordin.
    examples:
      investing: |
        "Dacă toată lumea crede că aceasta este o investiție bună, probabil că este aglomerată —
        avantajul ar putea să fi dispărut."
      policy: |
        "Dacă subvenționăm X, cererea crește, prețurile cresc — subvenția ajută cu adevărat?"
      negotiation: |
        "Dacă insist aici, vor riposta acolo — care este efectul net?"
      incentives: |
        "Dacă recompensăm această metrică, oamenii vor manipula sistemul — ce vor face de fapt?"
    real_world_implications: |
      Gândirea de ordin secundar este marca gândirii strategice. Ea previne
      eșecurile politice, stimulentele neintenționate și optimismul naiv. Ea
      distinge decidenții buni de cei excelenți.
    professional_application:
      networking_and_relationship_building: |
        Înainte de a lua o acțiune, întrebați-vă "Cum vor reacționa? Și cum voi reacționa la asta?" Luați în considerare dinamica relației, nu doar schimbul imediat.
      collaborative_learning_initiative: |
        În planificare, desfășurați exerciții de tip "și apoi ce?". Mappați lanțurile de consecințe.
        Identificați efectele neintenționate înainte ca acestea să iasă la iveală.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Gândindu-vă la atât de mulți pași înainte încât niciodată nu acționați.
      false_complexity: |
        Presupunând că efectele de ordin secundar domină întotdeauna, când efectele de prim ordin
        pot fi suficiente.
      overconfidence: |
        Crezând că puteți prezice lanțuri lungi când incertitudinea se acumulează.
      pessimism: |
        Presupunând întotdeauna ce e mai rău în lanțul de consecințe.
    related_content:
      - inversion
      - pareto_principle
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Eroarea costurilor nerecuperabile
    quick_introduction: |
      Eroarea costurilor nerecuperabile este tendința de a continua investiția într-o decizie din cauza
      resurselor deja cheltuite, în loc să se bazeze pe randamentele viitoare așteptate.
      „Am ajuns atât de departe” sau „Am investit deja atât de mult” duce la aruncarea banilor buni după cei răi.
    one_liner: Investiția din trecut este pierdută — contează doar costurile și beneficiile viitoare.
    try_this:
      - Întreabă: Dacă aș începe astăzi, aș alege acest drum?
      - Definește dinainte „criteriile de abandon” — condițiile în care te vei opri.
      - Evaluează decizia marginală: ce câștig sau pierd de acum încolo?
    ask_yourself:
      - Continui din cauza valorii viitoare sau pentru a justifica investiția trecută?
      - Ce i-aș sfătui unui prieten care s-ar afla în poziția mea de la început?
    in_more_detail: |
      Costurile nerecuperabile sunt costuri din trecut care nu pot fi recuperate. Deciziile raționale
      le ignoră — contează doar costurile și beneficiile viitoare. Dar suntem atașați emoțional
      de investițiile noastre. Terminăm masa care nu ne place, rămânem la filmul care ne displace și continuăm proiecte care nu mai au sens. Vrem să „nu irosim” ceea ce am investit, dar continuarea irosește adesea mai mult.

      Eroarea este deosebit de puternică atunci când am investit timp, efort sau identitate,
      nu doar bani. A admite că am greșit poate fi costisitor, așa că dublăm miza.
    why_this_is_important: |
      Recunoașterea erorii costurilor nerecuperabile te ajută să tai pierderile, să schimbi direcția atunci când
      este cazul și să iei decizii bazate pe valoarea viitoare, nu pe investiția trecută.
      Este esențială pentru proiecte, cariere și relații.
    when_to_use:
      - luarea_deciziilor
      - investiții
      - schimbări_de_carieră
      - evaluarea_riscurilor
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        „Nu putem renunța acum — am cheltuit deja X” atunci când randamentele viitoare nu justifică
        continuarea.
      escalation_of_commitment: |
        Investirea mai multor resurse pentru a justifica sau „salva” investiția anterioară.
      identity_investment: |
        Continuarea deoarece admiterea eșecului ar amenința imaginea de sine.
      ignoring_marginal_analysis: |
        Luarea deciziilor bazată pe costul total în loc de costul și beneficiul incremental.
    examples:
      projects: |
        Continuarea unui proiect eșuat deoarece „am investit deja 6 luni în el”
        atunci când tăierea pierderilor ar fi rațională.
      relationships: |
        Rămânerea într-o relație deoarece „suntem împreună de 5 ani” în loc să
        evaluăm viitorul.
      careers: |
        Rămânerea într-o carieră care nu îți place deoarece ai investit în diplomă sau
        în ani de experiență.
      investments: |
        Păstrarea unei acțiuni în pierdere pentru a „reveni la zero” în loc să realoci fondurile către
        oportunități mai bune.
    real_world_implications: |
      Eroarea costurilor nerecuperabile duce la irosirea resurselor, prelungirea eșecurilor și pierderea oportunităților.
      Afectează indivizii, organizațiile și guvernele.
      Depășirea ei necesită cadre explicite de decizie.
    professional_application:
      networking_and_relationship_building: |
        Nu continuați să investiți în relații sau colaborări care nu vă mai sunt de folos doar din cauza investiției trecute. Evaluați valoarea orientată spre viitor.
      collaborative_learning_initiative: |
        Creați „criterii de abandon” pentru proiecte — condiții în care veți renunța
        indiferent de investiția trecută. Revizuiți periodic proiectele cu o lentilă de „de la zero”.
    how_can_this_be_misapplied:
      quitting_too_early: |
        Folosirea „costurilor nerecuperabile” ca scuză pentru a abandona lucruri care necesită mai mult timp pentru a da roade.
      undervaluing_consistency: |
        Unele angajamente (de exemplu, relații, reputație) au valoare în continuitate
        pe care analiza marginală pură o omite.
      cold_rationality: |
        Respingerea atașamentului emoțional ca fiind irațional atunci când acesta poate reflecta valori autentice.
      analysis_paralysis: |
        Supra-analiza dacă să continui atunci când răspunsul este clar.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Biasul supraviețuitorului
    quick_introduction: |
      Biasul supraviețuitorului este eroarea logică de a te concentra pe persoanele
      sau lucrurile care au "supraviețuit" unui proces, ignorându-le pe cele care
      nu au făcut-o. Vedem câștigătorii și uităm de învinși, ceea ce duce la
      concluzii prea optimiste despre succes și eșec.
    one_liner: Vedem câștigătorii și uităm de învinși – ceea ce duce la concluzii prea optimiste.
    try_this:
      - Întreabă: Cine a eșuat făcând ceva similar? Ce putem învăța de la ei?
      - Caută eșantionul "invizibil" – pe cei care nu au supraviețuit.
      - Observă când studiezi doar povești de succes.
    ask_yourself:
      - Învăț doar de la supraviețuitori?
      - Cum ar arăta imaginea completă dacă aș include și eșecurile?
    in_more_detail: |
      În timpul celui de-Al Doilea Război Mondial, statisticianul Abraham Wald a corectat plasarea blindajului pe bombardiere, analizând unde fuseseră lovite avioanele supraviețuitoare – și a recomandat blindaj acolo unde fuseseră lovite avioanele *ne*-supraviețuitoare, deoarece acele avioane nu s-au mai întors. În mod natural, ne concentrăm pe eșantionul vizibil (supraviețuitorii) și ignorăm invizibilul (cei care au eșuat).

      Biasul supraviețuitorului distorsionează viziunea noastră asupra antreprenoriatului, investițiilor, carierei și istoriei. Studiem companiile de succes și ratăm miile care au eșuat făcând lucruri similare. Auzim de la cei norocoși și îi uităm pe cei ghinioniști.
    why_this_is_important: |
      Corectarea biasului supraviețuitorului duce la așteptări mai realiste și la
      decizii mai bune. Te ajută să înveți din eșecuri, nu doar din succese, și să
      eviți copierea strategiilor care au funcționat doar pentru câțiva norocoși.
    when_to_use:
      - luarea_deciziilor
      - investiții
      - schimbări_în_carieră
      - învățare
    how_can_you_spot_it:
      visible_success_stories: |
        Auzim de la oamenii de succes mult mai mult decât de la cei care au încercat și au eșuat.
      missing_failures: |
        Eșantionul pe care îl observăm îi exclude pe cei care nu au "reușit" și, prin urmare, nu își pot spune poveștile.
      copying_survivors: |
        Presupunerea că ceea ce au făcut supraviețuitorii le-a cauzat succesul, când ar fi putut fi noroc sau biasul supraviețuitorului.
      overly_optimistic_models: |
        Estimări ale ratelor de succes care ignoră numitorul încercărilor.
    examples:
      entrepreneurship: |
        "Renunță la facultate ca Zuckerberg" ignoră numeroșii studenți care au renunțat, dar nu au fondat companii de miliarde de dolari.
      investing: |
        Studierea doar a fondurilor care au supraviețuit ignoră pe cele care s-au închis după performanțe slabe, umflând randamentele istorice.
      career_advice: |
        Persoanele de succes atribuie succesul muncii asidue; nu auzim de la cei care au muncit asiduu și au eșuat.
      historical_analysis: |
        Studierea companiilor "mari" care au supraviețuit ignoră numeroasele care au eșuat cu strategii similare.
    real_world_implications: |
      Biasul supraviețuitorului umflă ratele percepute de succes, distorsionează modelele de rol și duce la imitații greșite. Corectarea acestuia necesită căutarea cazurilor de eșec și înțelegerea ratelor de bază.
    professional_application:
      networking_and_relationship_building: |
        Când cauți sfaturi, caută și persoane care au încercat și au eșuat – perspectivele lor sunt adesea mai informative decât ale supraviețuitorilor.
      collaborative_learning_initiative: |
        Studiază proiectele eșuate și inițiativele închise, nu doar pe cele de succes. Realizează "analize post-mortem ale eșecului" pentru a învăța din ceea ce nu a funcționat.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Supra-corectarea pentru a presupune că succesul este întotdeauna noroc și efortul nu contează.
      dismissing_success: |
        Refuzul de a învăța de la oameni de succes din cauza "biasului supraviețuitorului".
      analysis_paralysis: |
        Concentrarea atât de mult pe cazurile de eșec încât nu iei niciodată nicio acțiune.
      false_equivalence: |
        Tratarea strategiilor supraviețuitorilor și ale non-supraviețuitorilor ca fiind la fel de informative când contextul diferă.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Efectul Zeigarnik
    quick_introduction: |
      Efectul Zeigarnik este tendința de a ne aminti sarcinile nefinalizate sau întrerupte
      mai bine decât pe cele completate. Sarcinile incomplete creează tensiune psihologică
      care le menține active în mintea noastră. Creierul nostru se agață de ceea ce este
      neterminat.
    one_liner: Sarcinile neterminate ne rămân în minte – creierul nostru se agață de ceea ce este incomplet.
    try_this:
      - Folosește finalizarea pentru a „elibera” sarcinile din încărcătura mentală – finalizează-le sau renunță explicit la ele.
      - Împarte munca în bucăți gestionabile pentru a crea bucle deschise productive.
      - Observă când ruminezi asupra afacerilor neterminate – închide bucla sau decide să renunți.
    ask_yourself:
      - Ce sarcini neterminate creează tensiune în mintea mea?
      - Merită păstrată această buclă deschisă sau o pot închide?
    in_more_detail: |
      Bluma Zeigarnik a observat că chelnerii își aminteau comenzile neplătite mai bine
      decât pe cele plătite – odată ce sarcina era completă, era „eliberată” din
      memorie. Sarcinile neterminate creează o buclă deschisă care cere o rezolvare. Aceasta
      conduce atât la concentrare productivă (dorim să finalizăm), cât și la anxietate (nu ne putem opri din a ne gândi la ce nu a fost făcut).

      Efectul este folosit în marketing (cliffhangers, povești incomplete) și
      în productivitate (împărțirea muncii în bucăți pentru a crea multiple „bucle deschise”).
      Explică de ce rumegăm asupra afacerilor neterminate și de ce listele de sarcini
      pot părea copleșitoare.
    why_this_is_important: |
      Înțelegerea efectului Zeigarnik te ajută să gestionezi încărcătura mentală, să proiectezi
      experiențe captivante și să folosești întreruperea în mod strategic. Explică
      de ce nu ne putem opri din a ne gândi la munca neterminată – și de ce aceasta poate fi
      exploatată sau dăunătoare.
    when_to_use:
      - rezolvarea_problemelor
      - leadership
      - invatare
      - luare_a_deciziilor
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Sarcinile neterminate se strecoară în gânduri mai mult decât cele completate.
      better_recall_of_unfinished: |
        Ne amintim sarcinile întrerupte mai bine decât pe cele terminate.
      tension_for_closure: |
        Disconfort sau impuls de a finaliza ceea ce a fost început.
      serial_dramas: |
        Cliffhangers și „va urma” exploatează efectul.
    examples:
      productivity: |
        Începerea unei sarcini creează tensiune mentală care determină finalizarea – sau
        anxietate dacă există prea multe bucle deschise.
      marketing: |
        „Partea 1 din 3” sau „Va urma” menține publicul captivat și
        atras.
      meetings: |
        Încheierea unei întâlniri fără pași următori clari lasă participanții
        cu tensiune nerezolvată.
      learning: |
        Întrebările fără răspuns sau explicațiile incomplete rămân în memorie
        și stimulează investigații suplimentare.
    real_world_implications: |
      Efectul Zeigarnik afectează productivitatea, implicarea și încărcătura mentală. Poate fi exploatat pentru concentrare sau poate crea copleșire. Explică atractivitatea cliffhanger-urilor și povara prea multor sarcini deschise.
    professional_application:
      networking_and_relationship_building: |
        Încheie conversațiile cu pași următori clari – sau bucle intenționat deschise dacă vrei ca cealaltă persoană să urmeze. Firele nerezolvate creează implicare.
      collaborative_learning_initiative: |
        Folosește efectul Zeigarnik în formare: prezintă probleme sau întrebări
        înainte de pauze pentru a menține cursanții implicați. Dar evită să creezi atât de multe
        bucle deschise încât oamenii să se simtă copleșiți.
    how_can_this_be_misapplied:
      overwhelm: |
        Crearea prea multor bucle deschise – prea multe sarcini neterminate – duce la
        anxietate și paralizie.
      manipulation: |
        Lăsarea deliberată a lucrurilor nerezolvate pentru a crea dependență sau
        implicare.
      false_urgency: |
        Utilizarea efectului pentru a crea urgență artificială atunci când nu există.
      incomplete_work: |
        Începerea multor lucruri pentru a crea „tensiune” fără a le
        finaliza efectiv – ducând la efort dispersat.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Gândirea cu sumă nulă
    quick_introduction: |
      Gândirea cu sumă nulă este credința că câștigul unei persoane trebuie să fie pierderea alteia –
      că resursele sunt fixe și orice avantaj pentru tine înseamnă dezavantaj pentru mine.
      În realitate, multe situații sunt cu sumă pozitivă: ambele părți pot câștiga.
    one_liner: Câștigul tău nu trebuie să fie pierderea mea – multe situații sunt cu sumă pozitivă.
    try_this:
      - Întreabă: Putem mări „plăcinta”? Este aceasta, de fapt, cu sumă nulă?
      - Caută cooperarea înainte de a presupune competiția.
      - Observă când tratezi o situație ca fiind fixă când nu este.
    ask_yourself:
      - Presupun că este o „plăcintă” fixă când am putea-o mări?
      - Cooperarea ar crea mai multă valoare decât competiția?
    in_more_detail: |
      Într-un joc cu sumă nulă, totalul este fix – câștigul tău este pierderea mea. În situații cu sumă pozitivă,
      cooperarea creează valoare. Comerțul, inovația și construirea relațiilor
      sunt adesea cu sumă pozitivă. Gândirea cu sumă nulă duce la competiție inutilă,
      oportunități ratate de cooperare și rivalitate distructivă.

      Părtinirea este frecventă în negocieri, politică și dinamica organizațională.
      Presupune o „plăcintă” fixă când „plăcinta” poate fi adesea mărită. Poate deveni
      autocomplinitoare: dacă tratezi pe alții ca pe adversari, ei devin adversari.
    why_this_is_important: |
      Recunoașterea gândirii cu sumă nulă deschide oportunități de cooperare și
      creare de valoare. Îmbunătățește negocierile, reduce conflictele și permite
      rezultate „win-win”. Multe dintre cele mai bune oportunități sunt cu sumă pozitivă.
    when_to_use:
      - negociere
      - leadership
      - construire_relatii
      - luare_decizii
    how_can_you_spot_it:
      fixed_pie_assumption: |
        „Dacă ei câștigă, eu pierd” când situația ar putea permite ambilor să câștige.
      competitive_ framing: |
        Încarcarea automată a situațiilor ca fiind noi versus ei.
      envy_of_others_gains: |
        Resentimentul față de succesul altora ca și cum ți-ar diminua propriul succes.
      missed_cooperation: |
        Eșecul de a vedea oportunități de colaborare care ar beneficia pe toți.
    examples:
      negotiation: |
        Presupunerea că un acord mai bun pentru partea cealaltă înseamnă un acord mai prost pentru
        tine – când soluțiile creative extind adesea valoarea pentru ambii.
      salary: |
        „Dacă colegul meu primește o mărire, rămâne mai puțin pentru mine” când bugetele pot fi
        flexibile sau măririle pot fi justificate prin valoarea creată.
      politics: |
        „Câștigurile partidului lor sunt pierderile noastre” când multe rezultate politice ar putea
        beneficia mai multe grupuri.
      career: |
        „Promovarea lor înseamnă mai puține oportunități pentru mine” când creșterea organizațională
        poate crea mai multe oportunități pentru toată lumea.
    real_world_implications: |
      Gândirea cu sumă nulă alimentează conflictele, limitează cooperarea și cauzează oportunități ratate.
      Este adesea greșită în economie, relații și
      inovație. Trecerea la o încadrare cu sumă pozitivă îmbunătățește rezultatele.
    professional_application:
      networking_and_relationship_building: |
        Caută modalități de a crea valoare pentru alții – succesul lor poate crea
        oportunități pentru tine. Construiește relații în care ambele părți beneficiază.
      collaborative_learning_initiative: |
        Încadrează obiectivele echipei ca fiind cu sumă pozitivă: succes comun, mărirea „plăcintei”.
        Încurajează colaborarea în detrimentul competiției interne.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Unele situații sunt cu sumă nulă (ex. o singură promovare, un buget fix).
        A pretinde contrariul poate fi naiv.
      naive_cooperation: |
        A presupune că toată lumea va coopera când unii actori sunt cu adevărat
        adversari.
      undervaluing_competition: |
        Competiția poate stimula îmbunătățirea; nu toată rivalitatea este distructivă.
      exploitation: |
        Utilizarea înscenării „cu sumă pozitivă” pentru a extrage valoare de la alții care nu
        beneficiază.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
