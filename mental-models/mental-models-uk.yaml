# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Ukrainian)
# Translated from mental-models-en.yaml

mental_models:
  - id: ambiguity_effect
    name: Ефект неоднозначності
    quick_introduction: |
      Ефект неоднозначності – це схильність уникати варіантів, коли нам бракує інформації
      про ймовірності результатів. Ми надаємо перевагу відомим ризикам над невідомими
      ризиками — навіть коли невідомі ризики можуть бути кращими. Сама по собі невизначеність відчувається
      неприємною.
    one_liner: Ми надаємо перевагу відомим ризикам над невідомими — навіть коли невідомі можуть бути кращими.
    try_this:
      - Запитайте: Чи я уникаю цього варіанту переважно через невизначеність, чи є реальний недолік?
      - Кількісно оцініть те, що ви знаєте; іноді "неоднозначний" варіант має чіткіші переваги.
      - Зверніть увагу, коли ви за замовчуванням обираєте знайоме, лише тому, що воно здається безпечнішим.
    ask_yourself:
      - Я відкидаю щось, тому що воно неоднозначне, чи тому, що воно справді гірше?
      - Що мені потрібно знати, щоб почуватися комфортно з невизначеним варіантом?
    in_more_detail: |
      У парадоксі Еллсберга люди надають перевагу ставці на урну з відомими пропорціями
      кульок над урною з невідомими пропорціями, навіть коли невідома урна
      може запропонувати кращі шанси. Ми не любимо неоднозначність — ми радше матимемо чітку
      (навіть якщо погану) ймовірність, ніж нечітку.

      Ефект впливає на рішення в інвестуванні, виборі кар'єри та політиці.
      Він може призвести до субоптимальних виборів, коли ми уникаємо варіантів, які є неоднозначними,
      але потенційно кращими. Це також пояснює, чому ми надаємо перевагу знайомим брендам
      і відомим величинам.
    why_this_is_important: |
      Розпізнавання ефекту неоднозначності допомагає уникнути надмірного надання переваги знайомому
      та недостатнього надання переваги невизначеному. Це може призвести до втрачених можливостей, коли
      неоднозначність керована. Це також пояснює, чому прозорість і чіткість
      зменшують тривогу.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - інвестування
      - кар'єрні_кроки
    how_can_you_spot_it:
      preference_for_known_risks: |
        Вибір варіантів з чіткими (навіть якщо гіршими) ймовірностями над неоднозначними.
      avoidance_of_uncertainty: |
        Відхилення варіантів переважно тому, що "ми недостатньо знаємо".
      familiarity_over_optimality: |
        Надання переваги відомому над потенційно кращим невідомим.
      information_seeking: |
        Готовність платити за інформацію, яка зменшує неоднозначність — навіть коли вона
        не змінює рішення.
    examples:
      investing: |
        Надання переваги вітчизняним акціям над міжнародними, тому що "ми їх краще розуміємо",
        незважаючи на переваги диверсифікації.
      employment: |
        Залишення на відомій роботі замість того, щоб зайняти посаду з невизначеним потенціалом.
      product_choice: |
        Вибір знайомого бренду замість нового варіанту з невизначеною якістю.
      medical: |
        Надання переваги лікуванню з відомими побічними ефектами над лікуванням з невизначеними
        наслідками, навіть коли останнє може бути кращим.
    real_world_implications: |
      Ефект неоднозначності формує ринки, кар'єрний вибір та політику. Його можна
      зменшити, надаючи більш чітку інформацію або перефразуючи рішення. Він
      також пояснює, чому прозорість і комунікація зменшують тривогу.
    professional_application:
      networking_and_relationship_building: |
        Зменште неоднозначність у стосунках: уточнюйте очікування, спілкуйтеся
        відкрито і зменшуйте невизначеність. Люди надають перевагу відомим ситуаціям.
      collaborative_learning_initiative: |
        При впровадженні змін зменште неоднозначність — надайте чітку інформацію про
        те, що станеться, коли і чому. Неоднозначність підвищує опір.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне створення неоднозначності для спрямування людей до бажаних варіантів.
      false_clarity: |
        Надання хибної певності, коли існує справжня невизначеність.
      overconfidence: |
        Припущення, що зменшення неоднозначності завжди покращує рішення — іноді
        неоднозначний варіант справді кращий.
      analysis_paralysis: |
        Очікування ідеальної інформації перед прийняттям рішення, коли певна неоднозначність
        неминуча.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Якірний ефект
    quick_introduction: |
      Якірний ефект — це схильність надмірно покладатися на першу отриману інформацію
      під час прийняття рішень. Цей початковий "якір" спотворює подальші судження,
      навіть коли він є нерелевантним або довільним.
    one_liner: Перше число, яке ви бачите, формує всі наступні.
    try_this:
      - Перед переговорами визначте свою цільову цифру та уникайте прив'язки до їхньої.
      - Під час оцінки спочатку згенеруйте власне число, перш ніж почути інших.
      - Запитайте: Чи думав би я інакше, якби спочатку побачив інше число?
    ask_yourself:
      - Яке число чи ідея зустрілися мені першими — і чи спотворює це моє судження?
      - Чи достатньо я коригую від якоря, чи все ще занадто близько до нього?
    in_more_detail: |
      У класичному експерименті люди, яких просили оцінити відсоток африканських країн
      в ООН, давали вищі оцінки, якщо вони щойно бачили вище число (наприклад, 65 проти 10).
      Якір — навіть коли він випадковий — вплинув на їхні відповіді. Якірний ефект впливає
      на переговори, ціноутворення, найм та прогнозування.

      Перше число, яке ми бачимо, стає точкою відліку. Ми коригуємося від нього, але
      зазвичай недостатньо. Навіть коли ми знаємо, що якір є довільним, він все одно може
      на нас впливати. Експерти не застраховані.
    why_this_is_important: |
      Розуміння якірного ефекту допомагає приймати кращі рішення, вести переговори ефективніше
      та уникати маніпуляцій. Це також пояснює, чому порядок і формулювання інформації
      мають таке велике значення.
    when_to_use:
      - прийняття_рішень
      - переговори
      - інвестування
      - оцінка_ризиків
    how_can_you_spot_it:
      first_number_dominance: |
        Перше число в переговорах або оцінці непропорційно впливає на результат.
      insufficient_adjustment: |
        При коригуванні від якоря люди зазвичай не коригуються достатньо.
      arbitrary_anchor_influence: |
        Навіть очевидно нерелевантні числа (наприклад, останні цифри номера соціального страхування)
        можуть впливати на оцінки.
      order_effects: |
        Послідовність, у якій представлено варіанти, змінює вибір.
    examples:
      salary_negotiation: |
        Перше назване число — чи то роботодавцем, чи кандидатом — часто стає якорем для
        кінцевої пропозиції.
      real_estate: |
        Ціна в оголошенні встановлює якір для сприйняття покупцями цінності, навіть коли
        вона навмисно встановлена ​​високо чи низько.
      retail: |
        "Було 99 доларів, тепер 49 доларів" використовує початкову ціну як якір, щоб зробити
        ціну продажу схожою на вигідну пропозицію.
      forecasting: |
        Початкові оцінки на нарадах з планування стають якорем для подальших прогнозів,
        навіть коли перша оцінка була припущенням.
    real_world_implications: |
      Якірний ефект формує ринки, переговори та політику. Його можна використовувати етично
      (наприклад, встановлюючи розумні очікування) або неетично (наприклад, маніпулятивне
      ціноутворення).
      Розпізнавання його покращує якість прийняття рішень.
    professional_application:
      networking_and_relationship_building: |
        На переговорах розгляньте можливість зробити першу пропозицію, щоб встановити якір —
        або будьте уважні, коли це робить інша сторона.
      collaborative_learning_initiative: |
        На нарадах будьте обережні, хто говорить першим щодо оцінок; розгляньте можливість
        збору незалежних оцінок перед обговоренням.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне використання екстремальних якорівок для спрямування інших до бажаних результатів.
      overconfidence_in_anchors: |
        Занадто велика довіра до власної першої оцінки без її перегляду.
      ignoring_relevant_information: |
        Дозволити якору пересилити більш релевантні дані.
      exploitation: |
        Тактика продажів, яка використовує завищені ціни "порівняйте з", щоб фактичні ціни
        здавалися розумними.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Каскад доступності
    quick_introduction: |
      Каскад доступності — це самопідсилюваний процес, коли ідея набуває
      переконливості завдяки багаторазовому публічному обговоренню. Чим більше її обговорюють,
      тим вона стає "доступнішою", тим більше людей у неї вірять, і тим більше її обговорюють. Колективне переконання набирає обертів незалежно від його
      істинності.
    one_liner: Чим більше повторюється ідея, тим переконливішою вона здається — незалежно від доказів.
    try_this:
      - Запитайте: Ця віра поширена тому, що вона правдива, чи тому, що її повторюють?
      - Шукайте першоджерела, перш ніж приймати "те, що знають усі".
      - Звертайте увагу, коли лише повторення викликає у вас відчуття переконливості.
    ask_yourself:
      - Чи повірив би я в це, якби почув лише один раз?
      - Чи плутаю я "всі так кажуть" з "докази це підтверджують"?
    in_more_detail: |
      Тімур Куран і Касс Санстейн описали, як працюють каскади доступності:
      доступність інформації (як часто ми щось чуємо) та переконливість (наскільки правдоподібною це здається) підсилюють одне одного. Висвітлення у ЗМІ, соціальні мережі та публічний дискурс посилюють певні ідеї. Коли ідея досягає певного порогу доступності, вона може швидко поширюватися і ставати "загальновідомою", навіть якщо вона хибна або перебільшена.

      Каскади доступності можуть бути корисними (поширення важливих попереджень)
      або шкідливими (поширення паніки чи дезінформації). Вони керуються
      евристикою доступності та соціальним доказом.
    why_this_is_important: |
      Розпізнавання каскадів доступності допомагає оцінити, чи відображає поширене
      переконання докази, чи лише повторення. Це пояснює, як ідеї стають вірусними
      і як колективні переконання можуть бути помилковими. Це надзвичайно важливо для
      медіаграмотності та критичного мислення.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - навчання
      - лідерство
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Чим більше повторюється ідея, тим переконливішою вона здається.
      media_amplification: |
        Висвітлення викликає віру, яка викликає більше висвітлення.
      social_proof_belief: |
        "Всі в це вірять" стає доказом для віри.
      threshold_effects: |
        Як тільки ідея перетинає поріг видимості, вона швидко поширюється.
    examples:
      health_scares: |
        Дослідження вказує на небезпеку продукту; ЗМІ посилюють це;
        громадськість уникає його; далі йде більше висвітлення. Ризик може бути
        перебільшеним.
      financial_panic: |
        Поширюються чутки про банкрутство банку; люди знімають кошти; наплив
        стає самоздійснюваним.
      social_media: |
        Наратив стає вірусним; повторення збільшує віру; віра
        збільшує поширення. Правда і віральність можуть розходитися.
      organizational: |
        Поширюється чутка про скорочення; зростає тривога; змінюється поведінка;
        чутка набуває переконливості через реакцію.
    real_world_implications: |
      Каскади доступності формують громадську думку, політику та ринки.
      Вони можуть поширювати як важливі істини, так і небезпечні вигадки.
      Критичне мислення вимагає розрізнення віри, що ґрунтується на доказах,
      від віри, що зумовлена каскадом.
    professional_application:
      networking_and_relationship_building: |
        Коли ідея "скрізь", запитайте: чи вона правдива тому, що її
        повторюють, чи повторюють тому, що вона правдива? Шукайте першоджерела.
      collaborative_learning_initiative: |
        Створіть норми перевірки перед поширенням. Заохочуйте
        сумніви щодо "того, що знають усі". Розрізняйте консенсус,
        що відображає докази, від консенсусу, що відображає
        доступність.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Іноді поширене переконання є правильним. Не припускайте, що всі
        популярні ідеї є каскадами.
      conspiracy_thinking: |
        Використання "каскаду доступності" для відкидання законних
        занепокоєнь як вигаданих.
      false_skepticism: |
        Відхилення добре підтверджених ідей, тому що вони популярні.
      contrarianism: |
        Припущення, що все, у що широко вірять, обов'язково є неправильним.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Евристика доступності
    quick_introduction: |
      Евристика доступності — це схильність оцінювати ймовірність подій
      за тим, наскільки легко спадають на думку приклади. Якщо ми можемо легко згадати випадки, ми
      припускаємо, що подія є поширеною. Яскраві, нещодавні чи емоційні приклади домінують
      у наших оцінках ймовірності.
    one_liner: Те, що спадає на думку легко, здається більш імовірним — навіть коли це не так.
    try_this:
      - Запитайте: Яка базова частота? Чи не перебільшую я значення яскравих чи нещодавніх прикладів?
      - Шукайте дані, коли ваше чуття підказує "це здається поширеним" або "це здається рідкісним".
      - Зверніть увагу, коли одна драматична історія керує вашою оцінкою ризику.
    ask_yourself:
      - Чи оцінюю я ймовірність за легкістю згадування, а не за реальною частотою?
      - Чи я б думав інакше, якби не побачив цю новину щойно?
    in_more_detail: |
      Ми використовуємо ментальні ярлики для оцінки частоти та ймовірності. Один з таких ярликів —
      доступність: що легко спадає на думку? Авіакатастрофи є яскравими та
      широко висвітлюються — ми переоцінюємо їхню ймовірність. Автомобільні аварії є
      поширеними, але менш помітними — ми недооцінюємо. Нещодавність, яскравість та
      емоційний вплив — усе це збільшує доступність.

      Ця евристика корисна, коли доступність корелює з реальною частотою.
      Але медіа, особистий досвід та помітність часто спотворюють цю кореляцію.
      Ми боїмося рідкісних, але яскравих ризиків і ігноруємо поширені, але буденні.
    why_this_is_important: |
      Розпізнавання евристики доступності допомагає коригувати оцінки ймовірності,
      уникати надмірної реакції на яскраві новини та приймати кращі оцінки ризиків.
      Це пояснює багато систематичних помилок у судженнях.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - інвестування
      - розв'язання_проблем
    how_can_you_spot_it:
      vividness_dominance: |
        Драматичні чи емоційні приклади непропорційно впливають на оцінки.
      recency_effect: |
        Нещодавні події здаються більш імовірними до повторення.
      personal_experience_overweighting: |
        "Я знаю когось, хто..." формує оцінки ймовірності.
      media_distortion: |
        Те, що висвітлюється, часто не відповідає тому, що є частим.
    examples:
      risk_perception: |
        Переоцінка ризику тероризму (яскраво, висвітлено) та недооцінка
        ризику серцевих захворювань (поширено, менш драматично).
      investing: |
        Нещодавні ринкові події (крах, бум) домінують у очікуваннях на майбутнє.
      hiring: |
        Одна яскрава історія про невдалий найм з певного університету впливає
        на оцінку всіх кандидатів з цього університету.
      health: |
        Діагностика раку у друга робить рак більш імовірним, ніж свідчать базові показники.
    real_world_implications: |
      Евристика доступності впливає на придбання страхування, пріоритети політики
      та особисті рішення. Її використовують медіа та маркетологи. Коригування
      для її подолання вимагає пошуку базових показників та сумніву в тому, що "спадає на думку".
    professional_application:
      networking_and_relationship_building: |
        Пам'ятайте, що один яскравий негативний досвід з людиною чи групою може
        спотворити ваше судження. Шукайте базові показники та множинні точки даних.
      collaborative_learning_initiative: |
        При оцінці ризиків чи можливостей явно запитуйте "Які базові показники?"
        та "Чи не перебільшую я значення яскравих прикладів?". Використовуйте дані для коригування
        оцінок, керованих доступністю.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Іноді доступність є інформативною — нещодавній досвід може сигналізувати про
        зміни. Не припускайте, що всі судження, керовані доступністю, є помилковими.
      analysis_paralysis: |
        Надмірне коригування до точки ігнорування законних попереджувальних знаків від
        яскравого досвіду.
      false_objectivity: |
        Припущення, що базові показники завжди правильні, коли вони можуть бути застарілими або
        незастосовними.
      manipulation: |
        Навмисне виділення певних прикладів, щоб вплинути на судження інших.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Феномен Баадера-Майнгофа
    quick_introduction: |
      Феномен Баадера-Майнгофа (також відомий як ілюзія частоти) — це коли ви дізнаєтеся
      про щось нове, а потім раптом помічаєте це всюди. Це здається збігом, але часто це
      вибірковий фокус уваги — ваш мозок налаштований на помічання того, з чим він нещодавно
      зіткнувся.
    one_liner: Ви дізнаєтеся щось нове і раптом бачите це всюди — воно завжди було там.
    try_this:
      - Коли щось здається "скрізь" після того, як ви про нього дізналися, перевірте базову ставку.
      - Помічайте, коли нещодавність змушує щось здаватися важливішим, ніж воно є насправді.
      - Запитайте: Чи я бачу реальний тренд, чи просто помічаю те, що мене налаштували помічати?
    ask_yourself:
      - Чи це насправді стало поширенішим зараз, чи я просто помічаю це частіше?
      - Чи я б помітив цей патерн, якби нещодавно про нього не дізнався?
    in_more_detail: |
      Почувши про терористичне угруповання Баадера-Майнгофа, людина може побачити згадки
      про нього в новинах, у розмові та в статтях протягом кількох днів. Феномен має два
      компоненти: вибірковий фокус уваги (ви помічаєте те, що шукаєте) та
      упередження підтвердження (ви пам'ятаєте успіхи і забуваєте провали).

      Ілюзія полягає в тому, що річ раптово стала поширенішою. Насправді, вона завжди
      була присутня; ви просто не були до неї уважні. Це може призвести до переоцінки
      поширеності або важливості нещодавно отриманої інформації.
    why_this_is_important: |
      Розпізнавання феномену Баадера-Майнгофа допомагає уникнути переоцінки того, наскільки
      щось поширене або важливе на основі нещодавнього досвіду. Це також пояснює, чому нові
      ідеї, продукти або тренди можуть здаватися "скрізь" після того, як ви їх вперше помітили.
    when_to_use:
      - прийняття_рішень
      - навчання
      - оцінка_ризиків
      - вирішення_проблем
    how_can_you_spot_it:
      sudden_ubiquity: |
        Ви вивчаєте нове слово, концепцію або продукт і протягом кількох днів відчуваєте,
        що бачите це постійно.
      recency_bias: |
        Нещодавня інформація здається більш репрезентативною для реальності, ніж є насправді.
      pattern_seeking: |
        Ваш мозок пов'язує непов'язані спостереження в розповідь про те, що "це всюди".
      forgetting_the_misses: |
        Ви не відстежуєте, як часто ви *не* бачите річ — лише ті випадки, коли ви її бачите.
    examples:
      vocabulary: |
        Вивчення слова "serendipity" (серeндипність), а потім помічання його в трьох різних
        статтях того ж тижня.
      car_purchase: |
        Після рішення купити певну модель автомобіля, ви бачите її на кожній вулиці — хоча
        вона завжди була там.
      health_anxiety: |
        Читання про рідкісний симптом, а потім помічання схожих відчуттів у себе, що призводить
        до непотрібної тривоги.
      trends: |
        Відкриття нового додатку або тренду та відчуття, що він раптово домінує — хоча він
        може мати невелику базу користувачів.
    real_world_implications: |
      Феномен впливає на те, як ми сприймаємо тренди, ризики та можливості. Маркетологи
      та ЗМІ можуть його використовувати, створюючи повторний досвід. При прийнятті рішень
      це може призвести до надмірної ваги нещодавньої інформації.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось неодноразово згадує тему після того, як про неї дізнався, усвідомте, що
        він може відчувати ілюзію частоти — тема не обов'язково стає більш актуальною,
        а просто більш помітною для нього.
      collaborative_learning_initiative: |
        Під час навчання підкреслюйте, що "бачити це всюди" після вивчення чогось нового —
        це нормально; заохочуйте перевіряти базові ставки, а не довіряти відчуттю всюдисущості.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Припущення, що щось є більш поширеним або важливим, ніж є насправді, тому що ви
        нещодавно часто це помічали.
      confirmation_bias_amplification: |
        Використання відчуття "бачити це всюди" як доказу правильності переконання.
      decision_distortion: |
        Прийняття рішень на основі нещодавно отриманої інформації, яка здається непропорційно
        важливою.
      vulnerability_to_manipulation: |
        Рекламодавці та пропагандисти використовують повторний досвід для створення ілюзії
        всюдисущості та важливості.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: Ефект Барнума
    quick_introduction: |
      Ефект Барнума (або ефект Форрера) — це тенденція сприймати розпливчасті, загальні описи особистості як унікально точні. Гороскопи, ворожки та тести особистості використовують твердження, які стосуються майже всіх, але ми віримо, що вони специфічні саме для нас. Ми бачимо себе у загальному.
    one_liner: Розпливчасті твердження здаються особистими, тому що стосуються майже всіх.
    try_this:
      - Ask: Чи може цей опис стосуватися багатьох людей? Перевірте це на комусь іншому.
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - Чи здавалося б це відгук точним, якби його надали незнайомій людині?
      - Чи я пригадую ті випадки, коли воно спрацювало, і забуваю ті, коли ні?
    in_more_detail: |
      Психолог Бертрам Форрер дав студентам ідентичний "персоналізований" відгук (наприклад, "Вам потрібна, щоб інші люди вас любили та захоплювалися вами"), і вони оцінили його як високоточний. Твердження були настільки розпливчастими, що підходили будь-кому. П. Т. Барнум, як повідомляють, сказав: "Шахрай народжується щохвилини" — ефект названий на честь його майстерності залучати маси за допомогою загальностей, які здаються персональними.

      Ефект працює тому, що ми добре знаходимо особисту релевантність у неоднозначних твердженнях. Ми пам'ятаємо те, що підходить, і забуваємо те, що ні. Це основа холодної читки та багатьох "особистісних" продуктів.
    why_this_is_important: |
      Розпізнавання ефекту Барнума допомагає оцінювати тести особистості, протистояти маніпуляціям та уникати надмірного тлумачення розпливчастих відгуків. Це пояснює, чому гороскопи здаються точними та чому деякі "персоналізовані" поради є загальними.
    when_to_use:
      - прийняття_рішень
      - навчання
      - оцінка_ризиків
      - побудова_відносин
    how_can_you_spot_it:
      vague_accuracy: |
        Відгук, який здається особистим, але міг би стосуватися багатьох людей.
      selective_fit: |
        Ми зосереджуємося на тому, що підходить, і ігноруємо те, що ні.
      cold_reading: |
        Хтось "читає" вас за допомогою тверджень, які насправді є загальними.
      personality_test_enthusiasm: |
        Не критичне сприйняття результатів тесту як унікально проникливих.
    examples:
      horoscopes: |
        "Ви іноді сумніваєтеся у своїх рішеннях" здається особистим, але стосується
        більшості людей.
      fortune_telling: |
        Розпливчасті прогнози, які ми інтерпретуємо як специфічні для нашої ситуації.
      personality_tests: |
        Деякі тести використовують твердження Барнума і здаються точними, не будучи
        диференційованими.
      feedback: |
        Загальні відгуки про ефективність, які ми інтерпретуємо як глибоко
        персоналізовані.
    real_world_implications: |
      Ефект Барнума використовується в астрології, деяких коучингових програмах та
      неякісних тестах. Він може створити хибну впевненість у недійсних інструментах. Він також пояснює, чому ми схильні до
      лестощів та загальних позитивних відгуків.
    professional_application:
      networking_and_relationship_building: |
        Отримуючи відгуки, запитайте: "Чи це може стосуватися багатьох людей?".
        Шукайте специфічні, поведінкові відгуки, а не загальні похвали чи критику. Будьте скептичні щодо "персоналізованих" висновків, які здаються надто хорошими.
      collaborative_learning_initiative: |
        Використовуючи тести, обирайте валідовані інструменти з дискримінаційною
        валідністю. Уникайте інструментів, які покладаються на твердження Барнума.
        Навчайте людей розпізнавати розпливчасті відгуки.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Не всі персоналізовані відгуки є Барнумом — деякі справді
        специфічні. Не відкидайте все розпливчасте.
      invalidating_experience: |
        Говорити комусь, що його досвід проникнення в суть — це "просто Барнум",
        коли це може мати для нього цінність.
      overcorrection: |
        Відкидання всіх особистісних рамок, тому що деякі використовують твердження Барнума.
      false_skepticism: |
        Припускати, що оскільки щось здається точним, воно обов'язково є Барнумом — іноді речі є точними.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Помилка базової ставки
    quick_introduction: |
      Помилка базової ставки — це тенденція ігнорувати загальну статистичну інформацію
      (базові ставки) на користь конкретної, яскравої інформації. Ми переоцінюємо
      окремий випадок і недооцінюємо апріорну ймовірність. Одна переконлива
      історія може переважити те, що говорять цифри.
    one_liner: Переконлива історія може переважити те, що говорять цифри.
    try_this:
      - Перед тим, як судити про справу, запитайте: Яка базова ставка для такого типу ситуації?
      - Поєднайте конкретні докази з апріорною ймовірністю — не ігноруйте жодне з них.
      - Помічайте, коли один яскравий приклад заглушає статистику.
    ask_yourself:
      - Чи переоцінюю я цей конкретний випадок і недооцінюю базову ставку?
      - Що б сказали цифри, якби я відклав переконливу історію?
    in_more_detail: |
      Якщо хвороба вражає 1% населення, а тест має 95% точність, позитивний
      результат часто означає, що людина, ймовірно, все ще не хвора — тому що базова ставка
      дуже низька. Але ми ігноруємо базові ставки та зосереджуємося на "у них позитивний тест".
      Нас зваблює специфіка над статистикою.

      Ця помилка впливає на медичну діагностику, наймання, оцінку ризиків та юридичні
      рішення. Нам потрібно поєднувати базові ставки з доказовою базою окремого випадку,
      використовуючи баєсівське мислення — але ми часто цього не робимо.
    why_this_is_important: |
      Виправлення помилки базової ставки покращує діагностику, оцінку ризиків
      та якість прийняття рішень. Це запобігає надмірній реакції на яскраві випадки та
      недооцінці статистичної реальності.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - вирішення_проблем
      - інвестування
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Базові ставки не враховуються при прийнятті суджень.
      vividness_over_statistics: |
        Один випадок або історія домінує над агрегованими даними.
      diagnostic_overweighting: |
        Переоцінка нових доказів (наприклад, результату тесту) без урахування базової ставки.
      anecdote_override: |
        "Я знаю когось, хто..." переважає статистичні докази.
    examples:
      medical: |
        Позитивний тест на рідкісне захворювання — базова ставка низька, тому позитив
        часто є хибнопозитивним. Ми ігноруємо це і припускаємо, що людина хвора.
      hiring: |
        Кандидат чудово пройшов співбесіду — ми ігноруємо базові ставки щодо того, наскільки добре
        співбесіди прогнозують ефективність.
      risk: |
        Авіакатастрофа — це яскраво — ми переоцінюємо ризик авіаперельотів і недооцінюємо
        ризик автомобільних поїздок, ігноруючи базові ставки.
      startup_investing: |
        Засновник добре представляє свою ідею — ми ігноруємо той факт, що більшість стартапів зазнають невдачі незалежно від якості презентації.
    real_world_implications: |
      Помилка базової ставки впливає на медичні рішення, юридичні висновки та
      бізнес-стратегії. Вона сприяє неправильному розподілу ресурсів та
      поганій оцінці ризиків. Баєсівське мислення коригує це.
    professional_application:
      networking_and_relationship_building: |
        При оцінці людей враховуйте базові ставки: наприклад, як часто трапляється такий
        тип поведінки? Не дозволяйте одній яскравій взаємодії переважати
        загальну картину.
      collaborative_learning_initiative: |
        При прийнятті рішень чітко сформулюйте та врахуйте базові ставки перед
        включенням доказів, специфічних для даного випадку. Навчайте команди баєсівському мисленню.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Ігнорування сильних доказів, специфічних для даного випадку, коли базові ставки свідчать про протилежне —
        іноді окремий випадок є винятком.
      stereotyping: |
        Використання базових ставок для несправедливих суджень про окремих осіб.
      false_precision: |
        Застосування базових ставок з фальшивою точністю, коли вони є грубими оцінками.
      dismissing_individuals: |
        "Статистика говорить X", коли людина перед вами може не відповідати
        розподілу.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Теорема Байєса
    quick_introduction: |
      Теорема Байєса описує, як оновити ймовірність гіпотези, отримавши нові докази.
      Вона формалізує ідею про те, що переконання повинні змінюватися пропорційно тому,
      наскільки добре докази їх підтверджують — не все або нічого, а поступово.
    one_liner: Оновлюйте переконання пропорційно тому, наскільки докази їх підтверджують.
    try_this:
      - Почніть зі свого апріорного переконання; запитайте, наскільки ймовірними були б докази, якби ви помилялися.
      - Оновлюйте поступово — не переходьте від 0% до 100% на основі одного показника.
      - Розгляньте альтернативні гіпотези: чи підійшли б докази їм також?
    ask_yourself:
      - Наскільки насправді ці докази змінюють ймовірність?
      - Чи оновлюю я свої переконання, чи просто підтверджую те, що вже думав?
    in_more_detail: |
      Теорема стверджує, що ймовірність гіпотези за наявності доказів дорівнює
      апріорній ймовірності, помноженій на ймовірність доказів за наявності гіпотези,
      розділеній на ймовірність самих доказів. На практиці: почніть зі свого
      апріорного переконання, оцініть, наскільки нові докази узгоджуються з вашою
      гіпотезою порівняно з альтернативами, і відповідно оновіть.

      Байєсівське мислення протидіє упередженню підтвердження, вимагаючи розглянути,
      наскільки ймовірними були б докази, якби ви помилялися. Це основа ймовірнісного
      мислення та наукового оновлення.
    why_this_is_important: |
      Байєсівське мислення покращує прийняття рішень в умовах невизначеності,
      допомагає уникнути надмірної впевненості та надає основу для навчання на
      основі доказів. Воно є важливим для діагностики, прогнозування та будь-якої
      сфери з невизначеністю.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - оцінка_ризиків
      - навчання
    how_can_you_spot_it:
      prior_and_update: |
        Починати з базового переконання та коригувати його на основі нових доказів.
      likelihood_ratio_thinking: |
        Ставити запитання: "Наскільки ймовірні ці докази, якщо я правий, порівняно з тим, якщо я помиляюся?"
      incremental_updating: |
        Переконання змінюються поступово з появою доказів, а не різко.
      base_rate_respect: |
        Апріорні ймовірності (базові ставки) мають значення, а не лише останні дані.
    examples:
      medical_diagnosis: |
        Позитивний тест на рідкісне захворювання — апріорна (низька поширеність) означає,
        що позитивний результат часто є хибнопозитивним. Байєс оновлює ймовірність.
      forecasting: |
        Оновлення прогнозів у міру надходження нових даних, замість того, щоб дотримуватися
        початкових оцінок.
      hiring: |
        Починати з базових ставок відповідності посаді, а потім оновлювати на основі
        результатів співбесіди.
      investing: |
        Оновлення ймовірності успіху компанії в міру надходження нової інформації
        (прибутки, новини).
    real_world_implications: |
      Байєсівське мислення лежить в основі сучасного ШІ, медичної діагностики та
      наукового висновку. Воно виправляє ігнорування базової ставки та упередження
      підтвердження. Це потужний інструмент для будь-якої сфери з невизначеністю.
    professional_application:
      networking_and_relationship_building: |
        Оновлюйте свої переконання про людей на основі нових доказів, а не тримайтеся
        за перші враження. Розглядайте базові ставки (наприклад, наскільки поширеною
        є така поведінка?), інтерпретуючи дії.
      collaborative_learning_initiative: |
        Заохочуйте команди явно формулювати апріорні переконання перед обговореннями,
        а потім оновлювати їх під час представлення доказів. Зменшує ефект прив'язки
        та упередження підтвердження.
    how_can_this_be_misapplied:
      overprecision: |
        Призначення точних ймовірностей, коли невизначеність висока.
      prior_rigidity: |
        Притримання сильних апріорних переконань і недостатнє оновлення з новими доказами.
      base_rate_tyranny: |
        Ігнорування сильних доказів, тому що базові ставки вказують на інше — іноді
        докази повинні мати перевагу.
      false_sophistication: |
        Використання байєсівської термінології, щоб здаватися ретельним, не проводячи
        фактичних міркувань.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: Ефект Бенджаміна Франкліна
    quick_introduction: |
      Ефект Бенджаміна Франкліна — це психологічний феномен, за яким люди починають більше
      симпатизувати комусь після того, як зробили для цієї людини послугу. Всупереч інтуїції,
      що ми робимо послуги тим, хто нам подобається, ми часто починаємо подобатися тим,
      для кого ми зробили послуги.
    one_liner: Ми починаємо подобатися людям, яким робили послуги — наші установки йдуть за нашими діями.
    try_this:
      - Якщо ви хочете покращити стосунки, подумайте про те, щоб попросити про невелику послугу.
      - Зверніть увагу, коли надання послуги змінює ваші почуття до когось.
      - Пам'ятайте, що інші можуть почати більше вас любити після того, як допомогли вам.
    ask_yourself:
      - Чи змінило надання послуги комусь мої почуття до нього/неї?
      - Чи раціоналізую я свої зусилля, підвищуючи свою прихильність до них?
    in_more_detail: |
      Бенджамін Франклін відомо описав, як завоювати прихильність суперника-законодавця,
      попросивши позичити рідкісну книгу з його бібліотеки. Після того, як чоловік погодився,
      Франклін повернув її з подячним листом. Стосунки помітно покращилися. Ефект свідчить
      про те, що наші установки йдуть за нашими діями: коли ми вкладаємо зусилля в допомогу
      комусь, ми раціоналізуємо ці зусилля, підвищуючи свою позитивну прихильність до них.

      Теорія когнітивного дисонансу пояснює це: коли ми робимо послугу людині, яка нам
      не подобається або до якої ми ставимося нейтрально, ми відчуваємо напругу між
      нашою дією (допомога) та нашою установкою (неприхильність). Вирішення цієї напруги,
      подобавшись їй більше, часто легше, ніж визнати, що ми діяли всупереч своїм уподобанням.
    why_this_is_important: |
      Розуміння ефекту Бенджаміна Франкліна допомагає вам стратегічно будувати стосунки
      і розпізнавати, коли ваші власні почуття можуть бути під впливом минулих послуг.
      Це також пояснює, чому прохання про дрібні послуги може бути ефективнішим, ніж
      їх пропонування, коли ви намагаєтеся покращити стосунки.
    when_to_use:
      - побудова_відносин
      - переговори
      - лідерство
      - вирішення_конфліктів
    how_can_you_spot_it:
      liking_after_helping: |
        Зверніть увагу, коли ви відчуваєте теплоту до когось після того, як зробили йому
        послугу, навіть якщо раніше ви ставилися до нього нейтрально або негативно.
      others_requesting_small_favors: |
        Коли хтось повторно просить про дрібні послуги, він може свідомо чи несвідомо
        використовувати цей ефект для налагодження стосунків.
      attitude_shift_post_investment: |
        Після того, як ви вклали час або зусилля в допомогу комусь, спостерігайте, чи
        змінилася ваша думка про цю людину в позитивний бік.
      reciprocal_relationship_dynamics: |
        Стосунки, в яких одна людина зробила багато послуг, можуть відчуватися незбалансованими
        в плані прихильності, незважаючи на видиму збалансованість у діях.
    examples:
      networking: |
        Прохання до колеги про відгук щодо чернетки, що призводить до того, що він відчуває
        себе більш залученим до вашого успіху та більш позитивно налаштованим до вас.
      sales: |
        Продавець просить потенційного клієнта про невелику послугу (наприклад, рекомендацію
        або знайомство), що підвищує залученість і симпатію потенційного клієнта.
      conflict_resolution: |
        Після суперечки прохання до іншої сторони про допомогу з чимось не пов'язаним
        може пом'якшити напруженість і відновити добрі стосунки.
      mentoring: |
        Коли старша особа просить молодшу про пораду або допомогу, молодша особа часто
        відчуває себе більш цінною та пов'язаною.
    real_world_implications: |
      Ефект Бенджаміна Франкліна впливає на найм, продажі, дипломатію та повсякденну
      соціальну динаміку. Його можна використовувати етично для налагодження стосунків
      або неетично для маніпулювання прихильністю. Розуміння його допомагає зрозуміти,
      чому деякі стосунки стають міцнішими після асиметричного надання послуг.
    professional_application:
      networking_and_relationship_building: |
        При побудові стосунків подумайте про те, щоб попросити про невеликі, розумні послуги,
        а не тільки пропонувати їх. Акт допомоги створює залученість і позитивну прихильність.
      collaborative_learning_initiative: |
        У командах, коли члени допомагають один одному (наприклад, взаємний перегляд,
        крос-тренінги), це може зміцнити згуртованість. Структуруйте співпрацю так, щоб
        кожен як давав, так і отримував допомогу.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне прохання про послуги виключно для того, щоб хтось вас полюбив, без справжньої
        потреби, може сприйматися як експлуатація, якщо це виявиться.
      overreliance_on_favors: |
        Припущення, що одні лише послуги виправлять зруйновані стосунки; деякі конфлікти
        вимагають прямої розмови та відповідальності.
      asymmetric_exploitation: |
        Повторне прохання про послуги без взаємності може призвести до негативних наслідків
        і викликати обурення.
      misattributing_motives: |
        Приписування чиєїсь теплоти як виключно щирої, коли це може бути частково
        результатом послуг, які ця людина зробила для вас.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Обмежена раціональність
    quick_introduction: |
      Обмежена раціональність – це ідея про те, що людське прийняття рішень обмежене доступною інформацією, когнітивними здібностями та часом. Ми не оптимізуємо; ми "задовольняємося" – вибираємо варіанти, які є достатньо хорошими, а не найкращими з можливих.
    one_liner: Ми задовольняємося – вибираємо достатньо хороше, а не оптимальне.
    try_this:
      - Спрощуйте вибір, коли це можливо; занадто багато варіантів перевантажують обмежену раціональність.
      - Заздалегідь встановлюйте критерії "достатньо добре", щоб уникнути нескінченного пошуку.
      - Помічайте, коли ви оптимізуєте до точки зменшення віддачі.
    ask_yourself:
      - Чи намагаюся я знайти ідеальний варіант, коли достатньо буде "досить добре"?
      - Які обмеження (час, інформація, увага) обмежують моє рішення?
    in_more_detail: |
      Герберт Саймон ввів цю концепцію, щоб кинути виклик класичному економічному припущенню про раціональних суб'єктів з досконалою інформацією. Насправді, ми маємо обмежену увагу, робочу пам'ять та час. Ми використовуємо евристики та скорочення, щоб приймати рішення, які є "раціональними" з огляду на наші обмеження, навіть якщо вони не є оптимальними в ідеальному сенсі.

      Обмежена раціональність пояснює, чому ми не завжди вибираємо найкращий варіант, чому ми покладаємося на правила "на око", і чому контекст та спосіб подання інформації мають таке велике значення. Це описова модель того, як ми насправді приймаємо рішення, а не предписання того, як ми повинні це робити.
    why_this_is_important: |
      Розуміння обмеженої раціональності допомагає вам розробляти кращі процеси, спрощувати вибір для інших і встановлювати реалістичні очікування щодо якості рішень. Це також пояснює, чому "ірраціональна" поведінка часто є раціональною за певних обмежень.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - лідерство
      - оцінка_ризиків
    how_can_you_spot_it:
      satisficing_behavior: |
        Люди обирають перший прийнятний варіант, замість того, щоб вичерпно порівнювати.
      heuristic_reliance: |
        Рішення приймаються за допомогою евристик (правил "на око") замість повного аналізу.
      context_dependence: |
        Одна й та сама людина приймає різні рішення залежно від того, як представлені варіанти.
      information_overload: |
        Коли доступно надто багато інформації, якість рішень може знизитися.
    examples:
      hiring: |
        Менеджер наймає першого кандидата, який відповідає мінімальним вимогам, замість того, щоб нескінченно проводити співбесіди, щоб знайти "найкращого" кандидата.
      consumer_choice: |
        Покупці обирають з перших кількох варіантів на полиці, замість того, щоб порівнювати кожен продукт у магазині.
      policy: |
        Виборці використовують приналежність до партії або кілька ключових питань як скорочення, замість того, щоб аналізувати кожну політичну позицію.
      daily_routines: |
        Люди дотримуються звичок і стандартних налаштувань, замість того, щоб щоразу переоптимізовувати кожне рішення.
    real_world_implications: |
      Обмежена раціональність формує ринки, розробку політики та організаційну поведінку. "Підштовхування" (nudges) та архітектура вибору працюють, тому що вони враховують наші обмеження. Ігнорування цього призводить до надмірно складних систем, якими люди не можуть ефективно користуватися.
    professional_application:
      networking_and_relationship_building: |
        Не очікуйте, що інші будуть обробляти складні компроміси в реальному часі. Спрощуйте вибір та надавайте чіткі стандартні варіанти.
      collaborative_learning_initiative: |
        Розробляйте процеси, які працюють з обмеженою раціональністю: зменшуйте вибір, надавайте стандартні варіанти та використовуйте контрольні списки для складних рішень.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Розробка процесів, які припускають необмежені когнітивні здібності, що призводить до втоми від прийняття рішень та поганих результатів.
      blaming_irrationality: |
        Відкидання виборів інших як ірраціональних, без урахування їхніх обмежень.
      exploitation: |
        Навмисне перевантаження людей складністю, щоб спрямувати їх до бажаних результатів.
      perfectionism: |
        Очікування оптимальних рішень, коли "задоволення" часто є раціональним підходом.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Ефект свідка
    quick_introduction: |
      Ефект свідка — це тенденція, коли людям менш ймовірно надавати допомогу, коли присутні інші. Чим більше свідків, тим менш ймовірно, що хтось один діятиме. Відповідальність розсіюється; ми припускаємо, що хтось інший допоможе.
    one_liner: Чим більше людей присутні, тим менш ймовірно, що хтось один діятиме.
    try_this:
      - В екстрених ситуаціях призначайте відповідальність безпосередньо: Ти, телефонуй 911.
      - Не припускайте, що хтось інший допоможе — дійте або делегуйте явно.
      - Звертайте увагу, коли ви чекаєте, що інші діятимуть першими.
    ask_yourself:
      - Чи розсіюю я відповідальність, тому що присутні інші?
      - Чи діяв би я інакше, якби був один?
    in_more_detail: |
      Після вбивства Кітті Дженовезе (хоча історія частково міфологізована) дослідники виявили, що присутність інших зменшує допомогу. Ми шукаємо підказок у інших — якщо ніхто не діє, ми інтерпретуємо це як "дія не потрібна". Ми також відчуваємо розсіювання відповідальності: коли присутні багато людей, кожен відчуває меншу особисту відповідальність. Може виникати множинне незнання: кожен думає, що щось не так, але ніхто не діє, тому що ніхто інший не діє.

      Ефект найсильніший, коли ситуація неоднозначна і коли свідки не знають один одного. Його можна подолати прямим призначенням відповідальності («Ти, телефонуй 911»).
    why_this_is_important: |
      Розуміння ефекту свідка допомагає вам діяти, коли інші не діють, та розробляти системи, які його подолають. Якщо у вас проблема, визначте одну людину. Якщо ви свідок, не чекайте, поки діятимуть інші.
    when_to_use:
      - лідерство
      - побудова_відносин
      - вирішення_конфліктів
      - прийняття_рішень
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        «Зробить хтось інший», коли присутні багато.
      pluralistic_ignorance: |
        Кожен думає, що потрібна дія, але ніхто не діє, тому що ніхто інший не діє.
      social_proof_inaction: |
        Бездіяльність інших інтерпретується як «дія не потрібна».
      audience_inhibition: |
        Страх виглядати дурним або надмірно реагувати заважає діяти.
    examples:
      emergency: |
        Людина падає; з багатьма свідками, кожен менш ймовірно покличе на допомогу.
      workplace: |
        Всі бачать проблему, але ніхто її не піднімає — кожен припускає, що це зробить хтось інший.
      harassment: |
        Свідки домагань не втручаються, кожен думаючи, що інші діятимуть.
      meetings: |
        Погана ідея залишається без заперечень, тому що кожен припускає, що хтось інший висловиться.
    real_world_implications: |
      Ефект свідка може мати трагічні наслідки в екстрених ситуаціях і дозволяє проблемам зберігатися в організаціях. Його подолання вимагає прямого розподілу відповідальності та норм, що заохочують втручання.
    professional_application:
      networking_and_relationship_building: |
        Коли вам потрібна допомога, зверніться до конкретної людини. Коли ви бачите щось неправильне, дійте — не припускайте, що інші допоможуть. Створюйте норми, де висловлюватися очікується та винагороджується.
      collaborative_learning_initiative: |
        Навчіть людей розпізнавати ефект свідка та втручатися. Використовуйте «якщо бачиш щось, скажи про це» та призначайте чіткі ролі. Винагороджуйте тих, хто говорить першим.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Суворе осудження окремих осіб, коли ефект є потужною ситуаційною силою — зосередьтеся на зміні ситуації.
      false_assumption: |
        Припущення, що хтось завжди допоможе, якщо достатньо людей присутні — часто навпаки.
      overcorrection: |
        Зробити всіх відповідальними, щоб ніхто не був — розсіювання може все ще відбуватися.
      individualizing: |
        Розгляд ефекту свідка як вади характеру, а не як ситуаційного явища.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Коло компетенцій
    quick_introduction: |
      Коло компетенцій — це ментальна модель, яка закликає вас знати межі
      своєї експертизи та залишатися в них під час прийняття важливих рішень. Воррен Баффет
      і Чарлі Мангер наголошують на тому, щоб знати, чого ви не знаєте.
    one_liner: Знайте межі своєї експертизи — і залишайтеся в них, коли це важливо.
    try_this:
      - Визначте, де у вас є справжня експертиза, а де ви здогадуєтеся.
      - Поза межами свого кола шукайте поради або делегуйте.
      - Будьте чесними: чи погодився б справжній експерт із вашим судженням тут?
    ask_yourself:
      - Я в межах свого кола компетенцій, чи я здогадуюся?
      - Коли я востаннє визнавав "Я не знаю" в цій галузі?
    in_more_detail: |
      Кожна людина має сфери, в яких вона має справжню експертизу — де вона може оцінювати
      інформацію, виявляти помилки та робити надійні судження. Поза цим колом, вона
      схильна до тих самих упереджень і помилок, що й будь-хто інший. Ключ у чесній
      самооцінці: де ви справді компетентні, а де ви здогадуєтеся?

      Коло може розширюватися завдяки свідомому навчанню, але це вимагає скромності, щоб
      розпізнати його поточні межі. Робота поза межами свого кола збільшує ризик дороговартісних
      помилок, особливо коли ставки високі.
    why_this_is_important: |
      Перебування в межах свого кола компетенцій зменшує кількість дороговартісних помилок і покращує
      якість прийняття рішень. Це також допомагає вам знати, коли шукати поради, делегувати
      або утримуватися. Надмірна самовпевненість поза межами свого кола є головним джерелом невдач.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - кар'єрні_зміни
      - оцінка_ризиків
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Чи можете ви пояснити межі своїх знань у певній галузі? Чи знаєте ви, чого ви не знаєте?
      knowing_when_to_defer: |
        Розпізнавання ситуацій, коли слід шукати експертну думку, а не вирішувати самостійно.
      consistent_track_record: |
        У межах свого кола ваші судження з часом підтверджуються; поза ним — ні.
      calibration: |
        Ваша впевненість у певній галузі відповідає вашій фактичній ефективності в цій галузі.
    examples:
      investing: |
        Баффет уникає акцій технологічних компаній, тому що, за його словами, вони поза межами його кола
        компетенцій — він не може надійно їх оцінити.
      career: |
        Спеціаліст, який залишається у своїй галузі, проти того, хто бере на себе "складну" роль у
        непов'язаній галузі.
      hiring: |
        Знання, коли покладатися на власне судження, а коли залучати фахівців для
        технічних посад.
      advice_giving: |
        Відмова висловлювати думку з тем, що виходять за межі вашої експертизи, замість того, щоб здогадуватися.
    real_world_implications: |
      Коло компетенцій є ключовим для вартісного інвестування та професійного успіху.
      Ігнорування його призводить до надмірної самовпевненості, невдалих проєктів і поганих порад. Розширення
      кола вимагає свідомих зусиль і чесного зворотного зв'язку.
    professional_application:
      networking_and_relationship_building: |
        Будуйте стосунки з людьми, чиї кола компетенцій доповнюють ваші.
        Знайте, коли краще представити інших, ніж відповідати самому.
      collaborative_learning_initiative: |
        Створюйте команди з перетинаючимися та доповнюючими колами. Заохочуйте людей сигналізувати, коли вони працюють поза межами своєї компетенції.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Ніколи не виходити за межі свого кола може обмежувати зростання та навчання.
      false_modesty: |
        Заявлення надзвичайно малого кола, щоб уникнути відповідальності або складних рішень.
      gatekeeping: |
        Використання "кола компетенцій" для відхилення аргументів інших без їх розгляду.
      stagnation: |
        Ставлення до кола як до фіксованого, а не як до чогось, що може розширюватися з зусиллями.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Когнітивний дисонанс
    quick_introduction: |
      Когнітивний дисонанс – це психічний дискомфорт, який ми відчуваємо, коли маємо суперечливі переконання або коли наші дії суперечать нашим переконанням. Ми мотивовані зменшити цей дискомфорт, часто змінюючи свої переконання, щоб відповідати нашим діям, а не навпаки.
    one_liner: Ми частіше змінюємо свої переконання, щоб відповідати нашим діям, ніж навпаки.
    try_this:
      - Помічайте, коли ви раціоналізуєте, щоб зменшити дискомфорт, замість того, щоб змінювати поведінку.
      - Запитайте: чи коригую я свої переконання, щоб виправдати те, що зробив?
      - Розгляньте, чи буде зміна дії чеснішою, ніж зміна переконання.
    ask_yourself:
      - Чи зменшую я дисонанс шляхом раціоналізації, чи фактичною зміною?
      - Чи дотримувався б я цього переконання, якби вже не діяв таким чином?
    in_more_detail: |
      Теорія Леона Фестінгера пояснює, що ми прагнемо до послідовності. Коли ми діємо всупереч нашим цінностям (наприклад, брешемо, марнуємо гроші), ми відчуваємо дисонанс. Щоб зменшити його, ми можемо змінити своє переконання («Це насправді не була брехня») або мінімізувати дію («Це було не так вже й погано»). Ми часто раціоналізуємо, а не реформуємося.

      Когнітивний дисонанс зумовлює ефект Бенджаміна Франкліна (нам подобаються люди, яким ми допомогли), пояснює, чому ми виправдовуємо минулі рішення, і лежить в основі багатьох самообманів. Це потужна сила у формуванні та зміні переконань.
    why_this_is_important: |
      Розуміння когнітивного дисонансу допомагає вам розпізнавати власні раціоналізації та розуміти, чому люди чинять опір зміні своєї думки. Це також пояснює, чому зобов'язання та послідовність є потужними принципами переконання.
    when_to_use:
      - прийняття_рішень
      - побудова_відносин
      - лідерство
      - вирішення_конфліктів
    how_can_you_spot_it:
      post_decision_rationalization: |
        Після вибору ми підкреслюємо позитивні сторони свого вибору та негативні сторони відхилених варіантів.
      belief_action_alignment: |
        Ми коригуємо переконання, щоб вони відповідали вже вчиненим діям.
      discomfort_with_inconsistency: |
        Неспокій, коли ми помічаємо, що наша поведінка не відповідає нашим заявленим цінностям.
      resistance_to_disconfirming_evidence: |
        Відкидання або мінімізація інформації, яка суперечить нашим зобов'язанням.
    examples:
      purchase_justification: |
        Після покупки дорогої речі ми підкреслюємо її переваги та применшуємо вартість.
      relationship: |
        Ми раціоналізуємо перебування у поганих стосунках, зосереджуючись на хорошому і мінімізуючи погане.
      career: |
        Ми виправдовуємо перебування на роботі, яка нам не подобається, підкреслюючи причини, чому ми «мусимо» залишатися.
      beliefs: |
        Коли наші дії суперечать нашим цінностям, ми змінюємо свої цінності («Я насправді не вегетаріанець – я просто їм м’ясо іноді»), а не свої дії.
    real_world_implications: |
      Когнітивний дисонанс формує формування переконань, споживчу поведінку та політичні погляди. Він пояснює, чому люди подвоюють ставки після поганих рішень і чому зміна поведінки може змінити переконання.
    professional_application:
      networking_and_relationship_building: |
        Малі зобов'язання можуть призвести до більших – люди раціоналізують свої минулі вчинки. Використовуйте це етично: починайте з маленьких прохань. Усвідомлюйте, коли ви раціоналізуєте власну поведінку.
      collaborative_learning_initiative: |
        Під час запровадження змін отримуйте ранню підтримку та малі зобов'язання – вони створюють дисонанс, який мотивує до більшого прийняття. Уникайте примушування до публічних зобов'язань, які створюють невдоволення.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне створення дисонансу для тиску на людей та спонукання їх до послуху.
      dismissing_genuine_change: |
        Припущення, що будь-яка зміна переконань є раціоналізацією, тоді як люди іноді щиро оновлюються.
      forced_consistency: |
        Тиск на людей, щоб вони були «послідовними», коли їхні погляди законно еволюціонували.
      self_deception: |
        Використання теорії дисонансу для виправдання уникнення незручних істин про себе.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Confirmation Bias
    quick_introduction: |
      Confirmation bias is the tendency to seek, interpret, and remember information
      in ways that confirm our existing beliefs. We give more weight to supporting
      evidence and discount or dismiss evidence that contradicts our views. We
      ask questions that confirm rather than test our hypotheses.
    one_liner: We seek and remember what confirms our beliefs; we discount what contradicts them.
    try_this:
      - Ask: What would prove me wrong? Actively seek disconfirming evidence.
      - Notice when you're giving more weight to supporting than contradicting information.
      - Consider the opposite view as seriously as your own.
    ask_yourself:
      - Am I testing my hypothesis or just confirming it?
      - When did I last change my mind based on new evidence?
    in_more_detail: |
      We're not neutral processors of information. We seek confirmation, interpret
      ambiguity as support, and remember hits more than misses. We surround ourselves
      with like-minded people and media. We ask "Why am I right?" rather than
      "What would prove me wrong?" This makes us overconfident and slow to update.

      Confirmation bias is one of the most pervasive and well-documented biases.
      It affects science, politics, relationships, and business. Overcoming it
      requires deliberate effort and structured processes.
    why_this_is_important: |
      Recognizing confirmation bias is essential for good decision-making and
      learning. It helps you seek disconfirming evidence, consider alternative
      hypotheses, and update your beliefs when warranted. It's the foundation
      of scientific thinking.
    when_to_use:
      - decision-making
      - learning
      - problem_solving
      - risk_assessment
    how_can_you_spot_it:
      seeking_support: |
        Looking for evidence that confirms rather than tests your view.
      asymmetric_interpretation: |
        Interpreting ambiguous evidence as support for your position.
      discounting_disconfirming: |
        Dismissing or minimizing evidence that contradicts your beliefs.
      selective_exposure: |
        Consuming only information from sources that agree with you.
    examples:
      hiring: |
        Forming an early positive impression and then asking questions that
        confirm the candidate is great.
      investing: |
        After buying a stock, seeking positive news and dismissing negative
        analysis.
      relationships: |
        Interpreting a partner's actions through a lens that confirms your
        view of them (good or bad).
      politics: |
        Accepting information from your side uncritically and rejecting
        equivalent information from the other side.
    real_world_implications: |
      Confirmation bias perpetuates false beliefs, fuels polarization, and
      causes costly mistakes. It's the enemy of good science and good
      decision-making. Overcoming it requires deliberate disconfirmation
      seeking.
    professional_application:
      networking_and_relationship_building: |
        When forming opinions about people, actively seek disconfirming
        evidence. Ask "What would change my mind?" and look for it.
      collaborative_learning_initiative: |
        Use devil's advocate, red teams, and pre-mortems to surface
        disconfirming perspectives. Reward people who challenge prevailing
        views with good evidence.
    how_can_this_be_misapplied:
      false_balance: |
        Treating all views as equally valid when evidence strongly supports
        one side.
      excessive_skepticism: |
        Dismissing all evidence as "confirmation bias" when some beliefs
        are well-supported.
      contrarianism: |
        Adopting the opposite view just to avoid confirmation bias—when
        the original view may be correct.
      analysis_paralysis: |
        Never committing to a view because "we might be biased."
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Прокляття знання
    quick_introduction: |
      Прокляття знання — це труднощі з уявленням того, як це — не знати чогось, коли ти вже це знаєш. Експертам важко навчати новачків, тому що вони не можуть відтворити перспективу новачка. Коли ви щось знаєте, ви забуваєте, як це було — не знати.
    one_liner: Коли ви щось знаєте, ви забуваєте, як це було — не знати.
    try_this:
      - Пояснюючи, починайте з першопринципів — припускайте, що ваша аудиторія нічого не знає.
      - Попросіть новачка пояснити назад; їхнє замішання виявить ваші сліпі зони.
      - Звертайте увагу, коли ви пропускаєте кроки або використовуєте жаргон, який інші можуть не знати.
    ask_yourself:
      - Чи припускаю я, що інші мають той самий контекст, що й я?
      - Чи зрозуміє це людина без мого досвіду?
    in_more_detail: |
      У класичному експерименті люди, які знали відповідь на загадку, відстукували ритм пісні та очікували, що інші її вгадають — вони переоцінили, наскільки це очевидно. Ті, хто відстукував, не могли "відчути" пісню у своїй голові.
      Знання "липкі"; важко симулювати незнання.

      Прокляття впливає на навчання, комунікацію, розробку продуктів та лідерство.
      Ми припускаємо, що інші мають той самий контекст, що й ми. Ми використовуємо жаргон. Ми пропускаємо кроки. Ми дивуємося, коли люди "не розуміють".
    why_this_is_important: |
      Визнання прокляття знання покращує навчання, комунікацію та розробку продуктів. Це допомагає вам зустріти людей там, де вони є, а не там, де ви є. Це важливо для ефективної передачі знань.
    when_to_use:
      - навчання
      - лідерство
      - вирішення_проблем
      - побудова_відносин
    how_can_you_spot_it:
      obvious_to_you: |
        "Це очевидно", коли це очевидно лише тому, що ви знаєте відповідь.
      jargon_use: |
        Використання термінів, яких аудиторія не знає, без їх визначення.
      skipped_steps: |
        Припущення, що інші доповнять те, що ви пропустили.
      frustration_with_learners: |
        "Як вони цього не бачать?", коли їм бракує вашого контексту.
    examples:
      teaching: |
        Професор математики пропускає кроки, які для нього "очевидні", але
        важливі для студентів.
      product_design: |
        Дизайнери створюють інтерфейси, які мають сенс для них, але спантеличують
        нових користувачів.
      onboarding: |
        Досвідчені співробітники забувають, чого не знають нові найняті, і
        надають неадекватне навчання.
      writing: |
        Автори припускають, що читачі мають той самий досвід, і пропускають
        необхідний контекст.
    real_world_implications: |
      Прокляття знання створює комунікаційні розриви, невдалі продукти
      та неефективне навчання. Це одна з причин, чому експерти можуть бути поганими
      вчителями. Подолання його вимагає цілеспрямованих зусиль, щоб прийняти
      перспективу аудиторії.
    professional_application:
      networking_and_relationship_building: |
        Пояснюючи, починайте з рівня іншої людини. Запитайте: "Що
        вони вже знають?". Перевіряйте свою комунікацію з кимось,
        хто не має вашого досвіду.
      collaborative_learning_initiative: |
        Використовуйте вправи "поясни, як мені п'ять". Дозвольте експертам навчати
        новачків і отримувати відгуки. Створюйте документацію, яка припускає
        відсутність попередніх знань. Використовуйте навчання від колег — люди, які нещодавно
        навчилися, пам'ятають перспективу новачка.
    how_can_this_be_misapplied:
      oversimplification: |
        Спрощення до рівня неточності або зверхності.
      false_assumption: |
        Припущення, що інші знають менше, ніж вони знають — також провал
        калібрування.
      one_size_fits_all: |
        Не всі аудиторії потребують однакового рівня пояснень; адаптуйте
        до аудиторії.
      avoiding_complexity: |
        Деякі теми складні; прокляття знання не означає, що ми ніколи не повинні
        використовувати технічну мову, коли це доречно.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Ефект за замовчуванням
    quick_introduction: |
      Ефект за замовчуванням — це схильність вибирати попередньо вибраний варіант,
      коли пропонуються вибори. Те, що встановлено за замовчуванням, має значну перевагу —
      люди часто дотримуються його, незалежно від того, чи є він для них оптимальним.
    one_liner: Те, що встановлено за замовчуванням, має значну перевагу — ми дотримуємося цього.
    try_this:
      - Звертайте увагу, коли ви приймаєте варіант за замовчуванням, не оцінюючи альтернатив.
      - При розробці виборів встановлюйте значення за замовчуванням, які відповідають найкращим інтересам користувачів.
      - Запитайте: Чи обрав би я це, якби воно не було попередньо вибраним?
    ask_yourself:
      - Чи обираю я варіант за замовчуванням через інерцію, чи тому, що він найкращий для мене?
      - Хто встановив це значення за замовчуванням, і що він може з цього отримати?
    in_more_detail: |
      Значення за замовчуванням працюють завдяки інерції, страху втрати (зміна здається втратою
      поточного варіанту) та неявному схваленню (ми припускаємо, що значення за замовчуванням рекомендовано).
      Рівень донорства органів значно відрізняється в різних країнах, значною мірою залежно від того,
      чи є за замовчуванням згода (opt-in) чи відмова (opt-out). Участь у пенсійних заощадженнях зростає,
      коли реєстрація автоматична.

      Значення за замовчуванням можуть використовуватися для добра (заохочення до кращих результатів) або для
      маніпуляцій (приховування невигідних умов у попередньо вибраних полях). Розуміння
      ефекту допомагає вам розробляти кращі системи та протистояти небажаним значенням за замовчуванням.
    why_this_is_important: |
      Розуміння ефекту за замовчуванням допомагає вам розробляти архітектуру вибору, яка
      покращує результати, і допомагає вам розпізнавати, коли ваш вибір формується
      значеннями за замовчуванням, а не усвідомленими уподобаннями.
    when_to_use:
      - прийняття_рішень
      - лідерство
      - вирішення_проблем
      - оцінка_ризиків
    how_can_you_spot_it:
      inertia_toward_default: |
        Більшість людей дотримуються того, що попередньо вибрано.
      implied_recommendation: |
        Ми інтерпретуємо значення за замовчуванням як "те, що вони хочуть, щоб ми вибрали".
      opt_in_vs_opt_out: |
        Формулювання суттєво змінює участь (згода проти відмови).
      pre_checked_boxes: |
        Попередньо вибрані опції мають значну перевагу у формах та налаштуваннях.
    examples:
      organ_donation: |
        Країни з відмовою (opt-out) мають значно вищі показники донорства, ніж країни зі згодою (opt-in) —
        значення за замовчуванням має більше значення, ніж ставлення.
      retirement_savings: |
        Автоматична реєстрація суттєво збільшує участь у 401(k).
      software_installers: |
        "Рекомендовані" опції та попередньо вибрані доповнення формують те, що встановлюють користувачі.
      subscriptions: |
        Безкоштовні пробні періоди, які за замовчуванням переходять на платну підписку, залучають багатьох, хто не
        активно обрав би підписатися.
    real_world_implications: |
      Ефект за замовчуванням є одним із найпотужніших поштовхів. Він формує заощадження,
      здоров'я, конфіденційність та поведінку споживачів. Етична архітектура вибору використовує
      значення за замовчуванням для покращення результатів; темні патерни використовують їх для експлуатації.
    professional_application:
      networking_and_relationship_building: |
        При розробці процесів для інших обирайте значення за замовчуванням, які відповідають їхнім
        інтересам. Уникайте темних патернів, які використовують значення за замовчуванням для отримання вигоди.
      collaborative_learning_initiative: |
        Встановлюйте значення за замовчуванням для командних практик (наприклад, за замовчуванням асинхронно, за замовчуванням
        документація), які відповідають бажаній поведінці. Зробіть правильний вибір легким.
    how_can_this_be_misapplied:
      dark_patterns: |
        Використання значень за замовчуванням для обману людей щодо невигідних виборів (наприклад, приховані
        комісії, небажані підписки).
      paternalism: |
        Нав'язування значень за замовчуванням, які скасовують справжні уподобання без згоди.
      manipulation: |
        Приховування невигідних умов у значеннях за замовчуванням і розрахунок на інерцію.
      one_size_fits_all: |
        Припущення, що одне й те саме значення за замовчуванням є правильним для всіх, коли уподобання різняться.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Ефект Даннінга-Крюгера
    quick_introduction: |
      Ефект Даннінга-Крюгера описує когнітивне упередження, за якого люди з обмеженими
      знаннями чи навичками в певній галузі переоцінюють свою компетентність, тоді як експерти
      схильні недооцінювати її. Чим менше ви знаєте, тим більш впевненими ви можете бути.
    one_liner: Чим менше ви знаєте, тим більш впевненими ви можете бути.
    try_this:
      - У нових галузях припускайте, що ви переоцінюєте свої сили — шукайте зворотний зв'язок та калібруйтеся.
      - Коли експерти висловлюють сумніви, сприймайте це серйозно; вони можуть знати про крайні випадки.
      - Звертайте увагу, коли новачки у певній галузі виявляють більше впевненості, ніж експерти.
    ask_yourself:
      - Чи перебуваю я на "піку гори дурості" чи в "долині смирення"?
      - Чи маю я метакогнітивну здатність оцінювати власну компетентність у цій сфері?
    in_more_detail: |
      Дослідження Даннінга та Крюгера показали, що некомпетентні особи не мають
      метакогнітивної здатності розпізнавати власну некомпетентність. Щоб оцінити свою
      продуктивність, вам потрібні ті самі навички, що й для хорошого виконання роботи — тому недосвідчені
      подвійно програють: вони працюють погано і не знають про це.

      Зі зростанням компетентності люди часто переживають "долину смирення", коли вони
      усвідомлюють, як багато їм невідомо. Справжні експерти можуть бути невпевненими, тому що вони
      гостро усвідомлюють нюанси та крайні випадки.
    why_this_is_important: |
      Розпізнавання ефекту Даннінга-Крюгера допомагає вам калібрувати власну впевненість,
      уникати переоцінки думок новачків та цінувати смирення експертів. Це
      необхідно для навчання, найму та прийняття рішень.
    when_to_use:
      - навчання
      - прийняття_рішень
      - лідерство
      - кар_єрні_кроки
    how_can_you_spot_it:
      novice_overconfidence: |
        Людина з невеликим досвідом висловлює тверді, беззастережні думки.
      expert_underconfidence: |
        Висококваліфіковані люди висловлюють більше сумнівів та невизначеності, ніж менш кваліфіковані.
      inability_to_recognize_quality: |
        Погані виконавці не можуть відрізнити якісну роботу від неякісної у своїй галузі.
      confidence_competence_mismatch: |
        Впевненість та фактична здатність обернено пропорційні серед новачків.
    examples:
      social_media: |
        Люди з поверхневими знаннями теми впевнено сперечаються з експертами галузі.
      hiring: |
        Кандидати, які погано показали себе на співбесідах, іноді високо оцінюють свою власну продуктивність.
      investing: |
        Нові інвестори можуть бути надмірно впевненими після ранніх успіхів, не усвідомлюючи, що це була удача.
      workplace: |
        Молодші співробітники можуть переоцінювати свою готовність до підвищення, тоді як старші — сумніваються у собі.
    real_world_implications: |
      Ефект Даннінга-Крюгера впливає на освіту, найм, політику та громадський дискурс.
      Він пояснює, чому погані ідеї посилюються, а експертів можуть відкидати. Калібрування
      має значення для індивідуального та колективного прийняття рішень.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось дуже впевнений, подумайте, чи не перебуває він у
        зоні Даннінга-Крюгера. Шукайте різноманітні точки зору, зокрема від тих, хто висловлює невпевненість.
      collaborative_learning_initiative: |
        Створюйте культури, де визнання невпевненості цінується. Заохочуйте вправи з калібрування та зворотний зв'язок, який допомагає людям точно оцінити свою компетентність.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Припускати, що впевнені люди завжди помиляються; іноді впевненість
        обґрунтована.
      false_modesty: |
        Експерти, які вдають, ніби знають менше, ніж насправді, щоб виглядати скромними.
      gatekeeping: |
        Використання ефекту Даннінга-Крюгера для відхилення будь-кого, хто не погоджується з "експертами", без
        розгляду їхніх аргументів.
      self_doubt_paralysis: |
        Надмірне виправлення до такої міри, що ви ніколи не довіряєте власному судженню.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Розрив емпатії
    quick_introduction: |
      Розрив емпатії — це труднощі з розумінням та передбаченням психічних
      станів інших людей, коли ми самі перебуваємо в іншому стані. Коли ми
      спокійні, ми недооцінюємо, як почуватимемося в стані гніву чи голоду.
      Коли ми ситі, ми недооцінюємо, як сильно захочемо їсти, коли будемо голодні.
    one_liner: Ми недооцінюємо, як почуватимемося – і як почуваються інші – у різних станах.
    try_this:
      - Коли спокійні, беріть зобов'язання на час, коли будете стресовані; попередньо домовляйтесь.
      - Не судіть інших у стані, в якому ви не перебуваєте — голодні, втомлені, налякані.
      - Запитайте: чи проектуєте я свій поточний стан на майбутнього себе чи інших?
    ask_yourself:
      - Чи недооцінюю я, як почуватимуся в іншому стані?
      - Чи краще б я зрозумів цю людину, якби був у її стані?
    in_more_detail: |
      Ми маємо проблеми з уявленням, як почуватимемося за різних обставин — і
      як почуваються інші, коли перебувають у станах, яких ми зараз не відчуваємо.
      Твереза людина недооцінює привабливість залежності. Людина, яка добре
      виспалася, недооцінює вплив недосипання. Ми проектуємо свій поточний стан
      на інших і на своє майбутнє "я".

      Розрив емпатії впливає на рішення, які ми приймаємо для свого майбутнього "я" (наприклад,
      зобов'язання займатися спортом, коли ми мотивовані), рішення, які ми приймаємо
      для інших, і нашу здатність розуміти людей у різних станах.
    why_this_is_important: |
      Визнання розриву емпатії покращує прийняття рішень для майбутнього "я",
      емпатію до інших та розуміння власної мінливості. Це пояснює, чому ми беремо
      зобов'язання, які не можемо виконати, і чому ми неправильно розуміємо інших у
      стані дистресу.
    when_to_use:
      - прийняття_рішень
      - побудова_стосунків
      - лідерство
      - вирішення_конфліктів
    how_can_you_spot_it:
      current_state_projection: |
        Припущення, що інші відчувають так само, як ми зараз, або що майбутнє "я"
        відчуватиме так само, як ми зараз.
      underestimating_emotional_state: |
        "Яка велика проблема?" коли ми не в тому стані, в якому перебувають вони.
      commitment_failures: |
        Прийняття рішень на основі поточної мотивації, яких ми не дотримуватимемося,
        коли мотивація згасне.
      misunderstanding_others: |
        Знецінення досвіду інших, тому що ми не можемо уявити його зі свого
        поточного стану.
    examples:
      hunger: |
        Покупка продуктів, коли ви ситі — ми купуємо менше, ніж захочемо, коли будемо голодні.
      addiction: |
        Люди, які не залежні, недооцінюють складність відмови від залежності; залежні
        в стані одужання можуть недооцінювати тягу, коли вони вживають речовини.
      conflict: |
        Коли спокійні, ми недооцінюємо, як ми відреагуємо в момент
        конфронтації.
      motivation: |
        Запис на ранковий клас о 6 ранку, коли ми мотивовані — і не йдемо, коли
        ми сонливі.
    real_world_implications: |
      Розрив емпатії впливає на лікування залежностей, політику та міжособистісне
      розуміння. Це пояснює, чому ми беремо зобов'язання, які порушуємо, і чому ми
      часто не розуміємо точки зору інших. Це бар'єр для емпатії та доброго
      прийняття рішень.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось перебуває в стані стресу, гніву або іншому стані, не
        припускайте, що він міркуватиме так само, як ви. Спробуйте уявити його стан.
        Беручи зобов'язання, враховуйте, як ви почуватиметеся, коли мотивація
        згасне.
      collaborative_learning_initiative: |
        Плануючи, враховуйте, як команда почуватиметься, коли буде втомлена,
        під тиском або роздратована. Плануйте для цих станів, а не лише для стану
        мотивованого планування.
    how_can_this_be_misapplied:
      overattribution: |
        Пояснення всіх непорозумінь як "розриву емпатії", коли іноді
        люди справді мають різні цінності.
      excusing_behavior: |
        "Вони не могли допомогти — розрив емпатії", коли люди несуть
        відповідальність за управління своїми станами.
      false_relativism: |
        Припущення, що ми ніколи не зможемо зрозуміти інших, коли можемо покращити
        це зусиллями та досвідом.
      self_excuse: |
        Використання розриву емпатії для виправдання власних невдач у виконанні.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Ефект володіння
    quick_introduction: |
      Ефект володіння — це тенденція цінувати щось вище просто тому, що ми це маємо. Ми вимагаємо більше, щоб віддати об'єкт, ніж ми б заплатили, щоб його придбати. Володіння створює прив'язаність, яка спотворює нашу оцінку.
    one_liner: Ми цінуємо те, чим володіємо, більше, ніж те, чим не володіємо — володіння створює прив'язаність.
    try_this:
      - Ask: Скільки б я заплатив, щоб придбати це, якби я ним не володів?
      - When selling, imagine you're buying—would you pay your asking price?
      - Помічайте, коли володіння завищує вашу оцінку.
    ask_yourself:
      - Чи я переоцінюю це, тому що я ним володію?
      - Чи погодився б неупереджений покупець з моєю ціною?
    in_more_detail: |
      В експериментах люди, яким випадково дали чашку, вимагали приблизно вдвічі більше за її продаж, ніж інші готові були заплатити за її купівлю. Сам факт володіння збільшує сприйняту цінність. Це пов'язано з уникненням втрат — відмова від чогось відчувається як втрата, а ми уникаємо втрат. Але ефект виходить за межі цього: ми включаємо речі, якими володіємо, у нашу ідентичність.

      Ефект володіння впливає на переговори, споживчу поведінку та організаційні зміни. Він пояснює, чому люди переоцінюють свої будинки, свої ідеї та свої поточні ролі. Він створює тертя в угодах та переходах.
    why_this_is_important: |
      Визнання ефекту володіння допомагає вам ефективніше вести переговори, приймати чіткіші рішення щодо того, що зберегти або відпустити, і розуміти, чому інші переоцінюють те, що вони мають. Це також пояснює опір змінам.
    when_to_use:
      - прийняття_рішень
      - переговори
      - інвестування
      - кар_єрні_кроки
    how_can_you_spot_it:
      ownership_premium: |
        "Я б не продав це за таку ціну", коли ви б не заплатили таку ціну, щоб купити це.
      attachment_to_possession: |
        Цінувати речі більше, як тільки ми їх отримуємо.
      resistance_to_trading: |
        Небажання торгувати або обмінюватися, навіть коли це було б раціонально.
      overvaluation_of_own_ideas: |
        Наші ідеї, проєкти чи ролі здаються ціннішими, тому що вони наші.
    examples:
      real_estate: |
        Власники будинків часто завищують ціни на свої будинки — вони цінують їх вище, ніж ринок.
      negotiations: |
        Продавці вимагають більше, ніж покупці готові заплатити; розрив відображає ефект володіння.
      career: |
        Переоцінка нашої поточної роботи, компанії чи ролі при розгляді змін.
      ideas: |
        Упередження "не винайдено тут" та "моя ідея" — ми переоцінюємо те, що ми створили або чим володіємо.
    real_world_implications: |
      Ефект володіння створює ринкове тертя, сповільнює вигідні обміни та підживлює опір змінам. Він впливає на злиття, реорганізації та особисті переходи. Розуміння його покращує переговори та управління змінами.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось чинить опір змінам, враховуйте, що він може відчувати ефект володіння — він цінує статус-кво більше, тому що "володіє" ним. Формулюйте зміни з точки зору того, що людина отримає, а не лише того, від чого відмовляється.
      collaborative_learning_initiative: |
        При впровадженні нових процесів усвідомлюйте, що люди прив'язані до поточних методів. Створюйте психологічну безпеку, щоб "відпустити" старе, перш ніж прийняти нове.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Деяка прив'язаність є раціональною — сентиментальна цінність, витрати на перехід. Не весь опір є ефектом володіння.
      manipulation: |
        Створення фальшивого відчуття володіння для отримання вищих цін (наприклад, "спробуйте безкоштовно", щоб активувати володіння).
      undervaluing_continuity: |
        Припущення, що весь опір змінам є ірраціональним, коли безперервність має реальну цінність.
      cold_rationality: |
        Відкидання емоційної прив'язаності як "просто ефекту володіння", коли вона відображає справжні цінності.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Ефект хибного консенсусу
    quick_introduction: |
      Ефект хибного консенсусу — це схильність переоцінювати, наскільки інші погоджуються з нашими
      переконаннями, ставленнями та поведінкою. Ми вважаємо, що наші погляди поширеніші, ніж вони
      є насправді, і нам важко уявити, що розумні люди можуть не погоджуватися.
    one_liner: Ми переоцінюємо, наскільки інші з нами погоджуються.
    try_this:
      - Активно шукайте людей, які не погоджуються — не припускайте консенсусу.
      - Перед початком перевірте на людях, які не поділяють ваших припущень.
      - Запитайте: Що б сказав хтось, хто не згоден? Ставтеся до цього серйозно.
    ask_yourself:
      - Чи припускаю я, що інші думають так само, як я?
      - Коли востаннє мене здивував чийсь інший погляд?
    in_more_detail: |
      Коли ми займаємо певну позицію, ми схильні вважати її нормою. Ми оточуємо себе
      однодумцями, споживаємо підтверджувальні медіа та інтерпретуємо неоднозначний зворотний зв'язок як
      згоду. Це створює "ехо-камеру", яка посилює ілюзію консенсусу.

      Ефект сильніший для глибоко вкорінених переконань і коли ми сильно зацікавлені в своїй
      позиції. Це може призвести до здивування, коли інші не погоджуються, труднощів у переговорах
      і поганих маркетингових досліджень, коли ми припускаємо, що клієнти думають так само, як ми.
    why_this_is_important: |
      Розпізнавання ефекту хибного консенсусу допомагає вам підготуватися до справжньої незгоди,
      проводити кращі дослідження та ефективніше спілкуватися. Це важливо для
      розробки продуктів, переговорів та лідерства.
    when_to_use:
      - прийняття_рішень
      - переговори
      - лідерство
      - вирішення_проблем
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Ви щиро шоковані, коли хтось не погоджується з тим, що ви вважаєте очевидним.
      assuming_shared_values: |
        Ви дієте так, ніби інші поділяють ваші пріоритети, не перевіряючи.
      underestimating_opposition: |
        Ви очікуєте, що пропозиції зустрінуть менший опір, ніж насправді.
      echo_chamber_detection: |
        Ваше соціальне та інформаційне середовище рідко кидає виклик вашим поглядам.
    examples:
      product_development: |
        Команда припускає, що користувачі хочуть функцію X, тому що її хоче вся команда — лише щоб
        виявити низьке прийняття.
      politics: |
        Люди в політичній "бульбашці" здивовані результатами виборів, які не відповідають
        їхнім очікуванням.
      negotiation: |
        Припущення, що інша сторона погодиться на умови, тому що вони здаються вам "розумними".
      hiring: |
        Найм на "культурну відповідність" може означати найм людей, які з вами погоджуються, посилюючи
        хибний консенсус.
    real_world_implications: |
      Ефект хибного консенсусу сприяє поляризації, невдачам у запуску продуктів
      і зірваним переговорам. Він робить нас надто впевненими у своїх прогнозах і
      непідготовленими до незгоди.
    professional_application:
      networking_and_relationship_building: |
        Активно шукайте людей з різними поглядами. Не припускайте спільних переконань —
        питайте та слухайте.
      collaborative_learning_initiative: |
        У командах використовуйте структуровану незгоду (наприклад, "премортеми", роль "адвоката диявола"), щоб виявити
        незгоду до того, як вона стане дорогою.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Припущення, що ті, хто не згоден, нерозумні або необізнані, замість того, щоб розглядати
        можливість, що вони можуть мати обґрунтовані відмінні точки зору.
      poor_research: |
        Пропуск дослідження клієнтів, тому що "ми вже знаємо, чого вони хочуть".
      overconfidence: |
        Здійснення сміливих ставок на основі припущення, що інші погодяться.
      groupthink_amplification: |
        Команди, які не кидають виклик ефекту хибного консенсусу, можуть скотитися до групового мислення.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Ефект фреймінгу
    quick_introduction: |
      Ефект фреймінгу — це схильність наших рішень змінюватися залежно від того,
      як представлені варіанти, навіть коли фактична інформація ідентична. "90%
      виживання" і "10% смертності" описують однаковий результат, але викликають різні
      вибори. Фрейм (рамка, обрамлення) формує рішення.
    one_liner: Ті самі факти, представлені по-різному, призводять до різних рішень.
    try_this:
      - Перш ніж приймати рішення, перефразуйте варіанти кількома способами — фрейм здобутку та фрейм втрати.
      - Звертайте увагу, коли ваш вибір змінюється залежно від того, як щось сформульовано.
      - Запитайте: Які основні факти, позбавлені обрамлення?
    ask_yourself:
      - Чи вирішив би я інакше, якби це було представлено як здобуток проти втрати?
      - Чи реагую я на обрамлення чи на фактичний результат?
    in_more_detail: |
      Канеман і Тверскі показали, що люди схильні уникати ризику, коли варіанти
      представлені як здобутки, і схильні до ризику, коли вони представлені як втрати — навіть для однакових результатів. Позитивне обрамлення ("врятувати 200 життів") проти негативного обрамлення ("400 помруть") змінює переваги. Фрейми втрат викликають сильніші емоційні реакції, ніж еквівалентні фрейми здобутків.

      Ефект фреймінгу впливає на медичні рішення, політику, маркетинг та
      переговори. Це один з найпотужніших і найбільш документованих упереджень.
      Усвідомлення допомагає, але повністю подолати його складно.
    why_this_is_important: |
      Розпізнавання ефекту фреймінгу допомагає приймати більш послідовні рішення,
      протистояти маніпуляціям і ефективніше спілкуватися. Це також пояснює,
      чому одна й та сама пропозиція може бути прийнята або відхилена залежно від презентації.
    when_to_use:
      - прийняття_рішень
      - переговори
      - лідерство
      - оцінка_ризиків
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Один і той самий результат, представлений як здобуток проти втрати, породжує різні вибори.
      presentation_dependence: |
        Рішення змінюються, коли змінюється лише обрамлення, а не сутність.
      default_influence: |
        Порядок або назва варіантів впливають на вибір.
      emotional_trigger: |
        Певні обрамлення викликають сильніші емоційні реакції.
    examples:
      medical: |
        "90% виживання" проти "10% смертності" для однієї процедури —
        люди вибирають по-різному залежно від обрамлення.
      sales: |
        "Заощадьте 50 доларів" проти "Не втратьте 50 доларів" — еквівалентні обрамлення, різний
        психологічний вплив.
      policy: |
        "Податкові пільги" проти "державних витрат" — одна політика, різні
        політичні відгуки.
      negotiation: |
        Представлення пропозиції як "знижки" проти "уникнення доплати"
        змінює рівень прийняття.
    real_world_implications: |
      Ефект фреймінгу використовується в рекламі, політиці та
      переговорах. Він впливає на медичні рішення та підтримку політики.
      Перефразування може покращити рішення та комунікацію. Усвідомлення
      допомагає, але не повністю усуває ефект.
    professional_application:
      networking_and_relationship_building: |
        При представленні варіантів враховуйте кілька обрамлень. Перевіряйте, як
        різні способи обрамлення впливають на сприйняття. Отримуючи інформацію,
        запитуйте: "Як ще це можна було б сформулювати?"
      collaborative_learning_initiative: |
        При прийнятті рішень явно перефразуйте варіанти, щоб перевірити
        ефект фреймінгу. "Якби ми сформулювали це як втрату, чи вирішили б ми інакше?" Використовуйте послідовне обрамлення для справедливості.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне обрамлення для спрямування людей до бажаних результатів
        без їхнього усвідомлення.
      false_equivalence: |
        Припущення, що всі обрамлення однаково дійсні, коли деякі приховують
        важливу інформацію.
      overcorrection: |
        Повне ігнорування обрамлення та припущення, що воно не має значення —
        воно має.
      spin: |
        Використання обрамлення для введення в оману, а не для прояснення.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Фундаментальна помилка атрибуції
    quick_introduction: |
      Фундаментальна помилка атрибуції – це схильність пояснювати поведінку інших
      людей їхнім характером чи особистістю, натомість власну поведінку –
      ситуаційними факторами. Ми судимо інших за їхніми вчинками, а себе – за
      нашими намірами.
    one_liner: Ми судимо інших за їхніми вчинками, себе – за нашими намірами.
    try_this:
      - Коли хтось вас дратує, запитайте: Які ситуаційні фактори можуть це пояснити?
      - Ставтеся до інших з такою ж щедрістю, як до себе.
      - Звертайте увагу, коли пояснюєте поведінку інших як рису характеру, а не обставини.
    ask_yourself:
      - Чи пояснив би я свою поведінку так само, як пояснюю їхню?
      - Що я можу не знати про їхню ситуацію?
    in_more_detail: |
      Коли хтось підрізає нас у дорозі, ми думаємо: "Який негідник". Коли ми підрізаємо когось, ми думаємо: "Я мусив – я поспішав". Ми пояснюємо власні невдачі обставинами ("жахливий трафік") та невдачі інших – характером ("вони ледачі"). Навпаки, щодо успіху: ми приписуємо його собі, а успіх інших – удачі.

      Помилка є "фундаментальною", оскільки вона поширена і стійка. Вона підриває емпатію, розпалює конфлікти та спотворює оцінку ефективності.
    why_this_is_important: |
      Усвідомлення фундаментальної помилки атрибуції покращує стосунки,
      зменшує конфлікти та призводить до більш справедливих суджень. Це спонукає
      враховувати контекст, перш ніж робити висновок, що хтось "такий".
    when_to_use:
      - побудова_відносин
      - вирішення_конфліктів
      - лідерство
      - прийняття_рішень
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "Він просто така людина" при поясненні поведінки інших.
      situational_explanation_for_self: |
        "У мене не було вибору" або "Обставини змусили мене" при поясненні власної.
      character_vs_context: |
        Припущення про характер, коли ситуація може пояснити поведінку.
      asymmetric_standards: |
        Застосування до інших суворіших стандартів, ніж до себе.
    examples:
      traffic: |
        Помилка іншого водія = "поганий водій". Наша помилка = "неминуча ситуація".
      workplace: |
        Пропущений термін колеги = "безвідповідальний". Наш пропущений термін =
        "перевантаження, і ніхто б не впорався краще".
      politics: |
        Погляди опонентів = "вони дурні або злі". Наші погляди = "раціональна відповідь
        на факти".
      performance: |
        Успіх інших = "удача". Наш успіх = "заслужена наполеглива праця".
    real_world_implications: |
      Фундаментальна помилка атрибуції розпалює конфлікти, підриває командну роботу
      та спотворює оцінку найму та ефективності. Її корекція покращує
      організаційну культуру та особисті стосунки.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось вас розчаровує, запитайте: "Які ситуаційні фактори можуть це пояснити?"
        перш ніж робити висновок, що він ненадійний або складний.
      collaborative_learning_initiative: |
        У зворотньому зв'язку та оцінках заохочуйте інтерпретації "спочатку ситуація".
        Навчайте менеджерів враховувати контекст, перш ніж приписувати риси характеру.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Відкидання кожної дії як "ситуаційної", коли деяка поведінка справді відображає
        характер.
      no_accountability: |
        Використання помилки, щоб уникнути притягнення людей до відповідальності за
        вибори, які вони зробили.
      self_deprecation: |
        Надмірне коригування, коли ви завжди звинувачуєте себе і ніколи не визнаєте
        відповідальність інших.
      ignoring_patterns: |
        Коли хтось повторно погано поводиться в різних ситуаціях, характер може бути
        доречним.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Омана гравця
    quick_introduction: |
      Омана гравця — це помилкове переконання, що минулі незалежні події
      впливають на майбутні. Після серії "орел" ми думаємо, що "орел" "на черзі" — хоча
      кожен кидок є незалежним. Ми бачимо закономірності в випадковості та
      очікуємо "корекції" або "повернення", коли це не вимагається.
    one_liner: Минулі незалежні події не впливають на майбутні — монета не має пам'яті.
    try_this:
      - Коли думаєте "Мені вже належить виграш", запитайте: чи ці події справді незалежні?
      - Розрізняйте регресію до середнього (реальну) від омани гравця (хибну).
      - Звертайте увагу, коли ви бачите закономірності в випадковості.
    ask_yourself:
      - Чи я припускаю, що минулі результати впливають на майбутні, коли вони незалежні?
      - Чи погодився б статистик з моїми міркуваннями "належить зміна"?
    in_more_detail: |
      При чесному підкиданні монети кожен кидок є незалежним. Ймовірність випадання "орла"
      завжди становить 50%, незалежно від минулих результатів. Але ми відчуваємо, що тривала серія
      одного результату робить інший більш ймовірним. Ми плутаємо закон великих чисел (за багатьох випробувань результати усереднюються) з короткостроковою
      "корекцією". Казино не має пам'яті.

      Ця омана впливає на азартні ігри, інвестиції та повсякденне прийняття рішень.
      Ми припускаємо, що "удача" збалансується або що нам "належить" виграш.
      Іноді ми маємо рацію — але з невірних причин.
    why_this_is_important: |
      Розпізнавання омани гравця запобігає дорогим помилкам в азартних іграх
      та інвестуванні. Це також допомагає вам уникнути надмірного інтерпретування коротких серій
      та очікування хибного повернення. Це відрізняє справжню регресію
      до середнього від омани.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - оцінка_ризиків
      - вирішення_проблем
    how_can_you_spot_it:
      due_for_a_change: |
        "У нас було так багато програшів — нам належить виграш."
      pattern_in_randomness: |
        Бачити значущі закономірності у випадкових послідовностях.
      hot_hand_fallacy: |
        Віра в те, що серія продовжиться (пов'язана, але протилежна помилка).
      independence_ignorance: |
        Розглядати незалежні події так, ніби вони пов'язані.
    examples:
      gambling: |
        Після кількох червоних на рулетці ставити на чорне, тому що "червоне не може випадати далі".
      investing: |
        "Ринок падав — він повинен зрости."
      hiring: |
        "Ми найняли кількох поганих кандидатів — наступний обов'язково буде добрим."
      sports: |
        "Він так багато пропустив — йому належить влучити наступний кидок."
    real_world_implications: |
      Омана гравця спричиняє програші в азартних іграх та погані інвестиційні
      рішення. Це також пояснює, чому ми надмірно інтерпретуємо короткострокові закономірності.
      Важливо відрізняти її від справжньої регресії до середнього (де
      існує справжнє середнє, до якого можна регресувати).
    professional_application:
      networking_and_relationship_building: |
        Не припускайте, що минула динаміка стосунків "коригуватиметься" в
        майбутньому — кожна взаємодія дещо незалежна. Але вчіться на
        закономірностях, коли є справжня основна причина.
      collaborative_learning_initiative: |
        Оцінюючи результативність, розрізняйте випадкові коливання та
        систематичні зміни. Короткі серії можуть бути шумом; не перереагуйте на
        "серії" та не очікуйте хибного повернення.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Іноді регресія до середнього є реальною (наприклад, продуктивність навичок).
        Не відкидайте все повернення як оману гравця.
      false_independence: |
        Припускати, що події незалежні, коли це не так (наприклад, повторні
        вимірювання одного й того ж).
      overcorrection: |
        Ніколи не очікувати повернення, коли є справжнє середнє, до якого можна регресувати.
      dismissing_patterns: |
        Деякі закономірності є реальними — не вся послідовність є випадковою.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Групове мислення
    quick_introduction: |
      Групове мислення — це тенденція згуртованих груп ставити консенсус і
      гармонію вище критичної оцінки. Члени пригнічують незгоду,
      самоцензуруються і підлаштовуються під сприйняту думку групи.
      Бажання одностайності переважає бажання найкращого рішення.
    one_liner: Гармонія понад істину — групи ставлять консенсус вище критичної оцінки.
    try_this:
      - Призначте "адвоката диявола"; зробіть незгоду очікуваною та безпечною.
      - Запитайте: Що ми не говоримо? Що б ми сказали, якби не були цією групою?
      - Шукайте зовнішні перспективи перед тим, як остаточно затвердити групові рішення.
    ask_yourself:
      - Чи я самоцензуруюся, щоб зберегти гармонію?
      - Чи наш консенсус справжній, чи результат тиску на згоду?
    in_more_detail: |
      Ірвінг Джаніс вивчав провали у зовнішній політиці (операція у
      Затоці Свиней, В'єтнам) і виявив закономірності: ілюзія невразливості,
      колективна раціоналізація, тиск до конформізму, самоцензура,
      ілюзія одностайності та "охоронці розуму", які захищають групу від
      суперечливої інформації. Висока згуртованість, ізоляція та стрес
      посилюють групове мислення.

      Групове мислення призводить до поганих рішень, оскільки альтернативи
      не розглядаються серйозно. Незгода розглядається як зрада. Група
      переоцінює свою правоту і недооцінює ризики.
    why_this_is_important: |
      Розпізнавання групового мислення допомагає створити умови для кращого
      прийняття рішень: заохочувати незгоду, залучати зовнішні перспективи
      та уникати передчасного консенсусу. Це надзвичайно важливо для
      уникнення катастрофічних групових провалів.
    when_to_use:
      - лідерство
      - прийняття_рішень
      - вирішення_проблем
      - врегулювання_конфліктів
    how_can_you_spot_it:
      pressure_for_consensus: |
        Незгода заохочується або карається; згода винагороджується.
      illusion_of_unanimity: |
        Мовчання трактується як згода, коли це може бути самоцензура.
      collective_rationalization: |
        Група відкидає попередження та підсилює свою точку зору.
      mindguards: |
        Члени групи захищають її від інформації, яка могла б поставити під
        сумнів консенсус.
    examples:
      bay_of_pigs: |
        Радники Кеннеді пригнічували сумніви щодо плану вторгнення;
        результатом стала катастрофа.
      corporate_decisions: |
        Команда керівництва просуває злиття, незважаючи на "червоні прапори",
        оскільки ніхто не хоче бути противником.
      product_launches: |
        Команда випускає бракований продукт, тому що всі інвестували
        в план і ніхто не висловлює занепокоєння.
      boards: |
        Члени правління схвалюють пропозиції керівництва, щоб зберегти
        гармонію.
    real_world_implications: |
      Групове мислення сприяє провалам у політиці, корпоративним катастрофам
      та втраченим можливостям. Воно особливо небезпечне у ситуаціях
      з високими ставками та стресом. Запобігання йому вимагає свідомих
      структурних втручань.
    professional_application:
      networking_and_relationship_building: |
        Створіть психологічну безпеку для незгоди. Дякуйте людям, які
        висловлюють занепокоєння. Покажіть приклад незгоди, не будучи неприємним.
      collaborative_learning_initiative: |
        Використовуйте "адвоката диявола", "червоні команди" та "премортеми".
        Вимагайте, щоб хтось виступав проти пануючої думки. Залучайте
        зовнішні перспективи. Лідер говорить останнім, щоб уникнути якоріння.
    how_can_this_be_misapplied:
      false_dissent: |
        Створення "призначених опонентів", які насправді не мають незгоди —
        група це бачить.
      excessive_conflict: |
        Заохочення незгоди до рівня руйнівного конфлікту
        та паралічу.
      dismissing_consensus: |
        Припущення, що будь-який консенсус є груповим мисленням — іноді група
        права.
      individualism: |
        Надмірна корекція до точки, коли групове рішення
        неможливе.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Ефект ореолу
    quick_introduction: |
      Ефект ореолу — це схильність дозволяти одній позитивній рисі чи враженню
      впливати на наше загальне судження про людину. Якщо нам подобається зовнішність
      когось, ми можемо припускати, що він компетентний. Якщо ми захоплюємося однією
      навичкою, ми припускаємо, що він добре справляється з усім. Одна позитивна
      атрибут кидає "ореол" на решту.
    one_liner: Одна позитивна риса кидає ореол на все наше судження про людину.
    try_this:
      - Оцінюйте риси незалежно — не дозволяйте одній силі малювати інші.
      - Помічайте, коли привабливість, харизма чи один успіх забарвлює ваш погляд.
      - Запитайте: чи судив би я цю людину так само без цієї однієї позитивної риси?
    ask_yourself:
      - Чи я узагальнюю від однієї риси до всієї людини?
      - Чи побачив би я слабкі сторони, якби мене не вразила одна сила?
    in_more_detail: |
      Едвард Торндайк спостерігав, що офіцери, які високо оцінювали солдатів
      за однією рисою, схильні були високо оцінювати їх і за іншими — навіть
      непов'язаними. Ми узагальнюємо від конкретного до цілого. Привабливість,
      харизма або успіх в одній сфері створюють ореол, який поширюється.

      Зворотний ефект — коли одна негативна риса забарвлює все — іноді називають
      "ефектом рогів". Обидва є формами необґрунтованого узагальнення. Ефект
      ореолу впливає на найм, оцінку ефективності та повсякденні враження.
    why_this_is_important: |
      Розпізнавання ефекту ореолу допомагає вам робити більш точні оцінки та
      уникати надмірного узагальнення. Це важливо для справедливого найму,
      управління ефективністю та оцінки взаємин. Одна сила не означає всіх
      сильних сторін.
    when_to_use:
      - прийняття_рішень
      - лідерство
      - побудова_відносин
      - найм
    how_can_you_spot_it:
      trait_spillover: |
        Одна позитивна риса впливає на оцінку непов'язаних рис.
      attractiveness_bias: |
        Привабливих людей оцінюють вище за компетентність, надійність тощо.
      success_generalization: |
        Успіх в одній галузі призводить до припущень про компетентність в інших.
      first_impression_dominance: |
        Раннє позитивне враження забарвлює всю подальшу оцінку.
    examples:
      hiring: |
        Кандидату, який красномовно говорить і подобається, приписують
        технічну міцність — навіть коли навички непов'язані.
      performance_reviews: |
        Один видатний проєкт призводить до високих рейтингів за всіма
        вимірами.
      politics: |
        Харизма політика призводить до припущень про компетентність у
        питаннях політики.
      branding: |
        Успіх компанії в одному продукті призводить до припущень про якість
        усіх продуктів.
    real_world_implications: |
      Ефект ореолу спотворює найм, оцінку ефективності та інвестиційні
      рішення. Він сприяє привабливим, красномовним і вже успішним.
      Зменшення його вимагає структурованої оцінки та розділення вимірів.
    professional_application:
      networking_and_relationship_building: |
        Оцінюйте людей за конкретними вимірами, а не за загальним
        враженням. Будьте уважні, коли одна позитивна риса впливає
        на ваше судження про інших. Шукайте спростовуючі докази.
      collaborative_learning_initiative: |
        Використовуйте структуровані співбесіди та оцінки, які оцінюють
        виміри незалежно. Калібруйте рейтинги між оцінювачами. Зменшуйте
        залежність від загального "нутром відчуття".
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Не кожне позитивне враження є ореолом — іноді люди справді
        сильні за всіма вимірами.
      false_objectivity: |
        Припущення, що ми можемо повністю усунути ефект ореолу — він
        поширений і частково автоматичний.
      overcorrection: |
        Перехід до протилежного крайнього варіанту і припущення, що
        привабливі або харизматичні люди менш компетентні.
      stereotyping: |
        Використання "ефекту ореолу" для відкидання законних позитивних
        рисою.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Лезо Генлона
    quick_introduction: |
      Лезо Генлона стверджує: "Ніколи не приписуйте злу те, що адекватно пояснюється
      дурістю". Іншими словами, не припускайте поганих намірів, коли поведінку можна пояснити некомпетентністю, наглядом або незнанням.
    one_liner: Не припускайте злого умислу, коли його можна пояснити некомпетентністю чи наглядом.
    try_this:
      - Коли хтось вас дратує, запитайте: чи можна це пояснити помилкою чи незнанням?
      - За замовчуванням обирайте простіше пояснення, перш ніж припускати злий умисел.
      - Звертайте увагу, коли ви переходите до думки "він хотів мені нашкодити".
    ask_yourself:
      - Чи приписую я злу те, що можна пояснити дурістю?
      - Чи хотів би я такого ж "блага сумніву" на їхньому місці?
    in_more_detail: |
      Принцип заохочує надавати людям перевагу сумніву. Коли чиїсь дії завдають вам шкоди або дратують, стандартним припущенням часто є те, що вони хотіли вам нашкодити.
      Лезо Генлона припускає, що багато таких дій виникають через недбалість, брак
      інформації або погане виконання — а не через злу волю.

      Це не означає, що зла воля ніколи не існує. Це означає, що ми не повинні поспішати з найгіршою
      інтерпретацією, коли підходить простіша. Лезо зменшує параною, покращує
      стосунки та допомагає нам конструктивніше реагувати на проблеми.
    why_this_is_important: |
      Застосування Леза Генлона зменшує конфлікти, зберігає стосунки та зосереджує
      енергію на вирішенні проблем, а не на пошуку винних. Це також захищає вас від
      стресу, пов'язаного з припущенням, що всі проти вас.
    when_to_use:
      - вирішення_конфліктів
      - лідерство
      - побудова_стосунків
      - прийняття_рішень
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Ви негайно інтерпретуєте негативний результат як навмисну шкоду.
      personalizing_mistakes: |
        Коли щось йде не так, ви припускаєте, що це було спрямовано особисто проти вас.
      ignoring_alternative_explanations: |
        Ви не розглядаєте некомпетентність, непорозуміння або нагляд як можливі причини.
      escalation_before_inquiry: |
        Ви реагуєте гнівом або помстою, перш ніж запитати, що сталося.
    examples:
      email_tone: |
        Припущення, що лаконічний електронний лист є пасивно-агресивним, коли відправник може бути просто поспішати
        або погано володіти тоном.
      missed_deadline: |
        Інтерпретація колегою запізнілої поставки як саботажу, коли він міг
        перевантажити себе або зіткнутися з перешкодами.
      policy_decisions: |
        Припущення, що компанійська політика, яка вам не подобається, була розроблена для шкоди працівникам, коли вона може
        бути незграбною спробою вирішити іншу проблему.
      traffic: |
        Припущення, що інший водій навмисно обрізав вас, коли він міг вас не бачити.
    real_world_implications: |
      Лезо Генлона покращує робочу культуру, зменшує судові позови та робить вирішення конфліктів більш ефективним. Надмірне використання може сприяти недбалості; недостатнє використання створює
      непотрібні конфлікти.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось вас розчаровує, попросіть роз'яснень, перш ніж припускати злий умисел.
        Зберігайте стосунки, дотримуючись доброзичливих інтерпретацій.
      collaborative_learning_initiative: |
        У командах створюйте культуру, де помилки вважаються ненавмисними, доки
        це не доведено протилежне. Зосереджуйтесь на системах і процесах, а не на пошуку винних.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Відкидання повторюваної некомпетентності або недбалості як "не злого умислу", коли це вимагає
        відповідальності.
      ignoring_genuine_malice: |
        Настільки жорстке застосування леза, що ви пропускаєте справжніх поганих акторів або токсичну поведінку.
      avoiding_difficult_conversations: |
        Використання Леза Генлона як виправдання для невирішення проблем з продуктивністю.
      gaslighting_victims: |
        Говорити комусь, хто щиро постраждав, що він "припускає злий умисел", коли
        злий умисел був присутній.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Ефект Хоторна
    quick_introduction: |
      Ефект Хоторна — це схильність людей змінювати свою поведінку,
      коли вони знають, що за ними спостерігають або вивчають. Сам акт спостереження
      може спричинити зміни — не обов'язково втручання, яке тестується. Люди реагують на увагу, яку отримують.
    one_liner: Спостереження змінює поведінку — сама увага може спричинити ефект.
    try_this:
      - При оцінці втручання враховуйте, чи спостереження спричиняє результати.
      - Усвідомте, що увага та відчуття цінності можуть покращити продуктивність.
      - Будьте обережні, приписуючи зміни конкретному втручанню, коли спостереження змінило їх.
    ask_yourself:
      - Чи це покращення від втручання, чи від того, що за мною спостерігають?
      - Чи збережуться результати, якщо ми припинимо приділяти увагу?
    in_more_detail: |
      На заводі Hawthorne Works дослідники виявили, що продуктивність
      зростала, коли вони змінювали освітлення — а також коли повертали його назад.
      Здавалося, що покращення походить від уваги та спостереження, а не
      від конкретного втручання. Пізніший повторний аналіз припустив, що ефект міг
      бути перебільшеним, але концепція залишається корисною: вивчення
      змінює поведінку.

      Ефект Хоторна ускладнює дослідження та оцінку. Він може
      перебільшувати очевидний вплив втручань. Він також свідчить про те, що
      увага та відчуття цінності можуть покращити продуктивність — урок для
      менеджменту.
    why_this_is_important: |
      Розуміння ефекту Хоторна допомагає інтерпретувати результати досліджень,
      розробляти кращі експерименти та усвідомлювати, що сама увага
      може спричинити зміни. У менеджменті це свідчить про те, що приділення
      уваги людям може мати таке ж значення, як і конкретне втручання.
    when_to_use:
      - лідерство
      - прийняття_рішень
      - навчання
      - вирішення_проблем
    how_can_you_spot_it:
      observation_induced_change: |
        Поведінка змінюється, коли люди знають, що за ними спостерігають або вивчають.
      attention_effect: |
        Сам акт приділення уваги спричиняє покращення, а не лише
        конкретна зміна.
      placebo_analog: |
        Як і плацебо, "лікування" у вигляді вивчення може мати ефекти.
      short_term_improvement: |
        Покращення можуть зникнути, коли спостереження припиняється.
    examples:
      workplace_studies: |
        Продуктивність зростає під час дослідження — чи це новий процес, чи
        той факт, що хтось спостерігає?
      medical_trials: |
        Плацебо-групи покращуються — частково тому, що вони отримують увагу.
      education: |
        Студенти показують кращі результати, коли присутні дослідники —
        "ефект спостерігача".
      management: |
        Команди покращуються, коли менеджмент приділяє увагу — чи це нова
        ініціатива, чи сама увага?
    real_world_implications: |
      Ефект Хоторна впливає на валідність досліджень та оцінку програм.
      Він може призвести до переоцінки ефектів втручань.
      Він також має позитивний урок: увага та відчуття вивчення
      можуть мотивувати до покращення — отже, турбота та видимість мають значення.
    professional_application:
      networking_and_relationship_building: |
        Приділення уваги людям може покращити їхню продуктивність —
        ефект Хоторна свідчить про те, що відчуття спостереження та
        цінності має значення. Використовуйте це позитивно: регулярні перевірки,
        видимість та визнання.
      collaborative_learning_initiative: |
        При оцінці втручань використовуйте контрольні групи та
        враховуйте, чи покращення зумовлені втручанням, чи увагою, яку воно привертає. Ефект Хоторна може
        перебільшувати очевидний успіх.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Використання "ефекту Хоторна" для виправдання постійного моніторингу —
        спостереження також може зменшити довіру та внутрішню мотивацію.
      dismissing_improvements: |
        Припущення, що все покращення під час досліджень є Хоторном —
        іноді втручання дійсно працюють.
      overgeneralization: |
        Оригінальні дослідження Хоторна були поставлені під сумнів;
        ефект може бути меншим або відмінним, ніж вважалося раніше.
      manipulation: |
        Створення фальшивого "спостереження" для маніпулювання поведінкою.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Упередження ретроспективного бачення
    quick_introduction: |
      Упередження ретроспективного бачення (або ефект "я це знав увесь час") — це тенденція вірити,
      що ми могли б передбачити або очікувати подію після того, як вона вже сталася. Ми
      реконструюємо минуле, щоб результати здавалися більш неминучими, ніж вони були насправді.
    one_liner: Після події ми думаємо, що знали все заздалегідь.
    try_this:
      - Перед тим, як судити про минулі рішення, запитайте: Що вони знали тоді?
      - Записуйте свої прогнози перед результатами — порівнюйте пізніше.
      - Звертайте увагу, коли ви робите минуле більш неминучим, ніж воно було.
    ask_yourself:
      - Чи сужду я, маючи інформацію, яка тоді була недоступна?
      - Чи я справді це передбачив, чи зараз це просто здається очевидним?
    in_more_detail: |
      Як тільки ми дізнаємося результат, він здається очевидним. Ми забуваємо про невизначеність, яку відчували
      до цього. Це упередження спотворює навчання — ми думаємо, що "знали" щось, коли насправді не знали, тому не оновлюємо свої моделі. Це також призводить до несправедливого звинувачення: "Вони мали це передбачити", коли майбутнє було справді невизначеним.

      Упередження ретроспективного бачення впливає на аналіз постфактум, юридичні рішення та історичний аналіз.
      Ми оцінюємо минулі рішення з інформацією, яка не була доступна на той момент.
    why_this_is_important: |
      Розпізнавання упередження ретроспективного бачення покращує навчання на основі результатів, справедливішу оцінку
      рішень та точнішу оцінку ризиків. Це запобігає хибній впевненості у наших передбачувальних здібностях.
    when_to_use:
      - прийняття_рішень
      - навчання
      - оцінка_ризиків
      - лідерство
    how_can_you_spot_it:
      inevitability_feeling: |
        Після події здається, що вона "мусила" статися.
      reconstructed_certainty: |
        Ми пам'ятаємо, що були більш впевнені перед подією, ніж насправді були.
      blame_for_failure: |
        "Вони мали це знати", коли результат був справді невизначеним.
      undervaluing_luck: |
        Приписування результатів навичкам або передбаченню, коли успіх відіграв свою роль.
    examples:
      investing: |
        "Я знав, що ринок впаде", після того, як він впав — коли ви не діяли на основі цих
        "знань" заздалегідь.
      project_failures: |
        "Ми мали б передбачити ризики" в аналізі постфактум, коли ризики були справді
        неоднозначними.
      elections: |
        Після несподіваного результату експерти пояснюють, чому він був "очевидним" заднім числом.
      medical: |
        "Ознаки були наявні", коли діагностували рідкісне захворювання після факту.
    real_world_implications: |
      Упередження ретроспективного бачення спотворює юридичну відповідальність, оцінку продуктивності та навчання.
      Це робить нас надмірно впевненими у своїх судженнях та несправедливими до тих, хто приймав
      обґрунтовані рішення з обмеженою інформацією.
    professional_application:
      networking_and_relationship_building: |
        При оцінці минулих рішень інших людей свідомо відокремлюйте те, що було відомо тоді,
        від того, що ви знаєте зараз. Уникайте "Я ж казав", коли ви насправді не передбачали результату.
      collaborative_learning_initiative: |
        Під час аналізу постфактум використовуйте техніки "перед-мортем" або "журнал рішень", щоб
        зафіксувати невизначеність на момент прийняття рішення. Порівнюйте фактичну невизначеність
        з ретроспективною реконструкцією.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Відкидати кожну невдачу як "непередбачувану", коли деякі були передбачуваними.
      no_accountability: |
        Використовувати упередження ретроспективного бачення, щоб уникнути притягнення людей до відповідальності за недбалість.
      false_uncertainty: |
        Надмірно коригувати, вважаючи, що ми ніколи не можемо нічого передбачити.
      undermining_learning: |
        Відмовлятися витягувати уроки, тому що "заднім числом все ясно" — ми все ще можемо вчитися
        на результатах.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Hyperbolic Discounting
    quick_introduction: |
      Hyperbolic discounting is the tendency to prefer smaller, sooner rewards
      over larger, later ones—and to discount the future more steeply than
      rational models predict. We overweight the present and underweight the
      future in inconsistent ways.
    one_liner: We prefer smaller sooner over larger later—and discount the future inconsistently.
    try_this:
      - Pre-commit: make choices for your future self when you're in a calm state.
      - 'Reframe: "Would I want this in 10 minutes? In 10 months?" to reveal inconsistency.'
      - Use commitment devices to bind your future self to better choices.
    ask_yourself:
      - Am I overweighting the present at the expense of my future self?
      - Would I make this choice if the reward were delayed by a day? A year?
    in_more_detail: |
      We might prefer $50 today over $100 in a year, but also prefer $100 in
      two years over $50 in one year—even though that's inconsistent. Our
      discount rate isn't constant; it's hyperbolic. The near future is
      heavily discounted; the far future is discounted less steeply. This
      explains procrastination, addiction, and undersaving.

      Present bias is a related concept: we give the present moment
      disproportionate weight. Hyperbolic discounting explains why we
      make commitments we don't keep and why long-term planning is hard.
    why_this_is_important: |
      Understanding hyperbolic discounting helps you design better
      incentives, commit your future self, and avoid short-term traps.
      It explains why we procrastinate and why we struggle with
      long-term goals.
    when_to_use:
      - decision-making
      - career_moves
      - investing
      - leadership
    how_can_you_spot_it:
      present_preference: |
        Choosing immediate gratification over delayed, larger rewards.
      inconsistent_time_preferences: |
        Preferences that reverse as time passes (e.g., we want to diet
        tomorrow but eat today).
      commitment_failures: |
        Making plans we don't follow when the future becomes the present.
      procrastination: |
        Delaying important tasks in favor of immediate comfort.
    examples:
      savings: |
        Choosing to spend now rather than save for retirement—the future
        feels abstract.
      health: |
        Skipping exercise today for comfort, despite knowing we'll regret
        it—tomorrow's regret is discounted.
      addiction: |
        Choosing the immediate high over long-term health.
      deadlines: |
        Doing nothing until the deadline looms—then the "present" includes
        the deadline and we act.
    real_world_implications: |
      Hyperbolic discounting affects savings, health, education, and
      addiction. It explains many self-control failures. Commitment
      devices (e.g., automatic savings, accountability) can help by
      constraining future choices.
    professional_application:
      networking_and_relationship_building: |
        When asking for future commitments, create accountability that
        makes the future "present" (e.g., check-ins, deadlines). Don't
        assume people will follow through without structure.
      collaborative_learning_initiative: |
        Use commitment devices: public commitments, pre-commitment to
        deadlines, and structures that make long-term goals feel more
        immediate. Break long projects into shorter milestones.
    how_can_this_be_misapplied:
      excessive_control: |
        Over-constraining people's choices in the name of "helping"
        their future selves.
      paternalism: |
        Assuming we know what's best for others' long-term interests.
      ignoring_present_needs: |
        Dismissing legitimate present needs in favor of abstract
        future benefits.
      one_size_fits_all: |
        People differ in discount rates; not everyone needs the same
        commitment devices.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Ілюзія контролю
    quick_introduction: |
      Ілюзія контролю — це тенденція переоцінювати нашу здатність
      впливати на результати. Ми вважаємо, що маємо більше контролю, ніж насправді — над
      випадковими подіями, іншими людьми та складними системами. Ми плутаємо кореляцію
      з причинно-наслідковим зв'язком, а дію — з впливом.
    one_liner: Ми переоцінюємо свою здатність впливати на результати, особливо випадкові.
    try_this:
      - Запитайте: Що станеться, якщо я нічого не робитиму? Чи моя дія насправді спричиняє результат?
      - Розрізняйте те, що ви можете контролювати, від того, що не можете.
      - Звертайте увагу, коли ви забобонно пов'язуєте свої дії з випадковими результатами.
    ask_yourself:
      - Чи плутаю я кореляцію з причинно-наслідковим зв'язком?
      - Чи відрізнявся б результат, якби я не діяв?
    in_more_detail: |
      Люди почуваються впевненіше, коли виграють у лотерею, обираючи
      власні номери — хоча це не змінює шанси. Ми кидаємо кістки сильніше, коли хочемо отримати високі числа. Ми думаємо, що наші ритуали чи поведінка
      впливають на результати, які насправді є випадковими або зумовлені зовнішніми факторами. Ілюзія заспокоює; вона зменшує тривогу. Але вона
      може призвести до надмірної самовпевненості та помилкових рішень.

      Ілюзія сильніша, коли ми залучені до процесу, коли
      маємо ранній успіх, і коли завдання є знайомим. Вона впливає на
      інвестування, управління та повсякденне життя.
    why_this_is_important: |
      Розпізнавання ілюзії контролю допомагає вам коригувати свої
      очікування, уникати надмірної самовпевненості та зосереджувати зусилля там, де вони
      дійсно мають значення. Це також пояснює, чому ми наполегливо дотримуємося забобонної
      поведінки та переоцінюємо свій вплив.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - інвестування
      - лідерство
    how_can_you_spot_it:
      overestimated_influence: |
        Віра в те, що наші дії впливають на результати, коли це не так.
      ritual_superstition: |
        Поведінка, яка, на нашу думку, впливає на результати (щаслива сорочка, передматчева
        рутина), хоча насправді це не так.
      choice_illusion: |
        Відчуття, що вибір дає нам контроль, коли сам вибір
        не впливає на результат.
      action_bias: |
        Перевага "щось робити" над "чекати", навіть коли дія
        не допомагає.
    examples:
      gambling: |
        Вибір лотерейних номерів здається більш контрольованим, ніж
        випадковий вибір — шанси однакові.
      investing: |
        Активні трейдери переоцінюють свою здатність перевершити
        ринок; більшість показує гірші результати після вирахування витрат.
      management: |
        Керівники переоцінюють свій вплив на результати організації; багато факторів перебувають поза їхнім контролем.
      sports: |
        Вболівальники вірять, що їхні вигуки впливають на гру; гравці
        мають щасливі ритуали.
    real_world_implications: |
      Ілюзія контролю впливає на прийняття ризиків, наполегливість
      у марних зусиллях та приписування результатів. Вона може
      мотивувати до дії (іноді корисно), але також призвести до
      марної витрати зусиль та надмірної самовпевненості. Калібрування покращує
      якість прийняття рішень.
    professional_application:
      networking_and_relationship_building: |
        Розпізнавайте, що ви можете контролювати, а що ні. Зосереджуйте енергію
        на факторах, на які можна вплинути. Не приписуйте собі заслуги за
        результати, яких ви не спричинили — або не звинувачуйте себе за ті, яких
        не могли запобігти.
      collaborative_learning_initiative: |
        Під час планування розрізняйте контрольовані та неконтрольовані
        фактори. Уникайте хибної впевненості від ранніх перемог. Використовуйте
        ймовірнісне мислення для коригування очікувань.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Надмірне виправлення, щоб вважати, що ми не маємо жодного контролю, коли насправді
        маємо значний вплив.
      dismissing_agency: |
        "Це все удача", коли навички та зусилля мають значення
        в багатьох сферах.
      false_fatalism: |
        Використання ілюзії контролю для виправдання бездіяльності.
      one_size_fits_all: |
        Рівень контролю варіюється залежно від сфери; деякі ситуації
        більш контрольовані, ніж інші.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Impact Bias
    quick_introduction: |
      The impact bias is the tendency to overestimate the intensity and duration
      of our emotional reactions to future events. We think good things will make
      us happier than they do, and bad things will make us more miserable than
      they do. We're bad at affective forecasting.
    one_liner: We overestimate how much events will affect our happiness—and for how long.
    try_this:
      - Ask: How did I feel after similar past events? We adapt faster than we expect.
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
      - Notice when you're overestimating the lasting effect of a single outcome.
    ask_yourself:
      - Am I overestimating how long I'll feel this way?
      - What does past experience say about similar events?
    in_more_detail: |
      Daniel Gilbert and Timothy Wilson research affective forecasting: we
      overestimate how long we'll feel good after a win or bad after a loss.
      We adapt faster than we expect. We also overestimate the impact of
      single events—we think one outcome will define our happiness when
      many factors contribute. We focus on the wrong things when predicting
      our future feelings.

      The impact bias affects major life decisions: we overestimate how much
      a promotion, relationship, or purchase will change our happiness. We
      also overestimate the lasting pain of losses.
    why_this_is_important: |
      Recognizing the impact bias helps you make better decisions about what
      will actually improve your life. It reduces overinvestment in outcomes
      that won't matter as much as you think, and reduces fear of outcomes
      that won't hurt as long as you expect.
    when_to_use:
      - decision-making
      - career_moves
      - risk_assessment
      - relationship_building
    how_can_you_spot_it:
      overestimated_impact: |
        "This will change everything" when similar past events had modest
        lasting impact.
      duration_overestimation: |
        "I'll never get over this" when we typically adapt faster than
        we expect.
      focalism: |
        Focusing on one event and ignoring other factors that affect
        well-being.
      adaptation_neglect: |
        Forgetting that we adapt to both good and bad circumstances.
    examples:
      career: |
        "If I get this promotion, I'll be so much happier" when past
        promotions had temporary impact.
      purchases: |
        "This car will make me happy" when the novelty wears off quickly.
      loss: |
        "I'll never recover from this rejection" when we typically
        adapt within months.
      events: |
        Overestimating how much a wedding, vacation, or milestone will
        affect long-term happiness.
    real_world_implications: |
      The impact bias leads to poor decisions about money, career, and
      relationships. We overpay for experiences we'll adapt to and
      over-fear losses we'll recover from. It affects policy and
      personal planning.
    professional_application:
      networking_and_relationship_building: |
        When making career or relationship decisions, consider how you
        felt after similar past events. Did the impact last as long
        as you expected? Use that to calibrate future predictions.
      collaborative_learning_initiative: |
        When teams face setbacks or wins, remind them of adaptation.
        "We'll adapt faster than we think" can reduce both excessive
        celebration and excessive despair.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Some events do have lasting impact—trauma, major loss. Don't
        dismiss all affective forecasting as biased.
      cold_rationality: |
        "It won't matter" when the experience in the moment does matter.
      undervaluing_experiences: |
        Avoiding positive experiences because "we'll adapt anyway."
      invalidating_emotions: |
        Telling people their feelings will pass when they need support
        in the moment.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Упередженість до "своїх"
    quick_introduction: |
      Упередженість до "своїх" – це тенденція надавати перевагу людям, яких ми сприймаємо як членів нашої групи, перед тими, кого ми сприймаємо як чужих. Ми приписуємо позитивні якості членам "своєї" групи та негативні якості членам "чужих" груп, часто на основі мінімальних або довільних відмінностей.
    one_liner: Ми надаємо перевагу своїй групі та суворіше судимо чужі групи — часто довільно.
    try_this:
      - Запитайте: Чи я б судив цю людину так само, якби вона була в моїй групі?
      - Активно шукайте погляди чужих груп під час прийняття рішень.
      - Звертайте увагу, коли межі групи впливають на ваше судження.
    ask_yourself:
      - Чи я надаю перевагу комусь, тому що він "з наших"?
      - Чи я б застосував ті самі стандарти до члена чужої групи?
    in_more_detail: |
      Навіть коли групи призначаються випадково (наприклад, підкиданням монети), люди швидко розвивають перевагу до своєї групи. Ми більше довіряємо членам своєї групи, щедріше розподіляємо ресурси між ними та більш поблажливо оцінюємо їхні дії.
      Члени чужих груп отримують протилежне ставлення.

      Упередженість до "своїх" живить трайбалізм, дискримінацію та конфлікти. Вона впливає на найм, просування по службі, співпрацю та політику. Вона може базуватися на расі, національності, компанії, команді або будь-якій спільній ідентичності.
    why_this_is_important: |
      Усвідомлення упередженості до "своїх" допомагає приймати більш справедливі рішення, будувати більш інклюзивні команди та уникати фаворитизму. Це також пояснює, чому ініціативи з різноманітності стикаються з опором — перевага "своїх" є автоматичною.
    when_to_use:
      - лідерство
      - прийняття_рішень
      - побудова_відносин
      - вирішення_конфліктів
    how_can_you_spot_it:
      preferential_treatment: |
        Надання "своїм" переваг та сумнівів, але не "їм".
      resource_allocation: |
        Розподіл більшої кількості ресурсів членам своєї групи, коли члени чужих груп мають рівну або більшу потребу.
      attribution_asymmetry: |
        Успіх "своїх" = навичка; успіх "чужих" = удача. Невдача "своїх" = обставини; невдача "чужих" = характер.
      minimal_group_effects: |
        Фаворитизм виникає навіть при довільному призначенні груп.
    examples:
      hiring: |
        Надання переваги кандидатам, які навчалися у вашому університеті або мають схожий досвід.
      performance_reviews: |
        Оцінювання членів своєї групи сприятливіше, ніж членів чужих груп із схожими результатами.
      collaboration: |
        Довіра та залучення "нашої команди" під час виключення або сумнівів щодо "їхньої команди".
      politics: |
        Відкидання аргументів чужої групи під час некритичного прийняття аргументів своєї групи.
    real_world_implications: |
      Упередженість до "своїх" увічнює нерівність, підриває меритократію та розпалює конфлікти. Вона впливає на найм, просування по службі, інвестиції та політику. Зменшення її потребує цілеспрямованих зусиль — вона не вирішиться сама собою.
    professional_application:
      networking_and_relationship_building: |
        Активно залучайте людей поза вашим безпосереднім колом. Шукайте різноманітні погляди. Запитуйте себе, чи надаєте ви комусь перевагу, тому що він "такий самий, як ви".
      collaborative_learning_initiative: |
        Використовуйте структуровані процеси (сліпі рецензії, різноманітні панелі) для зменшення упередженості до "своїх" при наймі та оцінюванні. Створюйте міжгрупові проєкти для формування спільної ідентичності.
    how_can_this_be_misapplied:
      forced_diversity: |
        Впровадження квот або політик, які створюють обурення, не вирішуючи основної проблеми упередженості.
      out_group_hostility: |
        Розгляд упередженості до "своїх" як єдиної проблеми, коли існує також ворожість до чужих груп.
      ignoring_legitimate_differences: |
        Не всі групові відмінності є упередженістю — іноді групи мають різні характеристики. Не припускайте, що всі відмінності є дискримінацією.
      reverse_discrimination: |
        Надмірне виправлення на користь чужих груп таким чином, що це несправедливо щодо членів своєї групи.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Інверсія
    quick_introduction: |
      Інверсія — це техніка розв'язання проблем, яка перевертає питання з ніг на голову. Замість
      того, щоб запитувати "Як досягти успіху?", ви запитуєте "Що призведе до мого провалу?" і уникаєте цього.
      Це виявляє ризики та анти-шаблони, які пряме мислення часто пропускає.
    one_liner: Інвертуйте — запитайте, що призведе до провалу, а потім уникайте цього.
    try_this:
      - Для будь-якої мети перелічіть основні способи, якими ви можете зазнати невдачі — потім уникайте їх.
      - Використовуйте негативну візуалізацію: що може піти не так?
      - Запитайте: Що б зробила розумна людина, щоб усе зіпсувати?
    ask_yourself:
      - Чи думав я про те, що призведе до провалу?
      - Що я не бачу, думаючи лише вперед?
    in_more_detail: |
      Популяризована Чарлі Мангером і ґрунтується на математичній логіці, інверсія використовує
      той факт, що уникати провалу часто легше, ніж прагнути до успіху. Якщо ви можете
      виявити основні причини невдач, ви можете систематично їх усувати.

      Карл Якобі, як повідомляється, сказав: "Інвертуйте, завжди інвертуйте". Стоїки використовували негативну
      візуалізацію — уявлення втрати — щоб цінувати те, що вони мали, і готуватися до труднощів.
      Інверсія — це не песимізм; це структурований спосіб досягти прогресу шляхом усунення
      перешкод.
    why_this_is_important: |
      Інверсія допомагає уникнути катастрофічних помилок, тестувати плани та знаходити
      неочевидні рішення. Вона доповнює перспективне планування, забезпечуючи, що ви не
      пропустите критичні режими відмови.
    when_to_use:
      - вирішення_проблем
      - прийняття_рішень
      - оцінка_ризиків
      - кар'єрні_кроки
    how_can_you_spot_it:
      premortem_thinking: |
        Перед проєктом запитати "Чому це зазнало невдачі?", ніби це вже сталося.
      anti_goals: |
        Чітко визначити, чого ви хочете уникнути, так само, як і того, чого ви хочете досягти.
      reverse_engineering_failure: |
        Вивчення невдалих випадків для отримання уроків, а не лише вивчення успіхів.
      constraint_focus: |
        Виявлення обмежень та вузьких місць перед оптимізацією для зростання.
    examples:
      investing: |
        Замість "Що змусить цю акцію зрости?" запитайте "Що призведе до втрати грошей?"
        і уникайте таких сценаріїв.
      career: |
        "Що зруйнує мою репутацію?" призводить до списку поведінки, якої слід уникати.
      product_launch: |
        "Чому більшість запуску продуктів зазнають невдачі?" виявляє ризики, які потрібно вирішити перед запуском.
      health: |
        "Які звички скорочують тривалість життя?" дає чіткіший список уникнень, ніж "Що робить
        мене здоровим?"
    real_world_implications: |
      Інверсія використовується в інженерії (аналіз режимів відмови), інвестуванні та стратегії.
      Вона зменшує надмірну самовпевненість та покращує управління ризиками. Надмірне покладання може призвести до
      надмірної обережності.
    professional_application:
      networking_and_relationship_building: |
        "Що може зашкодити цим стосункам?" допомагає уникнути поведінки, що руйнує довіру.
      collaborative_learning_initiative: |
        Проводьте премортеми проєктів: "Цей проєкт зазнав невдачі. Чому?" Використовуйте відповіді для покращення
        планування та виконання.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Зосередження лише на уникненні провалу може паралізувати дію та перешкоджати необхідному
        прийняттю ризиків.
      negativity_bias: |
        Інверсія може посилити негативну упередженість, якщо не збалансована з перспективним
        виявленням можливостей.
      analysis_paralysis: |
        Проведення занадто великої кількості часу над режимами відмови, що призводить до ніколи не виконання.
      missing_upside: |
        Інверсія не говорить вам, що робити — лише чого уникати. Вам все ще потрібні
        позитивні цілі.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Закон спадної віддачі
    quick_introduction: |
      Закон спадної віддачі стверджує, що коли ви додаєте більше одного ресурсу, зберігаючи інші постійними, додатковий випуск від кожної нової одиниці ресурсу з часом зменшується. Більше — не завжди краще; існує точка, де додаткові зусилля дають все менше.
    one_liner: Більше вкладень з часом дає менше віддачі; існує оптимальна точка.
    try_this:
      - Запитайте: Чи я перетнув межу, за якою додаткові зусилля дають значну віддачу?
      - Пріоритезуйте ресурси з найвищим ефектом; зупиняйтеся, коли гранична віддача падає.
      - Зверніть увагу, коли ви надмірно вкладаєтеся в те, що вже принесло результат.
    ask_yourself:
      - Що я отримаю від ще однієї одиниці зусиль тут?
      - Чи я оптимізуюся за межею спадної віддачі?
    in_more_detail: |
      В економіці додавання більшої кількості працівників до фіксованої ділянки землі з часом дає менші прирости. У особистій продуктивності перша година навчання може принести більше користі, ніж десята. Цей принцип застосовується до ресурсів, зусиль, часу та функцій. Існує оптимальна точка; за нею гранична віддача знижується і може навіть стати негативною.

      Визнання спадної віддачі допомагає ефективно розподіляти ресурси та уникати надмірних вкладень у сфери, які вже дали більшу частину своєї цінності.
    why_this_is_important: |
      Розуміння спадної віддачі запобігає надмірним вкладенням, керує пріоритезацією та допомагає знати, коли зупинитися. Це важливо для розподілу ресурсів та уникнення перфекціонізму.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - інвестування
      - кар_єрні_кроки
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Кожна додаткова одиниця зусиль чи ресурсів виробляє менше випуску, ніж попередня.
      perfectionism_trap: |
        Прагнення до останніх 10% якості вимагає непропорційних зусиль.
      overinvestment: |
        Продовження додавання ресурсів, коли гранична віддача низька або негативна.
      optimal_point_passed: |
        Ви перейшли межу, за якою більше вкладень покращує результати.
    examples:
      studying: |
        Перші 2 години підготовки до іспиту дають більше, ніж години 7–8; існує точка спадної віддачі.
      product_features: |
        Додавання більшої кількості функцій до додатка може заплутати користувачів; 20-та функція приносить менше користі, ніж 5-та.
      hiring: |
        Додавання більшої кількості людей до проєкту може його сповільнити (Закон Брукса) після певної точки.
      marketing: |
        Подвоєння витрат на рекламу не подвоює результати; віддача зменшується зі насиченням ринку.
    real_world_implications: |
      Закон спадної віддачі керує економічною політикою, бізнес-стратегією та особистою продуктивністю. Ігнорування його призводить до марних витрат ресурсів та субоптимальних результатів. Він підтримує принцип Парето та фокус.
    professional_application:
      networking_and_relationship_building: |
        Інвестування в кілька глибоких стосунків може принести більше користі, ніж розподіл зусиль на багатьох. Розпізнавайте, коли додатковий нетворкінг має спадну віддачу.
      collaborative_learning_initiative: |
        Більша кількість годин навчання не завжди означає кращі результати. Знайдіть оптимальну дозу та уникайте перевантаження.
    how_can_this_be_misapplied:
      premature_optimization: |
        Занадто раннє припинення роботи до досягнення розумного рівня якості.
      undershooting: |
        Використання спадної віддачі як виправдання недостатніх зусиль.
      misidentifying_the_curve: |
        Припущення про спадну віддачу, коли ви насправді перебуваєте на іншій частині кривої (наприклад, на ранній експоненціальній фазі).
      one_size_fits_all: |
        Застосування однакової "оптимальної точки" до різних контекстів, де криві відрізняються.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Упередження щодо втрат
    quick_introduction: |
      We often feel the pain of losing something more intensely than the
      pleasure of gaining something of equal value.
    one_liner: Втрати відчуваються приблизно вдвічі болісніше, ніж відчуваються еквівалентні виграші.
    try_this:
      - "Запитайте себе: чи я переоцінюю те, що втрачу, порівняно з тим, що здобуду?"
      - Переформулюйте вибір як виграші, а не втрати, і подивіться, чи зміниться ваш погляд.
      - Звертайте увагу, коли страх втрати керує рішенням більше, ніж реальна перспектива.
    ask_yourself:
      - Що б я вибрав, якби починав з нуля?
      - Чи я тримаюся через те, що втрачу, чи тому, що майбутнє справді краще?
    in_more_detail: |
      Розроблене Даніелем Канеманом та Амосом Тверскі, упередження щодо втрат описує, як втрати та виграші
      сприймаються асиметрично. Психологічний вплив втрати 100 доларів зазвичай набагато
      більший, ніж задоволення від здобуття 100 доларів. Це упередження впливає на рішення у
      фінансах, переговорах та повсякденному житті, часто призводячи до ризико-уникаючої поведінки,
      коли потенційні втрати є очевидними.
    why_this_is_important: |
      Розуміння упередження щодо втрат допомагає вам розпізнати, коли страх втрати керує рішеннями
      більше, ніж раціональний аналіз. Це пояснює, чому люди тримаються за збиткові інвестиції, уникають
      необхідних змін та приймають субоптимальні рішення у переговорах та кар'єрних питаннях.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - кар'єрні_зміни
      - оцінка_ризиків
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Зверніть увагу, коли перспектива втрати чогось викликає непропорційну тривогу
        або опір порівняно з перевагами потенційного виграшу.
      reluctance_to_change: |
        Вагання щодо зміни стратегії, звільнення з роботи або продажу активу, навіть коли
        об'єктивний аналіз свідчить про кращий варіант.
      framing_sensitivity: |
        Рішення кардинально змінюються залежно від того, чи варіанти сформульовані як виграші
        чи втрати, навіть коли результати еквівалентні.
      overvaluing_what_you_have: |
        Ефект володіння — приписування вищої цінності речам, якими ви володієте, просто тому,
        що ви ними володієте — часто супроводжує упередження щодо втрат.
    examples:
      investing: |
        Тримання акції, що падає, щоб "уникнути реалізації збитків", пропускаючи
        кращі інвестиційні можливості в іншому місці.
      career: |
        Залишатися на нецікавій роботі, тому що звільнення відчувається як втрата безпеки,
        навіть коли нова можливість пропонує більший розвиток.
      negotiations: |
        Відхилення справедливої пропозиції, тому що вона сформульована як "відмова" від чогось,
        а не "здобуття" угоди.
      product_design: |
        Безкоштовні пробні періоди, які перетворюються на платні — користувачі відчувають "втрату" послуги,
        коли пробний період закінчується, що мотивує підписку більше, ніж "здобуття"
        нової послуги.
    real_world_implications: |
      Упередження щодо втрат формує ринки, політику та індивідуальну поведінку. Воно пояснює,
      чому добре продаються страховки та гарантії, чому люди уникають корисних змін,
      і чому негативні новини мають непропорційно великий вплив. Розпізнавання цього може покращити
      якість прийняття рішень та зменшити кількість рішень, про які шкодують.
    professional_application:
      networking_and_relationship_building: |
        Будьте обізнані, що люди можуть чинити опір завершенню непродуктивних стосунків або
        співпраці через упередження щодо втрат — вони бояться "втратити" зв'язок.
        Формулюйте нові можливості як виграші, а не втрати, щоб зменшити опір.
      collaborative_learning_initiative: |
        Під час впровадження нових процесів чи інструментів наголошуйте на тому, що команда здобуває,
        а не на тому, від чого вона "відмовляється". Ініціативи змін, сформульовані як втрати,
        часто викликають сильніший опір.
    how_can_this_be_misapplied:
      manipulation: |
        Використання упередження щодо втрат для тиску на рішення — наприклад, "пропозиції обмеженого часу"
        або формулювання "не пропустіть", що викликає страх втрати, а не
        оцінку справжньої цінності.
      misinterpreting_relationships: |
        Припускати, що опір змінам з боку когось є суто раціональним, коли він може
        бути викликаний упередженням щодо втрат. Неправильне приписування мотивів може зруйнувати довіру.
      overcommitment: |
        Помилка занурення — продовження інвестицій у невдалий проєкт, тому що
        "ми вже так багато вклали", замість того, щоб скоротити втрати.
      missed_opportunities_for_conflict_resolution: |
        Відмова від компромісу, тому що будь-яка поступка відчувається як втрата,
        навіть коли альтернатива — гірший результат для всіх.
      vulnerability_to_exploitation: |
        Бути маніпульованим іншими, хто формулює вибір таким чином, щоб викликати упередження щодо втрат,
        наприклад, маркетингові тактики, що наголошують на тому, що ви "втратите", якщо не діятимете.
      reinforcing_negative_perceptions: |
        Надмірне зосередження на потенційних недоліках може створити песимістичний
        погляд, який стає самоздійснювальним, пропускаючи можливості для зростання.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: Карта — це не територія
    quick_introduction: |
      "Карта — це не територія" означає, що зображення реальності не є самою реальністю.
      Моделі, теорії та описи є корисними спрощеннями, але вони завжди щось пропускають.
      Плутання карти з територією призводить до помилок.
    one_liner: Карта — це не територія — усі моделі помилкові; деякі корисні.
    try_this:
      - Коли модель не відповідає реальності, оновіть карту — не змушуйте реальність відповідати їй.
      - Запитайте: Що ця модель пропускає? Коли вона може зазнати невдачі?
      - Ставтеся до моделей як до інструментів, а не як до істини.
    ask_yourself:
      - Чи плутаю я свою модель з реальністю?
      - Чи змінилася територія відтоді, як я востаннє дивився?
    in_more_detail: |
      Альфред Коржибський представив цю ідею в загальній семантиці. Карта міста
      корисна для навігації, але це не саме місто — вона опускає деталі, застаріває
      і ніколи не може охопити все. Те ж саме стосується ментальних моделей,
      наукових теорій та організаційних схем.

      Усі моделі помилкові; деякі корисні. Небезпека полягає в тому, щоб ставитися
      до моделі так, ніби вона є повною істиною, особливо коли територія змінилася.
      Гарне мислення вимагає оновлення карт, коли реальність не відповідає їм.
    why_this_is_important: |
      Усвідомлення того, що карти відрізняються від території, запобігає надмірній
      впевненості в моделях, заохочує оновлювати переконання та зменшує ризик
      дій на основі застарілої або надмірно спрощеної інформації.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - навчання
      - оцінка_ризиків
    how_can_you_spot_it:
      model_reality_confusion: |
        Ставлення до концепції чи теорії так, ніби вона повністю описує реальність.
      outdated_assumptions: |
        Дії на основі інформації чи моделей, які більше не відповідають поточним умовам.
      oversimplification: |
        Ігнорування нюансів, тому що "карта" їх не включає.
      map_worship: |
        Захист моделі, коли докази суперечать їй, замість того, щоб її оновлювати.
    examples:
      organizational_charts: |
        Припущення, що ієрархія звітності відображає те, як насправді виконується робота.
      financial_models: |
        Ставлення до прогнозів у таблиці як до прогнозу, а не як до сценарію.
      stereotypes: |
        Застосування узагальнень на рівні групи до окремих осіб.
      strategy_docs: |
        Виконання плану як написано, коли ринок змінився.
    real_world_implications: |
      Розрізнення карти та території є фундаментальним для науки, інженерії та
      філософії. Воно лежить в основі байєсівського оновлення, гнучкої методології
      та епістемічної покори. Ігнорування його призводить до жорсткого мислення
      та провальних стратегій.
    professional_application:
      networking_and_relationship_building: |
        Ваша ментальна модель людини може бути застарілою. Оновіть її через пряму
        взаємодію, а не покладаючись на старі враження.
      collaborative_learning_initiative: |
        Заохочуйте команди ставитися до планів і моделей як до гіпотез, які потрібно
        перевіряти та переглядати, а не як до фіксованих істин.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Висновок, що жодна карта не є корисною, і все знання підозріле.
      constant_revision: |
        Настільки часті оновлення, що жодного стабільного розуміння не виникає.
      dismissing_models: |
        Відхилення корисних спрощень, тому що вони "не є територією".
      relativism: |
        Ствердження, що всі карти однаково дійсні, коли деякі явно краще відповідають території.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Ефект простої експозиції
    quick_introduction: |
      Ефект простої експозиції — це тенденція розвивати перевагу до речей
      просто тому, що ми з ними знайомі. Повторний контакт — навіть без
      підкріплення — збільшує симпатію. Ми схильні віддавати перевагу тому, що знаємо.
    one_liner: Знайомство породжує симпатію — ми віддаємо перевагу тому, що бачили раніше.
    try_this:
      - Запитайте: Чи подобається мені це тому, що воно добре, чи тому, що воно знайоме?
      - Оцінюючи варіанти, враховуйте експозицію — нові речі починають з невигідної позиції.
      - Зверніть увагу, коли повторення впливає на ваші вподобання.
    ask_yourself:
      - Чи віддаю я перевагу чомусь головним чином тому, що бачив(ла) це раніше?
      - Чи змінив(ла) б я вибір, якби експозиція була рівною?
    in_more_detail: |
      Роберт Зайонц продемонстрував, що повторний контакт зі стимулами (обличчями, словами, формами)
      збільшує позитивні емоції щодо них — навіть коли ми свідомо не усвідомлюємо
      експозицію. Знайомство породжує симпатію, а не зневагу (у багатьох
      випадках). Ефект сильніший, коли ми не аналізуємо і коли експозиція
      є непомітною.

      Ефект простої експозиції впливає на переваги брендів, міжособистісну
      привабливість та естетичні судження. Він пояснює, чому ми віддаємо перевагу знайомій
      музиці, чому реклама працює через повторення, і чому ми можемо віддавати перевагу
      людям, яких бачили раніше — навіть без взаємодії.
    why_this_is_important: |
      Розпізнавання ефекту простої експозиції допомагає зрозуміти власні
      вподобання та протистояти маніпуляціям через повторення. Це також
      пояснює, чому видимість і присутність мають значення для стосунків та
      брендів. Знайомство — це потужний, але часто несвідомий вплив.
    when_to_use:
      - побудова_стосунків
      - прийняття_рішень
      - лідерство
      - навчання
    how_can_you_spot_it:
      familiarity_preference: |
        Віддавати перевагу варіантам, які ми бачили раніше, над новими.
      repetition_influence: |
        Повторний контакт збільшує симпатію без явного переконання.
      unconscious_influence: |
        Ефект працює навіть тоді, коли ми не усвідомлюємо експозицію.
      brand_recognition: |
        Знайомі бренди мають перевагу, навіть коли ми не можемо пояснити чому.
    examples:
      advertising: |
        Повторний контакт із брендом збільшує симпатію — навіть без
        переконливих повідомлень.
      music: |
        Пісні, які ми чули раніше, зазвичай подобаються більше, ніж нові,
        при першому прослуховуванні.
      people: |
        Ми схильні симпатизувати людям, яких бачили неодноразово (наприклад, однокласникам,
        колегам), більше, ніж незнайомцям — навіть без взаємодії.
      ideas: |
        Ідеї, з якими ми стикалися раніше, здаються більш комфортними та
        переконливими, ніж нові.
    real_world_implications: |
      Ефект простої експозиції формує споживчу поведінку, політичні
      вподобання та соціальну привабливість. Він експлуатується в маркетингу
      і може створювати несправедливі переваги для знайомого. Він також
      пояснює, чому різноманіття досвіду має значення — знайомство
      з відмінностями зменшує упередженість.
    professional_application:
      networking_and_relationship_building: |
        Видимість має значення. З'являтися, бути присутнім і бути
        поміченим створює знайомство, яке будує симпатію. Не
        недооцінюйте цінності повторного контакту з низькими ставками.
      collaborative_learning_initiative: |
        Надайте людям повторний доступ до різноманітних перспектив і людей —
        знайомство може зменшити упередженість. Але пам'ятайте, що проста експозиція
        також може посилити перевагу до статус-кво.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне створення повторної експозиції для маніпулювання
        вподобаннями без згоди.
      false_familiarity: |
        Припущення, що знайомство дорівнює якості — іноді нові
        варіанти кращі.
      exclusion: |
        Якщо доступ до видимості мають лише певні люди, вони отримують несправедливу
        перевагу. Враховуйте, хто має доступ до видимості.
      stagnation: |
        Надмірне покладання на знайомство та ніколи не пробувати нові речі.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Наративний хибний висновок
    quick_introduction: |
      Наративний хибний висновок — це тенденція конструювати історії з минулих подій,
      які роблять їх більш зв'язними, передбачуваними та значущими, ніж вони були насправді.
      Ми підганяємо пояснення під випадковість. Ми перетворюємо безлад історії на
      охайну розповідь — а потім віримо, що ця історія була неминучою.
    one_liner: Ми підганяємо зв'язні історії під випадковість — а потім віримо, що вони були неминучими.
    try_this:
      - Запитайте: Яка частина цієї історії є ретроспективним поглядом? Яку роль зіграла удача?
      - Будьте скептичними щодо охайних пояснень — минуле було більш хаотичним, ніж наші історії.
      - Помічайте, коли "має сенс" виконує роботу "було передбачувано".
    ask_yourself:
      - Чи конструюю я історію, яка робить минуле більш неминучим, ніж воно було?
      - Чи міг би я передбачити це до того, як воно сталося?
    in_more_detail: |
      Нассім Талеб популяризував цей термін. Ми прагнемо до оповіді — причина і наслідок,
      герої та лиходії, чіткі дуги. Тому ми конструюємо історії, які пов'язують
      події заднім числом. Історія здається правдивою, тому що вона зв'язна — але
      зв'язність не означає, що вона правильна. Ми плутаємо "має сенс" з
      "було передбачувано". Ми недооцінюємо роль удачі та
      випадковості.

      Наративний хибний висновок впливає на те, як ми вчимося з історії, оцінюємо
      успіх і робимо прогнози. Ми переоцінюємо пояснювальну силу історій
      і недооцінюємо роль шансу.
    why_this_is_important: |
      Розпізнавання наративного хибного висновку допомагає уникнути надмірного навчання
      з минулого та переоцінки передбачуваності. Це заохочує смиренність
      щодо причинно-наслідкових зв'язків та прогнозування. Не все, що становить добру
      історію, є правдивим або узагальнюваним.
    when_to_use:
      - прийняття_рішень
      - навчання
      - оцінка_ризиків
      - вирішення_проблем
    how_can_you_spot_it:
      hindsight_coherence: |
        Минулі події пояснюються охайною історією, яка не була
        видимою в той час.
      cause_effect_overconfidence: |
        Ми приписуємо чіткі причини результатам, які мали багато
        сприяючих факторів.
      luck_minimization: |
        Успіх і невдача пояснюються навичками та стратегією,
        а не удачею.
      story_over_evidence: |
        Переконлива розповідь переважає статистичні докази.
    examples:
      business_success: |
        "Вони досягли успіху завдяки Х", коли було задіяно багато факторів і удача — ми обираємо історію, яка підходить.
      investing: |
        Пояснення ринкових рухів за допомогою наративів, які здаються
        задовільними, але можуть бути постфактум.
      history: |
        Історичні події розповідаються як неминучі прогресії,
        коли вони залежали від багатьох факторів.
      career: |
        "Я досяг цього, тому що зробив Х", коли удача та час
        відігравали значну роль.
    real_world_implications: |
      Наративний хибний висновок спотворює навчання, надмірну впевненість
      у прогнозуванні, а також приписування успіху та невдачі.
      Він робить минуле більш передбачуваним, ніж воно було,
      і майбутнє більш передбачуваним, ніж воно є.
    professional_application:
      networking_and_relationship_building: |
        Коли хтось розповідає свою історію успіху, пам'ятайте, що
        це наратив — зв'язний і переконливий, але, можливо,
        спрощений. Удача та невидимі фактори можуть бути недооцінені.
      collaborative_learning_initiative: |
        У ретроспективах розрізняйте наратив та докази.
        Запитайте: "Що б ми сказали в той час?". Використовуйте
        журнали рішень для фіксації невизначеності до того,
        як результати будуть відомі.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Деякі наративи є правильними — не все є
        наративним хибним висновком. Причинно-наслідкові зв'язки існують.
      excessive_skepticism: |
        Відмова вчитися з минулого через "наративний
        хибний висновок". Ми все ще можемо винести корисні уроки.
      false_randomness: |
        Припущення, що все є випадковим, коли деякі результати
        мають значуще пояснення.
      undermining_storytelling: |
        Історії мають цінність для спілкування та значення —
        хибний висновок полягає в тому, щоб вірити, що вони є повними або
        передбачувальними, а не в тому, що вони існують.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Упередження до негативу
    quick_introduction: |
      Упередження до негативу – це схильність надавати більшої ваги негативній інформації,
      ніж позитивній. Погані новини, критика та загрози привертають нашу увагу та сильніше
      впливають на наші рішення, ніж еквівалентні позитивні стимули.
    one_liner: Погані новини важать більше, ніж добрі — ми схильні надавати пріоритет загрозам.
    try_this:
      - Активно шукайте та зважуйте позитивні докази під час оцінки.
      - Зверніть увагу, коли одна критика переважає багато компліментів.
      - Запитайте: Чи надаю я негативній інформації більшої ваги, ніж вона заслуговує?
    ask_yourself:
      - Чи я зосереджуюсь на негативі та знецінюю позитив?
      - Чи я б почувався інакше, якби зосередився на добрих доказах?
    in_more_detail: |
      З еволюційної точки зору, пропустити загрозу могло бути фатальним, тоді як
      пропустити можливість зазвичай було безпечно. Наш мозок запрограмований надавати
      пріоритет негативній інформації. Один критичний коментар може переважити багато
      компліментів. Негативні події запам'ятовуються яскравіше і на довше.

      Це упередження впливає на стосунки, прийняття рішень та самопочуття. Ми зациклюємося
      на невдачах, передбачаємо найгірші сценарії та знецінюємо позитивні докази. Розуміння
      цього допомагає нам коригувати це.
    why_this_is_important: |
      Розпізнавання упередження до негативу допомагає збалансувати зворотний зв'язок,
      уникати надмірної реакції на критику та приймати більш зважені рішення. Це також
      пояснює, чому погані новини домінують і чому ми часто почуваємося гірше, ніж
      обставини того вимагають.
    when_to_use:
      - прийняття_рішень
      - побудова_відносин
      - лідерство
      - оцінка_ризиків
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Один негативний коментар затьмарює багато позитивних.
      threat_prioritization: |
        Потенційні недоліки привертають більше уваги, ніж еквівалентні переваги.
      vivid_negative_memories: |
        Негативні події згадуються легше та з більшими емоціями.
      discounting_positive_evidence: |
        Хороші новини швидко забуваються або пояснюються.
    examples:
      performance_reviews: |
        Співробітник зациклюється на одному критичному зауваженні та знецінює загальну
        позитивну оцінку.
      news_consumption: |
        Негативні заголовки домінують над увагою та формують світогляд, незважаючи на
        позитивні тенденції.
      relationships: |
        Одна сварка запам'ятовується сильніше, ніж багато добрих моментів.
      investing: |
        Ринкові спади викликають більше паніки, ніж еквівалентні підйоми викликають
        евфорію.
    real_world_implications: |
      Упередження до негативу формує медіа, політику та корпоративну культуру. Воно
      сприяє тривожності, конфліктам та субоптимальним рішенням. Свідоме
      протидія цьому може покращити самопочуття та судження.
    professional_application:
      networking_and_relationship_building: |
        Надаючи зворотний зв'язок, пам'ятайте, що негативні коментарі матимуть більшу вагу —
        зважуйте їх та наголошуйте на зростанні. Отримуючи зворотний зв'язок, свідомо
        розглядайте повну картину.
      collaborative_learning_initiative: |
        Створюйте культури, які явно протидіють упередженню до негативу: відзначайте
        перемоги, документуйте позитивні результати та балансуйте пост-мортеми з
        "пре-мортемами" того, що пішло добре.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Відкидання обґрунтованих занепокоєнь, наполягаючи на "позитивному мисленні".
      ignoring_real_threats: |
        Надмірне коригування до рівня недооцінки реальних ризиків.
      feedback_suppression: |
        Уникнення необхідної критики, тому що "негатив – це погано".
      invalidation: |
        Говорити комусь, що їхні негативні почуття – це "лише упередження до негативу",
        коли вони мають реальні причини для занепокоєння.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Лезо Оккама
    quick_introduction: |
      Лезо Оккама (або принцип Бритви Оккама) – це принцип, згідно з яким серед конкуруючих гіпотез слід віддавати перевагу тій, яка має найменше припущень. Простіші пояснення часто, хоч і не завжди, є правильними.
    one_liner: Віддавайте перевагу найпростішому поясненню, яке відповідає наявним доказам.
    try_this:
      - Порівнюючи теорії, запитуйте: яка з них має менше припущень?
      - Не додавайте складності без доказів, які її вимагають.
      - Звертайте увагу, коли ви віддаєте перевагу розгорнутому поясненню над простим.
    ask_yourself:
      - Чи вношу я непотрібну складність?
      - Чи вимагає наявна інформація такого рівня пояснення?
    in_more_detail: |
      Принцип, названий на честь Вільяма Оккамського, не стверджує, що прості пояснення завжди правдиві. Він пропонує не вводити зайву складність без доказів. Якщо дві теорії пояснюють одні й ті ж явища, простіша віддається перевагу, доки докази не вимагатимуть іншого.

      Лезо Оккама є евристикою, а не законом. Іноді правильне пояснення є складним. Але воно захищає від надмірного налаштування, конспірологічного мислення та непотрібних ускладнень. Воно сприяє лаконічності в поясненнях.
    why_this_is_important: |
      Застосування Леза Оккама покращує вирішення проблем, зменшує надмірне налаштування моделей і допомагає уникати складних, але необґрунтованих теорій. Це корисна стандартна евристика, коли докази неоднозначні.
    when_to_use:
      - вирішення_проблем
      - прийняття_рішень
      - навчання
      - оцінка_ризиків
    how_can_you_spot_it:
      unnecessary_complexity: |
        Пояснення, що включає багато припущень, коли було б достатньо меншої кількості.
      conspiracy_tendencies: |
        Складні, багатоакторні пояснення подій, які мають простіші причини.
      overfitting: |
        Модель або теорія, яка ідеально пояснює минулі дані, але не працює з новими.
      elegance_in_explanation: |
        Найкращі пояснення часто здаються "очевидними" ретроспективно.
    examples:
      debugging: |
        Коли виникає помилка, спочатку перевірте найпростіші причини (наприклад, друкарська помилка, неправильна конфігурація), перш ніж припускати архітектурні проблеми.
      conspiracy_theories: |
        "Уряд організував Х" вимагає багато прихованих учасників; "кілька людей припустилися помилок" – це простіше.
      product_failure: |
        Користувачі не приймають функцію – найпростіше пояснення: вона не вирішує їхню проблему, а не те, що вони заплуталися в інтерфейсі.
      medical_diagnosis: |
        "Поширені речі є поширеними" – розгляньте часті діагнози перед рідкісними.
    real_world_implications: |
      Лезо Оккама спрямовує наукові дослідження, інженерію та повсякденне міркування.
      Воно зменшує марну трату зусиль на складні помилкові теорії. Неправильно застосоване, воно може відкинути справді складні явища.
    professional_application:
      networking_and_relationship_building: |
        При інтерпретації поведінки інших віддавайте перевагу простим поясненням (вони зайняті, вони забули), перш ніж припускати злий намір чи складні мотиви.
      collaborative_learning_initiative: |
        Під час сесій вирішення проблем прямо запитуйте "Яке найпростіше пояснення?", перш ніж будувати складні моделі.
    how_can_this_be_misapplied:
      oversimplification: |
        Відкидання обґрунтованих складних пояснень, оскільки вони "занадто складні".
      status_quo_bias: |
        Використання Леза Оккама для надання переваги звичним поясненням над новими, але правильними.
      scientific_rigidity: |
        Відхилення нових теорій, оскільки вони складніші, навіть коли докази їх підтверджують.
      missing_nuance: |
        Деякі галузі (наприклад, людська поведінка, екосистеми) за своєю природою складні; простота може бути оманливою.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Ефект страуса
    quick_introduction: |
      Ефект страуса — це схильність уникати негативної фінансової інформації, ніби "закопуючи голову в пісок", як страус. Люди уникають перегляду своїх портфелів, коли ринки падають, відкладають відкриття рахунків і ігнорують попереджувальні знаки, які могли б допомогти їм діяти.
    one_liner: Уникнення поганих новин не змінює реальності — воно лише відкладає вашу реакцію.
    try_this:
      - Заплануйте регулярні перевірки, щоб ви не могли уникнути цифр.
      - Помічайте, коли ви відкладаєте відкриття чогось або перегляд чогось.
      - Запитайте: Чого я уникаю, і що зміниться, якби я з цим зіткнувся?
    ask_yourself:
      - Чи уникаю я інформації, тому що вона може бути поганою?
      - Чи допомогло б мені раннє усвідомлення діяти краще?
    in_more_detail: |
      Термін був введений у поведінкових фінансах для опису інвесторів, які уникають перевірки своїх інвестицій під час спаду ринку. Ця поведінка виходить за межі фінансів: уникнення медичних оглядів, ігнорування проблем у стосунках та відкладання складних розмов. Ми прагнемо уникнути тривоги від поганих новин, але уникнення часто погіршує результати, запобігаючи своєчасному реагуванню.

      Ефект зумовлений відразою до втрат та бажанням уникнути емоційного дискомфорту. На жаль, незнання не змінює реальності — воно лише відкладає нашу реакцію.
    why_this_is_important: |
      Розпізнавання ефекту страуса допомагає вам проактивно стикатися зі складною інформацією. Уникнення поганих новин рідко покращує результати; зазвичай воно їх посилює. Своєчасне усвідомлення дозволяє приймати кращі рішення.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - оцінка_ризиків
      - кар_єрні_кроки
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Не переглядати інвестиційні звіти, коли ринки падають.
      delaying_difficult_information: |
        Відкладати відкриття рахунків, медичних результатів або відгуків про роботу.
      information_avoidance: |
        Активно уникати джерел, які можуть містити погані новини.
      procrastination_on_unpleasant_tasks: |
        Відкладати дії, які б виявили або вирішили проблеми.
    examples:
      investing: |
        Інвестор припиняє перевіряти свій 401(k) під час ведмежого ринку, пропускаючи можливості для ребалансування.
      health: |
        Уникнення візиту до лікаря, незважаючи на симптоми, через страх поганих новин.
      finances: |
        Не відкривати виписки з кредитної картки або сповіщення банку, щоб уникнути зіткнення з боргами.
      performance: |
        Менеджер уникає надання критичного зворотного зв'язку до щорічного огляду, коли раннє втручання допомогло б.
    real_world_implications: |
      Ефект страуса призводить до гірших фінансових результатів, затримки медичного лікування та невирішених проблем у стосунках і на роботі. Він посилює уникнені втрати. Системи, які роблять інформацію важко ігнорованою, можуть допомогти.
    professional_application:
      networking_and_relationship_building: |
        Не уникайте складних розмов. Вирішуйте проблеми рано, замість того, щоб сподіватися, що вони вирішаться самі собою. Створюйте регулярні перевірки, які виявляють проблеми до їх ескалації.
      collaborative_learning_initiative: |
        Створюйте цикли зворотного зв'язку, які ускладнюють ігнорування проблем — панелі інструментів, регулярні огляди та норми, які заохочують раннє розкриття поганих новин.
    how_can_this_be_misapplied:
      information_overload: |
        Нав'язування постійного моніторингу, коли певне уникнення інформації є здоровим (наприклад, не перевіряти акції кожну хвилину).
      anxiety_amplification: |
        Створення надмірного фокусу на потенційних проблемах, що збільшує тривогу без покращення результатів.
      blame_shifting: |
        Приписування всього уникнення "ефекту страуса", коли деяке уникнення є раціональним (наприклад, ігнорування шуму).
      micromanagement: |
        Використання концепції для виправдання надмірного контролю над іншими.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Принцип Парето
    quick_introduction: |
      Принцип Парето (або правило 80/20) стверджує, що приблизно 80% ефектів походять від
      20% причин. Невелика меншість вхідних даних часто призводить до більшості вихідних даних —
      у продажах, помилках, клієнтах, зусиллях, функціях тощо. Зосередьтеся на життєво важливих кількох.
    one_liner: 80% ефектів походять від 20% причин — зосередьтеся на життєво важливих кількох.
    try_this:
      - Визначте 20% вхідних даних, які дають 80% результатів — вкладіть туди більше зусиль.
      - Скоротіть або зменште пріоритет 80%, які дають мало.
      - Запитайте: які кілька речей, якби я зробив їх добре, мали б найбільше значення?
    ask_yourself:
      - Чи рівномірно я розподіляю зусилля, коли кілька речей мають більше значення?
      - Які мої 20% з високим впливом?
    in_more_detail: |
      Вільфредо Парето помітив, що 80% землі Італії належало 20% населення. Принцип був узагальнений: 80% продажів від 20%
      клієнтів, 80% помилок від 20% коду, 80% результатів від 20% зусиль.
      Точне співвідношення варіюється, але закономірність — нерівномірний розподіл — поширена.

      Принцип передбачає, що визначення та зосередження на 20% з високим впливом
      може драматично покращити результати. Це евристика пріоритизації, а не
      фізичний закон.
    why_this_is_important: |
      Застосування принципу Парето допомагає безжально пріоритизувати, уникати марнування
      зусиль на дії з низьким впливом та досягати більшого меншими засобами. Це фундаментально
      для продуктивності та стратегії.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - лідерство
      - кар'єрні_кроки
    how_can_you_spot_it:
      uneven_distribution: |
        Невелика частка X становить велику частку Y.
      high_leverage_activities: |
        Кілька дій дають більшість результатів.
      low_value_tail: |
        Багато видів діяльності приносять мало користі; їх скорочення має мінімальний вплив.
      vital_few_vs_trivial_many: |
        Ключ полягає у визначенні того, які кілька справ мають найбільше значення.
    examples:
      sales: |
        20% клієнтів генерують 80% доходу — зосередьтеся на їх утриманні та зростанні.
      software: |
        20% функцій забезпечують 80% використання — надайте їм пріоритет.
      productivity: |
        Кілька звичок або рутин дають більшу частину вашого результату — вкладайте в них більше зусиль.
      problems: |
        20% помилок спричиняють 80% збоїв — виправте їх першими.
    real_world_implications: |
      Принцип Парето керує розподілом ресурсів, стратегією продукту та
      особистою продуктивністю. Ігнорування його призводить до надмірного розпорошення зусиль.
      Надмірне застосування може призвести до нехтування "довгим хвостом", де це має значення.
    professional_application:
      networking_and_relationship_building: |
        Визначте стосунки, які мають найбільше значення для ваших цілей. Інвестуйте
        непропорційно в них, замість того, щоб розподіляти зусилля рівномірно.
      collaborative_learning_initiative: |
        Під час покращення ефективності команди знайдіть 20% втручань, які дають
        80% результатів. Зосередьте навчання та зміни процесів там.
    how_can_this_be_misapplied:
      oversimplification: |
        Припущення, що 80/20 застосовується скрізь; деякі розподіли більш рівномірні.
      neglecting_the_tail: |
        Ігнорування "тривіальної більшості", коли вона сукупно має значення (наприклад, багато дрібних
        клієнтів, крайні випадки).
      false_precision: |
        Розгляд 80/20 як точного правила, а не приблизної евристики.
      misidentifying_the_vital_few: |
        Зосередження на неправильних 20% через помилковий аналіз.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Закон Паркінсона
    quick_introduction: |
      Закон Паркінсона стверджує, що "робота розширюється, щоб зайняти весь час, виділений на її завершення". Дайте завданню тиждень, і воно займе тиждень; дайте йому день, і воно часто виконується за день. Те саме стосується бюджетів, розміру команди та ресурсів.
    one_liner: Робота розширюється, щоб зайняти весь час, виділений на її завершення.
    try_this:
      - Встановлюйте жорсткіші терміни, щоб змусити зосередитися та запобігти розширенню обсягу.
      - Запитайте: Скільки мінімально часу це реально може зайняти?
      - Помічайте, коли витрачається додатковий час або ресурси без пропорційної цінності.
    ask_yourself:
      - Я заповнюю час, чи робота справді його вимагає?
      - Чи змусить жорсткіший термін краще розставити пріоритети?
    in_more_detail: |
      К. Норткот Паркінсон зауважив, що бюрократія зростає незалежно від обсягу роботи, яку потрібно виконати. Він також зазначив, що завдання розширюються, щоб зайняти наявний час — ми коригуємо наші зусилля та темп відповідно до терміну. Жорсткі терміни можуть змусити зосередитися; вільні запрошують до прокрастинації та розширення обсягу.

      Цей закон має наслідки для управління проєктами, особистої продуктивності та організаційного дизайну. Він свідчить про те, що обмеження можуть покращити результати, змушуючи розставляти пріоритети.
    why_this_is_important: |
      Розуміння закону Паркінсона допомагає встановлювати кращі терміни, уникати надмірного забезпечення проєктів ресурсами та розпізнавати, коли "більше часу" або "більше людей" не допоможуть — і навіть можуть нашкодити. Обмеження можуть бути продуктивними.
    when_to_use:
      - прийняття_рішень
      - лідерство
      - вирішення_проблем
      - кар'єрні_кроки
    how_can_you_spot_it:
      deadline_driven_effort: |
        Робота прискорюється наближенням терміну; прогрес незначний, коли термін далекий.
      scope_expansion: |
        Проєкти зростають, щоб зайняти наявні ресурси, замість того, щоб залишатися сфокусованими.
      bureaucratic_growth: |
        Організації додають людей і процеси, навіть коли обсяг роботи не збільшується.
      budget_exhaustion: |
        Бюджети витрачаються повністю, незалежно від того, чи були витрати необхідними.
    examples:
      student_deadlines: |
        Реферат, який має бути зданий через місяць, пишеться в останні 48 годин.
      project_management: |
        Проєкт з терміном виконання 6 місяців займає 6 місяців; той самий обсяг з терміном 3 місяці також може бути виконаний.
      meetings: |
        Годинна зустріч заповнює годину, навіть якщо 30 хвилин було б достатньо.
      budgets: |
        Департамент витрачає свій повний бюджет до кінця року, щоб обґрунтувати такий же бюджет наступного року.
    real_world_implications: |
      Закон Паркінсона впливає на продуктивність, роздування штату організацій та розподіл ресурсів. Він свідчить про те, що штучні обмеження (коротші терміни, менші команди) можуть покращити фокус та ефективність.
    professional_application:
      networking_and_relationship_building: |
        Встановлюйте чіткі, жорсткі терміни для спільної роботи, щоб запобігти розширенню обсягу та підтримувати темп.
      collaborative_learning_initiative: |
        Використовуйте тайм-боксинг для зустрічей і проєктів. Експериментуйте з коротшими термінами, щоб перевірити, чи покращують вони фокус без шкоди для якості.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Встановлення довільно коротких термінів, що призводять до вигорання або низької якості.
      underresourcing: |
        Припущення, що менше часу або менше людей завжди спрацює — деякі завдання потребують адекватних ресурсів.
      blame_shifting: |
        Приписування затримок "Закону Паркінсона", коли робота була справді складною.
      ignoring_quality: |
        Поспіх у дотриманні штучних обмежень ціною сталого результату.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Ймовірнісне мислення
    quick_introduction: |
      Ймовірнісне мислення – це звичка міркувати в термінах ймовірностей, а не
      визначеностей. Замість запитання «чи станеться це?» ми запитуємо «наскільки ймовірно, що це станеться?»
      Воно охоплює невизначеність і використовує її для прийняття кращих рішень.
    one_liner: Думайте ймовірностями, а не визначеностями – прийміть невизначеність.
    try_this:
      - Замініть «чи станеться це?» на «наскільки це ймовірно?»
      - Розгляньте кілька сценаріїв і призначте приблизні ймовірності.
      - Оновлюйте свої переконання, коли з'являються нові докази.
    ask_yourself:
      - Чи думаю я в бінарних термінах, коли ймовірності були б більш точними?
      - Який діапазон правдоподібних результатів?
    in_more_detail: |
      Більшість реальних результатів є невизначеними. Ймовірнісне мислення замінює бінарні
      «так/ні» на градаційні переконання. Воно включає розгляд кількох сценаріїв,
      призначення приблизних ймовірностей та оновлення з появою доказів. Це
      протилежність надмірній впевненості та мисленню «чорне-біле».

      Ключові практики включають: мислення в діапазонах, врахування базових ставок, оновлення
      переконань з доказами та розрізнення між ризиком (відомі ймовірності)
      та невизначеністю (невідомі ймовірності). Це покращує калібрування та
      якість рішень.
    why_this_is_important: |
      Ймовірнісне мислення зменшує надмірну впевненість, покращує прогнозування та
      призводить до кращих рішень в умовах невизначеності. Воно є необхідним для інвестування,
      стратегії та будь-якої галузі, де майбутнє невизначене.
    when_to_use:
      - прийняття_рішень
      - оцінка_ризиків
      - інвестування
      - вирішення_проблем
    how_can_you_spot_it:
      likelihood_language: |
        «Ймовірно», «скоріше за все», «малоймовірно» замість «буде» або «не буде».
      scenario_thinking: |
        Розгляд кількох можливих майбутніх із приблизними ймовірностями.
      calibration: |
        Прогнози, які з часом відповідають фактичним частотам результатів.
      uncertainty_acknowledgment: |
        Явне зазначення того, чого ви не знаєте.
    examples:
      forecasting: |
        «Я думаю, є 60% шансів, що ми вкладемося в терміни» замість «Ми
        вкладемося в терміни».
      investing: |
        «Це має 30% шансів на 2x прибуток і 70% шансів на -50%» замість
        «Це злетить до небес».
      strategy: |
        Планування кількох сценаріїв (найкращий, базовий, найгірший випадок) із приблизними
        ймовірностями.
      hiring: |
        «На основі співбесіди я б призначив 70% ймовірності успіху» замість
        «Це чудовий кандидат».
    real_world_implications: |
      Ймовірнісне мислення покращує калібрування, зменшує несподіванки та забезпечує
      краще управління ризиками. Воно є центральним для ефективного прогнозування та
      прийняття рішень в умовах невизначеності.
    professional_application:
      networking_and_relationship_building: |
        Спілкуйтеся ймовірностями, коли це доречно – «Я досить впевнений» проти
        «Я впевнений». Це будує довіру, сигналізуючи про епістемічну смиренність.
      collaborative_learning_initiative: |
        Заохочуйте команди висловлювати невизначеність. Використовуйте ринки прогнозів або
        вправи з калібрування для покращення ймовірнісного судження.
    how_can_this_be_misapplied:
      false_precision: |
        Призначення точних ймовірностей (наприклад, 73%), коли ви не можете бути настільки точними.
      analysis_paralysis: |
        Ніколи не діяти, тому що «ми не можемо бути впевнені».
      hedging_overuse: |
        Надмірне пом'якшення всього до рівня марності.
      dismissing_intuition: |
        Надмірна корекція, щоб ігнорувати сильні внутрішні відчуття, коли вони можуть містити цінну
        інформацію.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Ефект Пігмаліона
    quick_introduction: |
      Ефект Пігмаліона (або ефект Розенталя) — це явище, коли вищі очікування
      призводять до покращення результатів. Коли вчителі, менеджери чи інші
      люди очікують від когось більшого, ця особа, як правило, показує кращі
      результати. Очікування стають самоздійснюваними пророцтвами.
    one_liner: Вищі очікування призводять до кращих результатів — очікування формують реальність.
    try_this:
      - Ставте високі, але досяжні очікування; чітко їх комунікуйте.
      - Звертайте увагу, коли низькі очікування можуть обмежувати чиюсь ефективність.
      - Запитайте себе: Чого я неявно очікую — і як це може вплинути на результати?
    ask_yourself:
      - Чи допомагають мої очікування цій людині, чи обмежують її?
      - Чи змінило б це, якби я мав вищі очікування, те, як я до них ставлюся — та їхні результати?
    in_more_detail: |
      Роберт Розенталь і Ленор Джейкобсон надали вчителям неправдиву інформацію про те, що певні учні "розцвітуть" академічно. Ці учні — обрані випадковим чином — насправді досягли кращих результатів, ніж інші. Очікування вчителів вплинули на їхню поведінку (більше уваги, тепліший зворотний зв'язок), що, у свою чергу, вплинуло на результати учнів. Очікування формують реальність.

      Зворотне явище — коли низькі очікування призводять до гірших результатів — іноді називають ефектом Голема. Обидва явища демонструють, що наші переконання щодо інших можуть впливати на їхні результати. Це має глибокі наслідки для лідерства, освіти та виховання.
    why_this_is_important: |
      Розуміння ефекту Пігмаліона допомагає вам використовувати силу очікувань. Високі очікування, щиро комуніковані, можуть покращити результати. Низькі очікування можуть призвести до самоздійснюваного провалу. Ваші переконання щодо інших мають значення.
    when_to_use:
      - лідерство
      - побудова_відносин
      - навчання
      - прийняття_рішень
    how_can_you_spot_it:
      expectation_performance_link: |
        Ті, від кого ми очікуємо більшого, як правило, показують кращі результати.
      differential_treatment: |
        Ми по-різному ставимося до людей на основі наших очікувань — часто
        несвідомо.
      self_fulfilling_prophecy: |
        Переконання щодо здібностей впливають на поведінку, яка формує
        здібності.
      teacher_student_dynamics: |
        Очікування педагогів впливають на результати учнів через
        диференційоване ставлення.
    examples:
      education: |
        Вчителі, які очікують успіху від учнів, надають більше підтримки;
        ці учні покращують свої результати. Вчителі, які очікують провалу, можуть
        мимоволі його створювати.
      workplace: |
        Керівники, які очікують високих результатів від підлеглих, надають
        більше можливостей і зворотного зв'язку; результати покращуються.
      parenting: |
        Батьки, які очікують відповідальності від своїх дітей, надають
        їм більше відповідальності; діти справляються з нею.
      stereotypes: |
        Загроза стереотипу — це зворотне явище: негативні очікування
        можуть погіршувати результати.
    real_world_implications: |
      Ефект Пігмаліона впливає на освіту, менеджмент та стосунки. Він свідчить про те, що підвищення очікувань — коли це робиться підтримуюче — може покращити результати. Він також попереджає, що низькі очікування можуть бути руйнівними.
    professional_application:
      networking_and_relationship_building: |
        Ставте високі очікування щодо людей — і надавайте підтримку для їх досягнення. Вірте в потенціал. Ваші очікування
        впливають на вашу поведінку, яка впливає на їхні результати.
      collaborative_learning_initiative: |
        Створюйте культуру високих очікувань з високою підтримкою.
        Уникайте навішування ярликів "низькокваліфікованих виконавців" на людей у такий спосіб, що це стає самоздійснюваним. Інвестуйте в тих, від кого ви очікуєте успіху.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Встановлення очікувань, які неможливо досягти без підтримки, призводить до провалу та деморалізації.
      blame_shifting: |
        "Вони не виправдали очікувань", коли ми не надали
        підтримки чи умов для успіху.
      ignoring_constraints: |
        Самі по собі очікування не долають структурні бар'єри.
      pressure_without_support: |
        Високі очікування без ресурсів чи підтримки можуть бути шкідливими.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Регресія до середнього
    quick_introduction: |
      Регресія до середнього – це статистичне явище, коли екстремальні результати, як правило,
      супроводжуються результатами, ближчими до середнього. Після надзвичайно хорошого або поганого
      результату наступний результат, ймовірно, буде менш екстремальним — не через будь-яке причинне
      втручання, а через випадкові відхилення.
    one_liner: Екстремальні результати, як правило, супроводжуються результатами, ближчими до середнього.
    try_this:
      - Не приписуйте "регресію" своєму втручанню — це часто сталося б і так.
      - Після екстремального результату очікуйте, що наступний буде менш екстремальним.
      - Запитайте: ця зміна зумовлена моїми діями чи просто регресією до середнього?
    ask_yourself:
      - Чи приписую я успіх або невдачу своєму втручанню, коли це може бути випадковим відхиленням?
      - Чи сталося б це без моєї дії?
    in_more_detail: |
      Якщо студент отримав надзвичайно високий бал на одному тесті, на наступному він, ймовірно, отримає бал, ближчий до свого середнього — не тому, що він "став лінивим", а тому, що перший результат був частково вдалим. Те ж саме стосується спортивних досягнень, прибутковості акцій та бізнес-показників. Ми часто приписуємо "регресію" чомусь, що ми зробили (наприклад, покаранню чи винагороді), коли це сталося б і так.

      Даніель Канеман описує, як інструктори з польотів помилково дійшли висновку, що похвала погіршує результати, а критика покращує їх — вони спостерігали регресію до середнього після екстремальних показників.
    why_this_is_important: |
      Розуміння регресії до середнього запобігає помилковому приписуванню причинно-наслідкових зв'язків. Це допомагає уникнути надмірної реакції на викиди та внесення змін на основі шуму. Це є важливим для оцінки втручань та ефективності.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - оцінка_ризиків
      - лідерство
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Надзвичайно хороший або поганий результат супроводжується результатом, ближчим до середнього.
      spurious_causation: |
        Приписування "відновлення" або "зниження" втручанню, коли регресія сталася б і так.
      overreaction_to_outliers: |
        Прийняття політичних або особистих змін на основі одного екстремального показника даних.
      reward_punishment_confusion: |
        Віра в те, що покарання "спрацювало", коли поліпшення було лише регресією.
    examples:
      sports: |
        Гравець демонструє гру кар'єри, потім повертається до середнього — вболівальники можуть звинувачувати "самовдоволеність".
      investing: |
        Акція має чудовий рік, потім повертається до норми — інвестори можуть приписувати зниження
        поганому управлінню, коли це частково повернення.
      performance_reviews: |
        Співробітник має поганий квартал, отримує відгук, покращується — відгук може отримати
        кредит, коли регресія сталася б незалежно від цього.
      medicine: |
        Пацієнту стає гірше, він приймає лікування, покращується — лікування може отримати
        кредит, коли деяке покращення було природним.
    real_world_implications: |
      Регресія до середнього впливає на те, як ми оцінюємо вчителів, лікарів, менеджерів фондів та себе. Це пояснює, чому "що піднімається, мусить падати" часто статистично вірно. Нерозуміння цього призводить до марних втручань та хибної впевненості у засобах.
    professional_application:
      networking_and_relationship_building: |
        Не переоцінюйте одну погану взаємодію — це може бути викид, який повернеться до середнього значення стосунків.
      collaborative_learning_initiative: |
        При оцінці втручань (навчання, зміни процесів) використовуйте контрольні групи
        та кілька точок даних, щоб відрізнити ефект від регресії.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Припущення, що будь-яке покращення після втручання є "просто регресією",
        коли існують реальні ефекти.
      underreacting: |
        Ігнорування справжніх проблем, тому що "це повернеться до середнього".
      statistical_illiteracy: |
        Плутанина регресії з силою, яка "коригує" результати — це просто
        ймовірність.
      overconfidence: |
        Припущення, що середнє стабільне, коли базовий процес міг змінитися.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Рожева ретроспекція
    quick_introduction: |
      Рожева ретроспекція — це тенденція запам'ятовувати минуле кращим, ніж воно було.
      З часом ми згадуємо минулий досвід більш позитивно, згладжуючи труднощі
      та підсилюючи добре. "Золоті старі часи" часто були не такими добрими, як ми їх пам'ятаємо.
    one_liner: Ми пам'ятаємо минуле кращим, ніж воно було — "золоті старі часи" були не такими вже й золотими.
    try_this:
      - Порівнюючи з минулим, запитайте: Що я насправді відчував тоді?
      - Ведіть щоденник, щоб порівняти пам'ять з реальністю пізніше.
      - Звертайте увагу, коли ностальгія забарвлює ваше судження про сьогодення.
    ask_yourself:
      - Чи ідеалізую я минуле?
      - Чи був би я щасливий тоді, якби міг повернутися в минуле?
    in_more_detail: |
      Ми схильні запам'ятовувати позитивні аспекти минулого досвіду і забувати або
      мінімізувати негативні. Відпустки, роботи та стосунки в ностальгії здаються кращими, ніж вони були в моменті. Це може призвести до нереалістичних
      порівнянь — ми судимо сьогодення за ідеалізованим минулим.

      Рожева ретроспекція впливає на прийняття рішень, коли ми повторюємо минулі вибори,
      очікуючи того ж (запам'ятованого) результату. Це також може підживлювати ностальгію за
      ерами, які об'єктивно були гіршими. Це протилежність негативній упередженості
      у пам'яті.
    why_this_is_important: |
      Визнання рожевої ретроспекції допомагає робити більш реалістичні порівняння
      та уникати повторення минулих помилок, заснованих на ідеалізованих спогадах. Це також
      пояснює, чому ми іноді прагнемо до минулого, незважаючи на поточний прогрес.
    when_to_use:
      - прийняття_рішень
      - кар'єрні_зміни
      - побудова_стосунків
      - навчання
    how_can_you_spot_it:
      idealized_past: |
        "Тоді було краще", коли об'єктивні показники можуть свідчити про протилежне.
      selective_positive_memory: |
        Запам'ятовування хорошого та забування поганого з минулого досвіду.
      nostalgia_as_evidence: |
        Використання приємних спогадів як доказу того, що минулі рішення були правильними.
      present_undervaluation: |
        Сьогодення здається гіршим, ніж є насправді, тому що ми порівнюємо його з ідеалізованим минулим.
    examples:
      career: |
        "Моя попередня робота була чудовою", хоча ви пішли з неї з вагомих причин — пам'ять згладила
        розчарування.
      relationships: |
        "Ми були такими щасливими" у минулих стосунках — забуваючи конфлікти, які призвели до їхнього завершення.
      childhood: |
        "Дітям у мої часи жилося краще", коли багато об'єктивних показників (здоров'я,
        безпека, можливості) покращилися.
      projects: |
        "Той проєкт пройшов гладко", хоча насправді було багато затримок — ми пам'ятаємо
        результат, а не процес.
    real_world_implications: |
      Рожева ретроспекція впливає на задоволеність життям, кар'єрні рішення та
      вибори, керовані ностальгією. Це може призвести до повторення минулих помилок або
      нереалістичних порівнянь. Це також пояснює привабливість риторики "назад до золотих старих часів".
    professional_application:
      networking_and_relationship_building: |
        Розглядаючи можливість відновити зв'язки з колишніми колегами або повернутися на попередні
        посади, відокремлюйте ностальгію від реальності. Документуйте причини свого звільнення на той час; перегляньте їх перед поверненням.
      collaborative_learning_initiative: |
        На ретроспективах використовуйте одночасні нотатки або дані, а не пам'ять, для оцінки того, що насправді сталося. Пам'ять згладжує труднощі.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Не вся ностальгія вводить в оману — іноді минуле дійсно було кращим
        у деяких аспектах.
      invalidating_memories: |
        Казати людям, що їхні позитивні спогади "неправильні", коли вони можуть відображати
        щирий суб'єктивний досвід.
      overcorrection: |
        Припускати, що минуле завжди було гіршим, ніж ми його пам'ятаємо — іноді воно було
        кращим.
      present_bias: |
        Використання рожевої ретроспекції як виправдання для відкидання законних занепокоєнь
        щодо поточного спаду.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Упередженість помітності
    quick_introduction: |
      Упередженість помітності – це тенденція зосереджуватися на найвиразніших або найпомітніших
      аспектах ситуації, ігноруючи менш очевидні, але потенційно
      важливі чинники. Те, що виділяється, отримує непропорційну увагу та
      вагу в наших судженнях.
    one_liner: Те, що виділяється, отримує непропорційну увагу – тонкощі ігноруються.
    try_this:
      - Запитайте: Що я не бачу, тому що воно не помітне?
      - Активно шукайте менш очевидні чинники перед прийняттям рішення.
      - Зверніть увагу, коли яскравий або драматичний елемент домінує у вашому судженні.
    ask_yourself:
      - Чи не переоцінюю я те, що помітне, і недооцінюю те, що тонке?
      - Які важливі чинники я можу упускати?
    in_more_detail: |
      Помітна інформація є яскравою, емоційно зарядженою або нещодавно отримана.
      Вона привертає увагу і впливає на рішення сильніше, ніж повинна. Ми
      переоцінюємо очевидне і недооцінюємо тонке. Драматична подія
      або яскравий приклад можуть домінувати в нашому мисленні, навіть якщо вони
      не є репрезентативними.

      Упередженість помітності перетинається з евристикою доступності (що спадає на думку)
      та упередженістю новизни (що сталося нещодавно). Вона впливає на сприйняття ризику,
      найм, і стратегію. Найбільш очевидні проблеми вирішуються;
      невидимі – загострюються.
    why_this_is_important: |
      Розпізнавання упередженості помітності допомагає вам дивитися за межі очевидного і
      враховувати менш помітні чинники. Це покращує оцінку ризиків, діагностику проблем
      та якість рішень. Важливі речі не завжди
      помітні.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - оцінка_ризиків
      - лідерство
    how_can_you_spot_it:
      prominent_factor_dominance: |
        Найпомітніший аспект керує рішенням.
      overlooking_background: |
        Менш помітні чинники ігноруються, незважаючи на їхню важливість.
      vividness_overweighting: |
        Драматична або емоційна інформація отримує непропорційну вагу.
      visibility_bias: |
        Те, що ми легко бачимо або вимірюємо, отримує більше уваги, ніж
        те, що не можемо.
    examples:
      risk: |
        Авіакатастрофа є помітною – ми переоцінюємо ризик польотів. Автомобільні
        аварії менш помітні в сукупності – ми недооцінюємо
        ризик водіння.
      hiring: |
        Навички презентації кандидата є помітними; його
        виконання може бути менш очевидним, але не менш важливим.
      strategy: |
        Дії конкурентів є помітними; поступові ринкові зміни
        менш помітні, але можуть мати більше значення.
      problems: |
        Найгучніша скарга вирішується, тоді як системні проблеми
        залишаються непоміченими.
    real_world_implications: |
      Упередженість помітності впливає на те, що отримує увагу, фінансування та дію.
      Це може призвести до вирішення симптомів замість причин та
      до неправильного розподілу ресурсів. Навмисний пошук непомітної
      інформації покращує рішення.
    professional_application:
      networking_and_relationship_building: |
        Не судіть про людей лише за їхніми найпомітнішими рисами. Шукайте
        менш очевидні якості – надійність, послідовність, як
        вони ставляться до людей, які не можуть їм допомогти.
      collaborative_learning_initiative: |
        У вирішенні проблем явно запитуйте "Що ми не бачимо?"
        і "Що є менш очевидним, але важливим?" Створюйте процеси,
        які виявляють непомітні проблеми.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Іноді те, що помітне, є важливим. Не відкидайте
        все очевидне.
      false_sophistication: |
        Припущення, що приховані чинники завжди важливіші
        за очевидні.
      analysis_paralysis: |
        Пошук такої кількості непомітних чинників, що ви ніколи не дієте відповідно до помітних.
      contrarianism: |
        Відкидання помітної інформації лише для того, щоб бути іншим.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Упередження через дефіцит
    quick_introduction: |
      Упередження через дефіцит — це тенденція надавати вищу цінність речам, коли вони здаються рідкісними або обмеженими. "Обмежений час", "залишилося лише 3" та "ексклюзивний доступ" викликають відчуття терміновості та бажання, часто переважаючи раціональну оцінку того, чи справді нам потрібна ця річ.
    one_liner: Дефіцит збільшує сприйняту цінність — "обмежений" викликає терміновість замість раціональності.
    try_this:
      - Запитайте: чи хотілося б мені це, якби це не було в дефіциті? Усуньте терміновість.
      - Зачекайте, перш ніж діяти за пропозиціями "обмежений час" або "залишилося лише X".
      - Зверніть увагу, коли дефіцит стимулює ваше бажання більше, ніж справжня цінність.
    ask_yourself:
      - Чи ціную я це тому, що воно в дефіциті, чи тому, що воно мені справді потрібне?
      - Чи прийняв би я це рішення без контексту дефіциту?
    in_more_detail: |
      Дефіцит збільшує сприйняту цінність. Коли щось рідкісне або зникає, ми хочемо цього більше — частково тому, що дефіцит може сигналізувати про якість, а частково тому, що страх втрати змушує нас боятися пропустити. Маркетологи та переговорники використовують дефіцит для створення терміновості. Упередження може призвести до імпульсивних рішень, надмірних витрат та поганої пріоритезації.

      Дефіцит також впливає на когнітивні можливості тих, хто справді обмежений ресурсами; бідність може зменшувати "психічну пропускну здатність" для інших рішень.
    why_this_is_important: |
      Розпізнавання упередження через дефіцит допомагає вам протистояти маніпулятивним тактикам та приймати більш обдумані рішення. Це також пояснює, чому ми переоцінюємо лімітовані видання та поспішаємо, коли нам не потрібно.
    when_to_use:
      - прийняття_рішень
      - переговори
      - інвестування
      - оцінка_ризиків
    how_can_you_spot_it:
      urgency_trigger: |
        "Обмежений час" або "залишилося лише X" створює непропорційне бажання.
      fear_of_missing_out: |
        Можливість втратити доступ стимулює до дії більше, ніж внутрішня цінність.
      impulsive_purchases: |
        Купівля речей через їхню рідкісність, а не через необхідність.
      artificial_scarcity: |
        Дефіцит є штучним (наприклад, фальшиві зворотні відліки), а не справжнім.
    examples:
      sales: |
        "Залишилося лише 2 одиниці" або "Розпродаж закінчується сьогодні ввечері" стимулює покупки, які не відбулися б без терміновості.
      auctions: |
        Учасники торгів захоплюються процесом виграшу і платять більше, ніж планували, через конкурентний дефіцит.
      exclusivity: |
        Доступ "тільки для членів" або "тільки за запрошенням" підвищує сприйняту цінність.
      genuine_scarcity: |
        Коли ресурси справді обмежені, люди в стані дефіцитного стресу приймають гірші рішення (наприклад, бідні, ті, хто поспішає).
    real_world_implications: |
      Упередження через дефіцит стимулює споживчу поведінку, результати переговорів та реакцію на політику. Його можна використовувати етично (наприклад, законні терміни) або неетично (наприклад, фальшивий дефіцит). Розуміння його покращує якість рішень.
    professional_application:
      networking_and_relationship_building: |
        Будьте обережні, коли інші створюють штучний дефіцит ("Я беру лише кількох клієнтів"). Перевірте, чи дефіцит справжній. Будуючи стосунки, справжній дефіцит вашого часу може сигналізувати про цінність — але надмірне використання відчувається маніпулятивно.
      collaborative_learning_initiative: |
        Створюючи терміновість для ініціатив, переконайтеся, що вона законна. Фальшиві терміни руйнують довіру, коли їх виявляють.
    how_can_this_be_misapplied:
      manipulation: |
        Навмисне створення фальшивого дефіциту для тиску на інших до прийняття рішень.
      impulsive_decisions: |
        Прийняття важливих рішень під штучною терміновістю, коли більше часу покращило б результати.
      overvaluing_scarcity: |
        Припущення, що рідкісні речі завжди кращі — іноді дефіцит є довільним.
      exploiting_vulnerability: |
        Використання тактики дефіциту на людях, які вже перебувають у стані дефіцитного стресу.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Мислення другого порядку
    quick_introduction: |
      Мислення другого порядку — це практика врахування наслідків наслідків ваших дій.
      Мислення першого порядку запитує: «Що станеться, якщо я зроблю X?»
      Мислення другого порядку запитує: «А що потім?» і «А що потім після цього?»
      Воно виявляє ненавмисні ефекти.
    one_liner: Запитуйте «А що потім?» — враховуйте наслідки наслідків.
    try_this:
      - Для будь-якого рішення запитуйте «А що потім?» щонайменше двічі.
      - Розгляньте, як інші відреагують на вашу дію — а потім на цю реакцію.
      - Зверніть увагу, коли ефекти першого порядку обертаються або ускладнюються в ланцюжку.
    ask_yourself:
      - Чи продумав я наслідки другого (і третього) порядку?
      - Яких ненавмисних наслідків я можу не помітити?
    in_more_detail: |
      Говард Маркс популяризував цю концепцію в інвестуванні. Перший порядок: «Це зросте».
      Другий порядок: «Якщо це зросте, інші це помітять, більше купуватимуть, це зросте ще більше —
      доки воно не стане переоціненим і не зазнає краху». Ланцюжок наслідків часто обертає або
      ускладнює ефект першого порядку.

      Мислення другого порядку складніше — воно вимагає більше розумових зусиль та уяви.
      Але воно запобігає багатьом помилкам. Хороші стратеги думають на кілька кроків уперед
      і враховують, як відреагують інші.
    why_this_is_important: |
      Мислення другого порядку запобігає ненавмисним наслідкам і покращує якість рішень.
      Воно є необхідним для стратегії, політики та будь-якої сфери, де дії викликають реакції.
    when_to_use:
      - прийняття_рішень
      - вирішення_проблем
      - стратегія
      - оцінка_ризиків
    how_can_you_spot_it:
      consequence_chains: |
        «Якщо я зроблю X, то станеться Y, потім станеться Z...»
      reaction_anticipation: |
        Розгляд того, як інші відреагують на вашу дію.
      unintended_effects: |
        Пошук побічних ефектів та циклів зворотного зв'язку.
      reversals: |
        Наслідки другого порядку, які суперечать або обертають наслідки першого порядку.
    examples:
      investing: |
        «Якщо всі вважають це хорошою інвестицією, ймовірно, там вже багато гравців —
        перевага може зникнути».
      policy: |
        «Якщо ми субсидуємо X, попит зростає, ціни підвищуються — чи справді субсидія
        допомагає?»
      negotiation: |
        «Якщо я тут буду наполягати, вони там відімстять — який чистий ефект?»
      incentives: |
        «Якщо ми винагородимо за цей показник, люди будуть маніпулювати ним — що вони насправді
        зроблять?»
    real_world_implications: |
      Мислення другого порядку є ознакою стратегічного мислення. Воно запобігає провалам
      політики, ненавмисним стимулам та наївному оптимізму. Воно відрізняє хороших
      від видатних осіб, які приймають рішення.
    professional_application:
      networking_and_relationship_building: |
        Перш ніж вчинити дію, запитайте: «Як вони відреагують? А як я відреагую на це?»
        Розгляньте динаміку стосунків, а не лише безпосередній обмін.
      collaborative_learning_initiative: |
        Під час планування проводьте вправи «а що потім?». Прокладайте ланцюжки наслідків.
        Виявляйте ненавмисні ефекти до того, як вони з'являться.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Роздуми настільки багато кроків уперед, що ви ніколи не дієте.
      false_complexity: |
        Припущення, що наслідки другого порядку завжди домінують, коли наслідки першого
        порядку можуть бути достатніми.
      overconfidence: |
        Віра в те, що ви можете передбачити довгі ланцюжки, коли невизначеність накопичується.
      pessimism: |
        Завжди припущення найгіршого в ланцюжку наслідків.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Упередження щодо невідшкодовуваних витрат
    quick_introduction: |
      Упередження щодо невідшкодовуваних витрат — це схильність продовжувати інвестувати в рішення через
      вже витрачені ресурси, а не з огляду на майбутні очікувані вигоди.
      Фрази «ми зайшли так далеко» або «я вже стільки вклав» призводять до того, що «добрі гроші»
      йдуть за поганими.
    one_liner: Минулі інвестиції втрачено — мають значення лише майбутні витрати та вигоди.
    try_this:
      - Запитайте: Якби я починав сьогодні, чи обрав би я цей шлях?
      - Заздалегідь визначте «критерії припинення» — умови, за яких ви зупинитеся.
      - Оцініть граничне рішення: що я виграю або втрачу відтепер і далі?
    ask_yourself:
      - Чи я продовжую через майбутню цінність, чи щоб обґрунтувати минулі інвестиції?
      - Що б я порадив другу, який опинився б на моєму місці з нуля?
    in_more_detail: |
      Невідшкодовувані витрати — це минулі витрати, які неможливо повернути. Раціональне прийняття рішень
      ігнорує їх — мають значення лише майбутні витрати та вигоди. Але ми емоційно
      прив'язані до наших інвестицій. Ми доїдаємо їжу, яка нам не подобається, залишаємося на фільм, який нам не сподобався,
      і продовжуємо проєкти, які вже не мають сенсу. Ми хочемо «не витратити марно» те, що вклали,
      але продовження часто призводить до більших втрат.

      Упередження особливо сильне, коли ми вклали час, зусилля чи ідентичність,
      а не тільки гроші. Визнати, що ми помилилися, може бути болісно, тому ми подвоюємо ставки.
    why_this_is_important: |
      Визнання упередження щодо невідшкодовуваних витрат допомагає скоротити збитки, змінити напрямок, коли
      це виправдано, і приймати рішення на основі майбутньої цінності, а не минулих інвестицій.
      Це важливо для проєктів, кар'єри та стосунків.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - кар'єрні_зміни
      - оцінка_ризиків
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        «Ми не можемо зупинитися зараз — ми вже витратили Х», коли майбутні прибутки не виправдовують
        продовження.
      escalation_of_commitment: |
        Інвестування більше, щоб виправдати або «врятувати» попередні інвестиції.
      identity_investment: |
        Продовження, тому що визнання поразки загрожувало б самооцінці.
      ignoring_marginal_analysis: |
        Прийняття рішень на основі загальних витрат, а не граничних витрат і вигод.
    examples:
      projects: |
        Продовження невдалого проєкту, тому що «ми вже витратили на нього 6 місяців»,
        коли скорочення збитків було б раціональним.
      relationships: |
        Залишатися у стосунках, тому що «ми разом 5 років», замість
        оцінки майбутнього.
      careers: |
        Залишатися в кар'єрі, яка не подобається, тому що були вкладені кошти в диплом або
        роки досвіду.
      investments: |
        Тримати збиткову акцію, щоб «повернути свої гроші», замість перерозподілу в
        кращі можливості.
    real_world_implications: |
      Упередження щодо невідшкодовуваних витрат призводить до марної трати ресурсів, тривалих невдач та втрачених
      можливостей. Воно впливає на індивідів, організації та уряди.
      Подолання його вимагає чітких рамок прийняття рішень.
    professional_application:
      networking_and_relationship_building: |
        Не продовжуйте інвестувати у стосунки чи співпрацю, які більше не приносять вам користі, лише через минулі інвестиції. Оцінюйте перспективну цінність.
      collaborative_learning_initiative: |
        Створіть «критерії припинення» для проєктів — умови, за яких ви зупинитеся
        незалежно від минулих інвестицій. Регулярно переглядайте проєкти з точки зору «з нуля».
    how_can_this_be_misapplied:
      quitting_too_early: |
        Використання «невідшкодовуваних витрат» як виправдання для відмови від речей, які потребують більше часу, щоб принести плоди.
      undervaluing_consistency: |
        Деякі зобов'язання (наприклад, стосунки, репутація) мають цінність у безперервності,
        яку не враховує чистий граничний аналіз.
      cold_rationality: |
        Відкидання емоційної прив'язаності як нераціональної, коли вона може відображати справжні
        цінності.
      analysis_paralysis: |
        Надмірне роздумування, чи продовжувати, коли відповідь очевидна.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Упередження тих, хто вижив
    quick_introduction: |
      Упередження тих, хто вижив — це логічна помилка, коли ми зосереджуємося на людях або речах, які "вижили" в певному процесі, ігноруючи тих, хто не вижив. Ми бачимо переможців і забуваємо про переможених, що призводить до надмірно оптимістичних висновків про успіх і невдачу.
    one_liner: Ми бачимо переможців і забуваємо про переможених — це призводить до надмірно оптимістичних висновків.
    try_this:
      - Запитайте: Хто зазнав невдачі, роблячи щось подібне? Чого ми можемо навчитися від них?
      - Шукайте "невидиму" вибірку — тих, хто не вижив.
      - Зверніть увагу, коли ви вивчаєте лише історії успіху.
    ask_yourself:
      - Чи я навчаюся лише від тих, хто вижив?
      - Як би виглядала повна картина, якби я включив невдачі?
    in_more_detail: |
      Під час Другої світової війни статистик Абрахам Вальд скоригував розміщення броні на бомбардувальниках, аналізуючи, куди влучили літаки, що вижили — і рекомендував бронювати місця, куди влучили *не*-вцілілі літаки, оскільки ці літаки ніколи не поверталися. Ми природно зосереджуємося на видимій вибірці (тих, хто вижив) і ігноруємо невидиму (тих, хто зазнав невдачі).

      Упередження тих, хто вижив спотворює наше бачення підприємництва, інвестицій, кар'єри та історії. Ми вивчаємо успішні компанії та пропускаємо тисячі тих, що зазнали невдачі, роблячи схожі речі. Ми чуємо від щасливчиків і забуваємо про нещасливчиків.
    why_this_is_important: |
      Виправлення упередження тих, хто вижив, призводить до більш реалістичних очікувань та кращих рішень. Це допомагає вам вчитися на невдачах, а не лише на успіхах, і уникати копіювання стратегій, які спрацювали лише для щасливого меншинства.
    when_to_use:
      - прийняття_рішень
      - інвестування
      - кар'єрні_зміни
      - навчання
    how_can_you_spot_it:
      visible_success_stories: |
        Ми чуємо від успішних людей набагато більше, ніж від тих, хто намагався і зазнав невдачі.
      missing_failures: |
        Вибірка, яку ми спостерігаємо, виключає тих, хто "не досяг успіху" і тому не може розповісти свої історії.
      copying_survivors: |
        Припущення, що те, що робили ті, хто вижив, спричинило їхній успіх, хоча це могла бути удача чи ефект виживання.
      overly_optimistic_models: |
        Оцінки показників успіху, які ігнорують знаменник спроб.
    examples:
      entrepreneurship: |
        "Кинь коледж, як Цукерберг" ігнорує багатьох студентів, які кинули навчання, але не заснували компанії вартістю в мільярди доларів.
      investing: |
        Вивчення лише фондів, які вижили, ігнорує ті, що закрилися після поганої ефективності, завищуючи історичну дохідність.
      career_advice: |
        Успішні люди приписують успіх важкій праці; ми не чуємо від тих, хто багато працював і зазнав невдачі.
      historical_analysis: |
        Вивчення "великих" компаній, які вижили, ігнорує багато тих, що зазнали невдачі з подібними стратегіями.
    real_world_implications: |
      Упередження тих, хто вижив, завищує сприйняті показники успіху, спотворює зразки для наслідування та призводить до поганого наслідування. Виправлення цього вимагає пошуку випадків невдач та розуміння базових показників.
    professional_application:
      networking_and_relationship_building: |
        Шукаючи поради, звертайтеся також до людей, які намагалися і зазнали невдачі — їхні погляди часто більш інформативні, ніж погляди тих, хто вижив.
      collaborative_learning_initiative: |
        Вивчайте невдалі проєкти та закриті ініціативи, а не лише успішні. Проводьте "посмертні аналізи невдач", щоб вчитися на тому, що не спрацювало.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Надмірне виправлення, яке призводить до припущення, що успіх — це завжди удача, а зусилля не мають значення.
      dismissing_success: |
        Відмова вчитися в успішних людей через "упередження тих, хто вижив".
      analysis_paralysis: |
        Настільки зосереджений на випадках невдач, що ви ніколи не робите жодних дій.
      false_equivalence: |
        Ставлення до стратегій тих, хто вижив, і тих, хто не вижив, як до однаково інформативних, коли контекст відрізняється.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Ефект Зейгарнік
    quick_introduction: |
      Ефект Зейгарнік — це схильність краще пам'ятати незавершені або перервані
      завдання, ніж завершені. Незавершені завдання створюють психологічну
      напругу, яка підтримує їх активними в нашій свідомості. Наш мозок утримує
      те, що незавершене.
    one_liner: Незавершені завдання застрягають у нашій свідомості — наш мозок утримує те, що не завершене.
    try_this:
      - Використовуйте завершення, щоб "звільнити" завдання від розумового навантаження — завершуйте їх або свідомо відмовляйтеся від них.
      - Розбивайте роботу на керовані частини, щоб створювати продуктивні відкриті цикли.
      - Звертайте увагу, коли ви обмірковуєте незавершені справи — закрийте цикл або вирішіть відпустити це.
    ask_yourself:
      - Які незавершені завдання створюють напругу в моїй свідомості?
      - Чи вартий цей відкритий цикл уваги, чи можу я його закрити?
    in_more_detail: |
      Блюма Зейгарнік помітила, що офіціанти краще пам'ятали неоплачені замовлення,
      ніж оплачені — як тільки завдання було виконано, воно "звільнялося" зі
      свідомості. Незавершені завдання створюють відкритий цикл, який вимагає
      завершення. Це зумовлює як продуктивну зосередженість (ми хочемо завершити),
      так і тривогу (ми не можемо перестати думати про те, що не зроблено).

      Ефект використовується в маркетингу (кліфгенґери, незавершені історії) та
      продуктивності (розбивання роботи на частини для створення кількох "відкритих
      циклів"). Він пояснює, чому ми обмірковуємо незавершені справи і чому списки
      завдань можуть здаватися нездоланними.
    why_this_is_important: |
      Розуміння ефекту Зейгарнік допомагає вам керувати розумовим навантаженням,
      створювати захопливий досвід та стратегічно використовувати перерви. Це
      пояснює, чому ми не можемо перестати думати про незавершену роботу — і чому
      це може бути використано на користь або завдати шкоди.
    when_to_use:
      - розв_язання_проблем
      - лідерство
      - навчання
      - прийняття_рішень
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Незавершені завдання частіше втручаються в думки, ніж завершені.
      better_recall_of_unfinished: |
        Ми краще пам'ятаємо перервані завдання, ніж завершені.
      tension_for_closure: |
        Дискомфорт або бажання завершити розпочате.
      serial_dramas: |
        Кліфгенґери та "продовження слідує" експлуатують цей ефект.
    examples:
      productivity: |
        Початок завдання створює розумову напругу, яка спонукає до завершення — або
        тривогу, якщо занадто багато відкритих циклів.
      marketing: |
        "Частина 1 з 3" або "Продовження слідує" утримують аудиторію зацікавленою та
        змушують повертатися.
      meetings: |
        Завершення зустрічі без чітких наступних кроків залишає учасників
        з невирішеною напругою.
      learning: |
        Нерозв'язані питання або незавершені пояснення залишаються в пам'яті
        та стимулюють подальші запити.
    real_world_implications: |
      Ефект Зейгарнік впливає на продуктивність, залученість та розумове
      навантаження. Його можна використовувати для зосередженості або він може
      створювати перевантаження. Він пояснює привабливість кліфгенґерів та тягар
      занадто багатьох відкритих завдань.
    professional_application:
      networking_and_relationship_building: |
        Завершуйте розмови з чіткими наступними кроками — або навмисними відкритими
        петлями, якщо ви хочете, щоб інша людина продовжила діалог. Невирішені
        зв'язки створюють залученість.
      collaborative_learning_initiative: |
        Використовуйте ефект Зейгарнік у навчанні: ставте проблеми або питання
        перед перервами, щоб утримувати увагу учнів. Але уникайте створення
        занадто багатьох відкритих циклів, щоб люди не відчували себе перевантаженими.
    how_can_this_be_misapplied:
      overwhelm: |
        Створення занадто багатьох відкритих циклів — занадто багатьох незавершених завдань — призводить до
        тривоги та паралічу.
      manipulation: |
        Навмисне залишення речей невирішеними для створення залежності або залученості.
      false_urgency: |
        Використання ефекту для створення штучної терміновості, коли її немає.
      incomplete_work: |
        Початок багатьох справ для створення "напруги" без фактичного
        їх завершення — що призводить до розпорошених зусиль.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Мислення з нульовою сумою
    quick_introduction: |
      Мислення з нульовою сумою — це переконання, що здобуток однієї людини означає втрату іншої —
      що ресурси фіксовані, і будь-яка перевага для вас означає недолік для мене.
      Насправді, багато ситуацій є позитивно-сумовими: обидві сторони можуть отримати вигоду.
    one_liner: Ваш здобуток не обов'язково має бути моєю втратою — багато ситуацій є позитивно-сумовими.
    try_this:
      - Запитайте: Чи можемо ми збільшити пиріг? Чи це справді гра з нульовою сумою?
      - Шукайте співпраці, перш ніж припускати конкуренцію.
      - Зверніть увагу, коли ви ставитеся до ситуації як до фіксованого пирога, коли це не так.
    ask_yourself:
      - Чи я припускаю фіксований пиріг, коли ми могли б його збільшити?
      - Чи принесе співпраця більше цінності, ніж конкуренція?
    in_more_detail: |
      У грі з нульовою сумою загальна кількість фіксована — ваш виграш — моя втрата. У позитивно-сумових
      ситуаціях співпраця створює цінність. Торгівля, інновації та побудова стосунків
      часто є позитивно-сумовими. Мислення з нульовою сумою призводить до непотрібної
      конкуренції, втрачених можливостей для співпраці та руйнівного
      суперництва.

      Ця упередженість поширена на переговорах, у політиці та в організаційній динаміці.
      Вона передбачає фіксований пиріг, коли пиріг часто можна збільшити. Це може стати
      самоздійснюваним пророцтвом: якщо ви ставитеся до інших як до супротивників, вони стають супротивниками.
    why_this_is_important: |
      Усвідомлення мислення з нульовою сумою відкриває можливості для співпраці та
      створення цінності. Воно покращує переговори, зменшує конфлікти та уможливлює
      взаємовигідні результати. Багато найкращих можливостей є позитивно-сумовими.
    when_to_use:
      - переговори
      - лідерство
      - побудова_стосунків
      - прийняття_рішень
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "Якщо вони виграють, я програю", коли ситуація може дозволити обом отримати вигоду.
      competitive_ framing: |
        Автоматичне обрамлення ситуацій як "ми проти них".
      envy_of_others_gains: |
        Образа на успіхи інших, ніби це зменшує ваш власний.
      missed_cooperation: |
        Невміння побачити можливості для співпраці, яка принесла б користь усім.
    examples:
      negotiation: |
        Припущення, що краща угода для іншої сторони означає гіршу угоду для
        вас — коли творчі рішення часто збільшують цінність для обох.
      salary: |
        "Якщо мій колега отримає підвищення, мені залишиться менше" — коли бюджети можуть бути
        гнучкими або підвищення може бути обґрунтоване створеною цінністю.
      politics: |
        "Здобутки їхньої партії — це наші втрати" — коли багато наслідків політики можуть
        принести користь кільком групам.
      career: |
        "Їхнє підвищення означає менше можливостей для мене" — коли зростання організації
        може створити більше можливостей для всіх.
    real_world_implications: |
      Мислення з нульовою сумою підживлює конфлікти, обмежує співпрацю та призводить до втрачених
      можливостей. Воно часто є помилковим в економіці, стосунках та
      інноваціях. Перехід до позитивно-сумового обрамлення покращує результати.
    professional_application:
      networking_and_relationship_building: |
        Шукайте шляхи створення цінності для інших — їхній успіх може створити
        можливості для вас. Будуйте стосунки, де обидві сторони отримують вигоду.
      collaborative_learning_initiative: |
        Обрамлюйте командні цілі як позитивно-сумові: спільний успіх, зростання пирога.
        Заохочуйте співпрацю замість внутрішньої конкуренції.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Деякі ситуації є іграми з нульовою сумою (наприклад, одне підвищення, фіксований бюджет).
        Удавати, що це не так, може бути наївно.
      naive_cooperation: |
        Припускати, що всі будуть співпрацювати, коли деякі учасники є щиро
        противниками.
      undervaluing_competition: |
        Конкуренція може стимулювати вдосконалення; не все суперництво є руйнівним.
      exploitation: |
        Використання "позитивно-сумового" обрамлення для вилучення цінності з інших, які не
        отримують вигоди.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
