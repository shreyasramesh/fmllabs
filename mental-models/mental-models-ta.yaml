# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Tamil)
# Consolidated from mental-models-ta/

mental_models:
  - id: ambiguity_effect
    name: தெளிவின்மை விளைவு
    quick_introduction: |
      தெளிவின்மை விளைவு என்பது, விளைவுகளின் நிகழ்தகவு பற்றிய தகவல் இல்லாதபோது, விருப்பங்களைத் தவிர்ப்பதற்கான போக்காகும். அறியப்படாத அபாயங்களை விட அறியப்பட்ட அபாயங்களை நாங்கள் விரும்புகிறோம்—அறியப்படாத அபாயங்கள் சிறந்ததாக இருந்தாலும் கூட. நிச்சயமற்ற தன்மை தணிக்கை உணர்வை ஏற்படுத்துகிறது.
    one_liner: அறியப்படாதவை சிறந்ததாக இருந்தாலும் கூட, அறியப்படாத அபாயங்களை விட அறியப்பட்ட அபாயங்களை நாங்கள் விரும்புகிறோம்.
    try_this:
      - கேளுங்கள்: நிச்சயமற்ற தன்மையால் இந்த விருப்பத்தைத் தவிர்க்கிறேனா, அல்லது உண்மையான பாதகம் உள்ளதா?
      - உங்களுக்குத் தெரிந்ததை அளவிடுங்கள்; சில சமயங்களில் "தெளிவற்ற" விருப்பத்திற்கு தெளிவான மேல்நோக்கு உள்ளது.
      - பாதுகாப்பாக உணருவதால் பழக்கமானவற்றிற்கு இயல்பாகவே செல்கிறீர்களா என்பதைக் கவனியுங்கள்.
    ask_yourself:
      - இது தெளிவற்றதாக இருப்பதால் இதை நிராகரிக்கிறேனா, அல்லது இது உண்மையில் மோசமானதா?
      - நிச்சயமற்ற விருப்பத்துடன் வசதியாக உணர எனக்கு என்ன தெரியும்?
    in_more_detail: |
      எள்ஸ்பெர்க் முரண்பாட்டில், அறியப்பட்ட பந்து விகிதங்களைக் கொண்ட ஒரு குடுவையில் பந்தயம் கட்ட மக்கள் விரும்புகிறார்கள், அறியப்படாத விகிதங்களைக் கொண்ட குடுவையை விட, அறியப்படாத குடுவை சிறந்த வாய்ப்புகளை வழங்கினாலும் கூட. தெளிவின்மையை நாம் வெறுக்கிறோம்—தெளிவற்றதை விட தெளிவான (மோசமாக இருந்தாலும்) நிகழ்தகவை நாம் விரும்புவோம்.

      இந்த விளைவு முதலீடு, தொழில் தேர்வுகள் மற்றும் கொள்கைகளில் முடிவுகளை பாதிக்கிறது. தெளிவற்ற ஆனால் சாத்தியமான சிறந்த விருப்பங்களைத் தவிர்ப்பதால் இது உகந்ததல்லாத தேர்வுகளுக்கு வழிவகுக்கும். பழக்கமான பிராண்டுகளையும் அறியப்பட்ட அளவுகளையும் நாம் ஏன் விரும்புகிறோம் என்பதையும் இது விளக்குகிறது.
    why_this_is_important: |
      தெளிவின்மை விளைவை அங்கீகரிப்பது, பழக்கமானவற்றை அதிகமாக விரும்புவதையும், நிச்சயமற்றவற்றை குறைவாக விரும்புவதையும் தவிர்க்க உங்களுக்கு உதவுகிறது. தெளிவின்மை நிர்வகிக்கக்கூடியதாக இருக்கும்போது தவறவிட்ட வாய்ப்புகளுக்கு இது வழிவகுக்கும். வெளிப்படைத்தன்மை மற்றும் தெளிவு ஏன் பதட்டத்தைக் குறைக்கிறது என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - இடர்_மதிப்பீடு
      - முதலீடு
      - தொழில்_மாற்றங்கள்
    how_can_you_spot_it:
      preference_for_known_risks: |
        தெளிவற்றவற்றை விட தெளிவான (மோசமாக இருந்தாலும்) நிகழ்தகவுகளைக் கொண்ட விருப்பங்களைத் தேர்ந்தெடுப்பது.
      avoidance_of_uncertainty: |
        "போதுமான அளவு தெரியாது" என்பதால் விருப்பங்களை நிராகரிப்பது.
      familiarity_over_optimality: |
        சிறந்த அறியப்படாததை விட அறியப்பட்டதை விரும்புவது.
      information_seeking: |
        தெளிவின்மையைக் குறைக்கும் தகவலுக்காக பணம் செலுத்தும் விருப்பம்—அது முடிவை மாற்றாவிட்டாலும் கூட.
    examples:
      investing: |
        பல்வகைப்படுத்தல் நன்மைகள் இருந்தபோதிலும், "நாங்கள் அவற்றை நன்கு புரிந்துகொள்வதால்" சர்வதேச பங்குகளை விட உள்நாட்டுப் பங்குகளை விரும்புவது.
      employment: |
        நிச்சயமற்ற மேல்நோக்கு கொண்ட ஒரு வேலையை விட, அறியப்பட்ட வேலையில் தங்கியிருப்பது.
      product_choice: |
        தரம் நிச்சயமற்ற புதிய விருப்பத்தை விட பழக்கமான பிராண்டைத் தேர்ந்தெடுப்பது.
      medical: |
        பிற்காலமானது சிறந்ததாக இருந்தாலும் கூட, பக்க விளைவுகள் அறியப்பட்ட சிகிச்சையை விட நிச்சயமற்ற விளைவுகளைக் கொண்ட சிகிச்சையை விரும்புவது.
    real_world_implications: |
      தெளிவின்மை விளைவு சந்தைகள், தொழில் தேர்வுகள் மற்றும் கொள்கைகளை வடிவமைக்கிறது. தெளிவான தகவல்களை வழங்குவதன் மூலமோ அல்லது முடிவுகளை மறுசீரமைப்பதன் மூலமோ இதை குறைக்க முடியும். வெளிப்படைத்தன்மை மற்றும் தகவல்தொடர்பு ஏன் பதட்டத்தைக் குறைக்கிறது என்பதையும் இது விளக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        உறவுகளில் தெளிவின்மையைக் குறைக்கவும்: எதிர்பார்ப்புகளை தெளிவுபடுத்தவும், வெளிப்படையாக தொடர்பு கொள்ளவும், நிச்சயமற்ற தன்மையைக் குறைக்கவும். மக்கள் அறியப்பட்ட சூழ்நிலைகளை விரும்புகிறார்கள்.
      collaborative_learning_initiative: |
        மாற்றத்தை அறிமுகப்படுத்தும்போது, தெளிவின்மையைக் குறைக்கவும்—என்ன நடக்கும், எப்போது, ​​ஏன் என்பது பற்றிய தெளிவான தகவல்களை வழங்கவும். தெளிவின்மை எதிர்ப்பை அதிகரிக்கிறது.
    how_can_this_be_misapplied:
      manipulation: |
        விரும்பிய விருப்பங்களை நோக்கி மக்களை வழிநடத்த வேண்டுமென்றே தெளிவின்மையை உருவாக்குதல்.
      false_clarity: |
        உண்மையான நிச்சயமற்ற தன்மை இருக்கும்போது தவறான உறுதியைக் கொடுத்தல்.
      overconfidence: |
        தெளிவின்மையைக் குறைப்பது எப்போதும் முடிவுகளை மேம்படுத்தும் என்று கருதுதல்—சில சமயங்களில் தெளிவற்ற விருப்பம் உண்மையில் சிறந்தது.
      analysis_paralysis: |
        சில தெளிவின்மை தவிர்க்க முடியாததாக இருக்கும்போது முடிவெடுப்பதற்கு முன் சரியான தகவலுக்காக காத்திருத்தல்.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: நங்கூரப் பக்கச்சார்பு
    quick_introduction: |
      முடிவுகளை எடுக்கும்போது, முதலில் எதிர்கொள்ளும் தகவலை அதிகமாகச் சார்ந்திருக்கும் போக்குக்கு நங்கூரப் பக்கச்சார்பு என்று பெயர். அந்த ஆரம்ப "நங்கூரம்" பின்னர் வரும் தீர்ப்புகளைத் திரித்துக் காட்டுகிறது, அது பொருத்தமற்றதாகவோ அல்லது தன்னிச்சையாகவோ இருந்தாலும் கூட.
    one_liner: நீங்கள் முதலில் பார்க்கும் எண், அதைத் தொடர்ந்து வரும் அனைத்து எண்களையும் வடிவமைக்கிறது.
    try_this:
      - ஒரு பேச்சுவார்த்தைக்கு முன், உங்கள் இலக்கு எண்ணைத் தீர்மானிக்கவும், அவர்களின் நங்கூரத்தால் பாதிக்கப்படுவதைத் தவிர்க்கவும்.
      - மதிப்பிடும்போது, ​​மற்றவர்கள் சொல்வதைக் கேட்பதற்கு முன், உங்கள் சொந்த எண்ணை முதலில் உருவாக்கவும்.
      - கேளுங்கள்: நான் முதலில் வேறு எண்ணைப் பார்த்திருந்தால் வித்தியாசமாக யோசிப்பேனா?
    ask_yourself:
      - நான் முதலில் என்ன எண் அல்லது யோசனையை எதிர்கொண்டேன் - அது எனது தீர்ப்பைத் திரித்துக் காட்டுகிறதா?
      - நான் நங்கூரத்திலிருந்து போதுமான அளவு சரிசெய்கிறேனா, அல்லது இன்னும் அதற்கு மிக நெருக்கமாக இருக்கிறேனா?
    in_more_detail: |
      ஒரு உன்னதமான சோதனையில், ஐ.நா.வில் உள்ள ஆப்பிரிக்க நாடுகளின் சதவீதத்தை மதிப்பிடுமாறு கேட்கப்பட்டவர்கள், அதிக எண்ணைக் கண்டால் (எ.கா., 65 என்பதற்குப் பதிலாக 10) அதிக மதிப்பீடுகளைக் கொடுத்தனர். நங்கூரம் - தற்செயலாக இருந்தாலும் கூட - அவர்களின் பதில்களைப் பாதித்தது. நங்கூரம் பேச்சுவார்த்தைகள், விலை நிர்ணயம், ஆட்சேர்ப்பு மற்றும் முன்னறிவிப்புகளைப் பாதிக்கிறது.

      நாம் முதலில் காணும் எண் ஒரு குறிப்புப் புள்ளியாக மாறுகிறது. அதிலிருந்து நாம் விலகிச் செல்கிறோம், ஆனால் பொதுவாக போதுமானதாக இல்லை. நங்கூரம் தன்னிச்சையானது என்று நமக்குத் தெரிந்தாலும் கூட, அது நம்மைப் பாதிக்கலாம். வல்லுநர்களும் இதற்கு விதிவிலக்கல்ல.
    why_this_is_important: |
      நங்கூரப் பக்கச்சார்பைப் புரிந்துகொள்வது சிறந்த முடிவுகளை எடுக்கவும், திறம்பட பேச்சுவார்த்தை நடத்தவும், ஏமாற்றப்படுவதைத் தவிர்க்கவும் உதவுகிறது. தகவலின் வரிசை மற்றும் வடிவமைப்பு ஏன் இவ்வளவு முக்கியம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - பேச்சுவார்த்தை
      - முதலீடு
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      first_number_dominance: |
        பேச்சுவார்த்தை அல்லது மதிப்பீட்டில் முதல் எண், முடிவை விகிதாசாரமற்ற முறையில் பாதிக்கிறது.
      insufficient_adjustment: |
        ஒரு நங்கூரத்திலிருந்து சரிசெய்யும்போது, ​​மக்கள் பொதுவாக போதுமான அளவு சரிசெய்வதில்லை.
      arbitrary_anchor_influence: |
        தெளிவாகப் பொருந்தாத எண்கள் கூட (எ.கா., சமூக பாதுகாப்பு எண்ணின் கடைசி இலக்கங்கள்) மதிப்பீடுகளைப் பாதிக்கலாம்.
      order_effects: |
        விருப்பங்கள் வழங்கப்படும் வரிசை தேர்வுகளை மாற்றுகிறது.
    examples:
      salary_negotiation: |
        தொடக்கத்தில் குறிப்பிடப்படும் முதல் எண் - முதலாளி அல்லது விண்ணப்பதாரர் யாரால் கூறப்பட்டாலும் - இறுதி சலுகைக்கு நங்கூரமாக அமைகிறது.
      real_estate: |
        பட்டியல் விலை, அது வேண்டுமென்றே அதிகமாகவோ அல்லது குறைவாகவோ அமைக்கப்பட்டிருந்தாலும் கூட, வாங்குபவர்களின் மதிப்பு பற்றிய கண்ணோட்டங்களுக்கு நங்கூரமாக அமைகிறது.
      retail: |
        "முன்பு $99, இப்போது $49" என்பது அசல் விலையை ஒரு நங்கூரமாகப் பயன்படுத்தி, விற்பனை விலையை ஒரு பேரம் போலக் காட்டுகிறது.
      forecasting: |
        திட்டமிடல் கூட்டங்களில் ஆரம்ப மதிப்பீடுகள், முதல் மதிப்பீடு ஒரு யூகமாக இருந்தபோதிலும், பிந்தைய கணிப்புகளுக்கு நங்கூரமாய் அமைகின்றன.
    real_world_implications: |
      நங்கூரம் சந்தைகள், பேச்சுவார்த்தைகள் மற்றும் கொள்கைகளை வடிவமைக்கிறது. இது நெறிமுறையாகப் பயன்படுத்தப்படலாம் (எ.கா., நியாயமான எதிர்பார்ப்புகளை அமைத்தல்) அல்லது நெறிமுறையற்ற முறையில் (எ.கா., சூழ்ச்சியான விலை நிர்ணயம்). இதைப் அங்கீகரிப்பது முடிவின் தரத்தை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        பேச்சுவார்த்தைகளில், நங்கூரை அமைக்க முதல் சலுகையைச் செய்ய பரிசீலிக்கவும் - அல்லது மற்ற தரப்பினர் அவ்வாறு செய்யும்போது கவனமாக இருங்கள்.
      collaborative_learning_initiative: |
        கூட்டங்களில், மதிப்பீடுகள் பற்றி யார் முதலில் பேசுகிறார்கள் என்பதில் கவனமாக இருங்கள்; விவாதத்திற்கு முன் சுயாதீன மதிப்பீடுகளை சேகரிக்க பரிசீலிக்கவும்.
    how_can_this_be_misapplied:
      manipulation: |
        விரும்பிய முடிவுகளை நோக்கி மற்றவர்களை வழிநடத்த தீவிர நங்கூரங்களை வேண்டுமென்றே பயன்படுத்துதல்.
      overconfidence_in_anchors: |
        உங்கள் சொந்த முதல் மதிப்பீட்டை மீண்டும் பார்க்காமல் அதை அதிகமாக நம்புதல்.
      ignoring_relevant_information: |
        ஒரு நங்கூரம் மிகவும் பொருத்தமான தரவுகளை புறக்கணிக்க அனுமதித்தல்.
      exploitation: |
        உண்மையான விலைகளை நியாயமானதாகக் காட்ட, அதிகப்படுத்தப்பட்ட "ஒப்பீடு" விலைகளைப் பயன்படுத்தும் விற்பனை தந்திரங்கள்.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: கிடைக்கும்தன்மை அடுக்கம் (Availability Cascade)
    quick_introduction: |
      கிடைக்கும்தன்மை அடுக்கம் என்பது ஒரு யோசனை மீண்டும் மீண்டும் பொது விவாதங்களில்
      வருவதன் மூலம் நம்பகத்தன்மையை பெறும் ஒரு சுய-வலுப்படுத்தும் செயல்முறையாகும்.
      அதை எவ்வளவு அதிகமாக விவாதிக்கிறோமோ, அவ்வளவு "கிடைக்கும்தன்மை" அடைகிறது,
      அவ்வளவு அதிகமாக மக்கள் அதை நம்புகிறார்கள், மேலும் அது மேலும் விவாதிக்கப்படுகிறது.
      கூட்டு நம்பிக்கை அதன் அடிப்படை உண்மையை பொருட்படுத்தாமல் வேகமெடுக்கிறது.
    one_liner: ஒரு யோசனை எவ்வளவு அதிகமாக மீண்டும் மீண்டும் சொல்லப்படுகிறதோ, அவ்வளவு நம்பகத்தன்மையுடன் தெரிகிறது—ஆதாரத்தைப் பொருட்படுத்தாமல்.
    try_this:
      - Ask: Is this belief widespread because it's true, or because it's repeated?
        கேள்வி: இந்த நம்பிக்கை உண்மை என்பதால்தான் பரவலாக உள்ளதா, அல்லது அது மீண்டும் மீண்டும் சொல்லப்படுவதால்தான் உள்ளதா?
      - Seek primary sources before accepting "what everyone knows." "எல்லோருக்கும் தெரியும்" என்பதை ஏற்றுக்கொள்வதற்கு முன் முதன்மை ஆதாரங்களைத் தேடுங்கள்.
      - Notice when repetition alone is driving your sense of plausibility. மீண்டும் சொல்வது மட்டுமே உங்கள் நம்பகத்தன்மை உணர்வை இயக்கும்போது கவனியுங்கள்.
    ask_yourself:
      - Would I believe this if I'd heard it only once? இதை நான் ஒருமுறை மட்டுமே கேட்டிருந்தால் நம்புவேனா?
      - Am I conflating "everyone says so" with "the evidence supports it"? "எல்லோரும் சொல்கிறார்கள்" என்பதை "ஆதாரங்கள் அதை ஆதரிக்கின்றன" என்பதோடு குழப்பிக் கொள்கிறேனா?
    in_more_detail: |
      Timur Kuran மற்றும் Cass Sunstein ஆகியோர் கிடைக்கும்தன்மை அடுக்கம் எவ்வாறு செயல்படுகிறது என்பதை விவரித்துள்ளனர்:
      தகவல் கிடைக்கும்தன்மை (நாம் எவ்வளவு அடிக்கடி ஒன்றைக் கேட்கிறோம்) மற்றும் நம்பகத்தன்மை
      (அது எவ்வளவு நம்பும்படியாகத் தெரிகிறது) ஆகியவை ஒன்றுக்கொன்று வலுவூட்டுகின்றன. ஊடகப் புலனாய்வு, சமூக
      ஊடகங்கள் மற்றும் பொது விவாதம் ஆகியவை குறிப்பிட்ட யோசனைகளை பெருக்குகின்றன. ஒரு யோசனை
      கிடைக்கும்தன்மையின் ஒரு நிலையை அடைந்தவுடன், அது வேகமாகப் பரவி, அது தவறானதாகவோ அல்லது மிகைப்படுத்தப்பட்டதாகவோ
      இருந்தாலும் "பொது அறிவாக" மாறக்கூடும்.

      கிடைக்கும்தன்மை அடுக்கங்கள் நன்மை பயக்கும் (முக்கியமான எச்சரிக்கைகளைப் பரப்புதல்)
      அல்லது தீங்கு விளைவிக்கும் (பீதியை அல்லது தவறான தகவலை பரப்புதல்). அவை
      கிடைக்கும்தன்மை தன்னிச்சையான முறை (availability heuristic) மற்றும் சமூகச் சான்று (social proof) ஆகியவற்றால் இயக்கப்படுகின்றன.
    why_this_is_important: |
      கிடைக்கும்தன்மை அடுக்கங்களை அங்கீகரிப்பது பரவலான நம்பிக்கை ஆதாரத்தைப் பிரதிபலிக்கிறதா அல்லது வெறும்
      மீண்டும் சொல்வதை பிரதிபலிக்கிறதா என்பதை நீங்கள் மதிப்பீடு செய்ய உதவுகிறது. இது யோசனைகள் எவ்வாறு
      வைரலாகின்றன என்பதையும், கூட்டு நம்பிக்கைகள் எவ்வாறு தவறாக இருக்கக்கூடும் என்பதையும் விளக்குகிறது.
      இது ஊடக எழுத்தறிவு மற்றும் விமர்சன சிந்தனைக்கு இன்றியமையாதது.
    when_to_use:
      - decision-making முடிவெடுத்தல்
      - risk_assessment இடர் மதிப்பீடு
      - learning கற்றல்
      - leadership தலைமைத்துவம்
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        ஒரு யோசனை எவ்வளவு அதிகமாக மீண்டும் மீண்டும் சொல்லப்படுகிறதோ, அவ்வளவு நம்பகத்தன்மையுடன் தெரிகிறது.
      media_amplification: |
        புலனாய்வு நம்பிக்கையை இயக்கும், இது மேலும் புலனாய்வை இயக்கும்.
      social_proof_belief: |
        "எல்லோரும் அதை நம்புகிறார்கள்" என்பது நம்பிக்கைக்கான ஆதாரமாகிறது.
      threshold_effects: |
        ஒரு யோசனை ஒரு பார்வைத் திரையைத் தாண்டினால், அது வேகமாகப் பரவுகிறது.
    examples:
      health_scares: |
        ஒரு ஆய்வு ஒரு தயாரிப்பு ஆபத்தானது என்று கூறுகிறது; ஊடகங்கள் அதை பெருக்குகின்றன;
        பொதுமக்கள் அதை தவிர்க்கிறார்கள்; மேலும் புலனாய்வு தொடர்கிறது. ஆபத்து
        மிகைப்படுத்தப்பட்டிருக்கலாம்.
      financial_panic: |
        வங்கி தோல்வி பற்றிய வதந்திகள் பரவுகின்றன; மக்கள் பணத்தை எடுக்கிறார்கள்; ஓட்டம்
        சுய-நிறைவேற்றமாகிறது.
      social_media: |
        ஒரு கதை வைரலாகிறது; மீண்டும் சொல்வது நம்பிக்கையை அதிகரிக்கிறது; நம்பிக்கை
        பகிர்வை அதிகரிக்கிறது. உண்மை மற்றும் வைரல் தன்மை வேறுபடலாம்.
      organizational: |
        வேலை நீக்கம் பற்றிய ஒரு வதந்தி பரவுகிறது; பதட்டம் அதிகரிக்கிறது; நடத்தை
        மாறுகிறது; எதிர்வினை மூலம் வதந்தி நம்பகத்தன்மையை பெறுகிறது.
    real_world_implications: |
      கிடைக்கும்தன்மை அடுக்கங்கள் பொது கருத்து, கொள்கை மற்றும் சந்தைகளை வடிவமைக்கின்றன.
      அவை முக்கியமான உண்மைகளையும் ஆபத்தான பொய்யான தகவல்களையும் பரப்பக்கூடும்.
      விமர்சன சிந்தனைக்கு ஆதாரம்-அடிப்படையிலான நம்பிக்கையையும்
      அடுக்கம்-இயக்கப்படும் நம்பிக்கையையும் வேறுபடுத்துவது அவசியம்.
    professional_application:
      networking_and_relationship_building: |
        ஒரு யோசனை "எல்லா இடங்களிலும்" இருக்கும்போது, கேளுங்கள்: இது மீண்டும் சொல்வதால் உண்மையா,
        அல்லது உண்மை என்பதால் மீண்டும் சொல்லப்படுகிறதா? முதன்மை ஆதாரங்களைத் தேடுங்கள்.
      collaborative_learning_initiative: |
        பெருக்குவதற்கு முன் சரிபார்க்கும் மரபுகளை உருவாக்குங்கள். "எல்லோருக்கும் தெரியும்"
        என்பதைப் பற்றிய கேள்விகளைக் கேட்க ஊக்குவிக்கவும். ஆதாரத்தைப் பிரதிபலிக்கும் ஒருமித்த கருத்து
        மற்றும் கிடைக்கும்தன்மையை பிரதிபலிக்கும் ஒருமித்த கருத்து ஆகியவற்றை வேறுபடுத்துங்கள்.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        சில சமயங்களில் பரவலான நம்பிக்கை சரியானது. அனைத்து
        பிரபலமான யோசனைகளும் அடுக்கங்கள் என்று கருத வேண்டாம்.
      conspiracy_thinking: |
        "கிடைக்கும்தன்மை அடுக்கம்" என்பதைப் பயன்படுத்தி நியாயமான
        கவலைகளை உற்பத்தி செய்யப்பட்டவை என்று நிராகரிக்க.
      false_skepticism: |
        பிரபலமாக இருப்பதால் நன்கு ஆதரிக்கப்பட்ட யோசனைகளை நிராகரித்தல்.
      contrarianism: |
        பரவலாக நம்பப்படும் எதையும் தவறாக இருக்க வேண்டும் என்று கருதுதல்.
    related_content:
