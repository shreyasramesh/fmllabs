  - id: hyperbolic_discounting
    name: அதிபரவளைய தள்ளுபடி
    quick_introduction: |
      அதிபரவளைய தள்ளுபடி என்பது பெரிய, தாமதமான பரிசுகளை விட சிறிய, உடனடி பரிசுகளுக்கு முன்னுரிமை அளிக்கும் போக்காகும்—மேலும் எதிர்காலத்தை பகுத்தறிவு மாதிரிகள் கணிப்பதை விட அதிகமாக தள்ளுபடி செய்கிறது. நாம் நிகழ்காலத்தை மிகைப்படுத்தி, எதிர்காலத்தை சீரற்ற வழிகளில் குறைத்து மதிப்பிடுகிறோம்.
    one_liner: பெரிய தாமதமானவைக்கு மேல் சிறிய உடனடிக்கு முன்னுரிமை அளிக்கிறோம்—மேலும் எதிர்காலத்தை சீரற்ற முறையில் தள்ளுபடி செய்கிறோம்.
    try_this:
      - முன்-உறுதிமொழி: நீங்கள் அமைதியான நிலையில் இருக்கும்போது உங்கள் எதிர்கால சுயத்திற்காக தேர்வுகளைச் செய்யுங்கள்.
      - 'மறுவடிவமைப்பு: "இது 10 நிமிடங்களில் வேண்டுமா? 10 மாதங்களில் வேண்டுமா?" என கேட்டால் சீரற்ற தன்மையை வெளிப்படுத்தும்.'
      - சிறந்த தேர்வுகளுக்கு உங்கள் எதிர்கால சுயத்தைக் கட்டுப்படுத்த உறுதிமொழி சாதனைகளைப் பயன்படுத்தவும்.
    ask_yourself:
      - எனது எதிர்கால சுயத்தின் விலையில் நான் நிகழ்காலத்தை மிகைப்படுத்துகிறேனா?
      - ஒரு நாள் தாமதமானால், ஒரு வருடம் தாமதமானால் இந்த தேர்வை நான் செய்வேனா?
    in_more_detail: |
      நாம் ஒரு வருடத்தில் $100 ஐ விட இன்று $50 ஐ விரும்பலாம், ஆனால் ஒரு வருடத்தில் $50 ஐ விட இரண்டு ஆண்டுகளில் $100 ஐ விரும்பலாம்—அது சீரற்றதாக இருந்தாலும். நமது தள்ளுபடி விகிதம் நிலையானது அல்ல; அது அதிபரவளையமானது. அருகிலுள்ள எதிர்காலம் அதிகமாக தள்ளுபடி செய்யப்படுகிறது; தொலைதூர எதிர்காலம் குறைவாக தள்ளுபடி செய்யப்படுகிறது. இது தள்ளிப்போடுதல், அடிமையாதல் மற்றும் குறைந்த சேமிப்பு ஆகியவற்றை விளக்குகிறது.

      தற்போதைய சார்பு என்பது ஒரு தொடர்புடைய கருத்து: நாம் தற்போதைய தருணத்திற்கு விகிதாசாரமற்ற முக்கியத்துவம் கொடுக்கிறோம். அதிபரவளைய தள்ளுபடி நாம் செய்யும் உறுதிமொழிகளை நாம் ஏன் காப்பாற்றாமல் போகிறோம் என்பதையும், நீண்ட கால திட்டமிடல் ஏன் கடினம் என்பதையும் விளக்குகிறது.
    why_this_is_important: |
      அதிபரவளைய தள்ளுபடியைப் புரிந்துகொள்வது சிறந்த ஊக்கங்களை வடிவமைக்கவும், உங்கள் எதிர்கால சுயத்தை ஈடுபடுத்தவும், குறுகிய கால பொறிகளைத் தவிர்க்கவும் உதவுகிறது. இது நாம் ஏன் தள்ளிப்போடுகிறோம் என்பதையும், நீண்ட கால இலக்குகளுடன் நாம் ஏன் போராடுகிறோம் என்பதையும் விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - தொழில்_நகர்வுகள்
      - முதலீடு
      - தலைமைத்துவம்
    how_can_you_spot_it:
      present_preference: |
        தாமதமான, பெரிய பரிசுகளை விட உடனடி திருப்தியை தேர்ந்தெடுப்பது.
      inconsistent_time_preferences: |
        காலம் செல்லச் செல்ல தலைகீழான விருப்பங்கள் (எ.கா., நாம் நாளை டயட் செய்ய விரும்புகிறோம் ஆனால் இன்று சாப்பிட வேண்டும்).
      commitment_failures: |
        எதிர்காலம் நிகழ்காலமாக மாறும்போது நாம் பின்பற்றாத திட்டங்களைச் செய்தல்.
      procrastination: |
        உடனடி வசதிக்காக முக்கியமான பணிகளைத் தள்ளிப்போடுதல்.
    examples:
      savings: |
        ஓய்வூதியத்திற்காக சேமிப்பதை விட இப்போது செலவிட தேர்ந்தெடுப்பது—எதிர்காலம் அருவமாக உணரப்படுகிறது.
      health: |
        இன்று உடற்பயிற்சியைத் தவிர்ப்பது, வசதிக்காக, நாம் வருந்துவோம் என்று தெரிந்தாலும்—நாளைய வருத்தம் தள்ளுபடி செய்யப்படுகிறது.
      addiction: |
        நீண்ட கால ஆரோக்கியத்தை விட உடனடி உற்சாகத்தை தேர்ந்தெடுப்பது.
      deadlines: |
        காலக்கெடு வரும் வரை எதுவும் செய்யாமல் இருப்பது—பின்னர் "நிகழ்காலம்" காலக்கெடுவை உள்ளடக்கியது மற்றும் நாம் செயல்படுகிறோம்.
    real_world_implications: |
      அதிபரவளைய தள்ளுபடி சேமிப்பு, ஆரோக்கியம், கல்வி மற்றும் அடிமையாதல் ஆகியவற்றை பாதிக்கிறது. இது பல சுய-கட்டுப்பாடு தோல்விகளை விளக்குகிறது. உறுதிமொழி சாதனைகள் (எ.கா., தானியங்கி சேமிப்பு, பொறுப்புக்கூறல்) எதிர்கால தேர்வுகளைக் கட்டுப்படுத்துவதன் மூலம் உதவக்கூடும்.
    professional_application:
      networking_and_relationship_building: |
        எதிர்கால உறுதிமொழிகளைக் கேட்கும்போது, ​​எதிர்காலத்தை "நிகழ்காலமாக" மாற்றும் பொறுப்புக்கூறலை உருவாக்கவும் (எ.கா., சரிபார்ப்புகள், காலக்கெடு). அமைப்பு இல்லாமல் மக்கள் பின்பற்றுவார்கள் என்று கருத வேண்டாம்.
      collaborative_learning_initiative: |
        உறுதிமொழி சாதனைகளைப் பயன்படுத்தவும்: பொது உறுதிமொழிகள், காலக்கெடுவுக்கு முன்-உறுதிமொழி, மற்றும் நீண்ட கால இலக்குகளை மிகவும் உடனடியாக உணர வைக்கும் கட்டமைப்புகள். நீண்ட திட்டங்களை குறுகிய மைல்கற்களாக உடைக்கவும்.
    how_can_this_be_misapplied:
      excessive_control: |
        "உதவுதல்" என்ற பெயரில் மக்களின் தேர்வுகளை அதிகமாகக் கட்டுப்படுத்துவது அவர்களின் எதிர்கால சுயங்களுக்கு.
      paternalism: |
        மற்றவர்களின் நீண்ட கால நலன்களுக்கு எது சிறந்தது என்று நாம் நினைக்கிறோம் என்று கருதுவது.
      ignoring_present_needs: |
        அருவமான எதிர்கால நன்மைகளுக்காக நியாயமான தற்போதைய தேவைகளை நிராகரிப்பது.
      one_size_fits_all: |
        தள்ளுபடி விகிதங்களில் மக்கள் வேறுபடுகிறார்கள்; அனைவருக்கும் ஒரே மாதிரியான உறுதிமொழி சாதனைகள் தேவையில்லை.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: கட்டுப்பாட்டின் மாயத்தோற்றம்
    quick_introduction: |
      கட்டுப்பாட்டின் மாயத்தோற்றம் என்பது விளைவுகளைப் பாதிக்கும் நமது திறனை அதிகமாக மதிப்பிடும் ஒரு போக்கு. சீரற்ற நிகழ்வுகள், மற்றவர்கள் மற்றும் சிக்கலான அமைப்புகள் மீது நாம் நினைப்பதை விட நமக்கு அதிக கட்டுப்பாடு இருப்பதாக நம்புகிறோம். நாம் தொடர்பை காரணத்தோடு குழப்புகிறோம், செயலையும் தாக்கத்தையும் குழப்புகிறோம்.
    one_liner: நாம் விளைவுகளைப் பாதிக்கும் நமது திறனை அதிகமாக மதிப்பிடுகிறோம்—குறிப்பாக சீரற்றவை.
    try_this:
      - கேளுங்கள்: நான் எதுவும் செய்யாவிட்டால் என்ன நடக்கும்? எனது செயல் உண்மையில் விளைவை ஏற்படுத்துகிறதா?
      - நீங்கள் கட்டுப்படுத்தக்கூடியவற்றையும், கட்டுப்படுத்த முடியாதவற்றையும் வேறுபடுத்துங்கள்.
      - உங்கள் செயல்களை சீரற்ற முடிவுகளுடன் சூனியம் போல் இணைக்கும்போது கவனியுங்கள்.
    ask_yourself:
      - நான் தொடர்பை காரணத்தோடு குழப்புகிறேனா?
      - நான் செயல்படாமல் இருந்திருந்தால் முடிவு வித்தியாசமாக இருக்குமா?
    in_more_detail: |
      மக்கள் லாட்டரியில் வெற்றி பெறுவது பற்றி அதிக நம்பிக்கையுடன் உணர்கிறார்கள், அவர்கள் தங்கள் சொந்த எண்களைத் தேர்ந்தெடுக்கும்போது—இது வாய்ப்புகளை மாற்றாவிட்டாலும். நாம் அதிக எண்களை விரும்பும்போது பகடைகளை வேகமாக உருட்டுகிறோம். நமது சடங்குகள் அல்லது நடத்தைகள் உண்மையில் சீரற்ற அல்லது நமக்கு அப்பாற்பட்ட காரணிகளால் தீர்மானிக்கப்படும் விளைவுகளைப் பாதிக்கின்றன என்று நாம் நினைக்கிறோம். இந்த மாயத்தோற்றம் ஆறுதலானது; இது பதட்டத்தைக் குறைக்கிறது. ஆனால் இது அதிக நம்பிக்கை மற்றும் தவறான முடிவுகளுக்கு வழிவகுக்கும்.

      நாம் செயல்முறையில் ஈடுபடும்போது, ​​ஆரம்பகால வெற்றி கிடைக்கும்போது, ​​மற்றும் பணி பழக்கமானதாக இருக்கும்போது இந்த மாயத்தோற்றம் வலுவாக இருக்கும். இது முதலீடு, மேலாண்மை மற்றும் அன்றாட வாழ்வைப் பாதிக்கிறது.
    why_this_is_important: |
      கட்டுப்பாட்டின் மாயத்தோற்றத்தை அங்கீகரிப்பது உங்கள் எதிர்பார்ப்புகளைச் சரிசெய்யவும், அதிக நம்பிக்கையைத் தவிர்க்கவும், முயற்சி உண்மையில் முக்கியத்துவம் வாய்ந்த இடத்தில் கவனம் செலுத்தவும் உதவுகிறது. சூனிய நடத்தைகளில் நாம் ஏன் தொடர்கிறோம் மற்றும் நமது தாக்கத்தை ஏன் அதிகமாக மதிப்பிடுகிறோம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - இடர்_மதிப்பீடு
      - முதலீடு
      - தலைமைத்துவம்
    how_can_you_spot_it:
      overestimated_influence: |
        நமது செயல்கள் விளைவுகளை பாதிக்கின்றன என்று நம்புவது, உண்மையில் பாதிக்காத போது.
      ritual_superstition: |
        நமது நடத்தைகள் முடிவுகளைப் பாதிக்கின்றன என்று நினைப்பது (அதிர்ஷ்ட சட்டை, விளையாட்டுக்கு முந்தைய வழக்கம்) உண்மையில் பாதிக்காத போது.
      choice_illusion: |
        தேர்வு முடிவைப் பாதிக்காதபோது, ​​தேர்வு நமக்குக் கட்டுப்பாடு தருவதாக உணர்வது.
      action_bias: |
        செயல் உதவாத போதும், "காத்திருப்பதை" விட "ஏதாவது செய்வதை" விரும்புவது.
    examples:
      gambling: |
        லாட்டரி எண்களைத் தேர்ந்தெடுப்பது சீரற்ற தேர்வை விட அதிகக் கட்டுப்பாட்டைக் கொண்டதாக உணர்கிறது—வாய்ப்புகள் அப்படியே இருக்கின்றன.
      investing: |
        செயல்திறன்மிக்க வர்த்தகர்கள் சந்தையை வெல்லும் தங்கள் திறனை அதிகமாக மதிப்பிடுகிறார்கள்; பெரும்பாலானோர் செலவுகளுக்குப் பிறகு குறைவான செயல்திறனை வெளிப்படுத்துகிறார்கள்.
      management: |
        தலைவர்கள் நிறுவன விளைவுகளில் தங்கள் தாக்கத்தை அதிகமாக மதிப்பிடுகிறார்கள்; பல காரணிகள் அவர்களின் கட்டுப்பாட்டிற்கு அப்பாற்பட்டவை.
      sports: |
        ரசிகர்கள் தங்கள் ஆரவாரங்கள் விளையாட்டைப் பாதிக்கின்றன என்று நம்புகிறார்கள்; வீரர்கள் அதிர்ஷ்ட சடங்குகளைக் கொண்டுள்ளனர்.
    real_world_implications: |
      கட்டுப்பாட்டின் மாயத்தோற்றம் ஆபத்தை எதிர்கொள்ளல், பயனற்ற முயற்சிகளில் விடாமுயற்சி, மற்றும் விளைவுகளின் பங்களிப்பு ஆகியவற்றை பாதிக்கிறது. இது செயல்களைத் தூண்டும் (சில சமயங்களில் பயனுள்ளது) ஆனால் வீணான முயற்சி மற்றும் அதிக நம்பிக்கைக்கு வழிவகுக்கும். சரிசெய்தல் முடிவின் தரத்தை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        நீங்கள் கட்டுப்படுத்தக்கூடியவற்றையும், கட்டுப்படுத்த முடியாதவற்றையும் அங்கீகரிக்கவும். பாதிக்கக்கூடிய காரணிகளில் ஆற்றலைக் குவிக்கவும். நீங்கள் ஏற்படுத்தாத விளைவுகளுக்குப் பெருமை பாராட்டாதீர்கள்—அல்லது உங்களால் தடுக்க முடியாதவற்றுக்குக் குறை கூறாதீர்கள்.
      collaborative_learning_initiative: |
        திட்டமிடும்போது, ​​கட்டுப்படுத்தக்கூடிய மற்றும் கட்டுப்படுத்த முடியாத காரணிகளை வேறுபடுத்துங்கள். ஆரம்பகால வெற்றிகளால் ஏற்படும் தவறான நம்பிக்கையைத் தவிர்க்கவும். எதிர்பார்ப்புகளைச் சரிசெய்ய நிகழ்தகவு சிந்தனையைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      learned_helplessness: |
        நாம் குறிப்பிடத்தக்க தாக்கத்தை வைக்கும்போது, ​​நமக்கு எந்தக் கட்டுப்பாடும் இல்லை என்று நம்புவதற்கு அதிகமாகச் சரிசெய்வது.
      dismissing_agency: |
        பல துறைகளில் திறமையும் முயற்சியும் முக்கியமாக இருக்கும்போது, ​​"எல்லாம் அதிர்ஷ்டம்".
      false_fatalism: |
        செயலின்மையை நியாயப்படுத்த கட்டுப்பாட்டின் மாயத்தோற்றத்தைப் பயன்படுத்துவது.
      one_size_fits_all: |
        கட்டுப்பாடு களத்திற்கு ஏற்ப மாறுபடும்; சில சூழ்நிலைகள் மற்றவற்றை விடக் கட்டுப்படுத்தக்கூடியவை.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: தாக்க சார்பு
    quick_introduction: |
      தாக்க சார்பு என்பது எதிர்கால நிகழ்வுகளுக்கு நாம் உணர்ச்சி ரீதியான எதிர்வினைகளை எவ்வாறு உணர்வோம் மற்றும் எவ்வளவு காலம் உணர்வோம் என்பதை அதிகமாக மதிப்பிடும் போக்காகும். நல்ல விஷயங்கள் நம்மை அவை செய்வதை விட மகிழ்ச்சியாக மாற்றும் என்றும், கெட்ட விஷயங்கள் நம்மை அவை செய்வதை விட மிகவும் துயரமாக மாற்றும் என்றும் நாம் நினைக்கிறோம். நாம் உணர்ச்சிகரமான முன்னறிவிப்புகளில் மோசமானவர்கள்.
    one_liner: நிகழ்வுகள் நமது மகிழ்ச்சியை எவ்வளவு பாதிக்கும், எவ்வளவு காலம் பாதிக்கும் என்பதை நாம் அதிகமாக மதிப்பிடுகிறோம்.
    try_this:
      - கேளுங்கள்: ஒத்த கடந்தகால நிகழ்வுகளுக்குப் பிறகு நான் எப்படி உணர்ந்தேன்? நாம் எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம்.
      - எதிர்பார்க்கப்படும் தாக்கம் முடிவுகளை இயக்க அனுமதிக்காதீர்கள் - நாம் உணர்வுகளை முன்னறிவிப்பதில் மோசமானவர்கள்.
      - ஒரு முடிவின் நீடித்த விளைவை நீங்கள் அதிகமாக மதிப்பிடும்போது கவனிக்கவும்.
    ask_yourself:
      - நான் இதை எவ்வளவு காலம் உணர்வேன் என்பதை அதிகமாக மதிப்பிடுகிறேனா?
      - ஒத்த நிகழ்வுகள் குறித்து கடந்தகால அனுபவம் என்ன சொல்கிறது?
    in_more_detail: |
      டேனியல் கில்பர்ட் மற்றும் டிமோதி வில்சன் ஆகியோர் உணர்ச்சிகரமான முன்னறிவிப்புகளை ஆராய்ச்சி செய்கிறார்கள்: ஒரு வெற்றிக்குப் பிறகு நாம் எவ்வளவு காலம் நன்றாக உணர்வோம் அல்லது ஒரு இழப்புக்குப் பிறகு எவ்வளவு காலம் மோசமாக உணர்வோம் என்பதை நாங்கள் அதிகமாக மதிப்பிடுகிறோம். நாம் எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம். ஒற்றை நிகழ்வுகளின் தாக்கத்தையும் நாங்கள் அதிகமாக மதிப்பிடுகிறோம் - ஒரு முடிவு எங்கள் மகிழ்ச்சியை வரையறுக்கும் என்று நாங்கள் நினைக்கிறோம், பல காரணிகள் பங்களிக்கின்றன. எங்கள் எதிர்கால உணர்வுகளை கணிக்கும்போது நாங்கள் தவறான விஷயங்களில் கவனம் செலுத்துகிறோம்.

      தாக்க சார்பு முக்கிய வாழ்க்கை முடிவுகளைப் பாதிக்கிறது: ஒரு பதவி உயர்வு, உறவு அல்லது வாங்குதல் நமது மகிழ்ச்சியை எவ்வளவு மாற்றும் என்பதை நாங்கள் அதிகமாக மதிப்பிடுகிறோம். இழப்புகளின் நீடித்த வலியையும் நாங்கள் அதிகமாக மதிப்பிடுகிறோம்.
    why_this_is_important: |
      தாக்க சார்பை அங்கீகரிப்பது உங்கள் வாழ்க்கையை உண்மையில் மேம்படுத்தும் விஷயங்களைப் பற்றி சிறந்த முடிவுகளை எடுக்க உதவுகிறது. நீங்கள் நினைப்பதை விட முக்கியமில்லாத விளைவுகளில் அதிகப்படியான முதலீட்டைக் குறைக்கிறது, மேலும் நீங்கள் எதிர்பார்ப்பதை விட நீண்ட காலம் துன்பமடையாத விளைவுகளைப் பற்றிய பயத்தைக் குறைக்கிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - தொழில்_நகர்வுகள்
      - இடர்_மதிப்பீடு
      - உறவு_கட்டுமானம்
    how_can_you_spot_it:
      overestimated_impact: |
        "இது எல்லாவற்றையும் மாற்றும்" அதேசமயம் ஒத்த கடந்தகால நிகழ்வுகள் மிதமான நீடித்த தாக்கத்தைக் கொண்டிருந்தன.
      duration_overestimation: |
        "நான் இதிலிருந்து ஒருபோதும் மீள மாட்டேன்" அதேசமயம் நாம் பொதுவாக எதிர்பார்ப்பதை விட வேகமாகத் தழுவுகிறோம்.
      focalism: |
        ஒரு நிகழ்வில் கவனம் செலுத்துதல் மற்றும் நல்வாழ்வைப் பாதிக்கும் பிற காரணிகளைப் புறக்கணித்தல்.
      adaptation_neglect: |
        நல்ல மற்றும் கெட்ட சூழ்நிலைகளுக்கு நாம் தழுவிக்கொள்வதை மறந்துவிடுதல்.
    examples:
      career: |
        "நான் இந்தப் பதவி உயர்வைப் பெற்றால், நான் மிகவும் மகிழ்ச்சியாக இருப்பேன்" அதேசமயம் கடந்த கால பதவி உயர்வுகள் தற்காலிக தாக்கத்தைக் கொண்டிருந்தன.
      purchases: |
        "இந்த கார் என்னை மகிழ்ச்சியாக்கும்" அதேசமயம் புதுமை விரைவில் மறைந்துவிடும்.
      loss: |
        "நான் இந்த நிராகரிப்பிலிருந்து ஒருபோதும் மீள மாட்டேன்" அதேசமயம் நாம் பொதுவாக மாதங்களுக்குள் தழுவிக்கொள்கிறோம்.
      events: |
        ஒரு திருமணம், விடுமுறை அல்லது மைல்கல் நீண்ட கால மகிழ்ச்சியை எவ்வளவு பாதிக்கும் என்பதை அதிகமாக மதிப்பிடுதல்.
    real_world_implications: |
      தாக்க சார்பு பணம், தொழில் மற்றும் உறவுகள் பற்றிய மோசமான முடிவுகளுக்கு வழிவகுக்கிறது. நாம் தழுவிக்கொள்ளும் அனுபவங்களுக்கு அதிகமாகச் செலுத்துகிறோம், மேலும் நாம் மீண்டுவரும் இழப்புகளுக்கு அதிகமாகப் பயப்படுகிறோம். இது கொள்கை மற்றும் தனிப்பட்ட திட்டமிடலைப் பாதிக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        தொழில் அல்லது உறவு முடிவுகளை எடுக்கும்போது, ஒத்த கடந்தகால நிகழ்வுகளுக்குப் பிறகு நீங்கள் எப்படி உணர்ந்தீர்கள் என்பதைக் கவனியுங்கள். நீங்கள் எதிர்பார்த்ததை விட தாக்கம் நீடித்ததா? எதிர்கால கணிப்புகளைச் சரிசெய்ய அதைப் பயன்படுத்தவும்.
      collaborative_learning_initiative: |
        குழுக்கள் பின்னடைவுகள் அல்லது வெற்றிகளை எதிர்கொள்ளும்போது, தழுவலை அவர்களுக்கு நினைவூட்டவும். "நாம் நினைப்பதை விட வேகமாகத் தழுவுவோம்" என்பது அதிகப்படியான கொண்டாட்டத்தையும் அதிகப்படியான விரக்தியையும் குறைக்கும்.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        சில நிகழ்வுகள் நீடித்த தாக்கத்தைக் கொண்டுள்ளன - அதிர்ச்சி, பெரிய இழப்பு. அனைத்து உணர்ச்சிகரமான முன்னறிவிப்புகளையும் சார்புடையதாக நிராகரிக்க வேண்டாம்.
      cold_rationality: |
        "இது ஒரு பொருட்டல்ல" அதேசமயம் அந்த நேரத்தில் அனுபவம் முக்கியமானது.
      undervaluing_experiences: |
        "நாம் எப்படியும் தழுவிக்கொள்வோம்" என்பதால் நேர்மறையான அனுபவங்களைத் தவிர்த்தல்.
      invalidating_emotions: |
        மக்கள் அந்த நேரத்தில் ஆதரவு தேவைப்படும்போது அவர்களின் உணர்வுகள் கடந்து செல்லும் என்று கூறுதல்.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: அகக் குழு சார்பு (In-Group Bias)
    quick_introduction: |
      அகக் குழு சார்பு என்பது, நம் குழுவைச் சேர்ந்தவர்கள் என்று நாம் கருதுபவர்களுக்கு, நம் குழுவைச் சாராதவர்களை விட சாதகமாகச் செயல்படும் ஒரு போக்கு ஆகும். நாம் மிகச் சிறிய அல்லது தன்னிச்சையான வேறுபாடுகளின் அடிப்படையில், அகக் குழு உறுப்பினர்களுக்கு நேர்மறையான குணங்களையும், புறக் குழு உறுப்பினர்களுக்கு எதிர்மறையான குணங்களையும் அளிக்கிறோம்.
    one_liner: நாம் நமது அகக் குழுவிற்குச் சாதகமாக செயல்படுகிறோம், புறக் குழுக்களைக் கடுமையாக எடை போடுகிறோம் - பெரும்பாலும் தன்னிச்சையாக.
    try_this:
      - கேளுங்கள்: அவர்கள் என் குழுவில் இருந்திருந்தால் இந்த நபரை நான் இப்படித்தான் மதிப்பிடுவேனா?
      - முடிவெடுக்கும் போது, புறக் குழுவின் கருத்துக்களை தீவிரமாகத் தேடுங்கள்.
      - உங்கள் தீர்ப்பை குழு எல்லைகள் எவ்வாறு வடிவமைக்கின்றன என்பதை கவனியுங்கள்.
    ask_yourself:
      - நான் "நம் ஆட்கள்" என்பதால் ஒருவருக்குச் சாதகமாகச் செயல்படுகிறேனா?
      - புறக் குழு உறுப்பினருக்கு நான் அதே விதிகளைப் பயன்படுத்துவேனா?
    in_more_detail: |
      குழுக்கள் தன்னிச்சையாக ஒதுக்கப்பட்டாலும் (எ.கா., நாணயம் சுண்டுவதன் மூலம்), மக்கள் விரைவாக தங்கள் அகக் குழுவிற்கு ஆதரவை வளர்த்துக் கொள்கிறார்கள். அகக் குழு உறுப்பினர்களை நாங்கள் அதிகம் நம்புகிறோம், அவர்களுக்கு தாராளமாக வளங்களை ஒதுக்கிறோம், மேலும் அவர்களின் செயல்களை இன்னும் கனிவாக மதிப்பிடுகிறோம். புறக் குழு உறுப்பினர்கள் இதற்கு நேர்மாறான சிகிச்சையைப் பெறுகிறார்கள்.

      அகக் குழு சார்பு பழங்குடிவாதம், பாகுபாடு மற்றும் மோதலைத் தூண்டுகிறது. இது பணியமர்த்தல், பதவி உயர்வு, ஒத்துழைப்பு மற்றும் கொள்கையை பாதிக்கிறது. இது இனம், தேசியம், நிறுவனம், குழு அல்லது எந்தவொரு பகிரப்பட்ட அடையாளத்தையும் அடிப்படையாகக் கொள்ளலாம்.
    why_this_is_important: |
      அகக் குழு சார்பை அங்கீகரிப்பது, நியாயமான முடிவுகளை எடுக்கவும், மேலும் உள்ளடக்கிய குழுக்களை உருவாக்கவும், மற்றும் சலுகையைத் தவிர்க்கவும் உங்களுக்கு உதவுகிறது. பன்முகத்தன்மை முயற்சிகள் ஏன் எதிர்ப்பை எதிர்கொள்கின்றன என்பதையும் இது விளக்குகிறது - அகக் குழு விருப்பம் தானியங்கி.
    when_to_use:
      - தலைமைத்துவம் (leadership)
      - முடிவெடுத்தல் (decision-making)
      - உறவுகளை உருவாக்குதல் (relationship_building)
      - மோதல் தீர்வு (conflict_resolution)
    how_can_you_spot_it:
      preferential_treatment: |
        "நமக்கு" சந்தேகத்தின் பலனை வழங்குதல், ஆனால் "அவர்களுக்கு" வழங்காமல் இருப்பது.
      resource_allocation: |
        புறக் குழு உறுப்பினர்கள் சமமான அல்லது அதிகத் தேவையில் இருக்கும்போது, அகக் குழு உறுப்பினர்களுக்கு அதிக வளங்களை ஒதுக்குதல்.
      attribution_asymmetry: |
        அகக் குழு வெற்றி = திறமை; புறக் குழு வெற்றி = அதிர்ஷ்டம். அகக் குழு தோல்வி = சூழ்நிலை; புறக் குழு தோல்வி = குணம்.
      minimal_group_effects: |
        தன்னிச்சையான குழு ஒதுக்கீடுகளுடன் கூட சாதகமான நிலை உருவாகிறது.
    examples:
      hiring: |
        உங்கள் அதே பல்கலைக்கழகத்தில் படித்த அல்லது உங்கள் பின்னணியைப் பகிர்ந்து கொள்ளும் வேட்பாளர்களுக்கு முன்னுரிமை அளித்தல்.
      performance_reviews: |
        ஒத்த செயல்திறன் கொண்ட புறக் குழு உறுப்பினர்களை விட அகக் குழு உறுப்பினர்களுக்கு சாதகமாக மதிப்பிடுதல்.
      collaboration: |
        "நமது குழுவை" நம்புதல் மற்றும் சேர்த்துக் கொள்ளுதல், அதே நேரத்தில் "அவர்களது குழுவை" விலக்கி வைத்தல் அல்லது சந்தேகப்படுதல்.
      politics: |
        புறக் குழு வாதங்களை நிராகரிக்கும் போது, அகக் குழு வாதங்களை விமர்சனமின்றி ஏற்றுக்கொள்வது.
    real_world_implications: |
      அகக் குழு சார்பு சமத்துவமின்மையைத் தக்க வைத்துக் கொள்கிறது, தகுதி அடிப்படையிலான அமைப்பை பலவீனப்படுத்துகிறது, மேலும் மோதலைத் தூண்டுகிறது. இது பணியமர்த்தல், பதவி உயர்வு, முதலீடு மற்றும் கொள்கையைப் பாதிக்கிறது. அதைக் குறைக்க வேண்டுமென்றால், அது தானாகச் சரிசெய்யாது - வேண்டுமென்றே முயற்சி தேவை.
    professional_application:
      networking_and_relationship_building: |
        உங்கள் உடனடி வட்டத்திற்கு வெளியே உள்ள நபர்களை தீவிரமாகச் சேர்க்கவும். பல்வேறுபட்ட கண்ணோட்டங்களைத் தேடுங்கள். நீங்கள் "உங்களைப் போன்றவர்கள்" என்பதால் ஒருவருக்குச் சாதகமாகச் செயல்படுகிறீர்களா என்று கேள்வி கேளுங்கள்.
      collaborative_learning_initiative: |
        பணியமர்த்தல் மற்றும் மதிப்பீட்டில் அகக் குழு சார்பைக் குறைக்க கட்டமைக்கப்பட்ட செயல்முறைகளைப் (மறைக்கப்பட்ட மதிப்பாய்வுகள், பன்முகக் குழுக்கள்) பயன்படுத்தவும். பகிரப்பட்ட அடையாளத்தை உருவாக்க குழுக்களுக்கிடையேயான திட்டங்களை உருவாக்கவும்.
    how_can_this_be_misapplied:
      forced_diversity: |
        அடிப்படை சார்புகளை நிவர்த்தி செய்யாமல் வெறுப்பை உருவாக்கும் ஒதுக்கீடுகள் அல்லது கொள்கைகளைச் செயல்படுத்துதல்.
      out_group_hostility: |
        புறக் குழு பகைமையும் இருக்கும்போது, அகக் குழு சார்பை மட்டுமே பிரச்சனையாகக் கருதுதல்.
      ignoring_legitimate_differences: |
        எல்லா குழு வேறுபாடுகளும் சார்பு அல்ல - சில சமயங்களில் குழுக்கள் வெவ்வேறு குணாதிசயங்களைக் கொண்டுள்ளன. எல்லா ஏற்றத்தாழ்வுகளையும் பாகுபாடு என்று கருத வேண்டாம்.
      reverse_discrimination: |
        அகக் குழு உறுப்பினர்களுக்கு நியாயமற்ற முறையில் புறக் குழுக்களுக்குச் சாதகமாக மிக அதிகமாகச் செயல்படுதல்.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: தலைகீழாக்குதல்
    quick_introduction: |
      தலைகீழாக்குதல் என்பது ஒரு சிக்கலைத் தீர்க்கும் முறையாகும், இது கேள்வியை வேறு கோணத்தில் பார்க்க உதவுகிறது.
      "நான் எப்படி வெற்றி பெறுவது?" என்று கேட்பதற்குப் பதிலாக, "எது என்னை தோல்வியடையச் செய்யும்?" என்று கேட்டு,
      அந்த விஷயங்களைத் தவிர்க்கலாம். இது முன்னோக்கி சிந்திக்கும் போது பெரும்பாலும் கவனிக்கப்படாத அபாயங்களையும்,
      தவறான அணுகுமுறைகளையும் வெளிக்கொணர்கிறது.
    one_liner: தலைகீழாக்குங்கள் — எது உங்களை தோல்வியடையச் செய்யும் என்று கேட்டு, பின்னர் அந்த விஷயங்களைத் தவிர்க்கவும்.
    try_this:
      - எந்த இலக்கிற்கும், நீங்கள் தோல்வியடையக்கூடிய முக்கிய வழிகளைப் பட்டியலிடுங்கள் — பின்னர் அவற்றைத் தவிர்க்கவும்.
      - எதிர்மறை காட்சிப்படுத்தலைப் பயன்படுத்தவும்: இதை என்ன தவறாகப் போகச் செய்யும்?
      - கேளுங்கள்: ஒரு புத்திசாலி எப்படி இதை குழப்பமடையச் செய்வார்?
    ask_yourself:
      - இது ஏன் தோல்வியடையும் என்பதைப் பற்றி நான் யோசித்தேனா?
      - முன்னோக்கி சிந்திப்பதன் மூலம் நான் எதைக் காணவில்லை?
    in_more_detail: |
      சார்லி முங்கர் என்பவரால் பிரபலப்படுத்தப்பட்டு, கணித தர்க்கத்தின் அடிப்படையில் அமைந்த தலைகீழாக்குதல்,
      வெற்றியைத் துரத்துவதை விட தோல்வியைத் தவிர்ப்பது பெரும்பாலும் எளிது என்ற உண்மையை பயன்படுத்துகிறது.
      ஒரு விஷயம் தவறாகப் போகக்கூடிய முக்கிய வழிகளை உங்களால் அடையாளம் காண முடிந்தால், அவற்றை நீங்கள்
      முறையாக அகற்றலாம்.

      கார்ல் ஜேகோபி கூறியதாகக் கூறப்படுகிறது, "எப்போதும் தலைகீழாக்குங்கள்." ஸ்டோயிக்ஸ் தத்துவவாதிகள்
      தங்களிடம் இருந்ததைப் பாராட்டவும், adversity-க்குத் தயாராகவும் எதிர்மறை காட்சிப்படுத்தலைப் பயன்படுத்தினர்
      — இழப்பைக் கற்பனை செய்தல். தலைகீழாக்குதல் என்பது அவநம்பிக்கை அல்ல; இது தடைகளை அகற்றுவதன் மூலம்
      முன்னேறுவதற்கான ஒரு கட்டமைக்கப்பட்ட வழியாகும்.
    why_this_is_important: |
      தலைகீழாக்குதல் பேரழிவுகரமான தவறுகளைத் தவிர்க்கவும், திட்டங்களை stress-test செய்யவும்,
      மற்றும் வெளிப்படையான தீர்வுகள் அல்லாதவற்றைக் கண்டறியவும் உதவுகிறது. இது முக்கியமான தோல்வி முறைகளை
      நீங்கள் கவனிக்காமல் இருப்பதை உறுதி செய்வதன் மூலம் முன்னோக்கி திட்டமிடலுக்கு துணையாக நிற்கிறது.
    when_to_use:
      - சிக்கல்_தீர்த்தல்
      - முடிவெடுத்தல்
      - இடர்_மதிப்பீடு
      - தொழில்_நகர்வுகள்
    how_can_you_spot_it:
      premortem_thinking: |
        ஒரு திட்டத்திற்கு முன், அது ஏற்கனவே தோல்வியடைந்ததாகக் கருதி, "இது ஏன் தோல்வியடைந்தது?" என்று கேட்பது.
      anti_goals: |
        நீங்கள் அடைய விரும்புவதை தெளிவாக வரையறுப்பது போல், தவிர்க்க விரும்புவதையும் வரையறுப்பது.
      reverse_engineering_failure: |
        வெற்றிகளை மட்டும் படிப்பதற்குப் பதிலாக, பாடங்களைப் பிரித்தெடுக்க தோல்வியுற்ற நிகழ்வுகளை ஆய்வு செய்தல்.
      constraint_focus: |
        மேம்பாட்டிற்காக மேம்படுத்துவதற்கு முன், கட்டுப்பாடுகளையும் தடைகளையும் கண்டறிதல்.
    examples:
      investing: |
        "இந்த பங்கு ஏன் உயரும்?" என்பதற்குப் பதிலாக, "எது பணத்தை இழக்கச் செய்யும்?" என்று கேட்டு,
        அந்த காட்சிகளைத் தவிர்க்கவும்.
      career: |
        "என் நற்பெயரை எது அழிக்கும்?" என்பது தவிர்க்க வேண்டிய நடத்தைகளின் பட்டியலைத் தருகிறது.
      product_launch: |
        "பெரும்பாலான தயாரிப்பு வெளியீடுகள் ஏன் தோல்வியடைகின்றன?" என்பது வெளியீட்டிற்கு முன் தீர்க்கப்பட வேண்டிய
        அபாயங்களை வெளிக்கொணர்கிறது.
      health: |
        "எந்த பழக்கங்கள் ஆயுளைக் குறைக்கின்றன?" என்பது "எது என்னை ஆரோக்கியமாக்குகிறது?" என்பதை விட
        தெளிவான தவிர்ப்பு பட்டியலைத் தருகிறது.
    real_world_implications: |
      தலைகீழாக்குதல் பொறியியல் (failure mode analysis), முதலீடு மற்றும் வியூகங்களில் பயன்படுத்தப்படுகிறது.
      இது அதீத தன்னம்பிக்கையைக் குறைத்து, இடர் நிர்வாகத்தை மேம்படுத்துகிறது. அதிகமாகச் சார்ந்திருப்பது
      அதிகப்படியான எச்சரிக்கைக்கு வழிவகுக்கும்.
    professional_application:
      networking_and_relationship_building: |
        "இந்த உறவை எது சேதப்படுத்தும்?" என்பது நம்பிக்கையை உடைக்கும் நடத்தைகளைத் தவிர்க்க உதவுகிறது.
      collaborative_learning_initiative: |
        திட்டங்களில் premortems-ஐ நடத்துங்கள்: "இது தோல்வியடைந்தது. ஏன்?" திட்டமிடல் மற்றும்
        செயல்பாட்டை மேம்படுத்த பதில்களைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        தோல்வியைத் தவிர்ப்பதில் மட்டுமே கவனம் செலுத்துவது செயல்களை முடக்கி, அவசியமான இடர் எடுப்பதைத்
        தடுக்கக்கூடும்.
      negativity_bias: |
        முன்னோக்கிச் செல்லும் வாய்ப்புகளை அடையாளம் காணும் சமநிலையுடன் இல்லாவிட்டால், தலைகீழாக்குதல்
        எதிர்மறைச் சார்பை அதிகரிக்கக்கூடும்.
      analysis_paralysis: |
        தோல்வி முறைகளில் அதிக நேரத்தைச் செலவழித்து, ஒருபோதும் செயல்படாமல் இருப்பது.
      missing_upside: |
        தலைகீழாக்குதல் என்ன செய்ய வேண்டும் என்று சொல்லாது — எதைத் தவிர்க்க வேண்டும் என்று மட்டுமே சொல்லும்.
        உங்களுக்கு இன்னும் நேர்மறை இலக்குகள் தேவை.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: குறைந்து வரும் வருவாயின் விதி
    quick_introduction: |
      குறைந்து வரும் வருவாயின் விதி கூறுவதாவது, மற்றவை நிலையாக இருக்கும்போது, ​​ஒரு உள்ளீட்டின் அளவை நீங்கள் அதிகரிக்கும்போது, ​​ஒவ்வொரு புதிய உள்ளீட்டு அலகிலிருந்தும் கிடைக்கும் கூடுதல் உற்பத்தி இறுதியில் குறையும். அதிகமாக இருப்பது எப்போதும் சிறந்தது அல்ல - கூடுதல் முயற்சி குறைவாகவும் குறைவாகவும் பலனளிக்கும் ஒரு புள்ளி உள்ளது.
    one_liner: அதிக உள்ளீடு இறுதியில் குறைந்த வெளியீட்டைத் தரும் - உகந்த புள்ளி உள்ளது.
    try_this:
      - Ask: கூடுதல் முயற்சி அர்த்தமுள்ள வருவாயைத் தரும் புள்ளியை நான் கடந்துவிட்டேனா?
      - Prioritize the highest-leverage inputs; stop when marginal returns drop. (மிகவும் பயனுள்ள உள்ளீடுகளுக்கு முன்னுரிமை கொடுங்கள்; விளிம்பு வருவாய் குறையும்போது நிறுத்துங்கள்.)
      - Notice when you're over-investing in something that's already paid off. (ஏற்கனவே பலன் அளித்த ஒன்றில் நீங்கள் அதிகமாக முதலீடு செய்வதைக் கவனியுங்கள்.)
    ask_yourself:
      - What would I gain from one more unit of effort here? (இங்கு ஒரு அலகு கூடுதல் முயற்சியால் நான் என்ன பெறுவேன்?)
      - Am I optimizing past the point of diminishing returns? (குறைந்து வரும் வருவாயின் புள்ளியைக் கடந்து நான் மேம்படுத்துகிறேனா?)
    in_more_detail: |
      பொருளாதாரத்தில், ஒரு நிலையான நிலத்தில் அதிக தொழிலாளர்களைச் சேர்ப்பது இறுதியில் சிறிய அதிகரித்த ஆதாயங்களை ஏற்படுத்தும். தனிப்பட்ட உற்பத்தித்திறனில், ஆய்வின் முதல் மணிநேரம் பத்தாவது மணிநேரத்தை விட அதிக மதிப்பைக் கூட்டக்கூடும். இந்த கோட்பாடு வளங்கள், முயற்சி, நேரம் மற்றும் அம்சங்கள் ஆகியவற்றிற்குப் பொருந்தும். ஒரு உகந்த புள்ளி உள்ளது; அதற்கு அப்பால், விளிம்பு வருவாய் குறையும் மற்றும் எதிர்மறையாகவும் மாறக்கூடும்.

      குறைந்து வரும் வருவாயை அங்கீகரிப்பது, வளங்களை திறம்பட ஒதுக்கீடு செய்யவும், ஏற்கனவே அதன் மதிப்பின் பெரும்பகுதியை வழங்கிய பகுதிகளில் அதிகமாக முதலீடு செய்வதைத் தவிர்க்கவும் உதவுகிறது.
    why_this_is_important: |
      குறைந்து வரும் வருவாயைப் புரிந்துகொள்வது அதிக முதலீட்டைத் தடுக்கிறது, முன்னுரிமைக்கு வழிகாட்டுகிறது, எப்போது நிறுத்த வேண்டும் என்பதை அறிய உதவுகிறது. இது வள ஒதுக்கீடு மற்றும் பரிபூரணத்தைத் தவிர்ப்பதற்கு அவசியம்.
    when_to_use:
      - முடிவு-எடுத்தல் (decision_making)
      - சிக்கல்-தீர்வு (problem_solving)
      - முதலீடு (investing)
      - தொழில்-நகர்வுகள் (career_moves)
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        முயற்சி அல்லது வளத்தின் ஒவ்வொரு கூடுதல் அலகும் முந்தையதை விட குறைவான வெளியீட்டை உருவாக்குகிறது.
      perfectionism_trap: |
        தரத்தின் கடைசி 10% ஐப் பெற முயற்சிப்பது விகிதாசாரமற்ற முயற்சியை எடுக்கும்.
      overinvestment: |
        விளிம்பு வருவாய் குறைவாக அல்லது எதிர்மறையாக இருக்கும்போது வளங்களைச் சேர்ப்பதைத் தொடர்வது.
      optimal_point_passed: |
        நீங்கள் அதிக உள்ளீடு விளைவுகளை மேம்படுத்தும் புள்ளியைக் கடந்துவிட்டீர்கள்.
    examples:
      studying: |
        தேர்வு தயாரிப்பின் முதல் 2 மணிநேரம் 7-8 மணிநேரத்தை விட அதிக பலனைத் தருகிறது; குறைந்து வரும் வருவாயின் ஒரு புள்ளி உள்ளது.
      product_features: |
        ஒரு பயன்பாட்டில் அதிக அம்சங்களைச் சேர்ப்பது பயனர்களைக் குழப்பக்கூடும்; 20வது அம்சம் 5வது அம்சத்தை விட குறைவான மதிப்பை சேர்க்கிறது.
      hiring: |
        ஒரு திட்டத்தில் அதிக நபர்களைச் சேர்ப்பது ஒரு கட்டத்திற்குப் பிறகு அதை மெதுவாக்கும் (Brooks's Law).
      marketing: |
        விளம்பரச் செலவை இரட்டிப்பாக்குவது முடிவுகளை இரட்டிப்பாக்காது; சந்தையை நிறைவு செய்யும் போது வருவாய் குறைகிறது.
    real_world_implications: |
      குறைந்து வரும் வருவாயின் விதி பொருளாதாரக் கொள்கை, வணிக உத்தி மற்றும் தனிப்பட்ட உற்பத்தித்திறனுக்கு வழிகாட்டுகிறது. அதை புறக்கணிப்பது வீணான வளங்கள் மற்றும் உகந்ததல்லாத விளைவுகளுக்கு வழிவகுக்கும். இது Pareto கோட்பாட்டையும் கவனத்தையும் ஆதரிக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        ஒரு சில ஆழமான உறவுகளில் முதலீடு செய்வது பலவற்றில் பரவலாக முயற்சியைப் பரப்புவதை விட அதிக பலனைத் தரக்கூடும். கூடுதல் நெட்வொர்க்கிங் குறைந்து வரும் வருவாயைக் கொண்டிருக்கும்போது அங்கீகரிக்கவும்.
      collaborative_learning_initiative: |
        அதிக பயிற்சி மணிநேரங்கள் எப்போதும் சிறந்த விளைவுகளை அர்த்தப்படுத்துவதில்லை. உகந்த அளவைக் கண்டறிந்து அதிக சுமையைத் தவிர்க்கவும்.
    how_can_this_be_misapplied:
      premature_optimization: |
        ஒரு நியாயமான தர நிலையை அடைவதற்கு முன் மிக விரைவில் நிறுத்துவது.
      undershooting: |
        போதுமான முயற்சிக்கு ஒரு சாக்காக குறைந்து வரும் வருவாயைப் பயன்படுத்துவது.
      misidentifying_the_curve: |
        நீங்கள் உண்மையில் வளைவின் வேறு ஒரு பகுதியில் (எ.கா., ஆரம்ப கால வளர்ச்சி நிலை) இருக்கும்போது குறைந்து வரும் வருவாயை கருதுவது.
      one_size_fits_all: |
        வளைவுகள் வேறுபடும் வெவ்வேறு சூழல்களில் ஒரே "உகந்த புள்ளி" ஐப் பயன்படுத்துவது.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: இழப்பு தவிர்ப்பு சார்பு
    quick_introduction: |
      இழப்பு தவிர்ப்பு என்பது சமமான ஆதாயங்களைப் பெறுவதை விட இழப்புகளைத் தவிர்ப்பதை விரும்பும் ஒரு போக்கு.
      மக்கள் பெறும் இன்பத்தை விட, இழக்கும் வலியை தோராயமாக இரண்டு மடங்கு அதிகமாக உணர்கிறார்கள்.
    one_liner: சமமான ஆதாயங்கள் எவ்வளவு இனிமையாக உணர்கின்றனவோ, அதைவிட தோராயமாக இரண்டு மடங்கு வலிமையாக இழப்புகள் உணர்கின்றன.
    try_this:
      - "உங்களையே கேட்டுக்கொள்ளுங்கள்: நான் இழக்கப் போவதை விட, அடையப் போவதை அதிகமாக மதிப்பிடுகிறேனா?"
      - தேர்வை இழப்புகளாக அல்லாமல் ஆதாயங்களாக மறுபரிசீலனை செய்து, உங்கள் பார்வை மாறுகிறதா என்று பாருங்கள்.
      - உண்மையான சாதகத்தை விட, இழப்பு பயம் முடிவை இயக்குவதைக் கவனியுங்கள்.
    ask_yourself:
      - நான் பூஜ்ஜியத்திலிருந்து தொடங்கினால் என்ன தேர்வு செய்வேன்?
      - நான் இழக்கப் போவதால் தக்கவைக்கிறேனா, அல்லது எதிர்காலம் உண்மையாகவே சிறப்பாக இருப்பதால் தக்கவைக்கிறேனா?
    in_more_detail: |
      டேனியல் கானேமன் மற்றும் அமோஸ் ட்வெர்ஸ்கி ஆகியோரால் உருவாக்கப்பட்ட, இழப்பு தவிர்ப்பு என்பது இழப்புகளும் ஆதாயங்களும்
      சமச்சீரற்ற முறையில் உணரப்படுகின்றன என்பதை விளக்குகிறது. $100 இழப்பதன் உளவியல் தாக்கம் பொதுவாக $100 பெறுவதன்
      திருப்தியை விட அதிகமாக இருக்கும். இந்த சார்பு நிதி, பேச்சுவார்த்தைகள் மற்றும் அன்றாடத் தேர்வுகள் முழுவதும் முடிவுகளை பாதிக்கிறது,
      சாத்தியமான இழப்புகள் முக்கியமாக இருக்கும்போது பெரும்பாலும் இடர்-தவிர்ப்பு நடத்தையை ஏற்படுத்துகிறது.
    why_this_is_important: |
      இழப்பு தவிர்ப்பைப் புரிந்துகொள்வது, பகுத்தறிவு பகுப்பாய்வை விட இழப்பு பயம் எப்போது முடிவுகளை இயக்குகிறது என்பதை
      அங்கீகரிக்க உதவுகிறது. இது ஏன் மக்கள் இழக்கும் முதலீடுகளைத் தக்கவைக்கிறார்கள், தேவையான மாற்றங்களைத் தவிர்க்கிறார்கள்,
      மற்றும் பேச்சுவார்த்தைகள் மற்றும் தொழில் முடிவுகளில் உகந்ததல்லாத தேர்வுகளைச் செய்கிறார்கள் என்பதை விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - முதலீடு_செய்தல்
      - தொழில்_மாற்றங்கள்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        ஒரு பொருளை இழக்கும் வாய்ப்பு, சாத்தியமான ஆதாயத்தின் சாதகத்துடன் ஒப்பிடும்போது, சமச்சீரற்ற பதட்டம்
        அல்லது எதிர்ப்பைத் தூண்டும் போது கவனிக்கவும்.
      reluctance_to_change: |
        முறைகள், வேலை, அல்லது சொத்துக்களை விற்பனை செய்வதைத் தவிர்க்க தயங்குதல், புறநிலை பகுப்பாய்வு
        அது சிறந்த விருப்பம் என்று பரிந்துரைத்தாலும் கூட.
      framing_sensitivity: |
        முடிவுகள், விருப்பங்கள் ஆதாயங்களாக அல்லது இழப்புகளாக பிரிக்கப்பட்டால், விளைவுகள் சமமாக இருந்தாலும் கூட,
        அதற்கேற்ப வியத்தகு முறையில் மாறும்.
      overvaluing_what_you_have: |
        உரிமைப்படுத்தும் விளைவு—நீங்கள் வைத்திருப்பதை, நீங்கள் வைத்திருப்பதால் மட்டுமே அதிக மதிப்புடன் மதிப்பிடுவது—பெரும்பாலும்
        இழப்பு தவிர்ப்புடன் இணைகிறது.
    examples:
      investing: |
        "இழப்பை உணர்வதைத் தவிர்க்க" குறைந்துவரும் பங்குகளை வைத்திருப்பது, மற்ற இடங்களில்
        சிறந்த முதலீட்டு வாய்ப்புகளைத் தவறவிடுதல்.
      career: |
        தன்னைத்தானே திருப்திப்படுத்தாத வேலையில் இருப்பது, ஏனெனில் வெளியேறுவது பாதுகாப்பு இழப்பாகத் தோன்றும்,
        புதிய வாய்ப்பு அதிக வளர்ச்சியை வழங்கினாலும் கூட.
      negotiations: |
        ஒரு நியாயமான சலுகையை நிராகரிப்பது, ஏனெனில் அது ஒரு உடன்படிக்கையை "விட்டுக்கொடுப்பதாக" பிரிக்கப்படுகிறது,
        ஒரு உடன்பாட்டை "பெறுவதை" விட.
      product_design: |
        கட்டணச் சேவையாக மாறும் இலவச சோதனைகள்—பயனர்கள் சோதனை முடிந்ததும் சேவையை "இழப்பதாக" உணர்கிறார்கள்,
        இது புதிய சேவையை "பெறுவதை" விட சந்தா செலுத்துவதை ஊக்குவிக்கிறது.
    real_world_implications: |
      இழப்பு தவிர்ப்பு சந்தைகள், கொள்கைகள் மற்றும் தனிப்பட்ட நடத்தைகளை வடிவமைக்கிறது. இது
      காப்பீடு மற்றும் உத்தரவாதங்கள் ஏன் நன்றாக விற்கின்றன, மக்கள் ஏன் பயனுள்ள மாற்றத்தைத் தவிர்க்கிறார்கள்,
      மற்றும் எதிர்மறை செய்திகள் ஏன் பெரிய தாக்கத்தை ஏற்படுத்துகின்றன என்பதை விளக்குகிறது. அதை அங்கீகரிப்பது
      முடிவு தரத்தை மேம்படுத்தவும் மற்றும் வருத்தத்தால் தூண்டப்பட்ட தேர்வுகளைக் குறைக்கவும் முடியும்.
    professional_application:
      networking_and_relationship_building: |
        உற்பத்தித்திறன் இல்லாத உறவுகள் அல்லது ஒத்துழைப்புகளை முடிப்பதை மக்கள் இழப்பு தவிர்ப்பால் எதிர்க்கக்கூடும்
        என்பதை அறிந்திருங்கள்—அவர்கள் இணைப்பை "இழக்க" பயப்படுகிறார்கள்.
        எதிர்ப்பைக் குறைக்க புதிய வாய்ப்புகளை இழப்புகளுக்கு பதிலாக ஆதாயங்களாக பிரிக்கவும்.
      collaborative_learning_initiative: |
        புதிய செயல்முறைகள் அல்லது கருவிகளை அறிமுகப்படுத்தும்போது, குழு இழக்கும் விஷயங்களை விட,
        அவர்கள் என்ன "விட்டுக்கொடுக்கிறார்கள்" என்பதை விட, என்ன ஆதாயம் பெறுகிறது என்பதை வலியுறுத்துங்கள்.
        இழப்பு-பிரிக்கப்பட்ட மாற்ற முயற்சிகள் பெரும்பாலும் வலுவான எதிர்ப்பைத் தூண்டுகின்றன.
    how_can_this_be_misapplied:
      manipulation: |
        முடிவுகளை அழுத்த இழப்பு தவிர்ப்பைப் பயன்படுத்துதல்—எ.கா., "வரையறுக்கப்பட்ட நேரச் சலுகைகள்"
        அல்லது "தவறவிடாதீர்கள்" என்று பிரிக்கப்பட்டால், உண்மையான மதிப்பு மதிப்பீட்டை விட
        இழப்பு பயத்தைத் தூண்டுகிறது.
      misinterpreting_relationships: |
        ஒருவரின் மாற்றத்திற்கான எதிர்ப்பை முற்றிலும் பகுத்தறிவு என்று கருதுவது, அது
        இழப்பு தவிர்ப்பால் இயக்கப்படக்கூடும். நோக்கங்களை தவறாகக் கணிப்பது நம்பிக்கையை சேதப்படுத்தும்.
      overcommitment: |
        தவறான திட்டம்—ஒரு தோல்வியுற்ற திட்டத்தில் தொடர்ந்து முதலீடு செய்வது,
        "நாம் ஏற்கனவே நிறைய முதலீடு செய்துள்ளோம்" என்பதால், இழப்புகளைக் குறைப்பதை விட.
      missed_opportunities_for_conflict_resolution: |
        எந்தவொரு சமரசமும் இழப்பாக உணர்வதால் சமரசம் செய்ய மறுப்பது,
        மாற்று அனைவருக்கும் மோசமான விளைவாக இருந்தாலும் கூட.
      vulnerability_to_exploitation: |
        நீங்கள் செயல்படவில்லை என்றால் "இழக்கப் போவதை" வலியுறுத்தும் விற்பனை உத்திகள் போன்றவை,
        இழப்பு தவிர்ப்பைத் தூண்டும் வகையில் தேர்வுகள் பிரிக்கும் மற்றவர்களால் கையாளப்படுதல்.
      reinforcing_negative_perceptions: |
        சாத்தியமான பின்னடைவுகளில் அதிக கவனம் செலுத்துவது ஒரு அவநம்பிக்கையான
        பார்வையை உருவாக்கக்கூடும், இது சுய-நிறைவேற்றமாகிறது, வளர்ச்சிக்குரிய வாய்ப்புகளைத் தவறவிடுகிறது.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: வரைபடம் என்பது நிலப்பரப்பு அல்ல
    quick_introduction: |
      "வரைபடம் என்பது நிலப்பரப்பு அல்ல" என்பதன் பொருள் என்னவென்றால், யதார்த்தத்தின் ஒரு பிரதிநிதித்துவம் யதார்த்தம் அல்ல. மாதிரிகள், கோட்பாடுகள் மற்றும் விளக்கங்கள் பயனுள்ள எளிமைப்படுத்தல்கள், ஆனால் அவை எப்போதும் எதையாவது விட்டுவிடுகின்றன. நிலப்பரப்பிற்கான வரைபடத்தை குழப்புவது தவறுக்கு வழிவகுக்கிறது.
    one_liner: வரைபடம் என்பது நிலப்பரப்பு அல்ல—அனைத்து மாதிரிகளும் தவறானவை; சில பயனுள்ளவை.
    try_this:
      - ஒரு மாதிரி யதார்த்தத்துடன் பொருந்தவில்லை என்றால், நிலப்பரப்பை பொருத்த வரைபடத்தைப் புதுப்பிக்கவும்.
      - கேட்கவும்: இந்த மாதிரி எதை விட்டுவிடுகிறது? இது எப்போது தோல்வியடையும்?
      - மாதிரிகளை உண்மைகளாக அல்ல, கருவிகளாகக் கருதவும்.
    ask_yourself:
      - எனது மாதிரியை யதார்த்தத்துடன் குழப்புகிறேனா?
      - நான் கடைசியாக பார்த்ததிலிருந்து நிலப்பரப்பு மாறிவிட்டதா?
    in_more_detail: |
      ஆல்ஃபிரட் கோர்ஜிப்ஸ்கி பொது சொற்பிறப்பியலில் இந்த யோசனையை அறிமுகப்படுத்தினார். ஒரு நகரத்தின் வரைபடம் வழிசெலுத்தலுக்கு பயனுள்ளதாக இருக்கும், ஆனால் அது நகரம் அல்ல—அது விவரங்களை விட்டுவிடுகிறது, காலாவதியாகிறது, மேலும் எதையும் ஒருபோதும் பிடிக்க முடியாது. மன மாதிரிகள், அறிவியல் கோட்பாடுகள் மற்றும் நிறுவன விளக்கப்படங்களுக்கும் இதுவே பொருந்தும்.

      அனைத்து மாதிரிகளும் தவறானவை; சில பயனுள்ளவை. நிலப்பரப்பு மாறியிருக்கும்போது, ஒரு மாதிரியை முழு உண்மையாகக் கருதுவதே ஆபத்து. யதார்த்தம் பொருந்தாதபோது வரைபடங்களைப் புதுப்பிப்பதை நல்ல சிந்தனை கோருகிறது.
    why_this_is_important: |
      வரைபடங்கள் நிலப்பரப்பிலிருந்து வேறுபடுகின்றன என்பதை அங்கீகரிப்பது, மாதிரிகளில் அதிகப்படியான நம்பிக்கையைத் தடுக்கிறது, நம்பிக்கைகளைப் புதுப்பிக்க ஊக்குவிக்கிறது, மேலும் காலாவதியான அல்லது மிக எளிமைப்படுத்தப்பட்ட தகவல்களின் அடிப்படையில் செயல்படும் அபாயத்தைக் குறைக்கிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - கற்றல்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      model_reality_confusion: |
        ஒரு கட்டமைப்பு அல்லது கோட்பாட்டை யதார்த்தத்தை முழுமையாக விவரிப்பதாகக் கருதுதல்.
      outdated_assumptions: |
        தற்போதைய நிலைமைகளுடன் பொருந்தாத தகவல்கள் அல்லது மாதிரிகளின் அடிப்படையில் செயல்படுதல்.
      oversimplification: |
        "வரைபடத்தில்" அது சேர்க்கப்படாததால் நுணுக்கத்தை புறக்கணித்தல்.
      map_worship: |
        புதுப்பிப்பதற்கு பதிலாக ஆதாரங்கள் முரண்படும்போது ஒரு மாதிரியைப் பாதுகாத்தல்.
    examples:
      organizational_charts: |
        வேலை உண்மையில் எவ்வாறு செய்யப்படுகிறது என்பதை அறிக்கையிடும் கட்டமைப்பு பிரதிபலிக்கிறது என்று கருதுதல்.
      financial_models: |
        ஒரு நிதிநிலை அறிக்கையை ஒரு காட்சிப்படுத்தல் என்று கருதாமல், ஒரு காட்சியாகக் கருதுதல்.
      stereotypes: |
        தனிநபர்களுக்கு குழு-நிலை பொதுமைப்படுத்தல்களைப் பயன்படுத்துதல்.
      strategy_docs: |
        சந்தை மாறியிருக்கும் போது ஒரு திட்டத்தை எழுதியபடி செயல்படுத்துதல்.
    real_world_implications: |
      வரைபடம்-நிலப்பரப்பு வேறுபாடு அறிவியல், பொறியியல் மற்றும் தத்துவத்திற்கு அடிப்படையானது. இது Bayesian புதுப்பித்தல், சுறுசுறுப்பான முறை மற்றும் அறிவாற்றல் பணிவுக்கு அடிப்படையாக உள்ளது. அதை புறக்கணிப்பது கடுமையான சிந்தனை மற்றும் தோல்வியுற்ற உத்திகளுக்கு வழிவகுக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        ஒரு நபரைப் பற்றிய உங்கள் மன மாதிரி காலாவதியானதாக இருக்கலாம். பழைய எண்ணங்களை நம்புவதற்கு பதிலாக நேரடி தொடர்பு மூலம் அதை புதுப்பிக்கவும்.
      collaborative_learning_initiative: |
        திட்டங்கள் மற்றும் மாதிரிகளை நிலையான உண்மைகளாக அல்ல, சோதிக்கப்பட வேண்டிய மற்றும் திருத்தப்பட வேண்டிய கருதுகோள்களாகக் கருத குழுக்களை ஊக்குவிக்கவும்.
    how_can_this_be_misapplied:
      radical_skepticism: |
        எந்த வரைபடமும் பயனுள்ளதாக இல்லை என்றும் அனைத்து அறிவும் சந்தேகத்திற்குரியது என்றும் முடிவுக்கு வருதல்.
      constant_revision: |
        நிலையான புரிதல் எழாத அளவுக்கு அடிக்கடி புதுப்பித்தல்.
      dismissing_models: |
        "நிலப்பரப்பு அல்ல" என்பதால் பயனுள்ள எளிமைப்படுத்தல்களை நிராகரித்தல்.
      relativism: |
        அனைத்து வரைபடங்களும் சமமாக செல்லுபடியாகும் என்று கூறுதல், சில தெளிவாக நிலப்பரப்புக்கு சிறப்பாகப் பொருந்துகின்றன.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: வெறும் வெளிப்பாடு விளைவு
    quick_introduction: |
      வெறும் வெளிப்பாடு விளைவு என்பது நாம் ஒரு விஷயத்துடன் பழக்கப்பட்டுவிட்டோம் என்பதற்காகவே அதை விரும்புவதற்கான போக்காகும். மீண்டும் மீண்டும் பார்ப்பது - வலுவூட்டல் இல்லாமலேயே - விருப்பத்தை அதிகரிக்கிறது. நாம் அறிந்தவற்றை நாம் விரும்புகிறோம்.
    one_liner: பழக்கம் விருப்பத்தை வளர்க்கிறது—நாம் முன்பு பார்த்ததை விரும்புகிறோம்.
    try_this:
      - Ask: இது நன்றாக இருப்பதால் நான் இதை விரும்புகிறேனா, அல்லது எனக்கு இது பழக்கமாகிவிட்டதால் விரும்புகிறேனா?
      - When evaluating options, correct for exposure—new things start at a disadvantage. (விருப்பங்களை மதிப்பிடும்போது, வெளிப்பாட்டிற்காக சரிசெய்யவும்—புதிய விஷயங்கள் ஒரு குறைபாட்டுடன் தொடங்குகின்றன.)
      - Notice when repetition is influencing your preference. (மீண்டும் மீண்டும் பார்ப்பது உங்கள் விருப்பத்தை எவ்வாறு பாதிக்கிறது என்பதைக் கவனியுங்கள்.)
    ask_yourself:
      - Am I preferring something mainly because I've seen it before? (நான் முன்பு பார்த்ததால் மட்டுமே ஒன்றை விரும்புகிறேனா?)
      - Would I choose differently if exposure were equal? (வெளிப்பாடு சமமாக இருந்தால் நான் வித்தியாசமாக தேர்ந்தெடுப்பேனா?)
    in_more_detail: |
      ராபர்ட் சைஜோன்க் (Robert Zajonc) காட்டினார், தூண்டுதல்களை (முகங்கள், வார்த்தைகள், வடிவங்கள்) மீண்டும் மீண்டும் வெளிப்படுத்துவது அவற்றுக்கு எதிரான நேர்மறை உணர்வை அதிகரிக்கிறது—நாம் வெளிப்பாட்டை நனவாக அறிந்திருக்காவிட்டாலும் கூட. பழக்கம் வெறுப்பை அல்ல, விருப்பத்தை வளர்க்கிறது (பல சந்தர்ப்பங்களில்). நாம் பகுப்பாய்வு செய்யாதபோதும், வெளிப்பாடு நுட்பமாக இருக்கும்போதும் இந்த விளைவு வலுவாக இருக்கும்.

      வெறும் வெளிப்பாடு விளைவு பிராண்ட் விருப்பம், பரஸ்பர ஈர்ப்பு மற்றும் அழகியல் தீர்ப்பு ஆகியவற்றை பாதிக்கிறது. நாம் ஏன் பழக்கமான இசையை விரும்புகிறோம், விளம்பரம் ஏன் மீண்டும் மீண்டும் வருவதன் மூலம் வேலை செய்கிறது, மேலும் நாம் ஏன் முன்பு பார்த்த நபர்களை விரும்பலாம்—அவர்களுடன் எந்த தொடர்பும் இல்லாவிட்டாலும் கூட—இது விளக்குகிறது.
    why_this_is_important: |
      வெறும் வெளிப்பாடு விளைவை அங்கீகரிப்பது உங்கள் சொந்த விருப்பங்களைப் புரிந்துகொள்ளவும், மீண்டும் மீண்டும் வருவதன் மூலம் ஏற்படும் கையாளுதலை எதிர்க்கவும் உதவுகிறது. உறவுகள் மற்றும் பிராண்டுகளுக்கு ஏன் தெரிவுநிலை மற்றும் இருப்பு முக்கியம் என்பதையும் இது விளக்குகிறது. பழக்கம் ஒரு சக்திவாய்ந்த ஆனால் பெரும்பாலும் ஆழ்மனதில் பாதிக்கும் ஒரு விஷயமாகும்.
    when_to_use:
      - உறவு_கட்டுதல்
      - முடிவு_எடுத்தல்
      - தலைமைத்துவம்
      - கற்றல்
    how_can_you_spot_it:
      familiarity_preference: |
        புதிய விருப்பங்களை விட முன்பு பார்த்த விருப்பங்களை விரும்புதல்.
      repetition_influence: |
        வெளிப்படையான வற்புறுத்தல் இல்லாமல் மீண்டும் மீண்டும் பார்ப்பது விருப்பத்தை அதிகரிக்கிறது.
      unconscious_influence: |
        வெளிப்பாட்டை நாம் அறியாதபோதும் இந்த விளைவு வேலை செய்கிறது.
      brand_recognition: |
        காரணம் சொல்ல முடியாவிட்டாலும் பழக்கமான பிராண்டுகள் விரும்பப்படுகின்றன.
    examples:
      advertising: |
        ஒரு பிராண்டின் மீண்டும் மீண்டும் வரும் வெளிப்பாடு, கவர்ச்சியான செய்திகள் இல்லாவிட்டாலும் கூட, விருப்பத்தை அதிகரிக்கிறது.
      music: |
        நாம் முன்பு கேட்ட பாடல்களை முதல் முறை கேட்கும்போது புதிய பாடல்களை விட அதிகமாக விரும்புகிறோம்.
      people: |
        தொடர்பு இல்லாவிட்டாலும் கூட, நாம் மீண்டும் மீண்டும் பார்த்த நபர்களை (எ.கா., வகுப்புத் தோழர்கள், சக ஊழியர்கள்) அந்நியர்களை விட அதிகமாக விரும்புகிறோம்.
      ideas: |
        நாம் முன்பு சந்தித்த யோசனைகள் புதிய யோசனைகளை விட மிகவும் வசதியானதாகவும் நம்பகமானதாகவும் தோன்றுகின்றன.
    real_world_implications: |
      வெறும் வெளிப்பாடு விளைவு நுகர்வோர் நடத்தை, அரசியல் விருப்பங்கள் மற்றும் சமூக ஈர்ப்பை உருவாக்குகிறது. இது சந்தைப்படுத்தலில் சுரண்டப்படுகிறது மற்றும் பழக்கமானவற்றுக்கு நியாயமற்ற நன்மைகளை உருவாக்க முடியும். வெளிப்பாட்டின் பன்முகத்தன்மை ஏன் முக்கியம் என்பதையும் இது விளக்குகிறது—வேறுபாடுகளுடன் பழகுவது சார்புகளைக் குறைக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        தெரிவுநிலை முக்கியம். வந்து, இருப்பில் இருந்து, பார்க்கப்படுவது பழக்கத்தை உருவாக்கி விருப்பத்தை வளர்க்கிறது. மீண்டும் மீண்டும் நிகழும் குறைந்த-அளவிலான தொடர்புகளின் மதிப்பை குறைத்து மதிப்பிடாதீர்கள்.
      collaborative_learning_initiative: |
        பல்வேறு கண்ணோட்டங்கள் மற்றும் நபர்களை மீண்டும் மீண்டும் மக்களுக்கு வெளிப்படுத்துங்கள்—பழக்கம் சார்புகளைக் குறைக்கலாம். ஆனால் வெறும் வெளிப்பாடு தற்போதைய நிலையை விரும்புவதை வலுப்படுத்தக்கூடும் என்பதையும் அறிந்து கொள்ளுங்கள்.
    how_can_this_be_misapplied:
      manipulation: |
        ஒப்புதல் இல்லாமல் விருப்பங்களை கையாளும் வகையில் மீண்டும் மீண்டும் வெளிப்பாட்டை வேண்டுமென்றே உருவாக்குதல்.
      false_familiarity: |
        பழக்கத்தை தரத்துடன் ஒப்பிடுவது—சில சமயங்களில் புதிய விருப்பங்கள் சிறந்தவை.
      exclusion: |
        சில நபர்கள் மட்டுமே வெளிப்பாட்டைப் பெற்றால், அவர்களுக்கு நியாயமற்ற நன்மை கிடைக்கும். யாருக்கு தெரிவுநிலைக்கான அணுகல் உள்ளது என்பதை கவனியுங்கள்.
