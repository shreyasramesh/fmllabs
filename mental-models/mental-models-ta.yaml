  - id: negativity_bias
    name: எதிர்மறை சார்பு
    quick_introduction: |
      எதிர்மறை சார்பு என்பது நேர்மறை தகவல்களை விட எதிர்மறை தகவல்களுக்கு அதிக முக்கியத்துவம் கொடுக்கும் போக்காகும். மோசமான செய்திகள், விமர்சனங்கள் மற்றும் அச்சுறுத்தல்கள் நமது கவனத்தை ஈர்க்கின்றன மற்றும் சமமான நேர்மறை தூண்டுதல்களை விட நமது முடிவுகளை வலுவாக பாதிக்கின்றன.
    one_liner: கெட்ட செய்தி நல்ல செய்தியை விட கனமானது - அச்சுறுத்தல்களுக்கு முன்னுரிமை அளிக்க நாம் உள்ளமைக்கப்பட்டுள்ளோம்.
    try_this:
      - மதிப்பிடும்போது நேர்மறை ஆதாரங்களை தீவிரமாகத் தேடுங்கள் மற்றும் அவற்றிற்கு முக்கியத்துவம் கொடுங்கள்.
      - பல புகார்களை விட ஒரு விமர்சனம் அதிக எடை கொண்டிருப்பதை கவனியுங்கள்.
      - கேளுங்கள்: எதிர்மறை தகவலுக்கு அது தகுதியானதை விட அதிக முக்கியத்துவம் கொடுக்கிறேனா?
    ask_yourself:
      - நான் எதிர்மறையில் கவனம் செலுத்தி, நேர்மறையை புறக்கணிக்கிறேனா?
      - நல்ல ஆதாரங்களில் கவனம் செலுத்தினால் நான் வித்தியாசமாக உணர்வேனா?
    in_more_detail: |
      பரிணாம வளர்ச்சியின்படி, ஒரு அச்சுறுத்தலைத் தவறவிடுவது உயிருக்கு ஆபத்தானது, அதே சமயம் ஒரு வாய்ப்பைத் தவறவிடுவது பொதுவாக உயிர் பிழைக்கக்கூடியது. நமது மூளைகள் எதிர்மறை தகவல்களுக்கு முன்னுரிமை அளிக்க உள்ளமைக்கப்பட்டுள்ளன. ஒரு தனிப்பட்ட விமர்சன கருத்து பல புகார்களை விட அதிக எடை கொண்டிருக்கலாம். எதிர்மறை நிகழ்வுகள் மிகவும் தெளிவாகவும் நீண்ட காலத்திற்கும் நினைவில் கொள்ளப்படுகின்றன.

      இந்த சார்பு உறவுகள், முடிவெடுக்கும் திறன் மற்றும் நல்வாழ்வை பாதிக்கிறது. நாம் தோல்விகளில் கவனம் செலுத்துகிறோம், மோசமான சூழ்நிலைகளை எதிர்பார்க்கிறோம், மேலும் நேர்மறை ஆதாரங்களை புறக்கணிக்கிறோம். இதைப் புரிந்துகொள்வது அதைச் சரிசெய்ய உதவுகிறது.
    why_this_is_important: |
      எதிர்மறை சார்பை அங்கீகரிப்பது பின்னூட்டங்களை சமநிலைப்படுத்தவும், விமர்சனங்களுக்கு அதிகப்படியாக எதிர்வினையாற்றுவதைத் தவிர்க்கவும், மேலும் சீரான முடிவுகளை எடுக்கவும் உதவுகிறது. மோசமான செய்திகள் ஏன் ஆதிக்கம் செலுத்துகின்றன என்பதையும், சூழ்நிலைகள் தகுதியானதை விட நாம் ஏன் மோசமாக உணர்கிறோம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - உறவுகளை உருவாக்குதல்
      - தலைமைத்துவம்
      - இடர் மதிப்பீடு
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        ஒரு எதிர்மறை கருத்து பல நேர்மறை கருத்துக்களை மறைக்கிறது.
      threat_prioritization: |
        சாத்தியமான பாதகங்கள் சமமான சாதகங்களை விட அதிக கவனத்தைப் பெறுகின்றன.
      vivid_negative_memories: |
        எதிர்மறை அனுபவங்கள் எளிதாகவும் அதிக உணர்ச்சியுடனும் நினைவு கூரப்படுகின்றன.
      discounting_positive_evidence: |
        நல்ல செய்திகள் விரைவில் மறக்கப்படுகின்றன அல்லது விளக்கப்பட்டு விலக்கப்படுகின்றன.
    examples:
      performance_reviews: |
        ஒரு ஊழியர் ஒரு தனிப்பட்ட விமர்சன கருத்தில் கவனம் செலுத்துகிறார் மற்றும் ஒட்டுமொத்த நேர்மறை மதிப்பீட்டைப் புறக்கணிக்கிறார்.
      news_consumption: |
        நேர்மறை போக்குகள் இருந்தபோதிலும், எதிர்மறை தலைப்புச் செய்திகள் கவனத்தை ஆதிக்கம் செலுத்தி உலகக் கண்ணோட்டத்தை வடிவமைக்கின்றன.
      relationships: |
        பல நல்ல தருணங்களை விட ஒரு தனிப்பட்ட வாதம் பெரியதாகத் தெரிகிறது.
      investing: |
        சந்தை வீழ்ச்சிகள் சமமான ஏற்றங்களை விட அதிக பீதியைத் தூண்டுகின்றன.
    real_world_implications: |
      எதிர்மறை சார்பு ஊடகம், அரசியல் மற்றும் நிறுவன கலாச்சாரத்தை வடிவமைக்கிறது. இது பதட்டம், மோதல் மற்றும் உகந்ததல்லாத முடிவுகளுக்கு பங்களிக்கிறது. இதை வேண்டுமென்றே எதிர்ப்பது நல்வாழ்வையும் தீர்ப்பையும் மேம்படுத்தும்.
    professional_application:
      networking_and_relationship_building: |
        பின்னூட்டம் அளிக்கும்போது, எதிர்மறை கருத்துக்கள் அதிக எடையைக் கொண்டிருக்கும் என்பதை நினைவில் கொள்ளுங்கள் - அவற்றை சமநிலைப்படுத்தி வளர்ச்சியையும் வலியுறுத்துங்கள். பின்னூட்டம் பெறும்போது, முழுப் படத்தையும் உணர்வுபூர்வமாக கருதுங்கள்.
      collaborative_learning_initiative: |
        எதிர்மறை சார்பை வெளிப்படையாக எதிர்க்கும் கலாச்சாரங்களை உருவாக்குங்கள்: வெற்றிகளைக் கொண்டாடுங்கள், நேர்மறை விளைவுகளைப் பதிவு செய்யுங்கள், மேலும் "மோசமானவை நடந்தால் என்ன" என்பதை விட "நன்றாக நடந்தவை" பற்றிய "முன்-மரணங்களை" சமநிலைப்படுத்துங்கள்.
    how_can_this_be_misapplied:
      toxic_positivity: |
        "நேர்மறையான சிந்தனையை" வலியுறுத்துவதன் மூலம் நியாயமான கவலைகளைப் புறக்கணித்தல்.
      ignoring_real_threats: |
        உண்மையான அபாயங்களைக் குறைத்து மதிப்பிடும் அளவுக்கு அதிகமாகச் சரிசெய்தல்.
      feedback_suppression: |
        "எதிர்மறை கெட்டது" என்பதால் தேவையான விமர்சனங்களைத் தவிர்த்தல்.
      invalidation: |
        ஒருவர் உண்மையான கவலைக்கான காரணங்களைக் கொண்டிருக்கும்போது, அவர்களின் எதிர்மறை உணர்வுகள் "எதிர்மறை சார்பு மட்டுமே" என்று கூறுதல்.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: ஓக்காமின் கத்தி
    quick_introduction: |
      ஓக்காமின் கத்தி (அல்லது ஓக்காம்'ஸ் ரேசர்) என்பது போட்டியிடும் கருதுகோள்களில்,
      குறைந்தபட்ச அனுமானங்களைக் கொண்டிருப்பதே விரும்பத்தக்கது என்ற கொள்கையாகும்.
      எளிய விளக்கங்கள் பெரும்பாலும்—ஆனால் எப்போதும் இல்லை—சரியானவை.
    one_liner: ஆதாரங்களுடன் பொருந்தக்கூடிய எளிய விளக்கத்தை விரும்புங்கள்.
    try_this:
      - கோட்பாடுகளை ஒப்பிடும்போது, ​​கேளுங்கள்: எது குறைவான அனுமானங்களைக் கொண்டுள்ளது?
      - தேவைப்படும் ஆதாரம் இல்லாமல் சிக்கலைச் சேர்க்க வேண்டாம்.
      - ஒரு எளிய விளக்கத்தை விட சிக்கலான விளக்கத்தை நீங்கள் விரும்புவதை கவனியுங்கள்.
    ask_yourself:
      - நான் தேவையற்ற சிக்கலை அறிமுகப்படுத்துகிறேனா?
      - இந்த அளவு விளக்கத்திற்கு ஆதாரம் தேவையா?
    in_more_detail: |
      வில்லியம் ஆஃப் ஓக்காம் பெயரிடப்பட்ட இந்தக் கொள்கை, எளிய விளக்கங்கள்
      எப்போதும் உண்மையானவை என்று கூறவில்லை. இது, தேவையற்ற சிக்கலை
      ஆதாரம் இல்லாமல் அறிமுகப்படுத்தக்கூடாது என்று பரிந்துரைக்கிறது.
      இரண்டு கோட்பாடுகள் ஒரே நிகழ்வை விளக்கினால், ஆதாரம் வேறுவிதமாக
      தேவைப்படும் வரை, எளிய ஒன்று விரும்பத்தக்கது.

      ஓக்காமின் கத்தி ஒரு heuristic (heuristic), ஒரு விதி அல்ல. சில சமயங்களில் சரியான விளக்கம்
      சிக்கலானதாக இருக்கும். ஆனால் இது overfitting, சதிச் சிந்தனை மற்றும் தேவையற்ற
      சிக்கல்களைத் தடுக்கிறது. இது விளக்கத்தில் சிக்கனத்தை ஆதரிக்கிறது.
    why_this_is_important: |
      ஓக்காமின் கத்தியைப் பயன்படுத்துவது சிக்கல் தீர்க்கும் திறனை மேம்படுத்துகிறது,
      மாதிரிகளில் overfitting-ஐக் குறைக்கிறது, மேலும் சிக்கலான ஆனால் ஆதரிக்கப்படாத
      கோட்பாடுகளைத் தவிர்க்க உதவுகிறது. ஆதாரம் தெளிவற்றதாக இருக்கும்போது இது ஒரு பயனுள்ள இயல்புநிலை.
    when_to_use:
      - சிக்கல்_தீர்க்கும்
      - முடிவெடுக்கும்
      - கற்றல்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      unnecessary_complexity: |
        குறைவான அனுமானங்கள் போதுமானதாக இருக்கும்போது, ​​ஒரு விளக்கம் பல அனுமானங்களை
        invocation செய்கிறது.
      conspiracy_tendencies: |
        எளிய காரணங்களைக் கொண்ட நிகழ்வுகளுக்கு சிக்கலான, பல-நடிகர் விளக்கங்கள்.
      overfitting: |
        கடந்தகால தரவுகளைச் சரியாக விளக்கும் ஒரு மாதிரி அல்லது கோட்பாடு, ஆனால் புதிய தரவுகளில் தோல்வியடைகிறது.
      elegance_in_explanation: |
        சிறந்த விளக்கங்கள் பெரும்பாலும் பின்னணியில் "தெளிவாக" உணர்கின்றன.
    examples:
      debugging: |
        ஒரு பிழை ஏற்படும்போது, ​​கட்டமைப்புச் சிக்கல்களைக் கருதுவதற்கு முன்,
        எளிய காரணங்களைச் சரிபார்க்கவும் (எ.கா., தட்டச்சுப் பிழை, தவறான கட்டமைப்பு).
      conspiracy_theories: |
        "அரசாங்கம் X-ஐ ஏற்பாடு செய்தது" என்பதற்கு பல மறைக்கப்பட்ட நடிகர்கள் தேவை;
        "சிலர் தவறுகள் செய்தனர்" என்பது எளிமையானது.
      product_failure: |
        பயனர்கள் ஒரு அம்சத்தைப் பயன்படுத்தவில்லை—எளிய விளக்கம்: அது அவர்களின்
        பிரச்சினையைத் தீர்க்கவில்லை, அவர்கள் UI-யால் குழப்பமடையவில்லை.
      medical_diagnosis: |
        "பொதுவான விஷயங்கள் பொதுவானவை"—அரிதான நோய்களைக் கருதுவதற்கு முன் அடிக்கடி ஏற்படும் நோய்களைக் கருத்தில் கொள்ளுங்கள்.
    real_world_implications: |
      ஓக்காமின் கத்தி அறிவியல் விசாரணை, பொறியியல் மற்றும் அன்றாட பகுத்தறிவுக்கு வழிகாட்டுகிறது.
      இது சிக்கலான தவறான கோட்பாடுகளில் வீணான முயற்சியைக் குறைக்கிறது. தவறாகப் பயன்படுத்தினால்,
      இது உண்மையான சிக்கலான நிகழ்வுகளை நிராகரிக்கக்கூடும்.
    professional_application:
      networking_and_relationship_building: |
        மற்றவர்களின் நடத்தையை விளக்கும்போது, ​​தீமை அல்லது சிக்கலான நோக்கங்களை
        கருதுவதற்கு முன், எளிய விளக்கங்களை (அவர்கள் பிஸியாக இருக்கிறார்கள்,
        அவர்கள் மறந்துவிட்டார்கள்) விரும்புங்கள்.
      collaborative_learning_initiative: |
        சிக்கல் தீர்க்கும் அமர்வுகளில், சிக்கலான மாதிரிகளை உருவாக்குவதற்கு முன்,
        "எளிய விளக்கம் என்ன?" என்று வெளிப்படையாக கேளுங்கள்.
    how_can_this_be_misapplied:
      oversimplification: |
        செல்லுபடியாகும் சிக்கலான விளக்கங்களை "மிகவும் சிக்கலானவை" என்பதால் நிராகரித்தல்.
      status_quo_bias: |
        புதிய ஆனால் சரியான விளக்கங்களுக்குப் பதிலாக பழக்கமான விளக்கங்களை விரும்ப
        ஓக்காமின் கத்தியைப் பயன்படுத்துதல்.
      scientific_rigidity: |
        புதிய கோட்பாடுகள் ஆதரிக்கப்பட்டாலும், அவை சிக்கலானவை என்பதால் நிராகரித்தல்.
      missing_nuance: |
        சில துறைகள் (எ.கா., மனித நடத்தை, சுற்றுச்சூழல் அமைப்புகள்) இயல்பாகவே சிக்கலானவை;
        எளிமை தவறாக வழிநடத்தக்கூடும்.
