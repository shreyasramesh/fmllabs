      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: குழு சிந்தனை
    quick_introduction: |
      குழு சிந்தனை என்பது, ஒத்திசைவான குழுக்கள் விமர்சன மதிப்பீட்டை விட ஒருமித்த கருத்து மற்றும் இணக்கத்திற்கு முன்னுரிமை அளிக்கும் ஒரு போக்காகும். உறுப்பினர்கள் கருத்து வேறுபாடுகளை அடக்குகிறார்கள், சுய தணிக்கை செய்கிறார்கள், மற்றும் குழுவின் உணரப்பட்ட பார்வைக்கு இணங்குகிறார்கள். ஒற்றுமையின் ஆசை சிறந்த முடிவின் ஆசையை overrides செய்கிறது.
    one_liner: உண்மைக்கு மேல் இணக்கம் — குழுக்கள் விமர்சன மதிப்பீட்டை விட ஒருமித்த கருத்துக்கு முன்னுரிமை அளிக்கின்றன.
    try_this:
      - ஒரு எதிர்க் கருத்தைக் கொண்டவரை நியமிக்கவும்; கருத்து வேறுபாடு எதிர்பார்க்கப்படுவதாகவும் பாதுகாப்பானதாகவும் ஆக்குங்கள்.
      - கேளுங்கள்: நாம் என்ன சொல்லவில்லை? நாம் இந்தக் குழுவில் இல்லையென்றால் என்ன சொல்வோம்?
      - குழு முடிவுகளை இறுதி செய்வதற்கு முன் வெளி கருத்துக்களைத் தேடுங்கள்.
    ask_yourself:
      - நான் இணக்கத்தைப் பேணுவதற்காக சுய தணிக்கை செய்கிறேனா?
      - நமது ஒருமித்த கருத்து உண்மையானதா அல்லது ஒத்துக்கொள்ளும் அழுத்தத்தின் விளைவா?
    in_more_detail: |
      இர்விங் ஜானீஸ் வெளிநாட்டுக் கொள்கை தோல்விகளை (பன்றி குடா, வியட்நாம்) ஆய்வு செய்தார் மற்றும் வடிவங்களைக் கண்டறிந்தார்: அசைக்க முடியாத தன்மை பற்றிய மாயை, கூட்டு பகுத்தறிவு, இணக்கத்திற்கான அழுத்தம், சுய தணிக்கை, ஒற்றுமை பற்றிய மாயை, மற்றும் குழுவை மாற்றுத் தகவல்களிலிருந்து பாதுகாக்கும் பாதுகாவலர்கள். அதிக ஒத்திசைவு, தனிமை மற்றும் மன அழுத்தம் குழு சிந்தனையை அதிகரிக்கின்றன.

      குழு சிந்தனை மோசமான முடிவுகளுக்கு வழிவகுக்கிறது, ஏனெனில் மாற்று வழிகள் தீவிரமாக பரிசீலிக்கப்படுவதில்லை. கருத்து வேறுபாடு விசுவாசமின்மையாக பார்க்கப்படுகிறது. குழு அதன் சரியான தன்மையை அதிகமாக மதிப்பிடுகிறது மற்றும் ஆபத்துக்களைக் குறைவாக மதிப்பிடுகிறது.
    why_this_is_important: |
      குழு சிந்தனையை அங்கீகரிப்பது சிறந்த முடிவெடுப்பதற்கான நிலைமைகளை உருவாக்க உதவுகிறது: கருத்து வேறுபாட்டை ஊக்குவித்தல், வெளி கருத்துக்களைக் கொண்டு வருதல், மற்றும் முன்கூட்டியே ஒருமித்த கருத்தைத் தவிர்த்தல். இது பேரழிவுகரமான குழு தோல்விகளைத் தவிர்ப்பதற்கு அவசியமானது.
    when_to_use:
      - தலைமைத்துவம்
      - முடிவெடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - மோதல்_தீர்வு
    how_can_you_spot_it:
      pressure_for_consensus: |
        கருத்து வேறுபாடு ஊக்குவிக்கப்படவில்லை அல்லது தண்டிக்கப்படுகிறது; ஒப்புதல் வெகுமதி அளிக்கப்படுகிறது.
      illusion_of_unanimity: |
        மௌனம் ஒப்புதலாக விளக்கப்படுகிறது, அது சுய தணிக்கையாக இருக்கலாம்.
      collective_rationalization: |
        குழு எச்சரிக்கைகளை நிராகரித்து அதன் பார்வையை வலுப்படுத்துகிறது.
      mindguards: |
        உறுப்பினர்கள் ஒருமித்த கருத்தை சவால் செய்யும் தகவல்களிலிருந்து குழுவைப் பாதுகாக்கிறார்கள்.
    examples:
      bay_of_pigs: |
        கென்னடியின் ஆலோசகர்கள் படையெடுப்பு திட்டத்தைப் பற்றிய சந்தேகங்களை அடக்கினர்; இதன் விளைவாக பேரழிவு ஏற்பட்டது.
      corporate_decisions: |
        ஒரு தலைமை குழு, யாரும் எதிர்மறையாக இருக்க விரும்பாததால், எச்சரிக்கை அறிகுறிகள் இருந்தபோதிலும் ஒரு இணைப்பைத் தொடர்கிறது.
      product_launches: |
        ஒரு குழு குறைபாடுள்ள தயாரிப்பை அனுப்புகிறது, ஏனெனில் அனைவரும் திட்டத்தில் முதலீடு செய்துள்ளனர், யாரும் கவலைகளை எழுப்பவில்லை.
      boards: |
        இயக்குநர்கள் குழு உறுப்பினர்கள் இணக்கத்தைப் பேணுவதற்காக நிர்வாக முன்மொழிவுகளை ரப்பர் ஸ்டாம்ப் செய்கிறார்கள்.
    real_world_implications: |
      குழு சிந்தனை கொள்கைத் தோல்விகள், பெருநிறுவனப் பேரழிவுகள் மற்றும் தவறவிட்ட வாய்ப்புகளுக்கு பங்களிக்கிறது. இது குறிப்பாக உயர்-பங்கு, உயர்-மன அழுத்த சூழ்நிலைகளில் ஆபத்தானது. அதைத் தடுப்பதற்கு திட்டமிடப்பட்ட கட்டமைப்பு தலையீடுகள் தேவை.
    professional_application:
      networking_and_relationship_building: |
        கருத்து வேறுபாட்டிற்கு உளவியல் பாதுகாப்பை உருவாக்குங்கள். கவலைகளை எழுப்பும் நபர்களுக்கு நன்றி. இணக்கமாக இல்லாமல் மாறுபட மாதிரி.
      collaborative_learning_initiative: |
        எதிர்க் கருத்துக் கொண்டவர், சிவப்பு அணிகள் மற்றும் "முன்-மரணப் பரிசோதனைகள்" பயன்படுத்தவும். ஆதிக்கம் செலுத்தும் பார்வைக்கு எதிராக ஒருவர் வாதிட வேண்டும் என்று கோரவும். வெளி கருத்துக்களைக் கொண்டு வரவும். தலைவர் நங்கூரமிடுவதைத் தவிர்க்க கடைசியாகப் பேசுவார்.
    how_can_this_be_misapplied:
      false_dissent: |
        "நியமிக்கப்பட்ட கருத்து வேறுபாடு கொண்டவர்கள்" உருவாக்குதல், அவர்கள் உண்மையில் உடன்படவில்லை - குழு அதை உணர்கிறது.
      excessive_conflict: |
        அழிவு தரும் மோதல் மற்றும் முடக்கத்திற்கு வழிவகுக்கும் அளவுக்கு கருத்து வேறுபாட்டை ஊக்குவித்தல்.
      dismissing_consensus: |
        எல்லா ஒருமித்த கருத்தையும் குழு சிந்தனை என்று கருதுதல் - சில நேரங்களில் குழு சரியானது.
      individualism: |
        கூட்டு முடிவு சாத்தியமற்ற நிலைக்கு அதிகமாக திருத்துதல்.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: ஒளிவட்ட விளைவு
    quick_introduction: |
      ஒளிவட்ட விளைவு என்பது ஒரு நேர்மறையான பண்பு அல்லது எண்ணம்
      ஒரு நபரைப் பற்றிய நமது ஒட்டுமொத்த தீர்ப்பை பாதிக்கும் போக்கு ஆகும்.
      ஒருவரின் தோற்றம் நமக்கு பிடித்தால், அவர்கள் திறமையானவர்கள் என்று நாம்
      ஊகிக்கலாம். நாம் ஒரு திறமையை பாராட்டினால், அவர்கள் எல்லாவற்றிலும்
      சிறந்தவர்கள் என்று நாம் ஊகிப்போம். ஒரு நேர்மறையான அம்சம் மற்றவற்றின் மீது
      ஒரு "ஒளிவட்டத்தை" வீசுகிறது.
    one_liner: ஒரு நேர்மறையான பண்பு ஒரு நபரைப் பற்றிய நமது ஒட்டுமொத்த தீர்ப்பின் மீது ஒரு ஒளிவட்டத்தை வீசுகிறது.
    try_this:
      - பண்புகளை தனித்தனியாக மதிப்பிடுங்கள் - ஒரு பலம் மற்றவற்றையும் குறிக்கிறது என்று நினைக்க வேண்டாம்.
      - கவர்ச்சி, கவர்ச்சி அல்லது ஒரு வெற்றி உங்கள் பார்வையை எவ்வாறு வண்ணமயமாக்குகிறது என்பதைக் கவனியுங்கள்.
      - கேளுங்கள்: அந்த ஒரு நேர்மறையான பண்பு இல்லாமல் இந்த நபரை நான் இப்படித்தான் மதிப்பிடுவேனா?
    ask_yourself:
      - நான் ஒரு பண்பிலிருந்து முழு நபருக்கும் பொதுமைப்படுத்துகிறேனா?
      - ஒரு பலத்தால் நான் ஈர்க்கப்படாவிட்டால் நான் பலவீனங்களைக் காண்பேனா?
    in_more_detail: |
      எட்வர்ட் தோர்ண்டைக், ஒரு பண்பில் வீரர்களை உயர்வாக மதிப்பிடும் இராணுவ அதிகாரிகள்,
      தொடர்பில்லாத பண்புகளிலும் கூட அவர்களை உயர்வாக மதிப்பிடுவதாக கவனித்தார்.
      நாம் குறிப்பிட்டவற்றிலிருந்து முழுமைக்கும் பொதுமைப்படுத்துகிறோம். கவர்ச்சி,
      கவர்ச்சி, அல்லது ஒரு துறையில் வெற்றி ஒரு ஒளிவட்டத்தை உருவாக்குகிறது, அது பரவுகிறது.

      இதன் எதிர்மறை - ஒரு எதிர்மறையான பண்பு எல்லாவற்றையும் வண்ணமயமாக்குவது - சில சமயங்களில்
      "கொம்பு விளைவு" என்று அழைக்கப்படுகிறது. இரண்டும் அங்கீகரிக்கப்படாத பொதுமைப்படுத்தலின்
      வடிவங்கள். ஒளிவட்ட விளைவு வேலைவாய்ப்பு, செயல்திறன் மதிப்பீடுகள் மற்றும் அன்றாட
      எண்ணங்களை பாதிக்கிறது.
    why_this_is_important: |
      ஒளிவட்ட விளைவை அங்கீகரிப்பது நீங்கள் மிகவும் துல்லியமான மதிப்பீடுகளைச் செய்யவும்
      மற்றும் அதிகமாகப் பொதுமைப்படுத்துவதைத் தவிர்க்கவும் உதவுகிறது. இது நியாயமான வேலைவாய்ப்பு,
      செயல்திறன் மேலாண்மை மற்றும் உறவு மதிப்பீட்டிற்கு இன்றியமையாதது. ஒரு பலம் அனைத்து
      பலங்களையும் குறிக்காது.
    when_to_use:
      - முடிவெடுத்தல்
      - தலைமைத்துவம்
      - உறவு_கட்டுதல்
      - வேலைக்கு_ஆள்_சேர்த்தல்
    how_can_you_spot_it:
      trait_spillover: |
        ஒரு நேர்மறையான பண்பு தொடர்பில்லாத பண்புகளின் தீர்ப்பை பாதிக்கிறது.
      attractiveness_bias: |
        கவர்ச்சிகரமானவர்கள் திறன், நம்பகத்தன்மை போன்றவற்றில் உயர்வாக மதிப்பிடப்படுகிறார்கள்.
      success_generalization: |
        ஒரு துறையில் வெற்றி மற்ற துறைகளில் assumed competence க்கு வழிவகுக்கிறது.
      first_impression_dominance: |
        ஆரம்ப நேர்மறையான எண்ணம் அனைத்து தொடர்ச்சியான மதிப்பீடுகளையும் வண்ணமயமாக்குகிறது.
    examples:
      hiring: |
        சொற்பொழிவாற்றும் மற்றும் விருப்பமுள்ள ஒரு விண்ணப்பதாரர்
        திறன்கள் தொடர்பில்லாததாக இருந்தாலும், தொழில்நுட்ப ரீதியாக வலுவானவர் என்று ஊகிக்கப்படுகிறார்.
      performance_reviews: |
        ஒரு தனித்துவமான திட்டம் அனைத்து பரிமாணங்களிலும் உயர் மதிப்பீடுகளுக்கு வழிவகுக்கிறது.
      politics: |
        ஒரு அரசியல்வாதியின் கவர்ச்சி கொள்கையில் assumed competence க்கு வழிவகுக்கிறது.
      branding: |
        ஒரு நிறுவனத்தின் ஒரு தயாரிப்பில் வெற்றி அதன் அனைத்து தயாரிப்புகளின் assumed quality க்கு வழிவகுக்கிறது.
    real_world_implications: |
      ஒளிவட்ட விளைவு வேலைவாய்ப்பு, செயல்திறன் மதிப்பீடு மற்றும்
      முதலீட்டு முடிவுகளை சிதைக்கிறது. இது கவர்ச்சிகரமான, சொற்பொழிவாற்றும், மற்றும்
      ஏற்கனவே வெற்றியடைந்தவர்களுக்கு சாதகமாக அமைகிறது. இதைக் குறைப்பதற்கு கட்டமைக்கப்பட்ட மதிப்பீடு
      மற்றும் பரிமாணங்களின் பிரிப்பு தேவை.
    professional_application:
      networking_and_relationship_building: |
        ஒட்டுமொத்த எண்ணத்திற்கு பதிலாக குறிப்பிட்ட பரிமாணங்களில் நபர்களை மதிப்பிடுங்கள்.
        ஒரு நேர்மறையான பண்பு மற்றவர்களைப் பற்றிய உங்கள் தீர்ப்பைப் பாதிக்கும் போது கவனமாக இருங்கள்.
        மறுக்கும் சான்றுகளைத் தேடுங்கள்.
      collaborative_learning_initiative: |
        பரிமாணங்களை தனித்தனியாக மதிப்பிடும் கட்டமைக்கப்பட்ட நேர்காணல்கள் மற்றும் மதிப்பீடுகளைப் பயன்படுத்தவும்.
        மதிப்பீட்டாளர்களிடையே மதிப்பீடுகளை அளவிடவும். ஒட்டுமொத்த "உள்ளுணர்வு உணர்வு" மீதான
        சார்பைக் குறைக்கவும்.
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        அனைத்து நேர்மறையான எண்ணங்களும் ஒளிவட்டம் அல்ல - சில சமயங்களில் மக்கள்
        உண்மையில் பல பரிமாணங்களில் வலுவாக இருப்பார்கள்.
      false_objectivity: |
        ஒளிவட்ட விளைவை முழுமையாக நீக்க முடியும் என்று ஊகித்தல் - இது
        பரவலானது மற்றும் ஓரளவு தானியங்கி.
      overcorrection: |
        எதிர்மறைக்குச் சென்று, கவர்ச்சிகரமான அல்லது
        கவர்ச்சிகரமான நபர்கள் குறைந்த திறமையானவர்கள் என்று கருதுதல்.
      stereotyping: |
        சரியான நேர்மறையான பண்புகளை நிராகரிக்க "ஒளிவட்ட விளைவைப்" பயன்படுத்துதல்.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: ஹான்லோனின் கத்தி
    quick_introduction: |
      ஹான்லோனின் கத்தி கூறுகிறது: "திறமையின்மையால் போதுமான அளவு விளக்கப்படக்கூடிய ஒன்றை தீய நோக்கத்துடன் தொடர்புபடுத்தாதீர்கள்." வேறுவிதமாகக் கூறினால், திறமையின்மை, மேற்பார்வை அல்லது அறியாமை நடத்தையை விளக்கக்கூடும் போது கெட்ட நோக்கத்தை யூகிக்க வேண்டாம்.
    one_liner: திறமையின்மை அல்லது மேற்பார்வை அதை விளக்கக்கூடும் போது தீய நோக்கத்தை யூகிக்க வேண்டாம்.
    try_this:
      - யாராவது உங்களை எரிச்சலூட்டும்போது, ​​கேளுங்கள்: இது தவறு அல்லது அறியாமையால் விளக்கப்பட முடியுமா?
      - தீய நோக்கத்தை யூகிக்க முன் எளிய விளக்கத்திற்கு இயல்புநிலையாக இருக்கவும்.
      - அவர்கள் என்னை காயப்படுத்த நினைத்தார்கள் என்று நீங்கள் நினைக்கும்போது கவனிக்கவும்.
    ask_yourself:
      - திறமையின்மையால் விளக்கப்படக்கூடிய ஒன்றை நான் தீய நோக்கத்துடன் தொடர்புபடுத்துகிறேனா?
      - அவர்களின் நிலையில் நானும் அதே சந்தேக நன்மையை விரும்புவேனா?
    in_more_detail: |
      இந்தக் கொள்கை மக்களுக்கு சந்தேகத்தின் நன்மையை வழங்க ஊக்குவிக்கிறது. யாரோ ஒருவரின் செயல்கள் உங்களை காயப்படுத்தினால் அல்லது எரிச்சலூட்டினால், அவர்கள் உங்களை காயப்படுத்த நினைத்தார்கள் என்பதே இயல்பான அனுமானமாக இருக்கும்.
      ஹான்லோனின் கத்தி பல அத்தகைய செயல்கள் கவனக்குறைவு, தகவல் பற்றாக்குறை அல்லது மோசமான செயலாக்கத்தில் இருந்து எழுகின்றன - தீய எண்ணத்திலிருந்து அல்ல.

      இதன் பொருள் தீய எண்ணம் ஒருபோதும் இருக்காது என்பதல்ல. எளிமையான விளக்கம் பொருந்தும்போது, ​​நாம் மிக மோசமான விளக்கத்திற்கு செல்லக்கூடாது என்பதே இதன் பொருள். இந்தக் கத்தி சந்தேகத்தை குறைக்கிறது, உறவுகளை மேம்படுத்துகிறது, மேலும் சிக்கல்களை மிகவும் ஆக்கப்பூர்வமாக அணுக உதவுகிறது.
    why_this_is_important: |
      ஹான்லோனின் கத்தியைப் பயன்படுத்துவது மோதலைக் குறைக்கிறது, உறவுகளைப் பாதுகாக்கிறது, மேலும் குற்றஞ்சாட்டப்படுவதை விட சிக்கல்களைத் தீர்ப்பதில் ஆற்றலைச் செலுத்துகிறது. எல்லோரும் உங்களுக்கு எதிராக இருக்கிறார்கள் என்று யூகிக்கப்படுவதால் ஏற்படும் மன அழுத்தத்திலிருந்தும் இது உங்களைப் பாதுகாக்கிறது.
    when_to_use:
      - மோதல்_தீர்வு
      - தலைமைத்துவம்
      - உறவு_கட்டுமானம்
      - முடிவு_எடுத்தல்
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        ஒரு எதிர்மறையான விளைவை வேண்டுமென்றே செய்யப்பட்ட தீங்கு என்று நீங்கள் உடனடியாக விளக்குகிறீர்கள்.
      personalizing_mistakes: |
        ஏதாவது தவறாக நடந்தால், அது உங்களுக்கு எதிராக தனிப்பட்ட முறையில் இயக்கப்பட்டதாக நீங்கள் கருதுகிறீர்கள்.
      ignoring_alternative_explanations: |
        திறமையின்மை, தவறான தொடர்பு அல்லது மேற்பார்வை போன்ற சாத்தியக்கூறுகளை நீங்கள் கருத்தில் கொள்வதில்லை.
      escalation_before_inquiry: |
        என்ன நடந்தது என்று கேட்பதற்கு முன் நீங்கள் கோபத்துடனோ அல்லது பதிலடிகளுடனோ பதிலளிக்கிறீர்கள்.
    examples:
      email_tone: |
        ஒரு சுருக்கமான மின்னஞ்சலை மறைமுகமாக ஆக்கிரோஷமானது என்று யூகிக்கிறீர்கள், ஆனால் அனுப்புநர் அவசரமாக இருக்கலாம் அல்லது தொனியில் மோசமாக இருக்கலாம்.
      missed_deadline: |
        ஒரு சக ஊழியரின் தாமதமான விநியோகத்தை அவர் அதிகமாக ஒப்புக்கொண்டிருக்கலாம் அல்லது தடைகளை எதிர்கொண்டிருக்கலாம் என்று யூகிக்காமல், அதை நாசவேலை என்று விளக்குகிறீர்கள்.
      policy_decisions: |
        உங்களுக்குப் பிடிக்காத ஒரு நிறுவனக் கொள்கை ஊழியர்களைத் துன்புறுத்தும் வகையில் வடிவமைக்கப்பட்டுள்ளது என்று யூகிக்கிறீர்கள், ஆனால் அது வேறொரு சிக்கலைத் தீர்ப்பதற்கான ஒரு திறமையற்ற முயற்சியாக இருக்கலாம்.
      traffic: |
        மற்றொரு ஓட்டுநர் உங்களை வேண்டுமென்றே வெட்டினார் என்று யூகிக்கிறீர்கள், ஆனால் அவர்கள் உங்களைக் கவனிக்காமல் இருந்திருக்கலாம்.
    real_world_implications: |
      ஹான்லோனின் கத்தி பணியிட கலாச்சாரத்தை மேம்படுத்துகிறது, வழக்குகளைக் குறைக்கிறது, மேலும் மோதல் தீர்வை மிகவும் பயனுள்ளதாக ஆக்குகிறது. அதிகமாகப் பயன்படுத்துவது அலட்சியத்தை மன்னிக்கக்கூடும்; குறைவாகப் பயன்படுத்துவது தேவையற்ற மோதலை உருவாக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        யாராவது உங்களை ஏமாற்றினால், தீய எண்ணத்தை யூகிக்க முன் தெளிவுபடுத்தலைக் கேளுங்கள். தாராளமான விளக்கங்களுக்கு இயல்புநிலையாக இருப்பதன் மூலம் உறவுகளைப் பாதுகாக்கவும்.
      collaborative_learning_initiative: |
        குழுக்களில், தவறு நிரூபிக்கப்படும் வரை அது தற்செயலானது என்று கருதப்படும் ஒரு கலாச்சாரத்தை உருவாக்குங்கள். குற்றச்சாட்டுகளை விட அமைப்புகள் மற்றும் செயல்முறைகளில் கவனம் செலுத்துங்கள்.
    how_can_this_be_misapplied:
      excusing_negligence: |
        தொடர்ச்சியான திறமையின்மை அல்லது அலட்சியத்தை "தீய எண்ணம் அல்ல" என்று கூறி, அது பொறுப்புக்கூறலைக் கோரும்போதும்dismissing.
      ignoring_genuine_malice: |
        கத்தியை மிகக் கண்டிப்பாகப் பயன்படுத்துவதால், உண்மையான தீய நடிகர்களையோ அல்லது நச்சு நடத்தைகளையோ நீங்கள் தவறவிடுகிறீர்கள்.
      avoiding_difficult_conversations: |
        செயல்திறன் சிக்கல்களை எதிர்கொள்ளாமல் இருக்க ஹான்லோனின் கத்தியை ஒரு சாக்காகப் பயன்படுத்துதல்.
      gaslighting_victims: |
        உண்மையில் பாதிக்கப்பட்ட ஒருவரிடம், தீய எண்ணம் இருந்தபோதும், ​​அவர்கள் "தீய எண்ணத்தை யூகிக்கிறார்கள்" என்று சொல்வது.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: ஹாதோர்ன் விளைவு
    quick_introduction: |
      ஹாதோர்ன் விளைவு என்பது மக்கள் கவனிக்கப்படுகிறார்கள் அல்லது ஆய்வு செய்யப்படுகிறார்கள் என்பதை அறிந்தால் தங்கள் நடத்தையை மாற்றிக் கொள்ளும் போக்கைக் குறிக்கிறது. கவனிப்பின் செயல்பாடு, சோதிக்கப்படும் தலையீட்டை விட மாற்றத்தை ஏற்படுத்தக்கூடும். மக்கள் தங்களுக்குக் கிடைக்கும் கவனத்திற்கு எதிர்வினையாற்றுகிறார்கள்.
    one_liner: கவனிக்கப்படுவது நடத்தையை மாற்றுகிறது - கவனம் மட்டுமே விளைவை ஏற்படுத்தும்.
    try_this:
      - ஒரு தலையீட்டை மதிப்பிடும்போது, கவனிப்பு முடிவுகளை இயக்குகிறதா என்பதைக் கவனியுங்கள்.
      - கவனம் மற்றும் மதிப்புமிக்கதாக உணர்வது செயல்திறனை மேம்படுத்தும் என்பதை அங்கீகரிக்கவும்.
      - கவனிப்பு மாறியபோது ஒரு குறிப்பிட்ட தலையீட்டிற்கு மாற்றத்தைக் குறைக்கும்போது எச்சரிக்கையாக இருங்கள்.
    ask_yourself:
      - இந்த மேம்பாடு தலையீட்டிலிருந்து வந்ததா அல்லது கவனிக்கப்படுவதால் வந்ததா?
      - நாம் கவனம் செலுத்துவதை நிறுத்தினால் முடிவுகள் நிலைத்திருக்குமா?
    in_more_detail: |
      ஹாதோர்ன் வொர்க்ஸ் ஆலையில், ஆராய்ச்சியாளர்கள் விளக்குகளை மாற்றியபோது உற்பத்தித்திறன் மேம்பட்டது கண்டறிந்தனர் - மேலும் அதை மீண்டும் மாற்றியபோதும். குறிப்பிட்ட தலையீட்டை விட, கவனம் மற்றும் கவனிப்பிலிருந்து இந்த முன்னேற்றம் வந்ததாகத் தோன்றியது. பின்னர் மீண்டும் பகுப்பாய்வு செய்யப்பட்டது, விளைவு அதிகமாகக் கூறப்பட்டிருக்கலாம், ஆனால் கருத்து பயனுள்ளதாகவே உள்ளது: ஆய்வு செய்யப்படுவது நடத்தையை மாற்றுகிறது.

      ஹாதோர்ன் விளைவு ஆராய்ச்சி மற்றும் மதிப்பீட்டை சிக்கலாக்குகிறது. இது தலையீடுகளின் வெளிப்படையான தாக்கத்தை மிகைப்படுத்தக்கூடும். இது கவனம் மற்றும் மதிப்புமிக்கதாக உணர்வது செயல்திறனை மேம்படுத்தும் என்பதையும் குறிக்கிறது - நிர்வாகத்திற்கு ஒரு பாடம்.
    why_this_is_important: |
      ஹாதோர்ன் விளைவைப் புரிந்துகொள்வது, ஆராய்ச்சி முடிவுகளை விளக்க, சிறந்த சோதனைகளை வடிவமைக்க, மற்றும் கவனம் மட்டுமே மாற்றத்தை ஏற்படுத்தும் என்பதை அங்கீகரிக்க உதவுகிறது. நிர்வாகத்தில், மக்களைக் கவனிப்பது குறிப்பிட்ட தலையீட்டைப் போலவே முக்கியமானது என்பதைக் குறிக்கிறது.
    when_to_use:
      - தலைமைத்துவம்
      - முடிவெடுத்தல்
      - கற்றல்
      - சிக்கல்_தீர்த்தல்
    how_can_you_spot_it:
      observation_induced_change: |
        மக்கள் கவனிக்கப்படுவதை அல்லது ஆய்வு செய்யப்படுவதை அறிந்தால் நடத்தை மாறுகிறது.
      attention_effect: |
        கவனம் செலுத்தும் செயல்பாடு, குறிப்பிட்ட மாற்றத்தை விட முன்னேற்றத்தை ஏற்படுத்துகிறது.
      placebo_analog: |
        Placebo போல, ஆய்வு செய்யப்படுவதன் "சிகிச்சை" விளைவுகளை ஏற்படுத்தும்.
      short_term_improvement: |
        கவனிப்பு முடிந்ததும் முன்னேற்றங்கள் மறைந்துவிடக்கூடும்.
    examples:
      workplace_studies: |
        ஒரு ஆய்வின் போது உற்பத்தித்திறன் அதிகரிக்கிறது - இது புதிய செயல்முறையா அல்லது யாரோ ஒருவர் பார்த்துக்கொண்டிருக்கும் உண்மையா?
      medical_trials: |
        Placebo குழுக்கள் மேம்படுகின்றன - பகுதி அவர்கள் கவனம் பெறுவதால்தான்.
      education: |
        ஆராய்ச்சியாளர்கள் இருக்கும்போது மாணவர்கள் சிறப்பாகச் செயல்படுகிறார்கள் - "பார்வையாளர் விளைவு".
      management: |
        நிர்வாகம் கவனம் செலுத்தும்போது குழுக்கள் மேம்படுகின்றன - இது புதிய முயற்சியால்தானா அல்லது கவனத்தினால்தானா?
    real_world_implications: |
      ஹாதோர்ன் விளைவு ஆராய்ச்சி செல்லுபடியாகும் மற்றும் திட்ட மதிப்பீட்டை பாதிக்கிறது. இது தலையீட்டு விளைவுகளை அதிகமாக மதிப்பிட வழிவகுக்கும். இது ஒரு நேர்மறையான பாடத்தையும் கொண்டுள்ளது: கவனம் மற்றும் ஆய்வு செய்யப்படுவதாக உணர்வது முன்னேற்றத்தைத் தூண்டும் - எனவே கவனிப்பும் தெரிவுநிலையும் முக்கியம்.
    professional_application:
      networking_and_relationship_building: |
        மக்களைக் கவனிப்பது அவர்களின் செயல்திறனை மேம்படுத்தும் - ஹாதோர்ன் விளைவு கவனிக்கப்படுவதாகவும் மதிப்புமிக்கதாகவும் உணர்வது முக்கியம் என்பதைக் குறிக்கிறது. இதை நேர்மறையாகப் பயன்படுத்துங்கள்: வழக்கமான சரிபார்ப்புகள், தெரிவுநிலை மற்றும் அங்கீகாரம்.
      collaborative_learning_initiative: |
        தலையீடுகளை மதிப்பிடும்போது, கட்டுப்பாட்டுக் குழுக்களைப் பயன்படுத்தவும் மற்றும் முன்னேற்றங்கள் தலையீட்டிலிருந்தா அல்லது அது கொண்டுவரும் கவனத்திலிருந்தா என்பதைப் பரிசீலிக்கவும். ஹாதோர்ன் விளைவு வெளிப்படையான வெற்றியை மிகைப்படுத்தக்கூடும்.
    how_can_this_be_misapplied:
      surveillance_justification: |
        தொடர்ச்சியான கண்காணிப்பை நியாயப்படுத்த "ஹாதோர்ன் விளைவு"யைப் பயன்படுத்துதல் - கவனிப்பு நம்பிக்கையையும் உள்ளார்ந்த உந்துதலையும் குறைக்கும்.
      dismissing_improvements: |
