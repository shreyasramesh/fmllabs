  - id: parkinsons_law
    name: பார்கின்சன் விதி
    quick_introduction: |
      "பணி அதன் நிறைவுக்குக் கிடைக்கும் நேரத்தைப் பொறுத்து விரிவடைகிறது" என்று பார்கின்சன் விதி கூறுகிறது. ஒரு பணிக்கு ஒரு வாரம் ஒதுக்கப்பட்டால், அது ஒரு வாரத்தை எடுத்துக்கொள்ளும்; ஒரு நாளுக்கு ஒதுக்கப்பட்டால், அது பெரும்பாலும் ஒரு நாளிலேயே முடிந்துவிடும். இதேபோல், வரவுசெலவுத் திட்டங்கள், குழு அளவு மற்றும் வளங்களுக்கும் இது பொருந்தும்.
    one_liner: பணி அதன் நிறைவுக்குக் கிடைக்கும் நேரத்தைப் பொறுத்து விரிவடைகிறது.
    try_this:
      - கவனத்தைக் குவிக்கவும், நோக்கத்தின் விரிவாக்கத்தைத் தடுக்கவும் குறுகிய காலக்கெடுவை அமைக்கவும்.
      - கேள்வி கேளுங்கள்: இது நியாயமான முறையில் எவ்வளவு குறைந்த நேரத்தில் முடியக்கூடும்?
      - விகிதாசார மதிப்பு இல்லாமல் கூடுதல் நேரம் அல்லது வளங்கள் எவ்வாறு பயன்படுத்தப்படுகின்றன என்பதைக் கவனிக்கவும்.
    ask_yourself:
      - நான் நேரத்தை நிரப்புகிறேனா, அல்லது பணி உண்மையில் அதைக் கோருகிறதா?
      - குறுகிய காலக்கெடு சிறந்த முன்னுரிமைக்கு கட்டாயப்படுத்துமா?
    in_more_detail: |
      செய்ய வேண்டிய வேலையின் அளவைப் பொருட்படுத்தாமல், அதிகாரத்துவங்கள் வளர்கின்றன என்பதை சி. நார்த்கோட் பார்கின்சன் கவனித்தார். பணிகளும் கிடைக்கும் நேரத்தைப் பொறுத்து விரிவடையும் - நாம் நமது முயற்சியையும் வேகத்தையும் காலக்கெடுவுக்கு ஏற்ப மாற்றியமைக்கிறோம். இறுக்கமான காலக்கெடு கவனம் செலுத்த கட்டாயப்படுத்தலாம்; தளர்வானவை தாமதத்திற்கும் நோக்கத்தின் விரிவாக்கத்திற்கும் வழிவகுக்கும்.

      இந்த விதி திட்ட மேலாண்மை, தனிப்பட்ட உற்பத்தித்திறன் மற்றும் நிறுவன வடிவமைப்பு ஆகியவற்றில் தாக்கங்களைக் கொண்டுள்ளது. முன்னுரிமைக்கு கட்டாயப்படுத்துவதன் மூலம் கட்டுப்பாடுகள் முடிவுகளை மேம்படுத்தும் என்று இது அறிவுறுத்துகிறது.
    why_this_is_important: |
      பார்கின்சன் விதியைப் புரிந்துகொள்வது சிறந்த காலக்கெடுவை அமைக்கவும், திட்டங்களுக்கு அதிகப்படியான வளங்களை ஒதுக்குவதைத் தவிர்க்கவும், "கூடுதல் நேரம்" அல்லது "கூடுதல் நபர்கள்" உதவாது - அவை தீங்கு விளைவிக்கும் - என்பதை அங்கீகரிக்கவும் உதவுகிறது. கட்டுப்பாடுகள் உற்பத்தித்திறன் மிக்கதாக இருக்கும்.
    when_to_use:
      - முடிவெடுத்தல்
      - தலைமைத்துவம்
      - சிக்கல்_தீர்வு
      - தொழில்_நகர்வுகள்
    how_can_you_spot_it:
      deadline_driven_effort: |
        காலக்கெடு நெருங்கும்போது பணி முடுக்கிவிடப்படுகிறது; காலக்கெடு வெகு தொலைவில் இருக்கும்போது குறைவான முன்னேற்றம்.
      scope_expansion: |
        திட்டங்கள் கவனம் சிதறாமல், கிடைக்கும் வளங்களை நிரப்புவதற்கு வளர்கின்றன.
      bureaucratic_growth: |
        வேலைப்பளு அதிகரிக்காவிட்டாலும் கூட, நிறுவனங்கள் நபர்களையும் செயல்முறைகளையும் சேர்க்கின்றன.
      budget_exhaustion: |
        செலவு அவசியமானதா இல்லையா என்பதைப் பொருட்படுத்தாமல், வரவுசெலவுத் திட்டங்கள் முழுமையாகச் செலவிடப்படுகின்றன.
    examples:
      student_deadlines: |
        ஒரு மாதத்தில் சமர்ப்பிக்க வேண்டிய கட்டுரை கடைசி 48 மணி நேரத்தில் எழுதப்படுகிறது.
      project_management: |
        6 மாத காலக்கெடு கொண்ட ஒரு திட்டம் 6 மாதங்களை எடுத்துக்கொள்கிறது; 3 மாத காலக்கெடுவுடன் அதே நோக்கம் கொண்ட திட்டமும் முடிக்கப்படலாம்.
      meetings: |
        30 நிமிடங்கள் போதுமானதாக இருந்தாலும், 1 மணிநேர சந்திப்பு அந்த 1 மணிநேரத்தை நிரப்புகிறது.
      budgets: |
        ஒரு துறை அடுத்த ஆண்டு அதே வரவுசெலவுத் திட்டத்தை நியாயப்படுத்த ஆண்டு இறுதிக்குள் அதன் முழு வரவுசெலவுத் திட்டத்தையும் செலவிடுகிறது.
    real_world_implications: |
      பார்கின்சன் விதி உற்பத்தித்திறன், நிறுவனங்களின் வளர்ச்சி மற்றும் வள ஒதுக்கீடு ஆகியவற்றைப் பாதிக்கிறது. செயற்கையான கட்டுப்பாடுகள் (குறுகிய காலக்கெடு, சிறிய குழுக்கள்) கவனம் மற்றும் செயல்திறனை மேம்படுத்தும் என்று இது அறிவுறுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        நோக்கத்தின் விரிவாக்கத்தைத் தடுக்கவும், வேகத்தைப் பராமரிக்கவும் கூட்டுப்பணிக்கு தெளிவான, குறுகிய காலக்கெடுவை அமைக்கவும்.
      collaborative_learning_initiative: |
        சந்திப்புகள் மற்றும் திட்டங்களுக்கு நேரப் பெட்டிகளைப் பயன்படுத்தவும். அவை தரத்தை தியாகம் செய்யாமல் கவனத்தை மேம்படுத்துமா என்பதைச் சோதிக்க குறுகிய காலக்கெடுவை முயற்சிக்கவும்.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
