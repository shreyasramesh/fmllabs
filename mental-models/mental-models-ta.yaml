      underresourcing: |
        குறைந்த நேரம் அல்லது குறைவான நபர்கள் எப்போதும் வேலை செய்வார்கள் என்று கருதுவது - சில பணிகளுக்கு போதுமான வளங்கள் தேவை.
      blame_shifting: |
