      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: இருப்புக்கான ஆய்வறிக்கை (Availability Heuristic)
    quick_introduction: |
      ஒரு நிகழ்வின் நிகழ்தகவை, அது எவ்வளவு எளிதாக நினைவுக்கு வருகிறது என்பதைப் பொறுத்து மதிப்பிடும் ஒரு போக்குதான் இருப்புக்கான ஆய்வறிக்கை. நாம் உடனடியாக நினைவுகூரக்கூடிய உதாரணங்கள் இருந்தால், அந்த நிகழ்வு பொதுவானது என்று கருதுகிறோம். தெளிவாக, சமீபத்திய அல்லது உணர்ச்சிகரமான உதாரணங்கள் நமது நிகழ்தகவு மதிப்பீடுகளை ஆதிக்கம் செலுத்துகின்றன.
    one_liner: எளிதில் நினைவுக்கு வருவது அதிக நிகழ்தகவுடையதாகத் தோன்றும்—அது உண்மையாக இல்லாவிட்டாலும் கூட.
    try_this:
      - கேளுங்கள்: அடிப்படை விகிதம் என்ன? தெளிவான அல்லது சமீபத்திய உதாரணங்களுக்கு நான் அதிக முக்கியத்துவம் கொடுக்கிறேனா?
      - உங்கள் உள்ளுணர்வு "இது பொதுவானதாகத் தோன்றுகிறது" அல்லது "இது அரிதாகத் தோன்றுகிறது" என்று சொல்லும்போது தரவுகளைத் தேடுங்கள்.
      - ஒரு வியத்தகு கதை உங்கள் இடர் மதிப்பீட்டைத் தீர்மானிக்கும்போது அதைக் கவனியுங்கள்.
    ask_yourself:
      - உண்மையான அதிர்வெண்ணுக்குப் பதிலாக, நினைவுகூரலின் எளிமையால் நிகழ்தகவை நான் மதிப்பிடுகிறேனா?
      - அந்தச் செய்தியை நான் பார்த்த உடனேயே வேறுவிதமாக யோசிப்பேனா?
    in_more_detail: |
      அதிர்வெண் மற்றும் நிகழ்தகவை மதிப்பிடுவதற்கு நாம் மனதின் குறுக்குவழிகளைப் பயன்படுத்துகிறோம். ஒரு குறுக்குவழிதான் இருப்பு: எளிதில் நினைவுக்கு வருவது எது? விமான விபத்துக்கள் தெளிவாகவும், பரவலாகவும் அறிவிக்கப்படுகின்றன—அவற்றின் நிகழ்தகவை நாம் அதிகமாக மதிப்பிடுகிறோம். கார் விபத்துக்கள் பொதுவானவை ஆனால் குறைந்த கவனத்தை ஈர்க்கின்றன—நாம் அவற்றை குறைவாக மதிப்பிடுகிறோம். சமீபத்திய தன்மை, தெளிவு மற்றும் உணர்ச்சி தாக்கம் அனைத்தும் இருப்பை அதிகரிக்கின்றன.

      இருப்பு உண்மையான அதிர்வெண்ணுடன் தொடர்பு கொள்ளும்போது இந்த ஆய்வறிக்கை பயனுள்ளதாக இருக்கும். ஆனால் ஊடகங்கள், தனிப்பட்ட அனுபவம் மற்றும் கவன ஈர்ப்பு ஆகியவை தொடர்பை பெரும்பாலும் சிதைக்கின்றன. நாம் அரிதான ஆனால் தெளிவான இடர்களைப் பயப்படுகிறோம் மற்றும் பொதுவான ஆனால் சாதாரணமானவற்றை புறக்கணிக்கிறோம்.
    why_this_is_important: |
      இருப்புக்கான ஆய்வறிக்கையை அங்கீகரிப்பது நிகழ்தகவு மதிப்பீடுகளைச் சரிசெய்யவும், தெளிவான செய்திகளுக்கு அதிகமாகப் பதிலளிப்பதைத் தவிர்க்கவும், சிறந்த இடர் மதிப்பீடுகளைச் செய்யவும் உதவுகிறது. இது தீர்ப்புகளில் பல முறையான பிழைகளை விளக்குகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - இடர்_மதிப்பீடு
      - முதலீடு
      - சிக்கல்_தீர்த்தல்
    how_can_you_spot_it:
      vividness_dominance: |
        வியத்தகு அல்லது உணர்ச்சிபூர்வமான உதாரணங்கள் மதிப்பீடுகளை விகிதாசாரமாக பாதிக்கின்றன.
      recency_effect: |
        சமீபத்திய நிகழ்வுகள் மீண்டும் நிகழும் வாய்ப்புகள் அதிகம் என்று தோன்றுகிறது.
      personal_experience_overweighting: |
        "எனக்கு ஒருவரைத் தெரியும்..." என்பது நிகழ்தகவு மதிப்பீடுகளை வடிவமைக்கிறது.
      media_distortion: |
        அறிவிக்கப்படுவது பெரும்பாலும் அதிர்வெண்ணுடன் பொருந்தாது.
    examples:
      risk_perception: |
        பயங்கரவாத இடரை அதிகமாக மதிப்பிடுதல் (தெளிவான, அறிவிக்கப்பட்டது) மற்றும் இதய நோய் இடரைக் குறைவாக மதிப்பிடுதல் (பொதுவான, குறைந்த வியத்தகு).
      investing: |
        சமீபத்திய சந்தை நிகழ்வுகள் (வீழ்ச்சி, ஏற்றம்) எதிர்காலத்திற்கான எதிர்பார்ப்புகளை ஆதிக்கம் செலுத்துகின்றன.
      hiring: |
        ஒரு குறிப்பிட்ட பள்ளியில் இருந்து மோசமான வேலைவாய்ப்பு குறித்த ஒரு தெளிவான கதை, அந்தப் பள்ளியில் இருந்து வரும் அனைத்து வேட்பாளர்களின் மதிப்பீட்டையும் பாதிக்கிறது.
      health: |
        நண்பரின் புற்றுநோய் கண்டறிதல், புற்றுநோய் அடிப்படை விகிதங்கள் பரிந்துரைப்பதை விட அதிக நிகழ்தகவுடையதாகத் தோன்றச் செய்கிறது.
    real_world_implications: |
      காப்பீடு வாங்குதல், கொள்கை முன்னுரிமைகள் மற்றும் தனிப்பட்ட முடிவுகளை இருப்புக்கான ஆய்வறிக்கை பாதிக்கிறது. இது ஊடகங்கள் மற்றும் சந்தைப்படுத்துபவர்களால் சுரண்டப்படுகிறது. இதற்காகச் சரிசெய்வதற்கு அடிப்படை விகிதங்களைத் தேடுவதும், "நினைவுக்கு வருவது என்ன" என்று கேள்வி கேட்பதும் தேவை.
    professional_application:
      networking_and_relationship_building: |
        ஒரு நபர் அல்லது குழுவுடன் ஒரு தெளிவான எதிர்மறையான அனுபவம் உங்கள் தீர்ப்பை சிதைக்கக்கூடும் என்பதை அறிந்திருங்கள். அடிப்படை விகிதங்களையும் பல தரவுப் புள்ளிகளையும் தேடுங்கள்.
      collaborative_learning_initiative: |
        இடர்கள் அல்லது வாய்ப்புகளை மதிப்பிடும்போது, "அடிப்படை விகிதம் என்ன?" மற்றும் "நான் தெளிவான உதாரணங்களுக்கு அதிக முக்கியத்துவம் கொடுக்கிறேனா?" என்று வெளிப்படையாகக் கேளுங்கள். இருப்பு-சார்ந்த மதிப்பீடுகளைச் சரிசெய்ய தரவுகளைப் பயன்படுத்துங்கள்.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        சில சமயங்களில் இருப்பு தகவல் தரும்—சமீபத்திய அனுபவம் மாற்றத்தைக் குறிக்கலாம். இருப்பு-சார்ந்த அனைத்து தீர்ப்புகளும் தவறானவை என்று கருத வேண்டாம்.
      analysis_paralysis: |
        சரியான எச்சரிக்கை அறிகுறிகளை தெளிவான அனுபவத்திலிருந்து புறக்கணிக்கும் அளவுக்கு அதிகமாகச் சரிசெய்வது.
      false_objectivity: |
        அடிப்படை விகிதங்கள் எப்போதும் சரியாக இருக்கும் என்று கருதுவது, அவை காலாவதியானவையாக அல்லது பொருந்தாதவையாக இருக்கலாம்.
      manipulation: |
        மற்றவர்களின் தீர்ப்புகளை வழிநடத்த குறிப்பிட்ட உதாரணங்களை வேண்டுமென்றே தெளிவாக உருவாக்குவது.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: பாடர்-மெய்ன்ஹோஃப் நிகழ்வு
    quick_introduction: |
      பாடர்-மெய்ன்ஹோஃப் நிகழ்வு (அதிர்வெண் மாயை என்றும் அழைக்கப்படுகிறது) என்பது நீங்கள்
      புதிதாக ஒன்றைப் பற்றிக் கற்றுக்கொண்ட பிறகு, அதை திடீரென்று எல்லா இடங்களிலும் கவனிப்பது.
      இது ஒரு தற்செயல் நிகழ்வு போல் தோன்றலாம், ஆனால் இது பெரும்பாலும் தேர்ந்தெடுக்கப்பட்ட கவனம் -
      நீங்கள் சமீபத்தில் எதிர்கொண்டதை கவனிக்க உங்கள் மூளை தூண்டப்படுகிறது.
    one_liner: நீங்கள் புதிதாக ஒன்றைக் கற்றுக்கொள்கிறீர்கள், திடீரென்று அதை எல்லா இடங்களிலும் காண்கிறீர்கள் - அது எப்போதும் அங்கேயே இருந்தது.
    try_this:
      - நீங்கள் ஒன்றைக் கற்றுக்கொண்ட பிறகு அது "எல்லா இடங்களிலும்" இருப்பதாக உணர்ந்தால், அதன் அடிப்படையான விகிதத்தைச் சரிபார்க்கவும்.
      - எது உங்களுக்குத் தென்படுகிறதோ அதைவிட அதிகமாக முக்கியமாகத் தோன்றும்போது, சமீபத்திய நிகழ்வுகளை கவனிக்கவும்.
      - கேளுங்கள்: நான் ஒரு உண்மையான போக்கைக் காண்கிறேனா, அல்லது நான் கவனிக்க தூண்டப்பட்டதை மட்டும் காண்கிறேனா?
    ask_yourself:
      - இது இப்போது உண்மையில் அதிகமாக இருக்கிறதா, அல்லது நான் அதை அதிகமாக கவனிக்கிறேனா?
      - நான் அதைப் பற்றி சமீபத்தில் கற்றிருக்காவிட்டால் இந்த முறையை நான் கண்டிருப்பேனா?
    in_more_detail: |
      பாடர்-மெய்ன்ஹோஃப் பயங்கரவாதக் குழுவைப் பற்றி கேள்விப்பட்ட பிறகு, ஒரு நபர் அதைச் செய்திகள்,
      உரையாடல்கள் மற்றும் கட்டுரைகளில் சில நாட்களுக்குள் காணக்கூடும். இந்த நிகழ்வில் இரண்டு கூறுகள் உள்ளன:
      தேர்ந்தெடுக்கப்பட்ட கவனம் (நீங்கள் தேடுவதைக் கவனிக்கிறீர்கள்) மற்றும் உறுதிப்படுத்தல் சார்பு (நீங்கள்
      கண்டறிந்தவற்றை நினைவில் கொள்கிறீர்கள், தவறவிட்டவற்றை மறந்துவிடுகிறீர்கள்).

      இந்த நிகழ்வின் மாயை என்னவென்றால், அந்த விஷயம் திடீரென மிகவும் பொதுவானதாகிவிட்டது.
      உண்மையில், அது எப்போதும் இருந்திருக்கிறது; நீங்கள் அதை கவனிக்கவில்லை. இது சமீபத்தில்
      கற்ற தகவல்களின் பரவலையோ அல்லது முக்கியத்துவத்தையோ அதிகமாக மதிப்பிடுவதற்கு வழிவகுக்கும்.
    why_this_is_important: |
      பாடர்-மெய்ன்ஹோஃப் நிகழ்வை அங்கீகரிப்பது, சமீபத்திய வெளிப்பாட்டின் அடிப்படையில் ஏதோ ஒன்று
      எவ்வளவு பொதுவானது அல்லது முக்கியமானது என்பதை அதிகமாக மதிப்பிடுவதைத் தவிர்க்க உங்களுக்கு உதவுகிறது.
      புதிய யோசனைகள், தயாரிப்புகள் அல்லது போக்குகள் நீங்கள் முதலில் அவற்றைக் கவனித்த பிறகு
      "எல்லா இடங்களிலும்" இருப்பது போல் ஏன் தோன்றலாம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - கற்றல்
      - இடர் மதிப்பீடு
      - சிக்கல் தீர்க்கும்
    how_can_you_spot_it:
      sudden_ubiquity: |
        நீங்கள் ஒரு புதிய சொல், கருத்து அல்லது தயாரிப்பைக் கற்றுக்கொள்கிறீர்கள், சில நாட்களுக்குள்
        அது தொடர்ந்து காணப்படுவதாக உணர்கிறீர்கள்.
      recency_bias: |
        சமீபத்திய தகவல் உண்மையானதை விட யதார்த்தத்தின் பிரதிநிதியாக இருப்பதாகத் தோன்றுகிறது.
      pattern_seeking: |
        உங்கள் மூளை தொடர்பில்லாத காட்சிகளை "இது எல்லா இடங்களிலும் இருக்கிறது" என்ற கதையாக இணைக்கிறது.
      forgetting_the_misses: |
        அந்த விஷயத்தை நீங்கள் எத்தனை முறை பார்க்கவில்லை என்பதை நீங்கள் கண்காணிப்பதில்லை -
        நீங்கள் பார்க்கும் நேரங்களை மட்டுமே.
    examples:
      vocabulary: |
        "serendipity" என்ற வார்த்தையைக் கற்றுக்கொள்வது, பின்னர் அதே வாரத்தில் மூன்று வெவ்வேறு
        கட்டுரைகளில் அதைக் கவனிப்பது.
      car_purchase: |
        ஒரு குறிப்பிட்ட கார் மாடலை வாங்க முடிவு செய்த பிறகு, நீங்கள் அதை எல்லா தெருக்களிலும்
        காண்கிறீர்கள் - அது எப்போதும் அங்கேயே இருந்தாலும்.
      health_anxiety: |
        ஒரு அரிதான அறிகுறி பற்றிப் படித்துவிட்டு, உங்களுக்கே ஒத்த உணர்வுகளைக் கவனித்து,
        தேவையற்ற கவலைக்கு வழிவகுப்பது.
      trends: |
        புதிய ஆப் அல்லது போக்கைக் கண்டுபிடித்து, அது திடீரென்று ஆதிக்கம் செலுத்துவதாக உணர்கிறீர்கள்
        - அது ஒரு சிறிய பயனர் தளத்தைக் கொண்டிருக்கலாம்.
    real_world_implications: |
      இந்த நிகழ்வு நாம் போக்குகள், இடர்கள் மற்றும் வாய்ப்புகளை எப்படிப் பார்க்கிறோம் என்பதை
      பாதிக்கிறது. சந்தைப்படுத்துபவர்களும் ஊடகங்களும் தொடர்ச்சியான வெளிப்பாட்டை உருவாக்குவதன்
      மூலம் அதைச் சுரண்டலாம். முடிவெடுத்தலில், இது சமீபத்திய தகவல்களை அதிகமாக மதிப்பிடுவதற்கு
      வழிவகுக்கும்.
    professional_application:
      networking_and_relationship_building: |
        ஒருவர் ஒரு தலைப்பைப் பற்றிக் கற்றுக்கொண்ட பிறகு அதை மீண்டும் மீண்டும் குறிப்பிடும்போது,
        அவர்கள் அதிர்வெண் மாயையை அனுபவிக்கிறார்கள் என்பதை அங்கீகரிக்கவும் - அந்தத் தலைப்பு
        அவசியமாக மிகவும் பொருத்தமானதல்ல, அவர்களுக்கு மிகவும் குறிப்பிடத்தக்கதாக உள்ளது.
      collaborative_learning_initiative: |
        பயிற்சியில், புதிய ஒன்றைக் கற்றுக்கொண்ட பிறகு "எல்லா இடங்களிலும் அதைக் காண்பது"
        சாதாரணமானது என்பதை வலியுறுத்துங்கள்; பரவலான உணர்வை நம்புவதை விட, அடிப்படையான
        விகிதங்களைச் சரிபார்க்க ஊக்குவிக்கவும்.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        சமீபத்தில் அடிக்கடி கவனித்ததால், ஏதோ ஒன்று அதைவிட அதிகமாக பொதுவானது அல்லது முக்கியமானது
        என்று கருதுவது.
      confirmation_bias_amplification: |
        "எல்லா இடங்களிலும் அதைக் காணும்" உணர்வை ஒரு நம்பிக்கை சரியானது என்பதற்கான ஆதாரமாகப் பயன்படுத்துவது.
      decision_distortion: |
        சமீபத்தில் கற்ற, விகிதாசாரமாக முக்கியமானது என்று தோன்றும் தகவல்களின் அடிப்படையில்
        தேர்வுகளைச் செய்வது.
      vulnerability_to_manipulation: |
        விளம்பரதாரர்களும் பிரச்சாரகர்களும் பரவலான தன்மை மற்றும் முக்கியத்துவத்தின் மாயையை
        உருவாக்க தொடர்ச்சியான வெளிப்பாட்டைப் பயன்படுத்துகிறார்கள்.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: பர்னம் விளைவு
    quick_introduction: |
      பர்னம் விளைவு (அல்லது ஃபோரர் விளைவு) என்பது, தெளிவற்ற, பொதுவான ஆளுமை விளக்கங்களை தனித்துவமாக துல்லியமானதாக ஏற்கும் போக்காகும். ஜாதகம், ஜோதிடர்கள் மற்றும் ஆளுமை சோதனைகள் கிட்டத்தட்ட அனைவருக்கும் பொருந்தக்கூடிய கூற்றுகளைப் பயன்படுத்துகின்றன - ஆனால் நாம் அவற்றை நமக்கே பிரத்யேகமாக நம்புகிறோம். நாம் பொதுவானவற்றில் நம்மைக் காண்கிறோம்.
    one_liner: தெளிவற்ற கூற்றுகள் தனிப்பட்டதாகத் தோன்றுகின்றன, ஏனெனில் அவை கிட்டத்தட்ட அனைவருக்கும் பொருந்தும்.
    try_this:
      - Ask: Could this description apply to many people? Test it on someone else.
        கேள்வி: இந்த விளக்கம் பலருக்கும் பொருந்துமா? இதை வேறொருவரிடமும் சோதித்துப் பாருங்கள்.
      - Seek specific, behavioral feedback instead of vague praise or criticism. தெளிவற்ற பாராட்டுகள் அல்லது விமர்சனங்களுக்குப் பதிலாக, குறிப்பிட்ட, நடத்தை சார்ந்த கருத்துக்களைத் தேடுங்கள்.
      - Notice when "personalized" insights feel too good to be discriminating. "தனிப்பயனாக்கப்பட்ட" நுண்ணறிவுகள் பாகுபடுத்த முடியாத அளவுக்கு நன்றாகத் தோன்றும்போது கவனியுங்கள்.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger? இந்தக் கருத்து அந்நியருக்குக் கூறப்பட்டால் துல்லியமாகத் தோன்றுமா?
      - Am I remembering the hits and forgetting the misses? நான் சரியாகப் பொருந்தியவற்றை நினைவில் வைத்துக்கொண்டு, பொருந்தாதவற்றை மறந்துவிடுகிறேனா?
    in_more_detail: |
      உளவியலாளர் பெர்ட்ரம் ஃபோரர் மாணவர்களுக்கு ஒரே மாதிரியான "தனிப்பயனாக்கப்பட்ட" பின்னூட்டங்களை (எ.கா., "மற்றவர்கள் உங்களை விரும்பவும் புகழவும் நீங்கள் விரும்புகிறீர்கள்") வழங்கினார், மேலும் அவர்கள் அதை மிகவும் துல்லியமானதாக மதிப்பிட்டனர். அந்தக் கூற்றுகள் யாருக்கும் பொருந்தக்கூடிய அளவுக்கு போதுமானதாக இருந்தன. பி.டி. பர்னம் கூறுவதைப் போல "ஒவ்வொரு நிமிடமும் ஒரு ஏமாளி பிறக்கிறான்" - இந்த விளைவு தனிப்பட்டதாகத் தோன்றும் பொதுவான தன்மைகளால் வெகுஜனங்களை ஈர்க்கும் அவரது திறனுக்காக பெயரிடப்பட்டுள்ளது.

      இந்த விளைவு வேலை செய்கிறது, ஏனெனில் நாம் தெளிவற்ற கூற்றுகளில் தனிப்பட்ட பொருத்தத்தைக் கண்டறிவதில் திறமையானவர்கள். நாம் பொருந்தும் தருணங்களை நினைவில் வைத்துக்கொண்டு, பொருந்தாதவற்றை மறந்துவிடுகிறோம். இது "கோல்ட் ரீடிங்" மற்றும் பல "ஆளுமை" தயாரிப்புகளின் அடிப்படையாகும்.
    why_this_is_important: |
      பர்னம் விளைவை அங்கீகரிப்பது, ஆளுமை மதிப்பீடுகளை மதிப்பிடவும், கையாளுதலுக்கு எதிர்ப்புத் தெரிவிக்கவும், தெளிவற்ற பின்னூட்டங்களை அதிகமாகப் புரிந்துகொள்வதைத் தவிர்க்கவும் உதவுகிறது. இது ஜாதகங்கள் ஏன் துல்லியமாகத் தோன்றுகின்றன என்பதையும், சில "தனிப்பயனாக்கப்பட்ட" ஆலோசனைகள் ஏன் பொதுவானவை என்பதையும் விளக்குகிறது.
    when_to_use:
      - decision-making
      - learning
      - risk_assessment
      - relationship_building
    how_can_you_spot_it:
      vague_accuracy: |
        தனிப்பட்டதாகத் தோன்றும் பின்னூட்டம், ஆனால் பலருக்கும் பொருந்தக்கூடியது.
      selective_fit: |
        பொருந்தும் விஷயங்களில் கவனம் செலுத்தி, பொருந்தாதவற்றை புறக்கணிக்கிறோம்.
      cold_reading: |
        யாரோ ஒருவர் உங்களை உண்மையில் பொதுவான கூற்றுகளுடன் "படிக்கிறார்".
      personality_test_enthusiasm: |
        மதிப்பீட்டு முடிவுகளை தனித்துவமான நுண்ணறிவாக விமர்சனமின்றி ஏற்றுக்கொள்வது.
    examples:
      horoscopes: |
        "நீங்கள் சில சமயங்களில் உங்கள் முடிவுகளை சந்தேகிக்கிறீர்கள்" என்பது தனிப்பட்டதாகத் தோன்றினாலும், பெரும்பாலானவர்களுக்குப் பொருந்தும்.
      fortune_telling: |
        நம்முடைய சூழ்நிலைக்குத் தனித்துவமானதாக நாம் பொருள் கொள்ளும் தெளிவற்ற கணிப்புகள்.
      personality_tests: |
        சில மதிப்பீடுகள் பர்னம் கூற்றுகளைப் பயன்படுத்துகின்றன, மேலும் பாகுபாடு காட்டாமல் துல்லியமாகத் தோன்றுகின்றன.
      feedback: |
        நாம் ஆழ்ந்து தனிப்பயனாக்கப்பட்டதாகப் பொருள் கொள்ளும் பொதுவான செயல்திறன் பின்னூட்டம்.
    real_world_implications: |
      பர்னம் விளைவு வானியல், சில பயிற்சி, மற்றும் குறைந்த தர மதிப்பீடுகளில் சுரண்டப்படுகிறது. இது தவறான கருவிகளில் தவறான நம்பிக்கையை உருவாக்க முடியும். இது ஏன் நாம் புகழ்ச்சிக்கும் தெளிவான நேர்மறையான பின்னூட்டத்திற்கும் பாதிக்கப்படக்கூடியவர்களாக இருக்கிறோம் என்பதையும் விளக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        பின்னூட்டத்தைப் பெறும்போது, "இது பலருக்கும் பொருந்துமா?" என்று கேளுங்கள். தெளிவற்ற பாராட்டுகள் அல்லது விமர்சனங்களுக்குப் பதிலாக, குறிப்பிட்ட, நடத்தை சார்ந்த பின்னூட்டங்களைத் தேடுங்கள். மிகவும் நன்றாகத் தோன்றும் "தனிப்பயனாக்கப்பட்ட" நுண்ணறிவுகள் குறித்து சந்தேகமாக இருங்கள்.
      collaborative_learning_initiative: |
        மதிப்பீடுகளைப் பயன்படுத்தும்போது, பாகுபடுத்தும் செல்லுபடியாகும் (discriminant validity) கருவிகளைத் தேர்ந்தெடுக்கவும். பர்னம் கூற்றுகளை நம்பியிருக்கும் கருவிகளைத் தவிர்க்கவும். தெளிவற்ற பின்னூட்டத்தை அங்கீகரிக்க மக்களுக்குப் பயிற்சி அளிக்கவும்.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        அனைத்து தனிப்பயனாக்கப்பட்ட பின்னூட்டங்களும் பர்னம் விளைவு அல்ல - சில உண்மையாகவே குறிப்பிட்டவை. அனைத்தையும் தெளிவற்றது என நிராகரிக்காதீர்கள்.
      invalidating_experience: |
        ஒருவர் தனது நுண்ணறிவின் அனுபவம் "பர்னம் விளைவு" என்று கூறுவது, அது அவர்களுக்கு மதிப்புள்ளதாக இருக்கும்போது.
      overcorrection: |
        சில ஆளுமை கட்டமைப்புகள் பர்னம் கூற்றுகளைப் பயன்படுத்துவதால் அனைத்தையும் நிராகரிப்பது.
      false_skepticism: |
        ஏனெனில் ஏதோ ஒன்று துல்லியமாகத் தோன்றுவதால் அது பர்னம் விளைவாகத்தான் இருக்க வேண்டும் என்று அனுமானிப்பது - சில சமயங்களில் விஷயங்கள் துல்லியமானவை.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: அடிப்படை விகிதப் பிழை (Base Rate Fallacy)
    quick_introduction: |
      அடிப்படை விகிதப் பிழை என்பது குறிப்பிட்ட, தெளிவான தகவல்களுக்குச் சாதகமாக,
      பொதுவான புள்ளிவிவரத் தகவல்களை (அடிப்படை விகிதங்கள்) புறக்கணிக்கும் போக்கு ஆகும்.
      நாம் குறிப்பிட்ட வழக்கை அதிகப்படுத்துகிறோம் மற்றும் முந்தைய நிகழ்தகவைக் குறைக்கிறோம்.
      ஒரு கவர்ச்சிகரமான கதை எண்களை மீறிச் செல்லலாம்.
    one_liner: ஒரு கவர்ச்சிகரமான கதை எண்களை மீறிச் செல்லலாம்.
    try_this:
      - ஒரு வழக்கைப் பற்றி தீர்ப்பளிக்கும் முன், கேளுங்கள்: இந்த வகைச் சூழ்நிலைக்கு அடிப்படை விகிதம் என்ன?
      - குறிப்பிட்ட ஆதாரத்தை முந்தைய நிகழ்தகவுடன் இணைக்கவும் - இரண்டையும் புறக்கணிக்க வேண்டாம்.
      - ஒரு தெளிவான உதாரணம் புள்ளிவிவரங்களை மூழ்கடிப்பதை எப்போது கவனிக்கவும்.
    ask_yourself:
      - நான் இந்த குறிப்பிட்ட வழக்கை அதிகப்படுத்தி, அடிப்படை விகிதத்தைக் குறைக்கிறேனா?
      - கவர்ச்சிகரமான கதையை ஒதுக்கி வைத்தால் எண்கள் என்ன சொல்லும்?
    in_more_detail: |
      ஒரு நோய் மக்களில் 1% பேரை பாதித்து, ஒரு சோதனை 95% துல்லியமாக இருந்தால்,
      ஒரு நேர்மறை முடிவு என்பது பொதுவாக அந்த நபருக்கு இன்னும் நோய் இல்லை என்பதைக் குறிக்கும் -
      ஏனென்றால் அடிப்படை விகிதம் மிகக் குறைவு. ஆனால் நாம் அடிப்படை விகிதங்களைப் புறக்கணித்து,
      "அவர்கள் நேர்மறையாகச் சோதனை செய்தார்கள்" என்பதில் கவனம் செலுத்துகிறோம்.
      புள்ளிவிவரங்களை விட குறிப்பிட்டவை நம்மை ஈர்க்கின்றன.

      இந்தத் தவறு மருத்துவ நோயறிதல், பணியமர்த்தல், இடர் மதிப்பீடு மற்றும் சட்டத் தீர்ப்புகளில்
      பாதிப்பை ஏற்படுத்துகிறது. பேய்சியன் பகுத்தறிவைப் பயன்படுத்தி அடிப்படை விகிதங்களை
      வழக்கு-குறிப்பிட்ட ஆதாரங்களுடன் இணைக்க வேண்டும் - ஆனால் நாம் பெரும்பாலும் செய்வதில்லை.
    why_this_is_important: |
      அடிப்படை விகிதப் பிழையைச் சரிசெய்வது நோயறிதல், இடர் மதிப்பீடு மற்றும் முடிவெடுக்கும்
      தரத்தை மேம்படுத்துகிறது. இது தெளிவான நிகழ்வுகளுக்கு அதிகப்படியாக எதிர்வினையாற்றுவதையும்,
      புள்ளிவிவர யதார்த்தத்திற்கு குறைவாக எதிர்வினையாற்றுவதையும் தடுக்கிறது.
    when_to_use:
      - முடிவெடுத்தல் (decision_making)
      - இடர் மதிப்பீடு (risk_assessment)
      - சிக்கல் தீர்த்தல் (problem_solving)
      - முதலீடு செய்தல் (investing)
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        தீர்ப்புகளில் முந்தைய நிகழ்தகவுகள் சேர்க்கப்படுவதில்லை.
      vividness_over_statistics: |
        ஒரு தனிப்பட்ட வழக்கு அல்லது கதை திரட்டப்பட்ட தரவுகளை விட மேலோங்குகிறது.
      diagnostic_overweighting: |
        அடிப்படை விகிதத்தைக் கருத்தில் கொள்ளாமல் புதிய ஆதாரத்தை (எ.கா., சோதனை முடிவு)
        அதிகப்படுத்துதல்.
      anecdote_override: |
        "எனக்கு ஒரு நண்பர் இருக்கிறார்..." என்பது புள்ளிவிவர ஆதாரங்களை மீறுகிறது.
    examples:
      medical: |
        ஒரு அரிதான நோய்க்கான நேர்மறை சோதனை - அடிப்படை விகிதம் குறைவு, எனவே நேர்மறை
        பெரும்பாலும் தவறான நேர்மறை. நாம் இதை புறக்கணித்து, அவர்களுக்கு நோய் இருப்பதாகக் கருதுகிறோம்.
      hiring: |
        ஒரு வேட்பாளர் சிறந்த நேர்காணலைக் கொண்டிருக்கிறார் - நேர்காணல்கள் செயல்திறனை எவ்வளவு
        நன்றாகக் கணிக்கின்றன என்பதற்கான அடிப்படை விகிதங்களை நாம் புறக்கணிக்கிறோம்.
      risk: |
        ஒரு விமான விபத்து தெளிவாகத் தெரிகிறது - நாம் பறக்கும் அபாயத்தை அதிகமாக மதிப்பிட்டு,
        வாகன ஓட்டுதல் அபாயத்தைக் குறைக்கிறோம், அடிப்படை விகிதங்களைப் புறக்கணிக்கிறோம்.
      startup_investing: |
        ஒரு நிறுவனர் நன்றாக விளக்கக்காட்சி அளிப்பார் - பெரும்பாலான தொடக்க நிறுவனங்கள்
        விளக்கக்காட்சி தரத்தைப் பொருட்படுத்தாமல் தோல்வியடைகின்றன என்பதை நாம் புறக்கணிக்கிறோம்.
    real_world_implications: |
      அடிப்படை விகிதப் பிழை மருத்துவ முடிவுகள், சட்டத் தீர்ப்புகள் மற்றும் வணிக உத்திகளில்
      பாதிப்பை ஏற்படுத்துகிறது. இது வளங்களை தவறாக ஒதுக்கீடு செய்வதற்கும், மோசமான இடர் மதிப்பீட்டிற்கும்
      வழிவகுக்கிறது. பேய்சியன் சிந்தனை அதைச் சரிசெய்கிறது.
    professional_application:
      networking_and_relationship_building: |
        நபர்களை மதிப்பிடும்போது, அடிப்படை விகிதங்களைக் கருத்தில் கொள்ளுங்கள்: எ.கா., இந்த வகை
        நடத்தை எவ்வளவு அடிக்கடி நிகழ்கிறது? ஒரு தெளிவான தொடர்பு பரந்த வடிவத்தை மீற அனுமதிக்காதீர்கள்.
      collaborative_learning_initiative: |
        முடிவெடுக்கும்போது, வழக்கு-குறிப்பிட்ட ஆதாரங்களைச் சேர்ப்பதற்கு முன், அடிப்படை விகிதங்களை
        வெளிப்படையாகக் கூறி கருத்தில் கொள்ளவும். பேய்சியன் பகுத்தறிவில் குழுக்களுக்குப் பயிற்சி அளிக்கவும்.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        அடிப்படை விகிதங்கள் வேறுவிதமாகச் சுட்டிக்காட்டினாலும், வலுவான வழக்கு-குறிப்பிட்ட
        ஆதாரங்களைப் புறக்கணித்தல் - சில சமயங்களில் தனிப்பட்ட வழக்கு விதிவிலக்காக இருக்கலாம்.
      stereotyping: |
        தனிநபர்களைப் பற்றி நியாயமற்ற தீர்ப்புகளைச் செய்ய அடிப்படை விகிதங்களைப் பயன்படுத்துதல்.
      false_precision: |
        அடிப்படை விகிதங்கள் தோராயமான மதிப்பீடுகளாக இருக்கும்போது, தவறான துல்லியத்துடன்
        அவற்றைப் பயன்படுத்துதல்.
      dismissing_individuals: |
        "புள்ளிவிவரங்கள் X என்று கூறுகின்றன" - உங்களுக்கு முன்னால் உள்ள தனிநபர் விநியோகத்திற்கு
        பொருந்தாமல் போகலாம்.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: பேயஸ் தேற்றம்
    quick_introduction: |
      பேயஸ் தேற்றம், புதிய ஆதாரம் கிடைக்கும்போது ஒரு கருதுகோளின் நிகழ்தகவை எவ்வாறு புதுப்பிப்பது என்பதை விவரிக்கிறது. இது நம்பிக்கைகள் ஆதரிக்கும் அளவுக்கு விகிதாசாரமாக மாற வேண்டும் என்ற கருத்தை முறைப்படுத்துகிறது—அனைத்தும் அல்லது எதுவும் இல்லை, ஆனால் படிப்படியாக.
    one_liner: ஆதாரங்கள் ஆதரிக்கும் அளவுக்கு விகிதாசாரமாக நம்பிக்கைகளைப் புதுப்பிக்கவும்.
    try_this:
      - உங்கள் முந்தைய நம்பிக்கையுடன் தொடங்குங்கள்; நீங்கள் தவறாக இருந்தால் ஆதாரம் எவ்வளவு சாத்தியமானது என்று கேளுங்கள்.
      - படிப்படியாக புதுப்பிக்கவும்—ஒரு தரவுப் புள்ளியில் 0% இலிருந்து 100% ஆக மாற வேண்டாம்.
      - மாற்று கருதுகோள்களைக் கவனியுங்கள்: ஆதாரம் அவற்றுக்கும் பொருந்துமா?
    ask_yourself:
      - இந்த ஆதாரம் உண்மையில் நிகழ்தகவை எவ்வளவு மாற்றுகிறது?
      - நான் எனது நம்பிக்கைகளை புதுப்பிக்கிறேனா, அல்லது நான் ஏற்கனவே நினைத்ததை உறுதிப்படுத்துகிறேனா?
    in_more_detail: |
      தேற்றம் என்னவென்றால், ஆதாரத்தின் அடிப்படையில் ஒரு கருதுகோளின் நிகழ்தகவு, கருதுகோளின் அடிப்படையில் ஆதாரத்தின் நிகழ்தகவு, ஆதாரத்தின் நிகழ்தகவால் வகுக்கப்படும். நடைமுறையில்: உங்கள் முந்தைய நம்பிக்கையுடன் தொடங்குங்கள், புதிய ஆதாரம் உங்கள் கருதுகோளுக்கு எதிராக மாற்று வழிகளுடன் எவ்வளவு ஒத்துப்போகிறது என்பதைப் பாருங்கள், அதற்கேற்ப புதுப்பிக்கவும்.

      நீங்கள் தவறாக இருந்தால் ஆதாரம் எவ்வளவு சாத்தியமானதாக இருக்கும் என்பதைக் கருத்தில் கொள்ளுமாறு பேய்சியன் சிந்தனை உறுதிப்படுத்தல் சார்பை எதிர்க்கிறது. இது நிகழ்தகவு பகுத்தறிவு மற்றும் அறிவியல் புதுப்பித்தலின் அடித்தளமாகும்.
    why_this_is_important: |
      பேய்சியன் சிந்தனை நிச்சயமற்ற தன்மையின் கீழ் முடிவெடுப்பதை மேம்படுத்துகிறது, அதிகப்படியான நம்பிக்கையைத் தவிர்க்க உதவுகிறது, மேலும் ஆதாரங்களில் இருந்து கற்றுக்கொள்வதற்கான ஒரு கட்டமைப்பை வழங்குகிறது. இது நோயறிதல், முன்னறிவிப்பு மற்றும் நிச்சயமற்ற தன்மையைக் கொண்ட எந்தவொரு களத்திற்கும் அவசியம்.
    when_to_use:
      - முடிவெடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - இடர்_மதிப்பீடு
      - கற்றல்
    how_can_you_spot_it:
      prior_and_update: |
        ஒரு அடிப்படை நம்பிக்கையுடன் தொடங்கி, புதிய ஆதாரங்களின் அடிப்படையில் அதைச் சரிசெய்தல்.
      likelihood_ratio_thinking: |
        "நான் சரியாக இருந்தால் ஆதாரத்தின் நிகழ்தகவு என்ன vs. தவறாக இருந்தால்?" என்று கேட்பது.
      incremental_updating: |
        நம்பிக்கைகள் திடீரென மாறுவதற்குப் பதிலாக ஆதாரங்களுடன் படிப்படியாக மாறுகின்றன.
      base_rate_respect: |
        முந்தைய நிகழ்தகவுகள் (அடிப்படை விகிதங்கள்) முக்கியமானவை, சமீபத்திய தரவுப் புள்ளி மட்டுமல்ல.
    examples:
      medical_diagnosis: |
        அரிதான நோய்க்கான நேர்மறை சோதனை—முந்தைய (குறைந்த பரவல்) ஒரு நேர்மறை முடிவு பெரும்பாலும் தவறான நேர்மறையாகும். பேயஸ் நிகழ்தகவைப் புதுப்பிக்கிறது.
      forecasting: |
        ஆரம்பகால மதிப்பீடுகளுடன் ஒட்டிக்கொள்வதற்குப் பதிலாக புதிய தரவு வரும்போது கணிப்புகளைப் புதுப்பித்தல்.
      hiring: |
        பணிப் பொருத்தத்திற்கான அடிப்படை விகிதங்களுடன் தொடங்கி, நேர்காணல் செயல்திறனின் அடிப்படையில் புதுப்பித்தல்.
      investing: |
        ஒரு நிறுவனம் வெற்றி பெறும் நிகழ்தகவைப் புதுப்பித்தல், ஏனெனில் புதிய தகவல் (வருவாய், செய்தி) வருகிறது.
    real_world_implications: |
      பேய்சியன் சிந்தனை நவீன AI, மருத்துவ நோயறிதல் மற்றும் அறிவியல் அனுமானம் ஆகியவற்றின் அடிப்படையாக உள்ளது. இது அடிப்படை விகித புறக்கணிப்பு மற்றும் உறுதிப்படுத்தல் சார்பை சரிசெய்கிறது. நிச்சயமற்ற தன்மையைக் கொண்ட எந்தவொரு களத்திற்கும் இது ஒரு சக்திவாய்ந்த கருவியாகும்.
    professional_application:
      networking_and_relationship_building: |
        நிலையான முதல் எண்ணங்களைப் பிடித்து வைப்பதற்குப் பதிலாக, புதிய ஆதாரங்களின் அடிப்படையில் மக்களைப் பற்றிய உங்கள் நம்பிக்கைகளைப் புதுப்பிக்கவும். செயல்களை விளக்கும்போது அடிப்படை விகிதங்களைக் (எ.கா., இந்த நடத்தை எவ்வளவு பொதுவானது?) கருத்தில் கொள்ளுங்கள்.
      collaborative_learning_initiative: |
        கலந்துரையாடல்களுக்கு முன்பு வெளிப்படையாக முந்தைய நம்பிக்கைகளைத் தெரிவிக்க குழுக்களை ஊக்குவிக்கவும், பின்னர் ஆதாரம் வழங்கப்படும்போது புதுப்பிக்கவும். நங்கூரமிடுதல் மற்றும் உறுதிப்படுத்தல் சார்பைக் குறைக்கிறது.
    how_can_this_be_misapplied:
      overprecision: |
        நிச்சயமற்ற தன்மை அதிகமாக இருக்கும்போது துல்லியமான நிகழ்தகவுகளை ஒதுக்குதல்.
      prior_rigidity: |
        வலுவான முந்தைய நம்பிக்கைகளுடன் ஒட்டிக்கொண்டு புதிய ஆதாரங்களுடன் போதுமான அளவு புதுப்பிக்காமல் இருத்தல்.
      base_rate_tyranny: |
        அடிப்படை விகிதங்கள் வேறுவிதமாகக் கூறினாலும் வலுவான ஆதாரங்களைப் புறக்கணித்தல்—சில சமயங்களில் ஆதாரம் ஆதிக்கம் செலுத்த வேண்டும்.
      false_sophistication: |
        உண்மையான பகுத்தறிவைச் செய்யாமல் கடுமையாகத் தோன்ற பேய்சியன் மொழியைப் பயன்படுத்துதல்.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: பென் ஜான்சன் விளைவு
    quick_introduction: |
      பென் ஜான்சன் விளைவு என்பது, ஒருவர் நமக்கு உதவிய பிறகு, நாம் அவரை அதிகமாக விரும்புவோம் என்ற உளவியல் நிகழ்வு ஆகும். நாம் விரும்புபவர்களுக்காகவே உதவிகளைச் செய்கிறோம் என்ற உள்ளுணர்வுக்கு மாறாக, நாம் யாருக்காக உதவிகளைச் செய்தோமோ அவர்களை நாம் அதிகமாக விரும்பிவிடுவோம்.
    one_liner: நாம் யாருக்காக உதவிகளைச் செய்தோமோ அவர்களை நாம் விரும்பிவிடுகிறோம் - நம் மனப்பான்மைகள் நம் செயல்களைப் பின்பற்றுகின்றன.
    try_this:
      - ஒரு உறவை மேம்படுத்த விரும்பினால், ஒரு சிறிய உதவி கேட்கவும்.
      - ஒருவருக்கு உதவி செய்வது அவர் மீது உங்கள் உணர்வுகளை எவ்வாறு மாற்றுகிறது என்பதைக் கவனியுங்கள்.
      - மற்றவர்கள் உங்களுக்கு உதவிய பிறகு உங்களை அதிகமாக விரும்பக்கூடும் என்பதை அறிந்து கொள்ளுங்கள்.
    ask_yourself:
      - ஒருவருக்கு உதவி செய்தது அவரைப் பற்றிய என் உணர்வை மாற்றியிருக்கிறதா?
      - அவர்களைப் பற்றிய என் மரியாதையை அதிகரிப்பதன் மூலம் என் முயற்சியை நான் பகுத்தறிந்து கொள்கிறேனா?
    in_more_detail: |
      பெஞ்சமின் ஜான்சன் தனது நூலகத்திலிருந்து ஒரு அரிய புத்தகத்தை இரவல் கேட்கும்படி ஒரு போட்டியாளரிடம் கேட்டு, அவரை வென்றதை விவரித்தார். அந்த நபர் ஒப்புக்கொண்ட பிறகு, ஜான்சன் அதை ஒரு நன்றி குறிப்புடன் திருப்பி அளித்தார். உறவு கணிசமாக மேம்பட்டது. இந்த விளைவு நமது மனப்பான்மைகள் நமது செயல்களைப் பின்பற்றுகின்றன என்று கூறுகிறது: நாம் ஒருவருக்கு உதவ முயற்சிக்கும்போது, ​​அவரைப் பற்றிய நமது நேர்மறையான பார்வையை அதிகரிப்பதன் மூலம் அந்த முயற்சியை நாம் பகுத்தறிந்து கொள்கிறோம்.

      அறிவாற்றல் முரண்பாட்டுக் கோட்பாடு இதை விளக்குகிறது: நாம் விரும்பாத அல்லது நடுநிலையான ஒருவருக்கு உதவினால், நமது செயல் (உதவி) மற்றும் நமது மனப்பான்மை (விருப்புமின்மை) இடையே ஒரு பதற்றத்தை அனுபவிக்கிறோம். அந்த பதற்றத்தை அவர்களை அதிகமாக விரும்புவதன் மூலம் தீர்ப்பது, நமது விருப்பங்களுக்கு எதிராக நாம் செயல்பட்டதை ஒப்புக்கொள்வதை விட எளிதாக இருக்கும்.
    why_this_is_important: |
      பென் ஜான்சன் விளைவைப் புரிந்துகொள்வது, உறவுகளை உத்திபூர்வமாக உருவாக்கவும், கடந்தகால உதவிகளால் உங்கள் சொந்த உணர்வுகள் எவ்வாறு பாதிக்கப்படக்கூடும் என்பதை அங்கீகரிக்கவும் உதவுகிறது. உறவை மேம்படுத்த முயற்சிக்கும்போது, ​​உதவிகளை வழங்குவதை விட சிறிய உதவிகளைக் கேட்பது ஏன் மிகவும் பயனுள்ளதாக இருக்கும் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - உறவு_கட்டுதல்
      - பேச்சுவார்த்தை
      - தலைமைத்துவம்
      - முரண்பாடு_தீர்வு
    how_can_you_spot_it:
      liking_after_helping: |
        முன்பு நீங்கள் நடுநிலையாக அல்லது எதிர்மறையாக உணர்ந்திருந்தாலும், ஒருவருக்கு நீங்கள் உதவி செய்த பிறகு அவரைப் பற்றி உங்களுக்கு வெப்பமாக உணர்கிறீர்களா என்பதைக் கவனியுங்கள்.
      others_requesting_small_favors: |
        ஒருவர் மீண்டும் மீண்டும் சிறிய உதவிகளைக் கேட்கும்போது, ​​அவர் இந்த விளைவைப் பயன்படுத்தி உறவை வளர்க்க முயலலாம்.
      attitude_shift_post_investment: |
        ஒருவருக்கு உதவ நேரம் அல்லது முயற்சி எடுத்த பிறகு, அவரைப் பற்றிய உங்கள் கருத்து நேர்மறையாக மாறியுள்ளதா என்பதைக் கவனியுங்கள்.
      reciprocal_relationship_dynamics: |
        ஒரு நபர் பல உதவிகளைச் செய்த உறவுகள், செயலில் சமமாகத் தோன்றினாலும், பாசத்தில் சமநிலையற்றதாக உணரலாம்.
    examples:
      networking: |
        ஒரு சக ஊழியரிடம் ஒரு வரைவு குறித்த கருத்தைக் கேட்கிறீர்கள், இது அவர் உங்கள் வெற்றிக்கு அதிக முதலீடு செய்திருப்பதாகவும், உங்களை நேர்மறையாகக் கருதுவதாகவும் உணர வைக்கிறது.
      sales: |
        ஒரு விற்பனையாளர் ஒரு வாடிக்கையாளரிடம் ஒரு சிறிய உதவி கேட்கிறார் (எ.கா., பரிந்துரை அல்லது அறிமுகம்), இது வாடிக்கையாளரின் ஈடுபாடு மற்றும் விருப்பத்தை அதிகரிக்கிறது.
      conflict_resolution: |
        ஒரு கருத்து வேறுபாடு ஏற்பட்ட பிறகு, மற்ற தரப்பினரிடம் தொடர்பில்லாத ஒன்றில் உதவி கேட்பது பதட்டத்தை மென்மையாக்கி நல்லெண்ணத்தை மீண்டும் கட்டியெழுப்ப உதவும்.
      mentoring: |
        ஒரு மூத்த நபர் ஒரு இளைய நபரிடம் உள்ளீடு அல்லது உதவி கேட்கும்போது, ​​அந்த இளைய நபர் அதிக மதிப்பையும் இணைப்பையும் உணர்கிறார்.
    real_world_implications: |
      பென் ஜான்சன் விளைவு வேலைவாய்ப்பு, விற்பனை, இராஜதந்திரம் மற்றும் அன்றாட சமூக இயக்கவியலில் தாக்கத்தை ஏற்படுத்துகிறது. பாலங்களை உருவாக்க இது நேர்மையாகப் பயன்படுத்தப்படலாம் அல்லது பாசத்தை கையாள இது நேர்மையற்ற முறையில் பயன்படுத்தப்படலாம். இதை அங்கீகரிப்பது, சில உறவுகள் ஏன் சமமற்ற உதவி-கொடுத்தலுக்குப் பிறகு வலுவாக உணர்கின்றன என்பதைப் புரிந்துகொள்ள உதவுகிறது.
    professional_application:
      networking_and_relationship_building: |
        உறவுகளை உருவாக்கும் போது, ​​உதவிகளை வழங்குவதை விட, சிறிய, நியாயமான உதவிகளைக் கேட்பதைக் கருத்தில் கொள்ளுங்கள். உதவி செய்யும் செயல் முதலீடு மற்றும் நேர்மறை மரியாதையை உருவாக்குகிறது.
      collaborative_learning_initiative: |
        குழுக்களில், உறுப்பினர்கள் ஒருவருக்கொருவர் உதவுவது (எ.கா., சக மதிப்பாய்வு, குறுக்குப் பயிற்சி) ஒற்றுமையை வலுப்படுத்தும். அனைவரும் உதவி அளித்து பெறுவதை உறுதிசெய்ய ஒத்துழைப்பை கட்டமைக்கவும்.
    how_can_this_be_misapplied:
      manipulation: |
        உண்மையான தேவை இல்லாமல், உங்களை விரும்புவதற்காக மட்டுமே ஒருவரிடம் உதவிகளைக் கேட்பது, கண்டறியப்பட்டால், சுரண்டலாக உணரலாம்.
      overreliance_on_favors: |
        உதவிகள் மட்டுமே ஒரு உடைந்த உறவை சரிசெய்யும் என்று கருதுவது; சில முரண்பாடுகளுக்கு நேரடி உரையாடல் மற்றும் பொறுப்புக்கூறல் தேவை.
      asymmetric_exploitation: |
        பதிலுக்கு எந்த உதவியும் செய்யாமல் மீண்டும் மீண்டும் உதவிகளைக் கேட்பது பின்வாங்கலாம் மற்றும் மனக்கசப்பை வளர்க்கலாம்.
      misattributing_motives: |
        ஒருவரின் சூடான தன்மையை அது உங்களுக்கு செய்த உதவிகளின் பகுதியாக இருக்கலாம் என்று கருதுவது.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: வரையறுக்கப்பட்ட பகுத்தறிவு
    quick_introduction: |
      வரையறுக்கப்பட்ட பகுத்தறிவு என்பது, கிடைக்கக்கூடிய தகவல், அறிவாற்றல் திறன் மற்றும் நேரம் ஆகியவற்றால் மனிதர்களின் முடிவெடுக்கும் திறன் வரையறுக்கப்பட்டுள்ளது என்ற கருத்தாகும். நாம் உகந்ததாகச் செய்வதில்லை; மாறாக "திருப்தி அடைகிறோம்" – அதாவது, சிறந்த சாத்தியமான விருப்பங்களை விட போதுமானதாக இருக்கும் விருப்பங்களைத் தேர்ந்தெடுக்கிறோம்.
    one_liner: நாம் திருப்தி அடைகிறோம்—போதுமானதாக இருக்கும் ஒன்றைத் தேர்ந்தெடுக்கிறோம், உகந்ததை அல்ல.
    try_this:
      - சாத்தியமான இடங்களில் தேர்வுகளை எளிமைப்படுத்துங்கள்; பல விருப்பங்கள் வரையறுக்கப்பட்ட பகுத்தறிவை அதிகமாகக் குழப்புகின்றன.
      - முடிவில்லாத தேடலைத் தவிர்க்க, முன்பே "போதுமானது" என்ற அளவுகோல்களை அமைக்கவும்.
      - குறைந்துவரும் வருமானத்தின் புள்ளிக்கு அப்பால் மேம்படுத்துவதை நீங்கள் எப்போது கவனிக்கிறீர்கள் என்பதை அறியவும்.
    ask_yourself:
      - போதுமானதாக இருக்கும் போது, ​​சிறந்த விருப்பத்தைக் கண்டுபிடிக்க முயற்சிக்கிறேனா?
      - என் முடிவை வரையறுக்கும் தடைகள் (நேரம், தகவல், கவனம்) யாவை?
    in_more_detail: |
      Herbert Simon, முழுமையான தகவல்களுடன் பகுத்தறிவுள்ள நடிகர்கள் என்ற பாரம்பரிய பொருளாதார அனுமானத்தை சவால் செய்ய இந்தக் கருத்தை அறிமுகப்படுத்தினார். உண்மையில், நமக்கு வரையறுக்கப்பட்ட கவனம், வேலை செய்யும் நினைவகம் மற்றும் நேரம் மட்டுமே உள்ளன. நமது வரம்புகளுக்கு "பகுத்தறிவுள்ள" முடிவுகளை எடுக்க நாம் ஹெயூரிஸ்டிக்ஸ் மற்றும் குறுக்குவழிகளைப் பயன்படுத்துகிறோம், அவை ஒரு சிறந்த அர்த்தத்தில் உகந்ததாக இல்லாவிட்டாலும் கூட.

      வரையறுக்கப்பட்ட பகுத்தறிவு, நாம் ஏன் எப்போதும் சிறந்த விருப்பத்தைத் தேர்ந்தெடுப்பதில்லை, ஏன் நாம் பொதுவான விதிகளையே நம்புகிறோம், ஏன் சூழல் மற்றும் பின்னல் மிகவும் முக்கியம் என்பதை விளக்குகிறது. இது நாம் உண்மையில் எவ்வாறு முடிவெடுக்கிறோம் என்பதை விவரிக்கும் ஒரு மாதிரி, நாம் எப்படி செய்ய வேண்டும் என்பதற்கான பரிந்துரை அல்ல.
    why_this_is_important: |
      வரையறுக்கப்பட்ட பகுத்தறிவைப் புரிந்துகொள்வது சிறந்த செயல்முறைகளை வடிவமைக்கவும், மற்றவர்களுக்கான தேர்வுகளை எளிமைப்படுத்தவும், முடிவுகளின் தரத்திற்கான யதார்த்தமான எதிர்பார்ப்புகளை அமைக்கவும் உதவுகிறது. இது "பகுத்தறிவற்ற" நடத்தை பெரும்பாலும் வரம்புகளின் கீழ் ஏன் பகுத்தறிவுள்ளது என்பதையும் விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - தலைமைத்துவம்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      satisficing_behavior: |
        மக்கள் முழுமையாக ஒப்பிடுவதற்குப் பதிலாக ஏற்றுக்கொள்ளக்கூடிய முதல் விருப்பத்தைத் தேர்ந்தெடுக்கிறார்கள்.
      heuristic_reliance: |
        முழுமையான பகுப்பாய்வுக்குப் பதிலாக பொதுவான விதிகளின் உதவியுடன் முடிவுகள் எடுக்கப்படுகின்றன.
      context_dependence: |
        விருப்பங்கள் எவ்வாறு வழங்கப்படுகின்றன என்பதைப் பொறுத்து ஒரே நபர் வெவ்வேறு தேர்வுகளைச் செய்கிறார்.
      information_overload: |
        அதிகப்படியான தகவல்கள் கிடைக்கும்போது, ​​முடிவுகளின் தரம் குறையக்கூடும்.
    examples:
      hiring: |
        ஒரு மேலாளர், "சிறந்த" வேட்பாளரைக் கண்டுபிடிக்க முடிவில்லாமல் நேர்காணல் செய்வதற்குப் பதிலாக, தகுதியைப் பூர்த்தி செய்யும் முதல் வேட்பாளரை நியமிக்கிறார்.
      consumer_choice: |
        கடையில் உள்ள ஒவ்வொரு பொருளையும் ஒப்பிடுவதற்குப் பதிலாக, வாங்குபவர்கள் அலமாரியில் உள்ள முதல் சில விருப்பங்களிலிருந்து தேர்ந்தெடுக்கிறார்கள்.
      policy: |
        வாக்காளர்கள் ஒவ்வொரு கொள்கை நிலைப்பாட்டையும் பகுப்பாய்வு செய்வதற்குப் பதிலாக, கட்சித் தொடர்புகள் அல்லது சில முக்கியப் பிரச்சனைகளைப் பயன்படுத்துகின்றனர்.
      daily_routines: |
        மக்கள் ஒவ்வொரு முடிவையும் மீண்டும் உகந்ததாக்குவதற்குப் பதிலாக, பழக்கவழக்கங்களையும் இயல்புநிலைகளையும் பின்பற்றுகிறார்கள்.
    real_world_implications: |
      வரையறுக்கப்பட்ட பகுத்தறிவு சந்தைகள், கொள்கை வடிவமைப்பு மற்றும் நிறுவன நடத்தைகளை வடிவமைக்கிறது. எள்ளல்கள் (Nudges) மற்றும் தேர்வு கட்டமைப்பு (choice architecture) நம் வரம்புகளைக் கணக்கில் எடுத்துக்கொள்வதால் வேலை செய்கின்றன. இதைப் புறக்கணிப்பது, மக்கள் திறம்பட பயன்படுத்த முடியாத மிக சிக்கலான அமைப்புகளுக்கு வழிவகுக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        மற்றவர்கள் சிக்கலான வர்த்தகப் பரிமாற்றங்களை நிகழ்நேரத்தில் செயலாக்குவார்கள் என்று எதிர்பார்க்க வேண்டாம். தேர்வுகளை எளிமைப்படுத்தி, தெளிவான இயல்புநிலைகளை வழங்கவும்.
      collaborative_learning_initiative: |
        வரையறுக்கப்பட்ட பகுத்தறிவுடன் செயல்படும் செயல்முறைகளை வடிவமைக்கவும்: தேர்வுகளைக் குறைக்கவும், இயல்புநிலைகளை வழங்கவும், சிக்கலான முடிவுகளுக்கு சரிபார்ப்புப் பட்டியல்களைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        முடிவெடுக்கும் சோர்வு மற்றும் மோசமான விளைவுகளுக்கு வழிவகுக்கும், வரம்பற்ற அறிவாற்றல் திறனை அனுமானிக்கும் செயல்முறைகளை வடிவமைத்தல்.
      blaming_irrationality: |
        தடைகளைக் கருத்தில் கொள்ளாமல், மற்றவர்களின் தேர்வுகளை பகுத்தறிவற்றவை என்றுdismissal செய்தல்.
      exploitation: |
        விரும்பிய விளைவுகளை நோக்கி அவர்களை வழிநடத்த, வேண்டுமென்றே சிக்கலான தன்மையால் மக்களை அதிகமாக மூழ்குதல்.
      perfectionism: |
        திருப்தி அடையும் போது பகுத்தறிவு அணுகுமுறையாக இருக்கும்போது உகந்த முடிவுகளை எதிர்பார்ப்பது.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: பார்வையாளர் விளைவு
    quick_introduction: |
      பார்வையாளர் விளைவு என்பது, மற்றவர்கள் இருக்கும்போது தனிநபர்கள் உதவி செய்ய வாய்ப்பு குறைவதாகும். பார்வையாளர்கள் அதிகமாக இருந்தால், எந்த ஒரு தனிநபரும் செயல்படுவதற்கான வாய்ப்பு குறையும். பொறுப்பு பரவலாகிறது; யாராவது ஒருவர் உதவுவார் என்று நாம் கருதுகிறோம்.
    one_liner: மக்கள் அதிகமாக இருந்தால், எந்த ஒரு தனிநபரும் செயல்படுவதற்கான வாய்ப்பு குறையும்.
    try_this:
      - அவசர காலங்களில், பொறுப்பை நேரடியாக ஒதுக்குங்கள்: நீங்கள், 911-க்கு அழைக்கவும்.
      - யாராவது ஒருவர் உதவுவார் என்று கருத வேண்டாம்—செயல்படுங்கள் அல்லது வெளிப்படையாக பொறுப்பை ஒப்படையுங்கள்.
      - மற்றவர்கள் முதலில் செயல்படுவதற்காக காத்திருக்கும்போது கவனியுங்கள்.
    ask_yourself:
      - மற்றவர்கள் இருப்பதால் நான் பொறுப்பை பரப்புகிறேனா?
      - நான் தனியாக இருந்தால் வித்தியாசமாக செயல்படுவேனா?
    in_more_detail: |
      கேட்டி ஜெனோவீஸ் கொலைக்குப் பிறகு (அந்தக் கதை ஓரளவு கட்டுக்கதையாக இருந்தாலும்),
      மற்றவர்களின் இருப்பு உதவி செய்வதைக் குறைப்பதாக ஆராய்ச்சியாளர்கள் கண்டறிந்தனர்.
      நாங்கள் குறிப்புகளுக்காக மற்றவர்களைப் பார்க்கிறோம்—யாரும் செயல்படவில்லை என்றால்,
      "நடவடிக்கை தேவையில்லை" என்று அதை விளக்குகிறோம்.
      நாங்கள் பொறுப்புப் பரவலையும் அனுபவிக்கிறோம்: பல மக்கள் இருக்கும்போது,
      ஒவ்வொருவரும் தனிப்பட்ட பொறுப்பை குறைவாக உணர்கிறார்கள். பன்முக அறியாமை ஏற்படலாம்:
      எல்லோரும் ஏதோ தவறு என்று நினைக்கிறார்கள் ஆனால் யாரும் செயல்படவில்லை, ஏனெனில் வேறு யாரும் செயல்படவில்லை.

      நிலைமை தெளிவாக இல்லாதபோது மற்றும்
      பார்வையாளர்கள் ஒருவருக்கொருவர் தெரியாதபோது இந்த விளைவு வலுவாக இருக்கும்.
      பொறுப்பை நேரடியாக ஒதுக்குவதன் மூலம் இதை சமாளிக்க முடியும் ("நீங்கள், 911-க்கு அழைக்கவும்").
    why_this_is_important: |
      பார்வையாளர் விளைவைப் புரிந்துகொள்வது, மற்றவர்கள் செய்யாதபோது நீங்கள் நடவடிக்கை எடுக்கவும்,
      அதை சமாளிக்கும் அமைப்புகளை வடிவமைக்கவும் உதவுகிறது. நீங்கள் சிக்கலில் இருந்தால்,
      ஒரு குறிப்பிட்ட நபரை தனிமைப்படுத்துங்கள். நீங்கள் ஒரு பார்வையாளராக இருந்தால்,
      மற்றவர்கள் செயல்படுவதற்காக காத்திருக்க வேண்டாம்.
    when_to_use:
      - தலைமைத்துவம்
      - உறவு_கட்டுதல்
      - மோதல்_தீர்வு
      - முடிவெடுக்கும்_செயல்முறை
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        பலர் இருக்கும்போது "யாரோ ஒருவர் அதைச் செய்வார்".
      pluralistic_ignorance: |
        நடவடிக்கை தேவை என்று எல்லோரும் நினைக்கிறார்கள் ஆனால் வேறு யாரும் செயல்படாததால் யாரும் செயல்படவில்லை.
      social_proof_inaction: |
        மற்றவர்களின் செயலற்ற தன்மை "நடவடிக்கை தேவையில்லை" என்று விளக்கப்படுகிறது.
      audience_inhibition: |
        முட்டாள்தனமாக தோன்றுவதையோ அல்லது மிகையாக செயல்படுவதையோ பயம் நடவடிக்கையை தடுக்கிறது.
    examples:
      emergency: |
        ஒருவர் மயக்கமடைகிறார்; பலர் பார்வையாளர்களாக இருக்கும்போது,
        யாரும் உதவிக்கு அழைக்க வாய்ப்பில்லை.
      workplace: |
        எல்லோரும் ஒரு பிரச்சனையை பார்க்கிறார்கள் ஆனால் யாரும் அதை எழுப்பவில்லை—ஒவ்வொருவரும்
        யாரோ ஒருவர் செய்வார் என்று கருதுகிறார்கள்.
      harassment: |
        தொந்தரவை சாட்சியாக பார்ப்பவர்கள் தலையிடுவதில்லை, ஒவ்வொருவரும்
        மற்றவர்கள் செயல்படுவார்கள் என்று நினைக்கிறார்கள்.
      meetings: |
        ஒரு மோசமான யோசனை சவால் செய்யப்படாமல் செல்கிறது, ஏனெனில் எல்லோரும்
        யாரோ ஒருவர் பேசுவார் என்று கருதுகிறார்கள்.
    real_world_implications: |
      பார்வையாளர் விளைவு அவசர காலங்களில் துயரமான விளைவுகளை ஏற்படுத்தலாம்
      மற்றும் நிறுவனங்களில் பிரச்சனைகள் நீடிக்க அனுமதிக்கலாம். அதை சமாளிக்க
      நேரடி பொறுப்பு ஒதுக்குதல் மற்றும் தலையிடுவதை ஊக்குவிக்கும் விதிமுறைகள் தேவை.
    professional_application:
      networking_and_relationship_building: |
        உங்களுக்கு உதவி தேவைப்படும்போது, ஒரு குறிப்பிட்ட நபரிடம் கேளுங்கள்.
        தவறான ஒன்றைக் காணும்போது, செயல்படுங்கள்—மற்றவர்கள் செய்வார்கள் என்று கருத வேண்டாம்.
        பேசுவது எதிர்பார்க்கப்படுகிறது மற்றும் வெகுமதி அளிக்கப்படுகிறது என்ற விதிமுறைகளை உருவாக்குங்கள்.
      collaborative_learning_initiative: |
        பார்வையாளர் விளைவை அடையாளம் காணவும், தலையிடவும் மக்களுக்கு பயிற்சி அளிக்கவும்.
        "நீங்கள் ஒன்றைக் கண்டால், அதைச் சொல்லுங்கள்" என்று பயன்படுத்தி, வெளிப்படையான
        பாத்திரங்களை ஒதுக்குங்கள். முதலில் பேசுபவர்களுக்கு வெகுமதி அளியுங்கள்.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        சக்தி வாய்ந்த சூழ்நிலை சக்தியான விளைவு இருக்கும்போது தனிநபர்களை கடுமையாக மதிப்பிடுவது—சூழ்நிலையை மாற்றுவதில் கவனம் செலுத்துங்கள்.
      false_assumption: |
        போதுமான மக்கள் இருக்கும்போது யாராவது எப்போதும் உதவுவார்கள் என்று கருதுவது—எதிர்மாறானது பெரும்பாலும் உண்மை.
      overcorrection: |
        யாரும் பொறுப்பாகாதவாறு எல்லோருக்கும் பொறுப்பு கொடுப்பது—பரவல்
        இன்னும் ஏற்படலாம்.
      individualizing: |
        பார்வையாளர் விளைவை ஒரு சூழ்நிலை நிகழ்வாகக் கருதாமல் ஒரு குணாதிசயக் குறைபாடாகக் கருதுவது.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: தகுதி வட்டம்
    quick_introduction: |
      தகுதி வட்டம் என்பது ஒரு மன மாதிரி ஆகும். இது உங்கள் நிபுணத்துவத்தின் எல்லைகளை அறிந்து, முக்கியமான முடிவுகளை எடுக்கும்போது அவற்றுக்குள்ளேயே இருக்குமாறு வலியுறுத்துகிறது. வாரன் பப்பெட் மற்றும் சார்லி முங்கர், உங்களுக்குத் தெரியாததை அறிந்துகொள்வதை வலியுறுத்துகின்றனர்.
    one_liner: உங்கள் நிபுணத்துவத்தின் எல்லைகளை அறிந்து கொள்ளுங்கள் - அது முக்கியமாக இருக்கும்போது அவற்றுக்குள்ளேயே இருங்கள்.
    try_this:
      - உங்களுக்கு உண்மையான நிபுணத்துவம் உள்ள இடங்களையும், நீங்கள் ஊகிக்கும் இடங்களையும் பட்டியலிடுங்கள்.
      - உங்கள் வட்டத்திற்கு வெளியே இருக்கும்போது, ​​ஆலோசனை கேளுங்கள் அல்லது பொறுப்பை ஒப்படையுங்கள்.
      - நேர்மையாக இருங்கள்: ஒரு உண்மையான நிபுணர் உங்கள் தீர்ப்பை இங்கே ஏற்றுக்கொள்வாரா?
    ask_yourself:
      - நான் எனது தகுதி வட்டத்திற்குள் இருக்கிறேனா, அல்லது ஊகிக்கிறேனா?
      - இந்தத் துறையில் கடைசியாக "எனக்குத் தெரியாது" என்று எப்போது ஒப்புக்கொண்டேன்?
    in_more_detail: |
      ஒவ்வொரு நபருக்கும் உண்மையான நிபுணத்துவம் உள்ள பகுதிகள் உள்ளன - அங்கு அவர்கள் தகவல்களை மதிப்பிடலாம், பிழைகளைக் கண்டறியலாம் மற்றும் நம்பகமான தீர்ப்புகளை வழங்கலாம். அந்த வட்டத்திற்கு வெளியே, அவர்கள் மற்றவர்களைப் போலவே சார்புகளுக்கும் தவறுகளுக்கும் ஆளாகிறார்கள். முக்கியமானது நேர்மையான சுய மதிப்பீடு: நீங்கள் உண்மையில் எதில் திறமையானவர், எதில் ஊகிக்கிறீர்கள்?

      முறையான கற்றல் மூலம் வட்டம் விரிவுபடுத்தப்படலாம், ஆனால் அதன் தற்போதைய எல்லைகளை அங்கீகரிக்க பணிவு தேவை. உங்கள் வட்டத்திற்கு வெளியே செயல்படுவது, குறிப்பாக ஆபத்து அதிகமாக இருக்கும்போது, ​​விலையுயர்ந்த தவறுகளின் அபாயத்தை அதிகரிக்கிறது.
    why_this_is_important: |
      உங்கள் தகுதி வட்டத்திற்குள் இருப்பது விலையுயர்ந்த தவறுகளைக் குறைக்கிறது மற்றும் முடிவெடுக்கும் தரத்தை மேம்படுத்துகிறது. இது எப்போது ஆலோசனை கேட்பது, பொறுப்பை ஒப்படையுங்கள் அல்லது தவிர்ப்பது என்பதையும் அறிய உதவுகிறது. உங்கள் வட்டத்திற்கு வெளியே உள்ள அதீத நம்பிக்கை தோல்விக்கான ஒரு முக்கிய ஆதாரமாகும்.
    when_to_use:
      - முடிவு_எடுத்தல்
      - முதலீடு
      - தொழில்_முன்னேற்றங்கள்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      honest_boundary_assessment: |
        ஒரு துறையில் உங்கள் அறிவின் வரம்புகளை உங்களால் விளக்க முடியுமா? உங்களுக்குத் தெரியாததை உங்களுக்குத் தெரியுமா?
      knowing_when_to_defer: |
        தனியாக முடிவெடுப்பதற்குப் பதிலாக நிபுணத்துவ உள்ளீட்டைக் கேட்க வேண்டிய சூழ்நிலைகளை அங்கீகரித்தல்.
      consistent_track_record: |
        உங்கள் வட்டத்திற்குள், உங்கள் தீர்ப்புகள் காலப்போக்கில் சரிபார்க்கப்படும்; வெளியே, அவை சரிபார்க்கப்படுவதில்லை.
      calibration: |
        ஒரு துறையில் உங்கள் நம்பிக்கை அந்தத் துறையில் உங்கள் உண்மையான செயல்திறனுடன் பொருந்துகிறது.
    examples:
      investing: |
        டெக் ஸ்டாக்குகளை பப்பெட் தவிர்க்கிறார், ஏனெனில் அவை அவரது தகுதி வட்டத்திற்கு வெளியே இருப்பதாக அவர் கூறுகிறார் - அவற்றை நம்பத்தகுந்த வகையில் அவரால் மதிப்பிட முடியாது.
      career: |
        தங்கள் துறையில் நிலைத்திருக்கும் ஒரு நிபுணர், தொடர்பில்லாத பகுதியில் "நீட்டிப்பு" பாத்திரத்தை எடுக்கும் ஒருவரை விட.
      hiring: |
        உங்கள் சொந்த தீர்ப்பை நம்புவது எப்போது, ​​தொழில்நுட்பப் பணிகளுக்கு நிபுணர்களை அழைப்பது எப்போது என்பதை அறிதல்.
      advice_giving: |
        ஊகிப்பதை விட, உங்கள் நிபுணத்துவத்திற்கு அப்பாற்பட்ட தலைப்புகளில் கருத்து தெரிவிக்க மறுப்பது.
    real_world_implications: |
      தகுதி வட்டம் மதிப்பு முதலீடு மற்றும் தொழில்முறை வெற்றிக்கு மையமானது. அதை புறக்கணிப்பது அதீத நம்பிக்கை, தோல்வியுற்ற முயற்சிகள் மற்றும் மோசமான ஆலோசனைக்கு வழிவகுக்கிறது. வட்டத்தை விரிவுபடுத்துவதற்கு முறையான முயற்சி மற்றும் நேர்மையான பின்னூட்டம் தேவை.
    professional_application:
      networking_and_relationship_building: |
        உங்கள் தகுதி வட்டங்களை நிறைவு செய்யும் நபர்களுடன் உறவுகளை உருவாக்குங்கள். உங்களை நீங்களே பதிலளிப்பதற்குப் பதிலாக மற்றவர்களை அறிமுகப்படுத்த வேண்டிய நேரம் எப்போது என்பதை அறிந்து கொள்ளுங்கள்.
      collaborative_learning_initiative: |
        ஒன்றுடன் ஒன்று இணைந்த மற்றும் நிரப்பு வட்டங்களைக் கொண்ட குழுக்களை உருவாக்குங்கள். தங்கள் திறமைக்கு வெளியே செயல்படும்போது அதைத் தெரிவிக்குமாறு மக்களை ஊக்குவிக்கவும்.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        ஒருபோதும் உங்கள் வட்டத்திற்கு வெளியே செல்லாமல் இருப்பது வளர்ச்சி மற்றும் கற்றலைக் கட்டுப்படுத்தலாம்.
      false_modesty: |
        பொறுப்புக்கூறல் அல்லது கடினமான முடிவுகளைத் தவிர்ப்பதற்காக ஒரு சிறிய வட்டத்தை உரிமை கோருதல்.
      gatekeeping: |
        அவர்களின் வாதங்களில் ஈடுபடாமல் மற்றவர்களை நிராகரிக்க "தகுதி வட்டம்" என்பதைப் பயன்படுத்துதல்.
      stagnation: |
        முயற்சியால் விரிவாக்கக்கூடிய ஒன்றாக வட்டத்தை நடத்துவது.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: அறிவாற்றல் முரண்பாடு
    quick_introduction: |
      அறிவாற்றல் முரண்பாடு என்பது நாம் முரண்பாடான நம்பிக்கைகளைக் கொண்டிருக்கும்போது, ​​அல்லது நமது செயல்கள் நமது நம்பிக்கைகளுக்கு முரணாக இருக்கும்போது நாம் உணரும் மன அசௌகரியம் ஆகும். இந்த அசௌகரியத்தைக் குறைக்க நாம் தூண்டப்படுகிறோம்—பெரும்பாலும் நமது செயல்களை மாற்றுவதை விட, நமது செயல்களுக்குப் பொருந்த நமது நம்பிக்கைகளை மாற்றுவதன் மூலம்.
    one_liner: நாம் நமது செயல்களை விட நமது நம்பிக்கைகளை மாற்றிக்கொள்ளும் வாய்ப்பு அதிகம்.
    try_this:
      - நடத்தை மாற்றாமல் அசௌகரியத்தைக் குறைக்க நீங்கள் நியாயப்படுத்துவதைக் கவனியுங்கள்.
      - கேளுங்கள்: நான் என்ன செய்தேன் என்பதை நியாயப்படுத்த எனது நம்பிக்கைகளைச் சரிசெய்கிறேனா?
      - நம்பிக்கையை மாற்றுவதை விட செயலை மாற்றுவது மிகவும் நேர்மையாக இருக்குமா என்று கருதுங்கள்.
    ask_yourself:
      - நான் நியாயப்படுத்துவதன் மூலம் முரண்பாட்டை குறைக்கிறேனா, அல்லது உண்மையில் மாற்றுவதன் மூலம் குறைக்கிறேனா?
      - நான் ஏற்கனவே இப்படி செயல்படவில்லை என்றால் இந்த நம்பிக்கையை வைத்திருப்பேனா?
    in_more_detail: |
      லியோன் ஃபெஸ்டிங்கரின் கோட்பாடு நாம் நிலைத்தன்மையை நாடுகிறோம் என்பதை விளக்குகிறது. நமது மதிப்புகளுக்கு எதிராக நாம் செயல்படும்போது (எ.கா., பொய் சொல்வது, பணத்தை வீணடிப்பது), நாம் முரண்பாட்டை அனுபவிக்கிறோம். அதைக் குறைக்க, நமது நம்பிக்கையை மாற்றலாம் ("அது உண்மையில் பொய்யாக இல்லை") அல்லது செயலைக் குறைக்கலாம் ("அது அவ்வளவு மோசமாக இல்லை"). நாம் சீர்திருத்தத்தை விட பெரும்பாலும் நியாயப்படுத்துகிறோம்.

      அறிவாற்றல் முரண்பாடு பென் ஃபிராங்க்ளின் விளைவை (நாம் உதவியவர்களுக்குப் பிடிக்கும்) இயக்குகிறது, கடந்தகால முடிவுகளை நாம் ஏன் நியாயப்படுத்துகிறோம் என்பதை விளக்குகிறது, மேலும் பல சுய-ஏமாற்றங்களுக்கு அடிப்படையாக அமைகிறது. இது நம்பிக்கை உருவாக்கம் மற்றும் மாற்றத்தில் ஒரு சக்திவாய்ந்த சக்தியாகும்.
    why_this_is_important: |
      அறிவாற்றல் முரண்பாட்டைப் புரிந்துகொள்வது உங்கள் சொந்த நியாயப்படுத்துதல்களை அங்கீகரிக்கவும், மக்கள் ஏன் தங்கள் மனதை மாற்ற எதிர்க்கிறார்கள் என்பதைப் புரிந்துகொள்ளவும் உதவுகிறது. ஈடுபாடு மற்றும் நிலைத்தன்மை சக்திவாய்ந்த தூண்டுதல் கொள்கைகள் ஏன் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - உறவை உருவாக்குதல்
      - தலைமைத்துவம்
      - முரண்பாடு தீர்த்தல்
    how_can_you_spot_it:
      post_decision_rationalization: |
        ஒரு தேர்வுக்குப் பிறகு, நமது தேர்வின் நேர்மறைகளையும் நிராகரிக்கப்பட்ட விருப்பங்களின் எதிர்மறைகளையும் நாம் வலியுறுத்துகிறோம்.
      belief_action_alignment: |
        நாம் ஏற்கனவே எடுத்த செயல்களுக்குப் பொருந்த நம்பிக்கைகளைச் சரிசெய்கிறோம்.
      discomfort_with_inconsistency: |
        நமது நடத்தை நமது கூறப்பட்ட மதிப்புகளுடன் பொருந்தவில்லை என்பதை நாம் உணரும்போது ஒருவித அமைதியின்மை.
      resistance_to_disconfirming_evidence: |
        நமது ஈடுபாடுகளுக்கு முரணான தகவல்களைப் புறக்கணிப்பது அல்லது குறைப்பது.
    examples:
      purchase_justification: |
        ஒரு விலையுயர்ந்த பொருளை வாங்கிய பிறகு, அதன் நன்மைகளை வலியுறுத்துகிறோம் மற்றும் செலவைக் குறைக்கிறோம்.
      relationship: |
        நல்லதை வலியுறுத்தி, கெட்டதை குறைப்பதன் மூலம் ஒரு மோசமான உறவில் இருப்பதைக் நியாயப்படுத்துகிறோம்.
      career: |
        "இருக்க வேண்டும்" என்ற காரணங்களை வலியுறுத்துவதன் மூலம் நாம் விரும்பாத வேலையில் இருப்பதை நியாயப்படுத்துகிறோம்.
      beliefs: |
        நமது செயல்கள் நமது மதிப்புகளுக்கு முரணாக இருக்கும்போது, ​​நமது செயல்களுக்குப் பதிலாக நமது மதிப்புகளை மாற்றிக்கொள்கிறோம் ("நான் உண்மையில் ஒரு சைவ உணவு உண்பவர் அல்ல—நான் அவ்வப்போது இறைச்சி சாப்பிடுகிறேன்").
    real_world_implications: |
      அறிவாற்றல் முரண்பாடு நம்பிக்கை உருவாக்கம், நுகர்வோர் நடத்தை மற்றும் அரசியல் மனப்பான்மைகளை வடிவமைக்கிறது. மோசமான முடிவுகளுக்குப் பிறகு மக்கள் ஏன் மீண்டும் வலியுறுத்துகிறார்கள் என்பதையும், நடத்தை மாற்றுவது நம்பிக்கைகளை எப்படி மாற்ற முடியும் என்பதையும் இது விளக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        சிறிய ஈடுபாடுகள் பெரிய ஈடுபாடுகளுக்கு வழிவகுக்கும்—மக்கள் தங்கள் கடந்தகால செயல்களை நியாயப்படுத்துகிறார்கள். இதை நெறிமுறையாகப் பயன்படுத்துங்கள்: சிறிய கோரிக்கைகளுடன் தொடங்குங்கள். உங்கள் சொந்த நடத்தையை நீங்கள் நியாயப்படுத்துகிறீர்களா என்பதை அறிந்திருங்கள்.
      collaborative_learning_initiative: |
        மாற்றத்தை அறிமுகப்படுத்தும்போது, ​​ஆரம்பகால ஒப்புதலைப் பெறுங்கள் மற்றும் சிறிய ஈடுபாடுகளைப் பெறுங்கள்—அவை பெரிய தத்தெடுப்பைத் தூண்டும் முரண்பாட்டை உருவாக்குகின்றன. மனக்கசப்பை உருவாக்கும் பொது ஈடுபாடுகளைத் திணிப்பதைத் தவிர்க்கவும்.
    how_can_this_be_misapplied:
      manipulation: |
        இணக்கத்திற்கு மக்களை அழுத்துவதற்கு வேண்டுமென்றே முரண்பாட்டை உருவாக்குதல்.
      dismissing_genuine_change: |
        மக்கள் சில சமயங்களில் உண்மையாகவே புதுப்பிக்கும்போது அனைத்து நம்பிக்கை மாற்றத்தையும் நியாயப்படுத்துதல் என்று கருதுதல்.
      forced_consistency: |
        மக்கள் நியாயமாக தங்கள் கருத்துக்கள் உருவாகியுள்ளன போது "நிலையானதாக" இருக்க அழுத்தம் கொடுப்பது.
      self_deception: |
        நம்மைப் பற்றிய சங்கடமான உண்மைகளைத் தவிர்ப்பதை நியாயப்படுத்த முரண்பாடு கோட்பாட்டைப் பயன்படுத்துதல்.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: உறுதிப்படுத்தல் சார்பு
    quick_introduction: |
      உறுதிப்படுத்தல் சார்பு என்பது நமது ஏற்கனவே உள்ள நம்பிக்கைகளை உறுதிப்படுத்தும் தகவல்களைத் தேடுவது, விளக்குவது மற்றும் நினைவில் கொள்வது ஆகும். நாம் ஆதரவான ஆதாரங்களுக்கு அதிக முக்கியத்துவம் கொடுக்கிறோம், நமது கருத்துக்களை எதிர்க்கும் ஆதாரங்களை புறக்கணிக்கிறோம் அல்லது நிராகரிக்கிறோம். நமது கருதுகோள்களைச் சோதிப்பதை விட, உறுதிப்படுத்தும் கேள்விகளைக் கேட்கிறோம்.
    one_liner: நாம் நமது நம்பிக்கைகளை உறுதிப்படுத்துவதைத் தேடுகிறோம், நினைவில் கொள்கிறோம்; அவற்றிற்கு முரணானவற்றை புறக்கணிக்கிறோம்.
    try_this:
      - கேள்: என்னை எது தவறென்று நிரூபிக்கும்? மாற்று ஆதாரங்களைத் தீவிரமாகத் தேடுங்கள்.
      - ஆதரவான தகவல்களுக்கு முரணான தகவல்களை விட அதிக முக்கியத்துவம் கொடுக்கும்போது கவனியுங்கள்.
      - எதிர்தரப்பு பார்வையை உங்கள் பார்வையை போலவே தீவிரமாக கருதுங்கள்.
    ask_yourself:
      - நான் எனது கருதுகோளை சோதிக்கிறேனா அல்லது உறுதிப்படுத்துகிறேனா?
      - புதிய ஆதாரங்களின் அடிப்படையில் நான் கடைசியாக எப்போது என் மனதை மாற்றிக்கொண்டேன்?
    in_more_detail: |
      நாம் தகவல்களை நடுநிலையாகப் பார்ப்பதில்லை. நாம் உறுதிப்படுத்தலைத் தேடுகிறோம், தெளிவற்ற தன்மையை ஆதரவாக விளக்குகிறோம், தவறுகளை விட சரியானவற்றையே அதிகம் நினைவில் கொள்கிறோம். நம்மைப் போன்ற எண்ணம் கொண்டவர்களுடனும், ஊடகங்களுடனும் நம்மைச் சூழ்ந்துகொள்கிறோம். "நான் ஏன் சரியாக இருக்கிறேன்?" என்று கேட்பதற்குப் பதிலாக "என்னை எது தவறென்று நிரூபிக்கும்?" என்று கேட்கிறோம். இது நம்மை அதிக நம்பிக்கையுடன் இருக்க வைக்கிறது, புதுப்பிக்க தாமதப்படுத்துகிறது.

      உறுதிப்படுத்தல் சார்பு மிகவும் பரவலான மற்றும் நன்கு ஆவணப்படுத்தப்பட்ட சார்புகளில் ஒன்றாகும்.
      இது அறிவியல், அரசியல், உறவுகள் மற்றும் வணிகம் ஆகியவற்றைப் பாதிக்கிறது. அதை வெல்வதற்கு
      கவனமான முயற்சி மற்றும் கட்டமைக்கப்பட்ட செயல்முறைகள் தேவை.
    why_this_is_important: |
      சிறந்த முடிவெடுப்பதற்கும், கற்றலுக்கும் உறுதிப்படுத்தல் சார்பை அங்கீகரிப்பது அவசியம்.
      இது மாற்று ஆதாரங்களைத் தேடவும், மாற்று கருதுகோள்களைக் கருத்தில் கொள்ளவும், தேவைப்படும்போது
      உங்கள் நம்பிக்கைகளைப் புதுப்பிக்கவும் உதவுகிறது. இது அறிவியல் சிந்தனையின் அடித்தளம்.
    when_to_use:
      - முடிவெடுத்தல் (decision-making)
      - கற்றல் (learning)
      - சிக்கல்_தீர்த்தல் (problem_solving)
      - இடர்_மதிப்பீடு (risk_assessment)
    how_can_you_spot_it:
      seeking_support: |
        உங்கள் பார்வையைச் சோதிப்பதை விட, உறுதிப்படுத்தும் ஆதாரங்களைத் தேடுதல்.
      asymmetric_interpretation: |
        தெளிவற்ற ஆதாரங்களை உங்கள் நிலைக்கு ஆதரவாக விளக்குதல்.
      discounting_disconfirming: |
        உங்கள் நம்பிக்கைகளுக்கு முரணான ஆதாரங்களை நிராகரித்தல் அல்லது குறைத்து மதிப்பிடுதல்.
      selective_exposure: |
        உங்களுக்கு உடன்படும் ஆதாரங்களில் இருந்து மட்டுமே தகவல்களைப் பெறுதல்.
    examples:
      hiring: |
        ஆரம்பத்தில் ஒரு நல்ல அபிப்பிராயத்தை உருவாக்கி, பின்னர் அந்த வேட்பாளர் சிறந்தவர் என்பதை உறுதிப்படுத்தும் கேள்விகளைக் கேட்டல்.
      investing: |
        ஒரு பங்குகளை வாங்கிய பிறகு, நேர்மறையான செய்திகளைத் தேடுவது மற்றும் எதிர்மறையான பகுப்பாய்வுகளைப் புறக்கணித்தல்.
      relationships: |
        உங்கள் பார்வையை (நல்லது அல்லது கெட்டது) உறுதிப்படுத்தும் ஒரு கண்ணோட்டத்தில் ஒரு துணையின் செயல்களை விளக்குதல்.
      politics: |
        உங்கள் தரப்பிலிருந்து வரும் தகவல்களை விமர்சனமின்றி ஏற்றுக்கொள்வது மற்றும் எதிர்தரப்பிலிருந்து வரும் சமமான தகவல்களை நிராகரிப்பது.
    real_world_implications: |
      உறுதிப்படுத்தல் சார்பு தவறான நம்பிக்கைகளைத் தக்கவைக்கிறது, துருவமுனைப்பைத் தூண்டுகிறது, மற்றும் விலையுயர்ந்த தவறுகளுக்கு வழிவகுக்கிறது. இது நல்ல அறிவியல் மற்றும் நல்ல முடிவெடுப்பதன் எதிரி. அதை வெல்வதற்கு கவனமான மறுப்புத் தேடல் அவசியம்.
    professional_application:
      networking_and_relationship_building: |
        மனிதர்களைப் பற்றிய கருத்துக்களை உருவாக்கும்போது, ​​மாற்று ஆதாரங்களைத் தீவிரமாகத் தேடுங்கள். "எது என் மனதை மாற்றும்?" என்று கேட்டு, அதைக் கண்டறியுங்கள்.
      collaborative_learning_initiative: |
        எதிர்வாதக்காரர் (devil's advocate), சிவப்பு அணிகள் (red teams), மற்றும் முன்-மரணப் பரிசோதனைகள் (pre-mortems) ஆகியவற்றைப் பயன்படுத்தி மாற்று பார்வைகளை வெளிக்கொணருங்கள். நல்ல ஆதாரங்களுடன் நிலவும் கருத்துக்களை சவால் செய்யும் நபர்களுக்குப் பரிசளிக்கவும்.
    how_can_this_be_misapplied:
      false_balance: |
        ஒரு பக்கம் ஆதாரங்கள் கடுமையாக ஆதரிக்கும்போது அனைத்துப் பார்வைகளையும் சமமாகச் செல்லுபடியாகும் என்று கருதுதல்.
      excessive_skepticism: |
        சில நம்பிக்கைகள் நன்கு ஆதரிக்கப்படும்போது அனைத்து ஆதாரங்களையும் "உறுதிப்படுத்தல் சார்பு" என்று நிராகரித்தல்.
      contrarianism: |
        உறுதிப்படுத்தல் சார்பைத் தவிர்க்கவே எதிர்தரப்பு பார்வையை ஏற்றுக்கொள்வது - அசல் பார்வை சரியாக இருக்கலாம்.
      analysis_paralysis: |
        "நாம் சார்புடையவர்களாக இருக்கலாம்" என்பதால் ஒருபோதும் ஒரு பார்வைக்கு உறுதியளிக்காமல் இருப்பது.
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: அறிவின் சாபம்
    quick_introduction: |
      நீங்கள் ஏதோ ஒன்றை அறிந்த பிறகு, அதை அறியாத நிலை எப்படி இருக்கும் என்பதை கற்பனை செய்ய முடியாததே அறிவின் சாபம். நிபுணர்கள் ஆரம்பநிலையினருக்குக் கற்பிப்பதில் சிரமப்படுகிறார்கள், ஏனெனில் அவர்களால் ஆரம்பநிலையாளரின் பார்வையை மீண்டும் உருவாக்க முடியாது. நீங்கள் அறிந்தவுடன், அறியாதிருந்த நிலையை மறந்து விடுகிறீர்கள்.
    one_liner: ஏதோ ஒன்றை அறிந்த பிறகு, அறியாதிருந்த நிலையை மறந்து விடுகிறீர்கள்.
    try_this:
      - விளக்கும்போது, ​​முதல் கொள்கைகளில் இருந்து தொடங்குங்கள்—உங்கள் பார்வையாளர்கள் எதையும் அறியாதவர்கள் என்று கருதுங்கள்.
      - ஒரு ஆரம்பநிலையாளரை விளக்குமாறு கேளுங்கள்; அவர்களின் குழப்பம் உங்கள் குருட்டுப் புள்ளிகளை வெளிப்படுத்தும்.
      - நீங்கள் படிகளைத் தவிர்க்கிறீர்களா அல்லது மற்றவர்களுக்குத் தெரியாத சொற்களைப் பயன்படுத்துகிறீர்களா என்பதைக் கவனியுங்கள்.
    ask_yourself:
      - மற்றவர்களுக்கும் என்னிடம் உள்ள அதே சூழல் இருப்பதாக நான் கருதுகிறேனா?
      - எனது பின்னணி இல்லாத ஒருவருக்கு இது புரியுமா?
    in_more_detail: |
      ஒரு கிளாசிக் சோதனையில், ஒரு புதிரின் பதிலைத் தெரிந்தவர்கள் ஒரு பாடலின் தாளத்தை தட்டி, மற்றவர்கள் அதைக் யூகிக்க எதிர்பார்தார்கள்—அது எவ்வளவு தெளிவாக இருந்தது என்பதை அவர்கள் அதிகமாக மதிப்பிட்டனர். தட்டுபவர்கள் தங்கள் தலையில் பாடலை "கேட்காமல்" இருக்க முடியவில்லை. அறிவு "ஒட்டும் தன்மையுடையது"; அறியாமையை உருவகப்படுத்துவது கடினம்.

      இந்த சாபம் கற்பித்தல், தொடர்பு, தயாரிப்பு வடிவமைப்பு மற்றும் தலைமைத்துவத்தை பாதிக்கிறது. மற்றவர்களுக்கும் நம்மைப் போன்ற அதே சூழல் இருப்பதாக நாம் கருதுகிறோம். நாம் சொற்களைப் பயன்படுத்துகிறோம். நாம் படிகளைத் தவிர்க்கிறோம். மக்கள் "புரிந்துகொள்ளாதபோது" நாம் ஆச்சரியப்படுகிறோம்.
    why_this_is_important: |
      அறிவின் சாபத்தை அங்கீகரிப்பது கற்பித்தல், தொடர்பு மற்றும் தயாரிப்பு வடிவமைப்பை மேம்படுத்துகிறது. இது நீங்கள் இருக்கும் இடத்தில் இருந்து மக்களை சந்திப்பதை விட, அவர்கள் இருக்கும் இடத்திலிருந்து அவர்களை சந்திக்க உதவுகிறது. இது பயனுள்ள அறிவுப் பரிமாற்றத்திற்கு அவசியம்.
    when_to_use:
      - கற்றல்
      - தலைமைத்துவம்
      - சிக்கல்_தீர்த்தல்
      - உறவு_கட்டமைத்தல்
    how_can_you_spot_it:
      obvious_to_you: |
        பதில் உங்களுக்குத் தெரிந்தால் மட்டுமே அது "தெளிவாக" இருக்கும்.
      jargon_use: |
        பார்வையாளர்களுக்குத் தெரியாத சொற்களை வரையறுக்காமல் பயன்படுத்துதல்.
      skipped_steps: |
        நீங்கள் விட்டுச் சென்றவற்றை மற்றவர்கள் நிரப்புவார்கள் என்று கருதுதல்.
      frustration_with_learners: |
        அவர்களுக்கு உங்கள் சூழல் இல்லாதபோது "அவர்களுக்கு ஏன் அது தெரியவில்லை?"
    examples:
      teaching: |
        ஒரு கணிதப் பேராசிரியர் தனக்கு "தெளிவாக" இருக்கும் படிகளை, மாணவர்களுக்கு இன்றியமையாததாக இருந்தபோதிலும், தவிர்க்கிறார்.
      product_design: |
        வடிவமைப்பாளர்கள் தங்களுக்குப் புரியும் இடைமுகங்களை உருவாக்குகிறார்கள், ஆனால் புதிய பயனர்களைக் குழப்புகிறார்கள்.
      onboarding: |
        அனுபவம் வாய்ந்த ஊழியர்கள் புதிய பணியாளர்களுக்குத் தெரியாததை மறந்து, போதுமான பயிற்சி அளிப்பதில்லை.
      writing: |
        ஆசிரியர்கள் வாசகர்களுக்கு அதே பின்னணி இருப்பதாகக் கருதி, தேவையான சூழலைத் தவறவிடுகிறார்கள்.
    real_world_implications: |
      அறிவின் சாபம் தொடர்பு இடைவெளிகள், தோல்வியுற்ற தயாரிப்புகள் மற்றும் பயனற்ற கற்பித்தலை உருவாக்குகிறது. நிபுணர்கள் ஏன் மோசமான ஆசிரியர்களாக இருக்க முடியும் என்பதற்கு இது ஒரு காரணம். அதை வெல்வதற்கு, பார்வையாளர்களின் பார்வையை ஏற்றுக்கொள்வதற்கு கவனமான முயற்சி தேவை.
    professional_application:
      networking_and_relationship_building: |
        விளக்கும்போது, ​​மற்ற நபரின் மட்டத்திலிருந்து தொடங்குங்கள். "அவர்கள் ஏற்கனவே என்ன அறிந்திருக்கிறார்கள்?" என்று கேளுங்கள். உங்கள் பின்னணி இல்லாத ஒருவருடன் உங்கள் தொடர்பை சோதிக்கவும்.
      collaborative_learning_initiative: |
        "நான் ஐந்து வயது குழந்தைக்கு விளக்குவது போல் விளக்கு" பயிற்சிகளைப் பயன்படுத்தவும். நிபுணர்கள் ஆரம்பநிலையாளர்களுக்குக் கற்பித்து பின்னூட்டம் பெறட்டும். முன்னறிவிப்பு அறிவு தேவையில்லை என்று கருதி ஆவணங்களை உருவாக்கவும். சக கற்பித்தலைப் பயன்படுத்தவும்—சமீபத்தில் கற்றுக்கொண்டவர்கள் ஆரம்பநிலையாளரின் பார்வையை நினைவில் கொள்கிறார்கள்.
    how_can_this_be_misapplied:
      oversimplification: |
        தவறான அல்லது இழிவான நிலைக்கு எளிமைப்படுத்துதல்.
      false_assumption: |
        மற்றவர்கள் தாங்கள் நினைப்பதை விடக் குறைவாக அறிவார்கள் என்று கருதுவது—இதுவும் அளவுத்திருத்தத்தின் தோல்வி.
      one_size_fits_all: |
        அனைத்து பார்வையாளர்களுக்கும் ஒரே மாதிரியான விளக்க நிலை தேவையில்லை; பார்வையாளர்களுக்கு ஏற்ப சரிசெய்யவும்.
      avoiding_complexity: |
        சில தலைப்புகள் சிக்கலானவை; அறிவின் சாபம் என்றால், பொருத்தமாக இருக்கும்போது தொழில்நுட்ப மொழியைப் பயன்படுத்தக்கூடாது என்று அர்த்தமல்ல.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: இயல்புநிலை விளைவு
    quick_introduction: |
      கொடுக்கப்பட்ட தேர்வுகளில், ஏற்கனவே தேர்ந்தெடுக்கப்பட்ட விருப்பத்தை தேர்ந்தெடுக்கும் போக்கு இயல்புநிலை விளைவு ஆகும். இயல்புநிலையாக அமைக்கப்பட்ட எந்தவொரு விஷயத்திற்கும் வலுவான நன்மை உண்டு - அது அவர்களுக்கு உகந்ததா இல்லையா என்பதைப் பொருட்படுத்தாமல் மக்கள் பெரும்பாலும் அதிலேயே நிலைத்து நிற்கிறார்கள்.
    one_liner: இயல்புநிலையாக அமைக்கப்பட்ட எந்தவொரு விஷயத்திற்கும் வலுவான நன்மை உண்டு - நாம் அதிலேயே நிலைத்து நிற்கிறோம்.
    try_this:
      - மாற்று வழிகளை மதிப்பீடு செய்யாமல் இயல்புநிலையை ஏற்றுக்கொள்வதை கவனியுங்கள்.
      - தேர்வுகளை வடிவமைக்கும்போது, பயனர்களின் நலனுக்காக இயல்புநிலைகளை அமைக்கவும்.
      - கேளுங்கள்: இது முன்கூட்டியே தேர்ந்தெடுக்கப்படவில்லை என்றால் இதை நான் தேர்ந்தெடுப்பேனா?
    ask_yourself:
      - நான் செயலற்ற தன்மை காரணமாக இயல்புநிலையை தேர்ந்தெடுக்கிறேனா, அல்லது அது எனக்கு சிறந்ததா என்பதால் தேர்ந்தெடுக்கிறேனா?
      - இந்த இயல்புநிலையை யார் அமைத்தார்கள், அதிலிருந்து அவர்கள் என்ன ஆதாயம் அடையக்கூடும்?
    in_more_detail: |
      செயலற்ற தன்மை, இழப்பு தவிர்ப்பு (இயல்புநிலையை இழப்பதாக மாறுவது உணர்கிறது), மற்றும் மறைமுகமான ஒப்புதல் (இயல்புநிலை பரிந்துரைக்கப்படுகிறது என்று நாங்கள் கருதுகிறோம்) காரணமாக இயல்புநிலைகள் செயல்படுகின்றன. உறுப்பு தானம் விகிதங்கள் நாடு வாரியாக, இயல்புநிலை விருப்பத்தேர்வு அல்லது விருப்பத்தவிர்ப்பு என்பதைப் பொறுத்து வியத்தகு முறையில் வேறுபடுகின்றன. தானாகவே பதிவுசெய்தால் ஓய்வூதிய சேமிப்பு பங்கேற்பு அதிகரிக்கிறது.

      இயல்புநிலைகளை நன்மைக்காக (சிறந்த விளைவுகளை நோக்கி இட்டுச் செல்ல) அல்லது கையாளுதலுக்காக (முன்பே சரிபார்க்கப்பட்ட பெட்டிகளில் பாதகமான விதிமுறைகளை மறைக்க) பயன்படுத்தலாம். விளைவைப் புரிந்துகொள்வது சிறந்த அமைப்புகளை வடிவமைக்கவும் தேவையற்ற இயல்புநிலைகளை எதிர்க்கவும் உங்களுக்கு உதவுகிறது.
    why_this_is_important: |
      இயல்புநிலை விளைவைப் புரிந்துகொள்வது, விளைவுகளை மேம்படுத்தும் தேர்வு கட்டமைப்பை வடிவமைக்க உதவுகிறது, மேலும் உங்கள் தேர்வுகள் வேண்டுமென்றே விருப்பத்தை விட இயல்புநிலைகளால் வடிவமைக்கப்படுகின்றன என்பதை அங்கீகரிக்க உதவுகிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - தலைமைத்துவம்
      - சிக்கல்_தீர்த்தல்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      inertia_toward_default: |
        பெரும்பாலான மக்கள் முன்கூட்டியே தேர்ந்தெடுக்கப்பட்ட எதையும் அப்படியே ஏற்றுக்கொள்கிறார்கள்.
      implied_recommendation: |
        நாங்கள் தேர்ந்தெடுக்கும் என்று அவர்கள் விரும்புவது "இயல்புநிலை" என்று நாங்கள் விளக்குகிறோம்.
      opt_in_vs_opt_out: |
        வடிவமைப்பு பங்கேற்பை வியத்தகு முறையில் மாற்றுகிறது (விருப்பத்தேர்வு vs. விருப்பத்தவிர்ப்பு).
      pre_checked_boxes: |
        படிவங்கள் மற்றும் அமைப்புகளில் முன்கூட்டியே தேர்ந்தெடுக்கப்பட்ட விருப்பங்களுக்கு வலுவான நன்மை உண்டு.
    examples:
      organ_donation: |
        விருப்பத்தவிர்ப்பு நாடுகள், விருப்பத்தேர்வு நாடுகளை விட அதிக தானம் விகிதங்களைக் கொண்டுள்ளன - மனப்பான்மைகளை விட இயல்புநிலை முக்கியமானது.
      retirement_savings: |
        தானியங்கி பதிவு 401(k) பங்கேற்பை வியத்தகு முறையில் அதிகரிக்கிறது.
      software_installers: |
        "பரிந்துரைக்கப்பட்ட" விருப்பங்கள் மற்றும் முன்கூட்டியே சரிபார்க்கப்பட்ட கூடுதல் மென்பொருள்கள் பயனர்கள் என்ன நிறுவுகிறார்கள் என்பதை வடிவமைக்கின்றன.
      subscriptions: |
        கட்டணப் பதிவுக்கு இயல்புநிலையாக இருக்கும் இலவச சோதனைகள், செயலில் சந்தா செய்ய விரும்பாத பலரைப் பிடிக்கின்றன.
    real_world_implications: |
      இயல்புநிலை விளைவு மிகவும் சக்திவாய்ந்த தூண்டுதல்களில் ஒன்றாகும். இது சேமிப்பு, சுகாதாரம், தனியுரிமை மற்றும் நுகர்வோர் நடத்தையை வடிவமைக்கிறது. நெறிமுறை தேர்வு கட்டமைப்பு விளைவுகளை மேம்படுத்த இயல்புநிலைகளைப் பயன்படுத்துகிறது; இருண்ட வடிவங்கள் அவற்றைப் சுரண்ட பயன்படுத்துகின்றன.
    professional_application:
      networking_and_relationship_building: |
        மற்றவர்களுக்கான செயல்முறைகளை வடிவமைக்கும்போது, அவர்களின் நலன்களுக்கு உதவும் இயல்புநிலைகளைத் தேர்ந்தெடுக்கவும். மதிப்பைப் பெறுவதற்காக இயல்புநிலைகளைப் பயன்படுத்தும் இருண்ட வடிவங்களைத் தவிர்க்கவும்.
      collaborative_learning_initiative: |
        குழு நடைமுறைகளுக்கு இயல்புநிலைகளை அமைக்கவும் (எ.கா., ஒத்திசைவுக்கு இயல்புநிலை, ஆவணப்படுத்தலுக்கு இயல்புநிலை) அவை விரும்பிய நடத்தையுடன் சீரமைக்கப்படுகின்றன. சரியான தேர்வை எளிதான தேர்வாக ஆக்குங்கள்.
    how_can_this_be_misapplied:
      dark_patterns: |
        மக்கள் பாதகமான தேர்வுகளில் சிக்க வைப்பதற்கு இயல்புநிலைகளைப் பயன்படுத்துதல் (எ.கா., மறைக்கப்பட்ட கட்டணங்கள், தேவையற்ற சந்தாக்கள்).
      paternalism: |
        சம்மதம் இல்லாமல் உண்மையான விருப்பத்தை மீறும் இயல்புநிலைகளை திணித்தல்.
      manipulation: |
        பாதகமான விதிமுறைகளை இயல்புநிலைகளில் மறைத்து செயலற்ற தன்மையை நம்புதல்.
      one_size_fits_all: |
        விருப்பத்தேர்வுகள் வேறுபடும்போது அனைவருக்கும் ஒரே இயல்புநிலை சரியானது என்று கருதுதல்.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: டன்னிங்-க்ரூகர் விளைவு
    quick_introduction: |
      டன்னிங்-க்ரூகர் விளைவு என்பது ஒரு அறிவாற்றல் சார்புநிலையை விவரிக்கிறது, இதில் ஒரு துறையில் குறைந்த அறிவு அல்லது திறன் உள்ளவர்கள் தங்கள் திறனை அதிகமாக மதிப்பிடுகிறார்கள், அதேசமயம் நிபுணர்கள் தங்கள் திறனை குறைத்து மதிப்பிட முனைகிறார்கள். உங்களுக்கு எவ்வளவு குறைவாகத் தெரியுமோ, அவ்வளவு நம்பிக்கையுடன் நீங்கள் இருக்கலாம்.
    one_liner: உங்களுக்கு எவ்வளவு குறைவாகத் தெரியுமோ, அவ்வளவு நம்பிக்கையுடன் நீங்கள் இருக்கலாம்.
    try_this:
      - புதிய துறைகளில், நீங்கள் அதிகமாக மதிப்பிடுகிறீர்கள் என்று கருதுங்கள்—கருத்துக்களைக் கேட்டு, சரிபார்த்துக் கொள்ளுங்கள்.
      - நிபுணர்கள் சந்தேகத்தை வெளிப்படுத்தும் போது, ​​அதை தீவிரமாக எடுத்துக் கொள்ளுங்கள்; அவர்கள் விளிம்பு நிலைகளை அறிந்திருக்கலாம்.
      - ஒரு துறையில் நிபுணர்களை விட புதியவர்கள் அதிக உறுதியுடன் இருக்கும்போது கவனிக்கவும்.
    ask_yourself:
      - நான் "முட்டாள்தனத்தின் உச்சியில்" அல்லது "தாழ்மையின் பள்ளத்தாக்கில்" இருக்கிறேனா?
      - எனது சொந்த திறனை மதிப்பிடும் அறிவாற்றல் திறனை நான் இங்கு பெற்றிருக்கிறேனா?
    in_more_detail: |
      டன்னிங் மற்றும் க்ரூகரின் ஆராய்ச்சி, திறமையற்ற தனிநபர்களுக்கு தங்கள் சொந்த திறமையின்மையை அங்கீகரிக்கும் அறிவாற்றல் திறன் இல்லை என்பதைக் காட்டியது. உங்கள் செயல்திறனை மதிப்பிடுவதற்கு, திறம்பட செயல்படத் தேவையான அதே திறன்கள் தேவை—எனவே திறமையற்றவர்கள் இரட்டை பின்னடைவை எதிர்கொள்கிறார்கள்: அவர்கள் மோசமாக செயல்படுகிறார்கள், அது அவர்களுக்குத் தெரியாது.

      திறமை அதிகரிக்கும் போது, ​​மக்கள் பெரும்பாலும் "தாழ்மையின் பள்ளத்தாக்கை" அனுபவிக்கிறார்கள், அங்கு அவர்களுக்கு எவ்வளவு தெரியாது என்பதை அவர்கள் உணர்கிறார்கள். உண்மையான நிபுணர்கள் குறைந்த நம்பிக்கையுடன் இருக்கலாம், ஏனெனில் அவர்கள் நுணுக்கங்கள் மற்றும் விளிம்பு நிலைகளை மிகத் தெளிவாக அறிந்திருக்கிறார்கள்.
    why_this_is_important: |
      டன்னிங்-க்ரூகர் விளைவை அங்கீகரிப்பது உங்கள் சொந்த நம்பிக்கையை சரிசெய்யவும், புதியவர்களின் கருத்துக்களை அதிகமாக மதிப்பிடுவதைத் தவிர்க்கவும், நிபுணர்களின் தாழ்மையை மதிக்கவும் உதவுகிறது. இது கற்றல், பணியமர்த்தல் மற்றும் முடிவெடுப்பதற்கு அவசியம்.
    when_to_use:
      - கற்றல்
      - முடிவெடுத்தல்
      - தலைமைத்துவம்
      - தொழில்_முன்னேற்றம்
    how_can_you_spot_it:
      novice_overconfidence: |
        குறைந்த அனுபவம் உள்ள ஒருவர் வலுவான, தகுதிவாய்ந்த கருத்துக்களை வெளிப்படுத்துகிறார்.
      expert_underconfidence: |
        அதிக திறமையானவர்கள், குறைந்த திறமையானவர்களை விட அதிகமாக சந்தேகம் தெரிவிக்கிறார்கள்.
      inability_to_recognize_quality: |
        மோசமான செயல்திறன் கொண்டவர்கள் தங்கள் துறையில் நல்ல மற்றும் கெட்ட வேலைகளுக்கு இடையில் வேறுபடுத்த முடியாது.
      confidence_competence_mismatch: |
        ஆரம்பநிலையாளர்களிடையே நம்பிக்கை மற்றும் உண்மையான திறமை நேர்மாறாக தொடர்புடையவை.
    examples:
      social_media: |
        ஒரு தலைப்பைப் பற்றிய மேலோட்டமான அறிவு உள்ளவர்கள், அந்தத் துறையின் நிபுணர்களுடன் நம்பிக்கையுடன் வாதிடுகிறார்கள்.
      hiring: |
        நேர்காணல்களில் மோசமாக செயல்பட்ட வேட்பாளர்கள் சில சமயங்களில் தங்கள் சொந்த செயல்திறனை அதிகமாக மதிப்பிடுகிறார்கள்.
      investing: |
        புதிய முதலீட்டாளர்கள் ஆரம்ப வெற்றிகளுக்குப் பிறகு அதிகமாக நம்பிக்கையுடன் இருக்கலாம், அதிர்ஷ்டத்தை அவர்கள் அங்கீகரிக்காமல் இருக்கலாம்.
      workplace: |
        இளைய ஊழியர்கள் பதவி உயர்வுக்கான தங்கள் தயார்நிலையை அதிகமாக மதிப்பிடலாம், அதே நேரத்தில் மூத்தவர்கள் தங்களை சந்தேகிப்பார்கள்.
    real_world_implications: |
      டன்னிங்-க்ரூகர் விளைவு கல்வி, பணியமர்த்தல், அரசியல் மற்றும் பொது விவாதங்களை பாதிக்கிறது. கெட்ட யோசனைகள் ஏன் பெருக்கப்படுகின்றன என்பதையும், நிபுணர்கள் ஏன் புறக்கணிக்கப்படலாம் என்பதையும் இது விளக்குகிறது. தனிப்பட்ட மற்றும் கூட்டு முடிவெடுப்பதற்கு சரிபார்த்தல் முக்கியம்.
    professional_application:
      networking_and_relationship_building: |
        ஒருவர் மிகுந்த நம்பிக்கையுடன் இருக்கும்போது, ​​அவர்கள் டன்னிங்-க்ரூகர் மண்டலத்தில் இருக்கலாம் என்று கருதுங்கள். சந்தேகத்தை வெளிப்படுத்துபவர்களிடமிருந்தும், பல்வேறு கண்ணோட்டங்களை நாடுங்கள்.
      collaborative_learning_initiative: |
        சந்தேகத்தை ஒப்புக்கொள்வது பாராட்டப்படும் கலாச்சாரங்களை உருவாக்குங்கள். சரிபார்த்தல் பயிற்சிகள் மற்றும் தங்கள் திறனை துல்லியமாக மதிப்பிடுவதற்கு மக்களை உதவும் கருத்துக்களை ஊக்குவிக்கவும்.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        நம்பிக்கையானவர்கள் எப்போதும் தவறு என்று கருதுவது; சில சமயங்களில் நம்பிக்கை நியாயமானது.
      false_modesty: |
        நிபுணர்கள் தாழ்மையாக தோன்றுவதற்காக தங்களுக்குத் தெரிந்ததை விட குறைவாக நடிப்பது.
      gatekeeping: |
        "நிபுணர்களின்" கருத்துக்களுடன் உடன்படாத எவரையும் அவர்களின் வாதங்களில் ஈடுபடாமல் புறக்கணிக்க டன்னிங்-க்ரூகரைப் பயன்படுத்துதல்.
      self_doubt_paralysis: |
        உங்கள் சொந்த தீர்ப்பை ஒருபோதும் நம்பாத அளவுக்கு அதிகமாக சரிசெய்வது.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: இரக்க இடைவெளி
    quick_introduction: |
      நாம் ஒரு வித்தியாசமான மனநிலையில் இருக்கும்போது, மற்றவர்களின் மனநிலையை
      புரிந்துகொள்வதிலும் கணிப்பதிலும் உள்ள சிரமம் இரக்க இடைவெளி ஆகும்.
      நாம் அமைதியாக இருக்கும்போது, கோபமாக அல்லது பசியாக இருக்கும்போது நாம் எப்படி
      உணர்வோம் என்பதை குறைத்து மதிப்பிடுகிறோம். நாம் வயிறார சாப்பிட்டிருக்கும்போது,
      பசியாக இருக்கும்போது நமக்கு எவ்வளவு உணவு தேவைப்படும் என்பதை குறைத்து மதிப்பிடுகிறோம்.
    one_liner: நாம் வித்தியாசமான மனநிலைகளில் எப்படி உணர்வோம்—மற்றும் மற்றவர்கள் எப்படி உணர்வார்கள்—என்பதை நாம் குறைத்து மதிப்பிடுகிறோம்.
    try_this:
      - அமைதியாக இருக்கும்போது, நீங்கள் மன அழுத்தத்தில் இருக்கும்போது உங்களுக்காக வாக்குறுதிகளை மேற்கொள்ளுங்கள்; முன்கூட்டியே வாக்குறுதி கொடுங்கள்.
      - நீங்கள் இல்லாத ஒரு நிலையில் உள்ள மற்றவர்களைத் தீர்ப்பளிக்காதீர்கள்—பசியாக, களைப்பாக, பயமாக.
      - கேளுங்கள்: நான் எனது தற்போதைய நிலையை எனது எதிர்கால சுயத்திற்கோ அல்லது மற்றவர்களுக்கோ திணிக்கிறேனா?
    ask_yourself:
      - நான் ஒரு வித்தியாசமான நிலையில் எப்படி உணர்வேன் என்பதை குறைத்து மதிப்பிடுகிறேனா?
      - நான் அவர்களின் நிலையில் இருந்திருந்தால் இந்த நபரை நான் நன்றாகப் புரிந்துகொள்வேனா?
    in_more_detail: |
      வெவ்வேறு சூழ்நிலைகளில் நாம் எப்படி உணர்வோம்—மற்றும் நாம் தற்போது இல்லாத நிலைகளில் மற்றவர்கள் எப்படி உணர்கிறார்கள் என்பதை கற்பனை செய்வதில் எங்களுக்கு சிரமம் உள்ளது. ஒரு மது அருந்தாதவர் அடிமைத்தனத்தின் கவர்ச்சியை குறைத்து மதிப்பிடுகிறார். நன்கு ஓய்வெடுத்தவர் தூக்கமின்மையின் தாக்கத்தை குறைத்து மதிப்பிடுகிறார். நமது தற்போதைய நிலையை மற்றவர்களுக்கும் நமது எதிர்கால சுயத்திற்கும் திணிக்கிறோம்.

      இரக்க இடைவெளி நமது எதிர்கால சுயத்திற்காக நாம் எடுக்கும் முடிவுகளை (எ.கா., நாம் ஊக்கத்துடன் இருக்கும்போது உடற்பயிற்சிக்கு உறுதியளித்தல்), நாம் மற்றவர்களுக்காக எடுக்கும் முடிவுகளை, மற்றும் வெவ்வேறு நிலைகளில் உள்ளவர்களைப் புரிந்துகொள்ளும் நமது திறனைப் பாதிக்கிறது.
    why_this_is_important: |
      இரக்க இடைவெளியை அங்கீகரிப்பது எதிர்கால உங்களுக்கான முடிவெடுக்கும் திறனை, மற்றவர்களுக்கான இரக்கத்தை, மற்றும் நமது சொந்த மாறுபாட்டைப் பற்றிய புரிதலை மேம்படுத்துகிறது. நாம் ஏன் நிறைவேற்ற முடியாத வாக்குறுதிகளை அளிக்கிறோம் என்பதையும், துயரத்தில் உள்ள மற்றவர்களை நாம் ஏன் தவறாகப் புரிந்துகொள்கிறோம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - உறவு_கட்டுதல்
      - தலைமைத்துவம்
      - மோதல்_தீர்வு
    how_can_you_spot_it:
      current_state_projection: |
        மற்றவர்கள் இப்போது நாம் எப்படி உணர்கிறோமோ அப்படி உணர்வார்கள், அல்லது எதிர்காலத்தில் நாம் இப்போது எப்படி உணர்கிறோமோ அப்படி உணர்வார்கள் என்று கருதுவது.
      underestimating_emotional_state: |
        அவர்கள் இருக்கும் நிலையில் நாம் இல்லாதபோது, "என்ன பெரிய விஷயம்?"
      commitment_failures: |
        தற்போதைய உந்துதலின் அடிப்படையில் நாம் பின்பற்ற முடியாத தேர்வுகளைச் செய்தல், உந்துதல் குறையும்போது.
      misunderstanding_others: |
        நமது தற்போதைய நிலையிலிருந்து கற்பனை செய்ய முடியாததால் மற்றவர்களின் அனுபவங்களை நிராகரிப்பது.
    examples:
      hunger: |
        வயிறார சாப்பிட்டிருக்கும்போது மளிகை சாமான்கள் வாங்குவது—பசியாக இருக்கும்போது நமக்குத் தேவையானதை விட குறைவாக வாங்குகிறோம்.
      addiction: |
        போதைக்கு அடிமையாகாதவர்கள் நிறுத்துவதில் உள்ள சிரமத்தை குறைத்து மதிப்பிடுகிறார்கள்; மீண்டு வருபவர்கள் அவர்கள் பயன்படுத்தும்போது அதன் கவர்ச்சியை குறைத்து மதிப்பிடலாம்.
      conflict: |
        அமைதியாக இருக்கும்போது, மோதலின் போது நாம் எப்படி எதிர்வினையாற்றுவோம் என்பதை நாம் குறைத்து மதிப்பிடுகிறோம்.
      motivation: |
        நாம் ஊக்கத்துடன் இருக்கும்போது காலை 6 மணி வகுப்பிற்கு பதிவு செய்வது—மற்றும் நாம் தூக்கக் கலக்கத்தில் இருக்கும்போது செல்லாமல் இருப்பது.
    real_world_implications: |
      இரக்க இடைவெளி போதைப்பொருள் சிகிச்சை, கொள்கை, மற்றும் தனிப்பட்ட புரிதல் ஆகியவற்றைப் பாதிக்கிறது. நாம் உடைக்கும் வாக்குறுதிகளை இது விளக்குகிறது மற்றும் மற்றவர்களின் கண்ணோட்டங்களைப் புரிந்துகொள்வதில் நாம் அடிக்கடி ஏன் தோல்வியடைகிறோம் என்பதையும் விளக்குகிறது. இது இரக்கம் மற்றும் நல்ல முடிவெடுப்பதற்கு ஒரு தடையாகும்.
    professional_application:
      networking_and_relationship_building: |
        ஒருவர் மன அழுத்தத்தில், கோபமாக, அல்லது வேறு நிலையில் இருக்கும்போது, அவர்கள் நீங்கள் சிந்திப்பதைப் போலவே சிந்திப்பார்கள் என்று கருதாதீர்கள். அவர்களின் நிலையை கற்பனை செய்ய முயற்சிக்கவும். வாக்குறுதிகளைச் செய்யும்போது, உந்துதல் குறையும்போது நீங்கள் எப்படி உணர்வீர்கள் என்பதைக் கவனியுங்கள்.
      collaborative_learning_initiative: |
        திட்டமிடும்போது, குழுவினர் சோர்வாக, அழுத்தத்தில், அல்லது விரக்தியாக இருக்கும்போது எப்படி உணர்வார்கள் என்பதைக் கவனியுங்கள். ஊக்கமளிக்கும் திட்டமிடும் நிலைக்கு மட்டுமல்லாமல், அந்த நிலைகளுக்காக வடிவமைக்கவும்.
    how_can_this_be_misapplied:
      overattribution: |
        சில சமயங்களில் மக்கள் உண்மையாகவே வெவ்வேறு மதிப்புகளைக் கொண்டிருக்கும்போது, எல்லா தவறான புரிதல்களையும் "இரக்க இடைவெளி" என்று நிராகரிப்பது.
      excusing_behavior: |
        மக்கள் தங்கள் நிலைகளை நிர்வகிப்பதற்குப் பொறுப்பாக இருக்கும்போது, "அவர்களால் உதவ முடியவில்லை—இரக்க இடைவெளி".
      false_relativism: |
        முயற்சி மற்றும் அனுபவத்துடன் நாம் மேம்பட முடியும் என்பதை உணராமல், நாம் ஒருபோதும் மற்றவர்களைப் புரிந்துகொள்ள முடியாது என்று கருதுவது.
      self_excuse: |
        நமது சொந்த நிறைவேற்ற முடியாத செயல்களுக்கு நியாயப்படுத்த இரக்க இடைவெளியைப் பயன்படுத்துவது.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: உடைமைப் பற்றுக் கோளாறு
    quick_introduction: |
      உடைமைப் பற்றுக் கோளாறு என்பது, நாம் எதையாவது சொந்தமாகக் கொண்டிருப்பதால் மட்டும் அதன் மதிப்பை அதிகமாகக் கருதும் போக்கு ஆகும். அதை இழக்க நாம் அதிகமாகக் கேட்போம், அதை வாங்குவதற்கு நாம் செலவிட விரும்பும் தொகையை விட. உடைமை என்பது ஒரு பற்றை உருவாக்குகிறது, அது நமது மதிப்பீட்டைத் திரித்துக் காட்டுகிறது.
    one_liner: நாம் சொந்தமாக வைத்திருப்பதை, சொந்தமாக இல்லாததை விட அதிகமாக மதிக்கிறோம்—உடைமை ஒரு பற்றை உருவாக்குகிறது.
    try_this:
      - Ask: இதை நான் சொந்தமாக வைத்திருக்கவில்லை என்றால், இதை வாங்க நான் என்ன செலவிடுவேன்?
      - விற்கும்போது, ​​நீங்கள் வாங்குவதாக கற்பனை செய்து பாருங்கள்—உங்கள் கேட்கும் விலையை நீங்கள் செலுத்துவீர்களா?
      - உங்கள் உடைமை உங்கள் மதிப்பீட்டைப் பெருக்குவதை எப்போது கவனிக்கிறீர்கள்.
    ask_yourself:
      - நான் இதை சொந்தமாக வைத்திருப்பதால் அதிகமாக மதிப்பிடுகிறேனா?
      - ஒரு நடுநிலையான வாங்குபவர் எனது விலையுடன் ஒப்புக்கொள்வாரா?
    in_more_detail: |
      சோதனைகளில், தோராயமாக ஒரு குவளை வழங்கப்பட்டவர்கள், அதை விற்கக் கேட்பது, மற்றவர்கள் அதை வாங்க விரும்புவதை விட சுமார் இரு மடங்கு அதிகமாக இருந்தது. உடைமையின் வெறுமையான உண்மை உணரப்பட்ட மதிப்பை அதிகரிக்கிறது. இது இழப்புத் தவிர்ப்பு-க்குத் தொடர்புடையது—எதையாவது விட்டுக்கொடுப்பது இழப்பாகத் தோன்றுகிறது, மேலும் நாம் இழப்பு-தவிர்ப்பாளர்கள். ஆனால் இதன் விளைவு அதற்கு அப்பாற்பட்டது: நாம் சொந்தமான பொருட்களை நமது அடையாளத்துடன் இணைக்கிறோம்.

      உடைமைப் பற்றுக் கோளாறு பேச்சுவார்த்தைகள், நுகர்வோர் நடத்தை மற்றும் நிறுவன மாற்றங்களைப் பாதிக்கிறது. மக்கள் தங்கள் வீடுகள், தங்கள் யோசனைகள் மற்றும் தற்போதைய பாத்திரங்களை ஏன் அதிகமாக மதிப்பிடுகிறார்கள் என்பதை இது விளக்குகிறது. இது வர்த்தகம் மற்றும் மாற்றங்களில் உராய்வை உருவாக்குகிறது.
    why_this_is_important: |
      உடைமைப் பற்றுக் கோளாறை அங்கீகரிப்பது, நீங்கள் மிகவும் திறம்பட பேச்சுவார்த்தை நடத்தவும், எதை வைத்திருக்க வேண்டும் அல்லது விட்டுவிட வேண்டும் என்பது குறித்து தெளிவான முடிவுகளை எடுக்கவும், மற்றவர்கள் அவர்களிடம் உள்ளதை ஏன் அதிகமாக மதிப்பிடுகிறார்கள் என்பதைப் புரிந்துகொள்ளவும் உதவுகிறது. இது மாற்றத்திற்கான எதிர்ப்பையும் விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - பேச்சுவார்த்தை
      - முதலீடு
      - தொழில்_மாற்றங்கள்
    how_can_you_spot_it:
      ownership_premium: |
        "நான் அதை அந்த விலைக்கு விற்க மாட்டேன்" நீங்கள் அதை வாங்க அந்த விலையைச் செலுத்த மாட்டீர்கள் என்றால்.
      attachment_to_possession: |
        நாம் எதையாவது வைத்த பிறகு அதை அதிகமாக மதிப்பிடுகிறோம்.
      resistance_to_trading: |
        அது பகுத்தறிவுக்குட்பட்டதாக இருந்தாலும் கூட வர்த்தகம் அல்லது பரிமாற்றம் செய்ய தயங்குதல்.
      overvaluation_of_own_ideas: |
        நமது யோசனைகள், திட்டங்கள் அல்லது பாத்திரங்கள் நமக்கு சொந்தமானவை என்பதால் அதிக மதிப்புள்ளதாகத் தோன்றுகிறது.
    examples:
      real_estate: |
        வீட்டு உரிமையாளர்கள் பெரும்பாலும் தங்கள் வீடுகளுக்கு அதிக விலை நிர்ணயிக்கிறார்கள்—சந்தையை விட அவர்கள் அதை அதிகமாக மதிப்பிடுகிறார்கள்.
      negotiations: |
        விற்பவர்கள் வாங்குபவர்கள் செலுத்த விரும்புவதை விட அதிகமாகக் கேட்கிறார்கள்; அந்த இடைவெளி உடைமைப் பற்றுக் கோளாறைப் பிரதிபலிக்கிறது.
      career: |
        ஒரு மாற்றத்தைக் கருத்தில் கொள்ளும்போது நமது தற்போதைய வேலை, நிறுவனம் அல்லது பாத்திரத்தை அதிகமாக மதிப்பிடுதல்.
      ideas: |
        "இங்கு கண்டுபிடிக்கப்படவில்லை" மற்றும் "எனது யோசனை" சார்பு—நாம் உருவாக்கிய அல்லது சொந்தமானவற்றை அதிகமாக மதிப்பிடுகிறோம்.
    real_world_implications: |
      உடைமைப் பற்றுக் கோளாறு சந்தை உராய்வை உருவாக்குகிறது, நன்மை பயக்கும் பரிமாற்றங்களை மெதுவாக்குகிறது, மேலும் மாற்றத்திற்கான எதிர்ப்பை அதிகரிக்கிறது. இது இணைப்புகள், மறுசீரமைப்புகள் மற்றும் தனிப்பட்ட மாற்றங்களைப் பாதிக்கிறது. அதைப் புரிந்துகொள்வது பேச்சுவார்த்தை மற்றும் மாற்ற மேலாண்மையை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        யாராவது மாற்றத்தை எதிர்க்கும்போது, ​​அவர்கள் உடைமைப் பற்றுக் கோளாறை அனுபவிக்கக்கூடும் என்று கருதுங்கள்—அவர்கள் நிலைமையை "சொந்தமாக" வைத்திருப்பதால் அதை அதிகமாக மதிப்பிடுகிறார்கள். எதைக் கொடுக்கிறார்கள் என்பதை மட்டும் குறிப்பிடாமல், அவர்கள் என்ன பெறுகிறார்கள் என்பதை அடிப்படையாகக் கொண்டு மாற்றத்தை வடிவமைக்கவும்.
      collaborative_learning_initiative: |
        புதிய செயல்முறைகளை அறிமுகப்படுத்தும்போது, ​​மக்கள் தற்போதைய வழிகளில் பற்றுக் கொண்டுள்ளனர் என்பதை ஒப்புக் கொள்ளுங்கள். புதியதை ஏற்றுக்கொள்வதற்கு முன்பு பழையதை "விட்டுக்கொடுக்க" உளவியல் பாதுகாப்பை உருவாக்கவும்.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        சில பற்றுதல் பகுத்தறிவுக்குட்பட்டது—உணர்ச்சிப்பூர்வமான மதிப்பு, மாற்றுச் செலவுகள். எல்லா எதிர்ப்பும் உடைமைப் பற்றுக் கோளாறு அல்ல.
      manipulation: |
        அதிக விலைகளைப் பெற ஒரு போலி உடைமை உணர்வை உருவாக்குதல் (எ.கா., உடைமைப் பற்றைத் தூண்டுவதற்கு "இலவசமாக முயற்சி செய்யுங்கள்").
      undervaluing_continuity: |
        எல்லா மாற்ற எதிர்ப்பும் பகுத்தறிவற்றது என்று கருதுவது, தொடர்ச்சிக்கு உண்மையான மதிப்பு இருக்கும்போது.
      cold_rationality: |
        உணர்ச்சிப்பூர்வமான பற்றை "வெறும் உடைமைப் பற்றுக் கோளாறு" என்று புறக்கணித்தல், அது உண்மையான மதிப்புகளைப் பிரதிபலிக்கும் போது.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: தவறான ஒருமித்த கருத்து விளைவு
    quick_introduction: |
      தவறான ஒருமித்த கருத்து விளைவு என்பது மற்றவர்கள் நமது நம்பிக்கைகள், அணுகுமுறைகள் மற்றும் நடத்தைகளுடன் எவ்வளவு உடன்படுகிறார்கள் என்பதை மிகைப்படுத்தி மதிப்பிடும் ஒரு போக்கு ஆகும். நமது பார்வைகள் உண்மையில் இருப்பதை விட பொதுவானவை என்று நாம் கருதுகிறோம், மேலும் நியாயமானவர்கள் கூட மாறுபட முடியும் என்று கற்பனை செய்ய நாம் சிரமப்படுகிறோம்.
    one_liner: மற்றவர்கள் நம்முடன் எவ்வளவு உடன்படுகிறார்கள் என்பதை நாம் மிகைப்படுத்தி மதிப்பிடுகிறோம்.
    try_this:
      - கருத்து வேறுபாடு கொண்டவர்களை தீவிரமாகத் தேடுங்கள் - ஒருமித்த கருத்தை யூகிக்க வேண்டாம்.
      - தொடங்கும் முன், உங்கள் அனுமானங்களைப் பகிர்ந்து கொள்ளாதவர்களுடன் சோதிக்கவும்.
      - கேளுங்கள்: கருத்து வேறுபாடு கொண்ட ஒருவர் என்ன சொல்வார்? அதை தீவிரமாக எடுத்துக் கொள்ளுங்கள்.
    ask_yourself:
      - மற்றவர்கள் என்னைப் போலவே சிந்திக்கிறார்கள் என்று நான் யூகிக்கிறேனா?
      - மற்றவரின் மாறுபட்ட பார்வையில் நான் கடைசியாக எப்போது ஆச்சரியப்பட்டேன்?
    in_more_detail: |
      நாம் ஒரு நிலைப்பாட்டை வைத்திருக்கும்போது, ​​அதுவே இயல்பு என்று நாம் நினைக்க முனைகிறோம். நாம் நம்மைப் போன்ற எண்ணம் கொண்டவர்களால் சூழப்பட்டிருப்போம், உறுதிப்படுத்தும் ஊடகங்களை உட்கொள்வோம், மேலும் தெளிவற்ற பின்னூட்டங்களை உடன்பாடாகப் புரிந்துகொள்வோம். இது ஒருமித்த கருத்தின் மாயையை வலுப்படுத்தும் ஒரு எதிரொலி அறையை உருவாக்குகிறது.

      ஆழமாகப் பதிக்கப்பட்ட நம்பிக்கைகளுக்கும், நமது நிலைப்பாட்டில் நாம் அதிகமாக முதலீடு செய்திருக்கும்போதும் இந்த விளைவு வலுவாக இருக்கும். மற்றவர்கள் மாறுபடும்போது ஆச்சரியம், பேச்சுவார்த்தையில் சிரமம், மற்றும் வாடிக்கையாளர்கள் நம்மைப் போலவே சிந்திக்கிறார்கள் என்று நாம் யூகிக்கையில் மோசமான சந்தை ஆராய்ச்சிக்கு இது வழிவகுக்கும்.
    why_this_is_important: |
      தவறான ஒருமித்த கருத்து விளைவை அங்கீகரிப்பது, உண்மையான கருத்து வேறுபாடுகளுக்கு உங்களைத் தயார்படுத்தவும், சிறந்த ஆராய்ச்சியை நடத்தவும், மேலும் திறம்பட தொடர்பு கொள்ளவும் உதவுகிறது. இது தயாரிப்பு மேம்பாடு, பேச்சுவார்த்தை மற்றும் தலைமைத்துவத்திற்கு அவசியமானது.
    when_to_use:
      - முடிவெடுத்தல்
      - பேச்சுவார்த்தை
      - தலைமைத்துவம்
      - சிக்கல்_தீர்வு
    how_can_you_spot_it:
      surprise_at_disagreement: |
        உங்களுக்குத் தெளிவாகத் தோன்றுவதோடு ஒருவர் மாறுபடும்போது நீங்கள் உண்மையில் அதிர்ச்சியடைகிறீர்கள்.
      assuming_shared_values: |
        சரிபார்க்காமல் மற்றவர்கள் உங்கள் முன்னுரிமைகளைப் பகிர்ந்து கொள்கிறார்கள் என்று நீங்கள் செயல்படுகிறீர்கள்.
      underestimating_opposition: |
        திட்டங்கள் அவர்கள் எதிர்கொள்வதை விட குறைவான எதிர்ப்பை சந்திக்கும் என்று நீங்கள் எதிர்பார்க்கிறீர்கள்.
      echo_chamber_detection: |
        உங்கள் சமூக மற்றும் தகவல் சூழல் அரிதாகவே உங்கள் கருத்துக்களை சவால் செய்கிறது.
    examples:
      product_development: |
        ஒரு குழு ஒரு அம்சத்தை பயனர்கள் விரும்புவார்கள் என்று யூகிக்கிறது, ஏனெனில் குழுவில் உள்ள அனைவரும் அதை விரும்புகிறார்கள் - ஆனால் குறைந்த பயன்பாட்டைக் கண்டறிகிறார்கள்.
      politics: |
        ஒரு அரசியல் குமிழியில் உள்ளவர்கள், தேர்தல் முடிவுகள் தங்கள் எதிர்பார்ப்புகளுடன் பொருந்தாமல் அதிர்ச்சியடைகிறார்கள்.
      negotiation: |
        மற்ற தரப்பினர் விதிமுறைகளுக்கு உடன்படுவார்கள் என்று கருதுவது, ஏனெனில் அவை உங்களுக்கு "நியாயமானதாக" தோன்றுகின்றன.
      hiring: |
        "கலாச்சாரப் பொருத்தம்" என்பதற்காக பணியமர்த்துவது, உங்களுடன் உடன்படும் நபர்களை பணியமர்த்துவதைக் குறிக்கலாம், தவறான ஒருமித்த கருத்தை வலுப்படுத்தும்.
    real_world_implications: |
      தவறான ஒருமித்த கருத்து விளைவு துருவப்படுத்தல், தோல்வியுற்ற தயாரிப்பு வெளியீடுகள் மற்றும் முறிந்த பேச்சுவார்த்தைகளுக்கு பங்களிக்கிறது. இது நமது கணிப்புகளில் நம்மை அதிக நம்பிக்கையுள்ளவர்களாகவும், கருத்து வேறுபாடுகளுக்கு குறைவான தயார்நிலையுடனும் ஆக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        வெவ்வேறு கண்ணோட்டங்கள் கொண்டவர்களை தீவிரமாகத் தேடுங்கள். பகிரப்பட்ட நம்பிக்கைகளை யூகிக்க வேண்டாம் - கேளுங்கள் மற்றும் கேளுங்கள்.
      collaborative_learning_initiative: |
        குழுக்களில், கருத்து வேறுபாடு செலவு மிக்கதாக மாறுவதற்கு முன்பு வெளிக்கொணர கட்டமைக்கப்பட்ட கருத்து வேறுபாட்டை (எ.கா., "முன் மரணங்கள்," சாத்தானின் வழக்கறிஞர்) பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        மாறுபடுபவர்கள் நியாயமற்றவர்கள் அல்லது அறியாதவர்கள் என்று கருதுவது, அவர்களுக்கு செல்லுபடியாகும் மாறுபட்ட கண்ணோட்டங்கள் இருக்கலாம் என்பதை கருத்தில் கொள்வதற்குப் பதிலாக.
      poor_research: |
        "அவர்களுக்கு என்ன வேண்டும் என்று எங்களுக்கு ஏற்கனவே தெரியும்" என்பதால் வாடிக்கையாளர் ஆராய்ச்சியைத் தவிர்ப்பது.
      overconfidence: |
        மற்றவர்கள் உடன்படுவார்கள் என்ற அனுமானத்தின் அடிப்படையில் தைரியமான பந்தயங்களைச் செய்வது.
      groupthink_amplification: |
        தவறான ஒருமித்த கருத்து விளைவை சவால் செய்யாத குழுக்கள் குழு சிந்தனையில் சுழலக்கூடும்.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: சட்டக விளைவு
    quick_introduction: |
      சட்டக விளைவு என்பது, ஒரே மாதிரியான உண்மைகள் இருந்தாலும், விருப்பங்கள் எவ்வாறு வழங்கப்படுகின்றன என்பதைப் பொறுத்து நமது முடிவுகள் மாறும் போக்காகும். "90% உயிர்வாழ்வு" மற்றும் "10% இறப்பு" ஆகியவை ஒரே விளைவை விவரிக்கின்றன, ஆனால் வெவ்வேறு தேர்வுகளைத் தூண்டுகின்றன. சட்டகம் முடிவை வடிவமைக்கிறது.
    one_liner: ஒரே உண்மைகள், வெவ்வேறு சட்டகங்களில், வெவ்வேறு முடிவுகளுக்கு வழிவகுக்கும்.
    try_this:
      - முடிவு செய்வதற்கு முன் விருப்பங்களை பல வழிகளில் மறுசட்டகம் செய்யுங்கள் - ஆதாய சட்டகம் மற்றும் இழப்பு சட்டகம்.
      - ஏதேனும் ஒன்று எவ்வாறு வார்த்தைப்படுத்தப்படுகிறது என்பதைப் பொறுத்து உங்கள் தேர்வு மாறும் போது கவனியுங்கள்.
      - கேளுங்கள்: சட்டகம் நீக்கப்பட்டு, அடிப்படை உண்மைகள் என்ன?
    ask_yourself:
      - இது ஒரு ஆதாயமாக சட்டகப்படுத்தப்பட்டால் vs. ஒரு இழப்பாக சட்டகப்படுத்தப்பட்டால் நான் வித்தியாசமாக முடிவு செய்வேனா?
      - நான் சட்டகத்திற்குப் பதிலளிக்கிறேனா அல்லது உண்மையான விளைவுக்குப் பதிலளிக்கிறேனா?
    in_more_detail: |
      கான்மன் மற்றும் ட்வர்ஸ்கி ஆகியோர், விருப்பங்கள் ஆதாயங்களாக சட்டகப்படுத்தப்படும்போது மக்கள் இழப்புத் தவிர்ப்பவர்களாகவும், இழப்புகளாக சட்டகப்படுத்தப்படும்போது இழப்பு நாடுபவர்களாகவும் இருப்பார்கள் என்று காட்டினர் - ஒரே விளைவுகளுக்கும் கூட. நேர்மறை சட்டகம் ("200 உயிர்களைக் காப்பாற்று") vs. எதிர்மறை சட்டகம் ("400 பேர் இறப்பார்கள்") விருப்பங்களை மாற்றுகிறது. இழப்பு சட்டகங்கள் சமமான ஆதாய சட்டகங்களை விட வலுவான உணர்ச்சிபூர்வமான பதில்களைத் தூண்டுகின்றன.

      சட்டக விளைவு மருத்துவ முடிவுகள், கொள்கை, சந்தைப்படுத்தல் மற்றும் பேச்சுவார்த்தைகளில் தாக்கத்தை ஏற்படுத்துகிறது. இது மிகவும் சக்திவாய்ந்த மற்றும் நன்கு ஆவணப்படுத்தப்பட்ட சார்புகளில் ஒன்றாகும். விழிப்புணர்வு உதவுகிறது, ஆனால் அதை முழுமையாக சமாளிப்பது கடினம்.
    why_this_is_important: |
      சட்டக விளைவை அங்கீகரிப்பது, நீங்கள் மிகவும் சீரான முடிவுகளை எடுக்கவும், கையாளுதலை எதிர்க்கவும், மிகவும் திறம்பட தொடர்புகொள்ளவும் உதவுகிறது. இது ஏன் ஒரே சலுகை விளக்கத்தைப் பொறுத்து ஏற்றுக்கொள்ளப்படலாம் அல்லது நிராகரிக்கப்படலாம் என்பதையும் விளக்குகிறது.
    when_to_use:
      - முடிவு_செய்தல்
      - பேச்சுவார்த்தை
      - தலைமைத்துவம்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        ஒரே விளைவை ஆதாயம் vs. இழப்பாக சட்டகப்படுத்துவது வெவ்வேறு தேர்வுகளை உருவாக்குகிறது.
      presentation_dependence: |
        சாராம்சத்தை மாற்றாமல், சட்டகம் மாறும்போது முடிவுகள் மாறும்.
      default_influence: |
        விருப்பங்கள் எவ்வாறு வரிசைப்படுத்தப்படுகின்றன அல்லது பெயரிடப்படுகின்றன என்பது தேர்வுகளை பாதிக்கிறது.
      emotional_trigger: |
        சில சட்டகங்கள் வலுவான உணர்ச்சிபூர்வமான பதில்களைத் தூண்டுகின்றன.
    examples:
      medical: |
        ஒரே நடைமுறைக்கான "90% உயிர்வாழ்வு" vs. "10% இறப்பு" -
        மக்கள் சட்டகத்தைப் பொறுத்து வித்தியாசமாகத் தேர்வு செய்கிறார்கள்.
      sales: |
        "$50 சேமிப்பு" vs. " $50 இழக்காதீர்கள்" - சமமான சட்டகங்கள், வெவ்வேறு
        உளவியல் தாக்கம்.
      policy: |
        "வரி நிவாரணம்" vs. "அரசு செலவினம்" - ஒரே கொள்கை, வெவ்வேறு
        அரசியல் பதில்.
      negotiation: |
        ஒரு சலுகையை "தள்ளுபடி" vs. "கூடுதல் கட்டணத்தைத் தவிர்த்தல்" என வழங்குவது
        ஏற்பு விகிதங்களை மாற்றுகிறது.
    real_world_implications: |
      சட்டக விளைவு விளம்பரம், அரசியல் மற்றும் பேச்சுவார்த்தைகளில் பயன்படுத்தப்படுகிறது. இது மருத்துவ முடிவுகள் மற்றும் கொள்கை ஆதரவை பாதிக்கிறது. மறுசட்டகம் செய்வது முடிவுகளையும் தொடர்பையும் மேம்படுத்தும். விழிப்புணர்வு உதவுகிறது ஆனால் விளைவை முழுமையாக அகற்றாது.
    professional_application:
      networking_and_relationship_building: |
        விருப்பங்களை வழங்கும் போது, பல சட்டகங்களைக் கவனியுங்கள். வெவ்வேறு சட்டகங்கள் எவ்வாறு வரவேற்பைப் பாதிக்கின்றன என்பதைச் சோதிக்கவும். தகவலைப் பெறும்போது, "இதை வேறு எப்படி சட்டகப்படுத்தலாம்?" என்று கேளுங்கள்.
      collaborative_learning_initiative: |
        முடிவு செய்யும் போது, சட்டக விளைவுகளைச் சரிபார்க்க விருப்பங்களை வெளிப்படையாக மறுசட்டகம் செய்யுங்கள். "நாம் இதை இழப்பாக சட்டகப்படுத்தினால், வித்தியாசமாக முடிவெடுப்போமா?" என்று கேளுங்கள். நியாயத்திற்காக சீரான சட்டகத்தைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      manipulation: |
        மக்கள் அறியாமலேயே விரும்பிய விளைவுகளை நோக்கி அவர்களை வழிநடத்த வேண்டுமென்றே சட்டகப்படுத்துதல்.
      false_equivalence: |
        சில சட்டகங்கள் முக்கியமான தகவல்களை மறைக்கும் போது, அனைத்து சட்டகங்களும் சமமாக செல்லுபடியாகும் என்று கருதுவது.
      overcorrection: |
        முழுவதுமாக சட்டகத்தைப் புறக்கணித்து, அது முக்கியமில்லை என்று கருதுவது -
        அது முக்கியம்.
      spin: |
        தெளிவுபடுத்துவதற்குப் பதிலாக திசை திருப்புவதற்கு சட்டகத்தைப் பயன்படுத்துதல்.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை
    quick_introduction: |
      மற்றவர்களின் நடத்தையை அவர்களின் குணம் அல்லது ஆளுமையுடன் தொடர்புபடுத்தி, ஆனால் நமது சொந்த நடத்தையை சூழ்நிலைக் காரணிகளுடன் தொடர்புபடுத்தும் போக்கு அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை எனப்படும். நாம் மற்றவர்களை அவர்களின் செயல்களால் மதிப்பிடுகிறோம், நம்மை நமது நோக்கங்களால் மதிப்பிடுகிறோம்.
    one_liner: நாம் மற்றவர்களை அவர்களின் செயல்களால், நம்மை நமது நோக்கங்களால் மதிப்பிடுகிறோம்.
    try_this:
      - யாராவது உங்களை எரிச்சலூட்டினால், கேளுங்கள்: இதை விளக்க என்ன சூழ்நிலைக் காரணிகள் இருக்கலாம்?
      - நீங்கள் உங்களுக்கு அளிக்கும் அதே தாராள மனப்பான்மையை மற்றவர்களுக்கும் பயன்படுத்துங்கள்.
      - மற்றவர்களின் நடத்தையை சூழ்நிலைக்குப் பதிலாக குணத்துடன் தொடர்புபடுத்தும்போது கவனியுங்கள்.
    ask_yourself:
      - நான் அவர்களின் நடத்தையை விளக்கும் விதத்திலேயே எனது சொந்த நடத்தையை விளக்குவேனா?
      - அவர்களின் சூழ்நிலையைப் பற்றி நான் எதையாவது தவறவிட்டேனா?
    in_more_detail: |
      ஒருவர் போக்குவரத்தில் நம்மை வெட்டிச் சென்றால், "என்ன முட்டாள்" என்று நினைக்கிறோம். நாம் யாரையாவது வெட்டிச் சென்றால், "நான் செய்ய வேண்டியிருந்தது—நான் அவசரத்தில் இருந்தேன்" என்று நினைக்கிறோம். நமது சொந்த தோல்விகளை சூழ்நிலையால் ("போக்குவரத்து மோசமாக இருந்தது") விளக்குகிறோம், மற்றவர்களின் தோல்விகளை மனநிலையால் ("அவர்கள் சோம்பேறிகள்") விளக்குகிறோம். இதற்கு நேர்மாறாகவும் நடக்கிறது: நாம் நம்மைப் பாராட்டுகிறோம், மற்றவர்களின் வெற்றியை அதிர்ஷ்டம் என்று கூறுகிறோம்.

      இந்த பிழை "அடிப்படை" ஆனது, ஏனெனில் இது பரவலாகவும், விடாப்பிடியாகவும் உள்ளது. இது பச்சாதாபத்தை குறைக்கிறது, மோதலைத் தூண்டுகிறது, மற்றும் செயல்திறன் மதிப்பீட்டைத் திரித்துக் காட்டுகிறது.
    why_this_is_important: |
      அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழையை அங்கீகரிப்பது உறவுகளை மேம்படுத்துகிறது, மோதலைக் குறைக்கிறது, மற்றும் நியாயமான தீர்ப்புகளுக்கு வழிவகுக்கிறது. ஒருவரின் "குணம் இதுதான்" என்று முடிவு செய்வதற்கு முன் சூழலைக் கருத்தில் கொள்ள இது ஊக்குவிக்கிறது.
    when_to_use:
      - உறவு_கட்டுமானம்
      - மோதல்_தீர்வு
      - தலைமைத்துவம்
      - முடிவெடுத்தல்
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        மற்றவர்களின் நடத்தையை விளக்கும்போது "அவர்கள் அப்படித்தான்"
      situational_explanation_for_self: |
        நமது சொந்த நடத்தையை விளக்கும்போது "எனக்கு வேறு வழியில்லை" அல்லது "சூழ்நிலைகள் என்னை கட்டாயப்படுத்தின"
      character_vs_context: |
        சூழ்நிலை நடத்தையை விளக்கும்போது குணத்தை அனுமானித்தல்.
      asymmetric_standards: |
        மற்றவர்களுக்கு நம்மை விட கடுமையான தரநிலைகளை வைத்திருத்தல்.
    examples:
      traffic: |
        மற்றொரு ஓட்டுநரின் தவறு = "மோசமான ஓட்டுநர்." நமது தவறு = "தவிர்க்க முடியாத சூழ்நிலை."
      workplace: |
        ஒரு சக ஊழியரின் காலக்கெடுவை தவறவிடுதல் = "பொறுப்பற்றவர்." நமது காலக்கெடுவை தவறவிடுதல் =
        "அதிக சுமை மற்றும் இதைவிட சிறப்பாக யாராலும் செய்திருக்க முடியாது."
      politics: |
        எதிர்ப்பாளர்களின் கருத்துக்கள் = "அவர்கள் முட்டாள் அல்லது தீயவர்கள்." நமது கருத்துக்கள் =
        "உண்மைகளுக்கு பகுத்தறிவு பதில்."
      performance: |
        மற்றவர்களின் வெற்றி = "அதிர்ஷ்டம்." நமது வெற்றி = "கடின உழைப்பால் சம்பாதித்தது."
    real_world_implications: |
      அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை மோதலைத் தூண்டுகிறது, குழுப்பணியைக் குறைக்கிறது, மற்றும் பணியமர்த்தல் மற்றும் செயல்திறன் மதிப்பீட்டைத் திரித்துக் காட்டுகிறது. இதைச் சரிசெய்வது நிறுவன கலாச்சாரம் மற்றும் தனிப்பட்ட உறவுகளை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        யாராவது உங்களை ஏமாற்றினால், அவர்கள் நம்பகத்தன்மையற்றவர்கள் அல்லது கடினமானவர்கள் என்று முடிவு செய்வதற்கு முன், "இதை விளக்க என்ன சூழ்நிலைக் காரணிகள் இருக்கலாம்?" என்று கேளுங்கள்.
      collaborative_learning_initiative: |
        பின்னூட்டம் மற்றும் மதிப்புரைகளில், "முதலில் சூழ்நிலை" விளக்கங்களை ஊக்குவிக்கவும்.
        குணத்துடன் தொடர்புபடுத்துவதற்கு முன் சூழலைக் கருத்தில் கொள்ள மேலாளர்களுக்கு பயிற்சி அளிக்கவும்.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        சில நடத்தை குணத்தை பிரதிபலிக்கும் போது, எல்லா செயல்களையும் "சூழ்நிலை" என்று கூறி ஒதுக்குதல்.
      no_accountability: |
        மக்கள் எடுத்த தேர்வுகளுக்கு பொறுப்பேற்காமல் தவிர்க்க இந்தப் பிழையைப் பயன்படுத்துதல்.
      self_deprecation: |
        எப்போதும் உங்களை நீங்களே குறை கூறுவதற்கும், மற்றவர்களின் பொறுப்பை ஒருபோதும் ஒப்புக்கொள்ளாததற்கும் மிகைப்படுத்துதல்.
      ignoring_patterns: |
        ஒருவர் சூழ்நிலைகள் முழுவதும் மீண்டும் மீண்டும் மோசமாக நடந்து கொண்டால், மனநிலை பொருத்தமானதாக இருக்கலாம்.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: சூதாட்டக்காரரின் தவறான நம்பிக்கை
    quick_introduction: |
      சூதாட்டக்காரரின் தவறான நம்பிக்கை என்பது கடந்த கால சுயாதீனமான நிகழ்வுகள்
      எதிர்காலத்தை பாதிக்கும் என்ற தவறான நம்பிக்கையாகும். தொடர்ச்சியான தலைகள்
      விழுந்த பிறகு, வால் "வர வேண்டிய நேரம்" என்று நாம் நினைக்கிறோம்—ஒவ்வொரு
      சுழற்சியும் சுயாதீனமானதாக இருந்தாலும். நாம் சீரற்ற தன்மையில் வடிவங்களைக்
      காண்கிறோம் மற்றும் தேவைப்படாதபோது "திருத்தம்" அல்லது "மீள்வீழ்ச்சியை"
      எதிர்பார்க்கிறோம்.
    one_liner: கடந்த கால சுயாதீனமான நிகழ்வுகள் எதிர்காலத்தை பாதிக்காது—நாணயத்திற்கு நினைவாற்றல் இல்லை.
    try_this:
      - நான் வெற்றி பெற வேண்டிய நேரம் வந்துவிட்டது என்று நீங்கள் நினைக்கும்போது, கேளுங்கள்: இந்த நிகழ்வுகள் உண்மையில் சுயாதீனமானவையா?
      - சராசரிக்கு மீள்வீழ்ச்சியை (உண்மையானது) சூதாட்டக்காரரின் தவறான நம்பிக்கையிலிருந்து (தவறானது) வேறுபடுத்துங்கள்.
      - நீங்கள் சீரற்ற தன்மையில் வடிவங்களைக் காணும்போது கவனியுங்கள்.
    ask_yourself:
      - அவை சுயாதீனமானவையாக இருக்கும்போது, கடந்த கால முடிவுகள் எதிர்காலத்தை பாதிக்கும் என்று நான் கருதுகிறேனா?
      - ஒரு புள்ளிவிவர நிபுணர் எனது "மாற்றத்திற்கான நேரம்" என்ற காரணத்தை ஒப்புக்கொள்வாரா?
    in_more_detail: |
      நியாயமான நாணய சுழற்சியில், ஒவ்வொரு சுழற்சியும் சுயாதீனமானது.
      தலை விழுவதற்கான நிகழ்தகவு எப்போதும் 50% ஆகும், கடந்த கால முடிவுகளைப்
      பொருட்படுத்தாமல். ஆனால் ஒரு முடிவின் நீண்ட ஓட்டம் மற்றொன்றை
      அதிக நிகழ்தகவாக ஆக்குகிறது என்று நாம் உணர்கிறோம். நாம் பெரிய
      எண்களின் விதியை (பல சோதனைகளில், முடிவுகள் சராசரியாகின்றன) குறுகிய
      கால "திருத்தத்துடன்" குழப்புகிறோம். சூதாட்ட விடுதிக்கு நினைவாற்றல்
      இல்லை.

      இந்த தவறான நம்பிக்கை சூதாட்டம், முதலீடு மற்றும் அன்றாட முடிவெடுத்தல்
      ஆகியவற்றை பாதிக்கிறது. "அதிர்ஷ்டம்" சமன் செய்யும் அல்லது நாம் வெற்றி
      பெற "வேண்டிய நேரம்" என்று நாம் கருதுகிறோம். சில சமயங்களில் நாம்
      சரியாக இருக்கிறோம்—ஆனால் தவறான காரணங்களுக்காக.
    why_this_is_important: |
      சூதாட்டக்காரரின் தவறான நம்பிக்கையை அங்கீகரிப்பது சூதாட்டம் மற்றும்
      முதலீட்டில் விலையுயர்ந்த தவறுகளைத் தடுக்கிறது. இது குறுகிய ஓட்டங்களை
      அதிகமாக விளக்குவதையும் மற்றும் தவறான மீள்வீழ்ச்சியை எதிர்பார்ப்பதையும்
      தவிர்க்க உதவுகிறது. இது உண்மையான சராசரிக்கு மீள்வீழ்ச்சியை தவறான
      நம்பிக்கையிலிருந்து வேறுபடுத்துகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - முதலீடு
      - இடர்_மதிப்பீடு
      - சிக்கல்_தீர்த்தல்
    how_can_you_spot_it:
      due_for_a_change: |
        "நாம் பல இழப்புகளை சந்தித்தோம்—நாம் வெற்றி பெற வேண்டிய நேரம்."
      pattern_in_randomness: |
        சீரற்ற வரிசைகளில் அர்த்தமுள்ள வடிவங்களைக் காணுதல்.
      hot_hand_fallacy: |
        ஒரு தொடர் தொடரும் என்று நம்புதல் (தொடர்புடையது ஆனால் எதிர் பிழை).
      independence_ignorance: |
        சுயாதீனமான நிகழ்வுகளை அவை இணைக்கப்பட்டவை போல நடத்துதல்.
    examples:
      gambling: |
        ரவுலட்டில் பல சிவப்பு எண்கள் விழுந்த பிறகு, கருப்பு மீது பந்தயம்
        கட்டுதல், ஏனெனில் "சிவப்பு தொடர்ந்து வர முடியாது."
      investing: |
        "சந்தை வீழ்ச்சியடைந்துள்ளது—அது உயர வேண்டும்."
      hiring: |
        "நாம் பல மோசமான வேட்பாளர்களை வேலைக்கு எடுத்தோம்—அடுத்தவர்
        நிச்சயமாக நன்றாக இருப்பார்."
      sports: |
        "அவர் பல ஷாட்க்களைத் தவறவிட்டார்—அவர் அடுத்த ஷாட்டை அடிக்க
        வேண்டிய நேரம்."
    real_world_implications: |
      சூதாட்டக்காரரின் தவறான நம்பிக்கை சூதாட்ட இழப்புகளையும் மோசமான
      முதலீட்டு முடிவுகளையும் ஏற்படுத்துகிறது. குறுகிய கால வடிவங்களை நாம்
      அதிகமாக விளக்குவதையும் இது விளக்குகிறது. உண்மையான சராசரிக்கு
      மீள்வீழ்ச்சியிலிருந்து (ஒரு உண்மையான சராசரி மீள்வதற்கு இருக்கும்போது)
      இதை வேறுபடுத்துவது முக்கியம்.
    professional_application:
      networking_and_relationship_building: |
        கடந்த கால உறவு இயக்கவியல் எதிர்காலத்தில் "சீரமைக்கப்படும்" என்று
        நம்ப வேண்டாம்—ஒவ்வொரு தொடர்பும் ஓரளவு சுயாதீனமானது. ஆனால் உண்மையான
        அடிப்படை காரணம் இருக்கும்போது வடிவங்களிலிருந்து கற்றுக்கொள்ளுங்கள்.
      collaborative_learning_initiative: |
        செயல்திறனை மதிப்பிடும்போது, ​​சீரற்ற மாறுபாட்டை முறையான
        மாற்றத்திலிருந்து வேறுபடுத்துங்கள். குறுகிய ஓட்டங்கள் இரைச்சலாக
        இருக்கலாம்; "தொடர்களை" அதிகமாக எதிர்வினையாற்றவோ அல்லது தவறான
        மீள்வீழ்ச்சியை எதிர்பார்க்கவோ வேண்டாம்.
    how_can_this_be_misapplied:
      ignoring_regression: |
        சில சமயங்களில் சராசரிக்கு மீள்வீழ்ச்சி உண்மையானது (எ.கா., திறன்
        செயல்திறன்). அனைத்து மீள்வீழ்ச்சியையும் சூதாட்டக்காரரின் தவறான
        நம்பிக்கை என்று நிராகரிக்க வேண்டாம்.
      false_independence: |
        நிகழ்வுகள் சுயாதீனமானவை அல்லாதபோது அவற்றை சுயாதீனமானவை என்று
        கருதுதல் (எ.கா., ஒரே விஷயத்தின் மீண்டும் மீண்டும் அளவீடுகள்).
      overcorrection: |
        மீள்வதற்கு ஒரு உண்மையான சராசரி இருக்கும்போது மீள்ச்சியை ஒருபோதும்
        எதிர்பார்க்காமல் இருத்தல்.
      dismissing_patterns: |
        சில வடிவங்கள் உண்மையானவை—அனைத்து வரிசைகளும் சீரற்றவை அல்ல.
