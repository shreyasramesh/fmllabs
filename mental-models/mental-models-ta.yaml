  - id: probabilistic_thinking
    name: நிகழ்தகவு சிந்தனை
    quick_introduction: |
      நிகழ்தகவு சிந்தனை என்பது உறுதிகளை விட சாத்தியக்கூறுகளின் அடிப்படையில் பகுத்தறிவு செய்யும் பழக்கமாகும். "இது நடக்குமா?" என்பதற்குப் பதிலாக, "இது எவ்வளவு சாத்தியம்?" என்று கேட்கிறோம். இது நிச்சயமற்ற தன்மையை ஏற்றுக்கொண்டு, சிறந்த முடிவுகளை எடுக்க அதைப் பயன்படுத்துகிறது.
    one_liner: சாத்தியக்கூறுகளில் சிந்தியுங்கள், உறுதிகளில் அல்ல - நிச்சயமற்ற தன்மையை ஏற்றுக்கொள்ளுங்கள்.
    try_this:
      - இது நடக்குமா? என்பதற்குப் பதிலாக "இது எவ்வளவு சாத்தியம்?" என்று மாற்றவும்.
      - பல சூழ்நிலைகளைக் கருத்தில் கொண்டு, தோராயமான நிகழ்தகவுகளை ஒதுக்குங்கள்.
      - புதிய சான்றுகள் வரும்போது உங்கள் நம்பிக்கைகளைப் புதுப்பிக்கவும்.
    ask_yourself:
      - நிகழ்தகவுகள் மிகவும் துல்லியமாக இருக்கும்போது நான் இரும முறையில் சிந்திக்கிறேனா?
      - சாத்தியமான விளைவுகளின் வரம்பு என்ன?
    in_more_detail: |
      நிஜ உலகில் பெரும்பாலான விளைவுகள் நிச்சயமற்றவை. நிகழ்தகவு சிந்தனை இரும ஆம்/இல்லை என்பதற்குப் பதிலாக படிப்படியான நம்பிக்கைகளை மாற்றுகிறது. இது பல சூழ்நிலைகளைக் கருத்தில் கொள்வது, தோராயமான நிகழ்தகவுகளை ஒதுக்குவது மற்றும் சான்றுகள் வரும்போது புதுப்பிப்பது ஆகியவை அடங்கும். இது அதிகப்படியான நம்பிக்கை மற்றும் கருப்பு-வெள்ளை சிந்தனைக்கு எதிரானது.

      முக்கிய நடைமுறைகளில் அடங்கும்: வரம்புகளில் சிந்தித்தல், அடிப்படை விகிதங்களைக் கருத்தில் கொள்ளுதல், சான்றுகளுடன் நம்பிக்கைகளைப் புதுப்பித்தல் மற்றும் இடர் (அறியப்பட்ட நிகழ்தகவுகள்) மற்றும் நிச்சயமற்ற தன்மை (அறியப்படாத நிகழ்தகவுகள்) ஆகியவற்றுக்கு இடையேயான வேறுபாடு. இது அளவுத்திருத்தம் மற்றும் முடிவு தரத்தை மேம்படுத்துகிறது.
    why_this_is_important: |
      நிகழ்தகவு சிந்தனை அதிகப்படியான நம்பிக்கையைக் குறைக்கிறது, கணிப்பை மேம்படுத்துகிறது மற்றும் நிச்சயமற்ற தன்மையின் கீழ் சிறந்த முடிவுகளுக்கு வழிவகுக்கிறது. இது முதலீடு, உத்தி மற்றும் எதிர்காலம் நிச்சயமற்றதாக இருக்கும் எந்தத் துறையிலும் அவசியம்.
    when_to_use:
      - முடிவு_எடுத்தல்
      - இடர்_மதிப்பீடு
      - முதலீடு
      - சிக்கல்_தீர்வு
    how_can_you_spot_it:
      likelihood_language: |
        "நிச்சயமாக" அல்லது "முடியாது" என்பதற்குப் பதிலாக "பெரும்பாலும்", "சாத்தியம்", "சாத்தியமற்றது".
      scenario_thinking: |
        தோராயமான நிகழ்தகவுகளுடன் பல சாத்தியமான எதிர்காலங்களைக் கருத்தில் கொள்வது.
      calibration: |
        காலப்போக்கில் உண்மையான முடிவு நிகழ்வெண்களுடன் பொருந்தக்கூடிய கணிப்புகள்.
      uncertainty_acknowledgment: |
        உங்களுக்கு என்ன தெரியாது என்பதை வெளிப்படையாகக் கூறுதல்.
    examples:
      forecasting: |
        "நாம் காலக்கெடுவை அடைவோம்" என்பதற்குப் பதிலாக "நாம் காலக்கெடுவை அடைய 60% வாய்ப்பு உள்ளது" என்று நான் நினைக்கிறேன்.
      investing: |
        "இது 2x ஆக 30% வாய்ப்பு மற்றும் -50% ஆக 70% வாய்ப்பு உள்ளது" என்பதற்குப் பதிலாக "இது மிகப்பெரிய லாபம் ஈட்டும்."
      strategy: |
        பல சூழ்நிலைகளுக்கு (சிறந்த, அடிப்படை, மோசமான நிலை) தோராயமான நிகழ்தகவுகளுடன் திட்டமிடுதல்.
      hiring: |
        "நேர்காணலின் அடிப்படையில், அவர்கள் வெற்றிபெற 70% நிகழ்தகவை நான் மதிப்பிடுகிறேன்" என்பதற்குப் பதிலாக "அவர்கள் ஒரு சிறந்த பணியாளர்."
    real_world_implications: |
      நிகழ்தகவு சிந்தனை அளவுத்திருத்தத்தை மேம்படுத்துகிறது, ஆச்சரியங்களைக் குறைக்கிறது மற்றும் சிறந்த இடர் மேலாண்மையை செயல்படுத்துகிறது. இது பயனுள்ள கணிப்பு மற்றும் நிச்சயமற்ற தன்மையின் கீழ் முடிவெடுப்பதில் முக்கியமானது.
    professional_application:
      networking_and_relationship_building: |
        பொருத்தமான இடங்களில் நிகழ்தகவுகளில் தொடர்பு கொள்ளுங்கள்—"நான் மிகவும் நம்பிக்கையுடன் இருக்கிறேன்" vs. "நான் உறுதியாக இருக்கிறேன்." இது அறிவுசார் பணிவைக் குறிப்பதன் மூலம் நம்பிக்கையை உருவாக்குகிறது.
      collaborative_learning_initiative: |
        குழுக்கள் நிச்சயமற்ற தன்மையை வெளிப்படுத்த ஊக்குவிக்கவும். நிகழ்தகவு தீர்ப்பை மேம்படுத்த கணிப்பு சந்தைகள் அல்லது அளவுத்திருத்தப் பயிற்சிகளைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      false_precision: |
        நீங்கள் அவ்வளவு துல்லியமாக இருக்க முடியாதபோது துல்லியமான நிகழ்தகவுகளை (எ.கா., 73%) ஒதுக்குவது.
      analysis_paralysis: |
        "நமக்கு உறுதியாகத் தெரியாது" என்பதால் ஒருபோதும் செயல்படாமல் இருப்பது.
      hedging_overuse: |
        பயனற்ற நிலைக்கு எல்லாவற்றையும் தகுதிப்படுத்துவது.
      dismissing_intuition: |
        அவை செல்லுபடியாகும் தகவல்களைக் கொண்டு செல்லக்கூடும் போது வலுவான உள் உணர்வுகளைப் புறக்கணிக்க அதிகப்படியாக சரிசெய்வது.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: பிக்மாலியன் விளைவு
    quick_introduction: |
      பிக்மாலியன் விளைவு (அல்லது ரோசந்தால் விளைவு) என்பது அதிக எதிர்பார்ப்புகள் மேம்பட்ட செயல்திறனுக்கு வழிவகுக்கும் நிகழ்வு ஆகும். ஆசிரியர்கள், மேலாளர்கள் அல்லது மற்றவர்கள் ஒருவரிடமிருந்து அதிகமாக எதிர்பார்க்கும்போது, ​​அந்த நபர் சிறப்பாக செயல்படுகிறார். எதிர்பார்ப்புகள் சுய-நிறைவேறும் தீர்க்கதரிசனங்களாக மாறும்.
    one_liner: அதிக எதிர்பார்ப்புகள் சிறந்த செயல்திறனுக்கு வழிவகுக்கும்—எதிர்பார்ப்புகள் யதார்த்தத்தை உருவாக்குகின்றன.
    try_this:
      - அதிக ஆனால் அடையக்கூடிய எதிர்பார்ப்புகளை அமைக்கவும்; அவற்றை தெளிவாகத் தெரிவிக்கவும்.
      - குறைந்த எதிர்பார்ப்புகள் ஒருவரின் செயல்திறனைக் கட்டுப்படுத்தக்கூடும் என்பதை கவனிக்கவும்.
      - கேளுங்கள்: நான் மறைமுகமாக என்ன எதிர்பார்க்கிறேன்—அது விளைவுகளை எவ்வாறு பாதிக்கலாம்?
    ask_yourself:
      - எனது எதிர்பார்ப்புகள் இந்த நபருக்கு உதவுகின்றனவா அல்லது கட்டுப்படுத்துகின்றனவா?
      - அதிக எதிர்பார்ப்புகள் நான் அவர்களை—மற்றும் அவர்களின் முடிவுகளை—எவ்வாறு நடத்துவேன் என்பதை மாற்றுமா?
    in_more_detail: |
      ராபர்ட் ரோசந்தால் மற்றும் லெனோரி ஜேக்கப்சன் ஆசிரியர்களுக்கு சில மாணவர்கள் கல்வியில் "மலருவார்கள்" என்று தவறான தகவலை அளித்தனர். அந்த மாணவர்கள்—தற்செயலாக தேர்ந்தெடுக்கப்பட்டவர்கள்—மற்றவர்களை விட அதிகமாக முன்னேறினர். ஆசிரியர்களின் எதிர்பார்ப்புகள் அவர்களின் நடத்தையை (அதிக கவனம், சூடான பின்னூட்டம்) பாதித்தன, இது மாணவர்களின் செயல்திறனை பாதித்தது. எதிர்பார்ப்புகள் யதார்த்தத்தை உருவாக்குகின்றன.

      இதன் தலைகீழ்—குறைந்த எதிர்பார்ப்புகள் மோசமான செயல்திறனுக்கு வழிவகுக்கும்—சில சமயங்களில் கோலம் விளைவு என்று அழைக்கப்படுகிறது. நம் மற்றவர்கள் பற்றிய நம்பிக்கைகள் அவர்களின் விளைவுகளை பாதிக்கலாம் என்பதை இவை இரண்டும் காட்டுகின்றன. இது தலைமைத்துவம், கல்வி மற்றும் பெற்றோருக்குரியவற்றுக்கு ஆழ்ந்த தாக்கங்களைக் கொண்டுள்ளது.
    why_this_is_important: |
      பிக்மாலியன் விளைவைப் புரிந்துகொள்வது எதிர்பார்ப்புகளின் சக்தியைப் பயன்படுத்த உங்களுக்கு உதவுகிறது. உண்மையாகத் தெரிவிக்கப்பட்ட உயர் எதிர்பார்ப்புகள் செயல்திறனை மேம்படுத்தும். குறைந்த எதிர்பார்ப்புகள் சுய-நிறைவேறும் தோல்வியை உருவாக்கலாம். மற்றவர்கள் பற்றிய உங்கள் நம்பிக்கைகள் முக்கியம்.
    when_to_use:
      - தலைமைத்துவம்
      - உறவு_கட்டுதல்
      - கற்றல்
      - முடிவு_எடுத்தல்
    how_can_you_spot_it:
      expectation_performance_link: |
        நாம் யாரிடம் அதிகமாக எதிர்பார்க்கிறோமோ அவர்கள் சிறப்பாக செயல்படுகிறார்கள்.
      differential_treatment: |
        நாம் நமது எதிர்பார்ப்புகளின் அடிப்படையில் மக்களை வித்தியாசமாக நடத்துகிறோம்—பெரும்பாலும்
        அறியாமலே.
      self_fulfilling_prophecy: |
        திறமை பற்றிய நம்பிக்கைகள் திறமையை உருவாக்கும் நடத்தையை பாதிக்கின்றன.
      teacher_student_dynamics: |
        ஆசிரியர்களின் எதிர்பார்ப்புகள் வேறுபட்ட நடத்தை மூலம் மாணவர் விளைவுகளை பாதிக்கின்றன.
    examples:
      education: |
        மாணவர்கள் வெற்றி பெறுவார்கள் என்று எதிர்பார்க்கும் ஆசிரியர்கள் அதிக ஆதரவை அளிக்கிறார்கள்;
        அந்த மாணவர்கள் முன்னேறுகிறார்கள். தோல்வியை எதிர்பார்க்கும் ஆசிரியர்கள்
        அறியாமலே அதை உருவாக்கலாம்.
      workplace: |
        தங்கள் அறிக்கையிடல்களிடமிருந்து உயர் செயல்திறனை எதிர்பார்க்கும் மேலாளர்கள் அதிக
        வாய்ப்புகளையும் பின்னூட்டத்தையும் வழங்குகிறார்கள்; செயல்திறன் மேம்படுகிறது.
      parenting: |
        தங்கள் குழந்தைகள் பொறுப்பானவர்களாக இருப்பார்கள் என்று எதிர்பார்க்கும் பெற்றோர்
        அவர்களுக்கு அதிக பொறுப்பை அளிக்கிறார்கள்; அவர்கள் அதற்கு உயர்கிறார்கள்.
      stereotypes: |
        ஸ்டீரியோடைப் அச்சுறுத்தல் என்பது தலைகீழ்—எதிர்மறை எதிர்பார்ப்புகள்
        செயல்திறனைக் குறைக்கும்.
    real_world_implications: |
      பிக்மாலியன் விளைவு கல்வி, மேலாண்மை மற்றும் உறவுகளை பாதிக்கிறது. இது எதிர்பார்ப்புகளை உயர்த்துவது—
      ஆதரவாக செய்யப்படும்போது—விளைவுகளை மேம்படுத்தும் என்று கூறுகிறது.
      குறைந்த எதிர்பார்ப்புகள் அழிவுகரமானதாக இருக்கும் என்றும் இது எச்சரிக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        மக்களிடம் உயர் எதிர்பார்ப்புகளை அமைக்கவும்—அவற்றை அடைய ஆதரவை வழங்கவும்.
        திறமையில் நம்பிக்கை வையுங்கள். உங்கள் எதிர்பார்ப்புகள் உங்கள் நடத்தையை பாதிக்கின்றன,
        அது அவர்களின் விளைவுகளை பாதிக்கிறது.
      collaborative_learning_initiative: |
        உயர் ஆதரவுடன் உயர் எதிர்பார்ப்புகளின் கலாச்சாரங்களை உருவாக்குங்கள்.
        "குறைந்த செயல்திறன்" கொண்டவர்கள் என்று பெயரிடுவதைத் தவிர்க்கவும், அது
        சுய-நிறைவேற்றமாக மாறும். வெற்றி பெறுவார்கள் என்று நீங்கள் எதிர்பார்க்கும் நபர்களில் முதலீடு செய்யுங்கள்.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        ஆதரவு இல்லாமல் அடைய முடியாத எதிர்பார்ப்புகளை அமைப்பது தோல்வி மற்றும் ஊக்கமின்மையை உருவாக்குகிறது.
      blame_shifting: |
        வெற்றிக்கு ஆதரவையோ அல்லது நிபந்தனைகளையோ நாம் வழங்காதபோது "அவர்கள் எதிர்பார்ப்புகளை சந்திக்கவில்லை".
      ignoring_constraints: |
        எதிர்பார்ப்புகள் மட்டும் கட்டமைப்பு தடைகளை சமாளிக்காது.
      pressure_without_support: |
        ஆதரவு அல்லது வளங்கள் இல்லாமல் உயர் எதிர்பார்ப்புகள் தீங்கு விளைவிக்கும்.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: சராசரிக்கு திரும்புதல்
    quick_introduction: |
      சராசரிக்கு திரும்புதல் என்பது ஒரு புள்ளியியல் நிகழ்வு ஆகும், இதில் உச்சகட்ட விளைவுகள் சராசரிக்கு நெருக்கமான விளைவுகளால் பின்பற்றப்படுகின்றன. அசாதாரணமாக நல்ல அல்லது கெட்ட முடிவு ஏற்பட்ட பிறகு, அடுத்த முடிவு குறைவான உச்சகட்டமாக இருக்கும் - இது எந்தவொரு காரண காரிய தலையீட்டாலும் அல்ல, சீரற்ற மாறுபாடு காரணமாகும்.
    one_liner: உச்சகட்ட விளைவுகள் சராசரிக்கு நெருக்கமான விளைவுகளால் பின்பற்றப்படுகின்றன.
    try_this:
      - திரும்புகையை உங்கள் தலையீட்டிற்கு காரணமாக கூறாதீர்கள் - இது பெரும்பாலும் எப்படியும் நடந்திருக்கும்.
      - ஒரு உச்சகட்ட முடிவுக்குப் பிறகு, அடுத்தது குறைவான உச்சகட்டமாக இருக்கும் என்று எதிர்பார்க்கவும்.
      - கேளுங்கள்: இந்த மாற்றம் நான் செய்ததால் ஏற்பட்டதா, அல்லது சராசரிக்கு திரும்புவதால் ஏற்பட்டதா?
    ask_yourself:
      - நான் சீரற்ற மாறுபாடாக இருக்கலாம் என்பதை எனது தலையீட்டிற்கு காரணமாகக் கூறுகிறேனா அல்லது குறை கூறுகிறேனா?
      - எனது நடவடிக்கை இல்லாமல் இது நடந்திருக்குமா?
    in_more_detail: |
      ஒரு மாணவர் ஒரு தேர்வில் அசாதாரணமாக அதிக மதிப்பெண் பெற்றால், அடுத்த தேர்வில் அவர்களின் சராசரிக்கு நெருக்கமாக மதிப்பெண் பெறுவார் - அவர்கள் "சோம்பேறித்தனமாகிவிட்டார்கள்" என்பதனால் அல்ல, முதல் மதிப்பெண் பகுதி அதிர்ஷ்டம் என்பதால். விளையாட்டு செயல்திறன், பங்கு வருவாய் மற்றும் வணிக அளவீடுகளுக்கும் இது பொருந்தும். நாம் பெரும்பாலும் "திரும்புகையை" நாம் செய்த ஒன்றுக்கு (எ.கா., தண்டனை அல்லது வெகுமதி) காரணமாகக் கூறுகிறோம், அது எப்படியும் நடந்திருக்கும் போது.

      டேனியல் கஹ்னெமேன், விமானப் பயிற்றுனர்கள் பாராட்டல் செயல்திறனை மோசமாக்கியது என்றும் விமர்சனம் மேம்படுத்தியது என்றும் தவறுதலாக முடிவுக்கு வந்ததை விவரிக்கிறார் - அவர்கள் உச்சகட்ட செயல்திறன்களுக்குப் பிறகு சராசரிக்கு திரும்புதலைக் கவனித்துக் கொண்டிருந்தனர்.
    why_this_is_important: |
      சராசரிக்கு திரும்புதலைப் புரிந்துகொள்வது காரண காரியத்தை தவறாகக் கூறுவதைத் தடுக்கிறது. இது வெளிப்புறங்களை மிகையாக மதிப்பிடுவதையும், இரைச்சலின் அடிப்படையில் மாற்றங்களைச் செய்வதையும் தவிர்க்க உதவுகிறது. தலையீடுகள் மற்றும் செயல்திறனை மதிப்பிடுவதற்கு இது அவசியம்.
    when_to_use:
      - முடிவெடுத்தல்
      - முதலீடு
      - இடர் மதிப்பீடு
      - தலைமைத்துவம்
    how_can_you_spot_it:
      extreme_followed_by_average: |
        அசாதாரணமாக நல்ல அல்லது கெட்ட விளைவு சராசரிக்கு நெருக்கமான ஒன்றால் பின்பற்றப்படுகிறது.
      spurious_causation: |
        தலையீட்டிற்கு "மீட்பு" அல்லது "சரிவு" காரணமாகக் கூறுவது, சராசரிக்கு திரும்புதல் எப்படியும் நடந்திருக்கும் போது.
      overreaction_to_outliers: |
        ஒரே ஒரு உச்சகட்ட தரவுப் புள்ளியின் அடிப்படையில் கொள்கை அல்லது தனிப்பட்ட மாற்றங்களைச் செய்தல்.
      reward_punishment_confusion: |
        தண்டனை "வேலை செய்தது" என்று நம்புவது, முன்னேற்றம் சராசரிக்கு திரும்புதலாக இருக்கும் போது.
    examples:
      sports: |
        ஒரு வீரர் தனது வாழ்க்கையில் ஒரு சிறந்த ஆட்டத்தை விளையாடுகிறார், பின்னர் சராசரிக்கு திரும்புகிறார் - ரசிகர்கள் "திருப்தியை" குற்றம் சாட்டலாம்.
      investing: |
        ஒரு பங்கு ஒரு சிறந்த ஆண்டைக் கொண்டுள்ளது, பின்னர் திரும்புகிறது - முதலீட்டாளர்கள் மோசமான நிர்வாகத்திற்கு சரிவை காரணமாகக் கூறலாம், அது பகுதியளவு மீள்தல் இருக்கும் போது.
      performance_reviews: |
        ஒரு ஊழியர் ஒரு கெட்ட காலாண்டைக் கொண்டுள்ளார், கருத்துக்களைப் பெறுகிறார், மேம்படுகிறார் - கருத்துக்கள் பாராட்டப்படலாம், சராசரிக்கு திரும்புதல் எப்படியும் நடந்திருக்கும் போது.
      medicine: |
        ஒரு நோயாளி மோசமாக உணர்கிறார், சிகிச்சை எடுக்கிறார், மேம்படுகிறார் - சிகிச்சை பாராட்டப்படலாம், சில முன்னேற்றம் இயற்கையானதாக இருந்தபோது.
    real_world_implications: |
      சராசரிக்கு திரும்புதல் ஆசிரியர்கள், மருத்துவர்கள், நிதி மேலாளர்கள் மற்றும் நம்மை நாமே எவ்வாறு மதிப்பிடுகிறோம் என்பதை பாதிக்கிறது. "ஏறியது எல்லாம் இறங்கும்" என்பது ஏன் பெரும்பாலும் புள்ளிவிவர ரீதியாகப் பொருந்தும் என்பதை இது விளக்குகிறது. இதை தவறாகப் புரிந்துகொள்வது வீணான தலையீடுகளுக்கும், தீர்வுகளில் தவறான நம்பிக்கைகளுக்கும் வழிவகுக்கிறது.
    professional_application:
      networking_and_relationship_building: |
        ஒரு மோசமான தொடர்பை மிகையாக விளக்காதீர்கள் - அது உறவின் சராசரிக்கு திரும்புவதற்கான ஒரு வெளிப்புறமாக இருக்கலாம்.
      collaborative_learning_initiative: |
        தலையீடுகளை (பயிற்சி, செயல்முறை மாற்றங்கள்) மதிப்பிடும் போது, தாக்கத்தை சராசரிக்கு திரும்புதலிலிருந்து வேறுபடுத்த, கட்டுப்பாட்டு குழுக்கள் மற்றும் பல தரவுப் புள்ளிகளைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        ஒரு தலையீட்டிற்குப் பிறகு எந்தவொரு முன்னேற்றமும் "சராசரிக்கு திரும்புதல்" என்று கருதுவது, உண்மையான விளைவுகள் இருக்கும் போது.
      underreacting: |
        "அது சராசரிக்கு திரும்பும்" என்பதால் உண்மையான பிரச்சினைகளைப் புறக்கணிப்பது.
      statistical_illiteracy: |
        சராசரிக்கு திரும்புதலை விளைவுகளை "சரிசெய்யும்" ஒரு சக்தியுடன் குழப்புதல் - இது நிகழ்தகவு மட்டுமே.
      overconfidence: |
        அடிப்படை செயல்முறை மாறியிருக்கக்கூடும் போது, சராசரி நிலையானது என்று கருதுவது.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: இளஞ்சிவப்பு நினைவுகூர்தல்
    quick_introduction: |
      இளஞ்சிவப்பு நினைவுகூர்தல் என்பது கடந்த காலத்தை அது இருந்ததை விட சிறப்பாக நினைவில் கொள்ளும் ஒரு போக்கு.
      காலப்போக்கில் கடந்த அனுபவங்களை நாம் நேர்மறையாக நினைவுகூர்கிறோம், சிரமங்களை மென்மையாக்குகிறோம்
      மற்றும் நல்லதை பெருக்குகிறோம். "நல்ல பழைய நாட்கள்" பெரும்பாலும் நாம் நினைப்பதை விட சிறப்பாக இருந்ததில்லை.
    one_liner: நாம் கடந்த காலத்தை அது இருந்ததை விட சிறப்பாக நினைவில் கொள்கிறோம் - "நல்ல பழைய நாட்கள்" அவ்வளவு நல்லதாக இல்லை.
    try_this:
      - கடந்த காலத்துடன் ஒப்பிடும்போது, ​​கேளுங்கள்: அப்போது நான் உண்மையில் என்ன உணர்ந்தேன்?
      - நினைவகத்தை பின்னர் உண்மையுடன் ஒப்பிடுவதற்கு ஒரு நாட்குறிப்பை வைத்திருங்கள்.
      - பழங்கால நினைவு உங்கள் தற்போதைய தீர்ப்பை வண்ணமயமாக மாற்றும்போது கவனியுங்கள்.
    ask_yourself:
      - நான் கடந்த காலத்தை இலட்சியப்படுத்துகிறேனா?
      - நான் பின்னோக்கி கால பயணம் செய்ய முடிந்தால் அப்போது நான் மகிழ்ச்சியாக இருந்திருப்பேனா?
    in_more_detail: |
      கடந்த கால அனுபவங்களின் நேர்மறையான அம்சங்களை நினைவுகூரும் போக்கும்,
      எதிர்மறையானவற்றை மறந்து அல்லது குறைக்கும் போக்கும் நமக்கு உள்ளது. விடுமுறைகள், வேலைகள் மற்றும் உறவுகள்
      நினைவில் பழங்கால நினைவுகளில் இருந்ததை விட சிறப்பாக உணர்கின்றன. இது யதார்த்தமற்ற
      ஒப்பீடுகளுக்கு வழிவகுக்கும் - நாம் தற்போதையதை இலட்சியப்படுத்தப்பட்ட கடந்த காலத்துடன் ஒப்பிடுகிறோம்.

      கடந்த கால தேர்வுகளை மீண்டும் செய்யும்போது, ​​அதே (நினைவுகூரப்பட்ட) விளைவை எதிர்பார்ப்பதன் மூலம்,
      இளஞ்சிவப்பு நினைவுகூர்தல் முடிவெடுப்பதை பாதிக்கிறது. இது புறநிலையாக மோசமாக இருந்த காலங்களுக்கு
      பழங்கால நினைவுகளையும் தூண்டலாம். இது நினைவகத்தில் எதிர்மறை சார்புக்கு எதிரானது.
    why_this_is_important: |
      இளஞ்சிவப்பு நினைவுகூர்தலை அங்கீகரிப்பது, யதார்த்தமான ஒப்பீடுகளைச் செய்யவும்
      மற்றும் இலட்சியப்படுத்தப்பட்ட நினைவுகளின் அடிப்படையில் கடந்த கால தவறுகளை மீண்டும் செய்வதைத் தவிர்க்கவும் உதவுகிறது.
      தற்போதைய முன்னேற்றம் இருந்தபோதிலும் நாம் ஏன் சில சமயங்களில் கடந்த காலத்திற்கு ஏங்குகிறோம் என்பதையும் இது விளக்குகிறது.
    when_to_use:
      - முடிவெடுக்கும்_செயல்முறை
      - தொழில்_மாற்றங்கள்
      - உறவு_கட்டுதல்
      - கற்றல்
    how_can_you_spot_it:
      idealized_past: |
        "அப்போது விஷயங்கள் சிறப்பாக இருந்தன", புறநிலை அளவீடுகள் வேறுவிதமாக காட்டினாலும்.
      selective_positive_memory: |
        கடந்த அனுபவங்களிலிருந்து நல்லவற்றை நினைவில் கொண்டு கெட்டவற்றை மறந்துவிடுதல்.
      nostalgia_as_evidence: |
        கடந்தகால தேர்வுகள் சரியானவை என்பதற்கு அன்பான நினைவுகளை ஆதாரமாகப் பயன்படுத்துதல்.
      present_undervaluation: |
        இலட்சியப்படுத்தப்பட்ட கடந்த காலத்துடன் ஒப்பிடுவதால் தற்போதையது இருப்பது போல் உணர்கிறது.
    examples:
      career: |
        "என் பழைய வேலை சிறப்பாக இருந்தது" நீங்கள் நல்ல காரணங்களுக்காக விட்டுவிட்டாலும் - நினைவகம் ஏமாற்றங்களை
        மென்மையாக்கியுள்ளது.
      relationships: |
        கடந்தகால உறவைப் பற்றி "நாங்கள் மிகவும் மகிழ்ச்சியாக இருந்தோம்" - அதன் முடிவுக்கு வழிவகுத்த மோதல்களை மறந்தோம்.
      childhood: |
        "என் நாளில் குழந்தைகளுக்கு சிறப்பாக இருந்தது" என்று, புறநிலை அளவீடுகள் (ஆரோக்கியம்,
        பாதுகாப்பு, வாய்ப்பு) மேம்பட்டுள்ளன.
      projects: |
        "அந்தத் திட்டம் சீராக நடந்தது" என்று, அது உண்மையில் பல தாமதங்களைக் கொண்டிருந்தாலும் - நாம்
        செயல்முறையை அல்ல, முடிவை நினைவில் கொள்கிறோம்.
    real_world_implications: |
      இளஞ்சிவப்பு நினைவுகூர்தல் வாழ்க்கை திருப்தி, தொழில் முடிவுகள் மற்றும்
      பழங்கால நினைவுகளால் தூண்டப்பட்ட தேர்வுகளை பாதிக்கிறது. இது கடந்த கால தவறுகளை மீண்டும் செய்வதற்கோ அல்லது
      யதார்த்தமற்ற ஒப்பீடுகளுக்கோ வழிவகுக்கும். இது "நல்ல பழைய நாட்களுக்குத் திரும்பு" என்ற சொல்லாடலின் கவர்ச்சியையும் விளக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        கடந்தகால சக ஊழியர்களுடன் மீண்டும் இணைவது அல்லது கடந்தகால பாத்திரங்களுக்கு திரும்புவது குறித்து பரிசீலிக்கும்போது, ​​பழங்கால நினைவுகளையும் யதார்த்தத்தையும் பிரிக்கவும். வெளியேறியதற்கான காரணங்களை அப்போதே ஆவணப்படுத்தவும்; திரும்புவதற்கு முன் அவற்றை மதிப்பாய்வு செய்யவும்.
      collaborative_learning_initiative: |
        பின்னோட்டங்களில், என்ன நடந்தது என்பதை மதிப்பிடுவதற்கு நினைவகத்தை விட, அக்கால குறிப்புகள் அல்லது தரவுகளைப் பயன்படுத்தவும். நினைவகம் சிரமங்களை மென்மையாக்கும்.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        எல்லா பழங்கால நினைவுகளும் தவறானவை அல்ல - சில சமயங்களில் கடந்த காலம் சில வழிகளில் உண்மையாகவே சிறப்பாக இருந்தது.
      invalidating_memories: |
        மக்களின் நேர்மறையான நினைவுகள் "தவறு" என்று கூறுவது, அவை உண்மையான அகநிலை அனுபவத்தைப் பிரதிபலிக்கக்கூடும் போது.
      overcorrection: |
        கடந்த காலம் நாம் நினைப்பதை விட எப்போதும் மோசமாக இருந்தது என்று நினைப்பது - சில சமயங்களில் அது சிறப்பாக இருந்தது.
      present_bias: |
        தற்போதைய வீழ்ச்சி குறித்த முறையான கவலைகளைப் புறக்கணிக்க ஒரு சாக்காக இளஞ்சிவப்பு நினைவுகூர்தலைப் பயன்படுத்துதல்.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: முக்கியத்துவ சார்பு
    quick_introduction: |
      முக்கியத்துவ சார்பு என்பது ஒரு சூழ்நிலையின் மிக முக்கியமான அல்லது கவனிக்கத்தக்க அம்சங்களில் கவனம் செலுத்தி, குறைவான வெளிப்படையான ஆனால் முக்கியத்துவம் வாய்ந்த காரணிகளை புறக்கணிக்கும் போக்கு ஆகும். எது முக்கியமாகத் தோன்றுகிறதோ அது நமது தீர்ப்புகளில் அதிகப்படியான கவனத்தையும் எடையையும் பெறுகிறது.
    one_liner: எது முக்கியமாகத் தோன்றுகிறதோ அது அதிகப்படியான கவனத்தைப் பெறுகிறது - நுணுக்கங்கள் புறக்கணிக்கப்படுகின்றன.
    try_this:
      - Ask: What am I not seeing because it's not salient? - எது முக்கியமாகத் தெரியவில்லை என்பதனால் நான் எதைப் பார்க்கத் தவறுகிறேன்?
      - Actively look for less obvious factors before deciding. - முடிவெடுப்பதற்கு முன் குறைவான வெளிப்படையான காரணிகளை தீவிரமாகத் தேடுங்கள்.
      - Notice when a vivid or dramatic element is dominating your judgment. - ஒரு தெளிவான அல்லது வியத்தகு அம்சம் உங்கள் தீர்ப்பை ஆதிக்கம் செலுத்துவதை கவனியுங்கள்.
    ask_yourself:
      - Am I overweighting what's prominent and underweighting what's subtle? - நான் முக்கியமாகத் தெரிபவற்றிற்கு அதிக எடையையும், நுணுக்கமானவற்றிற்கு குறைவான எடையையும் கொடுக்கிறேனா?
      - What important factors might I be overlooking? - நான் என்ன முக்கிய காரணிகளைப் புறக்கணிக்கக்கூடும்?
    in_more_detail: |
      முக்கியமான தகவல்கள் தெளிவானவை, உணர்ச்சிப்பூர்வமானவை அல்லது சமீபத்தில் எதிர்கொள்ளப்பட்டவை. அவை கவனத்தை ஈர்க்கின்றன மற்றும் தீர்மானங்களை விட அதிகமாக பாதிக்கின்றன. நாம் வெளிப்படையானவற்றிற்கு அதிக எடையையும், நுணுக்கமானவற்றிற்கு குறைவான எடையையும் கொடுக்கிறோம். ஒரு வியத்தகு நிகழ்வு அல்லது தெளிவான உதாரணம், அது பிரதிநிதித்துவமாக இல்லாவிட்டாலும் கூட, நமது சிந்தனையை ஆதிக்கம் செலுத்தக்கூடும்.

      முக்கியத்துவ சார்பு, கிடைக்கும் தன்மை ஹீரிஸ்டிக் (மனதில் வருவது) மற்றும் சமீபத்திய சார்பு (சமீபத்தில் நடந்தது) ஆகியவற்றுடன் ஒன்றுபடுகிறது. இது இடர் உணர்வு, ஆட்சேர்ப்பு மற்றும் உத்தி ஆகியவற்றைப் பாதிக்கிறது. மிகவும் வெளிப்படையான சிக்கல்கள் கவனிக்கப்படுகின்றன; கண்ணுக்குத் தெரியாதவை மோசமடைகின்றன.
    why_this_is_important: |
      முக்கியத்துவ சார்பை அங்கீகரிப்பது, வெளிப்படையானவற்றிற்கு அப்பால் பார்க்கவும், குறைவான வெளிப்படையான காரணிகளைக் கருத்தில் கொள்ளவும் உதவுகிறது. இது இடர் மதிப்பீடு, சிக்கல் கண்டறிதல் மற்றும் தீர்மானத்தின் தரத்தை மேம்படுத்துகிறது. முக்கியமான விஷயங்கள் எப்போதும் முக்கியமாக தெரிவதில்லை.
    when_to_use:
      - முடிவெடுத்தல்
      - சிக்கல் தீர்த்தல்
      - இடர் மதிப்பீடு
      - தலைமைத்துவம்
    how_can_you_spot_it:
      prominent_factor_dominance: |
        மிகவும் கவனிக்கத்தக்க அம்சம் முடிவை இயக்குகிறது.
      overlooking_background: |
        குறைவான வெளிப்படையான காரணிகள் அவற்றின் முக்கியத்துவத்தைப் பொருட்படுத்தாமல் புறக்கணிக்கப்படுகின்றன.
      vividness_overweighting: |
        வியத்தகு அல்லது உணர்ச்சிப்பூர்வமான தகவல்கள் அதிகப்படியான எடையைப் பெறுகின்றன.
      visibility_bias: |
        நாம் எளிதாகப் பார்க்கக்கூடிய அல்லது அளவிடக்கூடியவை, நம்மால் பார்க்க முடியாதவற்றை விட அதிக கவனத்தைப் பெறுகின்றன.
    examples:
      risk: |
        ஒரு விமான விபத்து முக்கியமானது - நாம் பறக்கும் அபாயத்தை அதிகமாக மதிப்பிடுகிறோம். கார் விபத்துக்கள் ஒட்டுமொத்தமாக குறைவாக முக்கியத்துவம் பெறுகின்றன - நாம் ஓட்டும் அபாயத்தை குறைவாக மதிப்பிடுகிறோம்.
      hiring: |
        ஒரு வேட்பாளரின் விளக்கக்காட்சி திறன்கள் முக்கியமானது; அவர்களின் தொடர்ச்சி குறைவான வெளிப்படையாக இருக்கலாம் ஆனால் சமமாக முக்கியமானது.
      strategy: |
        போட்டியாளரின் நகர்வுகள் முக்கியமானது; படிப்படியான சந்தை மாற்றங்கள் குறைவாக கவனிக்கத்தக்கவை ஆனால் அதிக முக்கியத்துவம் வாய்ந்ததாக இருக்கலாம்.
      problems: |
        மிக உரத்த புகார் கவனிக்கப்படுகிறது, அதே நேரத்தில் முறைசார்ந்த சிக்கல்கள் கவனிக்கப்படாமல் போகின்றன.
    real_world_implications: |
      முக்கியத்துவ சார்பு எதற்கு கவனம், நிதி மற்றும் நடவடிக்கை எடுக்கப்படுகிறது என்பதை பாதிக்கிறது. இது காரணங்களை விட அறிகுறிகளைக் கையாள்வதற்கும், தவறாக ஒதுக்கப்பட்ட வளங்களுக்கும் வழிவகுக்கும். முக்கியத்துவம் வாய்ந்த தகவல்களை வேண்டுமென்றே தேடுவது தீர்மானங்களை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        நபர்களை அவர்களின் மிக வெளிப்படையான குணாதிசயங்களால் மட்டும் மதிப்பிடாதீர்கள். குறைவான வெளிப்படையான குணங்களைத் தேடுங்கள் - நம்பகத்தன்மை, நிலைத்தன்மை, அவர்கள் உதவ முடியாதவர்களிடம் எப்படி நடந்துகொள்கிறார்கள்.
      collaborative_learning_initiative: |
        சிக்கல் தீர்ப்பில், வெளிப்படையாக "நாம் எதைப் பார்க்கவில்லை?" மற்றும் "எது குறைவான வெளிப்படையானது ஆனால் முக்கியமானது?" என்று கேளுங்கள். முக்கியத்துவம் வாய்ந்த சிக்கல்களை வெளிப்படுத்தும் செயல்முறைகளை உருவாக்குங்கள்.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        சில சமயங்களில் முக்கியமாகத் தெரிபவை முக்கியமானது. வெளிப்படையான அனைத்தையும் புறக்கணிக்காதீர்கள்.
      false_sophistication: |
        புதிரான காரணிகள் எப்போதும் வெளிப்படையானவற்றை விட முக்கியமானது என்று கருதுதல்.
      analysis_paralysis: |
        பல முக்கியத்துவம் வாய்ந்த காரணிகளைத் தேடுவது, நீங்கள் முக்கிய காரணிகளில் ஒருபோதும் செயல்பட மாட்டீர்கள்.
      contrarianism: |
        வெவ்வேறுவராக இருப்பதற்காக முக்கியத்துவம் வாய்ந்த தகவல்களை நிராகரித்தல்.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: அரிதான தன்மை சார்பு
    quick_introduction: |
      அரிதான தன்மை சார்பு என்பது, ஒரு பொருள் அரிதாக அல்லது குறைவாகக் கிடைக்கும்போது, அதற்கு அதிக மதிப்பளிக்கும் போக்காகும். "வரையறுக்கப்பட்ட நேரம்," "இன்னும் 3 மட்டுமே உள்ளன," மற்றும் "பிரத்தியேக அணுகல்" போன்ற வார்த்தைகள் அவசரத்தையும் ஆசையையும் தூண்டுகின்றன. இதனால், அந்தப் பொருளை நாம் உண்மையில் விரும்புகிறோமா அல்லது தேவையா என்பதைப் பகுத்தறிந்து மதிப்பிடுவதற்குப் பதிலாக, இந்த உணர்வுகள் நம்மை ஆட்கொள்கின்றன.
    one_liner: அரிதான தன்மை, உணரப்பட்ட மதிப்பை அதிகரிக்கிறது—"வரையறுக்கப்பட்ட" என்பது பகுத்தறிவை மீறி அவசரத்தைத் தூண்டுகிறது.
    try_this:
      - கேளுங்கள்: இது அரிதாக இல்லையென்றால் இதை நான் விரும்புவேனா? அவசரத்தை நீக்கிப் பாருங்கள்.
      - வரையறுக்கப்பட்ட நேரம் அல்லது "இன்னும் X மட்டுமே உள்ளன" போன்ற சலுகைகளில் செயல்படுவதற்கு முன் சற்று நிறுத்துங்கள்.
      - உண்மையான மதிப்பை விட, அரிதான தன்மையே உங்கள் விருப்பத்தைத் தூண்டுகிறதா என்பதைக் கவனியுங்கள்.
    ask_yourself:
      - இது அரிதாக இருப்பதால் இதை நான் மதிக்கிறேனா, அல்லது உண்மையில் எனக்கு இது தேவைப்படுவதால் மதிக்கிறேனா?
      - அரிதான தன்மையின் பின்னணி இல்லாமல் இந்த முடிவை எடுப்பேனா?
    in_more_detail: |
      அரிதான தன்மை, உணரப்பட்ட மதிப்பை அதிகரிக்கிறது. ஒரு பொருள் அரிதாகவோ அல்லது மறைந்து கொண்டோ இருக்கும்போது, அதை நாம் அதிகம் விரும்புகிறோம்—ஏனென்றால் அரிதான தன்மை தரத்தைக் குறிக்கலாம், மேலும் இழப்பு வெறுப்பு (loss aversion) நம்மை எதையாவது இழந்துவிடுவோமோ என்ற பயத்தில் ஆழ்த்துகிறது. சந்தைப்படுத்துபவர்களும் பேச்சுவார்த்தையாளர்களும் அவசரத்தை உருவாக்க அரிதான தன்மையைப் பயன்படுத்துகின்றனர். இந்த சார்பு, அவசரமான முடிவுகள், அதிகப்படியான செலவுகள் மற்றும் மோசமான முன்னுரிமைகள் ஆகியவற்றிற்கு வழிவகுக்கும்.

      மேலும், உண்மையான வளப் பற்றாக்குறையால் பாதிக்கப்படுபவர்களின் அறிவாற்றல் திறன்களையும் அரிதான தன்மை பாதிக்கிறது; வறுமை மற்ற முடிவுகளுக்கான "மன வளத்தை" குறைக்கலாம்.
    why_this_is_important: |
      அரிதான தன்மை சார்பை அங்கீகரிப்பது, உங்களைத் தந்திரமான உத்திகளில் இருந்து தப்பிக்கவும், மிகவும் கவனமான தேர்வுகளைச் செய்யவும் உதவுகிறது. இது, வரையறுக்கப்பட்ட பதிப்புகளை நாம் ஏன் அதிகமாக மதிக்கிறோம் என்பதையும், தேவைப்படாதபோது நாம் ஏன் அவசரமாகச் செயல்படுகிறோம் என்பதையும் விளக்குகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - பேச்சுவார்த்தை
      - முதலீடு
      - இடர் மதிப்பீடு
    how_can_you_spot_it:
      urgency_trigger: |
        "வரையறுக்கப்பட்ட நேரம்" அல்லது "இன்னும் X மட்டுமே உள்ளன" என்பது நியாயமற்ற ஆசையை உருவாக்குகிறது.
      fear_of_missing_out: |
        அணுகலை இழக்கும் சாத்தியக்கூறு, உள்ளார்ந்த மதிப்பை விட செயலைத் தூண்டுகிறது.
      impulsive_purchases: |
        அரிதாக இருப்பதால் பொருட்களை வாங்குவது, உங்களுக்குத் தேவைப்படுவதால் அல்ல.
      artificial_scarcity: |
        அரிதான தன்மை செயற்கையாக உருவாக்கப்படுகிறது (எ.கா., போலி கவுண்ட்டவுன்கள்) உண்மையானது அல்ல.
    examples:
      sales: |
        "இன்னும் 2 மட்டுமே கையிருப்பில் உள்ளன" அல்லது "விற்பனை இன்று இரவு முடிகிறது" என்பது, அவசரத்தின்றி நடக்காத வாங்குதல்களைத் தூண்டுகிறது.
      auctions: |
        ஏலதாரர்கள் வெற்றி பெறுவதில் ஈடுபட்டு, போட்டி அரிதான தன்மையால் திட்டமிட்டதை விட அதிகமாகச் செலுத்துகிறார்கள்.
      exclusivity: |
        "உறுப்பினர்களுக்கு மட்டும்" அல்லது "அழைப்புக்கு மட்டும்" அணுகல், உணரப்பட்ட மதிப்பை அதிகரிக்கிறது.
      genuine_scarcity: |
        வளங்கள் உண்மையாகவே குறைவாக இருக்கும்போது, அரிதான அழுத்தத்தில் உள்ளவர்கள் மோசமான முடிவுகளை எடுக்கிறார்கள் (எ.கா., ஏழைகள், நேரம் குறைவாக இருப்பவர்கள்).
    real_world_implications: |
      அரிதான தன்மை சார்பு நுகர்வோர் நடத்தையையும், பேச்சுவார்த்தை முடிவுகளையும், கொள்கை பதில்களையும் இயக்குகிறது. இது அறரீதியாக (எ.கா., முறையான காலக்கெடு) அல்லது நேர்மையற்ற முறையில் (எ.கா., போலி அரிதான தன்மை) பயன்படுத்தப்படலாம். இதைப் புரிந்துகொள்வது, முடிவின் தரத்தை மேம்படுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        மற்றவர்கள் செயற்கையான அரிதான தன்மையை உருவாக்கும்போது கவனமாக இருங்கள் ("நான் ஒரு சில வாடிக்கையாளர்களை மட்டுமே ஏற்றுக்கொள்கிறேன்"). அரிதான தன்மை உண்மையானதா என்பதைச் சரிபார்க்கவும். உறவுகளை உருவாக்கும்போது, உங்கள் நேரத்தின் உண்மையான அரிதான தன்மை மதிப்பைக் குறிக்கலாம்—ஆனால் அதிகமாகப் பயன்படுத்துவது தந்திரமாகத் தோன்றலாம்.
      collaborative_learning_initiative: |
        முயற்சிகளுக்கு அவசரத்தை உருவாக்கும்போது, அது முறையானது என்பதை உறுதிப்படுத்தவும். போலி காலக்கெடு கண்டறியப்படும்போது நம்பிக்கையைச் சிதைக்கிறது.
    how_can_this_be_misapplied:
      manipulation: |
        மற்றவர்களை முடிவுகளுக்கு அழுத்தம் கொடுக்க, வேண்டுமென்றே தவறான அரிதான தன்மையை உருவாக்குதல்.
      impulsive_decisions: |
        செயற்கையான அவசரத்தின் கீழ் முக்கியமான தேர்வுகளைச் செய்தல், அதிக நேரம் சிறந்த முடிவுகளுக்கு வழிவகுக்கும் போது.
      overvaluing_scarcity: |
        அரிதான விஷயங்கள் எப்போதும் சிறந்தவை என்று கருதுதல்—சில சமயங்களில் அரிதான தன்மை தற்செயலானது.
      exploiting_vulnerability: |
        ஏற்கனவே வள அழுத்தத்தில் உள்ளவர்களிடம் அரிதான உத்திகளைப் பயன்படுத்துதல்.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: இரண்டாம் நிலை சிந்தனை
    quick_introduction: |
      இரண்டாம் நிலை சிந்தனை என்பது உங்கள் செயல்களின் விளைவுகளின் விளைவுகளைக் கருத்தில் கொள்ளும் ஒரு பயிற்சியாகும். முதல் நிலை சிந்தனை "நான் X செய்தால் என்ன நடக்கும்?" என்று கேட்கிறது. இரண்டாம் நிலை சிந்தனை "அப்புறம் என்ன?" மற்றும் "அதற்குப் பிறகு என்ன?" என்று கேட்கிறது. இது எதிர்பாராத விளைவுகளை வெளிப்படுத்துகிறது.
    one_liner: அப்புறம் என்ன? என்று கேளுங்கள்—விளைவுகளின் விளைவுகளைக் கருத்தில் கொள்ளுங்கள்.
    try_this:
      - எந்தவொரு முடிவுக்கும், குறைந்தது இரண்டு முறை அப்புறம் என்ன? என்று கேளுங்கள்.
      - உங்கள் செயலுக்கு மற்றவர்கள் எப்படி பதிலளிப்பார்கள் என்பதைக் கருத்தில் கொள்ளுங்கள்—அதற்கு அவர்களின் பதில் எப்படி இருக்கும் என்பதையும் கருத்தில் கொள்ளுங்கள்.
      - தொடர்ச்சியில் முதல் நிலை விளைவுகள் தலைகீழாக மாறுவதையோ அல்லது சிக்கலாவதையோ கவனியுங்கள்.
    ask_yourself:
      - இரண்டாம் நிலை (மற்றும் மூன்றாம் நிலை) விளைவுகளை நான் சிந்தித்தேனா?
      - நான் என்ன எதிர்பாராத விளைவுகளைத் தவறவிடுகிறேன்?
    in_more_detail: |
      ஹோவர்ட் மார்க்ஸ் முதலீட்டில் இந்தக் கருத்தை பிரபலப்படுத்தினார். முதல் நிலை: "இது உயரும்." இரண்டாம் நிலை: "இது உயர்ந்தால், மற்றவர்கள் கவனிப்பார்கள், இன்னும் பலர் வாங்குவார்கள், அது இன்னும் உயரும்—அது அதிகமாக மதிப்பிடப்பட்டு வீழ்ச்சியடையும் வரை." விளைவுகளின் தொடர் பெரும்பாலும் முதல் நிலை விளைவை மாற்றியமைக்கிறது அல்லது சிக்கலாக்குகிறது.

      இரண்டாம் நிலை சிந்தனை கடினமானது—அதற்கு அதிக மன முயற்சி மற்றும் கற்பனை தேவை. ஆனால் அது பல தவறுகளைத் தடுக்கிறது. நல்ல வியூகவாதிகள் பல படிகள் முன்னோக்கி சிந்தித்து மற்றவர்கள் எப்படி பதிலளிப்பார்கள் என்பதைக் கருதுகிறார்கள்.
    why_this_is_important: |
      இரண்டாம் நிலை சிந்தனை எதிர்பாராத விளைவுகளைத் தடுக்கிறது மற்றும் முடிவுகளின் தரத்தை மேம்படுத்துகிறது. இது வியூகம், கொள்கை மற்றும் செயல்கள் எதிர்வினைகளைத் தூண்டும் எந்தவொரு துறைக்கும் அவசியம்.
    when_to_use:
      - முடிவு_எடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - வியூகம்
      - இடர்_மதிப்பீடு
    how_can_you_spot_it:
      consequence_chains: |
        "நான் X செய்தால், பிறகு Y நடக்கும், பிறகு Z நடக்கும்..."
      reaction_anticipation: |
        உங்கள் செயலுக்கு மற்றவர்கள் எப்படி பதிலளிப்பார்கள் என்பதைக் கருத்தில் கொள்வது.
      unintended_effects: |
        பக்க விளைவுகள் மற்றும் பின்னூட்ட சுழல்களைத் தேடுவது.
      reversals: |
        முதல் நிலை விளைவுகளை முரண்படும் அல்லது தலைகீழாக்கும் இரண்டாம் நிலை விளைவுகள்.
    examples:
      investing: |
        "எல்லோரும் இதை ஒரு நல்ல முதலீடாகக் கருதினால், அது பெரும்பாலும் கூட்டமாக இருக்கும்—
        சாதகமான நிலை போய்விட்டிருக்கலாம்."
      policy: |
        "நாம் Xக்கு மானியம் அளித்தால், தேவை அதிகரிக்கும், விலைகள் உயரும்—மானியத்தால்
        உண்மையில் உதவுகிறதா?"
      negotiation: |
        "நான் இங்கு கடுமையாக அழுத்தினால், அவர்கள் அங்கு பதிலடி கொடுப்பார்கள்—நிகர விளைவு என்ன?"
      incentives: |
        "நாம் இந்த அளவீட்டுக்கு வெகுமதி அளித்தால், மக்கள் அதைத் தவறாகப் பயன்படுத்துவார்கள்—அவர்கள் உண்மையில்
        என்ன செய்வார்கள்?"
    real_world_implications: |
      இரண்டாம் நிலை சிந்தனை என்பது வியூக சிந்தனையின் அடையாளமாகும். இது கொள்கைத் தோல்விகள், எதிர்பாராத ஊக்குவிப்புகள் மற்றும் அப்பாவி நம்பிக்கை ஆகியவற்றைத் தடுக்கிறது. இது சிறந்த முடிவெடுப்பவர்களிடமிருந்து சிறந்ததை வேறுபடுத்துகிறது.
    professional_application:
      networking_and_relationship_building: |
        ஒரு செயலைச் செய்வதற்கு முன், "அவர்கள் எப்படி பதிலளிப்பார்கள்? நான் அதற்கு எப்படி
        பதிலளிப்பேன்?" என்று கேளுங்கள். உடனடி பரிமாற்றத்தை மட்டும் கருத்தில் கொள்ளாமல், உறவு இயக்கவியலைக் கருத்தில் கொள்ளுங்கள்.
      collaborative_learning_initiative: |
        திட்டமிடலில், "அப்புறம் என்ன?" பயிற்சிகளை நடத்துங்கள். விளைவுச் சங்கிலிகளை வரைபடமாக்குங்கள்.
        அவை வெளிப்படுவதற்கு முன் எதிர்பாராத விளைவுகளை அடையாளம் காணுங்கள்.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        பல படிகள் முன்னோக்கி சிந்தித்து, ஒருபோதும் செயல்படாமல் இருப்பது.
      false_complexity: |
        முதல் நிலை விளைவுகள் போதுமானதாக இருக்கும்போது, இரண்டாம் நிலை விளைவுகள் எப்போதும் மேலாதிக்கம் செலுத்தும் என்று கருதுவது.
      overconfidence: |
        சிக்கலான நீண்ட தொடர்களை கணிக்க முடியும் என்று நம்புவது, நிச்சயமற்ற தன்மை அதிகரிக்கும் போது.
      pessimism: |
        விளைவுகளின் தொடரில் எப்போதும் மோசமானதை எதிர்பார்ப்பது.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: மூழ்கிய செலவு தவறு
    quick_introduction: |
      மூழ்கிய செலவு தவறு என்பது, எதிர்கால எதிர்பார்க்கப்படும் வருமானத்தின் அடிப்படையில் அல்லாமல்,
      ஏற்கனவே செலவிடப்பட்ட வளங்களின் காரணமாக ஒரு முடிவில் தொடர்ந்து முதலீடு செய்யும் போக்காகும்.
      "நாம் இவ்வளவு தூரம் வந்துவிட்டோம்" அல்லது "நான் ஏற்கனவே இவ்வளவு முதலீடு செய்துள்ளேன்" என்பது
      தவறானதைச் சரிசெய்ய மேலும் செலவு செய்ய வழிவகுக்கிறது.
    one_liner: கடந்த கால முதலீடு போய்விட்டது—எதிர்கால செலவுகளும் நன்மைகளும் மட்டுமே முக்கியம்.
    try_this:
      - Ask—நான் இன்று ஆரம்பித்திருந்தால், இந்தப் பாதையைத் தேர்ந்தெடுப்பேனா?
      - Define kill criteria in advance—conditions under which you will stop. (முன்கூட்டியே நிறுத்தும் அளவுகோல்களை வரையறுக்கவும் - எப்போது நீங்கள் நிறுத்துவீர்கள் என்பதற்கான நிபந்தனைகள்.)
      - Evaluate the marginal decision—what do I gain or lose from here forward? (விளிம்புநிலை முடிவை மதிப்பீடு செய்யவும்: இங்கிருந்து முன்னோக்கி என்ன லாபம் அல்லது இழப்பு?)
    ask_yourself:
      - Am I continuing because of future value, or to justify past investment? (எதிர்கால மதிப்புக்காகத் தொடர்கிறேனா, அல்லது கடந்த கால முதலீட்டை நியாயப்படுத்தவா?)
      - What would I advise a friend who was in my position from scratch? (பூஜ்ஜியத்திலிருந்து எனது நிலையில் இருந்த ஒரு நண்பருக்கு என்ன அறிவுரை வழங்குவேன்?)
    in_more_detail: |
      மூழ்கிய செலவுகள் என்பவை மீட்க முடியாத கடந்த கால செலவுகள். பகுத்தறிவுள்ள முடிவெடுப்பது
      அவற்றை புறக்கணிக்கிறது—எதிர்கால செலவுகளும் நன்மைகளும் மட்டுமே முக்கியம். ஆனால் நாம்
      நமது முதலீடுகளுடன் உணர்ச்சிபூர்வமாக பிணைக்கப்பட்டுள்ளோம். நாம் ரசிக்காத உணவை
      முழுமையாகச் சாப்பிடுகிறோம், பிடிக்காத திரைப்படத்தைத் தொடர்கிறோம், அர்த்தமற்றதாகிவிட்ட
      திட்டங்களைத் தொடர்கிறோம். நாம் "வீணாக்க விரும்பவில்லை" என்று நினைக்கிறோம், ஆனால்
      தொடர்வது பெரும்பாலும் மேலும் வீணடிக்கிறது.

      நாம் பணம் மட்டுமல்லாது நேரம், முயற்சி, அல்லது அடையாளத்தையும் முதலீடு செய்திருக்கும்போது
      இந்த தவறு குறிப்பாக வலுவாக இருக்கும். நாம் தவறு செய்தோம் என்பதை ஒப்புக்கொள்வது
      விலை உயர்ந்ததாக உணரலாம், எனவே நாம் இரட்டிப்பு செய்கிறோம்.
    why_this_is_important: |
      மூழ்கிய செலவு தவறை அங்கீகரிப்பது, இழப்புகளைக் குறைக்கவும், தேவைப்படும்போது திசையை
      மாற்றவும், கடந்த கால முதலீட்டை விட எதிர்கால மதிப்பின் அடிப்படையில் முடிவுகளை எடுக்கவும்
      உதவுகிறது. திட்டங்கள், தொழில்கள் மற்றும் உறவுகளுக்கு இது அவசியம்.
    when_to_use:
      - முடிவெடுத்தல்
      - முதலீடு செய்தல்
      - தொழில் சார்ந்த நகர்வுகள்
      - இடர் மதிப்பீடு
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "நாம் இப்போது நிறுத்த முடியாது—நாம் ஏற்கனவே X செலவு செய்துள்ளோம்" என்று கூறுவது,
        எதிர்கால வருமானம் தொடர்வதை நியாயப்படுத்தாத போது.
      escalation_of_commitment: |
        முந்தைய முதலீட்டை நியாயப்படுத்த அல்லது "மீட்க" மேலும் முதலீடு செய்வது.
      identity_investment: |
        தோல்வியை ஒப்புக்கொள்வது சுய உருவத்திற்கு அச்சுறுத்தல் ஏற்படுத்தும் என்பதால் தொடர்வது.
      ignoring_marginal_analysis: |
        மொத்த செலவின் அடிப்படையில் முடிவுகளை எடுப்பது, அதிகரித்த செலவு மற்றும் நன்மையை அல்ல.
    examples:
      projects: |
        ஒரு தோல்வியடைந்த திட்டத்தைத் தொடர்வது, "நாம் ஏற்கனவே அதில் 6 மாதங்கள் செலவிட்டுள்ளோம்"
        என்று கூறுவது, இழப்புகளைக் குறைப்பது பகுத்தறிவுள்ள செயலாக இருக்கும்போது.
      relationships: |
        "நாம் 5 ஆண்டுகளாக ஒன்றாக இருக்கிறோம்" என்பதால் ஒரு உறவில் நீடிப்பது, எதிர்காலத்தை
        மதிப்பீடு செய்வதற்குப் பதிலாக.
      careers: |
        நீங்கள் விரும்பாத ஒரு தொழிலில் நீடிப்பது, ஏனெனில் நீங்கள் பட்டம் அல்லது அனுபவத்திற்காக
        முதலீடு செய்துள்ளீர்கள்.
      investments: |
        "சமநிலைக்குத் திரும்ப" நஷ்டமடைந்த பங்குகளை வைத்திருப்பது, சிறந்த வாய்ப்புகளுக்கு
        மாற்றுவதற்குப் பதிலாக.
    real_world_implications: |
      மூழ்கிய செலவு தவறு வீணான வளங்கள், நீண்டகால தோல்விகள் மற்றும் தவறவிட்ட வாய்ப்புகளுக்கு
      வழிவகுக்கிறது. இது தனிநபர்கள், நிறுவனங்கள் மற்றும் அரசாங்கங்களைப் பாதிக்கிறது.
      அதை வெல்வதற்கு வெளிப்படையான முடிவெடுக்கும் கட்டமைப்புகள் தேவை.
    professional_application:
      networking_and_relationship_building: |
        கடந்த கால முதலீடு காரணமாக இனி உங்களுக்குப் பயனளிக்காத உறவுகள் அல்லது ஒத்துழைப்புகளில்
        முதலீடு செய்வதைத் தொடர வேண்டாம். முன்னோக்கு மதிப்பை மதிப்பிடவும்.
      collaborative_learning_initiative: |
        திட்டங்களுக்கான "நிறுத்தும் அளவுகோல்களை" உருவாக்கவும் - கடந்த கால முதலீட்டைப் பொருட்படுத்தாமல்
        நீங்கள் நிறுத்தும் நிபந்தனைகள். "பூஜ்ஜியத்திலிருந்து" என்ற கண்ணோட்டத்துடன் திட்டங்களை
        காலமுறையாக மதிப்பாய்வு செய்யவும்.
    how_can_this_be_misapplied:
      quitting_too_early: |
        செலுத்த அதிக நேரம் தேவைப்படும் விஷயங்களை கைவிடுவதற்கு "மூழ்கிய செலவை" ஒரு
        சாக்காகப் பயன்படுத்துவது.
      undervaluing_consistency: |
        சில கடமைகள் (எ.கா., உறவுகள், நற்பெயர்) தொடர்ச்சியில் மதிப்பு கொண்டவை,
        இது தூய விளிம்புநிலை பகுப்பாய்வு தவறவிடுகிறது.
      cold_rationality: |
        உணர்ச்சிபூர்வமான இணைப்பை பகுத்தறிவற்றதாக நிராகரிப்பது, அது உண்மையான மதிப்புகளைப்
        பிரதிபலிக்கும்போது.
      analysis_paralysis: |
        தொடர்வதா இல்லையா என்பதைப் பற்றி அதிகமாகச் சிந்திப்பது, பதில் தெளிவாக இருக்கும்போது.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: பிழைப்பு சார்பு
    quick_introduction: |
      பிழைப்பு சார்பு என்பது ஒரு செயல்முறையில் "பிழைத்தவர்களை" (survived) மட்டுமே கவனம் செலுத்தி, பிழைக்காதவர்களைப் புறக்கணிக்கும் ஒரு தர்க்கரீதியான பிழை ஆகும். நாம் வெற்றியாளர்களைப் பார்த்து, தோல்வியுற்றவர்களை மறந்து விடுகிறோம், இது வெற்றி மற்றும் தோல்வி பற்றிய மிகைப்படுத்தப்பட்ட நம்பிக்கைகளுக்கு வழிவகுக்கிறது.
    one_liner: நாம் வெற்றியாளர்களைப் பார்த்து, தோல்வியுற்றவர்களை மறந்து விடுகிறோம்—இது மிகைப்படுத்தப்பட்ட நம்பிக்கைகளுக்கு வழிவகுக்கிறது.
    try_this:
      - இது போன்ற ஒன்றைச் செய்வதில் யார் தோல்வியடைந்தார்கள் என்று கேளுங்கள்? அவர்களிடமிருந்து நாம் என்ன கற்றுக்கொள்ளலாம்?
      - கண்ணுக்குத் தெரியாத மாதிரியைத் தேடுங்கள்—பிழைக்காதவர்கள்.
      - நீங்கள் வெற்றி கதைகளை மட்டுமே படிக்கும்போது கவனிக்கவும்.
    ask_yourself:
      - நான் பிழைத்தவர்களிடமிருந்து மட்டுமே கற்றுக்கொள்கிறேனா?
      - தோல்விகளையும் சேர்த்தால் முழுமையான படம் எப்படி இருக்கும்?
    in_more_detail: |
      இரண்டாம் உலகப் போரின் போது, புள்ளியியலாளர் ஆபிரகாம் வால்ட், தப்பிப்பிழைத்த விமானங்களில் எங்கு தாக்கப்பட்டது என்பதை ஆராய்ந்து—மற்றும் *பிழைக்காத* விமானங்கள் தாக்கப்பட்டது எங்கே, ஏனெனில் அந்த விமானங்கள் ஒருபோதும் திரும்ப வரவில்லை, அங்கே கவசங்களை பரிந்துரைப்பதன் மூலம் குண்டுவீச்சு விமானங்களின் கவசப் பகுதியை சரிசெய்தார். நாம் இயற்கையாகவே காணக்கூடிய மாதிரியில் (பிழைத்தவர்கள்) கவனம் செலுத்தி, கண்ணுக்குத் தெரியாதவர்களை (தோல்வியுற்றவர்கள்) புறக்கணிக்கிறோம்.

      பிழைப்பு சார்பு தொழில்முனைவு, முதலீடு, தொழில்கள் மற்றும் வரலாறு பற்றிய நமது பார்வையை சிதைக்கிறது. நாம் வெற்றிகரமான நிறுவனங்களைப் படிக்கிறோம், இதேபோன்றவற்றைச் செய்து தோல்வியடைந்த ஆயிரக்கணக்கானவர்களை நாம் இழக்கிறோம். அதிர்ஷ்டசாலிகளை நாம் கேட்கிறோம், துரதிர்ஷ்டசாலிகளை மறந்து விடுகிறோம்.
    why_this_is_important: |
      பிழைப்பு சார்புக்காக சரிசெய்வது யதார்த்தமான எதிர்பார்ப்புகளுக்கும் சிறந்த முடிவுகளுக்கும் வழிவகுக்கிறது. இது வெற்றிகளிலிருந்து மட்டுமல்ல, தோல்விகளிலிருந்தும் கற்றுக்கொள்ள உதவுகிறது, மேலும் அதிர்ஷ்டசாலியான சிலருக்கு மட்டுமே வேலை செய்த உத்திகளை நகலெடுப்பதைத் தவிர்க்க உதவுகிறது.
    when_to_use:
      - முடிவெடுத்தல்
      - முதலீடு
      - தொழில்_மாற்றங்கள்
      - கற்றல்
    how_can_you_spot_it:
      visible_success_stories: |
        முயற்சி செய்து தோல்வியடைந்தவர்களை விட வெற்றிகரமான நபர்களிடமிருந்து நாம் அதிகமாகக் கேட்கிறோம்.
      missing_failures: |
        நாம் கவனிக்கின்ற மாதிரி, "வெற்றிபெறாதவர்கள்" மற்றும் எனவே அவர்களின் கதைகளைச் சொல்ல முடியாதவர்களை விலக்குகிறது.
      copying_survivors: |
        வெற்றியாளர்கள் தங்கள் வெற்றியை அதைச் செய்ததால்தான் அடைந்தார்கள் என்று கருதுவது, ஆனால் அது அதிர்ஷ்டமாகவோ அல்லது பிழைப்பு காரணமாகவோ இருந்திருக்கலாம்.
      overly_optimistic_models: |
        முயற்சிகளின் வகுக்கும் எண்ணை (denominator of attempts) புறக்கணிக்கும் வெற்றி விகிதங்களின் மதிப்பீடுகள்.
    examples:
      entrepreneurship: |
        "Zuckerberg போல கல்லூரியை விட்டு வெளியேறு" என்பது பில்லியன் டாலர் நிறுவனங்களை உருவாக்காத பல கல்லூரியை விட்டு வெளியேறியவர்களை புறக்கணிக்கிறது.
      investing: |
        தப்பிப்பிழைத்த நிதிகளை மட்டுமே படிப்பது, மோசமான செயல்திறனுக்குப் பிறகு மூடப்பட்ட நிதிகளை புறக்கணிக்கிறது, இதனால் வரலாற்று வருமானத்தை மிகைப்படுத்துகிறது.
      career_advice: |
        வெற்றிகரமானவர்கள் வெற்றியை கடின உழைப்புக்கு காரணமாகக் கூறுகிறார்கள்; கடினமாக உழைத்து தோல்வியடைந்தவர்களிடமிருந்து நாம் கேட்பதில்லை.
      historical_analysis: |
        தப்பிப்பிழைத்த "சிறந்த" நிறுவனங்களைப் படிப்பது, இதேபோன்ற உத்திகளுடன் தோல்வியுற்ற பலவற்றை புறக்கணிக்கிறது.
    real_world_implications: |
      பிழைப்பு சார்பு உணரப்பட்ட வெற்றி விகிதங்களை மிகைப்படுத்துகிறது, முன்மாதிரிகளை சிதைக்கிறது, மேலும் மோசமான நகல்களுக்கு வழிவகுக்கிறது. இதைச் சரிசெய்வதற்கு தோல்வி நிகழ்வுகளைத் தேடுவதும், அடிப்படை விகிதங்களைப் புரிந்துகொள்வதும் அவசியம்.
    professional_application:
      networking_and_relationship_building: |
        ஆலோசனை தேடும்போது, முயற்சி செய்து தோல்வியுற்றவர்களிடமிருந்தும் ஆலோசனை பெறுங்கள்—அவர்களின் பார்வைகள் பெரும்பாலும் பிழைத்தவர்களை விட அதிக தகவலறிந்தவை.
      collaborative_learning_initiative: |
        வெற்றிகரமானவர்களை மட்டுமல்லாமல், தோல்வியுற்ற திட்டங்கள் மற்றும் மூடப்பட்ட முயற்சிகளையும் படிக்கவும். வேலை செய்யாதவற்றிலிருந்து கற்றுக்கொள்ள "தோல்வி பின்னாய்வுகளை" (failure post-mortems) நடத்தவும்.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        வெற்றி எப்போதும் அதிர்ஷ்டம் என்றும், முயற்சி முக்கியமில்லை என்றும் கருதும் அளவுக்கு மிகைப்படுத்தப்பட்ட அவநம்பிக்கை.
      dismissing_success: |
        "பிழைப்பு சார்பு" காரணமாக வெற்றிகரமானவர்களிடமிருந்து கற்றுக்கொள்ள மறுப்பது.
      analysis_paralysis: |
        தோல்வி நிகழ்வுகளில் மிகவும் கவனம் செலுத்தி, ஒருபோதும் செயல்படாமல் இருப்பது.
      false_equivalence: |
        பிழைத்தவர்கள் மற்றும் பிழைக்காதவர்களின் உத்திகளை, சூழல் வேறுபடும்போது, சமமாக தகவலறிந்ததாகக் கருதுவது.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: ஸெய்கார்னிக் விளைவு
    quick_introduction: |
      ஸெய்கார்னிக் விளைவு என்பது முடிக்கப்பட்ட பணிகளை விட, முடிக்கப்படாத அல்லது தடைபட்ட பணிகளை நினைவில் கொள்வதற்கான போக்காகும். முடிக்கப்படாத பணிகள் உளவியல் பதற்றத்தை உருவாக்குகின்றன, அவை நம் மனதில் தீவிரமாக இருக்கச் செய்கின்றன. நம் மூளை முடிக்கப்படாதவற்றைத் தக்க வைத்துக் கொள்கிறது.
    one_liner: முடிக்கப்படாத பணிகள் நம் மனதில் ஒட்டிக் கொள்கின்றன - நம் மூளை முடிக்கப்படாதவற்றைத் தக்க வைத்துக் கொள்கிறது.
    try_this:
      - பணிகளை உங்கள் மனச்சுமையிலிருந்து "விடுவிக்க" நிறைவைப் பயன்படுத்தவும் - அவற்றை முடிக்கவும் அல்லது வெளிப்படையாக கைவிடவும்.
      - உற்பத்தித்திறன் கொண்ட திறந்த வளையங்களை உருவாக்க, பணிகளை நிர்வகிக்கக்கூடிய பகுதிகளாகப் பிரிக்கவும்.
      - முடிக்கப்படாத விஷயங்களைப் பற்றி நீங்கள் சிந்திக்கும்போது கவனியுங்கள் - வளையத்தை மூடவும் அல்லது அதை விட்டுவிட முடிவு செய்யவும்.
    ask_yourself:
      - என் மனதில் பதற்றத்தை உருவாக்கும் முடிக்கப்படாத பணிகள் யாவை?
      - இந்த திறந்த வளையம் மதிப்புக்குரியதா, அல்லது நான் அதை மூட முடியுமா?
    in_more_detail: |
      ப்ளூமா ஸெய்கார்னிக், வெயிட்டர்கள் பணம் செலுத்தப்பட்ட ஆர்டர்களை விட பணம் செலுத்தப்படாத ஆர்டர்களை நன்கு நினைவில் கொள்வதைக் கவனித்தார் - பணி முடிந்தவுடன், அது நினைவகத்திலிருந்து "விடுவிக்கப்பட்டது". முடிக்கப்படாத பணிகள் மூடலைத் தேவைப்படும் ஒரு திறந்த வளையத்தை உருவாக்குகின்றன. இது உற்பத்தித்திறன் கவனம் (நாம் முடிக்க விரும்புகிறோம்) மற்றும் பதட்டம் (செய்யப்படாதவற்றைப் பற்றி நம்மால் சிந்திக்க முடியாது) இரண்டையும் இயக்குகிறது.

      இந்த விளைவு சந்தைப்படுத்தல் (கிளிஃப்ஹேங்கர்கள், முழுமையற்ற கதைகள்) மற்றும் உற்பத்தித்திறன் (பல "திறந்த வளையங்களை" உருவாக்க பணிகளை பகுதிகளாகப் பிரித்தல்) ஆகியவற்றில் பயன்படுத்தப்படுகிறது. இது நாம் ஏன் முடிக்கப்படாத வணிகத்தைப் பற்றி நினைக்கிறோம் என்பதையும், ஏன் செய்ய வேண்டிய பட்டியல்கள் அதிகமாகத் தோன்றக்கூடும் என்பதையும் விளக்குகிறது.
    why_this_is_important: |
      ஸெய்கார்னிக் விளைவைப் புரிந்துகொள்வது மனச்சுமையை நிர்வகிக்கவும், ஈர்க்கக்கூடிய அனுபவங்களை வடிவமைக்கவும், தடையை திட்டமிட்டுப் பயன்படுத்தவும் உதவுகிறது. முடிக்கப்படாத வேலைகளைப் பற்றி நம்மால் ஏன் சிந்திக்க முடியாது என்பதை இது விளக்குகிறது - மேலும் அது எவ்வாறு பயன்படுத்தப்படலாம் அல்லது தீங்கு விளைவிக்கும் என்பதையும் விளக்குகிறது.
    when_to_use:
      - சிக்கல்_தீர்வு
      - தலைமைத்துவம்
      - கற்றல்
      - முடிவெடுத்தல்
    how_can_you_spot_it:
      rumination_on_incomplete: |
        முடிக்கப்பட்ட பணிகளை விட முடிக்கப்படாத பணிகள் எண்ணங்களில் குறுக்கிடுகின்றன.
      better_recall_of_unfinished: |
        முடிக்கப்பட்ட பணிகளை விட தடைபட்ட பணிகளை நாம் நன்கு நினைவில் கொள்கிறோம்.
      tension_for_closure: |
        தொடங்கப்பட்டதை முடிப்பதற்கான அசௌகரியம் அல்லது உந்துதல்.
      serial_dramas: |
        கிளிஃப்ஹேங்கர்கள் மற்றும் "தொடரும்" விளைவைச் சுரண்டுகின்றன.
    examples:
      productivity: |
        ஒரு பணியைத் தொடங்குவது மனப் பதற்றத்தை உருவாக்குகிறது, இது நிறைவை இயக்குகிறது - அல்லது அதிக திறந்த வளையங்கள் இருந்தால் பதட்டத்தை இயக்குகிறது.
      marketing: |
        "3 இல் பகுதி 1" அல்லது "தொடரும்" பார்வையாளர்களை ஈடுபாட்டுடனும் திரும்ப வருவதாகவும் வைத்திருக்கிறது.
      meetings: |
        தெளிவான அடுத்த படிகள் இல்லாமல் ஒரு கூட்டத்தை முடிப்பது பங்கேற்பாளர்களுக்கு தீர்க்கப்படாத பதற்றத்தை விட்டுச்செல்கிறது.
      learning: |
        பதிலளிக்கப்படாத கேள்விகள் அல்லது முழுமையற்ற விளக்கங்கள் நினைவில் தங்கி மேலும் விசாரணைக்கு வழிவகுக்கின்றன.
    real_world_implications: |
      ஸெய்கார்னிக் விளைவு உற்பத்தித்திறன், ஈடுபாடு மற்றும் மனச்சுமையை பாதிக்கிறது. இது கவனத்திற்காகப் பயன்படுத்தப்படலாம் அல்லது அதிகப்படியாக உருவாக்கலாம். இது கிளிஃப்ஹேங்கர்களின் கவர்ச்சியையும், அதிகப்படியான திறந்த பணிகளின் சுமையையும் விளக்குகிறது.
    professional_application:
      networking_and_relationship_building: |
        தெளிவான அடுத்த படிகளுடன் உரையாடல்களை முடிக்கவும் - அல்லது மற்ற நபர் பின்தொடர வேண்டும் என்று நீங்கள் விரும்பினால் வேண்டுமென்றே திறந்த வளையங்களுடன் முடிக்கவும். தீர்க்கப்படாத இழைகள் ஈடுபாட்டை உருவாக்குகின்றன.
      collaborative_learning_initiative: |
        பயிற்சியில் ஸெய்கார்னிக் விளைவைப் பயன்படுத்தவும்: கற்பவர்களை ஈடுபாட்டுடன் வைத்திருக்க இடைவேளைகளுக்கு முன் சிக்கல்கள் அல்லது கேள்விகளைக் கேட்கவும். ஆனால் மக்கள் அதிகமாக உணரும் அளவுக்கு பல திறந்த வளையங்களை உருவாக்குவதைத் தவிர்க்கவும்.
    how_can_this_be_misapplied:
      overwhelm: |
        பல திறந்த வளையங்களை உருவாக்குவது - பல முடிக்கப்படாத பணிகள் - பதட்டம் மற்றும் செயலிழப்புக்கு வழிவகுக்கிறது.
      manipulation: |
        சார்புநிலையை அல்லது ஈடுபாட்டை உருவாக்க வேண்டுமென்றே விஷயங்களைத் தீர்க்காமல் விடுவது.
      false_urgency: |
        அங்கு இல்லாதபோது செயற்கையான அவசரத்தை உருவாக்க விளைவைப் பயன்படுத்துதல்.
      incomplete_work: |
        "பதற்றத்தை" உருவாக்க பல விஷயங்களைத் தொடங்குவது, அவற்றை உண்மையில் முடிக்காமல் - சிதறிய முயற்சிக்கு வழிவகுக்கும்.
    related_content:
