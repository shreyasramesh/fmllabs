  - id: ostrich_effect
    name: நெருப்புக்கோழி விளைவு
    quick_introduction: |
      நெருப்புக்கோழி விளைவு என்பது எதிர்மறையான நிதித் தகவல்களைத் தவிர்ப்பதற்கான ஒரு போக்கு ஆகும் - நெருப்புக்கோழி போல "தங்கள் தலையை மணலில் புதைத்துக் கொள்வது". சந்தைகள் வீழ்ச்சியடையும் போது மக்கள் தங்கள் போர்ட்ஃபோலியோக்களைப் பார்க்கத் தவறிவிடுகிறார்கள், பில்களைத் திறப்பதை தாமதப்படுத்துகிறார்கள், மேலும் செயல்பட உதவும் எச்சரிக்கை அறிகுறிகளைப் புறக்கணிக்கிறார்கள்.
    one_liner: கெட்ட செய்திகளைத் தவிர்ப்பது யதார்த்தத்தை மாற்றாது—அது உங்கள் பதிலை மட்டுமே தாமதப்படுத்துகிறது.
    try_this:
      - வழக்கமான சோதனைகளைத் திட்டமிடுங்கள், இதனால் நீங்கள் எண்களைத் தவிர்க்க முடியாது.
      - ஏதாவது ஒன்றைத் திறப்பதை அல்லது பார்ப்பதை நீங்கள் தாமதப்படுத்தும் போது கவனிக்கவும்.
      - கேளுங்கள்: நான் எதைத் தவிர்க்கிறேன், அதை எதிர்கொண்டால் என்ன மாறும்?
    ask_yourself:
      - தகவல் எதிர்மறையாக இருக்கலாம் என்பதால் நான் அதைத் தவிர்க்கிறேனா?
      - முன்கூட்டியே அறிந்திருந்தால் சிறப்பாக செயல்பட அது உதவுமா?
    in_more_detail: |
      சந்தை வீழ்ச்சியின் போது தங்கள் முதலீடுகளைச் சரிபார்ப்பதைத் தவிர்க்கும் முதலீட்டாளர்களை விவரிக்க நடத்தை நிதியியலில் இந்த வார்த்தை உருவாக்கப்பட்டது. இந்த நடத்தை நிதியையும் தாண்டி நீண்டுள்ளது: மருத்துவ பரிசோதனைகளைத் தவிர்ப்பது, உறவுப் பிரச்சனைகளைப் புறக்கணிப்பது, மற்றும் கடினமான உரையாடல்களைத் தாமதப்படுத்துவது. கெட்ட செய்திகளின் பதட்டத்தைத் தவிர்க்க முயற்சிக்கிறோம், ஆனால் தவிர்ப்பு பெரும்பாலும் சரியான நேரத்தில் நடவடிக்கை எடுப்பதைத் தடுப்பதன் மூலம் விளைவுகளை மோசமாக்குகிறது.

      இந்த விளைவு இழப்பு வெறுப்பு மற்றும் உணர்ச்சி ரீதியான அசௌகரியத்தைத் தவிர்ப்பதற்கான விருப்பத்தால் இயக்கப்படுகிறது. துரதிர்ஷ்டவசமாக, அறியாமை யதார்த்தத்தை மாற்றாது—அது நமது பதிலை மட்டுமே தாமதப்படுத்துகிறது.
    why_this_is_important: |
      நெருப்புக்கோழி விளைவை அங்கீகரிப்பது கடினமான தகவல்களை முன்கூட்டியே எதிர்கொள்ள உங்களுக்கு உதவுகிறது. கெட்ட செய்திகளைத் தவிர்ப்பது அரிதாகவே விளைவுகளை மேம்படுத்துகிறது; அது பொதுவாக அவற்றை அதிகரிக்கிறது. சரியான நேரத்தில் விழிப்புணர்வு சிறந்த முடிவுகளை எடுக்க அனுமதிக்கிறது.
    when_to_use:
      - முடிவு_எடுத்தல்
      - முதலீடு
      - இடர்_மதிப்பீடு
      - தொழில்_முன்னேற்றங்கள்
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        சந்தைகள் வீழ்ச்சியடையும் போது முதலீட்டு அறிக்கைகளைப் பார்க்காமல் இருப்பது.
      delaying_difficult_information: |
        பில்கள், மருத்துவ முடிவுகள் அல்லது செயல்திறன் கருத்துக்களைத் திறப்பதை தாமதப்படுத்துதல்.
      information_avoidance: |
        கெட்ட செய்திகளைக் கொண்டிருக்கக்கூடிய ஆதாரங்களைத் தீவிரமாகத் தவிர்ப்பது.
      procrastination_on_unpleasant_tasks: |
        பிரச்சனைகளை வெளிப்படுத்தும் அல்லது தீர்க்கும் செயல்களை தாமதப்படுத்துதல்.
    examples:
      investing: |
        ஒரு முதலீட்டாளர் கரடிச் சந்தையின் போது தனது 401(k) ஐப் பார்ப்பதை நிறுத்திவிடுகிறார், மறுசீரமைப்பு வாய்ப்புகளை இழக்கிறார்.
      health: |
        கெட்ட செய்திகளின் பயம் காரணமாக அறிகுறிகள் இருந்தபோதிலும் மருத்துவரைச் சந்திப்பதைத் தவிர்ப்பது.
      finances: |
        கடன் தொகையை எதிர்கொள்வதைத் தவிர்க்க கடன் அட்டை அறிக்கைகள் அல்லது வங்கி எச்சரிக்கைகளைத் திறக்காமல் இருப்பது.
      performance: |
        ஒரு மேலாளர் ஆண்டு மதிப்பாய்வு வரை முக்கியமான கருத்தைப் பெறுவதைத் தவிர்க்கிறார், அப்போது முந்தைய தலையீடு உதவியிருக்கும்.
    real_world_implications: |
      நெருப்புக்கோழி விளைவு மோசமான நிதி விளைவுகள், தாமதமான மருத்துவ சிகிச்சை, மற்றும் உறவுகள் மற்றும் வேலைகளில் தீர்க்கப்படாத பிரச்சனைகளுக்கு வழிவகுக்கிறது. இது தவிர்க்கக்கூடிய இழப்புகளை அதிகரிக்கிறது. தகவல்களைப் புறக்கணிப்பதை கடினமாக்கும் அமைப்புகள் உதவக்கூடும்.
    professional_application:
      networking_and_relationship_building: |
        கடினமான உரையாடல்களைத் தவிர்க்காதீர்கள். பிரச்சனைகள் தானாகவே தீரும் என்று நம்புவதை விட முன்கூட்டியே தீர்க்கவும். பிரச்சனைகள் தீவிரமடைவதற்கு முன்பே அவற்றை வெளிப்படுத்தும் வழக்கமான சோதனைகளை உருவாக்கவும்.
      collaborative_learning_initiative: |
        பிரச்சனைகளைப் புறக்கணிப்பது கடினமாக்கும் பின்னூட்ட சுழல்களை உருவாக்குங்கள்—டாஷ்போர்டுகள், வழக்கமான மதிப்பாய்வுகள், மற்றும் கெட்ட செய்திகளை முன்கூட்டியே வெளிப்படுத்துவதை ஊக்குவிக்கும் நெறிமுறைகள்.
    how_can_this_be_misapplied:
      information_overload: |
        சில தகவல் தவிர்ப்பு ஆரோக்கியமானதாக இருக்கும்போது தொடர்ச்சியான கண்காணிப்பை கட்டாயப்படுத்துதல் (எ.கா., நிமிடத்திற்கு நிமிடம் பங்குகளைப் பார்க்காமல் இருப்பது).
      anxiety_amplification: |
        சாத்தியமான பிரச்சனைகளில் அதிக கவனம் செலுத்தி, விளைவுகளை மேம்படுத்தாமல் பதட்டத்தை அதிகரிப்பது.
      blame_shifting: |
        சில தவிர்ப்பு பகுத்தறிவுடையதாக இருக்கும்போது (எ.கா., இரைச்சலைப் புறக்கணிப்பது) அனைத்து தவிர்ப்பையும் "நெருப்புக்கோழி விளைவு" என்று கூறுவது.
      micromanagement: |
        மற்றவர்களை அதிகமாகக் கண்காணிப்பதை நியாயப்படுத்த இந்தக் கருத்தைப் பயன்படுத்துதல்.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: பரேட்டோ கோட்பாடு
    quick_introduction: |
      பரேட்டோ கோட்பாடு (அல்லது 80/20 விதி) என்பது, சுமார் 80% விளைவுகள் 20% காரணிகளிலிருந்து வருகின்றன என்பதைக் கூறுகிறது. ஒரு சிறிய சிறுபான்மையினர் உள்ளீடுகள் பெரும்பாலும் பெரும்பான்மையான வெளியீடுகளை உற்பத்தி செய்கின்றன - விற்பனை, பிழைகள், வாடிக்கையாளர்கள், முயற்சி, அம்சங்கள் மற்றும் பலவற்றில். முக்கியத்துவமான சிலவற்றில் கவனம் செலுத்துங்கள்.
    one_liner: 80% விளைவுகள் 20% காரணிகளிலிருந்து வருகின்றன - முக்கியத்துவமான சிலவற்றில் கவனம் செலுத்துங்கள்.
    try_this:
      - 80% முடிவுகளை உருவாக்கும் 20% உள்ளீடுகளை அடையாளம் காணுங்கள் - அங்கே இரட்டிப்பாக கவனம் செலுத்துங்கள்.
      - சிறிதளவு உற்பத்தி செய்யும் 80% ஐக் குறைக்கவும் அல்லது முன்னுரிமையற்றதாக்கவும்.
      - கேளுங்கள்: நான் சில விஷயங்களைச் செய்தால், அவை மிகவும் முக்கியமானதாக இருக்கும்?
    ask_yourself:
      - சில விஷயங்கள் அதிக முக்கியத்துவம் வாய்ந்ததாக இருக்கும்போது, நான் என் முயற்சியை சமமாகப் பரப்புகிறேனா?
      - எனது அதிக-அளவிலான 20% எது?
    in_more_detail: |
      வில்ஃபிரெடோ பரேட்டோ, இத்தாலியின் 80% நிலப்பரப்பு 20% மக்களினால் உடைமையாக இருந்ததைக் கவனித்தார். இந்தக் கோட்பாடு பொதுமைப்படுத்தப்பட்டுள்ளது: 80% விற்பனை 20% வாடிக்கையாளர்களிடமிருந்து, 80% பிழைகள் 20% குறியீட்டிலிருந்து, 80% முடிவுகள் 20% முயற்சியிலிருந்து. துல்லியமான விகிதம் மாறுபடலாம், ஆனால் முறை - சமமற்ற விநியோகம் - பொதுவானது.

      இந்தக் கோட்பாடு, அதிக-அளவிலான 20% ஐ அடையாளம் கண்டு கவனம் செலுத்துவது முடிவுகளை வியக்கத்தக்க வகையில் மேம்படுத்தும் என்று கூறுகிறது. இது ஒரு முன்னுரிமை heuristic, இயற்பியல் விதி அல்ல.
    why_this_is_important: |
      பரேட்டோ கோட்பாட்டைப் பயன்படுத்துவது, நீங்கள் கடுமையாக முன்னுரிமை அளிக்க, குறைந்த-தாக்கச் செயல்களில் முயற்சியை வீணாக்குவதைத் தவிர்க்க, மற்றும் குறைந்த முயற்சியில் அதிக சாதனைகள் புரிய உதவுகிறது. இது உற்பத்தித்திறன் மற்றும் வியூகங்களுக்கு அடிப்படையானது.
    when_to_use:
      - முடிவெடுத்தல்
      - சிக்கல்_தீர்த்தல்
      - தலைமைத்துவம்
      - தொழில்_முன்னேற்றம்
    how_can_you_spot_it:
      uneven_distribution: |
        X இன் ஒரு சிறிய பகுதி Y இன் ஒரு பெரிய பகுதிக்குக் கணக்கிடுகிறது.
      high_leverage_activities: |
        சில செயல்கள் பெரும்பாலான முடிவுகளை உற்பத்தி செய்கின்றன.
      low_value_tail: |
        பல செயல்பாடுகள் சிறிதளவு பங்களிக்கின்றன; அவற்றைச் செதுக்குவது மிகக் குறைந்த தாக்கத்தை ஏற்படுத்துகிறது.
      vital_few_vs_trivial_many: |
        முக்கியமான சிலவற்றை அடையாளம் காண்பதுதான் முக்கியம்.
    examples:
      sales: |
        20% வாடிக்கையாளர்கள் 80% வருவாயை உருவாக்குகிறார்கள் - அவர்களைத் தக்கவைத்தல் மற்றும் வளர்ப்பதில் கவனம் செலுத்துங்கள்.
      software: |
        20% அம்சங்கள் 80% பயன்பாட்டை இயக்குகின்றன - அவற்றில் முன்னுரிமை அளிக்கவும்.
      productivity: |
        சில பழக்கவழக்கங்கள் அல்லது வழக்கங்கள் உங்கள் பெரும்பாலான வெளியீட்டை உற்பத்தி செய்கின்றன - அவற்றில் இரட்டிப்பாக கவனம் செலுத்துங்கள்.
      problems: |
        20% பிழைகள் 80% செயலிழப்புகளை ஏற்படுத்துகின்றன - அவற்றை முதலில் சரிசெய்யவும்.
    real_world_implications: |
      பரேட்டோ கோட்பாடு வள ஒதுக்கீடு, தயாரிப்பு வியூகம் மற்றும் தனிப்பட்ட உற்பத்தித்திறனை வழிநடத்துகிறது. அதை புறக்கணிப்பது முயற்சியை மிகவும் மெல்லியதாகப் பரப்புவதற்கு வழிவகுக்கிறது. அதை அதிகமாகப் பயன்படுத்துவது "நீண்ட வால்" புறக்கணிக்க வழிவகுக்கும், அங்கு அது முக்கியமானது.
    professional_application:
      networking_and_relationship_building: |
        உங்கள் இலக்குகளுக்கு மிக முக்கியமான உறவுகளை அடையாளம் காணுங்கள். எல்லா இடங்களிலும் முயற்சியைப் பரப்புவதை விட, அவற்றில் விகிதாச்சாரமற்ற முறையில் முதலீடு செய்யுங்கள்.
      collaborative_learning_initiative: |
        குழு செயல்திறனை மேம்படுத்தும்போது, 80% முடிவுகளை இயக்கும் 20% தலையீடுகளைக் கண்டறியவும். பயிற்சி மற்றும் செயல்முறை மாற்றங்களை அங்கே கவனம் செலுத்துங்கள்.
    how_can_this_be_misapplied:
      oversimplification: |
        எல்லா இடங்களிலும் 80/20 பொருந்தும் என்று கருதுவது; சில விநியோகங்கள் மிகவும் சமமாக இருக்கும்.
      neglecting_the_tail: |
        "அற்பமான பல" கூட்டாக முக்கியமாக இருக்கும்போது புறக்கணிப்பது (எ.கா., பல சிறிய வாடிக்கையாளர்கள், விளிம்பு வழக்குகள்).
      false_precision: |
        80/20 ஐ ஒரு தோராயமான heuristic ஆகக் கருதாமல், நேரடியானது போலக் கருதுவது.
      misidentifying_the_vital_few: |
        தவறான பகுப்பாய்வு காரணமாக தவறான 20% இல் கவனம் செலுத்துவது.
