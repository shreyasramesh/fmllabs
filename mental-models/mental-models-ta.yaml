  - id: narrative_fallacy
    name: கதைப் பிழை
    quick_introduction: |
      கதைப் பிழை என்பது கடந்த கால நிகழ்வுகளிலிருந்து கதைகளை உருவாக்கும் ஒரு போக்கு ஆகும்.
      இந்தக் கதைகள், அவை உண்மையில் இருந்ததை விட மிகவும் ஒருங்கிணைந்ததாகவும், கணிக்கக்கூடியதாகவும், அர்த்தமுள்ளதாகவும் தோன்றும்படி செய்கின்றன.
      சீரற்ற தன்மையில் நாம் விளக்கங்களை மீளமைக்கிறோம். வரலாற்றின் குழப்பத்தை ஒரு நேர்த்தியான கதையாக மாற்றுகிறோம் - பின்னர் அந்தக் கதை தவிர்க்க முடியாதது என்று நம்புகிறோம்.
    one_liner: நாம் சீரற்ற தன்மையின் மீது ஒருங்கிணைந்த கதைகளை மீளமைக்கிறோம் - பின்னர் அவை தவிர்க்க முடியாதவை என்று நம்புகிறோம்.
    try_this:
      - கேளுங்கள்: இந்தக் கதையில் எவ்வளவு பின்னோக்கிய பார்வை உள்ளது? அதிர்ஷ்டம் என்ன பங்கு வகித்தது?
      - நேர்த்தியான விளக்கங்களில் சந்தேகப்படுங்கள் - கடந்த காலம் நமது கதைகளை விட குழப்பமானதாக இருந்தது.
      - புரிகிறது என்பது "கணிக்கக்கூடியது" என்பதற்கு பதிலாக செயல்படும்போது கவனியுங்கள்.
    ask_yourself:
      - கடந்த காலத்தை அது இருந்ததை விட தவிர்க்க முடியாததாகத் தோன்றும் ஒரு கதையை நான் உருவாக்குகிறேனா?
      - இது நடப்பதற்கு முன்பு நான் இதைக் கணித்திருப்பேனா?
    in_more_detail: |
      நஸ்ஸிம் தலேப் இந்த சொல்லை பிரபலப்படுத்தினார். நாம் கதை - காரணம் மற்றும் விளைவு,
      வீரர்கள் மற்றும் வில்லன்கள், தெளிவான கதைகள் - இவற்றை விரும்புகிறோம். எனவே,
      பின்னோக்கிய பார்வையில் நிகழ்வுகளை இணைக்கும் கதைகளை நாம் உருவாக்குகிறோம்.
      கதை உண்மையானதாக உணர்கிறது, ஏனெனில் அது ஒருங்கிணைந்தது - ஆனால்
      ஒருங்கிணைப்பு அது சரியானது என்று அர்த்தமல்ல. நாம் "புரிகிறது" என்பதை
      "கணிக்கக்கூடியதாக இருந்தது" என குழப்புகிறோம். நாம் அதிர்ஷ்டம் மற்றும்
      சீரற்ற தன்மையின் பங்கை குறைத்து மதிப்பிடுகிறோம்.

      கதைப் பிழை நாம் வரலாற்றிலிருந்து எப்படி கற்கிறோம்,
      வெற்றியை எப்படி மதிப்பிடுகிறோம், மற்றும் கணிப்புகளை எப்படி செய்கிறோம் என்பதை பாதிக்கிறது.
      நாம் கதைகளின் விளக்க சக்தியை அதிகமாக எடைபோடுகிறோம் மற்றும் வாய்ப்பின் பங்கை குறைத்து மதிப்பிடுகிறோம்.
    why_this_is_important: |
      கதைப் பிழையை அங்கீகரிப்பது கடந்த காலத்திலிருந்து அதிகமாகக் கற்றுக்கொள்வதைத் தவிர்க்கவும்,
      கணிப்புத்திறனை அதிகமாக மதிப்பிடுவதைத் தவிர்க்கவும் உதவுகிறது.
      இது காரணம் மற்றும் கணிப்பு பற்றி பணிவு வளர்க்கிறது. நல்ல
      கதையாக அமையும் அனைத்தும் உண்மையானவை அல்லது பொதுமைப்படுத்தக்கூடியவை அல்ல.
    when_to_use:
      - முடிவு_எடுத்தல்
      - கற்றல்
      - இடர்_மதிப்பீடு
      - சிக்கல்_தீர்த்தல்
    how_can_you_spot_it:
      hindsight_coherence: |
        கடந்த கால நிகழ்வுகள், அப்போது புலப்படாத, நேர்த்தியான கதையுடன் விளக்கப்படுகின்றன.
      cause_effect_overconfidence: |
        பல பங்களிப்பு காரணிகளைக் கொண்ட விளைவுகளுக்கு நாம் தெளிவான காரணங்களை அளிக்கிறோம்.
      luck_minimization: |
        வெற்றி மற்றும் தோல்வி திறமை மற்றும் உத்தி மூலம் விளக்கப்படுகின்றன,
        அதிர்ஷ்டத்தால் அல்ல.
      story_over_evidence: |
        ஒரு கவர்ச்சிகரமான கதை புள்ளிவிவர ஆதாரங்களை மீறுகிறது.
    examples:
      business_success: |
        "அவர்கள் X காரணமாக வெற்றி பெற்றனர்" - பல காரணிகளும் அதிர்ஷ்டமும்
        ஈடுபட்டிருந்தாலும் - நாம் பொருந்தும் கதையைத் தேர்ந்தெடுக்கிறோம்.
      investing: |
        சந்தை நகர்வுகளை திருப்திகரமாக தோன்றும் கதைகளுடன் விளக்குதல்,
        ஆனால் அது நிகழ்வுக்குப் பிறகு இருக்கலாம்.
      history: |
        வரலாற்று நிகழ்வுகள், அவை பல காரணிகளைச் சார்ந்து இருந்தபோதும்,
        தவிர்க்க முடியாத முன்னேற்றங்களாகக் கூறப்படுகின்றன.
      career: |
        "நான் X செய்ததால் இங்கு வந்தேன்" - அதிர்ஷ்டமும் நேரமும்
        முக்கிய பங்கு வகித்தபோது.
    real_world_implications: |
      கதைப் பிழை கற்றலை சிதைக்கிறது, கணிப்பில் அதிக நம்பிக்கை ஏற்படுத்துகிறது,
      மற்றும் வெற்றி மற்றும் தோல்வியின் காரணமாக attributing செய்கிறது.
      இது கடந்த காலம் அது இருந்ததை விட கணிக்கக்கூடியதாகவும்,
      எதிர்காலம் அது இருக்கும்தை விட கணிக்கக்கூடியதாகவும் தோன்றும்படி செய்கிறது.
    professional_application:
      networking_and_relationship_building: |
        ஒருவர் தனது வெற்றி கதையைச் சொல்லும்போது, அது
        ஒரு கதை - ஒருங்கிணைந்த மற்றும் கவர்ச்சிகரமான, ஆனால் ஒருவேளை
        எளிமைப்படுத்தப்பட்டதாக நினைவில் கொள்ளுங்கள். அதிர்ஷ்டமும் கண்ணுக்குத் தெரியாத காரணிகளும்
        குறைத்து மதிப்பிடப்பட்டிருக்கலாம்.
      collaborative_learning_initiative: |
        பின்னோக்கு பார்வையில், கதையை ஆதாரத்திலிருந்து வேறுபடுத்துங்கள்.
        "அந்த நேரத்தில் நாம் என்ன கூறியிருப்போம்?" என்று கேளுங்கள்.
        முடிவுகள் அறியப்படுவதற்கு முன் நிச்சயமற்ற தன்மையைப் பிடிக்க முடிவு பத்திரிகைகளைப் பயன்படுத்தவும்.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        சில கதைகள் சரியானவை - எல்லாம்
        கதைப் பிழை அல்ல. காரணம் உள்ளது.
      excessive_skepticism: |
        "கதை
        பிழை" காரணமாக கடந்த காலத்திலிருந்து கற்றுக்கொள்வதை நிராகரித்தல். நாம் இன்னும் பயனுள்ள பாடங்களை எடுக்க முடியும்.
      false_randomness: |
        சில விளைவுகள் அர்த்தமுள்ளவை என attribution செய்யும்போது, அனைத்தும் சீரற்றவை என கருதுதல்.
      undermining_storytelling: |
        கதைகளுக்கு தொடர்பு மற்றும் அர்த்தத்திற்கு மதிப்பு உண்டு -
        பிழை அவை முழுமையானவை அல்லது
        கணிப்புக்குரியவை என்று நம்புவதாகும், அவை இல்லை என்று அல்ல.
