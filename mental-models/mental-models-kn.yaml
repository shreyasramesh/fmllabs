      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ
    quick_introduction: |
      ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಎನ್ನುವುದು ಒಂದು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ವಿದ್ಯಮಾನವಾಗಿದ್ದು, ಅಸಾಧಾರಣ ಫಲಿತಾಂಶಗಳು
      ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಫಲಿತಾಂಶಗಳಿಂದ ಅನುಸರಿಸಲ್ಪಡುತ್ತವೆ. ಅಸಾಮಾನ್ಯವಾಗಿ ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟ
      ಫಲಿತಾಂಶದ ನಂತರ, ಮುಂದಿನ ಫಲಿತಾಂಶವು ಕಡಿಮೆ ತೀವ್ರವಾಗಿರುತ್ತದೆ - ಯಾವುದೇ ಕಾರಣಿಕ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ,
      ಆದರೆ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸದಿಂದಾಗಿ.
    one_liner: ಅಸಾಧಾರಣ ಫಲಿತಾಂಶಗಳು ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಫಲಿತಾಂಶಗಳಿಂದ ಅನುಸರಿಸಲ್ಪಡುತ್ತವೆ.
    try_this:
      - ನಿಮ್ಮ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ "ಹಿಂಜರಿಕೆಯನ್ನು" ಕಾರಣ ಮಾಡಬೇಡಿ - ಅದು ಆಗಾಗ್ಗೆ ಹಾಗೆಯೇ ಸಂಭವಿಸಿರುತ್ತಿತ್ತು.
      - ಅಸಾಧಾರಣ ಫಲಿತಾಂಶದ ನಂತರ, ಮುಂದಿನದು ಕಡಿಮೆ ತೀವ್ರವಾಗಿರುತ್ತದೆ ಎಂದು ನಿರೀಕ್ಷಿಸಿ.
      - ಕೇಳಿ: ಈ ಬದಲಾವಣೆಗೆ ನಾನು ಮಾಡಿದ ಕಾರ್ಯ ಕಾರಣವೇ, ಅಥವಾ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಮಾತ್ರವೇ?
    ask_yourself:
      - ನಾನು ಮಾಡಿದ ಕಾರ್ಯಕ್ಕೆ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸವನ್ನು ಕಾರಣವೆಂದು ನನ್ನ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ ಕ್ರೆಡಿಟ್ ನೀಡುತ್ತಿದ್ದೇನೆ ಅಥವಾ ದೂಷಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನನ್ನ ಕ್ರಿಯೆಯಿಲ್ಲದೆ ಇದು ಸಂಭವಿಸುತ್ತಿತ್ತೇ?
    in_more_detail: |
      ಒಬ್ಬ ವಿದ್ಯಾರ್ಥಿಯು ಒಂದು ಪರೀಕ್ಷೆಯಲ್ಲಿ ಅಸಾಮಾನ್ಯವಾಗಿ ಹೆಚ್ಚಿನ ಅಂಕ ಪಡೆದರೆ, ಅವರು ಮುಂದಿನ ಪರೀಕ್ಷೆಯಲ್ಲಿ
      ಅವರ ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಅಂಕಗಳನ್ನು ಪಡೆಯುವ ಸಾಧ್ಯತೆಯಿದೆ - ಅವರು "ಆಲಸಿಗಳಾದರು" ಎಂಬ ಕಾರಣದಿಂದಲ್ಲ,
      ಆದರೆ ಮೊದಲ ಅಂಕವು ಸ್ವಲ್ಪ ಅದೃಷ್ಟದಿಂದ ಕೂಡಿತ್ತು. ಇದು ಕ್ರೀಡಾ ಪ್ರದರ್ಶನ, ಷೇರುಗಳ ಆದಾಯ ಮತ್ತು
      ವ್ಯಾಪಾರ ಮಾಪನಗಳಿಗೂ ಅನ್ವಯಿಸುತ್ತದೆ. ನಾವು ಆಗಾಗ್ಗೆ "ಹಿಂಜರಿಕೆಯನ್ನು" ನಾವು ಮಾಡಿದ ಯಾವುದಕ್ಕಾದರೂ
      (ಉದಾಹರಣೆಗೆ, ಶಿಕ್ಷೆ ಅಥವಾ ಬಹುಮಾನ) ಕಾರಣವೆಂದು ಹೇಳುತ್ತೇವೆ, ಅದು ಹಾಗೆಯೇ ಸಂಭವಿಸಬೇಕಿದ್ದರೂ ಸಹ.

      ಡ್ಯಾನಿಯಲ್ ಕಹ್ನೆಮನ್ ವಿವರಿಸುವಂತೆ ವಿಮಾನ ತರಬೇತುದಾರರು ಪ್ರಶಂಸೆ ಪ್ರದರ್ಶನವನ್ನು ಹದಗೆಡಿಸುತ್ತದೆ
      ಮತ್ತು ಟೀಕೆ ಸುಧಾರಿಸುತ್ತದೆ ಎಂದು ತಪ್ಪು ನಿರ್ಣಯಕ್ಕೆ ಬಂದರು - ಅವರು ಅಸಾಧಾರಣ ಪ್ರದರ್ಶನಗಳ ನಂತರ
      ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ಗಮನಿಸುತ್ತಿದ್ದರು.
    why_this_is_important: |
      ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಕಾರಣಿಕವನ್ನು ತಪ್ಪಾಗಿ ಹೇಳುವುದನ್ನು ತಡೆಯುತ್ತದೆ.
      ಇದು ಹೊರಗಿನ ಡೇಟಾಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ಮತ್ತು ಶಬ್ದದ ಆಧಾರದ ಮೇಲೆ ಬದಲಾವಣೆಗಳನ್ನು
      ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಹಸ್ತಕ್ಷೇಪಗಳು ಮತ್ತು ಪ್ರದರ್ಶನವನ್ನು ಮೌಲ್ಯಮಾಪನ
      ಮಾಡಲು ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಹೂಡಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ನಾಯಕತ್ವ
    how_can_you_spot_it:
      extreme_followed_by_average: |
        ಅಸಾಮಾನ್ಯವಾಗಿ ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟ ಫಲಿತಾಂಶವನ್ನು ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಒಂದರಿಂದ ಅನುಸರಿಸಲಾಗುತ್ತದೆ.
      spurious_causation: |
        ಹಿಂಜರಿಕೆ ಸಂಭವಿಸಬಹುದಾದಾಗ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ "ಚೇತರಿಕೆ" ಅಥವಾ "ಇಳಿಮುಖ" ವನ್ನು ಕಾರಣವೆಂದು ಹೇಳುವುದು.
      overreaction_to_outliers: |
        ಒಂದೇ ಒಂದು ತೀವ್ರ ಡೇಟಾ ಪಾಯಿಂಟ್ ಆಧಾರದ ಮೇಲೆ ನೀತಿ ಅಥವಾ ವೈಯಕ್ತಿಕ ಬದಲಾವಣೆಗಳನ್ನು ಮಾಡುವುದು.
      reward_punishment_confusion: |
        ಶಿಕ್ಷೆ "ಕೆಲಸ ಮಾಡಿದೆ" ಎಂದು ನಂಬುವುದು, ಸುಧಾರಣೆಯು ಕೇವಲ ಹಿಂಜರಿಕೆಯಾಗಿದ್ದಾಗ.
    examples:
      sports: |
        ಒಬ್ಬ ಆಟಗಾರನು ತನ್ನ ವೃತ್ತಿಜೀವನದ ಅತ್ಯುತ್ತಮ ಪಂದ್ಯವನ್ನು ಆಡುತ್ತಾನೆ, ನಂತರ ಸರಾಸರಿಗೆ ಹಿಂತಿರುಗುತ್ತಾನೆ -
        ಅಭಿಮಾನಿಗಳು "ಅಲಸಿಕೆ"ಯನ್ನು ದೂಷಿಸಬಹುದು.
      investing: |
        ಒಂದು ಷೇರು ಉತ್ತಮ ವರ್ಷವನ್ನು ಹೊಂದಿದೆ, ನಂತರ ಹಿಂತಿರುಗುತ್ತದೆ - ಹೂಡಿಕೆದಾರರು ಕೆಟ್ಟ ನಿರ್ವಹಣೆಯನ್ನು
        ಇಳಿಮುಖಕ್ಕೆ ಕಾರಣವೆಂದು ಹೇಳಬಹುದು, ಆದರೆ ಅದು ಭಾಗಶಃ ಹಿಂಜರಿಕೆಯಾಗಿದೆ.
      performance_reviews: |
        ಒಬ್ಬ ಉದ್ಯೋಗಿ ಕೆಟ್ಟ ತ್ರೈಮಾಸಿಕವನ್ನು ಹೊಂದುತ್ತಾನೆ, ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಪಡೆಯುತ್ತಾನೆ, ಸುಧಾರಿಸುತ್ತಾನೆ -
        ಹಿಂಜರಿಕೆ ಯಾವುದೇ ರೀತಿಯಲ್ಲಿ ಸಂಭವಿಸುತ್ತಿದ್ದಾಗ ಪ್ರತಿಕ್ರಿಯೆಗೆ ಕ್ರೆಡಿಟ್ ನೀಡಬಹುದು.
      medicine: |
        ಒಬ್ಬ ರೋಗಿಯು ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತಾನೆ, ಚಿಕಿತ್ಸೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾನೆ, ಸುಧಾರಿಸುತ್ತಾನೆ - ಕೆಲವು ಸುಧಾರಣೆ
        ಸಹಜವಾಗಿದ್ದಾಗ ಚಿಕಿತ್ಸೆಗೆ ಕ್ರೆಡಿಟ್ ನೀಡಬಹುದು.
    real_world_implications: |
      ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಶಿಕ್ಷಕರು, ವೈದ್ಯರು, ನಿಧಿ ವ್ಯವಸ್ಥಾಪಕರು ಮತ್ತು ನಮ್ಮನ್ನು ನಾವು ಮೌಲ್ಯಮಾಪನ
      ಮಾಡುವ ರೀತಿಯನ್ನು ಪ್ರಭಾವಿಸುತ್ತದೆ. "ಏರಿದ್ದು ಕೆಳಗೆ ಬರಬೇಕು" ಎಂಬುದು ಏಕೆ ಆಗಾಗ್ಗೆ
      ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯವಾಗಿ ನಿಜವಾಗಿದೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ. ಇದನ್ನು ತಪ್ಪುಗ್ರಹಿಸುವುದರಿಂದ
      ವ್ಯರ್ಥ ಹಸ್ತಕ್ಷೇಪಗಳು ಮತ್ತು ಪರಿಹಾರಗಳಲ್ಲಿ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸ ಉಂಟಾಗುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಒಂದೇ ಒಂದು ಕೆಟ್ಟ ಸಂವಹನವನ್ನು ಅತಿಯಾಗಿ ಅರ್ಥೈಸಬೇಡಿ - ಅದು ಸಂಬಂಧದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಯುವ
        ಒಂದು ಹೊರಗಿನ ಡೇಟಾ ಪಾಯಿಂಟ್ ಆಗಿರಬಹುದು.
      collaborative_learning_initiative: |
        ಹಸ್ತಕ್ಷೇಪಗಳನ್ನು (ತರಬೇತಿ, ಪ್ರಕ್ರಿಯೆ ಬದಲಾವಣೆಗಳು) ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಪರಿಣಾಮವನ್ನು
        ಹಿಂಜರಿಕೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸಲು ನಿಯಂತ್ರಣ ಗುಂಪುಗಳು ಮತ್ತು ಬಹು ಡೇಟಾ ಪಾಯಿಂಟ್‌ಗಳನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        ಹಸ್ತಕ್ಷೇಪದ ನಂತರ ಯಾವುದೇ ಸುಧಾರಣೆಯು "ಕೇವಲ ಹಿಂಜರಿಕೆ" ಎಂದು ಊಹಿಸುವುದು, ನಿಜವಾದ ಪರಿಣಾಮಗಳಿದ್ದರೂ ಸಹ.
      underreacting: |
        "ಅದು ಸರಾಸರಿಗೆ ಹಿಂಜರಿಯುತ್ತದೆ" ಎಂದು ಹೇಳಿ ನಿಜವಾದ ಸಮಸ್ಯೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು.
      statistical_illiteracy: |
        ಹಿಂಜರಿಕೆಯನ್ನು ಫಲಿತಾಂಶಗಳನ್ನು "ಸರಿಪಡಿಸುವ" ಶಕ್ತಿಯೊಂದಿಗೆ ಗೊಂದಲಗೊಳಿಸುವುದು - ಅದು ಕೇವಲ
        ಸಂಭವನೀಯತೆಯಾಗಿದೆ.
      overconfidence: |
        ಆಧಾರವಾಗಿರುವ ಪ್ರಕ್ರಿಯೆಯು ಬದಲಾಗಿರಬಹುದಾದರೂ ಸರಾಸರಿ ಸ್ಥಿರವಾಗಿದೆ ಎಂದು ಊಹಿಸುವುದು.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ (Rosy Retrospection)
    quick_introduction: |
      ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ಎಂದರೆ, ನಾವು ಕಳೆದ ಘಟನೆಗಳನ್ನು ನಿಜವಾಗಿ ಇದ್ದಕ್ಕಿಂತ ಉತ್ತಮವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ.
      ಕಾಲಾನಂತರದಲ್ಲಿ, ನಾವು ಹಿಂದಿನ ಅನುಭವಗಳನ್ನು ಹೆಚ್ಚು ಸಕಾರಾತ್ಮಕವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ, ಕಷ್ಟಗಳನ್ನು ಮೃದುಗೊಳಿಸುತ್ತೇವೆ ಮತ್ತು ಒಳ್ಳೆಯದನ್ನು ವರ್ಧಿಸುತ್ತೇವೆ. "ಹಿಂದಿನ ಒಳ್ಳೆಯ ದಿನಗಳು" ನಾವು ನೆನಪಿಸಿಕೊಳ್ಳುವಷ್ಟು ಒಳ್ಳೆಯದಾಗಿರಲಿಲ್ಲ.
    one_liner: ನಾವು ಕಳೆದ ಘಟನೆಗಳನ್ನು ಇದ್ದಕ್ಕಿಂತ ಉತ್ತಮವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ—"ಹಿಂದಿನ ಒಳ್ಳೆಯ ದಿನಗಳು" ಅಷ್ಟು ಒಳ್ಳೆಯದಾಗಿರಲಿಲ್ಲ.
    try_this:
      - ಹಿಂದಿನದರೊಂದಿಗೆ ಹೋಲಿಸುವಾಗ, ಹೀಗೆ ಕೇಳಿ: ಆಗ ನಾನು ನಿಜವಾಗಿ ಏನು ಅನುಭವಿಸುತ್ತಿದ್ದೆ?
      - ನಂತರ ನೆನಪುಗಳನ್ನು ವಾಸ್ತವದೊಂದಿಗೆ ಹೋಲಿಸಲು ಒಂದು ಜರ್ನಲ್ ಇಟ್ಟುಕೊಳ್ಳಿ.
      - ನಿಮ್ಮ ನಿರ್ಣಯದ ಮೇಲೆ ನಾಸ್ಟಾಲ್ಜಿಯಾ ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತಿದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಹಿಂದಿನದನ್ನು ಆದರ್ಶೀಕರಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಹಿಂದಕ್ಕೆ ಸಮಯಕ್ಕೆ ಪ್ರಯಾಣಿಸಲು ಸಾಧ್ಯವಾಗಿದ್ದರೆ ಆಗ ನಾನು ಸಂತೋಷವಾಗಿರುತ್ತಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ನಾವು ಹಿಂದಿನ ಅನುಭವಗಳ ಸಕಾರಾತ್ಮಕ ಅಂಶಗಳನ್ನು ನೆನಪಿಸಿಕೊಳ್ಳುವ ಮತ್ತು ನಕಾರಾತ್ಮಕ ಅಂಶಗಳನ್ನು ಮರೆತುಬಿಡುವ ಅಥವಾ ಕಡಿಮೆ ಮಾಡುವ ಪ್ರವೃತ್ತಿ ಹೊಂದಿದ್ದೇವೆ. ರಜೆಗಳು, ಉದ್ಯೋಗಗಳು ಮತ್ತು ಸಂಬಂಧಗಳು ನಾಸ್ಟಾಲ್ಜಿಯಾದಲ್ಲಿ, ಆ ಕ್ಷಣದಲ್ಲಿ ಇದ್ದುದಕ್ಕಿಂತ ಉತ್ತಮವಾಗಿ ಭಾಸವಾಗುತ್ತವೆ. ಇದು ಅವಾಸ್ತವಿಕ ಹೋಲಿಕೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು—ನಾವು ಆದರ್ಶೀಕರಿಸಿದ ಹಿಂದಿನದರೊಂದಿಗೆ ಪ್ರಸ್ತುತವನ್ನು ನಿರ್ಣಯಿಸುತ್ತೇವೆ.

      ನಾವು ಅದೇ (ನೆನಪಿಸಿಕೊಂಡ) ಫಲಿತಾಂಶವನ್ನು ನಿರೀಕ್ಷಿಸಿ ಹಿಂದಿನ ಆಯ್ಕೆಗಳನ್ನು ಪುನರಾವರ್ತಿಸುವಾಗ ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಯನ್ನು (decision-making) ಪ್ರಭಾವಿಸುತ್ತದೆ. ಇದು ವಸ್ತುನಿಷ್ಠವಾಗಿ ಕೆಟ್ಟದಾಗಿದ್ದ ಯುಗಗಳಿಗೆ ನಾಸ್ಟಾಲ್ಜಿಯಾವನ್ನು ಸಹ ಹೆಚ್ಚಿಸಬಹುದು. ಇದು ನೆನಪಿನಲ್ಲಿ ನಕಾರಾತ್ಮಕ ಪಕ್ಷಪಾತದ (negativity bias) ವಿರುದ್ಧವಾಗಿದೆ.
    why_this_is_important: |
      ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ಅನ್ನು ಗುರುತಿಸುವುದು, ನೀವು ಹೆಚ್ಚು ವಾಸ್ತವಿಕ ಹೋಲಿಕೆಗಳನ್ನು ಮಾಡಲು ಮತ್ತು ಆದರ್ಶೀಕರಿಸಿದ ನೆನಪುಗಳ ಆಧಾರದ ಮೇಲೆ ಹಿಂದಿನ ತಪ್ಪುಗಳನ್ನು ಪುನರಾವರ್ತಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಪ್ರಸ್ತುತ ಪ್ರಗತಿ ಇದ್ದರೂ ನಾವು ಕೆಲವೊಮ್ಮೆ ಹಿಂದಿನದನ್ನು ಏಕೆ ಬಯಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ-ಮಾಡುವಿಕೆ (decision-making)
      - ವೃತ್ತಿ-ಬದಲಾವಣೆಗಳು (career_moves)
      - ಸಂಬಂಧ-ನಿರ್ಮಾಣ (relationship_building)
      - ಕಲಿಕೆ (learning)
    how_can_you_spot_it:
      idealized_past: |
        "ಅಂದು ವಿಷಯಗಳು ಉತ್ತಮವಾಗಿದ್ದವು" ವಸ್ತುನಿಷ್ಠ ಅಳತೆಗಳು ಬೇರೆಯದನ್ನು ತೋರಿಸಿದರೂ ಸಹ.
      selective_positive_memory: |
        ಹಿಂದಿನ ಅನುಭವಗಳಿಂದ ಒಳ್ಳೆಯದನ್ನು ನೆನಪಿಸಿಕೊಳ್ಳುವುದು ಮತ್ತು ಕೆಟ್ಟದನ್ನು ಮರೆತುಬಿಡುವುದು.
      nostalgia_as_evidence: |
        ಹಿಂದಿನ ಆಯ್ಕೆಗಳು ಸರಿಯಾಗಿದ್ದವು ಎಂಬುದಕ್ಕೆ ಪುರಾವೆಯಾಗಿ ಸುಂದರವಾದ ನೆನಪುಗಳನ್ನು ಬಳಸುವುದು.
      present_undervaluation: |
        ಆದರ್ಶೀಕರಿಸಿದ ಹಿಂದಿನದರೊಂದಿಗೆ ಹೋಲಿಸುವುದರಿಂದ ಪ್ರಸ್ತುತವು ನಿಜವಾಗಿಯೂ ಇದ್ದುದಕ್ಕಿಂತ ಕೆಟ್ಟದಾಗಿ ಭಾಸವಾಗುತ್ತದೆ.
    examples:
      career: |
        "ನನ್ನ ಹಳೆಯ ಕೆಲಸ ಅದ್ಭುತವಾಗಿತ್ತು" ನೀವು ಒಳ್ಳೆಯ ಕಾರಣಗಳಿಗಾಗಿ ತೊರೆದಿದ್ದರೂ ಸಹ—ನೆನಪು ಆ ನಿರಾಶೆಗಳನ್ನು ಮೃದುಗೊಳಿಸಿದೆ.
      relationships: |
        ಹಿಂದಿನ ಸಂಬಂಧದ ಬಗ್ಗೆ "ನಾವು ಎಷ್ಟು ಸಂತೋಷವಾಗಿದ್ದೆವು"—ಅದರ ಅಂತ್ಯಕ್ಕೆ ಕಾರಣವಾದ ಸಂಘರ್ಷಗಳನ್ನು ಮರೆತುಬಿಡುವುದು.
      childhood: |
        "ನನ್ನ ಕಾಲದಲ್ಲಿ ಮಕ್ಕಳಿಗೆ ಉತ್ತಮವಾಗಿತ್ತು" ಅನೇಕ ವಸ್ತುನಿಷ್ಠ ಅಳತೆಗಳು (ಆರೋಗ್ಯ, ಸುರಕ್ಷತೆ, ಅವಕಾಶ) ಸುಧಾರಿಸಿದ್ದರೂ ಸಹ.
      projects: |
        "ಆ ಯೋಜನೆಯು ಸರಾಗವಾಗಿ ನಡೆಯಿತು" ವಾಸ್ತವದಲ್ಲಿ ಅನೇಕ ವಿಳಂಬಗಳಿದ್ದಾಗಲೂ ಸಹ—ನಾವು ಪ್ರಕ್ರಿಯೆಯನ್ನು ಅಲ್ಲ, ಫಲಿತಾಂಶವನ್ನು ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
    real_world_implications: |
      ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ಜೀವನ ತೃಪ್ತಿ, ವೃತ್ತಿ ನಿರ್ಧಾರಗಳು ಮತ್ತು ನಾಸ್ಟಾಲ್ಜಿಯಾ-ಚಾಲಿತ ಆಯ್ಕೆಗಳನ್ನು ಪ್ರಭಾವಿಸುತ್ತದೆ. ಇದು ಹಿಂದಿನ ತಪ್ಪುಗಳನ್ನು ಪುನರಾವರ್ತಿಸಲು ಅಥವಾ ಅವಾಸ್ತವಿಕ ಹೋಲಿಕೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು. ಇದು "ಹಿಂದಿನ ಒಳ್ಳೆಯ ದಿನಗಳಿಗೆ ಹಿಂತಿರುಗಿ" ಎಂಬ ಹೇಳಿಕೆಗಳ ಆಕರ್ಷಣೆಯನ್ನು ಸಹ ವಿವರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಹಿಂದಿನ ಸಹೋದ್ಯೋಗಿಗಳೊಂದಿಗೆ ಮರುಸಂಪರ್ಕ ಸಾಧಿಸಲು ಅಥವಾ ಹಿಂದಿನ ಪಾತ್ರಗಳಿಗೆ ಹಿಂತಿರುಗಲು ಪರಿಗಣಿಸುವಾಗ, ನಾಸ್ಟಾಲ್ಜಿಯಾವನ್ನು ವಾಸ್ತವದಿಂದ ಪ್ರತ್ಯೇಕಿಸಿ. ತೊರೆದ ನಿಮ್ಮ ಕಾರಣಗಳನ್ನು ಆ ಸಮಯದಲ್ಲಿ ದಾಖಲಿಸಿಕೊಳ್ಳಿ; ಹಿಂತಿರುಗುವ ಮೊದಲು ಅವುಗಳನ್ನು ಪರಿಶೀಲಿಸಿ.
      collaborative_learning_initiative: |
        ರೆಟ್ರೋಸ್ಪೆಕ್ಟಿವ್‌ಗಳಲ್ಲಿ, ಏನಾಯಿತು ಎಂಬುದನ್ನು ನಿರ್ಣಯಿಸಲು ನೆನಪಿನ ಬದಲಿಗೆ ಸಮಕಾಲೀನ ಟಿಪ್ಪಣಿಗಳು ಅಥವಾ ಡೇಟಾವನ್ನು ಬಳಸಿ. ನೆನಪು ಕಷ್ಟಗಳನ್ನು ಮೃದುಗೊಳಿಸುತ್ತದೆ.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        ಎಲ್ಲಾ ನಾಸ್ಟಾಲ್ಜಿಯಾ ತಪ್ಪು ದಾರಿಗೆಳೆಯುವಂತಹುದೇನಲ್ಲ—ಕೆಲವೊಮ್ಮೆ ಹಿಂದಿನದು ಕೆಲವು ವಿಷಯಗಳಲ್ಲಿ ನಿಜವಾಗಿಯೂ ಉತ್ತಮವಾಗಿತ್ತು.
      invalidating_memories: |
        ಜನರ ಸಕಾರಾತ್ಮಕ ನೆನಪುಗಳು "ತಪ್ಪು" ಎಂದು ಹೇಳುವುದು, ಅವು ನಿಜವಾದ ವ್ಯಕ್ತಿನಿಷ್ಠ ಅನುಭವವನ್ನು ಪ್ರತಿಬಿಂಬಿಸಿದರೂ ಸಹ.
      overcorrection: |
        ಹಿಂದಿನದು ನಾವು ನೆನಪಿಸಿಕೊಳ್ಳುವುದಕ್ಕಿಂತ ಯಾವಾಗಲೂ ಕೆಟ್ಟದಾಗಿತ್ತು ಎಂದು ಊಹಿಸುವುದು—ಕೆಲವೊಮ್ಮೆ ಅದು ಉತ್ತಮವಾಗಿತ್ತು.
      present_bias: |
        ಪ್ರಸ್ತುತ ಕುಸಿತದ ಬಗ್ಗೆ ಕಾನೂನುಬದ್ಧ ಕಾಳಜಿಗಳನ್ನು ತಳ್ಳಿಹಾಕಲು ಕ್ಷಮೆಯಾಗಿ ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ಅನ್ನು ಬಳಸುವುದು.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
