  - id: scarcity_bias
    name: ಕೊರತೆಯ ಪಕ್ಷಪಾತ (Scarcity Bias)
    quick_introduction: |
      ಕೊರತೆಯ ಪಕ್ಷಪಾತ ಎಂದರೆ ಯಾವುದೇ ವಸ್ತುಗಳು ದೊರೆಯುವುದು ಕಷ್ಟಕರವಾದಾಗ ಅಥವಾ ಸೀಮಿತವಾಗಿದ್ದಾಗ ಅವುಗಳಿಗೆ ಹೆಚ್ಚಿನ ಮೌಲ್ಯವನ್ನು ನೀಡುವ ಪ್ರವೃತ್ತಿ. "ಸೀಮಿತ ಸಮಯ," "ಕೇವಲ 3 ಬಾಕಿ," ಮತ್ತು "ವಿಶೇಷ ಪ್ರವೇಶ" ಮುಂತಾದ ಪದಗಳು ತುರ್ತು ಮತ್ತು ಆಸೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತವೆ, ಇದು ನಮಗೆ ನಿಜವಾಗಿಯೂ ಆ ವಸ್ತು ಬೇಕೋ ಅಥವಾ ಬೇಡವೋ ಎಂಬುದರ ಬಗ್ಗೆ ತಾರ್ಕಿಕ ಮೌಲ್ಯಮಾಪನವನ್ನು ಮೀರಿಸುತ್ತದೆ.
    one_liner: ಕೊರತೆಯು ಗ್ರಹಿಸಿದ ಮೌಲ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ - "ಸೀಮಿತ" ಎಂಬುದು ತರ್ಕದ ಬದಲಿಗೆ ತುರ್ತು ಸ್ಥಿತಿಯನ್ನು ಉಂಟುಮಾಡುತ್ತದೆ.
    try_this:
      - Ask: ಅದು ಕೊರತೆಯಾಗದಿದ್ದರೆ ನನಗೆ ಇದು ಬೇಕಾಗುತ್ತಿತ್ತೇ? ತುರ್ತು ಸ್ಥಿತಿಯನ್ನು ತೆಗೆದುಹಾಕಿ.
      - ಸೀಮಿತ ಸಮಯ ಅಥವಾ "ಕೇವಲ X ಬಾಕಿ" ಕೊಡುಗೆಗಳಿಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುವ ಮೊದಲು ಸ್ವಲ್ಪ ಯೋಚಿಸಿ.
      - ನೈಜ ಮೌಲ್ಯಕ್ಕಿಂತ ಹೆಚ್ಚಾಗಿ ಕೊರತೆಯು ನಿಮ್ಮ ಆಸೆಯನ್ನು ಹೇಗೆ ಪ್ರೇರೇಪಿಸುತ್ತಿದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
    ask_yourself:
      - ಇದು ಕೊರತೆಯಾಗಿರುವುದರಿಂದ ನಾನು ಇದಕ್ಕೆ ಮೌಲ್ಯ ನೀಡುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ನನಗೆ ಇದು ನಿಜವಾಗಿಯೂ ಬೇಕಾಗಿರುವುದರಿಂದ?
      - ಕೊರತೆಯ ವಿಷಯವನ್ನು ಹೊರತುಪಡಿಸಿ ನಾನು ಈ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುತ್ತಿದ್ದೆ?
    in_more_detail: |
      ಕೊರತೆಯು ಗ್ರಹಿಸಿದ ಮೌಲ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಏನಾದರೂ ಅಪರೂಪವಾಗಿದ್ದಾಗ ಅಥವಾ ಕಣ್ಮರೆಯಾಗುತ್ತಿರುವಾಗ, ನಾವು ಅದನ್ನು ಹೆಚ್ಚು ಬಯಸುತ್ತೇವೆ - ಏಕೆಂದರೆ ಕೊರತೆಯು ಗುಣಮಟ್ಟವನ್ನು ಸೂಚಿಸುತ್ತದೆ, ಮತ್ತು ನಷ್ಟದ ಭಯ (loss aversion) ನಮಗೆ ಏನನ್ನಾದರೂ ಕಳೆದುಕೊಳ್ಳುವ ಭಯವನ್ನುಂಟು ಮಾಡುತ್ತದೆ. ಮಾರಾಟಗಾರರು ಮತ್ತು ಮಾತುಕತೆ ನಡೆಸುವವರು ತುರ್ತು ಸ್ಥಿತಿಯನ್ನು ಸೃಷ್ಟಿಸಲು ಕೊರತೆಯನ್ನು ಬಳಸುತ್ತಾರೆ. ಈ ಪಕ್ಷಪಾತವು ಆತುರದ ನಿರ್ಧಾರಗಳು, ಅತಿಯಾದ ಖರ್ಚು ಮತ್ತು ಕಳಪೆ ಆದ್ಯತೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು.

      ಕೊರತೆಯು ನಿಜವಾಗಿಯೂ ಸಂಪನ್ಮೂಲಗಳ ಕೊರತೆಯಲ್ಲಿರುವವರ ಅರಿವಿನ ಸಾಮರ್ಥ್ಯದ ಮೇಲೂ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ; ಬಡತನವು ಇತರ ನಿರ್ಧಾರಗಳಿಗೆ "ಮಾನಸಿಕ ಸಾಮರ್ಥ್ಯವನ್ನು" ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ಕೊರತೆಯ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಕುಶಲತೆಯ ತಂತ್ರಗಳನ್ನು ವಿರೋಧಿಸಲು ಮತ್ತು ಹೆಚ್ಚು ಎಚ್ಚರಿಕೆಯಿಂದ ಆಯ್ಕೆ ಮಾಡಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಸೀಮಿತ ಆವೃತ್ತಿಗಳಿಗೆ ನಾವು ಏಕೆ ಅತಿಯಾಗಿ ಮೌಲ್ಯ ನೀಡುತ್ತೇವೆ ಮತ್ತು ನಮಗೆ ಅಗತ್ಯವಿಲ್ಲದಿದ್ದರೂ ಏಕೆ ಅವಸರಗೊಳ್ಳುತ್ತೇವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ (decision-making)
      - ಮಾತುಕತೆ (negotiation)
      - ಹೂಡಿಕೆ (investing)
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ (risk_assessment)
    how_can_you_spot_it:
      urgency_trigger: |
        "ಸೀಮಿತ ಸಮಯ" ಅಥವಾ "ಕೇವಲ X ಬಾಕಿ" ಅತಿಯಾದ ಆಸೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
      fear_of_missing_out: |
        ಪ್ರವೇಶವನ್ನು ಕಳೆದುಕೊಳ್ಳುವ ಸಾಧ್ಯತೆಯು ಅದರ ನೈಜ ಮೌಲ್ಯಕ್ಕಿಂತ ಕ್ರಿಯೆಯನ್ನು ಹೆಚ್ಚು ಪ್ರೇರೇಪಿಸುತ್ತದೆ.
      impulsive_purchases: |
        ನಿಮಗೆ ಅಗತ್ಯವಿರುವುದರಿಂದ ಅಲ್ಲ, ಬದಲಿಗೆ ಅವು ಕೊರತೆಯಿಂದಾಗಿರುವುದರಿಂದ ವಸ್ತುಗಳನ್ನು ಖರೀದಿಸುವುದು.
      artificial_scarcity: |
        ಕೊರತೆಯು ನೈಜವಾಗಿರುವುದಕ್ಕಿಂತ ಹೆಚ್ಚಾಗಿ ಕೃತಕವಾಗಿ ಸೃಷ್ಟಿಸಲಾಗಿದೆ (ಉದಾ. ನಕಲಿ ಕೌಂಟ್‌ಡೌನ್‌ಗಳು).
    examples:
      sales: |
        "ಸ್ಟಾಕ್‌ನಲ್ಲಿ ಕೇವಲ 2 ಬಾಕಿ" ಅಥವಾ "ಮಾರಾಟ ಇಂದು ರಾತ್ರಿ ಕೊನೆಗೊಳ್ಳುತ್ತದೆ" ತುರ್ತು ಸ್ಥಿತಿ ಇಲ್ಲದಿದ್ದರೆ ಆಗದ ಖರೀದಿಗಳನ್ನು ಪ್ರಚೋದಿಸುತ್ತದೆ.
      auctions: |
        ಹರಾಜಿನಲ್ಲಿ ಭಾಗವಹಿಸುವವರು ಸ್ಪರ್ಧಾತ್ಮಕ ಕೊರತೆಯಿಂದಾಗಿ ಯೋಜಿಸಿದ್ದಕ್ಕಿಂತ ಹೆಚ್ಚು ಪಾವತಿಸಿ ಗೆಲ್ಲುವಲ್ಲಿ ಮಗ್ನರಾಗುತ್ತಾರೆ.
      exclusivity: |
        "ಸದಸ್ಯರಿಗೆ ಮಾತ್ರ" ಅಥವಾ "ಆಹ್ವಾನಿತರಿಗೆ ಮಾತ್ರ" ಪ್ರವೇಶವು ಗ್ರಹಿಸಿದ ಮೌಲ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.
      genuine_scarcity: |
        ಸಂಪನ್ಮೂಲಗಳು ನಿಜವಾಗಿಯೂ ಸೀಮಿತವಾಗಿದ್ದಾಗ, ಕೊರತೆಯ ಒತ್ತಡದಲ್ಲಿರುವ ಜನರು ಕಳಪೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ (ಉದಾ. ಬಡವರು, ಸಮಯದ ಒತ್ತಡದಲ್ಲಿರುವವರು).
    real_world_implications: |
      ಕೊರತೆಯ ಪಕ್ಷಪಾತವು ಗ್ರಾಹಕರ ವರ್ತನೆ, ಮಾತುಕತೆಯ ಫಲಿತಾಂಶಗಳು ಮತ್ತು ನೀತಿ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಇದನ್ನು ನೈತಿಕವಾಗಿ (ಉದಾ. ಕಾನೂನುಬದ್ಧ ಗಡುವುಗಳು) ಅಥವಾ ಅನೈತಿಕವಾಗಿ (ಉದಾ. ನಕಲಿ ಕೊರತೆ) ಬಳಸಬಹುದು. ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದರಿಂದ ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಇತರರು ಕೃತಕ ಕೊರತೆಯನ್ನು ಸೃಷ್ಟಿಸಿದಾಗ ಎಚ್ಚರವಿರಲಿ ("ನಾನು ಕೆಲವು ಕ್ಲೈಂಟ್‌ಗಳನ್ನು ಮಾತ್ರ ತೆಗೆದುಕೊಳ್ಳುತ್ತಿದ್ದೇನೆ"). ಕೊರತೆ ನೈಜವೇ ಎಂದು ಪರಿಶೀಲಿಸಿ. ಸಂಬಂಧಗಳನ್ನು ನಿರ್ಮಿಸುವಾಗ, ನಿಮ್ಮ ಸಮಯದ ನಿಜವಾದ ಕೊರತೆಯು ಮೌಲ್ಯವನ್ನು ಸೂಚಿಸುತ್ತದೆ - ಆದರೆ ಅತಿಯಾದ ಬಳಕೆ ಕುಶಲತೆಯಂತೆ ಭಾಸವಾಗುತ್ತದೆ.
      collaborative_learning_initiative: |
        ಕ್ರಮಗಳಿಗೆ ತುರ್ತು ಸ್ಥಿತಿಯನ್ನು ಸೃಷ್ಟಿಸುವಾಗ, ಅದು ಕಾನೂನುಬದ್ಧವಾಗಿದೆ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ. ನಕಲಿ ಗಡುವುಗಳು ಕಂಡುಬಂದಾಗ ವಿಶ್ವಾಸವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.
    how_can_this_be_misapplied:
      manipulation: |
        ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಇತರರನ್ನು ಒತ್ತಾಯಿಸಲು ಸುಳ್ಳು ಕೊರತೆಯನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ರಚಿಸುವುದು.
      impulsive_decisions: |
        ಹೆಚ್ಚಿನ ಸಮಯವು ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸುವ ಕೃತಕ ತುರ್ತು ಸ್ಥಿತಿಯಲ್ಲಿ ಪ್ರಮುಖ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡುವುದು.
      overvaluing_scarcity: |
        ಕೊರತೆಯುಳ್ಳ ವಸ್ತುಗಳು ಯಾವಾಗಲೂ ಉತ್ತಮವಾಗಿರುತ್ತವೆ ಎಂದು ಊಹಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಕೊರತೆಯು ಯಾದೃಚ್ಛಿಕವಾಗಿರುತ್ತದೆ.
      exploiting_vulnerability: |
        ಇಾಗಲೇ ಸಂಪನ್ಮೂಲಗಳ ಒತ್ತಡದಲ್ಲಿರುವ ಜನರ ಮೇಲೆ ಕೊರತೆಯ ತಂತ್ರಗಳನ್ನು ಬಳಸುವುದು.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆ
    quick_introduction: |
      ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ನಿಮ್ಮ ಕ್ರಿಯೆಗಳ ಪರಿಣಾಮಗಳ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಗಣಿಸುವ ಅಭ್ಯಾಸವಾಗಿದೆ. ಮೊದಲ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಾನು X ಮಾಡಿದರೆ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಂತರ ಏನಾಗುತ್ತದೆ?" ಮತ್ತು "ಅದರ ನಂತರ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಇದು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ಮೇಲ್ಮೈಗೆ ತರುತ್ತದೆ.
    one_liner: ನಂತರ ಏನಾಗುತ್ತದೆ? ಎಂದು ಕೇಳಿ—ಪರಿಣಾಮಗಳ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಗಣಿಸಿ.
    try_this:
      - ಯಾವುದೇ ನಿರ್ಧಾರಕ್ಕಾಗಿ, ಕನಿಷ್ಠ ಎರಡು ಬಾರಿ ನಂತರ ಏನಾಗುತ್ತದೆ? ಎಂದು ಕೇಳಿ.
      - ನಿಮ್ಮ ಕ್ರಿಯೆಗೆ ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ—ಮತ್ತು ನಂತರ ಆ ಪ್ರತಿಕ್ರಿಯೆಗೆ.
      - ಸರಪಳಿಯಲ್ಲಿ ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ವಿಲೋಮಗೊಳ್ಳುವಾಗ ಅಥವಾ ಜಟಿಲವಾಗುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಎರಡನೇ-ಶ್ರೇಣಿಯ (ಮತ್ತು ಮೂರನೇ-ಶ್ರೇಣಿಯ) ಪರಿಣಾಮಗಳನ್ನು ಯೋಚಿಸಿದ್ದೇನೆಯೇ?
      - ನಾನು ಯಾವ ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ತಪ್ಪಿಸಿಕೊಳ್ಳಬಹುದು?
    in_more_detail: |
      ಹೋವಾರ್ಡ್ ಮಾರ್ಕ್ಸ್ ಅವರು ಹೂಡಿಕೆಯಲ್ಲಿ ಈ ಪರಿಕಲ್ಪನೆಯನ್ನು ಜನಪ್ರಿಯಗೊಳಿಸಿದರು. ಮೊದಲ-ಶ್ರೇಣಿ: "ಇದು ಏರುತ್ತದೆ." ಎರಡನೇ-ಶ್ರೇಣಿ: "ಇದು ಏರಿದರೆ, ಇತರರು ಗಮನಿಸುತ್ತಾರೆ, ಹೆಚ್ಚು ಜನರು ಖರೀದಿಸುತ್ತಾರೆ, ಇದು ಮತ್ತಷ್ಟು ಏರುತ್ತದೆ—ಅದು ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನಗೊಂಡು ಕುಸಿಯುವವರೆಗೆ." ಪರಿಣಾಮಗಳ ಸರಪಳಿಯು ಸಾಮಾನ್ಯವಾಗಿ ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮವನ್ನು ವಿಲೋಮಗೊಳಿಸುತ್ತದೆ ಅಥವಾ ಜಟಿಲಗೊಳಿಸುತ್ತದೆ.

      ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಕಷ್ಟಕರವಾಗಿದೆ—ಇದಕ್ಕೆ ಹೆಚ್ಚು ಮಾನಸಿಕ ಶ್ರಮ ಮತ್ತು ಕಲ್ಪನೆ ಬೇಕಾಗುತ್ತದೆ. ಆದರೆ ಇದು ಅನೇಕ ತಪ್ಪುಗಳನ್ನು ತಡೆಯುತ್ತದೆ. ಉತ್ತಮ ತಂತ್ರಜ್ಞರು ಹಲವಾರು ಹಂತಗಳ ಮುಂದೆ ಯೋಚಿಸುತ್ತಾರೆ ಮತ್ತು ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸುತ್ತಾರೆ.
    why_this_is_important: |
      ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ತಡೆಯುತ್ತದೆ ಮತ್ತು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ. ಇದು ತಂತ್ರ, ನೀತಿ ಮತ್ತು ಕ್ರಿಯೆಗಳು ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಪ್ರಚೋದಿಸುವ ಯಾವುದೇ ಕ್ಷೇತ್ರಕ್ಕೆ ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವುದು
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವುದು
      - ತಂತ್ರ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      consequence_chains: |
        "ನಾನು X ಮಾಡಿದರೆ, ನಂತರ Y ಸಂಭವಿಸುತ್ತದೆ, ನಂತರ Z ಸಂಭವಿಸುತ್ತದೆ..."
      reaction_anticipation: |
        ನಿಮ್ಮ ಕ್ರಿಯೆಗೆ ಇತರರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸುವುದು.
      unintended_effects: |
        ಉಪ-ಪರಿಣಾಮಗಳು ಮತ್ತು ಪ್ರತಿಕ್ರಿಯೆ ಲೂಪ್‌ಗಳಿಗಾಗಿ ನೋಡುವುದು.
      reversals: |
        ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳನ್ನು ವಿರೋಧಿಸುವ ಅಥವಾ ವಿಲೋಮಗೊಳಿಸುವ ಎರಡನೇ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು.
    examples:
      investing: |
        "ಎಲ್ಲರೂ ಇದು ಉತ್ತಮ ಹೂಡಿಕೆ ಎಂದು ಯೋಚಿಸಿದರೆ, ಅದು ಬಹುಶಃ ಜನರಿಂದ ತುಂಬಿದೆ—
        ಅಂಚು ಹೋಗಿರಬಹುದು."
      policy: |
        "ನಾವು X ಗೆ ಸಬ್ಸಿಡಿ ನೀಡಿದರೆ, ಬೇಡಿಕೆ ಹೆಚ್ಚಾಗುತ್ತದೆ, ಬೆಲೆಗಳು ಏರುತ್ತವೆ—ಸಬ್ಸಿಡಿಯು
        ವಾಸ್ತವವಾಗಿ ಸಹಾಯ ಮಾಡುತ್ತದೆಯೇ?"
      negotiation: |
        "ನಾನು ಇಲ್ಲಿ ಕಠಿಣವಾಗಿ ಒತ್ತಾಯಿಸಿದರೆ, ಅವರು ಅಲ್ಲಿ ಪ್ರತೀಕಾರ ತೀರಿಸುತ್ತಾರೆ—ನಿವ್ವಳ ಪರಿಣಾಮವೇನು?"
      incentives: |
        "ನಾವು ಈ ಅಳತೆಗೆ ಬಹುಮಾನ ನೀಡಿದರೆ, ಜನರು ಅದನ್ನು ದುರುಪಯೋಗಪಡಿಸಿಕೊಳ್ಳುತ್ತಾರೆ—ಅವರು
        ವಾಸ್ತವವಾಗಿ ಏನನ್ನು ಮಾಡುತ್ತಾರೆ?"
    real_world_implications: |
      ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ಕಾರ್ಯತಂತ್ರದ ಚಿಂತನೆಯ ಲಕ್ಷಣವಾಗಿದೆ. ಇದು ನೀತಿ ವೈಫಲ್ಯಗಳು, ಅನಿರೀಕ್ಷಿತ ಪ್ರೋತ್ಸಾಹಗಳು ಮತ್ತು ಅಮಾಯಕ ಆಶಾವಾದವನ್ನು ತಡೆಯುತ್ತದೆ. ಇದು ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವವರನ್ನು ಶ್ರೇಷ್ಠರಿಂದ ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾವುದೇ ಕ್ರಿಯೆಯನ್ನು ತೆಗೆದುಕೊಳ್ಳುವ ಮೊದಲು, "ಅವರು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ? ಮತ್ತು ನಾನು
        ಅದಕ್ಕೆ ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತೇನೆ?" ಎಂದು ಕೇಳಿ. ತಕ್ಷಣದ ವಿನಿಮಯವನ್ನು ಮಾತ್ರವಲ್ಲದೆ, ಸಂಬಂಧದ
        ಗತಿವಿಜ್ಞಾನವನ್ನು ಪರಿಗಣಿಸಿ.
      collaborative_learning_initiative: |
        ಯೋಜನೆಯಲ್ಲಿ, "ನಂತರ ಏನಾಗುತ್ತದೆ?" ವ್ಯಾಯಾಮಗಳನ್ನು ನಡೆಸಿ. ಪರಿಣಾಮಗಳ ಸರಪಳಿಗಳನ್ನು ನಕ್ಷೆ
        ಮಾಡಿ. ಮೇಲ್ಮೈಗೆ ಬರುವ ಮೊದಲು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ಗುರುತಿಸಿ.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        ಯಾವಾಗಲೂ ಕ್ರಿಯೆ ತೆಗೆದುಕೊಳ್ಳಲು ಸಾಧ್ಯವಾಗದಷ್ಟು ಹಂತಗಳ ಮುಂದೆ ಯೋಚಿಸುವುದು.
      false_complexity: |
        ಮೊದಲ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ಸಾಕಾಗುವಾಗ ಎರಡನೇ-ಶ್ರೇಣಿಯ ಪರಿಣಾಮಗಳು ಯಾವಾಗಲೂ ಪ್ರಾಬಲ್ಯ
        ಹೊಂದುತ್ತವೆ ಎಂದು ಊಹಿಸುವುದು.
      overconfidence: |
        ಅನಿಶ್ಚಿತತೆ ಸಂಯುಕ್ತವಾಗುವಾಗ ಉದ್ದವಾದ ಸರಪಳಿಗಳನ್ನು ಊಹಿಸಬಹುದು ಎಂದು ನಂಬುವುದು.
      pessimism: |
        ಪರಿಣಾಮಗಳ ಸರಪಳಿಯಲ್ಲಿ ಯಾವಾಗಲೂ ಕೆಟ್ಟದನ್ನು ಊಹಿಸುವುದು.
