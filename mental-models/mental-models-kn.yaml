        ನಿರ್ಲಕ್ಷಿಸುವುದು — ಕೆಲವೊಮ್ಮೆ ವೈಯಕ್ತಿಕ ಪ್ರಕರಣವು ಅಪವಾದವಾಗಿರುತ್ತದೆ.
      stereotyping: |
