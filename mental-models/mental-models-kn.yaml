  - id: zero_sum_thinking
    name: ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆ (Zero-Sum Thinking)
    quick_introduction: |
      ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆ ಎಂದರೆ ಒಬ್ಬರ ಲಾಭವು ಇನ್ನೊಬ್ಬರ ನಷ್ಟವಾಗಿರಬೇಕು ಎಂಬ ನಂಬಿಕೆಯಾಗಿದೆ—
      ಅಂದರೆ ಸಂಪನ್ಮೂಲಗಳು ಸ್ಥಿರವಾಗಿರುತ್ತವೆ ಮತ್ತು ನಿಮಗೆ ಯಾವುದೇ ಅನುಕೂಲವೆಂದರೆ ನನಗೆ ಅನನುಕೂಲ.
      ವಾಸ್ತವದಲ್ಲಿ, ಅನೇಕ ಸಂದರ್ಭಗಳು ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಾಗಿರುತ್ತವೆ: ಎರಡೂ ಪಕ್ಷಗಳು ಲಾಭ ಪಡೆಯಬಹುದು.
    one_liner: ನಿಮ್ಮ ಲಾಭವು ನನ್ನ ನಷ್ಟವಾಗಿರಬೇಕಾಗಿಲ್ಲ—ಅನೇಕ ಸಂದರ್ಭಗಳು ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಾಗಿರುತ್ತವೆ.
    try_this:
      - ಕೇಳಿ: ನಾವು ಕೇಕ್ ಅನ್ನು ವಿಸ್ತರಿಸಬಹುದೇ? ಇದು ನಿಜವಾಗಿಯೂ ಶೂನ್ಯ-ಮೊತ್ತವೇ?
      - ಸ್ಪರ್ಧೆಯನ್ನು ಊಹಿಸುವ ಮೊದಲು ಸಹಕಾರಕ್ಕಾಗಿ ನೋಡಿ.
      - ಪರಿಸ್ಥಿತಿಯನ್ನು ಸ್ಥಿರ-ಕೇಕ್ ಎಂದು ಪರಿಗಣಿಸುತ್ತಿದ್ದೀರಿ ಎಂದು ಗಮನಿಸಿ, ವಾಸ್ತವದಲ್ಲಿ ಅದು ಹಾಗಲ್ಲದಿದ್ದಾಗ.
    ask_yourself:
      - ನಾವು ಅದನ್ನು ವಿಸ್ತರಿಸಬಹುದಾದಾಗ ನಾನು ಸ್ಥಿರ-ಕೇಕ್ ಅನ್ನು ಊಹಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಸ್ಪರ್ಧೆಗಿಂತ ಸಹಕಾರವು ಹೆಚ್ಚು ಮೌಲ್ಯವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆಯೇ?
    in_more_detail: |
      ಶೂನ್ಯ-ಮೊತ್ತದ ಆಟದಲ್ಲಿ, ಒಟ್ಟು ಮೊತ್ತವು ಸ್ಥಿರವಾಗಿರುತ್ತದೆ—ನಿಮ್ಮ ಲಾಭವು ನನ್ನ ನಷ್ಟ. ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದ
      ಪರಿಸ್ಥಿತಿಗಳಲ್ಲಿ, ಸಹಕಾರವು ಮೌಲ್ಯವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ. ವ್ಯಾಪಾರ, ನಾವೀನ್ಯತೆ ಮತ್ತು ಸಂಬಂಧ
      ನಿರ್ಮಾಣವು ಸಾಮಾನ್ಯವಾಗಿ ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಾಗಿರುತ್ತವೆ. ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆಯು ಅನಗತ್ಯ
      ಸ್ಪರ್ಧೆಗೆ, ಸಹಕಾರದ ಅವಕಾಶಗಳನ್ನು ಕಳೆದುಕೊಳ್ಳಲು ಮತ್ತು ವಿನಾಶಕಾರಿ
      ಎದುರಾಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

      ಈ ಪಕ್ಷಪಾತವು ಮಾತುಕತೆ, ರಾಜಕೀಯ ಮತ್ತು ಸಾಂಸ್ಥಿಕ ಚಲನಶೀಲತೆಗಳಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿದೆ.
      ಕೇಕ್ ಅನ್ನು ವಿಸ್ತರಿಸಬಹುದಾದಾಗಲೂ ಇದು ಸ್ಥಿರ-ಕೇಕ್ ಎಂದು ಊಹಿಸುತ್ತದೆ. ಇದು ಸ್ವಯಂ-ಪೂರೈಸುವಂತೆ ಆಗಬಹುದು:
      ನೀವು ಇತರರನ್ನು ಎದುರಾಳಿಯಾಗಿ ಪರಿಗಣಿಸಿದರೆ, ಅವರು ಎದುರಾಳಿಗಳಾಗುತ್ತಾರೆ.
    why_this_is_important: |
      ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆಯನ್ನು ಗುರುತಿಸುವುದು ಸಹಕಾರ ಮತ್ತು
      ಮೌಲ್ಯ ಸೃಷ್ಟಿಗೆ ಅವಕಾಶಗಳನ್ನು ತೆರೆಯುತ್ತದೆ. ಇದು ಮಾತುಕತೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ, ಸಂಘರ್ಷವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಮತ್ತು
      ಜಯ-ಜಯದ ಫಲಿತಾಂಶಗಳನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ. ಅತ್ಯುತ್ತಮ ಅವಕಾಶಗಳಲ್ಲಿ ಹಲವು ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಾಗಿರುತ್ತವೆ.
    when_to_use:
      - ಮಾತುಕತೆ (negotiation)
      - ನಾಯಕತ್ವ (leadership)
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ (relationship_building)
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ (decision_making)
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "ಅವರು ಗೆದ್ದರೆ, ನಾನು ಸೋಲುತ್ತೇನೆ" ಎಂಬ ಭಾವನೆ, ಪರಿಸ್ಥಿತಿಯು ಇಬ್ಬರಿಗೂ ಲಾಭ ತರುವ ಸಾಧ್ಯತೆ ಇದ್ದಾಗಲೂ.
      competitive_ framing: |
        ಪರಿಸ್ಥಿತಿಗಳನ್ನು ಸ್ವಯಂಚಾಲಿತವಾಗಿ ನಮ್ಮ-ವಿರುದ್ಧ-ಅವರ ಎಂದು ರೂಪಿಸುವುದು.
      envy_of_others_gains: |
        ಇತರರ ಯಶಸ್ಸು ನಿಮ್ಮದನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಎಂಬಂತೆ ಅಸೂಯೆ ಪಡುವುದು.
      missed_cooperation: |
        ಎಲ್ಲರಿಗೂ ಪ್ರಯೋಜನವಾಗುವ ಸಹಯೋಗದ ಅವಕಾಶಗಳನ್ನು ನೋಡಲು ವಿಫಲರಾಗುವುದು.
    examples:
      negotiation: |
        ಇನ್ನೊಂದು ಪಕ್ಷಕ್ಕೆ ಉತ್ತಮ ಒಪ್ಪಂದವೆಂದರೆ ನಿಮಗೆ ಕೆಟ್ಟ ಒಪ್ಪಂದ ಎಂದು ಊಹಿಸುವುದು— ಸೃಜನಾತ್ಮಕ ಪರಿಹಾರಗಳು
        ಸಾಮಾನ್ಯವಾಗಿ ಇಬ್ಬರಿಗೂ ಮೌಲ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತವೆ.
      salary: |
        "ನನ್ನ ಸಹೋದ್ಯೋಗಿ ವೇತನ ಹೆಚ್ಚಳ ಪಡೆದರೆ, ನನಗೆ ಕಡಿಮೆ ಹಣ ಇರುತ್ತದೆ" ಎಂಬ ಭಾವನೆ, ಬಜೆಟ್
        ವೈಯಕ್ತಿಕವಾಗಬಹುದಾದಾಗ ಅಥವಾ ರಚಿಸಿದ ಮೌಲ್ಯದಿಂದ ವೇತನ ಹೆಚ್ಚಳವನ್ನು ಸಮರ್ಥಿಸಬಹುದಾದಾಗ.
      politics: |
        "ಅವರ ಪಕ್ಷದ ಲಾಭಗಳು ನಮ್ಮ ನಷ್ಟಗಳು" ಎಂಬ ಭಾವನೆ, ಅನೇಕ ನೀತಿ ಫಲಿತಾಂಶಗಳು
        ಹಲವು ಗುಂಪುಗಳಿಗೆ ಪ್ರಯೋಜನವಾಗಬಹುದಾದಾಗ.
      career: |
        "ಅವರ ಪದೋನ್ನತಿ ನನಗೆ ಕಡಿಮೆ ಅವಕಾಶವನ್ನು ಸೂಚಿಸುತ್ತದೆ" ಎಂಬ ಭಾವನೆ, ಸಂಸ್ಥೆಯ ಬೆಳವಣಿಗೆ
        ಎಲ್ಲರಿಗೂ ಹೆಚ್ಚಿನ ಅವಕಾಶಗಳನ್ನು ಸೃಷ್ಟಿಸಬಹುದಾದಾಗ.
    real_world_implications: |
      ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆಯು ಸಂಘರ್ಷವನ್ನು ಉಂಟುಮಾಡುತ್ತದೆ, ಸಹಕಾರವನ್ನು ಸೀಮಿತಗೊಳಿಸುತ್ತದೆ ಮತ್ತು ಕಳೆದುಹೋದ
      ಅವಕಾಶಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ಅರ್ಥಶಾಸ್ತ್ರ, ಸಂಬಂಧಗಳು ಮತ್ತು
      ನಾವೀನ್ಯತೆಯಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ತಪ್ಪಾಗಿರುತ್ತದೆ. ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದ ರೂಪಕ್ಕೆ ಬದಲಾಯಿಸುವುದು ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಇತರರಿಗೆ ಮೌಲ್ಯವನ್ನು ಸೃಷ್ಟಿಸುವ ಮಾರ್ಗಗಳನ್ನು ನೋಡಿ—ಅವರ ಯಶಸ್ಸು ನಿಮಗೆ
        ಅವಕಾಶಗಳನ್ನು ಸೃಷ್ಟಿಸಬಹುದು. ಎರಡೂ ಪಕ್ಷಗಳು ಪ್ರಯೋಜನ ಪಡೆಯುವ ಸಂಬಂಧಗಳನ್ನು ನಿರ್ಮಿಸಿ.
      collaborative_learning_initiative: |
        ತಂಡದ ಗುರಿಗಳನ್ನು ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಂತೆ ರೂಪಿಸಿ: ಹಂಚಿಕೆಯ ಯಶಸ್ಸು, ಕೇಕ್ ಅನ್ನು ಬೆಳೆಸುವುದು.
        ಆಂತರಿಕ ಸ್ಪರ್ಧೆಗಿಂತ ಸಹಕಾರವನ್ನು ಉತ್ತೇಜಿಸಿ.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        ಕೆಲವು ಪರಿಸ್ಥಿತಿಗಳು ಶೂನ್ಯ-ಮೊತ್ತದ್ದಾಗಿರುತ್ತವೆ (ಉದಾ., ಒಂದು ಪದೋನ್ನತಿ, ಸ್ಥಿರ ಬಜೆಟ್).
        ಅದನ್ನು ಕಡೆಗಣಿಸುವುದು ಮೂರ್ಖತನವಾಗಬಹುದು.
      naive_cooperation: |
        ಕೆಲವು ನಟರು ನಿಜವಾಗಿಯೂ ಎದುರಾಳಿಯಾಗಿದ್ದಾಗ ಎಲ್ಲರೂ ಸಹಕರಿಸುತ್ತಾರೆ ಎಂದು ಊಹಿಸುವುದು.
      undervaluing_competition: |
        ಸ್ಪರ್ಧೆಯು ಸುಧಾರಣೆಯನ್ನು ಚಾಲನೆ ಮಾಡುತ್ತದೆ; ಎಲ್ಲ ಸ್ಪರ್ಧೆಯೂ ವಿನಾಶಕಾರಿಯಲ್ಲ.
      exploitation: |
        "ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತ" ರೂಪವನ್ನು ಬಳಸಿಕೊಂಡು ಪ್ರಯೋಜನ ಪಡೆಯದ ಇತರರಿಂದ ಮೌಲ್ಯವನ್ನು ಹೊರತೆಗೆಯುವುದು.
    related_content:
