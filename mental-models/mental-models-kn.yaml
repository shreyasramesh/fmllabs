  - id: availability_heuristic
    name: ಲಭ್ಯತೆಯ ಅನುಮಾನ (Availability Heuristic)
    quick_introduction: |
      ಲಭ್ಯತೆಯ ಅನುಮಾನ (Availability heuristic) ಎಂದರೆ, ಯಾವುದೇ ಘಟನೆ ಸಂಭವಿಸುವ ಸಂಭವನೀಯತೆಯನ್ನು
      ಅದರ ಉದಾಹರಣೆಗಳು ನಮ್ಮ ಮನಸ್ಸಿನಲ್ಲಿ ಎಷ್ಟು ಸುಲಭವಾಗಿ ಬರುತ್ತವೆ ಎಂಬುದರ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಣಯಿಸುವುದು.
      ನಮಗೆ ಸುಲಭವಾಗಿ ನೆನಪಾಗುವ ಘಟನೆಗಳು ಸಾಮಾನ್ಯವೆಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ಸ್ಪಷ್ಟವಾದ, ಇತ್ತೀಚಿನ
      ಅಥವಾ ಭಾವನಾತ್ಮಕ ಉದಾಹರಣೆಗಳು ನಮ್ಮ ಸಂಭವನೀಯತೆಯ ಅಂದಾಜುಗಳನ್ನು ಆವರಿಸುತ್ತವೆ.
    one_liner: ಸುಲಭವಾಗಿ ನೆನಪಿಗೆ ಬರುವುದು ಹೆಚ್ಚು ಸಂಭವನೀಯವೆಂದು ಅನಿಸುತ್ತದೆ— ಅದು ನಿಜವಾಗದಿದ್ದರೂ ಸಹ.
    try_this:
      - ಕೇಳಿ: ಮೂಲ ದರ (base rate) ಏನು? ಸ್ಪಷ್ಟವಾದ ಅಥವಾ ಇತ್ತೀಚಿನ ಉದಾಹರಣೆಗಳನ್ನು ನಾನು ಅತಿಯಾಗಿ ಗಣನೆಗೆ ತೆಗೆದುಕೊಳ್ಳುತ್ತೇನೆಯೇ?
      - ನಿಮ್ಮ ಒಳಮನಸ್ಸು ಇದು ಸಾಮಾನ್ಯವಾಗಿದೆ ಅಥವಾ ಇದು ಅಪರೂಪವಾಗಿದೆ ಎಂದು ಹೇಳಿದಾಗ ಡೇಟಾವನ್ನು ಹುಡುಕಿ.
      - ಒಂದು ನಾಟಕೀಯ ಕಥೆಯು ನಿಮ್ಮ ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನವನ್ನು ನಿರ್ವಹಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ನಿಜವಾದ ಆವರ್ತನದ ಬದಲಿಗೆ, ನೆನಪಿನ ಸುಲಭತೆಯಿಂದ ನಾನು ಸಂಭವನೀಯತೆಯನ್ನು ನಿರ್ಣಯಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಆ ಸುದ್ದಿಯನ್ನು ಈಗಷ್ಟೇ ನೋಡದಿದ್ದರೆ ನಾನು ವಿಭಿನ್ನವಾಗಿ ಯೋಚಿಸುತ್ತಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ಆವರ್ತನ ಮತ್ತು ಸಂಭವನೀಯತೆಯನ್ನು ಅಂದಾಜಿಸಲು ನಾವು ಮಾನಸಿಕ ಶಾರ್ಟ್‌ಕಟ್‌ಗಳನ್ನು ಬಳಸುತ್ತೇವೆ.
      ಒಂದು ಶಾರ್ಟ್‌ಕಟ್ ಲಭ್ಯತೆ: ಸುಲಭವಾಗಿ ನೆನಪಿಗೆ ಬರುವುದು ಯಾವುದು? ವಿಮಾನ ಅಪಘಾತಗಳು ಸ್ಪಷ್ಟವಾಗಿರುತ್ತವೆ
      ಮತ್ತು ವ್ಯಾಪಕವಾಗಿ ವರದಿಯಾಗುತ್ತವೆ— ನಾವು ಅವುಗಳ ಸಂಭವನೀಯತೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ.
      ಕಾರು ಅಪಘಾತಗಳು ಸಾಮಾನ್ಯವಾಗಿದ್ದರೂ ಕಡಿಮೆ ಗಮನಾರ್ಹವಾಗಿರುತ್ತವೆ— ನಾವು ಅಂದಾಜಿಸುತ್ತೇವೆ.
      ಇತ್ತೀಚಿನ, ಸ್ಪಷ್ಟತೆ ಮತ್ತು ಭಾವನಾತ್ಮಕ ಪ್ರಭಾವ ಎಲ್ಲವೂ ಲಭ್ಯತೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತವೆ.

      ಲಭ್ಯತೆಯು ನಿಜವಾದ ಆವರ್ತನದೊಂದಿಗೆ ಸಂಬಂಧ ಹೊಂದಿರುವಾಗ ಈ ಅನುಮಾನ ಉಪಯುಕ್ತವಾಗಿರುತ್ತದೆ.
      ಆದರೆ ಮಾಧ್ಯಮ, ವೈಯಕ್ತಿಕ ಅನುಭವ ಮತ್ತು ಗಮನಾರ್ಹತೆಗಳು ಸಾಮಾನ್ಯವಾಗಿ ಸಂಬಂಧವನ್ನು ವಿರೂಪಗೊಳಿಸುತ್ತವೆ.
      ನಾವು ಅಪರೂಪದ ಆದರೆ ಸ್ಪಷ್ಟವಾದ ಅಪಾಯಗಳಿಗೆ ಹೆದರುತ್ತೇವೆ ಮತ್ತು ಸಾಮಾನ್ಯ ಆದರೆ ಸಾಮಾನ್ಯವಾದವುಗಳನ್ನು
      ತಿರಸ್ಕರಿಸುತ್ತೇವೆ.
    why_this_is_important: |
      ಲಭ್ಯತೆಯ ಅನುಮಾನವನ್ನು ಗುರುತಿಸುವುದು ಸಂಭವನೀಯತೆಯ ಅಂದಾಜುಗಳನ್ನು ಸರಿಪಡಿಸಲು, ಸ್ಪಷ್ಟವಾದ ಸುದ್ದಿಗಳ
      ಬಗ್ಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ಉತ್ತಮ ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಮಾಡಲು ನಿಮಗೆ
      ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಿರ್ಣಯಗಳಲ್ಲಿನ ಅನೇಕ ವ್ಯವಸ್ಥಿತ ದೋಷಗಳನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಹೂಡಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
    how_can_you_spot_it:
      vividness_dominance: |
        ನಾಟಕೀಯ ಅಥವಾ ಭಾವನಾತ್ಮಕ ಉದಾಹರಣೆಗಳು ಅಂದಾಜುಗಳ ಮೇಲೆ ಅಸಮಾನವಾಗಿ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ.
      recency_effect: |
        ಇತ್ತೀಚಿನ ಘಟನೆಗಳು ಪುನರಾವರ್ತನೆಗೊಳ್ಳುವ ಸಂಭವನೀಯತೆ ಹೆಚ್ಚಾಗಿರುತ್ತದೆ.
      personal_experience_overweighting: |
        "ನನಗೆ ಯಾರಾದರೂ ತಿಳಿದಿದ್ದಾರೆ..." ಎಂಬುದು ಸಂಭವನೀಯತೆಯ ಅಂದಾಜುಗಳನ್ನು ರೂಪಿಸುತ್ತದೆ.
      media_distortion: |
        ವರದಿ ಮಾಡಲ್ಪಟ್ಟದ್ದು ಸಾಮಾನ್ಯವಾಗಿ ಆವರ್ತನದೊಂದಿಗೆ ಹೊಂದಿಕೆಯಾಗುವುದಿಲ್ಲ.
    examples:
      risk_perception: |
        ಭಯೋತ್ಪಾದನೆಯ ಅಪಾಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುವುದು (ಸ್ಪಷ್ಟ, ವರದಿಯಾದ) ಮತ್ತು ಹೃದ್ರೋಗದ ಅಪಾಯವನ್ನು ಕಡಿಮೆ ಅಂದಾಜಿಸುವುದು (ಸಾಮಾನ್ಯ, ಕಡಿಮೆ ನಾಟಕೀಯ).
      investing: |
        ಇತ್ತೀಚಿನ ಮಾರುಕಟ್ಟೆ ಘಟನೆಗಳು (ಕುಸಿತ, ಏರಿಕೆ) ಭವಿಷ್ಯದ ನಿರೀಕ್ಷೆಗಳನ್ನು ಆವರಿಸುತ್ತವೆ.
      hiring: |
        ಒಂದು ನಿರ್ದಿಷ್ಟ ಶಾಲೆಯಿಂದ ಬಂದ ಕೆಟ್ಟ ನೇಮಕಾತಿಯ ಬಗ್ಗೆ ಒಂದು ಸ್ಪಷ್ಟ ಕಥೆಯು ಆ ಶಾಲೆಯಿಂದ
        ಬಂದ ಎಲ್ಲಾ ಅಭ್ಯರ್ಥಿಗಳ ಮೌಲ್ಯಮಾಪನದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
      health: |
        ಸ್ನೇಹಿತರ ಕ್ಯಾನ್ಸರ್ ರೋಗನಿರ್ಣಯವು ಮೂಲ ದರಗಳು ಸೂಚಿಸುವುದಕ್ಕಿಂತ ಕ್ಯಾನ್ಸರ್ ಹೆಚ್ಚು ಸಂಭವನೀಯವೆಂದು
        ಅನಿಸುತ್ತದೆ.
    real_world_implications: |
      ಲಭ್ಯತೆಯ ಅನುಮಾನವು ವಿಮೆ ಖರೀದಿ, ನೀತಿ ಆದ್ಯತೆಗಳು ಮತ್ತು ವೈಯಕ್ತಿಕ ನಿರ್ಧಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ
      ಬೀರುತ್ತದೆ. ಇದನ್ನು ಮಾಧ್ಯಮ ಮತ್ತು ಮಾರಾಟಗಾರರು ಬಳಸಿಕೊಳ್ಳುತ್ತಾರೆ. ಇದನ್ನು ಸರಿಪಡಿಸಲು ಮೂಲ ದರಗಳನ್ನು
      ಹುಡುಕುವ ಮತ್ತು "ಏನು ನೆನಪಿಗೆ ಬರುತ್ತದೆ" ಎಂದು ಪ್ರಶ್ನಿಸುವ ಅಗತ್ಯವಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಒಬ್ಬ ವ್ಯಕ್ತಿ ಅಥವಾ ಗುಂಪಿನೊಂದಿಗಿನ ಒಂದು ಸ್ಪಷ್ಟ ನಕಾರಾತ್ಮಕ ಅನುಭವವು ನಿಮ್ಮ ನಿರ್ಣಯವನ್ನು
        ವಿರೂಪಗೊಳಿಸಬಹುದು ಎಂಬುದನ್ನು ಅರಿತುಕೊಳ್ಳಿ. ಮೂಲ ದರಗಳು ಮತ್ತು ಬಹು ಡೇಟಾ ಪಾಯಿಂಟ್‌ಗಳನ್ನು
        ಹುಡುಕಿ.
      collaborative_learning_initiative: |
        ಅಪಾಯಗಳು ಅಥವಾ ಅವಕಾಶಗಳನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, "ಮೂಲ ದರ ಏನು?" ಮತ್ತು "ನಾನು
        ಸ್ಪಷ್ಟ ಉದಾಹರಣೆಗಳನ್ನು ಅತಿಯಾಗಿ ಗಣನೆಗೆ ತೆಗೆದುಕೊಳ್ಳುತ್ತೇನೆಯೇ?" ಎಂದು ಸ್ಪಷ್ಟವಾಗಿ ಕೇಳಿ.
        ಲಭ್ಯತೆ-ಚಾಲಿತ ಅಂದಾಜುಗಳನ್ನು ಸರಿಪಡಿಸಲು ಡೇಟಾವನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        ಕೆಲವೊಮ್ಮೆ ಲಭ್ಯತೆಯು ಮಾಹಿತಿಪೂರ್ಣವಾಗಿರುತ್ತದೆ - ಇತ್ತೀಚಿನ ಅನುಭವವು ಬದಲಾವಣೆಯನ್ನು
        ಸೂಚಿಸಬಹುದು. ಲಭ್ಯತೆ-ಚಾಲಿತ ಎಲ್ಲಾ ನಿರ್ಣಯಗಳು ತಪ್ಪು ಎಂದು ಊಹಿಸಬೇಡಿ.
      analysis_paralysis: |
        ಸ್ಪಷ್ಟ ಅನುಭವದಿಂದ ಸರಿಯಾದ ಎಚ್ಚರಿಕೆ ಸಂಕೇತಗಳನ್ನು ಕಡೆಗಣಿಸುವ ಹಂತಕ್ಕೆ ಅತಿಯಾಗಿ
        ಸರಿಪಡಿಸುವುದು.
      false_objectivity: |
        ಮೂಲ ದರಗಳು ಯಾವಾಗಲೂ ಸರಿಯಾಗಿರುತ್ತವೆ ಎಂದು ಊಹಿಸುವುದು, ಅವುಗಳು ಹಳೆಯದಾಗಿರಬಹುದು
        ಅಥವಾ ಅನ್ವಯವಾಗದಿರಬಹುದು.
      manipulation: |
        ಇತರರ ನಿರ್ಣಯಗಳನ್ನು ನಿರ್ದೇಶಿಸಲು ಕೆಲವು ಉದಾಹರಣೆಗಳನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಸ್ಪಷ್ಟವಾಗಿ
        ಮಾಡುವುದು.
