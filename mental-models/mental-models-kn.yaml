      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Ostrich Effect
    quick_introduction: |
      Ostrich effect ಎಂದರೆ ಋಣಾತ್ಮಕ ಹಣಕಾಸಿನ ಮಾಹಿತಿಯನ್ನು ತಪ್ಪಿಸುವ ಪ್ರವೃತ್ತಿ - ಆಸ್ಟ್ರಿಚ್ ನಂತೆ
      "ತಲೆ ಮರಳುಗೊಬ್ಬರದಲ್ಲಿ ಮುಳುಗಿಸುವುದು". ಜನರು ಮಾರುಕಟ್ಟೆ ಕುಸಿಯುತ್ತಿರುವಾಗ ತಮ್ಮ ಪೋರ್ಟ್ಫೋಲಿಯೊಗಳನ್ನು
      ನೋಡುವುದನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ, ಬಿಲ್ಗಳನ್ನು ತೆರೆಯುವುದನ್ನು ವಿಳಂಬಿಸುತ್ತಾರೆ ಮತ್ತು ಕಾರ್ಯನಿರ್ವಹಿಸಲು ಸಹಾಯ
      ಮಾಡುವ ಎಚ್ಚರಿಕೆ ಚಿಹ್ನೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತಾರೆ.
    one_liner: ಕೆಟ್ಟ ಸುದ್ದಿಯನ್ನು ತಪ್ಪಿಸುವುದರಿಂದ ವಾಸ್ತವ ಬದಲಾಗುವುದಿಲ್ಲ—ಇದು ನಿಮ್ಮ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಮಾತ್ರ ವಿಳಂಬಗೊಳಿಸುತ್ತದೆ.
    try_this:
      - ನಿಯಮಿತ ಪರಿಶೀಲನೆಗಳನ್ನು ನಿಗದಿಪಡಿಸಿ ಇದರಿಂದ ನೀವು ಸಂಖ್ಯೆಗಳನ್ನು ತಪ್ಪಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ.
      - ಯಾವುದನ್ನಾದರೂ ತೆರೆಯುವುದನ್ನು ಅಥವಾ ನೋಡುವುದನ್ನು ನೀವು ವಿಳಂಬಗೊಳಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
      - ಕೇಳಿ: ನಾನು ಯಾವುದನ್ನು ತಪ್ಪಿಸುತ್ತಿದ್ದೇನೆ, ಮತ್ತು ನಾನು ಅದನ್ನು ಎದುರಿಸಿದರೆ ಏನಾಗುತ್ತದೆ?
    ask_yourself:
      - ಮಾಹಿತಿ ಕೆಟ್ಟದಾಗಿರಬಹುದು ಎಂಬ ಕಾರಣಕ್ಕೆ ನಾನು ಅದನ್ನು ತಪ್ಪಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಮುಂಚಿನ ಅರಿವು ನನಗೆ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆಯೇ?
    in_more_detail: |
      ಈ ಪದವನ್ನು ವರ್ತನೆಯ ಹಣಕಾಸಿನಲ್ಲಿ ಮಾರುಕಟ್ಟೆ ಕುಸಿತದ ಸಮಯದಲ್ಲಿ ತಮ್ಮ ಹೂಡಿಕೆಗಳನ್ನು ಪರಿಶೀಲಿಸುವುದನ್ನು
      ತಪ್ಪಿಸುವ ಹೂಡಿಕೆದಾರರನ್ನು ವಿವರಿಸಲು ಬಳಸಲಾಗುತ್ತದೆ. ಈ ವರ್ತನೆ ಹಣಕಾಸಿಗಿಂತ ಆಚೆಗೆ ವಿಸ್ತರಿಸುತ್ತದೆ:
      ವೈದ್ಯಕೀಯ ತಪಾಸಣೆಗಳನ್ನು ತಪ್ಪಿಸುವುದು, ಸಂಬಂಧದ ಸಮಸ್ಯೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು ಮತ್ತು ಕಷ್ಟಕರವಾದ ಸಂಭಾಷಣೆಗಳನ್ನು
      ವಿಳಂಬಗೊಳಿಸುವುದು. ನಾವು ಕೆಟ್ಟ ಸುದ್ದಿಯ ಆತಂಕವನ್ನು ತಪ್ಪಿಸಲು ಪ್ರಯತ್ನಿಸುತ್ತೇವೆ, ಆದರೆ ತಪ್ಪಿಸುವಿಕೆಯು
      ಸಕಾಲಿಕ ಕ್ರಿಯೆಯನ್ನು ತಡೆಯುವ ಮೂಲಕ ಫಲಿತಾಂಶಗಳನ್ನು ಸಾಮಾನ್ಯವಾಗಿ ಹದಗೆಡಿಸುತ್ತದೆ.

      ಈ ಪರಿಣಾಮವು ನಷ್ಟದ ವಿಮುಖತೆ (loss aversion) ಮತ್ತು ಭಾವನಾತ್ಮಕ ಅಸ್ವಸ್ಥತೆಯನ್ನು ತಪ್ಪಿಸುವ
      ಇಚ್ಛೆಯಿಂದ ಉಂಟಾಗುತ್ತದೆ. ದುರದೃಷ್ಟವಶಾತ್, ಅಜ್ಞಾನವು ವಾಸ್ತವವನ್ನು ಬದಲಾಯಿಸುವುದಿಲ್ಲ—ಇದು
      ನಮ್ಮ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಮಾತ್ರ ವಿಳಂಬಗೊಳಿಸುತ್ತದೆ.
    why_this_is_important: |
      Ostrich effect ಅನ್ನು ಗುರುತಿಸುವುದು ಕಷ್ಟಕರವಾದ ಮಾಹಿತಿಯನ್ನು ಸಕ್ರಿಯವಾಗಿ ಎದುರಿಸಲು ನಿಮಗೆ
      ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಯನ್ನು ತಪ್ಪಿಸುವುದರಿಂದ ಫಲಿತಾಂಶಗಳು ವಿರಳವಾಗಿ ಸುಧಾರಿಸುತ್ತವೆ;
      ಇದು ಸಾಮಾನ್ಯವಾಗಿ ಅವುಗಳನ್ನು ಉಲ್ಬಣಗೊಳಿಸುತ್ತದೆ. ಸಕಾಲಿಕ ಅರಿವು ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ಶಕ್ತಗೊಳಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ-ಮಾಡುವಿಕೆ
      - ಹೂಡಿಕೆ
      - ಅಪಾಯ-ಮೌಲ್ಯಮಾಪನ
      - ವೃತ್ತಿ-ಚಲನೆಗಳು
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        ಮಾರುಕಟ್ಟೆಗಳು ಕುಸಿಯುತ್ತಿರುವಾಗ ಹೂಡಿಕೆ ಹೇಳಿಕೆಗಳನ್ನು ನೋಡದಿರುವುದು.
      delaying_difficult_information: |
        ಬಿಲ್ಗಳು, ವೈದ್ಯಕೀಯ ಫಲಿತಾಂಶಗಳು ಅಥವಾ ಕಾರ್ಯಕ್ಷಮತೆಯ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ತೆರೆಯುವುದನ್ನು ವಿಳಂಬಗೊಳಿಸುವುದು.
      information_avoidance: |
        ಕೆಟ್ಟ ಸುದ್ದಿಯನ್ನು ಹೊಂದಿರಬಹುದಾದ ಮೂಲಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ತಪ್ಪಿಸುವುದು.
      procrastination_on_unpleasant_tasks: |
        ಸಮಸ್ಯೆಗಳನ್ನು ಬಹಿರಂಗಪಡಿಸುವ ಅಥವಾ ಪರಿಹರಿಸುವ ಕ್ರಿಯೆಗಳನ್ನು ವಿಳಂಬಗೊಳಿಸುವುದು.
    examples:
      investing: |
        ಒಬ್ಬ ಹೂಡಿಕೆದಾರರು ಕರಡಿ ಮಾರುಕಟ್ಟೆಯ ಸಮಯದಲ್ಲಿ ತಮ್ಮ 401(k) ಅನ್ನು ಪರಿಶೀಲಿಸುವುದನ್ನು ನಿಲ್ಲಿಸುತ್ತಾರೆ,
        ಮರು-ಸಮತೋಲನ ಅವಕಾಶಗಳನ್ನು ಕಳೆದುಕೊಳ್ಳುತ್ತಾರೆ.
      health: |
        ಕೆಟ್ಟ ಸುದ್ದಿಯ ಭಯದಿಂದ ರೋಗಲಕ್ಷಣಗಳ ಹೊರತಾಗಿಯೂ ವೈದ್ಯರ ಭೇಟಿಯನ್ನು ತಪ್ಪಿಸುವುದು.
      finances: |
        ಸಾಲವನ್ನು ಎದುರಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಕ್ರೆಡಿಟ್ ಕಾರ್ಡ್ ಹೇಳಿಕೆಗಳನ್ನು ಅಥವಾ ಬ್ಯಾಂಕ್ ಎಚ್ಚರಿಕೆಗಳನ್ನು ತೆರೆಯದಿರುವುದು.
      performance: |
        ಒಬ್ಬ ವ್ಯವಸ್ಥಾಪಕರು ವಾರ್ಷಿಕ ವಿಮರ್ಶೆಯವರೆಗೆ ವಿಮರ್ಶಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ನೀಡಲು ತಪ್ಪಿಸುತ್ತಾರೆ,
        ಆದರೆ ಮುಂಚಿನ ಹಸ್ತಕ್ಷೇಪವು ಸಹಾಯ ಮಾಡುತ್ತಿತ್ತು.
    real_world_implications: |
      Ostrich effect ಕೆಟ್ಟ ಹಣಕಾಸಿನ ಫಲಿತಾಂಶಗಳು, ವಿಳಂಬಿತ ವೈದ್ಯಕೀಯ ಚಿಕಿತ್ಸೆ ಮತ್ತು ಸಂಬಂಧಗಳು
      ಮತ್ತು ಕೆಲಸದಲ್ಲಿ ಪರಿಹರಿಸದ ಸಮಸ್ಯೆಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ತಪ್ಪಿಸಬಹುದಾದ ನಷ್ಟಗಳನ್ನು ಉಲ್ಬಣಗೊಳಿಸುತ್ತದೆ.
      ಮಾಹಿತಿಯನ್ನು ನಿರ್ಲಕ್ಷಿಸಲು ಕಷ್ಟವಾಗುವ ವ್ಯವಸ್ಥೆಗಳು ಸಹಾಯ ಮಾಡಬಹುದು.
    professional_application:
      networking_and_relationship_building: |
        ಕಷ್ಟಕರವಾದ ಸಂಭಾಷಣೆಗಳನ್ನು ತಪ್ಪಿಸಬೇಡಿ. ಸಮಸ್ಯೆಗಳು ತಾವಾಗಿಯೇ ಬಗೆಹರಿಯುತ್ತವೆ ಎಂಬ ಭರವಸೆಯಲ್ಲಿ
        ಇರಿಸುವುದಕ್ಕಿಂತ ಮುಂಚಿತವಾಗಿ ಸಮಸ್ಯೆಗಳನ್ನು ಪರಿಹರಿಸಿ. ಉಲ್ಬಣಗೊಳ್ಳುವ ಮೊದಲು ಸಮಸ್ಯೆಗಳನ್ನು
        ಬಹಿರಂಗಪಡಿಸುವ ನಿಯಮಿತ ಪರಿಶೀಲನೆಗಳನ್ನು ರಚಿಸಿ.
      collaborative_learning_initiative: |
        ಸಮಸ್ಯೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದನ್ನು ಕಷ್ಟವಾಗಿಸುವ ಪ್ರತಿಕ್ರಿಯೆ ಲೂಪ್‌ಗಳನ್ನು ನಿರ್ಮಿಸಿ—ಡ್ಯಾಶ್‌ಬೋರ್ಡ್‌ಗಳು,
        ನಿಯಮಿತ ವಿಮರ್ಶೆಗಳು ಮತ್ತು ಕೆಟ್ಟ ಸುದ್ದಿಯ ಮುಂಚಿನ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯನ್ನು ಉತ್ತೇಜಿಸುವ ರೂಢಿಗಳು.
    how_can_this_be_misapplied:
      information_overload: |
        ಕೆಲವು ಮಾಹಿತಿ ತಪ್ಪಿಸುವಿಕೆಯು ಆರೋಗ್ಯಕರವಾಗಿದ್ದಾಗ ನಿರಂತರ ಮೇಲ್ವಿಚಾರಣೆಯನ್ನು ಒತ್ತಾಯಿಸುವುದು
        (ಉದಾ., ಪ್ರತಿ ನಿಮಿಷವೂ ಷೇರುಗಳನ್ನು ಪರಿಶೀಲಿಸದಿರುವುದು).
      anxiety_amplification: |
        ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸದೆ ಸಂಭಾವ್ಯ ಸಮಸ್ಯೆಗಳ ಮೇಲೆ ಅತಿಯಾದ ಗಮನವನ್ನು ಕೇಂದ್ರೀಕರಿಸಿ ಆತಂಕವನ್ನು ಹೆಚ್ಚಿಸುವುದು.
      blame_shifting: |
        ಕೆಲವು ತಪ್ಪಿಸುವಿಕೆಯು ತರ್ಕಬದ್ಧವಾಗಿರುವಾಗ ("ostrich effect") ಎಲ್ಲಾ ತಪ್ಪಿಸುವಿಕೆಗೆ ಕಾರಣವನ್ನು ಹೇಳುವುದು
        (ಉದಾ., ಶಬ್ದವನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು).
      micromanagement: |
        ಇತರರ ಅತಿಯಾದ ಕಣ್ಗಾವಲನ್ನು ಸಮರ್ಥಿಸಲು ಈ ಪರಿಕಲ್ಪನೆಯನ್ನು ಬಳಸುವುದು.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: ಪರೆಟೊ ತತ್ವ
    quick_introduction: |
      ಪರೆಟೊ ತತ್ವ (ಅಥವಾ 80/20 ನಿಯಮ) ಹೇಳುವ ಪ್ರಕಾರ, ಸುಮಾರು 80% ಪರಿಣಾಮಗಳು 20% ಕಾರಣಗಳಿಂದ ಉಂಟಾಗುತ್ತವೆ. ಕಡಿಮೆ ಪ್ರಮಾಣದ ಒಳಹರಿವುಗಳು ಹೆಚ್ಚಾಗಿ ಹೆಚ್ಚಿನ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತವೆ—ಮಾರಾಟ, ದೋಷಗಳು, ಗ್ರಾಹಕರು, ಶ್ರಮ, ವೈಶಿಷ್ಟ್ಯಗಳು ಮತ್ತು ಇತರ ಹಲವು ವಿಷಯಗಳಲ್ಲಿ. ಮುಖ್ಯವಾದ ಕೆಲವೇ ವಿಷಯಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.
    one_liner: 80% ಪರಿಣಾಮಗಳು 20% ಕಾರಣಗಳಿಂದ ಬರುತ್ತವೆ—ಮುಖ್ಯವಾದ ಕೆಲವೇ ವಿಷಯಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.
    try_this:
      - 80% ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವ 20% ಒಳಹರಿವುಗಳನ್ನು ಗುರುತಿಸಿ—ಅಲ್ಲಿ ನಿಮ್ಮ ಗಮನವನ್ನು ಹೆಚ್ಚಿಸಿ.
      - ಕಡಿಮೆ ಫಲಿತಾಂಶ ನೀಡುವ 80% ಅನ್ನು ಕಡಿತಗೊಳಿಸಿ ಅಥವಾ ಆದ್ಯತೆ ಕಡಿಮೆ ಮಾಡಿ.
      - ಕೇಳಿ: ಯಾವ ಕೆಲವು ವಿಷಯಗಳನ್ನು ನಾನು ಉತ್ತಮವಾಗಿ ಮಾಡಿದರೆ, ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿರುತ್ತದೆ?
    ask_yourself:
      - ಕೆಲವು ವಿಷಯಗಳು ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿರುವಾಗ ನಾನು ನನ್ನ ಶ್ರಮವನ್ನು ಸಮಾನವಾಗಿ ಹಂಚುತ್ತಿದ್ದೇನೆಯೇ?
      - ನನ್ನ ಹೆಚ್ಚಿನ-ಪ್ರಭಾವದ 20% ಯಾವುದು?
    in_more_detail: |
      ವಿಲ್ಲಫ್ರೆಡೋ ಪರೆಟೊ ಇಟಲಿಯ 80% ಭೂಮಿ 20% ಜನರಿಂದ ಒಡೆತನದಲ್ಲಿದೆ ಎಂದು ಗಮನಿಸಿದರು. ಈ ತತ್ವವನ್ನು ಸಾಮಾನ್ಯವಾಗಿ ವಿಸ್ತರಿಸಲಾಗಿದೆ: 80% ಮಾರಾಟ 20% ಗ್ರಾಹಕರಿಂದ, 80% ದೋಷಗಳು 20% ಕೋಡ್‌ನಿಂದ, 80% ಫಲಿತಾಂಶಗಳು 20% ಶ್ರಮದಿಂದ. ನಿಖರವಾದ ಅನುಪಾತ ಬದಲಾಗಬಹುದು, ಆದರೆ ವಿತರಣೆಯ ಮಾದರಿ—ಅಸಮಾನ ವಿತರಣೆ—ಸಾಮಾನ್ಯವಾಗಿದೆ.

      ಈ ತತ್ವವು ಹೆಚ್ಚಿನ-ಪ್ರಭಾವದ 20% ಅನ್ನು ಗುರುತಿಸಿ ಮತ್ತು ಕೇಂದ್ರೀಕರಿಸುವುದರಿಂದ ಫಲಿತಾಂಶಗಳನ್ನು ಗಮನಾರ್ಹವಾಗಿ ಸುಧಾರಿಸಬಹುದು ಎಂದು ಸೂಚಿಸುತ್ತದೆ. ಇದು ಆದ್ಯತಾ ನಿರ್ಣಯದ ಸಾಧನ, ಭೌತಿಕ ನಿಯಮವಲ್ಲ.
    why_this_is_important: |
      ಪರೆಟೊ ತತ್ವವನ್ನು ಅನ್ವಯಿಸುವುದರಿಂದ ನೀವು ನಿರ್ದಾಕ್ಷಿಣ್ಯವಾಗಿ ಆದ್ಯತೆ ನೀಡಲು, ಕಡಿಮೆ-ಪರಿಣಾಮದ ಚಟುವಟಿಕೆಗಳಲ್ಲಿ ಶ್ರಮ ವ್ಯರ್ಥ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ಕಡಿಮೆ ಸಂಪನ್ಮೂಲಗಳೊಂದಿಗೆ ಹೆಚ್ಚು ಸಾಧಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಉತ್ಪಾದಕತೆ ಮತ್ತು ಕಾರ್ಯತಂತ್ರಕ್ಕೆ ಮೂಲಭೂತವಾಗಿದೆ.
    when_to_use:
