  - id: parkinsons_law
    name: ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮ
    quick_introduction: |
      ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವು "ಕೆಲಸವು ಅದರ ಪೂರ್ಣಗೊಳ್ಳುವಿಕೆಗೆ ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತದೆ" ಎಂದು ಹೇಳುತ್ತದೆ. ಒಂದು ಕಾರ್ಯಕ್ಕೆ ಒಂದು ವಾರ ನೀಡಿದರೆ, ಅದು ಒಂದು ವಾರ ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ; ಒಂದು ದಿನ ನೀಡಿದರೆ, ಅದು ಆಗಾಗ್ಗೆ ಒಂದು ದಿನದಲ್ಲಿ ಪೂರ್ಣಗೊಳ್ಳುತ್ತದೆ. ಇದೇ ಬಜೆಟ್, ತಂಡದ ಗಾತ್ರ ಮತ್ತು ಸಂಪನ್ಮೂಲಗಳಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ.
    one_liner: ಕೆಲಸವು ಪೂರ್ಣಗೊಳ್ಳುವಿಕೆಗೆ ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತದೆ.
    try_this:
      - ಕೇಂದ್ರೀಕರಿಸಲು ಮತ್ತು ವ್ಯಾಪ್ತಿಯ ವಿಸ್ತರಣೆಯನ್ನು ತಡೆಯಲು ಕಠಿಣ ಗಡುವನ್ನು ನಿಗದಿಪಡಿಸಿ.
      - ಕೇಳಿ: ಇದಕ್ಕೆ ಕನಿಷ್ಠ ಎಷ್ಟು ಸಮಯ ಬೇಕಾಗಬಹುದು?
      - ಅನುಪಾತದ ಮೌಲ್ಯವಿಲ್ಲದೆ ಹೆಚ್ಚುವರಿ ಸಮಯ ಅಥವಾ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಬಳಸಲಾಗುತ್ತಿದೆ ಎಂದು ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಸಮಯವನ್ನು ತುಂಬುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ಕೆಲಸವು ನಿಜವಾಗಿಯೂ ಅದನ್ನು ಒತ್ತಾಯಿಸುತ್ತಿದೆಯೇ?
      - ಕಠಿಣ ಗಡುವು ಉತ್ತಮ ಆದ್ಯತೆಯನ್ನು ಒತ್ತಾಯಿಸುತ್ತದೆಯೇ?
    in_more_detail: |
      ಸಿ. ನಾರ್ತ್‌ಕೋಟ್ ಪಾರ್ಕಿನ್ಸನ್ ಗಮನಿಸಿದರು, ಮಾಡಬೇಕಾದ ಕೆಲಸದ ಪ್ರಮಾಣವನ್ನು ಲೆಕ್ಕಿಸದೆ ಆಡಳಿತಗಳು ಬೆಳೆಯುತ್ತವೆ. ಕಾರ್ಯಗಳು ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತವೆ ಎಂದು ಅವರು ಗಮನಿಸಿದರು - ನಾವು ಗಡುವಿಗೆ ನಮ್ಮ ಪ್ರಯತ್ನ ಮತ್ತು ವೇಗವನ್ನು ಸರಿಹೊಂದಿಸುತ್ತೇವೆ. ಕಠಿಣ ಗಡುವುಗಳು ಗಮನವನ್ನು ಒತ್ತಾಯಿಸಬಹುದು; ಸಡಿಲವಾದವುಗಳು ಮುಂದೂಡಿಕೆ ಮತ್ತು ವ್ಯಾಪ್ತಿಯ ವಿಸ್ತರಣೆಯನ್ನು ಆಹ್ವಾನಿಸುತ್ತವೆ.

      ಈ ನಿಯಮವು ಯೋಜನೆ ನಿರ್ವಹಣೆ, ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆ ಮತ್ತು ಸಾಂಸ್ಥಿಕ ವಿನ್ಯಾಸಕ್ಕೆ ಪರಿಣಾಮಗಳನ್ನು ಹೊಂದಿದೆ. ಆದ್ಯತೆಯನ್ನು ಒತ್ತಾಯಿಸುವ ಮೂಲಕ ನಿರ್ಬಂಧಗಳು ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂದು ಇದು ಸೂಚಿಸುತ್ತದೆ.
    why_this_is_important: |
      ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ಗಡುವುಗಳನ್ನು ಹೊಂದಿಸಲು, ಯೋಜನೆಗಳಿಗೆ ಅತಿಯಾದ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಹೊಂದಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು "ಹೆಚ್ಚಿನ ಸಮಯ" ಅಥವಾ "ಹೆಚ್ಚು ಜನರು" ಸಹಾಯ ಮಾಡುವುದಿಲ್ಲ - ಮತ್ತು ಹಾನಿ ಮಾಡಬಹುದು - ಎಂದು ಗುರುತಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನಿರ್ಬಂಧಗಳು ಉತ್ಪಾದಕವಾಗಬಹುದು.
