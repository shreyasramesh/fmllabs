  - id: illusion_of_control
    name: ನಿಯಂತ್ರಣದ ಭ್ರಮೆ
    quick_introduction: |
      ನಿಯಂತ್ರಣದ ಭ್ರಮೆ ಎಂದರೆ ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿಸುವ ನಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಯಾದೃಚ್ಛಿಕ ಘಟನೆಗಳು, ಇತರ ಜನರು ಮತ್ತು ಸಂಕೀರ್ಣ ವ್ಯವಸ್ಥೆಗಳ ಮೇಲೆ, ನಮಗೆ ಇರುವ ನಿಯಂತ್ರಣಕ್ಕಿಂತ ಹೆಚ್ಚು ನಿಯಂತ್ರಣ ಇದೆ ಎಂದು ನಂಬುತ್ತೇವೆ. ನಾವು ಸಹಸಂಬಂಧವನ್ನು ಕಾರಣವೆಂದು ಮತ್ತು ಕ್ರಿಯೆಯನ್ನು ಪರಿಣಾಮವೆಂದು ಗೊಂದಲಗೊಳಿಸುತ್ತೇವೆ.
    one_liner: ನಾವು ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿಸುವ ನಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ—ವಿಶೇಷವಾಗಿ ಯಾದೃಚ್ಛಿಕವಾದವುಗಳನ್ನು.
    try_this:
      - ಕೇಳಿ: ನಾನು ಏನನ್ನೂ ಮಾಡದಿದ್ದರೆ ಏನಾಗುತ್ತಿತ್ತು? ನನ್ನ ಕ್ರಿಯೆಯು ನಿಜವಾಗಿಯೂ ಫಲಿತಾಂಶಕ್ಕೆ ಕಾರಣವಾಗುತ್ತಿದೆಯೇ?
      - ನೀವು ಏನು ನಿಯಂತ್ರಿಸಬಹುದು ಮತ್ತು ಏನನ್ನು ನಿಯಂತ್ರಿಸಲಾಗುವುದಿಲ್ಲ ಎಂಬುದನ್ನು ಪ್ರತ್ಯೇಕಿಸಿ.
      - ನಿಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಯಾದೃಚ್ಛಿಕ ಫಲಿತಾಂಶಗಳೊಂದಿಗೆ ಮೂಢನಂಬಿಕೆಯಂತೆ ಲಿಂಕ್ ಮಾಡುತ್ತಿರುವುದನ್ನು ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಸಹಸಂಬಂಧವನ್ನು ಕಾರಣವೆಂದು ಗೊಂದಲಗೊಳಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಕ್ರಮ ತೆಗೆದುಕೊಳ್ಳದಿದ್ದರೆ ಫಲಿತಾಂಶ ಭಿನ್ನವಾಗಿರುತ್ತಿತ್ತು?
    in_more_detail: |
      ಲಾಟರಿಯಲ್ಲಿ ಸ್ವಂತ ಸಂಖ್ಯೆಗಳನ್ನು ಆರಿಸಿದಾಗ ಜನರು ಗೆಲ್ಲುವ ಬಗ್ಗೆ ಹೆಚ್ಚು ವಿಶ್ವಾಸ ಹೊಂದುತ್ತಾರೆ—ಅದು ಸಂಭವನೀಯತೆಗಳನ್ನು ಬದಲಾಯಿಸದಿದ್ದರೂ ಸಹ. ನಾವು ಹೆಚ್ಚಿನ ಸಂಖ್ಯೆಗಳನ್ನು ಬಯಸಿದಾಗ ಡೈಸ್‌ಗಳನ್ನು ಗಟ್ಟಿಯಾಗಿ ಉರುಳಿಸುತ್ತೇವೆ. ನಮ್ಮ ಆಚರಣೆಗಳು ಅಥವಾ ನಡವಳಿಕೆಗಳು ವಾಸ್ತವವಾಗಿ ಯಾದೃಚ್ಛಿಕವಾಗಿರುವ ಅಥವಾ ನಮ್ಮ ಹೊರಗಿನ ಅಂಶಗಳಿಂದ ನಿರ್ಧರಿಸಲ್ಪಡುವ ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ಈ ಭ್ರಮೆಯು ಆರಾಮದಾಯಕವಾಗಿದೆ; ಇದು ಆತಂಕವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ. ಆದರೆ ಇದು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ ಮತ್ತು ಕಳಪೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು.

      ನಾವು ಪ್ರಕ್ರಿಯೆಯಲ್ಲಿ ತೊಡಗಿಸಿಕೊಂಡಿರುವಾಗ, ನಾವು ಆರಂಭಿಕ ಯಶಸ್ಸನ್ನು ಪಡೆದಾಗ ಮತ್ತು ಕಾರ್ಯವು ಪರಿಚಿತವಾಗಿರುವಾಗ ಈ ಭ್ರಮೆಯು ಬಲವಾಗಿರುತ್ತದೆ. ಇದು ಹೂಡಿಕೆ, ನಿರ್ವಹಣೆ ಮತ್ತು ದೈನಂದಿನ ಜೀವನದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
    why_this_is_important: |
      ನಿಯಂತ್ರಣದ ಭ್ರಮೆಯನ್ನು ಗುರುತಿಸುವುದು ನಿಮ್ಮ ನಿರೀಕ್ಷೆಗಳನ್ನು ಸರಿಹೊಂದಿಸಲು, ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ನಿಜವಾಗಿಯೂ ಮುಖ್ಯವಾದ ಕಡೆ ಪ್ರಯತ್ನವನ್ನು ಕೇಂದ್ರೀಕರಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಾವು ಮೂಢನಂಬಿಕೆಯ ನಡವಳಿಕೆಗಳಲ್ಲಿ ಏಕೆ ಮುಂದುವರಿಯುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮ ಪ್ರಭಾವವನ್ನು ಏಕೆ ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವುದು
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಹೂಡಿಕೆ
      - ನಾಯಕತ್ವ
    how_can_you_spot_it:
      overestimated_influence: |
        ನಮ್ಮ ಕ್ರಿಯೆಗಳು ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ ಎಂದು ನಂಬುವುದು, ಆದರೆ ವಾಸ್ತವದಲ್ಲಿ ಅವು ಬೀರುವುದಿಲ್ಲ.
      ritual_superstition: |
        ನಮ್ಮ ನಡವಳಿಕೆಗಳು ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತವೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ (ಅದೃಷ್ಟದ ಶರ್ಟ್, ಪಂದ್ಯದ ಮೊದಲು ಅಭ್ಯಾಸ) ಆದರೆ ವಾಸ್ತವದಲ್ಲಿ ಅವು ಬೀರುವುದಿಲ್ಲ.
      choice_illusion: |
        ಆಯ್ಕೆ ಮಾಡುವುದರಿಂದ ನಮಗೆ ನಿಯಂತ್ರಣ ಸಿಗುತ್ತದೆ ಎಂದು ಅನಿಸುವುದು, ಆದರೆ ಆಯ್ಕೆಯು ಫಲಿತಾಂಶದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುವುದಿಲ್ಲ.
      action_bias: |
        "ಕಾದು ನೋಡುವ" ಬದಲಿಗೆ "ಏನಾದರೂ ಮಾಡುವ" ಆದ್ಯತೆ, ಕ್ರಿಯೆಯು ಸಹಾಯ ಮಾಡದಿದ್ದರೂ ಸಹ.
    examples:
      gambling: |
        ಯಾದೃಚ್ಛಿಕ ಆಯ್ಕೆಗಿಂತ ಲಾಭಾಂಶ ಸಂಖ್ಯೆಗಳನ್ನು ಆರಿಸುವುದು ಹೆಚ್ಚು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿದೆ ಎಂದು ಅನಿಸುತ್ತದೆ—ಸಂಭವನೀಯತೆಗಳು ಒಂದೇ.
      investing: |
        ಸಕ್ರಿಯ ವ್ಯಾಪಾರಿಗಳು ಮಾರುಕಟ್ಟೆಯನ್ನು ಸೋಲಿಸುವ ತಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತಾರೆ; ಹೆಚ್ಚಿನವರು ವೆಚ್ಚಗಳ ನಂತರ ಕಡಿಮೆ ಕಾರ್ಯಕ್ಷಮತೆ ತೋರುತ್ತಾರೆ.
      management: |
        ನಾಯಕರು ಸಂಸ್ಥೆಯ ಫಲಿತಾಂಶಗಳ ಮೇಲೆ ತಮ್ಮ ಪ್ರಭಾವವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತಾರೆ; ಅನೇಕ ಅಂಶಗಳು ಅವರ ನಿಯಂತ್ರಣಕ್ಕೆ ಮೀರಿದವು.
      sports: |
        ಅಭಿಮಾನಿಗಳು ತಮ್ಮ ಚಪ್ಪಾಳೆಯು ಆಟದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ ಎಂದು ನಂಬುತ್ತಾರೆ; ಆಟಗಾರರು ಅದೃಷ್ಟದ ಆಚರಣೆಗಳನ್ನು ಹೊಂದಿದ್ದಾರೆ.
    real_world_implications: |
      ನಿಯಂತ್ರಣದ ಭ್ರಮೆಯು ಅಪಾಯ ಎದುರಿಸುವುದು, ನಿರರ್ಥಕ ಪ್ರಯತ್ನಗಳಲ್ಲಿ ಮುಂದುವರಿಯುವುದು ಮತ್ತು ಫಲಿತಾಂಶಗಳನ್ನು ಕಾರಣವಾಗಿಸುವುದರ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಕ್ರಿಯೆಗೆ ಪ್ರೇರೇಪಿಸಬಹುದು (ಕೆಲವೊಮ್ಮೆ ಉಪಯುಕ್ತ) ಆದರೆ ವ್ಯರ್ಥ ಪ್ರಯತ್ನ ಮತ್ತು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸಕ್ಕೂ ಕಾರಣವಾಗಬಹುದು. ನಿಖರತೆಯು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ನೀವು ಏನು ನಿಯಂತ್ರಿಸಬಹುದು ಮತ್ತು ಏನನ್ನು ನಿಯಂತ್ರಿಸಲಾಗುವುದಿಲ್ಲ ಎಂಬುದನ್ನು ಗುರುತಿಸಿ. ಪ್ರಭಾವಕ್ಕೆ ಒಳಪಟ್ಟಿರುವ ಅಂಶಗಳ ಮೇಲೆ ಶಕ್ತಿಯನ್ನು ಕೇಂದ್ರೀಕರಿಸಿ. ನೀವು ಕಾರಣವಾಗದ ಫಲಿತಾಂಶಗಳಿಗೆ (ಅಥವಾ ನೀವು ತಡೆಯಲಾಗದ ಫಲಿತಾಂಶಗಳಿಗೆ) ದೂಷಿಸಬೇಡಿ.
      collaborative_learning_initiative: |
        ಯೋಜನೆಯಲ್ಲಿ, ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿರುವ ಮತ್ತು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಡದ ಅಂಶಗಳನ್ನು ಪ್ರತ್ಯೇಕಿಸಿ. ಆರಂಭಿಕ ಗೆಲುವುಗಳಿಂದ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಪ್ಪಿಸಿ. ನಿರೀಕ್ಷೆಗಳನ್ನು ನಿಖರಗೊಳಿಸಲು ಸಂಭವನೀಯ ಚಿಂತನೆಯನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      learned_helplessness: |
        ನಾವು ನಿಜವಾಗಿಯೂ ಗಮನಾರ್ಹವಾದ ಪ್ರಭಾವವನ್ನು ಹೊಂದಿರುವಾಗ, ನಮಗೆ ಯಾವುದೇ ನಿಯಂತ್ರಣವಿಲ್ಲ ಎಂದು ನಂಬಲು ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
      dismissing_agency: |
        "ಇದೆಲ್ಲ ಅದೃಷ್ಟ" ಎಂದು ಹೇಳುವುದು, ಆದರೆ ಅನೇಕ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಕೌಶಲ್ಯ ಮತ್ತು ಪ್ರಯತ್ನವು ಮುಖ್ಯವಾಗಿರುತ್ತದೆ.
      false_fatalism: |
        ಕ್ರಿಯೆಯಿಲ್ಲದಿರುವುದನ್ನು ಸಮರ್ಥಿಸಲು ನಿಯಂತ್ರಣದ ಭ್ರಮೆಯನ್ನು ಬಳಸುವುದು.
      one_size_fits_all: |
        ನಿಯಂತ್ರಣವು ಡೊಮೇನ್‌ನಿಂದ ಬದಲಾಗುತ್ತದೆ; ಕೆಲವು ಪರಿಸ್ಥಿತಿಗಳು ಇತರರಿಗಿಂತ ಹೆಚ್ಚು ನಿಯಂತ್ರಣಕ್ಕೆ ಒಳಪಟ್ಟಿರುತ್ತವೆ.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: ಪ್ರಭಾವ ಪಕ್ಷಪಾತ
    quick_introduction: |
      ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಭವಿಷ್ಯದ ಘಟನೆಗಳಿಗೆ ನಮ್ಮ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳ ತೀವ್ರತೆ ಮತ್ತು ಅವಧಿಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಒಳ್ಳೆಯ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ಸಂತೋಷಪಡಿಸುವುದಿಲ್ಲ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಮತ್ತು ಕೆಟ್ಟ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ದುಃಖಿತರನ್ನಾಗಿ ಮಾಡುವುದಿಲ್ಲ. ನಾವು ಭಾವನಾತ್ಮಕ ಮುನ್ಸೂಚನೆಯಲ್ಲಿ ಕೆಟ್ಟವರು.
    one_liner: ಘಟನೆಗಳು ನಮ್ಮ ಸಂತೋಷದ ಮೇಲೆ ಎಷ್ಟು ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಮತ್ತು ಎಷ್ಟು ಕಾಲ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.
    try_this:
      - Ask: ಹಿಂದಿನ ಇದೇ ರೀತಿಯ ಘಟನೆಗಳ ನಂತರ ನಾನು ಹೇಗೆ ಭಾವಿಸಿದ್ದೆ? ನಾವು ನಿರೀಕ್ಷಿಸಿದ್ದಕ್ಕಿಂತ ವೇಗವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತೇವೆ.
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
      - Notice when you're overestimating the lasting effect of a single outcome.
    ask_yourself:
      - Am I overestimating how long I'll feel this way?
      - What does past experience say about similar events?
    in_more_detail: |
      ಡೇನಿಯಲ್ ಗಿಲ್ಬರ್ಟ್ ಮತ್ತು ಟಿಮೋತಿ ವಿಲ್ಸನ್ ಅವರು ಭಾವನಾತ್ಮಕ ಮುನ್ಸೂಚನೆಯ ಸಂಶೋಧನೆ ನಡೆಸಿದ್ದಾರೆ: ಗೆಲುವಿನ ನಂತರ ನಾವು ಎಷ್ಟು ಕಾಲ ಉತ್ತಮವಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಅಥವಾ ನಷ್ಟದ ನಂತರ ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ನಿರೀಕ್ಷಿಸಿದ್ದಕ್ಕಿಂತ ವೇಗವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತೇವೆ. ನಾವು ಒಂದೇ ಘಟನೆಗಳ ಪ್ರಭಾವವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ - ಒಂದು ಫಲಿತಾಂಶ ನಮ್ಮ ಸಂತೋಷವನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಆದರೆ ಅನೇಕ ಅಂಶಗಳು ಕೊಡುಗೆ ನೀಡುತ್ತವೆ. ನಮ್ಮ ಭವಿಷ್ಯದ ಭಾವನೆಗಳನ್ನು ಊಹಿಸುವಾಗ ನಾವು ತಪ್ಪು ವಿಷಯಗಳ ಮೇಲೆ ಗಮನಹರಿಸುತ್ತೇವೆ.

      ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಪ್ರಮುಖ ಜೀವನ ನಿರ್ಧಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ: ಪದೋನ್ನತಿ, ಸಂಬಂಧ ಅಥವಾ ಖರೀದಿಯು ನಮ್ಮ ಸಂತೋಷವನ್ನು ಎಷ್ಟು ಬದಲಾಯಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ನಷ್ಟಗಳ ಶಾಶ್ವತ ನೋವನ್ನು ಸಹ ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.
    why_this_is_important: |
      ಪ್ರಭಾವ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ನಿಮ್ಮ ಜೀವನವನ್ನು ನಿಜವಾಗಿ ಸುಧಾರಿಸುವ ವಿಷಯಗಳ ಬಗ್ಗೆ ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನೀವು ಯೋಚಿಸುವಷ್ಟು ಮಹತ್ವದ್ದಲ್ಲದ ಫಲಿತಾಂಶಗಳಲ್ಲಿ ಅತಿಯಾದ ಹೂಡಿಕೆಯನ್ನು ಇದು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ, ಮತ್ತು ನೀವು ನಿರೀಕ್ಷಿಸುವಷ್ಟು ಕಾಲ ನೋಯಿಸದ ಫಲಿತಾಂಶಗಳ ಭಯವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ವೃತ್ತಿ_ಬದಲಾವಣೆಗಳು
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
    how_can_you_spot_it:
      overestimated_impact: |
        "This will change everything" when similar past events had modest
        lasting impact.
      duration_overestimation: |
        "I'll never get over this" when we typically adapt faster than
        we expect.
      focalism: |
        Focusing on one event and ignoring other factors that affect
        well-being.
      adaptation_neglect: |
        Forgetting that we adapt to both good and bad circumstances.
    examples:
      career: |
        "If I get this promotion, I'll be so much happier" when past
        promotions had temporary impact.
      purchases: |
        "This car will make me happy" when the novelty wears off quickly.
      loss: |
        "I'll never recover from this rejection" when we typically
        adapt within months.
      events: |
        Overestimating how much a wedding, vacation, or milestone will
        affect long-term happiness.
    real_world_implications: |
      ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಹಣ, ವೃತ್ತಿ ಮತ್ತು ಸಂಬಂಧಗಳ ಬಗ್ಗೆ ಕಳಪೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ನಾವು ನಾವು ಹೊಂದಿಕೊಳ್ಳುವ ಅನುಭವಗಳಿಗೆ ಅತಿಯಾಗಿ ಪಾವತಿಸುತ್ತೇವೆ ಮತ್ತು ನಾವು ಚೇತರಿಸಿಕೊಳ್ಳುವ ನಷ್ಟಗಳಿಗೆ ಅತಿಯಾಗಿ ಭಯಪಡುತ್ತೇವೆ. ಇದು ನೀತಿ ಮತ್ತು ವೈಯಕ್ತಿಕ ಯೋಜನೆಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        When making career or relationship decisions, consider how you
        felt after similar past events. Did the impact last as long
        as you expected? Use that to calibrate future predictions.
      collaborative_learning_initiative: |
        When teams face setbacks or wins, remind them of adaptation.
        "We'll adapt faster than we think" can reduce both excessive
        celebration and excessive despair.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Some events do have lasting impact—trauma, major loss. Don't
        dismiss all affective forecasting as biased.
      cold_rationality: |
        "It won't matter" when the experience in the moment does matter.
      undervaluing_experiences: |
        Avoiding positive experiences because "we'll adapt anyway."
      invalidating_emotions: |
        Telling people their feelings will pass when they need support
        in the moment.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತ
    quick_introduction: |
      ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತ ಎಂದರೆ ನಮ್ಮ ಗುಂಪಿಗೆ ಸೇರಿದ್ದಾರೆಂದು ನಾವು ಗ್ರಹಿಸುವ ಜನರಿಗೆ, ಹೊರಗಿನವರು ಎಂದು ನಾವು ಗ್ರಹಿಸುವವರಿಗಿಂತ ಹೆಚ್ಚು ಒಲವು ತೋರಿಸುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ಸಕಾರಾತ್ಮಕ ಗುಣಗಳನ್ನು ಮತ್ತು ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ನಕಾರಾತ್ಮಕ ಗುಣಗಳನ್ನು ಆರೋಪಿಸುತ್ತೇವೆ, ಇದು ಕನಿಷ್ಠ ಅಥವಾ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸಗಳ ಆಧಾರದ ಮೇಲೆ ಆಗಾಗ್ಗೆ ಸಂಭವಿಸುತ್ತದೆ.
    one_liner: ನಾವು ನಮ್ಮ ಆಂತರಿಕ ಗುಂಪಿಗೆ ಒಲವು ತೋರುತ್ತೇವೆ ಮತ್ತು ಹೊರಗಿನ ಗುಂಪುಗಳನ್ನು ಹೆಚ್ಚು ಕಠಿಣವಾಗಿ ನಿರ್ಣಯಿಸುತ್ತೇವೆ- ಆಗಾಗ್ಗೆ ಯಾದೃಚ್ಛಿಕವಾಗಿ.
    try_this:
      - ಕೇಳಿ: ಅವರು ನನ್ನ ಗುಂಪಿನಲ್ಲಿದ್ದರೆ ನಾನು ಈ ವ್ಯಕ್ತಿಯನ್ನು ಅದೇ ರೀತಿ ನಿರ್ಣಯಿಸುತ್ತೇನೆಯೇ?
      - ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಹೊರಗಿನ ಗುಂಪಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ.
      - ಗುಂಪಿನ ಗಡಿಗಳು ನಿಮ್ಮ ನಿರ್ಣಯವನ್ನು ಹೇಗೆ ರೂಪಿಸುತ್ತಿವೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
    ask_yourself:
      - ಅವರು "ನಮ್ಮವರಾದ್ದರಿಂದ" ನಾನು ಯಾರೊಬ್ಬರಿಗೆ ಒಲವು ತೋರುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯನಿಗೆ ಅದೇ ಮಾನದಂಡಗಳನ್ನು ಅನ್ವಯಿಸುತ್ತಿದ್ದೆನೆಯೇ?
    in_more_detail: |
      ಗುಂಪುಗಳನ್ನು ಯಾದೃಚ್ಛಿಕವಾಗಿ ನಿಯೋಜಿಸಿದರೂ (ಉದಾ., ನಾಣ್ಯದ ಎಸೆತದಿಂದ), ಜನರು ತ್ವರಿತವಾಗಿ ತಮ್ಮ ಆಂತರಿಕ ಗುಂಪಿಗೆ ಆದ್ಯತೆ ಬೆಳೆಸಿಕೊಳ್ಳುತ್ತಾರೆ. ನಾವು ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರನ್ನು ಹೆಚ್ಚು ನಂಬುತ್ತೇವೆ, ಅವರಿಗೆ ಹೆಚ್ಚು ಉದಾರವಾಗಿ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಹಂಚುತ್ತೇವೆ ಮತ್ತು ಅವರ ಕ್ರಿಯೆಗಳನ್ನು ಹೆಚ್ಚು ಉದಾರವಾಗಿ ನಿರ್ಣಯಿಸುತ್ತೇವೆ. ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯರು ಇದರ ವಿರುದ್ಧದ ಚಿಕಿತ್ಸೆಯನ್ನು ಪಡೆಯುತ್ತಾರೆ.

      ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತವು ಬುಡಕಟ್ಟು ಮನೋಭಾವ, ತಾರತಮ್ಯ ಮತ್ತು ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಇದು ನೇಮಕಾತಿ, ಪದೋನ್ನತಿ, ಸಹಯೋಗ ಮತ್ತು ನೀತಿಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಜನಾಂಗ, ರಾಷ್ಟ್ರೀಯತೆ, ಕಂಪನಿ, ತಂಡ ಅಥವಾ ಯಾವುದೇ ಹಂಚಿಕೆಯ ಗುರುತಿನ ಮೇಲೆ ಆಧಾರಿತವಾಗಿರಬಹುದು.
    why_this_is_important: |
      ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ನಿಮಗೆ ನ್ಯಾಯಯುತವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು, ಹೆಚ್ಚು ಒಳಗೊಳ್ಳುವ ತಂಡಗಳನ್ನು ನಿರ್ಮಿಸಲು ಮತ್ತು ಪಕ್ಷಪಾತವನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ವೈವಿಧ್ಯಮಯ ಉಪಕ್ರಮಗಳು ಏಕೆ ಪ್ರತಿರೋಧವನ್ನು ಎದುರಿಸುತ್ತವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ - ಆಂತರಿಕ ಗುಂಪಿನ ಆದ್ಯತೆಯು ಸ್ವಯಂಚಾಲಿತವಾಗಿದೆ.
    when_to_use:
      - ನಾಯಕತ್ವ
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
    how_can_you_spot_it:
      preferential_treatment: |
        "ನಮ್ಮವರಿಗೆ" ಸಂದೇಹದ ಲಾಭವನ್ನು ನೀಡುವುದು, ಆದರೆ "ಅವರಿಗೆ" ಅಲ್ಲ.
      resource_allocation: |
        ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯರು ಸಮಾನ ಅಥವಾ ಹೆಚ್ಚಿನ ಅಗತ್ಯವನ್ನು ಹೊಂದಿರುವಾಗ ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ಹೆಚ್ಚು ಹಂಚಿಕೆ ಮಾಡುವುದು.
      attribution_asymmetry: |
        ಆಂತರಿಕ ಗುಂಪಿನ ಯಶಸ್ಸು = ಕೌಶಲ್ಯ; ಹೊರಗಿನ ಗುಂಪಿನ ಯಶಸ್ಸು = ಅದೃಷ್ಟ. ಆಂತರಿಕ ಗುಂಪಿನ ವೈಫಲ್ಯ = ಪರಿಸ್ಥಿತಿ; ಹೊರಗಿನ ಗುಂಪಿನ ವೈಫಲ್ಯ = ಪಾತ್ರ.
      minimal_group_effects: |
        ಯಾದೃಚ್ಛಿಕ ಗುಂಪು ನಿಯೋಜನೆಗಳೊಂದಿಗೆ ಕೂಡ ಆದ್ಯತೆ ಉದ್ಭವಿಸುತ್ತದೆ.
    examples:
      hiring: |
        ನಿಮ್ಮ ಹಳೆಯ ಶಾಲೆಯಿಂದ ಬಂದ ಅಥವಾ ನಿಮ್ಮ ಹಿನ್ನೆಲೆಯನ್ನು ಹಂಚಿಕೊಳ್ಳುವ ಅಭ್ಯರ್ಥಿಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡುವುದು.
      performance_reviews: |
        ಸಮಾನ ಕಾರ್ಯಕ್ಷಮತೆಯ ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯರಿಗಿಂತ ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ಹೆಚ್ಚು ಅನುಕೂಲಕರವಾಗಿ ರೇಟಿಂಗ್ ನೀಡುವುದು.
      collaboration: |
        "ನಮ್ಮ ತಂಡವನ್ನು" ನಂಬುವುದು ಮತ್ತು ಸೇರಿಸುವುದು, ಆದರೆ "ಅವರ ತಂಡವನ್ನು" ಹೊರಗಿಡುವುದು ಅಥವಾ ಅನುಮಾನಿಸುವುದು.
      politics: |
        ಆಂತರಿಕ ಗುಂಪಿನ ವಾದಗಳನ್ನು ವಿಮರ್ಶಾತ್ಮಕವಾಗಿ ಸ್ವೀಕರಿಸುವಾಗ ಹೊರಗಿನ ಗುಂಪಿನ ವಾದಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
    real_world_implications: |
      ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತವು ಅಸಮಾನತೆಯನ್ನು ಮುಂದುವರಿಸುತ್ತದೆ, ಯೋಗ್ಯತೆ-ಆಧಾರಿತ ವ್ಯವಸ್ಥೆಯನ್ನು ದುರ್ಬಲಗೊಳಿಸುತ್ತದೆ ಮತ್ತು ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಇದು ನೇಮಕಾತಿ, ಪದೋನ್ನತಿ, ಹೂಡಿಕೆ ಮತ್ತು ನೀತಿಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಅದನ್ನು ಕಡಿಮೆ ಮಾಡಲು ನಿರಂತರ ಪ್ರಯತ್ನ ಬೇಕು - ಅದು ತಾನಾಗಿಯೇ ಸರಿಹೋಗುವುದಿಲ್ಲ.
    professional_application:
      networking_and_relationship_building: |
        ನಿಮ್ಮ ತಕ್ಷಣದ ವಲಯದ ಹೊರಗಿನ ಜನರನ್ನು ಸಕ್ರಿಯವಾಗಿ ಸೇರಿಸಿ. ವೈವಿಧ್ಯಮಯ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹುಡುಕಿ. ನೀವು "ನಿಮ್ಮಂತೆ" ಇರುವ ಕಾರಣಕ್ಕೆ ಯಾರೊಬ್ಬರಿಗೆ ಒಲವು ತೋರುತ್ತಿದ್ದೀರಾ ಎಂದು ಪ್ರಶ್ನಿಸಿ.
      collaborative_learning_initiative: |
        ನೇಮಕಾತಿ ಮತ್ತು ಮೌಲ್ಯಮಾಪನದಲ್ಲಿ ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತವನ್ನು ಕಡಿಮೆ ಮಾಡಲು ರಚನಾತ್ಮಕ ಪ್ರಕ್ರಿಯೆಗಳನ್ನು (ಅಜ್ಞಾತ ವಿಮರ್ಶೆಗಳು, ವೈವಿಧ್ಯಮಯ ಫಲಕಗಳು) ಬಳಸಿ. ಹಂಚಿಕೆಯ ಗುರುತನ್ನು ನಿರ್ಮಿಸಲು ಅಡ್ಡ-ಗುಂಪು ಯೋಜನೆಗಳನ್ನು ರಚಿಸಿ.
    how_can_this_be_misapplied:
      forced_diversity: |
        ಆಧಾರವಾಗಿರುವ ಪಕ್ಷಪಾತವನ್ನು ಪರಿಹರಿಸದೆ ಅಸಮಾಧಾನವನ್ನು ಸೃಷ್ಟಿಸುವ ಕೋಟಾಗಳು ಅಥವಾ ನೀತಿಗಳನ್ನು ಜಾರಿಗೊಳಿಸುವುದು.
      out_group_hostility: |
        ಹೊರಗಿನ ಗುಂಪಿನ ವೈರತ್ವ ಕೂಡ ಇರುವಾಗ ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತವನ್ನು ಮಾತ್ರ ಸಮಸ್ಯೆಯಾಗಿ ಪರಿಗಣಿಸುವುದು.
      ignoring_legitimate_differences: |
        ಎಲ್ಲಾ ಗುಂಪು ವ್ಯತ್ಯಾಸಗಳು ಪಕ್ಷಪಾತವಲ್ಲ - ಕೆಲವೊಮ್ಮೆ ಗುಂಪುಗಳು ವಿಭಿನ್ನ ಗುಣಲಕ್ಷಣಗಳನ್ನು ಹೊಂದಿರುತ್ತವೆ. ಎಲ್ಲಾ ವ್ಯತ್ಯಾಸಗಳು ತಾರತಮ್ಯ ಎಂದು ಊಹಿಸಬೇಡಿ.
      reverse_discrimination: |
        ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ಅನ್ಯಾಯವಾಗುವ ರೀತಿಯಲ್ಲಿ ಹೊರಗಿನ ಗುಂಪುಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಲು ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: ವಿಲೋಮ (Inversion)
    quick_introduction: |
      ವಿಲೋಮವು (Inversion) ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸುವ ಒಂದು ತಂತ್ರವಾಗಿದ್ದು, ಇದು ಪ್ರಶ್ನೆಯನ್ನು ತಲೆಕೆಳಗಾಗಿ ತಿರುಗಿಸುತ್ತದೆ. "ನಾನು ಹೇಗೆ ಯಶಸ್ವಿಯಾಗಲಿ?" ಎಂದು ಕೇಳುವ ಬದಲು, ನೀವು "ನನ್ನನ್ನು ವಿಫಲಗೊಳಿಸುವುದು ಯಾವುದು?" ಎಂದು ಕೇಳಿ, ಆ ವಿಷಯಗಳನ್ನು ತಪ್ಪಿಸಿ. ಇದು ಮುಂದೆ ಯೋಚಿಸುವಿಕೆಯು ಆಗಾಗ್ಗೆ ತಪ್ಪಿಸಿಕೊಳ್ಳುವ ಅಪಾಯಗಳು ಮತ್ತು ವಿರೋಧಾಭಾಸಗಳನ್ನು ಮೇಲಕ್ಕೆ ತರುತ್ತದೆ.
    one_liner: ವಿಲೋಮಿಸಿ - ನಿಮ್ಮನ್ನು ಯಾವುದು ವಿಫಲಗೊಳಿಸುತ್ತದೆ ಎಂದು ಕೇಳಿ, ನಂತರ ಆ ವಿಷಯಗಳನ್ನು ತಪ್ಪಿಸಿ.
    try_this:
      - ಯಾವುದೇ ಗುರಿಗಾಗಿ, ನೀವು ವಿಫಲಗೊಳ್ಳಬಹುದಾದ ಮುಖ್ಯ ಮಾರ್ಗಗಳನ್ನು ಪಟ್ಟಿ ಮಾಡಿ - ನಂತರ ಅವುಗಳನ್ನು ತಪ್ಪಿಸಿ.
      - ಋಣಾತ್ಮಕ ದೃಶ್ಯೀಕರಣವನ್ನು ಬಳಸಿ: ಇದು ಯಾಕೆ ತಪ್ಪು ಹೋಗಬಹುದು?
      - ಕೇಳಿ: ಇದನ್ನು ಹಾಳುಮಾಡಲು ಬುದ್ಧಿವಂತ ವ್ಯಕ್ತಿ ಏನು ಮಾಡಬಹುದು?
    ask_yourself:
      - ಇದು ಯಾಕೆ ವಿಫಲಗೊಳ್ಳಬಹುದು ಎಂಬುದರ ಬಗ್ಗೆ ನಾನು ಯೋಚಿಸಿದ್ದೇನೆಯೇ?
      - ಮುಂದೆ ಮಾತ್ರ ಯೋಚಿಸುವ ಮೂಲಕ ನಾನು ಏನು ನೋಡುತ್ತಿಲ್ಲ?
    in_more_detail: |
      ಚಾರ್ಲಿ ಮಂಗರ್ (Charlie Munger) ರವರಿಂದ ಜನಪ್ರಿಯಗೊಂಡ ಮತ್ತು ಗಣಿತದ ತರ್ಕದಲ್ಲಿ ಬೇರೂರಿರುವ ವಿಲೋಮವು, ಯಶಸ್ಸನ್ನು ಸಾಧಿಸುವುದಕ್ಕಿಂತ ವೈಫಲ್ಯವನ್ನು ತಪ್ಪಿಸುವುದು ಆಗಾಗ್ಗೆ ಸುಲಭ ಎಂಬ ಸಂಗತಿಯನ್ನು ಬಳಸಿಕೊಳ್ಳುತ್ತದೆ. ಒಂದು ವಿಷಯ ಯಾಕೆ ತಪ್ಪು ಹೋಗುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಗುರುತಿಸಬಹುದಾದರೆ, ನೀವು ಅವುಗಳನ್ನು ವ್ಯವಸ್ಥಿತವಾಗಿ ತೆಗೆದುಹಾಕಬಹುದು.

      ಕಾರ್ಲ್ ಜಾಕೋಬಿ (Carl Jacobi) ಹೇಳಿದರಂತೆ, "ವಿಲೋಮಿಸಿ, ಯಾವಾಗಲೂ ವಿಲೋಮಿಸಿ." ಸ್ಟೋಯಿಕ್ಸ್ (Stoics) ತಮ್ಮ ಬಳಿ ಇದ್ದದ್ದನ್ನು ಮೆಚ್ಚಲು ಮತ್ತು ಪ್ರತಿಕೂಲತೆಗೆ ಸಿದ್ಧರಾಗಲು ಋಣಾತ್ಮಕ ದೃಶ್ಯೀಕರಣವನ್ನು - ನಷ್ಟವನ್ನು ಊಹಿಸಿಕೊಳ್ಳುವುದು - ಬಳಸಿದರು. ವಿಲೋಮವು ನಿರಾಶಾವಾದವಲ್ಲ; ಇದು ಅಡೆತಡೆಗಳನ್ನು ನಿವಾರಿಸುವ ಮೂಲಕ ಪ್ರಗತಿ ಸಾಧಿಸಲು ಒಂದು ರಚನಾತ್ಮಕ ಮಾರ್ಗವಾಗಿದೆ.
    why_this_is_important: |
      ವಿಲೋಮವು ನಿಮಗೆ ವಿಪತ್ತು ಎದುರಾಗುವ ತಪ್ಪುಗಳನ್ನು ತಪ್ಪಿಸಲು, ಯೋಜನೆಗಳನ್ನು ಒತ್ತಡ ಪರೀಕ್ಷಿಸಲು ಮತ್ತು ಸ್ಪಷ್ಟವಲ್ಲದ ಪರಿಹಾರಗಳನ್ನು ಕಂಡುಹಿಡಿಯಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ವಿಫಲತೆಯ ನಿರ್ಣಾಯಕ ವಿಧಾನಗಳನ್ನು ಕಡೆಗಣಿಸದಂತೆ ಖಚಿತಪಡಿಸಿಕೊಳ್ಳುವ ಮೂಲಕ ಮುಂದಿನ ಯೋಜನೆಯನ್ನು ಪೂರಕಗೊಳಿಸುತ್ತದೆ.
    when_to_use:
      - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ (problem_solving)
