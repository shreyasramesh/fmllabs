    name: ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮ ಎಂದರೆ ಆಯ್ಕೆಗಳನ್ನು ನೀಡಿದಾಗ ಪೂರ್ವ-ಆಯ್ಕೆ ಮಾಡಿದ ಆಯ್ಕೆಯನ್ನು ಆರಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ.
      ಏನನ್ನು ಡಿಫಾಲ್ಟ್ ಆಗಿ ಹೊಂದಿಸಲಾಗಿದೆಯೋ ಅದು ಬಲವಾದ ಪ್ರಯೋಜನವನ್ನು ಹೊಂದಿದೆ—ಆಯ್ಕೆಗಳು ಅವರಿಗೆ ಸೂಕ್ತವಾಗಿದೆಯೇ
      ಎಂಬುದನ್ನು ಲೆಕ್ಕಿಸದೆ ಜನರು ಆಗಾಗ್ಗೆ ಅದಕ್ಕೆ ಅಂಟಿಕೊಳ್ಳುತ್ತಾರೆ.
    one_liner: ಏನನ್ನು ಡಿಫಾಲ್ಟ್ ಆಗಿ ಹೊಂದಿಸಲಾಗಿದೆಯೋ ಅದು ಬಲವಾದ ಪ್ರಯೋಜನವನ್ನು ಹೊಂದಿದೆ—ನಾವು ಅದಕ್ಕೆ ಅಂಟಿಕೊಳ್ಳುತ್ತೇವೆ.
    try_this:
      - ಪರ್ಯಾಯಗಳನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡದೆ ನೀವು ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಸ್ವೀಕರಿಸುತ್ತಿದ್ದೀರಾ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
      - ಆಯ್ಕೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸುವಾಗ, ಬಳಕೆದಾರರ ಅತ್ಯುತ್ತಮ ಹಿತಾಸಕ್ತಿಗಳನ್ನು ಪೂರೈಸುವ ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಹೊಂದಿಸಿ.
      - ಕೇಳಿ: ಇದು ಪೂರ್ವ-ಆಯ್ಕೆ ಮಾಡದಿದ್ದರೆ ನಾನು ಇದನ್ನು ಆರಿಸುತ್ತೇನೆಯೇ?
    ask_yourself:
      - ನಾನು ಜಡತ್ವದಿಂದ ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಆರಿಸುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ಅದು ನನಗೆ ಉತ್ತಮವಾದುದರಿಂದ ಆರಿಸುತ್ತಿದ್ದೇನೆ?
      - ಈ ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಯಾರು ಹೊಂದಿಸಿದರು, ಮತ್ತು ಅವರಿಂದ ಅವರಿಗೆ ಏನು ಲಾಭವಾಗಬಹುದು?
    in_more_detail: |
      ಜಡತ್ವ, ನಷ್ಟದ ಅನಿವಾರ್ಯತೆ (ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಕಳೆದುಕೊಂಡಂತೆ ಬದಲಾವಣೆ ಅನಿಸುತ್ತದೆ) ಮತ್ತು ಸೂಚಿತ ಅನುಮೋದನೆ (ಡಿಫಾಲ್ಟ್
      ಶಿಫಾರಸು ಮಾಡಲಾಗಿದೆ ಎಂದು ನಾವು ಊಹಿಸುತ್ತೇವೆ) ಕಾರಣದಿಂದ ಡಿಫಾಲ್ಟ್‌ಗಳು ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತವೆ.
      ಒಪ್ಪಿಗೆಯನ್ನು ಪಡೆದುಕೊಳ್ಳುವ (opt-in) ಅಥವಾ ಹೊರಗಿಡುವ (opt-out) ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಆಧರಿಸಿ ರಾಷ್ಟ್ರಗಳ ಅಂಗಾಂಗ
      ದಾನ ದರಗಳು ನಾಟಕೀಯವಾಗಿ ಬದಲಾಗುತ್ತವೆ.
      ನಿವೃತ್ತಿ ಉಳಿತಾಯದಲ್ಲಿ ಸ್ವಯಂಚಾಲಿತವಾಗಿ ದಾಖಲಾಗುವಾಗ ಭಾಗವಹಿಸುವಿಕೆ ಹೆಚ್ಚಾಗುತ್ತದೆ.

      ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಉತ್ತಮ ಫಲಿತಾಂಶಗಳಿಗಾಗಿ (ಉತ್ತಮ ಫಲಿತಾಂಶಗಳತ್ತ ಸೂಕ್ಷ್ಮವಾಗಿ ನಿರ್ದೇಶಿಸಲು) ಅಥವಾ
      ಮೋಸಕ್ಕಾಗಿ (ಪೂರ್ವ-ಪರಿಶೀಲಿಸಿದ ಪೆಟ್ಟಿಗೆಗಳಲ್ಲಿ ಪ್ರತಿಕೂಲ ಪದಗಳನ್ನು ಹೂಳಲು) ಬಳಸಬಹುದು.
      ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ವ್ಯವಸ್ಥೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಲು ಮತ್ತು ಅನಗತ್ಯ ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು
      ವಿರೋಧಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸುವ ಆಯ್ಕೆ ವಾಸ್ತುಶಿಲ್ಪವನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಲು
      ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಮತ್ತು ನಿಮ್ಮ ಆಯ್ಕೆಗಳು ಉದ್ದೇಶಪೂರ್ವಕ ಆದ್ಯತೆಗಿಂತ ಡಿಫಾಲ್ಟ್‌ಗಳಿಂದ
      ರೂಪಿಸಲ್ಪಡುತ್ತಿವೆ ಎಂಬುದನ್ನು ಗುರುತಿಸಲು ಇದು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ನಾಯಕತ್ವ
      - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      inertia_toward_default: |
        ಹೆಚ್ಚಿನ ಜನರು ಪೂರ್ವ-ಆಯ್ಕೆ ಮಾಡಿದ ಯಾವುದಕ್ಕೆ ಅಂಟಿಕೊಳ್ಳುತ್ತಾರೆ.
      implied_recommendation: |
        "ಅವರು ನಮ್ಮನ್ನು ಆರಿಸಬೇಕೆಂದು ಬಯಸುತ್ತಾರೆ" ಎಂದು ನಾವು ಡಿಫಾಲ್ಟ್ ಅನ್ನು ಅರ್ಥೈಸುತ್ತೇವೆ.
      opt_in_vs_opt_out: |
        ರೂಪಿಸುವಿಕೆ (opt-in vs. opt-out) ಭಾಗವಹಿಸುವಿಕೆಯನ್ನು ನಾಟಕೀಯವಾಗಿ ಬದಲಾಯಿಸುತ್ತದೆ.
      pre_checked_boxes: |
        ಪೂರ್ವ-ಆಯ್ಕೆ ಮಾಡಿದ ಆಯ್ಕೆಗಳು ಫಾರ್ಮ್‌ಗಳು ಮತ್ತು ಸೆಟ್ಟಿಂಗ್‌ಗಳಲ್ಲಿ ಬಲವಾದ ಪ್ರಯೋಜನವನ್ನು ಹೊಂದಿವೆ.
    examples:
      organ_donation: |
        ಒಪ್ಪಿಗೆಯನ್ನು ಪಡೆದುಕೊಳ್ಳುವ (opt-out) ದೇಶಗಳು, ಒಪ್ಪಿಗೆಯನ್ನು ಕೇಳುವ (opt-in) ದೇಶಗಳಿಗಿಂತ ಹೆಚ್ಚಿನ ದಾನ ದರಗಳನ್ನು
        ಹೊಂದಿವೆ—ಡಿಫಾಲ್ಟ್ ಮನೋಭಾವಕ್ಕಿಂತ ಹೆಚ್ಚು ಮುಖ್ಯವಾಗಿದೆ.
      retirement_savings: |
        ಸ್ವಯಂಚಾಲಿತ ದಾಖಲಾತಿ 401(k) ಭಾಗವಹಿಸುವಿಕೆಯನ್ನು ನಾಟಕೀಯವಾಗಿ ಹೆಚ್ಚಿಸುತ್ತದೆ.
      software_installers: |
        "ಶಿಫಾರಸು ಮಾಡಲಾದ" ಆಯ್ಕೆಗಳು ಮತ್ತು ಪೂರ್ವ-ಪರಿಶೀಲಿಸಿದ ಆಡ್-ಆನ್‌ಗಳು ಬಳಕೆದಾರರು ಏನು ಸ್ಥಾಪಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು
        ರೂಪಿಸುತ್ತವೆ.
      subscriptions: |
        ಉಚಿತ ಪ್ರಯೋಗಗಳು, ಪಾವತಿಸಿದ ದಾಖಲಾತಿಗೆ ಡಿಫಾಲ್ಟ್ ಆಗಿರುವುದರಿಂದ, ಸಕ್ರಿಯವಾಗಿ ಚಂದಾದಾರರಾಗಲು
        ಆರಿಸದ ಅನೇಕರನ್ನು ಸೆರೆಹಿಡಿಯುತ್ತವೆ.
    real_world_implications: |
      ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮವು ಅತ್ಯಂತ ಶಕ್ತಿಶಾಲಿ ಸೂಕ್ಷ್ಮ ನಿರ್ದೇಶನಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ. ಇದು ಉಳಿತಾಯ, ಆರೋಗ್ಯ,
      ಗೌಪ್ಯತೆ ಮತ್ತು ಗ್ರಾಹಕರ ನಡವಳಿಕೆಯನ್ನು ರೂಪಿಸುತ್ತದೆ. ನೈತಿಕ ಆಯ್ಕೆ ವಾಸ್ತುಶಿಲ್ಪವು ಫಲಿತಾಂಶಗಳನ್ನು
      ಸುಧಾರಿಸಲು ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಬಳಸುತ್ತದೆ; ಕಪ್ಪು ಮಾದರಿಗಳು ಅವುಗಳನ್ನು ದುರುಪಯೋಗಪಡಿಸಿಕೊಳ್ಳಲು ಬಳಸುತ್ತವೆ.
    professional_application:
      networking_and_relationship_building: |
        ಇತರರಿಗಾಗಿ ಕಾರ್ಯವಿಧಾನಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸುವಾಗ, ಅವರ ಹಿತಾಸಕ್ತಿಗಳನ್ನು ಪೂರೈಸುವ ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು
        ಆರಿಸಿಕೊಳ್ಳಿ. ಮೌಲ್ಯವನ್ನು ಹೊರತೆಗೆಯಲು ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಬಳಸುವ ಕಪ್ಪು ಮಾದರಿಗಳನ್ನು ತಪ್ಪಿಸಿ.
      collaborative_learning_initiative: |
        ಗುಂಪಿನ ಅಭ್ಯಾಸಗಳಿಗಾಗಿ ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಹೊಂದಿಸಿ (ಉದಾ., ಅಸಂಕ್ರೋನಸ್‌ಗೆ ಡಿಫಾಲ್ಟ್, ದಾಖಲಾತಿಗೆ ಡಿಫಾಲ್ಟ್)
        ಇವು ಅಪೇಕ್ಷಿತ ನಡವಳಿಕೆಯೊಂದಿಗೆ ಹೊಂದಿಕೆಯಾಗುತ್ತವೆ. ಸರಿಯಾದ ಆಯ್ಕೆಯನ್ನು ಸುಲಭವಾದ ಆಯ್ಕೆಯನ್ನಾಗಿ ಮಾಡಿ.
    how_can_this_be_misapplied:
      dark_patterns: |
        ಜನರನ್ನು ಪ್ರತಿಕೂಲ ಆಯ್ಕೆಗಳೊಳಗೆ ಮೋಸಗೊಳಿಸಲು ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಬಳಸುವುದು (ಉದಾ., ಗುಪ್ತ ಶುಲ್ಕಗಳು,
        ಅನಗತ್ಯ ಚಂದಾದಾರಿಕೆಗಳು).
      paternalism: |
        ಸಮ್ಮತಿಯಿಲ್ಲದೆ ನಿಜವಾದ ಆದ್ಯತೆಯನ್ನು ಮೀರಿಸುವ ಡಿಫಾಲ್ಟ್‌ಗಳನ್ನು ಹೇರುವುದು.
      manipulation: |
        ಡಿಫಾಲ್ಟ್‌ಗಳಲ್ಲಿ ಪ್ರತಿಕೂಲ ಪದಗಳನ್ನು ಹೂಳುವುದು ಮತ್ತು ಜಡತ್ವದ ಮೇಲೆ ಎಣಿಸುವುದು.
      one_size_fits_all: |
        ಆದ್ಯತೆಗಳು ಬದಲಾಗುವಾಗ ಎಲ್ಲರಿಗೂ ಒಂದೇ ಡಿಫಾಲ್ಟ್ ಸರಿಯಾಗಿದೆ ಎಂದು ಊಹಿಸುವುದು.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮವು ಒಂದು ಅರಿವಿನ ಪಕ್ಷಪಾತವನ್ನು ವಿವರಿಸುತ್ತದೆ, ಅಲ್ಲಿ ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ನಿರ್ದಿಷ್ಟ ವಿಷಯದಲ್ಲಿ ಕಡಿಮೆ ಜ್ಞಾನ ಅಥವಾ ಕೌಶಲ್ಯವಿದ್ದರೆ, ಅವರು ತಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಾರೆ, ಆದರೆ ತಜ್ಞರು ತಮ್ಮನ್ನು ತಾವು ಕಡಿಮೆ ಅಂದಾಜಿಸುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ನಿಮಗೆ ಎಷ್ಟು ಕಡಿಮೆ ತಿಳಿದಿದೆ, ಅಷ್ಟು ಹೆಚ್ಚು ಆತ್ಮವಿಶ್ವಾಸದಿಂದಿರಬಹುದು.
    one_liner: ನಿಮಗೆ ಎಷ್ಟು ಕಡಿಮೆ ತಿಳಿದಿದೆ, ಅಷ್ಟು ಹೆಚ್ಚು ಆತ್ಮವಿಶ್ವಾಸದಿಂದಿರಬಹುದು.
    try_this:
      - ಹೊಸ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ, ನೀವು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿದ್ದೀರಿ ಎಂದು ಊಹಿಸಿ—ಪ್ರತಿಕ್ರಿಯೆ ಮತ್ತು ಮಾಪನಾಂಕವನ್ನು ಹುಡುಕಿ.
      - ತಜ್ಞರು ಸಂದೇಹ ವ್ಯಕ್ತಪಡಿಸಿದಾಗ, ಅದನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಿ; ಅವರಿಗೆ ಅಂಚಿನ ಪ್ರಕರಣಗಳು ತಿಳಿದಿರಬಹುದು.
      - ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ಅನನುಭವಿಗಳು ತಜ್ಞರಿಗಿಂತ ಹೆಚ್ಚು ಖಚಿತರಾಗಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು "ಮೂರ್ಖತನದ ಶಿಖರ" ದಲ್ಲಿದ್ದೇನೆಯೇ ಅಥವಾ "ವಿನಯದ ಕಣಿವೆ" ಯಲ್ಲಿದ್ದೇನೆಯೇ?
      - ನನ್ನ ಸಾಮರ್ಥ್ಯವನ್ನು ಇಲ್ಲಿ ನಿರ್ಣಯಿಸಲು ನನಗೆ ಮೆಟಾಕಾಗ್ನಿಟಿವ್ ಸಾಮರ್ಥ್ಯವಿದೆಯೇ?
    in_more_detail: |
      ಡನ್ನಿಂಗ್ ಮತ್ತು ಕ್ರೂಗರ್ ಅವರ ಸಂಶೋಧನೆಯು ಅಸಮರ್ಥ ವ್ಯಕ್ತಿಗಳು ತಮ್ಮದೇ ಆದ ಅಸಮರ್ಥತೆಯನ್ನು ಗುರುತಿಸುವ ಮೆಟಾಕಾಗ್ನಿಟಿವ್ ಸಾಮರ್ಥ್ಯವನ್ನು ಹೊಂದಿರುವುದಿಲ್ಲ ಎಂದು ತೋರಿಸಿದೆ. ನಿಮ್ಮ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ನಿರ್ಣಯಿಸಲು, ನಿಮಗೆ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸಲು ಅಗತ್ಯವಿರುವ ಅದೇ ಕೌಶಲ್ಯಗಳು ಬೇಕಾಗುತ್ತವೆ—ಆದ್ದರಿಂದ ಅನನುಭವಿಗಳು ದ್ವಿಗುಣವಾಗಿ ಅನನುಕೂಲಕರರಾಗುತ್ತಾರೆ: ಅವರು ಕಳಪೆಯಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಾರೆ ಮತ್ತು ಅದು ಅವರಿಗೆ ತಿಳಿದಿರುವುದಿಲ್ಲ.

      ಸಾಮರ್ಥ್ಯ ಹೆಚ್ಚಾದಂತೆ, ಜನರು ಆಗಾಗ್ಗೆ "ವಿನಯದ ಕಣಿವೆ" ಯನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ, ಅಲ್ಲಿ ಅವರಿಗೆ ಎಷ್ಟು ತಿಳಿದಿಲ್ಲ ಎಂಬುದನ್ನು ಅವರು ಅರಿತುಕೊಳ್ಳುತ್ತಾರೆ. ನಿಜವಾದ ತಜ್ಞರು ಕಡಿಮೆ ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿರಬಹುದು ಏಕೆಂದರೆ ಅವರು ಸೂಕ್ಷ್ಮತೆ ಮತ್ತು ಅಂಚಿನ ಪ್ರಕರಣಗಳನ್ನು ತೀವ್ರವಾಗಿ ಅರಿತುಕೊಳ್ಳುತ್ತಾರೆ.
    why_this_is_important: |
      ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನಿಮ್ಮ ಸ್ವಂತ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಮಾಪನಾಂಕ ಮಾಡಲು, ಅನನುಭವಿಗಳ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ತಜ್ಞರ ವಿನಯವನ್ನು ಮೆಚ್ಚಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಕಲಿಕೆ, ನೇಮಕಾತಿ ಮತ್ತು ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳಲು ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ಕಲಿಕೆ
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ನಾಯಕತ್ವ
      - ಉದ್ಯೋಗ_ಬದಲಾವಣೆಗಳು
    how_can_you_spot_it:
      novice_overconfidence: |
        ಕಡಿಮೆ ಅನುಭವ ಹೊಂದಿರುವ ಯಾರಾದರೂ ಬಲವಾದ, ಅನರ್ಹವಾದ ಅಭಿಪ್ರಾಯಗಳನ್ನು ವ್ಯಕ್ತಪಡಿಸುತ್ತಾರೆ.
      expert_underconfidence: |
        ಹೆಚ್ಚು ಕೌಶಲ್ಯ ಹೊಂದಿರುವ ವ್ಯಕ್ತಿಗಳು ಕಡಿಮೆ ಕೌಶಲ್ಯ ಹೊಂದಿರುವವರಿಗಿಂತ ಹೆಚ್ಚು ಅನಿಶ್ಚಿತತೆಯನ್ನು ವ್ಯಕ್ತಪಡಿಸುತ್ತಾರೆ ಮತ್ತು ಹಿಂಜರಿಯುತ್ತಾರೆ.
      inability_to_recognize_quality: |
        ಕಳಪೆ ಕಾರ್ಯಕ್ಷಮತೆ ಹೊಂದಿರುವವರು ತಮ್ಮ ಕ್ಷೇತ್ರದಲ್ಲಿ ಉತ್ತಮ ಮತ್ತು ಕೆಟ್ಟ ಕೆಲಸವನ್ನು ಪ್ರತ್ಯೇಕಿಸಲು ಸಾಧ್ಯವಾಗುವುದಿಲ್ಲ.
      confidence_competence_mismatch: |
        ಆರಂಭಿಕರಲ್ಲಿ ಆತ್ಮವಿಶ್ವಾಸ ಮತ್ತು ನೈಜ ಸಾಮರ್ಥ್ಯವು ವಿಲೋಮವಾಗಿ ಸಂಬಂಧಿಸಿವೆ.
    examples:
      social_media: |
        ಒಂದು ವಿಷಯದ ಬಗ್ಗೆ ಮೇಲ್ನೋಟದ ಜ್ಞಾನ ಹೊಂದಿರುವ ಜನರು ವಿಷಯ ತಜ್ಞರೊಂದಿಗೆ ಆತ್ಮವಿಶ್ವಾಸದಿಂದ ವಾದಿಸುತ್ತಾರೆ.
      hiring: |
        ಸಂದರ್ಶನಗಳಲ್ಲಿ ಕಳಪೆಯಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಅಭ್ಯರ್ಥಿಗಳು ಕೆಲವೊಮ್ಮೆ ತಮ್ಮದೇ ಆದ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಹೆಚ್ಚಾಗಿ ರೇಟ್ ಮಾಡುತ್ತಾರೆ.
      investing: |
        ಹೊಸ ಹೂಡಿಕೆದಾರರು ಆರಂಭಿಕ ಗೆಲುವುಗಳ ನಂತರ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿರಬಹುದು, ಅದೃಷ್ಟವನ್ನು ಗುರುತಿಸುವುದಿಲ್ಲ.
      workplace: |
        ಜೂನಿಯರ್ ಉದ್ಯೋಗಿಗಳು ಪದೋನ್ನತಿಗೆ ತಮ್ಮ ಸಿದ್ಧತೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸಬಹುದು, ಆದರೆ ಹಿರಿಯರು ತಮ್ಮನ್ನು ತಾವು ಅನುಮಾನಿಸುತ್ತಾರೆ.
    real_world_implications: |
      ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮವು ಶಿಕ್ಷಣ, ನೇಮಕಾತಿ, ರಾಜಕೀಯ ಮತ್ತು ಸಾರ್ವಜನಿಕ ಸಂಭಾಷಣೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
      ಕೆಟ್ಟ ಕಲ್ಪನೆಗಳು ಏಕೆ ಉಲ್ಬಣಗೊಳ್ಳುತ್ತವೆ ಮತ್ತು ತಜ್ಞರನ್ನು ಏಕೆ ವಜಾಗೊಳಿಸಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ. ವೈಯಕ್ತಿಕ ಮತ್ತು ಸಾಮೂಹಿಕ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳಲು ಮಾಪನಾಂಕ ಮುಖ್ಯವಾಗಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ತುಂಬಾ ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿದ್ದರೆ, ಅವರು ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ವಲಯದಲ್ಲಿರಬಹುದೇ ಎಂದು ಪರಿಗಣಿಸಿ. ಅನಿಶ್ಚಿತತೆಯನ್ನು ವ್ಯಕ್ತಪಡಿಸುವವರಿಂದಲೂ ಸೇರಿದಂತೆ, ವೈವಿಧ್ಯಮಯ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹುಡುಕಿ.
      collaborative_learning_initiative: |
        ಅನಿಶ್ಚಿತತೆಯನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುವುದನ್ನು ಗೌರವಿಸುವ ಸಂಸ್ಕೃತಿಗಳನ್ನು ರಚಿಸಿ. ಮಾಪನಾಂಕ ವ್ಯಾಯಾಮಗಳು ಮತ್ತು ತಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ನಿಖರವಾಗಿ ಅಂದಾಜಿಸಲು ಜನರಿಗೆ ಸಹಾಯ ಮಾಡುವ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿರುವ ಜನರು ಯಾವಾಗಲೂ ತಪ್ಪು ಎಂದು ಊಹಿಸುವುದು; ಕೆಲವೊಮ್ಮೆ ಆತ್ಮವಿಶ್ವಾಸವು ಸಮರ್ಥನೀಯವಾಗಿರುತ್ತದೆ.
      false_modesty: |
        ತಜ್ಞರು ವಿನಯಶೀಲರಾಗಿ ಕಾಣಲು ತಮ್ಮ ಜ್ಞಾನಕ್ಕಿಂತ ಕಡಿಮೆ ತಿಳಿದಿದ್ದಾರೆ ಎಂದು ನಟಿಸುವುದು.
      gatekeeping: |
        "ತಜ್ಞರ" ವಾದಗಳನ್ನು ತೊಡಗಿಸಿಕೊಳ್ಳದೆ, ಅವರೊಂದಿಗೆ ಒಪ್ಪದ ಯಾರನ್ನಾದರೂ ವಜಾಗೊಳಿಸಲು ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಅನ್ನು ಬಳಸುವುದು.
      self_doubt_paralysis: |
        ನಿಮ್ಮ ಸ್ವಂತ ತೀರ್ಪನ್ನು ಎಂದಿಗೂ ನಂಬದಷ್ಟು ಮಟ್ಟಿಗೆ ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
