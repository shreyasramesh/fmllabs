    how_can_you_spot_it:
      pressure_for_consensus: |
        ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿರುತ್ಸಾಹಗೊಳಿಸಲಾಗುತ್ತದೆ ಅಥವಾ ಶಿಕ್ಷಿಸಲಾಗುತ್ತದೆ; ಒಪ್ಪಿಗೆಗೆ ಬಹುಮಾನ ನೀಡಲಾಗುತ್ತದೆ.
      illusion_of_unanimity: |
        ಮೌನವನ್ನು ಒಪ್ಪಿಗೆಯೆಂದು ವ್ಯಾಖ್ಯಾನಿಸಲಾಗುತ್ತದೆ, ಆದರೆ ಅದು ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಾಗಿರಬಹುದು.
      collective_rationalization: |
        ಗುಂಪು ಎಚ್ಚರಿಕೆಗಳನ್ನು ತಿರಸ್ಕರಿಸುತ್ತದೆ ಮತ್ತು ತನ್ನ ದೃಷ್ಟಿಕೋನವನ್ನು ಬಲಪಡಿಸುತ್ತದೆ.
      mindguards: |
        ಸದಸ್ಯರು ಒಮ್ಮತವನ್ನು ಪ್ರಶ್ನಿಸುವ ಮಾಹಿತಿಯಿಂದ ಗುಂಪನ್ನು ರಕ್ಷಿಸುತ್ತಾರೆ.
    examples:
      bay_of_pigs: |
        ಕೆನೆಡಿ ಅವರ ಸಲಹೆಗಾರರು ಆಕ್ರಮಣ ಯೋಜನೆಯ ಬಗ್ಗೆ ಸಂದೇಹಗಳನ್ನು ಹತ್ತಿಕ್ಕಿದರು; ಇದರ ಫಲಿತಾಂಶ ವಿಪತ್ತು.
      corporate_decisions: |
        ಒಂದು ನಾಯಕತ್ವ ತಂಡವು ಕೆಂಪು ಧ್ವಜಗಳ ಹೊರತಾಗಿಯೂ ವಿಲೀನದೊಂದಿಗೆ ಮುಂದುವರಿಯುತ್ತದೆ ಏಕೆಂದರೆ ಯಾರೂ ವಿರೋಧಿಸಲು ಬಯಸುವುದಿಲ್ಲ.
      product_launches: |
        ಒಂದು ತಂಡವು ದೋಷಪೂರಿತ ಉತ್ಪನ್ನವನ್ನು ಹೊರತರುತ್ತದೆ ಏಕೆಂದರೆ ಎಲ್ಲರೂ ಯೋಜನೆಯಲ್ಲಿ ಹೂಡಿಕೆ ಮಾಡಿದ್ದಾರೆ ಮತ್ತು ಯಾರೂ ಕಾಳಜಿ ವ್ಯಕ್ತಪಡಿಸುವುದಿಲ್ಲ.
      boards: |
        ಮಂಡಳಿಯ ಸದಸ್ಯರು ಸಾಮರಸ್ಯವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ನಿರ್ವಹಣಾ ಪ್ರಸ್ತಾವನೆಗಳನ್ನು ಅಂಧವಾಗಿ ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆ.
    real_world_implications: |
      ಗುಂಪು ಆಲೋಚನೆಯು ನೀತಿ ವೈಫಲ್ಯಗಳು, ಕಾರ್ಪೊರೇಟ್ ವಿಪತ್ತುಗಳು ಮತ್ತು ಕಳೆದುಹೋದ ಅವಕಾಶಗಳಿಗೆ ಕೊಡುಗೆ ನೀಡುತ್ತದೆ. ಇದು ವಿಶೇಷವಾಗಿ ಹೆಚ್ಚಿನ-ಪಣ, ಹೆಚ್ಚಿನ-ಒತ್ತಡದ ಸಂದರ್ಭಗಳಲ್ಲಿ ಅಪಾಯಕಾರಿ. ಇದನ್ನು ತಡೆಗಟ್ಟಲು ಉದ್ದೇಶಪೂರ್ವಕ ರಚನಾತ್ಮಕ ಮಧ್ಯಸ್ಥಿಕೆಗಳು ಬೇಕಾಗುತ್ತವೆ.
    professional_application:
      networking_and_relationship_building: |
        ಭಿನ್ನಾಭಿಪ್ರಾಯಕ್ಕೆ ಮಾನಸಿಕ ಸುರಕ್ಷತೆಯನ್ನು ಸೃಷ್ಟಿಸಿ. ಕಾಳಜಿ ವ್ಯಕ್ತಪಡಿಸುವವರಿಗೆ ಧನ್ಯವಾದ ಹೇಳಿ. ಅಸಮ್ಮತಿಸುವುದನ್ನು ಅಸಹ್ಯಕರವಾಗದಂತೆ ಮಾದರಿಯಾಗಿ ತೋರಿಸಿ.
      collaborative_learning_initiative: |
        'ವಿರೋಧಿ ವಕೀಲ', 'ರೆಡ್ ಟೀಮ್‌ಗಳು' ಮತ್ತು 'ಪ್ರೀಮೋರ್ಟೆಮ್‌ಗಳನ್ನು' ಬಳಸಿ. ಪ್ರಬಲವಾದ ದೃಷ್ಟಿಕೋನದ ವಿರುದ್ಧ ವಾದಿಸಲು ಯಾರಾದರೂ ಅಗತ್ಯವೆಂದು ಹೇಳಿ. ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ತಂದುಕೊಳ್ಳಿ. ನಾಯಕನು ಕೊನೆಯಲ್ಲಿ ಮಾತನಾಡುತ್ತಾನೆ, ಇದರಿಂದ ಇತರರ ಅಭಿಪ್ರಾಯಗಳು ಪ್ರಭಾವಿತವಾಗುವುದಿಲ್ಲ.
    how_can_this_be_misapplied:
      false_dissent: |
        "ನಿಯೋಜಿತ ಭಿನ್ನಾಭಿಪ್ರಾಯಕಾರರನ್ನು" ರಚಿಸುವುದು, ಅವರು ನಿಜವಾಗಿಯೂ ಭಿನ್ನಾಭಿಪ್ರಾಯ ಹೊಂದಿಲ್ಲ - ಗುಂಪು ಅದನ್ನು ಗ್ರಹಿಸುತ್ತದೆ.
      excessive_conflict: |
        ವಿನಾಶಕಾರಿ ಸಂಘರ್ಷ ಮತ್ತು ಪಕ್ಷವಾಯುವಿನವರೆಗೆ ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ಪ್ರೋತ್ಸಾಹಿಸುವುದು.
      dismissing_consensus: |
        ಎಲ್ಲಾ ಒಮ್ಮತವನ್ನು ಗುಂಪು ಆಲೋಚನೆ ಎಂದು ಊಹಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಗುಂಪು ಸರಿಯಾಗಿರುತ್ತದೆ.
      individualism: |
        ಸಮೂಹ ನಿರ್ಧಾರ ಅಸಾಧ್ಯವಾಗುವ ಮಟ್ಟಿಗೆ ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: ಹಾಲೊ ಎಫೆಕ್ಟ್
    quick_introduction: |
      ಹಾಲೊ ಎಫೆಕ್ಟ್ ಎಂದರೆ ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣ ಅಥವಾ ಗ್ರಹಿಕೆ
      ಅವರ ಬಗ್ಗೆ ನಮ್ಮ ಒಟ್ಟಾರೆ ನಿರ್ಣಯದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರಲು ಬಿಡುವುದು.
      ನಮಗೆ ಒಬ್ಬರ ನೋಟ ಇಷ್ಟವಾದರೆ, ಅವರು ಸಮರ್ಥರು ಎಂದು ನಾವು ಊಹಿಸಬಹುದು.
      ಒಂದು ಕೌಶಲ್ಯವನ್ನು ಮೆಚ್ಚಿದರೆ, ಅವರು ಎಲ್ಲದರಲ್ಲೂ ಉತ್ತಮರೆಂದು ಊಹಿಸುತ್ತೇವೆ.
      ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ಉಳಿದವುಗಳ ಮೇಲೆ "ಹಾಲೊ"ವನ್ನು ಬೀರುತ್ತದೆ.
    one_liner: ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ವ್ಯಕ್ತಿಯ ನಮ್ಮ ಒಟ್ಟಾರೆ ನಿರ್ಣಯದ ಮೇಲೆ ಒಂದು ಹಾಲೊವನ್ನು ಬೀರುತ್ತದೆ.
    try_this:
      - ಗುಣಲಕ್ಷಣಗಳನ್ನು ಸ್ವತಂತ್ರವಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡಿ—ಒಂದು ಬಲವು ಇತರರನ್ನು ಸೂಚಿಸಲು ಬಿಡಬೇಡಿ.
      - ಆಕರ್ಷಣೆ, ಚಾರ್ಮ್, ಅಥವಾ ಒಂದು ಯಶಸ್ಸು ನಿಮ್ಮ ನೋಟವನ್ನು ಹೇಗೆ ಬಣ್ಣಿಸುತ್ತಿದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
      - ಕೇಳಿ: ಆ ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವಿಲ್ಲದೆ ನಾನು ಈ ವ್ಯಕ್ತಿಯನ್ನು ಅದೇ ರೀತಿ ನಿರ್ಣಯಿಸುತ್ತಿದ್ದೆನೇ?
    ask_yourself:
      - ನಾನು ಒಂದು ಗುಣದಿಂದ ಇಡೀ ವ್ಯಕ್ತಿಗೆ ಸಾಮಾನ್ಯೀಕರಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಒಂದು ಬಲದಿಂದ ಪ್ರಭಾವಿತನಾಗದಿದ್ದರೆ ನಾನು ದೌರ್ಬಲ್ಯಗಳನ್ನು ನೋಡುತ್ತಿದ್ದನೇ?
    in_more_detail: |
      ಎಡ್ವರ್ಡ್ ಥೋರ್ನ್‌ಡೈಕ್ ಗಮನಿಸಿದರು, ಒಬ್ಬ ಸೈನಿಕನ ಮೇಲೆ ಒಂದು ಗುಣದಲ್ಲಿ
      ಹೆಚ್ಚು ಅಂಕ ನೀಡಿದ ಅಧಿಕಾರಿಗಳು, ಇತರ—ಸಂಬಂಧವಿಲ್ಲದ ಗುಣಗಳ ಮೇಲೂ—ಹೆಚ್ಚು ಅಂಕ
      ನೀಡಲು ಒಲವು ತೋರಿಸುತ್ತಿದ್ದರು. ನಾವು ನಿರ್ದಿಷ್ಟದಿಂದ ಒಟ್ಟಾರೆಯಾಗಿ ಸಾಮಾನ್ಯೀಕರಿಸುತ್ತೇವೆ.
      ಆಕರ್ಷಣೆ, ಚಾರ್ಮ್, ಅಥವಾ ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿನ ಯಶಸ್ಸು ಹಾಲೊವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ, ಅದು
      ಹರಡುತ್ತದೆ.

      ವಿರುದ್ಧವಾದುದು—ಒಂದು ನಕಾರಾತ್ಮಕ ಗುಣವು ಎಲ್ಲವನ್ನೂ ಬಣ್ಣಿಸುವುದು—ಇದನ್ನು ಕೆಲವೊಮ್ಮೆ
      "ಹಾರ್ನ್ ಎಫೆಕ್ಟ್" ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಇವೆರಡೂ ಅನಗತ್ಯ ಸಾಮಾನ್ಯೀಕರಣದ ರೂಪಗಳಾಗಿವೆ.
      ಹಾಲೊ ಎಫೆಕ್ಟ್ ನೇಮಕಾತಿ, ಕಾರ್ಯಕ್ಷಮತೆ ವಿಮರ್ಶೆಗಳು, ಮತ್ತು ದೈನಂದಿನ
      ಗ್ರಹಿಕೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
    why_this_is_important: |
      ಹಾಲೊ ಎಫೆಕ್ಟ್ ಅನ್ನು ಗುರುತಿಸುವುದು ಹೆಚ್ಚು ನಿಖರವಾದ ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಮಾಡಲು
      ಮತ್ತು ಅತಿಯಾಗಿ ಸಾಮಾನ್ಯೀಕರಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      ಇದು ನ್ಯಾಯಯುತ ನೇಮಕಾತಿ, ಕಾರ್ಯಕ್ಷಮತೆ ನಿರ್ವಹಣೆ, ಮತ್ತು ಸಂಬಂಧಗಳ
      ಮೌಲ್ಯಮಾಪನಕ್ಕೆ ಅತ್ಯಗತ್ಯ. ಒಂದು ಬಲವು ಎಲ್ಲ ಬಲಗಳನ್ನು ಸೂಚಿಸುವುದಿಲ್ಲ.
    when_to_use:
