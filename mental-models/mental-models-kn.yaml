      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್
    quick_introduction: |
      ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಹೇಳುತ್ತದೆ: "ಮೂರ್ಖತನದಿಂದ ಸರಿಯಾಗಿ ವಿವರಿಸಬಹುದಾದ ಯಾವುದನ್ನೂ ದುರುದ್ದೇಶಕ್ಕೆ ಅಧೀನಗೊಳಿಸಬೇಡಿ." ಬೇರೆ ರೀತಿಯಲ್ಲಿ ಹೇಳುವುದಾದರೆ, ಅಸಮರ್ಥತೆ, ಮೇಲ್ವಿಚಾರಣೆ ಅಥವಾ ಅಜ್ಞಾನವು ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸಬಹುದಾದಾಗ ಕೆಟ್ಟ ಉದ್ದೇಶವನ್ನು ಊಹಿಸಬೇಡಿ.
    one_liner: ಅಸಮರ್ಥತೆ ಅಥವಾ ಮೇಲ್ವಿಚಾರಣೆ ಇದನ್ನು ವಿವರಿಸಬಹುದಾದಾಗ ದುರುದ್ದೇಶವನ್ನು ಊಹಿಸಬೇಡಿ.
    try_this:
      - ಯಾರಾದರೂ ನಿಮಗೆ ನಿರಾಶೆಗೊಳಿಸಿದಾಗ, ಕೇಳಿ: ಇದನ್ನು ತಪ್ಪಿನಿಂದ ಅಥವಾ ಅಜ್ಞಾನದಿಂದ ವಿವರಿಸಬಹುದೇ?
      - ಕೆಟ್ಟ ಉದ್ದೇಶವನ್ನು ಊಹಿಸುವ ಮೊದಲು ಸರಳವಾದ ವಿವರಣೆಗೆ ಡಿಫಾಲ್ಟ್ ಆಗಿ.
      - ಅವರು ನನಗೆ ನೋವುಂಟುಮಾಡಲು ಉದ್ದೇಶಿಸಿದ್ದರು ಎಂಬ ನಿರ್ಣಯಕ್ಕೆ ನೀವು ಧಾವಿಸುತ್ತಿರುವುದನ್ನು ಗಮನಿಸಿ.
    ask_yourself:
      - ಮೂರ್ಖತನದಿಂದ ವಿವರಿಸಬಹುದಾದದ್ದನ್ನು ನಾನು ದುರುದ್ದೇಶಕ್ಕೆ ಅಧೀನಗೊಳಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಅವರ ಸ್ಥಾನದಲ್ಲಿ ನನಗೆ ಅದೇ ಸಂದೇಹದ ಲಾಭ ಸಿಗಬೇಕೆಂದು ನಾನು ಬಯಸುತ್ತೇನೆಯೇ?
    in_more_detail: |
      ಈ ತತ್ವವು ಜನರಿಗೆ ಸಂದೇಹದ ಲಾಭವನ್ನು ನೀಡಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ. ಯಾರಾದರೂ ಮಾಡಿದ ಕ್ರಿಯೆಗಳು ನಿಮಗೆ ಹಾನಿಮಾಡಿದಾಗ ಅಥವಾ ನಿರಾಶೆಗೊಳಿಸಿದಾಗ, ಅವರು ನಿಮಗೆ ಹಾನಿಮಾಡಲು ಉದ್ದೇಶಿಸಿದ್ದರು ಎಂಬುದು ಸಾಮಾನ್ಯವಾಗಿ ಡಿಫಾಲ್ಟ್ ಊಹೆಯಾಗಿದೆ. ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಪ್ರಕಾರ, ಅಂತಹ ಅನೇಕ ಕ್ರಿಯೆಗಳು ಅಜಾಗರೂಕತೆ, ಮಾಹಿತಿಯ ಕೊರತೆ, ಅಥವಾ ಕಳಪೆ ಅನುಷ್ಠಾನದಿಂದ ಉದ್ಭವಿಸುತ್ತವೆ - ಕೆಟ್ಟ ಉದ್ದೇಶದಿಂದಲ್ಲ.

      ಇದರರ್ಥ ದುರುದ್ದೇಶವು ಎಂದಿಗೂ ಇರುವುದಿಲ್ಲ ಎಂದಲ್ಲ. ಸರಳವಾದ ವಿವರಣೆ ಸರಿಹೊಂದಿದಾಗ ನಾವು ಕೆಟ್ಟ ವ್ಯಾಖ್ಯಾನಕ್ಕೆ ಧಾವಿಸಬಾರದು. ಈ ರೇಜರ್ ಸಂದೇಹವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ, ಸಂಬಂಧಗಳನ್ನು ಸುಧಾರಿಸುತ್ತದೆ ಮತ್ತು ಸಮಸ್ಯೆಗಳಿಗೆ ಹೆಚ್ಚು ಸೃಜನಾತ್ಮಕವಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸಲು ನಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಅನ್ನು ಅನ್ವಯಿಸುವುದರಿಂದ ಸಂಘರ್ಷ ಕಡಿಮೆಯಾಗುತ್ತದೆ, ಸಂಬಂಧಗಳು ಉಳಿಯುತ್ತವೆ ಮತ್ತು ದೂಷಿಸುವ ಬದಲು ಸಮಸ್ಯೆಗಳನ್ನು ಪರಿಹರಿಸುವತ್ತ ಶಕ್ತಿಯನ್ನು ಕೇಂದ್ರೀಕರಿಸಲಾಗುತ್ತದೆ. ಎಲ್ಲರೂ ನಿಮ್ಮ ವಿರುದ್ಧ ಇದ್ದಾರೆ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುವ ಒತ್ತಡದಿಂದ ಇದು ನಿಮ್ಮನ್ನು ರಕ್ಷಿಸುತ್ತದೆ.
    when_to_use:
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
      - ನಾಯಕತ್ವ
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        ನಕಾರಾತ್ಮಕ ಫಲಿತಾಂಶವನ್ನು ಉದ್ದೇಶಪೂರ್ವಕ ಹಾನಿ ಎಂದು ನೀವು ತಕ್ಷಣವೇ ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೀರಿ.
      personalizing_mistakes: |
        ಏನಾದರೂ ತಪ್ಪಾದಾಗ, ಅದು ನಿಮ್ಮನ್ನು ವೈಯಕ್ತಿಕವಾಗಿ ಗುರಿಯಾಗಿಸಿತ್ತು ಎಂದು ನೀವು ಊಹಿಸಿಕೊಳ್ಳುತ್ತೀರಿ.
      ignoring_alternative_explanations: |
        ಅಸಮರ್ಥತೆ, ತಪ್ಪು ಸಂವಹನ, ಅಥವಾ ಮೇಲ್ವಿಚಾರಣೆಯನ್ನು ಸಾಧ್ಯತೆಗಳಾಗಿ ನೀವು ಪರಿಗಣಿಸುವುದಿಲ್ಲ.
      escalation_before_inquiry: |
        ಏನಾಯಿತು ಎಂದು ಕೇಳುವ ಮೊದಲು ನೀವು ಕೋಪ ಅಥವಾ ಪ್ರತೀಕಾರದಿಂದ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತೀರಿ.
    examples:
      email_tone: |
        ಒಂದು ಸಂಕ್ಷಿಪ್ತ ಇಮೇಲ್ ಅನ್ನು ನಿಷ್ಕ್ರಿಯ-ಆಕ್ರಮಣಕಾರಿ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುವುದು, ಆದರೆ ಕಳುಹಿಸುವವರು ಕೇವಲ തിരക്കുಳ್ಳವರಾಗಿರಬಹುದು ಅಥವಾ ಟೋನ್‌ಗೆ ಕೆಟ್ಟವರಾಗಿರಬಹುದು.
      missed_deadline: |
        ಸಹೋದ್ಯೋಗಿಯ ವಿಳಂಬಿತ ವಿತರಣೆಯನ್ನು ನಾಶ ಎಂದು ವ್ಯಾಖ್ಯಾನಿಸುವುದು, ಆದರೆ ಅವರು ಅತಿಯಾದ ಬದ್ಧತೆಯನ್ನು ಹೊಂದಿರಬಹುದು ಅಥವಾ ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸಿರಬಹುದು.
      policy_decisions: |
        ನೀವು ಇಷ್ಟಪಡದ ಕಂಪನಿ ನೀತಿಯನ್ನು ನೌಕರರಿಗೆ ಹಾನಿ ಮಾಡಲು ವಿನ್ಯಾಸಗೊಳಿಸಲಾಗಿದೆ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುವುದು, ಆದರೆ ಅದು ಬೇರೆ ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸಲು ಒಂದು ಅನಾನುಕೂಲ ಪ್ರಯತ್ನವಾಗಿರಬಹುದು.
      traffic: |
        ಇನ್ನೊಬ್ಬ ಚಾಲಕ ನಿಮ್ಮನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಕತ್ತರಿಸಿದ್ದಾನೆ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುವುದು, ಆದರೆ ಅವರು ನಿಮ್ಮನ್ನು ನೋಡಿಲ್ಲದಿರಬಹುದು.
    real_world_implications: |
      ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಕಾರ್ಯಕ್ಷೇತ್ರದ ಸಂಸ್ಕೃತಿಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ, ಮೊಕದ್ದಮೆಗಳನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಮತ್ತು ಸಂಘರ್ಷ ಪರಿಹಾರವನ್ನು ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಮಾಡುತ್ತದೆ. ಅತಿಯಾದ ಬಳಕೆಯು ನಿರ್ಲಕ್ಷ್ಯವನ್ನು ಅನುಮತಿಸಬಹುದು; ಕಡಿಮೆ ಬಳಕೆಯು ಅನಗತ್ಯ ಸಂಘರ್ಷವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ನಿಮಗೆ ನಿರಾಶೆಗೊಳಿಸಿದಾಗ, ಕೆಟ್ಟ ಉದ್ದೇಶವನ್ನು ಊಹಿಸುವ ಮೊದಲು ಸ್ಪಷ್ಟೀಕರಣ ಕೇಳಿ.
        ಉದಾರವಾದ ವ್ಯಾಖ್ಯಾನಗಳಿಗೆ ಡಿಫಾಲ್ಟ್ ಆಗುವ ಮೂಲಕ ಸಂಬಂಧಗಳನ್ನು ಉಳಿಸಿಕೊಳ್ಳಿ.
      collaborative_learning_initiative: |
        ತಂಡಗಳಲ್ಲಿ, ದೋಷಗಳು ಸಾಬೀತಾಗುವವರೆಗೆ ಉದ್ದೇಶಪೂರ್ವಕವಲ್ಲ ಎಂದು ಊಹಿಸುವ ಸಂಸ್ಕೃತಿಯನ್ನು ರಚಿಸಿ. ದೂಷಿಸುವ ಬದಲು ವ್ಯವಸ್ಥೆಗಳು ಮತ್ತು ಪ್ರಕ್ರಿಯೆಗಳ ಮೇಲೆ ಗಮನಹರಿಸಿ.
    how_can_this_be_misapplied:
      excusing_negligence: |
        ಆವರ್ತನ ಅಸಮರ್ಥತೆ ಅಥವಾ ಅಜಾಗರೂಕತೆಯನ್ನು "ದುರುದ್ದೇಶವಲ್ಲ" ಎಂದು ತಳ್ಳಿಹಾಕುವುದು, ಆದರೆ ಇದಕ್ಕೆ ಹೊಣೆಗಾರಿಕೆ ಬೇಕಾಗುತ್ತದೆ.
      ignoring_genuine_malice: |
        ರೇಜರ್ ಅನ್ನು ಅತಿಯಾಗಿ ಕಟ್ಟುನಿಟ್ಟಾಗಿ ಅನ್ವಯಿಸುವುದರಿಂದ ನಿಜವಾದ ಕೆಟ್ಟ ನಟರು ಅಥವಾ ವಿಷಕಾರಿ ನಡವಳಿಕೆಯನ್ನು ನೀವು ತಪ್ಪಿಸಿಕೊಳ್ಳುತ್ತೀರಿ.
      avoiding_difficult_conversations: |
        ಕಾರ್ಯಕ್ಷಮತೆಯ ಸಮಸ್ಯೆಗಳನ್ನು ಪರಿಹರಿಸದಿರಲು ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಅನ್ನು ಕ್ಷಮೆಯಾಗಿ ಬಳಸುವುದು.
      gaslighting_victims: |
        ಯಾರಾದರೂ ನಿಜವಾಗಿಯೂ ಅನ್ಯಾಯಕ್ಕೊಳಗಾದಾಗ, ದುರುದ್ದೇಶವಿದ್ದರೂ, ಅವರು "ದುರುದ್ದೇಶವನ್ನು ಊಹಿಸುತ್ತಿದ್ದಾರೆ" ಎಂದು ಹೇಳುವುದು.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: ಹಾಥಾರ್ನ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವೆಂದರೆ ಜನರು ತಮ್ಮನ್ನು ಗಮನಿಸಲಾಗುತ್ತಿದೆ ಅಥವಾ ಅಧ್ಯಯನ ಮಾಡಲಾಗುತ್ತಿದೆ ಎಂದು ತಿಳಿದಾಗ ತಮ್ಮ ನಡವಳಿಕೆಯನ್ನು ಬದಲಾಯಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ. ನಿರ್ದಿಷ್ಟವಾಗಿ ಪರೀಕ್ಷಿಸಲಾಗುತ್ತಿರುವ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ, ಬದಲಿಗೆ ಗಮನಿಸುವಿಕೆಯ ಕ್ರಿಯೆಯು ಬದಲಾವಣೆಯನ್ನು ಉಂಟುಮಾಡಬಹುದು. ಜನರು ತಮಗೆ ದೊರೆಯುವ ಗಮನಕ್ಕೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ.
    one_liner: ಗಮನಿಸುವುದರಿಂದ ನಡವಳಿಕೆ ಬದಲಾಗುತ್ತದೆ—ಗಮನವೇ ಪರಿಣಾಮವನ್ನು ಉಂಟುಮಾಡಬಹುದು.
    try_this:
      - ಒಂದು ಹಸ್ತಕ್ಷೇಪವನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಗಮನಿಸುವಿಕೆಯು ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತಿದೆಯೇ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ.
      - ಗಮನ ಮತ್ತು ಗೌರವಿಸಲ್ಪಟ್ಟ ಭಾವನೆ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂಬುದನ್ನು ಅರಿತುಕೊಳ್ಳಿ.
      - ಗಮನವು ಬದಲಾವಣೆಯನ್ನು ಉಂಟುಮಾಡಿದಾಗ ನಿರ್ದಿಷ್ಟ ಹಸ್ತಕ್ಷೇಪಕ್ಕೆ ಬದಲಾವಣೆಯನ್ನು ಕಾರಣೀಕರಿಸುವಾಗ ಎಚ್ಚರಿಕೆ ವಹಿಸಿ.
    ask_yourself:
      - ಈ ಸುಧಾರಣೆಯು ಹಸ್ತಕ್ಷೇಪದಿಂದಲೋ ಅಥವಾ ಗಮನಿಸಲ್ಪಡುವುದರಿಂದಲೋ ಬಂದಿದೆಯೇ?
      - ನಾವು ಗಮನಿಸುವುದನ್ನು ನಿಲ್ಲಿಸಿದರೆ ಫಲಿತಾಂಶಗಳು ಮುಂದುವರೆಯುತ್ತವೆಯೇ?
    in_more_detail: |
      ಹಾಥಾರ್ನ್ ವರ್ಕ್ಸ್ ಸ್ಥಾವರದಲ್ಲಿ, ಸಂಶೋಧಕರು ಬೆಳಕನ್ನು ಬದಲಾಯಿಸಿದಾಗ ಉತ್ಪಾದಕತೆ ಸುಧಾರಿಸಿತು—ಅದನ್ನು ಹಿಂದಕ್ಕೆ ಬದಲಾಯಿಸಿದಾಗಲೂ ಸಹ. ನಿರ್ದಿಷ್ಟ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ, ಬದಲಿಗೆ ಗಮನ ಮತ್ತು ವೀಕ್ಷಣೆಗಳಿಂದ ಸುಧಾರಣೆಯು ಬಂದಂತೆ ತೋರಿತು. ನಂತರದ ಪುನಃ ವಿಶ್ಲೇಷಣೆಯು ಪರಿಣಾಮವನ್ನು ಅತಿಯಾಗಿ ಹೇಳಿರಬಹುದು ಎಂದು ಸೂಚಿಸಿತು, ಆದರೆ ಈ ಪರಿಕಲ್ಪನೆಯು ಉಪಯುಕ್ತವಾಗಿದೆ: ಅಧ್ಯಯನಕ್ಕೊಳಪಡುವುದು ನಡವಳಿಕೆಯನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ.

      ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವು ಸಂಶೋಧನೆ ಮತ್ತು ಮೌಲ್ಯಮಾಪನವನ್ನು ಸಂಕೀರ್ಣಗೊಳಿಸುತ್ತದೆ. ಇದು ಹಸ್ತಕ್ಷೇಪಗಳ ಸ್ಪಷ್ಟ ಪರಿಣಾಮವನ್ನು ಹೆಚ್ಚಿಸಬಹುದು. ಇದು ಗಮನ ಮತ್ತು ಗೌರವಿಸಲ್ಪಟ್ಟ ಭಾವನೆ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂಬುದನ್ನೂ ಸೂಚಿಸುತ್ತದೆ—ನಿರ್ವಹಣೆಗಾಗಿ ಒಂದು ಪಾಠ.
    why_this_is_important: |
      ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಸಂಶೋಧನೆಯ ಫಲಿತಾಂಶಗಳನ್ನು ಅರ್ಥೈಸಲು, ಉತ್ತಮ ಪ್ರಯೋಗಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಲು ಮತ್ತು ಗಮನವೇ ಬದಲಾವಣೆಯನ್ನು ಉಂಟುಮಾಡಬಹುದು ಎಂಬುದನ್ನು ಗುರುತಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನಿರ್ವಹಣೆಯಲ್ಲಿ, ಜನರಿಗೆ ಗಮನ ಕೊಡುವುದು ನಿರ್ದಿಷ್ಟ ಹಸ್ತಕ್ಷೇಪದಷ್ಟೇ ಮುಖ್ಯವಾಗಬಹುದು ಎಂದು ಇದು ಸೂಚಿಸುತ್ತದೆ.
    when_to_use:
      - ನಾಯಕತ್ವ
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಕಲಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
    how_can_you_spot_it:
      observation_induced_change: |
        ಜನರು ತಮ್ಮನ್ನು ನೋಡಲಾಗುತ್ತಿದೆ ಅಥವಾ ಅಧ್ಯಯನ ಮಾಡಲಾಗುತ್ತಿದೆ ಎಂದು ತಿಳಿದಾಗ ನಡವಳಿಕೆ ಬದಲಾಗುತ್ತದೆ.
      attention_effect: |
        ಗಮನ ಕೊಡುವ ಕ್ರಿಯೆಯು ಕೇವಲ ನಿರ್ದಿಷ್ಟ ಬದಲಾವಣೆಯಿಂದಲ್ಲ, ಸುಧಾರಣೆಯನ್ನು ಉಂಟುಮಾಡುತ್ತದೆ.
      placebo_analog: |
        ಪ್ಲೇಸಿಬೋ (placebo) ನಂತೆ, ಅಧ್ಯಯನಕ್ಕೊಳಪಡುವ "ಚಿಕಿತ್ಸೆ" ಪರಿಣಾಮಗಳನ್ನು ಹೊಂದಬಹುದು.
      short_term_improvement: |
        ಗಮನವು ಕೊನೆಗೊಂಡಾಗ ಸುಧಾರಣೆಗಳು ಮರೆಯಾಗಬಹುದು.
    examples:
      workplace_studies: |
        ಒಂದು ಅಧ್ಯಯನದ ಸಮಯದಲ್ಲಿ ಉತ್ಪಾದಕತೆ ಹೆಚ್ಚಾಗುತ್ತದೆ—ಹೊಸ ಪ್ರಕ್ರಿಯೆಯಿಂದಲೋ ಅಥವಾ ಯಾರಾದರೂ ನೋಡುತ್ತಿದ್ದಾರೆ ಎಂಬ ಸಂಗತಿಯಿಂದಲೋ?
      medical_trials: |
        ಪ್ಲೇಸಿಬೋ ಗುಂಪುಗಳು ಸುಧಾರಿಸುತ್ತವೆ—ಭಾಗಶಃ ಅವರು ಗಮನ ಪಡೆಯುತ್ತಿರುವುದರಿಂದ.
      education: |
        ಸಂಶೋಧಕರು ಇದ್ದಾಗ ವಿದ್ಯಾರ್ಥಿಗಳು ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಾರೆ—"ವೀಕ್ಷಕ ಪರಿಣಾಮ".
      management: |
        ನಿರ್ವಹಣೆಯು ಗಮನ ಹರಿಸಿದಾಗ ತಂಡಗಳು ಸುಧಾರಿಸುತ್ತವೆ—ಹೊಸ ಉಪಕ್ರಮದಿಂದಲೋ ಅಥವಾ ಗಮನದಿಂದಲೋ?
    real_world_implications: |
      ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವು ಸಂಶೋಧನೆಯ ವಿಶ್ವಾಸಾರ್ಹತೆ ಮತ್ತು ಕಾರ್ಯಕ್ರಮದ ಮೌಲ್ಯಮಾಪನದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಹಸ್ತಕ್ಷೇಪದ ಪರಿಣಾಮಗಳನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡಲು ಕಾರಣವಾಗಬಹುದು. ಇದು ಒಂದು ಸಕಾರಾತ್ಮಕ ಪಾಠವನ್ನೂ ಹೊಂದಿದೆ: ಗಮನ ಮತ್ತು ಅಧ್ಯಯನಕ್ಕೊಳಪಟ್ಟ ಭಾವನೆ ಸುಧಾರಣೆಗೆ ಪ್ರೇರಣೆ ನೀಡಬಹುದು—ಆದ್ದರಿಂದ ಕಾಳಜಿ ಮತ್ತು ಗೋಚರತೆ ಮುಖ್ಯ.
    professional_application:
      networking_and_relationship_building: |
        ಜನರಿಗೆ ಗಮನ ಕೊಡುವುದು ಅವರ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸಬಹುದು—ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವು ಗಮನಿಸಲ್ಪಟ್ಟ ಮತ್ತು ಗೌರವಿಸಲ್ಪಟ್ಟ ಭಾವನೆ ಮುಖ್ಯವೆಂದು ಸೂಚಿಸುತ್ತದೆ. ಇದನ್ನು ಸಕಾರಾತ್ಮಕವಾಗಿ ಬಳಸಿ: ನಿಯಮಿತ ಪರಿಶೀಲನೆಗಳು, ಗೋಚರತೆ ಮತ್ತು ಮನ್ನಣೆ.
      collaborative_learning_initiative: |
        ಹಸ್ತಕ್ಷೇಪಗಳನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ನಿಯಂತ್ರಣ ಗುಂಪುಗಳನ್ನು ಬಳಸಿ ಮತ್ತು ಸುಧಾರಣೆಗಳು ಹಸ್ತಕ್ಷೇಪದಿಂದಲೋ ಅಥವಾ ಅದು ತರುವ ಗಮನದಿಂದಲೋ ಆಗಿದೆಯೇ ಎಂದು ಪರಿಗಣಿಸಿ. ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವು ಸ್ಪಷ್ಟ ಯಶಸ್ಸನ್ನು ಹೆಚ್ಚಿಸಬಹುದು.
    how_can_this_be_misapplied:
      surveillance_justification: |
        ನಿರಂತರ ಮೇಲ್ವಿಚಾರಣೆಯನ್ನು ಸಮರ್ಥಿಸಲು "ಹಾಥಾರ್ನ್ ಪರಿಣಾಮ" ವನ್ನು ಬಳಸುವುದು—ಗಮನವು ವಿಶ್ವಾಸ ಮತ್ತು ಅಂತರ್ಗತ ಪ್ರೇರಣೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಬಹುದು.
      dismissing_improvements: |
        ಅಧ್ಯಯನಗಳ ಸಮಯದಲ್ಲಿನ ಎಲ್ಲಾ ಸುಧಾರಣೆಗಳನ್ನು ಹಾಥಾರ್ನ್ ಎಂದು ಊಹಿಸುವುದು—ಕೆಲವೊಮ್ಮೆ ಹಸ್ತಕ್ಷೇಪಗಳು ನಿಜವಾಗಿಯೂ ಕೆಲಸ ಮಾಡುತ್ತವೆ.
      overgeneralization: |
        ಮೂಲ ಹಾಥಾರ್ನ್ ಅಧ್ಯಯನಗಳನ್ನು ಪ್ರಶ್ನಿಸಲಾಗಿದೆ; ಪರಿಣಾಮವು ಹಿಂದೆ ಭಾವಿಸಿದ್ದಕ್ಕಿಂತ ಚಿಕ್ಕದಾಗಿರಬಹುದು ಅಥವಾ ವಿಭಿನ್ನವಾಗಿರಬಹುದು.
      manipulation: |
        ನಡವಳಿಕೆಯನ್ನು ಕುಶಲತೆಯಿಂದ ನಿರ್ವಹಿಸಲು ಸುಳ್ಳು "ಗಮನ" ವನ್ನು ರಚಿಸುವುದು.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತ
    quick_introduction: |
      ಯಾವುದೇ ಘಟನೆ ನಡೆದ ನಂತರ, ನಾವು ಅದನ್ನು ಊಹಿಸಿದ್ದೇವೆ ಅಥವಾ ನಿರೀಕ್ಷಿಸಿದ್ದೇವೆ ಎಂದು ನಂಬುವ ಪ್ರವೃತ್ತಿಯೇ ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತ (ಅಥವಾ "ನನಗೆ ಮೊದಲೇ ತಿಳಿದಿತ್ತು" ಎಂಬ ಪರಿಣಾಮ). ಆಗಿದ್ದ ಫಲಿತಾಂಶಗಳು ಎಷ್ಟೇ ಅನಿವಾರ್ಯವಾಗಿದ್ದರೂ, ಅವನ್ನು ನಾವು ಆ ರೀತಿಯಲ್ಲಿಯೇ ನಿರೀಕ್ಷಿಸಿದ್ದೆವು ಎಂದು ಪುನರ್ನಿರ್ಮಿಸುತ್ತೇವೆ.
    one_liner: ಘಟನೆ ನಡೆದ ನಂತರ, ನಮಗೆ ಮೊದಲೇ ತಿಳಿದಿತ್ತು ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ.
    try_this:
      - ಹಿಂದಿನ ನಿರ್ಧಾರಗಳನ್ನು ನಿರ್ಣಯಿಸುವ ಮೊದಲು, ಹೀಗೆ ಕೇಳಿ: ಆ ಸಮಯದಲ್ಲಿ ಅವರಿಗೆ ಏನೂ ತಿಳಿದಿತ್ತು?
      - ಫಲಿತಾಂಶಗಳು ಬರುವ ಮೊದಲು ನಿಮ್ಮ ಊಹೆಗಳನ್ನು ಬರೆದಿಡಿ—ನಂತರ ಹೋಲಿಕೆ ಮಾಡಿ.
      - ಕಳೆದ ಘಟನೆಗಳು ಅನಿವಾರ್ಯವಾಗಿದ್ದವು ಎಂದು ನೀವು ಮಾಡುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ಆ ಸಮಯದಲ್ಲಿ ಲಭ್ಯವಿಲ್ಲದ ಮಾಹಿತಿಯಿಂದ ನಾನು ನಿರ್ಣಯಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ನಿಜವಾಗಿಯೂ ಇದನ್ನು ಊಹಿಸಿದ್ದೇನೆಯೇ, ಅಥವಾ ಈಗ ಅದು ಸ್ಪಷ್ಟವಾಗಿ ಕಾಣುತ್ತಿದೆಯೇ?
    in_more_detail: |
      ಫಲಿತಾಂಶ ತಿಳಿದ ನಂತರ, ಅದು ಸ್ಪಷ್ಟವಾಗಿ ಕಾಣುತ್ತದೆ. ನಾವು ಮೊದಲು ಅನುಭವಿಸಿದ ಅನಿಶ್ಚಿತತೆಯನ್ನು ಮರೆಯುತ್ತೇವೆ. ಈ ಪಕ್ಷಪಾತವು ಕಲಿಕೆಯನ್ನು ತಿರುಚುತ್ತದೆ—ನಮಗೆ ಏನೂ ತಿಳಿದಿರದಿದ್ದರೂ, ನಾವು ಏನನ್ನೋ "ತಿಳಿದಿದ್ದೆವು" ಎಂದು ಭಾವಿಸುತ್ತೇವೆ, ಆದ್ದರಿಂದ ನಾವು ನಮ್ಮ ಮಾದರಿಗಳನ್ನು ನವೀಕರಿಸುವುದಿಲ್ಲ. ಇದು ಅನ್ಯಾಯದ ದೋಷಕ್ಕೂ ಕಾರಣವಾಗುತ್ತದೆ: ಭವಿಷ್ಯವು ನಿಜವಾಗಿಯೂ ಅನಿಶ್ಚಿತವಾಗಿದ್ದಾಗ "ಅವರಿಗೆ ಇದು ಬರಬೇಕಿತ್ತು ಎಂದು ತಿಳಿಯಬೇಕಿತ್ತು".

      ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತವು ಮರಣೋತ್ತರ ವಿಶ್ಲೇಷಣೆಗಳು, ಕಾನೂನು ತೀರ್ಪುಗಳು ಮತ್ತು ಐತಿಹಾಸಿಕ ವಿಶ್ಲೇಷಣೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಆ ಸಮಯದಲ್ಲಿ ಲಭ್ಯವಿಲ್ಲದ ಮಾಹಿತಿಯೊಂದಿಗೆ ಹಿಂದಿನ ನಿರ್ಧಾರಗಳನ್ನು ನಿರ್ಣಯಿಸುತ್ತೇವೆ.
    why_this_is_important: |
      ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಫಲಿತಾಂಶಗಳಿಂದ ಕಲಿಕೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ, ನಿರ್ಧಾರಗಳ ನ್ಯಾಯಯುತ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು ಹೆಚ್ಚು ನಿಖರವಾದ ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನ ಮಾಡಬಹುದು. ಇದು ನಮ್ಮ ಊಹಾ ಸಾಮರ್ಥ್ಯಗಳ ಬಗ್ಗೆ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ತಡೆಯುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಕಲಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ನಾಯಕತ್ವ
    how_can_you_spot_it:
      inevitability_feeling: |
        ಘಟನೆ ನಡೆದ ನಂತರ, ಅದು "ಆಗಲೇಬೇಕು" ಎಂದು ಅನಿಸುತ್ತದೆ.
      reconstructed_certainty: |
        ಘಟನೆಗೆ ಮೊದಲು ನಾವು ನಿಜವಾಗಿಯೂ ಇದ್ದಕ್ಕಿಂತ ಹೆಚ್ಚು ಖಚಿತವಾಗಿದ್ದೆವು ಎಂದು ನಾವು ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
      blame_for_failure: |
        ಫಲಿತಾಂಶವು ನಿಜವಾಗಿಯೂ ಅನಿಶ್ಚಿತವಾಗಿದ್ದಾಗ "ಅವರಿಗೆ ತಿಳಿದಿರಬೇಕು".
      undervaluing_luck: |
        ಅದೃಷ್ಟವು ಪಾತ್ರ ವಹಿಸಿದ್ದಾಗ ಫಲಿತಾಂಶಗಳನ್ನು ಕೌಶಲ್ಯ ಅಥವಾ ದೂರದೃಷ್ಟಿಗೆ ಕಾರಣವಾಗಿಸುತ್ತದೆ.
    examples:
      investing: |
        ಮಾರುಕಟ್ಟೆ ಕುಸಿದ ನಂತರ "ಮಾರುಕಟ್ಟೆ ಕುಸಿಯುತ್ತದೆ ಎಂದು ನನಗೆ ತಿಳಿದಿತ್ತು"—ಆದರೆ ನೀವು ಮೊದಲೇ ಆ "ಜ್ಞಾನ"ದ ಆಧಾರದ ಮೇಲೆ ಕಾರ್ಯನಿರ್ವಹಿಸಲಿಲ್ಲ.
      project_failures: |
        ಮರಣೋತ್ತರ ವಿಶ್ಲೇಷಣೆಯಲ್ಲಿ "ಅಪಾಯಗಳನ್ನು ನಾವು ಮೊದಲೇ ಊಹಿಸಬೇಕಿತ್ತು" ಎಂದು ಹೇಳುವುದು, ಆದರೆ ಅಪಾಯಗಳು ನಿಜವಾಗಿಯೂ ಅಸ್ಪಷ್ಟವಾಗಿದ್ದವು.
      elections: |
        ಆಶ್ಚರ್ಯಕರ ಫಲಿತಾಂಶದ ನಂತರ, ನಿರೂಪಕರು ಹಿಂದಿನ ಅರಿವಿನಿಂದ ಅದು "ಸ್ಪಷ್ಟ" ಎಂದು ವಿವರಿಸುತ್ತಾರೆ.
      medical: |
        ಅಪರೂಪದ ಸ್ಥಿತಿಯನ್ನು ರೋಗನಿರ್ಣಯ ಮಾಡಿದ ನಂತರ, "ಸೂಚನೆಗಳು ಮೊದಲೇ ಇದ್ದವು" ಎಂದು ಹೇಳುವುದು.
    real_world_implications: |
      ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತವು ಕಾನೂನು ಹೊಣೆಗಾರಿಕೆ, ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು ಕಲಿಕೆಯನ್ನು ತಿರುಚುತ್ತದೆ. ಇದು ನಮ್ಮ ನಿರ್ಣಯದಲ್ಲಿ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಮೂಡಿಸುತ್ತದೆ ಮತ್ತು ಸೀಮಿತ ಮಾಹಿತಿಯೊಂದಿಗೆ ಸಮಂಜಸವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಂಡವರಿಗೆ ಅನ್ಯಾಯ ಮಾಡುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಇತರರ ಹಿಂದಿನ ನಿರ್ಧಾರಗಳನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಆಗ ತಿಳಿದಿದ್ದನ್ನು ಮತ್ತು ಈಗ ನಿಮಗೆ ತಿಳಿದಿರುವುದನ್ನು ಪ್ರಜ್ಞಾಪೂರ್ವಕವಾಗಿ ಪ್ರತ್ಯೇಕಿಸಿ. ನೀವು ನಿಜವಾಗಿಯೂ ಫಲಿತಾಂಶವನ್ನು ಊಹಿಸದಿದ್ದಾಗ "ನಾನು ನಿಮಗೆ ಹೇಳಿದ್ದೆ" ಎಂದು ಹೇಳುವುದನ್ನು ತಪ್ಪಿಸಿ.
      collaborative_learning_initiative: |
        ಮರಣೋತ್ತರ ವಿಶ್ಲೇಷಣೆಗಳಲ್ಲಿ, ನಿರ್ಧಾರದ ಸಮಯದಲ್ಲಿ ಅನಿಶ್ಚಿತತೆಯನ್ನು ಸೆರೆಹಿಡಿಯಲು "ಪೂರ್ವ-ಮರಣೋತ್ತರ" ಅಥವಾ "ನಿರ್ಧಾರ ಜರ್ನಲ್" ತಂತ್ರಗಳನ್ನು ಬಳಸಿ. ನಿಜವಾದ ಅನಿಶ್ಚಿತತೆಯನ್ನು ಹಿಂದಿನ ಅರಿವಿನ ಪುನರ್ನಿರ್ಮಾಣದೊಂದಿಗೆ ಹೋಲಿಸಿ.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        ಕೆಲವು ಊಹಿಸಬಹುದಾದ ಸಂದರ್ಭಗಳಲ್ಲಿಯೂ, ಪ್ರತಿ ವೈಫಲ್ಯವನ್ನು "ಊಹಿಸಲಾಗದ" ಎಂದು ವಜಾ ಮಾಡುವುದು.
      no_accountability: |
        ನಿರ್ಲಕ್ಷ್ಯಕ್ಕಾಗಿ ಜನರನ್ನು ಹೊಣೆಗಾರರನ್ನಾಗಿ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತವನ್ನು ಬಳಸುವುದು.
      false_uncertainty: |
        ನಾವು ಏನನ್ನೂ ಊಹಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ ಎಂದು ನಂಬುವಂತೆ ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
      undermining_learning: |
        "ಹಿಂದಿನ ಅರಿವು 20/20" ಎಂಬ ಕಾರಣದಿಂದ ಪಾಠಗಳನ್ನು ಹೊರತೆಗೆಯಲು ನಿರಾಕರಿಸುವುದು—ಫಲಿತಾಂಶಗಳಿಂದ ನಾವು ಇನ್ನೂ ಕಲಿಯಬಹುದು.
    related_content:
