  - id: probabilistic_thinking
    name: ಸಂಭವನೀಯ ಚಿಂತನೆ
    quick_introduction: |
      ಸಂಭವನೀಯ ಚಿಂತನೆಯು ನಿಶ್ಚಿತತೆಗಳ ಬದಲಿಗೆ ಸಂಭವನೀಯತೆಗಳ ವಿಷಯದಲ್ಲಿ ತರ್ಕಿಸುವ ಅಭ್ಯಾಸವಾಗಿದೆ. "ಇದು ಸಂಭವಿಸುತ್ತದೆಯೇ?" ಎಂಬುದರ ಬದಲಿಗೆ, ನಾವು "ಇದು ಎಷ್ಟು ಸಂಭವನೀಯತೆ?" ಎಂದು ಕೇಳುತ್ತೇವೆ. ಇದು ಅನಿಶ್ಚಿತತೆಯನ್ನು ಅಪ್ಪಿಕೊಳ್ಳುತ್ತದೆ ಮತ್ತು ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಬಳಸುತ್ತದೆ.
    one_liner: ನಿಶ್ಚಿತತೆಗಳಲ್ಲ, ಸಂಭವನೀಯತೆಗಳಲ್ಲಿ ಯೋಚಿಸಿ - ಅನಿಶ್ಚಿತತೆಯನ್ನು ಅಪ್ಪಿಕೊಳ್ಳಿ.
    try_this:
      - ಇದು ಸಂಭವಿಸುತ್ತದೆಯೇ? ಬದಲಿಗೆ "ಇದು ಎಷ್ಟು ಸಂಭವನೀಯತೆ?" ಎಂದು ಬದಲಾಯಿಸಿ.
      - ಅನೇಕ ಸನ್ನಿವೇಶಗಳನ್ನು ಪರಿಗಣಿಸಿ ಮತ್ತು ಅಂದಾಜು ಸಂಭವನೀಯತೆಗಳನ್ನು ನಿಗದಿಪಡಿಸಿ.
      - ಹೊಸ ಪುರಾವೆಗಳು ಬಂದಾಗ ನಿಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಿ.
    ask_yourself:
      - ಸಂಭವನೀಯತೆಗಳು ಹೆಚ್ಚು ನಿಖರವಾದಾಗ ನಾನು ದ್ವಿಮಾನ ರೀತಿಯಲ್ಲಿ ಯೋಚಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಸಮಂಜಸವಾದ ಫಲಿತಾಂಶಗಳ ವ್ಯಾಪ್ತಿ ಏನು?
    in_more_detail: |
      ಹೆಚ್ಚಿನ ನೈಜ-ಪ್ರಪಂಚದ ಫಲಿತಾಂಶಗಳು ಅನಿಶ್ಚಿತವಾಗಿರುತ್ತವೆ. ಸಂಭವನೀಯ ಚಿಂತನೆಯು ದ್ವಿಮಾನ ಹೌದು/ಇಲ್ಲ ಬದಲಿಗೆ ಪದವಿ ನಂಬಿಕೆಗಳನ್ನು ಬದಲಿಸುತ್ತದೆ. ಇದು ಅನೇಕ ಸನ್ನಿವೇಶಗಳನ್ನು ಪರಿಗಣಿಸುವುದು, ಅಂದಾಜು ಸಂಭವನೀಯತೆಗಳನ್ನು ನಿಗದಿಪಡಿಸುವುದು ಮತ್ತು ಪುರಾವೆಗಳು ಬಂದಂತೆ ನವೀಕರಿಸುವುದು ಒಳಗೊಂಡಿರುತ್ತದೆ. ಇದು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ ಮತ್ತು ಕಪ್ಪು-ಬಿಳಿ ಚಿಂತನೆಗೆ ವಿರುದ್ಧವಾಗಿದೆ.

      ಪ್ರಮುಖ ಅಭ್ಯಾಸಗಳು: ವ್ಯಾಪ್ತಿಗಳಲ್ಲಿ ಯೋಚಿಸುವುದು, ಮೂಲ ದರಗಳನ್ನು ಪರಿಗಣಿಸುವುದು, ಪುರಾವೆಗಳೊಂದಿಗೆ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸುವುದು ಮತ್ತು ಅಪಾಯ (ತಿಳಿದಿರುವ ಸಂಭವನೀಯತೆಗಳು) ಮತ್ತು ಅನಿಶ್ಚಿತತೆ (ತಿಳಿಯದ ಸಂಭವನೀಯತೆಗಳು) ನಡುವೆ ವ್ಯತ್ಯಾಸ ಮಾಡುವುದು. ಇದು ಮಾಪನಾಂಕವನ್ನು ಮತ್ತು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ.
    why_this_is_important: |
      ಸಂಭವನೀಯ ಚಿಂತನೆಯು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ, ಮುನ್ಸೂಚನೆಗಳನ್ನು ಸುಧಾರಿಸುತ್ತದೆ ಮತ್ತು ಅನಿಶ್ಚಿತತೆಯ ಅಡಿಯಲ್ಲಿ ಉತ್ತಮ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ಹೂಡಿಕೆ, ಕಾರ್ಯತಂತ್ರ ಮತ್ತು ಭವಿಷ್ಯವು ಅನಿಶ್ಚಿತವಾಗಿರುವ ಯಾವುದೇ ಡೊಮೇನ್‌ಗೆ ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಹೂಡಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹರಣೆ
    how_can_you_spot_it:
      likelihood_language: |
        "ಖಂಡಿತ" ಅಥವಾ "ಖಂಡಿತವಲ್ಲ" ಬದಲಿಗೆ "ಬಹುಶಃ," "ಸಂಭವನೀಯತೆ," "ಅಸಂಭವನೀಯತೆ."
      scenario_thinking: |
        ಅಂದಾಜು ಸಂಭವನೀಯತೆಗಳೊಂದಿಗೆ ಅನೇಕ ಸಂಭಾವ್ಯ ಭವಿಷ್ಯಗಳನ್ನು ಪರಿಗಣಿಸುವುದು.
      calibration: |
        ಕಾಲಾನಂತರದಲ್ಲಿ ನಿಜವಾದ ಫಲಿತಾಂಶದ ಆವರ್ತನಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವ ಮುನ್ಸೂಚನೆಗಳು.
      uncertainty_acknowledgment: |
        ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ ಎಂಬುದನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಹೇಳುವುದು.
    examples:
      forecasting: |
        "ನಾವು ಗಡುವನ್ನು ತಲುಪುವ 60% ಸಂಭವನೀಯತೆ ಇದೆ" ಬದಲಿಗೆ "ನಾವು ಗಡುವನ್ನು ತಲುಪುತ್ತೇವೆ."
      investing: |
        "ಇದಕ್ಕೆ 2x ಆಗುವ 30% ಸಂಭವನೀಯತೆ ಮತ್ತು -50% ಆಗುವ 70% ಸಂಭವನೀಯತೆ ಇದೆ" ಬದಲಿಗೆ
        "ಇದು ಗಗನಕ್ಕೇರುತ್ತದೆ."
      strategy: |
        ಅಂದಾಜು ಸಂಭವನೀಯತೆಗಳೊಂದಿಗೆ ಅನೇಕ ಸನ್ನಿವೇಶಗಳಿಗಾಗಿ (ಉತ್ತಮ, ಮೂಲ, ಕೆಟ್ಟ ಸಂದರ್ಭ) ಯೋಜನೆ ಮಾಡುವುದು.
      hiring: |
        "ಸಂದರ್ಶನದ ಆಧಾರದ ಮೇಲೆ, ಅವರು ಯಶಸ್ವಿಯಾಗುವ 70% ಸಂಭವನೀಯತೆ ಇದೆ" ಬದಲಿಗೆ
        "ಅವರು ಉತ್ತಮ ನೇಮಕಾತಿ."
    real_world_implications: |
      ಸಂಭವನೀಯ ಚಿಂತನೆಯು ಮಾಪನಾಂಕವನ್ನು ಸುಧಾರಿಸುತ್ತದೆ, ಆಶ್ಚರ್ಯವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಮತ್ತು ಉತ್ತಮ ಅಪಾಯ ನಿರ್ವಹಣೆಯನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ. ಇದು ಪರಿಣಾಮಕಾರಿ ಮುನ್ಸೂಚನೆ ಮತ್ತು ಅನಿಶ್ಚಿತತೆಯ ಅಡಿಯಲ್ಲಿ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಗೆ ಕೇಂದ್ರವಾಗಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಅವಶ್ಯಕವಿದ್ದಾಗ ಸಂಭವನೀಯತೆಗಳಲ್ಲಿ ಸಂವಹನ ಮಾಡಿ - "ನಾನು ಹೆಚ್ಚು ವಿಶ್ವಾಸ ಹೊಂದಿದ್ದೇನೆ" ವಿ.ಎಸ್.
        "ನಾನು ಖಚಿತ." ಇದು ಜ್ಞಾನಶಾಸ್ತ್ರದ ವಿನಮ್ರತೆಯನ್ನು ಸೂಚಿಸುವ ಮೂಲಕ ವಿಶ್ವಾಸವನ್ನು ನಿರ್ಮಿಸುತ್ತದೆ.
      collaborative_learning_initiative: |
        ತಂಡಗಳನ್ನು ಅನಿಶ್ಚಿತತೆಯನ್ನು ವ್ಯಕ್ತಪಡಿಸಲು ಪ್ರೋತ್ಸಾಹಿಸಿ. ಸಂಭವನೀಯ ತೀರ್ಪನ್ನು ಸುಧಾರಿಸಲು ಮುನ್ಸೂಚನೆ ಮಾರುಕಟ್ಟೆಗಳು ಅಥವಾ ಮಾಪನಾಂಕ ಅಭ್ಯಾಸಗಳನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      false_precision: |
        ಅಷ್ಟು ನಿಖರವಾಗಿರಲು ಸಾಧ್ಯವಿಲ್ಲದಿದ್ದಾಗ ನಿಖರವಾದ ಸಂಭವನೀಯತೆಗಳನ್ನು (ಉದಾ., 73%) ನಿಗದಿಪಡಿಸುವುದು.
      analysis_paralysis: |
        "ನಾವು ಖಚಿತವಾಗಿ ಹೇಳಲು ಸಾಧ್ಯವಿಲ್ಲ" ಎಂಬ ಕಾರಣಕ್ಕೆ ಎಂದಿಗೂ ಕಾರ್ಯನಿರ್ವಹಿಸದಿರುವುದು.
      hedging_overuse: |
        ಪ್ರತಿಯೊಂದನ್ನೂ ಅನುಪಯುಕ್ತ ಸ್ಥಿತಿಗೆ ಅರ್ಹತೆ ನೀಡುವುದು.
      dismissing_intuition: |
        ಬಲವಾದ ಆಂತರಿಕ ಭಾವನೆಗಳು ಮಾನ್ಯ ಮಾಹಿತಿಯನ್ನು ಹೊಂದಿರಬಹುದಾದಾಗ ಅವುಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸಲು ಅತಿಯಾಗಿ ಸರಿಪಡಿಸುವುದು.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮ (ಅಥವಾ ರೋಸೆಂತಲ್ ಪರಿಣಾಮ) ಎಂದರೆ ಹೆಚ್ಚಿನ
      ನಿರೀಕ್ಷೆಗಳು ಸುಧಾರಿತ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಕಾರಣವಾಗುವ ವಿದ್ಯಮಾನವಾಗಿದೆ. ಶಿಕ್ಷಕರು, ವ್ಯವಸ್ಥಾಪಕರು, ಅಥವಾ
      ಇತರರು ಒಬ್ಬರಿಂದ ಹೆಚ್ಚಿನದನ್ನು ನಿರೀಕ್ಷಿಸಿದಾಗ, ಆ ವ್ಯಕ್ತಿ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ.
      ನಿರೀಕ್ಷೆಗಳು ಸ್ವಯಂ-ಪೂರೈಸುವ ಭವಿಷ್ಯಗಳಾಗುತ್ತವೆ.
    one_liner: ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳು ಉತ್ತಮ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಕಾರಣವಾಗುತ್ತವೆ—ನಿರೀಕ್ಷೆಗಳು ವಾಸ್ತವವನ್ನು ರೂಪಿಸುತ್ತವೆ.
    try_this:
      - ಹೆಚ್ಚಿನದಾಗಿ ಆದರೆ ಸಾಧಿಸಬಹುದಾದ ನಿರೀಕ್ಷೆಗಳನ್ನು ಹೊಂದಿರಿ; ಅವುಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ತಿಳಿಸಿ.
      - ಕಡಿಮೆ ನಿರೀಕ್ಷೆಗಳು ಯಾರೊಬ್ಬರ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಹೇಗೆ ನಿರ್ಬಂಧಿಸಬಹುದು ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
      - ಕೇಳಿ: ನಾನು ಅಪ್ರತ್ಯಕ್ಷವಾಗಿ ಏನನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತಿದ್ದೇನೆ—ಮತ್ತು ಅದು ಫಲಿತಾಂಶಗಳನ್ನು ಹೇಗೆ ಪ್ರಭಾವಿತಗೊಳಿಸಬಹುದು?
    ask_yourself:
      - ನನ್ನ ನಿರೀಕ್ಷೆಗಳು ಈ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತಿವೆಯೇ ಅಥವಾ ನಿರ್ಬಂಧಿಸುತ್ತಿವೆಯೇ?
      - ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳು ನಾನು ಅವರನ್ನು ನಡೆಸಿಕೊಳ್ಳುವ ವಿಧಾನವನ್ನು—ಮತ್ತು ಅವರ ಫಲಿತಾಂಶಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತವೆಯೇ?
    in_more_detail: |
      ರಾಬರ್ಟ್ ರೋಸೆಂತಲ್ ಮತ್ತು ಲೆನೋರ್ ಜಾಕೋಬ್ಸನ್ ಶಿಕ್ಷಕರಿಗೆ ಕೆಲವು ವಿದ್ಯಾರ್ಥಿಗಳು ಶೈಕ್ಷಣಿಕವಾಗಿ "ಅರಳುತ್ತಾರೆ" ಎಂಬ ಸುಳ್ಳು ಮಾಹಿತಿಯನ್ನು ನೀಡಿದರು.
      ಆ ವಿದ್ಯಾರ್ಥಿಗಳು—ಯಾದೃಚ್ಛಿಕವಾಗಿ ಆಯ್ಕೆ ಮಾಡಲ್ಪಟ್ಟವರು—ವಾಸ್ತವವಾಗಿ ಇತರರಿಗಿಂತ ಹೆಚ್ಚು ಸುಧಾರಿಸಿದರು. ಶಿಕ್ಷಕರ ನಿರೀಕ್ಷೆಗಳು ಅವರ ನಡವಳಿಕೆಯನ್ನು (ಹೆಚ್ಚು ಗಮನ, ಬೆಚ್ಚಗಿನ ಪ್ರತಿಕ್ರಿಯೆ) ಪ್ರಭಾವಿತಗೊಳಿಸಿದವು, ಅದು
      ವಿದ್ಯಾರ್ಥಿಗಳ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸಿತು. ನಿರೀಕ್ಷೆಗಳು ವಾಸ್ತವವನ್ನು ರೂಪಿಸುತ್ತವೆ.

      ಇದರ ವಿಲೋಮ—ಕಡಿಮೆ ನಿರೀಕ್ಷೆಗಳು ಕೆಟ್ಟ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಕಾರಣವಾಗುತ್ತವೆ—ಕೆಲವೊಮ್ಮೆ ಗೋಲಂ ಪರಿಣಾಮ ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಇವೆರಡೂ ಇತರರ ಬಗ್ಗೆ ನಮ್ಮ ನಂಬಿಕೆಗಳು ಅವರ ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸಬಹುದು ಎಂದು ತೋರಿಸುತ್ತವೆ.
      ಇದು ನಾಯಕತ್ವ, ಶಿಕ್ಷಣ, ಮತ್ತು ಪೋಷಣೆಗೆ ಗಂಭೀರ ಪರಿಣಾಮಗಳನ್ನು ಬೀರುತ್ತದೆ.
    why_this_is_important: |
      ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ನಿರೀಕ್ಷೆಗಳ ಶಕ್ತಿಯನ್ನು ಬಳಸಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      ನಿಜವಾದ ರೀತಿಯಲ್ಲಿ ತಿಳಿಸಲಾದ ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳು ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸಬಹುದು. ಕಡಿಮೆ ನಿರೀಕ್ಷೆಗಳು ಸ್ವಯಂ-ಪೂರೈಸುವ ವೈಫಲ್ಯವನ್ನು ಸೃಷ್ಟಿಸಬಹುದು.
      ಇತರರ ಬಗ್ಗೆ ನಿಮ್ಮ ನಂಬಿಕೆಗಳು ಮುಖ್ಯವಾಗಿವೆ.
    when_to_use:
      - ನಾಯಕತ್ವ
      - ಸಂಬಂಧ-ನಿರ್ಮಾಣ
      - ಕಲಿಕೆ
      - ನಿರ್ಧಾರ-ಮಾಡುವಿಕೆ
    how_can_you_spot_it:
      expectation_performance_link: |
        ನಾವು ಯಾರಿಂದ ಹೆಚ್ಚು ನಿರೀಕ್ಷಿಸುತ್ತೇವೋ ಅವರು ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಾರೆ.
      differential_treatment: |
        ನಮ್ಮ ನಿರೀಕ್ಷೆಗಳ ಆಧಾರದ ಮೇಲೆ ನಾವು ಜನರನ್ನು ವಿಭಿನ್ನವಾಗಿ ನಡೆಸಿಕೊಳ್ಳುತ್ತೇವೆ—ಹೆಚ್ಚಾಗಿ
        ಅರಿವಿಲ್ಲದೆ.
      self_fulfilling_prophecy: |
        ಸಾಮರ್ಥ್ಯದ ಬಗ್ಗೆ ನಂಬಿಕೆಗಳು ಸಾಮರ್ಥ್ಯವನ್ನು ರೂಪಿಸುವ ನಡವಳಿಕೆಯನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸುತ್ತವೆ.
      teacher_student_dynamics: |
        ಶಿಕ್ಷಕರ ನಿರೀಕ್ಷೆಗಳು ವಿಭಿನ್ನವಾದ ನಡವಳಿಕೆಯ ಮೂಲಕ ವಿದ್ಯಾರ್ಥಿಗಳ ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸುತ್ತವೆ.
    examples:
      education: |
        ವಿದ್ಯಾರ್ಥಿಗಳು ಯಶಸ್ವಿಯಾಗುತ್ತಾರೆ ಎಂದು ನಿರೀಕ್ಷಿಸುವ ಶಿಕ್ಷಕರು ಹೆಚ್ಚು ಬೆಂಬಲ ನೀಡುತ್ತಾರೆ;
        ಆ ವಿದ್ಯಾರ್ಥಿಗಳು ಸುಧಾರಿಸುತ್ತಾರೆ. ವೈಫಲ್ಯವನ್ನು ನಿರೀಕ್ಷಿಸುವ ಶಿಕ್ಷಕರು
        ಅರಿವಿಲ್ಲದೆ ಅದನ್ನು ಸೃಷ್ಟಿಸಬಹುದು.
      workplace: |
        ಅಧಿಕ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ನಿರೀಕ್ಷಿಸುವ ವ್ಯವಸ್ಥಾಪಕರು ವರದಿ ಮಾಡುವವರಿಗೆ
        ಹೆಚ್ಚು ಅವಕಾಶಗಳು ಮತ್ತು ಪ್ರತಿಕ್ರಿಯೆ ನೀಡುತ್ತಾರೆ; ಕಾರ್ಯಕ್ಷಮತೆ ಸುಧಾರಿಸುತ್ತದೆ.
      parenting: |
        ಜವಾಬ್ದಾರಿಯುತವಾಗಿರಲು ನಿರೀಕ್ಷಿಸುವ ಪೋಷಕರು ತಮ್ಮ ಮಕ್ಕಳಿಗೆ
        ಹೆಚ್ಚು ಜವಾಬ್ದಾರಿ ನೀಡುತ್ತಾರೆ; ಅವರು ಅದನ್ನು ನಿರ್ವಹಿಸುತ್ತಾರೆ.
      stereotypes: |
        ಸ್ಟೀರಿಯೊಟೈಪ್ ಥ್ರೆಟ್ ಇದಕ್ಕೆ ವಿರುದ್ಧವಾಗಿದೆ—ನಕಾರಾತ್ಮಕ ನಿರೀಕ್ಷೆಗಳು
        ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ದುರ್ಬಲಗೊಳಿಸಬಹುದು.
    real_world_implications: |
      ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮವು ಶಿಕ್ಷಣ, ನಿರ್ವಹಣೆ, ಮತ್ತು
      ಸಂಬಂಧಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಬೆಂಬಲಿತ ರೀತಿಯಲ್ಲಿ ಮಾಡಿದಾಗ ನಿರೀಕ್ಷೆಗಳನ್ನು ಹೆಚ್ಚಿಸುವುದು
      ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸಬಹುದು ಎಂದು ಸೂಚಿಸುತ್ತದೆ. ಇದು ಕಡಿಮೆ ನಿರೀಕ್ಷೆಗಳು ವಿನಾಶಕಾರಿಯಾಗಿರಬಹುದು ಎಂದು ಎಚ್ಚರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಜನರ ಬಗ್ಗೆ ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳನ್ನು ಹೊಂದಿರಿ—ಮತ್ತು ಅವುಗಳನ್ನು ತಲುಪಲು ಬೆಂಬಲ ನೀಡಿ.
        ಸಾಮರ್ಥ್ಯದಲ್ಲಿ ನಂಬಿಕೆ ಇಡಿ. ನಿಮ್ಮ ನಿರೀಕ್ಷೆಗಳು ನಿಮ್ಮ ನಡವಳಿಕೆಯನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸುತ್ತವೆ, ಅದು ಅವರ ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿತಗೊಳಿಸುತ್ತದೆ.
      collaborative_learning_initiative: |
        ಹೆಚ್ಚಿನ ಬೆಂಬಲದೊಂದಿಗೆ ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳ ಸಂಸ್ಕೃತಿಗಳನ್ನು ರಚಿಸಿ.
        "ಕಡಿಮೆ ಕಾರ್ಯನಿರ್ವಹಿಸುವವರು" ಎಂದು ಜನರನ್ನು ಸ್ವಯಂ-ಪೂರೈಸುವ ರೀತಿಯಲ್ಲಿ ಲೇಬಲ್ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಿ.
        ಯಶಸ್ವಿಯಾಗುತ್ತಾರೆ ಎಂದು ನೀವು ನಿರೀಕ್ಷಿಸುವವರಲ್ಲಿ ಹೂಡಿಕೆ ಮಾಡಿ.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        ಬೆಂಬಲವಿಲ್ಲದೆ ಪೂರೈಸಲು ಅಸಾಧ್ಯವಾದ ನಿರೀಕ್ಷೆಗಳನ್ನು ಹೊಂದಿಸುವುದು ವೈಫಲ್ಯ ಮತ್ತು ನಿರುತ್ಸಾಹವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
      blame_shifting: |
        "ಅವರು ನಿರೀಕ್ಷೆಗಳನ್ನು ಪೂರೈಸಲಿಲ್ಲ" ನಾವು ಯಶಸ್ವಿಗೆ ಬೆಂಬಲ ಅಥವಾ ಪರಿಸ್ಥಿತಿಗಳನ್ನು ಒದಗಿಸದಿದ್ದಾಗ.
      ignoring_constraints: |
        ನಿರೀಕ್ಷೆಗಳು ಮಾತ್ರ ರಚನಾತ್ಮಕ ಅಡೆತಡೆಗಳನ್ನು ಮೀರುವುದಿಲ್ಲ.
      pressure_without_support: |
        ಸಂಪನ್ಮೂಲಗಳು ಅಥವಾ ಬೆಂಬಲವಿಲ್ಲದೆ ಹೆಚ್ಚಿನ ನಿರೀಕ್ಷೆಗಳು ಹಾನಿಕಾರಕವಾಗಬಹುದು.
    related_content:
