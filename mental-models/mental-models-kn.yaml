    name: ಜ್ಞಾನದ ಶಾಪ
    quick_introduction: |
      ಒಂದು ವಿಷಯ ಗೊತ್ತಾದ ನಂತರ, ಅದು ಗೊತ್ತಿಲ್ಲದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ಊಹಿಸಲು ಇರುವ ಕಷ್ಟವೇ ಜ್ಞಾನದ ಶಾಪ. ಪರಿಣಿತರು ಆರಂಭಿಕರಿಗೆ ಕಲಿಸಲು ಹೆಣಗಾಡುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ಆರಂಭಿಕರ ದೃಷ್ಟಿಕೋನವನ್ನು ಮರುಸೃಷ್ಟಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ. ಒಮ್ಮೆ ನಿಮಗೆ ಗೊತ್ತಾದ ನಂತರ, ನಿಮಗೆ ಗೊತ್ತಿರದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಮರೆತುಬಿಡುತ್ತೀರಿ.
    one_liner: ನಿಮಗೆ ಏನಾದರೂ ಗೊತ್ತಾದ ನಂತರ, ನಿಮಗೆ ಗೊತ್ತಿರದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಮರೆತುಬಿಡುತ್ತೀರಿ.
    try_this:
