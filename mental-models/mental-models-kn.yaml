    real_world_implications: |
      ಬೇಯ್ಸಿಯನ್ ಚಿಂತನೆಯು ಆಧುನಿಕ AI, ವೈದ್ಯಕೀಯ ರೋಗನಿರ್ಣಯ ಮತ್ತು ವೈಜ್ಞಾನಿಕ ಅನುಮಾನಕ್ಕೆ ಅಡಿಪಾಯವಾಗಿದೆ. ಇದು ಆರಂಭಿಕ ದರವನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದನ್ನು ಮತ್ತು ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಸರಿಪಡಿಸುತ್ತದೆ. ಅನಿಶ್ಚಿತತೆ ಹೊಂದಿರುವ ಯಾವುದೇ ಡೊಮೇನ್‌ಗೆ ಇದು ಶಕ್ತಿಯುತವಾದ ಸಾಧನವಾಗಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಸ್ಥಿರ ಮೊದಲ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಇಟ್ಟುಕೊಳ್ಳುವ ಬದಲು ಹೊಸ ಪುರಾವೆಗಳ ಆಧಾರದ ಮೇಲೆ ಜನರ ಬಗ್ಗೆ ನಿಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಿ. ಕ್ರಿಯೆಗಳನ್ನು ಅರ್ಥೈಸುವಾಗ ಆರಂಭಿಕ ದರಗಳನ್ನು (ಉದಾ., ಈ ನಡವಳಿಕೆ ಎಷ್ಟು ಸಾಮಾನ್ಯವಾಗಿದೆ?) ಪರಿಗಣಿಸಿ.
      collaborative_learning_initiative: |
        ಚರ್ಚೆಗಳ ಮೊದಲು ಪೂರ್ವಗ್ರಹಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಹೇಳಲು ತಂಡಗಳನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ, ನಂತರ ಪುರಾವೆಗಳನ್ನು ನೀಡಿದಾಗ ನವೀಕರಿಸಿ. ಆಂಕರಿಂಗ್ ಮತ್ತು ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ.
    how_can_this_be_misapplied:
      overprecision: |
        ಅನಿಶ್ಚಿತತೆ ಹೆಚ್ಚಿರುವಾಗ ನಿಖರವಾದ ಸಂಭವನೀಯತೆಗಳನ್ನು ನಿಯೋಜಿಸುವುದು.
      prior_rigidity: |
        ಬಲವಾದ ಪೂರ್ವಗ್ರಹಗಳಿಗೆ ಅಂಟಿಕೊಳ್ಳುವುದು ಮತ್ತು ಹೊಸ ಪುರಾವೆಗಳೊಂದಿಗೆ ಸಾಕಷ್ಟು ನವೀಕರಿಸದಿರುವುದು.
      base_rate_tyranny: |
        ಆರಂಭಿಕ ದರಗಳು ಸೂಚಿಸಿದರೂ ಬಲವಾದ ಪುರಾವೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು - ಕೆಲವೊಮ್ಮೆ ಪುರಾವೆಯು ಪ್ರಾಬಲ್ಯ ಸಾಧಿಸಬೇಕು.
      false_sophistication: |
        ನಿಜವಾದ ತಾರ್ಕಿಕತೆಯನ್ನು ಮಾಡದೆ ಕಠಿಣವಾಗಿ ಧ್ವನಿಸಲು ಬೇಯ್ಸಿಯನ್ ಭಾಷೆಯನ್ನು ಬಳಸುವುದು.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವು ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡಿದ ನಂತರ ಅವರು ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡುತ್ತಾರೆ ಎಂಬ ಮಾನಸಿಕ ವಿದ್ಯಮಾನವಾಗಿದೆ. ನಾವು ಇಷ್ಟಪಡುವ ಜನರಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತೇವೆ ಎಂಬ ಅಂತರ್ಜ್ಞಾನಕ್ಕೆ ವ್ಯತಿರಿಕ್ತವಾಗಿ, ನಾವು ಅನೇಕವೇಳೆ ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ಇಷ್ಟಪಡುತ್ತೇವೆ.
    one_liner: ನಾವು ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ಇಷ್ಟಪಡುತ್ತೇವೆ - ನಮ್ಮ ಮನೋಭಾವಗಳು ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಅನುಸರಿಸುತ್ತವೆ.
    try_this:
      - ನೀವು ಸಂಬಂಧವನ್ನು ಸುಧಾರಿಸಲು ಬಯಸಿದರೆ, ಸಣ್ಣ ಸಹಾಯವನ್ನು ಕೇಳುವುದನ್ನು ಪರಿಗಣಿಸಿ.
      - ಸಹಾಯ ಮಾಡುವುದು ಯಾರೊಬ್ಬರ ಬಗ್ಗೆ ನಿಮ್ಮ ಭಾವನೆಗಳನ್ನು ಹೇಗೆ ಬದಲಾಯಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗಮನಿಸಿ.
      - ಸಹಾಯ ಮಾಡಿದ ನಂತರ ಇತರರು ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡಬಹುದು ಎಂಬುದನ್ನು ಅರಿತುಕೊಳ್ಳಿ.
    ask_yourself:
      - ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡುವುದು ಅವರ ಬಗ್ಗೆ ನನ್ನ ಭಾವನೆಗಳನ್ನು ಬದಲಾಯಿಸಿದೆಯೇ?
      - ನಾನು ಅವರ ಬಗ್ಗೆ ನನ್ನ ಗೌರವವನ್ನು ಹೆಚ್ಚಿಸುವ ಮೂಲಕ ನನ್ನ ಪ್ರಯತ್ನವನ್ನು ಸಮರ್ಥಿಸಿಕೊಳ್ಳುತ್ತೇನೆಯೇ?
    in_more_detail: |
      ಬೆಂಜಮಿನ್ ಫ್ರಾಂಕ್ಲಿನ್ ತಮ್ಮ ಗ್ರಂಥಾಲಯದಿಂದ ಅಪರೂಪದ ಪುಸ್ತಕವನ್ನು ಎರವಲು ಕೇಳುವ ಮೂಲಕ ಎದುರಾಳಿ ಶಾಸಕರನ್ನು ಗೆದ್ದುಕೊಂಡ ಬಗ್ಗೆ ಪ್ರಸಿದ್ಧವಾಗಿ ವಿವರಿಸಿದ್ದಾರೆ. ಆ ವ್ಯಕ್ತಿ ಒಪ್ಪಿಕೊಂಡ ನಂತರ, ಫ್ರಾಂಕ್ಲಿನ್ ಧನ್ಯವಾದ ಹೇಳುವ ಟಿಪ್ಪಣಿಯೊಂದಿಗೆ ಅದನ್ನು ಹಿಂದಿರುಗಿಸಿದರು. ಸಂಬಂಧವು ಗಮನಾರ್ಹವಾಗಿ ಸುಧಾರಿಸಿತು. ನಮ್ಮ ಮನೋಭಾವಗಳು ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಅನುಸರಿಸುತ್ತವೆ ಎಂದು ಈ ಪರಿಣಾಮವು ಸೂಚಿಸುತ್ತದೆ: ನಾವು ಯಾರಿಗಾದರೂ ಸಹಾಯ ಮಾಡಲು ಪ್ರಯತ್ನವನ್ನು ಹೂಡಿದಾಗ, ನಾವು ಅವರ ಬಗ್ಗೆ ನಮ್ಮ ಸಕಾರಾತ್ಮಕ ಗೌರವವನ್ನು ಹೆಚ್ಚಿಸುವ ಮೂಲಕ ಆ ಪ್ರಯತ್ನವನ್ನು ಸಮರ್ಥಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.

      ಅರಿವಿನ ಸಂಘರ್ಷದ ಸಿದ್ಧಾಂತವು ಇದನ್ನು ವಿವರಿಸುತ್ತದೆ: ನಾವು ಇಷ್ಟಪಡದ ಅಥವಾ ತಟಸ್ಥರಾಗಿರುವ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡಿದಾಗ, ನಮ್ಮ ಕ್ರಿಯೆ (ಸಹಾಯ) ಮತ್ತು ನಮ್ಮ ಮನೋಭಾವ (ಅನಿಷ್ಟ) ನಡುವೆ ನಾವು ಉದ್ವಿಗ್ನತೆಯನ್ನು ಅನುಭವಿಸುತ್ತೇವೆ. ಅವರನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡುವುದರ ಮೂಲಕ ಆ ಉದ್ವಿಗ್ನತೆಯನ್ನು ಪರಿಹರಿಸುವುದು, ನಮ್ಮ ಆದ್ಯತೆಗಳ ವಿರುದ್ಧ ನಾವು ಕಾರ್ಯನಿರ್ವಹಿಸಿದ್ದೇವೆ ಎಂದು ಒಪ್ಪಿಕೊಳ್ಳುವುದಕ್ಕಿಂತ ಸುಲಭವಾಗಿದೆ.
    why_this_is_important: |
      ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಸಂಬಂಧಗಳನ್ನು ಕಾರ್ಯತಂತ್ರವಾಗಿ ನಿರ್ಮಿಸಲು ಮತ್ತು ನಿಮ್ಮ ಸ್ವಂತ ಭಾವನೆಗಳು ಹಿಂದಿನ ಸಹಾಯಗಳಿಂದ ಪ್ರಭಾವಿತವಾಗಬಹುದು ಎಂಬುದನ್ನು ಗುರುತಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಸಂಬಂಧವನ್ನು ಸುಧಾರಿಸಲು ಪ್ರಯತ್ನಿಸುವಾಗ ಸಣ್ಣ ಸಹಾಯಗಳನ್ನು ಕೇಳುವುದು ಅವುಗಳನ್ನು ನೀಡುವದಕ್ಕಿಂತ ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿರಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
      - ಮಾತುಕತೆ
      - ನಾಯಕತ್ವ
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
    how_can_you_spot_it:
      liking_after_helping: |
        ನೀವು ಯಾರೊಬ್ಬರಿಗೆ ಸಹಾಯ ಮಾಡಿದ ನಂತರ, ನೀವು ಹಿಂದೆ ತಟಸ್ಥರಾಗಿದ್ದರೂ ಅಥವಾ ನಕಾರಾತ್ಮಕವಾಗಿದ್ದರೂ, ಅವರ ಬಗ್ಗೆ ನೀವು ಬೆಚ್ಚಗಾಗುತ್ತಿರುವುದನ್ನು ಗಮನಿಸಿ.
      others_requesting_small_favors: |
        ಯಾರಾದರೂ ಸಣ್ಣ ಸಹಾಯಗಳನ್ನು ಪದೇ ಪದೇ ಕೇಳಿದಾಗ, ಅವರು ಸಂಬಂಧವನ್ನು ಬೆಳೆಸಲು ಈ ಪರಿಣಾಮವನ್ನು ಪ್ರಜ್ಞಾಪೂರ್ವಕವಾಗಿ ಅಥವಾ ಅಪ್ರಜ್ಞಾಪೂರ್ವಕವಾಗಿ ಬಳಸುತ್ತಿರಬಹುದು.
      attitude_shift_post_investment: |
        ಯಾರಿಗಾದರೂ ಸಹಾಯ ಮಾಡಲು ಸಮಯ ಅಥವಾ ಶ್ರಮವನ್ನು ಹೂಡಿದ ನಂತರ, ಅವರ ಬಗ್ಗೆ ನಿಮ್ಮ ಅಭಿಪ್ರಾಯವು ಸಕಾರಾತ್ಮಕವಾಗಿ ಬದಲಾಗಿದೆಯೇ ಎಂದು ಗಮನಿಸಿ.
      reciprocal_relationship_dynamics: |
        ಒಬ್ಬ ವ್ಯಕ್ತಿ ಅನೇಕ ಸಹಾಯಗಳನ್ನು ಮಾಡಿದ ಸಂಬಂಧಗಳು, ಕ್ರಿಯೆಯಲ್ಲಿ ಸಮತೋಲಿತವಾಗಿ ಕಾಣುತ್ತಿದ್ದರೂ, ಪ್ರೀತಿಯಲ್ಲಿ ಅಸಮತೋಲನವನ್ನು ಅನುಭವಿಸಬಹುದು.
    examples:
      networking: |
        ಒಂದು ಕರಡಿನ ಬಗ್ಗೆ ಸಹೋದ್ಯೋಗಿಗೆ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಕೇಳುವುದು, ಇದು ನಿಮ್ಮ ಯಶಸ್ಸಿನಲ್ಲಿ ಅವರನ್ನು ಹೆಚ್ಚು ತೊಡಗಿಸಿಕೊಳ್ಳಲು ಮತ್ತು ನಿಮ್ಮ ಬಗ್ಗೆ ಹೆಚ್ಚು ಸಕಾರಾತ್ಮಕವಾಗಿರಲು ಕಾರಣವಾಗುತ್ತದೆ.
      sales: |
        ಒಬ್ಬ ಮಾರಾಟಗಾರನು ಸಂಭಾವ್ಯ ಗ್ರಾಹಕನಿಗೆ ಸಣ್ಣ ಸಹಾಯವನ್ನು (ಉದಾ., ಶಿಫಾರಸು ಅಥವಾ ಪರಿಚಯ) ಕೇಳುತ್ತಾನೆ, ಇದು ಸಂಭಾವ್ಯ ಗ್ರಾಹಕನ ಬದ್ಧತೆಯನ್ನು ಮತ್ತು ಇಷ್ಟವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.
      conflict_resolution: |
        ಒಂದು ಭಿನ್ನಾಭಿಪ್ರಾಯದ ನಂತರ, ಸಂಬಂಧವಿಲ್ಲದ ಯಾವುದಕ್ಕೂ ಇತರ ಪಕ್ಷಕ್ಕೆ ಸಹಾಯ ಕೇಳುವುದರಿಂದ ಉದ್ವಿಗ್ನತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಬಹುದು ಮತ್ತು ಸೌಹಾರ್ದತೆಯನ್ನು ಪುನಃ ನಿರ್ಮಿಸಬಹುದು.
      mentoring: |
        ಒಬ್ಬ ಹಿರಿಯ ವ್ಯಕ್ತಿ ಒಬ್ಬ ಕಿರಿಯ ವ್ಯಕ್ತಿಗೆ ಒಳನೋಟ ಅಥವಾ ಸಹಾಯವನ್ನು ಕೇಳಿದಾಗ, ಕಿರಿಯ ವ್ಯಕ್ತಿಯು ಹೆಚ್ಚು ಮೌಲ್ಯಯುತ ಮತ್ತು ಸಂಪರ್ಕಿತನವನ್ನು ಅನುಭವಿಸುತ್ತಾನೆ.
    real_world_implications: |
      ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವು ನೇಮಕಾತಿ, ಮಾರಾಟ, ರಾಜತಾಂತ್ರಿಕತೆ ಮತ್ತು ದೈನಂದಿನ ಸಾಮಾಜಿಕ ವ್ಯವಸ್ಥೆಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ. ಇದನ್ನು ಸೇತುವೆಗಳನ್ನು ನಿರ್ಮಿಸಲು ನೈತಿಕವಾಗಿ ಅಥವಾ ಪ್ರೀತಿಯನ್ನು ದುರುಪಯೋಗಪಡಿಸಿಕೊಳ್ಳಲು ಅನೈತಿಕವಾಗಿ ಬಳಸಬಹುದು. ಇದನ್ನು ಗುರುತಿಸುವುದು ಅಸಮವಾದ ಸಹಾಯ-ನೀಡುವುದರ ನಂತರ ಕೆಲವು ಸಂಬಂಧಗಳು ಏಕೆ ಬಲವಾಗಿರುವುದನ್ನು ಭಾವಿಸುತ್ತವೆ ಎಂಬುದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಸಂಬಂಧಗಳನ್ನು ನಿರ್ಮಿಸುವಾಗ, ಸಹಾಯಗಳನ್ನು ಮಾತ್ರ ನೀಡುವುದಕ್ಕಿಂತ ಸಣ್ಣ, ಸಮಂಜಸವಾದ ಸಹಾಯಗಳನ್ನು ಕೇಳುವುದನ್ನು ಪರಿಗಣಿಸಿ. ಸಹಾಯ ಮಾಡುವ ಕ್ರಿಯೆಯು ಹೂಡಿಕೆ ಮತ್ತು ಸಕಾರಾತ್ಮಕ ಗೌರವವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
      collaborative_learning_initiative: |
        ತಂಡಗಳಲ್ಲಿ, ಸದಸ್ಯರು ಪರಸ್ಪರ ಸಹಾಯ ಮಾಡುವುದರಿಂದ (ಉದಾ., ಸಹೋದ್ಯೋಗಿ ವಿಮರ್ಶೆ, ಅಡ್ಡ-ತರಬೇತಿ) ಒಗ್ಗಟ್ಟನ್ನು ಬಲಪಡಿಸಬಹುದು. ಪ್ರತಿಯೊಬ್ಬರೂ ಸಹಾಯವನ್ನು ನೀಡುವ ಮತ್ತು ಸ್ವೀಕರಿಸುವಂತೆ ಸಹಯೋಗವನ್ನು ರಚಿಸಿ.
    how_can_this_be_misapplied:
      manipulation: |
        ನಿಜವಾದ ಅಗತ್ಯವಿಲ್ಲದೆ, ಯಾರನ್ನಾದರೂ ಇಷ್ಟಪಡಿಸಲು ಮಾತ್ರ ಸಹಾಯಗಳನ್ನು ಕೇಳುವುದು, ಕಂಡುಹಿಡಿದರೆ ಶೋಷಣೆಯಂತೆ ಅನಿಸಬಹುದು.
      overreliance_on_favors: |
        ಸಂಬಂಧವನ್ನು ಸರಿಪಡಿಸಲು ಸಹಾಯಗಳು ಮಾತ್ರ ಸಾಕು ಎಂದು ಊಹಿಸುವುದು; ಕೆಲವು ಸಂಘರ್ಷಗಳಿಗೆ ನೇರ ಸಂಭಾಷಣೆ ಮತ್ತು ಜವಾಬ್ದಾರಿ ಬೇಕಾಗುತ್ತದೆ.
      asymmetric_exploitation: |
        ಪ್ರತಿಫಲವಿಲ್ಲದೆ ಪದೇ ಪದೇ ಸಹಾಯಗಳನ್ನು ಕೇಳುವುದು ಪ್ರತಿಕೂಲವಾಗಿ ಪರಿಣಮಿಸಬಹುದು ಮತ್ತು ಅಸಮಾಧಾನವನ್ನು ಉಂಟುಮಾಡಬಹುದು.
      misattributing_motives: |
        ಯಾರೊಬ್ಬರ ಬೆಚ್ಚಗಿನ ಭಾವನೆಗಳು ಅವರಿಗೆ ನೀವು ಮಾಡಿದ ಸಹಾಯಗಳ ಫಲಿತಾಂಶವಾಗಿರಬಹುದು ಎಂದು ಊಹಿಸುವುದು; ಅದು ಸಂಪೂರ್ಣವಾಗಿ ನಿಜವಾದದ್ದು ಎಂದು ಭಾವಿಸುವುದು.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆ
    quick_introduction: |
      ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆ ಎನ್ನುವುದು ಲಭ್ಯವಿರುವ ಮಾಹಿತಿ, ಅರಿವಿನ ಸಾಮರ್ಥ್ಯ ಮತ್ತು ಸಮಯದಿಂದಾಗಿ ಮಾನವ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಯು ಸೀಮಿತವಾಗಿರುತ್ತದೆ ಎಂಬ ಕಲ್ಪನೆಯಾಗಿದೆ. ನಾವು ಸೂಕ್ತವಾಗಿರುವುದನ್ನು ಪಡೆಯುವುದಿಲ್ಲ; ನಾವು "ಸಮಧಾನಕರ" ಆಗಿರುತ್ತೇವೆ - ಅಂದರೆ ನಾವು ಸಾಧ್ಯವಾದಷ್ಟು ಉತ್ತಮವಾದುದಕ್ಕಿಂತಲೂ ಸಾಕು ಎನಿಸುವ ಆಯ್ಕೆಗಳನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
    one_liner: ನಾವು ಸಮಧಾನಕರರಾಗುತ್ತೇವೆ - ನಾವು ಉತ್ತಮವಾದುದನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತೇವೆ, ಸೂಕ್ತವಾದುದನ್ನು ಅಲ್ಲ.
    try_this:
      - ಸಾಧ್ಯವಾದಾಗ ಆಯ್ಕೆಗಳನ್ನು ಸರಳೀಕರಿಸಿ; ಅತಿಯಾದ ಆಯ್ಕೆಗಳು ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆಯನ್ನು ದಿಗ್ಭ್ರಮೆಗೊಳಿಸುತ್ತವೆ.
      - ಅಂತ್ಯವಿಲ್ಲದ ಹುಡುಕಾಟವನ್ನು ತಪ್ಪಿಸಲು ಮುಂಚಿತವಾಗಿ "ಸಾಕು" ಮಾನದಂಡಗಳನ್ನು ಹೊಂದಿಸಿ.
      - ನೀವು ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ಹಂತವನ್ನು ಮೀರಿ ಸೂಕ್ತವಾಗಿರುವುದನ್ನು ಪಡೆಯಲು ಪ್ರಯತ್ನಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ಸಾಕು ಎನಿಸುವ ಆಯ್ಕೆಯು ಮಾಡಿದರೆ, ಪರಿಪೂರ್ಣ ಆಯ್ಕೆಯನ್ನು ಹುಡುಕಲು ನಾನು ಪ್ರಯತ್ನಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನನ್ನ ನಿರ್ಧಾರವನ್ನು ಮಿತಿಗೊಳಿಸುತ್ತಿರುವ ನಿರ್ಬಂಧಗಳು (ಸಮಯ, ಮಾಹಿತಿ, ಗಮನ) ಯಾವುವು?
    in_more_detail: |
      ಹೆಬರ್ಟ್ ಸೈಮನ್ ಅವರು ಪರಿಪೂರ್ಣ ಮಾಹಿತಿಯೊಂದಿಗೆ ತರ್ಕಬದ್ಧ ನಟರ ಸಾಂಪ್ರದಾಯಿಕ ಆರ್ಥಿಕ ಊಹೆಯನ್ನು ಪ್ರಶ್ನಿಸಲು ಈ ಪರಿಕಲ್ಪನೆಯನ್ನು ಪರಿಚಯಿಸಿದರು. ವಾಸ್ತವದಲ್ಲಿ, ನಮ್ಮ ಗಮನ, ಕಾರ್ಯಕಾರಿ ಸ್ಮರಣೆ ಮತ್ತು ಸಮಯ ಸೀಮಿತವಾಗಿರುತ್ತದೆ. ಆದರ್ಶಪ್ರಾಯ ಅರ್ಥದಲ್ಲಿ ಸೂಕ್ತವಲ್ಲದಿದ್ದರೂ, ನಮ್ಮ ನಿರ್ಬಂಧಗಳ ಆಧಾರದ ಮೇಲೆ "ತರ್ಕಬದ್ಧ" ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ನಾವು ಹ್ಯೂರಿಸ್ಟಿಕ್ಸ್ ಮತ್ತು ಶಾರ್ಟ್‌ಕಟ್‌ಗಳನ್ನು ಬಳಸುತ್ತೇವೆ.

      ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆ ನಾವು ಏಕೆ ಯಾವಾಗಲೂ ಉತ್ತಮ ಆಯ್ಕೆಯನ್ನು ಆರಿಸಿಕೊಳ್ಳುವುದಿಲ್ಲ, ನಾವು ಏಕೆ ನಿಯಮಗಳನ್ನು ಅವಲಂಬಿಸಿದ್ದೇವೆ ಮತ್ತು ಸಂದರ್ಭ ಮತ್ತು ರೂಪಿಸುವಿಕೆ ಏಕೆ ಅಷ್ಟು ಮುಖ್ಯವಾಗಿದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ. ನಾವು ನಿಜವಾಗಿ ಹೇಗೆ ನಿರ್ಧರಿಸುತ್ತೇವೆ ಎಂಬುದರ ವಿವರಣಾತ್ಮಕ ಮಾದರಿ ಇದೆಯೇ ಹೊರತು, ನಾವು ಹೇಗೆ ನಿರ್ಧರಿಸಬೇಕು ಎಂಬುದಕ್ಕೆ ಇದು ಸೂಚನೆಯಲ್ಲ.
    why_this_is_important: |
      ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ಪ್ರಕ್ರಿಯೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಲು, ಇತರರಿಗೆ ಆಯ್ಕೆಗಳನ್ನು ಸರಳೀಕರಿಸಲು ಮತ್ತು ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟಕ್ಕಾಗಿ ವಾಸ್ತವಿಕ ನಿರೀಕ್ಷೆಗಳನ್ನು ಹೊಂದಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಿರ್ಬಂಧಗಳ ಅಡಿಯಲ್ಲಿ "ಅಹೇತೂಕ" ನಡವಳಿಕೆಯು ಏಕೆ ಸಾಮಾನ್ಯವಾಗಿ ತರ್ಕಬದ್ಧವಾಗಿದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಕೈಗೊಳ್ಳುವಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹಾರ
      - ನಾಯಕತ್ವ
      - ಅಪಾಯ_ಅಂದಾಜು
    how_can_you_spot_it:
      satisficing_behavior: |
        ಜನರು ಸಂಪೂರ್ಣವಾಗಿ ಹೋಲಿಕೆ ಮಾಡುವುದಕ್ಕಿಂತ ಮೊದಲ ಸ್ವೀಕಾರಾರ್ಹ ಆಯ್ಕೆಯನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತಾರೆ.
      heuristic_reliance: |
        ಪೂರ್ಣ ವಿಶ್ಲೇಷಣೆಗಿಂತ ನಿಯಮಗಳನ್ನು ಬಳಸಿಕೊಂಡು ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲಾಗುತ್ತದೆ.
      context_dependence: |
        ಆಯ್ಕೆಗಳನ್ನು ಹೇಗೆ ಪ್ರಸ್ತುತಪಡಿಸಲಾಗಿದೆ ಎಂಬುದರ ಆಧಾರದ ಮೇಲೆ ಅದೇ ವ್ಯಕ್ತಿ ವಿಭಿನ್ನ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡುತ್ತಾನೆ.
      information_overload: |
        ಅತಿಯಾದ ಮಾಹಿತಿ ಲಭ್ಯವಿದ್ದಾಗ, ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಕಡಿಮೆಯಾಗಬಹುದು.
    examples:
      hiring: |
        ಒಬ್ಬ ಮ್ಯಾನೇಜರ್ "ಅತ್ಯುತ್ತಮ" ಅಭ್ಯರ್ಥಿಯನ್ನು ಹುಡುಕಲು ಅನಂತವಾಗಿ ಸಂದರ್ಶನ ಮಾಡುವುದಕ್ಕಿಂತ, ಅರ್ಹತಾ ಮಾನದಂಡವನ್ನು ಪೂರೈಸುವ ಮೊದಲ ಅಭ್ಯರ್ಥಿಯನ್ನು ನೇಮಿಸಿಕೊಳ್ಳುತ್ತಾನೆ.
      consumer_choice: |
        ಶಾಪಿಂಗ್ ಮಾಡುವವರು ಅಂಗಡಿಯಲ್ಲಿರುವ ಪ್ರತಿ ಉತ್ಪನ್ನವನ್ನು ಹೋಲಿಕೆ ಮಾಡುವುದಕ್ಕಿಂತ, ಶೆಲ್ಫ್‌ನ ಮೊದಲ ಕೆಲವು ಆಯ್ಕೆಗಳಿಂದ ಆರಿಸಿಕೊಳ್ಳುತ್ತಾರೆ.
      policy: |
        ಮತದಾರರು ಪ್ರತಿ ನೀತಿ ನಿಲುವನ್ನು ವಿಶ್ಲೇಷಿಸುವುದಕ್ಕಿಂತ, ಪಕ್ಷದ ಸಂಬಂಧ ಅಥವಾ ಕೆಲವು ಪ್ರಮುಖ ವಿಷಯಗಳನ್ನು ಶಾರ್ಟ್‌ಕಟ್‌ಗಳಾಗಿ ಬಳಸುತ್ತಾರೆ.
      daily_routines: |
        ಜನರು ಪ್ರತಿ ನಿರ್ಧಾರವನ್ನು ಮರು-ಸೂಕ್ತಗೊಳಿಸುವುದಕ್ಕಿಂತ, ಅಭ್ಯಾಸಗಳು ಮತ್ತು ಡೀಫಾಲ್ಟ್‌ಗಳನ್ನು ಅನುಸರಿಸುತ್ತಾರೆ.
    real_world_implications: |
      ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆಯು ಮಾರುಕಟ್ಟೆಗಳು, ನೀತಿ ವಿನ್ಯಾಸ ಮತ್ತು ಸಂಸ್ಥೆಯ ನಡವಳಿಕೆಯನ್ನು ರೂಪಿಸುತ್ತದೆ. 'ನಡ್ಜಸ್' ಮತ್ತು ಆಯ್ಕೆ ವಾಸ್ತುಶಿಲ್ಪ ನಮ್ಮ ಮಿತಿಗಳನ್ನು ಲೆಕ್ಕಹಾಕುವುದರಿಂದ ಕೆಲಸ ಮಾಡುತ್ತವೆ. ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಜನರು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಬಳಸಲಾಗದ ಸಂಕೀರ್ಣ ವ್ಯವಸ್ಥೆಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಸಂ alle ತ್ತಿ ಸಂಕೀರ್ಣ ವ್ಯಾಪಾರ-ವಿನಿಮಯಗಳನ್ನು ನೈಜ ಸಮಯದಲ್ಲಿ ಸಂಸ್ಕರಿಸುವ ನಿರೀಕ್ಷೆ ಬೇಡ. ಆಯ್ಕೆಗಳನ್ನು ಸರಳೀಕರಿಸಿ ಮತ್ತು ಸ್ಪಷ್ಟ ಡೀಫಾಲ್ಟ್‌ಗಳನ್ನು ಒದಗಿಸಿ.
      collaborative_learning_initiative: |
        ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆಯೊಂದಿಗೆ ಕೆಲಸ ಮಾಡುವ ಪ್ರಕ್ರಿಯೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಿ: ಆಯ್ಕೆಗಳನ್ನು ಕಡಿಮೆ ಮಾಡಿ, ಡೀಫಾಲ್ಟ್‌ಗಳನ್ನು ಒದಗಿಸಿ ಮತ್ತು ಸಂಕೀರ್ಣ ನಿರ್ಧಾರಗಳಿಗಾಗಿ ಚೆಕ್‌ಲಿಸ್ಟ್‌ಗಳನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        ಅಪರಿಮಿತ ಅರಿವಿನ ಸಾಮರ್ಥ್ಯವನ್ನು ಊಹಿಸುವ ಪ್ರಕ್ರಿಯೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸುವುದು, ಇದು ನಿರ್ಧಾರದ ಆಯಾಸ ಮತ್ತು ಕಳಪೆ ಫಲಿತಾಂಶಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
      blaming_irrationality: |
        ನಿರ್ಬಂಧಗಳನ್ನು ಪರಿಗಣಿಸದೆ ಇತರರ ಆಯ್ಕೆಗಳನ್ನು ತರ್ಕಬಾಹಿರವೆಂದು ವಜಾ ಮಾಡುವುದು.
      exploitation: |
        ಇಚ್ಛಿತ ಫಲಿತಾಂಶಗಳ ಕಡೆಗೆ ಅವರನ್ನು ನಿರ್ದೇಶಿಸಲು ಸಂಕೀರ್ಣತೆಯಿಂದ ಜನರನ್ನು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ದಿಗ್ಭ್ರಮೆಗೊಳಿಸುವುದು.
      perfectionism: |
        ಸಾಮಾನ್ಯವಾಗಿ ತರ್ಕಬದ್ಧ ವಿಧಾನವಾಗಿರುವ ಸಮಧಾನವನ್ನು ಪಡೆಯುವಾಗ ಸೂಕ್ತ ನಿರ್ಧಾರಗಳನ್ನು ನಿರೀಕ್ಷಿಸುವುದು.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮ (Bystander Effect)
    quick_introduction: |
      ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮ ಎಂದರೆ, ಸುತ್ತಮುತ್ತಲಿನ ಜನರು ಇರುವಾಗ ಸಹಾಯ ಮಾಡಲು ವ್ಯಕ್ತಿಗಳು ಕಡಿಮೆ ಆಸಕ್ತಿ ತೋರಿಸುವ ಪ್ರವೃತ್ತಿ. ಹೆಚ್ಚು ಪ್ರೇಕ್ಷಕರು ಇದ್ದಷ್ಟೂ, ಯಾವುದೇ ಒಬ್ಬ ವ್ಯಕ್ತಿಯು ಕ್ರಿಯಾಶೀಲರಾಗುವ ಸಾಧ್ಯತೆ ಕಡಿಮೆಯಾಗುತ್ತದೆ. ಜವಾಬ್ದಾರಿಯು ಹಂಚಿಹೋಗುತ್ತದೆ; ನಾವು ಬೇರೊಬ್ಬರು ಸಹಾಯ ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
    one_liner: ಹೆಚ್ಚು ಜನರು ಇದ್ದಷ್ಟೂ, ಯಾರಾದರೂ ಒಬ್ಬರು ಕ್ರಿಯಾಶೀಲರಾಗುವ ಸಾಧ್ಯತೆ ಕಡಿಮೆಯಾಗುತ್ತದೆ.
    try_this:
      - ತುರ್ತು ಸಂದರ್ಭಗಳಲ್ಲಿ, ನೇರವಾಗಿ ಜವಾಬ್ದಾರಿಯನ್ನು ನಿಯೋಜಿಸಿ: ನೀವು, 911 ಗೆ ಕರೆ ಮಾಡಿ.
      - ಬೇರೊಬ್ಬರು ಸಹಾಯ ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸಬೇಡಿ - ಕಾರ್ಯನಿರ್ವಹಿಸಿ ಅಥವಾ ಸ್ಪಷ್ಟವಾಗಿ ನಿಯೋಜಿಸಿ.
      - ಇತರರು ಮೊದಲು ಕಾರ್ಯನಿರ್ವಹಿಸಲು ಕಾಯುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ಇತರರು ಇರುವ ಕಾರಣ ನಾನು ಜವಾಬ್ದಾರಿಯನ್ನು ಹಂಚುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಒಬ್ಬನೇ ಇದ್ದರೆ ವಿಭಿನ್ನವಾಗಿ ವರ್ತಿಸುತ್ತಿದ್ದೆನೇ?
    in_more_detail: |
      ಕಿಟ್ಟಿ ಜೆನೊವೀಸ್ ಅವರ ಹತ್ಯೆಯ ನಂತರ (ಕಥೆಯು ಭಾಗಶಃ ಪುರಾಣೀಕರಿಸಲ್ಪಟ್ಟಿದ್ದರೂ), ಸಂಶೋಧಕರು ಇತರರ ಉಪಸ್ಥಿತಿಯು ಸಹಾಯವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಎಂದು ಕಂಡುಹಿಡಿದರು. ನಾವು ಸೂಚನೆಗಳಿಗಾಗಿ ಇತರರನ್ನು ನೋಡುತ್ತೇವೆ - ಯಾರೂ ಕಾರ್ಯನಿರ್ವಹಿಸದಿದ್ದರೆ, ನಾವು ಅದನ್ನು "ಯಾವುದೇ ಕ್ರಿಯೆ ಅಗತ್ಯವಿಲ್ಲ" ಎಂದು ಅರ್ಥೈಸುತ್ತೇವೆ. ನಾವು ಜವಾಬ್ದಾರಿಯ ಹಂಚಿಕೆಯ ಅನುಭವವನ್ನು ಪಡೆಯುತ್ತೇವೆ: ಅನೇಕ ಜನರು ಇರುವಾಗ, ಪ್ರತಿಯೊಬ್ಬರೂ ವೈಯಕ್ತಿಕವಾಗಿ ಕಡಿಮೆ ಜವಾಬ್ದಾರಿಯನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ. ಬಹುಸಂಖ್ಯೆಯ ಅಜ್ಞಾನ ಸಂಭವಿಸಬಹುದು: ಎಲ್ಲರೂ ಏನೋ ತಪ್ಪಾಗಿದೆ ಎಂದು ಭಾವಿಸುತ್ತಾರೆ ಆದರೆ ಯಾರೂ ಕಾರ್ಯನಿರ್ವಹಿಸುವುದಿಲ್ಲ ಏಕೆಂದರೆ ಬೇರೆಯವನೂ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಿಲ್ಲ.

      ಈ ಪರಿಣಾಮವು ಪರಿಸ್ಥಿತಿಯು ಅಸ್ಪಷ್ಟವಾಗಿದ್ದಾಗ ಮತ್ತು ಪ್ರೇಕ್ಷಕರು ಒಬ್ಬರಿಗೊಬ್ಬರು ತಿಳಿದಿಲ್ಲದಿದ್ದಾಗ ಬಲವಾಗಿರುತ್ತದೆ. ನೇರ ಜವಾಬ್ದಾರಿ ನಿಯೋಜನೆಯ ಮೂಲಕ ಇದನ್ನು ನಿವಾರಿಸಬಹುದು ("ನೀವು, 911 ಗೆ ಕರೆ ಮಾಡಿ").
    why_this_is_important: |
      ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು, ಇತರರು ಮಾಡದಿದ್ದಾಗ ನೀವು ಕ್ರಮ ತೆಗೆದುಕೊಳ್ಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ ಮತ್ತು ಅದನ್ನು ನಿವಾರಿಸಲು ವ್ಯವಸ್ಥೆಗಳನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸುತ್ತದೆ. ನಿಮಗೆ ತೊಂದರೆಯಾಗುತ್ತಿದ್ದರೆ, ಒಬ್ಬ ವ್ಯಕ್ತಿಯನ್ನು ನಿರ್ದಿಷ್ಟವಾಗಿ ಗುರುತಿಸಿ. ನೀವು ಪ್ರೇಕ್ಷಕರಾಗಿದ್ದರೆ, ಇತರರು ಕ್ರಿಯಾಶೀಲರಾಗಲು ಕಾಯಬೇಡಿ.
    when_to_use:
      - ನಾಯಕತ್ವ (leadership)
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ (relationship_building)
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ (conflict_resolution)
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ (decision-making)
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        ಹೆಚ್ಚಿನ ಸಂಖ್ಯೆಯವರು ಇದ್ದಾಗ "ಬೇರೊಬ್ಬರು ಮಾಡುತ್ತಾರೆ" ಎಂದು ಅನಿಸುವುದು.
      pluralistic_ignorance: |
        ಎಲ್ಲರೂ ಕ್ರಿಯೆ ಅಗತ್ಯವೆಂದು ಭಾವಿಸುತ್ತಾರೆ ಆದರೆ ಬೇರೆಯವರು ಮಾಡುವುದರಿಂದ ಯಾರೂ ಮಾಡುವುದಿಲ್ಲ.
      social_proof_inaction: |
        ಇತರರ ನಿಷ್ಕ್ರಿಯತೆಯನ್ನು "ಯಾವುದೇ ಕ್ರಿಯೆ ಅಗತ್ಯವಿಲ್ಲ" ಎಂದು ಅರ್ಥೈಸಲಾಗುತ್ತದೆ.
      audience_inhibition: |
        ಅಸಂಬದ್ಧವಾಗಿ ಕಾಣುವ ಅಥವಾ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವ ಭಯವು ಕ್ರಿಯೆಯನ್ನು ತಡೆಯುತ್ತದೆ.
    examples:
      emergency: |
        ಒಬ್ಬ ವ್ಯಕ್ತಿ ಕುಸಿದುಬೀಳುತ್ತಾನೆ; ಅನೇಕ ಪ್ರೇಕ್ಷಕರು ಇದ್ದರೆ, ಸಹಾಯಕ್ಕೆ ಕರೆ ಮಾಡಲು ಪ್ರತಿಯೊಬ್ಬರೂ ಕಡಿಮೆ ಸಂಭವನೀಯತೆಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ.
      workplace: |
        ಎಲ್ಲರೂ ಸಮಸ್ಯೆಯನ್ನು ನೋಡುತ್ತಾರೆ ಆದರೆ ಯಾರೂ ಅದನ್ನು ಎತ್ತಿ ಹೇಳುವುದಿಲ್ಲ - ಪ್ರತಿಯೊಬ್ಬರೂ ಬೇರೊಬ್ಬರು ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸುತ್ತಾರೆ.
      harassment: |
        ಕಿರುಕುಳಕ್ಕೆ ಸಾಕ್ಷಿಗಳಾಗುವವರು ಮಧ್ಯಪ್ರವೇಶಿಸುವುದಿಲ್ಲ, ಪ್ರತಿಯೊಬ್ಬರೂ ಬೇರೆಯವರು ಕ್ರಮ ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ ಎಂದು ಭಾವಿಸುತ್ತಾರೆ.
      meetings: |
        ಒಂದು ಕೆಟ್ಟ ಕಲ್ಪನೆಯು ಪ್ರಶ್ನಿಸದೆ ಹೋಗುತ್ತದೆ ಏಕೆಂದರೆ ಎಲ್ಲರೂ ಬೇರೊಬ್ಬರು ಮಾತನಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸುತ್ತಾರೆ.
    real_world_implications: |
      ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮವು ತುರ್ತು ಸಂದರ್ಭಗಳಲ್ಲಿ ದುರಂತದ ಪರಿಣಾಮಗಳನ್ನು ಹೊಂದಬಹುದು ಮತ್ತು ಸಂಸ್ಥೆಗಳಲ್ಲಿ ಸಮಸ್ಯೆಗಳು ಮುಂದುವರಿಯಲು ಅನುವು ಮಾಡಿಕೊಡುತ್ತದೆ. ಅದನ್ನು ನಿವಾರಿಸಲು ನೇರ ಜವಾಬ್ದಾರಿ ನಿಯೋಜನೆ ಮತ್ತು ಮಧ್ಯಪ್ರವೇಶವನ್ನು ಪ್ರೋತ್ಸಾಹಿಸುವ ರೂಢಿಗಳು ಬೇಕಾಗುತ್ತವೆ.
    professional_application:
      networking_and_relationship_building: |
        ನಿಮಗೆ ಸಹಾಯ ಬೇಕಾದಾಗ, ನಿರ್ದಿಷ್ಟ ವ್ಯಕ್ತಿಯನ್ನು ಕೇಳಿ. ಏನಾದರೂ ತಪ್ಪಾಗುತ್ತಿರುವುದನ್ನು ನೀವು ನೋಡಿದಾಗ, ಕಾರ್ಯನಿರ್ವಹಿಸಿ - ಇತರರು ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸಬೇಡಿ. ಮಾತನಾಡುವುದನ್ನು ನಿರೀಕ್ಷಿಸಲಾಗಿದೆ ಮತ್ತು ಬಹುಮಾನ ನೀಡಲಾಗುತ್ತದೆ ಎಂಬ ರೂಢಿಗಳನ್ನು ರಚಿಸಿ.
      collaborative_learning_initiative: |
        ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸಲು ಮತ್ತು ಮಧ್ಯಪ್ರವೇಶಿಸಲು ಜನರಿಗೆ ತರಬೇತಿ ನೀಡಿ. "ನೀವು ಏನಾದರೂ ನೋಡಿದರೆ, ಹೇಳಿ" ಎಂದು ಬಳಸಿ ಮತ್ತು ಸ್ಪಷ್ಟ ಪಾತ್ರಗಳನ್ನು ನಿಯೋಜಿಸಿ. ಮೊದಲು ಮಾತನಾಡುವವರಿಗೆ ಬಹುಮಾನ ನೀಡಿ.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        ಶಕ್ತಿಯುತವಾದ ಸನ್ನಿವೇಶದ ಬಲವಾದ ಪರಿಣಾಮವಿದ್ದಾಗ ವ್ಯಕ್ತಿಗಳನ್ನು ಕಠೋರವಾಗಿ ನಿರ್ಣಯಿಸುವುದು - ಪರಿಸ್ಥಿತಿಯನ್ನು ಬದಲಾಯಿಸುವುದರ ಮೇಲೆ ಗಮನಹರಿಸಿ.
      false_assumption: |
        ಸಾಕಷ್ಟು ಜನರಿರುವಾಗ ಯಾರಾದರೂ ಯಾವಾಗಲೂ ಸಹಾಯ ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸುವುದು - ವಿರುದ್ಧವಾದುದು ಆಗಾಗ್ಗೆ ನಿಜವಾಗಿರುತ್ತದೆ.
      overcorrection: |
        ಎಲ್ಲರನ್ನೂ ಜವಾಬ್ದಾರರನ್ನಾಗಿ ಮಾಡುವುದು ಇದರಿಂದ ಯಾರೂ ಜವಾಬ್ದಾರರಾಗುವುದಿಲ್ಲ - ಹಂಚಿಕೆ ಇನ್ನೂ ಸಂಭವಿಸಬಹುದು.
      individualizing: |
        ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮವನ್ನು ಸನ್ನಿವೇಶದ ವಿದ್ಯಮಾನವಾಗಿ ಪರಿಗಣಿಸುವ ಬದಲು ಅಕ್ಷರ ದೋಷವೆಂದು ಪರಿಗಣಿಸುವುದು.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ
    quick_introduction: |
      ಸಾಮರ್ಥ್ಯದ ವೃತ್ತವು ಒಂದು ಮಾನಸಿಕ ಮಾದರಿಯಾಗಿದ್ದು, ನಿಮ್ಮ ಪರಿಣತಿಯ ಮಿತಿಗಳನ್ನು ತಿಳಿದುಕೊಳ್ಳಲು
      ಮತ್ತು ಪ್ರಮುಖ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಅವುಗಳೊಳಗೆ ಇರಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ. ವಾರೆನ್ ಬಫೆಟ್
      ಮತ್ತು ಚಾರ್ಲಿ ಮುಂಗರ್ ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ ಎಂಬುದನ್ನು ತಿಳಿಯುವ ಬಗ್ಗೆ ಒತ್ತಿಹೇಳುತ್ತಾರೆ.
    one_liner: ನಿಮ್ಮ ಪರಿಣತಿಯ ಮಿತಿಗಳನ್ನು ತಿಳಿಯಿರಿ—ಮತ್ತು ಅದು ಮುಖ್ಯವಾದಾಗ ಅವುಗಳೊಳಗೆ ಇರಿ.
    try_this:
      - ನಿಮಗೆ ನಿಜವಾದ ಪರಿಣತಿ ಎಲ್ಲಿ ಇದೆ ಮತ್ತು ಎಲ್ಲಿ ನೀವು ಊಹಿಸುತ್ತಿದ್ದೀರಿ ಎಂಬುದನ್ನು ಗುರುತಿಸಿ.
      - ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಇರುವಾಗ, ಸಲಹೆ ಪಡೆಯಿರಿ ಅಥವಾ ಕಾರ್ಯವನ್ನು ನಿಯೋಜಿಸಿ.
      - ಪ್ರಾಮಾಣಿಕರಾಗಿರಿ: ನಿಜವಾದ ಪರಿಣಿತರು ನಿಮ್ಮ ನಿರ್ಣಯಕ್ಕೆ ಇಲ್ಲಿ ಒಪ್ಪುತ್ತಾರೆಯೇ?
    ask_yourself:
      - ನಾನು ನನ್ನ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದೊಳಗೆ ಇದ್ದೇನೆಯೇ, ಅಥವಾ ನಾನು ಊಹೆ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ?
      - ಈ ಕ್ಷೇತ್ರದಲ್ಲಿ "ನನಗೆ ತಿಳಿದಿಲ್ಲ" ಎಂದು ನಾನು ಕೊನೆಯ ಬಾರಿ ಒಪ್ಪಿಕೊಂಡದ್ದು ಯಾವಾಗ?
    in_more_detail: |
      ಪ್ರತಿಯೊಬ್ಬ ವ್ಯಕ್ತಿಗೂ ಅವರು ನಿಜವಾದ ಪರಿಣತಿಯನ್ನು ಹೊಂದಿರುವ ಕ್ಷೇತ್ರಗಳಿವೆ—ಅಲ್ಲಿ ಅವರು ಮಾಹಿತಿಯನ್ನು
      ಮೌಲ್ಯಮಾಪನ ಮಾಡಬಹುದು, ದೋಷಗಳನ್ನು ಗುರುತಿಸಬಹುದು ಮತ್ತು ವಿಶ್ವಾಸಾರ್ಹ ನಿರ್ಣಯಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಬಹುದು.
      ಆ ವೃತ್ತದ ಹೊರಗೆ, ಅವರು ಇತರರಂತೆ ಅದೇ ಪಕ್ಷಪಾತಗಳು ಮತ್ತು ತಪ್ಪುಗಳಿಗೆ ಗುರಿಯಾಗುತ್ತಾರೆ. ಕೀಲಿಯು
      ಪ್ರಾಮಾಣಿಕ ಸ್ವಯಂ-ಮೌಲ್ಯಮಾಪನವಾಗಿದೆ: ನೀವು ನಿಜವಾಗಿಯೂ ಸಮರ್ಥರಾಗಿರುವಲ್ಲಿ ಮತ್ತು ನೀವು ಊಹಿಸುತ್ತಿರುವಲ್ಲಿ
      ಯಾವುದು?

      ಯೋಜಿತ ಕಲಿಕೆಯ ಮೂಲಕ ವೃತ್ತವನ್ನು ವಿಸ್ತರಿಸಬಹುದು, ಆದರೆ ಅದರ ಪ್ರಸ್ತುತ ಮಿತಿಗಳನ್ನು ಗುರುತಿಸಲು
      ವಿನಯವು ಅಗತ್ಯವಿದೆ. ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಕಾರ್ಯನಿರ್ವಹಿಸುವುದರಿಂದ ದುಬಾರಿ ತಪ್ಪುಗಳ ಅಪಾಯ ಹೆಚ್ಚಾಗುತ್ತದೆ,
      ವಿಶೇಷವಾಗಿ ಅಪಾಯಗಳು ಹೆಚ್ಚಾದಾಗ.
    why_this_is_important: |
      ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದೊಳಗೆ ಇರುವುದರಿಂದ ದುಬಾರಿ ತಪ್ಪುಗಳು ಕಡಿಮೆಯಾಗುತ್ತವೆ ಮತ್ತು ನಿರ್ಧಾರದ
      ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ. ಸಲಹೆ ಪಡೆಯಲು, ನಿಯೋಜಿಸಲು ಅಥವಾ ಹಿಂಜರಿಯಲು ಯಾವಾಗ ಎಂದು ತಿಳಿಯಲು
      ಇದು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗಿನ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವು ವೈಫಲ್ಯದ ಪ್ರಮುಖ
      ಮೂಲವಾಗಿದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಹೂಡಿಕೆ
      - ವೃತ್ತಿ_ಜೀವನದ_ಕ್ರಮಗಳು
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      honest_boundary_assessment: |
        ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ಜ್ಞಾನದ ಮಿತಿಗಳನ್ನು ನೀವು ವಿವರಿಸಬಹುದೇ? ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ
        ಎಂಬುದು ನಿಮಗೆ ತಿಳಿದಿದೆಯೇ?
      knowing_when_to_defer: |
        ಒಂಟಿಯಾಗಿ ನಿರ್ಧರಿಸುವ ಬದಲು ತಜ್ಞರ ಅಭಿಪ್ರಾಯವನ್ನು ಯಾವಾಗ ಪಡೆಯಬೇಕು ಎಂಬುದನ್ನು ಗುರುತಿಸುವುದು.
      consistent_track_record: |
        ನಿಮ್ಮ ವೃತ್ತದೊಳಗೆ, ನಿಮ್ಮ ನಿರ್ಣಯಗಳು ಕಾಲಾನಂತರದಲ್ಲಿ ಧೃಡೀಕರಣಗೊಳ್ಳುತ್ತವೆ; ಹೊರಗೆ, ಅವು
        ಧೃಡೀಕರಣಗೊಳ್ಳುವುದಿಲ್ಲ.
      calibration: |
        ಒಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ವಿಶ್ವಾಸವು ಆ ಕ್ಷೇತ್ರದಲ್ಲಿ ನಿಮ್ಮ ನಿಜವಾದ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಹೊಂದಿಕೆಯಾಗುತ್ತದೆ.
    examples:
      investing: |
        ಬಫೆಟ್ ಟೆಕ್ ಸ್ಟಾಕ್‌ಗಳನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ತಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತದ ಹೊರಗೆ
        ಇವೆ ಎಂದು ಹೇಳುತ್ತಾರೆ—ಅವರನ್ನು ವಿಶ್ವಾಸಾರ್ಹವಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ.
      career: |
        ತಮ್ಮ ಕ್ಷೇತ್ರದಲ್ಲೇ ಉಳಿಯುವ ತಜ್ಞರು, ಸಂಬಂಧವಿಲ್ಲದ ಪ್ರದೇಶದಲ್ಲಿ "ಸ್ಟ್ರೆಚ್" ಪಾತ್ರವನ್ನು
        ತೆಗೆದುಕೊಳ್ಳುವವರ ವಿರುದ್ಧ.
      hiring: |
        ತಾಂತ್ರಿಕ ಪಾತ್ರಗಳಿಗಾಗಿ ತಜ್ಞರನ್ನು ಕರೆತರುವುದಕ್ಕಿಂತ ನಿಮ್ಮ ಸ್ವಂತ ನಿರ್ಣಯದ ಮೇಲೆ ಯಾವಾಗ
        ಆಧಾರಪಡಬೇಕು ಎಂದು ತಿಳಿಯುವುದು.
      advice_giving: |
        ಊಹೆ ಮಾಡುವ ಬದಲು ನಿಮ್ಮ ಪರಿಣತಿಯ ಹೊರಗಿನ ವಿಷಯಗಳ ಬಗ್ಗೆ ಅಭಿಪ್ರಾಯ ನೀಡಲು ನಿರಾಕರಿಸುವುದು.
    real_world_implications: |
      ಸಾಮರ್ಥ್ಯದ ವೃತ್ತವು ಮೌಲ್ಯದ ಹೂಡಿಕೆ ಮತ್ತು ವೃತ್ತಿಪರ ಯಶಸ್ಸಿಗೆ ಕೇಂದ್ರವಾಗಿದೆ.
      ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ, ವಿಫಲವಾದ ಸಾಹಸಗಳು ಮತ್ತು ಕಳಪೆ ಸಲಹೆಗಳು
      ಉಂಟಾಗುತ್ತವೆ. ವೃತ್ತವನ್ನು ವಿಸ್ತರಿಸಲು ಯೋಜಿತ ಪ್ರಯತ್ನ ಮತ್ತು ಪ್ರಾಮಾಣಿಕ ಪ್ರತಿಕ್ರಿಯೆ
      ಅಗತ್ಯ.
    professional_application:
      networking_and_relationship_building: |
        ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯದ ವೃತ್ತಗಳನ್ನು ಪೂರೈಸುವ ಜನರೊಂದಿಗೆ ಸಂಬಂಧಗಳನ್ನು ಬೆಳೆಸಿಕೊಳ್ಳಿ.
        ನಿಮ್ಮ ಸ್ವಂತ ಉತ್ತರ ನೀಡುವ ಬದಲು ಇತರರನ್ನು ಪರಿಚಯಿಸಲು ಯಾವಾಗ ಎಂದು ತಿಳಿಯಿರಿ.
      collaborative_learning_initiative: |
        ಅತಿಕ್ರಮಿಸುವ ಮತ್ತು ಪೂರಕ ವೃತ್ತಗಳನ್ನು ಹೊಂದಿರುವ ತಂಡಗಳನ್ನು ರಚಿಸಿ. ಜನರು ತಮ್ಮ
        ಸಾಮರ್ಥ್ಯದ ಹೊರಗೆ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಿದ್ದಾರೆ ಎಂದು ಗುರುತಿಸಲು ಅವರನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        ನಿಮ್ಮ ವೃತ್ತದ ಹೊರಗೆ ಎಂದಿಗೂ ಹೋಗದಿರುವುದು ಬೆಳವಣಿಗೆ ಮತ್ತು ಕಲಿಕೆಯನ್ನು ಸೀಮಿತಗೊಳಿಸಬಹುದು.
      false_modesty: |
        ಜವಾಬ್ದಾರಿಯಿಂದ ತಪ್ಪಿಸಿಕೊಳ್ಳಲು ಅಥವಾ ಕಷ್ಟಕರವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳದಿರಲು ಒಂದು
        ಸಣ್ಣ ವೃತ್ತವನ್ನು ಹೇಳಿಕೊಳ್ಳುವುದು.
      gatekeeping: |
        ಇತರರ ವಾದಗಳನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸದೆ ಅವರನ್ನು ತಿರಸ್ಕರಿಸಲು "ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ" ವನ್ನು
        ಬಳಸುವುದು.
      stagnation: |
        ವೃತ್ತವನ್ನು ಸ್ಥಿರವೆಂದು ಪರಿಗಣಿಸುವುದು, ಪ್ರಯತ್ನದಿಂದ ವಿಸ್ತರಿಸಬಹುದಾದ ವಿಷಯವೆಂದು
        ಪರಿಗಣಿಸದಿರುವುದು.
