  - id: cognitive_dissonance
    name: ಅರಿವಿನ ಅಸಂಗತತೆ
    quick_introduction: |
      ಅರಿವಿನ ಅಸಂಗತತೆ ಎಂದರೆ ನಾವು ಪರಸ್ಪರ ವಿರೋಧಾಭಾಸದ ನಂಬಿಕೆಗಳನ್ನು ಹೊಂದಿರುವಾಗ, ಅಥವಾ ನಮ್ಮ ಕ್ರಿಯೆಗಳು ನಮ್ಮ ನಂಬಿಕೆಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವಾಗ ಅನುಭವಿಸುವ ಮಾನಸಿಕ ಅಸ್ವಸ್ಥತೆ. ಈ ಅಸ್ವಸ್ಥತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಲು ನಾವು ಪ್ರೇರಿತರಾಗುತ್ತೇವೆ - ಆಗಾಗ್ಗೆ ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಬದಲಾಯಿಸುವ ಬದಲು ನಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನಮ್ಮ ಕ್ರಿಯೆಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವಂತೆ ಬದಲಾಯಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.
    one_liner: ನಾವು ನಮ್ಮ ಕ್ರಿಯೆಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವಂತೆ ನಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ಬದಲಾಯಿಸಿಕೊಳ್ಳುತ್ತೇವೆ, ಇದರ ವಿರುದ್ಧದಕ್ಕಿಂತ ಹೆಚ್ಚಾಗಿ.
    try_this:
      - ವರ್ತನೆಯನ್ನು ಬದಲಾಯಿಸುವ ಬದಲು ಅಸ್ವಸ್ಥತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಲು ನೀವು ಸಮರ್ಥಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
      - ಕೇಳಿ: ನಾನು ಏನು ಮಾಡಿದ್ದೇನೆಂದು ಸಮರ್ಥಿಸಿಕೊಳ್ಳಲು ನನ್ನ ನಂಬಿಕೆಗಳನ್ನು ಸರಿಹೊಂದಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಂಬಿಕೆಯನ್ನು ಬದಲಾಯಿಸುವುದಕ್ಕಿಂತ ಕ್ರಿಯೆಯನ್ನು ಬದಲಾಯಿಸುವುದು ಹೆಚ್ಚು ಪ್ರಾಮಾಣಿಕವಾಗಿರುತ್ತದೆಯೇ ಎಂದು ಪರಿಗಣಿಸಿ.
    ask_yourself:
      - ನಾನು ಸಮರ್ಥನೆಯ ಮೂಲಕ ಅಸಂಗತತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ, ಅಥವಾ ನಿಜವಾಗಿಯೂ ಬದಲಾಯಿಸುವ ಮೂಲಕವೇ?
      - ನಾನು ಈಗಾಗಲೇ ಹೀಗೆ ವರ್ತಿಸದಿದ್ದರೆ ನಾನು ಈ ನಂಬಿಕೆಯನ್ನು ಇಟ್ಟುಕೊಳ್ಳುತ್ತಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ಲಿಯಾನ್ ಫೆಸ್ಟಿಂಗರ್ ಅವರ ಸಿದ್ಧಾಂತವು ನಾವು ಸ್ಥಿರತೆಯನ್ನು ಬಯಸುತ್ತೇವೆ ಎಂದು ವಿವರಿಸುತ್ತದೆ. ನಮ್ಮ ಮೌಲ್ಯಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿ ನಾವು ವರ್ತಿಸಿದಾಗ (ಉದಾಹರಣೆಗೆ, ಸುಳ್ಳು ಹೇಳುವುದು, ಹಣ ವ್ಯರ್ಥ ಮಾಡುವುದು), ನಾವು ಅಸಂಗತತೆಯನ್ನು ಅನುಭವಿಸುತ್ತೇವೆ. ಅದನ್ನು ಕಡಿಮೆ ಮಾಡಲು, ನಾವು ನಮ್ಮ ನಂಬಿಕೆಯನ್ನು ಬದಲಾಯಿಸಬಹುದು ("ಇದು ನಿಜವಾಗಿಯೂ ಸುಳ್ಳಾಗಿರಲಿಲ್ಲ") ಅಥವಾ ಕ್ರಿಯೆಯನ್ನು ಕನಿಷ್ಠಗೊಳಿಸಬಹುದು ("ಇದು ಅಷ್ಟೊಂದು ಕೆಟ್ಟದ್ದಾಗಿರಲಿಲ್ಲ"). ನಾವು ಸುಧಾರಿಸುವ ಬದಲು ಆಗಾಗ್ಗೆ ಸಮರ್ಥಿಸುತ್ತೇವೆ.

      ಅರಿವಿನ ಅಸಂಗತತೆಯು ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವನ್ನು (ನಾವು ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ನಾವು ಇಷ್ಟಪಡುತ್ತೇವೆ) ನಡೆಸುತ್ತದೆ, ನಾವು ಹಿಂದಿನ ನಿರ್ಧಾರಗಳನ್ನು ಏಕೆ ಸಮರ್ಥಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ ಮತ್ತು ಅನೇಕ ಸ್ವ-ಮೋಸಗಳಿಗೆ ಆಧಾರವಾಗಿದೆ. ಇದು ನಂಬಿಕೆಗಳ ರಚನೆ ಮತ್ತು ಬದಲಾವಣೆಯಲ್ಲಿ ಒಂದು ಶಕ್ತಿಯುತವಾದ ಬಲವಾಗಿದೆ.
    why_this_is_important: |
      ಅರಿವಿನ ಅಸಂಗತತೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ನಿಮ್ಮ ಸ್ವಂತ ಸಮರ್ಥನೆಗಳನ್ನು ಗುರುತಿಸಲು ಮತ್ತು ಜನರು ತಮ್ಮ ಮನಸ್ಸನ್ನು ಬದಲಾಯಿಸಲು ಏಕೆ ಪ್ರತಿರೋಧಿಸುತ್ತಾರೆ ಎಂಬುದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಬದ್ಧತೆ ಮತ್ತು ಸ್ಥಿರತೆ ಏಕೆ ಶಕ್ತಿಯುತವಾದ ಮನವೊಲಿಕೆ ತತ್ವಗಳಾಗಿವೆ ಎಂಬುದನ್ನೂ ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
      - ನಾಯಕತ್ವ
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
    how_can_you_spot_it:
      post_decision_rationalization: |
        ಒಂದು ಆಯ್ಕೆಯ ನಂತರ, ನಾವು ನಮ್ಮ ಆಯ್ಕೆಯ ಸಕಾರಾತ್ಮಕ ಅಂಶಗಳನ್ನು ಮತ್ತು ತಿರಸ್ಕರಿಸಿದ ಆಯ್ಕೆಗಳ ಋಣಾತ್ಮಕ ಅಂಶಗಳನ್ನು ಒತ್ತಿಹೇಳುತ್ತೇವೆ.
      belief_action_alignment: |
        ನಾವು ಈಗಾಗಲೇ ತೆಗೆದುಕೊಂಡ ಕ್ರಮಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವಂತೆ ನಾವು ನಂಬಿಕೆಗಳನ್ನು ಸರಿಹೊಂದಿಸುತ್ತೇವೆ.
      discomfort_with_inconsistency: |
        ನಮ್ಮ ನಡವಳಿಕೆಯು ನಮ್ಮ ಹೇಳಿದ ಮೌಲ್ಯಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವುದಿಲ್ಲ ಎಂದು ನಾವು ಗಮನಿಸಿದಾಗ ಅಸ್ವಸ್ಥತೆ.
      resistance_to_disconfirming_evidence: |
        ನಮ್ಮ ಬದ್ಧತೆಗಳೊಂದಿಗೆ ವಿರೋಧಾಭಾಸದ ಮಾಹಿತಿಯನ್ನು ತಳ್ಳಿಹಾಕುವುದು ಅಥವಾ ಕನಿಷ್ಠಗೊಳಿಸುವುದು.
    examples:
      purchase_justification: |
        ಖరీದಿಯಾದ ವಸ್ತುವನ್ನು ಖರೀದಿಸಿದ ನಂತರ, ನಾವು ಅದರ ಪ್ರಯೋಜನಗಳನ್ನು ಒತ್ತಿಹೇಳುತ್ತೇವೆ ಮತ್ತು ವೆಚ್ಚವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ.
      relationship: |
        ಒಳ್ಳೆಯದರ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸುವ ಮೂಲಕ ಮತ್ತು ಕೆಟ್ಟದ್ದನ್ನು ಕನಿಷ್ಠಗೊಳಿಸುವ ಮೂಲಕ ನಾವು ಕೆಟ್ಟ ಸಂಬಂಧದಲ್ಲಿ ಉಳಿಯುವುದನ್ನು ಸಮರ್ಥಿಸುತ್ತೇವೆ.
      career: |
        ನಾವು ಅಸಹ್ಯಪಡುವ ಕೆಲಸದಲ್ಲಿ ಉಳಿಯಲು ನಾವು "ಹೊಂದಿರಬೇಕು" ಎಂಬ ಕಾರಣಗಳನ್ನು ಒತ್ತಿಹೇಳುವ ಮೂಲಕ ಸಮರ್ಥಿಸುತ್ತೇವೆ.
      beliefs: |
        ನಮ್ಮ ಕ್ರಿಯೆಗಳು ನಮ್ಮ ಮೌಲ್ಯಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವಾಗ, ನಮ್ಮ ಕ್ರಿಯೆಗಳ ಬದಲಿಗೆ ನಮ್ಮ ಮೌಲ್ಯಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತೇವೆ ("ನಾನು ನಿಜವಾಗಿಯೂ ಸಸ್ಯಾಹಾರಿ ಅಲ್ಲ - ನಾನು ಕೆಲವೊಮ್ಮೆ ಮಾಂಸವನ್ನು ತಿನ್ನುತ್ತೇನೆ").
    real_world_implications: |
      ಅರಿವಿನ ಅಸಂಗತತೆಯು ನಂಬಿಕೆಗಳ ರಚನೆ, ಗ್ರಾಹಕರ ವರ್ತನೆ ಮತ್ತು ರಾಜಕೀಯ ಮನೋಭಾವವನ್ನು ರೂಪಿಸುತ್ತದೆ. ಕೆಟ್ಟ ನಿರ್ಧಾರಗಳ ನಂತರ ಜನರು ಏಕೆ ಗಟ್ಟಿಯಾಗುತ್ತಾರೆ ಮತ್ತು ನಡವಳಿಕೆಯನ್ನು ಬದಲಾಯಿಸುವುದರಿಂದ ನಂಬಿಕೆಗಳನ್ನು ಏಕೆ ಬದಲಾಯಿಸಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಚಿಕ್ಕ ಬದ್ಧತೆಗಳು ದೊಡ್ಡದಕ್ಕೆ ಕಾರಣವಾಗಬಹುದು - ಜನರು ತಮ್ಮ ಹಿಂದಿನ ಕ್ರಿಯೆಗಳನ್ನು ಸಮರ್ಥಿಸುತ್ತಾರೆ. ಇದನ್ನು ನೈತಿಕವಾಗಿ ಬಳಸಿ: ಸಣ್ಣ ಕೇಳುವಿಕೆಗಳಿಂದ ಪ್ರಾರಂಭಿಸಿ. ನಿಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ಸಮರ್ಥಿಸುತ್ತಿರುವಾಗ ಎಚ್ಚರವಿರಲಿ.
      collaborative_learning_initiative: |
        ಬದಲಾವಣೆಯನ್ನು ಪರಿಚಯಿಸುವಾಗ, ಆರಂಭಿಕ ಒಪ್ಪಂದ ಮತ್ತು ಸಣ್ಣ ಬದ್ಧತೆಗಳನ್ನು ಪಡೆಯಿರಿ - ಅವುಗಳು ದೊಡ್ಡದಾದ ಅಳವಡಿಕೆಯನ್ನು ಪ್ರೇರೇಪಿಸುವ ಅಸಂಗತತೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತವೆ. ದ್ವೇಷವನ್ನು ಸೃಷ್ಟಿಸುವ ಸಾರ್ವಜನಿಕ ಬದ್ಧತೆಗಳನ್ನು ಬಲವಂತವಾಗಿ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಿ.
    how_can_this_be_misapplied:
      manipulation: |
        ಒಪ್ಪಿಗೆಗಾಗಿ ಜನರನ್ನು ಒತ್ತಾಯಿಸಲು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಅಸಂಗತತೆಯನ್ನು ಸೃಷ್ಟಿಸುವುದು.
      dismissing_genuine_change: |
        ಜನರು ಕೆಲವೊಮ್ಮೆ ನಿಜವಾಗಿಯೂ ನವೀಕರಿಸಿದಾಗ ಎಲ್ಲಾ ನಂಬಿಕೆ ಬದಲಾವಣೆಯನ್ನು ಸಮರ್ಥನೆಯೆಂದು ತಳ್ಳಿಹಾಕುವುದು.
      forced_consistency: |
        ಜನರ ವೀಕ್ಷಣೆಗಳು ಕಾನೂನುಬದ್ಧವಾಗಿ ವಿಕಸನಗೊಂಡಾಗ ಅವರನ್ನು "ಸ್ಥಿರ" ಎಂದು ಒತ್ತಾಯಿಸುವುದು.
      self_deception: |
        ನಮ್ಮ ಬಗ್ಗೆ ಅನಾನುಕೂಲಕರವಾದ ಸತ್ಯಗಳನ್ನು ತಪ್ಪಿಸಲು ಸಮರ್ಥಿಸಲು ಅಸಂಗತತೆ ಸಿದ್ಧಾಂತವನ್ನು ಬಳಸುವುದು.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ
    quick_introduction: |
      ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ ಎಂದರೆ ನಮ್ಮ ಪೂರ್ವಭಾವಿ ನಂಬಿಕೆಗಳನ್ನು ದೃಢಪಡಿಸುವ ರೀತಿಯಲ್ಲಿ ಮಾಹಿತಿಯನ್ನು ಹುಡುಕುವ, ವ್ಯಾಖ್ಯಾನಿಸುವ ಮತ್ತು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಸಹಾಯಕ ಸಾಕ್ಷ್ಯಗಳಿಗೆ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆ ನೀಡುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮ ದೃಷ್ಟಿಕೋನಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ ಅಥವಾ ತಿರಸ್ಕರಿಸುತ್ತೇವೆ. ನಾವು ನಮ್ಮ ಕಲ್ಪನೆಗಳನ್ನು ಪರೀಕ್ಷಿಸುವ ಬದಲು ದೃಢಪಡಿಸುವ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳುತ್ತೇವೆ.
    one_liner: ನಾವು ನಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ದೃಢಪಡಿಸುವದನ್ನು ಹುಡುಕುತ್ತೇವೆ ಮತ್ತು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೇವೆ; ನಾವು ಅವುಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವದನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ.
    try_this:
      - ಕೇಳಿ: ನನ್ನನ್ನು ಯಾವುದು ತಪ್ಪು ಎಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ? ವಿರುದ್ಧ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ.
      - ಸಹಾಯಕ ಮಾಹಿತಿಗೆ, ವಿರುದ್ಧ ಮಾಹಿತಿಗಿಂತ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆ ನೀಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
      - ವಿರುದ್ಧ ದೃಷ್ಟಿಕೋನವನ್ನು ನಿಮ್ಮ ಸ್ವಂತದಷ್ಟು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಿ.
    ask_yourself:
      - ನಾನು ನನ್ನ ಕಲ್ಪನೆಯನ್ನು ಪರೀಕ್ಷಿಸುತ್ತಿದ್ದೇನೆಯೇ ಅಥವಾ ಕೇವಲ ದೃಢಪಡಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಹೊಸ ಸಾಕ್ಷ್ಯಗಳ ಆಧಾರದ ಮೇಲೆ ನಾನು ಕೊನೆಯ ಬಾರಿ ನನ್ನ ಮನಸ್ಸನ್ನು ಯಾವಾಗ ಬದಲಾಯಿಸಿಕೊಂಡೆ?
    in_more_detail: |
      ನಾವು ಮಾಹಿತಿಯ ತಟಸ್ಥ ಪ್ರಕ್ರಿಯೆಗಾರರಲ್ಲ. ನಾವು ದೃಢೀಕರಣವನ್ನು ಹುಡುಕುತ್ತೇವೆ, ಅಸ್ಪಷ್ಟತೆಯನ್ನು ಬೆಂಬಲವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೇವೆ ಮತ್ತು ಹಿಟ್'ಗಳನ್ನು ಮಿಸ್'ಗಳಿಗಿಂತ ಹೆಚ್ಚು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೇವೆ. ನಾವು ನಮ್ಮಂತೆಯೇ ಯೋಚಿಸುವ ಜನರ ಮತ್ತು ಮಾಧ್ಯಮಗಳ ಸುತ್ತಲೂ ನಮ್ಮನ್ನು ಸುತ್ತುವರಿಯುತ್ತೇವೆ. ನಾವು "ನಾನು ಏಕೆ ಸರಿ?" ಎಂದು ಕೇಳುತ್ತೇವೆ, "ನನ್ನನ್ನು ಯಾವುದು ತಪ್ಪು ಎಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ?" ಎಂದು ಕೇಳುವ ಬದಲು. ಇದು ನಮ್ಮನ್ನು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನಾಗಿ ಮಾಡುತ್ತದೆ ಮತ್ತು ನವೀಕರಿಸಲು ನಿಧಾನಗೊಳಿಸುತ್ತದೆ.

      ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವು ಅತ್ಯಂತ ವ್ಯಾಪಕವಾಗಿ ಹರಡಿರುವ ಮತ್ತು ಉತ್ತಮವಾಗಿ ದಾಖಲಿಸಲ್ಪಟ್ಟ ಪಕ್ಷಪಾತಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ.
      ಇದು ವಿಜ್ಞಾನ, ರಾಜಕೀಯ, ಸಂಬಂಧಗಳು ಮತ್ತು ವ್ಯವಹಾರಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದನ್ನು ಜಯಿಸಲು
      ಉದ್ದೇಶಪೂರ್ವಕ ಪ್ರಯತ್ನ ಮತ್ತು ರಚನಾತ್ಮಕ ಪ್ರಕ್ರಿಯೆಗಳ ಅಗತ್ಯವಿದೆ.
    why_this_is_important: |
      ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ ಮತ್ತು ಕಲಿಯುವಿಕೆಗೆ ದೃಢೀಕರಣ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ಅತ್ಯಗತ್ಯ.
      ಇದು ವಿರುದ್ಧ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಹುಡುಕಲು, ಪರ್ಯಾಯ ಕಲ್ಪನೆಗಳನ್ನು ಪರಿಗಣಿಸಲು ಮತ್ತು ಅಗತ್ಯವಿದ್ದಾಗ ನಿಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನವೀಕರಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ವೈಜ್ಞಾನಿಕ ಚಿಂತನೆಯ ಅಡಿಪಾಯವಾಗಿದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಕಲಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      seeking_support: |
        ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ಪರೀಕ್ಷಿಸುವ ಬದಲು ದೃಢಪಡಿಸುವ ಸಾಕ್ಷ್ಯಗಳಿಗಾಗಿ ಹುಡುಕುವುದು.
      asymmetric_interpretation: |
        ಅಸ್ಪಷ್ಟ ಸಾಕ್ಷ್ಯಗಳನ್ನು ನಿಮ್ಮ ಸ್ಥಾನಕ್ಕೆ ಬೆಂಬಲವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುವುದು.
      discounting_disconfirming: |
        ನಿಮ್ಮ ನಂಬಿಕೆಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವ ಸಾಕ್ಷ್ಯಗಳನ್ನು ತಿರಸ್ಕರಿಸುವುದು ಅಥವಾ ಕಡಿಮೆ ಮಾಡುವುದು.
      selective_exposure: |
        ನಿಮ್ಮೊಂದಿಗೆ ಒಪ್ಪುವ ಮೂಲಗಳಿಂದ ಮಾತ್ರ ಮಾಹಿತಿಯನ್ನು ಸೇವಿಸುವುದು.
    examples:
      hiring: |
        ಆರಂಭಿಕ ಸಕಾರಾತ್ಮಕ ಅಭಿಪ್ರಾಯವನ್ನು ರೂಪಿಸಿ, ತದನಂತರ ಅಭ್ಯರ್ಥಿಯು ಉತ್ತಮವಾಗಿದ್ದಾನೆ ಎಂದು ದೃಢಪಡಿಸುವ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳುವುದು.
      investing: |
        ಷೇರು ಖರೀದಿಸಿದ ನಂತರ, ಸಕಾರಾತ್ಮಕ ಸುದ್ದಿಗಳಿಗಾಗಿ ಹುಡುಕುವುದು ಮತ್ತು ನಕಾರಾತ್ಮಕ ವಿಶ್ಲೇಷಣೆಯನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
      relationships: |
        ನಿಮ್ಮ ಪಾಲುದಾರರ ಕ್ರಿಯೆಗಳನ್ನು ಅವರ ಬಗ್ಗೆ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವನ್ನು ದೃಢಪಡಿಸುವ ಮಸೂರಗಳ ಮೂಲಕ ವ್ಯಾಖ್ಯಾನಿಸುವುದು (ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟದು).
      politics: |
        ನಿಮ್ಮ ಕಡೆಯಿಂದ ಮಾಹಿತಿಯನ್ನು ವಿವೇಚನೆ ಇಲ್ಲದೆ ಸ್ವೀಕರಿಸುವುದು ಮತ್ತು ಎದುರಾಳಿ ಕಡೆಯಿಂದ ಸಮಾನ ಮಾಹಿತಿಯನ್ನು ತಿರಸ್ಕರಿಸುವುದು.
    real_world_implications: |
