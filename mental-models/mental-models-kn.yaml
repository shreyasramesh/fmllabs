  - id: empathy_gap
    name: ಎಂಪಥಿ ಗ್ಯಾಪ್ (Empathy Gap)
    quick_introduction: |
      ನಾವು ವಿಭಿನ್ನ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾಗ ಇತರರ ಮಾನಸಿಕ ಸ್ಥಿತಿಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಮತ್ತು ಊಹಿಸಲು ಇರುವ ಕಷ್ಟವನ್ನು ಎಂಪಥಿ ಗ್ಯಾಪ್ ಎನ್ನುತ್ತಾರೆ. ನಾವು ಶಾಂತವಾಗಿದ್ದಾಗ, ಕೋಪಗೊಂಡಾಗ ಅಥವಾ ಹಸಿದಾಗ ನಾವು ಹೇಗಿದ್ದೀವಿ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ತೃಪ್ತರಾಗಿದ್ದಾಗ, ಹಸಿದಿದ್ದಾಗ ನಮಗೆ ಎಷ್ಟು ಆಹಾರ ಬೇಕಾಗುತ್ತದೆ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.
    one_liner: ನಾವು ವಿಭಿನ್ನ ಸ್ಥಿತಿಗಳಲ್ಲಿ ಹೇಗಿದ್ದೀವಿ — ಮತ್ತು ಇತರರು ಹೇಗಿದ್ದಾರೆ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.
    try_this:
      - ಶಾಂತವಾಗಿದ್ದಾಗ, ಒತ್ತಡದಲ್ಲಿದ್ದಾಗ ನಿಮ್ಮ ನಿರ್ಧಾರಗಳನ್ನು ಮಾಡಿ; ಮುಂಗಡವಾಗಿ ಬದ್ಧರಾಗಿರಿ.
      - ನೀವು ಇಲ್ಲದ ಸ್ಥಿತಿಯಲ್ಲಿರುವ (ಹಸಿದ, ಆಯಾಸಗೊಂಡ, ಹೆದರಿದ) ಇತರರನ್ನು ನಿರ್ಣಯಿಸಬೇಡಿ.
      - ಕೇಳಿ: ನನ್ನ ಪ್ರಸ್ತುತ ಸ್ಥಿತಿಯನ್ನು ನನ್ನ ಭವಿಷ್ಯದ ಸ್ವಯಂ ಅಥವಾ ಇತರರ ಮೇಲೆ ಅನ್ವಯಿಸುತ್ತಿದ್ದೇನೆಯೇ?
    ask_yourself:
      - ನಾನು ವಿಭಿನ್ನ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾಗ ನಾನು ಹೇಗಿದ್ದೀನಿ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಅವರ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದರೆ ಈ ವ್ಯಕ್ತಿಯನ್ನು ಉತ್ತಮವಾಗಿ ಅರ್ಥಮಾಡಿಕೊಳ್ಳುತ್ತೇನೆಯೇ?
    in_more_detail: |
      ವಿಭಿನ್ನ ಸಂದರ್ಭಗಳಲ್ಲಿ ನಾವು ಹೇಗಿದ್ದೀವಿ — ಮತ್ತು ನಾವು ಪ್ರಸ್ತುತ ಇಲ್ಲದ ಸ್ಥಿತಿಗಳಲ್ಲಿರುವಾಗ ಇತರರು ಹೇಗಿದ್ದಾರೆ ಎಂಬುದನ್ನು ಕಲ್ಪಿಸಿಕೊಳ್ಳಲು ನಮಗೆ ತೊಂದರೆಯಾಗುತ್ತದೆ. ಕುಡಿದು ಮಂಪರಾಗದ ವ್ಯಕ್ತಿ, ವ್ಯಸನದ ಆಕರ್ಷಣೆಯನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತಾನೆ. ಚೆನ್ನಾಗಿ ನಿದ್ದೆ ಮಾಡಿದ ವ್ಯಕ್ತಿ, ನಿದ್ದೆ ಕೊರತೆಯ ಪರಿಣಾಮವನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತಾನೆ. ನಾವು ನಮ್ಮ ಪ್ರಸ್ತುತ ಸ್ಥಿತಿಯನ್ನು ಇತರರ ಮತ್ತು ನಮ್ಮ ಭವಿಷ್ಯದ ಸ್ವಯಂ ಮೇಲೆ ಅನ್ವಯಿಸುತ್ತೇವೆ.

      ಎಂಪಥಿ ಗ್ಯಾಪ್ ನಮ್ಮ ಭವಿಷ್ಯದ ಸ್ವಯಂ (ಉದಾಹರಣೆಗೆ, ಪ್ರೇರಿತರಾದಾಗ ವ್ಯಾಯಾಮ ಮಾಡಲು ಬದ್ಧರಾಗುವುದು), ಇತರರಿಗಾಗಿ ನಾವು ಮಾಡುವ ನಿರ್ಧಾರಗಳು ಮತ್ತು ವಿಭಿನ್ನ ಸ್ಥಿತಿಗಳಲ್ಲಿರುವ ಜನರನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವ ನಮ್ಮ ಸಾಮರ್ಥ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
    why_this_is_important: |
      ಎಂಪಥಿ ಗ್ಯಾಪ್ ಅನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಭವಿಷ್ಯದ ನಿಮಗೆ ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳಲು, ಇತರರ ಬಗ್ಗೆ ಸಹಾನುಭೂತಿ ಹೆಚ್ಚಿಸಲು ಮತ್ತು ನಮ್ಮ ಸ್ವಂತ ಬದಲಾವಣೆಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಸುಧಾರಿಸುತ್ತದೆ. ನಾವು ಮಾಡಲಾಗದ ಬದ್ಧತೆಗಳನ್ನು ಏಕೆ ಮಾಡುತ್ತೇವೆ ಮತ್ತು ಸಂಕಷ್ಟದಲ್ಲಿರುವ ಇತರರನ್ನು ಏಕೆ ತಪ್ಪು-ಅರ್ಥಮಾಡಿಕೊಳ್ಳುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವುದು
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
      - ನಾಯಕತ್ವ
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
    how_can_you_spot_it:
      current_state_projection: |
        ಇತರರು ಈಗ ನಮ್ಮಂತೆ ಭಾವಿಸುತ್ತಾರೆ, ಅಥವಾ ಭವಿಷ್ಯದಲ್ಲಿ ನಾವು ಈಗಿನಂತೆ ಭಾವಿಸುತ್ತೇವೆ ಎಂದು ಊಹಿಸುವುದು.
      underestimating_emotional_state: |
        ನಾವು ಆ ಸ್ಥಿತಿಯಲ್ಲಿಲ್ಲದಿದ್ದಾಗ "ಇದೇನು ದೊಡ್ಡ ವಿಷಯ?" ಎಂದು ಅಂದುಕೊಳ್ಳುವುದು.
      commitment_failures: |
        ಪ್ರಸ್ತುತ ಪ್ರೇರಣೆಯ ಆಧಾರದ ಮೇಲೆ ಮಾಡುವ ಆಯ್ಕೆಗಳು, ಪ್ರೇರಣೆ ಕಡಿಮೆಯಾದಾಗ ನಾವು ಪಾಲಿಸುವುದಿಲ್ಲ.
      misunderstanding_others: |
        ನಮ್ಮ ಪ್ರಸ್ತುತ ಸ್ಥಿತಿಯಿಂದ ಊಹಿಸಲು ಸಾಧ್ಯವಿಲ್ಲದ ಕಾರಣ ಇತರರ ಅನುಭವಗಳನ್ನು ತಳ್ಳಿಹಾಕುವುದು.
    examples:
      hunger: |
        ತೃಪ್ತರಾಗಿದ್ದಾಗ ದಿನಸಿ ಶಾಪಿಂಗ್ ಮಾಡುವುದು — ಹಸಿದಿದ್ದಾಗ ನಮಗೆ ಬೇಕಾಗುವುದಕ್ಕಿಂತ ಕಡಿಮೆ ಖರೀದಿಸುತ್ತೇವೆ.
      addiction: |
        ವ್ಯಸನಿಗಳಲ್ಲದವರು ಬಿಡುವ ಕಷ್ಟವನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತಾರೆ; ಚೇತರಿಸಿಕೊಳ್ಳುತ್ತಿರುವ ವ್ಯಸನಿಗಳು, ಬಳಸುತ್ತಿರುವಾಗ ಅದರ ಆಕರ್ಷಣೆಯನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡಬಹುದು.
      conflict: |
        ಶಾಂತವಾಗಿದ್ದಾಗ, ಸಂಘರ್ಷದ ಕ್ಷಣದಲ್ಲಿ ನಾವು ಹೇಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.
      motivation: |
        ಪ್ರೇರಿತರಾಗಿದ್ದಾಗ ಬೆಳಿಗ್ಗೆ 6 ಗಂಟೆಗೆ ತರಗತಿಗೆ ಸೇರುವುದು — ಮತ್ತು ನಿದ್ರೆಯಲ್ಲಿದ್ದಾಗ ಹೋಗದಿರುವುದು.
    real_world_implications: |
      ಎಂಪಥಿ ಗ್ಯಾಪ್ ವ್ಯಸನ ಚಿಕಿತ್ಸೆ, ನೀತಿ ಮತ್ತು ಪರಸ್ಪರ ತಿಳುವಳಿಕೆಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಮಾಡುತ್ತಿರುವ ಬದ್ಧತೆಗಳನ್ನು ಏಕೆ ಮುರಿಯುತ್ತೇವೆ ಮತ್ತು ಇತರರ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಏಕೆ ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ವಿಫಲರಾಗುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ. ಇದು ಸಹಾನುಭೂತಿ ಮತ್ತು ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಗೆ ಒಂದು ಅಡೆತಡೆಯಾಗಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ಒತ್ತಡ, ಕೋಪ ಅಥವಾ ವಿಭಿನ್ನ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾಗ, ಅವರು ನಿಮ್ಮಂತೆ ತರ್ಕಿಸುತ್ತಾರೆ ಎಂದು ಊಹಿಸಬೇಡಿ. ಅವರ ಸ್ಥಿತಿಯನ್ನು ಊಹಿಸಲು ಪ್ರಯತ್ನಿಸಿ. ಬದ್ಧತೆಗಳನ್ನು ಮಾಡುವಾಗ, ಪ್ರೇರಣೆ ಕಡಿಮೆಯಾದಾಗ ನೀವು ಹೇಗಿದ್ದೀರಿ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ.
      collaborative_learning_initiative: |
        ಯೋಜನೆ ಮಾಡುವಾಗ, ತಂಡವು ಆಯಾಸಗೊಂಡಾಗ, ಒತ್ತಡದಲ್ಲಿದ್ದಾಗ ಅಥವಾ ಹತಾಶಗೊಂಡಾಗ ಹೇಗಿದ್ದೀರಾ ಎಂಬುದನ್ನು ಪರಿಗಣಿಸಿ. ಆ ಸ್ಥಿತಿಗಳಿಗಾಗಿ ವಿನ್ಯಾಸಗೊಳಿಸಿ, ಕೇವಲ ಪ್ರೇರಿತ ಯೋಜನಾ ಸ್ಥಿತಿಗಾಗಿ ಅಲ್ಲ.
    how_can_this_be_misapplied:
      overattribution: |
        ಕೆಲವೊಮ್ಮೆ ಜನರಿಗೆ ನಿಜವಾಗಿಯೂ ವಿಭಿನ್ನ ಮೌಲ್ಯಗಳಿದ್ದಾಗ, ಎಲ್ಲಾ ತಪ್ಪು-ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವಿಕೆಯನ್ನು "ಎಂಪಥಿ ಗ್ಯಾಪ್" ಎಂದು ತಳ್ಳಿಹಾಕುವುದು.
      excusing_behavior: |
        "ಅವರು ಸಹಾಯ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ - ಎಂಪಥಿ ಗ್ಯಾಪ್" ಎಂದು ಹೇಳುವುದು, ಜನರು ತಮ್ಮ ಸ್ಥಿತಿಗಳನ್ನು ನಿರ್ವಹಿಸಲು ಜವಾಬ್ದಾರರಾಗಿರುವಾಗ.
      false_relativism: |
        ಶ್ರಮ ಮತ್ತು ಅನುಭವದಿಂದ ನಾವು ಸುಧಾರಿಸಬಹುದಾದರೂ, ನಾವು ಎಂದಿಗೂ ಇತರರನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಸಾಧ್ಯವಿಲ್ಲ ಎಂದು ಊಹಿಸುವುದು.
      self_excuse: |
        ನಮ್ಮ ಸ್ವಂತ ಪಾಲನೆ ವೈಫಲ್ಯಗಳನ್ನು ಸಮರ್ಥಿಸಲು ಎಂಪಥಿ ಗ್ಯಾಪ್ ಅನ್ನು ಬಳಸುವುದು.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮ (Endowment Effect)
    quick_introduction: |
      ನಾವು ಏನನ್ನಾದರೂ ಹೊಂದಿರುವ ಕಾರಣದಿಂದಲೇ ಅದಕ್ಕೆ ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುವ ಪ್ರವೃತ್ತಿಯೇ ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮ.
      ಒಂದು ವಸ್ತುವನ್ನು ಬಿಟ್ಟುಕೊಡಲು ನಾವು ಕೇಳುವ ಬೆಲೆ, ಅದನ್ನು ಪಡೆಯಲು ನಾವು ಪಾವತಿಸಲು ಸಿದ್ಧವಿರುವ ಬೆಲೆಗಿಂತ ಹೆಚ್ಚಿರುತ್ತದೆ.
      ಮಾಲೀಕತ್ವವು ಬಾಂಧವ್ಯವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ, ಅದು ನಮ್ಮ ಮೌಲ್ಯಮಾಪನವನ್ನು ತಿರುಚುತ್ತದೆ.
    one_liner: ನಾವು ಹೊಂದಿದ್ದನ್ನು, ಹೊಂದಿರದಿದ್ದಕ್ಕಿಂತ ಹೆಚ್ಚು ಮೌಲ್ಯಯುತವೆಂದು ಪರಿಗಣಿಸುತ್ತೇವೆ- ಮಾಲೀಕತ್ವವು ಬಾಂಧವ್ಯವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
    try_this:
      - Ask: ನಾನಿಂದು ಹೊಂದಿರದಿದ್ದರೆ, ಇದನ್ನು ಪಡೆಯಲು ನಾನೇನು ಪಾವತಿಸುತ್ತಿದ್ದೆ?
      - When selling, imagine you're buying—would you pay your asking price? (ಮಾರಾಟ ಮಾಡುವಾಗ, ನೀವು ಖರೀದಿಸುತ್ತಿದ್ದೀರಿ ಎಂದು ಊಹಿಸಿ—ನಿಮ್ಮ ಕೇಳುವ ಬೆಲೆಯನ್ನು ಪಾವತಿಸುವಿರಾ?)
      - Notice when ownership is inflating your valuation. (ಮಾಲೀಕತ್ವವು ನಿಮ್ಮ ಮೌಲ್ಯಮಾಪನವನ್ನು ಹೆಚ್ಚಿಸುತ್ತಿದೆ ಎಂದು ಗಮನಿಸಿ.)
    ask_yourself:
      - Am I overvaluing this because I own it? (ನಾನು ಇದನ್ನು ಹೊಂದಿರುವ ಕಾರಣದಿಂದಲೇ ಇದನ್ನು ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ?)
      - Would a neutral buyer agree with my price? (ಒಬ್ಬ ತಟಸ್ಥ ಖರೀದಿದಾರನು ನನ್ನ ಬೆಲೆಯನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾನೆಯೇ?)
    in_more_detail: |
      ಪ್ರಯೋಗಗಳಲ್ಲಿ, ಯಾದೃಚ್ಛಿಕವಾಗಿ ಒಂದು ಮಗ್ ಅನ್ನು ನೀಡಿದ ಜನರು, ಅದನ್ನು ಮಾರಾಟ ಮಾಡಲು ಇತರರು ಖರೀದಿಸಲು ಇಷ್ಟಪಡುವ ಮೊತ್ತಕ್ಕಿಂತ ಸುಮಾರು ಎರಡು ಪಟ್ಟು ಹೆಚ್ಚು ಕೇಳುತ್ತಾರೆ.
      ಕೇವಲ ಮಾಲೀಕತ್ವದ ಸಂಗತಿಯು ಗ್ರಹಿಸಿದ ಮೌಲ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ಇದು ನಷ್ಟದ ಅನಿವಾರ್ಯತೆಗೆ (loss aversion) ಸಂಬಂಧಿಸಿದೆ- ಯಾವುದನ್ನಾದರೂ ಬಿಟ್ಟುಕೊಡುವುದು ನಷ್ಟದಂತೆ ಭಾಸವಾಗುತ್ತದೆ, ಮತ್ತು ನಾವು ನಷ್ಟವನ್ನು ತಪ್ಪಿಸುತ್ತೇವೆ.
      ಆದರೆ ಪರಿಣಾಮವು ಅದಕ್ಕಿಂತಾ ಆಚೆಗೆ ಹೋಗುತ್ತದೆ: ನಾವು ಹೊಂದಿರುವ ವಸ್ತುಗಳನ್ನು ನಮ್ಮ ಗುರುತಿನ ಭಾಗವನ್ನಾಗಿ ಮಾಡಿಕೊಳ್ಳುತ್ತೇವೆ.

      ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವು ಮಾತುಕತೆಗಳು, ಗ್ರಾಹಕರ ನಡವಳಿಕೆ ಮತ್ತು ಸಾಂಸ್ಥಿಕ ಬದಲಾವಣೆಯ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
      ಜನರು ತಮ್ಮ ಮನೆಗಳು, ತಮ್ಮ ಆಲೋಚನೆಗಳು ಮತ್ತು ತಮ್ಮ ಪ್ರಸ್ತುತ ಪಾತ್ರಗಳನ್ನು ಏಕೆ ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುತ್ತಾರೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
      ಇದು ವಹಿವಾಟುಗಳು ಮತ್ತು ಪರಿವರ್ತನೆಗಳಲ್ಲಿ ಘರ್ಷಣೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.
    why_this_is_important: |
      ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದು ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಮಾತುಕತೆ ನಡೆಸಲು,
      ಯಾವುದನ್ನು ಇಟ್ಟುಕೊಳ್ಳಬೇಕು ಅಥವಾ ಬಿಟ್ಟುಕೊಡಬೇಕು ಎಂಬ ಬಗ್ಗೆ ಸ್ಪಷ್ಟವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಮತ್ತು
      ಇತರರು ತಮ್ಮಲ್ಲಿರುವದನ್ನು ಏಕೆ ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುತ್ತಾರೆ ಎಂಬುದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      ಇದು ಬದಲಾವಣೆಯ ಪ್ರತಿರೋಧವನ್ನೂ ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ (decision-making)
      - ಮಾತುಕತೆ (negotiation)
      - ಹೂಡಿಕೆ (investing)
      - ವೃತ್ತಿ_ಜೀವನ_ಕ್ರಮಗಳು (career_moves)
    how_can_you_spot_it:
      ownership_premium: |
        "ನಾನದನ್ನು ಆ ಬೆಲೆಗೆ ಮಾರಾಟ ಮಾಡುವುದಿಲ್ಲ" - ನೀವು ಅದನ್ನು ಖರೀದಿಸಲು ಆ ಬೆಲೆಯನ್ನು ಪಾವತಿಸದಿದ್ದಾಗ.
      attachment_to_possession: |
        ವಸ್ತುಗಳನ್ನು ಪಡೆದ ನಂತರ ಅವುಗಳಿಗೆ ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುವುದು.
      resistance_to_trading: |
        ತಾರ್ಕಿಕವಾಗಿದ್ದರೂ ಸಹ ವಹಿವಾಟು ನಡೆಸಲು ಅಥವಾ ವಿನಿಮಯ ಮಾಡಲು ಹಿಂಜರಿಕೆ.
      overvaluation_of_own_ideas: |
        ನಮ್ಮ ಆಲೋಚನೆಗಳು, ಯೋಜನೆಗಳು ಅಥವಾ ಪಾತ್ರಗಳು ನಮ್ಮದಾಗಿರುವುದರಿಂದ ಹೆಚ್ಚು ಮೌಲ್ಯಯುತವೆಂದು ಭಾಸವಾಗುತ್ತವೆ.
    examples:
      real_estate: |
        ಮನೆ ಮಾಲೀಕರು ತಮ್ಮ ಮನೆಗಳನ್ನು ಅತಿಯಾಗಿ ಬೆಲೆಯಿಡುತ್ತಾರೆ - ಮಾರುಕಟ್ಟೆಗಿಂತ ಅವರು ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುತ್ತಾರೆ.
      negotiations: |
        ಮಾರಾಟಗಾರರು ಖರೀದಿದಾರರು ಪಾವತಿಸುವುದಕ್ಕಿಂತ ಹೆಚ್ಚು ಕೇಳುತ್ತಾರೆ; ಅಂತರವು ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತದೆ.
      career: |
        ಬದಲಾವಣೆಯನ್ನು ಪರಿಗಣಿಸುವಾಗ ನಮ್ಮ ಪ್ರಸ್ತುತ ಉದ್ಯೋಗ, ಕಂಪನಿ, ಅಥವಾ ಪಾತ್ರವನ್ನು ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುವುದು.
      ideas: |
        "ಇಲ್ಲಿ ಕಂಡುಹಿಡಿಯಲಾಗಿಲ್ಲ" ಮತ್ತು "ನನ್ನ ಕಲ್ಪನೆ" ಪಕ್ಷಪಾತ - ನಾವು ರಚಿಸಿದ್ದನ್ನು ಅಥವಾ ಹೊಂದಿದ್ದನ್ನು ಅತಿಯಾಗಿ ಮೌಲ್ಯಮಾಪನ ಮಾಡುತ್ತೇವೆ.
    real_world_implications: |
      ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವು ಮಾರುಕಟ್ಟೆಯಲ್ಲಿ ಘರ್ಷಣೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ, ಪ್ರಯೋಜನಕಾರಿ ವಹಿವಾಟುಗಳನ್ನು ನಿಧಾನಗೊಳಿಸುತ್ತದೆ ಮತ್ತು ಬದಲಾವಣೆಯ ಪ್ರತಿರೋಧವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.
      ಇದು ವಿಲೀನಗಳು, ಪುನಸ್ಸಂಘಟನೆಗಳು ಮತ್ತು ವೈಯಕ್ತಿಕ ಪರಿವರ್ತನೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಮಾತುಕತೆ ಮತ್ತು ಬದಲಾವಣೆ ನಿರ್ವಹಣೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ಬದಲಾವಣೆಯನ್ನು ವಿರೋಧಿಸಿದಾಗ, ಅವರು ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವನ್ನು ಅನುಭವಿಸುತ್ತಿರಬಹುದು ಎಂದು ಪರಿಗಣಿಸಿ - ಅವರು ಸ್ಥಿತಿಗತಿಗೆ ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ಅದನ್ನು "ಹೊಂದಿದ್ದಾರೆ".
        ಬದಲಾವಣೆಯನ್ನು ಅವರು ಏನು ಬಿಟ್ಟುಕೊಡುತ್ತಾರೆ ಎಂಬುದರ ಮೇಲೆ ಮಾತ್ರವಲ್ಲ, ಏನು ಗಳಿಸುತ್ತಾರೆ ಎಂಬುದರ ದೃಷ್ಟಿಯಿಂದ ರೂಪಿಸಿ.
      collaborative_learning_initiative: |
        ಹೊಸ ಪ್ರಕ್ರಿಯೆಗಳನ್ನು ಪರಿಚಯಿಸುವಾಗ, ಜನರು ಪ್ರಸ್ತುತ ವಿಧಾನಗಳಿಗೆ ಬದ್ಧರಾಗಿರುತ್ತಾರೆ ಎಂಬುದನ್ನು ಒಪ್ಪಿಕೊಳ್ಳಿ.
        ಹೊಸದನ್ನು ಅಳವಡಿಸಿಕೊಳ್ಳುವ ಮೊದಲು ಹಳೆಯದನ್ನು "ಬಿಟ್ಟುಬಿಡಲು" ಮಾನಸಿಕ ಸುರಕ್ಷತೆಯನ್ನು ರಚಿಸಿ.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        ಕೆಲವು ಬಾಂಧವ್ಯಗಳು ತಾರ್ಕಿಕವಾಗಿರುತ್ತವೆ - ಭಾವನಾತ್ಮಕ ಮೌಲ್ಯ, ಬದಲಾವಣೆಯ ವೆಚ್ಚಗಳು.
        ಎಲ್ಲಾ ಪ್ರತಿರೋಧವೂ ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವಲ್ಲ.
      manipulation: |
        ಹೆಚ್ಚಿನ ಬೆಲೆಗಳನ್ನು ಹೊರತೆಗೆಯಲು ಸುಳ್ಳು ಮಾಲೀಕತ್ವದ ಭಾವನೆಯನ್ನು ಸೃಷ್ಟಿಸುವುದು (ಉದಾ., ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮವನ್ನು ಪ್ರಚೋದಿಸಲು "ಉಚಿತವಾಗಿ ಪ್ರಯತ್ನಿಸಿ").
      undervaluing_continuity: |
        ಎಲ್ಲಾ ಬದಲಾವಣೆಯ ಪ್ರತಿರೋಧವನ್ನು ಅನೈತಿಕವೆಂದು ಊಹಿಸುವುದು, ಆದರೆ ನಿರಂತರತೆಗೆ ನಿಜವಾದ ಮೌಲ್ಯವಿದ್ದಾಗ.
      cold_rationality: |
        ಭಾವನಾತ್ಮಕ ಬಾಂಧವ್ಯವನ್ನು "ಕೇವಲ ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮ" ಎಂದು ತಳ್ಳಿಹಾಕುವುದು, ಅದು ನಿಜವಾದ ಮೌಲ್ಯಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸಿದಾಗ.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮ (The False Consensus Effect)
    quick_introduction: |
      ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮವೆಂದರೆ ಇತರರು ನಮ್ಮ ನಂಬಿಕೆಗಳು, ವರ್ತನೆಗಳು ಮತ್ತು ಚಟುವಟಿಕೆಗಳೊಂದಿಗೆ
      ಎಷ್ಟು ಒಪ್ಪುತ್ತಾರೆ ಎಂಬುದನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿ. ನಮ್ಮ ಅಭಿಪ್ರಾಯಗಳು
      ಅವುಗಳಿರುವ ಪ್ರಮಾಣಕ್ಕಿಂತ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವೆಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಮತ್ತು ಸಮಂಜಸವಾದ ಜನರು
      ಅಸಮ್ಮತಿ ಸೂಚಿಸಬಹುದು ಎಂದು ನಾವು ಊಹಿಸಲು ಕಷ್ಟಪಡುತ್ತೇವೆ.
    one_liner: ಇತರರು ನಮ್ಮೊಂದಿಗೆ ಎಷ್ಟು ಒಪ್ಪುತ್ತಾರೆ ಎಂಬುದನ್ನು ನಾವು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ.
    try_this:
      - ನಮ್ಮನ್ನು ವಿರೋಧಿಸುವವರನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ - ಒಮ್ಮತವಿದೆ ಎಂದು ಊಹಿಸಬೇಡಿ.
      - ಪ್ರಾರಂಭಿಸುವ ಮೊದಲು, ನಿಮ್ಮ ಊಹೆಗಳನ್ನು ಹಂಚಿಕೊಳ್ಳದ ಜನರೊಂದಿಗೆ ಪರೀಕ್ಷಿಸಿ.
      - ಕೇಳಿ: ಭಿನ್ನಾಭಿಪ್ರಾಯ ಹೊಂದಿರುವ ವ್ಯಕ್ತಿ ಏನು ಹೇಳಬಹುದು? ಅದನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಿ.
    ask_yourself:
      - ಇತರರು ನನ್ನಂತೆ ಯೋಚಿಸುತ್ತಾರೆ ಎಂದು ನಾನು ಊಹಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ಯಾರಾದರೂ ವಿಭಿನ್ನ ನೋಟವನ್ನು ಹೊಂದಿದ್ದಾಗ ನಾನು ಕೊನೆಯ ಬಾರಿಗೆ ಆಶ್ಚರ್ಯಪಟ್ಟಿದ್ದು ಯಾವಾಗ?
    in_more_detail: |
      ನಾವು ಒಂದು ನಿಲುವನ್ನು ಹೊಂದಿರುವಾಗ, ಅದು ರೂಢಿಯಾಗಿದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ನಾವು
      ನಮ್ಮಂತೆಯೇ ಯೋಚಿಸುವ ಜನರೊಂದಿಗೆ ನಮ್ಮನ್ನು ಸುತ್ತುವರಿಯುತ್ತೇವೆ, ದೃಢೀಕರಿಸುವ ಮಾಧ್ಯಮವನ್ನು
      ಬಳಸುತ್ತೇವೆ, ಮತ್ತು ಅಸ್ಪಷ್ಟ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಒಪ್ಪಿಗೆಯಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೇವೆ. ಇದು ಒಮ್ಮತದ
      ಮಿಥ್ಯೆಯನ್ನು ಬಲಪಡಿಸುವ ಪ್ರತಿಧ್ವನಿ ಕೋಣೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ.

      ನಮ್ಮ ಆಳವಾದ ನಂಬಿಕೆಗಳಿಗೆ ಮತ್ತು ನಮ್ಮ ಸ್ಥಾನದಲ್ಲಿ ನಾವು ಹೆಚ್ಚು ಹೂಡಿಕೆ ಮಾಡಿದ್ದರೆ ಈ
      ಪರಿಣಾಮವು ಬಲವಾಗಿರುತ್ತದೆ. ಇದು ಇತರರು ಅಸಮ್ಮತಿ ಸೂಚಿಸಿದಾಗ ಆಶ್ಚರ್ಯ, ಮಾತುಕತೆಯಲ್ಲಿ
      ಕಷ್ಟ, ಮತ್ತು ಗ್ರಾಹಕರು ನಮ್ಮಂತೆ ಯೋಚಿಸುತ್ತಾರೆ ಎಂದು ನಾವು ಊಹಿಸಿದಾಗ ಕಳಪೆ ಮಾರುಕಟ್ಟೆ
      ಸಂಶೋಧನೆಗೆ ಕಾರಣವಾಗಬಹುದು.
    why_this_is_important: |
      ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದು ನೈಜ ಭಿನ್ನಾಭಿಪ್ರಾಯಕ್ಕಾಗಿ ತಯಾರಾಗಲು,
      ಉತ್ತಮ ಸಂಶೋಧನೆ ನಡೆಸಲು ಮತ್ತು ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಸಂವಹನ ಮಾಡಲು ನಿಮಗೆ ಸಹಾಯ
      ಮಾಡುತ್ತದೆ. ಇದು ಉತ್ಪನ್ನ ಅಭಿವೃದ್ಧಿ, ಮಾತುಕತೆ ಮತ್ತು ನಾಯಕತ್ವಕ್ಕೆ ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ (decision_making)
      - ಮಾತುಕತೆ (negotiation)
      - ನಾಯಕತ್ವ (leadership)
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ (problem_solving)
    how_can_you_spot_it:
      surprise_at_disagreement: |
        ನೀವು ಸ್ಪಷ್ಟವೆಂದು ಪರಿಗಣಿಸುವ ವಿಷಯಕ್ಕೆ ಯಾರಾದರೂ ಭಿನ್ನಾಭಿಪ್ರಾಯ ಸೂಚಿಸಿದಾಗ ನೀವು ನಿಜವಾಗಿಯೂ
        ಆಘಾತಕ್ಕೊಳಗಾಗುತ್ತೀರಿ.
      assuming_shared_values: |
        ಪರಿಶೀಲಿಸದೆ ಇತರರು ನಿಮ್ಮ ಆದ್ಯತೆಗಳನ್ನು ಹಂಚಿಕೊಳ್ಳುತ್ತಾರೆ ಎಂದು ನೀವು ವರ್ತಿಸುತ್ತೀರಿ.
      underestimating_opposition: |
        ಪ್ರಸ್ತಾವನೆಗಳು ಅವು ಪಡೆಯುವ ಪ್ರತಿರೋಧಕ್ಕಿಂತ ಕಡಿಮೆ ಪಡೆಯುತ್ತವೆ ಎಂದು ನೀವು ನಿರೀಕ್ಷಿಸುತ್ತೀರಿ.
      echo_chamber_detection: |
        ನಿಮ್ಮ ಸಾಮಾಜಿಕ ಮತ್ತು ಮಾಹಿತಿ ಪರಿಸರವು ನಿಮ್ಮ ವೀಕ್ಷಣೆಗಳನ್ನು ವಿರಳವಾಗಿ ಪ್ರಶ್ನಿಸುತ್ತದೆ.
    examples:
      product_development: |
        ತಂಡದವರೆಲ್ಲರಿಗೂ ವೈಶಿಷ್ಟ್ಯ X ಬೇಕು ಎಂದು ತಂಡವು ಊಹಿಸುತ್ತದೆ - ಕೇವಲ ಕಡಿಮೆ
        ಬಳಕೆಯನ್ನು ಕಂಡುಕೊಳ್ಳಲು.
      politics: |
        ರಾಜಕೀಯ ಗುಂಪುಗಳಲ್ಲಿರುವ ಜನರು ತಮ್ಮ ನಿರೀಕ್ಷೆಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗದ ಚುನಾವಣಾ ಫಲಿತಾಂಶಗಳಿಂದ
        ಆಶ್ಚರ್ಯ ಪಡುತ್ತಾರೆ.
      negotiation: |
        ಎರಡೂ ಪಕ್ಷಗಳು "ಸಮಂಜಸವೆಂದು" ತೋರುವುದರಿಂದ ಷರತ್ತುಗಳಿಗೆ ಒಪ್ಪಿಕೊಳ್ಳುತ್ತವೆ ಎಂದು
        ಊಹಿಸುವುದು.
      hiring: |
        "ಸಂಸ್ಕೃತಿ ಹೊಂದಾಣಿಕೆ"ಗಾಗಿ ನೇಮಕಾತಿ ಎಂದರೆ ನಿಮ್ಮೊಂದಿಗೆ ಒಪ್ಪುವ ಜನರನ್ನು ನೇಮಿಸಿಕೊಳ್ಳುವುದು,
        ಸುಳ್ಳು ಒಮ್ಮತವನ್ನು ಬಲಪಡಿಸುತ್ತದೆ.
    real_world_implications: |
      ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮವು ಧ್ರುವೀಕರಣ, ವಿಫಲವಾದ ಉತ್ಪನ್ನ ಬಿಡುಗಡೆಗಳು ಮತ್ತು ಮುರಿದ
      ಮಾತುಕತೆಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದು ನಮ್ಮ ಭವಿಷ್ಯಸೂಚನೆಗಳಲ್ಲಿ ಅತಿಯಾದ ವಿಶ್ವಾಸ ಮತ್ತು
      ವಿರೋಧಕ್ಕಾಗಿ ಅಂಡರ್‌ಪ್ರಿಪೇರ್ಡ್ ಆಗುವಂತೆ ಮಾಡುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಭಿನ್ನಾಭಿಪ್ರಾಯದ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹೊಂದಿರುವ ಜನರನ್ನು ಸಕ್ರಿಯವಾಗಿ ಹುಡುಕಿ. ಹಂಚಿಕೆಯ
        ನಂಬಿಕೆಗಳನ್ನು ಊಹಿಸಬೇಡಿ - ಕೇಳಿ ಮತ್ತು ಆಲಿಸಿ.
      collaborative_learning_initiative: |
        ತಂಡಗಳಲ್ಲಿ, ವೆಚ್ಚದಾಯಕವಾಗುವ ಮೊದಲು ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ಬಹಿರಂಗಪಡಿಸಲು ರಚನಾತ್ಮಕ
        ವಿರೋಧವನ್ನು (ಉದಾ., "ಪ್ರೀ-ಮೋರ್ಟಮ್ಸ್," ಡೆವಿಲ್ಸ್ ವಕೀಲ) ಬಳಸಿ.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        ಅಸಮ್ಮತಿ ಸೂಚಿಸುವವರು ಸಮಂಜಸರಲ್ಲ ಅಥವಾ ಮಾಹಿತಿ ಇಲ್ಲದವರು ಎಂದು ಊಹಿಸುವುದು, ಅವರು
        ಸರಿಯಾದ ವಿಭಿನ್ನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹೊಂದಿರಬಹುದು ಎಂದು ಪರಿಗಣಿಸುವ ಬದಲು.
      poor_research: |
        "ಅವರಿಗೆ ಏನು ಬೇಕು ಎಂದು ನಮಗೆ ಈಗಾಗಲೇ ತಿಳಿದಿದೆ" ಎಂದು ಗ್ರಾಹಕರ ಸಂಶೋಧನೆಯನ್ನು
        ತಪ್ಪಿಸಿಕೊಳ್ಳುವುದು.
      overconfidence: |
        ಇತರರು ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆ ಎಂಬ ಊಹೆಯ ಆಧಾರದ ಮೇಲೆ ಧೈರ್ಯಶಾಲಿ ಪಣತೊಡುವುದು.
      groupthink_amplification: |
        ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮವನ್ನು ಪ್ರಶ್ನಿಸದ ತಂಡಗಳು ಗುಂಪು ಚಿಂತನೆಗೆ ಜಾರಬಹುದು.
