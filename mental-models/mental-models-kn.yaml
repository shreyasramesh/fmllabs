    how_can_you_spot_it:
      uneven_distribution: |
        X ನ ಸಣ್ಣ ಭಾಗವು Y ನ ದೊಡ್ಡ ಭಾಗವನ್ನು ಲೆಕ್ಕಾಚಾರ ಮಾಡುತ್ತದೆ.
      high_leverage_activities: |
        ಕೆಲವು ಕ್ರಿಯೆಗಳು ಹೆಚ್ಚಿನ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತವೆ.
      low_value_tail: |
        ಅನೇಕ ಚಟುವಟಿಕೆಗಳು ಕಡಿಮೆ ಕೊಡುಗೆ ನೀಡುತ್ತವೆ; ಅವುಗಳನ್ನು ಕತ್ತರಿಸುವುದರಿಂದ ಸಣ್ಣ ಪರಿಣಾಮ ಉಂಟಾಗುತ್ತದೆ.
      vital_few_vs_trivial_many: |
        ಯಾವುದು ಹೆಚ್ಚು ಮುಖ್ಯ ಎಂಬುದನ್ನು ಗುರುತಿಸುವುದೇ ಇಲ್ಲಿನ ರಹಸ್ಯ.
    examples:
      sales: |
        20% ಗ್ರಾಹಕರು 80% ಆದಾಯವನ್ನು ಉತ್ಪಾದಿಸುತ್ತಾರೆ—ಅವರನ್ನು ಉಳಿಸಿಕೊಳ್ಳಲು ಮತ್ತು ಬೆಳೆಸಲು ಗಮನ ಹರಿಸಿ.
      software: |
        20% ವೈಶಿಷ್ಟ್ಯಗಳು 80% ಬಳಕೆಗೆ ಕಾರಣವಾಗಿವೆ—ಅವುಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಿ.
      productivity: |
        ಕೆಲವು ಅಭ್ಯಾಸಗಳು ಅಥವಾ ದಿನಚರಿಗಳು ನಿಮ್ಮ ಹೆಚ್ಚಿನ ಔಟ್‌ಪುಟ್ ಅನ್ನು ಉತ್ಪಾದಿಸುತ್ತವೆ—ಅವುಗಳ ಮೇಲೆ ಹೆಚ್ಚು ಗಮನ ಹರಿಸಿ.
      problems: |
        20% ದೋಷಗಳು 80% ಕ್ರ್ಯಾಶ್‌ಗಳಿಗೆ ಕಾರಣವಾಗಿವೆ—ಮೊದಲು ಅವುಗಳನ್ನು ಸರಿಪಡಿಸಿ.
    real_world_implications: |
      ಪರೆಟೊ ತತ್ವವು ಸಂಪನ್ಮೂಲ ಹಂಚಿಕೆ, ಉತ್ಪನ್ನ ಕಾರ್ಯತಂತ್ರ ಮತ್ತು ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ. ಇದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ಶ್ರಮವನ್ನು ಅತಿಯಾಗಿ ಹರಡುವುದಕ್ಕೆ ಕಾರಣವಾಗುತ್ತದೆ. ಇದನ್ನು ಅತಿಯಾಗಿ ಅನ್ವಯಿಸುವುದರಿಂದ "ಉದ್ದದ ಬಾಲ"ದ (long tail) ನಿರ್ಲಕ್ಷಕ್ಕೆ ಕಾರಣವಾಗಬಹುದು.
    professional_application:
      networking_and_relationship_building: |
        ನಿಮ್ಮ ಗುರಿಗಳಿಗೆ ಮುಖ್ಯವಾದ ಸಂಬಂಧಗಳನ್ನು ಗುರುತಿಸಿ. ಸಮಾನವಾಗಿ ಶ್ರಮವನ್ನು ಹಂಚುವ ಬದಲು, ಅವುಗಳಲ್ಲಿ ಅಸಮಾನವಾಗಿ ಹೂಡಿಕೆ ಮಾಡಿ.
      collaborative_learning_initiative: |
        ತಂಡದ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸುಧಾರಿಸುವಾಗ, 80% ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವ 20% ಮಧ್ಯಸ್ಥಿಕೆಗಳನ್ನು ಹುಡುಕಿ. ಅಲ್ಲಿ ತರಬೇತಿ ಮತ್ತು ಪ್ರಕ್ರಿಯೆ ಬದಲಾವಣೆಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.
    how_can_this_be_misapplied:
      oversimplification: |
        80/20 ಎಲ್ಲೆಡೆ ಅನ್ವಯಿಸುತ್ತದೆ ಎಂದು ಊಹಿಸುವುದು; ಕೆಲವು ವಿತರಣೆಗಳು ಹೆಚ್ಚು ಸಮಾನವಾಗಿರುತ್ತವೆ.
      neglecting_the_tail: |
        "ಅಲ್ಪಪ್ರಮಾಣದ ಅನೇಕ" (trivial many) ವಿಷಯಗಳು ಸಾಮೂಹಿಕವಾಗಿ ಮುಖ್ಯವಾದಾಗ ಅವುಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದು (ಉದಾ., ಅನೇಕ ಸಣ್ಣ ಗ್ರಾಹಕರು, ಅಂಚಿನ ಪ್ರಕರಣಗಳು).
      false_precision: |
        80/20 ಅನ್ನು ನಿಖರವಾದ ನಿಯಮದಂತೆ ಪರಿಗಣಿಸುವುದು, ಕೇವಲ ಅಂದಾಜು ಮಾಡಬಹುದಾದ ಸಾಧನವಾಗಿಲ್ಲ.
      misidentifying_the_vital_few: |
        ದೋಷಪೂರಿತ ವಿಶ್ಲೇಷಣೆಯಿಂದಾಗಿ ತಪ್ಪಾದ 20% ಮೇಲೆ ಗಮನ ಹರಿಸುವುದು.
