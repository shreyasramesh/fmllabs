# Mental Models & Cognitive Biases (Kannada)
# Consolidated from mental-models-kn/

mental_models:
  - id: ambiguity_effect
    name: ಅಸ್ಪಷ್ಟತೆಯ ಪರಿಣಾಮ
    quick_introduction: |
      ಮಾಹಿತಿಯ ಕೊರತೆಯಿರುವ ಆಯ್ಕೆಗಳನ್ನು ತಪ್ಪಿಸುವ ಪ್ರವೃತ್ತಿ ಇದು, ಫಲಿತಾಂಶಗಳ ಸಂಭವನೀಯತೆಗಳ ಬಗ್ಗೆ ನಮಗೆ ಮಾಹಿತಿ ಇಲ್ಲದಿರುವಾಗ. ನಮಗೆ ತಿಳಿದಿರುವ ಅಪಾಯಗಳನ್ನು ನಾವು ಅಪರಿಚಿತ ಅಪಾಯಗಳಿಗಿಂತ ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ, ಆ ಅಪರಿಚಿತ ಅಪಾಯಗಳು ಉತ್ತಮವಾಗಿದ್ದರೂ ಸಹ. ಅನಿಶ್ಚಿತತೆಯು ಸ್ವತಃ ಅಹಿತಕರವೆನಿಸುತ್ತದೆ.
    one_liner: ನಮಗೆ ತಿಳಿದಿರುವ ಅಪಾಯಗಳನ್ನು ನಾವು ಅಪರಿಚಿತ ಅಪಾಯಗಳಿಗಿಂತ ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ - ಆ ಅಪರಿಚಿತವು ಉತ್ತಮವಾಗಿದ್ದರೂ ಸಹ.
    try_this:
      - Ask: ಈ ಆಯ್ಕೆಯನ್ನು ಮುಖ್ಯವಾಗಿ ಅನಿಶ್ಚಿತತೆಯಿಂದ ತಪ್ಪಿಸುತ್ತಿದ್ದೇನೆಯೇ, ಅಥವಾ ನಿಜವಾದ ಹಿನ್ನಡೆಯಿದೆಯೇ?
      - Quantify what you do know; sometimes the "ambiguous" option has clearer upside.
      - Notice when you default to the familiar just because it feels safer.
    ask_yourself:
      - Am I rejecting something because it's ambiguous, or because it's genuinely worse?
      - What would I need to know to feel comfortable with the uncertain option?
    in_more_detail: |
      ಎಲ್ಸ್‌ಬರ್ಗ್‌ನ ವಿರೋಧಾಭಾಸದಲ್ಲಿ, ತಿಳಿದಿರುವ ಪ್ರಮಾಣದ ಚೆಂಡುಗಳಿರುವ ಕುಡಿಕೆಯ ಮೇಲೆ ಊಹೆ ಮಾಡಲು ಜನರಿಗೆ ಅಪರಿಚಿತ ಪ್ರಮಾಣದ ಚೆಂಡುಗಳಿರುವ ಕುಡಿಕೆಯ ಮೇಲೆ ಊಹೆ ಮಾಡಲು ಆದ್ಯತೆ ನೀಡುತ್ತಾರೆ, ಅಪರಿಚಿತ ಕುಡಿಯು ಉತ್ತಮ ಅವಕಾಶಗಳನ್ನು ನೀಡಬಹುದಾದರೂ ಸಹ. ನಮಗೆ ಅಸ್ಪಷ್ಟತೆ ಇಷ್ಟವಿಲ್ಲ - ನಮಗೆ ಅಸ್ಪಷ್ಟವಾದದಕ್ಕಿಂತ ಸ್ಪಷ್ಟವಾದ (ಕೆಟ್ಟದಾದರೂ) ಸಂಭವನೀಯತೆ ಇರಲು ಬಯಸುತ್ತೇವೆ.

      ಈ ಪರಿಣಾಮವು ಹೂಡಿಕೆ, ಉದ್ಯೋಗ ಆಯ್ಕೆಗಳು ಮತ್ತು ನೀತಿಯಲ್ಲಿ ನಿರ್ಧಾರಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ. ಇದು ಉಪ-ಆಪ್ಟಿಮಲ್ ಆಯ್ಕೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು, ನಾವು ಅಸ್ಪಷ್ಟವಾದ ಆದರೆ ಸಂಭಾವ್ಯವಾಗಿ ಶ್ರೇಷ್ಠ ಆಯ್ಕೆಗಳನ್ನು ತಪ್ಪಿಸಿದಾಗ. ಇದು ನಾವು ಪರಿಚಿತ ಬ್ರಾಂಡ್‌ಗಳು ಮತ್ತು ತಿಳಿದಿರುವ ಪ್ರಮಾಣಗಳನ್ನು ಏಕೆ ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    why_this_is_important: |
      ಅಸ್ಪಷ್ಟತೆಯ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನಿಮಗೆ ಪರಿಚಿತವಾದದ್ದನ್ನು ಅತಿಯಾಗಿ ಆದ್ಯತೆ ನೀಡುವುದನ್ನು ಮತ್ತು ಅನಿಶ್ಚಿತತೆಯನ್ನು ಕಡಿಮೆ ಆದ್ಯತೆ ನೀಡುವುದನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಅಸ್ಪಷ್ಟತೆಯು ನಿರ್ವಹಿಸಬಹುದಾದಾಗ ಇದು ಕಳೆದುಹೋದ ಅವಕಾಶಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು. ಇದು ಪಾರದರ್ಶಕತೆ ಮತ್ತು ಸ್ಪಷ್ಟತೆ ಏಕೆ ಆತಂಕವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವುದು
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಹೂಡಿಕೆ
      - ಉದ್ಯೋಗ_ಬದಲಾವಣೆಗಳು
    how_can_you_spot_it:
      preference_for_known_risks: |
        Choosing options with clear (even if worse) probabilities over ambiguous ones.
      avoidance_of_uncertainty: |
        Rejecting options primarily because "we don't know enough."
      familiarity_over_optimality: |
        Preferring the known over the potentially better unknown.
      information_seeking: |
        Willingness to pay for information that reduces ambiguity—even when it
        doesn't change the decision.
    examples:
      investing: |
        Preferring domestic stocks over international because "we understand them
        better" despite diversification benefits.
      employment: |
        Staying in a known job rather than taking a role with uncertain upside.
      product_choice: |
        Choosing a familiar brand over a new option with uncertain quality.
      medical: |
        Preferring a treatment with known side effects over one with uncertain
        outcomes, even when the latter might be better.
    real_world_implications: |
      The ambiguity effect shapes markets, career choices, and policy. It can be
      reduced by providing clearer information or by reframing decisions. It
      also explains why transparency and communication reduce anxiety.
    professional_application:
      networking_and_relationship_building: |
        Reduce ambiguity in relationships: clarify expectations, communicate
        explicitly, and reduce uncertainty. People prefer known situations.
      collaborative_learning_initiative: |
        When introducing change, reduce ambiguity—provide clear information about
        what will happen, when, and why. Ambiguity increases resistance.
    how_can_this_be_misapplied:
      manipulation: |
        Deliberately creating ambiguity to steer people toward preferred options.
      false_clarity: |
        Providing false certainty when genuine uncertainty exists.
      overconfidence: |
        Assuming that reducing ambiguity always improves decisions—sometimes
        the ambiguous option is genuinely better.
      analysis_paralysis: |
        Waiting for perfect information before deciding when some ambiguity
        is inevitable.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
      - default_effect
  - id: anchoring_bias
    name: ಆಂಕರಿಂಗ್ ಬಯಾಸ್
    quick_introduction: |
      ಆಂಕರಿಂಗ್ ಬಯಾಸ್ ಎಂದರೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಎದುರಾದ ಮೊದಲ ಮಾಹಿತಿಯ ಮೇಲೆ ಅತಿಯಾಗಿ ಅವಲಂಬಿತರಾಗುವ ಪ್ರವೃತ್ತಿ. ಆ ಮೊದಲ "ಆಂಕರ್" ನಂತರದ ತೀರ್ಪುಗಳನ್ನು ತಿರುಚಿಹಾಕುತ್ತದೆ, ಅದು ಅಪ್ರಸ್ತುತ ಅಥವಾ ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೂ ಸಹ.
    one_liner: ನೀವು ನೋಡುವ ಮೊದಲ ಸಂಖ್ಯೆಯು ನಂತರ ಬರುವ ಎಲ್ಲವನ್ನೂ ರೂಪಿಸುತ್ತದೆ.
    try_this:
      - ಮಾತುಕತೆಗೆ ಮೊದಲು, ನಿಮ್ಮ ಗುರಿ ಸಂಖ್ಯೆಯನ್ನು ನಿರ್ಧರಿಸಿ ಮತ್ತು ಅವರದರಿಂದ ಆಂಕರ್ ಆಗುವುದನ್ನು ತಪ್ಪಿಸಿ.
      - ಅಂದಾಜು ಮಾಡುವಾಗ, ಇತರರ ಮಾತು ಕೇಳುವ ಮೊದಲು ನಿಮ್ಮದೇ ಆದ ಸಂಖ್ಯೆಯನ್ನು ರಚಿಸಿ.
      - ಕೇಳಿ: ನಾನು ಮೊದಲಿಗೆ ವಿಭಿನ್ನ ಸಂಖ್ಯೆಯನ್ನು ನೋಡಿದ್ದಿದ್ದರೆ ವಿಭಿನ್ನವಾಗಿ ಯೋಚಿಸುತ್ತಿದ್ದೇನೆಯೇ?
    ask_yourself:
      - ನಾನು ಮೊದಲು ಯಾವ ಸಂಖ್ಯೆ ಅಥವಾ ಕಲ್ಪನೆಯನ್ನು ಎದುರಿಸಿದೆ - ಮತ್ತು ಅದು ನನ್ನ ತೀರ್ಪನ್ನು ತಿರುಚುತ್ತಿದೆಯೇ?
      - ನಾನು ಆಂಕರ್‌ನಿಂದ ಸಾಕಷ್ಟು ಹೊಂದಾಣಿಕೆ ಮಾಡುತ್ತಿದ್ದೇನೆಯೇ, ಅಥವಾ ಇನ್ನೂ ಹತ್ತಿರದಲ್ಲಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ಒಂದು ಕ್ಲಾಸಿಕ್ ಪ್ರಯೋಗದಲ್ಲಿ, ವಿಶ್ವಸಂಸ್ಥೆಯಲ್ಲಿನ ಆಫ್ರಿಕನ್ ರಾಷ್ಟ್ರಗಳ ಶೇಕಡಾವಾರು ಪ್ರಮಾಣವನ್ನು ಅಂದಾಜು ಮಾಡಲು ಕೇಳಿದ ಜನರು, ಹೆಚ್ಚಿನ ಸಂಖ್ಯೆಯನ್ನು (ಉದಾಹರಣೆಗೆ, 65 ರ ಬದಲಿಗೆ 10) ನೋಡಿದ್ದಕ್ಕಿಂತ ಹೆಚ್ಚಿನ ಅಂದಾಜುಗಳನ್ನು ನೀಡಿದರು. ಆಂಕರ್ - ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೂ ಸಹ - ಅವರ ಉತ್ತರಗಳನ್ನು ಪ್ರಭಾವಿಸಿತು. ಆಂಕರಿಂಗ್ ಮಾತುಕತೆಗಳು, ಬೆಲೆ ನಿಗದಿ, ನೇಮಕಾತಿ ಮತ್ತು ಮುನ್ಸೂಚನೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.

      ನಾವು ನೋಡುವ ಮೊದಲ ಸಂಖ್ಯೆಯು ಉಲ್ಲೇಖದ ಬಿಂದುವಾಗುತ್ತದೆ. ನಾವು ಅದರಿಂದ ದೂರ ಸರಿಯುತ್ತೇವೆ, ಆದರೆ ಸಾಮಾನ್ಯವಾಗಿ ಸಾಕಷ್ಟಲ್ಲ. ಆಂಕರ್ ಯಾದೃಚ್ಛಿಕವಾಗಿದೆ ಎಂದು ನಮಗೆ ತಿಳಿದಿದ್ದರೂ ಸಹ, ಅದು ನಮ್ಮನ್ನು ಪ್ರಭಾವಿಸಬಹುದು. ತಜ್ಞರು ಇದಕ್ಕೆ ಹೊರತಾಗಿಲ್ಲ.
    why_this_is_important: |
      ಆಂಕರಿಂಗ್ ಅನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು, ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಮಾತುಕತೆ ನಡೆಸಲು ಮತ್ತು ಕುಶಲತೆಯಿಂದ ತಪ್ಪಿಸಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಮಾಹಿತಿಯ ಕ್ರಮ ಮತ್ತು ರೂಪಿಸುವಿಕೆ ಏಕೆ ಅಷ್ಟು ಮುಖ್ಯವೆಂದು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಮಾತುಕತೆ
      - ಹೂಡಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      first_number_dominance: |
        ಮಾತುಕತೆ ಅಥವಾ ಅಂದಾಜಿನಲ್ಲಿನ ಮೊದಲ ಸಂಖ್ಯೆಯು ಫಲಿತಾಂಶದ ಮೇಲೆ ಅಸಮಾನವಾಗಿ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ.
      insufficient_adjustment: |
        ಆಂಕರ್‌ನಿಂದ ಹೊಂದಾಣಿಕೆ ಮಾಡುವಾಗ, ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಸಾಕಷ್ಟಲ್ಲ.
      arbitrary_anchor_influence: |
        ಸಹ ಸ್ಪಷ್ಟವಾಗಿ ಅಪ್ರಸ್ತುತ ಸಂಖ್ಯೆಗಳು (ಉದಾಹರಣೆಗೆ, ಸಾಮಾಜಿಕ ಭದ್ರತಾ ಸಂಖ್ಯೆಯ ಕೊನೆಯ ಅಂಕೆಗಳು) ಅಂದಾಜುಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರಬಹುದು.
      order_effects: |
        ಆಯ್ಕೆಗಳನ್ನು ಪ್ರಸ್ತುತಪಡಿಸುವ ಕ್ರಮವು ಆಯ್ಕೆಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ.
    examples:
      salary_negotiation: |
        ಉದ್ಯೋಗಿ ಅಥವಾ ಅಭ್ಯರ್ಥಿಯು ಹೇಳಿದ ಮೊದಲ ಸಂಖ್ಯೆಯು ಅಂತಿಮ ಕೊಡುಗೆಯನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತದೆ.
      real_estate: |
        ಪಟ್ಟಿ ಬೆಲೆಯು ಖರೀದಿದಾರರ ಮೌಲ್ಯದ ಗ್ರಹಿಕೆಯನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತದೆ, ಅದು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಹೆಚ್ಚು ಅಥವಾ ಕಡಿಮೆಯಾಗಿ ನಿಗದಿಪಡಿಸಿದರೂ ಸಹ.
      retail: |
        "ಹಿಂದೆ $99, ಈಗ $49" ಎಂಬುದು ಮಾರಾಟದ ಬೆಲೆಯನ್ನು ಒಪ್ಪಂದವೆಂದು ತೋರುವಂತೆ ಮಾಡಲು ಮೂಲ ಬೆಲೆಯನ್ನು ಆಂಕರ್ ಆಗಿ ಬಳಸುತ್ತದೆ.
      forecasting: |
        ಯೋಜನಾ ಸಭೆಗಳಲ್ಲಿನ ಆರಂಭಿಕ ಅಂದಾಜುಗಳು ನಂತರದ ಮುನ್ಸೂಚನೆಗಳನ್ನು ಆಂಕರ್ ಮಾಡುತ್ತವೆ, ಮೊದಲ ಅಂದಾಜು ಊಹೆಯಾಗಿದ್ದರೂ ಸಹ.
    real_world_implications: |
      ಆಂಕರಿಂಗ್ ಮಾರುಕಟ್ಟೆಗಳು, ಮಾತುಕತೆಗಳು ಮತ್ತು ನೀತಿಗಳನ್ನು ರೂಪಿಸುತ್ತದೆ. ಇದನ್ನು ನೈತಿಕವಾಗಿ (ಉದಾಹರಣೆಗೆ, ಸಮಂಜಸವಾದ ನಿರೀಕ್ಷೆಗಳನ್ನು ನಿಗದಿಪಡಿಸುವುದು) ಅಥವಾ ಅನೈತಿಕವಾಗಿ (ಉದಾಹರಣೆಗೆ, ಕುಶಲತೆಯಿಂದ ಬೆಲೆ ನಿಗದಿ) ಬಳಸಬಹುದು. ಅದನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಮಾತುಕತೆಗಳಲ್ಲಿ, ಆಂಕರ್ ಅನ್ನು ನಿಗದಿಪಡಿಸಲು ಮೊದಲ ಕೊಡುಗೆಯನ್ನು ನೀಡಲು ಪರಿಗಣಿಸಿ - ಅಥವಾ ಇತರ ಪಕ್ಷವು ಹಾಗೆ ಮಾಡುತ್ತಿದೆ ಎಂದು ತಿಳಿದಿರಲಿ.
      collaborative_learning_initiative: |
