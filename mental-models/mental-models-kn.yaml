        ಬಿಡಬೇಡಿ.
      collaborative_learning_initiative: |
        ನಿರ್ಧಾರಗಳನ್ನು ಮಾಡುವಾಗ, ಪ್ರಕರಣ-ನಿರ್ದಿಷ್ಟ ಪುರಾವೆಗಳನ್ನು ಸೇರಿಸುವ ಮೊದಲು ಬೇಸ್
        ರೇಟ್‌ಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಹೇಳಿ ಮತ್ತು ಪರಿಗಣಿಸಿ. ತಂಡಗಳಿಗೆ ಬೈಯೆಸಿಯನ್ ತರ್ಕದಲ್ಲಿ ತರಬೇತಿ
        ನೀಡಿ.
    how_can_this_be_misapplied:
