  - id: negativity_bias
    name: ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತ
    quick_introduction: |
      ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವು ಸಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗಿಂತ ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಹೆಚ್ಚಿನ ಮಹತ್ವ ನೀಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಗಳು, ಟೀಕೆಗಳು ಮತ್ತು ಬೆದರಿಕೆಗಳು ನಮ್ಮ ಗಮನವನ್ನು ಸೆಳೆಯುತ್ತವೆ ಮತ್ತು ಸಮಾನವಾದ ಸಕಾರಾತ್ಮಕ ಪ್ರಚೋದನೆಗಳಿಗಿಂತ ನಮ್ಮ ನಿರ್ಧಾರಗಳನ್ನು ಬಲವಾಗಿ ಪ್ರಭಾವಿಸುತ್ತವೆ.
    one_liner: ಕೆಟ್ಟ ಸುದ್ದಿಗಳು ಒಳ್ಳೆಯ ಸುದ್ದಿಗಳಿಗಿಂತ ಹೆಚ್ಚು ತೂಗುತ್ತವೆ - ಬೆದರಿಕೆಗಳಿಗೆ ಆದ್ಯತೆ ನೀಡಲು ನಾವು ರೂಪುಗೊಂಡಿದ್ದೇವೆ.
    try_this:
      - ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ ಸಕ್ರಿಯವಾಗಿ ಸಕಾರಾತ್ಮಕ ಪುರಾವೆಗಳನ್ನು ಹುಡುಕಿ ಮತ್ತು ತೂಕ ಮಾಡಿ.
      - ಅನೇಕ ಹೊಗಳಿಕೆಗಳಿಗಿಂತ ಒಂದು ಟೀಕೆಯು ಹೆಚ್ಚು ತೂಗುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
      - ಕೇಳಿ: ನಾನು ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಅದು ಅರ್ಹತೆಗಿಂತ ಹೆಚ್ಚಿನ ಮಹತ್ವ ನೀಡುತ್ತಿದ್ದೇನೆ?
    ask_yourself:
      - ನಾನು ಸಕಾರಾತ್ಮಕತೆಯನ್ನು ನಿರ್ಲಕ್ಷಿಸಿ ನಕಾರಾತ್ಮಕತೆಯ ಮೇಲೆ ಧ್ಯಾನಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಒಳ್ಳೆಯ ಪುರಾವೆಗಳ ಮೇಲೆ ಗಮನಹರಿಸಿದರೆ ವಿಭಿನ್ನವಾಗಿ ಅನುಭವಿಸುತ್ತೇನೆಯೇ?
    in_more_detail: |
      ವಿಕಸನೀಯವಾಗಿ, ಬೆದರಿಕೆಯನ್ನು ಕಳೆದುಕೊಳ್ಳುವುದು ಮಾರಣಾಂತಿಕವಾಗಬಹುದು, ಆದರೆ ಅವಕಾಶವನ್ನು ಕಳೆದುಕೊಳ್ಳುವುದು ಸಾಮಾನ್ಯವಾಗಿ ಬದುಕಬಲ್ಲದ್ದಾಗಿತ್ತು. ನಮ್ಮ ಮೆದುಳು ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಆದ್ಯತೆ ನೀಡಲು ರೂಪುಗೊಂಡಿದೆ. ಒಂದು ಏಕೈಕ ಟೀಕಾತ್ಮಕ ಕಾಮೆಂಟ್ ಅನೇಕ ಹೊಗಳಿಕೆಗಳಿಗಿಂತ ಹೆಚ್ಚು ತೂಗಬಹುದು. ನಕಾರಾತ್ಮಕ ಘಟನೆಗಳು ಹೆಚ್ಚು ಸ್ಪಷ್ಟವಾಗಿ ಮತ್ತು ದೀರ್ಘಕಾಲ ನೆನಪಿನಲ್ಲಿರುತ್ತವೆ.

      ಈ ಪಕ್ಷಪಾತವು ಸಂಬಂಧಗಳು, ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವುದು ಮತ್ತು ಯೋಗಕ್ಷೇಮದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ವೈಫಲ್ಯಗಳ ಮೇಲೆ ಧ್ಯಾನಿಸುತ್ತೇವೆ, ಕೆಟ್ಟ ಸಂದರ್ಭಗಳನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತೇವೆ ಮತ್ತು ಸಕಾರಾತ್ಮಕ ಪುರಾವೆಗಳನ್ನು ಕಡಿತಗೊಳಿಸುತ್ತೇವೆ. ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಅದನ್ನು ಸರಿಪಡಿಸಲು ನಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವನ್ನು ಗುರುತಿಸುವುದು ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಸಮತೋಲನಗೊಳಿಸಲು, ಟೀಕೆಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ಮತ್ತು ಹೆಚ್ಚು ಮಾಪನಗೊಳಿಸಿದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಗಳು ಏಕೆ ಪ್ರಾಬಲ್ಯ ಸಾಧಿಸುತ್ತವೆ ಮತ್ತು ಪರಿಸ್ಥಿತಿಗಳು ಅರ್ಹತೆಗಿಂತ ಏಕೆ ನಾವು ಕೆಟ್ಟದಾಗಿ ಭಾವಿಸುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಸಂಬಂಧ_ಗಳ_ನಿರ್ಮಾಣ
