  - id: base_rate_fallacy
    name: ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ
    quick_introduction: |
      ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ ಎಂದರೆ ನಿರ್ದಿಷ್ಟ, ಸ್ಪಷ್ಟವಾದ ಮಾಹಿತಿಯ ಪರವಾಗಿ
      ಸಾಮಾನ್ಯ ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ಮಾಹಿತಿಯನ್ನು (ಬೇಸ್ ರೇಟ್‌ಗಳು) ನಿರ್ಲಕ್ಷಿಸುವ ಪ್ರವೃತ್ತಿ.
      ನಾವು ನಿರ್ದಿಷ್ಟ ಪ್ರಕರಣವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ ಮತ್ತು ಪೂರ್ವ ಸಂಭವನೀಯತೆಯನ್ನು
      ಕಡಿಮೆಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ. ಒಂದು ಪ್ರಬಲವಾದ ಕಥೆಯು ಸಂಖ್ಯೆಗಳು ಹೇಳುವುದನ್ನು
      ಮೀರಿಸಬಹುದು.
    one_liner: ಒಂದು ಪ್ರಬಲವಾದ ಕಥೆಯು ಸಂಖ್ಯೆಗಳು ಹೇಳುವುದನ್ನು ಮೀರಿಸಬಹುದು.
    try_this:
      - ಒಂದು ಪ್ರಕರಣವನ್ನು ನಿರ್ಣಯಿಸುವ ಮೊದಲು, ಕೇಳಿ: ಈ ರೀತಿಯ ಪರಿಸ್ಥಿತಿಗೆ ಬೇಸ್ ರೇಟ್ ಏನು?
      - ನಿರ್ದಿಷ್ಟ ಪುರಾವೆಯನ್ನು ಪೂರ್ವ ಸಂಭವನೀಯತೆಯೊಂದಿಗೆ ಸಂಯೋಜಿಸಿ — ಯಾವುದನ್ನೂ ನಿರ್ಲಕ್ಷಿಸಬೇಡಿ.
      - ಒಂದು ಸ್ಪಷ್ಟವಾದ ಉದಾಹರಣೆಯು ಸಂಖ್ಯಾಶಾಸ್ತ್ರವನ್ನು ಮುಳುಗಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಈ ನಿರ್ದಿಷ್ಟ ಪ್ರಕರಣವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಿದ್ದೇನೆಯೇ ಮತ್ತು ಬೇಸ್ ರೇಟ್ ಅನ್ನು ಕಡಿಮೆಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಆ ಪ್ರಬಲವಾದ ಕಥೆಯನ್ನು ಬದಿಗೆ ಇಟ್ಟರೆ, ಸಂಖ್ಯೆಗಳು ಏನು ಹೇಳುತ್ತವೆ?
    in_more_detail: |
      ಒಂದು ರೋಗವು ಜನಸಂಖ್ಯೆಯ 1% ರಷ್ಟು ಪರಿಣಾಮ ಬೀರಿದರೆ ಮತ್ತು ಪರೀಕ್ಷೆಯು 95% ನಿಖರವಾಗಿದ್ದರೆ,
      ಒಂದು ಧನಾತ್ಮಕ ಫಲಿತಾಂಶವು ವ್ಯಕ್ತಿಗೆ ಇನ್ನೂ ರೋಗವಿಲ್ಲದಿರಬಹುದು ಎಂದರ್ಥ — ಏಕೆಂದರೆ ಬೇಸ್ ರೇಟ್
      ಅತ್ಯಂತ ಕಡಿಮೆಯಾಗಿದೆ. ಆದರೆ ನಾವು ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ ಮತ್ತು "ಅವರು
      ಧನಾತ್ಮಕ ಪರೀಕ್ಷೆ ಮಾಡಿದ್ದಾರೆ" ಎಂಬುವುದರ ಮೇಲೆ ಗಮನಹರಿಸುತ್ತೇವೆ. ನಾವು ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ
      ಮೇಲೆ ನಿರ್ದಿಷ್ಟತೆಯಿಂದ ಪ್ರಭಾವಿತರಾಗುತ್ತೇವೆ.

      ಈ ತಪ್ಪು ಕಲ್ಪನೆಯು ವೈದ್ಯಕೀಯ ರೋಗನಿರ್ಣಯ, ನೇಮಕಾತಿ, ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು
      ಕಾನೂನು ತೀರ್ಪಿನ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ನಾವು ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ಮತ್ತು ಪ್ರಕರಣ-ನಿರ್ದಿಷ್ಟ
      ಪುರಾವೆಗಳನ್ನು ಬೈಯೆಸಿಯನ್ ತರ್ಕವನ್ನು ಬಳಸಿ ಸಂಯೋಜಿಸಬೇಕಾಗಿದೆ — ಆದರೆ ನಾವು ಆಗಾಗ್ಗೆ
      ಮಾಡುವುದಿಲ್ಲ.
    why_this_is_important: |
      ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆಯನ್ನು ಸರಿಪಡಿಸುವುದರಿಂದ ರೋಗನಿರ್ಣಯ, ಅಪಾಯದ ಮೌಲ್ಯಮಾಪನ ಮತ್ತು
      ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟ ಸುಧಾರಿಸುತ್ತದೆ. ಇದು ಸ್ಪಷ್ಟ ಪ್ರಕರಣಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು
      ಮತ್ತು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ವಾಸ್ತವಕ್ಕೆ ಕಡಿಮೆ ಪ್ರತಿಕ್ರಿಯಿಸುವುದನ್ನು ತಡೆಯುತ್ತದೆ.
