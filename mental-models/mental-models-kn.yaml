  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof ವಿದ್ಯಮಾನ
    quick_introduction: |
      Baader-Meinhof ವಿದ್ಯಮಾನ (ಇದನ್ನು ಆವರ್ತನ ಭ್ರಮೆ ಎಂದೂ ಕರೆಯಲಾಗುತ್ತದೆ) ಎಂದರೆ ನೀವು
      ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿಯುವಾಗ ಮತ್ತು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಅದನ್ನು ಎಲ್ಲೆಡೆ ಗಮನಿಸುವುದು. ಇದು ಕಾಕತಾಳೀಯವೆಂದು
      ಅನಿಸುತ್ತದೆ, ಆದರೆ ಇದು ಆಗಾಗ್ಗೆ ಆಯ್ಕೆಮಾಡಿದ ಗಮನ-ನಿಮ್ಮ ಮೆದುಳು ಇತ್ತೀಚೆಗೆ ಎದುರಿಸಿದ್ದನ್ನು ಗಮನಿಸಲು
      ಸಜ್ಜಾಗಿರುತ್ತದೆ.
    one_liner: ನೀವು ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿಯುವಿರಿ ಮತ್ತು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಅದನ್ನು ಎಲ್ಲೆಡೆ ನೋಡುವಿರಿ-ಅದು ಯಾವಾಗಲೂ ಇತ್ತು.
    try_this:
      - ಯಾವುದಾದರೂ ವಿಷಯವನ್ನು ಕಲಿತ ನಂತರ ಎಲ್ಲೆಡೆ ಕಾಣುತ್ತಿದೆ ಎಂದು ಅನಿಸಿದರೆ, ಮೂಲ ದರವನ್ನು ಪರಿಶೀಲಿಸಿ.
      - ಯಾವುದೇ ವಿಷಯವು ವಾಸ್ತವಕ್ಕಿಂತ ಹೆಚ್ಚು ಮಹತ್ವದ್ದಾಗಿದೆ ಎಂದು ಅನಿಸುವಾಗ, ಇತ್ತೀಚೆಗೆ ಆದದ್ದನ್ನು ಗಮನಿಸಿ.
      - ಕೇಳಿ: ನಾನು ನಿಜವಾದ ಪ್ರವೃತ್ತಿಯನ್ನು ನೋಡುತ್ತಿದ್ದೇನೆ, ಅಥವಾ ನಾನು ಗಮನಿಸಲು ಸಜ್ಜಾಗಿರುವುದನ್ನು ಮಾತ್ರ ನೋಡುತ್ತಿದ್ದೇನೆ?
    ask_yourself:
      - ಇದು ನಿಜವಾಗಿಯೂ ಈಗ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆಯೇ, ಅಥವಾ ನಾನು ಅದನ್ನು ಹೆಚ್ಚು ಗಮನಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಾನು ಇತ್ತೀಚೆಗೆ ಕಲಿತುಕೊಳ್ಳದಿದ್ದರೆ ಈ ಮಾದರಿಯನ್ನು ನಾನು ನೋಡುತ್ತಿದ್ದೆನೇ?
    in_more_detail: |
      Baader-Meinhof ಭಯೋತ್ಪಾದಕ ಗುಂಪಿನ ಬಗ್ಗೆ ಕೇಳಿದ ನಂತರ, ಒಬ್ಬ ವ್ಯಕ್ತಿಯು ದಿನಗಳಲ್ಲಿ ಸುದ್ದಿಗಳಲ್ಲಿ,
      ಸಂಭಾಷಣೆಯಲ್ಲಿ ಮತ್ತು ಲೇಖನಗಳಲ್ಲಿ ಅದರ ಉಲ್ಲೇಖಗಳನ್ನು ನೋಡಬಹುದು. ಈ ವಿದ್ಯಮಾನವು ಎರಡು
      ಘಟಕಗಳನ್ನು ಹೊಂದಿದೆ: ಆಯ್ಕೆಮಾಡಿದ ಗಮನ (ನೀವು ಹುಡುಕುತ್ತಿರುವುದನ್ನು ನೀವು ಗಮನಿಸುತ್ತೀರಿ) ಮತ್ತು
      ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ (ನೀವು ಯಶಸ್ಸುಗಳನ್ನು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುತ್ತೀರಿ ಮತ್ತು ಲೋಪಗಳನ್ನು ಮರೆತುಬಿಡುತ್ತೀರಿ).

      ಆ ವಿಷಯವು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆ ಎಂಬ ಭ್ರಮೆ. ವಾಸ್ತವದಲ್ಲಿ, ಅದು ಯಾವಾಗಲೂ
      ಇತ್ತು; ನೀವು ಅದಕ್ಕೆ ಒಗ್ಗಿಕೊಂಡಿರಲಿಲ್ಲ. ಇದು ಇತ್ತೀಚೆಗೆ ಕಲಿತ ಮಾಹಿತಿಯ ವ್ಯಾಪಕತೆ ಅಥವಾ
      ಪ್ರಮುಖತೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡಲು ಕಾರಣವಾಗಬಹುದು.
    why_this_is_important: |
      Baader-Meinhof ವಿದ್ಯಮಾನವನ್ನು ಗುರುತಿಸುವುದು ಇತ್ತೀಚಿನ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯ ಆಧಾರದ ಮೇಲೆ
      ಏನಾದರೂ ಎಷ್ಟು ಸಾಮಾನ್ಯವಾಗಿದೆ ಅಥವಾ ಮಹತ್ವದ್ದಾಗಿದೆ ಎಂಬುದನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವುದನ್ನು
      ನಿವಾರಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ನೀವು ಮೊದಲು ಗಮನಿಸಿದ ನಂತರ ಹೊಸ ಕಲ್ಪನೆಗಳು, ಉತ್ಪನ್ನಗಳು
      ಅಥವಾ ಪ್ರವೃತ್ತಿಗಳು ಏಕೆ "ಎಲ್ಲೆಡೆ" ಕಾಣಿಸಬಹುದು ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಕಲಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
    how_can_you_spot_it:
      sudden_ubiquity: |
        ನೀವು ಹೊಸ ಪದ, ಪರಿಕಲ್ಪನೆ ಅಥವಾ ಉತ್ಪನ್ನವನ್ನು ಕಲಿಯುವಿರಿ ಮತ್ತು ದಿನಗಳಲ್ಲಿ ಅದನ್ನು ನಿರಂತರವಾಗಿ
        ನೋಡುತ್ತಿದ್ದೀರಿ ಎಂದು ಅನಿಸುತ್ತದೆ.
      recency_bias: |
        ಇತ್ತೀಚಿನ ಮಾಹಿತಿಯು ವಾಸ್ತವಕ್ಕಿಂತ ವಾಸ್ತವಕ್ಕೆ ಹೆಚ್ಚು ಪ್ರತಿನಿಧಿಸುವಂತೆ ಅನಿಸುತ್ತದೆ.
      pattern_seeking: |
        ನಿಮ್ಮ ಮೆದುಳು ಸಂಬಂಧವಿಲ್ಲದ ದೃಷ್ಟಿಗಳನ್ನು "ಇದು ಎಲ್ಲೆಡೆ ಇದೆ" ಎಂಬ ಕಥೆಯಾಗಿ
        ಜೋಡಿಸುತ್ತದೆ.
      forgetting_the_misses: |
        ವಿಷಯವನ್ನು ಎಷ್ಟು ಬಾರಿ ನೀವು ನೋಡದಿದ್ದನ್ನು ನೀವು ಟ್ರ್ಯಾಕ್ ಮಾಡುವುದಿಲ್ಲ - ನೀವು ನೋಡುವ
        ಬಾರಿಗಳನ್ನು ಮಾತ್ರ.
    examples:
      vocabulary: |
        "serendipity" ಎಂಬ ಪದವನ್ನು ಕಲಿಯುವುದು ಮತ್ತು ಅದೇ ವಾರ ಮೂರು ವಿಭಿನ್ನ ಲೇಖನಗಳಲ್ಲಿ
        ಅದನ್ನು ಗಮನಿಸುವುದು.
      car_purchase: |
        ಒಂದು ನಿರ್ದಿಷ್ಟ ಕಾರು ಮಾದರಿಯನ್ನು ಖರೀದಿಸಲು ನಿರ್ಧರಿಸಿದ ನಂತರ, ನೀವು ಅದನ್ನು ಪ್ರತಿ
        ರಸ್ತೆಯಲ್ಲಿ ನೋಡುತ್ತೀರಿ - ಆದರೂ ಅದು ಯಾವಾಗಲೂ ಅಲ್ಲಿತ್ತು.
      health_anxiety: |
        ಒಂದು ಅಪರೂಪದ ರೋಗಲಕ್ಷಣದ ಬಗ್ಗೆ ಓದುವುದು ಮತ್ತು ನಂತರ ನಿಮ್ಮಲ್ಲಿ ಇದೇ ರೀತಿಯ ಸಂವೇದನೆಗಳನ್ನು
        ಗಮನಿಸುವುದು, ಅನಗತ್ಯ ಚಿಂತೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
      trends: |
        ಹೊಸ ಅಪ್ಲಿಕೇಶನ್ ಅಥವಾ ಪ್ರವೃತ್ತಿಯನ್ನು ಕಂಡುಹಿಡಿಯುವುದು ಮತ್ತು ಅದು ಇದ್ದಕ್ಕಿದ್ದಂತೆ
        ಆధిಪತ್ಯ ಸಾಧಿಸುತ್ತಿದೆ ಎಂದು ಅನಿಸುವುದು - ಅದು ಸಣ್ಣ ಬಳಕೆದಾರರ ನೆಲೆಯನ್ನು ಹೊಂದಿರಬಹುದು.
    real_world_implications: |
      ಈ ವಿದ್ಯಮಾನವು ನಾವು ಪ್ರವೃತ್ತಿಗಳು, ಅಪಾಯಗಳು ಮತ್ತು ಅವಕಾಶಗಳನ್ನು ಗ್ರಹಿಸುವ ರೀತಿಯ ಮೇಲೆ
      ಪ್ರಭಾವ ಬೀರುತ್ತದೆ. ಮಾರಾಟಗಾರರು ಮತ್ತು ಮಾಧ್ಯಮಗಳು ಪುನರಾವರ್ತಿತ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯನ್ನು
      ಸೃಷ್ಟಿಸುವ ಮೂಲಕ ಅದನ್ನು ಬಳಸಿಕೊಳ್ಳಬಹುದು. ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ, ಇದು ಇತ್ತೀಚಿನ
      ಮಾಹಿತಿಯನ್ನು ಅತಿಯಾಗಿ ತೂಕ ಹಾಕಲು ಕಾರಣವಾಗಬಹುದು.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ಕಲಿತ ನಂತರ ಒಂದು ವಿಷಯವನ್ನು ಪದೇ ಪದೇ ಉಲ್ಲೇಖಿಸಿದರೆ, ಅವರು ಆವರ್ತನ ಭ್ರಮೆಯನ್ನು
        ಅನುಭವಿಸುತ್ತಿರಬಹುದು ಎಂದು ಗುರುತಿಸಿ - ಆ ವಿಷಯವು ಅಗತ್ಯವಾಗಿ ಹೆಚ್ಚು ಸಂಬಂಧಿತವಲ್ಲ,
        ಅವರಿಗೆ ಹೆಚ್ಚು ಸ್ಪಷ್ಟವಾಗಿದೆ.
      collaborative_learning_initiative: |
        ತರಬೇತಿಯಲ್ಲಿ, ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿತ ನಂತರ "ಎಲ್ಲೆಡೆ ನೋಡುತ್ತಿರುವುದು" ಸಾಮಾನ್ಯ
        ಎಂಬುದನ್ನು ಬಲಪಡಿಸಿ; ಸರ್ವವ್ಯಾಪಕತೆಯ ಭಾವನೆಗಿಂತ ಮೂಲ ದರಗಳನ್ನು ಪರಿಶೀಲಿಸಲು
        ಪ್ರೋತ್ಸಾಹಿಸಿ.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        ಇತ್ತೀಚೆಗೆ ಅದನ್ನು ಆಗಾಗ್ಗೆ ಗಮನಿಸಿದ್ದರಿಂದ ಏನಾದರೂ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವಾಗಿದೆ ಅಥವಾ
        ಪ್ರಮುಖವಾಗಿದೆ ಎಂದು ಊಹಿಸುವುದು.
      confirmation_bias_amplification: |
        "ಎಲ್ಲೆಡೆ ನೋಡುತ್ತಿರುವ" ಭಾವನೆಯನ್ನು ನಂಬಿಕೆಯು ಸರಿಯಾಗಿದೆ ಎಂಬುದಕ್ಕೆ ಪುರಾವೆಯಾಗಿ
        ಬಳಸುವುದು.
      decision_distortion: |
        ಇತ್ತೀಚೆಗೆ ಕಲಿತ ಮಾಹಿತಿಯ ಆಧಾರದ ಮೇಲೆ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡುವುದು, ಅದು ಅಸಮಾನವಾಗಿ
        ಪ್ರಮುಖವೆಂದು ಅನಿಸುತ್ತದೆ.
      vulnerability_to_manipulation: |
        ಮಾರಾಟಗಾರರು ಮತ್ತು ಪ್ರಚಾರಕರು ಸರ್ವವ್ಯಾಪಕತೆ ಮತ್ತು ಪ್ರಮುಖತೆಯ ಭ್ರಮೆಯನ್ನು
        ಸೃಷ್ಟಿಸಲು ಪುನರಾವರ್ತಿತ ಬಹಿರಂಗಪಡಿಸುವಿಕೆಯನ್ನು ಬಳಸುತ್ತಾರೆ.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
      - availability_heuristic
  - id: barnum_effect
    name: ಬಾರ್ನಮ್ ಪರಿಣಾಮ
    quick_introduction: |
      ಬಾರ್ನಮ್ ಪರಿಣಾಮ (ಅಥವಾ ಫೋರರ್ ಪರಿಣಾಮ) ಎಂದರೆ ಅಸ್ಪಷ್ಟ, ಸಾಮಾನ್ಯ ವ್ಯಕ್ತಿತ್ವ ವಿವರಣೆಗಳನ್ನು
      ವಿಶೇಷವಾಗಿ ನಿಖರವೆಂದು ಸ್ವೀಕರಿಸುವ ಪ್ರವೃತ್ತಿ. ಜಾತಕ, ಭವಿಷ್ಯಕಾರರು ಮತ್ತು ವ್ಯಕ್ತಿತ್ವ ಪರೀಕ್ಷೆಗಳು
      ಬಹುತೇಕ ಎಲ್ಲರಿಗೂ ಅನ್ವಯಿಸುವ ಹೇಳಿಕೆಗಳನ್ನು ಬಳಸುತ್ತವೆ-ಆದರೆ ನಾವು ಅವು ನಮ್ಮದೇ ಎಂದು ನಂಬುತ್ತೇವೆ.
      ನಾವು ನಮ್ಮನ್ನು ಸಾಮಾನ್ಯ ವಿಷಯಗಳಲ್ಲಿ ನೋಡುತ್ತೇವೆ.
    one_liner: ಅಸ್ಪಷ್ಟ ಹೇಳಿಕೆಗಳು ವೈಯಕ್ತಿಕವೆಂದು ಭಾಸವಾಗುತ್ತವೆ ಏಕೆಂದರೆ ಅವು ಬಹುತೇಕ ಎಲ್ಲರಿಗೂ ಅನ್ವಯಿಸುತ್ತವೆ.
    try_this:
      - Ask: ಈ ವಿವರಣೆಯು ಅನೇಕ ಜನರಿಗೆ ಅನ್ವಯಿಸಬಹುದೇ? ಇನ್ನೊಬ್ಬರ ಮೇಲೆ ಇದನ್ನು ಪರೀಕ್ಷಿಸಿ.
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - ಅಸ್ಪಷ್ಟ ಹೊಗಳಿಕೆ ಅಥವಾ ಟೀಕೆಗಳ ಬದಲಿಗೆ ನಿರ್ದಿಷ್ಟ, ನಡವಳಿಕೆಯ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಹುಡುಕಿ.
      - Notice when "personalized" insights feel too good to be discriminating.
      - ವೈಯಕ್ತಿಕಗೊಳಿಸಿದ ಒಳನೋಟಗಳು ಹೆಚ್ಚು ಉತ್ತಮವೆಂದು ತೋರಿದಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger?
      - ಈ ಪ್ರತಿಕ್ರಿಯೆಯು ಅಪರಿಚಿತರಿಗೆ ನೀಡಿದರೆ ನಿಖರವೆಂದು ಅನಿಸುತ್ತದೆಯೇ?
      - Am I remembering the hits and forgetting the misses?
      - ನಾನು ಯಶಸ್ಸುಗಳನ್ನು ನೆನಪಿಸಿಕೊಂಡು ವಿಫಲತೆಗಳನ್ನು ಮರೆಯುತ್ತಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ಮನಶ್ಶಾಸ್ತ್ರಜ್ಞ ಬೆರ್ಟ್ರಾಮ್ ಫೋರರ್ ವಿದ್ಯಾರ್ಥಿಗಳಿಗೆ ಒಂದೇ ರೀತಿಯ "ವೈಯಕ್ತಿಕಗೊಳಿಸಿದ" ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು
      (ಉದಾಹರಣೆಗೆ, "ಇತರರು ನಿಮ್ಮನ್ನು ಇಷ್ಟಪಡಬೇಕು ಮತ್ತು ಮೆಚ್ಚಬೇಕು ಎಂಬುದು ನಿಮ್ಮ ಅಗತ್ಯವಿದೆ") ನೀಡಿದರು
      ಮತ್ತು ಅವರು ಅದನ್ನು ಹೆಚ್ಚು ನಿಖರವೆಂದು ರೇಟ್ ಮಾಡಿದರು. ಹೇಳಿಕೆಗಳು ಯಾರಾದರೂ ಒಬ್ಬರಿಗೆ ಅನ್ವಯಿಸುವಷ್ಟು
      ಅಸ್ಪಷ್ಟವಾಗಿದ್ದವು. ಪಿ.ಟಿ. ಬಾರ್ನಮ್ ಹೇಳಿದ್ದಾರೆಂದು ವರದಿಯಾಗಿದೆ "ಪ್ರತಿ ನಿಮಿಷವೂ ಒಬ್ಬ ಮೂರ್ಖ ಜನಿಸುತ್ತಾನೆ"—
      ಈ ಪರಿಣಾಮಕ್ಕೆ ಆತನ ಹೆಸರು ಬಂದಿದೆ, ಏಕೆಂದರೆ ಅವನು ಜನಸಾಮಾನ್ಯರನ್ನು ವೈಯಕ್ತಿಕವೆಂದು ತೋರುವ ಸಾಮಾನ್ಯ ಸಂಗತಿಗಳೊಂದಿಗೆ
      ಆಕರ್ಷಿಸುವಲ್ಲಿ ನಿಪುಣನಾಗಿದ್ದನು.

      ನಾವು ಅಸ್ಪಷ್ಟ ಹೇಳಿಕೆಗಳಲ್ಲಿ ವೈಯಕ್ತಿಕ ಪ್ರಸ್ತುತತೆಯನ್ನು ಕಂಡುಕೊಳ್ಳುವುದರಿಂದ ಈ ಪರಿಣಾಮ ಕೆಲಸ ಮಾಡುತ್ತದೆ.
      ನಾವು ಯಶಸ್ಸುಗಳನ್ನು ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ ಮತ್ತು ವಿಫಲತೆಗಳನ್ನು ಮರೆಯುತ್ತೇವೆ.
      ಇದು ಕೋಲ್ಡ್ ರೀಡಿಂಗ್ ಮತ್ತು ಅನೇಕ "ವ್ಯಕ್ತಿತ್ವ" ಉತ್ಪನ್ನಗಳ ಮೂಲವಾಗಿದೆ.
    why_this_is_important: |
      ಬಾರ್ನಮ್ ಪರಿಣಾಮವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿತ್ವ ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ನಿರ್ಣಯಿಸಲು,
      ಮ್ಯಾನಿಪ್ಯುಲೇಷನ್ ಅನ್ನು ಪ್ರತಿರೋಧಿಸಲು ಮತ್ತು ಅಸ್ಪಷ್ಟ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಅತಿಯಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸುವುದನ್ನು
      ತಡೆಯಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಜಾತಕಗಳು ಏಕೆ ನಿಖರವಾಗಿವೆ ಮತ್ತು ಕೆಲವು "ವೈಯಕ್ತಿಕಗೊಳಿಸಿದ"
      ಸಲಹೆಗಳು ಏಕೆ ಸಾಮಾನ್ಯವಾಗಿದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಕಲಿಕೆ
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
      - ಸಂಬಂಧ_ನಿರ್ಮಾಣ
    how_can_you_spot_it:
      vague_accuracy: |
        ವೈಯಕ್ತಿಕವೆಂದು ಭಾಸವಾಗುವ ಪ್ರತಿಕ್ರಿಯೆಯು ಅನೇಕ ಜನರಿಗೆ ಅನ್ವಯಿಸಬಹುದು.
      selective_fit: |
        ನಾವು ಹೊಂದಿಕೊಳ್ಳುವದರ ಮೇಲೆ ಕೇಂದ್ರೀಕರಿಸಿ, ಹೊಂದಿಕೊಳ್ಳದದನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.
      cold_reading: |
        ಯಾರಾದರೂ ನಿಮ್ಮನ್ನು ಹೇಳಿಕೆಗಳೊಂದಿಗೆ "ಓದುತ್ತಾರೆ" ಆದರೆ ಅವು ವಾಸ್ತವವಾಗಿ ಸಾಮಾನ್ಯವಾಗಿರುತ್ತವೆ.
      personality_test_enthusiasm: |
        ಅಸಮರ್ಥನೀಯವಾಗಿ ಗ್ರಹಿಸುವ ಫಲಿತಾಂಶಗಳನ್ನು ಅಂಧವಾಗಿ ಸ್ವೀಕರಿಸುವುದು.
    examples:
      horoscopes: |
        "ನೀವು ಕೆಲವೊಮ್ಮೆ ನಿಮ್ಮ ನಿರ್ಧಾರಗಳ ಬಗ್ಗೆ ಅನುಮಾನಪಡುತ್ತೀರಿ" ಎಂದು ಅನಿಸುತ್ತದೆ, ಆದರೆ
        ಬಹುತೇಕ ಜನರಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ.
      fortune_telling: |
        ಅಸ್ಪಷ್ಟ ಭವಿಷ್ಯಗಳು, ನಾವು ನಮ್ಮ ಪರಿಸ್ಥಿತಿಗೆ ನಿರ್ದಿಷ್ಟವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೇವೆ.
      personality_tests: |
        ಕೆಲವು ಮೌಲ್ಯಮಾಪನಗಳು ಬಾರ್ನಮ್ ಹೇಳಿಕೆಗಳನ್ನು ಬಳಸುತ್ತವೆ ಮತ್ತು ನಿರ್ಣಯಿಸದೆ ನಿಖರವಾಗಿವೆ ಎಂದು ಅನಿಸುತ್ತದೆ.
      feedback: |
        ಸಾಮಾನ್ಯ ಕಾರ್ಯಕ್ಷಮತೆಯ ಪ್ರತಿಕ್ರಿಯೆಯು, ನಾವು ಆಳವಾಗಿ
        ವೈಯಕ್ತಿಕವೆಂದು ವ್ಯಾಖ್ಯಾನಿಸುತ್ತೇವೆ.
    real_world_implications: |
      ಜ್ಯೋತಿಷ್ಯ, ಕೆಲವು ಕೋಚಿಂಗ್ ಮತ್ತು ಕಡಿಮೆ-ಗುಣಮಟ್ಟದ ಮೌಲ್ಯಮಾಪನಗಳಲ್ಲಿ ಬಾರ್ನಮ್ ಪರಿಣಾಮವನ್ನು
      ಬಳಸಿಕೊಳ್ಳಲಾಗುತ್ತದೆ. ಇದು ಅಮಾನ್ಯ ಸಾಧನಗಳಲ್ಲಿ ಸುಳ್ಳು ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಸೃಷ್ಟಿಸಬಹುದು.
      ನಾವು ಹೊಗಳಿಕೆಗೆ ಮತ್ತು ಅಸ್ಪಷ್ಟ ಸಕಾರಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗೆ ಏಕೆ ಒಳಗಾಗುತ್ತೇವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಸ್ವೀಕರಿಸುವಾಗ, "ಇದು ಅನೇಕ ಜನರಿಗೆ ಅನ್ವಯಿಸಬಹುದೇ?" ಎಂದು ಕೇಳಿ.
        ಅಸ್ಪಷ್ಟ ಹೊಗಳಿಕೆ ಅಥವಾ ಟೀಕೆಗಳ ಬದಲಿಗೆ ನಿರ್ದಿಷ್ಟ, ನಡವಳಿಕೆಯ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಹುಡುಕಿ.
        ಹೆಚ್ಚು ಉತ್ತಮವೆಂದು ಅನಿಸುವ "ವೈಯಕ್ತಿಕಗೊಳಿಸಿದ" ಒಳನೋಟಗಳ ಬಗ್ಗೆ ಸಂಶಯಪಡಬೇಡಿ.
      collaborative_learning_initiative: |
        ಮೌಲ್ಯಮಾಪನಗಳನ್ನು ಬಳಸುವಾಗ, ಭೇದದ ಮಾನ್ಯತೆಯನ್ನು ಹೊಂದಿರುವ ಪರಿಶೀಲಿತ ಸಾಧನಗಳನ್ನು ಆರಿಸಿ.
        ಬಾರ್ನಮ್ ಹೇಳಿಕೆಗಳನ್ನು ಅವಲಂಬಿಸಿರುವ ಉಪಕರಣಗಳನ್ನು ತಪ್ಪಿಸಿ.
        ಅಸ್ಪಷ್ಟ ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಗುರುತಿಸಲು ಜನರಿಗೆ ತರಬೇತಿ ನೀಡಿ.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        ಎಲ್ಲಾ ವೈಯಕ್ತಿಕ ಪ್ರತಿಕ್ರಿಯೆಯೂ ಬಾರ್ನಮ್ ಅಲ್ಲ - ಕೆಲವು ನಿಜವಾಗಿಯೂ
        ನಿರ್ದಿಷ್ಟವಾಗಿರುತ್ತವೆ. ಎಲ್ಲವನ್ನೂ ಅಸ್ಪಷ್ಟವೆಂದು ತಳ್ಳಿಹಾಕಬೇಡಿ.
      invalidating_experience: |
        ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಒಳನೋಟದ ಅನುಭವವನ್ನು "ಇದು ಕೇವಲ ಬಾರ್ನಮ್" ಎಂದು ಹೇಳುವುದು
        ಅದಕ್ಕೆ ಮೌಲ್ಯವಿದ್ದರೂ ಸಹ.
      overcorrection: |
        ಕೆಲವು ವ್ಯಕ್ತಿತ್ವ ಚೌಕಟ್ಟುಗಳು ಬಾರ್ನಮ್ ಹೇಳಿಕೆಗಳನ್ನು ಬಳಸುವುದರಿಂದ ಎಲ್ಲವನ್ನೂ ತಿರಸ್ಕರಿಸುವುದು.
      false_skepticism: |
        ಏನಾದರೂ ನಿಖರವಾಗಿ ಅನಿಸುವುದರಿಂದ ಅದು ಬಾರ್ನಮ್ ಆಗಿರಬೇಕು ಎಂದು ಊಹಿಸುವುದು—ಕೆಲವೊಮ್ಮೆ ವಿಷಯಗಳು ನಿಖರವಾಗಿರುತ್ತವೆ.
