  - id: groupthink
    name: ಗುಂಪು ಆಲೋಚನೆ (Groupthink)
    quick_introduction: |
      ಗುಂಪು ಆಲೋಚನೆ ಎಂದರೆ, ಸಮಾನ ಮನಸ್ಕ ಗುಂಪುಗಳು ಟೀಕಾತ್ಮಕ ಮೌಲ್ಯಮಾಂಕನಕ್ಕಿಂತ ಒಮ್ಮತ ಮತ್ತು ಸಾಮರಸ್ಯಕ್ಕೆ ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ. ಸದಸ್ಯರು ಭಿನ್ನಾಭಿಪ್ರಾಯಗಳನ್ನು ಹತ್ತಿಕ್ಕುತ್ತಾರೆ, ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಿಂದ ವರ್ತಿಸುತ್ತಾರೆ ಮತ್ತು ಗ್ರಹಿಸಿದ ಗುಂಪಿನ ದೃಷ್ಟಿಕೋನಕ್ಕೆ ಹೊಂದಿಕೊಳ್ಳುತ್ತಾರೆ. ಏಕಮತದ ಬಯಕೆ ಉತ್ತಮ ನಿರ್ಧಾರದ ಬಯಕೆಗಿಂತ ಹೆಚ್ಚಾಗುತ್ತದೆ.
    one_liner: ಸತ್ಯದ ಮೇಲಿನ ಸಾಮರಸ್ಯ—ಗುಂಪುಗಳು ಟೀಕಾತ್ಮಕ ಮೌಲ್ಯಮಾಂಕನಕ್ಕಿಂತ ಒಮ್ಮತಕ್ಕೆ ಆದ್ಯತೆ ನೀಡುತ್ತವೆ.
    try_this:
      - ಒಬ್ಬ 'ವಿರೋಧಿ ವಕೀಲ'ರನ್ನು ನೇಮಿಸಿ; ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿರೀಕ್ಷಿತ ಮತ್ತು ಸುರಕ್ಷಿತವಾಗಿಸಿ.
      - ಕೇಳಿ: ನಾವು ಏನು ಹೇಳುತ್ತಿಲ್ಲ? ನಾವು ಈ ಗುಂಪಿನಲ್ಲಿ ಇಲ್ಲದಿದ್ದರೆ ಏನು ಹೇಳುತ್ತಿದ್ದೆವು?
      - ಗುಂಪಿನ ನಿರ್ಧಾರಗಳನ್ನು ಅಂತಿಮಗೊಳಿಸುವ ಮೊದಲು ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ಹುಡುಕಿ.
    ask_yourself:
      - ಸಾಮರಸ್ಯವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ನಾನು ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಿಂದ ವರ್ತಿಸುತ್ತಿದ್ದೇನೆಯೇ?
      - ನಮ್ಮ ಒಮ್ಮತವು ನಿಜವಾಗಿದೆಯೇ ಅಥವಾ ಒಪ್ಪಿಕೊಳ್ಳುವ ಒತ್ತಡದ ಫಲಿತಾಂಶವೇ?
    in_more_detail: |
      ಇರ್ವಿಂಗ್ ಜಾನಿಸ್ ಅವರು ವಿದೇಶಾಂಗ ನೀತಿಯ ವೈಫಲ್ಯಗಳನ್ನು (ಬೇ ಆಫ್ ಪಿಗ್ಸ್, ವಿಯೆಟ್ನಾಂ) ಅಧ್ಯಯನ ಮಾಡಿದರು ಮತ್ತು ಮಾದರಿಗಳನ್ನು ಗುರುತಿಸಿದರು: ಅಜೇಯತೆಯ ಭ್ರಮೆ, ಸಾಮೂಹಿಕ ತರ್ಕಬದ್ಧತೆ, ಒಗ್ಗೂಡುವಿಕೆಯ ಕಡೆಗೆ ಒತ್ತಡ, ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆ, ಏಕಮತದ ಭ್ರಮೆ, ಮತ್ತು ಗುಂಪನ್ನು ಭಿನ್ನಾಭಿಪ್ರಾಯದ ಮಾಹಿತಿಯಿಂದ ರಕ್ಷಿಸುವ 'ಮೈಂಡ್‌ಗಾರ್ಡ್‌ಗಳು'. ಹೆಚ್ಚಿನ ಒಗ್ಗಟ್ಟು, ಏಕಾಂತ ಮತ್ತು ಒತ್ತಡವು ಗುಂಪು ಆಲೋಚನೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ.

      ಗುಂಪು ಆಲೋಚನೆಯು ಕಳಪೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ ಏಕೆಂದರೆ ಪರ್ಯಾಯಗಳನ್ನು ಗಂಭೀರವಾಗಿ ಪರಿಗಣಿಸಲಾಗುವುದಿಲ್ಲ. ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ನಿಷ್ಠೆಗೇಡಿತನವೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ಗುಂಪು ತನ್ನ ಸರಿಯಾದಿಕೆಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುತ್ತದೆ ಮತ್ತು ಅಪಾಯಗಳನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ಗುಂಪು ಆಲೋಚನೆಯನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಉತ್ತಮ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವ ಪರಿಸ್ಥಿತಿಗಳನ್ನು ರಚಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ: ಭಿನ್ನಾಭಿಪ್ರಾಯವನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ, ಹೊರಗಿನ ದೃಷ್ಟಿಕೋನಗಳನ್ನು ತಂದುಕೊಳ್ಳಿ ಮತ್ತು ಅಕಾಲಿಕ ಒಮ್ಮತವನ್ನು ತಪ್ಪಿಸಿ. ಇದು ವಿಪತ್ಕಾರಕ ಗುಂಪು ವೈಫಲ್ಯಗಳನ್ನು ತಪ್ಪಿಸಲು ಅವಶ್ಯಕವಾಗಿದೆ.
    when_to_use:
      - ನಾಯಕತ್ವ (leadership)
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ (decision_making)
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ (problem_solving)
