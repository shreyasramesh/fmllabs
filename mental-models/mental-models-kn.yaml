        ಉತ್ತಮವಾಗಿ ಊಹಿಸುತ್ತವೆ ಎಂಬುದರ ಬೇಸ್ ರೇಟ್‌ಗಳನ್ನು ನಾವು ನಿರ್ಲಕ್ಷಿಸುತ್ತೇವೆ.
      risk: |
