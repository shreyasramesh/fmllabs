    how_can_you_spot_it:
      premortem_thinking: |
        ಯಾವುದೇ ಪ್ರಾಜೆಕ್ಟ್ ಪ್ರಾರಂಭಿಸುವ ಮೊದಲು, ಅದು ಈಗಾಗಲೇ ವಿಫಲವಾಗಿದೆ ಎಂದು ಊಹಿಸಿ "ಇದು ಏಕೆ ವಿಫಲವಾಯಿತು?" ಎಂದು ಕೇಳಿ.
      anti_goals: |
        ನೀವು ಸಾಧಿಸಲು ಬಯಸುವುದನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸುವಂತೆ, ನೀವು ತಪ್ಪಿಸಲು ಬಯಸುವುದನ್ನು ವ್ಯಾಖ್ಯಾನಿಸುವುದು.
      reverse_engineering_failure: |
        ಯಶಸ್ಸುಗಳ ಅಧ್ಯಯನ ಮಾತ್ರ ಮಾಡದೆ, ಪಾಠಗಳನ್ನು ಹೊರತೆಗೆಯಲು ವಿಫಲವಾದ ಪ್ರಕರಣಗಳನ್ನು ಅಧ್ಯಯನ ಮಾಡುವುದು.
      constraint_focus: |
        ಲಾಭವನ್ನು ಆಪ್ಟಿಮೈಸ್ ಮಾಡುವ ಮೊದಲು ನಿರ್ಬಂಧಗಳು ಮತ್ತು ಅಡೆತಡೆಗಳನ್ನು ಗುರುತಿಸುವುದು.
    examples:
      investing: |
        "ಈ ಷೇರು ಬೆಲೆ ಏರಲು ಏನು ಕಾರಣವಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುವ ಬದಲು, "ನಾನು ಹಣವನ್ನು ಕಳೆದುಕೊಳ್ಳಲು ಏನು ಕಾರಣವಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳಿ, ಮತ್ತು ಆ ಸಂದರ್ಭಗಳನ್ನು ತಪ್ಪಿಸಿ.
      career: |
        "ನನ್ನ ಖ್ಯಾತಿಯನ್ನು ಯಾವುದು ಹಾಳು ಮಾಡುತ್ತದೆ?" ಎಂಬುದು ತಪ್ಪಿಸಬೇಕಾದ ನಡತೆಗಳ ಪಟ್ಟಿಯನ್ನು ನೀಡುತ್ತದೆ.
      product_launch: |
        "ಹೆಚ್ಚಿನ ಉತ್ಪನ್ನ ಬಿಡುಗಡೆಗಳು ಏಕೆ ವಿಫಲವಾಗುತ್ತವೆ?" ಎಂಬುದು ಬಿಡುಗಡೆಗೂ ಮೊದಲು ಪರಿಹರಿಸಬೇಕಾದ ಅಪಾಯಗಳನ್ನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ.
      health: |
        "ಯಾವ ಅಭ್ಯಾಸಗಳು ಜೀವಿತಾವಧಿಯನ್ನು ಕಡಿಮೆಗೊಳಿಸುತ್ತವೆ?" ಎಂಬುದು "ನನ್ನನ್ನು ಆರೋಗ್ಯವಾಗಿಡುವುದು ಯಾವುದು?" ಎಂಬುದಕ್ಕಿಂತ ಸ್ಪಷ್ಟವಾದ ತಪ್ಪಿಸುವ ಪಟ್ಟಿಯನ್ನು ನೀಡುತ್ತದೆ.
    real_world_implications: |
      ವಿಲೋಮವು ಎಂಜಿನಿಯರಿಂಗ್ (ವೈಫಲ್ಯ ಮೋಡ್ ವಿಶ್ಲೇಷಣೆ), ಹೂಡಿಕೆ ಮತ್ತು ಕಾರ್ಯತಂತ್ರಗಳಲ್ಲಿ ಬಳಸಲಾಗುತ್ತದೆ. ಇದು ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸವನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತದೆ ಮತ್ತು ಅಪಾಯ ನಿರ್ವಹಣೆಯನ್ನು ಸುಧಾರಿಸುತ್ತದೆ. ಅತಿಯಾದ ಅವಲಂಬನೆಯು ಅಧಿಕ ಎಚ್ಚರಿಕೆಗೆ ಕಾರಣವಾಗಬಹುದು.
    professional_application:
      networking_and_relationship_building: |
        "ಈ ಸಂಬಂಧವನ್ನು ಯಾವುದು ಹಾನಿ ಮಾಡುತ್ತದೆ?" ಎಂಬುದು ವಿಶ್ವಾಸವನ್ನು ಮುರಿಯುವ ನಡತೆಗಳನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      collaborative_learning_initiative: |
        ಪ್ರಾಜೆಕ್ಟ್‌ಗಳ ಮೇಲೆ ಪ್ರೀಮೋರ್ಟೆಮ್‌ಗಳನ್ನು (premortems) ನಡೆಸಿ: "ಇದು ವಿಫಲವಾಯಿತು. ಏಕೆ?" ಯೋಜನೆಯನ್ನು ಮತ್ತು ಕಾರ್ಯಗತಗೊಳಿಸುವಿಕೆಯನ್ನು ಸುಧಾರಿಸಲು ಉತ್ತರಗಳನ್ನು ಬಳಸಿ.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        ವೈಫಲ್ಯವನ್ನು ತಪ್ಪಿಸುವ ಮೇಲೆ ಮಾತ್ರ ಗಮನ ಹರಿಸುವುದು ಕ್ರಿಯೆಯನ್ನು ಸ್ಥಗಿತಗೊಳಿಸಬಹುದು ಮತ್ತು ಅಗತ್ಯವಿರುವ ಅಪಾಯಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವುದನ್ನು ತಡೆಯಬಹುದು.
      negativity_bias: |
        ಮುಂದೆ ನೋಡುವ ಅವಕಾಶದ ಗುರುತಿಸುವಿಕೆಯೊಂದಿಗೆ ಸಮತೋಲನವಿಲ್ಲದಿದ್ದರೆ ವಿಲೋಮವು ಋಣಾತ್ಮಕ ಪಕ್ಷಪಾತವನ್ನು ಹೆಚ್ಚಿಸಬಹುದು.
      analysis_paralysis: |
        ವಿಫಲ ಮೋಡ್‌ಗಳ ಮೇಲೆ ಅತಿಯಾದ ಸಮಯವನ್ನು ವ್ಯಯಿಸುವುದರಿಂದ ಎಂದಿಗೂ ಕಾರ್ಯಗತಗೊಳಿಸುವುದಿಲ್ಲ.
      missing_upside: |
        ವಿಲೋಮವು ಏನು ಮಾಡಬೇಕೆಂದು ಹೇಳುವುದಿಲ್ಲ - ಕೇವಲ ಏನು ತಪ್ಪಿಸಬೇಕೆಂದು ಹೇಳುತ್ತದೆ. ನಿಮಗೆ ಇನ್ನೂ ಧನಾತ್ಮಕ ಗುರಿಗಳ ಅಗತ್ಯವಿದೆ.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ನಿಯಮ
    quick_introduction: |
      ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ನಿಯಮವು ಹೇಳುವ ಪ್ರಕಾರ, ನೀವು ಇತರ ಇನ್‌ಪುಟ್‌ಗಳನ್ನು ಸ್ಥಿರವಾಗಿಟ್ಟುಕೊಂಡು ಒಂದು ಇನ್‌ಪುಟ್ ಅನ್ನು ಹೆಚ್ಚಿಸಿದಾಗ, ಪ್ರತಿ ಹೊಸ ಇನ್‌ಪುಟ್ ಘಟಕದಿಂದ ಬರುವ ಹೆಚ್ಚುವರಿ ಉತ್ಪಾದನೆಯು ಅಂತಿಮವಾಗಿ ಕಡಿಮೆಯಾಗುತ್ತದೆ. ಹೆಚ್ಚು ಯಾವಾಗಲೂ ಉತ್ತಮವಲ್ಲ - ಹೆಚ್ಚುವರಿ ಪ್ರಯತ್ನವು ಕಡಿಮೆ ಮತ್ತು ಕಡಿಮೆ ಫಲಿತಾಂಶವನ್ನು ನೀಡುವ ಒಂದು ಹಂತವಿದೆ.
    one_liner: ಹೆಚ್ಚು ಇನ್‌ಪುಟ್ ಅಂತಿಮವಾಗಿ ಕಡಿಮೆ ಉತ್ಪಾದನೆಯನ್ನು ನೀಡುತ್ತದೆ—ಅಲ್ಲಿ ಒಂದು ಸೂಕ್ತವಾದ ಹಂತವಿದೆ.
    try_this:
      - Ask: ಹೆಚ್ಚುವರಿ ಪ್ರಯತ್ನವು ಅರ್ಥಪೂರ್ಣ ಆದಾಯವನ್ನು ನೀಡುವ ಹಂತವನ್ನು ನಾನು ದಾಟಿದ್ದೇನೆಯೇ?
      - Prioritize the highest-leverage inputs; stop when marginal returns drop.
      - Notice when you're over-investing in something that's already paid off.
    ask_yourself:
      - What would I gain from one more unit of effort here?
      - Am I optimizing past the point of diminishing returns?
    in_more_detail: |
      ಅರ್ಥಶಾಸ್ತ್ರದಲ್ಲಿ, ಸ್ಥಿರ ಪ್ರಮಾಣದ ಭೂಮಿಗೆ ಹೆಚ್ಚು ಕಾರ್ಮಿಕರನ್ನು ಸೇರಿಸುವುದರಿಂದ ಅಂತಿಮವಾಗಿ ಚಿಕ್ಕದಾದ ಹೆಚ್ಚುವರಿ ಲಾಭಗಳು ದೊರೆಯುತ್ತವೆ. ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆಯಲ್ಲಿ, ಅಧ್ಯಯನದ ಮೊದಲ ಗಂಟೆಯು ಹತ್ತನೇ ಗಂಟೆಗಿಂತ ಹೆಚ್ಚು ಮೌಲ್ಯವನ್ನು ಸೇರಿಸಬಹುದು. ಈ ತತ್ವವು ಸಂಪನ್ಮೂಲಗಳು, ಪ್ರಯತ್ನ, ಸಮಯ ಮತ್ತು ವೈಶಿಷ್ಟ್ಯಗಳಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ. ಒಂದು ಸೂಕ್ತವಾದ ಹಂತವಿದೆ; ಅದರಾಚೆಗೆ, ಅಂಚಿನ ಆದಾಯವು ಕಡಿಮೆಯಾಗುತ್ತದೆ ಮತ್ತು ನಕಾರಾತ್ಮಕವಾಗಿಯೂ ಪರಿಣಮಿಸಬಹುದು.

      ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯವನ್ನು ಗುರುತಿಸುವುದು ಸಂಪನ್ಮೂಲಗಳನ್ನು ದಕ್ಷವಾಗಿ ಹಂಚಿಕೆ ಮಾಡಲು ಮತ್ತು ಈಗಾಗಲೇ ತಮ್ಮ ಹೆಚ್ಚಿನ ಮೌಲ್ಯವನ್ನು ನೀಡಿದ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಅತಿಯಾಗಿ ಹೂಡಿಕೆ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.
    why_this_is_important: |
      ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯವನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಅತಿಯಾದ ಹೂಡಿಕೆಯನ್ನು ತಡೆಯುತ್ತದೆ, ಆದ್ಯತೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ ಮತ್ತು ಯಾವಾಗ ನಿಲ್ಲಬೇಕು ಎಂದು ತಿಳಿಯಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ಸಂಪನ್ಮೂಲ ಹಂಚಿಕೆ ಮತ್ತು ಪರಿಪೂರ್ಣತಾವಾದವನ್ನು ತಪ್ಪಿಸಲು ಅತ್ಯಗತ್ಯ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
      - ಹೂಡಿಕೆ
      - ವೃತ್ತಿ_ಚಲನೆಗಳು
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        ಪ್ರತಿ ಹೆಚ್ಚುವರಿ ಘಟಕದ ಪ್ರಯತ್ನ ಅಥವಾ ಸಂಪನ್ಮೂಲವು ಹಿಂದಿನದಕ್ಕಿಂತ ಕಡಿಮೆ ಉತ್ಪಾದನೆಯನ್ನು ನೀಡುತ್ತದೆ.
      perfectionism_trap: |
        ಗುಣಮಟ್ಟದ ಕೊನೆಯ 10% ಗಾಗಿ ಶ್ರಮಿಸುವುದು ಅಸಾಮಾನ್ಯ ಪ್ರಮಾಣದ ಪ್ರಯತ್ನವನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ.
      overinvestment: |
        ಅಂಚಿನ ಆದಾಯವು ಕಡಿಮೆ ಅಥವಾ ನಕಾರಾತ್ಮಕವಾಗಿದ್ದಾಗ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಸೇರಿಸುವುದನ್ನು ಮುಂದುವರಿಸುವುದು.
      optimal_point_passed: |
        ನೀವು ಹೆಚ್ಚು ಇನ್‌ಪುಟ್ ಫಲಿತಾಂಶಗಳನ್ನು ಸುಧಾರಿಸುವ ಹಂತವನ್ನು ದಾಟಿದ್ದೀರಿ.
    examples:
      studying: |
        ಪರೀಕ್ಷೆಯ ಮೊದಲ 2 ಗಂಟೆಗಳ ತಯಾರಿ, 7-8 ಗಂಟೆಗಳಿಗಿಂತ ಹೆಚ್ಚು ಲಾಭವನ್ನು ನೀಡುತ್ತದೆ; ಅಲ್ಲಿ ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ಹಂತವಿದೆ.
      product_features: |
        ಆ್ಯಪ್‌ಗೆ ಹೆಚ್ಚು ವೈಶಿಷ್ಟ್ಯಗಳನ್ನು ಸೇರಿಸುವುದರಿಂದ ಬಳಕೆದಾರರು ಗೊಂದಲಕ್ಕೊಳಗಾಗಬಹುದು; 20 ನೇ ವೈಶಿಷ್ಟ್ಯವು 5 ನೇ ವೈಶಿಷ್ಟ್ಯಕ್ಕಿಂತ ಕಡಿಮೆ ಮೌಲ್ಯವನ್ನು ನೀಡುತ್ತದೆ.
      hiring: |
        ಒಂದು ಯೋಜನೆಯಲ್ಲಿ ಹೆಚ್ಚು ಜನರನ್ನು ಸೇರಿಸುವುದರಿಂದ ಒಂದು ಹಂತದ ನಂತರ ಅದನ್ನು ನಿಧಾನಗೊಳಿಸಬಹುದು (ಬ್ರೂಕ್ಸ್‌ನ ನಿಯಮ).
      marketing: |
        ಜಾಹೀರಾತು ವೆಚ್ಚವನ್ನು ದುಪ್ಪಟ್ಟು ಮಾಡುವುದರಿಂದ ಫಲಿತಾಂಶಗಳು ದುಪ್ಪಟ್ಟು ಆಗುವುದಿಲ್ಲ; ಮಾರುಕಟ್ಟೆಯನ್ನು ಸ್ಯಾಚುರೇಟ್ ಮಾಡಿದಾಗ ಆದಾಯವು ಕ್ಷೀಣಿಸುತ್ತದೆ.
    real_world_implications: |
      ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ನಿಯಮವು ಆರ್ಥಿಕ ನೀತಿ, ವ್ಯಾಪಾರ ತಂತ್ರ ಮತ್ತು ವೈಯಕ್ತಿಕ ಉತ್ಪಾದಕತೆಯನ್ನು ನಿರ್ದೇಶಿಸುತ್ತದೆ. ಅದನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದರಿಂದ ವ್ಯರ್ಥ ಸಂಪನ್ಮೂಲಗಳು ಮತ್ತು ಉಪ-ಉತ್ತಮ ಫಲಿತಾಂಶಗಳು ಉಂಟಾಗುತ್ತವೆ. ಇದು ಪಾರೆಟೊ ತತ್ವ ಮತ್ತು ಗಮನವನ್ನು ಬೆಂಬಲಿಸುತ್ತದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಕೆಲವು ಆಳವಾದ ಸಂಬಂಧಗಳಲ್ಲಿ ಹೂಡಿಕೆ ಮಾಡುವುದು ಅನೇಕರಲ್ಲಿ ಪ್ರಯತ್ನವನ್ನು ಹರಡುವುದಕ್ಕಿಂತ ಹೆಚ್ಚು ಲಾಭವನ್ನು ನೀಡಬಹುದು. ಹೆಚ್ಚುವರಿ ನೆಟ್‌ವರ್ಕಿಂಗ್ ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯವನ್ನು ಹೊಂದಿದಾಗ ಗುರುತಿಸಿ.
      collaborative_learning_initiative: |
        ಹೆಚ್ಚು ತರಬೇತಿ ಗಂಟೆಗಳು ಯಾವಾಗಲೂ ಉತ್ತಮ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವುದಿಲ್ಲ. ಸೂಕ್ತವಾದ ಡೋಸ್ ಅನ್ನು ಹುಡುಕಿ ಮತ್ತು ಓವರ್‌ಲೋಡ್ ಮಾಡುವುದನ್ನು ತಪ್ಪಿಸಿ.
    how_can_this_be_misapplied:
      premature_optimization: |
        ಒಂದು ಯೋಗ್ಯವಾದ ಗುಣಮಟ್ಟದ ಮಟ್ಟವನ್ನು ತಲುಪುವ ಮೊದಲು ತುಂಬಾ ಬೇಗನೆ ನಿಲ್ಲುವುದು.
      undershooting: |
        ಅಪಾರವಾದ ಪ್ರಯತ್ನಕ್ಕಾಗಿ ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯವನ್ನು ನೆಪವಾಗಿ ಬಳಸುವುದು.
      misidentifying_the_curve: |
        ನೀವು ನಿಜವಾಗಿಯೂ ವಕ್ರರೇಖೆಯ ವಿಭಿನ್ನ ಭಾಗದಲ್ಲಿದ್ದಾಗ (ಉದಾ., ಆರಂಭಿಕ ಘಾತೀಯ ಹಂತ) ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯವನ್ನು ಊಹಿಸುವುದು.
      one_size_fits_all: |
        ವಿಭಿನ್ನ ವಕ್ರರೇಖೆಗಳನ್ನು ಹೊಂದಿರುವ ಸಂದರ್ಭಗಳಲ್ಲಿ ಅದೇ "ಸೂಕ್ತವಾದ ಹಂತ" ವನ್ನು ಅನ್ವಯಿಸುವುದು.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: ನಷ್ಟದ ನಿವಾರಣೆಯ ಪಕ್ಷಪಾತ
    quick_introduction: |
      ನಷ್ಟದ ನಿವಾರಣೆ ಎಂದರೆ ಸಮಾನ ಲಾಭವನ್ನು ಗಳಿಸುವುದಕ್ಕಿಂತ ನಷ್ಟವನ್ನು ತಪ್ಪಿಸಲು ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ.
      ಯಾವುದೇ ವಿಷಯವನ್ನು ಕಳೆದುಕೊಳ್ಳುವ ನೋವು, ಅದನ್ನು ಪಡೆಯುವ ಸಂತೋಷಕ್ಕಿಂತ ಸುಮಾರು ಎರಡು ಪಟ್ಟು ಬಲವಾಗಿ ಅನುಭವಿಸುತ್ತದೆ.
    one_liner: ಸಮಾನ ಲಾಭಕ್ಕಿಂತ ನಷ್ಟಗಳು ಸುಮಾರು ಎರಡು ಪಟ್ಟು ನೋವನ್ನು ನೀಡುತ್ತವೆ.
    try_this:
      - "ನಿಮ್ಮನ್ನು ಕೇಳಿಕೊಳ್ಳಿ: ನಾನು ಪಡೆಯಬಹುದಾದ ಲಾಭಕ್ಕಿಂತ ಕಳೆದುಕೊಳ್ಳುವ ವಿಷಯಕ್ಕೆ ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುತ್ತೇನೆಯೇ?"
      - ಆಯ್ಕೆಯನ್ನು ಲಾಭಗಳ ರೂಪದಲ್ಲಿ ಮರುರೂಪಿಸಿ, ನಷ್ಟಗಳ ರೂಪದಲ್ಲಿ ಅಲ್ಲ, ಆಗ ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನ ಬದಲಾಗುತ್ತದೆಯೇ ನೋಡಿ.
      - ನಷ್ಟದ ಭಯವು, ನಿಜವಾದ ಲಾಭಕ್ಕಿಂತ ನಿರ್ಧಾರವನ್ನು ಹೆಚ್ಚು ಪ್ರಭಾವಿಸುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ನಾನು ಸೊನ್ನೆಯಿಂದ ಪ್ರಾರಂಭಿಸಿದರೆ ಏನು ಆರಿಸಿಕೊಳ್ಳುತ್ತೇನೆ?
      - ನಾನು ಕಳೆದುಕೊಳ್ಳುವ ವಿಷಯಕ್ಕಾಗಿ ಹಿಡಿದಿಟ್ಟುಕೊಂಡಿದ್ದೇನೆಯೇ, ಅಥವಾ ಭವಿಷ್ಯವು ನಿಜವಾಗಿಯೂ ಉತ್ತಮವಾಗಿದೆಯೇ?
    in_more_detail: |
      ಡೇನಿಯಲ್ ಕಹ್ನೆಮನ್ ಮತ್ತು ಅಮೋಸ್ ಟ್ವೆರ್ಸ್ಕಿ ಅವರಿಂದ ಅಭಿವೃದ್ಧಿಪಡಿಸಲ್ಪಟ್ಟ ನಷ್ಟದ ನಿವಾರಣೆಯು, ನಷ್ಟಗಳು ಮತ್ತು ಲಾಭಗಳನ್ನು
      ಅಸಮಂಜಸವಾಗಿ ಹೇಗೆ ಗ್ರಹಿಸಲಾಗುತ್ತದೆ ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ. 100 ಡಾಲರ್ ಕಳೆದುಕೊಳ್ಳುವ ಮಾನಸಿಕ ಪರಿಣಾಮವು ಸಾಮಾನ್ಯವಾಗಿ
      100 ಡಾಲರ್ ಗಳಿಸುವ ಸಂತೃಪ್ತಿಗಿಂತ ಹೆಚ್ಚಾಗಿರುತ್ತದೆ. ಈ ಪಕ್ಷಪಾತವು ಹಣಕಾಸು, ಮಾತುಕತೆಗಳು ಮತ್ತು ದೈನಂದಿನ ಆಯ್ಕೆಗಳಾದ್ಯಂತ ನಿರ್ಧಾರಗಳ ಮೇಲೆ
      ಪ್ರಭಾವ ಬೀರುತ್ತದೆ, ಸಂಭಾವ್ಯ ನಷ್ಟಗಳು ಸ್ಪಷ್ಟವಾಗಿರುವಾಗ ಅಪಾಯ-ನಿವಾರಕ ನಡವಳಿಕೆಗೆ ಕಾರಣವಾಗುತ್ತದೆ.
    why_this_is_important: |
      ನಷ್ಟದ ನಿವಾರಣೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು, ತರ್ಕಬದ್ಧ ವಿಶ್ಲೇಷಣೆಗಿಂತ ನಷ್ಟದ ಭಯವು ನಿರ್ಧಾರಗಳನ್ನು ಹೇಗೆ ಪ್ರೇರೇಪಿಸುತ್ತದೆ ಎಂಬುದನ್ನು ಗುರುತಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      ಏಕೆ ಜನರು ನಷ್ಟದಲ್ಲಿರುವ ಹೂಡಿಕೆಗಳನ್ನು ಉಳಿಸಿಕೊಳ್ಳುತ್ತಾರೆ, ಅಗತ್ಯ ಬದಲಾವಣೆಗಳನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ ಮತ್ತು ಮಾತುಕತೆಗಳು ಮತ್ತು ವೃತ್ತಿಜೀವನದ ನಿರ್ಧಾರಗಳಲ್ಲಿ
      ಅಸಮಂಜಸವಾದ ಆಯ್ಕೆಗಳನ್ನು ಮಾಡುತ್ತಾರೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವುದು
      - ಹೂಡಿಕೆ
      - ವೃತ್ತಿ_ಬದಲಾವಣೆಗಳು
      - ಅಪಾಯ_ಮೌಲ್ಯಮಾಪನ
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        ಸಂಭಾವ್ಯ ಲಾಭದ ಎದುರು, ಏನನ್ನಾದರೂ ಕಳೆದುಕೊಳ್ಳುವ ಆಲೋಚನೆಯು ಅತಿಯಾದ ಆತಂಕ ಅಥವಾ ವಿರೋಧವನ್ನು
        ಪ್ರಚೋದಿಸಿದಾಗ ಗಮನಿಸಿ.
      reluctance_to_change: |
        ಆಯವ್ಯಯ ವಿಶ್ಲೇಷಣೆಯು ಉತ್ತಮ ಆಯ್ಕೆ ಎಂದು ಸೂಚಿಸಿದರೂ, ಕಾರ್ಯತಂತ್ರಗಳನ್ನು ಬದಲಾಯಿಸಲು,
        ಉದ್ಯೋಗವನ್ನು ತೊರೆಯಲು ಅಥವಾ ಆಸ್ತಿಯನ್ನು ಮಾರಾಟ ಮಾಡಲು ಹಿಂಜರಿಕೆ.
      framing_sensitivity: |
        ಪರಿಣಾಮಗಳು ಸಮಾನವಾಗಿದ್ದರೂ, ಆಯ್ಕೆಗಳನ್ನು ಲಾಭಗಳಾಗಿ ಅಥವಾ ನಷ್ಟಗಳಾಗಿ ಹೇಗೆ ಮಂಡಿಸಲಾಗುತ್ತದೆ ಎಂಬುದರ
        ಆಧಾರದ ಮೇಲೆ ನಿರ್ಧಾರಗಳು ನಾಟಕೀಯವಾಗಿ ಬದಲಾಗುತ್ತವೆ.
      overvaluing_what_you_have: |
        ಉಡುಗೊರೆ ಪರಿಣಾಮ — ನೀವು ಹೊಂದಿರುವ ವಸ್ತುಗಳಿಗೆ ನೀವು ಅವುಗಳನ್ನು ಹೊಂದಿದ್ದೀರಿ ಎಂಬ ಕಾರಣಕ್ಕಾಗಿ ಹೆಚ್ಚಿನ
        ಮೌಲ್ಯವನ್ನು ನೀಡುವುದು — ಇದು ಆಗಾಗ್ಗೆ ನಷ್ಟದ ನಿವಾರಣೆಯೊಂದಿಗೆ ಇರುತ್ತದೆ.
    examples:
      investing: |
        ನಷ್ಟವನ್ನು "ಯಾವುದೇ ಕಾರಣಕ್ಕೂ ಆಗದಂತೆ ತಡೆಯಲು" ಕುಸಿಯುತ್ತಿರುವ ಷೇರುಗಳನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುವುದು,
        ಆದರೆ ಬೇರೆ ಕಡೆ ಉತ್ತಮ ಹೂಡಿಕೆ ಅವಕಾಶಗಳನ್ನು ಕಳೆದುಕೊಳ್ಳುವುದು.
      career: |
        ಹೊಸ ಅವಕಾಶವು ಹೆಚ್ಚಿನ ಬೆಳವಣಿಗೆಯನ್ನು ನೀಡುತ್ತಿದೆಯೆಂದು ಗೊತ್ತಿದ್ದರೂ, ಕೆಲಸವನ್ನು ತೊರೆದರೆ ಭದ್ರತೆಯನ್ನು
        ಕಳೆದುಕೊಳ್ಳುವ ಭಾವನೆಯಿಂದ ಅತೃಪ್ತಿಕರ ಕೆಲಸದಲ್ಲಿ ಉಳಿಯುವುದು.
      negotiations: |
        ಒಪ್ಪಂದವನ್ನು "ತ್ಯಜಿಸುವುದಾಗಿ" ಮಂಡಿಸಿದರೆ ನ್ಯಾಯಯುತವಾದ ಕೊಡುಗೆಯನ್ನು ತಿರಸ್ಕರಿಸುವುದು,
        ಒಪ್ಪಂದವನ್ನು "ಪಡೆಯುವುದಾಗಿ" ಅಲ್ಲ.
      product_design: |
        ಉಚಿತ ಪ್ರಯೋಗಗಳು ಪಾವತಿಗೆ ಪರಿವರ್ತನೆಗೊಳ್ಳುತ್ತವೆ — ಬಳಕೆದಾರರು ಪ್ರಯೋಗದ ಅಂತ್ಯದಲ್ಲಿ ಸೇವೆಯನ್ನು
        "ಕಳೆದುಕೊಳ್ಳುವ" ಅನುಭವವನ್ನು ಪಡೆಯುತ್ತಾರೆ, ಇದು ಹೊಸ ಸೇವೆಯನ್ನು "ಪಡೆಯುವುದಕ್ಕಿಂತ" ಚಂದಾದಾರಿಕೆಯನ್ನು
        ಹೆಚ್ಚು ಪ್ರೇರೇಪಿಸುತ್ತದೆ.
    real_world_implications: |
      ನಷ್ಟದ ನಿವಾರಣೆಯು ಮಾರುಕಟ್ಟೆಗಳು, ನೀತಿಗಳು ಮತ್ತು ವೈಯಕ್ತಿಕ ನಡವಳಿಕೆಗಳನ್ನು ರೂಪಿಸುತ್ತದೆ.
      ವಿಮೆ ಮತ್ತು ವಾರಂಟಿಗಳು ಏಕೆ ಚೆನ್ನಾಗಿ ಮಾರಾಟವಾಗುತ್ತವೆ, ಜನರು ಏಕೆ ಪ್ರಯೋಜನಕಾರಿ ಬದಲಾವಣೆಯನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ
      ಮತ್ತು ನಕಾರಾತ್ಮಕ ಸುದ್ದಿಗಳು ಏಕೆ ದೊಡ್ಡ ಪರಿಣಾಮವನ್ನು ಬೀರುತ್ತವೆ ಎಂಬುದನ್ನು ಇದು ವಿವರಿಸುತ್ತದೆ. ಅದನ್ನು ಗುರುತಿಸುವುದು
      ನಿರ್ಧಾರದ ಗುಣಮಟ್ಟವನ್ನು ಸುಧಾರಿಸಬಹುದು ಮತ್ತು ವಿಷಾದ-ಪ್ರೇರಿತ ಆಯ್ಕೆಗಳನ್ನು ಕಡಿಮೆ ಮಾಡಬಹುದು.
    professional_application:
      networking_and_relationship_building: |
        ಅನುತ್ಪಾದಕ ಸಂಬಂಧಗಳು ಅಥವಾ ಸಹಯೋಗಗಳನ್ನು ಕೊನೆಗೊಳಿಸಲು ಜನರು ನಷ್ಟದ ನಿವಾರಣೆಯಿಂದಾಗಿ ವಿರೋಧಿಸಬಹುದು
        — ಅವರು ಸಂಪರ್ಕವನ್ನು "ಕಳೆದುಕೊಳ್ಳುವ" ಭಯಪಡುತ್ತಾರೆ. ವಿರೋಧವನ್ನು ಕಡಿಮೆ ಮಾಡಲು ಹೊಸ ಅವಕಾಶಗಳನ್ನು
        ನಷ್ಟಗಳ ಬದಲಿಗೆ ಲಾಭಗಳಾಗಿ ಮಂಡಿಸಿ.
      collaborative_learning_initiative: |
        ಹೊಸ ಕಾರ್ಯವಿಧಾನಗಳು ಅಥವಾ ಸಾಧನಗಳನ್ನು ಪರಿಚಯಿಸುವಾಗ, ತಂಡವು ಏನು "ತ್ಯಜಿಸುತ್ತಿದೆ" ಎಂಬುದಕ್ಕಿಂತ
        ಏನು ಪಡೆಯುತ್ತದೆ ಎಂಬುದರ ಮೇಲೆ ಒತ್ತು ನೀಡಿ. ನಷ್ಟ-ಆಧಾರಿತ ಬದಲಾವಣೆ ಉಪಕ್ರಮಗಳು ಆಗಾಗ್ಗೆ ಬಲವಾದ
        ವಿರೋಧವನ್ನು ಪ್ರಚೋದಿಸುತ್ತವೆ.
    how_can_this_be_misapplied:
      manipulation: |
        ನಿರ್ಧಾರಗಳನ್ನು ಒತ್ತಾಯಿಸಲು ನಷ್ಟದ ನಿವಾರಣೆಯನ್ನು ಬಳಸಿಕೊಳ್ಳುವುದು — ಉದಾ., "ಸೀಮಿತ ಸಮಯದ ಕೊಡುಗೆಗಳು"
        ಅಥವಾ "ಕಳೆದುಕೊಳ್ಳಬೇಡಿ" ಎಂಬ ಮಂಡನೆ, ಇದು ನೈಜ ಮೌಲ್ಯದ ಮೌಲ್ಯಮಾಪನಕ್ಕಿಂತ ನಷ್ಟದ ಭಯವನ್ನು
        ಪ್ರಚೋದಿಸುತ್ತದೆ.
      misinterpreting_relationships: |
        ಯಾರೊಬ್ಬರ ಬದಲಾವಣೆಗೆ ಪ್ರತಿರೋಧವು ಸಂಪೂರ್ಣವಾಗಿ ತಾರ್ಕಿಕವೆಂದು ಊಹಿಸುವುದು, ಅದು ನಷ್ಟದ ನಿವಾರಣೆಯಿಂದ
        ಪ್ರೇರೇಪಿತವಾಗಿರಬಹುದು. ಉದ್ದೇಶಗಳನ್ನು ತಪ್ಪಾಗಿ ಹೇಳುವುದು ನಂಬಿಕೆಯನ್ನು ಹಾಳುಮಾಡಬಹುದು.
      overcommitment: |
        ಸಂಕಷ್ಟದ ವೆಚ್ಚದ ತಪ್ಪು — ವಿಫಲವಾದ ಯೋಜನೆಯಲ್ಲಿ ಹೂಡಿಕೆ ಮುಂದುವರೆಸುವುದು, ಏಕೆಂದರೆ "ನಾವು ಈಗಾಗಲೇ
        ಅಷ್ಟು ಹಾಕಿದ್ದೇವೆ" ಬದಲಿಗೆ ನಷ್ಟಗಳನ್ನು ಕಡಿತಗೊಳಿಸುವ ಬದಲು.
      missed_opportunities_for_conflict_resolution: |
        ಯಾವುದೇ ರಾಜಿ ನಷ್ಟದಂತೆ ಅನಿಸಿದರೆ ರಾಜಿ ಮಾಡಿಕೊಳ್ಳಲು ನಿರಾಕರಿಸುವುದು,
        ಪರ್ಯಾಯವೆಂದರೆ ಎಲ್ಲರಿಗೂ ಕೆಟ್ಟ ಫಲಿತಾಂಶ.
      vulnerability_to_exploitation: |
        ನಷ್ಟದ ನಿವಾರಣೆಯನ್ನು ಪ್ರಚೋದಿಸಲು ಆಯ್ಕೆಗಳನ್ನು ಮಂಡಿಸುವವರಿಂದ ನಿರ್ವಹಿಸಲ್ಪಡುವಿಕೆ,
        ಉದಾ., ನೀವು ಕಾರ್ಯನಿರ್ವಹಿಸದಿದ್ದರೆ "ಏನು ಕಳೆದುಕೊಳ್ಳುತ್ತೀರಿ" ಎಂಬುದನ್ನು ಒತ್ತಿಹೇಳುವ ಮಾರಾಟ ತಂತ್ರಗಳು.
      reinforcing_negative_perceptions: |
        ಸಂಭಾವ್ಯ ಅನಾನುಕೂಲಗಳ ಮೇಲೆ ಅತಿಯಾದ ಗಮನ ಹರಿಸುವುದು, ಸ್ವಯಂ-ಪೂರೈಸುವ ನಿರಾಶಾವಾದಿ ದೃಷ್ಟಿಕೋನವನ್ನು
        ಸೃಷ್ಟಿಸಬಹುದು, ಬೆಳವಣಿಗೆಯ ಅವಕಾಶಗಳನ್ನು ಕಳೆದುಕೊಳ್ಳಬಹುದು.
    related_content:
