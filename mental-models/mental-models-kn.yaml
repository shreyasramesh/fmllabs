  - id: framing_effect
    name: ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್
    quick_introduction: |
      ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಎಂದರೆ, ಮೂಲಭೂತ ಸಂಗತಿಗಳು ಒಂದೇ ಆಗಿದ್ದರೂ, ಆಯ್ಕೆಗಳನ್ನು
      ಪ್ರಸ್ತುತಪಡಿಸುವ ವಿಧಾನವನ್ನು ಆಧರಿಸಿ ನಮ್ಮ ನಿರ್ಧಾರಗಳು ಬದಲಾಗುವ ಪ್ರವೃತ್ತಿ. "90%
      ಬದುಕುಳಿಯುವಿಕೆ" ಮತ್ತು "10% ಮರಣ" ಒಂದೇ ಫಲಿತಾಂಶವನ್ನು ವಿವರಿಸಿದರೂ ವಿಭಿನ್ನ
      ಆಯ್ಕೆಗಳನ್ನು ನೀಡುತ್ತವೆ. ಫ್ರೇಮ್ ನಿರ್ಧಾರವನ್ನು ರೂಪಿಸುತ್ತದೆ.
    one_liner: ಅದೇ ಸಂಗತಿಗಳು, ವಿಭಿನ್ನವಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ, ವಿಭಿನ್ನ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತವೆ.
    try_this:
      - ನಿರ್ಧರಿಸುವ ಮೊದಲು ಆಯ್ಕೆಗಳನ್ನು ಹಲವು ರೀತಿಯಲ್ಲಿ ಫ್ರೇಮ್ ಮಾಡಿ - ಲಾಭದ ಫ್ರೇಮ್ ಮತ್ತು ನಷ್ಟದ ಫ್ರೇಮ್.
      - ಯಾವುದಾದರೂ ಒಂದು ವಿಷಯವನ್ನು ಯಾವ ರೀತಿ ಹೇಳಲಾಗುತ್ತದೆ ಎಂಬುದರ ಆಧಾರದ ಮೇಲೆ ನಿಮ್ಮ ಆಯ್ಕೆ ಬದಲಾದಾಗ ಗಮನಿಸಿ.
      - ಕೇಳಿ: ಫ್ರೇಮ್‌ನಿಂದ ಹೊರತುಪಡಿಸಿ, ಮೂಲಭೂತ ಸಂಗತಿಗಳು ಯಾವುವು?
    ask_yourself:
      - ಇದನ್ನು ಲಾಭ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ ಮತ್ತು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ ನಾನು ವಿಭಿನ್ನವಾಗಿ ನಿರ್ಧರಿಸುತ್ತೇನೆಯೇ?
      - ನಾನು ಫ್ರೇಮ್‌ಗೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಿದ್ದೇನೆಯೇ ಅಥವಾ ನಿಜವಾದ ಫಲಿತಾಂಶಕ್ಕೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಿದ್ದೇನೆಯೇ?
    in_more_detail: |
      ಕಾಹ್ನೆಮನ್ ಮತ್ತು ಟ್ವರ್ಸ್ಕಿ ತೋರಿಸಿದಂತೆ, ಜನರು ಲಾಭಗಳಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ಅಪಾಯದಿಂದ ದೂರವಿರುತ್ತಾರೆ ಮತ್ತು ನಷ್ಟಗಳಾಗಿ ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ಅಪಾಯವನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ - ಒಂದೇ ಫಲಿತಾಂಶಗಳಿಗೂ ಸಹ. ಧನಾತ್ಮಕ ಫ್ರೇಮಿಂಗ್ ("200 ಜೀವಗಳನ್ನು ಉಳಿಸಿ") ವಿರುದ್ಧ ಋಣಾತ್ಮಕ ಫ್ರೇಮಿಂಗ್ ("400 ಜನರು ಸಾಯುತ್ತಾರೆ") ಆದ್ಯತೆಗಳನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ. ನಷ್ಟ ಫ್ರೇಮ್‌ಗಳು ಸಮಾನ ಲಾಭದ ಫ್ರೇಮ್‌ಗಳಿಗಿಂತ ಬಲವಾದ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತವೆ.

      ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ವೈದ್ಯಕೀಯ ನಿರ್ಧಾರಗಳು, ನೀತಿ, ಮಾರ್ಕೆಟಿಂಗ್ ಮತ್ತು
      ಮಾತುಕತೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಅತ್ಯಂತ ಶಕ್ತಿಶಾಲಿ ಮತ್ತು ಉತ್ತಮವಾಗಿ ದಾಖಲಾದ ಪಕ್ಷಪಾತಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ.
      ಅರಿವು ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಆದರೆ ಸಂಪೂರ್ಣವಾಗಿ ನಿವಾರಿಸುವುದು ಕಷ್ಟ.
    why_this_is_important: |
      ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಅನ್ನು ಗುರುತಿಸುವುದರಿಂದ ನೀವು ಹೆಚ್ಚು ಸ್ಥಿರವಾದ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು,
      ಮೋಸಕ್ಕೆ ಒಳಗಾಗುವುದನ್ನು ತಡೆಯಲು ಮತ್ತು ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿಯಾಗಿ ಸಂವಹನ ನಡೆಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ.
      ಅದೇ ಕೊಡುಗೆಯನ್ನು ಪ್ರಸ್ತುತಿಯನ್ನು ಅವಲಂಬಿಸಿ ಏಕೆ ಸ್ವೀಕರಿಸಬಹುದು ಅಥವಾ ತಿರಸ್ಕರಿಸಬಹುದು ಎಂಬುದನ್ನೂ ಇದು ವಿವರಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ತೆಗೆದುಕೊಳ್ಳುವಿಕೆ
      - ಮಾತುಕತೆ
      - ನಾಯಕತ್ವ
      - ಅಪಾಯ_ಅಂದಾಜು
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        ಒಂದೇ ಫಲಿತಾಂಶವನ್ನು ಲಾಭ ಮತ್ತು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದಾಗ ವಿಭಿನ್ನ ಆಯ್ಕೆಗಳು ಉಂಟಾಗುತ್ತವೆ.
      presentation_dependence: |
        ವಿಷಯವಲ್ಲ, ಫ್ರೇಮಿಂಗ್ ಬದಲಾದಾಗ ನಿರ್ಧಾರಗಳು ಬದಲಾಗುತ್ತವೆ.
      default_influence: |
        ಆಯ್ಕೆಗಳನ್ನು ಯಾವ ಕ್ರಮದಲ್ಲಿ ಅಥವಾ ಯಾವ ಹೆಸರಿನಲ್ಲಿ ನೀಡಲಾಗಿದೆ ಎಂಬುದು ಆಯ್ಕೆಗಳ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
      emotional_trigger: |
        ಕೆಲವು ಫ್ರೇಮ್‌ಗಳು ಬಲವಾದ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತವೆ.
    examples:
      medical: |
        ಒಂದೇ ಕಾರ್ಯವಿಧಾನಕ್ಕಾಗಿ "90% ಬದುಕುಳಿಯುವಿಕೆ" ವಿರುದ್ಧ "10% ಮರಣ" -
        ಜನರು ಫ್ರೇಮ್ ಅನ್ನು ಆಧರಿಸಿ ವಿಭಿನ್ನವಾಗಿ ಆಯ್ಕೆ ಮಾಡುತ್ತಾರೆ.
      sales: |
        "₹50 ಉಳಿಸಿ" ವಿರುದ್ಧ "₹50 ಕಳೆದುಕೊಳ್ಳಬೇಡಿ" - ಸಮಾನ ಫ್ರೇಮ್‌ಗಳು, ವಿಭಿನ್ನ
        ಮಾನಸಿಕ ಪರಿಣಾಮ.
      policy: |
        "ತೆರಿಗೆ ಪರಿಹಾರ" ವಿರುದ್ಧ "ಸರ್ಕಾರದ ಖರ್ಚು" - ಒಂದೇ ನೀತಿ, ವಿಭಿನ್ನ
        ರಾಜಕೀಯ ಪ್ರತಿಕ್ರಿಯೆ.
      negotiation: |
        ಒಂದು ಕೊಡುಗೆಯನ್ನು "ರಿಯಾಯಿತಿ" ಎಂದು ಅಥವಾ "ಹೆಚ್ಚುವರಿ ಶುಲ್ಕವನ್ನು ತಪ್ಪಿಸುವುದು" ಎಂದು
        ಪ್ರಸ್ತುತಪಡಿಸುವುದು ಸ್ವೀಕಾರ ದರವನ್ನು ಬದಲಾಯಿಸುತ್ತದೆ.
    real_world_implications: |
      ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಅನ್ನು ಜಾಹೀರಾತು, ರಾಜಕೀಯ ಮತ್ತು
      ಮಾತುಕತೆಗಳಲ್ಲಿ ಬಳಸಲಾಗುತ್ತದೆ. ಇದು ವೈದ್ಯಕೀಯ ನಿರ್ಧಾರಗಳು ಮತ್ತು ನೀತಿ ಬೆಂಬಲದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ.
      ಮರುಫ್ರೇಮಿಂಗ್ ನಿರ್ಧಾರಗಳು ಮತ್ತು ಸಂವಹನವನ್ನು ಸುಧಾರಿಸಬಹುದು. ಅರಿವು
      ಸಹಾಯ ಮಾಡುತ್ತದೆ ಆದರೆ ಪರಿಣಾಮವನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ನಿವಾರಿಸುವುದಿಲ್ಲ.
    professional_application:
      networking_and_relationship_building: |
        ಆಯ್ಕೆಗಳನ್ನು ಪ್ರಸ್ತುತಪಡಿಸುವಾಗ, ಹಲವು ಫ್ರೇಮ್‌ಗಳನ್ನು ಪರಿಗಣಿಸಿ.
        ವಿಭಿನ್ನ ಫ್ರೇಮಿಂಗ್‌ಗಳು ಗ್ರಹಿಕೆಯನ್ನು ಹೇಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂಬುದನ್ನು ಪರೀಕ್ಷಿಸಿ. ಮಾಹಿತಿಯನ್ನು ಸ್ವೀಕರಿಸುವಾಗ,
        "ಇದನ್ನು ಬೇರೆ ಹೇಗೆ ಫ್ರೇಮ್ ಮಾಡಬಹುದು?" ಎಂದು ಕೇಳಿ.
      collaborative_learning_initiative: |
        ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಾಗ, ಫ್ರೇಮಿಂಗ್ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಶೀಲಿಸಲು ಆಯ್ಕೆಗಳನ್ನು ಸ್ಪಷ್ಟವಾಗಿ ಮರುಫ್ರೇಮ್ ಮಾಡಿ.
        "ಇದನ್ನು ನಷ್ಟ ಎಂದು ಫ್ರೇಮ್ ಮಾಡಿದರೆ, ನಾವು ವಿಭಿನ್ನವಾಗಿ ನಿರ್ಧರಿಸುತ್ತೀವೇ?" ಎಂದು ಕೇಳಿ. ನ್ಯಾಯಸಮ್ಮತತೆಗಾಗಿ ಸ್ಥಿರವಾದ ಫ್ರೇಮಿಂಗ್ ಬಳಸಿ.
    how_can_this_be_misapplied:
      manipulation: |
        ಜನರ ಅರಿವಿಲ್ಲದೆ, ಅಪೇಕ್ಷಿತ ಫಲಿತಾಂಶಗಳ ಕಡೆಗೆ ಅವರನ್ನು ನಿರ್ದೇಶಿಸಲು ಉದ್ದೇಶಪೂರ್ವಕವಾಗಿ ಫ್ರೇಮ್ ಮಾಡುವುದು.
      false_equivalence: |
        ಕೆಲವು ಫ್ರೇಮ್‌ಗಳು ಪ್ರಮುಖ ಮಾಹಿತಿಯನ್ನು ಮರೆಮಾಡಿದರೂ, ಎಲ್ಲಾ ಫ್ರೇಮ್‌ಗಳು ಸಮಾನವಾಗಿ ಮಾನ್ಯವಾಗಿವೆ ಎಂದು ಊಹಿಸುವುದು.
      overcorrection: |
        ಫ್ರೇಮಿಂಗ್ ಅನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ನಿರ್ಲಕ್ಷಿಸಿ ಮತ್ತು ಅದು ಮುಖ್ಯವಲ್ಲ ಎಂದು ಊಹಿಸುವುದು -
        ಇದು ಮುಖ್ಯ.
      spin: |
        ಸ್ಪಷ್ಟಪಡಿಸುವುದಕ್ಕಿಂತ ತಪ್ಪು ದಾರಿ ಹಿಡಿಸಲು ಫ್ರೇಮಿಂಗ್ ಬಳಸುವುದು.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: ಮೂಲ ಕಾರಣ ದೋಷ
    quick_introduction: |
      ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅವರ ಗುಣ ಅಥವಾ ವ್ಯಕ್ತಿತ್ವಕ್ಕೆ ಆರೋಪಿಸುವ ಪ್ರವೃತ್ತಿಯೇ ಮೂಲ ಕಾರಣ ದೋಷ.
      ಆದರೆ ನಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ಸಂದರ್ಭಕ್ಕೆ ತಕ್ಕಂತೆ ವಿವರಿಸುತ್ತೇವೆ. ನಾವು ಇತರರನ್ನು ಅವರ
      ಕೆಲಸಗಳ ಮೂಲಕ ತೀರ್ಮಾನಿಸುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮನ್ನು ನಮ್ಮ ಉದ್ದೇಶಗಳ ಮೂಲಕ.
    one_liner: ನಾವು ಇತರರನ್ನು ಅವರ ಕೆಲಸಗಳ ಮೂಲಕ, ನಮ್ಮನ್ನು ನಮ್ಮ ಉದ್ದೇಶಗಳ ಮೂಲಕ ತೀರ್ಮಾನಿಸುತ್ತೇವೆ.
    try_this:
      - ಯಾರಾದರೂ ನಿಮಗೆ ಕಿರಿಕಿರಿ ಉಂಟು ಮಾಡಿದರೆ, ಹೀಗೆ ಕೇಳಿ: ಯಾವ ಸಂದರ್ಭಗಳು ಇದನ್ನು ವಿವರಿಸಬಹುದು?
      - ನೀವು ನಿಮಗಾಗಿ ತೋರಿಸುವ ಉದಾರತೆಯನ್ನು ಇತರರಿಗೂ ತೋರಿಸಿ.
      - ನೀವು ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅವರ ಗುಣಲಕ್ಷಣಗಳಿಗೆ ಆರೋಪಿಸುತ್ತಿರುವುದನ್ನು ಗಮನಿಸಿ, ಸಂದರ್ಭಗಳಿಗೆ ಅಲ್ಲ.
    ask_yourself:
      - ನಾನು ಅವರ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವ ರೀತಿಯಲ್ಲಿಯೇ ನನ್ನ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುತ್ತೇನೆಯೇ?
      - ಅವರ ಪರಿಸ್ಥಿತಿಯ ಬಗ್ಗೆ ನಾನು ಏನನ್ನು ತಪ್ಪಾಗಿ ಅರ್ಥೈಸಿಕೊಳ್ಳುತ್ತಿದ್ದೇನೆ?
    in_more_detail: |
      ಯಾರಾದರೂ ಟ್ರಾಫಿಕ್‌ನಲ್ಲಿ ನಮ್ಮ ಮುಂದೆ ಹೋದರೆ, ನಾವು "ಎಂತಹ ಮೂರ್ಖ" ಎಂದು ಯೋಚಿಸುತ್ತೇವೆ.
      ನಾವು ಯಾರಾದರೂ ಮುಂದೆ ಹೋದರೆ, ನಾವು "ನಾನು ಹೋಗಲೇಬೇಕಿತ್ತು - ನಾನು ಅವಸರದಲ್ಲಿದ್ದೆ" ಎಂದು ಯೋಚಿಸುತ್ತೇವೆ.
      ನಮ್ಮ ಸ್ವಂತ ವೈಫಲ್ಯಗಳನ್ನು ನಾವು ಸಂದರ್ಭಕ್ಕೆ ("ಟ್ರಾಫಿಕ್ ಭಯಾನಕವಾಗಿತ್ತು") ಮತ್ತು ಇತರರ ವೈಫಲ್ಯಗಳನ್ನು
      ಗುಣಲಕ್ಷಣಕ್ಕೆ ("ಅವರು ಸೋಮಾರಿಗಳು") ಆರೋಪಿಸುತ್ತೇವೆ. ಯಶಸ್ಸಿಗೆ ಇದರ ವಿಪರೀತ ಅನ್ವಯಿಸುತ್ತದೆ:
      ನಾವು ನಮ್ಮ ಯಶಸ್ಸಿಗೆ ಕಾರಣ ನಮ್ಮನ್ನು ನೀಡುತ್ತೇವೆ, ಇತರರ ಯಶಸ್ಸನ್ನು ಅದೃಷ್ಟಕ್ಕೆ ಆರೋಪಿಸುತ್ತೇವೆ.

      ಈ ದೋಷವು "ಮೂಲ" ವಾಗಿದೆ ಏಕೆಂದರೆ ಇದು ಸರ್ವವ್ಯಾಪಿಯಾಗಿದೆ ಮತ್ತು ಸ್ಥಿರವಾಗಿದೆ. ಇದು ಸಹಾನುಭೂತಿಯನ್ನು
      ಹಾನಿಗೊಳಿಸುತ್ತದೆ, ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೌಲ್ಯಮಾಪನವನ್ನು ವಿಕೃತಗೊಳಿಸುತ್ತದೆ.
    why_this_is_important: |
      ಮೂಲ ಕಾರಣ ದೋಷವನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಸಂಬಂಧಗಳು ಸುಧಾರಿಸುತ್ತವೆ, ಸಂಘರ್ಷ ಕಡಿಮೆಯಾಗುತ್ತದೆ ಮತ್ತು
      ನ್ಯಾಯಯುತವಾದ ತೀರ್ಪುಗಳು ಮೂಡುತ್ತವೆ. ಇದು ಯಾರಾದರೂ "ಹಾಗೆ" ಇದ್ದಾರೆ ಎಂದು ತೀರ್ಮಾನಿಸುವ ಮೊದಲು
      ಸಂದರ್ಭವನ್ನು ಪರಿಗಣಿಸಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ.
    when_to_use:
      - ಸಂಬಂಧ_ಬೆಳೆಸುವಿಕೆ
      - ಸಂಘರ್ಷ_ಪರಿಹಾರ
      - ನಾಯಕತ್ವ
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        ಇತರರ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವಾಗ "ಅವರು ಅಂತಹ ವ್ಯಕ್ತಿ" ಎಂದು ಹೇಳುವುದು.
      situational_explanation_for_self: |
        ನಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸುವಾಗ "ನನಗೆ ಬೇರೆ ದಾರಿಯಿರಲಿಲ್ಲ" ಅಥವಾ "ಪರಿಸ್ಥಿತಿಗಳು ನನ್ನನ್ನು
        ಬಲವಂತಪಡಿಸಿದವು" ಎಂದು ಹೇಳುವುದು.
      character_vs_context: |
        ಸಂದರ್ಭವು ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸಬಹುದಾಗಿದ್ದರೂ, ಗುಣಲಕ್ಷಣಗಳನ್ನು ಊಹಿಸುವುದು.
      asymmetric_standards: |
        ನಾವು ನಮ್ಮ ಮೇಲೆ ಇಟ್ಟುಕೊಳ್ಳುವ ಮಾನದಂಡಗಳಿಗಿಂತ ಕಠಿಣ ಮಾನದಂಡಗಳನ್ನು ಇತರರ ಮೇಲೆ ಇಡುವುದು.
    examples:
      traffic: |
        ಇನ್ನೊಬ್ಬ ಚಾಲಕನ ತಪ್ಪು = "ಕೆಟ್ಟ ಚಾಲಕ". ನಮ್ಮ ತಪ್ಪು = "ನಿವಾರಿಸಲಾಗದ ಪರಿಸ್ಥಿತಿ".
      workplace: |
        ಸಹೋದ್ಯೋಗಿಯ ಗಡುವು ತಪ್ಪಿರುವುದು = "ಹಣೆಗಾರಿಕೆ ಇಲ್ಲದ". ನಮ್ಮ ಗಡುವು ತಪ್ಪಿರುವುದು =
        "ಅತಿಯಾದ ಕೆಲಸ ಮತ್ತು ಯಾರೂ ಉತ್ತಮವಾಗಿ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ".
      politics: |
        ವಿರೋಧಿಗಳ ಅಭಿಪ್ರಾಯಗಳು = "ಅವರು ಮೂರ್ಖರು ಅಥವಾ ಕೆಟ್ಟವರು". ನಮ್ಮ ಅಭಿಪ್ರಾಯಗಳು =
        "ವಾಸ್ತವದ ತಾರ್ಕಿಕ ಪ್ರತಿಕ್ರಿಯೆ".
      performance: |
        ಇತರರ ಯಶಸ್ಸು = "ಅದೃಷ್ಟ". ನಮ್ಮ ಯಶಸ್ಸು = "ಕಠಿಣ ಶ್ರಮದಿಂದ ಗಳಿಸಿದ್ದು".
    real_world_implications: |
      ಮೂಲ ಕಾರಣ ದೋಷವು ಸಂಘರ್ಷವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ತಂಡದ ಕೆಲಸವನ್ನು ಹಾನಿಗೊಳಿಸುತ್ತದೆ ಮತ್ತು
      ನೇಮಕಾತಿ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯ ಮೌಲ್ಯಮಾಪನವನ್ನು ವಿಕೃತಗೊಳಿಸುತ್ತದೆ. ಇದನ್ನು ಸರಿಪಡಿಸುವುದರಿಂದ
      ಸಂಸ್ಥೆಯ ಸಂಸ್ಕೃತಿ ಮತ್ತು ವೈಯಕ್ತಿಕ ಸಂಬಂಧಗಳು ಸುಧಾರಿಸುತ್ತವೆ.
    professional_application:
      networking_and_relationship_building: |
        ಯಾರಾದರೂ ನಿಮಗೆ ನಿರಾಶೆಗೊಳಿಸಿದರೆ, ಅವರು ವಿಶ್ವಾಸಾರ್ಹರಲ್ಲ ಅಥವಾ ಕಷ್ಟಪಟ್ಟು ಕೆಲಸ ಮಾಡುವವರು
        ಎಂದು ತೀರ್ಮಾನಿಸುವ ಮೊದಲು "ಯಾವ ಸಂದರ್ಭಗಳು ಇದನ್ನು ವಿವರಿಸಬಹುದು?" ಎಂದು ಕೇಳಿ.
      collaborative_learning_initiative: |
        ಪ್ರತಿಕ್ರಿಯೆ ಮತ್ತು ವಿಮರ್ಶೆಗಳಲ್ಲಿ, "ಮೊದಲು ಪರಿಸ್ಥಿತಿ" ವ್ಯಾಖ್ಯಾನಗಳನ್ನು ಪ್ರೋತ್ಸಾಹಿಸಿ.
        ವ್ಯವಸ್ಥಾಪಕರಿಗೆ ಗುಣಲಕ್ಷಣಗಳಿಗೆ ಆರೋಪಿಸುವ ಮೊದಲು ಸಂದರ್ಭವನ್ನು ಪರಿಗಣಿಸಲು ತರಬೇತಿ ನೀಡಿ.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        ಕೆಲವು ನಡವಳಿಕೆಗಳು ಗುಣಲಕ್ಷಣಗಳನ್ನು ಪ್ರತಿಬಿಂಬಿಸುತ್ತಿದ್ದರೂ, ಪ್ರತಿ ಕ್ರಿಯೆಯನ್ನು "ಸಂದರ್ಭೋಚಿತ"
        ಎಂದು ವಜಾಗೊಳಿಸುವುದು.
      no_accountability: |
        ಜನರು ನಿಜವಾಗಿಯೂ ಮಾಡಿದ ಆಯ್ಕೆಗಳಿಗೆ ಜವಾಬ್ದಾರರಾಗಿರುವುದನ್ನು ತಪ್ಪಿಸಲು ದೋಷವನ್ನು
        ಬಳಸುವುದು.
      self_deprecation: |
        ಅತಿಯಾಗಿ ಸರಿಪಡಿಸಿ, ಯಾವಾಗಲೂ ನಿಮ್ಮನ್ನು ದೂಷಿಸುವುದು ಮತ್ತು ಇತರರ ಜವಾಬ್ದಾರಿಯನ್ನು
        ಯಾವಾಗಲೂ ಒಪ್ಪಿಕೊಳ್ಳದಿರುವುದು.
      ignoring_patterns: |
        ಯಾರಾದರೂ ಸಂದರ್ಭಗಳಲ್ಲಿ ಪದೇ ಪದೇ ಕೆಟ್ಟದಾಗಿ ವರ್ತಿಸಿದರೆ, ಗುಣಲಕ್ಷಣವು ಸಂಬಂಧಿತವಾಗಿರಬಹುದು.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ
    quick_introduction: |
      ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಎಂದರೆ ಹಿಂದಿನ ಸ್ವತಂತ್ರ ಘಟನೆಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂಬ ತಪ್ಪು ನಂಬಿಕೆಯಾಗಿದೆ. ಸತತವಾಗಿ 'ತಲೆ' ಬಂದ ನಂತರ, 'ಬಾಲ' ಬರಲು 'ಸಮಯ'ವಾಗಿದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ - ಪ್ರತಿ ಎಸೆತವೂ ಸ್ವತಂತ್ರವಾಗಿದ್ದರೂ ಸಹ. ನಾವು ಯಾದೃಚ್ಛಿಕತೆಯಲ್ಲಿ ಮಾದರಿಗಳನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಅಗತ್ಯವಿಲ್ಲದಿದ್ದಾಗ "ಸರಿಪಡಿಸುವಿಕೆ" ಅಥವಾ "ಹಿಮ್ಮುಖ"ವನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತೇವೆ.
    one_liner: ಹಿಂದಿನ ಸ್ವತಂತ್ರ ಘಟನೆಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುವುದಿಲ್ಲ - ನಾಣ್ಯಕ್ಕೆ ನೆನಪು ಇರುವುದಿಲ್ಲ.
    try_this:
      - ನಾನು ಗೆಲ್ಲಲು 'ಸಮಯ'ವಾಗಿದೆ ಎಂದು ನೀವು ಯೋಚಿಸಿದಾಗ, ಕೇಳಿ: ಈ ಘಟನೆಗಳು ನಿಜವಾಗಿಯೂ ಸ್ವತಂತ್ರವೇ?
      - ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ (ನಿಜ) ಮತ್ತು ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ (ಸುಳ್ಳು) ಇವುಗಳನ್ನು ಪ್ರತ್ಯೇಕಿಸಿ.
      - ಯಾದೃಚ್ಛಿಕತೆಯಲ್ಲಿ ಮಾದರಿಗಳನ್ನು ನೀವು ನೋಡುತ್ತಿರುವಾಗ ಗಮನಿಸಿ.
    ask_yourself:
      - ಹಿಂದಿನ ಫಲಿತಾಂಶಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂದು ನಾನು ಊಹಿಸುತ್ತಿದ್ದೇನೆಯೇ, ಆದರೆ ಅವು ಸ್ವತಂತ್ರವಾಗಿರುವಾಗ?
      - ಒಬ್ಬ ಸಂಖ್ಯಾಶಾಸ್ತ್ರಜ್ಞ ನನ್ನ "ಬದಲಾವಣೆಗಾಗಿ 'ಸಮಯ'ವಾಗಿದೆ" ಎಂಬ ತಾರ್ಕಿಕತೆಯನ್ನು ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆಯೇ?
    in_more_detail: |
      ಒಂದು ನ್ಯಾಯೋಚಿತ ನಾಣ್ಯ ಎಸೆತದಲ್ಲಿ, ಪ್ರತಿ ಎಸೆತವೂ ಸ್ವತಂತ್ರವಾಗಿರುತ್ತದೆ. ಹಿಂದಿನ ಫಲಿತಾಂಶಗಳ ಹೊರತಾಗಿಯೂ, ತಲೆಯ ಸಂಭವನೀಯತೆ ಯಾವಾಗಲೂ 50% ಆಗಿರುತ್ತದೆ. ಆದರೆ ಒಂದು ಫಲಿತಾಂಶದ ಸುದೀರ್ಘ ಸರಣಿಯು ಇನ್ನೊಂದನ್ನು ಹೆಚ್ಚು ಸಂಭವನೀಯವಾಗಿಸುತ್ತದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ನಾವು ದೊಡ್ಡ ಸಂಖ್ಯೆಗಳ ಕಾನೂನನ್ನು (ಅನೇಕ ಪ್ರಯೋಗಗಳಲ್ಲಿ, ಫಲಿತಾಂಶಗಳು ಸರಾಸರಿ ಆಗುತ್ತವೆ) ಅಲ್ಪಾವಧಿಯ "ಸರಿಪಡಿಸುವಿಕೆಯೊಂದಿಗೆ" ಗೊಂದಲಗೊಳಿಸುತ್ತೇವೆ. ಕ್ಯಾಸಿನೋಗೆ ನೆನಪಿಲ್ಲ.

      ಈ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಜೂಜು, ಹೂಡಿಕೆ ಮತ್ತು ದೈನಂದಿನ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಗೆ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. "ಅದೃಷ್ಟ" ಸಮತೋಲನಗೊಳ್ಳುತ್ತದೆ ಅಥವಾ ನಾವು ಗೆಲ್ಲಲು "ಸಮಯ"ವಾಗಿದೆ ಎಂದು ನಾವು ಊಹಿಸುತ್ತೇವೆ. ಕೆಲವೊಮ್ಮೆ ನಾವು ಸರಿಯಾಗಿರುತ್ತೇವೆ - ಆದರೆ ತಪ್ಪು ಕಾರಣಗಳಿಗಾಗಿ.
    why_this_is_important: |
      ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆಯನ್ನು ಗುರುತಿಸುವುದರಿಂದ ಜೂಜು ಮತ್ತು ಹೂಡಿಕೆಯಲ್ಲಿ ದುಬಾರಿ ತಪ್ಪುಗಳನ್ನು ತಡೆಯಬಹುದು. ಇದು ಅಲ್ಪಾವಧಿಯ ಸರಣಿಗಳನ್ನು ಅತಿಯಾಗಿ ಅರ್ಥೈಸುವುದನ್ನು ಮತ್ತು ಸುಳ್ಳು ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸುವುದನ್ನು ತಪ್ಪಿಸಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಇದು ನಿಜವಾದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯನ್ನು ತಪ್ಪು ತಿಳುವಳಿಕೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸುತ್ತದೆ.
    when_to_use:
      - ನಿರ್ಧಾರ_ಮಾಡುವಿಕೆ
      - ಹೂಡಿಕೆ
      - ಅಪಾಯ_ಅಂದಾಜು
      - ಸಮಸ್ಯೆ_ಪರಿಹರಿಸುವಿಕೆ
    how_can_you_spot_it:
      due_for_a_change: |
        "ನಾವು ಹಲವು ನಷ್ಟಗಳನ್ನು ಅನುಭವಿಸಿದ್ದೇವೆ - ನಾವು ಗೆಲ್ಲಲು 'ಸಮಯ'ವಾಗಿದೆ."
      pattern_in_randomness: |
        ಯಾದೃಚ್ಛಿಕ ಸರಣಿಗಳಲ್ಲಿ ಅರ್ಥಪೂರ್ಣ ಮಾದರಿಗಳನ್ನು ನೋಡುವುದು.
      hot_hand_fallacy: |
        ಒಂದು ಸರಣಿಯು ಮುಂದುವರಿಯುತ್ತದೆ ಎಂದು ನಂಬುವುದು (ಸಂಬಂಧಿತ ಆದರೆ ವಿರುದ್ಧ ತಪ್ಪು).
      independence_ignorance: |
        ಸ್ವತಂತ್ರ ಘಟನೆಗಳನ್ನು ಅವು ಸಂಪರ್ಕಗೊಂಡಿರುವಂತೆ ಪರಿಗಣಿಸುವುದು.
    examples:
      gambling: |
        ರೂಲೆಟ್‌ನಲ್ಲಿ ಹಲವು ಕೆಂಪು ಬಣ್ಣಗಳು ಬಂದ ನಂತರ, "ಕೆಂಪು ಬಣ್ಣ ಮುಂದುವರಿಯಲು ಸಾಧ್ಯವಿಲ್ಲ" ಎಂದು ಕಪ್ಪು ಬಣ್ಣದ ಮೇಲೆ ಪಣತೊಡುವುದು.
      investing: |
        "ಮಾರುಕಟ್ಟೆಯು ಕುಸಿದಿದೆ - ಅದು ಏರಲೇಬೇಕು."
      hiring: |
        "ನಾವು ಹಲವು ಕೆಟ್ಟ ಅಭ್ಯರ್ಥಿಗಳನ್ನು ನೇಮಿಸಿಕೊಂಡಿದ್ದೇವೆ - ಮುಂದಿನವರು ಉತ್ತಮರಾಗಿರಲೇಬೇಕು."
      sports: |
        "ಅವರು ಬಹಳಷ್ಟು ಶಾಟ್‌ಗಳನ್ನು ತಪ್ಪಿಸಿಕೊಂಡಿದ್ದಾರೆ - ಅವರು ಮುಂದಿನ ಶಾಟ್ ಮಾಡಲು 'ಸಮಯ'ವಾಗಿದೆ."
    real_world_implications: |
      ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆಯು ಜೂಜು ನಷ್ಟ ಮತ್ತು ಕಳಪೆ ಹೂಡಿಕೆ ನಿರ್ಧಾರಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಅಲ್ಪಾವಧಿಯ ಮಾದರಿಗಳನ್ನು ನಾವು ಏಕೆ ಅತಿಯಾಗಿ ಅರ್ಥೈಸುತ್ತೇವೆ ಎಂಬುದನ್ನೂ ಇದು ವಿವರಿಸುತ್ತದೆ. ನಿಜವಾದ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆಯಿಂದ (ಇಲ್ಲಿ ಹಿಂಜರಿಯಲು ನಿಜವಾದ ಸರಾಸರಿ ಇದೆ) ಇದನ್ನು ಪ್ರತ್ಯೇಕಿಸುವುದು ಮುಖ್ಯವಾಗಿದೆ.
    professional_application:
      networking_and_relationship_building: |
        ಹಿಂದಿನ ಸಂಬಂಧದ ಸನ್ನಿವೇಶಗಳು ಭವಿಷ್ಯದಲ್ಲಿ "ಸರಿಪಡುತ್ತವೆ" ಎಂದು ಊಹಿಸಬೇಡಿ - ಪ್ರತಿ ಸಂವಹನವೂ ಸ್ವಲ್ಪ ಸ್ವತಂತ್ರವಾಗಿರುತ್ತದೆ. ಆದರೆ ನಿಜವಾದ ಅಂತರ್ಲೀನ ಕಾರಣವಿದ್ದಾಗ ಮಾದರಿಗಳಿಂದ ಕಲಿಯಿರಿ.
      collaborative_learning_initiative: |
        ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಮೌಲ್ಯಮಾಪನ ಮಾಡುವಾಗ, ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸವನ್ನು ವ್ಯವಸ್ಥಿತ ಬದಲಾವಣೆಯಿಂದ ಪ್ರತ್ಯೇಕಿಸಿ. ಅಲ್ಪಾವಧಿಯ ಸರಣಿಗಳು ಶಬ್ದವಾಗಬಹುದು; "ಸರಣಿ"ಗಳಿಗೆ ಅತಿಯಾಗಿ ಪ್ರತಿಕ್ರಿಯಿಸಬೇಡಿ ಅಥವಾ ಸುಳ್ಳು ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸಬೇಡಿ.
    how_can_this_be_misapplied:
      ignoring_regression: |
        ಕೆಲವೊಮ್ಮೆ ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ನಿಜವಾಗಿರುತ್ತದೆ (ಉದಾಹರಣೆಗೆ, ಕೌಶಲ್ಯದ ಕಾರ್ಯಕ್ಷಮತೆ). ಎಲ್ಲಾ ಹಿಮ್ಮುಖವನ್ನು ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಎಂದು ತಳ್ಳಿಹಾಕಬೇಡಿ.
      false_independence: |
        ಘಟನೆಗಳು ಸ್ವತಂತ್ರವಾಗಿಲ್ಲದಿದ್ದಾಗ ಅವು ಸ್ವತಂತ್ರ ಎಂದು ಊಹಿಸುವುದು (ಉದಾಹರಣೆಗೆ, ಒಂದೇ ವಿಷಯದ ಪುನರಾವರ್ತಿತ ಅಳತೆಗಳು).
      overcorrection: |
        ಹಿಂಜರಿಯಲು ನಿಜವಾದ ಸರಾಸರಿ ಇರುವಾಗ ಎಂದಿಗೂ ಹಿಮ್ಮುಖವನ್ನು ನಿರೀಕ್ಷಿಸದಿರುವುದು.
      dismissing_patterns: |
        ಕೆಲವು ಮಾದರಿಗಳು ನಿಜವಾಗಿರುತ್ತವೆ - ಎಲ್ಲಾ ಸರಣಿಗಳು ಯಾದೃಚ್ಛಿಕವಾಗಿರುವುದಿಲ್ಲ.
