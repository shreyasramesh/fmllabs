# Mental Models & Cognitive Biases (Arabic)
# Consolidated from mental-models-ar/

mental_models:
  - id: ambiguity_effect
    name: تأثير الغموض
    quick_introduction: |
      تأثير الغموض هو الميل إلى تجنب الخيارات عندما لا تتوفر لدينا معلومات
      حول احتمالات النتائج. نحن نفضل المخاطر المعروفة على المخاطر غير المعروفة—
      حتى عندما قد تكون المخاطر غير المعروفة أفضل. عدم اليقين بحد ذاته يبدو منفرًا.
    one_liner: نحن نفضل المخاطر المعروفة على المخاطر غير المعروفة—حتى عندما قد تكون المخاطر غير المعروفة أفضل.
    try_this:
      - اسأل: هل أتجنب هذا الخيار بسبب عدم اليقين أساسًا، أم أن هناك عيبًا حقيقيًا؟
      - قم بقياس ما تعرفه؛ أحيانًا يكون للخيار "الغامض" جانب إيجابي أوضح.
      - لاحظ عندما تعود تلقائيًا إلى المألوف لمجرد أنه يبدو أكثر أمانًا.
    ask_yourself:
      - هل أرفض شيئًا لأنه غامض، أم لأنه أسوأ حقًا؟
      - ماذا أحتاج لمعرفته لأشعر بالراحة تجاه الخيار غير المؤكد؟
    in_more_detail: |
      في مفارقة إلسبرغ، يفضل الناس المراهنة على جرة ذات نسب معروفة من الكرات
      على جرة ذات نسب غير معروفة، حتى عندما قد تقدم الجرة غير المعروفة احتمالات أفضل.
      نحن نكره الغموض—نفضل أن يكون لدينا احتمال واضح (حتى لو كان سيئًا) بدلاً من احتمال غير واضح.

      يؤثر هذا التأثير على القرارات في الاستثمار، واختيارات المسار الوظيفي، والسياسات.
      يمكن أن يؤدي إلى خيارات دون المستوى الأمثل عندما نتجنب الخيارات الغامضة
      ولكنها قد تكون متفوقة. كما يفسر لماذا نفضل العلامات التجارية المألوفة
      والكميات المعروفة.
    why_this_is_important: |
      يساعدك التعرف على تأثير الغموض على تجنب تفضيل المألوف بشكل مفرط
      وتفضيل غير المؤكد بشكل ناقص. يمكن أن يؤدي إلى فرص ضائعة عندما
      يكون الغموض قابلًا للإدارة. كما يفسر لماذا يقلل الشفافية والوضوح
      من القلق.
    when_to_use:
      - اتخاذ_القرار
      - تقييم_المخاطر
      - الاستثمار
      - تحركات_وظيفية
    how_can_you_spot_it:
      preference_for_known_risks: |
        اختيار الخيارات ذات الاحتمالات الواضحة (حتى لو كانت أسوأ) على الخيارات الغامضة.
      avoidance_of_uncertainty: |
        رفض الخيارات بشكل أساسي لأن "نا لا نعرف ما يكفي".
      familiarity_over_optimality: |
        تفضيل المعروف على المجهول الذي قد يكون أفضل.
      information_seeking: |
        الاستعداد للدفع مقابل معلومات تقلل من الغموض—حتى عندما
        لا تغير القرار.
    examples:
      investing: |
        تفضيل الأسهم المحلية على الدولية لأن "نفهمها
        بشكل أفضل" على الرغم من فوائد التنويع.
      employment: |
        البقاء في وظيفة معروفة بدلاً من تولي دور ذي عائد غير مؤكد.
      product_choice: |
        اختيار علامة تجارية مألوفة بدلاً من خيار جديد ذي جودة غير مؤكدة.
      medical: |
        تفضيل علاج ذي آثار جانبية معروفة على علاج ذي نتائج غير مؤكدة،
        حتى عندما قد يكون الأخير أفضل.
    real_world_implications: |
      يشكل تأثير الغموض الأسواق، واختيارات المسار الوظيفي، والسياسات. يمكن تقليله
      من خلال توفير معلومات أوضح أو عن طريق إعادة صياغة القرارات. كما
      يفسر لماذا يقلل الشفافية والتواصل من القلق.
    professional_application:
      networking_and_relationship_building: |
        تقليل الغموض في العلاقات: توضيح التوقعات، التواصل
        بشكل صريح، وتقليل عدم اليقين. يفضل الناس المواقف المعروفة.
      collaborative_learning_initiative: |
        عند تقديم تغيير، قلل الغموض—وفر معلومات واضحة حول
        ما سيحدث، ومتى، ولماذا. يزيد الغموض من المقاومة.
    how_can_this_be_misapplied:
      manipulation: |
        إنشاء الغموض عمدًا لتوجيه الناس نحو الخيارات المفضلة.
      false_clarity: |
        توفير وضوح زائف عندما يكون هناك غموض حقيقي.
      overconfidence: |
        الافتراض بأن تقليل الغموض يحسن القرارات دائمًا—أحيانًا
        يكون الخيار الغامض أفضل حقًا.
      analysis_paralysis: |
        الانتظار للحصول على معلومات كاملة قبل اتخاذ قرار عندما يكون بعض الغموض
        لا مفر منه.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: تحيز الإرساء
    quick_introduction: |
      تحيز الإرساء هو الميل إلى الاعتماد بشكل كبير على أول قطعة معلومات يتم مواجهتها عند اتخاذ القرارات. هذا "المرساة" الأولي يشوه الأحكام اللاحقة، حتى عندما تكون غير ذات صلة أو اعتباطية.
    one_liner: الرقم الأول الذي تراه يشكل جميع الأرقام التي تليه.
    try_this:
      - قبل التفاوض، حدد رقمك المستهدف وتجنب أن ترسوه برقمهم.
      - عند التقدير، قم بإنشاء رقمك الخاص أولاً قبل سماع الآخرين.
      - اسأل: هل سأفكر بشكل مختلف إذا رأيت رقمًا مختلفًا أولاً؟
    ask_yourself:
      - ما هو الرقم أو الفكرة التي واجهتها أولاً - وهل تشوه حكمي؟
      - هل أقوم بالتكيف بما يكفي من المرساة، أم ما زلت قريبًا جدًا منها؟
    in_more_detail: |
      في تجربة كلاسيكية، أعطى الأشخاص الذين طُلب منهم تقدير نسبة الدول الأفريقية في الأمم المتحدة تقديرات أعلى إذا كانوا قد رأوا للتو رقمًا أعلى (مثل 65 مقابل 10). المرساة - حتى عندما تكون عشوائية - أثرت على إجاباتهم. يؤثر الإرساء على المفاوضات، والتسعير، والتوظيف، والتنبؤ.

      يصبح الرقم الأول الذي نراه نقطة مرجعية. نعدل بعيدًا عنها، ولكن عادةً لا يكفي. حتى عندما نعرف أن المرساة اعتباطية، إلا أنها لا تزال قادرة على التأثير علينا. الخبراء ليسوا محصنين.
    why_this_is_important: |
      يساعدك فهم الإرساء على اتخاذ قرارات أفضل، والتفاوض بفعالية أكبر، وتجنب التلاعب. كما أنه يفسر سبب أهمية ترتيب وتأطير المعلومات.
    when_to_use:
      - اتخاذ_القرارات
      - التفاوض
      - الاستثمار
      - تقييم_المخاطر
    how_can_you_spot_it:
      first_number_dominance: |
        الرقم الأول في التفاوض أو التقدير يؤثر بشكل غير متناسب على النتيجة.
      insufficient_adjustment: |
        عند التكيف من المرساة، لا يقوم الناس عادةً بالتكيف بما يكفي.
      arbitrary_anchor_influence: |
        حتى الأرقام غير ذات الصلة بشكل واضح (مثل الأرقام الأخيرة لرقم الضمان الاجتماعي) يمكن أن تؤثر على التقديرات.
      order_effects: |
        تسلسل تقديم الخيارات يغير الاختيارات.
    examples:
      salary_negotiation: |
        الرقم الأول المذكور - سواء من قبل صاحب العمل أو المرشح - غالبًا ما يرسو العرض النهائي.
      real_estate: |
        سعر القائمة يرسو تصورات المشترين للقيمة، حتى عندما يتم تعيينه عمدًا مرتفعًا أو منخفضًا.
      retail: |
        "كان 99 دولارًا، الآن 49 دولارًا" يستخدم السعر الأصلي كمرساة لجعل سعر البيع يبدو وكأنه صفقة.
      forecasting: |
        التقديرات الأولية في اجتماعات التخطيط ترسي التوقعات اللاحقة، حتى عندما كان التقدير الأول مجرد تخمين.
    real_world_implications: |
      يشكل الإرساء الأسواق والمفاوضات والسياسات. يمكن استخدامه بشكل أخلاقي (على سبيل المثال، تحديد توقعات معقولة) أو بشكل غير أخلاقي (على سبيل المثال، تسعير تلاعبي). التعرف عليه يحسن جودة القرار.
    professional_application:
      networking_and_relationship_building: |
        في المفاوضات، ضع في اعتبارك تقديم العرض الأول لوضع المرساة - أو كن على دراية عندما يقوم الطرف الآخر بذلك.
      collaborative_learning_initiative: |
        في الاجتماعات، كن حذرًا بشأن من يتحدث أولاً عن التقديرات؛ فكر في جمع تقديرات مستقلة قبل المناقشة.
    how_can_this_be_misapplied:
      manipulation: |
        استخدام المراسي القصوى عن قصد لتوجيه الآخرين نحو النتائج المرجوة.
      overconfidence_in_anchors: |
        الثقة المفرطة في تقديرك الأول دون مراجعته.
      ignoring_relevant_information: |
        السماح للمرساة بتجاوز البيانات الأكثر صلة.
      exploitation: |
        تكتيكات المبيعات التي تستخدم أسعار "مقارنة بـ" المبالغ فيها لجعل الأسعار الفعلية تبدو معقولة.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: انهيار التوفر
    quick_introduction: |
      انهيار التوفر هو عملية تعزيز ذاتي تكتسب فيها فكرة المصداقية من خلال النقاش العام المتكرر. كلما زاد تداولها، أصبحت "أكثر توفراً"، زاد إيمان الناس بها، وزاد تداولها. يكتسب الاعتقاد الجماعي زخماً بغض النظر عن حقيقته الأساسية.
    one_liner: كلما تكررت فكرة ما، بدت أكثر مصداقية - بغض النظر عن الأدلة.
    try_this:
      - Ask: هل هذا الاعتقاد منتشر لأنه صحيح، أم لأنه متكرر؟
      - Seek: ابحث عن المصادر الأولية قبل قبول "ما يعرفه الجميع".
      - Notice: لاحظ متى يكون التكرار وحده هو ما يقود إحساسك بالمصداقية.
    ask_yourself:
      - هل كنت سأصدق هذا لو سمعته مرة واحدة فقط؟
      - هل أخلط بين "الجميع يقول ذلك" و "الأدلة تدعمه"؟
    in_more_detail: |
      وصف تيمور كوران وكاس سنشتاين كيف تعمل انهيارات التوفر: توافر المعلومات (كم مرة نسمع شيئاً) والمصداقية (مدى إقناعها) يعزز كل منهما الآخر. التغطية الإعلامية، وسائل التواصل الاجتماعي، والخطاب العام تضخم أفكاراً معينة. بمجرد أن تصل فكرة إلى عتبة معينة من التوفر، يمكن أن تنتشر بسرعة وتصبح "معرفة شائعة" حتى لو كانت خاطئة أو مبالغ فيها.

      يمكن أن تكون انهيارات التوفر مفيدة (نشر تحذيرات مهمة) أو ضارة (نشر الذعر أو المعلومات المضللة). إنها مدفوعة بالاستدلال بالتوفر والإثبات الاجتماعي.
    why_this_is_important: |
      يساعدك التعرف على انهيارات التوفر على تقييم ما إذا كان الاعتقاد المنتشر يعكس الأدلة أم مجرد تكرار. إنه يفسر كيف تصبح الأفكار فيروسية وكيف يمكن أن تكون المعتقدات الجماعية خاطئة. إنه ضروري لمحو الأمية الإعلامية والتفكير النقدي.
    when_to_use:
      - اتخاذ_القرارات
      - تقييم_المخاطر
      - التعلم
      - القيادة
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        كلما تكررت فكرة ما، بدت أكثر مصداقية.
      media_amplification: |
        التغطية تدفع الاعتقاد الذي يدفع المزيد من التغطية.
      social_proof_belief: |
        "الجميع يؤمن بها" يصبح دليلاً على الاعتقاد.
      threshold_effects: |
        بمجرد أن تعبر فكرة ما عتبة الرؤية، تنتشر بسرعة.
    examples:
      health_scares: |
        تقترح دراسة أن المنتج خطير؛ الإعلام يضخمه؛
        الجمهور يتجنبه؛ المزيد من التغطية تتبع. قد يكون الخطر
        مبالغاً فيه.
      financial_panic: |
        تنتشر شائعات عن إفلاس بنك؛ يسحب الناس أموالهم؛
        السحب يصبح تحقيقاً ذاتياً للنبوءة.
      social_media: |
        تنتشر قصة؛ يزيد التكرار الاعتقاد؛
        يزيد الاعتقاد من المشاركة. الحقيقة والفيروسية يمكن أن تتباعد.
      organizational: |
        تنتشر شائعة حول تسريح العمال؛ يزيد القلق؛ يتغير السلوك؛
        تكتسب الشائعة المصداقية من خلال رد الفعل.
    real_world_implications: |
      تشكل انهيارات التوفر الرأي العام والسياسات والأسواق.
      يمكنها نشر كل من الحقائق المهمة والأكاذيب الخطيرة.
      يتطلب التفكير النقدي التمييز بين الاعتقاد القائم على الأدلة
      والاعتقاد المدفوع بالانهيار.
    professional_application:
      networking_and_relationship_building: |
        عندما تكون فكرة "في كل مكان"، اسأل: هل هي حقيقية لأنها
        متكررة، أم متكررة لأنها حقيقية؟ ابحث عن المصادر الأولية.
      collaborative_learning_initiative: |
        أنشئ معايير للتحقق قبل التضخيم. شجع
        التشكيك في "ما يعرفه الجميع". ميز بين الإجماع
        الذي يعكس الأدلة والإجماع الذي يعكس
        التوفر.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        في بعض الأحيان يكون الاعتقاد المنتشر صحيحاً. لا تفترض أن جميع
        الأفكار الشائعة هي انهيارات.
      conspiracy_thinking: |
        استخدام "انهيار التوفر" لرفض المخاوف المشروعة
        على أنها مصطنعة.
      false_skepticism: |
        رفض الأفكار المدعومة جيداً لأنها شائعة.
      contrarianism: |
        الافتراض بأن أي شيء يعتقده الجميع يجب أن يكون خاطئاً.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: تقدير الاستدلال بالتوفر
    quick_introduction: |
      تقدير الاستدلال بالتوفر هو الميل إلى الحكم على احتمالية وقوع أحداث
      بناءً على مدى سهولة تذكر الأمثلة. إذا كان بإمكاننا استدعاء أمثلة بسهولة،
      نفترض أن الحدث شائع. تهيمن الأمثلة الحية أو الحديثة أو العاطفية على
      تقديراتنا للاحتمالات.
    one_liner: ما يتبادر إلى الذهن بسهولة يبدو أكثر احتمالاً - حتى لو لم يكن كذلك.
    try_this:
      - اسأل: ما هو المعدل الأساسي؟ هل أبالغ في تقدير الأمثلة الحية أو الحديثة؟
      - ابحث عن بيانات عندما يقول لك حدسك "هذا يبدو شائعًا" أو "هذا يبدو نادرًا".
      - لاحظ متى تقود قصة درامية واحدة تقييمك للمخاطر.
    ask_yourself:
      - هل أحكم على الاحتمالية بناءً على سهولة الاستدعاء بدلاً من التكرار الفعلي؟
      - هل سأفكر بشكل مختلف لو لم أر هذا العنوان للتو؟
    in_more_detail: |
      نحن نستخدم اختصارات ذهنية لتقدير التكرار والاحتمالية. أحد هذه الاختصارات
      هو التوفر: ما الذي يتبادر إلى الذهن بسهولة؟ حوادث الطائرات حية ويتم
      الإبلاغ عنها بكثافة - نحن نبالغ في تقدير احتمالية وقوعها. حوادث السيارات
      شائعة ولكن أقل وضوحًا - نحن نقلل من تقديرها. الحداثة والحيوية والتأثير
      العاطفي كلها تزيد من التوفر.

      الاستدلال مفيد عندما يرتبط التوفر بالتكرار الفعلي.
      ولكن وسائل الإعلام والتجارب الشخصية والوضوح غالبًا ما تشوه العلاقة.
      نحن نخاف من المخاطر النادرة ولكن الحية ونتجاهل المخاطر الشائعة ولكن العادية.
    why_this_is_important: |
      التعرف على تقدير الاستدلال بالتوفر يساعدك على تصحيح تقديرات الاحتمالات،
      وتجنب المبالغة في رد الفعل على الأخبار الحية، واتخاذ تقييمات أفضل للمخاطر.
      وهو يفسر العديد من الأخطاء المنهجية في الحكم.
    when_to_use:
      - صنع_القرار
      - تقييم_المخاطر
      - الاستثمار
      - حل_المشكلات
    how_can_you_spot_it:
      vividness_dominance: |
        الأمثلة الدرامية أو العاطفية تؤثر بشكل غير متناسب على التقديرات.
      recency_effect: |
        الأحداث الأخيرة تبدو أكثر احتمالًا للتكرار.
      personal_experience_overweighting: |
        "أعرف شخصًا..." يشكل تقديرات الاحتمالات.
      media_distortion: |
        ما يتم الإبلاغ عنه غالبًا لا يتطابق مع ما هو شائع.
    examples:
      risk_perception: |
        المبالغة في تقدير خطر الإرهاب (حي، تم الإبلاغ عنه) والتقليل من تقدير
        خطر أمراض القلب (شائع، أقل دراماتيكية).
      investing: |
        الأحداث الأخيرة في السوق (الانهيار، الازدهار) تهيمن على التوقعات المستقبلية.
      hiring: |
        قصة حية واحدة عن توظيف سيئ من مدرسة معينة تؤثر على
        تقييم جميع المرشحين من تلك المدرسة.
      health: |
        تشخيص صديق بالسرطان يجعل السرطان يبدو أكثر احتمالًا مما تشير إليه المعدلات الأساسية.
    real_world_implications: |
      يؤثر تقدير الاستدلال بالتوفر على شراء التأمين، وأولويات السياسات،
      والقرارات الشخصية. تستغله وسائل الإعلام والمسوقون. يتطلب التصحيح
      له البحث عن المعدلات الأساسية والتساؤل عما "يتبادر إلى الذهن".
    professional_application:
      networking_and_relationship_building: |
        كن على دراية بأن تجربة سلبية حية واحدة مع شخص أو مجموعة يمكن أن
        تشوه حكمك. ابحث عن المعدلات الأساسية ونقاط بيانات متعددة.
      collaborative_learning_initiative: |
        عند تقييم المخاطر أو الفرص، اسأل صراحة "ما هو المعدل الأساسي؟" و "هل أبالغ
        في تقدير الأمثلة الحية؟" استخدم البيانات لتصحيح التقديرات المستندة إلى التوفر.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        أحيانًا يكون التوفر مفيدًا - التجربة الحديثة يمكن أن تشير إلى
        تغيير. لا تفترض أن جميع الأحكام المستندة إلى التوفر خاطئة.
      analysis_paralysis: |
        المبالغة في التصحيح إلى درجة تجاهل علامات التحذير المشروعة من
        التجربة الحية.
      false_objectivity: |
        افتراض أن المعدلات الأساسية صحيحة دائمًا عندما قد تكون قديمة أو
        غير قابلة للتطبيق.
      manipulation: |
        جعل أمثلة معينة حية بشكل متعمد لتوجيه أحكام الآخرين.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: ظاهرة بادر-ماينهوف
    quick_introduction: |
      ظاهرة بادر-ماينهوف (وتسمى أيضًا وهم التردد) تحدث عندما تتعلم شيئًا جديدًا ثم فجأة تلاحظه في كل مكان. يبدو وكأنه مصادفة، ولكنه غالبًا ما يكون انتباهًا انتقائيًا - عقلك مهيأ لملاحظة ما واجهه مؤخرًا.
    one_liner: تتعلم شيئًا جديدًا وفجأة تراه في كل مكان - لقد كان موجودًا دائمًا.
    try_this:
      - عندما تشعر أن شيئًا ما أصبح "في كل مكان" بعد تعلمه، تحقق من المعدل الأساسي.
      - لاحظ متى يجعل الحداثة شيئًا يبدو أكثر أهمية مما هو عليه.
      - اسأل: هل أرى اتجاهًا حقيقيًا، أم أنني فقط ألاحظ ما أنا مهيأ لملاحظته؟
    ask_yourself:
      - هل هذا أصبح أكثر شيوعًا حقًا الآن، أم أنني فقط ألاحظه أكثر؟
      - هل كنت سأرى هذا النمط لو لم أكن قد تعلمت عنه مؤخرًا؟
    in_more_detail: |
      بعد سماع أخبار عن جماعة بادر-ماينهوف الإرهابية، قد يرى الشخص إشارات إليها في الأخبار، وفي المحادثات، وفي المقالات في غضون أيام. الظاهرة لها مكونان: الانتباه الانتقائي (تلاحظ ما تبحث عنه) وتحيز التأكيد (تتذكر النجاحات وتنسى الإخفاقات).

      الوهم هو أن الشيء أصبح فجأة أكثر شيوعًا. في الواقع، كان موجودًا دائمًا؛ ببساطة لم تكن منتبهًا له. يمكن أن يؤدي هذا إلى المبالغة في تقدير انتشار أو أهمية المعلومات التي تعلمتها مؤخرًا.
    why_this_is_important: |
      التعرف على ظاهرة بادر-ماينهوف يساعدك على تجنب المبالغة في تقدير مدى شيوع أو أهمية شيء ما بناءً على التعرض الأخير. كما أنها تفسر لماذا يمكن أن تشعر الأفكار أو المنتجات أو الاتجاهات الجديدة بأنها "في كل مكان" بعد أن تلاحظها لأول مرة.
    when_to_use:
      - اتخاذ_القرار
      - التعلم
      - تقييم_المخاطر
      - حل_المشكلات
    how_can_you_spot_it:
      sudden_ubiquity: |
        تتعلم كلمة أو مفهومًا أو منتجًا جديدًا وخلال أيام تشعر أنك تراه باستمرار.
      recency_bias: |
        المعلومات الحديثة تبدو أكثر تمثيلاً للواقع مما هي عليه في الواقع.
      pattern_seeking: |
        يربط عقلك بين المشاهدات غير المرتبطة لخلق سرد "هذا في كل مكان".
      forgetting_the_misses: |
        لا تتتبع عدد المرات التي لا ترى فيها الشيء - بل فقط المرات التي تراه فيها.
    examples:
      vocabulary: |
        تعلم كلمة "serendipity" (حسن الحظ العرضي) ثم ملاحظتها في ثلاث مقالات مختلفة في نفس الأسبوع.
      car_purchase: |
        بعد أن تقرر شراء طراز معين من السيارات، تراه في كل شارع - على الرغم من أنه كان موجودًا دائمًا.
      health_anxiety: |
        القراءة عن عرض نادر ثم ملاحظة أحاسيس مماثلة في نفسك، مما يؤدي إلى قلق لا داعي له.
      trends: |
        اكتشاف تطبيق أو اتجاه جديد والشعور بأنه يهيمن فجأة - بينما قد يكون لديه قاعدة مستخدمين صغيرة.
    real_world_implications: |
      تؤثر الظاهرة على كيفية إدراكنا للاتجاهات والمخاطر والفرص. يمكن للمسوقين ووسائل الإعلام استغلالها من خلال خلق التعرض المتكرر. في اتخاذ القرارات، يمكن أن يؤدي ذلك إلى المبالغة في تقدير المعلومات الحديثة.
    professional_application:
      networking_and_relationship_building: |
        عندما يذكر شخص ما موضوعًا بشكل متكرر بعد تعلمه، أدرك أنه قد يكون يعاني من وهم التردد - الموضوع ليس بالضرورة أكثر أهمية، بل هو ببساطة أكثر بروزًا بالنسبة له.
      collaborative_learning_initiative: |
        في التدريب، أكد أن "رؤية الشيء في كل مكان" بعد تعلم شيء جديد هو أمر طبيعي؛ شجع على التحقق من المعدلات الأساسية بدلاً من الثقة بالشعور بالانتشار.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        افتراض أن شيئًا ما أكثر شيوعًا أو أهمية مما هو عليه لأنك لاحظته بشكل متكرر مؤخرًا.
      confirmation_bias_amplification: |
        استخدام الشعور بـ "رؤيته في كل مكان" كدليل على صحة اعتقاد ما.
      decision_distortion: |
        اتخاذ قرارات بناءً على معلومات تعلمتها مؤخرًا وتشعر بأنها ذات أهمية غير متناسبة.
      vulnerability_to_manipulation: |
        يستخدم المعلنون والدعاة التعرض المتكرر لخلق وهم الانتشار والأهمية.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: تأثير بارنوم
    quick_introduction: |
      تأثير بارنوم (أو تأثير فورر) هو الميل إلى قبول الأوصاف الشخصية الغامضة والعامة
      على أنها دقيقة بشكل فريد. تستخدم الأبراج، والعرافون، واختبارات الشخصية
      عبارات تنطبق على الجميع تقريبًا - لكننا نعتقد أنها خاصة بنا. نرى أنفسنا في العام.
    one_liner: العبارات الغامضة تبدو شخصية لأنها تنطبق على الجميع تقريبًا.
    try_this:
      - Ask: هل يمكن أن ينطبق هذا الوصف على العديد من الأشخاص؟ اختبره على شخص آخر.
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger?
      - Am I remembering the hits and forgetting the misses?
    in_more_detail: |
      قدم عالم النفس بيرترام فورر للطلاب نفس التغذية الراجعة "الشخصية" (على سبيل المثال، "لديك حاجة لأن يحبك الآخرون ويعجبوا بك") وقيموها على أنها دقيقة للغاية. كانت العبارات غامضة بما يكفي لتنطبق على
      أي شخص. يُقال إن بي. تي. بارنوم قال "هناك أحمق يولد كل دقيقة" - ويُطلق التأثير على اسمه لمهارته في جذب الجماهير بـ
      العموميات التي تبدو شخصية.

      يعمل التأثير لأننا بارعون في إيجاد صلة شخصية بالعبارات الغامضة. نتذكر الإيجابيات ونتجاهل السلبيات.
      هذا هو أساس القراءة الباردة والعديد من منتجات "الشخصية".
    why_this_is_important: |
      يساعدك التعرف على تأثير بارنوم على تقييم تقييمات الشخصية، ومقاومة التلاعب، وتجنب الإفراط في تفسير التغذية الراجعة الغامضة.
      يشرح لماذا تبدو الأبراج دقيقة ولماذا تكون بعض النصائح "الشخصية" عامة.
    when_to_use:
      - اتخاذ_القرارات
      - التعلم
      - تقييم_المخاطر
      - بناء_العلاقات
    how_can_you_spot_it:
      vague_accuracy: |
        التغذية الراجعة التي تبدو شخصية ولكن يمكن أن تنطبق على العديد من الأشخاص.
      selective_fit: |
        نحن نركز على ما يناسب ونتجاهل ما لا يناسب.
      cold_reading: |
        شخص "يقرأك" بعبارات هي في الواقع عامة.
      personality_test_enthusiasm: |
        قبول غير نقدي لنتائج التقييم على أنها رؤى فريدة.
    examples:
      horoscopes: |
        "أحيانًا تشكك في قراراتك" تبدو شخصية ولكنها تنطبق
        على معظم الناس.
      fortune_telling: |
        تنبؤات غامضة نفسرها على أنها خاصة بموقفنا.
      personality_tests: |
        تستخدم بعض التقييمات عبارات بارنوم وتبدو دقيقة دون
        أن تكون مميزة.
      feedback: |
        تغذية راجعة عامة للأداء نفسرها على أنها
        شخصية للغاية.
    real_world_implications: |
      يتم استغلال تأثير بارنوم في علم التنجيم، وبعض التدريب، والتقييمات منخفضة الجودة.
      يمكن أن يخلق ثقة زائفة في أدوات غير صالحة.
      كما أنه يفسر سبب قابليتنا للإطراء والتغذية الراجعة الإيجابية الغامضة.
    professional_application:
      networking_and_relationship_building: |
        عند تلقي التغذية الراجعة، اسأل "هل يمكن أن ينطبق هذا على العديد من الأشخاص؟"
        اطلب تغذية راجعة سلوكية محددة بدلاً من الثناء أو النقد الغامض. كن متشككًا في الرؤى "الشخصية" التي تبدو
        أفضل من أن تكون حقيقية.
      collaborative_learning_initiative: |
        عند استخدام التقييمات، اختر أدوات تم التحقق من صحتها ولديها صلاحية تمييزية.
        تجنب الأدوات التي تعتمد على عبارات بارنوم.
        درب الناس على التعرف على التغذية الراجعة الغامضة.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        ليست كل التغذية الراجعة الشخصية هي بارنوم - بعضها حقيقي
        ومحدد. لا تتجاهل كل شيء غامض.
      invalidating_experience: |
        أن تخبر شخصًا ما أن تجربته في البصيرة هي "مجرد بارنوم"
        بينما قد يكون لها قيمة بالنسبة له.
      overcorrection: |
        رفض جميع أطر عمل الشخصية لأن البعض يستخدم عبارات بارنوم.
      false_skepticism: |
        الافتراض أنه لأن شيئًا ما يبدو دقيقًا فيجب أن يكون
        بارنوم - في بعض الأحيان تكون الأشياء دقيقة.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: مغالطة المعدل الأساسي
    quick_introduction: |
      مغالطة المعدل الأساسي هي الميل إلى تجاهل المعلومات الإحصائية العامة (المعدلات الأساسية)
      لصالح معلومات محددة وحيوية. نحن نبالغ في تقدير
      الحالة المعينة ونقلل من تقدير الاحتمال المسبق. قصة واحدة مقنعة
      يمكن أن تتجاوز ما تقوله الأرقام.
    one_liner: قصة مقنعة يمكن أن تتجاوز ما تقوله الأرقام.
    try_this:
      - قبل الحكم على حالة، اسأل: ما هو المعدل الأساسي لهذا النوع من المواقف؟
      - اجمع بين الدليل المحدد والاحتمال المسبق - لا تتجاهل أياً منهما.
      - لاحظ متى تطغى مثال حي على الإحصائيات.
    ask_yourself:
      - هل أبالغ في تقدير هذه الحالة المحددة وأقلل من تقدير المعدل الأساسي؟
      - ماذا ستقول الأرقام إذا وضعت القصة المقنعة جانباً؟
    in_more_detail: |
      إذا كان مرض ما يؤثر على 1% من السكان وكان الاختبار دقيقاً بنسبة 95%، فإن
      نتيجة إيجابية غالباً ما تعني أن الشخص لا يزال على الأرجح لا يعاني من
      المرض - لأن المعدل الأساسي منخفض جداً. لكننا نتجاهل المعدلات الأساسية ونركز
      على "لقد جاءت نتيجته إيجابية". نحن نتأثر بالجانب المحدد أكثر من الجانب
      الإحصائي.

      تؤثر هذه المغالطة على التشخيص الطبي، والتوظيف، وتقييم المخاطر، والحكم القانوني.
      نحن بحاجة إلى دمج المعدلات الأساسية مع الأدلة الخاصة بالحالة باستخدام
      الاستدلال البايزي - ولكننا غالباً لا نفعل ذلك.
    why_this_is_important: |
      تصحيح مغالطة المعدل الأساسي يحسن التشخيص، وتقييم المخاطر، وجودة القرارات.
      يمنعنا من المبالغة في رد الفعل تجاه الحالات الحيوية والتقليل من رد الفعل
      تجاه الواقع الإحصائي.
    when_to_use:
      - اتخاذ_القرار
      - تقييم_المخاطر
      - حل_المشاكل
      - الاستثمار
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        لا يتم دمج المعدلات الأساسية في الأحكام.
      vividness_over_statistics: |
        تطغى حالة أو قصة واحدة على البيانات المجمعة.
      diagnostic_overweighting: |
        المبالغة في تقدير الأدلة الجديدة (مثل نتيجة الاختبار) دون النظر في المعدل الأساسي.
      anecdote_override: |
        "أعرف شخصاً..." يتجاوز الدليل الإحصائي.
    examples:
      medical: |
        نتيجة اختبار إيجابية لمرض نادر - المعدل الأساسي منخفض، لذا فإن نتيجة
        إيجابية غالباً ما تكون إيجابية خاطئة. نحن نتجاهل هذا ونفترض أنهم مصابون بالمرض.
      hiring: |
        لدى مرشح مقابلة رائعة - نتجاهل المعدلات الأساسية لكيفية
        توقع المقابلات لأداء جيد.
      risk: |
        حادث طائرة مؤثر - نبالغ في تقدير مخاطر الطيران ونقلل من تقدير
        مخاطر القيادة، متجاهلين المعدلات الأساسية.
      startup_investing: |
        يُقدم مؤسس عرضاً جيداً - نتجاهل أن معظم الشركات الناشئة تفشل بغض النظر
        عن جودة العرض.
    real_world_implications: |
      تؤثر مغالطة المعدل الأساسي على القرارات الطبية، والأحكام القانونية، واستراتيجيات الأعمال.
      تساهم في سوء تخصيص الموارد و
      سوء تقييم المخاطر. التفكير البايزي يصححها.
    professional_application:
      networking_and_relationship_building: |
        عند تقييم الأشخاص، ضع في اعتبارك المعدلات الأساسية: على سبيل المثال، كم مرة يحدث هذا
        النوع من السلوك؟ لا تدع تفاعلاً واحداً مؤثراً يتجاوز النمط الأوسع.
      collaborative_learning_initiative: |
        عند اتخاذ القرارات، قم بتحديد ومراعاة المعدلات الأساسية بشكل صريح قبل
        دمج الأدلة الخاصة بالحالة. تدريب الفرق على الاستدلال البايزي.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        تجاهل الأدلة القوية الخاصة بالحالة عندما تشير المعدلات الأساسية إلى خلاف ذلك -
        أحياناً تكون الحالة الفردية هي الاستثناء.
      stereotyping: |
        استخدام المعدلات الأساسية لإصدار أحكام غير عادلة بشأن الأفراد.
      false_precision: |
        تطبيق المعدلات الأساسية بدقة زائفة عندما تكون تقديرات تقريبية.
      dismissing_individuals: |
        "الإحصائيات تقول كذا" عندما قد لا يناسب الفرد أمامك
        التوزيع.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: نظرية بايز
    quick_introduction: |
      تصف نظرية بايز كيفية تحديث احتمالية فرضية ما عند
      تلقي دليل جديد. إنها تُضفي طابعًا رسميًا على فكرة أن المعتقدات يجب أن تتغير
      بما يتناسب مع مدى دعم الدليل لها—ليس بشكل كلي أو لا شيء،
      بل بشكل تدريجي.
    one_liner: تحديث المعتقدات بما يتناسب مع مدى دعم الدليل لها.
    try_this:
      - ابدأ باعتقادك المسبق؛ اسأل عن مدى احتمالية الدليل لو كنت مخطئًا.
      - قم بالتحديث تدريجيًا—لا تنتقل من 0% إلى 100% بناءً على نقطة بيانات واحدة.
      - ضع في اعتبارك الفرضيات البديلة: هل سيتناسب الدليل معها أيضًا؟
    ask_yourself:
      - ما مدى تأثير هذا الدليل حقًا على الاحتمالية؟
      - هل أقوم بتحديث معتقداتي، أم مجرد تأكيد لما كنت أعتقده بالفعل؟
    in_more_detail: |
      تنص النظرية على أن احتمالية فرضية معينة في ظل دليل معين تساوي
      الاحتمالية المسبقة مضروبة في احتمالية الدليل في ظل الفرضية،
      مقسومة على احتمالية الدليل. عمليًا: ابدأ باعتقادك المسبق،
      وانظر إلى مدى اتساق الدليل الجديد مع فرضيتك مقابل البدائل،
      وقم بالتحديث وفقًا لذلك.

      يفند التفكير البايزي تحيز التأكيد من خلال مطالبة النظر بأن تفكر
      في مدى احتمالية الدليل لو كنت مخطئًا. إنها أساس
      الاستدلال الاحتمالي والتحديث العلمي.
    why_this_is_important: |
      يحسّن التفكير البايزي عملية اتخاذ القرار في ظل عدم اليقين، ويساعدك على
      تجنب الثقة المفرطة، ويوفر إطارًا للتعلم من الأدلة.
      إنه ضروري للتشخيص، والتنبؤ، وأي مجال يتضمن عدم يقين.
    when_to_use:
      - اتخاذ_القرار
      - حل_المشكلات
      - تقييم_المخاطر
      - التعلم
    how_can_you_spot_it:
      prior_and_update: |
        البدء باعتقاد أساسي وتعديله بناءً على دليل جديد.
      likelihood_ratio_thinking: |
        السؤال "ما مدى احتمالية هذا الدليل لو كنت على صواب مقابل خطأ؟"
      incremental_updating: |
        تتحول المعتقدات تدريجيًا مع الدليل بدلاً من التغيير المفاجئ.
      base_rate_respect: |
        الاحتمالات المسبقة (المعدلات الأساسية) مهمة، وليس فقط أحدث نقطة بيانات.
    examples:
      medical_diagnosis: |
        نتيجة اختبار إيجابية لمرض نادر—الاحتمالية المسبقة (انتشار منخفض) تعني أن
        نتيجة إيجابية غالبًا ما تكون نتيجة إيجابية خاطئة. تقوم نظرية بايز بتحديث الاحتمالية.
      forecasting: |
        تحديث التوقعات مع وصول بيانات جديدة بدلاً من الالتزام بالتقديرات الأولية.
      hiring: |
        البدء بالمعدلات الأساسية لملاءمة الدور، ثم التحديث بناءً على أداء المقابلة.
      investing: |
        تحديث احتمالية نجاح شركة مع وصول معلومات جديدة (أرباح، أخبار).
    real_world_implications: |
      يُشكل التفكير البايزي أساس الذكاء الاصطناعي الحديث، والتشخيص الطبي، والاستدلال العلمي.
      يصحح إهمال المعدل الأساسي وتحيز التأكيد.
      إنها أداة قوية لأي مجال يتضمن عدم يقين.
    professional_application:
      networking_and_relationship_building: |
        قم بتحديث معتقداتك حول الأشخاص بناءً على دليل جديد بدلاً من
        التمسك بانطباعات أولى ثابتة. ضع في اعتبارك المعدلات الأساسية (على سبيل المثال، ما مدى شيوع
        هذا السلوك؟) عند تفسير الإجراءات.
      collaborative_learning_initiative: |
        شجع الفرق على ذكر المعتقدات المسبقة بوضوح قبل المناقشات، ثم
        التحديث عند تقديم الأدلة. يقلل من تأثير التثبيت وتحيز التأكيد.
    how_can_this_be_misapplied:
      overprecision: |
        تعيين احتمالات دقيقة عندما يكون عدم اليقين مرتفعًا.
      prior_rigidity: |
        التمسك بمعتقدات مسبقة قوية وعدم التحديث بما يكفي مع الأدلة الجديدة.
      base_rate_tyranny: |
        تجاهل الأدلة القوية لأن المعدلات الأساسية تشير إلى خلاف ذلك—أحيانًا
        يجب أن تسود الأدلة.
      false_sophistication: |
        استخدام اللغة البايزية لتبدو دقيقًا دون القيام بالاستدلال الفعلي.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: تأثير بن فرانكلين
    quick_introduction: |
      تأثير بن فرانكلين هو الظاهرة النفسية التي بموجبها يحب الناس شخصًا ما أكثر
      بعد مساعدته. على عكس الحدس بأننا نقوم بالمساعدات للأشخاص الذين نحبهم، غالبًا ما نبدأ في الإعجاب بالأشخاص الذين قمنا بمساعدتهم.
    one_liner: نبدأ في الإعجاب بالأشخاص الذين ساعدناهم — مواقفنا تتبع أفعالنا.
    try_this:
      - إذا كنت ترغب في تحسين علاقة، ففكر في طلب مساعدة صغيرة.
      - لاحظ متى يؤدي تقديم مساعدة إلى تغيير مشاعرك تجاه شخص ما.
      - كن على دراية بأن الآخرين قد يحبونك أكثر بعد مساعدتهم.
    ask_yourself:
      - هل أدت مساعدتي لشخص ما إلى تغيير شعوري تجاهه؟
      - هل أبرر جهدي بزيادة تقديري له؟
    in_more_detail: |
      وصف بنجامين فرانكلين بشكل مشهور كيف كسب مشرع منافس لصالحه من خلال طلب استعارة كتاب نادر من مكتبته. بعد أن استجاب الرجل، أعاده فرانكلين مع رسالة شكر. تحسنت العلاقة بشكل ملحوظ. يقترح التأثير أن مواقفنا تتبع أفعالنا: عندما نستثمر جهدًا في مساعدة شخص ما، فإننا نبرر هذا الجهد من خلال زيادة تقديرنا الإيجابي له.

      تشرح نظرية التنافر المعرفي ذلك: عندما نقوم بمساعدة شخص نكرهه أو نشعر تجاهه بالحياد، فإننا نشعر بتوتر بين فعلنا (المساعدة) وموقفنا (الكراهية). غالبًا ما يكون حل هذا التوتر بالإعجاب به أكثر أسهل من الاعتراف بأننا تصرفنا ضد تفضيلاتنا.
    why_this_is_important: |
      يساعد فهم تأثير بن فرانكلين على بناء العلاقات بشكل استراتيجي والتعرف على متى قد تتأثر مشاعرك الخاصة بالمساعدات السابقة. كما أنه يفسر لماذا قد يكون طلب المساعدات الصغيرة أكثر فعالية من تقديمها عند محاولة تحسين علاقة.
    when_to_use:
      - بناء_العلاقات
      - التفاوض
      - القيادة
      - حل_النزاعات
    how_can_you_spot_it:
      liking_after_helping: |
        لاحظ متى تشعر بدفء أكبر تجاه شخص ما بعد أن قمت بمساعدته، حتى لو كنت تشعر سابقًا بالحياد أو السلبية.
      others_requesting_small_favors: |
        عندما يطلب شخص ما بشكل متكرر مساعدات صغيرة، فقد يكونون بشكل واعٍ أو غير واعٍ يستفيدون من هذا التأثير لبناء علاقة.
      attitude_shift_post_investment: |
        بعد استثمار الوقت أو الجهد في مساعدة شخص ما، راقب ما إذا كان رأيك فيه قد تغير بشكل إيجابي.
      reciprocal_relationship_dynamics: |
        قد تشعر العلاقات التي قام فيها شخص واحد بالعديد من المساعدات بالاختلال في المودة على الرغم من تبدو متوازنة في العمل.
    examples:
      networking: |
        طلب رأي زميل في مسودة، مما يؤدي إلى شعوره بمزيد من الاستثمار في نجاحك وتقديره لك بشكل أكبر.
      sales: |
        يطلب مندوب المبيعات من عميل محتمل تقديم مساعدة صغيرة (مثل إحالة أو تقديم)، مما يزيد من التزام العميل وإعجابه.
      conflict_resolution: |
        بعد خلاف، يمكن أن يؤدي طلب مساعدة الطرف الآخر في شيء غير ذي صلة إلى تخفيف التوترات وإعادة بناء حسن النية.
      mentoring: |
        عندما يطلب شخص رفيع المستوى من شخص مبتدئ إدخال بياناته أو مساعدته، غالبًا ما يشعر الشخص المبتدئ بمزيد من التقدير والارتباط.
    real_world_implications: |
      يؤثر تأثير بن فرانكلين على التوظيف والمبيعات والدبلوماسية والديناميكيات الاجتماعية اليومية. يمكن استخدامه بشكل أخلاقي لبناء جسور أو بشكل غير أخلاقي للتلاعب بالمودة. التعرف عليه يساعدك على فهم لماذا تبدو بعض العلاقات أقوى بعد تقديم مساعدات غير متناظرة.
    professional_application:
      networking_and_relationship_building: |
        عند بناء العلاقات، فكر في طلب مساعدات صغيرة ومعقولة بدلاً من مجرد تقديمها. فعل المساعدة يخلق استثمارًا وتقديرًا إيجابيًا.
      collaborative_learning_initiative: |
        في الفرق، يمكن لأعضاء الفريق مساعدة بعضهم البعض (مثل مراجعة الأقران، التدريب المتبادل) تعزيز التماسك. هيكل التعاون بحيث يعطي الجميع ويتلقى المساعدة.
    how_can_this_be_misapplied:
      manipulation: |
        يمكن أن يشعر طلب المساعدات عمدًا فقط لجعل شخص ما يحبك، دون حاجة حقيقية، بأنه استغلالي إذا تم اكتشافه.
      overreliance_on_favors: |
        افتراض أن المساعدات وحدها ستحل علاقة معطلة؛ تتطلب بعض النزاعات محادثة مباشرة ومساءلة.
      asymmetric_exploitation: |
        طلب المساعدات بشكل متكرر دون رد يمكن أن يأتي بنتائج عكسية ويولد الاستياء.
      misattributing_motives: |
        افتراض أن دفء شخص ما حقيقي تمامًا عندما قد يكون جزئيًا نتيجة للمساعدات التي قدمها لك.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: الرشد المحدود
    quick_introduction: |
      الرشد المحدود هو فكرة أن عملية اتخاذ القرار البشري محدودة بالمعلومات المتاحة، والقدرة المعرفية، والوقت. نحن لا نحسن؛ بل "نكتفي" - نختار الخيارات التي تكون جيدة بما فيه الكفاية بدلاً من الأفضل الممكن.
    one_liner: نحن نكتفي - نختار الجيد بما يكفي، وليس الأمثل.
    try_this:
      - قم بتبسيط الخيارات عندما يكون ذلك ممكنًا؛ فالعديد من الخيارات تطغى على الرشد المحدود.
      - حدد معايير "جيدة بما يكفي" مسبقًا لتجنب البحث اللانهائي.
      - لاحظ متى تحسن بعد النقطة التي تتناقص فيها العوائد.
    ask_yourself:
      - هل أحاول العثور على الخيار المثالي عندما يكون الجيد بما يكفي كافيًا؟
      - ما هي القيود (الوقت، المعلومات، الانتباه) التي تحد من قراري؟
    in_more_detail: |
      قدم هربرت سيمون المفهوم لتحدي الافتراض الاقتصادي الكلاسيكي للفاعلين العقلانيين ذوي المعلومات الكاملة. في الواقع، لدينا انتباه محدود، وذاكرة عاملة، ووقت. نحن نستخدم الاستدلالات والاختصارات لاتخاذ قرارات "عقلانية" نظرًا لقيودنا، حتى لو لم تكن مثالية بالمعنى المثالي.

      يشرح الرشد المحدود سبب عدم اختيارنا دائمًا لأفضل خيار، ولماذا نعتمد على قواعد عامة، ولماذا السياق والتأطير مهمان جدًا. إنه نموذج وصفي لكيفية اتخاذنا للقرارات فعليًا، وليس وصفة لكيف ينبغي علينا ذلك.
    why_this_is_important: |
      يساعدك فهم الرشد المحدود في تصميم عمليات أفضل، وتبسيط الخيارات للآخرين، وتحديد توقعات واقعية لجودة القرارات. كما أنه يشرح سبب كون السلوك "غير العقلاني" غالبًا ما يكون عقلانيًا في ظل القيود.
    when_to_use:
      - اتخاذ_القرارات
      - حل_المشكلات
      - القيادة
      - تقييم_المخاطر
    how_can_you_spot_it:
      satisficing_behavior: |
        يختار الناس أول خيار مقبول بدلاً من المقارنة بشكل شامل.
      heuristic_reliance: |
        يتم اتخاذ القرارات باستخدام قواعد عامة بدلاً من التحليل الكامل.
      context_dependence: |
        يتخذ نفس الشخص قرارات مختلفة اعتمادًا على كيفية تقديم الخيارات.
      information_overload: |
        عندما تكون المعلومات المتاحة كثيرة جدًا، يمكن أن تنخفض جودة القرار.
    examples:
      hiring: |
        يقوم المدير بتعيين المرشح الأول الذي يلبي المعايير بدلاً من إجراء مقابلات لا نهاية لها للعثور على المرشح "الأفضل".
      consumer_choice: |
        يختار المتسوقون من بين الخيارات القليلة الأولى على الرف بدلاً من مقارنة كل منتج في المتجر.
      policy: |
        يستخدم الناخبون الانتماء الحزبي أو عدد قليل من القضايا الرئيسية كاختصارات بدلاً من تحليل كل موقف سياسي.
      daily_routines: |
        يتبع الناس العادات والإعدادات الافتراضية بدلاً من إعادة تحسين كل قرار.
    real_world_implications: |
      يشكل الرشد المحدود الأسواق، وتصميم السياسات، والسلوك التنظيمي. تعمل الدفعات وهندسة الاختيار لأنها تأخذ في الاعتبار حدودنا. تجاهلها يؤدي إلى أنظمة معقدة للغاية لا يستطيع الناس استخدامها بفعالية.
    professional_application:
      networking_and_relationship_building: |
        لا تتوقع من الآخرين معالجة المفاضلات المعقدة في الوقت الفعلي. قم بتبسيط الخيارات وقدم إعدادات افتراضية واضحة.
      collaborative_learning_initiative: |
        صمم عمليات تعمل مع الرشد المحدود: قلل الخيارات، وقدم إعدادات افتراضية، واستخدم قوائم مرجعية للقرارات المعقدة.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        تصميم عمليات تفترض قدرة معرفية غير محدودة، مما يؤدي إلى إرهاق القرارات ونتائج سيئة.
      blaming_irrationality: |
        رفض خيارات الآخرين باعتبارها غير عقلانية دون مراعاة قيودهم.
      exploitation: |
        إغراق الناس بالتعقيد عن عمد لتوجيههم نحو النتائج المرجوة.
      perfectionism: |
        توقع قرارات مثالية عندما يكون الاكتفاء بالجيد بما يكفي هو النهج العقلاني غالبًا.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: تأثير المتفرج
    quick_introduction: |
      تأثير المتفرج هو ميل الأفراد إلى أن يكونوا أقل احتمالًا لتقديم المساعدة
      عند وجود أشخاص آخرين. كلما زاد عدد المتفرجين، قل احتمال أن يتصرف أي شخص
      واحد. تنتشر المسؤولية؛ نفترض أن شخصًا آخر سيساعد.
    one_liner: كلما زاد عدد الأشخاص الحاضرين، قل احتمال أن يتصرف أي شخص واحد.
    try_this:
      - في حالات الطوارئ، قم بتعيين المسؤولية مباشرة: أنت، اتصل بالرقم 911.
      - لا تفترض أن شخصًا آخر سيساعد - تصرف أو فوض صراحةً.
      - لاحظ عندما تنتظر الآخرين للتصرف أولاً.
    ask_yourself:
      - هل أنا أنشر المسؤولية لأن الآخرين حاضرون؟
      - هل سأتصرف بشكل مختلف لو كنت بمفردي؟
    in_more_detail: |
      بعد مقتل كيتي جينوفيز (على الرغم من أن القصة كانت مؤسطرة جزئيًا)،
      وجد الباحثون أن وجود الآخرين يقلل من المساعدة. ننظر إلى الآخرين للحصول على
      إشارات - إذا لم يتصرف أحد، فإننا نفسر ذلك على أنه "لا يلزم اتخاذ إجراء".
      كما نختبر انتشار المسؤولية: مع وجود العديد من الأشخاص،
      يشعر كل شخص بمسؤولية شخصية أقل. يمكن أن يحدث جهل جماعي:
      يعتقد الجميع أن هناك خطأ ما ولكن لا أحد يتصرف لأن لا أحد آخر
      يتصرف.

      التأثير أقوى عندما يكون الموقف غامضًا وعندما
      لا يعرف المتفرجون بعضهم البعض. يمكن التغلب عليه عن طريق
      تعيين المسؤولية المباشر ("أنت، اتصل بالرقم 911").
    why_this_is_important: |
      يساعدك فهم تأثير المتفرج على اتخاذ إجراء عندما لا يفعل الآخرون ذلك،
      وتصميم أنظمة تتغلب عليه. إذا كنت في ورطة، حدد شخصًا واحدًا.
      إذا كنت متفرجًا، فلا تنتظر الآخرين للتصرف.
    when_to_use:
      - القيادة
      - بناء_العلاقات
      - حل_النزاعات
      - اتخاذ_القرارات
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "شخص آخر سيفعل ذلك" عندما يكون الكثيرون حاضرين.
      pluralistic_ignorance: |
        يعتقد الجميع أن الإجراء مطلوب ولكن لا أحد يتصرف لأن لا
        أحد آخر يتصرف.
      social_proof_inaction: |
        يُفسر عدم اتخاذ الآخرين للإجراء على أنه "لا يلزم اتخاذ إجراء".
      audience_inhibition: |
        الخوف من الظهور بشكل سخيف أو المبالغة في رد الفعل يمنع اتخاذ الإجراء.
    examples:
      emergency: |
        شخص ينهار؛ مع وجود العديد من المتفرجين، يكون كل منهم أقل احتمالًا
        لطلب المساعدة.
      workplace: |
        الجميع يرى مشكلة ولكن لا أحد يثيرها - يفترض كل شخص
        أن شخصًا آخر سيفعل.
      harassment: |
        شهود التحرش لا يتدخلون، كل واحد يفكر
        أن الآخرين سيتصرفون.
      meetings: |
        فكرة سيئة تمر دون تحدٍ لأن الجميع يفترض
        أن شخصًا آخر سيتحدث.
    real_world_implications: |
      يمكن أن يكون لتأثير المتفرج عواقب وخيمة في حالات الطوارئ
      ويسمح للمشاكل بالاستمرار في المؤسسات. يتطلب التغلب عليه
      تعيين مسؤولية مباشر وقواعد تشجع على التدخل.
    professional_application:
      networking_and_relationship_building: |
        عندما تحتاج إلى مساعدة، اطلب من شخص معين. عندما ترى
        شيئًا خاطئًا، تصرف - لا تفترض أن الآخرين سيفعلون. قم بإنشاء قواعد
        حيث يُتوقع التحدث ومكافأته.
      collaborative_learning_initiative: |
        درب الأشخاص على التعرف على تأثير المتفرج والتدخل.
        استخدم "إذا رأيت شيئًا، قل شيئًا" وقم بتعيين أدوار صريحة.
        كافئ أولئك الذين يتحدثون أولاً.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        الحكم على الأفراد بقسوة عندما يكون التأثير قوة ظرفية قوية - ركز على تغيير الموقف.
      false_assumption: |
        افتراض أن شخصًا ما سيساعد دائمًا إذا كان هناك عدد كافٍ من الأشخاص
        حاضرين - غالبًا ما يكون العكس صحيحًا.
      overcorrection: |
        جعل الجميع مسؤولين بحيث لا يكون أحد مسؤولاً - يمكن أن يحدث
        الانتشار لا يزال يحدث.
      individualizing: |
        معاملة تأثير المتفرج كخلل في الشخصية بدلاً من
        ظاهرة ظرفية.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: دائرة الكفاءة
    quick_introduction: |
      دائرة الكفاءة هي نموذج عقلي يحثك على معرفة حدود خبرتك والبقاء ضمنها عند اتخاذ قرارات هامة. يؤكد وارن بافيت وتشارلي مانجر على معرفة ما لا تعرفه.
    one_liner: اعرف حدود خبرتك — وابقى ضمنها عندما يكون الأمر مهماً.
    try_this:
      - حدد المجالات التي لديك فيها خبرة حقيقية مقابل المجالات التي تخمن فيها.
      - عندما تكون خارج دائرتك، اطلب المشورة أو فوض المهمة.
      - كن صريحاً: هل سيوافق خبير حقيقي على حكمك هنا؟
    ask_yourself:
      - هل أنا داخل دائرة كفاءتي، أم أنني أخمن؟
      - متى كانت آخر مرة اعترفت فيها "لا أعرف" في هذا المجال؟
    in_more_detail: |
      يمتلك كل شخص مجالات يمتلك فيها خبرة حقيقية — حيث يمكنه تقييم المعلومات، واكتشاف الأخطاء، واتخاذ أحكام موثوقة. خارج تلك الدائرة، يكونون عرضة لنفس التحيزات والأخطاء مثل أي شخص آخر. المفتاح هو التقييم الذاتي الصادق: أين أنت كفء حقًا، وأين تخمن؟

      يمكن أن تتوسع الدائرة من خلال التعلم المتعمد، ولكنها تتطلب تواضعًا للتعرف على حدودها الحالية. التشغيل خارج دائرتك يزيد من خطر الأخطاء المكلفة، خاصة عندما تكون المخاطر عالية.
    why_this_is_important: |
      يقلل البقاء ضمن دائرة الكفاءة من الأخطاء المكلفة ويحسن جودة القرار. كما يساعدك على معرفة متى تطلب المشورة، أو تفوض المهمة، أو تمتنع. الثقة المفرطة خارج دائرتك هي مصدر رئيسي للفشل.
    when_to_use:
      - اتخاذ_القرارات
      - الاستثمار
      - التحركات_المهنية
      - تقييم_المخاطر
    how_can_you_spot_it:
      honest_boundary_assessment: |
        هل يمكنك شرح حدود معرفتك في مجال معين؟ هل تعرف ما لا تعرفه؟
      knowing_when_to_defer: |
        التعرف على المواقف التي يجب عليك فيها طلب مدخلات الخبراء بدلاً من اتخاذ القرار بمفردك.
      consistent_track_record: |
        ضمن دائرتك، تميل أحكامك إلى التحقق بمرور الوقت؛ خارجها، لا تفعل ذلك.
      calibration: |
        ثقتك في مجال ما تتناسب مع أدائك الفعلي في هذا المجال.
    examples:
      investing: |
        يتجنب بافيت أسهم التكنولوجيا لأنه يقول إنها خارج دائرة كفاءته — لا يمكنه تقييمها بشكل موثوق.
      career: |
        أخصائي يبقى في مجاله مقابل شخص يأخذ دورًا "متوسعًا" في مجال غير ذي صلة.
      hiring: |
        معرفة متى تعتمد على حكمك الخاص مقابل إشراك متخصصين في أدوار فنية.
      advice_giving: |
        رفض إبداء الرأي في مواضيع خارج نطاق خبرتك بدلاً من التخمين.
    real_world_implications: |
      تعتبر دائرة الكفاءة مركزية للاستثمار ذي القيمة والنجاح المهني. تجاهلها يؤدي إلى الثقة المفرطة، وفشل المشاريع، وتقديم نصائح سيئة. توسيع الدائرة يتطلب جهدًا متعمدًا وردود فعل صادقة.
    professional_application:
      networking_and_relationship_building: |
        بناء علاقات مع أشخاص تكمل دوائر كفاءتهم دائرتك. اعرف متى تقدم الآخرين بدلاً من الإجابة بنفسك.
      collaborative_learning_initiative: |
        إنشاء فرق بدوائر متداخلة ومتكاملة. شجع الأشخاص على الإشارة عندما يعملون خارج نطاق كفاءتهم.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        عدم المغامرة أبدًا خارج دائرتك يمكن أن يحد من النمو والتعلم.
      false_modesty: |
        ادعاء دائرة صغيرة لتجنب المساءلة أو القرارات الصعبة.
      gatekeeping: |
        استخدام "دائرة الكفاءة" لرفض الآخرين دون الانخراط في حججهم.
      stagnation: |
        التعامل مع الدائرة على أنها ثابتة بدلاً من شيء يمكن أن يتوسع بالجهد.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: التنافر المعرفي
    quick_introduction: |
      التنافر المعرفي هو الانزعاج الذهني الذي نشعر به عند حمل معتقدات متعارضة،
      أو عندما تتعارض أفعالنا مع معتقداتنا. نحن مدفوعون لتقليل هذا الانزعاج—غالباً
      عن طريق تغيير معتقداتنا لتتوافق مع أفعالنا بدلاً من تغيير أفعالنا.
    one_liner: نغير معتقداتنا لتتوافق مع أفعالنا بشكل متكرر أكثر من العكس.
    try_this:
      - لاحظ متى تقوم بالتبرير لتقليل الانزعاج بدلاً من تغيير السلوك.
      - اسأل: هل أقوم بتعديل معتقداتي لتبرير ما فعلته؟
      - فكر فيما إذا كان تغيير الفعل سيكون أكثر صدقاً من تغيير الاعتقاد.
    ask_yourself:
      - هل أقوم بتقليل التنافر عن طريق التبرير، أم عن طريق التغيير الفعلي؟
      - هل سأحتفظ بهذا الاعتقاد لو لم أكن قد تصرفت بهذه الطريقة بالفعل؟
    in_more_detail: |
      تشرح نظرية ليون فيستينجر أننا نسعى للاتساق. عندما نتصرف ضد قيمنا (مثل الكذب،
      إهدار المال)، فإننا نختبر التنافر. لتقليل ذلك، قد نغير اعتقادنا ("لم يكن الأمر
      كذبة حقاً") أو نقلل من أهمية الفعل ("لم يكن سيئاً جداً"). غالباً ما نبرر بدلاً
      من أن نصلح.

      يدفع التنافر المعرفي إلى تأثير بن فرانكلين (نحن نحب الأشخاص الذين ساعدناهم)،
      ويفسر لماذا نبرر القرارات السابقة، ويكمن وراء العديد من خداع الذات. إنها قوة
      قوية في تكوين المعتقدات وتغييرها.
    why_this_is_important: |
      يساعد فهم التنافر المعرفي على التعرف على تبريراتك الخاصة وفهم لماذا يقاوم
      الناس تغيير آرائهم. كما يفسر لماذا الالتزام والاتساق مبادئ إقناع قوية.
    when_to_use:
      - صنع_القرار
      - بناء_العلاقات
      - القيادة
      - حل_النزاعات
    how_can_you_spot_it:
      post_decision_rationalization: |
        بعد الاختيار، نؤكد على إيجابيات اختيارنا وسلبيات الخيارات المرفوضة.
      belief_action_alignment: |
        نقوم بتعديل المعتقدات لتتوافق مع الأفعال التي اتخذناها بالفعل.
      discomfort_with_inconsistency: |
        ضيق عندما نلاحظ أن سلوكنا لا يتوافق مع قيمنا المعلنة.
      resistance_to_disconfirming_evidence: |
        تجاهل أو تقليل المعلومات التي تتعارض مع التزاماتنا.
    examples:
      purchase_justification: |
        بعد شراء سلعة باهظة الثمن، نؤكد على فوائدها ونقلل من أهمية التكلفة.
      relationship: |
        نبرر البقاء في علاقة سيئة بالتركيز على الجيد وتقليل السيئ.
      career: |
        نبرر البقاء في وظيفة لا نحبها بالتأكيد على الأسباب التي "تجعلنا" نبقى.
      beliefs: |
        عندما تتعارض أفعالنا مع قيمنا، نغير قيمنا ("أنا لست نباتياً حقاً - أنا فقط
        آكل اللحوم أحياناً") بدلاً من أفعالنا.
    real_world_implications: |
      يشكل التنافر المعرفي تكوين المعتقدات، وسلوك المستهلك، والمواقف السياسية.
      ويفسر لماذا يضاعف الناس بعد القرارات السيئة ولماذا يمكن أن يغير تغيير السلوك
      المعتقدات.
    professional_application:
      networking_and_relationship_building: |
        يمكن أن تؤدي الالتزامات الصغيرة إلى التزامات أكبر—يبرر الناس أفعالهم السابقة.
        استخدم هذا بشكل أخلاقي: ابدأ بطلبات صغيرة. كن على دراية عندما تبرر سلوكك الخاص.
      collaborative_learning_initiative: |
        عند إدخال التغيير، احصل على موافقة مبكرة والتزامات صغيرة—فهي تخلق تنافراً
        يحفز التبني الأكبر. تجنب فرض الالتزامات العامة التي تخلق الاستياء.
    how_can_this_be_misapplied:
      manipulation: |
        إنشاء تنافر متعمد للضغط على الناس للامتثال.
      dismissing_genuine_change: |
        افتراض أن كل تغيير في المعتقدات هو تبرير عندما يقوم الناس أحياناً
        بتحديثات حقيقية.
      forced_consistency: |
        الضغط على الناس ليكونوا "متسقين" عندما تكون آراؤهم قد تطورت بشكل مشروع.
      self_deception: |
        استخدام نظرية التنافر لتبرير تجنب الحقائق غير المريحة عن أنفسنا.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: التحيز التأكيدي
    quick_introduction: |
      التحيز التأكيدي هو الميل إلى البحث عن المعلومات وتفسيرها وتذكرها بطرق تؤكد معتقداتنا الحالية. نحن نعطي وزناً أكبر للأدلة الداعمة ونتجاهل أو نرفض الأدلة التي تتعارض مع وجهات نظرنا. نطرح أسئلة تؤكد فرضياتنا بدلاً من اختبارها.
    one_liner: نبحث ونتذكر ما يؤكد معتقداتنا؛ نتجاهل ما يتعارض معها.
    try_this:
      - اسأل: ما الذي سيثبت خطئي؟ ابحث بنشاط عن الأدلة التي تفند رأيي.
      - لاحظ متى تعطي وزناً أكبر للمعلومات الداعمة مقارنة بالمعلومات المتعارضة.
      - فكر في وجهة النظر المعارضة بنفس جدية وجهة نظرك.
    ask_yourself:
      - هل أنا أختبر فرضيتي أم مجرد أؤكدها؟
      - متى كانت آخر مرة غيرت فيها رأيي بناءً على أدلة جديدة؟
    in_more_detail: |
      نحن لسنا معالجات محايدة للمعلومات. نبحث عن التأكيد، ونفسر الغموض على أنه دعم، ونتذكر النجاحات أكثر من الإخفاقات. نحيط أنفسنا بأشخاص ووسائل إعلام متوافقة معنا. نطرح سؤال "لماذا أنا على حق؟" بدلاً من "ما الذي سيثبت خطئي؟" هذا يجعلنا واثقين أكثر من اللازم وبطيئين في التحديث.

      التحيز التأكيدي هو أحد أكثر التحيزات انتشاراً وتوثيقاً.
      يؤثر على العلوم والسياسة والعلاقات والأعمال. يتطلب التغلب عليه
      جهداً واعياً وعمليات منظمة.
    why_this_is_important: |
      التعرف على التحيز التأكيدي ضروري لاتخاذ قرارات جيدة والتعلم.
      يساعدك على البحث عن أدلة تفند رأيك، والنظر في فرضيات بديلة،
      وتحديث معتقداتك عند الضرورة. إنه أساس
      التفكير العلمي.
    when_to_use:
      - اتخاذ_القرار
      - التعلم
      - حل_المشكلات
      - تقييم_المخاطر
    how_can_you_spot_it:
      seeking_support: |
        البحث عن أدلة تؤكد وجهة نظرك بدلاً من اختبارها.
      asymmetric_interpretation: |
        تفسير الأدلة الغامضة على أنها دعم لوجهة نظرك.
      discounting_disconfirming: |
        تجاهل أو التقليل من شأن الأدلة التي تتعارض مع معتقداتك.
      selective_exposure: |
        استهلاك المعلومات فقط من مصادر تتفق معك.
    examples:
      hiring: |
        تكوين انطباع إيجابي مبكر ثم طرح أسئلة تؤكد أن المرشح رائع.
      investing: |
        بعد شراء سهم، البحث عن أخبار إيجابية وتجاهل التحليل السلبي.
      relationships: |
        تفسير تصرفات الشريك من خلال عدسة تؤكد وجهة نظرك حوله (جيدة أو سيئة).
      politics: |
        قبول المعلومات من جانبك دون نقد ورفض
        المعلومات المماثلة من الجانب الآخر.
    real_world_implications: |
      يؤدي التحيز التأكيدي إلى إدامة المعتقدات الخاطئة، وتغذية الاستقطاب،
      ويسبب أخطاء مكلفة. إنه عدو العلم الجيد و
      اتخاذ القرارات الجيدة. يتطلب التغلب عليه
      بحثاً واعياً عن ما يفند الرأي.
    professional_application:
      networking_and_relationship_building: |
        عند تكوين آراء حول الأشخاص، ابحث بنشاط عن أدلة تفند رأيك.
        اسأل "ما الذي سيغير رأيي؟" وابحث عنه.
      collaborative_learning_initiative: |
        استخدم دور المحامي الشيطان، وفرق التهديد، وما قبل الوفاة (pre-mortems)
        لسبر آراء تفند الرأي السائد. كافئ الأشخاص الذين يتحدون
        الآراء السائدة بأدلة جيدة.
    how_can_this_be_misapplied:
      false_balance: |
        معاملة جميع وجهات النظر على أنها متساوية في الصلاحية عندما تدعم الأدلة بقوة
        جانباً واحداً.
      excessive_skepticism: |
        تجاهل جميع الأدلة باعتبارها "تحيزاً تأكيدياً" عندما تكون بعض المعتقدات
        مدعومة جيداً.
      contrarianism: |
        اعتناق وجهة النظر المعارضة فقط لتجنب التحيز التأكيدي - عندما
        قد يكون الرأي الأصلي صحيحاً.
      analysis_paralysis: |
        عدم الالتزام برأي أبداً بسبب "قد نكون متحيزين".
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: لعنة المعرفة
    quick_introduction: |
      لعنة المعرفة هي صعوبة تخيل كيف يكون الأمر ألا تعرف شيئاً بمجرد أن تعرفه.
      يجد الخبراء صعوبة في تعليم المبتدئين لأنهم لا يستطيعون إعادة إنشاء منظور المبتدئ.
      بمجرد أن تعرف، تنسى كيف كان الأمر ألا تعرف.
    one_liner: بمجرد أن تعرف شيئاً، تنسى كيف كان الأمر ألا تعرفه.
    try_this:
      - عند الشرح، ابدأ من المبادئ الأولية - افترض أن جمهورك لا يعرف شيئاً.
      - اطلب من مبتدئ أن يشرح لك؛ ارتباكه يكشف نقاط ضعفك.
      - لاحظ متى تتخطى خطوات أو تستخدم مصطلحات قد لا يعرفها الآخرون.
    ask_yourself:
      - هل أفترض أن الآخرين لديهم نفس السياق الذي لدي؟
      - هل سيفهم شخص ليس لديه خلفيتي هذا؟
    in_more_detail: |
      في تجربة كلاسيكية، قام الأشخاص الذين عرفوا حل لغز بنقر إيقاع أغنية
      وتوقعوا من الآخرين تخمينها - لقد بالغوا في تقدير مدى وضوحها.
      لم يستطع الناقرون "إلغاء سماع" الأغنية في رؤوسهم.
      المعرفة "لزجة"؛ من الصعب محاكاة الجهل.

      تؤثر اللعنة على التدريس، والتواصل، وتصميم المنتجات، والقيادة.
      نفترض أن الآخرين لديهم نفس السياق الذي لدينا.
      نستخدم المصطلحات. نتخطى الخطوات. نتفاجأ عندما لا "يفهم" الناس.
    why_this_is_important: |
      الاعتراف بلعنة المعرفة يحسن التدريس والتواصل وتصميم المنتجات.
      يساعدك على مقابلة الناس حيث هم بدلاً من حيث أنت.
      إنه ضروري لنقل المعرفة بفعالية.
    when_to_use:
      - التعلم
      - القيادة
      - حل_المشكلات
      - بناء_العلاقات
    how_can_you_spot_it:
      obvious_to_you: |
        "من الواضح" عندما يكون الأمر واضحاً فقط لأنك تعرف الإجابة.
      jargon_use: |
        استخدام مصطلحات لا يعرفها الجمهور دون تعريفها.
      skipped_steps: |
        افتراض أن الآخرين سيكملون ما تركته.
      frustration_with_learners: |
        "كيف لا يمكنهم رؤية ذلك؟" عندما يفتقرون إلى سياقك.
    examples:
      teaching: |
        أستاذ رياضيات يتخطى خطوات "واضحة" بالنسبة له ولكنها ضرورية للطلاب.
      product_design: |
        يقوم المصممون بإنشاء واجهات منطقية لهم ولكنها تربك المستخدمين الجدد.
      onboarding: |
        ينسى الموظفون ذوو الخبرة ما لا يعرفه الموظفون الجدد ويقدمون تدريباً غير كافٍ.
      writing: |
        يفترض المؤلفون أن القراء لديهم نفس الخلفية ويفوتون السياق الضروري.
    real_world_implications: |
      تخلق لعنة المعرفة فجوات في التواصل، وفشل المنتجات، والتدريس غير الفعال.
      إنها أحد الأسباب التي تجعل الخبراء معلمين سيئين.
      التغلب عليها يتطلب جهداً متعمداً لتبني منظور الجمهور.
    professional_application:
      networking_and_relationship_building: |
        عند الشرح، ابدأ من مستوى الشخص الآخر. اسأل "ماذا يعرفون بالفعل؟"
        اختبر تواصلك مع شخص ليس لديه خلفيتك.
      collaborative_learning_initiative: |
        استخدم تمارين "اشرح لي كأنني خمس سنوات".
        اطلب من الخبراء تعليم المبتدئين والحصول على ملاحظات.
        أنشئ وثائق تفترض عدم وجود معرفة سابقة.
        استخدم التدريس من الأقران - الأشخاص الذين تعلموا مؤخرًا يتذكرون منظور المبتدئ.
    how_can_this_be_misapplied:
      oversimplification: |
        التبسيط المفرط لدرجة عدم الدقة أو الاستعلاء.
      false_assumption: |
        افتراض أن الآخرين يعرفون أقل مما يعرفون - فشل في المعايرة أيضاً.
      one_size_fits_all: |
        لا تحتاج جميع الجماهير إلى نفس المستوى من الشرح؛ قم بالتخصيص للجمهور.
      avoiding_complexity: |
        بعض المواضيع معقدة؛ لعنة المعرفة لا تعني أنه لا يجب علينا استخدام لغة تقنية عند الاقتضاء.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: تأثير الخيار الافتراضي
    quick_introduction: |
      تأثير الخيار الافتراضي هو الميل إلى اختيار الخيار المحدد مسبقًا عند
      تقديم خيارات. أي شيء يتم تعيينه كخيار افتراضي يحظى بميزة قوية -
      غالبًا ما يلتزم به الناس بغض النظر عما إذا كان هو الأمثل لهم.
    one_liner: أي شيء يتم تعيينه كخيار افتراضي يحظى بميزة قوية - نلتزم به.
    try_this:
      - لاحظ متى تقبل الخيار الافتراضي دون تقييم البدائل.
      - عند تصميم الخيارات، قم بتعيين خيارات افتراضية تخدم أفضل مصالح المستخدمين.
      - اسأل: هل سأختار هذا لو لم يكن محددًا مسبقًا؟
    ask_yourself:
      - هل أختار الخيار الافتراضي بسبب القصور الذاتي، أم لأنه الأفضل بالنسبة لي؟
      - من وضع هذا الخيار الافتراضي، وما الذي قد يكسبه منه؟
    in_more_detail: |
      تعمل الخيارات الافتراضية بسبب القصور الذاتي، وتجنب الخسارة (التغيير يبدو كخسارة
      للخيار الافتراضي)، والموافقة الضمنية (نفترض أن الخيار الافتراضي موصى به).
      تختلف معدلات التبرع بالأعضاء بشكل كبير حسب البلد بناءً على ما إذا كان
      الخيار الافتراضي هو التسجيل الطوعي أو الإلغائي. ترتفع مشاركة مدخرات التقاعد
      عندما يكون التسجيل تلقائيًا.

      يمكن استخدام الخيارات الافتراضية للخير (التوجيه نحو نتائج أفضل) أو
      للتلاعب (إخفاء شروط غير مواتية في مربعات محددة مسبقًا). فهم
      التأثير يساعدك على تصميم أنظمة أفضل ومقاومة الخيارات الافتراضية غير المرغوب فيها.
    why_this_is_important: |
      يساعدك فهم تأثير الخيار الافتراضي على تصميم بنية اختيار تحسن النتائج،
      ويساعدك على التعرف على متى يتم تشكيل خياراتك بواسطة الخيارات الافتراضية بدلاً من
      التفضيل المتعمد.
    when_to_use:
      - اتخاذ_القرارات
      - القيادة
      - حل_المشكلات
      - تقييم_المخاطر
    how_can_you_spot_it:
      inertia_toward_default: |
        يميل معظم الناس إلى الالتزام بأي شيء محدد مسبقًا.
      implied_recommendation: |
        نفسر الخيار الافتراضي على أنه "ما يريدون منا اختياره".
      opt_in_vs_opt_out: |
        يغير التأطير المشاركة بشكل كبير (التسجيل الطوعي مقابل الإلغائي).
      pre_checked_boxes: |
        تحظى الخيارات المحددة مسبقًا بميزة قوية في النماذج والإعدادات.
    examples:
      organ_donation: |
        تمتلك الدول التي تتبع نظام الإلغاء معدلات تبرع أعلى بكثير من الدول التي تتبع
        نظام التسجيل الطوعي - الخيار الافتراضي أهم من المواقف.
      retirement_savings: |
        يزيد التسجيل التلقائي بشكل كبير من المشاركة في خطط 401 (k).
      software_installers: |
        تشكل خيارات "موصى بها" والإضافات المحددة مسبقًا ما يقوم المستخدمون بتثبيته.
      subscriptions: |
        النسخ التجريبية المجانية التي تتحول افتراضيًا إلى اشتراك مدفوع تلتقط الكثيرين
        ممن لن يختاروا الاشتراك بنشاط.
    real_world_implications: |
      تأثير الخيار الافتراضي هو أحد أقوى الدفعات. إنه يشكل سلوكيات الادخار والصحة والخصوصية
      وسلوك المستهلك. تستخدم بنية الاختيار الأخلاقية الخيارات الافتراضية لتحسين النتائج؛
      تستخدمها الأنماط المظلمة لاستغلالها.
    professional_application:
      networking_and_relationship_building: |
        عند تصميم العمليات للآخرين، اختر خيارات افتراضية تخدم مصالحهم.
        تجنب الأنماط المظلمة التي تستخدم الخيارات الافتراضية لاستخراج القيمة.
      collaborative_learning_initiative: |
        ضع خيارات افتراضية للممارسات الجماعية (مثل: الافتراضي للتواصل غير المتزامن،
        الافتراضي للتوثيق) التي تتماشى مع السلوك المرغوب. اجعل الاختيار الصحيح هو الاختيار السهل.
    how_can_this_be_misapplied:
      dark_patterns: |
        استخدام الخيارات الافتراضية لخداع الناس في خيارات غير مواتية (مثل: الرسوم المخفية،
        الاشتراكات غير المرغوب فيها).
      paternalism: |
        فرض خيارات افتراضية تتجاوز التفضيل الحقيقي دون موافقة.
      manipulation: |
        إخفاء شروط غير مواتية في الخيارات الافتراضية والاعتماد على القصور الذاتي.
      one_size_fits_all: |
        افتراض أن الخيار الافتراضي نفسه مناسب للجميع عندما تختلف التفضيلات.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: تأثير دانينغ-كروجر
    quick_introduction: |
      يصف تأثير دانينغ-كروجر تحيزًا معرفيًا حيث يبالغ الأشخاص ذوو المعرفة أو المهارة المحدودة في مجال ما في تقدير كفاءتهم، بينما يميل الخبراء إلى التقليل من تقديرهم. كلما عرفت أقل، كلما كنت أكثر ثقة.
    one_liner: كلما عرفت أقل، كلما كنت أكثر ثقة.
    try_this:
      - في المجالات الجديدة، افترض أنك مفرط الثقة - اطلب التغذية الراجعة والمعايرة.
      - عندما يعبر الخبراء عن شكوكهم، خذها على محمل الجد؛ قد يعرفون الحالات الاستثنائية.
      - لاحظ عندما يكون المبتدئون أكثر يقينًا من الخبراء في مجال ما.
    ask_yourself:
      - هل أنا في "قمة الغباء" أم في "وادي التواضع"؟
      - هل لدي القدرة على الوعي بما وراء المعرفة لتقييم كفاءتي الخاصة هنا؟
    in_more_detail: |
      أظهرت أبحاث دانينغ وكروجر أن الأفراد غير الأكفاء يفتقرون إلى القدرة على الوعي بما وراء المعرفة للتعرف على عدم كفاءتهم. لتقييم أدائك، تحتاج إلى نفس المهارات المطلوبة للأداء بشكل جيد - لذلك يكون غير المهرة في وضع مزدوج غير مؤاتٍ: فهم يؤدون بشكل سيء ولا يعرفون ذلك.

      مع زيادة الكفاءة، غالبًا ما يمر الأشخاص بـ "وادي التواضع" حيث يدركون كم لا يعرفون. قد يقلل الخبراء الحقيقيون من ثقتهم لأنهم يدركون تمامًا الفروق الدقيقة والحالات الاستثنائية.
    why_this_is_important: |
      يساعدك التعرف على تأثير دانينغ-كروجر على معايرة ثقتك بنفسك، وتجنب المبالغة في تقدير آراء المبتدئين، وتقدير تواضع الخبراء. إنه ضروري للتعلم والتوظيف واتخاذ القرارات.
    when_to_use:
      - التعلم
      - اتخاذ_القرارات
      - القيادة
      - التحركات_المهنية
    how_can_you_spot_it:
      novice_overconfidence: |
        يعبر شخص يتمتع بخبرة قليلة عن آراء قوية وغير مؤهلة.
      expert_underconfidence: |
        يتحفظ الأشخاص ذوو المهارات العالية ويعبرون عن عدم اليقين أكثر من الأشخاص الأقل مهارة.
      inability_to_recognize_quality: |
        لا يستطيع الأداء الضعيف التمييز بين العمل الجيد والسيئ في مجالهم.
      confidence_competence_mismatch: |
        الثقة والقدرة الفعلية مترابطتان عكسياً بين المبتدئين.
    examples:
      social_media: |
        يجادل الأشخاص ذوو المعرفة السطحية بموضوع ما بثقة مع خبراء المجال.
      hiring: |
        يقوم المرشحون الذين يؤدون بشكل سيء في المقابلات بتقييم أدائهم الخاص بشكل كبير أحيانًا.
      investing: |
        قد يكون المستثمرون الجدد مفرطي الثقة بعد الانتصارات المبكرة، دون الاعتراف بالحظ.
      workplace: |
        قد يبالغ الموظفون المبتدئون في تقدير استعدادهم للترقية بينما يشكك كبار الموظفين في أنفسهم.
    real_world_implications: |
      يؤثر تأثير دانينغ-كروجر على التعليم والتوظيف والسياسة والخطاب العام. إنه يفسر سبب تضخيم الأفكار السيئة ولماذا يمكن رفض الخبراء. المعايرة مهمة لاتخاذ القرارات الفردية والجماعية.
    professional_application:
      networking_and_relationship_building: |
        عندما يكون شخص ما واثقًا جدًا، فكر فيما إذا كان قد يكون في منطقة دانينغ-كروجر. اطلب وجهات نظر متنوعة، بما في ذلك من أولئك الذين يعبرون عن عدم اليقين.
      collaborative_learning_initiative: |
        أنشئ ثقافات يُقدر فيها الاعتراف بعدم اليقين. شجع تمارين المعايرة والتغذية الراجعة التي تساعد الأشخاص على تقييم كفاءتهم بدقة.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        افتراض أن الأشخاص الواثقين خاطئون دائمًا؛ في بعض الأحيان تكون الثقة مبررة.
      false_modesty: |
        الخبراء الذين يتظاهرون بمعرفة أقل مما يعرفون ليبدو متواضعين.
      gatekeeping: |
        استخدام دانينغ-كروجر لتجاهل أي شخص يختلف مع "الخبراء" دون الانخراط في حججهم.
      self_doubt_paralysis: |
        المبالغة في التصحيح لدرجة عدم الثقة في حكمك الخاص أبدًا.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: فجوة التعاطف
    quick_introduction: |
      فجوة التعاطف هي صعوبة فهم وتوقع الحالات الذهنية للآخرين عندما نكون في حالة مختلفة بأنفسنا. عندما نكون هادئين، نقلل من تقدير شعورنا عندما نكون غاضبين أو جائعين. عندما نكون شبعانين، نقلل من تقدير كم سنرغب في الطعام عندما نكون جائعين.
    one_liner: نحن نقلل من تقدير شعورنا - وشعور الآخرين - في حالات مختلفة.
    try_this:
      - عندما تكون هادئًا، قم بقطع التزامات لوقت التوتر؛ قم بالالتزام المسبق.
      - لا تحكم على الآخرين في حالة لست فيها - جائع، متعب، خائف.
      - اسأل: هل أنا أسقط حالتي الحالية على نفسي المستقبلية أو الآخرين؟
    ask_yourself:
      - هل أقلل من تقدير شعوري في حالة مختلفة؟
      - هل سأفهم هذا الشخص بشكل أفضل لو كنت في حالته؟
    in_more_detail: |
      نواجه صعوبة في تخيل كيف سنشعر في ظروف مختلفة - وكيف يشعر الآخرون عندما يكونون في حالات لسنا فيها حاليًا. الشخص الواعي يقلل من تقدير قوة الإدمان. الشخص الذي حصل على قسط كافٍ من الراحة يقلل من تقدير تأثير الحرمان من النوم. نحن نسقط حالتنا الحالية على الآخرين وعلى أنفسنا المستقبلية.

      تؤثر فجوة التعاطف على القرارات التي نتخذها لأنفسنا المستقبلية (على سبيل المثال، الالتزام بممارسة الرياضة عندما نكون متحفزين)، والقرارات التي نتخذها للآخرين، وقدرتنا على فهم الأشخاص في حالات مختلفة.
    why_this_is_important: |
      الاعتراف بفجوة التعاطف يحسن اتخاذ القرار للمستقبل، والتعاطف مع الآخرين، وفهم تقلباتنا الخاصة. يفسر سبب قيامنا بالتزامات لا يمكننا الوفاء بها ولماذا نسيء فهم الآخرين في محنة.
    when_to_use:
      - صنع_القرار
      - بناء_العلاقات
      - القيادة
      - حل_النزاعات
    how_can_you_spot_it:
      current_state_projection: |
        افتراض أن الآخرين يشعرون بما نشعر به الآن، أو أننا في المستقبل سنشعر بما نشعر به الآن.
      underestimating_emotional_state: |
        "ما الأمر الكبير؟" عندما لا نكون في الحالة التي هم فيها.
      commitment_failures: |
        اتخاذ خيارات بناءً على الدافع الحالي لن نلتزم بها عندما يخفت الدافع.
      misunderstanding_others: |
        تجاهل تجارب الآخرين لأننا لا نستطيع تخيلها من حالتنا الحالية.
    examples:
      hunger: |
        التسوق لشراء البقالة عندما تكون شبعانًا - نشتري أقل مما سنرغب فيه عندما نكون جائعين.
      addiction: |
        غير المدمنين يقللون من تقدير صعوبة الإقلاع؛ قد يقلل المدمنون في مرحلة التعافي من تقدير الرغبة الشديدة عندما يتعاطون.
      conflict: |
        عندما نكون هادئين، نقلل من تقدير كيفية رد فعلنا في لحظة المواجهة.
      motivation: |
        التسجيل في فصل الساعة 6 صباحًا عندما نكون متحفزين - وعدم الذهاب عندما نكون نعسانين.
    real_world_implications: |
      تؤثر فجوة التعاطف على علاج الإدمان والسياسات والفهم بين الأشخاص. تفسر سبب قيامنا بالتزامات نكسرها ولماذا نفشل غالبًا في فهم وجهات نظر الآخرين. إنها حاجز أمام التعاطف واتخاذ قرارات جيدة.
    professional_application:
      networking_and_relationship_building: |
        عندما يكون شخص ما متوترًا أو غاضبًا أو في حالة مختلفة، لا تفترض أنه سيفكر كما تفعل. حاول تخيل حالته. عند تقديم التزامات، فكر في شعورك عندما يخفت الدافع.
      collaborative_learning_initiative: |
        عند التخطيط، فكر في شعور الفريق عندما يكون متعبًا أو تحت الضغط أو محبطًا. صمم لهذه الحالات، وليس فقط لحالة التخطيط المتحفز.
    how_can_this_be_misapplied:
      overattribution: |
        تجاهل كل سوء فهم على أنه "فجوة تعاطف" عندما يكون لدى الناس أحيانًا قيم مختلفة حقًا.
      excusing_behavior: |
        "لم يكن بإمكانهم المساعدة - فجوة تعاطف" عندما يكون الناس مسؤولين عن إدارة حالاتهم.
      false_relativism: |
        افتراض أننا لا نستطيع أبدًا فهم الآخرين عندما يمكننا التحسن بالجهد والخبرة.
      self_excuse: |
        استخدام فجوة التعاطف لتبرير فشلنا في المتابعة.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: تأثير الملكية
    quick_introduction: |
      تأثير الملكية هو الميل إلى تقدير الشيء بشكل أكبر لمجرد امتلاكه. نطالب بالمزيد للتخلي عن شيء ما مما كنا سندفعه لاكتسابه. الملكية تخلق ارتباطًا يشوه تقييمنا.
    one_liner: نحن نقدر ما نملكه أكثر مما لا نملكه - فالملكية تخلق الارتباط.
    try_this:
      - Ask: كم سأدفع لاكتساب هذا لو لم أكن أملكه؟
      - When selling, imagine you're buying—would you pay your asking price?
      - لاحظ متى تؤدي الملكية إلى تضخيم تقييمك.
    ask_yourself:
      - هل أبالغ في تقييم هذا لأنني أملكه؟
      - هل سيوافق المشتري المحايد على سعري؟
    in_more_detail: |
      في التجارب، يطالب الأشخاص الذين مُنحوا كوبًا عشوائيًا بنحو ضعف المبلغ لبيعه مقارنة بما يرغب الآخرون في دفعه لشرائه. مجرد حقيقة الملكية تزيد من القيمة المتصورة. هذا مرتبط بتجنب الخسارة - فالتخلي عن شيء ما يبدو خسارة، ونحن نتجنب الخسارة. لكن التأثير يتجاوز ذلك: فنحن ندمج الأشياء المملوكة في هويتنا.

      يؤثر تأثير الملكية على المفاوضات وسلوك المستهلك والتغيير التنظيمي. ويفسر لماذا يبالغ الناس في تقدير منازلهم وأفكارهم وأدوارهم الحالية. إنه يخلق احتكاكًا في الصفقات والانتقالات.
    why_this_is_important: |
      التعرف على تأثير الملكية يساعدك على التفاوض بفعالية أكبر، واتخاذ قرارات أوضح بشأن ما يجب الاحتفاظ به أو التخلي عنه، وفهم سبب مبالغة الآخرين في تقدير ما لديهم. كما أنه يفسر المقاومة للتغيير.
    when_to_use:
      - اتخاذ_القرارات
      - التفاوض
      - الاستثمار
      - التنقلات_الوظيفية
    how_can_you_spot_it:
      ownership_premium: |
        "لن أبيعه بهذا السعر" بينما لن تدفع هذا المبلغ لشرائه.
      attachment_to_possession: |
        تقدير الأشياء بشكل أكبر بمجرد امتلاكها.
      resistance_to_trading: |
        التردد في المقايضة أو التبادل حتى عندما يكون ذلك منطقيًا.
      overvaluation_of_own_ideas: |
        تبدو أفكارنا ومشاريعنا وأدوارنا أكثر قيمة لأنها ملك لنا.
    examples:
      real_estate: |
        غالبًا ما يبالغ أصحاب المنازل في تسعير منازلهم - فهم يقدرونها أكثر
        مما يقدرها السوق.
      negotiations: |
        يطالب البائعون بأكثر مما سيدفعه المشترون؛ الفجوة تعكس
        تأثير الملكية.
      career: |
        المبالغة في تقدير وظيفتنا الحالية أو شركتنا أو دورنا عند التفكير
        في التغيير.
      ideas: |
        تحيز "لم يُخترع هنا" و "فكرتي" - نحن نبالغ في تقدير ما أنشأناه أو امتلكناه.
    real_world_implications: |
      يخلق تأثير الملكية احتكاكًا في السوق، ويبطئ التبادلات المفيدة، ويغذي المقاومة للتغيير. يؤثر على عمليات الاندماج وإعادة التنظيم والانتقالات الشخصية. فهمه
      يحسن التفاوض وإدارة التغيير.
    professional_application:
      networking_and_relationship_building: |
        عندما يقاوم شخص ما التغيير، ضع في اعتبارك أنه قد يواجه
        تأثير الملكية - فهو يقدر الوضع الراهن أكثر لأنه "يملكه". قم بتأطير التغيير من حيث ما يكسبه، وليس فقط ما يتخلى عنه.
      collaborative_learning_initiative: |
        عند تقديم عمليات جديدة، اعترف بأن الناس مرتبطون
        بالطرق الحالية. قم بإنشاء أمان نفسي لـ "التخلي" عن
        القديم قبل تبني الجديد.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        بعض الارتباط منطقي - القيمة العاطفية، تكاليف التبديل.
        ليست كل مقاومة هي تأثير ملكية.
      manipulation: |
        خلق شعور زائف بالملكية لاستخلاص أسعار أعلى (مثل،
        "جربها مجانًا" لتفعيل تأثير الملكية).
      undervaluing_continuity: |
        افتراض أن كل مقاومة للتغيير غير منطقية عندما يكون للاستمرارية
        قيمة حقيقية.
      cold_rationality: |
        رفض الارتباط العاطفي على أنه "مجرد تأثير ملكية" عندما
        يعكس قيمًا حقيقية.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: تأثير الإجماع الكاذب
    quick_introduction: |
      تأثير الإجماع الكاذب هو الميل إلى المبالغة في تقدير مدى موافقة الآخرين على معتقداتنا ومواقفنا وسلوكياتنا. نفترض أن وجهات نظرنا أكثر شيوعًا مما هي عليه، ونواجه صعوبة في تخيل أن الأشخاص المعقولين قد يختلفون.
    one_liner: نبالغ في تقدير مدى موافقة الآخرين معنا.
    try_this:
      - ابحث بنشاط عن الأشخاص المختلفين – لا تفترض وجود إجماع.
      - قبل الانطلاق، اختبر مع أشخاص لا يشاركونك افتراضاتك.
      - اسأل: ماذا سيقول شخص يختلف؟ خذ الأمر على محمل الجد.
    ask_yourself:
      - هل أفترض أن الآخرين يفكرون مثلي؟
      - متى كانت آخر مرة فاجأني فيها رأي شخص مختلف؟
    in_more_detail: |
      عندما نتبنى موقفًا، نميل إلى التفكير في أنه المعيار. نحيط أنفسنا بأشخاص متشابهين في التفكير، ونستهلك وسائل الإعلام المؤكدة، ونفسر التعليقات الغامضة على أنها موافقة. هذا يخلق غرفة صدى تعزز وهم الإجماع.

      يكون التأثير أقوى للمعتقدات الراسخة بعمق وعندما نكون مستثمرين بشكل كبير في موقفنا. يمكن أن يؤدي ذلك إلى مفاجأة عندما يختلف الآخرون، وصعوبة في التفاوض، وأبحاث سوق ضعيفة عندما نفترض أن العملاء يفكرون مثلنا.
    why_this_is_important: |
      التعرف على تأثير الإجماع الكاذب يساعدك على الاستعداد للخلاف الحقيقي، وإجراء بحث أفضل، والتواصل بشكل أكثر فعالية. إنه ضروري لتطوير المنتجات، والتفاوض، والقيادة.
    when_to_use:
      - اتخاذ_القرارات
      - التفاوض
      - القيادة
      - حل_المشكلات
    how_can_you_spot_it:
      surprise_at_disagreement: |
        تشعر بصدمة حقيقية عندما يختلف شخص ما مع ما تعتبره واضحًا.
      assuming_shared_values: |
        تتصرف كما لو أن الآخرين يشاركونك أولوياتك دون التحقق.
      underestimating_opposition: |
        تتوقع أن تواجه المقترحات مقاومة أقل مما تواجهه.
      echo_chamber_detection: |
        بيئتك الاجتماعية والإعلامية نادرًا ما تتحدى وجهات نظرك.
    examples:
      product_development: |
        يفترض فريق أن المستخدمين يريدون الميزة X لأن الجميع في الفريق يريدونها – ليجدوا لاحقًا تبنيًا منخفضًا.
      politics: |
        يشعر الأشخاص في فقاعة سياسية بالصدمة من نتائج الانتخابات التي لا تتطابق مع توقعاتهم.
      negotiation: |
        افتراض أن الطرف الآخر سيوافق على الشروط لأنها تبدو "معقولة" بالنسبة لك.
      hiring: |
        يمكن أن يعني التوظيف لـ "التوافق الثقافي" توظيف الأشخاص الذين يتفقون معك، مما يعزز الإجماع الكاذب.
    real_world_implications: |
      يساهم تأثير الإجماع الكاذب في الاستقطاب، وإطلاق المنتجات الفاشلة، والمفاوضات الفاشلة. يجعلنا واثقين بشكل مفرط في توقعاتنا وغير مستعدين للانشقاق.
    professional_application:
      networking_and_relationship_building: |
        ابحث بنشاط عن أشخاص لديهم وجهات نظر مختلفة. لا تفترض المعتقدات المشتركة – اسأل واستمع.
      collaborative_learning_initiative: |
        في الفرق، استخدم المعارضة المنظمة (على سبيل المثال، "السيناريوهات السلبية"، محامي الشيطان) للكشف عن الخلاف قبل أن يصبح مكلفًا.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        افتراض أن أولئك الذين يختلفون غير معقولين أو غير مطلعين بدلاً من النظر في أن لديهم وجهات نظر مختلفة صالحة.
      poor_research: |
        تخطي أبحاث العملاء لأن "نحن نعرف بالفعل ما يريدون".
      overconfidence: |
        المراهنة الجريئة بناءً على افتراض أن الآخرين سيوافقون.
      groupthink_amplification: |
        الفرق التي لا تتحدى تأثير الإجماع الكاذب يمكن أن تنزلق إلى التفكير الجماعي.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: تأثير التأطير
    quick_introduction: |
      تأثير التأطير هو ميل قراراتنا إلى التغير بناءً على كيفية تقديم الخيارات - حتى عندما تكون الحقائق الأساسية متطابقة. "90% معدل بقاء" و"10% معدل وفيات" يصفان نفس النتيجة ولكنهما يستثيران خيارات مختلفة. الإطار يشكل القرار.
    one_liner: نفس الحقائق، مؤطرة بشكل مختلف، تؤدي إلى قرارات مختلفة.
    try_this:
      - أعد صياغة الخيارات بطرق متعددة قبل اتخاذ القرار - إطار المكسب وإطار الخسارة.
      - لاحظ متى يتغير اختيارك بناءً على كيفية صياغة شيء ما.
      - اسأل: ما هي الحقائق الأساسية، مجردة من الإطار؟
    ask_yourself:
      - هل سأتخذ قرارًا مختلفًا إذا تم تأطير هذا كمكسب مقابل خسارة؟
      - هل أنا أتفاعل مع الإطار أم مع النتيجة الفعلية؟
    in_more_detail: |
      أظهر كانيمان وتفرسكي أن الناس يتجنبون المخاطر عندما يتم تأطير الخيارات كمكاسب ويسعون وراء المخاطر عندما يتم تأطيرها كخسائر - حتى لنفس النتائج. التأطير الإيجابي ("إنقاذ 200 شخص") مقابل التأطير السلبي ("سيموت 400 شخص") يغير التفضيلات. إطارات الخسارة تثير استجابات عاطفية أقوى من إطارات المكاسب المكافئة.

      يؤثر تأثير التأطير على القرارات الطبية، والسياسات، والتسويق، والمفاوضات. إنه أحد أقوى التحيزات وأكثرها توثيقًا. الوعي يساعد، ولكن من الصعب التغلب عليه بالكامل.
    why_this_is_important: |
      يساعدك التعرف على تأثير التأطير على اتخاذ قرارات أكثر اتساقًا، ومقاومة التلاعب، والتواصل بفعالية أكبر. كما أنه يفسر سبب قبول أو رفض نفس العرض اعتمادًا على طريقة تقديمه.
    when_to_use:
      - اتخاذ_القرارات
      - التفاوض
      - القيادة
      - تقييم_المخاطر
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        نفس النتيجة مؤطرة كمكسب مقابل خسارة تنتج خيارات مختلفة.
      presentation_dependence: |
        تتغير القرارات عندما يتغير التأطير فقط، وليس الجوهر.
      default_influence: |
        كيفية ترتيب الخيارات أو تسميتها يؤثر على الاختيارات.
      emotional_trigger: |
        تستثير أطر معينة استجابات عاطفية أقوى.
    examples:
      medical: |
        "90% معدل بقاء" مقابل "10% معدل وفيات" لنفس الإجراء -
        يختار الناس بشكل مختلف بناءً على الإطار.
      sales: |
        "وفر 50 دولارًا" مقابل "لا تخسر 50 دولارًا" - أطر مكافئة، مختلفة
        تأثير نفسي.
      policy: |
        "تخفيف الضرائب" مقابل "إنفاق حكومي" - نفس السياسة، مختلفة
        استجابة سياسية.
      negotiation: |
        تقديم عرض كـ "خصم" مقابل "تجنب رسوم إضافية"
        يغير معدلات القبول.
    real_world_implications: |
      يتم استغلال تأثير التأطير في الإعلانات، والسياسة،
      والمفاوضات. يؤثر على القرارات الطبية ودعم السياسات.
      يمكن أن تؤدي إعادة التأطير إلى تحسين القرارات والتواصل. الوعي
      يساعد ولكنه لا يلغي التأثير بالكامل.
    professional_application:
      networking_and_relationship_building: |
        عند تقديم الخيارات، ضع في اعتبارك أطرًا متعددة. اختبر كيف
        تؤثر الأطر المختلفة على الاستقبال. عند تلقي المعلومات،
        اسأل "كيف يمكن تأطير هذا بطريقة أخرى؟"
      collaborative_learning_initiative: |
        في اتخاذ القرارات، أعد صياغة الخيارات بشكل صريح للتحقق من
        تأثيرات التأطير. "إذا قمنا بتأطير هذا كخسارة، هل سنتخذ قرارًا
        مختلفًا؟" استخدم تأطيرًا متسقًا للإنصاف.
    how_can_this_be_misapplied:
      manipulation: |
        تأطير متعمد لتوجيه الناس نحو نتائج مرغوبة
        دون علمهم.
      false_equivalence: |
        افتراض أن جميع الأطر متساوية في الصلاحية بينما البعض الآخر يحجب
        معلومات مهمة.
      overcorrection: |
        تجاهل التأطير تمامًا وافتراض أنه غير مهم -
        إنه مهم.
      spin: |
        استخدام التأطير للتضليل بدلاً من التوضيح.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: خطأ الإسناد الأساسي
    quick_introduction: |
      خطأ الإسناد الأساسي هو الميل إلى عزو سلوك الآخرين إلى شخصيتهم أو طبيعتهم
      بينما نعزو سلوكنا نحن إلى عوامل ظرفية. نحن نحكم على الآخرين بأفعالهم
      ونحكم على أنفسنا بنوايانا.
    one_liner: نحكم على الآخرين بأفعالهم، وعلى أنفسنا بنوايانا.
    try_this:
      - عندما يثير شخص ما إحباطك، اسأل: ما هي العوامل الظرفية التي قد تفسر هذا؟
      - طبّق نفس اللطف على الآخرين الذي تطبقه على نفسك.
      - لاحظ متى تعزو سلوك الآخرين إلى شخصيتهم، وليس إلى ظروفهم.
    ask_yourself:
      - هل سأفسر سلوكي بنفس الطريقة التي أفسر بها سلوكهم؟
      - ما الذي قد أكون أفتقده بشأن وضعهم؟
    in_more_detail: |
      عندما يقطعنا أحدهم في حركة المرور، نفكر "يا له من أحمق". عندما نقطع أحدهم،
      نفكر "كان عليّ فعل ذلك - كنت في عجلة من أمري". نفسر إخفاقاتنا الخاصة
      بالظروف ("حركة المرور كانت فظيعة") وإخفاقات الآخرين بالطباع ("إنهم كسالى").
      والعكس صحيح بالنسبة للنجاح: ننسب الفضل لأنفسنا، ونعزو نجاح الآخرين
      إلى الحظ.

      الخطأ "أساسي" لأنه منتشر ودائم. إنه يقوّض التعاطف، ويؤجج الصراع،
      ويشوه تقييم الأداء.
    why_this_is_important: |
      التعرف على خطأ الإسناد الأساسي يحسّن العلاقات، ويقلل الصراع، ويؤدي
      إلى أحكام أكثر عدلاً. يشجع على النظر في السياق قبل استنتاج أن شخصًا ما "هو"
      بطريقة معينة.
    when_to_use:
      - بناء_العلاقات
      - حل_النزاعات
      - القيادة
      - اتخاذ_القرار
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "إنهم مجرد هذا النوع من الأشخاص" عند شرح سلوك الآخرين.
      situational_explanation_for_self: |
        "لم يكن لدي خيار" أو "الظروف أجبرتني" عند شرح سلوكنا نحن.
      character_vs_context: |
        افتراض وجود صفة شخصية عندما يمكن للظرف أن يفسر السلوك.
      asymmetric_standards: |
        تطبيق معايير أكثر صرامة على الآخرين مما نطبقه على أنفسنا.
    examples:
      traffic: |
        خطأ سائق آخر = "سائق سيئ". خطؤنا = "موقف لا مفر منه".
      workplace: |
        تأخير موعد نهائي لزميل = "غير مسؤول". تأخير موعدنا النهائي =
        "مرهق ولا يمكن لأحد أن يفعل أفضل من ذلك".
      politics: |
        آراء الخصوم = "إنهم أغبياء أو أشرار". آراؤنا = "رد فعل عقلاني
        على الحقائق".
      performance: |
        نجاح الآخرين = "محظوظ". نجاحنا = "مكتسب بالعمل الجاد".
    real_world_implications: |
      يؤجج خطأ الإسناد الأساسي الصراع، ويقوّض العمل الجماعي، ويشوه التوظيف
      وتقييم الأداء. تصحيحه يحسن الثقافة التنظيمية والعلاقات الشخصية.
    professional_application:
      networking_and_relationship_building: |
        عندما يخيب شخص ما أملك، اسأل "ما هي العوامل الظرفية التي قد تفسر
        هذا؟" قبل أن تستنتج أنه غير موثوق به أو صعب.
      collaborative_learning_initiative: |
        في التغذية الراجعة والمراجعات، شجع التفسيرات "ظرفية أولاً".
        درّب المديرين على النظر في السياق قبل عزوه إلى الشخصية.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        تجاهل كل فعل على أنه "ظرفي" عندما يعكس بعض السلوك
        الشخصية.
      no_accountability: |
        استخدام الخطأ لتجنب مساءلة الأشخاص عن الخيارات التي اتخذوها بالفعل.
      self_deprecation: |
        الإفراط في التصحيح للوم نفسك دائمًا وعدم الاعتراف بمسؤولية الآخرين أبدًا.
      ignoring_patterns: |
        عندما يتصرف شخص ما بشكل سيء بشكل متكرر عبر مواقف مختلفة، فقد تكون
        الطباع ذات صلة.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: مغالطة المقامر
    quick_introduction: |
      مغالطة المقامر هي الاعتقاد الخاطئ بأن الأحداث المستقلة السابقة تؤثر على الأحداث المستقبلية. بعد سلسلة من الأوجه (مثلاً، في رمي العملة)، نعتقد أن "الوجه الآخر" قد حان وقته - على الرغم من أن كل رمية مستقلة. نرى أنماطًا في العشوائية ونتوقع "تصحيحًا" أو "تراجعًا" عندما لا يكون ذلك مطلوبًا.
    one_liner: الأحداث المستقلة السابقة لا تؤثر على الأحداث المستقبلية - العملة ليس لديها ذاكرة.
    try_this:
      - عندما تفكر "حان وقتي للفوز"، اسأل: هل هذه الأحداث مستقلة بالفعل؟
      - فرق بين الانحدار إلى المتوسط (حقيقي) ومغالطة المقامر (خاطئة).
      - لاحظ متى ترى أنماطًا في العشوائية.
    ask_yourself:
      - هل أفترض أن النتائج السابقة تؤثر على النتائج المستقبلية عندما تكون مستقلة؟
      - هل سيوافق إحصائي على منطقي "حان وقت التغيير"؟
    in_more_detail: |
      في رمي عملة معدنية عادلة، كل رمية مستقلة. احتمال ظهور الوجه هو دائمًا 50%، بغض النظر عن النتائج السابقة. لكننا نشعر أن سلسلة طويلة من نتيجة واحدة تجعل النتيجة الأخرى أكثر احتمالًا. نخلط بين قانون الأعداد الكبيرة (على مدى العديد من التجارب، تتوازن النتائج) و"التصحيح" قصير الأمد. الكازينو ليس لديه ذاكرة.

      تؤثر المغالطة على المقامرة والاستثمار واتخاذ القرارات اليومية. نفترض أن "الحظ" سوف يتعادل أو أننا "حان وقتنا" للفوز. في بعض الأحيان نكون على حق - ولكن لأسباب خاطئة.
    why_this_is_important: |
      التعرف على مغالطة المقامر يمنع الأخطاء المكلفة في المقامرة والاستثمار. كما أنه يساعدك على تجنب المبالغة في تفسير السلاسل القصيرة وتوقع التراجع الخاطئ. إنه يميز الانحدار الحقيقي إلى المتوسط عن المغالطة.
    when_to_use:
      - صنع_القرار
      - الاستثمار
      - تقييم_المخاطر
      - حل_المشكلات
    how_can_you_spot_it:
      due_for_a_change: |
        "لقد تعرضنا للكثير من الخسائر - حان وقتنا للفوز."
      pattern_in_randomness: |
        رؤية أنماط ذات معنى في تسلسلات عشوائية.
      hot_hand_fallacy: |
        الاعتقاد بأن سلسلة ستستمر (خطأ مرتبط ولكنه عكسي).
      independence_ignorance: |
        التعامل مع الأحداث المستقلة كما لو كانت مرتبطة.
    examples:
      gambling: |
        بعد عدة مرات ظهور اللون الأحمر في لعبة الروليت، المراهنة على اللون الأسود لأن "الأحمر لا يمكن أن يستمر بالظهور."
      investing: |
        "لقد كان السوق منخفضًا - يجب أن يرتفع."
      hiring: |
        "لقد وظفنا العديد من المرشحين السيئين - من المؤكد أن التالي سيكون جيدًا."
      sports: |
        "لقد أخطأ العديد من التصويبات - حان وقته لإحراز التصويبة التالية."
    real_world_implications: |
      تتسبب مغالطة المقامر في خسائر في المقامرة وقرارات استثمارية سيئة. كما أنها تفسر سبب المبالغة في تفسير الأنماط قصيرة الأجل. التمييز بينها وبين الانحدار الحقيقي إلى المتوسط (حيث يوجد متوسط حقيقي للانحدار إليه) أمر مهم.
    professional_application:
      networking_and_relationship_building: |
        لا تفترض أن ديناميكيات العلاقات السابقة ست "تصحح" في المستقبل - فكل تفاعل مستقل إلى حد ما. ولكن تعلم من الأنماط عندما يكون هناك سبب أساسي حقيقي.
      collaborative_learning_initiative: |
        عند تقييم الأداء، ميز التباين العشوائي عن التغيير المنهجي. السلاسل القصيرة يمكن أن تكون مجرد ضوضاء؛ لا تفرط في رد الفعل على "السلاسل" أو تتوقع تراجعًا خاطئًا.
    how_can_this_be_misapplied:
      ignoring_regression: |
        في بعض الأحيان يكون الانحدار إلى المتوسط حقيقيًا (على سبيل المثال، أداء المهارة). لا تتجاهل كل التراجع على أنه مغالطة المقامر.
      false_independence: |
        افتراض أن الأحداث مستقلة عندما لا تكون كذلك (على سبيل المثال، قياسات متكررة لنفس الشيء).
      overcorrection: |
        عدم توقع التراجع أبدًا عندما يكون هناك متوسط حقيقي للانحدار إليه.
      dismissing_patterns: |
        بعض الأنماط حقيقية - ليست كل التسلسلات عشوائية.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: تفكير جماعي
    quick_introduction: |
      تفكير جماعي هو ميل المجموعات المتماسكة إلى إعطاء الأولوية للإجماع والوئام على التقييم النقدي. يقوم الأعضاء بقمع المعارضة، والرقابة الذاتية، والتوافق مع الرأي المتصور للمجموعة. تتجاوز الرغبة في الإجماع الرغبة في اتخاذ أفضل قرار.
    one_liner: الوئام فوق الحقيقة - المجموعات تعطي الأولوية للإجماع على التقييم النقدي.
    try_this:
      - تعيين محامي الشيطان؛ اجعل المعارضة متوقعة وآمنة.
      - اسأل: ما الذي لا نقوله؟ ماذا سنقول لو لم نكن في هذه المجموعة؟
      - ابحث عن وجهات نظر خارجية قبل الانتهاء من قرارات المجموعة.
    ask_yourself:
      - هل أقوم بالرقابة الذاتية للحفاظ على الوئام؟
      - هل إجماعنا حقيقي أم نتيجة للضغط للموافقة؟
    in_more_detail: |
      درس إيرفينغ جانس فشل السياسة الخارجية (خليج الخنازير، فيتنام) وحدد أنماطًا: وهم المناعة، والترشيد الجماعي، وضغط نحو الامتثال، والرقابة الذاتية، ووهم الإجماع، وحراس العقل الذين يحمون المجموعة من المعلومات المعارضة. يؤدي التماسك العالي والعزلة والتوتر إلى زيادة التفكير الجماعي.

      يؤدي التفكير الجماعي إلى قرارات سيئة لأن البدائل لا تؤخذ بعين الاعتبار بجدية. تُرى المعارضة على أنها خيانة. تبالغ المجموعة في تقدير صحتها وتقلل من شأن المخاطر.
    why_this_is_important: |
      يساعدك التعرف على التفكير الجماعي على تهيئة الظروف لاتخاذ قرارات أفضل: تشجيع المعارضة، وجلب وجهات نظر خارجية، وتجنب الإجماع المبكر. إنه ضروري لتجنب فشل جماعي كارثي.
    when_to_use:
      - القيادة
      - اتخاذ_القرارات
      - حل_المشكلات
      - حل_النزاعات
    how_can_you_spot_it:
      pressure_for_consensus: |
        يتم تثبيط المعارضة أو معاقبتها؛ تتم مكافأة الاتفاق.
      illusion_of_unanimity: |
        يُفسر الصمت على أنه موافقة عندما قد يكون رقابة ذاتية.
      collective_rationalization: |
        تتجاهل المجموعة التحذيرات وتعزز رأيها.
      mindguards: |
        يحمي الأعضاء المجموعة من المعلومات التي من شأنها أن تتحدى
        الإجماع.
    examples:
      bay_of_pigs: |
        قمع مستشارو كينيدي الشكوك حول خطة الغزو؛
        كانت النتيجة كارثة.
      corporate_decisions: |
        يواصل فريق قيادي عملية اندماج على الرغم من العلامات الحمراء
        لأن لا أحد يريد أن يكون المعارض.
      product_launches: |
        يقوم فريق بإطلاق منتج معيب لأن الجميع استثمروا
        في الخطة ولا يثير أحد مخاوف.
      boards: |
        تقوم مجالس الإدارة بتمرير مقترحات الإدارة لتجنب
        الإحراج.
    real_world_implications: |
      يساهم التفكير الجماعي في فشل السياسات، والكوارث المؤسسية، وضياع الفرص. إنه خطير بشكل خاص في المواقف عالية المخاطر وعالية التوتر. يتطلب منعه تدخلات هيكلية متعمدة.
    professional_application:
      networking_and_relationship_building: |
        وفر أمانًا نفسيًا للمعارضة. اشكر الأشخاص الذين
        يثيرون المخاوف. كن قدوة في الاختلاف دون أن تكون بغيضًا.
      collaborative_learning_initiative: |
        استخدم محامي الشيطان، وفرق اللون الأحمر، و"الاستشرافات السابقة". اطلب
        من شخص ما أن يجادل ضد الرأي السائد. جلب
        وجهات نظر خارجية. يتحدث القائد أخيرًا لتجنب التأثير.
    how_can_this_be_misapplied:
      false_dissent: |
        إنشاء "معارضين مخصصين" لا يختلفون حقًا -
        المجموعة تكتشف ذلك.
      excessive_conflict: |
        تشجيع المعارضة لدرجة الصراع المدمر
        والشلل.
      dismissing_consensus: |
        افتراض أن كل إجماع هو تفكير جماعي - أحيانًا تكون المجموعة
        على حق.
      individualism: |
        المبالغة في التصحيح لدرجة أنه لا يمكن اتخاذ قرار جماعي
        ممكن.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: تأثير الهالة
    quick_introduction: |
      تأثير الهالة هو الميل إلى السماح لسمة أو انطباع إيجابي واحد بالتأثير على حكمنا الشامل على شخص ما. إذا أحببنا مظهر شخص ما، فقد نفترض أنه كفء. إذا أعجبنا بمهارة واحدة، فإننا نفترض أنه جيد في كل شيء. سمة إيجابية واحدة تلقي "هالة" على الباقي.
    one_liner: سمة إيجابية واحدة تلقي هالة على حكمنا الكامل على شخص ما.
    try_this:
      - قم بتقييم السمات بشكل مستقل - لا تدع قوة واحدة تستلزم أخرى.
      - لاحظ متى يؤثر الجاذبية أو الكاريزما أو نجاح واحد على وجهة نظرك.
      - اسأل: هل سأحكم على هذا الشخص بنفس الطريقة بدون هذه السمة الإيجابية الواحدة؟
    ask_yourself:
      - هل أعمم من سمة واحدة إلى الشخص بأكمله؟
      - هل سأرى نقاط ضعف إذا لم أكن معجبًا بقوة واحدة؟
    in_more_detail: |
      لاحظ إدوارد ثورندايك أن الضباط العسكريين الذين قيموا الجنود بدرجة عالية في سمة واحدة يميلون إلى تقييمهم بدرجة عالية في سمات أخرى - حتى السمات غير المرتبطة. نحن نعمم من الجزء إلى الكل. الجاذبية أو الكاريزما أو النجاح في مجال واحد يخلق هالة تنتشر.

      العكس - سمة سلبية واحدة تؤثر على كل شيء - يطلق عليها أحيانًا "تأثير القرن". كلاهما شكل من أشكال التعميم غير المبرر. يؤثر تأثير الهالة على التوظيف وتقييمات الأداء والانطباعات اليومية.
    why_this_is_important: |
      يساعدك التعرف على تأثير الهالة على إجراء تقييمات أكثر دقة وتجنب التعميم المفرط. إنه ضروري للتوظيف العادل وإدارة الأداء وتقييم العلاقات. قوة واحدة لا تستلزم كل القوى.
    when_to_use:
      - صنع_القرار
      - القيادة
      - بناء_العلاقات
      - التوظيف
    how_can_you_spot_it:
      trait_spillover: |
        سمة إيجابية واحدة تؤثر على الحكم على السمات غير المرتبطة.
      attractiveness_bias: |
        يتم تقييم الأشخاص الجذابين بدرجة أعلى في الكفاءة والموثوقية وما إلى ذلك.
      success_generalization: |
        النجاح في مجال واحد يؤدي إلى افتراض الكفاءة في مجالات أخرى.
      first_impression_dominance: |
        الانطباع الإيجابي المبكر يؤثر على جميع التقييمات اللاحقة.
    examples:
      hiring: |
        يُفترض أن يكون المرشح الذي يجيد التحدث ومحبوبًا قويًا تقنيًا - حتى عندما تكون المهارات غير مرتبطة.
      performance_reviews: |
        مشروع واحد متميز يؤدي إلى تقييمات عالية عبر جميع الأبعاد.
      politics: |
        تؤدي كاريزما السياسي إلى افتراض الكفاءة في السياسات.
      branding: |
        نجاح شركة في منتج واحد يؤدي إلى افتراض جودة
        جميع المنتجات.
    real_world_implications: |
      يشوه تأثير الهالة قرارات التوظيف وتقييم الأداء والاستثمار. إنه يفضل الجذاب والمتحدث والناجح بالفعل. يتطلب تقليله تقييمًا منظمًا وفصل الأبعاد.
    professional_application:
      networking_and_relationship_building: |
        قم بتقييم الأشخاص بناءً على أبعاد محددة بدلاً من الانطباع العام. كن على دراية عندما تؤثر سمة إيجابية واحدة على
        حكمك على الآخرين. ابحث عن أدلة تفنيدية.
      collaborative_learning_initiative: |
        استخدم مقابلات وتقييمات منظمة تقيم الأبعاد
        بشكل مستقل. قم بمعايرة التقييمات بين المقيمين. قلل
        الاعتماد على "الشعور الغريزي" العام.
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        ليس كل انطباع إيجابي هو هالة - أحيانًا يكون الأشخاص
        أقوياء حقًا عبر الأبعاد.
      false_objectivity: |
        افتراض أننا نستطيع القضاء تمامًا على تأثير الهالة - فهو
        واسع الانتشار وجزئيًا تلقائي.
      overcorrection: |
        الذهاب إلى الطرف الآخر وافتراض أن الأشخاص الجذابين أو
        الكاريزميين أقل كفاءة.
      stereotyping: |
        استخدام "تأثير الهالة" لتجاهل الصفات الإيجابية المشروعة.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: شفرة حانلون
    quick_introduction: |
      تنص شفرة حانلون على: "لا تنسب إلى خبث ما يمكن تفسيره بما فيه الكفاية بالغباء."
      بعبارة أخرى، لا تفترض سوء النية عندما يمكن أن يفسر عدم الكفاءة أو الإهمال أو الجهل السلوك.
    one_liner: لا تفترض خبثًا عندما يمكن أن يفسره عدم الكفاءة أو الإهمال.
    try_this:
      - عندما يزعجك شخص ما، اسأل: هل يمكن تفسير ذلك بخطأ أو جهل؟
      - افترض التفسير الأبسط قبل افتراض سوء النية.
      - لاحظ متى تقفز إلى "لقد قصدوا إيذائي".
    ask_yourself:
      - هل أنسب إلى الخبث ما يمكن تفسيره بالغباء؟
      - هل أرغب في نفس حسن النية في موقفهم؟
    in_more_detail: |
      يشجع المبدأ على إعطاء الناس فرصة لحسن النية. عندما تؤذيك تصرفات شخص ما أو تزعجك،
      فإن الافتراض الافتراضي غالبًا هو أنهم قصدوا إيذائك. تقترح شفرة حانلون أن العديد
      من هذه الإجراءات تنبع من الإهمال، أو نقص المعلومات، أو التنفيذ السيئ - وليس سوء النية.

      هذا لا يعني أن الخبث لا وجود له أبدًا. هذا يعني أنه لا ينبغي لنا القفز إلى
      أسوأ تفسير عندما يناسب تفسير أبسط. تخفف الشفرة من جنون الارتياب، وتحسن العلاقات،
      وتساعدنا على الاستجابة بشكل أكثر بناءً للمشكلات.
    why_this_is_important: |
      تطبيق شفرة حانلون يقلل الصراع، ويحافظ على العلاقات، ويركز الطاقة على حل المشكلات
      بدلاً من إلقاء اللوم. كما أنها تحميك من ضغوط افتراض أن الجميع يتربصون بك.
    when_to_use:
      - حل_الصراعات
      - القيادة
      - بناء_العلاقات
      - اتخاذ_القرارات
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        تفسر فورًا نتيجة سلبية على أنها ضرر متعمد.
      personalizing_mistakes: |
        عندما يحدث خطأ ما، تفترض أنه كان موجهاً إليك شخصياً.
      ignoring_alternative_explanations: |
        لا تفكر في عدم الكفاءة، أو سوء التواصل، أو الإهمال كاحتمالات.
      escalation_before_inquiry: |
        تستجيب بالغضب أو الانتقام قبل السؤال عما حدث.
    examples:
      email_tone: |
        افتراض أن البريد الإلكتروني المختصر سلبي وعدواني بينما قد يكون المرسل ببساطة
        في عجلة من أمره أو سيئ في النبرة.
      missed_deadline: |
        تفسير تأخر تسليم زميل على أنه تخريب بينما قد يكون قد بالغ في الالتزام
        أو واجه عقبات.
      policy_decisions: |
        افتراض أن سياسة الشركة التي لا تحبها تم تصميمها لإيذاء الموظفين
        بينما قد تكون محاولة متعثرة لمعالجة مشكلة مختلفة.
      traffic: |
        افتراض أن سائقًا آخر قطع عليك الطريق عن قصد بينما قد لا يكون قد رآك.
    real_world_implications: |
      تحسن شفرة حانلون ثقافة مكان العمل، وتقلل من التقاضي، وتجعل حل النزاعات أكثر فعالية.
      يمكن أن يؤدي الاستخدام المفرط إلى تمكين الإهمال؛ ويؤدي الاستخدام الناقص إلى خلق صراعات لا داعي لها.
    professional_application:
      networking_and_relationship_building: |
        عندما يخيب أملك شخص ما، اطلب التوضيح قبل افتراض سوء النية.
        حافظ على العلاقات من خلال الافتراض المسبق للتفسيرات المتسامحة.
      collaborative_learning_initiative: |
        في الفرق، أنشئ ثقافة يتم فيها افتراض الأخطاء على أنها غير مقصودة حتى
        يثبت العكس. ركز على الأنظمة والعمليات بدلاً من اللوم.
    how_can_this_be_misapplied:
      excusing_negligence: |
        رفض عدم الكفاءة أو الإهمال المتكرر على أنه "ليس خبثًا" عندما يستدعي
        المساءلة.
      ignoring_genuine_malice: |
        تطبيق الشفرة بصرامة لدرجة أنك تفوت جهات فاعلة سيئة حقيقية أو سلوكًا سامًا.
      avoiding_difficult_conversations: |
        استخدام شفرة حانلون كذريعة لعدم معالجة قضايا الأداء.
      gaslighting_victims: |
        إخبار شخص تعرض للظلم حقًا بأنه "يفترض سوء النية" بينما كان
        الخبث موجودًا.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: تأثير هورثورن
    quick_introduction: |
      يُشير تأثير هورثورن إلى ميل الأشخاص لتغيير سلوكهم عندما يعلمون أنهم يخضعون للمراقبة أو الدراسة. فعل المراقبة بحد ذاته يمكن أن يُنتج التغيير—وليس بالضرورة التدخل الذي يتم اختباره. يستجيب الناس للاهتمام الذي يتلقونه.
    one_liner: مراقبة السلوك تغيّر السلوك—الاهتمام بحد ذاته يمكن أن يُنتج التأثير.
    try_this:
      - عند تقييم تدخل، ضع في اعتبارك ما إذا كانت المراقبة هي الدافع للنتائج.
      - اعترف بأن الاهتمام والشعور بالتقدير يمكن أن يحسن الأداء.
      - كن حذرًا عند عزو التغيير إلى تدخل معين عندما تكون المراقبة هي التي غيّرت.
    ask_yourself:
      - هل هذا التحسن ناتج عن التدخل أم عن كونه تحت المراقبة؟
      - هل ستستمر النتائج إذا توقفنا عن الاهتمام؟
    in_more_detail: |
      في مصنع هورثورن، وجد الباحثون أن الإنتاجية تحسنت عندما غيّروا الإضاءة—وأيضًا عندما أعادوها إلى ما كانت عليه. بدا أن التحسن نابع من الاهتمام والمراقبة، وليس التدخل المحدد. أشار إعادة تحليل لاحقة إلى أن التأثير ربما قد تم المبالغة فيه، لكن المفهوم لا يزال مفيدًا: الدراسة تغيّر السلوك.

      يُعقّد تأثير هورثورن البحث والتقييم. يمكن أن يُضخّم التأثير الظاهري للتدخلات. كما يشير إلى أن الاهتمام والشعور بالتقدير يمكن أن يحسّن الأداء—وهو درس للإدارة.
    why_this_is_important: |
      يساعدك فهم تأثير هورثورن على تفسير نتائج الأبحاث، وتصميم تجارب أفضل، والاعتراف بأن الاهتمام بحد ذاته يمكن أن يدفع للتغيير. في الإدارة، يشير إلى أن الاهتمام بالناس قد يكون بنفس أهمية التدخل المحدد.
    when_to_use:
      - القيادة
      - اتخاذ_القرار
      - التعلم
      - حل_المشكلات
    how_can_you_spot_it:
      observation_induced_change: |
        يتغير السلوك عندما يعلم الناس أنهم مراقبون أو يدرسون.
      attention_effect: |
        فعل الاهتمام يُنتج التحسن، وليس فقط التغيير المحدد.
      placebo_analog: |
        مثل الدواء الوهمي، "علاج" الدراسة يمكن أن يكون له تأثيرات.
      short_term_improvement: |
        قد تتلاشى التحسينات عند انتهاء المراقبة.
    examples:
      workplace_studies: |
        زيادة الإنتاجية أثناء الدراسة—هل العملية الجديدة هي السبب أم حقيقة أن شخصًا ما يراقب؟
      medical_trials: |
        مجموعات الدواء الوهمي تتحسن—جزئيًا لأنها تتلقى الاهتمام.
      education: |
        يؤدي الطلاب بشكل أفضل عندما يكون الباحثون حاضرين—"تأثير المراقب".
      management: |
        تتحسن الفرق عندما تولى الإدارة الاهتمام—هل المبادرة الجديدة هي السبب أم الاهتمام بحد ذاته؟
    real_world_implications: |
      يؤثر تأثير هورثورن على صلاحية البحث وتقييم البرامج. يمكن أن يؤدي إلى المبالغة في تقدير آثار التدخلات. كما أن له درسًا إيجابيًا: الاهتمام والشعور بالدراسة يمكن أن يحفز التحسين—لذلك فإن العناية والرؤية مهمتان.
    professional_application:
      networking_and_relationship_building: |
        الاهتمام بالناس يمكن أن يحسّن أداءهم—يشير تأثير هورثورن إلى أن الشعور بالمراقبة والتقدير مهم. استخدم هذا بشكل إيجابي: فحوصات منتظمة، رؤية، وتقدير.
      collaborative_learning_initiative: |
        عند تقييم التدخلات، استخدم مجموعات تحكم وفكر فيما إذا كانت التحسينات ناتجة عن التدخل أو الاهتمام الذي جلبه. يمكن لتأثير هورثورن تضخيم النجاح الظاهري.
    how_can_this_be_misapplied:
      surveillance_justification: |
        استخدام "تأثير هورثورن" لتبرير المراقبة المستمرة—المراقبة يمكن أن تقلل أيضًا من الثقة والدافع الذاتي.
      dismissing_improvements: |
        افتراض أن كل تحسن أثناء الدراسات هو تأثير هورثورن—أحيانًا تعمل التدخلات حقًا.
      overgeneralization: |
        تم التشكيك في دراسات هورثورن الأصلية؛ قد يكون التأثير أصغر أو مختلفًا عما كان يُعتقد ذات يوم.
      manipulation: |
        إنشاء "مراقبة" زائفة للتلاعب بالسلوك.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: تحيز الإدراك بأثر رجعي
    quick_introduction: |
      تحيز الإدراك بأثر رجعي (أو تأثير "كنت أعرف ذلك طوال الوقت") هو الميل إلى الاعتقاد،
      بعد وقوع حدث ما، بأننا كنا سنتنبأ به أو نتوقعه. نعيد بناء الماضي لجعل النتائج تبدو أكثر حتمية مما كانت عليه.
    one_liner: بعد الحدث، نعتقد أننا كنا نعرف كل شيء طوال الوقت.
    try_this:
      - قبل الحكم على القرارات الماضية، اسأل: ماذا كانوا يعرفون في ذلك الوقت؟
      - سجل توقعاتك قبل النتائج - قارن لاحقًا.
      - لاحظ متى تجعل الماضي يبدو أكثر حتمية مما كان عليه.
    ask_yourself:
      - هل أحكم بناءً على معلومات لم تكن متاحة حينها؟
      - هل تنبأت بهذا بالفعل، أم أنه يبدو واضحًا الآن فقط؟
    in_more_detail: |
      بمجرد أن نعرف النتيجة، تبدو واضحة. ننسى عدم اليقين الذي شعرنا به مسبقًا. هذا التحيز يشوه التعلم - نعتقد أننا "عرفنا" شيئًا لم نعرفه، لذا لا نحدث نماذجنا. يؤدي أيضًا إلى لوم غير عادل: "كان ينبغي عليهم رؤية ذلك قادمًا" عندما كان المستقبل غير مؤكد حقًا.

      يؤثر تحيز الإدراك بأثر رجعي على تحليلات ما بعد الحدث، والأحكام القانونية، والتحليلات التاريخية.
      نحكم على القرارات الماضية بمعلومات لم تكن متاحة في ذلك الوقت.
    why_this_is_important: |
      التعرف على تحيز الإدراك بأثر رجعي يحسن التعلم من النتائج، والتقييم العادل للقرارات، وتقييم المخاطر بشكل أكثر دقة. إنه يمنع الثقة الزائفة في قدراتنا التنبؤية.
    when_to_use:
      - اتخاذ_القرار
      - التعلم
      - تقييم_المخاطر
      - القيادة
    how_can_you_spot_it:
      inevitability_feeling: |
        بعد وقوع حدث ما، يبدو وكأنه "كان لا بد" أن يحدث.
      reconstructed_certainty: |
        نتذكر أننا كنا أكثر يقينًا قبل الحدث مما كنا عليه في الواقع.
      blame_for_failure: |
        "كان ينبغي عليهم أن يعرفوا" عندما كانت النتيجة غير مؤكدة حقًا.
      undervaluing_luck: |
        إرجاع النتائج إلى المهارة أو البصيرة عندما لعب الحظ دورًا.
    examples:
      investing: |
        "كنت أعرف أن السوق سينهار" بعد انهياره - عندما لم تتصرف بناءً على تلك "المعرفة" مسبقًا.
      project_failures: |
        "كان ينبغي علينا رؤية المخاطر" في تحليل ما بعد الحدث عندما كانت المخاطر غامضة حقًا.
      elections: |
        بعد نتيجة مفاجئة، يشرح الخبراء لماذا كان الأمر "واضحًا" بأثر رجعي.
      medical: |
        "كانت العلامات موجودة" عند تشخيص حالة نادرة بعد الواقعة.
    real_world_implications: |
      يشوه تحيز الإدراك بأثر رجعي المسؤولية القانونية، وتقييم الأداء، والتعلم.
      يجعلنا واثقين بشكل مفرط في حكمنا وغير عادلين تجاه أولئك الذين اتخذوا قرارات معقولة بمعلومات محدودة.
    professional_application:
      networking_and_relationship_building: |
        عند تقييم قرارات الآخرين الماضية، افصل بوعي بين ما كان معروفًا حينها وما تعرفه الآن. تجنب عبارة "قلت لك ذلك" عندما لم تتنبأ بالنتيجة بالفعل.
      collaborative_learning_initiative: |
        في تحليلات ما بعد الحدث، استخدم تقنيات "ما قبل الحدث" أو "مذكرات القرار" لالتقاط عدم اليقين وقت اتخاذ القرار. قارن عدم اليقين الفعلي بإعادة بناء الإدراك بأثر رجعي.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        تجاهل كل فشل باعتباره "غير قابل للتنبؤ" عندما كان البعض قابلاً للتنبؤ.
      no_accountability: |
        استخدام تحيز الإدراك بأثر رجعي لتجنب محاسبة الناس على الإهمال.
      false_uncertainty: |
        الإفراط في التصحيح للاعتقاد بأننا لا نستطيع التنبؤ بأي شيء أبدًا.
      undermining_learning: |
        رفض استخلاص الدروس لأن "الإدراك بأثر رجعي واضح" - لا يزال بإمكاننا التعلم من النتائج.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: الخصم الزائدي
    quick_introduction: |
      الخصم الزائدي هو الميل إلى تفضيل المكافآت الأصغر، الفورية
      على المكافآت الأكبر، المتأخرة—وخصم المستقبل بشكل أكثر حدة مما
      تتنبأ به النماذج العقلانية. نحن نبالغ في تقدير الحاضر ونقلل من
      تقدير المستقبل بطرق غير متسقة.
    one_liner: نفضل الأصغر عاجلاً على الأكبر لاحقًا — ونخصم المستقبل بشكل غير متسق.
    try_this:
      - التزام مسبق: اتخذ قرارات لمصلحة نفسك المستقبلية عندما تكون في حالة هدوء.
      - إعادة تأطير: هل سأرغب في هذا بعد 10 دقائق؟ بعد 10 أشهر؟ للكشف عن عدم الاتساق.
      - استخدم أجهزة الالتزام لربط نفسك المستقبلية بخيارات أفضل.
    ask_yourself:
      - هل أبالغ في تقدير الحاضر على حساب نفسي المستقبلية؟
      - هل سأتخذ هذا القرار إذا تأخرت المكافأة يومًا واحدًا؟ سنة واحدة؟
    in_more_detail: |
      قد نفضل 50 دولارًا اليوم على 100 دولار في غضون عام، ولكننا نفضل أيضًا 100 دولار في غضون عامين على 50 دولارًا في غضون عام واحد — على الرغم من أن هذا غير متسق. معدل الخصم لدينا ليس ثابتًا؛ إنه زائدي. المستقبل القريب
      يتم خصمه بشدة؛ المستقبل البعيد يتم خصمه بشكل أقل حدة. هذا
      يوضح التسويف والإدمان وعدم الادخار الكافي.

      التحيز للحاضر هو مفهوم مرتبط: نعطي اللحظة الحالية
      وزنًا غير متناسب. يوضح الخصم الزائدي سبب قيامنا بالتزامات لا نفي بها ولماذا التخطيط طويل الأجل صعب.
    why_this_is_important: |
      يساعدك فهم الخصم الزائدي على تصميم حوافز أفضل،
      والالتزام بنفسك المستقبلية، وتجنب فخاخ الأجل القصير.
      وهو يوضح سبب تسويفنا ولماذا نكافح لتحقيق
      الأهداف طويلة الأجل.
    when_to_use:
      - اتخاذ_القرارات
      - خطوات_مهنية
      - الاستثمار
      - القيادة
    how_can_you_spot_it:
      present_preference: |
        اختيار الإشباع الفوري على المكافآت المتأخرة والأكبر.
      inconsistent_time_preferences: |
        تفضيلات تنعكس مع مرور الوقت (على سبيل المثال، نريد اتباع نظام غذائي
        غدًا ولكن نأكل اليوم).
      commitment_failures: |
        وضع خطط لا نتبعها عندما يصبح المستقبل حاضرًا.
      procrastination: |
        تأجيل المهام الهامة لصالح الراحة الفورية.
    examples:
      savings: |
        الاختيار بين الإنفاق الآن بدلاً من الادخار للتقاعد — المستقبل
        يبدو مجردًا.
      health: |
        تخطي التمارين اليوم من أجل الراحة، على الرغم من معرفتنا بأننا سنندم
        عليها — ندم الغد يتم خصمه.
      addiction: |
        اختيار الشعور بالنشوة الفورية على الصحة طويلة الأجل.
      deadlines: |
        عدم القيام بأي شيء حتى يلوح الموعد النهائي — ثم يصبح "الحاضر" يشمل
        الموعد النهائي ونتصرف.
    real_world_implications: |
      يؤثر الخصم الزائدي على الادخار والصحة والتعليم والإدمان.
      وهو يوضح العديد من حالات فشل ضبط النفس. يمكن لأجهزة
      الالتزام (مثل الادخار التلقائي، والمساءلة) المساعدة من خلال
      تقييد الخيارات المستقبلية.
    professional_application:
      networking_and_relationship_building: |
        عند طلب التزامات مستقبلية، أنشئ مساءلة تجعل المستقبل "حاضرًا"
        (مثل: متابعات، مواعيد نهائية). لا تفترض أن الناس سيلتزمون دون هيكل.
      collaborative_learning_initiative: |
        استخدم أجهزة الالتزام: الالتزامات العامة، والالتزام المسبق
        بالمواعيد النهائية، والهياكل التي تجعل الأهداف طويلة الأجل تبدو أكثر
        إلحاحًا. قسّم المشاريع الطويلة إلى مراحل أقصر.
    how_can_this_be_misapplied:
      excessive_control: |
        تقييد خيارات الناس بشكل مفرط باسم "مساعدة"
        أنفسهم المستقبلية.
      paternalism: |
        افتراض أننا نعرف ما هو الأفضل لمصالح الآخرين على المدى الطويل.
      ignoring_present_needs: |
        تجاهل احتياجات الحاضر المشروعة لصالح فوائد
        مستقبلية مجردة.
      one_size_fits_all: |
        يختلف الأشخاص في معدلات الخصم؛ لا يحتاج الجميع إلى نفس
        أجهزة الالتزام.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: وهم السيطرة
    quick_introduction: |
      وهم السيطرة هو الميل إلى المبالغة في تقدير قدرتنا على التأثير في النتائج. نعتقد أن لدينا سيطرة أكثر مما لدينا بالفعل - على الأحداث العشوائية، والآخرين، والأنظمة المعقدة. نخلط بين الارتباط والسببية، وبين الفعل والتأثير.
    one_liner: نبالغ في تقدير قدرتنا على التأثير في النتائج - وخاصة العشوائية منها.
    try_this:
      - Ask: ماذا سيحدث لو لم أفعل شيئًا؟ هل فعلي يسبب النتيجة بالفعل؟
      - Distinguish what you can control from what you can't. (ميّز ما يمكنك التحكم فيه مما لا يمكنك.)
      - Notice when you're superstitiously linking your actions to random results. (لاحظ متى تربط أفعالك بنتائج عشوائية بشكل خُرافي.)
    ask_yourself:
      - Am I confusing correlation with causation? (هل أخلط بين الارتباط والسببية؟)
      - Would the outcome be different if I hadn't acted? (هل ستكون النتيجة مختلفة لو لم أتصرف؟)
    in_more_detail: |
      يشعر الناس بمزيد من الثقة في الفوز باليانصيب عندما يختارون أرقامهم الخاصة - على الرغم من أن ذلك لا يغير الاحتمالات. نُلقي النرد بقوة أكبر عندما نريد أرقامًا عالية. نعتقد أن طقوسنا أو سلوكياتنا تؤثر على نتائج عشوائية في الواقع أو محددة بعوامل خارجة عن سيطرتنا. الوهم مريح؛ فهو يقلل القلق. لكنه يمكن أن يؤدي إلى الثقة المفرطة واتخاذ قرارات سيئة.

      يكون الوهم أقوى عندما نشارك في العملية، وعندما نحقق نجاحًا مبكرًا، وعندما تكون المهمة مألوفة. يؤثر هذا على الاستثمار والإدارة والحياة اليومية.
    why_this_is_important: |
      التعرف على وهم السيطرة يساعدك على معايرة توقعاتك، وتجنب الثقة المفرطة، وتركيز الجهد حيثما يهم حقًا. كما يفسر سبب استمرارنا في السلوكيات الخرافية والمبالغة في تقدير تأثيرنا.
    when_to_use:
      - اتخاذ_القرار
      - تقييم_المخاطر
      - الاستثمار
      - القيادة
    how_can_you_spot_it:
      overestimated_influence: |
        الاعتقاد بأن أفعالنا تؤثر على النتائج عندما لا تفعل.
      ritual_superstition: |
        سلوكيات نعتقد أنها تؤثر على النتائج (قميص الحظ، روتين ما قبل المباراة) عندما لا تفعل.
      choice_illusion: |
        الشعور بأن الاختيار يمنحنا السيطرة عندما لا يؤثر الاختيار على النتيجة.
      action_bias: |
        تفضيل "فعل شيء ما" على "الانتظار" حتى عندما لا يساعد الفعل.
    examples:
      gambling: |
        اختيار أرقام اليانصيب يبدو أكثر قابلية للتحكم من الاختيار العشوائي - الاحتمالات هي نفسها.
      investing: |
        المتداولون النشطون يبالغون في تقدير قدرتهم على التفوق على السوق؛ معظمهم يحقق أداءً أقل بعد خصم التكاليف.
      management: |
        القادة يبالغون في تقدير تأثيرهم على نتائج المنظمة؛ فالعديد من العوامل خارجة عن سيطرتهم.
      sports: |
        يعتقد المشجعون أن تشجيعهم يؤثر على اللعبة؛ لدى اللاعبين طقوس محظوظة.
    real_world_implications: |
      يؤثر وهم السيطرة على المخاطرة، والمثابرة في الجهود العقيمة، وإسناد النتائج. يمكن أن يحفز الفعل (وهو مفيد أحيانًا) ولكنه قد يؤدي أيضًا إلى إهدار الجهد والثقة المفرطة. المعايرة تحسن جودة القرار.
    professional_application:
      networking_and_relationship_building: |
        اعرف ما يمكنك التحكم فيه وما لا يمكنك. ركّز طاقتك على العوامل القابلة للتأثير. لا تدّعِ الفضل في نتائج لم تتسبب فيها - أو اللوم على تلك التي لم تستطع منعها.
      collaborative_learning_initiative: |
        في التخطيط، ميّز بين العوامل التي يمكن التحكم فيها وتلك التي لا يمكن. تجنب الثقة الزائفة من الانتصارات المبكرة. استخدم التفكير الاحتمالي لمعايرة التوقعات.
    how_can_this_be_misapplied:
      learned_helplessness: |
        التصحيح المفرط للاعتقاد بأننا لا نملك أي سيطرة عندما نملك تأثيرًا ذا مغزى.
      dismissing_agency: |
        "كلها حظ" عندما تكون المهارة والجهد مهمين في العديد من المجالات.
      false_fatalism: |
        استخدام وهم السيطرة لتبرير عدم التصرف.
      one_size_fits_all: |
        تختلف السيطرة حسب المجال؛ بعض المواقف تكون أكثر قابلية للتحكم من غيرها.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: تحيز التأثير
    quick_introduction: |
      تحيز التأثير هو الميل إلى المبالغة في تقدير شدة ومدة
      ردود أفعالنا العاطفية تجاه أحداث مستقبلية. نعتقد أن الأشياء الجيدة ستجعلنا
      أسعد مما هي عليه، والأشياء السيئة ستجعلنا أكثر تعاسة مما هي عليه. نحن سيئون في التنبؤ العاطفي.
    one_liner: نحن نبالغ في تقدير مدى تأثير الأحداث على سعادتنا - ولفترة طويلة.
    try_this:
      - Ask: كيف شعرت بعد أحداث مماثلة في الماضي؟ نحن نتكيف بشكل أسرع مما نتوقع.
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings. لا تدع التأثير المتوقع يقود القرارات - نحن سيئون في التنبؤ بالمشاعر.
      - Notice when you're overestimating the lasting effect of a single outcome. لاحظ عندما تبالغ في تقدير التأثير الدائم لنتيجة واحدة.
    ask_yourself:
      - Am I overestimating how long I'll feel this way? هل أبالغ في تقدير المدة التي سأشعر فيها بهذه الطريقة؟
      - What does past experience say about similar events? ماذا تقول التجربة السابقة عن أحداث مماثلة؟
    in_more_detail: |
      يبحث دانيال جيلبرت وتيموثي ويلسون في التنبؤ العاطفي: نحن
      نبالغ في تقدير المدة التي سنشعر فيها بالرضا بعد فوز أو بالسوء بعد خسارة.
      نتكيف بشكل أسرع مما نتوقع. كما نبالغ في تقدير تأثير
      الأحداث الفردية - نعتقد أن نتيجة واحدة ستحدد سعادتنا بينما
      تساهم عوامل كثيرة. نركز على الأشياء الخاطئة عند التنبؤ
      بمشاعرنا المستقبلية.

      يؤثر تحيز التأثير على قرارات الحياة الرئيسية: نبالغ في تقدير مدى
      تغيير ترقية أو علاقة أو شراء لسعادتنا. نبالغ أيضاً في تقدير
      الألم الدائم للخسائر.
    why_this_is_important: |
      يساعدك التعرف على تحيز التأثير على اتخاذ قرارات أفضل بشأن ما
      سيحسن حياتك بالفعل. إنه يقلل من الاستثمار الزائد في النتائج
      التي لن تكون مهمة بقدر ما تعتقد، ويقلل من الخوف من النتائج
      التي لن تؤذي بقدر ما تتوقع.
    when_to_use:
      - اتخاذ_القرارات
      - تحركات_وظيفية
      - تقييم_المخاطر
      - بناء_العلاقات
    how_can_you_spot_it:
      overestimated_impact: |
        "هذا سيغير كل شيء" عندما كان للأحداث الماضية المماثلة تأثير
        محدود ودائم.
      duration_overestimation: |
        "لن أتجاوز هذا أبداً" عندما نتكيف عادة بشكل أسرع مما
        نتوقع.
      focalism: |
        التركيز على حدث واحد وتجاهل العوامل الأخرى التي تؤثر على
        الرفاهية.
      adaptation_neglect: |
        نسيان أننا نتكيف مع الظروف الجيدة والسيئة على حد سواء.
    examples:
      career: |
        "إذا حصلت على هذه الترقية، سأكون أسعد بكثير" عندما كان
        للترقيات السابقة تأثير مؤقت.
      purchases: |
        "هذه السيارة ستجعلني سعيداً" عندما يتبدد الابتكار بسرعة.
      loss: |
        "لن أتعافى أبداً من هذا الرفض" عندما نتكيف عادة
        في غضون أشهر.
      events: |
        المبالغة في تقدير مدى تأثير حفل زفاف أو عطلة أو حدث مهم على
        السعادة طويلة الأمد.
    real_world_implications: |
      يؤدي تحيز التأثير إلى قرارات سيئة بشأن المال والوظيفة والعلاقات.
      ندفع مبالغ إضافية مقابل تجارب سنتكيف معها ونخاف من خسائر سنتعافى منها.
      يؤثر على السياسات والتخطيط الشخصي.
    professional_application:
      networking_and_relationship_building: |
        عند اتخاذ قرارات وظيفية أو علاقات، فكر في شعورك بعد أحداث
        ماضية مماثلة. هل استمر التأثير طويلاً كما توقعت؟ استخدم ذلك
        لتعديل تنبؤاتك المستقبلية.
      collaborative_learning_initiative: |
        عندما تواجه الفرق نكسات أو انتصارات، ذكرهم بالتكيف.
        "سنتكيف بشكل أسرع مما نعتقد" يمكن أن يقلل من الاحتفال المفرط
        واليأس المفرط على حد سواء.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        بعض الأحداث لها تأثير دائم - صدمة، خسارة كبيرة. لا تتجاهل
        كل التنبؤ العاطفي على أنه متحيز.
      cold_rationality: |
        "لن يهم" بينما التجربة في الوقت الحالي مهمة.
      undervaluing_experiences: |
        تجنب التجارب الإيجابية لأن "نا سنتكيف على أي حال".
      invalidating_emotions: |
        إخبار الناس بأن مشاعرهم ستزول بينما يحتاجون إلى الدعم
        في الوقت الحالي.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: تحيز المجموعة الداخلية
    quick_introduction: |
      تحيز المجموعة الداخلية هو الميل إلى تفضيل الأشخاص الذين نعتبرهم جزءًا من مجموعتنا على أولئك الذين نعتبرهم غرباء. ننسب صفات إيجابية لأعضاء مجموعتنا الداخلية وصفات سلبية لأعضاء المجموعات الخارجية، غالبًا بناءً على اختلافات طفيفة أو اعتباطية.
    one_liner: نحن نفضل مجموعتنا الداخلية ونحكم على المجموعات الخارجية بقسوة أكبر - غالبًا بشكل اعتباطي.
    try_this:
      - Ask: هل سأحكم على هذا الشخص بنفس الطريقة لو كان في مجموعتي؟
      - Actively seek out-group perspectives when making decisions.
      - Notice when group boundaries are shaping your judgment.
    ask_yourself:
      - Am I favoring someone because they're "one of us"?
      - Would I apply the same standards to an out-group member?
    in_more_detail: |
      حتى عندما يتم تعيين المجموعات بشكل عشوائي (على سبيل المثال، عن طريق رمي العملة)، يطور الأشخاص بسرعة تفضيلًا لمجموعتهم الداخلية. نحن نثق بأعضاء مجموعتنا الداخلية أكثر، ونخصص لهم موارد أكثر كرمًا، ونحكم على أفعالهم بمزيد من التعاطف. يتلقى أعضاء المجموعات الخارجية المعاملة المعاكسة.

      يغذي تحيز المجموعة الداخلية القبلية والتمييز والصراع. إنه يؤثر على التوظيف والترقية والتعاون والسياسة. يمكن أن يستند إلى العرق أو الجنسية أو الشركة أو الفريق أو أي هوية مشتركة.
    why_this_is_important: |
      التعرف على تحيز المجموعة الداخلية يساعدك على اتخاذ قرارات أكثر عدلاً، وبناء فرق أكثر شمولاً، وتجنب المحسوبية. كما أنه يفسر سبب مواجهة مبادرات التنوع للمقاومة - تفضيل المجموعة الداخلية تلقائي.
    when_to_use:
      - القيادة
      - اتخاذ_القرار
      - بناء_العلاقات
      - حل_النزاعات
    how_can_you_spot_it:
      preferential_treatment: |
        إعطاء فائدة الشك لـ "نحن" ولكن ليس لـ "هم".
      resource_allocation: |
        تخصيص المزيد لأعضاء المجموعة الداخلية عندما يكون لأعضاء المجموعات الخارجية حاجة متساوية أو أكبر.
      attribution_asymmetry: |
        نجاح المجموعة الداخلية = مهارة؛ نجاح المجموعة الخارجية = حظ. فشل المجموعة الداخلية = ظرف؛ فشل المجموعة الخارجية = شخصية.
      minimal_group_effects: |
        تظهر المحسوبية حتى مع تعيينات المجموعات الاعتباطية.
    examples:
      hiring: |
        تفضيل المرشحين الذين ذهبوا إلى جامعتي الأم أو يشاركونني خلفيتي.
      performance_reviews: |
        تقييم أعضاء المجموعة الداخلية بشكل أكثر إيجابية من أعضاء المجموعات الخارجية ذوي الأداء المماثل.
      collaboration: |
        الثقة في "فريقنا" وإشراكه مع استبعاد أو التشكيك في "فريقهم".
      politics: |
        رفض حجج المجموعات الخارجية مع قبول حجج المجموعة الداخلية دون نقد.
    real_world_implications: |
      يؤدي تحيز المجموعة الداخلية إلى استمرار عدم المساواة، وتقويض الجدارة، وتغذية الصراع. إنه يؤثر على التوظيف والترقية والاستثمار والسياسة. يتطلب الحد منه جهدًا متعمدًا - لن يصلح نفسه.
    professional_application:
      networking_and_relationship_building: |
        قم بتضمين الأشخاص خارج دائرتك المباشرة بنشاط. ابحث عن وجهات نظر متنوعة. تساءل عما إذا كنت تفضل شخصًا لأنه "مثلك".
      collaborative_learning_initiative: |
        استخدم عمليات منظمة (مراجعات معتمدة، لجان متنوعة) لتقليل تحيز المجموعة الداخلية في التوظيف والتقييم. أنشئ مشاريع عبر المجموعات لبناء هوية مشتركة.
    how_can_this_be_misapplied:
      forced_diversity: |
        تنفيذ حصص أو سياسات تخلق الاستياء دون معالجة التحيز الأساسي.
      out_group_hostility: |
        التعامل مع تحيز المجموعة الداخلية على أنه المشكلة الوحيدة عندما يكون هناك أيضًا عداء تجاه المجموعة الخارجية.
      ignoring_legitimate_differences: |
        ليست كل الاختلافات بين المجموعات تحيزات - ففي بعض الأحيان تكون للمجموعات خصائص مختلفة. لا تفترض أن جميع التفاوتات هي تمييز.
      reverse_discrimination: |
        الإفراط في التصحيح لتفضيل المجموعات الخارجية بطرق غير عادلة تجاه أعضاء المجموعة الداخلية.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: الانعكاس
    quick_introduction: |
      الانعكاس هو تقنية لحل المشكلات تقوم بعكس السؤال رأسًا على عقب. بدلًا من
      السؤال "كيف أنجح؟" تسأل "ما الذي سيجعلني أفشل؟" وتتجنب تلك الأمور.
      إنه يكشف المخاطر والأنماط السلبية التي غالبًا ما تفوتها التفكير الأمامي.
    one_liner: اعكس—اسأل ما الذي سيجعلك تفشل، ثم تجنب تلك الأمور.
    try_this:
      - لأي هدف، قم بسرد الطرق الرئيسية التي قد تفشل بها—ثم تجنبها.
      - استخدم التصور السلبي: ما الذي سيجعل هذا الأمور تسير بشكل خاطئ؟
      - اسأل: ماذا سيفعل شخص ذكي لإفساد هذا؟
    ask_yourself:
      - هل فكرت فيما سيجعل هذا يفشل؟
      - ما الذي لا أراه بالنظر فقط إلى الأمام؟
    in_more_detail: |
      اشتهر بها تشارلي مانجر وتستند إلى المنطق الرياضي، يستغل الانعكاس
      حقيقة أن تجنب الفشل غالبًا ما يكون أسهل من السعي لتحقيق النجاح. إذا كان بإمكانك
      تحديد الطرق الرئيسية التي تسوء بها الأمور، يمكنك القضاء عليها بشكل منهجي.

      يقال أن كارل جاكوبي قال: "اعكس، دائمًا اعكس." استخدم الرواقيون التصور السلبي—
      تخيل الخسارة—لتقدير ما لديهم والاستعداد للمصائب.
      الانعكاس ليس تشاؤمًا؛ بل هو طريقة منظمة لإحراز تقدم من خلال إزالة
      العقبات.
    why_this_is_important: |
      يساعدك الانعكاس على تجنب الأخطاء الكارثية، واختبار الخطط، والعثور على
      حلول غير واضحة. إنه يكمل التخطيط الأمامي من خلال ضمان عدم
      تجاهل أوضاع الفشل الحرجة.
    when_to_use:
      - حل_المشكلات
      - اتخاذ_القرارات
      - تقييم_المخاطر
      - خطوات_مهنية
    how_can_you_spot_it:
      premortem_thinking: |
        قبل المشروع، اسأل "لماذا فشل هذا؟" كما لو كان قد فشل بالفعل.
      anti_goals: |
        تحديد ما تريد تجنبه بوضوح كما تحدد ما تريد تحقيقه.
      reverse_engineering_failure: |
        دراسة الحالات الفاشلة لاستخلاص الدروس بدلاً من دراسة النجاحات فقط.
      constraint_focus: |
        تحديد القيود والاختناقات قبل تحسين الإيجابيات.
    examples:
      investing: |
        بدلاً من "ما الذي سيجعل سعر السهم هذا يرتفع؟" اسأل "ما الذي سيجعلني أخسر المال؟"
        وتجنب تلك السيناريوهات.
      career: |
        "ما الذي سيدمر سمعتي؟" يؤدي إلى قائمة بالسلوكيات التي يجب تجنبها.
      product_launch: |
        "لماذا تفشل معظم عمليات إطلاق المنتجات؟" يكشف عن المخاطر التي يجب معالجتها قبل الإطلاق.
      health: |
        "ما هي العادات التي تقصر العمر؟" تعطي قائمة أوضح للتجنب من "ما الذي يجعلني
        صحيًا؟"
    real_world_implications: |
      يستخدم الانعكاس في الهندسة (تحليل أوضاع الفشل)، والاستثمار، والاستراتيجية.
      إنه يقلل من الثقة المفرطة ويحسن إدارة المخاطر. الاعتماد المفرط يمكن أن يؤدي إلى
      الحذر المفرط.
    professional_application:
      networking_and_relationship_building: |
        "ما الذي سيلحق الضرر بهذه العلاقة؟" يساعدك على تجنب السلوكيات التي تدمر الثقة.
      collaborative_learning_initiative: |
        قم بإجراء عمليات ما قبل الوفاة على المشاريع: "فشل هذا. لماذا؟" استخدم الإجابات لتحسين
        التخطيط والتنفيذ.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        التركيز فقط على تجنب الفشل يمكن أن يشل العمل ويمنع المخاطرة الضرورية.
      negativity_bias: |
        يمكن للانعكاس أن يضخم التحيز السلبي إذا لم يتم موازنته مع تحديد الفرص
        التطلعية.
      analysis_paralysis: |
        قضاء الكثير من الوقت على أوضاع الفشل لدرجة أنك لا تنفذ أبدًا.
      missing_upside: |
        الانعكاس لا يخبرك بما يجب عليك فعله—فقط بما يجب تجنبه. ما زلت بحاجة إلى
        أهداف إيجابية.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: قانون تناقص العوائد
    quick_introduction: |
      ينص قانون تناقص العوائد على أنه مع إضافة المزيد من مدخل واحد مع ثبات المدخلات الأخرى، فإن الناتج الإضافي من كل وحدة مدخلات جديدة يتناقص في النهاية. المزيد ليس دائمًا أفضل - هناك نقطة حيث يؤدي الجهد الإضافي إلى تحقيق عائد أقل وأقل.
    one_liner: يؤدي المزيد من المدخلات في النهاية إلى مخرجات أقل - هناك نقطة مثلى.
    try_this:
      - Ask: هل تجاوزت النقطة التي يؤدي فيها الجهد الإضافي إلى عوائد ذات مغزى؟
      - Prioritize the highest-leverage inputs; stop when marginal returns drop. (أعط الأولوية للمدخلات ذات التأثير الأكبر؛ توقف عندما تنخفض العوائد الهامشية.)
      - Notice when you're over-investing in something that's already paid off. (لاحظ عندما تفرط في الاستثمار في شيء قد آتى ثماره بالفعل.)
    ask_yourself:
      - What would I gain from one more unit of effort here? (ماذا سأكسب من وحدة جهد إضافية هنا؟)
      - Am I optimizing past the point of diminishing returns? (هل أقوم بالتحسين بعد نقطة تناقص العوائد؟)
    in_more_detail: |
      في الاقتصاد، تؤدي إضافة المزيد من العمال إلى كمية ثابتة من الأرض في النهاية إلى مكاسب هامشية أصغر. في الإنتاجية الشخصية، قد تضيف الساعة الأولى من الدراسة قيمة أكبر من الساعة العاشرة. ينطبق المبدأ على الموارد والجهد والوقت والميزات. هناك نقطة مثلى؛ وما بعدها، تنخفض العوائد الهامشية ويمكن أن تصبح سلبية.

      يساعد التعرف على تناقص العوائد على تخصيص الموارد بكفاءة وتجنب الإفراط في الاستثمار في المجالات التي قد آتت معظم قيمتها بالفعل.
    why_this_is_important: |
      يمنع فهم تناقص العوائد الإفراط في الاستثمار، ويوجه تحديد الأولويات، ويساعدك على معرفة متى تتوقف. إنه ضروري لتخصيص الموارد وتجنب المثالية.
    when_to_use:
      - اتخاذ_القرارات
      - حل_المشكلات
      - الاستثمار
      - تحركات_وظيفية
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        تنتج كل وحدة إضافية من الجهد أو الموارد ناتجًا أقل من الوحدة السابقة.
      perfectionism_trap: |
        السعي لتحقيق آخر 10٪ من الجودة يستهلك جهدًا غير متناسب.
      overinvestment: |
        الاستمرار في إضافة الموارد عندما تكون العوائد الهامشية منخفضة أو سلبية.
      optimal_point_passed: |
        لقد تجاوزت النقطة التي يؤدي فيها المزيد من المدخلات إلى تحسين النتائج.
    examples:
      studying: |
        تضيف أول ساعتين من الاستعداد للامتحان أكثر من الساعتين 7-8؛ هناك نقطة تناقص العوائد.
      product_features: |
        قد يؤدي إضافة المزيد من الميزات إلى تطبيق ما إلى إرباك المستخدمين؛ الميزة العشرين تضيف قيمة أقل من الخامسة.
      hiring: |
        يمكن أن يؤدي إضافة المزيد من الأشخاص إلى مشروع ما إلى إبطائه (قانون بروكس) بعد نقطة معينة.
      marketing: |
        مضاعفة الإنفاق الإعلاني لا يضاعف النتائج؛ تتضاءل العوائد مع تشبع السوق.
    real_world_implications: |
      يوجه قانون تناقص العوائد السياسة الاقتصادية، واستراتيجيات الأعمال، والإنتاجية الشخصية. تجاهله يؤدي إلى هدر الموارد ونتائج دون المستوى الأمثل. إنه يدعم مبدأ باريتو والتركيز.
    professional_application:
      networking_and_relationship_building: |
        قد يؤدي الاستثمار في عدد قليل من العلاقات العميقة إلى عائد أكبر من توزيع الجهد بشكل رقيق عبر العديد. تعرف على متى يكون للتواصل الإضافي عوائد متناقصة.
      collaborative_learning_initiative: |
        لا تعني ساعات التدريب الإضافية دائمًا نتائج أفضل. ابحث عن الجرعة المثلى وتجنب الإفراط في التحميل.
    how_can_this_be_misapplied:
      premature_optimization: |
        التوقف مبكرًا جدًا قبل الوصول إلى مستوى جودة معقول.
      undershooting: |
        استخدام تناقص العوائد كذريعة لعدم بذل جهد كافٍ.
      misidentifying_the_curve: |
        افتراض تناقص العوائد عندما تكون في الواقع على جزء مختلف من المنحنى (على سبيل المثال، مرحلة النمو الأسي المبكر).
      one_size_fits_all: |
        تطبيق "النقطة المثلى" نفسها عبر سياقات مختلفة حيث تختلف المنحنيات.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: التحيز لتجنب الخسارة
    quick_introduction: |
      التحيز لتجنب الخسارة هو الميل إلى تفضيل تجنب الخسائر على اكتساب مكاسب مكافئة.
      يشعر الناس بألم الخسارة بقوة مضاعفة تقريبًا مقارنة بمتعة المكسب.
    one_liner: تبدو الخسائر مؤلمة بضعف ما تبدو عليه المكاسب المكافئة.
    try_this:
      - "اسأل نفسك: هل أبالغ في تقدير ما سأخسره مقابل ما سأكتسبه؟"
      - أعد صياغة الخيار كمكاسب بدلاً من خسائر وانظر إذا تغيرت وجهة نظرك.
      - لاحظ متى يكون الخوف من الخسارة هو المحرك الرئيسي للقرار أكثر من الفائدة الحقيقية.
    ask_yourself:
      - ماذا سأختار لو بدأت من الصفر؟
      - هل أتمسك بهذا الشيء بسبب ما سأخسره، أم لأن المستقبل أفضل حقًا؟
    in_more_detail: |
      تم تطوير التحيز لتجنب الخسارة بواسطة دانيال كانيمان وعاموس تفيرسكي، ويصف كيف يُنظر إلى الخسائر والمكاسب بشكل غير متماثل. التأثير النفسي لخسارة 100 دولار عادة ما يكون أكبر بكثير من الرضا عن كسب 100 دولار. يؤثر هذا التحيز على القرارات في مجالات التمويل والمفاوضات والاختيارات اليومية، وغالبًا ما يؤدي إلى سلوك متحفظ تجاه المخاطر عندما تكون الخسائر المحتملة واضحة.
    why_this_is_important: |
      يساعد فهم التحيز لتجنب الخسارة على التعرف على متى يكون الخوف من الخسارة هو المحرك للقرارات أكثر من التحليل العقلاني. يفسر لماذا يتمسك الناس بالاستثمارات الخاسرة، ويتجنبون التغييرات الضرورية، ويتخذون قرارات دون المستوى الأمثل في المفاوضات والقرارات المهنية.
    when_to_use:
      - صنع_القرار
      - الاستثمار
      - التحركات_المهنية
      - تقييم_المخاطر
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        لاحظ متى يثير احتمال خسارة شيء ما قلقًا أو مقاومة غير متناسبة مقارنة بفرصة المكسب المحتمل.
      reluctance_to_change: |
        التردد في تغيير الاستراتيجيات، أو ترك وظيفة، أو بيع أصل حتى عندما يشير التحليل الموضوعي إلى أنه الخيار الأفضل.
      framing_sensitivity: |
        تتغير القرارات بشكل كبير بناءً على ما إذا كانت الخيارات مصاغة كمكاسب أو خسائر، حتى عندما تكون النتائج متكافئة.
      overvaluing_what_you_have: |
        تأثير الوقف – تقدير الأشياء التي تمتلكها بقيمة أعلى لمجرد امتلاكها – غالبًا ما يصاحب التحيز لتجنب الخسارة.
    examples:
      investing: |
        التمسك بسهم متراجع "لتجنب تحقيق الخسارة" مع تفويت فرص استثمارية أفضل في أماكن أخرى.
      career: |
        البقاء في وظيفة غير مُرضية لأن المغادرة تبدو وكأنها خسارة للأمان، حتى عندما توفر الفرصة الجديدة نموًا أكبر.
      negotiations: |
        رفض عرض عادل لأنه مصاغ على أنه "التخلي" عن شيء ما، بدلاً من "اكتساب" اتفاق.
      product_design: |
        التجارب المجانية التي تتحول إلى مدفوعة - يختبر المستخدمون "خسارة" الخدمة عندما تنتهي الفترة التجريبية، مما يحفز الاشتراك أكثر من "اكتساب" خدمة جديدة.
    real_world_implications: |
      يشكل التحيز لتجنب الخسارة الأسواق والسياسات والسلوك الفردي. يفسر سبب بيع التأمين والضمانات بشكل جيد، ولماذا يتجنب الناس التغييرات المفيدة، ولماذا يكون للأخبار السلبية تأثير كبير. يمكن أن يؤدي التعرف عليه إلى تحسين جودة القرارات وتقليل القرارات المدفوعة بالندم.
    professional_application:
      networking_and_relationship_building: |
        كن على دراية بأن الأشخاص قد يقاومون إنهاء العلاقات أو التعاون غير المثمر بسبب التحيز لتجنب الخسارة - فهم يخشون "فقدان" الاتصال. صغ الفرص الجديدة كمكاسب بدلاً من خسائر لتقليل المقاومة.
      collaborative_learning_initiative: |
        عند تقديم عمليات أو أدوات جديدة، ركز على ما تكتسبه الفريق بدلاً من ما "يتخلى عنه". غالبًا ما تثير مبادرات التغيير المصاغة على أنها خسارة مقاومة أقوى.
    how_can_this_be_misapplied:
      manipulation: |
        استغلال التحيز لتجنب الخسارة للضغط في اتخاذ القرارات - على سبيل المثال، عروض "الوقت المحدود" أو صياغة "لا تفوت" التي تثير الخوف من الخسارة بدلاً من تقييم القيمة الحقيقية.
      misinterpreting_relationships: |
        افتراض أن مقاومة شخص ما للتغيير عقلانية بحتة عندما قد تكون مدفوعة بالتحيز لتجنب الخسارة. يمكن أن يؤدي سوء تفسير الدوافع إلى إلحاق الضرر بالثقة.
      overcommitment: |
        مغالطة التكلفة الغارقة - الاستمرار في الاستثمار في مشروع فاشل لأن "نا قد استثمرنا الكثير بالفعل" بدلاً من قطع الخسائر.
      missed_opportunities_for_conflict_resolution: |
        رفض التسوية لأن أي تنازل يبدو وكأنه خسارة، حتى عندما يكون البديل نتيجة أسوأ للجميع.
      vulnerability_to_exploitation: |
        التعرض للتلاعب من قبل الآخرين الذين يصيغون الخيارات لإثارة التحيز لتجنب الخسارة، مثل تكتيكات المبيعات التي تركز على ما "ستفقده" إذا لم تتصرف.
      reinforcing_negative_perceptions: |
        التركيز المفرط على السلبيات المحتملة يمكن أن يخلق نظرة سلبية تصبح تحقق ذاتها، وتفوت فرص النمو.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: الخريطة ليست الإقليم
    quick_introduction: |
      "الخريطة ليست الإقليم" تعني أن تمثيل الواقع ليس الواقع نفسه.
      النماذج والنظريات والأوصاف هي تبسيطات مفيدة، لكنها دائمًا ما تترك شيئًا.
      الخلط بين الخريطة والإقليم يؤدي إلى الخطأ.
    one_liner: الخريطة ليست الإقليم — كل النماذج خاطئة؛ بعضها مفيد.
    try_this:
      - عندما لا يتطابق نموذج مع الواقع، قم بتحديث الخريطة - لا تجبر الواقع على المطابقة.
      - اسأل: ما الذي يتجاهله هذا النموذج؟ متى قد يتعطل؟
      - تعامل مع النماذج كأدوات، وليس كحقائق.
    ask_yourself:
      - هل أخلط بين نموذجي والواقع؟
      - هل تغير الإقليم منذ آخر مرة نظرت فيها؟
    in_more_detail: |
      قدم ألفريد كورزيبسكي هذه الفكرة في علم الدلالة العام. خريطة مدينة
      مفيدة للتنقل، لكنها ليست المدينة - فهي تتجاهل التفاصيل، تصبح قديمة،
      ولا يمكنها أبدًا التقاط كل شيء. وينطبق الشيء نفسه على النماذج العقلية،
      والنظريات العلمية، والمخططات التنظيمية.

      كل النماذج خاطئة؛ بعضها مفيد. الخطر هو التعامل مع نموذج كما لو كان
      الحقيقة الكاملة، خاصة عندما يتغير الإقليم. التفكير الجيد يتطلب تحديث
      الخرائط عندما لا يتطابق الواقع.
    why_this_is_important: |
      إن إدراك أن الخرائط تختلف عن الأقاليم يمنع الثقة المفرطة في النماذج،
      ويشجع على تحديث المعتقدات، ويقلل من خطر التصرف بناءً على معلومات
      قديمة أو مبسطة بشكل مفرط.
    when_to_use:
      - صنع_القرار
      - حل_المشكلات
      - التعلم
      - تقييم_المخاطر
    how_can_you_spot_it:
      model_reality_confusion: |
        التعامل مع إطار عمل أو نظرية كما لو كانت تصف الواقع بالكامل.
      outdated_assumptions: |
        التصرف بناءً على معلومات أو نماذج لم تعد تتطابق مع الظروف الحالية.
      oversimplification: |
        تجاهل الفروق الدقيقة لأن "الخريطة" لا تتضمنها.
      map_worship: |
        الدفاع عن نموذج عندما تتعارض الأدلة معه بدلاً من تحديثه.
    examples:
      organizational_charts: |
        افتراض أن هيكل التقارير يعكس كيفية إنجاز العمل فعليًا.
      financial_models: |
        التعامل مع توقع جدول بيانات كتنبؤ بدلاً من سيناريو.
      stereotypes: |
        تطبيق تعميمات على مستوى المجموعة على الأفراد.
      strategy_docs: |
        تنفيذ خطة كما هي مكتوبة عندما يكون السوق قد تحول.
    real_world_implications: |
      التمييز بين الخريطة والإقليم أساسي للعلم والهندسة والفلسفة.
      وهو يدعم التحديث البيزي، والمنهجية الرشيقة، والتواضع المعرفي.
      تجاهل ذلك يؤدي إلى التفكير الجامد والفشل في الاستراتيجيات.
    professional_application:
      networking_and_relationship_building: |
        قد يكون نموذجك العقلي لشخص ما قديمًا. قم بتحديثه من خلال التفاعل المباشر
        بدلاً من الاعتماد على الانطباعات القديمة.
      collaborative_learning_initiative: |
        شجع الفرق على التعامل مع الخطط والنماذج كفرضيات ليتم اختبارها وتنقيحها،
        وليس كحقائق ثابتة.
    how_can_this_be_misapplied:
      radical_skepticism: |
        الوصول إلى استنتاج مفاده أن لا توجد خريطة مفيدة وأن كل المعرفة مشكوك فيها.
      constant_revision: |
        التحديث بشكل متكرر لدرجة عدم ظهور فهم مستقر.
      dismissing_models: |
        رفض التبسيطات المفيدة لأنها "ليست الإقليم".
      relativism: |
        ادعاء أن جميع الخرائط متساوية الصلاحية عندما يكون بعضها يتناسب مع الإقليم بشكل أفضل.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: تأثير التعرض البسيط
    quick_introduction: |
      تأثير التعرض البسيط هو الميل إلى تطوير تفضيل للأشياء
      لمجرد أننا معتادون عليها. التعرض المتكرر - حتى بدون
      تعزيز - يزيد الإعجاب. نميل إلى تفضيل ما نعرفه.
    one_liner: الألفة تولد الإعجاب - نفضل ما رأيناه من قبل.
    try_this:
      - اسأل: هل أحب هذا لأنه جيد، أم لأنه مألوف؟
      - عند تقييم الخيارات، قم بالتصحيح للتعرض - تبدأ الأشياء الجديدة في وضع غير مؤاتٍ.
      - لاحظ متى يؤثر التكرار على تفضيلك.
    ask_yourself:
      - هل أفضل شيئًا بشكل أساسي لأنني رأيته من قبل؟
      - هل سأختار بشكل مختلف إذا كان التعرض متساويًا؟
    in_more_detail: |
      أظهر روبرت زاجونك أن التعرض المتكرر للمنبهات (الوجوه، الكلمات، الأشكال)
      يزيد من التأثير الإيجابي تجاهها - حتى عندما لا نكون واعين
      بالتعرض. الألفة تولد الإعجاب، لا الازدراء (في كثير
      من الحالات). التأثير أقوى عندما لا نقوم بالتحليل وعندما يكون التعرض
      خفيًا.

      يؤثر تأثير التعرض البسيط على تفضيل العلامات التجارية، والجذب
      بين الأشخاص، والحكم الجمالي. يفسر لماذا نفضل الموسيقى المألوفة،
      ولماذا تعمل الإعلانات من خلال التكرار، ولماذا قد نفضل
      الأشخاص الذين رأيناهم من قبل - حتى بدون تفاعل.
    why_this_is_important: |
      التعرف على تأثير التعرض البسيط يساعدك على فهم تفضيلاتك الخاصة
      ومقاومة التلاعب من خلال التكرار. كما أنه
      يفسر لماذا الأهمية والرؤية مهمة للعلاقات
      والعلامات التجارية. الألفة تأثير قوي ولكن غالبًا ما يكون غير واعٍ.
    when_to_use:
      - بناء_العلاقات
      - اتخاذ_القرارات
      - القيادة
      - التعلم
    how_can_you_spot_it:
      familiarity_preference: |
        تفضيل الخيارات التي رأيناها من قبل على الخيارات الجديدة.
      repetition_influence: |
        يزيد التعرض المتكرر من الإعجاب بدون إقناع صريح.
      unconscious_influence: |
        يعمل التأثير حتى عندما لا نكون واعين بالتعرض.
      brand_recognition: |
        يتم تفضيل العلامات التجارية المألوفة حتى عندما لا نستطيع تفسير السبب.
    examples:
      advertising: |
        يزيد التعرض المتكرر لعلامة تجارية من التفضيل - حتى بدون
        رسائل مقنعة.
      music: |
        الأغاني التي سمعناها من قبل نميل إلى الإعجاب بها أكثر من الأغاني الجديدة
        عند الاستماع الأول.
      people: |
        نميل إلى الإعجاب بالأشخاص الذين رأيناهم بشكل متكرر (مثل زملاء الدراسة،
        الزملاء) أكثر من الغرباء - حتى بدون تفاعل.
      ideas: |
        الأفكار التي واجهناها من قبل تبدو أكثر راحة ومصداقية
        من الأفكار الجديدة.
    real_world_implications: |
      يشكل تأثير التعرض البسيط سلوك المستهلك، والتفضيلات السياسية،
      والجذب الاجتماعي. يتم استغلاله في التسويق
      ويمكن أن يخلق مزايا غير عادلة للمألوف. كما أنه
      يفسر لماذا تنوع التعرض مهم - الألفة مع
      الاختلاف تقلل من التحيز.
    professional_application:
      networking_and_relationship_building: |
        الرؤية مهمة. الظهور، والحضور، وأن تكون
        مرئيًا يخلق الألفة التي تبني الإعجاب. لا
        تقلل من قيمة الاتصال المتكرر قليل المخاطر.
      collaborative_learning_initiative: |
        عرض وجهات نظر وأشخاص متنوعين على الناس بشكل متكرر -
        يمكن للألفة أن تقلل من التحيز. ولكن كن على دراية بأن التعرض البسيط
        يمكن أن يعزز أيضًا تفضيل الوضع الراهن.
    how_can_this_be_misapplied:
      manipulation: |
        خلق التعرض المتكرر بشكل متعمد للتلاعب
        بالتفضيلات دون موافقة.
      false_familiarity: |
        الافتراض بأن الألفة تساوي الجودة - في بعض الأحيان تكون الخيارات الجديدة
        أفضل.
      exclusion: |
        إذا حصلت فئات معينة فقط على التعرض، فإنها تحصل على ميزة غير عادلة.
        ضع في اعتبارك من لديه إمكانية الوصول إلى الرؤية.
      stagnation: |
        الاعتماد المفرط على الألفة وعدم تجربة أشياء جديدة أبدًا.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: مغالطة السرد
    quick_introduction: |
      مغالطة السرد هي الميل إلى بناء قصص من أحداث الماضي تجعلها تبدو أكثر
      تماسكاً، وقابلية للتنبؤ، وذات معنى مما كانت عليه في الواقع. نعيد تركيب
      التفسيرات للعشوائية. نحول فوضى التاريخ إلى قصة مرتبة—ثم نصدق أن
      القصة كانت حتمية.
    one_liner: نعيد تركيب قصص متماسكة للعشوائية—ثم نصدق أنها كانت حتمية.
    try_this:
      - اسأل: ما مدى هذه القصة التي هي مجرد رؤية مستقبلية؟ ما هو دور الحظ؟
      - كن متشككاً في التفسيرات المرتبة — فالماضي كان أكثر فوضوية من قصصنا.
      - لاحظ متى يقوم "يجعل المعنى" بعمل "كان يمكن التنبؤ به".
    ask_yourself:
      - هل أبني قصة تجعل الماضي يبدو أكثر حتمية مما كان عليه؟
      - هل كنت سأتنبأ بهذا قبل أن يحدث؟
    in_more_detail: |
      نشر نسيم طالب هذا المصطلح. نحن نتوق للسرد—السبب والنتيجة،
      الأبطال والأشرار، الأقواس الواضحة. لذلك نبني قصصاً تربط
      الأحداث بأثر رجعي. تشعر القصة بأنها حقيقية لأنها متماسكة—ولكن
      التماسك لا يعني أنها صحيحة. نحن نخلط بين "يجعل المعنى" و
      "كان يمكن التنبؤ به". نحن نقلل من شأن دور الحظ
      والعشوائية.

      تؤثر مغالطة السرد على كيفية تعلمنا من التاريخ، وتقييمنا
      للنجاح، وإجراء تنبؤاتنا. نحن نبالغ في قوة التفسير
      للقصص ونقلل من شأن دور الصدفة.
    why_this_is_important: |
      يساعدك إدراك مغالطة السرد على تجنب الإفراط في التعلم من
      الماضي والتقدير المبالغ فيه للقدرة على التنبؤ. إنه يشجع على
      التواضع بشأن السببية والتنبؤ. ليس كل ما يصنع قصة جيدة
      حقيقياً أو قابلاً للتعميم.
    when_to_use:
      - اتخاذ_القرار
      - التعلم
      - تقييم_المخاطر
      - حل_المشكلات
    how_can_you_spot_it:
      hindsight_coherence: |
        تُفسر أحداث الماضي بقصة مرتبة لم تكن
        واضحة في ذلك الوقت.
      cause_effect_overconfidence: |
        نعزو أسباباً واضحة للنتائج التي كان لها العديد من
        العوامل المساهمة.
      luck_minimization: |
        يُفسر النجاح والفشل بالمهارة والاستراتيجية،
        وليس الحظ.
      story_over_evidence: |
        سرد مقنع يطغى على الأدلة الإحصائية.
    examples:
      business_success: |
        "لقد نجحوا بسبب X" بينما كانت هناك عوامل كثيرة وحظ
        متورط - نختار القصة التي تناسب.
      investing: |
        تفسير تحركات السوق بروايات تبدو
        مرضية ولكنها قد تكون بعد الوقائع.
      history: |
        تُروى الأحداث التاريخية على أنها تطورات حتمية
        عندما كانت تعتمد على العديد من العوامل.
      career: |
        "لقد وصلت إلى هنا لأنني فعلت X" بينما لعب الحظ والتوقيت
        أدواراً مهمة.
    real_world_implications: |
      تشوه مغالطة السرد التعلم، والثقة المفرطة في التنبؤ، وإسناد
      النجاح والفشل.
      إنها تجعل الماضي يبدو أكثر قابلية للتنبؤ مما كان عليه
      والمستقبل يبدو أكثر قابلية للتنبؤ مما هو عليه.
    professional_application:
      networking_and_relationship_building: |
        عندما يروي شخص ما قصة نجاحه، تذكر أن
        هذه قصة - متماسكة ومقنعة، ولكن ربما
        مبسطة. قد يتم التقليل من شأن الحظ والعوامل غير المرئية.
      collaborative_learning_initiative: |
        في المراجعات، فرق بين السرد والأدلة.
        اسأل "ماذا كنا سنقول في ذلك الوقت؟" استخدم
        سجلات القرار لالتقاط عدم اليقين قبل
        معرفة النتائج.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        بعض الروايات صحيحة - ليس كل شيء
        مغالطة سرد. السببية موجودة.
      excessive_skepticism: |
        رفض التعلم من الماضي لأن "مغالطة
        السرد". لا يزال بإمكاننا استخلاص دروس مفيدة.
      false_randomness: |
        افتراض أن كل شيء عشوائي بينما بعض النتائج
        يمكن عزوها بشكل مفيد.
      undermining_storytelling: |
        للقصص قيمة للتواصل والمعنى -
        فالمغالطة هي الاعتقاد بأنها كاملة أو
        تنبؤية، وليس أنها موجودة.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: التحيز للسلبية
    quick_introduction: |
      التحيز للسلبية هو الميل إلى إعطاء وزن أكبر للمعلومات السلبية مقارنة بالمعلومات
      الإيجابية. الأخبار السيئة، والنقد، والتهديدات تجذب انتباهنا وتؤثر على قراراتنا
      بشكل أقوى من المحفزات الإيجابية المكافئة.
    one_liner: الأخبار السيئة أثقل من الأخبار الجيدة - نحن مبرمجون لإعطاء الأولوية للتهديدات.
    try_this:
      - ابحث بنشاط عن الأدلة الإيجابية ووزنها عند التقييم.
      - لاحظ متى يطغى نقد واحد على العديد من المديح.
      - اسأل: هل أعطي المعلومات السلبية وزناً أكبر مما تستحق؟
    ask_yourself:
      - هل أركز على السلبيات وأتجاهل الإيجابيات؟
      - هل سأشعر بشكل مختلف لو ركزت على الأدلة الجيدة؟
    in_more_detail: |
      من الناحية التطورية، قد يكون تفويت التهديد قاتلاً، بينما كان تفويت فرصة
      عادة ما يكون قابلاً للبقاء. أدمغتنا مبرمجة لإعطاء الأولوية للمعلومات السلبية.
      تعليق واحد انتقادي يمكن أن يطغى على العديد من المديح. يتم تذكر الأحداث السلبية
      بشكل أكثر وضوحاً ولفترة أطول.

      يؤثر هذا التحيز على العلاقات، واتخاذ القرارات، والرفاهية. نركز على الإخفاقات،
      ونتوقع أسوأ السيناريوهات، ونتجاهل الأدلة الإيجابية. فهمه يساعدنا على تصحيحه.
    why_this_is_important: |
      التعرف على التحيز للسلبية يساعدك على موازنة التغذية الراجعة، وتجنب
      ردود الفعل المبالغ فيها على النقد، واتخاذ قرارات أكثر معايرة. كما أنه يفسر
      لماذا تهيمن الأخبار السيئة ولماذا غالباً ما نشعر بسوء أكثر مما تستدعيه الظروف.
    when_to_use:
      - اتخاذ_القرارات
      - بناء_العلاقات
      - القيادة
      - تقييم_المخاطر
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        تعليق سلبي واحد يطغى على العديد من التعليقات الإيجابية.
      threat_prioritization: |
        تحظى السلبيات المحتملة باهتمام أكبر من الإيجابيات المكافئة.
      vivid_negative_memories: |
        يتم استدعاء التجارب السلبية بسهولة أكبر وبمشاعر أقوى.
      discounting_positive_evidence: |
        يتم نسيان الأخبار الجيدة بسرعة أو تفسيرها بعيداً.
    examples:
      performance_reviews: |
        يركز موظف على قطعة واحدة من التغذية الراجعة النقدية ويتجاهل التقييم
        الإيجابي العام.
      news_consumption: |
        العناوين السلبية تهيمن على الاهتمام وتشكل نظرة العالم على الرغم من
        الاتجاهات الإيجابية.
      relationships: |
        جدال واحد يبرز أكثر من العديد من اللحظات الجيدة.
      investing: |
        تؤدي انخفاضات السوق إلى ذعر أكبر من ارتفاعات السوق المكافئة التي
        تسبب النشوة.
    real_world_implications: |
      يشكل التحيز للسلبية الإعلام والسياسة والثقافة التنظيمية. ويساهم
      في القلق والصراع والقرارات دون المستوى الأمثل. يمكن أن يؤدي
      التصدي له عن قصد إلى تحسين الرفاهية والحكم.
    professional_application:
      networking_and_relationship_building: |
        عند تقديم التغذية الراجعة، كن على دراية بأن التعليقات السلبية ستزن بشكل
        أثقل - وازنها وركز على النمو. عند تلقي التغذية الراجعة، خذ بعين
        الاعتبار الصورة الكاملة بوعي.
      collaborative_learning_initiative: |
        قم بإنشاء ثقافات تتصدى بشكل صريح للتحيز للسلبية: احتفل بالانتصارات،
        وثّق النتائج الإيجابية، ووازن بين ما بعد الوفاة (post-mortems) و"ما قبل
        الوفاة" (pre-mortems) لما سار على ما يرام.
    how_can_this_be_misapplied:
      toxic_positivity: |
        تجاهل المخاوف المشروعة بالإصرار على "التفكير الإيجابي".
      ignoring_real_threats: |
        الإفراط في التصحيح لدرجة التقليل من شأن المخاطر الحقيقية.
      feedback_suppression: |
        تجنب النقد الضروري لأن "السلبية سيئة".
      invalidation: |
        إخبار شخص ما بأن مشاعره السلبية هي "مجرد تحيز للسلبية"
        عندما يكون لديه سبب حقيقي للقلق.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: نصل أوكام
    quick_introduction: |
      نصل أوكام (أو شفرة أوكام) هو المبدأ القائل بأنه بين الفرضيات المتنافسة،
      يجب تفضيل الفرضية التي تتضمن أقل عدد من الافتراضات. التفسيرات الأبسط غالبًا -
      ولكن ليس دائمًا - تكون صحيحة.
    one_liner: فضل أبسط تفسير يتوافق مع الأدلة.
    try_this:
      - عند مقارنة النظريات، اسأل: أيها يتضمن افتراضات أقل؟
      - لا تضف تعقيدًا دون دليل يتطلب ذلك.
      - لاحظ متى تفضل تفسيرًا مفصلاً على تفسير بسيط.
    ask_yourself:
      - هل أقدم تعقيدًا غير ضروري؟
      - هل تتطلب الأدلة هذا المستوى من التفسير؟
    in_more_detail: |
      سمي المبدأ نسبة إلى ويليام أوف أوكام، ولا يدعي أن التفسيرات البسيطة
      صحيحة دائمًا. إنه يقترح أنه لا ينبغي تقديم تعقيد غير ضروري
      دون دليل. إذا فسرت نظريتان نفس الظواهر، فإن النظرية الأبسط
      تكون مفضلة حتى يطلب الدليل خلاف ذلك.

      نصل أوكام هو اختصار عقلي، وليس قانونًا. في بعض الأحيان يكون التفسير الصحيح
      معقدًا. ولكنه يحمي من الإفراط في الملاءمة، والتفكير المؤامراتي، والتعقيد غير الضروري.
      إنه يفضل الإيجاز في التفسير.
    why_this_is_important: |
      تطبيق نصل أوكام يحسن حل المشكلات، ويقلل الإفراط في الملاءمة في النماذج،
      ويساعدك على تجنب النظريات المعقدة ولكن غير المدعومة. إنه افتراضي مفيد
      عندما تكون الأدلة غامضة.
    when_to_use:
      - حل_المشكلات
      - اتخاذ_القرار
      - التعلم
      - تقييم_المخاطر
    how_can_you_spot_it:
      unnecessary_complexity: |
        يقدم تفسير افتراضات كثيرة عندما يكون عدد أقل كافياً.
      conspiracy_tendencies: |
        تفسيرات معقدة ومتعددة الجهات للأحداث ذات الأسباب الأبسط.
      overfitting: |
        نموذج أو نظرية تفسر البيانات السابقة بشكل مثالي ولكنها تفشل مع البيانات الجديدة.
      elegance_in_explanation: |
        غالباً ما تبدو أفضل التفسيرات "واضحة" بأثر رجعي.
    examples:
      debugging: |
        عند حدوث خطأ، تحقق من أبسط الأسباب أولاً (مثل خطأ إملائي، تهيئة خاطئة)
        قبل افتراض وجود مشكلات هيكلية.
      conspiracy_theories: |
        "الحكومة دبرت X" يتطلب العديد من الجهات الفاعلة المخفية؛ "ارتكب عدد قليل من الأشخاص
        أخطاء" هو أبسط.
      product_failure: |
        لا يتبنى المستخدمون ميزة - أبسط تفسير: إنها لا تحل مشكلتهم، وليس أنهم
        مرتبكون بسبب واجهة المستخدم.
      medical_diagnosis: |
        "الأشياء الشائعة شائعة" - ضع في اعتبارك التشخيصات المتكررة قبل النادرة.
    real_world_implications: |
      يوجه نصل أوكام الاستقصاء العلمي والهندسة والتفكير اليومي.
      إنه يقلل من الجهد الضائع في النظريات الخاطئة المعقدة. عند تطبيقه بشكل خاطئ، يمكنه رفض
      الظواهر المعقدة حقًا.
    professional_application:
      networking_and_relationship_building: |
        عند تفسير سلوك الآخرين، فضل التفسيرات البسيطة (إنهم مشغولون،
        لقد نسوا) قبل افتراض سوء النية أو الدوافع المعقدة.
      collaborative_learning_initiative: |
        في جلسات حل المشكلات، اسأل صراحة "ما هو أبسط تفسير؟"
        قبل بناء نماذج معقدة.
    how_can_this_be_misapplied:
      oversimplification: |
        رفض التفسيرات المعقدة الصالحة لأنها "معقدة للغاية".
      status_quo_bias: |
        استخدام نصل أوكام لتفضيل التفسيرات المألوفة على التفسيرات الجديدة ولكن الصحيحة.
      scientific_rigidity: |
        رفض النظريات الجديدة لأنها أكثر تعقيدًا، حتى عندما تدعمها الأدلة.
      missing_nuance: |
        بعض المجالات (مثل السلوك البشري، النظم البيئية) معقدة بطبيعتها؛
        يمكن أن يكون البساطة مضللة.
