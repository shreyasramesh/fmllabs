  - id: ostrich_effect
    name: تأثير النعامة
    quick_introduction: |
      تأثير النعامة هو الميل إلى تجنب المعلومات المالية السلبية - "دفن رأسك في الرمال" مثل النعامة. يتجنب الناس النظر إلى محافظهم الاستثمارية عندما تكون الأسواق في حالة هبوط، ويؤخرون فتح الفواتير، ويتجاهلون علامات التحذير التي يمكن أن تساعدهم على التصرف.
    one_liner: تجنب الأخبار السيئة لا يغير الواقع - بل يؤخر استجابتك فقط.
    try_this:
      - حدد مواعيد فحص منتظمة حتى لا تتمكن من تجنب الأرقام.
      - لاحظ متى تؤجل فتح شيء ما أو النظر في شيء ما.
      - اسأل: ما الذي أتجنبه، وما الذي سيتغير إذا واجهته؟
    ask_yourself:
      - هل أتجنب المعلومات لأنها قد تكون سيئة؟
      - هل سيساعدني الوعي المبكر على التصرف بشكل أفضل؟
    in_more_detail: |
      صيغ المصطلح في التمويل السلوكي لوصف المستثمرين الذين يتجنبون فحص استثماراتهم خلال فترات تراجع السوق. يمتد هذا السلوك إلى ما هو أبعد من التمويل: تجنب الفحوصات الطبية، وتجاهل مشاكل العلاقات، وتأجيل المحادثات الصعبة. نسعى إلى تجنب القلق الناجم عن الأخبار السيئة، لكن التجنب غالبًا ما يجعل النتائج أسوأ عن طريق منع الإجراءات في الوقت المناسب.

      يقود هذا التأثير النفور من الخسارة والرغبة في تجنب الانزعاج العاطفي. للأسف، الجهل لا يغير الواقع - بل يؤخر استجابتنا فقط.
    why_this_is_important: |
      يساعدك التعرف على تأثير النعامة على مواجهة المعلومات الصعبة بشكل استباقي. نادرًا ما يؤدي تجنب الأخبار السيئة إلى تحسين النتائج؛ بل غالبًا ما يزيدها سوءًا. الوعي في الوقت المناسب يمكّن من اتخاذ قرارات أفضل.
    when_to_use:
      - صنع_القرار
      - الاستثمار
      - تقييم_المخاطر
      - تحركات_مهنية
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        عدم النظر إلى كشوف الحسابات الاستثمارية عندما تكون الأسواق في حالة هبوط.
      delaying_difficult_information: |
        تأجيل فتح الفواتير أو النتائج الطبية أو تقييم الأداء.
      information_avoidance: |
        تجنب مصادر قد تحتوي على أخبار سيئة بشكل نشط.
      procrastination_on_unpleasant_tasks: |
        تأجيل الإجراءات التي من شأنها أن تكشف المشاكل أو تعالجها.
    examples:
      investing: |
        يتوقف مستثمر عن فحص صندوق الادخار 401 (k) الخاص به خلال سوق هابط، مما يفوته فرص إعادة التوازن.
      health: |
        تجنب موعد مع الطبيب على الرغم من ظهور الأعراض بسبب الخوف من أخبار سيئة.
      finances: |
        عدم فتح كشوف حسابات بطاقات الائتمان أو تنبيهات البنك لتجنب مواجهة الديون.
      performance: |
        يتجنب المدير تقديم ملاحظات نقدية حتى المراجعة السنوية، عندما كان التدخل المبكر سيساعد.
    real_world_implications: |
      يؤدي تأثير النعامة إلى نتائج مالية أسوأ، وتأخر العلاج الطبي، ومشاكل غير معالجة في العلاقات والعمل. إنه يزيد من الخسائر التي يمكن تجنبها. الأنظمة التي تجعل المعلومات صعبة التجاهل يمكن أن تساعد.
    professional_application:
      networking_and_relationship_building: |
        لا تتجنب المحادثات الصعبة. عالج المشاكل مبكرًا بدلاً من الأمل في أن تحل نفسها. قم بإنشاء فحوصات منتظمة تكشف المشاكل قبل تفاقمها.
      collaborative_learning_initiative: |
        بناء حلقات ملاحظات تجعل من الصعب تجاهل المشاكل - لوحات معلومات، ومراجعات منتظمة، ومعايير تشجع على الإفصاح المبكر عن الأخبار السيئة.
    how_can_this_be_misapplied:
      information_overload: |
        فرض المراقبة المستمرة عندما يكون بعض تجنب المعلومات صحيًا (على سبيل المثال، عدم التحقق من الأسهم كل دقيقة).
      anxiety_amplification: |
        خلق الكثير من التركيز على المشاكل المحتملة مما يزيد من القلق دون تحسين النتائج.
      blame_shifting: |
        نسبة كل التجنب إلى "تأثير النعامة" عندما يكون بعض التجنب عقلانيًا (على سبيل المثال، تجاهل الضوضاء).
      micromanagement: |
        استخدام المفهوم لتبرير المراقبة المفرطة للآخرين.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: مبدأ باريتو
    quick_introduction: |
      ينص مبدأ باريتو (أو قاعدة 80/20) على أن 80% تقريبًا من التأثيرات تأتي من 20% من الأسباب. غالبًا ما تنتج نسبة ضئيلة من المدخلات غالبية المخرجات - في المبيعات، الأخطاء، العملاء، الجهد، الميزات، وغيرها. ركز على القليل الحيوي.
    one_liner: 80% من التأثيرات تأتي من 20% من الأسباب - ركز على القليل الحيوي.
    try_this:
      - حدد 20% من المدخلات التي تنتج 80% من النتائج - ضاعف تركيزك هناك.
      - قلل أو أعطِ أولوية أقل لـ 80% التي تنتج القليل.
      - اسأل: أي القليل من الأشياء، إذا فعلتها بشكل جيد، ستكون الأكثر أهمية؟
    ask_yourself:
      - هل أوزع جهدي بالتساوي عندما يكون لعدد قليل من الأشياء أهمية أكبر؟
      - ما هو الـ 20% الذي لدي والذي له تأثير كبير؟
    in_more_detail: |
      لاحظ فيلفريدو باريتو أن 80% من أراضي إيطاليا كانت مملوكة لـ 20% من السكان. تم تعميم المبدأ: 80% من المبيعات من 20% من العملاء، 80% من الأخطاء من 20% من الكود، 80% من النتائج من 20% من الجهد. تختلف النسبة الدقيقة، لكن النمط - التوزيع غير المتكافئ - شائع.

      يقترح المبدأ أن تحديد الـ 20% ذات التأثير الكبير والتركيز عليها يمكن أن يحسن النتائج بشكل كبير. إنها استراتيجية لترتيب الأولويات، وليست قانونًا فيزيائيًا.
    why_this_is_important: |
      يساعدك تطبيق مبدأ باريتو على تحديد الأولويات بصرامة، وتجنب إهدار الجهد على الأنشطة ذات التأثير المنخفض، وتحقيق المزيد بأقل. إنه أمر أساسي للإنتاجية والاستراتيجية.
    when_to_use:
      - اتخاذ_القرارات
      - حل_المشكلات
      - القيادة
      - التحركات_المهنية
    how_can_you_spot_it:
      uneven_distribution: |
        تشكل نسبة صغيرة من X نسبة كبيرة من Y.
      high_leverage_activities: |
        تنتج قلة من الإجراءات معظم النتائج.
      low_value_tail: |
        تساهم العديد من الأنشطة بالقليل؛ تقليمها له تأثير ضئيل.
      vital_few_vs_trivial_many: |
        المفتاح هو تحديد القليل الأكثر أهمية.
    examples:
      sales: |
        20% من العملاء يولدون 80% من الإيرادات - ركز على الاحتفاظ بهم وتنميتهم.
      software: |
        20% من الميزات تقود 80% من الاستخدام - أعطِ الأولوية لتلك.
      productivity: |
        تنتج قلة من العادات أو الروتين معظم إنتاجك - ضاعف تركيزك عليها.
      problems: |
        20% من الأخطاء تسبب 80% من الأعطال - أصلح تلك أولاً.
    real_world_implications: |
      يوجه مبدأ باريتو تخصيص الموارد، استراتيجية المنتج، والإنتاجية الشخصية. تجاهله يؤدي إلى تشتيت الجهد بشكل مفرط. المبالغة في تطبيقه يمكن أن تسبب إهمال "الذيل الطويل" حيث يكون ذلك مهمًا.
    professional_application:
      networking_and_relationship_building: |
        حدد العلاقات التي تهم أهدافك أكثر. استثمر بشكل غير متناسب في تلك العلاقات بدلاً من توزيع الجهد بالتساوي.
      collaborative_learning_initiative: |
        عند تحسين أداء الفريق، ابحث عن 20% من التدخلات التي تحقق 80% من النتائج. ركز التدريب وتغييرات العمليات هناك.
    how_can_this_be_misapplied:
      oversimplification: |
        افتراض أن 80/20 ينطبق في كل مكان؛ بعض التوزيعات أكثر توازناً.
      neglecting_the_tail: |
        تجاهل "الكثرة التافهة" عندما تكون مهمة بشكل جماعي (على سبيل المثال، العديد من العملاء الصغار، الحالات الهامشية).
      false_precision: |
        التعامل مع 80/20 كحقيقة حرفية بدلاً من كقاعدة إرشادية تقريبية.
      misidentifying_the_vital_few: |
        التركيز على الـ 20% الخاطئة بسبب تحليل معيب.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: قانون باركنسون
    quick_introduction: |
      ينص قانون باركنسون على أن "العمل يتوسع ليملأ الوقت المتاح لإنجازه". أعطِ مهمة أسبوعًا، فتستغرق أسبوعًا؛ أعطها يومًا، وغالبًا ما يتم إنجازها في يوم واحد. وينطبق الشيء نفسه على الميزانيات وحجم الفريق والموارد.
    one_liner: العمل يتوسع ليملأ الوقت المتاح لإنجازه.
    try_this:
      - حدد مواعيد نهائية أكثر صرامة لفرض التركيز ومنع زحف النطاق.
      - اسأل: ما هو الحد الأدنى للوقت الذي يمكن أن يستغرقه هذا بشكل معقول؟
      - لاحظ متى يتم استهلاك وقت أو موارد إضافية دون قيمة متناسبة.
    ask_yourself:
      - هل أملأ الوقت، أم أن العمل يتطلبه فعلاً؟
      - هل سيجبر موعد نهائي أكثر صرامة على تحديد أولويات أفضل؟
    in_more_detail: |
      لاحظ سي. نورثكوت باركنسون أن البيروقراطيات تنمو بغض النظر عن مقدار العمل المطلوب. ولاحظ أيضًا أن المهام تتوسع لتملأ الوقت المتاح - فنحن نعدل جهدنا وسرعتنا حسب الموعد النهائي. يمكن أن تفرض المواعيد النهائية الصارمة التركيز؛ وتدعو المواعيد النهائية المرنة إلى التسويف وزحف النطاق.

      للقانون آثار على إدارة المشاريع والإنتاجية الشخصية والتصميم التنظيمي. ويشير إلى أن القيود يمكن أن تحسن النتائج من خلال فرض تحديد الأولويات.
    why_this_is_important: |
      يساعدك فهم قانون باركنسون على تحديد مواعيد نهائية أفضل، وتجنب الإفراط في تخصيص الموارد للمشاريع، والتعرف على متى "المزيد من الوقت" أو "المزيد من الأشخاص" لن يساعد - وقد يضر. يمكن أن تكون القيود منتجة.
    when_to_use:
      - اتخاذ_القرارات
      - القيادة
      - حل_المشكلات
      - تحركات_مهنية
    how_can_you_spot_it:
      deadline_driven_effort: |
        يتسارع العمل مع اقتراب الموعد النهائي؛ ويتقدم القليل عندما يكون الموعد النهائي بعيدًا.
      scope_expansion: |
        تنمو المشاريع لتشمل الموارد المتاحة بدلاً من البقاء مركزة.
      bureaucratic_growth: |
        تضيف المنظمات موظفين وعمليات حتى عندما لا يزيد عبء العمل.
      budget_exhaustion: |
        يتم إنفاق الميزانيات بالكامل بغض النظر عما إذا كان الإنفاق ضروريًا.
    examples:
      student_deadlines: |
        تتم كتابة ورقة بحثية تستحق بعد شهر في آخر 48 ساعة.
      project_management: |
        مشروع بجدول زمني مدته 6 أشهر يستغرق 6 أشهر؛ نفس النطاق بمهلة 3 أشهر
        قد يتم إنجازه أيضًا.
      meetings: |
        ملء اجتماع مدته ساعة واحدة بحد ذاته، سواء كانت 30 دقيقة تكفي.
      budgets: |
        ينفق القسم ميزانيته بالكامل بحلول نهاية العام لتبرير نفس الميزانية
        في العام المقبل.
    real_world_implications: |
      يؤثر قانون باركنسون على الإنتاجية، والتضخم التنظيمي، وتخصيص الموارد. ويشير إلى أن القيود الاصطناعية (مواعيد نهائية أقصر، فرق أصغر) يمكن أن تحسن التركيز والكفاءة.
    professional_application:
      networking_and_relationship_building: |
        حدد مواعيد نهائية واضحة وصارمة للعمل التعاوني لمنع زحف النطاق والحفاظ على الزخم.
      collaborative_learning_initiative: |
        استخدم تحديد الوقت للاجتماعات والمشاريع. جرب مواعيد نهائية أقصر
        لاختبار ما إذا كانت تحسن التركيز دون التضحية بالجودة.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        وضع مواعيد نهائية قصيرة بشكل تعسفي تسبب الإرهاق أو سوء الجودة.
      underresourcing: |
        افتراض أن وقتًا أقل أو عددًا أقل من الأشخاص سيعمل دائمًا - بعض المهام تحتاج
        موارد كافية.
      blame_shifting: |
        إلقاء اللوم على التأخيرات في "قانون باركنسون" عندما كان العمل معقدًا حقًا.
      ignoring_quality: |
        الاندفاع لتلبية القيود الاصطناعية على حساب النتائج المستدامة.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: التفكير الاحتمالي
    quick_introduction: |
      التفكير الاحتمالي هو عادة الاستدلال بالمصطلحات الاحتمالية بدلاً من اليقين. بدلاً من "هل سيحدث هذا؟" نسأل "ما مدى احتمالية حدوث هذا؟"
      إنه يحتضن عدم اليقين ويستخدمه لاتخاذ قرارات أفضل.
    one_liner: فكر بالاحتمالات، لا باليقين - احتضن عدم اليقين.
    try_this:
      - استبدل "هل سيحدث؟" بـ "ما مدى احتمالية حدوثه؟"
      - ضع في اعتبارك سيناريوهات متعددة وقم بتعيين احتمالات تقريبية.
      - قم بتحديث معتقداتك مع وصول أدلة جديدة.
    ask_yourself:
      - هل أفكر بثنائية عندما تكون الاحتمالات أكثر دقة؟
      - ما هو نطاق النتائج المعقولة؟
    in_more_detail: |
      معظم نتائج العالم الحقيقي غير مؤكدة. يستبدل التفكير الاحتمالي "نعم/لا" الثنائية بالمعتقدات المتدرجة. يتضمن النظر في سيناريوهات متعددة،
      وتعيين احتمالات تقريبية، والتحديث عند وصول الأدلة. إنه عكس الثقة المفرطة والتفكير بالأبيض والأسود.

      تشمل الممارسات الرئيسية: التفكير في نطاقات، والنظر في المعدلات الأساسية، وتحديث
      المعتقدات بالأدلة، والتمييز بين المخاطر (الاحتمالات المعروفة)
      وعدم اليقين (الاحتمالات غير المعروفة). إنه يحسن المعايرة و
      جودة القرار.
    why_this_is_important: |
      يقلل التفكير الاحتمالي من الثقة المفرطة، ويحسن التنبؤ، ويؤدي إلى قرارات أفضل في ظل عدم اليقين. إنه ضروري للاستثمار،
      والاستراتيجية، وأي مجال يكون فيه المستقبل غير مؤكد.
    when_to_use:
      - اتخاذ_القرارات
      - تقييم_المخاطر
      - الاستثمار
      - حل_المشكلات
    how_can_you_spot_it:
      likelihood_language: |
        "من المحتمل"، "مرجح"، "غير مرجح" بدلاً من "سوف" أو "لن".
      scenario_thinking: |
        التفكير في عدة مستقبلات ممكنة مع احتمالات تقريبية.
      calibration: |
        تنبؤات تتطابق مع ترددات النتائج الفعلية بمرور الوقت.
      uncertainty_acknowledgment: |
        التعبير عن ما لا تعرفه صراحة.
    examples:
      forecasting: |
        "أعتقد أن هناك فرصة بنسبة 60% للوفاء بالموعد النهائي" بدلاً من "سوف
        نلتزم بالموعد النهائي."
      investing: |
        "هناك فرصة بنسبة 30% لارتفاعه بمقدار 2x وفرصة بنسبة 70% لانخفاضه بنسبة -50%" بدلاً من
        "هذا سيرتفع بجنون."
      strategy: |
        التخطيط لسيناريوهات متعددة (الأفضل، الأساسي، الأسوأ) مع احتمالات تقريبية.
      hiring: |
        "بناءً على المقابلة، أرى احتمالاً بنسبة 70% أن ينجحوا" بدلاً من
        "إنهم موظفون رائعون."
    real_world_implications: |
      يحسن التفكير الاحتمالي المعايرة، ويقلل المفاجآت، ويمكّن
      من إدارة أفضل للمخاطر. إنه محوري في التنبؤ الفعال و
      اتخاذ القرار في ظل عدم اليقين.
    professional_application:
      networking_and_relationship_building: |
        تواصل باستخدام الاحتمالات عند الاقتضاء - "أنا واثق إلى حد ما" مقابل
        "أنا متأكد." هذا يبني الثقة من خلال الإشارة إلى التواضع المعرفي.
      collaborative_learning_initiative: |
        شجع الفرق على التعبير عن عدم اليقين. استخدم أسواق التنبؤ أو
        تمارين المعايرة لتحسين الحكم الاحتمالي.
    how_can_this_be_misapplied:
      false_precision: |
        تعيين احتمالات دقيقة (مثل 73٪) عندما لا يمكنك أن تكون دقيقًا بهذا الشكل.
      analysis_paralysis: |
        عدم التصرف أبداً لأن "نا لا يمكننا أن نكون متأكدين".
      hedging_overuse: |
        تأهيل كل شيء لدرجة عدم الفائدة.
      dismissing_intuition: |
        التصحيح المفرط لتجاهل الشعور الغريزي القوي عندما قد يحمل معلومات صالحة.
    related_content:
