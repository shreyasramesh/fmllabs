      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: تأثير بيجماليون
    quick_introduction: |
      تأثير بيجماليون (أو تأثير روزنتال) هو الظاهرة التي تؤدي فيها التوقعات الأعلى إلى أداء محسّن. عندما يتوقع المعلمون أو المديرون أو الآخرون المزيد من شخص ما، فإن هذا الشخص يميل إلى الأداء بشكل أفضل. تصبح التوقعات نبوءات تحقق ذاتها.
    one_liner: التوقعات الأعلى تؤدي إلى أداء أفضل - التوقعات تشكل الواقع.
    try_this:
      - ضع توقعات عالية ولكن قابلة للتحقيق؛ وبلغ عنها بوضوح.
      - لاحظ متى قد تحد التوقعات المنخفضة من أداء شخص ما.
      - اسأل: ما الذي أتوقعه ضمنيًا - وكيف يمكن أن يؤثر ذلك على النتائج؟
    ask_yourself:
      - هل توقعاتي تساعد هذا الشخص أم تحد من قدراته؟
      - هل ستغير التوقعات الأعلى طريقة تعاملي معهم - ونتائجهم؟
    in_more_detail: |
      قدم روبرت روزنتال ولينور جاكوبسون معلومات خاطئة للمعلمين بأن بعض الطلاب "سيزدهرون" أكاديميًا. هؤلاء الطلاب - الذين تم اختيارهم عشوائيًا - تحسنوا بالفعل أكثر من الآخرين. أثرت توقعات المعلمين على سلوكهم (اهتمام أكبر، ردود فعل أكثر دفئًا)، مما أثر على أداء الطلاب. التوقعات تشكل الواقع.

      العكس - التوقعات المنخفضة التي تؤدي إلى أداء أسوأ - يسمى أحيانًا تأثير جلام. كلاهما يظهر أن معتقداتنا عن الآخرين يمكن أن تؤثر على نتائجهم. هذا له آثار عميقة على القيادة والتعليم والأبوة.
    why_this_is_important: |
      يساعدك فهم تأثير بيجماليون على تسخير قوة التوقعات. التوقعات العالية، التي يتم نقلها بصدق، يمكن أن تحسن الأداء. التوقعات المنخفضة يمكن أن تخلق فشلًا يتحقق ذاتيًا. معتقداتك عن الآخرين مهمة.
    when_to_use:
      - القيادة
      - بناء_العلاقات
      - التعلم
      - اتخاذ_القرار
    how_can_you_spot_it:
      expectation_performance_link: |
        الأشخاص الذين نتوقع منهم المزيد يميلون إلى الأداء بشكل أفضل.
      differential_treatment: |
        نتعامل مع الأشخاص بشكل مختلف بناءً على توقعاتنا - غالبًا
        دون وعي.
      self_fulfilling_prophecy: |
        المعتقدات حول القدرة تؤثر على السلوك الذي يشكل
        القدرة.
      teacher_student_dynamics: |
        توقعات المعلم تؤثر على نتائج الطلاب من خلال
        المعاملة التفاضلية.
    examples:
      education: |
        المعلمون الذين يتوقعون نجاح الطلاب يقدمون المزيد من الدعم؛
        هؤلاء الطلاب يتحسنون. المعلمون الذين يتوقعون الفشل قد
        يخلقونه عن غير قصد.
      workplace: |
        المديرون الذين يتوقعون أداءً عاليًا من المرؤوسين يقدمون
        المزيد من الفرص وردود الفعل؛ يتحسن الأداء.
      parenting: |
        الآباء الذين يتوقعون من أطفالهم أن يكونوا مسؤولين يمنحونهم
        المزيد من المسؤولية؛ ينهضون لمواجهتها.
      stereotypes: |
        تهديد الصورة النمطية هو العكس - التوقعات السلبية
        يمكن أن تضعف الأداء.
    real_world_implications: |
      يؤثر تأثير بيجماليون على التعليم والإدارة والعلاقات. يشير إلى أن رفع التوقعات - عندما يتم ذلك بشكل داعم - يمكن أن يحسن النتائج. كما يحذر من أن التوقعات المنخفضة يمكن أن تكون مدمرة.
    professional_application:
      networking_and_relationship_building: |
        ضع توقعات عالية للأشخاص - وقدم الدعم لتحقيقها. آمن بالإمكانيات. توقعاتك
        تؤثر على سلوكك، مما يؤثر على نتائجهم.
      collaborative_learning_initiative: |
        أنشئ ثقافات من التوقعات العالية مع دعم عالٍ.
        تجنب وصف الأشخاص بأنهم "ضعاف الأداء" بطرق
        تصبح نبوءات تحقق ذاتها. استثمر في أولئك الذين تتوقع لهم
        النجاح.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        وضع توقعات من المستحيل تلبيتها دون
        دعم يخلق الفشل والإحباط.
      blame_shifting: |
        "لم يحققوا التوقعات" عندما لم نقدم
        الدعم أو الظروف اللازمة للنجاح.
      ignoring_constraints: |
        التوقعات وحدها لا تتغلب على الحواجز الهيكلية.
      pressure_without_support: |
        التوقعات العالية بدون موارد أو دعم يمكن أن تكون
        ضارة.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: الانحدار نحو المتوسط
    quick_introduction: |
      الانحدار نحو المتوسط هو الظاهرة الإحصائية حيث تميل النتائج المتطرفة إلى أن
      تتبعها نتائج أقرب إلى المتوسط. بعد نتيجة جيدة أو سيئة بشكل غير عادي، من المرجح أن تكون النتيجة التالية أقل تطرفاً - ليس بسبب أي تدخل سببي، بل بسبب التباين العشوائي.
    one_liner: تميل النتائج المتطرفة إلى أن تتبعها نتائج أقرب إلى المتوسط.
    try_this:
      - لا تنسب "الانحدار" إلى تدخلك - فغالباً ما كان سيحدث على أي حال.
      - بعد نتيجة متطرفة، توقع أن تكون النتيجة التالية أقل تطرفاً.
      - اسأل: هل هذا التغيير ناتج عن ما فعلته، أم مجرد انحدار نحو المتوسط؟
    ask_yourself:
      - هل أنسب الفضل أو اللوم لتدخلي في ما قد يكون تبايناً عشوائياً؟
      - هل كان هذا سيحدث بدون فعلي؟
    in_more_detail: |
      إذا حصل طالب على درجة عالية بشكل غير عادي في اختبار واحد، فمن المحتمل أن يحصل على درجة أقرب إلى متوسطه في الاختبار التالي - ليس لأنه "أصبح كسولاً" بل لأن الدرجة الأولى كانت حظاً جزئياً. وينطبق الشيء نفسه على الأداء الرياضي، وعوائد الأسهم، ومقاييس الأعمال. غالباً ما ننسب "الانحدار" إلى شيء فعلناه (مثل العقاب أو المكافأة)، في حين أنه كان سيحدث على أي حال.

      يصف دانيال كانيمان كيف خلص مدربو الطيران عن طريق الخطأ إلى أن الثناء أفسد الأداء والانتقاد حسّنه - كانوا يلاحظون الانحدار نحو المتوسط بعد أداء متطرف.
    why_this_is_important: |
      يمنع فهم الانحدار نحو المتوسط من نسب السببية بشكل خاطئ. إنه يساعدك على تجنب المبالغة في رد الفعل تجاه القيم المتطرفة وإجراء تغييرات بناءً على الضوضاء. إنه ضروري لتقييم التدخلات والأداء.
    when_to_use:
      - اتخاذ_القرارات
      - الاستثمار
      - تقييم_المخاطر
      - القيادة
    how_can_you_spot_it:
      extreme_followed_by_average: |
        تتبع نتيجة جيدة أو سيئة بشكل غير عادي نتيجة أقرب إلى المتوسط.
      spurious_causation: |
        نسب "التعافي" أو "الانخفاض" إلى تدخل بينما كان الانحدار سيحدث على أي حال.
      overreaction_to_outliers: |
        اتخاذ سياسات أو تغييرات شخصية بناءً على نقطة بيانات متطرفة واحدة.
      reward_punishment_confusion: |
        الاعتقاد بأن العقاب "نجح" عندما كان التحسن مجرد انحدار.
    examples:
      sports: |
        يحقق لاعب مباراة العمر، ثم يعود إلى مستواه الطبيعي - قد يلوم المشجعون "الرضا عن النفس".
      investing: |
        تحقق سهم عاماً رائعاً، ثم يعود إلى طبيعته - قد ينسب المستثمرون الانخفاض
        إلى سوء الإدارة بينما هو في جزء منه مجرد عودة.
      performance_reviews: |
        يحقق موظف ربعاً سيئاً، يتلقى ملاحظات، يتحسن - قد يُنسب الفضل للملاحظات بينما كان الانحدار سيحدث بغض النظر.
      medicine: |
        يشعر مريض بتدهور، يتناول علاجاً، يتحسن - قد يُنسب الفضل للعلاج بينما كان بعض التحسن طبيعياً.
    real_world_implications: |
      يؤثر الانحدار نحو المتوسط على كيفية تقييمنا للمعلمين والأطباء ومديري الصناديق لأنفسنا. إنه يفسر لماذا غالباً ما يكون "ما يرتفع يجب أن ينخفض" صحيحاً إحصائياً. سوء فهمه يؤدي إلى تدخلات ضائعة وثقة خاطئة في العلاجات.
    professional_application:
      networking_and_relationship_building: |
        لا تفرط في تفسير تفاعل سيء واحد - قد يكون قيمة متطرفة ستعود إلى متوسط العلاقة.
      collaborative_learning_initiative: |
        عند تقييم التدخلات (التدريب، تغييرات العمليات)، استخدم مجموعات ضابطة ونقاط بيانات متعددة لتمييز التأثير عن الانحدار.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        افتراض أن أي تحسن بعد التدخل هو "مجرد انحدار" بينما توجد آثار حقيقية.
      underreacting: |
        تجاهل المشاكل الحقيقية لأن "ها ستعود إلى المتوسط".
      statistical_illiteracy: |
        الخلط بين الانحدار والقوة التي "تصحح" النتائج - إنها مجرد احتمالية.
      overconfidence: |
        افتراض أن المتوسط مستقر بينما قد تكون العملية الأساسية قد تغيرت.
    related_content:
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: الاسترجاع المتفائل
    quick_introduction: |
      الاسترجاع المتفائل هو الميل لتذكر الماضي على أنه أفضل مما كان عليه.
      نستدعي التجارب السابقة بشكل أكثر إيجابية بمرور الوقت، مع تلطيف الصعوبات
      وتضخيم الجوانب الجيدة. "الأيام الخوالي" غالبًا لم تكن جيدة كما نتذكر.
    one_liner: نتذكر الماضي على أنه أفضل مما كان عليه — "الأيام الخوالي" لم تكن بهذا القدر من الجودة.
    try_this:
      - عند المقارنة بالماضي، اسأل: ما الذي كنت أشعر به فعليًا حينها؟
      - احتفظ بمفكرة لمقارنة الذاكرة بالواقع لاحقًا.
      - لاحظ متى يكون الحنين يصبغ حكمك على الحاضر.
    ask_yourself:
      - هل أُضفي المثالية على الماضي؟
      - هل كنت سأكون سعيدًا حينها لو استطعت السفر عبر الزمن إلى الوراء؟
    in_more_detail: |
      نميل إلى تذكر الجوانب الإيجابية للتجارب السابقة ونسيان أو
      تقليل السلبيات. العطلات والوظائف والعلاقات تبدو أفضل في
      الحنين مما كانت عليه في لحظتها. هذا يمكن أن يؤدي إلى مقارنات غير واقعية —
      نحكم على الحاضر مقابل ماضٍ مثالي.

      يؤثر الاسترجاع المتفائل على عملية اتخاذ القرار عندما نكرر خيارات سابقة
      متوقعين نفس النتيجة (المتذكرة). يمكنه أيضًا أن يغذي الحنين إلى
      عصو كانت أسوأ بشكل موضوعي. إنه عكس انحياز السلبية
      في الذاكرة.
    why_this_is_important: |
      التعرف على الاسترجاع المتفائل يساعدك على إجراء مقارنات أكثر واقعية
      وتجنب تكرار الأخطاء الماضية بناءً على ذكريات مثالية. كما أنه
      يوضح سبب شوقنا للماضي أحيانًا على الرغم من التقدم الحالي.
    when_to_use:
      - اتخاذ_القرار
      - تغييرات_وظيفية
      - بناء_العلاقات
      - التعلم
    how_can_you_spot_it:
      idealized_past: |
        "الأمور كانت أفضل في ذلك الوقت" بينما قد تظهر المقاييس الموضوعية خلاف ذلك.
      selective_positive_memory: |
        تذكر الجيد ونسيان السيئ من التجارب السابقة.
      nostalgia_as_evidence: |
        استخدام الذكريات السعيدة كدليل على أن الخيارات السابقة كانت صحيحة.
      present_undervaluation: |
        يشعر الحاضر بسوء مما هو عليه لأننا نقارن بماضٍ مثالي.
    examples:
      career: |
        "كانت وظيفتي القديمة رائعة" بينما تركتها لأسباب وجيهة — الذاكرة قد لطفت
        الإحباطات.
      relationships: |
        "كنا سعداء جدًا" بشأن علاقة سابقة — نسيان الصراعات التي
        أدت إلى نهايتها.
      childhood: |
        "كان الأطفال أفضل حالًا في أيامي" بينما تحسنت العديد من المقاييس الموضوعية (الصحة،
        السلامة، الفرص).
      projects: |
        "سار ذلك المشروع بسلاسة" بينما كان في الواقع به العديد من التأخيرات — نتذكر
        النتيجة، وليس العملية.
    real_world_implications: |
      يؤثر الاسترجاع المتفائل على الرضا عن الحياة، والقرارات المهنية،
      والخيارات المدفوعة بالحنين. يمكن أن يؤدي إلى تكرار الأخطاء الماضية أو
      مقارنات غير واقعية. كما أنه يفسر جاذبية خطاب "العودة إلى الأيام الخوالي".
    professional_application:
      networking_and_relationship_building: |
        عند التفكير في إعادة التواصل مع الزملاء السابقين أو العودة إلى الأدوار السابقة،
        افصل الحنين عن الواقع. وثق أسباب مغادرتك في ذلك الوقت؛ وراجعها قبل العودة.
      collaborative_learning_initiative: |
        في مراجعات ما بعد المشاريع، استخدم ملاحظات أو بيانات معاصرة بدلاً من الذاكرة
        لتقييم ما حدث بالفعل. الذاكرة تلين الصعوبات.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        ليس كل الحنين مضللًا — أحيانًا كان الماضي أفضل حقًا
        في بعض النواحي.
      invalidating_memories: |
        إخبار الناس بأن ذكرياتهم الإيجابية "خاطئة" بينما قد تعكس
        تجربة ذاتية حقيقية.
      overcorrection: |
        افتراض أن الماضي كان دائمًا أسوأ مما نتذكر — أحيانًا كان
        أفضل.
      present_bias: |
        استخدام الاسترجاع المتفائل كذريعة لتجاهل المخاوف المشروعة
        بشأن التدهور الحالي.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: انحياز البروز
    quick_introduction: |
      انحياز البروز هو الميل إلى التركيز على الجوانب الأكثر بروزاً أو وضوحاً
      للموقف مع تجاهل العوامل الأقل وضوحاً ولكنها قد تكون مهمة. ما يبرز يحصل
      على اهتمام ووزن غير متناسبين في أحكامنا.
    one_liner: ما يبرز يحصل على اهتمام غير متناسب - ما هو دقيق يتم تجاهله.
    try_this:
      - Ask: ما الذي لا أراه لأنه ليس بارزاً؟
      - Actively look for less obvious factors before deciding. (ابحث بنشاط عن العوامل الأقل وضوحاً قبل اتخاذ القرار.)
      - Notice when a vivid or dramatic element is dominating your judgment. (لاحظ متى يهيمن عنصر حيوي أو درامي على حكمك.)
    ask_yourself:
      - Am I overweighting what's prominent and underweighting what's subtle? (هل أبالغ في تقدير ما هو بارز وأقلل من تقدير ما هو دقيق؟)
      - What important factors might I be overlooking? (ما هي العوامل المهمة التي قد أتجاهلها؟)
    in_more_detail: |
      المعلومات البارزة تكون حيوية، أو مشحونة عاطفياً، أو تم تلقيها مؤخراً.
      إنها تلفت الانتباه وتؤثر على القرارات أكثر مما ينبغي. نبالغ في تقدير
      ما هو واضح ونقلل من تقدير ما هو دقيق. حدث درامي أو مثال حيوي يمكن أن
      يهيمن على تفكيرنا حتى لو لم يكن تمثيلياً.

      يتداخل انحياز البروز مع الاستدلال بالتمثيل (ما يتبادر إلى الذهن)
      وانحياز الحداثة (ما حدث مؤخراً). يؤثر على تصور المخاطر، والتوظيف،
      والاستراتيجية. يتم معالجة المشاكل الأكثر وضوحاً؛ والمشاكل غير
      المرئية تتفاقم.
    why_this_is_important: |
      التعرف على انحياز البروز يساعدك على النظر إلى ما وراء الواضح
      واعتبار العوامل الأقل وضوحاً. إنه يحسن تقييم المخاطر، وتشخيص
      المشاكل، وجودة القرارات. الأشياء المهمة ليست دائماً بارزة.
    when_to_use:
      - اتخاذ_القرارات
      - حل_المشكلات
      - تقييم_المخاطر
      - القيادة
    how_can_you_spot_it:
      prominent_factor_dominance: |
        The most noticeable aspect drives the decision. (أبرز جانب يدفع القرار.)
      overlooking_background: |
        Less visible factors are ignored despite their importance. (يتم تجاهل العوامل الأقل وضوحاً على الرغم من أهميتها.)
      vividness_overweighting: |
        Dramatic or emotional information gets disproportionate weight. (تحصل المعلومات الدرامية أو العاطفية على وزن غير متناسب.)
      visibility_bias: |
        What we can easily see or measure gets more attention than
        what we can't. (ما يمكننا رؤيته أو قياسه بسهولة يحصل على مزيد من الاهتمام مقارنة بما لا نستطيع.)
    examples:
      risk: |
        A plane crash is salient—we overestimate flying risk. Car
        accidents are less salient in aggregate—we underestimate
        driving risk. (حادث طائرة بارز - نبالغ في تقدير خطر الطيران. حوادث السيارات أقل بروزاً كمجموع - نقلل من تقدير خطر القيادة.)
      hiring: |
        A candidate's presentation skills are salient; their
        follow-through may be less visible but equally important. (مهارات عرض المرشح بارزة؛ قد يكون تنفيذهم أقل وضوحاً ولكنه مهم بنفس القدر.)
      strategy: |
        Competitor moves are salient; gradual market shifts are
        less noticeable but may matter more. (تحركات المنافسين بارزة؛ تحولات السوق التدريجية أقل وضوحاً ولكنها قد تكون أكثر أهمية.)
      problems: |
        The loudest complaint gets addressed while systemic issues
        go unnoticed. (تتم معالجة الشكوى الأعلى صوتاً بينما تظل القضايا النظامية غير ملحوظة.)
    real_world_implications: |
      Salience bias affects what gets attention, funding, and action.
      It can lead to addressing symptoms rather than causes and
      to misallocated resources. Deliberately seeking non-salient
      information improves decisions. (يؤثر انحياز البروز على ما يحصل على الاهتمام، والتمويل، والإجراءات. يمكن أن يؤدي إلى معالجة الأعراض بدلاً من الأسباب وإلى تخصيص خاطئ للموارد. البحث المتعمد عن المعلومات غير البارزة يحسن القرارات.)
    professional_application:
      networking_and_relationship_building: |
        Don't judge people only by their most visible traits. Look
        for less obvious qualities—reliability, consistency, how
        they treat people who can't help them. (لا تحكم على الأشخاص فقط من خلال سماتهم الأكثر وضوحاً. ابحث عن صفات أقل وضوحاً - الموثوقية، الثبات، كيف يعاملون الأشخاص الذين لا يمكنهم مساعدتهم.)
      collaborative_learning_initiative: |
        In problem-solving, explicitly ask "What are we not seeing?"
        and "What's less obvious but important?" Create processes
        that surface non-salient issues. (في حل المشكلات، اسأل صراحة "ما الذي لا نراه؟" و "ما هو أقل وضوحاً ولكنه مهم؟" أنشئ عمليات تبرز القضايا غير البارزة.)
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Sometimes what's salient is important. Don't dismiss
        everything obvious. (في بعض الأحيان، ما هو بارز مهم. لا تتجاهل كل ما هو واضح.)
      false_sophistication: |
        Assuming that obscure factors are always more important
        than obvious ones. (افتراض أن العوامل الغامضة دائماً أكثر أهمية من العوامل الواضحة.)
      analysis_paralysis: |
        Looking for so many non-salient factors that you never
        act on the salient ones. (البحث عن العديد من العوامل غير البارزة لدرجة أنك لا تتصرف أبداً بناءً على العوامل البارزة.)
      contrarianism: |
        Rejecting salient information just to be different. (رفض المعلومات البارزة لمجرد الاختلاف.)
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: انحياز الندرة
    quick_introduction: |
      انحياز الندرة هو الميل إلى إعطاء قيمة أعلى للأشياء عندما تبدو نادرة أو محدودة.
      "وقت محدود"، "متبقي 3 فقط"، و "وصول حصري" تثير الاستعجال والرغبة، وغالباً ما تتجاوز
      التقييم العقلاني لما إذا كنا نحتاج أو نريد الشيء حقًا.
    one_liner: الندرة تضخم القيمة المدركة — "محدود" يثير الاستعجال على حساب العقلانية.
    try_this:
      - اسأل: هل أرغب في هذا لو لم يكن نادرًا؟ تجريد الأمر من الاستعجال.
      - توقف قبل التصرف بناءً على عروض "الوقت المحدود" أو "متبقي X فقط".
      - لاحظ متى يكون الندرة هو الذي يدفع رغبتك أكثر من القيمة الحقيقية.
    ask_yourself:
      - هل أقوم بتقييم هذا لأنه نادر، أم لأنني في حاجة إليه حقًا؟
      - هل سأتخذ هذا القرار بدون تأطير الندرة؟
    in_more_detail: |
      الندرة تضخم القيمة المدركة. عندما يكون شيء ما نادرًا أو في طريقه للاختفاء،
      نريده أكثر - جزئيًا لأن الندرة يمكن أن تشير إلى الجودة، وجزئيًا لأن
      النفور من الخسارة يجعلنا نخاف من فوات الفرصة. يستخدم المسوقون والمفاوضون الندرة
      لخلق الاستعجال. يمكن أن يؤدي هذا الانحياز إلى قرارات متهورة، وزيادة الإنفاق، وسوء
      تحديد الأولويات.

      تؤثر الندرة أيضًا على النطاق المعرفي لأولئك الذين يعانون من قيود موارد حقيقية؛
      فالفقر يمكن أن يقلل من "النطاق المعرفي" لاتخاذ قرارات أخرى.
    why_this_is_important: |
      التعرف على انحياز الندرة يساعدك على مقاومة التكتيكات التلاعبية واتخاذ خيارات أكثر
      تأنياً. كما أنه يفسر سبب تقديرنا المفرط للإصدارات المحدودة واندفاعنا عندما لا
      نحتاج إلى ذلك.
    when_to_use:
      - صنع_القرار
      - التفاوض
      - الاستثمار
      - تقييم_المخاطر
    how_can_you_spot_it:
      urgency_trigger: |
        "وقت محدود" أو "متبقي X فقط" يخلق رغبة غير متناسبة.
      fear_of_missing_out: |
        إمكانية فقدان الوصول تدفع العمل أكثر من القيمة الجوهرية.
      impulsive_purchases: |
        شراء أشياء لأنها نادرة بدلاً من شرائها لأنك بحاجة إليها.
      artificial_scarcity: |
        الندرة مصطنعة (مثل، عدادات زمنية وهمية) بدلاً من كونها حقيقية.
    examples:
      sales: |
        "متبقي 2 فقط في المخزون" أو "العرض ينتهي الليلة" يحفز عمليات شراء ما
        كانت لتحدث بدون الاستعجال.
      auctions: |
        ينخرط المزايدون في الفوز ويدفعون أكثر مما خططوا له بسبب
        الندرة التنافسية.
      exclusivity: |
        الوصول "للأعضاء فقط" أو "بالدعوة فقط" يزيد من القيمة المدركة.
      genuine_scarcity: |
        عندما تكون الموارد محدودة حقًا، يتخذ الأشخاص تحت ضغط الندرة قرارات أسوأ
        (مثل، الفقراء، المضغوطون بالوقت).
    real_world_implications: |
      انحياز الندرة يدفع سلوك المستهلك، ونتائج المفاوضات، والاستجابات السياسية.
      يمكن استخدامه بشكل أخلاقي (مثل، المواعيد النهائية المشروعة) أو غير أخلاقي
      (مثل، الندرة الوهمية). فهمه يحسن جودة القرار.
    professional_application:
      networking_and_relationship_building: |
        كن حذرًا عندما يخلق الآخرون ندرة مصطنعة ("أنا آخذ عددًا قليلاً فقط من
        العملاء"). تحقق مما إذا كانت الندرة حقيقية. عند بناء العلاقات،
        يمكن للندرة الحقيقية لوقتك أن تشير إلى القيمة - ولكن الإفراط في استخدامها يبدو
        تلاعبيًا.
      collaborative_learning_initiative: |
        عند خلق الاستعجال للمبادرات، تأكد من أنه مشروع. المواعيد النهائية الوهمية
        تؤدي إلى تآكل الثقة عند اكتشافها.
    how_can_this_be_misapplied:
      manipulation: |
        خلق ندرة زائفة عن عمد للضغط على الآخرين لاتخاذ قرارات.
      impulsive_decisions: |
        اتخاذ قرارات مهمة تحت استعجال مصطنع عندما يكون المزيد من الوقت سيحسن
        النتائج.
      overvaluing_scarcity: |
        افتراض أن الأشياء النادرة أفضل دائمًا - في بعض الأحيان تكون الندرة اعتباطية.
      exploiting_vulnerability: |
        استخدام تكتيكات الندرة على الأشخاص الذين يعانون بالفعل من ضغوط موارد.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: التفكير من الدرجة الثانية
    quick_introduction: |
      التفكير من الدرجة الثانية هو ممارسة النظر في عواقب عواقب أفعالك. التفكير من الدرجة الأولى يسأل "ماذا يحدث إذا فعلت X؟" التفكير من الدرجة الثانية يسأل "وماذا بعد ذلك؟" و "وماذا بعد ذلك؟" يكشف الآثار غير المقصودة.
    one_liner: اسأل "وماذا بعد؟" - فكر في عواقب العواقب.
    try_this:
      - لأي قرار، اسأل "وماذا بعد؟" مرتين على الأقل.
      - فكر كيف سيرد الآخرون على فعلك - ثم على ذلك الرد.
      - لاحظ متى تنعكس التأثيرات من الدرجة الأولى أو تتعقد في السلسلة.
    ask_yourself:
      - هل فكرت في الآثار من الدرجة الثانية (والدرجة الثالثة)؟
      - ما هي العواقب غير المقصودة التي قد أغفلها؟
    in_more_detail: |
      قام هاورد ماركس بتعميم المفهوم في مجال الاستثمار. الدرجة الأولى: "سوف ترتفع هذه." الدرجة الثانية: "إذا ارتفعت، سيلاحظ الآخرون، وسيشتري المزيد، سترتفع أكثر - حتى تصبح مبالغًا فيها وتنهار." غالبًا ما تنعكس سلسلة العواقب أو تعقد تأثير الدرجة الأولى.

      التفكير من الدرجة الثانية أصعب - فهو يتطلب المزيد من الجهد الذهني والخيال. ولكنه يمنع العديد من الأخطاء. يفكر الاستراتيجيون الجيدون عدة خطوات للأمام وينظرون في كيفية استجابة الآخرين.
    why_this_is_important: |
      يمنع التفكير من الدرجة الثانية العواقب غير المقصودة ويحسن جودة القرار. إنه ضروري للاستراتيجية والسياسة وأي مجال تتسبب فيه الإجراءات في ردود فعل.
    when_to_use:
      - اتخاذ_القرار
      - حل_المشكلات
      - استراتيجية
      - تقييم_المخاطر
    how_can_you_spot_it:
      consequence_chains: |
        "إذا فعلت X، فسيحدث Y، ثم سيحدث Z..."
      reaction_anticipation: |
        النظر في كيف سيرد الآخرون على فعلك.
      unintended_effects: |
        البحث عن الآثار الجانبية وحلقات التغذية الراجعة.
      reversals: |
        الآثار من الدرجة الثانية التي تتناقض أو تعكس الآثار من الدرجة الأولى.
    examples:
      investing: |
        "إذا اعتقد الجميع أن هذا استثمار جيد، فمن المحتمل أنه مزدحم - قد اختفى التفوق."
      policy: |
        "إذا دعمنا X، ازداد الطلب، ارتفعت الأسعار - هل الدعم يساعد بالفعل؟"
      negotiation: |
        "إذا ضغطت بشدة هنا، فسوف ينتقمون هناك - ما هو التأثير الصافي؟"
      incentives: |
        "إذا كافأنا هذا المقياس، فسوف يتلاعب به الناس - ماذا سيفعلون بالفعل؟"
    real_world_implications: |
      التفكير من الدرجة الثانية هو السمة المميزة للتفكير الاستراتيجي. إنه يمنع فشل السياسات والحوافز غير المقصودة والتفاؤل الساذج. إنه يميز بين صانعي القرار الجيدين والرائعين.
    professional_application:
      networking_and_relationship_building: |
        قبل اتخاذ إجراء، اسأل "كيف سيردون؟ وكيف سأرد على ذلك؟" فكر في ديناميكيات العلاقة، وليس فقط التبادل الفوري.
      collaborative_learning_initiative: |
        في التخطيط، قم بإجراء تمارين "وماذا بعد؟". ارسم سلاسل العواقب. حدد الآثار غير المقصودة قبل ظهورها.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        التفكير في العديد من الخطوات المستقبلية لدرجة أنك لا تتصرف أبدًا.
      false_complexity: |
        افتراض أن آثار الدرجة الثانية تهيمن دائمًا عندما قد تكون آثار الدرجة الأولى كافية.
      overconfidence: |
        الاعتقاد بأنه يمكنك التنبؤ بسلاسل طويلة عندما تتراكم عدم اليقين.
      pessimism: |
        افتراض الأسوأ دائمًا في سلسلة العواقب.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: مغالطة التكلفة الغارقة
    quick_introduction: |
      مغالطة التكلفة الغارقة هي الميل إلى الاستمرار في الاستثمار في قرار ما بسبب
      الموارد التي تم إنفاقها بالفعل، بدلاً من الاعتماد على العوائد المستقبلية المتوقعة.
      عبارات مثل "لقد وصلنا إلى هذا الحد" أو "لقد استثمرت الكثير بالفعل" تؤدي إلى
      رمي المزيد من المال في صفقة خاسرة.
    one_liner: الاستثمار السابق قد ذهب - فقط التكاليف والفوائد المستقبلية هي المهمة.
    try_this:
      - Ask: لو كنت أبدأ اليوم، هل سأختار هذا المسار؟
      - Define "معايير الإيقاف" مسبقًا — الشروط التي ستتوقف بموجبها.
      - Evaluate "القرار الهامشي": ماذا أكسب أو أخسر من هنا فصاعدًا؟
    ask_yourself:
      - هل أستمر بسبب القيمة المستقبلية، أم لتبرير الاستثمار الماضي؟
      - ماذا سأنصح صديقًا كان في وضعي من الصفر؟
    in_more_detail: |
      التكاليف الغارقة هي تكاليف سابقة لا يمكن استردادها. القرارات العقلانية تتجاهلها —
      فقط التكاليف والفوائد المستقبلية هي المهمة. لكننا نكون مرتبطين عاطفياً
      باستثماراتنا. نكمل الوجبة التي لا نستمتع بها، نبقى في الفيلم الذي نكرهه،
      ونستمر في مشاريع لم تعد منطقية. نريد "ألا نضيع" ما استثمرناه،
      ولكن الاستمرار غالبًا ما يؤدي إلى إهدار المزيد.

      تكون المغالطة قوية بشكل خاص عندما نستثمر الوقت، الجهد، أو الهوية،
      وليس فقط المال. الاعتراف بأننا كنا مخطئين يمكن أن يبدو مكلفًا، لذا نضاعف جهودنا.
    why_this_is_important: |
      التعرف على مغالطة التكلفة الغارقة يساعدك على الحد من الخسائر، وتغيير المسار عند
      الحاجة، واتخاذ القرارات بناءً على القيمة المستقبلية بدلاً من الاستثمار الماضي.
      إنه أمر ضروري للمشاريع، والمسارات المهنية، والعلاقات.
    when_to_use:
      - اتخاذ_القرارات
      - الاستثمار
      - التحركات_المهنية
      - تقييم_المخاطر
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "لا يمكننا التوقف الآن — لقد أنفقنا بالفعل X" عندما لا تبرر العوائد المستقبلية
        الاستمرار.
      escalation_of_commitment: |
        الاستثمار أكثر لتبرير الاستثمار السابق أو "إنقاذه".
      identity_investment: |
        الاستمرار لأن الاعتراف بالفشل قد يهدد صورة الذات.
      ignoring_marginal_analysis: |
        اتخاذ القرارات بناءً على التكلفة الإجمالية بدلاً من التكلفة والفائدة الهامشية.
    examples:
      projects: |
        الاستمرار في مشروع فاشل لأن "لقد أمضينا بالفعل 6 أشهر فيه"
        عندما يكون الحد من الخسائر هو القرار العقلاني.
      relationships: |
        البقاء في علاقة لأن "لقد كنا معًا لمدة 5 سنوات" بدلاً من
        تقييم المستقبل.
      careers: |
        البقاء في مسار مهني لا تحبه لأنك استثمرت في الدرجة العلمية أو
        سنوات الخبرة.
      investments: |
        الاحتفاظ بسهم خاسر "للعودة إلى نقطة البداية" بدلاً من إعادة تخصيصه لفرص أفضل.
    real_world_implications: |
      تؤدي مغالطة التكلفة الغارقة إلى إهدار الموارد، وطول أمد الفشل، وضياع الفرص.
      إنها تؤثر على الأفراد، والمنظمات، والحكومات.
      التغلب عليها يتطلب أطر عمل واضحة لاتخاذ القرارات.
    professional_application:
      networking_and_relationship_building: |
        لا تستمر في الاستثمار في العلاقات أو التعاون التي لم تعد تخدمك فقط بسبب الاستثمار الماضي.
        قم بتقييم القيمة المستقبلية.
      collaborative_learning_initiative: |
        قم بإنشاء "معايير إيقاف" للمشاريع — شروط ستتوقف بموجبها
        بغض النظر عن الاستثمار الماضي. قم بمراجعة المشاريع بشكل دوري بمنظور "من الصفر".
    how_can_this_be_misapplied:
      quitting_too_early: |
        استخدام "التكلفة الغارقة" كعذر للتخلي عن الأشياء التي تحتاج إلى المزيد من الوقت لتحقيق عائدها.
      undervaluing_consistency: |
        بعض الالتزامات (مثل العلاقات، السمعة) لها قيمة في الاستمرارية
        التي يتجاهلها التحليل الهامشي البحت.
      cold_rationality: |
        رفض الارتباط العاطفي باعتباره غير عقلاني عندما قد يعكس قيمًا حقيقية.
      analysis_paralysis: |
        الإفراط في التفكير فيما إذا كان يجب الاستمرار عندما تكون الإجابة واضحة.
