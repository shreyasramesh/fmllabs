  - id: survivorship_bias
    name: انحياز البقاء
    quick_introduction: |
      انحياز البقاء هو الخطأ المنطقي في التركيز على الأشخاص أو الأشياء التي
      "نجت" من عملية ما مع تجاهل أولئك الذين لم ينجوا. نرى الفائزين
      وننسى الخاسرين، مما يؤدي إلى استنتاجات متفائلة للغاية حول النجاح
      والفشل.
    one_liner: نرى الفائزين وننسى الخاسرين - مما يؤدي إلى استنتاجات متفائلة للغاية.
    try_this:
      - Ask: من فشل في فعل شيء مشابه؟ ماذا يمكننا أن نتعلم منهم؟
      - Seek out the "invisible" sample—those who didn't survive. (ابحث عن العينة "غير المرئية" - أولئك الذين لم ينجوا.)
      - Notice when you're studying only success stories. (لاحظ عندما تدرس قصص النجاح فقط.)
    ask_yourself:
      - Am I learning only from survivors? (هل أتعلم فقط من الناجين؟)
      - What would the full picture look like if I included the failures? (كيف ستبدو الصورة الكاملة إذا أدرجت الإخفاقات؟)
    in_more_detail: |
      خلال الحرب العالمية الثانية، قام الإحصائي أبراهام والد بتصحيح وضع الدروع على القاذفات من خلال تحليل الأماكن التي أصيبت فيها الطائرات الناجحة - وأوصى بوضع الدروع في الأماكن التي أصيبت فيها الطائرات *غير* الناجحة، حيث أن تلك الطائرات لم تعد أبدًا. نركز بشكل طبيعي على العينة المرئية (الناجين) ونتجاهل العينة غير المرئية (أولئك الذين فشلوا).

      يشوه انحياز البقاء رؤيتنا لريادة الأعمال والاستثمار والوظائف والتاريخ. ندرس الشركات الناجحة ونتجاهل الآلاف التي فشلت في فعل أشياء مماثلة. نسمع من المحظوظين ونتجاهل غير المحظوظين.
    why_this_is_important: |
      يؤدي التصحيح لانحياز البقاء إلى توقعات أكثر واقعية وقرارات أفضل. يساعدك على التعلم من الإخفاقات، وليس فقط النجاحات، وتجنب نسخ الاستراتيجيات التي نجحت فقط مع القلة المحظوظة.
    when_to_use:
      - اتخاذ_القرارات
      - الاستثمار
      - الانتقال_الوظيفي
      - التعلم
    how_can_you_spot_it:
      visible_success_stories: |
        نسمع من الأشخاص الناجحين أكثر بكثير من أولئك الذين حاولوا وفشلوا.
      missing_failures: |
        تستبعد العينة التي نلاحظها أولئك الذين لم "ينجحوا" وبالتالي لا يمكنهم رواية قصصهم.
      copying_survivors: |
        افتراض أن ما فعله الناجون هو سبب نجاحهم عندما قد يكون الأمر مجرد حظ أو انحياز بقاء.
      overly_optimistic_models: |
        تقديرات معدلات النجاح التي تتجاهل المقام (عدد المحاولات).
    examples:
      entrepreneurship: |
        "التسرب من الجامعة مثل زوكربيرج" يتجاهل العديد من المتسربين الذين لم يؤسسوا شركات بمليارات الدولارات.
      investing: |
        دراسة الصناديق التي نجت فقط تتجاهل تلك التي أغلقت بعد أداء ضعيف، مما يضخم العوائد التاريخية.
      career_advice: |
        يعزو الأشخاص الناجحون النجاح إلى العمل الجاد؛ نحن لا نسمع من أولئك الذين عملوا بجد وفشلوا.
      historical_analysis: |
        دراسة الشركات "العظيمة" التي نجت تتجاهل العديد من الشركات التي فشلت باستراتيجيات مماثلة.
    real_world_implications: |
      يضخم انحياز البقاء معدلات النجاح المتصورة، ويشوه النماذج، ويؤدي إلى تقليد سيئ. يتطلب التصحيح له البحث عن حالات الفشل وفهم المعدلات الأساسية.
    professional_application:
      networking_and_relationship_building: |
        عند طلب النصيحة، ابحث أيضًا عن الأشخاص الذين حاولوا وفشلوا - غالبًا ما تكون وجهات نظرهم أكثر إفادة من وجهات نظر الناجين.
      collaborative_learning_initiative: |
        دراسة المشاريع الفاشلة والمبادرات التي تم إغلاقها، وليس فقط تلك الناجحة. إجراء "تحليلات ما بعد الفشل" للتعلم مما لم ينجح.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        الإفراط في التصحيح لافتراض أن النجاح دائمًا ما يكون حظًا وأن الجهد لا يهم.
      dismissing_success: |
        رفض التعلم من الأشخاص الناجحين بسبب "انحياز البقاء".
      analysis_paralysis: |
        التركيز الشديد على حالات الفشل لدرجة أنك لا تتخذ أي إجراء أبدًا.
      false_equivalence: |
        معاملة استراتيجيات الناجين وغير الناجين على أنها مفيدة بنفس القدر عندما يختلف السياق.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: تأثير زيجنيك
    quick_introduction: |
      تأثير زيجنيك هو الميل إلى تذكر المهام غير المكتملة أو المقطوعة
      بشكل أفضل من المهام المكتملة. تخلق المهام غير المكتملة توترًا نفسيًا
      يبقيها نشطة في أذهاننا. تتعلق أدمغتنا بما هو غير مكتمل.
    one_liner: المهام غير المكتملة تلتصق بأذهاننا - تتعلق أدمغتنا بما هو غير مكتمل.
    try_this:
      - استخدم الإكمال "لتحرير" المهام من عبء عقلك - أنهِها أو تخلى عنها بشكل صريح.
      - قسّم العمل إلى أجزاء قابلة للإدارة لإنشاء حلقات مفتوحة مثمرة.
      - لاحظ عندما تفكر بشكل متكرر في أمور غير مكتملة - أغلق الحلقة أو قرر التخلي عنها.
    ask_yourself:
      - ما هي المهام غير المكتملة التي تخلق توترًا في ذهني؟
      - هل هذه الحلقة المفتوحة تستحق البقاء، أم يمكنني إغلاقها؟
    in_more_detail: |
      لاحظت بلوم زيجنيك أن النُدُل يتذكرون الطلبات غير المدفوعة بشكل أفضل
      من المدفوعة - بمجرد اكتمال المهمة، تم "تحريرها" من الذاكرة. تخلق المهام غير المكتملة حلقة مفتوحة تتطلب الإغلاق. هذا يدفع كلاً من التركيز المثمر (نريد الانتهاء) والقلق (لا يمكننا التوقف عن التفكير فيما لم يتم إنجازه).

      يُستخدم التأثير في التسويق (التعليقات النهائية، القصص غير المكتملة) والإنتاجية (تقسيم العمل إلى أجزاء لإنشاء "حلقات مفتوحة" متعددة).
      ويفسر لماذا نفكر بشكل متكرر في الأمور غير المكتملة ولماذا يمكن أن تشعر قوائم المهام بأنها مرهقة.
    why_this_is_important: |
      يساعدك فهم تأثير زيجنيك على إدارة الحمل العقلي، وتصميم تجارب جذابة، واستخدام الانقطاع بشكل استراتيجي. يفسر لماذا لا يمكننا التوقف عن التفكير في العمل غير المكتمل - ولماذا يمكن تسخير ذلك أو قد يكون ضارًا.
    when_to_use:
      - حل_المشكلات
      - القيادة
      - التعلم
      - اتخاذ_القرار
    how_can_you_spot_it:
      rumination_on_incomplete: |
        تتداخل المهام غير المكتملة مع الأفكار أكثر من المهام المكتملة.
      better_recall_of_unfinished: |
        نتذكر المهام المقطوعة بشكل أفضل من المهام المنتهية.
      tension_for_closure: |
        الانزعاج أو الدافع لإكمال ما بدأ.
      serial_dramas: |
        التعليقات النهائية و"يتبع" يستغلان التأثير.
    examples:
      productivity: |
        بدء مهمة يخلق توترًا عقليًا يدفع إلى الإكمال - أو قلق إذا كان هناك الكثير من الحلقات المفتوحة.
      marketing: |
        "الجزء الأول من 3" أو "يتبع" يبقي الجماهير منخرطين ويعودون.
      meetings: |
        إنهاء اجتماع دون خطوات تالية واضحة يترك المشاركين
        مع توتر غير محلول.
      learning: |
        الأسئلة غير المجابة أو التفسيرات غير المكتملة تلتصق بالذاكرة
        وتدفع إلى مزيد من الاستقصاء.
    real_world_implications: |
      يؤثر تأثير زيجنيك على الإنتاجية والمشاركة والحمل العقلي. يمكن تسخيره للتركيز أو قد يسبب الإرهاق.
      ويفسر جاذبية التعليقات النهائية وعبء الكثير من المهام المفتوحة.
    professional_application:
      networking_and_relationship_building: |
        اترك المحادثات بخطوات تالية واضحة - أو حلقات مفتوحة متعمدة إذا كنت تريد أن يتابع الشخص الآخر. الخيوط غير المحلولة تخلق المشاركة.
      collaborative_learning_initiative: |
        استخدم تأثير زيجنيك في التدريب: اطرح مشاكل أو أسئلة
        قبل الاستراحات لإبقاء المتعلمين منخرطين. ولكن تجنب خلق الكثير من
        الحلقات المفتوحة لدرجة أن يشعر الناس بالإرهاق.
    how_can_this_be_misapplied:
      overwhelm: |
        خلق الكثير من الحلقات المفتوحة - الكثير من المهام غير المكتملة - يؤدي إلى
        القلق والشلل.
      manipulation: |
        ترك الأمور غير محلولة عن عمد لخلق الاعتمادية أو
        المشاركة.
      false_urgency: |
        استخدام التأثير لخلق إلحاح مصطنع عندما لا يكون موجودًا.
      incomplete_work: |
        بدء العديد من الأشياء لخلق "توتر" دون فعل
        إكمالها - مما يؤدي إلى جهد مشتت.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: تفكير المحصلة الصفرية
    quick_introduction: |
      تفكير المحصلة الصفرية هو الاعتقاد بأن مكسب شخص ما يجب أن يكون خسارة لشخص آخر -
      وأن الموارد ثابتة وأي ميزة لك تعني عيباً بالنسبة لي.
      في الواقع، العديد من المواقف تكون ذات محصلة إيجابية: يمكن لكلا الطرفين أن يكسبا.
    one_liner: مكسبك لا يجب أن يكون خسارتي - العديد من المواقف تكون ذات محصلة إيجابية.
    try_this:
      - Ask: هل يمكننا توسيع الكعكة؟ هل هذا فعلاً ذو محصلة صفرية؟
      - Look for cooperation before assuming competition.: ابحث عن التعاون قبل افتراض المنافسة.
      - Notice when you're treating a situation as fixed-pie when it isn't.: لاحظ عندما تتعامل مع موقف على أنه كعكة ثابتة وهو ليس كذلك.
    ask_yourself:
      - Am I assuming a fixed pie when we could expand it?: هل أفترض كعكة ثابتة بينما يمكننا توسيعها؟
      - Would cooperation create more value than competition?: هل سيخلق التعاون قيمة أكبر من المنافسة؟
    in_more_detail: |
      في لعبة المحصلة الصفرية، الإجمالي ثابت - مكسبك هو خسارتي. في المواقف ذات المحصلة الإيجابية،
      يخلق التعاون قيمة. التجارة والابتكار وبناء العلاقات غالباً ما تكون ذات محصلة إيجابية. يؤدي تفكير المحصلة الصفرية إلى منافسة غير ضرورية، وفقدان فرص التعاون، وتنافس مدمر.

      هذا التحيز شائع في المفاوضات والسياسة وديناميكيات المنظمات.
      يفترض كعكة ثابتة عندما يمكن غالباً توسيع الكعكة. يمكن أن يصبح
      تحقيقاً ذاتياً: إذا عاملت الآخرين كخصوم، فإنهم يصبحون خصوماً.
    why_this_is_important: |
      التعرف على تفكير المحصلة الصفرية يفتح فرصاً للتعاون و
      خلق القيمة. يحسن المفاوضات، ويقلل الصراع، ويمكّن
      نتائج مربحة للجميع. العديد من أفضل الفرص هي ذات محصلة إيجابية.
    when_to_use:
      - negotiation
      - leadership
      - relationship_building
      - decision-making
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "إذا فازوا، خسرت" عندما يسمح الموقف لكليهما بالكسب.
      competitive_ framing: |
        تأطير المواقف تلقائياً على أنها نحن مقابل هم.
      envy_of_others_gains: |
        الاستياء من نجاح الآخرين كما لو كان يقلل من نجاحك.
      missed_cooperation: |
        الفشل في رؤية فرص التعاون التي ستفيد الجميع.
    examples:
      negotiation: |
        افتراض أن صفقة أفضل للطرف الآخر تعني صفقة أسوأ لك - بينما غالباً ما توسع الحلول الإبداعية القيمة لكلا الطرفين.
      salary: |
        "إذا حصل زميلي على زيادة، فهناك أقل بالنسبة لي" بينما يمكن أن تكون الميزانيات
        مرنة أو يمكن تبرير الزيادات بالقيمة التي تم إنشاؤها.
      politics: |
        "مكاسب حزبهم هي خسائرنا" بينما يمكن أن تفيد العديد من نتائج السياسات
        مجموعات متعددة.
      career: |
        "ترقيتهم تعني فرصة أقل بالنسبة لي" بينما يمكن أن يخلق نمو المنظمة
        المزيد من الفرص للجميع.
    real_world_implications: |
      يغذي تفكير المحصلة الصفرية الصراع، ويحد من التعاون، ويسبب ضياع
      الفرص. غالباً ما يكون خاطئاً في الاقتصاد والعلاقات و
      الابتكار. التحول إلى تأطير المحصلة الإيجابية يحسن النتائج.
    professional_application:
      networking_and_relationship_building: |
        ابحث عن طرق لخلق قيمة للآخرين - نجاحهم يمكن أن يخلق
        فرصاً لك. ابنِ علاقات تستفيد منها كلا الطرفين.
      collaborative_learning_initiative: |
        قم بتأطير أهداف الفريق على أنها ذات محصلة إيجابية: نجاح مشترك، وتنمية الكعكة.
        شجع التعاون بدلاً من المنافسة الداخلية.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        بعض المواقف ذات محصلة صفرية (مثل، ترقية واحدة، ميزانية ثابتة).
        التظاهر بخلاف ذلك يمكن أن يكون ساذجاً.
      naive_cooperation: |
        افتراض أن الجميع سيتعاون عندما يكون بعض الفاعلين
        خصوماً حقيقيين.
      undervaluing_competition: |
        يمكن أن تدفع المنافسة إلى التحسين؛ ليست كل المنافسات مدمرة.
      exploitation: |
        استخدام تأطير "المحصلة الإيجابية" لاستخلاص القيمة من الآخرين الذين لا
        يستفيدون.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
