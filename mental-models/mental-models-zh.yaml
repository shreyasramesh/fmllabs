# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Mandarin Chinese)
# Consolidated from mental-models-zh/

mental_models:
  - id: ambiguity_effect
    name: 模糊效应
    quick_introduction: |
      模糊效应是指当我们缺乏对结果概率的信息时，倾向于回避某些选项。我们宁愿选择已知的风险，也不愿选择未知的风险——即使未知的风险可能更好。不确定性本身就令人不快。
    one_liner: 我们宁愿选择已知的风险，也不愿选择未知的风险——即使未知的风险可能更好。
    try_this:
      - 提问：我回避这个选项主要是因为不确定性，还是因为它确实有弊端？
      - 量化你知道的信息；有时“模糊”的选项有更清晰的上行空间。
      - 注意你何时仅仅因为感觉更安全而默认选择熟悉的事物。
    ask_yourself:
      - 我是因为模糊性而拒绝某事物，还是因为它确实更糟？
      - 我需要知道什么才能对不确定的选项感到满意？
    in_more_detail: |
      在埃尔斯伯格悖论中，人们宁愿押注一个比例已知的骨灰罐，也不愿押注一个比例未知的骨灰罐，即使未知的骨灰罐可能提供更好的几率。我们不喜欢模糊性——我们宁愿有一个清晰的（即使是坏的）概率，也不愿有一个不清晰的概率。

      这种效应影响着投资、职业选择和政策制定中的决策。当我们回避那些模糊但可能更优的选项时，它可能导致次优的选择。它也解释了为什么我们偏爱熟悉的品牌和已知的事物。
    why_this_is_important: |
      认识到模糊效应有助于避免过度偏爱熟悉的事物和低估不确定的事物。当模糊性是可以管理的，它可能导致错失机会。它也解释了为什么透明度和清晰度能减轻焦虑。
    when_to_use:
      - 决策制定
      - 风险评估
      - 投资
      - 职业发展
    how_can_you_spot_it:
      preference_for_known_risks: |
        选择那些概率清晰（即使更糟）的选项，而不是模糊的选项。
      avoidance_of_uncertainty: |
        主要因为“我们了解不够”而拒绝选项。
      familiarity_over_optimality: |
        偏爱已知的，而不是可能更好的未知的。
      information_seeking: |
        愿意为减少模糊性的信息付费——即使这些信息并不改变决策。
    examples:
      investing: |
        偏好国内股票而非国际股票，因为“我们更了解它们”，尽管有分散风险的好处。
      employment: |
        留在已知的工作岗位，而不是接受一个有不确定上行空间的职位。
      product_choice: |
        选择一个熟悉的品牌，而不是一个质量不确定的新选项。
      medical: |
        偏好副作用已知的治疗方法，而不是结果不确定的方法，即使后者可能更好。
    real_world_implications: |
      模糊效应影响着市场、职业选择和政策。可以通过提供更清晰的信息或重新构建决策来减轻这种效应。它也解释了为什么透明度和沟通能减轻焦虑。
    professional_application:
      networking_and_relationship_building: |
        减少关系中的模糊性：明确期望，明确沟通，减少不确定性。人们偏爱已知的情况。
      collaborative_learning_initiative: |
        在引入变革时，减少模糊性——提供关于将发生什么、何时发生以及为什么发生 的清晰信息。模糊性会增加阻力。
    how_can_this_be_misapplied:
      manipulation: |
        故意制造模糊性，以将人们引向偏好的选项。
      false_clarity: |
        在存在真实不确定性时提供虚假的确定性。
      overconfidence: |
        假定减少模糊性总能改善决策——有时模糊的选项确实更好。
      analysis_paralysis: |
        在一些模糊性不可避免的情况下，等待完美信息后再做决定。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
      - default_effect
  - id: anchoring_bias
    name: 锚定效应
    quick_introduction: |
      锚定效应是指在做决策时，过度依赖遇到的第一条信息。这个初始的“锚”会影响后续的判断，即使它并不相关或只是随意设定的。
    one_liner: 你看到的第一个数字决定了它之后的所有数字。
    try_this:
      - 在谈判前，确定你的目标数字，避免被对方的数字锚定。
      - 在估算时，先提出自己的数字，再听取他人的意见。
      - 问问自己：如果我先看到一个不同的数字，我会不会有不同的想法？
    ask_yourself:
      - 我首先遇到的数字或想法是什么？它是否影响了我的判断？
      - 我是否从锚定点进行了足够的调整，还是仍然离它太近？
    in_more_detail: |
      在一项经典的实验中，被要求估算非洲国家在联合国中占的比例的人，如果他们刚刚看到了一个较高的数字（例如，65 vs. 10），他们的估算就会更高。
      这个锚定点——即使是随机的——也影响了他们的回答。锚定效应会影响谈判、定价、招聘和预测。

      我们看到的第一个数字成为一个参考点。我们试图从中调整，但通常调整得不够充分。即使我们知道锚定点是随意的，它仍然会影响我们。专家也无法幸免。
    why_this_is_important: |
      理解锚定效应有助于你做出更好的决策，更有效地进行谈判，并避免被操纵。它也解释了为什么信息的顺序和表述方式如此重要。
    when_to_use:
      - 决策制定
      - 谈判
      - 投资
      - 风险评估
    how_can_you_spot_it:
      first_number_dominance: |
        谈判或估算中的第一个数字不成比例地影响了结果。
      insufficient_adjustment: |
        在从锚定点进行调整时，人们通常调整得不够充分。
      arbitrary_anchor_influence: |
        即使是明显无关的数字（例如，社会安全号码的最后几位数字）也会影响估算。
      order_effects: |
        选项呈现的顺序会改变选择。
    examples:
      salary_negotiation: |
        提出的第一个数字——无论是雇主还是候选人提出的——通常会锚定最终的报价。
      real_estate: |
        挂牌价格锚定买家对价值的认知，即使它被故意设定得很高或很低。
      retail: |
        “原价 99 美元，现价 49 美元”利用原始价格作为锚定，使售价看起来像是个便宜货。
      forecasting: |
        计划会议中的初步估计会锚定后续的预测，即使第一个估计只是一个猜测。
    real_world_implications: |
      锚定效应塑造了市场、谈判和政策。它可以被合乎道德地使用（例如，设定合理的期望），也可以不合乎道德地使用（例如，操纵性定价）。
      识别它有助于提高决策质量。
    professional_application:
      networking_and_relationship_building: |
        在谈判中，考虑先提出第一个报价以设定锚定——或者意识到对方何时在这样做。
      collaborative_learning_initiative: |
        在会议中，要注意谁先对估算发表意见；考虑在讨论前收集独立的估算。
    how_can_this_be_misapplied:
      manipulation: |
        故意使用极端锚定来引导他人达成期望的结果。
      overconfidence_in_anchors: |
        过分相信自己的第一个估算，而不去重新审视它。
      ignoring_relevant_information: |
        让锚定点覆盖了更相关的数据。
      exploitation: |
        利用夸大的“对比价”来使实际价格看起来合理的销售策略。
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: 可用性级联
    quick_introduction: |
      可用性级联是一个自我强化的过程，在这个过程中，一个想法通过反复的公开讨论而获得可信度。讨论得越多，它就越“可用”，越多的人相信它，它就被讨论得越多。集体信念会获得动力，而无论其根本真实性如何。
    one_liner: 一个想法被重复的次数越多，它似乎就越可信——无论证据如何。
    try_this:
      - 问：这种信念是广泛流传因为它正确，还是因为它被重复？
      - 在接受“大家都知道”之前，先寻找一手资料。
      - 注意当仅仅是重复在驱动你对可信度的感受时。
    ask_yourself:
      - 如果我只听过一次，我会相信它吗？
      - 我是将“大家都这么说”与“证据支持它”混为一谈了吗？
    in_more_detail: |
      Timur Kuran 和 Cass Sunstein 描述了可用性级联的工作原理：信息的可用性（我们听到的频率）和可信度（它看起来有多可信）相互加强。媒体报道、社交媒体和公共话语会放大某些想法。一旦一个想法达到了一个可用性的阈值，它就可以迅速传播，甚至成为“常识”，即使它是虚假的或夸大的。

      可用性级联可能是积极的（传播重要的警告）或有害的（传播恐慌或错误信息）。它们由可用性启发式和从众效应驱动。
    why_this_is_important: |
      认识到可用性级联有助于你评估广泛的信念是否反映了证据还是仅仅是重复。它解释了想法如何病毒式传播以及集体信念为何可能出错。这对于媒体素养和批判性思维至关重要。
    when_to_use:
      - 决策
      - 风险评估
      - 学习
      - 领导力
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        一个想法被重复的次数越多，它似乎就越可信。
      media_amplification: |
        报道驱动信念，信念驱动更多报道。
      social_proof_belief: |
        “大家都相信它”成为了相信的证据。
      threshold_effects: |
        一旦一个想法越过可见性阈值，它就会迅速传播。
    examples:
      health_scares: |
        一项研究表明某种产品危险；媒体放大它；公众回避它；更多报道随之而来。风险可能被夸大了。
      financial_panic: |
        关于银行倒闭的传言传播；人们提款；挤兑成为自我实现的预言。
      social_media: |
        一个叙事病毒式传播；重复增加信念；信念增加分享。真实性和病毒式传播可能分道扬镳。
      organizational: |
        关于裁员的谣言传播；焦虑加剧；行为改变；谣言通过反应获得可信度。
    real_world_implications: |
      可用性级联塑造着公众舆论、政策和市场。它们可以传播重要的真相，也可以传播危险的谎言。批判性思维要求区分基于证据的信念和由级联驱动的信念。
    professional_application:
      networking_and_relationship_building: |
        当一个想法“随处可见”时，问：它是因为被重复所以正确，还是因为正确所以被重复？寻找一手资料。
      collaborative_learning_initiative: |
        建立在放大之前先验证的规范。鼓励质疑“大家都知道”的事情。区分反映证据的共识和反映可用性的共识。
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        有时广泛的信念是正确的。不要认为所有流行的想法都是级联。
      conspiracy_thinking: |
        使用“可用性级联”将合法的担忧斥为捏造。
      false_skepticism: |
        因为受欢迎就拒绝有充分证据支持的想法。
      contrarianism: |
        假设任何被广泛相信的东西一定是错误的。
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: 可得性启发式
    quick_introduction: |
      可得性启发式是指我们倾向于根据事件的易于回想程度来判断其发生的可能性。如果我们能轻易回忆起某个事件的例子，我们就会认为该事件很常见。生动、近期或情绪化的例子会主导我们对概率的估计。
    one_liner: 容易想到的事情感觉更有可能发生——即使事实并非如此。
    try_this:
      - 问：基础比率是多少？我是否过度重视了生动或近期的例子？
      - 当你的直觉告诉你“这件事感觉很普遍”或“这件事感觉很罕见”时，去寻求数据。
      - 注意当一个戏剧性的故事正在驱动你的风险评估时。
    ask_yourself:
      - 我是根据回忆的容易程度而不是实际频率来判断可能性的吗？
      - 如果我没有刚看到那个标题，我会考虑得不同吗？
    in_more_detail: |
      我们使用心智捷径来估计频率和概率。一种捷径就是可得性：什么容易出现在脑海中？空难是生动且被大量报道的——我们高估了它们发生的可能性。车祸很常见但不太显眼——我们低估了。近期性、生动性和情感冲击都会增加可得性。

      当可得性与实际频率相关时，这种启发式很有用。但是媒体、个人经历和显眼性常常会扭曲这种相关性。我们害怕罕见但生动的风险，而忽视了常见但平淡的风险。
    why_this_is_important: |
      认识到可得性启发式有助于你修正概率估计，避免对生动的新闻反应过度，并做出更好的风险评估。它解释了许多判断中的系统性错误。
    when_to_use:
      - 决策制定
      - 风险评估
      - 投资
      - 问题解决
    how_can_you_spot_it:
      vividness_dominance: |
        戏剧性或情绪化的例子不成比例地影响估计。
      recency_effect: |
        近期事件感觉更有可能再次发生。
      personal_experience_overweighting: |
        “我认识某个人……”塑造了概率估计。
      media_distortion: |
        报道的内容往往与频率不符。
    examples:
      risk_perception: |
        高估恐怖主义风险（生动、报道多）而低估心脏病风险（常见、不那么戏剧化）。
      investing: |
        近期的市场事件（崩盘、繁荣）主导了对未来的预期。
      hiring: |
        一个关于某所学校糟糕的招聘经历的生动故事会影响对该校所有候选人的评估。
      health: |
        朋友的癌症诊断使癌症感觉比基础比率显示的更可能。
    real_world_implications: |
      可得性启发式影响保险购买、政策优先级和个人决策。它会被媒体和营销人员利用。纠正这一点需要寻求基础比率并质疑“脑海中浮现”的内容。
    professional_application:
      networking_and_relationship_building: |
        请注意，对某人或群体的生动负面经历可能会扭曲你的判断。寻求基础比率和多个数据点。
      collaborative_learning_initiative: |
        在评估风险或机遇时，明确提问“基础比率是多少？”以及“我是否过度重视了生动的例子？”利用数据来纠正由可得性驱动的估计。
    how_can_this_be_misapplied:
      dismissing_intuition: |
        有时可得性是有启示性的——近期经验可以表明变化。不要认为所有由可得性驱动的判断都是错误的。
      analysis_paralysis: |
        过度纠正是指忽视生动经历带来的合法警告信号。
      false_objectivity: |
        假设基础比率总是正确的，即使它们可能已过时或不适用。
      manipulation: |
        故意使某些例子生动，以引导他人的判断。
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof现象
    quick_introduction: |
      Baader-Meinhof现象（也称为频率幻觉）是指当你了解到某件新事物后，突然发现它随处可见。这感觉像是一种巧合，但通常是选择性注意——你的大脑会优先注意到它最近接触到的事物。
    one_liner: 你了解到某件新事物，然后突然发现它无处不在——它其实一直都在。
    try_this:
      - 当你了解到某件事后感觉它“无处不在”时，检查一下基础比率。
      - 注意一下，是最近性让你觉得某事比实际更重要吗？
      - 问问自己：我看到的是一个真实的趋势，还是我只是注意到我被优先提示去注意的东西？
    ask_yourself:
      - 这件事现在真的更常见了吗，还是我只是更注意到了？
      - 如果我最近没有了解它，我还会看到这种模式吗？
    in_more_detail: |
      在听到Baader-Meinhof恐怖组织后，一个人可能会在几天之内在新闻、谈话和文章中看到对它的提及。这种现象有两个组成部分：选择性注意（你注意到你正在寻找的东西）和确认偏差（你记住成功的例子，忘记失败的例子）。

      这种错觉是，某件事突然变得更常见了。实际上，它一直存在；你只是没有注意到它。这可能导致高估最近学到的信息的普遍性或重要性。
    why_this_is_important: |
      认识到Baader-Meinhof现象有助于你避免基于最近的接触而高估某事的普遍性或重要性。它还解释了为什么新的想法、产品或趋势在你第一次注意到它们后，会感觉“无处不在”。
    when_to_use:
      - 决策
      - 学习
      - 风险评估
      - 问题解决
    how_can_you_spot_it:
      sudden_ubiquity: |
        你学到一个新单词、概念或产品，几天之内就感觉你到处都能看到它。
      recency_bias: |
        最近的信息比实际情况更能代表现实。
      pattern_seeking: |
        你的大脑将不相关的目击事件联系起来，形成一个“到处都是”的叙事。
      forgetting_the_misses: |
        你不会追踪你没有看到某事多少次——只关注你看到它的次数。
    examples:
      vocabulary: |
        学习了“serendipity”（机缘巧遇）这个词，然后在一周内发现了它在三篇不同的文章中出现。
      car_purchase: |
        决定购买某个车型后，你在每条街上都能看到它——尽管它一直都在那里。
      health_anxiety: |
        阅读了一个罕见的症状后，你开始注意到自己身上有类似的感受，导致不必要的担忧。
      trends: |
        发现了一个新的应用程序或趋势，并感觉它突然占据了主导地位——但它可能用户群很小。
    real_world_implications: |
      这种现象会影响我们如何看待趋势、风险和机遇。营销人员和媒体可以通过重复接触来利用它。在决策中，它可能导致对近期信息的过度重视。
    professional_application:
      networking_and_relationship_building: |
        当某人在了解某个话题后反复提及它时，要认识到他们可能正在经历频率幻觉——这个话题不一定更相关，只是对他们来说更显眼。
      collaborative_learning_initiative: |
        在培训中，要强调学习新事物后“到处都能看到它”是正常的；鼓励检查基础比率，而不是相信普遍存在的感受。
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        假设某件事比实际更普遍或更重要，因为你最近经常注意到它。
      confirmation_bias_amplification: |
        将“到处都能看到它”的感觉作为信念正确的证据。
      decision_distortion: |
        根据感觉上异常重要的近期信息做出选择。
      vulnerability_to_manipulation: |
        广告商和宣传者通过重复接触来制造普遍性和重要性的幻觉。
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
      - availability_heuristic
  - id: barnum_effect
    name: 巴纳姆效应
    quick_introduction: |
      巴纳姆效应（或福勒效应）是指倾向于接受模糊、笼统的性格描述，并认为其具有独特的准确性。星座、算命先生和性格测试会使用适用于几乎所有人的陈述——但我们却认为它们是针对我们个人的。我们在笼统的描述中看到自己。
    one_liner: 模糊的陈述因为适用于几乎所有人，所以感觉很个人化。
    try_this:
      - Ask: 这种描述是否适用于许多人？尝试对其他人进行测试。
      - Seek specific, behavioral feedback instead of vague praise or criticism. 寻求具体的、行为方面的反馈，而不是笼统的表扬或批评。
      - Notice when "personalized" insights feel too good to be discriminating. 注意当“个性化”的见解感觉好得不像能区分个体时。
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger? 如果将此反馈提供给陌生人，是否会感觉准确？
      - Am I remembering the hits and forgetting the misses? 我是记住了吻合的部分，而忘记了不符的部分吗？
    in_more_detail: |
      心理学家伯特兰·福勒（Bertram Forer）给学生们提供了相同的“个性化”反馈（例如，“你需要别人喜欢和钦佩你”），学生们认为这些反馈非常准确。这些陈述足够模糊，适用于任何人。据报道，P.T.巴纳姆说过“每分钟都有一个傻瓜诞生”—这个效应以他擅长用看似个性化的笼统陈述来吸引大众而得名。

      这个效应之所以有效，是因为我们擅长在模糊的陈述中找到个人相关性。我们记住了吻合的部分，而忘记了不符的部分。这是冷读术和许多“性格”产品的基础。
    why_this_is_important: |
      认识到巴纳姆效应有助于你评估性格评估、抵制操纵，并避免过度解读模糊的反馈。它解释了为什么星座感觉准确，以及为什么一些“个性化”的建议是笼统的。
    when_to_use:
      - 决策
      - 学习
      - 风险评估
      - 关系建立
    how_can_you_spot_it:
      vague_accuracy: |
        感觉个人化但可能适用于许多人的反馈。
      selective_fit: |
        我们关注符合的部分，而忽略不符合的部分。
      cold_reading: |
        某人通过实际上是笼统的陈述来“解读”你。
      personality_test_enthusiasm: |
        不加批判地接受评估结果，认为其具有独特的洞察力。
    examples:
      horoscopes: |
        “你有时会怀疑自己的决定”感觉很个人化，但适用于大多数人。
      fortune_telling: |
        我们将其解读为针对我们具体情况的笼统预测。
      personality_tests: |
        一些评估使用巴纳姆陈述，感觉准确但并不具有区分度。
      feedback: |
        我们将其解读为深度个性化的笼统绩效反馈。
    real_world_implications: |
      巴纳姆效应在占星术、一些辅导和低质量评估中被利用。它可能导致对无效工具产生虚假的信心。它还解释了为什么我们容易受到奉承和模糊的正面反馈的影响。
    professional_application:
      networking_and_relationship_building: |
        在接收反馈时，问“这是否适用于许多人？”寻求具体的、行为方面的反馈，而不是笼统的表扬或批评。对感觉好得令人难以置信的“个性化”见解持怀疑态度。
      collaborative_learning_initiative: |
        在使用评估工具时，选择具有区分效度的经过验证的工具。避免依赖巴纳姆陈述的工具。培训人们识别模糊的反馈。
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        并非所有个性化反馈都是巴纳姆效应——有些确实是具体的。不要全盘否定所有模糊的反馈。
      invalidating_experience: |
        告诉某人他们的洞察体验“只是巴纳姆效应”，而实际上它可能对他们有价值。
      overcorrection: |
        因为一些个性化框架使用巴纳姆陈述，就否定所有个性化框架。
      false_skepticism: |
        认为某事物感觉准确就一定是巴纳姆效应——有时事物就是准确的。
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: 基本率谬误
    quick_introduction: |
      基本率谬误是指倾向于忽略一般的统计信息（基本率），而倾向于更看重具体的、生动的具体信息。我们过分看重特定案例，而低估了先验概率。一个引人注目的故事可以压倒数字所说的一切。
    one_liner: 一个引人注目的故事可以压倒数字所说的一切。
    try_this:
      - 在判断一个案例之前，先问：这种情况的基本率是多少？
      - 将具体证据与先验概率结合起来——不要忽略任何一方。
      - 注意何时一个生动的例子正在压倒统计数据。
    ask_yourself:
      - 我是否在过分看重这个具体案例而低估了基本率？
      - 如果我把引人注目的故事放在一边，数字会怎么说？
    in_more_detail: |
      如果一种疾病影响了1%的人口，而检测的准确率为95%，那么阳性结果通常意味着这个人很可能仍然没有患病——因为基本率非常低。但我们忽略了基本率，而专注于“他们检测呈阳性”。我们被具体情况而非统计数据所左右。

      这种谬误会影响医疗诊断、招聘、风险评估和法律判断。我们需要使用贝叶斯推理将基本率与案例特定的证据结合起来——但我们常常做不到。
    why_this_is_important: |
      纠正基本率谬误可以提高诊断、风险评估和决策质量。它可以防止我们对生动的案例反应过度，对统计现实反应不足。
    when_to_use:
      - 决策制定
      - 风险评估
      - 问题解决
      - 投资
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        基本率没有被纳入判断中。
      vividness_over_statistics: |
        一个案例或故事压倒了总体数据。
      diagnostic_overweighting: |
        在不考虑基本率的情况下，过分看重新证据（例如，检测结果）。
      anecdote_override: |
        “我认识一个人…”压倒了统计证据。
    examples:
      medical: |
        罕见病的阳性检测结果——基本率很低，所以阳性结果通常是假阳性。我们忽略了这一点，并认为他们患有这种疾病。
      hiring: |
        一位候选人面试表现出色——我们忽略了面试预测工作表现的基本率。
      risk: |
        飞机坠毁事件生动形象——我们高估了飞行风险，低估了驾驶风险，忽略了基本率。
      startup_investing: |
        一位创始人演讲很成功——我们忽略了大多数初创公司无论演讲质量如何都会失败的事实。
    real_world_implications: |
      基本率谬误会影响医疗决策、法律判断和商业战略。它会导致资源分配不当和风险评估不佳。贝叶斯思维可以纠正这一点。
    professional_application:
      networking_and_relationship_building: |
        在评估人员时，要考虑基本率：例如，这种类型的行为发生的频率是多少？不要让一次生动的互动压倒更广泛的模式。
      collaborative_learning_initiative: |
        在做决策时，在纳入案例特定证据之前，明确陈述并考虑基本率。对团队进行贝叶斯推理的培训。
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        当基本率表明相反情况时，忽略强有力的案例特定证据——有时个体案例是例外。
      stereotyping: |
        使用基本率对个人做出不公平的判断。
      false_precision: |
        当基本率只是粗略估计时，却以虚假的精确性应用基本率。
      dismissing_individuals: |
        “统计显示X”，而你面前的个体可能不符合该分布。
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: 贝叶斯定理
    quick_introduction: |
      贝叶斯定理描述了在收到新证据时如何更新假设的概率。它将信念应该与证据支持它们的程度成比例地改变这一想法形式化——不是全有或全无，而是渐进地改变。
    one_liner: 根据证据支持的程度更新信念。
    try_this:
      - 从先验信念开始；如果你错了，问问证据有多大可能出现。
      - 渐进更新——不要因为一个数据点就从 0% 变为 100%。
      - 考虑替代假设：证据是否也适用于它们？
    ask_yourself:
      - 这个证据实际上有多大程度地改变了概率？
      - 我是在更新我的信念，还是仅仅在确认我已经想到的事情？
    in_more_detail: |
      该定理指出，给定证据的假设的概率等于先验概率乘以给定假设的证据的可能性，除以证据的概率。在实践中：从你的先验信念开始，看看新证据与你的假设与替代假设的一致性如何，然后相应地进行更新。

      贝叶斯思维通过要求你考虑如果你错了，证据有多大的可能性出现，来对抗确认偏见。它是概率推理和科学更新的基础。
    why_this_is_important: |
      贝叶斯思维在不确定性下的决策能力有所提高，帮助你避免过度自信，并为从证据中学习提供了框架。它对于诊断、预测和任何存在不确定性的领域都至关重要。
    when_to_use:
      - 决策制定
      - 问题解决
      - 风险评估
      - 学习
    how_can_you_spot_it:
      prior_and_update: |
        从基本信念开始，并根据新证据进行调整。
      likelihood_ratio_thinking: |
        问“如果我对了和错了，这个证据有多大的可能性？”
      incremental_updating: |
        信念会随着证据逐渐变化，而不是突然改变。
      base_rate_respect: |
        先验概率（基本比率）很重要，而不仅仅是最新数据点。
    examples:
      medical_diagnosis: |
        罕见病的阳性检测结果——先验（低患病率）意味着阳性结果通常是假阳性。贝叶斯定理更新了概率。
      forecasting: |
        在新的数据到来时更新预测，而不是坚持最初的估计。
      hiring: |
        从角色匹配的基本比率开始，然后根据面试表现进行更新。
      investing: |
        随着新信息（收益、新闻）的到来，更新公司成功的概率。
    real_world_implications: |
      贝叶斯思维是现代人工智能、医学诊断和科学推理的基础。它纠正了基本比率忽视和确认偏见。对于任何存在不确定性的领域来说，它都是一个强大的工具。
    professional_application:
      networking_and_relationship_building: |
        根据新证据更新你对人的看法，而不是固守最初的印象。在解释行为时，要考虑基本比率（例如，这种行为有多普遍？）。
      collaborative_learning_initiative: |
        鼓励团队在讨论前明确陈述先验信念，然后在呈现证据时进行更新。减少锚定效应和确认偏见。
    how_can_this_be_misapplied:
      overprecision: |
        在不确定性很高的情况下分配精确的概率。
      prior_rigidity: |
        坚持强烈的先验信念，并且不根据新证据进行足够的更新。
      base_rate_tyranny: |
        因为基本比率表明相反的情况，而忽略了强有力的证据——有时证据应该起主导作用。
      false_sophistication: |
        使用贝叶斯语言来显得严谨，但实际上并没有进行推理。
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: 本杰明·富兰克林效应
    quick_introduction: |
      本杰明·富兰克林效应是一种心理现象，即人们在为某人做了一件好事后，会更喜欢这个人。与我们通常认为“因为喜欢一个人才帮他”的直觉相反，我们往往会因为帮过某人而开始喜欢他。
    one_liner: 我们会喜欢那些我们帮过的人——我们的态度会随着我们的行为而改变。
    try_this:
      - 如果你想改善一段关系，可以考虑请求一个小小的帮助。
      - 注意当你为某人做了好事后，你的感觉是否发生了转变。
      - 要意识到，别人在你帮助他们之后，可能会更喜欢你。
    ask_yourself:
      - 为某人做了一件好事，是否改变了我对他们的感觉？
      - 我是否通过增加对他们的好感来合理化我的付出？
    in_more_detail: |
      本杰明·富兰克林曾记载了他如何通过向一位竞争对手议员借阅一本稀有的书来赢得对方的好感。在对方同意后，富兰克林归还了书，并附上了感谢信。他们的关系因此得到了显著改善。该效应表明，我们的态度会随着我们的行为而改变：当我们为一个人的付出努力时，我们会通过增加对他们的好感来合理化这种付出。

      认知失调理论解释了这一点：当我们为一个不喜欢或感觉中立的人做了一件好事时，我们的行为（帮助）和我们的态度（不喜欢）之间会产生紧张。通过增加对他们的好感来解决这种紧张，通常比承认自己违背了自己的偏好而行动更容易。
    why_this_is_important: |
      理解本杰明·富兰克林效应可以帮助你更有策略地建立人际关系，并识别出你自己的感受何时可能受到过往恩惠的影响。它还解释了为什么在试图改善关系时，请求小帮助可能比提供帮助更有效。
    when_to_use:
      - 关系建立
      - 谈判
      - 领导力
      - 冲突解决
    how_can_you_spot_it:
      liking_after_helping: |
        当你为某人做了好事后，注意你是否感觉对他们的好感增加了，即使你之前感觉中立或负面。
      others_requesting_small_favors: |
        当有人反复请求小帮助时，他们可能是有意或无意地利用这种效应来建立融洽关系。
      attitude_shift_post_investment: |
        在投入时间或精力帮助某人后，观察你对他们的看法是否发生了积极的转变。
      reciprocal_relationship_dynamics: |
        一段关系中，如果一方做了许多好事，即使在行动上看起来平衡，但在感情上可能会感觉不平衡。
    examples:
      networking: |
        向同事征求对草稿的反馈意见，这会让他们感觉更看重你的成功，并对你产生更积极的态度。
      sales: |
        销售人员向潜在客户请求一个小帮助（例如，推荐或介绍），这会增加潜在客户的投入感和好感。
      conflict_resolution: |
        在发生争执后，请对方帮忙处理一些无关的事情，可以缓和紧张关系，重建善意。
      mentoring: |
        当一位资深人士向一位新人寻求意见或帮助时，新人通常会感觉更受重视，联系更紧密。
    real_world_implications: |
      本杰明·富兰克林效应会影响招聘、销售、外交以及日常的社交互动。它可以被合乎道德地用于建立联系，也可以被不道德地用来操纵情感。识别它能帮助你理解为什么有些关系在非对称的给予恩惠后会感觉更牢固。
    professional_application:
      networking_and_relationship_building: |
        在建立人际关系时，考虑请求小而合理的帮助，而不是只提供帮助。帮助行为会产生投入感和积极的评价。
      collaborative_learning_initiative: |
        在团队中，让成员互相帮助（例如，同行评审、交叉培训）可以增强凝聚力。要组织好合作，让每个人都能提供和接受帮助。
    how_can_this_be_misapplied:
      manipulation: |
        故意仅仅为了让某人喜欢你而请求帮助，但实际上并没有真正的需求，如果被发现，会让人感到被剥削。
      overreliance_on_favors: |
        认为单凭帮助就能修复一段破裂的关系；有些冲突需要直接的沟通和问责。
      asymmetric_exploitation: |
        反复请求帮助而不回报，可能会适得其反，滋生怨恨。
      misattributing_motives: |
        认为某人的热情是纯粹真实的，而实际上可能是部分源于他们为你做的好事。
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: 认知局限
    quick_introduction: |
      认知局限是指人类的决策受到可用信息、认知能力和时间的限制。我们不是追求最优解；而是“满意解”—我们选择足够好的选项，而不是最好的选项。
    one_liner: 我们追求满意解——选择足够好的，而非最优的。
    try_this:
      - 尽可能简化选择；过多的选项会压垮认知局限。
      - 提前设定“足够好”的标准，以避免无休止的搜索。
      - 注意你何时会为了追求边际效益递减而过度优化。
    ask_yourself:
      - 我是否在寻找完美的选项，而实际上“足够好”就够了？
      - 哪些限制（时间、信息、注意力）正在限制我的决策？
    in_more_detail: |
      赫伯特·西蒙（Herbert Simon）引入这一概念，是为了挑战古典经济学中关于拥有完美信息的理性经济人假设。实际上，我们的注意力、工作记忆和时间都是有限的。我们使用启发式方法和捷径来做出“理性”的决策，考虑到我们的限制，即使这些决策在理想意义上不是最优的。

      认知局限解释了我们为何不总是选择最佳选项，为何依赖经验法则，以及为何情境和表述如此重要。它是一个描述性的模型，说明我们实际上是如何决策的，而不是如何应该决策的处方。
    why_this_is_important: |
      理解认知局限有助于你设计更好的流程，为他人简化选择，并为决策质量设定现实的期望。它也解释了为什么在限制条件下，“非理性”行为往往是理性的。
    when_to_use:
      - 决策制定
      - 问题解决
      - 领导力
      - 风险评估
    how_can_you_spot_it:
      satisficing_behavior: |
        人们选择第一个可接受的选项，而不是穷尽比较。
      heuristic_reliance: |
        决策是通过经验法则做出的，而不是通过全面分析。
      context_dependence: |
        同一个人会根据选项的呈现方式做出不同的选择。
      information_overload: |
        当可用信息过多时，决策质量可能会下降。
    examples:
      hiring: |
        一位经理录用了第一个达到标准的候选人，而不是无休止地面试来寻找“最佳”候选人。
      consumer_choice: |
        购物者从货架上的前几个选项中选择，而不是比较商店里的所有产品。
      policy: |
        选民使用党派归属或少数关键问题作为捷径，而不是分析所有政策立场。
      daily_routines: |
        人们遵循习惯和默认选项，而不是重新优化每一个决策。
    real_world_implications: |
      认知局限塑造了市场、政策设计和组织行为。“助推”（Nudges）和选择架构（Choice Architecture）之所以有效，是因为它们考虑到了我们的局限性。忽视这一点会导致过于复杂的系统，导致人们无法有效使用。
    professional_application:
      networking_and_relationship_building: |
        不要期望他人能实时处理复杂的权衡。简化选择，并提供清晰的默认选项。
      collaborative_learning_initiative: |
        设计符合认知局限的流程：减少选择，提供默认选项，并为复杂决策使用清单。
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        设计假设认知能力无限的流程，导致决策疲劳和糟糕的结果。
      blaming_irrationality: |
        在不考虑其限制条件的情况下，将他人的选择斥为非理性。
      exploitation: |
        故意用复杂性压倒人们，以引导他们走向期望的结果。
      perfectionism: |
        期望做出最优决策，而实际上满意解往往是理性的方法。
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: 旁观者效应
    quick_introduction: |
      旁观者效应是指，在有他人在场的情况下，个体提供帮助的可能性降低。旁观者越多，任何一个人采取行动的可能性就越小。责任被分散了；我们假设其他人会提供帮助。
    one_liner: 在场的人越多，任何一个人采取行动的可能性就越小。
    try_this:
      - 在紧急情况下，直接分配责任：“你，拨打911。”
      - 不要假设别人会帮忙——立即行动或明确委托。
      - 注意你是否在等待别人先采取行动。
    ask_yourself:
      - 我是否因为有他人在场而分散了责任？
      - 如果我一个人，我会采取不同的行动吗？
    in_more_detail: |
      在凯蒂·吉诺维斯（Kitty Genovese）被谋杀之后（尽管故事在一定程度上被神化了），研究人员发现，他人在场会降低助人行为。我们观察他人的线索——如果没人行动，我们就认为“不需要采取行动”。我们还会经历责任分散：当很多人在场时，每个人感觉自己承担的个人责任更少。群体性无知（pluralistic ignorance）可能发生：每个人都认为有问题，但没有人采取行动，因为没有人采取行动。

      当情况不明确以及旁观者彼此不认识时，这种效应最强。可以通过直接分配责任（“你，拨打911”）来克服。
    why_this_is_important: |
      理解旁观者效应可以帮助你在他人不采取行动时采取行动，并设计克服它的系统。如果你遇到麻烦，要点名一个人。如果你是旁观者，不要等待别人采取行动。
    when_to_use:
      - 领导力 (leadership)
      - 关系建立 (relationship_building)
      - 冲突解决 (conflict_resolution)
      - 决策 (decision-making)
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        当很多人在场时，会想“别人会做的”。
      pluralistic_ignorance: |
        每个人都认为需要采取行动，但因为没有人采取行动，所以没有人采取行动。
      social_proof_inaction: |
        他人的不作为被解释为“不需要采取行动”。
      audience_inhibition: |
        害怕看起来愚蠢或过度反应而阻碍行动。
    examples:
      emergency: |
        一个人突然倒地；在许多旁观者在场的情况下，每个人寻求帮助的可能性都降低了。
      workplace: |
        每个人都看到了问题，但没有人提出——每个人都认为别人会提出。
      harassment: |
        骚扰的目击者没有干预，每个人都认为别人会采取行动。
      meetings: |
        一个糟糕的想法没有受到挑战，因为每个人都认为别人会发言。
    real_world_implications: |
      旁观者效应在紧急情况下可能导致悲剧性的后果，并允许问题在组织中持续存在。克服它需要直接分配责任以及鼓励干预的规范。
    professional_application:
      networking_and_relationship_building: |
        当你需要帮助时，向特定的人寻求。当你看到错误时，采取行动——不要假设别人会。创造一种期望并奖励敢于发声的规范。
      collaborative_learning_initiative: |
        培训人们识别旁观者效应并进行干预。使用“如果你看到问题，就说出来”并明确分配角色。奖励那些首先发声的人。
    how_can_this_be_misapplied:
      blaming_bystanders: |
        严厉评判个体，而旁观者效应是一种强大的情境力量——应专注于改变情境。
      false_assumption: |
        假设只要有足够多的人在场，总会有人提供帮助——事实往往相反。
      overcorrection: |
        让每个人都负责，结果导致没有人负责——责任分散仍然可能发生。
      individualizing: |
        将旁观者效应视为一种性格缺陷，而不是一种情境现象。
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: 能力圈
    quick_introduction: |
      能力圈是一个心智模型，它敦促你了解自己专业知识的界限，并在做出重要决策时待在这些界限之内。沃伦·巴菲特和查理·芒格都强调要了解自己不知道什么。
    one_liner: 了解你专业知识的界限——并在关键时刻待在这些界限之内。
    try_this:
      - 绘制出你真正拥有专业知识的领域与你只是猜测的领域。
      - 当处于能力圈之外时，寻求建议或委托他人。
      - 诚实地问自己：真正的专家会同意我在这里的判断吗？
    ask_yourself:
      - 我是在能力圈内，还是在猜测？
      - 我上一次在这个领域承认“我不知道”是什么时候？
    in_more_detail: |
      每个人都有自己真正擅长的领域——在那里他们可以评估信息、发现错误并做出可靠的判断。超出这个圈子，他们容易犯和别人一样的偏见和错误。关键在于诚实的自我评估：你真正有能力的是什么，而你在猜测的是什么？

      能力圈可以通过刻意学习来扩大，但这需要谦逊来认识到它当前的界限。在能力圈外运作会增加代价高昂的错误风险，尤其是在风险很高的情况下。
    why_this_is_important: |
      待在能力圈内可以减少代价高昂的错误，提高决策质量。它还有助于你知道何时寻求建议、委托他人或避免参与。能力圈外的过度自信是失败的主要原因。
    when_to_use:
      - 决策制定
      - 投资
      - 职业发展
      - 风险评估
    how_can_you_spot_it:
      honest_boundary_assessment: |
        你能解释你在某个领域知识的局限性吗？你知道自己不知道什么吗？
      knowing_when_to_defer: |
        认识到何时应该寻求专家意见，而不是独自决定。
      consistent_track_record: |
        在你的能力圈内，你的判断往往会随着时间的推移得到验证；在圈外，则不会。
      calibration: |
        你在某个领域的信心与你在该领域的实际表现相匹配。
    examples:
      investing: |
        巴菲特避开科技股，因为他说这些股票超出了他的能力圈——他无法可靠地评估它们。
      career: |
        一位专家固守自己的领域，与一位接受一个不相关领域的“有挑战性的”职位的人形成对比。
      hiring: |
        知道何时依赖自己的判断，何时引入专家来担任技术职位。
      advice_giving: |
        拒绝对专业领域之外的话题发表意见，而不是猜测。
    real_world_implications: |
      能力圈是价值投资和职业成功的核心。忽视它会导致过度自信、失败的尝试和糟糕的建议。扩大能力圈需要付出努力和诚实的反馈。
    professional_application:
      networking_and_relationship_building: |
        与那些能力圈能与你互补的人建立关系。知道何时引荐他人，而不是自己回答。
      collaborative_learning_initiative: |
        创建拥有重叠和互补能力圈的团队。鼓励人们在意识到自己超出能力范围时及时指出。
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        从不踏出能力圈会限制成长和学习。
      false_modesty: |
        声称有一个很小的能力圈来逃避责任或困难的决策。
      gatekeeping: |
        使用“能力圈”来在不参与对方论证的情况下驳回他人。
      stagnation: |
        将能力圈视为固定不变的，而不是可以随着努力而扩大的东西。
    related_content:
      - dunning_kruger_effect
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: 认知失调
    quick_introduction: |
      认知失调是指当我们持有相互冲突的信念，或者我们的行为与我们的信念相悖时所感受到的心理不适。我们有动力去减轻这种不适——通常是通过改变我们的信念来匹配我们的行为，而不是改变我们的行为。
    one_liner: 我们改变信念来匹配行为的频率比反过来更高。
    try_this:
      - 注意你何时为了减轻不适而合理化，而不是改变行为。
      - 问：我是在调整我的信念来证明我所做的行为合理吗？
      - 考虑改变行为是否比改变信念更诚实。
    ask_yourself:
      - 我是通过合理化来减轻失调，还是通过实际改变来减轻？
      - 如果我没有采取过这样的行动，我还会持有这个信念吗？
    in_more_detail: |
      利昂·费斯廷格（Leon Festinger）的理论解释说，我们寻求一致性。当我们行为违背我们的价值观时（例如，撒谎、浪费钱），我们会经历失调。为了减轻它，我们可能会改变我们的信念（“那真的不是谎言”）或最小化行为（“没那么糟”）。我们常常合理化而不是改革。

      认知失调驱动着本·富兰克林效应（我们喜欢我们帮助过的人），解释了我们为什么为过去的决定辩护，并构成了许多自我欺骗的基础。它是信念形成和改变的强大力量。
    why_this_is_important: |
      理解认知失调可以帮助你识别自己的合理化，并理解为什么人们会抵制改变想法。它也解释了为什么承诺和一致性是强大的说服原则。
    when_to_use:
      - 决策 (decision_making)
      - 建立关系 (relationship_building)
      - 领导力 (leadership)
      - 冲突解决 (conflict_resolution)
    how_can_you_spot_it:
      post_decision_rationalization: |
        做出选择后，我们强调我们选择的积极方面和被拒绝选项的消极方面。
      belief_action_alignment: |
        我们调整信念以匹配我们已经采取的行动。
      discomfort_with_inconsistency: |
        当我们注意到自己的行为与我们声明的价值观不符时感到的不安。
      resistance_to_disconfirming_evidence: |
        忽视或最小化与我们的承诺相冲突的信息。
    examples:
      purchase_justification: |
        购买昂贵的物品后，我们强调其好处，并淡化其成本。
      relationship: |
        我们通过关注好的一面和最小化坏的一面来合理化维持一段糟糕的关系。
      career: |
        我们通过强调“必须”留下来的理由来为留在不喜欢的工作中辩护。
      beliefs: |
        当我们的行为与我们的价值观相悖时，我们改变我们的价值观（“我真的不是素食者——我只是偶尔吃肉”），而不是我们的行为。
    real_world_implications: |
      认知失调塑造了信念的形成、消费者行为和政治态度。它解释了为什么人们在做出糟糕的决定后会加倍投入，以及为什么改变行为可以改变信念。
    professional_application:
      networking_and_relationship_building: |
        小的承诺可能导致更大的承诺——人们会为自己过去的行动辩护。合乎道德地使用它：从小要求开始。注意你自己何时在为自己的行为辩护。
      collaborative_learning_initiative: |
        在引入变革时，要尽早获得支持和小的承诺——它们会产生促使更大范围采纳的失调。避免强迫公开承诺，这会产生怨恨。
    how_can_this_be_misapplied:
      manipulation: |
        故意制造失调以迫使人们服从。
      dismissing_genuine_change: |
        当人们有时会真正更新自己的想法时，却假设所有的信念改变都是合理化。
      forced_consistency: |
        在人们的观点已经合法演变时，强迫他们“保持一致”。
      self_deception: |
        利用失调理论来证明自己回避关于自身的令人不适的真相是合理的。
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: 确认偏误
    quick_introduction: |
      确认偏误是指我们倾向于以证实我们现有信念的方式来寻找、解释和记住信息。
      我们对支持性证据给予更多重视，而忽视或否定与我们观点相悖的证据。
      我们提出的问题是为了证实假设，而不是检验假设。
    one_liner: 我们寻找并记住证实我们信念的事物；我们忽视与我们信念相悖的事物。
    try_this:
      - 问：什么能证明我是错的？积极寻找证伪证据。
      - 注意你何时更重视支持性信息而非矛盾信息。
      - 像认真对待自己的观点一样认真对待相反的观点。
    ask_yourself:
      - 我是在检验我的假设，还是只是在证实它？
      - 我上一次根据新证据改变想法是什么时候？
    in_more_detail: |
      我们并非中立的信息处理者。我们寻求确认，将模糊信息解释为支持，并更容易记住“命中”而非“失误”。
      我们用志同道合的人和媒体围绕自己。我们问“我为什么是对的？”，而不是“什么能证明我是错的？”
      这使我们过度自信，更新缓慢。

      确认偏误是最普遍、证据最充分的偏误之一。
      它影响科学、政治、人际关系和商业。克服它需要刻意努力和结构化流程。
    why_this_is_important: |
      认识到确认偏误对于良好的决策和学习至关重要。
      它能帮助你寻找证伪证据，考虑替代性假设，并在有必要时更新你的信念。
      它是科学思维的基石。
    when_to_use:
      - 决策制定
      - 学习
      - 问题解决
      - 风险评估
    how_can_you_spot_it:
      seeking_support: |
        寻找支持你观点的证据，而不是检验你的观点的证据。
      asymmetric_interpretation: |
        将模糊证据解释为支持你的立场。
      discounting_disconfirming: |
        忽视或最小化与你信念相悖的证据。
      selective_exposure: |
        只接触与你观点一致的信息来源。
    examples:
      hiring: |
        形成早期正面印象，然后提问来证实这位候选人很棒。
      investing: |
        购买某只股票后，寻找正面新闻，忽视负面分析。
      relationships: |
        通过证实你对伴侣看法的视角来解读他们的行为（无论好坏）。
      politics: |
        毫无批判地接受来自己方的消息，而拒绝来自对方的同等信息。
    real_world_implications: |
      确认偏误会延续错误信念，加剧两极分化，并导致代价高昂的错误。
      它是良好科学和良好决策的敌人。克服它需要刻意寻找证伪证据。
    professional_application:
      networking_and_relationship_building: |
        在形成对人的看法时，积极寻找证伪证据。问“什么会改变我的想法？”并寻找它。
      collaborative_learning_initiative: |
        使用“扮演魔鬼代言人”、“红队演习”和“事后验尸”等方法来揭示证伪性观点。
        奖励那些用良好证据挑战普遍观点的个人。
    how_can_this_be_misapplied:
      false_balance: |
        当证据强烈支持一方时，却将所有观点视为同等有效。
      excessive_skepticism: |
        当某些信念有充分证据支持时，却将所有证据都视为“确认偏误”。
      contrarianism: |
        为了避免确认偏误而采取相反的观点——而原始观点可能才是正确的。
      analysis_paralysis: |
        因为“我们可能有偏见”，所以从不确定自己的观点。
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: 知识诅咒
    quick_introduction: |
      知识诅咒是指一旦你知道了某件事，就很难想象不知道这件事是什么样的。专家们很难教初学者，因为他们无法重新创造初学者的视角。一旦你知道了，你就会忘记不知道是什么样子。
    one_liner: 一旦你知道了某件事，你就会忘记不知道是什么样子。
    try_this:
      - 解释时，从基本原理开始——假设你的听众一无所知。
      - 让初学者复述一遍；他们的困惑会暴露你的盲点。
      - 注意你是否跳过了步骤或使用了他人可能不知道的行话。
    ask_yourself:
      - 我是否假设他人拥有和我一样的背景知识？
      - 没有我背景的人能理解这个吗？
    in_more_detail: |
      在一个经典的实验中，知道谜题答案的人敲击歌曲的节奏，并期望其他人能猜出来——他们高估了显而易见性。敲击者无法在脑海中“取消听到”这首歌。知识是“粘稠”的；很难模拟无知。

      知识诅咒会影响教学、沟通、产品设计和领导力。我们假设他人拥有和我们一样的背景。我们使用行话。我们跳过步骤。当人们不“明白”时，我们会感到惊讶。
    why_this_is_important: |
      认识到知识诅咒可以改善教学、沟通和产品设计。它可以帮助你从他人的角度出发，而不是只从自己的角度出发。这对于有效的知识转移至关重要。
    when_to_use:
      - 学习
      - 领导力
      - 问题解决
      - 关系建立
    how_can_you_spot_it:
      obvious_to_you: |
        “这很明显”是因为你已经知道了答案，所以才显得明显。
      jargon_use: |
        使用听众不知道的术语而不加以定义。
      skipped_steps: |
        假设他人会填补你遗漏的信息。
      frustration_with_learners: |
        “他们怎么就看不懂呢？”当你拥有他们不具备的背景知识时。
    examples:
      teaching: |
        一位数学教授跳过了对他们来说“显而易见”但对学生至关重要的步骤。
      product_design: |
        设计师创建了对他们来说有意义但让新用户感到困惑的界面。
      onboarding: |
        经验丰富的员工忘记了新员工不知道的事情，并提供了不足的培训。
      writing: |
        作者假设读者拥有相同的背景，从而遗漏了必要的上下文。
    real_world_implications: |
      知识诅咒会导致沟通障碍、产品失败和教学无效。这是专家可能成为糟糕教师的原因之一。克服它需要有意识地努力去 adopt 听众的视角。
    professional_application:
      networking_and_relationship_building: |
        解释时，从对方的水平开始。问“他们已经知道了什么？”与没有你背景的人测试你的沟通。
      collaborative_learning_initiative: |
        使用“像我五岁一样解释”的练习。让专家教初学者并获得反馈。创建假定没有先验知识的文档。使用同伴教学——最近学会的人会记住初学者的视角。
    how_can_this_be_misapplied:
      oversimplification: |
        过度简化，导致不准确或居高临下。
      false_assumption: |
        假设他人知道的比他们实际知道的少——这也是校准失败。
      one_size_fits_all: |
        并非所有听众都需要相同水平的解释；要根据听众进行调整。
      avoiding_complexity: |
        有些话题很复杂；知识诅咒并不意味着我们永远不应该在适当的时候使用技术语言。
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: 默认效应
    quick_introduction: |
      默认效应是指在面对多种选择时，人们倾向于选择预先设定的选项。无论被设置为默认值的选项是什么，它都有一个强大的优势——人们常常会坚持使用它，而不管它是否对他们来说是最佳选择。
    one_liner: 无论被设置为默认值的选项是什么，它都有一个强大的优势——我们坚持使用它。
    try_this:
      - 注意你是否在没有评估其他选择的情况下接受了默认选项。
      - 在设计选择时，设置符合用户最佳利益的默认选项。
      - 问自己：如果这个选项不是预先选定的，我还会选择它吗？
    ask_yourself:
      - 我是因为惯性而选择默认选项，还是因为它对我最好？
      - 是谁设定的这个默认值，他们从中可能获得什么？
    in_more_detail: |
      默认选项之所以有效，是因为惯性、损失厌恶（改变感觉像是失去了默认选项）以及隐含的认可（我们假设默认选项是推荐的）。
      根据默认是选择加入还是选择退出，各国器官捐献率差异巨大。
      当退休储蓄的注册是自动的，参与率会急剧上升。

      默认选项可以用于善意（引导至更好的结果）或用于操纵（在预先勾选的框中隐藏不利条款）。理解这种效应有助于你设计更好的系统并抵制不想要的默认选项。
    why_this_is_important: |
      理解默认效应有助于你设计能够改善结果的选择架构，并帮助你识别你的选择何时是由默认选项塑造的，而不是由深思熟虑的偏好决定的。
    when_to_use:
      - 决策制定
      - 领导力
      - 问题解决
      - 风险评估
    how_can_you_spot_it:
      inertia_toward_default: |
        大多数人会坚持使用预先选定的选项。
      implied_recommendation: |
        我们将默认选项理解为“他们希望我们选择的”。
      opt_in_vs_opt_out: |
        措辞（选择加入 vs. 选择退出）会极大地改变参与度。
      pre_checked_boxes: |
        预先选定的选项在表格和设置中具有强大的优势。
    examples:
      organ_donation: |
        选择退出的国家捐献率远高于选择加入的国家——默认选项比态度更重要。
      retirement_savings: |
        自动注册极大地提高了 401(k) 的参与率。
      software_installers: |
        “推荐”选项和预先勾选的附加组件塑造了用户安装的内容。
      subscriptions: |
        默认转为付费订阅的免费试用吸引了许多不会主动选择订阅的人。
    real_world_implications: |
      默认效应是最强大的“助推”之一。它塑造了储蓄、健康、隐私和消费者行为。道德的选择架构利用默认选项来改善结果；“暗黑模式”则利用它们来剥削。
    professional_application:
      networking_and_relationship_building: |
        在为他人设计流程时，选择符合其利益的默认选项。避免使用“暗黑模式”来利用默认选项提取价值。
      collaborative_learning_initiative: |
        为团队实践设定默认选项（例如，默认异步，默认记录），以符合期望的行为。让正确的选择成为简单的选择。
    how_can_this_be_misapplied:
      dark_patterns: |
        利用默认选项欺骗人们做出不利的选择（例如，隐藏费用、不必要的订阅）。
      paternalism: |
        强加默认选项，在未经同意的情况下覆盖真实的偏好。
      manipulation: |
        在默认选项中隐藏不利条款，并依赖惯性。
      one_size_fits_all: |
        当偏好不同时，假设相同的默认选项适合所有人。
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: 鄧寧-克魯格效應
    quick_introduction: |
      鄧寧-克魯格效應描述了一種認知偏誤，即在某個領域知識或技能有限的人會高估自己的能力，而專家則傾向於低估自己的能力。你懂得越少，可能就越自信。
    one_liner: 你懂得越少，可能就越自信。
    try_this:
      - 在新的領域，假設你可能過於自信——尋求回饋和校準。
      - 當專家表達懷疑時，要認真對待；他們可能了解邊緣情況。
      - 注意在某個領域，新手是否比專家更確定。
    ask_yourself:
      - 我是否處於「愚蠢之巔」或「謙虛之谷」？
      - 我是否具備評估自己在此處能力的後設認知能力？
    in_more_detail: |
      鄧寧和克魯格的研究表明，能力不足的個體缺乏認識自身無能的後設認知能力。要評估你的表現，你需要與表現良好所需的技能相同的技能——因此，技能較差者處於雙重劣勢：他們表現不佳，而且他們不知道。

      隨著能力的提升，人們經常會經歷一個「謙虛之谷」，在那裡他們意識到自己還有多少不知道的東西。真正的專家可能會過於自信，因為他們對細微差別和邊緣情況有敏銳的認識。
    why_this_is_important: |
      認識到鄧寧-克魯格效應有助於你校準自己的自信心，避免高估新手的意見，並欣賞專家的謙遜。這對於學習、招聘和決策至關重要。
    when_to_use:
      - 學習 (learning)
      - 決策 (decision_making)
      - 領導力 (leadership)
      - 職業發展 (career_moves)
    how_can_you_spot_it:
      novice_overconfidence: |
        經驗很少的人表達強烈、未經檢驗的意見。
      expert_underconfidence: |
        高度熟練的人比技能較差的人更傾向於謹慎和表達不確定性。
      inability_to_recognize_quality: |
        表現不佳者無法區分他們領域中的好壞工作。
      confidence_competence_mismatch: |
        在初學者中，自信心和實際能力呈反比關係。
    examples:
      social_media: |
        對某個主題有表面知識的人自信地與領域專家爭論。
      hiring: |
        面試表現不佳的候選人有時會高度評價自己的表現。
      investing: |
        新投資者在早期獲利後可能會過於自信，沒有意識到運氣成分。
      workplace: |
        初級員工可能高估自己晉升的準備程度，而資深員工則懷疑自己。
    real_world_implications: |
      鄧寧-克魯格效應影響教育、招聘、政治和公眾討論。它解釋了為什麼壞主意會被放大，以及為什麼專家可能會被忽視。校準對個人和集體決策至關重要。
    professional_application:
      networking_and_relationship_building: |
        當某人非常自信時，請考慮他們是否可能處於鄧寧-克魯格區間。尋求多元化的觀點，包括那些表達不確定性的人。
      collaborative_learning_initiative: |
        創造一種重視承認不確定性的文化。鼓勵校準練習和回饋，幫助人們準確評估自己的能力。
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        假設自信的人總是錯的；有時自信是合理的。
      false_modesty: |
        專家假裝比他們實際知道的少，以顯得謙虛。
      gatekeeping: |
        使用鄧寧-克魯格效應來駁斥任何不同意「專家」觀點的人，而不去探討他們的論點。
      self_doubt_paralysis: |
        過度矯正，以至於從不相信自己的判斷。
    related_content:
      - circle_of_competence
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: 同理心鸿沟
    quick_introduction: |
      当我们自身处于一种状态时，会难以理解和预测他人处于不同状态时的心理状态。当我们平静时，我们会低估愤怒或饥饿时的感受。当我们吃饱时，我们会低估饥饿时的食欲。
    one_liner: 我们低估了自己——以及他人——在不同状态下的感受。
    try_this:
      - 平静的时候，为自己压力大时做决定；预先承诺。
      - 不要评判你不在乎的那些状态下的人——饥饿、疲惫、害怕。
      - 问问自己：我是否将当前状态投射到未来的自己或他人身上了？
    ask_yourself:
      - 我是否低估了自己在不同状态下的感受？
      - 如果我处于他们的状态，我是否能更好地理解这个人？
    in_more_detail: |
      我们很难想象自己在不同情况下会有怎样的感受——以及他人处于我们当前不处于的状态时的感受。清醒的人低估了成瘾的吸引力。休息充足的人低估了睡眠不足的影响。我们将当前状态投射到他人和未来的自己身上。

      同理心鸿沟影响我们为未来自己做出的决定（例如，在有动力时承诺锻炼）、我们为他人做出的决定以及我们理解不同状态下的人的能力。
    why_this_is_important: |
      认识到同理心鸿沟可以改善对未来自己的决策、对他人的同理心以及对我们自身可变性的理解。它解释了为什么我们会做出无法兑现的承诺，以及为什么我们会误解处于困境中的他人。
    when_to_use:
      - 决策制定
      - 建立关系
      - 领导力
      - 冲突解决
    how_can_you_spot_it:
      current_state_projection: |
        假设他人和我们现在的感受一样，或者未来的我们和现在的感受一样。
      underestimating_emotional_state: |
        当我们不在对方的状态时，会想“有什么大不了的？”
      commitment_failures: |
        根据当前的动力做出选择，但在动力消失后却无法兑现。
      misunderstanding_others: |
        因为无法从当前状态想象别人的经历，而否定了他们的经历。
    examples:
      hunger: |
        吃饱时去超市购物——买的东西比饥饿时想要的要少。
      addiction: |
        非成瘾者低估了戒断的难度；正在康复中的成瘾者在戒断时可能会低估复发的诱惑。
      conflict: |
        平静的时候，我们会低估自己在冲突时的反应。
      motivation: |
        有动力时报名参加早上6点的课程——但在困倦时却不去。
    real_world_implications: |
      同理心鸿沟影响着成瘾治疗、政策制定和人际理解。它解释了为什么我们会打破承诺，以及为什么我们常常无法理解他人的观点。它是同理心和良好决策的障碍。
    professional_application:
      networking_and_relationship_building: |
        当某人处于压力、愤怒或其他不同状态时，不要假设他们会像你一样思考。试着去想象他们的状态。在做出承诺时，考虑当动力消失时你会有怎样的感受。
      collaborative_learning_initiative: |
        在规划时，考虑团队在疲惫、压力大或沮丧时的感受。为这些状态进行设计，而不仅仅是为了有动力的规划状态。
    how_can_this_be_misapplied:
      overattribution: |
        将所有误解都归咎于“同理心鸿沟”，尽管有时人们确实持有不同的价值观。
      excusing_behavior: |
        “他们没办法——同理心鸿沟”当人们有责任管理自己的状态时。
      false_relativism: |
        假设我们永远无法理解他人，尽管我们可以通过努力和经验来改善。
      self_excuse: |
        利用同理心鸿沟来为自己未能兑现的承诺开脱。
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: 禀赋效应
    quick_introduction: |
      禀赋效应是指人们仅仅因为拥有某物，就倾向于对其估值更高。
      我们要求放弃一件物品的代价，比我们愿意为获得它而支付的代价更高。
      拥有权会产生一种附件，扭曲我们的估值。
    one_liner: 我们拥有的东西比不拥有的更有价值——拥有会产生附件。
    try_this:
      - Ask: 如果我不拥有它，我会愿意花多少钱来得到它？
      - When selling, imagine you're buying—would you pay your asking price?
      - Notice when ownership is inflating your valuation.
    ask_yourself:
      - 我是因为拥有它而高估了它吗？
      - 中立的买家会同意我的价格吗？
    in_more_detail: |
      在实验中，随机得到一个杯子的人，要求卖出杯子的价格大约是其他人愿意购买的价格的两倍。
      仅仅拥有这一事实就会增加感知价值。这与损失厌恶有关——放弃某物感觉就像一种损失，而我们厌恶损失。
      但这种效应不止于此：我们将拥有的东西融入我们的身份认同。

      禀赋效应会影响谈判、消费者行为和组织变革。
      它解释了为什么人们会高估自己的房屋、想法和当前的角色。
      它会在交易和过渡中造成摩擦。
    why_this_is_important: |
      认识到禀赋效应有助于你更有效地进行谈判，
      更清晰地决定保留或放弃什么，并理解为什么别人会高估他们所拥有的东西。
      它也解释了对变革的抵制。
    when_to_use:
      - 决策制定
      - 谈判
      - 投资
      - 职业变动
    how_can_you_spot_it:
      ownership_premium: |
        “我不会以那个价格卖掉它”，但你又不愿意以那个价格买下它。
      attachment_to_possession: |
        拥有某物后，对其估值更高。
      resistance_to_trading: |
        即使在理性情况下，也对交易或交换感到不情愿。
      overvaluation_of_own_ideas: |
        我们的想法、项目或角色因为是我们的而感觉更有价值。
    examples:
      real_estate: |
        房主经常高估他们的房子——他们对房子的估值高于市场。
      negotiations: |
        卖家索要的价格高于买家愿意支付的价格；这种差距反映了禀赋效应。
      career: |
        在考虑变动时，高估我们目前的工作、公司或角色。
      ideas: |
        “非我发明”和“我的主意”的偏见——我们高估了自己创造或拥有的东西。
    real_world_implications: |
      禀赋效应造成市场摩擦，减缓有益的交易，并助长对变革的抵制。
      它影响合并、重组和个人过渡。理解它能改善谈判和变革管理。
    professional_application:
      networking_and_relationship_building: |
        当有人抵制变革时，要考虑他们可能正在经历禀赋效应——他们“拥有”现状，因此更看重现状。
        将变革的框架从他们将失去什么，转变为他们将获得什么。
      collaborative_learning_initiative: |
        在引入新流程时，要承认人们会对现有方式产生依恋。
        创造心理安全感，让他们在接受新事物之前能够“放手”旧事物。
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        有些依恋是理性的——情感价值、转换成本。
        并非所有抵制都是禀赋效应。
      manipulation: |
        制造虚假的拥有感来榨取更高的价格（例如，“免费试用”以触发禀赋效应）。
      undervaluing_continuity: |
        假设所有对变革的抵制都是非理性的，而持续性本身具有真正的价值。
      cold_rationality: |
        将情感依恋斥为“仅仅是禀赋效应”，而它可能反映了真实价值观。
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: 虚假共识效应
    quick_introduction: |
      虚假共识效应是指我们倾向于高估他人对我们信念、态度和行为的认同程度。
      我们假设自己的观点比实际更普遍，并且难以想象理性的人会持不同意见。
    one_liner: 我们高估了他人对我们的认同程度。
    try_this:
      - 积极寻找持不同意见的人——不要假设存在共识。
      - 在开始之前，与不认同你假设的人进行测试。
      - 问：持不同意见的人会怎么说？认真对待。
    ask_yourself:
      - 我是否假设别人和我一样思考？
      - 我上次对别人不同的看法感到惊讶是什么时候？
    in_more_detail: |
      当我们持有某种立场时，我们倾向于认为这是常态。我们用志同道合的人
      包围自己，阅读支持性媒体，并将模糊的反馈解读为认同。这会创造一个回音
      室，强化共识的错觉。

      对于根深蒂固的信念以及当我们高度投入于某个立场时，这种效应会更强。
      当他人持不同意见时，这可能会导致惊讶、谈判困难，以及当我们假设客户
      的想法与我们一致时，导致糟糕的市场研究。
    why_this_is_important: |
      认识到虚假共识效应有助于你为真正的分歧做好准备，进行更好的研究，
      并更有效地沟通。这对于产品开发、谈判和领导力至关重要。
    when_to_use:
      - 决策制定
      - 谈判
      - 领导力
      - 解决问题
    how_can_you_spot_it:
      surprise_at_disagreement: |
        当有人不同意你认为是显而易见的事情时，你会感到非常震惊。
      assuming_shared_values: |
        在你进行核实之前，你表现得好像别人和你有着共同的优先事项。
      underestimating_opposition: |
        你预计提议会遇到的阻力比实际要小。
      echo_chamber_detection: |
        你的社交和信息环境很少挑战你的观点。
    examples:
      product_development: |
        一个团队假设用户想要功能 X，因为团队中的每个人都想要它——结果却发现
        采用率很低。
      politics: |
        政治泡沫中的人们对与他们预期不符的选举结果感到惊讶。
      negotiation: |
        当你认为条款“合理”时，就假设对方会同意这些条款。
      hiring: |
        为了“文化契合”而招聘，可能意味着招聘那些同意你观点的人，从而加剧
        虚假共识。
    real_world_implications: |
      虚假共识效应加剧了政治两极分化、产品发布失败和谈判破裂。
      它让我们对自己的预测过度自信，并对异议准备不足。
    professional_application:
      networking_and_relationship_building: |
        积极寻找持有不同观点的人。不要假设有共同的信念——提问并倾听。
      collaborative_learning_initiative: |
        在团队中，使用结构化的异议（例如，“事前验尸”、“扮演魔鬼代言人”）
        来在分歧造成代价之前将其暴露出来。
    how_can_this_be_misapplied:
      dismissing_dissent: |
        假设持不同意见者不理性或信息不足，而不是考虑他们可能持有合理的
        不同观点。
      poor_research: |
        因为“我们已经知道他们想要什么”而跳过客户研究。
      overconfidence: |
        基于他人会同意的假设而做出大胆的预测。
      groupthink_amplification: |
        不挑战虚假共识效应的团队可能会陷入集体思维的怪圈。
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: 框架效应
    quick_introduction: |
      框架效应是指，即使基本事实完全相同，我们的决策也会根据选项的呈现方式而改变。"90%的存活率"和"10%的死亡率"描述的是相同的结果，但会引发不同的选择。框架塑造了决策。
    one_liner: 相同的事实，用不同的框架呈现，会导致不同的决策。
    try_this:
      - 在做决定前，尝试用多种方式重构选项——收益框架和损失框架。
      - 注意你的选择何时会因某事物措辞的变化而改变。
      - 提问：抛开框架，其基本事实是什么？
    ask_yourself:
      - 如果这个选项被表述为收益而非损失，我的决定会不同吗？
      - 我是受到了框架的影响，还是受到了实际结果的影响？
    in_more_detail: |
      卡尼曼和特沃斯基的研究表明，当选项被表述为收益时，人们会厌恶风险；当选项被表述为损失时，人们会寻求风险——即使对于相同的结果也是如此。积极的框架（“拯救200人”）与消极的框架（“400人将死亡”）会改变偏好。与等效的收益框架相比，损失框架会引发更强烈的情感反应。

      框架效应会影响医疗决策、政策制定、市场营销和谈判。它是最强大、记录最充分的偏见之一。意识有助于缓解，但要完全克服非常困难。
    why_this_is_important: |
      认识到框架效应可以帮助你做出更一致的决策，抵制操纵，并更有效地沟通。它也解释了为什么相同的提议会根据呈现方式的不同而被接受或拒绝。
    when_to_use:
      - 决策制定
      - 谈判
      - 领导力
      - 风险评估
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        相同的结果以收益或损失的框架呈现，会产生不同的选择。
      presentation_dependence: |
        当只有框架改变，而非实质内容改变时，决策会发生变化。
      default_influence: |
        选项的排序或标签会影响选择。
      emotional_trigger: |
        某些框架会引发更强烈的情感反应。
    examples:
      medical: |
        同一项手术，“90%的存活率”与“10%的死亡率”——人们根据框架的不同做出不同的选择。
      sales: |
        “节省50美元”与“不要损失50美元”——等效的框架，但心理影响不同。
      policy: |
        “税收减免”与“政府支出”——相同的政策，不同的政治回应。
      negotiation: |
        将一个提议表述为“折扣”与“避免额外收费”会改变接受率。
    real_world_implications: |
      框架效应在广告、政治和谈判中被利用。它影响着医疗决策和政策支持。重构框架可以改善决策和沟通。意识到这一点有帮助，但并不能完全消除这种效应。
    professional_application:
      networking_and_relationship_building: |
        在呈现选项时，考虑多种框架。测试不同框架如何影响接受度。在接收信息时，问“这个还可以从哪些角度来解读？”
      collaborative_learning_initiative: |
        在决策过程中，明确地重构选项以检查框架效应。“如果我们把这个看作是一种损失，我们会做出不同的决定吗？”为了公平起见，使用一致的框架。
    how_can_this_be_misapplied:
      manipulation: |
        故意使用框架来引导人们在不知情的情况下达成期望的结果。
      false_equivalence: |
        假设所有框架都同样有效，而有些框架却掩盖了重要信息。
      overcorrection: |
        完全忽略框架，认为它无关紧要——但它确实很重要。
      spin: |
        利用框架来误导，而不是为了澄清。
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: 基本归因错误
    quick_introduction: |
      基本归因错误是指倾向于将他人的行为归因于其性格或个性，而将我们自己的行为归因于
      情境因素。我们通过他人的行为来评判他们，通过自己的意图来评判自己。
    one_liner: 我们以他人的行为评判他们，以自己的意图评判自己。
    try_this:
      - 当某人让你感到沮丧时，问问自己：可能是什么情境因素解释了这种情况？
      - 对待他人时，请像对待自己一样慷慨。
      - 注意你何时将他人的行为归因于性格，而非境遇。
    ask_yourself:
      - 我是否会用解释他人行为的方式来解释自己的行为？
      - 我可能忽略了他们的处境的哪些方面？
    in_more_detail: |
      当我们在交通中被别人插队时，我们会想“真是个混蛋”。当我们插队时，我们会想“我不得不这样——我当时很赶时间”。我们用
      境遇来解释自己的失败（“交通太糟糕了”）和别人的失败（“他们很懒”）。对于成功，情况则相反：我们为自己的成功归功于自己，
      而将他人的成功归因于运气。

      这种错误是“基本”的，因为它普遍存在且持久。它
      破坏了同理心，加剧了冲突，并扭曲了绩效评估。
    why_this_is_important: |
      认识到基本归因错误可以改善人际关系，
      减少冲突，并带来更公平的判断。它鼓励我们在断定某人“是”某种人之前，先考虑其背景。
    when_to_use:
      - 建立人际关系
      - 冲突解决
      - 领导力
      - 决策
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        在解释他人行为时说：“他们就是那种人”。
      situational_explanation_for_self: |
        在解释自己的行为时说：“我别无选择”或“环境迫使我”。
      character_vs_context: |
        在情境可能解释行为时，却假定是性格使然。
      asymmetric_standards: |
        对他人的要求比对自己更严格。
    examples:
      traffic: |
        另一位司机的错误 = “坏司机”。我们的错误 = “无法避免的情况”。
      workplace: |
        同事错过截止日期 = “不负责任”。我们错过截止日期 =
        “任务繁重，无人能做得更好”。
      politics: |
        对手的观点 = “他们愚蠢或邪恶”。我们的观点 = “对事实的理性反应”。
      performance: |
        他人的成功 = “幸运”。我们的成功 = “努力工作得来的”。
    real_world_implications: |
      基本归因错误会加剧冲突，破坏团队合作，并扭曲招聘和绩效评估。纠正这种错误可以改善
      组织文化和个人关系。
    professional_application:
      networking_and_relationship_building: |
        当某人让你失望时，在断定他们不可靠或难以相处之前，问问自己“可能是什么情境因素解释了这种情况？”
      collaborative_learning_initiative: |
        在反馈和评估中，鼓励“先考虑情境”的解读。
        培训管理者在归因于性格之前考虑背景。
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        将所有行为都归结为“情境”，而实际上有些行为确实反映了性格。
      no_accountability: |
        利用这种错误来逃避追究人们对他们确实做出的选择的责任。
      self_deprecation: |
        过度纠正，总是责怪自己，从不承认他人的责任。
      ignoring_patterns: |
        当某人在不同情境下反复行为不当时，性格可能具有相关性。
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: 赌徒谬误
    quick_introduction: |
      赌徒谬误是一种错误的信念，即过去的独立事件会影响未来的事件。
      在一连串的正面朝上之后，我们认为反面“该出现了”——即使每一次抛掷都是独立的。
      我们在随机性中看到模式，并期望“纠正”或“回归”，而实际上并不需要。
    one_liner: 过去的独立事件不会影响未来的事件——硬币没有记忆。
    try_this:
      - 当您认为“我该赢了”时，请问：这些事件真的独立吗？
      - 区分均值回归（真实）与赌徒谬误（虚假）。
      - 注意您何时在随机性中看到模式。
    ask_yourself:
      - 我是否假设过去的结局会影响独立事件的未来结局？
      - 统计学家会同意我“该改变了”的推理吗？
    in_more_detail: |
      在一枚公平的硬币抛掷中，每一次抛掷都是独立的。
      无论过去的结果如何，出现正面的概率始终是 50%。
      但我们感觉一种结果的长期出现会使另一种结果更有可能。
      我们混淆了“大数定律”（在许多试验中，结果会平均化）与短期“纠正”。
      赌场没有记忆。

      这种谬误会影响赌博、投资和日常决策。
      我们假设“运气”会平衡，或者我们“该”赢了。
      有时我们是对的——但理由却是错误的。
    why_this_is_important: |
      认识到赌徒谬误可以防止在赌博和投资中付出昂贵的代价。
      它还有助于您避免过度解读短期趋势并期望虚假的回归。
      它区分了真实的均值回归与谬误。
    when_to_use:
      - 决策制定
      - 投资
      - 风险评估
      - 问题解决
    how_can_you_spot_it:
      due_for_a_change: |
        “我们已经输了很多次了——这次我们该赢了。”
      pattern_in_randomness: |
        在随机序列中看到有意义的模式。
      hot_hand_fallacy: |
        相信连胜会持续下去（相关的但相反的错误）。
      independence_ignorance: |
        将独立事件视为相互关联的。
    examples:
      gambling: |
        在轮盘赌中出现几次红色后，押注黑色，因为“红色不可能一直出现”。
      investing: |
        “市场一直在下跌——它必须上涨。”
      hiring: |
        “我们已经招聘了几位糟糕的候选人——下一位肯定会很好。”
      sports: |
        “他错过了太多次了——他该投进下一个球了。”
    real_world_implications: |
      赌徒谬误导致赌博损失和糟糕的投资决策。
      它还解释了为什么我们过度解读短期模式。
      将其与真实的均值回归（存在真实的均值可以回归）区分开来很重要。
    professional_application:
      networking_and_relationship_building: |
        不要假设过去的关系动态会在未来“纠正”——每一次互动在某种程度上都是独立的。
        但是，当存在真实的潜在原因时，请从模式中学习。
      collaborative_learning_initiative: |
        在评估绩效时，区分随机波动与系统性变化。
        短期趋势可能是噪音；不要对“连胜”反应过度或期望虚假回归。
    how_can_this_be_misapplied:
      ignoring_regression: |
        有时均值回归是真实的（例如，技能表现）。
        不要将所有回归都视为赌徒谬误。
      false_independence: |
        假设事件独立，而实际上并非如此（例如，对同一事物的重复测量）。
      overcorrection: |
        当存在真实的均值可以回归时，从不期望回归。
      dismissing_patterns: |
        有些模式是真实的——并非所有序列都是随机的。
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: 群体思维
    quick_introduction: |
      群体思维是指有凝聚力的群体为了优先考虑共识和和谐而忽视批判性评估的倾向。
      成员压制异议，自我审查，并遵从感知到的群体观点。追求一致性的愿望压倒了追求最佳决策的愿望。
    one_liner: 和谐胜于真相—群体优先考虑共识而非批判性评估。
    try_this:
      - 指定一名“魔鬼代言人”；让异议成为预期和安全的。
      - 提问：我们没有说什么？如果我们不是在这个群体中，我们会说什么？
      - 在最终确定群体决定之前，寻求外部观点。
    ask_yourself:
      - 我是否为了维持和谐而自我审查？
      - 我们的共识是真实的，还是迫于同意的压力而产生的？
    in_more_detail: |
      欧文·詹尼斯研究了外交政策的惨败（猪湾事件、越南战争），并识别出了其中的模式：
      无懈可击的错觉、集体合理化、向一致性施压、自我审查、一致性的错觉以及保护群体免受异议信息侵害的“思想卫士”。
      高度的凝聚力、孤立和压力会加剧群体思维。

      群体思维会导致糟糕的决策，因为替代方案没有被认真考虑。
      异议被视为不忠诚。群体高估自己的正确性，低估风险。
    why_this_is_important: |
      认识到群体思维有助于你创造更好的决策条件：鼓励异议，引入外部观点，并避免过早达成共识。
      这对于避免灾难性的群体失败至关重要。
    when_to_use:
      - 领导力
      - 决策
      - 问题解决
      - 冲突解决
    how_can_you_spot_it:
      pressure_for_consensus: |
        压制或惩罚异议；奖励赞同。
      illusion_of_unanimity: |
        沉默被解释为赞同，但实际上可能是自我审查。
      collective_rationalization: |
        群体驳斥警告并强化其观点。
      mindguards: |
        成员保护群体免受挑战共识的信息的侵害。
    examples:
      bay_of_pigs: |
        肯尼迪的顾问们压制了对入侵计划的疑虑；结果是灾难性的。
      corporate_decisions: |
        一个领导团队在发现危险信号后仍继续推进合并，因为没有人想成为那个反对者。
      product_launches: |
        一个团队发布了有缺陷的产品，因为每个人都投入了该计划，并且没有人提出担忧。
      boards: |
        董事会成员为了维持和谐而橡皮图章式地批准管理层的提案。
    real_world_implications: |
      群体思维导致了政策失败、企业灾难和错失良机。
      在高风险、高压力的情境下尤其危险。防止它需要有意识的结构性干预。
    professional_application:
      networking_and_relationship_building: |
        为异议创造心理安全。感谢提出疑虑的人。以不令人不快的方式模型化分歧。
      collaborative_learning_initiative: |
        使用“魔鬼代言人”、红队和“事前验尸”。要求有人反对主流观点。引入外部观点。
        领导者最后发言以避免锚定效应。
    how_can_this_be_misapplied:
      false_dissent: |
        创建“指定异议者”，他们并不真正持不同意见——群体能看穿这一点。
      excessive_conflict: |
        鼓励异议到破坏性冲突和瘫痪的程度。
      dismissing_consensus: |
        假设所有共识都是群体思维——有时群体是对的。
      individualism: |
        过度纠正，导致无法做出任何集体决策。
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: 光环效应
    quick_introduction: |
      光环效应是指让一个积极的特质或印象影响我们对一个人整体的判断。
      如果我们喜欢一个人的外表，我们可能会认为他们很有能力。
      如果我们欣赏他们的一项技能，我们就会认为他们在所有方面都很出色。
      一个积极的属性就像给其他属性投上了一层“光环”。
    one_liner: 一个积极的特质为我们对一个人的整体判断投上了光环。
    try_this:
      - 独立评估各项特质——不要让一项优势暗示其他优势。
      - 注意外表、魅力或一项成功何时会影响你的看法。
      - 问问自己：如果没有那个积极的特质，我还会这样评价这个人吗？
    ask_yourself:
      - 我是从一个特质泛化到整个人吗？
      - 如果我没有被某项优势所打动，我会看到缺点吗？
    in_more_detail: |
      爱德华·桑代克（Edward Thorndike）观察到，军事官员在评价士兵时，
      如果在一项特质上给士兵打了高分，往往也会在其他特质上给他们打高分——
      即使这些特质并不相关。我们倾向于从具体推断到整体。
      外表、魅力或在某个领域的成功会产生一个“光环”，并延伸到其他方面。

      反之，一个负面特质影响一切，有时被称为“尖角效应”（horn effect）。
      两者都是不当泛化的形式。光环效应会影响招聘、绩效评估和日常印象。
    why_this_is_important: |
      认识到光环效应有助于你做出更准确的评估，避免过度泛化。
      这对于公平招聘、绩效管理和人际关系评估至关重要。
      一项优势并不意味着所有优势都存在。
    when_to_use:
      - 决策制定
      - 领导力
      - 建立人际关系
      - 招聘
    how_can_you_spot_it:
      trait_spillover: |
        一个积极的特质影响了对不相关特质的判断。
      attractiveness_bias: |
        有吸引力的人在能力、可信度等方面被评价得更高。
      success_generalization: |
        在一个领域的成功导致了对其他领域能力的假设。
      first_impression_dominance: |
        早期的积极印象影响了所有后续的评价。
    examples:
      hiring: |
        一位口才好、令人愉快的候选人被假定为技术实力强大——
        即使技能无关。
      performance_reviews: |
        一个表现突出的项目导致在所有维度上都获得高评分。
      politics: |
        一位政治家的魅力导致人们假定他在政策方面有能力。
      branding: |
        一家公司在一个产品上的成功导致人们假定其所有产品都质量优良。
    real_world_implications: |
      光环效应会扭曲招聘、绩效评估和投资决策。
      它偏袒那些有吸引力、善于言辞和已经成功的人。
      减少光环效应需要结构化的评估和对不同维度的分离。
    professional_application:
      networking_and_relationship_building: |
        根据具体维度评估他人，而不是基于整体印象。
        意识到一个积极的特质何时影响你对他人的判断。
        寻求反驳证据。
      collaborative_learning_initiative: |
        使用结构化面试和评估，独立评价各项维度。
        在评估者之间校准评分。减少对整体“直觉”的依赖。
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        并非所有积极的印象都是光环效应——有时人们在各个维度上都确实很出色。
      false_objectivity: |
        假设我们可以完全消除光环效应——它是普遍存在的，并且部分是自动的。
      overcorrection: |
        走向极端，假设有吸引力或有魅力的人能力较差。
      stereotyping: |
        使用“光环效应”来否定合法的积极特质。
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: 汉隆剃刀
    quick_introduction: |
      汉隆剃刀定律是：“永远不要因为愚蠢而归咎于恶意”。换句话说，当无能、疏忽或无知可以解释某种行为时，不要假定其存在不良意图。
    one_liner: 当无能或疏忽可以解释时，不要假定存在恶意。
    try_this:
      - 当有人让你感到沮丧时，问问自己：这能否用错误或无知来解释？
      - 在假定对方意图不轨之前，先考虑更简单的解释。
      - 注意自己是否会轻易地得出“他们就是想伤害我”的结论。
    ask_yourself:
      - 我是否将本可用愚蠢来解释的事情归咎于恶意？
      - 如果我处在他们的位置，我是否也希望得到同样的宽容？
    in_more_detail: |
      这个原则鼓励给予他人宽容。当某人的行为伤害或让你感到沮丧时，默认的假设往往是他们有意伤害你。汉隆剃刀定律表明，许多此类行为源于粗心、信息不足或执行不当——而非恶意。

      这并不意味着恶意从未存在。这意味着，当一个简单的解释足以说明问题时，我们不应轻易做出最坏的猜测。这张“剃刀”可以减少偏执，改善人际关系，并帮助我们以更具建设性的方式应对问题。
    why_this_is_important: |
      应用汉隆剃刀定律可以减少冲突，维护人际关系，并将精力集中在解决问题上，而不是指责。它还能防止你因为假设每个人都想害你而产生的压力。
    when_to_use:
      - 冲突解决 (conflict_resolution)
      - 领导力 (leadership)
      - 关系建立 (relationship_building)
      - 决策 (decision_making)
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        你立即将负面结果解释为蓄意伤害。
      personalizing_mistakes: |
        当事情出错时，你认为这是针对你个人的。
      ignoring_alternative_explanations: |
        你不考虑无能、沟通不畅或疏忽的可能性。
      escalation_before_inquiry: |
        在询问发生了什么之前，你就表现出愤怒或报复。
    examples:
      email_tone: |
        假定一封简短的邮件是消极攻击的，而发件人可能只是很匆忙或不擅长表达语气。
      missed_deadline: |
        将同事的延期交付视为破坏行为，而他们可能过度承诺或遇到了障碍。
      policy_decisions: |
        假定一项你不喜欢的公司政策是为了伤害员工而设计的，而它可能只是解决其他问题的笨拙尝试。
      traffic: |
        假定另一个司机故意超车，而他们可能根本没看见你。
    real_world_implications: |
      汉隆剃刀定律可以改善职场文化，减少诉讼，并使冲突解决更加有效。过度使用可能导致纵容疏忽；使用不足则会产生不必要的冲突。
    professional_application:
      networking_and_relationship_building: |
        当有人让你失望时，在假定恶意之前先寻求澄清。通过默认宽容的解释来维护人际关系。
      collaborative_learning_initiative: |
        在团队中，建立一种文化，即默认错误是无意的，直到被证明并非如此。关注系统和流程，而不是指责。
    how_can_this_be_misapplied:
      excusing_negligence: |
        将反复出现的无能或疏忽斥为“非恶意”，而实际上应予以追究。
      ignoring_genuine_malice: |
        过于僵化地应用此定律，以至于忽视了真正的坏人和有毒行为。
      avoiding_difficult_conversations: |
        利用汉隆剃刀定律作为逃避处理绩效问题的借口。
      gaslighting_victims: |
        告诉一个真正受到委屈的人，他们在“假设恶意”，而实际上恶意确实存在。
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: 霍桑效应
    quick_introduction: |
      霍桑效应是指人们在知道自己被观察或研究时，会改变自身行为的倾向。观察本身就能产生变化——不一定是所测试的干预措施。人们对他们得到的关注做出反应。
    one_liner: 被观察会改变行为——关注本身就会产生这种效果。
    try_this:
      - 在评估干预措施时，考虑观察是否驱动了结果。
      - 认识到关注和被重视可以提高绩效。
      - 当观察改变时，要谨慎将变化归因于特定的干预措施。
    ask_yourself:
      - 这种改进是来自干预措施还是来自被观察？
      - 如果我们停止关注，结果会持续吗？
    in_more_detail: |
      在霍桑工厂，研究人员发现，当他们改变照明时，生产力有所提高——当他们又改回来时，生产力也提高了。这种改进似乎来自于关注和观察，而不是具体的干预措施。后来的重新分析表明，这种效应可能被夸大了，但这个概念仍然有用：被研究会改变行为。

      霍桑效应使研究和评估变得复杂。它可以夸大干预措施的表面影响。它还表明，关注和被重视可以提高绩效——这是对管理层的一个教训。
    why_this_is_important: |
      理解霍桑效应有助于你解读研究结果，设计更好的实验，并认识到关注本身就能驱动改变。在管理方面，这表明对人们的关注可能与具体的干预措施一样重要。
    when_to_use:
      - 领导力
      - 决策
      - 学习
      - 解决问题
    how_can_you_spot_it:
      observation_induced_change: |
        当人们知道自己被注视或研究时，行为就会改变。
      attention_effect: |
        关注的行为会产生改进，而不仅仅是具体的改变。
      placebo_analog: |
        就像安慰剂一样，被研究的“治疗”也会产生效果。
      short_term_improvement: |
        当观察结束时，改进可能会消退。
    examples:
      workplace_studies: |
        在研究期间，生产力有所提高——是因为新流程还是因为有人在注视？
      medical_trials: |
        安慰剂组的改善——部分原因在于他们得到了关注。
      education: |
        当研究人员在场时，学生表现更好——“观察者效应”。
      management: |
        当管理层关注时，团队会改进——是因为新举措还是因为关注本身？
    real_world_implications: |
      霍桑效应会影响研究的有效性和项目评估。它可能导致高估干预措施的效果。它还有一个积极的启示：关注和被研究的感觉可以激励改进——所以关心和可见度很重要。
    professional_application:
      networking_and_relationship_building: |
        关注人们可以提高他们的绩效——霍桑效应表明，被观察和被重视的感觉很重要。积极地利用这一点：定期检查、可见性和认可。
      collaborative_learning_initiative: |
        在评估干预措施时，使用对照组，并考虑改进是由于干预措施还是它带来的关注。霍桑效应会夸大表面的成功。
    how_can_this_be_misapplied:
      surveillance_justification: |
        用“霍桑效应”来证明持续监控的合理性——观察也会降低信任感和内在动力。
      dismissing_improvements: |
        假设研究期间的所有改进都是霍桑效应——有时干预措施确实有效。
      overgeneralization: |
        最初的霍桑研究受到了质疑；这种效应可能比以前认为的要小或不同。
      manipulation: |
        制造虚假的“观察”来操纵行为。
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: 事后诸葛亮偏差
    quick_introduction: |
      事后诸葛亮偏差（或称“我早就知道效应”）是指在事件发生后，倾向于相信自己本来就能预测或预料到该事件。我们重新构建过去，让结果看起来比实际情况更不可避免。
    one_liner: 事后看来，我们总觉得自己早就知道了。
    try_this:
      - 在评判过去的决定之前，问问自己：他们当时知道什么？
      - 在结果出来之前记录你的预测——之后再进行比较。
      - 注意你何时让过去看起来比实际情况更不可避免。
    ask_yourself:
      - 我是根据当时无法获得的信息来评判的吗？
      - 我真的预测到了这一点，还是现在只是觉得显而易见？
    in_more_detail: |
      一旦我们知道结果，它就显得显而易见。我们忘记了事先感受到的不确定性。这种偏差会扭曲学习——我们认为自己“知道”了某些事情，但实际上并没有，因此我们不会更新我们的模型。它还会导致不公平的责备：“他们早该预料到”当未来确实不确定时。

      事后诸葛亮偏差会影响事后总结、法律判决和历史分析。
      我们用当时无法获得的信息来评判过去的决定。
    why_this_is_important: |
      认识到事后诸葛亮偏差可以改善从结果中学习、更公平地评估决策以及更准确地评估风险。它会让我们对自己的预测能力产生虚假的信心。
    when_to_use:
      - 决策
      - 学习
      - 风险评估
      - 领导力
    how_can_you_spot_it:
      inevitability_feeling: |
        事件发生后，感觉“理应”如此。
      reconstructed_certainty: |
        我们记得事件发生前比实际情况更确定。
      blame_for_failure: |
        当结果确实不确定时，说“他们应该知道”。
      undervaluing_luck: |
        当运气发挥作用时，将结果归因于技能或远见。
    examples:
      investing: |
        在市场崩盘后说“我知道市场会崩盘”——但你事先并没有根据这种“知识”采取行动。
      project_failures: |
        在事后总结中说“我们应该看到风险”，但风险实际上是模棱两可的。
      elections: |
        在一场意外结果后，专家们事后解释为什么这是“显而易见的”。
      medical: |
        在事后诊断出一种罕见病时说“征兆已经显现”。
    real_world_implications: |
      事后诸葛亮偏差会扭曲法律责任、绩效评估和学习。
      它会让我们对自己判断过于自信，并对那些根据有限信息做出合理决策的人不公平。
    professional_application:
      networking_and_relationship_building: |
        在评估他人过去的决策时，有意识地区分当时所知与你现在所知。当你实际上没有预测到结果时，避免说“我早就告诉过你”。
      collaborative_learning_initiative: |
        在事后总结中，使用“事前总结”或“决策日志”技术来捕捉决策时的不确定性。将实际不确定性与事后诸葛亮的重构进行比较。
    how_can_this_be_misapplied:
      excusing_all_failures: |
        将所有失败都归结为“不可预测”，而有些是可预见的。
      no_accountability: |
        利用事后诸葛亮偏差来逃避追究疏忽者的责任。
      false_uncertainty: |
        过度纠正，认为我们永远无法预测任何事情。
      undermining_learning: |
        拒绝吸取教训，因为“事后诸葛亮是20/20”（即 hindsight is 20/20），我们仍然可以从结果中学习。
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - overconfidence
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: 双曲贴现
    quick_introduction: |
      双曲贴现是指倾向于偏好更小但更即时的回报，而非更大但更迟的回报——并且对未来的折现比理性模型预测的要陡峭。我们以不一致的方式过度重视现在，而低估未来。
    one_liner: 我们偏好即时的小回报胜过迟来的大回报——并且以不一致的方式折现未来。
    try_this:
      - Pre-commit: make choices for your future self when you're in a calm state.
      - 'Reframe: "Would I want this in 10 minutes? In 10 months?" to reveal inconsistency.'
      - Use commitment devices to bind your future self to better choices.
    ask_yourself:
      - Am I overweighting the present at the expense of my future self?
      - Would I make this choice if the reward were delayed by a day? A year?
    in_more_detail: |
      我们可能宁愿今天得到50美元，也不愿一年后得到100美元，但同时又宁愿两年后得到100美元，也不愿一年后得到50美元——尽管这是不一致的。我们的折现率不是恒定的；它是双曲的。近期未来被大幅度折现；远期未来折现幅度较小。这解释了拖延、成瘾和储蓄不足。

      当下偏见是一个相关概念：我们给予当下不成比例的权重。双曲贴现解释了为什么我们会做出不遵守的承诺，以及为什么长期规划如此困难。
    why_this_is_important: |
      理解双曲贴现有助于你设计更好的激励措施，约束未来的自己，并避免短期陷阱。它解释了我们为什么会拖延，以及为什么我们在长期目标上挣扎。
    when_to_use:
      - 决策
      - 职业发展
      - 投资
      - 领导力
    how_can_you_spot_it:
      present_preference: |
        选择即时满足，而非延迟的、更大的回报。
      inconsistent_time_preferences: |
        随着时间的推移而逆转的偏好（例如，我们明天想节食，但今天却吃了）。
      commitment_failures: |
        做出我们不遵守的计划，当未来变成现在时。
      procrastination: |
        为了即时舒适而推迟重要任务。
    examples:
      savings: |
        选择现在就花掉，而不是为退休储蓄——未来感觉很抽象。
      health: |
        为了舒适而今天跳过锻炼，尽管知道我们会后悔——明天的后悔被折现了。
      addiction: |
        选择即时快感，而非长期健康。
      deadlines: |
        一直无所事事，直到截止日期临近——然后“现在”包括了截止日期，我们才开始行动。
    real_world_implications: |
      双曲贴现影响储蓄、健康、教育和成瘾。它解释了许多自我控制的失败。承诺工具（例如，自动储蓄、问责制）可以通过限制未来的选择来提供帮助。
    professional_application:
      networking_and_relationship_building: |
        在要求未来承诺时，要建立问责制，使未来“变成现在”（例如，定期检查、设定截止日期）。不要假设人们会在没有结构的情况下兑现承诺。
      collaborative_learning_initiative: |
        使用承诺工具：公开承诺、预先设定截止日期，以及使长期目标感觉更紧迫的结构。将长项目分解为短里程碑。
    how_can_this_be_misapplied:
      excessive_control: |
        以“帮助”他们未来自己为名，过度限制人们的选择。
      paternalism: |
        假装我们知道什么对他们长远利益最好。
      ignoring_present_needs: |
        为了抽象的未来利益而忽视合理的当前需求。
      one_size_fits_all: |
        人们的折现率不同；并非所有人都需要相同的承诺工具。
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: 控制错觉
    quick_introduction: |
      控制错觉是一种高估我们影响结果能力的倾向。我们认为自己比实际拥有的控制力更大——无论是对随机事件、其他人还是复杂系统。我们将相关性与因果关系混淆，将行动与影响混淆。
    one_liner: 我们高估了自己影响结果的能力——尤其是随机事件。
    try_this:
      - 问：如果我什么都不做会怎么样？我的行为真的导致了结果吗？
      - 区分你能控制的和你不能控制的。
      - 注意你何时迷信地将你的行为与随机结果联系起来。
    ask_yourself:
      - 我是否将相关性与因果关系混淆了？
      - 如果我没有行动，结果会不同吗？
    in_more_detail: |
      当人们自己选择彩票号码时，他们对获胜更有信心——即使这并没有改变中奖概率。当我们想要更高的骰子点数时，我们会用力掷骰子。我们认为我们的仪式或行为会影响那些实际上是随机的或由我们无法控制的因素决定的结果。这种错觉是令人安慰的；它能减轻焦虑。但它也可能导致过度自信和糟糕的决定。

      当我们参与其中、早期取得成功以及任务熟悉时，这种错觉会更强。它会影响投资、管理和日常生活。
    why_this_is_important: |
      认识到控制错觉有助于你校准期望，避免过度自信，并将精力集中在真正重要的地方。它还解释了为什么我们会坚持迷信行为并高估我们的影响力。
    when_to_use:
      - 决策
      - 风险评估
      - 投资
      - 领导力
    how_can_you_spot_it:
      overestimated_influence: |
        相信我们的行为会影响结果，而实际上并不会。
      ritual_superstition: |
        我们认为会影响结果的行为（幸运衬衫、赛前例行公事），而实际上并不会。
      choice_illusion: |
        感觉选择赋予了我们控制权，但实际上选择并不会影响结果。
      action_bias: |
        宁愿“做点什么”而不是“等待”，即使行动无益。
    examples:
      gambling: |
        选择彩票号码比随机选择感觉更有控制力——中奖概率相同。
      investing: |
        活跃的交易者高估了他们跑赢市场的能力；在扣除成本后，大多数人的表现都更差。
      management: |
        领导者高估了他们对组织结果的影响；许多因素超出了他们的控制范围。
      sports: |
        球迷认为他们的加油会影响比赛；球员有幸运仪式。
    real_world_implications: |
      控制错觉会影响冒险行为、徒劳努力的持续性以及结果的归因。它可以激励行动（有时有用），但也可能导致浪费时间和过度自信。校准可以提高决策质量。
    professional_application:
      networking_and_relationship_building: |
        认识到你能控制和不能控制的。将精力集中在可影响的因素上。不要为没有导致的结果承担功劳——或为无法阻止的结果自责。
      collaborative_learning_initiative: |
        在规划时，区分可控和不可控的因素。避免早期获胜带来的虚假信心。使用概率性思维来校准期望。
    how_can_this_be_misapplied:
      learned_helplessness: |
        过度纠正，认为我们毫无控制力，而实际上我们拥有重要的影响力。
      dismissing_agency: |
        “这都是运气”，而实际上在许多领域技能和努力确实很重要。
      false_fatalism: |
        利用控制错觉来为不作为辩护。
      one_size_fits_all: |
        控制力因领域而异；有些情况比其他情况更容易控制。
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: 影响偏差
    quick_introduction: |
      影响偏差是指我们倾向于高估未来事件对我们情绪影响的强度和持续时间。
      我们认为好事带来的快乐不如预期的多，坏事带来的痛苦也不如预期的严重。
      我们在情感预测方面表现不佳。
    one_liner: 我们高估了事件对我们幸福感的影响程度——以及影响持续的时间。
    try_this:
      - 问：类似过去的事件发生后，我的感受如何？我们适应的速度比预期的要快。
      - 不要让预期的影响驱动决策——我们在预测感受方面表现不佳。
      - 注意你何时在高估单一结果的持久影响。
    ask_yourself:
      - 我是否高估了自己会感到难过或快乐多久？
      - 过去的经验告诉我们，关于类似事件，情况是怎样的？
    in_more_detail: |
      Daniel Gilbert 和 Timothy Wilson 对情感预测进行了研究：
      我们高估了在获胜后会感到快乐，或在失败后会感到痛苦的持续时间。
      我们适应的速度比预期的要快。我们还高估了单一事件的影响——
      我们认为一种结果将决定我们的幸福，而实际上有很多因素在起作用。
      我们在预测未来感受时，会关注错误的事情。

      影响偏差会影响重大的人生决定：
      我们高估了晋升、关系或购买会给我们的幸福带来多大的改变。
      我们还高估了损失带来的持久痛苦。
    why_this_is_important: |
      认识到影响偏差有助于你做出更好的决定，了解什么事情才能真正改善你的生活。
      它能减少对那些你认为很重要但实际上没那么重要的结果的过度投入，
      并减少对那些你预期会带来长期痛苦但实际上没那么严重的后果的恐惧。
    when_to_use:
      - 决策制定
      - 职业规划
      - 风险评估
      - 人际关系建立
    how_can_you_spot_it:
      overestimated_impact: |
        当过去的类似事件的影响并不持久时，你会说：“这将改变一切”。
      duration_overestimation: |
        当通常我们适应得比预期的要快时，你会说：“我永远无法摆脱这种感觉”。
      focalism: |
        只关注一个事件，而忽略了影响幸福感的其他因素。
      adaptation_neglect: |
        忘记了我们会适应好坏两种情况。
    examples:
      career: |
        当过去的晋升只带来暂时影响时，你说：“如果我得到这个晋升，我会更快乐”。
      purchases: |
        当新鲜感很快消失时，你说：“这辆车会让我快乐”。
      loss: |
        当我们通常在几个月内就能适应时，你说：“我永远无法从这次拒绝中恢复过来”。
      events: |
        高估了婚礼、假期或里程碑事件对长期幸福感的影响程度。
    real_world_implications: |
      影响偏差会导致在金钱、职业和人际关系方面做出错误的决定。
      我们为那些我们会适应的经历支付过高的价格，并过度害怕那些我们会从中恢复过来的损失。
      它影响政策制定和个人规划。
    professional_application:
      networking_and_relationship_building: |
        在做职业或人际关系决定时，考虑一下在类似过去的事件发生后你的感受。
        影响是否像你预期的那样持久？利用这些来校准未来的预测。
      collaborative_learning_initiative: |
        当团队面临挫折或胜利时，提醒他们适应的重要性。
        “我们会比想象中适应得更快”可以减少过度的庆祝和过度的沮丧。
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        有些事件确实有持久的影响——创伤、重大损失。不要将所有情感预测都视为有偏差。
      cold_rationality: |
        当眼前的体验确实重要时，却说：“这无关紧要”。
      undervaluing_experiences: |
        因为“反正我们会适应的”，而避免了积极的体验。
      invalidating_emotions: |
        告诉人们他们的感受会过去，而他们此时此刻需要支持。
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: 内群体偏见
    quick_introduction: |
      内群体偏见是指倾向于偏袒我们认为是属于我们群体的人，而不是我们认为是外人的人。我们常常基于微小或任意的区别，将积极品质归于内群体成员，将消极品质归于外群体成员。
    one_liner: 我们偏袒自己的内群体，对外群体则更严苛——常常是任意的。
    try_this:
      - 问：如果这个人属于我的群体，我会同样评判他吗？
      - 在做决定时，积极寻求外群体的观点。
      - 注意群体界限是如何影响你的判断的。
    ask_yourself:
      - 我是因为他“是自己人”而偏袒他吗？
      - 我会用同样的标准对待外群体成员吗？
    in_more_detail: |
      即使群体是随机分配的（例如，通过抛硬币），人们也会很快发展出对内群体的偏好。我们更信任内群体成员，更慷慨地向他们分配资源，并且更宽容地评判他们的行为。外群体成员则受到相反的对待。

      内群体偏见会助长部落主义、歧视和冲突。它会影响招聘、晋升、协作和政策。它可以基于种族、国籍、公司、团队或任何共享的身份。
    why_this_is_important: |
      认识到内群体偏见有助于你做出更公平的决定，建立更具包容性的团队，并避免偏袒。它也解释了为什么多元化倡议会遇到阻力——内群体偏好是自动发生的。
    when_to_use:
      - 领导力
      - 决策
      - 关系建立
      - 冲突解决
    how_can_you_spot_it:
      preferential_treatment: |
        给“我们”好处，但不给“他们”。
      resource_allocation: |
        当外群体成员有同等或更大的需求时，却向内群体成员分配更多资源。
      attribution_asymmetry: |
        内群体成功 = 能力；外群体成功 = 运气。内群体失败 = 情况；外群体失败 = 品格。
      minimal_group_effects: |
        即使群体分配是任意的，也会出现偏袒。
    examples:
      hiring: |
        偏袒去了你母校或有相似背景的候选人。
      performance_reviews: |
        对内群体成员的评分比对表现相似的外群体成员更优厚。
      collaboration: |
        信任并包含“我们的团队”，同时排斥或怀疑“他们的团队”。
      politics: |
        不加批判地接受内群体的论点，同时驳斥外群体的论点。
    real_world_implications: |
      内群体偏见会延续不平等，破坏精英主义，并加剧冲突。它会影响招聘、晋升、投资和政策。减少内群体偏见需要付出刻意的努力——它不会自行解决。
    professional_application:
      networking_and_relationship_building: |
        积极吸纳你直接圈子外的人。寻求多元化的观点。质疑你是否因为某人“和你一样”而偏袒他。
      collaborative_learning_initiative: |
        使用结构化的流程（匿名评审、多元化小组）来减少招聘和评估中的内群体偏见。创建跨群体项目来建立共同身份。
    how_can_this_be_misapplied:
      forced_diversity: |
        实施配额或政策，在不解决潜在偏见的情况下引起怨恨。
      out_group_hostility: |
        将内群体偏见视为唯一问题，而忽略了外群体敌意的存在。
      ignoring_legitimate_differences: |
        并非所有群体差异都是偏见——有时群体具有不同的特征。不要假设所有差距都是歧视。
      reverse_discrimination: |
        过度纠正，偏袒外群体，以至于对外群体成员不公平。
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: 逆向思维
    quick_introduction: |
      逆向思维是一种将问题颠倒过来的解决技巧。与其问“如何才能成功？”，不如问“什么会导致我失败？”，然后避免这些因素。
      它能揭示向前思考往往会忽略的风险和反模式。
    one_liner: 逆向思维——问什么会导致你失败，然后避免它们。
    try_this:
      - 对于任何目标，列出可能导致失败的主要方式——然后避免它们。
      - 使用负面想象：什么会让这件事出问题？
      - 问：一个聪明人会做什么来搞砸这件事？
    ask_yourself:
      - 我是否考虑过什么会导致这件事失败？
      - 只向前思考，我遗漏了什么？
    in_more_detail: |
      由查理·芒格推广，并根植于数学逻辑，逆向思维利用了避免失败通常比追求成功更容易的事实。
      如果你能识别出事物出错的主要方式，你就可以系统地消除它们。

      卡尔·雅可比曾说过：“逆向思维，永远逆向思维。” 斯多葛学派使用负面想象——想象失去——来欣赏自己所拥有的并为逆境做准备。
      逆向思维不是悲观主义；它是一种通过消除障碍来取得进展的结构化方法。
    why_this_is_important: |
      逆向思维有助于你避免灾难性错误，压力测试计划，并找到非显而易见的解决方案。
      它通过确保你不忽略关键的失败模式来补充前瞻性规划。
    when_to_use:
      - problem_solving
      - decision_making
      - risk_assessment
      - career_moves
    how_can_you_spot_it:
      premortem_thinking: |
        在项目开始前，假装项目已经失败，问“为什么会失败？”
      anti_goals: |
        清晰地定义你想避免的目标，就像定义你想实现的目标一样。
      reverse_engineering_failure: |
        研究失败的案例以吸取教训，而不是只研究成功的案例。
      constraint_focus: |
        在优化收益之前，识别限制和瓶颈。
    examples:
      investing: |
        与其问“什么会推高这只股票？”，不如问“什么会导致我亏钱？”并避免这些情况。
      career: |
        “什么会毁了我的名声？”会引出一份需要避免的行为清单。
      product_launch: |
        “为什么大多数产品发布都会失败？”在发布前揭示了需要解决的风险。
      health: |
        “什么习惯会缩短寿命？”比“什么让我健康？”更清晰地给出了需要避免的清单。
    real_world_implications: |
      逆向思维被应用于工程（失效模式分析）、投资和战略。
      它能减少过度自信，改善风险管理。过度依赖可能导致过度谨慎。
    professional_application:
      networking_and_relationship_building: |
        “什么会损害这段关系？”有助于你避免破坏信任的行为。
      collaborative_learning_initiative: |
        对项目进行事后剖析（premortem）：“这个项目失败了。为什么？”利用这些答案来改进规划和执行。
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        只关注避免失败会使行动瘫痪，并阻止必要的冒险。
      negativity_bias: |
        如果不能与前瞻性的机会识别相结合，逆向思维会加剧消极偏见。
      analysis_paralysis: |
        花费太多时间在失败模式上，导致你从未执行。
      missing_upside: |
        逆向思维只告诉你应该避免什么——而不是应该做什么。你仍然需要积极的目标。
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: 边际收益递减法则
    quick_introduction: |
      边际收益递减法则指出，当其他投入保持不变而增加一种投入时，每增加一个单位投入所产生的额外产出会逐渐减少。投入越多不一定越好——在某个点之后，额外的努力只会带来越来越少的回报。
    one_liner: 投入越多，产出最终越少——存在一个最佳点。
    try_this:
      - Ask: 我是否已经过了额外努力产生有意义回报的那个点？
      - 优先考虑最高杠杆的投入；在边际收益下降时停止。
      - 注意你是否过度投资于已经有回报的事物。
    ask_yourself:
      - 再投入一单位努力，我会获得什么？
      - 我是否正在优化到边际收益递减的点之后？
    in_more_detail: |
      在经济学中，在固定量的土地上增加更多工人，最终只会产生更小的增量收益。在个人效率方面，第一个小时的学习可能比第十个小时更有价值。这个原则适用于资源、努力、时间和功能。存在一个最佳点；超过这个点，边际收益就会下降，甚至可能变成负数。

      认识到边际收益递减，有助于你有效地分配资源，并避免在已经产生大部分价值的领域过度投资。
    why_this_is_important: |
      理解边际收益递减法则可以防止过度投资，指导优先排序，并帮助你知道何时停止。这对于资源分配和避免完美主义至关重要。
    when_to_use:
      - 决策制定
      - 问题解决
      - 投资
      - 职业发展
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        每增加一个单位的努力或资源，产生的产出少于前一个单位。
      perfectionism_trap: |
        追求最后 10% 的质量需要不成比例的努力。
      overinvestment: |
        在边际收益较低或为负时继续增加资源。
      optimal_point_passed: |
        你已经超过了增加投入可以改善结果的点。
    examples:
      studying: |
        前 2 小时的考试准备比第 7-8 小时更有价值；存在一个边际收益递减的点。
      product_features: |
        为应用添加更多功能可能会让用户感到困惑；第 20 个功能比第 5 个功能带来的价值要少。
      hiring: |
        在某个点之后，向项目增加更多人手会减慢项目进度（布鲁克斯定律）。
      marketing: |
        广告支出翻倍不一定会使结果翻倍；随着市场饱和，回报会递减。
    real_world_implications: |
      边际收益递减法则指导着经济政策、商业战略和个人生产力。忽视它会导致资源浪费和次优结果。它支持帕累托原则和聚焦。
    professional_application:
      networking_and_relationship_building: |
        投资于少数深入的关系可能比将精力分散给许多人更有价值。认识到额外的社交网络是否有边际收益递减。
      collaborative_learning_initiative: |
        更多的培训时间不一定意味着更好的结果。找到最佳剂量，避免过度培训。
    how_can_this_be_misapplied:
      premature_optimization: |
        在达到合理的质量水平之前过早停止。
      undershooting: |
        用边际收益递减作为努力不足的借口。
      misidentifying_the_curve: |
        当你实际上处于曲线的不同部分时（例如，早期指数增长阶段），却假设边际收益递减。
      one_size_fits_all: |
        在曲线不同的不同环境中，应用相同的“最佳点”。
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: 损失厌恶偏见
    quick_introduction: |
      损失厌恶是指人们倾向于避免损失，而不是获取同等的收益。
      人们感到损失的痛苦大约是获得收益的快乐的两倍。
    one_liner: 损失带来的痛苦大约是同等收益带来的快乐的两倍。
    try_this:
      - 问问自己：我是否过度看重我将失去的东西，而不是我将获得的？
      - 将选择重新定义为收益而不是损失，看看你的看法是否会改变。
      - 注意何时避免损失的恐惧比实际收益更能驱动你的决定。
    ask_yourself:
      - 如果我从零开始，我会怎么选？
      - 我坚持持有是因为我将要失去的东西，还是因为未来确实会更好？
    in_more_detail: |
      损失厌恶由丹尼尔·卡尼曼和阿莫斯·特沃斯基提出，描述了损失和收益
      是如何被不对称地感知的。损失 100 美元的心理影响通常远大于
      获得 100 美元的满足感。这种偏见影响着金融、谈判和日常选择中的决策，
      当潜在损失很明显时，往往会导致规避风险的行为。
    why_this_is_important: |
      理解损失厌恶有助于你认识到，何时是害怕损失在驱动决策，
      而非理性分析。它解释了为什么人们会持有亏损的投资，避免
      必要的改变，并在谈判和职业决策中做出次优选择。
    when_to_use:
      - 决策制定
      - 投资
      - 职业变动
      - 风险评估
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        注意，当失去某物的预期引发的焦虑或抵触，与潜在收益的吸引力相比
        显得不成比例时。
      reluctance_to_change: |
        即使客观分析表明是更好的选择，也犹豫是否要改变策略、
        离开一份工作或出售一项资产。
      framing_sensitivity: |
        即使结果相同，但基于选项被表述为收益还是损失，决策也会发生戏剧性的变化。
      overvaluing_what_you_have: |
        禀赋效应——仅仅因为拥有某物就对其估值更高——常常伴随着损失厌恶。
    examples:
      investing: |
        持有下跌的股票以“避免实现损失”，却错过了其他地方更好的投资机会。
      career: |
        留在一个不令人满意的工作中，因为离开感觉像是失去安全感，
        即使新机会提供了更大的增长空间。
      negotiations: |
        拒绝一个公平的提议，因为它被表述为“放弃”某些东西，
        而不是“获得”协议。
      product_design: |
        从免费试用到付费——用户在试用期结束时会体验到“失去”服务，
        这比“获得”一项新服务更能激励订阅。
    real_world_implications: |
      损失厌恶塑造了市场、政策和个人行为。它解释了为什么保险和保修
      卖得很好，为什么人们会避免有益的改变，以及为什么负面新闻会产生
      不成比例的影响。认识到它能提高决策质量，减少遗憾驱动的决策。
    professional_application:
      networking_and_relationship_building: |
        要意识到人们可能因为损失厌恶而不愿结束无效的关系或
        合作——他们害怕“失去”联系。
        将新机会表述为收益而非损失，可以减少抵触。
      collaborative_learning_initiative: |
        在引入新流程或工具时，要强调团队能获得什么，
        而不是他们“放弃”了什么。以损失为导向的变革倡议
        通常会引发更强烈的抵触。
    how_can_this_be_misapplied:
      manipulation: |
        利用损失厌恶来施压决策——例如，“限时优惠”
        或“不要错过”的表述，这些会引发对损失的恐惧，而非
        真正的价值评估。
      misinterpreting_relationships: |
        假设某人对改变的抵触是纯粹理性的，而实际上它可能
        是由损失厌恶驱动的。错误地归因动机可能会损害信任。
      overcommitment: |
        沉没成本谬误——因为“我们已经投入了这么多”而继续投资于一个失败的项目，
        而不是及时止损。
      missed_opportunities_for_conflict_resolution: |
        拒绝妥协，因为任何让步都感觉像是一种损失，
        即使替代方案对所有人来说都是更糟糕的结果。
      vulnerability_to_exploitation: |
        被那些通过表述来触发损失厌恶的选项来操纵——例如，
        强调如果你不采取行动就会“失去”什么的销售技巧。
      reinforcing_negative_perceptions: |
        过度关注潜在的缺点会产生一种悲观的
        看法，这种看法会自我实现，从而错失成长的机会。
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
      - prospect_theory
      - status_quo_bias
  - id: map_is_not_the_territory
    name: 地图并非疆域
    quick_introduction: |
      “地图并非疆域”的意思是，现实的表征本身并非现实。模型、理论和描述都是有用的简化，但它们总会遗漏一些东西。将地图误认为疆域会导致错误。
    one_liner: 地图并非疆域——所有模型都是错误的；有些模型是有用的。
    try_this:
      - 当模型与现实不符时，更新地图——不要强迫现实去适应模型。
      - 提问：这个模型遗漏了什么？它何时会失效？
      - 将模型视为工具，而非真理。
    ask_yourself:
      - 我是否将我的模型与现实混淆了？
      - 自我上次查看以来，疆域是否发生了变化？
    in_more_detail: |
      阿尔弗雷德·科日布斯基在他的总体语义学中引入了这一想法。城市地图对于导航很有用，但它不是城市——它省略了细节，会过时，而且永远无法捕捉一切。同样的概念也适用于心智模型、科学理论和组织结构图。

      所有模型都是错误的；有些模型是有用的。危险在于将模型视为全部真理，尤其是在疆域已经改变的情况下。良好的思考需要根据现实不符的情况来更新地图。
    why_this_is_important: |
      认识到地图与疆域不同，可以防止对模型过度自信，鼓励更新信念，并降低基于过时或过于简化的信息行事的风险。
    when_to_use:
      - 决策
      - 问题解决
      - 学习
      - 风险评估
    how_can_you_spot_it:
      model_reality_confusion: |
        将一个框架或理论视为完全描述了现实。
      outdated_assumptions: |
        基于不再符合当前条件的信息或模型行事。
      oversimplification: |
        因为“地图”没有包含而忽略细微差别。
      map_worship: |
        在证据与之相矛盾时，为模型辩护，而不是更新模型。
    examples:
      organizational_charts: |
        假设报告结构反映了工作实际是如何完成的。
      financial_models: |
        将电子表格预测视为预测，而不是一种情景。
      stereotypes: |
        将群体层面的概括应用于个人。
      strategy_docs: |
        在市场发生变化时，按照书面计划执行。
    real_world_implications: |
      地图-疆域的区别是科学、工程和哲学的基本原理。它支撑着贝叶斯更新、敏捷方法论和认识论谦逊。忽视它会导致僵化的思维和失败的战略。
    professional_application:
      networking_and_relationship_building: |
        你对一个人的心智模型可能已经过时。通过直接互动来更新它，而不是依赖旧的印象。
      collaborative_learning_initiative: |
        鼓励团队将计划和模型视为需要测试和修改的假设，而不是固定的真理。
    how_can_this_be_misapplied:
      radical_skepticism: |
        得出结论，没有地图是有用的，所有知识都是可疑的。
      constant_revision: |
        过于频繁地更新，以至于没有形成稳定的理解。
      dismissing_models: |
        因为有用的简化“不是疆域”而拒绝它们。
      relativism: |
        声称所有地图都具有同等的有效性，尽管有些地图显然更符合疆域。
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: 曝光效应
    quick_introduction: |
      曝光效应是指仅仅因为熟悉而对事物产生偏好的倾向。反复接触——即使没有
      强化——也能增加喜爱程度。我们倾向于喜欢我们所知道的。
    one_liner: 熟悉产生好感——我们喜欢我们之前见过的事物。
    try_this:
      - 问：我喜欢这个是因为它好，还是因为它熟悉？
      - 在评估选项时，要考虑暴露因素——新事物一开始处于劣势。
      - 注意重复性是如何影响你的偏好的。
    ask_yourself:
      - 我主要是因为以前见过某物而喜欢它吗？
      - 如果暴露程度相同，我的选择会不同吗？
    in_more_detail: |
      Robert Zajonc 的研究表明，反复接触刺激（面孔、单词、形状）
      会增加对它们的积极情感——即使我们没有有意识地
      意识到这种接触。熟悉产生好感，而不是轻蔑（在许多
      情况下）。当我们不进行分析且接触是微妙时，这种效应会更强。

      曝光效应会影响品牌偏好、人际吸引力
      和审美判断。它解释了为什么我们喜欢熟悉的
      音乐，为什么广告通过重复来起作用，以及为什么我们可能更喜欢
      我们以前见过的人——即使没有互动。
    why_this_is_important: |
      认识到曝光效应有助于你理解自己的
      偏好，并抵制通过重复进行的操纵。它还
      解释了为什么可见性和存在感对人际关系和
      品牌很重要。熟悉是一种强大但通常是无意识的影响。
    when_to_use:
      - 建立关系
      - 决策
      - 领导力
      - 学习
    how_can_you_spot_it:
      familiarity_preference: |
        更喜欢以前见过的选项而不是新的选项。
      repetition_influence: |
        反复接触会增加喜爱度，而无需明确说服。
      unconscious_influence: |
        即使我们没有意识到接触，这种效应也会起作用。
      brand_recognition: |
        即使我们说不出原因，我们也更喜欢熟悉的品牌。
    examples:
      advertising: |
        反复接触一个品牌可以增加偏好——即使没有
        说服性的信息。
      music: |
        我们以前听过的歌曲比新歌更容易受欢迎
        初次聆听时。
      people: |
        我们倾向于喜欢反复见到的人（例如，同学、
        同事），而不是陌生人——即使没有互动。
      ideas: |
        我们以前遇到过的想法比新想法感觉更舒适和
        可信。
    real_world_implications: |
      曝光效应塑造了消费行为、政治
      偏好和社会吸引力。它被营销人员利用，并可能为熟悉的事物创造不公平的优势。它也
      解释了为什么接触多样性很重要——熟悉
      差异性可以减少偏见。
    professional_application:
      networking_and_relationship_building: |
        可见性很重要。出现、在场和被
        看到会产生熟悉感，从而建立好感。不要
        低估重复的低风险接触的价值。
      collaborative_learning_initiative: |
        反复向人们展示多样的观点和人物——
        熟悉度可以减少偏见。但要注意，仅仅曝光
        也会强化对现状的偏好。
    how_can_this_be_misapplied:
      manipulation: |
        故意制造重复接触以操纵
        偏好，未经同意。
      false_familiarity: |
        假设熟悉等同于质量——有时新颖的
        选项更好。
      exclusion: |
        如果只有某些人获得曝光，他们会获得不公平的
        优势。考虑谁能获得可见性。
      stagnation: |
        过度依赖熟悉，从不尝试新事物。
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: 叙事谬误
    quick_introduction: |
      叙事谬误是指我们倾向于从过去的事件中构建故事，使它们看起来比实际情况更连贯、更可预测、更有意义。我们为随机性添加事后解释。我们将历史的混乱变成一个清晰的故事——然后相信这个故事是不可避免的。
    one_liner: 我们为随机性添加连贯的故事——然后相信它们是不可避免的。
    try_this:
      - 提问：这个故事有多少是事后诸葛亮？运气扮演了什么角色？
      - 对清晰的解释持怀疑态度——过去比我们的故事要混乱得多。
      - 注意“有道理”何时承担了“可以预测”的功能。
    ask_yourself:
      - 我是否在构建一个使过去看起来比实际更不可避免的故事？
      - 在事情发生之前，我会预测到吗？
    in_more_detail: |
      Nassim Taleb 普及了这个术语。我们渴望叙事——因果关系、英雄和反派、清晰的弧线。所以我们构建了事后联系事件的故事。故事感觉真实，因为它很连贯——但连贯并不意味着它是正确的。我们混淆了“有道理”和“可以预测”。我们低估了运气和随机性的作用。

      叙事谬误影响我们从历史中学习、评估成功和进行预测的方式。我们夸大了故事的解释力，而低估了机会的作用。
    why_this_is_important: |
      认识到叙事谬误有助于你避免从过去过度学习和过高估计可预测性。它鼓励我们对因果关系和预测保持谦逊。并非所有构成好故事的东西都是真实的或普遍适用的。
    when_to_use:
      - 决策
      - 学习
      - 风险评估
      - 问题解决
    how_can_you_spot_it:
      hindsight_coherence: |
        过去的事件被用一个在当时不可见的清晰故事来解释。
      cause_effect_overconfidence: |
        我们为许多促成因素导致的结果指定了明确的原因。
      luck_minimization: |
        成功和失败被归因于技能和策略，而非运气。
      story_over_evidence: |
        引人入胜的叙事压倒了统计证据。
    examples:
      business_success: |
        “他们之所以成功，是因为 X”，而实际上涉及许多因素和运气——我们选择了契合的故事。
      investing: |
        用令人满意的叙事来解释市场走势，但这些叙事可能是事后总结的。
      history: |
        历史事件被描述为不可避免的进程，而实际上它们依赖于许多因素。
      career: |
        “我之所以能走到今天，是因为我做了 X”，而实际上运气和时机起到了重要作用。
    real_world_implications: |
      叙事谬误扭曲了学习、预测的过度自信以及对成功和失败的归因。它使得过去看起来比实际更可预测，未来也比实际更可预测。
    professional_application:
      networking_and_relationship_building: |
        当有人讲述他们的成功故事时，请记住这是一个叙事——连贯而引人注目，但可能被简化了。运气和未被看到因素可能被低估了。
      collaborative_learning_initiative: |
        在回顾会议中，区分叙事和证据。问“我们当时会怎么说？”使用决策日志来记录结果未知之前的 But uncertainties。
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        一些叙事是正确的——并非所有事物都是叙事谬误。因果关系是存在的。
      excessive_skepticism: |
        因为“叙事谬误”而拒绝从过去学习。我们仍然可以提取有用的教训。
      false_randomness: |
        假设一切都是随机的，而实际上一些结果是可以有意义地归因的。
      undermining_storytelling: |
        故事在沟通和意义方面有价值——谬误在于相信它们是完整的或可预测的，而不是它们的存在。
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: 负面偏见
    quick_introduction: |
      负面偏见是指倾向于比积极信息赋予负面信息更大的权重。糟糕的消息、批评和威胁比同等的积极刺激更能吸引我们的注意力并影响我们的决策。
    one_liner: 坏消息比好消息分量更重——我们天生就会优先考虑威胁。
    try_this:
      - 在评估时，积极主动地寻求并权衡积极的证据。
      - 注意一项批评是如何压倒许多赞扬的。
      - 问自己：我是否赋予了负面信息过多的权重？
    ask_yourself:
      - 我是否沉溺于负面，而忽视了积极的一面？
      - 如果我专注于好的证据，感觉会不同吗？
    in_more_detail: |
      从进化的角度来看，错过一个威胁可能是致命的，而错过一个机会通常是可以存活的。我们的大脑天生就优先处理负面信息。一条批评性的评论就可以压倒许多赞扬。负面事件被记住得更生动，时间也更长。

      这种偏见会影响人际关系、决策和福祉。我们会沉湎于失败，预料最坏的情况，并忽视积极的证据。理解它有助于我们纠正它。
    why_this_is_important: |
      认识到负面偏见有助于您平衡反馈，避免对批评反应过度，并做出更准确的判断。它还解释了为什么坏消息占主导地位，以及为什么我们经常感觉比实际情况更糟。
    when_to_use:
      - 决策制定
      - 建立人际关系
      - 领导力
      - 风险评估
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        一条负面评论掩盖了许多正面评论。
      threat_prioritization: |
        潜在的缺点比同等的优点受到更多关注。
      vivid_negative_memories: |
        负面经历更容易被回忆起来，并且伴随着更强烈的情感。
      discounting_positive_evidence: |
        好消息很快就被遗忘或被解释掉了。
    examples:
      performance_reviews: |
        一名员工过分关注一条批评性的反馈，而忽视了整体的积极评价。
      news_consumption: |
        尽管有积极的趋势，负面新闻头条却吸引了大部分注意力，并塑造了世界观。
      relationships: |
        一次争吵比许多美好的时刻留下的印象更深刻。
      investing: |
        市场下跌引发的恐慌比同等程度的上涨引发的狂喜更强烈。
    real_world_implications: |
      负面偏见塑造了媒体、政治和组织文化。它导致了焦虑、冲突和次优的决策。刻意纠正它能改善福祉和判断力。
    professional_application:
      networking_and_relationship_building: |
        在提供反馈时，请注意负面评论会产生更大的影响——平衡它们并强调成长。在接受反馈时，要有意识地考虑整体情况。
      collaborative_learning_initiative: |
        创造明确反击负面偏见的文化：庆祝成功，记录积极成果，并用“事前验尸”（pre-mortems）平衡复盘（post-mortems），以了解哪些方面做得对。
    how_can_this_be_misapplied:
      toxic_positivity: |
        坚持“积极思考”，从而忽视合理的担忧。
      ignoring_real_threats: |
        过度纠正，以至于低估了真正的风险。
      feedback_suppression: |
        避免必要的批评，因为“负面情绪是不好的”。
      invalidation: |
        告诉某人他们的负面感受“只是负面偏见”，即使他们有充分的理由感到担忧。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: 奥卡姆剃刀
    quick_introduction: |
      奥卡姆剃刀（Occam's Razor，或 Ockham's Razor）是指在相互竞争的假说中，
      应优先选择假设最少的那个。更简单的解释往往（但不总是）是正确的。
    one_liner: 优先选择符合证据的最简单解释。
    try_this:
      - 比较理论时，问：哪个假设最少？
      - 不要无端增加复杂性。
      - 注意你是否偏爱复杂的解释而非简单的解释。
    ask_yourself:
      - 我是否引入了不必要的复杂性？
      - 证据是否需要这种程度的解释？
    in_more_detail: |
      该原则以威廉·奥卡姆（William of Ockham）的名字命名，但它并不声称简单的解释
      总是正确的。它表明，在没有证据支持的情况下，不应引入不必要的复杂性。
      如果两个理论解释了相同的现象，那么在有证据要求改变之前，更简单的理论是可取的。

      奥卡姆剃刀是一种启发式方法，而非定律。有时正确的解释确实很复杂。
      但它可以防止过度拟合、阴谋论思维和不必要的复杂化。它倾向于解释的简洁性。
    why_this_is_important: |
      应用奥卡姆剃刀可以改进问题解决，减少模型中的过度拟合，
      并帮助你避免那些复杂但 unsupported 的理论。在证据不明确时，这是一个有用的默认选项。
    when_to_use:
      - 问题解决
      - 决策制定
      - 学习
      - 风险评估
    how_can_you_spot_it:
      unnecessary_complexity: |
        一种解释引入了许多假设，而较少的假设就足够了。
      conspiracy_tendencies: |
        对具有简单原因的事件进行复杂、多方参与的解释。
      overfitting: |
        一个模型或理论能够完美解释过去的数据，但在新数据上表现不佳。
      elegance_in_explanation: |
        最好的解释在回顾时常常显得“显而易见”。
    examples:
      debugging: |
        出现 bug 时，先检查最简单的原因（例如，拼写错误、配置错误），
        然后再假设架构问题。
      conspiracy_theories: |
        “政府策划了 X”需要许多隐藏的参与者；“几个人犯了错误”则更简单。
      product_failure: |
        用户没有采用某个功能——最简单的解释是：它没有解决他们的问题，
        而不是他们被 UI 弄糊涂了。
      medical_diagnosis: |
        “常见病是常见的”——在考虑罕见疾病之前，先考虑常见诊断。
    real_world_implications: |
      奥卡姆剃刀指导科学探究、工程实践和日常推理。
      它减少了在复杂而错误的理论上浪费的精力。误用它，可能会忽略真正复杂的现象。
    professional_application:
      networking_and_relationship_building: |
        在解释他人行为时，优先考虑简单的解释（他们很忙，他们忘了），
        而不是假设恶意或复杂的动机。
      collaborative_learning_initiative: |
        在问题解决环节，在构建复杂模型之前，明确询问“最简单的解释是什么？”
    how_can_this_be_misapplied:
      oversimplification: |
        因为“太复杂”而否定了有效的复杂解释。
      status_quo_bias: |
        用奥卡姆剃刀偏爱熟悉的解释，而不是新颖但正确的解释。
      scientific_rigidity: |
        即使有证据支持，也因为理论更复杂而拒绝新理论。
      missing_nuance: |
        有些领域（例如，人类行为、生态系统）本身就非常复杂；
        过于简单化可能会产生误导。
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: 鸵鸟效应
    quick_introduction: |
      鸵鸟效应是指倾向于回避负面财务信息——就像鸵鸟一样“把头埋进沙子里”。人们在市场下跌时避免查看自己的投资组合，推迟打开账单，并忽视可能帮助他们采取行动的警告信号。
    one_liner: 回避坏消息并不能改变现实——它只会延迟你的反应。
    try_this:
      - 安排定期的检查，这样你就无法回避数字。
      - 注意你何时推迟打开某样东西或查看某样东西。
      - 问：我正在回避什么？如果我面对它，会有什么改变？
    ask_yourself:
      - 我是因为信息可能不好而回避它吗？
      - 更早的了解是否有助于我更好地行动？
    in_more_detail: |
      这个术语是在行为金融学中提出的，用来描述投资者在市场低迷时期避免查看其投资。这种行为延伸到了金融领域之外：回避体检、忽视人际关系问题以及推迟棘手的谈话。我们试图避免坏消息带来的焦虑，但回避往往会因为阻止及时行动而使结果变得更糟。

      这种效应是由损失厌恶和避免情感痛苦的愿望驱动的。不幸的是，无知并不能改变现实——它只会延迟我们的反应。
    why_this_is_important: |
      认识到鸵鸟效应有助于你主动面对棘手的信息。回避坏消息很少能改善结果；它通常会使情况恶化。及时的了解能够做出更好的决定。
    when_to_use:
      - 决策制定
      - 投资
      - 风险评估
      - 职业发展
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        在市场下跌时，不查看投资报表。
      delaying_difficult_information: |
        推迟打开账单、体检结果或绩效反馈。
      information_avoidance: |
        主动回避可能包含坏消息的来源。
      procrastination_on_unpleasant_tasks: |
        推迟那些会暴露或解决问题需要采取的行动。
    examples:
      investing: |
        一位投资者在熊市期间停止查看其 401(k) 计划，错失了再平衡的机会。
      health: |
        尽管出现了症状，但由于害怕坏消息而避免就诊。
      finances: |
        不打开信用卡账单或银行警报，以避免面对债务。
      performance: |
        一位经理在年度评估之前一直避免给出批评性反馈，而早期的干预本可以提供帮助。
    real_world_implications: |
      鸵鸟效应会导致更糟糕的财务结果、延误的医疗治疗以及人际关系和工作中未解决的问题。它会加剧本可避免的损失。难以忽略信息的系统会有所帮助。
    professional_application:
      networking_and_relationship_building: |
        不要回避棘手的谈话。尽早解决问题，而不是希望它们会自行解决。建立定期的沟通机制，在问题升级之前将其暴露出来。
      collaborative_learning_initiative: |
        建立反馈循环，让问题难以被忽视——使用仪表板、定期审查和鼓励早期披露坏消息的规范。
    how_can_this_be_misapplied:
      information_overload: |
        强制进行持续监控，而实际上一些信息回避是健康的（例如，不每分钟都查看股票）。
      anxiety_amplification: |
        过于关注潜在问题，导致焦虑加剧，但并未改善结果。
      blame_shifting: |
        将所有回避都归咎于“鸵鸟效应”，而实际上一些回避是合理的（例如，忽略噪音）。
      micromanagement: |
        利用这个概念来证明对他人进行过度监控的合理性。
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: 帕累托法则
    quick_introduction: |
      帕累托法则（或称80/20法则）指出，大约80%的效应来自于20%的原因。少数关键的投入常常产生大部分的产出——在销售、bug、客户、精力、功能等方面。关注那些至关重要的少数。
    one_liner: 80%的效应来自于20%的原因——关注那些至关重要的少数。
    try_this:
      - 找出产生80%结果的20%投入——加倍投入那里。
      - 削减或降低产出很少的80%的优先级。
      - 提问：如果我做好哪几件事，会最重要？
    ask_yourself:
      - 我是在平均分配精力，而有些事更重要吗？
      - 我的高杠杆20%是什么？
    in_more_detail: |
      维尔弗雷多·帕累托观察到，意大利80%的土地由20%的人口拥有。该法则已被推广：80%的销售额来自20%的客户，80%的bug来自20%的代码，80%的结果来自20%的努力。确切的比例各不相同，但这种模式——不均衡的分布——很常见。

      该法则表明，识别并专注于高杠杆的20%可以显著改善结果。它是一种优先级启发式方法，而非物理定律。
    why_this_is_important: |
      应用帕累托法则有助于你无情地确定优先级，避免在低影响力活动上浪费精力，并用更少的资源取得更多成就。它对于生产力和战略至关重要。
    when_to_use:
      - 决策制定
      - 问题解决
      - 领导力
      - 职业发展
    how_can_you_spot_it:
      uneven_distribution: |
        X的一小部分占Y的大部分。
      high_leverage_activities: |
        少数行动产生大部分结果。
      low_value_tail: |
        许多活动贡献甚微；削减它们的影响很小。
      vital_few_vs_trivial_many: |
        关键在于识别哪少数最重要。
    examples:
      sales: |
        20%的客户产生80%的收入——专注于留住和发展他们。
      software: |
        20%的功能驱动80%的使用——优先处理那些。
      productivity: |
        少数习惯或例程产生你大部分产出——加倍投入那些。
      problems: |
        20%的bug导致80%的崩溃——先修复那些。
    real_world_implications: |
      帕累托法则指导资源分配、产品策略和个人生产力。忽略它会导致精力分散。过度应用它可能导致对“长尾”的忽视，而长尾有时也很重要。
    professional_application:
      networking_and_relationship_building: |
        识别对你的目标最重要的关系。不成比例地投入到那些关系中，而不是平均分配精力。
      collaborative_learning_initiative: |
        在提高团队绩效时，找出驱动80%结果的20%干预措施。将培训和流程改进集中在那里。
    how_can_this_be_misapplied:
      oversimplification: |
        假设80/20适用于所有地方；有些分布更均匀。
      neglecting_the_tail: |
        在“琐碎多数”集体重要时忽略它们（例如，许多小客户、边缘案例）。
      false_precision: |
        将80/20视为字面意思，而非粗略的启发式方法。
      misidentifying_the_vital_few: |
        由于分析错误而专注于错误的20%。
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Parkinson's Law
    quick_introduction: |
      Parkinson's Law states that "work expands so as to fill the time available for its
      completion." Give a task a week, and it takes a week; give it a day, and it often
      gets done in a day. The same applies to budgets, team size, and resources.
    one_liner: 工作会膨胀以填满可用于完成工作的时间。
    try_this:
      - Set tighter deadlines to force focus and prevent scope creep.
      - Ask: What's the minimum time this could reasonably take?
      - Notice when extra time or resources are being consumed without proportional value.
    ask_yourself:
      - Am I filling the time, or is the work actually demanding it?
      - Would a tighter deadline force better prioritization?
    in_more_detail: |
      C. Northcote Parkinson observed that bureaucracies grow regardless of the amount
      of work to be done. He also noted that tasks expand to fill available time—we
      adjust our effort and pace to the deadline. Tight deadlines can force focus;
      loose ones invite procrastination and scope creep.

      The law has implications for project management, personal productivity, and
      organizational design. It suggests that constraints can improve outcomes by
      forcing prioritization.
    why_this_is_important: |
      Understanding Parkinson's Law helps you set better deadlines, avoid over-resourcing
      projects, and recognize when "more time" or "more people" won't help—and may
      hurt. Constraints can be productive.
    when_to_use:
      - 决策
      - 领导力
      - 解决问题
      - 职业发展
    how_can_you_spot_it:
      deadline_driven_effort: |
        Work accelerates as the deadline approaches; little progress when the deadline
        is far away.
      scope_expansion: |
        Projects grow to fill available resources rather than staying focused.
      bureaucratic_growth: |
        Organizations add people and process even when workload doesn't increase.
      budget_exhaustion: |
        Budgets get spent fully regardless of whether the spending was necessary.
    examples:
      student_deadlines: |
        A paper due in a month gets written in the last 48 hours.
      project_management: |
        A project with a 6-month timeline takes 6 months; the same scope with a 3-month
        deadline might also get done.
      meetings: |
        A 1-hour meeting fills the hour whether 30 minutes would suffice.
      budgets: |
        A department spends its full budget by year-end to justify the same budget
        next year.
    real_world_implications: |
      Parkinson's Law affects productivity, organizational bloat, and resource
      allocation. It suggests that artificial constraints (shorter deadlines,
      smaller teams) can improve focus and efficiency.
    professional_application:
      networking_and_relationship_building: |
        Set clear, tight deadlines for collaborative work to prevent scope creep and
        maintain momentum.
      collaborative_learning_initiative: |
        Use time-boxing for meetings and projects. Experiment with shorter deadlines
        to test if they improve focus without sacrificing quality.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Setting arbitrarily short deadlines that cause burnout or poor quality.
      underresourcing: |
        Assuming that less time or fewer people will always work—some tasks need
        adequate resources.
      blame_shifting: |
        Attributing delays to "Parkinson's Law" when the work was genuinely complex.
      ignoring_quality: |
        Rushing to meet artificial constraints at the cost of sustainable outcomes.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: 概率性思维
    quick_introduction: |
      概率性思维是一种以可能性而非确定性来推理的习惯。我们不问“这件事会发生吗？”，而是问“这件事发生的可能性有多大？”它拥抱不确定性，并利用不确定性来做出更好的决策。
    one_liner: 以可能性而非确定性来思考——拥抱不确定性。
    try_this:
      - 将“这件事会发生吗？”替换为“这件事发生的可能性有多大？”
      - 考虑多种情景，并为其分配大致的概率。
      - 在获得新证据时更新你的信念。
    ask_yourself:
      - 我是在用非此即彼的方式思考，而用概率会更准确吗？
      - 可能的结果范围是什么？
    in_more_detail: |
      现实世界中的大多数结果都是不确定的。概率性思维用渐进式的信念取代了非此即彼的“是/否”。它包括考虑多种情景，分配大致的概率，并在获得证据时进行更新。这是过度自信和黑白分明思维的对立面。

      关键实践包括：在范围内思考，考虑基本比率，用证据更新信念，以及区分风险（已知概率）和不确定性（未知概率）。它能提高校准度和决策质量。
    why_this_is_important: |
      概率性思维可以减少过度自信，提高预测能力，并在不确定性下做出更好的决策。它对于投资、战略以及任何未来不确定的领域都至关重要。
    when_to_use:
      - 决策制定
      - 风险评估
      - 投资
      - 问题解决
    how_can_you_spot_it:
      likelihood_language: |
        使用“可能”、“大概率”、“小概率”而不是“会”或“不会”。
      scenario_thinking: |
        考虑具有大致概率的多种可能未来。
      calibration: |
        预测随着时间的推移与实际结果频率相匹配。
      uncertainty_acknowledgment: |
        明确说明你不知道什么。
    examples:
      forecasting: |
        “我认为我们有 60% 的机会按时完成任务”而不是“我们会按时完成任务。”
      investing: |
        “这个有 30% 的机会翻倍，70% 的机会亏损 50%”而不是“这会暴涨。”
      strategy: |
        规划多种情景（最佳、基本、最坏情况），并分配大致的概率。
      hiring: |
        “根据面试，我认为他们成功的概率是 70%”而不是“他们是很棒的招聘人选。”
    real_world_implications: |
      概率性思维能提高校准度，减少意外，并实现更好的风险管理。它是有效预测和不确定性下决策的核心。
    professional_application:
      networking_and_relationship_building: |
        在适当的时候使用概率性语言交流——“我相当有信心”而不是“我确定”。它通过表明认知上的谦逊来建立信任。
      collaborative_learning_initiative: |
        鼓励团队表达不确定性。使用预测市场或校准练习来提高概率判断能力。
    how_can_this_be_misapplied:
      false_precision: |
        分配精确的概率（例如 73%），而你无法如此精确。
      analysis_paralysis: |
        因为“我们无法确定”而从不采取行动。
      hedging_overuse: |
        过度修饰一切，使其变得毫无用处。
      dismissing_intuition: |
        过度纠正以至于忽略了强烈的直觉，而直觉可能携带有效信息。
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: 皮格马利翁效应
    quick_introduction: |
      皮格马利翁效应（或称罗森塔尔效应）是指较高的期望会带来更好的表现。当老师、管理者或其他人在某人身上寄予厚望时，那个人往往会表现得更好。期望会变成自我实现的预言。
    one_liner: 更高的期望带来更好的表现——期望塑造现实。
    try_this:
      - 设定高但可实现的目标；清晰地传达它们。
      - 注意低期望可能如何限制某人的表现。
      - 问：我隐约期望什么——它可能如何影响结果？
    ask_yourself:
      - 我的期望是在帮助还是在限制这个人？
      - 更高的期望会改变我对待他们的方式——以及他们的结果吗？
    in_more_detail: |
      罗伯特·罗森塔尔和莱诺尔·雅各布森向老师们提供了错误信息，称某些学生在学业上会“蓬勃发展”。这些学生（随机挑选）实际上比其他学生进步得更多。老师们的期望影响了他们的行为（更多的关注、更热情的反馈），这反过来又影响了学生的表现。期望塑造现实。

      反之——低期望导致更差的表现——有时被称为戈莱姆效应。两者都表明我们对他人的一些看法会影响他们的结果。这对领导力、教育和育儿有着深远的影响。
    why_this_is_important: |
      理解皮格马利翁效应可以帮助你驾驭期望的力量。真诚传达的高期望可以提高表现。低期望会造成自我实现的失败。你对他人的看法很重要。
    when_to_use:
      - 领导力
      - 建立关系
      - 学习
      - 决策
    how_can_you_spot_it:
      expectation_performance_link: |
        我们期望更高的人往往表现更好。
      differential_treatment: |
        我们会根据我们的期望以不同的方式对待他人——通常是下意识的。
      self_fulfilling_prophecy: |
        对能力的信念会影响塑造能力的那些行为。
      teacher_student_dynamics: |
        教育者的期望通过区别对待影响学生的结果。
    examples:
      education: |
        期望学生成功的老师会给予更多支持；那些学生会进步。期望失败的老师可能会无意中造成失败。
      workplace: |
        期望下属有高表现的管理者会提供更多的机会和反馈；表现会提高。
      parenting: |
        期望孩子负责任的父母会赋予他们更多的责任；他们会承担起来。
      stereotypes: |
        刻板印象威胁是反面——负面期望会损害表现。
    real_world_implications: |
      皮格马利翁效应影响着教育、管理和人际关系。它表明，提高期望——当以支持的方式进行时——可以改善结果。它也警告说，低期望可能具有破坏性。
    professional_application:
      networking_and_relationship_building: |
        对人们设定高期望——并提供支持以实现它们。相信潜力。你的期望影响你的行为，而你的行为又影响他们的结果。
      collaborative_learning_initiative: |
        创造高期望与高支持的文化。避免以会自我实现的标签称呼他人为“表现不佳者”。投资于你期望他们成功的人。
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        设定在没有支持的情况下不可能达到的期望，会导致失败和士气低落。
      blame_shifting: |
        当我们没有提供支持或成功条件时，说“他们没有达到期望”。
      ignoring_constraints: |
        期望本身并不能克服结构性障碍。
      pressure_without_support: |
        没有资源或支持的高期望可能是有害的。
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: 均值回归
    quick_introduction: |
      均值回归是一种统计现象，即极端结果倾向于被更接近平均值的结果所取代。在一个异常好或异常差的结果之后，下一次的结果很可能没那么极端——不是因为任何因果干预，而是由于随机波动。
    one_liner: 极端结果倾向于被更接近平均值的结果所取代。
    try_this:
      - 不要将“回归”归因于你的干预——它通常本来就会发生。
      - 在取得极端结果后，预计下一次会不那么极端。
      - 问问自己：这种变化是我造成的，还是仅仅是均值回归？
    ask_yourself:
      - 我是否将随机波动归因于我的干预（无论是表扬还是批评）？
      - 如果我没有采取行动，这种情况会发生吗？
    in_more_detail: |
      如果一个学生在一场考试中取得了异常高的分数，那么他在下一场考试中很可能会取得更接近平均水平的分数——不是因为他“变得懒惰”了，而是因为第一次的成绩有运气成分。这同样适用于体育表现、股票回报和商业指标。我们经常将“回归”归因于我们所做的事情（例如，惩罚或奖励），而实际上它本来就会发生。

      丹尼尔·卡尼曼（Daniel Kahneman）描述了飞行教官如何错误地认为赞扬会使表现恶化，而批评会改善表现——他们观察到的是极端表现后的均值回归。
    why_this_is_important: |
      理解均值回归可以防止错误地归因因果关系。它有助于你避免对异常值反应过度，以及基于噪声做出改变。这对于评估干预措施和表现至关重要。
    when_to_use:
      - 决策制定
      - 投资
      - 风险评估
      - 领导力
    how_can_you_spot_it:
      extreme_followed_by_average: |
        一个异常好或异常差的结果之后，跟着的是一个更接近平均值的结果。
      spurious_causation: |
        将“恢复”或“下降”归因于一项干预，而实际上如果没有干预也会发生回归。
      overreaction_to_outliers: |
        基于单一的极端数据点制定政策或进行个人改变。
      reward_punishment_confusion: |
        认为惩罚“起作用了”，而实际情况只是均值回归。
    examples:
      sports: |
        一名球员打出了一场职业生涯最佳的比赛，然后又回到了平均水平——球迷可能会归咎于“自满”。
      investing: |
        一只股票表现出色了一年，然后又回落——投资者可能会将下跌归因于糟糕的管理，而实际上部分原因是均值回归。
      performance_reviews: |
        一名员工在一个季度表现不佳，收到反馈后有所改善——反馈可能因此受到赞扬，但实际上均值回归也会发生。
      medicine: |
        一名患者感觉更糟，接受了治疗，然后有所改善——治疗可能因此受到赞扬，但部分改善是自然发生的。
    real_world_implications: |
      均值回归影响着我们如何评估教师、医生、基金经理以及我们自己。它解释了为什么“上升的必将下降”在统计学上常常成立。对它的误解会导致干预措施的浪费和对疗法的虚假信心。
    professional_application:
      networking_and_relationship_building: |
        不要过度解读一次糟糕的互动——它可能是一个异常值，关系本身最终会回归到平均水平。
      collaborative_learning_initiative: |
        在评估干预措施（培训、流程改进）时，使用对照组和多个数据点来区分实际效果和均值回归。
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        假设干预后的任何改善都“只是均值回归”，而实际上存在真实效果。
      underreacting: |
        忽视真正存在的问题，认为“它会回归均值”。
      statistical_illiteracy: |
        将均值回归混淆为一种“纠正”结果的力量——这只是概率。
      overconfidence: |
        假设平均值是稳定的，而潜在的过程可能已经改变。
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: 玫瑰色回忆
    quick_introduction: |
      玫瑰色回忆是指将过去记得比实际更好的倾向。
      随着时间的推移，我们会更积极地回忆过去的经历，淡化困难
      并放大美好。"美好的旧时光"往往并没有我们记忆中那么美好。
    one_liner: 我们记得的过去比实际更好——"美好的旧时光"并没有那么美好。
    try_this:
      - 在与过去比较时，问自己：我当时的感觉到底是什么？
      - 记日记，以便日后将记忆与现实进行比较。
      - 注意怀旧何时会影响你对现在的判断。
    ask_yourself:
      - 我是否在理想化过去？
      - 如果我能时光倒流，我当时会快乐吗？
    in_more_detail: |
      我们倾向于记住过去经历的积极方面，而忘记或最小化消极方面。
      度假、工作和人际关系在怀旧滤镜下感觉比当时更好。这可能导致不切实际的
      比较——我们以理想化的过去来评判现在。

      当出于对（记忆中）相同结果的期望而重复过去的选择时，玫瑰色回忆会影响
      决策。它也可能助长对客观上更糟糕的时代的怀旧之情。这是记忆中负面偏见的
      反面。
    why_this_is_important: |
      认识到玫瑰色回忆有助于你做出更现实的比较，并避免基于理想化记忆而重蹈覆辙。
      它还解释了为什么我们有时会渴望过去，尽管现在已经取得了进步。
    when_to_use:
      - 决策
      - 职业变动
      - 建立人际关系
      - 学习
    how_can_you_spot_it:
      idealized_past: |
        “过去的事情更好”——即使客观衡量表明并非如此。
      selective_positive_memory: |
        记住过去经历中的美好，忘记不好的。
      nostalgia_as_evidence: |
        用美好的回忆作为过去选择是正确的证据。
      present_undervaluation: |
        因为将现在与理想化的过去相比，所以觉得现在比实际更糟。
    examples:
      career: |
        “我以前的工作很棒”——尽管你离开是有充分理由的——记忆已经淡化了
        当时的沮丧。
      relationships: |
        “我们过去很幸福”——忘记了导致关系结束的冲突。
      childhood: |
        “我小时候日子更好过”——尽管许多客观衡量标准（健康、
        安全、机会）已经改善。
      projects: |
        “那个项目进行得很顺利”——尽管实际上有很多延误——我们记得
        结果，而不是过程。
    real_world_implications: |
      玫瑰色回忆会影响生活满意度、职业决策和
      由怀旧驱动的选择。它可能导致重蹈覆辙或
      不切实际的比较。它也解释了“回到美好的旧时光”言论的吸引力。
    professional_application:
      networking_and_relationship_building: |
        在考虑与过去的同事重新联系或重返过去的职位时，请将怀旧与现实分开。
        记录下你当时离开的原因；在返回之前回顾它们。
      collaborative_learning_initiative: |
        在回顾总结时，使用当下的笔记或数据，而不是记忆来评估实际发生的事情。
        记忆会淡化困难。
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        并非所有怀旧都是误导性的——有时过去在某些方面确实更好。
      invalidating_memories: |
        告诉人们他们的美好回忆是“错误的”，尽管它们可能反映了
        真实的个人体验。
      overcorrection: |
        假设过去总是比我们记忆中的更糟——有时它确实更好。
      present_bias: |
        利用玫瑰色回忆作为借口，忽视对当前衰退的合理担忧。
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: 显著性偏差
    quick_introduction: |
      显著性偏差是指倾向于关注情境中最突出或最显眼的部分，而忽略了不太明显但可能同样重要的因素。那些突出的事物在我们的判断中会获得不成比例的关注和权重。
    one_liner: 突出的事物会获得不成比例的关注——微妙的则被忽略。
    try_this:
      - 问：我因为某事物不显著而没有看到它吗？
      - 在做决定前，积极寻找不太显眼的因素。
      - 注意当生动或戏剧化的元素正在主导你的判断时。
    ask_yourself:
      - 我是否过分看重突出的事物，而看轻了微妙的事物？
      - 我可能忽略了哪些重要因素？
    in_more_detail: |
      显著的信息生动、充满情感或近期接触过。它会吸引注意力，并比应有的影响更大程度地影响决策。我们过分看重显而易见的，而看轻微妙的。即使一个戏剧性的事件或生动的例子并不具有代表性，它也可能主导我们的思考。

      显著性偏差与可得性启发式（想到什么）和近因效应（最近发生的事）重叠。它影响风险感知、招聘和战略。最明显的问题会得到解决；看不见的问题则会恶化。
    why_this_is_important: |
      认识到显著性偏差有助于你看透表面现象，并考虑那些不太明显的因素。它能改善风险评估、问题诊断和决策质量。重要的事物并不总是显而易见的。
    when_to_use:
      - 决策制定
      - 解决问题
      - 风险评估
      - 领导力
    how_can_you_spot_it:
      prominent_factor_dominance: |
        最显眼的部分主导了决策。
      overlooking_background: |
        尽管不太明显，但重要的背景因素被忽略了。
      vividness_overweighting: |
        戏剧化或情感化的信息获得了不成比例的权重。
      visibility_bias: |
        我们容易看到或衡量的事物比我们看不见或衡量不了的事物获得了更多的关注。
    examples:
      risk: |
        飞机失事是显著的——我们高估了飞行风险。汽车事故总体上不那么显著——我们低估了驾驶风险。
      hiring: |
        候选人的演示技巧是显著的；他们后续的执行能力可能不那么显眼，但同样重要。
      strategy: |
        竞争对手的举动是显著的；渐进的市场变化不太明显，但可能更重要。
      problems: |
        最响亮的抱怨得到了解决，而系统性问题却未被察觉。
    real_world_implications: |
      显著性偏差影响了什么会得到关注、资金和行动。它可能导致只解决症状而非根源，以及资源分配不当。刻意寻求非显著性信息可以改善决策。
    professional_application:
      networking_and_relationship_building: |
        不要只凭人们最显眼的特质来评判他们。寻找那些不太显眼的品质——可靠性、一致性，以及他们如何对待那些无法帮助他们的人。
      collaborative_learning_initiative: |
        在解决问题时，明确地问“我们没有看到什么？”和“什么不太明显但很重要？”。创建能够揭示非显著性问题的流程。
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        有时显著的信息也很重要。不要轻易否定所有显而易见的事物。
      false_sophistication: |
        认为晦涩的因素总是比明显的因素更重要。
      analysis_paralysis: |
        寻找太多非显著性因素，以至于从未对显著性因素采取行动。
      contrarianism: |
        仅仅为了与众不同而拒绝显著信息。
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: 稀缺性偏见
    quick_introduction: |
      稀缺性偏见是指当我们认为某物稀缺或有限时，会对其赋予更高的价值。“限时”、“仅剩3件”和“独家访问权”会触发紧迫感和欲望，常常压倒对是否真正需要或想要该物品的理性评估。
    one_liner: 稀缺性会放大感知价值——“有限”会触发紧迫感而非理性。
    try_this:
      - 提问：如果不是稀缺的，我还会想要它吗？剥离紧迫感。
      - 在对“限时”或“仅剩 X 件”的优惠采取行动之前，先停顿一下。
      - 注意稀缺性是否比其真实价值更能驱动你的渴望。
    ask_yourself:
      - 我是因为它稀缺而看重它，还是因为它确实需要我？
      - 如果没有稀缺性这个框架，我会做这个决定吗？
    in_more_detail: |
      稀缺性会放大感知价值。当某物稀有或即将消失时，我们更想要它——部分原因在于稀缺性可以暗示质量，部分原因在于损失厌恶让我们害怕错过。营销人员和谈判者利用稀缺性来制造紧迫感。这种偏见会导致冲动决策、过度消费和优先级排序不当。

      稀缺性还会影响那些真正资源有限的人的认知带宽；贫困会减少处理其他决策的“心智带宽”。
    why_this_is_important: |
      认识到稀缺性偏见有助于你抵制操纵策略，做出更深思熟虑的选择。它也解释了为什么我们会高估限量版产品，并在不需要的时候匆忙行动。
    when_to_use:
      - 决策制定
      - 谈判
      - 投资
      - 风险评估
    how_can_you_spot_it:
      urgency_trigger: |
        “限时”或“仅剩 X 件”会产生不成比例的渴望。
      fear_of_missing_out: |
        失去访问机会的可能性比内在价值更能驱动行动。
      impulsive_purchases: |
        因为某物稀缺而购买，而不是因为需要而购买。
      artificial_scarcity: |
        稀缺性是人为制造的（例如，虚假的倒计时），而不是真实的。
    examples:
      sales: |
        “仅剩 2 件库存”或“促销今晚结束”会促成原本不会发生的购买。
      auctions: |
        竞拍者在竞争性稀缺的情况下，为了获胜而支付了超出预期的价格。
      exclusivity: |
        “会员专享”或“仅限邀请”的访问权限会增加感知价值。
      genuine_scarcity: |
        当资源确实有限时，处于稀缺压力下的人们会做出更糟糕的决定（例如，穷人、时间紧迫的人）。
    real_world_implications: |
      稀缺性偏见驱动着消费者行为、谈判结果和政策响应。它可以被合乎道德地使用（例如，合法的截止日期），也可以不道德地使用（例如，虚假的稀缺性）。理解它能提高决策质量。
    professional_application:
      networking_and_relationship_building: |
        当他人制造人为稀缺性时要谨慎（“我只招收少量客户”）。核实稀缺性是否真实。在建立关系时，你时间的真正稀缺性可以表明其价值——但过度使用会显得操纵。
      collaborative_learning_initiative: |
        在为倡议活动制造紧迫感时，要确保其合法性。虚假的截止日期一旦被发现，就会侵蚀信任。
    how_can_this_be_misapplied:
      manipulation: |
        故意制造虚假稀缺性，以迫使他人做出决定。
      impulsive_decisions: |
        在人为的紧迫感下做出重要选择，而更多时间本可以改善结果。
      overvaluing_scarcity: |
        认为稀缺的东西总是更好——有时稀缺性是随意的。
      exploiting_vulnerability: |
        对那些本已处于资源压力下的人使用稀缺性策略。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: 二阶思维
    quick_introduction: |
      二阶思维是指考虑行动的行动所带来的后果。一阶思维问“如果我做X会发生什么？”二阶思维则问“然后呢？”以及“在那之后又会怎样？”它能显现出意料之外的影响。
    one_liner: 问“然后呢？”——考虑后果的后果。
    try_this:
      - 对于任何决定，至少问两次“然后呢？”。
      - 考虑别人将如何回应你的行动——以及他们对那个回应的回应。
      - 注意一阶效应在连锁反应中是否会逆转或变得复杂。
    ask_yourself:
      - 我是否已考虑过二阶（及三阶）效应？
      - 我可能忽略了哪些意料之外的后果？
    in_more_detail: |
      霍华德·马克斯（Howard Marks）在投资领域推广了这一概念。一阶思维：“这将上涨。”二阶思维：“如果它上涨，别人会注意到，更多人会买入，它会涨得更高——直到它被高估并崩盘。”后果的连锁反应常常会逆转或使一阶效应变得复杂。

      二阶思维更难——它需要更多的脑力劳动和想象力。但它可以防止许多错误。好的战略家会提前几步思考，并考虑别人将如何回应。
    why_this_is_important: |
      二阶思维可以防止意料之外的后果，并提高决策质量。它对于战略、政策以及任何行动会引发反应的领域都至关重要。
    when_to_use:
      - 决策
      - 问题解决
      - 策略
      - 风险评估
    how_can_you_spot_it:
      consequence_chains: |
        “如果我做X，就会发生Y，然后发生Z……”
      reaction_anticipation: |
        考虑别人将如何回应你的行动。
      unintended_effects: |
        寻找副作用和反馈循环。
      reversals: |
        与一阶效应相矛盾或逆转的二阶效应。
    examples:
      investing: |
        “如果每个人都认为这是一项好投资，那么它可能已经很拥挤了——
        优势可能已经消失。”
      policy: |
        “如果我们补贴X，需求会增加，价格会上升——补贴真的有帮助吗？”
      negotiation: |
        “如果我在这里强硬施压，他们会在那里进行报复——净效应是什么？”
      incentives: |
        “如果我们奖励这个指标，人们就会钻空子——他们实际上会做什么？”
    real_world_implications: |
      二阶思维是战略思维的标志。它可以防止政策失败、意料之外的激励措施和天真的乐观主义。它区分了优秀和卓越的决策者。
    professional_application:
      networking_and_relationship_building: |
        在采取行动之前，问：“他们会如何回应？我将如何回应他们的回应？”考虑关系动态，而不仅仅是眼前的交流。
      collaborative_learning_initiative: |
        在规划中，进行“然后呢？”的练习。绘制后果链。在意料之外的效应出现之前就识别它们。
    how_can_this_be_misapplied:
      analysis_paralysis: |
        思考的步骤过多，以至于从未采取行动。
      false_complexity: |
        假设二阶效应总是占主导地位，而实际上可能一阶效应就已足够。
      overconfidence: |
        相信你能预测长串的后果，而事实上不确定性会累积。
      pessimism: |
        总是在后果链中假设最坏的情况。
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: 沉没成本谬误
    quick_introduction: |
      沉没成本谬误是指，因为已经付出的资源而继续投入一项决定，而不是基于未来的预期回报。“我们已经走了这么远”或“我已经投入了这么多”会导致将好的金钱投入到坏的方面。
    one_liner: 过去的投资已经消失——只有未来的成本和收益才重要。
    try_this:
      - Ask: 如果我今天开始，我会选择这条路吗？
      - Define "kill criteria" in advance—conditions under which you'll stop.
      - 评估边际决策：我从现在开始会得到或失去什么？
    ask_yourself:
      - 我是继续因为未来的价值，还是为了证明过去的投资？
      - 我会给一个从零开始处于我这个位置的朋友什么建议？
    in_more_detail: |
      沉没成本是无法收回的过去成本。理性的决策会忽略它们——只有未来的成本和收益才重要。但我们却在情感上依恋我们的投资。我们会吃完不喜欢的饭，看完不喜欢的电影，继续那些不再有意义的项目。我们希望“不浪费”我们已经投入的东西，但继续投入往往会浪费更多。

      当我们投入了时间、精力或身份，而不仅仅是金钱时，这种谬误尤其强烈。承认我们错了会让人觉得代价高昂，所以我们加倍投入。
    why_this_is_important: |
      认识到沉没成本谬误可以帮助你止损，在必要时改变方向，并基于未来价值而不是过去投资做出决策。这对于项目、职业和人际关系至关重要。
    when_to_use:
      - 决策制定
      - 投资
      - 职业变动
      - 风险评估
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        “我们现在不能停——我们已经花了X”当未来的回报不值得继续时。
      escalation_of_commitment: |
        投入更多以证明或“挽救”先前的投资。
      identity_investment: |
        继续投入是因为承认失败会威胁到自我形象。
      ignoring_marginal_analysis: |
        基于总成本而不是增量成本和收益来做决策。
    examples:
      projects: |
        因为“我们已经花了6个月的时间”而继续一个失败的项目，而此时止损是理性的。
      relationships: |
        因为“我们已经在一起5年了”而继续一段关系，而不是评估未来。
      careers: |
        因为已经投入了学位或多年的经验而留在自己不喜欢的职业中。
      investments: |
        持有亏损的股票以“回本”，而不是重新配置到更好的机会。
    real_world_implications: |
      沉没成本谬误导致资源浪费、失败延长和机会错失。它影响个人、组织和政府。克服它需要明确的决策框架。
    professional_application:
      networking_and_relationship_building: |
        不要因为过去的投资而继续投入那些不再对你有益的关系或合作。评估面向未来的价值。
      collaborative_learning_initiative: |
        为项目创建“终止标准”——无论过去投资多少，你都会停止的条件。定期以“从零开始”的视角审查项目。
    how_can_this_be_misapplied:
      quitting_too_early: |
        将“沉没成本”作为放弃需要更多时间才能看到回报的事物的借口。
      undervaluing_consistency: |
        一些承诺（例如，人际关系、声誉）具有持续性的价值，而纯粹的边际分析会忽略这一点。
      cold_rationality: |
        将情感依恋视为不理性的，而它可能反映了真实价值观。
      analysis_paralysis: |
        过度思考是否继续，而答案已经很明显。
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: 幸存者偏差
    quick_introduction: |
      幸存者偏差是一种逻辑错误，即我们只关注在某个过程中“幸存”下来的人或事物，而忽略了那些未能幸存的。我们看到了胜利者，却忘记了失败者，这会导致对成功和失败过于乐观的结论。
    one_liner: 我们看到了胜利者，却忘记了失败者——导致过于乐观的结论。
    try_this:
      - 问：在做类似事情的人中，有多少失败了？我们能从他们身上学到什么？
      - 寻找“看不见”的样本——那些未能幸存的人。
      - 注意当你只研究成功案例时。
    ask_yourself:
      - 我是只从幸存者那里学习吗？
      - 如果我包含失败的案例，完整的图景会是什么样？
    in_more_detail: |
      第二次世界大战期间，统计学家亚伯拉罕·瓦尔德通过分析幸存飞机的弹孔位置，并建议在那些*未*幸存的飞机上出现弹孔的位置加装装甲，从而纠正了轰炸机的装甲布局，因为那些飞机再也没有返航。我们自然会关注可见的样本（幸存者），而忽略了不可见的样本（失败者）。

      幸存者偏差扭曲了我们对创业、投资、职业生涯和历史的看法。我们研究成功的公司，却忽略了成千上万做着类似事情而失败的公司。我们听成功者的故事，却忘记了不那么幸运的人。
    why_this_is_important: |
      纠正幸存者偏差可以带来更现实的期望和更好的决策。它能帮助你从失败中学习，而不仅仅是成功，并避免模仿那些只对少数幸运儿奏效的策略。
    when_to_use:
      - 决策-制定 (decision-making)
      - 投资 (investing)
      - 职业-发展 (career_moves)
      - 学习 (learning)
    how_can_you_spot_it:
      visible_success_stories: |
        我们听到的成功人士的故事远远多于那些尝试过但失败的人。
      missing_failures: |
        我们观察的样本排除了那些“未成功”的人，因此他们无法讲述自己的故事。
      copying_survivors: |
        假设幸存者所做的事情是他们成功的因素，而这可能仅仅是运气或幸存者偏差。
      overly_optimistic_models: |
        对成功率的估计忽略了尝试的总次数。
    examples:
      entrepreneurship: |
        “像扎克伯格一样辍学”忽略了许多辍学后并未创立出市值数十亿美元公司的案例。
      investing: |
        只研究幸存下来的基金，而忽略了那些因表现不佳而关闭的基金，这会夸大历史回报。
      career_advice: |
        成功人士将成功归因于努力工作；我们却听不到那些同样努力但失败的人的声音。
      historical_analysis: |
        研究那些幸存下来的“伟大”公司，却忽略了许多采用类似策略而失败的公司。
    real_world_implications: |
      幸存者偏差夸大了感知到的成功率，扭曲了榜样，并导致拙劣的模仿。纠正这一点需要积极寻找失败案例并理解基础比率。
    professional_application:
      networking_and_relationship_building: |
        在寻求建议时，也要寻找那些尝试过并失败过的人——他们的视角往往比幸存者更有启发性。
      collaborative_learning_initiative: |
        研究失败的项目和关闭的倡议，而不仅仅是成功的案例。进行“失败复盘”，从那些未能奏效的事情中学习。
    how_can_this_be_misapplied:
      excessive_pessimism: |
        过度纠正，认为成功总是运气，努力无关紧要。
      dismissing_success: |
        因为“幸存者偏差”而拒绝向成功人士学习。
      analysis_paralysis: |
        过于关注失败案例，以至于从未采取行动。
      false_equivalence: |
        将幸存者和非幸存者的策略视为同样有信息量，而忽略了上下文的差异。
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: 蔡格尼克效应
    quick_introduction: |
      蔡格尼克效应是指我们倾向于记住未完成或中断的任务，而不是已完成的任务。未完成的任务会产生心理张力，使其在我们脑海中保持活跃。我们的大脑会抓住未完成的事情。
    one_liner: 未完成的任务会让我们念念不忘——我们的大脑会抓住未完成的事情。
    try_this:
      - 通过完成来“释放”任务，减轻精神负担——完成它们或明确放弃它们。
      - 将工作分解成可管理的块，以创建富有成效的未完成项。
      - 注意你何时会反复思考未完成的事务——完成它们或决定放下它们。
    ask_yourself:
      - 哪些未完成的任务在我脑海中造成了张力？
      - 这个未完成项值得保留吗，还是我可以完成它？
    in_more_detail: |
      布鲁玛·蔡格尼克（Bluma Zeigarnik）观察到，服务员比已付款的订单更能记住未付款的订单——一旦任务完成，它就会“从记忆中释放”。未完成的任务会创建一个需要完成的未完成项。这既能促进专注（我们想完成），也会引起焦虑（我们无法停止思考未完成的事情）。

      该效应被用于营销（悬念、未完待续的故事）和生产力（将工作分解成块以创建多个“未完成项”）。它解释了为什么我们会反复思考未完成的事务，以及为什么待办事项清单会让人感到不知所措。
    why_this_is_important: |
      理解蔡格尼克效应有助于你管理精神负担，设计引人入胜的体验，并策略性地使用中断。它解释了为什么我们无法停止思考未完成的工作——以及为什么这可以被利用或有害。
    when_to_use:
      - problem_solving
      - leadership
      - learning
      - decision_making
    how_can_you_spot_it:
      rumination_on_incomplete: |
        未完成的任务比已完成的任务更容易侵扰思绪。
      better_recall_of_unfinished: |
        我们比已完成的任务更能记住中断的任务。
      tension_for_closure: |
        未完成之事带来的不适感或完成欲。
      serial_dramas: |
        悬念和“未完待续”利用了该效应。
    examples:
      productivity: |
        开始一项任务会产生心理张力，促使完成——如果未完成项太多，则会引起焦虑。
      marketing: |
        “第 1 部分（共 3 部分）”或“未完待续”能让观众保持参与并持续关注。
      meetings: |
        会议在没有明确后续步骤的情况下结束，会让与会者留下未解决的张力。
      learning: |
        未解答的问题或不完整的解释会留在记忆中，并驱动进一步的探究。
    real_world_implications: |
      蔡格尼克效应对生产力、参与度和精神负担都有影响。它可以被用来集中注意力，也可能导致不知所措。它解释了悬念的吸引力以及太多未完成任务的负担。
    professional_application:
      networking_and_relationship_building: |
        在谈话结束时明确下一步行动——或者故意留下未完成项，如果你希望对方跟进。未解决的线索会产生参与度。
      collaborative_learning_initiative: |
        在培训中使用蔡格尼克效应：在休息前提出问题或难题，以保持学习者的参与度。但要避免创建过多的未完成项，以免人们感到不知所措。
    how_can_this_be_misapplied:
      overwhelm: |
        创建过多的未完成项——太多未完成的任务——会导致焦虑和瘫痪。
      manipulation: |
        故意留下未解决的事项以制造依赖性或参与度。
      false_urgency: |
        利用该效应制造根本不存在的虚假紧迫感。
      incomplete_work: |
        开始许多事情以制造“张力”，但实际上并未完成——导致精力分散。
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: 零和思维
    quick_introduction: |
      零和思维是一种信念，认为一个人的收益必然是另一个人的损失——
      资源是固定的，你得到的任何优势都意味着我处于劣势。
      实际上，许多情况是正和的：双方都可以获益。
    one_liner: 你的收益不一定是我的损失——许多情况都是正和的。
    try_this:
      - 问：我们能扩大蛋糕吗？这真的是零和的吗？
      - 在假定竞争之前，先寻找合作的机会。
      - 注意你何时将一个非固定状态的情况当作固定状态来对待。
    ask_yourself:
      - 我是否在我们可以扩大蛋糕的情况下，假定蛋糕是固定的？
      - 合作是否会比竞争创造更多价值？
    in_more_detail: |
      在零和博弈中，总数是固定的——你的收益是我的损失。在正和
      情境下，合作创造价值。贸易、创新和建立关系
      通常是正和的。零和思维会导致不必要的
      竞争、错失合作机会以及破坏性的
      敌对。

      这种偏见在谈判、政治和组织动态中很常见。
      它假定蛋糕是固定的，而蛋糕往往是可以扩大的。它可能成为
      自我实现的预言：如果你将他人视为对手，他们就会变成对手。
    why_this_is_important: |
      认识到零和思维能为合作和
      价值创造打开机会。它能改善谈判，减少冲突，并促成
      双赢的结果。许多最佳机会都是正和的。
    when_to_use:
      - 谈判
      - 领导力
      - 建立关系
      - 决策
    how_can_you_spot_it:
      fixed_pie_assumption: |
        “如果他们赢了，我就输了”，而实际情况可能允许双方都获益。
      competitive_ framing: |
        自动将情境框定为“我们对他们”。
      envy_of_others_gains: |
        嫉妒他人的成功，仿佛它会让你自己的收益减少。
      missed_cooperation: |
        未能看到能使各方受益的合作机会。
    examples:
      negotiation: |
        假定对对方有利的交易意味着对你更不利——而创造性的解决方案通常会为双方扩大价值。
      salary: |
        “如果我的同事涨薪了，留给我的就少了”，而实际预算可能是灵活的，或者涨薪可以通过创造的价值来证明。
      politics: |
        “他们党派的收益就是我们的损失”，而许多政策结果可能同时惠及多个群体。
      career: |
        “他们的晋升意味着我的机会更少”，而组织增长可以为每个人创造更多机会。
    real_world_implications: |
      零和思维助长冲突，限制合作，并导致错失机会。
      在经济、人际关系和
      创新方面，它常常是错误的。转向正和思维
      可以改善结果。
    professional_application:
      networking_and_relationship_building: |
        寻找为他人创造价值的方式——他们的成功可以为你创造
        机会。建立双方互利的合作关系。
      collaborative_learning_initiative: |
        将团队目标框定为正和目标：共享成功，扩大蛋糕。
        鼓励合作而不是内部竞争。
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        有些情境确实是零和的（例如，单一的晋升，固定的预算）。
        假装不是这样可能是天真的。
      naive_cooperation: |
        假定所有人都会合作，而一些行为者实际上是
        敌对的。
      undervaluing_competition: |
        竞争可以促进改进；并非所有竞争都是破坏性的。
      exploitation: |
        利用“正和”的框架来剥削那些并不受益于此的人。
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
