# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Dutch)
# Translated from mental-models-en.yaml

mental_models:
  - id: ambiguity_effect
    name: Ambiguity-effect
    quick_introduction: |
      Het ambiguïteitseffect is de neiging om opties te vermijden wanneer we geen informatie hebben
      over de kansen op uitkomsten. We geven de voorkeur aan bekende risico's boven onbekende
      risico's - zelfs als de onbekende risico's beter zouden kunnen zijn. Onzekerheid op zich voelt
      aversief aan.
    one_liner: We geven de voorkeur aan bekende risico's boven onbekende risico's – zelfs als het onbekende beter zou kunnen zijn.
    try_this:
      - Vraag: Vermijd ik deze optie voornamelijk vanwege onzekerheid, of is er een reëel nadeel?
      - Kwantificeer wat u wel weet; soms heeft de "ambigue" optie een duidelijkere opwaartse potentie.
      - Merk op wanneer u standaard kiest voor het vertrouwde, gewoon omdat het veiliger voelt.
    ask_yourself:
      - Verwerp ik iets omdat het ambigue is, of omdat het oprecht slechter is?
      - Wat zou ik moeten weten om me comfortabel te voelen bij de onzekere optie?
    in_more_detail: |
      In Ellsberg's paradox geven mensen de voorkeur aan wedden op een urn met bekende verhoudingen
      van ballen boven een urn met onbekende verhoudingen, zelfs wanneer de onbekende urn
      betere kansen zou kunnen bieden. We hebben een hekel aan ambiguïteit - we hebben liever een duidelijke
      (zelfs als slechte) waarschijnlijkheid dan een onduidelijke.

      Het effect beïnvloedt beslissingen op het gebied van investeringen, carrièrekeuzes en beleid.
      Het kan leiden tot suboptimale keuzes wanneer we opties vermijden die ambigu zijn
      maar potentieel superieur. Het verklaart ook waarom we de voorkeur geven aan vertrouwde merken
      en bekende hoeveelheden.
    why_this_is_important: |
      Het herkennen van het ambiguïteitseffect helpt u te voorkomen dat u het vertrouwde te veel bevoordeelt
      en het onzekere te weinig. Het kan leiden tot gemiste kansen wanneer
      ambiguïteit beheersbaar is. Het verklaart ook waarom transparantie en duidelijkheid
      angst verminderen.
    when_to_use:
      - besluitvorming
      - risicoanalyse
      - investeren
      - carrièreverplaatsingen
    how_can_you_spot_it:
      preference_for_known_risks: |
        Het kiezen van opties met duidelijke (zelfs als slechtere) kansen boven ambigue opties.
      avoidance_of_uncertainty: |
        Het afwijzen van opties voornamelijk omdat "we niet genoeg weten".
      familiarity_over_optimality: |
        Het verkiezen van het bekende boven het potentieel betere onbekende.
      information_seeking: |
        Bereidheid om te betalen voor informatie die ambiguïteit vermindert - zelfs wanneer het
        de beslissing niet verandert.
    examples:
      investing: |
        Het verkiezen van binnenlandse aandelen boven internationale omdat "we ze beter begrijpen"
        ondanks diversificatievoordelen.
      employment: |
        Blijven bij een bekende baan in plaats van een rol met onzekere opwaartse potentie aan te nemen.
      product_choice: |
        Het kiezen van een bekend merk boven een nieuwe optie met onzekere kwaliteit.
      medical: |
        Het verkiezen van een behandeling met bekende bijwerkingen boven een met onzekere
        uitkomsten, zelfs wanneer de laatste beter zou kunnen zijn.
    real_world_implications: |
      Het ambiguïteitseffect vormt markten, carrièrekeuzes en beleid. Het kan worden
      verminderd door duidelijkere informatie te verstrekken of door beslissingen te herformuleren. Het
      verklaart ook waarom transparantie en communicatie angst verminderen.
    professional_application:
      networking_and_relationship_building: |
        Verminder ambiguïteit in relaties: verduidelijk verwachtingen, communiceer
        expliciet, en verminder onzekerheid. Mensen verkiezen bekende situaties.
      collaborative_learning_initiative: |
        Bij het introduceren van verandering, verminder ambiguïteit - verstrek duidelijke informatie over
        wat er zal gebeuren, wanneer, en waarom. Ambigïteit vergroot weerstand.
    how_can_this_be_misapplied:
      manipulation: |
        Opzettelijk ambiguïteit creëren om mensen naar voorkeursopties te sturen.
      false_clarity: |
        Het verstrekken van valse zekerheid wanneer echte onzekerheid bestaat.
      overconfidence: |
        Aannemen dat het verminderen van ambiguïteit beslissingen altijd verbetert - soms
        is de ambigue optie oprecht beter.
      analysis_paralysis: |
        Wachten op perfecte informatie voordat u beslist wanneer enige ambiguïteit
        onvermijdelijk is.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Ankerbias
    quick_introduction: |
      Ankerbias is de neiging om te veel te vertrouwen op de eerste informatie
      die men tegenkomt bij het nemen van beslissingen. Dat initiële "anker" beïnvloedt daaropvolgende oordelen,
      zelfs als het irrelevant of willekeurig is.
    one_liner: Het eerste getal dat je ziet, vormt alle getallen die volgen.
    try_this:
      - Beslis vóór een onderhandeling over je doelaantal en vermijd verankerd te worden door dat van de ander.
      - Genereer bij het schatten eerst je eigen getal voordat je anderen hoort.
      - Vraag: Zou ik er anders over denken als ik eerst een ander getal had gezien?
    ask_yourself:
      - Welk getal of idee kwam ik als eerste tegen — en beïnvloedt het mijn oordeel?
      - Pas ik me voldoende aan vanaf het anker, of ben ik er nog steeds te dichtbij?
    in_more_detail: |
      In een klassiek experiment gaven mensen die gevraagd werden het percentage Afrikaanse landen
      in de VN te schatten, hogere schattingen als ze net een hoger getal hadden gezien (bijv. 65 vs. 10).
      Het anker — zelfs wanneer willekeurig — beïnvloedde hun antwoorden. Ankering beïnvloedt onderhandelingen,
      prijsstelling, aanwervingen en prognoses.

      Het eerste getal dat we zien, wordt een referentiepunt. We passen ons ervan af aan, maar
      meestal onvoldoende. Zelfs wanneer we weten dat het anker willekeurig is, kan het ons nog steeds beïnvloeden. Experts zijn niet immuun.
    why_this_is_important: |
      Het begrijpen van ankering helpt u betere beslissingen te nemen, effectiever te onderhandelen
      en manipulatie te voorkomen. Het verklaart ook waarom de volgorde en de framing van
      informatie zo belangrijk zijn.
    when_to_use:
      - besluitvorming
      - onderhandeling
      - investeren
      - risicobeoordeling
    how_can_you_spot_it:
      first_number_dominance: |
        Het eerste getal in een onderhandeling of schatting beïnvloedt onevenredig
        de uitkomst.
      insufficient_adjustment: |
        Bij het aanpassen vanaf een anker passen mensen meestal niet genoeg aan.
      arbitrary_anchor_influence: |
        Zelfs duidelijk irrelevante getallen (bijv. de laatste cijfers van een burgerservicenummer)
        kunnen schattingen beïnvloeden.
      order_effects: |
        De volgorde waarin opties worden gepresenteerd, verandert keuzes.
    examples:
      salary_negotiation: |
        Het eerste genoemde getal — of het nu van de werkgever of de kandidaat komt — ankeert vaak de
        eindaanbieding.
      real_estate: |
        De vraagprijs ankeert de perceptie van waarde bij kopers, zelfs als deze opzettelijk
        hoog of laag is ingesteld.
      retail: |
        "Was €99, nu €49" gebruikt de originele prijs als anker om de verkoopprijs
        als een koopje te laten lijken.
      forecasting: |
        Initiële schattingen in vergaderingen voor planning ankeren daaropvolgende projecties, zelfs als
        de eerste schatting een gok was.
    real_world_implications: |
      Ankering vormt markten, onderhandelingen en beleid. Het kan ethisch worden gebruikt (bijv.
      het instellen van redelijke verwachtingen) of onethisch (bijv. manipulatieve prijsstelling).
      Herkenning ervan verbetert de beslissingskwaliteit.
    professional_application:
      networking_and_relationship_building: |
        Overweeg in onderhandelingen om het eerste bod te doen om het anker te zetten — of wees je ervan bewust
        wanneer de andere partij dit doet.
      collaborative_learning_initiative: |
        Wees in vergaderingen voorzichtig met wie er als eerste spreekt over schattingen; overweeg
        onafhankelijke schattingen te verzamelen vóór de discussie.
    how_can_this_be_misapplied:
      manipulation: |
        Opzettelijk extreme ankers gebruiken om anderen naar gewenste uitkomsten te sturen.
      overconfidence_in_anchors: |
        Te veel vertrouwen op je eigen eerste schatting zonder deze te herzien.
      ignoring_relevant_information: |
        Een anker meer relevante gegevens laten overrulen.
      exploitation: |
        Verkoopstrategieën die opgeblazen "vergelijk met" prijzen gebruiken om actuele prijzen redelijk te laten lijken.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Beschikbaarheidscascade
    quick_introduction: |
      Een beschikbaarheids-cascade is een zichzelf versterkend proces waarbij een idee aan geloofwaardigheid wint door herhaalde publieke discussie. Hoe meer het besproken wordt, hoe "beschikbaarder" het wordt, hoe meer mensen het geloven, en hoe meer het besproken wordt. Een collectief geloof krijgt momentum, ongeacht de onderliggende waarheid.
    one_liner: Hoe vaker een idee wordt herhaald, hoe geloofwaardiger het lijkt—ongeacht het bewijs.
    try_this:
      - Vraag: Is dit geloof wijdverbreid omdat het waar is, of omdat het herhaald wordt?
      - Zoek eerst naar primaire bronnen voordat je "wat iedereen weet" accepteert.
      - Merk op wanneer herhaling alleen je gevoel van geloofwaardigheid aanstuurt.
    ask_yourself:
      - Zou ik dit geloven als ik het maar één keer had gehoord?
      - Verwar ik "iedereen zegt het" met "het bewijs ondersteunt het"?
    in_more_detail: |
      Timur Kuran en Cass Sunstein beschreven hoe beschikbaarheids-cascades werken: informatiebeschikbaarheid (hoe vaak we iets horen) en geloofwaardigheid (hoe geloofwaardig het lijkt) versterken elkaar. Media-aandacht, sociale media en het publieke discours versterken bepaalde ideeën. Zodra een idee een drempel van beschikbaarheid bereikt, kan het zich snel verspreiden en "gangbare kennis" worden, zelfs als het onjuist of overdreven is.

      Beschikbaarheids-cascades kunnen heilzaam zijn (belangrijke waarschuwingen verspreiden) of schadelijk (paniek of desinformatie verspreiden). Ze worden aangedreven door de beschikbaarheidsheuristiek en sociaal bewijs.
    why_this_is_important: |
      Het herkennen van beschikbaarheids-cascades helpt je te evalueren of wijdverbreid geloof bewijs weerspiegelt of slechts herhaling. Het verklaart hoe ideeën viraal gaan en hoe collectieve overtuigingen onjuist kunnen zijn. Het is essentieel voor mediawijsheid en kritisch denken.
    when_to_use:
      - besluitvorming
      - risicoanalyse
      - leren
      - leiderschap
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Hoe vaker een idee wordt herhaald, hoe geloofwaardiger het lijkt.
      media_amplification: |
        Aandacht stuurt geloof aan, wat weer leidt tot meer aandacht.
      social_proof_belief: |
        "Iedereen gelooft het" wordt een bewijs voor geloof.
      threshold_effects: |
        Zodra een idee een zichtbaarheidsdrempel overschrijdt, verspreidt het zich snel.
    examples:
      health_scares: |
        Een studie suggereert dat een product gevaarlijk is; de media versterkt dit;
        het publiek vermijdt het; meer aandacht volgt. Het risico kan
        overdreven zijn.
      financial_panic: |
        Geruchten over bankfaillissementen verspreiden zich; mensen onttrekken geld; de run
        wordt zelfvervullend.
      social_media: |
        Een verhaal gaat viraal; herhaling vergroot geloof; geloof vergroot delen. Waarheid en viraliteit kunnen uiteenlopen.
      organizational: |
        Een gerucht over ontslagen verspreidt zich; angst neemt toe; gedrag verandert; het gerucht wint aan geloofwaardigheid door de reactie.
    real_world_implications: |
      Beschikbaarheids-cascades vormen de publieke opinie, beleid en markten.
      Ze kunnen zowel belangrijke waarheden als gevaarlijke onwaarheden verspreiden.
      Kritisch denken vereist het onderscheiden van op bewijs gebaseerd geloof
      van cascade-gedreven geloof.
    professional_application:
      networking_and_relationship_building: |
        Wanneer een idee "overal" is, vraag je af: Is het waar omdat het
        herhaald wordt, of herhaald omdat het waar is? Zoek primaire bronnen.
      collaborative_learning_initiative: |
        Creëer normen van verificatie vóór het versterken. Moedig
        het bevragen van "wat iedereen weet" aan. Onderscheid consensus
        die bewijs weerspiegelt van consensus die
        beschikbaarheid weerspiegelt.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Soms is wijdverbreid geloof correct. Ga er niet van uit dat alle
        populaire ideeën cascades zijn.
      conspiracy_thinking: |
        "Beschikbaarheids-cascade" gebruiken om legitieme
        zorgen af te doen als gefabriceerd.
      false_skepticism: |
        Goed onderbouwde ideeën afwijzen omdat ze populair zijn.
      contrarianism: |
        Aannemen dat wat wijdverbreid geloofd wordt, fout moet zijn.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Beschikbaarheidsheuristiek
    quick_introduction: |
      De beschikbaarheidsheuristiek is de neiging om de waarschijnlijkheid van gebeurtenissen te beoordelen op basis van hoe gemakkelijk voorbeelden ervan in gedachten komen. Als we gemakkelijk voorbeelden kunnen herinneren, nemen we aan dat de gebeurtenis veelvoorkomend is. Levendige, recente of emotionele voorbeelden domineren onze waarschijnlijkheidsschattingen.
    one_liner: Wat gemakkelijk in gedachten komt, voelt waarschijnlijker – zelfs als dat niet zo is.
    try_this:
      - Vraag: Wat is de basiskans? Overweeg ik levendige of recente voorbeelden te zwaar?
      - Zoek gegevens wanneer je onderbuikgevoel zegt "dit voelt gewoon" of "dit voelt zeldzaam".
      - Merk op wanneer één dramatisch verhaal je risicobeoordeling stuurt.
    ask_yourself:
      - Beoordeel ik de waarschijnlijkheid op basis van het gemak van herinnering in plaats van de werkelijke frequentie?
      - Zou ik er anders over denken als ik die krantenkop nog niet had gezien?
    in_more_detail: |
      We gebruiken mentale shortcuts om frequentie en waarschijnlijkheid te schatten. Eén shortcut is beschikbaarheid: wat komt er gemakkelijk in gedachten? Vliegtuigcrashes zijn levendig en worden veel gerapporteerd – we overschatten hun waarschijnlijkheid. Auto-ongelukken zijn
      vaak voorkomend, maar minder opvallend – we onderschatten ze. Recentheid, levendigheid en emotionele impact vergroten allemaal de beschikbaarheid.

      De heuristiek is nuttig wanneer beschikbaarheid correleert met de werkelijke frequentie.
      Maar media, persoonlijke ervaringen en opvallendheid vertekenen vaak de correlatie.
      We vrezen zeldzame maar levendige risico's en negeren veelvoorkomende maar alledaagse risico's.
    why_this_is_important: |
      Het herkennen van de beschikbaarheidsheuristiek helpt u bij het corrigeren van waarschijnlijkheidsschattingen, het vermijden van overmatige reacties op levendig nieuws en het maken van betere risicobeoordelingen. Het verklaart veel systematische beoordelingsfouten.
    when_to_use:
      - besluitvorming
      - risicobeoordeling
      - investeren
      - probleemoplossing
    how_can_you_spot_it:
      vividness_dominance: |
        Dramatische of emotionele voorbeelden beïnvloeden schattingen onevenredig.
      recency_effect: |
        Recente gebeurtenissen voelen waarschijnlijker om zich te herhalen.
      personal_experience_overweighting: |
        "Ik ken iemand die..." vormt waarschijnlijkheidsschattingen.
      media_distortion: |
        Wat wordt gerapporteerd, komt vaak niet overeen met wat frequent is.
    examples:
      risk_perception: |
        Overschattend risico op terrorisme (levendig, gerapporteerd) en onderschattend
        risico op hartaandoeningen (vaak voorkomend, minder dramatisch).
      investing: |
        Recente marktgebeurtenissen (crash, hausse) domineren de verwachtingen voor de toekomst.
      hiring: |
        Eén levendig verhaal over een slechte aanwerving van een bepaalde school beïnvloedt
        de beoordeling van alle kandidaten van die school.
      health: |
        De diagnose van kanker bij een vriend maakt dat kanker waarschijnlijker voelt dan basiskansen suggereren.
    real_world_implications: |
      De beschikbaarheidsheuristiek beïnvloedt verzekeringsaankopen, beleidsprioriteiten
      en persoonlijke beslissingen. Het wordt uitgebuit door media en marketeers. Corrigeren
      ervoor vereist het zoeken naar basiskansen en het bevragen van wat "in gedachten komt".
    professional_application:
      networking_and_relationship_building: |
        Wees u ervan bewust dat één levendige negatieve ervaring met een persoon of groep uw oordeel kan vertekenen. Zoek basiskansen en meerdere datapunten.
      collaborative_learning_initiative: |
        Vraag bij het beoordelen van risico's of kansen expliciet "Wat is de basiskans?" en "Overweeg ik levendige voorbeelden te zwaar?". Gebruik gegevens om schattingen gedreven door beschikbaarheid te corrigeren.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Soms is beschikbaarheid informatief – recente ervaring kan verandering signaleren. Neem niet aan dat alle door beschikbaarheid gedreven oordelen verkeerd zijn.
      analysis_paralysis: |
        Overcorrectie tot het punt dat legitieme waarschuwingssignalen van
        levendige ervaringen worden genegeerd.
      false_objectivity: |
        Aannemen dat basiskansen altijd correct zijn, terwijl ze verouderd of
        niet van toepassing kunnen zijn.
      manipulation: |
        Opzettelijk bepaalde voorbeelden levendig maken om de oordelen van anderen te sturen.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Het Baader-Meinhoffenomeen
    quick_introduction: |
      Het Baader-Meinhoffenomeen (ook wel frequentie-illusie genoemd) is wanneer je
      over iets nieuws leert en het daarna plotseling overal opmerkt. Het voelt als toeval,
      maar het is vaak selectieve aandacht – je brein is geprimed om op te merken wat het
      onlangs is tegengekomen.
    one_liner: Je leert iets nieuws en ziet het plotseling overal – het was er altijd al.
    try_this:
      - Wanneer iets "overal" voelt nadat je erover hebt geleerd, controleer dan het basispercentage.
      - Merk op wanneer recentheid iets belangrijker doet lijken dan het is.
      - Vraag: Zie ik een echte trend, of merk ik gewoon op waar ik op geprimed ben om op te merken?
    ask_yourself:
      - Is dit nu werkelijk vaker voorkomend, of merk ik het gewoon meer op?
      - Zou ik dit patroon hebben gezien als ik er niet recent over had geleerd?
    in_more_detail: |
      Nadat iemand had gehoord over de Baader-Meinhof terroristengroep, zou die persoon
      binnen enkele dagen verwijzingen ernaar kunnen zien in het nieuws, in gesprekken en
      in artikelen. Het fenomeen heeft twee componenten: selectieve aandacht (je merkt op
      waar je naar zoekt) en bevestigingsvooroordeel (je onthoudt de treffers en vergeet de missers).

      De illusie is dat het ding plotseling vaker is gaan voorkomen. In werkelijkheid was
      het altijd aanwezig; je was er simpelweg niet op afgestemd. Dit kan leiden tot het
      overschatten van de prevalentie of het belang van recent geleerde informatie.
    why_this_is_important: |
      Het herkennen van het Baader-Meinhoffenomeen helpt je te voorkomen te overschatten
      hoe vaak of belangrijk iets is op basis van recente blootstelling. Het verklaart
      ook waarom nieuwe ideeën, producten of trends kunnen voelen alsof ze "overal" zijn
      nadat je ze voor het eerst opmerkt.
    when_to_use:
      - besluitvorming
      - leren
      - risicobeoordeling
      - probleemoplossing
    how_can_you_spot_it:
      sudden_ubiquity: |
        Je leert een nieuw woord, concept of product en voelt binnen enkele dagen dat je
        het constant ziet.
      recency_bias: |
        Recente informatie voelt representatiever voor de werkelijkheid dan het in werkelijkheid is.
      pattern_seeking: |
        Je brein verbindt niet-gerelateerde waarnemingen tot een verhaal van "dit is overal".
      forgetting_the_misses: |
        Je houdt niet bij hoe vaak je het ding niet ziet – alleen de keren dat je het wel ziet.
    examples:
      vocabulary: |
        Het leren van het woord "serendipiteit" en het vervolgens in drie verschillende artikelen
        in dezelfde week opmerken.
      car_purchase: |
        Nadat je hebt besloten een bepaald automodel te kopen, zie je het op elke straat – hoewel het
        er altijd al was.
      health_anxiety: |
        Lezen over een zeldzaam symptoom en vervolgens vergelijkbare sensaties bij jezelf opmerken,
        wat leidt tot onnodige bezorgdheid.
      trends: |
        Het ontdekken van een nieuwe app of trend en het gevoel hebben dat deze plotseling domineert – terwijl het
        misschien een kleine gebruikersbasis heeft.
    real_world_implications: |
      Het fenomeen beïnvloedt hoe we trends, risico's en kansen waarnemen. Marketeers
      en media kunnen ervan profiteren door herhaalde blootstelling te creëren. Bij besluitvorming
      kan het leiden tot het te veel nadruk leggen op recente informatie.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand herhaaldelijk een onderwerp noemt nadat hij erover heeft geleerd, erken dan dat zij mogelijk
        de frequentie-illusie ervaren – het onderwerp is niet noodzakelijk relevanter, maar slechts
        salienter voor hen.
      collaborative_learning_initiative: |
        Tijdens trainingen benadrukken dat "het overal zien" na het leren van iets nieuws
        normaal is; moedig het controleren van basispercentages aan in plaats van te vertrouwen op het gevoel
        van alomtegenwoordigheid.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Aannemen dat iets vaker voorkomt of belangrijker is dan het is, omdat je het
        het laatste tijd frequent hebt opgemerkt.
      confirmation_bias_amplification: |
        Het gevoel van "het overal zien" gebruiken als bewijs dat een overtuiging correct is.
      decision_distortion: |
        Keuzes maken op basis van recent geleerde informatie die onevenredig significant aanvoelt.
      vulnerability_to_manipulation: |
        Adverteerders en propagandisten gebruiken herhaalde blootstelling om de illusie van
        alomtegenwoordigheid en belang te creëren.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: Barnum-effect
    quick_introduction: |
      Het Barnum-effect (of Forer-effect) is de neiging om vage, algemene persoonlijkheidsbeschrijvingen
      als uniek accuraat te accepteren. Horoscopen, waarzeggers en persoonlijkheidstests gebruiken
      uitspraken die op bijna iedereen van toepassing zijn – maar wij geloven dat ze specifiek
      voor ons zijn. We herkennen onszelf in het algemene.
    one_liner: Vage uitspraken voelen persoonlijk omdat ze op bijna iedereen van toepassing zijn.
    try_this:
      - Vraag: Zou deze beschrijving op veel mensen van toepassing kunnen zijn? Test het op iemand anders.
      - Zoek naar specifieke, gedragsgerichte feedback in plaats van vage lof of kritiek.
      - Merk op wanneer "gepersonaliseerde" inzichten te mooi lijken om onderscheidend te zijn.
    ask_yourself:
      - Zou deze feedback accuraat aanvoelen als deze aan een vreemde werd gegeven?
      - Onthoud ik de treffers en vergeet ik de missers?
    in_more_detail: |
      Psycholoog Bertram Forer gaf studenten identieke "gepersonaliseerde" feedback
      (bv. "Je hebt behoefte aan waardering en bewondering van anderen") en zij beoordeelden
      deze als zeer accuraat. De uitspraken waren vaag genoeg om op iedereen van toepassing te zijn.
      P.T. Barnum zei naar verluidt "Er wordt elke minuut een goedgelovige geboren"—
      het effect is vernoemd naar zijn vaardigheid om de massa aan te spreken met
      op het persoonlijke lijkende algemeenheden.

      Het effect werkt omdat we goed zijn in het vinden van persoonlijke relevantie in
      ambigue uitspraken. We onthouden de treffers en vergeten de missers.
      Het vormt de basis van cold reading en veel "persoonlijkheids"-producten.
    why_this_is_important: |
      Het herkennen van het Barnum-effect helpt je bij het evalueren van persoonlijkheidsbeoordelingen,
      weerstand te bieden aan manipulatie en het vermijden van het overinterpreteren van vage feedback.
      Het verklaart waarom horoscopen accuraat aanvoelen en waarom sommige "gepersonaliseerde"
      adviezen generiek zijn.
    when_to_use:
      - besluitvorming
      - leren
      - risico-inschatting
      - relatie-opbouw
    how_can_you_spot_it:
      vague_accuracy: |
        Feedback die persoonlijk aanvoelt, maar op veel mensen van toepassing zou kunnen zijn.
      selective_fit: |
        We focussen ons op wat past en negeren wat niet past.
      cold_reading: |
        Iemand "leest" je met uitspraken die eigenlijk generiek zijn.
      personality_test_enthusiasm: |
        Onkritische acceptatie van testresultaten als uniek inzichtelijk.
    examples:
      horoscopes: |
        "Je twijfelt soms aan je beslissingen" voelt persoonlijk, maar is op de meeste mensen van toepassing.
      fortune_telling: |
        Vage voorspellingen die we interpreteren als specifiek voor onze situatie.
      personality_tests: |
        Sommige beoordelingen gebruiken Barnum-uitspraken en voelen accuraat aan zonder
        onderscheidend te zijn.
      feedback: |
        Generieke prestatiefeedback die we interpreteren als diep
        gepersonaliseerd.
    real_world_implications: |
      Het Barnum-effect wordt uitgebuit in astrologie, sommige coaching en
      laagwaardige beoordelingen. Het kan vals zelfvertrouwen creëren in
      ongeldige middelen. Het verklaart ook waarom we vatbaar zijn voor
      vleierij en vage positieve feedback.
    professional_application:
      networking_and_relationship_building: |
        Vraag bij het ontvangen van feedback: "Zou dit op veel mensen van toepassing kunnen zijn?"
        Zoek naar specifieke, gedragsgerichte feedback in plaats van vage lof of kritiek.
        Wees sceptisch over "gepersonaliseerde" inzichten die te mooi lijken.
      collaborative_learning_initiative: |
        Kies bij het gebruik van beoordelingen voor gevalideerde instrumenten met onderscheidende
        validiteit. Vermijd instrumenten die afhankelijk zijn van Barnum-uitspraken.
        Train mensen om vage feedback te herkennen.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Niet alle gepersonaliseerde feedback is Barnum – sommige is werkelijk specifiek.
        Verwerp niet alles wat vaag is.
      invalidating_experience: |
        Iemand vertellen dat hun ervaring van inzicht "gewoon Barnum" is,
        terwijl het voor hen wel waarde kan hebben.
      overcorrection: |
        Alle persoonlijkheidskaders verwerpen omdat sommigen Barnum-uitspraken gebruiken.
      false_skepticism: |
        Aannemen dat iets Barnum moet zijn omdat het accuraat aanvoelt – soms zijn dingen accuraat.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Basispercentage-drogreden
    quick_introduction: |
      De basispercentage-drogreden is de neiging om algemene statistische informatie
      (basispercentages) te negeren ten gunste van specifieke, levendige informatie. We overschatten de
      specifieke zaak en onderschatten de a priori waarschijnlijkheid. Eén overtuigend
      verhaal kan wat de cijfers zeggen tenietdoen.
    one_liner: Een overtuigend verhaal kan wat de cijfers zeggen tenietdoen.
    try_this:
      - Vraag, voordat je een zaak beoordeelt: wat is het basispercentage voor dit soort situaties?
      - Combineer het specifieke bewijs met de a priori waarschijnlijkheid — negeer geen van beide.
      - Merk op wanneer één levendig voorbeeld de statistieken overschaduwt.
    ask_yourself:
      - Overschat ik deze specifieke zaak en onderschat ik het basispercentage?
      - Wat zouden de cijfers zeggen als ik het overtuigende verhaal terzijde zou schuiven?
    in_more_detail: |
      Als een ziekte 1% van de bevolking treft en een test 95% nauwkeurig is, betekent een
      positief resultaat vaak dat de persoon nog steeds waarschijnlijk de ziekte niet heeft —
      omdat het basispercentage zo laag is. Maar we negeren de basispercentages en focussen op "ze testten positief." We laten ons meeslepen door het specifieke boven het
      statistische.

      De drogreden beïnvloedt medische diagnoses, werving, risicobeoordeling en juridische oordelen. We moeten basispercentages combineren met casusspecifiek bewijs met behulp van
      Bayesiaanse redenering — maar dat doen we vaak niet.
    why_this_is_important: |
      Corrigeren voor de basispercentage-drogreden verbetert diagnoses, risicobeoordelingen
      en beslissingskwaliteit. Het voorkomt dat we overreageren op levendige gevallen en
      onderreageren op statistische realiteit.
    when_to_use:
      - besluitvorming
      - risicobeoordeling
      - probleemoplossing
      - investeren
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Basispercentages worden niet meegenomen in oordelen.
      vividness_over_statistics: |
        Eén enkel geval of verhaal domineert over geaggregeerde gegevens.
      diagnostic_overweighting: |
        Nieuw bewijs (bijv. testresultaat) overschatten zonder rekening te houden met het basispercentage.
      anecdote_override: |
        "Ik ken iemand die..." overschrijft statistisch bewijs.
    examples:
      medical: |
        Een positieve test voor een zeldzame ziekte — het basispercentage is laag, dus een positieve
        uitslag is vaak een vals-positieve. We negeren dit en nemen aan dat ze de ziekte hebben.
      hiring: |
        Een kandidaat heeft een geweldig interview — we negeren de basispercentages voor hoe goed
        interviews prestaties voorspellen.
      risk: |
        Een vliegtuigcrash is levendig — we overschatten het vliegrisico en onderschatten
        het rijrisico, waarbij we de basispercentages negeren.
      startup_investing: |
        Een oprichter pitcht goed — we negeren dat de meeste startups falen, ongeacht de pitchkwaliteit.
    real_world_implications: |
      De basispercentage-drogreden beïnvloedt medische beslissingen, juridische oordelen en
      bedrijfsstrategieën. Het draagt bij aan verkeerde toewijzing van middelen en
      slechte risicobeoordeling. Bayesiaans denken corrigeert hiervoor.
    professional_application:
      networking_and_relationship_building: |
        Overweeg bij het evalueren van mensen de basispercentages: bijv. hoe vaak komt dit
        type gedrag voor? Laat niet één levendige interactie het
        bredere patroon overschaduwen.
      collaborative_learning_initiative: |
        Vermeld en overweeg bij het nemen van beslissingen expliciet de basispercentages voordat
        casusspecifiek bewijs wordt geïntegreerd. Train teams in Bayesiaans redeneren.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Sterk casusspecifiek bewijs negeren wanneer de basispercentages anders suggereren —
        soms is de individuele zaak de uitzondering.
      stereotyping: |
        Basispercentages gebruiken om oneerlijke oordelen te vellen over individuen.
      false_precision: |
        Basispercentages toepassen met valse precisie wanneer het ruwe schattingen zijn.
      dismissing_individuals: |
        "Statistieken zeggen X" wanneer de persoon voor je mogelijk niet in de
        verdeling past.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Stelling van Bayes
    quick_introduction: |
      De stelling van Bayes beschrijft hoe de waarschijnlijkheid van een hypothese wordt bijgewerkt wanneer
      er nieuw bewijs wordt ontvangen. Het formaliseert het idee dat overtuigingen moeten veranderen
      in verhouding tot hoe goed het bewijs ze ondersteunt — niet alles-of-niets,
      maar incrementeel.
    one_liner: Werk overtuigingen bij in verhouding tot hoe goed het bewijs ze ondersteunt.
    try_this:
      - Begin met je 'prior'; vraag hoe waarschijnlijk het bewijs zou zijn als je het mis had.
      - Werk incrementeel bij — wissel niet van 0% naar 100% op basis van één datapunt.
      - Overweeg alternatieve hypothesen: zou het bewijs ook bij hen passen?
    ask_yourself:
      - Hoeveel verschuift dit bewijs daadwerkelijk de waarschijnlijkheid?
      - Werk ik mijn overtuigingen bij, of bevestig ik alleen wat ik al dacht?
    in_more_detail: |
      De stelling stelt dat de waarschijnlijkheid van een hypothese, gegeven bewijs, gelijk is aan
      de 'prior'-waarschijnlijkheid vermenigvuldigd met de waarschijnlijkheid van het bewijs, gegeven de
      hypothese, gedeeld door de waarschijnlijkheid van het bewijs. In de praktijk: begin
      met je 'prior'-overtuiging, kijk hoe consistent het nieuwe bewijs is met je
      hypothese versus alternatieven, en werk dienovereenkomstig bij.

      Bayesiaans denken gaat in op de confirmatiebias door je te vragen te overwegen
      hoe waarschijnlijk het bewijs zou zijn als je het mis had. Het is de basis van
      probabilistisch redeneren en wetenschappelijke updates.
    why_this_is_important: |
      Bayesiaans denken verbetert besluitvorming onder onzekerheid, helpt je
      overmoed te vermijden en biedt een kader voor leren van bewijs.
      Het is essentieel voor diagnose, prognoses en elk domein met onzekerheid.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - risicoanalyse
      - leren
    how_can_you_spot_it:
      prior_and_update: |
        Beginnen met een basisovertuiging en deze aanpassen op basis van nieuw bewijs.
      likelihood_ratio_thinking: |
        Vragen "Hoe waarschijnlijk is dit bewijs als ik het goed heb versus fout?"
      incremental_updating: |
        Overtuigingen verschuiven geleidelijk met bewijs in plaats van abrupt om te slaan.
      base_rate_respect: |
        'Prior'-waarschijnlijkheden (basispercentages) zijn belangrijk, niet alleen het nieuwste datapunt.
    examples:
      medical_diagnosis: |
        Een positieve test voor een zeldzame ziekte — de 'prior' (lage prevalentie) betekent dat een
        positief resultaat vaak een vals positief is. Bayes werkt de waarschijnlijkheid bij.
      forecasting: |
        Voorspellingen bijwerken naarmate nieuwe gegevens binnenkomen in plaats van vast te houden aan initiële
        schattingen.
      hiring: |
        Beginnen met basispercentages voor geschiktheid voor de functie, en vervolgens bijwerken op basis van de prestaties tijdens het interview.
      investing: |
        De waarschijnlijkheid dat een bedrijf zal slagen bijwerken naarmate nieuwe informatie
        (inkomsten, nieuws) binnenkomt.
    real_world_implications: |
      Bayesiaans denken vormt de basis van moderne AI, medische diagnoses en wetenschappelijke
      inferentie. Het corrigeert voor verwaarlozing van basispercentages en confirmatiebias. Het is
      een krachtig hulpmiddel voor elk domein met onzekerheid.
    professional_application:
      networking_and_relationship_building: |
        Werk je overtuigingen over mensen bij op basis van nieuw bewijs in plaats van
        vaste eerste indrukken te behouden. Overweeg basispercentages (bv. hoe gebruikelijk
        is dit gedrag?) bij het interpreteren van acties.
      collaborative_learning_initiative: |
        Moedig teams aan om 'priors' expliciet te vermelden vóór discussies, en dan
        bij te werken naarmate bewijs wordt gepresenteerd. Vermindert verankering en confirmatiebias.
    how_can_this_be_misapplied:
      overprecision: |
        Exacte waarschijnlijkheden toekennen wanneer de onzekerheid hoog is.
      prior_rigidity: |
        Vasthouden aan sterke 'priors' en onvoldoende bijwerken met nieuw bewijs.
      base_rate_tyranny: |
        Sterk bewijs negeren omdat basispercentages anders suggereren — soms
        moet het bewijs domineren.
      false_sophistication: |
        Bayesiaanse taal gebruiken om rigoureus te klinken zonder de daadwerkelijke
        redenering uit te voeren.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: Het Ben Franklin-effect
    quick_introduction: |
      Het Ben Franklin-effect is het psychologische fenomeen waarbij mensen iemand meer mogen
      nadat ze een gunst voor die persoon hebben verricht. In tegenstelling tot de intuïtie dat
      we gunsten verlenen aan mensen die we mogen, gaan we vaak mensen mogen voor wie we gunsten
      hebben verleend.
    one_liner: We gaan mensen mogen voor wie we gunsten hebben verleend – onze houding volgt onze acties.
    try_this:
      - Als je een relatie wilt verbeteren, overweeg dan om een kleine gunst te vragen.
      - Merk op wanneer het verlenen van een gunst je gevoelens ten opzichte van iemand verandert.
      - Wees je ervan bewust dat anderen je misschien meer mogen na het helpen.
    ask_yourself:
      - Heeft het verlenen van een gunst aan iemand mijn gevoelens over die persoon veranderd?
      - Rationaliseer ik mijn inspanning door mijn waardering voor hen te verhogen?
    in_more_detail: |
      Benjamin Franklin beschreef beroemd hoe hij een rivaliserende wetgever voor zich won door
      een zeldzaam boek uit diens bibliotheek te lenen. Nadat de man hiermee instemde, gaf Franklin
      het terug met een bedankbriefje. De relatie verbeterde aanzienlijk. Het effect suggereert
      dat onze attitudes onze acties volgen: wanneer we moeite doen om iemand te helpen, rationaliseren
      we die inspanning door onze positieve waardering voor die persoon te verhogen.

      De cognitieve dissonantietheorie verklaart dit: wanneer we een gunst verlenen aan iemand
      die we niet mogen of neutraal tegenover staan, ervaren we spanning tussen onze actie (helpen)
      en onze houding (afkeer). Het oplossen van die spanning door hen meer te mogen, is vaak
      gemakkelijker dan toe te geven dat we tegen onze voorkeuren in hebben gehandeld.
    why_this_is_important: |
      Inzicht in het Ben Franklin-effect helpt je om relaties strategisch op te bouwen en te
      herkennen wanneer je eigen gevoelens beïnvloed kunnen worden door eerdere gunsten. Het
      verklaart ook waarom het vragen om kleine gunsten effectiever kan zijn dan ze aanbieden
      wanneer je een relatie wilt verbeteren.
    when_to_use:
      - relatieopbouw
      - onderhandeling
      - leiderschap
      - conflictbemiddeling
    how_can_you_spot_it:
      liking_after_helping: |
        Merk op wanneer je je warmer voelt voor iemand nadat je een gunst hebt verleend, zelfs
        als je je eerder neutraal of negatief voelde.
      others_requesting_small_favors: |
        Wanneer iemand herhaaldelijk om kleine gunsten vraagt, maken ze mogelijk bewust of
        onbewust gebruik van dit effect om een band op te bouwen.
      attitude_shift_post_investment: |
        Observeer na het investeren van tijd of moeite in het helpen van iemand, of je mening
        over die persoon positief is verschoven.
      reciprocal_relationship_dynamics: |
        Relaties waarin één persoon veel gunsten heeft verleend, kunnen onevenwichtig aanvoelen
        in affectie, ondanks dat ze in actie evenwichtig lijken.
    examples:
      networking: |
        Een collega om feedback vragen op een concept, waardoor diegene zich meer betrokken
        voelt bij je succes en positiever tegenover je staat.
      sales: |
        Een verkoper vraagt een potentiële klant om een kleine gunst (bijv. een aanbeveling of
        introductie), wat de betrokkenheid en sympathie van de potentiële klant vergroot.
      conflict_resolution: |
        Na een meningsverschil de andere partij om hulp vragen bij iets ongerelateerds kan spanningen
        verminderen en goodwill herstellen.
      mentoring: |
        Wanneer een senior persoon een junior persoon om input of hulp vraagt, voelt de junior
        persoon zich vaak meer gewaardeerd en verbonden.
    real_world_implications: |
      Het Ben Franklin-effect beïnvloedt werving, verkoop, diplomatie en alledaagse sociale
      dynamiek. Het kan ethisch worden gebruikt om bruggen te bouwen of onethisch om affectie
      te manipuleren. Het herkennen ervan helpt je te begrijpen waarom sommige relaties sterker
      voelen na asymmetrische gunstverlening.
    professional_application:
      networking_and_relationship_building: |
        Bij het opbouwen van relaties, overweeg dan om kleine, redelijke gunsten te vragen in plaats
        van ze alleen aan te bieden. De daad van het helpen creëert betrokkenheid en positieve
        waardering.
      collaborative_learning_initiative: |
        In teams kan het elkaar helpen (bijv. peer review, cross-training) de cohesie versterken.
        Structureer samenwerking zo dat iedereen zowel helpt als geholpen wordt.
    how_can_this_be_misapplied:
      manipulation: |
        Bewust gunsten vragen uitsluitend om iemand je te laten mogen, zonder oprechte noodzaak,
        kan uitbuitend aanvoelen als het ontdekt wordt.
      overreliance_on_favors: |
        Aannemen dat gunsten alleen een kapotte relatie zullen repareren; sommige conflicten
        vereisen directe communicatie en verantwoordelijkheid.
      asymmetric_exploitation: |
        Herhaaldelijk om gunsten vragen zonder wederkerigheid kan averechts werken en wrok
        voeden.
      misattributing_motives: |
        Aannemen dat iemands warmte puur oprecht is, terwijl het gedeeltelijk het resultaat kan
        zijn van gunsten die die persoon voor jou heeft gedaan.
    related_content:
      - halo_effect
  - id: bounded_rationality
    name: Beperkte Rationaliteit
    quick_introduction: |
      Beperkte rationaliteit is het idee dat menselijke besluitvorming wordt beperkt door de beschikbare informatie,
      cognitieve capaciteit en tijd. We optimaliseren niet; we "satisficeren"—we kiezen
      opties die goed genoeg zijn in plaats van de best mogelijke.
    one_liner: We satisficeren—we kiezen goed genoeg, niet optimaal.
    try_this:
      - Vereenvoudig keuzes waar mogelijk; te veel opties overweldigen beperkte rationaliteit.
      - Stel van tevoren criteria voor "goed genoeg" vast om eindeloos zoeken te voorkomen.
      - Merk op wanneer je optimaliseert voorbij het punt van afnemende meeropbrengsten.
    ask_yourself:
      - Probeer ik de perfecte optie te vinden wanneer goed genoeg zou volstaan?
      - Welke beperkingen (tijd, info, aandacht) beperken mijn beslissing?
    in_more_detail: |
      Herbert Simon introduceerde het concept om de klassieke economische aanname
      van rationele actoren met perfecte informatie uit te dagen. In werkelijkheid hebben we beperkte aandacht,
      werkgeheugen en tijd. We gebruiken heuristieken en shortcuts om beslissingen te nemen die
      "rationeel" zijn gegeven onze beperkingen, ook al zijn ze niet optimaal in ideale zin.

      Beperkte rationaliteit verklaart waarom we niet altijd de beste optie kiezen, waarom we
      vertrouwen op vuistregels, en waarom context en framing zoveel belang hebben. Het is een beschrijvend
      model van hoe we daadwerkelijk beslissen, niet een voorschrift voor hoe we zouden moeten.
    why_this_is_important: |
      Het begrijpen van beperkte rationaliteit helpt u betere processen te ontwerpen,
      keuzes voor anderen te vereenvoudigen en realistische verwachtingen te stellen voor de beslissingskwaliteit. Het verklaart ook
      waarom "irrationeel" gedrag vaak rationeel is onder beperkingen.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - leiderschap
      - risico-inschatting
    how_can_you_spot_it:
      satisficing_behavior: |
        Mensen kiezen de eerste acceptabele optie in plaats van alle opties uitputtend te vergelijken.
      heuristic_reliance: |
        Beslissingen worden genomen op basis van vuistregels in plaats van volledige analyse.
      context_dependence: |
        Dezelfde persoon neemt verschillende keuzes afhankelijk van hoe opties worden gepresenteerd.
      information_overload: |
        Wanneer te veel informatie beschikbaar is, kan de beslissingskwaliteit afnemen.
    examples:
      hiring: |
        Een manager neemt de eerste kandidaat aan die aan de eisen voldoet in plaats van eindeloos te interviewen
        om de "beste" kandidaat te vinden.
      consumer_choice: |
        Winkelaars kiezen uit de eerste paar opties op een schap in plaats van elk
        product in de winkel te vergelijken.
      policy: |
        Kiezers gebruiken partij-affiliatie of een paar belangrijke kwesties als shortcuts in plaats van
        elke beleidspositie te analyseren.
      daily_routines: |
        Mensen volgen gewoontes en standaardopties in plaats van elke beslissing opnieuw te optimaliseren.
    real_world_implications: |
      Beperkte rationaliteit vormt markten, beleidsontwerp en organisatiegedrag.
      Nudges en keuze-architectuur werken omdat ze rekening houden met onze beperkingen. Het negeren ervan
      leidt tot te complexe systemen die mensen niet effectief kunnen gebruiken.
    professional_application:
      networking_and_relationship_building: |
        Verwacht niet dat anderen complexe afwegingen in realtime verwerken. Vereenvoudig keuzes
        en bied duidelijke standaardopties.
      collaborative_learning_initiative: |
        Ontwerp processen die werken met beperkte rationaliteit: verminder keuzes, bied
        standaardopties en gebruik checklists voor complexe beslissingen.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Het ontwerpen van processen die uitgaan van onbeperkte cognitieve capaciteit, wat leidt tot
        beslissingsmoeheid en slechte resultaten.
      blaming_irrationality: |
        Het afwijzen van de keuzes van anderen als irrationeel zonder rekening te houden met hun beperkingen.
      exploitation: |
        Het doelbewust overweldigen van mensen met complexiteit om hen naar gewenste
        uitkomsten te sturen.
      perfectionism: |
        Het verwachten van optimale beslissingen wanneer satisficeren vaak de rationele aanpak is.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Omstandereffect
    quick_introduction: |
      Het omstandereffect is de neiging van individuen om minder snel hulp te bieden
      wanneer er andere mensen aanwezig zijn. Hoe meer omstanders, hoe kleiner de kans
      dat één persoon actie onderneemt. De verantwoordelijkheid wordt verspreid; we gaan
      ervan uit dat iemand anders zal helpen.
    one_liner: Hoe meer mensen aanwezig zijn, hoe kleiner de kans dat één persoon actie onderneemt.
    try_this:
      - Wijs in noodsituaties direct verantwoordelijkheid toe: Jij, bel 112.
      - Ga er niet van uit dat iemand anders zal helpen - handel of delegeer expliciet.
      - Merk op wanneer je wacht tot anderen eerst handelen.
    ask_yourself:
      - Spreid ik de verantwoordelijkheid omdat anderen aanwezig zijn?
      - Zou ik anders handelen als ik alleen was?
    in_more_detail: |
      Na de moord op Kitty Genovese (hoewel het verhaal deels werd gemytologiseerd)
      ontdekten onderzoekers dat de aanwezigheid van anderen de hulp vermindert. We kijken
      naar anderen voor aanwijzingen - als niemand handelt, interpreteren we dat als "geen
      actie nodig". We ervaren ook verspreiding van verantwoordelijkheid: met veel mensen
      aanwezig, voelt iedereen zich persoonlijk minder verantwoordelijk. Pluralistische
      onwetendheid kan optreden: iedereen denkt dat er iets mis is, maar niemand handelt
      omdat niemand anders handelt.

      Het effect is het sterkst wanneer de situatie ambigu is en wanneer
      omstanders elkaar niet kennen. Het kan worden overwonnen door directe
      toewijzing van verantwoordelijkheid ("Jij, bel 112").
    why_this_is_important: |
      Het begrijpen van het omstandereffect helpt je om actie te ondernemen wanneer anderen
      dat niet doen, en om systemen te ontwerpen die het overwinnen. Als je in de problemen zit,
      wijs dan één persoon aan. Als je een omstander bent, wacht dan niet tot anderen handelen.
    when_to_use:
      - leiderschap
      - relatie_opbouw
      - conflict_resolutie
      - besluitvorming
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "Iemand anders doet het wel" wanneer er velen aanwezig zijn.
      pluralistic_ignorance: |
        Iedereen denkt dat actie nodig is, maar niemand handelt omdat niemand
        anders handelt.
      social_proof_inaction: |
        Inactie door anderen wordt geïnterpreteerd als "geen actie nodig."
      audience_inhibition: |
        Angst om voor gek te staan of te overdrijven voorkomt actie.
    examples:
      emergency: |
        Een persoon stort in; met veel omstanders is de kans kleiner dat iemand
        om hulp roept.
      workplace: |
        Iedereen ziet een probleem, maar niemand kaart het aan - ieder gaat ervan
        uit dat iemand anders het wel zal doen.
      harassment: |
        Getuigen van intimidatie grijpen niet in, ieder denkend dat
        anderen wel zullen handelen.
      meetings: |
        Een slecht idee blijft onbetwist omdat iedereen aanneemt dat
        iemand anders wel zal ingrijpen.
    real_world_implications: |
      Het omstandereffect kan tragische gevolgen hebben in noodsituaties
      en laat problemen voortduren in organisaties. Het overwinnen ervan
      vereist directe toewijzing van verantwoordelijkheid en normen die
      interventie aanmoedigen.
    professional_application:
      networking_and_relationship_building: |
        Als je hulp nodig hebt, vraag het aan een specifieke persoon. Als je iets
        fout ziet gaan, onderneem dan actie - ga er niet van uit dat anderen dat zullen doen.
        Creëer normen waarin het uiten van je mening wordt verwacht en beloond.
      collaborative_learning_initiative: |
        Train mensen om het omstandereffect te herkennen en in te grijpen.
        Gebruik "als je iets ziet, zeg er iets van" en wijs expliciete
        rollen toe. Beloon degenen die als eerste spreken.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Individuen hard veroordelen wanneer het effect een krachtige
        situationele kracht is - focus op het veranderen van de situatie.
      false_assumption: |
        Aannemen dat iemand altijd zal helpen als er genoeg mensen
        aanwezig zijn - het tegenovergestelde is vaak waar.
      overcorrection: |
        Iedereen verantwoordelijk maken zodat niemand dat is - verspreiding
        kan nog steeds optreden.
      individualizing: |
        Het omstandereffect behandelen als een karakterfout in plaats van een
        situationeel fenomeen.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Cirkel van Competentie
    quick_introduction: |
      De cirkel van competentie is een mentaal model dat je aanspoort om de grenzen
      van je expertise te kennen en binnen die grenzen te blijven bij het nemen van belangrijke beslissingen. Warren Buffett
      en Charlie Munger benadrukken het belang van weten wat je niet weet.
    one_liner: Ken de grenzen van je expertise—en blijf erbij als het ertoe doet.
    try_this:
      - Breng in kaart waar je echte expertise hebt versus waar je gokt.
      - Zoek advies of delegeer wanneer je buiten je cirkel treedt.
      - Wees eerlijk: zou een echte expert het met je oordeel hier eens zijn?
    ask_yourself:
      - Ben ik binnen mijn cirkel van competentie, of gok ik?
      - Wanneer heb ik voor het laatst toegegeven "ik weet het niet" op dit gebied?
    in_more_detail: |
      Iedereen heeft gebieden waarop ze echte expertise hebben—waar ze informatie
      kunnen evalueren, fouten kunnen opsporen en betrouwbare oordelen kunnen vellen. Buiten die cirkel
      zijn ze vatbaar voor dezelfde vooroordelen en fouten als ieder ander. De sleutel is eerlijke
      zelfbeoordeling: waar ben je werkelijk competent, en waar gok je?

      De cirkel kan uitbreiden door doelbewust leren, maar het vereist nederigheid om
      de huidige grenzen ervan te erkennen. Buiten je cirkel opereren verhoogt het risico op kostbare fouten, vooral wanneer de inzet hoog is.
    why_this_is_important: |
      Binnen je cirkel van competentie blijven vermindert kostbare fouten en verbetert de beslissingskwaliteit. Het helpt je ook te weten wanneer je advies moet inwinnen, moet delegeren of je moet onthouden. Overmoed buiten je cirkel is een belangrijke oorzaak van mislukking.
    when_to_use:
      - besluitvorming
      - investeren
      - carrièrestappen
      - risicobeoordeling
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Kun je de grenzen van je kennis op een bepaald gebied uitleggen? Weet je wat je
        niet weet?
      knowing_when_to_defer: |
        Herken situaties waarin je input van experts zou moeten zoeken in plaats van alleen te beslissen.
      consistent_track_record: |
        Binnen je cirkel worden je oordelen na verloop van tijd meestal gevalideerd; daarbuiten niet.
      calibration: |
        Je vertrouwen in een bepaald gebied komt overeen met je werkelijke prestaties in dat gebied.
    examples:
      investing: |
        Buffett vermijdt tech-aandelen omdat hij zegt dat ze buiten zijn cirkel van
        competentie vallen—hij kan ze niet betrouwbaar evalueren.
      career: |
        Een specialist die in zijn domein blijft versus iemand die een "uitdagende" rol op zich neemt in een
        onverwacht gebied.
      hiring: |
        Weten wanneer je op je eigen oordeel moet vertrouwen versus specialisten inhuren voor
        technische functies.
      advice_giving: |
        Weigeren een mening te geven over onderwerpen buiten je expertise in plaats van te gokken.
    real_world_implications: |
      De cirkel van competentie is cruciaal voor waardebeleggen en professioneel succes.
      Het negeren ervan leidt tot overmoed, mislukte ondernemingen en slecht advies. Het uitbreiden van
      de cirkel vereist gerichte inspanning en eerlijke feedback.
    professional_application:
      networking_and_relationship_building: |
        Bouw relaties op met mensen wier cirkels van competentie de jouwe aanvullen.
        Weet wanneer je anderen moet introduceren in plaats van zelf te antwoorden.
      collaborative_learning_initiative: |
        Creëer teams met overlappende en complementaire cirkels. Moedig mensen aan om aan te geven wanneer ze buiten hun competentie opereren.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Nooit buiten je cirkel treden kan groei en leren beperken.
      false_modesty: |
        Een minuscule cirkel claimen om verantwoordelijkheid of moeilijke beslissingen te vermijden.
      gatekeeping: |
        De "cirkel van competentie" gebruiken om anderen af te wijzen zonder hun argumenten te overwegen.
      stagnation: |
        De cirkel behandelen als vaststaand in plaats van iets dat met inspanning kan uitbreiden.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Cognitieve Dissonantie
    quick_introduction: |
      Cognitieve dissonantie is het mentale ongemak dat we voelen wanneer we
      conflicterende overtuigingen hebben, of wanneer onze acties onze overtuigingen
      tegenspreken. We zijn gemotiveerd om dit ongemak te verminderen - vaak door
      onze overtuigingen te veranderen om bij onze acties te passen, in plaats van
      onze acties te veranderen.
    one_liner: We passen onze overtuigingen vaker aan om bij onze acties te passen dan andersom.
    try_this:
      - Merk op wanneer je rationaliseert om ongemak te verminderen in plaats van je gedrag te veranderen.
      - Vraag: Pas ik mijn overtuigingen aan om te rechtvaardigen wat ik heb gedaan?
      - Overweeg of het veranderen van de actie eerlijker zou zijn dan het veranderen van de overtuiging.
    ask_yourself:
      - Verminder ik dissonantie door te rationaliseren, of door daadwerkelijk te veranderen?
      - Zou ik deze overtuiging hebben als ik niet al op deze manier had gehandeld?
    in_more_detail: |
      De theorie van Leon Festinger verklaart dat we consistentie zoeken. Wanneer we
      tegen onze waarden in handelen (bijvoorbeeld liegen, geld verspillen), ervaren
      we dissonantie. Om dit te verminderen, kunnen we onze overtuiging veranderen
      ("Het was niet echt een leugen") of de actie minimaliseren ("Het was niet zo
      erg"). We rationaliseren vaak in plaats van te hervormen.

      Cognitieve dissonantie drijft het Ben Franklin-effect (we houden van mensen die
      we hebben geholpen), verklaart waarom we beslissingen uit het verleden rechtvaardigen
      en ligt ten grondslag aan veel zelfbedrog. Het is een krachtige kracht bij het
      vormen en veranderen van overtuigingen.
    why_this_is_important: |
      Het begrijpen van cognitieve dissonantie helpt je je eigen rationalisaties
      te herkennen en te begrijpen waarom mensen weigeren van gedachten te veranderen.
      Het verklaart ook waarom inzet en consistentie krachtige overtuigingsprincipes
      zijn.
    when_to_use:
      - besluitvorming
      - relatieopbouw
      - leiderschap
      - conflictoplossing
    how_can_you_spot_it:
      post_decision_rationalization: |
        Na een keuze benadrukken we de positieve aspecten van onze keuze en de
        negatieve aspecten van afgewezen opties.
      belief_action_alignment: |
        We passen overtuigingen aan om te passen bij acties die we al hebben
        ondernomen.
      discomfort_with_inconsistency: |
        Ongemak wanneer we merken dat ons gedrag niet overeenkomt met onze
        verklaarde waarden.
      resistance_to_disconfirming_evidence: |
        Het afwijzen of minimaliseren van informatie die in tegenspraak is met
        onze toezeggingen.
    examples:
      purchase_justification: |
        Na het kopen van een duur item benadrukken we de voordelen en bagatelliseren
        we de kosten.
      relationship: |
        We rationaliseren dat we in een slechte relatie blijven door ons te
        concentreren op het goede en het slechte te minimaliseren.
      career: |
        We rechtvaardigen dat we in een baan blijven die we niet leuk vinden door
        redenen te benadrukken waarom we "moeten" blijven.
      beliefs: |
        Wanneer onze acties onze waarden tegenspreken, veranderen we onze waarden
        ("Ik ben niet echt vegetarisch - ik eet gewoon af en toe vlees") in plaats
        van onze acties.
    real_world_implications: |
      Cognitieve dissonantie vormt de vorming van overtuigingen, consumentengedrag
      en politieke houdingen. Het verklaart waarom mensen na slechte beslissingen
      nog meer vastklampen en waarom het veranderen van gedrag overtuigingen kan
      veranderen.
    professional_application:
      networking_and_relationship_building: |
        Kleine toezeggingen kunnen leiden tot grotere - mensen rationaliseren hun
        eerdere acties. Gebruik dit ethisch: begin met kleine verzoeken. Wees je
        bewust van wanneer je je eigen gedrag rationaliseert.
      collaborative_learning_initiative: |
        Bij het introduceren van verandering, verkrijg vroegtijdige steun en kleine
        toezeggingen - ze creëren dissonantie die grotere adoptie motiveert. Vermijd
        het afdwingen van publieke toezeggingen die wrok opwekken.
    how_can_this_be_misapplied:
      manipulation: |
        Opzettelijk dissonantie creëren om mensen onder druk te zetten tot
        naleving.
      dismissing_genuine_change: |
        Aannemen dat alle verandering van overtuigingen rationalisatie is, terwijl
        mensen soms oprecht bijwerken.
      forced_consistency: |
        Mensen onder druk zetten om "consistent" te zijn wanneer hun standpunten
        legitiem zijn geëvolueerd.
      self_deception: |
        Het gebruiken van dissonantietheorie om te rechtvaardigen dat ongemakkelijke
        waarheden over onszelf worden vermeden.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Bevestigingsvooroordeel
    quick_introduction: |
      Bevestigingsvooroordeel is de neiging om informatie te zoeken, te interpreteren en te onthouden op manieren die onze bestaande overtuigingen bevestigen. We geven meer gewicht aan ondersteunend bewijs en negeren of wijzen bewijs af dat onze standpunten tegenspreekt. We stellen vragen die onze hypothesen bevestigen in plaats van ze te testen.
    one_liner: We zoeken en onthouden wat onze overtuigingen bevestigt; we negeren wat ze tegenspreekt.
    try_this:
      - Vraag: Wat zou mij ongelijk bewijzen? Zoek actief naar ontkrachtend bewijs.
      - Merk op wanneer je meer gewicht toekent aan ondersteunende dan aan tegenstrijdige informatie.
      - Beschouw het tegenovergestelde standpunt net zo serieus als het jouwe.
    ask_yourself:
      - Test ik mijn hypothese of bevestig ik hem alleen maar?
      - Wanneer heb ik voor het laatst van gedachten veranderd op basis van nieuw bewijs?
    in_more_detail: |
      We zijn geen neutrale verwerkers van informatie. We zoeken bevestiging, interpreteren ambiguïteit als ondersteuning en onthouden treffers meer dan missers. We omringen ons met gelijkgestemden en media. We vragen "Waarom heb ik gelijk?" in plaats van "Wat zou mij ongelijk bewijzen?" Dit maakt ons overmoedig en traag in het aanpassen van onze mening.

      Bevestigingsvooroordeel is een van de meest voorkomende en goed gedocumenteerde vooroordelen.
      Het beïnvloedt wetenschap, politiek, relaties en zaken. Het overwinnen ervan
      vereist doelbewuste inspanning en gestructureerde processen.
    why_this_is_important: |
      Het herkennen van bevestigingsvooroordeel is essentieel voor goede besluitvorming en
      leren. Het helpt je om ontkrachtend bewijs te zoeken, alternatieve
      hypothesen te overwegen en je overtuigingen bij te werken wanneer dat gerechtvaardigd is. Het is de basis
      van wetenschappelijk denken.
    when_to_use:
      - besluitvorming
      - leren
      - probleemoplossing
      - risicobeoordeling
    how_can_you_spot_it:
      seeking_support: |
        Zoeken naar bewijs dat je standpunt bevestigt in plaats van het te testen.
      asymmetric_interpretation: |
        Ambigu bewijs interpreteren als ondersteuning voor je positie.
      discounting_disconfirming: |
        Bewijs dat je overtuigingen tegenspreekt, afwijzen of minimaliseren.
      selective_exposure: |
        Alleen informatie consumeren uit bronnen die het met je eens zijn.
    examples:
      hiring: |
        Een vroege positieve indruk vormen en vervolgens vragen stellen die
        bevestigen dat de kandidaat geweldig is.
      investing: |
        Na de aankoop van een aandeel, positief nieuws zoeken en negatieve
        analyses negeren.
      relationships: |
        De acties van een partner interpreteren door een lens die je
        beeld van hen (goed of slecht) bevestigt.
      politics: |
        Informatie van de eigen kant kritiekloos accepteren en equivalente
        informatie van de andere kant verwerpen.
    real_world_implications: |
      Bevestigingsvooroordeel bestendigt valse overtuigingen, voedt polarisatie en
      veroorzaakt kostbare fouten. Het is de vijand van goede wetenschap en goede
      besluitvorming. Het overwinnen ervan vereist doelbewust zoeken naar ontkrachting.
    professional_application:
      networking_and_relationship_building: |
        Wanneer je meningen vormt over mensen, actief zoeken naar ontkrachtend
        bewijs. Vraag "Wat zou mijn mening veranderen?" en zoek ernaar.
      collaborative_learning_initiative: |
        Gebruik de advocaat van de duivel, rode teams en pre-mortems om
        ontkrachtende perspectieven naar boven te halen. Beloon mensen die heersende
        standpunten met goed bewijs uitdagen.
    how_can_this_be_misapplied:
      false_balance: |
        Alle standpunten als gelijkwaardig behandelen wanneer bewijs één kant sterk ondersteunt.
      excessive_skepticism: |
        Al het bewijs afwijzen als "bevestigingsvooroordeel" wanneer sommige overtuigingen
        goed ondersteund zijn.
      contrarianism: |
        Het tegenovergestelde standpunt innemen om bevestigingsvooroordeel te vermijden – wanneer
        het oorspronkelijke standpunt correct kan zijn.
      analysis_paralysis: |
        Nooit een standpunt innemen omdat "we bevooroordeeld zouden kunnen zijn."
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: De Kennisvloek
    quick_introduction: |
      De kennisvloek is de moeilijkheid om je voor te stellen hoe het is om iets niet te
      weten als je het eenmaal weet. Experts vinden het moeilijk om beginners te onderwijzen omdat
      ze het perspectief van de beginner niet kunnen nabootsen. Als je iets weet, vergeet je
      hoe het was om het niet te weten.
    one_liner: Als je iets eenmaal weet, vergeet je hoe het was om het niet te weten.
    try_this:
      - Begin bij het uitleggen bij de basisprincipes – ga ervan uit dat je publiek niets weet.
      - Vraag een beginner om het na te vertellen; hun verwarring onthult je blinde vlekken.
      - Merk op wanneer je stappen overslaat of jargon gebruikt dat anderen misschien niet kennen.
    ask_yourself:
      - Ga ik ervan uit dat anderen dezelfde context hebben als ik?
      - Zou iemand zonder mijn achtergrond dit begrijpen?
    in_more_detail: |
      In een klassiek experiment tikten mensen die het antwoord op een puzzel wisten
      het ritme van een liedje en verwachtten dat anderen het zouden raden – ze overschatten hoe
      duidelijk het was. De tappers konden het liedje in hun hoofd niet "terug horen".
      Kennis is "kleverig"; het is moeilijk om onwetendheid te simuleren.

      De vloek beïnvloedt onderwijs, communicatie, productontwerp en leiderschap.
      We gaan ervan uit dat anderen dezelfde context hebben als wij. We gebruiken jargon. We slaan
      stappen over. We zijn verrast als mensen het niet "snappen".
    why_this_is_important: |
      Het herkennen van de kennisvloek verbetert het onderwijs, de communicatie en
      productontwerp. Het helpt je om mensen te ontmoeten waar zij zich bevinden in plaats van
      waar jij je bevindt. Het is essentieel voor effectieve kennisoverdracht.
    when_to_use:
      - leren
      - leiderschap
      - probleemoplossing
      - relatieopbouw
    how_can_you_spot_it:
      obvious_to_you: |
        "Het is duidelijk" wanneer het alleen duidelijk is omdat je het antwoord weet.
      jargon_use: |
        Gebruik van termen die het publiek niet kent zonder deze te definiëren.
      skipped_steps: |
        Ervan uitgaan dat anderen zullen invullen wat jij hebt weggelaten.
      frustration_with_learners: |
        "Hoe kunnen ze het niet zien?" wanneer ze je context missen.
    examples:
      teaching: |
        Een wiskundeprofessor slaat stappen over die voor hen "duidelijk" zijn, maar
        essentieel voor studenten.
      product_design: |
        Ontwerpers creëren interfaces die voor hen logisch zijn, maar nieuwe
        gebruikers verwarren.
      onboarding: |
        Ervaren medewerkers vergeten wat nieuwe medewerkers niet weten en
        bieden ontoereikende training.
      writing: |
        Auteurs gaan ervan uit dat lezers dezelfde achtergrond hebben en missen
        noodzakelijke context.
    real_world_implications: |
      De kennisvloek creëert communicatiekloven, mislukte producten en
      ineffectief onderwijs. Het is een reden waarom experts slechte
      docenten kunnen zijn. Het overwinnen ervan vereist bewuste inspanning om het
      perspectief van het publiek aan te nemen.
    professional_application:
      networking_and_relationship_building: |
        Begin bij het uitleggen op het niveau van de ander. Vraag "Wat
        weten ze al?" Test je communicatie met iemand
        die niet jouw achtergrond heeft.
      collaborative_learning_initiative: |
        Gebruik "leg het uit alsof ik vijf ben" oefeningen. Laat experts
        beginners lesgeven en feedback krijgen. Creëer documentatie die
        geen voorkennis veronderstelt. Gebruik peer teaching – mensen die recent
        hebben geleerd, onthouden het perspectief van de beginner.
    how_can_this_be_misapplied:
      oversimplification: |
        Versimpelen tot op het punt van onjuistheid of neerbuigendheid.
      false_assumption: |
        Ervan uitgaan dat anderen minder weten dan ze doen – ook een falen van
        kalibratie.
      one_size_fits_all: |
        Niet alle publieken hebben hetzelfde niveau van uitleg nodig; pas de uitleg
        aan het publiek aan.
      avoiding_complexity: |
        Sommige onderwerpen zijn complex; de kennisvloek betekent niet
        dat we nooit technisch taalgebruik mogen gebruiken wanneer dat passend is.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Standaardeffect
    quick_introduction: |
      Het standaardeffect is de neiging om de vooraf geselecteerde optie te kiezen wanneer
      keuzes worden gepresenteerd. Wat als standaard is ingesteld, heeft een sterk voordeel—
      mensen blijven er vaak bij, ongeacht of het voor hen optimaal is.
    one_liner: Wat als standaard is ingesteld, heeft een sterk voordeel—we blijven erbij.
    try_this:
      - Merk op wanneer je de standaard accepteert zonder alternatieven te evalueren.
      - Stel bij het ontwerpen van keuzes standaarden in die in het beste belang van de gebruiker zijn.
      - Vraag: Zou ik dit kiezen als het niet vooraf was geselecteerd?
    ask_yourself:
      - Kies ik de standaard uit inertie, of omdat het het beste voor mij is?
      - Wie heeft deze standaard ingesteld en wat kunnen ze ermee winnen?
    in_more_detail: |
      Standaarden werken vanwege inertie, verliesaversie (veranderen voelt als het verliezen van
      de standaard) en geïmpliceerde goedkeuring (we nemen aan dat de standaard wordt aanbevolen).
      Orgaandonatiepercentages variëren sterk per land, grotendeels gebaseerd op of
      de standaard opt-in of opt-out is. Deelname aan pensioenbesparingen springt
      omhoog wanneer inschrijving automatisch is.

      Standaarden kunnen worden gebruikt voor het goede (aanzetten tot betere uitkomsten) of voor
      manipulatie (ongunstige voorwaarden verbergen in vooraf aangevinkte vakjes). Begrip
      van het effect helpt u betere systemen te ontwerpen en ongewenste standaarden te weerstaan.
    why_this_is_important: |
      Inzicht in het standaardeffect helpt u bij het ontwerpen van keuze-architectuur die
      uitkomsten verbetert, en het helpt u te herkennen wanneer uw keuzes worden gevormd
      door standaarden in plaats van bewuste voorkeur.
    when_to_use:
      - besluitvorming
      - leiderschap
      - probleemoplossing
      - risicobeoordeling
    how_can_you_spot_it:
      inertia_toward_default: |
        De meeste mensen blijven bij wat vooraf is geselecteerd.
      implied_recommendation: |
        We interpreteren de standaard als "wat ze willen dat we kiezen".
      opt_in_vs_opt_out: |
        Framing verandert de deelname dramatisch (opt-in versus opt-out).
      pre_checked_boxes: |
        Vooraf geselecteerde opties hebben een sterk voordeel in formulieren en instellingen.
    examples:
      organ_donation: |
        Landen met opt-out hebben veel hogere donatiepercentages dan landen met opt-in—
        de standaard is belangrijker dan attitudes.
      retirement_savings: |
        Automatische inschrijving verhoogt de 401(k)-deelname dramatisch.
      software_installers: |
        "Aanbevolen" opties en vooraf aangevinkte add-ons bepalen wat gebruikers installeren.
      subscriptions: |
        Gratis proefversies die standaard overgaan op betaalde inschrijving, vangen velen op die niet
        actief zouden kiezen om zich te abonneren.
    real_world_implications: |
      Het standaardeffect is een van de krachtigste duwtjes in de rug. Het beïnvloedt spaargeld,
      gezondheid, privacy en consumentengedrag. Ethische keuze-architectuur gebruikt
      standaarden om uitkomsten te verbeteren; duistere patronen gebruiken ze om uit te buiten.
    professional_application:
      networking_and_relationship_building: |
        Kies bij het ontwerpen van processen voor anderen standaarden die hun
        belangen dienen. Vermijd duistere patronen die standaarden gebruiken om waarde te onttrekken.
      collaborative_learning_initiative: |
        Stel standaarden in voor teampraktijken (bijv. standaard asynchroon, standaard naar
        documentatie) die aansluiten bij het gewenste gedrag. Maak de juiste keuze
        de gemakkelijke keuze.
    how_can_this_be_misapplied:
      dark_patterns: |
        Standaarden gebruiken om mensen te misleiden tot ongunstige keuzes (bijv. verborgen
        kosten, ongewenste abonnementen).
      paternalism: |
        Standaarden opleggen die oprechte voorkeur overrulen zonder toestemming.
      manipulation: |
        Ongunstige voorwaarden verbergen in standaarden en vertrouwen op inertie.
      one_size_fits_all: |
        Aannemen dat dezelfde standaard voor iedereen juist is wanneer voorkeuren variëren.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Dunning-Kruger Effect
    quick_introduction: |
      Het Dunning-Kruger-effect beschrijft een cognitieve bias waarbij mensen met beperkte
      kennis of vaardigheid op een bepaald gebied hun competentie overschatten, terwijl experts
      de neiging hebben hun competentie te onderschatten. Hoe minder je weet, hoe zelfverzekerder je kunt zijn.
    one_liner: Hoe minder je weet, hoe zelfverzekerder je kunt zijn.
    try_this:
      - In nieuwe domeinen, ga ervan uit dat je overmoedig bent — zoek feedback en kalibratie.
      - Wanneer experts twijfel uiten, neem dit serieus; ze kennen mogelijk de uitzonderingen.
      - Let op wanneer beginners zekerder zijn dan experts in een bepaald veld.
    ask_yourself:
      - Zit ik op de "piek van Mount Stupid" of in de "vallei van nederigheid"?
      - Heb ik het metacognitieve vermogen om mijn eigen competentie hier te evalueren?
    in_more_detail: |
      Het onderzoek van Dunning en Kruger toonde aan dat incompetente individuen het metacognitieve vermogen missen om hun eigen incompetentie te herkennen. Om je prestaties te evalueren, heb je dezelfde vaardigheden nodig die nodig zijn om goed te presteren — dus de onervarenen zijn dubbel benadeeld: ze presteren slecht en weten het niet.

      Naarmate de competentie toeneemt, ervaren mensen vaak een "vallei van nederigheid" waarin ze herkennen hoeveel ze niet weten. Echte experts kunnen te weinig zelfvertrouwen hebben omdat ze zich acuut bewust zijn van nuance en uitzonderingen.
    why_this_is_important: |
      Het herkennen van het Dunning-Kruger-effect helpt je om je eigen zelfvertrouwen te kalibreren, de meningen van beginners niet te overschatten en de nederigheid van experts te waarderen. Het is essentieel voor leren, aannemen en besluitvorming.
    when_to_use:
      - leren
      - besluitvorming
      - leiderschap
      - loopbaanontwikkeling
    how_can_you_spot_it:
      novice_overconfidence: |
        Iemand met weinig ervaring uit sterke, ongekwalificeerde meningen.
      expert_underconfidence: |
        Zeer bekwame mensen nuanceren en uiten meer onzekerheid dan minder bekwame mensen.
      inability_to_recognize_quality: |
        Slecht presterenden kunnen goed van slecht werk in hun domein niet onderscheiden.
      confidence_competence_mismatch: |
        Zelfvertrouwen en werkelijke bekwaamheid zijn omgekeerd gecorreleerd bij beginners.
    examples:
      social_media: |
        Mensen met oppervlakkige kennis van een onderwerp, argumenteren vol vertrouwen met domeinexperts.
      hiring: |
        Kandidaten die slecht presteren in interviews, beoordelen soms hun eigen prestaties hoog.
      investing: |
        Nieuwe investeerders kunnen overmoedig zijn na vroege winsten, zonder geluk te herkennen.
      workplace: |
        Junior medewerkers overschatten mogelijk hun gereedheid voor promotie, terwijl seniors aan zichzelf twijfelen.
    real_world_implications: |
      Het Dunning-Kruger-effect beïnvloedt onderwijs, aanwerving, politiek en het publieke debat.
      Het verklaart waarom slechte ideeën worden versterkt en waarom experts kunnen worden afgedaan. Kalibratie
      is van belang voor individuele en collectieve besluitvorming.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand erg zelfverzekerd is, overweeg dan of deze persoon zich mogelijk in de
        Dunning-Kruger-zone bevindt. Zoek naar diverse perspectieven, ook van degenen die
        onzekerheid uiten.
      collaborative_learning_initiative: |
        Creëer culturen waarin het toegeven van onzekerheid gewaardeerd wordt. Moedig kalibratie-
        oefeningen en feedback aan die mensen helpen hun competentie nauwkeurig te beoordelen.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Aannemen dat zelfverzekerde mensen altijd ongelijk hebben; soms is zelfvertrouwen
        gerechtvaardigd.
      false_modesty: |
        Experts die beweren minder te weten dan ze doen om bescheiden te lijken.
      gatekeeping: |
        Dunning-Kruger gebruiken om iedereen die het niet eens is met "experts" af te wijzen zonder
        hun argumenten aan te gaan.
      self_doubt_paralysis: |
        Overcorrectie tot het punt waarop je je eigen oordeel nooit meer vertrouwt.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Empathiegat
    quick_introduction: |
      Het empathiegat is de moeilijkheid om de mentale toestanden van anderen te begrijpen en te voorspellen wanneer we zelf in een andere toestand verkeren. Als we kalm zijn, onderschatten we hoe we ons zullen voelen als we boos of hongerig zijn. Als we verzadigd zijn, onderschatten we hoeveel we willen eten als we hongerig zijn.
    one_liner: We onderschatten hoe we ons zullen voelen - en hoe anderen zich voelen - in verschillende toestanden.
    try_this:
      - Neem wanneer je kalm bent verplichtingen aan voor wanneer je gestrest zult zijn; doe een vooruitbetaling.
      - Oordeel niet over anderen in een toestand waarin jij je niet bevindt - hongerig, moe, bang.
      - Vraag: projecteer ik mijn huidige toestand op mijn toekomstige zelf of op anderen?
    ask_yourself:
      - Onderschat ik hoe ik me zal voelen in een andere toestand?
      - Zou ik deze persoon beter begrijpen als ik in hun toestand was?
    in_more_detail: |
      We hebben moeite ons voor te stellen hoe we ons in verschillende omstandigheden zullen voelen - en hoe anderen zich voelen wanneer ze zich in toestanden bevinden waarin wij ons momenteel niet bevinden. Een nuchter persoon onderschat de aantrekkingskracht van verslaving. Een uitgerust persoon onderschat de impact van slaapgebrek. We projecteren onze huidige toestand op anderen en op onze toekomstige zelven.

      Het empathiegat beïnvloedt beslissingen die we nemen voor onze toekomstige zelven (bv. ons committeren aan sporten wanneer we gemotiveerd zijn), beslissingen die we nemen voor anderen, en ons vermogen om mensen in verschillende toestanden te begrijpen.
    why_this_is_important: |
      Het erkennen van het empathiegat verbetert de besluitvorming voor je toekomstige zelf, empathie voor anderen en begrip van onze eigen variabiliteit. Het verklaart waarom we toezeggingen doen die we niet kunnen nakomen en waarom we anderen in nood verkeerd begrijpen.
    when_to_use:
      - besluitvorming
      - relatieopbouw
      - leiderschap
      - conflictbemiddeling
    how_can_you_spot_it:
      current_state_projection: |
        Aannemen dat anderen zich voelen zoals wij nu doen, of dat wij in de toekomst zullen voelen zoals wij nu doen.
      underestimating_emotional_state: |
        "Wat is er zo erg aan?" wanneer we ons niet in de toestand bevinden waarin zij zich bevinden.
      commitment_failures: |
        Keuzes maken op basis van huidige motivatie waar we ons niet aan zullen houden wanneer de motivatie wegvalt.
      misunderstanding_others: |
        Ervaringen van anderen afwijzen omdat we ons die niet kunnen voorstellen vanuit onze huidige toestand.
    examples:
      hunger: |
        Boodschappen doen wanneer je vol zit - we kopen minder dan we zullen willen als we honger hebben.
      addiction: |
        Niet-verslaafden onderschatten de moeilijkheid om te stoppen; verslaafden in herstel kunnen de aantrekkingskracht onderschatten wanneer ze gebruiken.
      conflict: |
        Wanneer we kalm zijn, onderschatten we hoe we zullen reageren op het moment van confrontatie.
      motivation: |
        Je inschrijven voor een les om 6 uur 's ochtends wanneer je gemotiveerd bent - en er niet heen gaan wanneer je slaperig bent.
    real_world_implications: |
      Het empathiegat beïnvloedt verslavingsbehandeling, beleid en interpersoonlijk begrip. Het verklaart waarom we toezeggingen doen die we verbreken en waarom we er vaak niet in slagen de perspectieven van anderen te begrijpen. Het is een barrière voor empathie en goede besluitvorming.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand gestrest, boos of in een andere toestand is, neem dan niet aan dat ze zullen redeneren zoals jij. Probeer hun toestand te visualiseren. Houd rekening met hoe je je zult voelen wanneer de motivatie wegvalt bij het maken van toezeggingen.
      collaborative_learning_initiative: |
        Denk bij het plannen na over hoe het team zich zal voelen wanneer ze moe, onder druk of gefrustreerd zijn. Ontwerp voor die toestanden, niet alleen voor de gemotiveerde planningsfase.
    how_can_this_be_misapplied:
      overattribution: |
        Alle misverstanden afdoen als "empathiegat" terwijl mensen soms oprecht verschillende waarden hebben.
      excusing_behavior: |
        "Ze konden er niets aan doen - empathiegat" terwijl mensen verantwoordelijk zijn voor het beheersen van hun toestanden.
      false_relativism: |
        Aannemen dat we anderen nooit kunnen begrijpen wanneer we ons met inspanning en ervaring kunnen verbeteren.
      self_excuse: |
        Het empathiegat gebruiken om onze eigen faalmomenten te rechtvaardigen.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Bezitsdrang effect
    quick_introduction: |
      Het bezitsdrang effect is de neiging om iets hoger te waarderen puur
      omdat we het bezitten. We eisen meer om een object af te staan dan we ervoor zouden betalen om het te verwerven. Bezit creëert een band die onze waardering vertekent.
    one_liner: We waarderen wat we bezitten meer dan wat we niet bezitten — bezit creëert een band.
    try_this:
      - Vraag: Wat zou ik betalen om dit te verwerven als ik het niet bezat?
      - Stel je bij het verkopen voor dat je het koopt — zou je je vraagprijs betalen?
      - Merk op wanneer bezit je waardering opblaast.
    ask_yourself:
      - Waardeer ik dit te veel omdat ik het bezit?
      - Zou een neutrale koper het eens zijn met mijn prijs?
    in_more_detail: |
      In experimenten eisen mensen die willekeurig een mok kregen ongeveer twee keer zoveel om deze te verkopen als anderen bereid zijn te betalen om deze te kopen. Het simpele feit van bezit verhoogt de waargenomen waarde. Dit is gerelateerd aan verliesaversie — iets opgeven voelt als een verlies, en we zijn verliesavers. Maar het effect gaat verder dan dat: we nemen bezittingen op in onze identiteit.

      Het bezitsdrang effect beïnvloedt onderhandelingen, consumentengedrag en organisatorische verandering. Het verklaart waarom mensen hun huizen, hun ideeën en hun huidige rollen overwaarderen. Het creëert wrijving in handel en overgangen.
    why_this_is_important: |
      Het herkennen van het bezitsdrang effect helpt je effectiever te onderhandelen, duidelijkere beslissingen te nemen over wat je wilt behouden of loslaten, en te begrijpen waarom anderen overwaarderen wat ze hebben. Het verklaart ook weerstand tegen verandering.
    when_to_use:
      - besluitvorming
      - onderhandeling
      - beleggen
      - carrièrestappen
    how_can_you_spot_it:
      ownership_premium: |
        "Dat verkoop ik niet" wanneer je dat niet zou betalen om het te kopen.
      attachment_to_possession: |
        Dingen meer waarderen zodra we ze hebben.
      resistance_to_trading: |
        Onwil om te ruilen of uit te wisselen, zelfs wanneer het rationeel zou zijn.
      overvaluation_of_own_ideas: |
        Onze ideeën, projecten of rollen voelen waardevoller omdat ze van ons zijn.
    examples:
      real_estate: |
        Huiseigenaren prijzen hun huizen vaak te hoog — ze waarderen ze meer dan
        de markt dat doet.
      negotiations: |
        Verkopers eisen meer dan kopers willen betalen; het verschil weerspiegelt
        het bezitsdrang effect.
      career: |
        Het overwaarderen van onze huidige baan, bedrijf of rol bij het overwegen
        van een verandering.
      ideas: |
        "Niet hier uitgevonden" en "mijn idee" bias — we overwaarderen wat we hebben
        gecreëerd of bezitten.
    real_world_implications: |
      Het bezitsdrang effect creëert markt wrijving, vertraagt gunstige uitwisselingen en voedt weerstand tegen verandering. Het beïnvloedt fusies, reorganisaties en persoonlijke overgangen. Begrip ervan verbetert onderhandelingen en verandermanagement.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand weerstand biedt aan verandering, overweeg dan dat ze het
        bezitsdrang effect kunnen ervaren — ze waarderen de status quo meer omdat ze deze "bezitten". Kader verandering in termen van wat ze winnen, niet alleen wat ze opgeven.
      collaborative_learning_initiative: |
        Bij het introduceren van nieuwe processen, erken dat mensen gehecht zijn
        aan huidige werkwijzen. Creëer psychologische veiligheid om het
        oude "los te laten" voordat het nieuwe omarmd wordt.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Enige gehechtheid is rationeel — sentimentele waarde, overstapkosten.
        Niet alle weerstand is het bezitsdrang effect.
      manipulation: |
        Het creëren van een valse eigendomsgevoel om hogere prijzen te verkrijgen (bijv.
        "probeer het gratis" om bezit te activeren).
      undervaluing_continuity: |
        Aannemen dat alle weerstand tegen verandering irrationeel is, terwijl continuïteit
        echte waarde heeft.
      cold_rationality: |
        Emotionele gehechtheid afwijzen als "gewoon bezitsdrang effect" wanneer
        het echte waarden weerspiegelt.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Het vals-consensus-effect
    quick_introduction: |
      Het vals-consensus-effect is de neiging om te overschatten hoeveel anderen het eens zijn met
      onze overtuigingen, houdingen en gedragingen. We gaan ervan uit dat onze standpunten gebruikelijker zijn dan ze zijn, en we hebben moeite om ons voor te stellen dat redelijke mensen het oneens kunnen zijn.
    one_liner: We overschatten hoeveel anderen het met ons eens zijn.
    try_this:
      - Zoek actief naar mensen die het oneens zijn — ga niet uit van consensus.
      - Test, voordat je begint, met mensen die jouw aannames niet delen.
      - Vraag: Wat zou iemand die het oneens is zeggen? Neem het serieus.
    ask_yourself:
      - Ga ik ervan uit dat anderen net zo denken als ik?
      - Wanneer werd ik voor het laatst verrast door iemands andere visie?
    in_more_detail: |
      Wanneer we een standpunt innemen, zijn we geneigd te denken dat dit de norm is. We omringen ons met
      gelijkgestemde mensen, consumeren bevestigende media en interpreteren dubbelzinnige feedback als
      instemming. Dit creëert een echokamer die de illusie van consensus versterkt.

      Het effect is sterker voor diepgewortelde overtuigingen en wanneer we sterk betrokken zijn bij ons
      standpunt. Het kan leiden tot verrassing wanneer anderen het oneens zijn, moeilijkheden bij onderhandelingen
      en slechte marktonderzoek wanneer we aannemen dat klanten net zo denken als wij.
    why_this_is_important: |
      Erkenning van het vals-consensus-effect helpt je je voor te bereiden op echte meningsverschillen,
      beter onderzoek te doen en effectiever te communiceren. Het is essentieel voor
      productontwikkeling, onderhandelingen en leiderschap.
    when_to_use:
      - besluitvorming
      - onderhandeling
      - leiderschap
      - probleemoplossing
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Je bent oprecht geschokt wanneer iemand het oneens is met wat jij als vanzelfsprekend beschouwt.
      assuming_shared_values: |
        Je gedraagt je alsof anderen jouw prioriteiten delen zonder dit te controleren.
      underestimating_opposition: |
        Je verwacht dat voorstellen op minder weerstand zullen stuiten dan ze doen.
      echo_chamber_detection: |
        Je sociale en informatieve omgeving daagt je standpunten zelden uit.
    examples:
      product_development: |
        Een team gaat ervan uit dat gebruikers functie X willen omdat iedereen in het team het wil — om er
        vervolgens achter te komen dat de adoptie laag is.
      politics: |
        Mensen in een politieke bubbel zijn verrast door verkiezingsuitslagen die niet overeenkomen met
        hun verwachtingen.
      negotiation: |
        Aannemen dat de andere partij akkoord zal gaan met de voorwaarden omdat deze voor jou "redelijk" lijken.
      hiring: |
        Hiring op basis van "culturele fit" kan betekenen dat je mensen aanneemt die het met je eens zijn, wat
        vals-consensus versterkt.
    real_world_implications: |
      Het vals-consensus-effect draagt bij aan polarisatie, mislukte productlanceringen
      en gebroken onderhandelingen. Het maakt ons overmoedig in onze voorspellingen en
      onder voorbereid op afwijkende meningen.
    professional_application:
      networking_and_relationship_building: |
        Zoek actief naar mensen met verschillende perspectieven. Ga er niet van uit dat er gedeelde overtuigingen zijn —
        vraag en luister.
      collaborative_learning_initiative: |
        Gebruik in teams gestructureerde afwijkende meningen (bijv. "premortems", advocaat van de duivel) om
        meningsverschillen te signaleren voordat ze kostbaar worden.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Aannemen dat degenen die het oneens zijn onredelijk of onwetend zijn, in plaats van te overwegen
        dat ze geldige verschillende perspectieven kunnen hebben.
      poor_research: |
        Het overslaan van klantonderzoek omdat "we al weten wat ze willen."
      overconfidence: |
        Het maken van gedurfde gokken op basis van de aanname dat anderen het ermee eens zullen zijn.
      groupthink_amplification: |
        Teams die het vals-consensus-effect niet uitdagen, kunnen in groepsdenken vervallen.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Framing Effect
    quick_introduction: |
      Het framing-effect is de neiging van onze beslissingen om te veranderen op basis van hoe opties worden gepresenteerd—zelfs wanneer de onderliggende feiten identiek zijn. "90% overleving" en "10% sterfte" beschrijven hetzelfde resultaat, maar roepen verschillende keuzes op. Het frame bepaalt de beslissing.
    one_liner: Dezelfde feiten, anders geframed, leiden tot verschillende beslissingen.
    try_this:
      - Frame opties op meerdere manieren voordat je beslist—gain frame en loss frame.
      - Merk op wanneer je keuze verschuift op basis van hoe iets is verwoord.
      - Vraag: Wat zijn de onderliggende feiten, ontdaan van het frame?
    ask_yourself:
      - Zou ik anders beslissen als dit werd geframed als een winst versus een verlies?
      - Reageer ik op het frame of op de werkelijke uitkomst?
    in_more_detail: |
      Kahneman en Tversky lieten zien dat mensen risicomijdend zijn wanneer opties worden geframed als winsten en risicozoekend wanneer ze worden geframed als verliezen—zelfs voor dezelfde uitkomsten. Positieve framing ("red 200 levens") versus negatieve framing ("400 zullen sterven") verandert voorkeuren. Loss frames roepen sterkere emotionele reacties op dan equivalente gain frames.

      Het framing-effect beïnvloedt medische beslissingen, beleid, marketing en onderhandelingen. Het is een van de krachtigste en best gedocumenteerde biases. Bewustzijn helpt, maar het is moeilijk volledig te overwinnen.
    why_this_is_important: |
      Het herkennen van het framing-effect helpt je om consistentere beslissingen te nemen, manipulatie te weerstaan en effectiever te communiceren. Het verklaart ook waarom hetzelfde aanbod kan worden geaccepteerd of afgewezen, afhankelijk van de presentatie.
    when_to_use:
      - besluitvorming
      - onderhandelen
      - leiderschap
      - risicobeoordeling
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Hetzelfde resultaat geframed als winst versus verlies leidt tot verschillende keuzes.
      presentation_dependence: |
        Beslissingen verschuiven wanneer alleen de framing verandert, niet de inhoud.
      default_influence: |
        Hoe opties worden geordend of gelabeld, beïnvloedt keuzes.
      emotional_trigger: |
        Bepaalde frames roepen sterkere emotionele reacties op.
    examples:
      medical: |
        "90% overleving" versus "10% sterfte" voor dezelfde procedure—
        mensen kiezen anders op basis van het frame.
      sales: |
        "Bespaar $50" versus "Verlies geen $50"—equivalente frames, verschillende
        psychologische impact.
      policy: |
        "Belastingverlaging" versus "overheidsuitgaven"—hetzelfde beleid, verschillende
        politieke reactie.
      negotiation: |
        Het presenteren van een aanbod als een "korting" versus "het vermijden van een toeslag"
        verandert de acceptatiepercentages.
    real_world_implications: |
      Het framing-effect wordt uitgebuit in reclame, politiek en
      onderhandelingen. Het beïnvloedt medische beslissingen en steun voor beleid.
      Hertooien kan beslissingen en communicatie verbeteren. Bewustzijn
      helpt, maar elimineert het effect niet volledig.
    professional_application:
      networking_and_relationship_building: |
        Wanneer je opties presenteert, overweeg dan meerdere frames. Test hoe
        verschillende framingen de ontvangst beïnvloeden. Wanneer je informatie ontvangt,
        vraag: "Hoe anders zou dit geframed kunnen worden?"
      collaborative_learning_initiative: |
        Bij het nemen van beslissingen, frame opties expliciet om te controleren op
        framing-effecten. "Als we dit als een verlies zouden framen, zouden we dan
        anders beslissen?" Gebruik consistente framing voor eerlijkheid.
    how_can_this_be_misapplied:
      manipulation: |
        Opzettelijk framen om mensen te sturen naar gewenste uitkomsten
        zonder hun medeweten.
      false_equivalence: |
        Aannemen dat alle framingen even geldig zijn, terwijl sommige
        belangrijke informatie verdoezelen.
      overcorrection: |
        Framing volledig negeren en aannemen dat het er niet toe doet—
        het doet er wel toe.
      spin: |
        Framing gebruiken om te misleiden in plaats van om te verduidelijken.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Fundamentele attributiefout
    quick_introduction: |
      De fundamentele attributiefout is de neiging om het gedrag van anderen toe te schrijven
      aan hun karakter of persoonlijkheid, terwijl we ons eigen gedrag toeschrijven aan
      situationele factoren. We beoordelen anderen op basis van hun acties en onszelf op basis van onze
      intenties.
    one_liner: We beoordelen anderen op hun daden, onszelf op onze intenties.
    try_this:
      - Als iemand je frustreert, vraag jezelf dan af: Welke situationele factoren kunnen dit verklaren?
      - Pas dezelfde mildheid toe op anderen die je op jezelf toepast.
      - Merk op wanneer je het gedrag van anderen toeschrijft aan karakter, niet aan omstandigheden.
    ask_yourself:
      - Zou ik mijn eigen gedrag op dezelfde manier verklaren als ik dat van hen doe?
      - Wat zou ik kunnen missen over hun situatie?
    in_more_detail: |
      Wanneer iemand ons afsnijdt in het verkeer, denken we "wat een klootzak." Als wij iemand afsnijden,
      denken we "ik moest wel—ik had haast." We verklaren onze eigen mislukkingen door
      omstandigheden ("het verkeer was vreselijk") en de mislukkingen van anderen door onze aard ("ze zijn lui").
      Het omgekeerde geldt voor succes: we schrijven onszelf de credits toe, we schrijven het succes van anderen toe aan geluk.

      De fout is "fundamenteel" omdat deze wijdverbreid en persistent is. Het
      ondermijnt empathie, voedt conflicten en vervormt prestatiebeoordelingen.
    why_this_is_important: |
      Het herkennen van de fundamentele attributiefout verbetert relaties,
      vermindert conflicten en leidt tot eerlijkere oordelen. Het moedigt aan om de
      context te overwegen voordat we concluderen dat iemand op een bepaalde manier "is".
    when_to_use:
      - relatie_opbouwen
      - conflict_oplossen
      - leiderschap
      - besluitvorming
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "Dat is gewoon het soort persoon dat hij/zij is" bij het verklaren van het gedrag van anderen.
      situational_explanation_for_self: |
        "Ik had geen keus" of "De omstandigheden dwongen me" bij het verklaren van ons eigen gedrag.
      character_vs_context: |
        Aannemen van karakter wanneer de situatie het gedrag zou kunnen verklaren.
      asymmetric_standards: |
        Anderen strengere normen opleggen dan onszelf.
    examples:
      traffic: |
        Fout van een andere automobilist = "slechte chauffeur." Onze fout = "onvermijdelijke situatie."
      workplace: |
        Een gemiste deadline van een collega = "onverantwoordelijk." Onze gemiste deadline =
        "overbelast en niemand had het beter kunnen doen."
      politics: |
        Standpunten van tegenstanders = "ze zijn dom of kwaadaardig." Onze standpunten = "rationele reactie
        op de feiten."
      performance: |
        Succes van anderen = "geluk." Ons succes = "verdiend door hard werken."
    real_world_implications: |
      De fundamentele attributiefout voedt conflicten, ondermijnt teamwork en
      vervormt werving en prestatiebeoordeling. Het corrigeren hiervan verbetert de
      organisatiecultuur en persoonlijke relaties.
    professional_application:
      networking_and_relationship_building: |
        Als iemand je teleurstelt, vraag je dan af: "Welke situationele factoren kunnen dit verklaren?"
        voordat je concludeert dat diegene onbetrouwbaar of moeilijk is.
      collaborative_learning_initiative: |
        Stimuleer bij feedback en beoordelingen interpretaties die uitgaan van de "situatie eerst".
        Train managers om de context te overwegen voordat ze aan karakter toeschrijven.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Elke actie afdoen als "situationeel" wanneer gedrag wel degelijk karakter weerspiegelt.
      no_accountability: |
        De fout gebruiken om mensen niet verantwoordelijk te houden voor keuzes die ze wel hebben gemaakt.
      self_deprecation: |
        Overcorrectie om altijd jezelf de schuld te geven en nooit de verantwoordelijkheid van anderen te erkennen.
      ignoring_patterns: |
        Wanneer iemand zich herhaaldelijk slecht gedraagt in verschillende situaties, kan de aard relevant zijn.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Gambler's Fallacy
    quick_introduction: |
      The gambler's fallacy is the mistaken belief that past independent events
      affect future ones. After a run of heads, we think tails is "due"—even
      though each flip is independent. We see patterns in randomness and
      expect "correction" or "reversion" when none is required.
    one_liner: Past independent events don't affect future ones—the coin has no memory.
    try_this:
      - When you think "I'm due for a win," ask: Are these events actually independent?
      - Distinguish regression to the mean (real) from gambler's fallacy (false).
      - Notice when you're seeing patterns in randomness.
    ask_yourself:
      - Am I assuming past outcomes affect future ones when they're independent?
      - Would a statistician agree with my "due for a change" reasoning?
    in_more_detail: |
      In a fair coin flip, each flip is independent. The probability of heads
      is always 50%, regardless of past outcomes. But we feel that a long run
      of one outcome makes the other more likely. We confuse the law of large
      numbers (over many trials, outcomes average out) with short-run
      "correction." The casino has no memory.

      The fallacy affects gambling, investing, and everyday decision-making.
      We assume that "luck" will balance out or that we're "due" for a win.
      Sometimes we're right—but for the wrong reasons.
    why_this_is_important: |
      Recognizing the gambler's fallacy prevents costly mistakes in gambling
      and investing. It also helps you avoid overinterpreting short runs
      and expecting false reversion. It distinguishes genuine regression
      to the mean from the fallacy.
    when_to_use:
      - decision-making
      - investing
      - risk_assessment
      - problem_solving
    how_can_you_spot_it:
      due_for_a_change: |
        "We've had so many losses—we're due for a win."
      pattern_in_randomness: |
        Seeing meaningful patterns in random sequences.
      hot_hand_fallacy: |
        Believing a streak will continue (related but opposite error).
      independence_ignorance: |
        Treating independent events as if they're connected.
    examples:
      gambling: |
        After several reds on roulette, betting on black because "red can't
        keep coming."
      investing: |
        "The market has been down—it has to go up."
      hiring: |
        "We've hired several bad candidates—the next one is bound to be good."
      sports: |
        "He's missed so many—he's due to make the next shot."
    real_world_implications: |
      The gambler's fallacy causes gambling losses and poor investment
      decisions. It also explains why we overinterpret short-term patterns.
      Distinguishing it from genuine regression to the mean (where there
      is a real mean to regress to) is important.
    professional_application:
      networking_and_relationship_building: |
        Don't assume that past relationship dynamics will "correct" in the
        future—each interaction is somewhat independent. But do learn from
        patterns when there's a real underlying cause.
      collaborative_learning_initiative: |
        When evaluating performance, distinguish random variation from
        systematic change. Short runs can be noise; don't overreact to
        "streaks" or expect false reversion.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Sometimes regression to the mean is real (e.g., skill performance).
        Don't dismiss all reversion as gambler's fallacy.
      false_independence: |
        Assuming events are independent when they're not (e.g., repeated
        measurements of the same thing).
      overcorrection: |
        Never expecting reversion when there is a real mean to regress to.
      dismissing_patterns: |
        Some patterns are real—not all sequence is random.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Groepsdenken
    quick_introduction: |
      Groepsdenken is de neiging van hechte groepen om consensus en harmonie te prioriteren boven kritische evaluatie. Leden onderdrukken afwijkende meningen, censureren zichzelf en conformeren zich aan de waargenomen groepsopvatting. Het verlangen naar unanimiteit overschaduwt het verlangen naar de beste beslissing.
    one_liner: Harmonie boven waarheid - groepen geven prioriteit aan consensus boven kritische evaluatie.
    try_this:
      - Wijs een advocaat van de duivel aan; maak afwijking verwacht en veilig.
      - Vraag: Wat zeggen we niet? Wat zouden we zeggen als we niet in deze groep zaten?
      - Zoek externe perspectieven voordat groepsbeslissingen definitief worden.
    ask_yourself:
      - Censureer ik mezelf om harmonie te bewaren?
      - Is onze consensus oprecht of het resultaat van druk om akkoord te gaan?
    in_more_detail: |
      Irving Janis bestudeerde mislukkingen op het gebied van buitenlands beleid (Bay of Pigs, Vietnam) en identificeerde patronen: illusie van onaantastbaarheid, collectieve rationalisatie, druk tot conformiteit, zelfcensuur, illusie van unanimiteit en "mindguards" die de groep beschermen tegen afwijkende informatie. Hoge cohesie, isolatie en stress verhogen groepsdenken.

      Groepsdenken leidt tot slechte beslissingen omdat alternatieven niet serieus worden overwogen. Afwijking wordt gezien als ontrouw. De groep overschat zijn eigen gelijk en onderschat risico's.
    why_this_is_important: |
      Het herkennen van groepsdenken helpt u bij het creëren van omstandigheden voor betere besluitvorming: stimuleer afwijking, breng externe perspectieven in en vermijd voortijdige consensus. Het is essentieel om catastrofale groepsfouten te voorkomen.
    when_to_use:
      - leiderschap
      - besluitvorming
      - probleemoplossing
      - conflictbeheersing
    how_can_you_spot_it:
      pressure_for_consensus: |
        Afwijkende meningen worden ontmoedigd of bestraft; instemming wordt beloond.
      illusion_of_unanimity: |
        Stilte wordt geïnterpreteerd als instemming, terwijl het zelfcensuur kan zijn.
      collective_rationalization: |
        De groep wuift waarschuwingen weg en versterkt zijn eigen opvatting.
      mindguards: |
        Leden beschermen de groep tegen informatie die de consensus zou uitdagen.
    examples:
      bay_of_pigs: |
        Kennedy's adviseurs onderdrukten twijfels over het invasieplan; het resultaat was een ramp.
      corporate_decisions: |
        Een leidinggevend team gaat door met een fusie ondanks rode vlaggen, omdat niemand de "nee-zegger" wil zijn.
      product_launches: |
        Een team brengt een gebrekkig product uit omdat iedereen geïnvesteerd is in het plan en niemand zorgen uit.
      boards: |
        Bestuursleden stempelen managementvoorstellen goed om de harmonie te bewaren.
    real_world_implications: |
      Groepsdenken draagt bij aan beleidsfouten, bedrijfsrampen en gemiste kansen. Het is bijzonder gevaarlijk in situaties met hoge inzetten en hoge stress. Het voorkomen ervan vereist doelbewuste structurele interventies.
    professional_application:
      networking_and_relationship_building: |
        Creëer psychologische veiligheid voor afwijkende meningen. Bedank mensen die zorgen uiten. Modelleren hoe u het oneens kunt zijn zonder onaangenaam te zijn.
      collaborative_learning_initiative: |
        Gebruik een advocaat van de duivel, rode teams en "premortems". Vereis dat iemand tegen de heersende opvatting pleit. Breng externe perspectieven in. De leider spreekt als laatste om ankeren te voorkomen.
    how_can_this_be_misapplied:
      false_dissent: |
        Het creëren van "aangewezen afwijkende meners" die niet echt oneens zijn - de groep doorziet het.
      excessive_conflict: |
        Het aanmoedigen van afwijking tot het punt van destructieve conflicten en verlamming.
      dismissing_consensus: |
        Aannemen dat alle consensus groepsdenken is - soms heeft de groep gelijk.
      individualism: |
        Overcorrectie tot het punt waarop geen collectieve beslissing mogelijk is.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Halo-effect
    quick_introduction: |
      Het halo-effect is de neiging om één positieve eigenschap of indruk
      ons algehele oordeel over een persoon te laten beïnvloeden. Als we iemand's
      uiterlijk aardig vinden, gaan we ervan uit dat ze bekwaam zijn. Als we één vaardigheid bewonderen,
      gaan we ervan uit dat ze goed zijn in alles. Eén positieve eigenschap werpt een
      "halo" over de rest.
    one_liner: Eén positieve eigenschap werpt een halo over ons hele oordeel over een persoon.
    try_this:
      - Evalueer eigenschappen onafhankelijk – laat één sterkte niet impliciet andere impliceren.
      - Merk op wanneer aantrekkelijkheid, charisma of één succes je kijk kleurt.
      - Vraag: Zou ik deze persoon hetzelfde beoordelen zonder die ene positieve eigenschap?
    ask_yourself:
      - Generaliseer ik van één eigenschap naar de hele persoon?
      - Zou ik zwaktes zien als ik niet onder de indruk was van één sterkte?
    in_more_detail: |
      Edward Thorndike observeerde dat militaire officieren die soldaten
      hoog beoordeelden op één eigenschap, ze ook hoog beoordeelden op andere – zelfs niet-gerelateerde eigenschappen.
      We generaliseren van het bijzondere naar het geheel. Aantrekkelijkheid,
      charisma of succes op één gebied creëren een halo die overslaat.

      Het omgekeerde – één negatieve eigenschap die alles kleurt – wordt soms het
      "hoorntjeseffect" genoemd. Beide zijn vormen van ongerechtvaardigde generalisatie. Het
      halo-effect beïnvloedt werving, prestatiebeoordelingen en alledaagse
      indrukken.
    why_this_is_important: |
      Het herkennen van het halo-effect helpt je om nauwkeurigere evaluaties te maken
      en overgeneralisatie te vermijden. Het is essentieel voor eerlijke werving, prestatiebeheer
      en beoordeling van relaties. Eén sterkte impliceert niet alle sterkten.
    when_to_use:
      - besluitvorming
      - leiderschap
      - relatieopbouw
      - werving
    how_can_you_spot_it:
      trait_spillover: |
        Eén positieve eigenschap beïnvloedt het oordeel over niet-gerelateerde eigenschappen.
      attractiveness_bias: |
        Aantrekkelijke mensen worden hoger beoordeeld op bekwaamheid, betrouwbaarheid, enz.
      success_generalization: |
        Succes op één gebied leidt tot veronderstelde bekwaamheid op andere gebieden.
      first_impression_dominance: |
        Vroege positieve indruk kleurt alle daaropvolgende evaluatie.
    examples:
      hiring: |
        Een kandidaat die welbespraakt en sympathiek is, wordt verondersteld
        technisch sterk te zijn – zelfs als de vaardigheden niet gerelateerd zijn.
      performance_reviews: |
        Eén opvallend project leidt tot hoge beoordelingen op alle dimensies.
      politics: |
        Het charisma van een politicus leidt tot veronderstelde bekwaamheid op beleid.
      branding: |
        Het succes van een bedrijf op één product leidt tot veronderstelde kwaliteit
        van alle producten.
    real_world_implications: |
      Het halo-effect vervormt wervings-, prestatiebeoordelings- en
      investeringsbeslissingen. Het bevoordeelt de aantrekkelijke, welbespraakte en
      reeds succesvolle. Het verminderen ervan vereist gestructureerde evaluatie
      en scheiding van dimensies.
    professional_application:
      networking_and_relationship_building: |
        Evalueer mensen op specifieke dimensies in plaats van op algehele
        indruk. Wees je bewust wanneer één positieve eigenschap je
        oordeel over anderen beïnvloedt. Zoek ontkrachtend bewijs.
      collaborative_learning_initiative: |
        Gebruik gestructureerde interviews en evaluaties die dimensies
        onafhankelijk beoordelen. Kalibreer beoordelingen tussen beoordelaars. Verminder
        afhankelijkheid van een algeheel "onderbuikgevoel".
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Niet elke positieve indruk is een halo – soms zijn mensen
        echt sterk over alle dimensies.
      false_objectivity: |
        Aannemen dat we het halo-effect volledig kunnen elimineren – het is
        alomtegenwoordig en deels automatisch.
      overcorrection: |
        Naar het tegenovergestelde uiterste gaan en aannemen dat aantrekkelijke of
        charismatische mensen minder bekwaam zijn.
      stereotyping: |
        Het "halo-effect" gebruiken om legitieme positieve eigenschappen af te wijzen.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Hante's Scheermes
    quick_introduction: |
      Hante's Scheermes stelt: "Schrijf nooit toe aan kwaadwilligheid wat adequaat verklaard kan worden
      door domheid." Met andere woorden, ga er niet uit van slechte intenties wanneer incompetentie, nalatigheid,
      of onwetendheid het gedrag kan verklaren.
    one_liner: Ga niet uit van kwaad wanneer incompetentie of nalatigheid het kan verklaren.
    try_this:
      - Wanneer iemand je frustreert, vraag jezelf af: Kan dit verklaard worden door een fout of onwetendheid?
      - Kies standaard voor de eenvoudigere verklaring voordat je kwade opzet aanneemt.
      - Merk op wanneer je springt naar "ze wilden me pijn doen."
    ask_yourself:
      - Schrijf ik toe aan kwaadwilligheid wat verklaard kan worden door domheid?
      - Zou ik dezelfde welwillendheid in hun schoenen willen hebben?
    in_more_detail: |
      Het principe moedigt aan om mensen het voordeel van de twijfel te geven. Wanneer iemands acties
      je schaden of frustreren, is de standaard aanname vaak dat ze je wilden schaden.
      Hante's Scheermes suggereert dat veel van dergelijke acties voortkomen uit onzorgvuldigheid, gebrek aan
      informatie, of slechte uitvoering – niet uit kwade wil.

      Dit betekent niet dat kwaadwilligheid nooit bestaat. Het betekent dat we niet naar de ergste
      interpretatie moeten springen wanneer een eenvoudigere past. Het scheermes vermindert paranoia, verbetert
      relaties, en helpt ons constructiever te reageren op problemen.
    why_this_is_important: |
      Het toepassen van Hante's Scheermes vermindert conflicten, behoudt relaties en focust
      energie op het oplossen van problemen in plaats van het toewijzen van schuld. Het beschermt je ook tegen
      de stress van de aanname dat iedereen het op je gemunt heeft.
    when_to_use:
      - conflictoplossing
      - leiderschap
      - relatie_opbouw
      - besluitvorming
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Je interpreteert onmiddellijk een negatieve uitkomst als opzettelijke schade.
      personalizing_mistakes: |
        Wanneer er iets misgaat, neem je aan dat het persoonlijk op jou gericht was.
      ignoring_alternative_explanations: |
        Je overweegt incompetentie, miscommunicatie, of nalatigheid niet als mogelijkheden.
      escalation_before_inquiry: |
        Je reageert met woede of vergelding voordat je vraagt wat er gebeurd is.
    examples:
      email_tone: |
        Aannemen dat een kortaf e-mail passief-agressief is, terwijl de afzender misschien gewoon gehaast is
        of slecht is in toon.
      missed_deadline: |
        Het interpreteren van de late levering van een collega als sabotage, terwijl ze misschien
        overbelast waren of obstakels zijn tegengekomen.
      policy_decisions: |
        Aannemen dat een bedrijfsbeleid dat je niet bevalt, is ontworpen om werknemers te schaden, terwijl het misschien
        een onhandige poging is om een ander probleem aan te pakken.
      traffic: |
        Aannemen dat een andere bestuurder je opzettelijk afsneed, terwijl ze je misschien niet zagen.
    real_world_implications: |
      Hante's Scheermes verbetert de werkplekcultuur, vermindert rechtszaken en maakt conflictoplossing
      effectiever. Overmatig gebruik kan nalatigheid mogelijk maken; ondermatig gebruik creëert
      onnodige conflicten.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand je teleurstelt, vraag om opheldering voordat je kwaadwilligheid aanneemt.
        Behoud relaties door standaard uit te gaan van welwillende interpretaties.
      collaborative_learning_initiative: |
        Creëer in teams een cultuur waarin fouten als onopzettelijk worden beschouwd totdat
        het tegendeel is bewezen. Focus op systemen en processen in plaats van op schuld.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Herhaalde incompetentie of onzorgvuldigheid afdoen als "geen kwaadwilligheid" wanneer het
        verantwoording vereist.
      ignoring_genuine_malice: |
        Het scheermes zo rigide toepassen dat je echte slechte actoren of toxisch gedrag mist.
      avoiding_difficult_conversations: |
        Hante's Scheermes gebruiken als excuus om prestatieproblemen niet aan te pakken.
      gaslighting_victims: |
        Tegen iemand die oprecht onrecht is aangedaan, zeggen dat ze "kwaadwilligheid aannemen" wanneer
        kwaadwilligheid aanwezig was.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Hawthorne-effect
    quick_introduction: |
      Het Hawthorne-effect is de neiging van mensen om hun gedrag aan te passen
      wanneer ze weten dat ze worden geobserveerd of bestudeerd. De daad van observatie
      zelf kan de verandering veroorzaken—niet noodzakelijk de interventie die
      wordt getest. Mensen reageren op de aandacht die ze ontvangen.
    one_liner: Geobserveerd worden verandert gedrag—de aandacht zelf kan het effect produceren.
    try_this:
      - Overweeg bij het evalueren van een interventie of observatie de resultaten stuurt.
      - Erken dat aandacht en het gevoel gewaardeerd te worden de prestaties kunnen verbeteren.
      - Wees voorzichtig met het toeschrijven van veranderingen aan een specifieke interventie wanneer de observatie veranderd is.
    ask_yourself:
      - Komt deze verbetering van de interventie of van het geobserveerd worden?
      - Zullen de resultaten aanhouden als we stoppen met aandacht schenken?
    in_more_detail: |
      In de fabriek Hawthorne Works ontdekten onderzoekers dat de productiviteit
      verbeterde toen ze de verlichting veranderden—en ook toen ze deze terug veranderden.
      De verbetering leek te komen van de aandacht en observatie, niet
      van de specifieke interventie. Latere heranalyse suggereerde dat het effect mogelijk
      was overdreven, maar het concept blijft nuttig: bestudeerd worden
      verandert gedrag.

      Het Hawthorne-effect compliceert onderzoek en evaluatie. Het kan
      de schijnbare impact van interventies opblazen. Het suggereert ook dat
      aandacht en het gevoel gewaardeerd te worden de prestaties kunnen verbeteren—een les voor
      management.
    why_this_is_important: |
      Het begrijpen van het Hawthorne-effect helpt u bij het interpreteren van onderzoeksresultaten,
      het ontwerpen van betere experimenten en het erkennen dat aandacht
      op zichzelf verandering kan veroorzaken. In management suggereert het dat het schenken van
      aandacht aan mensen net zo belangrijk kan zijn als de specifieke interventie.
    when_to_use:
      - leiderschap
      - besluitvorming
      - leren
      - probleemoplossing
    how_can_you_spot_it:
      observation_induced_change: |
        Gedrag verandert wanneer mensen weten dat ze worden bekeken of bestudeerd.
      attention_effect: |
        De daad van aandacht schenken produceert verbetering, niet alleen de
        specifieke verandering.
      placebo_analog: |
        Net als een placebo kan de "behandeling" van bestudeerd worden effecten hebben.
      short_term_improvement: |
        Verbeteringen kunnen vervagen wanneer de observatie eindigt.
    examples:
      workplace_studies: |
        Productiviteit neemt toe tijdens een studie—komt het door het nieuwe proces of
        het feit dat iemand toekijkt?
      medical_trials: |
        Placebogroepen verbeteren—deels omdat ze aandacht krijgen.
      education: |
        Studenten presteren beter wanneer onderzoekers aanwezig zijn—het
        "observatie-effect".
      management: |
        Teams verbeteren wanneer management aandacht schenkt—komt het door het nieuwe
        initiatief of de aandacht zelf?
    real_world_implications: |
      Het Hawthorne-effect heeft invloed op de validiteit van onderzoek en de evaluatie van programma's.
      Het kan leiden tot een overschatting van de effecten van interventies.
      Het heeft ook een positieve les: aandacht en het gevoel bestudeerd te worden
      kunnen verbetering motiveren—dus zorg en zichtbaarheid zijn belangrijk.
    professional_application:
      networking_and_relationship_building: |
        Aandacht schenken aan mensen kan hun prestaties verbeteren—
        het Hawthorne-effect suggereert dat het gevoel geobserveerd en
        gewaardeerd te worden belangrijk is. Gebruik dit positief: regelmatige check-ins,
        zichtbaarheid en erkenning.
      collaborative_learning_initiative: |
        Bij het evalueren van interventies, gebruik controlegroepen en
        overweeg of verbeteringen te wijten zijn aan de interventie
        of de aandacht die deze met zich meebrengt. Het Hawthorne-effect kan
        de schijnbare succescijfers opblazen.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Het gebruiken van het "Hawthorne-effect" om constante monitoring te rechtvaardigen—
        observatie kan ook vertrouwen en intrinsieke motivatie verminderen.
      dismissing_improvements: |
        Aannemen dat alle verbeteringen tijdens studies Hawthorne zijn—
        soms werken interventies echt.
      overgeneralization: |
        De oorspronkelijke Hawthorne-studies zijn in twijfel getrokken;
        het effect kan kleiner of anders zijn dan ooit gedacht.
      manipulation: |
        Het creëren van valse "observatie" om gedrag te manipuleren.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Achteraf-is-alles-makkelijk-bias
    quick_introduction: |
      De achteraf-is-alles-makkelijk-bias (of het "ik wist het al lang"-effect) is de neiging om te geloven,
      nadat een gebeurtenis heeft plaatsgevonden, dat we deze hadden kunnen voorspellen of verwachten. We
      reconstrueren het verleden om uitkomsten onvermijdelijker te laten lijken dan ze waren.
    one_liner: Achteraf denken we dat we het al die tijd al wisten.
    try_this:
      - Voordat je beslissingen uit het verleden beoordeelt, vraag: Wat wisten ze op dat moment?
      - Noteer je voorspellingen vóór de uitkomsten — vergelijk later.
      - Merk op wanneer je het verleden onvermijdelijker laat lijken dan het was.
    ask_yourself:
      - Beoordeel ik met informatie die toen niet beschikbaar was?
      - Heb ik dit echt voorspeld, of voelt het nu gewoon duidelijk aan?
    in_more_detail: |
      Zodra we de uitkomst kennen, voelt het vanzelfsprekend. We vergeten de onzekerheid die we van tevoren voelden. Deze bias vervormt leren — we denken dat we iets "wisten" terwijl dat niet zo was, dus werken we onze modellen niet bij. Het leidt ook tot oneerlijke schuld: "Ze hadden het moeten zien aankomen" terwijl de toekomst oprecht onzeker was.

      De achteraf-is-alles-makkelijk-bias beïnvloedt post-mortems, juridische oordelen en historische analyse.
      We beoordelen beslissingen uit het verleden met informatie die destijds niet beschikbaar was.
    why_this_is_important: |
      Het herkennen van de achteraf-is-alles-makkelijk-bias verbetert het leren van uitkomsten, eerlijkere evaluatie van beslissingen en nauwkeurigere risicobeoordeling. Het voorkomt vals vertrouwen in onze voorspellende vermogens.
    when_to_use:
      - besluitvorming
      - leren
      - risicobeoordeling
      - leiderschap
    how_can_you_spot_it:
      inevitability_feeling: |
        Na een gebeurtenis voelt het alsof het "moest" gebeuren.
      reconstructed_certainty: |
        We herinneren ons dat we zekerder waren voor de gebeurtenis dan we werkelijk waren.
      blame_for_failure: |
        "Ze hadden het moeten weten" wanneer de uitkomst oprecht onzeker was.
      undervaluing_luck: |
        Toeschrijven van uitkomsten aan vaardigheid of vooruitziendheid wanneer geluk een rol speelde.
    examples:
      investing: |
        "Ik wist dat de markt zou instorten" nadat deze instort — terwijl je van die "kennis" van tevoren geen gebruik maakte.
      project_failures: |
        "We hadden de risico's moeten zien" in een post-mortem wanneer de risico's oprecht ambigu waren.
      elections: |
        Na een verrassende uitslag leggen experts uit waarom het achteraf "vanzelfsprekend" was.
      medical: |
        "De tekenen waren er" bij het diagnosticeren van een zeldzame aandoening achteraf.
    real_world_implications: |
      De achteraf-is-alles-makkelijk-bias vervormt juridische aansprakelijkheid, prestatie-evaluatie en leren.
      Het maakt ons overmoedig in ons oordeel en oneerlijk tegenover degenen die redelijke beslissingen namen met beperkte informatie.
    professional_application:
      networking_and_relationship_building: |
        Bij het evalueren van beslissingen van anderen uit het verleden, scheid bewust wat toen bekend was van wat je nu weet. Vermijd "zie je wel" wanneer je de uitkomst niet echt voorspelde.
      collaborative_learning_initiative: |
        Gebruik in post-mortems "pre-mortem" of "beslissingsdagboek"-technieken om onzekerheid op het moment van de beslissing vast te leggen. Vergelijk werkelijke onzekerheid met achteraf-reconstructie.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Elke mislukking afdoen als "onvoorspelbaar" wanneer sommige voorzienbaar waren.
      no_accountability: |
        De achteraf-is-alles-makkelijk-bias gebruiken om mensen te ontslaan van aansprakelijkheid voor nalatigheid.
      false_uncertainty: |
        Overcorrigeren om te geloven dat we niets kunnen voorspellen.
      undermining_learning: |
        Lessen weigeren te trekken omdat "achteraf is het makkelijk te zeggen" — we kunnen nog steeds leren van uitkomsten.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Hyperbolische discontering
    quick_introduction: |
      Hyperbolische discontering is de neiging om kleinere, directere beloningen
      te verkiezen boven grotere, latere beloningen — en de toekomst steiler te
      verdisconteren dan rationele modellen voorspellen. We overschatten het heden
      en onderschatten de toekomst op inconsistente wijze.
    one_liner: We verkiezen kleiner en eerder boven groter en later — en verdisconteren de toekomst inconsistent.
    try_this:
      - Vooraf binden: Neem beslissingen voor je toekomstige zelf wanneer je rustig bent.
      - 'Herformuleren: "Zou ik dit over 10 minuten willen? Over 10 maanden?" om inconsistentie te onthullen.'
      - Gebruik commitment devices om je toekomstige zelf te binden aan betere keuzes.
    ask_yourself:
      - Overschat ik het heden ten koste van mijn toekomstige zelf?
      - Zou ik deze keuze maken als de beloning met een dag werd uitgesteld? Een jaar?
    in_more_detail: |
      We verkiezen misschien €50 vandaag boven €100 over een jaar, maar verkiezen
      ook €100 over twee jaar boven €50 over een jaar — ook al is dat inconsistent.
      Onze disconteringsvoet is niet constant; hij is hyperbolisch. De nabije
      toekomst wordt zwaar verdisconteerd; de verre toekomst wordt minder steil
      verdisconteerd. Dit verklaart procrastinatie, verslaving en te weinig sparen.

      Present bias (heden-voorkeur) is een gerelateerd concept: we geven het huidige
      moment een onevenredig groot gewicht. Hyperbolische discontering verklaart
      waarom we toezeggingen doen die we niet nakomen en waarom langetermijnplanning moeilijk is.
    why_this_is_important: |
      Het begrijpen van hyperbolische discontering helpt je betere
      incentives te ontwerpen, je toekomstige zelf te binden, en valkuilen
      op korte termijn te vermijden. Het verklaart waarom we uitstellen en
      waarom we worstelen met langetermijndoelen.
    when_to_use:
      - besluitvorming
      - loopbaan_ontwikkeling
      - beleggen
      - leiderschap
    how_can_you_spot_it:
      present_preference: |
        Kiezen voor onmiddellijke bevrediging boven uitgestelde, grotere beloningen.
      inconsistent_time_preferences: |
        Voorkeuren die omkeren naarmate de tijd verstrijkt (bijv. we willen morgen
        op dieet, maar eten vandaag).
      commitment_failures: |
        Plannen maken die we niet uitvoeren wanneer de toekomst het heden wordt.
      procrastination: |
        Belangrijke taken uitstellen ten gunste van onmiddellijk comfort.
    examples:
      savings: |
        Kiezen om nu uit te geven in plaats van te sparen voor pensioen — de toekomst
        voelt abstract.
      health: |
        Vandaag sporten overslaan voor comfort, ondanks dat we weten dat we er
        spijt van krijgen — de spijt van morgen wordt verdisconteerd.
      addiction: |
        De onmiddellijke roes verkiezen boven langetermijngezondheid.
      deadlines: |
        Niets doen tot de deadline nadert — dan omvat het "heden" de deadline en handelen we.
    real_world_implications: |
      Hyperbolische discontering beïnvloedt besparingen, gezondheid, onderwijs en
      verslaving. Het verklaart veel mislukkingen van zelfbeheersing. Commitment
      devices (bijv. automatische besparingen, verantwoordelijkheid) kunnen helpen
      door toekomstige keuzes te beperken.
    professional_application:
      networking_and_relationship_building: |
        Creëer bij het vragen om toekomstige toezeggingen verantwoordelijkheid die
        de toekomst "het heden" maakt (bijv. check-ins, deadlines). Ga er niet
        van uit dat mensen zonder structuur zullen nakomen.
      collaborative_learning_initiative: |
        Gebruik commitment devices: publieke toezeggingen, vooraf binden aan
        deadlines, en structuren die langetermijndoelen onmiddellijker laten
        voelen. Breek lange projecten op in kortere mijlpalen.
    how_can_this_be_misapplied:
      excessive_control: |
        Keuzes van mensen buitensporig beperken in de naam van het "helpen"
        van hun toekomstige zelf.
      paternalism: |
        Aannemen dat we weten wat het beste is voor de langetermijnbelangen van anderen.
      ignoring_present_needs: |
        Legitieme huidige behoeften afwijzen ten gunste van abstracte
        toekomstige voordelen.
      one_size_fits_all: |
        Mensen verschillen in disconteringsvoeten; niet iedereen heeft dezelfde
        commitment devices nodig.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Illusie van controle
    quick_introduction: |
      De illusie van controle is de neiging om ons vermogen om
      uitkomsten te beïnvloeden te overschatten. We geloven dat we meer controle hebben dan we werkelijk hebben—over
      willekeurige gebeurtenissen, andere mensen en complexe systemen. We verwarren correlatie
      met causaliteit en actie met impact.
    one_liner: We overschatten ons vermogen om uitkomsten te beïnvloeden—vooral willekeurige.
    try_this:
      - Vraag: Wat zou er gebeuren als ik niets deed? Veroorzaakt mijn actie werkelijk de uitkomst?
      - Onderscheid wat je kunt beheersen van wat je niet kunt beheersen.
      - Merk op wanneer je bijgelovig je acties koppelt aan willekeurige resultaten.
    ask_yourself:
      - Verwar ik correlatie met causaliteit?
      - Zou de uitkomst anders zijn geweest als ik niet had gehandeld?
    in_more_detail: |
      Mensen voelen zich zelfverzekerder over het winnen van een loterij wanneer ze
      hun eigen nummers kiezen—ook al verandert dit de winkansen niet. We gooien dobbelstenen
      harder als we hoge getallen willen. We denken dat onze rituelen of gedragingen
      uitkomsten beïnvloeden die eigenlijk willekeurig zijn of bepaald worden door factoren
      buiten onze invloed. De illusie is troostend; het vermindert angst. Maar het
      kan leiden tot overmoed en slechte beslissingen.

      De illusie is sterker wanneer we betrokken zijn bij het proces, wanneer
      we vroeg succes hebben en wanneer de taak bekend is. Het beïnvloedt
      beleggen, management en het dagelijks leven.
    why_this_is_important: |
      Het herkennen van de illusie van controle helpt je om je
      verwachtingen te kalibreren, overmoed te vermijden en je inspanningen te richten waar ze
      daadwerkelijk van belang zijn. Het verklaart ook waarom we vasthouden aan bijgelovige
      gedragingen en onze invloed overschatten.
    when_to_use:
      - besluitvorming
      - risicobeoordeling
      - beleggen
      - leiderschap
    how_can_you_spot_it:
      overestimated_influence: |
        Denken dat onze acties uitkomsten beïnvloeden wanneer dat niet zo is.
      ritual_superstition: |
        Gedragingen waarvan we denken dat ze resultaten beïnvloeden (geluksshirt, routine voor de wedstrijd) wanneer dat niet zo is.
      choice_illusion: |
        Het gevoel hebben dat kiezen ons controle geeft, terwijl de keuze
        de uitkomst niet beïnvloedt.
      action_bias: |
        Liever "iets doen" dan "wachten", zelfs wanneer actie
        niet helpt.
    examples:
      gambling: |
        Het kiezen van lotnummers voelt controleerbaarder dan
        willekeurige selectie—de winkansen zijn hetzelfde.
      investing: |
        Actieve handelaren overschatten hun vermogen om de
        markt te verslaan; de meesten presteren na kosten ondermaats.
      management: |
        Leiders overschatten hun impact op organisatorische
        uitkomsten; veel factoren zijn buiten hun controle.
      sports: |
        Fans geloven dat hun aanmoedigingen het spel beïnvloeden; spelers
        hebben gelukrituelen.
    real_world_implications: |
      De illusie van controle beïnvloedt risicobereidheid, aanhouding
      in nutteloze inspanningen en toeschrijving van uitkomsten. Het kan
      actie motiveren (soms nuttig), maar ook leiden tot
      verspilde moeite en overmoed. Kalibratie verbetert
      de kwaliteit van besluitvorming.
    professional_application:
      networking_and_relationship_building: |
        Erken wat je wel en niet kunt beheersen. Richt energie
        op beïnvloedbare factoren. Neem geen krediet voor
        uitkomsten die je niet hebt veroorzaakt—of geef geen schuld voor die die je
        niet kon voorkomen.
      collaborative_learning_initiative: |
        Maak in de planning onderscheid tussen beheersbare en onbeheersbare
        factoren. Vermijd valse zelfverzekerdheid door vroeg succes. Gebruik
        probabilistisch denken om verwachtingen te kalibreren.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Overcorrigeren naar het geloof dat we geen controle hebben, terwijl we
        wel degelijk betekenisvolle invloed hebben.
      dismissing_agency: |
        "Het is allemaal geluk" terwijl vaardigheid en inspanning in
        veel domeinen wel degelijk van belang zijn.
      false_fatalism: |
        De illusie van controle gebruiken om inactiviteit te rechtvaardigen.
      one_size_fits_all: |
        Controle varieert per domein; sommige situaties zijn meer
        beheersbaar dan andere.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Impact Bias
    quick_introduction: |
      De impactbias is de neiging om de intensiteit en duur van onze emotionele reacties op toekomstige gebeurtenissen te overschatten. We denken dat goede dingen ons gelukkiger zullen maken dan ze doen, en slechte dingen ons ellendiger dan ze doen. We zijn slecht in affectieve voorspellingen.
    one_liner: We overschatten hoeveel gebeurtenissen ons geluk beïnvloeden - en hoe lang.
    try_this:
      - Ask: Hoe voelde ik me na vergelijkbare gebeurtenissen uit het verleden? We passen ons sneller aan dan we verwachten.
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
      - Notice when you're overestimating the lasting effect of a single outcome.
    ask_yourself:
      - Ben ik aan het overschatten hoe lang ik me zo zal voelen?
      - Wat zegt de ervaring uit het verleden over vergelijkbare gebeurtenissen?
    in_more_detail: |
      Daniel Gilbert en Timothy Wilson onderzoeken affectieve voorspellingen: we
      overschatten hoe lang we ons goed zullen voelen na een overwinning of slecht na een verlies.
      We passen ons sneller aan dan we verwachten. We overschatten ook de impact van
      enkele gebeurtenissen - we denken dat één uitkomst ons geluk zal bepalen, terwijl
      vele factoren bijdragen. We focussen op de verkeerde dingen bij het voorspellen
      van onze toekomstige gevoelens.

      De impactbias beïnvloedt belangrijke levensbeslissingen: we overschatten hoeveel
      een promotie, relatie of aankoop ons geluk zal veranderen. We
      overschatten ook de blijvende pijn van verliezen.
    why_this_is_important: |
      Het herkennen van de impactbias helpt u betere beslissingen te nemen over wat
      uw leven daadwerkelijk zal verbeteren. Het vermindert overinvestering in uitkomsten
      die niet zo belangrijk zullen zijn als u denkt, en vermindert de angst voor uitkomsten
      die niet zo lang zullen kwetsen als u verwacht.
    when_to_use:
      - besluitvorming
      - loopbaan_wijzigingen
      - risico_inschatting
      - relatie_opbouw
    how_can_you_spot_it:
      overestimated_impact: |
        "Dit zal alles veranderen" wanneer vergelijkbare gebeurtenissen uit het verleden een bescheiden
        blijvende impact hadden.
      duration_overestimation: |
        "Hier kom ik nooit overheen" wanneer we ons doorgaans sneller aanpassen dan
        we verwachten.
      focalism: |
        Focussen op één gebeurtenis en andere factoren negeren die het
        welzijn beïnvloeden.
      adaptation_neglect: |
        Vergeten dat we ons aanpassen aan zowel goede als slechte omstandigheden.
    examples:
      career: |
        "Als ik deze promotie krijg, zal ik me zoveel gelukkiger voelen" terwijl eerdere
        promoties slechts tijdelijke impact hadden.
      purchases: |
        "Deze auto zal me gelukkig maken" terwijl de nieuwheid snel vervaagt.
      loss: |
        "Ik zal nooit herstellen van deze afwijzing" terwijl we ons doorgaans
        binnen enkele maanden aanpassen.
      events: |
        Overschattend hoeveel een bruiloft, vakantie of mijlpaal het geluk op lange
        termijn zal beïnvloeden.
    real_world_implications: |
      De impactbias leidt tot slechte beslissingen over geld, carrière en
      relaties. We betalen te veel voor ervaringen waaraan we zullen wennen en
      we vrezen te veel verliezen waarvan we zullen herstellen. Het beïnvloedt beleid en
      persoonlijke planning.
    professional_application:
      networking_and_relationship_building: |
        Denk bij het nemen van loopbaan- of relatiebeslissingen na over hoe u zich voelde
        na vergelijkbare gebeurtenissen uit het verleden. Duurde de impact zo lang
        als u verwachtte? Gebruik dat om toekomstige voorspellingen te kalibreren.
      collaborative_learning_initiative: |
        Herinner teams bij tegenslagen of successen aan adaptatie.
        "We zullen sneller wennen dan we denken" kan zowel overmatige
        feestvreugde als overmatig wanhoop verminderen.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Sommige gebeurtenissen hebben wel degelijk blijvende impact - trauma, groot verlies.
        Verwerp niet alle affectieve voorspellingen als bevooroordeeld.
      cold_rationality: |
        "Het zal niet uitmaken" terwijl de ervaring op dat moment wel degelijk belangrijk is.
      undervaluing_experiences: |
        Positieve ervaringen vermijden omdat "we er toch aan zullen wennen."
      invalidating_emotions: |
        Mensen vertellen dat hun gevoelens voorbijgaan wanneer ze op dat moment steun nodig hebben.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Vooroordeel ten gunste van de eigen groep
    quick_introduction: |
      In-group bias is de neiging om mensen die we als lid van onze groep beschouwen,
      te bevoordelen boven mensen die we als buitenstaanders beschouwen. We schrijven positieve eigenschappen toe aan leden van de eigen groep en negatieve eigenschappen aan leden van buiten de groep, vaak gebaseerd op minimale of willekeurige onderscheidingen.
    one_liner: We bevoordelen onze eigen groep en beoordelen buitenstaanders strenger — vaak willekeurig.
    try_this:
      - Vraag: Zou ik deze persoon hetzelfde beoordelen als hij of zij tot mijn groep behoorde?
      - Zoek actief naar perspectieven van buiten de groep bij het nemen van beslissingen.
      - Merk op wanneer groepsgrenzen je oordeel beïnvloeden.
    ask_yourself:
      - Bevoordeel ik iemand omdat hij of zij "een van ons" is?
      - Zou ik dezelfde standaarden toepassen op een lid van buiten de groep?
    in_more_detail: |
      Zelfs wanneer groepen willekeurig worden toegewezen (bijvoorbeeld door een muntworp), ontwikkelen mensen snel een voorkeur voor hun eigen groep. We vertrouwen leden van de eigen groep meer, wijzen hen genereuzer middelen toe en beoordelen hun acties welwillender.
      Leden van buiten de groep ontvangen de tegenovergestelde behandeling.

      In-group bias voedt tribalism, discriminatie en conflicten. Het beïnvloedt
      werving, promotie, samenwerking en beleid. Het kan gebaseerd zijn op ras,
      nationaliteit, bedrijf, team of elke gedeelde identiteit.
    why_this_is_important: |
      Het herkennen van in-group bias helpt je om eerlijkere beslissingen te nemen, meer
      inclusieve teams op te bouwen en vooringenomenheid te vermijden. Het verklaart ook waarom diversiteitsinitiatieven weerstand ondervinden — voorkeur voor de eigen groep is automatisch.
    when_to_use:
      - leiderschap
      - besluitvorming
      - relatieopbouw
      - conflictbemiddeling
    how_can_you_spot_it:
      preferential_treatment: |
        Het voordeel van de twijfel geven aan "ons" maar niet aan "hen".
      resource_allocation: |
        Meer toewijzen aan leden van de eigen groep wanneer leden van buiten de groep een gelijke
        of grotere behoefte hebben.
      attribution_asymmetry: |
        Succes van de eigen groep = vaardigheid; succes van buiten de groep = geluk. Falen van de eigen groep =
        omstandigheid; falen van buiten de groep = karakter.
      minimal_group_effects: |
        Voorkeursbehandeling ontstaat zelfs bij willekeurige groepsindelingen.
    examples:
      hiring: |
        Voorkeur geven aan kandidaten die naar je oude school gingen of je achtergrond delen.
      performance_reviews: |
        Leden van de eigen groep gunstiger beoordelen dan leden van buiten de groep met
        vergelijkbare prestaties.
      collaboration: |
        Vertrouwen op en betrekken van "ons team" terwijl "hun team" wordt uitgesloten of betwijfeld.
      politics: |
        Argumenten van buiten de groep afwijzen terwijl argumenten van de eigen groep
        kritiekloos worden aanvaard.
    real_world_implications: |
      In-group bias bestendigt ongelijkheid, ondermijnt verdienste en voedt
      conflicten. Het beïnvloedt werving, promotie, investeringen en beleid. Het verminderen
      vereist doelbewuste inspanning — het lost zichzelf niet op.
    professional_application:
      networking_and_relationship_building: |
        Sluit actief mensen buiten je directe kring op. Zoek naar diverse
        perspectieven. Vraag je af of je iemand bevoordeelt omdat hij of zij "zoals jij" is.
      collaborative_learning_initiative: |
        Gebruik gestructureerde processen (anonieme beoordelingen, diverse panelleden) om
        in-group bias bij werving en evaluatie te verminderen. Creëer projecten tussen groepen
        om gedeelde identiteit op te bouwen.
    how_can_this_be_misapplied:
      forced_diversity: |
        Het implementeren van quota of beleid dat wrok wekt zonder onderliggende
        vooroordelen aan te pakken.
      out_group_hostility: |
        Het behandelen van in-group bias als het enige probleem wanneer er ook vijandigheid tegenover
        buitenstaanders bestaat.
      ignoring_legitimate_differences: |
        Niet alle groepsverschillen zijn vooroordelen — soms hebben groepen verschillende
        kenmerken. Ga er niet van uit dat alle verschillen discriminatie zijn.
      reverse_discrimination: |
        Overcompenseren om buitenstaanders te bevoordelen op een manier die oneerlijk is voor leden van de eigen groep.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Inversie
    quick_introduction: |
      Inversie is een techniek voor probleemoplossing die een vraag op zijn kop zet. In plaats van
      te vragen "Hoe slaag ik?" vraag je "Wat zou me doen falen?" en vermijd je die dingen.
      Het brengt risico's en antipatronen aan het licht die vooruitdenken vaak mist.
    one_liner: Inverseer—vraag wat je zou doen falen, vermijd die dingen dan.
    try_this:
      - Voor elk doel, som de belangrijkste manieren op waarop je kunt falen—vermijd ze dan.
      - Gebruik negatieve visualisatie: wat zou dit verkeerd laten gaan?
      - Vraag: Wat zou een slim persoon doen om dit te verpesten?
    ask_yourself:
      - Heb ik nagedacht over wat dit zou doen falen?
      - Wat zie ik niet door alleen vooruit te denken?
    in_more_detail: |
      Gepopulariseerd door Charlie Munger en geworteld in wiskundige logica, benut inversie
      het feit dat falen vermijden vaak gemakkelijker is dan succes nastreven. Als je
      de belangrijkste manieren waarop iets misgaat kunt identificeren, kun je ze systematisch elimineren.

      Carl Jacobi zei naar verluidt: "Inverseer, altijd inverseer." De Stoïcijnen gebruikten negatieve
      visualisatie—het verbeelden van verlies—om te waarderen wat ze hadden en zich voor te bereiden op tegenslag.
      Inversie is geen pessimisme; het is een gestructureerde manier om vooruitgang te boeken door
      obstakels weg te nemen.
    why_this_is_important: |
      Inversie helpt je catastrofale fouten te vermijden, plannen te testen en
      niet-voor-de-hand-liggende oplossingen te vinden. Het vult vooruitplanning aan door ervoor te zorgen dat je
      kritieke faalwijzen niet over het hoofd ziet.
    when_to_use:
      - probleemoplossing
      - besluitvorming
      - risicobeoordeling
      - carrièrestappen
    how_can_you_spot_it:
      premortem_thinking: |
        Voordat een project begint, vragen "Waarom is dit mislukt?" alsof het dat al is.
      anti_goals: |
        Duidelijk definiëren wat je wilt vermijden, net zo goed als wat je wilt bereiken.
      reverse_engineering_failure: |
        Bestuderen van mislukte gevallen om lessen te trekken in plaats van alleen successen te bestuderen.
      constraint_focus: |
        Identificeren van beperkingen en knelpunten voordat je optimaliseert voor de voordelen.
    examples:
      investing: |
        In plaats van "Wat zal deze aandelenkoers doen stijgen?" vraag je "Wat zou me geld laten verliezen?"
        en vermijd je die scenario's.
      career: |
        "Wat zou mijn reputatie verwoesten?" leidt tot een lijst met gedragingen om te vermijden.
      product_launch: |
        "Waarom mislukken de meeste productlanceringen?" brengt risico's aan het licht die voor de lancering moeten worden aangepakt.
      health: |
        "Welke gewoonten verkorten de levensduur?" geeft een duidelijkere lijst om te vermijden dan "Wat maakt
        me gezond?"
    real_world_implications: |
      Inversie wordt gebruikt in engineering (analyse van faalwijzen), beleggen en strategie.
      Het vermindert overmoed en verbetert risicobeheer. Overmatig gebruik kan leiden tot
      overmatige voorzichtigheid.
    professional_application:
      networking_and_relationship_building: |
        "Wat zou deze relatie schaden?" helpt je gedragingen te vermijden die vertrouwen breken.
      collaborative_learning_initiative: |
        Voer premortems uit op projecten: "Dit is mislukt. Waarom?" Gebruik de antwoorden om de
        planning en uitvoering te verbeteren.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Alleen focussen op het vermijden van falen kan actie verlammen en noodzakelijke
        risico's nemen voorkomen.
      negativity_bias: |
        Inversie kan de negativiteitsbias versterken als het niet wordt gebalanceerd met vooruitkijkende
        kansidentificatie.
      analysis_paralysis: |
        Zoveel tijd besteden aan faalwijzen dat je nooit tot uitvoering komt.
      missing_upside: |
        Inversie vertelt je niet wat je moet doen—alleen wat je moet vermijden. Je hebt nog steeds
        positieve doelen nodig.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Wet van de afnemende meeropbrengst
    quick_introduction: |
      De wet van de afnemende meeropbrengst stelt dat naarmate je meer van één productiefactor toevoegt, terwijl je andere constant houdt, de extra opbrengst van elke nieuwe eenheid input uiteindelijk afneemt. Meer is niet altijd beter - er is een punt waarop extra inspanning steeds minder oplevert.
    one_liner: Meer input levert uiteindelijk minder opbrengst op - er is een optimaal punt.
    try_this:
      - Ask: Ben ik voorbij het punt waar extra inspanning zinvolle rendementen oplevert?
      - Prioritizeer de input met de hoogste hefboomwerking; stop wanneer de marginale rendementen afnemen.
      - Merk op wanneer je te veel investeert in iets dat al zijn vruchten heeft afgeworpen.
    ask_yourself:
      - Wat zou ik winnen met één extra eenheid inspanning hier?
      - Optimaliseer ik voorbij het punt van afnemende meeropbrengsten?
    in_more_detail: |
      In de economie levert het toevoegen van meer werknemers aan een vaste hoeveelheid land uiteindelijk kleinere incrementele winsten op. In persoonlijke productiviteit kan het eerste uur studeren meer waarde toevoegen dan het tiende. Het principe is van toepassing op middelen, inspanning, tijd en functies. Er is een optimaal punt; daarbuiten nemen de marginale rendementen af en kunnen ze zelfs negatief worden.

      Het herkennen van afnemende meeropbrengsten helpt u middelen efficiënt toe te wijzen en te voorkomen dat u te veel investeert in gebieden die al het meeste van hun waarde hebben opgeleverd.
    why_this_is_important: |
      Inzicht in afnemende meeropbrengsten voorkomt over-investering, stuurt prioritering en helpt u te weten wanneer u moet stoppen. Het is essentieel voor de toewijzing van middelen en het vermijden van perfectionisme.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - investeren
      - loopbaanstappen
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Elke extra eenheid inspanning of middelen produceert minder output dan de
        vorige.
      perfectionism_trap: |
        Streven naar de laatste 10% kwaliteit kost onevenredig veel moeite.
      overinvestment: |
        Doorgaan met het toevoegen van middelen wanneer het marginale rendement laag of negatief is.
      optimal_point_passed: |
        Je bent voorbij het punt gegaan waarop meer input de resultaten verbetert.
    examples:
      studying: |
        De eerste 2 uur voorbereiding op het examen voegen meer toe dan uren 7-8; er is een punt van
        afnemende meeropbrengsten.
      product_features: |
        Het toevoegen van meer functies aan een app kan gebruikers verwarren; de 20e functie voegt minder toe
        waarde dan de 5e.
      hiring: |
        Het toevoegen van meer mensen aan een project kan het vertragen (Wet van Brooks) na een bepaald punt.
      marketing: |
        Het verdubbelen van de advertentie-uitgaven verdubbelt de resultaten niet; de rendementen nemen af naarmate u
        verzadigd raakt de markt.
    real_world_implications: |
      De wet van de afnemende meeropbrengst stuurt economisch beleid, bedrijfsstrategie en
      persoonlijke productiviteit. Het negeren ervan leidt tot verspilde middelen en suboptimale
      uitkomsten. Het ondersteunt het Pareto-principe en focus.
    professional_application:
      networking_and_relationship_building: |
        Investeren in een paar diepe relaties kan meer opleveren dan de inspanning verspreiden
        dun over velen. Herken wanneer extra netwerken afnemende rendementen heeft.
      collaborative_learning_initiative: |
        Meer trainingsuren betekenen niet altijd betere resultaten. Vind de optimale dosis
        en vermijd overbelasting.
    how_can_this_be_misapplied:
      premature_optimization: |
        Te vroeg stoppen voordat een redelijk kwaliteitsniveau is bereikt.
      undershooting: |
        Afnemende meeropbrengsten gebruiken als excuus voor onvoldoende inspanning.
      misidentifying_the_curve: |
        Aannemen van afnemende meeropbrengsten wanneer u zich eigenlijk in een ander deel van de
        curve bevindt (bijv. vroege exponentiële fase).
      one_size_fits_all: |
        Toepassen van hetzelfde "optimale punt" in verschillende contexten waar de curves verschillen.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Verliesaversiebias
    quick_introduction: |
      Verliesaversie is de neiging om het vermijden van verliezen te verkiezen boven het behalen van gelijkwaardige winsten.
      Mensen ervaren de pijn van verlies ongeveer twee keer zo sterk als het plezier van winst.
    one_liner: Verliezen voelen ongeveer twee keer zo pijnlijk als gelijkwaardige winsten goed voelen.
    try_this:
      - "Vraag jezelf af: waardeer ik te veel wat ik zou verliezen ten opzichte van wat ik zou winnen?"
      - Herformuleer de keuze als winsten in plaats van verliezen en kijk of je mening verandert.
      - Merk op wanneer de angst om te verliezen de beslissing meer stuurt dan het werkelijke voordeel.
    ask_yourself:
      - Wat zou ik kiezen als ik vanaf nul begon?
      - Houd ik vast vanwege wat ik zou verliezen, of omdat de toekomst echt beter is?
    in_more_detail: |
      Ontwikkeld door Daniel Kahneman en Amos Tversky, beschrijft verliesaversie hoe verliezen en winsten
      asymmetrisch worden waargenomen. De psychologische impact van het verliezen van €100 is doorgaans veel
      groter dan de voldoening van het winnen van €100. Deze bias beïnvloedt beslissingen op het gebied van
      financiën, onderhandelingen en alledaagse keuzes, wat vaak leidt tot risicomijdend gedrag
      wanneer potentiële verliezen prominent zijn.
    why_this_is_important: |
      Het begrijpen van verliesaversie helpt je te herkennen wanneer de angst voor verlies beslissingen stuurt
      in plaats van rationele analyse. Het verklaart waarom mensen vasthouden aan verliezende investeringen,
      noodzakelijke veranderingen vermijden en suboptimale keuzes maken in onderhandelingen en carrièrebeslissingen.
    when_to_use:
      - besluitvorming
      - beleggen
      - carrière_keuzes
      - risico_inschatting
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Merk op wanneer het vooruitzicht iets te verliezen onevenredige angst
        of weerstand opwekt in vergelijking met het voordeel van een potentiële winst.
      reluctance_to_change: |
        Terughoudendheid om van strategie te veranderen, een baan op te zeggen of een bezit te verkopen, zelfs wanneer
        objectieve analyse suggereert dat het de betere optie is.
      framing_sensitivity: |
        Beslissingen veranderen drastisch afhankelijk van de manier waarop opties worden gepresenteerd als winsten
        of verliezen, zelfs wanneer de uitkomsten gelijkwaardig zijn.
      overvaluing_what_you_have: |
        Het bezittingseffect—het toekennen van een hogere waarde aan dingen die je bezit simpelweg omdat
        je ze bezit—gaat vaak gepaard met verliesaversie.
    examples:
      investing: |
        Vasthouden aan een dalende aandelenkoers om "het verlies te vermijden" terwijl je
        betere investeringsmogelijkheden elders misloopt.
      career: |
        Blijven in een onvervullende baan omdat vertrek voelt als het verliezen van zekerheid,
        zelfs wanneer de nieuwe kans meer groei biedt.
      negotiations: |
        Een eerlijk aanbod weigeren omdat het wordt gepresenteerd als "opgeven" van iets,
        in plaats van "winnen" van een overeenkomst.
      product_design: |
        Gratis proefversies die overgaan in betaalde abonnementen—gebruikers ervaren het "verlies" van de dienst
        wanneer de proefperiode eindigt, wat abonnementen meer motiveert dan het "winnen" van
        een nieuwe dienst.
    real_world_implications: |
      Verliesaversie vormt markten, beleid en individueel gedrag. Het verklaart
      waarom verzekeringen en garanties goed verkopen, waarom mensen heilzame veranderingen vermijden,
      en waarom negatief nieuws een onevenredig grote impact heeft. Het herkennen ervan kan de
      kwaliteit van besluitvorming verbeteren en spijt-gedreven keuzes verminderen.
    professional_application:
      networking_and_relationship_building: |
        Wees je ervan bewust dat mensen weerstand kunnen bieden tegen het beëindigen van onproductieve relaties of
        samenwerkingen vanwege verliesaversie—ze vrezen het "verlies" van de connectie.
        Presenteer nieuwe kansen als winsten in plaats van verliezen om weerstand te verminderen.
      collaborative_learning_initiative: |
        Bij het introduceren van nieuwe processen of tools, benadruk wat het team wint
        in plaats van wat ze "opgeven." Verlies-georiënteerde veranderinitiatieven
        roepen vaak sterkere weerstand op.
    how_can_this_be_misapplied:
      manipulation: |
        Verliesaversie exploiteren om beslissingen te forceren—bijv. "aanbiedingen voor beperkte tijd"
        of "niet missen" framing die angst voor verlies opwekt in plaats van
        een oprechte waardeschatting.
      misinterpreting_relationships: |
        De weerstand van iemand tegen verandering puur rationeel noemen, terwijl het mogelijk
        gedreven wordt door verliesaversie. Verkeerd toeschrijven van motieven kan vertrouwen beschadigen.
      overcommitment: |
        Sunk cost fallacy—blijven investeren in een falend project omdat
        "we er al zoveel in hebben gestoken" in plaats van verliezen te beperken.
      missed_opportunities_for_conflict_resolution: |
        Compromis weigeren omdat elke concessie voelt als een verlies,
        zelfs wanneer het alternatief een slechtere uitkomst voor iedereen is.
      vulnerability_to_exploitation: |
        Gemmanipuleerd worden door anderen die keuzes zo presenteren dat ze verliesaversie oproepen,
        zoals verkooptactieken die benadrukken wat je "verliest" als je niet handelt.
      reinforcing_negative_perceptions: |
        Overmatige focus op potentiële nadelen kan een pessimistische
        houding creëren die zelfvervullend wordt, waardoor groeimogelijkheden worden gemist.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: De kaart is niet het gebied
    quick_introduction: |
      "De kaart is niet het gebied" betekent dat een voorstelling van de werkelijkheid niet de werkelijkheid
      zelf is. Modellen, theorieën en beschrijvingen zijn nuttige simplificaties, maar ze
      laten altijd iets weg. Het verwarren van de kaart met het gebied leidt tot fouten.
    one_liner: De kaart is niet het gebied—alle modellen zijn onjuist; sommige zijn nuttig.
    try_this:
      - Wanneer een model niet overeenkomt met de werkelijkheid, update dan de kaart—forceer de werkelijkheid niet om te passen.
      - Vraag: Wat laat dit model weg? Wanneer zou het kunnen falen?
      - Behandel modellen als hulpmiddelen, niet als waarheid.
    ask_yourself:
      - Verwar ik mijn model met de werkelijkheid?
      - Is het gebied veranderd sinds ik het voor het laatst heb bekeken?
    in_more_detail: |
      Alfred Korzybski introduceerde dit idee in de algemene semantiek. Een kaart van een stad
      is nuttig voor navigatie, maar het is niet de stad—het laat details weg, raakt verouderd, en
      kan nooit alles bevatten. Hetzelfde geldt voor mentale modellen, wetenschappelijke
      theorieën en organisatieschema's.

      Alle modellen zijn onjuist; sommige zijn nuttig. Het gevaar schuilt in het behandelen van een model alsof het
      de volledige waarheid was, vooral wanneer het gebied is veranderd. Goed denken
      vereist het updaten van kaarten wanneer de werkelijkheid niet overeenkomt.
    why_this_is_important: |
      Erkennen dat kaarten verschillen van gebieden voorkomt overmatig vertrouwen in modellen,
      stimuleert het bijstellen van overtuigingen, en vermindert het risico op handelen op basis van verouderde of
      versimpelde informatie.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - leren
      - risicobeoordeling
    how_can_you_spot_it:
      model_reality_confusion: |
        Het behandelen van een kader of theorie alsof het de werkelijkheid volledig beschrijft.
      outdated_assumptions: |
        Handelen op basis van informatie of modellen die niet langer overeenkomen met de huidige omstandigheden.
      oversimplification: |
        Het negeren van nuance omdat de "kaart" deze niet bevat.
      map_worship: |
        Het verdedigen van een model wanneer bewijs het tegenspreekt, in plaats van het bij te werken.
    examples:
      organizational_charts: |
        Aannemen dat de hiërarchische structuur weergeeft hoe werk daadwerkelijk wordt gedaan.
      financial_models: |
        Het behandelen van een spreadsheetprojectie als een voorspelling in plaats van een scenario.
      stereotypes: |
        Het toepassen van groepsgeneralisaties op individuen.
      strategy_docs: |
        Het uitvoeren van een plan zoals geschreven wanneer de markt is verschoven.
    real_world_implications: |
      Het onderscheid tussen kaart en gebied is fundamenteel voor wetenschap, techniek en
      filosofie. Het vormt de basis voor Bayesiaanse updating, agile methodologie en epistemische
      nederigheid. Het negeren ervan leidt tot rigide denken en mislukte strategieën.
    professional_application:
      networking_and_relationship_building: |
        Je mentale model van een persoon kan verouderd zijn. Update het door directe
        interactie in plaats van te vertrouwen op oude indrukken.
      collaborative_learning_initiative: |
        Moedig teams aan om plannen en modellen te behandelen als hypothesen die getest en
        herzien moeten worden, niet als vaste waarheden.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Concluderen dat geen enkele kaart nuttig is en alle kennis verdacht is.
      constant_revision: |
        Zo vaak updaten dat er geen stabiel begrip ontstaat.
      dismissing_models: |
        Het verwerpen van nuttige simplificaties omdat ze "niet het gebied" zijn.
      relativism: |
        Beweren dat alle kaarten even geldig zijn wanneer sommige duidelijk beter bij het gebied passen.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Mere Exposure Effect
    quick_introduction: |
      Het mere-exposure-effect is de neiging om een voorkeur te ontwikkelen voor dingen
      simpelweg omdat we er bekend mee zijn. Herhaalde blootstelling—zelfs zonder
      bekrachtiging—verhoogt de waardering. We geven de voorkeur aan wat we kennen.
    one_liner: Bekendheid schept waardering—we geven de voorkeur aan wat we eerder hebben gezien.
    try_this:
      - Vraag: Houd ik hiervan omdat het goed is, of omdat het bekend is?
      - Corrigeer bij het evalueren van opties voor blootstelling—nieuwe dingen beginnen met een achterstand.
      - Merk op wanneer herhaling je voorkeur beïnvloedt.
    ask_yourself:
      - Geef ik de voorkeur aan iets voornamelijk omdat ik het eerder heb gezien?
      - Zou ik anders kiezen als de blootstelling gelijk was?
    in_more_detail: |
      Robert Zajonc toonde aan dat herhaalde blootstelling aan stimuli (gezichten, woorden, vormen)
      positieve gevoelens jegens hen vergroot—zelfs wanneer we ons niet bewust
      bewust zijn van de blootstelling. Bekendheid schept waardering, geen minachting (in veel
      gevallen). Het effect is sterker wanneer we niet analyseren en wanneer blootstelling
      subtiel is.

      Het mere-exposure-effect beïnvloedt merkvoorkeur, interpersoonlijke
      aantrekkingskracht en esthetische oordelen. Het verklaart waarom we bekende
      muziek verkiezen, waarom reclame werkt door herhaling, en waarom we mensen
      die we eerder hebben gezien de voorkeur geven—zelfs zonder interactie.
    why_this_is_important: |
      Het herkennen van het mere-exposure-effect helpt je je eigen
      voorkeuren te begrijpen en manipulatie door herhaling te weerstaan. Het verklaart ook
      waarom zichtbaarheid en aanwezigheid ertoe doen voor relaties en
      merken. Bekendheid is een krachtige maar vaak onbewuste invloed.
    when_to_use:
      - relatieopbouw
      - besluitvorming
      - leiderschap
      - leren
    how_can_you_spot_it:
      familiarity_preference: |
        Voorkeur geven aan opties die we eerder hebben gezien boven nieuwe.
      repetition_influence: |
        Herhaalde blootstelling verhoogt de waardering zonder expliciete overtuiging.
      unconscious_influence: |
        Het effect werkt zelfs als we ons niet bewust zijn van de blootstelling.
      brand_recognition: |
        Bekende merken worden geprefereerd, zelfs als we niet kunnen uitleggen waarom.
    examples:
      advertising: |
        Herhaalde blootstelling aan een merk verhoogt de voorkeur—zelfs zonder
        overtuigende boodschappen.
      music: |
        Nummers die we eerder hebben gehoord, vinden we vaker leuker dan nieuwe
        bij de eerste luisterbeurt.
      people: |
        We hebben de neiging om mensen die we herhaaldelijk hebben gezien (bijv. klasgenoten,
        collega's) meer te mogen dan vreemden—zelfs zonder interactie.
      ideas: |
        Ideeën die we eerder zijn tegengekomen, voelen comfortabeler en
        geloofwaardiger dan nieuwe ideeën.
    real_world_implications: |
      Het mere-exposure-effect vormt consumentengedrag, politieke
      voorkeuren en sociale aantrekkingskracht. Het wordt uitgebuit in marketing
      en kan oneerlijke voordelen opleveren voor het bekende. Het verklaart ook
      waarom diversiteit van blootstelling ertoe doet—bekendheid met
      verschillen vermindert vooroordelen.
    professional_application:
      networking_and_relationship_building: |
        Zichtbaarheid is belangrijk. Verschijnen, aanwezig zijn en
        gezien worden creëert bekendheid die waardering opbouwt. Onderschat
        de waarde van herhaald contact met weinig inzet niet.
      collaborative_learning_initiative: |
        Stel mensen herhaaldelijk bloot aan diverse perspectieven en mensen—
        bekendheid kan vooroordelen verminderen. Maar wees je ervan bewust dat pure blootstelling
        ook de voorkeur voor de status quo kan versterken.
    how_can_this_be_misapplied:
      manipulation: |
        Bewust herhaalde blootstelling creëren om voorkeuren
        zonder toestemming te manipuleren.
      false_familiarity: |
        Aannemen dat bekendheid gelijkstaat aan kwaliteit—soms zijn nieuwe
        opties beter.
      exclusion: |
        Als alleen bepaalde mensen blootstelling krijgen, krijgen zij een oneerlijk
        voordeel. Bedenk wie toegang heeft tot zichtbaarheid.
      stagnation: |
        Te veel vertrouwen op bekendheid en nooit nieuwe dingen proberen.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Narratieve drogreden
    quick_introduction: |
      De narratieve drogreden is de neiging om verhalen te construeren uit
      gebeurtenissen uit het verleden die ze coherenter, voorspelbaarder en
      betekenisvoller doen lijken dan ze waren. We voegen achteraf verklaringen
      toe aan willekeur. We maken van de rommel van de geschiedenis een
      netjes verhaal – en geloven dan dat het verhaal onvermijdelijk was.
    one_liner: We voegen coherente verhalen toe aan willekeur – en geloven dan dat ze onvermijdelijk waren.
    try_this:
      - Vraag: Hoeveel van dit verhaal is achterafkennis? Welke rol speelde geluk?
      - Wees sceptisch over nette verklaringen – het verleden was rommeliger dan onze verhalen.
      - Merk op wanneer "logisch" het werk doet van "was voorspelbaar".
    ask_yourself:
      - Ben ik een verhaal aan het construeren dat het verleden onvermijdelijker doet lijken dan het was?
      - Zou ik dit hebben voorspeld voordat het gebeurde?
    in_more_detail: |
      Nassim Taleb populariseerde de term. We hunkeren naar narratief – oorzaak en gevolg,
      helden en schurken, duidelijke bogen. Dus construeren we verhalen die
      gebeurtenissen achteraf verbinden. Het verhaal voelt waar omdat het coherent is – maar
      coherantie betekent niet dat het correct is. We verwarren "logisch" met
      "was voorspelbaar". We onderschatten de rol van geluk en
      willekeur.

      De narratieve drogreden beïnvloedt hoe we leren van geschiedenis,
      succes evalueren en voorspellingen doen. We overschatten de verklarende kracht
      van verhalen en onderschatten de rol van toeval.
    why_this_is_important: |
      Het herkennen van de narratieve drogreden helpt u te voorkomen dat u te veel leert van
      het verleden en de voorspelbaarheid overschat. Het moedigt nederigheid aan
      over oorzakelijkheid en voorspelling. Niet alles wat een goed verhaal oplevert, is waar of generaliseerbaar.
    when_to_use:
      - besluitvorming
      - leren
      - risicobeoordeling
      - probleemoplossing
    how_can_you_spot_it:
      hindsight_coherence: |
        Gebeurtenissen uit het verleden worden verklaard met een netjes verhaal dat op dat moment
        niet zichtbaar was.
      cause_effect_overconfidence: |
        We kennen duidelijke oorzaken toe aan uitkomsten die vele
        bijdragende factoren hadden.
      luck_minimization: |
        Succes en falen worden verklaard door vaardigheid en strategie,
        niet door geluk.
      story_over_evidence: |
        Een meeslepend narratief overschrijft statistisch bewijs.
    examples:
      business_success: |
        "Ze slaagden vanwege X" terwijl veel factoren en geluk
        een rol speelden – we kiezen het verhaal dat past.
      investing: |
        Marktbewegingen verklaren met narratieven die bevredigend
        voelen, maar achteraf zijn toegevoegd.
      history: |
        Historische gebeurtenissen worden verteld als onvermijdelijke voortzettingen
        terwijl ze afhankelijk waren van vele factoren.
      career: |
        "Ik ben hier gekomen omdat ik X deed" terwijl geluk en timing
        belangrijke rollen speelden.
    real_world_implications: |
      De narratieve drogreden vervormt leren, overmoed
      in voorspelling, en de toeschrijving van succes en falen.
      Het doet het verleden voorspelbaarder lijken dan het was
      en de toekomst voorspelbaarder dan deze is.
    professional_application:
      networking_and_relationship_building: |
        Wanneer iemand zijn succesverhaal vertelt, onthoud dan dat
        het een narratief is – coherent en meeslepend, maar mogelijk
        vereenvoudigd. Geluk en onzichtbare factoren kunnen worden onderschat.
      collaborative_learning_initiative: |
        Onderscheid in retrospectieven narratief van bewijs.
        Vraag "Wat zouden we op dat moment hebben gezegd?" Gebruik
        beslisdagboeken om onzekerheid vast te leggen voordat uitkomsten bekend zijn.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Sommige narratieven zijn correct – niet alles is
        de narratieve drogreden. Oorzakelijkheid bestaat.
      excessive_skepticism: |
        Weigeren te leren van het verleden omdat het "narratieve
        drogreden" is. We kunnen nog steeds nuttige lessen trekken.
      false_randomness: |
        Aannemen dat alles willekeurig is wanneer sommige uitkomsten
        betekenisvol toewijsbaar zijn.
      undermining_storytelling: |
        Verhalen hebben waarde voor communicatie en betekenis –
        de drogreden is geloven dat ze compleet of
        voorspellend zijn, niet dat ze bestaan.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Negativiteitsvooroordeel
    quick_introduction: |
      Negativiteitsvooroordeel is de neiging om meer gewicht toe te kennen aan negatieve informatie dan aan
      positieve informatie. Slecht nieuws, kritiek en bedreigingen trekken onze aandacht en
      beïnvloeden onze beslissingen sterker dan gelijkwaardige positieve prikkels.
    one_liner: Slecht nieuws weegt zwaarder dan goed nieuws - we zijn geprogrammeerd om prioriteit te geven aan bedreigingen.
    try_this:
      - Zoek actief naar positief bewijs en geef het meer gewicht bij het evalueren.
      - Merk op wanneer één kritiek opweegt tegen vele complimenten.
      - Vraag: geef ik negatieve informatie meer gewicht dan het verdient?
    ask_yourself:
      - Pieker ik over het negatieve en negeer ik het positieve?
      - Zou ik me anders voelen als ik me concentreerde op het goede bewijs?
    in_more_detail: |
      Evolutionair gezien kon het missen van een bedreiging fataal zijn, terwijl het missen van een kans
      meestal overleefbaar was. Onze hersenen zijn geprogrammeerd om prioriteit te geven aan negatieve informatie.
      Eén enkele kritische opmerking kan opwegen tegen vele complimenten. Negatieve gebeurtenissen worden
      levendiger en langer herinnerd.

      Dit vooringenomenheid beïnvloedt relaties, besluitvorming en welzijn. We blijven hangen bij
      mislukkingen, anticiperen op het ergste scenario en negeren positief bewijs. Het begrijpen ervan
      helpt ons dit te corrigeren.
    why_this_is_important: |
      Het herkennen van het negativiteitsvooroordeel helpt u feedback in balans te brengen, te voorkomen dat u overmatig reageert op
      kritiek, en meer gekalibreerde beslissingen te nemen. Het verklaart ook waarom slecht nieuws
      dominant is en waarom we ons vaak slechter voelen dan de omstandigheden rechtvaardigen.
    when_to_use:
      - besluitvorming
      - relatieopbouw
      - leiderschap
      - risicobeoordeling
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Eén negatieve opmerking overschaduwt vele positieve.
      threat_prioritization: |
        Potentiële nadelen krijgen meer aandacht dan gelijkwaardige voordelen.
      vivid_negative_memories: |
        Negatieve ervaringen worden gemakkelijker en met meer emotie herinnerd.
      discounting_positive_evidence: |
        Goed nieuws wordt snel vergeten of weggewuifd.
    examples:
      performance_reviews: |
        Een medewerker blijft hangen bij één kritisch stuk feedback en negeert de algehele
        positieve evaluatie.
      news_consumption: |
        Negatieve koppen domineren de aandacht en vormen het wereldbeeld ondanks positieve
        trends.
      relationships: |
        Eén enkel argument weegt zwaarder dan vele goede momenten.
      investing: |
        Marktdalingen veroorzaken meer paniek dan gelijkwaardige stijgingen euforie veroorzaken.
    real_world_implications: |
      Negativiteitsvooroordeel vormt de media, politiek en organisatiecultuur. Het
      draagt bij aan angst, conflict en suboptimale beslissingen. Bewust
      tegengaan ervan kan het welzijn en oordeel verbeteren.
    professional_application:
      networking_and_relationship_building: |
        Wees bij het geven van feedback bewust dat negatieve opmerkingen zwaarder zullen wegen —
        breng ze in balans en benadruk groei. Overweeg bij het ontvangen van feedback bewust
        het volledige plaatje.
      collaborative_learning_initiative: |
        Creëer culturen die expliciet het negativiteitsvooroordeel tegengaan: vier successen,
        documenteer positieve uitkomsten en balanceer post-mortems met "pre-mortems" van
        wat er goed ging.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Legitieme zorgen afwijzen door aan te dringen op "positief denken".
      ignoring_real_threats: |
        Overcorrigeren tot het punt waarop echte risico's worden onderschat.
      feedback_suppression: |
        Het vermijden van noodzakelijke kritiek omdat "negativiteit slecht is".
      invalidation: |
        Iemand vertellen dat hun negatieve gevoelens "gewoon het negativiteitsvooroordeel" zijn
        wanneer er reële reden tot zorg is.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Ockhams scheermes
    quick_introduction: |
      Ockhams scheermes (of Occam's scheermes) is het principe dat, bij concurrerende hypothesen,
      de hypothese met de minste aannames de voorkeur verdient. Eenvoudigere verklaringen zijn
      vaak — hoewel niet altijd — correct.
    one_liner: Geef de voorkeur aan de eenvoudigste verklaring die bij het bewijs past.
    try_this:
      - Vergelijk je theorieën en vraag: welke heeft de minste aannames?
      - Voeg geen complexiteit toe zonder bewijs dat dit vereist.
      - Merk op wanneer je de voorkeur geeft aan een uitgebreide verklaring boven een eenvoudige.
    ask_yourself:
      - Introduceer ik onnodige complexiteit?
      - Vereist het bewijs dit niveau van verklaring?
    in_more_detail: |
      Het principe, genoemd naar William van Ockham, beweert niet dat eenvoudige verklaringen
      altijd waar zijn. Het suggereert dat onnodige complexiteit niet mag worden geïntroduceerd
      zonder bewijs. Als twee theorieën dezelfde fenomenen verklaren, heeft de eenvoudigste
      de voorkeur totdat bewijs anders eist.

      Ockhams scheermes is een heuristiek, geen wet. Soms is de juiste verklaring
      complex. Maar het beschermt tegen overfitting, samenzweringstheorieën en onnodige
      complicatie. Het bevoordeelt zuinigheid in verklaringen.
    why_this_is_important: |
      Het toepassen van Ockhams scheermes verbetert de probleemoplossing, vermindert overfitting in modellen,
      en helpt je uitgebreide maar ongefundeerde theorieën te vermijden. Het is een nuttig uitgangspunt
      wanneer het bewijs dubbelzinnig is.
    when_to_use:
      - probleemoplossing
      - besluitvorming
      - leren
      - risicoanalyse
    how_can_you_spot_it:
      unnecessary_complexity: |
        Een verklaring vereist veel aannames terwijl minder voldoende zou zijn.
      conspiracy_tendencies: |
        Complexe, multi-actor verklaringen voor gebeurtenissen die eenvoudigere oorzaken hebben.
      overfitting: |
        Een model of theorie die eerdere gegevens perfect verklaart, maar faalt bij nieuwe gegevens.
      elegance_in_explanation: |
        De beste verklaringen voelen vaak "vanzelfsprekend" achteraf.
    examples:
      debugging: |
        Wanneer er een bug optreedt, controleer dan eerst de eenvoudigste oorzaken (bv. typefout, verkeerde configuratie)
        voordat je architecturale problemen aanneemt.
      conspiracy_theories: |
        "De regering orkestreerde X" vereist veel verborgen actoren; "een paar mensen
        maakten fouten" is eenvoudiger.
      product_failure: |
        Gebruikers adopteren een functie niet — eenvoudigste verklaring: het lost hun
        probleem niet op, niet dat ze verward zijn door de gebruikersinterface.
      medical_diagnosis: |
        "Veelvoorkomende dingen zijn veelvoorkomend" — overweeg veelvoorkomende diagnoses vóór zeldzame.
    real_world_implications: |
      Ockhams scheermes stuurt wetenschappelijk onderzoek, engineering en dagelijks redeneren aan.
      Het vermindert verspilde inspanningen aan uitgebreide foute theorieën. Misbruikt kan het
      echt complexe fenomenen afwijzen.
    professional_application:
      networking_and_relationship_building: |
        Bij het interpreteren van het gedrag van anderen, geef de voorkeur aan eenvoudige verklaringen (ze hebben het druk,
        ze zijn het vergeten) voordat je kwade opzet of complexe motieven aanneemt.
      collaborative_learning_initiative: |
        Vraag in probleemoplossende sessies expliciet: "Wat is de eenvoudigste verklaring?"
        voordat je complexe modellen bouwt.
    how_can_this_be_misapplied:
      oversimplification: |
        Geldige complexe verklaringen afwijzen omdat ze "te ingewikkeld" zijn.
      status_quo_bias: |
        Ockhams scheermes gebruiken om bekende verklaringen te verkiezen boven nieuwe maar correcte.
      scientific_rigidity: |
        Nieuwe theorieën afwijzen omdat ze complexer zijn, zelfs als het bewijs ze ondersteunt.
      missing_nuance: |
        Sommige domeinen (bv. menselijk gedrag, ecosystemen) zijn inherent complex;
        eenvoud kan misleidend zijn.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Struisvogel-effect
    quick_introduction: |
      Het struisvogel-effect is de neiging om negatieve financiële informatie te vermijden — om "je kop in het zand te steken" zoals een struisvogel. Mensen vermijden hun portefeuilles te bekijken wanneer de markten dalen, stellen het openen van rekeningen uit en negeren waarschuwingssignalen die hen zouden kunnen helpen handelen.
    one_liner: Slecht nieuws vermijden verandert de realiteit niet—het vertraagt alleen je reactie.
    try_this:
      - Plan regelmatige controles in zodat je de cijfers niet kunt vermijden.
      - Merk op wanneer je iets uitstelt om te openen of te bekijken.
      - Vraag: Wat vermijd ik, en wat zou er veranderen als ik het onder ogen zag?
    ask_yourself:
      - Vermijd ik informatie omdat deze misschien slecht is?
      - Zou eerdere kennis me helpen beter te handelen?
    in_more_detail: |
      De term werd bedacht in gedragseconomie om beleggers te beschrijven die tijdens marktdalingen hun beleggingen vermijden te controleren. Het gedrag strekt zich verder uit dan alleen financiën: medische controles vermijden, relatieproblemen negeren en moeilijke gesprekken uitstellen. We proberen de angst voor slecht nieuws te vermijden, maar vermijding maakt de uitkomsten vaak erger doordat tijdige actie wordt voorkomen.

      Het effect wordt gedreven door verliesaversie en de wens om emotioneel ongemak te vermijden. Helaas verandert onwetendheid de realiteit niet—het vertraagt alleen onze reactie.
    why_this_is_important: |
      Het herkennen van het struisvogel-effect helpt je om moeilijke informatie proactief onder ogen te zien. Slecht nieuws vermijden verbetert zelden de uitkomsten; het verergert ze meestal. Tijdige kennis maakt betere beslissingen mogelijk.
    when_to_use:
      - besluitvorming
      - beleggen
      - risicobeoordeling
      - carriere_switches
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Beleggingsafschriften niet bekijken wanneer de markten dalen.
      delaying_difficult_information: |
        Het uitstellen van het openen van rekeningen, medische resultaten of prestatiefeedback.
      information_avoidance: |
        Actief bronnen vermijden die mogelijk slecht nieuws bevatten.
      procrastination_on_unpleasant_tasks: |
        Acties uitstellen die problemen zouden aan het licht brengen of aanpakken.
    examples:
      investing: |
        Een belegger stopt met het controleren van zijn 401(k) tijdens een bearmarkt en mist kansen voor herbalancering.
      health: |
        Een doktersafspraak vermijden ondanks symptomen vanwege angst voor slecht nieuws.
      finances: |
        Creditcardafschriften of bankwaarschuwingen niet openen om schuld te vermijden.
      performance: |
        Een manager vermijdt kritische feedback te geven tot de jaarlijkse beoordeling, terwijl eerdere interventie had geholpen.
    real_world_implications: |
      Het struisvogel-effect leidt tot slechtere financiële resultaten, vertraagde medische behandeling en onopgeloste problemen in relaties en werk. Het verergert vermijdbare verliezen. Systemen die informatie moeilijk te negeren maken, kunnen helpen.
    professional_application:
      networking_and_relationship_building: |
        Vermijd geen moeilijke gesprekken. Pak problemen vroeg aan in plaats van te hopen dat ze zichzelf oplossen. Creëer regelmatige controles die problemen aan het licht brengen voordat ze escaleren.
      collaborative_learning_initiative: |
        Bouw feedbackloops die het moeilijk maken om problemen te negeren — dashboards, regelmatige beoordelingen en normen die vroege openbaarmaking van slecht nieuws aanmoedigen.
    how_can_this_be_misapplied:
      information_overload: |
        Constante monitoring afdwingen wanneer enige informatievermijding gezond is (bijvoorbeeld aandelen niet elke minuut controleren).
      anxiety_amplification: |
        Zoveel focus leggen op mogelijke problemen dat dit de angst vergroot zonder de resultaten te verbeteren.
      blame_shifting: |
        Alle vermijding toeschrijven aan het "struisvogel-effect" wanneer sommige vermijding rationeel is (bijvoorbeeld het negeren van ruis).
      micromanagement: |
        Het concept gebruiken om excessieve surveillance van anderen te rechtvaardigen.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Pareto Principe
    quick_introduction: |
      Het Pareto principe (of de 80/20 regel) stelt dat ongeveer 80% van de effecten voortkomt uit
      20% van de oorzaken. Een kleine minderheid van de inputs produceert vaak de meerderheid van de outputs—
      in verkoop, bugs, klanten, inspanning, functies, en meer. Concentreer je op de vitale weinigen.
    one_liner: 80% van de effecten komt voort uit 20% van de oorzaken—focus op de vitale weinigen.
    try_this:
      - Identificeer de 20% van inputs die 80% van de resultaten opleveren—zet daar extra op in.
      - Schrap of deprioriteer de 80% die weinig oplevert.
      - Vraag jezelf af: Welke paar dingen, als ik ze goed zou doen, zouden het meest van belang zijn?
    ask_yourself:
      - Verspreid ik mijn inspanningen gelijkmatig wanneer een paar dingen belangrijker zijn?
      - Wat is mijn hefboomwerking van 20%?
    in_more_detail: |
      Vilfredo Pareto observeerde dat 80% van het Italiaanse land eigendom was van 20% van de
      bevolking. Het principe is gegeneraliseerd: 80% van de omzet van 20% van de
      klanten, 80% van de bugs van 20% van de code, 80% van de resultaten van 20% van de inspanning.
      De exacte verhouding varieert, maar het patroon—onevenredige verdeling—is gebruikelijk.

      Het principe suggereert dat het identificeren en focussen op de high-leverage 20%
      de uitkomsten drastisch kan verbeteren. Het is een heuristiek voor prioritering, geen natuurwet.
    why_this_is_important: |
      Het toepassen van het Pareto principe helpt je meedogenloos te prioriteren, verspilling van inspanning aan activiteiten met weinig impact te voorkomen, en meer te bereiken met minder. Het is fundamenteel
      voor productiviteit en strategie.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - leiderschap
      - carrière_keuzes
    how_can_you_spot_it:
      uneven_distribution: |
        Een klein deel van X is verantwoordelijk voor een groot deel van Y.
      high_leverage_activities: |
        Een paar acties produceren de meeste resultaten.
      low_value_tail: |
        Veel activiteiten dragen weinig bij; het snoeien ervan heeft minimale impact.
      vital_few_vs_trivial_many: |
        De sleutel is het identificeren van welke weinige het meest van belang zijn.
    examples:
      sales: |
        20% van de klanten genereert 80% van de omzet—focus op het behouden en laten groeien daarvan.
      software: |
        20% van de functies drijft 80% van het gebruik aan—prioriteer die.
      productivity: |
        Een paar gewoonten of routines produceren het meeste van je output—zet daar extra op in.
      problems: |
        20% van de bugs veroorzaakt 80% van de crashes—los die eerst op.
    real_world_implications: |
      Het Pareto principe stuurt de toewijzing van middelen, productstrategie en
      persoonlijke productiviteit. Het negeren ervan leidt tot te dunne verspreiding van inspanning.
      Te veel toepassing ervan kan leiden tot verwaarlozing van de "long tail" waar het ertoe doet.
    professional_application:
      networking_and_relationship_building: |
        Identificeer de relaties die het meest van belang zijn voor je doelen. Investeer
        disproportionerend in die relaties in plaats van inspanning gelijk te verdelen.
      collaborative_learning_initiative: |
        Bij het verbeteren van teamprestaties, vind de 20% van interventies die
        80% van de resultaten opleveren. Focus training en proceswijzigingen daarop.
    how_can_this_be_misapplied:
      oversimplification: |
        Aannemen dat 80/20 overal van toepassing is; sommige verdelingen zijn evenrediger.
      neglecting_the_tail: |
        Het negeren van de "triviale velen" wanneer ze collectief van belang zijn (bijv. veel kleine
        klanten, randgevallen).
      false_precision: |
        Het behandelen van 80/20 als letterlijk in plaats van als een ruwe heuristiek.
      misidentifying_the_vital_few: |
        Focussen op de verkeerde 20% door gebrekkige analyse.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Wet van Parkinson
    quick_introduction: |
      De Wet van Parkinson stelt dat "werk zich uitbreidt om de tijd te vullen die beschikbaar is voor de voltooiing ervan." Geef een taak een week, en het duurt een week; geef het een dag, en het wordt vaak op een dag gedaan. Hetzelfde geldt voor budgetten, teamgrootte en middelen.
    one_liner: Werk breidt zich uit om de tijd te vullen die beschikbaar is voor de voltooiing ervan.
    try_this:
      - Stel strakkere deadlines om focus te dwingen en scope creep te voorkomen.
      - Vraag: Hoeveel minimale tijd zou dit redelijkerwijs kunnen duren?
      - Merk op wanneer extra tijd of middelen worden verbruikt zonder proportionele waarde.
    ask_yourself:
      - Vul ik de tijd, of eist het werk het daadwerkelijk op?
      - Zou een strakkere deadline betere prioritering afdwingen?
    in_more_detail: |
      C. Northcote Parkinson observeerde dat bureaucratieën groeien, ongeacht de hoeveelheid werk die gedaan moet worden. Hij merkte ook op dat taken zich uitbreiden om de beschikbare tijd te vullen — we passen onze inspanningen en tempo aan de deadline aan. Strakke deadlines kunnen focus afdwingen; losse deadlines nodigen uit tot uitstelgedrag en scope creep.

      De wet heeft implicaties voor projectmanagement, persoonlijke productiviteit en organisatieontwerp. Het suggereert dat beperkingen de resultaten kunnen verbeteren door prioritering af te dwingen.
    why_this_is_important: |
      Het begrijpen van de Wet van Parkinson helpt u betere deadlines te stellen, overbelasting van projecten met middelen te voorkomen en te herkennen wanneer "meer tijd" of "meer mensen" niet zal helpen — en mogelijk zal schaden. Beperkingen kunnen productief zijn.
    when_to_use:
      - besluitvorming
      - leiderschap
      - probleemoplossing
      - loopbaan_keuzes
    how_can_you_spot_it:
      deadline_driven_effort: |
        Werk versnelt naarmate de deadline nadert; weinig vooruitgang wanneer de deadline ver weg is.
      scope_expansion: |
        Projecten groeien om beschikbare middelen te vullen in plaats van gefocust te blijven.
      bureaucratic_growth: |
        Organisaties voegen mensen en processen toe, zelfs wanneer de werkdruk niet toeneemt.
      budget_exhaustion: |
        Budgetten worden volledig uitgegeven, ongeacht of de uitgaven noodzakelijk waren.
    examples:
      student_deadlines: |
        Een scriptie die over een maand ingeleverd moet worden, wordt in de laatste 48 uur geschreven.
      project_management: |
        Een project met een tijdlijn van 6 maanden duurt 6 maanden; dezelfde scope met een deadline van 3 maanden kan ook voltooid worden.
      meetings: |
        Een vergadering van 1 uur vult het uur, ook al volstonden 30 minuten.
      budgets: |
        Een afdeling besteedt het volledige budget voor het einde van het jaar om hetzelfde budget voor het volgende jaar te rechtvaardigen.
    real_world_implications: |
      De Wet van Parkinson beïnvloedt productiviteit, organisatieopblazing en resource-allocatie. Het suggereert dat kunstmatige beperkingen (kortere deadlines, kleinere teams) focus en efficiëntie kunnen verbeteren.
    professional_application:
      networking_and_relationship_building: |
        Stel duidelijke, strakke deadlines voor samenwerkingsverbanden om scope creep te voorkomen en momentum te behouden.
      collaborative_learning_initiative: |
        Gebruik time-boxing voor vergaderingen en projecten. Experimenteer met kortere deadlines om te testen of ze de focus verbeteren zonder kwaliteit op te offeren.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Het stellen van willekeurig korte deadlines die leiden tot burn-out of slechte kwaliteit.
      underresourcing: |
        Aannemen dat minder tijd of minder mensen altijd zal werken — sommige taken vereisen adequate middelen.
      blame_shifting: |
        Vertragingen toeschrijven aan de "Wet van Parkinson" wanneer het werk daadwerkelijk complex was.
      ignoring_quality: |
        Snel werk afronden om aan kunstmatige beperkingen te voldoen ten koste van duurzame resultaten.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Probabilistisch Denken
    quick_introduction: |
      Probabilistisch denken is de gewoonte om te redeneren in termen van waarschijnlijkheden in plaats van zekerheden. In plaats van "zal dit gebeuren?" vragen we "hoe waarschijnlijk is dit?"
      Het omarmt onzekerheid en gebruikt deze om betere beslissingen te nemen.
    one_liner: Denk in waarschijnlijkheden, niet in zekerheden - omarm onzekerheid.
    try_this:
      - Vervang "zal het gebeuren?" door "hoe waarschijnlijk is het?".
      - Overweeg meerdere scenario's en ken ruwe waarschijnlijkheden toe.
      - Werk je overtuigingen bij naarmate nieuw bewijs arriveert.
    ask_yourself:
      - Denk ik in binaire termen terwijl waarschijnlijkheden nauwkeuriger zouden zijn?
      - Wat is het bereik van plausibele uitkomsten?
    in_more_detail: |
      De meeste uitkomsten in de echte wereld zijn onzeker. Probabilistisch denken vervangt binaire
      ja/nee door gegradueerde overtuigingen. Het omvat het overwegen van meerdere scenario's,
      het toekennen van ruwe waarschijnlijkheden en het bijwerken naarmate bewijs binnenkomt. Het is het
      tegenovergestelde van overmoed en zwart-wit denken.

      Belangrijke praktijken zijn onder meer: denken in bereiken, rekening houden met basispercentages,
      het bijwerken van overtuigingen met bewijs, en het onderscheiden tussen risico (bekende waarschijnlijkheden)
      en onzekerheid (onbekende waarschijnlijkheden). Het verbetert kalibratie en
      beslissingskwaliteit.
    why_this_is_important: |
      Probabilistisch denken vermindert overmoed, verbetert voorspellingen en
      leidt tot betere beslissingen onder onzekerheid. Het is essentieel voor beleggen,
      strategie en elk domein waar de toekomst onzeker is.
    when_to_use:
      - besluitvorming
      - risico_beoordeling
      - beleggen
      - probleemoplossing
    how_can_you_spot_it:
      likelihood_language: |
        "Waarschijnlijk", "zeer waarschijnlijk", "onwaarschijnlijk" in plaats van "zal" of "zal niet".
      scenario_thinking: |
        Meerdere mogelijke toekomsten overwegen met ruwe waarschijnlijkheden.
      calibration: |
        Voorspellingen die na verloop van tijd overeenkomen met de werkelijke frequentie van uitkomsten.
      uncertainty_acknowledgment: |
        Expliciet aangeven wat je niet weet.
    examples:
      forecasting: |
        "Ik denk dat er 60% kans is dat we de deadline halen" in plaats van "We halen
        de deadline."
      investing: |
        "Dit heeft 30% kans op 2x en 70% kans op -50%" in plaats van
        "Dit gaat exploderen."
      strategy: |
        Plannen voor meerdere scenario's (best, basis, slechtste geval) met ruwe
        waarschijnlijkheden.
      hiring: |
        "Gebaseerd op het interview, schat ik de kans op 70% dat ze zullen slagen" in plaats van
        "Ze zijn een geweldige aanwinst."
    real_world_implications: |
      Probabilistisch denken verbetert de kalibratie, vermindert verrassingen en maakt
      beter risicobeheer mogelijk. Het is de kern van effectieve voorspellingen en
      besluitvorming onder onzekerheid.
    professional_application:
      networking_and_relationship_building: |
        Communiceer waar gepast in waarschijnlijkheden - "Ik ben redelijk zeker" versus
        "Ik ben zeker." Het bouwt vertrouwen op door epistemische nederigheid te signaleren.
      collaborative_learning_initiative: |
        Moedig teams aan om onzekerheid te uiten. Gebruik voorspellingsmarkten of
        kalibratie-oefeningen om probabilistisch oordeel te verbeteren.
    how_can_this_be_misapplied:
      false_precision: |
        Het toekennen van exacte waarschijnlijkheden (bv. 73%) wanneer je niet zo nauwkeurig kunt zijn.
      analysis_paralysis: |
        Nooit handelen omdat "we niet zeker kunnen zijn".
      hedging_overuse: |
        Alles zo veel nuanceren dat het nutteloos wordt.
      dismissing_intuition: |
        Te veel corrigeren om sterke intuïties te negeren wanneer deze geldige informatie kunnen bevatten.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Pygmalion Effect
    quick_introduction: |
      Het Pygmalion-effect (of Rosenthal-effect) is het fenomeen waarbij hogere
      verwachtingen leiden tot betere prestaties. Wanneer leraren, managers of
      anderen meer van iemand verwachten, presteert die persoon beter.
      Verwachtingen worden zelfvervullende voorspellingen.
    one_liner: Hogere verwachtingen leiden tot betere prestaties — verwachtingen vormen de realiteit.
    try_this:
      - Stel hoge maar haalbare verwachtingen; communiceer deze duidelijk.
      - Merk op wanneer lage verwachtingen iemands prestaties kunnen beperken.
      - Vraag: Wat verwacht ik impliciet — en hoe kan dat de resultaten beïnvloeden?
    ask_yourself:
      - Helpen mijn verwachtingen deze persoon of beperken ze hem/haar?
      - Zouden hogere verwachtingen veranderen hoe ik ze behandel — en hun resultaten?
    in_more_detail: |
      Robert Rosenthal en Lenore Jacobson gaven leraren valse informatie dat
      bepaalde studenten academisch zouden "opbloeien". Die studenten — willekeurig
      geselecteerd — verbeterden daadwerkelijk meer dan anderen. De verwachtingen van de leraren
      beïnvloedden hun gedrag (meer aandacht, warmere feedback), wat
      de prestaties van de studenten beïnvloedde. Verwachtingen vormen de realiteit.

      Het omgekeerde — lage verwachtingen die leiden tot slechtere prestaties — wordt soms
      het Golem-effect genoemd. Beide tonen aan dat onze overtuigingen over anderen hun
      resultaten kunnen beïnvloeden. Dit heeft verstrekkende gevolgen voor leiderschap,
      onderwijs en ouderschap.
    why_this_is_important: |
      Het begrijpen van het Pygmalion-effect helpt je de kracht van
      verwachtingen te benutten. Hoge verwachtingen, oprecht gecommuniceerd, kunnen de prestaties verbeteren.
      Lage verwachtingen kunnen zelfvervullende mislukkingen creëren.
      Je overtuigingen over anderen zijn belangrijk.
    when_to_use:
      - leiderschap
      - relatieopbouw
      - leren
      - besluitvorming
    how_can_you_spot_it:
      expectation_performance_link: |
        Degenen van wie we meer verwachten, presteren doorgaans beter.
      differential_treatment: |
        We behandelen mensen verschillend op basis van onze verwachtingen — vaak
        onbewust.
      self_fulfilling_prophecy: |
        Overtuigingen over capaciteit beïnvloeden het gedrag dat
        capaciteit vormt.
      teacher_student_dynamics: |
        Verwachtingen van docenten beïnvloeden de resultaten van studenten door
        differentiatie in behandeling.
    examples:
      education: |
        Leraren die verwachten dat studenten slagen, bieden meer ondersteuning;
        die studenten verbeteren. Leraren die falen verwachten, creëren dit
        mogelijk onbedoeld.
      workplace: |
        Managers die hoge prestaties verwachten van hun medewerkers, bieden meer
        kansen en feedback; de prestaties verbeteren.
      parenting: |
        Ouders die verwachten dat hun kinderen verantwoordelijk zijn, geven hen
        meer verantwoordelijkheid; zij groeien daarin mee.
      stereotypes: |
        Stereotypedreiging is het omgekeerde — negatieve verwachtingen
        kunnen de prestaties belemmeren.
    real_world_implications: |
      Het Pygmalion-effect beïnvloedt onderwijs, management en
      relaties. Het suggereert dat het verhogen van verwachtingen — wanneer
      ondersteunend gedaan — de resultaten kan verbeteren. Het waarschuwt ook dat
      lage verwachtingen destructief kunnen zijn.
    professional_application:
      networking_and_relationship_building: |
        Stel hoge verwachtingen voor mensen — en bied de ondersteuning
        om deze te realiseren. Geloof in potentieel. Je verwachtingen
        beïnvloeden je gedrag, dat hun resultaten beïnvloedt.
      collaborative_learning_initiative: |
        Creëer culturen van hoge verwachtingen met veel ondersteuning.
        Vermijd het labelen van mensen als "laag presterenden" op manieren die
        zelfvervullend worden. Investeer in degenen van wie je verwacht dat ze slagen.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Het stellen van verwachtingen die onmogelijk te vervullen zijn zonder
        ondersteuning leidt tot falen en demotivatie.
      blame_shifting: |
        "Ze voldeden niet aan de verwachtingen" terwijl wij niet de
        ondersteuning of voorwaarden voor succes boden.
      ignoring_constraints: |
        Verwachtingen alleen overwinnen geen structurele barrières.
      pressure_without_support: |
        Hoge verwachtingen zonder middelen of ondersteuning kunnen schadelijk zijn.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Regressie naar het gemiddelde
    quick_introduction: |
      Regressie naar het gemiddelde is het statistische fenomeen waarbij extreme uitkomsten
      doorgaans gevolgd worden door uitkomsten die dichter bij het gemiddelde liggen. Na een
      ongewoon goed of slecht resultaat, zal het volgende resultaat waarschijnlijk minder
      extreem zijn – niet vanwege een causale interventie, maar door willekeurige variatie.
    one_liner: Extreme uitkomsten worden doorgaans gevolgd door uitkomsten dichter bij het gemiddelde.
    try_this:
      - Schrijf "regressie" niet toe aan je interventie – het zou vaak toch al gebeurd zijn.
      - Na een extreem resultaat, verwacht dat het volgende resultaat minder extreem zal zijn.
      - Vraag jezelf af: is deze verandering te danken aan wat ik deed, of gewoon aan regressie naar het gemiddelde?
    ask_yourself:
      - Duid ik mijn interventie ten onrechte aan als oorzaak of gevolg van wat misschien willekeurige variatie is?
      - Zou dit gebeurd zijn zonder mijn actie?
    in_more_detail: |
      Als een student op één test ongewoon hoog scoort, zal diegene waarschijnlijk dichter bij het
      gemiddelde scoren bij de volgende test – niet omdat diegene "lui werd", maar omdat de eerste score
      deels geluk was. Hetzelfde geldt voor sportprestaties, beursrendementen en bedrijfsstatistieken.
      We schrijven de "regressie" vaak toe aan iets wat we hebben gedaan (bijv. straf of beloning),
      terwijl het toch al zou zijn gebeurd.

      Daniel Kahneman beschrijft hoe vlieginstructeurs ten onrechte concludeerden dat lof de prestaties
      verslechterde en kritiek deze verbeterde – ze observeerden regressie naar het gemiddelde na extreme
      prestaties.
    why_this_is_important: |
      Het begrijpen van regressie naar het gemiddelde voorkomt het verkeerd toeschrijven van oorzaken.
      Het helpt je om niet te overreageren op uitschieters en veranderingen door te voeren op basis van
      ruis. Het is essentieel voor het evalueren van interventies en prestaties.
    when_to_use:
      - besluitvorming
      - beleggen
      - risicobeoordeling
      - leiderschap
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Een ongewoon goed of slecht resultaat wordt gevolgd door een resultaat dichter bij het gemiddelde.
      spurious_causation: |
        Het toeschrijven van het "herstel" of "verlies" aan een interventie, terwijl regressie toch
        zou hebben plaatsgevonden.
      overreaction_to_outliers: |
        Het nemen van beleid of persoonlijke veranderingen op basis van een enkel extreem datapunt.
      reward_punishment_confusion: |
        Het geloven dat straf "werkte" wanneer de verbetering slechts regressie was.
    examples:
      sports: |
        Een speler heeft een carrièrewedstrijd, keert dan terug naar het gemiddelde – fans kunnen dit
        toeschrijven aan "complacence".
      investing: |
        Een aandeel heeft een geweldig jaar, keert dan terug – beleggers schrijven de daling
        mogelijk toe aan slecht management, terwijl het deels een terugkeer is naar het gemiddelde.
      performance_reviews: |
        Een werknemer heeft een slecht kwartaal, krijgt feedback, verbetert – de feedback krijgt
        mogelijk de eer, terwijl regressie sowieso zou zijn opgetreden.
      medicine: |
        Een patiënt voelt zich slechter, neemt een behandeling, verbetert – de behandeling krijgt
        mogelijk de eer, terwijl enige verbetering natuurlijk was.
    real_world_implications: |
      Regressie naar het gemiddelde beïnvloedt hoe we leraren, artsen, fondsmanagers en onszelf evalueren.
      Het verklaart waarom "wat omhoog gaat, moet ook omlaag" vaak statistisch opgaat. Misverstand leidt
      tot verspilde interventies en valse hoop in remedies.
    professional_application:
      networking_and_relationship_building: |
        Onderschat een enkele slechte interactie niet – het kan een uitschieter zijn die zal
        terugkeren naar het gemiddelde van de relatie.
      collaborative_learning_initiative: |
        Bij het evalueren van interventies (training, procesverbeteringen), gebruik controlegroepen
        en meerdere datapunten om effect te onderscheiden van regressie.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Aannemen dat elke verbetering na een interventie "gewoon regressie" is,
        terwijl er wel degelijk effecten bestaan.
      underreacting: |
        Echte problemen negeren omdat "het wel weer naar het gemiddelde zal gaan".
      statistical_illiteracy: |
        Regressie verwarren met een kracht die uitkomsten "corrigeert" – het is gewoon
        waarschijnlijkheid.
      overconfidence: |
        Aannemen dat het gemiddelde stabiel is wanneer het onderliggende proces mogelijk is veranderd.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Roze terugblik
    quick_introduction: |
      Roze terugblik is de neiging om het verleden beter te herinneren dan het
      werkelijk was. We herinneren ons vroegere ervaringen na verloop van tijd
      positiever, waarbij we moeilijkheden gladstrijken en het goede versterken.
      "Vroeger was alles beter" was vaak niet zo goed als we ons herinneren.
    one_liner: We herinneren ons het verleden beter dan het was—"vroeger was alles beter" was niet zo goed.
    try_this:
      - Vraag bij het vergelijken met het verleden: Wat voelde ik toen eigenlijk?
      - Houd een dagboek bij om de herinnering later met de realiteit te vergelijken.
      - Merk op wanneer nostalgie je oordeel over het heden kleurt.
    ask_yourself:
      - Idealiseer ik het verleden?
      - Zou ik toen gelukkig zijn geweest als ik terug in de tijd kon reizen?
    in_more_detail: |
      We hebben de neiging positieve aspecten van vroegere ervaringen te onthouden
      en de negatieve te vergeten of te minimaliseren. Vakanties, banen en relaties
      voelen nostalgisch beter dan ze op het moment zelf waren. Dit kan leiden tot
      onrealistische vergelijkingen — we beoordelen het heden aan de hand van een
      geïdealiseerd verleden.

      Roze terugblik beïnvloedt besluitvorming wanneer we vroegere keuzes herhalen
      en hetzelfde (herinnerde) resultaat verwachten. Het kan ook nostalgie aanwakkeren
      voor tijdperken die objectief slechter waren. Het is het tegenovergestelde van
      negativiteitsbias in het geheugen.
    why_this_is_important: |
      Het herkennen van roze terugblik helpt u realistischere vergelijkingen te maken
      en te voorkomen dat u vroegere fouten herhaalt op basis van geïdealiseerde
      herinneringen. Het verklaart ook waarom we soms verlangen naar het verleden
      ondanks huidige vooruitgang.
    when_to_use:
      - besluitvorming
      - carriere_keuzes
      - relatieopbouw
      - leren
    how_can_you_spot_it:
      idealized_past: |
        "Vroeger was het beter" terwijl objectieve metingen anders kunnen laten zien.
      selective_positive_memory: |
        Het goede herinneren en het slechte vergeten van vroegere ervaringen.
      nostalgia_as_evidence: |
        Het gebruiken van mooie herinneringen als bewijs dat vroegere keuzes juist waren.
      present_undervaluation: |
        Het heden voelt slechter dan het is omdat we vergelijken met een geïdealiseerd verleden.
    examples:
      career: |
        "Mijn oude baan was geweldig" terwijl je om goede redenen bent vertrokken—het geheugen heeft de frustraties gladgestreken.
      relationships: |
        "We waren zo gelukkig" over een vroegere relatie—de conflicten die tot het einde leidden vergeten.
      childhood: |
        "Kinderen hadden het vroeger beter" terwijl veel objectieve metingen (gezondheid, veiligheid, kansen) zijn verbeterd.
      projects: |
        "Dat project verliep soepel" terwijl het veel vertragingen had—we herinneren ons het resultaat, niet het proces.
    real_world_implications: |
      Roze terugblik beïnvloedt levensvoldoening, loopbaanbeslissingen en op
      nostalgie gebaseerde keuzes. Het kan leiden tot het herhalen van vroegere fouten
      of onrealistische vergelijkingen. Het verklaart ook de aantrekkingskracht van
      retoriek over "terug naar vroeger".
    professional_application:
      networking_and_relationship_building: |
        Bij het overwegen om opnieuw contact te leggen met vroegere collega's of terug te keren naar vroegere functies, scheid nostalgie van de realiteit. Documenteer destijds uw redenen om te vertrekken; bekijk deze opnieuw voordat u terugkeert.
      collaborative_learning_initiative: |
        Gebruik tijdens het evalueren van wat er werkelijk gebeurde in retrospectieven, contemporaine notities of gegevens in plaats van het geheugen. Geheugen strijkt moeilijkheden glad.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Niet alle nostalgie is misleidend—soms was het verleden op sommige gebieden echt beter.
      invalidating_memories: |
        Mensen vertellen dat hun positieve herinneringen "verkeerd" zijn, terwijl ze mogelijk oprechte subjectieve ervaringen weerspiegelen.
      overcorrection: |
        Aannemen dat het verleden altijd slechter was dan we ons herinneren—soms was het beter.
      present_bias: |
        Roze terugblik gebruiken als excuus om legitieme zorgen over huidige achteruitgang af te wijzen.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Opvallendheidsbias
    quick_introduction: |
      Opvallendheidsbias is de neiging om ons te richten op de meest prominente of
      merkbare aspecten van een situatie, terwijl we minder voor de hand liggende,
      maar potentieel belangrijke factoren over het hoofd zien. Wat opvalt, krijgt
      onevenredige aandacht en gewicht in onze oordelen.
    one_liner: Wat opvalt, krijgt onevenredige aandacht – het subtiele wordt over het hoofd gezien.
    try_this:
      - Vraag: Wat zie ik niet omdat het niet opvallend is?
      - Zoek actief naar minder voor de hand liggende factoren voordat u beslist.
      - Merk op wanneer een levendig of dramatisch element uw oordeel domineert.
    ask_yourself:
      - Weeg ik wat prominent is te zwaar en wat subtiel is te licht?
      - Welke belangrijke factoren zou ik kunnen over het hoofd zien?
    in_more_detail: |
      Opvallende informatie is levendig, emotioneel geladen of recent ervaren.
      Het trekt de aandacht en beïnvloedt beslissingen meer dan zou moeten. We
      wegen het opvallende te zwaar en het subtiele te licht. Een dramatische gebeurtenis
      of een levendig voorbeeld kan ons denken domineren, zelfs als het niet
      representatief is.

      Opvallendheidsbias overlapt met de beschikbaarheidsheuristiek (wat in gedachten komt)
      en de recentheidsbias (wat recent gebeurde). Het beïnvloedt risicoperceptie,
      werving en selectie, en strategie. De meest zichtbare problemen worden aangepakt;
      de onzichtbare woekeren voort.
    why_this_is_important: |
      Het herkennen van opvallendheidsbias helpt u verder te kijken dan het voor de hand liggende
      en minder zichtbare factoren te overwegen. Het verbetert risicobeoordeling,
      probleemdiagnose en de kwaliteit van beslissingen. Belangrijke dingen zijn niet
      altijd opvallend.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - risicobeoordeling
      - leiderschap
    how_can_you_spot_it:
      prominent_factor_dominance: |
        Het meest opvallende aspect stuurt de beslissing.
      overlooking_background: |
        Minder zichtbare factoren worden genegeerd ondanks hun belang.
      vividness_overweighting: |
        Dramatische of emotionele informatie krijgt onevenredig veel gewicht.
      visibility_bias: |
        Wat we gemakkelijk kunnen zien of meten, krijgt meer aandacht dan
        wat we niet kunnen.
    examples:
      risk: |
        Een vliegtuigcrash is opvallend – we overschatten het risico van vliegen.
        Autongevallen zijn minder opvallend in totaal – we onderschatten het risico
        van autorijden.
      hiring: |
        De presentatievaardigheden van een kandidaat zijn opvallend; hun
        doorzettingsvermogen is misschien minder zichtbaar, maar even belangrijk.
      strategy: |
        Acties van concurrenten zijn opvallend; geleidelijke markttrends zijn
        minder merkbaar, maar kunnen belangrijker zijn.
      problems: |
        De luidste klacht wordt aangepakt, terwijl systemische problemen
        onopgemerkt blijven.
    real_world_implications: |
      Opvallendheidsbias beïnvloedt wat aandacht, financiering en actie krijgt.
      Het kan leiden tot het aanpakken van symptomen in plaats van oorzaken en
      tot verkeerd toegewezen middelen. Bewust zoeken naar niet-opvallende
      informatie verbetert beslissingen.
    professional_application:
      networking_and_relationship_building: |
        Beoordeel mensen niet alleen op hun meest zichtbare eigenschappen. Kijk
        naar minder voor de hand liggende kwaliteiten – betrouwbaarheid, consistentie, hoe
        ze omgaan met mensen die hen niet kunnen helpen.
      collaborative_learning_initiative: |
        Vraag bij probleemoplossing expliciet: "Wat zien we over het hoofd?"
        en "Wat is minder opvallend maar belangrijk?" Creëer processen
        die niet-opvallende problemen aan het licht brengen.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Soms is wat opvallend is, belangrijk. Verwerp niet
        alles wat voor de hand ligt.
      false_sophistication: |
        Aannemen dat obscure factoren altijd belangrijker zijn
        dan voor de hand liggende factoren.
      analysis_paralysis: |
        Zoeken naar zoveel niet-opvallende factoren dat u nooit
        handelt op basis van de opvallende.
      contrarianism: |
        Opvallende informatie verwerpen puur om anders te zijn.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Schaarste Bias
    quick_introduction: |
      Schaarstebias is de neiging om meer waarde toe te kennen aan dingen wanneer deze schaars of beperkt lijken. "Beperkte tijd", "nog maar 3 op voorraad" en "exclusieve toegang" creëren urgentie en verlangen, vaak ten koste van een rationele evaluatie of we het ding daadwerkelijk nodig hebben of willen.
    one_liner: Schaarste vergroot de waargenomen waarde—"beperkt" creëert urgentie boven rationaliteit.
    try_this:
      - Vraag: Zou ik dit willen als het niet schaars was? Strip de urgentie weg.
      - Pauzeer voordat u reageert op aanbiedingen met "beperkte tijd" of "nog maar X beschikbaar".
      - Merk op wanneer schaarste uw verlangen meer aanwakkert dan werkelijke waarde.
    ask_yourself:
      - Waardeer ik dit omdat het schaars is, of omdat ik het daadwerkelijk nodig heb?
      - Zou ik deze beslissing nemen zonder de schaarste framing?
    in_more_detail: |
      Schaarste vergroot de waargenomen waarde. Wanneer iets zeldzaam is of verdwijnt, willen we het meer—deels omdat schaarste kwaliteit kan signaleren, en deels omdat verliesaversie ons bang maakt om iets te missen. Marketeers en onderhandelaars gebruiken schaarste om urgentie te creëren. De bias kan leiden tot impulsieve beslissingen, te veel uitgeven en slechte prioritering.

      Schaarste beïnvloedt ook de cognitieve bandbreedte van mensen die daadwerkelijk beperkte middelen hebben; armoede kan de "mentale bandbreedte" voor andere beslissingen verminderen.
    why_this_is_important: |
      Het herkennen van schaarstebias helpt u manipulatieve tactieken te weerstaan en meer weloverwogen keuzes te maken. Het verklaart ook waarom we limited editions te veel waarderen en haasten wanneer dat niet nodig is.
    when_to_use:
      - besluitvorming
      - onderhandeling
      - beleggen
      - risicobeoordeling
    how_can_you_spot_it:
      urgency_trigger: |
        "Beperkte tijd" of "nog maar X beschikbaar" creëert onevenredig veel verlangen.
      fear_of_missing_out: |
        De mogelijkheid om toegang te verliezen drijft actie meer dan de intrinsieke waarde.
      impulsive_purchases: |
        Dingen kopen omdat ze schaars zijn in plaats van omdat u ze nodig hebt.
      artificial_scarcity: |
        Schaarste wordt gecreëerd (bijv. nep-tijdelimiters) in plaats van echt te zijn.
    examples:
      sales: |
        "Nog maar 2 op voorraad" of "Uitverkoop eindigt vanavond" triggert aankopen die zonder de urgentie niet zouden plaatsvinden.
      auctions: |
        Bieders raken verstrikt in het winnen en betalen meer dan gepland vanwege competitieve schaarste.
      exclusivity: |
        "Alleen voor leden" of "Alleen op uitnodiging" toegang verhoogt de waargenomen waarde.
      genuine_scarcity: |
        Wanneer middelen werkelijk beperkt zijn, nemen mensen onder schaarstesto stress slechtere beslissingen (bijv. de armen, de tijdsgeïnteresseerden).
    real_world_implications: |
      Schaarstebias stuurt consumentengedrag, onderhandelingsresultaten en beleidsreacties. Het kan ethisch (bijv. legitieme deadlines) of onethisch (bijv. nep-schaarste) worden gebruikt. Begrip ervan verbetert de beslissingskwaliteit.
    professional_application:
      networking_and_relationship_building: |
        Wees voorzichtig wanneer anderen kunstmatige schaarste creëren ("Ik neem maar een paar klanten aan"). Verifieer of de schaarste echt is. Bij het opbouwen van relaties kan echte schaarste van uw tijd waarde aangeven—maar overmatig gebruik voelt manipulatief.
      collaborative_learning_initiative: |
        Zorg bij het creëren van urgentie voor initiatieven ervoor dat deze legitiem is. Valse deadlines ondermijnen het vertrouwen wanneer ze ontdekt worden.
    how_can_this_be_misapplied:
      manipulation: |
        Opzettelijk valse schaarste creëren om anderen tot beslissingen te dwingen.
      impulsive_decisions: |
        Belangrijke keuzes maken onder kunstmatige urgentie wanneer meer tijd de resultaten zou verbeteren.
      overvaluing_scarcity: |
        Aannemen dat schaarse dingen altijd beter zijn—soms is schaarste willekeurig.
      exploiting_vulnerability: |
        Schaarst tactieken gebruiken op mensen die al onder middelenstress staan.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Denken in de tweede orde
    quick_introduction: |
      Denken in de tweede orde is de praktijk van het overwegen van de gevolgen van
      de gevolgen van uw acties. Eerste-orde denken vraagt "wat gebeurt er als ik
      X doe?" Denken in de tweede orde vraagt "en dan wat?" en "en dan wat daarna?" Het brengt onbedoelde effecten aan het licht.
    one_liner: Vraag "en dan wat?" — overweeg de gevolgen van de gevolgen.
    try_this:
      - Vraag voor elke beslissing minstens twee keer "en dan wat?".
      - Bedenk hoe anderen zullen reageren op uw actie — en dan op die reactie.
      - Merk op wanneer de effecten van de eerste orde zich omkeren of compliceren in de keten.
    ask_yourself:
      - Heb ik de effecten van de tweede (en derde) orde doordacht?
      - Welke onbedoelde gevolgen mis ik mogelijk?
    in_more_detail: |
      Howard Marks populariseerde het concept in investeringen. Eerste orde: "Dit zal
      stijgen." Tweede orde: "Als het stijgt, zullen anderen het opmerken, meer zullen kopen,
      het zal meer stijgen — totdat het overgewaardeerd raakt en instort." De keten van
      gevolgen keert het effect van de eerste orde vaak om of compliceert het.

      Denken in de tweede orde is moeilijker — het vereist meer mentale inspanning en
      verbeelding. Maar het voorkomt veel fouten. Goede strategen denken meerdere
      stappen vooruit en overwegen hoe anderen zullen reageren.
    why_this_is_important: |
      Denken in de tweede orde voorkomt onbedoelde gevolgen en verbetert de
      kwaliteit van beslissingen. Het is essentieel voor strategie, beleid en elk domein
      waar acties reacties teweegbrengen.
    when_to_use:
      - besluitvorming
      - probleemoplossing
      - strategie
      - risicobeoordeling
    how_can_you_spot_it:
      consequence_chains: |
        "Als ik X doe, dan gebeurt Y, dan gebeurt Z..."
      reaction_anticipation: |
        Overwegen hoe anderen zullen reageren op uw actie.
      unintended_effects: |
        Zoeken naar neveneffecten en feedbackloops.
      reversals: |
        Effecten van de tweede orde die de effecten van de eerste orde tegenspreken of omkeren.
    examples:
      investing: |
        "Als iedereen denkt dat dit een goede investering is, is het waarschijnlijk druk —
        het voordeel kan verdwenen zijn."
      policy: |
        "Als we X subsidiëren, neemt de vraag toe, stijgen de prijzen — helpt de subsidie
        daadwerkelijk?"
      negotiation: |
        "Als ik hier hard aandring, zullen ze daar terugslaan — wat is het netto-effect?"
      incentives: |
        "Als we dit metrik belonen, zullen mensen het proberen te manipuleren — wat zullen ze
        daadwerkelijk doen?"
    real_world_implications: |
      Denken in de tweede orde is het kenmerk van strategisch denken. Het voorkomt
      beleidsfalen, onbedoelde prikkels en naïef optimisme. Het
      onderscheidt goede van geweldige besluitvormers.
    professional_application:
      networking_and_relationship_building: |
        Vraag voordat u een actie onderneemt: "Hoe zullen zij reageren? En hoe zal ik
        daarop reageren?" Overweeg de relatie-dynamiek, niet alleen de directe
        uitwisseling.
      collaborative_learning_initiative: |
        Voer tijdens het plannen "en dan wat?"-oefeningen uit. Breng gevolgketens in kaart.
        Identificeer onbedoelde effecten voordat ze aan het licht komen.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Te veel stappen vooruit denken waardoor u nooit actie onderneemt.
      false_complexity: |
        Aannemen dat effecten van de tweede orde altijd domineren wanneer effecten van de eerste orde
        voldoende kunnen zijn.
      overconfidence: |
        Geloven dat u lange ketens kunt voorspellen wanneer onzekerheid zich opstapelt.
      pessimism: |
        Altijd het slechtste aannemen in de keten van gevolgen.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Sunk Cost Fallacy
    quick_introduction: |
      The sunk cost fallacy is the tendency to continue investing in a decision because
      of the resources already spent, rather than based on future expected returns.
      "We've come this far" or "I've already invested so much" leads to throwing good
      money after bad.
    one_liner: Past investment is gone—only future costs and benefits matter.
    try_this:
      - Ask: If I were starting today, would I choose this path?
      - Define "kill criteria" in advance—conditions under which you'll stop.
      - Evaluate the marginal decision: what do I gain or lose from here forward?
    ask_yourself:
      - Am I continuing because of future value, or to justify past investment?
      - What would I advise a friend who was in my position from scratch?
    in_more_detail: |
      Sunk costs are past costs that cannot be recovered. Rational decision-making
      ignores them—only future costs and benefits matter. But we're emotionally
      attached to our investments. We finish the meal we're not enjoying, stay in the
      movie we dislike, and continue projects that no longer make sense. We want to
      "not waste" what we've put in, but continuing often wastes more.

      The fallacy is especially strong when we've invested time, effort, or identity,
      not just money. Admitting we were wrong can feel costly, so we double down.
    why_this_is_important: |
      Recognizing the sunk cost fallacy helps you cut losses, change direction when
      warranted, and make decisions based on future value rather than past investment.
      It's essential for projects, careers, and relationships.
    when_to_use:
      - decision-making
      - investing
      - career_moves
      - risk_assessment
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "We can't stop now—we've already spent X" when future returns don't justify
        continuing.
      escalation_of_commitment: |
        Investing more to justify or "salvage" prior investment.
      identity_investment: |
        Continuing because admitting failure would threaten self-image.
      ignoring_marginal_analysis: |
        Basing decisions on total cost rather than incremental cost and benefit.
    examples:
      projects: |
        Continuing a failing project because "we've already spent 6 months on it"
        when cutting losses would be rational.
      relationships: |
        Staying in a relationship because "we've been together 5 years" rather than
        evaluating the future.
      careers: |
        Remaining in a career you dislike because you've invested in the degree or
        years of experience.
      investments: |
        Holding a losing stock to "get back to even" rather than reallocating to
        better opportunities.
    real_world_implications: |
      The sunk cost fallacy causes wasted resources, prolonged failures, and missed
      opportunities. It affects individuals, organizations, and governments.
      Overcoming it requires explicit decision frameworks.
    professional_application:
      networking_and_relationship_building: |
        Don't continue investing in relationships or collaborations that no longer
        serve you just because of past investment. Evaluate forward-looking value.
      collaborative_learning_initiative: |
        Create "kill criteria" for projects—conditions under which you'll stop
        regardless of past investment. Review projects periodically with a "from
        zero" lens.
    how_can_this_be_misapplied:
      quitting_too_early: |
        Using "sunk cost" as an excuse to abandon things that need more time to pay off.
      undervaluing_consistency: |
        Some commitments (e.g., relationships, reputation) have value in continuity
        that pure marginal analysis misses.
      cold_rationality: |
        Dismissing emotional attachment as irrational when it may reflect genuine
        values.
      analysis_paralysis: |
        Overthinking whether to continue when the answer is clear.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Survivorship bias
    quick_introduction: |
      Survivorship bias is de logische denkfout waarbij men zich richt op mensen of
      dingen die een proces hebben "overleefd" en degenen die dat niet hebben gedaan
      over het hoofd ziet. We zien de winnaars en vergeten de verliezers, wat leidt tot
      te optimistische conclusies over succes en falen.
    one_liner: We zien de winnaars en vergeten de verliezers—wat leidt tot te optimistische conclusies.
    try_this:
      - Vraag: Wie faalde er bij iets soortgelijks? Wat kunnen we van hen leren?
      - Zoek de "onzichtbare" steekproef—degenen die het niet hebben overleefd.
      - Merk op wanneer je alleen maar succesverhalen bestudeert.
    ask_yourself:
      - Leer ik alleen van overlevenden?
      - Hoe zou het volledige plaatje eruitzien als ik de mislukkingen zou meenemen?
    in_more_detail: |
      Tijdens de Tweede Wereldoorlog corrigeerde statisticus Abraham Wald de plaatsing
      van bepantsering op bommenwerpers door te analyseren waar overlevende vliegtuigen
      werden geraakt—en bepantsering aan te bevelen waar de *niet*-overlevende vliegtuigen
      werden geraakt, aangezien die vliegtuigen nooit terugkeerden. We richten ons van
      nature op de zichtbare steekproef (overlevenden) en negeren de onzichtbare (degenen
      die faalden).

      Survivorship bias vertekent ons beeld van ondernemerschap, investeringen,
      carrières en geschiedenis. We bestuderen succesvolle bedrijven en missen de
      duizenden die faalden met vergelijkbare dingen. We horen van de gelukkigen en
      vergeten de ongelukkigen.
    why_this_is_important: |
      Correctie voor survivorship bias leidt tot realistischere verwachtingen en
      betere beslissingen. Het helpt je te leren van mislukkingen, niet alleen van
      successen, en te voorkomen dat je strategieën kopieert die alleen voor de
      gelukkige weinigen werkten.
    when_to_use:
      - besluitvorming
      - investeren
      - carrière_keuzes
      - leren
    how_can_you_spot_it:
      visible_success_stories: |
        We horen veel vaker van succesvolle mensen dan van degenen die het probeerden en
        faalden.
      missing_failures: |
        De steekproef die we observeren sluit degenen uit die het niet hebben "gemaakt"
        en dus hun verhalen niet kunnen vertellen.
      copying_survivors: |
        Aannemen dat wat overlevenden deden hun succes veroorzaakte, terwijl het geluk
        of survivorship had kunnen zijn.
      overly_optimistic_models: |
        Schattingen van succespercentages die de noemer van pogingen negeren.
    examples:
      entrepreneurship: |
        "Stop met studeren zoals Zuckerberg" negeert de vele studenten die uitvielen en
        geen bedrijven van miljarden dollars oprichtten.
      investing: |
        Alleen fondsen bestuderen die overleefden, negeert de fondsen die na slechte
        prestaties werden gesloten, waardoor historische rendementen worden opgeblazen.
      career_advice: |
        Succesvolle mensen schrijven succes toe aan hard werken; we horen niet van degenen
        die hard werkten en faalden.
      historical_analysis: |
        Het bestuderen van "geweldige" bedrijven die overleefden, negeert de vele die
        faalden met vergelijkbare strategieën.
    real_world_implications: |
      Survivorship bias blaast vermeende succespercentages op, vertekent rolmodellen
      en leidt tot slechte imitatie. Correctie hiervoor vereist het zoeken naar
      falen-gevallen en het begrijpen van basispercentages.
    professional_application:
      networking_and_relationship_building: |
        Zoek bij het vragen om advies ook mensen die het probeerden en faalden—hun
        perspectieven zijn vaak informatiever dan die van overlevenden.
      collaborative_learning_initiative: |
        Bestudeer mislukte projecten en stopgezette initiatieven, niet alleen succesvolle.
        Voer "faal-postmortems" uit om te leren van wat niet werkte.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Te veel corrigeren om aan te nemen dat succes altijd geluk is en inspanning er niet
        toe doet.
      dismissing_success: |
        Weigeren te leren van succesvolle mensen vanwege "survivorship bias".
      analysis_paralysis: |
        Zo gefocust zijn op faal-gevallen dat je nooit actie onderneemt.
      false_equivalence: |
        Strategieën van overlevenden en niet-overlevenden als even informatief behandelen
        wanneer de context verschilt.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Zeigarnik-effect
    quick_introduction: |
      Het Zeigarnik-effect is de neiging om onvoltooide of onderbroken
      taken beter te onthouden dan voltooide taken. Onvoltooide taken creëren psychologische
      spanning die ze actief houdt in onze geest. Onze hersenen houden vast aan wat nog
      onafgemaakt is.
    one_liner: Onvoltooide taken blijven hangen in ons geheugen—onze hersenen houden vast aan wat incompleet is.
    try_this:
      - Gebruik voltooiing om taken uit je mentale belasting te "bevrijden"—voltooi ze of gooi ze expliciet weg.
      - Breek werk op in behapbare brokken om productieve open eindjes te creëren.
      - Merk op wanneer je blijft piekeren over onafgemaakte zaken—sluit de cirkel of beslis om het los te laten.
    ask_yourself:
      - Welke onvoltooide taken creëren spanning in mijn geest?
      - Is dit open eindje het waard om te bewaren, of kan ik het sluiten?
    in_more_detail: |
      Bluma Zeigarnik observeerde dat obers onbetaalde bestellingen beter onthielden
      dan betaalde bestellingen—zodra de taak voltooid was, werd deze uit het
      geheugen "bevrijd". Onvoltooide taken creëren een open eindje dat om sluiting vraagt. Dit
      drijft zowel productieve focus (we willen afronden) als angst (we kunnen niet stoppen met nadenken over wat er nog moet gebeuren).

      Het effect wordt gebruikt in marketing (cliffhangers, incomplete verhalen) en
      productiviteit (werk opbreken in brokken om meerdere "open eindjes" te creëren).
      Het verklaart waarom we blijven piekeren over onafgemaakte zaken en waarom takenlijsten
      overweldigend kunnen aanvoelen.
    why_this_is_important: |
      Het begrijpen van het Zeigarnik-effect helpt je om de mentale belasting te beheren,
      boeiende ervaringen te ontwerpen en onderbrekingen strategisch te gebruiken. Het verklaart
      waarom we niet kunnen stoppen met nadenken over onafgemaakt werk—en waarom dat
      benut kan worden of schadelijk kan zijn.
    when_to_use:
      - probleemoplossing
      - leiderschap
      - leren
      - besluitvorming
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Onvoltooide taken dringen zich meer op aan gedachten dan voltooide taken.
      better_recall_of_unfinished: |
        We onthouden onderbroken taken beter dan voltooide taken.
      tension_for_closure: |
        Onbehagen of de drang om te voltooien wat begonnen is.
      serial_dramas: |
        Cliffhangers en "wordt vervolgd" maken misbruik van het effect.
    examples:
      productivity: |
        Het starten van een taak creëert mentale spanning die aanzet tot voltooiing—of
        angst als er te veel open eindjes zijn.
      marketing: |
        "Deel 1 van 3" of "Wordt vervolgd" houdt het publiek betrokken en zorgt ervoor dat ze terugkomen.
      meetings: |
        Het beëindigen van een vergadering zonder duidelijke vervolgstappen laat deelnemers
        achter met onopgeloste spanning.
      learning: |
        Onbeantwoorde vragen of onvolledige uitleg blijven hangen in het geheugen
        en stimuleren verder onderzoek.
    real_world_implications: |
      Het Zeigarnik-effect beïnvloedt productiviteit, betrokkenheid en mentale
      belasting. Het kan worden ingezet voor focus of overweldiging veroorzaken. Het
      verklaart de aantrekkingskracht van cliffhangers en de last van te veel
      openstaande taken.
    professional_application:
      networking_and_relationship_building: |
        Beëindig gesprekken met duidelijke vervolgstappen—of opzettelijke open
        eindjes als je wilt dat de andere persoon volgt. Opgeloste gespreksdraden creëren betrokkenheid.
      collaborative_learning_initiative: |
        Gebruik het Zeigarnik-effect in training: stel problemen of vragen
        voor pauzes om cursisten betrokken te houden. Maar vermijd het creëren van zoveel open
        eindjes dat mensen zich overweldigd voelen.
    how_can_this_be_misapplied:
      overwhelm: |
        Het creëren van te veel open eindjes—te veel onvoltooide taken—leidt tot
        angst en verlamming.
      manipulation: |
        Opzettelijk dingen onopgelost laten om afhankelijkheid of betrokkenheid te creëren.
      false_urgency: |
        Het effect gebruiken om kunstmatige urgentie te creëren wanneer die er niet is.
      incomplete_work: |
        Veel dingen beginnen om "spanning" te creëren zonder ze daadwerkelijk
        te voltooien—wat leidt tot versnipperde inspanning.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Nul-sommen-denken
    quick_introduction: |
      Nul-sommen-denken is de overtuiging dat de winst van de één het verlies van de ander moet zijn—dat middelen beperkt zijn en elk voordeel voor jou nadeel voor mij betekent.
      In werkelijkheid zijn veel situaties positief-som: beide partijen kunnen winnen.
    one_liner: Jouw winst hoeft niet mijn verlies te zijn—veel situaties zijn positief-som.
    try_this:
      - Vraag: Kunnen we de taart vergroten? Is dit werkelijk nul-som?
      - Zoek naar samenwerking voordat je competitie aanneemt.
      - Merk op wanneer je een situatie als vaststaand behandelt terwijl dat niet zo is.
    ask_yourself:
      - Ga ik uit van een vaste taart terwijl we die zouden kunnen vergroten?
      - Zou samenwerking meer waarde creëren dan competitie?
    in_more_detail: |
      In een nul-som spel is het totaal vast—jouw winst is mijn verlies. In positief-som situaties creëert samenwerking waarde. Handel, innovatie en het opbouwen van relaties zijn vaak positief-som. Nul-som denken leidt tot onnodige competitie, gemiste kansen voor samenwerking en destructieve rivaliteit.

      De bias komt veel voor in onderhandelingen, politiek en organisatorische dynamiek.
      Het gaat uit van een vaste taart terwijl de taart vaak vergroot kan worden. Het kan self-fulfilling worden: als je anderen als tegenstanders behandelt, worden ze tegenstanders.
    why_this_is_important: |
      Het herkennen van nul-som denken opent kansen voor samenwerking en waardecreatie. Het verbetert onderhandelingen, vermindert conflicten en maakt win-winresultaten mogelijk. Veel van de beste kansen zijn positief-som.
    when_to_use:
      - onderhandeling
      - leiderschap
      - relatie_opbouwen
      - besluitvorming
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "Als zij winnen, verlies ik" terwijl de situatie beide kan laten winnen.
      competitive_ framing: |
        Situaties automatisch framen als wij-tegen-zij.
      envy_of_others_gains: |
        Anderen hun succes benijden alsof het het jouwe vermindert.
      missed_cooperation: |
        Kansen voor samenwerking missen die iedereen ten goede zouden komen.
    examples:
      negotiation: |
        Aannemen dat een betere deal voor de ander een slechtere deal voor jou betekent—terwijl creatieve oplossingen vaak waarde voor beide partijen vergroten.
      salary: |
        "Als mijn collega loonsverhoging krijgt, is er minder voor mij" terwijl budgetten flexibel kunnen zijn of loonsverhogingen gerechtvaardigd kunnen worden door gecreëerde waarde.
      politics: |
        "De winst van hun partij is ons verlies" terwijl veel beleidsuitkomsten meerdere groepen ten goede zouden kunnen komen.
      career: |
        "Hun promotie betekent minder kansen voor mij" terwijl organisatorische groei meer kansen voor iedereen kan creëren.
    real_world_implications: |
      Nul-som denken voedt conflicten, beperkt samenwerking en leidt tot gemiste kansen. Het is vaak onjuist in economie, relaties en innovatie. Overstappen naar een positief-som framing verbetert resultaten.
    professional_application:
      networking_and_relationship_building: |
        Zoek naar manieren om waarde te creëren voor anderen—hun succes kan kansen voor jou creëren. Bouw relaties op waarbij beide partijen profiteren.
      collaborative_learning_initiative: |
        Frame teamdoelen als positief-som: gedeeld succes, de taart vergroten.
        Stimuleer samenwerking boven interne competitie.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Sommige situaties zijn nul-som (bijv. een enkele promotie, een vast budget).
        Doen alsof dit niet zo is, kan naïef zijn.
      naive_cooperation: |
        Aannemen dat iedereen zal samenwerken wanneer sommige actoren echt tegenstanders zijn.
      undervaluing_competition: |
        Competitie kan verbetering stimuleren; niet alle rivaliteit is destructief.
      exploitation: |
        Het gebruik van een "positief-som" framing om waarde te onttrekken aan anderen die er niet van profiteren.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
