# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Japanese)
# Consolidated from mental-models-ja/

mental_models:
  - id: ambiguity_effect
    name: あいまいさ効果
    quick_introduction: |
      あいまいさ効果とは、結果の確率に関する情報がない場合に、選択肢を避ける傾向のことです。
      たとえ未知のリスクの方が優れている可能性がある場合でも、私たちは既知のリスクを未知のリスクよりも好みます。
      不確実性そのものが嫌悪感を与えます。
    one_liner: たとえ未知の方が優れている可能性がある場合でも、私たちは既知のリスクを未知のリスクよりも好みます。
    try_this:
      - Ask: Am I avoiding this option mainly because of uncertainty, or is there a real downside? (この選択肢を避けているのは、主に不確実性のせいなのか、それとも実際に欠点があるのか？)
      - Quantify what you do know; sometimes the ambiguous option has clearer upside. (分かっていることを定量化してください。あいまいな選択肢の方が、より明確なメリットがある場合もあります。)
      - Notice when you default to the familiar just because it feels safer. (より安全だと感じるという理由だけで、慣れ親しんだものにデフォルトしていることに気づいてください。)
    ask_yourself:
      - Am I rejecting something because it's ambiguous, or because it's genuinely worse? (あいまいだから、それとも本当に悪いから、何かを拒否しているのだろうか？)
      - What would I need to know to feel comfortable with the uncertain option? (不確実な選択肢に納得するために、何を知る必要があるだろうか？)
    in_more_detail: |
      エルズバーグのパラドックスでは、人々は、たとえ未知の壺の方が有利な確率を提供する可能性がある場合でも、
      割合が既知の壺への賭けを、割合が未知の壺への賭けよりも好みます。
      私たちはあいまいさを嫌います。不明確な確率よりも、明確な（たとえ悪い）確率を望みます。

      この効果は、投資、キャリア選択、政策決定に影響を与えます。
      あいまいだが潜在的に優れた選択肢を避けることで、最適ではない選択につながる可能性があります。
      また、なぜ私たちが馴染みのあるブランドや既知の数量を好むのかも説明しています。
    why_this_is_important: |
      あいまいさ効果を認識することは、馴染みのあるものを過度に好み、不確実なものを過小評価することを避けるのに役立ちます。
      あいまいさが管理可能である場合に、機会を逃す可能性があります。
      また、透明性と明確さが不安を軽減する理由も説明しています。
    when_to_use:
      - decision-making
      - risk_assessment
      - investing
      - career_moves
    how_can_you_spot_it:
      preference_for_known_risks: |
        あいまいなものよりも、明確な（たとえ悪い）確率を持つ選択肢を選ぶこと。
      avoidance_of_uncertainty: |
        「十分な情報がない」という理由で選択肢を拒否すること。
      familiarity_over_optimality: |
        未知の、より優れた可能性よりも、既知のものを好むこと。
      information_seeking: |
        あいまいさを減らすための情報にお金を払う意思があること。たとえそれが決定を変えなくても。
    examples:
      investing: |
        分散投資のメリットがあるにもかかわらず、「より理解している」という理由で、
        国内株を国際株よりも好むこと。
      employment: |
        不確実なアップサイドのある役職に就くよりも、既知の仕事にとどまること。
      product_choice: |
        不確実な品質の新しい選択肢よりも、馴染みのあるブランドを選ぶこと。
      medical: |
        たとえ後者の方が良い場合でも、副作用が既知の治療法を、結果が不確実な治療法よりも好むこと。
    real_world_implications: |
      あいまいさ効果は、市場、キャリア選択、政策を形成します。
      より明確な情報を提供したり、決定を再構築したりすることで軽減できます。
      また、透明性とコミュニケーションが不安を軽減する理由も説明しています。
    professional_application:
      networking_and_relationship_building: |
        人間関係におけるあいまいさを減らす：期待を明確にし、明確にコミュニケーションを取り、不確実性を減らします。
        人々は既知の状況を好みます。
      collaborative_learning_initiative: |
        変化を導入する際は、あいまいさを減らします。何が起こるか、いつ、なぜ起こるかについて明確な情報を提供します。
        あいまいさは抵抗を増加させます。
    how_can_this_be_misapplied:
      manipulation: |
        人々を好ましい選択肢に誘導するために、意図的にあいまいさを作り出すこと。
      false_clarity: |
        真の不確実性が存在する際に、偽の確実性を提供すること。
      overconfidence: |
        あいまいさを減らすことが常に決定を改善すると仮定すること。時にはあいまいな選択肢の方が本当に良い場合もあります。
      analysis_paralysis: |
        一部のあいまいさが避けられない状況で、決定を下す前に完璧な情報を待つこと。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: アンカリングバイアス
    quick_introduction: |
      アンカリングバイアスとは、意思決定を行う際に、最初に出会った情報に過度に依存する傾向のことです。その最初の「アンカー」は、たとえそれが無関係または恣意的なものであっても、その後の判断を歪めます。
    one_liner: 最初に見る数字が、その後に続くすべての数字を形作ります。
    try_this:
      - 交渉の前に、目標とする数字を決め、相手のアンカーに引きずられないようにしましょう。
      - 推定を行う際は、他の人の意見を聞く前に、まず自分自身の数字を生成しましょう。
      - 質問しましょう：最初に別の数字を見ていたら、考え方は変わっていましたか？
    ask_yourself:
      - 最初に遭遇した数字またはアイデアは何ですか？それは私の判断を歪めていませんか？
      - アンカーから十分に調整できていますか、それともまだ近すぎますか？
    in_more_detail: |
      古典的な実験では、国連におけるアフリカ諸国の割合を推定するように求められた人々は、より高い数字（例：65対10）を見た後に、より高い推定値を示しました。アンカーは、たとえランダムであっても、彼らの回答に影響を与えました。アンカリングは、交渉、価格設定、採用、予測に影響します。

      最初に見る数字は参照点となります。私たちはそこから調整しますが、通常は不十分です。アンカーが恣意的であることを知っていても、それは私たちに影響を与える可能性があります。専門家も例外ではありません。
    why_this_is_important: |
      アンカリングを理解することは、より良い意思決定を行い、より効果的に交渉し、操作されるのを避けるのに役立ちます。また、情報の順序とフレーミングがなぜそれほど重要なのかも説明します。
    when_to_use:
      - 意思決定
      - 交渉
      - 投資
      - リスク評価
    how_can_you_spot_it:
      first_number_dominance: |
        交渉や推定における最初の数字は、結果に不釣り合いな影響を与えます。
      insufficient_adjustment: |
        アンカーから調整する際、人々は通常、十分に調整しません。
      arbitrary_anchor_influence: |
        明らかに無関係な数字（例：社会保障番号の下桁）でさえ、推定値に影響を与える可能性があります。
      order_effects: |
        オプションが提示される順序によって、選択が変わります。
    examples:
      salary_negotiation: |
        雇用主または候補者が最初に言及した数字は、しばしば最終的なオファーのアンカーとなります。
      real_estate: |
        リスティング価格は、意図的に高くまたは低く設定されていても、買い手の価値認識をアンカーします。
      retail: |
        「通常99ドル、今なら49ドル」は、元の価格をアンカーとして使用し、販売価格がお得であるかのように見せかけます。
      forecasting: |
        計画会議における初期の推定値は、最初の推定値が推測であったとしても、その後の予測をアンカーします。
    real_world_implications: |
      アンカリングは市場、交渉、政策を形作ります。倫理的（例：合理的な期待の設定）または非倫理的（例：操作的な価格設定）に使用できます。それを認識することで、意思決定の質が向上します。
    professional_application:
      networking_and_relationship_building: |
        交渉においては、最初のオファーをしてアンカーを設定することを検討するか、相手がそうしている場合はそれに注意しましょう。
      collaborative_learning_initiative: |
        会議においては、推定値について誰が最初に話すかに注意しましょう。議論の前に、独立した推定値を収集することを検討しましょう。
    how_can_this_be_misapplied:
      manipulation: |
        操作的な価格設定：極端なアンカーを意図的に使用して、他人を望ましい結果に誘導すること。
      overconfidence_in_anchors: |
        アンカーへの過信：自分の最初の推定値を再検討せずに、それを過剰に信頼すること。
      ignoring_relevant_information: |
        関連情報の無視：アンカーに、より関連性の高いデータを優先させること。
      exploitation: |
        搾取：誇張された「比較対象価格」を使用して、実際の価格を妥当に見せる販売手法。
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: アベイラビリティ・カスケード
    quick_introduction: |
      アベイラビリティ・カスケードとは、アイデアが公の議論で繰り返し共有されることで、そのもっともらしさを増していく自己強化的なプロセスです。議論されるほど「利用可能」になり、より多くの人がそれを信じるようになり、さらに議論されるようになります。集合的な信念は、その根拠となる真実にかかわらず、勢いを増します。
    one_liner: アイデアが繰り返されるほど、証拠にかかわらず、もっともらしく見える。
    try_this:
      - Ask: Is this belief widespread because it's true, or because it's repeated? (この信念は、真実だから広まっているのか、それとも繰り返し共有されているから広まっているのか？)
      - Seek primary sources before accepting "what everyone knows." (「みんなが知っていること」を受け入れる前に、一次情報源を探す。)
      - Notice when repetition alone is driving your sense of plausibility. (繰り返しだけで、もっともらしさへの感覚が生まれていることに気づく。)
    ask_yourself:
      - Would I believe this if I'd heard it only once? (一度しか聞いていなかったら、これを信じるだろうか？)
      - Am I conflating "everyone says so" with "the evidence supports it"? (「みんながそう言っている」と「証拠がそれを支持している」を混同していないか？)
    in_more_detail: |
      Timur KuranとCass Sunsteinは、アベイラビリティ・カスケードがどのように機能するかを説明しました：情報のアベイラビリティ（どれだけ頻繁に何かを聞くか）と、もっともらしさ（どれだけ信じやすいかに見えるか）は互いを強化します。メディア報道、ソーシャルメディア、公の議論は、特定のアイデアを増幅させます。アイデアがアベイラビリティのしきい値に達すると、たとえそれが偽りであったり誇張されていたりしても、急速に広まり「共通の知識」となる可能性があります。

      アベイラビリティ・カスケードは、有益（重要な警告を広める）であることも、有害（パニックや誤情報を広める）であることもあります。これらは、アベイラビリティ・ヒューリスティックと社会的証明に駆動されます。
    why_this_is_important: |
      アベイラビリティ・カスケードを認識することは、広範な信念が証拠を反映しているのか、それとも単なる繰り返しを反映しているのかを評価するのに役立ちます。これは、アイデアがどのようにバイラルになり、集合的な信念がどのように間違っているのかを説明します。メディアリテラシーと批判的思考にとって不可欠です。
    when_to_use:
      - 意思決定 (decision-making)
      - リスク評価 (risk_assessment)
      - 学習 (learning)
      - リーダーシップ (leadership)
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        アイデアが繰り返されるほど、もっともらしく見える。
      media_amplification: |
        報道が信念を駆動し、信念がさらなる報道を駆動する。
      social_proof_belief: |
        「みんなが信じている」が、信念の証拠となる。
      threshold_effects: |
        アイデアが可視性のしきい値を超えると、急速に広がる。
    examples:
      health_scares: |
        ある研究が製品が危険だと示唆し、メディアがそれを増幅させ、
        人々はそれを避けるようになり、さらに報道が続く。リスクは
        誇張されている可能性がある。
      financial_panic: |
        銀行破綻の噂が広まり、人々が預金を引き出し、その取り付け騒ぎは
        自己成就的になる。
      social_media: |
        ある物語がバイラルになり、繰り返しが信念を増し、信念が
        共有を増す。真実とバイラル性は乖離しうる。
      organizational: |
        人員削減に関する噂が広まり、不安が増し、行動が変化し、
        その反応を通じて噂はもっともらしさを増す。
    real_world_implications: |
      アベイラビリティ・カスケードは、世論、政策、市場を形成します。
      これらは、重要な真実と危険な虚偽の両方を広める可能性があります。
      批判的思考には、証拠に基づいた信念と、カスケード駆動の信念を
      区別することが必要です。
    professional_application:
      networking_and_relationship_building: |
        あるアイデアが「どこにでもある」とき、「それは真実だから
        繰り返されているのか、それとも真実だから繰り返されているのか？」と問う。
        一次情報源を探す。
      collaborative_learning_initiative: |
        増幅する前に検証する規範を作成する。「みんなが知っていること」を
        疑問視することを奨励する。証拠を反映したコンセンサスと、
        アベイラビリティを反映したコンセンサスを区別する。
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        時には広範な信念は正しい。すべての一般的なアイデアが
        カスケードであると仮定しない。
      conspiracy_thinking: |
        「アベイラビリティ・カスケード」を使用して、正当な懸念を
        作為的なものとして却下する。
      false_skepticism: |
        人気があるという理由で、よく裏付けられたアイデアを拒否する。
      contrarianism: |
        広く信じられていることは何でも間違っていると仮定する。
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: 利用可能性ヒューリスティック
    quick_introduction: |
      利用可能性ヒューリスティックとは、出来事の起こりやすさを、どれだけ簡単に例が思い浮かぶかで判断する傾向のことです。すぐに例を思い出すことができれば、その出来事は一般的だと仮定します。鮮明で、最近の、または感情的な例が、確率の見積もりを支配します。
    one_liner: 何かが簡単に思い浮かぶと、実際にはそうではなくても、より可能性が高いと感じてしまう。
    try_this:
      - 質問: 基本率（ベースレート）は何ですか？鮮明または最近の例を過大評価していませんか？
      - 直感が「これは一般的だ」「これは稀だ」と言うときは、データを探してください。
      - 劇的な一つの話がリスク評価を左右しているときに、それに気づいてください。
    ask_yourself:
      - 実際の頻度ではなく、思い出しやすさによって可能性を判断していませんか？
      - その見出しをちょうど見ていなかったら、考え方は違ったでしょうか？
    in_more_detail: |
      私たちは頻度と確率を見積もるために、メンタルショートカット（心の近道）を使います。そのショートカットの一つが「利用可能性」です。それは「簡単に思い浮かぶものは何か？」ということです。飛行機事故は鮮明で、大きく報道されるため、その可能性を過大評価してしまいます。自動車事故は一般的ですが、それほど目立たないため、過小評価してしまいます。新しさ、鮮明さ、感情的な影響はすべて、利用可能性を高めます。

      このヒューリスティックは、利用可能性が実際の頻度と相関している場合には役立ちます。しかし、メディア、個人的な経験、目立つ度合いは、しばしばその相関を歪めます。稀だが鮮明なリスクを恐れ、一般的だがありふれたリスクを無視します。
    why_this_is_important: |
      利用可能性ヒューリスティックを認識することは、確率の見積もりを修正し、鮮明なニュースに過剰反応することを避け、より良いリスク評価を行うのに役立ちます。これは、多くの体系的な判断ミスを説明します。
    when_to_use:
      - 意思決定
      - リスク評価
      - 投資
      - 問題解決
    how_can_you_spot_it:
      vividness_dominance: |
        劇的または感情的な例が、見積もりを不釣り合いに影響させます。
      recency_effect: |
        最近の出来事は、繰り返される可能性が高いと感じられます。
      personal_experience_overweighting: |
        「〜という人を知っている」という経験が、確率の見積もりを形作ります。
      media_distortion: |
        報道される内容は、頻度と一致しないことがよくあります。
    examples:
      risk_perception: |
        テロのリスク（鮮明で報道されている）を過大評価し、心臓病のリスク（一般的で、それほど劇的でない）を過小評価すること。
      investing: |
        最近の市場の出来事（暴落、急騰）が、将来への期待を支配します。
      hiring: |
        ある学校出身の採用ミスに関する鮮明な一つの話が、その学校出身のすべての候補者の評価に影響を与えます。
      health: |
        友人の癌の診断が、基本率が示唆するものよりも癌が起こりやすいと感じさせます。
    real_world_implications: |
      利用可能性ヒューリスティックは、保険の購入、政策の優先順位、個人の意思決定に影響を与えます。メディアやマーケターによって悪用されます。これに対処するには、基本率を探し、「思い浮かぶもの」に疑問を投げかける必要があります。
    professional_application:
      networking_and_relationship_building: |
        一人の人物またはグループに関する鮮明な否定的な経験が、あなたの判断を歪める可能性があることに注意してください。基本率と複数のデータポイントを探してください。
      collaborative_learning_initiative: |
        リスクまたは機会を評価する際には、「基本率は何ですか？」「鮮明な例を過大評価していませんか？」と明確に質問してください。利用可能性に左右される見積もりを修正するために、データを使用してください。
    how_can_this_be_misapplied:
      dismissing_intuition: |
        時には利用可能性は有益です。最近の経験は変化の兆候を示す可能性があります。利用可能性に左右されるすべての判断が間違っていると仮定しないでください。
      analysis_paralysis: |
        鮮明な経験からの正当な警告サインを無視するほど、過剰に修正すること。
      false_objectivity: |
        基本率が常に正しいと仮定すること。それらは時代遅れまたは適用できない可能性があります。
      manipulation: |
        他者の判断を誘導するために、意図的に特定の例を鮮明にすること。
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: バアダー・マインホフ現象
    quick_introduction: |
      バアダー・マインホフ現象（周波数幻想とも呼ばれる）は、新しいことを学んだ後に、突然どこでもそれを見るようになる現象です。偶然のように感じられますが、それはしばしば選択的注意によるものです。脳が最近遭遇したものに注意を払うように調整されるためです。
    one_liner: 新しいことを学び、突然どこでもそれを見るようになる――それは常にそこにありました。
    try_this:
      - 何かを学んだ後に「どこにでもある」と感じたら、その基準率を確認してください。
      - 最近の出来事が、実際よりも重要であるかのように感じさせていることに注意してください。
      - 質問してください：これは本当に実際のトレンドですか、それとも単に注意を払うように調整されたものを見ていますか？
    ask_yourself:
      - これは実際に今の方が一般的ですか、それとも単に多く見かけるようになっただけですか？
      - これについて最近学ばなかったら、このパターンに気づいただろうか？
    in_more_detail: |
      バアダー・マインホフ過激派グループについて聞いた後、その人物は数日以内にニュース、会話、記事などでその参照を見るかもしれません。この現象には2つの要素があります：選択的注意（探しているものに気づく）と確証バイアス（ヒットを記憶し、ミスを忘れる）。

      この幻想は、そのものが突然より一般的になったかのように感じさせることです。実際には、それは常に存在していましたが、あなたはそれに気づいていませんでした。これは、最近学んだ情報の普及度や重要性を過大評価することにつながる可能性があります。
    why_this_is_important: |
      バアダー・マインホフ現象を認識することは、最近の露出に基づいて、何かがどれほど一般的または重要であるかを過大評価することを避けるのに役立ちます。また、新しいアイデア、製品、またはトレンドが、最初にそれに気づいた後に「どこにでもある」ように感じられる理由も説明します。
    when_to_use:
      - 意思決定
      - 学習
      - リスク評価
      - 問題解決
    how_can_you_spot_it:
      sudden_ubiquity: |
        新しい単語、概念、または製品を学び、数日以内にそれらが絶えず目に入ってくるように感じます。
      recency_bias: |
        最近の情報は、実際よりも現実をより代表するもののように感じられます。
      pattern_seeking: |
        脳は無関係な目撃情報を「これはどこにでもある」という物語に結びつけます。
      forgetting_the_misses: |
        そのものが見えない回数ではなく、見える回数だけを追跡します。
    examples:
      vocabulary: |
        「セレンディピティ」という単語を学び、その週に3つの異なる記事でそれを見かける。
      car_purchase: |
        ある特定の車のモデルを購入することにした後、すべての道で見かける――実際には常にそこにありました。
      health_anxiety: |
        まれな症状について読み、その後、自分自身に似た感覚に気づき、不必要な心配につながる。
      trends: |
        新しいアプリやトレンドを発見し、それが突然支配的になっているように感じる――実際にはユーザーベースが小さいかもしれない。
    real_world_implications: |
      この現象は、トレンド、リスク、機会の認識に影響を与えます。マーケターやメディアは、繰り返し露出させることでそれを悪用することができます。意思決定においては、最近の情報に過度に重み付けすることにつながる可能性があります。
    professional_application:
      networking_and_relationship_building: |
        誰かが学んだ後にトピックを繰り返し言及した場合、彼らは周波数幻想を経験している可能性があると認識してください――そのトピックが必然的にそれほど関連性が高いわけではなく、単に彼らにとってより顕著であるだけです。
      collaborative_learning_initiative: |
        トレーニングでは、「新しいことを学んだ後にどこにでもそれが見える」のは正常であることを強化してください；普遍性の感覚を信頼するのではなく、基準率を確認することを奨励してください。
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        最近頻繁に気づいたという理由で、何かが実際よりも一般的または重要であると仮定する。
      confirmation_bias_amplification: |
        「どこにでもそれが見える」という感覚を、信念が正しいという証拠として使用する。
      decision_distortion: |
        不均衡に重要であると感じられる最近学んだ情報に基づいて選択を行う。
      vulnerability_to_manipulation: |
        広告主やプロパガンダ担当者は、繰り返し露出させることで、普遍性や重要性の幻想を作り出す。
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: バーナム効果
    quick_introduction: |
      バーナム効果（またはフォアラー効果）とは、曖昧で一般的な性格記述を、
      自分だけにあてはまる正確なものとして受け入れてしまう傾向のことです。
      占いや占い師、性格診断テストは、ほとんどすべての人に当てはまるような
      記述を使用しますが、私たちはそれが自分に固有のものであると信じてしまいます。
      私たちは、ありきたりなものの中に自分自身を見出します。
    one_liner: 曖昧な記述は、ほとんどすべての人に当てはまるため、個人的に感じられます。
    try_this:
      - Ask: この記述は多くの人に当てはまるだろうか？ 他の人で試してみよう。
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger?
      - Am I remembering the hits and forgetting the misses?
    in_more_detail: |
      心理学者のバートラム・フォアラーは、学生に同一の「パーソナライズされた」
      フィードバック（例：「あなたは他人に好かれ、賞賛されたいという欲求がある」）
      を与え、学生たちはそれを非常に正確だと評価しました。
      その記述は、誰にでも当てはまるほど曖昧でした。
      P.T.バーナムは、「一分ごとに、騙されやすい人間が生まれる」と言ったと
      伝えられています。この効果は、パーソナライズされているように見える
      一般論で大衆に訴えかける彼のスキルにちなんで名付けられました。

      この効果が機能するのは、曖昧な記述の中に個人的な関連性を見つけるのが
      得意だからです。私たちは、当たったことを記憶し、外れたことを忘れます。
      これは、コールドリーディングや多くの「性格」製品の基盤となっています。
    why_this_is_important: |
      バーナム効果を認識することは、性格評価の精度を評価し、操作に抵抗し、
      曖昧なフィードバックの過度な解釈を避けるのに役立ちます。
      これは、星占いが正確に感じる理由や、「パーソナライズされた」アドバイスの
      一部がなぜ一般的であるかを説明します。
    when_to_use:
      - 意思決定
      - 学習
      - リスク評価
      - 関係構築
    how_can_you_spot_it:
      vague_accuracy: |
        個人的に感じるが、多くの人に当てはまる可能性のあるフィードバック。
      selective_fit: |
        私たちは、適合するものに焦点を当て、適合しないものを無視します。
      cold_reading: |
        誰かが、実際には一般的である記述であなたを「読み取る」。
      personality_test_enthusiasm: |
        評価結果を、自分固有の洞察として無批判に受け入れること。
    examples:
      horoscopes: |
        「あなたは時々、自分の決断に疑いを抱く」は、個人的に感じるが、
        ほとんどの人に当てはまる。
      fortune_telling: |
        私たちの状況に固有のものとして解釈する曖昧な予言。
      personality_tests: |
        一部の評価はバーナム記述を使用しており、差別化することなく正確だと感じられます。
      feedback: |
        深くパーソナライズされたものとして解釈する、一般的なパフォーマンスフィードバック。
    real_world_implications: |
      バーナム効果は、占星術、一部のコーチング、質の低い評価で悪用されています。
      これは、無効なツールに対する誤った自信を生み出す可能性があります。
      また、私たちが、お世辞や曖昧な肯定的なフィードバックに弱い理由も説明します。
    professional_application:
      networking_and_relationship_building: |
        フィードバックを受ける際は、「これは多くの人に当てはまるだろうか？」と尋ねてください。
        曖昧な賞賛や批判ではなく、具体的で行動に基づいたフィードバックを求めてください。
        あまりにも良すぎる「パーソナライズされた」洞察には懐疑的になってください。
      collaborative_learning_initiative: |
        評価を使用する際は、差別的妥当性のある、検証済みのツールを選択してください。
        バーナム記述に依存する測定器を避けてください。
        曖昧なフィードバックを認識するように人々を訓練してください。
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        すべてのパーソナライズされたフィードバックがバーナムであるわけではありません。
        本質的に具体的なものもあります。すべてを曖昧だと断定しないでください。
      invalidating_experience: |
        誰かの洞察の経験を、「バーナムにすぎない」と断じてしまうこと。
        それが彼らにとって価値があるかもしれないのに。
      overcorrection: |
        一部の性格フレームワークがバーナム記述を使用しているという理由だけで、
        すべての性格フレームワークを却下すること。
      false_skepticism: |
        正確だと感じるものだから、それはバーナムに違いないと仮定すること。
        時には、物事は正確であることもあります。
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: ベイジアン・フォールシー（基本確率の誤謬）
    quick_introduction: |
      ベイジアン・フォールシーとは、特定の鮮明な情報に飛びついて、一般的な統計情報（基本確率）を無視する傾向のことです。個別の事例を過大評価し、事前確率を過小評価してしまいます。説得力のある一つの話が、数字が示すものを覆してしまうことがあります。
    one_liner: 説得力のある話は、数字が示すものを覆してしまうことがある。
    try_this:
      - 事例を判断する前に、こう問いかけよう：この種の状況における基本確率はどのくらいか？
      - 個別の証拠と事前確率を組み合わせよう――どちらも無視しないこと。
      - 一つの鮮明な事例が統計を覆してしまっているときに、それに気づこう。
    ask_yourself:
      - この個別の事例を過大評価し、基本確率を過小評価していないか？
      - 説得力のある話を脇に置いた場合、数字はどうなるだろうか？
    in_more_detail: |
      もし、ある病気が人口の1%に影響するとし、その検査の精度が95%だったとしても、陽性反応が出たとしても、その人が病気である可能性は低い――なぜなら、基本確率が非常に低いからだ。しかし、私たちは基本確率を無視して「検査で陽性になった」ということに集中してしまう。私たちは統計よりも、個別の情報に流されてしまう。

      この誤謬は、医療診断、採用、リスク評価、法的な判断に影響を与えます。私たちは、ベイジアン推論を用いて、基本確率と個別の証拠を組み合わせる必要がある――しかし、私たちはしばしばそうしない。
    why_this_is_important: |
      ベイジアン・フォールシーを修正することで、診断、リスク評価、意思決定の質が向上します。鮮明な事例に過剰に反応したり、統計的な現実を過小評価したりするのを防ぐことができます。
    when_to_use:
      - 意思決定
      - リスク評価
      - 問題解決
      - 投資
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        判断に基本確率が考慮されていない。
      vividness_over_statistics: |
        単一の事例や話が、集計データよりも優位に立っている。
      diagnostic_overweighting: |
        基本確率を考慮せずに、新しい証拠（例：検査結果）を過大評価している。
      anecdote_override: |
        「私が知っている人には…」という話が、統計的証拠を覆してしまう。
    examples:
      medical: |
        まれな病気の陽性検査結果――基本確率が低いため、陽性結果はしばしば偽陽性だ。私たちはこれを無視し、病気であると仮定してしまう。
      hiring: |
        候補者が面接で素晴らしい――面接が業績を予測する確率の基本確率を無視してしまう。
      risk: |
        飛行機事故は鮮明だ――私たちは飛行のリスクを過大評価し、自動車事故のリスクを過小評価し、基本確率を無視してしまう。
      startup_investing: |
        創業者がうまくピッチする――ピッチの質に関わらず、ほとんどのスタートアップが失敗するという基本確率を無視してしまう。
    real_world_implications: |
      ベイジアン・フォールシーは、医療上の意思決定、法的な判断、ビジネス戦略に影響を与えます。資源の誤配分や不十分なリスク評価の原因となります。ベイジアン思考はこれを修正します。
    professional_application:
      networking_and_relationship_building: |
        人々を評価する際には、基本確率を考慮しよう：例えば、この種の行動はどのくらいの頻度で起こるか？一つの鮮明なやり取りが、より広範なパターンを覆さないようにしよう。
      collaborative_learning_initiative: |
        意思決定を行う際には、個別の証拠を組み込む前に、明示的に基本確率を述べ、考慮する。チームにベイジアン推論のトレーニングを行う。
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        基本確率がそう示唆しているにもかかわらず、強力な個別の証拠を無視すること――個別の事例が例外である場合もある。
      stereotyping: |
        個人に対して不公平な判断を下すために基本確率を使用すること。
      false_precision: |
        基本確率が概算に過ぎないにもかかわらず、誤った精度を適用すること。
      dismissing_individuals: |
        目の前の個人が分布に当てはまらないかもしれないのに、「統計によればXだ」と言うこと。
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: ベイズの定理
    quick_introduction: |
      ベイズの定理は、新しい証拠を得たときに仮説の確率を更新する方法を説明します。
      これは、信念は証拠がそれをどれだけうまく支持しているかに比例して変化すべきであるという考え方を形式化したものであり、全か無かではなく、段階的に変化するものです。
    one_liner: 証拠がそれをどれだけうまく支持しているかに比例して信念を更新する。
    try_this:
      - 事前確率から始め、間違っていた場合に証拠がどれほどありそうか尋ねましょう。
      - 段階的に更新しましょう。1つのデータポイントで0%から100%に切り替えないように。
      - 代替仮説を検討しましょう。証拠はそれらにも適合するでしょうか？
    ask_yourself:
      - この証拠は実際に確率をどれだけ変化させるか？
      - 信念を更新しているのか、それともすでに考えていたことを確認しているだけなのか？
    in_more_detail: |
      この定理は、証拠が与えられた仮説の確率は、仮説が与えられた証拠の尤度に事前の確率を掛けたものを、証拠の確率で割ったものに等しいと述べています。実際には、事前の信念から始め、新しい証拠が仮説と代替仮説のどちらとどれだけ一致しているかを確認し、それに応じて更新します。

      ベイズ的思考は、間違っていた場合に証拠がどれほどありそうかを検討することを要求することで、確証バイアスに対抗します。これは確率的推論と科学的更新の基礎です。
    why_this_is_important: |
      ベイズ的思考は、不確実性下での意思決定を改善し、過信を避けるのに役立ち、証拠から学ぶためのフレームワークを提供します。診断、予測、および不確実性のあるあらゆる分野に不可欠です。
    when_to_use:
      - 意思決定
      - 問題解決
      - リスク評価
      - 学習
    how_can_you_spot_it:
      prior_and_update: |
        ベースラインの信念から始め、新しい証拠に基づいてそれを調整する。
      likelihood_ratio_thinking: |
        「正しい場合と間違っている場合で、この証拠はどれくらいありそうか？」と尋ねる。
      incremental_updating: |
        証拠によって信念は突然切り替わるのではなく、徐々に変化する。
      base_rate_respect: |
        事前の確率（ベースレート）は、最新のデータポイントだけでなく、重要である。
    examples:
      medical_diagnosis: |
        まれな病気に対する陽性検査。事前確率（低い有病率）は、陽性結果が偽陽性であることが多いことを意味します。ベイズの定理は確率を更新します。
      forecasting: |
        最初の推定値に固執するのではなく、新しいデータが到着するにつれて予測を更新する。
      hiring: |
        役割への適合性に関するベースレートから始め、面接のパフォーマンスに基づいて更新する。
      investing: |
        新しい情報（収益、ニュース）が到着するにつれて、企業が成功する確率を更新する。
    real_world_implications: |
      ベイズ的思考は、現代のAI、医療診断、科学的推論の基盤となっています。ベースレート無視と確証バイアスを是正します。不確実性のあるあらゆる分野において強力なツールです。
    professional_application:
      networking_and_relationship_building: |
        固定された第一印象に固執するのではなく、新しい証拠に基づいて人々に関する信念を更新する。行動を解釈する際には、ベースレート（例：この行動はどれくらい一般的か？）を考慮する。
      collaborative_learning_initiative: |
        議論の前に、チームが明確に事前の仮説を述べ、証拠が提示されたときに更新することを奨励する。アンカリングと確証バイアスを軽減する。
    how_can_this_be_misapplied:
      overprecision: |
        不確実性が高い場合に正確な確率を割り当てること。
      prior_rigidity: |
        強い事前の仮説に固執し、新しい証拠で十分に更新しないこと。
      base_rate_tyranny: |
        ベースレートがそう示唆しているからといって、強い証拠を無視すること。時には証拠が優先されるべきである。
      false_sophistication: |
        実際の推論を行わずに、厳密さを装うためにベイズの言葉を使うこと。
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: ベン・フランクリン効果
    quick_introduction: |
      ベン・フランクリン効果とは、人は誰かのために好意を施した後、その人をより好きになるという心理現象のことです。好意を寄せる人に好意を施すという直感に反して、私たちはしばしば好意を施した相手を好きになるのです。
    one_liner: 好意を施した相手を好きになる―私たちの態度は行動に従う。
    try_this:
      - 関係を改善したいなら、ささやかな頼み事をするのを検討しましょう。
      - 好意を施すことが、相手に対する自分の感情をどのように変化させるかに気づきましょう。
      - 他の人は、あなたを助けた後にあなたをより好きになるかもしれないことに注意しましょう。
    ask_yourself:
      - 誰かのために好意を施したことで、その人に対する自分の気持ちは変わりましたか？
      - 相手への評価を高めることで、自分の努力を合理化していませんか？
    in_more_detail: |
      ベンジャミン・フランクリンは、あるライバルの議員から彼の書斎から珍しい本を借りるように頼んで、その議員を味方につけたことを有名に記しています。相手が応じた後、フランクリンは感謝のメモとともにそれを返しました。その関係は著しく改善しました。この効果は、私たちの態度は行動に従うことを示唆しています。誰かを助けるために努力を投資すると、その相手への肯定的な評価を高めることによって、その努力を合理化するのです。

      認知的不協和理論がこれを説明します。嫌いな人や中立的な感情を抱いている人に好意を施すとき、私たちはその行動（助けること）と自分たちの態度（嫌悪感）との間に緊張を経験します。その緊張を、相手をより好きになることによって解消する方が、自分の好みに反する行動をとったことを認めるよりも、しばしば簡単です。
    why_this_is_important: |
      ベン・フランクリン効果を理解することは、戦略的に人間関係を構築し、自分自身の感情が過去の好意によって影響されている可能性に気づくのに役立ちます。また、関係を改善しようとするときに、好意を申し出るよりも、ささやかな頼み事をすることがなぜより効果的なのかを説明します。
    when_to_use:
      - 関係構築
      - 交渉
      - リーダーシップ
      - 紛争解決
    how_can_you_spot_it:
      liking_after_helping: |
        以前は中立的または否定的な感情を抱いていたとしても、誰かのために好意を施した後、その人に対してより温かい感情を抱くようになったときに気づきましょう。
      others_requesting_small_favors: |
        誰かが繰り返しささやかな頼み事をしてくる場合、それは彼らが意識的または無意識的に、親睦を深めるためにこの効果を利用している可能性があります。
      attitude_shift_post_investment: |
        誰かを助けるために時間や労力を投資した後、その人に対する自分の見方が肯定的に変化したかどうかを観察しましょう。
      reciprocal_relationship_dynamics: |
        一方が多くの好意を施した関係は、行動においてはバランスが取れているように見えても、愛情においては不均衡に感じられるかもしれません。
    examples:
      networking: |
        同僚にドラフトのフィードバックを求めること。これにより、同僚はあなたの成功に
        より投資していると感じ、あなたに対してより肯定的な態度をとるようになります。
      sales: |
        営業担当者が、見込み客にささやかな頼み事（紹介や人脈の提供など）をすることで、
        見込み客のコミットメントと好意度を高めます。
      conflict_resolution: |
        意見の相違の後、無関係なことについて相手に助けを求めることで、緊張を和らげ、
        好意を再構築することができます。
      mentoring: |
        年長者が年少者に意見や助けを求めた場合、年少者はしばしばより価値があり、
        つながりを感じるようになります。
    real_world_implications: |
      ベン・フランクリン効果は、採用、販売、外交、そして日常の社会力学に影響を与えます。
      倫理的に橋を架けるために使用することも、非倫理的に愛情を操作するために使用することもできます。
      それを認識することは、なぜ一部の関係が非対称的な好意の提供の後に、より強く感じられるのかを理解するのに役立ちます。
    professional_application:
      networking_and_relationship_building: |
        人間関係を構築する際には、好意を提供するだけでなく、ささやかで合理的な頼み事をすることを検討しましょう。好意を施す行為は、投資と肯定的な評価を生み出します。
      collaborative_learning_initiative: |
        チームでは、メンバーがお互いに助け合うこと（ピアレビュー、クロス・トレーニングなど）は、結束を強化することができます。全員が助けを与え、受け取るようにコラボレーションを構造化しましょう。
    how_can_this_be_misapplied:
      manipulation: |
        本当に必要がないのに、相手に自分を好きにさせるためだけに意図的に頼み事をすることは、発見された場合に搾取的に感じられる可能性があります。
      overreliance_on_favors: |
        好意だけが壊れた関係を修復してくれると仮定すること。一部の対立には、直接的な会話と説明責任が必要です。
      asymmetric_exploitation: |
        返礼なしに繰り返し頼み事をすることは、裏目に出て、恨みを抱かせる可能性があります。
      misattributing_motives: |
        相手の温かさが、あなたのために彼らがしてくれた好意の一部である可能性があるのに、それが純粋に本物であると仮定すること。
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: 限定合理性
    quick_introduction: |
      限定合理性とは、人間の意思決定は、利用可能な情報、認知能力、時間によって制限されるという考え方です。私たちは最適化するのではなく、「満足」します。つまり、可能な限り最善の選択肢ではなく、十分な選択肢を選びます。
    one_liner: 私たちは満足する――最適ではなく、十分なものを選ぶ。
    try_this:
      - 可能な場合は選択肢を単純化してください。多すぎる選択肢は限定合理性を圧倒します。
      - 無限の検索を避けるために、事前に「十分」な基準を設定してください。
      - 収穫逓減点を超えて最適化しようとしていることに気づいてください。
    ask_yourself:
      - 十分で十分な場合に、完璧な選択肢を見つけようとしていませんか？
      - 私の決定を制限している制約（時間、情報、注意）は何ですか？
    in_more_detail: |
      ハーバート・サイモンは、完全な情報を持つ合理的なアクターという古典的な経済学の仮定に異議を唱えるために、この概念を導入しました。実際には、私たちの注意、ワーキングメモリ、時間は限られています。私たちはヒューリスティックやショートカットを使用して、理想的な意味では最適ではないにしても、制約を考慮すると「合理的」な意思決定を行います。

      限定合理性は、私たちが常に最良の選択肢を選ばない理由、私たちが経験則に頼る理由、そして文脈とフレーミングがなぜそれほど重要なのかを説明しています。これは、私たちが実際にどのように決定するかを説明するモデルであり、どのように決定すべきかを示す処方箋ではありません。
    why_this_is_important: |
      限定合理性を理解することは、より良いプロセスを設計し、他者のための選択肢を単純化し、意思決定の質に対する現実的な期待を設定するのに役立ちます。また、「非合理的」な行動が制約下ではしばしば合理的である理由も説明しています。
    when_to_use:
      - 意思決定
      - 問題解決
      - リーダーシップ
      - リスク評価
    how_can_you_spot_it:
      satisficing_behavior: |
        人々は、徹底的に比較するのではなく、最初に受け入れ可能な選択肢を選びます。
      heuristic_reliance: |
        意思決定は、完全な分析ではなく、経験則を使用して行われます。
      context_dependence: |
        同じ人が、選択肢の提示方法によって異なる選択をします。
      information_overload: |
        情報が多すぎると、意思決定の質が低下する可能性があります。
    examples:
      hiring: |
        マネージャーは、「最高の」候補者を見つけるために無期限に面接するのではなく、基準を満たした最初の候補者を雇用します。
      consumer_choice: |
        買い物客は、店内のすべての製品を比較するのではなく、棚の最初の数個の選択肢から選びます。
      policy: |
        有権者は、すべての政策立案者の立場を分析するのではなく、党派またはいくつかの主要な問題を経由地として使用します。
      daily_routines: |
        人々は、すべての決定を再最適化するのではなく、習慣とデフォルトに従います。
    real_world_implications: |
      限定合理性は、市場、政策設計、組織行動を形作ります。ナッジと選択アーキテクチャは、私たちの限界を考慮しているため機能します。それを無視すると、人々が効果的に使用できない複雑すぎるシステムにつながります。
    professional_application:
      networking_and_relationship_building: |
        他者がリアルタイムで複雑なトレードオフを処理することを期待しないでください。選択肢を単純化し、明確なデフォルトを提供してください。
      collaborative_learning_initiative: |
        限定合理性で機能するプロセスを設計します。選択肢を減らし、デフォルトを提供し、複雑な意思決定にはチェックリストを使用します。
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        認知能力の限界を仮定するプロセスを設計し、意思決定の疲労と悪い結果につながる。
      blaming_irrationality: |
        制約を考慮せずに、他者の選択を非合理的だと却下する。
      exploitation: |
        望ましい結果に導くために、意図的に複雑さで人々を圧倒する。
      perfectionism: |
        満足することがしばしば合理的なアプローチである場合に、最適な決定を期待する。
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: バイスタンダー効果
    quick_introduction: |
      バイスタンダー効果とは、他人がいる場合に、個人が助けを提供する可能性が低くなる傾向のことです。目撃者が多ければ多いほど、一人一人が行動を起こす可能性は低くなります。責任が分散され、私たちは「誰かが助けてくれるだろう」と想定してしまいます。
    one_liner: 人が多いほど、一人一人が行動する可能性は低くなる。
    try_this:
      - 緊急時には、直接責任を割り当てましょう：「あなた、911に電話してください。」
      - 他の誰かが助けてくれるだろうと期待せず、行動するか、明確に指示しましょう。
      - 他の人が最初に行動するのを待っている自分に気づきましょう。
    ask_yourself:
      - 他の人がいるからという理由で、責任を分散させていませんか？
      - 一人でいたら、違う行動をとりますか？
    in_more_detail: |
      キティ・ジェノヴェーゼ殺害事件（ただし、その物語は部分的に神話化されています）の後、研究者たちは、他人の存在が助けを減らすことを発見しました。私たちは他者からの合図を探します。誰も行動しなければ、それは「行動は不要」と解釈されます。また、責任の分散も経験します。多くの人がいる場合、一人一人が個人的な責任を感じにくくなります。多様な無知（pluralistic ignorance）が発生する可能性があります。全員が何かが間違っていると考えていますが、誰も行動していないので、誰も行動しません。

      この効果は、状況が曖昧であり、目撃者同士がお互いを知らない場合に最も強く現れます。直接的な責任の割り当て（「あなた、911に電話してください」）によって克服できます。
    why_this_is_important: |
      バイスタンダー効果を理解することは、他者が行動しないときにあなたが行動を起こすのを助け、それを克服するシステムを設計するのに役立ちます。あなたが困っているなら、特定の一人を選んでください。あなたが目撃者なら、他者の行動を待たないでください。
    when_to_use:
      - リーダーシップ
      - 関係構築
      - 対立解決
      - 意思決定
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        大勢いるときに「誰か他の人がやるだろう」と考えること。
      pluralistic_ignorance: |
        全員が行動が必要だと考えているが、他の人が行動していないので誰も行動しないこと。
      social_proof_inaction: |
        他者の不作為を「行動は不要」と解釈すること。
      audience_inhibition: |
        愚かに見えることや、過剰反応することを恐れて行動できないこと。
    examples:
      emergency: |
        誰かが倒れたとき、多くの目撃者がいると、一人一人が助けを呼ぶ可能性は低くなります。
      workplace: |
        全員が問題に気づいていますが、誰もそれを提起しません。それぞれが他の誰かがするだろうと考えています。
      harassment: |
        ハラスメントを目撃しても介入しない。それぞれが他の人が行動するだろうと考えています。
      meetings: |
        悪いアイデアが疑問視されずに進んでいく。全員が他の誰かが発言するだろうと考えているためです。
    real_world_implications: |
      バイスタンダー効果は、緊急時に悲劇的な結果をもたらし、組織内で問題が persist するのを許します。それを克服するには、直接的な責任の割り当てと、介入を奨励する規範が必要です。
    professional_application:
      networking_and_relationship_building: |
        助けが必要なときは、特定の人に頼みましょう。問題を見たら、他の人がするだろうと期待せず、行動しましょう。発言が期待され、報われるような規範を作りましょう。
      collaborative_learning_initiative: |
        バイスタンダー効果を認識し、介入する方法を人々に訓練しましょう。「何かを見たら、言いましょう」を使い、明確な役割を割り当てましょう。最初に発言した人を報いましょう。
    how_can_this_be_misapplied:
      blaming_bystanders: |
        効果が強力な状況要因である場合に、個人を厳しく非難すること。状況を変えることに焦点を当てましょう。
      false_assumption: |
        十分な人がいれば、誰かが必ず助けてくれるだろうと仮定すること。実際にはその逆が多いです。
      overcorrection: |
        全員を責任者にして、誰も責任者でなくしてしまうこと。責任の分散は依然として発生する可能性があります。
      individualizing: |
        バイスタンダー効果を状況現象ではなく、人格的欠陥として扱うこと。
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: コンピタンスの範囲
    quick_introduction: |
      コンピタンスの範囲とは、自身の専門知識の限界を知り、重要な意思決定を行う際にその範囲内に留まることを促すメンタルモデルです。ウォーレン・バフェットとチャーリー・マンガーは、自分が知らないことを知ることの重要性を強調しています。
    one_liner: 自分の専門知識の限界を知り、それが重要であるときはその範囲内に留まりましょう。
    try_this:
      - 自分に本当の専門知識がある領域と、推測に頼っている領域をマッピングしましょう。
      - 自分の範囲外では、アドバイスを求めたり、委任したりしましょう。
      - 正直に：この分野でのあなたの判断に、真の専門家は同意するでしょうか？
    ask_yourself:
      - 私はコンピタンスの範囲内にいるのか、それとも推測しているのか？
      - この分野で「知らない」と認めたのはいつが最後か？
    in_more_detail: |
      人はそれぞれ、真の専門知識を持つ領域を持っています。そこでは、情報を評価し、誤りを見抜き、信頼できる判断を下すことができます。その範囲外では、誰でも陥るのと同じバイアスや間違いを犯しやすくなります。重要なのは正直な自己評価です。自分が本当に有能なのはどこで、どこで推測しているのか？

      コンピタンスの範囲は、意図的な学習によって拡大できますが、現在の限界を認識するには謙虚さが必要です。自分の範囲外で活動すると、特にリスクが高い場合、費用のかかる間違いのリスクが高まります。
    why_this_is_important: |
      コンピタンスの範囲内に留まることは、費用のかかる間違いを減らし、意思決定の質を向上させます。また、いつアドバイスを求めるべきか、いつ委任すべきか、いつ控えるべきかを知るのに役立ちます。自分の範囲外での過信は、失敗の大きな原因となります。
    when_to_use:
      - 意思決定
      - 投資
      - キャリアの選択
      - リスク評価
    how_can_you_spot_it:
      honest_boundary_assessment: |
        ある分野における知識の限界を説明できますか？自分が知らないことを知っていますか？
      knowing_when_to_defer: |
        一人で決定するのではなく、専門家の意見を求めるべき状況を認識すること。
      consistent_track_record: |
        自分の範囲内では、判断は時間とともに検証される傾向があります。範囲外では、そうではありません。
      calibration: |
        ある分野における自信が、その分野での実際のパフォーマンスと一致していること。
    examples:
      investing: |
        バフェットは、テクノロジー株は自分のコンピタンスの範囲外であり、信頼できる評価ができないと述べて、それらを避けています。
      career: |
        自分の専門分野に留まる専門家 vs. 関係のない分野で「ストレッチ」な役割を引き受ける専門家。
      hiring: |
        自分の判断に頼るべき時と、技術的な役割のために専門家を招聘すべき時を知ること。
      advice_giving: |
        推測するのではなく、自分の専門外のトピックについて意見を述べることを断ること。
    real_world_implications: |
      コンピタンスの範囲は、バリュー投資とプロフェッショナルとしての成功の中心です。これを無視すると、過信、失敗した事業、誤ったアドバイスにつながります。範囲を拡大するには、意図的な努力と正直なフィードバックが必要です。
    professional_application:
      networking_and_relationship_building: |
        自分のコンピタンスの範囲を補完する人々と関係を築きましょう。自分で答えるのではなく、他人を紹介すべき時を知りましょう。
      collaborative_learning_initiative: |
        重なり合う補完的なコンピタンスの範囲を持つチームを作成しましょう。人々が自分のコンピタンスの範囲外で活動していることを指摘することを奨励しましょう。
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        自分の範囲外に決して venturing しないことは、成長と学習を制限する可能性があります。
      false_modesty: |
        説明責任や困難な決定を避けるために、ごく小さな範囲を主張すること。
      gatekeeping: |
        相手の議論に関与せずに、相手を却下するために「コンピタンスの範囲」を使用すること。
      stagnation: |
        努力によって拡大できるものとしてではなく、範囲を固定されたものとして扱うこと。
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: 認知的不協和
    quick_introduction: |
      認知的不協和とは、相反する信念を持っているとき、あるいは自分の行動が信念と矛盾するときに感じる精神的な不快感のことです。私たちはこの不快感を軽減しようと動機づけられます。しばしば、行動を変えるのではなく、信念を自分の行動に合わせるように変更します。
    one_liner: 逆よりも、私たちは自分の行動に合わせて信念を変えることが多い。
    try_this:
      - 行動を変えるのではなく、不快感を軽減するために正当化しているときに気づきましょう。
      - 質問：「自分がしたことを正当化するために、信念を調整していませんか？」
      - 信念を変えることよりも、行動を変えることの方がより正直かどうかを検討しましょう。
    ask_yourself:
      - 正当化することによって不協和を軽減していますか、それとも実際に行動を変えることによってですか？
      - もし、もうすでにこのように行動していなかったら、この信念を持っていたでしょうか？
    in_more_detail: |
      レオン・フェスティンガーの理論は、私たちが一貫性を求めていると説明しています。私たちが自分の価値観に反する行動（例：嘘をつく、お金を無駄にする）をしたとき、不協和を経験します。それを軽減するために、私たちは自分の信念を変える（「それは本当は嘘ではなかった」）か、行動を最小限に抑える（「それほど悪くはなかった」）かもしれません。私たちはしばしば、改めるのではなく、正当化します。

      認知的不協和は、ベン・フランクリン効果（私たちは助けた人を好きになる）を促進し、過去の決定を正当化する理由を説明し、多くの自己欺瞞の根底にあります。これは、信念の形成と変化における強力な力です。
    why_this_is_important: |
      認知的不協和を理解することは、あなた自身の正当化を認識し、人々が考え方を変えることをなぜ抵抗するのかを理解するのに役立ちます。それはまた、コミットメントと一貫性が強力な説得の原則である理由も説明します。
    when_to_use:
      - 意思決定
      - 関係構築
      - リーダーシップ
      - コンフリクト解決
    how_can_you_spot_it:
      post_decision_rationalization: |
        決定後、私たちは自分の選択の肯定的な側面と、却下された選択肢の否定的な側面を強調します。
      belief_action_alignment: |
        私たちは、すでに取った行動に合うように信念を調整します。
      discomfort_with_inconsistency: |
        私たちの行動が、表明した価値観と一致しないことに気づいたときの不快感。
      resistance_to_disconfirming_evidence: |
        私たちのコミットメントと矛盾する情報を却下または最小限に抑えること。
    examples:
      purchase_justification: |
        高価な品物を購入した後、私たちはその利点を強調し、コストを軽視します。
      relationship: |
        私たちは、良い点を強調し、悪い点を最小限に抑えることで、悪い関係に留まることを正当化します。
      career: |
        私たちは、「 stay 」なければならない理由を強調することで、好きではない仕事に留まることを正当化します。
      beliefs: |
        私たちの行動が私たちの価値観と矛盾するとき、私たちは行動を変えるのではなく、私たちの価値観を変えます（「私は本当はベジタリアンではありません。時々肉を食べるだけです」）。
    real_world_implications: |
      認知的不協和は、信念の形成、消費者の行動、政治的態度を形成します。それは、人々が悪い決定の後にさらに進む理由と、行動を変えることで信念が変わる理由を説明します。
    professional_application:
      networking_and_relationship_building: |
        小さなコミットメントはより大きなコミットメントにつながる可能性があります。人々は過去の行動を正当化します。これを倫理的に使用してください：小さなお願いから始めましょう。あなた自身の行動を正当化しているときに意識しましょう。
      collaborative_learning_initiative: |
        変化を導入するときは、早期の同意と小さなコミットメントを得てください。それらは、より大きな採用を動機づける不協和を生み出します。反感を生む公のコミットメントを強制することは避けてください。
    how_can_this_be_misapplied:
      manipulation: |
        コンプライアンスを強制するために、意図的に不協和を作り出すこと。
      dismissing_genuine_change: |
        人々が時々本当に更新するとき、すべての信念の変化が正当化であると想定すること。
      forced_consistency: |
        人々の見解が正当に進化しているときに、「一貫性」を持つように人々を強制すること。
      self_deception: |
        自分自身に関する不快な真実を避けることを正当化するために、不協和理論を使用すること。
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: 確証バイアス
    quick_introduction: |
      確証バイアスとは、既存の信念を裏付けるような情報を探し、解釈し、記憶する傾向のことです。私たちは、支持する証拠により重きを置き、自分たちの見解に反する証拠を軽視したり却下したりします。仮説を検証するのではなく、確認するような質問をします。
    one_liner: 私たちは信念を確証するものを探し、記憶します。それに反するものは軽視します。
    try_this:
      - 質問：「私を間違っていると証明するものは何か？」 積極的に反証を探しましょう。
      - 支持する情報と反証する情報のどちらに重きを置いているかに気づきましょう。
      - 自分の見解と同じくらい真剣に、反対の視点も考慮しましょう。
    ask_yourself:
      - 私は仮説を検証しているのか、それとも単に確認しているだけなのか？
      - 新しい証拠に基づいて、最後に自分の考えを変えたのはいつか？
    in_more_detail: |
      私たちは情報のニュートラルな処理者ではありません。私たちは確証を求め、曖昧さを支持として解釈し、ミスよりもヒットを記憶します。私たちは、同じ考えを持つ人々やメディアに囲まれます。「なぜ私は正しいのか？」と問うのではなく、「私を間違っていると証明するものは何か？」と問います。これにより、私たちは過信し、更新が遅れます。

      確証バイアスは、最も蔓延しており、よく文書化されているバイアスの1つです。科学、政治、人間関係、ビジネスに影響を与えます。それを克服するには、意図的な努力と構造化されたプロセスが必要です。
    why_this_is_important: |
      確証バイアスを認識することは、良い意思決定と学習にとって不可欠です。それは、反証を探し、代替仮説を考慮し、正当な理由があれば信念を更新するのに役立ちます。それは科学的思考の基盤です。
    when_to_use:
      - 意思決定
      - 学習
      - 問題解決
      - リスク評価
    how_can_you_spot_it:
      seeking_support: |
        自分の見解をテストするのではなく、確認する証拠を探すこと。
      asymmetric_interpretation: |
        曖昧な証拠を自分の立場への支持として解釈すること。
      discounting_disconfirming: |
        自分の信念に反する証拠を却下したり、最小限に抑えたりすること。
      selective_exposure: |
        自分に同意する情報源からの情報のみを消費すること。
    examples:
      hiring: |
        早期に肯定的な印象を抱き、その候補者が素晴らしいことを確認するような質問をする。
      investing: |
        株式を購入した後、肯定的なニュースを探し、否定的な分析を却下する。
      relationships: |
        パートナーの行動を、その人に対する自分の見解（良いか悪いか）を確認するレンズを通して解釈する。
      politics: |
        自分の側の情報を無批判に受け入れ、反対側の同等の情報を却下する。
    real_world_implications: |
      確証バイアスは、誤った信念を永続させ、対立を煽り、コストのかかる間違いを引き起こします。それは、優れた科学と優れた意思決定の敵です。それを克服するには、意図的な反証の探索が必要です。
    professional_application:
      networking_and_relationship_building: |
        人々に対する意見を形成する際に、積極的に反証を探しましょう。「私の考えを変えるものは何か？」と問い、それを見つけましょう。
      collaborative_learning_initiative: |
        悪魔の弁護士、レッドチーム、プレモーテムなどを使用して、反証となる視点を引き出しましょう。優れた証拠をもって、支配的な見解に異議を唱える人々に報酬を与えましょう。
    how_can_this_be_misapplied:
      false_balance: |
        証拠が一方の側に強く支持されている場合に、すべての見解を等しく有効として扱うこと。
      excessive_skepticism: |
        一部の信念が十分に支持されている場合に、すべての証拠を「確証バイアス」として却下すること。
      contrarianism: |
        確証バイアスを避けるためだけに、反対の視点を採用すること。その場合、元の視点が正しい可能性があります。
      analysis_paralysis: |
        「私たちはバイアスがかかっているかもしれない」という理由で、決して意見にコミットしないこと。
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: 知識の呪い
    quick_introduction: |
      知識の呪いとは、一度知ってしまうと、それを知らない状態がどういうものかを想像するのが難しくなることです。専門家は、初心者の視点を再現できないため、初心者に教えるのに苦労します。知ってしまうと、知らなかった頃のことを忘れてしまいます。
    one_liner: 一度何かを知ってしまうと、それを知らなかった頃のことを忘れてしまいます。
    try_this:
      - 説明する際は、第一原理から始めましょう。相手が何も知らないと仮定してください。
      - 初心者に説明を繰り返してもらいましょう。彼らの混乱があなたの盲点を示します。
      - 段階を飛ばしたり、他の人が知らない可能性のある専門用語を使っていることに気づきましょう。
    ask_yourself:
      - 相手も自分と同じ文脈を持っていると仮定していませんか？
      - 自分の背景を持たない人でも、これを理解できるでしょうか？
    in_more_detail: |
      古典的な実験では、パズルの答えを知っている人が、歌のリズムを叩き、他の人がそれを推測することを期待しました。彼らは、それがどれほど明白であるかを過大評価しました。叩いた人は、頭の中で歌を「聞かない」ことができませんでした。知識は「粘着性」があり、無知をシミュレートするのは困難です。

      この呪いは、教育、コミュニケーション、製品設計、リーダーシップに影響を与えます。私たちは、相手も自分と同じ文脈を持っていると仮定します。専門用語を使います。段階を飛ばします。人々が「理解できない」ことに驚きます。
    why_this_is_important: |
      知識の呪いを認識することで、教育、コミュニケーション、製品設計が改善されます。それは、あなたがどこにいるかではなく、相手がどこにいるかで会うのに役立ちます。効果的な知識移転に不可欠です。
    when_to_use:
      - 学習
      - リーダーシップ
      - 問題解決
      - 関係構築
    how_can_you_spot_it:
      obvious_to_you: |
        答えを知っているからこそ明白な場合、「それは明白だ」となります。
      jargon_use: |
        定義せずに、聴衆が知らない用語を使用すること。
      skipped_steps: |
        あなたが省いたことを他の人が補ってくれると仮定すること。
      frustration_with_learners: |
        相手があなたの文脈を持っていないときに、「どうして見えないんだ？」と思うこと。
    examples:
      teaching: |
        数学の教授が、自分にとっては「明白」だが、学生には不可欠な段階を飛ばしてしまう。
      product_design: |
        デザイナーが、自分にとっては理にかなっているが、新規ユーザーを混乱させるインターフェースを作成する。
      onboarding: |
        経験豊富な従業員が、新入社員が知らないことを忘れ、不十分なトレーニングを提供する。
      writing: |
        著者が読者も同じ背景を持っていると仮定し、必要な文脈を見落とす。
    real_world_implications: |
      知識の呪いは、コミュニケーションのギャップ、失敗した製品、効果のない教育を生み出します。専門家が優れた教師になれない理由の一つです。それを克服するには、聴衆の視点を採用するための意図的な努力が必要です。
    professional_application:
      networking_and_relationship_building: |
        説明する際は、相手のレベルから始めましょう。「相手は何をすでに知っているか？」と尋ねましょう。あなたの背景を持たない誰かとコミュニケーションをテストしましょう。
      collaborative_learning_initiative: |
        「5歳児に説明するように」という練習を使いましょう。専門家に初心者に教えさせ、フィードバックを得ましょう。事前の知識がないと仮定したドキュメントを作成しましょう。最近学んだ人は初心者の視点を覚えているので、ピアティーチングを活用しましょう。
    how_can_this_be_misapplied:
      oversimplification: |
        不正確または見下したレベルまで単純化しすぎること。
      false_assumption: |
        相手は実際よりも知らないと仮定すること。これもキャリブレーションの失敗です。
      one_size_fits_all: |
        すべての聴衆が同じレベルの説明を必要とするわけではありません。聴衆に合わせて調整しましょう。
      avoiding_complexity: |
        一部のトピックは複雑です。知識の呪いは、それが適切であれば技術的な言葉を絶対に使用してはいけないという意味ではありません。
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: デフォルト効果
    quick_introduction: |
      デフォルト効果とは、選択肢を提示された際に、あらかじめ選択されている選択肢を選びがちな傾向のことです。デフォルトとして設定されたものは強い利点を持つため、それが最適でなかったとしても、人々はしばしばそれに固執します。
    one_liner: デフォルトとして設定されたものは強い利点を持つ――私たちはそれに固執する。
    try_this:
      - 代替案を検討せずにデフォルトを受け入れていることに気づく。
      - 選択肢を設計する際には、ユーザーの最善の利益に資するデフォルトを設定する。
      - 尋ねてみる：もし事前に選択されていなかったら、これを選んだだろうか？
    ask_yourself:
      - 慣性からデフォルトを選んでいるのか、それとも自分にとって最善だから選んでいるのか？
      - 誰がこのデフォルトを設定したのか、そしてそこから何を得ようとしている可能性があるのか？
    in_more_detail: |
      デフォルトが機能するのは、慣性、損失回避（変更はデフォルトを失うように感じられる）、そして示唆された推奨（デフォルトは推奨されていると想定する）によるものです。
      臓器提供率は、デフォルトがオプトインかオプトアウトかによって、国によって劇的に異なります。
      退職金積立への参加は、加入が自動化されると急増します。

      デフォルトは、より良い結果へと促す（ナッジ）ために善用されることもあれば、操作（事前チェックされたボックスに不利な条件を隠す）のために利用されることもあります。
      この効果を理解することは、より良いシステムを設計し、望まないデフォルトに抵抗するのに役立ちます。
    why_this_is_important: |
      デフォルト効果を理解することは、結果を改善する選択肢のアーキテクチャを設計するのに役立ち、また、あなたの選択が意図的な好みではなくデフォルトによって形成されていることに気づくのに役立ちます。
    when_to_use:
      - 意思決定 (decision_making)
      - リーダーシップ (leadership)
      - 問題解決 (problem_solving)
      - リスク評価 (risk_assessment)
    how_can_you_spot_it:
      inertia_toward_default: |
        ほとんどの人は、事前に選択されたものに固執します。
      implied_recommendation: |
        私たちはデフォルトを「彼らが私たちに選んでほしいもの」と解釈します。
      opt_in_vs_opt_out: |
        フレーミングは参加率を劇的に変えます（オプトイン対オプトアウト）。
      pre_checked_boxes: |
        事前選択された選択肢は、フォームや設定で強い利点を持っています。
    examples:
      organ_donation: |
        オプトアウト国は、オプトイン国よりも臓器提供率がはるかに高い――デフォルトは態度よりも重要です。
      retirement_savings: |
        自動加入は、401(k)への参加率を劇的に増加させます。
      software_installers: |
        「推奨」オプションや事前チェックされたアドオンは、ユーザーがインストールするものを形成します。
      subscriptions: |
        有料登録にデフォルト設定された無料トライアルは、積極的に購読を選ばない多くの人々を獲得します。
    real_world_implications: |
      デフォルト効果は、最も強力なナッジの一つです。貯蓄、健康、プライバシー、そして消費者の行動を形成します。
      倫理的な選択肢のアーキテクチャは、結果を改善するためにデフォルトを使用します。ダークパターンは、それらを搾取するために使用します。
    professional_application:
      networking_and_relationship_building: |
        他者のためのプロセスを設計する際には、彼らの利益に資するデフォルトを選択してください。
        価値を抽出するためにデフォルトを使用するダークパターンを避けてください。
      collaborative_learning_initiative: |
        チームの慣行のためのデフォルト（例：非同期にデフォルト、ドキュメント化にデフォルト）を設定し、望ましい行動と整合させてください。
        正しい選択を容易な選択にしてください。
    how_can_this_be_misapplied:
      dark_patterns: |
        デフォルトを使用して、人々を不利な選択肢に誘導する（例：隠し手数料、不要なサブスクリプション）。
      paternalism: |
        同意なしに、真の好みを無視するデフォルトを課す。
      manipulation: |
        不利な条件をデフォルトに隠し、慣性に頼る。
      one_size_fits_all: |
        好みが多様であるのに、同じデフォルトがすべての人に正しいと仮定する。
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: ダニング＝クルーガー効果
    quick_introduction: |
      ダニング＝クルーガー効果とは、ある分野において知識やスキルが限定的な人々が自身の能力を過大評価し、逆に専門家は自身の能力を過小評価する傾向があるという認知バイアスを指します。知れば知るほど、自信がなくなることがあります。
    one_liner: 知れば知るほど、自信がなくなることがあります。
    try_this:
      - 新しい分野では、自分が過度に自信を持っていると仮定し、フィードバックや校正を求めましょう。
      - 専門家が疑念を表明するときは、真剣に受け止めましょう。彼らは例外的なケースを知っているかもしれません。
      - ある分野で、専門家よりも初心者のほうが確信を持っていることに気づきましょう。
    ask_yourself:
      - 私は「馬鹿の山の頂上」にいるのか、それとも「謙虚の谷」にいるのか？
      - 自分の能力をここで評価するために、メタ認知能力を持っているか？
    in_more_detail: |
      ダニングとクルーガーの研究によると、能力の低い個人は、自身の能力の低さを認識するメタ認知能力を欠いていることが示されました。自分のパフォーマンスを評価するには、うまくパフォーマンスを発揮するために必要なのと同じスキルが必要となります。そのため、スキルの低い人は二重に不利になります。彼らはパフォーマンスが悪く、それに気づきません。

      能力が向上するにつれて、人々は「謙虚の谷」を経験することがよくあります。そこでは、自分がどれだけ知らないかに気づきます。真の専門家は、ニュアンスや例外的なケースを鋭く認識しているため、自信を過小評価する可能性があります。
    why_this_is_important: |
      ダニング＝クルーガー効果を認識することは、自分の自信を調整し、初心者の意見を過大評価することを避け、専門家の謙虚さを理解するのに役立ちます。学習、採用、意思決定に不可欠です。
    when_to_use:
      - 学習
      - 意思決定
      - リーダーシップ
      - キャリアの移動
    how_can_you_spot_it:
      novice_overconfidence: |
        経験の浅い人が、強力で無条件の意見を表明する。
      expert_underconfidence: |
        高度なスキルを持つ人々は、スキルが低い人々よりも、不確実性を表明し、ためらう傾向がある。
      inability_to_recognize_quality: |
        パフォーマンスの低い人は、自分の分野における良い仕事と悪い仕事を見分けることができない。
      confidence_competence_mismatch: |
        初心者においては、自信と実際の能力が反比例する。
    examples:
      social_media: |
        あるトピックに関する表面的な知識しかない人が、その分野の専門家と自信を持って議論する。
      hiring: |
        面接でのパフォーマンスが低い候補者が、自身のパフォーマンスを高く評価することがある。
      investing: |
        初心者の投資家は、初期の成功の後、運を認識せずに過度に自信を持つことがある。
      workplace: |
        新入社員は昇進の準備ができていると過大評価するかもしれないが、シニア社員は自分自身を疑う。
    real_world_implications: |
      ダニング＝クルーガー効果は、教育、採用、政治、公共の議論に影響を与えます。
      これは、なぜ悪いアイデアが拡散し、なぜ専門家が軽視されるのかを説明します。
      個人および集合的な意思決定においては、校正が重要です。
    professional_application:
      networking_and_relationship_building: |
        誰かが非常に自信を持っている場合、彼らがダニング＝クルーガーゾーンにいる可能性があるかどうかを検討しましょう。
        不確実性を表明する人々を含む、多様な視点を求めましょう。
      collaborative_learning_initiative: |
        不確実性を認めることが評価される文化を創造しましょう。
        人々が自分の能力を正確に評価するのに役立つ、校正演習とフィードバックを奨励しましょう。
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        自信のある人は常に間違っていると仮定すること。時には自信は正当化される。
      false_modesty: |
        専門家が謙虚に見せるために、自分たちが知っているよりも知らないふりをすること。
      gatekeeping: |
        ダニング＝クルーガー効果を、議論に参加せずに、「専門家」に反対する人をすべて却下するために使用すること。
      self_doubt_paralysis: |
        自分の判断を決して信頼しないほど、過度に修正しすぎること。
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: 共感ギャップ
    quick_introduction: |
      共感ギャップとは、自分自身が異なる状態にあるときに、他者の精神状態を理解し予測することが困難になることです。穏やかな状態にあるとき、怒りや空腹を感じているときの自分の感情を過小評価します。満腹のとき、空腹のときの自分の食欲を過小評価します。
    one_liner: 異なる状態にあるときの自分の感情、そして他者の感情を過小評価してしまう。
    try_this:
      - 穏やかなときに、ストレスを感じているときの自分への約束をする。事前に関与する。
      - 自分が経験していない状態（空腹、疲労、恐怖など）にある他者を批判しない。
      - 質問する：「今の自分の状態を、未来の自分や他者に投影していないか？」
    ask_yourself:
      - 異なる状態にあるときの自分の感情を過小評価していないか？
      - もし自分が相手と同じ状態だったら、その人をより理解できるだろうか？
    in_more_detail: |
      私たちは、異なる状況下で自分がどのように感じるか、そして自分が現在いない状態にある他者がどのように感じるかを想像するのが苦手です。酔っていない人は、依存症の誘惑の強さを過小評価します。よく休んでいる人は、睡眠不足の影響を過小評価します。私たちは、現在の状態を他者や未来の自分に投影します。

      共感ギャップは、未来の自分（例：モチベーションが高いときに運動の約束をする）、他者のために行う決定、そして異なる状態にある人々を理解する能力に影響を与えます。
    why_this_is_important: |
      共感ギャップを認識することで、未来の自分への意思決定、他者への共感、そして自分自身の変動性の理解が向上します。これは、なぜ私たちが守れない約束をしてしまうのか、なぜ苦境にある他者を誤解してしまうのかを説明します。
    when_to_use:
      - 意思決定
      - 関係構築
      - リーダーシップ
      - 対立解決
    how_can_you_spot_it:
      current_state_projection: |
        他者も今の自分と同じように感じている、あるいは未来の自分も今の自分と同じように感じるだろうと仮定すること。
      underestimating_emotional_state: |
        相手が経験している状態にないときに、「大したことないだろう」と思ってしまうこと。
      commitment_failures: |
        現在のモチベーションに基づいて選択し、モチベーションが低下したときに実行できなくなること。
      misunderstanding_others: |
        現在の状態から想像できないために、他者の経験を却下してしまうこと。
    examples:
      hunger: |
        満腹のときに食料品店へ行く。空腹のときに欲しい量よりも少なく買ってしまう。
      addiction: |
        非依存症の人は、断つことの難しさを過小評価する。回復中の依存症の人は、使用しているときに（その誘惑の）強さを過小評価するかもしれない。
      conflict: |
        穏やかなときに、対立の瞬間にどのように反応するかを過小評価する。
      motivation: |
        モチベーションが高いときに朝6時のクラスに申し込む。しかし、眠いときには行かない。
    real_world_implications: |
      共感ギャップは、薬物依存症の治療、政策、対人理解に影響を与えます。これは、なぜ私たちが守る約束を破ってしまうのか、そしてなぜ他者の視点をしばしば理解できないのかを説明します。共感と適切な意思決定の障害となります。
    professional_application:
      networking_and_relationship_building: |
        誰かがストレスを感じている、怒っている、あるいは別の状態にあるときは、あなたと同じように理性的に考えるだろうと仮定しないでください。相手の状態を想像してみてください。約束をするときは、モチベーションが低下したときの自分の感情を考慮してください。
      collaborative_learning_initiative: |
        計画を立てるときは、チームが疲れている、プレッシャーを受けている、あるいは不満を感じているときの感情を考慮してください。モチベーションの高い計画段階だけでなく、それらの状態でも機能するように設計してください。
    how_can_this_be_misapplied:
      overattribution: |
        すべての誤解を「共感ギャップ」として片付けてしまう。実際には、人々が純粋に異なる価値観を持っている場合もあるのに。
      excusing_behavior: |
        「彼らは仕方なかった。共感ギャップだ」と言う。しかし、人々は自分の状態を管理する責任がある。
      false_relativism: |
        努力や経験で改善できるにもかかわらず、決して他者を理解できないと思い込むこと。
      self_excuse: |
        共感ギャップを、自分の計画実行の失敗を正当化するために利用すること。
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: エンドーメント効果
    quick_introduction: |
      エンドーメント効果とは、単に所有しているという理由だけで、ある物事の価値を高く評価してしまう傾向のことです。私たちは、それを手に入れるために支払うであろう金額よりも、それを手放すためにより多くの金額を要求します。所有は、私たちの評価を歪める愛着を生み出します。
    one_liner: 私たちは、持っていないものよりも、持っているものをより高く評価する――所有は愛着を生む。
    try_this:
      - Ask: もし私がこれを所有していなかったら、それを手に入れるためにいくら支払うだろうか？
      - When selling, imagine you're buying—would you pay your asking price?
      - Notice when ownership is inflating your valuation.
    ask_yourself:
      - Am I overvaluing this because I own it?
      - Would a neutral buyer agree with my price?
    in_more_detail: |
      実験では、無作為にマグカップを与えられた人々は、それを売るために、他の人々がそれを買うために支払う用意がある金額の約2倍を要求しました。単に所有しているという事実が、認識される価値を高めます。これは損失回避と関連しています――何かを手放すことは損失のように感じられ、私たちは損失を回避したがります。しかし、その効果はそれ以上のものです。私たちは、所有しているものを自己同一性に取り込みます。

      エンドーメント効果は、交渉、消費者行動、組織変革に影響を与えます。人々が自分の家、自分のアイデア、そして自分の現在の役割を過大評価する理由を説明しています。それは、取引や移行において摩擦を生み出します。
    why_this_is_important: |
      エンドーメント効果を認識することは、より効果的に交渉し、保持するか手放すかについてのより明確な意思決定を行い、そして他人が自分の持っているものを過大評価する理由を理解するのに役立ちます。それはまた、変化への抵抗を説明します。
    when_to_use:
      - 意思決定
      - 交渉
      - 投資
      - キャリアの転換
    how_can_you_spot_it:
      ownership_premium: |
        "それを買うためならそんな金額は払わないだろう"という時に、"そんな金額では売らない"と言う。
      attachment_to_possession: |
        一度手に入れたものを、より高く評価すること。
      resistance_to_trading: |
        たとえそれが合理的であっても、取引や交換をためらうこと。
      overvaluation_of_own_ideas: |
        自分のアイデア、プロジェクト、または役割が、それらが自分のものであるという理由で、より価値があると感じること。
    examples:
      real_estate: |
        住宅所有者は、市場が評価するよりも高く、しばしば自分の家を過大評価します。
      negotiations: |
        売り手は買い手が支払う用意のある額よりも多くを要求します。その差はエンドーメント効果を反映しています。
      career: |
        変化を検討する際に、現在の仕事、会社、または役割を過大評価すること。
      ideas: |
        「ここで発明されていない」や「私のアイデア」というバイアス――私たちが作成した、または所有しているものを過大評価します。
    real_world_implications: |
      エンドーメント効果は市場の摩擦を生み出し、有益な交換を遅らせ、変化への抵抗を煽ります。それは合併、再編成、そして個人的な移行に影響を与えます。それを理解することは、交渉と変化管理を改善します。
    professional_application:
      networking_and_relationship_building: |
        誰かが変化に抵抗するとき、彼らはエンドーメント効果を経験している可能性があることを考慮してください――彼らは現状を「所有」しているため、それをより高く評価しています。変化を、彼らが手放すものだけでなく、彼らが得るものという観点から提示してください。
      collaborative_learning_initiative: |
        新しいプロセスを導入する際には、人々が現在のやり方に愛着を持っていることを認識してください。新しいことを受け入れる前に、古いものを「手放す」ための心理的な安全を作り出してください。
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        一部の愛着は合理的です――感傷的な価値、乗り換えコスト。すべての抵抗がエンドーメント効果ではありません。
      manipulation: |
        より高い価格を引き出すために、偽の所有権の感覚を作り出すこと（例：「無料で試してみて」と促してエンドーメントを引き出す）。
      undervaluing_continuity: |
        すべての変化への抵抗が非合理的であると仮定すること、しかし継続性には真の価値がある場合。
      cold_rationality: |
        感情的な愛着を「単なるエンドーメント効果」として却下すること、しかしそれが真の価値を反映している場合。
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: 偽りの合意効果
    quick_introduction: |
      偽りの合意効果とは、他者が私たちの信念、態度、行動にどれだけ同意しているかを過大評価する傾向のことです。私たちは自分の見解が実際よりも一般的であると仮定し、合理的な人々が同意しないということを想像するのが難しいと感じます。
    one_liner: 私たちは、他者が私たちにどれだけ同意しているかを過大評価します。
    try_this:
      - 意見の異なる人々を積極的に探し出す — 合意を当然と考えない。
      - 始める前に、あなたの仮定を共有しない人々にテストする。
      - 質問する：同意しない人は何と言うだろうか？真剣に受け止める。
    ask_yourself:
      - 他の人が私と同じように考えていると仮定していませんか？
      - 最後に、他者の異なる意見に驚いたのはいつですか？
    in_more_detail: |
      ある立場を取ると、私たちはそれを規範だと考えがちです。私たちは自分と似たような考えを持つ人々に囲まれ、肯定的なメディアを消費し、曖昧なフィードバックを同意として解釈します。これにより、合意の幻想を強化するエコーチェンバーが生まれます。

      この効果は、深く根付いた信念や、自分たちがその立場に深く関与している場合に強くなります。他者が同意しない場合に驚き、交渉が困難になり、私たちが顧客が自分たちと同じように考えていると仮定した場合に市場調査が不十分になる可能性があります。
    why_this_is_important: |
      偽りの合意効果を認識することは、本当の意見の相違に備え、より良い調査を実施し、より効果的にコミュニケーションをとるのに役立ちます。これは、製品開発、交渉、リーダーシップにとって不可欠です。
    when_to_use:
      - 意思決定
      - 交渉
      - リーダーシップ
      - 問題解決
    how_can_you_spot_it:
      surprise_at_disagreement: |
        自分が明白だと考えていることに誰かが反対した場合、本当にショックを受ける。
      assuming_shared_values: |
        確認せずに、他者が自分の優先順位を共有しているかのように行動する。
      underestimating_opposition: |
        提案が直面する抵抗が、実際よりも少ないと予想する。
      echo_chamber_detection: |
        あなたの社会的および情報的な環境は、あなたの見解にほとんど挑戦しない。
    examples:
      product_development: |
        チームの全員が機能Xを求めているため、ユーザーもそれを求めているとチームが仮定する — しかし、採用率が低いことが判明する。
      politics: |
        政治的なバブルにいる人々は、自分たちの期待と一致しない選挙結果に驚く。
      negotiation: |
        相手方にとって「合理的」に見えるため、条件に同意すると仮定する。
      hiring: |
        「カルチャーフィット」で採用することは、あなたに同意する人々を採用することを意味する可能性があり、偽りの合意を強化する。
    real_world_implications: |
      偽りの合意効果は、二極化、製品の失敗、交渉の決裂に寄与します。それは私たちの予測に過信させ、異論に unprepared にさせます。
    professional_application:
      networking_and_relationship_building: |
        異なる視点を持つ人々を積極的に探し出す。共有された信念を当然と考えず — 尋ねて、耳を傾ける。
      collaborative_learning_initiative: |
        チームでは、構造化された反対意見（例：「プレモーテム」、悪魔の弁護人）を使用して、コストがかかる前に意見の相違を表面化させる。
    how_can_this_be_misapplied:
      dismissing_dissent: |
        同意しない人々を、彼らが有効な異なる視点を持っている可能性を考慮するのではなく、非合理的または無知であると仮定する。
      poor_research: |
        「彼らが何を求めているかはすでにわかっている」から顧客調査をスキップする。
      overconfidence: |
        他者が同意すると仮定することに基づいて、大胆な賭けをする。
      groupthink_amplification: |
        偽りの合意効果に挑戦しないチームは、集団思考に陥る可能性がある。
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: フレーミング効果
    quick_introduction: |
      フレーミング効果とは、根本的な事実は同じであっても、選択肢がどのように提示されるかによって、私たちの決定が変化する傾向のことです。「生存率90%」と「死亡率10%」は同じ結果を表しますが、異なる選択を促します。フレーミングが意思決定を形作ります。
    one_liner: 同じ事実でも、異なるフレーミングが異なった決定を導きます。
    try_this:
      - 決定する前に、複数の方法で選択肢をフレーミングし直してみてください。ゲインフレームとロスフレームです。
      - 何かがどのように表現されるかによって、選択が変わることに気づいてください。
      - 質問してください：フレーミングから切り離された、根本的な事実は何ですか？
    ask_yourself:
      - これがゲインとしてフレーミングされた場合と、ロスとしてフレーミングされた場合で、決定は変わるでしょうか？
      - フレーミングに反応していますか、それとも実際の結果に反応していますか？
    in_more_detail: |
      カーネマンとトベルスキーは、人々は、たとえ同じ結果であっても、選択肢がゲインとしてフレーミングされるとリスク回避的になり、ロスとしてフレーミングされるとリスク追求的になることを示しました。肯定的なフレーミング（「200人の命を救う」）と否定的なフレーミング（「400人が死亡する」）は、選好を変えます。ロスフレームは、同等のゲインフレームよりも強い感情的反応を引き起こします。

      フレーミング効果は、医療の決定、政策、マーケティング、交渉に影響を与えます。これは最も強力でよく文書化されたバイアスの1つです。意識することは役立ちますが、完全に克服するのは困難です。
    why_this_is_important: |
      フレーミング効果を認識することで、より一貫した意思決定を行い、操作に抵抗し、より効果的にコミュニケーションすることができます。また、同じオファーが提示方法によって受け入れられたり拒否されたりする理由も説明します。
    when_to_use:
      - 意思決定
      - 交渉
      - リーダーシップ
      - リスク評価
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        同じ結果がゲインかロスとしてフレーミングされると、異なる決定がなされます。
      presentation_dependence: |
        内容ではなく、フレーミングだけが変わると、決定が変動します。
      default_influence: |
        選択肢の順序やラベル付けが、選択に影響を与えます。
      emotional_trigger: |
        特定のフレーミングが、より強い感情的反応を引き起こします。
    examples:
      medical: |
        同じ処置に対する「生存率90%」対「死亡率10%」—
        人々はフレーミングに基づいて異なる選択をします。
      sales: |
        「50ドル節約」対「50ドル失わない」—同等のフレーミング、異なる
        心理的影響。
      policy: |
        「減税」対「政府支出」—同じ政策、異なる
        政治的反応。
      negotiation: |
        オファーを「割引」として提示するか、「割増料金の回避」として提示するかで
        受け入れ率が変わります。
    real_world_implications: |
      フレーミング効果は、広告、政治、交渉で悪用されます。
      医療の決定や政策支持に影響を与えます。
      フレーミングし直すことで、意思決定とコミュニケーションを改善できます。意識していても、効果を完全に排除することはできません。
    professional_application:
      networking_and_relationship_building: |
        選択肢を提示する際は、複数のフレーミングを検討してください。
        異なるフレーミングがどのように受け止め方に影響するかをテストしてください。
        情報を受け取る際は、「他にどのようにフレーミングできるだろうか？」と質問してください。
      collaborative_learning_initiative: |
        意思決定においては、フレーミング効果を確認するために、明示的に選択肢をフレーミングし直してください。
        「これをロスとしてフレーミングした場合、別の決定をするだろうか？」
        公平性のために、一貫したフレーミングを使用してください。
    how_can_this_be_misapplied:
      manipulation: |
        相手の認識なしに、望ましい結果に誘導するために意図的にフレーミングすること。
      false_equivalence: |
        一部のフレーミングが重要な情報を曖昧にしているにもかかわらず、すべてのフレーミングが同等に有効であると想定すること。
      overcorrection: |
        フレーミングを完全に無視し、それが重要ではないと想定すること—
        それは重要です。
      spin: |
        明確にするためではなく、誤解を招くためにフレーミングを使用すること。
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: 基本的帰属の誤り
    quick_introduction: |
      基本的帰属の誤りとは、他者の行動をその人の性格や性質に帰属させる傾向があるのに対し、
      自分自身の行動は状況要因に帰属させる傾向のことです。私たちは他者をその行動で判断し、
      自分自身をその意図で判断します。
    one_liner: 私たちは他者をその行動で、自分自身をその意図で判断する。
    try_this:
      - 誰かにイライラさせられたら、「この行動を説明する状況要因は何だろう？」と自問する。
      - 自分自身に適用するのと同じ寛容さを他者にも適用する。
      - 他者の行動を状況ではなく、その人の性格に帰属させていることに気づく。
    ask_yourself:
      - 自分の行動を説明するのと同じように、他者の行動を説明しているだろうか？
      - 相手の状況について、自分は何を見落としているだろうか？
    in_more_detail: |
      交通で割り込まれたとき、「なんて嫌なやつだ」と思う。自分が割り込んだときは、「急いでいたから仕方なかった」と思う。
      私たちは自分自身の失敗を状況（「渋滞がひどかった」）で説明し、他者の失敗を性質（「怠惰なんだ」）で説明する。
      成功についても逆が当てはまる。私たちは自分たちの成功を自らに帰し、他者の成功は運に帰する。

      この誤りが「基本的」であるのは、それが広範で持続的だからだ。
      それは共感を損ない、対立を煽り、業績評価を歪める。
    why_this_is_important: |
      基本的帰属の誤りを認識することで、人間関係が改善され、対立が減り、より公正な判断が下されるようになる。
      それは、誰かが「そういう人間だ」と結論づける前に、文脈を考慮することを奨励する。
    when_to_use:
      - 人間関係構築
      - 対立解決
      - リーダーシップ
      - 意思決定
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        他者の行動を説明する際に、「あの人はそういう人だから」と言う。
      situational_explanation_for_self: |
        自分自身の行動を説明する際に、「選択肢がなかった」または「状況が私にそうさせた」と言う。
      character_vs_context: |
        状況が行動を説明できる場合でも、性格だと仮定する。
      asymmetric_standards: |
        自分自身に課す基準よりも、他者に厳しい基準を課す。
    examples:
      traffic: |
        他のドライバーのミス = 「下手なドライバー」。自分のミス = 「避けられない状況」。
      workplace: |
        同僚の締め切り遅延 = 「無責任」。自分の締め切り遅延 = 「仕事が多すぎた。誰にもこれ以上はできなかったはずだ」。
      politics: |
        反対者の意見 = 「彼らは無知か悪だ」。自分の意見 = 「事実に合理的に対応した結果」。
      performance: |
        他者の成功 = 「運が良かった」。自分の成功 = 「ハードワークで勝ち取った」。
    real_world_implications: |
      基本的帰属の誤りは、対立を煽り、チームワークを損ない、採用や業績評価を歪める。
      これを修正することで、組織文化や個人的な人間関係が改善される。
    professional_application:
      networking_and_relationship_building: |
        誰かが期待外れだった場合、「あの人は信頼できない、あるいは扱いにくい人間だ」と結論づける前に、
        「この行動を説明する状況要因は何だろうか？」と自問する。
      collaborative_learning_initiative: |
        フィードバックやレビューにおいて、「状況優先」の解釈を奨励する。
        管理職には、性格に帰属させる前に文脈を考慮するよう訓練する。
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        一部の行動は実際に性格を反映しているにもかかわらず、あらゆる行動を「状況的」だと見なして、
        それらを免罪する。
      no_accountability: |
        誤解を、人々が実際に行った選択に対して責任を負わないようにするために利用する。
      self_deprecation: |
        常に自分を責め、他者の責任を認めないように、過剰に自己を卑下する。
      ignoring_patterns: |
        誰かが状況によらず繰り返し悪い行動をとる場合、その性質が関連している可能性がある。
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: ギャンブラーの誤謬
    quick_introduction: |
      ギャンブラーの誤謬とは、過去の独立した事象が将来の事象に影響を与えるという誤った信念です。連続して表が出た後、私たちは裏が出る「番」だと考えがちですが、実際には各コイン投げは独立しています。私たちはランダム性の中にパターンを見出し、必要のない「修正」や「反転」を期待してしまうのです。
    one_liner: 過去の独立した事象は将来の事象に影響しません――コインに記憶はありません。
    try_this:
      - 「そろそろ勝つ番だ」と思ったとき、自問してください：これらの事象は実際に独立していますか？
      - 平均への回帰（現実）とギャンブラーの誤謬（誤り）を区別しましょう。
      - ランダム性の中にパターンを見出していることに気づきましょう。
    ask_yourself:
      - 独立した事象であるにもかかわらず、過去の結果が将来の結果に影響すると仮定していませんか？
      - 統計学者は私の「変化の番だ」という推論に同意するでしょうか？
    in_more_detail: |
      公正なコイン投げでは、各投げは独立しています。表が出る確率は、過去の結果に関わらず常に50%です。しかし、私たちは一方の結果が長く続くと、もう一方が出やすくなると感じてしまいます。私たちは、多数回の試行で結果が平均化される「大数の法則」と、短期的な「修正」を混同してしまうのです。カジノに記憶はありません。

      この誤謬は、ギャンブル、投資、そして日々の意思決定に影響を与えます。「運」が均衡を取るだろうとか、「そろそろ勝つ番だ」と期待してしまいます。時には正しいこともありますが、それは間違った理由からです。
    why_this_is_important: |
      ギャンブラーの誤謬を認識することで、ギャンブルや投資における高額な間違いを防ぐことができます。また、短期的な傾向を過剰に解釈したり、誤った反転を期待したりすることを避けるのに役立ちます。これは、真の平均への回帰と誤謬とを区別するのに重要です。
    when_to_use:
      - 意思決定
      - 投資
      - リスク評価
      - 問題解決
    how_can_you_spot_it:
      due_for_a_change: |
        「負けが続いた――そろそろ勝つ番だ。」
      pattern_in_randomness: |
        ランダムな数列の中に意味のあるパターンを見出すこと。
      hot_hand_fallacy: |
        連勝が続くと信じること（関連するが逆の誤り）。
      independence_ignorance: |
        独立した事象を、関連しているかのように扱うこと。
    examples:
      gambling: |
        ルーレットで赤が何回か出た後、「赤がこれ以上続くはずがない」といって黒に賭ける。
      investing: |
        「市場は下落した――上がるに違いない。」
      hiring: |
        「何人かひどい候補者を採用してしまった――次はきっと良い人材に違いない。」
      sports: |
        「彼はたくさん外しすぎた――次のシュートは決める番だ。」
    real_world_implications: |
      ギャンブラーの誤謬は、ギャンブルでの損失や不十分な投資判断の原因となります。また、短期的なパターンの過剰解釈を説明するものでもあります。真の平均への回帰（回帰すべき実際の平均が存在する場合）と区別することが重要です。
    professional_application:
      networking_and_relationship_building: |
        過去の関係性の力学が将来「修正される」と仮定しないでください――各やり取りはいくぶん独立しています。ただし、真の根本原因がある場合は、パターンから学ぶこともできます。
      collaborative_learning_initiative: |
        パフォーマンスを評価する際は、ランダムな変動と体系的な変化を区別してください。短期的な傾向はノイズである可能性があります。「連勝」に過剰に反応したり、誤った反転を期待したりしないでください。
    how_can_this_be_misapplied:
      ignoring_regression: |
        平均への回帰は（例えば、スキルのパフォーマンスなど）現実的な場合があります。すべての反転をギャンブラーの誤謬として却下しないでください。
      false_independence: |
        （同じものの繰り返し測定など）実際には独立していない事象を独立していると仮定すること。
      overcorrection: |
        回帰すべき実際の平均があるのに、決して反転を期待しないこと。
      dismissing_patterns: |
        パターンの中には現実のものもあります――すべての数列がランダムなわけではありません。
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: 集団思考
    quick_introduction: |
      集団思考とは、結束力の強い集団が、批判的な評価よりも合意と調和を優先する傾向のことです。メンバーは反対意見を抑圧し、自己検閲を行い、集団の認識されている見解に同調します。意見の一致を求める願望が、最良の決定を求める願望を凌駕します。
    one_liner: 真実よりも調和—集団は批判的評価よりも合意を優先する。
    try_this:
      - 悪魔の代弁者を任命し、反対意見を期待され、安全なものにする。
      - 問いかける：「私たちは何を言っていないだろうか？」「この集団にいなかったら、私たちは何を言うだろうか？」
      - 集団の決定を最終決定する前に、外部の視点を求める。
    ask_yourself:
      - 調和を保つために自己検閲をしていないか？
      - 私たちの合意は本物か、それとも同意する圧力の結果か？
    in_more_detail: |
      アーヴィング・ジャニスは、外交政策の失敗（ピッグス湾事件、ベトナム戦争）を研究し、パターンを特定しました。それは、無敵の錯覚、集団的合理化、同調への圧力、自己検閲、意見の一致の錯覚、そして反対情報から集団を守るマインドガードです。高い結束力、孤立、ストレスが集団思考を増加させます。

      集団思考は、代替案が真剣に検討されないため、誤った決定につながります。反対意見は不忠と見なされます。集団は自分たちの正しさを過大評価し、リスクを過小評価します。
    why_this_is_important: |
      集団思考を認識することは、より良い意思決定のための条件を作り出すのに役立ちます。反対意見を奨励し、外部の視点を取り入れ、 premature consensus ( premature consensus) を避けることです。壊滅的な集団的失敗を避けるために不可欠です。
    when_to_use:
      - リーダーシップ
      - 意思決定
      - 問題解決
      - コンフリクト解決
    how_can_you_spot_it:
      pressure_for_consensus: |
        反対意見は奨励されないか、罰せられます。同意は報われます。
      illusion_of_unanimity: |
        沈黙は、自己検閲である可能性があるにもかかわらず、同意と解釈されます。
      collective_rationalization: |
        集団は警告を却下し、自分たちの見解を強化します。
      mindguards: |
        メンバーは、合意に異議を唱える可能性のある情報から集団を守ります。
    examples:
      bay_of_pigs: |
        ケネディ大統領の顧問たちは、侵攻計画に対する疑念を抑圧しました。その結果は悲惨なものでした。
      corporate_decisions: |
        リーダーシップチームが、誰も反対者になりたくないため、赤信号にもかかわらず合併を推進します。
      product_launches: |
        チームは、全員が計画に投資しており、誰も懸念を表明しないため、欠陥のある製品を出荷します。
      boards: |
        取締役会メンバーは、調和を保つために経営陣の提案を無批判に承認します。
    real_world_implications: |
      集団思考は、政策の失敗、企業の災害、機会の損失に寄与します。特に、ハイステークス、ハイストレスの状況では危険です。それを防ぐには、意図的な構造的介入が必要です。
    professional_application:
      networking_and_relationship_building: |
        反対意見のための心理的安全性を創出します。懸念を表明した人に感謝します。不快にならずに反対することを模範します。
      collaborative_learning_initiative: |
        悪魔の代弁者、レッドチーム、「プレモータム」を使用します。「premortem」を使用します。支配的な見解に反対する議論を要求します。外部の視点を取り入れます。リーダーはアンカリングを避けるために最後に話します。
    how_can_this_be_misapplied:
      false_dissent: |
        「指定された反対者」を作成しても、彼らは本当に反対していない—集団はそれを見抜く。
      excessive_conflict: |
        破壊的な対立と麻痺にまで反対意見を奨励すること。
      dismissing_consensus: |
        すべての合意が集団思考であると仮定すること—時には集団が正しい。
      individualism: |
        集団的な意思決定が不可能な時点まで過剰補正すること。
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: ハロー効果
    quick_introduction: |
      ハロー効果とは、人の持つ一つの肯定的な特徴や印象が、その人全体に対する判断に影響を与える傾向のことです。外見が気に入れば、その人が有能だと仮定するかもしれません。一つのスキルを賞賛すれば、何でもうまくやれると仮定するかもしれません。一つの肯定的な属性が、他のすべてに「ハロー（光輪）」を投げかけるのです。
    one_liner: 一つの肯定的な特徴が、その人全体に対する私たちの判断にハローを投げかける。
    try_this:
      - 特徴を個別に評価する—一つの強みが他の強みを示唆すると思わないようにする。
      - 魅力、カリスマ性、または一つの成功があなたの見方を変えていることに気づく。
      - 質問する：その肯定的な属性がなければ、この人を同じように評価するだろうか？
    ask_yourself:
      - 一つの特徴からその人全体を一般化していないか？
      - 一つの強みに感銘を受けていなければ、弱点が見えるだろうか？
    in_more_detail: |
      エドワード・ソーンダイクは、ある特徴で兵士を高く評価した将校は、たとえ無関係な特徴であっても、他の特徴でも高く評価する傾向があることを観察しました。私たちは特殊なことから全体へと一般化します。魅力、カリスマ性、またはある分野での成功が、広がるハローを生み出します。

      逆—一つの否定的な特徴がすべてを色付けする—は、しばしば「ホーン効果」と呼ばれます。どちらも不当な一般化の形態です。ハロー効果は、採用、業績評価、そして日常的な印象に影響を与えます。
    why_this_isimportant: |
      ハロー効果を認識することは、より正確な評価を行い、過度の一般化を避けるのに役立ちます。公平な採用、業績管理、人間関係の評価に不可欠です。一つの強みが、すべての強みを意味するわけではありません。
    when_to_use:
      - 意思決定
      - リーダーシップ
      - 関係構築
      - 採用
    how_can_you_spot_it:
      trait_spillover: |
        一つの肯定的な特徴が無関係な特徴の判断に影響を与える。
      attractiveness_bias: |
        魅力的な人は、有能さ、信頼性などで高く評価される。
      success_generalization: |
        ある分野での成功が、他の分野での有能さの仮定につながる。
      first_impression_dominance: |
        初期の肯定的な印象が、その後のすべての評価を色付ける。
    examples:
      hiring: |
        雄弁で感じの良い候補者は、たとえスキルが無関係であっても、技術的にも優れていると仮定される。
      performance_reviews: |
        際立った一つのプロジェクトが、すべての側面で高い評価につながる。
      politics: |
        政治家のカリスマ性が、政策に関する有能さの仮定につながる。
      branding: |
        ある製品での会社の成功が、すべての製品の品質の仮定につながる。
    real_world_implications: |
      ハロー効果は、採用、業績評価、投資決定を歪めます。それは、魅力的で、雄弁で、すでに成功している人々を優遇します。それを軽減するには、構造化された評価と、側面を分離することが必要です。
    professional_application:
      networking_and_relationship_building: |
        全体的な印象ではなく、特定の側面で人々を評価する。他者への判断に一つの肯定的な特徴が影響しているときに意識する。反証を探す。
      collaborative_learning_initiative: |
        側面を個別に評価する、構造化された面接と評価を使用する。評価者間で評価を校正する。全体的な「直感」への依存を減らす。
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        すべての肯定的な印象がハロー効果であるわけではない—人々は実際に複数の側面で優れていることもある。
      false_objectivity: |
        ハロー効果を完全に排除できると仮定すること—それは蔓延しており、部分的には自動的である。
      overcorrection: |
        反対の極端に走り、魅力的またはカリスマ性のある人々を無能だと仮定すること。
      stereotyping: |
        正当な肯定的な属性を却下するために「ハロー効果」を使用すること。
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
    why_this_is_important: |
      Recognizing the halo effect helps you make more accurate evaluations
      and avoid overgeneralizing. It's essential for fair hiring, performance
      management, and relationship assessment. One strength doesn't imply
      all strengths.
  - id: hanlons_razor
    name: ハンロンの剃刀
    quick_introduction: |
      ハンロンの剃刀とは、「無能で十分に説明できることを悪意に帰するな」という原則です。言い換えれば、無能、見落とし、無知がその行動を説明できる場合に、悪い意図を仮定しないでください。
    one_liner: 無能さや見落としで説明できる場合に悪意を仮定しないでください。
    try_this:
      - 誰かにイライラさせられたとき、「これは間違いや無知で説明できるだろうか？」と自問してください。
      - 悪意を仮定する前に、より単純な説明をデフォルトとしてください。
      - 「彼らは私を傷つけようとした」と飛びついていることに気づきましょう。
    ask_yourself:
      - 無能で説明できることを悪意に帰していないだろうか？
      - 彼らの立場だったら、同じように寛大な見方をしてもらいたいだろうか？
    in_more_detail: |
      この原則は、人々に寛大な見方をするように促します。誰かの行動があなたを傷つけたりイライラさせたりした場合、デフォルトの仮定はしばしば、彼らがあなたを傷つけるつもりだったというものです。ハンロンの剃刀は、そのような行動の多くは、悪意からではなく、不注意、情報の不足、または実行のまずさに起因すると示唆しています。

      これは、悪意が決して存在しないという意味ではありません。より単純な説明が当てはまる場合に、最悪の解釈に飛びつくべきではないということです。この剃刀は、パラノイアを減らし、人間関係を改善し、問題に建設的に対応するのに役立ちます。
    why_this_is_important: |
      ハンロンの剃刀を適用することは、対立を減らし、人間関係を維持し、非難を特定するのではなく、問題解決にエネルギーを集中させます。また、誰もがあなたを陥れようとしていると仮定するストレスからあなたを守ります。
    when_to_use:
      - 対立解消
      - リーダーシップ
      - 関係構築
      - 意思決定
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        否定的な結果を意図的な危害として即座に解釈します。
      personalizing_mistakes: |
        何かがうまくいかなかったとき、それは個人的にあなたに向けられたものだと仮定します。
      ignoring_alternative_explanations: |
        無能、誤解、または見落としを可能性として考慮しません。
      escalation_before_inquiry: |
        何が起こったのかを尋ねる前に、怒りや報復で対応します。
    examples:
      email_tone: |
        送信者が単に忙しいか、トーンが下手なだけかもしれないのに、簡潔なメールを受動攻撃的だと仮定すること。
      missed_deadline: |
        同僚が期限に遅れたことを、彼らが過剰に約束していたり、障害に遭遇したかもしれないのに、妨害だと解釈すること。
      policy_decisions: |
        自分が嫌いな会社の方針が従業員を傷つけるように設計されたと仮定すること。実際には別の問題に対処するための不器用な試みであるかもしれないのに。
      traffic: |
        他のドライバーがあなたを見ていなかったかもしれないのに、意図的にあなたを割り込ませたと仮定すること。
    real_world_implications: |
      ハンロンの剃刀は、職場文化を改善し、訴訟を減らし、対立解消をより効果的にします。過剰な使用は過失を許容する可能性があり、使用不足は不必要な対立を生み出します。
    professional_application:
      networking_and_relationship_building: |
        誰かに失望させられたら、悪意を仮定する前に説明を求めてください。寛大な解釈をデフォルトにすることで、人間関係を維持してください。
      collaborative_learning_initiative: |
        チームでは、証明されるまでは間違いは意図的ではないと仮定する文化を築いてください。非難ではなく、システムとプロセスに焦点を当ててください。
    how_can_this_be_misapplied:
      excusing_negligence: |
        繰り返される無能さや不注意を「悪意ではない」と片付け、責任を問うべき場合でもそうすること。
      ignoring_genuine_malice: |
        剃刀をあまりにも厳格に適用しすぎて、真の悪意のある人物や有害な行動を見逃すこと。
      avoiding_difficult_conversations: |
        ハンロンの剃刀を、業績の問題に対処しない言い訳として使用すること。
      gaslighting_victims: |
        本当に不当な扱いを受けた人に、「悪意を仮定している」と告げ、実際には悪意が存在していた場合。
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: ホーソン効果
    quick_introduction: |
      ホーソン効果とは、人々が観察されている、あるいは研究されていることを知っている場合に、自身の行動を変化させる傾向のことです。観測そのものが変化を引き起こす可能性があり、必ずしもテストされている介入によるものではありません。人々は受けた注目に反応します。
    one_liner: 観察されると行動が変わる—注目それ自体が効果を生むことがある。
    try_this:
      - 介入の効果を評価する際には、観察が結果を左右しているかどうかを検討しましょう。
      - 注目され、価値があると感じることがパフォーマンスを向上させうることを認識しましょう。
      - 観察によって変化が生じた場合、特定の介入に変化を帰属させることには注意が必要です。
    ask_yourself:
      - この改善は介入によるものか、それとも観察されていることによるものか？
      - 注目をやめた場合、結果は持続するだろうか？
    in_more_detail: |
      ホーソン・ワークス工場では、研究者たちは照明を変更した際に生産性が向上し、元に戻した際にも向上することを発見しました。その向上は、特定の介入ではなく、注目と観察によるものと思われました。後年の再分析では、この効果は誇張されていた可能性が示唆されましたが、その概念は有用であり続けています：研究されているという事実が行動を変化させるのです。

      ホーソン効果は、研究や評価を複雑にします。介入の顕著な影響を誇張する可能性があります。また、注目され、価値があると感じることがパフォーマンスを向上させうることも示唆しており、これはマネジメントにとっての教訓です。
    why_this_is_important: |
      ホーソン効果を理解することは、研究結果の解釈、より良い実験の設計、そして注目自体が変化を促進しうることを認識するのに役立ちます。マネジメントにおいては、人々に注目することが、特定の介入と同じくらい重要であることを示唆しています。
    when_to_use:
      - リーダーシップ
      - 意思決定
      - 学習
      - 問題解決
    how_can_you_spot_it:
      observation_induced_change: |
        人々が自分たちが監視されている、あるいは研究されていると知ると、行動が変化します。
      attention_effect: |
        注目するという行為が、単なる特定の変化だけでなく、改善を生み出します。
      placebo_analog: |
        プラセボ（偽薬）のように、研究されているという「治療」が効果を持つことがあります。
      short_term_improvement: |
        観察が終わると、改善は薄れる可能性があります。
    examples:
      workplace_studies: |
        研究中に生産性が向上する—新しいプロセスによるものか、それとも誰かが観察しているという事実によるものか？
      medical_trials: |
        プラセボ群（対照群）の改善—部分的には、注目を受けているためです。
      education: |
        研究者がいると、学生の成績が向上する—「観察者効果」。
      management: |
        マネジメントが注目すると、チームは改善する—新しい施策によるものか、それとも注目そのものによるものか？
    real_world_implications: |
      ホーソン効果は、研究の妥当性やプログラム評価に影響を与えます。介入の効果を過大評価する可能性があります。また、肯定的な教訓も持ち合わせています：注目され、研究されていると感じることが改善を促すことができる—そのため、配慮と可視性は重要です。
    professional_application:
      networking_and_relationship_building: |
        人々に注目することは、彼らのパフォーマンスを向上させる可能性があります—ホーソン効果は、観察され、価値があると感じることが重要であることを示唆しています。これを肯定的に活用しましょう：定期的なチェックイン、可視性、そして認識。
      collaborative_learning_initiative: |
        介入を評価する際には、対照群を使用し、改善が介入によるものか、それによってもたらされる注目によるものかを検討しましょう。ホーソン効果は、見かけの成功を誇張する可能性があります。
    how_can_this_be_misapplied:
      surveillance_justification: |
        「ホーソン効果」を使用して、絶え間ない監視を正当化する—観察は、信頼や内発的動機付けを低下させる可能性もあります。
      dismissing_improvements: |
        研究中のすべての改善をホーソン効果だと断定する—時には、介入は本当に効果があるのです。
      overgeneralization: |
        元のホーソン研究は疑問視されています；効果は、かつて考えられていたよりも小さいか、あるいは異なっている可能性があります。
      manipulation: |
        行動を操作するために、偽の「観察」を作り出す。
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: 後知恵バイアス
    quick_introduction: |
      後知恵バイアス（「知っていた、あの時」効果とも呼ばれる）は、
      出来事が起こった後で、それを予測または予期できただろうと信じる傾向のことです。
      結果が実際よりも避けられなかったように思えるように、過去を再構築します。
    one_liner: 事後には、すべて知っていたと思いがちです。
    try_this:
      - 過去の決定を判断する前に、「その時、彼らは何を知っていたか？」と自問してください。
      - 結果が出る前に予測を記録し、後で比較しましょう。
      - 過去が実際よりも避けられなかったように見せていることに気づきましょう。
    ask_yourself:
      - その時に利用できなかった情報で判断していませんか？
      - 実際にこれを予測したのか、それとも今、単に明白に感じられるだけなのか？
    in_more_detail: |
      結果を知ってしまうと、それは明白に感じられます。
      私たちは、事前に感じていた不確実性を忘れてしまいます。
      このバイアスは学習を歪めます—私たちは「知っていた」と思っていますが、
      実際にはそうではなく、モデルを更新しません。
      また、不公平な非難につながります：「将来は本当に不確実だったのに、『彼らは見るべきだった』」。

      後知恵バイアスは、事後検証、法的判断、歴史分析に影響を与えます。
      私たちは、その時点では利用できなかった情報で過去の決定を判断します。
    why_this_is_important: |
      後知恵バイアスを認識することは、結果からの学習、決定のより公平な評価、
      より正確なリスク評価を向上させます。
      それは、私たちの予測能力に対する誤った自信を防ぎます。
    when_to_use:
      - 意思決定
      - 学習
      - リスク評価
      - リーダーシップ
    how_can_you_spot_it:
      inevitability_feeling: |
        出来事の後で、「こうなるしかなかった」と感じられます。
      reconstructed_certainty: |
        出来事の前に、実際よりも確信があったと記憶しています。
      blame_for_failure: |
        結果が本当に不確実だった時、「知っていたはずだ」となります。
      undervaluing_luck: |
        運が役割を果たした時に、結果をスキルや先見の明に帰します。
    examples:
      investing: |
        市場が崩壊した後で「市場が崩壊することを知っていた」と言う—しかし、
        事前にその「知識」に基づいて行動しなかった場合。
      project_failures: |
        事後検証で「リスクに気づくべきだった」と言う—しかし、リスクは本当に曖昧だった場合。
      elections: |
        サプライズな結果の後で、評論家たちは、後知恵で「明白だった」と説明します。
      medical: |
        事後で稀な病気を診断した後、「兆候はそこにありました」と言います。
    real_world_implications: |
      後知恵バイアスは、法的責任、業績評価、学習を歪めます。
      それは、私たちの判断に過信させ、限られた情報で合理的な決定を下した人々に対して不公平にします。
    professional_application:
      networking_and_relationship_building: |
        他者の過去の決定を評価する際には、当時知られていたことと、
        現在あなたが知っていることを意識的に分けてください。
        実際には結果を予測していなかったのに、「言った通りだ」と言うことを避けてください。
      collaborative_learning_initiative: |
        事後検証では、「事前の検証」や「意思決定ジャーナル」のテクニックを使用して、
        意思決定時の不確実性を記録してください。実際の不確実性と後知恵の再構築を比較します。
    how_can_this_be_misapplied:
      excusing_all_failures: |
        一部は予見可能だったにもかかわらず、すべての失敗を「予測不可能」として却下すること。
      no_accountability: |
        後知恵バイアスを使用して、過失に対して人々を説明責任から逃れさせること。
      false_uncertainty: |
        何も予測できないと信じるために過剰に修正すること。
      undermining_learning: |
        「後知恵は20/20」だから教訓を引き出すことを拒否すること—それでも結果から学ぶことはできます。
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: ハイパーボリック・ディスカウンティング
    quick_introduction: |
      ハイパーボリック・ディスカウンティングとは、より大きくて将来の報酬よりも、小さくて近い報酬を優先する傾向であり、合理的なモデルが予測するよりも将来を急激に割り引くことです。私たちは、一貫性のない方法で現在を過大評価し、将来を過小評価します。
    one_liner: より小さく近いものを、より大きく遠いものよりも優先する―そして、将来を不一貫に割り引く。
    try_this:
      - 事前コミット：落ち着いた状態で、将来の自分のために選択をする。
      - 「10分後なら欲しいか？10ヶ月後なら？」と問い直し、不一致を明らかにする。
      - コミットメントデバイスを使用して、将来の自分をより良い選択に縛り付ける。
    ask_yourself:
      - 将来の自分を犠牲にして、現在を過大評価していないか？
      - 報酬が1日、1年遅延したら、この選択をするだろうか？
    in_more_detail: |
      私たちは、1年後の100ドルよりも今日の50ドルを好むかもしれないが、同時に、1年後の50ドルよりも2年後の100ドルを好むかもしれない―これは一貫性がないにもかかわらず。私たちの割引率は一定ではなく、双曲線的です。近い将来は大幅に割り引かれ、遠い将来はそれほど急激には割り引かれません。これは先延ばし、依存症、貯蓄不足を説明します。

      現在バイアスは関連する概念です：私たちは現在の瞬間に不釣り合いな重みを与えます。ハイパーボリック・ディスカウンティングは、私たちが約束を守らない約束をし、長期計画が難しい理由を説明します。
    why_this_is_important: |
      ハイパーボリック・ディスカウンティングを理解することは、より良いインセンティブを設計し、将来の自分にコミットし、短期的な罠を避けるのに役立ちます。それは、私たちがなぜ先延ばしをするのか、そしてなぜ長期目標に苦労するのかを説明します。
    when_to_use:
      - 意思決定
      - キャリアの選択
      - 投資
      - リーダーシップ
    how_can_you_spot_it:
      present_preference: |
        遅延した、より大きな報酬よりも即時の満足を選択すること。
      inconsistent_time_preferences: |
        時間が経過するにつれて逆転する好み（例：明日からダイエットしようと思いつつ、今日食べる）。
      commitment_failures: |
        将来が現在になると、従わない計画を立てること。
      procrastination: |
        即時の快適さを優先して、重要なタスクを遅らせること。
    examples:
      savings: |
        退職後の貯蓄のためではなく、今すぐ使うことを選択すること―将来は抽象的に感じられる。
      health: |
        今日、快適さのために運動をサボること。明日後悔することを知っていても―明日の後悔は割り引かれる。
      addiction: |
        長期的な健康よりも、即時の高揚感を選択すること。
      deadlines: |
        締め切りが迫るまで何もしないこと―すると、「現在」に締め切りが含まれ、行動する。
    real_world_implications: |
      ハイパーボリック・ディスカウンティングは、貯蓄、健康、教育、依存症に影響を与えます。それは多くの自制心の失敗を説明します。コミットメントデバイス（例：自動貯蓄、説明責任）は、将来の選択肢を制限することで役立ちます。
    professional_application:
      networking_and_relationship_building: |
        将来のコミットメントを求める際には、将来を「現在」にする説明責任を作成してください（例：チェックイン、締め切り）。構造なしでは人々が従うことを期待しないでください。
      collaborative_learning_initiative: |
        コミットメントデバイスを使用してください：公約、締め切りへの事前コミットメント、長期目標をより緊急に感じさせる構造。長期プロジェクトを短いマイルストーンに分割します。
    how_can_this_be_misapplied:
      excessive_control: |
        「将来の自分を助ける」という名目で、人々の選択肢を過度に制限すること。
      paternalism: |
        他者の長期的な利益のために何が最善かを知っていると仮定すること。
      ignoring_present_needs: |
        抽象的な将来の利益を優先して、正当な現在のニーズを無視すること。
      one_size_fits_all: |
        割引率は人によって異なります。すべての人が同じコミットメントデバイスを必要とするわけではありません。
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: 統制の幻想
    quick_introduction: |
      統制の幻想とは、私たちが結果に影響を与える能力を過大評価する傾向のことです。
      私たちは、ランダムな出来事、他人、複雑なシステムに対して、実際よりも多くのコントロールを持っていると信じてしまいます。
      相関関係を因果関係と、行動を影響力と混同します。
    one_liner: 私たちは、特にランダムなものについて、結果に影響を与える能力を過大評価する。
    try_this:
      - 質問：「何もしなかったらどうなるだろう？」私の行動が実際の結果を引き起こしているだろうか？
      - コントロールできることとできないことを区別する。
      - ランダムな結果と自分の行動を迷信的に結びつけていることに気づく。
    ask_yourself:
      - 相関関係を因果関係と混同していないか？
      - もし行動しなかったら、結果は違っていただろうか？
    in_more_detail: |
      人々は、自分たちの番号を選んで宝くじに当選する方が、確率が変わらないにもかかわらず、より自信を感じます。
      私たちは、高い数字を望むとき、より強くサイコロを振ります。
      私たちの儀式や行動が、実際にはランダムであるか、私たち以外の要因によって決定されている結果に影響を与えると私たちは考えます。
      この幻想は心地よいものです。不安を軽減します。しかし、過信や誤った意思決定につながる可能性があります。

      この幻想は、私たちがプロセスに関与しているとき、初期に成功したとき、そしてタスクに慣れているときほど強くなります。
      これは、投資、経営、そして日常生活に影響を与えます。
    why_this_is_important: |
      統制の幻想を認識することは、期待値を調整し、過信を避け、実際​​に重要なことに労力を集中させるのに役立ちます。
      また、私たちがなぜ迷信的な行動を続け、影響力を過大評価してしまうのかを説明します。
    when_to_use:
      - 意思決定
      - リスク評価
      - 投資
      - リーダーシップ
    how_can_you_spot_it:
      overestimated_influence: |
        そうではないのに、自分たちの行動が結果に影響を与えると信じていること。
      ritual_superstition: |
        そうではないのに、結果に影響を与えると考える行動（ラッキーカラーのシャツ、試合前のルーティン）。
      choice_illusion: |
        選択が結果に影響しないのに、選択することでコントロールできていると感じること。
      action_bias: |
        行動が役立たない場合でも、「待つ」よりも「何かをする」ことを好むこと。
    examples:
      gambling: |
        宝くじの番号を選ぶことは、ランダムに選ぶことよりもコントロールできているように感じる（確率は同じ）。
      investing: |
        アクティブトレーダーは、市場を打ち負かす能力を過大評価しており、ほとんどがコスト後にパフォーマンスが悪化する。
      management: |
        リーダーは、組織の結果に対する自分たちの影響力を過大評価しており、多くの要因は彼らのコントロール外にある。
      sports: |
        ファンは、自分たちの応援が試合に影響を与えると信じている。選手はラッキーな儀式を持っている。
    real_world_implications: |
      統制の幻想は、リスクテイク、無駄な努力の継続、結果の帰属に影響を与えます。
      （時には有用な）行動を動機づけることもありますが、無駄な労力と過信にもつながります。
      調整は意思決定の質を向上させます。
    professional_application:
      networking_and_relationship_building: |
        コントロールできることとできないことを認識する。影響力のある要因にエネルギーを集中する。
        自分が引き起こさなかった結果の功績を主張しない、あるいは防げなかった結果を非難しない。
      collaborative_learning_initiative: |
        計画において、コントロール可能な要因とコントロール不可能な要因を区別する。
        初期の勝利による誤った自信を避ける。期待値を調整するために確率的思考を使用する。
    how_can_this_be_misapplied:
      learned_helplessness: |
        実際に意味のある影響力があるのに、コントロールが全くないと信じるように過度に修正すること。
      dismissing_agency: |
        多くの領域でスキルと努力が重要であるにもかかわらず、「すべて運だ」と言うこと。
      false_fatalism: |
        統制の幻想を使って、何もしないことを正当化すること。
      one_size_fits_all: |
        コントロールは領域によって異なり、状況によってはよりコントロールしやすいものもある。
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: インパクトバイアス
    quick_introduction: |
      インパクトバイアスとは、将来の出来事に対する感情的な反応の激しさや持続時間を過大評価する傾向のことです。良い出来事は期待していたほど幸福感を高めず、悪い出来事は期待していたほど不幸にしないと考えてしまいます。私たちは感情予測が苦手なのです。
    one_liner: 出来事が私たちの幸福にどれほど影響するか、そしてその期間を過大評価してしまう。
    try_this:
      - 尋ねる：似たような過去の出来事の後、どう感じたか？私たちは予想よりも早く適応する。
      - 予測される影響によって意思決定をしない—感情の予測は苦手である。
      - 単一の結果による持続的な影響を過大評価しているときに気づく。
    ask_yourself:
      - この気分がどれくらい続くかを過大評価していませんか？
      - 過去の経験は、似たような出来事について何を語っていますか？
    in_more_detail: |
      ダニエル・ギルバートとティモシー・ウィルソンは感情予測の研究をしています。私たちは、勝利後の幸福感や敗北後の不幸感がどれだけ続くかを過大評価します。私たちは予想よりも早く適応します。また、単一の出来事の影響を過大評価します。一つの結果が私たちの幸福を決定すると考えがちですが、実際には多くの要因が幸福に寄与しています。将来の感情を予測する際に、私たちは間違ったことに焦点を当てがちです。

      インパクトバイアスは、昇進、人間関係、購入といった人生の重要な意思決定にも影響を与えます。私たちは、昇進、関係、購入が私たちの幸福をどれだけ変えるかを過大評価します。また、喪失による持続的な痛みを過大評価します。
    why_this_is_important: |
      インパクトバイアスを認識することは、実際にあなたの人生を改善するものをより良く決定するのに役立ちます。それは、あなたが考えているほど重要ではない結果への過剰な投資を減らし、あなたが予想しているほど長くは続かない結果への恐怖を減らします。
    when_to_use:
      - 意思決定 (decision-making)
      - キャリアの選択 (career_moves)
      - リスク評価 (risk_assessment)
      - 関係構築 (relationship_building)
    how_can_you_spot_it:
      overestimated_impact: |
        「これはすべてを変えるだろう」—似たような過去の出来事が、持続的な影響はさほどなかったにもかかわらず。
      duration_overestimation: |
        「もう立ち直れない」—私たちは通常、予想よりも早く適応するにもかかわらず。
      focalism: |
        一つの出来事に焦点を当て、幸福度に影響を与える他の要因を無視する。
      adaptation_neglect: |
        良い状況にも悪い状況にも適応することを忘れている。
    examples:
      career: |
        「この昇進が決まれば、もっと幸せになれる」—過去の昇進は一時的な影響しかなかったにもかかわらず。
      purchases: |
        「この車があれば幸せになれる」—新しさはすぐに薄れるのに。
      loss: |
        「この失恋から立ち直れない」—通常、数ヶ月で適応するのに。
      events: |
        結婚式、休暇、節目となる出来事が、長期的な幸福にどれだけ影響するかを過大評価する。
    real_world_implications: |
      インパクトバイアスは、お金、キャリア、人間関係に関する誤った意思決定につながります。私たちは、適応してしまう経験にお金を払いすぎ、回復できる喪失を過度に恐れます。これは、政策や個人の計画にも影響を与えます。
    professional_application:
      networking_and_relationship_building: |
        キャリアや人間関係の意思決定をする際には、似たような過去の出来事の後、どのように感じたかを考慮してください。その影響は予想していたほど長く続きましたか？それを将来の予測の調整に利用してください。
      collaborative_learning_initiative: |
        チームが失敗や成功に直面したとき、適応することを思い出させてください。「私たちは予想よりも早く適応するだろう」ということは、過剰な祝賀と過剰な絶望の両方を減らすことができます。
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        トラウマや大きな喪失など、一部の出来事には永続的な影響があります。感情予測のすべてがバイアスであると軽視しないでください。
      cold_rationality: |
        「気にする必要はない」—その瞬間の経験は、実際には重要であるにもかかわらず。
      undervaluing_experiences: |
        「どうせ適応するだろう」と考えて、肯定的な経験を避けること。
      invalidating_emotions: |
        人々がその瞬間にサポートを必要としているのに、「その感情はすぐに過ぎ去る」と伝えること。
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: イングループバイアス
    quick_introduction: |
      イングループバイアスとは、自分たちのグループに属していると認識している人々を、外部の人間と認識している人々よりもひいきする傾向のことです。最小限または任意の違いに基づいて、イングループのメンバーには肯定的な資質を、アウトグループのメンバーには否定的な資質を帰属させることがよくあります。
    one_liner: 私たちは自分たちのイングループをひいきし、アウトグループをより厳しく—しばしば任意に—判断します。
    try_this:
      - Ask: もしこの人が自分のグループにいたら、同じように判断しただろうか？
      - Actively seek out-group perspectives when making decisions. (意思決定の際には、アウトグループの視点を積極的に求めましょう。)
      - Notice when group boundaries are shaping your judgment. (グループの境界線がどのように自分の判断を形成しているかに気づきましょう。)
    ask_yourself:
      - Am I favoring someone because they're "one of us"? (「仲間」だからという理由で誰かをひいきしていませんか？)
      - Would I apply the same standards to an out-group member? (アウトグループのメンバーに同じ基準を適用するだろうか？)
    in_more_detail: |
      グループがランダムに割り当てられた（例：コイントスで）としても、人々はすぐに自分たちのイングループへの好みを形成します。イングループのメンバーをより信頼し、彼らにより寛大にリソースを配分し、彼らの行動をより寛大に判断します。アウトグループのメンバーは反対の扱いを受けます。

      イングループバイアスは、部族主義、差別、紛争を助長します。採用、昇進、協力、政策に影響を与えます。人種、国籍、会社、チーム、または共有されたアイデンティティに基づいている可能性があります。
    why_this_is_important: |
      イングループバイアスを認識することは、より公正な意思決定を行い、より包括的なチームを構築し、ひいきを避けるのに役立ちます。また、多様性への取り組みが抵抗に直面する理由—イングループの好みは自動的である—を説明します。
    when_to_use:
      - リーダーシップ
      - 意思決定
      - 関係構築
      - 紛争解決
    how_can_you_spot_it:
      preferential_treatment: |
        「私たち」には疑わしい利益を与えるが、「彼ら」には与えない。
      resource_allocation: |
        アウトグループのメンバーが同等またはそれ以上のニーズを持っている場合に、イングループのメンバーにより多くを割り当てる。
      attribution_asymmetry: |
        イングループの成功＝スキル；アウトグループの成功＝運。イングループの失敗＝状況；アウトグループの失敗＝人格。
      minimal_group_effects: |
        任意グループの割り当てでもひいきが生じる。
    examples:
      hiring: |
        母校出身者や自分の経歴を共有する候補者を優先する。
      performance_reviews: |
        同等のパフォーマンスを持つアウトグループのメンバーよりも、イングループのメンバーを有利に評価する。
      collaboration: |
        「自分たちのチーム」を信頼し、含める一方で、「彼らのチーム」を排除したり疑ったりする。
      politics: |
        イングループの議論は無批判に受け入れながら、アウトグループの議論を却下する。
    real_world_implications: |
      イングループバイアスは不平等を永続させ、実力主義を損ない、紛争を煽ります。採用、昇進、投資、政策に影響を与えます。それを減らすには、意図的な努力が必要です—それは自然には解決しません。
    professional_application:
      networking_and_relationship_building: |
        自分の身近なサークル外の人々を積極的に含めましょう。多様な視点を求めましょう。あなたが「自分に似ている」という理由で誰かをひいきしていないか自問しましょう。
      collaborative_learning_initiative: |
        採用と評価におけるイングループバイアスを減らすために、構造化されたプロセス（匿名レビュー、多様なパネル）を使用しましょう。共有されたアイデンティティを構築するために、グループ間のプロジェクトを作成しましょう。
    how_can_this_be_misapplied:
      forced_diversity: |
        根本的なバイアスに対処せずに、反感を生むような割り当てやポリシーを実装すること。
      out_group_hostility: |
        アウトグループの敵意も存在するのに、イングループバイアスだけが問題であると見なすこと。
      ignoring_legitimate_differences: |
        すべてのグループの違いがバイアスであるわけではありません—時にはグループは異なる特性を持っています。すべての格差が差別であると仮定しないでください。
      reverse_discrimination: |
        イングループのメンバーにとって不公平な方法でアウトグループをひいきするために過剰に是正すること。
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: 逆転の発想
    quick_introduction: |
      逆転の発想とは、問題をひっくり返して考える問題解決手法です。「どうすれば成功できるか？」と問う代わりに、「何が私を失敗させるか？」と問い、それらを避けるのです。これは、前向きな思考では見落としがちなリスクやアンチパターンを明らかにします。
    one_liner: 逆転の発想—失敗する原因を問い、それらを避けよう。
    try_this:
      - どんな目標であっても、失敗する主な方法をリストアップし、それらを避けましょう。
      - ネガティブな想像を使いましょう：何がこれをうまくいかなくさせるでしょうか？
      - 問いましょう：賢い人は、これを台無しにするために何をするでしょうか？
    ask_yourself:
      - これが失敗する原因について考えましたか？
      - 前向きなことだけを考えることで、何を見落としていますか？
    in_more_detail: |
      チャーリー・マンガーによって広められ、数学的論理に根ざした逆転の発想は、成功を追求するよりも失敗を避ける方がしばしば容易であるという事実を利用します。物事がうまくいかなくなる主な方法を特定できれば、それらを体系的に排除することができます。

      カール・ヤコビは「常に逆転せよ」と言ったと伝えられています。ストア派は、持っているものを感謝し、逆境に備えるために、ネガティブな想像（損失を想像すること）を使用しました。逆転の発想は悲観主義ではありません。障害物を取り除くことで進歩するための構造化された方法です。
    why_this_is_important: |
      逆転の発想は、壊滅的な間違いを避け、計画をストレステストし、明白でない解決策を見つけるのに役立ちます。これは、見過ごされがちな重要な失敗モードを確実にしないことで、前向きな計画を補完します。
    when_to_use:
      - 問題解決 (problem_solving)
      - 意思決定 (decision_making)
      - リスク評価 (risk_assessment)
      - キャリアの選択 (career_moves)
    how_can_you_spot_it:
      premortem_thinking: |
        プロジェクトの前に、「もしすでに失敗していたとしたら、なぜ失敗したのか？」と問うこと。
      anti_goals: |
        達成したいことと同様に、避けたいことを明確に定義すること。
      reverse_engineering_failure: |
        成功例だけでなく、失敗例を研究して教訓を抽出すること。
      constraint_focus: |
        アップサイドを最適化する前に、制約とボトルネックを特定すること。
    examples:
      investing: |
        「この株が上がるためには何が必要か？」と問う代わりに、「何が私のお金を失わせるか？」と問い、それらのシナリオを避けましょう。
      career: |
        「私の評判を台無しにするものは何か？」という問いは、避けるべき行動のリストにつながります。
      product_launch: |
        「なぜほとんどの製品ローンチは失敗するのか？」という問いは、ローンチ前に対処すべきリスクを明らかにします。
      health: |
        「寿命を縮める習慣は何ですか？」という問いは、「健康になるためには何が重要か？」という問いよりも、より明確な回避リストを提供します。
    real_world_implications: |
      逆転の発想は、工学（故障モード分析）、投資、戦略で使用されます。過信を減らし、リスク管理を改善します。過度に頼りすぎると、過剰な注意深さにつながる可能性があります。
    professional_application:
      networking_and_relationship_building: |
        「この関係を損なうものは何か？」という問いは、信頼を壊す行動を避けるのに役立ちます。
      collaborative_learning_initiative: |
        プロジェクトのプレモーテム（事前死亡診断）を実施しましょう：「これは失敗した。なぜか？」という問いに答えて、計画と実行を改善しましょう。
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        失敗を避けることにのみ焦点を当てると、行動が麻痺し、必要なリスクテイクができなくなる可能性があります。
      negativity_bias: |
        逆転の発想は、前向きな機会の特定とバランスが取れていない場合、ネガティブなバイアスを増幅させる可能性があります。
      analysis_paralysis: |
        失敗モードについてあまりにも多くの時間を費やし、実行できなくなること。
      missing_upside: |
        逆転の発想は、何をすべきかを教えてくれるのではなく、何を避けるべきかだけを教えてくれます。ポジティブな目標は依然として必要です。
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: 収穫逓減の法則
    quick_introduction: |
      収穫逓減の法則とは、他の要素を一定に保ったまま、ある一つの投入要素を増やしていくと、
      投入要素の各新規単位からの追加的産出は最終的に減少するという法則である。
      多ければ多いほど良いとは限らない――余分な労力がますます少ない成果しか生まなくなる時点がある。
    one_liner: 投入を増やしても、やがて産出は少なくなり、最適な時点がある。
    try_this:
      - 質問：追加的な労力が意味のある成果を生む時点を過ぎていないか？
      - 最もレバレッジの高い投入を優先し、限界収益が低下したらやめる。
      - すでに成果を出したものに過剰投資していることに気づく。
    ask_yourself:
      - ここでさらに1単位の労力を費やすことで、何が得られるだろうか？
      - 収穫逓減の時点を過ぎて最適化していないか？
    in_more_detail: |
      経済学では、一定量の土地に労働者を増やすと、最終的には漸進的な利益は小さくなる。
      個人の生産性では、最初の1時間の学習が10時間目の学習よりも価値があるかもしれない。
      この原則は、リソース、労力、時間、機能に適用される。最適な時点があり、それ以降は限界収益が減少し、
      マイナスに転じることさえある。

      収穫逓減を認識することは、リソースを効率的に配分し、すでに価値の大部分を生み出した分野への
      過剰投資を避けるのに役立つ。
    why_this_is_important: |
      収穫逓減を理解することは、過剰投資を防ぎ、優先順位を導き、いつ止まるべきかを知るのに役立つ。
      リソース配分と完璧主義の回避に不可欠である。
    when_to_use:
      - 意思決定
      - 問題解決
      - 投資
      - キャリアの選択
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        労力またはリソースの各追加単位は、前の単位よりも少ない産出を生み出す。
      perfectionism_trap: |
        品質の最後の10%を追求するために、不均衡な労力が消費される。
      overinvestment: |
        限界収益が低いかマイナスであるのに、リソースを追加し続けること。
      optimal_point_passed: |
        投入を増やしても結果が改善される時点を過ぎてしまっている。
    examples:
      studying: |
        試験準備の最初の2時間は、7〜8時間目よりも価値がある。収穫逓減の時点がある。
      product_features: |
        アプリに機能を追加しすぎると、ユーザーを混乱させる可能性がある。20番目の機能は5番目の機能よりも価値が低い。
      hiring: |
        プロジェクトに人員を追加しすぎると、ある時点からプロジェクトが遅くなる可能性がある（ブルックスの法則）。
      marketing: |
        広告費を倍にしても結果が倍にならない。市場が飽和するにつれて収益は減少する。
    real_world_implications: |
      収穫逓減の法則は、経済政策、ビジネス戦略、個人の生産性を導く。
      これを無視すると、リソースの無駄遣いと最適ではない結果につながる。
      パレートの法則と焦点を支持する。
    professional_application:
      networking_and_relationship_building: |
        少数の深い関係に投資することは、多くの人々に薄く労力を分散させることよりも多くの成果を生む可能性がある。
        追加的なネットワーキングが収穫逓減していることに気づく。
      collaborative_learning_initiative: |
        研修時間を長くしても、必ずしもより良い結果につながるとは限らない。最適な投与量を見つけ、過負荷を避ける。
    how_can_this_be_misapplied:
      premature_optimization: |
        合理的な品質レベルに達する前に、早期に停止すること。
      undershooting: |
        収穫逓減を、努力不足の言い訳として使用すること。
      misidentifying_the_curve: |
        実際には曲線の別の部分（例：初期の指数関数的な段階）にいるのに、収穫逓減していると想定すること。
      one_size_fits_all: |
        曲線が異なるさまざまなコンテキストに、同じ「最適な時点」を適用すること。
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: 損失回避バイアス
    quick_introduction: |
      損失回避とは、同等の利益を得ることよりも損失を避けることを好む傾向のことです。
      人は、得る喜びよりも失う痛みを約2倍強く感じると言われています。
    one_liner: 同等の利益を得た時の喜びよりも、損失を被った時の痛みは約2倍強く感じられます。
    try_this:
      - 自問自答してみましょう：得られるものより失うものを過大評価していませんか？
      - 選択肢を損失ではなく利益の観点から捉え直し、見方が変わるか確認してみましょう。
      - 損失への恐怖が、実際のメリットよりも意思決定を動かしていることに気づきましょう。
    ask_yourself:
      - もしゼロから始めるなら、どちらを選びますか？
      - 失うものがあるから、それとも将来が本当に良くなるから、執着していますか？
    in_more_detail: |
      ダニエル・カーネマンとエイモス・トベルスキーによって提唱された損失回避は、損失と利益が非対称的に認識されることを説明します。100ドルの損失の心理的影響は、通常、100ドルの利益の満足感よりもはるかに大きいです。このバイアスは、金融、交渉、日常の選択に影響を与え、潜在的な損失が顕著な場合には、リスク回避的な行動につながることがよくあります。
    why_this_is_important: |
      損失回避を理解することは、合理的な分析よりも損失への恐怖が意思決定を動かしている場合を認識するのに役立ちます。これにより、人々が損失中の投資を保持したり、必要な変更を避けたり、交渉やキャリアの選択で最適ではない選択をしたりする理由が説明されます。
    when_to_use:
      - 意思決定
      - 投資
      - キャリアの選択
      - リスク評価
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        潜在的な利益のメリットと比較して、何かを失う可能性が過度な不安や抵抗を引き起こすことに気づきましょう。
      reluctance_to_change: |
        客観的な分析がより良い選択肢を示唆している場合でも、戦略を変更したり、仕事を辞めたり、資産を売却したりすることに躊躇すること。
      framing_sensitivity: |
        結果が同等であっても、選択肢が利益または損失として提示されるかによって、決定が劇的に変化すること。
      overvaluing_what_you_have: |
        自分が所有しているという理由だけで、それらに高い価値を置く保有効果（エンダウメント効果）は、しばしば損失回避と伴います。
    examples:
      investing: |
        「損失の実現を避ける」ために下落中の株を保有し続け、他の場所でのより良い投資機会を逃している。
      career: |
        新しい機会がより大きな成長を提供するとしても、辞めることを安全を失うように感じるため、やりがいのある仕事に留まり続ける。
      negotiations: |
        合意を「失う」こととして捉えられるため、公正なオファーを拒否するが、合意に至る「利益」とは考えない。
      product_design: |
        有料に移行する無料トライアル—ユーザーはトライアル終了時にサービスを「失う」ことを経験し、これは新しいサービスを「得る」ことよりも購読を促進する。
    real_world_implications: |
      損失回避は、市場、政策、個人の行動を形成します。保険や保証がよく売れる理由、人々が有益な変化を避ける理由、そして否定的なニュースが過剰な影響を与える理由を説明します。それを認識することは、意思決定の質を向上させ、後悔に基づいた選択を減らすことができます。
    professional_application:
      networking_and_relationship_building: |
        人は損失回避のため、非生産的な関係や協力関係を終わらせることをためらう可能性があることに注意してください—彼らはつながりを「失う」ことを恐れています。抵抗を減らすために、新しい機会を損失ではなく利益として提示しましょう。
      collaborative_learning_initiative: |
        新しいプロセスやツールを導入する際は、チームが「手放す」ことよりも、何を得るかに焦点を当てましょう。損失を強調する変化への取り組みは、しばしばより強い抵抗を引き起こします。
    how_can_this_be_misapplied:
      manipulation: |
        意思決定を圧迫するために損失回避を悪用すること—例えば、「期間限定オファー」や「お見逃しなく」といった、本当の価値評価よりも損失への恐怖を呼び起こすようなフレーミング。
      misinterpreting_relationships: |
        変化への抵抗を単に合理的であると想定すること。実際には損失回避が原因である可能性があるのに。動機を誤解すると、信頼を損なう可能性があります。
      overcommitment: |
        「すでにこれだけ投資した」という理由で、失敗したプロジェクトへの投資を続けるサンクコスト効果（埋没費用効果）—損失をカットするのではなく。
      missed_opportunities_for_conflict_resolution: |
        譲歩は損失のように感じられるため、妥協を拒否すること。たとえ代替案がすべての人にとってより悪い結果であったとしても。
      vulnerability_to_exploitation: |
        行動しないと「失う」ものを強調するような販売戦術のように、損失回避を呼び起こすように選択肢を提示する他者によって操作されること。
      reinforcing_negative_perceptions: |
        潜在的な欠点に過度に焦点を当てることは、自己成就的な悲観的な見通しを作り出し、成長の機会を逃してしまう可能性があります。
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: 地図は領土ではない
    quick_introduction: |
      「地図は領土ではない」とは、現実の表象は現実そのものではないという意味です。
      モデル、理論、説明は有用な単純化ですが、常に何かを省略しています。
      地図を領土と混同すると、誤りに陥ります。
    one_liner: 地図は領土ではない—すべてのモデルは間違っているが、一部は有用である。
    try_this:
      - モデルが現実に合わないときは、現実にモデルを合わせようとせず、地図を更新する。
      - 問いかける：「このモデルは何を省略しているか？いつ壊れる可能性があるか？」
      - モデルを真実ではなく、ツールとして扱う。
    ask_yourself:
      - 自分のモデルを現実と混同していないか？
      - 前に見たときから領土は変わっていないか？
    in_more_detail: |
      アルフレッド・コージブスキーが一般意味論でこの考えを導入しました。
      都市の地図はナビゲーションに役立ちますが、都市そのものではありません—
      詳細を省略し、時代遅れになり、決してすべてを捉えることはできません。
      これはメンタルモデル、科学理論、組織図にも当てはまります。

      すべてのモデルは間違っていますが、一部は有用です。
      危険なのは、特に領土が変わったときに、モデルを完全な真実であるかのように扱うことです。
      良い思考には、現実が一致しないときに地図を更新することが必要です。
    why_this_is_important: |
      地図と領土が異なることを認識することで、モデルに対する過信を防ぎ、
      信念の更新を奨励し、時代遅れまたは単純化されすぎた情報に基づいて
      行動するリスクを減らすことができます。
    when_to_use:
      - 意思決定
      - 問題解決
      - 学習
      - リスク評価
    how_can_you_spot_it:
      model_reality_confusion: |
        フレームワークや理論が現実を完全に説明しているかのように扱うこと。
      outdated_assumptions: |
        現在の状況に合わなくなった情報やモデルに基づいて行動すること。
      oversimplification: |
        「地図」に含まれていないため、ニュアンスを無視すること。
      map_worship: |
        証拠が矛盾しているにもかかわらず、更新するのではなく、モデルを擁護すること。
    examples:
      organizational_charts: |
        報告体系が実際に仕事がどのように行われているかを反映していると仮定すること。
      financial_models: |
        スプレッドシートの予測をシナリオではなく、予測として扱うこと。
      stereotypes: |
        集団レベルの一般化を個人に適用すること。
      strategy_docs: |
        市場がシフトしたときに、書かれたとおりに計画を実行すること。
    real_world_implications: |
      地図と領土の区別は、科学、工学、哲学の基本です。
      これは、ベイズ更新、アジャイル手法、認識論的謙虚さの基礎となります。
      これを無視すると、硬直した思考と失敗した戦略につながります。
    professional_application:
      networking_and_relationship_building: |
        人に対するあなたのメンタルモデルは時代遅れかもしれません。
        古い印象に頼るのではなく、直接のやり取りを通じて更新してください。
      collaborative_learning_initiative: |
        チームが計画やモデルを、固定された真実ではなく、テストされ改訂されるべき仮説として扱うように奨励する。
    how_can_this_be_misapplied:
      radical_skepticism: |
        どの地図も有用ではなく、すべての知識は疑わしいと結論付けること。
      constant_revision: |
        あまりに頻繁に更新しすぎて、安定した理解が得られないこと。
      dismissing_models: |
        「領土ではない」という理由で有用な単純化を却下すること。
      relativism: |
        すべての地図が同等に有効であると主張すること。ただし、明らかに領土によりよく適合するものもある。
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: 単純接触効果
    quick_introduction: |
      単純接触効果とは、単にそれらに慣れ親しんでいるという理由だけで、物事に対する好みを育む傾向のことです。たとえ強化がなくても、繰り返し接触することで好感度が増します。私たちは知っているものを好む傾向があります。
    one_liner: 親しき中にも礼儀あり—私たちは以前見たものを好む。
    try_this:
      - 質問: これは良いから好きなのか、それとも慣れ親しんでいるから好きなのか？
      - 選択肢を評価する際は、接触度を考慮して調整する—新しいものは不利な状態から始まる。
      - 繰り返しがあなたの好みに影響を与えていることに気づく。
    ask_yourself:
      - 主に以前見たことがあるという理由だけで何かを好んでいますか？
      - 接触が均等であれば、異なる選択をしますか？
    in_more_detail: |
      ロバート・ザイアンスは、刺激（顔、単語、形状）への繰り返し接触が、たとえ私たちがその接触に意識的に気づいていなくても、それらに対する肯定的な感情を高めることを示しました。親しき中にも礼儀あり、ではなく、親しき中にも好意あり（多くの場合）となります。分析していない場合や、接触が微妙な場合に効果はより強くなります。

      単純接触効果は、ブランドの好み、対人魅力、美的判断に影響を与えます。なぜ私たちが慣れ親しんだ音楽を好むのか、なぜ広告が繰り返しによって効果を発揮するのか、そしてなぜ私たちは以前見たことがある人々を好む傾向があるのか（たとえ交流がなくても）を説明します。
    why_this_is_important: |
      単純接触効果を認識することは、自分の好みやつ繰り返しによる操作に抵抗することを理解するのに役立ちます。また、関係やブランドにとって、知名度と存在感がなぜ重要なのかを説明します。親しみやすさは強力でありながら、しばしば無意識の影響力です。
    when_to_use:
      - 関係構築
      - 意思決定
      - リーダーシップ
      - 学習
    how_can_you_spot_it:
      familiarity_preference: |
        斬新な選択肢よりも、以前見たことのある選択肢を好むこと。
      repetition_influence: |
        明示的な説得なしに、繰り返しの接触が好感を増すこと。
      unconscious_influence: |
        接触に気づいていなくても効果が働くこと。
      brand_recognition: |
        理由を説明できなくても、馴染みのあるブランドが好まれること。
    examples:
      advertising: |
        説得力のあるメッセージなしに、ブランドへの繰り返し接触が好みを増すこと。
      music: |
        最初に聴いたとき、以前聴いたことのある曲の方が新しい曲よりも好まれる傾向があること。
      people: |
        たとえ交流がなくても、繰り返し見たことのある人々（例：クラスメート、同僚）を、見知らぬ人よりも好む傾向があること。
      ideas: |
        以前に遭遇したアイデアは、斬新なアイデアよりも快適で信頼できると感じられること。
    real_world_implications: |
      単純接触効果は、消費者の行動、政治的選好、社会的な魅力を形成します。マーケティングで悪用され、馴染みのあるものに不公平な利点をもたらす可能性があります。また、なぜ接触の多様性が重要なのかを説明します—違いに慣れることで偏見が減少します。
    professional_application:
      networking_and_relationship_building: |
        知名度が重要です。姿を見せ、存在し、見られることで、好意を築く親しみやすさが生まれます。繰り返し行われる低リスクな接触の価値を過小評価しないでください。
      collaborative_learning_initiative: |
        人々に多様な視点と人々を繰り返しさらしてください—親しみやすさは偏見を減らすことができます。しかし、単純接触は現状維持への好みを強化する可能性もあることに注意してください。
    how_can_this_be_misapplied:
      manipulation: |
        同意なしに好みを操作するために、意図的に繰り返し接触を作り出すこと。
      false_familiarity: |
        親しみやすさが品質に等しいと仮定すること—時には斬新な選択肢の方が優れていることがあります。
      exclusion: |
        特定の人物だけが接触を得た場合、不公平な利点を得ることになります。誰が知名度にアクセスできるかを検討してください。
      stagnation: |
        親しみやすさに過度に依存し、新しいことを決して試さないこと。
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: ナラティブの誤謬
    quick_introduction: |
      ナラティブの誤謬とは、過去の出来事から、実際よりも首尾一貫していて、予測可能で、意味のあるように見える物語を構築する傾向のことです。私たちはランダムな出来事に後付けで説明をします。歴史の混乱を整然とした物語に変え、そしてその物語が必然だったと信じます。
    one_liner: 私たちはランダムな出来事に首尾一貫した物語を後付けし、それが必然だったと信じます。
    try_this:
      - 質問: この物語のどの部分が後知恵ですか？運はどのような役割を果たしましたか？
      - 整然とした説明には懐疑的になりましょう。過去は私たちの物語よりも混沌としていました。
      - 「理にかなっている」が「予測可能だった」の役割を果たしていることに気づきましょう。
    ask_yourself:
      - 過去が実際よりも必然であったように見える物語を構築していませんか？
      - これが起こる前に予測できたでしょうか？
    in_more_detail: |
      ナシム・タレブがこの用語を広めました。私たちは、原因と結果、ヒーローと悪役、明確な展開といった物語を強く求めます。そのため、後知恵で出来事を結びつける物語を構築します。物語は首尾一貫しているので真実のように感じますが、首尾一貫しているからといって正しいわけではありません。「理にかなっている」と「予測可能だった」を混同します。運とランダム性の役割を過小評価します。

      ナラティブの誤謬は、私たちが歴史から学ぶ方法、成功を評価する方法、そして予測を立てる方法に影響を与えます。物語の解説力を過大評価し、偶然の役割を過小評価します。
    why_this_is_important: |
      ナラティブの誤謬を認識することは、過去から過剰に学び、予測可能性を過大評価することを避けるのに役立ちます。それは、因果関係と予測に対する謙虚さを奨励します。良い物語になるからといって、すべてが真実であったり、一般化できたりするわけではありません。
    when_to_use:
      - 意思決定
      - 学習
      - リスク評価
      - 問題解決
    how_can_you_spot_it:
      hindsight_coherence: |
        過去の出来事が、当時見えなかった整然とした物語で説明される。
      cause_effect_overconfidence: |
        多くの要因が関与した結果に、明確な原因を割り当てる。
      luck_minimization: |
        成功や失敗が、運ではなく、スキルや戦略によって説明される。
      story_over_evidence: |
        説得力のある物語が、統計的証拠を上回る。
    examples:
      business_success: |
        「彼らはXのせいで成功した」と、多くの要因や運が関わっていたにもかかわらず、当てはまる物語を選ぶ。
      investing: |
        市場の動きを、満足感を与えるが事後的な物語で説明する。
      history: |
        歴史的出来事が、多くの要因に左右されたにもかかわらず、必然的な進歩として語られる。
      career: |
        「Xをしたからここにたどり着けた」と、運とタイミングが大きな役割を果たしたにもかかわらず。
    real_world_implications: |
      ナラティブの誤謬は、学習を歪め、予測への過信、成功や失敗の帰属を歪めます。それは、過去を実際よりも予測可能に見せ、未来を現在よりも予測可能に見せます。
    professional_application:
      networking_and_relationship_building: |
        誰かが成功談を語るとき、それが物語であることを覚えておいてください。首尾一貫していて説得力がありますが、おそらく単純化されています。運や見えない要因は過小評価されている可能性があります。
      collaborative_learning_initiative: |
        振り返りの際には、物語と証拠を区別してください。「当時、私たちは何と言っただろうか？」と問いかけてください。結果がわかる前に不確実性を記録するために、意思決定ジャーナルを使用してください。
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        一部の物語は正しいです。すべてがナラティブの誤謬ではありません。因果関係は存在します。
      excessive_skepticism: |
        「ナラティブの誤謬」のために、すべての過去からの学習を拒否する。私たちは依然として有益な教訓を引き出すことができます。
      false_randomness: |
        一部の結果は意味のある帰属が可能であるにもかかわらず、すべてがランダムであると仮定する。
      undermining_storytelling: |
        物語はコミュニケーションと意味において価値がありますが、誤謬はそれが完全であるか予測的であると信じることであり、物語が存在することではありません。
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: ネガティビティ・バイアス（否定性バイアス）
    quick_introduction: |
      ネガティビティ・バイアスとは、肯定的な情報よりも否定的な情報に重きを置く傾向のことです。
      悪いニュース、批判、脅威は、同等の肯定的な刺激よりも私たちの注意を引きつけ、意思決定に強く影響します。
    one_liner: 悪いニュースは良いニュースよりも重みがある—私たちは脅威を優先するようにできています。
    try_this:
      - 評価する際に、肯定的な証拠を積極的に探し、重み付けする。
      - 多くの賛辞よりも1つの批判が重くのしかかっていることに気づく。
      - 質問する：「否定的な情報に、それ以上の重みを与えていないか？」
    ask_yourself:
      - 否定的なことにこだわり、肯定的なことを軽視していないか？
      - 良い証拠に焦点を当てたら、気分は変わるだろうか？
    in_more_detail: |
      進化論的に見ると、脅威を見逃すことは致命的になりうる一方、機会を逃すことは通常、生き延びることができました。
      私たちの脳は、否定的な情報を優先するようにできています。
      たった一つの批判的なコメントが、多くの賛辞よりも重くのしかかることがあります。
      否定的な出来事は、より鮮明に、より長く記憶されます。

      このバイアスは、人間関係、意思決定、幸福感に影響を与えます。
      私たちは失敗にこだわり、最悪の事態を予期し、肯定的な証拠を軽視します。
      それを理解することで、補正することができます。
    why_this_is_important: |
      ネガティビティ・バイアスを認識することで、フィードバックのバランスを取ったり、批判への過剰反応を避けたり、より調整された意思決定を行うことができます。
      また、なぜ悪いニュースが支配的になるのか、そしてなぜ状況 warrantsするよりも悪く感じることが多いのかを説明します。
    when_to_use:
      - 意思決定
      - 関係構築
      - リーダーシップ
      - リスク評価
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        一つの否定的なコメントが、多くの肯定的なコメントを霞ませる。
      threat_prioritization: |
        潜在的なデメリットは、同等のメリットよりも多くの注目を集める。
      vivid_negative_memories: |
        否定的な経験は、より簡単に、より多くの感情を伴って思い起こされる。
      discounting_positive_evidence: |
        良いニュースはすぐに忘れられるか、言い訳される。
    examples:
      performance_reviews: |
        従業員が、全体的に肯定的な評価を軽視し、一つの批判的なフィードバックに固執する。
      news_consumption: |
        肯定的な傾向にもかかわらず、否定的な見出しが注目を集め、世界観を形成する。
      relationships: |
        一つの口論が、多くの良い瞬間よりも大きくのしかかる。
      investing: |
        市場の低迷は、同等の高騰が引き起こす陶酔感よりも多くのパニックを引き起こす。
    real_world_implications: |
      ネガティビティ・バイアスは、メディア、政治、組織文化を形作ります。
      不安、対立、最適でない意思決定に寄与します。
      意図的にそれを打ち消すことで、幸福感と判断力を向上させることができます。
    professional_application:
      networking_and_relationship_building: |
        フィードバックを与える際は、否定的なコメントがより重くのしかかることを認識し、それらのバランスを取り、成長を強調しましょう。
        フィードバックを受ける際は、意識的に全体像を考慮しましょう。
      collaborative_learning_initiative: |
        ネガティビティ・バイアスを明確に打ち消す文化を創造しましょう：成功を祝い、肯定的な結果を文書化し、ポストモーテム（事後分析）と「プレモーテム」（うまくいったことの事前分析）のバランスを取りましょう。
    how_can_this_be_misapplied:
      toxic_positivity: |
        「ポジティブ思考」を主張することで、正当な懸念を却下する。
      ignoring_real_threats: |
        過剰な補正により、真のリスクを過小評価する。
      feedback_suppression: |
        「否定性は悪い」として、必要な批判を避ける。
      invalidation: |
        相手が深刻な懸念を抱いているにもかかわらず、その否定的な感情を「ただのネガティビティ・バイアスだ」と伝える。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: オッカムの剃刀
    quick_introduction: |
      オッカムの剃刀（またはオッカムの原則）とは、競合する仮説の中から、最も仮定の少ないものを優先すべきであるという原則です。単純な説明は、常に正しいわけではありませんが、しばしば正しいのです。
    one_liner: 証拠に合致する最も単純な説明を優先する。
    try_this:
      - 理論を比較する際には、どちらが仮定が少ないかを尋ねてください。
      - それを要求する証拠なしに複雑さを加えないでください。
      - 単純な説明よりも複雑な説明を好んでいることに気づいてください。
    ask_yourself:
      - 不必要な複雑さを導入していませんか？
      - 証拠はこのレベルの説明を要求していますか？
    in_more_detail: |
      ウィリアム・オブ・オッカムにちなんで名付けられたこの原則は、単純な説明が常に真実であると主張するものではありません。証拠なしに不必要な複雑さを導入すべきではないことを示唆しています。2つの理論が同じ現象を説明する場合、証拠がそう要求するまで、より単純な方が好ましいです。

      オッカムの剃刀は法則ではなく、ヒューリスティック（発見的手法）です。時には、正しい説明は複雑な場合があります。しかし、それは過学習、陰謀論、および不必要な複雑化から保護します。それは説明における簡潔さを支持します。
    why_this_is_important: |
      オッカムの剃刀を適用することで、問題解決が改善され、モデルの過学習が減り、複雑で裏付けのない理論を回避するのに役立ちます。証拠が曖昧な場合の有用なデフォルトです。
    when_to_use:
      - 問題解決
      - 意思決定
      - 学習
      - リスク評価
    how_can_you_spot_it:
      unnecessary_complexity: |
        より少ない仮定で十分な場合に、多くの仮定を呼び出す説明。
      conspiracy_tendencies: |
        単純な原因で説明できる出来事に対して、複雑で多主体的な説明。
      overfitting: |
        過去のデータを完全に説明するが、新しいデータでは失敗するモデルまたは理論。
      elegance_in_explanation: |
        最良の説明は、しばしば後から考えると「明白」に感じられます。
    examples:
      debugging: |
        バグが発生した場合、アーキテクチャ上の問題と仮定する前に、最も単純な原因（例：タイポ、間違った設定）を確認してください。
      conspiracy_theories: |
        「政府がXを組織した」は多くの隠された関係者を必要とします。「数人が間違いを犯した」の方が単純です。
      product_failure: |
        ユーザーが機能を採用しない。最も単純な説明は、UIに混乱しているのではなく、彼らの問題を解決していないということです。
      medical_diagnosis: |
        「一般的なものが一般的である」—まれな診断の前に、頻繁な診断を検討してください。
    real_world_implications: |
      オッカムの剃刀は、科学的探求、工学、および日常的な推論を導きます。それは、複雑で間違った理論への無駄な労力を削減します。誤って適用されると、真に複雑な現象を却下する可能性があります。
    professional_application:
      networking_and_relationship_building: |
        他者の行動を解釈する際には、悪意や複雑な動機を想定する前に、単純な説明（彼らは忙しい、忘れた）を優先してください。
      collaborative_learning_initiative: |
        問題解決セッションでは、複雑なモデルを構築する前に、「最も単純な説明は何ですか？」と明示的に尋ねてください。
    how_can_this_be_misapplied:
      oversimplification: |
        「複雑すぎる」という理由で、妥当な複雑な説明を却下すること。
      status_quo_bias: |
        オッカムの剃刀を使用して、新しいが正しい説明よりも、慣れ親しんだ説明を優先すること。
      scientific_rigidity: |
        証拠が裏付けている場合でも、より複雑であるという理由で新しい理論を拒否すること。
      missing_nuance: |
        一部の領域（例：人間の行動、生態系）は本質的に複雑です。単純さは誤解を招く可能性があります。
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: オーストリッチ効果
    quick_introduction: |
      オーストリッチ効果とは、ダチョウのように「砂に頭を埋める」ように、否定的な金融情報から逃避する傾向のことです。人々は、市場が下落しているときにポートフォリオを見るのを避けたり、請求書の開封を遅らせたり、行動に役立つ警告サインを無視したりします。
    one_liner: 悪いニュースを避けても現実は変わらず、対応が遅れるだけです。
    try_this:
      - 定期的なチェックインをスケジュールし、数字から逃げられないようにしましょう。
      - 何かを遅らせているとき、あるいは何かを見るのを避けているときに気づきましょう。
      - 質問しましょう：「私は何から逃避しており、それに直面したら何が変わるでしょうか？」
    ask_yourself:
      - 情報が悪いかもしれないからといって、それを避けていませんか？
      - 早期の認識があれば、より良い行動をとることができたでしょうか？
    in_more_detail: |
      この用語は、市場低迷期に投資の確認を避ける投資家を説明するために、行動経済学の分野で生まれました。この行動は金融分野にとどまりません。健康診断を避けること、人間関係の問題を無視すること、困難な会話を遅らせることなどです。私たちは悪いニュースの不安を避けようとしますが、回避はしばしば、タイムリーな行動を妨げることで事態を悪化させます。

      この効果は、損失回避と感情的な不快感を避けたいという願望によって引き起こされます。残念ながら、無知は現実を変えず、私たちの対応を遅らせるだけです。
    why_this_is_important: |
      オーストリッチ効果を認識することは、困難な情報に積極的に向き合うのに役立ちます。悪いニュースを避けることは、結果を改善することはめったになく、通常は悪化させます。タイムリーな認識は、より良い意思決定を可能にします。
    when_to_use:
      - 意思決定
      - 投資
      - リスク評価
      - キャリアの選択
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        市場が下落しているときに投資明細を見ないこと。
      delaying_difficult_information: |
        請求書、医療検査の結果、または業績評価の開封を延期すること。
      information_avoidance: |
        悪いニュースが含まれている可能性のある情報源を積極的に避けること。
      procrastination_on_unpleasant_tasks: |
        問題が表面化したり、対処したりする行動を遅らせること。
    examples:
      investing: |
        強気相場中に投資家が401(k)の確認を停止し、リバランスの機会を逃すこと。
      health: |
        悪いニュースを聞くことへの恐れから、症状があるにもかかわらず医者の診察を避けること。
      finances: |
        借金に直面することを避けるために、クレジットカードの明細書や銀行アラートを開かないこと。
      performance: |
        マネージャーが、早期の介入が役立ったであろう年次評価まで、批判的なフィードバックを与えるのを避けること。
    real_world_implications: |
      オーストリッチ効果は、より悪い財務結果、遅延した医療処置、および人間関係や仕事における未解決の問題につながります。回避可能な損失を悪化させます。情報を無視しにくいシステムは役立つ可能性があります。
    professional_application:
      networking_and_relationship_building: |
        困難な会話を避けないでください。問題が自然に解決することを期待するのではなく、早期に対処してください。問題がエスカレートする前に表面化する定期的なチェックインを作成してください。
      collaborative_learning_initiative: |
        問題の無視が難しくなるようなフィードバックループを構築してください。ダッシュボード、定期的なレビュー、および悪いニュースの早期開示を奨励する規範などです。
    how_can_this_be_misapplied:
      information_overload: |
        健康的な情報回避（例：株価を毎分チェックしない）があるにもかかわらず、絶え間ない監視を強制すること。
      anxiety_amplification: |
        結果を改善することなく、潜在的な問題に過度に焦点を当て、不安を増幅させること。
      blame_shifting: |
        一部の回避が合理的（例：ノイズを無視する）であるにもかかわらず、すべての回避を「オーストリッチ効果」のせいにする。
      micromanagement: |
        この概念を使用して、他者に対する過剰な監視を正当化すること。
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: パレートの法則
    quick_introduction: |
      パレートの法則（または80/20ルール）は、結果の約80％が原因の約20％から生じるというものです。
      入力のわずかな少数派が、しばしば出力の大多数を生み出します。
      売上、バグ、顧客、労力、機能など、多岐にわたります。
      重要な少数に焦点を当てましょう。
    one_liner: 結果の80％が原因の20％からもたらされる — 重要な少数に焦点を当てましょう。
    try_this:
      - 結果の80％を生み出す入力の20％を特定し、そこに注力しましょう。
      - ほとんど成果を生まない80％を削減するか、優先度を下げましょう。
      - 問いかけましょう：「もし私がうまくやれば、最も重要になる少数のことは何だろうか？」
    ask_yourself:
      - いくつかのことがより重要であるにもかかわらず、努力を均等に分散させていないか？
      - 私のレバレッジの高い20％は何だろうか？
    in_more_detail: |
      ヴィルフレド・パレートは、イタリアの土地の80％が人口の20％によって所有されていることを観察しました。
      この法則は一般化されています。顧客の20％から売上の80％、コードの20％からバグの80％、労力の20％から結果の80％。
      正確な比率は変動しますが、パターンの不均一な分布は一般的です。

      この法則は、レバレッジの高い20％を特定し、それに焦点を当てることで、結果を劇的に改善できることを示唆しています。
      これは物理法則ではなく、優先順位付けのヒューリスティックです。
    why_this_is_important: |
      パレートの法則を適用することで、徹底的な優先順位付けが可能になり、低影響の活動への労力の浪費を防ぎ、より少ない労力でより多くのことを達成できます。
      生産性と戦略の基本です。
    when_to_use:
      - 意思決定
      - 問題解決
      - リーダーシップ
      - キャリアにおける選択
    how_can_you_spot_it:
      uneven_distribution: |
        Xのわずかな割合がYの大部分を占める。
      high_leverage_activities: |
        少数の行動がほとんどの結果を生み出す。
      low_value_tail: |
        多くの活動はわずかな貢献しかしない；それらを削減しても影響は最小限である。
      vital_few_vs_trivial_many: |
        重要なのは、最も重要な少数を特定することである。
    examples:
      sales: |
        顧客の20％が収益の80％を生み出している — 彼らを維持し、成長させることに集中しましょう。
      software: |
        機能の20％が利用の80％を促進している — それらを優先しましょう。
      productivity: |
        習慣やルーチンのいくつかが、あなたの出力のほとんどを生み出している — それらに注力しましょう。
      problems: |
        バグの20％がクラッシュの80％を引き起こしている — まずそれらを修正しましょう。
    real_world_implications: |
      パレートの法則は、リソース配分、製品戦略、個人の生産性を指針します。
      それを無視すると、労力が分散しすぎてしまいます。
      過度に適用すると、「ロングテール」の無視につながる可能性があります。
    professional_application:
      networking_and_relationship_building: |
        あなたの目標にとって最も重要な関係を特定しましょう。
        労力を均等に分散させるのではなく、それらに不均衡に投資しましょう。
      collaborative_learning_initiative: |
        チームのパフォーマンスを向上させる際には、結果の80％を推進する介入の20％を見つけましょう。
        トレーニングやプロセス変更をそこに集中させましょう。
    how_can_this_be_misapplied:
      oversimplification: |
        80/20がどこにでも当てはまると想定すること；一部の分布はより均一です。
      neglecting_the_tail: |
        それらが全体として重要である場合（例：多くの小規模顧客、エッジケース）に「些細な多数」を無視すること。
      false_precision: |
        80/20を文字通りではなく、おおまかなヒューリスティックとして扱うこと。
      misidentifying_the_vital_few: |
        誤った分析により、間違った20％に焦点を当てること。
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: パーキンソンの法則
    quick_introduction: |
      パーキンソンの法則とは、「仕事の量は、完成のために与えられた時間をすべて満たすまで膨張する」というものである。タスクに1週間与えれば1週間かかるが、1日与えれば多くの場合1日で完了する。これは予算、チームの規模、リソースにも同様に当てはまる。
    one_liner: 仕事の量は、完成のために与えられた時間をすべて満たすまで膨張する。
    try_this:
      - より厳しい締め切りを設定して、集中力を高め、スコープクリープ（要求範囲の無秩序な拡大）を防ぐ。
      - 「このタスクに合理的に必要な最小限の時間でどれくらいか？」と自問する。
      - 比例する価値なく、余分な時間やリソースが消費されていることに気づく。
    ask_yourself:
      - 時間を埋めているだけで、実際には仕事がそれを要求しているのか？
      - より厳しい締め切りは、より良い優先順位付けを強制するか？
    in_more_detail: |
      C. ノースコート・パーキンソンは、仕事の量に関係なく官僚機構は成長するという観察結果を発表した。また、タスクは利用可能な時間を満たすまで拡大する—締切に合わせて努力とペースを調整する。厳しい締切は集中力を高めることができるが、緩い締切は先延ばしやスコープクリープを招く。

      この法則は、プロジェクト管理、個人の生産性、組織設計に影響を与える。制約は、優先順位付けを強制することで成果を向上させる可能性があることを示唆している。
    why_this_is_important: |
      パーキンソンの法則を理解することは、より良い締切を設定し、プロジェクトへの過剰なリソース配分を避け、「時間や人員の追加」が助けにならない、むしろ害になる場合を認識するのに役立つ。制約は生産的になりうる。
    when_to_use:
      - 意思決定
      - リーダーシップ
      - 問題解決
      - キャリアの選択
    how_can_you_spot_it:
      deadline_driven_effort: |
        締切が近づくにつれて仕事は加速し、締切が遠いときは進捗がほとんどない。
      scope_expansion: |
        プロジェクトは、焦点を維持するのではなく、利用可能なリソースを満たすまで拡大する。
      bureaucratic_growth: |
        組織は、仕事量が増加しない場合でも、人員やプロセスを追加する。
      budget_exhaustion: |
        予算は、その支出が本当に必要だったかどうかに関わらず、すべて使い切られる。
    examples:
      student_deadlines: |
        1ヶ月後に提出するレポートが、最後の48時間で書かれる。
      project_management: |
        6ヶ月のタイムラインのプロジェクトは6ヶ月かかる。同じスコープでも3ヶ月の締切であれば完了するかもしれない。
      meetings: |
        30分で十分な場合でも、1時間の会議はその時間すべてを埋める。
      budgets: |
        ある部署は、来年も同じ予算を正当化するために、年度末までに予算をすべて使い切る。
    real_world_implications: |
      パーキンソンの法則は、生産性、組織の肥大化、リソース配分に影響を与える。人工的な制約（短い締切、少人数のチーム）が、集中力と効率を向上させる可能性があることを示唆している。
    professional_application:
      networking_and_relationship_building: |
        共同作業におけるスコープクリープを防ぎ、勢いを維持するために、明確で厳しい締切を設定する。
      collaborative_learning_initiative: |
        会議やプロジェクトにタイムボクシングを使用する。品質を犠牲にすることなく集中力が向上するかどうかをテストするために、短い締切で実験する。
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        燃え尽き症候群や低品質を引き起こすような、恣意的に短い締切を設定すること。
      underresourcing: |
        時間が少ない、または人が少ない方が常にうまくいくと想定すること。一部のタスクは適切なリソースを必要とする。
      blame_shifting: |
        仕事が実際に複雑だった場合に、遅延を「パーキンソンの法則」のせいにすること。
      ignoring_quality: |
        持続可能な成果を犠牲にして、人工的な制約を満たすために急ぐこと。
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: 確率的思考
    quick_introduction: |
      確率的思考とは、確実性ではなく、可能性（確率）の観点から推論する習慣です。「これが起こるか？」と問う代わりに、「これはどれくらい起こりそうか？」と問います。不確実性を受け入れ、それを利用してより良い意思決定を行います。
    one_liner: 確実性ではなく可能性で考え、不確実性を受け入れる。
    try_this:
      - 「起こるか？」を「どれくらい起こりそうか？」に置き換える。
      - 複数のシナリオを検討し、おおよその確率を割り当てる。
      - 新しい証拠が入ったら、自分の信念を更新する。
    ask_yourself:
      - 二元論的に考えていないか？確率はより正確な場合がある。
      - 妥当な結果の範囲はどれくらいか？
    in_more_detail: |
      現実世界のほとんどの結果は不確実です。確率的思考は、二者択一の「はい／いいえ」を、段階的な信念に置き換えます。複数のシナリオを検討し、おおよその確率を割り当て、証拠に基づいて更新することを含みます。これは過信や白黒思考とは対極にあるものです。

      主な実践方法には、範囲で考えること、基準率（ベイスレート）を考慮すること、証拠に基づいて信念を更新すること、リスク（確率が既知）と不確実性（確率が未知）を区別することが含まれます。これは、予測の精度（キャリブレーション）と意思決定の質を向上させます。
    why_this_is_important: |
      確率的思考は、過信を減らし、予測を改善し、不確実性下でのより良い意思決定につながります。投資、戦略、そして未来が不確実なあらゆる分野に不可欠です。
    when_to_use:
      - 意思決定
      - リスク評価
      - 投資
      - 問題解決
    how_can_you_spot_it:
      likelihood_language: |
        「〜だろう」「〜の可能性が高い」「〜の可能性は低い」といった言葉遣い。「〜する」「〜しない」ではなく。
      scenario_thinking: |
        おおよその確率とともに、複数の可能な未来を検討すること。
      calibration: |
        時間の経過とともに、実際の出来事の頻度と一致する予測。
      uncertainty_acknowledgment: |
        自分が知らないことを明確に述べること。
    examples:
      forecasting: |
        「締め切りに間に合うだろう」ではなく、「締め切りに間に合う確率は60%だと思う」と言う。
      investing: |
        「これは2倍になる確率が30%、50%下落する確率が70%だ」と言う。「これは爆上がりする」ではなく。
      strategy: |
        複数のシナリオ（最良、標準、最悪）をおおよその確率で計画する。
      hiring: |
        「面接に基づいて、成功する確率は70%だと考えられる」と言う。「彼は素晴らしい採用候補だ」ではなく。
    real_world_implications: |
      確率的思考は、予測の精度を向上させ、驚きを減らし、より良いリスク管理を可能にします。効果的な予測と不確実性下での意思決定の中心となるものです。
    professional_application:
      networking_and_relationship_building: |
        適切な場面では確率でコミュニケーションをとる。「確信している」ではなく「かなり確信している」と言う。これは認識論的な謙虚さを示し、信頼を築く。
      collaborative_learning_initiative: |
        チームに不確実性を表現することを奨励する。予測市場やキャリブレーション演習を利用して、確率的判断を向上させる。
    how_can_this_be_misapplied:
      false_precision: |
        それほど正確には判断できないのに、正確な確率（例：73%）を割り当てること。
      analysis_paralysis: |
        「確信できない」という理由で、決して行動を起こさないこと。
      hedging_overuse: |
        あらゆることを曖昧にしすぎて、無用にするほどまで過度に使うこと。
      dismissing_intuition: |
        有効な情報を含む可能性のある強い直感を無視するために、過度に修正すること。
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: ピグマリオン効果
    quick_introduction: |
      ピグマリオン効果（またはローゼンタール効果）とは、高い期待がパフォーマンスの向上につながる現象のことです。教師、上司、あるいは他者が誰かに対してより多くを期待すると、その人はより良いパフォーマンスを発揮する傾向があります。期待は自己成就予言となります。
    one_liner: 高い期待はより良いパフォーマンスにつながる—期待が現実を形作る。
    try_this:
      - 高いが達成可能な期待を設定し、それらを明確に伝える。
      - 低い期待が誰かのパフォーマンスを制限している可能性に気づく。
      - 問いかけ：「私は暗黙のうちに何を期待していて、それが結果にどう影響する可能性があるか？」
    ask_yourself:
      - 私の期待は、この人を助けているのか、それとも制限しているのか？
      - より高い期待は、私が彼／彼女を扱う方法、そしてその結果を変えるだろうか？
    in_more_detail: |
      ロバート・ローゼンタールとレノア・ジェイコブソンは、教師たちに、特定の生徒が学業的に「開花する」という誤った情報を提供しました。これらの生徒（無作為に選ばれた）は、実際には他の生徒よりも成績が向上しました。教師の期待は、彼らの行動（より多くの注意、より温かいフィードバック）に影響を与え、それが生徒のパフォーマンスに影響を与えました。期待が現実を形作ります。

      その逆—低い期待がより悪いパフォーマンスにつながる—は、ゴーレム効果と呼ばれることもあります。どちらも、他者に関する私たちの信念が彼らの結果に影響を与える可能性があることを示しています。これは、リーダーシップ、教育、子育てに大きな影響を与えます。
    why_this_is_important: |
      ピグマリオン効果を理解することは、期待の力を活用するのに役立ちます。誠実に伝えられた高い期待は、パフォーマンスを向上させることができます。低い期待は、自己成就的な失敗を生み出す可能性があります。他者に関するあなたの信念は重要です。
    when_to_use:
      - リーダーシップ
      - 関係構築
      - 学習
      - 意思決定
    how_can_you_spot_it:
      expectation_performance_link: |
        私たちがより多くを期待する人々は、より良いパフォーマンスを発揮する傾向があります。
      differential_treatment: |
        私たちは、期待に基づいて人々を（しばしば無意識に）異なるように扱います。
      self_fulfilling_prophecy: |
        能力に関する信念は、能力を形作る行動に影響を与えます。
      teacher_student_dynamics: |
        教育者の期待は、差別的な扱いを通じて生徒の結果に影響を与えます。
    examples:
      education: |
        生徒が成功することを期待する教師は、より多くのサポートを提供します。その生徒たちは向上します。失敗を期待する教師は、意図せずそれを生み出す可能性があります。
      workplace: |
        部下からの高いパフォーマンスを期待するマネージャーは、より多くの機会とフィードバックを提供します。パフォーマンスは向上します。
      parenting: |
        子供が責任感を持つことを期待する親は、より多くの責任を与えます。子供たちはそれに応えます。
      stereotypes: |
        ステレオタイプ脅威はその逆—否定的な期待はパフォーマンスを低下させる可能性があります。
    real_world_implications: |
      ピグマリオン効果は、教育、管理、人間関係に影響を与えます。それは、期待を高めること（支援的に行われた場合）が結果を改善できることを示唆しています。また、低い期待が破壊的になりうることを警告しています。
    professional_application:
      networking_and_relationship_building: |
        人々に高い期待を設定し、それに応えるためのサポートを提供する。可能性を信じる。あなたの期待はあなたの行動に影響を与え、それが彼らの結果に影響を与える。
      collaborative_learning_initiative: |
        高いサポートを伴う高い期待の文化を創造する。「低パフォーマー」としてレッテルを貼ることで自己成就的な結果を招くことを避ける。成功すると期待する人々に投資する。
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        サポートなしでは達成不可能な期待を設定することは、失敗と士気の低下を招きます。
      blame_shifting: |
        成功のためのサポートや条件を提供しなかったにもかかわらず、「彼らは期待に応えられなかった」と言うこと。
      ignoring_constraints: |
        期待だけでは構造的な障壁を克服できません。
      pressure_without_support: |
        リソースやサポートなしで高い期待をかけることは有害になり得ます。
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: 平均への逆行
    quick_introduction: |
      平均への逆行とは、極端な結果の後には平均値に近い結果が続くという統計現象です。
      異常に良い結果や悪い結果の後には、原因となる介入がなくても、ランダムな変動によって次の結果は極端でなくなる可能性が高いです。
    one_liner: 極端な結果の後には、平均値に近い結果が続く傾向がある。
    try_this:
      - 「平均への逆行」を自身の介入のせいだと考えないこと — それはしばしば、どちらにしても起こったことでしょう。
      - 極端な結果の後には、次の結果がそれほど極端でなくなることを期待する。
      - 質問する: この変化は私の行動によるものか、それとも単に平均への逆行か？
    ask_yourself:
      - 私は、ランダムな変動である可能性のあることに対して、自分の介入を功績として、あるいは非難しているだろうか？
      - 私の行動がなくても、これは起こっただろうか？
    in_more_detail: |
      ある学生がテストで異常に高い点数を取った場合、次のテストでは、彼らが「怠惰になった」からではなく、最初の点数が運の要素を部分的に含んでいたため、平均値に近い点数を取る可能性が高いです。
      これは、スポーツのパフォーマンス、株式の収益、ビジネスの指標にも同様に当てはまります。
      私たちはしばしば、「逆行」を自分が行ったこと（例：罰や報酬）に起因させますが、それはどちらにしても起こったことです。

      ダニエル・カーネマンは、飛行教官が、賞賛はパフォーマンスを悪化させ、批判はそれを改善させると誤って結論付けた様子を描写しています。彼らは極端なパフォーマンスの後の平均への逆行を観察していました。
    why_this_is_important: |
      平均への逆行を理解することは、原因の誤った帰属を防ぎます。
      外れ値に過剰に反応したり、ノイズに基づいて変更を加えたりすることを避けるのに役立ちます。
      介入とパフォーマンスを評価するために不可欠です。
    when_to_use:
      - 意思決定
      - 投資
      - リスク評価
      - リーダーシップ
    how_can_you_spot_it:
      extreme_followed_by_average: |
        異常に良い、あるいは悪い結果の後に、平均値に近い結果が続く。
      spurious_causation: |
        逆行がどちらにしても起こったであろう時に、介入による「回復」や「低下」に原因があると考える。
      overreaction_to_outliers: |
        単一の極端なデータポイントに基づいて方針や個人的な変更を行う。
      reward_punishment_confusion: |
        改善が単なる逆行であったにもかかわらず、罰が「効果があった」と信じる。
    examples:
      sports: |
        ある選手がキャリア最高の試合をした後、平均的な成績に戻った。ファンは「慢心」を責めるかもしれない。
      investing: |
        ある株式が素晴らしい1年を過ごした後、元に戻った。投資家は、それが一部は平均への逆行であるにもかかわらず、経営陣の悪さに原因があると考えるかもしれない。
      performance_reviews: |
        ある従業員が悪い四半期を過ごし、フィードバックを受けて改善した。フィードバックが功を奏したと credit されるかもしれないが、逆行はどちらにしても起こっただろう。
      medicine: |
        ある患者が体調が悪化し、治療を受けた後に改善した。自然な改善も含まれていたにもかかわらず、治療に credit が与えられるかもしれない。
    real_world_implications: |
      平均への逆行は、教師、医師、ファンドマネージャー、そして私たち自身をどのように評価するかに影響を与えます。
      「上がったものは下がらなければならない」という言葉が統計的にしばしば成り立つ理由を説明しています。
      それを誤解すると、無駄な介入や、治療法への誤った信頼につながります。
    professional_application:
      networking_and_relationship_building: |
        単一の悪いやり取りを過剰に解釈しないこと — それは関係性の平均値に逆行する可能性のある外れ値かもしれない。
      collaborative_learning_initiative: |
        介入（トレーニング、プロセス変更）を評価する際には、効果と逆行を区別するために、対照群と複数のデータポイントを使用する。
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        介入後のいかなる改善も「単なる逆行」と見なし、真の効果が存在する場合でも、それを無視する。
      underreacting: |
        「平均値に逆行するだろう」と考えて、真の問題を無視する。
      statistical_illiteracy: |
        逆行を結果を「修正」する力と混同すること — それは単なる確率である。
      overconfidence: |
        根本的なプロセスが変化した可能性があっても、平均値は安定していると仮定すること。
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: バラ色の回顧
    quick_introduction: |
      バラ色の回顧とは、過去を実際よりも良く覚えてしまう傾向のことです。
      私たちは時間の経過とともに過去の経験をより肯定的に思い出し、困難を円滑にし、良い点を増幅させます。「あの頃は良かった」というのは、しばしば私たちが覚えているほど良かったわけではありません。
    one_liner: 過去を実際よりも良く覚えてしまう――「あの頃は良かった」は、それほど良くはなかった。
    try_this:
      - 過去と比較する際は、次のように尋ねてください：あの時、私は本当にどう感じていたのだろうか？
      - 後で記憶と現実を比較するために、日記をつけましょう。
      - ノスタルジアが現在の判断を歪めていることに気づきましょう。
    ask_yourself:
      - 過去を理想化していませんか？
      - もしタイムトラベルして過去に戻れたとしたら、あの時幸せだっただろうか？
    in_more_detail: |
      私たちは過去の経験の良い側面を思い出し、悪い点を忘れがち、あるいは軽視しがちです。休暇、仕事、人間関係は、その時よりもノスタルジアの中でより良く感じられます。これは非現実的な比較につながる可能性があります――私たちは理想化された過去と現在を比較して判断します。

      バラ色の回顧は、過去の選択を（記憶されている）同じ結果を期待して繰り返す際に、意思決定に影響を与えます。また、客観的に見てより悪かった時代へのノスタルジアを煽ることもあります。これは記憶におけるネガティビティバイアスの反対です。
    why_this_is_important: |
      バラ色の回顧を認識することは、より現実的な比較を行い、理想化された記憶に基づいた過去の過ちの繰り返しを避けるのに役立ちます。また、現在の進歩にもかかわらず、なぜ私たちが過去を恋しく思うことがあるのかを説明します。
    when_to_use:
      - 意思決定
      - キャリアの選択
      - 関係構築
      - 学習
    how_can_you_spot_it:
      idealized_past: |
        客観的な指標がそうでないことを示している場合でも、「あの頃はもっと良かった」と思う。
      selective_positive_memory: |
        過去の経験の良い点を覚えていて、悪い点を忘れている。
      nostalgia_as_evidence: |
        過去の選択が正しかった証拠として、懐かしい思い出を使う。
      present_undervaluation: |
        理想化された過去と比較するため、現在が実際よりも悪く感じられる。
    examples:
      career: |
        「前の仕事は素晴らしかった」――実際には良い理由があって辞めたのに、記憶はフラストレーションを円滑にしている。
      relationships: |
        過去の人間関係について「私たちはとても幸せだった」――別れにつながった対立を忘れている。
      childhood: |
        「私の時代は子供はもっと恵まれていた」――多くの客観的な指標（健康、安全、機会）が改善しているにもかかわらず。
      projects: |
        「あのプロジェクトは順調に進んだ」――実際には多くの遅延があったのに、プロセスではなく結果を覚えている。
    real_world_implications: |
      バラ色の回顧は、人生の満足度、キャリアの決定、ノスタルジアに駆られた選択に影響を与えます。過去の過ちの繰り返しや非現実的な比較につながる可能性があります。また、「あの頃は良かった」というレトリックの魅力を説明します。
    professional_application:
      networking_and_relationship_building: |
        過去の同僚と再会したり、過去の役割に戻ることを検討する際は、ノスタルジアと現実を区別しましょう。当時辞めた理由を記録し、戻る前にそれらを見直しましょう。
      collaborative_learning_initiative: |
        振り返りの際には、記憶ではなく、その時点での記録やデータを使用して、実際に何が起こったのかを評価しましょう。記憶は困難を円滑にします。
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        すべてのノスタルジアが誤解を招くわけではありません――時には過去の方が、ある意味では実際に良かったこともあります。
      invalidating_memories: |
        人々に、彼らの肯定的な記憶は「間違っている」と伝える――それは本当の主観的な経験を反映しているかもしれません。
      overcorrection: |
        過去は常に私たちが覚えているよりも悪かったと仮定すること――時には、それはより良かったのです。
      present_bias: |
        バラ色の回顧を、現在の衰退に関する正当な懸念を無視する言い訳として使用すること。
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: サリエンスバイアス (顕著性バイアス)
    quick_introduction: |
      サリエンスバイアスとは、状況の最も目立つ、あるいは気づきやすい側面に焦点を当て、
      それほど明白ではないが潜在的に重要な要因を見落としがちな傾向のことです。
      際立っているものが、私たちの判断において不釣り合いな注意と重みを与えられます。
    one_liner: 目立つものが不釣り合いな注意を引き、微妙なものは見落とされる。
    try_this:
      - 質問: 顕著ではないために、何が見えていないのだろうか？
      - 決定を下す前に、明白ではない要因を積極的に探す。
      - 鮮明な、あるいは劇的な要素が自分の判断を支配していることに気づく。
    ask_yourself:
      - 目立つものを過大評価し、微妙なものを過小評価していないか？
      - どのような重要な要因を見落としている可能性があるか？
    in_more_detail: |
      顕著な情報とは、鮮明で、感情的に強く訴えかけ、あるいは最近遭遇したものことです。
      それらは、本来あるべき以上に注意を引き、意思決定に影響を与えます。
      私たちは、明白なものを過大評価し、微妙なものを過小評価します。
      劇的な出来事や鮮明な例は、たとえそれが代表的でなくても、私たちの思考を支配することがあります。

      サリエンスバイアスは、利用可能性ヒューリスティック（心に浮かぶもの）や
      新近性バイアス（最近起こったこと）と重なります。
      リスク認識、採用、戦略に影響を与えます。最も目に見える問題は対処されますが、
      目に見えない問題は放置されます。
    why_this_is_important: |
      サリエンスバイアスを認識することは、明白なものを超えて、
      目に見えにくい要因を考慮するのに役立ちます。
      リスク評価、問題診断、意思決定の質を向上させます。
      重要なことは、必ずしも顕著であるとは限りません。
    when_to_use:
      - 意思決定 (decision-making)
      - 問題解決 (problem_solving)
      - リスク評価 (risk_assessment)
      - リーダーシップ (leadership)
    how_can_you_spot_it:
      prominent_factor_dominance: |
        最も目立つ側面が決定を左右する。
      overlooking_background: |
        重要であるにもかかわらず、目立たない要因が見落とされる。
      vividness_overweighting: |
        劇的または感情的な情報が不釣り合いな重みを持つ。
      visibility_bias: |
        簡単に見たり測定したりできるものが、できないものよりも多くの注意を引く。
    examples:
      risk: |
        飛行機事故は顕著であるため、飛行のリスクを過大評価する。
        自動車事故は全体としてはあまり顕著ではないため、運転のリスクを過小評価する。
      hiring: |
        候補者のプレゼンテーションスキルは顕著である。
        しかし、その実行力は目立たないかもしれないが、同等に重要である。
      strategy: |
        競合他社の動きは顕著である。
        しかし、徐々に進む市場の変化は目立たないが、それ以上に重要である可能性がある。
      problems: |
        最も大きな不満が対処される一方で、システム的な問題は見過ごされる。
    real_world_implications: |
      サリエンスバイアスは、何に注意、資金、行動が向けられるかに影響を与えます。
      原因ではなく症状に対処することにつながり、リソースの誤配分を招く可能性があります。
      意図的に顕著でない情報を探すことで、意思決定が向上します。
    professional_application:
      networking_and_relationship_building: |
        人の最も顕著な特徴だけで判断しない。
        信頼性、一貫性、助けにならない人々への接し方など、目立たない資質を探しましょう。
      collaborative_learning_initiative: |
        問題解決においては、「何が見えていないのか？」
        「目立たないが重要なものは何か？」と明確に質問しましょう。
        顕著でない問題を表面化させるプロセスを作成しましょう。
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        時には、顕著なものが重要である。明白なものすべてを却下しないように。
      false_sophistication: |
        曖昧な要因が常に明白な要因よりも重要であると仮定すること。
      analysis_paralysis: |
        あまりに多くの顕著でない要因を探しすぎて、顕著な要因に基づいて行動できなくなること。
      contrarianism: |
        単に違うという理由だけで、顕著な情報を拒否すること。
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: 富豪バイアス
    quick_introduction: |
      希少性バイアスとは、物事が希少である、あるいは限定的であると認識されたときに、それらの価値を高く評価する傾向のことです。「期間限定」「残り3点のみ」「限定アクセス」といった言葉は、合理的な評価をしばしば超えて、緊急性と欲求を刺激します。
    one_liner: 希少性は知覚価値を増幅させる――「限定」は合理性よりも緊急性を刺激する。
    try_this:
      - Ask: それが希少でなかったら、本当に欲しかっただろうか？ 緊急性を排除して考えてみよう。
      - Pause before acting on "limited time" or "only X left" offers. 期間限定や「残りX点」のオファーに飛びつく前に、一度立ち止まろう。
      - Notice when scarcity is driving your desire more than genuine value. 本当の価値よりも希少性が、あなたの欲求をどれだけ強く駆り立てているか気づこう。
    ask_yourself:
      - Am I valuing this because it's scarce, or because I actually need it? それは希少だから価値があると思っているのか、それとも本当に必要だから価値があると思っているのか？
      - Would I make this decision without the scarcity framing? 希少性という枠組みがなければ、この決断をしていただろうか？
    in_more_detail: |
      希少性は知覚価値を増幅させます。何かが稀少であったり、失われつつある場合、私たちはそれをより欲するようになります。これは、希少性が品質のシグナルとなり得ること、そして損失回避の心理から「機会損失」を恐れるためです。マーケターや交渉人は、緊急性を生み出すために希少性を利用します。このバイアスは、衝動的な決断、過剰な支出、不十分な優先順位付けにつながる可能性があります。

      また、希少性は、真にリソースが限られている人々の認知帯域幅にも影響を与えます。貧困は、他の意思決定における「精神的帯域幅」を低下させる可能性があります。
    why_this_is_important: |
      希少性バイアスを認識することで、操作的な戦術に抵抗し、より思慮深い選択をすることができます。また、限定版を過大評価したり、必要もないのに急いだりする理由も説明できます。
    when_to_use:
      - 意思決定
      - 交渉
      - 投資
      - リスク評価
    how_can_you_spot_it:
      urgency_trigger: |
        「期間限定」や「残りX点」は、不均衡な欲求を生み出す。
      fear_of_missing_out: |
        アクセスを失う可能性が、本来の価値よりも行動を強く駆り立てる。
      impulsive_purchases: |
        必要だからではなく、希少だから物を買ってしまう。
      artificial_scarcity: |
        希少性が、本物ではなく、人為的に製造されている（例：偽のカウントダウン）。
    examples:
      sales: |
        「在庫残り2点」や「セールは本日終了」といった言葉は、緊急性がなければ起こらなかったであろう購入を促す。
      auctions: |
        競売では、入札者は勝つことに夢中になり、競争による希少性から予定以上の金額を支払ってしまう。
      exclusivity: |
        「会員限定」や「招待制」のアクセスは、知覚価値を高める。
      genuine_scarcity: |
        リソースが真に限定されている場合、希少性のストレス下にある人々はより悪い決定を下す（例：貧困層、時間がない人々）。
    real_world_implications: |
      希少性バイアスは、消費者の行動、交渉の成果、政策対応を左右します。倫理的に（例：正当な締め切り）または非倫理的に（例：偽の希少性）使用される可能性があります。それを理解することで、意思決定の質が向上します。
    professional_application:
      networking_and_relationship_building: |
        他者が人為的な希少性を作り出した場合（「クライアントは数名しか受け入れていません」）、注意が必要です。希少性が本物かどうかを確認しましょう。人間関係を築く上で、あなたの時間の真の希少性は価値を示すことができますが、使いすぎは操作的に感じられる可能性があります。
      collaborative_learning_initiative: |
        イニシアチブの緊急性を高める際には、それが正当であることを確認してください。偽の締め切りは、発覚した際に信頼を失わせます。
    how_can_this_be_misapplied:
      manipulation: |
        他人を意思決定に追い込むために、意図的に偽の希少性を作り出すこと。
      impulsive_decisions: |
        より多くの時間が成果を向上させる可能性があるにもかかわらず、人為的な緊急性の中で重要な選択をしてしまうこと。
      overvaluing_scarcity: |
        希少なものが常に優れていると仮定してしまうこと――時として希少性は恣意的である。
      exploiting_vulnerability: |
        既にリソースのストレス下にある人々に対して、希少性戦術を利用すること。
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: 第二次思考
    quick_introduction: |
      第二次思考とは、自分の行動の結果の、さらにその結果までを考慮する実践のことです。一次思考は「Xをしたらどうなるか？」と問いますが、第二次思考は「その次は？」「さらにその次は？」と問います。これは意図しない影響を浮き彫りにします。
    one_liner: 「その次は？」と問い、結果の結果を考慮する。
    try_this:
      - どんな決断をするにも、「その次は？」を少なくとも二度問う。
      - 自分の行動に対して、他者がどう反応するか、そしてその反応にどう反応するかを考慮する。
      - 一次的な影響が、連鎖の中で逆転したり複雑化したりする点に気づく。
    ask_yourself:
      - 第二次（そして第三次）の影響について、十分に考えただろうか？
      - どのような意図しない結果を見落としている可能性があるだろうか？
    in_more_detail: |
      ハワード・マークスが投資の分野でこの概念を広めました。一次思考：「これは上がるだろう」。第二次思考：「もしこれが上がれば、他者も気づき、もっと買うだろう。それが続けば過大評価され、暴落するだろう」。結果の連鎖は、一次的な影響を逆転させたり、複雑化させたりすることがよくあります。

      第二次思考はより困難です。より多くの精神的労力と想像力を必要とします。しかし、多くの間違いを防ぐことができます。優れた戦略家は、数手先を考え、他者の反応を考慮します。
    why_this_is_important: |
      第二次思考は、意図しない結果を防ぎ、意思決定の質を向上させます。戦略、政策、そして行動が反応を引き起こすあらゆる分野において不可欠です。
    when_to_use:
      - 意思決定
      - 問題解決
      - 戦略
      - リスク評価
    how_can_you_spot_it:
      consequence_chains: |
        「Xをしたら、Yが起こり、次にZが起こる…」
      reaction_anticipation: |
        自分の行動に対して、他者がどう反応するかを考慮すること。
      unintended_effects: |
        副作用やフィードバックループを探すこと。
      reversals: |
        一次的な影響と矛盾したり、それを逆転させたりする二次的な影響。
    examples:
      investing: |
        「もし皆がこれを良い投資だと考えれば、おそらく混み合っているだろう。有利さは失われたかもしれない。」
      policy: |
        「もしXに補助金を出せば、需要が増え、価格が上がる。補助金は本当に助けになるのだろうか？」
      negotiation: |
        「ここで強く押しすぎれば、あちらで報復されるだろう。正味の影響は？」
      incentives: |
        「もしこの指標を評価すれば、人々はそれを操作するだろう。彼らは実際には何をするだろうか？」
    real_world_implications: |
      第二次思考は、戦略的思考の証です。政策の失敗、意図しないインセンティブ、そしてナイーブな楽観主義を防ぎます。優れた意思決定者と偉大な意思決定者を区別します。
    professional_application:
      networking_and_relationship_building: |
        行動を起こす前に、「彼らはどう反応するだろうか？そして私はそれにどう反応するだろうか？」と問う。単に即時のやり取りだけでなく、関係性のダイナミクスを考慮する。
      collaborative_learning_initiative: |
        計画段階で、「その次は？」という演習を実行する。結果の連鎖をマッピングする。意図しない影響が現れる前に特定する。
    how_can_this_be_misapplied:
      analysis_paralysis: |
        あまりにも多くのステップを先読みしすぎて、決して行動しないこと。
      false_complexity: |
        一次的な影響が十分な場合でも、二次的な影響が常に支配的であると仮定すること。
      overconfidence: |
        不確実性が積み重なる中で、長い連鎖を予測できると信じること。
      pessimism: |
        結果の連鎖において、常に最悪の事態を仮定すること。
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: サンクコストの誤謬
    quick_introduction: |
      サンクコストの誤謬とは、将来の期待リターンに基づいてではなく、
      すでに費やしたリソースのために、意思決定を継続する傾向のことです。
      「ここまで来たのだから」とか「もうたくさん投資した」という考えは、
      悪いものにさらに良いものを投げ込むことにつながります。
    one_liner: 過去の投資は失われたもの—将来のコストと利益のみが重要です。
    try_this:
      - Ask: もし今日から始めるなら、この道を選びますか？
      - Define "kill criteria" in advance—conditions under which you'll stop. （事前に「終了基準」を定義する—停止する条件。）
      - Evaluate the marginal decision: what do I gain or lose from here forward? （限界的な決定を評価する：ここから先、何を得て何を失うか？）
    ask_yourself:
      - Am I continuing because of future value, or to justify past investment? （将来の価値のため、それとも過去の投資を正当化するために続けていますか？）
      - What would I advise a friend who was in my position from scratch? （ゼロから私の立場にいる友人に、何をアドバイスしますか？）
    in_more_detail: |
      サンクコストとは、回収できない過去のコストのことです。
      合理的な意思決定は、それを無視します—将来のコストと利益のみが重要です。
      しかし、私たちは投資に感情的に結びついています。
      楽しめない食事を最後まで食べたり、気に入らない映画を見続けたり、
      もはや意味をなさなくなったプロジェクトを続けたりします。
      私たちは、入れたものを「無駄にしたくない」と思いますが、
      続けることはしばしばさらに無駄になります。

      この誤謬は、金銭だけでなく、時間、労力、アイデンティティを投資した場合に特に強く現れます。
      自分が間違っていたことを認めることは、コストがかかると感じられるため、私たちはさらに深みにはまります。
    why_this_is_important: |
      サンクコストの誤謬を認識することは、損失を削減し、必要に応じて方向転換し、
      過去の投資ではなく将来の価値に基づいて意思決定を行うのに役立ちます。
      これはプロジェクト、キャリア、人間関係において不可欠です。
    when_to_use:
      - 意思決定
      - 投資
      - キャリアの選択
      - リスク評価
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        「もうXも使ったのだから、今止めることはできない」が、将来のリターンが継続を正当化しない場合。
      escalation_of_commitment: |
        過去の投資を正当化するため、または「救済」するために、さらに投資すること。
      identity_investment: |
        失敗を認めることが自己イメージを脅かすため、継続すること。
      ignoring_marginal_analysis: |
        増分コストと利益ではなく、総コストに基づいて意思決定すること。
    examples:
      projects: |
        「もう6ヶ月も費やしたのだから、今止めることはできない」として、
        損失を削減することが合理的であるにもかかわらず、失敗したプロジェクトを継続すること。
      relationships: |
        将来を評価するのではなく、「もう5年も一緒にいるのだから」として、
        関係にとどまること。
      careers: |
        学位や経験年数に投資したため、嫌いなキャリアにとどまること。
      investments: |
        より良い機会に再配分するのではなく、「元に戻る」ために損失を出している株を保有し続けること。
    real_world_implications: |
      サンクコストの誤謬は、リソースの無駄遣い、失敗の長期化、機会の損失を引き起こします。
      個人、組織、政府に影響を与えます。
      これを克服するには、明確な意思決定フレームワークが必要です。
    professional_application:
      networking_and_relationship_building: |
        過去の投資のためだけに、もはやあなたに役立たない関係や協力関係に投資を続けるのをやめましょう。
        将来を見据えた価値を評価してください。
      collaborative_learning_initiative: |
        プロジェクトのために「終了基準」を作成しましょう—過去の投資に関係なく停止する条件です。
        「ゼロから」というレンズでプロジェクトを定期的に見直しましょう。
    how_can_this_be_misapplied:
      quitting_too_early: |
        「サンクコスト」を、成果が出るまでにもっと時間が必要なものを放棄する言い訳として使用すること。
      undervaluing_consistency: |
        一部のコミットメント（例：人間関係、評判）は、純粋な限界分析が見落とす継続性において価値があります。
      cold_rationality: |
        感情的な愛着が本物の価値を反映している可能性がある場合に、それを非合理的として却下すること。
      analysis_paralysis: |
        答えが明確であるにもかかわらず、継続すべきかどうかを考えすぎる（分析麻痺）。
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: 生存者バイアス
    quick_introduction: |
      生存者バイアスとは、プロセスを「生き残った」人々や物事に焦点を当て、
      そうでないものを無視してしまう論理的誤謬です。勝者を見て敗者を忘れ、
      成功と失敗について過度に楽観的な結論に至ります。
    one_liner: 勝者を見て敗者を忘れることで、過度に楽観的な結論に至る。
    try_this:
      - 似たようなことをして失敗した人は誰か？ 彼らから何を学べるか？ と尋ねる。
      - 「見えない」サンプル、つまり生き残らなかったものを探す。
      - 成功談ばかりを学んでいることに気づく。
    ask_yourself:
      - 生存者からしか学んでいないか？
      - 失敗者を含めたら、全体像はどのようになるだろうか？
    in_more_detail: |
      第二次世界大戦中、統計学者のエイブラハム・ウォルドは、生き残った航空機が
      どこを攻撃されたかを分析し、*生還しなかった*航空機が攻撃された場所に
      装甲を施すことを推奨することで、爆撃機の装甲配置を修正しました。
      私たちは自然と、見えるサンプル（生存者）に焦点を当て、見えないもの（失敗した者）を
      無視します。

      生存者バイアスは、起業、投資、キャリア、歴史の見方を歪めます。
      私たちは成功した企業を研究し、同様のことをして失敗した何千もの企業を見落とします。
      幸運な人々の声を聞き、不運な人々を忘れます。
    why_this_is_important: |
      生存者バイアスを修正することで、より現実的な期待値とより良い意思決定が可能になります。
      成功だけでなく失敗からも学ぶことができ、運の良い少数の人々にしか
      成功しなかった戦略をコピーすることを避けるのに役立ちます。
    when_to_use:
      - 意思決定
      - 投資
      - キャリアの選択
      - 学習
    how_can_you_spot_it:
      visible_success_stories: |
        私たちは、試みて失敗した人々よりも、成功した人々からずっと多く話を聞きます。
      missing_failures: |
        私たちが観察するサンプルには、「成功しなかった」ため、その話ができない人々が
        含まれていません。
      copying_survivors: |
        生存者が行ったことが成功の原因であったと仮定すること。しかし、それは単なる運や
        生存者バイアスによるものであった可能性があります。
      overly_optimistic_models: |
        試行回数の分母を無視した成功率の推定値。
    examples:
      entrepreneurship: |
        「ザッカーバーグのように大学を中退する」ということは、億万長者の企業を
        設立しなかった多くの退学者の存在を無視することです。
      investing: |
        存続したファンドのみを研究すると、成績不振で閉鎖されたファンドが
        無視され、過去の収益が膨張します。
      career_advice: |
        成功した人々は努力を成功の要因としますが、努力して失敗した人々の声は
        聞こえてきません。
      historical_analysis: |
        「偉大な」企業を研究すると、同様の戦略で失敗した多くの企業が見落とされます。
    real_world_implications: |
      生存者バイアスは、認識されている成功率を誇張し、ロールモデルを歪め、
      不適切な模倣につながります。これを修正するには、失敗事例を探し、
      ベースレートを理解する必要があります。
    professional_application:
      networking_and_relationship_building: |
        アドバイスを求める際には、試みて失敗した人々からも話を聞きましょう。
        彼らの視点は、生存者よりも有益なことが多いです。
      collaborative_learning_initiative: |
        成功したプロジェクトだけでなく、失敗したプロジェクトや閉鎖されたイニシアチブを
        研究しましょう。「失敗のポストモーテム」を実施して、うまくいかなかったことから
        学びましょう。
    how_can_this_be_misapplied:
      excessive_pessimism: |
        成功は常に運であり、努力は関係ないと思い込むように過修正してしまうこと。
      dismissing_success: |
        「生存者バイアス」のせいで、成功した人々から学ぶことを拒否すること。
      analysis_paralysis: |
        失敗事例に集中しすぎて、決して行動に移せないこと。
      false_equivalence: |
        生存者と非生存者の戦略を、文脈が異なるにもかかわらず、同等に有益であると
        みなすこと。
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: ツァイガルニク効果
    quick_introduction: |
      ツァイガルニク効果とは、完了したタスクよりも、未完了または中断されたタスクをよりよく記憶する傾向のことです。未完了のタスクは心理的な緊張を生み出し、それが私たちの心の中でアクティブに保ちます。私たちの脳は、未完成のものにしがみつきます。
    one_liner: 未完了のタスクは私たちの心に残り、脳は未完成のものにしがみつきます。
    try_this:
      - 完了することで、タスクをメンタルロードから「解放」しましょう—完了するか、明確に中止してください。
      - 生産的なオープンループを作成するために、作業を管理可能なチャンクに分割します。
      - 未完了のビジネスについて反芻していることに気づいたら—ループを閉じるか、手放すことを決定してください。
    ask_yourself:
      - 私の心に緊張を生み出している未完了のタスクは何ですか？
      - このオープンループは維持する価値がありますか、それとも閉じることができますか？
    in_more_detail: |
      ブルマ・ツァイガルニクは、ウェイターが支払われた注文よりも支払われていない注文をよりよく覚えていたことを観察しました—タスクが完了すると、それは記憶から「解放」されました。未完了のタスクは、閉鎖を要求するオープンループを作成します。これは、生産的な集中（私たちは完了したい）と不安（未完了のものを考えずにはいられない）の両方を駆動します。

      この効果は、マーケティング（クリフハンガー、未完了の物語）や生産性（複数の「オープンループ」を作成するために作業をチャンクに分割する）で使用されます。それは、私たちが未完了のビジネスについて反芻する理由と、ToDoリストが圧倒的に感じられる理由を説明します。
    why_this_is_important: |
      ツァイガルニク効果を理解することは、メンタルロードの管理、魅力的な体験のデザイン、中断の中断の戦略的な使用に役立ちます。それは、私たちが未完了の仕事について考え続けるのをやめられない理由—そしてそれがどのように利用できるか、または有害であるかを説明します。
    when_to_use:
      - 問題解決
      - リーダーシップ
      - 学習
      - 意思決定
    how_can_you_spot_it:
      rumination_on_incomplete: |
        未完了のタスクは、完了したタスクよりも思考に侵入します。
      better_recall_of_unfinished: |
        完了したタスクよりも中断されたタスクをよりよく覚えています。
      tension_for_closure: |
        開始したことを完了するための不快感または意欲。
      serial_dramas: |
        クリフハンガーと「続く」は効果を悪用します。
    examples:
      productivity: |
        タスクを開始すると、完了を促進する精神的な緊張が生じます—または、オープンループが多すぎると不安が生じます。
      marketing: |
        「パート1/3」または「続く」は、聴衆を引き付け、戻ってこさせます。
      meetings: |
        明確な次のステップなしに会議を終了すると、参加者は未解決の緊張を抱えたままになります。
      learning: |
        未回答の質問や不完全な説明は記憶に残り、さらなる調査を推進します。
    real_world_implications: |
      ツァイガルニク効果は、生産性、エンゲージメント、メンタルロードに影響を与えます。集中するために利用することも、圧倒感を生み出すこともできます。それはクリフハンガーの魅力と、あまりにも多くのオープンタスクの負担を説明します。
    professional_application:
      networking_and_relationship_building: |
        明確な次のステップで会話を終える—または、相手にフォローアップしてほしい場合は意図的なオープンループで。未解決の糸はエンゲージメントを生み出します。
      collaborative_learning_initiative: |
        トレーニングでツァイガルニク効果を使用します：学習者を惹きつけ続けるために、休憩の前に問題や質問を提示します。ただし、人々が圧倒されるような多くのオープンループを作成することは避けてください。
    how_can_this_be_misapplied:
      overwhelm: |
        あまりにも多くのオープンループ—あまりにも多くの未完了のタスク—を作成すると、不安と麻痺につながります。
      manipulation: |
        依存関係またはエンゲージメントを作成するために、意図的に物事を未解決のままにしておくこと。
      false_urgency: |
        存在しない場合に人工的な緊急性を生成するために効果を使用すること。
      incomplete_work: |
        「緊張」を生み出すために多くのことを開始するが、実際には完了しない—努力の散乱につながる。
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: ゼロサム思考
    quick_introduction: |
      ゼロサム思考とは、誰かの利益は誰かの損失でなければならない、つまり資源は固定されており、自分にとってのどんな有利も私にとっての不利になるという考え方です。実際には、多くの状況はポジティブサム（両者が利益を得られる）です。
    one_liner: あなたの利益が私の損失である必要はありません—多くの状況はポジティブサムです。
    try_this:
      - Ask: パイを拡大することはできますか？これは本当にゼロサムですか？
      - Look for cooperation before assuming competition.  競争を前提とする前に協力を探してください。
      - Notice when you're treating a situation as fixed-pie when it isn't.  そうでない状況を固定パイとして扱っていることに気づいてください。
    ask_yourself:
      - Am I assuming a fixed pie when we could expand it?  拡大できるのに固定パイを前提としていませんか？
      - Would cooperation create more value than competition?  競争よりも協力をすることで、より多くの価値が生まれませんか？
    in_more_detail: |
      ゼロサムゲームでは、合計は固定されています—あなたの利益は私の損失です。ポジティブサムの状況では、協力が価値を創造します。貿易、イノベーション、関係構築はしばしばポジティブサムです。ゼロサム思考は、不必要な競争、協力の機会の損失、そして破壊的な対立につながります。

      このバイアスは、交渉、政治、組織力学において一般的です。パイがしばしば拡大できるにもかかわらず、固定パイであると仮定します。それは自己成就的になる可能性があります：もしあなたが他人を敵対者として扱えば、彼らは敵対者になります。
    why_this_is_important: |
      ゼロサム思考を認識することは、協力と価値創造の機会を開きます。交渉を改善し、対立を減らし、Win-Winの結果を可能にします。最良の機会の多くはポジティブサムです。
    when_to_use:
      - negotiation  交渉
      - leadership  リーダーシップ
      - relationship_building  関係構築
      - decision-making  意思決定
    how_can_you_spot_it:
      fixed_pie_assumption: |
        状況によっては両者が得られる可能性があるのに、「彼らが勝てば私は負ける」
      competitive_ framing: |
        状況を自動的に「私たち対彼ら」と捉えること。
      envy_of_others_gains: |
        自分のものを減らすかのように、他人の成功を羨むこと。
      missed_cooperation: |
        全員に利益をもたらす協力の機会を見逃すこと。
    examples:
      negotiation: |
        相手にとってより良い取引は自分にとってより悪い取引を意味すると仮定すること—創造的な解決策がしばしば両者にとって価値を拡大させるにもかかわらず。
      salary: |
        「同僚が昇給したら、私に回ってくる分が減る」—予算は柔軟であったり、生み出された価値によって昇給が正当化される場合があるにもかかわらず。
      politics: |
        「彼らの党の利益は私たちの損失だ」—多くの政策結果は複数のグループに利益をもたらす可能性があるにもかかわらず。
      career: |
        「彼らの昇進は私の機会を減らす」—組織の成長が皆のためにより多くの機会を生み出す可能性があるにもかかわらず。
    real_world_implications: |
      ゼロサム思考は対立を煽り、協力を制限し、機会損失を引き起こします。経済、人間関係、イノベーションにおいてはしばしば誤っています。ポジティブサムのフレームワークに移行することで、結果が改善されます。
    professional_application:
      networking_and_relationship_building: |
        他者に価値を創造する方法を探してください—彼らの成功はあなたに機会をもたらす可能性があります。両当事者が利益を得られる関係を構築してください。
      collaborative_learning_initiative: |
        チームの目標をポジティブサムとして捉えてください：共有された成功、パイの拡大。社内競争よりも協力を奨励してください。
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        状況によってはゼロサム（例：単一の昇進、固定予算）である場合があります。それを無視するとナイーブになる可能性があります。
      naive_cooperation: |
        一部の俳優が本当に敵対的である場合に、全員が協力すると仮定すること。
      undervaluing_competition: |
        競争は改善を促進することができます；すべての対立が破壊的であるわけではありません。
      exploitation: |
        利益を得ていない他者から価値を抽出するために「ポジティブサム」のフレーミングを使用すること。
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
