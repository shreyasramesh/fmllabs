# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Bengali)
# Consolidated from mental-models-bn/

mental_models:
  - id: ambiguity_effect
    name: অস্পষ্টতার প্রভাব
    quick_introduction: |
      অস্পষ্টতার প্রভাব হল সেই প্রবণতা যেখানে আমরা কোনো ফলাফলের সম্ভাব্যতা সম্পর্কে
      তথ্য না থাকলে বিকল্পগুলি এড়িয়ে চলি। আমরা অজানা ঝুঁকির চেয়ে পরিচিত ঝুঁকি
      পছন্দ করি—এমনকি অজানা ঝুঁকিগুলি আরও ভালো হলেও। অনিশ্চয়তা নিজেই
      বিরক্তিকর মনে হয়।
    one_liner: আমরা অজানা ঝুঁকির চেয়ে পরিচিত ঝুঁকি পছন্দ করি—এমনকি অজানাটি আরও ভালো হলেও।
    try_this:
      - জিজ্ঞাসা করুন: আমি কি অনিশ্চয়তার কারণে এই বিকল্পটি এড়িয়ে চলছি, নাকি এর কোনও বাস্তব খারাপ দিক আছে?
      - আপনি যা জানেন তা পরিমাপ করুন; কখনও কখনও "অস্পষ্ট" বিকল্পটির একটি স্পষ্ট ঊর্ধ্বগতি থাকে।
      - খেয়াল করুন কখন আপনি কেবল নিরাপদ মনে হওয়ার কারণে পরিচিতের দিকে যান।
    ask_yourself:
      - আমি কি কিছু প্রত্যাখ্যান করছি কারণ এটি অস্পষ্ট, নাকি এটি সত্যিই খারাপ?
      - অনিশ্চিত বিকল্পের সাথে স্বাচ্ছন্দ্য বোধ করার জন্য আমার কী জানা দরকার?
    in_more_detail: |
      এলসবার্গ প্যারাডক্সে, লোকেরা পরিচিত অনুপাতের বলের পাত্রের উপর বাজি ধরতে পছন্দ করে
      অজানা অনুপাতের পাত্রের চেয়ে, এমনকি অজানা পাত্রটি আরও ভালো সুযোগ দিলেও।
      আমরা অস্পষ্টতা অপছন্দ করি—আমরা একটি অস্পষ্টের চেয়ে একটি স্পষ্ট (খারাপ হলেও)
      সম্ভাবনা পেতে চাই।

      এই প্রভাব বিনিয়োগ, কর্মজীবনের পছন্দ এবং নীতিতে সিদ্ধান্তগুলিকে প্রভাবিত করে।
      এটি অস্পষ্ট কিন্তু সম্ভাব্যভাবে উন্নত বিকল্পগুলি এড়িয়ে চলার কারণে suboptimal
      সিদ্ধান্তের দিকে নিয়ে যেতে পারে। এটি ব্যাখ্যা করে কেন আমরা পরিচিত ব্র্যান্ড এবং
      জানা পরিমাণ পছন্দ করি।
    why_this_is_important: |
      অস্পষ্টতার প্রভাবকে স্বীকৃতি দেওয়া আপনাকে পরিচিতকে অতিরিক্ত পছন্দ করা এবং
      অনিশ্চিতকে কম পছন্দ করা এড়াতে সাহায্য করে। এটি সুযোগ হাতছাড়া করার দিকে নিয়ে
      যেতে পারে যখন অস্পষ্টতা পরিচালনাযোগ্য। এটি ব্যাখ্যা করে কেন স্বচ্ছতা এবং
      স্পষ্টতা উদ্বেগ কমায়।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - বিনিয়োগ
      - কর্মজীবনের_পদক্ষেপ
    how_can_you_spot_it:
      preference_for_known_risks: |
        অস্পষ্ট বিকল্পগুলির চেয়ে স্পষ্ট (এমনকি খারাপ হলেও) সম্ভাবনার বিকল্পগুলি
        নির্বাচন করা।
      avoidance_of_uncertainty: |
        প্রধানত "আমরা যথেষ্ট জানি না" বলে বিকল্পগুলি প্রত্যাখ্যান করা।
      familiarity_over_optimality: |
        সম্ভাব্য ভাল অজানা এর চেয়ে পরিচিতকে পছন্দ করা।
      information_seeking: |
        অস্পষ্টতা হ্রাস করার জন্য তথ্যের জন্য অর্থ প্রদান করতে ইচ্ছুক—এমনকি যখন
        এটি সিদ্ধান্ত পরিবর্তন না করে।
    examples:
      investing: |
        আন্তর্জাতিক স্টকের চেয়ে দেশীয় স্টক পছন্দ করা কারণ "আমরা সেগুলি
        আরও ভালভাবে বুঝি" বৈচিত্র্যকরণের সুবিধা সত্ত্বেও।
      employment: |
        অনিশ্চিত ঊর্ধ্বগতির একটি ভূমিকা নেওয়ার পরিবর্তে একটি পরিচিত চাকরিতে থাকা।
      product_choice: |
        অনিশ্চিত মানের একটি নতুন বিকল্পের চেয়ে একটি পরিচিত ব্র্যান্ড নির্বাচন করা।
      medical: |
        অনিশ্চিত ফলাফলের চিকিৎসার চেয়ে পরিচিত পার্শ্বপ্রতিক্রিয়া সহ একটি চিকিৎসাকে
        পছন্দ করা, এমনকি পরেরটি আরও ভালো হলেও।
    real_world_implications: |
      অস্পষ্টতার প্রভাব বাজার, কর্মজীবনের পছন্দ এবং নীতিকে রূপ দেয়। এটি
      স্পষ্টতর তথ্য সরবরাহ করে বা সিদ্ধান্তগুলির পুনঃব্যাখ্যার মাধ্যমে হ্রাস করা যেতে
      পারে। এটি ব্যাখ্যা করে কেন স্বচ্ছতা এবং যোগাযোগ উদ্বেগ হ্রাস করে।
    professional_application:
      networking_and_relationship_building: |
        সম্পর্কে অস্পষ্টতা হ্রাস করুন: প্রত্যাশাগুলি স্পষ্ট করুন, স্পষ্টভাবে যোগাযোগ
        করুন এবং অনিশ্চয়তা হ্রাস করুন। মানুষ পরিচিত পরিস্থিতি পছন্দ করে।
      collaborative_learning_initiative: |
        পরিবর্তন প্রবর্তনের সময়, অস্পষ্টতা হ্রাস করুন—কী ঘটবে, কখন এবং কেন
        সে সম্পর্কে স্পষ্ট তথ্য সরবরাহ করুন। অস্পষ্টতা প্রতিরোধ বাড়ায়।
    how_can_this_be_misapplied:
      manipulation: |
        পছন্দের বিকল্পগুলির দিকে মানুষকে চালিত করার জন্য ইচ্ছাকৃতভাবে অস্পষ্টতা
        তৈরি করা।
      false_clarity: |
        প্রকৃত অনিশ্চয়তা বিদ্যমান থাকার সময় মিথ্যা নিশ্চয়তা প্রদান করা।
      overconfidence: |
        ধরে নেওয়া যে অস্পষ্টতা হ্রাস করা সবসময় সিদ্ধান্তগুলির উন্নতি করে—কখনও
        কখনও অস্পষ্ট বিকল্পটি সত্যিই ভাল।
      analysis_paralysis: |
        কিছু অস্পষ্টতা অনিবার্য থাকাকালীন সিদ্ধান্ত নেওয়ার আগে নিখুঁত তথ্যের জন্য
        অপেক্ষা করা।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
      - default_effect
  - id: anchoring_bias
    name: অ্যাঙ্করিং বায়াস (Anchoring Bias)
    quick_introduction: |
      অ্যাঙ্করিং বায়াস হলো সিদ্ধান্ত নেওয়ার সময় প্রথম প্রাপ্ত তথ্যের উপর অতিরিক্ত নির্ভর করার প্রবণতা। সেই প্রাথমিক "অ্যাঙ্কর" পরবর্তী বিচারকে প্রভাবিত করে, এমনকি যখন তা অপ্রাসঙ্গিক বা ইচ্ছামতো (arbitrary) হয়।
    one_liner: আপনি প্রথম যে সংখ্যাটি দেখেন সেটি পরবর্তী সব সংখ্যাকে আকার দেয়।
    try_this:
      - কোনো আলোচনার আগে, আপনার লক্ষ্য সংখ্যা ঠিক করুন এবং তাদের অ্যাঙ্কর দ্বারা প্রভাবিত হওয়া থেকে বিরত থাকুন।
      - অনুমান করার সময়, অন্যদের কথা শোনার আগে আপনার নিজের সংখ্যা তৈরি করুন।
      - জিজ্ঞাসা করুন: আমি যদি প্রথমে অন্য কোনো সংখ্যা দেখতাম তবে কি ভিন্নভাবে চিন্তা করতাম?
    ask_yourself:
      - আমি প্রথমে কোন সংখ্যা বা ধারণার সম্মুখীন হয়েছিলাম—এবং এটি কি আমার বিচারকে প্রভাবিত করছে?
      - আমি কি অ্যাঙ্কর থেকে যথেষ্ট সমন্বয় করছি, নাকি এখনও এর খুব কাছাকাছি আছি?
    in_more_detail: |
      একটি ক্লাসিক পরীক্ষায়, লোকেরা যখন জাতিসংঘের মধ্যে আফ্রিকান দেশগুলির শতাংশ অনুমান করতে বলেছিল, তখন তারা যদি উচ্চতর সংখ্যা (যেমন, ৬৫ বনাম ১০) দেখে থাকে তবে উচ্চতর অনুমান করেছিল। অ্যাঙ্কর—এমনকি যখন এলোমেলো—তাদের উত্তরকে প্রভাবিত করেছিল। অ্যাঙ্করিং আলোচনা, মূল্য নির্ধারণ, নিয়োগ এবং পূর্বাভাসকে প্রভাবিত করে।

      আমরা প্রথম যে সংখ্যাটি দেখি তা একটি রেফারেন্স পয়েন্ট হয়ে ওঠে। আমরা সেখান থেকে সমন্বয় করি, কিন্তু সাধারণত অপর্যাপ্তভাবে। এমনকি যখন আমরা জানি যে অ্যাঙ্করটি এলোমেলো, এটি তখনও আমাদের প্রভাবিত করতে পারে। বিশেষজ্ঞরা এর প্রভাব থেকে মুক্ত নন।
    why_this_is_important: |
      অ্যাঙ্করিং বোঝা আপনাকে আরও ভাল সিদ্ধান্ত নিতে, আরও কার্যকরভাবে আলোচনা করতে এবং ম্যানিপুলেটেড হওয়া এড়াতে সাহায্য করে। এটি ব্যাখ্যা করে যে কেন তথ্যের ক্রম এবং ফ্রেম (framing) এত গুরুত্বপূর্ণ।
    when_to_use:
      - সিদ্ধান্ত_নেওয়া (decision-making)
      - আলোচনা (negotiation)
      - বিনিয়োগ (investing)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
    how_can_you_spot_it:
      first_number_dominance: |
        আলোচনা বা অনুমানে প্রথম সংখ্যাটি ফলাফলের উপর অসমভাবে প্রভাব ফেলে।
      insufficient_adjustment: |
        অ্যাঙ্কর থেকে সমন্বয় করার সময়, লোকেরা সাধারণত যথেষ্ট সমন্বয় করে না।
      arbitrary_anchor_influence: |
        এমনকি সুস্পষ্টভাবে অপ্রাসঙ্গিক সংখ্যাগুলিও (যেমন, সামাজিক সুরক্ষা নম্বরের শেষ অঙ্ক) অনুমানকে প্রভাবিত করতে পারে।
      order_effects: |
        বিকল্পগুলি উপস্থাপনের ক্রম পছন্দ পরিবর্তন করে।
    examples:
      salary_negotiation: |
        প্রথমে উল্লেখিত সংখ্যা—হোক তা নিয়োগকর্তা বা প্রার্থীর দ্বারা—প্রায়শই চূড়ান্ত অফারকে অ্যাঙ্কর করে।
      real_estate: |
        তালিকাভুক্ত মূল্য (Listing price) ক্রেতাদের মূল্যের ধারণাকে অ্যাঙ্কর করে, এমনকি যখন এটি ইচ্ছাকৃতভাবে বেশি বা কম সেট করা হয়।
      retail: |
        "ছিল ৯৯ ডলার, এখন ৪৯ ডলার" এই বিক্রয় মূল্যকে একটি ডিল হিসাবে দেখানোর জন্য আসল মূল্যকে একটি অ্যাঙ্কর হিসাবে ব্যবহার করে।
      forecasting: |
        পরিকল্পনা সভায় প্রাথমিক অনুমান পরবর্তী পূর্বাভাসকে অ্যাঙ্কর করে, এমনকি যখন প্রথম অনুমানটি একটি অনুমান ছিল।
    real_world_implications: |
      অ্যাঙ্করিং বাজার, আলোচনা এবং নীতি নির্ধারণকে প্রভাবিত করে। এটি নৈতিকভাবে (যেমন, যুক্তিসঙ্গত প্রত্যাশা স্থাপন) বা অনৈতিকভাবে (যেমন, ম্যানিপুলেটিভ মূল্য নির্ধারণ) ব্যবহার করা যেতে পারে। এটি চিনতে পারা সিদ্ধান্ত গ্রহণের মান উন্নত করে।
    professional_application:
      networking_and_relationship_building: |
        আলোচনায়, অ্যাঙ্কর সেট করার জন্য প্রথম প্রস্তাব দেওয়ার কথা বিবেচনা করুন—অথবা অন্য পক্ষ যখন এটি করছে তখন সে সম্পর্কে সচেতন থাকুন।
      collaborative_learning_initiative: |
        মিটিংয়ে, অনুমানের উপর কে প্রথমে কথা বলে সে সম্পর্কে সতর্ক থাকুন; আলোচনার আগে স্বাধীন অনুমান সংগ্রহ করার কথা বিবেচনা করুন।
    how_can_this_be_misapplied:
      manipulation: |
        ইচ্ছাকৃতভাবে চরম অ্যাঙ্কর ব্যবহার করে অন্যদের কাঙ্ক্ষিত ফলাফলের দিকে পরিচালিত করা।
      overconfidence_in_anchors: |
        নিজের প্রথম অনুমানকে পুনরায় পর্যালোচনা না করে অতিরিক্ত বিশ্বাস করা।
      ignoring_relevant_information: |
        একটি অ্যাঙ্করকে আরও প্রাসঙ্গিক ডেটার উপর প্রভাব বিস্তার করতে দেওয়া।
      exploitation: |
        বিক্রয় কৌশল যা প্রকৃত মূল্যকে যুক্তিসঙ্গত মনে করানোর জন্য অতিমাত্রায় "তুলনা করুন" (compare at) মূল্য ব্যবহার করে।
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: অ্যাভেইলেবিলিটি ক্যাসকেড
    quick_introduction: |
      একটি অ্যাভেইলেবিলিটি ক্যাসকেড হল একটি স্ব-শক্তিশালী প্রক্রিয়া যেখানে একটি ধারণা
      জনপ্রিয় আলোচনার মাধ্যমে বিশ্বাসযোগ্যতা লাভ করে। যত বেশি এটি আলোচিত হয়,
      ততই এটি "সহজলভ্য" হয়, তত বেশি মানুষ এটি বিশ্বাস করে, এবং তত বেশি এটি আলোচিত হয়।
      একটি সম্মিলিত বিশ্বাস তার অন্তর্নিহিত সত্য নির্বিশেষে গতি লাভ করে।
    one_liner: একটি ধারণা যত বেশি পুনরাবৃত্তি হয়, ততই বিশ্বাসযোগ্য মনে হয়—প্রমাণ নির্বিশেষে।
    try_this:
      - জিজ্ঞাসা করুন: এই বিশ্বাসটি কি সত্য হওয়ার কারণে ব্যাপক, নাকি পুনরাবৃত্তি হওয়ার কারণে?
      - যা সবাই জানে তা গ্রহণ করার আগে প্রাথমিক উৎস সন্ধান করুন।
      - খেয়াল করুন কখন শুধুমাত্র পুনরাবৃত্তি আপনার বিশ্বাসযোগ্যতার অনুভূতিকে চালিত করছে।
    ask_yourself:
      - যদি আমি এটি একবার শুনতাম তবে কি আমি এটি বিশ্বাস করতাম?
      - আমি কি "সবাই তাই বলে" এবং "প্রমাণ এটিকে সমর্থন করে" এর মধ্যে গুলিয়ে ফেলছি?
    in_more_detail: |
      টিমুর কুরান এবং ক্যাস সানস্টেইন বর্ণনা করেছেন কিভাবে অ্যাভেইলেবিলিটি ক্যাসকেড কাজ করে:
      তথ্যের সহজলভ্যতা (আমরা কত ঘন ঘন কিছু শুনি) এবং বিশ্বাসযোগ্যতা (এটি কতটা বিশ্বাসযোগ্য মনে হয়)
      একে অপরকে শক্তিশালী করে। মিডিয়া কভারেজ, সোশ্যাল মিডিয়া এবং জনDiscourse নির্দিষ্ট ধারণাগুলিকে
      প্রচারিত করে। একবার একটি ধারণা সহজলভ্যতার একটি নির্দিষ্ট পর্যায়ে পৌঁছালে, এটি দ্রুত ছড়িয়ে
      পড়তে পারে এবং "সাধারণ জ্ঞান" হয়ে উঠতে পারে এমনকি যদি এটি মিথ্যা বা অতিরঞ্জিত হয়।

      অ্যাভেইলেবিলিটি ক্যাসকেড উপকারী (গুরুত্বপূর্ণ সতর্কতা ছড়িয়ে দেওয়া) বা ক্ষতিকর (আতঙ্ক বা ভুল তথ্য
      ছড়িয়ে দেওয়া) হতে পারে। এগুলি অ্যাভেইলেবিলিটি হিউরিস্টিক এবং সোশ্যাল প্রুফ দ্বারা চালিত হয়।
    why_this_is_important: |
      অ্যাভেইলেবিলিটি ক্যাসকেড সনাক্তকরণ আপনাকে এটি মূল্যায়ন করতে সাহায্য করে যে ব্যাপক
      বিশ্বাস প্রমাণকে প্রতিফলিত করে নাকি কেবল পুনরাবৃত্তিকে। এটি ব্যাখ্যা করে কিভাবে ধারণাগুলি
      ভাইরাল হয় এবং কিভাবে সম্মিলিত বিশ্বাস ভুল হতে পারে। এটি মিডিয়া সাক্ষরতা এবং সমালোচনামূলক
      চিন্তাভাবনার জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - শিক্ষা
      - নেতৃত্ব
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        একটি ধারণা যত বেশি পুনরাবৃত্তি হয়, ততই বিশ্বাসযোগ্য মনে হয়।
      media_amplification: |
        কভারেজ বিশ্বাস চালিত করে যা আরও কভারেজ চালিত করে।
      social_proof_belief: |
        "সবাই এটি বিশ্বাস করে" বিশ্বাসের প্রমাণ হয়ে ওঠে।
      threshold_effects: |
        একবার একটি ধারণা দৃশ্যমানতার একটি নির্দিষ্ট পর্যায় অতিক্রম করলে, এটি দ্রুত ছড়িয়ে পড়ে।
    examples:
      health_scares: |
        একটি গবেষণা পরামর্শ দেয় যে একটি পণ্য বিপজ্জনক; মিডিয়া এটিকে প্রচার করে;
        জনসাধারণ এটি এড়িয়ে চলে; আরও কভারেজ অনুসরণ করে। ঝুঁকিটি
        অতিরঞ্জিত হতে পারে।
      financial_panic: |
        ব্যাংকের ব্যর্থতার গুজব ছড়িয়ে পড়ে; লোকেরা টাকা তুলে নেয়; দৌড়টি
        স্ব-পূরণমূলক হয়ে ওঠে।
      social_media: |
        একটি আখ্যান ভাইরাল হয়; পুনরাবৃত্তি বিশ্বাস বাড়ায়; বিশ্বাস
        শেয়ারিং বাড়ায়। সত্য এবং ভাইরালিটি ভিন্ন হতে পারে।
      organizational: |
        কর্মী ছাঁটাইয়ের গুজব ছড়িয়ে পড়ে; উদ্বেগ বাড়ে; আচরণ
        পরিবর্তিত হয়; প্রতিক্রিয়ার মাধ্যমে গুজব বিশ্বাসযোগ্যতা অর্জন করে।
    real_world_implications: |
      অ্যাভেইলেবিলিটি ক্যাসকেড জনমত, নীতি এবং বাজারকে প্রভাবিত করে।
      এগুলি গুরুত্বপূর্ণ সত্য এবং বিপজ্জনক মিথ্যা উভয়ই ছড়িয়ে দিতে পারে।
      সমালোচনামূলক চিন্তাভাবনার জন্য প্রমাণ-ভিত্তিক বিশ্বাসকে
      ক্যাসকেড-চালিত বিশ্বাস থেকে আলাদা করা প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        যখন একটি ধারণা "সর্বত্র" থাকে, তখন জিজ্ঞাসা করুন: এটি কি সত্য হওয়ার কারণে
        পুনরাবৃত্তি হচ্ছে, নাকি সত্য হওয়ার কারণে পুনরাবৃত্তি হচ্ছে? প্রাথমিক উৎস সন্ধান করুন।
      collaborative_learning_initiative: |
        প্রচার করার আগে যাচাই করার নিয়ম তৈরি করুন।
        "যা সবাই জানে" এর প্রশ্ন জিজ্ঞাসা করতে উৎসাহিত করুন। প্রমাণ প্রতিফলিত করে এমন
        ঐক্যমত এবং সহজলভ্যতা প্রতিফলিত করে এমন ঐকমত্যের মধ্যে পার্থক্য করুন।
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        কখনও কখনও ব্যাপক বিশ্বাস সঠিক হয়। সমস্ত
        জনপ্রিয় ধারণা ক্যাসকেড বলে ধরে নেবেন না।
      conspiracy_thinking: |
        "অ্যাভেইলেবিলিটি ক্যাসকেড" ব্যবহার করে বৈধ
        উদ্বেগগুলিকে তৈরি বলে খারিজ করা।
      false_skepticism: |
        জনপ্রিয় হওয়ার কারণে সুপ্রতিষ্ঠিত ধারণা প্রত্যাখ্যান করা।
      contrarianism: |
        যা ব্যাপকভাবে বিশ্বাস করা হয় তা ভুল হতে হবে বলে ধরে নেওয়া।
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: সহজলভ্যতা অনুমান (Availability Heuristic)
    quick_introduction: |
      সহজলভ্যতা অনুমান হলো কোনো ঘটনার সম্ভাবনা বিচার করার প্রবণতা, যেখানে উদাহরণগুলো আমাদের মনে কতটা সহজে আসে তার উপর নির্ভর করে। যদি আমরা সহজেই কোনো ঘটনার দৃষ্টান্ত মনে করতে পারি, তবে আমরা ধরে নিই যে ঘটনাটি সাধারণ। প্রাণবন্ত, সাম্প্রতিক বা আবেগপূর্ণ উদাহরণগুলো আমাদের সম্ভাবনার অনুমানকে প্রভাবিত করে।
    one_liner: যা সহজে মনে আসে তা বেশি সম্ভাব্য বলে মনে হয়—এমনকি যখন তা নাও হয়।
    try_this:
      - প্রশ্ন করুন: ভিত্তি হার (base rate) কত? আমি কি প্রাণবন্ত বা সাম্প্রতিক উদাহরণগুলোকে অতিরিক্ত গুরুত্ব দিচ্ছি?
      - যখন আপনার মনে হয় "এটা খুব সাধারণ" বা "এটা খুব বিরল" তখন ডেটা খুঁজুন।
      - খেয়াল করুন যখন একটি নাটকীয় গল্প আপনার ঝুঁকির মূল্যায়নকে চালিত করছে।
    ask_yourself:
      - আমি কি প্রকৃত ফ্রিকোয়েন্সির পরিবর্তে মনে আসার সহজলভ্যতার ভিত্তিতে সম্ভাবনা বিচার করছি?
      - আমি কি এইমাত্র সেই খবরটি দেখলে ভিন্নভাবে চিন্তা করতাম?
    in_more_detail: |
      আমরা ফ্রিকোয়েন্সি এবং সম্ভাবনা অনুমান করার জন্য মানসিক শর্টকাট ব্যবহার করি। একটি শর্টকাট হলো সহজলভ্যতা: যা সহজে মনে আসে? বিমানের দুর্ঘটনা প্রাণবন্ত এবং ব্যাপকভাবে প্রচারিত—আমরা তাদের সম্ভাবনাকে বেশি করে অনুমান করি। গাড়ির দুর্ঘটনা সাধারণ কিন্তু কম লক্ষণীয়—আমরা কম অনুমান করি। সাম্প্রতিকতা, প্রাণবন্ততা এবং আবেগপূর্ণ প্রভাব সবই সহজলভ্যতা বাড়ায়।

      এই অনুমানটি তখন দরকারী হয় যখন সহজলভ্যতা প্রকৃত ফ্রিকোয়েন্সির সাথে সম্পর্কিত। কিন্তু মিডিয়া, ব্যক্তিগত অভিজ্ঞতা এবং লক্ষণীয়তা প্রায়শই এই সম্পর্ককে বিকৃত করে। আমরা বিরল কিন্তু প্রাণবন্ত ঝুঁকিকে ভয় পাই এবং সাধারণ কিন্তু সাধারণগুলোকে উপেক্ষা করি।
    why_this_is_important: |
      সহজলভ্যতা অনুমানকে চিনতে পারা আপনাকে সম্ভাবনার অনুমান সংশোধন করতে, প্রাণবন্ত খবরের প্রতি অতিরিক্ত প্রতিক্রিয়া এড়াতে এবং ঝুঁকির ভাল মূল্যায়ন করতে সহায়তা করে। এটি বিচারের অনেক পদ্ধতিগত ত্রুটি ব্যাখ্যা করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
      - বিনিয়োগ (investing)
      - সমস্যা_সমাধান (problem_solving)
    how_can_you_spot_it:
      vividness_dominance: |
        নাটকীয় বা আবেগপূর্ণ উদাহরণগুলো অনুমানকে অসমুপাতিকভাবে প্রভাবিত করে।
      recency_effect: |
        সাম্প্রতিক ঘটনাগুলো পুনরাবৃত্তির সম্ভাবনা বেশি বলে মনে হয়।
      personal_experience_overweighting: |
        "আমি এমন কাউকে চিনি যে..." সম্ভাবনার অনুমানকে আকার দেয়।
      media_distortion: |
        যা রিপোর্ট করা হয় তা প্রায়শই যা ফ্রিকোয়েন্ট তার সাথে মেলে না।
    examples:
      risk_perception: |
        সন্ত্রাসবাদের ঝুঁকিকে বেশি অনুমান করা (প্রাণবন্ত, রিপোর্ট করা) এবং হৃদরোগের ঝুঁকিকে কম অনুমান করা (সাধারণ, কম নাটকীয়)।
      investing: |
        সাম্প্রতিক বাজারের ঘটনা (পতন, বৃদ্ধি) ভবিষ্যতের প্রত্যাশাকে প্রভাবিত করে।
      hiring: |
        একটি নির্দিষ্ট স্কুল থেকে একজন খারাপ নিয়োগের একটি প্রাণবন্ত গল্প সেই স্কুল থেকে আসা সকল প্রার্থীর মূল্যায়নে প্রভাব ফেলে।
      health: |
        বন্ধুর ক্যান্সারের রোগ নির্ণয় ক্যান্সারকে ভিত্তি হারের চেয়ে বেশি সম্ভাব্য মনে করায়।
    real_world_implications: |
      সহজলভ্যতা অনুমান বীমা ক্রয়, নীতির অগ্রাধিকার এবং ব্যক্তিগত সিদ্ধান্তকে প্রভাবিত করে। এটি মিডিয়া এবং বিপণনকারীদের দ্বারা অপব্যবহারিত হয়। এটি সংশোধন করার জন্য ভিত্তি হার খোঁজা এবং "যা মনে আসে" তা প্রশ্ন করা প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        সচেতন থাকুন যে একজন ব্যক্তি বা গোষ্ঠীর সাথে একটি প্রাণবন্ত নেতিবাচক অভিজ্ঞতা আপনার বিচারকে বিকৃত করতে পারে। ভিত্তি হার এবং একাধিক ডেটা পয়েন্ট খুঁজুন।
      collaborative_learning_initiative: |
        ঝুঁকি বা সুযোগ মূল্যায়ন করার সময়, স্পষ্টভাবে জিজ্ঞাসা করুন "ভিত্তি হার কত?" এবং "আমি কি প্রাণবন্ত উদাহরণগুলোকে অতিরিক্ত গুরুত্ব দিচ্ছি?" সহজলভ্যতা-চালিত অনুমান সংশোধন করতে ডেটা ব্যবহার করুন।
    how_can_this_be_misapplied:
      dismissing_intuition: |
        কখনও কখনও সহজলভ্যতা তথ্যপূর্ণ হয়—সাম্প্রতিক অভিজ্ঞতা পরিবর্তনের সংকেত দিতে পারে। সব সহজলভ্যতা-চালিত বিচারকে ভুল মনে করবেন না।
      analysis_paralysis: |
        অতিরিক্ত সংশোধন করে প্রাণবন্ত অভিজ্ঞতা থেকে আসা বৈধ সতর্ক সংকেত উপেক্ষা করা।
      false_objectivity: |
        ভিত্তি হারকে সর্বদা সঠিক মনে করা যখন সেগুলি পুরানো বা প্রযোজ্য নাও হতে পারে।
      manipulation: |
        অন্যদের বিচারকে প্রভাবিত করার জন্য ইচ্ছাকৃতভাবে কিছু উদাহরণকে প্রাণবন্ত করে তোলা।
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof Phenomenon
    quick_introduction: |
      Baader-Meinhof phenomenon (also called frequency illusion) is when you learn
      about something new and then suddenly notice it everywhere. It feels like a coincidence,
      but it's often selective attention—your brain is primed to notice what it recently
      encountered.
    one_liner: You learn something new and suddenly see it everywhere—it was always there.
    try_this:
      - When something feels "everywhere" after you learned it, check the base rate.
      - Notice when recency is making something feel more significant than it is.
      - Ask: Am I seeing a real trend, or just noticing what I'm primed to notice?
    ask_yourself:
      - Is this actually more common now, or am I just noticing it more?
      - Would I have seen this pattern if I hadn't recently learned about it?
    in_more_detail: |
      After hearing about the Baader-Meinhof terrorist group, a person might see references
      to it in the news, in conversation, and in articles within days. The phenomenon has
      two components: selective attention (you notice what you're looking for) and
      confirmation bias (you remember the hits and forget the misses).

      The illusion is that the thing has suddenly become more common. In reality, it was
      always present; you simply weren't attuned to it. This can lead to overestimating
      the prevalence or importance of recently learned information.
    why_this_is_important: |
      Recognizing the Baader-Meinhof phenomenon helps you avoid overestimating how common
      or significant something is based on recent exposure. It also explains why new ideas,
      products, or trends can feel like they're "everywhere" after you first notice them.
    when_to_use:
      - decision_making
      - learning
      - risk_assessment
      - problem_solving
    how_can_you_spot_it:
      sudden_ubiquity: |
        You learn a new word, concept, or product and within days feel you're seeing it
        constantly.
      recency_bias: |
        Recent information feels more representative of reality than it actually is.
      pattern_seeking: |
        Your brain connects unrelated sightings into a narrative of "this is everywhere."
      forgetting_the_misses: |
        You don't track how often you don't see the thing—only the times you do.
    examples:
      vocabulary: |
        Learning the word "serendipity" and then noticing it in three different articles
        the same week.
      car_purchase: |
        After deciding to buy a certain car model, you see it on every street—though it
        was always there.
      health_anxiety: |
        Reading about a rare symptom and then noticing similar sensations in yourself,
        leading to unnecessary worry.
      trends: |
        Discovering a new app or trend and feeling it's suddenly dominating—when it may
        have a small user base.
    real_world_implications: |
      The phenomenon affects how we perceive trends, risks, and opportunities. Marketers
      and media can exploit it by creating repeated exposure. In decision-making, it can
      lead to overweighting recent information.
    professional_application:
      networking_and_relationship_building: |
        When someone mentions a topic repeatedly after learning it, recognize they may be
        experiencing frequency illusion—the topic isn't necessarily more relevant, just
        more salient to them.
      collaborative_learning_initiative: |
        In training, reinforce that "seeing it everywhere" after learning something new
        is normal; encourage checking base rates rather than trusting the feeling of
        ubiquity.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Assuming something is more common or important than it is because you've noticed
        it frequently lately.
      confirmation_bias_amplification: |
        Using the feeling of "seeing it everywhere" as evidence that a belief is correct.
      decision_distortion: |
        Making choices based on recently learned information that feels disproportionately
        significant.
      vulnerability_to_manipulation: |
        Advertisers and propagandists use repeated exposure to create the illusion of
        ubiquity and importance.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
      - availability_heuristic
  - id: barnum_effect
    name: বার্নাম প্রভাব
    quick_introduction: |
      বার্নাম প্রভাব (বা ফোরার প্রভাব) হল অস্পষ্ট, সাধারণ ব্যক্তিত্বের বর্ণনাগুলিকে
      অনন্যভাবে সঠিক বলে গ্রহণ করার প্রবণতা। রাশিফল, ভাগ্য গণনাকারী এবং ব্যক্তিত্ব পরীক্ষা
      এমন বিবৃতি ব্যবহার করে যা প্রায় প্রত্যেকের জন্যই প্রযোজ্য—কিন্তু আমরা বিশ্বাস করি
      যে সেগুলি আমাদের জন্য নির্দিষ্ট। আমরা নিজেদেরকে সাধারণের মধ্যে দেখতে পাই।
    one_liner: অস্পষ্ট বিবৃতিগুলি ব্যক্তিগত বলে মনে হয় কারণ সেগুলি প্রায় প্রত্যেকের জন্যই প্রযোজ্য।
    try_this:
      - Ask—Could this description apply to many people? Test it on someone else. (জিজ্ঞাসা করুন: এই বর্ণনা কি অনেক মানুষের জন্য প্রযোজ্য হতে পারে? অন্য কারো উপর এটি পরীক্ষা করুন।)
      - Seek specific, behavioral feedback instead of vague praise or criticism. (অস্পষ্ট প্রশংসা বা সমালোচনার পরিবর্তে নির্দিষ্ট, আচরণগত প্রতিক্রিয়া চান।)
      - Notice when personalized insights feel too good to be discriminating. (কখন ব্যক্তিগতকৃত অন্তর্দৃষ্টিগুলি খুব ভালো মনে হয় যাতে পার্থক্য করা না যায় তা লক্ষ্য করুন।)
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger? (এই প্রতিক্রিয়াটি কি একজন অপরিচিত ব্যক্তিকে দেওয়া হলে সঠিক বলে মনে হবে?)
      - Am I remembering the hits and forgetting the misses? (আমি কি সাফল্যগুলি মনে রাখছি এবং ব্যর্থতাগুলি ভুলে যাচ্ছি?)
    in_more_detail: |
      মনোবিজ্ঞানী বার্ট্রাম ফোরার ছাত্রদের অভিন্ন "ব্যক্তিগতকৃত" প্রতিক্রিয়া (যেমন,
      "অন্যরা আপনাকে পছন্দ করুক এবং প্রশংসা করুক এমন প্রয়োজন আপনার আছে") দিয়েছিলেন
      এবং তারা এটিকে অত্যন্ত সঠিক বলে রেট দিয়েছিল। বিবৃতিগুলি যথেষ্ট অস্পষ্ট ছিল
      যাতে যে কাউকে প্রযোজ্য হয়। পি.টি. বার্নাম কথিত আছে যে "প্রতি মিনিটে একজন বোকা
      জন্মায়"—তার সাধারণীকরণের মাধ্যমে ব্যক্তিগত বলে মনে হওয়া জনসাধারণের কাছে আবেদন করার
      দক্ষতার জন্য এই প্রভাবটির নামকরণ করা হয়েছে।

      প্রভাবটি কাজ করে কারণ আমরা অস্পষ্ট বিবৃতিগুলিতে ব্যক্তিগত প্রাসঙ্গিকতা খুঁজে বের করতে
      পারদর্শী। আমরা সাফল্যগুলি মনে রাখি এবং ব্যর্থতাগুলি ভুলে যাই।
      এটি কোল্ড রিডিং এবং অনেক "ব্যক্তিত্ব" পণ্যের ভিত্তি।
    why_this_is_important: |
      বার্নাম প্রভাবকে স্বীকৃতি দেওয়া আপনাকে ব্যক্তিত্বের মূল্যায়ন করতে,
      প্রতারণা প্রতিরোধ করতে এবং অস্পষ্ট প্রতিক্রিয়ার অতিরিক্ত ব্যাখ্যা এড়াতে সহায়তা করে।
      এটি ব্যাখ্যা করে কেন রাশিফল ​​সঠিক বলে মনে হয় এবং কেন কিছু "ব্যক্তিগতকৃত"
      পরামর্শ সাধারণ।
    when_to_use:
      - decision-making
      - learning
      - risk_assessment
      - relationship_building
    how_can_you_spot_it:
      vague_accuracy: |
        প্রতিক্রিয়া যা ব্যক্তিগত বলে মনে হয় কিন্তু অনেকের জন্য প্রযোজ্য হতে পারে।
      selective_fit: |
        আমরা যা খাপ খায় তার উপর মনোযোগ দিই এবং যা খাপ খায় না তা উপেক্ষা করি।
      cold_reading: |
        কেউ আপনাকে এমন বিবৃতি দিয়ে "পড়ে" যা আসলে সাধারণ।
      personality_test_enthusiasm: |
        অন্ধভাবে মূল্যায়ন ফলাফলগুলিকে অনন্যভাবে অন্তর্দৃষ্টিপূর্ণ হিসাবে গ্রহণ করা।
    examples:
      horoscopes: |
        "আপনি মাঝে মাঝে আপনার সিদ্ধান্ত নিয়ে সন্দেহ করেন" এটি ব্যক্তিগত বলে মনে হয়
        কিন্তু বেশিরভাগ মানুষের জন্য প্রযোজ্য।
      fortune_telling: |
        অস্পষ্ট ভবিষ্যদ্বাণী যা আমরা আমাদের পরিস্থিতির জন্য নির্দিষ্ট হিসাবে ব্যাখ্যা করি।
      personality_tests: |
        কিছু মূল্যায়ন বার্নাম বিবৃতি ব্যবহার করে এবং পার্থক্য না করেই সঠিক বলে
        মনে হয়।
      feedback: |
        সাধারণ কর্মক্ষমতা প্রতিক্রিয়া যা আমরা গভীরভাবে ব্যক্তিগত হিসাবে ব্যাখ্যা করি।
    real_world_implications: |
      বার্নাম প্রভাব জ্যোতিষশাস্ত্র, কিছু কোচিং এবং নিম্নমানের মূল্যায়নে
      শোষণ করা হয়। এটি অবৈধ সরঞ্জামগুলিতে মিথ্যা আত্মবিশ্বাস তৈরি করতে পারে।
      এটি ব্যাখ্যা করে কেন আমরা তোষামোদ এবং অস্পষ্ট ইতিবাচক প্রতিক্রিয়ার প্রতি সংবেদনশীল।
    professional_application:
      networking_and_relationship_building: |
        প্রতিক্রিয়া পাওয়ার সময়, জিজ্ঞাসা করুন "এটি কি অনেক মানুষের জন্য প্রযোজ্য হতে
        পারে?" অস্পষ্ট প্রশংসা বা সমালোচনার পরিবর্তে নির্দিষ্ট, আচরণগত প্রতিক্রিয়া চান।
        "ব্যক্তিগতকৃত" অন্তর্দৃষ্টি যা খুব ভালো মনে হয় সে সম্পর্কে সন্দেহপ্রবণ হন।
      collaborative_learning_initiative: |
        মূল্যায়ন ব্যবহার করার সময়, পার্থক্যমূলক বৈধতা সহ বৈধ সরঞ্জামগুলি
        চয়ন করুন। বার্নাম বিবৃতি নির্ভর সরঞ্জামগুলি এড়িয়ে চলুন। অস্পষ্ট প্রতিক্রিয়া
        চেনার জন্য লোকদের প্রশিক্ষণ দিন।
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        সব ব্যক্তিগত প্রতিক্রিয়া বার্নাম নয়—কিছু সত্যিই নির্দিষ্ট। সবকিছু অস্পষ্ট
        বলে উড়িয়ে দেবেন না।
      invalidating_experience: |
        কাউকে বলা যে তাদের অন্তর্দৃষ্টির অভিজ্ঞতা "শুধু বার্নাম" যখন এটি তাদের
        জন্য মূল্যবান হতে পারে।
      overcorrection: |
        সমস্ত ব্যক্তিত্বের কাঠামো প্রত্যাখ্যান করা কারণ কিছু বার্নাম বিবৃতি ব্যবহার
        করে।
      false_skepticism: |
        এই অনুমান করা যে যেহেতু কিছু সঠিক বলে মনে হয় তাই এটি অবশ্যই বার্নাম—কখনও
        কখনও জিনিসগুলি সঠিক হয়।
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: বেস রেট ফ্যালাসি
    quick_introduction: |
      বেস রেট ফ্যালাসি হল নির্দিষ্ট, প্রাণবন্ত তথ্যের (বেস রেট) পক্ষে সাধারণ পরিসংখ্যানগত তথ্য উপেক্ষা করার প্রবণতা। আমরা নির্দিষ্ট পরিস্থিতিকে বেশি গুরুত্ব দেই এবং পূর্বের সম্ভাবনাকে কম গুরুত্ব দেই। একটি একক শক্তিশালী গল্প সংখ্যার বক্তব্যকে ছাপিয়ে যেতে পারে।
    one_liner: একটি শক্তিশালী গল্প সংখ্যার বক্তব্যকে ছাপিয়ে যেতে পারে।
    try_this:
      - একটি কেস বিচার করার আগে জিজ্ঞাসা করুন: এই ধরণের পরিস্থিতির জন্য বেস রেট কী?
      - নির্দিষ্ট প্রমাণকে পূর্বের সম্ভাবনার সাথে একত্রিত করুন—কোনোটিকেই উপেক্ষা করবেন না।
      - লক্ষ্য করুন কখন একটি প্রাণবন্ত উদাহরণ পরিসংখ্যানকে ছাপিয়ে যাচ্ছে।
    ask_yourself:
      - আমি কি এই নির্দিষ্ট কেসটিকে বেশি গুরুত্ব দিচ্ছি এবং বেস রেটকে কম গুরুত্ব দিচ্ছি?
      - যদি আমি শক্তিশালী গল্পটিকে সরিয়ে রাখি, তবে সংখ্যাগুলি কী বলবে?
    in_more_detail: |
      যদি কোনও রোগ জনসংখ্যার ১% কে প্রভাবিত করে এবং একটি পরীক্ষার ৯৫% নির্ভুলতা থাকে, তবে একটি ইতিবাচক ফলাফল প্রায়শই বোঝায় যে ব্যক্তিটির এখনও সম্ভবত রোগটি নেই—কারণ বেস রেট খুব কম। কিন্তু আমরা বেস রেট উপেক্ষা করি এবং "তারা ইতিবাচক পরীক্ষা করেছে" এ ফোকাস করি। আমরা পরিসংখ্যানের চেয়ে নির্দিষ্ট বিষয় দ্বারা প্রভাবিত হই।

      এই ফ্যালাসি মেডিকেল ডায়াগনোসিস, নিয়োগ, ঝুঁকি মূল্যায়ন এবং আইনি বিচারকে প্রভাবিত করে। আমাদের বেস রেটগুলিকে কেস-নির্দিষ্ট প্রমাণের সাথে একত্রিত করতে হবে বায়েসিয়ান যুক্তির মাধ্যমে—কিন্তু আমরা প্রায়শই তা করি না।
    why_this_is_important: |
      বেস রেট ফ্যালাসির জন্য সঠিক মূল্যায়ন রোগ নির্ণয়, ঝুঁকি মূল্যায়ন এবং সিদ্ধান্ত গ্রহণের মান উন্নত করে। এটি আমাদের প্রাণবন্ত কেসগুলির প্রতি অতিরিক্ত প্রতিক্রিয়া এবং পরিসংখ্যানগত বাস্তবতার প্রতি কম প্রতিক্রিয়াশীল হওয়া থেকে রক্ষা করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - সমস্যা_সমাধান
      - বিনিয়োগ
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        বিচারগুলিতে পূর্বের সম্ভাবনা অন্তর্ভুক্ত করা হয় না।
      vividness_over_statistics: |
        একটি একক কেস বা গল্প সামগ্রিক ডেটার চেয়ে বেশি প্রাধান্য পায়।
      diagnostic_overweighting: |
        বেস রেট বিবেচনা না করে নতুন প্রমাণের (যেমন, পরীক্ষার ফলাফল) অতিরিক্ত ওজন দেওয়া।
      anecdote_override: |
        "আমি এমন কাউকে চিনি যিনি..." পরিসংখ্যানগত প্রমাণকে উপেক্ষা করে।
    examples:
      medical: |
        একটি বিরল রোগের জন্য একটি ইতিবাচক পরীক্ষা—বেস রেট কম, তাই একটি ইতিবাচক প্রায়শই একটি মিথ্যা ইতিবাচক। আমরা এটি উপেক্ষা করি এবং ধরে নিই তাদের রোগ আছে।
      hiring: |
        একজন প্রার্থীর একটি দুর্দান্ত সাক্ষাৎকার হয়েছে—আমরা সাক্ষাৎকারের ভিত্তিতে চাকরির পারফরম্যান্সের পূর্বাভাসের বেস রেট উপেক্ষা করি।
      risk: |
        একটি বিমান দুর্ঘটনা প্রাণবন্ত—আমরা উড়ানের ঝুঁকিকে বেশি এবং গাড়ি চালানোর ঝুঁকিকে কম অনুমান করি, বেস রেট উপেক্ষা করে।
      startup_investing: |
        একজন প্রতিষ্ঠাতা ভালভাবে পিচ করেন—আমরা উপেক্ষা করি যে বেশিরভাগ স্টার্টআপ পিচের মান নির্বিশেষে ব্যর্থ হয়।
    real_world_implications: |
      বেস রেট ফ্যালাসি চিকিৎসা সিদ্ধান্ত, আইনি বিচার এবং ব্যবসায়িক কৌশলকে প্রভাবিত করে। এটি সম্পদের অপব্যবহার এবং দুর্বল ঝুঁকি মূল্যায়নে অবদান রাখে। বায়েসিয়ান চিন্তাভাবনা এটি সংশোধন করে।
    professional_application:
      networking_and_relationship_building: |
        মানুষের মূল্যায়ন করার সময়, বেস রেট বিবেচনা করুন: যেমন, এই ধরণের আচরণ কত ঘন ঘন ঘটে? একটি প্রাণবন্ত মিথস্ক্রিয়াকে বৃহত্তর প্যাটার্নের চেয়ে বেশি গুরুত্ব দেবেন না।
      collaborative_learning_initiative: |
        সিদ্ধান্ত নেওয়ার সময়, কেস-নির্দিষ্ট প্রমাণ অন্তর্ভুক্ত করার আগে স্পষ্টভাবে বেস রেট উল্লেখ করুন এবং বিবেচনা করুন। দলগুলিকে বায়েসিয়ান যুক্তির প্রশিক্ষণ দিন।
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        বেস রেট ভিন্ন কিছু ইঙ্গিত দিলেও শক্তিশালী কেস-নির্দিষ্ট প্রমাণ উপেক্ষা করা—কখনও কখনও ব্যক্তি কেসটি ব্যতিক্রম।
      stereotyping: |
        ব্যক্তিদের সম্পর্কে অন্যায্য বিচার করার জন্য বেস রেট ব্যবহার করা।
      false_precision: |
        বেস রেটগুলি যখন মোটামুটি অনুমান হয় তখন মিথ্যা নির্ভুলতার সাথে প্রয়োগ করা।
      dismissing_individuals: |
        "পরিসংখ্যান বলছে এক্স" যখন আপনার সামনে থাকা ব্যক্তি বিতরণের সাথে মানানসই নাও হতে পারে।
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: বেইসের উপপাদ্য
    quick_introduction: |
      নতুন প্রমাণ পাওয়ার পর কোনো অনুমানের সম্ভাব্যতা কিভাবে পরিবর্তন করা যায়, বেইসের উপপাদ্য তা বর্ণনা করে। এটি এই ধারণাকে আনুষ্ঠানিক রূপ দেয় যে বিশ্বাসগুলো প্রমাণের সমর্থনের আনুপাতিক হারে পরিবর্তিত হওয়া উচিত—সব বা কিছুই নয়, বরং পর্যায়ক্রমে।
    one_liner: প্রমাণের সমর্থনের আনুপাতিক হারে বিশ্বাস আপডেট করুন।
    try_this:
      - আপনার পূর্বের বিশ্বাস দিয়ে শুরু করুন; আপনি ভুল হলে প্রমাণটি কতটা সম্ভাব্য হবে তা জিজ্ঞাসা করুন।
      - পর্যায়ক্রমে আপডেট করুন—একটি ডেটা পয়েন্টে ০% থেকে ১০০% পরিবর্তন করবেন না।
      - বিকল্প অনুমানগুলো বিবেচনা করুন: প্রমাণগুলো কি সেগুলোর সাথেও খাপ খাবে?
    ask_yourself:
      - এই প্রমাণটি আসলে সম্ভাব্যতাকে কতটা পরিবর্তন করে?
      - আমি কি আমার বিশ্বাস আপডেট করছি, নাকি কেবল যা ভেবেছিলাম তা নিশ্চিত করছি?
    in_more_detail: |
      উপপাদ্যটি বলে যে প্রমাণের সাপেক্ষে কোনো অনুমানের সম্ভাব্যতা হলো পূর্বের সম্ভাব্যতা গুণ প্রমাণের সম্ভাব্যতা (অনুমানের সাপেক্ষে), যা প্রমাণের সম্ভাব্যতা দ্বারা বিভক্ত। বাস্তবে: আপনার পূর্বের বিশ্বাস দিয়ে শুরু করুন, নতুন প্রমাণটি আপনার অনুমানের সাথে বনাম বিকল্পগুলোর সাথে কতটা সামঞ্জস্যপূর্ণ তা দেখুন এবং সেই অনুযায়ী আপডেট করুন।

      বেইসিয়ান চিন্তা নিশ্চিতকরণ পক্ষপাতের বিপরীতে কাজ করে কারণ এটি আপনাকে বিবেচনা করতে বাধ্য করে যে আপনি ভুল হলে প্রমাণটি কতটা সম্ভাব্য হবে। এটি সম্ভাব্য যুক্তির এবং বৈজ্ঞানিক আপডেটের ভিত্তি।
    why_this_is_important: |
      বেইসিয়ান চিন্তা অনিশ্চয়তার অধীনে সিদ্ধান্ত গ্রহণকে উন্নত করে, আপনাকে অতিরিক্ত আত্মবিশ্বাস এড়াতে সাহায্য করে এবং প্রমাণের ভিত্তিতে শেখার জন্য একটি কাঠামো সরবরাহ করে। এটি রোগ নির্ণয়, পূর্বাভাস এবং অনিশ্চয়তাযুক্ত যেকোনো ডোমেনের জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - ঝুঁকি_মূল্যায়ন
      - শিক্ষা
    how_can_you_spot_it:
      prior_and_update: |
        একটি বেসলাইন বিশ্বাস দিয়ে শুরু করে নতুন প্রমাণের ভিত্তিতে এটি সামঞ্জস্য করা।
      likelihood_ratio_thinking: |
        "আমি ঠিক হলে বনাম ভুল হলে এই প্রমাণটি কতটা সম্ভাব্য?" এই প্রশ্ন জিজ্ঞাসা করা।
      incremental_updating: |
        বিশ্বাসগুলো হঠাৎ করে পরিবর্তিত না হয়ে প্রমাণের সাথে ধীরে ধীরে পরিবর্তিত হয়।
      base_rate_respect: |
        পূর্বের সম্ভাব্যতা (বেস রেট) গুরুত্বপূর্ণ, কেবল সর্বশেষ ডেটা পয়েন্ট নয়।
    examples:
      medical_diagnosis: |
        একটি বিরল রোগের জন্য একটি ইতিবাচক পরীক্ষা—পূর্বের (নিম্ন প্রচলন) মানে একটি ইতিবাচক ফলাফল প্রায়শই একটি মিথ্যা ইতিবাচক। বেইস সম্ভাব্যতা আপডেট করে।
      forecasting: |
        প্রাথমিক অনুমানগুলিতে লেগে থাকার পরিবর্তে নতুন ডেটা আসার সাথে সাথে পূর্বাভাস আপডেট করা।
      hiring: |
        পদের জন্য বেস রেট দিয়ে শুরু করা, তারপর সাক্ষাৎকারের পারফরম্যান্সের ভিত্তিতে আপডেট করা।
      investing: |
        নতুন তথ্য (আয়, খবর) আসার সাথে সাথে একটি কোম্পানি সফল হওয়ার সম্ভাব্যতা আপডেট করা।
    real_world_implications: |
      বেইসিয়ান চিন্তা আধুনিক এআই, মেডিকেল রোগ নির্ণয় এবং বৈজ্ঞানিক অনুমানের ভিত্তি। এটি বেস রেট অবহেলা এবং নিশ্চিতকরণ পক্ষপাতের জন্য সংশোধন করে। অনিশ্চয়তাযুক্ত যেকোনো ডোমেনের জন্য এটি একটি শক্তিশালী হাতিয়ার।
    professional_application:
      networking_and_relationship_building: |
        স্থির প্রথম ধারণার উপর নির্ভর না করে নতুন প্রমাণের ভিত্তিতে মানুষের সম্পর্কে আপনার বিশ্বাস আপডেট করুন। ক্রিয়াগুলি ব্যাখ্যা করার সময় বেস রেট (যেমন, এই আচরণটি কতটা সাধারণ?) বিবেচনা করুন।
      collaborative_learning_initiative: |
        আলোচনার আগে দলগুলোকে স্পষ্টভাবে তাদের পূর্বের বিশ্বাস জানাতে উৎসাহিত করুন, তারপর প্রমাণ উপস্থাপনের সাথে সাথে আপডেট করুন। এটি অ্যাঙ্করিং এবং নিশ্চিতকরণ পক্ষপাতের প্রভাব হ্রাস করে।
    how_can_this_be_misapplied:
      overprecision: |
        উচ্চ অনিশ্চয়তার সময় সুনির্দিষ্ট সম্ভাব্যতা নির্ধারণ করা।
      prior_rigidity: |
        দৃঢ় পূর্বের বিশ্বাসে আটকে থাকা এবং নতুন প্রমাণের সাথে যথেষ্ট আপডেট না করা।
      base_rate_tyranny: |
        বেস রেট ভিন্ন কিছু নির্দেশ করলেও শক্তিশালী প্রমাণ উপেক্ষা করা—কখনও কখনও প্রমাণ প্রভাবশালী হওয়া উচিত।
      false_sophistication: |
        প্রকৃত যুক্তি ছাড়াই কঠোর বলে মনে করার জন্য বেইসিয়ান ভাষা ব্যবহার করা।
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: বেন ফ্র্যাঙ্কলিন এফেক্ট
    quick_introduction: |
      বেন ফ্র্যাঙ্কলিন এফেক্ট হলো একটি মনস্তাত্ত্বিক ঘটনা, যার মাধ্যমে লোকেরা নিজের জন্য একটি উপকার করার পর কাউকে বেশি পছন্দ করে। আমাদের পছন্দের লোকদের জন্য আমরা উপকার করি - এই সাধারণ ধারণার বিপরীতে, আমরা প্রায়শই এমন লোকেদের পছন্দ করতে শুরু করি যাদের জন্য আমরা উপকার করেছি।
    one_liner: যাদের জন্য আমরা উপকার করি তাদের আমরা পছন্দ করতে শুরু করি—আমাদের মনোভাব আমাদের কাজের দ্বারা চালিত হয়।
    try_this:
      - যদি আপনি কোনো সম্পর্ক উন্নত করতে চান, তবে একটি ছোট উপকার চাইতে পারেন।
      - যখন কারো জন্য একটি উপকার করা আপনার অনুভূতিগুলোকে পরিবর্তন করে তখন খেয়াল করুন।
      - সচেতন থাকুন যে অন্যরা আপনার সাহায্য করার পর আপনাকে বেশি পছন্দ করতে পারে।
    ask_yourself:
      - কারো জন্য একটি উপকার করা কি তাদের প্রতি আমার অনুভূতি পরিবর্তন করেছে?
      - আমি কি তাদের প্রতি আমার সম্মান বাড়িয়ে আমার প্রচেষ্টাকে যুক্তিসঙ্গত করছি?
    in_more_detail: |
      বেঞ্জামিন ফ্র্যাঙ্কলিন তার প্রতিদ্বন্দ্বী এক বিধায়কের কাছ থেকে তার লাইব্রেরি থেকে একটি বিরল বই ধার চেয়ে তাকে বশীভূত করার কথা বিখ্যাতভাবে বর্ণনা করেছিলেন। লোকটি রাজি হওয়ার পর, ফ্র্যাঙ্কলিন একটি ধন্যবাদ জ্ঞাপন পত্র সহ বইটি ফিরিয়ে দেন। সম্পর্কটি লক্ষণীয়ভাবে উন্নত হয়েছিল। এই প্রভাবটি প্রস্তাব করে যে আমাদের মনোভাব আমাদের কাজের দ্বারা চালিত হয়: যখন আমরা কাউকে সাহায্য করার জন্য প্রচেষ্টা বিনিয়োগ করি, তখন আমরা তাদের প্রতি আমাদের ইতিবাচক শ্রদ্ধা বাড়িয়ে সেই প্রচেষ্টাকে যুক্তিসঙ্গত করি।

      জ্ঞানীয় বিসংবাদ তত্ত্ব এটি ব্যাখ্যা করে: যখন আমরা এমন কাউকে উপকার করি যাকে আমরা অপছন্দ করি বা যার প্রতি আমরা নিরপেক্ষ, তখন আমরা আমাদের কাজ (সাহায্য করা) এবং আমাদের মনোভাব (অপছন্দ) এর মধ্যে উত্তেজনা অনুভব করি। তাদের বেশি পছন্দ করার মাধ্যমে সেই উত্তেজনা সমাধান করা প্রায়শই আমরা আমাদের পছন্দের বিরুদ্ধে কাজ করেছি তা স্বীকার করার চেয়ে সহজ।
    why_this_is_important: |
      বেন ফ্র্যাঙ্কলিন এফেক্ট বোঝা আপনাকে কৌশলগতভাবে সম্পর্ক তৈরি করতে এবং কখন আপনার নিজের অনুভূতিগুলি অতীতের উপকার দ্বারা প্রভাবিত হতে পারে তা চিনতে সাহায্য করে। এটি কেন একটি সম্পর্ক উন্নত করার চেষ্টা করার সময় প্রস্তাব দেওয়ার চেয়ে ছোট উপকার চাওয়া বেশি কার্যকর হতে পারে তাও ব্যাখ্যা করে।
    when_to_use:
      - সম্পর্ক_গড়ে_তোলা
      - আলোচনা
      - নেতৃত্ব
      - সংঘাত_সমাধান
    how_can_you_spot_it:
      liking_after_helping: |
        আপনি যখন কারো জন্য একটি উপকার করার পর তার প্রতি উষ্ণতা অনুভব করেন, এমনকি যদি আপনি পূর্বে নিরপেক্ষ বা নেতিবাচক অনুভব করতেন তখনও খেয়াল করুন।
      others_requesting_small_favors: |
        যখন কেউ বারবার ছোট ছোট উপকার চায়, তখন তারা সচেতনভাবে বা অচেতনভাবে সম্পর্ক উন্নত করার জন্য এই প্রভাবকে কাজে লাগাতে পারে।
      attitude_shift_post_investment: |
        কাউকে সাহায্য করার জন্য সময় বা প্রচেষ্টা বিনিয়োগ করার পর, তাদের সম্পর্কে আপনার মতামত ইতিবাচকভাবে পরিবর্তিত হয়েছে কিনা তা পর্যবেক্ষণ করুন।
      reciprocal_relationship_dynamics: |
        যে সম্পর্কগুলিতে একজন ব্যক্তি অনেক উপকার করেছে, সেখানে কাজের দিক থেকে ভারসাম্যপূর্ণ মনে হলেও স্নেহের দিক থেকে ভারসাম্যহীন মনে হতে পারে।
    examples:
      networking: |
        একজন সহকর্মীকে একটি খসড়ার উপর মতামত দেওয়ার জন্য জিজ্ঞাসা করা, যার ফলে তারা আপনার সাফল্যে আরও বেশি বিনিয়োগ অনুভব করে এবং আপনার প্রতি আরও ইতিবাচক মনোভাব পোষণ করে।
      sales: |
        একজন বিক্রয়কর্মী একজন সম্ভাব্য ক্রেতাকে একটি ছোট উপকার (যেমন, একটি সুপারিশ বা পরিচয়) জিজ্ঞাসা করে, যা সম্ভাব্য ক্রেতার প্রতিশ্রুতি এবং পছন্দ বাড়িয়ে দেয়।
      conflict_resolution: |
        একটি মতবিরোধের পর, অন্য পক্ষকে একটি সম্পর্কহীন বিষয়ে সাহায্য করার জন্য জিজ্ঞাসা করা উত্তেজনা নরম করতে এবং সদ্ভাব পুনরায় তৈরি করতে পারে।
      mentoring: |
        যখন একজন সিনিয়র ব্যক্তি একজন জুনিয়র ব্যক্তিকে ইনপুট বা সাহায্যের জন্য জিজ্ঞাসা করেন, তখন জুনিয়র ব্যক্তি প্রায়শই আরও মূল্যবান এবং সংযুক্ত বোধ করেন।
    real_world_implications: |
      বেন ফ্র্যাঙ্কলিন এফেক্ট নিয়োগ, বিক্রয়, কূটনীতি এবং দৈনন্দিন সামাজিক গতিশীলতাকে প্রভাবিত করে। এটি সম্পর্ক তৈরি করতে নৈতিকভাবে ব্যবহার করা যেতে পারে বা স্নেহকে নিয়ন্ত্রণ করতে অনৈতিকভাবে ব্যবহার করা যেতে পারে। এটি চিনতে পারা আপনাকে বুঝতে সাহায্য করে কেন কিছু সম্পর্ক অসম উপকার দেওয়ার পর শক্তিশালী মনে হয়।
    professional_application:
      networking_and_relationship_building: |
        সম্পর্ক তৈরি করার সময়, শুধুমাত্র উপকার দেওয়ার পরিবর্তে ছোট, যুক্তিসঙ্গত উপকার চাইতে বিবেচনা করুন। উপকার করার কাজটি বিনিয়োগ এবং ইতিবাচক মনোভাব তৈরি করে।
      collaborative_learning_initiative: |
        দলগুলিতে, সদস্যদের একে অপরকে সাহায্য করার (যেমন, পিয়ার রিভিউ, ক্রস-ট্রেনিং) মাধ্যমে বন্ধন শক্তিশালী করা যেতে পারে। এমনভাবে সহযোগিতা তৈরি করুন যাতে সবাই উপকার দেয় এবং গ্রহণ করে।
    how_can_this_be_misapplied:
      manipulation: |
        প্রকৃত প্রয়োজন ছাড়াই কেবল কাউকে আপনার প্রতি আকৃষ্ট করার জন্য ইচ্ছাকৃতভাবে উপকার চাওয়া, আবিষ্কৃত হলে শোষণমূলক মনে হতে পারে।
      overreliance_on_favors: |
        ধারণা করা যে কেবল উপকারগুলি একটি ভাঙা সম্পর্ক ঠিক করবে; কিছু সংঘাতের জন্য সরাসরি কথোপকথন এবং জবাবদিহিতা প্রয়োজন।
      asymmetric_exploitation: |
        প্রতিদান ছাড়াই বারবার উপকার চাওয়া বিরূপ ফল দিতে পারে এবং বিরক্তি তৈরি করতে পারে।
      misattributing_motives: |
        কারো উষ্ণতা সম্পূর্ণরূপে খাঁটি বলে ধরে নেওয়া যখন এটি আংশিকভাবে আপনার জন্য করা উপকারগুলির ফলাফল হতে পারে।
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: সীমিত যুক্তিবাদ
    quick_introduction: |
      সীমিত যুক্তিবাদ হল এই ধারণা যে মানুষের সিদ্ধান্ত গ্রহণ তথ্য, জ্ঞানীয় ক্ষমতা এবং সময়ের দ্বারা সীমাবদ্ধ। আমরা অপ্টিমাইজ করি না; আমরা "সন্তোষজনক" সিদ্ধান্ত নিই—আমরা সেরা সম্ভাব্য বিকল্পের পরিবর্তে যথেষ্ট ভাল বিকল্পগুলি বেছে নিই।
    one_liner: আমরা সন্তোষজনক সিদ্ধান্ত নিই—আমরা যথেষ্ট ভাল, সেরা নয়, এমনটি বেছে নিই।
    try_this:
      - সম্ভব হলে পছন্দগুলি সরল করুন; অতিরিক্ত বিকল্প সীমিত যুক্তিবাদকে অভিভূত করে।
      - অন্তহীন অনুসন্ধান এড়াতে আগে থেকেই "যথেষ্ট ভাল" মানদণ্ড নির্ধারণ করুন।
      - যখন আপনি প্রান্তিক উপযোগিতা হ্রাসের সীমা অতিক্রম করে অপ্টিমাইজ করছেন তা লক্ষ্য করুন।
    ask_yourself:
      - আমি কি নিখুঁত বিকল্প খোঁজার চেষ্টা করছি যখন যথেষ্ট ভালই যথেষ্ট হত?
      - কোন সীমাবদ্ধতাগুলি (সময়, তথ্য, মনোযোগ) আমার সিদ্ধান্তকে সীমিত করছে?
    in_more_detail: |
      হার্বার্ট সাইমন এই ধারণাটি উপস্থাপন করেছিলেন নিখুঁত তথ্য সহ যুক্তিবাদী অভিনেতাদের শাস্ত্রীয় অর্থনৈতিক ধারণাকে চ্যালেঞ্জ করার জন্য। বাস্তবে, আমাদের সীমিত মনোযোগ, কার্যক্ষম স্মৃতি এবং সময় রয়েছে। আমরা হিউরিস্টিকস এবং শর্টকাট ব্যবহার করে সিদ্ধান্ত নিই যা আমাদের সীমাবদ্ধতার জন্য "যুক্তিসঙ্গত", এমনকি যদি সেগুলি আদর্শ অর্থে সর্বোত্তম না হয়।

      সীমিত যুক্তিবাদ ব্যাখ্যা করে কেন আমরা সবসময় সেরা বিকল্পটি বেছে নিই না, কেন আমরা সাধারণ নিয়মগুলির উপর নির্ভর করি এবং কেন প্রসঙ্গ এবং উপস্থাপনা এত গুরুত্বপূর্ণ। এটি একটি বর্ণনামূলক মডেল যা আমরা আসলে কীভাবে সিদ্ধান্ত নিই তা বোঝায়, আমরা কীভাবে সিদ্ধান্ত নেওয়া উচিত তার একটি নির্দেশনা নয়।
    why_this_is_important: |
      সীমিত যুক্তিবাদ বোঝা আপনাকে আরও ভাল প্রক্রিয়া ডিজাইন করতে, অন্যদের জন্য পছন্দগুলি সহজ করতে এবং সিদ্ধান্ত মানের জন্য বাস্তবসম্মত প্রত্যাশা নির্ধারণ করতে সহায়তা করে। এটি ব্যাখ্যা করে কেন "অযৌক্তিক" আচরণ প্রায়শই সীমাবদ্ধতার অধীনে যুক্তিসঙ্গত।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - নেতৃত্ব
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      satisficing_behavior: |
        লোকেরা পুঙ্খানুপুঙ্খভাবে তুলনা করার পরিবর্তে প্রথম গ্রহণযোগ্য বিকল্পটি বেছে নেয়।
      heuristic_reliance: |
        সিদ্ধান্তগুলি সম্পূর্ণ বিশ্লেষণ না করে সাধারণ নিয়ম ব্যবহার করে নেওয়া হয়।
      context_dependence: |
        একই ব্যক্তি বিকল্পগুলি কীভাবে উপস্থাপন করা হয় তার উপর নির্ভর করে বিভিন্ন পছন্দ করে।
      information_overload: |
        যখন অতিরিক্ত তথ্য উপলব্ধ থাকে, তখন সিদ্ধান্ত গ্রহণের মান হ্রাস পেতে পারে।
    examples:
      hiring: |
        একজন ম্যানেজার "সেরা" প্রার্থীকে খুঁজে বের করার জন্য অনির্দিষ্টকাল সাক্ষাৎকার নেওয়ার পরিবর্তে যে প্রথম প্রার্থী যোগ্যতার মান পূরণ করে তাকে নিয়োগ করেন।
      consumer_choice: |
        ক্রেতারা দোকানের প্রতিটি পণ্য তুলনা করার পরিবর্তে তাকের প্রথম কয়েকটি বিকল্প থেকে বেছে নেয়।
      policy: |
        ভোটদাতারা প্রতিটি নীতি অবস্থান বিশ্লেষণ করার পরিবর্তে দলীয় আনুগত্য বা কয়েকটি মূল বিষয়কে শর্টকাট হিসেবে ব্যবহার করে।
      daily_routines: |
        লোকেরা প্রতিটি সিদ্ধান্ত পুনরায় অপ্টিমাইজ করার পরিবর্তে অভ্যাস এবং ডিফল্ট অনুসরণ করে।
    real_world_implications: |
      সীমিত যুক্তিবাদ বাজার, নীতি নকশা এবং সাংগঠনিক আচরণকে রূপ দেয়। আমলাতন্ত্র এবং পছন্দ স্থাপত্য কাজ করে কারণ তারা আমাদের সীমাগুলিকে বিবেচনা করে। এটি উপেক্ষা করলে অতিরিক্ত জটিল সিস্টেম তৈরি হয় যা মানুষ কার্যকরভাবে ব্যবহার করতে পারে না।
    professional_application:
      networking_and_relationship_building: |
        অন্যদের কাছ থেকে রিয়েল-টাইমে জটিল ট্রেড-অফ প্রক্রিয়া করার আশা করবেন না। পছন্দগুলি সরল করুন এবং স্পষ্ট ডিফল্ট প্রদান করুন।
      collaborative_learning_initiative: |
        সীমিত যুক্তিবাদ নিয়ে কাজ করে এমন প্রক্রিয়া ডিজাইন করুন: পছন্দগুলি হ্রাস করুন, ডিফল্ট প্রদান করুন এবং জটিল সিদ্ধান্তের জন্য চেকলিস্ট ব্যবহার করুন।
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        সীমাহীন জ্ঞানীয় ক্ষমতার অনুমান করে প্রক্রিয়া ডিজাইন করা, যা সিদ্ধান্ত ক্লান্তি এবং দুর্বল ফলাফলের দিকে পরিচালিত করে।
      blaming_irrationality: |
        অন্যদের সীমাবদ্ধতা বিবেচনা না করে তাদের পছন্দগুলিকে অযৌক্তিক বলে খারিজ করা।
      exploitation: |
        পছন্দসই ফলাফলের দিকে চালিত করার জন্য ইচ্ছাকৃতভাবে লোকেদের জটিলতার সাথে অভিভূত করা।
      perfectionism: |
        যখন সন্তোষজনক সিদ্ধান্ত প্রায়শই যুক্তিসঙ্গত পদ্ধতি, তখন সর্বোত্তম সিদ্ধান্তের আশা করা।
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Bystander Effect
    quick_introduction: |
      Bystander effect হল যখন আশেপাশে অন্য লোক উপস্থিত থাকে তখন কেউ সাহায্য করার সম্ভাবনা কম থাকে। যত বেশি দর্শক থাকবে, তত কম সম্ভাবনা কোনো একজন ব্যক্তি কাজ করবে। দায়িত্ব ভাগ হয়ে যায়; আমরা ধরে নিই অন্য কেউ সাহায্য করবে।
    one_liner: যত বেশি লোক উপস্থিত থাকবে, তত কম সম্ভাবনা কোনো একজন ব্যক্তি কাজ করবে।
    try_this:
      - In emergencies, assign responsibility directly. (জরুরী অবস্থায়, সরাসরি দায়িত্ব অর্পণ করুন: আপনি, ৯১১-এ কল করুন।)
      - Don't assume someone else will help—act or delegate explicitly. (অন্য কেউ সাহায্য করবে এমনটা ধরে নেবেন না—কাজ করুন বা স্পষ্টভাবে দায়িত্ব অর্পণ করুন।)
      - Notice when you're waiting for others to act first. (অন্যদের আগে কাজ করার জন্য অপেক্ষা করার সময় লক্ষ্য করুন।)
    ask_yourself:
      - Am I diffusing responsibility because others are present? (অন্যরা উপস্থিত থাকার কারণে কি আমি দায়িত্ব ছড়িয়ে দিচ্ছি?)
      - Would I act differently if I were alone? (আমি যদি একা থাকতাম তবে কি ভিন্নভাবে কাজ করতাম?)
    in_more_detail: |
      Kitty Genovese-এর হত্যার পরে (যদিও গল্পটি আংশিকভাবে পৌরাণিক ছিল), গবেষকরা খুঁজে পেয়েছেন যে অন্যদের উপস্থিতি সাহায্য কমিয়ে দেয়। আমরা সংকেতের জন্য অন্যদের দিকে তাকাই—যদি কেউ কাজ না করে, আমরা এটিকে "কোনো পদক্ষেপের প্রয়োজন নেই" হিসাবে ব্যাখ্যা করি। আমরা দায়িত্বের বিচ্ছুরণও অনুভব করি: অনেক লোক উপস্থিত থাকলে, প্রত্যেকে ব্যক্তিগতভাবে কম দায়িত্ব অনুভব করে। Pluralistic ignorance ঘটতে পারে: প্রত্যেকে মনে করে কিছু ভুল হচ্ছে কিন্তু কেউ কাজ করে না কারণ অন্য কেউ কাজ করছে না।

      এই প্রভাবটি সবচেয়ে শক্তিশালী হয় যখন পরিস্থিতি অস্পষ্ট থাকে এবং যখন দর্শক একে অপরকে চিনতে পারে না। এটি সরাসরি দায়িত্ব অর্পণের মাধ্যমে ( "আপনি, ৯১১-এ কল করুন") কাটিয়ে ওঠা যেতে পারে।
    why_this_is_important: |
      Bystander effect বোঝা আপনাকে সাহায্য করে যখন অন্যরা করে না তখন পদক্ষেপ নিতে এবং এটি কাটিয়ে উঠতে সাহায্য করার জন্য সিস্টেম ডিজাইন করতে। আপনি যদি সমস্যায় থাকেন, তবে একজন ব্যক্তিকে সুনির্দিষ্টভাবে চিহ্নিত করুন। যদি আপনি একজন দর্শক হন, তবে অন্যদের কাজ করার জন্য অপেক্ষা করবেন না।
    when_to_use:
      - leadership (নেতৃত্ব)
      - relationship_building (সম্পর্ক নির্মাণ)
      - conflict_resolution (দ্বন্দ্ব নিরসন)
      - decision-making (সিদ্ধান্ত গ্রহণ)
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "অন্য কেউ এটা করবে" যখন অনেকে উপস্থিত থাকে।
      pluralistic_ignorance: |
        প্রত্যেকে মনে করে পদক্ষেপ নেওয়া দরকার কিন্তু অন্য কেউ কাজ না করার কারণে কেউ কাজ করে না।
      social_proof_inaction: |
        অন্যদের নিষ্ক্রিয়তাকে "কোনো পদক্ষেপের প্রয়োজন নেই" হিসাবে ব্যাখ্যা করা হয়।
      audience_inhibition: |
        বোকা বা অতিরিক্ত প্রতিক্রিয়া দেখানোর ভয় কাজ করতে বাধা দেয়।
    examples:
      emergency: |
        একজন ব্যক্তি অজ্ঞান হয়ে পড়ে; অনেক দর্শক উপস্থিত থাকলে, সাহায্যের জন্য কল করার সম্ভাবনা কম থাকে।
      workplace: |
        প্রত্যেকে একটি সমস্যা দেখে কিন্তু কেউ তা উত্থাপন করে না—প্রত্যেকে ধরে নেয় অন্য কেউ করবে।
      harassment: |
        হয়রানির সাক্ষী থাকলেও তারা হস্তক্ষেপ করে না, প্রত্যেকে ভেবে অন্যেরা করবে।
      meetings: |
        একটি খারাপ ধারণা চ্যালেঞ্জ ছাড়াই চলে যায় কারণ প্রত্যেকে ধরে নেয় অন্য কেউ কথা বলবে।
    real_world_implications: |
      Bystander effect জরুরী পরিস্থিতিতে মর্মান্তিক পরিণতি ঘটাতে পারে এবং সংস্থাগুলিতে সমস্যাগুলি টিকে থাকতে দেয়। এটি কাটিয়ে উঠতে সরাসরি দায়িত্ব অর্পণ এবং হস্তক্ষেপকে উৎসাহিত করে এমন নিয়ম প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        যখন আপনার সাহায্যের প্রয়োজন হয়, একজন নির্দিষ্ট ব্যক্তিকে জিজ্ঞাসা করুন। যখন আপনি কিছু ভুল দেখেন, তখন কাজ করুন—অন্যরা করবে এমনটা ধরে নেবেন না। এমন নিয়ম তৈরি করুন যেখানে কথা বলা প্রত্যাশিত এবং পুরস্কৃত হয়।
      collaborative_learning_initiative: |
        মানুষকে bystander effect চিনতে এবং হস্তক্ষেপ করতে প্রশিক্ষণ দিন। "যদি আপনি কিছু দেখেন, তবে বলুন" ব্যবহার করুন এবং স্পষ্ট ভূমিকা অর্পণ করুন। যারা প্রথমে কথা বলে তাদের পুরস্কৃত করুন।
    how_can_this_be_misapplied:
      blaming_bystanders: |
        শক্তিশালী পরিস্থিতিগত শক্তির একটি প্রভাব থাকার সময় ব্যক্তিদের কঠোরভাবে বিচার করা—পরিস্থিতি পরিবর্তনের উপর মনোযোগ দিন।
      false_assumption: |
        ধরে নেওয়া যে যথেষ্ট লোক উপস্থিত থাকলে কেউ সবসময় সাহায্য করবে—প্রায়শই এর বিপরীত ঘটে।
      overcorrection: |
        প্রত্যেককে দায়িত্বশীল করা যাতে কেউ দায়িত্বশীল না হয়—দায়িত্বের বিচ্ছুরণ এখনও ঘটতে পারে।
      individualizing: |
        Bystander effect কে পরিস্থিতিগত ঘটনার পরিবর্তে একটি চরিত্রের ত্রুটি হিসাবে দেখা।
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: দক্ষতার পরিধি (Circle of Competence)
    quick_introduction: |
      দক্ষতার পরিধি একটি মানসিক মডেল যা আপনাকে আপনার দক্ষতার সীমা জানতে এবং গুরুত্বপূর্ণ সিদ্ধান্ত নেওয়ার সময় সেই সীমার মধ্যে থাকতে উৎসাহিত করে। ওয়ারেন বাফেট এবং চার্লি মাঙ্গার যা জানেন না তা জানার উপর জোর দেন।
    one_liner: আপনার দক্ষতার সীমা জানুন—এবং যখন এটি গুরুত্বপূর্ণ তখন তার মধ্যে থাকুন।
    try_this:
      - চিহ্নিত করুন কোথায় আপনার প্রকৃত দক্ষতা আছে বনাম কোথায় আপনি অনুমান করছেন।
      - আপনার পরিধির বাইরে থাকলে, পরামর্শ নিন বা অন্যকে দায়িত্ব দিন।
      - সৎ হন: এখানে কি একজন প্রকৃত বিশেষজ্ঞ আপনার রায়ের সাথে একমত হবেন?
    ask_yourself:
      - আমি কি আমার দক্ষতার পরিধির মধ্যে আছি, নাকি অনুমান করছি?
      - এই ক্ষেত্রে শেষ কখন আমি "আমি জানি না" বলেছি?
    in_more_detail: |
      প্রত্যেক ব্যক্তির কিছু নির্দিষ্ট ক্ষেত্র থাকে যেখানে তাদের প্রকৃত দক্ষতা রয়েছে—যেখানে তারা তথ্য মূল্যায়ন করতে পারে, ভুল ধরতে পারে এবং নির্ভরযোগ্য বিচার করতে পারে। সেই পরিধির বাইরে, তারা অন্যদের মতোই সাধারণ পক্ষপাত এবং ভুলের শিকার হয়। মূল বিষয় হলো সৎ আত্ম-মূল্যায়ন: আপনি কোথায় সত্যিই দক্ষ এবং কোথায় আপনি অনুমান করছেন?

      সচেতন শিক্ষার মাধ্যমে পরিধি প্রসারিত করা যেতে পারে, তবে এর বর্তমান সীমা স্বীকার করার জন্য নম্রতা প্রয়োজন। আপনার পরিধির বাইরে কাজ করলে ব্যয়বহুল ভুলের ঝুঁকি বাড়ে, বিশেষ করে যখন ঝুঁকি বেশি থাকে।
    why_this_is_important: |
      আপনার দক্ষতার পরিধির মধ্যে থাকা ব্যয়বহুল ভুল কমায় এবং সিদ্ধান্তের গুণমান উন্নত করে। এটি আপনাকে জানতেও সাহায্য করে কখন পরামর্শ চাইতে হবে, অন্যকে দায়িত্ব দিতে হবে বা বিরত থাকতে হবে। আপনার পরিধির বাইরের অতিরিক্ত আত্মবিশ্বাস ব্যর্থতার একটি প্রধান উৎস।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - বিনিয়োগ
      - কর্মজীবনের_পদক্ষেপ
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      honest_boundary_assessment: |
        আপনি কি কোনো ডোমেনে আপনার জ্ঞানের সীমা ব্যাখ্যা করতে পারেন? আপনি কি জানেন যে আপনি কী জানেন না?
      knowing_when_to_defer: |
        এমন পরিস্থিতি চিহ্নিত করা যেখানে আপনার একা সিদ্ধান্ত না নিয়ে বিশেষজ্ঞের ইনপুট নেওয়া উচিত।
      consistent_track_record: |
        আপনার পরিধির মধ্যে, আপনার বিচারগুলি সময়ের সাথে সাথে বৈধ হয়; বাইরে, তা হয় না।
      calibration: |
        একটি ডোমেনে আপনার আত্মবিশ্বাস সেই ডোমেনে আপনার প্রকৃত পারফরম্যান্সের সাথে মিলে যায়।
    examples:
      investing: |
        বাফেট টেক স্টকগুলি এড়িয়ে চলেন কারণ তিনি বলেন যে সেগুলি তার দক্ষতার পরিধির বাইরে—তিনি সেগুলি নির্ভরযোগ্যভাবে মূল্যায়ন করতে পারেন না।
      career: |
        একজন বিশেষজ্ঞ যিনি তার ডোমেনে থাকেন বনাম এমন একজন যিনি একটি সম্পর্কহীন ক্ষেত্রে "চাপযুক্ত" ভূমিকা নেন।
      hiring: |
        কখন আপনার নিজের বিচারের উপর নির্ভর করতে হবে বনাম প্রযুক্তিগত ভূমিকার জন্য বিশেষজ্ঞদের আনতে হবে তা জানা।
      advice_giving: |
        অনুমান করার পরিবর্তে আপনার দক্ষতার বাইরের বিষয়গুলিতে মতামত দিতে অস্বীকার করা।
    real_world_implications: |
      দক্ষতার পরিধি মূল্য বিনিয়োগ এবং পেশাদার সাফল্যের কেন্দ্রবিন্দু। এটি উপেক্ষা করলে অতিরিক্ত আত্মবিশ্বাস, ব্যর্থ উদ্যোগ এবং ভুল পরামর্শের জন্ম হয়। পরিধি প্রসারিত করার জন্য সচেতন প্রচেষ্টা এবং সৎ প্রতিক্রিয়ার প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        এমন লোকেদের সাথে সম্পর্ক তৈরি করুন যাদের দক্ষতার পরিধি আপনার পরিপূরক। কখন নিজে উত্তর দেওয়ার পরিবর্তে অন্যদের পরিচয় করিয়ে দিতে হবে তা জানুন।
      collaborative_learning_initiative: |
        ওভারল্যাপিং এবং পরিপূরক বৃত্ত সহ দল তৈরি করুন। যখন তারা তাদের দক্ষতার বাইরে কাজ করছে তখন ফ্ল্যাগ করার জন্য লোকদের উৎসাহিত করুন।
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        কখনো আপনার পরিধির বাইরে না যাওয়া বৃদ্ধি এবং শেখার সীমিত করতে পারে।
      false_modesty: |
        দায়বদ্ধতা বা কঠিন সিদ্ধান্ত এড়াতে একটি ক্ষুদ্র পরিধি দাবি করা।
      gatekeeping: |
        তাদের যুক্তিগুলির সাথে জড়িত না হয়ে অন্যদের খারিজ করার জন্য "দক্ষতার পরিধি" ব্যবহার করা।
      stagnation: |
        পরিধিকে স্থির হিসাবে বিবেচনা করা যা প্রচেষ্টার সাথে প্রসারিত হতে পারে তার পরিবর্তে।
    related_content:
      - dunning_kruger_effect
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: কগনিটিভ ডিসোন্যান্স (জ্ঞানীয় অসঙ্গতি)
    quick_introduction: |
      কগনিটিভ ডিসোন্যান্স হলো সেই মানসিক অস্বস্তি যা আমরা অনুভব করি যখন আমরা পরস্পরবিরোধী বিশ্বাস পোষণ করি, অথবা যখন আমাদের কাজ আমাদের বিশ্বাসের পরিপন্থী হয়। আমরা এই অস্বস্তি কমাতে অনুপ্রাণিত হই—প্রায়শই আমাদের কাজ পরিবর্তন করার চেয়ে আমাদের বিশ্বাসকে কাজের সাথে মেলানোর মাধ্যমে।
    one_liner: আমরা আমাদের কাজের সাথে বিশ্বাসকে মেলাতে যা করি, তার চেয়ে বিপরীতটি অনেক বেশিবার করি।
    try_this:
      - লক্ষ্য করুন কখন আপনি আচরণ পরিবর্তন না করে অস্বস্তি কমাতে যুক্তি দেখাচ্ছেন।
      - প্রশ্ন করুন: আমি যা করেছি তা ন্যায্যতা দেওয়ার জন্য কি আমি আমার বিশ্বাসকে সামঞ্জস্য করছি?
      - বিবেচনা করুন যে বিশ্বাস পরিবর্তনের চেয়ে কাজটি পরিবর্তন করা আরও সৎ হবে কিনা।
    ask_yourself:
      - আমি কি যুক্তি দেখিয়ে অসঙ্গতি কমাচ্ছি, নাকি আসলে পরিবর্তন করে?
      - যদি আমি ইতিমধ্যেই এমন কাজ না করতাম তবে কি আমি এই বিশ্বাসটি ধরে রাখতাম?
    in_more_detail: |
      লিওন ফেস্টিঙ্গারের তত্ত্ব ব্যাখ্যা করে যে আমরা সামঞ্জস্য (consistency) খুঁজি। যখন আমরা আমাদের মূল্যবোধের বিরুদ্ধে কাজ করি (যেমন, মিথ্যা বলা, টাকা নষ্ট করা), তখন আমরা ডিসোন্যান্স অনুভব করি। এটি কমাতে, আমরা আমাদের বিশ্বাস পরিবর্তন করতে পারি ("এটা আসলে মিথ্যা ছিল না") অথবা কাজটিকে নগণ্য করতে পারি ("এটা তেমন খারাপ ছিল না")। আমরা প্রায়শই সংশোধনের চেয়ে যুক্তি তৈরি করি।

      কগনিটিভ ডিসোন্যান্স বেন ফ্র্যাঙ্কলিন প্রভাব (আমরা যাদের সাহায্য করেছি তাদের পছন্দ করি) চালিত করে, ব্যাখ্যা করে কেন আমরা অতীতের সিদ্ধান্তগুলিকে ন্যায্যতা দিই এবং অনেক আত্ম-প্রতারণার মূলে রয়েছে। এটি বিশ্বাস গঠন এবং পরিবর্তনে একটি শক্তিশালী শক্তি।
    why_this_is_important: |
      কগনিটিভ ডিসোন্যান্স বোঝা আপনাকে আপনার নিজস্ব যুক্তিগুলি সনাক্ত করতে এবং কেন মানুষ তাদের মন পরিবর্তন করতে প্রতিরোধ করে তা বুঝতে সাহায্য করে। এটি ব্যাখ্যা করে কেন প্রতিশ্রুতি এবং সামঞ্জস্য (consistency) শক্তিশালী প্ররোচনা নীতি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সম্পর্ক_গড়ে_তোলা
      - নেতৃত্ব
      - সংঘাত_সমাধান
    how_can_you_spot_it:
      post_decision_rationalization: |
        একটি সিদ্ধান্ত নেওয়ার পরে, আমরা আমাদের পছন্দের ইতিবাচক দিকগুলি এবং বাতিল করা বিকল্পগুলির নেতিবাচক দিকগুলি তুলে ধরি।
      belief_action_alignment: |
        আমরা ইতিমধ্যেই যে কাজগুলি করেছি সেগুলির সাথে আমাদের বিশ্বাসগুলিকে সামঞ্জস্য করি।
      discomfort_with_inconsistency: |
        যখন আমরা লক্ষ্য করি যে আমাদের আচরণ আমাদের ঘোষিত মূল্যবোধের সাথে মেলে না তখন অস্বস্তি।
      resistance_to_disconfirming_evidence: |
        তথ্য খারিজ করা বা নগণ্য করা যা আমাদের প্রতিশ্রুতির সাথে সাংঘর্ষিক।
    examples:
      purchase_justification: |
        একটি ব্যয়বহুল জিনিস কেনার পরে, আমরা এর সুবিধাগুলি তুলে ধরি এবং খরচটিকে কমিয়ে দেখি।
      relationship: |
        আমরা ভাল দিকগুলিতে মনোনিবেশ করে এবং খারাপ দিকগুলিকে কমিয়ে একটি খারাপ সম্পর্কে থাকার অজুহাত তৈরি করি।
      career: |
        আমরা কারণগুলি তুলে ধরে একটি অপছন্দের চাকরিতে থাকার ন্যায্যতা দিই যে কেন আমাদের "থাকতে হবে"।
      beliefs: |
        যখন আমাদের কাজগুলি আমাদের মূল্যবোধের পরিপন্থী হয়, তখন আমরা আমাদের কাজগুলি পরিবর্তন করার পরিবর্তে আমাদের মূল্যবোধ পরিবর্তন করি ("আমি আসলে নিরামিষাশী নই—আমি মাঝে মাঝে শুধু মাংস খাই")।
    real_world_implications: |
      কগনিটিভ ডিসোন্যান্স বিশ্বাস গঠন, ভোক্তা আচরণ এবং রাজনৈতিক মনোভাবকে রূপ দেয়। এটি ব্যাখ্যা করে কেন মানুষ খারাপ সিদ্ধান্তের পরে আরও বেশি করে একই ভুল করে এবং কেন আচরণ পরিবর্তন করলে বিশ্বাস পরিবর্তন হতে পারে।
    professional_application:
      networking_and_relationship_building: |
        ছোট প্রতিশ্রুতিগুলি বড় প্রতিশ্রুতিগুলির দিকে নিয়ে যেতে পারে—মানুষ তাদের অতীতের কাজগুলিকে ন্যায্যতা দেয়। এটি নৈতিকভাবে ব্যবহার করুন: ছোট জিজ্ঞাসা দিয়ে শুরু করুন। আপনি যখন আপনার নিজের আচরণের অজুহাত দিচ্ছেন তখন সচেতন থাকুন।
      collaborative_learning_initiative: |
        পরিবর্তন প্রবর্তনের সময়, প্রাথমিক সম্মতি এবং ছোট প্রতিশ্রুতি পান—এগুলি ডিসোন্যান্স তৈরি করে যা বৃহত্তর গ্রহণকে অনুপ্রাণিত করে। অসন্তোষ সৃষ্টি করে এমন পাবলিক প্রতিশ্রুতি জোর করা এড়িয়ে চলুন।
    how_can_this_be_misapplied:
      manipulation: |
        সম্মতি আদায়ের জন্য ইচ্ছাকৃতভাবে ডিসোন্যান্স তৈরি করা।
      dismissing_genuine_change: |
        যখন মানুষ কখনও কখনও সত্যই আপডেট করে তখন সমস্ত বিশ্বাস পরিবর্তনকে যুক্তি হিসাবে খারিজ করা।
      forced_consistency: |
        যখন মানুষের মতামত বৈধভাবে বিকশিত হয়েছে তখন তাদের "সামঞ্জস্যপূর্ণ" হতে চাপ দেওয়া।
      self_deception: |
        আমাদের সম্পর্কে অস্বস্তিকর সত্য এড়াতে অজুহাত দেওয়ার জন্য ডিসোন্যান্স তত্ত্ব ব্যবহার করা।
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: নিশ্চিতকরণ পক্ষপাতের (Confirmation Bias)
    quick_introduction: |
      নিশ্চিতকরণ পক্ষপাতের হলো সেই প্রবণতা যেখানে আমরা আমাদের বিদ্যমান বিশ্বাসকে নিশ্চিত করার জন্য তথ্য খুঁজি, ব্যাখ্যা করি এবং মনে রাখি। আমরা সহায়ক প্রমাণকে বেশি গুরুত্ব দিই এবং আমাদের মতামতের বিরোধী প্রমাণগুলিকে উপেক্ষা করি বা বাতিল করি। আমরা আমাদের অনুমানের পরীক্ষা করার চেয়ে নিশ্চিত করার জন্য প্রশ্ন জিজ্ঞাসা করি।
    one_liner: আমরা আমাদের বিশ্বাসকে নিশ্চিত করে এমন জিনিস খুঁজি এবং মনে রাখি; যা আমাদের বিশ্বাসকে বিরোধিতা করে তা আমরা উপেক্ষা করি।
    try_this:
      - জিজ্ঞাসা করুন: কী আমাকে ভুল প্রমাণ করবে? সক্রিয়ভাবে অমূলক প্রমাণ খুঁজুন।
      - লক্ষ্য করুন কখন আপনি সহায়ক তথ্যের চেয়ে বিরোধী তথ্যকে বেশি গুরুত্ব দিচ্ছেন।
      - নিজের মতামতের মতোই অন্য মতকেও গুরুত্ব সহকারে বিবেচনা করুন।
    ask_yourself:
      - আমি কি আমার অনুমান পরীক্ষা করছি নাকি শুধু নিশ্চিত করছি?
      - নতুন প্রমাণের ভিত্তিতে আমি শেষ কবে আমার মন পরিবর্তন করেছি?
    in_more_detail: |
      আমরা তথ্যের নিরপেক্ষ প্রক্রিয়াকরণকারী নই। আমরা নিশ্চিতকরণ খুঁজি, অস্পষ্টতাকে সমর্থন হিসেবে ব্যাখ্যা করি এবং মিসগুলির চেয়ে হিটগুলি বেশি মনে রাখি। আমরা সমমনা মানুষ এবং মিডিয়ার সাথে নিজেদের ঘিরে রাখি। আমরা "কেন আমি সঠিক?" জিজ্ঞাসা করি, "কী আমাকে ভুল প্রমাণ করবে?" জিজ্ঞাসা করার পরিবর্তে। এটি আমাদের অতি-আত্মবিশ্বাসী এবং আপডেট হতে ধীর করে তোলে।

      নিশ্চিতকরণ পক্ষপাতের সবচেয়ে ব্যাপক এবং সু-নথিভুক্ত পক্ষপাতের মধ্যে একটি।
      এটি বিজ্ঞান, রাজনীতি, সম্পর্ক এবং ব্যবসাকে প্রভাবিত করে। এটি কাটিয়ে ওঠার জন্য
      সচেতন প্রচেষ্টা এবং কাঠামোগত প্রক্রিয়ার প্রয়োজন।
    why_this_is_important: |
      সঠিক সিদ্ধান্ত গ্রহণ এবং শেখার জন্য নিশ্চিতকরণ পক্ষপাতের চেনা অপরিহার্য।
      এটি আপনাকে অমূলক প্রমাণ খুঁজতে, বিকল্প অনুমান বিবেচনা করতে এবং
      প্রয়োজন অনুযায়ী আপনার বিশ্বাস আপডেট করতে সাহায্য করে। এটি বৈজ্ঞানিক চিন্তাভাবনার ভিত্তি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - শেখা
      - সমস্যা_সমাধান
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      seeking_support: |
        আপনার মতামতের পরীক্ষা করার চেয়ে নিশ্চিত করার জন্য প্রমাণ খোঁজা।
      asymmetric_interpretation: |
        অস্পষ্ট প্রমাণকে আপনার অবস্থানের সমর্থনে ব্যাখ্যা করা।
      discounting_disconfirming: |
        আপনার বিশ্বাসের বিরোধী প্রমাণকে বাতিল করা বা কম গুরুত্ব দেওয়া।
      selective_exposure: |
        শুধুমাত্র আপনার সাথে একমত উত্স থেকে তথ্য গ্রহণ করা।
    examples:
      hiring: |
        প্রথমে একটি ইতিবাচক ধারণা তৈরি করা এবং তারপর এমন প্রশ্ন জিজ্ঞাসা করা যা
        প্রার্থীকে দুর্দান্ত হিসাবে নিশ্চিত করে।
      investing: |
        একটি স্টক কেনার পর, ইতিবাচক খবর খোঁজা এবং নেতিবাচক
        বিশ্লেষণ উপেক্ষা করা।
      relationships: |
        সঙ্গীর ক্রিয়াগুলিকে এমনভাবে ব্যাখ্যা করা যা তাদের সম্পর্কে আপনার
        ধারণাকে নিশ্চিত করে (ভালো বা খারাপ)।
      politics: |
        আপনার পক্ষের তথ্য নির্বিচারে গ্রহণ করা এবং অন্য পক্ষের সমতুল্য তথ্য
        প্রত্যাখ্যান করা।
    real_world_implications: |
      নিশ্চিতকরণ পক্ষপাতের মিথ্যা বিশ্বাসকে টিকিয়ে রাখে, মেরুকরণকে বাড়িয়ে তোলে এবং
      ব্যয়বহুল ভুলের কারণ হয়। এটি ভালো বিজ্ঞান এবং ভালো
      সিদ্ধান্ত গ্রহণের শত্রু। এটি কাটিয়ে ওঠার জন্য সচেতন অমূলক প্রমাণ
      খোঁজা প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        মানুষ সম্পর্কে ধারণা তৈরি করার সময়, সক্রিয়ভাবে অমূলক প্রমাণ খুঁজুন।
        জিজ্ঞাসা করুন "কী আমার মন পরিবর্তন করবে?" এবং সেটি খুঁজুন।
      collaborative_learning_initiative: |
        অমূলক দৃষ্টিভঙ্গি বের করতে শয়তানের উকিল, রেড টিম এবং প্রি-মর্টেম ব্যবহার করুন।
        ভালো প্রমাণ দিয়ে প্রচলিত মতকে চ্যালেঞ্জকারীদের পুরস্কৃত করুন।
    how_can_this_be_misapplied:
      false_balance: |
        যখন প্রমাণ একটি পক্ষকে দৃঢ়ভাবে সমর্থন করে তখন সমস্ত মতকে সমানভাবে বৈধ বলে মনে করা।
      excessive_skepticism: |
        যখন কিছু বিশ্বাস সু-সমর্থিত হয় তখন সমস্ত প্রমাণকে "নিশ্চিতকরণ পক্ষপাতের" বলে বাতিল করা।
      contrarianism: |
        নিশ্চিতকরণ পক্ষপাতের এড়াতে কেবল বিপরীত মতামত গ্রহণ করা—যখন
        মূল মতামত সঠিক হতে পারে।
      analysis_paralysis: |
        "আমরা পক্ষপাতের শিকার হতে পারি" ভেবে কখনও কোনো মতামতে স্থির না হওয়া।
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: জ্ঞানের অভিশাপ
    quick_introduction: |
      জ্ঞানের অভিশাপ হল কোনো কিছু জানার পর সেটা না জানার অনুভূতি কল্পনা করার অসুবিধা। বিশেষজ্ঞরা নতুনদের শেখাতে সংগ্রাম করেন কারণ তারা নতুনদের দৃষ্টিকোণ তৈরি করতে পারেন না। একবার জেনে গেলে, আপনি ভুলে যান যে না জানার অনুভূতি কেমন ছিল।
    one_liner: একবার কিছু জানলে, আপনি ভুলে যান যে না জানার অনুভূতি কেমন ছিল।
    try_this:
      - ব্যাখ্যা করার সময়, প্রথম নীতিগুলি থেকে শুরু করুন - ধরে নিন আপনার শ্রোতারা কিছুই জানেন না।
      - একজন নতুনকে ব্যাখ্যা করতে বলুন; তাদের বিভ্রান্তি আপনার অন্ধ দাগগুলি প্রকাশ করে।
      - খেয়াল করুন যখন আপনি ধাপগুলি এড়িয়ে যাচ্ছেন বা এমন জার্গন ব্যবহার করছেন যা অন্যেরা নাও জানতে পারে।
    ask_yourself:
      - আমি কি ধরে নিচ্ছি অন্যদের আমার মতো একই প্রেক্ষাপট আছে?
      - আমার পটভূমি ছাড়া কেউ কি এটি বুঝবে?
    in_more_detail: |
      একটি ক্লাসিক পরীক্ষায়, যারা একটি ধাঁধার উত্তর জানত তারা একটি গানের ছন্দ ট্যাপ করেছিল এবং অন্যদের অনুমান করার আশা করেছিল - তারা অতিমাত্রায় অনুমান করেছিল যে এটি কতটা স্পষ্ট ছিল। ট্যাপকারীরা তাদের মাথায় গানটি "আনহিয়ার" করতে পারেনি।
      জ্ঞান "আঠালো"; অজ্ঞতা অনুকরণ করা কঠিন।

      অভিশাপ শেখানো, যোগাযোগ, পণ্য নকশা এবং নেতৃত্বকে প্রভাবিত করে।
      আমরা ধরে নিই অন্যদের একই প্রেক্ষাপট আছে। আমরা জার্গন ব্যবহার করি। আমরা ধাপ এড়িয়ে যাই। মানুষ যখন "বোঝে না" তখন আমরা অবাক হই।
    why_this_is_important: |
      জ্ঞানের অভিশাপকে স্বীকৃতি দেওয়া শিক্ষা, যোগাযোগ এবং পণ্য নকশাকে উন্নত করে। এটি আপনাকে যেখানে আপনি সেখানে না পৌঁছে, লোকেদের যেখানে আছে সেখানে দেখা করতে সহায়তা করে। এটি কার্যকর জ্ঞান স্থানান্তরের জন্য অপরিহার্য।
    when_to_use:
      - শিখন
      - নেতৃত্ব
      - সমস্যা_সমাধান
      - সম্পর্ক_নির্মাণ
    how_can_you_spot_it:
      obvious_to_you: |
        "এটা স্পষ্ট" যখন এটি কেবল স্পষ্ট কারণ আপনি উত্তরটি জানেন।
      jargon_use: |
        সংজ্ঞায়িত না করে শ্রোতারা জানেন না এমন শব্দ ব্যবহার করা।
      skipped_steps: |
        ধরে নেওয়া যে অন্যরা আপনি যা ছেড়ে দিয়েছেন তা পূরণ করবে।
      frustration_with_learners: |
        "তারা কেন এটা দেখতে পাচ্ছে না?" যখন তাদের আপনার প্রেক্ষাপট নেই।
    examples:
      teaching: |
        একজন গণিত অধ্যাপক এমন ধাপগুলি এড়িয়ে যান যা তাদের কাছে "স্পষ্ট" কিন্তু
        ছাত্রদের জন্য অপরিহার্য।
      product_design: |
        ডিজাইনাররা এমন ইন্টারফেস তৈরি করেন যা তাদের কাছে বোধগম্য কিন্তু
        নতুন ব্যবহারকারীদের বিভ্রান্ত করে।
      onboarding: |
        অভিজ্ঞ কর্মচারীরা ভুলে যায় যে নতুন নিয়োগকারীরা কী জানে না এবং
        অপর্যাপ্ত প্রশিক্ষণ প্রদান করে।
      writing: |
        লেখকরা অনুমান করেন যে পাঠকদের একই পটভূমি রয়েছে এবং
        প্রয়োজনীয় প্রেক্ষাপট মিস করেন।
    real_world_implications: |
      জ্ঞানের অভিশাপ যোগাযোগ ব্যবধান, ব্যর্থ পণ্য এবং অকার্যকর শিক্ষা তৈরি করে। বিশেষজ্ঞরা কেন খারাপ শিক্ষক হতে পারেন তার এটি একটি কারণ। এটিকে অতিক্রম করার জন্য শ্রোতাদের দৃষ্টিকোণ গ্রহণ করার জন্য ইচ্ছাকৃত প্রচেষ্টা প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        ব্যাখ্যা করার সময়, অন্য ব্যক্তির স্তর থেকে শুরু করুন। জিজ্ঞাসা করুন "তাদের
        ইতিমধ্যে কী জানা আছে?" আপনার পটভূমি নেই এমন কারো সাথে আপনার যোগাযোগ পরীক্ষা করুন।
      collaborative_learning_initiative: |
        "আমাকে পাঁচ বছরের বাচ্চার মতো ব্যাখ্যা করুন" অনুশীলন ব্যবহার করুন। বিশেষজ্ঞদের
        নতুনদের শেখান এবং প্রতিক্রিয়া পান। এমন ডকুমেন্টেশন তৈরি করুন যা কোনো পূর্ব জ্ঞানের
        প্রয়োজন নেই। সহকর্মী শিক্ষা ব্যবহার করুন - যারা সম্প্রতি শিখেছে তারা নতুনদের দৃষ্টিকোণ মনে রাখে।
    how_can_this_be_misapplied:
      oversimplification: |
        অসততা বা অবজ্ঞার পর্যায়ে সরলীকরণ করা।
      false_assumption: |
        ধরে নেওয়া যে অন্যরা তাদের চেয়ে কম জানে - এটিও একটি ক্রমাঙ্কন ব্যর্থতা।
      one_size_fits_all: |
        সমস্ত শ্রোতাদের একই স্তরের ব্যাখ্যার প্রয়োজন হয় না; শ্রোতার সাথে মানানসই করুন।
      avoiding_complexity: |
        কিছু বিষয় জটিল; জ্ঞানের অভিশাপ মানে এই নয় যে আমরা কখনও প্রযুক্তিগত ভাষা ব্যবহার করব না যখন এটি উপযুক্ত।
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: ডিফল্ট এফেক্ট
    quick_introduction: |
      ডিফল্ট এফেক্ট হল পছন্দের তালিকা দেখলে পূর্ব-নির্বাচিত বিকল্পটি বেছে নেওয়ার প্রবণতা। যা ডিফল্ট হিসাবে সেট করা হয় তার একটি শক্তিশালী সুবিধা থাকে—লোকেরা প্রায়শই এটিতে লেগে থাকে, তারা এর জন্য সেরা হোক বা না হোক।
    one_liner: যা ডিফল্ট হিসাবে সেট করা হয় তার একটি শক্তিশালী সুবিধা থাকে—আমরা তাতে লেগে থাকি।
    try_this:
      - বিকল্পগুলি মূল্যায়ন না করেই আপনি ডিফল্ট গ্রহণ করছেন কিনা তা লক্ষ্য করুন।
      - পছন্দ ডিজাইন করার সময়, ব্যবহারকারীদের সর্বোত্তম স্বার্থে ডিফল্ট সেট করুন।
      - জিজ্ঞাসা করুন: এটি পূর্ব-নির্বাচিত না হলে আমি কি এটি বেছে নিতাম?
    ask_yourself:
      - আমি কি জড়তার কারণে ডিফল্ট বেছে নিচ্ছি, নাকি এটি আমার জন্য সেরা বলে?
      - এই ডিফল্ট কে সেট করেছে, এবং এর থেকে তারা কী লাভ করতে পারে?
    in_more_detail: |
      জড়তা, ক্ষতি এড়ানো (পরিবর্তন করলে ডিফল্ট হারানোর মতো মনে হয়) এবং অন্তর্নিহিত সমর্থন (আমরা ধরে নিই ডিফল্ট সুপারিশ করা হয়) এর কারণে ডিফল্ট কাজ করে।
      অর্গান ডোনেশনের হার দেশভেদে নাটকীয়ভাবে পরিবর্তিত হয়, মূলত ডিফল্টটি অপ্ট-ইন বা অপ্ট-আউট কিনা তার উপর নির্ভর করে।
      স্বয়ংক্রিয়ভাবে নথিভুক্ত হলে অবসর সঞ্চয় অংশগ্রহণ বৃদ্ধি পায়।

      ডিফল্টগুলি ভালোর জন্য (উন্নত ফলাফলের দিকে ঠেলে দেওয়া) বা ম্যানিপুলেশনের জন্য (অবাঞ্ছিত শর্তাবলী পূর্ব-পরীক্ষিত বাক্সে লুকিয়ে রাখা) ব্যবহার করা যেতে পারে।
      প্রভাব বোঝা আপনাকে আরও ভাল সিস্টেম ডিজাইন করতে এবং অবাঞ্ছিত ডিফল্ট প্রতিরোধ করতে সহায়তা করে।
    why_this_is_important: |
      ডিফল্ট এফেক্ট বোঝা আপনাকে এমন পছন্দ কাঠামো ডিজাইন করতে সহায়তা করে যা ফলাফল উন্নত করে, এবং এটি আপনাকে চিনতে সাহায্য করে যখন আপনার পছন্দগুলি ডিফল্ট দ্বারা আকারপ্রাপ্ত হচ্ছে, ইচ্ছাকৃত পছন্দের চেয়ে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - নেতৃত্ব
      - সমস্যা_সমাধান
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      inertia_toward_default: |
        বেশিরভাগ লোক যা পূর্ব-নির্বাচিত আছে তাতেই লেগে থাকে।
      implied_recommendation: |
        আমরা ডিফল্টকে "তারা যা আমাদের বেছে নিতে চায়" হিসাবে ব্যাখ্যা করি।
      opt_in_vs_opt_out: |
        ফ্রেম করা অংশগ্রহণকে নাটকীয়ভাবে পরিবর্তন করে (অপট-ইন বনাম অপট-আউট)।
      pre_checked_boxes: |
        ফর্ম এবং সেটিংসে পূর্ব-নির্বাচিত বিকল্পগুলির একটি শক্তিশালী সুবিধা রয়েছে।
    examples:
      organ_donation: |
        অপট-আউট দেশগুলিতে অপট-ইন দেশগুলির তুলনায় অনেক বেশি ডোনেশনের হার রয়েছে—ডিফল্ট মনোভাবের চেয়ে বেশি গুরুত্বপূর্ণ।
      retirement_savings: |
        স্বয়ংক্রিয় নথিভুক্তি 401(k) অংশগ্রহণকে নাটকীয়ভাবে বৃদ্ধি করে।
      software_installers: |
        "সুপারিশকৃত" বিকল্প এবং পূর্ব-পরীক্ষিত অ্যাড-অনগুলি ব্যবহারকারীরা কী ইনস্টল করে তা আকার দেয়।
      subscriptions: |
        পেইড এনরোলমেন্টে ডিফল্ট হওয়া ফ্রি ট্রায়ালগুলি অনেকেই গ্রহণ করে যারা সক্রিয়ভাবে সাবস্ক্রাইব করতে চান না।
    real_world_implications: |
      ডিফল্ট এফেক্ট সবচেয়ে শক্তিশালী চালিকা শক্তিগুলির মধ্যে একটি। এটি সঞ্চয়, স্বাস্থ্য, গোপনীয়তা এবং ভোক্তা আচরণকে আকার দেয়।
      নৈতিক পছন্দ কাঠামো ফলাফল উন্নত করতে ডিফল্ট ব্যবহার করে; ডার্ক প্যাটার্নগুলি শোষণ করতে সেগুলি ব্যবহার করে।
    professional_application:
      networking_and_relationship_building: |
        অন্যদের জন্য প্রক্রিয়া ডিজাইন করার সময়, তাদের স্বার্থে কাজ করে এমন ডিফল্টগুলি বেছে নিন।
        মূল্য আহরণের জন্য ডিফল্ট ব্যবহার করে এমন ডার্ক প্যাটার্নগুলি এড়িয়ে চলুন।
      collaborative_learning_initiative: |
        দলীয় অনুশীলনের জন্য ডিফল্ট সেট করুন (যেমন, অ্যাসিঙ্ক্রোনাসের ডিফল্ট, ডকুমেন্টেশনের ডিফল্ট) যা কাঙ্ক্ষিত আচরণের সাথে সামঞ্জস্যপূর্ণ।
        সঠিক পছন্দটিকে সহজ পছন্দ করুন।
    how_can_this_be_misapplied:
      dark_patterns: |
        মানুষকে প্রতিকূল পছন্দে ঠকাতে ডিফল্ট ব্যবহার করা (যেমন, লুকানো ফি, অবাঞ্ছিত সাবস্ক্রিপশন)।
      paternalism: |
        সম্মতি ছাড়াই প্রকৃত পছন্দকে ওভাররাইড করে এমন ডিফল্ট চাপিয়ে দেওয়া।
      manipulation: |
        ডিফল্টে প্রতিকূল শর্তাবলী লুকিয়ে রাখা এবং জড়তার উপর নির্ভর করা।
      one_size_fits_all: |
        পছন্দ ভিন্ন হলে সবার জন্য একই ডিফল্ট সঠিক বলে ধরে নেওয়া।
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: ডানিং-ক্রুগার প্রভাব
    quick_introduction: |
      ডানিং-ক্রুগার প্রভাব হলো একটি জ্ঞানীয় পক্ষপাত যেখানে কোনো ডোমেইনে সীমিত জ্ঞান বা দক্ষতা সম্পন্ন ব্যক্তিরা তাদের যোগ্যতা বেশি করে অনুমান করে, অন্যদিকে বিশেষজ্ঞরা তাদের যোগ্যতা কম করে অনুমান করে। আপনি যত কম জানবেন, তত বেশি আত্মবিশ্বাসী হতে পারেন।
    one_liner: আপনি যত কম জানবেন, তত বেশি আত্মবিশ্বাসী হতে পারেন।
    try_this:
      - নতুন ডোমেইনে, অতিরিক্ত আত্মবিশ্বাসী হওয়ার অনুমান করুন—প্রতিক্রিয়া এবং ক্যালিব্রেশন চান।
      - বিশেষজ্ঞরা যখন সন্দেহ প্রকাশ করেন, তখন এটিকে গুরুত্ব সহকারে নিন; তারা ব্যতিক্রমী পরিস্থিতিগুলো জানতে পারে।
      - লক্ষ্য করুন যখন কোনো ক্ষেত্রে অনভিজ্ঞরা বিশেষজ্ঞদের চেয়ে বেশি নিশ্চিত থাকে।
    ask_yourself:
      - আমি কি "মাউন্ট স্টুপিডের চূড়ায়" আছি নাকি "বিনয়ের উপত্যকায়"?
      - আমার কি এখানে নিজের যোগ্যতা মূল্যায়ন করার জন্য মেটাকগনিটিভ ক্ষমতা আছে?
    in_more_detail: |
      ডানিং এবং ক্রুগারের গবেষণা দেখিয়েছে যে অযোগ্য ব্যক্তিদের নিজেদের অযোগ্যতা শনাক্ত করার জন্য মেটাকগনিটিভ ক্ষমতা থাকে না। আপনার পারফরম্যান্স মূল্যায়ন করার জন্য, আপনার একই দক্ষতার প্রয়োজন যা ভালোভাবে পারফর্ম করার জন্য প্রয়োজনীয়—সুতরাং অদক্ষরা দ্বিগুণ অসুবিধায় থাকে: তারা খারাপ পারফর্ম করে এবং এটি জানে না।

      যোগ্যতা বাড়ার সাথে সাথে, লোকেরা প্রায়শই "বিনয়ের উপত্যকা" অনুভব করে যেখানে তারা বুঝতে পারে যে তারা কতটা জানে না। সত্যিকারের বিশেষজ্ঞরা আত্মবিশ্বাসের অভাব বোধ করতে পারেন কারণ তারা সূক্ষ্মতা এবং ব্যতিক্রমী পরিস্থিতি সম্পর্কে তীব্রভাবে সচেতন।
    why_this_is_important: |
      ডানিং-ক্রুগার প্রভাব শনাক্ত করা আপনাকে আপনার আত্মবিশ্বাস ক্যালিব্রেট করতে, অনভিজ্ঞদের মতামতকে অতিরিক্ত অনুমান করা এড়াতে এবং বিশেষজ্ঞদের বিনয়কে মূল্যায়ন করতে সহায়তা করে। এটি শেখা, নিয়োগ এবং সিদ্ধান্ত গ্রহণের জন্য অপরিহার্য।
    when_to_use:
      - শেখা
      - সিদ্ধান্ত_গ্রহণ
      - নেতৃত্ব
      - কর্মজীবনের_পদক্ষেপ
    how_can_you_spot_it:
      novice_overconfidence: |
        যাদের অভিজ্ঞতা কম, তারা শক্তিশালী, অপরিশোধিত মতামত প্রকাশ করে।
      expert_underconfidence: |
        অত্যন্ত দক্ষ ব্যক্তিরা কম দক্ষ লোকেদের চেয়ে বেশি অনিশ্চয়তা প্রকাশ করে এবং সংযম দেখায়।
      inability_to_recognize_quality: |
        দুর্বল পারফর্মাররা তাদের ডোমেইনে ভালো এবং খারাপ কাজের মধ্যে পার্থক্য করতে পারে না।
      confidence_competence_mismatch: |
        অনভিজ্ঞদের মধ্যে আত্মবিশ্বাস এবং প্রকৃত যোগ্যতা বিপরীতভাবে সম্পর্কযুক্ত।
    examples:
      social_media: |
        কোনো বিষয়ে অগভীর জ্ঞানসম্পন্ন লোকেরা ডোমেইন বিশেষজ্ঞদের সাথে আত্মবিশ্বাসের সাথে বিতর্ক করে।
      hiring: |
        সাক্ষাৎকারে খারাপ পারফর্ম করা প্রার্থীরা কখনও কখনও তাদের নিজের পারফরম্যান্সকে উচ্চ রেট দেয়।
      investing: |
        নতুন বিনিয়োগকারীরা প্রাথমিক জয়ের পরে অতিরিক্ত আত্মবিশ্বাসী হতে পারে, ভাগ্যের স্বীকৃতি না দিয়ে।
      workplace: |
        জুনিয়র কর্মচারীরা পদোন্নতির জন্য তাদের প্রস্তুতির ব্যাপারে অতিরিক্ত অনুমান করতে পারে যখন সিনিয়ররা নিজেদের সন্দেহ করে।
    real_world_implications: |
      ডানিং-ক্রুগার প্রভাব শিক্ষা, নিয়োগ, রাজনীতি এবং জনমতকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন খারাপ ধারণাগুলো ছড়িয়ে পড়ে এবং কেন বিশেষজ্ঞদের উপেক্ষা করা যেতে পারে। ব্যক্তিগত এবং সম্মিলিত সিদ্ধান্ত গ্রহণের জন্য ক্যালিব্রেশন গুরুত্বপূর্ণ।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ খুব আত্মবিশ্বাসী হয়, তখন বিবেচনা করুন তারা ডানিং-ক্রুগার জোনে থাকতে পারে। বিভিন্ন দৃষ্টিকোণ সন্ধান করুন, যারা অনিশ্চয়তা প্রকাশ করে তাদের সহ।
      collaborative_learning_initiative: |
        এমন সংস্কৃতি তৈরি করুন যেখানে অনিশ্চয়তা স্বীকার করাকে মূল্য দেওয়া হয়। ক্যালিব্রেশন অনুশীলন এবং প্রতিক্রিয়া উৎসাহিত করুন যা লোকেদের তাদের যোগ্যতা সঠিকভাবে মূল্যায়ন করতে সহায়তা করে।
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        আত্মবিশ্বাসী লোকেদের সর্বদা ভুল বলে মনে করা; কখনও কখনও আত্মবিশ্বাস ন্যায্য।
      false_modesty: |
        বিশেষজ্ঞরা বিনয়ী দেখাতে তাদের যা জানেন তার চেয়ে কম জানেন বলে ভান করে।
      gatekeeping: |
        "বিশেষজ্ঞদের" যুক্তিতে যুক্ত না হয়ে তাদের যুক্তির সাথে ভিন্নমত পোষণকারী কাউকে খারিজ করতে ডানিং-ক্রুগার ব্যবহার করা।
      self_doubt_paralysis: |
        নিজের বিচারকে কখনও বিশ্বাস না করার পর্যায়ে অতিরিক্ত সংশোধন করা।
    related_content:
      - circle_of_competence
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: সহানুভূতির ফাঁক
    quick_introduction: |
      সহানুভূতির ফাঁক হল অন্যদের মানসিক অবস্থা বোঝার এবং ভবিষ্যদ্বাণী করার অসুবিধা, যখন আমরা নিজেদের ভিন্ন অবস্থায় থাকি। যখন আমরা শান্ত থাকি, তখন আমরা রাগ বা ক্ষুধার্ত অবস্থায় কেমন অনুভব করব তা কম অনুমান করি। যখন আমাদের পেট ভরা থাকে, তখন ক্ষুধার্ত অবস্থায় আমাদের কতটা খাবার চাইবে তা আমরা কম অনুমান করি।
    one_liner: আমরা কম অনুমান করি যে আমরা ভিন্ন অবস্থায় কেমন অনুভব করব—এবং অন্যরাও কেমন অনুভব করবে।
    try_this:
      - শান্ত অবস্থায়, যখন আপনি চাপ অনুভব করবেন তখন প্রতিজ্ঞা করুন; পূর্ব-প্রতিজ্ঞা করুন।
      - আপনি যে অবস্থায় নেই—ক্ষুধার্ত, ক্লান্ত, ভীত—সেই অবস্থায় থাকা অন্যদের বিচার করবেন না।
      - জিজ্ঞাসা করুন: আমি কি আমার বর্তমান অবস্থাকে আমার ভবিষ্যৎ বা অন্যদের উপর চাপিয়ে দিচ্ছি?
    ask_yourself:
      - আমি কি ভিন্ন অবস্থায় কেমন অনুভব করব তা কম অনুমান করছি?
      - আমি যদি তাদের অবস্থায় থাকতাম তবে কি আমি এই ব্যক্তিকে আরও ভালভাবে বুঝতাম?
    in_more_detail: |
      ভিন্ন পরিস্থিতিতে আমরা কেমন অনুভব করব—এবং আমরা বর্তমানে যে অবস্থায় নেই সেই অবস্থায় অন্যরা কেমন অনুভব করবে তা কল্পনা করতে আমাদের অসুবিধা হয়। একজন সুস্থ ব্যক্তি আসক্তির টানকে কম অনুমান করে। একজন ভালভাবে বিশ্রাম নেওয়া ব্যক্তি ঘুমের অভাবের প্রভাবকে কম অনুমান করে। আমরা আমাদের বর্তমান অবস্থাকে অন্যদের এবং আমাদের ভবিষ্যতের উপর চাপিয়ে দিই।

      সহানুভূতির ফাঁক আমাদের ভবিষ্যতের জন্য নেওয়া সিদ্ধান্তগুলোকে (যেমন, যখন আমরা অনুপ্রাণিত থাকি তখন ব্যায়াম করার প্রতিশ্রুতি দেওয়া), অন্যদের জন্য নেওয়া সিদ্ধান্তগুলোকে এবং ভিন্ন অবস্থায় থাকা ব্যক্তিদের বোঝার ক্ষমতাকে প্রভাবিত করে।
    why_this_is_important: |
      সহানুভূতির ফাঁক চিহ্নিত করা আপনার ভবিষ্যতের জন্য সিদ্ধান্ত গ্রহণ, অন্যদের প্রতি সহানুভূতি এবং আমাদের নিজস্ব পরিবর্তনশীলতা বোঝার উন্নতি ঘটায়। এটি ব্যাখ্যা করে কেন আমরা এমন প্রতিশ্রুতি দিই যা আমরা রাখতে পারি না এবং কেন আমরা দুর্দশাগ্রস্ত অন্যদের ভুল বুঝি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সম্পর্ক_গড়ে_তোলা
      - নেতৃত্ব
      - সংঘাত_সমাধান
    how_can_you_spot_it:
      current_state_projection: |
        ধরে নেওয়া যে অন্যরা এখন যেমন অনুভব করছে, আমরাও তেমন অনুভব করি, বা ভবিষ্যৎ আমরাও তেমন অনুভব করবে যেমনটা আমরা এখন অনুভব করছি।
      underestimating_emotional_state: |
        "এতে বড় কি সমস্যা?" যখন আমরা তাদের মতো সেই অবস্থায় নেই।
      commitment_failures: |
        বর্তমান অনুপ্রেরণার উপর ভিত্তি করে এমন পছন্দ করা যা অনুপ্রেরণা কমে গেলে আমরা আর অনুসরণ করব না।
      misunderstanding_others: |
        আমাদের বর্তমান অবস্থা থেকে কল্পনা করতে না পারার কারণে অন্যদের অভিজ্ঞতাকে খারিজ করে দেওয়া।
    examples:
      hunger: |
        পেট ভরা অবস্থায় মুদির দোকানে কেনাকাটা করা—আমরা যা কিনব তা ক্ষুধার্ত অবস্থায় আমাদের যা চাইবে তার চেয়ে কম।
      addiction: |
        যারা আসক্ত নয় তারা ছেড়ে দেওয়ার অসুবিধা কম অনুমান করে; যারা সুস্থ হয়ে উঠছে তারা যখন ব্যবহার করছে তখন টানকে কম অনুমান করতে পারে।
      conflict: |
        শান্ত অবস্থায়, আমরা সংঘাতের মুহূর্তে কীভাবে প্রতিক্রিয়া জানাব তা কম অনুমান করি।
      motivation: |
        অনুপ্রাণিত অবস্থায় সকাল ৬টার ক্লাসের জন্য সাইন আপ করা—এবং যখন আমরা ঘুমন্ত থাকি তখন না যাওয়া।
    real_world_implications: |
      সহানুভূতির ফাঁক আসক্তি নিরাময়, নীতি এবং আন্তঃব্যক্তিক বোঝাপড়াকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন আমরা প্রতিশ্রুতি ভেঙে ফেলি এবং কেন আমরা প্রায়শই অন্যদের দৃষ্টিভঙ্গি বুঝতে ব্যর্থ হই। এটি সহানুভূতি এবং ভাল সিদ্ধান্ত গ্রহণের পথে একটি বাধা।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ চাপ, রাগ বা ভিন্ন অবস্থায় থাকে, তখন ধরে নেবেন না যে তারা আপনার মতো যুক্তি দেখাবে। তাদের অবস্থা কল্পনা করার চেষ্টা করুন। প্রতিজ্ঞা করার সময়, অনুপ্রেরণা কমে গেলে আপনি কেমন অনুভব করবেন তা বিবেচনা করুন।
      collaborative_learning_initiative: |
        পরিকল্পনা করার সময়, দলটি ক্লান্ত, চাপের মধ্যে বা হতাশ হলে কেমন অনুভব করবে তা বিবেচনা করুন। শুধুমাত্র অনুপ্রাণিত পরিকল্পনা অবস্থার জন্য নয়, সেই অবস্থাগুলোর জন্য ডিজাইন করুন।
    how_can_this_be_misapplied:
      overattribution: |
        সমস্ত ভুল বোঝাবুঝিকে "সহানুভূতির ফাঁক" বলে খারিজ করা যখন কখনও কখনও লোকেদের সত্যিই ভিন্ন মূল্যবোধ থাকে।
      excusing_behavior: |
        "তারা এটা এড়াতে পারত না—সহানুভূতির ফাঁক" যখন লোকেরা তাদের অবস্থা পরিচালনা করার জন্য দায়ী।
      false_relativism: |
        ধরে নেওয়া যে আমরা কখনই অন্যদের বুঝতে পারব না যখন আমরা প্রচেষ্টা এবং অভিজ্ঞতার মাধ্যমে উন্নতি করতে পারি।
      self_excuse: |
        আমাদের নিজস্ব ব্যর্থতা এবং প্রতিশ্রুতি পালনে অক্ষমতাকে ন্যায্যতা দেওয়ার জন্য সহানুভূতির ফাঁক ব্যবহার করা।
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: স্বত্বাধিকারী প্রভাব
    quick_introduction: |
      স্বত্বাধিকারী প্রভাব হল কেবল মালিকানার কারণে কোনো বস্তুর বেশি মূল্যায়ন করার প্রবণতা। 
      কোনো বস্তু ছেড়ে দেওয়ার জন্য আমরা তার অধিগ্রহণের জন্য যে মূল্য দিতাম, তার চেয়ে বেশি মূল্য দাবি করি। 
      মালিকানা সংযুক্তি তৈরি করে যা আমাদের মূল্যায়নকে বিকৃত করে।
    one_liner: আমরা যা মালিক, তার চেয়ে যা মালিক নই, তার বেশি মূল্য দিই—মালিকানা সংযুক্তি তৈরি করে।
    try_this:
      - Ask: যদি আমি এটা মালিক না হতাম, তবে এটা অর্জন করতে আমি কত টাকা দিতাম?
      - বিক্রি করার সময়, নিজেকে ক্রেতা হিসাবে কল্পনা করুন—আপনি কি আপনার জিজ্ঞাসা করা মূল্য দিতে ইচ্ছুক?
      - লক্ষ্য করুন কখন মালিকানা আপনার মূল্যায়ন বাড়িয়ে তুলছে।
    ask_yourself:
      - আমি কি এটা মালিক হওয়ার কারণে বেশি মূল্যায়ন করছি?
      - একজন নিরপেক্ষ ক্রেতা কি আমার মূল্যের সাথে একমত হবেন?
    in_more_detail: |
      পরীক্ষায় দেখা গেছে, যাদের দৈবক্রমে একটি মগ দেওয়া হয়েছিল, তারা সেটি বিক্রি করার জন্য অন্যদের 
      কেনার জন্য যে মূল্য দিতে ইচ্ছুক, তার প্রায় দ্বিগুণ দাবি করে। মালিকানার সাধারণ ঘটনা 
      উপলব্ধি করা মূল্য বৃদ্ধি করে। এটি ক্ষতির প্রতি বিতৃষ্ণার সঙ্গে সম্পর্কিত—কোনো কিছু ছেড়ে দেওয়া 
      ক্ষতির মতো মনে হয়, এবং আমরা ক্ষতির প্রতি বিতৃষ্ণ। কিন্তু এই প্রভাব তার চেয়েও বেশি: আমরা 
      মালিকানাধীন জিনিসগুলিকে আমাদের পরিচয়ের অংশ করে নিই।

      স্বত্বাধিকারী প্রভাব আলোচনা, ভোক্তা আচরণ এবং সাংগঠনিক পরিবর্তনকে প্রভাবিত করে। 
      এটি ব্যাখ্যা করে কেন মানুষ তাদের বাড়ি, তাদের ধারণা এবং তাদের বর্তমান পদকে বেশি মূল্যায়ন করে। 
      এটি লেনদেন এবং পরিবর্তনে ঘর্ষণ তৈরি করে।
    why_this_is_important: |
      স্বত্বাধিকারী প্রভাবকে চিনতে পারা আপনাকে আরও কার্যকরভাবে আলোচনা করতে, 
      কী রাখা বা ছেড়ে দেওয়া উচিত সে সম্পর্কে আরও স্পষ্ট সিদ্ধান্ত নিতে এবং 
      অন্যরা তাদের যা আছে তা কেন বেশি মূল্যায়ন করে তা বুঝতে সাহায্য করে। 
      এটি পরিবর্তনের প্রতিরোধকেও ব্যাখ্যা করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - আলোচনা
      - বিনিয়োগ
      - পেশাগত_পদক্ষেপ
    how_can_you_spot_it:
      ownership_premium: |
        "আমি এটি এত দামে বিক্রি করব না" যখন আপনি এটি কিনতে সেই দামে দিতে ইচ্ছুক নন।
      attachment_to_possession: |
        কোনো জিনিস পাওয়ার পর সেটির বেশি মূল্যায়ন করা।
      resistance_to_trading: |
        এমনকি যখন এটি যৌক্তিক, তবুও লেনদেন বা বিনিময় করতে অনীহা।
      overvaluation_of_own_ideas: |
        আমাদের ধারণা, প্রকল্প বা পদগুলি আমাদের হওয়ার কারণে আরও মূল্যবান মনে হয়।
    examples:
      real_estate: |
        বাড়ির মালিকরা প্রায়শই তাদের বাড়ির দাম বেশি রাখেন—তারা সেটিকে বাজারের চেয়ে বেশি মূল্যায়ন করেন।
      negotiations: |
        বিক্রেতারা ক্রেতারা যা দিতে ইচ্ছুক তার চেয়ে বেশি দাবি করে; এই পার্থক্যটি স্বত্বাধিকারী প্রভাবকে প্রতিফলিত করে।
      career: |
        পরিবর্তনের কথা বিবেচনা করার সময় আমাদের বর্তমান চাকরি, কোম্পানি বা পদকে বেশি মূল্যায়ন করা।
      ideas: |
        "এখানে উদ্ভাবিত নয়" এবং "আমার ধারণা" পক্ষপাত—আমরা যা তৈরি করেছি বা মালিক, তার বেশি মূল্যায়ন করি।
    real_world_implications: |
      স্বত্বাধিকারী প্রভাব বাজার ঘর্ষণ তৈরি করে, উপকারী বিনিময়কে ধীর করে দেয় এবং পরিবর্তনের প্রতি প্রতিরোধকে বাড়িয়ে তোলে। 
      এটি একীভূতকরণ, পুনর্গঠন এবং ব্যক্তিগত পরিবর্তনকে প্রভাবিত করে। এটি বোঝা আলোচনা এবং পরিবর্তন ব্যবস্থাপনাকে উন্নত করে।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ পরিবর্তনের প্রতিরোধ করে, তখন বিবেচনা করুন যে তারা স্বত্বাধিকারী প্রভাবের সম্মুখীন হতে পারে—তারা বর্তমান অবস্থাকে 
        বেশি মূল্যায়ন করে কারণ তারা এটির "মালিক"। পরিবর্তনের রূপরেখা দিন তাদের কী লাভ হবে তার উপর ভিত্তি করে, 
        কেবল তারা কী ছেড়ে দেবে তার উপর নয়।
      collaborative_learning_initiative: |
        নতুন প্রক্রিয়া চালু করার সময়, স্বীকার করুন যে লোকেরা বর্তমান উপায়গুলির সাথে সংযুক্ত। 
        নতুনকে গ্রহণ করার আগে পুরাতনকে "ছেড়ে দেওয়ার" জন্য মনস্তাত্ত্বিক নিরাপত্তা তৈরি করুন।
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        কিছু সংযুক্তি যৌক্তিক—আবেগিক মূল্য, পরিবর্তনের খরচ। সব প্রতিরোধ স্বত্বাধিকারী প্রভাব নয়।
      manipulation: |
        উচ্চতর মূল্য বের করার জন্য মালিকানার মিথ্যা অনুভূতি তৈরি করা (যেমন, স্বত্বাধিকারী প্রভাবকে 
        উদ্দীপিত করার জন্য "বিনামূল্যে চেষ্টা করুন")।
      undervaluing_continuity: |
        পরিবর্তনের সমস্ত প্রতিরোধকে অযৌক্তিক বলে ধরে নেওয়া যখন ধারাবাহিকতার বাস্তব মূল্য রয়েছে।
      cold_rationality: |
        আবেগিক সংযুক্তিকে "শুধু স্বত্বাধিকারী প্রভাব" বলে খারিজ করে দেওয়া যখন এটি প্রকৃত মূল্যবোধকে প্রতিফলিত করে।
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: মিথ্যা ঐকমত্য প্রভাব
    quick_introduction: |
      মিথ্যা ঐকমত্য প্রভাব হলো অন্যদের সঙ্গে আমাদের বিশ্বাস, মনোভাব এবং আচরণের মিল আছে বলে অতিরিক্ত অনুমান করার প্রবণতা। আমরা ধরে নিই আমাদের মতামত যতটা আছে তার চেয়ে বেশি সাধারণ, এবং আমরা কল্পনা করতে অসুবিধা বোধ করি যে যুক্তিসঙ্গত মানুষ ভিন্নমত পোষণ করতে পারে।
    one_liner: আমরা বেশি অনুমান করি যে অন্যরা আমাদের সাথে একমত।
    try_this:
      - যারা দ্বিমত পোষণ করেন তাদের সক্রিয়ভাবে সন্ধান করুন—ঐকমত্য অনুমান করবেন না।
      - শুরু করার আগে, যারা আপনার অনুমানগুলি ভাগ করেন না তাদের সাথে পরীক্ষা করুন।
      - জিজ্ঞাসা করুন: যিনি দ্বিমত পোষণ করেন তিনি কী বলবেন? এটিকে গুরুত্ব সহকারে নিন।
    ask_yourself:
      - আমি কি অনুমান করছি যে অন্যরা আমার মতো ভাবে?
      - শেষ কবে আমি কারো ভিন্ন মতামত দেখে অবাক হয়েছি?
    in_more_detail: |
      যখন আমরা কোনো অবস্থান ধরে রাখি, তখন আমরা সেটিকে স্বাভাবিক বলে মনে করি। আমরা নিজেদের সমমনা লোকেদের সাথে ঘেরা রাখি, নিশ্চিতকারী মিডিয়া গ্রহণ করি, এবং দ্ব্যর্থহীন প্রতিক্রিয়াকে ঐকমত্য হিসাবে ব্যাখ্যা করি। এটি একটি প্রতিধ্বনি চেম্বার তৈরি করে যা ঐকমত্যের বিভ্রমকে শক্তিশালী করে।

      গভীরভাবে পোষণ করা বিশ্বাসগুলির জন্য এবং যখন আমরা আমাদের অবস্থানের প্রতি অত্যন্ত প্রতিশ্রুতিবদ্ধ থাকি তখন এই প্রভাবটি আরও শক্তিশালী হয়। এটি অন্যদের দ্বিমত পোষণ করলে অবাক হতে, আলোচনায় অসুবিধা এবং আমরা যখন গ্রাহকদের আমাদের মতো ভাবার অনুমান করি তখন দুর্বল বাজার গবেষণার দিকে পরিচালিত করতে পারে।
    why_this_is_important: |
      মিথ্যা ঐকমত্য প্রভাব শনাক্ত করা আপনাকে প্রকৃত মতভেদগুলির জন্য প্রস্তুত হতে, উন্নত গবেষণা পরিচালনা করতে এবং আরও কার্যকরভাবে যোগাযোগ করতে সহায়তা করে। এটি পণ্য উন্নয়ন, আলোচনা এবং নেতৃত্বের জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - আলোচনা
      - নেতৃত্ব
      - সমস্যা_সমাধান
    how_can_you_spot_it:
      surprise_at_disagreement: |
        আপনি যা সহজ বলে মনে করেন তার সাথে যখন কেউ দ্বিমত পোষণ করে তখন আপনি সত্যিই হতবাক হন।
      assuming_shared_values: |
        আপনি এমনভাবে আচরণ করেন যেন অন্যরা আপনার অগ্রাধিকারগুলি ভাগ করে নেয়, পরীক্ষা না করেই।
      underestimating_opposition: |
        আপনি প্রত্যাশার চেয়ে কম প্রতিরোধের মুখোমুখি প্রস্তাবগুলি আশা করেন।
      echo_chamber_detection: |
        আপনার সামাজিক এবং তথ্য পরিবেশ আপনার মতামতকে খুব কমই চ্যালেঞ্জ করে।
    examples:
      product_development: |
        একটি দল অনুমান করে যে ব্যবহারকারীরা বৈশিষ্ট্য X চায় কারণ দলের প্রত্যেকে এটি চায়—শুধুমাত্র কম গ্রহণীয়তা খুঁজে পেতে।
      politics: |
        একটি রাজনৈতিক বুদবুদের লোকেরা তাদের প্রত্যাশার সাথে মেলে না এমন নির্বাচনের ফলাফলে অবাক হয়।
      negotiation: |
        অন্য পক্ষ শর্তে সম্মত হবে এমন অনুমান করা কারণ সেগুলি আপনার কাছে "যুক্তিসঙ্গত" বলে মনে হয়।
      hiring: |
        "সংস্কৃতির মানানসই" হওয়ার জন্য নিয়োগের অর্থ হলো আপনার সাথে একমত হওয়া লোকদের নিয়োগ করা, মিথ্যা ঐকমত্যকে শক্তিশালী করা।
    real_world_implications: |
      মিথ্যা ঐকমত্য প্রভাব মেরুকরণ, ব্যর্থ পণ্য লঞ্চ এবং ভাঙা আলোচনার ক্ষেত্রে অবদান রাখে। এটি আমাদের ভবিষ্যদ্বাণীগুলির প্রতি অতি আত্মবিশ্বাসী এবং ভিন্নমতের জন্য অপ্রস্তুত করে তোলে।
    professional_application:
      networking_and_relationship_building: |
        সক্রিয়ভাবে ভিন্ন দৃষ্টিকোণযুক্ত ব্যক্তিদের সন্ধান করুন। ভাগ করা বিশ্বাসগুলি অনুমান করবেন না—জিজ্ঞাসা করুন এবং শুনুন।
      collaborative_learning_initiative: |
        দলগুলিতে, এটি ব্যয়বহুল হওয়ার আগে মতভেদগুলি প্রকাশ করার জন্য কাঠামোগত ভিন্নমত (যেমন, "প্রিমোর্টেম," ডেভিল'স অ্যাডভোকেট) ব্যবহার করুন।
    how_can_this_be_misapplied:
      dismissing_dissent: |
        যারা দ্বিমত পোষণ করেন তাদের অযৌক্তিক বা অজ্ঞ বলে মনে করা, বরং তারা বৈধ ভিন্ন দৃষ্টিকোণ পোষণ করতে পারে তা বিবেচনা করার পরিবর্তে।
      poor_research: |
        গ্রাহক গবেষণা বাদ দেওয়া কারণ "আমরা ইতিমধ্যেই জানি তারা কী চায়।"
      overconfidence: |
        এই অনুমানের উপর ভিত্তি করে সাহসী বাজি তৈরি করা যে অন্যরা একমত হবে।
      groupthink_amplification: |
        যে দলগুলি মিথ্যা ঐকমত্য প্রভাবকে চ্যালেঞ্জ করে না তারা গ্রুপথিংকে প্রভাবিত করতে পারে।
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: ফ্রেমিং এফেক্ট
    quick_introduction: |
      ফ্রেমিং এফেক্ট হলো আমাদের সিদ্ধান্তের পরিবর্তনশীলতা, অপশনগুলো যেভাবে উপস্থাপন করা হয় তার উপর ভিত্তি করে — এমনকি যখন অন্তর্নিহিত তথ্য একই থাকে। "৯০% বেঁচে যাওয়া" এবং "১০% মৃত্যুহার" একই ফলাফল বর্ণনা করে কিন্তু ভিন্ন পছন্দ তৈরি করে। ফ্রেমিং সিদ্ধান্তকে প্রভাবিত করে।
    one_liner: একই তথ্য, ভিন্নভাবে ফ্রেম করা হলে, ভিন্ন সিদ্ধান্তের দিকে পরিচালিত করে।
    try_this:
      - সিদ্ধান্ত নেওয়ার আগে একাধিক উপায়ে অপশনগুলোকে রিফ্রেম করুন — লাভ ফ্রেম এবং ক্ষতি ফ্রেম।
      - লক্ষ্য করুন যখন কোনো কিছুর শব্দচয়নের উপর ভিত্তি করে আপনার পছন্দ পরিবর্তিত হয়।
      - জিজ্ঞাসা করুন: ফ্রেমিং থেকে মুক্ত করে অন্তর্নিহিত তথ্যগুলো কী কী?
    ask_yourself:
      - যদি এটি লাভ হিসাবে ফ্রেম করা হয় বনাম ক্ষতি হিসাবে ফ্রেম করা হয় তবে আমি কি ভিন্ন সিদ্ধান্ত নিতাম?
      - আমি কি ফ্রেমের প্রতি প্রতিক্রিয়া জানাচ্ছি নাকি প্রকৃত ফলাফলের প্রতি?
    in_more_detail: |
      কানহম্যান এবং টভারস্কি দেখিয়েছেন যে লোকেরা লাভের হিসাবে ফ্রেম করা অপশনের ক্ষেত্রে ঝুঁকি এড়াতে চায় এবং ক্ষতির হিসাবে ফ্রেম করা অপশনের ক্ষেত্রে ঝুঁকি নিতে আগ্রহী হয় — একই ফলাফলের জন্য। ইতিবাচক ফ্রেমিং ("২০০ জীবন বাঁচান") বনাম নেতিবাচক ফ্রেমিং ("৪০০ জন মারা যাবে") পছন্দ পরিবর্তন করে। ক্ষতির ফ্রেম সমতুল্য লাভ ফ্রেমের চেয়ে শক্তিশালী আবেগিক প্রতিক্রিয়া ট্রিগার করে।

      ফ্রেমিং এফেক্ট চিকিৎসা সংক্রান্ত সিদ্ধান্ত, নীতি, বিপণন এবং আলোচনাকে প্রভাবিত করে। এটি সবচেয়ে শক্তিশালী এবং সু-নথিভুক্ত পক্ষপাতগুলির মধ্যে একটি। সচেতনতা সাহায্য করে, কিন্তু এটি সম্পূর্ণরূপে কাটিয়ে ওঠা কঠিন।
    why_this_is_important: |
      ফ্রেমিং এফেক্টকে চেনা আপনাকে আরও সামঞ্জস্যপূর্ণ সিদ্ধান্ত নিতে, ম্যানিপুলেশন প্রতিরোধ করতে এবং আরও কার্যকরভাবে যোগাযোগ করতে সাহায্য করে। এটি ব্যাখ্যা করে কেন একই অফার উপস্থাপনার উপর নির্ভর করে গ্রহণ বা প্রত্যাখ্যান করা যেতে পারে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - আলোচনা
      - নেতৃত্ব
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        একই ফলাফল লাভ বনাম ক্ষতি হিসাবে ফ্রেম করা হলে ভিন্ন পছন্দের সৃষ্টি হয়।
      presentation_dependence: |
        সিদ্ধান্ত পরিবর্তিত হয় যখন কেবল ফ্রেমিং পরিবর্তন হয়, মূল বিষয়বস্তু নয়।
      default_influence: |
        অপশনগুলোর ক্রম বা লেবেলিং পছন্দকে প্রভাবিত করে।
      emotional_trigger: |
        কিছু ফ্রেম শক্তিশালী আবেগিক প্রতিক্রিয়া ট্রিগার করে।
    examples:
      medical: |
        একই পদ্ধতির জন্য "৯০% বেঁচে যাওয়া" বনাম "১০% মৃত্যুহার" —
        মানুষ ফ্রেমের উপর ভিত্তি করে ভিন্নভাবে নির্বাচন করে।
      sales: |
        "৫০ টাকা বাঁচান" বনাম "৫০ টাকা হারাবেন না" — সমতুল্য ফ্রেম, ভিন্ন
        মনস্তাত্ত্বিক প্রভাব।
      policy: |
        "কর ছাড়" বনাম "সরকারি ব্যয়" — একই নীতি, ভিন্ন
        রাজনৈতিক প্রতিক্রিয়া।
      negotiation: |
        একটি অফারকে "ছাড়" হিসাবে উপস্থাপন করা বনাম "সারচার্জ এড়ানো"
        গ্রহণের হার পরিবর্তন করে।
    real_world_implications: |
      ফ্রেমিং এফেক্ট বিজ্ঞাপন, রাজনীতি এবং আলোচনায় কাজে লাগানো হয়। এটি চিকিৎসা সংক্রান্ত সিদ্ধান্ত এবং নীতিগত সমর্থনকে প্রভাবিত করে। রিফ্রেমিং সিদ্ধান্ত এবং যোগাযোগ উন্নত করতে পারে। সচেতন থাকা সাহায্য করে কিন্তু প্রভাবটি সম্পূর্ণরূপে দূর করে না।
    professional_application:
      networking_and_relationship_building: |
        অপশনগুলো উপস্থাপন করার সময়, একাধিক ফ্রেম বিবেচনা করুন। বিভিন্ন ফ্রেমিং কীভাবে গ্রহণকে প্রভাবিত করে তা পরীক্ষা করুন। তথ্য গ্রহণ করার সময়, জিজ্ঞাসা করুন "এটি অন্য কীভাবে ফ্রেম করা যেতে পারে?"
      collaborative_learning_initiative: |
        সিদ্ধান্ত গ্রহণের ক্ষেত্রে, ফ্রেমিং এফেক্ট পরীক্ষা করার জন্য স্পষ্টভাবে বিকল্পগুলি রিফ্রেম করুন। "যদি আমরা এটিকে ক্ষতি হিসাবে ফ্রেম করতাম, তবে কি আমরা ভিন্ন সিদ্ধান্ত নিতাম?" ন্যায্যতা জন্য সামঞ্জস্যপূর্ণ ফ্রেমিং ব্যবহার করুন।
    how_can_this_be_misapplied:
      manipulation: |
        ইচ্ছাকৃতভাবে ফ্রেমিং ব্যবহার করে তাদের অজান্তেই পছন্দসই ফলাফলের দিকে চালিত করা।
      false_equivalence: |
        সমস্ত ফ্রেমিং সমানভাবে বৈধ বলে ধরে নেওয়া যখন কিছু গুরুত্বপূর্ণ তথ্য গোপন করে।
      overcorrection: |
        সম্পূর্ণরূপে ফ্রেমিংকে উপেক্ষা করা এবং এটি কোনও ব্যাপার না বলে ধরে নেওয়া —
        এটি গুরুত্বপূর্ণ।
      spin: |
        বিভ্রান্ত করার জন্য ফ্রেমিং ব্যবহার করা, পরিষ্কার করার জন্য নয়।
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: মৌলিক আরোপণ ত্রুটি
    quick_introduction: |
      মৌলিক আরোপণ ত্রুটি হল অন্যের আচরণকে তাদের চরিত্র বা ব্যক্তিত্বের উপর আরোপ করার প্রবণতা, যখন নিজেদের আচরণকে পরিস্থিতিগত কারণগুলির উপর আরোপ করা হয়। আমরা অন্যদের তাদের কাজের দ্বারা বিচার করি এবং নিজেদের তাদের উদ্দেশ্য দ্বারা।
    one_liner: আমরা অন্যদের তাদের কাজের দ্বারা বিচার করি, নিজেদের উদ্দেশ্য দ্বারা।
    try_this:
      - যখন কেউ আপনাকে হতাশ করে, জিজ্ঞাসা করুন: কোন পরিস্থিতিগত কারণগুলি এটি ব্যাখ্যা করতে পারে?
      - নিজের প্রতি যে উদারতা দেখান, অন্যের প্রতিও তা প্রয়োগ করুন।
      - লক্ষ্য করুন যখন আপনি অন্যের আচরণকে পরিস্থিতির পরিবর্তে চরিত্রের উপর আরোপ করছেন।
    ask_yourself:
      - আমি কি তাদের আচরণের একই ব্যাখ্যা দেব যা আমি নিজের আচরণের জন্য দেব?
      - তাদের পরিস্থিতি সম্পর্কে আমি কী মিস করছি?
    in_more_detail: |
      যখন কেউ ট্র্যাফিকের মধ্যে আমাদের পথ আটকে দেয়, আমরা ভাবি "কী অভদ্র!" যখন আমরা কাউকে পথ আটকে দিই, আমরা ভাবি "আমাকে করতেই হতো—আমি তাড়াহুড়োতে ছিলাম।" আমরা আমাদের নিজস্ব ব্যর্থতার ব্যাখ্যা পরিস্থিতির দ্বারা দিই ("ট্র্যাফিক খুব খারাপ ছিল") এবং অন্যদের ব্যর্থতার ব্যাখ্যা তাদের স্বভাবের দ্বারা দিই ("তারা অলস")। সাফল্যের ক্ষেত্রে এর বিপরীত ঘটে: আমরা নিজেদের কৃতিত্ব দিই, অন্যদের সাফল্যকে ভাগ্য বলে গণ্য করি।

      এই ত্রুটি "মৌলিক" কারণ এটি সর্বব্যাপী এবং অবিরাম। এটি সহানুভূতির অবক্ষয় ঘটায়, সংঘাত বাড়ায় এবং কর্মক্ষমতা মূল্যায়নে বিকৃতি ঘটায়।
    why_this_is_important: |
      মৌলিক আরোপণ ত্রুটি চিনতে পারলে সম্পর্ক উন্নত হয়, সংঘাত কমে এবং ন্যায্য বিচার সম্ভব হয়। এটি কোনও ব্যক্তির "একটি নির্দিষ্ট ধরনের" হওয়ার সিদ্ধান্ত নেওয়ার আগে প্রেক্ষাপট বিবেচনা করতে উৎসাহিত করে।
    when_to_use:
      - সম্পর্ক_গড়ে_তোলা
      - সংঘাত_সমাধান
      - নেতৃত্ব
      - সিদ্ধান্ত_গ্রহণ
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "তারা এমনই একজন মানুষ" যখন অন্যদের আচরণ ব্যাখ্যা করা হয়।
      situational_explanation_for_self: |
        "আমার কোনো উপায় ছিল না" বা "পরিস্থিতি আমাকে বাধ্য করেছে" যখন নিজের ব্যাখ্যা দেওয়া হয়।
      character_vs_context: |
        পরিস্থিতি যখন আচরণ ব্যাখ্যা করতে পারে, তখন স্বভাবের উপর জোর দেওয়া।
      asymmetric_standards: |
        নিজের উপর যে মান প্রয়োগ করি, অন্যদের উপর তার চেয়ে কঠিন মান প্রয়োগ করা।
    examples:
      traffic: |
        অন্য চালকের ভুল = "খারাপ চালক।" আমাদের ভুল = "অপরিহার্য পরিস্থিতি।"
      workplace: |
        একজন সহকর্মীর সময়সীমা মিস = "দায়িত্বহীন।" আমাদের সময়সীমা মিস =
        "কাজের চাপে ছিলাম এবং কেউ এর চেয়ে ভালো করতে পারত না।"
      politics: |
        বিরোধীদের মতামত = "তারা বোকা বা মন্দ।" আমাদের মতামত =
        "ঘটনাগুলির যৌক্তিক প্রতিক্রিয়া।"
      performance: |
        অন্যদের সাফল্য = "ভাগ্য।" আমাদের সাফল্য = "কঠোর পরিশ্রমের মাধ্যমে অর্জিত।"
    real_world_implications: |
      মৌলিক আরোপণ ত্রুটি সংঘাত বাড়ায়, দলগত কাজকে দুর্বল করে এবং নিয়োগ ও কর্মক্ষমতা মূল্যায়নকে বিকৃত করে। এটি সংশোধন করলে সাংগঠনিক সংস্কৃতি এবং ব্যক্তিগত সম্পর্ক উন্নত হয়।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ আপনাকে হতাশ করে, তারা যে নির্ভরযোগ্য নয় বা কঠিন, এই সিদ্ধান্তে আসার আগে জিজ্ঞাসা করুন "কোন পরিস্থিতিগত কারণগুলি এটি ব্যাখ্যা করতে পারে?"
      collaborative_learning_initiative: |
        প্রতিক্রিয়া এবং মূল্যায়নে, "পরিস্থিতি প্রথমে" ব্যাখ্যার জন্য উৎসাহিত করুন।
        ব্যবস্থাপকদের চরিত্র আরোপ করার আগে প্রেক্ষাপট বিবেচনা করার প্রশিক্ষণ দিন।
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        যখন কিছু আচরণ চরিত্রের প্রতিফলন ঘটায়, তখনও প্রতিটি কাজকে "পরিস্থিতিগত" বলে বাতিল করে দেওয়া।
      no_accountability: |
        মানুষ তাদের করা পছন্দের জন্য জবাবদিহি এড়াতে এই ত্রুটি ব্যবহার করা।
      self_deprecation: |
        অতিরিক্ত সংশোধনের মাধ্যমে সর্বদা নিজেকে দোষারোপ করা এবং অন্যের দায়িত্ব স্বীকার না করা।
      ignoring_patterns: |
        যখন কেউ বিভিন্ন পরিস্থিতিতে বারবার খারাপ আচরণ করে, তখন স্বভাব প্রাসঙ্গিক হতে পারে।
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: জুয়াড়ির ভ্রান্তি (Gambler's Fallacy)
    quick_introduction: |
      জুয়াড়ির ভ্রান্তি হলো এই ভুল বিশ্বাস যে অতীতের স্বাধীন ঘটনাগুলি ভবিষ্যতের ঘটনাগুলিকে প্রভাবিত করে। পরপর হেড পড়ার পরে, আমরা ভাবি যে টেল "আসন্ন"—যদিও প্রতিটি টসই স্বাধীন। আমরা এলোমেলোতার মধ্যে প্যাটার্ন দেখি এবং যখন কোনো "সংশোধন" বা "পুনরুদ্ধার"-এর প্রয়োজন হয় না তখন তার আশা করি।
    one_liner: অতীতের স্বাধীন ঘটনাগুলি ভবিষ্যতের ঘটনাগুলিকে প্রভাবিত করে না—মুদ্রার কোনো স্মৃতি নেই।
    try_this:
      - যখন আপনি ভাবেন "আমি একটি জয়ের জন্য অধীর আগ্রহে অপেক্ষা করছি", জিজ্ঞাসা করুন: এই ঘটনাগুলি কি আসলেই স্বাধীন?
      - মিন-এ রিগ্রেশন (প্রকৃত) এবং জুয়াড়ির ভ্রান্তি (মিথ্যা) এর মধ্যে পার্থক্য করুন।
      - এলোমেলোতার মধ্যে প্যাটার্ন দেখলে তা লক্ষ্য করুন।
    ask_yourself:
      - আমি কি ধরে নিচ্ছি যে অতীতের ফলাফলগুলি ভবিষ্যতের ফলাফলগুলিকে প্রভাবিত করবে যখন তারা স্বাধীন?
      - একজন পরিসংখ্যানবিদ কি আমার "বদলের জন্য অধীর আগ্রহে অপেক্ষা করছি" যুক্তির সাথে একমত হবেন?
    in_more_detail: |
      একটি ন্যায্য মুদ্রা নিক্ষেপে, প্রতিটি নিক্ষেপ স্বাধীন। হেডের সম্ভাবনা সর্বদা ৫০%, অতীতের ফলাফলের নির্বিশেষে। কিন্তু আমরা অনুভব করি যে একটি দীর্ঘ সময় ধরে একটি নির্দিষ্ট ফলাফল অন্যটিকে আরও সম্ভাব্য করে তোলে। আমরা বড় সংখ্যার আইন (অনেক পরীক্ষার পরে, ফলাফলগুলি গড় হয়) এবং স্বল্প-মেয়াদী "সংশোধন" এর মধ্যে গুলিয়ে ফেলি। ক্যাসিনোর কোনো স্মৃতি নেই।

      এই ভ্রান্তি জুয়া, বিনিয়োগ এবং দৈনন্দিন সিদ্ধান্ত গ্রহণকে প্রভাবিত করে। আমরা ধরে নিই যে "ভাগ্য" ভারসাম্য রক্ষা করবে বা আমরা একটি জয়ের জন্য "অধীর আগ্রহে অপেক্ষা করছি"। কখনও কখনও আমরা সঠিক—কিন্তু ভুল কারণে।
    why_this_is_important: |
      জুয়াড়ির ভ্রান্তি সনাক্তকরণ জুয়া এবং বিনিয়োগে ব্যয়বহুল ভুল প্রতিরোধ করে। এটি আপনাকে স্বল্প-মেয়াদী প্যাটার্নগুলির অতিরিক্ত ব্যাখ্যা করা এবং মিথ্যা পুনরুদ্ধার আশা করা এড়াতেও সহায়তা করে। এটি মিন-এ প্রকৃত রিগ্রেশন থেকে এই ভ্রান্তিটিকে আলাদা করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - বিনিয়োগ (investing)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
      - সমস্যা_সমাধান (problem_solving)
    how_can_you_spot_it:
      due_for_a_change: |
        "আমরা এতগুলি হেরেছি—আমরা একটি জয়ের জন্য অধীর আগ্রহে অপেক্ষা করছি।"
      pattern_in_randomness: |
        এলোমেলো ক্রমগুলিতে অর্থপূর্ণ প্যাটার্ন দেখা।
      hot_hand_fallacy: |
        বিশ্বাস করা যে একটি ধারা অব্যাহত থাকবে (সম্পর্কিত তবে বিপরীত ত্রুটি)।
      independence_ignorance: |
        স্বাধীন ঘটনাগুলিকে এমনভাবে বিবেচনা করা যেন তারা সংযুক্ত।
    examples:
      gambling: |
        রুলেটে বেশ কয়েকটি লাল হওয়ার পরে, কালো বাজি ধরা কারণ "লাল লাগাতার আসতে পারে না।"
      investing: |
        "বাজার পড়ে গেছে—এটা উপরে যেতেই হবে।"
      hiring: |
        "আমরা বেশ কয়েকজন খারাপ প্রার্থী নিয়োগ করেছি—পরের জন অবশ্যই ভালো হবে।"
      sports: |
        "সে এতগুলি মিস করেছে—সে পরের শটটি নিতে প্রস্তুত।"
    real_world_implications: |
      জুয়াড়ির ভ্রান্তি জুয়াতে ক্ষতি এবং খারাপ বিনিয়োগ সিদ্ধান্তের কারণ হয়। এটি ব্যাখ্যা করে কেন আমরা স্বল্প-মেয়াদী প্যাটার্নগুলির অতিরিক্ত ব্যাখ্যা করি। মিন-এ প্রকৃত রিগ্রেশন (যেখানে রিগ্রেস করার জন্য একটি বাস্তব মিন থাকে) থেকে এটিকে আলাদা করা গুরুত্বপূর্ণ।
    professional_application:
      networking_and_relationship_building: |
        এইরকম মনে করবেন না যে অতীতের সম্পর্কীয় গতিবিদ্যা ভবিষ্যতে "সংশোধন" হবে—প্রতিটি মিথস্ক্রিয়া কিছুটা স্বাধীন। তবে, যখন কোনও বাস্তব অন্তর্নিহিত কারণ থাকে তখন প্যাটার্নগুলি থেকে শিখুন।
      collaborative_learning_initiative: |
        কর্মক্ষমতা মূল্যায়ন করার সময়, এলোমেলো বৈচিত্র্যকে পদ্ধতিগত পরিবর্তন থেকে আলাদা করুন। স্বল্প-মেয়াদী ধারাগুলি গোলমাল হতে পারে; "ধারা"-গুলিতে অতিরিক্ত প্রতিক্রিয়া জানাবেন না বা মিথ্যা পুনরুদ্ধার আশা করবেন না।
    how_can_this_be_misapplied:
      ignoring_regression: |
        কখনও কখনও মিন-এ রিগ্রেশন বাস্তব হয় (যেমন, দক্ষতা কর্মক্ষমতা)। সমস্ত রিভার্সনকে জুয়াড়ির ভ্রান্তি বলে উড়িয়ে দেবেন না।
      false_independence: |
        ঘটনাগুলি স্বাধীন বলে ধরে নেওয়া যখন তারা নয় (যেমন, একই জিনিসের পুনরাবৃত্ত পরিমাপ)।
      overcorrection: |
        যখন রিগ্রেস করার জন্য একটি বাস্তব মিন থাকে তখন কখনও রিভার্সন আশা না করা।
      dismissing_patterns: |
        কিছু প্যাটার্ন বাস্তব—সব ক্রম এলোমেলো নয়।
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: দলবদ্ধ চিন্তা (Groupthink)
    quick_introduction: |
      দলবদ্ধ চিন্তা হল এক ধরনের প্রবণতা যেখানে একটি সুসংহত গোষ্ঠী সমালোচনামূলক মূল্যায়নের চেয়ে ঐক্য এবং সম্প্রীতিকে বেশি অগ্রাধিকার দেয়। সদস্যরা ভিন্নমত দমন করে, আত্ম-নিয়ন্ত্রণ করে এবং গোষ্ঠীর অনুভূত মতামতের সাথে মানিয়ে নেয়। ঐক্যের আকাঙ্ক্ষা সর্বোত্তম সিদ্ধান্তের আকাঙ্ক্ষাকে ছাপিয়ে যায়।
    one_liner: সত্যের চেয়ে সম্প্রীতি—গোষ্ঠীগুলি সমালোচনামূলক মূল্যায়নের চেয়ে ঐকমত্যকে অগ্রাধিকার দেয়।
    try_this:
      - একজন প্রতিবাদী (devil's advocate) নিয়োগ করুন; ভিন্নমত প্রকাশকে প্রত্যাশিত এবং নিরাপদ করুন।
      - জিজ্ঞাসা করুন: আমরা কী বলছি না? আমরা যদি এই গোষ্ঠীতে না থাকতাম তবে কী বলতাম?
      - গোষ্ঠীগত সিদ্ধান্ত চূড়ান্ত করার আগে বাইরের দৃষ্টিভঙ্গি সন্ধান করুন।
    ask_yourself:
      - আমি কি সম্প্রীতি বজায় রাখার জন্য আত্ম-নিয়ন্ত্রণ করছি?
      - আমাদের ঐকমত্য কি প্রকৃত নাকি রাজি হওয়ার চাপের ফলাফল?
    in_more_detail: |
      আর্ভিং জ্যানিস বৈদেশিক নীতির ব্যর্থতা (বে অফ পিগস, ভিয়েতনাম) অধ্যয়ন করেছিলেন এবং নিদর্শনগুলি চিহ্নিত করেছিলেন: অপরাজেয়তার বিভ্রম, সম্মিলিত যুক্তিকরণ, সামঞ্জস্যের দিকে চাপ, আত্ম-নিয়ন্ত্রণ, ঐক্যের বিভ্রম এবং মাইন্ডগার্ড যারা গোষ্ঠীকে ভিন্নমত পোষণকারী তথ্য থেকে রক্ষা করে। উচ্চ সংহতি, বিচ্ছিন্নতা এবং চাপ দলবদ্ধ চিন্তাকে বাড়িয়ে তোলে।

      দলবদ্ধ চিন্তা খারাপ সিদ্ধান্তের দিকে নিয়ে যায় কারণ বিকল্পগুলি গুরুত্ব সহকারে বিবেচনা করা হয় না। ভিন্নমতকে আনুগত্যহীনতা হিসাবে দেখা হয়। গোষ্ঠী তার সঠিকতা সম্পর্কে অতিরিক্ত আত্মবিশ্বাসী হয় এবং ঝুঁকিগুলি কম অনুমান করে।
    why_this_is_important: |
      দলবদ্ধ চিন্তার স্বীকৃতি আপনাকে আরও ভাল সিদ্ধান্ত গ্রহণের জন্য শর্ত তৈরি করতে সহায়তা করে: ভিন্নমতকে উত্সাহিত করুন, বাইরের দৃষ্টিভঙ্গি আনুন এবং অকাল ঐকমত্য এড়িয়ে চলুন। এটি গোষ্ঠীগত বিপর্যয়মূলক ব্যর্থতা এড়াতে অপরিহার্য।
    when_to_use:
      - নেতৃত্ব (leadership)
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - সমস্যা_সমাধান (problem_solving)
      - সংঘাত_সমাধান (conflict_resolution)
    how_can_you_spot_it:
      pressure_for_consensus: |
        ভিন্নমত নিরুৎসাহিত বা শাস্তিপ্রাপ্ত হয়; একমত হওয়াকে পুরস্কৃত করা হয়।
      illusion_of_unanimity: |
        নীরবতাকে একমত হিসাবে ব্যাখ্যা করা হয় যখন এটি আত্ম-নিয়ন্ত্রণ হতে পারে।
      collective_rationalization: |
        গোষ্ঠী সতর্কবার্তা উপেক্ষা করে এবং তার দৃষ্টিভঙ্গি শক্তিশালী করে।
      mindguards: |
        সদস্যরা এমন তথ্য থেকে গোষ্ঠীকে রক্ষা করে যা ঐকমত্যকে চ্যালেঞ্জ করবে।
    examples:
      bay_of_pigs: |
        কেনেলির উপদেষ্টারা আক্রমণ পরিকল্পনার বিষয়ে সন্দেহ দমন করেছিলেন; এর ফল ছিল বিপর্যয়।
      corporate_decisions: |
        একটি নেতৃত্ব দল একটি একীভূতকরণের দিকে এগিয়ে যায় লাল পতাকা থাকা সত্ত্বেও কারণ কেউ নেতিবাচক হতে চায় না।
      product_launches: |
        একটি দল একটি ত্রুটিপূর্ণ পণ্য পাঠায় কারণ প্রত্যেকে পরিকল্পনায় বিনিয়োগ করেছে এবং কেউ উদ্বেগ প্রকাশ করেনি।
      boards: |
        বোর্ডের সদস্যরা সম্প্রীতি বজায় রাখতে ব্যবস্থাপনা প্রস্তাবগুলি অনুমোদন করে।
    real_world_implications: |
      দলবদ্ধ চিন্তা নীতিগত ব্যর্থতা, কর্পোরেট বিপর্যয় এবং সুযোগ হারানোর কারণ হয়। এটি উচ্চ-ঝুঁকিপূর্ণ, উচ্চ-চাপের পরিস্থিতিতে বিশেষভাবে বিপজ্জনক। এটি প্রতিরোধ করার জন্য ইচ্ছাকৃত কাঠামোগত হস্তক্ষেপের প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        ভিন্নমতের জন্য মনস্তাত্ত্বিক নিরাপত্তা তৈরি করুন। যারা উদ্বেগ প্রকাশ করে তাদের ধন্যবাদ জানান। ভিন্নমত প্রকাশ করার সময়Disagreeable না হওয়ার মডেল তৈরি করুন।
      collaborative_learning_initiative: |
        প্রতিবাদী, রেড টিম এবং "প্রি-মর্টেম" ব্যবহার করুন। বিদ্যমান মতামতের বিরুদ্ধে যুক্তি দেওয়ার জন্য কাউকে বলুন। বাইরের দৃষ্টিভঙ্গি আনুন। নেতা শেষ কথা বলবেন যাতে anchoring এড়ানো যায়।
    how_can_this_be_misapplied:
      false_dissent: |
        "নির্ধারিত ভিন্নমতাবলম্বী" তৈরি করা যারা প্রকৃতপক্ষে ভিন্নমত পোষণ করে না—গোষ্ঠী এটি বুঝতে পারে।
      excessive_conflict: |
        ধ্বংসাত্মক সংঘাত এবং পক্ষাঘাতের পর্যায়ে ভিন্নমতকে উত্সাহিত করা।
      dismissing_consensus: |
        সমস্ত ঐকমত্যকে দলবদ্ধ চিন্তা হিসাবে ধরে নেওয়া—কখনও কখনও গোষ্ঠী সঠিক হতে পারে।
      individualism: |
        এমনভাবে অতিরিক্ত সংশোধন করা যে কোনও গোষ্ঠীগত সিদ্ধান্ত সম্ভব নয়।
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: হ্যালো এফেক্ট
    quick_introduction: |
      হ্যালো এফেক্ট হলো একটি প্রবণতা যেখানে কোনো ব্যক্তির একটি ইতিবাচক বৈশিষ্ট্য বা ধারণা আমাদের তার সম্পর্কে সামগ্রিক বিচারকে প্রভাবিত করে। যদি আমরা কারো চেহারা পছন্দ করি, তাহলে আমরা ধরে নিতে পারি তারা সক্ষম। যদি আমরা একটি দক্ষতাকে প্রশংসা করি, তাহলে আমরা ধরে নিতে পারি তারা সবকিছুতেই ভালো। একটি ইতিবাচক বৈশিষ্ট্য অন্যদের উপর "হ্যালো" (আলো) ফেলে।
    one_liner: একটি ইতিবাচক বৈশিষ্ট্য একজন ব্যক্তির উপর আমাদের সম্পূর্ণ বিচারকে প্রভাবিত করে।
    try_this:
      - বৈশিষ্ট্যগুলোকে স্বাধীনভাবে মূল্যায়ন করুন—একটি শক্তি যেন অন্যগুলোকে বোঝাতে না পারে।
      - খেয়াল করুন কখন আকর্ষণ, ক্যারিশমা বা একটি সাফল্য আপনার দৃষ্টিভঙ্গিকে প্রভাবিত করছে।
      - প্রশ্ন করুন: যদি সেই একটি ইতিবাচক বৈশিষ্ট্য না থাকত, তাহলেও কি আমি এই ব্যক্তিকে একইভাবে বিচার করতাম?
    ask_yourself:
      - আমি কি একটি বৈশিষ্ট্য থেকে পুরো ব্যক্তির উপর সাধারণীকরণ করছি?
      - আমি কি দুর্বলতাগুলো দেখতে পেতাম না যদি আমি একটি শক্তির দ্বারা প্রভাবিত না হতাম?
    in_more_detail: |
      এডওয়ার্ড থর্নডাইক লক্ষ্য করেছিলেন যে সামরিক কর্মকর্তারা সৈন্যদের একটি বৈশিষ্ট্যে উচ্চ রেটিং দিলে তারা অন্য—এমনকি সম্পর্কহীন—বৈশিষ্ট্যেও তাদের উচ্চ রেটিং দেয়। আমরা নির্দিষ্ট থেকে সাধারণীকরণ করি। আকর্ষণ, ক্যারিশমা বা একটি ক্ষেত্রে সাফল্য একটি "হ্যালো" তৈরি করে যা ছড়িয়ে পড়ে।

      এর বিপরীত—একটি নেতিবাচক বৈশিষ্ট্য সবকিছুকে প্রভাবিত করে—তাকে কখনও কখনও "হর্ন এফেক্ট" বলা হয়। উভয়ই অন্যায় সাধারণীকরণের রূপ। হ্যালো এফেক্ট নিয়োগ, কর্মক্ষমতা পর্যালোচনা এবং দৈনন্দিন ধারণাগুলিকে প্রভাবিত করে।
    why_this_is_important: |
      হ্যালো এফেক্ট চিনতে পারা আপনাকে আরও সঠিক মূল্যায়ন করতে এবং অতিরিক্ত সাধারণীকরণ এড়াতে সাহায্য করে। এটি ন্যায্য নিয়োগ, কর্মক্ষমতা ব্যবস্থাপনা এবং সম্পর্ক মূল্যায়নের জন্য অপরিহার্য। একটি শক্তি মানে সব শক্তি নয়।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - নেতৃত্ব
      - সম্পর্ক_গড়ে_তোলা
      - নিয়োগ
    how_can_you_spot_it:
      trait_spillover: |
        একটি ইতিবাচক বৈশিষ্ট্য সম্পর্কহীন বৈশিষ্ট্যগুলির বিচারকে প্রভাবিত করে।
      attractiveness_bias: |
        আকর্ষণীয় ব্যক্তিদের যোগ্যতা, বিশ্বস্ততা ইত্যাদির ক্ষেত্রে উচ্চ রেটিং দেওয়া হয়।
      success_generalization: |
        একটি ক্ষেত্রে সাফল্য অন্য ক্ষেত্রে Assume (ধারণা) করা যোগ্যতা তৈরি করে।
      first_impression_dominance: |
        প্রথম ইতিবাচক ধারণা পরবর্তী সমস্ত মূল্যায়নকে প্রভাবিত করে।
    examples:
      hiring: |
        একজন প্রার্থী যিনি স্পষ্টভাবে কথা বলেন এবং পছন্দের, তাকে প্রযুক্তিগতভাবে শক্তিশালী বলে ধরে নেওয়া হয়—এমনকি যদি দক্ষতা সম্পর্কহীনও হয়।
      performance_reviews: |
        একটি standout (অসাধারণ) প্রকল্প সমস্ত মাত্রায় উচ্চ রেটিং তৈরি করে।
      politics: |
        একজন রাজনীতিবিদ এর ক্যারিশমা নীতি সংক্রান্ত বিষয়ে Assume (ধারণা) যোগ্যতা তৈরি করে।
      branding: |
        একটি কোম্পানির একটি পণ্যে সাফল্য সমস্ত পণ্যের Assume (ধারণা) গুণমান তৈরি করে।
    real_world_implications: |
      হ্যালো এফেক্ট নিয়োগ, কর্মক্ষমতা মূল্যায়ন এবং বিনিয়োগের সিদ্ধান্তগুলিকে বিকৃত করে। এটি আকর্ষণীয়, স্পষ্টভাষী এবং ইতিমধ্যে-সফলদের পক্ষে। এটি কমাতে কাঠামোগত মূল্যায়ন এবং মাত্রার পৃথকীকরণ প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        সামগ্রিক ধারণার পরিবর্তে নির্দিষ্ট মাত্রার উপর ভিত্তি করে ব্যক্তিদের মূল্যায়ন করুন। খেয়াল রাখুন কখন একটি ইতিবাচক বৈশিষ্ট্য অন্যদের সম্পর্কে আপনার বিচারকে প্রভাবিত করছে। প্রমাণ সন্ধান করুন যা আপনার ধারণার বিরুদ্ধে যায়।
      collaborative_learning_initiative: |
        কাঠামোগত সাক্ষাৎকার এবং মূল্যায়ন ব্যবহার করুন যা মাত্রাকে স্বাধীনভাবে রেট করে। মূল্যায়নকারীদের মধ্যে রেটিংগুলিকে সামঞ্জস্য করুন। সামগ্রিক "gut feel" (স্বজ্ঞা) এর উপর নির্ভরতা হ্রাস করুন।
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        প্রতিটি ইতিবাচক ধারণা হ্যালো এফেক্ট নয়—কখনও কখনও মানুষ মাত্রায় সত্যিই শক্তিশালী হয়।
      false_objectivity: |
        আমরা হ্যালো এফেক্ট সম্পূর্ণরূপে দূর করতে পারি—এটি সর্বব্যাপী এবং আংশিকভাবে স্বয়ংক্রিয়।
      overcorrection: |
        বিপরীত দিকে যাওয়া এবং আকর্ষণীয় বা ক্যারিশম্যাটিক ব্যক্তিদের কম যোগ্য বলে মনে করা।
      stereotyping: |
        বৈধ ইতিবাচক বৈশিষ্ট্যগুলি বাতিল করার জন্য "হ্যালো এফেক্ট" ব্যবহার করা।
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: হ্যানলনের ক্ষুর (Hanlon's Razor)
    quick_introduction: |
      হ্যানলনের ক্ষুর বলে: "যা বোকামি দিয়ে ভালোভাবে ব্যাখ্যা করা যায়, তাকে বিদ্বেষের উপর চাপানো উচিত নয়।" অন্য কথায়, যখন অযোগ্যতা, অবহেলা বা অজ্ঞতা আচরণকে ব্যাখ্যা করতে পারে, তখন খারাপ উদ্দেশ্য অনুমান করবেন না।
    one_liner: বিদ্বেষ অনুমান করবেন না যখন অযোগ্যতা বা অবহেলা এটি ব্যাখ্যা করতে পারে।
    try_this:
      - যখন কেউ আপনাকে হতাশ করে, তখন জিজ্ঞাসা করুন: এটি কি ভুল বা অজ্ঞতা দ্বারা ব্যাখ্যা করা যেতে পারে?
      - খারাপ উদ্দেশ্য অনুমান করার আগে সহজ ব্যাখ্যায় ডিফল্ট করুন।
      - লক্ষ্য করুন যখন আপনি "তারা আমাকে আঘাত করতে চেয়েছিল" এই ধারণায় ঝাঁপিয়ে পড়ছেন।
    ask_yourself:
      - যা বোকামি দিয়ে ব্যাখ্যা করা যেতে পারে, তাকে কি আমি বিদ্বেষের উপর চাপিয়ে দিচ্ছি?
      - তাদের অবস্থানে থাকলে আমি কি একই সন্দেহের সুবিধা পেতাম?
    in_more_detail: |
      এই নীতিটি মানুষকে সন্দেহের সুবিধা দেওয়ার জন্য উৎসাহিত করে। যখন কারো কাজ আপনাকে ক্ষতিগ্রস্থ করে বা হতাশ করে, তখন প্রায়শই ডিফল্ট অনুমান হল যে তারা আপনাকে আঘাত করতে চেয়েছিল। হ্যানলনের ক্ষুর প্রস্তাব করে যে এই ধরনের অনেক কাজ অসাবধানতা, তথ্যের অভাব বা খারাপ সম্পাদন থেকে উদ্ভূত হয়—মন্দ উদ্দেশ্য থেকে নয়।

      এর মানে এই নয় যে বিদ্বেষ কখনো বিদ্যমান থাকে না। এর অর্থ হল যখন একটি সহজ ব্যাখ্যা উপযুক্ত হয় তখন আমাদের সবচেয়ে খারাপ ব্যাখ্যায় ঝাঁপিয়ে পড়া উচিত নয়। ক্ষুরishness paranoia কমায়, সম্পর্ক উন্নত করে এবং সমস্যাগুলিতে আরও গঠনমূলকভাবে প্রতিক্রিয়া জানাতে আমাদের সাহায্য করে।
    why_this_is_important: |
      হ্যানলনের ক্ষুর প্রয়োগ করলে দ্বন্দ্ব কমে, সম্পর্ক রক্ষা হয় এবং দোষারোপ করার পরিবর্তে সমস্যা সমাধানে শক্তি নিবদ্ধ থাকে। এটি আপনাকে এই অনুমান থেকে রক্ষা করে যে সবাই আপনার ক্ষতি করতে চাইছে।
    when_to_use:
      - সংঘাত_সমাধান (conflict_resolution)
      - নেতৃত্ব (leadership)
      - সম্পর্ক_গড়ে_তোলা (relationship_building)
      - সিদ্ধান্ত_গ্রহণ (decision_making)
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        আপনি অবিলম্বে একটি নেতিবাচক ফলাফলকে ইচ্ছাকৃত ক্ষতি হিসাবে ব্যাখ্যা করেন।
      personalizing_mistakes: |
        যখন কিছু ভুল হয়, আপনি ধরে নেন এটি ব্যক্তিগতভাবে আপনার দিকে নির্দেশিত ছিল।
      ignoring_alternative_explanations: |
        আপনি অযোগ্যতা, ভুল বোঝাবুঝি বা অবহেলাকে সম্ভাবনা হিসাবে বিবেচনা করেন না।
      escalation_before_inquiry: |
        আপনি কী ঘটেছে তা জিজ্ঞাসা করার আগে রাগ বা প্রতিশোধ নিয়ে প্রতিক্রিয়া জানান।
    examples:
      email_tone: |
        একটি রুক্ষ ইমেলকে প্যাসিভ-আগ্রাসী বলে ধরে নেওয়া যখন প্রেরক কেবল তাড়াহুড়োয় থাকতে পারে বা টোনে খারাপ হতে পারে।
      missed_deadline: |
        সহকর্মীর দেরিতে ডেলিভারিকে নাশকতা বলে ব্যাখ্যা করা যখন তারা অতিরিক্ত প্রতিশ্রুতিবদ্ধ হতে পারে বা বাধার সম্মুখীন হতে পারে।
      policy_decisions: |
        আপনার অপছন্দের একটি কোম্পানি নীতি কর্মীদের ক্ষতি করার জন্য ডিজাইন করা হয়েছিল বলে ধরে নেওয়া যখন এটি অন্য একটি সমস্যার সমাধান করার একটি আনাড়ি প্রচেষ্টা হতে পারে।
      traffic: |
        অন্য চালক আপনাকে ইচ্ছাকৃতভাবে কেটেছে বলে ধরে নেওয়া যখন তারা আপনাকে দেখতে না পেয়ে থাকতে পারে।
    real_world_implications: |
      হ্যানলনের ক্ষুর কর্মক্ষেত্রের সংস্কৃতি উন্নত করে, মামলা কমায় এবং সংঘাতের সমাধান আরও কার্যকর করে তোলে। অতিরিক্ত ব্যবহার অবহেলাকে উৎসাহিত করতে পারে; কম ব্যবহার অপ্রয়োজনীয় দ্বন্দ্ব তৈরি করে।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ আপনাকে হতাশ করে, তখন খারাপ উদ্দেশ্য অনুমান করার আগে স্পষ্টীকরণ চান। উদার ব্যাখ্যায় ডিফল্ট করে সম্পর্ক রক্ষা করুন।
      collaborative_learning_initiative: |
        দলগুলিতে, এমন একটি সংস্কৃতি তৈরি করুন যেখানে ভুলগুলি প্রমাণিত না হওয়া পর্যন্ত অনিচ্ছাকৃত বলে ধরে নেওয়া হয়। দোষারোপের পরিবর্তে সিস্টেম এবং প্রক্রিয়ার উপর ফোকাস করুন।
    how_can_this_be_misapplied:
      excusing_negligence: |
        বারবার অযোগ্যতা বা অবহেলাকে "বিদ্বেষ নয়" বলে খারিজ করে দেওয়া যখন এটি জবাবদিহিতা দাবি করে।
      ignoring_genuine_malice: |
        ক্ষুরishness এত কঠোরভাবে প্রয়োগ করা যে আপনি আসল খারাপ অভিনেতা বা বিষাক্ত আচরণগুলি মিস করেন।
      avoiding_difficult_conversations: |
        কর্মক্ষমতা সংক্রান্ত সমস্যাগুলি মোকাবেলা না করার অজুহাত হিসাবে হ্যানলনের ক্ষুর ব্যবহার করা।
      gaslighting_victims: |
        যে ব্যক্তিকে সত্যিই অন্যায় করা হয়েছে তাকে বলা যে তারা "বিদ্বেষ অনুমান করছে" যখন বিদ্বেষ উপস্থিত ছিল।
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: হথর্ন প্রভাব
    quick_introduction: |
      হথর্ন প্রভাব হল মানুষের আচরণ পরিবর্তনের প্রবণতা যখন তারা জানে যে তাদের পর্যবেক্ষণ করা হচ্ছে বা অধ্যয়ন করা হচ্ছে। পর্যবেক্ষণের কাজটি নিজেই পরিবর্তন তৈরি করতে পারে—পরীক্ষিত হস্তক্ষেপের কারণে নয়। মানুষ তাদের প্রাপ্ত মনোযোগের প্রতি প্রতিক্রিয়া জানায়।
    one_liner: পর্যবেক্ষণ আচরণ পরিবর্তন করে—মনোযোগ নিজেই প্রভাব তৈরি করতে পারে।
    try_this:
      - কোনো হস্তক্ষেপের মূল্যায়ন করার সময়, বিবেচনা করুন যে পর্যবেক্ষণ ফলাফল তৈরি করছে কিনা।
      - মনে রাখবেন যে মনোযোগ এবং মূল্যবান বোধ করা কর্মক্ষমতা উন্নত করতে পারে।
      - পর্যবেক্ষণের কারণে পরিবর্তন হলে নির্দিষ্ট হস্তক্ষেপের কারণে পরিবর্তনের জন্য সতর্ক হন।
    ask_yourself:
      - এই উন্নতি কি হস্তক্ষেপের কারণে না পর্যবেক্ষণের কারণে?
      - যদি আমরা মনোযোগ দেওয়া বন্ধ করি তাহলে ফলাফল টিকে থাকবে কি?
    in_more_detail: |
      হথর্ন ওয়ার্কস প্ল্যান্টে, গবেষকরা দেখতে পান যে যখন তারা আলোর পরিবর্তন করেছিলেন তখন উৎপাদনশীলতা উন্নত হয়েছিল—এবং যখন তারা এটিকে আগের অবস্থায় ফিরিয়ে নিয়ে এসেছিলেন তখনও। মনে হচ্ছে যে উন্নতি নির্দিষ্ট হস্তক্ষেপের কারণে নয়, বরং মনোযোগ এবং পর্যবেক্ষণের কারণে হয়েছিল। পরবর্তীকালে পুনরায় বিশ্লেষণ করে দেখা গেছে যে এই প্রভাবটি বেশি বাড়িয়ে বলা হতে পারে, তবে ধারণাটি দরকারী রয়ে গেছে: অধ্যয়ন করা হচ্ছে বলে আচরণ পরিবর্তন হয়।

      হথর্ন প্রভাব গবেষণা এবং মূল্যায়নকে জটিল করে তোলে। এটি হস্তক্ষেপের আপাত প্রভাবকে ফুলিয়ে-ফাঁপিয়ে দেখাতে পারে। এটি আরও ইঙ্গিত দেয় যে মনোযোগ এবং মূল্যবান বোধ করা কর্মক্ষমতা উন্নত করতে পারে—ব্যবস্থাপনার জন্য একটি শিক্ষা।
    why_this_is_important: |
      হথর্ন প্রভাব বোঝা আপনাকে গবেষণার ফলাফল ব্যাখ্যা করতে, আরও ভাল পরীক্ষা ডিজাইন করতে এবং চিনতে সাহায্য করে যে কেবল মনোযোগই পরিবর্তন আনতে পারে। ব্যবস্থাপনার ক্ষেত্রে, এটি ইঙ্গিত দেয় যে মানুষের প্রতি মনোযোগ দেওয়া নির্দিষ্ট হস্তক্ষেপের মতোই গুরুত্বপূর্ণ হতে পারে।
    when_to_use:
      - নেতৃত্ব
      - সিদ্ধান্ত_গ্রহণ
      - শিক্ষা
      - সমস্যা_সমাধান
    how_can_you_spot_it:
      observation_induced_change: |
        মানুষ যখন জানে যে তাদের দেখা হচ্ছে বা অধ্যয়ন করা হচ্ছে তখন আচরণ পরিবর্তিত হয়।
      attention_effect: |
        মনোযোগ দেওয়ার কাজটি কেবল নির্দিষ্ট পরিবর্তন নয়, উন্নতিও তৈরি করে।
      placebo_analog: |
        একটি প্লেসিবোর মতো, অধ্যয়ন করার "চিকিৎসা" প্রভাব ফেলতে পারে।
      short_term_improvement: |
        পর্যবেক্ষণ শেষ হলে উন্নতি ম্লান হয়ে যেতে পারে।
    examples:
      workplace_studies: |
        একটি অধ্যয়নের সময় উৎপাদনশীলতা বৃদ্ধি পায়—এটি কি নতুন প্রক্রিয়া নাকি কেউ দেখছে?
      medical_trials: |
        প্লেসবো গ্রুপগুলোর উন্নতি হয়—আংশিকভাবে কারণ তারা মনোযোগ পাচ্ছে।
      education: |
        শিক্ষার্থীরা যখন গবেষকরা উপস্থিত থাকেন তখন ভাল পারফর্ম করে—"পর্যবেক্ষক প্রভাব"।
      management: |
        ব্যবস্থাপনা যখন মনোযোগ দেয় তখন দলগুলোর উন্নতি হয়—এটি কি নতুন উদ্যোগ নাকি মনোযোগের কারণে?
    real_world_implications: |
      হথর্ন প্রভাব গবেষণার বৈধতা এবং প্রোগ্রাম মূল্যায়নের উপর প্রভাব ফেলে। এটি হস্তক্ষেপের প্রভাবকে বেশি অনুমান করার কারণ হতে পারে। এটি একটি ইতিবাচক শিক্ষাও দেয়: মনোযোগ এবং অধ্যয়ন করার অনুভূতি উন্নতিকে অনুপ্রাণিত করতে পারে—সুতরাং যত্ন এবং দৃশ্যমানতা গুরুত্বপূর্ণ।
    professional_application:
      networking_and_relationship_building: |
        মানুষের প্রতি মনোযোগ দেওয়া তাদের কর্মক্ষমতা উন্নত করতে পারে—হথর্ন প্রভাব ইঙ্গিত দেয় যে দেখা এবং মূল্যবান বোধ করা গুরুত্বপূর্ণ। এটি ইতিবাচকভাবে ব্যবহার করুন: নিয়মিত চেক-ইন, দৃশ্যমানতা এবং স্বীকৃতি।
      collaborative_learning_initiative: |
        হস্তক্ষেপের মূল্যায়ন করার সময়, নিয়ন্ত্রণ গোষ্ঠী ব্যবহার করুন এবং বিবেচনা করুন যে উন্নতিগুলি হস্তক্ষেপের কারণে না মনোযোগের কারণে হচ্ছে। হথর্ন প্রভাব আপাত সাফল্যকে বাড়িয়ে তুলতে পারে।
    how_can_this_be_misapplied:
      surveillance_justification: |
        "হথর্ন প্রভাব" ব্যবহার করে অবিরাম নজরদারী ন্যায্যতা প্রমাণ করা—পর্যবেক্ষণ বিশ্বাস এবং অভ্যন্তরীণ প্রেরণা কমাতে পারে।
      dismissing_improvements: |
        অধ্যয়নের সময় সমস্ত উন্নতিকে হথর্ন বলে ধরে নেওয়া—কখনও কখনও হস্তক্ষেপগুলি সত্যিই কাজ করে।
      overgeneralization: |
        মূল হথর্ন অধ্যয়ন নিয়ে প্রশ্ন তোলা হয়েছে; প্রভাবটি একবার ভাবা চেয়ে ছোট বা ভিন্ন হতে পারে।
      manipulation: |
        আচরণ ম্যানিপুলেট করার জন্য মিথ্যা "পর্যবেক্ষণ" তৈরি করা।
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: hindsight_bias
    quick_introduction: |
      Hindsight bias (or the "I knew it all along" effect) is the tendency to believe,
      after an event has occurred, that we would have predicted or expected it. We
      reconstruct the past to make outcomes seem more inevitable than they were.
    one_liner: After the fact, we think we knew it all along.
    try_this:
      - Before judging past decisions, ask: What did they know at the time?
      - Record your predictions before outcomes—compare later.
      - Notice when you're making the past seem more inevitable than it was.
    ask_yourself:
      - Am I judging with information that wasn't available then?
      - Did I actually predict this, or does it just feel obvious now?
    in_more_detail: |
      Once we know the outcome, it feels obvious. We forget the uncertainty we felt
      beforehand. This bias distorts learning—we think we "knew" something when we
      didn't, so we don't update our models. It also leads to unfair blame: "They
      should have seen it coming" when the future was genuinely uncertain.

      Hindsight bias affects post-mortems, legal judgments, and historical analysis.
      We judge past decisions with information that wasn't available at the time.
    why_this_is_important: |
      Recognizing hindsight bias improves learning from outcomes, fairer evaluation
      of decisions, and more accurate risk assessment. It prevents false confidence
      in our predictive abilities.
    when_to_use:
      - decision_making
      - learning
      - risk_assessment
      - leadership
    how_can_you_spot_it:
      inevitability_feeling: |
        After an event, it feels like it "had to" happen.
      reconstructed_certainty: |
        We remember being more certain before the event than we actually were.
      blame_for_failure: |
        "They should have known" when the outcome was genuinely uncertain.
      undervaluing_luck: |
        Attributing outcomes to skill or foresight when luck played a role.
    examples:
      investing: |
        "I knew the market would crash" after it crashes—when you didn't act on that
        "knowledge" beforehand.
      project_failures: |
        "We should have seen the risks" in a post-mortem when the risks were genuinely
        ambiguous.
      elections: |
        After a surprise result, pundits explain why it was "obvious" in hindsight.
      medical: |
        "The signs were there" when diagnosing a rare condition after the fact.
    real_world_implications: |
      Hindsight bias distorts legal liability, performance evaluation, and learning.
      It makes us overconfident in our judgment and unfair to those who made
      reasonable decisions with limited information.
    professional_application:
      networking_and_relationship_building: |
        When evaluating others' past decisions, consciously separate what was known
        then from what you know now. Avoid "I told you so" when you didn't actually
        predict the outcome.
      collaborative_learning_initiative: |
        In post-mortems, use "pre-mortem" or "decision journal" techniques to
        capture uncertainty at the time of the decision. Compare actual uncertainty
        to hindsight reconstruction.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Dismissing every failure as "unpredictable" when some were foreseeable.
      no_accountability: |
        Using hindsight bias to avoid holding people accountable for negligence.
      false_uncertainty: |
        Overcorrecting to believe we can never predict anything.
      undermining_learning: |
        Refusing to extract lessons because "hindsight is 20/20"—we can still learn
        from outcomes.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - overconfidence
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: হাইপারবোলিক ডিসকাউন্টিং
    quick_introduction: |
      হাইপারবোলিক ডিসকাউন্টিং হল বর্তমানের ছোট পুরষ্কারের চেয়ে ভবিষ্যতের বড় পুরষ্কারকে কম মূল্য দেওয়ার প্রবণতা—এবং যুক্তিসঙ্গত মডেলের ভবিষ্যদ্বাণীর চেয়ে ভবিষ্যতে আরও বেশি ছাড় দেওয়া। আমরা বর্তমানকে অতিরিক্ত মূল্যায়ন করি এবং ভবিষ্যতের গুরুত্বকে অসঙ্গতভাবে অবমূল্যায়ন করি।
    one_liner: আমরা বড় পুরস্কারের চেয়ে ছোট পুরস্কারকে অগ্রাধিকার দিই—এবং ভবিষ্যতকে অসঙ্গতভাবে ছাড় দিই।
    try_this:
      - পূর্ব-প্রতিশ্রুতি: শান্ত অবস্থায় থাকাকালীন আপনার ভবিষ্যতের জন্য পছন্দ করুন।
      - 'পুনরায় ব্যাখ্যা করুন: "আমি কি এটা ১০ মিনিট পরে চাইব? ১০ মাস পরে?" অসঙ্গতি প্রকাশ করার জন্য।'
      - ভাল পছন্দের জন্য আপনার ভবিষ্যতের নিজেকে আবদ্ধ করতে প্রতিশ্রুতিবদ্ধ ডিভাইস ব্যবহার করুন।
    ask_yourself:
      - আমি কি আমার ভবিষ্যতের কথা ভেবে বর্তমানকে অতিরিক্ত মূল্যায়ন করছি?
      - যদি পুরস্কার এক দিনের জন্য বিলম্বিত হয় তবে কি আমি এই পছন্দটি করতাম? এক বছরের জন্য?
    in_more_detail: |
      আমরা হয়তো এক বছরে ১০০ টাকার পরিবর্তে আজ ৫০ টাকা পছন্দ করতে পারি, কিন্তু আবার দুই বছরে ১০০ টাকার পরিবর্তে এক বছরে ৫০ টাকা পছন্দ করতে পারি—যদিও এটি অসঙ্গত। আমাদের ডিসকাউন্টের হার ধ্রুবক নয়; এটি হাইপারবোলিক। নিকট ভবিষ্যতকে অনেক বেশি ছাড় দেওয়া হয়; দূর ভবিষ্যতকে কম ছাড় দেওয়া হয়। এটি দীর্ঘসূত্রিতা, আসক্তি এবং সঞ্চয়ের অভাব ব্যাখ্যা করে।

      বর্তমান পক্ষপাতিত্ব একটি সম্পর্কিত ধারণা: আমরা বর্তমান মুহূর্তকে
      অসামঞ্জস্যপূর্ণভাবে বেশি গুরুত্ব দিই। হাইপারবোলিক ডিসকাউন্টিং ব্যাখ্যা করে কেন আমরা প্রতিশ্রুতি করি যা আমরা রাখি না এবং কেন দীর্ঘমেয়াদী পরিকল্পনা করা কঠিন।
    why_this_is_important: |
      হাইপারবোলিক ডিসকাউন্টিং বোঝা আপনাকে ভাল প্রণোদনা ডিজাইন করতে, আপনার ভবিষ্যতের জন্য প্রতিশ্রুতিবদ্ধ হতে এবং স্বল্পমেয়াদী ফাঁদ এড়াতে সাহায্য করে।
      এটি ব্যাখ্যা করে কেন আমরা দীর্ঘসূত্রিতা করি এবং কেন আমরা দীর্ঘমেয়াদী লক্ষ্যগুলির সাথে সংগ্রাম করি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - কর্মজীবনের_সিদ্ধান্ত
      - বিনিয়োগ
      - নেতৃত্ব
    how_can_you_spot_it:
      present_preference: |
        বিলম্বিত, বৃহত্তর পুরস্কারের চেয়ে তাৎক্ষণিক সন্তুষ্টিকে বেছে নেওয়া।
      inconsistent_time_preferences: |
        সময় অতিবাহিত হওয়ার সাথে সাথে বিপরীত হওয়া পছন্দগুলি (যেমন, আমরা আগামীকাল ডায়েট করতে চাই কিন্তু আজ খেতে চাই)।
      commitment_failures: |
        ভবিষ্যৎ যখন বর্তমানে পরিণত হয় তখন আমরা যে পরিকল্পনাগুলি অনুসরণ করি না তা তৈরি করা।
      procrastination: |
        তাৎক্ষণিক স্বাচ্ছন্দ্যের জন্য গুরুত্বপূর্ণ কাজগুলি বিলম্বিত করা।
    examples:
      savings: |
        অবসরের জন্য সঞ্চয় করার পরিবর্তে এখনই খরচ করা বেছে নেওয়া—ভবিষ্যৎ বিমূর্ত মনে হয়।
      health: |
        আজ ব্যায়াম এড়িয়ে আরামের জন্য, যদিও আমরা জানি আমরা অনুতপ্ত হব—আগামীকালের অনুতাপ ছাড় দেওয়া হয়।
      addiction: |
        দীর্ঘমেয়াদী স্বাস্থ্যের চেয়ে তাৎক্ষণিক আনন্দ বেছে নেওয়া।
      deadlines: |
        সময়সীমা ঘনিয়ে না আসা পর্যন্ত কিছুই না করা—তারপর "বর্তমান" সময়সীমাকে অন্তর্ভুক্ত করে এবং আমরা কাজ করি।
    real_world_implications: |
      হাইপারবোলিক ডিসকাউন্টিং সঞ্চয়, স্বাস্থ্য, শিক্ষা এবং আসক্তিকে প্রভাবিত করে। এটি আত্ম-নিয়ন্ত্রণের অনেক ব্যর্থতা ব্যাখ্যা করে। প্রতিশ্রুতিবদ্ধ ডিভাইস (যেমন, স্বয়ংক্রিয় সঞ্চয়, জবাবদিহিতা) ভবিষ্যতের পছন্দগুলিকে সীমাবদ্ধ করে সাহায্য করতে পারে।
    professional_application:
      networking_and_relationship_building: |
        ভবিষ্যতের প্রতিশ্রুতির জন্য জিজ্ঞাসা করার সময়, জবাবদিহিতা তৈরি করুন যা ভবিষ্যতকে "বর্তমান" করে তোলে (যেমন, চেক-ইন, সময়সীমা)। কাঠামো ছাড়া লোকেদের অনুসরণ করবে বলে আশা করবেন না।
      collaborative_learning_initiative: |
        প্রতিশ্রুতিবদ্ধ ডিভাইস ব্যবহার করুন: জনসাধারণের প্রতিশ্রুতি, সময়সীমার প্রতি পূর্ব-প্রতিশ্রুতি, এবং এমন কাঠামো যা দীর্ঘমেয়াদী লক্ষ্যগুলিকে আরও তাৎক্ষণিক মনে করিয়ে দেয়। দীর্ঘ প্রকল্পগুলিকে ছোট মাইলফলকে ভাগ করুন।
    how_can_this_be_misapplied:
      excessive_control: |
        "সাহায্য" করার নামে মানুষের পছন্দের উপর অতিরিক্ত নিয়ন্ত্রণ আরোপ করা।
      paternalism: |
        আমরা জানি কী অন্যদের দীর্ঘমেয়াদী স্বার্থের জন্য সেরা বলে অনুমান করা।
      ignoring_present_needs: |
        বিমূর্ত ভবিষ্যতের সুবিধার জন্য বৈধ বর্তমান চাহিদা উপেক্ষা করা।
      one_size_fits_all: |
        মানুষ ডিসকাউন্ট হারে ভিন্ন হয়; সবার একই প্রতিশ্রুতিবদ্ধ ডিভাইস দরকার হয় না।
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: নিয়ন্ত্রণের বিভ্রম
    quick_introduction: |
      নিয়ন্ত্রণের বিভ্রম হলো ফলাফলকে প্রভাবিত করার ক্ষমতাকে অতিরিক্ত মূল্যায়ন করার প্রবণতা। আমরা বিশ্বাস করি যে আমাদের যা নিয়ন্ত্রণ আছে তার চেয়ে বেশি আছে—এগুলো এলোমেলো ঘটনা, অন্য মানুষ এবং জটিল ব্যবস্থার উপর। আমরা সহ-সম্পর্ককে কার্যকারণ এবং কাজকে প্রভাবের সাথে গুলিয়ে ফেলি।
    one_liner: আমরা ফলাফলের উপর আমাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করি—বিশেষ করে এলোমেলো ফলাফল।
    try_this:
      - জিজ্ঞাসা করুন: যদি আমি কিছুই না করতাম তবে কী হত? আমার কাজ কি আসলে ফলাফল তৈরি করছে?
      - আপনি যা নিয়ন্ত্রণ করতে পারেন এবং যা করতে পারেন না তার মধ্যে পার্থক্য করুন।
      - লক্ষ্য করুন কখন আপনি আপনার কাজকে এলোমেলো ফলাফলের সাথে কুসংস্কারপূর্ণভাবে যুক্ত করছেন।
    ask_yourself:
      - আমি কি সহ-সম্পর্ককে কার্যকারণ দিয়ে গুলিয়ে ফেলছি?
      - আমি যদি কাজ না করতাম তবে কি ফলাফল ভিন্ন হত?
    in_more_detail: |
      মানুষ লটারিতে জেতার ব্যাপারে বেশি আত্মবিশ্বাসী বোধ করে যখন তারা তাদের নিজস্ব নম্বর বেছে নেয়—যদিও এটি জেতার সম্ভাবনাকে পরিবর্তন করে না। যখন আমরা উচ্চ সংখ্যা চাই তখন আমরা ডাইস আরও জোরে রোল করি। আমরা মনে করি আমাদের আচার-অনুষ্ঠান বা আচরণ এমন ফলাফলকে প্রভাবিত করে যা আসলে এলোমেলো বা আমাদের বাইরের কারণগুলির দ্বারা নির্ধারিত। এই বিভ্রমটি আরামদায়ক; এটি উদ্বেগ হ্রাস করে। কিন্তু এটি অতিরিক্ত আত্মবিশ্বাস এবং খারাপ সিদ্ধান্তের দিকে নিয়ে যেতে পারে।

      যখন আমরা প্রক্রিয়ার সাথে জড়িত থাকি, যখন আমাদের প্রাথমিক সাফল্য থাকে এবং যখন কাজটি পরিচিত হয় তখন এই বিভ্রমটি আরও শক্তিশালী হয়। এটি বিনিয়োগ, ব্যবস্থাপনা এবং দৈনন্দিন জীবনে প্রভাব ফেলে।
    why_this_is_important: |
      নিয়ন্ত্রণের বিভ্রমকে চিনতে পারা আপনাকে আপনার প্রত্যাশা পরিমাপ করতে, অতিরিক্ত আত্মবিশ্বাস এড়াতে এবং প্রচেষ্টা সেখানে মনোনিবেশ করতে সাহায্য করে যেখানে এটি আসলে গুরুত্বপূর্ণ। এটি ব্যাখ্যা করে কেন আমরা কুসংস্কারপূর্ণ আচরণে লেগে থাকি এবং আমাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - বিনিয়োগ
      - নেতৃত্ব
    how_can_you_spot_it:
      overestimated_influence: |
        বিশ্বাস করা যে আমাদের কাজ ফলাফলের উপর প্রভাব ফেলে যখন আসলে তা করে না।
      ritual_superstition: |
        আচরণ যা আমরা বিশ্বাস করি ফলাফলকে প্রভাবিত করে (ভাগ্যবান শার্ট, খেলার আগে রুটিন) যখন আসলে তা করে না।
      choice_illusion: |
        অনুভব করা যে পছন্দ আমাদের নিয়ন্ত্রণ দেয় যখন আসলে পছন্দটি ফলাফলের উপর প্রভাব ফেলে না।
      action_bias: |
        "অপেক্ষা" করার চেয়ে "কিছু করা" পছন্দ করা এমনকি যখন কাজটি সহায়ক না হয়।
    examples:
      gambling: |
        লটারির নম্বর বাছাই করা এলোমেলো নির্বাচনের চেয়ে বেশি নিয়ন্ত্রণযোগ্য বলে মনে হয়—সম্ভাবনা একই।
      investing: |
        সক্রিয় ব্যবসায়ীরা বাজারকে হারানোর ক্ষমতাকে অতিরিক্ত মূল্যায়ন করে; বেশিরভাগই খরচের পরে কম পারফর্ম করে।
      management: |
        নেতারা প্রতিষ্ঠানের ফলাফলের উপর তাদের প্রভাবকে অতিরিক্ত মূল্যায়ন করে; অনেক কারণ তাদের নিয়ন্ত্রণের বাইরে থাকে।
      sports: |
        ভক্তরা বিশ্বাস করে যে তাদের উল্লাস খেলাকে প্রভাবিত করে; খেলোয়াড়দের ভাগ্যবান আচার-অনুষ্ঠান থাকে।
    real_world_implications: |
      নিয়ন্ত্রণের বিভ্রম ঝুঁকি গ্রহণ, ব্যর্থ প্রচেষ্টায় অধ্যবসায় এবং ফলাফলের কৃতিত্বের উপর প্রভাব ফেলে। এটি কাজকে অনুপ্রাণিত করতে পারে (কখনও কখনও দরকারী) তবে অপচয় এবং অতিরিক্ত আত্মবিশ্বাসের দিকেও নিয়ে যেতে পারে। ক্যালিব্রেশন সিদ্ধান্ত গ্রহণের মান উন্নত করে।
    professional_application:
      networking_and_relationship_building: |
        আপনি কী নিয়ন্ত্রণ করতে পারেন এবং কী করতে পারেন না তা চিনুন। প্রভাবিত করা যায় এমন বিষয়গুলির উপর শক্তি মনোনিবেশ করুন। যে ফলাফলগুলি আপনি তৈরি করেননি তার জন্য কৃতিত্ব নেবেন না—বা যেগুলি আপনি প্রতিরোধ করতে পারেননি তার জন্য দোষ দেবেন না।
      collaborative_learning_initiative: |
        পরিকল্পনা করার সময়, নিয়ন্ত্রণযোগ্য এবং অনিয়ন্ত্রিত বিষয়গুলির মধ্যে পার্থক্য করুন। প্রাথমিক জয় থেকে মিথ্যা আত্মবিশ্বাস এড়িয়ে চলুন। প্রত্যাশা পরিমাপ করতে সম্ভাব্যতার চিন্তাভাবনা ব্যবহার করুন।
    how_can_this_be_misapplied:
      learned_helplessness: |
        অতিরিক্ত সংশোধন করে বিশ্বাস করা যে আমাদের কোনো নিয়ন্ত্রণ নেই যখন আসলে আমাদের অর্থপূর্ণ প্রভাব রয়েছে।
      dismissing_agency: |
        "সবই ভাগ্য" যখন অনেক ক্ষেত্রে দক্ষতা এবং প্রচেষ্টা গুরুত্বপূর্ণ।
      false_fatalism: |
        অক্রিয়তা ন্যায্যতা প্রমাণ করতে নিয়ন্ত্রণের বিভ্রম ব্যবহার করা।
      one_size_fits_all: |
        নিয়ন্ত্রণ ক্ষেত্র অনুসারে পরিবর্তিত হয়; কিছু পরিস্থিতি অন্যদের তুলনায় বেশি নিয়ন্ত্রণযোগ্য।
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: প্রভাব পক্ষপাত
    quick_introduction: |
      প্রভাব পক্ষপাত হলো ভবিষ্যতের ঘটনাগুলির প্রতি আমাদের আবেগিক প্রতিক্রিয়ার তীব্রতা এবং সময়কালকে অতিরিক্ত অনুমান করার প্রবণতা। আমরা মনে করি ভালো জিনিসগুলি আমাদের প্রত্যাশার চেয়ে বেশি খুশি করবে এবং খারাপ জিনিসগুলি প্রত্যাশার চেয়ে বেশি দুঃখ দেবে। আমরা আবেগিক পূর্বাভাসের ক্ষেত্রে খারাপ।
    one_liner: আমরা অনুমান করি যে ঘটনাগুলি আমাদের সুখকে কতটা প্রভাবিত করবে—এবং কতক্ষণের জন্য।
    try_this:
      - Ask: অতীতের অনুরূপ ঘটনাগুলির পরে আমি কেমন অনুভব করেছিলাম? আমরা প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই।
      - Don't let anticipated impact drive decisions—we're bad at forecasting feelings.
      - Notice when you're overestimating the lasting effect of a single outcome.
    ask_yourself:
      - Am I overestimating how long I'll feel this way?
      - What does past experience say about similar events?
    in_more_detail: |
      ড্যানিয়েল গিলবার্ট এবং টিমোথি উইলসন আবেগিক পূর্বাভাস নিয়ে গবেষণা করেছেন: আমরা একটি জয়ের পরে কতক্ষণ ভালো অনুভব করব বা একটি হারের পরে কতক্ষণ খারাপ অনুভব করব তা অতিরিক্ত অনুমান করি। আমরা প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই। আমরা একক ঘটনাগুলির প্রভাবও অতিরিক্ত অনুমান করি—আমরা মনে করি একটি ফলাফল আমাদের সুখকে সংজ্ঞায়িত করবে যখন অনেক কারণ অবদান রাখে। আমরা আমাদের ভবিষ্যতের অনুভূতিগুলির পূর্বাভাস দেওয়ার সময় ভুল জিনিসগুলিতে ফোকাস করি।

      প্রভাব পক্ষপাত প্রধান জীবন সিদ্ধান্তগুলিকে প্রভাবিত করে: আমরা একটি পদোন্নতি, সম্পর্ক বা ক্রয় আমাদের সুখকে কতটা পরিবর্তন করবে তা অতিরিক্ত অনুমান করি। আমরা ক্ষতির স্থায়ী বেদনাও অতিরিক্ত অনুমান করি।
    why_this_is_important: |
      প্রভাব পক্ষপাতকে স্বীকৃতি দেওয়া আপনাকে সেই সিদ্ধান্তগুলি আরও ভালভাবে নিতে সাহায্য করে যা প্রকৃতপক্ষে আপনার জীবন উন্নত করবে। এটি সেই ফলাফলগুলিতে অতিরিক্ত বিনিয়োগ কমিয়ে দেয় যা আপনার ভাবনার চেয়ে বেশি গুরুত্বপূর্ণ হবে না, এবং সেই ফলাফলগুলির ভয় কমিয়ে দেয় যা আপনার প্রত্যাশার চেয়ে দীর্ঘস্থায়ী হবে না।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - কর্মজীবনের_পদক্ষেপ
      - ঝুঁকি_মূল্যায়ন
      - সম্পর্ক_গঠন
    how_can_you_spot_it:
      overestimated_impact: |
        "এটা সবকিছু বদলে দেবে" যখন অতীতের অনুরূপ ঘটনাগুলির সামান্য স্থায়ী প্রভাব ছিল।
      duration_overestimation: |
        "আমি এটা থেকে কখনোই বের হতে পারব না" যখন আমরা সাধারণত প্রত্যাশার চেয়ে দ্রুত মানিয়ে নিই।
      focalism: |
        একটি ঘটনার উপর মনোযোগ দেওয়া এবং সুস্থতাকে প্রভাবিত করে এমন অন্যান্য কারণগুলিকে উপেক্ষা করা।
      adaptation_neglect: |
        ভালো এবং খারাপ উভয় পরিস্থিতিতেই আমরা মানিয়ে নিই তা ভুলে যাওয়া।
    examples:
      career: |
        "যদি আমি এই পদোন্নতি পাই, তবে আমি অনেক খুশি হব" যখন অতীতের পদোন্নতিগুলির অস্থায়ী প্রভাব ছিল।
      purchases: |
        "এই গাড়িটি আমাকে খুশি করবে" যখন নতুনত্বের অনুভূতি দ্রুত ফুরিয়ে যায়।
      loss: |
        "আমি এই প্রত্যাখ্যান থেকে কখনোই সেরে উঠব না" যখন আমরা সাধারণত কয়েক মাসের মধ্যে মানিয়ে নিই।
      events: |
        একটি বিবাহ, ছুটি বা গুরুত্বপূর্ণ ঘটনা দীর্ঘমেয়াদী সুখকে কতটা প্রভাবিত করবে তা অতিরিক্ত অনুমান করা।
    real_world_implications: |
      প্রভাব পক্ষপাত অর্থ, কর্মজীবন এবং সম্পর্ক সম্পর্কে খারাপ সিদ্ধান্তের দিকে পরিচালিত করে। আমরা সেই অভিজ্ঞতাগুলির জন্য বেশি অর্থ প্রদান করি যেগুলিতে আমরা মানিয়ে নেব এবং সেই ক্ষতিগুলির প্রতি অতিরিক্ত ভয় করি যেগুলি থেকে আমরা সেরে উঠব। এটি নীতি এবং ব্যক্তিগত পরিকল্পনাকে প্রভাবিত করে।
    professional_application:
      networking_and_relationship_building: |
        কর্মজীবন বা সম্পর্ক সম্পর্কিত সিদ্ধান্ত নেওয়ার সময়, অতীতের অনুরূপ ঘটনাগুলির পরে আপনি কেমন অনুভব করেছিলেন তা বিবেচনা করুন। প্রত্যাশার চেয়ে প্রভাব কি দীর্ঘস্থায়ী হয়েছিল? ভবিষ্যতের পূর্বাভাসগুলি পরিমার্জন করার জন্য এটি ব্যবহার করুন।
      collaborative_learning_initiative: |
        যখন দলগুলি বাধা বা বিজয়ের মুখোমুখি হয়, তখন তাদের অভিযোজন (adaptation) মনে করিয়ে দিন। "আমরা ভাবার চেয়ে দ্রুত মানিয়ে নেব" এই কথাটি অতিরিক্ত উদযাপন এবং অতিরিক্ত হতাশা উভয়ই কমাতে পারে।
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        কিছু ঘটনার স্থায়ী প্রভাব থাকে—যেমন ট্রমা, বড় ক্ষতি। সমস্ত আবেগিক পূর্বাভাসকে পক্ষপাতদুষ্ট হিসাবে বাতিল করবেন না।
      cold_rationality: |
        "এটা কোনো ব্যাপার হবে না" যখন সেই মুহূর্তের অভিজ্ঞতাটি গুরুত্বপূর্ণ।
      undervaluing_experiences: |
        "আমরা যাই হোক না কেন মানিয়ে নেব" বলে ইতিবাচক অভিজ্ঞতা এড়িয়ে যাওয়া।
      invalidating_emotions: |
        মানুষকে তাদের অনুভূতি কেটে যাবে বলা যখন তাদের সেই মুহূর্তে সমর্থনের প্রয়োজন।
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত
    quick_introduction: |
      অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত হলো আমরা যাদের নিজেদের গোষ্ঠীভুক্ত মনে করি, তাদের অন্য গোষ্ঠীর লোকদের চেয়ে বেশি পছন্দ করার প্রবণতা। আমরা প্রায়শই সামান্য বা খেয়ালী পার্থক্যের উপর ভিত্তি করে গোষ্ঠীভুক্ত সদস্যদের ইতিবাচক গুণাবলী এবং বহির্ভূত সদস্যদের নেতিবাচক গুণাবলী আরোপ করি।
    one_liner: আমরা আমাদের গোষ্ঠীকে পছন্দ করি এবং বহির্ভূত গোষ্ঠীকে আরও কঠোরভাবে বিচার করি—প্রায়শই খেয়ালীভাবে।
    try_this:
      - জিজ্ঞাসা করুন: যদি এই ব্যক্তি আমার গোষ্ঠীর হত, তবুও কি আমি তাকে একইভাবে বিচার করতাম?
      - সিদ্ধান্ত নেওয়ার সময় সক্রিয়ভাবে বহির্ভূত গোষ্ঠীর দৃষ্টিভঙ্গি সন্ধান করুন।
      - লক্ষ্য করুন কখন গোষ্ঠীর সীমা আপনার বিচারকে প্রভাবিত করছে।
    ask_yourself:
      - আমি কি কাউকে "আমাদের লোক" হওয়ার কারণে পছন্দ করছি?
      - আমি কি বহির্ভূত গোষ্ঠীর সদস্যের ক্ষেত্রে একই মান প্রয়োগ করতাম?
    in_more_detail: |
      এমনকি যখন গোষ্ঠীগুলি এলোমেলোভাবে বরাদ্দ করা হয় (যেমন, কয়েন টস করে), তখনও লোকেরা দ্রুত তাদের নিজেদের গোষ্ঠীর প্রতি পক্ষপাত তৈরি করে। আমরা নিজেদের গোষ্ঠীর সদস্যদের বেশি বিশ্বাস করি, তাদের প্রতি আরও উদারভাবে সম্পদ বরাদ্দ করি এবং তাদের কাজকে আরও করুণার সাথে বিচার করি। বহির্ভূত সদস্যরা বিপরীত আচরণ পান।

      অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত গোষ্ঠীস্বার্থ, বৈষম্য এবং সংঘাতকে বাড়িয়ে তোলে। এটি নিয়োগ, পদোন্নতি, সহযোগিতা এবং নীতিকে প্রভাবিত করে। এটি জাতি, জাতীয়তা, কোম্পানি, দল বা যেকোনো সাধারণ পরিচয়ের উপর ভিত্তি করে হতে পারে।
    why_this_is_important: |
      অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত চিনতে পারা আপনাকে আরও ন্যায্য সিদ্ধান্ত নিতে, আরও অন্তর্ভুক্তিমূলক দল তৈরি করতে এবং পক্ষপাত এড়াতে সহায়তা করে। এটি ব্যাখ্যা করে কেন বৈচিত্র্যের উদ্যোগগুলি প্রতিরোধের সম্মুখীন হয়—অন্তর্ভূক্ত গোষ্ঠীর পছন্দ স্বতঃস্ফূর্ত।
    when_to_use:
      - নেতৃত্ব
      - সিদ্ধান্ত_গ্রহণ
      - সম্পর্ক_গড়ে_তোলা
      - সংঘাত_সমাধান
    how_can_you_spot_it:
      preferential_treatment: |
        "আমাদের" লোকদের সন্দেহ হলেও সুবিধা দেওয়া, কিন্তু "তাদের" লোকদের না দেওয়া।
      resource_allocation: |
        বহির্ভূত গোষ্ঠীর সদস্যদের সমান বা বেশি প্রয়োজন থাকা সত্ত্বেও অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের বেশি সম্পদ বরাদ্দ করা।
      attribution_asymmetry: |
        অন্তর্ভূক্ত গোষ্ঠীর সাফল্য = দক্ষতা; বহির্ভূত গোষ্ঠীর সাফল্য = ভাগ্য। অন্তর্ভূক্ত গোষ্ঠীর ব্যর্থতা = পরিস্থিতি; বহির্ভূত গোষ্ঠীর ব্যর্থতা = চরিত্র।
      minimal_group_effects: |
        এমনকি খেয়ালী গোষ্ঠী বরাদ্দের সাথেও পক্ষপাতিত্ব দেখা দেয়।
    examples:
      hiring: |
        এমন প্রার্থীদের পছন্দ করা যারা আপনার প্রাক্তন ছাত্রাবাসের একই অথবা আপনার একই পটভূমির।
      performance_reviews: |
        একই রকম কর্মক্ষমতা থাকা সত্ত্বেও অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের বহির্ভূত গোষ্ঠীর সদস্যদের চেয়ে বেশি অনুকূলভাবে রেটিং দেওয়া।
      collaboration: |
        "আমাদের দল"কে বিশ্বাস করা এবং অন্তর্ভুক্ত করা, যখন "তাদের দল"কে বাদ দেওয়া বা সন্দেহ করা।
      politics: |
        অন্তর্ভূক্ত গোষ্ঠীর যুক্তিগুলি নিinkuভাবে গ্রহণ করার সময় বহির্ভূত গোষ্ঠীর যুক্তিগুলিকে বাতিল করে দেওয়া।
    real_world_implications: |
      অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত বৈষম্যকে স্থায়ী করে, মেধাভিত্তিক ব্যবস্থাকে দুর্বল করে এবং সংঘাতকে বাড়িয়ে তোলে। এটি নিয়োগ, পদোন্নতি, বিনিয়োগ এবং নীতিকে প্রভাবিত করে। এটি কমাতে ইচ্ছাকৃত প্রচেষ্টা প্রয়োজন—এটি নিজে থেকে ঠিক হবে না।
    professional_application:
      networking_and_relationship_building: |
        আপনার তাৎক্ষণিক বৃত্তের বাইরের লোকদের সক্রিয়ভাবে অন্তর্ভুক্ত করুন। বিভিন্ন দৃষ্টিভঙ্গি সন্ধান করুন। আপনি কাউকে "আপনার মতো" হওয়ার কারণে পছন্দ করছেন কিনা তা প্রশ্ন করুন।
      collaborative_learning_initiative: |
        নিয়োগ এবং মূল্যায়নে অন্তর্ভূক্ত গোষ্ঠী পক্ষপাত কমাতে কাঠামোগত প্রক্রিয়া (অজ্ঞাত পর্যালোচনা, বৈচিত্র্যময় প্যানেল) ব্যবহার করুন। অভিন্ন পরিচয় তৈরি করতে আন্তঃগোষ্ঠী প্রকল্প তৈরি করুন।
    how_can_this_be_misapplied:
      forced_diversity: |
        এমন কোটা বা নীতি প্রয়োগ করা যা অন্তর্নিহিত পক্ষপাতের সমাধান না করে বিরক্তি তৈরি করে।
      out_group_hostility: |
        শুধুমাত্র বহির্ভূত গোষ্ঠীর শত্রুতা বিদ্যমান থাকলেই অন্তর্ভূক্ত গোষ্ঠী পক্ষপাতকে একমাত্র সমস্যা হিসেবে বিবেচনা করা।
      ignoring_legitimate_differences: |
        সমস্ত গোষ্ঠীগত পার্থক্য পক্ষপাত নয়—কখনও কখনও গোষ্ঠীগুলির ভিন্ন বৈশিষ্ট্য থাকে। সব বৈষম্যকে বৈষম্য বলে ধরে নেবেন না।
      reverse_discrimination: |
        অন্তর্ভূক্ত গোষ্ঠীর সদস্যদের প্রতি অন্যায্য উপায়ে বহির্ভূত গোষ্ঠীগুলির প্রতি অতিরিক্ত সংশোধনে যাওয়া।
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: ইনভার্সন
    quick_introduction: |
      ইনভার্সন হলো একটি সমস্যা সমাধানের কৌশল যা একটি প্রশ্নকে ঘুরিয়ে দেয়। "আমি কিভাবে সফল হব?" জিজ্ঞাসা করার পরিবর্তে, আপনি জিজ্ঞাসা করেন "কী আমাকে ব্যর্থ করে তুলবে?" এবং সেই জিনিসগুলি এড়িয়ে চলুন। এটি এমন ঝুঁকি এবং অ্যান্টি-প্যাটার্নগুলিকে উন্মোচন করে যা সামনের চিন্তা প্রায়শই মিস করে।
    one_liner: ঘুরিয়ে দিন—জিজ্ঞাসা করুন কী আপনাকে ব্যর্থ করে তুলবে, তারপর সেই জিনিসগুলি এড়িয়ে চলুন।
    try_this:
      - যেকোনো লক্ষ্যের জন্য, ব্যর্থ হওয়ার প্রধান উপায়গুলি তালিকাভুক্ত করুন—তারপর সেগুলি এড়িয়ে চলুন।
      - নেতিবাচক কল্পনা ব্যবহার করুন: এটি কেন ভুল হতে পারে?
      - জিজ্ঞাসা করুন: একজন বুদ্ধিমান ব্যক্তি এটি নষ্ট করার জন্য কী করবে?
    ask_yourself:
      - আমি কি ভেবেছি কী এটিকে ব্যর্থ করে তুলতে পারে?
      - কেবল সামনের দিকে চিন্তা করার মাধ্যমে আমি কী দেখতে পাচ্ছি না?
    in_more_detail: |
      চার্লি মাঙ্গার দ্বারা জনপ্রিয় এবং গাণিতিক যুক্তির উপর ভিত্তি করে, ইনভার্সন এই সত্যের সুযোগ নেয় যে ব্যর্থতা এড়ানো প্রায়শই সাফল্যের চেয়ে সহজ। যদি আপনি কোনো কিছুর ভুল হওয়ার প্রধান উপায়গুলি চিহ্নিত করতে পারেন, তাহলে আপনি পদ্ধতিগতভাবে সেগুলি দূর করতে পারেন।

      কার্ল জ্যাকোবি কথিত আছে, "সর্বদা উল্টোভাবে চিন্তা করুন।" স্টোইকরা তাদের যা ছিল তা উপলব্ধি করার জন্য এবং প্রতিকূলতার জন্য প্রস্তুত হওয়ার জন্য নেতিবাচক কল্পনা—ক্ষতির কল্পনা—ব্যবহার করতেন। ইনভার্সন হলো নিরাশাवाद নয়; এটি বাধা দূর করে অগ্রগতি করার একটি কাঠামোগত উপায়।
    why_this_is_important: |
      ইনভার্সন আপনাকে বিপর্যয়কর ভুল এড়াতে, পরিকল্পনা পরীক্ষা করতে এবং অ-স্পষ্ট সমাধান খুঁজে বের করতে সাহায্য করে। এটি গুরুত্বপূর্ণ ব্যর্থতার মোডগুলি উপেক্ষা না করে নিশ্চিত করার মাধ্যমে সামনের পরিকল্পনাকে পরিপূরক করে।
    when_to_use:
      - সমস্যা_সমাধান
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - কর্মজীবনের_পদক্ষেপ
    how_can_you_spot_it:
      premortem_thinking: |
        একটি প্রকল্পের আগে, "এটি কেন ব্যর্থ হয়েছে?" জিজ্ঞাসা করুন যেন এটি ইতিমধ্যে হয়েছে।
      anti_goals: |
        আপনি যা অর্জন করতে চান তা যেমন স্পষ্ট করে সংজ্ঞায়িত করা, তেমনভাবে আপনি যা এড়াতে চান তা সংজ্ঞায়িত করা।
      reverse_engineering_failure: |
        কেবল সাফল্য অধ্যয়নের পরিবর্তে শিক্ষা বের করার জন্য ব্যর্থ কেসগুলি অধ্যয়ন করা।
      constraint_focus: |
        আপসাইডের জন্য অপ্টিমাইজ করার আগে সীমাবদ্ধতা এবং বাধাগুলি চিহ্নিত করা।
    examples:
      investing: |
        "এই স্টকটি কেন উপরে উঠবে?" জিজ্ঞাসা করার পরিবর্তে, "কী আমাকে টাকা হারাতে বাধ্য করবে?" জিজ্ঞাসা করুন এবং সেই পরিস্থিতিগুলি এড়িয়ে চলুন।
      career: |
        "আমার খ্যাতি নষ্ট করবে কী?" এটি এড়ানোর জন্য আচরণের একটি তালিকা তৈরি করে।
      product_launch: |
        "বেশিরভাগ পণ্য লঞ্চ কেন ব্যর্থ হয়?" লঞ্চের আগেaddress করার জন্য ঝুঁকি উন্মোচন করে।
      health: |
        "কী অভ্যাস আয়ু কমিয়ে দেয়?" "কী আমাকে সুস্থ রাখে?" এর চেয়ে স্পষ্ট এড়ানোর তালিকা দেয়।
    real_world_implications: |
      ইনভার্সন প্রকৌশল (ব্যর্থতার মোড বিশ্লেষণ), বিনিয়োগ এবং কৌশলে ব্যবহৃত হয়। এটি অতি-আত্মবিশ্বাস হ্রাস করে এবং ঝুঁকি ব্যবস্থাপনা উন্নত করে। অতিরিক্ত নির্ভরতা অতিরিক্ত সতর্কতার দিকে নিয়ে যেতে পারে।
    professional_application:
      networking_and_relationship_building: |
        "এই সম্পর্কটি নষ্ট করবে কী?" এটি বিশ্বাস-ভঙ্গকারী আচরণ এড়াতে আপনাকে সাহায্য করে।
      collaborative_learning_initiative: |
        প্রকল্পগুলিতে প্রি-মর্টেম চালান: "এটি ব্যর্থ হয়েছে। কেন?" পরিকল্পনা এবং কার্যকরীকরণ উন্নত করতে উত্তরগুলি ব্যবহার করুন।
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        কেবল ব্যর্থতা এড়ানোর উপর মনোযোগ দেওয়া কর্মক্ষমতাকে পঙ্গু করে দিতে পারে এবং প্রয়োজনীয় ঝুঁকি গ্রহণ প্রতিরোধ করতে পারে।
      negativity_bias: |
        ইনভার্সন নেতিবাচক পক্ষপাতকে বাড়িয়ে তুলতে পারে যদি এটি সামনের সুযোগ সনাক্তকরণের সাথে ভারসাম্যপূর্ণ না হয়।
      analysis_paralysis: |
        ব্যর্থতার মোডগুলিতে এত বেশি সময় ব্যয় করা যে আপনি কখনই কার্যকর করতে পারেন না।
      missing_upside: |
        ইনভার্সন আপনাকে কী করতে হবে তা বলে না—কেবল কী এড়াতে হবে। আপনার এখনও ইতিবাচক লক্ষ্য প্রয়োজন।
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: ক্রমহ্রাসমান প্রান্তিক আয়ের নিয়ম
    quick_introduction: |
      ক্রমহ্রাসমান প্রান্তিক আয়ের নিয়ম বলে যে, যখন অন্য সবকিছু স্থির রেখে একটি উপকরণের পরিমাণ বৃদ্ধি করা হয়, তখন প্রতিটি নতুন একক থেকে প্রাপ্ত অতিরিক্ত উৎপাদন শেষ পর্যন্ত কমে যেতে থাকে। বেশি সবসময় ভালো নয়—এমন একটি বিন্দু আছে যেখানে অতিরিক্ত প্রচেষ্টা কম থেকে কম ফল দেয়।
    one_liner: অতিরিক্ত ইনপুট শেষ পর্যন্ত কম আউটপুট দেয়—একটি সর্বোত্তম বিন্দু আছে।
    try_this:
      - Ask: আমি কি সেই বিন্দুর বাইরে চলে গেছি যেখানে অতিরিক্ত প্রচেষ্টা থেকে উল্লেখযোগ্য লাভ পাওয়া যায়?
      - সর্বাধিক লিভারেজ যুক্ত ইনপুটগুলিকে অগ্রাধিকার দিন; যখন প্রান্তিক আয় কমতে শুরু করে তখন বন্ধ করুন।
      - লক্ষ্য করুন যখন আপনি কোনো কিছুর উপর অতিরিক্ত বিনিয়োগ করছেন যা ইতিমধ্যেই ফলপ্রসূ হয়েছে।
    ask_yourself:
      - এখানে অতিরিক্ত এক ইউনিট প্রচেষ্টা থেকে আমি কী লাভ করব?
      - আমি কি ক্রমহ্রাসমান প্রান্তিক আয়ের বিন্দুর বাইরে অপ্টিমাইজ করছি?
    in_more_detail: |
      অর্থনীতিতে, নির্দিষ্ট পরিমাণ জমিতে বেশি শ্রমিক নিয়োগ করলে শেষ পর্যন্ত কম ক্রমবর্ধমান লাভ হয়। ব্যক্তিগত উৎপাদনে, অধ্যয়নের প্রথম ঘণ্টা দশম ঘণ্টার চেয়ে বেশি মূল্য যোগ করতে পারে। এই নীতিটি সম্পদ, প্রচেষ্টা, সময় এবং বৈশিষ্ট্যের ক্ষেত্রে প্রযোজ্য। একটি সর্বোত্তম বিন্দু আছে; এর পরে, প্রান্তিক আয় কমে যায় এবং এমনকি নেতিবাচকও হতে পারে।

      ক্রমহ্রাসমান আয়কে স্বীকৃতি দেওয়া আপনাকে কার্যকরভাবে সম্পদ বরাদ্দ করতে এবং সেইসব ক্ষেত্রে অতিরিক্ত বিনিয়োগ এড়াতে সাহায্য করে যেখান থেকে ইতিমধ্যেই বেশিরভাগ মূল্য অর্জিত হয়েছে।
    why_this_is_important: |
      ক্রমহ্রাসমান আয় বোঝা অতিরিক্ত বিনিয়োগ প্রতিরোধ করে, অগ্রাধিকার নির্ধারণে সহায়তা করে এবং আপনাকে কখন থামতে হবে তা জানতে সাহায্য করে। এটি সম্পদ বরাদ্দ এবং নিখুঁতভাবে কাজ করার চেষ্টা এড়িয়ে চলার জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - বিনিয়োগ
      - কর্মজীবনের_পদক্ষেপ
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        প্রচেষ্টা বা সম্পদের প্রতিটি অতিরিক্ত একক পূর্ববর্তীটির চেয়ে কম উৎপাদন তৈরি করে।
      perfectionism_trap: |
        শেষ ১০% গুণমানের জন্য প্রচেষ্টা করা অসম পরিমাণে প্রচেষ্টাকে গ্রাস করে।
      overinvestment: |
        যখন প্রান্তিক আয় কম বা নেতিবাচক থাকে তখনও সম্পদ যোগ করে যাওয়া।
      optimal_point_passed: |
        আপনি সেই বিন্দুর বাইরে চলে গেছেন যেখানে আরও বেশি ইনপুট ফলাফল উন্নত করে।
    examples:
      studying: |
        পরীক্ষার প্রস্তুতির প্রথম ২ ঘণ্টা ৭-৮ ঘণ্টার চেয়ে বেশি কার্যকর; ক্রমহ্রাসমান আয়ের একটি বিন্দু আছে।
      product_features: |
        একটি অ্যাপে আরও বেশি বৈশিষ্ট্য যোগ করলে ব্যবহারকারীরা বিভ্রান্ত হতে পারে; ২০তম বৈশিষ্ট্যটি ৫ম বৈশিষ্ট্যের চেয়ে কম মূল্য যোগ করে।
      hiring: |
        একটি প্রকল্পে আরও বেশি লোক নিয়োগ করলে একটি নির্দিষ্ট বিন্দুর পরে এটি ধীর হতে পারে (ব্রুকসের সূত্র)।
      marketing: |
        বিজ্ঞাপন ব্যয় দ্বিগুণ করলে ফলাফল দ্বিগুণ হয় না; বাজারSaturation হলে আয় কমে যায়।
    real_world_implications: |
      ক্রমহ্রাসমান আয়ের নিয়ম অর্থনৈতিক নীতি, ব্যবসায়িক কৌশল এবং ব্যক্তিগত উত্পাদনশীলতাকে নির্দেশনা দেয়। এটিকে উপেক্ষা করলে সম্পদের অপচয় এবং সর্বোত্তম নয় এমন ফলাফলের দিকে পরিচালিত করে। এটি পारेটো নীতি এবং ফোকাসকে সমর্থন করে।
    professional_application:
      networking_and_relationship_building: |
        কয়েকটি গভীর সম্পর্কে বিনিয়োগ করা অনেক সম্পর্কের মধ্যে পাতলাভাবে প্রচেষ্টা ছড়িয়ে দেওয়ার চেয়ে বেশি ফলপ্রসূ হতে পারে।Recognize করুন কখন অতিরিক্ত নেটওয়ার্কিং-এ ক্রমহ্রাসমান আয় হয়।
      collaborative_learning_initiative: |
        আরও প্রশিক্ষণের সময় মানেই সবসময় উন্নত ফলাফল নয়। সর্বোত্তম ডোজ খুঁজুন এবং অতিরিক্ত চাপ এড়িয়ে চলুন।
    how_can_this_be_misapplied:
      premature_optimization: |
        একটি যুক্তিসঙ্গত মানের স্তরে পৌঁছানোর আগে খুব তাড়াতাড়ি থেমে যাওয়া।
      undershooting: |
        অপর্যাপ্ত প্রচেষ্টার অজুহাত হিসেবে ক্রমহ্রাসমান আয় ব্যবহার করা।
      misidentifying_the_curve: |
        যখন আপনি আসলে বক্ররেখার অন্য অংশে থাকেন (যেমন, প্রাথমিক এক্সপোনেনশিয়াল পর্যায়) তখন ক্রমহ্রাসমান আয় অনুমান করা।
      one_size_fits_all: |
        বিভিন্ন পরিস্থিতিতে যেখানে বক্ররেখা ভিন্ন হয় সেখানে একই "সর্বোত্তম বিন্দু" প্রয়োগ করা।
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: ক্ষতি এড়ানোর পক্ষপাত (Loss Aversion Bias)
    quick_introduction: |
      ক্ষতি এড়ানোর পক্ষপাত হল সমপরিমাণ লাভের চেয়ে ক্ষতি এড়াতে অগ্রাধিকার দেওয়ার প্রবণতা।
      মানুষ লাভের আনন্দ উপভোগ করার চেয়ে ক্ষতির বেদনা প্রায় দ্বিগুণ বেশি অনুভব করে।
    one_liner: সমপরিমাণ লাভ যতখানি আনন্দ দেয়, ক্ষতি তার চেয়ে প্রায় দ্বিগুণ বেদনাদায়ক মনে হয়।
    try_this:
      - "নিজেকে জিজ্ঞাসা করুন: আমি যা হারাবো তা যা লাভ করবো তার চেয়ে বেশি মূল্য দিচ্ছি কি?"
      - পছন্দটিকে লাভ হিসেবে পুনরায় ব্যাখ্যা করুন, ক্ষতি হিসেবে নয়, এবং দেখুন আপনার দৃষ্টিভঙ্গি পরিবর্তন হয় কিনা।
      - লক্ষ্য করুন কখন হারানোর ভয় সিদ্ধান্তকে চালিত করছে, প্রকৃত সুবিধার চেয়ে বেশি।
    ask_yourself:
      - যদি আমি শূন্য থেকে শুরু করতাম, তাহলে আমি কী বেছে নিতাম?
      - আমি কি এই কারণে ধরে রাখছি যে আমি কী হারাবো, নাকি কারণ ভবিষ্যৎ সত্যিই ভালো?
    in_more_detail: |
      ড্যানিয়েল কাহনেমান এবং অ্যামোস টাভারস্কি দ্বারা বিকশিত, ক্ষতি এড়ানোর পক্ষপাত বর্ণনা করে কিভাবে ক্ষতি এবং লাভ অপ্রতিসমভাবে অনুভূত হয়। $100 হারানোর মানসিক প্রভাব সাধারণত $100 লাভ করার সন্তুষ্টির চেয়ে অনেক বেশি। এই পক্ষপাত অর্থায়ন, আলোচনা এবং দৈনন্দিন পছন্দের সিদ্ধান্তকে প্রভাবিত করে, প্রায়শই ঝুঁকিপূর্ণ আচরণে পরিচালিত করে যখন সম্ভাব্য ক্ষতিগুলি স্পষ্ট থাকে।
    why_this_is_important: |
      ক্ষতি এড়ানোর পক্ষপাত বোঝা আপনাকে চিনতে সাহায্য করে যখন ক্ষতির ভয় যুক্তিসঙ্গত বিশ্লেষণের চেয়ে বেশি সিদ্ধান্তকে চালিত করছে। এটি ব্যাখ্যা করে কেন লোকেরা লোকসানি বিনিয়োগ ধরে রাখে, প্রয়োজনীয় পরিবর্তন এড়িয়ে যায় এবং আলোচনা ও ক্যারিয়ারের সিদ্ধান্তগুলিতে উপ-সর্বোত্তম পছন্দ করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - বিনিয়োগ (investing)
      - কর্মজীবনের_পদক্ষেপ (career_moves)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        লক্ষ্য করুন যখন কিছু হারানোর সম্ভাবনা সম্ভাব্য লাভের সুবিধার তুলনায় অসম উদ্বেগ বা প্রতিরোধ সৃষ্টি করে।
      reluctance_to_change: |
        কৌশল পরিবর্তন, চাকরি ছেড়ে দেওয়া বা কোনও সম্পদ বিক্রি করতে দ্বিধা, এমনকি যখন উদ্দেশ্যমূলক বিশ্লেষণ এটিকে একটি ভাল বিকল্প বলে।
      framing_sensitivity: |
        ফলাফল সমান হলেও, বিকল্পগুলি লাভ বা ক্ষতি হিসাবে ব্যাখ্যা করার উপর নির্ভর করে সিদ্ধান্তগুলি নাটকীয়ভাবে পরিবর্তিত হয়।
      overvaluing_what_you_have: |
        এনডাউমেন্ট এফেক্ট—আপনার মালিকানাধীন জিনিসগুলির উপর উচ্চতর মূল্য আরোপ করা কেবল এই কারণে যে আপনি সেগুলি মালিক, প্রায়শই ক্ষতি এড়ানোর পক্ষপাতের সাথে যুক্ত থাকে।
    examples:
      investing: |
        একটি পতনশীল স্টক ধরে রাখা "ক্ষতি স্বীকার এড়াতে" এবং অন্য কোথাও ভাল বিনিয়োগের সুযোগগুলি হারানো।
      career: |
        একটি অসন্তোষজনক চাকরিতে থাকা কারণ চাকরি ছেড়ে দেওয়া নিরাপত্তাহীনতার মতো মনে হয়, এমনকি যখন নতুন সুযোগ আরও বেশি বৃদ্ধি প্রদান করে।
      negotiations: |
        একটি ন্যায্য প্রস্তাব প্রত্যাখ্যান করা কারণ এটিকে কিছু "ছেড়ে দেওয়া" হিসাবে ব্যাখ্যা করা হয়েছে, একটি চুক্তি "অর্জন" করার পরিবর্তে।
      product_design: |
        ফ্রি ট্রায়াল যা পেইডে রূপান্তরিত হয়—ব্যবহারকারীরা ট্রায়াল শেষ হলে পরিষেবাটি "হারিয়ে" যাওয়ার অভিজ্ঞতা লাভ করে, যা নতুন পরিষেবা "অর্জন" করার চেয়ে সাবস্ক্রিপশনকে বেশি অনুপ্রাণিত করে।
    real_world_implications: |
      ক্ষতি এড়ানোর পক্ষপাত বাজার, নীতি এবং ব্যক্তিগত আচরণকে আকার দেয়। এটি ব্যাখ্যা করে কেন বীমা এবং ওয়ারেন্টি ভাল বিক্রি হয়, কেন লোকেরা উপকারী পরিবর্তন এড়িয়ে যায় এবং কেন নেতিবাচক খবরের প্রভাব বেশি হয়। এটি চিনতে পারলে সিদ্ধান্তের মান উন্নত করা যায় এবং অনুশোচনা-চালিত পছন্দগুলি হ্রাস করা যায়।
    professional_application:
      networking_and_relationship_building: |
        সচেতন থাকুন যে লোকেরা অলাভজনক সম্পর্ক বা সহযোগিতা শেষ করতে প্রতিরোধ করতে পারে ক্ষতি এড়ানোর পক্ষপাতের কারণে—তারা সংযোগ "হারিয়ে" ফেলার ভয় পায়। প্রতিরোধের মাত্রা কমাতে নতুন সুযোগগুলিকে লাভ হিসেবে ব্যাখ্যা করুন, ক্ষতি হিসেবে নয়।
      collaborative_learning_initiative: |
        নতুন প্রক্রিয়া বা সরঞ্জাম চালু করার সময়, দলটি কী "ছেড়ে দিচ্ছে" তার চেয়ে কী লাভ করছে তার উপর জোর দিন। ক্ষতি-ব্যাখ্যামূলক পরিবর্তন উদ্যোগ প্রায়শই শক্তিশালী প্রতিরোধ সৃষ্টি করে।
    how_can_this_be_misapplied:
      manipulation: |
        সিদ্ধান্ত চাপ দেওয়ার জন্য ক্ষতি এড়ানোর পক্ষপাতকে কাজে লাগানো—যেমন, "সীমিত সময়ের অফার" বা "মিস করবেন না" এই ধরনের ব্যাখ্যা যা প্রকৃত মূল্য মূল্যায়নের চেয়ে ক্ষতির ভয় জাগায়।
      misinterpreting_relationships: |
        পরিবর্তনের প্রতি কারও প্রতিরোধকে কেবল যৌক্তিক মনে করা যখন এটি ক্ষতি এড়ানোর পক্ষপাতের দ্বারা চালিত হতে পারে। উদ্দেশ্যকে ভুলভাবে ব্যাখ্যা করা বিশ্বাসকে ক্ষতিগ্রস্ত করতে পারে।
      overcommitment: |
        একটি ব্যর্থ প্রকল্পে বিনিয়োগ চালিয়ে যাওয়া কারণ "আমরা ইতিমধ্যে অনেক কিছু দিয়েছি"—ক্ষতি কাটানোর পরিবর্তে। (Sunk cost fallacy)
      missed_opportunities_for_conflict_resolution: |
        আপস করতে অস্বীকার করা কারণ কোনও ছাড়কেই ক্ষতি বলে মনে হয়, এমনকি যখন বিকল্পটি সবার জন্য একটি খারাপ ফলাফল হয়।
      vulnerability_to_exploitation: |
        যারা ক্ষতি এড়ানোর পক্ষপাতের ট্রিগার করার জন্য পছন্দগুলি ব্যাখ্যা করে তাদের দ্বারা ম্যানিপুলেটেড হওয়া, যেমন বিক্রয় কৌশল যা আপনি কাজ না করলে কী "হারিয়ে ফেলবেন" তার উপর জোর দেয়।
      reinforcing_negative_perceptions: |
        সম্ভাব্য ডাউনসাইডগুলির উপর অতিরিক্ত মনোযোগ একটি নিরাশাবাদী দৃষ্টিভঙ্গি তৈরি করতে পারে যা স্ব-পূর্ণ হয়, উন্নতির সুযোগগুলি হারিয়ে যায়।
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
      - prospect_theory
      - status_quo_bias
  - id: map_is_not_the_territory
    name: মানচিত্র আসলে অঞ্চল নয়
    quick_introduction: |
      "মানচিত্র আসলে অঞ্চল নয়" এর অর্থ হল বাস্তবতার একটি উপস্থাপনা নিজেই বাস্তবতা নয়।
      মডেল, তত্ত্ব এবং বর্ণনা দরকারী সরলীকরণ, কিন্তু তারা সবসময় কিছু বাদ দেয়।
      মানচিত্রকে অঞ্চলের সাথে বিভ্রান্ত করা ত্রুটির দিকে পরিচালিত করে।
    one_liner: মানচিত্র আসলে অঞ্চল নয়—সমস্ত মডেল ভুল; কিছু দরকারী।
    try_this:
      - যখন একটি মডেল বাস্তবতার সাথে মেলে না, তখন মানচিত্র আপডেট করুন—বাস্তবতাকে মানচিত্রের সাথে মানানসই করার চেষ্টা করবেন না।
      - জিজ্ঞাসা করুন: এই মডেলটি কী বাদ দিচ্ছে? কখন এটি ভেঙে যেতে পারে?
      - মডেলগুলিকে সত্য হিসাবে নয়, সরঞ্জাম হিসাবে বিবেচনা করুন।
    ask_yourself:
      - আমি কি আমার মডেলকে বাস্তবতার সাথে বিভ্রান্ত করছি?
      - শেষবার দেখার পর থেকে অঞ্চলটি কি পরিবর্তিত হয়েছে?
    in_more_detail: |
      আলফ্রেড করজিবস্কি সাধারণ শব্দার্থবিদ্যায় এই ধারণাটি প্রবর্তন করেছিলেন।
      একটি শহরের মানচিত্র নেভিগেশনের জন্য দরকারী, কিন্তু এটি শহর নয়—এটি বিস্তারিত বাদ দেয়,
      পুরাতন হয়ে যায় এবং কখনই সবকিছু ধারণ করতে পারে না। একই জিনিস মানসিক মডেল,
      বৈজ্ঞানিক তত্ত্ব এবং সাংগঠনিক চার্টের ক্ষেত্রে প্রযোজ্য।

      সমস্ত মডেল ভুল; কিছু দরকারী। বিপদ হল একটি মডেলকে এমনভাবে বিবেচনা করা যেন এটি
      সম্পূর্ণ সত্য, বিশেষ করে যখন অঞ্চলটি পরিবর্তিত হয়েছে। ভাল চিন্তাভাবনার জন্য
      বাস্তবতার সাথে না মিললে মানচিত্র আপডেট করার প্রয়োজন হয়।
    why_this_is_important: |
      মানচিত্র অঞ্চলের থেকে ভিন্ন তাRecognizing overconfidence in models,
      encourages updating beliefs, and reduces the risk of acting on outdated or
      oversimplified information.
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - শিক্ষা
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      model_reality_confusion: |
        বাস্তবতাকে সম্পূর্ণরূপে বর্ণনা করে এমনভাবে একটি কাঠামো বা তত্ত্বকে বিবেচনা করা।
      outdated_assumptions: |
        বর্তমান অবস্থার সাথে আর মেলে না এমন তথ্য বা মডেলের উপর ভিত্তি করে কাজ করা।
      oversimplification: |
        "মানচিত্রে" অন্তর্ভুক্ত না থাকার কারণে সূক্ষ্ম বিষয়গুলিকে উপেক্ষা করা।
      map_worship: |
        প্রমাণ বিরোধিতা করার পরেও মডেলকে আপডেট করার পরিবর্তে রক্ষা করা।
    examples:
      organizational_charts: |
        প্রতিবেদনের কাঠামো যেভাবে কাজ আসলে সম্পন্ন হয় তা প্রতিফলিত করে এমনটা ধরে নেওয়া।
      financial_models: |
        একটি স্প্রেডশীট প্রজেকশনকে একটি পরিস্থিতি হিসাবে বিবেচনা করা, পূর্বাভাস হিসাবে নয়।
      stereotypes: |
        গোষ্ঠী-পর্যায়ের সাধারণীকরণ ব্যক্তিদের উপর প্রয়োগ করা।
      strategy_docs: |
        বাজার পরিবর্তিত হওয়ার পরেও যেমন লেখা আছে তেমনভাবে একটি পরিকল্পনা কার্যকর করা।
    real_world_implications: |
      মানচিত্র-অঞ্চল পার্থক্য বিজ্ঞান, প্রকৌশল এবং দর্শনের মৌলিক বিষয়।
      এটি Bayesian updating, agile methodology, এবং epistemic humility-এর ভিত্তি।
      এটি উপেক্ষা করলে অনমনীয় চিন্তাভাবনা এবং ব্যর্থ কৌশল দেখা দেয়।
    professional_application:
      networking_and_relationship_building: |
        একজন ব্যক্তির সম্পর্কে আপনার মানসিক মডেল পুরাতন হতে পারে। পুরানো ধারণার উপর নির্ভর করার
        পরিবর্তে সরাসরি যোগাযোগের মাধ্যমে এটি আপডেট করুন।
      collaborative_learning_initiative: |
        দলগুলোকে পরিকল্পনা এবং মডেলকে অনুমান হিসাবে বিবেচনা করতে উৎসাহিত করুন যা পরীক্ষা
        এবং সংশোধনের জন্য, স্থির সত্য হিসাবে নয়।
    how_can_this_be_misapplied:
      radical_skepticism: |
        এই সিদ্ধান্তে আসা যে কোনও মানচিত্র দরকারী নয় এবং সমস্ত জ্ঞান সন্দেহজনক।
      constant_revision: |
        এত ঘন ঘন আপডেট করা যে কোনও স্থিতিশীল বোঝাপড়া উদ্ভূত হয় না।
      dismissing_models: |
        দরকারী সরলীকরণগুলি "অঞ্চল নয়" বলে প্রত্যাখ্যান করা।
      relativism: |
        সমস্ত মানচিত্র সমানভাবে বৈধ বলে দাবি করা যখন কিছু স্পষ্টতই অঞ্চলের সাথে ভালভাবে মিলে যায়।
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Mere Exposure Effect
    quick_introduction: |
      Mere exposure effect হল পরিচিতির কারণে কোনো কিছুর প্রতি পছন্দ তৈরি হওয়ার প্রবণতা।
      বারবার দেখলেই—কোনো রকম সমর্থন ছাড়াই—পছন্দ বাড়ে। আমরা যা জানি, তাই বেশি পছন্দ করি।
    one_liner: পরিচিতি পছন্দ তৈরি করে—আমরা যা আগে দেখেছি, তাই বেশি পছন্দ করি।
    try_this:
      - Ask: আমি কি এটা ভালো বলে পছন্দ করছি, নাকি এটা আমার পরিচিত বলে?
      - When evaluating options, correct for exposure—new things start at a disadvantage. (বিকল্পগুলি মূল্যায়ন করার সময়, পরিচিতির জন্য সংশোধন করুন—নতুন জিনিসগুলি অসুবিধায় পড়ে শুরু করে।)
      - Notice when repetition is influencing your preference. (খেয়াল করুন কখন পুনরাবৃত্তি আপনার পছন্দকে প্রভাবিত করছে।)
    ask_yourself:
      - Am I preferring something mainly because I've seen it before? (আমি কি প্রধানত কোনো কিছুকে তাই পছন্দ করছি কারণ আমি এটি আগে দেখেছি?)
      - Would I choose differently if exposure were equal? (যদি পরিচিতির পরিমাণ সমান হতো, তাহলে কি আমি অন্যভাবে নির্বাচন করতাম?)
    in_more_detail: |
      রবার্ট জাজোন দেখিয়েছেন যে উদ্দীপনার (মুখ, শব্দ, আকার) বারবার সংস্পর্শ তাদের প্রতি ইতিবাচক অনুভূতি বাড়ায়—এমনকি যখন আমরা সচেতনভাবে সংস্পর্শে আসি না। পরিচিতি বিদ্বেষ নয়, বরং পছন্দ তৈরি করে (অনেক ক্ষেত্রে)। যখন আমরা বিশ্লেষণ করি না এবং যখন সংস্পর্শ সূক্ষ্ম হয় তখন প্রভাব বেশি শক্তিশালী হয়।

      Mere exposure effect ব্র্যান্ডের পছন্দ, আন্তঃব্যক্তিক আকর্ষণ এবং নান্দনিক বিচারকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন আমরা পরিচিত সঙ্গীত পছন্দ করি, কেন বিজ্ঞাপন পুনরাবৃত্তির মাধ্যমে কাজ করে এবং কেন আমরা যাদের আগে দেখেছি তাদের পছন্দ করি—এমনকি মিথস্ক্রিয়া ছাড়াই।
    why_this_is_important: |
      Mere exposure effect কে চিনলে আপনি আপনার নিজের পছন্দ বুঝতে পারবেন এবং পুনরাবৃত্তির মাধ্যমে ম্যানিপুলেশন প্রতিরোধ করতে পারবেন। এটি সম্পর্ক এবং ব্র্যান্ডের জন্য দৃশ্যমানতা এবং উপস্থিতি কেন গুরুত্বপূর্ণ তাও ব্যাখ্যা করে। পরিচিতি একটি শক্তিশালী তবে প্রায়শই অচেতন প্রভাব।
    when_to_use:
      - relationship_building (সম্পর্ক_গড়ে_তোলা)
      - decision_making (সিদ্ধান্ত_নেওয়া)
      - leadership (নেতৃত্ব)
      - learning (শেখা)
    how_can_you_spot_it:
      familiarity_preference: |
        Preferring options we've seen before over novel ones. (নতুন বিকল্পগুলির চেয়ে আমরা আগে দেখেছি এমন বিকল্পগুলি পছন্দ করা।)
      repetition_influence: |
        Repeated exposure increases liking without explicit persuasion. (বারবার সংস্পর্শ স্পষ্ট প্ররোচনা ছাড়াই পছন্দ বাড়ায়।)
      unconscious_influence: |
        The effect works even when we're not aware of the exposure. (সংস্পর্শ সম্পর্কে আমরা সচেতন না থাকলেও এই প্রভাব কাজ করে।)
      brand_recognition: |
        Familiar brands are preferred even when we can't articulate why. (পরিচিত ব্র্যান্ডগুলি পছন্দ করা হয় এমনকি যখন আমরা কারণ ব্যাখ্যা করতে পারি না।)
    examples:
      advertising: |
        Repeated exposure to a brand increases preference—even without persuasive messaging. (একটি ব্র্যান্ডের বারবার সংস্পর্শ পছন্দ বাড়ায়—এমনকি প্ররোচনামূলক বার্তা ছাড়াই।)
      music: |
        Songs we've heard before tend to be liked more than new ones on first listen. (আমরা আগে শুনেছি এমন গানগুলি প্রথমবার শোনার সময় নতুন গানের চেয়ে বেশি পছন্দ হয়।)
      people: |
        We tend to like people we've seen repeatedly (e.g., classmates, colleagues) more than strangers—even without interaction. (আমরা যাদের বারবার দেখেছি (যেমন, সহপাঠী, সহকর্মী) তাদের অপরিচিতদের চেয়ে বেশি পছন্দ করি—এমনকি কোনো মিথস্ক্রিয়া ছাড়াই।)
      ideas: |
        Ideas we've encountered before feel more comfortable and credible than novel ones. (আমরা আগে সম্মুখীন হয়েছি এমন ধারণাগুলি নতুন ধারণাগুলির চেয়ে বেশি আরামদায়ক এবং বিশ্বাসযোগ্য মনে হয়।)
    real_world_implications: |
      Mere exposure effect গ্রাহকের আচরণ, রাজনৈতিক পছন্দ এবং সামাজিক আকর্ষণকে রূপ দেয়। এটি বিপণনে ব্যবহৃত হয় এবং পরিচিতদের জন্য অন্যায্য সুবিধা তৈরি করতে পারে। এটি ব্যাখ্যা করে কেন বৈচিত্র্যময় পরিচিতি গুরুত্বপূর্ণ—ভিন্নতার সাথে পরিচিতি পক্ষপাত কমায়।
    professional_application:
      networking_and_relationship_building: |
        Visibility matters. Showing up, being present, and being seen creates familiarity that builds liking. Don't underestimate the value of repeated low-stakes contact. (দৃশ্যমানতা গুরুত্বপূর্ণ। উপস্থিত থাকা, সক্রিয় থাকা এবং দেখা হওয়া পরিচিতি তৈরি করে যা পছন্দ তৈরি করে। বারবার কম-গুরুত্বের যোগাযোগকে অবমূল্যায়ন করবেন না।)
      collaborative_learning_initiative: |
        Expose people to diverse perspectives and people repeatedly—familiarity can reduce bias. But be aware that mere exposure can also reinforce preference for the status quo. (মানুষকে বারবার বিভিন্ন দৃষ্টিকোণ এবং মানুষের সাথে পরিচিত করুন—পরিচিতি পক্ষপাত কমাতে পারে। তবে সচেতন থাকুন যে সাধারণ পরিচিতিও স্থিতাবস্থার প্রতি পছন্দকে শক্তিশালী করতে পারে।)
    how_can_this_be_misapplied:
      manipulation: |
        Deliberately creating repeated exposure to manipulate preferences without consent. (সম্মতি ছাড়াই পছন্দকে ম্যানিপুলেট করার জন্য ইচ্ছাকৃতভাবে বারবার সংস্পর্শ তৈরি করা।)
      false_familiarity: |
        Assuming that familiarity equals quality—sometimes novel options are better. (এটা ধরে নেওয়া যে পরিচিতি মানেই গুণমান—কখনও কখনও নতুন বিকল্পগুলি ভাল হয়।)
      exclusion: |
        If only certain people get exposure, they get unfair advantage. Consider who has access to visibility. (যদি শুধুমাত্র নির্দিষ্ট কিছু লোক পরিচিতি পায়, তারা অন্যায্য সুবিধা পায়। বিবেচনা করুন কার দৃশ্যমানতার অ্যাক্সেস আছে।)
      stagnation: |
        Over-relying on familiarity and never trying new things. (পরিচিতির উপর অতিরিক্ত নির্ভর করা এবং কখনও নতুন জিনিস চেষ্টা না করা।)
