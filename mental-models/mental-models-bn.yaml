      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: ন্যারেটিভ ফ্যালাসি
    quick_introduction: |
      ন্যারেটিভ ফ্যালাসি হলো অতীতের ঘটনাগুলো থেকে এমন গল্প তৈরি করার প্রবণতা, যা ঘটনাগুলোকে
      প্রকৃতপক্ষে যা ছিল তার চেয়ে বেশি সুসংগত, অনুমানযোগ্য এবং অর্থপূর্ণ বলে মনে হয়। আমরা
      অনিশ্চয়তাকে ব্যাখ্যা দিয়ে ঠিক করে নিই। আমরা ইতিহাসের জগাঘেঁচি থেকে একটি পরিপাটি
      গল্প তৈরি করি—এবং তারপরে বিশ্বাস করি যে গল্পটি অনিবার্য ছিল।
    one_liner: আমরা অনিশ্চয়তার উপর সুসংগত গল্প তৈরি করি—এবং তারপরে বিশ্বাস করি যে সেগুলো অনিবার্য ছিল।
    try_this:
      - জিজ্ঞাসা করুন: এই গল্পের কতটুকু hindsight (অতীতের ঘটনা সম্পর্কে স্পষ্ট ধারণা)? ভাগ্য কোন ভূমিকা পালন করেছে?
      - পরিপাটি ব্যাখ্যার প্রতি সন্দিহান হন—অতীত আমাদের গল্পের চেয়ে অনেক বেশি বিশৃঙ্খল ছিল।
      - লক্ষ্য করুন কখন "বোঝা যায়" "অনুমান করা যেত" এই কাজ করে।
    ask_yourself:
      - আমি কি এমন একটি গল্প তৈরি করছি যা অতীতকে অনিবার্য বলে মনে করে, আসলে যা ছিল তার চেয়ে বেশি?
      - ঘটনা ঘটার আগে কি আমি এটি অনুমান করতে পারতাম?
    in_more_detail: |
      নাসিম তালেব এই শব্দটি জনপ্রিয় করেছেন। আমরা ন্যারেটিভ (কার্যকারণ, নায়ক ও খলনায়ক, স্পষ্ট
      ঘটনাপ্রবাহ) এর প্রতি আকৃষ্ট হই। তাই আমরা এমন গল্প তৈরি করি যা অতীতের ঘটনাগুলোকে
      হindsight-এ সংযুক্ত করে। গল্পটি সত্য মনে হয় কারণ এটি সুসংগত—কিন্তু সুসংগতি মানে এই নয়
      যে এটি সঠিক। আমরা "বোঝা যায়" এবং "অনুমান করা যেত" এর মধ্যে পার্থক্য করতে ভুল করি।
      আমরা ভাগ্য এবং অনিশ্চয়তার ভূমিকাকে অবমূল্যায়ন করি।

      ন্যারেটিভ ফ্যালাসি প্রভাবিত করে কীভাবে আমরা ইতিহাস থেকে শিখি, সাফল্য মূল্যায়ন করি এবং
      ভবিষ্যদ্বাণী করি। আমরা গল্পের ব্যাখ্যামূলক ক্ষমতাকে অতিরিক্ত গুরুত্ব দিই এবং ভাগ্যের
      ভূমিকা কে অবমূল্যায়ন করি।
    why_this_is_important: |
      ন্যারেটিভ ফ্যালাসি কে চেনা আপনাকে অতীত থেকে অতিরিক্ত শেখা এবং পূর্বাভাসযোগ্যতাকে অতিরিক্ত
      মূল্যায়ন করা এড়াতে সাহায্য করে। এটি কারণ এবং ভবিষ্যদ্বাণী সম্পর্কে বিনয়কে উৎসাহিত করে।
      ভালো গল্পের সবকিছু সত্য বা সাধারণীকরণযোগ্য নয়।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - শিক্ষা
      - ঝুঁকি_মূল্যায়ন
      - সমস্যা_সমাধান
    how_can_you_spot_it:
      hindsight_coherence: |
        অতীতের ঘটনাগুলোকে একটি পরিপাটি গল্প দিয়ে ব্যাখ্যা করা হয় যা সেই সময়ে
        দৃশ্যমান ছিল না।
      cause_effect_overconfidence: |
        আমরা অনেকগুলো কারণ জড়িত থাকা সত্ত্বেও ফলাফলের স্পষ্ট কারণ আরোপ করি।
      luck_minimization: |
        সাফল্য এবং ব্যর্থতাকে ভাগ্য নয়, দক্ষতা এবং কৌশল দিয়ে ব্যাখ্যা করা হয়।
      story_over_evidence: |
        একটি বাধ্যতামূলক আখ্যান পরিসংখ্যানগত প্রমাণকে ছাপিয়ে যায়।
    examples:
      business_success: |
        "তারা X এর কারণে সফল হয়েছিল" যখন অনেক কারণ এবং ভাগ্য জড়িত ছিল—আমরা
        ফিট হওয়া গল্পটি বেছে নিই।
      investing: |
        বাজারের গতিবিধি কে এমন আখ্যান দিয়ে ব্যাখ্যা করা যা সন্তোষজনক মনে হয়
        কিন্তু পোস্ট-হক (post-hoc) হতে পারে।
      history: |
        ঐতিহাসিক ঘটনাগুলোকে অনিবার্য অগ্রগতি হিসাবে বলা হয় যখন তারা অনেক
        উপাদানের উপর নির্ভরশীল ছিল।
      career: |
        "আমি এখানে এসেছি কারণ আমি X করেছি" যখন ভাগ্য এবং সময় গুরুত্বপূর্ণ ভূমিকা পালন
        করেছে।
    real_world_implications: |
      ন্যারেটিভ ফ্যালাসি শেখা, ভবিষ্যদ্বাণীতে অতি-আত্মবিশ্বাস এবং সাফল্য ও ব্যর্থতার
      কারণ আরোপকে বিকৃত করে। এটি অতীতকে যতটা অনুমানযোগ্য ছিল তার চেয়ে বেশি অনুমানযোগ্য
      এবং ভবিষ্যৎকে যতটা আছে তার চেয়ে বেশি অনুমানযোগ্য করে তোলে।
    professional_application:
      networking_and_relationship_building: |
        যখন কেউ তাদের সাফল্যের গল্প বলে, মনে রাখবেন যে এটি একটি আখ্যান—সুসংগত
        এবং বাধ্যতামূলক, কিন্তু সম্ভবত সরলীকৃত। ভাগ্য এবং অদৃশ্য বিষয়গুলি
        কম মূল্যায়িত হতে পারে।
      collaborative_learning_initiative: |
        রেট্রোস্পেকটিভ (retrospectives) -এ, আখ্যান কে প্রমাণ থেকে আলাদা করুন।
        "আমরা সেই সময়ে কী বলতাম?" জিজ্ঞাসা করুন। ফলাফলের আগে অনিশ্চয়তা
        নথিভুক্ত করতে ডিসিশন জার্নাল (decision journals) ব্যবহার করুন।
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        কিছু আখ্যান সঠিক—সবকিছু ন্যারেটিভ ফ্যালাসি নয়। কার্যকারণ বিদ্যমান।
      excessive_skepticism: |
        "ন্যারেটিভ ফ্যালাসি" কারণ অতীত থেকে শেখা অস্বীকার করা। আমরা এখনও দরকারী
        শিক্ষা আহরণ করতে পারি।
      false_randomness: |
        যখন কিছু ফলাফল অর্থপূর্ণভাবে দায়ী করা যেতে পারে তখন সবকিছুকে র্যান্ডম (random)
        মনে করা।
      undermining_storytelling: |
        যোগাযোগ এবং অর্থের জন্য গল্পের মূল্য রয়েছে—ফ্যালাসি হলো বিশ্বাস করা যে
        তারা সম্পূর্ণ বা পূর্বাভাসমূলক, তারা যে বিদ্যমান তা নয়।
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: নেতিবাচকতার পক্ষপাত
    quick_introduction: |
      নেতিবাচকতার পক্ষপাত হলো ইতিবাচক তথ্যের চেয়ে নেতিবাচক তথ্যকে বেশি গুরুত্ব দেওয়ার প্রবণতা। খারাপ খবর, সমালোচনা এবং হুমকি আমাদের মনোযোগ আকর্ষণ করে এবং সমতুল্য ইতিবাচক উদ্দীপনার চেয়ে আমাদের সিদ্ধান্তকে দৃঢ়ভাবে প্রভাবিত করে।
    one_liner: খারাপ খবর ভালো খবরের চেয়ে বেশি ওজন বহন করে—আমরা হুমকিকে অগ্রাধিকার দেওয়ার জন্য তৈরি।
    try_this:
      - মূল্যায়নের সময় সক্রিয়ভাবে ইতিবাচক প্রমাণ খুঁজুন এবং সেগুলোকে গুরুত্ব দিন।
      - লক্ষ্য করুন কখন একটি সমালোচনা অনেক প্রশংসাকে ছাপিয়ে যাচ্ছে।
      - জিজ্ঞাসা করুন: আমি কি নেতিবাচক তথ্যকে তার প্রাপ্যতার চেয়ে বেশি গুরুত্ব দিচ্ছি?
    ask_yourself:
      - আমি কি ইতিবাচক বিষয়গুলিকে উপেক্ষা করে নেতিবাচক বিষয়গুলিতে আটকে আছি?
      - আমি যদি ভালো প্রমাণের উপর মনোযোগ দিতাম তবে কি আমার অনুভূতি ভিন্ন হতো?
    in_more_detail: |
      বিবর্তনগতভাবে, একটি হুমকি মিস করা মারাত্মক হতে পারে, যখন একটি সুযোগ মিস করা সাধারণত প্রাণঘাতী নয়। আমাদের মস্তিষ্ক নেতিবাচক তথ্যকে অগ্রাধিকার দেওয়ার জন্য তৈরি। একটি একক সমালোচনামূলক মন্তব্য অনেক প্রশংসাকে ছাড়িয়ে যেতে পারে। নেতিবাচক ঘটনাগুলি আরও স্পষ্টভাবে এবং দীর্ঘ সময়ের জন্য মনে রাখা হয়।

      এই পক্ষপাত সম্পর্ক, সিদ্ধান্ত গ্রহণ এবং সুস্থতাকে প্রভাবিত করে। আমরা ব্যর্থতার উপর আটকে থাকি, সবচেয়ে খারাপ পরিস্থিতি অনুমান করি এবং ইতিবাচক প্রমাণকে উপেক্ষা করি। এটি বোঝা আমাদের এটি সংশোধন করতে সাহায্য করে।
    why_this_is_important: |
      নেতিবাচকতার পক্ষপাতকে চিনতে পারা আপনাকে প্রতিক্রিয়ার ভারসাম্য বজায় রাখতে, সমালোচনার প্রতি অতিরিক্ত প্রতিক্রিয়া এড়াতে এবং আরও সুসংহত সিদ্ধান্ত নিতে সাহায্য করে। এটি খারাপ খবর কেন প্রভাবশালী এবং কেন আমরা প্রায়শই পরিস্থিতির চেয়ে খারাপ অনুভব করি তাও ব্যাখ্যা করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সম্পর্ক_গড়ে_তোলা
      - নেতৃত্ব
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        একটি নেতিবাচক মন্তব্য অনেক ইতিবাচক মন্তব্যকে ছাপিয়ে যায়।
      threat_prioritization: |
        সম্ভাব্য খারাপ দিকগুলি সমতুল্য ভালো দিকগুলির চেয়ে বেশি মনোযোগ পায়।
      vivid_negative_memories: |
        নেতিবাচক অভিজ্ঞতাগুলি আরও সহজে এবং আরও আবেগের সাথে মনে পড়ে।
      discounting_positive_evidence: |
        ভালো খবর দ্রুত ভুলে যাওয়া হয় বা ব্যাখ্যা করে উড়িয়ে দেওয়া হয়।
    examples:
      performance_reviews: |
        একজন কর্মচারী সমালোচনামূলক প্রতিক্রিয়ার একটি অংশকে আঁকড়ে ধরে এবং সামগ্রিক ইতিবাচক মূল্যায়নকে উপেক্ষা করে।
      news_consumption: |
        ইতিবাচক প্রবণতা সত্ত্বেও, নেতিবাচক শিরোনামগুলি মনোযোগ আকর্ষণ করে এবং বিশ্বদৃষ্টিকে আকার দেয়।
      relationships: |
        একটি একক যুক্তি অনেক ভালো মুহূর্তের চেয়ে বড় মনে হয়।
      investing: |
        বাজারের পতনগুলি সমতুল্য উত্থানের চেয়ে বেশি আতঙ্ক সৃষ্টি করে।
    real_world_implications: |
      নেতিবাচকতার পক্ষপাত মিডিয়া, রাজনীতি এবং সাংগঠনিক সংস্কৃতিকে আকার দেয়। এটি উদ্বেগ, সংঘাত এবং সর্বোত্তম নয় এমন সিদ্ধান্তের দিকে পরিচালিত করে। ইচ্ছাকৃতভাবে এটিকে প্রতিহত করলে সুস্থতা এবং বিচার ক্ষমতা উন্নত হতে পারে।
    professional_application:
      networking_and_relationship_building: |
        প্রতিক্রিয়া দেওয়ার সময়, মনে রাখবেন যে নেতিবাচক মন্তব্যগুলি বেশি ওজন বহন করবে—সেগুলির ভারসাম্য বজায় রাখুন এবং উন্নতির উপর জোর দিন। প্রতিক্রিয়া গ্রহণ করার সময়, সচেতনভাবে পুরো ছবিটি বিবেচনা করুন।
      collaborative_learning_initiative: |
        এমন সংস্কৃতি তৈরি করুন যা স্পষ্টভাবে নেতিবাচকতার পক্ষপাতকে প্রতিহত করে: বিজয় উদযাপন করুন, ইতিবাচক ফলাফল নথিভুক্ত করুন এবং "পোস্ট-মর্টেম" এর সাথে "প্রি-মর্টেম" (কি সঠিক হয়েছে তার) ভারসাম্য বজায় রাখুন।
    how_can_this_be_misapplied:
      toxic_positivity: |
        "ইতিবাচক চিন্তাভাবনা" এর উপর জোর দিয়ে বৈধ উদ্বেগগুলিকে খারিজ করে দেওয়া।
      ignoring_real_threats: |
        প্রকৃত ঝুঁকি অবমূল্যায়ন করার পর্যায়ে অতিরিক্ত সংশোধন করা।
      feedback_suppression: |
        প্রয়োজনীয় সমালোচনা এড়িয়ে যাওয়া কারণ "নেতিবাচকতা খারাপ"।
      invalidation: |
        কারও নেতিবাচক অনুভূতিকে "শুধুমাত্র নেতিবাচকতার পক্ষপাত" বলে অভিহিত করা যখন তাদের উদ্বেগের বাস্তব কারণ রয়েছে।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: ওকামের ক্ষুর
    quick_introduction: |
      ওকামের ক্ষুর (Occam's Razor) হলো সেই নীতি যা বলে যে একাধিক সম্ভাব্য অনুমানের মধ্যে,
      যে অনুমানে সবচেয়ে কম ধারণা জড়িত, সেটিকে অগ্রাধিকার দেওয়া উচিত। সরল ব্যাখ্যাগুলো
      প্রায়শই—সবসময় না হলেও—সঠিক হয়।
    one_liner: প্রমাণের সাথে সামঞ্জস্যপূর্ণ সরলতম ব্যাখ্যাটিকেই অগ্রাধিকার দিন।
    try_this:
      - তত্ত্বগুলো তুলনা করার সময় জিজ্ঞাসা করুন: কোনটিতে কম অনুমান আছে?
      - যে প্রমাণ দাবি করে না, সেখানে জটিলতা যোগ করবেন না।
      - লক্ষ্য করুন যখন আপনি একটি সরল ব্যাখ্যার চেয়ে একটি জটিল ব্যাখ্যাকে বেশি পছন্দ করছেন।
    ask_yourself:
      - আমি কি অপ্রয়োজনীয় জটিলতা যোগ করছি?
      - এই স্তরের ব্যাখ্যার জন্য কি প্রমাণ প্রয়োজন?
    in_more_detail: |
      উইলিয়াম অফ ওকামের নামানুসারে নামকরণ করা এই নীতিটি দাবি করে না যে সরল ব্যাখ্যাগুলো
      সর্বদা সত্য। এটি প্রস্তাব করে যে অপ্রয়োজনীয় জটিলতা প্রমাণ ছাড়া যোগ করা উচিত নয়।
      যদি দুটি তত্ত্ব একই ঘটনা ব্যাখ্যা করে, তবে প্রমাণ ভিন্ন কিছু দাবি না করা পর্যন্ত
      সরলতরটিকে অগ্রাধিকার দেওয়া উচিত।

      ওকামের ক্ষুর একটি হিউরিস্টিক, কোনো আইন নয়। মাঝে মাঝে সঠিক ব্যাখ্যাটি জটিল হতে পারে।
      কিন্তু এটি ওভারফিটিং, ষড়যন্ত্রমূলক চিন্তাভাবনা এবং অপ্রয়োজনীয় জটিলতা থেকে রক্ষা করে।
      এটি ব্যাখ্যার ক্ষেত্রে সরলতাকে অগ্রাধিকার দেয়।
    why_this_is_important: |
      ওকামের ক্ষুর প্রয়োগ করলে সমস্যা সমাধান উন্নত হয়, মডেলগুলিতে ওভারফিটিং কমে যায়
      এবং আপনাকে জটিল কিন্তু অসমর্থিত তত্ত্ব এড়াতে সহায়তা করে। যখন প্রমাণ অস্পষ্ট থাকে,
      তখন এটি একটি উপযোগী ডিফল্ট।
    when_to_use:
      - সমস্যা_সমাধান
      - সিদ্ধান্ত_গ্রহণ
      - শেখা
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      unnecessary_complexity: |
        একটি ব্যাখ্যায় অনেক বেশি অনুমান জড়িত থাকে যখন কম অনুমানই যথেষ্ট হতে পারে।
      conspiracy_tendencies: |
        যে ঘটনার সরল কারণ রয়েছে, তার জন্য একাধিক গোপন অভিনেতা জড়িত এমন জটিল ব্যাখ্যা।
      overfitting: |
        একটি মডেল বা তত্ত্ব যা অতীতের ডেটা নিখুঁতভাবে ব্যাখ্যা করে কিন্তু নতুন ডেটাতে ব্যর্থ হয়।
      elegance_in_explanation: |
        সেরা ব্যাখ্যাগুলো প্রায়শই পশ্চাৎদৃষ্টিতে "স্পষ্ট" মনে হয়।
    examples:
      debugging: |
        যখন কোনও বাগ ঘটে, তখন স্থাপত্যগত সমস্যা অনুমান করার আগে সরলতম কারণগুলি (যেমন, টাইপো, ভুল কনফিগারেশন) পরীক্ষা করুন।
      conspiracy_theories: |
        "সরকার X-এর পরিকল্পনা করেছে" এমন তত্ত্বের জন্য অনেক গোপন অভিনেতার প্রয়োজন; "কয়েকজন মানুষ ভুল করেছে" অপেক্ষাকৃত সরল।
      product_failure: |
        ব্যবহারকারীরা একটি ফিচার গ্রহণ করছে না - সরলতম ব্যাখ্যা: এটি তাদের সমস্যা সমাধান করে না, এটি নয় যে তারা UI দ্বারা বিভ্রান্ত।
      medical_diagnosis: |
        "সাধারণ জিনিসগুলো সাধারণ"—বিরল রোগের আগে সাধারণ রোগগুলি বিবেচনা করুন।
    real_world_implications: |
      ওকামের ক্ষুর বৈজ্ঞানিক অনুসন্ধান, প্রকৌশল এবং দৈনন্দিন যুক্তিতে পথ দেখায়।
      এটি জটিল ভুল তত্ত্বগুলিতে নষ্ট হওয়া প্রচেষ্টা হ্রাস করে। অপপ্রয়োগ করলে, এটি সত্যিকারের জটিল ঘটনাগুলোকে বাতিল করে দিতে পারে।
    professional_application:
      networking_and_relationship_building: |
        অন্যদের আচরণ ব্যাখ্যা করার সময়, বিদ্বেষ বা জটিল উদ্দেশ্য অনুমান করার আগে সরল ব্যাখ্যাকে (তারা ব্যস্ত, তারা ভুলে গেছে) অগ্রাধিকার দিন।
      collaborative_learning_initiative: |
        সমস্যা সমাধানের সেশনগুলিতে, জটিল মডেল তৈরি করার আগে স্পষ্টভাবে জিজ্ঞাসা করুন "সবচেয়ে সরল ব্যাখ্যা কী?"
    how_can_this_be_misapplied:
      oversimplification: |
        বৈধ জটিল ব্যাখ্যাগুলিকে "খুব জটিল" বলে বাতিল করে দেওয়া।
      status_quo_bias: |
        নতুন কিন্তু সঠিক ব্যাখ্যাগুলির উপর পরিচিত ব্যাখ্যাগুলিকে অগ্রাধিকার দেওয়ার জন্য ওকামের ক্ষুর ব্যবহার করা।
      scientific_rigidity: |
        নতুন তত্ত্বগুলিকে আরও জটিল হওয়ার কারণে প্রত্যাখ্যান করা, এমনকি যখন প্রমাণ তাদের সমর্থন করে।
      missing_nuance: |
        কিছু ক্ষেত্র (যেমন, মানুষের আচরণ, বাস্তুতন্ত্র) সহজাতভাবে জটিল; সরলতা বিভ্রান্তিকর হতে পারে।
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: উটপাখি প্রভাব (Ostrich Effect)
    quick_introduction: |
      উটপাখি প্রভাব হল নেতিবাচক আর্থিক তথ্য এড়িয়ে যাওয়ার প্রবণতা—উটপাখির মতো "মাটি চাপা দেওয়া"। মানুষ বাজার পড়লে তাদের পোর্টফোলিও দেখতে এড়িয়ে যায়, বিল খুলতে দেরি করে এবং সতর্কীকরণ লক্ষণগুলি উপেক্ষা করে যা তাদের কাজ করতে সাহায্য করতে পারে।
    one_liner: খারাপ খবর এড়িয়ে গেলে বাস্তবতা বদলায় না—এটা কেবল আপনার প্রতিক্রিয়া বিলম্বিত করে।
    try_this:
      - নিয়মিত বিরতিতে চেক-ইন করার সময়সূচী তৈরি করুন যাতে আপনি সংখ্যাগুলি এড়াতে না পারেন।
      - লক্ষ্য করুন কখন আপনি কিছু খুলতে বা দেখতে বিলম্ব করছেন।
      - জিজ্ঞাসা করুন: আমি কী এড়িয়ে যাচ্ছি, এবং আমি যদি এটির মুখোমুখি হই তবে কী পরিবর্তন হবে?
    ask_yourself:
      - আমি কি তথ্য এড়িয়ে যাচ্ছি কারণ এটি খারাপ হতে পারে?
      - পূর্বের সচেতনতা আমাকে আরও ভালভাবে কাজ করতে সাহায্য করবে কি?
    in_more_detail: |
      এই শব্দটি আচরণগত অর্থায়নে তৈরি করা হয়েছিল বিনিয়োগকারীদের বর্ণনা করার জন্য যারা বাজার পতনের সময় তাদের বিনিয়োগ পরীক্ষা করা এড়িয়ে যায়। এই আচরণ অর্থায়নের বাইরেও প্রসারিত হয়: মেডিকেল চেক-আপ এড়িয়ে যাওয়া, সম্পর্কের সমস্যা উপেক্ষা করা এবং কঠিন কথোপকথন বিলম্বিত করা। আমরা খারাপ খবরের উদ্বেগ এড়াতে চেষ্টা করি, কিন্তু এড়িয়ে চলা প্রায়শই সময়মতো কাজ প্রতিরোধ করার মাধ্যমে ফলাফলকে আরও খারাপ করে তোলে।

      এই প্রভাবটি লোকসান এড়ানো (loss aversion) এবং মানসিক অস্বস্তি এড়ানোর ইচ্ছা দ্বারা চালিত হয়। দুর্ভাগ্যবশত, অজ্ঞতা বাস্তবতা পরিবর্তন করে না—এটি কেবল আমাদের প্রতিক্রিয়া বিলম্বিত করে।
    why_this_is_important: |
      উটপাখি প্রভাব সনাক্ত করা আপনাকে সক্রিয়ভাবে কঠিন তথ্যের মুখোমুখি হতে সাহায্য করে। খারাপ খবর এড়িয়ে গেলে ফলাফল উন্নত হয় না; এটি সাধারণত সেগুলিকে বাড়িয়ে তোলে। সময়মতো সচেতনতা ভাল সিদ্ধান্ত নিতে সক্ষম করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - বিনিয়োগ (investing)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
      - কর্মজীবনের_সিদ্ধান্ত (career_moves)
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        বাজার পড়লে বিনিয়োগ বিবৃতি না দেখা।
      delaying_difficult_information: |
        বিল, মেডিকেল ফলাফল বা পারফরম্যান্স ফিডব্যাক খোলা বিলম্বিত করা।
      information_avoidance: |
        খারাপ খবর থাকতে পারে এমন উৎসগুলি সক্রিয়ভাবে এড়িয়ে যাওয়া।
      procrastination_on_unpleasant_tasks: |
        সমস্যাগুলি উন্মোচন করবে বা সমাধান করবে এমন কাজগুলিতে বিলম্ব করা।
    examples:
      investing: |
        একজন বিনিয়োগকারী একটি বিয়ার মার্কেটের সময় তাদের 401(k) দেখা বন্ধ করে দেয়, পুনরায় ভারসাম্য রক্ষার সুযোগগুলি হারিয়ে ফেলে।
      health: |
        খারাপ খবরের ভয়ে লক্ষণ থাকা সত্ত্বেও ডাক্তারের অ্যাপয়েন্টমেন্ট এড়িয়ে যাওয়া।
      finances: |
        ঋণ মোকাবেলা এড়াতে ক্রেডিট কার্ডের বিবৃতি বা ব্যাঙ্ক সতর্কতা খোলা এড়িয়ে যাওয়া।
      performance: |
        একজন ম্যানেজার বার্ষিক পর্যালোচনার আগ পর্যন্ত গুরুতর প্রতিক্রিয়া দেওয়া এড়িয়ে যায়, যখন পূর্বের হস্তক্ষেপ সাহায্য করত।
    real_world_implications: |
      উটপাখি প্রভাবের ফলে আর্থিক ফলাফল খারাপ হয়, চিকিৎসার বিলম্বে চিকিৎসা হয় এবং সম্পর্ক ও কর্মক্ষেত্রে সমস্যাগুলি অমীমাংসিত থাকে। এটি এড়ানো যায় এমন ক্ষতিগুলিকে বাড়িয়ে তোলে। যে সিস্টেমগুলি তথ্য উপেক্ষা করা কঠিন করে তোলে তা সাহায্য করতে পারে।
    professional_application:
      networking_and_relationship_building: |
        কঠিন কথোপকথন এড়িয়ে যাবেন না। সমস্যাগুলি নিজেরা সমাধান হয়ে যাবে এই আশায় থাকার চেয়ে তাড়াতাড়ি সমাধান করুন। নিয়মিত চেক-ইন তৈরি করুন যা সমস্যাগুলি বাড়ার আগে উন্মোচন করে।
      collaborative_learning_initiative: |
        ফিডব্যাক লুপ তৈরি করুন যা সমস্যাগুলি উপেক্ষা করা কঠিন করে তোলে—ড্যাশবোর্ড, নিয়মিত পর্যালোচনা এবং খারাপ খবরগুলির প্রাথমিক প্রকাশকে উৎসাহিত করার নিয়ম।
    how_can_this_be_misapplied:
      information_overload: |
        যখন কিছু তথ্য এড়িয়ে চলা স্বাস্থ্যকর (যেমন, প্রতি মিনিটে স্টক চেক না করা) তখন অবিরাম পর্যবেক্ষণের জন্য জোর করা।
      anxiety_amplification: |
        সম্ভাব্য সমস্যাগুলির উপর এত বেশি মনোযোগ তৈরি করা যে এটি ফলাফল উন্নত না করে উদ্বেগ বাড়ায়।
      blame_shifting: |
        সমস্ত এড়িয়ে চলাকে "উটপাখি প্রভাব" হিসাবে চিহ্নিত করা যখন কিছু এড়িয়ে চলা যুক্তিসঙ্গত (যেমন, কোলাহল উপেক্ষা করা)।
      micromanagement: |
        অন্যদের অত্যধিক নজরদারির ন্যায্যতা প্রমাণ করতে ধারণাটি ব্যবহার করা।
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: প্যারেটো নীতি
    quick_introduction: |
      প্যারেটো নীতি (বা ৮০/২০ নিয়ম) বলে যে প্রায় ৮০% প্রভাব ২০% কারণ থেকে আসে। অল্প সংখ্যক ইনপুট প্রায়শই বেশিরভাগ আউটপুট তৈরি করে—বিক্রয়, ত্রুটি, গ্রাহক, প্রচেষ্টা, বৈশিষ্ট্য এবং আরও অনেক কিছুতে। অত্যাবশ্যকীয় অল্প সংখ্যক উপর মনোযোগ দিন।
    one_liner: ৮০% প্রভাব ২০% কারণ থেকে আসে—অত্যাবশ্যকীয় অল্প সংখ্যক উপর মনোযোগ দিন।
    try_this:
      - যে ২০% ইনপুট ৮০% ফলাফল তৈরি করে তা শনাক্ত করুন—সেখানেই দ্বিগুণ করুন।
      - যে ৮০% অল্প উৎপাদন করে তা বাদ দিন বা অগ্রাধিকার কমিয়ে দিন।
      - জিজ্ঞাসা করুন: যদি আমি কয়েকটি জিনিস ভালভাবে করি তবে কোনটি সবচেয়ে বেশি গুরুত্বপূর্ণ হবে?
    ask_yourself:
      - আমি কি আমার প্রচেষ্টা সমানভাবে ছড়িয়ে দিচ্ছি যখন কয়েকটি জিনিস বেশি গুরুত্বপূর্ণ?
      - আমার উচ্চ-লিভারেজ ২০% কী?
    in_more_detail: |
      ভিলফ্রেডো প্যারেটো পর্যবেক্ষণ করেছিলেন যে ইতালির ৮০% জমি ২০% জনসংখ্যা দ্বারা অধিকৃত ছিল। নীতিটি সাধারণীকরণ করা হয়েছে: গ্রাহকদের ২০% থেকে ৮০% বিক্রয়, কোডের ২০% থেকে ৮০% ত্রুটি, প্রচেষ্টার ২০% থেকে ৮০% ফলাফল। সঠিক অনুপাত পরিবর্তিত হয়, তবে প্যাটার্ন—অসম বন্টন—সাধারণ।

      নীতিটি sugiere করে যে উচ্চ-লিভারেজ ২০% শনাক্তকরণ এবং সেগুলিতে মনোযোগ দেওয়া ফলাফলের নাটকীয়ভাবে উন্নতি করতে পারে। এটি একটি অগ্রাধিকার হিউরিস্টিক, কোনো ভৌত আইন নয়।
    why_this_is_important: |
      প্যারেটো নীতি প্রয়োগ করা আপনাকে কঠোরভাবে অগ্রাধিকার দিতে, কম-প্রভাবিত কার্যকলাপে প্রচেষ্টা নষ্ট করা এড়াতে এবং কম পরিশ্রমে বেশি কিছু অর্জন করতে সহায়তা করে। এটি উৎপাদনশীলতা এবং কৌশলের জন্য মৌলিক।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - নেতৃত্ব
      - কর্মজীবনের_সিদ্ধান্ত
    how_can_you_spot_it:
      uneven_distribution: |
        X এর একটি ক্ষুদ্র অংশ Y এর একটি বৃহৎ অংশের জন্য দায়ী।
      high_leverage_activities: |
        কয়েকটি ক্রিয়া বেশিরভাগ ফলাফল তৈরি করে।
      low_value_tail: |
        অনেক ক্রিয়াকলাপ অল্প অবদান রাখে; সেগুলিকে ছেঁটে ফেললে ন্যূনতম প্রভাব পড়ে।
      vital_few_vs_trivial_many: |
        মূল বিষয় হল কোনটি কয়েকটি সবচেয়ে গুরুত্বপূর্ণ তা শনাক্ত করা।
    examples:
      sales: |
        গ্রাহকদের ২০% রাজস্বের ৮০% উৎপন্ন করে—তাদের ধরে রাখা এবং বৃদ্ধি করার উপর মনোযোগ দিন।
      software: |
        বৈশিষ্ট্যগুলির ২০% ব্যবহারের ৮০% চালিত করে—সেগুলিতে অগ্রাধিকার দিন।
      productivity: |
        কয়েকটি অভ্যাস বা রুটিন আপনার বেশিরভাগ আউটপুট তৈরি করে—সেগুলিতে দ্বিগুণ করুন।
      problems: |
        ত্রুটিগুলির ২০% ক্র্যাশের ৮০% কারণ হয়—প্রথমে সেগুলি ঠিক করুন।
    real_world_implications: |
      প্যারেটো নীতি সম্পদ বরাদ্দ, পণ্যের কৌশল এবং ব্যক্তিগত উৎপাদনশীলতাকে নির্দেশ করে। এটিকে উপেক্ষা করলে প্রচেষ্টা খুব পাতলা ছড়িয়ে পড়ে। এটিকে অতিরিক্ত প্রয়োগ করলে "লং টেইল" উপেক্ষা করা হতে পারে যেখানে এটি গুরুত্বপূর্ণ।
    professional_application:
      networking_and_relationship_building: |
        আপনার লক্ষ্যগুলির জন্য সবচেয়ে গুরুত্বপূর্ণ সম্পর্কগুলি শনাক্ত করুন। সমানভাবে প্রচেষ্টা ছড়িয়ে দেওয়ার পরিবর্তে সেগুলির উপর অসামঞ্জস্যপূর্ণভাবে বিনিয়োগ করুন।
      collaborative_learning_initiative: |
        দলের কার্যকারিতা উন্নত করার সময়, যে ২০% হস্তক্ষেপ ৮০% ফলাফল চালিত করে তা খুঁজুন। সেখানে প্রশিক্ষণ এবং প্রক্রিয়া পরিবর্তনগুলিতে মনোযোগ দিন।
    how_can_this_be_misapplied:
      oversimplification: |
        সব জায়গায় ৮০/২০ প্রযোজ্য বলে ধরে নেওয়া; কিছু বন্টন বেশি সমান।
      neglecting_the_tail: |
        "তুচ্ছ অনেক" উপেক্ষা করা যখন সেগুলি সম্মিলিতভাবে গুরুত্বপূর্ণ (যেমন, অনেক ছোট গ্রাহক, প্রান্তের ঘটনা)।
      false_precision: |
        ৮০/২০ কে আক্ষরিক হিসাবে বিবেচনা করা একটি মোটামুটি হিউরিস্টিক এর পরিবর্তে।
      misidentifying_the_vital_few: |
        ত্রুটিপূর্ণ বিশ্লেষণের কারণে ভুল ২০% এর উপর মনোযোগ দেওয়া।
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: পার্কিনসন'স ল (Parkinson's Law)
    quick_introduction: |
      পার্কিনসন'স ল (Parkinson's Law) বলে যে, "কাজ সম্পন্ন করার জন্য উপলব্ধ সময় পূরণ করতে কাজ প্রসারিত হয়।" একটি কাজকে এক সপ্তাহ সময় দিন, এবং এটি এক সপ্তাহ সময় নেবে; একটি দিন সময় দিন, এবং এটি প্রায়শই একদিনে সম্পন্ন হয়। এটি বাজেট, দলের আকার এবং সম্পদের ক্ষেত্রেও প্রযোজ্য।
    one_liner: কাজ সম্পন্ন করার জন্য উপলব্ধ সময় পূরণ করতে কাজ প্রসারিত হয়।
    try_this:
      - ফোকাস তৈরি করতে এবং স্কোপ ক্রিপ (scope creep) প্রতিরোধ করতে কঠোর সময়সীমা নির্ধারণ করুন।
      - জিজ্ঞাসা করুন: এই কাজটি যুক্তিসঙ্গতভাবে ন্যূনতম কত সময় নিতে পারে?
      - লক্ষ্য করুন কখন আনুপাতিক মূল্য ছাড়াই অতিরিক্ত সময় বা সম্পদ ব্যবহার করা হচ্ছে।
    ask_yourself:
      - আমি কি সময় পূরণ করছি, নাকি কাজটি সত্যিই এটির দাবি করছে?
      - একটি কঠোর সময়সীমা কি উন্নত অগ্রাধিকার তৈরিতে বাধ্য করবে?
    in_more_detail: |
      সি. নর্থকোট পার্কিনসন পর্যবেক্ষণ করেছিলেন যে কাজ নির্বিশেষে আমলাতন্ত্র বৃদ্ধি পায়। তিনি আরও লক্ষ্য করেছিলেন যে কাজগুলি উপলব্ধ সময় পূরণ করতে প্রসারিত হয়—আমরা সময়সীমার সাথে আমাদের প্রচেষ্টা এবং গতি সামঞ্জস্য করি। কঠোর সময়সীমা ফোকাস বাড়াতে পারে; শিথিল সময়সীমা দীর্ঘসূত্রিতা এবং স্কোপ ক্রিপ (scope creep) আমন্ত্রণ জানায়।

      এই নিয়মের প্রকল্প পরিচালনা, ব্যক্তিগত উৎপাদনশীলতা এবং সাংগঠনিক নকশার উপর প্রভাব রয়েছে। এটি প্রস্তাব করে যে অগ্রাধিকার তৈরিতে বাধ্য করার মাধ্যমে সীমাবদ্ধতাগুলি ফলাফল উন্নত করতে পারে।
    why_this_is_important: |
      পার্কিনসন'স ল (Parkinson's Law) বোঝা আপনাকে আরও ভাল সময়সীমা নির্ধারণ করতে, প্রকল্পগুলিতে অতিরিক্ত-সম্পদ বরাদ্দ এড়াতে এবং যখন "আরও সময়" বা "আরও লোক" সাহায্য করবে না—এবং ক্ষতি করতে পারে—তা চিনতে সাহায্য করে। সীমাবদ্ধতা উত্পাদনশীল হতে পারে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - নেতৃত্ব (leadership)
      - সমস্যা_সমাধান (problem_solving)
      - কর্মজীবনের_পদক্ষেপ (career_moves)
    how_can_you_spot_it:
      deadline_driven_effort: |
        সময়সীমা কাছাকাছি আসার সাথে সাথে কাজ দ্রুত হয়; সময়সীমা দূরে থাকলে সামান্য অগ্রগতি হয়।
      scope_expansion: |
        প্রকল্পগুলি ফোকাস বজায় রাখার পরিবর্তে উপলব্ধ সম্পদ পূরণ করতে বৃদ্ধি পায়।
      bureaucratic_growth: |
        কর্মপ্রবাহ বৃদ্ধি না পেলেও সংস্থাগুলি লোক এবং প্রক্রিয়া যোগ করে।
      budget_exhaustion: |
        ব্যয় প্রয়োজনীয় ছিল কিনা তা নির্বিশেষে বাজেট বছরের শেষ নাগাদ সম্পূর্ণরূপে ব্যয় করা হয়।
    examples:
      student_deadlines: |
        এক মাস পরে জমা দেওয়ার মতো একটি পেপার শেষ ৪৮ ঘন্টায় লেখা হয়।
      project_management: |
        ৬ মাসের সময়সীমার একটি প্রকল্প ৬ মাস সময় নেয়; ৩ মাসের সময়সীমার সাথে একই স্কোপও সম্পন্ন হতে পারে।
      meetings: |
        একটি ১ ঘন্টার মিটিংয়ে ৩০ মিনিটের মধ্যে কাজ হলেও পুরো ঘন্টা ভরে যায়।
      budgets: |
        আগামী বছরের জন্য একই বাজেট ন্যায্যতা প্রমাণ করতে একটি বিভাগ বছরের শেষ নাগাদ তাদের পূর্ণ বাজেট ব্যয় করে।
    real_world_implications: |
      পার্কিনসন'স ল (Parkinson's Law) উৎপাদনশীলতা, সাংগঠনিক ফোলা এবং সম্পদ বরাদ্দের উপর প্রভাব ফেলে। এটি প্রস্তাব করে যে কৃত্রিম সীমাবদ্ধতা (ছোট সময়সীমা, ছোট দল) ফোকাস এবং দক্ষতা উন্নত করতে পারে।
    professional_application:
      networking_and_relationship_building: |
        স্কোপ ক্রিপ (scope creep) প্রতিরোধ করতে এবং গতি বজায় রাখতে সহযোগী কাজের জন্য স্পষ্ট, কঠোর সময়সীমা নির্ধারণ করুন।
      collaborative_learning_initiative: |
        মিটিং এবং প্রকল্পের জন্য টাইম-বক্সিং (time-boxing) ব্যবহার করুন। গুণমান ত্যাগ না করেই ফোকাস উন্নত করে কিনা তা পরীক্ষা করার জন্য ছোট সময়সীমা নিয়ে পরীক্ষা করুন।
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        অবাস্তবভাবে ছোট সময়সীমা নির্ধারণ করা যা বার্নআউট (burnout) বা নিম্নমানের কারণ হয়।
      underresourcing: |
        ধারণা করা যে কম সময় বা কম লোক সবসময় কাজ করবে—কিছু কাজের জন্য পর্যাপ্ত সংস্থান প্রয়োজন।
      blame_shifting: |
        "পার্কিনসন'স ল (Parkinson's Law)" এর উপর দোষ চাপানো যখন কাজটি প্রকৃতপক্ষে জটিল ছিল।
      ignoring_quality: |
        স্থায়ী ফলাফলের মূল্যে কৃত্রিম সীমাবদ্ধতা পূরণের জন্য তাড়াহুড়ো করা।
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা
    quick_introduction: |
      সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা হলো নিশ্চিততার পরিবর্তে সম্ভাবনার নিরিখে যুক্তি করার অভ্যাস। "এটা কি ঘটবে?" এই প্রশ্নের পরিবর্তে আমরা জিজ্ঞাসা করি "এটির ঘটার সম্ভাবনা কত?" এটি অনিশ্চয়তাকে আলিঙ্গন করে এবং উন্নত সিদ্ধান্ত নিতে এটি ব্যবহার করে।
    one_liner: নিশ্চিততার বদলে সম্ভাবনার নিরিখে চিন্তা করুন—অনিশ্চয়তাকে আলিঙ্গন করুন।
    try_this:
      - এটা কি ঘটবে? এর বদলে "এটির ঘটার সম্ভাবনা কত?" ব্যবহার করুন।
      - একাধিক পরিস্থিতি বিবেচনা করুন এবং আনুমানিক সম্ভাবনা নির্ধারণ করুন।
      - নতুন প্রমাণ আসার সাথে সাথে আপনার বিশ্বাস আপডেট করুন।
    ask_yourself:
      - আমি কি বাইনারি (হ্যাঁ/না) শব্দে চিন্তা করছি যেখানে সম্ভাবনাগুলি আরও সঠিক হত?
      - সম্ভাব্য ফলাফলের পরিসীমা কত?
    in_more_detail: |
      বাস্তব জগতের বেশিরভাগ ফলাফল অনিশ্চিত। সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা বাইনারি হ্যাঁ/না-এর পরিবর্তে graduated beliefs (ক্রমবর্ধমান বিশ্বাস) প্রতিস্থাপন করে। এতে একাধিক পরিস্থিতি বিবেচনা করা, আনুমানিক সম্ভাবনা নির্ধারণ করা এবং প্রমাণ আসার সাথে সাথে আপডেট করা অন্তর্ভুক্ত। এটি অতিরিক্ত আত্মবিশ্বাস এবং সাদা-কালো চিন্তাভাবনার বিপরীত।

      মূল অনুশীলনগুলির মধ্যে রয়েছে: পরিসীমার মধ্যে চিন্তা করা, ভিত্তি হার (base rates) বিবেচনা করা, প্রমাণের সাথে বিশ্বাস আপডেট করা এবং ঝুঁকি (ज्ञात সম্ভাবনা) ও অনিশ্চয়তা (অज्ञात সম্ভাবনা)-এর মধ্যে পার্থক্য করা। এটি ক্যালিব্রেশন (calibration) এবং সিদ্ধান্তের গুণমান উন্নত করে।
    why_this_is_important: |
      সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা অতিরিক্ত আত্মবিশ্বাস কমায়, পূর্বাভাস উন্নত করে এবং অনিশ্চয়তার অধীনে উন্নত সিদ্ধান্তের দিকে পরিচালিত করে। এটি বিনিয়োগ, কৌশল এবং যেকোনো ক্ষেত্রে যেখানে ভবিষ্যত অনিশ্চিত, তার জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - ঝুঁকি_মূল্যায়ন
      - বিনিয়োগ
      - সমস্যা_সমাধান
    how_can_you_spot_it:
      likelihood_language: |
        "সম্ভবত," "সম্ভাব্য," "অসম্ভব" — "হবে" বা "হবে না" এর পরিবর্তে।
      scenario_thinking: |
        আনুমানিক সম্ভাবনাসহ একাধিক সম্ভাব্য ভবিষ্যতের বিবেচনা।
      calibration: |
        সময়ের সাথে সাথে প্রকৃত ফলাফলের ফ্রিকোয়েন্সির সাথে মিলে যাওয়া পূর্বাভাস।
      uncertainty_acknowledgment: |
        আপনি যা জানেন না তা স্পষ্টভাবে উল্লেখ করা।
    examples:
      forecasting: |
        "আমার মনে হয় ডেডলাইন পূরণ করার ৬০% সম্ভাবনা আছে" — "আমরা ডেডলাইন পূরণ করব" এর পরিবর্তে।
      investing: |
        "এটির ২ গুণ হওয়ার ৩০% সম্ভাবনা এবং -৫০% হওয়ার ৭০% সম্ভাবনা আছে" — "এটি রকেটের গতিতে উঠবে" এর পরিবর্তে।
      strategy: |
        একাধিক পরিস্থিতির (সর্বোত্তম, সাধারণ, সবচেয়ে খারাপ অবস্থা) জন্য আনুমানিক সম্ভাবনাসহ পরিকল্পনা করা।
      hiring: |
        "ইন্টারভিউয়ের ভিত্তিতে, আমি মনে করি তাদের সফল হওয়ার সম্ভাবনা ৭০%" — "তারা একটি দারুণ নিয়োগ" এর পরিবর্তে।
    real_world_implications: |
      সম্ভাব্যতা ভিত্তিক চিন্তাভাবনা ক্যালিব্রেশন উন্নত করে, বিস্ময় কমায় এবং উন্নত ঝুঁকি ব্যবস্থাপনা সক্ষম করে। এটি কার্যকর পূর্বাভাস এবং অনিশ্চয়তার অধীনে সিদ্ধান্ত গ্রহণের জন্য কেন্দ্রীয়।
    professional_application:
      networking_and_relationship_building: |
        উপযুক্ত হলে সম্ভাবনার নিরিখে যোগাযোগ করুন — "আমি বেশ আত্মবিশ্বাসী" বনাম "আমি নিশ্চিত"। এটি জ্ঞানীয় বিনয় (epistemic humility) সংকেত দিয়ে বিশ্বাস তৈরি করে।
      collaborative_learning_initiative: |
        দলকে অনিশ্চয়তা প্রকাশ করতে উৎসাহিত করুন। সম্ভাব্যতা ভিত্তিক রায় উন্নত করতে পূর্বাভাস বাজার (prediction markets) বা ক্যালিব্রেশন অনুশীলন ব্যবহার করুন।
    how_can_this_be_misapplied:
      false_precision: |
        এতটা নির্ভুল হতে না পারলেও সুনির্দিষ্ট সম্ভাবনা (যেমন, ৭৩%) নির্ধারণ করা।
      analysis_paralysis: |
        "আমরা নিশ্চিত হতে পারি না" বলে কখনো কাজ না করা।
      hedging_overuse: |
        সবকিছুকে এমনভাবে যোগ্য করে তোলা যে তা অর্থহীন হয়ে যায়।
      dismissing_intuition: |
        শক্তিশালী স্বজ্ঞাত অনুভূতি (gut feelings) যখন তারা বৈধ তথ্য বহন করতে পারে, সেগুলোকে উপেক্ষা করার জন্য অতিরিক্ত সংশোধন করা।
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: পিগম্যালিয়ন প্রভাব
    quick_introduction: |
      পিগম্যালিয়ন প্রভাব (বা রোশেন্থাল প্রভাব) হলো এমন একটি ঘটনা যেখানে উচ্চতর প্রত্যাশা উন্নত পারফরম্যান্সের দিকে পরিচালিত করে। যখন শিক্ষক, ম্যানেজার বা অন্যরা কারো কাছ থেকে বেশি প্রত্যাশা করে, তখন সেই ব্যক্তি আরও ভালো পারফর্ম করতে থাকে। প্রত্যাশাগুলো আত্ম-পূরণকারী ভবিষ্যদ্বাণীতে পরিণত হয়।
    one_liner: উচ্চতর প্রত্যাশা উন্নত পারফরম্যান্সের দিকে পরিচালিত করে—প্রত্যাশা বাস্তবতাকে রূপ দেয়।
    try_this:
      - উচ্চ কিন্তু অর্জনযোগ্য প্রত্যাশা সেট করুন; সেগুলো স্পষ্টভাবে যোগাযোগ করুন।
      - লক্ষ্য করুন কখন কম প্রত্যাশা কারো পারফরম্যান্সকে সীমাবদ্ধ করতে পারে।
      - জিজ্ঞাসা করুন: আমি নিগূঢ়ভাবে কী আশা করছি—এবং তা ফলাফলে কীভাবে প্রভাব ফেলতে পারে?
    ask_yourself:
      - আমার প্রত্যাশা কি এই ব্যক্তিকে সাহায্য করছে নাকি সীমাবদ্ধ করছে?
      - উচ্চতর প্রত্যাশা কি আমার তাদের সাথে আচরণ—এবং তাদের ফলাফল পরিবর্তন করবে?
    in_more_detail: |
      রবার্ট রোশেন্থাল এবং লেনোর জ্যাকবসন শিক্ষকদের মিথ্যা তথ্য দিয়েছিলেন যে নির্দিষ্ট কিছু শিক্ষার্থী একাডেমিকভাবে "বিকশিত" হবে। সেই শিক্ষার্থীরা—যারা এলোমেলোভাবে নির্বাচিত হয়েছিল—আসলে অন্যদের চেয়ে বেশি উন্নতি করেছিল। শিক্ষকদের প্রত্যাশা তাদের আচরণকে (বেশি মনোযোগ, উষ্ণ প্রতিক্রিয়া) প্রভাবিত করেছিল, যা শিক্ষার্থীদের পারফরম্যান্সকে প্রভাবিত করেছিল। প্রত্যাশা বাস্তবতাকে রূপ দেয়।

      বিপরীতভাবে—কম প্রত্যাশা খারাপ পারফরম্যান্সের দিকে নিয়ে যায়—একে কখনও কখনও গোলেম প্রভাব বলা হয়। উভয়ই দেখায় যে অন্যদের সম্পর্কে আমাদের বিশ্বাস তাদের ফলাফলে প্রভাব ফেলতে পারে। এর নেতৃত্ব, শিক্ষা এবং প্যারেন্টিং-এর উপর গভীর প্রভাব রয়েছে।
    why_this_is_important: |
      পিগম্যালিয়ন প্রভাব বোঝা আপনাকে প্রত্যাশার শক্তিকে কাজে লাগাতে সাহায্য করে। উচ্চ প্রত্যাশা, আন্তরিকভাবে যোগাযোগ করা হলে, পারফরম্যান্স উন্নত করতে পারে। কম প্রত্যাশা আত্ম-পূরণকারী ব্যর্থতা তৈরি করতে পারে। অন্যদের সম্পর্কে আপনার বিশ্বাস গুরুত্বপূর্ণ।
    when_to_use:
      - নেতৃত্ব
      - সম্পর্ক_গঠন
      - শিক্ষা
      - সিদ্ধান্ত_গ্রহণ
    how_can_you_spot_it:
      expectation_performance_link: |
        যাদের কাছ থেকে আমরা বেশি আশা করি তারা আরও ভালো পারফর্ম করে।
      differential_treatment: |
        আমরা আমাদের প্রত্যাশার উপর ভিত্তি করে মানুষকে ভিন্নভাবে বিবেচনা করি—প্রায়শই
        অচেতনভাবে।
      self_fulfilling_prophecy: |
        দক্ষতা সম্পর্কে বিশ্বাস এমন আচরণকে প্রভাবিত করে যা দক্ষতা তৈরি করে।
      teacher_student_dynamics: |
        শিক্ষকদের প্রত্যাশা ভিন্ন ভিন্ন আচরণের মাধ্যমে শিক্ষার্থীদের ফলাফলে প্রভাব ফেলে।
    examples:
      education: |
        যেসব শিক্ষক শিক্ষার্থীদের সফল হওয়ার প্রত্যাশা করেন তারা বেশি সমর্থন দেন;
        সেই শিক্ষার্থীরা উন্নতি করে। যারা ব্যর্থতার প্রত্যাশা করেন তারা
        অনিচ্ছাকৃতভাবে এটি তৈরি করতে পারেন।
      workplace: |
        যেসব ম্যানেজার তাদের অধীনস্থদের কাছ থেকে উচ্চ পারফরম্যান্সের প্রত্যাশা করেন তারা
        বেশি সুযোগ এবং প্রতিক্রিয়া প্রদান করেন; পারফরম্যান্স উন্নত হয়।
      parenting: |
        যেসব অভিভাবক তাদের সন্তানদের দায়িত্বশীল হওয়ার প্রত্যাশা করেন তারা
        তাদের বেশি দায়িত্ব দেন; তারা সে অনুযায়ী কাজ করে।
      stereotypes: |
        স্টিরিওটাইপ থ্রেট হলো এর বিপরীত—নেতিবাচক প্রত্যাশা
        পারফরম্যান্সকে ক্ষতিগ্রস্ত করতে পারে।
    real_world_implications: |
      পিগম্যালিয়ন প্রভাব শিক্ষা, ব্যবস্থাপনা এবং সম্পর্ককে প্রভাবিত করে। এটি পরামর্শ দেয় যে প্রত্যাশা বাড়ানো—যখন
      সহযোগিতামূলকভাবে করা হয়—ফলাফল উন্নত করতে পারে। এটি সতর্কও করে যে
      কম প্রত্যাশা ধ্বংসাত্মক হতে পারে।
    professional_application:
      networking_and_relationship_building: |
        মানুষের কাছ থেকে উচ্চ প্রত্যাশা রাখুন—এবং সেগুলি পূরণ করার জন্য সহায়তা প্রদান করুন।
        সম্ভাবনায় বিশ্বাস রাখুন। আপনার প্রত্যাশা
        আপনার আচরণকে প্রভাবিত করে, যা তাদের ফলাফলকে প্রভাবিত করে।
      collaborative_learning_initiative: |
        উচ্চ সহায়তার সাথে উচ্চ প্রত্যাশার সংস্কৃতি তৈরি করুন।
        লোকদের "কম পারফর্মার" হিসাবে চিহ্নিত করা এড়িয়ে চলুন যাতে
        তারা আত্ম-পূরণকারী হয়ে ওঠে। যারা সফল হবে বলে আপনি আশা করেন তাদের মধ্যে বিনিয়োগ করুন।
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        সহায়তা ছাড়া পূরণ করা অসম্ভব এমন প্রত্যাশা তৈরি করলে
        ব্যর্থতা এবং নিরুৎসাহ তৈরি হয়।
      blame_shifting: |
        "তারা প্রত্যাশা পূরণ করেনি" যখন আমরা
        সাফল্যের জন্য সহায়তা বা শর্ত প্রদান করিনি।
      ignoring_constraints: |
        শুধুমাত্র প্রত্যাশা কাঠামোগত বাধা অতিক্রম করে না।
      pressure_without_support: |
        সম্পদ বা সহায়তা ছাড়া উচ্চ প্রত্যাশা ক্ষতিকর হতে পারে।
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: গড়-এর দিকে প্রত্যাবর্তন
    quick_introduction: |
      গড়-এর দিকে প্রত্যাবর্তন হল পরিসংখ্যানগত একটি ঘটনা যেখানে চরম ফলাফলগুলি গড়-এর কাছাকাছি ফলাফল দ্বারা অনুসরণ করা হয়। অস্বাভাবিকভাবে ভালো বা খারাপ ফলাফলের পরে, পরবর্তী ফলাফল সম্ভবত কম চরম হবে—কোনও কার্যকারণ হস্তক্ষেপের কারণে নয়, বরং এলোমেলো ভিন্নতার কারণে।
    one_liner: চরম ফলাফলগুলি গড়-এর কাছাকাছি ফলাফল দ্বারা অনুসরণ করা হয়।
    try_this:
      - প্রত্যাবর্তন-কে আপনার হস্তক্ষেপের কারণ হিসেবে চিহ্নিত করবেন না—এটি প্রায়শই এমনিতেই ঘটত।
      - চরম ফলাফলের পরে, পরবর্তীটিকে কম চরম বলে আশা করুন।
      - জিজ্ঞাসা করুন: এই পরিবর্তন কি আমার কাজের কারণে হয়েছে, নাকি কেবল গড়-এর দিকে প্রত্যাবর্তন?
    ask_yourself:
      - আমি কি আমার হস্তক্ষেপকে সেই সবের জন্য কৃতিত্ব দিচ্ছি বা দোষ দিচ্ছি যা এলোমেলো ভিন্নতা হতে পারে?
      - আমার কাজ ছাড়া কি এটা ঘটত?
    in_more_detail: |
      যদি কোনও ছাত্র একটি পরীক্ষায় অস্বাভাবিকভাবে বেশি নম্বর পায়, তাহলে সে পরবর্তী পরীক্ষায় তার গড় নম্বরের কাছাকাছি নম্বর পাবে—কারণ সে "আলস" হয়ে গেছে তা নয়, বরং প্রথম নম্বরটি কিছুটা ভাগ্যের ফল ছিল। একই কথা প্রযোজ্য খেলাধুলা, শেয়ার বাজারের রিটার্ন এবং ব্যবসায়িক মেট্রিকের ক্ষেত্রে। আমরা প্রায়শই "প্রত্যাবর্তন"-কে আমাদের করা কোনও কিছুর (যেমন, শাস্তি বা পুরষ্কার) জন্য দায়ী করি, যখন এটি এমনিতেই ঘটত।

      ড্যানিয়েল কাহনেম্যান বর্ণনা করেছেন কিভাবে বিমান প্রশিক্ষকরা ভুলবশত এই সিদ্ধান্তে পৌঁছেছিলেন যে প্রশংসা কর্মক্ষমতা বাড়ায় এবং সমালোচনা উন্নত করে—তারা চরম কর্মক্ষমতার পরে গড়-এর দিকে প্রত্যাবর্তন পর্যবেক্ষণ করছিলেন।
    why_this_is_important: |
      গড়-এর দিকে প্রত্যাবর্তন বোঝা কার্যকারণকে ভুলভাবে চিহ্নিত করা থেকে বিরত রাখে। এটি আপনাকে আউটলায়ারগুলিতে অতিরিক্ত প্রতিক্রিয়া জানানো এবং নয়েজের উপর ভিত্তি করে পরিবর্তন করা থেকে বিরত থাকতে সাহায্য করে। এটি হস্তক্ষেপ এবং কর্মক্ষমতা মূল্যায়নের জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - বিনিয়োগ
      - ঝুঁকি_মূল্যায়ন
      - নেতৃত্ব
    how_can_you_spot_it:
      extreme_followed_by_average: |
        অস্বাভাবিকভাবে ভালো বা খারাপ ফলাফল গড়-এর কাছাকাছি একটি ফলাফল দ্বারা অনুসরণ করা হয়।
      spurious_causation: |
        হস্তক্ষেপের ফলে "পুনরুদ্ধার" বা "পতন" কে দায়ী করা যখন প্রত্যাবর্তন এমনিতেই ঘটত।
      overreaction_to_outliers: |
        একটি একক চরম ডেটা পয়েন্টের উপর ভিত্তি করে নীতি বা ব্যক্তিগত পরিবর্তন করা।
      reward_punishment_confusion: |
        বিশ্বাস করা যে শাস্তি "কাজ করেছে" যখন উন্নতি কেবল প্রত্যাবর্তন ছিল।
    examples:
      sports: |
        একজন খেলোয়াড় তার কর্মজীবনের সেরা খেলা দেখায়, তারপর গড়ে ফিরে আসে—ভক্তরা "আত্মতুষ্টি"-কে দোষ দিতে পারে।
      investing: |
        একটি স্টক একটি দুর্দান্ত বছর কাটায়, তারপর ফিরে আসে—বিনিয়োগকারীরা খারাপ ব্যবস্থাপনার জন্য পতনকে দায়ী করতে পারে যখন এটি আংশিকভাবে প্রত্যাবর্তন।
      performance_reviews: |
        একজন কর্মচারী একটি খারাপ ত্রৈমাসিক কাটায়, প্রতিক্রিয়া পায়, উন্নতি করে—প্রতিক্রিয়াকে কৃতিত্ব দেওয়া হতে পারে যখন প্রত্যাবর্তন নির্বিশেষে ঘটত।
      medicine: |
        একজন রোগী খারাপ অনুভব করে, চিকিৎসা নেয়, উন্নতি করে—চিকিৎসার কৃতিত্ব দেওয়া হতে পারে যখন কিছু উন্নতি স্বাভাবিক ছিল।
    real_world_implications: |
      গড়-এর দিকে প্রত্যাবর্তন শিক্ষক, ডাক্তার, তহবিল ব্যবস্থাপক এবং নিজেদের মূল্যায়নের পদ্ধতিকে প্রভাবিত করে। এটি ব্যাখ্যা করে কেন "যা উপরে যায় তা নিচে নামতে হবে" পরিসংখ্যানগতভাবে প্রায়শই সত্য হয়। এটিকে ভুলভাবে বোঝা নষ্ট হওয়া হস্তক্ষেপ এবং প্রতিকারের উপর মিথ্যা আত্মবিশ্বাস ঘটায়।
    professional_application:
      networking_and_relationship_building: |
        একটি একক খারাপ মিথস্ক্রিয়াকে অতিরিক্ত ব্যাখ্যা করবেন না—এটি একটি আউটলায়ার হতে পারে যা সম্পর্কের গড়-এর দিকে প্রত্যাবর্তন করবে।
      collaborative_learning_initiative: |
        হস্তক্ষেপ (প্রশিক্ষণ, প্রক্রিয়া পরিবর্তন) মূল্যায়নের সময়, প্রভাবকে প্রত্যাবর্তন থেকে আলাদা করার জন্য নিয়ন্ত্রণ গোষ্ঠী এবং একাধিক ডেটা পয়েন্ট ব্যবহার করুন।
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        ধরে নেওয়া যে কোনও হস্তক্ষেপের পরে যে কোনও উন্নতি "কেবল প্রত্যাবর্তন" যখন বাস্তব প্রভাব বিদ্যমান থাকে।
      underreacting: |
        প্রকৃত সমস্যাগুলি উপেক্ষা করা কারণ "এটি গড়-এর দিকে প্রত্যাবর্তন করবে।"
      statistical_illiteracy: |
        প্রত্যাবর্তনকে এমন একটি শক্তি হিসাবে বিভ্রান্ত করা যা ফলাফলকে "সঠিক" করে—এটি কেবল সম্ভাবনা।
      overconfidence: |
        ধরে নেওয়া যে গড় স্থিতিশীল থাকে যখন অন্তর্নিহিত প্রক্রিয়া পরিবর্তিত হতে পারে।
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: গোলাপী স্মৃতিচারণ
    quick_introduction: |
      গোলাপী স্মৃতিচারণ হল অতীতকে সেটির চেয়ে ভালো ছিল এমনভাবে মনে রাখার প্রবণতা।
      সময়ের সাথে সাথে আমরা অতীতের অভিজ্ঞতাগুলোকে আরও ইতিবাচকভাবে স্মরণ করি, অসুবিধাগুলোকে মসৃণ করে এবং ভালো জিনিসগুলোকে বাড়িয়ে তুলি। "ভালো পুরানো দিনগুলো" প্রায়শই আমরা মনে করি ততটা ভালো ছিল না।
    one_liner: আমরা অতীতকে সেটির চেয়ে ভালো ছিল এমনভাবে মনে রাখি—"ভালো পুরানো দিনগুলো" ততটা ভালো ছিল না।
    try_this:
      - যখন অতীতের সাথে তুলনা করছেন, জিজ্ঞাসা করুন: তখন আমি আসলে কেমন অনুভব করছিলাম?
      - পরে স্মৃতি এবং বাস্তবতার তুলনা করার জন্য একটি ডায়েরি রাখুন।
      - লক্ষ্য করুন কখন নস্টালজিয়া আপনার বর্তমানের বিচারকে প্রভাবিত করছে।
    ask_yourself:
      - আমি কি অতীতকে আদর্শ বানাচ্ছি?
      - যদি আমি অতীতে সময় ভ্রমণ করতে পারতাম তবে কি আমি তখন খুশি হতাম?
    in_more_detail: |
      আমরা অতীতের অভিজ্ঞতাগুলোর ইতিবাচক দিকগুলো মনে রাখি এবং নেতিবাচকগুলোকে ভুলে যাই বা কমিয়ে দিই। ছুটি, চাকরি এবং সম্পর্কগুলো নস্টালজিয়ার সময়ে মনে করার সময় ততকালীন মুহূর্তের চেয়ে ভালো মনে হয়। এটি অবাস্তব তুলনার দিকে নিয়ে যেতে পারে—আমরা একটি আদর্শ অতীতের সাথে বর্তমানের বিচার করি।

      গোলাপী স্মৃতিচারণ সিদ্ধান্ত গ্রহণকে প্রভাবিত করে যখন আমরা একই (স্মরণীয়) ফলাফলের প্রত্যাশা করে অতীতের পছন্দগুলো পুনরাবৃত্তি করি। এটি এমন সময়ের জন্য নস্টালজিয়াকেও বাড়াতে পারে যা বস্তুনিষ্ঠভাবে খারাপ ছিল। এটি স্মৃতিতে নেতিবাচকতা পক্ষপাতের বিপরীত।
    why_this_is_important: |
      গোলাপী স্মৃতিচারণকে স্বীকৃতি দেওয়া আপনাকে আরও বাস্তবসম্মত তুলনা করতে এবং আদর্শ স্মৃতির উপর ভিত্তি করে অতীতের ভুলগুলি পুনরাবৃত্তি এড়াতে সাহায্য করে। এটি ব্যাখ্যা করে কেন আমরা কখনও কখনও বর্তমান অগ্রগতি সত্ত্বেও অতীতের জন্য আকাঙ্ক্ষা করি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - কর্মজীবনের_সিদ্ধান্ত
      - সম্পর্ক_গড়ে_তোলা
      - শেখা
    how_can_you_spot_it:
      idealized_past: |
        "তখন জিনিসগুলি ভাল ছিল" যখন উদ্দেশ্যমূলক পরিমাপগুলি ভিন্ন কিছু দেখাতে পারে।
      selective_positive_memory: |
        অতীতের অভিজ্ঞতা থেকে ভালো জিনিসগুলো মনে রাখা এবং খারাপগুলো ভুলে যাওয়া।
      nostalgia_as_evidence: |
        অতীতের পছন্দগুলো সঠিক ছিল এই প্রমাণ হিসাবে সুন্দর স্মৃতি ব্যবহার করা।
      present_undervaluation: |
        আমরা একটি আদর্শ অতীতের সাথে তুলনা করার কারণে বর্তমানকে সেটির চেয়ে খারাপ মনে হয়।
    examples:
      career: |
        "আমার আগের চাকরিটা দারুণ ছিল" যখন আপনি ভাল কারণে চাকরি ছেড়েছিলেন—স্মৃতিতে বিরক্তিগুলো মসৃণ হয়ে গেছে।
      relationships: |
        একটি অতীতের সম্পর্ক সম্পর্কে "আমরা খুব খুশি ছিলাম"—সেই সংঘাতগুলো ভুলে যাওয়া যা এর শেষ পর্যন্ত নিয়ে গিয়েছিল।
      childhood: |
        "আমার দিনগুলিতে বাচ্চারা ভালো ছিল" যখন অনেক উদ্দেশ্যমূলক পরিমাপ (স্বাস্থ্য, সুরক্ষা, সুযোগ) উন্নত হয়েছে।
      projects: |
        "সেই প্রকল্পটি মসৃণভাবে সম্পন্ন হয়েছিল" যখন আসলে অনেক বিলম্ব ছিল—আমরা ফলাফল মনে রাখি, প্রক্রিয়া নয়।
    real_world_implications: |
      গোলাপী স্মৃতিচারণ জীবন সন্তুষ্টি, কর্মজীবনের সিদ্ধান্ত এবং নস্টালজিয়া-চালিত পছন্দগুলোকে প্রভাবিত করে। এটি অতীতের ভুলগুলি পুনরাবৃত্তি বা অবাস্তব তুলনার দিকে নিয়ে যেতে পারে। এটি "ভালো পুরানো দিনে ফিরে যাওয়া" বক্তব্যের আবেদনকেও ব্যাখ্যা করে।
    professional_application:
      networking_and_relationship_building: |
        অতীতের সহকর্মীদের সাথে পুনরায় সংযোগ স্থাপন বা অতীতের ভূমিকায় ফিরে যাওয়ার কথা বিবেচনা করার সময়, নস্টালজিয়াকে বাস্তবতার থেকে আলাদা করুন। ছাড়ার সময় আপনার কারণগুলো নথিভুক্ত করুন; ফিরে আসার আগে সেগুলো পর্যালোচনা করুন।
      collaborative_learning_initiative: |
        রেট্রোস্পেকটিভগুলিতে, আসলে কী ঘটেছিল তা মূল্যায়ন করার জন্য স্মৃতির পরিবর্তে সমসাময়িক নোট বা ডেটা ব্যবহার করুন। স্মৃতি অসুবিধাগুলোকে মসৃণ করে।
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        সমস্ত নস্টালজিয়া বিভ্রান্তিকর নয়—কখনও কখনও অতীত কিছু উপায়ে সত্যিই ভালো ছিল।
      invalidating_memories: |
        লোকদের বলা যে তাদের ইতিবাচক স্মৃতি "ভুল" যখন তারা প্রকৃত ব্যক্তিগত অভিজ্ঞতা প্রতিফলিত করতে পারে।
      overcorrection: |
        এই ধারণা করা যে অতীত সবসময় আমরা যা মনে করি তার চেয়ে খারাপ ছিল—কখনও কখনও এটি ভাল ছিল।
      present_bias: |
        বর্তমান অবক্ষয় সম্পর্কে বৈধ উদ্বেগ উপেক্ষা করার অজুহাত হিসাবে গোলাপী স্মৃতিচারণ ব্যবহার করা।
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: প্রধান্য পক্ষপাত (Salience Bias)
    quick_introduction: |
      প্রধান্য পক্ষপাত হলো কোনো পরিস্থিতির সবচেয়ে সুস্পষ্ট বা দৃষ্টিগোচর
      বিষয়গুলিতে মনোযোগ দেওয়ার প্রবণতা, যেখানে কম স্পষ্ট কিন্তু সম্ভাব্য
      গুরুত্বপূর্ণ বিষয়গুলি উপেক্ষা করা হয়। যা চোখে পড়ে তা আমাদের
      সিদ্ধান্তগুলিতে অসম অনুপাতে মনোযোগ এবং গুরুত্ব পায়।
    one_liner: যা চোখে পড়ে তা অসম অনুপাতে মনোযোগ পায়—সূক্ষ্ম বিষয়গুলি উপেক্ষিত হয়।
    try_this:
      - Ask: What am I not seeing because it's not salient? (আমি কী দেখতে পাচ্ছি না কারণ এটি প্রধান্য নয়?)
      - Actively look for less obvious factors before deciding. (সিদ্ধান্ত নেওয়ার আগে কম স্পষ্ট বিষয়গুলির জন্য সক্রিয়ভাবে সন্ধান করুন।)
      - Notice when a vivid or dramatic element is dominating your judgment. (একটি প্রাণবন্ত বা নাটকীয় উপাদান আপনার রায়কে প্রভাবিত করছে কিনা তা লক্ষ্য করুন।)
    ask_yourself:
      - Am I overweighting what's prominent and underweighting what's subtle? (আমি কি যা প্রধান্য তাকে বেশি গুরুত্ব দিচ্ছি এবং যা সূক্ষ্ম তাকে কম গুরুত্ব দিচ্ছি?)
      - What important factors might I be overlooking? (গুরুত্বপূর্ণ কোন বিষয়গুলি আমি উপেক্ষা করতে পারি?)
    in_more_detail: |
      প্রধান্য তথ্য হলো স্পষ্ট, আবেগপ্রবণ বা সম্প্রতি সম্মুখীন হওয়া।
      এটি মনোযোগ আকর্ষণ করে এবং উচিতের চেয়ে বেশি সিদ্ধান্তকে প্রভাবিত করে।
      আমরা স্পষ্ট বিষয়গুলির উপর বেশি জোর দিই এবং সূক্ষ্ম বিষয়গুলির উপর কম।
      একটি নাটকীয় ঘটনা বা স্পষ্ট উদাহরণ আমাদের চিন্তাভাবনাকে প্রভাবিত করতে পারে,
      এমনকি যখন এটি প্রতিনিধি মূলক না হয় তখনও।

      প্রধান্য পক্ষপাত সহজলভ্যতার আনুমানিক পদ্ধতি (যা মনে আসে) এবং সাম্প্রতিকতার
      পক্ষপাতের (যা সম্প্রতি ঘটেছে) সাথে সম্পর্কিত। এটি ঝুঁকি উপলব্ধি,
      নিয়োগ এবং কৌশলে প্রভাব ফেলে। সবচেয়ে স্পষ্ট সমস্যাগুলি সমাধান করা হয়;
      অদৃশ্য সমস্যাগুলি থেকে যায়।
    why_this_is_important: |
      প্রধান্য পক্ষপাতকে চিনতে পারা আপনাকে স্পষ্ট বিষয়ের বাইরে দেখতে এবং
      কম স্পষ্ট বিষয়গুলি বিবেচনা করতে সাহায্য করে। এটি ঝুঁকি মূল্যায়ন,
      সমস্যা নির্ণয় এবং সিদ্ধান্ত গ্রহণের মান উন্নত করে। গুরুত্বপূর্ণ জিনিসগুলি
      সবসময় প্রধান্য হয় না।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision_making)
      - সমস্যা_সমাধান (problem_solving)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
      - নেতৃত্ব (leadership)
    how_can_you_spot_it:
      prominent_factor_dominance: |
        সবচেয়ে স্পষ্ট বিষয়টি সিদ্ধান্তকে চালিত করে।
      overlooking_background: |
        গুরুত্ব থাকা সত্ত্বেও কম স্পষ্ট বিষয়গুলি উপেক্ষা করা হয়।
      vividness_overweighting: |
        নাটকীয় বা আবেগিক তথ্য অসম অনুপাতে গুরুত্ব পায়।
      visibility_bias: |
        যা আমরা সহজে দেখতে বা পরিমাপ করতে পারি, তা সেগুলির চেয়ে বেশি মনোযোগ পায়
        যা আমরা পারি না।
    examples:
      risk: |
        একটি বিমান দুর্ঘটনা প্রধান্যপূর্ণ—আমরা উড়ানের ঝুঁকিকে বেশি মনে করি।
        গাড়ির দুর্ঘটনা সামগ্রিকভাবে কম প্রধান্যপূর্ণ—আমরা গাড়ি চালানোর ঝুঁকিকে
        কম মনে করি।
      hiring: |
        একজন প্রার্থীর উপস্থাপনা দক্ষতা প্রধান্যপূর্ণ; তাদের
        কার্যকারিতা কম স্পষ্ট হতে পারে তবে সমানভাবে গুরুত্বপূর্ণ।
      strategy: |
        প্রতিযোগীদের চালগুলি প্রধান্যপূর্ণ; ধীরগতির বাজার পরিবর্তনগুলি
        কম স্পষ্ট তবে বেশি গুরুত্বপূর্ণ হতে পারে।
      problems: |
        সবচেয়ে জোরে অভিযোগটি সমাধান করা হয় যখন পদ্ধতিগত সমস্যাগুলি
        অলক্ষ্য থাকে।
    real_world_implications: |
      প্রধান্য পক্ষপাত প্রভাবিত করে কি মনোযোগ, তহবিল এবং পদক্ষেপ পায়।
      এটি কারণগুলির পরিবর্তে উপসর্গগুলি সমাধান করার দিকে নিয়ে যেতে পারে এবং
      সম্পদের ভুল বরাদ্দ হতে পারে। ইচ্ছাকৃতভাবে অ-প্রধান্য তথ্য খোঁজা
      সিদ্ধান্ত উন্নত করে।
    professional_application:
      networking_and_relationship_building: |
        মানুষদের শুধুমাত্র তাদের সবচেয়ে স্পষ্ট বৈশিষ্ট্য দ্বারা বিচার করবেন না।
        কম স্পষ্ট গুণাবলী সন্ধান করুন—নির্ভরযোগ্যতা, ধারাবাহিকতা, যারা তাদের সাহায্য করতে পারে না
        তাদের সাথে তারা কেমন আচরণ করে।
      collaborative_learning_initiative: |
        সমস্যা সমাধানে, স্পষ্টভাবে জিজ্ঞাসা করুন "আমরা কি দেখতে পাচ্ছি না?"
        এবং "কি কম স্পষ্ট তবে গুরুত্বপূর্ণ?" অ-প্রধান্য বিষয়গুলি উন্মোচন করার
        জন্য প্রক্রিয়া তৈরি করুন।
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        মাঝে মাঝে যা প্রধান্য তা গুরুত্বপূর্ণ। সবকিছু স্পষ্ট বলে উড়িয়ে দেবেন না।
      false_sophistication: |
        অস্পষ্ট বিষয়গুলি সবসময় স্পষ্ট বিষয়গুলির চেয়ে বেশি গুরুত্বপূর্ণ বলে ধরে নেওয়া।
      analysis_paralysis: |
        এত বেশি অ-প্রধান্য বিষয়গুলির সন্ধান করা যে আপনি কখনও প্রধান্য বিষয়গুলিতে
        কাজ করেন না।
      contrarianism: |
        ভিন্ন হওয়ার জন্য প্রধান্য তথ্য প্রত্যাখ্যান করা।
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: দুষ্প্রাপ্যতা পক্ষপাত (Scarcity Bias)
    quick_introduction: |
      দুষ্প্রাপ্যতা পক্ষপাত হলো সীমিত বা দুষ্প্রাপ্য বলে বিবেচিত জিনিসগুলির প্রতি বেশি মূল্য দেওয়ার প্রবণতা। "সীমিত সময়," "মাত্র ৩টি বাকি," এবং "একচেটিয়া অ্যাক্সেস" ইত্যাদি শব্দগুলি যুক্তিসঙ্গত মূল্যায়নকে ছাপিয়ে জরুরি অবস্থা এবং আকাঙ্ক্ষা জাগিয়ে তোলে, তা আমরা আসলে সেই জিনিসটি চাই বা প্রয়োজন কিনা তা বিবেচনা না করেই।
    one_liner: দুষ্প্রাপ্যতা অনুভূত মূল্য বাড়িয়ে তোলে—"সীমিত" যুক্তির চেয়ে জরুরি অবস্থাকে উস্কে দেয়।
    try_this:
      - জিজ্ঞাসা করুন: যদি এটি দুষ্প্রাপ্য না হতো, তবুও কি আমি এটি চাইতাম? জরুরি অবস্থা সরিয়ে ফেলুন।
      - সীমিত সময় বা "মাত্র Xটি বাকি" অফারগুলিতে কাজ করার আগে থামুন।
      - লক্ষ্য করুন কখন দুষ্প্রাপ্যতা প্রকৃত মূল্যের চেয়ে আপনার আকাঙ্ক্ষাকে বেশি চালিত করছে।
    ask_yourself:
      - আমি কি এটিকে দুষ্প্রাপ্য বলে বেশি মূল্য দিচ্ছি, নাকি কারণ আমার এটি আসলেই প্রয়োজন?
      - দুষ্প্রাপ্যতার ধারণা ছাড়াই কি আমি এই সিদ্ধান্ত নিতাম?
    in_more_detail: |
      দুষ্প্রাপ্যতা অনুভূত মূল্য বাড়িয়ে তোলে। যখন কিছু দুর্লভ বা ফুরিয়ে আসছে, তখন আমরা এটি বেশি চাই—আংশিকভাবে কারণ দুষ্প্রাপ্যতা গুণমান নির্দেশ করতে পারে, এবং আংশিকভাবে কারণ ক্ষতির ভয় (loss aversion) আমাদের কিছু হারানোর আশঙ্কা তৈরি করে। বিপণনকারী এবং আলোচকগণ জরুরি অবস্থা তৈরি করতে দুষ্প্রাপ্যতা ব্যবহার করেন। এই পক্ষপাত আবেগপ্রবণ সিদ্ধান্ত, অতিরিক্ত ব্যয় এবং দুর্বল অগ্রাধিকারের দিকে নিয়ে যেতে পারে।

      দুষ্প্রাপ্যতা তাদের জ্ঞানীয় ক্ষমতাকেও প্রভাবিত করে যারা প্রকৃতপক্ষে সম্পদের সীমাবদ্ধতায় রয়েছে; দারিদ্র্য অন্যান্য সিদ্ধান্তের জন্য "মানসিক ক্ষমতা" হ্রাস করতে পারে।
    why_this_is_important: |
      দুষ্প্রাপ্যতা পক্ষপাত সনাক্ত করা আপনাকে ম্যানিপুলেটিভ কৌশল প্রতিরোধ করতে এবং আরও ইচ্ছাকৃত পছন্দ করতে সহায়তা করে। এটি ব্যাখ্যা করে কেন আমরা সীমিত সংস্করণকে অতিরিক্ত মূল্য দিই এবং যখন আমাদের প্রয়োজন হয় না তখনও তাড়াহুড়ো করি।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision-making)
      - আলোচনা (negotiation)
      - বিনিয়োগ (investing)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
    how_can_you_spot_it:
      urgency_trigger: |
        "সীমিত সময়" বা "মাত্র Xটি বাকি" একটি অসামঞ্জস্যপূর্ণ আকাঙ্ক্ষা তৈরি করে।
      fear_of_missing_out: |
        অ্যাক্সেস হারানোর সম্ভাবনা অন্তর্নিহিত মূল্যের চেয়ে বেশি ক্রিয়াকে চালিত করে।
      impulsive_purchases: |
        প্রয়োজনের কারণে নয়, দুষ্প্রাপ্যতার কারণে জিনিস কেনা।
      artificial_scarcity: |
        দুষ্প্রাপ্যতা তৈরি করা হয় (যেমন, নকল কাউন্টডাউন) আসল নয়।
    examples:
      sales: |
        "স্টকে মাত্র ২টি বাকি" বা "বিক্রয় আজ রাতে শেষ" এমন কেনাকাটা উস্কে দেয় যা জরুরি অবস্থা ছাড়া ঘটত না।
      auctions: |
        বিডাররা জেতার মোহে পড়ে যায় এবং প্রতিযোগিতামূলক দুষ্প্রাপ্যতার কারণে তারা যা পরিকল্পনা করেছিল তার চেয়ে বেশি অর্থ প্রদান করে।
      exclusivity: |
        "সদস্যদের জন্য" বা "শুধুমাত্র আমন্ত্রণে" অ্যাক্সেস অনুভূত মূল্য বাড়ায়।
      genuine_scarcity: |
        যখন সম্পদ সত্যিই সীমিত থাকে, তখন দুষ্প্রাপ্যতার চাপে থাকা লোকেরা আরও খারাপ সিদ্ধান্ত নেয় (যেমন, দরিদ্র, সময়-সংকটগ্রস্ত)।
    real_world_implications: |
      দুষ্প্রাপ্যতা পক্ষপাত গ্রাহকের আচরণ, আলোচনার ফলাফল এবং নীতি প্রতিক্রিয়াকে চালিত করে। এটি নৈতিকভাবে (যেমন, বৈধ সময়সীমা) বা অনৈতিকভাবে (যেমন, নকল দুষ্প্রাপ্যতা) ব্যবহার করা যেতে পারে। এটি বোঝা সিদ্ধান্তের গুণমান উন্নত করে।
    professional_application:
      networking_and_relationship_building: |
        যখন অন্যরা কৃত্রিম দুষ্প্রাপ্যতা তৈরি করে তখন সতর্ক থাকুন ("আমি কেবল অল্প কিছু ক্লায়েন্ট নিচ্ছি")। দুষ্প্রাপ্যতা আসল কিনা তা যাচাই করুন। সম্পর্ক তৈরি করার সময়, আপনার সময়ের প্রকৃত দুষ্প্রাপ্যতা মূল্য নির্দেশ করতে পারে—তবে অতিরিক্ত ব্যবহার ম্যানিপুলেটিভ মনে হয়।
      collaborative_learning_initiative: |
        প্রচেষ্টার জন্য জরুরি অবস্থা তৈরি করার সময়, নিশ্চিত করুন এটি বৈধ। নকল সময়সীমা আবিষ্কৃত হলে বিশ্বাস নষ্ট করে।
    how_can_this_be_misapplied:
      manipulation: |
        অন্যদেরকে সিদ্ধান্তে চাপ দেওয়ার জন্য ইচ্ছাকৃতভাবে মিথ্যা দুষ্প্রাপ্যতা তৈরি করা।
      impulsive_decisions: |
        কৃত্রিম জরুরি অবস্থায় গুরুত্বপূর্ণ সিদ্ধান্ত নেওয়া যখন বেশি সময় নিলে ফলাফল উন্নত হতে পারত।
      overvaluing_scarcity: |
        দুষ্প্রাপ্য জিনিসগুলি সবসময় ভাল বলে ধরে নেওয়া—কখনও কখনও দুষ্প্রাপ্যতা নির্বিচারে হয়।
      exploiting_vulnerability: |
        যারা ইতিমধ্যে সম্পদের চাপে রয়েছে তাদের উপর দুষ্প্রাপ্যতা কৌশল ব্যবহার করা।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: দ্বিতীয়-পর্যায়ের চিন্তা
    quick_introduction: |
      দ্বিতীয়-পর্যায়ের চিন্তা হলো আপনার কাজের পরিণতির পরিণতিগুলি বিবেচনা করার অভ্যাস। প্রথম-পর্যায়ের চিন্তা জিজ্ঞাসা করে "যদি আমি X করি তাহলে কি হবে?" দ্বিতীয়-পর্যায়ের চিন্তা জিজ্ঞাসা করে "তারপর কি হবে?" এবং "তার পরে কী হবে?" এটি অনিচ্ছাকৃত প্রভাবগুলি প্রকাশ করে।
    one_liner: তারপর কি হবে? জিজ্ঞাসা করুন—পরিণতির পরিণতিগুলি বিবেচনা করুন।
    try_this:
      - যেকোনো সিদ্ধান্তের জন্য, অন্তত দুবার তারপর কি হবে? জিজ্ঞাসা করুন।
      - বিবেচনা করুন কিভাবে অন্যরা আপনার কাজের প্রতিক্রিয়া জানাবে—এবং তারপর সেই প্রতিক্রিয়ার প্রতিক্রিয়া।
      - লক্ষ্য করুন কিভাবে প্রথম-পর্যায়ের প্রভাবগুলি চেইনে বিপরীত বা জটিল হয়।
    ask_yourself:
      - আমি কি দ্বিতীয়-পর্যায়ের (এবং তৃতীয়-পর্যায়ের) প্রভাবগুলি নিয়ে ভেবেছি?
      - আমি কি অনিচ্ছাকৃত পরিণতিগুলি মিস করছি?
    in_more_detail: |
      হাওয়ার্ড মার্কস বিনিয়োগে ধারণাটি জনপ্রিয় করেছেন। প্রথম-পর্যায়ের: "এটি বাড়বে।" দ্বিতীয়-পর্যায়ের: "যদি এটি বাড়ে, অন্যরা লক্ষ্য করবে, আরও কিনবে, এটি আরও বাড়বে—যতক্ষণ না এটি অতিরিক্ত মূল্যায়িত হয় এবং ধসে পড়ে।" পরিণতির চেইন প্রায়শই প্রথম-পর্যায়ের প্রভাবকে বিপরীত বা জটিল করে তোলে।

      দ্বিতীয়-পর্যায়ের চিন্তা কঠিন—এর জন্য আরও মানসিক প্রচেষ্টা এবং কল্পনাশক্তির প্রয়োজন। কিন্তু এটি অনেক ভুল প্রতিরোধ করে। ভালো কৌশলবিদরা বেশ কয়েক ধাপ এগিয়ে চিন্তা করেন এবং অন্যরা কীভাবে প্রতিক্রিয়া জানাবে তা বিবেচনা করেন।
    why_this_is_important: |
      দ্বিতীয়-পর্যায়ের চিন্তা অনিচ্ছাকৃত পরিণতি প্রতিরোধ করে এবং সিদ্ধান্ত গ্রহণের মান উন্নত করে। এটি কৌশল, নীতি এবং যেকোনো ডোমেনের জন্য অপরিহার্য যেখানে কাজগুলি প্রতিক্রিয়া ট্রিগার করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ
      - সমস্যা_সমাধান
      - কৌশল
      - ঝুঁকি_মূল্যায়ন
    how_can_you_spot_it:
      consequence_chains: |
        "যদি আমি X করি, তবে Y ঘটবে, তারপর Z ঘটবে..."
      reaction_anticipation: |
        আপনার কাজের প্রতি অন্যরা কীভাবে প্রতিক্রিয়া জানাবে তা বিবেচনা করা।
      unintended_effects: |
        পার্শ্ব প্রতিক্রিয়া এবং ফিডব্যাক লুপগুলি সন্ধান করা।
      reversals: |
        দ্বিতীয়-পর্যায়ের প্রভাবগুলি যা প্রথম-পর্যায়ের প্রভাবগুলির বিরোধিতা করে বা বিপরীত করে।
    examples:
      investing: |
        "যদি সবাই মনে করে এটি একটি ভাল বিনিয়োগ, তবে এটি সম্ভবত ভিড়ে ঠাসা—ধারনাটি চলে গেছে।"
      policy: |
        "যদি আমরা X-কে ভর্তুকি দিই, চাহিদা বাড়ে, দাম বাড়ে—ভর্তুকি কি আসলে সাহায্য করে?"
      negotiation: |
        "যদি আমি এখানে কঠোর চাপ দিই, তবে তারা সেখানে প্রতিশোধ নেবে—মোট প্রভাব কী?"
      incentives: |
        "যদি আমরা এই মেট্রিককে পুরস্কৃত করি, তবে মানুষ এটি গেমিং করবে—তারা আসলে কী করবে?"
    real_world_implications: |
      দ্বিতীয়-পর্যায়ের চিন্তা কৌশলগত চিন্তাভাবনার একটি বৈশিষ্ট্য। এটি নীতি ব্যর্থতা, অনিচ্ছাকৃত প্রণোদনা এবং সরল আশাবাদ প্রতিরোধ করে। এটি ভালো সিদ্ধান্ত গ্রহণকারীদের থেকে দুর্দান্ত সিদ্ধান্ত গ্রহণকারীদের আলাদা করে।
    professional_application:
      networking_and_relationship_building: |
        কোনো পদক্ষেপ নেওয়ার আগে জিজ্ঞাসা করুন "তারা কীভাবে প্রতিক্রিয়া জানাবে? এবং আমি সেটির প্রতি কীভাবে প্রতিক্রিয়া জানাব?" কেবলমাত্র তাৎক্ষণিক বিনিময় নয়, সম্পর্কের গতিশীলতা বিবেচনা করুন।
      collaborative_learning_initiative: |
        পরিকল্পনায়, "তারপর কি হবে?" অনুশীলনগুলি চালান। পরিণতির চেইনগুলি ম্যাপ করুন। অনিচ্ছাকৃত প্রভাবগুলি উদ্ভূত হওয়ার আগেই সনাক্ত করুন।
    how_can_this_be_misapplied:
      analysis_paralysis: |
        অতিরিক্ত ধাপ এগিয়ে চিন্তা করা যা আপনাকে কখনও কাজ করতে বাধা দেয়।
      false_complexity: |
        দ্বিতীয়-পর্যায়ের প্রভাবগুলি সর্বদা প্রথম-পর্যায়ের প্রভাবগুলির চেয়ে বেশি প্রভাবশালী বলে ধরে নেওয়া, যখন প্রথম-পর্যায়ের প্রভাবগুলি যথেষ্ট হতে পারে।
      overconfidence: |
        অনিশ্চয়তা বৃদ্ধি পাওয়ার সময় দীর্ঘ চেইন ভবিষ্যদ্বাণী করতে সক্ষম বলে বিশ্বাস করা।
      pessimism: |
        সর্বদা পরিণতির চেইনে সবচেয়ে খারাপ অনুমান করা।
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: সাক (Sunk) কস্টের ভ্রান্তি (Sunk Cost Fallacy)
    quick_introduction: |
      সাক কস্টের ভ্রান্তি হলো যে কোনো সিদ্ধান্তে ইতিমধ্যে যে পরিমাণ সম্পদ ব্যয় হয়ে গেছে, তার উপর ভিত্তি করে সেই সিদ্ধান্ত চালিয়ে যাওয়ার প্রবণতা, ভবিষ্যতের প্রত্যাশিত রিটার্নের উপর ভিত্তি করে নয়।
      "আমরা এতদূর এসেছি" বা "আমি ইতিমধ্যেই অনেক কিছু বিনিয়োগ করেছি" এই কথাগুলো আরও খারাপ জায়গায় ভালো অর্থ ঢালতে প্ররোচিত করে।
    one_liner: অতীতের বিনিয়োগ শেষ—শুধুমাত্র ভবিষ্যতের খরচ এবং সুবিধাই গুরুত্বপূর্ণ।
    try_this:
      - Ask—If I were starting today, would I choose this path? (যদি আজ শুরু করতাম, তাহলে কি এই পথটি বেছে নিতাম?)
      - Define kill criteria in advance—conditions under which you will stop. (আগেই বাতিল করার মানদণ্ড ঠিক করুন—কোন পরিস্থিতিতে আপনি থামবেন।)
      - Evaluate the marginal decision—what do I gain or lose from here forward? (প্রান্তিক সিদ্ধান্ত মূল্যায়ন করুন: এখান থেকে সামনে কী লাভ বা ক্ষতি হবে?)
    ask_yourself:
      - Am I continuing because of future value, or to justify past investment? (আমি কি ভবিষ্যতের মূল্যের জন্য চালিয়ে যাচ্ছি, নাকি অতীতের বিনিয়োগকে ন্যায্যতা দেওয়ার জন্য?)
      - What would I advise a friend who was in my position from scratch? (যদি আমার বন্ধু এই অবস্থানে থাকত, তাহলে আমি তাকে শুরু থেকে কী পরামর্শ দিতাম?)
    in_more_detail: |
      সাক কস্ট হলো অতীতের খরচ যা আর উদ্ধার করা যায় না। যুক্তিসঙ্গত সিদ্ধান্ত গ্রহণ এগুলিকে উপেক্ষা করে—কেবল ভবিষ্যতের খরচ এবং সুবিধাই গুরুত্বপূর্ণ। কিন্তু আমরা আমাদের বিনিয়োগের সাথে মানসিকভাবে সংযুক্ত থাকি।
      আমরা যে খাবার উপভোগ করছি না তা শেষ করি, যে সিনেমাটি অপছন্দ করি তা দেখি, এবং যে প্রকল্পগুলি আর অর্থপূর্ণ নয় তা চালিয়ে যাই। আমরা যা বিনিয়োগ করেছি তা "অপচয় করতে চাই না", কিন্তু চালিয়ে গেলে প্রায়শই আরও বেশি অপচয় হয়।

      এই ভ্রান্তি বিশেষভাবে শক্তিশালী হয় যখন আমরা কেবল অর্থই নয়, সময়, শ্রম বা পরিচয়ও বিনিয়োগ করেছি। ভুল স্বীকার করা ব্যয়বহুল মনে হতে পারে, তাই আমরা আরও বেশি করে投入 করি।
    why_this_is_important: |
      সাক কস্টের ভ্রান্তি চিনতে পারা আপনাকে ক্ষতি কমাতে, প্রয়োজনে দিক পরিবর্তন করতে এবং অতীতের বিনিয়োগের পরিবর্তে ভবিষ্যতের মূল্যের উপর ভিত্তি করে সিদ্ধান্ত নিতে সাহায্য করে।
      এটি প্রকল্প, কর্মজীবন এবং সম্পর্কের জন্য অপরিহার্য।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision-making)
      - বিনিয়োগ (investing)
      - কর্মজীবনের_সিদ্ধান্ত (career_moves)
      - ঝুঁকি_মূল্যায়ন (risk_assessment)
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "আমরা এখন থামতে পারি না—আমরা ইতিমধ্যেই X পরিমাণ খরচ করেছি" যখন ভবিষ্যতের রিটার্ন চালিয়ে যাওয়ার ন্যায্যতা প্রমাণ করে না।
      escalation_of_commitment: |
        পূর্ববর্তী বিনিয়োগকে ন্যায্যতা দেওয়ার বা "উদ্ধার" করার জন্য আরও বেশি বিনিয়োগ করা।
      identity_investment: |
        ব্যর্থতা স্বীকার করলে আত্মসম্মান ক্ষুণ্ন হওয়ার ভয়ে চালিয়ে যাওয়া।
      ignoring_marginal_analysis: |
        মোট খরচের উপর ভিত্তি করে সিদ্ধান্ত নেওয়া, প্রান্তিক খরচ এবং সুবিধার উপর নয়।
    examples:
      projects: |
        একটি ব্যর্থ প্রকল্প চালিয়ে যাওয়া কারণ "আমরা ইতিমধ্যেই এর উপর ৬ মাস ব্যয় করেছি" যখন ক্ষতি কমানো যুক্তিসঙ্গত হত।
      relationships: |
        একটি সম্পর্কে থাকা কারণ "আমরা ৫ বছর ধরে একসাথে আছি" ভবিষ্যতের মূল্যায়ন করার পরিবর্তে।
      careers: |
        একটি অপছন্দের কর্মজীবনে থাকা কারণ আপনি ডিগ্রির জন্য বা অভিজ্ঞতার জন্য বিনিয়োগ করেছেন।
      investments: |
        ক্ষতিগ্রস্ত স্টক ধরে রাখা "ব্রেক ইভেনে পৌঁছানোর জন্য" আরও ভালো সুযোগে পুনঃবিনিয়োগ করার পরিবর্তে।
    real_world_implications: |
      সাক কস্টের ভ্রান্তির কারণে সম্পদের অপচয়, দীর্ঘস্থায়ী ব্যর্থতা এবং সুযোগ হাতছাড়া হয়। এটি ব্যক্তি, সংস্থা এবং সরকারদের প্রভাবিত করে।
      এটি অতিক্রম করার জন্য সুস্পষ্ট সিদ্ধান্ত কাঠামো প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        অতীতের বিনিয়োগের কারণে আর আপনার উপকারে না আসা সম্পর্ক বা সহযোগিতায় বিনিয়োগ চালিয়ে যাবেন না। ভবিষ্যতের মূল্য মূল্যায়ন করুন।
      collaborative_learning_initiative: |
        প্রকল্পগুলির জন্য "বাতিল করার মানদণ্ড" তৈরি করুন—এমন শর্তাবলী যার অধীনে আপনি অতীতের বিনিয়োগ নির্বিশেষে থামবেন। "শূন্য থেকে" দৃষ্টিকোণ থেকে পর্যায়ক্রমে প্রকল্পগুলি পর্যালোচনা করুন।
    how_can_this_be_misapplied:
      quitting_too_early: |
        যে জিনিসগুলি পরিশোধ করতে আরও সময় প্রয়োজন সেগুলিকে পরিত্যাগ করার অজুহাত হিসাবে "সাক কস্ট" ব্যবহার করা।
      undervaluing_consistency: |
        কিছু প্রতিশ্রুতি (যেমন, সম্পর্ক, খ্যাতি) ধারাবাহিকতার মূল্য রাখে যা নিছক প্রান্তিক বিশ্লেষণ উপেক্ষা করে।
      cold_rationality: |
        মানসিক সংযুক্তিকে অযৌক্তিক বলে বাতিল করা যখন এটি প্রকৃত মূল্যবোধকে প্রতিফলিত করতে পারে।
      analysis_paralysis: |
        চালিয়ে যাওয়া উচিত কিনা তা নিয়ে অতিরিক্ত চিন্তা করা যখন উত্তরটি স্পষ্ট।
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: সারভাইভারশিপ বায়াস (Survivorship Bias)
    quick_introduction: |
      সারভাইভারশিপ বায়াস হলো একটি যৌক্তিক ত্রুটি যেখানে আমরা শুধুমাত্র সেইসব ব্যক্তি বা বস্তুর উপর মনোযোগ দেই যারা কোনো প্রক্রিয়া থেকে "বেঁচে গেছে" এবং যারা তা পারেনি তাদের উপেক্ষা করি। আমরা বিজয়ীদের দেখি এবং পরাজিতদের ভুলে যাই, যা সাফল্য ও ব্যর্থতা সম্পর্কে অতিরিক্ত আশাবাদী সিদ্ধান্তে উপনীত করে।
    one_liner: আমরা বিজয়ীদের দেখি এবং পরাজিতদের ভুলে যাই—যা অতিরিক্ত আশাবাদী সিদ্ধান্তে উপনীত করে।
    try_this:
      - জিজ্ঞাসা করুন: কেউ কি একই রকম কিছু করতে গিয়ে ব্যর্থ হয়েছে? তাদের কাছ থেকে আমরা কী শিখতে পারি?
      - অদৃশ্য নমুনা খুঁজুন—যারা টিকে থাকেনি।
      - লক্ষ্য করুন যখন আপনি শুধুমাত্র সাফল্যের গল্প অধ্যয়ন করছেন।
    ask_yourself:
      - আমি কি শুধুমাত্র টিকে থাকা ব্যক্তিদের কাছ থেকে শিখছি?
      - ব্যর্থতাগুলিকে অন্তর্ভুক্ত করলে সম্পূর্ণ ছবিটি কেমন দেখাবে?
    in_more_detail: |
      দ্বিতীয় বিশ্বযুদ্ধের সময়, পরিসংখ্যানবিদ আব্রাহাম ওয়াল্ড বোমারু বিমানের বর্মের অবস্থান সংশোধন করেছিলেন বেঁচে যাওয়া বিমানগুলি কোথায় আঘাতপ্রাপ্ত হয়েছিল তা বিশ্লেষণ করে—এবং যেখানে *বেঁচে না থাকা* বিমানগুলি আঘাতপ্রাপ্ত হয়েছিল সেখানে বর্ম লাগানোর পরামর্শ দিয়েছিলেন, কারণ সেই বিমানগুলি আর ফিরে আসেনি। আমরা স্বাভাবিকভাবেই দৃশ্যমান নমুনার (যারা বেঁচে আছে) উপর মনোযোগ দেই এবং অদৃশ্য (যারা ব্যর্থ হয়েছে) তাদের উপেক্ষা করি।

      সারভাইভারশিপ বায়াস উদ্যোক্তা, বিনিয়োগ, কর্মজীবন এবং ইতিহাসের উপর আমাদের দৃষ্টিভঙ্গিকে বিকৃত করে। আমরা সফল কোম্পানিগুলির অধ্যয়ন করি এবং হাজার হাজার কোম্পানিকে উপেক্ষা করি যারা একই রকম কাজ করতে গিয়ে ব্যর্থ হয়েছে। আমরা ভাগ্যবানদের কথা শুনি এবং দুর্ভাগ্যবানদের ভুলে যাই।
    why_this_is_important: |
      সারভাইভারশিপ বায়াসকে সংশোধন করলে আরও বাস্তবসম্মত প্রত্যাশা এবং ভাল সিদ্ধান্ত নেওয়া যায়। এটি আপনাকে কেবল সাফল্য নয়, ব্যর্থতা থেকেও শিখতে সাহায্য করে এবং কেবল ভাগ্যবান কয়েকজনের জন্য কাজ করা কৌশলগুলি অনুলিপি করা এড়াতে সাহায্য করে।
    when_to_use:
      - সিদ্ধান্ত_গ্রহণ (decision-making)
      - বিনিয়োগ (investing)
      - কর্মজীবন_পরিবর্তন (career_moves)
      - শেখা (learning)
    how_can_you_spot_it:
      visible_success_stories: |
        আমরা সফল ব্যক্তিদের কাছ থেকে তাদের চেষ্টা করে ব্যর্থ হওয়া ব্যক্তিদের চেয়ে অনেক বেশি শুনি।
      missing_failures: |
        আমরা যে নমুনা পর্যবেক্ষণ করি তাতে যারা "সফল হয়নি" তাদের বাদ দেওয়া হয় এবং তাই তারা তাদের গল্প বলতে পারে না।
      copying_survivors: |
        ধরে নেওয়া যে বেঁচে থাকা ব্যক্তিরা যা করেছে তা তাদের সাফল্যের কারণ, যখন এটি ভাগ্য বা সারভাইভারশিপ হতে পারে।
      overly_optimistic_models: |
        সাফল্যের হারের অনুমান যা চেষ্টার সংখ্যা (denominator) উপেক্ষা করে।
    examples:
      entrepreneurship: |
        "জাকারবার্গের মতো কলেজ ছেড়ে দাও" এই উক্তিটি সেইসব অসংখ্য ড্রপআউটদের উপেক্ষা করে যারা বিলিয়ন-ডলারের কোম্পানি প্রতিষ্ঠা করেনি।
      investing: |
        শুধুমাত্র টিকে থাকা ফান্ডগুলির অধ্যয়ন করা সেইসব ফান্ডগুলোকে উপেক্ষা করে যা খারাপ পারফরম্যান্সের পরে বন্ধ হয়ে গেছে, যার ফলে ঐতিহাসিক রিটার্ন ফুলিয়ে-ফাঁপিয়ে দেখানো হয়।
      career_advice: |
        সফল ব্যক্তিরা কঠোর পরিশ্রমকে সাফল্যের কারণ বলে উল্লেখ করেন; আমরা তাদের কথা শুনি না যারা কঠোর পরিশ্রম করে ব্যর্থ হয়েছে।
      historical_analysis: |
        "মহান" কোম্পানিগুলির অধ্যয়ন করা যা টিকে আছে, তারা একই রকম কৌশল নিয়ে ব্যর্থ হওয়া অনেক কোম্পানিকে উপেক্ষা করে।
    real_world_implications: |
      সারভাইভারশিপ বায়াস অনুভূত সাফল্যের হারকে বাড়িয়ে তোলে, রোল মডেলকে বিকৃত করে এবং দুর্বল অনুকরণে পরিণত করে। এটিকে সংশোধন করার জন্য ব্যর্থতার ঘটনাগুলি খুঁজে বের করা এবং মৌলিক হার (base rates) বোঝা প্রয়োজন।
    professional_application:
      networking_and_relationship_building: |
        পরামর্শ চাওয়ার সময়, যারা চেষ্টা করে ব্যর্থ হয়েছে তাদেরও খুঁজুন—তাদের দৃষ্টিভঙ্গি প্রায়শই টিকে থাকা ব্যক্তিদের চেয়ে বেশি তথ্যবহুল হয়।
      collaborative_learning_initiative: |
        ব্যর্থ প্রকল্প এবং বন্ধ হয়ে যাওয়া উদ্যোগগুলি অধ্যয়ন করুন, শুধু সফলগুলো নয়। "ব্যর্থতার পোস্টমর্টেম" পরিচালনা করুন যা কাজ করেনি তা থেকে শিখতে।
    how_can_this_be_misapplied:
      excessive_pessimism: |
        অতিরিক্ত সংশোধন করে ধরে নেওয়া যে সাফল্য সবসময় ভাগ্য এবং প্রচেষ্টার কোনো মূল্য নেই।
      dismissing_success: |
        "সারভাইভারশিপ বায়াস" এর কারণে সফল ব্যক্তিদের কাছ থেকে শেখা অস্বীকার করা।
      analysis_paralysis: |
        ব্যর্থতার ঘটনাগুলির উপর এত বেশি মনোযোগ দেওয়া যে আপনি কখনই কোনও পদক্ষেপ নেন না।
      false_equivalence: |
        বেঁচে থাকা এবং বেঁচে না থাকা ব্যক্তিদের কৌশলগুলিকে সমানভাবে তথ্যবহুল হিসাবে বিবেচনা করা যখন প্রেক্ষাপট ভিন্ন হয়।
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: লেইগার্নিক এফেক্ট
    quick_introduction: |
      লেইগার্নিক এফেক্ট হল অসম্পূর্ণ বা বাধাগ্রস্ত কাজগুলো সম্পন্ন কাজের চেয়ে বেশি মনে থাকার প্রবণতা। অসম্পূর্ণ কাজগুলো মানসিক চাপ সৃষ্টি করে যা সেগুলোকে আমাদের মনে সক্রিয় রাখে। আমাদের মস্তিষ্ক অপূর্ণ কাজগুলোকে ধরে রাখে।
    one_liner: অসম্পূর্ণ কাজগুলো আমাদের মনে গেঁথে থাকে—আমাদের মস্তিষ্ক অপূর্ণ জিনিসগুলোকে ধরে রাখে।
    try_this:
      - আপনার মানসিক ভার থেকে কাজগুলো "মুক্ত" করতে সম্পন্ন করার চেষ্টা করুন—সম্পন্ন করুন অথবা স্পষ্টভাবে সেগুলো বাদ দিন।
      - উৎপাদনশীল খোলা লুপ তৈরি করতে কাজগুলোকে পরিচালনাযোগ্য অংশে ভাগ করুন।
      - কখন আপনি অসম্পূর্ণ বিষয় নিয়ে আচ্ছন্ন হচ্ছেন তা লক্ষ্য করুন—লুপটি বন্ধ করুন বা এটি ছেড়ে দেওয়ার সিদ্ধান্ত নিন।
    ask_yourself:
      - কোন অসম্পূর্ণ কাজগুলো আমার মনে চাপ সৃষ্টি করছে?
      - এই খোলা লুপটি কি রাখা মূল্যবান, নাকি আমি এটি বন্ধ করতে পারি?
    in_more_detail: |
      ব্লুমা লেইগার্নিক লক্ষ্য করেছিলেন যে ওয়েটাররা পরিশোধিত অর্ডারের চেয়ে অপরিশোধিত অর্ডারগুলো ভালো মনে রাখত—কাজটি সম্পন্ন হওয়ার পর, এটি স্মৃতি থেকে "মুক্ত" হয়ে যেত। অসম্পূর্ণ কাজগুলো একটি খোলা লুপ তৈরি করে যা সমাপ্তি দাবি করে। এটি উৎপাদনশীল মনোযোগ (আমরা শেষ করতে চাই) এবং উদ্বেগ (আমরা যা অসমাপ্ত রয়ে গেছে তা নিয়ে চিন্তা করা বন্ধ করতে পারি না) উভয়ই চালিত করে।

      এই এফেক্টটি বিপণন (ক্লিফহ্যাঙ্গার, অসম্পূর্ণ গল্প) এবং উৎপাদনশীলতায় (একাধিক "খোলা লুপ" তৈরি করতে কাজগুলোকে অংশে ভাগ করা) ব্যবহৃত হয়। এটি ব্যাখ্যা করে কেন আমরা অসমাপ্ত বিষয় নিয়ে আচ্ছন্ন থাকি এবং কেন টু-ডু তালিকাগুলো বিশাল মনে হতে পারে।
    why_this_is_important: |
      লেইগার্নিক এফেক্ট বোঝা আপনাকে মানসিক ভার পরিচালনা করতে, আকর্ষক অভিজ্ঞতা তৈরি করতে এবং বাধাগুলোকে কৌশলগতভাবে ব্যবহার করতে সাহায্য করে। এটি ব্যাখ্যা করে কেন আমরা অসমাপ্ত কাজ নিয়ে চিন্তা করা বন্ধ করতে পারি না—এবং কেন তা কাজে লাগানো যেতে পারে বা ক্ষতিকারক হতে পারে।
    when_to_use:
      - সমস্যা_সমাধান
      - নেতৃত্ব
      - শিক্ষা
      - সিদ্ধান্ত_গ্রহণ
    how_can_you_spot_it:
      rumination_on_incomplete: |
        অসম্পূর্ণ কাজগুলো সম্পন্ন কাজের চেয়ে বেশি মনে আসে।
      better_recall_of_unfinished: |
        আমরা বাধাগ্রস্ত কাজগুলো সম্পন্ন কাজের চেয়ে ভালো মনে রাখি।
      tension_for_closure: |
        অসম্পূর্ণ কাজ শুরু করার জন্য অস্বস্তি বা তাগিদ।
      serial_dramas: |
        ক্লিফহ্যাঙ্গার এবং "চলবে" এফেক্টকে কাজে লাগায়।
    examples:
      productivity: |
        একটি কাজ শুরু করলে মানসিক চাপ তৈরি হয় যা সম্পন্ন করতে চালিত করে—অথবা যদি অনেক বেশি খোলা লুপ থাকে তবে উদ্বেগ সৃষ্টি করে।
      marketing: |
        "পর্ব ১/৩" বা "চলবে" দর্শকদের নিযুক্ত রাখে এবং তাদের ফিরে আসতে উদ্বুদ্ধ করে।
      meetings: |
        পরিষ্কার পরবর্তী পদক্ষেপ ছাড়াই মিটিং শেষ করলে অংশগ্রহণকারীদের অমীমাংসিত মানসিক চাপ থেকে যায়।
      learning: |
        উত্তর না দেওয়া প্রশ্ন বা অসম্পূর্ণ ব্যাখ্যাগুলো স্মৃতিতে গেঁথে থাকে এবং আরও অনুসন্ধানের দিকে চালিত করে।
    real_world_implications: |
      লেইগার্নিক এফেক্ট উৎপাদনশীলতা, অংশগ্রহণ এবং মানসিক ভারের উপর প্রভাব ফেলে। এটি মনোযোগের জন্য কাজে লাগানো যেতে পারে বা অতিরিক্ত বোঝা সৃষ্টি করতে পারে। এটি ক্লিফহ্যাঙ্গারগুলির আকর্ষণ এবং অতিরিক্ত খোলা কাজগুলির বোঝা ব্যাখ্যা করে।
    professional_application:
      networking_and_relationship_building: |
        স্পষ্ট পরবর্তী পদক্ষেপের সাথে কথোপকথন শেষ করুন—অথবা আপনি যদি চান অন্য ব্যক্তি ফলো-আপ করুক তবে ইচ্ছাকৃতভাবে খোলা লুপ রাখুন। অমীমাংসিত বিষয়গুলো অংশগ্রহণ তৈরি করে।
      collaborative_learning_initiative: |
        প্রশিক্ষণে লেইগার্নিক এফেক্ট ব্যবহার করুন: শিক্ষার্থীদের নিযুক্ত রাখতে বিরতির আগে সমস্যা বা প্রশ্ন জিজ্ঞাসা করুন। তবে এত বেশি খোলা লুপ তৈরি করা এড়িয়ে চলুন যাতে মানুষ অভিভূত বোধ করে।
    how_can_this_be_misapplied:
      overwhelm: |
        অত্যধিক খোলা লুপ তৈরি করা—অত্যধিক অসম্পূর্ণ কাজ—উদ্বেগ এবং পক্ষাঘাতের দিকে নিয়ে যায়।
      manipulation: |
        নির্ভরতা বা অংশগ্রহণের জন্য ইচ্ছাকৃতভাবে জিনিসগুলো অমীমাংসিত রাখা।
      false_urgency: |
        যখন কোনও জরুরি অবস্থা নেই তখন কৃত্রিম জরুরি অবস্থা তৈরি করতে এফেক্ট ব্যবহার করা।
      incomplete_work: |
        "চাপ" তৈরি করতে অনেক জিনিস শুরু করা কিন্তু সেগুলি সম্পন্ন না করা—ব্যাহত প্রচেষ্টার দিকে পরিচালিত করে।
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: শূন্য-যোগ চিন্তা (Zero-Sum Thinking)
    quick_introduction: |
      শূন্য-যোগ চিন্তা হলো এই বিশ্বাস যে একজনের লাভ অবশ্যই অন্যজনের ক্ষতি—
      সম্পদ নির্দিষ্ট এবং আপনার যেকোনো সুবিধা মানে আমার অসুবিধা।
      আসলে, অনেক পরিস্থিতিই ইতিবাচক-যোগ: উভয় পক্ষই লাভবান হতে পারে।
    one_liner: আপনার লাভ আমার ক্ষতি হওয়ার প্রয়োজন নেই—অনেক পরিস্থিতিই ইতিবাচক-যোগ।
    try_this:
      - জিজ্ঞাসা করুন: আমরা কি কেক বড় করতে পারি? এটি কি আসলেই শূন্য-যোগ?
      - প্রতিযোগিতা অনুমান করার আগে সহযোগিতার সুযোগ খুঁজুন।
      - লক্ষ্য করুন কখন আপনি পরিস্থিতিকে স্থির-কেক হিসাবে দেখছেন যখন এটি তা নয়।
    ask_yourself:
      - আমি কি এমন কিছু অনুমান করছি যেখানে আমরা কেক বড় করতে পারি?
      - প্রতিযোগিতা থেকে কি সহযোগিতা বেশি মূল্য তৈরি করবে?
    in_more_detail: |
      একটি শূন্য-যোগ খেলায়, মোট পরিমাণ নির্দিষ্ট—আপনার লাভ আমার ক্ষতি। ইতিবাচক-যোগ
      পরিস্থিতিতে, সহযোগিতা মূল্য তৈরি করে। বাণিজ্য, উদ্ভাবন এবং সম্পর্ক
      গড়ে তোলা প্রায়শই ইতিবাচক-যোগ। শূন্য-যোগ চিন্তা অপ্রয়োজনীয়
      প্রতিযোগিতা, সহযোগিতার সুযোগ হারানো এবং ধ্বংসাত্মক
      শত্রুতার দিকে পরিচালিত করে।

      এই পক্ষপাতিত্ব আলোচনা, রাজনীতি এবং সাংগঠনিক গতিবিদ্যায় সাধারণ।
      এটি একটি স্থির কেক অনুমান করে যখন কেক প্রায়শই বড় করা যেতে পারে। এটি
      আত্ম-পূরণকারী হতে পারে: যদি আপনি অন্যদের প্রতিপক্ষ হিসাবে দেখেন, তারা প্রতিপক্ষ হয়ে ওঠে।
    why_this_is_important: |
      শূন্য-যোগ চিন্তাকে চিনতে পারা সহযোগিতা এবং
      মূল্য তৈরির সুযোগ খুলে দেয়। এটি আলোচনা উন্নত করে, সংঘাত কমায় এবং
      জয়-জয় ফলাফলের সম্ভাবনা বাড়ায়। সেরা সুযোগগুলির অনেকগুলিই ইতিবাচক-যোগ।
    when_to_use:
      - আলোচনা (negotiation)
      - নেতৃত্ব (leadership)
      - সম্পর্ক_গড়ে_তোলা (relationship_building)
      - সিদ্ধান্ত_গ্রহণ (decision-making)
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "যদি তারা জেতে, আমি হারব" যখন পরিস্থিতি উভয়কেই লাভবান হওয়ার সুযোগ দিতে পারে।
      competitive_ framing: |
        স্বয়ংক্রিয়ভাবে পরিস্থিতিকে আমাদের-বনাম-তাদের হিসাবে ফ্রেম করা।
      envy_of_others_gains: |
        অন্যের সাফল্যকে এমনভাবে ঈর্ষা করা যেন তা আপনার ক্ষতি করছে।
      missed_cooperation: |
        সহযোগিতার সুযোগ দেখতে ব্যর্থ হওয়া যা সকলের উপকারে আসবে।
    examples:
      negotiation: |
        এই অনুমান করা যে অন্য পক্ষের জন্য একটি ভাল চুক্তি মানে আপনার জন্য একটি খারাপ চুক্তি—
        যখন সৃজনশীল সমাধানগুলি প্রায়শই উভয়ের জন্য মূল্য বৃদ্ধি করে।
      salary: |
        "যদি আমার সহকর্মী বেতন বৃদ্ধি পায়, তবে আমার জন্য কম থাকবে" যখন বাজেট
        নমনীয় হতে পারে বা মূল্য তৈরির উপর ভিত্তি করে বেতন বৃদ্ধি ন্যায়সঙ্গত হতে পারে।
      politics: |
        "তাদের দলের লাভ আমাদের ক্ষতি" যখন অনেক নীতিগত ফলাফল একাধিক গোষ্ঠীর উপকার করতে পারে।
      career: |
        "তাদের পদোন্নতি মানে আমার জন্য কম সুযোগ" যখন সাংগঠনিক বৃদ্ধি
        সবার জন্য বেশি সুযোগ তৈরি করতে পারে।
    real_world_implications: |
      শূন্য-যোগ চিন্তা সংঘাত বাড়ায়, সহযোগিতা সীমিত করে এবং সুযোগ নষ্ট করে।
      এটি প্রায়শই অর্থনীতি, সম্পর্ক এবং
      উদ্ভাবনে ভুল প্রমাণিত হয়। ইতিবাচক-যোগ ফ্রেমকে স্থানান্তরিত করলে ফলাফল উন্নত হয়।
    professional_application:
      networking_and_relationship_building: |
        অন্যদের জন্য মূল্য তৈরির উপায় খুঁজুন—তাদের সাফল্য আপনার জন্য
        সুযোগ তৈরি করতে পারে। এমন সম্পর্ক গড়ে তুলুন যেখানে উভয় পক্ষই লাভবান হয়।
      collaborative_learning_initiative: |
        দলীয় লক্ষ্যকে ইতিবাচক-যোগ হিসাবে ফ্রেম করুন: ভাগ করা সাফল্য, কেক বড় করা।
        অভ্যন্তরীণ প্রতিযোগিতার চেয়ে সহযোগিতাকে উৎসাহিত করুন।
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        কিছু পরিস্থিতি শূন্য-যোগ (যেমন, একটি একক পদোন্নতি, একটি নির্দিষ্ট বাজেট)।
        অন্যথায় ভান করা অজ্ঞতা হতে পারে।
      naive_cooperation: |
        এই অনুমান করা যে সবাই সহযোগিতা করবে যখন কিছু পক্ষ প্রকৃতই
        শত্রুতাপূর্ণ।
      undervaluing_competition: |
        প্রতিযোগিতা উন্নতিকে চালিত করতে পারে; সমস্ত শত্রুতা ধ্বংসাত্মক নয়।
      exploitation: |
        "ইতিবাচক-যোগ" ফ্রেম ব্যবহার করে অন্যদের কাছ থেকে মূল্য আদায় করা যারা
        লাভবান হয় না।
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
