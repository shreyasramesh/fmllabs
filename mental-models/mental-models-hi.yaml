# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Hindi)
# Consolidated from mental-models-hi/

mental_models:
  - id: ambiguity_effect
    name: अस्पष्टता प्रभाव
    quick_introduction: |
      अस्पष्टता प्रभाव तब होता है जब हम उन विकल्पों से बचते हैं जिनके परिणामों की संभावनाओं के बारे में हमारे पास जानकारी नहीं होती है। हम अज्ञात जोखिमों पर ज्ञात जोखिमों को प्राथमिकता देते हैं—भले ही अज्ञात जोखिम बेहतर हों। अनिश्चितता स्वयं अप्रिय लगती है।
    one_liner: हम अज्ञात जोखिमों पर ज्ञात जोखिमों को प्राथमिकता देते हैं—भले ही अज्ञात बेहतर हों।
    try_this:
      - पूछें: क्या मैं अनिश्चितता के कारण इस विकल्प से बच रहा हूँ, या इसमें कोई वास्तविक कमी है?
      - जो आप जानते हैं उसे मात्रात्मक बनाएं; कभी-कभी "अस्पष्ट" विकल्प में अधिक स्पष्ट लाभ होता है।
      - ध्यान दें कि आप केवल इसलिए परिचित को क्यों चुनते हैं क्योंकि यह सुरक्षित लगता है।
    ask_yourself:
      - क्या मैं किसी चीज़ को इसलिए अस्वीकार कर रहा हूँ क्योंकि वह अस्पष्ट है, या इसलिए कि वह वास्तव में खराब है?
      - अनिश्चित विकल्प के साथ सहज होने के लिए मुझे क्या जानने की आवश्यकता होगी?
    in_more_detail: |
      एल्सबर्ग के विरोधाभास में, लोग ज्ञात अनुपात वाली कलश पर दांव लगाना पसंद करते हैं, अज्ञात अनुपात वाली कलश पर, भले ही अज्ञात कलश बेहतर अवसर प्रदान कर सकता हो। हम अस्पष्टता नापसंद करते हैं—हम एक स्पष्ट (भले ही बुरा) संभावना को एक अस्पष्ट से बेहतर मानते हैं।

      यह प्रभाव निवेश, करियर विकल्पों और नीतियों में निर्णयों को प्रभावित करता है। यह उप-इष्टतम विकल्प की ओर ले जा सकता है जब हम उन विकल्पों से बचते हैं जो अस्पष्ट हैं लेकिन संभावित रूप से श्रेष्ठ हैं। यह यह भी बताता है कि हम परिचित ब्रांड और ज्ञात मात्राओं को क्यों पसंद करते हैं।
    why_this_is_important: |
      अस्पष्टता प्रभाव को पहचानने से आपको परिचित को अत्यधिक प्राथमिकता देने और अनिश्चित को कम प्राथमिकता देने से बचने में मदद मिलती है। जब अस्पष्टता प्रबंधनीय हो तो यह छूटे हुए अवसरों की ओर ले जा सकता है। यह यह भी बताता है कि पारदर्शिता और स्पष्टता चिंता को क्यों कम करती है।
    when_to_use:
      - निर्णय_लेना
      - जोखिम_मूल्यांकन
      - निवेश
      - करियर_गतिविधियाँ
    how_can_you_spot_it:
      preference_for_known_risks: |
        अस्पष्ट लोगों की तुलना में स्पष्ट (भले ही बदतर) संभावनाओं वाले विकल्पों को चुनना।
      avoidance_of_uncertainty: |
        विकल्पों को मुख्य रूप से इसलिए अस्वीकार करना क्योंकि "हम पर्याप्त नहीं जानते हैं।"
      familiarity_over_optimality: |
        संभावित रूप से बेहतर अज्ञात से अधिक परिचित को प्राथमिकता देना।
      information_seeking: |
        अस्पष्टता को कम करने वाली जानकारी के लिए भुगतान करने की इच्छा—भले ही यह निर्णय को न बदले।
    examples:
      investing: |
        अंतरराष्ट्रीय के बजाय घरेलू शेयरों को प्राथमिकता देना क्योंकि "हम उन्हें बेहतर ढंग से समझते हैं" विविधीकरण लाभ के बावजूद।
      employment: |
        अनिश्चित लाभ के साथ भूमिका लेने के बजाय एक ज्ञात नौकरी में बने रहना।
      product_choice: |
        अनिश्चित गुणवत्ता वाले नए विकल्प पर एक परिचित ब्रांड चुनना।
      medical: |
        अनिश्चित परिणामों वाले इलाज पर ज्ञात दुष्प्रभावों वाले उपचार को प्राथमिकता देना, भले ही बाद वाला बेहतर हो।
    real_world_implications: |
      अस्पष्टता प्रभाव बाजारों, करियर विकल्पों और नीतियों को आकार देता है। इसे स्पष्ट जानकारी प्रदान करके या निर्णयों को फिर से परिभाषित करके कम किया जा सकता है। यह यह भी बताता है कि पारदर्शिता और संचार चिंता को क्यों कम करते हैं।
    professional_application:
      networking_and_relationship_building: |
        रिश्तों में अस्पष्टता कम करें: अपेक्षाओं को स्पष्ट करें, स्पष्ट रूप से संवाद करें, और अनिश्चितता कम करें। लोग ज्ञात स्थितियों को प्राथमिकता देते हैं।
      collaborative_learning_initiative: |
        परिवर्तन का परिचय देते समय, अस्पष्टता कम करें—क्या होगा, कब और क्यों, इसके बारे में स्पष्ट जानकारी प्रदान करें। अस्पष्टता प्रतिरोध बढ़ाती है।
    how_can_this_be_misapplied:
      manipulation: |
        लोगों को पसंदीदा विकल्पों की ओर ले जाने के लिए जानबूझकर अस्पष्टता पैदा करना।
      false_clarity: |
        जब वास्तविक अनिश्चितता मौजूद हो तो झूठी निश्चितता प्रदान करना।
      overconfidence: |
        यह मानना ​​कि अस्पष्टता को कम करने से हमेशा निर्णय बेहतर होते हैं—कभी-कभी अस्पष्ट विकल्प वास्तव में बेहतर होता है।
      analysis_paralysis: |
        कुछ अस्पष्टता अपरिहार्य होने पर निर्णय लेने से पहले पूर्ण जानकारी की प्रतीक्षा करना।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: एंकरिंग पूर्वाग्रह
    quick_introduction: |
      एंकरिंग पूर्वाग्रह निर्णय लेते समय पहली बार मिली जानकारी पर बहुत अधिक निर्भर रहने की प्रवृत्ति है। वह प्रारंभिक "एंकर" बाद के निर्णयों को प्रभावित करता है, भले ही वह अप्रासंगिक या मनमाना हो।
    one_liner: पहली संख्या जो आप देखते हैं वह उन सभी संख्याओं को आकार देती है जो उसके बाद आती हैं।
    try_this:
      - किसी बातचीत से पहले, अपना लक्ष्य निर्धारण करें और उनकी एंकरिंग से बचने का प्रयास करें।
      - अनुमान लगाते समय, दूसरों को सुनने से पहले अपनी संख्या उत्पन्न करें।
      - पूछें: क्या मैं अलग तरह से सोचूंगा यदि मैंने पहले एक अलग संख्या देखी होती?
    ask_yourself:
      - मुझे पहली संख्या या विचार क्या मिला—और क्या यह मेरे निर्णय को प्रभावित कर रहा है?
      - क्या मैं एंकर से पर्याप्त रूप से समायोजन कर रहा हूँ, या अभी भी उसके बहुत करीब हूँ?
    in_more_detail: |
      एक क्लासिक प्रयोग में, जिन लोगों से संयुक्त राष्ट्र में अफ्रीकी देशों के प्रतिशत का अनुमान लगाने के लिए कहा गया था, उन्होंने उच्च अनुमान दिए यदि उन्होंने अभी-अभी एक उच्च संख्या (जैसे, 65 बनाम 10) देखी थी।
      एंकर—भले ही वह यादृच्छिक हो—ने उनके उत्तरों को प्रभावित किया। एंकरिंग बातचीत, मूल्य निर्धारण, भर्ती और पूर्वानुमान को प्रभावित करती है।

      हम जो पहली संख्या देखते हैं वह एक संदर्भ बिंदु बन जाती है। हम उससे दूर समायोजित करते हैं, लेकिन
      आमतौर पर अपर्याप्त रूप से। भले ही हम जानते हों कि एंकर मनमाना है, यह अभी भी हमें प्रभावित कर सकता है। विशेषज्ञ भी इससे अछूते नहीं हैं।
    why_this_is_important: |
      एंकरिंग को समझने से आपको बेहतर निर्णय लेने, अधिक प्रभावी ढंग से बातचीत करने और हेरफेर से बचने में मदद मिलती है। यह यह भी बताता है कि जानकारी के क्रम और फ्रेमिंग का इतना महत्व क्यों है।
    when_to_use:
      - निर्णय_लेना
      - बातचीत
      - निवेश
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      first_number_dominance: |
        किसी बातचीत या अनुमान में पहली संख्या परिणाम को असंगत रूप से प्रभावित करती है।
      insufficient_adjustment: |
        जब एंकर से समायोजन किया जाता है, तो लोग आम तौर पर पर्याप्त समायोजन नहीं करते हैं।
      arbitrary_anchor_influence: |
        स्पष्ट रूप से अप्रासंगिक संख्याएं (जैसे, सामाजिक सुरक्षा नंबर के अंतिम अंक) भी अनुमानों को प्रभावित कर सकती हैं।
      order_effects: |
        जिस क्रम में विकल्प प्रस्तुत किए जाते हैं वह विकल्पों को बदल देता है।
    examples:
      salary_negotiation: |
        उल्लिखित पहली संख्या—चाहे नियोक्ता द्वारा या उम्मीदवार द्वारा—अक्सर अंतिम प्रस्ताव को एंकर करती है।
      real_estate: |
        सूची मूल्य खरीदारों के मूल्य की धारणाओं को एंकर करता है, भले ही इसे जानबूझकर उच्च या निम्न निर्धारित किया गया हो।
      retail: |
        "99 डॉलर था, अब 49 डॉलर" बिक्री मूल्य को एक सौदा बनाने के लिए मूल मूल्य को एंकर के रूप में उपयोग करता है।
      forecasting: |
        योजना बैठकों में प्रारंभिक अनुमान बाद के पूर्वानुमानों को एंकर करते हैं, भले ही पहला अनुमान एक अनुमान था।
    real_world_implications: |
      एंकरिंग बाजारों, वार्ताओं और नीतियों को आकार देती है। इसका उपयोग नैतिक रूप से (जैसे, उचित अपेक्षाएँ निर्धारित करना) या अनैतिक रूप से (जैसे, हेरफेर मूल्य निर्धारण) किया जा सकता है।
      इसे पहचानना निर्णय की गुणवत्ता में सुधार करता है।
    professional_application:
      networking_and_relationship_building: |
        वार्ताओं में, एंकर सेट करने के लिए पहला प्रस्ताव बनाने पर विचार करें—या जब दूसरा पक्ष ऐसा कर रहा हो तो जागरूक रहें।
      collaborative_learning_initiative: |
        बैठकों में, अनुमानों पर पहले कौन बोलता है, इसके बारे में सावधान रहें; चर्चा से पहले स्वतंत्र अनुमान एकत्र करने पर विचार करें।
    how_can_this_be_misapplied:
      manipulation: |
        दूसरों को वांछित परिणामों की ओर ले जाने के लिए अत्यधिक एंकरों का जानबूझकर उपयोग करना।
      overconfidence_in_anchors: |
        अपने स्वयं के पहले अनुमान पर बहुत अधिक भरोसा करना, उसे फिर से देखे बिना।
      ignoring_relevant_information: |
        एंकर को अधिक प्रासंगिक डेटा को ओवरराइड करने देना।
      exploitation: |
        बिक्री की रणनीति जो वास्तविक कीमतों को उचित दिखाने के लिए फुलाए हुए "तुलना करें" कीमतों का उपयोग करती है।
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: उपलब्धता कैस्केड
    quick_introduction: |
      उपलब्धता कैस्केड एक आत्म-सुदृढ़ प्रक्रिया है जहाँ सार्वजनिक चर्चा के बार-बार होने से
      कोई विचार अधिक प्रशंसनीय हो जाता है। जितना अधिक उस पर चर्चा होती है, वह उतना ही "उपलब्ध"
      बनता है, अधिक लोग उस पर विश्वास करते हैं, और उस पर अधिक चर्चा होती है। अंतर्निहित सत्य
      की परवाह किए बिना एक सामूहिक विश्वास गति प्राप्त करता है।
    one_liner: जितना अधिक किसी विचार को दोहराया जाता है, वह उतना ही प्रशंसनीय लगता है—सबूतों के बावजूद।
    try_this:
      - पूछें: क्या यह विश्वास व्यापक है क्योंकि यह सच है, या क्योंकि इसे दोहराया गया है?
      - जो सब जानते हैं को स्वीकार करने से पहले प्राथमिक स्रोतों की तलाश करें।
      - ध्यान दें कि कब केवल दोहराव आपकी प्रशंसनीयता की भावना को बढ़ा रहा है।
    ask_yourself:
      - क्या मैं इस पर विश्वास करूंगा यदि मैंने इसे केवल एक बार सुना होता?
      - क्या मैं "सब कहते हैं" को "सबूत इसका समर्थन करते हैं" के साथ मिला रहा हूँ?
    in_more_detail: |
      तिमुर कुरान और कैस सनस्टीन ने बताया कि उपलब्धता कैस्केड कैसे काम करते हैं:
      सूचना उपलब्धता (हम कितनी बार कुछ सुनते हैं) और प्रशंसनीयता (यह कितना विश्वसनीय लगता है)
      एक दूसरे को मजबूत करते हैं। मीडिया कवरेज, सोशल मीडिया और सार्वजनिक विमर्श कुछ विचारों को
      बढ़ावा देते हैं। एक बार जब कोई विचार उपलब्धता की सीमा पार कर जाता है, तो वह तेज़ी से फैल
      सकता है और "सामान्य ज्ञान" बन सकता है, भले ही वह गलत या अतिरंजित हो।

      उपलब्धता कैस्केड फायदेमंद (महत्वपूर्ण चेतावनियाँ फैलाना) या हानिकारक (घबराहट या गलत सूचना फैलाना)
      हो सकते हैं। वे उपलब्धता अनुमान और सामाजिक प्रमाण द्वारा संचालित होते हैं।
    why_this_is_important: |
      उपलब्धता कैस्केड को पहचानना आपको यह मूल्यांकन करने में मदद करता है कि क्या व्यापक विश्वास
      सबूतों को दर्शाता है या केवल दोहराव को। यह बताता है कि विचार कैसे वायरल होते हैं और सामूहिक
      विश्वास कैसे गलत हो सकते हैं। यह मीडिया साक्षरता और महत्वपूर्ण सोच के लिए आवश्यक है।
    when_to_use:
      - निर्णय_लेना
      - जोखिम_मूल्यांकन
      - सीखना
      - नेतृत्व
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        जितना अधिक किसी विचार को दोहराया जाता है, वह उतना ही अधिक प्रशंसनीय लगता है।
      media_amplification: |
        कवरेज विश्वास को बढ़ाता है जो अधिक कवरेज को बढ़ाता है।
      social_proof_belief: |
        "सब लोग इस पर विश्वास करते हैं" विश्वास का प्रमाण बन जाता है।
      threshold_effects: |
        एक बार जब कोई विचार दृश्यता की सीमा पार कर लेता है, तो वह तेज़ी से फैलता है।
    examples:
      health_scares: |
        एक अध्ययन से पता चलता है कि एक उत्पाद खतरनाक है; मीडिया इसे बढ़ा-चढ़ाकर बताता है;
        जनता इससे बचती है; अधिक कवरेज होता है। जोखिम अतिरंजित हो सकता है।
      financial_panic: |
        बैंक विफलता की अफवाहें फैलती हैं; लोग पैसे निकालते हैं; दौड़ आत्म-पूर्ति हो जाती है।
      social_media: |
        एक कहानी वायरल हो जाती है; दोहराव विश्वास बढ़ाता है; विश्वास साझाकरण बढ़ाता है।
        सत्य और वायरल होना अलग हो सकते हैं।
      organizational: |
        छंटनी के बारे में एक अफवाह फैलती है; चिंता बढ़ती है; व्यवहार बदल जाता है;
        प्रतिक्रिया के माध्यम से अफवाह अधिक प्रशंसनीय हो जाती है।
    real_world_implications: |
      उपलब्धता कैस्केड सार्वजनिक राय, नीति और बाजारों को आकार देते हैं।
      वे महत्वपूर्ण सच्चाइयों और खतरनाक झूठी बातों दोनों को फैला सकते हैं।
      महत्वपूर्ण सोच के लिए साक्ष्य-आधारित विश्वास को कैस्केड-संचालित विश्वास से अलग करना आवश्यक है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई विचार "हर जगह" हो, तो पूछें: क्या यह सच है क्योंकि इसे दोहराया गया है,
        या यह सच है क्योंकि इसे दोहराया गया है? प्राथमिक स्रोतों की तलाश करें।
      collaborative_learning_initiative: |
        प्रसारित करने से पहले सत्यापन के मानदंड बनाएं। "जो सब जानते हैं" पर
        सवाल उठाने को प्रोत्साहित करें। उस आम सहमति को अलग करें जो सबूतों को दर्शाती है
        उस आम सहमति से जो उपलब्धता को दर्शाती है।
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        कभी-कभी व्यापक विश्वास सही होता है। यह न मानें कि सभी लोकप्रिय विचार कैस्केड हैं।
      conspiracy_thinking: |
        "उपलब्धता कैस्केड" का उपयोग वैध चिंताओं को निर्मित के रूप में खारिज करने के लिए करना।
      false_skepticism: |
        अच्छी तरह से समर्थित विचारों को लोकप्रिय होने के कारण अस्वीकार करना।
      contrarianism: |
        यह मान लेना कि जो कुछ भी व्यापक रूप से माना जाता है वह गलत होना चाहिए।
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: उपलब्धता अनुमान
    quick_introduction: |
      उपलब्धता अनुमान किसी घटना की संभावना का आकलन करने की वह प्रवृत्ति है जिसके द्वारा
      उसके उदाहरण कितनी आसानी से मन में आ जाते हैं। यदि हम आसानी से उदाहरण याद कर सकते हैं,
      तो हम मान लेते हैं कि घटना आम है। ज्वलंत, हालिया, या भावनात्मक उदाहरण
      हमारे संभाव्यता अनुमानों पर हावी हो जाते हैं।
    one_liner: जो आसानी से याद आ जाता है, वह अधिक संभावित लगता है—भले ही वह न हो।
    try_this:
      - पूछें: आधार दर क्या है? क्या मैं ज्वलंत या हालिया उदाहरणों को अधिक महत्व दे रहा हूँ?
      - जब आपका मन कहे "यह आम लगता है" या "यह दुर्लभ लगता है", तो डेटा खोजें।
      - ध्यान दें जब कोई एक नाटकीय कहानी आपके जोखिम मूल्यांकन को प्रभावित कर रही हो।
    ask_yourself:
      - क्या मैं वास्तविक आवृत्ति के बजाय याद करने की आसानी से संभावना का आकलन कर रहा हूँ?
      - क्या मैं अगर मैंने वह सुर्खियाँ न देखी होतीं, तो क्या मैं अलग सोचता?
    in_more_detail: |
      हम आवृत्ति और संभावना का अनुमान लगाने के लिए मानसिक शॉर्टकट का उपयोग करते हैं।
      एक शॉर्टकट उपलब्धता है: क्या आसानी से मन में आता है? हवाई जहाज दुर्घटनाएं ज्वलंत और
      भारी रूप से रिपोर्ट की जाती हैं—हम उनकी संभावना को बढ़ा-चढ़ाकर बताते हैं। कार दुर्घटनाएं
      आम हैं लेकिन कम ध्यान देने योग्य—हम उन्हें कम आंकते हैं। हालियाता, ज्वलंतता, और
      भावनात्मक प्रभाव सभी उपलब्धता को बढ़ाते हैं।

      यह अनुमान तब उपयोगी होता है जब उपलब्धता वास्तविक आवृत्ति से संबंधित होती है।
      लेकिन मीडिया, व्यक्तिगत अनुभव, और महत्व अक्सर संबंध को विकृत करते हैं।
      हम दुर्लभ लेकिन ज्वलंत जोखिमों से डरते हैं और आम लेकिन सामान्य को अनदेखा करते हैं।
    why_this_is_important: |
      उपलब्धता अनुमान को पहचानना आपको संभाव्यता
      अनुमानों को सही करने, ज्वलंत समाचारों पर अधिक प्रतिक्रिया करने से बचने, और बेहतर जोखिम
      मूल्यांकन करने में मदद करता है। यह निर्णय में कई व्यवस्थित त्रुटियों की व्याख्या करता है।
    when_to_use:
      - निर्णय_लेना
      - जोखिम_मूल्यांकन
      - निवेश
      - समस्या_समाधान
    how_can_you_spot_it:
      vividness_dominance: |
        नाटकीय या भावनात्मक उदाहरण अनुमानों को असमान रूप से प्रभावित करते हैं।
      recency_effect: |
        हालिया घटनाओं के फिर से होने की संभावना अधिक लगती है।
      personal_experience_overweighting: |
        "मैं किसी ऐसे व्यक्ति को जानता हूँ जिसने..." संभाव्यता अनुमानों को आकार देता है।
      media_distortion: |
        जो रिपोर्ट किया जाता है वह अक्सर जो बार-बार होता है उससे मेल नहीं खाता।
    examples:
      risk_perception: |
        आतंकवाद के जोखिम को अधिक आंकना (ज्वलंत, रिपोर्ट किया गया) और हृदय
        रोग के जोखिम को कम आंकना (आम, कम नाटकीय)।
      investing: |
        हालिया बाज़ार की घटनाएँ (गिरावट, तेज़ी) भविष्य की अपेक्षाओं पर हावी होती हैं।
      hiring: |
        किसी विशेष स्कूल से एक खराब नियुक्ति के बारे में एक ज्वलंत कहानी,
        उस स्कूल के सभी उम्मीदवारों के मूल्यांकन को प्रभावित करती है।
      health: |
        किसी मित्र का कैंसर निदान कैंसर को आधार दर से अधिक संभावित बनाता है
        जैसा कि सुझाव दिया गया है।
    real_world_implications: |
      उपलब्धता अनुमान बीमा खरीद, नीति प्राथमिकताओं,
      और व्यक्तिगत निर्णयों को प्रभावित करता है। इसका मीडिया और विपणक द्वारा शोषण किया जाता है।
      इसके लिए आधार दरें खोजने और "क्या मन में आता है" पर सवाल उठाने की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        इस बात से अवगत रहें कि किसी व्यक्ति या समूह के साथ एक ज्वलंत नकारात्मक अनुभव
        आपके निर्णय को विकृत कर सकता है। आधार दरें और कई डेटा बिंदु खोजें।
      collaborative_learning_initiative: |
        जोखिमों या अवसरों का आकलन करते समय, स्पष्ट रूप से पूछें "आधार दर क्या है?"
        और "क्या मैं ज्वलंत उदाहरणों को अधिक महत्व दे रहा हूँ?" उपलब्धता-संचालित अनुमानों
        को सही करने के लिए डेटा का उपयोग करें।
    how_can_this_be_misapplied:
      dismissing_intuition: |
        कभी-कभी उपलब्धता जानकारीपूर्ण होती है—हालिया अनुभव परिवर्तन का संकेत दे सकता है।
        यह न मानें कि उपलब्धता-संचालित सभी निर्णय गलत हैं।
      analysis_paralysis: |
        इतनी अधिक सुधार करना कि ज्वलंत अनुभव से वैध चेतावनी संकेतों को अनदेखा किया जाए।
      false_objectivity: |
        यह मानना कि आधार दरें हमेशा सही होती हैं जब वे पुरानी या अनुपयुक्त हो सकती हैं।
      manipulation: |
        दूसरों के निर्णयों को निर्देशित करने के लिए जानबूझकर कुछ उदाहरणों को ज्वलंत बनाना।
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: द बैडर-मीन्होफेनोन
    quick_introduction: |
      बॅडर-मीन्होफेनोन (जिसे आवृत्ति भ्रम भी कहा जाता है) तब होता है जब आप किसी नई चीज़ के बारे में सीखते हैं और फिर अचानक उसे हर जगह देखते हैं। यह एक संयोग की तरह लगता है, लेकिन यह अक्सर चयनात्मक ध्यान होता है—आपका मस्तिष्क उस चीज़ को नोटिस करने के लिए तैयार हो जाता है जिसे उसने हाल ही में देखा है।
    one_liner: आप कुछ नया सीखते हैं और अचानक उसे हर जगह देखते हैं—वह हमेशा से वहीं था।
    try_this:
      - जब कुछ सीखने के बाद वह "हर जगह" महसूस हो, तो आधार दर की जाँच करें।
      - ध्यान दें कि कब हालियापन किसी चीज़ को उसके वास्तविक महत्व से अधिक महत्वपूर्ण महसूस करा रहा है।
      - पूछें: क्या मैं एक वास्तविक प्रवृत्ति देख रहा हूँ, या सिर्फ वही देख रहा हूँ जिसे मैं देखने के लिए तैयार हूँ?
    ask_yourself:
      - क्या यह वास्तव में अब अधिक सामान्य है, या मैं इसे बस अधिक नोटिस कर रहा हूँ?
      - क्या मैंने इसे हाल ही में सीखने से पहले इस पैटर्न को देखा होता?
    in_more_detail: |
      बॅडर-मीन्होफेन आतंकवादी समूह के बारे में सुनने के बाद, कोई व्यक्ति दिनों के भीतर समाचारों में, बातचीत में और लेखों में इसके संदर्भ देख सकता है। इस घटना के दो घटक होते हैं: चयनात्मक ध्यान (आप वही देखते हैं जिसकी आप तलाश कर रहे होते हैं) और पुष्टिकरण पूर्वाग्रह (आप उन चीजों को याद रखते हैं जो मेल खाती हैं और जो मेल नहीं खातीं उन्हें भूल जाते हैं)।

      यह भ्रम होता है कि वह चीज़ अचानक अधिक सामान्य हो गई है। वास्तव में, वह हमेशा मौजूद थी; आप बस उसके प्रति सचेत नहीं थे। इससे हाल ही में सीखी गई जानकारी की व्यापकता या महत्व को अधिक आंकने की प्रवृत्ति हो सकती है।
    why_this_is_important: |
      बॅडर-मीन्होफेनोन को पहचानना आपको हालिया संपर्क के आधार पर किसी चीज़ के कितना सामान्य या महत्वपूर्ण होने का अधिक अनुमान लगाने से बचने में मदद करता है। यह यह भी बताता है कि नए विचार, उत्पाद या रुझान आपको पहले ध्यान देने के बाद "हर जगह" क्यों महसूस हो सकते हैं।
    when_to_use:
      - निर्णय_निर्माण
      - सीखना
      - जोखिम_मूल्यांकन
      - समस्या_समाधान
    how_can_you_spot_it:
      sudden_ubiquity: |
        आप एक नया शब्द, अवधारणा, या उत्पाद सीखते हैं और कुछ दिनों के भीतर महसूस करते हैं कि आप इसे लगातार देख रहे हैं।
      recency_bias: |
        हालिया जानकारी वास्तव में उससे अधिक प्रतिनिधि महसूस होती है।
      pattern_seeking: |
        आपका मस्तिष्क असंबंधित दृश्यों को "यह हर जगह है" की कथा में जोड़ता है।
      forgetting_the_misses: |
        आप इस बात का ट्रैक नहीं रखते कि आपको वह चीज़ कितनी बार नहीं दिखती—सिर्फ वे समय जब आप उसे देखते हैं।
    examples:
      vocabulary: |
        "सेरेंडिपिटी" शब्द सीखना और फिर उसी सप्ताह तीन अलग-अलग लेखों में इसे देखना।
      car_purchase: |
        एक निश्चित कार मॉडल खरीदने का निर्णय लेने के बाद, आप इसे हर सड़क पर देखते हैं—हालांकि यह हमेशा से वहीं था।
      health_anxiety: |
        एक दुर्लभ लक्षण के बारे में पढ़ना और फिर अपने भीतर समान संवेदनाओं को नोटिस करना, जिससे अनावश्यक चिंता होती है।
      trends: |
        एक नया ऐप या प्रवृत्ति की खोज करना और यह महसूस करना कि यह अचानक हावी हो रहा है—जब इसका उपयोगकर्ता आधार छोटा हो सकता है।
    real_world_implications: |
      यह घटना रुझानों, जोखिमों और अवसरों को देखने के हमारे तरीके को प्रभावित करती है। विपणनकर्ता और मीडिया बार-बार संपर्क बनाकर इसका फायदा उठा सकते हैं। निर्णय लेने में, यह हालिया जानकारी को अधिक महत्व देने का कारण बन सकता है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई व्यक्ति कुछ सीखने के बाद किसी विषय का बार-बार उल्लेख करता है, तो पहचानें कि वे आवृत्ति भ्रम का अनुभव कर सकते हैं—विषय जरूरी नहीं कि अधिक प्रासंगिक हो, बस उनके लिए अधिक ध्यान देने योग्य हो।
      collaborative_learning_initiative: |
        प्रशिक्षण में, इस बात को सुदृढ़ करें कि कुछ नया सीखने के बाद "इसे हर जगह देखना" सामान्य है; व्यापकता की भावना पर भरोसा करने के बजाय आधार दर की जांच को प्रोत्साहित करें।
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        यह मान लेना कि कुछ अधिक सामान्य या महत्वपूर्ण है क्योंकि आपने हाल ही में इसे अक्सर देखा है।
      confirmation_bias_amplification: |
        "इसे हर जगह देखने" की भावना का उपयोग इस विश्वास के प्रमाण के रूप में करना कि यह सही है।
      decision_distortion: |
        हाल ही में सीखी गई जानकारी के आधार पर ऐसे चुनाव करना जो अनुपातहीन रूप से महत्वपूर्ण महसूस हो।
      vulnerability_to_manipulation: |
        विज्ञापक और प्रचारक व्यापकता और महत्व का भ्रम पैदा करने के लिए बार-बार संपर्क का उपयोग करते हैं।
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: बर्नम प्रभाव
    quick_introduction: |
      बर्नम प्रभाव (या फोरर प्रभाव) अस्पष्ट, सामान्य व्यक्तित्व विवरणों को विशिष्ट रूप से सटीक मानने की प्रवृत्ति है। राशिफल, ज्योतिषी, और व्यक्तित्व परीक्षण ऐसे कथन का उपयोग करते हैं जो लगभग हर किसी पर लागू होते हैं—लेकिन हम मानते हैं कि वे हमारे लिए विशिष्ट हैं। हम स्वयं को सामान्य में देखते हैं।
    one_liner: अस्पष्ट कथन व्यक्तिगत महसूस होते हैं क्योंकि वे लगभग हर किसी पर लागू होते हैं।
    try_this:
      - Ask: क्या यह विवरण कई लोगों पर लागू हो सकता है? इसे किसी और पर आज़माएँ।
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger?
      - Am I remembering the hits and forgetting the misses?
    in_more_detail: |
      मनोवैज्ञानिक बर्ट्रम फोरर ने छात्रों को समान "व्यक्तिगत" प्रतिक्रिया दी (जैसे, "आपको दूसरों की प्रशंसा और पसंद की आवश्यकता है") और उन्होंने इसे अत्यधिक सटीक दर्जा दिया। कथन इतने अस्पष्ट थे कि वे किसी पर भी लागू हो सकते थे। कहा जाता है कि पी.टी. बर्नम ने कहा था, "हर मिनट एक मूर्ख पैदा होता है"—यह प्रभाव उनके सामान्यीकरणों से भरी भीड़ को आकर्षित करने की क्षमता के लिए नामित है।

      यह प्रभाव इसलिए काम करता है क्योंकि हम अस्पष्ट कथनों में व्यक्तिगत प्रासंगिकता खोजने में अच्छे हैं। हम "हिट" (जो सही बैठता है) को याद रखते हैं और "मिस्सेस" (जो गलत बैठता है) को भूल जाते हैं। यह कोल्ड रीडिंग (cold reading) और कई "व्यक्तित्व" उत्पादों का आधार है।
    why_this_is_important: |
      बर्नम प्रभाव को पहचानना आपको व्यक्तित्व मूल्यांकन का मूल्यांकन करने, हेरफेर का विरोध करने और अस्पष्ट प्रतिक्रियाओं की अधिक व्याख्या करने से बचने में मदद करता है। यह बताता है कि राशिफल सटीक क्यों लगते हैं और कुछ "व्यक्तिगत" सलाह सामान्य क्यों होती है।
    when_to_use:
      - निर्णय_लेना
      - सीखना
      - जोखिम_मूल्यांकन
      - संबंध_निर्माण
    how_can_you_spot_it:
      vague_accuracy: |
        ऐसी प्रतिक्रिया जो व्यक्तिगत महसूस होती है लेकिन कई लोगों पर लागू हो सकती है।
      selective_fit: |
        हम उस पर ध्यान केंद्रित करते हैं जो फिट बैठता है और जो नहीं बैठता उसे अनदेखा करते हैं।
      cold_reading: |
        कोई व्यक्ति आपको ऐसे कथनों से "पढ़ता" है जो वास्तव में सामान्य हैं।
      personality_test_enthusiasm: |
        मूल्यांकन परिणामों को विशिष्ट रूप से अंतर्दृष्टिपूर्ण के रूप में अविवेकपूर्ण स्वीकृति।
    examples:
      horoscopes: |
        "आप कभी-कभी अपने निर्णयों पर संदेह करते हैं" व्यक्तिगत महसूस होता है लेकिन अधिकांश लोगों पर लागू होता है।
      fortune_telling: |
        अस्पष्ट भविष्यवाणियां जिन्हें हम अपनी स्थिति के लिए विशिष्ट मानते हैं।
      personality_tests: |
        कुछ मूल्यांकन बर्नम कथनों का उपयोग करते हैं और विवेकपूर्ण न होते हुए भी सटीक महसूस होते हैं।
      feedback: |
        सामान्य प्रदर्शन प्रतिक्रिया जिसे हम गहराई से व्यक्तिगत मानते हैं।
    real_world_implications: |
      बर्नम प्रभाव का ज्योतिष, कुछ कोचिंग, और निम्न-गुणवत्ता वाले मूल्यांकनों में शोषण किया जाता है। यह अमान्य उपकरणों में झूठा आत्मविश्वास पैदा कर सकता है। यह यह भी बताता है कि हम चापलूसी और अस्पष्ट सकारात्मक प्रतिक्रियाओं के प्रति क्यों संवेदनशील हैं।
    professional_application:
      networking_and_relationship_building: |
        प्रतिक्रिया प्राप्त करते समय, पूछें "क्या यह कई लोगों पर लागू हो सकता है?" अस्पष्ट प्रशंसा या आलोचना के बजाय विशिष्ट, व्यवहारिक प्रतिक्रिया की तलाश करें। "व्यक्तिगत" अंतर्दृष्टियों से सावधान रहें जो बहुत अच्छी लगती हैं।
      collaborative_learning_initiative: |
        मूल्यांकनों का उपयोग करते समय, विवेकपूर्ण वैधता वाले मान्य उपकरणों को चुनें। बर्नम कथनों पर निर्भर उपकरणों से बचें। लोगों को अस्पष्ट प्रतिक्रिया पहचानने के लिए प्रशिक्षित करें।
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        सभी व्यक्तिगत प्रतिक्रिया बर्नम नहीं होती—कुछ वास्तव में विशिष्ट होती है। हर अस्पष्ट बात को खारिज न करें।
      invalidating_experience: |
        किसी को यह बताना कि उनकी अंतर्दृष्टि का अनुभव "सिर्फ बर्नम" है, जब यह उनके लिए मूल्यवान हो सकता है।
      overcorrection: |
        सभी व्यक्तित्व ढाँचों को अस्वीकार करना क्योंकि कुछ बर्नम कथनों का उपयोग करते हैं।
      false_skepticism: |
        यह मान लेना कि क्योंकि कुछ सटीक महसूस होता है, यह बर्नम ही होना चाहिए—कभी-कभी चीजें सटीक होती हैं।
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: बेस रेट फ़ैलेसी
    quick_introduction: |
      बेस रेट फ़ैलेसी सामान्य सांख्यिकीय जानकारी (बेस रेट) को विशिष्ट, ज्वलंत जानकारी के पक्ष में अनदेखा करने की प्रवृत्ति है। हम विशेष मामले को अधिक महत्व देते हैं और पूर्व संभावना को कम महत्व देते हैं। एक एकल आकर्षक कहानी संख्याओं की बातों को दरकिनार कर सकती है।
    one_liner: एक आकर्षक कहानी संख्याओं की बातों को दरकिनार कर सकती है।
    try_this:
      - किसी मामले का निर्णय लेने से पहले, पूछें: इस तरह की स्थिति के लिए बेस रेट क्या है?
      - विशिष्ट प्रमाण को पूर्व संभावना के साथ मिलाएं—किसी को भी अनदेखा न करें।
      - ध्यान दें कि कब एक ज्वलंत उदाहरण आंकड़ों को दबा रहा है।
    ask_yourself:
      - क्या मैं इस विशेष मामले को अधिक महत्व दे रहा हूं और बेस रेट को कम महत्व दे रहा हूं?
      - अगर मैं आकर्षक कहानी को अलग रख दूं तो संख्याएं क्या कहेंगी?
    in_more_detail: |
      यदि कोई बीमारी 1% आबादी को प्रभावित करती है और एक परीक्षण 95% सटीक है, तो एक सकारात्मक परिणाम का अक्सर मतलब होता है कि व्यक्ति को अभी भी बीमारी नहीं है—क्योंकि बेस रेट बहुत कम है। लेकिन हम बेस रेट को अनदेखा करते हैं और "उन्होंने सकारात्मक परीक्षण किया" पर ध्यान केंद्रित करते हैं। हम सांख्यिकीय पर विशेष की ओर आकर्षित होते हैं।

      यह फ़ैलेसी चिकित्सा निदान, भर्ती, जोखिम मूल्यांकन और कानूनी निर्णय को प्रभावित करती है। हमें बायेसियन तर्क का उपयोग करके बेस रेट को मामले-विशिष्ट प्रमाण के साथ संयोजित करने की आवश्यकता है—लेकिन हम अक्सर ऐसा नहीं करते हैं।
    why_this_is_important: |
      बेस रेट फ़ैलेसी के लिए सुधार निदान, जोखिम मूल्यांकन और निर्णय की गुणवत्ता में सुधार करता है। यह हमें ज्वलंत मामलों पर अत्यधिक प्रतिक्रिया करने और सांख्यिकीय वास्तविकता पर कम प्रतिक्रिया करने से रोकता है।
    when_to_use:
      - निर्णय_लेना
      - जोखिम_मूल्यांकन
      - समस्या_समाधान
      - निवेश
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        निर्णयों में बेस रेट को शामिल नहीं किया जाता है।
      vividness_over_statistics: |
        एकल मामला या कहानी समग्र डेटा पर हावी होती है।
      diagnostic_overweighting: |
        बेस रेट पर विचार किए बिना नए प्रमाण (जैसे, परीक्षण परिणाम) को अधिक महत्व देना।
      anecdote_override: |
        "मैं किसी ऐसे व्यक्ति को जानता हूं जिसने..." सांख्यिकीय प्रमाण को दरकिनार करता है।
    examples:
      medical: |
        दुर्लभ बीमारी के लिए एक सकारात्मक परीक्षण—बेस रेट कम है, इसलिए एक सकारात्मक अक्सर एक गलत सकारात्मक होता है। हम इसे अनदेखा करते हैं और मानते हैं कि उन्हें बीमारी है।
      hiring: |
        एक उम्मीदवार का साक्षात्कार बहुत अच्छा होता है—हम इस बेस रेट को अनदेखा करते हैं कि साक्षात्कार प्रदर्शन की कितनी अच्छी भविष्यवाणी करते हैं।
      risk: |
        एक विमान दुर्घटना ज्वलंत होती है—हम उड़ान के जोखिम को अधिक महत्व देते हैं और ड्राइविंग जोखिम को कम महत्व देते हैं, बेस रेट को अनदेखा करते हुए।
      startup_investing: |
        एक संस्थापक अच्छा पिच करता है—हम इस बात को अनदेखा करते हैं कि पिच की गुणवत्ता की परवाह किए बिना अधिकांश स्टार्टअप विफल हो जाते हैं।
    real_world_implications: |
      बेस रेट फ़ैलेसी चिकित्सा निर्णयों, कानूनी निर्णयों और व्यावसायिक रणनीति को प्रभावित करती है। यह संसाधनों के गलत आवंटन और खराब जोखिम मूल्यांकन में योगदान करती है। बायेसियन सोच इसे ठीक करती है।
    professional_application:
      networking_and_relationship_building: |
        लोगों का मूल्यांकन करते समय, बेस रेट पर विचार करें: उदा., यह व्यवहार कितनी बार होता है? एक ज्वलंत बातचीत को व्यापक पैटर्न पर हावी न होने दें।
      collaborative_learning_initiative: |
        निर्णय लेते समय, मामले-विशिष्ट प्रमाण को शामिल करने से पहले स्पष्ट रूप से बेस रेट बताएं और विचार करें। टीमों को बायेसियन तर्क में प्रशिक्षित करें।
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        जब बेस रेट अन्यथा सुझाव देते हैं तो मजबूत मामले-विशिष्ट प्रमाण को अनदेखा करना—कभी-कभी व्यक्तिगत मामला ही अपवाद होता है।
      stereotyping: |
        व्यक्तियों के बारे में अनुचित निर्णय लेने के लिए बेस रेट का उपयोग करना।
      false_precision: |
        जब वे मोटे अनुमान होते हैं तो झूठी सटीकता के साथ बेस रेट लागू करना।
      dismissing_individuals: |
        "आंकड़े एक्स कहते हैं" जब आपके सामने वाला व्यक्ति वितरण में फिट नहीं हो सकता है।
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: बेयस प्रमेय
    quick_introduction: |
      बेयस प्रमेय बताता है कि जब आपको नया प्रमाण मिलता है तो किसी परिकल्पना की संभावना को कैसे अपडेट किया जाए। यह इस विचार को औपचारिक बनाता है कि विश्वासों को उस अनुपात में बदलना चाहिए जिस अनुपात में प्रमाण उनका समर्थन करता है - न कि सब कुछ या कुछ भी नहीं, बल्कि धीरे-धीरे।
    one_liner: विश्वासों को उस अनुपात में अपडेट करें जिस अनुपात में प्रमाण उनका समर्थन करता है।
    try_this:
      - अपने पूर्व-विश्वास से शुरुआत करें; पूछें कि यदि आप गलत होते तो प्रमाण की कितनी संभावना होती।
      - धीरे-धीरे अपडेट करें - एक डेटा बिंदु पर 0% से 100% तक न बदलें।
      - वैकल्पिक परिकल्पनाओं पर विचार करें: क्या प्रमाण उन्हें भी फिट करेगा?
    ask_yourself:
      - यह प्रमाण वास्तव में संभावना को कितना बदलता है?
      - क्या मैं अपने विश्वासों को अपडेट कर रहा हूँ, या केवल वही पुष्टि कर रहा हूँ जो मैं पहले से सोचता था?
    in_more_detail: |
      प्रमेय कहता है कि प्रमाण को देखते हुए किसी परिकल्पना की संभावना, परिकल्पना को देखते हुए प्रमाण की संभावना के साथ पूर्व संभावना का गुणनफल होती है, जिसे प्रमाण की संभावना से विभाजित किया जाता है। व्यवहार में: अपने पूर्व विश्वास से शुरुआत करें, देखें कि नया प्रमाण आपकी परिकल्पना बनाम विकल्पों के साथ कितना सुसंगत है, और तदनुसार अपडेट करें।

      बेयसियन सोच पुष्टिकरण पूर्वाग्रह का मुकाबला करती है, जिसमें आपको यह विचार करने की आवश्यकता होती है कि यदि आप गलत होते तो प्रमाण की कितनी संभावना होती। यह संभाव्य तर्क और वैज्ञानिक अद्यतन का आधार है।
    why_this_is_important: |
      बेयसियन सोच अनिश्चितता के तहत निर्णय लेने में सुधार करती है, आपको अत्यधिक आत्मविश्वास से बचने में मदद करती है, और प्रमाण से सीखने के लिए एक ढांचा प्रदान करती है। यह निदान, पूर्वानुमान और अनिश्चितता वाले किसी भी डोमेन के लिए आवश्यक है।
    when_to_use:
      - निर्णय_लेना
      - समस्या_समाधान
      - जोखिम_मूल्यांकन
      - सीखना
    how_can_you_spot_it:
      prior_and_update: |
        आधारभूत विश्वास से शुरुआत करना और नए प्रमाण के आधार पर उसे समायोजित करना।
      likelihood_ratio_thinking: |
        यह पूछना "यदि मैं सही हूँ बनाम गलत हूँ तो इस प्रमाण की कितनी संभावना है?"
      incremental_updating: |
        विश्वास धीरे-धीरे प्रमाण के साथ बदलते हैं न कि अचानक पलटते हैं।
      base_rate_respect: |
        पूर्व संभावनाएं (आधार दरें) मायने रखती हैं, न कि केवल नवीनतम डेटा बिंदु।
    examples:
      medical_diagnosis: |
        दुर्लभ बीमारी के लिए एक सकारात्मक परीक्षण - पूर्व-संभावना (कम प्रसार) का मतलब है कि एक सकारात्मक परिणाम अक्सर एक गलत सकारात्मक होता है। बेयस संभावना को अपडेट करता है।
      forecasting: |
        प्रारंभिक अनुमानों से चिपके रहने के बजाय, नए डेटा के आगमन के साथ भविष्यवाणियों को अपडेट करना।
      hiring: |
        भूमिका उपयुक्तता के लिए आधार दरों से शुरुआत करना, फिर साक्षात्कार प्रदर्शन के आधार पर अपडेट करना।
      investing: |
        जैसे-जैसे नई जानकारी (कमाई, समाचार) आती है, किसी कंपनी के सफल होने की संभावना को अपडेट करना।
    real_world_implications: |
      बेयसियन सोच आधुनिक एआई, चिकित्सा निदान और वैज्ञानिक अनुमान का आधार है। यह आधार दर उपेक्षा और पुष्टिकरण पूर्वाग्रह को ठीक करती है। यह अनिश्चितता वाले किसी भी डोमेन के लिए एक शक्तिशाली उपकरण है।
    professional_application:
      networking_and_relationship_building: |
        स्थिर पहले प्रभाव रखने के बजाय, नए प्रमाणों के आधार पर लोगों के बारे में अपने विश्वासों को अपडेट करें। कार्यों की व्याख्या करते समय आधार दरों (जैसे, यह व्यवहार कितना आम है?) पर विचार करें।
      collaborative_learning_initiative: |
        चर्चाओं से पहले स्पष्ट रूप से पूर्व-विश्वासों को बताने के लिए टीमों को प्रोत्साहित करें, फिर प्रमाण प्रस्तुत किए जाने पर अपडेट करें। एंकरिंग और पुष्टिकरण पूर्वाग्रह को कम करता है।
    how_can_this_be_misapplied:
      overprecision: |
        जब अनिश्चितता अधिक हो तो सटीक संभावनाएं निर्दिष्ट करना।
      prior_rigidity: |
        मजबूत पूर्व-विश्वासों से चिपके रहना और नए प्रमाण के साथ पर्याप्त रूप से अपडेट न करना।
      base_rate_tyranny: |
        आधार दरों का सुझाव देने के कारण मजबूत प्रमाणों को अनदेखा करना - कभी-कभी प्रमाण हावी होना चाहिए।
      false_sophistication: |
        वास्तविक तर्क किए बिना कठोर लगने के लिए बेयसियन भाषा का उपयोग करना।
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: बेन फ्रैंकलिन प्रभाव
    quick_introduction: |
      बेन फ्रैंकलिन प्रभाव वह मनोवैज्ञानिक घटना है जिसके द्वारा लोग किसी के लिए उपकार करने के बाद उसे अधिक पसंद करने लगते हैं। इस सहज ज्ञान के विपरीत कि हम उन लोगों के लिए उपकार करते हैं जिन्हें हम पसंद करते हैं, हम अक्सर उन लोगों को पसंद करने लगते हैं जिनके लिए हमने उपकार किया है।
    one_liner: हम उन लोगों को पसंद करने लगते हैं जिनके लिए हमने उपकार किया है—हमारे रवैये हमारे कार्यों का अनुसरण करते हैं।
    try_this:
      - यदि आप किसी रिश्ते को बेहतर बनाना चाहते हैं, तो एक छोटा सा उपकार मांगने पर विचार करें।
      - ध्यान दें कि जब आप किसी के लिए उपकार करते हैं तो आपकी भावनाएं उनके प्रति कैसे बदलती हैं।
      - इस बात से अवगत रहें कि दूसरों को आपकी मदद करने के बाद वे आपको अधिक पसंद कर सकते हैं।
    ask_yourself:
      - क्या किसी के लिए उपकार करने से मेरे उनके बारे में महसूस करने का तरीका बदला है?
      - क्या मैं उनके प्रति अपने सम्मान को बढ़ाकर अपने प्रयास को तर्कसंगत बना रहा हूँ?
    in_more_detail: |
      बेंजामिन फ्रैंकलिन ने अपने पुस्तकालय से एक दुर्लभ पुस्तक उधार मांगने के द्वारा एक प्रतिद्वंद्वी विधायी को जीतने का प्रसिद्ध वर्णन किया। आदमी के अनुपालन के बाद, फ्रैंकलिन ने एक धन्यवाद नोट के साथ इसे वापस कर दिया। रिश्ते में काफी सुधार हुआ। यह प्रभाव बताता है कि हमारे रवैये हमारे कार्यों का अनुसरण करते हैं: जब हम किसी की मदद करने में प्रयास करते हैं, तो हम उनके प्रति अपने सकारात्मक सम्मान को बढ़ाकर उस प्रयास को तर्कसंगत बनाते हैं।

      संज्ञानात्मक असंगति सिद्धांत इसे समझाता है: जब हम किसी ऐसे व्यक्ति के लिए उपकार करते हैं जिसे हम नापसंद करते हैं या जिसके प्रति तटस्थ महसूस करते हैं, तो हम अपने कार्य (मदद) और अपने दृष्टिकोण (नापसंद) के बीच तनाव का अनुभव करते हैं। उस तनाव को उन्हें अधिक पसंद करके हल करना अक्सर हमारे पूर्वाग्रहों के विरुद्ध कार्य करने को स्वीकार करने से आसान होता है।
    why_this_is_important: |
      बेन फ्रैंकलिन प्रभाव को समझना आपको रणनीतिक रूप से रिश्ते बनाने में मदद करता है और यह पहचानता है कि पिछले उपकारों से आपकी अपनी भावनाओं को कब प्रभावित किया जा सकता है। यह भी बताता है कि किसी रिश्ते को बेहतर बनाने की कोशिश करते समय छोटे उपकार मांगना उन्हें पेश करने से अधिक प्रभावी क्यों हो सकता है।
    when_to_use:
      - संबंध_निर्माण
      - बातचीत
      - नेतृत्व
      - संघर्ष_समाधान
    how_can_you_spot_it:
      liking_after_helping: |
        ध्यान दें कि जब आप किसी के लिए उपकार करने के बाद उनके प्रति अधिक गर्मजोशी महसूस करते हैं, भले ही आपने पहले तटस्थ या नकारात्मक महसूस किया हो।
      others_requesting_small_favors: |
        जब कोई बार-बार छोटी-छोटी मदद मांगता है, तो वे अनजाने में या अनजाने में संबंध बनाने के लिए इस प्रभाव का लाभ उठा सकते हैं।
      attitude_shift_post_investment: |
        किसी की मदद करने में समय या प्रयास का निवेश करने के बाद, यह देखें कि क्या उनके बारे में आपकी राय सकारात्मक रूप से बदली है।
      reciprocal_relationship_dynamics: |
        ऐसे रिश्ते जहां एक व्यक्ति ने कई उपकार किए हैं, उन कार्यों में संतुलित दिखाई देने के बावजूद स्नेह में असंतुलित महसूस हो सकते हैं।
    examples:
      networking: |
        किसी सहकर्मी से किसी मसौदे पर प्रतिक्रिया मांगने से, जिससे वे आपकी सफलता में अधिक निवेशित महसूस करते हैं और आपके प्रति अधिक सकारात्मक रूप से झुकते हैं।
      sales: |
        एक सेल्सपर्सन एक संभावित ग्राहक से एक छोटा सा उपकार (जैसे, एक परिचय या परिचय) मांगता है, जिससे ग्राहक की प्रतिबद्धता और पसंद बढ़ जाती है।
      conflict_resolution: |
        असहमति के बाद, दूसरे पक्ष से किसी असंबंधित चीज़ में मदद मांगने से तनाव कम हो सकता है और सद्भावना का पुनर्निर्माण हो सकता है।
      mentoring: |
        जब कोई वरिष्ठ व्यक्ति किसी जूनियर व्यक्ति से इनपुट या मदद मांगता है, तो जूनियर व्यक्ति अक्सर अधिक मूल्यवान और जुड़ा हुआ महसूस करता है।
    real_world_implications: |
      बेन फ्रैंकलिन प्रभाव भर्ती, बिक्री, कूटनीति और रोजमर्रा की सामाजिक गतिशीलता को प्रभावित करता है। इसका उपयोग पुल बनाने के लिए नैतिक रूप से या स्नेह में हेरफेर करने के लिए अनैतिक रूप से किया जा सकता है। इसे पहचानने से आपको यह समझने में मदद मिलती है कि विषम उपकार-देने के बाद कुछ रिश्ते क्यों मजबूत महसूस होते हैं।
    professional_application:
      networking_and_relationship_building: |
        जब रिश्ते बना रहे हों, तो केवल उपकार देने के बजाय, छोटे, उचित उपकार मांगने पर विचार करें। मदद करने का कार्य निवेश और सकारात्मक सम्मान पैदा करता है।
      collaborative_learning_initiative: |
        टीमों में, सदस्यों को एक-दूसरे की मदद करने से (जैसे, सहकर्मी समीक्षा, क्रॉस-प्रशिक्षण) सामंजस्य मजबूत हो सकता है। सहयोग को इस तरह से संरचित करें कि हर कोई मदद दे और प्राप्त करे।
    how_can_this_be_misapplied:
      manipulation: |
        वास्तविक आवश्यकता के बिना, किसी को केवल आपको पसंद कराने के लिए जानबूझकर उपकार मांगना, यदि पता चल जाए तो शोषणकारी महसूस हो सकता है।
      overreliance_on_favors: |
        यह मान लेना कि केवल उपकार टूटे हुए रिश्ते को ठीक कर देंगे; कुछ संघर्षों के लिए प्रत्यक्ष बातचीत और जवाबदेही की आवश्यकता होती है।
      asymmetric_exploitation: |
        प्रतिदान के बिना बार-बार उपकार मांगने से उल्टा असर हो सकता है और नाराजगी पैदा हो सकती है।
      misattributing_motives: |
        किसी की गर्मजोशी को पूरी तरह से वास्तविक मानना ​​जब यह आंशिक रूप से आपके द्वारा किए गए उपकारों का परिणाम हो सकता है।
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: सीमित तर्कसंगतता
    quick_introduction: |
      सीमित तर्कसंगतता यह विचार है कि मानवीय निर्णय-निर्माण उपलब्ध जानकारी, संज्ञानात्मक क्षमता और समय से सीमित होता है। हम अनुकूलन नहीं करते; हम "संतुष्टि" करते हैं - हम सर्वोत्तम संभव विकल्पों के बजाय पर्याप्त अच्छे विकल्प चुनते हैं।
    one_liner: हम संतुष्टि करते हैं - हम सर्वोत्तम नहीं, बल्कि पर्याप्त अच्छा चुनते हैं।
    try_this:
      - जब संभव हो तो विकल्पों को सरल बनाएं; बहुत अधिक विकल्प सीमित तर्कसंगतता को अभिभूत कर देते हैं।
      - अंतहीन खोज से बचने के लिए अग्रिम रूप से "पर्याप्त अच्छे" मानदंड निर्धारित करें।
      - ध्यान दें कि जब आप घटते प्रतिफल के बिंदु से आगे अनुकूलन कर रहे हों।
    ask_yourself:
      - क्या मैं सही विकल्प खोजने की कोशिश कर रहा हूँ जब पर्याप्त अच्छा काम करेगा?
      - मेरे निर्णय को कौन सी बाधाएं (समय, जानकारी, ध्यान) सीमित कर रही हैं?
    in_more_detail: |
      हर्बर्ट साइमन ने पूर्ण जानकारी वाले तर्कसंगत अभिनेताओं की शास्त्रीय आर्थिक धारणा को चुनौती देने के लिए इस अवधारणा को प्रस्तुत किया। वास्तव में, हमारे पास सीमित ध्यान, कार्यशील स्मृति और समय है। हम निर्णय लेने के लिए अनुमानों और शॉर्टकट का उपयोग करते हैं जो हमारी बाधाओं को देखते हुए "तर्कसंगत" होते हैं, भले ही वे आदर्श अर्थ में इष्टतम न हों।

      सीमित तर्कसंगतता बताती है कि हम हमेशा सबसे अच्छा विकल्प क्यों नहीं चुनते, हम अंगूठे के नियमों पर भरोसा क्यों करते हैं, और संदर्भ और फ्रेमिंग क्यों इतने मायने रखते हैं। यह वर्णन करने का एक मॉडल है कि हम वास्तव में निर्णय कैसे लेते हैं, न कि यह एक नुस्खा है कि हमें कैसे लेना चाहिए।
    why_this_is_important: |
      सीमित तर्कसंगतता को समझना आपको बेहतर प्रक्रियाएं डिजाइन करने, दूसरों के लिए विकल्पों को सरल बनाने और निर्णय की गुणवत्ता के लिए यथार्थवादी अपेक्षाएं निर्धारित करने में मदद करता है। यह यह भी बताता है कि "अतार्किक" व्यवहार अक्सर बाधाओं के तहत तर्कसंगत क्यों होता है।
    when_to_use:
      - निर्णय_निर्माण
      - समस्या_समाधान
      - नेतृत्व
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      satisficing_behavior: |
        लोग पूरी तरह से तुलना करने के बजाय पहले स्वीकार्य विकल्प को चुनते हैं।
      heuristic_reliance: |
        निर्णय पूर्ण विश्लेषण के बजाय अंगूठे के नियमों का उपयोग करके किए जाते हैं।
      context_dependence: |
        एक ही व्यक्ति विकल्पों को प्रस्तुत करने के तरीके के आधार पर अलग-अलग विकल्प चुनता है।
      information_overload: |
        जब बहुत अधिक जानकारी उपलब्ध होती है, तो निर्णय की गुणवत्ता कम हो सकती है।
    examples:
      hiring: |
        एक प्रबंधक "सर्वश्रेष्ठ" उम्मीदवार को खोजने के लिए अनिश्चित काल तक साक्षात्कार करने के बजाय, निर्धारित स्तर को पूरा करने वाले पहले उम्मीदवार को नियुक्त करता है।
      consumer_choice: |
        खरीदार स्टोर में हर उत्पाद की तुलना करने के बजाय, शेल्फ पर पहले कुछ विकल्पों में से चुनते हैं।
      policy: |
        मतदाता हर नीति की स्थिति का विश्लेषण करने के बजाय, शॉर्टकट के रूप में पार्टी संबद्धता या कुछ प्रमुख मुद्दों का उपयोग करते हैं।
      daily_routines: |
        लोग हर निर्णय को पुनः अनुकूलित करने के बजाय आदतों और डिफ़ॉल्ट का पालन करते हैं।
    real_world_implications: |
      सीमित तर्कसंगतता बाजारों, नीति डिजाइन और संगठनात्मक व्यवहार को आकार देती है।
      नज (Nudges) और विकल्प वास्तुकला (choice architecture) इसलिए काम करते हैं क्योंकि वे हमारी सीमाओं को ध्यान में रखते हैं। इसे अनदेखा करने से अत्यधिक जटिल प्रणालियाँ बनती हैं जिनका लोग प्रभावी ढंग से उपयोग नहीं कर सकते।
    professional_application:
      networking_and_relationship_building: |
        दूसरों से वास्तविक समय में जटिल व्यापार-बंद (trade-offs) को संसाधित करने की उम्मीद न करें। विकल्पों को सरल बनाएं और स्पष्ट डिफ़ॉल्ट प्रदान करें।
      collaborative_learning_initiative: |
        सीमित तर्कसंगतता के साथ काम करने वाली प्रक्रियाएं डिजाइन करें: विकल्प कम करें, डिफ़ॉल्ट प्रदान करें, और जटिल निर्णयों के लिए चेकलिस्ट का उपयोग करें।
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        ऐसी प्रक्रियाएं डिजाइन करना जो असीमित संज्ञानात्मक क्षमता मानती हैं, जिससे निर्णय थकान और खराब परिणाम होते हैं।
      blaming_irrationality: |
        दूसरों की बाधाओं पर विचार किए बिना उनके विकल्पों को अतार्किक कहकर खारिज करना।
      exploitation: |
        वांछित परिणामों की ओर उन्हें निर्देशित करने के लिए जानबूझकर लोगों को जटिलता से अभिभूत करना।
      perfectionism: |
        अनुकूलित निर्णय की उम्मीद करना जब संतुष्टि अक्सर तर्कसंगत दृष्टिकोण होता है।
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: दर्शक प्रभाव
    quick_introduction: |
      दर्शक प्रभाव (Bystander Effect) वह प्रवृत्ति है जिसमें व्यक्तियों के उपस्थित होने पर
      मदद की पेशकश करने की संभावना कम होती है। जितने अधिक दर्शक होंगे, किसी एक व्यक्ति द्वारा
      कार्य करने की संभावना उतनी ही कम होगी। जिम्मेदारी विभाजित हो जाती है; हम मानते हैं कि
      कोई और मदद करेगा।
    one_liner: जितने अधिक लोग उपस्थित होंगे, किसी एक व्यक्ति द्वारा कार्य करने की संभावना उतनी ही कम होगी।
    try_this:
      - आपात स्थितियों में, सीधे जिम्मेदारी सौंपें: आप, 911 पर कॉल करें।
      - यह न मानें कि कोई और मदद करेगा - कार्य करें या स्पष्ट रूप से सौंपें।
      - जब आप दूसरों के पहले कार्य करने की प्रतीक्षा कर रहे हों तो ध्यान दें।
    ask_yourself:
      - क्या मैं जिम्मेदारी को विभाजित कर रहा हूँ क्योंकि दूसरे उपस्थित हैं?
      - क्या मैं अलग तरह से कार्य करूँगा यदि मैं अकेला होता?
    in_more_detail: |
      किटी गेनोवीज़ की हत्या के बाद (हालांकि कहानी को आंशिक रूप से पौराणिक बनाया गया था),
      शोधकर्ताओं ने पाया कि दूसरों की उपस्थिति मदद को कम करती है। हम संकेतों के लिए
      दूसरों की ओर देखते हैं - यदि कोई कार्य नहीं करता है, तो हम इसे "किसी कार्रवाई की आवश्यकता नहीं"
      के रूप में व्याख्या करते हैं। हम जिम्मेदारी के प्रसार का भी अनुभव करते हैं: कई लोग
      उपस्थित होने पर, प्रत्येक व्यक्ति को व्यक्तिगत रूप से कम जिम्मेदार महसूस होता है।
      बहुलतावादी अज्ञानता हो सकती है: हर कोई सोचता है कि कुछ गलत है लेकिन कोई भी कार्य
      नहीं करता क्योंकि कोई और कार्य नहीं कर रहा है।

      यह प्रभाव तब सबसे मजबूत होता है जब स्थिति अस्पष्ट होती है और जब
      दर्शक एक-दूसरे को नहीं जानते हैं। इसे जिम्मेदारी के प्रत्यक्ष असाइनमेंट ("आप, 911 पर
      कॉल करें") द्वारा दूर किया जा सकता है।
    why_this_is_important: |
      दर्शक प्रभाव को समझना आपको तब कार्रवाई करने में मदद करता है जब दूसरे नहीं करते,
      और ऐसे सिस्टम डिजाइन करने में मदद करता है जो इसे दूर करते हैं। यदि आप मुसीबत में हैं,
      तो एक व्यक्ति को लक्षित करें। यदि आप एक दर्शक हैं, तो दूसरों के कार्य करने का इंतजार न करें।
    when_to_use:
      - नेतृत्व
      - संबंध_निर्माण
      - संघर्ष_समाधान
      - निर्णय_निर्माण
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        जब कई लोग उपस्थित हों तो "कोई और कर लेगा"।
      pluralistic_ignorance: |
        हर कोई सोचता है कि कार्रवाई की आवश्यकता है लेकिन कोई भी कार्य नहीं करता क्योंकि
        कोई और कार्य नहीं कर रहा है।
      social_proof_inaction: |
        दूसरों द्वारा निष्क्रियता को "किसी कार्रवाई की आवश्यकता नहीं" के रूप में व्याख्या किया जाता है।
      audience_inhibition: |
        बेवकूफ दिखने या अत्यधिक प्रतिक्रिया करने का डर कार्रवाई को रोकता है।
    examples:
      emergency: |
        एक व्यक्ति गिर जाता है; कई दर्शकों के साथ, प्रत्येक के मदद के लिए कॉल करने की संभावना कम होती है।
      workplace: |
        हर कोई एक समस्या देखता है लेकिन कोई भी उसे नहीं उठाता - प्रत्येक मानता है कि कोई और करेगा।
      harassment: |
        उत्पीड़न के गवाह हस्तक्षेप नहीं करते, प्रत्येक सोचता है
        कि दूसरे कार्य करेंगे।
      meetings: |
        एक बुरे विचार को चुनौती नहीं दी जाती क्योंकि हर कोई मानता है
        कि कोई और बोलेगा।
    real_world_implications: |
      दर्शक प्रभाव के आपात स्थितियों में दुखद परिणाम हो सकते हैं
      और संगठनों में समस्याओं को बने रहने दे सकता है। इसे दूर करने के लिए
      प्रत्यक्ष जिम्मेदारी असाइनमेंट और हस्तक्षेप को प्रोत्साहित करने वाले मानदंडों की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        जब आपको मदद की ज़रूरत हो, तो एक विशिष्ट व्यक्ति से पूछें। जब आप कुछ
        गलत देखें, तो कार्रवाई करें - यह न मानें कि दूसरे करेंगे। ऐसे मानदंड
        बनाएं जहां बोलना अपेक्षित और पुरस्कृत हो।
      collaborative_learning_initiative: |
        लोगों को दर्शक प्रभाव को पहचानने और हस्तक्षेप करने के लिए प्रशिक्षित करें।
        "यदि आप कुछ देखते हैं, तो कुछ कहें" का उपयोग करें और स्पष्ट
        भूमिकाएँ सौंपें। जो पहले बोलते हैं उन्हें पुरस्कृत करें।
    how_can_this_be_misapplied:
      blaming_bystanders: |
        जब प्रभाव एक शक्तिशाली स्थितिजन्य शक्ति है तो व्यक्तियों को कठोरता से आंकना - स्थिति बदलने पर ध्यान केंद्रित करें।
      false_assumption: |
        यह मान लेना कि यदि पर्याप्त लोग उपस्थित हैं तो कोई हमेशा मदद करेगा - अक्सर इसके विपरीत सच होता है।
      overcorrection: |
        हर किसी को जिम्मेदार बनाना ताकि कोई भी जिम्मेदार न हो - प्रसार
        अभी भी हो सकता है।
      individualizing: |
        दर्शक प्रभाव को एक स्थितिजन्य घटना के बजाय एक चरित्र दोष के रूप में मानना।
    related_content:
