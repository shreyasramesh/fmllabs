      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: सक्षमता का दायरा
    quick_introduction: |
      सक्षमता का दायरा एक मानसिक मॉडल है जो आपको अपनी विशेषज्ञता की सीमाओं को जानने और महत्वपूर्ण निर्णय लेते समय उनके भीतर रहने के लिए प्रेरित करता है। वारेन बफेट और चार्ली मंगर इस बात पर जोर देते हैं कि आप क्या नहीं जानते, उसे जानना महत्वपूर्ण है।
    one_liner: अपनी विशेषज्ञता की सीमाओं को जानें - और जब यह मायने रखता है तो उनके भीतर रहें।
    try_this:
      - यह तय करें कि आपके पास वास्तविक विशेषज्ञता कहाँ है बनाम जहाँ आप अंदाज़ा लगा रहे हैं।
      - अपने दायरे से बाहर होने पर, सलाह लें या किसी और को सौंप दें।
      - ईमानदार रहें: क्या कोई सच्चा विशेषज्ञ आपकी इस राय से सहमत होगा?
    ask_yourself:
      - क्या मैं अपनी सक्षमता के दायरे में हूँ, या मैं अंदाज़ा लगा रहा हूँ?
      - इस क्षेत्र में मैंने आखिरी बार "मुझे नहीं पता" कब स्वीकार किया?
    in_more_detail: |
      प्रत्येक व्यक्ति के पास ऐसे क्षेत्र होते हैं जहाँ उनकी वास्तविक विशेषज्ञता होती है - जहाँ वे जानकारी का मूल्यांकन कर सकते हैं, त्रुटियों को पहचान सकते हैं, और विश्वसनीय निर्णय ले सकते हैं। उस दायरे के बाहर, वे किसी भी अन्य व्यक्ति की तरह ही पूर्वाग्रहों और गलतियों के शिकार होते हैं। मुख्य बात ईमानदार आत्म-मूल्यांकन है: आप वास्तव में कहाँ सक्षम हैं, और कहाँ आप अंदाज़ा लगा रहे हैं?

      सचेत सीखने के माध्यम से दायरा बढ़ाया जा सकता है, लेकिन इसकी वर्तमान सीमाओं को पहचानने के लिए विनम्रता की आवश्यकता होती है। अपने दायरे से बाहर काम करने से महंगी त्रुटियों का जोखिम बढ़ जाता है, खासकर जब दांव ऊंचे हों।
    why_this_is_important: |
      अपनी सक्षमता के दायरे में रहने से महंगी गलतियाँ कम होती हैं और निर्णय की गुणवत्ता में सुधार होता है। यह आपको यह जानने में भी मदद करता है कि कब सलाह लेनी है, किसी और को सौंपना है, या पीछे हटना है। अपने दायरे से बाहर अति आत्मविश्वास विफलता का एक प्रमुख स्रोत है।
    when_to_use:
      - निर्णय_लेना
      - निवेश
      - करियर_बदलना
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      honest_boundary_assessment: |
        क्या आप किसी क्षेत्र में अपने ज्ञान की सीमाओं को समझा सकते हैं? क्या आप जानते हैं कि आप क्या नहीं जानते?
      knowing_when_to_defer: |
        उन स्थितियों को पहचानना जहाँ आपको अकेले निर्णय लेने के बजाय विशेषज्ञ की राय लेनी चाहिए।
      consistent_track_record: |
        आपके दायरे में, आपके निर्णय समय के साथ मान्य होते जाते हैं; बाहर, वे नहीं होते।
      calibration: |
        किसी क्षेत्र में आपका आत्मविश्वास उस क्षेत्र में आपके वास्तविक प्रदर्शन से मेल खाता है।
    examples:
      investing: |
        बफेट टेक स्टॉक से बचते हैं क्योंकि उनका कहना है कि वे उनकी सक्षमता के दायरे से बाहर हैं - वह उनका मज़बूती से मूल्यांकन नहीं कर सकते।
      career: |
        एक विशेषज्ञ जो अपने क्षेत्र में रहता है बनाम एक जो असंबंधित क्षेत्र में "मुश्किल" भूमिका निभाता है।
      hiring: |
        यह जानना कि कब अपने निर्णय पर भरोसा करना है बनाम तकनीकी भूमिकाओं के लिए विशेषज्ञों को लाना है।
      advice_giving: |
        अंदाज़ा लगाने के बजाय अपनी विशेषज्ञता से बाहर के विषयों पर राय देने से इनकार करना।
    real_world_implications: |
      सक्षमता का दायरा मूल्य निवेश और पेशेवर सफलता के लिए केंद्रीय है। इसे अनदेखा करने से अति आत्मविश्वास, विफल प्रयास और खराब सलाह मिलती है। दायरे को बढ़ाने के लिए सचेत प्रयास और ईमानदार प्रतिक्रिया की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        ऐसे लोगों के साथ संबंध बनाएं जिनकी सक्षमता का दायरा आपके पूरक हों। जानें कि कब स्वयं उत्तर देने के बजाय दूसरों का परिचय कराना है।
      collaborative_learning_initiative: |
        ओवरलैपिंग और पूरक दायरे वाली टीमें बनाएं। लोगों को अपनी सक्षमता के बाहर काम करते समय झंडा उठाने के लिए प्रोत्साहित करें।
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        कभी भी अपने दायरे से बाहर न निकलने से विकास और सीखना सीमित हो सकता है।
      false_modesty: |
        जवाबदेही या कठिन निर्णय से बचने के लिए एक छोटा दायरा होने का दावा करना।
      gatekeeping: |
        तर्कों में शामिल हुए बिना दूसरों को खारिज करने के लिए "सक्षमता का दायरा" का उपयोग करना।
      stagnation: |
        दायरे को ऐसा मानना ​​जो निश्चित हो, बजाय इसके कि यह प्रयास से बढ़ सकता है।
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: संज्ञानात्मक असंगति
    quick_introduction: |
      संज्ञानात्मक असंगति वह मानसिक असुविधा है जो हमें तब महसूस होती है जब हम विरोधी विश्वास रखते हैं, या जब हमारे कार्य हमारे विश्वासों का खंडन करते हैं। हम इस असुविधा को कम करने के लिए प्रेरित होते हैं - अक्सर अपने कार्यों को बदलने के बजाय अपने विश्वासों को अपने कार्यों से मिलाने के लिए बदलकर।
    one_liner: हम अपने कार्यों को उलट करने की तुलना में अपने विश्वासों को अपने कार्यों से अधिक बार बदलते हैं।
    try_this:
      - ध्यान दें कि आप व्यवहार बदलने के बजाय असुविधा को कम करने के लिए कब तर्क कर रहे हैं।
      - पूछें: क्या मैं जो मैंने किया उसे सही ठहराने के लिए अपने विश्वासों को समायोजित कर रहा हूँ?
      - विचार करें कि विश्वास बदलने की तुलना में कार्य बदलना अधिक ईमानदार होगा या नहीं।
    ask_yourself:
      - क्या मैं तर्क के द्वारा असंगति को कम कर रहा हूँ, या वास्तव में बदलकर?
      - क्या मैं इस विश्वास को रखता अगर मैंने पहले ही इस तरह से कार्य नहीं किया होता?
    in_more_detail: |
      लियोन फेस्टिंगर का सिद्धांत बताता है कि हम संगति चाहते हैं। जब हम अपने मूल्यों के विरुद्ध कार्य करते हैं (जैसे, झूठ बोलना, पैसा बर्बाद करना), तो हम असंगति का अनुभव करते हैं। इसे कम करने के लिए, हम अपने विश्वास को बदल सकते हैं ("यह वास्तव में एक झूठ नहीं था") या कार्रवाई को कम कर सकते हैं ("यह इतना बुरा नहीं था")। हम अक्सर सुधारने के बजाय तर्क करते हैं।

      संज्ञानात्मक असंगति बेन फ्रैंकलिन प्रभाव को बढ़ावा देती है (हमें वे लोग पसंद हैं जिनकी हमने मदद की है), यह बताती है कि हम पिछले निर्णयों को क्यों सही ठहराते हैं, और कई आत्म-धोखे का आधार बनती है। यह विश्वास निर्माण और परिवर्तन में एक शक्तिशाली शक्ति है।
    why_this_is_important: |
      संज्ञानात्मक असंगति को समझने से आपको अपने स्वयं के तर्क को पहचानने में मदद मिलती है और यह समझने में मदद मिलती है कि लोग अपना मन बदलने से क्यों कतराते हैं। यह यह भी बताता है कि प्रतिबद्धता और संगति शक्तिशाली अनुनय सिद्धांत क्यों हैं।
    when_to_use:
      - निर्णय_लेना
      - संबंध_निर्माण
      - नेतृत्व
      - संघर्ष_समाधान
    how_can_you_spot_it:
      post_decision_rationalization: |
        किसी चुनाव के बाद, हम अपने चुनाव के सकारात्मक और अस्वीकृत विकल्पों के नकारात्मक पर जोर देते हैं।
      belief_action_alignment: |
        हम उन कार्यों से मेल खाने के लिए विश्वासों को समायोजित करते हैं जो हम पहले ही ले चुके हैं।
      discomfort_with_inconsistency: |
        जब हम देखते हैं कि हमारा व्यवहार हमारे बताए गए मूल्यों से मेल नहीं खाता है तो बेचैनी।
      resistance_to_disconfirming_evidence: |
        हमारे प्रतिबद्धताओं के साथ टकराव वाली जानकारी को खारिज करना या कम करना।
    examples:
      purchase_justification: |
        एक महंगा सामान खरीदने के बाद, हम इसके लाभों पर जोर देते हैं और लागत को कम करते हैं।
      relationship: |
        हम अच्छे पर ध्यान केंद्रित करके और बुरे को कम करके एक बुरे रिश्ते में बने रहने का औचित्य साबित करते हैं।
      career: |
        हम उन कारणों पर जोर देकर उन नौकरियों में बने रहने का औचित्य साबित करते हैं जिनमें हमें नापसंद है "हमें रहना है"।
      beliefs: |
        जब हमारे कार्य हमारे मूल्यों का खंडन करते हैं, तो हम अपने कार्यों के बजाय अपने मूल्यों को बदलते हैं ("मैं वास्तव में शाकाहारी नहीं हूँ - मैं बस कभी-कभी मांस खाता हूँ")।
    real_world_implications: |
      संज्ञानात्मक असंगति विश्वास निर्माण, उपभोक्ता व्यवहार और राजनीतिक दृष्टिकोण को आकार देती है। यह बताती है कि लोग खराब फैसलों के बाद क्यों दोगुना कर देते हैं और व्यवहार बदलने से विश्वास क्यों बदल सकता है।
    professional_application:
      networking_and_relationship_building: |
        छोटी प्रतिबद्धताएं बड़ी प्रतिबद्धताओं को जन्म दे सकती हैं - लोग अपने पिछले कार्यों का औचित्य साबित करते हैं। इसका नैतिक रूप से उपयोग करें: छोटे अनुरोधों से शुरुआत करें। जब आप अपने स्वयं के व्यवहार का औचित्य साबित कर रहे हों तो सचेत रहें।
      collaborative_learning_initiative: |
        जब परिवर्तन का परिचय दे रहे हों, तो शुरुआती समर्थन और छोटी प्रतिबद्धताएं प्राप्त करें - वे असंगति पैदा करते हैं जो बड़े पैमाने पर अपनाने को प्रेरित करती है। सार्वजनिक प्रतिबद्धताओं को मजबूर करने से बचें जो नाराजगी पैदा करती हैं।
    how_can_this_be_misapplied:
      manipulation: |
        अनुपालन के लिए लोगों पर दबाव डालने के लिए जानबूझकर असंगति पैदा करना।
      dismissing_genuine_change: |
        यह मान लेना कि सभी विश्वास परिवर्तन तर्कसंगत हैं जब लोग कभी-कभी वास्तव में अपडेट करते हैं।
      forced_consistency: |
        लोगों को "सुसंगत" होने के लिए मजबूर करना जब उनके विचारों ने वैध रूप से विकसित किया है।
      self_deception: |
        अपने बारे में असहज सत्यों से बचने के औचित्य के लिए असंगति सिद्धांत का उपयोग करना।
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: पुष्टि पूर्वाग्रह
    quick_introduction: |
      पुष्टि पूर्वाग्रह (Confirmation bias) वह प्रवृत्ति है जिसमें हम अपनी मौजूदा मान्यताओं की पुष्टि करने वाले जानकारी को खोजने, व्याख्या करने और याद रखने की ओर झुकते हैं। हम सहायक साक्ष्यों को अधिक महत्व देते हैं और उन साक्ष्यों को कम आंकते हैं या खारिज कर देते हैं जो हमारे विचारों का खंडन करते हैं। हम अपनी परिकल्पनाओं का परीक्षण करने के बजाय उनकी पुष्टि करने वाले प्रश्न पूछते हैं।
    one_liner: हम अपनी मान्यताओं की पुष्टि करने वाली चीजों को खोजते और याद रखते हैं; हम उनका खंडन करने वाली चीजों को कम आंकते हैं।
    try_this:
      - पूछें: मुझे क्या गलत साबित कर सकता है? सक्रिय रूप से खंडन करने वाले साक्ष्य खोजें।
      - ध्यान दें कि आप सहायक जानकारी को खंडन करने वाली जानकारी की तुलना में अधिक महत्व कब दे रहे हैं।
      - अपने दृष्टिकोण जितना ही गंभीरता से विपरीत दृष्टिकोण पर विचार करें।
    ask_yourself:
      - क्या मैं अपनी परिकल्पना का परीक्षण कर रहा हूँ या सिर्फ उसकी पुष्टि कर रहा हूँ?
      - मैंने पिछली बार नए साक्ष्य के आधार पर अपना विचार कब बदला था?
    in_more_detail: |
      हम जानकारी के तटस्थ संसाधक नहीं हैं। हम पुष्टि की तलाश करते हैं, अस्पष्टता को समर्थन के रूप में व्याख्या करते हैं, और भूलों की तुलना में सफलताओं को अधिक याद रखते हैं। हम स्वयं को समान विचारधारा वाले लोगों और मीडिया से घेर लेते हैं। हम "मैं सही क्यों हूँ?" पूछते हैं, बजाय इसके कि "क्या मुझे गलत साबित करेगा?" यह हमें अति आत्मविश्वास और अपडेट होने में धीमा बना देता है।

      पुष्टि पूर्वाग्रह सबसे व्यापक और अच्छी तरह से प्रलेखित पूर्वाग्रहों में से एक है। यह विज्ञान, राजनीति, रिश्तों और व्यवसाय को प्रभावित करता है। इस पर काबू पाने के लिए जानबूझकर प्रयास और संरचित प्रक्रियाओं की आवश्यकता होती है।
    why_this_is_important: |
      अच्छे निर्णय लेने और सीखने के लिए पुष्टि पूर्वाग्रह को पहचानना आवश्यक है। यह आपको खंडन करने वाले साक्ष्य खोजने, वैकल्पिक परिकल्पनाओं पर विचार करने और जब आवश्यक हो तो अपनी मान्यताओं को अपडेट करने में मदद करता है। यह वैज्ञानिक सोच की नींव है।
    when_to_use:
      - निर्णय_लेना
      - सीखना
      - समस्या_समाधान
      - जोखिम_आकलन
    how_can_you_spot_it:
      seeking_support: |
        अपने दृष्टिकोण का परीक्षण करने के बजाय पुष्टि करने वाले साक्ष्य खोजना।
      asymmetric_interpretation: |
        अस्पष्ट साक्ष्य की व्याख्या अपने पक्ष में समर्थन के रूप में करना।
      discounting_disconfirming: |
        उन साक्ष्यों को खारिज करना या कम आंकना जो आपकी मान्यताओं का खंडन करते हैं।
      selective_exposure: |
        केवल उन स्रोतों से जानकारी का उपभोग करना जिनसे आप सहमत हैं।
    examples:
      hiring: |
        किसी उम्मीदवार के बारे में प्रारंभिक सकारात्मक राय बनाना और फिर यह पुष्टि करने वाले प्रश्न पूछना कि उम्मीदवार बहुत अच्छा है।
      investing: |
        किसी स्टॉक को खरीदने के बाद, सकारात्मक समाचार खोजना और नकारात्मक विश्लेषण को खारिज करना।
      relationships: |
        किसी साथी के कार्यों की व्याख्या इस तरह से करना जो उनके बारे में आपके दृष्टिकोण (अच्छा या बुरा) की पुष्टि करे।
      politics: |
        अपने पक्ष की जानकारी को आलोचना के बिना स्वीकार करना और दूसरे पक्ष की समान जानकारी को अस्वीकार करना।
    real_world_implications: |
      पुष्टि पूर्वाग्रह झूठी मान्यताओं को बनाए रखता है, ध्रुवीकरण को बढ़ाता है, और महंगा गलतियाँ कराता है। यह अच्छी विज्ञान और अच्छे निर्णय लेने का दुश्मन है। इस पर काबू पाने के लिए जानबूझकर खंडन की तलाश की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        लोगों के बारे में राय बनाते समय, जानबूझकर खंडन करने वाले साक्ष्य खोजें। पूछें "क्या मेरी राय बदल देगा?" और उसे खोजें।
      collaborative_learning_initiative: |
        विपरीत दृष्टिकोणों को सामने लाने के लिए शैतान के वकील (devil's advocate), रेड टीम (red teams), और प्री-मॉर्टेम (pre-mortems) का उपयोग करें। अच्छे साक्ष्य के साथ प्रचलित विचारों को चुनौती देने वाले लोगों को पुरस्कृत करें।
    how_can_this_be_misapplied:
      false_balance: |
        जब साक्ष्य एक पक्ष का पुरजोर समर्थन करते हैं, तो सभी विचारों को समान रूप से वैध मानना।
      excessive_skepticism: |
        सभी साक्ष्यों को "पुष्टि पूर्वाग्रह" कहकर खारिज कर देना, जब कुछ मान्यताएं अच्छी तरह से समर्थित हों।
      contrarianism: |
        पुष्टि पूर्वाग्रह से बचने के लिए केवल विपरीत दृष्टिकोण अपनाना - जब मूल दृष्टिकोण सही हो सकता है।
      analysis_paralysis: |
        कभी भी किसी दृष्टिकोण के प्रति प्रतिबद्ध न होना क्योंकि "हम पक्षपाती हो सकते हैं।"
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: ज्ञान का अभिशाप
    quick_introduction: |
      ज्ञान का अभिशाप यह है कि एक बार जब आप कुछ जान जाते हैं, तो यह कल्पना करना मुश्किल हो जाता है कि उसे न जानना कैसा होता है। विशेषज्ञ शुरुआती लोगों को सिखाने में संघर्ष करते हैं क्योंकि वे शुरुआती के दृष्टिकोण को फिर से नहीं बना सकते। एक बार जब आप जान जाते हैं, तो आप भूल जाते हैं कि न जानना कैसा होता था।
    one_liner: एक बार जब आप कुछ जान जाते हैं, तो आप भूल जाते हैं कि न जानना कैसा होता था।
    try_this:
      - समझाते समय, पहले सिद्धांतों से शुरू करें—मान लें कि आपके दर्शक कुछ नहीं जानते।
      - किसी शुरुआती से वापस समझाने के लिए कहें; उनकी उलझन आपके अंधे धब्बे प्रकट करती है।
      - ध्यान दें कि आप कदम छोड़ रहे हैं या ऐसे शब्दजाल का उपयोग कर रहे हैं जिन्हें दूसरे नहीं जान सकते।
    ask_yourself:
      - क्या मैं यह मान रहा हूं कि दूसरों के पास वही संदर्भ है जो मेरे पास है?
      - क्या मेरी पृष्ठभूमि के बिना कोई इसे समझेगा?
    in_more_detail: |
      एक क्लासिक प्रयोग में, पहेली का उत्तर जानने वाले लोगों ने एक गीत की लय को टैप किया और दूसरों से उसका अनुमान लगाने की उम्मीद की—उन्होंने स्पष्टता को बढ़ा-चढ़ाकर बताया। टैप करने वाले अपने सिर में गीत को "अन-हियर" नहीं कर सकते थे। ज्ञान "चिपचिपा" होता है; अज्ञानता का अनुकरण करना कठिन होता है।

      यह अभिशाप शिक्षण, संचार, उत्पाद डिजाइन और नेतृत्व को प्रभावित करता है। हम यह मान लेते हैं कि दूसरों के पास वही संदर्भ है जो हमारे पास है। हम शब्दजाल का उपयोग करते हैं। हम कदम छोड़ देते हैं। हम आश्चर्यचकित होते हैं जब लोग "समझ नहीं पाते"।
    why_this_is_important: |
      ज्ञान के अभिशाप को पहचानना शिक्षण, संचार और उत्पाद डिजाइन में सुधार करता है। यह आपको लोगों से वहां मिलने में मदद करता है न कि जहां आप हैं। यह प्रभावी ज्ञान हस्तांतरण के लिए आवश्यक है।
    when_to_use:
      - सीखना
      - नेतृत्व
      - समस्या_समाधान
      - संबंध_निर्माण
    how_can_you_spot_it:
      obvious_to_you: |
        "यह स्पष्ट है" जब यह केवल इसलिए स्पष्ट है क्योंकि आप उत्तर जानते हैं।
      jargon_use: |
        ऐसे शब्दों का उपयोग करना जिन्हें दर्शक परिभाषित किए बिना नहीं जानते।
      skipped_steps: |
        यह मान लेना कि दूसरे जो आपने छोड़ा है उसे भर देंगे।
      frustration_with_learners: |
        "वे इसे क्यों नहीं देख सकते?" जब उनके पास आपका संदर्भ नहीं होता।
    examples:
      teaching: |
        एक गणित के प्रोफेसर ऐसे कदम छोड़ देते हैं जो उनके लिए "स्पष्ट" होते हैं लेकिन छात्रों के लिए आवश्यक होते हैं।
      product_design: |
        डिजाइनर ऐसे इंटरफेस बनाते हैं जो उन्हें समझ में आते हैं लेकिन नए उपयोगकर्ताओं को भ्रमित करते हैं।
      onboarding: |
        अनुभवी कर्मचारी भूल जाते हैं कि नए लोगों को क्या नहीं पता है और अपर्याप्त प्रशिक्षण प्रदान करते हैं।
      writing: |
        लेखक यह मान लेते हैं कि पाठकों के पास वही पृष्ठभूमि है और आवश्यक संदर्भ छूट जाते हैं।
    real_world_implications: |
      ज्ञान का अभिशाप संचार अंतराल, असफल उत्पाद और अप्रभावी शिक्षण बनाता है। यह एक कारण है कि विशेषज्ञ खराब शिक्षक हो सकते हैं। इस पर काबू पाने के लिए दर्शकों के दृष्टिकोण को अपनाने के लिए जानबूझकर प्रयास की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        समझाते समय, दूसरे व्यक्ति के स्तर से शुरू करें। पूछें "वे पहले से क्या जानते हैं?" किसी ऐसे व्यक्ति के साथ अपने संचार का परीक्षण करें जिसके पास आपकी पृष्ठभूमि नहीं है।
      collaborative_learning_initiative: |
        "मुझे पांच साल के बच्चे की तरह समझाओ" व्यायाम का प्रयोग करें। विशेषज्ञों को शुरुआती लोगों को सिखाने दें और प्रतिक्रिया प्राप्त करें। ऐसे दस्तावेज बनाएं जो किसी पूर्व ज्ञान को न मानें। सहकर्मी शिक्षण बनाएं—जिन्होंने हाल ही में सीखा है वे शुरुआती के दृष्टिकोण को याद रखते हैं।
    how_can_this_be_misapplied:
      oversimplification: |
        गलतता या अवमानना ​​की हद तक सरलीकरण करना।
      false_assumption: |
        यह मान लेना कि दूसरे जितना वे करते हैं उससे कम जानते हैं—यह भी एक अंशांकन की विफलता है।
      one_size_fits_all: |
        सभी दर्शकों को समान स्तर की व्याख्या की आवश्यकता नहीं होती है; दर्शकों के अनुरूप बनाएं।
      avoiding_complexity: |
        कुछ विषय जटिल होते हैं; ज्ञान का अभिशाप का मतलब यह नहीं है कि हमें कभी भी तकनीकी भाषा का उपयोग नहीं करना चाहिए जब वह उपयुक्त हो।
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: डिफ़ॉल्ट प्रभाव
    quick_introduction: |
      डिफ़ॉल्ट प्रभाव विकल्पों के प्रस्तुत होने पर पूर्व-चयनित विकल्प को चुनने की प्रवृत्ति है।
      जो कुछ भी डिफ़ॉल्ट के रूप में सेट किया गया है, उसका एक मजबूत लाभ होता है—
      लोग अक्सर उसी पर टिके रहते हैं, चाहे वह उनके लिए सर्वोत्तम हो या नहीं।
    one_liner: जो कुछ भी डिफ़ॉल्ट के रूप में सेट किया गया है, उसका एक मजबूत लाभ है—हम उसी पर टिके रहते हैं।
    try_this:
      - वैकल्पिक विकल्पों का मूल्यांकन किए बिना डिफ़ॉल्ट को स्वीकार करते समय ध्यान दें।
      - विकल्प डिज़ाइन करते समय, ऐसे डिफ़ॉल्ट सेट करें जो उपयोगकर्ताओं के सर्वोत्तम हितों की सेवा करें।
      - पूछें: क्या मैं इसे चुनूँगा यदि यह पूर्व-चयनित न होता?
    ask_yourself:
      - क्या मैं निष्क्रियता के कारण डिफ़ॉल्ट चुन रहा हूँ, या इसलिए कि यह मेरे लिए सबसे अच्छा है?
      - इस डिफ़ॉल्ट को किसने सेट किया, और इससे उन्हें क्या लाभ हो सकता है?
    in_more_detail: |
      डिफ़ॉल्ट जड़ता, हानि से बचाव (बदलना डिफ़ॉल्ट खोने जैसा लगता है), और निहित समर्थन (हम मानते हैं कि डिफ़ॉल्ट की अनुशंसा की गई है) के कारण काम करते हैं।
      अंगदान की दरें देश-दर-देश बहुत भिन्न होती हैं, जो काफी हद तक इस बात पर निर्भर करती हैं कि डिफ़ॉल्ट ऑप्ट-इन है या ऑप्ट-आउट।
      जब नामांकन स्वचालित होता है तो सेवानिवृत्ति बचत की भागीदारी बढ़ जाती है।

      डिफ़ॉल्ट का उपयोग अच्छे के लिए (बेहतर परिणामों की ओर झुकाव) या हेरफेर के लिए किया जा सकता है
      (पूर्व-जाँच किए गए बक्सों में प्रतिकूल नियमों को छिपाना)। प्रभाव को समझने से आपको बेहतर सिस्टम डिज़ाइन करने और अवांछित डिफ़ॉल्ट का विरोध करने में मदद मिलती है।
    why_this_is_important: |
      डिफ़ॉल्ट प्रभाव को समझने से आपको चॉइस आर्किटेक्चर को डिज़ाइन करने में मदद मिलती है जो परिणामों में सुधार करता है, और यह पहचानने में मदद करता है कि आपके विकल्प जानबूझकर पसंद के बजाय डिफ़ॉल्ट द्वारा आकार दिए जा रहे हैं।
    when_to_use:
      - निर्णय_निर्माण
      - नेतृत्व
      - समस्या_समाधान
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      inertia_toward_default: |
        अधिकांश लोग जो कुछ भी पूर्व-चयनित है, उस पर टिके रहते हैं।
      implied_recommendation: |
        हम डिफ़ॉल्ट को "वे जो चाहते हैं कि हम चुनें" के रूप में व्याख्या करते हैं।
      opt_in_vs_opt_out: |
        फ़्रेमिंग भागीदारी को बहुत बदल देती है (ऑप्ट-इन बनाम ऑप्ट-आउट)।
      pre_checked_boxes: |
        पूर्व-चयनित विकल्पों का फ़ॉर्म और सेटिंग्स में एक मजबूत लाभ होता है।
    examples:
      organ_donation: |
        ऑप्ट-आउट देशों में ऑप्ट-इन देशों की तुलना में बहुत अधिक दान दरें हैं—
        डिफ़ॉल्ट दृष्टिकोणों से अधिक महत्वपूर्ण है।
      retirement_savings: |
        स्वचालित नामांकन 401(k) भागीदारी को बहुत बढ़ाता है।
      software_installers: |
        "अनुशंसित" विकल्प और पूर्व-जाँच किए गए ऐड-ऑन तय करते हैं कि उपयोगकर्ता क्या इंस्टॉल करते हैं।
      subscriptions: |
        मुफ़्त परीक्षण जो भुगतान नामांकन के लिए डिफ़ॉल्ट होते हैं, कई लोगों को कैप्चर करते हैं जो सक्रिय रूप से
        सदस्यता लेना नहीं चुनेंगे।
    real_world_implications: |
      डिफ़ॉल्ट प्रभाव सबसे शक्तिशाली धक्कों में से एक है। यह बचत,
      स्वास्थ्य, गोपनीयता और उपभोक्ता व्यवहार को आकार देता है। नैतिक चॉइस आर्किटेक्चर
      परिणामों को बेहतर बनाने के लिए डिफ़ॉल्ट का उपयोग करता है; डार्क पैटर्न उनका शोषण करने के लिए उपयोग करते हैं।
    professional_application:
      networking_and_relationship_building: |
        दूसरों के लिए प्रक्रियाएँ डिज़ाइन करते समय, ऐसे डिफ़ॉल्ट चुनें जो उनके
        हितों की सेवा करें। डार्क पैटर्न से बचें जो मूल्य निकालने के लिए डिफ़ॉल्ट का उपयोग करते हैं।
      collaborative_learning_initiative: |
        टीम प्रथाओं के लिए डिफ़ॉल्ट सेट करें (जैसे, एसिंक्रोनस पर डिफ़ॉल्ट,
        दस्तावेज़ीकरण पर डिफ़ॉल्ट) जो वांछित व्यवहार के साथ संरेखित हों। सही विकल्प
        को आसान विकल्प बनाएँ।
    how_can_this_be_misapplied:
      dark_patterns: |
        लोगों को प्रतिकूल विकल्पों में फँसाने के लिए डिफ़ॉल्ट का उपयोग करना (जैसे, छिपी हुई
        शुल्क, अवांछित सदस्यताएँ)।
      paternalism: |
        सहमति के बिना वास्तविक पसंद को ओवरराइड करने वाले डिफ़ॉल्ट लागू करना।
      manipulation: |
        अवांछित नियमों को डिफ़ॉल्ट में छिपाना और जड़ता पर भरोसा करना।
      one_size_fits_all: |
        यह मानना ​​कि सभी के लिए एक ही डिफ़ॉल्ट सही है, जब प्राथमिकताएँ भिन्न होती हैं।
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: डनिंग-क्रूगर प्रभाव
    quick_introduction: |
      डनिंग-क्रूगर प्रभाव एक संज्ञानात्मक पूर्वाग्रह का वर्णन करता है जहां किसी डोमेन में सीमित ज्ञान या कौशल वाले लोग अपनी क्षमता को अधिक आंकते हैं, जबकि विशेषज्ञ अपनी क्षमता को कम आंकने की प्रवृत्ति रखते हैं। आप जितना कम जानते हैं, उतने ही अधिक आत्मविश्वासी आप हो सकते हैं।
    one_liner: आप जितना कम जानते हैं, उतने ही अधिक आत्मविश्वासी आप हो सकते हैं।
    try_this:
      - नए डोमेन में, यह मान लें कि आप अति-आत्मविश्वासी हैं - प्रतिक्रिया और अंशांकन (calibration) की तलाश करें।
      - जब विशेषज्ञ संदेह व्यक्त करें, तो उसे गंभीरता से लें; वे किनारे के मामलों (edge cases) को जान सकते हैं।
      - ध्यान दें जब किसी क्षेत्र में विशेषज्ञ की तुलना में नौसिखिए अधिक निश्चित हों।
    ask_yourself:
      - क्या मैं "माउंट स्टुपिड की चोटी" पर हूँ या "विनम्रता की घाटी" में?
      - क्या मेरे पास यहाँ अपनी क्षमता का मूल्यांकन करने की मेटा-कॉग्निटिव क्षमता है?
    in_more_detail: |
      डनिंग और क्रूगर के शोध से पता चला है कि अक्षम व्यक्तियों में अपनी अक्षमता को पहचानने की मेटा-कॉग्निटिव क्षमता का अभाव होता है। अपने प्रदर्शन का मूल्यांकन करने के लिए, आपको उन कौशलों की आवश्यकता होती है जो अच्छा प्रदर्शन करने के लिए आवश्यक हैं - इसलिए अकुशल लोग दोगुने नुकसान में हैं: वे खराब प्रदर्शन करते हैं और उन्हें इसका पता नहीं चलता।

      जैसे-जैसे क्षमता बढ़ती है, लोग अक्सर "विनम्रता की घाटी" का अनुभव करते हैं जहाँ वे पहचानते हैं कि वे कितना नहीं जानते हैं। सच्चे विशेषज्ञ कम आत्मविश्वास महसूस कर सकते हैं क्योंकि वे बारीकियों और किनारे के मामलों (edge cases) से अच्छी तरह वाकिफ होते हैं।
    why_this_is_important: |
      डनिंग-क्रूगर प्रभाव को पहचानना आपको अपने आत्मविश्वास को अंशांकित (calibrate) करने, नौसिखियों की राय को अधिक आंकने से बचने और विशेषज्ञ की विनम्रता की सराहना करने में मदद करता है। यह सीखने, भर्ती (hiring) और निर्णय लेने के लिए आवश्यक है।
    when_to_use:
      - सीखना (learning)
      - निर्णय_लेना (decision-making)
      - नेतृत्व (leadership)
      - करियर_गतिविधियां (career_moves)
    how_can_you_spot_it:
      novice_overconfidence: |
        थोड़ा अनुभव वाला कोई व्यक्ति मजबूत, अयोग्य राय व्यक्त करता है।
      expert_underconfidence: |
        उच्च कुशल लोग कम कुशल लोगों की तुलना में अधिक झिझकते हैं और अनिश्चितता व्यक्त करते हैं।
      inability_to_recognize_quality: |
        खराब प्रदर्शन करने वाले अपने डोमेन में अच्छे और बुरे काम के बीच अंतर नहीं कर पाते हैं।
      confidence_competence_mismatch: |
        शुरुआती लोगों के बीच आत्मविश्वास और वास्तविक क्षमता विपरीत रूप से सहसंबंधित होती है।
    examples:
      social_media: |
        किसी विषय के सतही ज्ञान वाले लोग डोमेन विशेषज्ञों के साथ आत्मविश्वास से बहस करते हैं।
      hiring: |
        साक्षात्कार में खराब प्रदर्शन करने वाले उम्मीदवार कभी-कभी अपने प्रदर्शन को उच्च दर देते हैं।
      investing: |
        नए निवेशक शुरुआती जीत के बाद अति-आत्मविश्वासी हो सकते हैं, भाग्य को पहचानने में विफल रहते हैं।
      workplace: |
        जूनियर कर्मचारी पदोन्नति के लिए अपनी तत्परता को अधिक आंक सकते हैं जबकि वरिष्ठ स्वयं पर संदेह करते हैं।
    real_world_implications: |
      डनिंग-क्रूगर प्रभाव शिक्षा, भर्ती, राजनीति और सार्वजनिक प्रवचन को प्रभावित करता है।
      यह बताता है कि क्यों खराब विचारों को बढ़ाया जाता है और क्यों विशेषज्ञों को खारिज किया जा सकता है। व्यक्तिगत और सामूहिक निर्णय लेने के लिए अंशांकन (Calibration) मायने रखता है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई व्यक्ति बहुत आत्मविश्वासी हो, तो विचार करें कि क्या वे डनिंग-क्रूगर क्षेत्र में हो सकते हैं। विविध दृष्टिकोणों की तलाश करें, जिनमें अनिश्चितता व्यक्त करने वाले भी शामिल हों।
      collaborative_learning_initiative: |
        ऐसे संस्कृतियाँ बनाएँ जहाँ अनिश्चितता स्वीकार करने को महत्व दिया जाता है। अंशांकन (calibration) अभ्यासों और प्रतिक्रिया को प्रोत्साहित करें जो लोगों को अपनी क्षमता का सटीक मूल्यांकन करने में मदद करते हैं।
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        यह मानना कि आत्मविश्वासी लोग हमेशा गलत होते हैं; कभी-कभी आत्मविश्वास उचित होता है।
      false_modesty: |
        विशेषज्ञ जो विनम्र दिखने के लिए जानते हैं उससे कम होने का दिखावा करते हैं।
      gatekeeping: |
        तर्कों में संलग्न हुए बिना "विशेषज्ञों" से असहमत होने वाले किसी भी व्यक्ति को खारिज करने के लिए डनिंग-क्रूगर का उपयोग करना।
      self_doubt_paralysis: |
        अपने स्वयं के निर्णय पर कभी भरोसा न करने की सीमा तक अधिक सुधार करना।
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: सहानुभूति अंतर
    quick_introduction: |
      सहानुभूति अंतर वह कठिनाई है जो हमें दूसरों की मानसिक अवस्थाओं को तब समझने या भविष्यवाणी करने में होती है जब हम स्वयं किसी भिन्न अवस्था में होते हैं। जब हम शांत होते हैं, तो हम यह कम आंकते हैं कि जब हम क्रोधित या भूखे होंगे तो कैसा महसूस करेंगे। जब हमारा पेट भरा होता है, तो हम यह कम आंकते हैं कि भूखे होने पर हमें भोजन की कितनी इच्छा होगी।
    one_liner: हम यह कम आंकते हैं कि हम कैसा महसूस करेंगे—और दूसरे कैसा महसूस करेंगे—विभिन्न अवस्थाओं में।
    try_this:
      - शांत होने पर, तनावग्रस्त होने के लिए प्रतिबद्धताएं करें; पूर्व-प्रतिबद्धता करें।
      - उन लोगों को तब न्याय न करें जो उस अवस्था में नहीं हैं जिसमें आप हैं—भूखे, थके हुए, डरे हुए।
      - पूछें: क्या मैं अपनी वर्तमान अवस्था को अपने भविष्य के स्वयं या दूसरों पर थोप रहा हूँ?
    ask_yourself:
      - क्या मैं यह कम आंक रहा हूँ कि मैं एक भिन्न अवस्था में कैसा महसूस करूँगा?
      - क्या मैं इस व्यक्ति को बेहतर समझ पाता यदि मैं उनकी अवस्था में होता?
    in_more_detail: |
      हमें विभिन्न परिस्थितियों में कैसा महसूस होगा—और जब वे उन अवस्थाओं में हों जिनमें हम वर्तमान में नहीं हैं तो दूसरे कैसा महसूस करते हैं—इसकी कल्पना करने में कठिनाई होती है। एक शांत व्यक्ति नशे की लत के खिंचाव को कम आंकता है। एक अच्छी तरह से आराम करने वाला व्यक्ति नींद की कमी के प्रभाव को कम आंकता है। हम अपनी वर्तमान अवस्था को दूसरों और अपने भविष्य के स्वयं पर थोपते हैं।

      सहानुभूति अंतर हमारे भविष्य के स्वयं के लिए (जैसे, जब हम प्रेरित हों तब व्यायाम करने के लिए प्रतिबद्ध होना), दूसरों के लिए किए गए निर्णयों और विभिन्न अवस्थाओं में लोगों को समझने की हमारी क्षमता को प्रभावित करता है।
    why_this_is_important: |
      सहानुभूति अंतर को पहचानना भविष्य के आपके लिए निर्णय लेने, दूसरों के लिए सहानुभूति और अपनी परिवर्तनशीलता को समझने में सुधार करता है। यह बताता है कि हम ऐसी प्रतिबद्धताएं क्यों करते हैं जिन्हें हम पूरा नहीं कर सकते और हम संकट में दूसरों को क्यों गलत समझते हैं।
    when_to_use:
      - निर्णय_लेना
      - संबंध_बनाना
      - नेतृत्व
      - संघर्ष_समाधान
    how_can_you_spot_it:
      current_state_projection: |
        यह मान लेना कि दूसरे वैसा ही महसूस करते हैं जैसा हम अभी करते हैं, या कि भविष्य में हम वैसा ही महसूस करेंगे जैसा हम अभी करते हैं।
      underestimating_emotional_state: |
        "बड़ी बात क्या है?" जब हम उस अवस्था में नहीं होते जिसमें वे हैं।
      commitment_failures: |
        वर्तमान प्रेरणा के आधार पर ऐसे विकल्प चुनना जिन्हें हम प्रेरणा के फीके पड़ने पर पूरा नहीं करेंगे।
      misunderstanding_others: |
        दूसरों के अनुभवों को खारिज करना क्योंकि हम उन्हें अपनी वर्तमान अवस्था से कल्पना नहीं कर सकते।
    examples:
      hunger: |
        पेट भरा होने पर किराने की खरीदारी—हम उससे कम खरीदते हैं जितना हमें भूखे होने पर चाहिए होगा।
      addiction: |
        गैर-नशेड़ी व्यक्ति छोड़ने की कठिनाई को कम आंकते हैं; ठीक हो रहे नशेड़ी लोग जब वे उपयोग कर रहे हों तो खिंचाव को कम आंक सकते हैं।
      conflict: |
        शांत होने पर, हम यह कम आंकते हैं कि हम टकराव के क्षण में कैसी प्रतिक्रिया देंगे।
      motivation: |
        जब हम प्रेरित हों तब सुबह 6 बजे की कक्षा के लिए साइन अप करना—और जब हम सो रहे हों तो न जाना।
    real_world_implications: |
      सहानुभूति अंतर नशे के उपचार, नीति और पारस्परिक समझ को प्रभावित करता है। यह बताता है कि हम ऐसे वादे क्यों करते हैं जिन्हें हम तोड़ते हैं और हम अक्सर दूसरों के दृष्टिकोण को समझने में क्यों विफल रहते हैं। यह सहानुभूति और अच्छे निर्णय लेने में एक बाधा है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई व्यक्ति तनावग्रस्त, क्रोधित या किसी भिन्न अवस्था में हो, तो यह न मानें कि वे वैसे ही तर्क करेंगे जैसे आप करते हैं। उनकी अवस्था की कल्पना करने का प्रयास करें। प्रतिबद्धताएं करते समय, विचार करें कि जब प्रेरणा फीकी पड़ेगी तो आप कैसा महसूस करेंगे।
      collaborative_learning_initiative: |
        योजना बनाते समय, विचार करें कि टीम थकी हुई, दबाव में, या निराश होने पर कैसा महसूस करेगी। उन अवस्थाओं के लिए डिज़ाइन करें, न कि केवल प्रेरित योजना अवस्था के लिए।
    how_can_this_be_misapplied:
      overattribution: |
        सभी गलतफहमी को "सहानुभूति अंतर" बताकर खारिज करना, जब कभी-कभी लोगों के वास्तविक रूप से भिन्न मूल्य होते हैं।
      excusing_behavior: |
        "वे मदद नहीं कर सके—सहानुभूति अंतर" जब लोग अपनी अवस्थाओं को प्रबंधित करने के लिए जिम्मेदार होते हैं।
      false_relativism: |
        यह मान लेना कि हम कभी भी दूसरों को नहीं समझ सकते जब हम प्रयास और अनुभव से सुधार कर सकते हैं।
      self_excuse: |
        अपने स्वयं के वादों को पूरा करने में विफलता को उचित ठहराने के लिए सहानुभूति अंतर का उपयोग करना।
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: अधिक्रम का प्रभाव
    quick_introduction: |
      अधिक्रम का प्रभाव एक ऐसी प्रवृत्ति है जहाँ हम किसी चीज़ को केवल इसलिए अधिक महत्व देते हैं क्योंकि हम उसके मालिक हैं। उसे छोड़ने के लिए हम उतनी अधिक कीमत माँगते हैं, जितनी कीमत हम उसे खरीदने के लिए नहीं चुकाते। स्वामित्व लगाव पैदा करता है जो हमारे मूल्यांकन को विकृत करता है।
    one_liner: हम उस चीज़ को ज़्यादा महत्व देते हैं जो हमारे पास है, उस चीज़ से जो नहीं है - स्वामित्व लगाव पैदा करता है।
    try_this:
      - पूछें: अगर मैं इसका मालिक न होता तो इसे खरीदने के लिए मैं क्या भुगतान करता?
      - बेचते समय, कल्पना करें कि आप खरीद रहे हैं - क्या आप अपनी माँगी हुई कीमत चुकाएँगे?
      - ध्यान दें कि स्वामित्व आपके मूल्यांकन को कब बढ़ा रहा है।
    ask_yourself:
      - क्या मैं इसे इसलिए अधिक महत्व दे रहा हूँ क्योंकि मैं इसका मालिक हूँ?
      - क्या एक तटस्थ खरीदार मेरी कीमत से सहमत होगा?
    in_more_detail: |
      प्रयोगों में, जिन लोगों को बेतरतीब ढंग से एक मग दिया गया था, उन्होंने उसे बेचने के लिए दूसरों द्वारा उसे खरीदने के लिए चुकाने की इच्छा से लगभग दोगुनी राशि की मांग की। केवल स्वामित्व का तथ्य कथित मूल्य को बढ़ाता है। यह नुकसान से बचाव (loss aversion) से संबंधित है - किसी चीज़ को छोड़ना नुकसान जैसा लगता है, और हम नुकसान से बचाव करते हैं। लेकिन प्रभाव इससे परे है: हम अपने स्वामित्व वाली चीज़ों को अपनी पहचान में शामिल करते हैं।

      अधिक्रम का प्रभाव वार्ता, उपभोक्ता व्यवहार और संगठनात्मक परिवर्तन को प्रभावित करता है। यह बताता है कि लोग अपने घरों, अपने विचारों और अपनी वर्तमान भूमिकाओं को क्यों अधिक महत्व देते हैं। यह व्यापार और संक्रमण में घर्षण पैदा करता है।
    why_this_is_important: |
      अधिक्रम के प्रभाव को पहचानना आपको अधिक प्रभावी ढंग से बातचीत करने, क्या रखना है या क्या छोड़ना है, इस बारे में स्पष्ट निर्णय लेने और यह समझने में मदद करता है कि दूसरे अपने पास मौजूद चीज़ों को क्यों अधिक महत्व देते हैं। यह परिवर्तन के प्रति प्रतिरोध को भी बताता है।
    when_to_use:
      - निर्णय_लेना
      - बातचीत
      - निवेश
      - करियर_गतिविधियाँ
    how_can_you_spot_it:
      ownership_premium: |
        "मैं इसे उस कीमत पर नहीं बेचूँगा" जब आप इसे खरीदने के लिए उस कीमत का भुगतान नहीं करेंगे।
      attachment_to_possession: |
        चीज़ों को रखने के बाद उन्हें अधिक महत्व देना।
      resistance_to_trading: |
        व्यापार या आदान-प्रदान करने में अनिच्छा, भले ही यह तर्कसंगत हो।
      overvaluation_of_own_ideas: |
        हमारे विचार, परियोजनाएं, या भूमिकाएं अधिक मूल्यवान महसूस होती हैं क्योंकि वे हमारे हैं।
    examples:
      real_estate: |
        घर के मालिक अक्सर अपने घरों की कीमत अधिक आंकते हैं - वे उन्हें बाजार से अधिक महत्व देते हैं।
      negotiations: |
        विक्रेता खरीदारों द्वारा भुगतान की जाने वाली राशि से अधिक की मांग करते हैं; यह अंतर अधिक्रम प्रभाव को दर्शाता है।
      career: |
        परिवर्तन पर विचार करते समय अपनी वर्तमान नौकरी, कंपनी, या भूमिका को अधिक महत्व देना।
      ideas: |
        "यहाँ आविष्कृत नहीं" (Not invented here) और "मेरा विचार" पूर्वाग्रह - हम जो बनाते हैं या जिसके मालिक हैं, उसे अधिक महत्व देते हैं।
    real_world_implications: |
      अधिक्रम का प्रभाव बाजार में घर्षण पैदा करता है, लाभकारी आदान-प्रदान को धीमा करता है, और परिवर्तन के प्रति प्रतिरोध को बढ़ाता है। यह विलय, पुनर्गठन और व्यक्तिगत संक्रमण को प्रभावित करता है। इसे समझने से बातचीत और परिवर्तन प्रबंधन में सुधार होता है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई व्यक्ति परिवर्तन का विरोध करता है, तो विचार करें कि वे अधिक्रम प्रभाव का अनुभव कर रहे होंगे - वे यथास्थिति को अधिक महत्व देते हैं क्योंकि वे उसके "मालिक" हैं। परिवर्तन को केवल इस आधार पर प्रस्तुत करें कि वे क्या हासिल करेंगे, न कि केवल इस पर कि वे क्या खोएंगे।
      collaborative_learning_initiative: |
        नई प्रक्रियाओं को पेश करते समय, स्वीकार करें कि लोग मौजूदा तरीकों से जुड़े हुए हैं। नई चीज़ों को अपनाने से पहले पुराने को "छोड़ने" के लिए मनोवैज्ञानिक सुरक्षा बनाएँ।
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        कुछ लगाव तर्कसंगत होता है - भावनात्मक मूल्य, बदलने की लागत। सभी प्रतिरोध अधिक्रम प्रभाव नहीं हैं।
      manipulation: |
        उच्च कीमतें निकालने के लिए स्वामित्व की झूठी भावना पैदा करना (जैसे, अधिक्रम को ट्रिगर करने के लिए "मुफ्त में आजमाएं")।
      undervaluing_continuity: |
        यह मानना कि परिवर्तन का सभी प्रतिरोध अतार्किक है, जब निरंतरता का वास्तविक मूल्य होता है।
      cold_rationality: |
        भावनात्मक लगाव को "सिर्फ अधिक्रम प्रभाव" कहकर खारिज करना, जब यह वास्तविक मूल्यों को दर्शाता है।
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: झूठा आम सहमति प्रभाव
    quick_introduction: |
      झूठा आम सहमति प्रभाव (False Consensus Effect) वह प्रवृत्ति है जिसमें हम यह अधिक आंकलन करते हैं कि दूसरे हमारे विश्वासों, दृष्टिकोणों और व्यवहारों से कितना सहमत हैं। हम मानते हैं कि हमारे विचार उनसे अधिक सामान्य हैं जितने वे वास्तव में हैं, और हम यह कल्पना करने में कठिनाई महसूस करते हैं कि तर्कसंगत लोग असहमत हो सकते हैं।
    one_liner: हम अधिक आंकलन करते हैं कि दूसरे हमसे कितना सहमत हैं।
    try_this:
      - सक्रिय रूप से उन लोगों को खोजें जो असहमत हैं—आम सहमति न मानें।
      - शुरू करने से पहले, उन लोगों के साथ परीक्षण करें जो आपकी मान्यताओं को साझा नहीं करते हैं।
      - पूछें: असहमत होने वाला व्यक्ति क्या कहेगा? इसे गंभीरता से लें।
    ask_yourself:
      - क्या मैं मान रहा हूँ कि दूसरे मेरे जैसा सोचते हैं?
      - मुझे आखिरी बार कब किसी के अलग दृष्टिकोण से आश्चर्य हुआ था?
    in_more_detail: |
      जब हम कोई स्थिति रखते हैं, तो हम सोचते हैं कि यह सामान्य है। हम अपने जैसे लोगों से घिरे रहते हैं, पुष्टिकरण करने वाली मीडिया का उपभोग करते हैं, और अस्पष्ट प्रतिक्रियाओं को सहमति के रूप में व्याख्या करते हैं। यह एक इको चैंबर बनाता है जो आम सहमति के भ्रम को मजबूत करता है।

      यह प्रभाव उन गहरी मान्यताओं के लिए अधिक मजबूत होता है और जब हम अपनी स्थिति में बहुत अधिक निवेशित होते हैं। यह तब आश्चर्य का कारण बन सकता है जब दूसरे असहमत होते हैं, बातचीत में कठिनाई होती है, और जब हम ग्राहकों के बारे में सोचते हैं कि वे हमारे जैसे सोचते हैं तो खराब बाजार अनुसंधान होता है।
    why_this_is_important: |
      झूठे आम सहमति प्रभाव को पहचानना आपको वास्तविक असहमति के लिए तैयार होने, बेहतर शोध करने और अधिक प्रभावी ढंग से संवाद करने में मदद करता है। यह उत्पाद विकास, बातचीत और नेतृत्व के लिए आवश्यक है।
    when_to_use:
      - निर्णय-निर्माण
      - बातचीत
      - नेतृत्व
      - समस्या-समाधान
    how_can_you_spot_it:
      surprise_at_disagreement: |
        जब कोई आपके लिए स्पष्ट माने जाने वाली बात से असहमत होता है तो आपको सचमुच झटका लगता है।
      assuming_shared_values: |
        आप बिना जाँच किए ऐसे कार्य करते हैं जैसे कि दूसरे आपकी प्राथमिकताओं को साझा करते हैं।
      underestimating_opposition: |
        आप प्रस्तावों से कम प्रतिरोध की उम्मीद करते हैं जितना वे करते हैं।
      echo_chamber_detection: |
        आपका सामाजिक और सूचना वातावरण शायद ही कभी आपके विचारों को चुनौती देता है।
    examples:
      product_development: |
        एक टीम मान लेती है कि उपयोगकर्ता सुविधा X चाहते हैं क्योंकि टीम के सभी लोग इसे चाहते हैं—केवल कम अपनाना पाते हैं।
      politics: |
        राजनीतिक बुलबुले में लोग उन चुनावी परिणामों से आश्चर्यचकित होते हैं जो उनकी अपेक्षाओं से मेल नहीं खाते।
      negotiation: |
        यह मान लेना कि दूसरा पक्ष शर्तों से सहमत होगा क्योंकि वे आपको "उचित" लगते हैं।
      hiring: |
        "संस्कृति फिट" के लिए भर्ती करने का मतलब उन लोगों को नियुक्त करना हो सकता है जो आपसे सहमत हैं, जिससे झूठा आम सहमति मजबूत होती है।
    real_world_implications: |
      झूठा आम सहमति प्रभाव ध्रुवीकरण, असफल उत्पाद लॉन्च और टूटी हुई बातचीत में योगदान देता है। यह हमें अपनी भविष्यवाणियों में अति-आत्मविश्वासी और असहमति के लिए अप्रस्तुत बनाता है।
    professional_application:
      networking_and_relationship_building: |
        सक्रिय रूप से विभिन्न दृष्टिकोणों वाले लोगों को खोजें। साझा विश्वासों को न मानें—पूछें और सुनें।
      collaborative_learning_initiative: |
        टीमों में, असहमति को महंगा होने से पहले सतह पर लाने के लिए संरचित असहमति (जैसे, "पूर्व-मृत्यु," शैतान का वकील) का उपयोग करें।
    how_can_this_be_misapplied:
      dismissing_dissent: |
        यह मान लेना कि असहमत होने वाले तर्कहीन या अज्ञानी हैं, बजाय इसके कि वे वैध अलग दृष्टिकोण रख सकते हैं, पर विचार करें।
      poor_research: |
        ग्राहक अनुसंधान को छोड़कर क्योंकि "हम पहले से ही जानते हैं कि वे क्या चाहते हैं।"
      overconfidence: |
        यह मानकर कि दूसरे सहमत होंगे, साहसिक दांव लगाना।
      groupthink_amplification: |
        ऐसी टीमें जो झूठे आम सहमति प्रभाव को चुनौती नहीं देती हैं, वे समूह-सोच (groupthink) में गिर सकती हैं।
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: फ़्रेमिंग प्रभाव
    quick_introduction: |
      फ़्रेमिंग प्रभाव हमारे निर्णयों के इस आधार पर बदलने की प्रवृत्ति है कि
      विकल्प कैसे प्रस्तुत किए जाते हैं - भले ही अंतर्निहित तथ्य समान हों। "90%
      उत्तरजीविता" और "10% मृत्यु दर" एक ही परिणाम का वर्णन करते हैं लेकिन अलग-अलग
      चयन उत्पन्न करते हैं। फ़्रेम निर्णय को आकार देता है।
    one_liner: एक ही तथ्य, अलग-अलग फ़्रेम किए गए, अलग-अलग निर्णयों की ओर ले जाते हैं।
    try_this:
      - निर्णय लेने से पहले विकल्पों को कई तरीकों से फ़्रेम करें - लाभ फ़्रेम और हानि फ़्रेम।
      - ध्यान दें कि जब कुछ शब्दों का उपयोग किया जाता है तो आपका चयन कैसे बदलता है।
      - पूछें: फ़्रेम से रहित, अंतर्निहित तथ्य क्या हैं?
    ask_yourself:
      - क्या मैं अलग-अलग निर्णय लूंगा यदि इसे लाभ बनाम हानि के रूप में फ़्रेम किया गया हो?
      - क्या मैं फ़्रेम पर प्रतिक्रिया कर रहा हूं या वास्तविक परिणाम पर?
    in_more_detail: |
      कहनेमन और त्वर्स्की ने दिखाया कि लोग लाभ के रूप में फ़्रेम किए गए विकल्पों के प्रति जोखिम-विवेकशील होते हैं और हानि के रूप में फ़्रेम किए जाने पर जोखिम-चाहने वाले होते हैं - समान परिणामों के लिए भी। सकारात्मक फ़्रेमिंग ("200 लोगों को बचाएं") बनाम नकारात्मक फ़्रेमिंग ("400 की मृत्यु हो जाएगी") वरीयताओं को बदल देती है। हानि फ़्रेम समतुल्य लाभ फ़्रेम की तुलना में अधिक मजबूत भावनात्मक प्रतिक्रियाएँ ट्रिगर करते हैं।

      फ़्रेमिंग प्रभाव चिकित्सा निर्णयों, नीतियों, विपणन और
      बातचीत को प्रभावित करता है। यह सबसे शक्तिशाली और अच्छी तरह से प्रलेखित पूर्वाग्रहों में से एक है।
      जागरूकता मदद करती है, लेकिन इसे पूरी तरह से दूर करना मुश्किल है।
    why_this_is_important: |
      फ़्रेमिंग प्रभाव को पहचानना आपको अधिक सुसंगत निर्णय लेने,
      हेरफेर का विरोध करने और अधिक प्रभावी ढंग से संवाद करने में मदद करता है। यह यह भी समझाता है
      कि क्यों एक ही प्रस्ताव को प्रस्तुति के आधार पर स्वीकार या अस्वीकार किया जा सकता है।
    when_to_use:
      - निर्णय_लेना
      - बातचीत
      - नेतृत्व
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        लाभ बनाम हानि के रूप में फ़्रेम किए गए समान परिणाम से अलग-अलग चयन होते हैं।
      presentation_dependence: |
        जब केवल फ़्रेमिंग बदलती है, सामग्री नहीं, तो निर्णय बदलते हैं।
      default_influence: |
        विकल्पों को कैसे क्रमबद्ध या लेबल किया जाता है, यह चयन को प्रभावित करता है।
      emotional_trigger: |
        कुछ फ़्रेम मजबूत भावनात्मक प्रतिक्रियाओं को ट्रिगर करते हैं।
    examples:
      medical: |
        एक ही प्रक्रिया के लिए "90% उत्तरजीविता" बनाम "10% मृत्यु दर" -
        लोग फ़्रेम के आधार पर अलग-अलग चयन करते हैं।
      sales: |
        "₹50 बचाएं" बनाम "₹50 न गंवाएं" - समतुल्य फ़्रेम, अलग
        मनोवैज्ञानिक प्रभाव।
      policy: |
        "कर राहत" बनाम "सरकारी खर्च" - एक ही नीति, अलग
        राजनीतिक प्रतिक्रिया।
      negotiation: |
        "छूट" बनाम "अधिभार से बचना" के रूप में प्रस्ताव प्रस्तुत करना
        स्वीकृति दरों को बदलता है।
    real_world_implications: |
      फ़्रेमिंग प्रभाव का विज्ञापन, राजनीति और
      बातचीत में फायदा उठाया जाता है। यह चिकित्सा निर्णयों और नीति समर्थन को प्रभावित करता है।
      फ़्रेमिंग बदलने से निर्णय और संचार में सुधार हो सकता है। जागरूक होना
      मदद करता है लेकिन प्रभाव को पूरी तरह से समाप्त नहीं करता है।
    professional_application:
      networking_and_relationship_building: |
        विकल्प प्रस्तुत करते समय, कई फ़्रेमों पर विचार करें। परीक्षण करें कि
        विभिन्न फ़्रेमिंग रिसेप्शन को कैसे प्रभावित करती है। जानकारी प्राप्त करते समय,
        पूछें "इसे और कैसे फ़्रेम किया जा सकता है?"
      collaborative_learning_initiative: |
        निर्णय लेने में, फ़्रेमिंग प्रभावों की जांच के लिए स्पष्ट रूप से विकल्पों को पुनः फ़्रेम करें।
        "यदि हम इसे हानि के रूप में फ़्रेम करते, तो क्या हम अलग निर्णय लेते?" निष्पक्षता के लिए सुसंगत फ़्रेमिंग का उपयोग करें।
    how_can_this_be_misapplied:
      manipulation: |
        अनजाने में लोगों को वांछित परिणामों की ओर मोड़ने के लिए जानबूझकर फ़्रेमिंग करना।
      false_equivalence: |
        यह मानना कि सभी फ़्रेमिंग समान रूप से मान्य हैं जब कुछ महत्वपूर्ण
        जानकारी को अस्पष्ट करते हैं।
      overcorrection: |
        फ़्रेमिंग को पूरी तरह से अनदेखा करना और यह मान लेना कि यह कोई मायने नहीं रखता -
        यह मायने रखता है।
      spin: |
        स्पष्ट करने के बजाय गुमराह करने के लिए फ़्रेमिंग का उपयोग करना।
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: मौलिक आरोपण त्रुटि
    quick_introduction: |
      मौलिक आरोपण त्रुटि दूसरों के व्यवहार को उनके चरित्र या व्यक्तित्व के लिए
      आरोपित करने की प्रवृत्ति है, जबकि अपने स्वयं के व्यवहार को परिस्थितिजन्य
      कारकों के लिए आरोपित करते हैं। हम दूसरों को उनके कार्यों से आंकते हैं और
      स्वयं को अपने इरादों से।
    one_liner: हम दूसरों को उनके कार्यों से, स्वयं को अपने इरादों से आंकते हैं।
    try_this:
      - जब कोई आपको निराश करे, तो पूछें: इस बात को कौन से परिस्थितिजन्य कारक समझा सकते हैं?
      - दूसरों के प्रति वही उदारता बरतें जो आप स्वयं के प्रति बरतते हैं।
      - तब ध्यान दें जब आप दूसरों के व्यवहार को परिस्थिति के बजाय चरित्र के लिए आरोपित कर रहे हों।
    ask_yourself:
      - क्या मैं अपने स्वयं के व्यवहार की उसी तरह व्याख्या करूंगा जैसे मैं उनके व्यवहार की व्याख्या कर रहा हूँ?
      - उनकी परिस्थिति के बारे में मैं क्या चूक सकता हूँ?
    in_more_detail: |
      जब कोई हमें ट्रैफिक में काटता है, तो हम सोचते हैं "कितना बेवकूफ है।" जब हम किसी
      को काटते हैं, तो हम सोचते हैं "मुझे ऐसा करना पड़ा - मुझे जल्दी थी।" हम अपनी
      असफलताओं को परिस्थिति ("ट्रैफिक बहुत खराब था") से और दूसरों की असफलताओं को
      स्वभाव ("वे आलसी हैं") से समझाते हैं। सफलता के लिए इसके विपरीत होता है: हम स्वयं
      को श्रेय देते हैं, हम दूसरों की सफलता को भाग्य के लिए आरोपित करते हैं।

      त्रुटि "मौलिक" है क्योंकि यह व्यापक और लगातार बनी रहती है। यह सहानुभूति को
      कमजोर करती है, संघर्ष को बढ़ावा देती है, और प्रदर्शन मूल्यांकन को विकृत करती है।
    why_this_is_important: |
      मौलिक आरोपण त्रुटि को पहचानने से रिश्ते सुधरते हैं, संघर्ष कम होता है, और
      अधिक निष्पक्ष निर्णय लिए जाते हैं। यह किसी को "एक निश्चित तरीके का" निष्कर्ष
      निकालने से पहले संदर्भ पर विचार करने के लिए प्रोत्साहित करता है।
    when_to_use:
      - संबंध_निर्माण
      - संघर्ष_समाधान
      - नेतृत्व
      - निर्णय_निर्माण
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        दूसरों के व्यवहार की व्याख्या करते समय "वे बस इसी तरह के इंसान हैं"।
      situational_explanation_for_self: |
        अपने स्वयं के व्यवहार की व्याख्या करते समय "मेरे पास कोई विकल्प नहीं था" या
        "परिस्थितियों ने मुझे मजबूर किया"।
      character_vs_context: |
        यह मान लेना कि चरित्र ही कारण है जब परिस्थिति व्यवहार की व्याख्या कर सकती
        है।
      asymmetric_standards: |
        दूसरों पर स्वयं की तुलना में कड़े मानदंड लागू करना।
    examples:
      traffic: |
        दूसरे ड्राइवर की गलती = "बुरा ड्राइवर"। हमारी गलती = "अपरिहार्य परिस्थिति"।
      workplace: |
        एक सहकर्मी की समय सीमा चूकना = "गैर-जिम्मेदार"। हमारी समय सीमा चूकना =
        "बहुत अधिक काम था और कोई भी इससे बेहतर नहीं कर सकता था"।
      politics: |
        विरोधियों के विचार = "वे मूर्ख या दुष्ट हैं"। हमारे विचार = "तथ्यों का तर्कसंगत
        प्रतिक्रिया"।
      performance: |
        दूसरों की सफलता = "किस्मत"। हमारी सफलता = "कड़ी मेहनत से अर्जित"।
    real_world_implications: |
      मौलिक आरोपण त्रुटि संघर्ष को बढ़ावा देती है, टीम वर्क को कमजोर करती है, और
      भर्ती और प्रदर्शन मूल्यांकन को विकृत करती है। इसे ठीक करने से संगठनात्मक
      संस्कृति और व्यक्तिगत रिश्तों में सुधार होता है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई आपको निराश करे, तो यह निष्कर्ष निकालने से पहले कि वे अविश्वसनीय या
        कठिन हैं, "क्या परिस्थितिजन्य कारक इसकी व्याख्या कर सकते हैं?" पूछें।
      collaborative_learning_initiative: |
        प्रतिक्रिया और समीक्षाओं में, "पहले परिस्थिति" व्याख्याओं को प्रोत्साहित करें।
        प्रबंधकों को चरित्र के लिए आरोपित करने से पहले संदर्भ पर विचार करने के लिए
        प्रशिक्षित करें।
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        हर कार्य को "परिस्थितिजन्य" कहकर खारिज करना, जब कुछ व्यवहार वास्तव में
        चरित्र को दर्शाता है।
      no_accountability: |
        इस त्रुटि का उपयोग उन लोगों को जवाबदेह ठहराने से बचने के लिए करना, जिन्होंने
        वास्तव में विकल्प चुने थे।
      self_deprecation: |
        हमेशा खुद को दोष देने और दूसरों की जिम्मेदारी को कभी स्वीकार न करने के लिए
        अति-सुधार करना।
      ignoring_patterns: |
        जब कोई व्यक्ति विभिन्न परिस्थितियों में बार-बार बुरा व्यवहार करता है, तो
        स्वभाव प्रासंगिक हो सकता है।
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: जुआरी का भ्रम (Gambler's Fallacy)
    quick_introduction: |
      जुआरी का भ्रम यह गलत धारणा है कि पिछली स्वतंत्र घटनाएं भविष्य को प्रभावित करती हैं।
      लगातार चित आने के बाद, हम सोचते हैं कि पट "आने वाली" है—भले ही हर उछाल स्वतंत्र हो।
      हम यादृच्छिकता (randomness) में पैटर्न देखते हैं और "सुधार" या "वापसी" की उम्मीद करते हैं
      जब इसकी कोई आवश्यकता नहीं होती।
    one_liner: पिछली स्वतंत्र घटनाएं भविष्य को प्रभावित नहीं करतीं—सिक्के की कोई याददाश्त नहीं होती।
    try_this:
      - जब आप "मैं जीतने वाला हूँ" सोचें, तो पूछें: क्या ये घटनाएं वास्तव में स्वतंत्र हैं?
      - माध्य की ओर वापसी (regression to the mean) (वास्तविक) और जुआरी के भ्रम (झूठा) में अंतर करें।
      - ध्यान दें कि आप यादृच्छिकता में कब पैटर्न देख रहे हैं।
    ask_yourself:
      - क्या मैं यह मान रहा हूँ कि पिछली घटनाएं भविष्य को प्रभावित करेंगी जब वे स्वतंत्र हैं?
      - क्या कोई सांख्यिकीविद (statistician) मेरे "बदलाव की उम्मीद" तर्क से सहमत होगा?
    in_more_detail: |
      एक निष्पक्ष सिक्का उछाल में, प्रत्येक उछाल स्वतंत्र होता है। चित आने की
      संभावना हमेशा 50% होती है, चाहे पिछली घटनाएं कुछ भी हों। लेकिन हमें
      ऐसा महसूस होता है कि एक परिणाम का लंबा दौर दूसरे को अधिक संभावित बनाता है।
      हम बड़ी संख्याओं के नियम (law of large numbers) (कई परीक्षणों में,
      परिणाम औसत हो जाते हैं) को छोटी अवधि के "सुधार" के साथ भ्रमित करते हैं।
      कैसीनो की कोई याददाश्त नहीं होती।

      यह भ्रम जुए, निवेश और रोजमर्रा के निर्णय लेने को प्रभावित करता है।
      हम मानते हैं कि "भाग्य" संतुलित हो जाएगा या हम जीतने वाले हैं।
      कभी-कभी हम सही होते हैं—लेकिन गलत कारणों से।
    why_this_is_important: |
      जुआरी के भ्रम को पहचानना जुए और निवेश में महंगी गलतियों को रोकता है।
      यह आपको छोटी अवधियों की अधिक व्याख्या करने और झूठी वापसी की उम्मीद करने से
      बचने में भी मदद करता है। यह वास्तविक माध्य की ओर वापसी को भ्रम से अलग करता है।
    when_to_use:
      - निर्णय_लेना (decision_making)
      - निवेश (investing)
      - जोखिम_मूल्यांकन (risk_assessment)
      - समस्या_समाधान (problem_solving)
    how_can_you_spot_it:
      due_for_a_change: |
        "हमने इतने सारे नुकसान झेले हैं—हम जीतने वाले हैं।"
      pattern_in_randomness: |
        यादृच्छिक (random) अनुक्रमों में सार्थक पैटर्न देखना।
      hot_hand_fallacy: |
        यह विश्वास करना कि एक स्ट्रीक जारी रहेगी (संबंधित लेकिन विपरीत त्रुटि)।
      independence_ignorance: |
        स्वतंत्र घटनाओं को ऐसे मानना ​​जैसे वे जुड़ी हुई हों।
    examples:
      gambling: |
        रूलेट (roulette) पर कई बार लाल आने के बाद, काला पर दांव लगाना क्योंकि
        "लाल लगातार नहीं आ सकता।"
      investing: |
        "बाजार नीचे रहा है—यह ऊपर जाना ही चाहिए।"
      hiring: |
        "हमने कई खराब उम्मीदवारों को काम पर रखा है—अगला निश्चित रूप से अच्छा होगा।"
      sports: |
        "उसने इतने सारे चूक दिए हैं—वह अगला शॉट लगाने वाला है।"
    real_world_implications: |
      जुआरी का भ्रम जुए में नुकसान और खराब निवेश निर्णय का कारण बनता है।
      यह यह भी बताता है कि हम अल्पावधि पैटर्न की अधिक व्याख्या क्यों करते हैं।
      इसे वास्तविक माध्य की ओर वापसी (जहां वापसी के लिए एक वास्तविक माध्य है) से
      अलग करना महत्वपूर्ण है।
    professional_application:
      networking_and_relationship_building: |
        यह न मानें कि पिछले संबंध की गतिशीलता भविष्य में "ठीक" हो जाएगी—
        प्रत्येक बातचीत कुछ हद तक स्वतंत्र होती है। लेकिन जब कोई वास्तविक अंतर्निहित
        कारण हो तो पैटर्न से सीखें।
      collaborative_learning_initiative: |
        प्रदर्शन का मूल्यांकन करते समय, यादृच्छिक भिन्नता को व्यवस्थित परिवर्तन से
        अलग करें। छोटी अवधियां शोर हो सकती हैं; "स्ट्रीक्स" पर अधिक प्रतिक्रिया न दें
        या झूठी वापसी की उम्मीद न करें।
    how_can_this_be_misapplied:
      ignoring_regression: |
        कभी-कभी माध्य की ओर वापसी वास्तविक होती है (जैसे, कौशल प्रदर्शन)।
        सभी वापसी को जुआरी का भ्रम समझकर खारिज न करें।
      false_independence: |
        यह मानना ​​कि घटनाएं स्वतंत्र हैं जब वे नहीं हैं (जैसे, एक ही चीज़ का बार-बार
        मापन)।
      overcorrection: |
        जब वापसी के लिए कोई वास्तविक माध्य हो तो कभी भी वापसी की उम्मीद न करना।
      dismissing_patterns: |
        कुछ पैटर्न वास्तविक होते हैं—सभी अनुक्रम यादृच्छिक नहीं होते।
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: समूह-सोच
    quick_introduction: |
      समूह-सोच (Groupthink) एकजुट समूहों की वह प्रवृत्ति है जो महत्वपूर्ण मूल्यांकन के बजाय सर्वसम्मति और सामंजस्य को प्राथमिकता देते हैं। सदस्य असहमति को दबाते हैं, आत्म-सेंसर करते हैं, और कथित समूह के विचारों के अनुरूप हो जाते हैं। सर्वसम्मति की इच्छा सर्वोत्तम निर्णय की इच्छा पर हावी हो जाती है।
    one_liner: सत्य पर सामंजस्य—समूह महत्वपूर्ण मूल्यांकन पर सर्वसम्मति को प्राथमिकता देते हैं।
    try_this:
      - एक शैतानी वकील (devil's advocate) नियुक्त करें; असहमति को अपेक्षित और सुरक्षित बनाएं।
      - पूछें: हम क्या नहीं कह रहे हैं? अगर हम इस समूह में नहीं होते तो क्या कहते?
      - समूह के निर्णय को अंतिम रूप देने से पहले बाहरी दृष्टिकोण देखें।
    ask_yourself:
      - क्या मैं सामंजस्य बनाए रखने के लिए आत्म-सेंसर कर रहा हूँ?
      - क्या हमारी सर्वसम्मति वास्तविक है या सहमत होने के दबाव का परिणाम है?
    in_more_detail: |
      इरविंग जैनिस ने विदेश नीति की विफलताओं (बे ऑफ पिग्स, वियतनाम) का अध्ययन किया और पैटर्न की पहचान की: अजेयता का भ्रम, सामूहिक तर्क, अनुरूपता का दबाव, आत्म-सेंसरशिप, सर्वसम्मति का भ्रम, और माइंडगार्ड जो समूह को असहमतिपूर्ण जानकारी से बचाते हैं। उच्च सामंजस्य, अलगाव और तनाव समूह-सोच को बढ़ाते हैं।

      समूह-सोच खराब निर्णयों की ओर ले जाती है क्योंकि विकल्पों पर गंभीरता से विचार नहीं किया जाता है। असहमति को बेवफाई के रूप में देखा जाता है। समूह अपनी शुद्धता का अधिक अनुमान लगाता है और जोखिमों को कम आंकता है।
    why_this_is_important: |
      समूह-सोच को पहचानने से आपको बेहतर निर्णय लेने के लिए परिस्थितियाँ बनाने में मदद मिलती है: असहमति को प्रोत्साहित करें, बाहरी दृष्टिकोण लाएं, और समय से पहले सर्वसम्मति से बचें। यह विनाशकारी समूह विफलताओं से बचने के लिए आवश्यक है।
    when_to_use:
      - नेतृत्व
      - निर्णय_निर्माण
      - समस्या_समाधान
      - संघर्ष_समाधान
    how_can_you_spot_it:
      pressure_for_consensus: |
        असहमति को हतोत्साहित या दंडित किया जाता है; समझौते को पुरस्कृत किया जाता है।
      illusion_of_unanimity: |
        मौन को सहमति के रूप में व्याख्यायित किया जाता है जब यह आत्म-सेंसरशिप हो सकती है।
      collective_rationalization: |
        समूह चेतावनियों को खारिज करता है और अपने विचारों को सुदृढ़ करता है।
      mindguards: |
        सदस्य समूह को उन सूचनाओं से बचाते हैं जो सर्वसम्मति को चुनौती देंगी।
    examples:
      bay_of_pigs: |
        केनेडी के सलाहकारों ने आक्रमण योजना के बारे में संदेह को दबा दिया;
        परिणाम विनाश था।
      corporate_decisions: |
        एक नेतृत्व टीम लाल झंडों के बावजूद विलय के साथ आगे बढ़ती है
        क्योंकि कोई भी असहमति करने वाला नहीं बनना चाहता।
      product_launches: |
        एक टीम एक दोषपूर्ण उत्पाद जारी करती है क्योंकि हर कोई योजना में
        निवेश कर चुका है और कोई चिंता नहीं उठाता है।
      boards: |
        बोर्ड के सदस्य सामंजस्य बनाए रखने के लिए प्रबंधन के प्रस्तावों को
        बिना सोचे-समझे मंजूरी दे देते हैं।
    real_world_implications: |
      समूह-सोच नीति विफलताओं, कॉर्पोरेट आपदाओं और छूटे हुए अवसरों में योगदान करती है। यह विशेष रूप से उच्च-दांव, उच्च-तनाव वाली स्थितियों में खतरनाक है। इसे रोकने के लिए जानबूझकर संरचनात्मक हस्तक्षेप की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        असहमति के लिए मनोवैज्ञानिक सुरक्षा बनाएं। उन लोगों को धन्यवाद दें
        जो चिंताएं उठाते हैं। असहमत हुए बिना असहमत होने का मॉडल बनें।
      collaborative_learning_initiative: |
        शैतानी वकील, रेड टीम और "प्री-मॉर्टेम" का उपयोग करें।
        यह आवश्यक बनाएं कि कोई प्रचलित विचार के विरुद्ध तर्क दे।
        बाहरी दृष्टिकोण लाएं। नेता सबसे अंत में बोलें ताकि एंकरिंग से बचा जा सके।
    how_can_this_be_misapplied:
      false_dissent: |
        "निर्दिष्ट असंतुष्ट" बनाना जो वास्तव में असहमत नहीं होते—
        समूह इसे पहचान लेता है।
      excessive_conflict: |
        विनाशकारी संघर्ष
        और पक्षाघात तक असहमति को प्रोत्साहित करना।
      dismissing_consensus: |
        यह मान लेना कि सभी सर्वसम्मति समूह-सोच है—कभी-कभी समूह
        सही होता है।
      individualism: |
        इतना अधिक अति-सुधार करना कि कोई सामूहिक निर्णय
        संभव न हो।
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: हेलो प्रभाव
    quick_introduction: |
      हेलो प्रभाव एक ऐसा झुकाव है जो किसी व्यक्ति के एक सकारात्मक गुण या छाप को
      हमारे द्वारा उस व्यक्ति के बारे में किए गए समग्र निर्णय को प्रभावित करने देता है।
      अगर हमें किसी की सूरत पसंद आती है, तो हम मान सकते हैं कि वे सक्षम हैं।
      अगर हम किसी एक कौशल की प्रशंसा करते हैं, तो हम मान लेते हैं कि वे हर चीज में अच्छे हैं।
      एक सकारात्मक विशेषता बाकी सब पर एक "हेलो" (चमक) डाल देती है।
    one_liner: एक सकारात्मक विशेषता किसी व्यक्ति के बारे में हमारे पूरे निर्णय पर हेलो डाल देती है।
    try_this:
      - गुणों का स्वतंत्र रूप से मूल्यांकन करें—एक ताकत को दूसरों का संकेत न देने दें।
      - ध्यान दें कि आकर्षण, करिश्मा, या एक सफलता आपके दृष्टिकोण को कैसे रंग रही है।
      - पूछें: क्या मैं उस एक सकारात्मक विशेषता के बिना इस व्यक्ति का उसी तरह मूल्यांकन करूंगा?
    ask_yourself:
      - क्या मैं एक गुण से पूरे व्यक्ति के बारे में सामान्यीकरण कर रहा हूं?
      - क्या मुझे कमजोरियां दिखाई देंगी यदि मैं एक ताकत से प्रभावित न होता?
    in_more_detail: |
      एडवर्ड थॉर्नडाइक ने देखा कि सैन्य अधिकारी जो सैनिकों को एक गुण में उच्च दर्जा देते थे,
      वे उन्हें दूसरों में—यहां तक कि असंबंधित गुणों में भी—उच्च दर्जा देते थे।
      हम विशेष से सामान्य की ओर सामान्यीकरण करते हैं। आकर्षण, करिश्मा, या एक क्षेत्र में सफलता
      एक हेलो बनाती है जो फैल जाती है।

      इसका विपरीत—एक नकारात्मक विशेषता जो सब कुछ रंग देती है—को कभी-कभी "हॉर्न प्रभाव" कहा जाता है।
      दोनों अनुचित सामान्यीकरण के रूप हैं। हेलो प्रभाव भर्ती, प्रदर्शन समीक्षाओं और
      रोजमर्रा की छापों को प्रभावित करता है।
    why_this_is_important: |
      हेलो प्रभाव को पहचानना आपको अधिक सटीक मूल्यांकन करने और अति-सामान्यीकरण से बचने में मदद करता है।
      यह निष्पक्ष भर्ती, प्रदर्शन प्रबंधन और संबंध मूल्यांकन के लिए आवश्यक है।
      एक ताकत सभी ताकतों का संकेत नहीं देती।
    when_to_use:
      - निर्णय_निर्माण
      - नेतृत्व
      - संबंध_निर्माण
      - भर्ती
    how_can_you_spot_it:
      trait_spillover: |
        एक सकारात्मक विशेषता असंबंधित गुणों के निर्णय को प्रभावित करती है।
      attractiveness_bias: |
        आकर्षक लोगों को क्षमता, विश्वसनीयता आदि पर उच्च दर्जा दिया जाता है।
      success_generalization: |
        एक क्षेत्र में सफलता दूसरों में मानी गई क्षमता की ओर ले जाती है।
      first_impression_dominance: |
        प्रारंभिक सकारात्मक छाप सभी बाद के मूल्यांकन को रंग देती है।
    examples:
      hiring: |
        एक ऐसे उम्मीदवार को जिसे स्पष्टवादी और मिलनसार माना जाता है, उसे
        तकनीकी रूप से मजबूत मान लिया जाता है—भले ही कौशल असंबंधित हों।
      performance_reviews: |
        एक उत्कृष्ट परियोजना सभी आयामों में उच्च रेटिंग की ओर ले जाती है।
      politics: |
        एक राजनेता का करिश्मा नीति पर मानी गई क्षमता की ओर ले जाता है।
      branding: |
        एक कंपनी की एक उत्पाद में सफलता सभी उत्पादों की गुणवत्ता मानी जाती है।
    real_world_implications: |
      हेलो प्रभाव भर्ती, प्रदर्शन मूल्यांकन और निवेश निर्णयों को विकृत करता है।
      यह आकर्षक, स्पष्टवादी और पहले से सफल लोगों का पक्ष लेता है।
      इसे कम करने के लिए संरचित मूल्यांकन और आयामों के पृथक्करण की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        समग्र छाप के बजाय विशिष्ट आयामों पर लोगों का मूल्यांकन करें।
        जब एक सकारात्मक विशेषता दूसरों के बारे में आपके निर्णय को प्रभावित कर रही हो तो जागरूक रहें।
        अपुष्ट करने वाले साक्ष्य खोजें।
      collaborative_learning_initiative: |
        साक्षात्कार और मूल्यांकन का उपयोग करें जो आयामों को स्वतंत्र रूप से रेट करते हों।
        मूल्यांकनकर्ताओं के बीच रेटिंग को कैलिब्रेट करें। समग्र "सहज बोध" पर निर्भरता कम करें।
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        हर सकारात्मक छाप हेलो नहीं होती—कभी-कभी लोग वास्तव में आयामों में मजबूत होते हैं।
      false_objectivity: |
        यह मान लेना कि हम हेलो प्रभाव को पूरी तरह से समाप्त कर सकते हैं—यह
        व्यापक और आंशिक रूप से स्वचालित है।
      overcorrection: |
        विपरीत चरम पर जाना और यह मान लेना कि आकर्षक या करिश्माई लोग कम सक्षम हैं।
      stereotyping: |
        वैध सकारात्मक गुणों को खारिज करने के लिए "हेलो प्रभाव" का उपयोग करना।
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: हॅनलॉन का रेज़र
    quick_introduction: |
      हॅनलॉन का रेज़र कहता है: "बुराई को उस चीज़ पर कभी भी मत थोपो जिसे अज्ञानता से समझाया जा सकता है।"
      दूसरे शब्दों में, जब अक्षमता, अनदेखी, या अज्ञानता व्यवहार को समझा सकती है, तो बुरे इरादे का अनुमान न लगाएं।
    one_liner: जब अक्षमता या अनदेखी इसे समझा सकती है तो दुर्भावना का अनुमान न लगाएं।
    try_this:
      - जब कोई आपको निराश करे, तो पूछें: क्या इसे गलती या अज्ञानता से समझाया जा सकता है?
      - बुरे इरादे का अनुमान लगाने से पहले सरल व्याख्या को प्राथमिकता दें।
      - ध्यान दें कि आप "उन्होंने मुझे चोट पहुँचाने का इरादा किया" पर कब कूद रहे हैं।
    ask_yourself:
      - क्या मैं बुराई को उस चीज़ पर थोप रहा हूँ जिसे अज्ञानता से समझाया जा सकता है?
      - क्या मैं उनकी जगह पर खुद के लिए वही संदेह का लाभ चाहूँगा?
    in_more_detail: |
      यह सिद्धांत लोगों को संदेह का लाभ देने के लिए प्रोत्साहित करता है। जब किसी के कार्य आपको नुकसान पहुँचाते हैं या निराश करते हैं,
      तो अक्सर डिफ़ॉल्ट अनुमान यह होता है कि उन्होंने आपको चोट पहुँचाने का इरादा किया था।
      हॅनलॉन का रेज़र बताता है कि ऐसे कई कार्य लापरवाही, जानकारी की कमी, या खराब निष्पादन से उत्पन्न होते हैं - दुर्भावना से नहीं।

      इसका मतलब यह नहीं है कि दुर्भावना कभी मौजूद नहीं होती। इसका मतलब है कि हमें सबसे खराब व्याख्या पर नहीं कूदना चाहिए
      जब कोई सरल व्याख्या फिट बैठती है। यह रेज़र व्यामोह को कम करता है, रिश्तों में सुधार करता है, और हमें समस्याओं पर अधिक रचनात्मक रूप से प्रतिक्रिया करने में मदद करता है।
    why_this_is_important: |
      हॅनलॉन के रेज़र को लागू करने से संघर्ष कम होता है, रिश्ते बनते हैं, और दोषारोपण के बजाय समस्याओं को हल करने पर ऊर्जा केंद्रित होती है।
      यह आपको इस बात का अनुमान लगाने के तनाव से भी बचाता है कि हर कोई आपके खिलाफ है।
    when_to_use:
      - संघर्ष_समाधान
      - नेतृत्व
      - संबंध_निर्माण
      - निर्णय_निर्माण
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        आप तुरंत एक नकारात्मक परिणाम को जानबूझकर नुकसान के रूप में व्याख्या करते हैं।
      personalizing_mistakes: |
        जब कुछ गलत होता है, तो आप मानते हैं कि यह आपके खिलाफ व्यक्तिगत रूप से निर्देशित था।
      ignoring_alternative_explanations: |
        आप अक्षमता, गलत संचार, या अनदेखी को संभावनाओं के रूप में नहीं मानते हैं।
      escalation_before_inquiry: |
        आप पूछते हैं कि क्या हुआ, इससे पहले ही आप क्रोध या प्रतिशोध के साथ प्रतिक्रिया करते हैं।
    examples:
      email_tone: |
        यह मान लेना कि एक संक्षिप्त ईमेल निष्क्रिय-आक्रामक है जब प्रेषक शायद जल्दबाजी में है
        या टोन में बुरा है।
      missed_deadline: |
        किसी सहकर्मी की देर से डिलीवरी को तोड़फोड़ के रूप में व्याख्या करना जब वे अधिक प्रतिबद्ध हो गए हों
        या बाधाओं का सामना किया हो।
      policy_decisions: |
        एक कंपनी नीति जिसे आप नापसंद करते हैं, यह मानते हुए कि इसे कर्मचारियों को नुकसान पहुँचाने के लिए डिज़ाइन किया गया था जब यह एक अलग समस्या को संबोधित करने का एक अनाड़ी प्रयास हो सकता है।
      traffic: |
        यह मान लेना कि किसी अन्य ड्राइवर ने जानबूझकर आपको काटा है जब उन्होंने आपको नहीं देखा हो।
    real_world_implications: |
      हॅनलॉन का रेज़र कार्यस्थल संस्कृति में सुधार करता है, मुकदमों को कम करता है, और संघर्ष समाधान को अधिक प्रभावी बनाता है।
      अति प्रयोग से उपेक्षा हो सकती है; कम प्रयोग से अनावश्यक संघर्ष उत्पन्न होता है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई आपको निराश करे, तो बुरे इरादे का अनुमान लगाने से पहले स्पष्टीकरण मांगें।
        परोपकारी व्याख्याओं पर डिफ़ॉल्ट करके रिश्तों को बनाए रखें।
      collaborative_learning_initiative: |
        टीमों में, एक ऐसी संस्कृति बनाएं जहां गलतियों को साबित होने तक अनजाने में माना जाता है।
        दोष के बजाय सिस्टम और प्रक्रियाओं पर ध्यान केंद्रित करें।
    how_can_this_be_misapplied:
      excusing_negligence: |
        बार-बार होने वाली अक्षमता या लापरवाही को "बुराई नहीं" कहकर खारिज करना जब वह जवाबदेही का वारंट करती हो।
      ignoring_genuine_malice: |
        रेज़र को इतनी सख्ती से लागू करना कि आप वास्तविक बुरे अभिनेताओं या विषाक्त व्यवहार को चूक जाएं।
      avoiding_difficult_conversations: |
        प्रदर्शन के मुद्दों को संबोधित न करने के बहाने के रूप में हॅनलॉन के रेज़र का उपयोग करना।
      gaslighting_victims: |
        किसी ऐसे व्यक्ति को बताना जिसे वास्तव में गलत किया गया था कि वे "बुराई का अनुमान लगा रहे हैं" जब
        बुराई मौजूद थी।
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: हॉथोर्न प्रभाव
    quick_introduction: |
      हॉथोर्न प्रभाव वह प्रवृत्ति है जिसके कारण लोग अपने व्यवहार को तब संशोधित करते हैं
      जब वे जानते हैं कि उनका अवलोकन या अध्ययन किया जा रहा है। अवलोकन का कार्य
      स्वयं परिवर्तन उत्पन्न कर सकता है—परीक्षण किए जा रहे हस्तक्षेप का आवश्यक रूप से नहीं।
      लोग उन्हें मिलने वाले ध्यान पर प्रतिक्रिया करते हैं।
    one_liner: देखे जाने से व्यवहार बदलता है—ध्यान स्वयं प्रभाव उत्पन्न कर सकता है।
    try_this:
      - किसी हस्तक्षेप का मूल्यांकन करते समय, विचार करें कि क्या अवलोकन से परिणाम आ रहे हैं।
      - पहचानें कि ध्यान और मूल्यवान महसूस करने से प्रदर्शन में सुधार हो सकता है।
      - अवलोकन बदलने पर किसी विशिष्ट हस्तक्षेप के कारण होने वाले परिवर्तन का श्रेय देने में सतर्क रहें।
    ask_yourself:
      - क्या यह सुधार हस्तक्षेप से है या देखे जाने से?
      - क्या परिणाम बने रहेंगे यदि हम ध्यान देना बंद कर दें?
    in_more_detail: |
      हॉथोर्न वर्क्स प्लांट में, शोधकर्ताओं ने पाया कि जब उन्होंने रोशनी बदली तो उत्पादकता
      बढ़ गई—और जब उन्होंने इसे वापस बदला तब भी।
      सुधार ध्यान और अवलोकन से आया प्रतीत हुआ, न कि विशिष्ट हस्तक्षेप से।
      बाद के पुन: विश्लेषण से पता चला कि प्रभाव को बढ़ा-चढ़ाकर बताया गया हो सकता है,
      लेकिन यह अवधारणा उपयोगी बनी हुई है: अध्ययन किए जाने से व्यवहार बदलता है।

      हॉथोर्न प्रभाव अनुसंधान और मूल्यांकन को जटिल बनाता है। यह
      हस्तक्षेपों के स्पष्ट प्रभाव को बढ़ा सकता है। यह यह भी बताता है कि
      ध्यान और मूल्यवान महसूस करने से प्रदर्शन में सुधार हो सकता है—प्रबंधन के लिए एक सबक।
    why_this_is_important: |
      हॉथोर्न प्रभाव को समझना आपको शोध
      परिणामों की व्याख्या करने, बेहतर प्रयोग डिजाइन करने और यह पहचानने में मदद करता है कि ध्यान
      स्वयं परिवर्तन ला सकता है। प्रबंधन में, यह बताता है कि
      लोगों पर ध्यान देना विशिष्ट हस्तक्षेप जितना ही महत्वपूर्ण हो सकता है।
    when_to_use:
      - नेतृत्व
      - निर्णय_निर्माण
      - सीखना
      - समस्या_समाधान
    how_can_you_spot_it:
      observation_induced_change: |
        जब लोगों को पता चलता है कि उन्हें देखा जा रहा है या उनका अध्ययन किया जा रहा है तो व्यवहार बदल जाता है।
      attention_effect: |
        ध्यान देने के कार्य से सुधार होता है, न कि केवल विशिष्ट परिवर्तन से।
      placebo_analog: |
        प्लेसबो की तरह, अध्ययन किए जाने के "इलाज" का प्रभाव हो सकता है।
      short_term_improvement: |
        अवलोकन समाप्त होने पर सुधार फीका पड़ सकता है।
    examples:
      workplace_studies: |
        अध्ययन के दौरान उत्पादकता बढ़ती है—क्या यह नई प्रक्रिया है या
        यह तथ्य कि कोई देख रहा है?
      medical_trials: |
        प्लेसबो समूहों में सुधार होता है—आंशिक रूप से क्योंकि उन्हें ध्यान मिल रहा है।
      education: |
        जब शोधकर्ता मौजूद होते हैं तो छात्र बेहतर प्रदर्शन करते हैं—
        "पर्यवेक्षक प्रभाव।"
      management: |
        जब प्रबंधन ध्यान देता है तो टीमें बेहतर प्रदर्शन करती हैं—क्या यह नई
        पहल है या ध्यान स्वयं?
    real_world_implications: |
      हॉथोर्न प्रभाव अनुसंधान वैधता और कार्यक्रम
      मूल्यांकन को प्रभावित करता है। यह हस्तक्षेप प्रभावों को अधिक आंकने का कारण बन सकता है।
      इसका एक सकारात्मक सबक भी है: ध्यान और अध्ययन किए जाने का अहसास
      सुधार को प्रेरित कर सकता है—इसलिए देखभाल और दृश्यता मायने रखती है।
    professional_application:
      networking_and_relationship_building: |
        लोगों पर ध्यान देने से उनके प्रदर्शन में सुधार हो सकता है—
        हॉथोर्न प्रभाव बताता है कि देखे जाने और
        मूल्यवान महसूस करने का अहसास मायने रखता है। इसका सकारात्मक रूप से उपयोग करें: नियमित जाँच,
        दृश्यता और पहचान।
      collaborative_learning_initiative: |
        हस्तक्षेपों का मूल्यांकन करते समय, नियंत्रण समूहों का उपयोग करें और
        विचार करें कि क्या सुधार हस्तक्षेप के कारण हैं
        या उस ध्यान के कारण जो वह लाता है। हॉथोर्न प्रभाव
        स्पष्ट सफलता को बढ़ा सकता है।
    how_can_this_be_misapplied:
      surveillance_justification: |
        लगातार निगरानी को उचित ठहराने के लिए "हॉथोर्न प्रभाव" का उपयोग करना—
        अवलोकन विश्वास और आंतरिक प्रेरणा को भी कम कर सकता है।
      dismissing_improvements: |
        यह मान लेना कि अध्ययनों के दौरान सारा सुधार हॉथोर्न है—
        कभी-कभी हस्तक्षेप वास्तव में काम करते हैं।
      overgeneralization: |
        मूल हॉथोर्न अध्ययनों पर सवाल उठाए गए हैं;
        प्रभाव पहले सोचे गए से छोटा या भिन्न हो सकता है।
      manipulation: |
        व्यवहार में हेरफेर करने के लिए झूठे "अवलोकन" बनाना।
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: पश्चदृष्टि पूर्वाग्रह
    quick_introduction: |
      पश्चदृष्टि पूर्वाग्रह (या "मुझे सब पहले से पता था" प्रभाव) घटनाओं के घटित होने के बाद, यह विश्वास करने की प्रवृत्ति है कि हम उनकी भविष्यवाणी या अपेक्षा कर सकते थे। हम अतीत को इस तरह से फिर से बनाते हैं कि परिणाम वास्तव में जितने थे, उससे कहीं अधिक अपरिहार्य लगें।
    one_liner: घटना के बाद, हमें लगता है कि हमें सब पहले से पता था।
    try_this:
      - अतीत के निर्णयों का न्याय करने से पहले, पूछें: उस समय वे क्या जानते थे?
      - परिणामों से पहले अपनी भविष्यवाणियों को रिकॉर्ड करें—बाद में तुलना करें।
      - तब ध्यान दें जब आप अतीत को जितना था उससे कहीं अधिक अपरिहार्य बना रहे हों।
    ask_yourself:
      - क्या मैं ऐसी जानकारी के साथ निर्णय ले रहा हूँ जो उस समय उपलब्ध नहीं थी?
      - क्या मैंने वास्तव में इसकी भविष्यवाणी की थी, या यह अब सिर्फ स्पष्ट लग रहा है?
    in_more_detail: |
      एक बार जब हम परिणाम जान लेते हैं, तो यह स्पष्ट लगने लगता है। हम पहले के अनिश्चितता को भूल जाते हैं। यह पूर्वाग्रह सीखने को विकृत करता है—हमें लगता है कि हम कुछ "जानते थे" जबकि हमने नहीं जाना, इसलिए हम अपने मॉडल को अपडेट नहीं करते हैं। यह अनुचित दोषारोपण की ओर भी ले जाता है: "उन्हें इसे आते हुए देखना चाहिए था" जबकि भविष्य वास्तव में अनिश्चित था।

      पश्चदृष्टि पूर्वाग्रह पोस्टमार्टम, कानूनी निर्णयों और ऐतिहासिक विश्लेषण को प्रभावित करता है। हम अतीत के निर्णयों का मूल्यांकन ऐसी जानकारी के साथ करते हैं जो उस समय उपलब्ध नहीं थी।
    why_this_is_important: |
      पश्चदृष्टि पूर्वाग्रह को पहचानना परिणामों से सीखने, निर्णयों के निष्पक्ष मूल्यांकन और अधिक सटीक जोखिम मूल्यांकन में सुधार करता है। यह हमारी भविष्य कहनेवाला क्षमताओं में झूठे आत्मविश्वास को रोकता है।
    when_to_use:
      - निर्णय_निर्माण
      - सीखना
      - जोखिम_मूल्यांकन
      - नेतृत्व
    how_can_you_spot_it:
      inevitability_feeling: |
        किसी घटना के बाद, ऐसा लगता है कि वह "होनी ही थी"।
      reconstructed_certainty: |
        हम घटना से पहले खुद को जितना निश्चित याद करते हैं, वास्तव में हम उतने निश्चित नहीं थे।
      blame_for_failure: |
        "उन्हें पता होना चाहिए था" जब परिणाम वास्तव में अनिश्चित था।
      undervaluing_luck: |
        जब भाग्य ने भूमिका निभाई तब परिणामों को कौशल या दूरदर्शिता के लिए जिम्मेदार ठहराना।
    examples:
      investing: |
        बाजार क्रैश होने के बाद, "मुझे पता था कि बाजार क्रैश होगा"—जब आपने पहले उस "ज्ञान" पर कार्रवाई नहीं की थी।
      project_failures: |
        किसी प्रोजेक्ट की विफलता के पोस्टमार्टम में, "हमें जोखिमों को देखना चाहिए था" जब जोखिम वास्तव में अस्पष्ट थे।
      elections: |
        किसी आश्चर्यजनक परिणाम के बाद, पंडित समझाते हैं कि यह पश्चदृष्टि में "स्पष्ट" क्यों था।
      medical: |
        किसी दुर्लभ स्थिति का निदान करने के बाद, "संकेत थे" जब पहले से पता नहीं था।
    real_world_implications: |
      पश्चदृष्टि पूर्वाग्रह कानूनी दायित्व, प्रदर्शन मूल्यांकन और सीखने को विकृत करता है। यह हमें अपने निर्णय पर अति-आत्मविश्वासी बनाता है और उन लोगों के प्रति अनुचित बनाता है जिन्होंने सीमित जानकारी के साथ उचित निर्णय लिए।
    professional_application:
      networking_and_relationship_building: |
        दूसरों के अतीत के निर्णयों का मूल्यांकन करते समय, सचेत रूप से उस समय ज्ञात बातों को उस चीज़ से अलग करें जो आप अब जानते हैं। "मैंने कहा था" से बचें जब आपने वास्तव में परिणाम की भविष्यवाणी नहीं की थी।
      collaborative_learning_initiative: |
        पोस्ट-मॉर्टम में, निर्णय के समय अनिश्चितता को पकड़ने के लिए "प्री-मॉर्टम" या "निर्णय जर्नल" तकनीकों का उपयोग करें। वास्तविक अनिश्चितता की तुलना पश्चदृष्टि पुनर्निर्माण से करें।
    how_can_this_be_misapplied:
      excusing_all_failures: |
        हर विफलता को "अप्रत्याशित" कहकर खारिज करना जब कुछ अनुमानित थे।
      no_accountability: |
        लापरवाही के लिए लोगों को जवाबदेह ठहराने से बचने के लिए पश्चदृष्टि पूर्वाग्रह का उपयोग करना।
      false_uncertainty: |
        अति-सुधार करके यह विश्वास करना कि हम कभी कुछ भी भविष्यवाणी नहीं कर सकते।
      undermining_learning: |
        "पश्चदृष्टि 20/20 है" कहकर सबक निकालने से इनकार करना—हम अभी भी परिणामों से सीख सकते हैं।
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: अतिशयोक्तिपूर्ण छूट (Hyperbolic Discounting)
    quick_introduction: |
      अतिशयोक्तिपूर्ण छूट वह प्रवृत्ति है जिसमें हम बड़े, बाद के पुरस्कारों पर छोटे, शीघ्र पुरस्कारों को प्राथमिकता देते हैं—और भविष्य को तर्कसंगत मॉडल की भविष्यवाणी से अधिक तीव्रता से छूट देते हैं। हम वर्तमान को अधिक महत्व देते हैं और भविष्य को असंगत तरीकों से कम महत्व देते हैं।
    one_liner: हम बड़े बाद के पुरस्कारों पर छोटे शीघ्र पुरस्कारों को प्राथमिकता देते हैं—और भविष्य को असंगत रूप से छूट देते हैं।
    try_this:
      - पूर्व-प्रतिबद्धता: शांत अवस्था में होने पर अपने भविष्य के स्व के लिए चुनाव करें।
      - 'पुनर्विचार: "क्या मैं यह 10 मिनट में चाहता हूँ? 10 महीने में?" असंगति को प्रकट करने के लिए।'
      - अपने भविष्य के स्व को बेहतर विकल्पों से बांधने के लिए प्रतिबद्धता उपकरणों का उपयोग करें।
    ask_yourself:
      - क्या मैं अपने भविष्य के स्व की कीमत पर वर्तमान को अधिक महत्व दे रहा हूँ?
      - क्या मैं यह चुनाव करता यदि पुरस्कार एक दिन के लिए विलंबित होता? एक साल के लिए?
    in_more_detail: |
      हम एक वर्ष में $100 के बजाय आज $50 को प्राथमिकता दे सकते हैं, लेकिन दो वर्षों में $100 को एक वर्ष में $50 से अधिक प्राथमिकता दे सकते हैं—भले ही यह असंगत हो। हमारी छूट दर स्थिर नहीं है; यह अतिशयोक्तिपूर्ण है। निकट भविष्य को बहुत अधिक छूट दी जाती है; दूर के भविष्य को कम तीव्रता से छूट दी जाती है। यह टालमटोल, लत और अल्प-बचत की व्याख्या करता है।

      वर्तमान पूर्वाग्रह एक संबंधित अवधारणा है: हम वर्तमान क्षण को अनुपातहीन महत्व देते हैं। अतिशयोक्तिपूर्ण छूट बताती है कि हम ऐसी प्रतिबद्धताएं क्यों करते हैं जिन्हें हम पूरा नहीं करते हैं और दीर्घकालिक योजना बनाना क्यों कठिन है।
    why_this_is_important: |
      अतिशयोक्तिपूर्ण छूट को समझना आपको बेहतर प्रोत्साहन डिजाइन करने, अपने भविष्य के स्व को प्रतिबद्ध करने और अल्पकालिक जाल से बचने में मदद करता है। यह बताता है कि हम टालमटोल क्यों करते हैं और हम दीर्घकालिक लक्ष्यों से क्यों जूझते हैं।
    when_to_use:
      - निर्णय_लेना (decision-making)
      - करियर_के_निर्णय (career_moves)
      - निवेश (investing)
      - नेतृत्व (leadership)
    how_can_you_spot_it:
      present_preference: |
        तत्काल संतुष्टि को विलंबित, बड़े पुरस्कारों पर चुनना।
      inconsistent_time_preferences: |
        समय बीतने के साथ प्राथमिकताएं उलट जाती हैं (जैसे, हम कल आहार करना चाहते हैं लेकिन आज खाते हैं)।
      commitment_failures: |
        जब भविष्य वर्तमान बन जाता है तो ऐसी योजनाएं बनाना जिनका हम पालन नहीं करते।
      procrastination: |
        तत्काल आराम के पक्ष में महत्वपूर्ण कार्यों में देरी करना।
    examples:
      savings: |
        सेवानिवृत्ति के लिए बचाने के बजाय अभी खर्च करने का चुनाव करना—भविष्य अमूर्त लगता है।
      health: |
        आराम के लिए आज व्यायाम छोड़ना, यह जानते हुए भी कि हमें इसका पछतावा होगा—कल के पछतावे को छूट दी जाती है।
      addiction: |
        दीर्घकालिक स्वास्थ्य पर तत्काल उत्साह को चुनना।
      deadlines: |
        समय सीमा आने तक कुछ नहीं करना—फिर "वर्तमान" में समय सीमा शामिल होती है और हम कार्य करते हैं।
    real_world_implications: |
      अतिशयोक्तिपूर्ण छूट बचत, स्वास्थ्य, शिक्षा और लत को प्रभावित करती है। यह आत्म-नियंत्रण की कई विफलताओं की व्याख्या करती है। प्रतिबद्धता उपकरण (जैसे, स्वचालित बचत, जवाबदेही) भविष्य के विकल्पों को सीमित करके मदद कर सकते हैं।
    professional_application:
      networking_and_relationship_building: |
        जब भविष्य की प्रतिबद्धताएं मांगी जाती हैं, तो ऐसी जवाबदेही बनाएं जो भविष्य को "वर्तमान" बनाए (जैसे, चेक-इन, समय सीमा)। संरचना के बिना लोगों द्वारा पालन करने की उम्मीद न करें।
      collaborative_learning_initiative: |
        प्रतिबद्धता उपकरणों का उपयोग करें: सार्वजनिक प्रतिबद्धताएं, समय सीमा के लिए पूर्व-प्रतिबद्धता, और ऐसी संरचनाएं जो दीर्घकालिक लक्ष्यों को अधिक तत्काल महसूस कराती हैं। लंबी परियोजनाओं को छोटी उपलब्धियों में तोड़ें।
    how_can_this_be_misapplied:
      excessive_control: |
        "उनके भविष्य के स्व की मदद" के नाम पर लोगों के विकल्पों को अत्यधिक प्रतिबंधित करना।
      paternalism: |
        यह मान लेना कि हम दूसरों के दीर्घकालिक हितों के लिए सबसे अच्छा जानते हैं।
      ignoring_present_needs: |
        अमूर्त भविष्य के लाभों के पक्ष में वैध वर्तमान आवश्यकताओं को खारिज करना।
      one_size_fits_all: |
        लोग छूट दरों में भिन्न होते हैं; हर किसी को समान प्रतिबद्धता उपकरणों की आवश्यकता नहीं होती है।
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: नियंत्रण का भ्रम
    quick_introduction: |
      नियंत्रण का भ्रम यह प्रवृत्ति है कि हम अपने परिणामों को प्रभावित करने की अपनी क्षमता को बढ़ा-चढ़ाकर आंकते हैं। हम मानते हैं कि हमारा नियंत्रण जितना है, उससे कहीं अधिक है—यादृच्छिक घटनाओं, अन्य लोगों और जटिल प्रणालियों पर। हम सहसंबंध को कारणता और कार्रवाई को प्रभाव से भ्रमित करते हैं।
    one_liner: हम अपने परिणामों को प्रभावित करने की अपनी क्षमता को बढ़ा-चढ़ाकर आंकते हैं—विशेषकर यादृच्छिक।
    try_this:
      - पूछें: अगर मैंने कुछ नहीं किया होता तो क्या होता? क्या मेरी कार्रवाई वास्तव में परिणाम का कारण बन रही है?
      - उन चीजों में अंतर करें जिन्हें आप नियंत्रित कर सकते हैं और जिन्हें आप नहीं कर सकते।
      - ध्यान दें कि आप कब अंधविश्वासपूर्ण ढंग से अपने कार्यों को यादृच्छिक परिणामों से जोड़ रहे हैं।
    ask_yourself:
      - क्या मैं सहसंबंध को कारणता से भ्रमित कर रहा हूँ?
      - क्या परिणाम अलग होता अगर मैंने कार्रवाई नहीं की होती?
    in_more_detail: |
      जब लोग अपने लॉटरी नंबर खुद चुनते हैं तो वे जीतने के बारे में अधिक आत्मविश्वास महसूस करते हैं—भले ही इससे संभावनाओं में कोई बदलाव न हो। जब हम उच्च संख्याएँ चाहते हैं तो हम पासे को और ज़ोर से फेंकते हैं। हम सोचते हैं कि हमारे अनुष्ठान या व्यवहार उन परिणामों को प्रभावित करते हैं जो वास्तव में यादृच्छिक हैं या हमारे नियंत्रण से बाहर के कारकों द्वारा निर्धारित होते हैं। यह भ्रम आरामदायक है; यह चिंता को कम करता है। लेकिन यह अत्यधिक आत्मविश्वास और खराब निर्णयों की ओर ले जा सकता है।

      यह भ्रम तब मजबूत होता है जब हम प्रक्रिया में शामिल होते हैं, जब हमें शुरुआती सफलता मिलती है, और जब कार्य परिचित होता है। यह निवेश, प्रबंधन और रोजमर्रा की जिंदगी को प्रभावित करता है।
    why_this_is_important: |
      नियंत्रण के भ्रम को पहचानना आपको अपनी अपेक्षाओं को कैलिब्रेट करने, अत्यधिक आत्मविश्वास से बचने और उन प्रयासों पर ध्यान केंद्रित करने में मदद करता है जहां वास्तव में यह मायने रखता है। यह यह भी समझाता है कि हम अंधविश्वासी व्यवहारों में क्यों बने रहते हैं और अपने प्रभाव को क्यों बढ़ा-चढ़ाकर आंकते हैं।
    when_to_use:
      - निर्णय_निर्माण
      - जोखिम_मूल्यांकन
      - निवेश
      - नेतृत्व
    how_can_you_spot_it:
      overestimated_influence: |
        यह विश्वास करना कि हमारी कार्रवाई परिणामों को प्रभावित करती है जब वे नहीं करतीं।
      ritual_superstition: |
        व्यवहार जिन्हें हम सोचते हैं कि वे परिणामों को प्रभावित करते हैं (भाग्यशाली शर्ट, खेल से पहले की दिनचर्या) जब वे नहीं करते।
      choice_illusion: |
        यह महसूस करना कि चुनाव हमें नियंत्रण देता है जब चुनाव का परिणाम पर कोई प्रभाव नहीं पड़ता।
      action_bias: |
        "प्रतीक्षा" पर "कुछ करने" को प्राथमिकता देना, भले ही कार्रवाई मदद न करे।
    examples:
      gambling: |
        लॉटरी नंबर चुनना यादृच्छिक चयन की तुलना में अधिक नियंत्रणीय लगता है—संभावनाएँ समान हैं।
      investing: |
        सक्रिय व्यापारी बाजार को मात देने की अपनी क्षमता को बढ़ा-चढ़ाकर आंकते हैं; अधिकांश लागतों के बाद खराब प्रदर्शन करते हैं।
      management: |
        नेता संगठनात्मक परिणामों पर अपने प्रभाव को बढ़ा-चढ़ाकर आंकते हैं; कई कारक उनके नियंत्रण से बाहर होते हैं।
      sports: |
        प्रशंसक मानते हैं कि उनका चीयरिंग खेल को प्रभावित करता है; खिलाड़ियों की भाग्यशाली अनुष्ठान होते हैं।
    real_world_implications: |
      नियंत्रण का भ्रम जोखिम लेने, व्यर्थ प्रयासों में बने रहने और परिणामों के श्रेय को प्रभावित करता है। यह कार्रवाई को प्रेरित कर सकता है (कभी-कभी उपयोगी) लेकिन बर्बादी और अत्यधिक आत्मविश्वास की ओर भी ले जा सकता है। कैलिब्रेशन निर्णय की गुणवत्ता में सुधार करता है।
    professional_application:
      networking_and_relationship_building: |
        पहचानें कि आप क्या नियंत्रित कर सकते हैं और क्या नहीं। ऊर्जा को प्रभाव डालने योग्य कारकों पर केंद्रित करें। उन परिणामों का श्रेय न लें जिनका आपने कारण नहीं बनाया—या उन परिणामों के लिए दोष न दें जिन्हें आप रोक नहीं सके।
      collaborative_learning_initiative: |
        योजना बनाते समय, नियंत्रणीय और अनियंत्रणीय कारकों में अंतर करें। शुरुआती जीत से झूठे आत्मविश्वास से बचें। अपेक्षाओं को कैलिब्रेट करने के लिए संभाव्य सोच का उपयोग करें।
    how_can_this_be_misapplied:
      learned_helplessness: |
        यह विश्वास करने के लिए अत्यधिक सुधार करना कि हमारे पास कोई नियंत्रण नहीं है जब हमारे पास सार्थक प्रभाव होता है।
      dismissing_agency: |
        "यह सब किस्मत है" जब कई डोमेन में कौशल और प्रयास मायने रखते हैं।
      false_fatalism: |
        निष्क्रियता को सही ठहराने के लिए नियंत्रण के भ्रम का उपयोग करना।
      one_size_fits_all: |
        नियंत्रण डोमेन के अनुसार भिन्न होता है; कुछ स्थितियाँ दूसरों की तुलना में अधिक नियंत्रणीय होती हैं।
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: प्रभाव पूर्वाग्रह
    quick_introduction: |
      प्रभाव पूर्वाग्रह भविष्य की घटनाओं के प्रति हमारी भावनात्मक प्रतिक्रियाओं की तीव्रता और अवधि को अधिक आंकने की प्रवृत्ति है। हम सोचते हैं कि अच्छी चीजें हमें उतना खुश करेंगी जितना वे करती हैं, और बुरी चीजें हमें उतना दुखी करेंगी जितना वे करती हैं। हम भावनात्मक पूर्वानुमान लगाने में खराब हैं।
    one_liner: हम घटनाओं से हमारी खुशी पर कितना असर पड़ेगा—और कितने समय तक—इसका अधिक अनुमान लगाते हैं।
    try_this:
      - पूछें: पिछली समान घटनाओं के बाद मैंने कैसा महसूस किया? हम उम्मीद से ज्यादा तेजी से अनुकूलित होते हैं।
      - निर्णय लेने के लिए अनुमानित प्रभाव को हावी न होने दें—हम भावनाओं का पूर्वानुमान लगाने में खराब हैं।
      - जब आप किसी एक परिणाम के स्थायी प्रभाव को अधिक आंक रहे हों तो ध्यान दें।
    ask_yourself:
      - क्या मैं यह अनुमान लगा रहा हूं कि मुझे यह कितने समय तक महसूस होगा?
      - पिछली घटनाएँ समान घटनाओं के बारे में क्या कहती हैं?
    in_more_detail: |
      डैनियल गिल्बर्ट और टिमोथी विल्सन भावनात्मक पूर्वानुमान पर शोध करते हैं: हम किसी जीत के बाद अच्छा महसूस करने या हार के बाद बुरा महसूस करने की अवधि को अधिक आंकते हैं। हम उम्मीद से ज्यादा तेजी से अनुकूलित होते हैं। हम एकल घटनाओं के प्रभाव को भी अधिक आंकते हैं—हम सोचते हैं कि एक परिणाम हमारी खुशी को परिभाषित करेगा जब कई कारक योगदान करते हैं। हम अपनी भविष्य की भावनाओं का पूर्वानुमान लगाते समय गलत चीजों पर ध्यान केंद्रित करते हैं।

      प्रभाव पूर्वाग्रह प्रमुख जीवन निर्णयों को प्रभावित करता है: हम यह अनुमान लगाते हैं कि पदोन्नति, संबंध, या खरीद हमारी खुशी को कितना बदल देगी। हम नुकसान के स्थायी दर्द को भी अधिक आंकते हैं।
    why_this_is_important: |
      प्रभाव पूर्वाग्रह को पहचानने से आपको उन चीजों के बारे में बेहतर निर्णय लेने में मदद मिलती है जो वास्तव में आपके जीवन को बेहतर बनाएंगी। यह उन परिणामों में अत्यधिक निवेश को कम करता है जो उतना महत्वपूर्ण नहीं होंगे जितना आप सोचते हैं, और उन परिणामों के डर को कम करता है जो उतनी देर तक चोट नहीं पहुंचाएंगे जितनी आप उम्मीद करते हैं।
    when_to_use:
      - निर्णय_लेना
      - करियर_संबंधी_कदम
      - जोखिम_मूल्यांकन
      - संबंध_निर्माण
    how_can_you_spot_it:
      overestimated_impact: |
        "यह सब कुछ बदल देगा" जब पिछली समान घटनाओं का मामूली स्थायी प्रभाव था।
      duration_overestimation: |
        "मैं इससे कभी उबर नहीं पाऊंगा" जब हम आम तौर पर उम्मीद से ज्यादा तेजी से अनुकूलित होते हैं।
      focalism: |
        एक घटना पर ध्यान केंद्रित करना और कल्याण को प्रभावित करने वाले अन्य कारकों को अनदेखा करना।
      adaptation_neglect: |
        यह भूल जाना कि हम अच्छी और बुरी दोनों परिस्थितियों के अनुकूल हो जाते हैं।
    examples:
      career: |
        "अगर मुझे यह पदोन्नति मिलती है, तो मैं बहुत खुश होऊंगा" जब पिछली पदोन्नति का अस्थायी प्रभाव था।
      purchases: |
        "यह कार मुझे खुश कर देगी" जब नवीनता जल्दी ही फीकी पड़ जाती है।
      loss: |
        "मैं इस अस्वीकृति से कभी उबर नहीं पाऊंगा" जब हम आम तौर पर महीनों के भीतर अनुकूलित हो जाते हैं।
      events: |
        यह अनुमान लगाना कि शादी, छुट्टी, या कोई महत्वपूर्ण घटना दीर्घकालिक खुशी को कितना प्रभावित करेगी।
    real_world_implications: |
      प्रभाव पूर्वाग्रह पैसे, करियर और रिश्तों के बारे में खराब निर्णयों की ओर ले जाता है। हम उन अनुभवों के लिए अधिक भुगतान करते हैं जिनके हम अनुकूल हो जाएंगे और उन नुकसानों से अत्यधिक डरते हैं जिनसे हम उबर जाएंगे। यह नीति और व्यक्तिगत योजना को प्रभावित करता है।
    professional_application:
      networking_and_relationship_building: |
        करियर या संबंध निर्णय लेते समय, इस पर विचार करें कि आपने पिछली समान घटनाओं के बाद कैसा महसूस किया था। क्या प्रभाव उतना ही समय तक चला जितना आपने उम्मीद की थी? भविष्य के पूर्वानुमानों को कैलिब्रेट करने के लिए इसका उपयोग करें।
      collaborative_learning_initiative: |
        जब टीमें असफलताओं या जीत का सामना करती हैं, तो उन्हें अनुकूलन की याद दिलाएं। "हम उम्मीद से ज्यादा तेजी से अनुकूलित होंगे" अत्यधिक उत्सव और अत्यधिक निराशा दोनों को कम कर सकता है।
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        कुछ घटनाओं का स्थायी प्रभाव होता है—आघात, बड़ी हानि। सभी भावनात्मक पूर्वानुमानों को पक्षपाती के रूप में खारिज न करें।
      cold_rationality: |
        "यह मायने नहीं रखेगा" जब उस पल का अनुभव मायने रखता है।
      undervaluing_experiences: |
        सकारात्मक अनुभवों से बचना क्योंकि "हम वैसे भी अनुकूलित हो जाएंगे।"
      invalidating_emotions: |
        लोगों से कहना कि उनकी भावनाएं बीत जाएंगी जब उन्हें उस पल में सहारे की जरूरत होती है।
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: इन-ग्रुप बायस (अपने समूह के प्रति पक्षपात)
    quick_introduction: |
      इन-ग्रुप बायस वह प्रवृत्ति है जिसमें हम उन लोगों का पक्ष लेते हैं जिन्हें हम अपना मानते हैं, उन लोगों की तुलना में जिन्हें हम बाहरी मानते हैं। हम इन-ग्रुप सदस्यों को सकारात्मक गुण और आउट-ग्रुप सदस्यों को नकारात्मक गुण प्रदान करते हैं, जो अक्सर न्यूनतम या मनमानी भिन्नताओं पर आधारित होते हैं।
    one_liner: हम अपने इन-ग्रुप का पक्ष लेते हैं और आउट-ग्रुप का कठोरता से न्याय करते हैं—अक्सर मनमाने ढंग से।
    try_this:
      - पूछें: क्या मैं इस व्यक्ति का न्याय उसी तरह करता अगर वह मेरे समूह में होता?
      - निर्णय लेते समय सक्रिय रूप से आउट-ग्रुप के दृष्टिकोण की तलाश करें।
      - ध्यान दें कि समूह की सीमाएं आपके निर्णय को कैसे आकार दे रही हैं।
    ask_yourself:
      - क्या मैं किसी का पक्ष इसलिए ले रहा हूँ क्योंकि वह "हमारे में से एक" है?
      - क्या मैं एक आउट-ग्रुप सदस्य पर समान मानक लागू करूँगा?
    in_more_detail: |
      भले ही समूह यादृच्छिक रूप से सौंपे गए हों (जैसे, सिक्का उछालकर), लोग जल्दी ही अपने इन-ग्रुप के लिए प्राथमिकता विकसित कर लेते हैं। हम इन-ग्रुप सदस्यों पर अधिक भरोसा करते हैं, उन्हें अधिक उदारता से संसाधन आवंटित करते हैं, और उनके कार्यों का अधिक कृपापूर्वक न्याय करते हैं। आउट-ग्रुप सदस्यों को विपरीत व्यवहार मिलता है।

      इन-ग्रुप बायस **कबीलाईपन**, **भेदभाव**, और **संघर्ष** को बढ़ावा देता है। यह **भर्ती**, **पदोन्नति**, **सहयोग**, और **नीति** को प्रभावित करता है। यह **जाति**, **राष्ट्रीयता**, **कंपनी**, **टीम**, या किसी भी साझा पहचान पर आधारित हो सकता है।
    why_this_is_important: |
      इन-ग्रुप बायस को पहचानना आपको **निष्पक्ष निर्णय लेने**, **अधिक समावेशी टीमें बनाने**, और **पक्षपात से बचने** में मदद करता है। यह यह भी बताता है कि विविधता पहलों का विरोध क्यों होता है—इन-ग्रुप प्राथमिकता स्वचालित होती है।
    when_to_use:
      - नेतृत्व
      - निर्णय_निर्माण
      - संबंध_निर्माण
      - संघर्ष_समाधान
    how_can_you_spot_it:
      preferential_treatment: |
        "हम" को संदेह का लाभ देना लेकिन "उन" को नहीं।
      resource_allocation: |
        जब आउट-ग्रुप सदस्यों की समान या अधिक आवश्यकता हो तब इन-ग्रुप सदस्यों को अधिक संसाधन आवंटित करना।
      attribution_asymmetry: |
        इन-ग्रुप की सफलता = कौशल; आउट-ग्रुप की सफलता = भाग्य। इन-ग्रुप की विफलता = परिस्थिति; आउट-ग्रुप की विफलता = चरित्र।
      minimal_group_effects: |
        मनमानी समूह नियुक्तियों के साथ भी पक्षपात उभरता है।
    examples:
      hiring: |
        उन उम्मीदवारों को प्राथमिकता देना जो आपके अल्मा मेटर से हैं या आपकी पृष्ठभूमि साझा करते हैं।
      performance_reviews: |
        समान प्रदर्शन वाले आउट-ग्रुप सदस्यों की तुलना में इन-ग्रुप सदस्यों को अधिक अनुकूल रूप से रेटिंग देना।
      collaboration: |
        "हमारी टीम" पर भरोसा करना और उन्हें शामिल करना, जबकि "उनकी टीम" को बाहर करना या उन पर संदेह करना।
      politics: |
        इन-ग्रुप तर्कों को बिना आलोचना के स्वीकार करते हुए आउट-ग्रुप तर्कों को खारिज करना।
    real_world_implications: |
      इन-ग्रुप बायस **असमानता को बनाए रखता है**, **योग्यतावाद को कमजोर करता है**, और **संघर्ष को बढ़ावा देता है**। यह भर्ती, पदोन्नति, निवेश और नीति को प्रभावित करता है। इसे कम करने के लिए **जानबूझकर प्रयास** की आवश्यकता होती है—यह अपने आप ठीक नहीं होगा।
    professional_application:
      networking_and_relationship_building: |
        अपने तत्काल दायरे के बाहर के लोगों को सक्रिय रूप से शामिल करें। विविध दृष्टिकोणों की तलाश करें। सवाल करें कि क्या आप किसी का पक्ष इसलिए ले रहे हैं क्योंकि वे "आप जैसे" हैं।
      collaborative_learning_initiative: |
        भर्ती और मूल्यांकन में इन-ग्रुप बायस को कम करने के लिए संरचित प्रक्रियाओं (अनाम समीक्षाएं, विविध पैनल) का उपयोग करें। साझा पहचान बनाने के लिए **क्रॉस-ग्रुप परियोजनाओं** का निर्माण करें।
    how_can_this_be_misapplied:
      forced_diversity: |
        कोटा या नीतियां लागू करना जो अंतर्निहित पूर्वाग्रह को संबोधित किए बिना नाराजगी पैदा करती हैं।
      out_group_hostility: |
        इन-ग्रुप बायस को एकमात्र समस्या मानना ​​जब आउट-ग्रुप शत्रुता भी मौजूद हो।
      ignoring_legitimate_differences: |
        सभी समूह अंतर पूर्वाग्रह नहीं होते हैं—कभी-कभी समूहों में अलग-अलग विशेषताएं होती हैं। यह न मानें कि सभी असमानताएं भेदभाव हैं।
      reverse_discrimination: |
        इन-ग्रुप सदस्यों के लिए अनुचित तरीकों से आउट-ग्रुप्स का पक्ष लेने के लिए अधिक सुधार करना।
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: व्युत्क्रमण (Inversion)
    quick_introduction: |
      व्युत्क्रमण एक समस्या-समाधान तकनीक है जो किसी प्रश्न को बिल्कुल उलट देती है। "मैं कैसे सफल हो सकता हूँ?" पूछने के बजाय, आप पूछते हैं "क्या मुझे असफल बना देगा?" और उन चीज़ों से बचते हैं। यह उन जोखिमों और एंटी-पैटर्न को उजागर करता है जिन्हें आगे की सोच अक्सर चूक जाती है।
    one_liner: व्युत्क्रमण करें—पूछें कि क्या आपको असफल बना देगा, फिर उन चीज़ों से बचें।
    try_this:
      - किसी भी लक्ष्य के लिए, असफलता के मुख्य तरीके सूचीबद्ध करें—फिर उनसे बचें।
      - नकारात्मक विज़ुअलाइज़ेशन का उपयोग करें: इससे क्या गलत हो सकता है?
      - पूछें: इसे बर्बाद करने के लिए एक बुद्धिमान व्यक्ति क्या करेगा?
    ask_yourself:
      - क्या मैंने सोचा है कि इससे क्या असफल हो सकता है?
      - केवल आगे की ओर सोचते हुए मैं क्या नहीं देख रहा हूँ?
    in_more_detail: |
      चार्ली मंगर द्वारा लोकप्रिय और गणितीय तर्क में निहित, व्युत्क्रमण इस तथ्य का लाभ उठाता है कि विफलता से बचना अक्सर सफलता का पीछा करने से आसान होता है। यदि आप किसी चीज़ के गलत होने के मुख्य तरीके पहचान सकते हैं, तो आप उन्हें व्यवस्थित रूप से समाप्त कर सकते हैं।

      कार्ल जैकोबी ने कथित तौर पर कहा, "व्युत्क्रमण करें, हमेशा व्युत्क्रमण करें।" स्टोइक्स ने नकारात्मक विज़ुअलाइज़ेशन—हानि की कल्पना—का उपयोग उन चीज़ों की सराहना करने के लिए किया जो उनके पास थीं और प्रतिकूल परिस्थितियों के लिए तैयार रहने के लिए किया। व्युत्क्रमण निराशावाद नहीं है; यह बाधाओं को दूर करके प्रगति करने का एक संरचित तरीका है।
    why_this_is_important: |
      व्युत्क्रमण आपको विनाशकारी गलतियों से बचने, योजनाओं का परीक्षण करने और गैर-स्पष्ट समाधान खोजने में मदद करता है। यह महत्वपूर्ण विफलता मोड को नज़रअंदाज़ न करने से सुनिश्चित करके आगे की योजना को पूरक बनाता है।
    when_to_use:
      - समस्या_समाधान (problem_solving)
      - निर्णय_लेना (decision-making)
      - जोखिम_आकलन (risk_assessment)
      - करियर_के_कदम (career_moves)
    how_can_you_spot_it:
      premortem_thinking: |
        किसी परियोजना से पहले, यह पूछना कि "यह विफल क्यों हुई?" जैसे कि यह पहले ही हो चुकी हो।
      anti_goals: |
        उन चीज़ों को स्पष्ट रूप से परिभाषित करना जिनसे आप बचना चाहते हैं, जैसे आप क्या हासिल करना चाहते हैं।
      reverse_engineering_failure: |
        सफलताओं का अध्ययन करने के बजाय सबक निकालने के लिए विफल मामलों का अध्ययन करना।
      constraint_focus: |
        अपसाइड के लिए अनुकूलन करने से पहले बाधाओं और अड़चनों की पहचान करना।
    examples:
      investing: |
        "इस स्टॉक को ऊपर क्या ले जाएगा?" के बजाय, पूछें "क्या मुझे पैसे का नुकसान होगा?"
        और उन परिदृश्यों से बचें।
      career: |
        "मेरी प्रतिष्ठा को क्या बर्बाद कर देगा?" से उन व्यवहारों की सूची मिलती है जिनसे बचना है।
      product_launch: |
        "अधिकांश उत्पाद लॉन्च क्यों विफल होते हैं?" लॉन्च से पहले संबोधित करने के लिए जोखिमों को उजागर करता है।
      health: |
        "कौन सी आदतें जीवनकाल कम करती हैं?" "मुझे क्या स्वस्थ बनाता है?" की तुलना में एक स्पष्ट परिहार सूची देती है।
    real_world_implications: |
      व्युत्क्रमण का उपयोग इंजीनियरिंग (विफलता मोड विश्लेषण), निवेश और रणनीति में किया जाता है।
      यह अति आत्मविश्वास को कम करता है और जोखिम प्रबंधन में सुधार करता है। अत्यधिक निर्भरता अत्यधिक सावधानी का कारण बन सकती है।
    professional_application:
      networking_and_relationship_building: |
        "इस रिश्ते को क्या नुकसान पहुँचाएगा?" आपको विश्वास तोड़ने वाले व्यवहारों से बचने में मदद करता है।
      collaborative_learning_initiative: |
        परियोजनाओं पर प्री-मॉर्टम चलाएं: "यह विफल हो गया। क्यों?" योजना और निष्पादन में सुधार के लिए उत्तरों का उपयोग करें।
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        केवल विफलता से बचने पर ध्यान केंद्रित करने से कार्रवाई पक्षाघात हो सकती है और आवश्यक
        जोखिम लेने में बाधा आ सकती है।
      negativity_bias: |
        आगे की ओर देखने वाले अवसर की पहचान के साथ संतुलित न होने पर व्युत्क्रमण नकारात्मकता पूर्वाग्रह को बढ़ा सकता है।
      analysis_paralysis: |
        विफलता मोड पर इतना समय बिताना कि आप कभी निष्पादित न कर पाएं।
      missing_upside: |
        व्युत्क्रमण आपको यह नहीं बताता कि क्या करना है—केवल क्या टालना है। आपको अभी भी
        सकारात्मक लक्ष्यों की आवश्यकता है।
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: घटते प्रतिफल का नियम
    quick_introduction: |
      घटते प्रतिफल का नियम कहता है कि जब आप एक इनपुट की अधिक मात्रा जोड़ते हैं और
      दूसरों को स्थिर रखते हैं, तो इनपुट की प्रत्येक नई इकाई से अतिरिक्त उत्पादन
      अंततः घट जाता है। अधिक हमेशा बेहतर नहीं होता है—एक ऐसा बिंदु होता है जहाँ
      अतिरिक्त प्रयास से कम और कम लाभ होता है।
    one_liner: अधिक इनपुट अंततः कम उत्पादन देता है—एक इष्टतम बिंदु होता है।
    try_this:
      - पूछें: क्या मैं उस बिंदु से आगे निकल गया हूँ जहाँ अतिरिक्त प्रयास से सार्थक लाभ होता है?
      - उच्चतम-लीवरेज इनपुट को प्राथमिकता दें; जब सीमांत लाभ कम हो जाए तो रुकें।
      - तब ध्यान दें जब आप किसी ऐसी चीज़ में ज़्यादा निवेश कर रहे हों जो पहले ही फल दे चुकी हो।
    ask_yourself:
      - यहाँ एक और इकाई प्रयास से मुझे क्या लाभ होगा?
      - क्या मैं घटते प्रतिफल के बिंदु से आगे अनुकूलन कर रहा हूँ?
    in_more_detail: |
      अर्थशास्त्र में, एक निश्चित मात्रा में भूमि में अधिक श्रमिक जोड़ने से अंततः
      कम वृद्धिशील लाभ होता है। व्यक्तिगत उत्पादकता में, अध्ययन का पहला घंटा
      दसवें घंटे से अधिक मूल्य जोड़ सकता है। यह सिद्धांत संसाधनों, प्रयास, समय और
      सुविधाओं पर लागू होता है। एक इष्टतम बिंदु होता है; उसके परे, सीमांत लाभ
      घट जाता है और नकारात्मक भी हो सकता है।

      घटते प्रतिफल को पहचानना आपको संसाधनों को कुशलतापूर्वक आवंटित करने और उन
      क्षेत्रों में ज़्यादा निवेश करने से बचने में मदद करता है जिनसे अधिकांश मूल्य
      पहले ही प्राप्त हो चुका है।
    why_this_is_important: |
      घटते प्रतिफल को समझना ज़्यादा निवेश को रोकता है, प्राथमिकता को निर्देशित करता है,
      और आपको यह जानने में मदद करता है कि कब रुकना है। यह संसाधन आवंटन और
      पूर्णतावाद से बचने के लिए आवश्यक है।
    when_to_use:
      - निर्णय_लेना
      - समस्या_समाधान
      - निवेश
      - करियर_निर्णय
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        प्रयास या संसाधन की प्रत्येक अतिरिक्त इकाई पिछले वाले की तुलना में कम
        उत्पादन करती है।
      perfectionism_trap: |
        गुणवत्ता के अंतिम 10% के लिए प्रयास करना असमान्य प्रयास की खपत करता है।
      overinvestment: |
        सीमांत लाभ कम या नकारात्मक होने पर भी संसाधन जोड़ते रहना।
      optimal_point_passed: |
        आप उस बिंदु से आगे बढ़ गए हैं जहाँ अधिक इनपुट परिणामों में सुधार करता है।
    examples:
      studying: |
        परीक्षा की तैयारी के पहले 2 घंटे 7-8 घंटे से अधिक लाभ देते हैं; घटते
        प्रतिफल का एक बिंदु होता है।
      product_features: |
        किसी ऐप में अधिक सुविधाएँ जोड़ने से उपयोगकर्ता भ्रमित हो सकते हैं; 20वीं
        सुविधा 5वीं सुविधा से कम मूल्य जोड़ती है।
      hiring: |
        किसी परियोजना में अधिक लोगों को जोड़ने से एक बिंदु के बाद वह धीमी हो सकती है
        (ब्रूक्स का नियम)।
      marketing: |
        विज्ञापन खर्च दोगुना करने से परिणाम दोगुने नहीं होते हैं; जब आप बाजार को
        संतृप्त करते हैं तो लाभ घट जाता है।
    real_world_implications: |
      घटते प्रतिफल का नियम आर्थिक नीति, व्यावसायिक रणनीति और व्यक्तिगत उत्पादकता का
      मार्गदर्शन करता है। इसे अनदेखा करने से संसाधनों की बर्बादी और उप-इष्टतम
      परिणाम होते हैं। यह पारेतो सिद्धांत और फोकस का समर्थन करता है।
    professional_application:
      networking_and_relationship_building: |
        कुछ गहरे रिश्तों में निवेश करने से कई रिश्तों में पतले प्रयास फैलाने से अधिक
        लाभ हो सकता है। पहचानें कि अतिरिक्त नेटवर्किंग का प्रतिफल कब घटता है।
      collaborative_learning_initiative: |
        अधिक प्रशिक्षण घंटे हमेशा बेहतर परिणाम का मतलब नहीं होते हैं। इष्टतम खुराक
        ढूंढें और ओवरलोडिंग से बचें।
    how_can_this_be_misapplied:
      premature_optimization: |
        गुणवत्ता के एक उचित स्तर तक पहुंचने से पहले ही बहुत जल्दी रुक जाना।
      undershooting: |
        अपर्याप्त प्रयास के बहाने के रूप में घटते प्रतिफल का उपयोग करना।
      misidentifying_the_curve: |
        यह मान लेना कि घटता प्रतिफल है जबकि आप वास्तव में वक्र के एक अलग हिस्से पर
        हैं (जैसे, प्रारंभिक घातीय चरण)।
      one_size_fits_all: |
        एक ही "इष्टतम बिंदु" को विभिन्न संदर्भों में लागू करना जहाँ वक्र भिन्न होते हैं।
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: हानि से बचाव का पूर्वाग्रह
    quick_introduction: |
      We often feel the pain of losing something more intensely than the
      pleasure of gaining something of equal value.
    one_liner: हानि से बचना समान लाभ प्राप्त करने से लगभग दोगुना कष्टप्रद लगता है।
    try_this:
      - "खुद से पूछें: क्या मैं जो खोऊंगा उसका मूल्यांकन, जो मुझे मिलेगा, उसके मुकाबले अधिक कर रहा हूँ?"
      - विकल्प को लाभ के रूप में पुन: प्रस्तुत करें, न कि हानि के रूप में, और देखें कि क्या आपका दृष्टिकोण बदलता है।
      - ध्यान दें कि कब वास्तविक लाभ से अधिक, खोने का डर निर्णय को चला रहा है।
    ask_yourself:
      - यदि मैं शून्य से शुरुआत कर रहा होता तो मैं क्या चुनता?
      - क्या मैं इसलिए टिका हुआ हूँ कि मैं क्या खो दूंगा, या इसलिए कि भविष्य वास्तव में बेहतर है?
    in_more_detail: |
      डैनियल कहनमैन और एमोस टवर्स्की द्वारा विकसित, हानि से बचाव बताता है कि हानि और लाभ को कैसे असममित रूप से माना जाता है।
      $100 खोने का मनोवैज्ञानिक प्रभाव आमतौर पर $100 कमाने की संतुष्टि से कहीं अधिक होता है।
      यह पूर्वाग्रह वित्त, बातचीत और रोजमर्रा के निर्णयों को प्रभावित करता है, जिससे अक्सर जोखिम-विरोधी व्यवहार होता है
      जब संभावित हानियों पर ध्यान जाता है।
    why_this_is_important: |
      हानि से बचाव को समझना आपको यह पहचानने में मदद करता है कि कब हानि का डर तर्कसंगत विश्लेषण से अधिक निर्णय ले रहा है।
      यह बताता है कि लोग घाटे वाले निवेशों पर क्यों टिके रहते हैं, आवश्यक परिवर्तनों से क्यों बचते हैं,
      और बातचीत और करियर के निर्णयों में उप-इष्टतम विकल्प क्यों चुनते हैं।
    when_to_use:
      - निर्णय_लेना
      - निवेश
      - करियर_परिवर्तन
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        ध्यान दें कि जब कुछ खोने की संभावना, संभावित लाभ के मुकाबले, असमान चिंता या प्रतिरोध पैदा करती है।
      reluctance_to_change: |
        रणनीतियों को बदलने, नौकरी छोड़ने, या संपत्ति बेचने में हिचकिचाहट, भले ही
        वस्तुनिष्ठ विश्लेषण बताता है कि यह बेहतर विकल्प है।
      framing_sensitivity: |
        निर्णय इस आधार पर नाटकीय रूप से बदलते हैं कि विकल्पों को लाभ
        के रूप में प्रस्तुत किया गया है या हानि के रूप में, भले ही परिणाम समान हों।
      overvaluing_what_you_have: |
        स्वामित्व प्रभाव - केवल इसलिए कि आप उन्हें अपने पास रखते हैं, उन चीजों को अधिक महत्व देना - अक्सर हानि से बचाव के साथ आता है।
    examples:
      investing: |
        "हानि को महसूस करने से बचने" के लिए घटते स्टॉक को बनाए रखना, जबकि कहीं और
        बेहतर निवेश के अवसरों को खोना।
      career: |
        एक असंतोषजनक नौकरी में बने रहना क्योंकि छोड़ना सुरक्षा खोने जैसा लगता है,
        भले ही नया अवसर अधिक विकास प्रदान करता हो।
      negotiations: |
        एक निष्पक्ष प्रस्ताव को अस्वीकार करना क्योंकि इसे "कुछ छोड़ने" के रूप में प्रस्तुत किया गया है,
        बजाय "एक समझौते को प्राप्त करने" के।
      product_design: |
        निःशुल्क परीक्षण जो भुगतान में परिवर्तित होते हैं - उपयोगकर्ता परीक्षण समाप्त होने पर सेवा "खो" देते हैं,
        जो नई सेवा "प्राप्त करने" की तुलना में सदस्यता को अधिक प्रेरित करता है।
    real_world_implications: |
      हानि से बचाव बाजारों, नीतियों और व्यक्तिगत व्यवहार को आकार देता है।
      यह बताता है कि बीमा और वारंटी अच्छी तरह से क्यों बिकते हैं, लोग फायदेमंद परिवर्तन से क्यों बचते हैं,
      और नकारात्मक समाचारों का अतिरिक्त प्रभाव क्यों होता है। इसे पहचानने से निर्णय की गुणवत्ता में सुधार हो सकता है
      और पछतावे से प्रेरित विकल्पों को कम किया जा सकता है।
    professional_application:
      networking_and_relationship_building: |
        इस बात से अवगत रहें कि लोग उत्पादक संबंध या सहयोग समाप्त करने का विरोध कर सकते हैं
        क्योंकि वे "संबंध खोने" से डरते हैं। प्रतिरोध को कम करने के लिए नए अवसरों को लाभ के रूप में प्रस्तुत करें, न कि हानि के रूप में।
      collaborative_learning_initiative: |
        नई प्रक्रियाओं या उपकरणों को पेश करते समय, टीम क्या "खो" रही है, बजाय इसके कि वे क्या हासिल करती है, इस पर जोर दें।
        हानि-प्रस्तुत परिवर्तन पहलों से अक्सर अधिक प्रतिरोध पैदा होता है।
    how_can_this_be_misapplied:
      manipulation: |
        निर्णयों पर दबाव डालने के लिए हानि से बचाव का शोषण करना - जैसे, "सीमित समय के प्रस्ताव"
        या "चूक न जाएं" प्रस्तुतीकरण जो वास्तविक मूल्य मूल्यांकन के बजाय हानि के डर को ट्रिगर करते हैं।
      misinterpreting_relationships: |
        यह मानना कि किसी का परिवर्तन का विरोध पूरी तरह से तर्कसंगत है, जबकि यह हो सकता है
        हानि से बचाव से प्रेरित हो। उद्देश्यों को गलत तरीके से चिन्हित करने से विश्वास खराब हो सकता है।
      overcommitment: |
        धँसी लागत भ्रम - एक असफल परियोजना में निवेश जारी रखना क्योंकि
        "हमने पहले ही इतना निवेश कर दिया है" बजाय हानि को कम करने के।
      missed_opportunities_for_conflict_resolution: |
        समझौता करने से इनकार करना क्योंकि कोई भी रियायत हानि की तरह महसूस होती है,
        भले ही विकल्प सभी के लिए बदतर परिणाम हो।
      vulnerability_to_exploitation: |
        दूसरों द्वारा हेरफेर किया जाना जो हानि से बचाव को ट्रिगर करने के लिए विकल्पों को फ्रेम करते हैं,
        जैसे बिक्री की रणनीति जो इस बात पर जोर देती है कि यदि आप कार्रवाई नहीं करते हैं तो आप क्या "खो" देंगे।
      reinforcing_negative_perceptions: |
        संभावित कमियों पर अत्यधिक ध्यान केंद्रित करने से निराशावादी
        दृष्टिकोण बन सकता है जो आत्म-पूर्ण हो जाता है, विकास के अवसरों से चूक जाता है।
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: नक्शा इलाका नहीं है
    quick_introduction: |
      "नक्शा इलाका नहीं है" का मतलब है कि वास्तविकता का प्रतिनिधित्व स्वयं वास्तविकता नहीं है।
      मॉडल, सिद्धांत और विवरण उपयोगी सरलीकरण हैं, लेकिन वे हमेशा कुछ न कुछ छोड़ देते हैं।
      नक्शे को इलाके के लिए भ्रमित करने से त्रुटि होती है।
    one_liner: नक्शा इलाका नहीं है - सभी मॉडल गलत होते हैं; कुछ उपयोगी होते हैं।
    try_this:
      - जब कोई मॉडल वास्तविकता से मेल नहीं खाता है, तो नक्शे को अपडेट करें - वास्तविकता को फिट करने के लिए मजबूर न करें।
      - पूछें: यह मॉडल क्या छोड़ रहा है? यह कब टूट सकता है?
      - मॉडल को सच्चाई के रूप में नहीं, बल्कि उपकरणों के रूप में मानें।
    ask_yourself:
      - क्या मैं अपने मॉडल को वास्तविकता के साथ भ्रमित कर रहा हूँ?
      - क्या आखिरी बार देखने के बाद इलाके में बदलाव आया है?
    in_more_detail: |
      अल्फ्रेड कोरज़िब्स्की ने सामान्य अर्थशास्त्र में यह विचार प्रस्तुत किया। एक शहर का नक्शा
      नेविगेशन के लिए उपयोगी होता है, लेकिन वह शहर नहीं है - यह विवरण छोड़ देता है, पुराना हो जाता है, और
      कभी भी सब कुछ कैप्चर नहीं कर सकता। यही बात मानसिक मॉडल, वैज्ञानिक
      सिद्धांतों और संगठनात्मक चार्टों पर भी लागू होती है।

      सभी मॉडल गलत होते हैं; कुछ उपयोगी होते हैं। खतरा यह है कि एक मॉडल को ऐसे माना जाए जैसे वह
      पूर्ण सत्य हो, खासकर जब इलाका बदल गया हो। अच्छा सोचने के लिए
      वास्तविकता से मेल न खाने पर नक्शे को अपडेट करने की आवश्यकता होती है।
    why_this_is_important: |
      यह पहचानना कि नक्शे इलाके से भिन्न होते हैं, मॉडल में अत्यधिक आत्मविश्वास को रोकता है,
      मान्यताओं को अद्यतन करने के लिए प्रोत्साहित करता है, और पुरानी या
      अति-सरलीकृत जानकारी पर कार्य करने के जोखिम को कम करता है।
    when_to_use:
      - निर्णय_निर्माण
      - समस्या_समाधान
      - सीखना
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      model_reality_confusion: |
        किसी ढांचे या सिद्धांत को ऐसे मानना ​​जैसे वह वास्तविकता का पूरी तरह से वर्णन करता हो।
      outdated_assumptions: |
        ऐसी जानकारी या मॉडल पर कार्य करना जो अब वर्तमान स्थितियों से मेल नहीं खाते।
      oversimplification: |
        बारीकियों को अनदेखा करना क्योंकि "नक्शा" उन्हें शामिल नहीं करता है।
      map_worship: |
        सबूतों का खंडन करने वाले मॉडल का बचाव करना, उसे अद्यतन करने के बजाय।
    examples:
      organizational_charts: |
        यह मानना ​​कि रिपोर्टिंग संरचना दर्शाती है कि काम वास्तव में कैसे किया जाता है।
      financial_models: |
        एक स्प्रेडशीट अनुमान को परिदृश्य के बजाय भविष्यवाणी के रूप में मानना।
      stereotypes: |
        व्यक्तिगत लोगों पर समूह-स्तरीय सामान्यीकरण लागू करना।
      strategy_docs: |
        एक योजना को लिखे अनुसार निष्पादित करना जब बाजार बदल गया हो।
    real_world_implications: |
      नक्शा-इलाका भेद विज्ञान, इंजीनियरिंग और
      दर्शन के लिए मौलिक है। यह Bayesian अद्यतन, चुस्त कार्यप्रणाली, और ज्ञानमीमांसीय
      विनम्रता का आधार है। इसे अनदेखा करने से कठोर सोच और विफल रणनीतियाँ होती हैं।
    professional_application:
      networking_and_relationship_building: |
        किसी व्यक्ति के बारे में आपका मानसिक मॉडल पुराना हो सकता है। पुराने छापों पर निर्भर रहने के बजाय
        सीधे संपर्क के माध्यम से इसे अपडेट करें।
      collaborative_learning_initiative: |
        टीमों को योजनाओं और मॉडल को परिकल्पनाओं के रूप में मानने के लिए प्रोत्साहित करें जिनका परीक्षण और
        संशोधन किया जाना है, न कि निश्चित सत्य के रूप में।
    how_can_this_be_misapplied:
      radical_skepticism: |
        यह निष्कर्ष निकालना कि कोई भी नक्शा उपयोगी नहीं है और सारा ज्ञान संदिग्ध है।
      constant_revision: |
        इतनी बार अद्यतन करना कि कोई स्थिर समझ न बने।
      dismissing_models: |
        उपयोगी सरलीकरणों को यह कहकर अस्वीकार करना कि वे "इलाका नहीं हैं।"
      relativism: |
        यह दावा करना कि सभी नक्शे समान रूप से मान्य हैं जब कुछ स्पष्ट रूप से इलाके में बेहतर फिट होते हैं।
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: केवल संपर्क का प्रभाव
    quick_introduction: |
      केवल संपर्क का प्रभाव वह प्रवृत्ति है जिसमें हम केवल इसलिए किसी चीज़ को पसंद करने लगते हैं क्योंकि हम उससे परिचित होते हैं। बार-बार संपर्क में आने से - बिना किसी सुदृढीकरण के भी - पसंद बढ़ जाती है। हम वही पसंद करते हैं जिसे हम जानते हैं।
    one_liner: परिचितता पसंद को बढ़ाती है - हम वही पसंद करते हैं जिसे हमने पहले देखा है।
    try_this:
      - पूछें: क्या मैं इसे इसलिए पसंद करता हूँ क्योंकि यह अच्छा है, या इसलिए क्योंकि यह परिचित है?
      - विकल्पों का मूल्यांकन करते समय, संपर्क के लिए सुधार करें - नई चीजें नुकसान में शुरू होती हैं।
      - ध्यान दें कि दोहराव आपकी पसंद को कब प्रभावित कर रहा है।
    ask_yourself:
      - क्या मैं किसी चीज़ को मुख्य रूप से इसलिए पसंद कर रहा हूँ क्योंकि मैंने उसे पहले देखा है?
      - क्या मैं अलग चुनाव करूँगा यदि संपर्क समान होता?
    in_more_detail: |
      रॉबर्ट ज़ैonc ने दिखाया कि उत्तेजनाओं (चेहरे, शब्द, आकार) के बार-बार संपर्क में आने से उनके प्रति सकारात्मक भावना बढ़ती है - भले ही हम सचेत रूप से संपर्क से अवगत न हों। परिचितता से पसंद बढ़ती है, न कि तिरस्कार (कई मामलों में)। यह प्रभाव तब मजबूत होता है जब हम विश्लेषण नहीं कर रहे होते हैं और जब संपर्क सूक्ष्म होता है।

      केवल संपर्क का प्रभाव ब्रांड की पसंद, पारस्परिक आकर्षण और सौंदर्य निर्णय को प्रभावित करता है। यह बताता है कि हम परिचित संगीत को क्यों पसंद करते हैं, विज्ञापन दोहराव के माध्यम से क्यों काम करते हैं, और हम उन लोगों को क्यों पसंद कर सकते हैं जिन्हें हमने पहले देखा है - बिना बातचीत के भी।
    why_this_is_important: |
      केवल संपर्क के प्रभाव को पहचानना आपको अपनी प्राथमिकताओं को समझने और दोहराव के माध्यम से हेरफेर का विरोध करने में मदद करता है। यह यह भी बताता है कि रिश्तों और ब्रांडों के लिए दृश्यता और उपस्थिति क्यों मायने रखती है। परिचितता एक शक्तिशाली लेकिन अक्सर अनजाने में होने वाला प्रभाव है।
    when_to_use:
      - संबंध_निर्माण
      - निर्णय_लेना
      - नेतृत्व
      - सीखना
    how_can_you_spot_it:
      familiarity_preference: |
        नई चीजों के बजाय पहले देखी गई चीजों को प्राथमिकता देना।
      repetition_influence: |
        बार-बार संपर्क स्पष्ट अनुनय के बिना पसंद को बढ़ाता है।
      unconscious_influence: |
        यह प्रभाव तब भी काम करता है जब हम संपर्क से अवगत नहीं होते हैं।
      brand_recognition: |
        परिचित ब्रांडों को प्राथमिकता दी जाती है, भले ही हम स्पष्ट न कर सकें क्यों।
    examples:
      advertising: |
        किसी ब्रांड के बार-बार संपर्क में आने से पसंद बढ़ती है - बिना किसी अनुनय संदेश के भी।
      music: |
        पहले सुने गानों को पहली बार सुनने पर नए गानों की तुलना में अधिक पसंद किया जाता है।
      people: |
        हम उन लोगों को अधिक पसंद करते हैं जिन्हें हमने बार-बार देखा है (जैसे, सहपाठी, सहकर्मी) - अजनबियों की तुलना में, बिना बातचीत के भी।
      ideas: |
        जिन विचारों से हम पहले मिले हैं, वे नए विचारों की तुलना में अधिक आरामदायक और विश्वसनीय लगते हैं।
    real_world_implications: |
      केवल संपर्क का प्रभाव उपभोक्ता व्यवहार, राजनीतिक प्राथमिकताओं और सामाजिक आकर्षण को आकार देता है। इसका विपणन में दुरुपयोग किया जाता है और यह परिचितों के लिए अनुचित लाभ पैदा कर सकता है। यह यह भी बताता है कि संपर्क की विविधता क्यों मायने रखती है - अंतर से परिचितता पूर्वाग्रह को कम करती है।
    professional_application:
      networking_and_relationship_building: |
        दृश्यता मायने रखती है। उपस्थित होना, मौजूद रहना और देखा जाना परिचितता पैदा करता है जो पसंद का निर्माण करता है। बार-बार कम जोखिम वाले संपर्क के मूल्य को कम मत आंकें।
      collaborative_learning_initiative: |
        लोगों को बार-बार विभिन्न दृष्टिकोणों और लोगों के संपर्क में लाएँ - परिचितता पूर्वाग्रह को कम कर सकती है। लेकिन ध्यान रखें कि केवल संपर्क यथास्थिति के लिए वरीयता को भी मजबूत कर सकता है।
    how_can_this_be_misapplied:
      manipulation: |
        सहमति के बिना प्राथमिकताओं में हेरफेर करने के लिए जानबूझकर बार-बार संपर्क बनाना।
      false_familiarity: |
        यह मान लेना कि परिचितता गुणवत्ता के बराबर है - कभी-कभी नए विकल्प बेहतर होते हैं।
      exclusion: |
        यदि केवल कुछ लोगों को ही संपर्क मिलता है, तो उन्हें अनुचित लाभ मिलता है। विचार करें कि दृश्यता तक किसकी पहुँच है।
      stagnation: |
        परिचितता पर अत्यधिक निर्भर रहना और कभी भी नई चीजें नहीं आजमाना।
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: नैरेटिव फैलेसी
    quick_introduction: |
      नैरेटिव फैलेसी अतीत की घटनाओं से ऐसी कहानियाँ बनाने की प्रवृत्ति है
      जो उन्हें वास्तव में होने से अधिक सुसंगत, पूर्वानुमेय और सार्थक बनाती हैं।
      हम यादृच्छिकता पर स्पष्टीकरण थोपते हैं। हम इतिहास की अव्यवस्था को
      एक व्यवस्थित कहानी में बदल देते हैं—और फिर मानते हैं कि कहानी अवश्यंभावी थी।
    one_liner: हम यादृच्छिकता पर सुसंगत कहानियाँ थोपते हैं—और फिर मानते हैं कि वे अवश्यंभावी थीं।
    try_this:
      - पूछें: इस कहानी का कितना हिस्सा पश्चदृष्टि है? भाग्य ने क्या भूमिका निभाई?
      - व्यवस्थित स्पष्टीकरणों पर संदेह करें—अतीत हमारी कहानियों से अधिक अव्यवस्थित था।
      - समझ में आता है को नोटिस करें जब यह पूर्वानुमेय था का काम कर रहा हो।
    ask_yourself:
      - क्या मैं ऐसी कहानी बना रहा हूँ जो अतीत को जितना था उससे अधिक अवश्यंभावी दिखाती है?
      - क्या मैं इसके होने से पहले इसकी भविष्यवाणी कर पाता?
    in_more_detail: |
      नसीम निकोलस तालेब ने इस शब्द को लोकप्रिय बनाया। हम कथा की लालसा रखते हैं—
      कारण और प्रभाव, नायक और खलनायक, स्पष्ट चाप। इसलिए हम ऐसी कहानियाँ बनाते हैं
      जो पश्चदृष्टि में घटनाओं को जोड़ती हैं। कहानी सच लगती है क्योंकि यह सुसंगत है—
      लेकिन सुसंगतता का मतलब यह नहीं है कि यह सही है। हम "समझ में आता है" को
      "पूर्वानुमेय था" के साथ भ्रमित करते हैं। हम भाग्य और यादृच्छिकता की भूमिका को
      कम आंकते हैं।

      नैरेटिव फैलेसी प्रभावित करती है कि हम इतिहास से कैसे सीखते हैं, सफलता का
      मूल्यांकन करते हैं, और भविष्यवाणियाँ करते हैं। हम कहानियों की व्याख्यात्मक शक्ति को
      अधिक महत्व देते हैं और संयोग की भूमिका को कम महत्व देते हैं।
    why_this_is_important: |
      नैरेटिव फैलेसी को पहचानना आपको अतीत से अधिक सीखने और पूर्वानुमेयता को
      अधिक आंकने से बचने में मदद करता है। यह कारण और भविष्यवाणी के बारे में
      विनम्रता को प्रोत्साहित करता है। जो कुछ भी एक अच्छी कहानी बनाता है वह सच या
      सामान्यीकृत नहीं होता है।
    when_to_use:
      - निर्णय_लेना
      - सीखना
      - जोखिम_आकलन
      - समस्या_समाधान
    how_can_you_spot_it:
      hindsight_coherence: |
        अतीत की घटनाओं को एक व्यवस्थित कहानी से समझाया जाता है
        जो उस समय दिखाई नहीं दे रही थी।
      cause_effect_overconfidence: |
        हम उन परिणामों के स्पष्ट कारण बताते हैं जिनमें कई
        योगदान देने वाले कारक थे।
      luck_minimization: |
        सफलता और असफलता को कौशल और रणनीति से समझाया जाता है,
        भाग्य से नहीं।
      story_over_evidence: |
        एक सम्मोहक कथा सांख्यिकीय साक्ष्य पर हावी हो जाती है।
    examples:
      business_success: |
        "वे एक्स के कारण सफल हुए" जब कई कारकों और भाग्य
        को शामिल किया गया था—हम वह कहानी चुनते हैं जो फिट बैठती है।
      investing: |
        बाजार के उतार-चढ़ाव को ऐसी कथाओं से समझाना जो
        संतोषजनक लगे लेकिन बाद की हो सकती हैं।
      history: |
        ऐतिहासिक घटनाओं को अवश्यंभावी प्रगति के रूप में बताया जाता है
        जब वे कई कारकों पर निर्भर थीं।
      career: |
        "मैं यहाँ इसलिए पहुँचा क्योंकि मैंने एक्स किया" जब भाग्य और समय
        ने महत्वपूर्ण भूमिका निभाई।
    real_world_implications: |
      नैरेटिव फैलेसी सीखने को विकृत करती है, भविष्यवाणी में अति आत्मविश्वास,
      और सफलता और असफलता का श्रेय देती है।
      यह अतीत को जितना था उससे अधिक पूर्वानुमेय और भविष्य को
      जितना है उससे अधिक पूर्वानुमेय दिखाती है।
    professional_application:
      networking_and_relationship_building: |
        जब कोई अपनी सफलता की कहानी सुनाता है, तो याद रखें कि
        यह एक कथा है—सुसंगत और सम्मोहक, लेकिन संभवतः
        सरलीकृत। भाग्य और अनदेखे कारकों को कम महत्व दिया जा सकता है।
      collaborative_learning_initiative: |
        पूर्वव्यापी में, कथा को साक्ष्य से अलग करें।
        पूछें "हम उस समय क्या कहते?" परिणामों के ज्ञात होने से पहले
        अनिश्चितता को पकड़ने के लिए निर्णय पत्रिकाओं का उपयोग करें।
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        कुछ कथाएँ सही होती हैं—सब कुछ
        नैरेटिव फैलेसी नहीं है। कारण मौजूद है।
      excessive_skepticism: |
        "नैरेटिव फैलेसी" के कारण अतीत से सीखने से इनकार करना।
        हम अभी भी उपयोगी सबक निकाल सकते हैं।
      false_randomness: |
        यह मानना कि सब कुछ यादृच्छिक है जब कुछ परिणाम
        सार्थक रूप से एट्रीब्यूटेबल होते हैं।
      undermining_storytelling: |
        संचार और अर्थ के लिए कहानियों का मूल्य होता है—
        फैलेसी यह विश्वास करना है कि वे पूर्ण या
        पूर्वानुमानित हैं, न कि उनका अस्तित्व।
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: नकारात्मकता पूर्वाग्रह
    quick_introduction: |
      नकारात्मकता पूर्वाग्रह नकारात्मक जानकारी को सकारात्मक जानकारी की तुलना में अधिक महत्व देने की प्रवृत्ति है।
      बुरी खबरें, आलोचना और खतरे हमारी ध्यान आकर्षित करते हैं और हमारे निर्णयों को समान सकारात्मक उत्तेजनाओं की तुलना में अधिक मजबूती से प्रभावित करते हैं।
    one_liner: बुरी खबर अच्छी खबर से ज्यादा भारी पड़ती है—हम खतरों को प्राथमिकता देने के लिए बने हैं।
    try_this:
      - मूल्यांकन करते समय सक्रिय रूप से सकारात्मक साक्ष्य की तलाश करें और उसे महत्व दें।
      - ध्यान दें कि कब एक आलोचना कई तारीफों से भारी पड़ रही है।
      - पूछें: क्या मैं नकारात्मक जानकारी को उसके लायक से अधिक महत्व दे रहा हूँ?
    ask_yourself:
      - क्या मैं नकारात्मक पर ध्यान केंद्रित कर रहा हूँ और सकारात्मक को कम आंक रहा हूँ?
      - यदि मैं अच्छे सबूतों पर ध्यान केंद्रित करता तो क्या मुझे अलग महसूस होता?
    in_more_detail: |
      विकासवादी रूप से, एक खतरे को चूकना घातक हो सकता है, जबकि एक अवसर को चूकना आमतौर पर बचने योग्य था।
      हमारे दिमाग नकारात्मक जानकारी को प्राथमिकता देने के लिए बने हैं। एक भी आलोचनात्मक टिप्पणी कई तारीफों को भारी पड़ सकती है।
      नकारात्मक घटनाओं को अधिक स्पष्ट रूप से और लंबे समय तक याद रखा जाता है।
      यह पूर्वाग्रह रिश्तों, निर्णय लेने और कल्याण को प्रभावित करता है। हम असफलताओं पर ध्यान केंद्रित करते हैं, सबसे खराब स्थितियों का अनुमान लगाते हैं, और सकारात्मक सबूतों को कम आंकते हैं।
      इसे समझना हमें इसे सुधारने में मदद करता है।
    why_this_is_important: |
      नकारात्मकता पूर्वाग्रह को पहचानना आपको प्रतिक्रिया को संतुलित करने, आलोचना पर अत्यधिक प्रतिक्रिया करने से बचने और अधिक कैलिब्रेटेड निर्णय लेने में मदद करता है।
      यह यह भी बताता है कि बुरी खबरें क्यों हावी रहती हैं और हम अक्सर परिस्थितियों के अनुसार महसूस करने से बदतर क्यों महसूस करते हैं।
    when_to_use:
      - निर्णय_लेना
      - संबंध_बनाना
      - नेतृत्व
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        एक नकारात्मक टिप्पणी कई सकारात्मक टिप्पणियों पर भारी पड़ती है।
      threat_prioritization: |
        संभावित नकारात्मक पहलुओं को समान सकारात्मक पहलुओं की तुलना में अधिक ध्यान मिलता है।
      vivid_negative_memories: |
        नकारात्मक अनुभवों को आसानी से और अधिक भावना के साथ याद किया जाता है।
      discounting_positive_evidence: |
        अच्छी खबरों को जल्दी भूल जाया जाता है या उसका खंडन किया जाता है।
    examples:
      performance_reviews: |
        एक कर्मचारी महत्वपूर्ण प्रतिक्रिया के एक टुकड़े पर ध्यान केंद्रित करता है और समग्र सकारात्मक मूल्यांकन को कम आंकता है।
      news_consumption: |
        सकारात्मक रुझानों के बावजूद नकारात्मक सुर्खियां ध्यान आकर्षित करती हैं और विश्वदृष्टि को आकार देती हैं।
      relationships: |
        एक ही तर्क कई अच्छे पलों से बड़ा लगता है।
      investing: |
        बाजार में गिरावट से अत्यधिक घबराहट होती है, जितना कि समान वृद्धि से उत्साह होता है।
    real_world_implications: |
      नकारात्मकता पूर्वाग्रह मीडिया, राजनीति और संगठनात्मक संस्कृति को आकार देता है।
      यह चिंता, संघर्ष और उप-इष्टतम निर्णयों में योगदान देता है। इसे जानबूझकर इसका प्रतिकार करने से कल्याण और निर्णय में सुधार हो सकता है।
    professional_application:
      networking_and_relationship_building: |
        प्रतिक्रिया देते समय, ध्यान रखें कि नकारात्मक टिप्पणियां अधिक भारी पड़ेंगी—उन्हें संतुलित करें और विकास पर जोर दें।
        प्रतिक्रिया प्राप्त करते समय, सचेत रूप से पूरी तस्वीर पर विचार करें।
      collaborative_learning_initiative: |
        ऐसे संस्कृतियाँ बनाएँ जो स्पष्ट रूप से नकारात्मकता पूर्वाग्रह का प्रतिकार करती हैं: जीत का जश्न मनाएं,
        सकारात्मक परिणामों का दस्तावेजीकरण करें, और "मोर्टेम-आफ्टर" को "प्री-मोर्टेम" के साथ संतुलित करें
        कि क्या सही गया।
    how_can_this_be_misapplied:
      toxic_positivity: |
        "सकारात्मक सोच" पर जोर देकर वैध चिंताओं को खारिज करना।
      ignoring_real_threats: |
        वास्तविक जोखिमों को कम आंकने के बिंदु तक अत्यधिक सुधार करना।
      feedback_suppression: |
        "नकारात्मकता बुरी है" क्योंकि आवश्यक आलोचना से बचना।
      invalidation: |
        किसी को यह बताना कि उनकी नकारात्मक भावनाएं "सिर्फ नकारात्मकता पूर्वाग्रह" हैं
        जब उनके पास चिंता का वास्तविक कारण हो।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: ऑकम का उस्तरा
    quick_introduction: |
      ऑकम का उस्तरा (या ओकहम का उस्तरा) यह सिद्धांत है कि प्रतिस्पर्धी परिकल्पनाओं में से,
      सबसे कम मान्यताओं वाली को प्राथमिकता दी जानी चाहिए। सरल व्याख्याएँ अक्सर - हालांकि हमेशा नहीं - सही होती हैं।
    one_liner: साक्ष्य के अनुरूप सबसे सरल व्याख्या को प्राथमिकता दें।
    try_this:
      - सिद्धांतों की तुलना करते समय, पूछें: किसमें कम मान्यताएँ हैं?
      - ऐसी जटिलता को बिना प्रमाण के न जोड़ें जिसकी मांग हो।
      - ध्यान दें कि जब आप एक सरल व्याख्या पर एक विस्तृत व्याख्या को प्राथमिकता दे रहे हों।
    ask_yourself:
      - क्या मैं अनावश्यक जटिलता पेश कर रहा हूँ?
      - क्या साक्ष्य इस स्तर की व्याख्या की मांग करते हैं?
    in_more_detail: |
      विलियम ऑफ ऑकम के नाम पर, यह सिद्धांत यह दावा नहीं करता कि सरल व्याख्याएँ
      हमेशा सच होती हैं। यह सुझाव देता है कि अनावश्यक जटिलता को बिना
      साक्ष्य के पेश नहीं किया जाना चाहिए। यदि दो सिद्धांत एक ही घटनाओं की व्याख्या करते हैं,
      तो सरल वाला तब तक बेहतर होता है जब तक कि साक्ष्य अन्यथा इसकी मांग न करे।

      ऑकम का उस्तरा एक ह्यूरिस्टिक (अन्वेषी विधि) है, कोई नियम नहीं। कभी-कभी सही व्याख्या
      जटिल होती है। लेकिन यह ओवरफिटिंग, षड्यंत्र सोच और अनावश्यक
      जटिलता से बचाता है। यह व्याख्या में मितव्ययिता का पक्षधर है।
    why_this_is_important: |
      ऑकम के उस्तरे को लागू करने से समस्या-समाधान में सुधार होता है, मॉडल में ओवरफिटिंग कम होती है,
      और आपको विस्तृत लेकिन असंबद्ध सिद्धांतों से बचने में मदद मिलती है। जब साक्ष्य अस्पष्ट हो तो यह एक उपयोगी डिफ़ॉल्ट है।
    when_to_use:
      - समस्या_समाधान
      - निर्णय_निर्माण
      - सीखना
      - जोखिम_आकलन
    how_can_you_spot_it:
      unnecessary_complexity: |
        एक व्याख्या कई मान्यताओं का आह्वान करती है जब कम पर्याप्त होंगी।
      conspiracy_tendencies: |
        सरल कारणों वाले घटनाओं के लिए जटिल, बहु-अभिनेता व्याख्याएँ।
      overfitting: |
        एक मॉडल या सिद्धांत जो पिछले डेटा को पूरी तरह से समझाता है लेकिन नए डेटा पर विफल रहता है।
      elegance_in_explanation: |
        सर्वोत्तम व्याख्याएँ अक्सर पश्चदृष्टि में "स्पष्ट" महसूस होती हैं।
    examples:
      debugging: |
        जब कोई बग होता है, तो वास्तुशिल्प समस्याओं को मानने से पहले सबसे सरल कारणों (जैसे, टाइपो, गलत कॉन्फ़िगरेशन) की जाँच करें।
      conspiracy_theories: |
        "सरकार ने एक्स का आयोजन किया" के लिए कई छिपे हुए अभिनेताओं की आवश्यकता होती है; "कुछ लोगों ने
        गलतियाँ कीं" सरल है।
      product_failure: |
        उपयोगकर्ता किसी सुविधा को नहीं अपना रहे हैं—सरलतम व्याख्या: यह उनकी समस्या का समाधान नहीं करती है, न कि वे यूआई से भ्रमित हैं।
      medical_diagnosis: |
        "सामान्य चीजें सामान्य होती हैं"—दुर्लभ लोगों से पहले सामान्य निदान पर विचार करें।
    real_world_implications: |
      ऑकम का उस्तरा वैज्ञानिक जांच, इंजीनियरिंग और रोजमर्रा के तर्क का मार्गदर्शन करता है।
      यह विस्तृत गलत सिद्धांतों पर बर्बाद हुए प्रयासों को कम करता है। गलत तरीके से लागू होने पर, यह
      वास्तव में जटिल घटनाओं को खारिज कर सकता है।
    professional_application:
      networking_and_relationship_building: |
        दूसरों के व्यवहार की व्याख्या करते समय, दुर्भावना या जटिल उद्देश्यों को मानने से पहले
        सरल व्याख्याओं (वे व्यस्त हैं, वे भूल गए) को प्राथमिकता दें।
      collaborative_learning_initiative: |
        समस्या-समाधान सत्रों में, जटिल मॉडल बनाने से पहले स्पष्ट रूप से "सबसे सरल व्याख्या क्या है?" पूछें।
    how_can_this_be_misapplied:
      oversimplification: |
        वैध जटिल व्याख्याओं को "बहुत जटिल" होने के कारण खारिज करना।
      status_quo_bias: |
        नई लेकिन सही व्याख्याओं पर परिचित व्याख्याओं को प्राथमिकता देने के लिए ऑकम के उस्तरे का उपयोग करना।
      scientific_rigidity: |
        नए सिद्धांतों को अस्वीकार करना क्योंकि वे अधिक जटिल हैं, भले ही साक्ष्य उनका समर्थन करते हों।
      missing_nuance: |
        कुछ डोमेन (जैसे, मानव व्यवहार, पारिस्थितिकी तंत्र) स्वाभाविक रूप से जटिल होते हैं;
        सरलता भ्रामक हो सकती है।
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: शुतुरमुर्ग प्रभाव
    quick_introduction: |
      शुतुरमुर्ग प्रभाव नकारात्मक वित्तीय जानकारी से बचने की प्रवृत्ति है—शुतुरमुर्ग की तरह "रेत में अपना सिर दबाना"। लोग बाज़ारों के गिरने पर अपने पोर्टफोलियो को देखने से बचते हैं, बिल खोलने में देरी करते हैं, और उन चेतावनी संकेतों को अनदेखा करते हैं जो उन्हें कार्य करने में मदद कर सकते हैं।
    one_liner: बुरी खबर से बचने से वास्तविकता नहीं बदलती—यह केवल आपकी प्रतिक्रिया में देरी करती है।
    try_this:
      - नियमित रूप से जांच की व्यवस्था करें ताकि आप संख्याओं से बच न सकें।
      - ध्यान दें कि आप किसी चीज़ को खोलने या देखने में कब देरी कर रहे हैं।
      - पूछें: मैं किस चीज़ से बच रहा हूँ, और अगर मैं उसका सामना करता तो क्या बदल जाता?
    ask_yourself:
      - क्या मैं जानकारी से इसलिए बच रहा हूँ क्योंकि यह बुरी हो सकती है?
      - क्या पहले से जागरूकता मुझे बेहतर कार्य करने में मदद करेगी?
    in_more_detail: |
      इस शब्द को व्यवहारिक वित्त में उन निवेशकों का वर्णन करने के लिए गढ़ा गया था जो बाज़ार में गिरावट के दौरान अपने निवेश की जाँच से बचते हैं। यह व्यवहार वित्त से परे भी फैलता है: चिकित्सा जांच से बचना, रिश्तों की समस्याओं को अनदेखा करना, और कठिन बातचीत में देरी करना। हम बुरी खबर की चिंता से बचना चाहते हैं, लेकिन बचने से अक्सर परिणाम बदतर हो जाते हैं क्योंकि समय पर कार्रवाई नहीं हो पाती।

      यह प्रभाव हानि से बचने (loss aversion) और भावनात्मक असुविधा से बचने की इच्छा से प्रेरित होता है। दुर्भाग्य से, अज्ञानता वास्तविकता को नहीं बदलती—यह केवल हमारी प्रतिक्रिया में देरी करती है।
    why_this_is_important: |
      शुतुरमुर्ग प्रभाव को पहचानने से आपको कठिन जानकारी का सक्रिय रूप से सामना करने में मदद मिलती है। बुरी खबर से बचने से शायद ही कभी परिणाम बेहतर होते हैं; यह आमतौर पर उन्हें और बिगाड़ देता है। समय पर जागरूकता बेहतर निर्णय लेने में सक्षम बनाती है।
    when_to_use:
      - निर्णय_लेना
      - निवेश
      - जोखिम_मूल्यांकन
      - करियर_गतिविधियाँ
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        जब बाज़ार नीचे हों तो निवेश विवरणों को न देखना।
      delaying_difficult_information: |
        बिल, चिकित्सा परिणाम, या प्रदर्शन प्रतिक्रियाओं को खोलने में देरी करना।
      information_avoidance: |
        उन स्रोतों से सक्रिय रूप से बचना जिनमें बुरी खबर हो सकती है।
      procrastination_on_unpleasant_tasks: |
        उन कार्यों में देरी करना जिनसे समस्याएँ सामने आ सकती हैं या उनका समाधान हो सकता है।
    examples:
      investing: |
        एक निवेशक भालू बाज़ार के दौरान अपने 401(k) की जाँच करना बंद कर देता है, जिससे पुनर्संतुलन के अवसरों से चूक जाता है।
      health: |
        बुरी खबर के डर से लक्षणों के बावजूद डॉक्टर के पास जाने से बचना।
      finances: |
        कर्ज का सामना करने से बचने के लिए क्रेडिट कार्ड स्टेटमेंट या बैंक अलर्ट न खोलना।
      performance: |
        एक प्रबंधक वार्षिक समीक्षा तक महत्वपूर्ण प्रतिक्रिया देने से बचता है, जबकि पहले हस्तक्षेप से मदद मिल सकती थी।
    real_world_implications: |
      शुतुरमुर्ग प्रभाव के कारण खराब वित्तीय परिणाम, विलंबित चिकित्सा उपचार, और रिश्तों और काम में अनसुलझी समस्याएँ होती हैं। यह टाले जा सकने वाले नुकसानों को बढ़ा देता है। ऐसी प्रणालियाँ जो जानकारी को अनदेखा करना मुश्किल बनाती हैं, मदद कर सकती हैं।
    professional_application:
      networking_and_relationship_building: |
        कठिन बातचीत से बचें नहीं। समस्याओं को जल्दी हल करें बजाय इसके कि वे अपने आप हल हो जाएँगी। नियमित जांच की व्यवस्था करें जो समस्याओं को बढ़ने से पहले सामने लाएँ।
      collaborative_learning_initiative: |
        ऐसे फीडबैक लूप बनाएँ जो समस्याओं को अनदेखा करना मुश्किल बना दें—डैशबोर्ड, नियमित समीक्षाएँ, और ऐसे नियम जो बुरी खबर के जल्दी खुलासे को प्रोत्साहित करते हों।
    how_can_this_be_misapplied:
      information_overload: |
        जब कुछ जानकारी से बचना स्वस्थ हो (जैसे, हर मिनट स्टॉक की जाँच न करना) तब लगातार निगरानी का दबाव डालना।
      anxiety_amplification: |
        संभावित समस्याओं पर इतना ध्यान केंद्रित करना कि इससे चिंता बढ़ जाती है और परिणाम बेहतर नहीं होते।
      blame_shifting: |
        सभी बचने को "शुतुरमुर्ग प्रभाव" का कारण बताना जब कुछ बचना तर्कसंगत हो (जैसे, शोर को अनदेखा करना)।
      micromanagement: |
        दूसरों की अत्यधिक निगरानी को उचित ठहराने के लिए इस अवधारणा का उपयोग करना।
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: परेटो सिद्धांत
    quick_introduction: |
      परैटो सिद्धांत (या 80/20 नियम) कहता है कि लगभग 80% प्रभावों का कारण 20% कारण होते हैं।
      इनपुट का एक छोटा सा अल्पसंख्यक अक्सर अधिकांश आउटपुट उत्पन्न करता है—बिक्री, बग, ग्राहक, प्रयास, सुविधाएँ, और बहुत कुछ।
      महत्वपूर्ण कुछ पर ध्यान केंद्रित करें।
    one_liner: 80% प्रभावों का कारण 20% कारण होते हैं—महत्वपूर्ण कुछ पर ध्यान केंद्रित करें।
    try_this:
      - उन 20% इनपुट की पहचान करें जो 80% परिणाम उत्पन्न करते हैं—वहां दोगुना निवेश करें।
      - उन 80% को काटें या प्राथमिकता कम करें जो थोड़ा उत्पन्न करते हैं।
      - पूछें: कुछ चीजें, जिन्हें यदि मैंने अच्छी तरह से किया, तो सबसे अधिक मायने रखेंगी?
    ask_yourself:
      - क्या मैं अपना प्रयास समान रूप से फैला रहा हूँ जबकि कुछ चीजें अधिक मायने रखती हैं?
      - मेरा उच्च-लिवरेज 20% क्या है?
    in_more_detail: |
      विल्फ्रेडो परैटो ने देखा कि इटली की 80% भूमि 20% आबादी के स्वामित्व में थी।
      सिद्धांत को सामान्यीकृत किया गया है: 20% ग्राहकों से 80% बिक्री, 20% कोड से 80% बग, 20% प्रयास से 80% परिणाम।
      सटीक अनुपात भिन्न होता है, लेकिन पैटर्न—असमान वितरण—सामान्य है।

      सिद्धांत बताता है कि उच्च-लिवरेज 20% की पहचान और उस पर ध्यान केंद्रित करने से परिणाम नाटकीय रूप से सुधर सकते हैं।
      यह एक प्राथमिकताकरण ह्यूरिस्टिक है, न कि भौतिक नियम।
    why_this_is_important: |
      परैटो सिद्धांत को लागू करने से आपको निर्दयतापूर्वक प्राथमिकता तय करने, कम-प्रभाव वाली गतिविधियों पर प्रयास बर्बाद करने से बचने और कम में अधिक प्राप्त करने में मदद मिलती है।
      यह उत्पादकता और रणनीति के लिए मौलिक है।
    when_to_use:
      - निर्णय_लेना
      - समस्या_समाधान
      - नेतृत्व
      - करियर_उपाय
    how_can_you_spot_it:
      uneven_distribution: |
        X का एक छोटा अंश Y के एक बड़े अंश का हिसाब रखता है।
      high_leverage_activities: |
        कुछ क्रियाएं अधिकांश परिणाम उत्पन्न करती हैं।
      low_value_tail: |
        कई गतिविधियाँ बहुत कम योगदान करती हैं; उन्हें छाँटने का न्यूनतम प्रभाव पड़ता है।
      vital_few_vs_trivial_many: |
        मुख्य बात यह पहचानना है कि कौन से कुछ सबसे ज्यादा मायने रखते हैं।
    examples:
      sales: |
        20% ग्राहक 80% राजस्व उत्पन्न करते हैं—उन्हें बनाए रखने और बढ़ाने पर ध्यान केंद्रित करें।
      software: |
        20% सुविधाएँ 80% उपयोग को चलाती हैं—उन पर प्राथमिकता दें।
      productivity: |
        कुछ आदतें या दिनचर्याएं आपका अधिकांश आउटपुट उत्पन्न करती हैं—उन पर दोगुना निवेश करें।
      problems: |
        20% बग 80% क्रैश का कारण बनते हैं—उन्हें पहले ठीक करें।
    real_world_implications: |
      परैटो सिद्धांत संसाधन आवंटन, उत्पाद रणनीति और व्यक्तिगत उत्पादकता का मार्गदर्शन करता है।
      इसे अनदेखा करने से प्रयास बहुत पतला फैल जाता है।
      इसे अत्यधिक लागू करने से "लॉन्ग टेल" की उपेक्षा हो सकती है जहां यह मायने रखता है।
    professional_application:
      networking_and_relationship_building: |
        उन रिश्तों की पहचान करें जो आपके लक्ष्यों के लिए सबसे अधिक मायने रखते हैं।
        प्रयास को समान रूप से फैलाने के बजाय उन पर असमान रूप से निवेश करें।
      collaborative_learning_initiative: |
        टीम के प्रदर्शन में सुधार करते समय, उन 20% हस्तक्षेपों को ढूंढें जो 80% परिणाम देते हैं।
        प्रशिक्षण और प्रक्रिया परिवर्तनों को वहां केंद्रित करें।
    how_can_this_be_misapplied:
      oversimplification: |
        यह मान लेना कि 80/20 हर जगह लागू होता है; कुछ वितरण अधिक समान होते हैं।
      neglecting_the_tail: |
        "तुच्छ कई" को अनदेखा करना जब वे सामूहिक रूप से मायने रखते हैं (उदाहरण के लिए, कई छोटे ग्राहक, किनारे के मामले)।
      false_precision: |
        80/20 को शाब्दिक के बजाय एक मोटे ह्यूरिस्टिक के रूप में मानना।
      misidentifying_the_vital_few: |
        त्रुटिपूर्ण विश्लेषण के कारण गलत 20% पर ध्यान केंद्रित करना।
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: पार्किंसंस का नियम
    quick_introduction: |
      पार्किंसंस का नियम कहता है कि "कार्य पूरा होने के लिए उपलब्ध समय को भरने के लिए फैलता है।" किसी कार्य को एक सप्ताह दें, और उसे एक सप्ताह लगेगा; उसे एक दिन दें, और वह अक्सर एक दिन में पूरा हो जाएगा। यही बात बजट, टीम के आकार और संसाधनों पर भी लागू होती है।
    one_liner: कार्य पूरा होने के लिए उपलब्ध समय को भरने के लिए फैलता है।
    try_this:
      - दायरे में वृद्धि को रोकने और ध्यान केंद्रित करने के लिए कड़ी समय-सीमाएँ निर्धारित करें।
      - पूछें: इस काम को उचित रूप से पूरा करने में न्यूनतम कितना समय लग सकता है?
      - ध्यान दें कि कब अतिरिक्त समय या संसाधनों का उपभोग आनुपातिक मूल्य के बिना किया जा रहा है।
    ask_yourself:
      - क्या मैं समय भर रहा हूँ, या काम वास्तव में इसकी माँग कर रहा है?
      - क्या कड़ी समय-सीमा बेहतर प्राथमिकता को मजबूर करेगी?
    in_more_detail: |
      सी. नॉर्थकोट पार्किंसन ने देखा कि कार्य की मात्रा के बावजूद नौकरशाही बढ़ती है। उन्होंने यह भी नोट किया कि कार्य उपलब्ध समय को भरने के लिए फैलते हैं—हम अपनी मेहनत और गति को समय-सीमा के अनुसार समायोजित करते हैं। कड़ी समय-सीमाएँ ध्यान केंद्रित करने पर मजबूर कर सकती हैं; ढीली समय-सीमाएँ टालमटोल और दायरे में वृद्धि को आमंत्रित करती हैं।

      इस नियम का परियोजना प्रबंधन, व्यक्तिगत उत्पादकता और संगठनात्मक डिजाइन पर प्रभाव पड़ता है। यह बताता है कि प्राथमिकता को मजबूर करके बाधाएँ परिणामों को बेहतर बना सकती हैं।
    why_this_is_important: |
      पार्किंसंस के नियम को समझने से आपको बेहतर समय-सीमाएँ निर्धारित करने, परियोजनाओं के लिए अधिक संसाधन आवंटित करने से बचने और यह पहचानने में मदद मिलती है कि कब "अधिक समय" या "अधिक लोग" मदद नहीं करेंगे—और नुकसान पहुँचा सकते हैं। बाधाएँ उत्पादक हो सकती हैं।
    when_to_use:
      - निर्णय_निर्माण
      - नेतृत्व
      - समस्या_समाधान
      - करियर_गतिविधियाँ
    how_can_you_spot_it:
      deadline_driven_effort: |
        समय-सीमा नजदीक आने पर कार्य में तेजी आती है; जब समय-सीमा दूर होती है तो बहुत कम प्रगति होती है।
      scope_expansion: |
        परियोजनाएँ केंद्रित रहने के बजाय उपलब्ध संसाधनों को भरने के लिए बढ़ती हैं।
      bureaucratic_growth: |
        संगठन कार्यभार में वृद्धि न होने पर भी लोगों और प्रक्रियाओं को जोड़ते हैं।
      budget_exhaustion: |
        बजट खर्च होने के बाद भी पूरी तरह से खर्च हो जाते हैं, भले ही वह खर्च आवश्यक था या नहीं।
    examples:
      student_deadlines: |
        एक महीने में देय एक शोध पत्र अंतिम 48 घंटों में लिखा जाता है।
      project_management: |
        6 महीने की समय-सीमा वाली एक परियोजना 6 महीने लेती है; 3 महीने की समय-सीमा के साथ उसी दायरे को भी पूरा किया जा सकता है।
      meetings: |
        1 घंटे की बैठक घंटे भर चलती है, भले ही 30 मिनट पर्याप्त हों।
      budgets: |
        एक विभाग अगले साल उसी बजट को सही ठहराने के लिए साल के अंत तक अपना पूरा बजट खर्च कर देता है।
    real_world_implications: |
      पार्किंसंस का नियम उत्पादकता, संगठनात्मक फैलाव और संसाधन आवंटन को प्रभावित करता है। यह बताता है कि कृत्रिम बाधाएँ (छोटी समय-सीमाएँ, छोटी टीमें) ध्यान और दक्षता में सुधार कर सकती हैं।
    professional_application:
      networking_and_relationship_building: |
        दायरे में वृद्धि को रोकने और गति बनाए रखने के लिए सहयोगी कार्य के लिए स्पष्ट, कड़ी समय-सीमाएँ निर्धारित करें।
      collaborative_learning_initiative: |
        बैठकों और परियोजनाओं के लिए समय-सीमा का उपयोग करें। यह परीक्षण करने के लिए छोटी समय-सीमाओं के साथ प्रयोग करें कि क्या वे गुणवत्ता का त्याग किए बिना ध्यान में सुधार करते हैं।
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        मनमाने ढंग से छोटी समय-सीमाएँ निर्धारित करना जिससे थकावट या खराब गुणवत्ता हो।
      underresourcing: |
        यह मान लेना कि कम समय या कम लोग हमेशा काम करेंगे—कुछ कार्यों के लिए पर्याप्त संसाधन की आवश्यकता होती है।
      blame_shifting: |
        "पार्किंसंस के नियम" को देरी का कारण बताना जब काम वास्तव में जटिल था।
      ignoring_quality: |
        स्थायी परिणामों की कीमत पर कृत्रिम बाधाओं को पूरा करने की जल्दबाजी।
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: संभाव्य सोच
    quick_introduction: |
      संभाव्य सोच निश्चितताओं के बजाय संभावनाओं के संदर्भ में तर्क करने की आदत है। "क्या यह होगा?" पूछने के बजाय, हम पूछते हैं "यह कितना संभावित है?" यह अनिश्चितता को स्वीकार करता है और बेहतर निर्णय लेने के लिए इसका उपयोग करता है।
    one_liner: निश्चितताओं में नहीं, संभावनाओं में सोचें - अनिश्चितता को स्वीकार करें।
    try_this:
      - क्या यह होगा? को यह कितना संभावित है? से बदलें।
      - कई परिदृश्यों पर विचार करें और अनुमानित संभावनाएँ निर्दिष्ट करें।
      - जैसे ही नया प्रमाण आए, अपनी मान्यताओं को अपडेट करें।
    ask_yourself:
      - क्या मैं द्विआधारी शब्दों में सोच रहा हूँ जब संभावनाएँ अधिक सटीक होंगी?
      - संभावित परिणामों की सीमा क्या है?
    in_more_detail: |
      अधिकांश वास्तविक दुनिया के परिणाम अनिश्चित हैं। संभाव्य सोच द्विआधारी हाँ/नहीं को क्रमिक विश्वासों से बदल देती है। इसमें कई परिदृश्यों पर विचार करना, अनुमानित संभावनाएँ निर्दिष्ट करना और प्रमाण आने पर अपडेट करना शामिल है। यह अति आत्मविश्वास और काले-सफेद सोच के विपरीत है।

      मुख्य अभ्यासों में शामिल हैं: श्रेणियों में सोचना, आधार दर पर विचार करना, प्रमाण के साथ मान्यताओं को अद्यतन करना, और जोखिम (ज्ञात संभावनाएँ) और अनिश्चितता (अज्ञात संभावनाएँ) के बीच अंतर करना। यह कैलिब्रेशन और निर्णय की गुणवत्ता में सुधार करता है।
    why_this_is_important: |
      संभाव्य सोच अति आत्मविश्वास को कम करती है, पूर्वानुमान में सुधार करती है, और अनिश्चितता के तहत बेहतर निर्णय की ओर ले जाती है। यह निवेश, रणनीति और किसी भी डोमेन के लिए आवश्यक है जहाँ भविष्य अनिश्चित है।
    when_to_use:
      - निर्णय_लेना
      - जोखिम_मूल्यांकन
      - निवेश
      - समस्या_समाधान
    how_can_you_spot_it:
      likelihood_language: |
        "संभवतः," "संभावित," "असंभावित" बजाय "होगा" या "नहीं होगा" के।
      scenario_thinking: |
        अनुमानित संभावनाओं के साथ कई संभावित भविष्य पर विचार करना।
      calibration: |
        भविष्यवाणियाँ जो समय के साथ वास्तविक परिणाम आवृत्तियों से मेल खाती हैं।
      uncertainty_acknowledgment: |
        स्पष्ट रूप से यह बताना कि आप क्या नहीं जानते।
    examples:
      forecasting: |
        "मुझे लगता है कि समय सीमा को पूरा करने की 60% संभावना है" बजाय "हम
        समय सीमा को पूरा करेंगे।"
      investing: |
        "इसके 2x होने की 30% संभावना है और -50% होने की 70% संभावना है" बजाय
        "यह रॉकेट बन जाएगा।"
      strategy: |
        कई परिदृश्यों (सर्वश्रेष्ठ, आधार, सबसे खराब स्थिति) के लिए अनुमानित
        संभावनाओं के साथ योजना बनाना।
      hiring: |
        "साक्षात्कार के आधार पर, मैं 70% संभावना डालता हूँ कि वे सफल होंगे" बजाय
        "वे एक बेहतरीन हायर हैं।"
    real_world_implications: |
      संभाव्य सोच कैलिब्रेशन में सुधार करती है, आश्चर्य को कम करती है, और बेहतर जोखिम प्रबंधन को सक्षम बनाती है। यह प्रभावी पूर्वानुमान और अनिश्चितता के तहत निर्णय लेने के लिए केंद्रीय है।
    professional_application:
      networking_and_relationship_building: |
        जब उपयुक्त हो तो संभावनाओं में संवाद करें - "मुझे काफी विश्वास है" बनाम
        "मुझे यकीन है।" यह ज्ञान संबंधी विनम्रता का संकेत देकर विश्वास बनाता है।
      collaborative_learning_initiative: |
        टीमों को अनिश्चितता व्यक्त करने के लिए प्रोत्साहित करें। संभाव्य निर्णय को बेहतर बनाने के लिए भविष्यवाणी बाजारों या कैलिब्रेशन अभ्यासों का उपयोग करें।
    how_can_this_be_misapplied:
      false_precision: |
        सटीक संभावनाएँ निर्दिष्ट करना (जैसे, 73%) जब आप इतने सटीक नहीं हो सकते।
      analysis_paralysis: |
        कभी कार्य न करना क्योंकि "हम निश्चित नहीं हो सकते।"
      hedging_overuse: |
        हर चीज को बेकारता की हद तक योग्य बनाना।
      dismissing_intuition: |
        मजबूत अंतर्ज्ञान को तब अनदेखा करने के लिए अति-सुधार करना जब वे मान्य जानकारी ले जा सकते हैं।
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: पिग्मेलियन प्रभाव
    quick_introduction: |
      पिग्मेलियन प्रभाव (या रोसेंथल प्रभाव) वह घटना है जहाँ उच्च अपेक्षाएँ बेहतर प्रदर्शन की ओर ले जाती हैं। जब शिक्षक, प्रबंधक, या अन्य लोग किसी से अधिक उम्मीद करते हैं, तो वह व्यक्ति बेहतर प्रदर्शन करता है। अपेक्षाएँ आत्म-पूर्ण भविष्यवाणी बन जाती हैं।
    one_liner: उच्च अपेक्षाएँ बेहतर प्रदर्शन की ओर ले जाती हैं—अपेक्षाएँ वास्तविकता को आकार देती हैं।
    try_this:
      - उच्च लेकिन प्राप्त करने योग्य अपेक्षाएँ निर्धारित करें; उन्हें स्पष्ट रूप से संप्रेषित करें।
      - ध्यान दें कि कब कम अपेक्षाएँ किसी के प्रदर्शन को सीमित कर सकती हैं।
      - पूछें: मैं अवचेतन रूप से क्या उम्मीद कर रहा हूँ—और यह परिणामों को कैसे प्रभावित कर सकता है?
    ask_yourself:
      - क्या मेरी अपेक्षाएँ इस व्यक्ति की मदद कर रही हैं या उसे सीमित कर रही हैं?
      - क्या उच्च अपेक्षाएँ मेरे व्यवहार को—और उनके परिणामों को बदल देंगी?
    in_more_detail: |
      रॉबर्ट रोसेंथल और लेनोर जैकबसन ने शिक्षकों को झूठी जानकारी दी कि कुछ छात्र अकादमिक रूप से "खिलेंगे"। उन छात्रों—जिन्हें यादृच्छिक रूप से चुना गया था—ने वास्तव में दूसरों की तुलना में अधिक सुधार किया। शिक्षकों की अपेक्षाओं ने उनके व्यवहार (अधिक ध्यान, गर्मजोशी भरा प्रतिक्रिया) को प्रभावित किया, जिसने छात्र के प्रदर्शन को प्रभावित किया। अपेक्षाएँ वास्तविकता को आकार देती हैं।

      इसका विपरीत—कम अपेक्षाएँ जो खराब प्रदर्शन की ओर ले जाती हैं—को कभी-कभी गोल्लम प्रभाव कहा जाता है। दोनों दिखाते हैं कि दूसरों के बारे में हमारी मान्यताएँ उनके परिणामों को प्रभावित कर सकती हैं। इसके नेतृत्व, शिक्षा और पालन-पोषण के लिए गहरे निहितार्थ हैं।
    why_this_is_important: |
      पिग्मेलियन प्रभाव को समझने से आपको अपेक्षाओं की शक्ति का उपयोग करने में मदद मिलती है। उच्च अपेक्षाएँ, जिन्हें ईमानदारी से संप्रेषित किया जाता है, प्रदर्शन में सुधार कर सकती हैं। कम अपेक्षाएँ आत्म-पूर्ण विफलता पैदा कर सकती हैं। दूसरों के बारे में आपकी मान्यताएँ मायने रखती हैं।
    when_to_use:
      - नेतृत्व
      - संबंध_निर्माण
      - सीखना
      - निर्णय_निर्माण
    how_can_you_spot_it:
      expectation_performance_link: |
        जिनसे हम अधिक उम्मीद करते हैं, वे बेहतर प्रदर्शन करते हैं।
      differential_treatment: |
        हम अपनी अपेक्षाओं के आधार पर लोगों के साथ अलग-अलग व्यवहार करते हैं—अक्सर
        अनजाने में।
      self_fulfilling_prophecy: |
        क्षमता के बारे में मान्यताएँ उस व्यवहार को प्रभावित करती हैं जो क्षमता को आकार देता है।
      teacher_student_dynamics: |
        शिक्षक की अपेक्षाएँ अलग-अलग व्यवहार के माध्यम से छात्र के परिणामों को प्रभावित करती हैं।
    examples:
      education: |
        जो शिक्षक छात्रों से सफल होने की उम्मीद करते हैं, वे अधिक सहायता देते हैं;
        वे छात्र सुधार करते हैं। जो शिक्षक विफलता की उम्मीद करते हैं, वे
        अनजाने में इसे बना सकते हैं।
      workplace: |
        जो प्रबंधक अपने अधीनस्थों से उच्च प्रदर्शन की उम्मीद करते हैं, वे
        अधिक अवसर और प्रतिक्रिया प्रदान करते हैं; प्रदर्शन में सुधार होता है।
      parenting: |
        जो माता-पिता अपने बच्चों से जिम्मेदार होने की उम्मीद करते हैं, वे
        उन्हें अधिक जिम्मेदारी देते हैं; वे उस पर खरा उतरते हैं।
      stereotypes: |
        स्टीरियोटाइप थ्रेट इसका विपरीत है—नकारात्मक अपेक्षाएँ
        प्रदर्शन को कमजोर कर सकती हैं।
    real_world_implications: |
      पिग्मेलियन प्रभाव शिक्षा, प्रबंधन और रिश्तों को प्रभावित करता है। यह बताता है कि अपेक्षाओं को बढ़ाना—जब
      समर्थन के साथ किया जाता है—परिणामों में सुधार कर सकता है। यह यह भी चेतावनी देता है कि
      कम अपेक्षाएँ विनाशकारी हो सकती हैं।
    professional_application:
      networking_and_relationship_building: |
        लोगों से उच्च अपेक्षाएँ निर्धारित करें—और उन्हें पूरा करने के लिए समर्थन प्रदान करें।
        क्षमता में विश्वास करें। आपकी अपेक्षाएँ आपके व्यवहार को प्रभावित करती हैं, जो उनके परिणामों को प्रभावित करता है।
      collaborative_learning_initiative: |
        उच्च समर्थन के साथ उच्च अपेक्षाओं की संस्कृति बनाएँ।
        लोगों को "कम प्रदर्शन करने वाले" के रूप में लेबल करने से बचें, जो
        आत्म-पूर्ण हो जाते हैं। उन लोगों में निवेश करें जिनसे आप सफल होने की उम्मीद करते हैं।
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        ऐसी अपेक्षाएँ निर्धारित करना जो समर्थन के बिना पूरी करना असंभव हो,
        विफलता और हतोत्साहन पैदा करती हैं।
      blame_shifting: |
        "उन्होंने अपेक्षाओं को पूरा नहीं किया" जब हमने सफलता के लिए
        समर्थन या स्थितियाँ प्रदान नहीं कीं।
      ignoring_constraints: |
        अपेक्षाएँ अकेले संरचनात्मक बाधाओं को दूर नहीं करती हैं।
      pressure_without_support: |
        संसाधन या समर्थन के बिना उच्च अपेक्षाएँ हानिकारक हो सकती हैं।
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: माध्य की ओर वापसी (Regression to the Mean)
    quick_introduction: |
      माध्य की ओर वापसी (Regression to the mean) वह सांख्यिकीय घटना है जहाँ अत्यधिक परिणाम के बाद
      औसत के करीब के परिणाम आने की प्रवृत्ति होती है। असामान्य रूप से अच्छे या बुरे
      परिणाम के बाद, अगला परिणाम संभवतः कम चरम होगा - किसी भी कारण हस्तक्षेप के कारण नहीं,
      बल्कि यादृच्छिक भिन्नता के कारण।
    one_liner: अत्यधिक परिणाम के बाद औसत के करीब के परिणाम आने की प्रवृत्ति होती है।
    try_this:
      - वापसी को अपने हस्तक्षेप का श्रेय न दें - यह अक्सर वैसे भी हो जाता।
      - अत्यधिक परिणाम के बाद, अगले के कम चरम होने की अपेक्षा करें।
      - पूछें: क्या यह बदलाव मेरे किए गए कार्य के कारण है, या सिर्फ माध्य की ओर वापसी के कारण?
    ask_yourself:
      - क्या मैं उस चीज़ का श्रेय या दोष अपने हस्तक्षेप को दे रहा हूँ जो शायद यादृच्छिक भिन्नता हो?
      - क्या यह मेरे कार्य के बिना हुआ होता?
    in_more_detail: |
      यदि कोई छात्र एक परीक्षा में असामान्य रूप से उच्च अंक प्राप्त करता है, तो वे संभवतः
      अगले में अपने औसत के करीब अंक प्राप्त करेंगे - ऐसा इसलिए नहीं कि वे "आलसी हो गए"
      बल्कि इसलिए कि पहला अंक आंशिक रूप से भाग्य था। यही बात खेल प्रदर्शन, स्टॉक रिटर्न और
      व्यावसायिक मेट्रिक्स पर भी लागू होती है। हम अक्सर "वापसी" को उस चीज़ का श्रेय देते हैं
      जो हमने की (जैसे, दंड या पुरस्कार), जबकि यह वैसे भी हुआ होता।

      डैनियल काह्नमैन बताते हैं कि कैसे फ्लाइट प्रशिक्षकों ने गलती से निष्कर्ष निकाला कि
      प्रशंसा ने प्रदर्शन को खराब कर दिया और आलोचना ने इसे बेहतर बनाया - वे अत्यधिक प्रदर्शन के बाद
      माध्य की ओर वापसी का अवलोकन कर रहे थे।
    why_this_is_important: |
      माध्य की ओर वापसी को समझना कारणता को गलत श्रेय देने से रोकता है। यह
      आपको आउटलेर्स पर अधिक प्रतिक्रिया करने और शोर के आधार पर परिवर्तन करने से बचने में मदद करता है।
      यह हस्तक्षेपों और प्रदर्शन के मूल्यांकन के लिए आवश्यक है।
    when_to_use:
      - निर्णय-लेना (decision_making)
      - निवेश (investing)
      - जोखिम_मूल्यांकन (risk_assessment)
      - नेतृत्व (leadership)
    how_can_you_spot_it:
      extreme_followed_by_average: |
        एक असामान्य रूप से अच्छा या बुरा परिणाम औसत के करीब परिणाम से होता है।
      spurious_causation: |
        "सुधार" या "गिरावट" का श्रेय एक हस्तक्षेप को देना जब वापसी वैसे भी होती।
      overreaction_to_outliers: |
        एकल अत्यधिक डेटा बिंदु के आधार पर नीति या व्यक्तिगत परिवर्तन करना।
      reward_punishment_confusion: |
        यह विश्वास करना कि सजा "काम कर गई" जब सुधार केवल वापसी थी।
    examples:
      sports: |
        एक खिलाड़ी का करियर गेम होता है, फिर वह औसत पर लौट आता है - प्रशंसक "आत्मसंतुष्टि" को दोष दे सकते हैं।
      investing: |
        एक स्टॉक का एक शानदार वर्ष होता है, फिर वह वापस आता है - निवेशक गिरावट को
        खराब प्रबंधन का श्रेय दे सकते हैं जब यह आंशिक रूप से वापसी है।
      performance_reviews: |
        एक कर्मचारी का एक बुरा तिमाही होता है, उसे प्रतिक्रिया मिलती है, वह सुधार करता है - प्रतिक्रिया को
        क्रेडिट मिल सकता है जब वापसी वैसे भी हुई होती।
      medicine: |
        एक मरीज को बुरा लगता है, वह एक उपचार लेता है, वह सुधार करता है - उपचार को
        क्रेडिट मिल सकता है जब कुछ सुधार स्वाभाविक था।
    real_world_implications: |
      माध्य की ओर वापसी हमारे शिक्षकों, डॉक्टरों, फंड मैनेजरों और खुद का मूल्यांकन करने के तरीके को प्रभावित करती है। यह बताती है कि "जो ऊपर जाता है उसे नीचे आना चाहिए" अक्सर सांख्यिकीय रूप से क्यों लागू होता है। इसे गलत समझना बर्बाद हस्तक्षेपों और उपायों में झूठे आत्मविश्वास की ओर ले जाता है।
    professional_application:
      networking_and_relationship_building: |
        एकल बुरी बातचीत पर अधिक व्याख्या न करें - यह एक आउटलेर हो सकता है जो रिश्ते के माध्य की ओर वापस आ जाएगा।
      collaborative_learning_initiative: |
        हस्तक्षेपों (प्रशिक्षण, प्रक्रिया परिवर्तन) का मूल्यांकन करते समय, प्रभाव को वापसी से अलग करने के लिए नियंत्रण समूहों
        और कई डेटा बिंदुओं का उपयोग करें।
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        यह मान लेना कि किसी हस्तक्षेप के बाद कोई भी सुधार "सिर्फ वापसी" है
        जबकि वास्तविक प्रभाव मौजूद हैं।
      underreacting: |
        यह सोचकर कि "यह माध्य की ओर वापस आ जाएगा" वास्तविक समस्याओं को नज़रअंदाज़ करना।
      statistical_illiteracy: |
        वापसी को एक ऐसी शक्ति के साथ भ्रमित करना जो परिणामों को "सही" करती है - यह सिर्फ
        प्रायिकता है।
      overconfidence: |
        यह मान लेना कि माध्य स्थिर है जब अंतर्निहित प्रक्रिया बदल गई हो।
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: गुलाबी पश्चदृष्टि
    quick_introduction: |
      गुलाबी पश्चदृष्टि वह प्रवृत्ति है जिसमें हम अतीत को जैसा था उससे बेहतर याद करते हैं।
      समय के साथ हम पिछली घटनाओं को अधिक सकारात्मक रूप से याद करते हैं, कठिनाइयों को कम करके और अच्छी बातों को बढ़ा-चढ़ाकर। "सुनहरे पुराने दिन" अक्सर उतने अच्छे नहीं होते थे जितना हम याद करते हैं।
    one_liner: हम अतीत को जैसा था उससे बेहतर याद करते हैं—"सुनहरे पुराने दिन" उतने अच्छे नहीं थे।
    try_this:
      - अतीत की तुलना करते समय, पूछें: मैं उस समय वास्तव में कैसा महसूस कर रहा था?
      - बाद में स्मृति की वास्तविकता से तुलना करने के लिए एक पत्रिका रखें।
      - ध्यान दें कि कब पुरानी यादें वर्तमान के आपके निर्णय को रंग रही हैं।
    ask_yourself:
      - क्या मैं अतीत का आदर्शीकरण कर रहा हूँ?
      - यदि मैं समय में पीछे यात्रा कर सकता तो क्या मैं तब खुश होता?
    in_more_detail: |
      हम पिछली घटनाओं के सकारात्मक पहलुओं को याद रखने और नकारात्मक को भूलने या कम करने की प्रवृत्ति रखते हैं। छुट्टियाँ, नौकरियाँ और रिश्ते पुरानी यादों में उस समय की तुलना में बेहतर लगते हैं जब वे वास्तव में हो रहे थे। इससे अवास्तविक तुलनाएँ हो सकती हैं—हम वर्तमान का मूल्यांकन एक आदर्शित अतीत से करते हैं।

      जब हम पिछली पसंदों को उसी (याद की गई) परिणाम की उम्मीद में दोहराते हैं तो गुलाबी पश्चदृष्टि निर्णय लेने को प्रभावित करती है। यह पुरानी यादों को भी बढ़ावा दे सकती है उन युगों के लिए जो वस्तुनिष्ठ रूप से बदतर थे। यह स्मृति में नकारात्मक पूर्वाग्रह के विपरीत है।
    why_this_is_important: |
      गुलाबी पश्चदृष्टि को पहचानना आपको अधिक यथार्थवादी तुलना करने और आदर्शीकृत यादों के आधार पर पिछली गलतियों को दोहराने से बचने में मदद करता है। यह यह भी बताता है कि हम वर्तमान प्रगति के बावजूद कभी-कभी अतीत के लिए क्यों तरसते हैं।
    when_to_use:
      - निर्णय_लेना
      - करियर_निर्णय
      - रिश्ता_बनाना
      - सीखना
    how_can_you_spot_it:
      idealized_past: |
        "उस समय चीजें बेहतर थीं" जबकि वस्तुनिष्ठ माप अन्यथा दिखा सकते हैं।
      selective_positive_memory: |
        पिछली घटनाओं से अच्छी बातों को याद रखना और बुरी बातों को भूल जाना।
      nostalgia_as_evidence: |
        पुरानी पसंदों को सही साबित करने के लिए सुखद यादों का उपयोग करना।
      present_undervaluation: |
        वर्तमान का मूल्यांकन जितना है उससे बदतर लगता है क्योंकि हम एक आदर्शित अतीत से तुलना करते हैं।
    examples:
      career: |
        "मेरी पुरानी नौकरी बहुत बढ़िया थी" जबकि आपने अच्छे कारणों से उसे छोड़ दिया था—स्मृति ने निराशाओं को कम कर दिया है।
      relationships: |
        किसी पुराने रिश्ते के बारे में "हम बहुत खुश थे"—उन संघर्षों को भूल जाना जिन्होंने उसके अंत का नेतृत्व किया।
      childhood: |
        "मेरे समय में बच्चों का जीवन बेहतर था" जबकि कई वस्तुनिष्ठ माप (स्वास्थ्य, सुरक्षा, अवसर) में सुधार हुआ है।
      projects: |
        "वह परियोजना सुचारू रूप से चली" जबकि इसमें वास्तव में कई देरी हुई थी—हम परिणाम याद रखते हैं, प्रक्रिया नहीं।
    real_world_implications: |
      गुलाबी पश्चदृष्टि जीवन की संतुष्टि, करियर निर्णयों और पुरानी यादों से प्रेरित विकल्पों को प्रभावित करती है। इससे पिछली गलतियों को दोहराया जा सकता है या अवास्तविक तुलनाएँ हो सकती हैं। यह "सुनहरे पुराने दिनों में वापसी" बयानबाजी की अपील की भी व्याख्या करता है।
    professional_application:
      networking_and_relationship_building: |
        जब पिछले सहकर्मियों से फिर से जुड़ने या पिछली भूमिकाओं पर लौटने पर विचार कर रहे हों, तो पुरानी यादों को वास्तविकता से अलग करें। छोड़ने के कारणों को उस समय ही दर्ज करें; लौटने से पहले उनकी समीक्षा करें।
      collaborative_learning_initiative: |
        पिछली समीक्षाओं में, जो वास्तव में हुआ उसका मूल्यांकन करने के लिए स्मृति के बजाय तत्कालीन नोट्स या डेटा का उपयोग करें। स्मृति कठिनाइयों को कम कर देती है।
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        सभी पुरानी यादें भ्रामक नहीं होतीं—कभी-कभी अतीत कुछ मायनों में वास्तव में बेहतर होता था।
      invalidating_memories: |
        लोगों को यह बताना कि उनकी सकारात्मक यादें "गलत" हैं, जबकि वे वास्तविक व्यक्तिपरक अनुभव को दर्शा सकती हैं।
      overcorrection: |
        यह मान लेना कि अतीत हमेशा हमारे याद करने से बदतर था—कभी-कभी यह बेहतर था।
      present_bias: |
        वर्तमान गिरावट के बारे में वैध चिंताओं को खारिज करने के बहाने के रूप में गुलाबी पश्चदृष्टि का उपयोग करना।
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: प्रमुखता पूर्वाग्रह
    quick_introduction: |
      प्रमुखता पूर्वाग्रह किसी स्थिति के सबसे प्रमुख या ध्यान देने योग्य पहलुओं पर ध्यान केंद्रित करने की प्रवृत्ति है, जबकि कम स्पष्ट लेकिन संभावित रूप से महत्वपूर्ण कारकों को नजरअंदाज कर दिया जाता है। जो सामने आता है, उसे हमारे निर्णयों में असंगत ध्यान और भार मिलता है।
    one_liner: जो सामने आता है, उसे असंगत ध्यान मिलता है—सूक्ष्म चीजें नजरअंदाज हो जाती हैं।
    try_this:
      - पूछें: मैं ऐसा क्या नहीं देख पा रहा हूँ क्योंकि वह प्रमुख नहीं है?
      - निर्णय लेने से पहले कम स्पष्ट कारकों की सक्रिय रूप से तलाश करें।
      - ध्यान दें कि कब कोई ज्वलंत या नाटकीय तत्व आपके निर्णय पर हावी हो रहा है।
    ask_yourself:
      - क्या मैं प्रमुख चीजों को अधिक महत्व दे रहा हूँ और सूक्ष्म चीजों को कम?
      - मैं किन महत्वपूर्ण कारकों को नजरअंदाज कर सकता हूँ?
    in_more_detail: |
      प्रमुख जानकारी ज्वलंत, भावनात्मक रूप से आवेशित या हाल ही में सामने आई होती है। यह ध्यान आकर्षित करती है और जितना इसे करना चाहिए उससे अधिक निर्णयों को प्रभावित करती है। हम स्पष्ट को अधिक महत्व देते हैं और सूक्ष्म को कम। एक नाटकीय घटना या ज्वलंत उदाहरण हमारी सोच पर हावी हो सकता है, भले ही वह प्रतिनिधि न हो।

      प्रमुखता पूर्वाग्रह उपलब्धता अनुमान (जो दिमाग में आता है) और हालियापन पूर्वाग्रह (जो हाल ही में हुआ) के साथ ओवरलैप होता है। यह जोखिम धारणा, भर्ती और रणनीति को प्रभावित करता है। सबसे दिखाई देने वाली समस्याओं का समाधान किया जाता है; अदृश्य समस्याएं बनी रहती हैं।
    why_this_is_important: |
      प्रमुखता पूर्वाग्रह को पहचानना आपको स्पष्ट से परे देखने और कम दिखाई देने वाले कारकों पर विचार करने में मदद करता है। यह जोखिम मूल्यांकन, समस्या निदान और निर्णय की गुणवत्ता में सुधार करता है। महत्वपूर्ण चीजें हमेशा प्रमुख नहीं होती हैं।
    when_to_use:
      - निर्णय_प्रक्रिया
      - समस्या_समाधान
      - जोखिम_मूल्यांकन
      - नेतृत्व
    how_can_you_spot_it:
      prominent_factor_dominance: |
        सबसे ध्यान देने योग्य पहलू निर्णय को संचालित करता है।
      overlooking_background: |
        कम दिखाई देने वाले कारकों को उनके महत्व के बावजूद नजरअंदाज कर दिया जाता है।
      vividness_overweighting: |
        नाटकीय या भावनात्मक जानकारी को असंगत भार मिलता है।
      visibility_bias: |
        जो हम आसानी से देख या माप सकते हैं, उसे उससे अधिक ध्यान मिलता है जो हम नहीं कर सकते।
    examples:
      risk: |
        एक हवाई जहाज दुर्घटना प्रमुख है—हम उड़ान जोखिम को अधिक आंकते हैं। कार दुर्घटनाएं कुल मिलाकर कम प्रमुख हैं—हम ड्राइविंग जोखिम को कम आंकते हैं।
      hiring: |
        एक उम्मीदवार के प्रस्तुति कौशल प्रमुख हैं; उनका अनुवर्ती कार्य कम दिखाई देने वाला हो सकता है, लेकिन उतना ही महत्वपूर्ण है।
      strategy: |
        प्रतिद्वंद्वी की चालें प्रमुख हैं; धीरे-धीरे होने वाले बाजार परिवर्तन कम ध्यान देने योग्य हैं, लेकिन अधिक महत्वपूर्ण हो सकते हैं।
      problems: |
        सबसे तेज शिकायत का समाधान किया जाता है, जबकि प्रणालीगत मुद्दों पर ध्यान नहीं दिया जाता है।
    real_world_implications: |
      प्रमुखता पूर्वाग्रह प्रभावित करता है कि क्या ध्यान, धन और कार्रवाई प्राप्त करता है। यह कारणों के बजाय लक्षणों को संबोधित करने और संसाधनों के गलत आवंटन का कारण बन सकता है। जानबूझकर गैर-प्रमुख जानकारी की तलाश निर्णय में सुधार करती है।
    professional_application:
      networking_and_relationship_building: |
        लोगों को केवल उनके सबसे दिखाई देने वाले गुणों से न आंकें। कम स्पष्ट गुणों की तलाश करें—विश्वसनीयता, निरंतरता, वे उन लोगों के साथ कैसा व्यवहार करते हैं जो उनकी मदद नहीं कर सकते।
      collaborative_learning_initiative: |
        समस्या-समाधान में, स्पष्ट रूप से पूछें "हम क्या नहीं देख रहे हैं?" और "क्या कम स्पष्ट लेकिन महत्वपूर्ण है?" ऐसी प्रक्रियाएं बनाएं जो गैर-प्रमुख मुद्दों को सामने लाएँ।
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        कभी-कभी जो प्रमुख है वह महत्वपूर्ण होता है। हर स्पष्ट चीज को खारिज न करें।
      false_sophistication: |
        यह मान लेना कि अस्पष्ट कारक हमेशा स्पष्ट कारकों से अधिक महत्वपूर्ण होते हैं।
      analysis_paralysis: |
        इतने सारे गैर-प्रमुख कारकों की तलाश करना कि आप कभी भी प्रमुख कारकों पर कार्य न करें।
      contrarianism: |
        सिर्फ अलग होने के लिए प्रमुख जानकारी को अस्वीकार करना।
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: कमी का पूर्वाग्रह
    quick_introduction: |
      कमी का पूर्वाग्रह उन चीज़ों को अधिक महत्व देने की प्रवृत्ति है जब वे दुर्लभ या सीमित दिखाई देती हैं। "सीमित समय," "केवल 3 बचे हैं," और "विशेष पहुंच" तात्कालिकता और इच्छा को ट्रिगर करते हैं, जो अक्सर इस बात के तर्कसंगत मूल्यांकन को ओवरराइड करते हैं कि हमें वास्तव में चीज़ की आवश्यकता है या नहीं।
    one_liner: कमी कथित मूल्य को बढ़ाती है—"सीमित" तर्कसंगतता पर तात्कालिकता को ट्रिगर करती है।
    try_this:
      - पूछें: क्या मैं इसे चाहता, अगर यह दुर्लभ न होता? तात्कालिकता को दूर करें।
      - सीमित समय या केवल X बचे हैं के प्रस्तावों पर कार्रवाई करने से पहले रुकें।
      - ध्यान दें कि कमी आपकी इच्छा को वास्तविक मूल्य से अधिक क्यों चला रही है।
    ask_yourself:
      - क्या मैं इसे इसलिए महत्व दे रहा हूं क्योंकि यह दुर्लभ है, या क्योंकि मुझे वास्तव में इसकी आवश्यकता है?
      - क्या मैं कमी की फ्रेमिंग के बिना यह निर्णय लेता?
    in_more_detail: |
      कमी कथित मूल्य को बढ़ाती है। जब कोई चीज़ दुर्लभ या गायब हो रही होती है, तो हम उसे अधिक चाहते हैं—आंशिक रूप से इसलिए कि कमी गुणवत्ता का संकेत दे सकती है, और आंशिक रूप से इसलिए कि नुकसान से बचने की प्रवृत्ति हमें कुछ खोने से डरने पर मजबूर करती है। विपणक और वार्ताकार तात्कालिकता पैदा करने के लिए कमी का उपयोग करते हैं। पूर्वाग्रह आवेगपूर्ण निर्णयों, अधिक खर्च और खराब प्राथमिकताकरण की ओर ले जा सकता है।

      कमी उन लोगों की संज्ञानात्मक बैंडविड्थ को भी प्रभावित करती है जो वास्तव में संसाधन-बाधित हैं; गरीबी अन्य निर्णयों के लिए "मानसिक बैंडविड्थ" को कम कर सकती है।
    why_this_is_important: |
      कमी पूर्वाग्रह को पहचानना आपको जोड़ तोड़ की रणनीति का विरोध करने और अधिक जानबूझकर विकल्प चुनने में मदद करता है। यह यह भी बताता है कि हम सीमित संस्करणों को अधिक महत्व क्यों देते हैं और जब हमें आवश्यकता नहीं होती है तो जल्दबाजी क्यों करते हैं।
    when_to_use:
      - निर्णय_निर्माण
      - वार्ता
      - निवेश
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      urgency_trigger: |
        "सीमित समय" या "केवल X बचे हैं" अत्यधिक इच्छा पैदा करता है।
      fear_of_missing_out: |
        पहुंच खोने की संभावना कार्रवाई को उसके आंतरिक मूल्य से अधिक संचालित करती है।
      impulsive_purchases: |
        चीज़ें इसलिए खरीदना क्योंकि वे दुर्लभ हैं, बजाय इसके कि आपको उनकी आवश्यकता है।
      artificial_scarcity: |
        कमी निर्मित होती है (जैसे, नकली काउंटडाउन) न कि वास्तविक।
    examples:
      sales: |
        "स्टॉक में केवल 2 बचे हैं" या "बिक्री आज रात समाप्त हो रही है" ऐसी खरीदारी को ट्रिगर करता है जो तात्कालिकता के बिना नहीं होती।
      auctions: |
        बोली लगाने वाले जीतने में फंस जाते हैं और प्रतिस्पर्धी कमी के कारण अपनी योजना से अधिक भुगतान करते हैं।
      exclusivity: |
        "केवल सदस्यों के लिए" या "केवल आमंत्रण" पहुंच कथित मूल्य को बढ़ाती है।
      genuine_scarcity: |
        जब संसाधन वास्तव में सीमित होते हैं, तो कमी के तनाव में लोग खराब निर्णय लेते हैं (जैसे, गरीब, समय-दबाव वाले)।
    real_world_implications: |
      कमी पूर्वाग्रह उपभोक्ता व्यवहार, वार्ता के परिणामों और नीतिगत प्रतिक्रियाओं को संचालित करता है। इसका उपयोग नैतिक रूप से (जैसे, वैध समय सीमा) या अनैतिक रूप से (जैसे, नकली कमी) किया जा सकता है। इसे समझना निर्णय की गुणवत्ता में सुधार करता है।
    professional_application:
      networking_and_relationship_building: |
        सावधान रहें जब अन्य लोग कृत्रिम कमी पैदा करते हैं ("मैं केवल कुछ ही ग्राहक ले रहा हूं")। सत्यापित करें कि कमी वास्तविक है या नहीं। रिश्ते बनाते समय, आपके समय की वास्तविक कमी मूल्य का संकेत दे सकती है—लेकिन अत्यधिक उपयोग जोड़ तोड़ महसूस कराता है।
      collaborative_learning_initiative: |
        पहलों के लिए तात्कालिकता पैदा करते समय, सुनिश्चित करें कि यह वैध है। नकली समय सीमाएं खोजे जाने पर विश्वास को कम करती हैं।
    how_can_this_be_misapplied:
      manipulation: |
        दूसरों को निर्णयों में दबाव डालने के लिए जानबूझकर झूठी कमी पैदा करना।
      impulsive_decisions: |
        कृत्रिम तात्कालिकता के तहत महत्वपूर्ण विकल्प बनाना जब अधिक समय से परिणाम बेहतर होते।
      overvaluing_scarcity: |
        यह मानना ​​कि दुर्लभ चीजें हमेशा बेहतर होती हैं—कभी-कभी कमी मनमानी होती है।
      exploiting_vulnerability: |
        संसाधन तनाव के तहत पहले से मौजूद लोगों पर कमी की रणनीति का उपयोग करना।
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: द्वितीय-क्रम सोच
    quick_introduction: |
      द्वितीय-क्रम सोच आपके कार्यों के परिणामों के परिणामों पर विचार करने का अभ्यास है। प्रथम-क्रम सोच पूछती है "अगर मैं X करता हूँ तो क्या होगा?" द्वितीय-क्रम सोच पूछती है "और फिर क्या?" और "और उसके बाद फिर क्या?" यह अनपेक्षित प्रभावों को सामने लाता है।
    one_liner: और फिर क्या? पूछें - परिणामों के परिणामों पर विचार करें।
    try_this:
      - किसी भी निर्णय के लिए, कम से कम दो बार और फिर क्या? पूछें।
      - विचार करें कि दूसरे आपके कार्य पर कैसे प्रतिक्रिया करेंगे - और फिर उस प्रतिक्रिया पर।
      - ध्यान दें कि प्रथम-क्रम प्रभाव श्रृंखला में कैसे उलटते हैं या जटिल हो जाते हैं।
    ask_yourself:
      - क्या मैंने द्वितीय-क्रम (और तृतीय-क्रम) प्रभावों के बारे में सोचा है?
      - मैं किन अनपेक्षित परिणामों को छूट दे रहा हूँ?
    in_more_detail: |
      हावर्ड मार्क्स ने निवेश में इस अवधारणा को लोकप्रिय बनाया। प्रथम-क्रम: "यह बढ़ेगा।" द्वितीय-क्रम: "अगर यह बढ़ता है, तो दूसरे इसे नोटिस करेंगे, और अधिक खरीदेंगे, यह और बढ़ेगा - जब तक कि यह अत्यधिक मूल्यवान न हो जाए और गिर न जाए।" परिणामों की श्रृंखला अक्सर प्रथम-क्रम प्रभाव को उलट देती है या जटिल बना देती है।

      द्वितीय-क्रम सोच कठिन है - इसके लिए अधिक मानसिक प्रयास और कल्पना की आवश्यकता होती है। लेकिन यह कई गलतियों को रोकता है। अच्छे रणनीतिकार कई कदम आगे सोचते हैं और विचार करते हैं कि दूसरे कैसे प्रतिक्रिया करेंगे।
    why_this_is_important: |
      द्वितीय-क्रम सोच अनपेक्षित परिणामों को रोकती है और निर्णय की गुणवत्ता में सुधार करती है। यह रणनीति, नीति और किसी भी डोमेन के लिए आवश्यक है जहाँ क्रियाएं प्रतिक्रियाएं ट्रिगर करती हैं।
    when_to_use:
      - निर्णय_लेना
      - समस्या_समाधान
      - रणनीति
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      consequence_chains: |
        "अगर मैं X करता हूँ, तो Y होगा, फिर Z होगा..."
      reaction_anticipation: |
        विचार करना कि दूसरे आपके कार्य पर कैसे प्रतिक्रिया करेंगे।
      unintended_effects: |
        साइड इफेक्ट और फीडबैक लूप की तलाश करना।
      reversals: |
        द्वितीय-क्रम प्रभाव जो प्रथम-क्रम प्रभावों का खंडन करते हैं या उन्हें उलट देते हैं।
    examples:
      investing: |
        "अगर हर कोई सोचता है कि यह एक अच्छा निवेश है, तो यह शायद भीड़भाड़ वाला है - किनारा चला गया हो सकता है।"
      policy: |
        "अगर हम X पर सब्सिडी देते हैं, तो मांग बढ़ती है, कीमतें बढ़ती हैं - क्या सब्सिडी वास्तव में मदद करती है?"
      negotiation: |
        "अगर मैं यहां जोर से दबाव डालता हूं, तो वे वहां जवाबी कार्रवाई करेंगे - शुद्ध प्रभाव क्या है?"
      incentives: |
        "अगर हम इस मीट्रिक को पुरस्कृत करते हैं, तो लोग इसमें हेरफेर करेंगे - वे वास्तव में क्या करेंगे?"
    real_world_implications: |
      द्वितीय-क्रम सोच रणनीतिक सोच की पहचान है। यह नीतिगत विफलताओं, अनपेक्षित प्रोत्साहनों और भोले आशावाद को रोकता है। यह अच्छे से महान निर्णय लेने वालों को अलग करता है।
    professional_application:
      networking_and_relationship_building: |
        कोई कार्रवाई करने से पहले, पूछें "वे कैसे प्रतिक्रिया करेंगे? और मैं उस पर कैसे प्रतिक्रिया करूंगा?" केवल तत्काल आदान-प्रदान पर ही नहीं, बल्कि संबंध की गतिशीलता पर भी विचार करें।
      collaborative_learning_initiative: |
        योजना बनाते समय, "और फिर क्या?" अभ्यास चलाएं। परिणाम श्रृंखलाओं को मैप करें। अनपेक्षित प्रभावों के सतह पर आने से पहले उन्हें पहचानें।
    how_can_this_be_misapplied:
      analysis_paralysis: |
        इतने आगे के कदमों के बारे में सोचना कि आप कभी कार्य नहीं करते।
      false_complexity: |
        यह मानना कि द्वितीय-क्रम प्रभाव हमेशा हावी रहते हैं जब प्रथम-क्रम प्रभाव पर्याप्त हो सकते हैं।
      overconfidence: |
        यह विश्वास करना कि आप अनिश्चितता बढ़ने पर लंबी श्रृंखलाओं की भविष्यवाणी कर सकते हैं।
      pessimism: |
        हमेशा परिणामों की श्रृंखला में सबसे बुरा सोचना।
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: डूबी लागत का भ्रम (Sunk Cost Fallacy)
    quick_introduction: |
      डूबी लागत का भ्रम (Sunk Cost Fallacy) वह प्रवृत्ति है जिसके कारण हम किसी निर्णय में निवेश जारी रखते हैं, जो पहले से खर्च किए गए संसाधनों पर आधारित होता है, न कि भविष्य में अपेक्षित लाभ पर। "हम यहाँ तक आ गए हैं" या "मैं पहले ही बहुत कुछ निवेश कर चुका हूँ" जैसी बातें खराब में और भी पैसा लगाने का कारण बनती हैं।
    one_liner: पिछली की गई निवेश बेकार है—केवल भविष्य की लागतें और लाभ मायने रखते हैं।
    try_this:
      - पूछें: अगर मैं आज शुरुआत कर रहा होता, तो क्या मैं यह रास्ता चुनता?
      - बंद करने के मानदंड (kill criteria) पहले से तय करें—वे स्थितियाँ जिनमें आप रुक जाएँगे।
      - सीमांत निर्णय (marginal decision) का मूल्यांकन करें: यहाँ से आगे मुझे क्या मिलेगा या क्या खोऊंगा?
    ask_yourself:
      - क्या मैं भविष्य के मूल्य के कारण जारी रख रहा हूँ, या पिछले निवेश को सही ठहराने के लिए?
      - मैं किसी ऐसे मित्र को क्या सलाह दूँगा जो शून्य से मेरी स्थिति में हो?
    in_more_detail: |
      डूबी लागतें वे पिछली लागतें हैं जिन्हें वापस नहीं पाया जा सकता। तर्कसंगत निर्णय लेना उन्हें अनदेखा करता है—केवल भविष्य की लागतें और लाभ मायने रखते हैं। लेकिन हम अपने निवेशों से भावनात्मक रूप से जुड़ जाते हैं। हम वह भोजन खत्म करते हैं जिसका हम आनंद नहीं ले रहे हैं, वह फिल्म देखते रहते हैं जो हमें पसंद नहीं है, और उन परियोजनाओं को जारी रखते हैं जिनका अब कोई मतलब नहीं है। हम यह "बर्बाद नहीं करना" चाहते कि हमने क्या लगाया है, लेकिन जारी रखने से अक्सर और अधिक बर्बादी होती है।

      यह भ्रम विशेष रूप से तब प्रबल होता है जब हमने पैसे के अलावा समय, प्रयास या पहचान का निवेश किया हो। यह स्वीकार करना कि हम गलत थे, महंगा लग सकता है, इसलिए हम और अधिक दांव लगाते हैं।
    why_this_is_important: |
      डूबी लागत के भ्रम को पहचानना आपको नुकसान को कम करने, उचित होने पर दिशा बदलने और पिछले निवेश के बजाय भविष्य के मूल्य के आधार पर निर्णय लेने में मदद करता है। यह परियोजनाओं, करियर और रिश्तों के लिए आवश्यक है।
    when_to_use:
      - निर्णय_लेना
      - निवेश
      - करियर_परिवर्तन
      - जोखिम_मूल्यांकन
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "हम अभी रुक नहीं सकते—हमने पहले ही X खर्च कर दिया है" कहना, जबकि भविष्य के लाभ जारी रखने को उचित नहीं ठहराते।
      escalation_of_commitment: |
        पिछले निवेश को सही ठहराने या "बचाने" के लिए और अधिक निवेश करना।
      identity_investment: |
        जारी रखना क्योंकि विफलता स्वीकार करने से आत्म-छवि को खतरा होगा।
      ignoring_marginal_analysis: |
        कुल लागत के आधार पर निर्णय लेना, न कि अतिरिक्त लागत और लाभ के आधार पर।
    examples:
      projects: |
        एक असफल परियोजना को जारी रखना क्योंकि "हमने इस पर पहले ही 6 महीने खर्च कर दिए हैं", जबकि नुकसान को कम करना तर्कसंगत होगा।
      relationships: |
        किसी रिश्ते में बने रहना क्योंकि "हम 5 साल से साथ हैं", बजाय भविष्य का मूल्यांकन करने के।
      careers: |
        एक ऐसे करियर में बने रहना जो आपको पसंद नहीं है क्योंकि आपने डिग्री या वर्षों के अनुभव में निवेश किया है।
      investments: |
        "वापस बराबर आने" के लिए एक घाटे वाले स्टॉक को रखना, बजाय बेहतर अवसरों में पुन: आवंटित करने के।
    real_world_implications: |
      डूबी लागत का भ्रम संसाधनों की बर्बादी, लंबे समय तक चलने वाली विफलताओं और छूटे हुए अवसरों का कारण बनता है। यह व्यक्तियों, संगठनों और सरकारों को प्रभावित करता है। इसे दूर करने के लिए स्पष्ट निर्णय ढांचे की आवश्यकता होती है।
    professional_application:
      networking_and_relationship_building: |
        उन रिश्तों या सहयोगों में निवेश जारी न रखें जो अब आपके लिए फायदेमंद नहीं हैं, केवल पिछले निवेश के कारण। आगे की ओर देखने वाले मूल्य का मूल्यांकन करें।
      collaborative_learning_initiative: |
        परियोजनाओं के लिए "बंद करने के मानदंड" (kill criteria) बनाएं—वे स्थितियाँ जिनमें आप पिछले निवेश की परवाह किए बिना रुक जाएँगे। "शून्य से" (from zero) लेंस के साथ परियोजनाओं की नियमित रूप से समीक्षा करें।
    how_can_this_be_misapplied:
      quitting_too_early: |
        उन चीजों को छोड़ने के बहाने के रूप में "डूबी लागत" का उपयोग करना जिन्हें भुगतान करने में अधिक समय की आवश्यकता है।
      undervaluing_consistency: |
        कुछ प्रतिबद्धताओं (जैसे, रिश्ते, प्रतिष्ठा) में निरंतरता का मूल्य होता है जिसे शुद्ध सीमांत विश्लेषण (marginal analysis) अनदेखा कर देता है।
      cold_rationality: |
        भावनात्मक जुड़ाव को अतार्किक कहकर खारिज करना जब यह वास्तविक मूल्यों को दर्शा सकता है।
      analysis_paralysis: |
        यह तय करने में अत्यधिक सोचना कि जारी रखना है या नहीं, जब उत्तर स्पष्ट हो।
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: उत्तरजीविता पूर्वाग्रह (Survivorship Bias)
    quick_introduction: |
      उत्तरजीविता पूर्वाग्रह एक तार्किक त्रुटि है जो उन लोगों या चीज़ों पर ध्यान केंद्रित करती है जो किसी प्रक्रिया में "जीवित" रहीं, जबकि उन पर ध्यान नहीं देती जो नहीं बचीं। हम विजेताओं को देखते हैं और हारने वालों को भूल जाते हैं, जिससे सफलता और विफलता के बारे में अत्यधिक आशावादी निष्कर्ष निकलते हैं।
    one_liner: हम विजेताओं को देखते हैं और हारने वालों को भूल जाते हैं—जिससे अत्यधिक आशावादी निष्कर्ष निकलते हैं।
    try_this:
      - पूछें: किसी समान काम को करने में कौन असफल हुआ? हम उनसे क्या सीख सकते हैं?
      - अदृश्य नमूने की तलाश करें—उन लोगों की जिन्होंने जीवित नहीं रहे।
      - जब आप केवल सफलता की कहानियों का अध्ययन कर रहे हों तो ध्यान दें।
    ask_yourself:
      - क्या मैं केवल जीवित बचे लोगों से सीख रहा हूँ?
      - यदि मैं विफलताओं को शामिल करूँ तो पूरी तस्वीर कैसी दिखेगी?
    in_more_detail: |
      द्वितीय विश्व युद्ध के दौरान, सांख्यिकीविद् अब्राहम वाल्ड ने जीवित बचे विमानों पर लगी चोटों का विश्लेषण करके बमवर्षकों पर कवच के स्थान को ठीक किया—और वहाँ कवच लगाने की सिफारिश की जहाँ *गैर*-जीवित बचे विमानों को चोट लगी थी, क्योंकि वे विमान कभी वापस नहीं आए। हम स्वाभाविक रूप से दृश्य नमूने (जीवित बचे) पर ध्यान केंद्रित करते हैं और अदृश्य (जो असफल रहे) को अनदेखा करते हैं।

      उत्तरजीविता पूर्वाग्रह उद्यमशीलता, निवेश, करियर और इतिहास के बारे में हमारे दृष्टिकोण को विकृत करता है। हम सफल कंपनियों का अध्ययन करते हैं और उन हज़ारों को भूल जाते हैं जो समान काम करते हुए असफल हो गईं। हम भाग्यवानों की सुनते हैं और दुर्भाग्यवानों को भूल जाते हैं।
    why_this_is_important: |
      उत्तरजीविता पूर्वाग्रह के लिए सुधार अधिक यथार्थवादी अपेक्षाओं और बेहतर निर्णयों की ओर ले जाता है। यह आपको केवल सफलताओं से नहीं, बल्कि विफलताओं से भी सीखने में मदद करता है, और उन रणनीतियों को कॉपी करने से बचाता है जो केवल कुछ भाग्यवानों के लिए काम करती थीं।
    when_to_use:
      - निर्णय_लेना (decision_making)
      - निवेश (investing)
      - करियर_बदलाव (career_moves)
      - सीखना (learning)
    how_can_you_spot_it:
      visible_success_stories: |
        हम सफल लोगों के बारे में उन लोगों की तुलना में कहीं अधिक सुनते हैं जिन्होंने कोशिश की और असफल रहे।
      missing_failures: |
        हमारे द्वारा देखे जाने वाले नमूने में वे लोग शामिल नहीं होते हैं जो "सफल नहीं हुए" और इसलिए अपनी कहानियाँ नहीं सुना सकते।
      copying_survivors: |
        यह मानना कि जो जीवित बचे लोगों ने किया, उसी से उनकी सफलता मिली, जबकि यह भाग्य या उत्तरजीविता भी हो सकता है।
      overly_optimistic_models: |
        सफलता की दर का अनुमान जो प्रयासों के भाजक (denominator) को अनदेखा करता है।
    examples:
      entrepreneurship: |
        "ज़करबर्ग की तरह कॉलेज छोड़ दो" उन कई कॉलेज छोड़ने वालों को अनदेखा करता है जिन्होंने अरबों डॉलर की कंपनियाँ नहीं बनाईं।
      investing: |
        केवल उन फंडों का अध्ययन करना जो जीवित रहे, खराब प्रदर्शन के बाद बंद हुए फंडों को अनदेखा करते हैं, जिससे ऐतिहासिक रिटर्न बढ़ जाता है।
      career_advice: |
        सफल लोग सफलता का श्रेय कड़ी मेहनत को देते हैं; हम उन लोगों की नहीं सुनते जिन्होंने कड़ी मेहनत की और असफल हो गए।
      historical_analysis: |
        "महान" कंपनियों का अध्ययन जो जीवित रहीं, उन कई कंपनियों को अनदेखा करती हैं जो समान रणनीतियों के साथ असफल हो गईं।
    real_world_implications: |
      उत्तरजीविता पूर्वाग्रह कथित सफलता दर को बढ़ाता है, रोल मॉडल को विकृत करता है, और खराब अनुकरण की ओर ले जाता है। इसके लिए विफलता के मामलों की तलाश करना और आधार दर (base rates) को समझना आवश्यक है।
    professional_application:
      networking_and_relationship_building: |
        सलाह लेते समय, उन लोगों से भी सलाह लें जिन्होंने कोशिश की और असफल रहे—उनकी राय अक्सर जीवित बचे लोगों की तुलना में अधिक जानकारीपूर्ण होती है।
      collaborative_learning_initiative: |
        केवल सफल परियोजनाओं का ही नहीं, बल्कि असफल परियोजनाओं और बंद पहलों का भी अध्ययन करें। जो काम नहीं किया उससे सीखने के लिए "विफलता के बाद के पोस्टमार्टम" (failure post-mortems) आयोजित करें।
    how_can_this_be_misapplied:
      excessive_pessimism: |
        अति-सुधार करके यह मान लेना कि सफलता हमेशा भाग्य है और प्रयास मायने नहीं रखता।
      dismissing_success: |
        "उत्तरजीविता पूर्वाग्रह" के कारण सफल लोगों से सीखने से इनकार करना।
      analysis_paralysis: |
        विफलता के मामलों पर इतना ध्यान केंद्रित करना कि आप कभी कार्रवाई ही न करें।
      false_equivalence: |
        जीवित बचे और जीवित न बचे लोगों की रणनीतियों को समान रूप से जानकारीपूर्ण मानना ​​जब संदर्भ भिन्न हो।
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: ज़ाइगार्निक प्रभाव
    quick_introduction: |
      ज़ाइगार्निक प्रभाव अधूरी या बाधित की गई अवस्थाओं को पूरी की गई अवस्थाओं से बेहतर याद रखने की प्रवृत्ति है। अधूरी अवस्थाएं मानसिक तनाव पैदा करती हैं जो उन्हें हमारे दिमाग में सक्रिय रखती हैं। हमारा मस्तिष्क उन चीजों पर टिका रहता है जो अधूरी हैं।
    one_liner: अधूरी अवस्थाएं हमारे दिमाग में अटकी रहती हैं - हमारा मस्तिष्क उन चीजों को रखता है जो अधूरी हैं।
    try_this:
      - अपने मानसिक भार से अवस्थाओं को "मुक्त" करने के लिए पूर्णता का उपयोग करें - उन्हें पूरा करें या स्पष्ट रूप से छोड़ दें।
      - उत्पादक खुले लूप बनाने के लिए काम को प्रबंधनीय खंडों में तोड़ें।
      - ध्यान दें कि आप अधूरी चीजों पर कब विचार कर रहे हैं - लूप को बंद करें या उसे जाने देने का फैसला करें।
    ask_yourself:
      - कौन सी अधूरी अवस्थाएं मेरे दिमाग में तनाव पैदा कर रही हैं?
      - क्या यह खुला लूप रखने लायक है, या मैं इसे बंद कर सकता हूँ?
    in_more_detail: |
      ब्लूमा ज़ाइगार्निक ने देखा कि वेटर ने भुगतान किए गए ऑर्डर की तुलना में अवैतनिक ऑर्डर को बेहतर ढंग से याद रखा - एक बार जब काम पूरा हो गया, तो इसे स्मृति से "मुक्त" कर दिया गया। अधूरी अवस्थाएं एक खुला लूप बनाती हैं जो समापन की मांग करता है। यह उत्पादक ध्यान (हम पूरा करना चाहते हैं) और चिंता (हम अधूरी चीजों के बारे में सोचना बंद नहीं कर सकते) दोनों को चलाता है।

      इस प्रभाव का उपयोग विपणन (क्लिफहेंजर, अधूरी कहानियाँ) और उत्पादकता (उत्पादक "खुले लूप" बनाने के लिए काम को खंडों में तोड़ना) में किया जाता है। यह बताता है कि हम अधूरी चीजों पर क्यों विचार करते हैं और क्यों टू-डू सूचियां भारी लग सकती हैं।
    why_this_is_important: |
      ज़ाइगार्निक प्रभाव को समझने से आपको मानसिक भार को प्रबंधित करने, आकर्षक अनुभव डिज़ाइन करने और व्यवधानों का रणनीतिक रूप से उपयोग करने में मदद मिलती है। यह बताता है कि हम अधूरी चीजों के बारे में सोचना बंद क्यों नहीं कर सकते - और क्यों इसे नियंत्रित किया जा सकता है या हानिकारक हो सकता है।
    when_to_use:
      - समस्या_समाधान
      - नेतृत्व
      - सीखना
      - निर्णय_निर्माण
    how_can_you_spot_it:
      rumination_on_incomplete: |
        अधूरी अवस्थाएं पूरी की गई अवस्थाओं की तुलना में विचारों में अधिक घुसपैठ करती हैं।
      better_recall_of_unfinished: |
        हम बाधित अवस्थाओं को पूरी की गई अवस्थाओं की तुलना में बेहतर ढंग से याद रखते हैं।
      tension_for_closure: |
        शुरू की गई चीज़ों को पूरा करने के लिए बेचैनी या ड्राइव।
      serial_dramas: |
        क्लिफहेंजर और "जारी रहेगा" प्रभाव का फायदा उठाते हैं।
    examples:
      productivity: |
        एक अवस्था शुरू करने से मानसिक तनाव पैदा होता है जो पूर्णता की ओर ले जाता है - या चिंता यदि बहुत सारे खुले लूप हैं।
      marketing: |
        "भाग 1 में से 3" या "जारी रहेगा" दर्शकों को व्यस्त रखता है और वापस लाता है।
      meetings: |
        स्पष्ट अगले चरणों के बिना एक बैठक समाप्त करने से प्रतिभागियों को अनसुलझा तनाव रह जाता है।
      learning: |
        अनसुलझे प्रश्न या अधूरी व्याख्याएं स्मृति में अटक जाती हैं और आगे की पूछताछ को प्रेरित करती हैं।
    real_world_implications: |
      ज़ाइगार्निक प्रभाव उत्पादकता, जुड़ाव और मानसिक भार को प्रभावित करता है। इसे ध्यान केंद्रित करने के लिए उपयोग किया जा सकता है या यह भारी पड़ सकता है। यह क्लिफहेंजर की अपील और बहुत अधिक खुली अवस्थाओं के बोझ की व्याख्या करता है।
    professional_application:
      networking_and_relationship_building: |
        स्पष्ट अगले चरणों के साथ बातचीत समाप्त करें - या जानबूझकर खुले लूप छोड़ें यदि आप चाहते हैं कि दूसरा व्यक्ति अनुसरण करे। अनसुलझे धागे जुड़ाव पैदा करते हैं।
      collaborative_learning_initiative: |
        प्रशिक्षण में ज़ाइगार्निक प्रभाव का उपयोग करें: शिक्षार्थियों को व्यस्त रखने के लिए ब्रेक से पहले समस्याएं या प्रश्न पूछें। लेकिन बहुत अधिक खुले लूप बनाने से बचें कि लोग भारी महसूस करें।
    how_can_this_be_misapplied:
      overwhelm: |
        बहुत अधिक खुले लूप बनाना - बहुत अधिक अधूरी अवस्थाएं - चिंता और पक्षाघात की ओर ले जाती हैं।
      manipulation: |
        निर्भरता या जुड़ाव बनाने के लिए जानबूझकर चीजों को अनसुलझा छोड़ना।
      false_urgency: |
        जब कोई मौजूद न हो तो कृत्रिम तात्कालिकता बनाने के लिए प्रभाव का उपयोग करना।
      incomplete_work: |
        "तनाव" बनाने के लिए बहुत सारी चीजें शुरू करना, बिना उन्हें वास्तव में पूरा किए - बिखरे हुए प्रयास की ओर ले जाना।
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: शून्य-योग सोच
    quick_introduction: |
      शून्य-योग सोच यह विश्वास है कि एक व्यक्ति का लाभ दूसरे की हानि होना चाहिए—
      संसाधन निश्चित हैं और आपके लिए कोई भी लाभ मेरे लिए नुकसान है।
      वास्तव में, कई स्थितियाँ सकारात्मक-योग वाली होती हैं: दोनों पक्ष लाभान्वित हो सकते हैं।
    one_liner: आपका लाभ मेरी हानि नहीं है—कई स्थितियाँ सकारात्मक-योग वाली होती हैं।
    try_this:
      - पूछें: क्या हम पाई का विस्तार कर सकते हैं? क्या यह वास्तव में शून्य-योग है?
      - प्रतिस्पर्धा मानने से पहले सहयोग की तलाश करें।
      - ध्यान दें कि आप कब किसी स्थिति को निश्चित-पाई मान रहे हैं जबकि ऐसा नहीं है।
    ask_yourself:
      - क्या मैं एक निश्चित पाई मान रहा हूँ जबकि हम इसका विस्तार कर सकते हैं?
      - क्या सहयोग प्रतिस्पर्धा से अधिक मूल्य बनाएगा?
    in_more_detail: |
      शून्य-योग खेल में, कुल निश्चित होता है—आपका लाभ मेरी हानि है। सकारात्मक-योग
      स्थितियों में, सहयोग मूल्य बनाता है। व्यापार, नवाचार और संबंध
      निर्माण अक्सर सकारात्मक-योग वाले होते हैं। शून्य-योग सोच अनावश्यक की ओर ले जाती है
      प्रतिस्पर्धा, सहयोग के छूटे हुए अवसर, और विनाशकारी
      प्रतिद्वंद्विता।

      यह पूर्वाग्रह बातचीत, राजनीति और संगठनात्मक गतिशीलता में आम है।
      यह एक निश्चित पाई मानता है जब पाई अक्सर विस्तार योग्य हो सकती है। यह बन सकता है
      आत्म-पूर्ण: यदि आप दूसरों को प्रतिद्वंद्वियों के रूप में मानते हैं, तो वे प्रतिद्वंद्वी बन जाते हैं।
    why_this_is_important: |
      शून्य-योग सोच को पहचानना सहयोग के अवसर और
      मूल्य निर्माण खोलता है। यह बातचीत में सुधार करता है, संघर्ष को कम करता है, और सक्षम बनाता है
      जीत-जीत परिणाम। कई बेहतरीन अवसर सकारात्मक-योग वाले होते हैं।
    when_to_use:
      - बातचीत
      - नेतृत्व
      - संबंध_निर्माण
      - निर्णय_निर्माण
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "यदि वे जीतते हैं, तो मैं हार जाता हूँ" जबकि स्थिति दोनों को लाभान्वित कर सकती है।
      competitive_ framing: |
        स्थितियों को स्वचालित रूप से हम-बनाम-वे के रूप में फ़्रेम करना।
      envy_of_others_gains: |
        दूसरों की सफलता से ईर्ष्या करना जैसे कि यह आपकी अपनी सफलता को कम करती है।
      missed_cooperation: |
        सभी को लाभान्वित करने वाले सहयोग के अवसरों को देखने में विफलता।
    examples:
      negotiation: |
        यह मानना कि दूसरे पक्ष के लिए एक बेहतर सौदा आपके लिए एक बुरा सौदा है—
        जब रचनात्मक समाधान अक्सर दोनों के लिए मूल्य बढ़ाते हैं।
      salary: |
        "यदि मेरे सहकर्मी को वेतन वृद्धि मिलती है, तो मेरे लिए कम है" जब बजट हो सकता है
        लचीला या वेतन वृद्धि को बनाए गए मूल्य से उचित ठहराया जा सकता है।
      politics: |
        "उनकी पार्टी की जीतें हमारी हारें हैं" जब कई नीति परिणाम हो सकते हैं
        कई समूहों को लाभान्वित करते हैं।
      career: |
        "उनकी पदोन्नति का मतलब मेरे लिए कम अवसर है" जब संगठनात्मक विकास
        सभी के लिए अधिक अवसर पैदा कर सकता है।
    real_world_implications: |
      शून्य-योग सोच संघर्ष को बढ़ावा देती है, सहयोग को सीमित करती है, और छूटे हुए अवसरों का कारण बनती है।
      यह अक्सर अर्थशास्त्र, रिश्तों और
      नवाचार में गलत होता है। सकारात्मक-योग फ़्रेमिंग में बदलाव से परिणाम बेहतर होते हैं।
    professional_application:
      networking_and_relationship_building: |
        दूसरों के लिए मूल्य बनाने के तरीके खोजें—उनकी सफलता पैदा कर सकती है
        आपके लिए अवसर। ऐसे रिश्ते बनाएं जहाँ दोनों पक्ष लाभान्वित हों।
      collaborative_learning_initiative: |
        टीम के लक्ष्यों को सकारात्मक-योग के रूप में फ़्रेम करें: साझा सफलता, पाई का विस्तार।
        आंतरिक प्रतिस्पर्धा से अधिक सहयोग को प्रोत्साहित करें।
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        कुछ स्थितियाँ शून्य-योग वाली होती हैं (जैसे, एक एकल पदोन्नति, एक निश्चित बजट)।
        अन्यथा दिखावा करना भोला हो सकता है।
      naive_cooperation: |
        यह मान लेना कि सभी सहयोग करेंगे जब कुछ कर्ता वास्तव में
        प्रतिद्वंद्वी हों।
      undervaluing_competition: |
        प्रतिस्पर्धा सुधार को बढ़ावा दे सकती है; सभी प्रतिद्वंद्विता विनाशकारी नहीं होती है।
      exploitation: |
        उन लोगों से मूल्य निकालने के लिए "सकारात्मक-योग" फ़्रेमिंग का उपयोग करना जो लाभान्वित नहीं होते हैं।
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
