# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Turkish)
# Translated from mental-models-en.yaml

mental_models:
  - id: anchoring_bias
    name: Çapalama Yanılgısı
    quick_introduction: |
      Çapalama yanılgısı, karar verirken karşılaşılan ilk bilgi parçasına aşırı derecede
      güvenme eğilimidir. Bu ilk "çapa", ilgisiz veya rastgele olsa bile sonraki yargıları saptırır.
    one_liner: Gördüğünüz ilk sayı, takip eden tüm sayıları şekillendirir.
    try_this:
      - Bir müzakere öncesinde hedef sayınızı belirleyin ve rakibinizin çapalamasından kaçının.
      - Tahmin yaparken, başkalarını duymadan önce kendi sayınızı oluşturun.
      - Şu soruyu sorun: İlk önce farklı bir sayı görseydim farklı düşünür müydüm?
    ask_yourself:
      - İlk hangi sayı veya fikirle karşılaştım ve bu yargımı mı saptırıyor?
      - Çapadan yeterince uzaklaşıyor muyum, yoksa hala ona çok mu yakınım?
    in_more_detail: |
      Klasik bir deneyde, BM'deki Afrika ülkelerinin yüzdesini tahmin etmesi istenen kişilere,
      daha yüksek bir sayı (örn. 65 yerine 10) gördükten sonra daha yüksek tahminler verdi.
      Çapa - rastgele olsa bile - cevaplarını etkiledi. Çapalama müzakereleri, fiyatlandırmayı,
      işe alımı ve tahmini etkiler.

      Gördüğümüz ilk sayı bir referans noktası haline gelir. Ondan uzaklaşırız, ancak
      genellikle yetersiz kalırız. Çapanın rastgele olduğunu bildiğimizde bile bizi etkileyebilir.
      Uzmanlar da bundan muaf değildir.
    why_this_is_important: |
      Çapalamayı anlamak, daha iyi kararlar vermenize, daha etkili müzakere yapmanıza
      ve manipüle edilmekten kaçınmanıza yardımcı olur. Ayrıca bilginin sırasının ve çerçevelenmesinin
      neden bu kadar önemli olduğunu da açıklar.
    when_to_use:
      - karar_verme
      - müzakere
      - yatırım
      - risk_degerlendirmesi
    how_can_you_spot_it:
      first_number_dominance: |
        Bir müzakerede veya tahminde yer alan ilk sayı, sonucunu orantısız bir şekilde etkiler.
      insufficient_adjustment: |
        Bir çapadan uzaklaşırken, insanlar genellikle yeterince uzaklaşmazlar.
      arbitrary_anchor_influence: |
        Açıkça alakasız sayılar bile (örn. bir sosyal güvenlik numarasının son rakamları)
        tahminleri etkileyebilir.
      order_effects: |
        Seçeneklerin sunulduğu sıra seçimleri değiştirir.
    examples:
      salary_negotiation: |
        İşveren veya aday tarafından bahsedilen ilk sayı, genellikle nihai teklifi belirler.
      real_estate: |
        İlan fiyatı, kasıtlı olarak yüksek veya düşük belirlenmiş olsa bile alıcıların değer algısını çapar.
      retail: |
        "99 Dolar idi, şimdi 49 Dolar" orijinal fiyatı, satış fiyatını bir fırsat gibi göstermek için çapa olarak kullanır.
      forecasting: |
        Planlama toplantılarındaki ilk tahminler, ilk tahmin bir tahmin olsa bile sonraki projeksiyonları çapar.
    real_world_implications: |
      Çapalama piyasaları, müzakereleri ve politikaları şekillendirir. Etik olarak (örn.
      makul beklentiler belirleme) veya etik olmayan bir şekilde (örn. manipülatif fiyatlandırma) kullanılabilir.
      Bunu tanımak karar kalitesini artırır.
    professional_application:
      networking_and_relationship_building: |
        Müzakerelerde, çapayı belirlemek için ilk teklifi yapmayı düşünün veya rakibiniz
        bunu yaptığında farkında olun.
      collaborative_learning_initiative: |
        Toplantılarda, tahminler hakkında kimin ilk konuştuğuna dikkat edin; tartışmadan önce
        bağımsız tahminler toplamayı düşünün.
    how_can_this_be_misapplied:
      manipulation: |
        Başkalarını istenen sonuçlara yönlendirmek için kasıtlı olarak aşırı çapalar kullanmak.
      overconfidence_in_anchors: |
        İlk tahmininize yeniden göz atmadan aşırı güvenmek.
      ignoring_relevant_information: |
        Bir çapaya daha ilgili verileri göz ardı ettirmek.
      exploitation: |
        Gerçek fiyatları makul göstermek için şişirilmiş "karşılaştır" fiyatlarını kullanan satış taktikleri.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Availability Cascade
    quick_introduction: |
      An availability cascade is a self-reinforcing process where a idea gains
      plausibility through repeated public discussion. The more it's discussed,
      the more "available" it becomes, the more people believe it, and the more
      it's discussed. A collective belief gains momentum regardless of its
      underlying truth.
    one_liner: The more an idea is repeated, the more plausible it seems—regardless of evidence.
    try_this:
      - Ask: Is this belief widespread because it's true, or because it's repeated?
      - Seek primary sources before accepting "what everyone knows."
      - Notice when repetition alone is driving your sense of plausibility.
    ask_yourself:
      - Would I believe this if I'd heard it only once?
      - Am I conflating "everyone says so" with "the evidence supports it"?
    in_more_detail: |
      Timur Kuran and Cass Sunstein described how availability cascades work:
      information availability (how often we hear something) and plausibility
      (how believable it seems) reinforce each other. Media coverage, social
      media, and public discourse amplify certain ideas. Once an idea reaches
      a threshold of availability, it can spread rapidly and become "common
      knowledge" even if it's false or exaggerated.

      Availability cascades can be beneficial (spreading important warnings)
      or harmful (spreading panic or misinformation). They're driven by
      availability heuristic and social proof.
    why_this_is_important: |
      Recognizing availability cascades helps you evaluate whether widespread
      belief reflects evidence or mere repetition. It explains how ideas go
      viral and how collective beliefs can be wrong. It's essential for
      media literacy and critical thinking.
    when_to_use:
      - decision-making
      - risk_assessment
      - learning
      - leadership
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        The more an idea is repeated, the more plausible it seems.
      media_amplification: |
        Coverage drives belief which drives more coverage.
      social_proof_belief: |
        "Everyone believes it" becomes evidence for belief.
      threshold_effects: |
        Once an idea crosses a visibility threshold, it spreads rapidly.
    examples:
      health_scares: |
        A study suggests a product is dangerous; media amplifies it;
        public avoids it; more coverage follows. The risk may be
        exaggerated.
      financial_panic: |
        Rumors of bank failure spread; people withdraw; the run
        becomes self-fulfilling.
      social_media: |
        A narrative goes viral; repetition increases belief; belief
        increases sharing. Truth and virality can diverge.
      organizational: |
        A rumor about layoffs spreads; anxiety increases; behavior
        changes; the rumor gains plausibility through reaction.
    real_world_implications: |
      Availability cascades shape public opinion, policy, and markets.
      They can spread both important truths and dangerous falsehoods.
      Critical thinking requires distinguishing evidence-based belief
      from cascade-driven belief.
    professional_application:
      networking_and_relationship_building: |
        When an idea is "everywhere," ask: Is it true because it's
        repeated, or repeated because it's true? Seek primary sources.
      collaborative_learning_initiative: |
        Create norms of verifying before amplifying. Encourage
        questioning of "what everyone knows." Distinguish consensus
        that reflects evidence from consensus that reflects
        availability.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Sometimes widespread belief is correct. Don't assume all
        popular ideas are cascades.
      conspiracy_thinking: |
        Using "availability cascade" to dismiss legitimate
        concerns as manufactured.
      false_skepticism: |
        Rejecting well-supported ideas because they're popular.
      contrarianism: |
        Assuming that whatever is widely believed must be wrong.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Availability Heuristic
    quick_introduction: |
      The availability heuristic is the tendency to judge the likelihood of events
      by how easily examples come to mind. If we can readily recall instances, we
      assume the event is common. Vivid, recent, or emotional examples dominate
      our probability estimates.
    one_liner: What comes to mind easily feels more likely—even when it isn't.
    try_this:
      - Ask: What's the base rate? Am I overweighting vivid or recent examples?
      - Seek data when your gut says "this feels common" or "this feels rare."
      - Notice when one dramatic story is driving your risk assessment.
    ask_yourself:
      - Am I judging likelihood by recall ease rather than actual frequency?
      - Would I think differently if I hadn't just seen that headline?
    in_more_detail: |
      We use mental shortcuts to estimate frequency and probability. One shortcut
      is availability: what comes to mind easily? Plane crashes are vivid and
      heavily reported—we overestimate their likelihood. Car accidents are
      common but less salient—we underestimate. Recency, vividness, and
      emotional impact all increase availability.

      The heuristic is useful when availability correlates with actual frequency.
      But media, personal experience, and salience often distort the correlation.
      We fear rare but vivid risks and ignore common but mundane ones.
    why_this_is_important: |
      Recognizing the availability heuristic helps you correct probability
      estimates, avoid overreacting to vivid news, and make better risk
      assessments. It explains many systematic errors in judgment.
    when_to_use:
      - decision-making
      - risk_assessment
      - investing
      - problem_solving
    how_can_you_spot_it:
      vividness_dominance: |
        Dramatic or emotional examples disproportionately influence estimates.
      recency_effect: |
        Recent events feel more likely to recur.
      personal_experience_overweighting: |
        "I know someone who..." shapes probability estimates.
      media_distortion: |
        What's reported often doesn't match what's frequent.
    examples:
      risk_perception: |
        Overestimating terrorism risk (vivid, reported) and underestimating
        heart disease risk (common, less dramatic).
      investing: |
        Recent market events (crash, boom) dominate expectations for the future.
      hiring: |
        One vivid story about a bad hire from a certain school affects
        evaluation of all candidates from that school.
      health: |
        A friend's cancer diagnosis makes cancer feel more likely than base
        rates suggest.
    real_world_implications: |
      The availability heuristic affects insurance purchases, policy priorities,
      and personal decisions. It's exploited by media and marketers. Correcting
      for it requires seeking base rates and questioning what "comes to mind."
    professional_application:
      networking_and_relationship_building: |
        Be aware that one vivid negative experience with a person or group can
        distort your judgment. Seek base rates and multiple data points.
      collaborative_learning_initiative: |
        When assessing risks or opportunities, explicitly ask "What's the base
        rate?" and "Am I overweighting vivid examples?" Use data to correct
        availability-driven estimates.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Sometimes availability is informative—recent experience can signal
        change. Don't assume all availability-driven judgments are wrong.
      analysis_paralysis: |
        Overcorrecting to the point of ignoring legitimate warning signs from
        vivid experience.
      false_objectivity: |
        Assuming base rates are always correct when they may be outdated or
        inapplicable.
      manipulation: |
        Deliberately making certain examples vivid to steer others' judgments.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof Fenomeni
    quick_introduction: |
      Baader-Meinhof fenomeni (aynı zamanda sıklık yanılgısı olarak da adlandırılır),
      yeni bir şey öğrendiğinizde ve sonra aniden her yerde onu fark ettiğinizde ortaya çıkar.
      Bir tesadüf gibi hissettirir, ancak bu genellikle seçici dikkattir—beyniniz
      yakın zamanda karşılaştığı şeyleri fark etmeye hazırdır.
    one_liner: Yeni bir şey öğrenir ve aniden her yerde onu görürsünüz—o hep oradaydı.
    try_this:
      - Bir şeyi öğrendikten sonra "her yerde" gibi hissettiğinizde, temel oranı kontrol edin.
      - Sadelik nedeniyle bir şeyi olduğundan daha önemli hissettiren zamanları fark edin.
      - Sorun: Gerçek bir eğilim mi görüyorum, yoksa sadece fark etmeye hazır olduğum şeyi mi fark ediyorum?
    ask_yourself:
      - Bu şimdi gerçekten daha mı yaygın, yoksa ben mi daha çok fark ediyorum?
      - Bununla ilgili yeni bir şey öğrenmeseydim bu deseni görür müydüm?
    in_more_detail: |
      Baader-Meinhof terörist grubu hakkında duyduktan sonra, bir kişi günler içinde
      haberlerde, konuşmalarda ve makalelerde ona yapılan atıfları görebilir. Fenomenin
      iki bileşeni vardır: seçici dikkat (aradığınızı fark edersiniz) ve doğrulama
      önyargısı (başarıları hatırlayıp kaçırdıklarınızı unutursunuz).

      Yanılsama, şeyin aniden daha yaygın hale gelmesidir. Gerçekte, o her zaman
      mevcuttu; siz sadece ona dikkat etmiyordunuz. Bu, yakın zamanda öğrenilen
      bilginin yaygınlığını veya önemini aşırı tahmin etmenize yol açabilir.
    why_this_is_important: |
      Baader-Meinhof fenomenini tanımak, son maruziyete dayalı olarak bir şeyin
      ne kadar yaygın veya önemli olduğunu aşırı tahmin etmekten kaçınmanıza yardımcı olur.
      Ayrıca yeni fikirlerin, ürünlerin veya trendlerin ilk fark ettiğinizde neden
      "her yerdeymiş gibi" hissedildiğini açıklar.
    when_to_use:
      - karar_verme
      - öğrenme
      - risk_değerlendirmesi
      - problem_çözme
    how_can_you_spot_it:
      sudden_ubiquity: |
        Yeni bir kelime, kavram veya ürün öğrenirsiniz ve günler içinde sürekli
        olarak gördüğünüzü hissedersiniz.
      recency_bias: |
        Son bilgi, gerçekte olduğundan daha fazla gerçeği temsil ediyor gibi gelir.
      pattern_seeking: |
        Beyniniz ilgisiz görgüleri "bu her yerde" anlatısına bağlar.
      forgetting_the_misses: |
        Şeyi ne sıklıkla görmediğinizi takip etmezsiniz—sadece gördüğünüz zamanları.
    examples:
      vocabulary: |
        "Serendipity" kelimesini öğrenmek ve sonra aynı hafta üç farklı makalede
        görmek.
      car_purchase: |
        Belirli bir araba modelini almaya karar verdikten sonra, onu her sokakta
        görürsünüz—oysa o hep oradaydı.
      health_anxiety: |
        Nadir bir belirti hakkında okumak ve sonra kendinizde benzer hisler fark etmek,
        gereksiz endişeye yol açmak.
      trends: |
        Yeni bir uygulama veya trend keşfetmek ve aniden baskın olduğunu hissetmek—oysa
        küçük bir kullanıcı tabanı olabilir.
    real_world_implications: |
      Fenomen, trendleri, riskleri ve fırsatları nasıl algıladığımızı etkiler. Pazarlamacılar
      ve medya, tekrarlanan maruziyet yaratarak bunu istismar edebilir. Karar verme
      sürecinde, son bilgiyi aşırı ağırlıklandırmaya yol açabilir.
    professional_application:
      networking_and_relationship_building: |
        Birisi bir konuyu öğrendikten sonra tekrar tekrar bahsettiğinde, bunun
        sıklık yanılgısı deneyimi olabileceğini fark edin—konu kesinlikle daha
        ilginç değil, sadece onlara daha belirgin geliyor.
      collaborative_learning_initiative: |
        Eğitimde, yeni bir şey öğrendikten sonra "her yerde gördüğüm" hissinin normal
        olduğunu pekiştirin; her yerde olma hissine güvenmek yerine temel oranları
        kontrol etmeyi teşvik edin.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Son zamanlarda sık sık fark ettiğiniz için bir şeyin olduğundan daha yaygın
        veya önemli olduğunu varsaymak.
      confirmation_bias_amplification: |
        "Her yerde görüyorum" hissiyatını bir inancın doğru olduğuna dair kanıt
        olarak kullanmak.
      decision_distortion: |
        Orantısız derecede önemli hissettiren yakın zamanda öğrenilen bilgilere
        dayalı kararlar almak.
      vulnerability_to_manipulation: |
        Reklamverenler ve propagandacılar, her yerde olma ve önem illüzyonu
        yaratmak için tekrarlanan maruziyeti kullanırlar.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: Barnum Etkisi
    quick_introduction: |
      Barnum etkisi (veya Forer etkisi), belirsiz, genel kişilik tanımlarını
      benzersiz bir şekilde doğru olarak kabul etme eğilimidir. Burçlar, falcılar
      ve kişilik testleri neredeyse herkese uyan ifadeler kullanır—ancak biz
      bunların bize özel olduğuna inanırız. Kendimizi genellikte görürüz.
    one_liner: Belirsiz ifadeler neredeyse herkese uyduğu için kişisel hissettirir.
    try_this:
      - Ask: Bu açıklama birçok kişiye uyar mı? Başka birinde test edin.
      - Seek specific, behavioral feedback instead of vague praise or criticism. (Belirsiz övgü veya eleştiri yerine spesifik, davranışsal geri bildirim arayın.)
      - Notice when "personalized" insights feel too good to be discriminating. ("Kişiselleştirilmiş" içgörüler ayrımcı olamayacak kadar iyi hissettirdiğinde fark edin.)
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger? (Bu geri bildirim bir yabancıya verilse doğru hissettirir mi?)
      - Am I remembering the hits and forgetting the misses? (Başarılı olanları hatırlayıp başarısız olanları unutuyor muyum?)
    in_more_detail: |
      Psikolog Bertram Forer, öğrencilere aynı "kişiselleştirilmiş" geri bildirimleri
      (örneğin, "Başkalarının sizi sevmesi ve hayranlık duyması için bir ihtiyacınız var")
      verdi ve öğrenciler bunu yüksek derecede doğru olarak değerlendirdi.
      İfadeler herkes için geçerli olacak kadar belirsizdi. P.T. Barnum'un
      "Her dakika bir saf doğar" dediği söylenir—etki, kişisel görünen genellemelerle
      kitlelere hitap etme becerisi nedeniyle onun adını almıştır.

      Etki, belirsiz ifadelerde kişisel alaka bulmakta iyi olduğumuz için çalışır.
      Başarılı olanları hatırlar, başarısız olanları unuturuz.
      Bu, soğuk okuma ve birçok "kişilik" ürününün temelini oluşturur.
    why_this_is_important: |
      Barnum etkisini tanımak, kişilik değerlendirmelerini değerlendirmenize,
      manipülasyona direnmenize ve belirsiz geri bildirimleri aşırı yorumlamaktan
      kaçınmanıza yardımcı olur. Burçların neden doğru hissettirdiğini ve bazı
      "kişiselleştirilmiş" tavsiyelerin neden genel olduğunu açıklar.
    when_to_use:
      - karar_verme
      - öğrenme
      - risk_değerlendirmesi
      - ilişki_kurma
    how_can_you_spot_it:
      vague_accuracy: |
        Kişisel hissettiren ancak birçok kişiye uyabilecek geri bildirim.
      selective_fit: |
        Uyanlara odaklanıp uymayanları görmezden geliriz.
      cold_reading: |
        Birinin sizi aslında genel olan ifadelerle "okuması".
      personality_test_enthusiasm: |
        Değerlendirme sonuçlarının benzersiz bir şekilde aydınlatıcı olduğuna dair
        eleştirel olmayan kabul.
    examples:
      horoscopes: |
        "Bazen kararlarınızdan şüphe duyuyorsunuz" kişisel hissettirir ancak
        çoğu insana uyar.
      fortune_telling: |
        Durumumuza özel olarak yorumladığımız belirsiz tahminler.
      personality_tests: |
        Bazı değerlendirmeler Barnum ifadeleri kullanır ve ayırt edici olmadan
        doğru hissettirir.
      feedback: |
        Derinden kişiselleştirilmiş olarak yorumladığımız genel performans geri bildirimi.
    real_world_implications: |
      Barnum etkisi astrolojide, bazı koçluklarda ve düşük kaliteli değerlendirmelerde
      istismar edilir. Geçersiz araçlarda sahte bir güven oluşturabilir.
      Ayrıca neden pohpoha ve belirsiz olumlu geri bildirimlere yatkın olduğumuzu da açıklar.
    professional_application:
      networking_and_relationship_building: |
        Geri bildirim alırken, "Bu birçok kişiye uyabilir mi?" diye sorun.
        Belirsiz övgü veya eleştiri yerine spesifik, davranışsal geri bildirim arayın.
        Çok iyi hissettiren "kişiselleştirilmiş" içgörülerden şüphelenin.
      collaborative_learning_initiative: |
        Değerlendirmeleri kullanırken, ayırt edici geçerliliği olan onaylanmış araçları
        seçin. Barnum ifadelerine dayanan araçlardan kaçının.
        İnsanları belirsiz geri bildirimleri tanımaları konusunda eğitin.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Tüm kişisel geri bildirimler Barnum değildir—bazıları gerçekten spesifiktir.
        Her şeyi belirsiz diye reddetmeyin.
      invalidating_experience: |
        Birine içgörü deneyiminin "sadece Barnum" olduğunu söylemek,
        kendisi için değeri olabilecekken.
      overcorrection: |
        Bazıları Barnum ifadeleri kullandığı için tüm kişilik çerçevelerini reddetmek.
      false_skepticism: |
        Bir şeyin doğru hissettirdiği için Barnum olması gerektiğini varsaymak—bazen
        şeyler doğrudur.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Taban Oran Yanılgısı
    quick_introduction: |
      Taban oran yanılgısı, belirli, canlı bilgileri tercih ederek genel istatistiksel bilgiyi
      (taban oranları) görmezden gelme eğilimidir. Belirli durumu aşırı değerlendirir
      ve önsel olasılığı küçümseriz. Tek bir etkileyici hikaye, sayıların ne söylediğini
      geçersiz kılabilir.
    one_liner: Etkileyici bir hikaye, sayıların ne söylediğini geçersiz kılabilir.
    try_this:
      - Bir durumu yargılamadan önce şunu sorun: Bu tür bir durum için taban oran nedir?
      - Belirli kanıtları önsel olasılıkla birleştirin—ikisini de göz ardı etmeyin.
      - Tek bir canlı örneğin istatistikleri nasıl bastırdığını fark edin.
    ask_yourself:
      - Bu belirli durumu aşırı değerlendirip taban oranı mı küçümsüyorum?
      - Etkileyici hikayeyi bir kenara bırakırsam sayılar ne söylerdi?
    in_more_detail: |
      Eğer bir hastalık nüfusun %1'ini etkiliyorsa ve bir test %95 doğruluk payına sahipse,
      pozitif bir sonuç genellikle kişinin hala hastalığa sahip olmadığı anlamına gelir—
      çünkü taban oran çok düşüktür. Ancak taban oranlarını görmezden gelir ve "pozitif test yaptılar"
      ifadesine odaklanırız. İstatistiksel olana göre belirli olana kapılırız.

      Bu yanılgı tıbbi teşhisleri, işe alımları, risk değerlendirmesini ve hukuki
      yargıları etkiler. Taban oranlarını ve duruma özel kanıtları Bayesçi akıl yürütme
      kullanarak birleştirmemiz gerekir—ancak bunu genellikle yapmayız.
    why_this_is_important: |
      Taban oran yanılgısı için düzeltme yapmak teşhisleri, risk değerlendirmesini
      ve karar kalitesini iyileştirir. Canlı durumlara aşırı tepki vermemizi ve
      istatistiksel gerçekliğe yetersiz tepki vermemizi engeller.
    when_to_use:
      - karar_verme
      - risk_değerlendirmesi
      - problem_çözme
      - yatırım_yapma
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Yargılara taban oranları dahil edilmez.
      vividness_over_statistics: |
        Tek bir vaka veya hikaye, toplu veriler üzerinde baskın çıkar.
      diagnostic_overweighting: |
        Taban oranı dikkate almadan yeni kanıtları (örneğin, test sonucu) aşırı
        değerlendirme.
      anecdote_override: |
        "Birini tanıyorum..." istatistiksel kanıtları geçersiz kılar.
    examples:
      medical: |
        Nadir bir hastalık için pozitif test sonucu—taban oran düşüktür, bu nedenle
        pozitif bir sonuç genellikle yanlış pozitiftir. Bunu görmezden gelir ve
        hastalandıklarını varsayarız.
      hiring: |
        Bir adayın harika bir mülakatı var—mülakatların performansı ne kadar iyi
        tahmin ettiğine dair taban oranlarını görmezden geliyoruz.
      risk: |
        Uçak kazası canlıdır—uçuş riskini aşırı tahmin eder ve sürüş riskini
        küçümseriz, taban oranlarını görmezden geliriz.
      startup_investing: |
        Bir kurucu iyi bir sunum yapıyor—sunum kalitesinden bağımsız olarak çoğu
        girişimimin başarısız olduğunu görmezden geliyoruz.
    real_world_implications: |
      Taban oran yanılgısı tıbbi kararları, hukuki yargıları ve iş stratejilerini
      etkiler. Kaynakların yanlış tahsis edilmesine ve kötü risk değerlendirmesine
      katkıda bulunur. Bayesçi düşünce bunu düzeltir.
    professional_application:
      networking_and_relationship_building: |
        İnsanları değerlendirirken taban oranlarını göz önünde bulundurun: örneğin,
        bu tür bir davranış ne sıklıkla meydana gelir? Tek bir canlı etkileşimin
        daha geniş deseni geçersiz kılmasına izin vermeyin.
      collaborative_learning_initiative: |
        Kararlar alırken, duruma özel kanıtları dahil etmeden önce açıkça taban
        oranlarını belirtin ve göz önünde bulundurun. Ekipleri Bayesçi akıl yürütme
        konusunda eğitin.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Taban oranları aksi yönde işaret ederken güçlü duruma özel kanıtları
        görmezden gelmek—bazen bireysel durum istisnadır.
      stereotyping: |
        Bireyler hakkında adaletsiz yargılar vermek için taban oranlarını kullanmak.
      false_precision: |
        Gerekenin kaba tahminleri olduğu yerlerde taban oranlarını yanlış kesinlikle
        uygulamak.
      dismissing_individuals: |
        Önünüzdeki bireyin dağılıma uymayabileceği durumlarda "İstatistikler
        X diyor".
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Bayes Teoremi
    quick_introduction: |
      Bayes teoremi, yeni kanıtlar aldığınızda bir hipotezin olasılığını nasıl
      güncelleyeceğinizi açıklar. İnançların, kanıtların onları ne kadar iyi
      desteklediğiyle orantılı olarak değişmesi gerektiği fikrini biçimlendirir—tamamen
      ya da hiç değil, artımlı olarak.
    one_liner: İnançları, kanıtların onları ne kadar iyi desteklediğiyle orantılı olarak güncelleyin.
    try_this:
      - Öncelikli inancınızla başlayın; yanılıyor olsaydınız kanıtların ne kadar olası olacağını sorun.
      - Artımlı olarak güncelleyin—tek bir veri noktasıyla %0'dan %100'e geçmeyin.
      - Alternatif hipotezleri düşünün: kanıtlar onlara da uyar mıydı?
    ask_yourself:
      - Bu kanıt aslında olasılığı ne kadar değiştiriyor?
      - İnançlarımı mı güncelliyorum, yoksa sadece zaten düşündüğüm şeyi mi doğruluyorum?
    in_more_detail: |
      Teorem, bir hipotezin kanıt verildiğindeki olasılığının, kanıtın hipotez
      verildiğindeki olasılığı ile çarpılan önsel olasılığa, kanıtın olasılığına
      bölünmesiyle eşit olduğunu belirtir. Pratikte: önsel inancınızla başlayın,
      yeni kanıtın hipotezinizle ve alternatiflerle ne kadar tutarlı olduğunu görün
      ve buna göre güncelleyin.

      Bayes düşüncesi, yanılıyor olsaydınız kanıtların ne kadar olası olacağını
      düşünmenizi gerektirerek doğrulama yanlılığını engeller. Olasılıksal akıl
      yürütmenin ve bilimsel güncellemenin temelidir.
    why_this_is_important: |
      Bayes düşüncesi, belirsizlik altındaki karar verme süreçlerini iyileştirir,
      aşırı güvenmaktan kaçınmanıza yardımcı olur ve kanıtlardan öğrenmek için bir
      çerçeve sunar. Tanı, tahmin ve belirsizliğin olduğu herhangi bir alan için
      esastır.
    when_to_use:
      - karar_verme
      - problem_çözme
      - risk_değerlendirmesi
      - öğrenme
    how_can_you_spot_it:
      prior_and_update: |
        Temel bir inançla başlayıp yeni kanıtlara dayanarak onu ayarlama.
      likelihood_ratio_thinking: |
        "Doğruysam vs. yanılıyorsam bu kanıt ne kadar olası?" diye sorma.
      incremental_updating: |
        İnançların aniden değişmek yerine kanıtlarla kademeli olarak
        değişmesi.
      base_rate_respect: |
        Yalnızca en son veri noktası değil, önsel olasılıklar (temel oranlar)
        önemlidir.
    examples:
      medical_diagnosis: |
        Nadir bir hastalık için pozitif test sonucu—önsel (düşük prevalans)
        pozitif bir sonucun genellikle yanlış pozitif olduğu anlamına gelir. Bayes
        olasılığı günceller.
      forecasting: |
        İlk tahminlere bağlı kalmak yerine yeni veri geldikçe tahminleri
        güncelleme.
      hiring: |
        Rol uyumu için temel oranlarla başlayıp mülakat performansına göre
        güncelleme.
      investing: |
        Yeni bilgi (kazanç, haber) geldikçe bir şirketin başarılı olma olasılığını
        güncelleme.
    real_world_implications: |
      Bayes düşüncesi, modern yapay zeka, tıbbi tanı ve bilimsel çıkarımın
      temelini oluşturur. Temel oran ihmalini ve doğrulama yanlılığını
      düzeltir. Belirsizliğin olduğu herhangi bir alan için güçlü bir
      araçtır.
    professional_application:
      networking_and_relationship_building: |
        İnsanlar hakkındaki inançlarınızı sabit ilk izlenimlere bağlı
        kalmak yerine yeni kanıtlara dayanarak güncelleyin. Eylemleri
        yorumlamada temel oranları (örneğin, bu davranış ne kadar yaygın?)
        dikkate alın.
      collaborative_learning_initiative: |
        Tartışmalardan önce önsel bilgileri açıkça belirtmelerini, ardından
        kanıt sunuldukça güncellemelerini teşvik edin. Çapalama ve doğrulama
        yanlılığını azaltır.
    how_can_this_be_misapplied:
      overprecision: |
        Belirsizlik yüksekken kesin olasılıklar atama.
      prior_rigidity: |
        Güçlü önsel bilgilere bağlı kalıp yeni kanıtlarla yeterince
        güncellememek.
      base_rate_tyranny: |
        Temel oranlar aksi yönde önerse bile güçlü kanıtları
        görmezden gelmek—bazen kanıtlar baskın olmalıdır.
      false_sophistication: |
        Gerçek akıl yürütme yapmadan titiz görünmek için Bayes
        dilini kullanmak.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: belirsizlik_etkisi
    name: Belirsizlik Etkisi
    quick_introduction: |
      Belirsizlik etkisi, sonuçların olasılıkları hakkında bilgi eksikliğimiz olduğunda
      seçeneklerden kaçınma eğilimidir. Bilinen riskleri bilinmeyen risklere tercih ederiz—bilinmeyen
      riskler daha iyi olsa bile. Belirsizliğin kendisi de rahatsız edicidir.
    one_liner: Bilinen riskleri bilinmeyen risklere tercih ederiz—bilinmeyenler daha iyi olsa bile.
    try_this:
      - Sormak: Bu seçeneği çoğunlukla belirsizlik yüzünden mi reddediyorum, yoksa gerçek bir dezavantajı mı var?
      - Bildiklerinizi ölçün; bazen "belirsiz" seçeneğin daha net bir getirisi olabilir.
      - Kendinizi daha güvende hissettiğiniz için tanıdıka yöneldiğiniz durumları fark edin.
    ask_yourself:
      - Bir şeyi belirsiz olduğu için mi reddediyorum, yoksa gerçekten daha kötü olduğu için mi?
      - Belirsiz seçenekle rahat hissetmek için ne bilmem gerekir?
    in_more_detail: |
      Ellsberg paradoksu'nda insanlar, oranları bilinmeyen bir kavanoza bahis yapmaktansa,
      oranları bilinen bir kavanoz üzerine bahis yapmayı tercih ederler—bilinmeyen kavanozun
      daha iyi oranlar sunabilmesi durumunda bile. Belirsizlikten hoşlanmayız—net bir
      (kötü bile olsa) olasılığa sahip olmayı, belirsiz bir olasılığa sahip olmaktan daha çok tercih ederiz.

      Bu etki, yatırım, kariyer seçimleri ve politika kararlarını etkiler.
      Belirsiz ama potansiyel olarak üstün olan seçeneklerden kaçındığımızda suboptimal seçimlere yol açabilir.
      Aynı zamanda neden tanıdık markaları ve bilinen miktarları tercih ettiğimizi de açıklar.
    why_this_is_important: |
      Belirsizlik etkisini tanımak, tanıdık olana aşırı öncelik vermekten ve belirsizi
      yetersiz derecede önceliklendirmekten kaçınmanıza yardımcı olur. Belirsizliğin
      yönetilebilir olduğu durumlarda fırsatların kaçırılmasına yol açabilir.
      Aynı zamanda şeffaflık ve netliğin neden kaygıyı azalttığını da açıklar.
    when_to_use:
      - karar_verme
      - risk_degerlendirmesi
      - yatirim_yapma
      - kariyer_adim_atimi
    how_can_you_spot_it:
      preference_for_known_risks: |
        Belirsiz olanlar yerine net (kötü bile olsa) olasılıklara sahip seçenekleri tercih etmek.
      avoidance_of_uncertainty: |
        Seçenekleri temel olarak "yeterince bilmiyoruz" diyerek reddetmek.
      familiarity_over_optimality: |
        Potansiyel olarak daha iyi olan bilinmeyeni bilinenin üzerine çıkarmak.
      information_seeking: |
        Kararı değiştirmese bile belirsizliği azaltan bilgi için ödeme yapma isteği.
    examples:
      investing: |
        Çeşitlendirme faydalarına rağmen "daha iyi anladığımız" için uluslararası hisse senetleri yerine yerel hisse senetlerini tercih etmek.
      employment: |
        Belirsiz bir yükseliş potansiyeli olan bir pozisyonu kabul etmek yerine bilinen bir işte kalmak.
      product_choice: |
        Belirsiz kaliteye sahip yeni bir seçeneğe kıyasla bilinen bir markayı tercih etmek.
      medical: |
        Daha iyi olabilmesine rağmen bilinen yan etkileri olan bir tedaviyi, belirsiz sonuçları olan bir tedaviye tercih etmek.
    real_world_implications: |
      Belirsizlik etkisi piyasaları, kariyer seçimlerini ve politikaları şekillendirir. Daha net bilgi sağlayarak veya kararları yeniden çerçeveleyerek azaltılabilir.
      Aynı zamanda şeffaflık ve iletişimin neden kaygıyı azalttığını da açıklar.
    professional_application:
      networking_and_relationship_building: |
        İlişkilerdeki belirsizliği azaltın: beklentileri netleştirin, açıkça iletişim kurun ve belirsizliği azaltın. İnsanlar bilinen durumları tercih eder.
      collaborative_learning_initiative: |
        Değişiklik getirirken belirsizliği azaltın—ne olacağı, ne zaman olacağı ve neden olacağı hakkında net bilgi sağlayın. Belirsizlik direnci artırır.
    how_can_this_be_misapplied:
      manipulation: |
        İnsanları tercih edilen seçeneklere yönlendirmek için kasıtlı olarak belirsizlik yaratmak.
      false_clarity: |
        Gerçek belirsizlik varken sahte kesinlik sağlamak.
      overconfidence: |
        Belirsizliği azaltmanın her zaman kararları iyileştirdiğini varsaymak—bazen belirsiz seçenek gerçekten daha iyidir.
      analysis_paralysis: |
        Bazı belirsizliklerin kaçınılmaz olduğu durumlarda karar vermeden önce mükemmel bilgiyi beklemek.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: Ben Franklin Etkisi
    quick_introduction: |
      Ben Franklin etkisi, insanların onlara bir iyilik yaptıktan sonra birini daha çok sevmesi psikolojik olgusudur. Sevdiğimiz insanlar için iyilik yaparız sezgisel düşüncesine aykırı olarak, biz de sık sık iyilik yaptığımız insanları daha çok severiz.
    one_liner: İyilik yaptığımız insanları daha çok severiz—tutumlarımız eylemlerimizi takip eder.
    try_this:
      - Bir ilişkiyi geliştirmek istiyorsanız, küçük bir iyilik istemeyi düşünün.
      - Bir iyilik yapmanın bir kişi hakkındaki duygularınızı nasıl değiştirdiğini fark edin.
      - Başkalarının size yardım ettikten sonra sizi daha çok sevebileceğinin farkında olun.
    ask_yourself:
      - Birine iyilik yapmak, onlar hakkındaki hislerimi değiştirdi mi?
      - Onlara olan saygımı artırarak çabamı rasyonelleştiriyor muyum?
    in_more_detail: |
      Benjamin Franklin, rakip bir yasama meclisi üyesini, kütüphanesinden nadir bir kitap ödünç isteyerek kazanmasını meşhur bir şekilde anlatmıştır. Adam kabul ettikten sonra Franklin, bir teşekkür notuyla kitabı geri verdi. İlişki belirgin şekilde gelişti. Etki, tutumlarımızın eylemlerimizi takip ettiğini öne sürer: birine yardım etmek için çaba gösterdiğimizde, o çabayı onlara yönelik olumlu saygımızı artırarak rasyonelleştiririz.

      Bilişsel çelişki teorisi bunu açıklar: sevmediğimiz veya nötr hissettiğimiz birine iyilik yaptığımızda, eylemimiz (yardım etmek) ve tutumumuz (sevmemek) arasında bir gerilim yaşarız. Bu gerilimi onları daha çok severek çözmek, tercihlerimize aykırı davrandığımızı kabul etmekten genellikle daha kolaydır.
    why_this_is_important: |
      Ben Franklin etkisini anlamak, ilişkileri stratejik olarak kurmanıza ve kendi duygularınızın geçmiş iyiliklerden nasıl etkilenebileceğini fark etmenize yardımcı olur. Ayrıca, bir ilişkiyi geliştirmeye çalışırken küçük iyilikler istemenin, onları sunmaktan neden daha etkili olabileceğini açıklar.
    when_to_use:
      - ilişki_kurma
      - müzakere
      - liderlik
      - çatışma_çözümü
    how_can_you_spot_it:
      liking_after_helping: |
        Daha önce nötr veya olumsuz hissetmiş olsanız bile, birine iyilik yaptıktan sonra o kişiye karşı daha sıcak hissettiğinizde bunu fark edin.
      others_requesting_small_favors: |
        Biri tekrar tekrar küçük iyilikler istiyorsa, yakınlık kurmak için bu etkiyi bilinçli veya bilinçsiz olarak kullanıyor olabilir.
      attitude_shift_post_investment: |
        Birine yardım etmek için zaman veya çaba harcadıktan sonra, onlara karşı fikrinizin olumlu yönde değişip değişmediğini gözlemleyin.
      reciprocal_relationship_dynamics: |
        Bir kişinin birçok iyilik yaptığı ilişkiler, eylemde dengeli görünmelerine rağmen, sevgi açısından dengesiz hissedilebilir.
    examples:
      networking: |
        Bir iş arkadaşınızdan bir taslak hakkında geri bildirim istemek, bu durumun onun başarınıza daha fazla yatırım yapmasını ve size daha olumlu yaklaşmasını sağlaması.
      sales: |
        Bir satış temsilcisinin bir potansiyel müşteriden küçük bir iyilik (örn. tavsiye veya tanıtım) istemesi, bu durumun potansiyel müşterinin bağlılığını ve sempatisini artırması.
      conflict_resolution: |
        Bir anlaşmazlıktan sonra, diğer taraftan ilgisiz bir konuda yardım istemek gerilimi azaltabilir ve iyi niyeti yeniden inşa edebilir.
      mentoring: |
        Kıdemli bir kişinin kıdemsiz bir kişiden girdi veya yardım istemesi durumunda, kıdemsiz kişi genellikle daha değerli ve bağlı hisseder.
    real_world_implications: |
      Ben Franklin etkisi işe alım, satış, diplomasi ve günlük sosyal dinamikleri etkiler. Köprüler kurmak için etik olarak veya sevgi manipüle etmek için etik olmayan bir şekilde kullanılabilir. Bunu tanımak, bazı ilişkilerin neden asimetrik iyilik verme sonrasında daha güçlü hissettirdiğini anlamanıza yardımcı olur.
    professional_application:
      networking_and_relationship_building: |
        İlişkiler kurarken, yalnızca iyilik sunmak yerine küçük, makul iyilikler istemeyi düşünün. Yardım etme eylemi yatırım ve olumlu bir saygı yaratır.
      collaborative_learning_initiative: |
        Ekiplerde, üyelerin birbirlerine yardım etmesi (örn. akran incelemesi, çapraz eğitim) uyumu güçlendirebilir. Herkesin hem yardım ettiği hem de yardım aldığı bir işbirliği yapısı oluşturun.
    how_can_this_be_misapplied:
      manipulation: |
        Gerçek bir ihtiyaç olmadan sadece birinin sizi sevmesini sağlamak için kasıtlı olarak iyilik istemek, keşfedildiğinde sömürücü hissettirebilir.
      overreliance_on_favors: |
        Yalnızca iyiliklerin kırık bir ilişkiyi düzelteceğini varsaymak; bazı çatışmalar doğrudan konuşma ve hesap verebilirlik gerektirir.
      asymmetric_exploitation: |
        Karşılık vermeden tekrar tekrar iyilik istemek geri tepebilir ve kırgınlığa neden olabilir.
      misattributing_motives: |
        Birinin sıcaklığını, büyük ölçüde sizden aldığı iyiliklerin bir sonucu olabilecekken tamamen samimi olarak varsaymak.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Sınırlı Rasyonellik
    quick_introduction: |
      Sınırlı rasyonellik, insan karar verme süreçlerinin mevcut bilgi, bilişsel kapasite ve zaman ile sınırlı olduğu fikridir. Optimize etmeyiz; "yeterince iyiyi" seçeriz – mümkün olan en iyi seçenek yerine iyi olanı seçeriz.
    one_liner: Yeterince iyiyi seçeriz, en iyiyi değil.
    try_this:
      - Mümkün olduğunca seçenekleri basitleştirin; çok fazla seçenek sınırlı rasyonelliği bunaltır.
      - Sonsuz aramadan kaçınmak için önceden "yeterince iyi" kriterleri belirleyin.
      - Azalan getiri noktasını aştığınızı fark edin.
    ask_yourself:
      - Yeterince iyi olacakken kusursuz seçeneği mi bulmaya çalışıyorum?
      - Kararımı sınırlayan hangi kısıtlamalar (zaman, bilgi, dikkat) var?
    in_more_detail: |
      Herbert Simon, kusursuz bilgiye sahip rasyonel aktörler varsayımına meydan okumak için bu kavramı tanıttı. Gerçekte, dikkatimiz, çalışma belleğimiz ve zamanımız sınırlıdır. Kısıtlamalarımız göz önüne alındığında, ideal anlamda en iyi olmasalar bile "rasyonel" kararlar almak için sezgiler ve kestirme yollar kullanırız.

      Sınırlı rasyonellik, neden her zaman en iyi seçeneği seçmediğimizi, neden genel kurallara güvendiğimizi ve bağlamın ve sunumun neden bu kadar önemli olduğunu açıklar. Bu, nasıl karar verdiğimizin tanımlayıcı bir modelidir, nasıl karar vermemiz gerektiğinin bir reçetesi değildir.
    why_this_is_important: |
      Sınırlı rasyonelliği anlamak, daha iyi süreçler tasarlamanıza, başkaları için seçimleri basitleştirmenize ve karar kalitesi için gerçekçi beklentiler belirlemenize yardımcı olur. Ayrıca, "irrasyonel" davranışın neden kısıtlamalar altında genellikle rasyonel olduğunu açıklar.
    when_to_use:
      - karar_verme
      - problem_cozme
      - liderlik
      - risk_degerlendirmesi
    how_can_you_spot_it:
      satisficing_behavior: |
        İnsanlar kapsamlı bir şekilde karşılaştırmak yerine kabul edilebilir ilk seçeneği seçerler.
      heuristic_reliance: |
        Kararlar, tam analiz yerine genel kurallar kullanılarak verilir.
      context_dependence: |
        Aynı kişi, seçeneklerin nasıl sunulduğuna bağlı olarak farklı seçimler yapar.
      information_overload: |
        Çok fazla bilgi mevcut olduğunda, karar kalitesi düşebilir.
    examples:
      hiring: |
        Bir yönetici, "en iyi" adayı bulmak için süresiz görüşme yapmak yerine, standardı karşılayan ilk adayı işe alır.
      consumer_choice: |
        Alışveriş yapanlar, mağazadaki her ürünü karşılaştırmak yerine raftaki ilk birkaç seçenekten birini seçerler.
      policy: |
        Seçmenler, her politika pozisyonunu analiz etmek yerine kısayollar olarak parti üyeliğini veya birkaç önemli konuyu kullanır.
      daily_routines: |
        İnsanlar her kararı yeniden optimize etmek yerine alışkanlıkları ve varsayılanları takip ederler.
    real_world_implications: |
      Sınırlı rasyonellik, piyasaları, politika tasarımını ve kurumsal davranışı şekillendirir. Dürtmeler ve seçim mimarisi, sınırlarımızı hesaba kattıkları için işe yarar. Onu göz ardı etmek, insanların etkili bir şekilde kullanamayacağı aşırı karmaşık sistemlere yol açar.
    professional_application:
      networking_and_relationship_building: |
        Başkalarının karmaşık ödünleşimleri gerçek zamanlı olarak işlemesini beklemeyin. Seçenekleri basitleştirin ve net varsayılanlar sağlayın.
      collaborative_learning_initiative: |
        Sınırlı rasyonellikle çalışan süreçler tasarlayın: seçenekleri azaltın, varsayılanlar sağlayın ve karmaşık kararlar için kontrol listeleri kullanın.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Karar yorgunluğuna ve kötü sonuçlara yol açan, sınırsız bilişsel kapasite varsayan süreçler tasarlamak.
      blaming_irrationality: |
        Başkalarının seçimlerini kısıtlamalarını dikkate almadan irrasyonel olarak görmezden gelmek.
      exploitation: |
        İstenen sonuçlara doğru yönlendirmek için insanları kasıtlı olarak karmaşıklıkla bunaltmak.
      perfectionism: |
        Yeterince iyi seçim yapmanın genellikle rasyonel yaklaşım olduğu durumlarda ideal kararlar beklemek.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Seyirci Etkisi
    quick_introduction: |
      Seyirci etkisi, bireylerin başkaları varken yardım etme olasılığının daha az olması eğilimidir. Ne kadar çok seyirci varsa, herhangi bir kişinin harekete geçme olasılığı o kadar azdır. Sorumluluk dağılır; başka birinin yardım edeceğini varsayarız.
    one_liner: Ne kadar çok insan varsa, herhangi bir kişinin harekete geçme olasılığı o kadar azdır.
    try_this:
      - Acil durumlarda sorumluluğu doğrudan atayın: Sen, 112'yi ara.
      - Başkasının yardım edeceğini varsaymayın—harekete geçin veya açıkça delege edin.
      - Başkalarının önce harekete geçmesini beklerken kendinizi fark edin.
    ask_yourself:
      - Başkaları varken sorumluluğu dağıtıyor muyum?
      - Yalnız olsaydım farklı mı hareket ederdim?
    in_more_detail: |
      Kitty Genovese'nin öldürülmesinden sonra (hikaye kısmen mitolojileştirilmiş olsa da), araştırmacılar başkalarının varlığının yardımı azalttığını buldular. Diğerlerinden ipuçları ararız—kimse harekete geçmezse, bunu "hareket gerekmez" olarak yorumlarız. Sorumluluğun dağılımını da deneyimleriz: birçok insan varken, her biri kendini kişisel olarak daha az sorumlu hisseder. Çoğulculukta cehalet meydana gelebilir: herkes bir sorun olduğunu düşünür ancak kimse hareket etmez çünkü başkası hareket etmiyordur.

      Etki, durum belirsiz olduğunda ve seyirciler birbirini tanımadığında en güçlüdür. Doğrudan sorumluluk atamasıyla ("Sen, 112'yi ara") üstesinden gelinebilir.
    why_this_is_important: |
      Seyirci etkisini anlamak, başkaları yapmadığında harekete geçmenize ve bunu aşan sistemler tasarlamanıza yardımcı olur. Başınız dertteyken, tek bir kişiyi belirleyin. Seyirciyseniz, başkalarının harekete geçmesini beklemeyin.
    when_to_use:
      - liderlik
      - iliski_kurma
      - anlasmazlik_cozumu
      - karar_verme
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        Çoğu kişi varken "Başka biri yapar."
      pluralistic_ignorance: |
        Herkes eylemin gerektiğini düşünür ama kimse başkası eyleme geçmediği için harekete geçmez.
      social_proof_inaction: |
        Başkalarının eylemsizliği "hareket gerekmez" olarak yorumlanır.
      audience_inhibition: |
        Aptal görünme veya aşırı tepki verme korkusu eylemi engeller.
    examples:
      emergency: |
        Bir kişi çöker; birçok seyirciyle, her birinin yardım çağırma olasılığı daha düşüktür.
      workplace: |
        Herkes bir sorun görür ama kimse onu dile getirmez—her biri başkasının halledeceğini varsayar.
      harassment: |
        Tacize tanık olanlar müdahale etmez, her biri başkalarının harekete geçeceğini düşünür.
      meetings: |
        Herkesin başka birinin konuşacağını varsayması nedeniyle kötü bir fikir sorgulanmadan geçer.
    real_world_implications: |
      Seyirci etkisi acil durumlarda trajik sonuçlara yol açabilir ve kuruluşlarda sorunların devam etmesine izin verir. Bunu aşmak, doğrudan sorumluluk ataması ve müdahaleyi teşvik eden normlar gerektirir.
    professional_application:
      networking_and_relationship_building: |
        Yardıma ihtiyacınız olduğunda, belirli bir kişiden isteyin. Yanlış bir şey gördüğünüzde, başkalarının yapacağını varsaymadan harekete geçin. Konuşmanın beklendiği ve ödüllendirildiği normlar oluşturun.
      collaborative_learning_initiative: |
        İnsanlara seyirci etkisini tanıma ve müdahale etme konusunda eğitim verin. "Bir şey görürseniz, söyleyin" kullanın ve açık roller atayın. İlk konuşanları ödüllendirin.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Etkinin güçlü bir durumsal güç olduğu durumlarda bireyleri sert bir şekilde yargılama—durumu değiştirmeye odaklanın.
      false_assumption: |
        Yeterince insan varken birinin her zaman yardım edeceğini varsaymak—çoğu zaman tam tersi doğrudur.
      overcorrection: |
        Herkesi sorumlu tutmak ki kimse sorumlu olmasın—sorumluluk hala dağılabilir.
      individualizing: |
        Seyirci etkisini durumsal bir olgu yerine bir karakter kusuru olarak ele almak.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Yetkinlik Çemberi
    quick_introduction: |
      Yetkinlik çemberi, uzmanlığınızın sınırlarını bilmenizi ve önemli kararlar alırken bu sınırlar içinde kalmanızı öğütleyen bir zihinsel modeldir. Warren Buffett ve Charlie Munger, neyi bilmediğinizi bilmenin altını çizmektedir.
    one_liner: Uzmanlığınızın sınırlarını bilin — ve işler kritikleştiğinde bu sınırlar içinde kalın.
    try_this:
      - Gerçek uzmanlığınızın olduğu alanları tahmin yürüttüğünüz alanlardan ayırın.
      - Çemberinizin dışındayken tavsiye alın veya başkasına devredin.
      - Dürüst olun: Gerçek bir uzman sizin yargınıza burada katılır mıydı?
    ask_yourself:
      - Yetkinlik çemberimin içinde miyim, yoksa tahmin mi yürütüyorum?
      - Bu alanda en son ne zaman "Bilmiyorum" itirafında bulundum?
    in_more_detail: |
      Her insanın gerçek uzmanlığa sahip olduğu alanlar vardır — burada bilgileri değerlendirebilir, hataları tespit edebilir ve güvenilir yargılarda bulunabilirler. Bu çemberin dışında, herkes kadar önyargılara ve hatalara eğilimlidirler. Önemli olan dürüst bir öz değerlendirmedir: Nerede gerçekten yetkinsiniz ve nerede tahmin yürütüyorsunuz?

      Çember, bilinçli öğrenmeyle genişleyebilir, ancak mevcut sınırlarını tanımak için tevazu gerektirir. Çemberinizin dışında faaliyet göstermek, özellikle riskler yüksekken maliyetli hataların olasılığını artırır.
    why_this_is_important: |
      Yetkinlik çemberiniz içinde kalmak, maliyetli hataları azaltır ve karar kalitesini artırır. Ayrıca ne zaman tavsiye almanız, ne zaman devretmeniz veya ne zaman çekinceli davranmanız gerektiğini bilmenize yardımcı olur. Çemberinizin dışındaki aşırı güven, başarısızlığın önemli bir kaynağıdır.
    when_to_use:
      - karar_verme
      - yatırım
      - kariyer_hamleleri
      - risk_değerlendirmesi
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Bir alandaki bilgi limitlerinizi açıklayabilir misiniz? Neyi bilmediğinizi biliyor musunuz?
      knowing_when_to_defer: |
        Yalnız karar vermek yerine uzman girdisi aramanız gereken durumları tanımak.
      consistent_track_record: |
        Çemberiniz içinde, yargılarınız zamanla doğrulanma eğilimindedir; dışında ise doğrulanmaz.
      calibration: |
        Bir alandaki güveniniz, o alandaki gerçek performansınızla eşleşir.
    examples:
      investing: |
        Buffett, teknoloji hisse senetlerinden kaçınır çünkü bunlar kendi yetkinlik çemberinin dışında olduklarını ve onları güvenilir bir şekilde değerlendiremediğini söyler.
      career: |
        Kendi alanında kalan bir uzman ile ilgisiz bir alanda "zorlayıcı" bir rol üstlenen bir uzman.
      hiring: |
        Kendi yargınıza ne zaman güveneceğinizi bilmek yerine teknik roller için uzmanları dahil etmek.
      advice_giving: |
        Tahmin yürütmek yerine uzmanlık alanınızın dışındaki konular hakkında görüş bildirmeyi reddetmek.
    real_world_implications: |
      Yetkinlik çemberi, değer yatırımının ve profesyonel başarının merkezindedir. Bunu göz ardı etmek aşırı güvene, başarısız girişimlere ve kötü tavsiyelere yol açar. Çemberi genişletmek bilinçli çaba ve dürüst geri bildirim gerektirir.
    professional_application:
      networking_and_relationship_building: |
        Yetkinlik çemberleri sizininkini tamamlayan insanlarla ilişkiler kurun. Kendiniz cevaplamak yerine başkalarını tanıtmanız gereken zamanı bilin.
      collaborative_learning_initiative: |
        Örtüşen ve birbirini tamamlayan çemberlere sahip ekipler oluşturun. İnsanları yetkinliklerinin dışında faaliyet gösterdiklerinde bunu belirtmeleri için teşvik edin.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Asla çemberinizin dışına çıkmamak, büyümeyi ve öğrenmeyi sınırlayabilir.
      false_modesty: |
        Sorumluluktan veya zorlu kararlardan kaçınmak için küçük bir çember iddiasında bulunmak.
      gatekeeping: |
        Argümanlarına katılmadan başkalarını reddetmek için "yetkinlik çemberi"ni kullanmak.
      stagnation: |
        Çemberi sabit olarak ele almak yerine çabayla genişleyebilecek bir şey olarak görmek.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Bilişsel Uyumsuzluk
    quick_introduction: |
      Bilişsel uyumsuzluk, çelişkili inançlara sahip olduğumuzda veya
      eylemlerimiz inançlarımızla çeliştiğinde hissettiğimiz zihinsel rahatsızlıktır.
      Bu rahatsızlığı azaltma motivasyonuna sahibiz—genellikle eylemlerimizi
      değiştirmek yerine inançlarımızı eylemlerimizle eşleşecek şekilde değiştirerek.
    one_liner: Eylemlerimizi değiştirmek yerine inançlarımızı eylemlerimize uydurmayı daha sık yaparız.
    try_this:
      - Davranışı değiştirmek yerine rahatsızlığı azaltmak için rasyonelleştirme yaptığınızı fark edin.
      - Sorun: Yaptığımı haklı çıkarmak için inançlarımı mı ayarlıyorum?
      - Eylemi değiştirmekte mi, inancı değiştirmekte mi daha dürüst olacağını düşünün.
    ask_yourself:
      - Uyumsuzluğu rasyonelleştirerek mi, yoksa gerçekten değiştirerek mi azaltıyorum?
      - Zaten böyle hareket etmemiş olsaydım bu inanca sahip olur muydum?
    in_more_detail: |
      Leon Festinger'in teorisi, tutarlılık aradığımızı açıklar. Değerlerimize
      aykırı davrandığımızda (örneğin, yalan söylemek, para israf etmek),
      uyumsuzluk yaşarız. Bunu azaltmak için inancımızı ("Aslında yalan değildi")
      değiştirebilir veya eylemi en aza indirebiliriz ("O kadar da kötü değildi").
      Genellikle reform yapmak yerine rasyonelleştiririz.

      Bilişsel uyumsuzluk, Ben Franklin etkisini (yardım ettiğimiz insanları severiz)
      tetikler, geçmiş kararları neden haklı çıkardığımızı açıklar ve birçok
      kendini kandırma eyleminin temelini oluşturur. İnanç oluşumu ve değişiminde
      güçlü bir kuvvettir.
    why_this_is_important: |
      Bilişsel uyumsuzluğu anlamak, kendi rasyonelleştirmelerinizi tanımanıza
      ve insanların neden fikirlerini değiştirmeye direndiğini anlamanıza yardımcı olur.
      Ayrıca, bağlılık ve tutarlılığın neden güçlü ikna prensipleri olduğunu açıklar.
    when_to_use:
      - karar_verme
      - ilişki_kurma
      - liderlik
      - çatışma_çözümü
    how_can_you_spot_it:
      post_decision_rationalization: |
        Bir seçimden sonra, yaptığımız seçimin olumlu yönlerini ve reddedilen
        seçeneklerin olumsuz yönlerini vurgularız.
      belief_action_alignment: |
        Zaten gerçekleştirdiğimiz eylemlerle uyumlu hale getirmek için inançlarımızı
        ayarlarız.
      discomfort_with_inconsistency: |
        Davranışımızın beyan ettiğimiz değerlerimizle uyuşmadığını fark ettiğimizde
        duyulan huzursuzluk.
      resistance_to_disconfirming_evidence: |
        Taahhütlerimizle çelişen bilgileri reddetme veya en aza indirme.
    examples:
      purchase_justification: |
        Pahalı bir eşya satın aldıktan sonra, faydalarını vurgular ve maliyetini
        düşük gösteririz.
      relationship: |
        Kötü bir ilişkide iyi yönlere odaklanıp kötü yönleri en aza indirerek
        kalmayı haklı çıkarırız.
      career: |
        Hoşlanmadığımız bir işte "kalmak zorunda olduğumuz" nedenleri vurgulayarak
        orada kalmayı haklı çıkarırız.
      beliefs: |
        Eylemlerimiz değerlerimizle çeliştiğinde, eylemlerimizi değil, değerlerimizi
        değiştiririz ("Ben aslında vejetaryen değilim—sadece bazen et yerim").
    real_world_implications: |
      Bilişsel uyumsuzluk, inanç oluşumunu, tüketici davranışlarını ve siyasi
      tutumu şekillendirir. İnsanların kötü kararlar sonrası neden daha da
      bağlandığını ve davranış değişikliğinin neden inançları değiştirebileceğini
      açıklar.
    professional_application:
      networking_and_relationship_building: |
        Küçük taahhütler daha büyük taahhütlere yol açabilir—insanlar geçmiş
        eylemlerini rasyonelleştirir. Bunu etik olarak kullanın: küçük
        rica ile başlayın. Kendi davranışlarınızı rasyonelleştirirken dikkatli olun.
      collaborative_learning_initiative: |
        Değişiklik yaparken, erken destek alın ve küçük taahhütlerde bulunun—
        bunlar daha büyük benimsemeyi motive eden uyumsuzluk yaratır.
        Kızgınlık yaratan kamuya açık taahhütlerden kaçının.
    how_can_this_be_misapplied:
      manipulation: |
        İnsanları uyuma zorlamak için kasıtlı olarak uyumsuzluk yaratma.
      dismissing_genuine_change: |
        İnsanların bazen gerçekten güncellediği durumlarda tüm inanç
        değişimini rasyonelleştirme olarak görmezden gelme.
      forced_consistency: |
        Görüşleri meşru bir şekilde gelişmişken insanları "tutarlı" olmaya zorlama.
      self_deception: |
        Kendimiz hakkındaki rahatsız edici gerçeklerden kaçınmayı haklı
        çıkarmak için uyumsuzluk teorisini kullanma.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Doğrulama Yanılgısı
    quick_introduction: |
      Doğrulama yanılgısı, mevcut inançlarımızı doğrulayacak şekilde bilgi arama, yorumlama ve hatırlama eğilimidir. Destekleyici kanıtlara daha fazla ağırlık verir ve görüşlerimize aykırı olan kanıtları göz ardı eder veya reddederiz. Hipotezlerimizi test etmek yerine doğrulayan sorular sorarız.
    one_liner: İnançlarımızı doğrulayanı arar ve hatırlarız; zıttı olanı göz ardı ederiz.
    try_this:
      - Şöyle Sorun: Beni ne yanlış çıkarır? Aktif olarak doğrulamayan kanıtlar arayın.
      - Destekleyici bilgilere, çelişen bilgilere olduğundan daha fazla ağırlık verdiğinizde bunu fark edin.
      - Karşıt görüşü kendi görüşünüz kadar ciddiye alın.
    ask_yourself:
      - Hipotezimi test ediyor muyum yoksa sadece doğruluyor muyum?
      - Yeni bir kanıta dayanarak en son ne zaman fikrimi değiştirdim?
    in_more_detail: |
      Bilginin tarafsız işlemcileri değiliz. Doğrulama ararız, belirsizliği destek olarak yorumlarız ve isabetleri kaçırdıklarımızdan daha fazla hatırlarız. Kendimizi benzer düşünen insanlarla ve medya ile çevreleriz. "Neden haklıyım?" yerine "Beni ne yanlış çıkarır?" diye sorarız. Bu bizi aşırı kendine güvenli ve güncellenmeye yavaş hale getirir.

      Doğrulama yanılgısı, en yaygın ve en iyi belgelenmiş yanılgılardan biridir. Bilimi, siyaseti, ilişkileri ve iş dünyasını etkiler. Üstesinden gelmek kasıtlı çaba ve yapılandırılmış süreçler gerektirir.
    why_this_is_important: |
      Doğrulama yanılgısını tanımak, iyi karar verme ve öğrenme için esastır. Doğrulamayan kanıtlar aramanıza, alternatif hipotezleri göz önünde bulundurmanıza ve gerektiğinde inançlarınızı güncellemenize yardımcı olur. Bilimsel düşüncenin temelidir.
    when_to_use:
      - karar_verme
      - öğrenme
      - problem_çözme
      - risk_değerlendirmesi
    how_can_you_spot_it:
      seeking_support: |
        Görüşünüzü test etmek yerine doğrulayan kanıtlar aramak.
      asymmetric_interpretation: |
        Belirsiz kanıtları konumunuzu destekler şekilde yorumlamak.
      discounting_disconfirming: |
        İnançlarınızla çelişen kanıtları reddetmek veya küçümsemek.
      selective_exposure: |
        Yalnızca size katılan kaynaklardan bilgi tüketmek.
    examples:
      hiring: |
        Erken olumlu bir izlenim oluşturmak ve ardından adayın harika olduğunu
        doğrulayan sorular sormak.
      investing: |
        Bir hisse senedi satın aldıktan sonra olumlu haberler aramak ve
        olumsuz analizleri göz ardı etmek.
      relationships: |
        Bir partnerin eylemlerini, onlar hakkındaki görüşünüzü (iyi veya kötü)
        doğrulayan bir mercekten yorumlamak.
      politics: |
        Kendi tarafınızdan gelen bilgileri eleştirmeden kabul etmek ve karşı
        taraftan gelen eşdeğer bilgileri reddetmek.
    real_world_implications: |
      Doğrulama yanılgısı yanlış inançları sürdürür, kutuplaşmayı körükler ve
      maliyetli hatalara neden olur. İyi bilimin ve iyi karar vermenin
      düşmanıdır. Üstesinden gelmek kasıtlı doğrulamayan kanıt arayışını
      gerektirir.
    professional_application:
      networking_and_relationship_building: |
        İnsanlar hakkında görüş oluştururken aktif olarak doğrulamayan kanıtlar
        arayın. "Fikrimi ne değiştirir?" diye sorun ve onu arayın.
      collaborative_learning_initiative: |
        Doğrulamayan bakış açılarını ortaya çıkarmak için şeytanın avukatını,
        kırmızı takımları ve ön-ölümleri kullanın. İyi kanıtlarla hakim
        görüşleri sorgulayan kişileri ödüllendirin.
    how_can_this_be_misapplied:
      false_balance: |
        Kanıtlar bir tarafı güçlü bir şekilde desteklediğinde tüm görüşleri
        eşit derecede geçerliymiş gibi ele almak.
      excessive_skepticism: |
        Bazı inançlar iyi desteklendiğinde tüm kanıtları "doğrulama
        yanılgısı" olarak reddetmek.
      contrarianism: |
        Doğrulama yanılgısından kaçınmak için sadece karşıt görüşü
        benimsemek—orijinal görüş doğru olabilecekken.
      analysis_paralysis: |
        "Yanılmış olabiliriz" çünkü asla bir görüşe bağlanamamak.
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Bilginin Laneti
    quick_introduction: |
      Bilginin laneti, bir şeye sahip olduktan sonra onu bilmediğiniz zamanları hayal etmenin zorluğudur. Uzmanlar, yeni başlayanların bakış açısını yeniden yaratamadıkları için onlara öğretmekte zorlanırlar. Bir kere bildiniz mi, bilmediğiniz zamanları unutursunuz.
    one_liner: Bir şeyi bir kere bildiniz mi, bilmediğiniz zamanları unutursunuz.
    try_this:
      - Açıklama yaparken ilk prensiplerden başlayın; dinleyicinizin hiçbir şey bilmediğini varsayın.
      - Bir yeni başlayandan geri açıklamasını isteyin; onların kafa karışıklığı sizin kör noktalarınızı ortaya çıkarır.
      - Adımları atladığınızı veya başkalarının bilmediği jargonu kullandığınızı fark ettiğinizde durun.
    ask_yourself:
      - Başkalarının benimle aynı bağlama sahip olduğunu varsayıyor muyum?
      - Benim geçmişim olmadan biri bunu anlar mı?
    in_more_detail: |
      Klasik bir deneyde, bir bulmacanın cevabını bilen kişiler, bir şarkının ritmini tıklayarak başkalarının bunu tahmin etmesini beklediler; ne kadar belirgin olduğunu abarttılar. Tıklayanlar, kafalarındaki şarkıyı "duyamaz" hale geldiler. Bilgi "yapışkan"dır; cehaleti simüle etmek zordur.

      Lanet, öğretimi, iletişimi, ürün tasarımını ve liderliği etkiler. Başkalarının bizimle aynı bağlama sahip olduğunu varsayarız. Jargon kullanırız. Adımları atlarız. İnsanlar "anlamadığında" şaşırırız.
    why_this_is_important: |
      Bilginin lanetini tanımak, öğretimi, iletişimi ve ürün tasarımını geliştirir. Sizi olduğunuz yerde değil, oldukları yerde buluşmanıza yardımcı olur. Etkili bilgi aktarımı için esastır.
    when_to_use:
      - öğrenme
      - liderlik
      - problem_çözme
      - ilişki_kurma
    how_can_you_spot_it:
      obvious_to_you: |
        "Açıkça ortada" olduğunda, bu sadece cevabı bildiğiniz için ortada olduğu anlamına gelir.
      jargon_use: |
        Tanımlamadan dinleyicilerin bilmediği terimleri kullanmak.
      skipped_steps: |
        Başkalarının sizin bıraktığınızı tamamlayacağını varsaymak.
      frustration_with_learners: |
        "Neden göremiyorlar?" dediğinizde, sizin bağlamınıza sahip olmadıkları için.
    examples:
      teaching: |
        Bir matematik profesörü, onlara "açıkça ortada" olan ancak
        öğrenciler için temel olan adımları atlar.
      product_design: |
        Tasarımcılar, kendilerine mantıklı gelen ancak yeni kullanıcıları
        şaşırtan arayüzler oluştururlar.
      onboarding: |
        Deneyimli çalışanlar, yeni işe başlayanların neyi bilmediğini unutur ve
        yetersiz eğitim verirler.
      writing: |
        Yazarlar, okuyucuların aynı geçmişe sahip olduğunu varsayar ve
        gerekli bağlamı kaçırırlar.
    real_world_implications: |
      Bilginin laneti iletişim boşlukları, başarısız ürünler ve etkisiz öğretim yaratır. Uzmanların neden kötü öğretmen olabileceğinin bir nedenidir. Bunu aşmak, dinleyicinin bakış açısını benimsemek için kasıtlı çaba gerektirir.
    professional_application:
      networking_and_relationship_building: |
        Açıklama yaparken, karşıdaki kişinin seviyesinden başlayın. "Neyi
        zaten biliyor?" diye sorun. İletişiminizi sizin geçmişinize sahip olmayan
        biriyle test edin.
      collaborative_learning_initiative: |
        "Beş yaşındaymışım gibi anlat" egzersizleri kullanın. Uzmanlar yeni
        başlayanlara ders versin ve geri bildirim alsın. Önceden bilgi gerektirmeyen
        belgeler oluşturun. Yakın zamanda öğrenmiş olanların yeni başlayan bakış
        açısını hatırladığı akran öğretimi kullanın.
    how_can_this_be_misapplied:
      oversimplification: |
        Yanlışlık veya küçümseme noktasına kadar basitleştirmek.
      false_assumption: |
        Başkalarının olduğundan daha az bildiğini varsaymak - bu da bir kalibrasyon
        başarısızlığıdır.
      one_size_fits_all: |
        Tüm dinleyiciler aynı düzeyde açıklamaya ihtiyaç duymaz; dinleyiciye göre
        uyarlayın.
      avoiding_complexity: |
        Bazı konular karmaşıktır; bilginin laneti, uygun olduğunda teknik dil
        kullanmamamız gerektiği anlamına gelmez.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Varsayılan Etki
    quick_introduction: |
      Varsayılan etki, seçenekler sunulduğunda önceden seçilmiş seçeneği tercih etme eğilimidir. Varsayılan olarak ne ayarlanmışsa güçlü bir avantaja sahiptir—insanlar, kendileri için en uygun olup olmadığına bakılmaksızın genellikle ona bağlı kalır.
    one_liner: Varsayılan olarak ne ayarlanmışsa güçlü bir avantaja sahiptir—ona bağlı kalırız.
    try_this:
      - Alternatifleri değerlendirmeden varsayılanı kabul ettiğinizde bunu fark edin.
      - Seçim tasarlarken, kullanıcıların en iyi çıkarlarını gözeten varsayılanlar belirleyin.
      - Sorun: Önceden seçilmemiş olsaydı bunu seçer miydim?
    ask_yourself:
      - Varsayılanı atalet nedeniyle mi seçiyorum, yoksa benim için en iyisi olduğu için mi?
      - Bu varsayılanı kim belirledi ve bundan ne gibi bir çıkarı olabilir?
    in_more_detail: |
      Varsayılanlar, atalet, kayıptan kaçınma (değiştirmenin varsayılanı kaybetmek gibi hissettirmesi) ve ima edilen onay (varsayılanın tavsiye edildiğini varsayıyoruz) nedeniyle işe yarar. Organ bağışı oranları, büyük ölçüde varsayılanın dahil olma mı yoksa dışarıda bırakılma mı olduğuna bağlı olarak ülkeden ülkeye büyük ölçüde değişiklik göstermektedir. Emeklilik tasarruflarına katılım, kayıt otomatik olduğunda artar.

      Varsayılanlar iyi için (daha iyi sonuçlara doğru yönlendirme) veya manipülasyon için (olumsuz koşulları önceden işaretlenmiş kutularda gizleme) kullanılabilir. Etkiyi anlamak, daha iyi sistemler tasarlamanıza ve istenmeyen varsayılanlara diremenize yardımcı olur.
    why_this_is_important: |
      Varsayılan etkiyi anlamak, sonuçları iyileştiren seçim mimarisi tasarlamanıza yardımcı olur ve seçimlerinizin kasıtlı tercihler yerine varsayılanlar tarafından şekillendirildiğini fark etmenize yardımcı olur.
    when_to_use:
      - karar_verme
      - liderlik
      - problem_çözme
      - risk_değerlendirmesi
    how_can_you_spot_it:
      inertia_toward_default: |
        Çoğu insan önceden seçilmiş olanla yetinir.
      implied_recommendation: |
        Varsayılanı "bize seçmemizi istedikleri şey" olarak yorumlarız.
      opt_in_vs_opt_out: |
        Çerçeveleme, katılımı dramatik bir şekilde değiştirir (dahil olma vs. dışarıda bırakma).
      pre_checked_boxes: |
        Önceden seçilmiş seçenekler, formlarda ve ayarlarda güçlü bir avantaja sahiptir.
    examples:
      organ_donation: |
        Dışarıda bırakma ülkeleri, dahil olma ülkelerinden çok daha yüksek bağış oranlarına sahiptir—varsayılan, tutumlardan daha önemlidir.
      retirement_savings: |
        Otomatik kayıt, 401(k) katılımını dramatik bir şekilde artırır.
      software_installers: |
        "Önerilen" seçenekler ve önceden işaretlenmiş eklentiler, kullanıcıların ne yüklediğini şekillendirir.
      subscriptions: |
        Ücretli kayda varsayılan olan ücretsiz denemeler, aktif olarak abone olmayı seçmeyecek birçok kişiyi yakalar.
    real_world_implications: |
      Varsayılan etki, en güçlü yönlendirmelerden biridir. Tasarrufu, sağlığı, gizliliği ve tüketici davranışını şekillendirir. Etik seçim mimarisi, sonuçları iyileştirmek için varsayılanları kullanır; karanlık desenler ise bunları istismar etmek için kullanır.
    professional_application:
      networking_and_relationship_building: |
        Başkaları için süreçler tasarlarken, çıkarlarını gözeten varsayılanlar seçin. Varsayılanları değeri çıkarmak için kullanan karanlık desenlerden kaçının.
      collaborative_learning_initiative: |
        İstenen davranışla uyumlu olan ekip uygulamaları için varsayılanlar belirleyin (örn. asenkron varsayılan, dokümantasyon varsayılan). Doğru seçimi kolay seçim haline getirin.
    how_can_this_be_misapplied:
      dark_patterns: |
        İnsanları olumsuz seçimlere kandırmak için varsayılanları kullanmak (örn. gizli ücretler, istenmeyen abonelikler).
      paternalism: |
        Rıza olmadan gerçek tercihi geçersiz kılan varsayılanları dayatmak.
      manipulation: |
        Olumsuz koşulları varsayılanlarda gizlemek ve atalete güvenmek.
      one_size_fits_all: |
        Tercihler değişkenlik gösterdiğinde aynı varsayılanın herkes için doğru olduğunu varsaymak.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Dunning-Kruger Effect
    quick_introduction: |
      The Dunning-Kruger effect describes a cognitive bias where people with limited
      knowledge or skill in a domain overestimate their competence, while experts tend
      to underestimate theirs. The less you know, the more confident you may be.
    one_liner: The less you know, the more confident you may be.
    try_this:
      - In new domains, assume you're overconfident—seek feedback and calibration.
      - When experts express doubt, take it seriously; they may know the edge cases.
      - Notice when novices are more certain than experts in a field.
    ask_yourself:
      - Am I in the "peak of Mount Stupid" or the "valley of humility"?
      - Do I have the metacognitive ability to evaluate my own competence here?
    in_more_detail: |
      Dunning and Kruger's research showed that incompetent individuals lack the
      metacognitive ability to recognize their own incompetence. To evaluate your
      performance, you need the same skills required to perform well—so the unskilled
      are doubly disadvantaged: they perform poorly and don't know it.

      As competence increases, people often experience a "valley of humility" where they
      recognize how much they don't know. True experts may underconfidence because they
      are acutely aware of nuance and edge cases.
    why_this_is_important: |
      Recognizing the Dunning-Kruger effect helps you calibrate your own confidence,
      avoid overestimating novices' opinions, and appreciate expert humility. It's
      essential for learning, hiring, and decision-making.
    when_to_use:
      - learning
      - decision-making
      - leadership
      - career_moves
    how_can_you_spot_it:
      novice_overconfidence: |
        Someone with little experience expresses strong, unqualified opinions.
      expert_underconfidence: |
        Highly skilled people hedge and express uncertainty more than less skilled people.
      inability_to_recognize_quality: |
        Poor performers can't distinguish good from bad work in their domain.
      confidence_competence_mismatch: |
        Confidence and actual ability are inversely correlated among beginners.
    examples:
      social_media: |
        People with surface-level knowledge of a topic confidently argue with domain
        experts.
      hiring: |
        Candidates who perform poorly in interviews sometimes rate their own performance
        highly.
      investing: |
        New investors may be overconfident after early wins, not recognizing luck.
      workplace: |
        Junior employees may overestimate their readiness for promotion while seniors
        doubt themselves.
    real_world_implications: |
      The Dunning-Kruger effect affects education, hiring, politics, and public discourse.
      It explains why bad ideas get amplified and why experts can be dismissed. Calibration
      matters for individual and collective decision-making.
    professional_application:
      networking_and_relationship_building: |
        When someone is very confident, consider whether they might be in the
        Dunning-Kruger zone. Seek diverse perspectives, including from those who
        express uncertainty.
      collaborative_learning_initiative: |
        Create cultures where admitting uncertainty is valued. Encourage calibration
        exercises and feedback that helps people accurately assess their competence.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Assuming that confident people are always wrong; sometimes confidence is
        warranted.
      false_modesty: |
        Experts pretending to know less than they do to appear humble.
      gatekeeping: |
        Using Dunning-Kruger to dismiss anyone who disagrees with "experts" without
        engaging their arguments.
      self_doubt_paralysis: |
        Overcorrecting to the point of never trusting your own judgment.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Empati Boşluğu
    quick_introduction: |
      Empati boşluğu, kendi farklı bir durumda olduğumuzda başkalarının zihinsel
      durumlarını anlamanın ve tahmin etmenin zorluğudur. Sakin olduğumuzda,
      kızgın veya aç olduğumuzda nasıl hissedeceğimizi hafife alırız. Tok olduğumuzda,
      aç olduğumuzda yiyeceği ne kadar isteyeceğimizi hafife alırız.
    one_liner: Farklı durumlarda nasıl hissedeceğimizi ve başkalarının nasıl hissettiğini hafife alırız.
    try_this:
      - Sakin olduğunuzda, stresli olacağınız zamanlar için taahhütlerde bulunun; önceden taahhütte bulunun.
      - Aç, yorgun, korkmuş bir durumda olmadığınız sürece başkalarına yargılamayın.
      - Sorun: Mevcut durumumu gelecekteki kendime veya başkalarına mı yansıtıyorum?
    ask_yourself:
      - Farklı bir durumda nasıl hissedeceğimi mi hafife alıyorum?
      - Onların durumunda olsaydım bu kişiyi daha iyi anlar mıydım?
    in_more_detail: |
      Farklı koşullarda nasıl hissedeceğimizi ve şu anda bulunmadığımız
      durumlarda başkalarının nasıl hissettiğini hayal etmekte zorlanırız. Ayık bir
      kişi, bağımlılığın çekiciliğini hafife alır. İyi dinlenmiş bir kişi, uyku
      yoksunluğunun etkisini hafife alır. Mevcut durumumuzu başkalarına ve
      gelecekteki kendimize yansıtırız.

      Empati boşluğu, gelecekteki kendimiz için (örneğin motive olduğumuzda
      egzersiz yapmaya karar vermek), başkaları için yaptığımız kararları ve
      farklı durumlardaki insanları anlama yeteneğimizi etkiler.
    why_this_is_important: |
      Empati boşluğunu tanımak, gelecekteki sizin için karar verme, başkalarına
      karşı empati ve kendi değişkenliğimizi anlamayı geliştirir. Tutamayacağımız
      taahhütlerde bulunmamızın ve sıkıntıdaki diğer insanları neden yanlış
      anladığımızı açıklar.
    when_to_use:
      - karar_verme
      - ilişki_kurma
      - liderlik
      - çatışma_çözümü
    how_can_you_spot_it:
      current_state_projection: |
        Başkalarının şu anki gibi hissettiğini veya gelecekteki kendimizin şu
        an bizim gibi hissedeceğini varsaymak.
      underestimating_emotional_state: |
        Onların içinde bulunmadığı bir durumda "Nesi var ki?" demek.
      commitment_failures: |
        Mevcut motivasyona dayanarak, motivasyon azaldığında sürdürmeyeceğimiz
        seçimler yapmak.
      misunderstanding_others: |
        Mevcut durumumuzdan hayal edemediğimiz için başkalarının deneyimlerini
        görmezden gelmek.
    examples:
      hunger: |
        Açken değil, tokken market alışverişi yapmak - açken isteyeceğimizden
        daha az satın alırız.
      addiction: |
        Bağımlı olmayanlar bırakmanın zorluğunu hafife alırlar; iyileşmekte
        olan bağımlılar, kullandıkları zaman çekiciliğin gücünü hafife alabilirler.
      conflict: |
        Sakin olduğumuzda, çatışma anında nasıl tepki vereceğimizi hafife alırız.
      motivation: |
        Motive olduğumuzda sabah 6'da bir derse kaydolmak - ve uykulu
        olduğumuzda gitmemek.
    real_world_implications: |
      Empati boşluğu, bağımlılık tedavisi, politika ve kişilerarası anlayışı
      etkiler. Tuttuğumuz sözleri neden tutmadığımızı ve başkalarının bakış
      açılarını neden sıklıkla anlamakta başarısız olduğumuzu açıklar. Empati ve
      iyi karar verme önünde bir engeldir.
    professional_application:
      networking_and_relationship_building: |
        Birisi stresli, kızgın veya farklı bir durumdayken, sizin gibi
        düşüneceklerini varsaymayın. Onların durumunu hayal etmeye çalışın.
        Taahhütlerde bulunurken, motivasyon azaldığında nasıl
        hissedeceğinizi düşünün.
      collaborative_learning_initiative: |
        Planlama yaparken, ekibin yorgun, baskı altında veya sinirli
        olduğunda nasıl hissedeceğini düşünün. Sadece motive planlama durumu
        için değil, o durumlar için tasarım yapın.
    how_can_this_be_misapplied:
      overattribution: |
        Bazen insanların gerçekten farklı değerlere sahip olduğu durumlarda,
        tüm yanlış anlamaları "empati boşluğu" olarak görmezden gelmek.
      excusing_behavior: |
        "Yardım edemezlerdi - empati boşluğu" demek, oysa insanlar kendi
        durumlarını yönetmekten sorumludur.
      false_relativism: |
        Çaba ve deneyimle gelişebileceğimiz halde, asla başkalarını
        anlayamayacağımızı varsaymak.
      self_excuse: |
        Kendi takip etmeme başarısızlıklarımızı haklı çıkarmak için empati
        boşluğunu kullanmak.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Sahiplik Etkisi
    quick_introduction: |
      Sahiplik etkisi, bir şeye sadece ona sahip olduğumuz için daha yüksek değer verme eğilimidir. Onu elde etmek için ödeyeceğimizden daha fazlasını ondan vazgeçmek için talep ederiz. Sahiplik, değerlememizi bozan bir bağ oluşturur.
    one_liner: Sahip olduklarımızı sahip olmadıklarımızdan daha çok değerleriz - sahiplik bağ oluşturur.
    try_this:
      - Ask: Eğer ona sahip olmasaydım, onu elde etmek için ne kadar öderdim?
      - When selling, imagine you're buying—would you pay your asking price?
      - Notice when ownership is inflating your valuation.
    ask_yourself:
      - Ona sahip olduğum için onu fazla mı değerlendiriyorum?
      - Tarafsız bir alıcı benim fiyatıma katılır mıydı?
    in_more_detail: |
      Deneylerde, rastgele bir kupa verilen insanlar, başkalarının onu satın almak için ödemeye istekli olduğundan yaklaşık iki kat daha fazla satmak için talep ediyorlar. Sahipliğin basit gerçeği algılanan değeri artırır. Bu, kayıp kaçınmayla ilgilidir - bir şeyden vazgeçmek bir kayıp gibidir ve biz kayıptan kaçınırız. Ancak etki bunun ötesine geçer: sahip olduğumuz şeyleri kimliğimize dahil ederiz.

      Sahiplik etkisi müzakereleri, tüketici davranışlarını ve örgütsel değişimi etkiler. İnsanların evlerini, fikirlerini ve mevcut rollerini neden fazla değerlendirdiğini açıklar. Ticaret ve geçişlerde sürtünme yaratır.
    why_this_is_important: |
      Sahiplik etkisini tanımak, daha etkili müzakereler yapmanıza, neyi tutacağınıza veya bırakacağınıza dair daha net kararlar almanıza ve başkalarının sahip olduklarını neden fazla değerlendirdiğini anlamanıza yardımcı olur. Ayrıca değişime direncini de açıklar.
    when_to_use:
      - karar_verme
      - müzakere
      - yatırım
      - kariyer_hamleleri
    how_can_you_spot_it:
      ownership_premium: |
        "Bunu alacak kadar para ödemeyeceğim, bu yüzden satmam" derken.
      attachment_to_possession: |
        Bir şeylere sahip olduktan sonra daha çok değer vermek.
      resistance_to_trading: |
        Mantıklı olsa bile takas yapma veya değiş tokuş yapma isteksizliği.
      overvaluation_of_own_ideas: |
        Fikirlerimiz, projelerimiz veya rollerimiz bizim oldukları için daha değerli hissedilir.
    examples:
      real_estate: |
        Ev sahipleri genellikle evlerini fazla fiyatlandırır - piyasanın olduğundan daha çok değer verirler.
      negotiations: |
        Satıcılar alıcıların ödeyeceğinden daha fazlasını talep eder; aradaki fark sahiplik etkisini yansıtır.
      career: |
        Değişiklik düşünülürken mevcut işimizi, şirketimizi veya rolümüzü fazla değerlendirmek.
      ideas: |
        "Burada icat edilmedi" ve "benim fikrim" önyargısı - yarattığımız veya sahip olduğumuz şeyleri fazla değerlendiririz.
    real_world_implications: |
      Sahiplik etkisi piyasada sürtünmeye neden olur, faydalı değişimleri yavaşlatır ve değişime direncini körükler. Birleşmeleri, yeniden yapılanmaları ve kişisel geçişleri etkiler. Bunu anlamak müzakere ve değişim yönetimini iyileştirir.
    professional_application:
      networking_and_relationship_building: |
        Biri değişime direndiğinde, sahiplik etkisini yaşıyor olabileceklerini düşünün - statükoyu daha çok değer verirler çünkü ona "sahipler". Değişimi sadece ne kaybettiklerine değil, ne kazandıklarına göre çerçeveleyin.
      collaborative_learning_initiative: |
        Yeni süreçler tanıtırken, insanların mevcut yollara bağlı olduklarını kabul edin. Yenisini benimsemeden önce eskiden "vazgeçmek" için psikolojik güvenlik yaratın.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Bazı bağlar mantıklıdır - duygusal değer, geçiş maliyetleri. Tüm direniş sahiplik etkisi değildir.
      manipulation: |
        Daha yüksek fiyatlar çekmek için sahte sahiplik hissi yaratmak (örneğin, sahipliği tetiklemek için "ücretsiz deneyin").
      undervaluing_continuity: |
        Tüm değişime direncin mantıksız olduğunu varsaymak, oysa sürekliliğin gerçek bir değeri vardır.
      cold_rationality: |
        Duygusal bağı "sadece sahiplik etkisi" olarak reddetmek, oysa gerçek değerleri yansıtır.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Yanlış Oybirliği Etkisi
    quick_introduction: |
      Yanlış oybirliği etkisi, başkalarının bizim inançlarımıza, tutumlarımıza ve davranışlarımıza ne kadar katıldığını abartma eğilimidir. Görüşlerimizin olduğundan daha yaygın olduğunu varsayarız ve makul insanların farklı düşünebileceğini hayal etmekte zorlanırız.
    one_liner: Başkalarının bize ne kadar katıldığını abartırız.
    try_this:
      - Anlaşmazlığa düşen insanları aktif olarak arayın—oybirliği varsaymayın.
      - Başlamadan önce, varsayımlarınızı paylaşmayan kişilerle test edin.
      - Sorun: Anlaşmazlığa düşen biri ne söylerdi? Ciddiye alın.
    ask_yourself:
      - Başkalarının benim gibi düşündüğünü mü varsayıyorum?
      - Birinin farklı görüşüne en son ne zaman şaşırdım?
    in_more_detail: |
      Bir pozisyona sahip olduğumuzda, bunun norm olduğunu düşünme eğilimindeyiz. Kendimizi benzer düşünen insanlarla çevreler, onaylayıcı medyayı tüketir ve belirsiz geri bildirimleri anlaşma olarak yorumlarız. Bu, oybirliği yanılsamasını güçlendiren bir yankı odası yaratır.

      Etki, derinden benimsenmiş inançlar için ve pozisyonumuza yüksek derecede yatırım yaptığımızda daha güçlüdür. Başkaları farklı düşündüğünde şaşkınlığa, müzakerede zorluklara ve müşterilerin bizim gibi düşündüğünü varsaydığımızda kötü pazar araştırmasına yol açabilir.
    why_this_is_important: |
      Yanlış oybirliği etkisini tanımak, gerçek anlaşmazlıklara hazırlanmanıza, daha iyi araştırmalar yapmanıza ve daha etkili iletişim kurmanıza yardımcı olur. Ürün geliştirme, müzakere ve liderlik için esastır.
    when_to_use:
      - karar_verme
      - müzakere
      - liderlik
      - problem_çözme
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Açık olarak kabul ettiğiniz bir şeye birinin itiraz ettiğinde gerçekten şok olursunuz.
      assuming_shared_values: |
        Kontrol etmeden başkalarının önceliklerinizi paylaştığını varsayarak hareket edersiniz.
      underestimating_opposition: |
        Tekliflerin beklediğinizden daha az dirençle karşılaşacağını beklersiniz.
      echo_chamber_detection: |
        Sosyal ve bilgi ortamınız nadiren görüşlerinizi sorgular.
    examples:
      product_development: |
        Bir ekip, kullanıcıların özellik X istediğini varsayar çünkü ekipteki herkes onu istiyor—ancak düşük benimseme oranıyla karşılaşırlar.
      politics: |
        Siyasi bir baloncuktaki insanlar, seçim sonuçlarının beklentilerini karşılamadığını görünce şaşırırlar.
      negotiation: |
        Karşı tarafın sizin için "makul" görünen şartlara katılacağını varsayarak.
      hiring: |
        "Kültürel uyum" için işe alım, sizinle aynı fikirde olan insanları işe almak anlamına gelebilir ve yanlış oybirliğini pekiştirebilir.
    real_world_implications: |
      Yanlış oybirliği etkisi, kutuplaşmaya, başarısız ürün lansmanlarına ve boşa çıkan müzakerelere katkıda bulunur. Tahminlerimizde aşırı güvenli olmamıza ve muhalefete hazırlıksız kalmamıza neden olur.
    professional_application:
      networking_and_relationship_building: |
        Aktif olarak farklı bakış açılarına sahip insanları arayın. Ortak inançları varsaymayın—sorun ve dinleyin.
      collaborative_learning_initiative: |
        Ekiplerde, maliyetli hale gelmeden anlaşmazlığı ortaya çıkarmak için yapılandırılmış muhalefet kullanın (örn. "öncesi ölüm analizleri", şeytanın avukatı).
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Anlaşmazlığa düşenleri mantıksız veya bilgisiz varsaymak yerine, geçerli farklı bakış açılarına sahip olabileceklerini düşünmek.
      poor_research: |
        "Zaten ne istediklerini biliyoruz" diyerek müşteri araştırmasını atlamak.
      overconfidence: |
        Başkalarının da katılacağı varsayımıyla cesur bahisler yapmak.
      groupthink_amplification: |
        Yanlış oybirliği etkisini sorgulamayan ekipler, grup düşüncesine sürüklenebilir.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Çerçeveleme Etkisi
    quick_introduction: |
      Çerçeveleme etkisi, seçeneklerin sunulma şekline göre kararlarımızın değişme eğilimidir;
      temel gerçekler aynı olsa bile. "90% hayatta kalma" ve "10% ölüm oranı" aynı sonucu
      açıklar ancak farklı tercihlere yol açar. Çerçeve, kararı şekillendirir.
    one_liner: Aynı gerçekler, farklı çerçevelendiğinde farklı kararlara yol açar.
    try_this:
      - Karar vermeden önce seçenekleri birden fazla şekilde çerçeveleyin — kazanç çerçevesi ve kayıp çerçevesi.
      - Bir şeyin nasıl ifade edildiğine bağlı olarak tercihinizi ne zaman değiştirdiğinizi fark edin.
      - Sorun: Çerçeveden arındırılmış temel gerçekler nelerdir?
    ask_yourself:
      - Eğer bu bir kazanç olarak çerçevelenseydi mi yoksa bir kayıp olarak çerçevelenseydi mi farklı karar verirdim?
      - Gerçek sonuca mı yoksa çerçeveye mi tepki veriyorum?
    in_more_detail: |
      Kahneman ve Tversky, insanların kazanç olarak çerçevelenen seçeneklerde riskten kaçındığını,
      kayıp olarak çerçevelenen seçeneklerde ise aynı sonuçlar için bile risk arayışına girdiğini gösterdi.
      Olumlu çerçeveleme ("200 hayat kurtarmak") ile olumsuz çerçeveleme ("400 ölecek") tercihi değiştirir.
      Kayıp çerçeveleri, eşdeğer kazanç çerçevelerinden daha güçlü duygusal tepkiler tetikler.

      Çerçeveleme etkisi, tıbbi kararları, politikaları, pazarlamayı ve müzakereleri etkiler.
      En güçlü ve en iyi belgelenmiş önyargılardan biridir. Farkındalık yardımcı olur,
      ancak tamamen üstesinden gelmek zordur.
    why_this_is_important: |
      Çerçeveleme etkisini tanımak, daha tutarlı kararlar almanıza, manipülasyona direnmenize ve
      daha etkili iletişim kurmanıza yardımcı olur. Ayrıca aynı teklifin sunuma
      göre neden kabul edilip reddedilebileceğini açıklar.
    when_to_use:
      - karar_verme
      - müzakere
      - liderlik
      - risk_değerlendirmesi
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Kazanç olarak çerçevelenen aynı sonuç, kayıp olarak çerçevelendiğinde farklı tercihlere yol açar.
      presentation_dependence: |
        Kararlar, sadece çerçeveleme değiştiğinde, öz değil, kayar.
      default_influence: |
        Seçeneklerin nasıl sıralandığı veya etiketlendiği tercihi etkiler.
      emotional_trigger: |
        Belirli çerçeveler daha güçlü duygusal tepkiler tetikler.
    examples:
      medical: |
        Aynı prosedür için "90% hayatta kalma" ve "10% ölüm oranı" —
        insanlar çerçeveye göre farklı seçimler yapar.
      sales: |
        "50$ indirim" ve "50$ kaybetmeyin" — eşdeğer çerçeveler, farklı
        psikolojik etki.
      policy: |
        "Vergi indirimi" ve "hükümet harcaması" — aynı politika, farklı
        siyasi tepki.
      negotiation: |
        Bir teklifi "indirim" olarak sunmak ile "ek ücreti önlemek" olarak sunmak
        kabul oranlarını değiştirir.
    real_world_implications: |
      Çerçeveleme etkisi reklamcılık, siyaset ve müzakerelerde istismar edilir.
      Tıbbi kararları ve politika desteğini etkiler. Çerçevelemeyi yeniden yapılandırmak
      kararları ve iletişimi iyileştirebilir. Farkındalık yardımcı olur ancak
      etkiyi tam olarak ortadan kaldırmaz.
    professional_application:
      networking_and_relationship_building: |
        Seçenekleri sunarken birden fazla çerçeve düşünün. Farklı
        çerçevelerin alımı nasıl etkilediğini test edin. Bilgi alırken,
        "Bu başka nasıl çerçevelenebilir?" diye sorun.
      collaborative_learning_initiative: |
        Karar verme sürecinde, çerçeveleme etkilerini kontrol etmek için seçenekleri açıkça yeniden çerçeveleyin.
        "Bunu bir kayıp olarak çerçeveleseydik farklı karar verir miydik?" Adalet için tutarlı çerçeveleme kullanın.
    how_can_this_be_misapplied:
      manipulation: |
        İnsanları bilinçleri olmadan istenen sonuçlara yönlendirmek için kasıtlı olarak çerçeveleme.
      false_equivalence: |
        Bazıları önemli bilgileri gizlerken tüm çerçevelerin eşit derecede geçerli olduğunu varsaymak.
      overcorrection: |
        Çerçevelemeyi tamamen göz ardı etmek ve önemli olmadığını varsaymak—
        önemlidir.
      spin: |
        Açıklamak yerine yanıltmak için çerçevelemeyi kullanmak.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Temel Yükleme Hatası
    quick_introduction: |
      Temel yükleme hatası, başkalarının davranışlarını karakterlerine veya kişiliklerine
      atfetme, kendi davranışlarımızı ise durumsal faktörlere atfetme eğilimidir.
      Başkalarını eylemleriyle, kendimizi ise niyetlerimizle yargılarız.
    one_liner: Başkalarını eylemleriyle, kendimizi niyetlerimizle yargılarız.
    try_this:
      - Birisi sizi hayal kırıklığına uğrattığında, şunu sorun: Bu durumu hangi durumsal faktörler açıklayabilir?
      - Kendinize gösterdiğiniz aynı cömertliği başkalarına da uygulayın.
      - Başkalarının davranışlarını koşullara değil karaktere atfettiğiniz anları fark edin.
    ask_yourself:
      - Kendi davranışımı, onlarınkini açıkladığım gibi açıklar mıydım?
      - Onların durumu hakkında neleri kaçırıyor olabilirim?
    in_more_detail: |
      Trafikte birisi bizi solladığında, "ne kadar kaba bir insan" diye düşünürüz.
      Biz birini solladığımızda ise "yapmak zorundaydım - acelem vardı" diye düşünürüz.
      Kendi başarısızlıklarımızı durumla ("trafik berbattı") başkalarınınkini ise eğilimle ("tembeldirler") açıklarız.
      Bunun tersi başarı için de geçerlidir: Kendimize kredi veririz, başkalarının başarısını şansa atfederiz.

      Hata "temel"dir çünkü yaygın ve kalıcıdır. Empatiyi zayıflatır, çatışmayı körükler
      ve performans değerlendirmesini bozar.
    why_this_is_important: |
      Temel yükleme hatasını tanımak ilişkileri geliştirir,
      çatışmayı azaltır ve daha adil yargılara yol açar. Birinin "bir şekilde" olduğunu
      sonuçlandırmadan önce bağlamı dikkate almayı teşvik eder.
    when_to_use:
      - ilişki_kurma
      - çatışma_çözümü
      - liderlik
      - karar_verme
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        Başkalarının davranışlarını açıklarken "Onlar tam olarak böyle bir insan."
      situational_explanation_for_self: |
        Kendi davranışlarımızı açıklarken "Seçeneğim yoktu" veya "Durum beni zorladı."
      character_vs_context: |
        Durumun davranışı açıklayabileceği yerde karakteri varsaymak.
      asymmetric_standards: |
        Başkalarına kendimize uyguladığımızdan daha katı standartlar uygulamak.
    examples:
      traffic: |
        Başka bir sürücünün hatası = "kötü sürücü." Bizim hatamız = "kaçınılmaz durum."
      workplace: |
        Bir iş arkadaşının teslimi kaçırması = "sorumsuz." Bizim teslimi kaçırmamız =
        "aşırı yüklüydüm ve kimse daha iyisini yapamazdı."
      politics: |
        Rakiplerin görüşleri = "aptal veya kötüler." Bizim görüşlerimiz =
        "gerçeklere mantıklı tepki."
      performance: |
        Başkalarının başarısı = "şanslı." Bizim başarımız = "sıkı çalışmayla kazanıldı."
    real_world_implications: |
      Temel yükleme hatası çatışmayı körükler, takım çalışmasını zayıflatır ve
      işe alım ile performans değerlendirmelerini bozar. Bunu düzeltmek
      kurumsal kültürü ve kişisel ilişkileri iyileştirir.
    professional_application:
      networking_and_relationship_building: |
        Biri sizi hayal kırıklığına uğrattığında, güvensiz veya zor olduklarına karar vermeden önce "Bu durumu hangi durumsal faktörler açıklayabilir?" diye sorun.
      collaborative_learning_initiative: |
        Geri bildirim ve değerlendirmelerde "önce durum" yorumlarını teşvik edin.
        Yöneticilere karakter atfetmeden önce bağlamı dikkate almaları konusunda eğitim verin.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Bazı davranışlar karakteri yansıttığında her eylemi "durumsal" olarak geçiştirmek.
      no_accountability: |
        
        Hata, insanları yaptıkları seçimlerden sorumlu tutmaktan kaçınmak için kullanmak.
      self_deprecation: |
        Her zaman kendinizi suçlayacak ve başkalarının sorumluluğunu asla kabul etmeyecek şekilde aşırı düzeltme.
      ignoring_patterns: |
        Birisi farklı durumlarda tekrar tekrar kötü davrandığında, eğilim ilgili olabilir.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Gambler's Fallacy
    quick_introduction: |
      The gambler's fallacy is the mistaken belief that past independent events
      affect future ones. After a run of heads, we think tails is "due"—even
      though each flip is independent. We see patterns in randomness and
      expect "correction" or "reversion" when none is required.
    one_liner: Past independent events don't affect future ones—the coin has no memory.
    try_this:
      - When you think "I'm due for a win," ask: Are these events actually independent?
      - Distinguish regression to the mean (real) from gambler's fallacy (false).
      - Notice when you're seeing patterns in randomness.
    ask_yourself:
      - Am I assuming past outcomes affect future ones when they're independent?
      - Would a statistician agree with my "due for a change" reasoning?
    in_more_detail: |
      In a fair coin flip, each flip is independent. The probability of heads
      is always 50%, regardless of past outcomes. But we feel that a long run
      of one outcome makes the other more likely. We confuse the law of large
      numbers (over many trials, outcomes average out) with short-run
      "correction." The casino has no memory.

      The fallacy affects gambling, investing, and everyday decision-making.
      We assume that "luck" will balance out or that we're "due" for a win.
      Sometimes we're right—but for the wrong reasons.
    why_this_is_important: |
      Recognizing the gambler's fallacy prevents costly mistakes in gambling
      and investing. It also helps you avoid overinterpreting short runs
      and expecting false reversion. It distinguishes genuine regression
      to the mean from the fallacy.
    when_to_use:
      - decision-making
      - investing
      - risk_assessment
      - problem_solving
    how_can_you_spot_it:
      due_for_a_change: |
        "We've had so many losses—we're due for a win."
      pattern_in_randomness: |
        Seeing meaningful patterns in random sequences.
      hot_hand_fallacy: |
        Believing a streak will continue (related but opposite error).
      independence_ignorance: |
        Treating independent events as if they're connected.
    examples:
      gambling: |
        After several reds on roulette, betting on black because "red can't
        keep coming."
      investing: |
        "The market has been down—it has to go up."
      hiring: |
        "We've hired several bad candidates—the next one is bound to be good."
      sports: |
        "He's missed so many—he's due to make the next shot."
    real_world_implications: |
      The gambler's fallacy causes gambling losses and poor investment
      decisions. It also explains why we overinterpret short-term patterns.
      Distinguishing it from genuine regression to the mean (where there
      is a real mean to regress to) is important.
    professional_application:
      networking_and_relationship_building: |
        Don't assume that past relationship dynamics will "correct" in the
        future—each interaction is somewhat independent. But do learn from
        patterns when there's a real underlying cause.
      collaborative_learning_initiative: |
        When evaluating performance, distinguish random variation from
        systematic change. Short runs can be noise; don't overreact to
        "streaks" or expect false reversion.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Sometimes regression to the mean is real (e.g., skill performance).
        Don't dismiss all reversion as gambler's fallacy.
      false_independence: |
        Assuming events are independent when they're not (e.g., repeated
        measurements of the same thing).
      overcorrection: |
        Never expecting reversion when there is a real mean to regress to.
      dismissing_patterns: |
        Some patterns are real—not all sequence is random.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Grup Düşüncesi
    quick_introduction: |
      Grup düşüncesi, uyumlu grupların eleştirel değerlendirme yerine
      konsensüs ve uyumu önceliklendirme eğilimidir. Üyeler anlaşmazlıkları bastırır,
      kendilerini sansürler ve algılanan grup görüşüne uyum sağlarlar.
      Oybirliği arzusu, en iyi karar arzusunun önüne geçer.
    one_liner: Gerçek yerine uyum—gruplar eleştirel değerlendirme yerine konsensüsü önceliklendirir.
    try_this:
      - Bir şeytan avukatı atayın; anlaşmazlığı beklenen ve güvenli hale getirin.
      - Sorun: Neyi söylemiyoruz? Bu grupta olmasaydık ne söylerdik?
      - Grup kararlarını kesinleştirmeden önce dış perspektifleri arayın.
    ask_yourself:
      - Uyum sağlamak için kendimi sansürlüyor muyum?
      - Konsensüsümüz gerçek mi yoksa anlaşmaya zorlanmanın bir sonucu mu?
    in_more_detail: |
      Irving Janis, dış politika fiyaskolarını (Domuzlar Körfezi, Vietnam) inceledi
      ve kalıpları belirledi: yenilmezlik yanılsaması, kolektif rasyonalizasyon,
      uyuma yönelik baskı, kendi kendini sansürleme, oybirliği yanılsaması ve
      grubu muhalif bilgiden koruyan "koruyucular". Yüksek uyum, izolasyon ve
      stres grup düşüncesini artırır.

      Grup düşüncesi, alternatifler ciddi şekilde değerlendirilmediği için
      kötü kararlara yol açar. Anlaşmazlık sadakatsizlik olarak görülür. Grup,
      doğruluğunu abartır ve riskleri hafife alır.
    why_this_is_important: |
      Grup düşüncesini tanımak, daha iyi karar verme koşulları oluşturmanıza
      yardımcı olur: anlaşmazlığı teşvik edin, dış perspektifleri getirin ve
      erken konsensüsten kaçının. Felaket niteliğindeki grup başarısızlıklarını
      önlemek için gereklidir.
    when_to_use:
      - liderlik
      - karar_verme
      - problem_cozme
      - catisma_cozumu
    how_can_you_spot_it:
      pressure_for_consensus: |
        Anlaşmazlık caydırılır veya cezalandırılır; anlaşma ödüllendirilir.
      illusion_of_unanimity: |
        Sessizlik, sessiz kalma olabileceğinde anlaşma olarak yorumlanır.
      collective_rationalization: |
        Grup uyarıları göz ardı eder ve kendi görüşünü pekiştirir.
      mindguards: |
        Üyeler grubu, konsensüsü zorlayacak bilgilerden korur.
    examples:
      bay_of_pigs: |
        Kennedy'nin danışmanları işgal planı hakkındaki şüpheleri bastırdılar;
        sonuç felaket oldu.
      corporate_decisions: |
        Bir liderlik ekibi, kimsenin karşı çıkan olmak istemediği için
        kırmızı çizgiler olsa da birleşme planına devam ediyor.
      product_launches: |
        Bir ekip kusurlu bir ürünü piyasaya sürüyor çünkü herkes plana
        yatırım yapmış ve kimse endişelerini dile getirmiyor.
      boards: |
        Yönetim kurulu üyeleri uyumu sağlamak için yönetimin tekliflerini
        koşulsuz onaylar.
    real_world_implications: |
      Grup düşüncesi, politika başarısızlıklarına, kurumsal felaketlere ve
      kaçırılan fırsatlara katkıda bulunur. Özellikle yüksek riskli,
      yüksek stresli durumlarda tehlikelidir. Önlenmesi, kasıtlı
      yapısal müdahaleler gerektirir.
    professional_application:
      networking_and_relationship_building: |
        Anlaşmazlık için psikolojik güvenlik oluşturun. Endişelerini
        dile getiren kişilere teşekkür edin. Tartışmayı tatsız olmadan
        tartışmayı modelleyin.
      collaborative_learning_initiative: |
        Şeytan avukatı, kırmızı takımlar ve "öncesi ölüm".
        Mevcut görüşe karşı çıkacak birinin olmasını gerektirir.
        Dış perspektifleri getirin. Lider, yerleşmeyi önlemek için
        son konuşur.
    how_can_this_be_misapplied:
      false_dissent: |
        Gerçekten anlaşmayan "belirlenmiş muhalifler" yaratmak—grup
        bunu anlar.
      excessive_conflict: |
        Anlaşmazlığı yıkıcı çatışma ve felce neden olacak kadar
        teşvik etmek.
      dismissing_consensus: |
        Tüm konsensüsün grup düşüncesi olduğunu varsaymak—bazen
        grup haklıdır.
      individualism: |
        Hiçbir toplu kararın mümkün olamayacağı noktaya kadar aşırı
        düzeltme yapmak.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Halo Etkisi
    quick_introduction: |
      Halo etkisi, bir kişinin olumlu bir özelliğinin veya izleniminin,
      o kişi hakkındaki genel yargımızı etkileme eğilimidir. Birinin dış görünüşünü
      beğenirsek, yetkin olduğunu varsayabiliriz. Bir becerisine hayran kalırsak,
      her şeyde iyi olduğunu varsayarız. Bir olumlu özellik, diğer her şeye bir "hâle"
      kazandırır.
    one_liner: Bir olumlu özellik, bir kişi hakkındaki tüm yargımızı saran bir hâle etkisi yaratır.
    try_this:
      - Özellikleri bağımsız olarak değerlendirin—bir güçlü yönün diğerlerini ima etmesine izin vermeyin.
      - Çekiciliğin, karizmanın veya tek bir başarının bakış açınızı renklendirdiği zamanları fark edin.
      - Sorun: O tek olumlu özellik olmadan bu kişiyi aynı şekilde mi yargılardım?
    ask_yourself:
      - Tek bir özellikten tüm kişiye genelleme mi yapıyorum?
      - Tek bir güçlü yön beni etkilemeseydi zayıflıkları görür müydüm?
    in_more_detail: |
      Edward Thorndike, askerleri bir özellikte yüksek puan veren askeri subayların,
      birbirleriyle ilgisiz olsalar bile diğer özelliklerde de yüksek puan verme eğiliminde
      olduğunu gözlemlemiştir. Belirli olandan genele doğru genelleme yaparız. Çekicilik,
      karizma veya tek bir alandaki başarı, etrafa yayılan bir hâle oluşturur.

      Tersine—tek bir olumsuz özelliğin her şeyi renklendirmesi—bazen "boynuz etkisi" olarak adlandırılır.
      Her ikisi de haksız genelleme biçimleridir. Halo etkisi işe alım, performans değerlendirmeleri
      ve gündelik izlenimleri etkiler.
    why_this_is_important: |
      Halo etkisini tanımak, daha doğru değerlendirmeler yapmanıza ve aşırı genellemeden kaçınmanıza yardımcı olur.
      Adil işe alım, performans yönetimi ve ilişki değerlendirmesi için önemlidir. Tek bir güç, tüm
      güçleri ima etmez.
    when_to_use:
      - karar_verme
      - liderlik
      - iliski_kurma
      - ise_alma
    how_can_you_spot_it:
      trait_spillover: |
        Tek bir olumlu özellik, ilgisiz özelliklerin yargısını etkiler.
      attractiveness_bias: |
        Çekici insanlar yetkinlik, güvenilirlik vb. konularda daha yüksek
        değerlendirilir.
      success_generalization: |
        Tek bir alandaki başarı, diğer alanlarda varsayılan yetkinliğe yol açar.
      first_impression_dominance: |
        Erken olumlu izlenim, sonraki tüm değerlendirmeleri renklendirir.
    examples:
      hiring: |
        Düzgün konuşan ve sevimli bir aday, teknik olarak güçlü olduğu varsayılır—
        beceriler ilgisiz olsa bile.
      performance_reviews: |
        Öne çıkan tek bir proje, tüm boyutlarda yüksek puanlara yol açar.
      politics: |
        Bir politikacının karizması, politika konusundaki yetkinliği hakkında varsayımlara yol açar.
      branding: |
        Bir şirketin tek bir üründeki başarısı, tüm ürünlerin kalitesi hakkında varsayımlara yol açar.
    real_world_implications: |
      Halo etkisi işe alım, performans değerlendirmesi ve yatırım kararlarını
      bozar. Çekici, düzgün konuşan ve zaten başarılı olanları kayırır. Bunu
      azaltmak, yapılandırılmış değerlendirme ve boyutların ayrılmasını gerektirir.
    professional_application:
      networking_and_relationship_building: |
        İnsanları genel izlenim yerine belirli boyutlarda değerlendirin.
        Tek bir olumlu özelliğin başkaları hakkındaki yargınızı etkilediği
        zamanlarda farkında olun. Çürütücü kanıt arayın.
      collaborative_learning_initiative: |
        Boyutları bağımsız olarak derecelendiren yapılandırılmış görüşmeler
        ve değerlendirmeler kullanın. Derecelendirmeleri değerlendiriciler
        arasında kalibre edin. Genel "içgüdüsel hisse" güveni azaltın.
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Her olumlu izlenim halo etkisi değildir—bazen insanlar gerçekten
        boyutlar boyunca güçlüdürler.
      false_objectivity: |
        Halo etkisini tamamen ortadan kaldırabileceğimizi varsaymak—bu
        yaygın ve kısmen otomatiktir.
      overcorrection: |
        Karşıt uca giderek çekici veya karizmatik insanların daha az yetkin
        olduğunu varsaymak.
      stereotyping: |
        Meşru olumlu özellikleri reddetmek için "halo etkisi"ni kullanmak.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Hanlon's Razor
    quick_introduction: |
      Hanlon's Razor states: "Never attribute to malice that which is adequately explained
      by stupidity." In other words, don't assume bad intent when incompetence, oversight,
      or ignorance could explain the behavior.
    one_liner: Don't assume malice when incompetence or oversight could explain it.
    try_this:
      - When someone frustrates you, ask: Could this be explained by mistake or ignorance?
      - Default to the simpler explanation before assuming ill intent.
      - Notice when you're jumping to "they meant to hurt me."
    ask_yourself:
      - Am I attributing to malice what could be explained by stupidity?
      - Would I want the same benefit of the doubt in their shoes?
    in_more_detail: |
      The principle encourages giving people the benefit of the doubt. When someone's actions
      harm or frustrate you, the default assumption is often that they meant to hurt you.
      Hanlon's Razor suggests that many such actions stem from carelessness, lack of
      information, or poor execution—not ill will.

      This doesn't mean malice never exists. It means we should not jump to the worst
      interpretation when a simpler one fits. The razor reduces paranoia, improves
      relationships, and helps us respond more constructively to problems.
    why_this_is_important: |
      Applying Hanlon's Razor reduces conflict, preserves relationships, and focuses
      energy on solving problems rather than assigning blame. It also protects you from
      the stress of assuming everyone is out to get you.
    when_to_use:
      - conflict_resolution
      - leadership
      - relationship_building
      - decision-making
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        You immediately interpret a negative outcome as intentional harm.
      personalizing_mistakes: |
        When something goes wrong, you assume it was directed at you personally.
      ignoring_alternative_explanations: |
        You don't consider incompetence, miscommunication, or oversight as possibilities.
      escalation_before_inquiry: |
        You respond with anger or retaliation before asking what happened.
    examples:
      email_tone: |
        Assuming a terse email is passive-aggressive when the sender may simply be rushed
        or bad at tone.
      missed_deadline: |
        Interpreting a colleague's late delivery as sabotage when they may have
        overcommitted or encountered obstacles.
      policy_decisions: |
        Assuming a company policy you dislike was designed to harm employees when it may
        be a clumsy attempt to address a different problem.
      traffic: |
        Assuming another driver cut you off intentionally when they may not have seen you.
    real_world_implications: |
      Hanlon's Razor improves workplace culture, reduces litigation, and makes conflict
      resolution more effective. Overuse can enable negligence; underuse creates
      unnecessary conflict.
    professional_application:
      networking_and_relationship_building: |
        When someone disappoints you, ask for clarification before assuming ill intent.
        Preserve relationships by defaulting to charitable interpretations.
      collaborative_learning_initiative: |
        In teams, create a culture where mistakes are assumed to be unintentional until
        proven otherwise. Focus on systems and processes rather than blame.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Dismissing repeated incompetence or carelessness as "not malice" when it warrants
        accountability.
      ignoring_genuine_malice: |
        Applying the razor so rigidly that you miss real bad actors or toxic behavior.
      avoiding_difficult_conversations: |
        Using Hanlon's Razor as an excuse not to address performance issues.
      gaslighting_victims: |
        Telling someone who was genuinely wronged that they're "assuming malice" when
        malice was present.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Hawthorne Etkisi
    quick_introduction: |
      Hawthorne etkisi, insanların gözlemlendiklerini veya incelendiklerini bildiklerinde davranışlarını değiştirme eğilimidir. Gözlem eylemi, test edilen müdahalenin kendisi değil, değişikliğe neden olabilir. İnsanlar aldıkları ilgiye tepki verirler.
    one_liner: Gözlemlenmek davranışı değiştirir—ilginin kendisi etkiyi yaratabilir.
    try_this:
      - Bir müdahalenin etkinliğini değerlendirirken, sonuçları gözlemin yönlendirip yönlendirmediğini düşünün.
      - İlginin ve değerli hissetmenin performansı artırabileceğini fark edin.
      - Gözlemin değiştiği durumlarda, değişikliği belirli bir müdahaleye bağlarken dikkatli olun.
    ask_yourself:
      - Bu iyileşme müdahaleden mi yoksa gözlemlenmekten mi kaynaklanıyor?
      - Dikkat etmeyi bıraksaydık sonuçlar devam eder miydi?
    in_more_detail: |
      Hawthorne Works fabrikasında araştırmacılar, aydınlatmayı değiştirdiklerinde—ve geri değiştirdiklerinde de üretkenliğin arttığını buldular.
      Artış, belirli müdahaleden ziyade ilgi ve gözlemden gelmiş gibi görünüyordu. Daha sonra yapılan yeniden analizler, etkinin abartılmış olabileceğini öne sürse de, konsept faydalı kalır: incelenmek davranışı değiştirir.

      Hawthorne etkisi, araştırmaları ve değerlendirmeleri karmaşıklaştırır.
      Müdahalelerin görünen etkisini şişirebilir. Aynı zamanda ilgi ve değerli hissetmenin performansı artırabileceği—yönetim için bir ders—önerir.
    why_this_is_important: |
      Hawthorne etkisini anlamak, araştırma sonuçlarını yorumlamanıza, daha iyi deneyler tasarlamanıza ve ilginin tek başına değişikliğe neden olabileceğini fark etmenize yardımcı olur. Yönetimde, insanlara dikkat etmenin belirli müdahale kadar önemli olabileceğini öne sürer.
    when_to_use:
      - liderlik
      - karar_verme
      - öğrenme
      - problem_çözme
    how_can_you_spot_it:
      observation_induced_change: |
        İnsanlar izlendiklerini veya incelendiklerini bildiklerinde davranışları değişir.
      attention_effect: |
        İlgi gösterme eylemi, sadece belirli bir değişiklik değil, iyileşme üretir.
      placebo_analog: |
        Bir plasebo gibi, incelenme "tedavisi" etkileri olabilir.
      short_term_improvement: |
        Gözlem sona erdiğinde iyileşmeler solabilir.
    examples:
      workplace_studies: |
        Bir çalışma sırasında üretkenlik artar—yeni süreçten mi yoksa birinin izliyor olmasından mı kaynaklanıyor?
      medical_trials: |
        Plasebo grupları iyileşir—kısmen ilgi gördükleri için.
      education: |
        Araştırmacılar mevcut olduğunda öğrenciler daha iyi performans gösterir—
        "gözlemci etkisi."
      management: |
        Yönetim dikkat ettiğinde ekipler iyileşir—yeni girişimden mi yoksa ilginin kendisinden mi kaynaklanıyor?
    real_world_implications: |
      Hawthorne etkisi, araştırma geçerliliğini ve program değerlendirmesini etkiler. Müdahale etkilerinin abartılmasına yol açabilir.
      Aynı zamanda olumlu bir dersi vardır: ilgi ve incelendiğini hissetmek iyileşmeyi motive edebilir—bu nedenle ilgi ve görünürlük önemlidir.
    professional_application:
      networking_and_relationship_building: |
        İnsanlara dikkat etmek, performanslarını artırabilir—
        Hawthorne etkisi, gözlemlenip
        değerli hissetmenin önemli olduğunu öne sürer. Bunu olumlu kullanın: düzenli kontroller,
        görünürlük ve takdir.
      collaborative_learning_initiative: |
        Müdahaleleri değerlendirirken, kontrol grupları kullanın ve
        iyileşmelerin müdahaleden mi yoksa getirdiği ilgiden mi kaynaklandığını düşünün. Hawthorne etkisi
        görünen başarıyı şişirebilir.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Sürekli izlemeyi haklı çıkarmak için "Hawthorne etkisi"ni kullanmak—
        gözlem aynı zamanda güveni ve içsel motivasyonu azaltabilir.
      dismissing_improvements: |
        Çalışmalar sırasındaki tüm iyileşmelerin Hawthorne olduğunu varsaymak—
        bazen müdahaleler gerçekten işe yarar.
      overgeneralization: |
        Orijinal Hawthorne çalışmaları sorgulanmıştır;
        etki bir zamanlar düşünüldüğünden daha küçük veya farklı olabilir.
      manipulation: |
        Davranışı manipüle etmek için sahte "gözlem" yaratmak.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Geriye Dönük Yanılgı
    quick_introduction: |
      Geriye dönük yanılgı (veya "zaten biliyordum" etkisi), bir olay gerçekleştikten sonra,
      o olayı öngörmüş veya bekletmiş olacağımıza inanma eğilimidir. Olayların
      sonuçlarını olduğundan daha kaçınılmaz hale getirmek için geçmişi yeniden
      yapılandırırız.
    one_liner: Olaydan sonra, zaten hepsini biliyormuşuz gibi düşünürüz.
    try_this:
      - Geçmiş kararları yargılamadan önce şunu sorun: O zaman ne biliyorlardı?
      - Sonuçlardan önce tahminlerinizi kaydedin — daha sonra karşılaştırın.
      - Geçmişi olduğundan daha kaçınılmaz hale getirdiğinizde fark edin.
    ask_yourself:
      - O zamanlar mevcut olmayan bilgilerle mi yargılıyorum?
      - Bunu gerçekten tahmin ettim mi, yoksa şimdi mi bariz görünüyor?
    in_more_detail: |
      Sonucu öğrendikten sonra, her şey bariz görünür. Önceden hissettiğimiz belirsizliği
      unuturuz. Bu yanılgı öğrenmeyi bozar — aslında bilmediğimiz halde bir şeyi "bildiğimizi"
      düşünürüz, bu yüzden modellerimizi güncellememiz. Ayrıca haksız suçlamalara yol açar:
      Gelecek gerçekten belirsizken "Bunu görmeleri gerekiyordu."

      Geriye dönük yanılgı, olay sonrası değerlendirmeleri, yasal yargıları ve tarihsel
      analizleri etkiler. Geçmiş kararları, o zamanda mevcut olmayan bilgilerle yargılarız.
    why_this_is_important: |
      Geriye dönük yanılgıyı tanımak, sonuçlardan öğrenmeyi, kararların daha adil
      değerlendirilmesini ve daha doğru risk değerlendirmesini iyileştirir. Tahmin
      yeteneğimize dair yanlış bir güven duygusunu önler.
    when_to_use:
      - karar_verme
      - öğrenme
      - risk_değerlendirmesi
      - liderlik
    how_can_you_spot_it:
      inevitability_feeling: |
        Bir olaydan sonra, sanki "olmak zorundaymış" gibi hissettirir.
      reconstructed_certainty: |
        Olaydan önce aslında olduğumuzdan daha emin olduğumuzu hatırlarız.
      blame_for_failure: |
        Sonuç gerçekten belirsizken "Görmeleri gerekiyordu."
      undervaluing_luck: |
        Şansın rol oynadığı durumlarda sonuçları beceri veya öngörüye bağlamak.
    examples:
      investing: |
        Piyasa çöktükten sonra "Bunun çökeceğini biliyordum" demek — önceden bu
        "bilgiye" göre hareket etmediğiniz halde.
      project_failures: |
        Risklerin gerçekten belirsiz olduğu bir olay sonrası değerlendirmede "Riskleri
        görmeliydik."
      elections: |
        Beklenmedik bir sonuçtan sonra, yorumcular geriye dönük olarak nedeninin
        "bariz" olduğunu açıklarlar.
      medical: |
        Nadiren görülen bir durumun teşhisinden sonra geriye dönük olarak "Belirtiler
        vardı."
    real_world_implications: |
      Geriye dönük yanılgı, yasal sorumluluğu, performans değerlendirmesini ve
      öğrenmeyi bozar. Yargımızda kendimize aşırı güvenmemize ve sınırlı bilgiyle
      makul kararlar alanlara karşı haksız olmamıza neden olur.
    professional_application:
      networking_and_relationship_building: |
        Başkalarının geçmiş kararlarını değerlendirirken, o zaman bilinenleri
        şimdi bildiklerinizden bilinçli olarak ayırın. Gerçekten sonucu tahmin
        etmediğinizde "Sana söylemiştim" demekten kaçının.
      collaborative_learning_initiative: |
        Olay sonrası değerlendirmelerde, kararın alındığı andaki belirsizliği
        yakalamak için "olay öncesi" veya "karar günlüğü" tekniklerini kullanın.
        Gerçek belirsizliği geriye dönük yeniden yapılandırmayla karşılaştırın.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Bazıları öngörülebilirken her başarısızlığı "öngörülemez" diyerek
        geçiştirmek.
      no_accountability: |
        İnsanları ihmalkarlıktan sorumlu tutmaktan kaçınmak için geriye dönük
        yanılgıyı kullanmak.
      false_uncertainty: |
        Hiçbir şeyi tahmin edemeyeceğimize inanmak için aşırı düzeltme yapmak.
      undermining_learning: |
        "Geriye dönük görüş 20/20'dir" diyerek ders çıkarmayı reddetmek — sonuçlardan
        yine de öğrenebiliriz.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Hiperbolik İndirgeme
    quick_introduction: |
      Hiperbolik indirgeme, daha büyük, daha sonraki ödüller yerine daha küçük,
      daha yakın ödülleri tercih etme ve geleceği rasyonel modellerin
      öngördüğünden daha dik bir şekilde indükleme eğilimidir. Günceli aşırı
      değerlendirir ve geleceği tutarsız yollarla eksik değerlendiririz.
    one_liner: Daha küçük ve erken olanı, daha büyük ve geç olanına tercih ederiz — ve geleceği tutarsız bir şekilde indirgeriz.
    try_this:
      - Ön-taahhüt: Sakin bir durumda iken gelecekteki kendiniz için kararlar alın.
      - Yeniden Çerçeveleme: Tutarsızlığı ortaya çıkarmak için "Bunu 10 dakika içinde ister miydim? 10 ay içinde?" diye sorun.
      - Gelecekteki kendinizi daha iyi kararlar almaya bağlamak için taahhüt mekanizmaları kullanın.
    ask_yourself:
      - Gelecekteki kendimin zararına günceli aşırı mı değerlendiriyorum?
      - Ödül bir gün gecikseydi bu kararı verir miydim? Bir yıl?
    in_more_detail: |
      Bir yıl sonra 100 dolar almaktansa bugün 50 doları tercih edebiliriz,
      ancak iki yıl sonra 100 dolar almaktansa bir yıl sonra 50 doları tercih
      edebiliriz — bu tutarsız olsa bile. İndirgeme oranımız sabit değildir;
      hiperboliktir. Yakın gelecek büyük ölçüde indirgenir; uzak gelecek
      daha az dik bir şekilde indirgenir. Bu erteleme, bağımlılık ve yetersiz
      birikimi açıklar.

      Güncel öncelik, ilgili bir kavramdır: içinde bulunduğumuz ana
      orantısız bir ağırlık veririz. Hiperbolik indirgeme, tutmadığımız
      taahhütlerde neden bulunduğumuzu ve uzun vadeli planlamanın neden
      zor olduğunu açıklar.
    why_this_is_important: |
      Hiperbolik indirgemeyi anlamak, daha iyi teşvikler tasarlamanıza,
      gelecekteki kendinizi bağlamanıza ve kısa vadeli tuzaklardan
      kaçınmanıza yardımcı olur. Neden ertelediğimizi ve neden uzun vadeli
      hedeflerle mücadele ettiğimizi açıklar.
    when_to_use:
      - karar_verme
      - kariyer_hareketleri
      - yatirim
      - liderlik
    how_can_you_spot_it:
      present_preference: |
        Gecikmiş, daha büyük ödüller yerine anında tatmini seçmek.
      inconsistent_time_preferences: |
        Zaman geçtikçe tersine dönen tercihler (örneğin, yarın diyet
        yapmak isteriz ama bugün yeriz).
      commitment_failures: |
        Gelecek güncel hale geldiğinde uymadığımız planlar yapmak.
      procrastination: |
        Anında konfor lehine önemli görevleri ertelemek.
    examples:
      savings: |
        Emeklilik için biriktirmek yerine şimdi harcamayı seçmek — gelecek
        soyut hissettirir.
      health: |
        Bugün egzersiz yapmaktan kaçınmak, yarın pişman olacağını bilsek
        bile — yarının pişmanlığı indirgenir.
      addiction: |
        Uzun vadeli sağlık yerine anında coşkuyu seçmek.
      deadlines: |
        Son teslim tarihleri yaklaşana kadar hiçbir şey yapmamak — sonra
        "güncel" son teslim tarihini içerir ve harekete geçeriz.
    real_world_implications: |
      Hiperbolik indirgeme birikimleri, sağlığı, eğitimi ve bağımlılığı
      etkiler. Birçok kendini kontrol başarısızlığını açıklar. Taahhüt
      mekanizmaları (örneğin, otomatik birikim, hesap verebilirlik)
      gelecekteki seçimleri kısıtlayarak yardımcı olabilir.
    professional_application:
      networking_and_relationship_building: |
        Gelecekteki taahhütler isterken, geleceği "güncel" hale getiren
        hesap verebilirlik oluşturun (örneğin, kontrol noktaları, son
        teslim tarihleri). Yapı olmadan insanların takip edeceğini
        varsaymayın.
      collaborative_learning_initiative: |
        Taahhüt mekanizmaları kullanın: kamuya açık taahhütler, son
        teslim tarihlerine ön-taahhüt ve uzun vadeli hedefleri daha acil
        hissettiren yapılar. Uzun projeleri daha kısa kilometre
        taşlarına ayırın.
    how_can_this_be_misapplied:
      excessive_control: |
        "Gelecekteki kendilerine yardım etme" adına insanların seçimlerini
        aşırı kısıtlamak.
      paternalism: |
        Başkalarının uzun vadeli çıkarları için neyin en iyi olduğunu bildiğimizi
        varsaymak.
      ignoring_present_needs: |
        Soyut gelecek faydaları lehine meşru güncel ihtiyaçları göz ardı etmek.
      one_size_fits_all: |
        İnsanlar indirim oranlarında farklılık gösterir; herkes aynı taahhüt
        mekanizmalarına ihtiyaç duymaz.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Illusion of Control
    quick_introduction: |
      The illusion of control is the tendency to overestimate our ability to
      influence outcomes. We believe we have more control than we do—over
      random events, other people, and complex systems. We confuse correlation
      with causation and action with impact.
    one_liner: We overestimate our ability to influence outcomes—especially random ones.
    try_this:
      - Ask: What would happen if I did nothing? Is my action actually causing the outcome?
      - Distinguish what you can control from what you can't.
      - Notice when you're superstitiously linking your actions to random results.
    ask_yourself:
      - Am I confusing correlation with causation?
      - Would the outcome be different if I hadn't acted?
    in_more_detail: |
      People feel more confident about winning a lottery when they choose
      their own numbers—even though it doesn't change the odds. We roll dice
      harder when we want high numbers. We think our rituals or behaviors
      influence outcomes that are actually random or determined by factors
      beyond us. The illusion is comforting; it reduces anxiety. But it
      can lead to overconfidence and poor decisions.

      The illusion is stronger when we're involved in the process, when
      we have early success, and when the task is familiar. It affects
      investing, management, and everyday life.
    why_this_is_important: |
      Recognizing the illusion of control helps you calibrate your
      expectations, avoid overconfidence, and focus effort where it
      actually matters. It also explains why we persist in superstitious
      behaviors and overestimate our influence.
    when_to_use:
      - decision-making
      - risk_assessment
      - investing
      - leadership
    how_can_you_spot_it:
      overestimated_influence: |
        Believing our actions affect outcomes when they don't.
      ritual_superstition: |
        Behaviors we think influence results (lucky shirt, pre-game
        routine) when they don't.
      choice_illusion: |
        Feeling that choosing gives us control when the choice
        doesn't affect the outcome.
      action_bias: |
        Preferring to "do something" over "wait" even when action
        doesn't help.
    examples:
      gambling: |
        Choosing lottery numbers feels more controllable than
        random selection—odds are the same.
      investing: |
        Active traders overestimate their ability to beat the
        market; most underperform after costs.
      management: |
        Leaders overestimate their impact on organizational
        outcomes; many factors are outside their control.
      sports: |
        Fans believe their cheering affects the game; players
        have lucky rituals.
    real_world_implications: |
      The illusion of control affects risk-taking, persistence
      in futile efforts, and attribution of outcomes. It can
      motivate action (sometimes useful) but also lead to
      wasted effort and overconfidence. Calibration improves
      decision quality.
    professional_application:
      networking_and_relationship_building: |
        Recognize what you can and can't control. Focus energy
        on influenceable factors. Don't take credit for
        outcomes you didn't cause—or blame for those you
        couldn't prevent.
      collaborative_learning_initiative: |
        In planning, distinguish controllable from uncontrollable
        factors. Avoid false confidence from early wins. Use
        probabilistic thinking to calibrate expectations.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Overcorrecting to believe we have no control when we
        do have meaningful influence.
      dismissing_agency: |
        "It's all luck" when skill and effort do matter in
        many domains.
      false_fatalism: |
        Using the illusion of control to justify inaction.
      one_size_fits_all: |
        Control varies by domain; some situations are more
        controllable than others.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Etki Yanılgısı
    quick_introduction: |
      Etki yanılgısı, gelecekteki olaylara vereceğimiz duygusal tepkilerin yoğunluğunu ve süresini abartma eğilimidir. İyi şeylerin bizi sandığımızdan daha mutlu edeceğini, kötü şeylerin ise sandığımızdan daha mutsuz edeceğini düşünürüz. Duygusal öngörülerde kötüyüz.
    one_liner: Olayların mutluluğumuzu ne kadar ve ne kadar süreyle etkileyeceğini abartırız.
    try_this:
      - Sorun: Benzer geçmiş olaylardan sonra nasıl hissetmiştim? Beklediğimizden daha hızlı adapte oluyoruz.
      - Karar verirken beklenen etkiye kapılmayın—duyguları öngörmede kötüyüz.
      - Tek bir sonucun kalıcı etkisini abarttığınızı fark edin.
    ask_yourself:
      - Bu şekilde ne kadar süreyle hissedeceğimi abartıyor muyum?
      - Geçmiş deneyimler benzer olaylar hakkında ne söylüyor?
    in_more_detail: |
      Daniel Gilbert ve Timothy Wilson, duygusal öngörü üzerine araştırma yaparlar: bir kazanç sonrası ne kadar iyi veya bir kayıp sonrası ne kadar kötü hissedeceğimizi abartırız. Beklediğimizden daha hızlı adapte oluruz. Ayrıca tekil olayların etkisini de abartırız—tek bir sonucun mutluluğumuzu belirleyeceğini düşünürüz, oysa birçok faktör katkıda bulunur. Gelecekteki duygularımızı tahmin ederken yanlış şeylere odaklanırız.

      Etki yanılgısı büyük yaşam kararlarını etkiler: bir terfi, ilişki veya satın almanın mutluluğumuzu ne kadar değiştireceğini abartırız. Kayıpların kalıcı acısını da abartırız.
    why_this_is_important: |
      Etki yanılgısını tanımak, hayatınızı gerçekte iyileştirecek şeyler hakkında daha iyi kararlar almanıza yardımcı olur. Düşündüğünüz kadar önemli olmayacak sonuçlara aşırı yatırım yapmayı ve beklediğiniz kadar uzun sürmeyecek sonuçlardan korkmayı azaltır.
    when_to_use:
      - karar_verme
      - kariyer_hamleleri
      - risk_degerlendirmesi
      - iliski_kurma
    how_can_you_spot_it:
      overestimated_impact: |
        Benzer geçmiş olayların mütevazı kalıcı etkileri olduğu durumlarda "Bu her şeyi değiştirecek".
      duration_overestimation: |
        Tipik olarak beklediğimizden daha hızlı adapte olduğumuzda "Bunun üstesinden asla gelemeyeceğim".
      focalism: |
        Tek bir olaya odaklanmak ve refahı etkileyen diğer faktörleri göz ardı etmek.
      adaptation_neglect: |
        Hem iyi hem de kötü koşullara adapte olduğumuzu unutmak.
    examples:
      career: |
        Geçmiş terfilerin geçici etkisi olduğu durumlarda "Eğer bu terfiyi alırsam, çok daha mutlu olacağım".
      purchases: |
        Yenilik çabuk geçerken "Bu araba beni mutlu edecek".
      loss: |
        Tipik olarak aylar içinde adapte olduğumuzda "Bu reddedilmeyi asla atlatamayacağım".
      events: |
        Bir düğün, tatil veya kilometre taşının uzun vadeli mutluluğu ne kadar etkileyeceğini abartmak.
    real_world_implications: |
      Etki yanılgısı para, kariyer ve ilişkiler hakkında kötü kararlara yol açar. Adapte olacağımız deneyimlere fazla ödeme yaparız ve iyileşeceğimiz kayıplardan aşırı korkarız. Politika ve kişisel planlamayı etkiler.
    professional_application:
      networking_and_relationship_building: |
        Kariyer veya ilişki kararları alırken, benzer geçmiş olaylardan sonra nasıl hissettiğinizi düşünün. Etki beklediğiniz kadar uzun sürdü mü? Bunu gelecekteki tahminleri ayarlamak için kullanın.
      collaborative_learning_initiative: |
        Ekipler aksiliklerle veya zaferlerle karşılaştığında, onlara adaptasyonu hatırlatın. "Beklediğimizden daha hızlı adapte olacağız" ifadesi hem aşırı kutlamayı hem de aşırı umutsuzluğu azaltabilir.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Bazı olayların kalıcı etkisi vardır—travma, büyük kayıp. Tüm duygusal öngörüleri yanıltıcı olarak reddetmeyin.
      cold_rationality: |
        An'daki deneyimin önemli olduğu durumlarda "Önemli olmayacak".
      undervaluing_experiences: |
        "Zaten adapte olacağız" diyerek olumlu deneyimlerden kaçınmak.
      invalidating_emotions: |
        İnsanlara anlık destek ihtiyacı duyduklarında duygularının geçeceğini söylemek.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Grup İçi Yanılgı
    quick_introduction: |
      Grup içi yanılgı, kendi grubumuza ait olduğunu düşündüğümüz kişileri, dışarıdan
      gelenlere tercih etme eğilimidir. Grup içi üyelere olumlu özellikler, grup dışı
      üyelere ise olumsuz özellikler atfederiz, bu da genellikle minimal veya keyfi
      farklılıklara dayanır.
    one_liner: Kendi grubumuzu kayırır ve dış grupları daha sert yargılarız—genellikle keyfi olarak.
    try_this:
      - Sorun: Bu kişiyi kendi grubumda olsaydı aynı şekilde yargılar mıydım?
      - Karar verirken aktif olarak dış grup bakış açılarını arayın.
      - Grup sınırlarının yargınızı nasıl şekillendirdiğini fark edin.
    ask_yourself:
      - Birini sadece "bizden biri" olduğu için mi kayırıyorum?
      - Aynı standartları bir dış grup üyesine uygular mıydım?
    in_more_detail: |
      Gruplar rastgele atansa bile (örneğin, yazı tura atılarak), insanlar hızla
      kendi gruplarına karşı bir tercih geliştirirler. Grup içi üyelere daha çok güveniriz,
      onlara daha cömertçe kaynak tahsis ederiz ve eylemlerini daha anlayışlı bir şekilde
      yargılarız. Grup dışı üyeler ise tam tersi muamele görür.

      Grup içi yanılgı, aşiretçilik, ayrımcılık ve çatışmayı besler. İşe alım, terfi,
      işbirliği ve politikaları etkiler. Irk, milliyet, şirket, ekip veya paylaşılan
      herhangi bir kimliğe dayanabilir.
    why_this_is_important: |
      Grup içi yanılgıyı tanımak, daha adil kararlar almanıza, daha kapsayıcı ekipler
      oluşturmanıza ve kayırmacılıktan kaçınmanıza yardımcı olur. Ayrıca çeşitlilik
      girişimlerinin neden dirençle karşılaştığını da açıklar—grup içi tercih otomatiktir.
    when_to_use:
      - liderlik
      - karar_verme
      - ilişki_kurma
      - çatışma_çözümü
    how_can_you_spot_it:
      preferential_treatment: |
        "Bizden" olanlara şüphe avantajı sağlamak ama "onlara" sağlamamak.
      resource_allocation: |
        Grup dışı üyelerin eşit veya daha fazla ihtiyacı varken, grup içi üyelere
        daha fazla kaynak tahsis etmek.
      attribution_asymmetry: |
        Grup içi başarı = yetenek; grup dışı başarı = şans. Grup içi başarısızlık =
        koşullar; grup dışı başarısızlık = karakter.
      minimal_group_effects: |
        Keyfi grup atamalarıyla bile kayırmacılığın ortaya çıkması.
    examples:
      hiring: |
        Kendi üniversitenizden mezun olan veya sizinle aynı geçmişe sahip adayları
        tercih etmek.
      performance_reviews: |
        Benzer performansa sahip grup dışı üyelere kıyasla grup içi üyeleri daha
        olumlu derecelendirmek.
      collaboration: |
        "Bizim takımımızı" güvendip dahil ederken, "onların takımını" dışlamak veya
        onlara şüpheyle yaklaşmak.
      politics: |
        Grup dışı argümanları reddederken, grup içi argümanları eleştirel olmadan
        kabul etmek.
    real_world_implications: |
      Grup içi yanılgı eşitsizliği sürdürür, liyakati zayıflatır ve çatışmayı körükler.
      İşe alım, terfi, yatırım ve politikaları etkiler. Azaltmak için bilinçli çaba
      gerekir—kendi kendine düzelmez.
    professional_application:
      networking_and_relationship_building: |
        Doğrudan çevreniz dışındaki insanları aktif olarak dahil edin. Çeşitli
        bakış açıları arayın. Birini sadece "size benzediği" için kayırıp kayırmadığınızı sorgulayın.
      collaborative_learning_initiative: |
        İşe alım ve değerlendirmede grup içi yanılgıyı azaltmak için yapılandırılmış
        süreçler (kör incelemeler, çeşitli paneller) kullanın. Ortak kimlik oluşturmak
        için gruplar arası projeler oluşturun.
    how_can_this_be_misapplied:
      forced_diversity: |
        Temeldeki önyargıyı ele almadan kırgınlığa yol açan kotalar veya politikalar
        uygulamak.
      out_group_hostility: |
        Grup dışı düşmanlık da varken, grup içi yanılgıyı tek sorun olarak ele almak.
      ignoring_legitimate_differences: |
        Tüm grup farklılıkları önyargı değildir—bazen grupların farklı özellikleri
        vardır. Tüm eşitsizliklerin ayrımcılık olduğunu varsaymayın.
      reverse_discrimination: |
        Grup içi üyelere karşı adaletsiz olacak şekilde, grup dışı grupları kayırmak
        için aşırı düzeltme yapmak.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Ters Çevirme (İnversiyon)
    quick_introduction: |
      Ters çevirme, bir soruyu tam tersinden ele alan bir problem çözme tekniğidir.
      "Nasıl başarılı olurum?" diye sormak yerine, "Beni ne başarısızlığa sürükler?"
      diye sorarsınız ve bu durumları ortadan kaldırırsınız. İleriye dönük düşüncenin
      genellikle gözden kaçırdığı riskleri ve ant-kalıpları ortaya çıkarır.
    one_liner: Ters çevir—başarısız olmana neyin neden olacağını sor, sonra bunlardan kaçın.
    try_this:
      - Herhangi bir hedef için, başarısız olabileceğin ana yolları listele—sonra bunlardan kaçın.
      - Negatif görselleştirme kullan: Bunun ters gitmesine ne neden olur?
      - Sor: Akıllı biri bunu nasıl mahveder?
    ask_yourself:
      - Bunun neden başarısız olabileceğini düşündüm mü?
      - Sadece ileriye dönük düşünerek neleri göremiyorum?
    in_more_detail: |
      Charlie Munger tarafından popülerleştirilen ve matematiksel mantığa dayanan ters
      çevirme, başarısız olmaktan kaçınmanın genellikle başarıyı kovalamaktan daha
      kolay olduğu gerçeğinden yararlanır. Bir şeyin ters gidebileceği ana yolları
      belirleyebilirseniz, bunları sistematik olarak ortadan kaldırabilirsiniz.

      Carl Jacobi'nin "Ters çevir, hep ters çevir." dediği rivayet edilir. Stoacılar,
      sahip olduklarının değerini takdir etmek ve olumsuzluklara hazırlanmak için
      negatif görselleştirmeyi (kaybı hayal etme) kullandılar. Ters çevirme
      pessimizm değildir; engelleri kaldırarak ilerleme kaydetmenin yapılandırılmış
      bir yoludur.
    why_this_is_important: |
      Ters çevirme, felaket boyutundaki hatalardan kaçınmanıza, planları test etmenize
      ve bariz olmayan çözümler bulmanıza yardımcı olur. Kritik başarısızlık modlarını
      gözden kaçırmamanızı sağlayarak ileriye dönük planlamayı tamamlar.
    when_to_use:
      - problem_cozme
      - karar_verme
      - risk_degerlendirme
      - kariyer_hamleleri
    how_can_you_spot_it:
      premortem_thinking: |
        Bir projeden önce, sanki zaten başarısız olmuş gibi "Bu neden başarısız oldu?" diye sormak.
      anti_goals: |
        Başarmak istediğin kadar, kaçınmak istediğin şeyleri de net bir şekilde tanımlamak.
      reverse_engineering_failure: |
        Sadece başarıları incelemek yerine dersler çıkarmak için başarısız olmuş vakaları incelemek.
      constraint_focus: |
        Yukarı yönlü optimizasyondan önce kısıtlamaları ve darboğazları belirlemek.
    examples:
      investing: |
        "Bu hisse senedini ne yükseltir?" yerine "Bana para kaybettirecek olan nedir?" diye sorup
        bu senaryolardan kaçının.
      career: |
        "İtibarımı ne mahveder?" sorusu, kaçınılması gereken davranışların bir listesini ortaya çıkarır.
      product_launch: |
        "Neden çoğu ürün lansmanı başarısız oluyor?" sorusu, lansmandan önce ele alınması gereken riskleri ortaya çıkarır.
      health: |
        "Hangi alışkanlıklar yaşam süresini kısaltır?" sorusu, "Beni sağlıklı yapan nedir?" sorusundan daha net bir kaçınma listesi sunar.
    real_world_implications: |
      Ters çevirme, mühendislikte (arıza modu analizi), yatırımda ve stratejide kullanılır.
      Aşırı güveni azaltır ve risk yönetimini iyileştirir. Aşırı bağımlılık, aşırı
      ihtiyatlılığa yol açabilir.
    professional_application:
      networking_and_relationship_building: |
        "Bu ilişkiye ne zarar verir?" sorusu, güveni zedeleyen davranışlardan kaçınmanıza yardımcı olur.
      collaborative_learning_initiative: |
        Projeler için ölüm sonrası analizler yapın: "Bu başarısız oldu. Neden?" Cevapları planlama ve
        yürütmeyi iyileştirmek için kullanın.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Sadece başarısızlıktan kaçınmaya odaklanmak, eylemi felç edebilir ve gerekli
        risk alımını engelleyebilir.
      negativity_bias: |
        İleriye dönük fırsat belirleme ile dengelenmezse, ters çevirme olumsuzluk önyargısını
        artırabilir.
      analysis_paralysis: |
        Başarısızlık modları üzerinde o kadar çok zaman harcamak ki, asla harekete geçmemek.
      missing_upside: |
        Ters çevirme size ne yapacağınızı söylemez—sadece neyden kaçınacağınızı söyler. Hala
        pozitif hedeflere ihtiyacınız var.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Azalan Getiriler Yasası
    quick_introduction: |
      Azalan getiriler yasası, diğer girdiler sabit tutulurken bir girdiyi artırdıkça, her yeni girdi biriminden elde edilen ek çıktının sonunda azalacağını belirtir. Daha fazlası her zaman daha iyi değildir; ekstra çabanın giderek daha az verim sağladığı bir nokta vardır.
    one_liner: Daha fazla girdi sonunda daha az çıktı verir; optimal bir nokta vardır.
    try_this:
      - Sor: Ekstra çabanın anlamlı getiriler sağladığı noktanın ötesinde miyim?
      - En yüksek kaldıraç etkisine sahip girdileri önceliklendirin; marjinal getiriler düştüğünde durun.
      - Zaten karşılığını vermiş bir şeye aşırı yatırım yaptığınızı fark edin.
    ask_yourself:
      - Buradaki birim başına ek çabadan ne kazanacağım?
      - Azalan getiriler noktasının ötesinde optimizasyon mu yapıyorum?
    in_more_detail: |
      Ekonomide, sabit bir araziye daha fazla işçi eklemek sonunda daha küçük artışlar üretir. Kişisel verimlilikte, çalışmanın ilk saati onuncu saatinden daha fazla değer katabilir. İlke kaynaklar, çaba, zaman ve özellikler için geçerlidir. Optimal bir nokta vardır; ötesinde marjinal getiriler düşer ve hatta negatif bile olabilir.

      Azalan getirileri tanımak, kaynakları verimli bir şekilde tahsis etmenize ve değerlerinin çoğunu zaten sağlamış alanlara aşırı yatırım yapmaktan kaçınmanıza yardımcı olur.
    why_this_is_important: |
      Azalan getirileri anlamak, aşırı yatırımı önler, önceliklendirmeyi yönlendirir ve ne zaman duracağınızı bilmenize yardımcı olur. Kaynak tahsisi ve mükemmeliyetçilikten kaçınmak için gereklidir.
    when_to_use:
      - karar_verme
      - problem_çözme
      - yatırım_yapma
      - kariyer_hamleleri
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Her ek birim çaba veya kaynak, öncekinden daha az çıktı üretir.
      perfectionism_trap: |
        Kalitenin son %10'u için çabalamak orantısız bir çaba gerektirir.
      overinvestment: |
        Marjinal getirinin düşük veya negatif olduğu durumlarda kaynak eklemeye devam etmek.
      optimal_point_passed: |
        Daha fazla girdinin sonuçları iyileştirdiği noktanın ötesine geçtiniz.
    examples:
      studying: |
        Sınav hazırlığının ilk 2 saati, 7-8. saatlerden daha fazla katkı sağlar; azalan getiriler noktası vardır.
      product_features: |
        Bir uygulamaya daha fazla özellik eklemek kullanıcıları şaşırtabilir; 20. özellik, 5. özellikten daha az değer katar.
      hiring: |
        Bir projeye daha fazla insan eklemek, bir noktadan sonra projeyi yavaşlatabilir (Brooks Yasası).
      marketing: |
        Reklam harcamasını ikiye katlamak sonuçları ikiye katlamaz; piyasayı doyurdukça getiriler azalır.
    real_world_implications: |
      Azalan getiriler yasası, ekonomik politikayı, iş stratejisini ve kişisel verimliliği yönlendirir. Onu görmezden gelmek, kaynak israfına ve suboptimal sonuçlara yol açar. Pareto ilkesini ve odaklanmayı destekler.
    professional_application:
      networking_and_relationship_building: |
        Birkaç derin ilişkiye yatırım yapmak, çabayı birçok kişiye yaymaktan daha fazla getiri sağlayabilir. Ek ağ oluşturmanın azalan getirileri olduğunda fark edin.
      collaborative_learning_initiative: |
        Daha fazla eğitim saati her zaman daha iyi sonuçlar anlamına gelmez. Optimal dozu bulun ve aşırı yüklemeden kaçının.
    how_can_this_be_misapplied:
      premature_optimization: |
        Makul bir kalite düzeyine ulaşmadan çok erken durmak.
      undershooting: |
        Yetersiz çaba için bir mazeret olarak azalan getirileri kullanmak.
      misidentifying_the_curve: |
        Aslında eğrinin farklı bir bölümünde (örneğin, erken üstel faz) iken azalan getiriler varsaymak.
      one_size_fits_all: |
        Eğrilerin farklı olduğu farklı bağlamlarda aynı "optimal noktayı" uygulamak.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Kayıp Kaçınma Yanılgısı
    quick_introduction: |
      Kayıp kaçınma, eşdeğer kazançlar elde etmekten ziyade kayıplardan kaçınmayı tercih etme eğilimidir.
      İnsanlar, kazanmanın verdiği zevki hissettiklerinden yaklaşık iki kat daha güçlü bir şekilde kaybetmenin acısını hissederler.
    one_liner: Kayıplar, eşdeğer kazançların verdiği iyi hissiyattan yaklaşık iki kat daha acı verici hissedilir.
    try_this:
      - "Kendinize sorun: Kaybedeceklerimi kazanacaklarıma göre fazla mı değerlendiriyorum?"
      - Seçimi kayıplar yerine kazançlar olarak yeniden çerçeveleyin ve görüşünüzün değişip değişmediğini görün.
      - Karar verirken, kaybedilen şeyin korkusunun, gerçek potansiyel faydadan daha fazla etkili olup olmadığını fark edin.
    ask_yourself:
      - Sıfırdan başlıyor olsaydım ne seçerdim?
      - Kaybedeceklerim yüzünden mi tutunuyorum, yoksa gelecek gerçekten daha mı iyi olacak?
    in_more_detail: |
      Daniel Kahneman ve Amos Tversky tarafından geliştirilen kayıp kaçınma, kayıpların ve kazançların
      asimetrik olarak algılanma şeklini açıklar. 100 dolar kaybetmenin psikolojik etkisi, tipik olarak
      100 dolar kazanmanın tatmininden çok daha büyüktür. Bu yanılgı, finans, müzakereler ve günlük kararlar
      arasındaki seçimleri etkiler ve potansiyel kayıplar belirgin olduğunda sıklıkla riskten kaçınan davranışlara yol açar.
    why_this_is_important: |
      Kayıp kaçınmayı anlamak, kayıp korkusunun rasyonel analizden daha fazla karar vermeye neden olduğu durumları fark etmenize yardımcı olur.
      Neden insanların zarardaki yatırımlara tutunduğunu, gerekli değişikliklerden kaçındığını ve müzakereler ile kariyer kararlarında
      optimal olmayan seçimler yaptığını açıklar.
    when_to_use:
      - karar_verme
      - yatırım
      - kariyer_hamleleri
      - risk_degerlendirmesi
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Bir şey kaybetme ihtimalinin, potansiyel bir kazancın potansiyel faydasına kıyasla orantısız bir endişe
        veya direnç tetiklediği durumları fark edin.
      reluctance_to_change: |
        Nesnel analiz daha iyi bir seçenek olduğunu gösterse bile strateji değiştirmekten, bir işten ayrılmaktan veya bir varlığı satmaktan çekinme.
      framing_sensitivity: |
        Sonuçlar eşdeğer olsa bile, seçeneklerin kazanç veya kayıp olarak çerçevelenmesine bağlı olarak kararlar dramatik bir şekilde değişir.
      overvaluing_what_you_have: |
        Mülkiyet etkisi —sahip olduğunuz şeylere sırf size ait oldukları için daha yüksek değer biçme— genellikle kayıp kaçınma ile birlikte görülür.
    examples:
      investing: |
        "Zararı realize etmekten kaçınmak" için düşen bir hisse senedine tutunmak ve bunun yerine
        başka yerlerde daha iyi yatırım fırsatlarını kaçırmak.
      career: |
        Yeni fırsat daha büyük bir büyüme sunsa bile, ayrılmak güvenlik kaybı gibi hissettirdiği için
        tatmin etmeyen bir işte kalmak.
      negotiations: |
        Bir anlaşmaya varmak yerine bir şeyden "vazgeçmek" olarak çerçevelendiği için adil bir teklifi reddetmek.
      product_design: |
        Ücretsiz denemelerin ücretliye dönüşmesi — kullanıcılar deneme sona erdiğinde hizmeti "kaybetmeyi" deneyimler,
        bu da yeni bir hizmeti "kazanmaktan" daha fazla aboneliği motive eder.
    real_world_implications: |
      Kayıp kaçınma piyasaları, politikaları ve bireysel davranışları şekillendirir. Neden sigorta ve garantilerin iyi sattığını,
      neden insanların faydalı değişikliklerden kaçındığını ve neden olumsuz haberlerin orantısız bir etkiye sahip olduğunu açıklar.
      Bunu tanımak, karar kalitesini iyileştirebilir ve pişmanlık güdümlü seçimleri azaltabilir.
    professional_application:
      networking_and_relationship_building: |
        İnsanların kayıp kaçınma nedeniyle verimsiz ilişkileri veya işbirliklerini sona erdirmekten kaçınabileceği konusunda farkında olun — bağlantıyı "kaybetmekten" korkarlar.
        Direnci azaltmak için yeni fırsatları kayıp yerine kazanç olarak çerçeveleyin.
      collaborative_learning_initiative: |
        Yeni süreçler veya araçlar tanıtırken, takımın ne "vazgeçtiği" yerine ne kazandığını vurgulayın.
        Kayıp odaklı değişim girişimleri genellikle daha güçlü direnç tetikler.
    how_can_this_be_misapplied:
      manipulation: |
        Kararları baskılamak için kayıp kaçınmayı istismar etmek — örn. "sınırlı süreli teklifler"
        veya gerçek değer değerlendirmesinden ziyade kayıp korkusu uyandıran "kaçırmayın" çerçevelemesi.
      misinterpreting_relationships: |
        Birinin değişime direncini tamamen rasyonel varsaymak, oysa bunun kayıp kaçınma tarafından yönlendirilebileceğini anlamamak.
        Motifleri yanlış atfetmek güvene zarar verebilir.
      overcommitment: |
        Zararı kesmek yerine, "zaten bu kadar çok şey harcadık" diyerek başarısız bir projeye yatırım yapmaya devam etmek — batan maliyet yanılgısı.
      missed_opportunities_for_conflict_resolution: |
        Herhangi bir tavizin kayıp gibi hissedilmesinden dolayı uzlaşmayı reddetmek,
        herkes için alternatifin daha kötü bir sonuç olmasına rağmen.
      vulnerability_to_exploitation: |
        Seçimleri kayıp kaçınmayı tetikleyecek şekilde çerçeveleyen başkaları tarafından manipüle edilmek,
        örneğin harekete geçmezseniz ne "kaybedeceğinizi" vurgulayan satış taktikleri.
      reinforcing_negative_perceptions: |
        Potansiyel olumsuzluklara aşırı odaklanmak, kendi kendini gerçekleştiren karamsar bir bakış açısı yaratabilir ve büyüme fırsatlarını kaçırabilir.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: Harita Bölge Değildir
    quick_introduction: |
      "Harita bölge değildir" ifadesi, gerçekliğin bir temsilinin gerçekliğin kendisi
      olmadığı anlamına gelir. Modeller, teoriler ve açıklamalar faydalı basitleştirmelerdir,
      ancak her zaman bir şeyler eksik bırakırlar. Haritayı bölge ile karıştırmak hataya yol açar.
    one_liner: Harita bölge değildir; tüm modeller yanlıştır; bazıları kullanışlıdır.
    try_this:
      - Bir model gerçeklikle eşleşmediğinde, haritayı güncelleyin; gerçeği ona uydurmaya zorlamayın.
      - Sorun: Bu model neleri dışarıda bırakıyor? Ne zaman bozulabilir?
      - Modelleri hakikat olarak değil, araçlar olarak görün.
    ask_yourself:
      - Modelimi gerçeklikle mi karıştırıyorum?
      - En son baktığımdan beri bölge değişti mi?
    in_more_detail: |
      Alfred Korzybski bu fikri genel semantikte tanıttı. Bir şehir haritası navigasyon için
      faydalıdır, ancak şehir değildir; ayrıntıları atlar, eskir ve asla her şeyi yakalayamaz.
      Aynı durum zihinsel modeller, bilimsel teoriler ve organizasyon şemaları için de geçerlidir.

      Tüm modeller yanlıştır; bazıları kullanışlıdır. Tehlike, özellikle bölge değiştiğinde,
      bir modeli tam hakikatmiş gibi ele almaktır. İyi düşünme, gerçeklik eşleşmediğinde
      haritaları güncelleme gerektirir.
    why_this_is_important: |
      Haritaların bölgelerden farklı olduğunu kabul etmek modeller konusundaki aşırı güveni önler,
      inançların güncellenmesini teşvik eder ve güncel olmayan veya aşırı basitleştirilmiş
      bilgilerle hareket etme riskini azaltır.
    when_to_use:
      - karar_verme
      - problem_çözme
      - öğrenme
      - risk_değerlendirmesi
    how_can_you_spot_it:
      model_reality_confusion: |
        Bir çerçeveyi veya teoriyi gerçekliği tam olarak tanımlıyormuş gibi ele almak.
      outdated_assumptions: |
        Mevcut koşullarla artık eşleşmeyen bilgilere veya modellere dayanarak hareket etmek.
      oversimplification: |
        "Harita" içermediği için incelikleri göz ardı etmek.
      map_worship: |
        Kanıtlar çeliştiğinde, güncellemeler yerine bir modeli savunmak.
    examples:
      organizational_charts: |
        Raporlama yapısının işlerin aslında nasıl yürüdüğünü yansıttığını varsaymak.
      financial_models: |
        Bir tablo projeksiyonunu bir senaryo olarak değil, bir tahmin olarak ele almak.
      stereotypes: |
        Grup düzeyindeki genellemeleri bireylere uygulamak.
      strategy_docs: |
        Piyasanın kaydığı durumda bir planı yazıldığı gibi uygulamak.
    real_world_implications: |
      Harita-bölge ayrımı bilim, mühendislik ve felsefenin temelini oluşturur.
      Bayesçi güncelleme, çevik metodoloji ve epistemik alçakgönüllülüğün temelini oluşturur.
      Bunu göz ardı etmek katı düşünceye ve başarısız stratejilere yol açar.
    professional_application:
      networking_and_relationship_building: |
        Bir kişi hakkındaki zihinsel modeliniz güncel olmayabilir. Eski izlenimlere dayanarak
        değil, doğrudan etkileşim yoluyla güncelleyin.
      collaborative_learning_initiative: |
        Ekipleri planları ve modelleri sabit hakikatler olarak değil, test edilip revize edilecek
        hipotezler olarak ele almaya teşvik edin.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Hiçbir haritanın faydalı olmadığına ve tüm bilginin şüpheli olduğuna karar vermek.
      constant_revision: |
        O kadar sık güncelleme yapmak ki istikrarlı bir anlayış ortaya çıkmasın.
      dismissing_models: |
        Faydalı basitleştirmeleri "bölge olmadığı" için reddetmek.
      relativism: |
        Tüm haritaların eşit derecede geçerli olduğunu iddia etmek, oysa bazıları bölgeye
        açıkça daha iyi uyuyor.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Sadece Maruz Kalma Etkisi
    quick_introduction: |
      Sadece maruz kalma etkisi, bir şeylere sadece onlara aşina olduğumuz için
      tercih geliştirme eğilimidir. Tekrarlanan maruz kalma - pekiştirme olmadan bile -
      beğeniyi artırır. Bildiklerimizi tercih etme eğilimindeyiz.
    one_liner: Aşinalık beğeniyi doğurur - daha önce gördüğümüzü tercih ederiz.
    try_this:
      - Sormak: Bunu iyi olduğu için mi, yoksa aşina olduğu için mi seviyorum?
      - Seçenekleri değerlendirirken, maruz kalmaya göre düzeltme yapın - yeni şeyler dezavantajlı başlar.
      - Tercihinizi tekrarlamanın ne zaman etkilediğini fark edin.
    ask_yourself:
      - Bir şeyi sadece daha önce gördüğüm için mi tercih ediyorum?
      - Maruz kalma eşit olsaydı farklı mı seçerdim?
    in_more_detail: |
      Robert Zajonc, uyaranlara (yüzler, kelimeler, şekiller) tekrarlanan maruz kalmanın,
      maruz kalmanın bilinçli farkında olmasak bile onlara karşı olumlu bir etki
      yarattığını göstermiştir. Aşinalık beğeniyi doğurur, nefreti değil (çoğu
      durumda). Analiz yapmadığımızda ve maruz kalma ince olduğunda etki daha
      güçlüdür.

      Sadece maruz kalma etkisi marka tercihlerini, kişilerarası çekimi
      ve estetik yargıyı etkiler. Neden aşina olduğumuz müziği tercih ettiğimizi,
      neden reklamcılığın tekrarlarla işlediğini ve neden daha önce gördüğümüz
      insanları - etkileşim olmadan bile - tercih edebileceğimizi açıklar.
    why_this_is_important: |
      Sadece maruz kalma etkisini tanımak, kendi tercihlerinizi anlamanıza ve
      tekrarlanan manipülasyona direnmenize yardımcı olur. Ayrıca görünürlüğün ve
      varlığın ilişkiler ve markalar için neden önemli olduğunu açıklar.
      Aşinalık güçlü ama genellikle bilinçsiz bir etkidir.
    when_to_use:
      - ilişki_kurma
      - karar_verme
      - liderlik
      - öğrenme
    how_can_you_spot_it:
      familiarity_preference: |
        Daha önce gördüğümüz seçenekleri yeni olanlar yerine tercih etmek.
      repetition_influence: |
        Tekrarlanan maruz kalma, açık bir ikna olmadan beğeniyi artırır.
      unconscious_influence: |
        Etki, maruz kalmanın farkında olmadığımızda bile işe yarar.
      brand_recognition: |
        Nedenini açıklayamadığımızda bile aşina markalar tercih edilir.
    examples:
      advertising: |
        Bir markaya tekrarlanan maruz kalma, ikna edici mesajlaşma olmadan bile
        tercihi artırır.
      music: |
        Daha önce duyduğumuz şarkıları ilk dinlemede yeni olanlardan daha çok
        beğenme eğilimindeyiz.
      people: |
        Tekrarlanan olarak gördüğümüz insanları (örn. sınıf arkadaşları,
        iş arkadaşları) yabancılardan daha çok sevme eğilimindeyiz - etkileşim
        olmadan bile.
      ideas: |
        Daha önce karşılaştığımız fikirler, yeni fikirlere göre daha rahat ve
        güvenilir gelir.
    real_world_implications: |
      Sadece maruz kalma etkisi tüketici davranışlarını, siyasi tercihleri
      ve sosyal çekimi şekillendirir. Pazarlamada istismar edilir ve aşina olanlar
      için haksız avantajlar yaratabilir. Ayrıca, maruz kalma çeşitliliğinin neden
      önemli olduğunu açıklar - farklılıklara aşinalık önyargıyı azaltır.
    professional_application:
      networking_and_relationship_building: |
        Görünürlük önemlidir. Ortaya çıkmak, mevcut olmak ve görülmek,
        beğeni oluşturan aşinalık yaratır. Tekrarlanan düşük riskli temasın değerini
        küçümsemeyin.
      collaborative_learning_initiative: |
        İnsanları tekrarlanan olarak çeşitli bakış açılarına ve insanlara maruz
        bırakın - aşinalık önyargıyı azaltabilir. Ancak, sadece maruz kalmanın
        statükoya olan tercihi de pekiştirebileceğinin farkında olun.
    how_can_this_be_misapplied:
      manipulation: |
        Onay olmadan tercihleri manipüle etmek için kasıtlı olarak tekrarlanan maruz
        kalma yaratmak.
      false_familiarity: |
        Aşinalığın kalite anlamına geldiğini varsaymak - bazen yeni
        seçenekler daha iyidir.
      exclusion: |
        Sadece belirli kişiler maruz kalırsa, haksız bir avantaj elde
        ederler. Kimin görünürlüğe erişimi olduğunu düşünün.
      stagnation: |
        Aşinalığa aşırı güvenmek ve asla yeni şeyler denememek.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Narrative Fallacy
    quick_introduction: |
      The narrative fallacy is the tendency to construct stories from past events
      that make them seem more coherent, predictable, and meaningful than they
      were. We retrofit explanations onto randomness. We turn the mess of
      history into a tidy story—and then believe the story was inevitable.
    one_liner: We retrofit coherent stories onto randomness—and then believe they were inevitable.
    try_this:
      - Ask: How much of this story is hindsight? What role did luck play?
      - Be skeptical of tidy explanations—the past was messier than our stories.
      - Notice when "makes sense" is doing the work of "was predictable."
    ask_yourself:
      - Am I constructing a story that makes the past seem more inevitable than it was?
      - Would I have predicted this before it happened?
    in_more_detail: |
      Nassim Taleb popularized the term. We crave narrative—cause and effect,
      heroes and villains, clear arcs. So we construct stories that connect
      events in hindsight. The story feels true because it's coherent—but
      coherence doesn't mean it's correct. We confuse "makes sense" with
      "was predictable." We underestimate the role of luck and
      randomness.

      The narrative fallacy affects how we learn from history, evaluate
      success, and make predictions. We overweight the explanatory power
      of stories and underweight the role of chance.
    why_this_is_important: |
      Recognizing the narrative fallacy helps you avoid overlearning from
      the past and overestimating predictability. It encourages humility
      about causation and prediction. Not everything that makes a good
      story is true or generalizable.
    when_to_use:
      - decision-making
      - learning
      - risk_assessment
      - problem_solving
    how_can_you_spot_it:
      hindsight_coherence: |
        Past events are explained with a tidy story that wasn't
        visible at the time.
      cause_effect_overconfidence: |
        We assign clear causes to outcomes that had many
        contributing factors.
      luck_minimization: |
        Success and failure are explained by skill and strategy,
        not luck.
      story_over_evidence: |
        A compelling narrative overrides statistical evidence.
    examples:
      business_success: |
        "They succeeded because of X" when many factors and luck
        were involved—we pick the story that fits.
      investing: |
        Explaining market moves with narratives that feel
        satisfying but may be post-hoc.
      history: |
        Historical events are told as inevitable progressions
        when they were contingent on many factors.
      career: |
        "I got here because I did X" when luck and timing
        played significant roles.
    real_world_implications: |
      The narrative fallacy distorts learning, overconfidence
      in prediction, and attribution of success and failure.
      It makes the past seem more predictable than it was
      and the future seem more predictable than it is.
    professional_application:
      networking_and_relationship_building: |
        When someone tells their success story, remember that
        it's a narrative—coherent and compelling, but possibly
        simplified. Luck and unseen factors may be underweighted.
      collaborative_learning_initiative: |
        In retrospectives, distinguish narrative from evidence.
        Ask "What would we have said at the time?" Use
        decision journals to capture uncertainty before
        outcomes are known.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Some narratives are correct—not everything is
        narrative fallacy. Causation exists.
      excessive_skepticism: |
        Refusing to learn from the past because "narrative
        fallacy." We can still extract useful lessons.
      false_randomness: |
        Assuming everything is random when some outcomes
        are meaningfully attributable.
      undermining_storytelling: |
        Stories have value for communication and meaning—
        the fallacy is believing they're complete or
        predictive, not that they exist.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Olumsuzluk Önyargısı
    quick_introduction: |
      Olumsuzluk önyargısı, olumlu bilgilere kıyasla olumsuz bilgilere daha fazla ağırlık verme eğilimidir. Kötü haberler, eleştiriler ve tehditler, eşdeğer olumlu uyaranlardan daha fazla dikkatimizi çeker ve kararlarımızı daha güçlü bir şekilde etkiler.
    one_liner: Kötü haber, iyi haberden daha ağır basar—tehditleri önceliklendirmek için programlandık.
    try_this:
      - Değerlendirirken aktif olarak olumlu kanıtları arayın ve ağırlık verin.
      - Bir eleştirinin birçok iltifatın önüne geçtiği zamanları fark edin.
      - Sorun: Olumsuz bilgiye hak ettiğinden daha fazla ağırlık veriyor muyum?
    ask_yourself:
      - Olumsuza takılıp olumlu olanı göz ardı ediyor muyum?
      - İyi kanıtlara odaklanırsam farklı hisseder miydim?
    in_more_detail: |
      Evrimsel olarak, bir tehdidi kaçırmak ölümcül olabilirdi, ancak bir fırsatı kaçırmak genellikle hayatta kalınabilirdi. Beynimiz olumsuz bilgileri önceliklendirmek için programlanmıştır. Tek bir eleştirel yorum, birçok iltifatın önüne geçebilir. Olumsuz olaylar daha canlı bir şekilde ve daha uzun süre hatırlanır.

      Bu önyargı ilişkileri, karar verme süreçlerini ve refahı etkiler. Başarısızlıklara takılıp kalırız, en kötü senaryoları öngörürüz ve olumlu kanıtları göz ardı ederiz. Bunu anlamak, onu düzeltmemize yardımcı olur.
    why_this_is_important: |
      Olumsuzluk önyargısını tanımak, geri bildirimleri dengelemenize, eleştiriye aşırı tepki vermekten kaçınmanıza ve daha ölçülü kararlar almanıza yardımcı olur. Ayrıca neden kötü haberlerin hakim olduğunu ve neden çoğu zaman koşulların gerektirdiğinden daha kötü hissettiğimizi açıklar.
    when_to_use:
      - karar_verme
      - ilişki_kurma
      - liderlik
      - risk_değerlendirmesi
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Tek bir olumsuz yorum, birçok olumlu yorumu gölgede bırakır.
      threat_prioritization: |
        Potansiyel olumsuzluklar, eşdeğer olumlu yönlerden daha fazla dikkat çeker.
      vivid_negative_memories: |
        Olumsuz deneyimler daha kolay ve daha fazla duyguyla hatırlanır.
      discounting_positive_evidence: |
        İyi haberler çabucak unutulur veya açıklanır.
    examples:
      performance_reviews: |
        Bir çalışan, eleştirel bir geri bildirime takılıp kalır ve genel olumlu değerlendirmeyi göz ardı eder.
      news_consumption: |
        Olumsuz başlıklar, olumlu eğilimlere rağmen dikkatleri ele geçirir ve dünya görüşünü şekillendirir.
      relationships: |
        Tek bir tartışma, birçok iyi anın önüne geçer.
      investing: |
        Piyasa düşüşleri, eşdeğer yükselişlerin tetiklediği coşkudan daha fazla panik tetikler.
    real_world_implications: |
      Olumsuzluk önyargısı medya, siyaset ve organizasyon kültürünü şekillendirir. Anksiyete, çatışma ve optimal olmayan kararlara katkıda bulunur. Kasıtlı olarak buna karşı koymak, refahı ve yargıyı iyileştirebilir.
    professional_application:
      networking_and_relationship_building: |
        Geri bildirim verirken, olumsuz yorumların daha ağır basacağının farkında olun—onları dengeleyin ve büyümeyi vurgulayın. Geri bildirim alırken, bilinçli olarak tüm resmi göz önünde bulundurun.
      collaborative_learning_initiative: |
        Olumsuzluk önyargısını açıkça dengeleyen kültürler yaratın: zaferleri kutlayın, olumlu sonuçları belgeleyin ve "ölüm sonrası" analizlerini, neyin doğru gittiğinin "ölüm öncesi" analizleriyle dengeleyin.
    how_can_this_be_misapplied:
      toxic_positivity: |
        "Pozitif düşünme"de ısrar ederek meşru endişeleri göz ardı etmek.
      ignoring_real_threats: |
        Gerçek riskleri küçümseme noktasına kadar aşırı düzeltme yapmak.
      feedback_suppression: |
        "Olumsuzluk kötüdür" diyerek gerekli eleştiriden kaçınmak.
      invalidation: |
        Birine olumsuz duygularının "sadece olumsuzluk önyargısı" olduğunu söylemek, oysa gerçek endişe nedenleri varken.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Occam'ın Usturası
    quick_introduction: |
      Occam'ın Usturası (veya Ockham'ın Usturası), rekabet eden hipotezler arasında,
      en az varsayıma sahip olanın tercih edilmesi gerektiği ilkesidir. Basit açıklamalar
      genellikle—her zaman olmasa da—doğrudur.
    one_liner: Kanıtlara uyan en basit açıklamayı tercih edin.
    try_this:
      - Teorileri karşılaştırırken şunu sorun: Hangisi daha az varsayıma sahip?
      - Kanıt gerektirmedikçe karmaşıklık eklemeyin.
      - Basit bir açıklama yerine ayrıntılı bir açıklamayı tercih ettiğinizi fark edin.
    ask_yourself:
      - Gereksiz karmaşıklık mı getiriyorum?
      - Kanıt bu düzeyde bir açıklama gerektiriyor mu?
    in_more_detail: |
      William of Ockham'dan adını alan bu ilke, basit açıklamaların her zaman doğru olduğunu
      iddia etmez. Kanıt olmadan gereksiz karmaşıklığın eklenmemesi gerektiğini öne sürer.
      İki teori aynı olguyu açıklıyorsa, kanıt aksini gerektirmedikçe daha basit olan tercih edilir.

      Occam'ın Usturası bir sezgiseldir, bir yasa değildir. Bazen doğru açıklama karmaşıktır.
      Ancak aşırı uydurmaya, komplo düşüncesine ve gereksiz karmaşıklığa karşı korur.
      Açıklamada tutumluluğu destekler.
    why_this_is_important: |
      Occam'ın Usturası'nı uygulamak problem çözmeyi iyileştirir, modellerdeki aşırı uydurmayı
      azaltır ve ayrıntılı ama desteksiz teorilerden kaçınmanıza yardımcı olur. Kanıt belirsiz
      olduğunda kullanışlı bir varsayılan tercihtir.
    when_to_use:
      - problem_cozme
      - karar_verme
      - ogrenme
      - risk_degerlendirmesi
    how_can_you_spot_it:
      unnecessary_complexity: |
        Bir açıklama, daha azı yeterliyken birçok varsayımda bulunur.
      conspiracy_tendencies: |
        Basit nedenlere sahip olaylar için karmaşık, çok aktörlü açıklamalar.
      overfitting: |
        Geçmiş verileri mükemmel şekilde açıklayan ancak yeni verilerde başarısız olan bir model veya teori.
      elegance_in_explanation: |
        En iyi açıklamalar genellikle geriye dönüp bakıldığında "açık" hissettirir.
    examples:
      debugging: |
        Bir hata oluştuğunda, mimari sorunları varsaymadan önce en basit nedenleri (örn. yazım hatası, yanlış yapılandırma) kontrol edin.
      conspiracy_theories: |
        "Hükümet X'i organize etti" birçok gizli aktör gerektirir; "birkaç kişi hata yaptı" daha basittir.
      product_failure: |
        Kullanıcılar bir özelliği benimsemiyor—en basit açıklama: kullanıcıların arayüzden kafalarının karışması değil, sorunu çözmemesi.
      medical_diagnosis: |
        "Yaygın şeyler yaygındır"—nadirden önce sık görülen teşhisleri düşünün.
    real_world_implications: |
      Occam'ın Usturası bilimsel araştırmayı, mühendisliği ve günlük akıl yürütmeyi yönlendirir.
      Ayrıntılı yanlış teoriler üzerinde boşa harcanan çabayı azaltır. Yanlış uygulandığında,
      gerçekten karmaşık olguları göz ardı edebilir.
    professional_application:
      networking_and_relationship_building: |
        Başkalarının davranışlarını yorumlarken, kötülük veya karmaşık niyetleri varsaymadan önce basit açıklamaları tercih edin (meşguller, unuttular).
      collaborative_learning_initiative: |
        Problem çözme oturumlarında, karmaşık modeller oluşturmadan önce açıkça "En basit açıklama ne?" diye sorun.
    how_can_this_be_misapplied:
      oversimplification: |
        Geçerli karmaşık açıklamaları "çok karmaşık" oldukları için reddetmek.
      status_quo_bias: |
        Occam'ın Usturası'nı, yeni ama doğru açıklamalar yerine tanıdık açıklamaları tercih etmek için kullanmak.
      scientific_rigidity: |
        Yeni teorileri, kanıtlar onları desteklese bile, daha karmaşık oldukları için reddetmek.
      missing_nuance: |
        Bazı alanlar (örn. insan davranışı, ekosistemler) doğası gereği karmaşıktır;
        basitlik yanıltıcı olabilir.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Deve Kuşu Etkisi
    quick_introduction: |
      Deve kuşu etkisi, olumsuz finansal bilgilerden kaçınma eğilimidir—deve kuşunun
      "başını kuma gömmesi" gibi. İnsanlar piyasalar düşerken portföylerine bakmaktan kaçınır,
      faturaları açmayı geciktirir ve harekete geçmelerine yardımcı olabilecek uyarı işaretlerini
      görmezden gelirler.
    one_liner: Kötü haberden kaçınmak gerçeği değiştirmez—sadece tepkinizi geciktirir.
    try_this:
      - Sayıları göz ardı edemeyeceğiniz düzenli kontroller planlayın.
      - Bir şeyi açmayı veya bir şeye bakmayı ne zaman geciktirdiğinizi fark edin.
      - Sorun: Neden kaçınıyorum ve yüzleşseydim ne değişirdi?
    ask_yourself:
      - Bilgiden kaçınıyor muyum çünkü kötü olabilir mi?
      - Daha erken farkındalık daha iyi hareket etmeme yardımcı olur muydu?
    in_more_detail: |
      Terim, piyasa düşüşleri sırasında yatırımlarını kontrol etmekten kaçınan yatırımcıları
      tanımlamak için davranışsal finansta kullanılmıştır. Davranış finansın ötesine geçer:
      tıbbi kontrollerden kaçınmak, ilişki sorunlarını görmezden gelmek ve zorlu konuşmaları
      geciktirmek. Kötü haberlerin yarattığı kaygıdan kaçınmaya çalışırız, ancak kaçınma
      genellikle zamanında harekete geçmeyi engelleyerek sonuçları daha kötü hale getirir.

      Etki, kayıptan kaçınma ve duygusal rahatsızlıktan kaçınma isteği tarafından yönlendirilir.
      Ne yazık ki, bilgisizlik gerçeği değiştirmez—sadece tepkimizi geciktirir.
    why_this_is_important: |
      Deve kuşu etkisini tanımak, zorlu bilgilerle proaktif olarak yüzleşmenize yardımcı olur.
      Kötü haberden kaçınmak nadiren sonuçları iyileştirir; genellikle onları büyütür.
      Zamanında farkındalık daha iyi kararlar verilmesini sağlar.
    when_to_use:
      - karar_verme
      - yatırım_yapma
      - risk_değerlendirmesi
      - kariyer_hamleleri
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Piyasalar düşerken yatırım hesap özetlerine bakmamak.
      delaying_difficult_information: |
        Faturaları, tıbbi sonuçları veya performans geri bildirimlerini açmayı ertelemek.
      information_avoidance: |
        Kötü haber içerebilecek kaynaklardan aktif olarak kaçınmak.
      procrastination_on_unpleasant_tasks: |
        Sorunları ortaya çıkaracak veya çözecek eylemleri geciktirmek.
    examples:
      investing: |
        Bir yatırımcı, piyasa düşüşü sırasında 401(k) hesabını kontrol etmeyi bırakır ve
        yeniden dengeleme fırsatlarını kaçırır.
      health: |
        Kötü haber korkusuyla belirtilere rağmen doktora gitmeyi ertelemek.
      finances: |
        Borçla yüzleşmekten kaçınmak için kredi kartı ekstrelerini veya banka uyarılarını açmamak.
      performance: |
        Bir yönetici, eleştirel geri bildirimleri, daha erken müdahalenin yardımcı olacağı
        yıllık incelemeye kadar vermekten kaçınır.
    real_world_implications: |
      Deve kuşu etkisi, daha kötü finansal sonuçlara, gecikmiş tıbbi tedaviye ve
      ilişkilerde ve işte çözülmemiş sorunlara yol açar. Önlenmesi mümkün kayıpları
      artırır. Bilgiyi görmezden gelmeyi zorlaştıran sistemler yardımcı olabilir.
    professional_application:
      networking_and_relationship_building: |
        Zorlu konuşmalardan kaçınmayın. Sorunları kendiliğinden çözüleceklerini umarak
        ertesi güne bırakmak yerine erken ele alın. Sorunlar büyümeden ortaya çıkacak
        düzenli kontroller oluşturun.
      collaborative_learning_initiative: |
        Sorunları görmezden gelmeyi zorlaştıran geri bildirim döngüleri oluşturun—gösterge
        tabloları, düzenli incelemeler ve kötü haberlerin erken bildirilmesini teşvik eden
        normlar.
    how_can_this_be_misapplied:
      information_overload: |
        Sağlıklı olan bazı bilgileri göz ardı etmek yerine sürekli izlemeyi zorlamak (örneğin,
        her dakika hisse senedi kontrol etmemek).
      anxiety_amplification: |
        Potansiyel sorunlara o kadar çok odaklanmak ki bu, sonuçları iyileştirmeden
        endişeyi artırır.
      blame_shifting: |
        Bazı kaçınmaların rasyonel olduğu durumlarda (örneğin, gürültüyü görmezden gelmek)
        tüm kaçınmaları "deve kuşu etkisi" olarak atfetmek.
      micromanagement: |
        Başkalarının aşırı gözetimini haklı çıkarmak için kavramı kullanmak.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Pareto Prensibi
    quick_introduction: |
      Pareto prensibi (veya 80/20 kuralı), etkilerin kabaca %80'inin nedenlerin %20'sinden geldiğini belirtir. Girdilerin küçük bir azınlığı genellikle çıktıların çoğunu üretir—satışlarda, hatalarda, müşterilerde, çabalarda, özelliklerde ve daha fazlasında. Hayati azınlığa odaklanın.
    one_liner: Etkilerin %80'i nedenlerin %20'sinden gelir—hayati azınlığa odaklanın.
    try_this:
      - Sonuçların %80'ini üreten girdilerin %20'sini belirleyin—orada yoğunlaşın.
      - Az üreten %80'i kesin veya önceliklendirmeyi azaltın.
      - Sorun: Yaptığım az sayıda şeyden hangisi en çok önem taşır?
    ask_yourself:
      - Birkaç şey daha önemliyken çabamı eşit olarak mı dağıtıyorum?
      - Benim kaldıraçlı %20'm ne?
    in_more_detail: |
      Vilfredo Pareto, İtalya'nın arazisinin %80'inin nüfusun %20'si tarafından sahiplenildiğini gözlemledi. Prensip genelleştirildi: satışların %80'i müşterilerin %20'sinden, hataların %80'i kodun %20'sinden, sonuçların %80'i çabanın %20'sinden. Kesin oran değişir, ancak örüntü—dengesiz dağılım—yaygındır.

      Prensip, yüksek kaldıraçlı %20'yi belirleyip ona odaklanmanın sonuçları dramatik olarak iyileştirebileceğini öne sürer. Bir fizik yasası değil, bir önceliklendirme sezgisidir.
    why_this_is_important: |
      Pareto prensibini uygulamak, acımasızca önceliklendirmenize, düşük etkili faaliyetlere çaba harcamaktan kaçınmanıza ve daha azla daha fazlasını başarmanıza yardımcı olur. Üretkenlik ve stratejinin temelidir.
    when_to_use:
      - karar_verme
      - problem_cozme
      - liderlik
      - kariyer_hareketleri
    how_can_you_spot_it:
      uneven_distribution: |
        X'in küçük bir kısmı, Y'nin büyük bir kısmını oluşturur.
      high_leverage_activities: |
        Birkaç eylem en fazla sonucu üretir.
      low_value_tail: |
        Birçok etkinlik az katkıda bulunur; bunları kırpmak minimal etkiye sahiptir.
      vital_few_vs_trivial_many: |
        Anahtar, en çok hangi az sayıda olanın önem taşıdığını belirlemektir.
    examples:
      sales: |
        Müşterilerin %20'si gelirin %80'ini üretir—onları elde tutmaya ve büyütmeye odaklanın.
      software: |
        Özelliklerin %20'si kullanımın %80'ini sağlar—onlara öncelik verin.
      productivity: |
        Birkaç alışkanlık veya rutin en fazla çıktınızı üretir—onlarda yoğunlaşın.
      problems: |
        Hataların %20'si çökmelerin %80'ine neden olur—önce onları düzeltin.
    real_world_implications: |
      Pareto prensibi kaynak tahsisini, ürün stratejisini ve kişisel üretkenliği yönlendirir. Onu göz ardı etmek çabayı çok ince yaymaya yol açar. Aşırı uygulamak, önemli olduğu yerlerde "uzun kuyruğun" ihmaline neden olabilir.
    professional_application:
      networking_and_relationship_building: |
        Hedefleriniz için en önemli olan ilişkileri belirleyin. Çabayı eşit olarak yaymak yerine bunlara orantısız yatırım yapın.
      collaborative_learning_initiative: |
        Ekip performansını iyileştirirken, sonuçların %80'ini sağlayan müdahalelerin %20'sini bulun. Eğitimi ve süreç değişikliklerini oraya odaklayın.
    how_can_this_be_misapplied:
      oversimplification: |
        80/20'nin her yerde geçerli olduğunu varsaymak; bazı dağılımlar daha dengelidir.
      neglecting_the_tail: |
        Toplamda önemli olan "önemsiz çoğunluğu" göz ardı etmek (örneğin, birçok küçük müşteri, kenar durumlar).
      false_precision: |
        80/20'yi kelimesi kelimesine değil, kaba bir sezgi olarak ele almak.
      misidentifying_the_vital_few: |
        Hatalı analiz nedeniyle yanlış %20'ye odaklanmak.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Parkinson Yasası
    quick_introduction: |
      Parkinson Yasası, "iş, tamamlanması için mevcut zamanı dolduracak şekilde genişler" der. Bir göreve bir hafta verirseniz, bir hafta sürer; bir gün verirseniz, genellikle bir günde biter. Aynı durum bütçeler, ekip büyüklüğü ve kaynaklar için de geçerlidir.
    one_liner: İş, tamamlanması için mevcut zamanı dolduracak şekilde genişler.
    try_this:
      - Odaklanmayı zorlamak ve kapsam kaymasını önlemek için daha sıkı son teslim tarihleri belirleyin.
      - Sorun: Bunun makul olarak alabileceği minimum süre nedir?
      - Orantılı değer olmadan ekstra zaman veya kaynakların tüketildiğini fark ettiğinizde.
    ask_yourself:
      - Zamanı mı dolduruyorum, yoksa iş gerçekten bunu mu gerektiriyor?
      - Daha sıkı bir son teslim tarihi daha iyi önceliklendirmeyi zorlar mıydı?
    in_more_detail: |
      C. Northcote Parkinson, bürokrasilerin yapılacak iş miktarına bakılmaksızın büyüdüğünü gözlemledi. Ayrıca görevlerin mevcut zamanı dolduracak şekilde genişlediğini belirtti; çabamızı ve hızımızı son teslim tarihine göre ayarlarız. Sıkı son teslim tarihleri odaklanmayı zorlayabilir; gevşek olanlar ertelemeye ve kapsam kaymasına davetiye çıkarır.

      Yasanın proje yönetimi, kişisel üretkenlik ve kurumsal tasarım için etkileri vardır. Önceliklendirmeyi zorlayarak kısıtlamaların sonuçları iyileştirebileceğini öne sürer.
    why_this_is_important: |
      Parkinson Yasası'nı anlamak, daha iyi son teslim tarihleri belirlemenize, projelere aşırı kaynak sağlamaktan kaçınmanıza ve "daha fazla zaman" veya "daha fazla insan"ın yardımcı olmayacağını - ve hatta zarar verebileceğini - fark etmenize yardımcı olur. Kısıtlamalar üretken olabilir.
    when_to_use:
      - karar_verme
      - liderlik
      - sorun_çözme
      - kariyer_hamleleri
    how_can_you_spot_it:
      deadline_driven_effort: |
        Son teslim tarihi yaklaştıkça iş hızlanır; son teslim tarihi uzakken çok az ilerleme kaydedilir.
      scope_expansion: |
        Projeler, odaklanmayı sürdürmek yerine mevcut kaynakları dolduracak şekilde büyür.
      bureaucratic_growth: |
        Kuruluşlar, iş yükü artmasa bile personel ve süreç ekler.
      budget_exhaustion: |
        Harcamanın gerekli olup olmadığına bakılmaksızın bütçeler tamamen harcanır.
    examples:
      student_deadlines: |
        Bir ay sonra teslim edilecek bir makale son 48 saatte yazılır.
      project_management: |
        6 aylık bir zaman çizelgesine sahip bir proje 6 ay sürer; aynı kapsam 3 aylık bir son teslim tarihiyle de tamamlanabilir.
      meetings: |
        30 dakika yeterli olsa bile 1 saatlik bir toplantı saati doldurur.
      budgets: |
        Bir departman, gelecek yıl için aynı bütçeyi haklı çıkarmak üzere yıl sonuna kadar tam bütçesini harcar.
    real_world_implications: |
      Parkinson Yasası üretkenliği, kurumsal şişkinliği ve kaynak tahsisini etkiler. Yapay kısıtlamaların (daha kısa son teslim tarihleri, daha küçük ekipler) odaklanmayı ve verimliliği artırabileceğini öne sürer.
    professional_application:
      networking_and_relationship_building: |
        Kapsam kaymasını önlemek ve ivmeyi sürdürmek için işbirlikçi çalışmalar için net, sıkı son teslim tarihleri belirleyin.
      collaborative_learning_initiative: |
        Toplantılar ve projeler için zaman kutulama kullanın. Kaliteden ödün vermeden odaklanmayı iyileştirip iyileştirmediğini test etmek için daha kısa son teslim tarihlerini deneyin.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Tükenmişliğe veya düşük kaliteye neden olan keyfi olarak kısa son teslim tarihleri belirlemek.
      underresourcing: |
        Daha az zaman veya daha az insanın her zaman işe yarayacağını varsaymak - bazı görevler yeterli kaynak gerektirir.
      blame_shifting: |
        İşin gerçekten karmaşık olduğu durumlarda gecikmeleri "Parkinson Yasası"na atfetmek.
      ignoring_quality: |
        Sürdürülebilir sonuçlar pahasına yapay kısıtlamaları karşılamak için acele etmek.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Probabilistic Thinking
    quick_introduction: |
      Probabilistic thinking is the habit of reasoning in terms of likelihoods rather
      than certainties. Instead of "will this happen?" we ask "how likely is this?"
      It embraces uncertainty and uses it to make better decisions.
    one_liner: Think in likelihoods, not certainties—embrace uncertainty.
    try_this:
      - Replace "will it happen?" with "how likely is it?"
      - Consider multiple scenarios and assign rough probabilities.
      - Update your beliefs as new evidence arrives.
    ask_yourself:
      - Am I thinking in binary terms when probabilities would be more accurate?
      - What's the range of plausible outcomes?
    in_more_detail: |
      Most real-world outcomes are uncertain. Probabilistic thinking replaces binary
      yes/no with graduated beliefs. It involves considering multiple scenarios,
      assigning rough probabilities, and updating as evidence arrives. It's the
      opposite of overconfidence and black-and-white thinking.

      Key practices include: thinking in ranges, considering base rates, updating
      beliefs with evidence, and distinguishing between risk (known probabilities)
      and uncertainty (unknown probabilities). It improves calibration and
      decision quality.
    why_this_is_important: |
      Probabilistic thinking reduces overconfidence, improves forecasting, and
      leads to better decisions under uncertainty. It's essential for investing,
      strategy, and any domain where the future is uncertain.
    when_to_use:
      - decision-making
      - risk_assessment
      - investing
      - problem_solving
    how_can_you_spot_it:
      likelihood_language: |
        "Probably," "likely," "unlikely" rather than "will" or "won't."
      scenario_thinking: |
        Considering multiple possible futures with rough probabilities.
      calibration: |
        Predictions that match actual outcome frequencies over time.
      uncertainty_acknowledgment: |
        Explicitly stating what you don't know.
    examples:
      forecasting: |
        "I think there's a 60% chance we hit the deadline" rather than "We'll
        hit the deadline."
      investing: |
        "This has a 30% chance of 2x and a 70% chance of -50%" rather than
        "This will moon."
      strategy: |
        Planning for multiple scenarios (best, base, worst case) with rough
        probabilities.
      hiring: |
        "Based on the interview, I'd put 70% probability they'll succeed" rather
        than "They're a great hire."
    real_world_implications: |
      Probabilistic thinking improves calibration, reduces surprise, and enables
      better risk management. It's central to effective forecasting and
      decision-making under uncertainty.
    professional_application:
      networking_and_relationship_building: |
        Communicate in probabilities when appropriate—"I'm fairly confident" vs.
        "I'm certain." It builds trust by signaling epistemic humility.
      collaborative_learning_initiative: |
        Encourage teams to express uncertainty. Use prediction markets or
        calibration exercises to improve probabilistic judgment.
    how_can_this_be_misapplied:
      false_precision: |
        Assigning exact probabilities (e.g., 73%) when you can't be that precise.
      analysis_paralysis: |
        Never acting because "we can't be certain."
      hedging_overuse: |
        Qualifying everything to the point of uselessness.
      dismissing_intuition: |
        Overcorrecting to ignore strong gut feelings when they may carry valid
        information.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Pygmalion Etkisi
    quick_introduction: |
      Pygmalion etkisi (veya Rosenthal etkisi), daha yüksek beklentilerin
      performansta iyileşmeye yol açtığı olgusudur. Öğretmenler, yöneticiler veya
      başkaları biri hakkında daha fazlasını beklediğinde, o kişi daha iyi performans
      gösterme eğilimindedir. Beklentiler kendi kendini gerçekleştiren kehanetlere dönüşür.
    one_liner: Daha yüksek beklentiler daha iyi performansa yol açar—beklentiler gerçeği şekillendirir.
    try_this:
      - Yüksek ama ulaşılabilir beklentiler belirleyin; bunları net bir şekilde iletin.
      - Düşük beklentilerin birinin performansını sınırlayabileceği durumları fark edin.
      - Sorun: Örtük olarak ne bekliyorum—ve bu sonuçları nasıl etkileyebilir?
    ask_yourself:
      - Beklentilerim bu kişiye yardım mı ediyor yoksa onu mu sınırlıyor?
      - Daha yüksek beklentiler onlara nasıl davrandığımı—ve sonuçlarını değiştirir mi?
    in_more_detail: |
      Robert Rosenthal ve Lenore Jacobson, öğretmenlere bazı öğrencilerin akademik
      olarak "çiçek açacağı" konusunda yanlış bilgi verdiler. Rastgele seçilen bu
      öğrenciler diğerlerinden daha fazla gelişti. Öğretmenlerin beklentileri
      davranışlarını (daha fazla dikkat, daha sıcak geri bildirim) etkiledi, bu da
      öğrenci performansını etkiledi. Beklentiler gerçeği şekillendirir.

      Bunun tersi—düşük beklentilerin daha kötü performansa yol açması—bazen Golem
      etkisi olarak adlandırılır. Her ikisi de başkaları hakkındaki inançlarımızın
      onların sonuçlarını etkileyebileceğini gösterir. Bunun liderlik, eğitim ve
      ebeveynlik açısından derin etkileri vardır.
    why_this_is_important: |
      Pygmalion etkisini anlamak, beklentilerin gücünden yararlanmanıza yardımcı olur.
      Gerçekçi bir şekilde iletilen yüksek beklentiler performansı artırabilir. Düşük
      beklentiler kendi kendini gerçekleştiren bir başarısızlık yaratabilir. Başkaları
      hakkındaki inançlarınız önemlidir.
    when_to_use:
      - liderlik
      - ilişki_kurma
      - öğrenme
      - karar_verme
    how_can_you_spot_it:
      expectation_performance_link: |
        Daha fazlasını beklediklerimiz daha iyi performans gösterme eğilimindedir.
      differential_treatment: |
        Beklentilerimize göre insanlara farklı davranırız—genellikle
        bilinçsizce.
      self_fulfilling_prophecy: |
        Yetenek hakkındaki inançlar, yeteneği şekillendiren davranışı etkiler.
      teacher_student_dynamics: |
        Eğitimci beklentileri, farklı muamele yoluyla öğrenci sonuçlarını etkiler.
    examples:
      education: |
        Öğrencilerin başarılı olmasını bekleyen öğretmenler daha fazla destek verir;
        bu öğrenciler gelişir. Başarısızlığı bekleyen öğretmenler
        istemeden de olsa onu yaratabilir.
      workplace: |
        Yüksek performans bekleyen yöneticiler raporlarına daha fazla fırsat ve
        geri bildirim verir; performans artar.
      parenting: |
        Çocuklarının sorumlu olmasını bekleyen ebeveynler onlara daha fazla
        sorumluluk verir; onlar da bu sorumluluğun üstesinden gelir.
      stereotypes: |
        Stereotip tehdidi bunun tersidir—olumsuz beklentiler performansı
        bozabilir.
    real_world_implications: |
      Pygmalion etkisi eğitim, yönetim ve ilişkileri etkiler. Beklentileri—destekleyici
      bir şekilde yapıldığında—artırmanın sonuçları iyileştirebileceğini öne
      sürer. Ayrıca düşük beklentilerin yıkıcı olabileceği konusunda uyarır.
    professional_application:
      networking_and_relationship_building: |
        İnsanlar için yüksek beklentiler belirleyin—ve onları karşılamak için destek sağlayın. Potansiyele inanın. Beklentileriniz
        davranışınızı etkiler, bu da onların sonuçlarını etkiler.
      collaborative_learning_initiative: |
        Yüksek destekle yüksek beklenti kültürleri yaratın. İnsanları kendi kendini
        gerçekleştiren şekillerde "düşük performanslı" olarak etiketlemekten
        kaçının. Başarılı olmasını beklediklerinize yatırım yapın.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Destek olmadan karşılanması imkansız olan beklentiler belirlemek başarısızlığa ve cesaretin kırılmasına yol açar.
      blame_shifting: |
        Başarı için destek veya koşullar sağlamadığımızda "Beklentileri karşılamadılar."
      ignoring_constraints: |
        Sadece beklentiler yapısal engelleri aşmaz.
      pressure_without_support: |
        Kaynak veya destek olmadan yüksek beklentiler zararlı olabilir.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Regression to the Mean
    quick_introduction: |
      Regression to the mean is the statistical phenomenon where extreme outcomes tend to
      be followed by outcomes closer to the average. After an unusually good or bad
      result, the next result will likely be less extreme—not because of any causal
      intervention, but due to random variation.
    one_liner: Extreme outcomes tend to be followed by outcomes closer to average.
    try_this:
      - Don't attribute "regression" to your intervention—it often would have happened anyway.
      - After an extreme result, expect the next one to be less extreme.
      - Ask: Is this change due to what I did, or just regression to the mean?
    ask_yourself:
      - Am I crediting or blaming my intervention for what might be random variation?
      - Would this have happened without my action?
    in_more_detail: |
      If a student scores unusually high on one test, they'll likely score closer to
      their average on the next—not because they "got lazy" but because the first score
      was partly luck. The same applies to sports performance, stock returns, and
      business metrics. We often attribute the "regression" to something we did (e.g.,
      punishment or reward), when it would have happened anyway.

      Daniel Kahneman describes how flight instructors mistakenly concluded that
      praise worsened performance and criticism improved it—they were observing
      regression to the mean after extreme performances.
    why_this_is_important: |
      Understanding regression to the mean prevents misattributing causation. It
      helps you avoid overreacting to outliers and making changes based on noise.
      It's essential for evaluating interventions and performance.
    when_to_use:
      - decision-making
      - investing
      - risk_assessment
      - leadership
    how_can_you_spot_it:
      extreme_followed_by_average: |
        An unusually good or bad outcome is followed by one closer to the mean.
      spurious_causation: |
        Attributing the "recovery" or "decline" to an intervention when regression
        would have occurred anyway.
      overreaction_to_outliers: |
        Making policy or personal changes based on a single extreme data point.
      reward_punishment_confusion: |
        Believing that punishment "worked" when improvement was just regression.
    examples:
      sports: |
        A player has a career game, then returns to average—fans may blame "complacency."
      investing: |
        A stock has a great year, then reverts—investors may attribute the decline
        to bad management when it's partly reversion.
      performance_reviews: |
        An employee has a bad quarter, gets feedback, improves—the feedback may get
        credit when regression would have occurred regardless.
      medicine: |
        A patient feels worse, takes a treatment, improves—the treatment may get
        credit when some improvement was natural.
    real_world_implications: |
      Regression to the mean affects how we evaluate teachers, doctors, fund managers,
      and ourselves. It explains why "what goes up must come down" often holds
      statistically. Misunderstanding it leads to wasted interventions and false
      confidence in remedies.
    professional_application:
      networking_and_relationship_building: |
        Don't overinterpret a single bad interaction—it may be an outlier that will
        regress to the mean of the relationship.
      collaborative_learning_initiative: |
        When evaluating interventions (training, process changes), use control groups
        and multiple data points to distinguish effect from regression.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Assuming that any improvement after an intervention is "just regression"
        when real effects exist.
      underreacting: |
        Ignoring genuine problems because "it'll regress to the mean."
      statistical_illiteracy: |
        Confusing regression with a force that "corrects" outcomes—it's just
        probability.
      overconfidence: |
        Assuming the mean is stable when the underlying process may have changed.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Pembe Geriye Dönüş
    quick_introduction: |
      Pembe geriye dönüş, geçmişi olduğundan daha iyi hatırlama eğilimidir.
      Geçmiş deneyimleri zamanla daha olumlu hatırlarız, zorlukların üstünü
      örtüp iyiyi büyütürüz. "Eski güzel günler" genellikle hatırladığımız
      kadar iyi değildi.
    one_liner: Geçmişi olduğundan daha iyi hatırlarız - "eski güzel günler" o kadar da iyi değildi.
    try_this:
      - Geçmişle karşılaştırırken şunu sorun: O zamanlar gerçekten ne hissediyordum?
      - Anıları daha sonra gerçekle karşılaştırmak için bir günlük tutun.
      - Nostaljinin şu anki yargınızı nasıl renklendirdiğini fark edin.
    ask_yourself:
      - Geçmişi idealize mi ediyorum?
      - Geriye zaman yolculuğu yapabilseydim o zaman mutlu olur muydum?
    in_more_detail: |
      Geçmiş deneyimlerin olumlu yönlerini hatırlama ve olumsuzlukları unutma
      veya küçümseme eğilimindeyiz. Tatiller, işler ve ilişkiler nostaljide
      o anki hallerinden daha iyi hissettirir. Bu, gerçekçi olmayan karşılaştırmalara
      yol açabilir - şimdiyi idealize edilmiş bir geçmişle yargılarız.

      Pembe geriye dönüş, geçmiş seçimleri aynı (hatırlanan) sonuçları
      bekleyerek tekrar ettiğimizde karar verme süreçlerini etkiler.
      Ayrıca, nesnel olarak daha kötü olan dönemlere duyulan nostaljiyi de
      körükleyebilir. Hafızadaki olumsuzluk önyargısının tam tersidir.
    why_this_is_important: |
      Pembe geriye dönüşü tanımak, daha gerçekçi karşılaştırmalar yapmanıza
      ve idealize edilmiş anılara dayanarak geçmiş hataları tekrarlamaktan
      kaçınmanıza yardımcı olur. Ayrıca, mevcut ilerlemeye rağmen neden bazen
      geçmişi özlediğimizi de açıklar.
    when_to_use:
      - karar_verme
      - kariyer_hareketleri
      - ilişki_kurma
      - öğrenme
    how_can_you_spot_it:
      idealized_past: |
        "O zamanlar daha iyiydi" derken, nesnel ölçütler aksi yönde gösterebilir.
      selective_positive_memory: |
        Geçmiş deneyimlerden iyiyi hatırlayıp kötüyü unutmak.
      nostalgia_as_evidence: |
        Geçmiş seçimlerin doğru olduğuna kanıt olarak tatlı anıları kullanmak.
      present_undervaluation: |
        İdealize edilmiş bir geçmişle karşılaştırıldığı için şimdiki durum daha
        kötü hissedilir.
    examples:
      career: |
        "Eski işim harikaydı" derken, iyi sebeplerle ayrılmış olmanıza rağmen - hafıza
        hayal kırıklıklarının üstünü örtmüştür.
      relationships: |
        Geçmiş bir ilişki hakkında "Çok mutluydık" - sonunu getiren çatışmaları
        unutarak.
      childhood: |
        "Bizim zamanımızda çocuklar daha iyiydi" derken, pek çok nesnel ölçüt
        (sağlık, güvenlik, fırsat) iyileşmiş olsa bile.
      projects: |
        "O proje sorunsuz gitti" derken, aslında pek çok gecikme olmasına rağmen
        - süreci değil, sonucu hatırlarız.
    real_world_implications: |
      Pembe geriye dönüş, yaşam memnuniyetini, kariyer kararlarını ve
      nostalji güdümlü seçimleri etkiler. Geçmiş hataları tekrarlamaya
      veya gerçek dışı karşılaştırmalara yol açabilir. Ayrıca "eski güzel
      günlere dönüş" söyleminin çekiciliğini de açıklar.
    professional_application:
      networking_and_relationship_building: |
        Eski meslektaşlarla yeniden bağlantı kurmayı veya eski rollere dönmeyi
        düşünürken, nostaljiyi gerçeklikten ayırın. Ayrılma nedenlerinizi
        o zamanki gibi belgeleyin; geri dönmeden önce gözden geçirin.
      collaborative_learning_initiative: |
        Retrospektiflerde, neyin gerçekten olup bittiğini değerlendirmek için
        hafıza yerine çağdaş notları veya verileri kullanın. Hafıza zorlukların
        üstünü örter.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Her nostalji yanıltıcı değildir - bazen geçmiş bazı açılardan gerçekten
        daha iyiydi.
      invalidating_memories: |
        İnsanlara olumlu anılarının "yanlış" olduğunu söylemek, oysa gerçek
        öznel deneyimleri yansıtıyor olabilirler.
      overcorrection: |
        Geçmişin her zaman hatırladığımızdan daha kötü olduğunu varsaymak -
        bazen daha iyiydi.
      present_bias: |
        Pembe geriye dönüşü, mevcut düşüşle ilgili meşru endişeleri göz ardı
        etmek için bir bahane olarak kullanmak.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Belirginlik Yanılgısı
    quick_introduction: |
      Belirginlik yanılgısı, bir durumun en belirgin veya dikkat çekici
      yönlerine odaklanma, daha az belirgin ancak potansiyel olarak
      önemli faktörleri göz ardı etme eğilimidir. Öne çıkan şeyler,
      yargılarımızda orantısız bir dikkat ve ağırlık kazanır.
    one_liner: Öne çıkanlar orantısız dikkat çeker—incelikler göz ardı edilir.
    try_this:
      - Sorun: Belirgin olmadığı için göremediğim neler var?
      - Karar vermeden önce daha az belirgin faktörleri aktif olarak arayın.
      - Canlı veya dramatik bir unsurun yargınızı domine ettiğini fark edin.
    ask_yourself:
      - Belirgin olanı fazla mı, incelikli olanı az mı değerlendiriyorum?
      - Gözden kaçırıyor olabileceğim önemli faktörler neler?
    in_more_detail: |
      Belirgin bilgiler canlı, duygusal yüklü veya yakın zamanda
      karşılaşılan bilgilerdir. Dikkat çeker ve kararları olabileceğinden
      daha fazla etkiler. Göze çarpanları fazla, incelikli olanları az
      değerlendiririz. Dramatik bir olay veya canlı bir örnek,
      temsil edici olmasa bile düşüncemizi domine edebilir.

      Belirginlik yanılgısı, erişilebilirlik sezgisi (akla gelenler) ve
      yakınlık yanılgısı (yakın zamanda olanlar) ile örtüşür. Risk
      algısını, işe alımı ve stratejiyi etkiler. En görünür sorunlar
      ele alınır; görünmez olanlar ise kökleşir.
    why_this_is_important: |
      Belirginlik yanılgısını tanımak, apaçık olanın ötesine bakmanıza
      ve daha az görünür faktörleri göz önünde bulundurmanıza yardımcı olur.
      Risk değerlendirmesini, sorun teşhisini ve karar kalitesini iyileştirir.
      Önemli şeyler her zaman belirgin değildir.
    when_to_use:
      - karar_verme
      - sorun_çözme
      - risk_degerlendirme
      - liderlik
    how_can_you_spot_it:
      prominent_factor_dominance: |
        En dikkat çekici unsur kararı yönlendirir.
      overlooking_background: |
        Daha az görünür faktörler, önemlerine rağmen göz ardı edilir.
      vividness_overweighting: |
        Dramatik veya duygusal bilgiler orantısız ağırlık kazanır.
      visibility_bias: |
        Kolayca görebildiğimiz veya ölçebildiğimiz şeyler,
        göremediğimizden daha fazla dikkat çeker.
    examples:
      risk: |
        Bir uçak kazası belirgindir—uçuş riskini fazla tahmin ederiz. Araba
        kazaları toplu olarak daha az belirgindir—sürüş riskini az
        tahmin ederiz.
      hiring: |
        Bir adayın sunum becerileri belirgindir; takip yeteneği
        daha az görünür olabilir ancak eşit derecede önemlidir.
      strategy: |
        Rakip hamleleri belirgindir; kademeli piyasa değişimleri
        daha az dikkat çekici olsa da daha önemli olabilir.
      problems: |
        En gürültülü şikayet ele alınırken sistemik sorunlar
        fark edilmez.
    real_world_implications: |
      Belirginlik yanılgısı, nelere dikkat edildiğini, fon sağlandığını
      ve harekete geçildiğini etkiler. Nedenleri ele almak yerine
      belirtileri ele almaya ve kaynakların yanlış tahsis edilmesine yol
      açabilir. Kasıtlı olarak belirgin olmayan bilgileri aramak kararları
      iyileştirir.
    professional_application:
      networking_and_relationship_building: |
        İnsanları sadece en görünür özelliklerine göre yargılamayın.
        Daha az belirgin niteliklere bakın—güvenilirlik, tutarlılık,
        kendilerine yardım edemeyenlere nasıl davrandıkları.
      collaborative_learning_initiative: |
        Sorun çözmede açıkça "Neleri görmüyoruz?"
        ve "Daha az belirgin ama önemli olan nedir?" diye sorun.
        Belirgin olmayan sorunları ortaya çıkaran süreçler oluşturun.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Bazen belirgin olan önemlidir. Her şeyi apaçık olanı
        reddetmeyin.
      false_sophistication: |
        Gizli faktörlerin her zaman belirgin olanlardan daha
        önemli olduğunu varsaymak.
      analysis_paralysis: |
        O kadar çok belirgin olmayan faktör aramak ki, belirgin
        olanlara asla harekete geçememek.
      contrarianism: |
        Sadece farklı olmak için belirgin bilgiyi reddetmek.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Scarcity Bias
    quick_introduction: |
      Scarcity bias is the tendency to place higher value on things when they appear
      scarce or limited. "Limited time," "only 3 left," and "exclusive access" trigger
      urgency and desire, often overriding rational evaluation of whether we actually
      need or want the thing.
    one_liner: Scarcity amplifies perceived value—"limited" triggers urgency over rationality.
    try_this:
      - Ask: Would I want this if it weren't scarce? Strip away the urgency.
      - Pause before acting on "limited time" or "only X left" offers.
      - Notice when scarcity is driving your desire more than genuine value.
    ask_yourself:
      - Am I valuing this because it's scarce, or because I actually need it?
      - Would I make this decision without the scarcity framing?
    in_more_detail: |
      Scarcity amplifies perceived value. When something is rare or disappearing, we
      want it more—partly because scarcity can signal quality, and partly because
      loss aversion makes us fear missing out. Marketers and negotiators use scarcity
      to create urgency. The bias can lead to impulsive decisions, overspending, and
      poor prioritization.

      Scarcity also affects the cognitive bandwidth of those who are genuinely
      resource-constrained; poverty can reduce "mental bandwidth" for other decisions.
    why_this_is_important: |
      Recognizing scarcity bias helps you resist manipulative tactics and make more
      deliberate choices. It also explains why we overvalue limited editions and
      rush when we don't need to.
    when_to_use:
      - decision-making
      - negotiation
      - investing
      - risk_assessment
    how_can_you_spot_it:
      urgency_trigger: |
        "Limited time" or "only X left" creates disproportionate desire.
      fear_of_missing_out: |
        The possibility of losing access drives action more than the intrinsic value.
      impulsive_purchases: |
        Buying things because they're scarce rather than because you need them.
      artificial_scarcity: |
        Scarcity is manufactured (e.g., fake countdowns) rather than real.
    examples:
      sales: |
        "Only 2 left in stock" or "Sale ends tonight" triggers purchases that wouldn't
        happen without the urgency.
      auctions: |
        Bidders get caught up in winning and pay more than they planned due to
        competitive scarcity.
      exclusivity: |
        "Members-only" or "Invite-only" access increases perceived value.
      genuine_scarcity: |
        When resources are truly limited, people under scarcity stress make worse
        decisions (e.g., the poor, the time-pressed).
    real_world_implications: |
      Scarcity bias drives consumer behavior, negotiation outcomes, and policy
      responses. It can be used ethically (e.g., legitimate deadlines) or unethically
      (e.g., fake scarcity). Understanding it improves decision quality.
    professional_application:
      networking_and_relationship_building: |
        Be cautious when others create artificial scarcity ("I'm only taking a few
        clients"). Verify whether scarcity is real. When building relationships,
        genuine scarcity of your time can signal value—but overuse feels manipulative.
      collaborative_learning_initiative: |
        When creating urgency for initiatives, ensure it's legitimate. Fake deadlines
        erode trust when discovered.
    how_can_this_be_misapplied:
      manipulation: |
        Deliberately creating false scarcity to pressure others into decisions.
      impulsive_decisions: |
        Making important choices under artificial urgency when more time would improve
        outcomes.
      overvaluing_scarcity: |
        Assuming scarce things are always better—sometimes scarcity is arbitrary.
      exploiting_vulnerability: |
        Using scarcity tactics on people who are already under resource stress.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Second-Order Thinking
    quick_introduction: |
      Second-order thinking is the practice of considering the consequences of the
      consequences of your actions. First-order thinking asks "what happens if I
      do X?" Second-order thinking asks "and then what?" and "and then what after
      that?" It surfaces unintended effects.
    one_liner: Ask "and then what?"—consider the consequences of the consequences.
    try_this:
      - For any decision, ask "and then what?" at least twice.
      - Consider how others will respond to your action—and then to that response.
      - Notice when first-order effects reverse or complicate in the chain.
    ask_yourself:
      - Have I thought through the second-order (and third-order) effects?
      - What unintended consequences might I be missing?
    in_more_detail: |
      Howard Marks popularized the concept in investing. First-order: "This will
      go up." Second-order: "If it goes up, others will notice, more will buy,
      it will go up more—until it becomes overvalued and crashes." The chain of
      consequences often reverses or complicates the first-order effect.

      Second-order thinking is harder—it requires more mental effort and
      imagination. But it prevents many mistakes. Good strategists think several
      steps ahead and consider how others will respond.
    why_this_is_important: |
      Second-order thinking prevents unintended consequences and improves
      decision quality. It's essential for strategy, policy, and any domain
      where actions trigger reactions.
    when_to_use:
      - decision-making
      - problem_solving
      - strategy
      - risk_assessment
    how_can_you_spot_it:
      consequence_chains: |
        "If I do X, then Y will happen, then Z will happen..."
      reaction_anticipation: |
        Considering how others will respond to your action.
      unintended_effects: |
        Looking for side effects and feedback loops.
      reversals: |
        Second-order effects that contradict or reverse first-order effects.
    examples:
      investing: |
        "If everyone thinks this is a good investment, it's probably crowded—
        the edge may be gone."
      policy: |
        "If we subsidize X, demand increases, prices rise—does the subsidy
        actually help?"
      negotiation: |
        "If I push hard here, they'll retaliate there—what's the net effect?"
      incentives: |
        "If we reward this metric, people will game it—what will they actually
        do?"
    real_world_implications: |
      Second-order thinking is the hallmark of strategic thinking. It prevents
      policy failures, unintended incentives, and naive optimism. It
      distinguishes good from great decision-makers.
    professional_application:
      networking_and_relationship_building: |
        Before taking an action, ask "How will they respond? And how will I
        respond to that?" Consider the relationship dynamics, not just the
        immediate exchange.
      collaborative_learning_initiative: |
        In planning, run "and then what?" exercises. Map consequence chains.
        Identify unintended effects before they surface.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Thinking so many steps ahead that you never act.
      false_complexity: |
        Assuming second-order effects always dominate when first-order
        effects may be sufficient.
      overconfidence: |
        Believing you can predict long chains when uncertainty compounds.
      pessimism: |
        Always assuming the worst in the chain of consequences.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Batık Maliyet Yanılgısı
    quick_introduction: |
      Batık maliyet yanılgısı, gelecekteki beklenen getiriler yerine,
      zaten harcanan kaynaklar nedeniyle bir kararda yatırıma devam etme eğilimidir.
      "Bu kadar geldik" veya "Zaten çok yatırım yaptım" gibi ifadeler, kötüye daha iyi para atmaya yol açar.
    one_liner: Geçmiş yatırım kayboldu—sadece gelecekteki maliyetler ve faydalar önemlidir.
    try_this:
      - Soru: Bugün başlasaydım, bu yolu seçer miydim?
      - Önceden "sonlandırma kriterleri" belirleyin—duracağınız koşullar.
      - Marjinal kararı değerlendirin: buradan ileriye ne kazanır veya kaybederim?
    ask_yourself:
      - Gelecekteki değer nedeniyle mi devam ediyorum, yoksa geçmiş yatırımı haklı çıkarmak için mi?
      - Baştan benim durumumda olan bir dosta ne tavsiye ederdim?
    in_more_detail: |
      Batık maliyetler, geri kazanılamayan geçmiş maliyetlerdir. Rasyonel karar verme,
      bunları göz ardı eder—sadece gelecekteki maliyetler ve faydalar önemlidir. Ancak bizler
      duygusal olarak yatırımlarımıza bağlıyız. Keyif almadığımız yemeği bitirir,
      beğenmediğimiz filmde kalır ve artık mantıklı olmayan projelerle devam ederiz.
      Harcadığımızı "boşa gitmesin" isteriz, ancak devam etmek genellikle daha fazlasını boşa harcar.

      Yanılma, sadece para değil, zaman, çaba veya kimlik yatırdığımızda özellikle güçlüdür.
      Yanlış olduğumuzu kabul etmek maliyetli gelebilir, bu yüzden daha da ileri gideriz.
    why_this_is_important: |
      Batık maliyet yanılgısını tanımak, kayıpları kesmenize, gerektiğinde yön değiştirmenize ve
      geçmiş yatırım yerine gelecekteki değere dayalı kararlar almanıza yardımcı olur.
      Projeler, kariyerler ve ilişkiler için esastır.
    when_to_use:
      - karar_verme
      - yatırım
      - kariyer_hamleleri
      - risk_değerlendirmesi
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        Gelecekteki getiriler devam etmeyi haklı çıkarmadığında, "Şimdi duramayız—zaten X harcadık" demek.
      escalation_of_commitment: |
        Önceki yatırımı haklı çıkarmak veya "kurtarmak" için daha fazla yatırım yapmak.
      identity_investment: |
        Başarısızlığı kabul etmenin öz imajı tehdit edeceği için devam etmek.
      ignoring_marginal_analysis: |
        Kararları toplam maliyete, artımlı maliyet ve faydaya göre değil, buna göre vermek.
    examples:
      projects: |
        "Zaten 6 ay harcadık" diyerek başarısız bir projeye devam etmek,
        kayıpları kesmenin rasyonel olacağı durumlarda.
      relationships: |
        "5 yıldır birliktayız" diyerek bir ilişki içinde kalmak yerine
        geleceği değerlendirmek.
      careers: |
        Dereceye veya yıllarca süren deneyime yatırım yaptığınız için sevmediğiniz bir kariyerde kalmak.
      investments: |
        "Başa baş gelmek" için zararda olan bir hisseyi tutmak yerine daha iyi fırsatlara yeniden tahsis etmek.
    real_world_implications: |
      Batık maliyet yanılgısı, kaynakların boşa harcanmasına, başarısızlıkların uzamasına ve fırsatların kaçırılmasına neden olur.
      Bireyleri, kuruluşları ve hükümetleri etkiler.
      Bunun üstesinden gelmek, açık karar çerçeveleri gerektirir.
    professional_application:
      networking_and_relationship_building: |
        Geçmiş yatırım nedeniyle artık size hizmet etmeyen ilişkilere veya işbirliklerine yatırım yapmaya devam etmeyin.
        Geleceğe dönük değeri değerlendirin.
      collaborative_learning_initiative: |
        Projeler için "sonlandırma kriterleri" oluşturun—geçmiş yatırımdan bağımsız olarak duracağınız koşullar.
        Projeleri periyodik olarak "sıfırdan" merceğiyle gözden geçirin.
    how_can_this_be_misapplied:
      quitting_too_early: |
        Ödeme yapmak için daha fazla zamana ihtiyacı olan şeyleri terk etmek için "batık maliyet"i bahane olarak kullanmak.
      undervaluing_consistency: |
        Bazı taahhütler (örn. ilişkiler, itibar) saf marjinal analizin kaçırdığı süreklilikte değere sahiptir.
      cold_rationality: |
        Duygusal bağlılığı, gerçek değerleri yansıtabilecekken mantıksız olarak reddetmek.
      analysis_paralysis: |
        Cevap net iken devam edip etmeme konusunda aşırı düşünmek.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Survivorship Bias
    quick_introduction: |
      Survivorship bias is the logical error of focusing on people or things that
      "survived" a process while overlooking those that didn't. We see the winners
      and forget the losers, leading to overly optimistic conclusions about success
      and failure.
    one_liner: We see the winners and forget the losers—leading to overly optimistic conclusions.
    try_this:
      - Ask: Who failed doing something similar? What can we learn from them?
      - Seek out the "invisible" sample—those who didn't survive.
      - Notice when you're studying only success stories.
    ask_yourself:
      - Am I learning only from survivors?
      - What would the full picture look like if I included the failures?
    in_more_detail: |
      During WWII, statistician Abraham Wald corrected armor placement on bombers by
      analyzing where surviving planes were hit—and recommending armor where the
      *non*-surviving planes were hit, since those planes never returned. We naturally
      focus on the visible sample (survivors) and ignore the invisible (those who
      failed).

      Survivorship bias distorts our view of entrepreneurship, investing, careers,
      and history. We study successful companies and miss the thousands that failed
      doing similar things. We hear from the lucky and forget the unlucky.
    why_this_is_important: |
      Correcting for survivorship bias leads to more realistic expectations and
      better decisions. It helps you learn from failures, not just successes, and
      avoid copying strategies that only worked for the lucky few.
    when_to_use:
      - decision-making
      - investing
      - career_moves
      - learning
    how_can_you_spot_it:
      visible_success_stories: |
        We hear from successful people far more than from those who tried and failed.
      missing_failures: |
        The sample we observe excludes those who didn't "make it" and thus can't
        tell their stories.
      copying_survivors: |
        Assuming that what survivors did caused their success when it may have been
        luck or survivorship.
      overly_optimistic_models: |
        Estimates of success rates that ignore the denominator of attempts.
    examples:
      entrepreneurship: |
        "Drop out of college like Zuckerberg" ignores the many dropouts who didn't
        found billion-dollar companies.
      investing: |
        Studying only funds that survived ignores those that closed after poor
        performance, inflating historical returns.
      career_advice: |
        Successful people attribute success to hard work; we don't hear from those
        who worked hard and failed.
      historical_analysis: |
        Studying "great" companies that survived ignores the many that failed with
        similar strategies.
    real_world_implications: |
      Survivorship bias inflates perceived success rates, distorts role models, and
      leads to poor imitation. Correcting for it requires seeking out failure cases
      and understanding base rates.
    professional_application:
      networking_and_relationship_building: |
        When seeking advice, also seek out people who tried and failed—their
        perspectives are often more informative than survivors'.
      collaborative_learning_initiative: |
        Study failed projects and shut-down initiatives, not just successful ones.
        Conduct "failure post-mortems" to learn from what didn't work.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Overcorrecting to assume that success is always luck and effort doesn't matter.
      dismissing_success: |
        Refusing to learn from successful people because "survivorship bias."
      analysis_paralysis: |
        Being so focused on failure cases that you never take action.
      false_equivalence: |
        Treating survivor and non-survivor strategies as equally informative when
        context differs.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Zeigarnik Etkisi
    quick_introduction: |
      Zeigarnik etkisi, tamamlanmamış veya kesintiye uğramış görevleri tamamlanmış görevlerden daha iyi hatırlama eğilimidir. Tamamlanmamış görevler, zihnimizde aktif kalmalarını sağlayan psikolojik bir gerilim yaratır. Beynimiz tamamlanmamış olanlara tutunur.
    one_liner: Tamamlanmamış görevler zihnimizde kalır - beynimiz tamamlanmamış olanlara tutunur.
    try_this:
      - Görevleri zihinsel yükünüzden "kurtarmak" için tamamlanmayı kullanın - onları bitirin veya açıkça bırakın.
      - Üretken açık döngüler oluşturmak için işi yönetilebilir parçalara ayırın.
      - Tamamlanmamış işler üzerinde zihnen tekrarlandığınızı fark ettiğinizde - döngüyü kapatın veya bırakmaya karar verin.
    ask_yourself:
      - Zihnimde gerilim yaratan tamamlanmamış görevler nelerdir?
      - Bu açık döngüye değer mi, yoksa kapatabilir miyim?
    in_more_detail: |
      Bluma Zeigarnik, garsonların ödenmiş siparişlerden çok ödenmemiş siparişleri daha iyi hatırladığını gözlemledi - görev tamamlandığında hafızadan "salıverilmişti". Tamamlanmamış görevler, kapanış gerektiren açık bir döngü yaratır. Bu hem üretken odaklanmayı (bitirmek isteriz) hem de kaygıyı (tamamlanmamış olanlar hakkında düşünmeyi bırakamayız) tetikler.

      Etki pazarlamada (cliffhanger'lar, eksik hikayeler) ve üretkenlikte (birden fazla "açık döngü" oluşturmak için işi parçalara ayırmak) kullanılır. Tamamlanmamış işler üzerinde neden zihnen tekrarlandığımızı ve yapılacaklar listelerinin neden bunaltıcı hissedilebileceğini açıklar.
    why_this_is_important: |
      Zeigarnik etkisini anlamak, zihinsel yükü yönetmenize, ilgi çekici deneyimler tasarlamanıza ve kesintiyi stratejik olarak kullanmanıza yardımcı olur. Tamamlanmamış işler hakkında neden düşünmeyi bırakamadığımızı açıklar - ve bunun neden kullanılabileceğini veya zararlı olabileceğini.
    when_to_use:
      - problem_cozum
      - liderlik
      - ogrenme
      - karar_verme
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Tamamlanmamış görevler, tamamlanmış olanlardan daha fazla düşüncelere müdahale eder.
      better_recall_of_unfinished: |
        Kesintiye uğramış görevleri bitmiş olanlardan daha iyi hatırlarız.
      tension_for_closure: |
        Başlanmış olanı tamamlama rahatsızlığı veya dürtüsü.
      serial_dramas: |
        Cliffhanger'lar ve "devamı gelecek" ifadeleri etkiyi sömürür.
    examples:
      productivity: |
        Bir göreve başlamak, tamamlanmayı tetikleyen zihinsel bir gerilim yaratır - veya çok fazla açık döngü varsa kaygıya neden olur.
      marketing: |
        "3'ün 1. Bölümü" veya "Devamı gelecek" izleyicileri meşgul tutar ve geri dönmelerini sağlar.
      meetings: |
        Bir toplantıyı net sonraki adımlar olmadan bitirmek, katılımcıları çözülmemiş bir gerilimle baş başa bırakır.
      learning: |
        Cevaplanmamış sorular veya tamamlanmamış açıklamalar hafızada kalır ve daha fazla araştırmayı tetikler.
    real_world_implications: |
      Zeigarnik etkisi üretkenliği, katılımı ve zihinsel yükü etkiler. Odaklanma için kullanılabilir veya bunalmaya neden olabilir. Cliffhanger'ların çekiciliğini ve çok fazla açık görevin yükünü açıklar.
    professional_application:
      networking_and_relationship_building: |
        Konuşmalardan net sonraki adımlarla ayrılın - veya karşı tarafın takip etmesini istiyorsanız kasıtlı açık döngülerle. Çözülmemiş konular etkileşim yaratır.
      collaborative_learning_initiative: |
        Eğitimde Zeigarnik etkisini kullanın: öğrenenleri meşgul tutmak için molalardan önce sorunlar veya sorular sorun. Ancak insanların bunalmış hissetmelerine neden olacak kadar çok açık döngü oluşturmaktan kaçının.
    how_can_this_be_misapplied:
      overwhelm: |
        Çok fazla açık döngü - çok fazla tamamlanmamış görev - yaratmak kaygıya ve felce yol açar.
      manipulation: |
        Bağımlılık veya etkileşim yaratmak için kasıtlı olarak işleri çözülmemiş bırakmak.
      false_urgency: |
        Etkiyi, olmadığı yerde yapay bir aciliyet yaratmak için kullanmak.
      incomplete_work: |
        Gerçekten tamamlamadan "gerilim" yaratmak için çok şeye başlamak - dağınık bir çabaya yol açar.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Kısır Döngü Düşüncesi
    quick_introduction: |
      Kısır döngü düşüncesi, bir kişinin kazancının mutlaka diğerinin kaybı olması gerektiği—kaynakların sabit olduğu ve sizin için herhangi bir avantajın benim için dezavantaj anlamına geldiği inancıdır.
      Gerçekte, birçok durum pozitif toplamlıdır: her iki taraf da kazanabilir.
    one_liner: Sizin kazancınız benim kaybım olmak zorunda değil—birçok durum pozitif toplamlıdır.
    try_this:
      - Soru sorun: Pastayı büyütebilir miyiz? Bu gerçekten kısır döngü mü?
      - Rekabet varsaymadan önce işbirliği fırsatları arayın.
      - Durumu sabit pasta olarak ele aldığınızı fark ettiğinizde, aslında öyle olmadığını görün.
    ask_yourself:
      - Pastayı büyütebileceğimiz yerde sabit olduğunu mu varsayıyorum?
      - İşbirliği rekabetten daha fazla değer yaratır mı?
    in_more_detail: |
      Kısır döngü bir oyunda toplam sabittir—sizin kazancınız benim kaybımdır. Pozitif toplamlı
      durumlarda, işbirliği değer yaratır. Ticaret, yenilikçilik ve ilişki
      kurma genellikle pozitif toplamlıdır. Kısır döngü düşüncesi gereksiz
      rekabete, işbirliği için kaçırılan fırsatlara ve yıkıcı
      rekabete yol açar.

      Bu önyargı müzakerelerde, siyasette ve örgütsel dinamiklerde yaygındır.
      Pasta genellikle büyütülebilecekken sabit bir pasta varsayar. Kendini gerçekleştiren bir kehanet haline gelebilir: başkalarını düşman olarak görürseniz, onlar da düşman olurlar.
    why_this_is_important: |
      Kısır döngü düşüncesini tanımak, işbirliği ve
      değer yaratma fırsatları açar. Müzakereleri geliştirir, çatışmayı azaltır ve
      kazan-kazan sonuçlarını mümkün kılar. En iyi fırsatların çoğu pozitif toplamlıdır.
    when_to_use:
      - müzakere
      - liderlik
      - ilişki_kurma
      - karar_verme
    how_can_you_spot_it:
      fixed_pie_assumption: |
        Durumun her ikisinin de kazanmasına izin verebileceği durumlarda "Eğer onlar kazanırsa, ben kaybederim."
      competitive_ framing: |
        Durumları otomatik olarak biz-onlara karşı olarak çerçevelemek.
      envy_of_others_gains: |
        Başkalarının başarısını, sizinkini azalttığı varsayımıyla kıskanmak.
      missed_cooperation: |
        Herkesi fayda sağlayacak işbirliği fırsatlarını görememek.
    examples:
      negotiation: |
        Karşı taraf için daha iyi bir anlaşmanın sizin için daha kötü bir anlaşma anlamına geldiğini varsaymak—yaratıcı çözümlerin genellikle her iki taraf için de değeri artırdığı durumlarda.
      salary: |
        "Eğer iş arkadaşım zam alırsa, bana daha az kalır" varsayımı, bütçeler esnek olabilse veya yaratılan değere göre zamlar haklı çıkarılabilse bile.
      politics: |
        "Onların partisinin kazançları bizim kayıplarımızdır" varsayımı, birçok politika sonucunun birden fazla grubu faydalandırabileceği durumlarda.
      career: |
        "Onların terfisi benim için daha az fırsat anlamına gelir" varsayımı, örgütsel büyümenin herkes için daha fazla fırsat yaratabileceği durumlarda.
    real_world_implications: |
      Kısır döngü düşüncesi çatışmayı körükler, işbirliğini sınırlar ve kaçırılan fırsatlara neden olur. Ekonomi, ilişkiler ve
      yenilikçilikte sıklıkla yanlıştır. Pozitif toplamlı çerçevelemeye geçmek sonuçları iyileştirir.
    professional_application:
      networking_and_relationship_building: |
        Başkaları için değer yaratmanın yollarını arayın—onların başarısı size
        fırsatlar yaratabilir. Her iki tarafın da fayda sağladığı ilişkiler kurun.
      collaborative_learning_initiative: |
        Ekip hedeflerini pozitif toplamlı olarak çerçeveleyin: ortak başarı, pastayı büyütmek.
        İç rekabet yerine işbirliğini teşvik edin.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Bazı durumlar kısır döngülüdür (örneğin, tek bir terfi, sabit bir bütçe).
        Bunu görmezden gelmek naif olabilir.
      naive_cooperation: |
        Bazı aktörlerin gerçek anlamda
        düşmanca olduğu durumlarda herkesin işbirliği yapacağını varsaymak.
      undervaluing_competition: |
        Rekabet gelişimi tetikleyebilir; her rekabet yıkıcı değildir.
      exploitation: |
        Fayda sağlamayan başkalarından değer çekmek için "pozitif toplamlı" çerçeveleme kullanmak.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
