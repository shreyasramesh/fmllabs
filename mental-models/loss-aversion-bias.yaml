# Loss Aversion Bias
# Mental Model / Cognitive Bias - Example Entry

id: loss_aversion_bias
name: Loss Aversion Bias

quick_introduction: |
  Loss aversion is the tendency to prefer avoiding losses over acquiring equivalent gains.
  People feel the pain of losing roughly twice as strongly as they feel the pleasure of gaining.

one_liner: Losses feel roughly twice as painful as equivalent gains feel good.

try_this:
  - "Ask yourself: Am I overvaluing what I'd lose vs. what I'd gain?"
  - Reframe the choice as gains instead of losses and see if your view changes.
  - Notice when fear of losing is driving the decision more than the actual upside.

ask_yourself:
  - What would I choose if I were starting from zero?
  - Am I holding on because of what I'd lose, or because the future is genuinely better?

in_more_detail: |
  Developed by Daniel Kahneman and Amos Tversky, loss aversion describes how losses and gains
  are perceived asymmetrically. The psychological impact of losing $100 is typically much
  greater than the satisfaction of gaining $100. This bias influences decisions across
  finance, negotiations, and everyday choices, often leading to risk-averse behavior
  when potential losses are salient.

why_this_is_important: |
  Understanding loss aversion helps you recognize when fear of loss is driving decisions
  more than rational analysis. It explains why people hold onto losing investments, avoid
  necessary changes, and make suboptimal choices in negotiations and career decisions.

when_to_use:
  - decision-making
  - investing
  - career_moves
  - risk_assessment

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    Notice when the prospect of losing something triggers disproportionate anxiety
    or resistance compared to the upside of a potential gain.
  reluctance_to_change: |
    Hesitation to switch strategies, leave a job, or sell an asset even when
    objective analysis suggests it's the better option.
  framing_sensitivity: |
    Decisions shift dramatically based on whether options are framed as gains
    or losses, even when the outcomes are equivalent.
  overvaluing_what_you_have: |
    The endowment effect—placing higher value on things you own simply because
    you own them—often accompanies loss aversion.

examples:
  investing: |
    Holding onto a declining stock to "avoid realizing the loss" while missing
    better investment opportunities elsewhere.
  career: |
    Staying in an unfulfilling job because leaving feels like losing security,
    even when the new opportunity offers greater growth.
  negotiations: |
    Rejecting a fair offer because it's framed as "giving up" something,
    rather than "gaining" an agreement.
  product_design: |
    Free trials that convert to paid—users experience "losing" the service
    when the trial ends, which motivates subscription more than "gaining"
    a new service would.

real_world_implications: |
  Loss aversion shapes markets, policy, and individual behavior. It explains
  why insurance and warranties sell well, why people avoid beneficial change,
  and why negative news has outsized impact. Recognizing it can improve
  decision quality and reduce regret-driven choices.

professional_application:
  networking_and_relationship_building: |
    Be aware that people may resist ending unproductive relationships or
    collaborations due to loss aversion—they fear "losing" the connection.
    Frame new opportunities as gains rather than losses to reduce resistance.
  collaborative_learning_initiative: |
    When introducing new processes or tools, emphasize what the team gains
    rather than what they're "giving up." Loss-framed change initiatives
    often trigger stronger resistance.

how_can_this_be_misapplied:
  manipulation: |
    Exploiting loss aversion to pressure decisions—e.g., "limited time offers"
    or "don't miss out" framing that triggers fear of loss rather than
    genuine value assessment.
  misinterpreting_relationships: |
    Assuming someone's resistance to change is purely rational when it may
    be driven by loss aversion. Misattributing motives can damage trust.
  overcommitment: |
    Sunk cost fallacy—continuing to invest in a failing project because
    "we've already put so much in" rather than cutting losses.
  missed_opportunities_for_conflict_resolution: |
    Refusing to compromise because any concession feels like a loss,
    even when the alternative is a worse outcome for everyone.
  vulnerability_to_exploitation: |
    Being manipulated by others who frame choices to trigger loss aversion,
    such as sales tactics that emphasize what you'll "lose" if you don't act.
  reinforcing_negative_perceptions: |
    Focusing excessively on potential downsides can create a pessimistic
    outlook that becomes self-fulfilling, missing opportunities for growth.

