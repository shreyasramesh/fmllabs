# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Polish)
# Translated from mental-models-en.yaml

mental_models:
  - id: ambiguity_effect
    name: Efekt niejednoznaczności
    quick_introduction: |
      Efekt niejednoznaczności to tendencja do unikania opcji, gdy brakuje nam informacji
      o prawdopodobieństwie wyników. Wolimy znane ryzyko od nieznanego,
      nawet jeśli nieznane ryzyko może być lepsze. Sama niepewność jest odczuwana
      jako nieprzyjemna.
    one_liner: Wolimy znane ryzyko od nieznanego, nawet jeśli nieznane może być lepsze.
    try_this:
      - Zapytaj: Czy unikam tej opcji głównie z powodu niepewności, czy istnieje realny minus?
      - Skwantyfikuj to, co wiesz; czasami "niejednoznaczna" opcja ma jaśniejszą stronę.
      - Zauważ, kiedy domyślnie wybierasz znane tylko dlatego, że wydaje się bezpieczniejsze.
    ask_yourself:
      - Czy odrzucam coś, ponieważ jest niejednoznaczne, czy dlatego, że jest naprawdę gorsze?
      - Czego potrzebowałbym wiedzieć, aby czuć się komfortowo z niepewną opcją?
    in_more_detail: |
      W paradoksie Ellsberga ludzie wolą obstawiać urnę o znanych proporcjach
      kuli nad urną o nieznanych proporcjach, nawet gdy urna nieznana
      może oferować lepsze szanse. Nie lubimy niejednoznaczności – wolimy jasne
      (nawet jeśli złe) prawdopodobieństwo niż niejasne.

      Efekt wpływa na decyzje w inwestycjach, wyborach kariery i polityce.
      Może prowadzić do suboptymalnych wyborów, gdy unikamy opcji, które są niejednoznaczne,
      ale potencjalnie lepsze. Wyjaśnia również, dlaczego wolimy znane marki
      i znane ilości.
    why_this_is_important: |
      Rozpoznanie efektu niejednoznaczności pomaga unikać nadmiernego preferowania znanego
      i niedostatecznego preferowania niepewnego. Może prowadzić do utraty szans, gdy
      niejednoznaczność jest możliwa do opanowania. Wyjaśnia również, dlaczego przejrzystość i jasność
      redukują lęk.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - inwestowanie
      - zmiany_kariery
    how_can_you_spot_it:
      preference_for_known_risks: |
        Wybieranie opcji o jasnych (nawet jeśli gorszych) prawdopodobieństwach nad niejednoznacznymi.
      avoidance_of_uncertainty: |
        Odrzucanie opcji głównie dlatego, że "nie wiemy wystarczająco dużo".
      familiarity_over_optimality: |
        Preferowanie znanego nad potencjalnie lepszym nieznanym.
      information_seeking: |
        Chęć płacenia za informacje, które zmniejszają niejednoznaczność — nawet gdy
        nie zmienia to decyzji.
    examples:
      investing: |
        Preferowanie akcji krajowych nad zagranicznymi, ponieważ "rozumiemy je
        lepiej", pomimo korzyści z dywersyfikacji.
      employment: |
        Pozostanie w znanej pracy zamiast przyjmowania roli z niepewnym potencjalnym zyskiem.
      product_choice: |
        Wybieranie znanej marki zamiast nowej opcji o niepewnej jakości.
      medical: |
        Preferowanie leczenia ze znanymi skutkami ubocznymi zamiast leczenia o niepewnych
        wynikach, nawet gdy to drugie może być lepsze.
    real_world_implications: |
      Efekt niejednoznaczności kształtuje rynki, wybory kariery i politykę. Może być
      zmniejszony poprzez dostarczenie jaśniejszych informacji lub przez ponowne zdefiniowanie decyzji.
      Wyjaśnia również, dlaczego przejrzystość i komunikacja zmniejszają lęk.
    professional_application:
      networking_and_relationship_building: |
        Zmniejsz niejednoznaczność w relacjach: wyjaśniaj oczekiwania, komunikuj się
        wyraźnie i redukuj niepewność. Ludzie preferują znane sytuacje.
      collaborative_learning_initiative: |
        Przy wprowadzaniu zmian, zmniejsz niejednoznaczność — dostarcz jasnych informacji na temat
        tego, co się stanie, kiedy i dlaczego. Niejednoznaczność zwiększa opór.
    how_can_this_be_misapplied:
      manipulation: |
        Celowe tworzenie niejednoznaczności w celu kierowania ludzi w stronę preferowanych opcji.
      false_clarity: |
        Dostarczanie fałszywej pewności, gdy istnieje rzeczywista niepewność.
      overconfidence: |
        Zakładanie, że zmniejszenie niejednoznaczności zawsze poprawia decyzje — czasami
        niejednoznaczna opcja jest rzeczywiście lepsza.
      analysis_paralysis: |
        Oczekiwanie na doskonałe informacje przed podjęciem decyzji, gdy pewna niejednoznaczność
        jest nieunikniona.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
  - id: anchoring_bias
    name: Kotwica (Efekt zakotwiczenia)
    quick_introduction: |
      Błąd zakotwiczenia polega na nadmiernym poleganiu na pierwszej napotkanej informacji
      podczas podejmowania decyzji. Ta początkowa "kotwica" wpływa na kolejne oceny,
      nawet jeśli jest nieistotna lub arbitralna.
    one_liner: Pierwsza liczba, którą widzisz, kształtuje wszystkie kolejne.
    try_this:
      - Przed negocjacjami ustal swoją docelową liczbę i unikaj zakotwiczenia przez liczbę drugiej strony.
      - Szacując, podaj najpierw własną liczbę, zanim usłyszysz liczby innych.
      - Zapytaj: Czy myślałbym inaczej, gdybym najpierw zobaczył inną liczbę?
    ask_yourself:
      - Jaką liczbę lub ideę napotkałem najpierw – i czy wpływa ona na moją ocenę?
      - Czy wystarczająco koryguję od kotwicy, czy wciąż jestem zbyt blisko niej?
    in_more_detail: |
      W klasycznym eksperymencie osoby proszone o oszacowanie procentu narodów afrykańskich
      w ONZ podawały wyższe szacunki, jeśli wcześniej widziały wyższą liczbę (np. 65 zamiast 10).
      Kotwica – nawet jeśli była przypadkowa – wpływała na ich odpowiedzi. Zakotwiczenie wpływa na negocjacje,
      ceny, zatrudnianie i prognozowanie.

      Pierwsza napotkana liczba staje się punktem odniesienia. Odsuwamy się od niej, ale
      zazwyczaj niewystarczająco. Nawet gdy wiemy, że kotwica jest arbitralna, nadal może na nas wpływać.
      Eksperci nie są odporni.
    why_this_is_important: |
      Zrozumienie zakotwiczenia pomaga podejmować lepsze decyzje, skuteczniej negocjować
      i unikać manipulacji. Wyjaśnia również, dlaczego kolejność i sposób przedstawienia
      informacji mają tak duże znaczenie.
    when_to_use:
      - podejmowanie_decyzji
      - negocjacje
      - inwestowanie
      - ocena_ryzyka
    how_can_you_spot_it:
      first_number_dominance: |
        Pierwsza liczba w negocjacjach lub szacunkach w nieproporcjonalny sposób wpływa
        na wynik.
      insufficient_adjustment: |
        Korygując od kotwicy, ludzie zazwyczaj nie korygują wystarczająco.
      arbitrary_anchor_influence: |
        Nawet oczywiste nieistotne liczby (np. ostatnie cyfry numeru ubezpieczenia społecznego)
        mogą wpływać na szacunki.
      order_effects: |
        Kolejność prezentowania opcji zmienia wybory.
    examples:
      salary_negotiation: |
        Pierwsza podana liczba – czy to przez pracodawcę, czy kandydata – często stanowi kotwicę dla
        ostatecznej oferty.
      real_estate: |
        Cena ofertowa stanowi kotwicę dla percepcji wartości przez kupujących, nawet gdy jest celowo
        ustawiona na wysokim lub niskim poziomie.
      retail: |
        "Pierwotnie 99 zł, teraz 49 zł" używa pierwotnej ceny jako kotwicy, aby cena sprzedaży
        wydawała się okazją.
      forecasting: |
        Początkowe szacunki na spotkaniach planistycznych stanowią kotwicę dla kolejnych projekcji, nawet gdy
        pierwszy szacunek był zgadywanką.
    real_world_implications: |
      Zakotwiczenie kształtuje rynki, negocjacje i politykę. Może być wykorzystywane etycznie (np.
      ustalanie rozsądnych oczekiwań) lub nieetycznie (np. manipulacyjne ceny).
      Rozpoznanie go poprawia jakość decyzji.
    professional_application:
      networking_and_relationship_building: |
        W negocjacjach rozważ złożenie pierwszej oferty, aby ustalić kotwicę – lub bądź świadomy, gdy druga strona to robi.
      collaborative_learning_initiative: |
        Na spotkaniach bądź ostrożny, kto pierwszy wypowiada się na temat szacunków; rozważ
        zebranie niezależnych szacunków przed dyskusją.
    how_can_this_be_misapplied:
      manipulation: |
        Celowe używanie ekstremalnych kotwic do kierowania innych w stronę pożądanych wyników.
      overconfidence_in_anchors: |
        Zbyt duże zaufanie do własnego pierwszego szacunku bez ponownego przeglądu.
      ignoring_relevant_information: |
        Pozwalanie kotwicy na nadpisanie bardziej istotnych danych.
      exploitation: |
        Taktyki sprzedaży wykorzystujące zawyżone ceny "porównaj z", aby ceny rzeczywiste wydawały się
        rozsądne.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - availability_heuristic
  - id: availability_cascade
    name: Kaskada dostępności
    quick_introduction: |
      Kaskada dostępności to samowzmacniający się proces, w którym pewna
      idea zyskuje na wiarygodności dzięki powtarzanym publicznym dyskusjom.
      Im częściej jest ona omawiana, tym staje się bardziej "dostępna",
      tym więcej ludzi w nią wierzy, i tym częściej jest ona omawiana.
      Zbiorowe przekonanie nabiera rozpędu niezależnie od jego
      podstawowej prawdy.
    one_liner: Im częściej powtarza się jakąś ideę, tym bardziej wydaje się ona wiarygodna — niezależnie od dowodów.
    try_this:
      - Zapytaj: Czy to przekonanie jest powszechne, ponieważ jest prawdziwe, czy dlatego, że jest powtarzane?
      - Szukaj pierwotnych źródeł, zanim zaakceptujesz "to, co wszyscy wiedzą".
      - Zauważ, kiedy sama powtarzalność wpływa na twoje poczucie wiarygodności.
    ask_yourself:
      - Czy uwierzyłbym w to, gdybym usłyszał to tylko raz?
      - Czy mylę "wszyscy tak mówią" z "dowody to potwierdzają"?
    in_more_detail: |
      Timur Kuran i Cass Sunstein opisali, jak działają kaskady dostępności:
      dostępność informacji (jak często coś słyszymy) i wiarygodność
      (jak bardzo coś wydaje się prawdopodobne) wzajemnie się wzmacniają.
      Relacje medialne, media społecznościowe i dyskurs publiczny wzmacniają
      pewne idee. Gdy tylko idea osiągnie pewien próg dostępności, może
      szybko się rozprzestrzenić i stać się "wiedzą powszechną", nawet jeśli jest
      fałszywa lub przesadzona.

      Kaskady dostępności mogą być korzystne (rozpowszechniając ważne ostrzeżenia)
      lub szkodliwe (rozpowszechniając panikę lub dezinformację). Są napędzane
      przez heurystykę dostępności i dowód społeczny.
    why_this_is_important: |
      Rozpoznawanie kaskad dostępności pomaga ocenić, czy powszechne przekonanie
      odzwierciedla dowody, czy jedynie powtórzenia. Wyjaśnia, jak idee
      stają się wirusowe i jak zbiorowe przekonania mogą być błędne. Jest to
      niezbędne dla umiejętności korzystania z mediów i krytycznego myślenia.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - nauka
      - przywództwo
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Im częściej powtarza się jakąś ideę, tym bardziej wydaje się ona wiarygodna.
      media_amplification: |
        Relacje napędzają wiarę, która napędza więcej relacji.
      social_proof_belief: |
        "Wszyscy w to wierzą" staje się dowodem na wiarę.
      threshold_effects: |
        Gdy idea przekroczy próg widoczności, szybko się rozprzestrzenia.
    examples:
      health_scares: |
        Badanie sugeruje, że produkt jest niebezpieczny; media to nagłaśniają;
        publiczność go unika; pojawia się więcej relacji. Ryzyko może być
        przesadzone.
      financial_panic: |
        Rozchodzą się pogłoski o upadku banku; ludzie wycofują środki;
        run staje się samospełniający.
      social_media: |
        Narracja staje się wirusowa; powtarzalność zwiększa wiarę; wiara
        zwiększa udostępnianie. Prawda i wiralność mogą się rozchodzić.
      organizational: |
        Rozchodzi się pogłoska o zwolnieniach; narasta niepokój; zmienia się zachowanie;
        pogłoska zyskuje na wiarygodności dzięki reakcji.
    real_world_implications: |
      Kaskady dostępności kształtują opinię publiczną, politykę i rynki.
      Mogą one rozpowszechniać zarówno ważne prawdy, jak i niebezpieczne fałsz.
      Krytyczne myślenie wymaga rozróżnienia przekonań opartych na dowodach
      od przekonań napędzanych przez kaskadę.
    professional_application:
      networking_and_relationship_building: |
        Gdy jakaś idea jest "wszędzie", zapytaj: Czy jest prawdziwa, bo jest
        powtarzana, czy powtarzana, bo jest prawdziwa? Szukaj pierwotnych źródeł.
      collaborative_learning_initiative: |
        Twórz normy weryfikacji przed udostępnianiem. Zachęcaj do kwestionowania
        "tego, co wszyscy wiedzą". Rozróżniaj konsensus odzwierciedlający dowody
        od konsensusu odzwierciedlającego dostępność.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Czasami powszechne przekonanie jest poprawne. Nie zakładaj, że wszystkie
        popularne idee są kaskadami.
      conspiracy_thinking: |
        Używanie "kaskady dostępności" do odrzucania uzasadnionych
        obaw jako wykreowanych.
      false_skepticism: |
        Odrzucanie dobrze udokumentowanych idei, ponieważ są popularne.
      contrarianism: |
        Zakładanie, że cokolwiek jest powszechnie uważane, musi być błędne.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Heurystyka dostępności
    quick_introduction: |
      Heurystyka dostępności to tendencja do oceniania prawdopodobieństwa zdarzeń
      na podstawie tego, jak łatwo przychodzą nam na myśl ich przykłady. Jeśli jesteśmy
      w stanie łatwo przypomnieć sobie konkretne przypadki, zakładamy, że zdarzenie
      jest powszechne. Jaskrawe, niedawne lub emocjonalne przykłady dominują
      w naszych szacunkach prawdopodobieństwa.
    one_liner: To, co łatwo przychodzi na myśl, wydaje się bardziej prawdopodobne – nawet jeśli tak nie jest.
    try_this:
      - Zapytaj: Jaka jest częstość bazowa? Czy przeceniam jaskrawe lub niedawne przykłady?
      - Szukaj danych, gdy intuicja podpowiada „to wydaje się powszechne” lub „to wydaje się rzadkie”.
      - Zwróć uwagę, gdy jedna dramatyczna historia kieruje Twoją oceną ryzyka.
    ask_yourself:
      - Czy oceniam prawdopodobieństwo na podstawie łatwości przypominania sobie, a nie rzeczywistej częstotliwości?
      - Czy myślałbym inaczej, gdybym właśnie nie zobaczył tego nagłówka?
    in_more_detail: |
      Używamy skrótów myślowych do szacowania częstotliwości i prawdopodobieństwa. Jednym ze skrótów jest dostępność: co łatwo przychodzi na myśl? Katastrofy lotnicze są jaskrawe i szeroko relacjonowane – przeceniamy ich prawdopodobieństwo. Wypadki samochodowe są powszechne, ale mniej widoczne – nie doceniamy ich. Niedawność, jaskrawość i emocjonalny wpływ zwiększają dostępność.

      Heurystyka jest przydatna, gdy dostępność koreluje z rzeczywistą częstotliwością.
      Jednak media, osobiste doświadczenia i widoczność często zakłócają tę korelację.
      Obawiamy się rzadkich, ale jaskrawych ryzyk i ignorujemy powszechne, ale nudne.
    why_this_is_important: |
      Rozpoznawanie heurystyki dostępności pomaga poprawić szacunki prawdopodobieństwa,
      unikać nadmiernej reakcji na jaskrawe wiadomości i dokonywać lepszych ocen ryzyka.
      Wyjaśnia ona wiele systematycznych błędów w osądzie.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - inwestowanie
      - rozwiazywanie_problemow
    how_can_you_spot_it:
      vividness_dominance: |
        Dramatyczne lub emocjonalne przykłady nieproporcjonalnie wpływają na szacunki.
      recency_effect: |
        Niedawne zdarzenia wydają się bardziej prawdopodobne do ponownego wystąpienia.
      personal_experience_overweighting: |
        „Znam kogoś, kto...” kształtuje szacunki prawdopodobieństwa.
      media_distortion: |
        To, co jest relacjonowane, często nie odpowiada temu, co jest częste.
    examples:
      risk_perception: |
        Przecenianie ryzyka terroryzmu (jaskrawe, relacjonowane) i niedocenianie
        ryzyka chorób serca (częste, mniej dramatyczne).
      investing: |
        Niedawne wydarzenia rynkowe (załamanie, boom) dominują w oczekiwaniach na przyszłość.
      hiring: |
        Jedna jaskrawa historia o złym pracowniku z pewnej szkoły wpływa
        na ocenę wszystkich kandydatów z tej szkoły.
      health: |
        Diagnoza raka u przyjaciela sprawia, że rak wydaje się bardziej prawdopodobny, niż sugerują częstości bazowe.
    real_world_implications: |
      Heurystyka dostępności wpływa na zakup ubezpieczeń, priorytety polityczne
      i decyzje osobiste. Jest wykorzystywana przez media i marketerów. Korekta
      wobec niej wymaga szukania częstości bazowych i kwestionowania tego, co „przychodzi na myśl”.
    professional_application:
      networking_and_relationship_building: |
        Bądź świadomy, że jedno jaskrawe negatywne doświadczenie z osobą lub grupą może
        zakłócić Twój osąd. Szukaj częstości bazowych i wielu punktów danych.
      collaborative_learning_initiative: |
        Oceniając ryzyka lub możliwości, zadaj sobie pytanie „Jaka jest częstość bazowa?”
        i „Czy przeceniam jaskrawe przykłady?”. Używaj danych do korygowania szacunków opartych na dostępności.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Czasami dostępność jest informacyjna – niedawne doświadczenie może sygnalizować zmianę.
        Nie zakładaj, że wszystkie osądy oparte na dostępności są błędne.
      analysis_paralysis: |
        Nadmierne korygowanie do punktu ignorowania uzasadnionych sygnałów ostrzegawczych z
        jaskrawego doświadczenia.
      false_objectivity: |
        Zakładanie, że częstości bazowe są zawsze poprawne, gdy mogą być nieaktualne lub
        nieodpowiednie.
      manipulation: |
        Celowe tworzenie pewnych przykładów jaskrawymi, aby kierować sądami innych.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
  - id: barnum_effect
    name: Efekt Barnuma
    quick_introduction: |
      Efekt Barnuma (lub efekt Forera) to tendencja do akceptowania niejasnych, ogólnych
      opisów osobowości jako unikalnie trafnych. Horoskopy, wróżbici i testy osobowości
      używają stwierdzeń, które dotyczą prawie każdego – ale wierzymy, że są dla nas
      specyficzne. Widzimy siebie w tym, co ogólne.
    one_liner: Ogólne stwierdzenia wydają się osobiste, ponieważ dotyczą prawie każdego.
    try_this:
      - Pytanie: Czy ten opis może dotyczyć wielu osób? Sprawdź go na kimś innym.
      - Szukaj konkretnych, behawioralnych informacji zwrotnych zamiast ogólnych pochwał lub krytyki.
      - Zwróć uwagę, kiedy "spersonalizowane" spostrzeżenia wydają się zbyt dobre, by nie były dyskryminujące.
    ask_yourself:
      - Czy ta informacja zwrotna byłaby trafna, gdyby została udzielona obcej osobie?
      - Czy pamiętam trafne spostrzeżenia i zapominam o tych nietrafnych?
    in_more_detail: |
      Psycholog Bertram Forer przedstawił studentom identyczne "spersonalizowane" informacje zwrotne
      (np. "Potrzebujesz, aby inni cię lubili i podziwiali"), a oni ocenili je jako bardzo trafne.
      Stwierdzenia były na tyle niejasne, że mogły dotyczyć każdego. P.T. Barnum podobno powiedział:
      "Każdego dnia rodzi się jeden frajer" – efekt nazwany został na cześć jego umiejętności
      w przemawianiu do mas za pomocą ogólników, które wydawały się spersonalizowane.

      Efekt działa, ponieważ jesteśmy dobrzy w znajdowaniu osobistego znaczenia w niejednoznacznych
      stwierdzeniach. Pamiętamy trafne spostrzeżenia i zapominamy o nietrafnych.
      Jest to podstawa zimnego czytania i wielu produktów "personalnych".
    why_this_is_important: |
      Rozpoznanie efektu Barnuma pomaga w ocenie ocen osobowości,
      opieraniu się manipulacji i unikaniu nadmiernej interpretacji niejasnych informacji zwrotnych.
      Wyjaśnia, dlaczego horoskopy wydają się trafne i dlaczego niektóre "spersonalizowane"
      porady są ogólne.
    when_to_use:
      - podejmowanie_decyzji
      - nauka
      - ocena_ryzyka
      - budowanie_relacji
    how_can_you_spot_it:
      vague_accuracy: |
        Informacja zwrotna, która wydaje się osobista, ale może dotyczyć wielu osób.
      selective_fit: |
        Skupiamy się na tym, co pasuje i ignorujemy to, co nie pasuje.
      cold_reading: |
        Ktoś "czyta" cię za pomocą stwierdzeń, które w rzeczywistości są ogólne.
      personality_test_enthusiasm: |
        Bezrefleksyjne zaakceptowanie wyników oceny jako unikalnie wnikliwych.
    examples:
      horoscopes: |
        "Czasami wątpisz w swoje decyzje" wydaje się osobiste, ale dotyczy
        większości ludzi.
      fortune_telling: |
        Niejasne przepowiednie, które interpretujemy jako specyficzne dla naszej sytuacji.
      personality_tests: |
        Niektóre oceny wykorzystują stwierdzenia Barnuma i wydają się trafne, nie będąc dyskryminującymi.
      feedback: |
        Ogólna informacja zwrotna o wynikach, którą interpretujemy jako głęboko
        spersonalizowaną.
    real_world_implications: |
      Efekt Barnuma jest wykorzystywany w astrologii, niektórych formach coachingu i
      niskiej jakości ocenach. Może tworzyć fałszywą pewność siebie w
      nieprawidłowych narzędziach. Wyjaśnia również, dlaczego jesteśmy podatni na
      pochlebstwa i ogólne pozytywne informacje zwrotne.
    professional_application:
      networking_and_relationship_building: |
        Otrzymując informacje zwrotne, zadaj pytanie: "Czy to może dotyczyć wielu osób?"
        Szukaj konkretnych, behawioralnych informacji zwrotnych zamiast ogólnych pochwał lub krytyki.
        Bądź sceptyczny wobec "spersonalizowanych" spostrzeżeń, które wydają się zbyt dobre.
      collaborative_learning_initiative: |
        Korzystając z ocen, wybieraj zweryfikowane narzędzia o trafności dyskryminacyjnej.
        Unikaj instrumentów, które opierają się na stwierdzeniach Barnuma.
        Szkol ludzi w rozpoznawaniu niejasnych informacji zwrotnych.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Nie wszystkie spersonalizowane informacje zwrotne są Barnuma – niektóre są autentycznie
        specyficzne. Nie odrzucaj wszystkiego, co jest niejasne.
      invalidating_experience: |
        Mówienie komuś, że jego doświadczenie wglądu to "tylko Barnum",
        gdy dla tej osoby może ono mieć wartość.
      overcorrection: |
        Odrzucanie wszystkich ram osobowościowych, ponieważ niektóre używają stwierdzeń Barnuma.
      false_skepticism: |
        Zakładanie, że coś, co wydaje się trafne, musi być
        Barnuma – czasami rzeczy są trafne.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Błąd częstości bazowej
    quick_introduction: |
      Błąd częstości bazowej to tendencja do ignorowania ogólnych informacji statystycznych
      (częstości bazowych) na rzecz konkretnych, żywych informacji. Przeważamy znaczenie
      szczególnego przypadku i niedoceniamy wcześniejszego prawdopodobieństwa. Jedna przekonująca
      historia może przeważyć nad tym, co mówią liczby.
    one_liner: Przekonująca historia może przeważyć nad tym, co mówią liczby.
    try_this:
      - Zanim ocenisz przypadek, zapytaj: Jaka jest częstość bazowa dla tego rodzaju sytuacji?
      - Połącz konkretne dowody z wcześniejszym prawdopodobieństwem – nie ignoruj żadnego z nich.
      - Zauważ, kiedy jeden żywy przykład zagłusza statystyki.
    ask_yourself:
      - Czy przeważam znaczenie tego konkretnego przypadku i niedoceniam częstości bazowej?
      - Co mówiłby liczby, gdybym odłożył na bok przekonującą historię?
    in_more_detail: |
      Jeśli choroba dotyka 1% populacji, a test jest w 95% dokładny, pozytywny wynik
      często oznacza, że osoba nadal prawdopodobnie nie ma choroby – ponieważ częstość bazowa jest tak niska.
      Ale ignorujemy częstości bazowe i skupiamy się na "wyniku pozytywnym". Jesteśmy pod wpływem szczegółu zamiast statystyk.

      Błąd ten wpływa na diagnostykę medyczną, rekrutację, ocenę ryzyka i osądy prawne.
      Musimy łączyć częstości bazowe z dowodami specyficznymi dla przypadku, stosując
      rozumowanie bayesowskie – ale często tego nie robimy.
    why_this_is_important: |
      Korekta błędu częstości bazowej poprawia diagnostykę, ocenę ryzyka i jakość decyzji.
      Zapobiega nadmiernej reakcji na żywe przypadki i niedostatecznej reakcji na rzeczywistość statystyczną.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - rozwiazywanie_problemow
      - inwestowanie
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Częstości bazowe nie są uwzględniane w ocenach.
      vividness_over_statistics: |
        Pojedynczy przypadek lub historia dominuje nad danymi zbiorczymi.
      diagnostic_overweighting: |
        Przeważanie znaczenia nowych dowodów (np. wyniku testu) bez uwzględniania częstości bazowej.
      anecdote_override: |
        "Znam kogoś, kto..." przeważyło nad dowodami statystycznymi.
    examples:
      medical: |
        Pozytywny wynik testu na rzadką chorobę – częstość bazowa jest niska, więc pozytywny wynik
        często jest wynikiem fałszywie pozytywnym. Ignorujemy to i zakładamy, że osoba ma chorobę.
      hiring: |
        Kandydat świetnie wypada na rozmowie – ignorujemy częstości bazowe dotyczące tego, jak dobrze
        rozmowy kwalifikacyjne przewidują wyniki.
      risk: |
        Katastrofa samolotowa jest żywa w pamięci – przeceniamy ryzyko latania i niedoceniamy
        ryzyka jazdy samochodem, ignorując częstości bazowe.
      startup_investing: |
        Założyciel świetnie prezentuje – ignorujemy fakt, że większość startupów upada niezależnie od jakości prezentacji.
    real_world_implications: |
      Błąd częstości bazowej wpływa na decyzje medyczne, osądy prawne i strategie biznesowe.
      Przyczynia się do błędnej alokacji zasobów i złej oceny ryzyka. Myślenie bayesowskie to koryguje.
    professional_application:
      networking_and_relationship_building: |
        Oceniając ludzi, rozważ częstości bazowe: np. jak często występuje tego typu zachowanie?
        Nie pozwól, aby jedno żywe zdarzenie przeważyło nad szerszym wzorcem.
      collaborative_learning_initiative: |
        Podejmując decyzje, jasno określ i rozważ częstości bazowe przed włączeniem dowodów
        specyficznych dla przypadku. Szkól zespoły w rozumowaniu bayesowskim.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Ignorowanie silnych dowodów specyficznych dla przypadku, gdy częstości bazowe sugerują coś innego –
        czasami indywidualny przypadek jest wyjątkiem.
      stereotyping: |
        Wykorzystywanie częstości bazowych do wydawania niesprawiedliwych osądów o jednostkach.
      false_precision: |
        Stosowanie częstości bazowych z fałszywą precyzją, gdy są to jedynie przybliżone szacunki.
      dismissing_individuals: |
        "Statystyki mówią X", gdy osoba przed tobą może nie pasować do rozkładu.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Twierdzenie Bayesa
    quick_introduction: |
      Twierdzenie Bayesa opisuje, jak zaktualizować prawdopodobieństwo hipotezy, gdy
      otrzymamy nowe dowody. Formalizuje ono ideę, że przekonania powinny zmieniać
      się proporcjonalnie do tego, jak dobrze dowody je wspierają – nie wszystko albo
      nic, ale stopniowo.
    one_liner: Aktualizuj przekonania proporcjonalnie do tego, jak dobrze dowody je wspierają.
    try_this:
      - Zacznij od swojego apriorycznego przekonania; zapytaj, jak prawdopodobne byłyby dowody, gdybyś się mylił.
      - Aktualizuj stopniowo – nie przechodź z 0% do 100% na podstawie jednego punktu danych.
      - Rozważ alternatywne hipotezy: czy dowody pasowałyby również do nich?
    ask_yourself:
      - Jak bardzo te dowody faktycznie przesuwają prawdopodobieństwo?
      - Czy aktualizuję swoje przekonania, czy tylko potwierdzam to, co już myślałem?
    in_more_detail: |
      Twierdzenie mówi, że prawdopodobieństwo hipotezy przy danych dowodach jest równe
      apriorycznemu prawdopodobieństwu pomnożonemu przez prawdopodobieństwo wystąpienia
      dowodów przy danej hipotezie, podzielone przez prawdopodobieństwo wystąpienia dowodów. W praktyce: zacznij
      od swojego apriorycznego przekonania, zobacz, jak nowe dowody są zgodne z twoją
      hipotezą w porównaniu z alternatywami, i odpowiednio zaktualizuj.

      Myślenie bayesowskie przeciwdziała błędowi potwierdzenia, wymagając od ciebie
      rozważenia, jak prawdopodobne byłyby dowody, gdybyś się mylił. Jest to podstawa
      rozumowania probabilistycznego i naukowego aktualizowania.
    why_this_is_important: |
      Myślenie bayesowskie poprawia podejmowanie decyzji w warunkach niepewności, pomaga uniknąć nadmiernej pewności siebie i zapewnia ramy do uczenia się na podstawie dowodów.
      Jest to kluczowe dla diagnozowania, prognozowania i każdej dziedziny związanej z niepewnością.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiazywanie_problemow
      - ocena_ryzyka
      - uczenie_sie
    how_can_you_spot_it:
      prior_and_update: |
        Zaczynanie od bazowego przekonania i korygowanie go w oparciu o nowe dowody.
      likelihood_ratio_thinking: |
        Pytanie „Jak prawdopodobne są te dowody, jeśli mam rację w porównaniu z tym, jeśli się mylę?”
      incremental_updating: |
        Przekonania zmieniają się stopniowo wraz z dowodami, zamiast nagle się odwracać.
      base_rate_respect: |
        Przekonania aprioryczne (wskaźniki bazowe) mają znaczenie, a nie tylko ostatni punkt danych.
    examples:
      medical_diagnosis: |
        Pozytywny wynik testu na rzadką chorobę – aprioryczne przekonanie (niska częstość występowania) oznacza, że pozytywny wynik jest często fałszywie pozytywny. Bayes aktualizuje prawdopodobieństwo.
      forecasting: |
        Aktualizowanie prognoz w miarę napływu nowych danych, zamiast trzymania się początkowych szacunków.
      hiring: |
        Zaczynanie od wskaźników bazowych dotyczących dopasowania do stanowiska, a następnie aktualizowanie w oparciu o wyniki rozmowy kwalifikacyjnej.
      investing: |
        Aktualizowanie prawdopodobieństwa sukcesu firmy w miarę napływu nowych informacji (wyniki finansowe, wiadomości).
    real_world_implications: |
      Myślenie bayesowskie stanowi podstawę nowoczesnej sztucznej inteligencji, diagnostyki medycznej i wnioskowania naukowego. Koryguje błędy nieuwagi do wskaźników bazowych i błąd potwierdzenia. Jest to potężne narzędzie w każdej dziedzinie związanej z niepewnością.
    professional_application:
      networking_and_relationship_building: |
        Aktualizuj swoje przekonania na temat ludzi w oparciu o nowe dowody, zamiast trzymać się utrwalonych pierwszych wrażeń. Rozważ wskaźniki bazowe (np. jak powszechne jest takie zachowanie?) przy interpretacji działań.
      collaborative_learning_initiative: |
        Zachęcaj zespoły do wyraźnego formułowania przekonań apriorycznych przed dyskusjami, a następnie do aktualizowania ich w miarę przedstawiania dowodów. Redukuje to kotwiczenie i błąd potwierdzenia.
    how_can_this_be_misapplied:
      overprecision: |
        Przypisywanie dokładnych prawdopodobieństw, gdy niepewność jest wysoka.
      prior_rigidity: |
        Trzymanie się silnych przekonań apriorycznych i niewystarczające ich aktualizowanie w obliczu nowych dowodów.
      base_rate_tyranny: |
        Ignorowanie silnych dowodów, ponieważ wskaźniki bazowe sugerują inaczej – czasami dowody powinny dominować.
      false_sophistication: |
        Używanie języka bayesowskiego, aby brzmieć rygorystycznie, bez faktycznego przeprowadzania rozumowania.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: Efekt Bena Franklina
    quick_introduction: |
      Efekt Bena Franklina to zjawisko psychologiczne polegające na tym, że ludzie lubią kogoś bardziej
      po zrobieniu dla niego przysługi. Wbrew intuicji, że robimy przysługi ludziom, których lubimy,
      często zaczynamy lubić ludzi, dla których zrobiliśmy przysługi.
    one_liner: Zaczynamy lubić ludzi, którym zrobiliśmy przysługi – nasze postawy podążają za naszymi działaniami.
    try_this:
      - Jeśli chcesz poprawić relację, rozważ poproszenie o drobną przysługę.
      - Zauważ, kiedy zrobienie komuś przysługi zmienia Twoje uczucia wobec tej osoby.
      - Miej świadomość, że inni mogą Cię bardziej polubić po tym, jak im pomożesz.
    ask_yourself:
      - Czy zrobienie komuś przysługi zmieniło to, jak się wobec tej osoby czuję?
      - Czy racjonalizuję swój wysiłek, zwiększając moje uznanie dla tej osoby?
    in_more_detail: |
      Benjamin Franklin słynnie opisał, jak zdobyć przychylność rywalizującego ustawodawcy, prosząc o pożyczenie
      rzadkiej książki z jego biblioteki. Po tym, jak mężczyzna się zgodził, Franklin zwrócił ją z notatką z podziękowaniami.
      Relacja znacznie się poprawiła. Efekt ten sugeruje, że nasze postawy podążają za naszymi działaniami:
      kiedy inwestujemy wysiłek w pomoc komuś, racjonalizujemy ten wysiłek, zwiększając nasze pozytywne
      nastawienie do tej osoby.

      Teoria dysonansu poznawczego to wyjaśnia: kiedy robimy przysługę komuś, kogo nie lubimy lub wobec kogo
      jesteśmy neutralni, doświadczamy napięcia między naszym działaniem (pomoc) a naszą postawą (niechęć).
      Rozwiązanie tego napięcia poprzez polubienie tej osoby jest często łatwiejsze niż przyznanie, że działaliśmy
      wbrew naszym preferencjom.
    why_this_is_important: |
      Zrozumienie efektu Bena Franklina pomaga w strategicznym budowaniu relacji i rozpoznawaniu,
      kiedy Twoje własne uczucia mogą być pod wpływem wcześniejszych przysług. Wyjaśnia również,
      dlaczego proszenie o drobne przysługi może być skuteczniejsze niż ich oferowanie, gdy próbujesz
      poprawić relację.
    when_to_use:
      - budowanie_relacji
      - negocjacje
      - przywództwo
      - rozwiązywanie_konfliktów
    how_can_you_spot_it:
      liking_after_helping: |
        Zauważ, kiedy czujesz się cieplej wobec kogoś po tym, jak zrobiłeś dla niego przysługę, nawet jeśli
        wcześniej czułeś się neutralnie lub negatywnie.
      others_requesting_small_favors: |
        Gdy ktoś wielokrotnie prosi o drobne przysługi, może świadomie lub nieświadomie wykorzystywać
        ten efekt do budowania więzi.
      attitude_shift_post_investment: |
        Po zainwestowaniu czasu lub wysiłku w pomoc komuś, obserwuj, czy Twoja opinia o tej osobie
        nie uległa pozytywnej zmianie.
      reciprocal_relationship_dynamics: |
        Relacje, w których jedna osoba zrobiła wiele przysług, mogą wydawać się niezbalansowane pod względem
        uczuć, mimo że wydają się zbalansowane pod względem działań.
    examples:
      networking: |
        Poproszenie kolegi o opinię na temat szkicu, co sprawia, że czuje się on bardziej zaangażowany
        w Twój sukces i pozytywniej do Ciebie nastawiony.
      sales: |
        Sprzedawca prosi potencjalnego klienta o drobną przysługę (np. rekomendację lub przedstawienie),
        co zwiększa zaangażowanie i sympatię potencjalnego klienta.
      conflict_resolution: |
        Po nieporozumieniu, poproszenie drugiej strony o pomoc w czymś niezwiązanym może złagodzić napięcia
        i odbudować dobre relacje.
      mentoring: |
        Gdy starsza osoba prosi młodszą o wkład lub pomoc, młodsza osoba często czuje się bardziej doceniona
        i połączona.
    real_world_implications: |
      Efekt Bena Franklina wpływa na rekrutację, sprzedaż, dyplomację i codzienne dynamiki społeczne.
      Może być wykorzystywany etycznie do budowania mostów lub nieetycznie do manipulowania sympatią.
      Rozpoznanie go pomaga zrozumieć, dlaczego niektóre relacje stają się silniejsze po asymetrycznym
      udzielaniu przysług.
    professional_application:
      networking_and_relationship_building: |
        Przy budowaniu relacji rozważ poproszenie o drobne, rozsądne przysługi zamiast tylko ich oferowania.
        Akt pomocy tworzy zaangażowanie i pozytywne uznanie.
      collaborative_learning_initiative: |
        W zespołach, wzajemna pomoc członków (np. wzajemne recenzowanie, szkolenia krzyżowe) może wzmocnić
        spójność. Strukturuj współpracę tak, aby każdy zarówno dawał, jak i otrzymywał pomoc.
    how_can_this_be_misapplied:
      manipulation: |
        Celowe proszenie o przysługi wyłącznie w celu zyskania czyjejś sympatii, bez rzeczywistej potrzeby,
        może być postrzegane jako wyzysk, jeśli zostanie odkryte.
      overreliance_on_favors: |
        Zakładanie, że same przysługi naprawią zepsutą relację; niektóre konflikty wymagają bezpośredniej
        rozmowy i odpowiedzialności.
      asymmetric_exploitation: |
        Wielokrotne proszenie o przysługi bez wzajemności może przynieść odwrotny skutek i wzbudzić urazę.
      misattributing_motives: |
        Zakładanie, że czyjaś sympatia jest czysto szczera, gdy może być częściowo wynikiem przysług,
        które dla Ciebie zrobiła.
    related_content:
      - fundamental_attribution_error
      - halo_effect
  - id: bounded_rationality
    name: Ograniczona racjonalność
    quick_introduction: |
      Ograniczona racjonalność to idea, że ludzkie podejmowanie decyzji jest ograniczone dostępnymi informacjami,
      zdolnościami poznawczymi i czasem. Nie optymalizujemy; "zadowalamy się" – wybieramy opcje, które są wystarczająco dobre,
      a nie najlepsze możliwe.
    one_liner: Zadowalamy się – wybieramy wystarczająco dobre, nie optymalne.
    try_this:
      - Upraszczaj wybory, gdy tylko jest to możliwe; zbyt wiele opcji przytłacza ograniczoną racjonalność.
      - Ustal kryteria "wystarczająco dobre" z góry, aby uniknąć niekończącego się poszukiwania.
      - Zauważ, kiedy optymalizujesz poza punktem malejących przychodów.
    ask_yourself:
      - Czy próbuję znaleźć idealną opcję, gdy wystarczająco dobra by wystarczyła?
      - Jakie ograniczenia (czas, informacje, uwaga) ograniczają moje decyzje?
    in_more_detail: |
      Herbert Simon wprowadził tę koncepcję, aby zakwestionować klasyczne założenie ekonomiczne o racjonalnych aktorach
      posiadających doskonałe informacje. W rzeczywistości mamy ograniczoną uwagę, pamięć roboczą i czas. Używamy heurystyk
      i skrótów myślowych do podejmowania decyzji, które są "racjonalne" w ramach naszych ograniczeń, nawet jeśli nie są
      optymalne w idealnym sensie.

      Ograniczona racjonalność wyjaśnia, dlaczego nie zawsze wybieramy najlepszą opcję, dlaczego polegamy na zasadach kciuka
      i dlaczego kontekst i sposób prezentacji mają tak duże znaczenie. Jest to model opisowy tego, jak faktycznie decydujemy,
      a nie przepis, jak powinniśmy.
    why_this_is_important: |
      Zrozumienie ograniczonej racjonalności pomaga w projektowaniu lepszych procesów, upraszczaniu wyborów dla innych
      i ustalaniu realistycznych oczekiwań co do jakości decyzji. Wyjaśnia również, dlaczego "nieracjonalne" zachowanie
      jest często racjonalne w ramach ograniczeń.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiazywanie_problemow
      - przywodztwo
      - ocena_ryzyka
    how_can_you_spot_it:
      satisficing_behavior: |
        Ludzie wybierają pierwszą akceptowalną opcję, zamiast wyczerpująco porównywać.
      heuristic_reliance: |
        Decyzje są podejmowane przy użyciu zasad kciuka, a nie pełnej analizy.
      context_dependence: |
        Ta sama osoba podejmuje różne decyzje w zależności od sposobu prezentacji opcji.
      information_overload: |
        Gdy dostępnych jest zbyt wiele informacji, jakość decyzji może się zmniejszyć.
    examples:
      hiring: |
        Menedżer zatrudnia pierwszego kandydata, który spełnia wymagania, zamiast prowadzić niekończące się rozmowy,
        aby znaleźć "najlepszego" kandydata.
      consumer_choice: |
        Kupujący wybierają spośród pierwszych kilku opcji na półce, zamiast porównywać każdy produkt w sklepie.
      policy: |
        Głosujący używają przynależności partyjnej lub kilku kluczowych kwestii jako skrótów, zamiast analizować
        każde stanowisko w sprawie polityki.
      daily_routines: |
        Ludzie postępują zgodnie z nawykami i domyślnymi ustawieniami, zamiast optymalizować każdą decyzję na nowo.
    real_world_implications: |
      Ograniczona racjonalność kształtuje rynki, projektowanie polityki i zachowania organizacyjne.
      Szturchnięcia (nudges) i architektura wyboru działają, ponieważ uwzględniają nasze ograniczenia. Ignorowanie ich
      prowadzi do nadmiernie złożonych systemów, których ludzie nie potrafią efektywnie wykorzystywać.
    professional_application:
      networking_and_relationship_building: |
        Nie oczekuj, że inni przetworzą złożone kompromisy w czasie rzeczywistym. Upraszczaj wybory
        i dostarczaj jasne domyślne opcje.
      collaborative_learning_initiative: |
        Projektuj procesy, które działają z ograniczoną racjonalnością: ograniczaj wybory, dostarczaj
        domyślne opcje i używaj list kontrolnych do złożonych decyzji.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Projektowanie procesów, które zakładają nieograniczoną pojemność poznawczą, prowadzące do
        zmęczenia decyzyjnego i złych wyników.
      blaming_irrationality: |
        Odrzucanie wyborów innych jako nieracjonalnych bez uwzględniania ich ograniczeń.
      exploitation: |
        Celowe przytłaczanie ludzi złożonością w celu skierowania ich ku pożądanym wynikom.
      perfectionism: |
        Oczekiwanie optymalnych decyzji, gdy zadowolenie się jest często racjonalnym podejściem.
    related_content:
      - framing_effect
      - availability_heuristic
  - id: bystander_effect
    name: Efekt świadka
    quick_introduction: |
      Efekt świadka to tendencja, zgodnie z którą jednostki są mniej skłonne
      do udzielenia pomocy, gdy obecne są inne osoby. Im więcej świadków,
      tym mniejsze prawdopodobieństwo, że jakakolwiek osoba zareaguje.
      Odpowiedzialność jest rozproszona; zakładamy, że ktoś inny pomoże.
    one_liner: Im więcej osób jest obecnych, tym mniejsze prawdopodobieństwo, że jakakolwiek osoba zareaguje.
    try_this:
      - W sytuacjach awaryjnych przypisuj odpowiedzialność bezpośrednio: Ty, zadzwoń pod 112.
      - Nie zakładaj, że ktoś inny pomoże – działaj lub deleguj zadanie wprost.
      - Zwracaj uwagę, kiedy czekasz, aż inni zareagują pierwsi.
    ask_yourself:
      - Czy rozpraszam odpowiedzialność, ponieważ obecne są inne osoby?
      - Czy zareagował(a)bym inaczej, gdybym był(a) sam(a)?
    in_more_detail: |
      Po morderstwie Kitty Genovese (chociaż historia była częściowo zmitologizowana)
      badacze odkryli, że obecność innych zmniejsza chęć pomocy. Szukamy
      wskazówek u innych – jeśli nikt nie działa, interpretujemy to jako „brak potrzeby działania”.
      Doświadczamy również rozproszenia odpowiedzialności: gdy obecnych jest wiele osób,
      każda czuje się mniej osobiście odpowiedzialna. Może wystąpić ignorancja pluralistyczna:
      każdy myśli, że coś jest nie tak, ale nikt nie działa, ponieważ nikt inny nie działa.

      Efekt jest najsilniejszy, gdy sytuacja jest niejednoznaczna i gdy
      świadkowie się nie znają. Można go przezwyciężyć przez bezpośrednie
      przypisanie odpowiedzialności („Ty, zadzwoń pod 112”).
    why_this_is_important: |
      Zrozumienie efektu świadka pomaga podejmować działania, gdy inni tego nie robią,
      oraz projektować systemy, które go przezwyciężają. Jeśli jesteś w tarapatach, wskaż
      jedną osobę. Jeśli jesteś świadkiem, nie czekaj, aż inni zareagują.
    when_to_use:
      - przywództwo
      - budowanie_relacji
      - rozwiązywanie_konfliktów
      - podejmowanie_decyzji
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        „Ktoś inny to zrobi” gdy jest wiele osób.
      pluralistic_ignorance: |
        Każdy myśli, że potrzebne jest działanie, ale nikt nie działa, bo
        nikt inny nie działa.
      social_proof_inaction: |
        Brak działania ze strony innych jest interpretowany jako „brak potrzeby działania”.
      audience_inhibition: |
        Strach przed tym, że wygląda się głupio lub przesadnie reaguje, powstrzymuje od działania.
    examples:
      emergency: |
        Osoba upada; przy wielu świadkach każdy jest mniej skłonny
        do wezwania pomocy.
      workplace: |
        Każdy widzi problem, ale nikt go nie zgłasza – każdy zakłada,
        że zrobi to ktoś inny.
      harassment: |
        Świadkowie nękania nie interweniują, każdy myśląc,
        że inni zareagują.
      meetings: |
        Zły pomysł pozostaje niezakwestionowany, ponieważ każdy zakłada,
        że ktoś inny się odezwie.
    real_world_implications: |
      Efekt świadka może mieć tragiczne konsekwencje w sytuacjach awaryjnych
      i pozwala problemom trwać w organizacjach. Jego przezwyciężenie
      wymaga bezpośredniego przypisania odpowiedzialności i norm, które zachęcają do
      interwencji.
    professional_application:
      networking_and_relationship_building: |
        Gdy potrzebujesz pomocy, poproś konkretną osobę. Kiedy widzisz
        coś złego, działaj – nie zakładaj, że zrobią to inni. Twórz normy,
        w których oczekuje się i nagradza się zabieranie głosu.
      collaborative_learning_initiative: |
        Szkol ludzi z rozpoznawania efektu świadka i interweniowania.
        Stosuj zasadę „jeśli coś widzisz, powiedz o tym” i przypisuj jasne
        role. Nagradzaj tych, którzy jako pierwsi się odezwą.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Surowe ocenianie jednostek, gdy efekt jest potężną siłą sytuacyjną – skup się na zmianie sytuacji.
      false_assumption: |
        Zakładanie, że ktoś zawsze pomoże, jeśli obecna jest wystarczająca liczba osób – często jest odwrotnie.
      overcorrection: |
        Uczynienie wszystkich odpowiedzialnymi tak, aby nikt nie był – rozproszenie
        może nadal występować.
      individualizing: |
        Traktowanie efektu świadka jako wady charakteru, a nie zjawiska sytuacyjnego.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Krąg kompetencji
    quick_introduction: |
      Krąg kompetencji to model mentalny, który nakazuje znać granice własnej
      ekspertyzy i trzymać się ich przy podejmowaniu ważnych decyzji. Warren Buffett
      i Charlie Munger kładą nacisk na wiedzę o tym, czego się nie wie.
    one_liner: Poznaj granice swojej wiedzy — i trzymaj się ich, gdy jest to ważne.
    try_this:
      - Określ, gdzie masz prawdziwą wiedzę, a gdzie zgadujesz.
      - Poza swoim kręgiem, szukaj rady lub deleguj zadania.
      - Bądź szczery: czy prawdziwy ekspert zgodziłby się z twoją oceną w tym miejscu?
    ask_yourself:
      - Czy jestem w swoim kręgu kompetencji, czy zgaduję?
      - Kiedy ostatnio przyznałem „nie wiem” w tej dziedzinie?
    in_more_detail: |
      Każda osoba ma obszary, w których posiada prawdziwą wiedzę — gdzie potrafi oceniać
      informacje, wykrywać błędy i podejmować wiarygodne oceny. Poza tym kręgiem, jest
      ona podatna na te same uprzedzenia i błędy, co każdy inny. Kluczem jest szczera
      samoocena: gdzie jesteś naprawdę kompetentny, a gdzie zgadujesz?

      Krąg może się rozszerzać dzięki celowemu uczeniu się, ale wymaga to pokory,
      aby rozpoznać jego obecne granice. Działanie poza swoim kręgiem zwiększa
      ryzyko kosztownych błędów, zwłaszcza gdy stawka jest wysoka.
    why_this_is_important: |
      Pozostawanie w swoim kręgu kompetencji zmniejsza kosztowne błędy i poprawia
      jakość decyzji. Pomaga również wiedzieć, kiedy szukać rady, delegować zadania
      lub powstrzymać się od działania. Nadmierna pewność siebie poza swoim kręgiem
      jest głównym źródłem porażek.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - decyzje_zawodowe
      - ocena_ryzyka
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Czy potrafisz wyjaśnić granice swojej wiedzy w danej dziedzinie? Czy wiesz, czego
        nie wiesz?
      knowing_when_to_defer: |
        Rozpoznawanie sytuacji, w których należy szukać fachowej opinii, zamiast
        decydować samodzielnie.
      consistent_track_record: |
        Wewnątrz swojego kręgu, twoje oceny z czasem zazwyczaj się potwierdzają; poza nim,
        nie.
      calibration: |
        Twoja pewność siebie w danej dziedzinie odpowiada twoim rzeczywistym wynikom w tej
        dziedzinie.
    examples:
      investing: |
        Buffett unika akcji technologicznych, ponieważ twierdzi, że są one poza jego kręgiem
        kompetencji — nie potrafi ich wiarygodnie ocenić.
      career: |
        Specjalista, który pozostaje w swojej dziedzinie, w przeciwieństwie do kogoś, kto
        przyjmuje „rozciągającą” rolę w niepowiązanej dziedzinie.
      hiring: |
        Wiedza, kiedy polegać na własnej ocenie, a kiedy zaangażować specjalistów do ról
        technicznych.
      advice_giving: |
        Odmowa wydawania opinii na tematy wykraczające poza własną wiedzę, zamiast
        zgadywania.
    real_world_implications: |
      Krąg kompetencji jest kluczowy dla inwestowania w wartość i sukcesu zawodowego.
      Ignorowanie go prowadzi do nadmiernej pewności siebie, nieudanych przedsięwzięć
      i złych rad. Rozszerzanie kręgu wymaga celowego wysiłku i szczerego feedbacku.
    professional_application:
      networking_and_relationship_building: |
        Buduj relacje z ludźmi, których kręgi kompetencji uzupełniają twoje. Wiedz, kiedy
        przedstawić innych, zamiast samemu odpowiadać.
      collaborative_learning_initiative: |
        Twórz zespoły z nakładającymi się i uzupełniającymi się kręgami. Zachęcaj ludzi
        do sygnalizowania, gdy działają poza swoją kompetencją.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Nigdy nie wychodzenie poza swój krąg może ograniczać rozwój i naukę.
      false_modesty: |
        Twierdzenie o bardzo małym kręgu, aby uniknąć odpowiedzialności lub trudnych decyzji.
      gatekeeping: |
        Używanie „kręgu kompetencji” do odrzucania argumentów innych bez ich analizy.
      stagnation: |
        Traktowanie kręgu jako stałego, a nie jako czegoś, co może się rozszerzać z wysiłkiem.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: confirmation_bias
    name: Confirmation Bias
    quick_introduction: |
      Confirmation bias is the tendency to seek, interpret, and remember information
      in ways that confirm our existing beliefs. We give more weight to supporting
      evidence and discount or dismiss evidence that contradicts our views. We
      ask questions that confirm rather than test our hypotheses.
    one_liner: We seek and remember what confirms our beliefs; we discount what contradicts them.
    try_this:
      - Ask: What would prove me wrong? Actively seek disconfirming evidence.
      - Notice when you're giving more weight to supporting than contradicting information.
      - Consider the opposite view as seriously as your own.
    ask_yourself:
      - Am I testing my hypothesis or just confirming it?
      - When did I last change my mind based on new evidence?
    in_more_detail: |
      We're not neutral processors of information. We seek confirmation, interpret
      ambiguity as support, and remember hits more than misses. We surround ourselves
      with like-minded people and media. We ask "Why am I right?" rather than
      "What would prove me wrong?" This makes us overconfident and slow to update.

      Confirmation bias is one of the most pervasive and well-documented biases.
      It affects science, politics, relationships, and business. Overcoming it
      requires deliberate effort and structured processes.
    why_this_is_important: |
      Recognizing confirmation bias is essential for good decision-making and
      learning. It helps you seek disconfirming evidence, consider alternative
      hypotheses, and update your beliefs when warranted. It's the foundation
      of scientific thinking.
    when_to_use:
      - decision-making
      - learning
      - problem_solving
      - risk_assessment
    how_can_you_spot_it:
      seeking_support: |
        Looking for evidence that confirms rather than tests your view.
      asymmetric_interpretation: |
        Interpreting ambiguous evidence as support for your position.
      discounting_disconfirming: |
        Dismissing or minimizing evidence that contradicts your beliefs.
      selective_exposure: |
        Consuming only information from sources that agree with you.
    examples:
      hiring: |
        Forming an early positive impression and then asking questions that
        confirm the candidate is great.
      investing: |
        After buying a stock, seeking positive news and dismissing negative
        analysis.
      relationships: |
        Interpreting a partner's actions through a lens that confirms your
        view of them (good or bad).
      politics: |
        Accepting information from your side uncritically and rejecting
        equivalent information from the other side.
    real_world_implications: |
      Confirmation bias perpetuates false beliefs, fuels polarization, and
      causes costly mistakes. It's the enemy of good science and good
      decision-making. Overcoming it requires deliberate disconfirmation
      seeking.
    professional_application:
      networking_and_relationship_building: |
        When forming opinions about people, actively seek disconfirming
        evidence. Ask "What would change my mind?" and look for it.
      collaborative_learning_initiative: |
        Use devil's advocate, red teams, and pre-mortems to surface
        disconfirming perspectives. Reward people who challenge prevailing
        views with good evidence.
    how_can_this_be_misapplied:
      false_balance: |
        Treating all views as equally valid when evidence strongly supports
        one side.
      excessive_skepticism: |
        Dismissing all evidence as "confirmation bias" when some beliefs
        are well-supported.
      contrarianism: |
        Adopting the opposite view just to avoid confirmation bias—when
        the original view may be correct.
      analysis_paralysis: |
        Never committing to a view because "we might be biased."
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Klątwa wiedzy
    quick_introduction: |
      Klątwa wiedzy to trudność w wyobrażeniu sobie, jak to jest czegoś nie wiedzieć, gdy już się to wie. Eksperci mają trudności z nauczaniem początkujących, ponieważ nie potrafią odtworzyć perspektywy początkującego. Gdy już coś wiesz, zapominasz, jak to było tego nie wiedzieć.
    one_liner: Gdy już coś wiesz, zapominasz, jak to było tego nie wiedzieć.
    try_this:
      - Wyjaśniając, zacznij od podstawowych zasad – załóż, że Twoi odbiorcy nic nie wiedzą.
      - Poproś początkującego, aby wyjaśnił to z powrotem; jego niezrozumienie ujawni Twoje ślepe punkty.
      - Zwróć uwagę, kiedy pomijasz kroki lub używasz żargonu, którego inni mogą nie znać.
    ask_yourself:
      - Czy zakładam, że inni mają ten sam kontekst co ja?
      - Czy ktoś bez mojego zaplecza to zrozumie?
    in_more_detail: |
      W klasycznym eksperymencie osoby, które znały odpowiedź na zagadkę, stukały rytm piosenki i oczekiwały, że inni ją odgadną – przeszacowały, jak oczywista jest. Stukający nie potrafili „od-słyszeć” piosenki w swoich głowach.
      Wiedza jest „lepka”; trudno jest symulować ignorancję.

      Klątwa dotyka nauczania, komunikacji, projektowania produktów i przywództwa.
      Zakładamy, że inni mają ten sam kontekst co my. Używamy żargonu. Pomijamy
      kroki. Dziwimy się, gdy ludzie „nie łapią”.
    why_this_is_important: |
      Rozpoznanie klątwy wiedzy poprawia nauczanie, komunikację i projektowanie produktów. Pomaga spotkać ludzi tam, gdzie są, a nie tam, gdzie jesteś Ty. Jest niezbędna do skutecznego przekazywania wiedzy.
    when_to_use:
      - nauczanie
      - przywództwo
      - rozwiązywanie_problemów
      - budowanie_relacji
    how_can_you_spot_it:
      obvious_to_you: |
        „To oczywiste”, gdy jest oczywiste tylko dlatego, że znasz odpowiedź.
      jargon_use: |
        Używanie terminów, których odbiorcy nie znają, bez ich definiowania.
      skipped_steps: |
        Zakładanie, że inni uzupełnią to, co pominąłeś.
      frustration_with_learners: |
        „Jak oni tego nie widzą?” gdy brakuje im Twojego kontekstu.
    examples:
      teaching: |
        Profesor matematyki pomija kroki, które są dla niego „oczywiste”, ale
        kluczowe dla studentów.
      product_design: |
        Projektanci tworzą interfejsy, które mają sens dla nich, ale mylą
        nowych użytkowników.
      onboarding: |
        Doświadczeni pracownicy zapominają, czego nowi pracownicy nie wiedzą i
        zapewniają niewystarczające szkolenie.
      writing: |
        Autorzy zakładają, że czytelnicy mają to samo tło i pomijają
        niezbędny kontekst.
    real_world_implications: |
      Klątwa wiedzy tworzy luki komunikacyjne, nieudane produkty i nieskuteczne nauczanie. Jest to jeden z powodów, dla których eksperci mogą być słabymi nauczycielami. Pokonanie jej wymaga świadomego wysiłku w przyjęciu perspektywy odbiorcy.
    professional_application:
      networking_and_relationship_building: |
        Wyjaśniając, zacznij od poziomu drugiej osoby. Zapytaj „Co
        ona już wie?”. Przetestuj swoją komunikację z kimś, kto nie ma Twojego zaplecza.
      collaborative_learning_initiative: |
        Wykorzystaj ćwiczenia typu „wyjaśnij, jakbym miał pięć lat”. Pozwól ekspertom uczyć
        początkujących i uzyskać opinie. Twórz dokumentację, która nie zakłada żadnej wcześniejszej wiedzy. Wykorzystaj nauczanie rówieśnicze – osoby, które niedawno się czegoś nauczyły, pamiętają perspektywę początkującego.
    how_can_this_be_misapplied:
      oversimplification: |
        Upraszczanie do tego stopnia, że staje się niedokładne lub protekcjonalne.
      false_assumption: |
        Zakładanie, że inni wiedzą mniej niż faktycznie wiedzą – to również porażka
        kalibracji.
      one_size_fits_all: |
        Nie wszystkie grupy odbiorców potrzebują tego samego poziomu wyjaśnienia; dostosuj
        do odbiorców.
      avoiding_complexity: |
        Niektóre tematy są złożone; klątwa wiedzy nie oznacza, że nigdy nie powinniśmy używać języka technicznego, gdy jest to uzasadnione.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: dissonance_poznawcza
    nazwa: Disonans poznawczy
    szybkie_wprowadzenie: |
      Disonans poznawczy to psychiczny dyskomfort, którego doświadczamy, gdy mamy sprzeczne
      przekonania lub gdy nasze działania są sprzeczne z naszymi przekonaniami. Jesteśmy zmotywowani do
      zmniejszenia tego dyskomfortu – często poprzez zmianę naszych przekonań, aby pasowały do naszych działań
      , a nie poprzez zmianę naszych działań.
    jedna_linia: Częściej zmieniamy nasze przekonania, aby dopasować je do naszych działań, niż odwrotnie.
    spróbuj:
      - Zauważ, kiedy racjonalizujesz, aby zmniejszyć dyskomfort zamiast zmieniać zachowanie.
      - Zapytaj: Czy dostosowuję swoje przekonania, aby usprawiedliwić to, co zrobiłem?
      - Rozważ, czy zmiana działania byłaby bardziej uczciwa niż zmiana przekonania.
    zapytaj_siebie:
      - Czy zmniejszam dysonans poprzez racjonalizację, czy przez faktyczną zmianę?
      - Czy trzymałbym się tego przekonania, gdybym już nie postąpił w ten sposób?
    w_wiecej_szczegolach: |
      Teoria Leona Festingera wyjaśnia, że dążymy do spójności. Kiedy działamy
      wbrew naszym wartościom (np. kłamiemy, marnujemy pieniądze), doświadczamy dysonansu.
      Aby go zmniejszyć, możemy zmienić nasze przekonanie ("To tak naprawdę nie było kłamstwo") lub
      zminimalizować działanie ("To nie było takie złe"). Często racjonalizujemy zamiast się reformować.

      Disonans poznawczy napędza efekt Bena Franklina (lubimy ludzi, którym pomogliśmy), wyjaśnia, dlaczego uzasadniamy przeszłe decyzje i leży u podstaw wielu
      samooszukań. Jest to potężna siła w kształtowaniu i zmianie przekonań.
    dlaczego_to_wazne: |
      Zrozumienie dysonansu poznawczego pomaga rozpoznać własne
      racjonalizacje i zrozumieć, dlaczego ludzie opierają się zmianie zdania.
      Wyjaśnia również, dlaczego zaangażowanie i spójność są potężnymi zasadami perswazji.
    kiedy_uzywac:
      - podejmowanie_decyzji
      - budowanie_relacji
      - przywodztwo
      - rozwiazywanie_konfliktow
    jak_mozna_to_wykryc:
      racjonalizacja_po_decyzji: |
        Po wyborze podkreślamy pozytywne strony naszej decyzji i
        negatywne cechy odrzuconych opcji.
      zgodnosc_przekonan_z_dzialaniami: |
        Dostosowujemy przekonania, aby pasowały do działań, które już podjęliśmy.
      dyskomfort_z_niespojnosc: |
        Niepokój, gdy zauważamy, że nasze zachowanie nie pasuje do naszych zadeklarowanych wartości.
      opór_przed_dowodami_podwazajacymi: |
        Odrzucanie lub minimalizowanie informacji, które są sprzeczne z naszymi zobowiązaniami.
    przykłady:
      uzasadnienie_zakupu: |
        Po zakupie drogiego przedmiotu podkreślamy jego zalety i bagatelizujemy
        koszt.
      zwiazek: |
        Racjonalizujemy pozostawanie w złym związku, skupiając się na dobrych
        stronach i minimalizując złe.
      kariera: |
        Usprawiedliwiamy pozostanie w nielubianej pracy, podkreślając powody, dla których "musimy"
        zostać.
      przekonania: |
        Kiedy nasze działania są sprzeczne z naszymi wartościami, zmieniamy nasze wartości ("Nie
        jestem naprawdę wegetarianinem – jem mięso tylko czasami") zamiast naszych działań.
    implikacje_w_realnym_swiecie: |
      Disonans poznawczy kształtuje powstawanie przekonań, zachowania konsumenckie i
      postawy polityczne. Wyjaśnia, dlaczego ludzie podwajają swoje wysiłki po złych
      decyzjach i dlaczego zmiana zachowania może zmienić przekonania.
    zastosowanie_profesjonalne:
      budowanie_sieci_kontaktow_i_relacji: |
        Małe zobowiązania mogą prowadzić do większych – ludzie racjonalizują swoje
        przeszłe działania. Używaj tego etycznie: zacznij od małych próśb. Bądź świadomy
        swoich własnych zachowań racjonalizujących.
      inicjatywa_wspolnej_nauki: |
        Wprowadzając zmiany, uzyskaj wczesne poparcie i małe zobowiązania – tworzą one
        dysonans, który motywuje do większego zaangażowania. Unikaj wymuszania
        publicznych zobowiązań, które budzą niechęć.
    jak_mozna_to_zastosowac_blednie:
      manipulacja: |
        Celowe tworzenie dysonansu, aby wywierać presję na ludzi, by się podporządkowali.
      ignorowanie_rzeczywistej_zmiany: |
        Zakładanie, że każda zmiana przekonań jest racjonalizacją, gdy ludzie czasami
        rzeczywiście aktualizują swoje poglądy.
      wymuszona_spojnosc: |
        Wywieranie presji na ludzi, aby byli "spójni", gdy ich poglądy uzasadnienie ewoluowały.
      samooszukiwanie: |
        Używanie teorii dysonansu do usprawiedliwiania unikania niewygodnych prawd o
        sobie.
    powiazane_tresci:
      - efekt_bena_franklina
      - blad_potwierdzenia
      - blad_kosztow_utopionych
      - fundamentalny_blad_atrybucji
    name: Confirmation Bias
    quick_introduction: |
      Confirmation bias is the tendency to seek, interpret, and remember information
      in ways that confirm our existing beliefs. We give more weight to supporting
      evidence and discount or dismiss evidence that contradicts our views. We
      ask questions that confirm rather than test our hypotheses.
    in_more_detail: |
      We're not neutral processors of information. We seek confirmation, interpret
      ambiguity as support, and remember hits more than misses. We surround ourselves
      with like-minded people and media. We ask "Why am I right?" rather than
      "What would prove me wrong?" This makes us overconfident and slow to update.

      Confirmation bias is one of the most pervasive and well-documented biases.
      It affects science, politics, relationships, and business. Overcoming it
      requires deliberate effort and structured processes.
    why_this_is_important: |
      Recognizing confirmation bias is essential for good decision-making and
      learning. It helps you seek disconfirming evidence, consider alternative
      hypotheses, and update your beliefs when warranted. It's the foundation
      of scientific thinking.
    when_to_use:
      - decision-making
      - learning
      - problem_solving
      - risk_assessment
    how_can_you_spot_it:
      seeking_support: |
        Looking for evidence that confirms rather than tests your view.
      asymmetric_interpretation: |
        Interpreting ambiguous evidence as support for your position.
      discounting_disconfirming: |
        Dismissing or minimizing evidence that contradicts your beliefs.
      selective_exposure: |
        Consuming only information from sources that agree with you.
    examples:
      hiring: |
        Forming an early positive impression and then asking questions that
        confirm the candidate is great.
      investing: |
        After buying a stock, seeking positive news and dismissing negative
        analysis.
      relationships: |
        Interpreting a partner's actions through a lens that confirms your
        view of them (good or bad).
      politics: |
        Accepting information from your side uncritically and rejecting
        equivalent information from the other side.
    professional_application:
      networking_and_relationship_building: |
        When forming opinions about people, actively seek disconfirming
        evidence. Ask "What would change my mind?" and look for it.
      collaborative_learning_initiative: |
        Use devil's advocate, red teams, and pre-mortems to surface
        disconfirming perspectives. Reward people who challenge prevailing
        views with good evidence.
    how_can_this_be_misapplied:
      false_balance: |
        Treating all views as equally valid when evidence strongly supports
        one side.
      excessive_skepticism: |
        Dismissing all evidence as "confirmation bias" when some beliefs
        are well-supported.
      contrarianism: |
        Adopting the opposite view just to avoid confirmation bias—when
        the original view may be correct.
      analysis_paralysis: |
        Never committing to a view because "we might be biased."
    real_world_implications: |
      Confirmation bias perpetuates false beliefs, fuels polarization, and
      causes costly mistakes. It's the enemy of good science and good
      decision-making. Overcoming it requires deliberate disconfirmation
      seeking.
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: domyslny_efekt
    nazwa: Domyślny Efekt
    szybkie_wprowadzenie: |
      Domyślny efekt to tendencja do wybierania wstępnie zaznaczonej opcji przy
      prezentowaniu wyborów. Cokolwiek jest ustawione jako domyślne, ma silną przewagę –
      ludzie często trzymają się tego, niezależnie od tego, czy jest to dla nich optymalne.
    jedna_linia: Cokolwiek jest ustawione jako domyślne, ma silną przewagę – trzymamy się tego.
    spróbuj_tego:
      - Zwracaj uwagę, kiedy akceptujesz domyślne ustawienie bez analizowania alternatyw.
      - Projektując wybory, ustaw domyślne opcje, które służą najlepszym interesom użytkowników.
      - Zapytaj: Czy wybrałbym to, gdyby nie było wstępnie zaznaczone?
    zapytaj_siebie:
      - Czy wybieram domyślne ustawienie z powodu bezwładności, czy dlatego, że jest dla mnie najlepsze?
      - Kto ustawił to domyślne ustawienie i co może na tym zyskać?
    szczegółowo: |
      Domyślne ustawienia działają dzięki bezwładności, awersji do strat (zmiana wydaje się stratą domyślnego ustawienia) i domyślnemu poparciu (zakładamy, że domyślne ustawienie jest zalecane).
      Wskaźniki darowizn narządów drastycznie różnią się w zależności od kraju, w dużej mierze z powodu tego, czy domyślne jest zgłoszenie aktywne (opt-in), czy zaniechanie aktywne (opt-out). Uczestnictwo w oszczędnościach emerytalnych gwałtownie rośnie, gdy zapis jest automatyczny.

      Domyślne ustawienia mogą być używane dla dobra (zachęcanie do lepszych wyników) lub do manipulacji (ukrywanie niekorzystnych warunków w zaznaczonych polach). Zrozumienie tego efektu pomaga projektować lepsze systemy i opierać się niechcianym domyślnym ustawieniom.
    dlaczego_to_wazne: |
      Zrozumienie efektu domyślnego pomaga projektować architekturę wyboru, która poprawia wyniki, i pomaga rozpoznać, kiedy Twoje wybory są kształtowane przez domyślne ustawienia, a nie świadome preferencje.
    kiedy_uzywac:
      - podejmowanie_decyzji
      - przywodztwo
      - rozwiazywanie_problemow
      - ocena_ryzyka
    jak_mozna_to_wykryc:
      bezwladnosc_wobec_domyslnych: |
        Większość ludzi trzyma się tego, co jest wstępnie zaznaczone.
      domyslna_rekomendacja: |
        Domyślną opcję interpretujemy jako „to, co chcą, abyśmy wybrali”.
      zapis_aktywny_vs_zaniedbanie_aktywne: |
        Sposób przedstawienia znacząco zmienia uczestnictwo (zapis aktywny vs. zaniedbanie aktywne).
      zaznaczone_pola: |
        Wstępnie zaznaczone opcje mają silną przewagę w formularzach i ustawieniach.
    przyklady:
      darowizny_narzadow: |
        Kraje z opcją zaniedbania aktywnego mają znacznie wyższe wskaźniki darowizn niż kraje z opcją zapisu aktywnego – domyślne ustawienie ma większe znaczenie niż postawy.
      oszczednosci_emerytalne: |
        Automatyczny zapis znacząco zwiększa uczestnictwo w planach 401(k).
      instalatory_oprogramowania: |
        Opcje „zalecane” i wstępnie zaznaczone dodatki kształtują to, co instalują użytkownicy.
      subskrypcje: |
        Bezpłatne wersje próbne, które domyślnie przechodzą na płatną subskrypcję, przyciągają wielu, którzy aktywnie nie zdecydowaliby się na subskrypcję.
    realne_implikacje: |
      Efekt domyślny jest jednym z najpotężniejszych bodźców. Kształtuje oszczędności, zdrowie, prywatność i zachowania konsumentów. Etyczna architektura wyboru wykorzystuje domyślne ustawienia do poprawy wyników; ciemne wzorce wykorzystują je do wykorzystywania.
    zastosowanie_zawodowe:
      budowanie_sieci_kontaktow_i_relacji: |
        Projektując procesy dla innych, wybieraj domyślne ustawienia, które służą ich interesom. Unikaj ciemnych wzorców, które wykorzystują domyślne ustawienia do pozyskiwania wartości.
      inicjatywa_wspolnej_nauki: |
        Ustaw domyślne praktyki zespołowe (np. domyślnie asynchroniczne, domyślnie dokumentacja), które są zgodne z pożądanym zachowaniem. Uczyń właściwy wybór łatwym wyborem.
    jak_mozna_to_zastosowac_nieprawidlowo:
      ciemne_wzorce: |
        Wykorzystywanie domyślnych ustawień do oszukiwania ludzi w niekorzystnych wyborach (np. ukryte opłaty, niechciane subskrypcje).
      paternalizm: |
        Narzucanie domyślnych ustawień, które ignorują autentyczne preferencje bez zgody.
      manipulacja: |
        Ukrywanie niekorzystnych warunków w domyślnych ustawieniach i liczenie na bezwładność.
      uniwersalne_rozwiazanie: |
        Zakładanie, że to samo domyślne ustawienie jest właściwe dla wszystkich, gdy preferencje się różnią.
    powiazana_tresc:
      - efekt_kotwiczenia
      - efekt_ramowania
      - awersja_do_strat
      - ograniczona_racjonalnosc
    name: Curse of Knowledge
    quick_introduction: |
      The curse of knowledge is the difficulty of imagining what it's like not to
      know something once you know it. Experts struggle to teach beginners because
      they can't recreate the beginner's perspective. Once you know, you forget
      what it was like not to know.
    in_more_detail: |
      In a classic experiment, people who knew the answer to a puzzle tapped the
      rhythm of a song and expected others to guess it—they overestimated how
      obvious it was. The tappers couldn't "unhear" the song in their heads.
      Knowledge is "sticky"; it's hard to simulate ignorance.

      The curse affects teaching, communication, product design, and leadership.
      We assume others have the same context we do. We use jargon. We skip
      steps. We're surprised when people don't "get it."
    why_this_is_important: |
      Recognizing the curse of knowledge improves teaching, communication, and
      product design. It helps you meet people where they are rather than
      where you are. It's essential for effective knowledge transfer.
    when_to_use:
      - learning
      - leadership
      - problem_solving
      - relationship_building
    how_can_you_spot_it:
      obvious_to_you: |
        "It's obvious" when it's only obvious because you know the answer.
      jargon_use: |
        Using terms the audience doesn't know without defining them.
      skipped_steps: |
        Assuming others will fill in what you've left out.
      frustration_with_learners: |
        "How can they not see it?" when they lack your context.
    examples:
      teaching: |
        A math professor skips steps that are "obvious" to them but
        essential for students.
      product_design: |
        Designers create interfaces that make sense to them but confuse
        new users.
      onboarding: |
        Experienced employees forget what new hires don't know and
        provide inadequate training.
      writing: |
        Authors assume readers have the same background and miss
        necessary context.
    professional_application:
      networking_and_relationship_building: |
        When explaining, start from the other person's level. Ask "What
        do they already know?" Test your communication with someone
        who doesn't have your background.
      collaborative_learning_initiative: |
        Use "explain like I'm five" exercises. Have experts teach
        beginners and get feedback. Create documentation that assumes
        no prior knowledge. Use peer teaching—people who recently
        learned remember the beginner's perspective.
    how_can_this_be_misapplied:
      oversimplification: |
        Dumbing down to the point of inaccuracy or condescension.
      false_assumption: |
        Assuming others know less than they do—also a failure of
        calibration.
      one_size_fits_all: |
        Not all audiences need the same level of explanation; tailor
        to the audience.
      avoiding_complexity: |
        Some topics are complex; the curse of knowledge doesn't mean
        we should never use technical language when appropriate.
    real_world_implications: |
      The curse of knowledge creates communication gaps, failed products,
      and ineffective teaching. It's one reason experts can be poor
      teachers. Overcoming it requires deliberate effort to adopt the
      audience's perspective.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: dunning_kruger_effect
    name: Efekt Dunninga-Krugera
    quick_introduction: |
      Efekt Dunninga-Krugera opisuje błąd poznawczy, w którym osoby o ograniczonej
      wiedzy lub umiejętnościach w danej dziedzinie przeceniają swoje kompetencje,
      podczas gdy eksperci mają tendencję do ich niedoceniania. Im mniej wiesz, tym
      bardziej możesz być pewny siebie.
    one_liner: Im mniej wiesz, tym bardziej możesz być pewny siebie.
    try_this:
      - W nowych dziedzinach zakładaj, że jesteś nadmiernie pewny siebie — szukaj informacji zwrotnej i kalibracji.
      - Kiedy eksperci wyrażają wątpliwości, traktuj to poważnie; mogą znać przypadki brzegowe.
      - Zwracaj uwagę, gdy nowicjusze są bardziej pewni niż eksperci w danej dziedzinie.
    ask_yourself:
      - Czy jestem na „szczycie Głąba” czy w „dolinie pokory”?
      - Czy mam zdolność metakognitywną do oceny własnych kompetencji w tej dziedzinie?
    in_more_detail: |
      Badania Dunninga i Krugera wykazały, że osoby niekompetentne nie posiadają
      zdolności metakognitywnych do rozpoznania własnej niekompetencji. Aby ocenić
      swoją wydajność, potrzebujesz tych samych umiejętności, które są wymagane do
      dobrego wykonania zadania — więc osoby niedostatecznie wykwalifikowane są
      podwójnie poszkodowane: wykonują pracę źle i nie wiedzą o tym.

      Wraz ze wzrostem kompetencji ludzie często doświadczają „doliny pokory”, w której
      uświadamiają sobie, jak wiele nie wiedzą. Prawdziwi eksperci mogą wykazywać
      niedostateczną pewność siebie, ponieważ są boleśnie świadomi niuansów i przypadków
      brzegowych.
    why_this_is_important: |
      Rozpoznanie efektu Dunninga-Krugera pomaga kalibrować własną pewność siebie,
      unikać przeceniania opinii nowicjuszy i doceniać pokorę ekspertów. Jest to
      niezbędne do uczenia się, zatrudniania i podejmowania decyzji.
    when_to_use:
      - nauka
      - podejmowanie_decyzji
      - przywodztwo
      - decyzje_zawodowe
    how_can_you_spot_it:
      novice_overconfidence: |
        Ktoś z niewielkim doświadczeniem wyraża zdecydowane, niekwalifikowane opinie.
      expert_underconfidence: |
        Bardzo biegłe osoby częściej wyrażają zastrzeżenia i niepewność niż mniej
        biegłe osoby.
      inability_to_recognize_quality: |
        Osoby o słabych wynikach nie potrafią odróżnić dobrej pracy od złej w swojej
        dziedzinie.
      confidence_competence_mismatch: |
        Pewność siebie i rzeczywiste umiejętności są odwrotnie skorelowane wśród
        początkujących.
    examples:
      social_media: |
        Osoby z powierzchowną wiedzą na dany temat pewnie kłócą się z ekspertami
        dziedzinowymi.
      hiring: |
        Kandydaci, którzy uzyskują słabe wyniki w wywiadach, czasami oceniają własne
        wyniki bardzo wysoko.
      investing: |
        Nowi inwestorzy mogą być nadmiernie pewni siebie po wczesnych sukcesach, nie
        doceniając roli szczęścia.
      workplace: |
        Młodsi pracownicy mogą przeceniać swoje przygotowanie do awansu, podczas gdy
        starsi wątpią w siebie.
    real_world_implications: |
      Efekt Dunninga-Krugera wpływa na edukację, zatrudnianie, politykę i dyskurs
      publiczny. Wyjaśnia, dlaczego złe pomysły są wzmacniane i dlaczego ekspertów można
      ignorować. Kalibracja ma znaczenie dla indywidualnego i zbiorowego
      podejmowania decyzji.
    professional_application:
      networking_and_relationship_building: |
        Gdy ktoś jest bardzo pewny siebie, rozważ, czy nie znajduje się w strefie
        Dunninga-Krugera. Szukaj różnorodnych perspektyw, w tym od osób wyrażających
        niepewność.
      collaborative_learning_initiative: |
        Twórz kultury, w których przyznawanie się do niepewności jest cenione. Zachęcaj
        do ćwiczeń kalibracyjnych i informacji zwrotnej, która pomaga ludziom
        dokładnie ocenić swoje kompetencje.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Zakładanie, że pewni siebie ludzie zawsze się mylą; czasami pewność siebie
        jest uzasadniona.
      false_modesty: |
        Eksperci udający, że wiedzą mniej, niż wiedzą, aby wydawać się skromnymi.
      gatekeeping: |
        Wykorzystywanie efektu Dunninga-Krugera do odrzucania każdego, kto nie zgadza
        się z „ekspertami”, bez angażowania się w ich argumenty.
      self_doubt_paralysis: |
        Nadmierna korekta do tego stopnia, że nigdy nie ufasz własnemu osądowi.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: efekt_samoistnej_ekspozycji
    nazwa: Efekt samoistnej ekspozycji
    szybkie_wprowadzenie: |
      Efekt samoistnej ekspozycji to tendencja do rozwijania preferencji wobec rzeczy
      tylko dlatego, że jesteśmy z nimi zaznajomieni. Powtarzająca się ekspozycja—nawet bez
      wzmocnienia—zwiększa sympatię. Mamy tendencję do preferowania tego, co znamy.
    jednozdaniowe_podsumowanie: Znajomość rodzi sympatię—preferujemy to, co widzieliśmy wcześniej.
    spróbuj:
      - Zapytaj: Czy lubię to, bo jest dobre, czy dlatego, że jest mi znajome?
      - Oceniając opcje, uwzględnij ekspozycję—nowe rzeczy zaczynają z góry przegranej.
      - Zauważ, kiedy powtórzenia wpływają na twoją preferencję.
    zapytaj_siebie:
      - Czy preferuję coś głównie dlatego, że widziałem to wcześniej?
      - Czy wybrałbym inaczej, gdyby ekspozycja była równa?
    dokladniej: |
      Robert Zajonc wykazał, że powtarzająca się ekspozycja na bodźce (twarze, słowa, kształty)
      zwiększa pozytywne uczucia wobec nich—nawet gdy nie zdajemy sobie świadomie
      sprawy z ekspozycji. Znajomość rodzi sympatię, a nie pogardę (w wielu
      przypadkach). Efekt jest silniejszy, gdy nie analizujemy i gdy ekspozycja
      jest subtelna.

      Efekt samoistnej ekspozycji wpływa na preferencje marek, interpersonalną
      atrakcyjność i ocenę estetyczną. Wyjaśnia, dlaczego wolimy znajomą
      muzykę, dlaczego reklama działa poprzez powtórzenia i dlaczego możemy preferować
      ludzi, których widzieliśmy wcześniej—nawet bez interakcji.
    dlaczego_to_wazne: |
      Rozpoznanie efektu samoistnej ekspozycji pomaga zrozumieć własne
      preferencje i oprzeć się manipulacji poprzez powtórzenia. Wyjaśnia również
      dlaczego widoczność i obecność mają znaczenie dla relacji i
      marek. Znajomość jest potężnym, ale często nieświadomym wpływem.
    kiedy_uzywac:
      - budowanie_relacji
      - podejmowanie_decyzji
      - przywództwo
      - uczenie_sie
    jak_mozna_to_wykryc:
      preferencja_znajomosci: |
        Preferowanie opcji, które widzieliśmy wcześniej, nad nowe.
      wplyw_powtorzen: |
        Powtarzająca się ekspozycja zwiększa sympatię bez wyraźnego przekonywania.
      nieświadomy_wplyw: |
        Efekt działa nawet wtedy, gdy nie zdajemy sobie sprawy z ekspozycji.
      rozpoznawanie_marki: |
        Preferujemy znajome marki, nawet jeśli nie potrafimy wyjaśnić dlaczego.
    przykłady:
      reklama: |
        Powtarzająca się ekspozycja na markę zwiększa preferencje—nawet bez
        przekonujących komunikatów.
      muzyka: |
        Piosenki, które słyszeliśmy wcześniej, zazwyczaj bardziej nam się podobają niż nowe
        przy pierwszym przesłuchaniu.
      ludzie: |
        Mamy tendencję do lubienia ludzi, których widzieliśmy wielokrotnie (np. koledzy z klasy,
        współpracownicy) bardziej niż nieznajomych—nawet bez interakcji.
      idee: |
        Idee, z którymi spotkaliśmy się wcześniej, wydają się bardziej komfortowe i
        wiarygodne niż nowe.
    implikacje_w_rzeczywistym_swiecie: |
      Efekt samoistnej ekspozycji kształtuje zachowania konsumentów, preferencje polityczne
      i społeczne atrakcyjność. Jest wykorzystywany w marketingu
      i może tworzyć nieuczciwą przewagę dla tego, co znajome. Wyjaśnia również
      dlaczego różnorodność ekspozycji ma znaczenie—znajomość z
      różnicami zmniejsza uprzedzenia.
    zastosowanie_profesjonalne:
      budowanie_sieci_kontaktow_i_relacji: |
        Widoczność ma znaczenie. Pojawianie się, bycie obecnym i bycie
        widzianym tworzy znajomość, która buduje sympatię. Nie
        nie doceniaj wartości powtarzającego się kontaktu o niskiej stawce.
      inicjatywa_wspolnej_nauki: |
        Wystawiaj ludzi na różnorodne perspektywy i ludzi wielokrotnie—
        znajomość może zmniejszyć uprzedzenia. Ale bądź świadomy, że samoistna ekspozycja
        może również wzmocnić preferencje dla status quo.
    jak_mozna_to_zastosowac_nieprawidlowo:
      manipulacja: |
        Celowe tworzenie powtarzającej się ekspozycji w celu manipulowania
        preferencjami bez zgody.
      fałszywa_znajomość: |
        Zakładanie, że znajomość równa się jakości—czasami nowe
        opcje są lepsze.
      wykluczenie: |
        Jeśli tylko niektórzy ludzie otrzymują ekspozycję, zyskują nieuczciwą
        przewagę. Zastanów się, kto ma dostęp do widoczności.
      stagnacja: |
        Nadmierne poleganie na znajomości i nigdy niepróbowanie nowych rzeczy.
    powiazane_tresci:
      - efekt_bena_franklina
      - heurystyka_dostepnosci
      - zjawisko_baader_meinhof
      - efekt_aureoli
    name: Dunning-Kruger Effect
    quick_introduction: |
      The Dunning-Kruger effect describes a cognitive bias where people with limited
      knowledge or skill in a domain overestimate their competence, while experts tend
      to underestimate theirs. The less you know, the more confident you may be.
    in_more_detail: |
      Dunning and Kruger's research showed that incompetent individuals lack the
      metacognitive ability to recognize their own incompetence. To evaluate your
      performance, you need the same skills required to perform well—so the unskilled
      are doubly disadvantaged: they perform poorly and don't know it.

      As competence increases, people often experience a "valley of humility" where they
      recognize how much they don't know. True experts may underconfidence because they
      are acutely aware of nuance and edge cases.
    why_this_is_important: |
      Recognizing the Dunning-Kruger effect helps you calibrate your own confidence,
      avoid overestimating novices' opinions, and appreciate expert humility. It's
      essential for learning, hiring, and decision-making.
    when_to_use:
      - learning
      - decision-making
      - leadership
      - career_moves
    how_can_you_spot_it:
      novice_overconfidence: |
        Someone with little experience expresses strong, unqualified opinions.
      expert_underconfidence: |
        Highly skilled people hedge and express uncertainty more than less skilled people.
      inability_to_recognize_quality: |
        Poor performers can't distinguish good from bad work in their domain.
      confidence_competence_mismatch: |
        Confidence and actual ability are inversely correlated among beginners.
    examples:
      social_media: |
        People with surface-level knowledge of a topic confidently argue with domain
        experts.
      hiring: |
        Candidates who perform poorly in interviews sometimes rate their own performance
        highly.
      investing: |
        New investors may be overconfident after early wins, not recognizing luck.
      workplace: |
        Junior employees may overestimate their readiness for promotion while seniors
        doubt themselves.
    professional_application:
      networking_and_relationship_building: |
        When someone is very confident, consider whether they might be in the
        Dunning-Kruger zone. Seek diverse perspectives, including from those who
        express uncertainty.
      collaborative_learning_initiative: |
        Create cultures where admitting uncertainty is valued. Encourage calibration
        exercises and feedback that helps people accurately assess their competence.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Assuming that confident people are always wrong; sometimes confidence is
        warranted.
      false_modesty: |
        Experts pretending to know less than they do to appear humble.
      gatekeeping: |
        Using Dunning-Kruger to dismiss anyone who disagrees with "experts" without
        engaging their arguments.
      self_doubt_paralysis: |
        Overcorrecting to the point of never trusting your own judgment.
    real_world_implications: |
      The Dunning-Kruger effect affects education, hiring, politics, and public discourse.
      It explains why bad ideas get amplified and why experts can be dismissed. Calibration
      matters for individual and collective decision-making.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Luka Empatii
    quick_introduction: |
      Luka empatii to trudność w zrozumieniu i przewidzeniu stanów psychicznych
      innych osób, gdy sami znajdujemy się w innym stanie. Kiedy jesteśmy
      spokojni, nie doceniamy tego, jak będziemy się czuć, gdy będziemy źli lub głodni. Kiedy jesteśmy
      najedzeni, nie doceniamy tego, jak bardzo będziemy czegoś chcieli, gdy będziemy głodni.
    one_liner: Nie doceniamy tego, jak będziemy się czuć – i jak czują się inni – w różnych stanach.
    try_this:
      - Kiedy jesteś spokojny, składaj zobowiązania na czas, gdy będziesz zestresowany; pre-commituj.
      - Nie oceniaj innych w stanie, w którym się nie znajdujesz – głodny, zmęczony, przestraszony.
      - Zapytaj: Czy projektuję mój obecny stan na moją przyszłą jaźń lub na innych?
    ask_yourself:
      - Czy nie doceniam tego, jak będę się czuć w innym stanie?
      - Czy lepiej zrozumiałbym tę osobę, gdybym był w jej stanie?
    in_more_detail: |
      Mamy problemy z wyobrażeniem sobie, jak będziemy się czuć w różnych okolicznościach – i
      jak czują się inni, gdy znajdują się w stanach, w których my obecnie nie jesteśmy. Osoba trzeźwa
      nie docenia pociągu uzależnienia. Osoba wypoczęta
      nie docenia wpływu braku snu. Projektujemy nasz obecny
      stan na innych i na nasze przyszłe jaźnie.

      Luka empatii wpływa na decyzje, które podejmujemy dla naszych przyszłych jaźni (np.
      zobowiązanie się do ćwiczeń, gdy jesteśmy zmotywowani), decyzje, które podejmujemy dla
      innych, oraz naszą zdolność do zrozumienia ludzi w różnych stanach.
    why_this_is_important: |
      Rozpoznanie luki empatii poprawia podejmowanie decyzji dla twojej przyszłej jaźni,
      empatię dla innych i zrozumienie naszej własnej zmienności. Wyjaśnia, dlaczego składamy obietnice, których nie możemy dotrzymać, i dlaczego źle rozumiemy
      innych w potrzebie.
    when_to_use:
      - podejmowanie_decyzji
      - budowanie_relacji
      - przywództwo
      - rozwiązywanie_konfliktów
    how_can_you_spot_it:
      current_state_projection: |
        Zakładanie, że inni czują się tak samo jak my teraz, lub że przyszła jaźń będzie czuć się tak samo jak my teraz.
      underestimating_emotional_state: |
        "O co tyle szumu?", gdy nie jesteśmy w stanie, w którym są oni.
      commitment_failures: |
        Podejmowanie wyborów opartych na obecnej motywacji, których nie będziemy realizować,
        gdy motywacja minie.
      misunderstanding_others: |
        Odrzucanie doświadczeń innych, ponieważ nie możemy ich sobie wyobrazić z naszej
        obecnej perspektywy.
    examples:
      hunger: |
        Zakupy spożywcze, gdy jesteśmy najedzeni – kupujemy mniej, niż będziemy chcieli, gdy będziemy głodni.
      addiction: |
        Osoby nieuzależnione nie doceniają trudności rzucenia nałogu; osoby uzależnione
        w trakcie leczenia mogą nie doceniać pociągu, gdy są pod wpływem.
      conflict: |
        Kiedy jesteśmy spokojni, nie doceniamy tego, jak zareagujemy w momencie
        konfrontacji.
      motivation: |
        Zapisanie się na zajęcia o 6 rano, gdy jesteśmy zmotywowani – i nie pójście, gdy
        jesteśmy senni.
    real_world_implications: |
      Luka empatii wpływa na leczenie uzależnień, politykę i zrozumienie międzyludzkie. Wyjaśnia, dlaczego składamy obietnice, których nie dotrzymujemy, i dlaczego często nie rozumiemy perspektyw innych. Jest to przeszkoda dla
      empatii i dobrego podejmowania decyzji.
    professional_application:
      networking_and_relationship_building: |
        Kiedy ktoś jest zestresowany, zły lub w innym stanie, nie
        zakładaj, że będzie myślał tak jak ty. Spróbuj wyobrazić sobie jego stan.
        Składając zobowiązania, zastanów się, jak będziesz się czuć, gdy motywacja
        minie.
      collaborative_learning_initiative: |
        Planując, zastanów się, jak zespół poczuje się, gdy będzie zmęczony, pod
        presją lub sfrustrowany. Projektuj z myślą o tych stanach, a nie tylko o
        stanie motywacji podczas planowania.
    how_can_this_be_misapplied:
      overattribution: |
        Przypisywanie wszelkiego nieporozumienia "luce empatii", gdy czasem
        ludzie mają naprawdę różne wartości.
      excusing_behavior: |
        "Nie mogli nic na to poradzić – luka empatii", gdy ludzie są odpowiedzialni
        za zarządzanie swoimi stanami.
      false_relativism: |
        Zakładanie, że nigdy nie zrozumiemy innych, gdy możemy się poprawić dzięki
        wysiłkowi i doświadczeniu.
      self_excuse: |
        Używanie luki empatii do usprawiedliwienia własnych niepowodzeń w realizacji zadań.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Efekt posiadania
    quick_introduction: |
      Efekt posiadania to tendencja do wyceniania czegoś wyżej po prostu
      dlatego, że jesteśmy jego właścicielami. Żądamy więcej za oddanie przedmiotu, niż zapłacilibyśmy, aby go nabyć. Posiadanie tworzy przywiązanie, które zniekształca naszą wycenę.
    one_liner: Cenimy to, co posiadamy, bardziej niż to, czego nie posiadamy — posiadanie tworzy przywiązanie.
    try_this:
      - Zapytaj: Ile zapłaciłbym za to, gdybym tego nie posiadał?
      - Sprzedając, wyobraź sobie, że kupujesz — czy zapłaciłbyś moją cenę wywoławczą?
      - Zwróć uwagę, kiedy posiadanie zawyża twoją wycenę.
    ask_yourself:
      - Czy wyceniam to za wysoko, ponieważ jestem tego właścicielem?
      - Czy neutralny kupujący zgodziłby się z moją ceną?
    in_more_detail: |
      W eksperymentach ludzie losowo otrzymujący kubek żądali mniej więcej dwukrotnie więcej za jego sprzedaż, niż inni byli skłonni zapłacić za jego kupno. Samo posiadanie zwiększa postrzeganą wartość. Jest to związane z awersją do strat — oddanie czegoś jest odczuwane jako strata, a my jesteśmy awersyjni do strat. Ale efekt wykracza poza to: włączamy posiadane rzeczy do naszej tożsamości.

      Efekt posiadania wpływa na negocjacje, zachowania konsumentów i zmiany organizacyjne. Tłumaczy, dlaczego ludzie przeceniają wartość swoich domów,
      swoich pomysłów i swoich obecnych ról. Tworzy tarcia w transakcjach
      i zmianach.
    why_this_is_important: |
      Rozpoznanie efektu posiadania pomaga skuteczniej negocjować,
      podejmować jaśniejsze decyzje o tym, co zachować, a co puścić, i rozumieć,
      dlaczego inni przeceniają to, co posiadają. Tłumaczy również opór wobec
      zmian.
    when_to_use:
      - podejmowanie_decyzji
      - negocjacje
      - inwestowanie
      - zmiany_w_karierze
    how_can_you_spot_it:
      ownership_premium: |
        "Nie sprzedałbym tego za tyle" — gdybyś ty sam nie zapłacił tyle, aby to kupić.
      attachment_to_possession: |
        Cenienie rzeczy wyżej po tym, jak już je posiadamy.
      resistance_to_trading: |
        Niechęć do wymiany lub handlu, nawet gdy byłoby to racjonalne.
      overvaluation_of_own_ideas: |
        Nasze pomysły, projekty lub role wydają się cenniejsze, ponieważ są nasze.
    examples:
      real_estate: |
        Właściciele domów często przeceniają swoje nieruchomości — cenią je wyżej,
        niż robi to rynek.
      negotiations: |
        Sprzedający żądają więcej, niż kupujący są skłonni zapłacić; ta różnica odzwierciedla
        efekt posiadania.
      career: |
        Przecenianie obecnej pracy, firmy lub roli przy rozważaniu
        zmiany.
      ideas: |
        Uprzedzenie "nie wymyślono tutaj" i "mój pomysł" — przeceniamy to, co stworzyliśmy lub posiadamy.
    real_world_implications: |
      Efekt posiadania tworzy tarcia rynkowe, spowalnia korzystne
      wymiany i napędza opór wobec zmian. Dotyczy fuzji,
      reorganizacji i zmian osobistych. Zrozumienie go
      poprawia negocjacje i zarządzanie zmianą.
    professional_application:
      networking_and_relationship_building: |
        Gdy ktoś opiera się zmianom, rozważ, że może doświadczać
        efektu posiadania — ceni status quo bardziej, ponieważ je "posiada".
        Formułuj zmiany w kategoriach tego, co zyskują, a nie tylko tego, co tracą.
      collaborative_learning_initiative: |
        Wprowadzając nowe procesy, uznaj, że ludzie są przywiązani
        do obecnych sposobów. Stwórz psychologiczne bezpieczeństwo, aby "puścili"
        stare, zanim przyjmą nowe.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Niektóre przywiązanie jest racjonalne — wartość sentymentalna, koszty zmiany.
        Nie każdy opór to efekt posiadania.
      manipulation: |
        Tworzenie fałszywego poczucia posiadania w celu uzyskania wyższych cen (np.
        "wypróbuj za darmo", aby wywołać efekt posiadania).
      undervaluing_continuity: |
        Zakładanie, że cały opór wobec zmian jest irracjonalny, gdy ciągłość
        ma rzeczywistą wartość.
      cold_rationality: |
        Odrzucanie emocjonalnego przywiązania jako "po prostu efektu posiadania", gdy
        odzwierciedla ono autentyczne wartości.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Efekt fałszywej zgody
    quick_introduction: |
      Efekt fałszywej zgody to tendencja do przeceniania stopnia, w jakim inni zgadzają się
      z naszymi przekonaniami, postawami i zachowaniami. Zakładamy, że nasze poglądy są
      bardziej powszechne niż w rzeczywistości, i trudno nam sobie wyobrazić, że rozsądni
      ludzie mogliby się nie zgadzać.
    one_liner: Przeceniamy stopień, w jakim inni się z nami zgadzają.
    try_this:
      - Aktywnie szukaj ludzi, którzy się nie zgadzają – nie zakładaj konsensusu.
      - Przed uruchomieniem przetestuj z ludźmi, którzy nie podzielają twoich założeń.
      - Zapytaj: Co powiedziałby ktoś, kto się nie zgadza? Traktuj to poważnie.
    ask_yourself:
      - Czy zakładam, że inni myślą tak jak ja?
      - Kiedy ostatnio zaskoczył mnie czyjś odmienny pogląd?
    in_more_detail: |
      Kiedy zajmujemy stanowisko, mamy tendencję uważać, że jest to norma. Otaczamy się
      ludźmi o podobnych poglądach, konsumujemy media potwierdzające nasze przekonania i
      interpretujemy niejednoznaczne informacje zwrotne jako zgodę. Tworzy to komorę echa,
      która wzmacnia iluzję konsensusu.

      Efekt jest silniejszy w przypadku głęboko zakorzenionych przekonań i gdy jesteśmy mocno
      zaangażowani w nasze stanowisko. Może prowadzić do zaskoczenia, gdy inni się nie
      zgadzają, trudności w negocjacjach i słabego badania rynku, gdy zakładamy, że klienci
      myślą tak jak my.
    why_this_is_important: |
      Uznanie efektu fałszywej zgody pomaga przygotować się na rzeczywiste nieporozumienia,
      przeprowadzić lepsze badania i skuteczniej komunikować się. Jest to kluczowe dla
      rozwoju produktu, negocjacji i przywództwa.
    when_to_use:
      - podejmowanie_decyzji
      - negocjacje
      - przywództwo
      - rozwiązywanie_problemów
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Jesteś autentycznie zszokowany, gdy ktoś nie zgadza się z tym, co uważasz za oczywiste.
      assuming_shared_values: |
        Działasz tak, jakby inni podzielali twoje priorytety, nie sprawdzając tego.
      underestimating_opposition: |
        Spodziewasz się mniejszego oporu wobec propozycji niż faktycznie napotykasz.
      echo_chamber_detection: |
        Twoje środowisko społeczne i informacyjne rzadko kwestionuje twoje poglądy.
    examples:
      product_development: |
        Zespół zakłada, że użytkownicy chcą funkcji X, ponieważ wszyscy w zespole jej chcą –
        tylko po to, by odkryć niskie przyjęcie.
      politics: |
        Ludzie w bańce politycznej są zaskoczeni wynikami wyborów, które nie odpowiadają
        ich oczekiwaniom.
      negotiation: |
        Zakładanie, że druga strona zgodzi się na warunki, ponieważ wydają się one "rozsądne"
        dla ciebie.
      hiring: |
        Rekrutacja pod kątem "dopasowania do kultury" może oznaczać zatrudnianie osób,
        które się z tobą zgadzają, wzmacniając fałszywy konsensus.
    real_world_implications: |
      Efekt fałszywej zgody przyczynia się do polaryzacji, nieudanych premier produktów i
      zerwanych negocjacji. Sprawia, że jesteśmy zbyt pewni siebie w naszych przewidywaniach
      i nieprzygotowani na sprzeciw.
    professional_application:
      networking_and_relationship_building: |
        Aktywnie szukaj ludzi o różnych perspektywach. Nie zakładaj wspólnych przekonań –
        pytaj i słuchaj.
      collaborative_learning_initiative: |
        W zespołach stosuj ustrukturyzowany sprzeciw (np. "premortemy", adwokat diabła),
        aby ujawnić nieporozumienia, zanim staną się kosztowne.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Zakładanie, że ci, którzy się nie zgadzają, są nierozsądni lub niedoinformowani,
        zamiast brać pod uwagę, że mogą mieć uzasadnione, odmienne perspektywy.
      poor_research: |
        Pomijanie badań klientów, ponieważ "już wiemy, czego chcą".
      overconfidence: |
        Dokonywanie śmiałych zakładów w oparciu o założenie, że inni się zgodzą.
      groupthink_amplification: |
        Zespoły, które nie kwestionują efektu fałszywej zgody, mogą popaść w myślenie grupowe.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Efekt Ramowania
    quick_introduction: |
      Efekt ramowania to tendencja do zmiany naszych decyzji w zależności od tego, jak prezentowane są opcje—nawet gdy fakty pozostają takie same. "90% przeżycia" i "10% śmiertelności" opisują ten sam wynik, ale wywołują różne wybory. Sposób ujęcia kształtuje decyzję.
    one_liner: Te same fakty, ujęte inaczej, prowadzą do różnych decyzji.
    try_this:
      - Przed podjęciem decyzji przeformułuj opcje na różne sposoby—ujęcie zysku i ujęcie straty.
      - Zwracaj uwagę, kiedy Twój wybór zmienia się w zależności od sposobu sformułowania czegoś.
      - Zapytaj: Jakie są podstawowe fakty, pozbawione ramowania?
    ask_yourself:
      - Czy zdecydowałbym inaczej, gdyby było to przedstawione jako zysk vs. strata?
      - Czy reaguję na sposób ujęcia, czy na rzeczywisty wynik?
    in_more_detail: |
      Kahneman i Tversky pokazali, że ludzie unikają ryzyka, gdy opcje są przedstawiane jako zyski, i szukają ryzyka, gdy są przedstawiane jako straty—nawet w przypadku tych samych wyników. Pozytywne ramowanie ("uratuj 200 osób") vs. negatywne ramowanie ("400 umrze") zmienia preferencje. Ujęcia straty wywołują silniejsze reakcje emocjonalne niż równoważne ujęcia zysku.

      Efekt ramowania wpływa na decyzje medyczne, politykę, marketing i negocjacje. Jest to jeden z najpotężniejszych i najlepiej udokumentowanych błędów poznawczych. Świadomość pomaga, ale trudno jest go w pełni przezwyciężyć.
    why_this_is_important: |
      Rozpoznanie efektu ramowania pomaga podejmować bardziej spójne decyzje, opierać się manipulacji i skuteczniej komunikować. Wyjaśnia również, dlaczego ta sama oferta może zostać zaakceptowana lub odrzucona w zależności od prezentacji.
    when_to_use:
      - podejmowanie_decyzji
      - negocjacje
      - przywództwo
      - ocena_ryzyka
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Ten sam wynik ujęty jako zysk vs. strata daje różne wybory.
      presentation_dependence: |
        Decyzje zmieniają się, gdy zmienia się tylko sposób ujęcia, a nie istota sprawy.
      default_influence: |
        Sposób uporządkowania lub nazwania opcji wpływa na wybory.
      emotional_trigger: |
        Pewne sposoby ujęcia wywołują silniejsze reakcje emocjonalne.
    examples:
      medical: |
        "90% przeżycia" vs. "10% śmiertelności" dla tej samej procedury—
        ludzie wybierają inaczej w zależności od sposobu ujęcia.
      sales: |
        "Oszczędź 50 zł" vs. "Nie stracić 50 zł"—równoważne sposoby ujęcia, inny
        wpływ psychologiczny.
      policy: |
        "Ulga podatkowa" vs. "wydatki rządowe"—ta sama polityka, inna
        reakcja polityczna.
      negotiation: |
        Przedstawienie oferty jako "rabatu" vs. "unikania dopłaty"
        zmienia wskaźniki akceptacji.
    real_world_implications: |
      Efekt ramowania jest wykorzystywany w reklamie, polityce i
      negocjacjach. Wpływa na decyzje medyczne i poparcie dla polityki.
      Zmiana sposobu ujęcia może poprawić decyzje i komunikację. Świadomość
      pomaga, ale nie eliminuje efektu całkowicie.
    professional_application:
      networking_and_relationship_building: |
        Przy prezentowaniu opcji rozważ wiele sposobów ujęcia. Sprawdź, jak
        różne sposoby ujęcia wpływają na odbiór. Odbierając informacje,
        zapytaj: "Jak inaczej można by to ująć?"
      collaborative_learning_initiative: |
        Przy podejmowaniu decyzji jawnie przeformułuj opcje, aby sprawdzić
        efekty ramowania. "Gdybyśmy ujęli to jako stratę, czy zdecydowalibyśmy
        inaczej?" Stosuj spójne ujęcia dla sprawiedliwości.
    how_can_this_be_misapplied:
      manipulation: |
        Celowe ramowanie w celu skierowania ludzi ku pożądanym wynikom
        bez ich wiedzy.
      false_equivalence: |
        Zakładanie, że wszystkie sposoby ujęcia są równie ważne, gdy niektóre z nich zamazują
        ważne informacje.
      overcorrection: |
        Całkowite ignorowanie ramowania i zakładanie, że nie ma ono znaczenia—
        ma znaczenie.
      spin: |
        Używanie ramowania do wprowadzania w błąd, a nie do wyjaśniania.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Podstawowy błąd atrybucji
    quick_introduction: |
      Podstawowy błąd atrybucji to tendencja do przypisywania zachowania innych ludzi ich charakterowi lub osobowości, podczas gdy własne zachowanie przypisujemy czynnikom sytuacyjnym. Osądzamy innych na podstawie ich działań, a siebie na podstawie naszych intencji.
    one_liner: Osądzamy innych na podstawie ich działań, a siebie na podstawie naszych intencji.
    try_this:
      - Kiedy ktoś cię frustruje, zapytaj: Jakie czynniki sytuacyjne mogą to wyjaśnić?
      - Zastosuj wobec innych taką samą hojność, jaką stosujesz wobec siebie.
      - Zauważ, kiedy przypisujesz zachowanie innych do charakteru, a nie do okoliczności.
    ask_yourself:
      - Czy wyjaśniałbym swoje własne zachowanie tak samo, jak wyjaśniam ich?
      - Co mogę przegapiać w ich sytuacji?
    in_more_detail: |
      Kiedy ktoś nam zajeżdża drogę, myślimy "co za dupek". Kiedy my zajeżdżamy komuś drogę, myślimy "musiałem – spieszyło mi się". Własne porażki wyjaśniamy okolicznościami ("korek był straszny"), a porażki innych – usposobieniem ("są leniwi"). Odwrotnie jest w przypadku sukcesu: przypisujemy go sobie, sukcesy innych przypisujemy szczęściu.

      Błąd jest "podstawowy", ponieważ jest wszechobecny i uporczywy. Podważa empatię, podsycawpór i wypacza ocenę wyników.
    why_this_is_important: |
      Rozpoznawanie podstawowego błędu atrybucji poprawia relacje, zmniejsza konflikty i prowadzi do bardziej sprawiedliwych ocen. Zachęca do rozważenia kontekstu przed stwierdzeniem, że ktoś "jest" taki czy inny.
    when_to_use:
      - budowanie_relacji
      - rozwiązywanie_konfliktów
      - przywództwo
      - podejmowanie_decyzji
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "On/ona po prostu taki/taka jest" przy wyjaśnianiu zachowania innych.
      situational_explanation_for_self: |
        "Nie miałem/miałam wyboru" lub "Okoliczności mnie zmusiły" przy wyjaśnianiu własnych.
      character_vs_context: |
        Zakładanie, że zachowanie wynika z charakteru, gdy sytuacja mogłaby je wyjaśnić.
      asymmetric_standards: |
        Stosowanie wobec innych surowszych standardów niż wobec siebie.
    examples:
      traffic: |
        Błąd innego kierowcy = "zły kierowca". Nasz błąd = "sytuacja nieunikniona".
      workplace: |
        Niedotrzymanie terminu przez kolegę = "nieodpowiedzialny". Nasze niedotrzymanie terminu = "przeciążony i nikt inny nie mógłby zrobić lepiej".
      politics: |
        Poglądy przeciwników = "są głupi lub źli". Nasze poglądy = "racjonalna odpowiedź na fakty".
      performance: |
        Sukces innych = "szczęście". Nasz sukces = "zdobyty dzięki ciężkiej pracy".
    real_world_implications: |
      Podstawowy błąd atrybucji podsycawpór, podważa pracę zespołową i wypacza ocenę rekrutacji i wyników pracy. Korekta w tym zakresie poprawia kulturę organizacyjną i relacje osobiste.
    professional_application:
      networking_and_relationship_building: |
        Kiedy ktoś cię rozczaruje, zapytaj "Jakie czynniki sytuacyjne mogą to wyjaśnić?", zanim stwierdzisz, że jest niewiarygodny lub trudny.
      collaborative_learning_initiative: |
        W informacjach zwrotnych i ocenach zachęcaj do interpretacji "najpierw sytuacja". Szkol menedżerów, aby rozważali kontekst przed przypisaniem go do charakteru.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Odrzucanie każdego działania jako "sytuacyjnego", gdy niektóre zachowania rzeczywiście odzwierciedlają charakter.
      no_accountability: |
        Używanie błędu do unikania pociągania ludzi do odpowiedzialności za wybory, których dokonali.
      self_deprecation: |
        Nadmierne korygowanie do zawsze obwiniania siebie i nigdy nie uznawania odpowiedzialności innych.
      ignoring_patterns: |
        Gdy ktoś wielokrotnie zachowuje się źle w różnych sytuacjach, usposobienie może być istotne.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Błąd gracza
    quick_introduction: |
      Błąd gracza to błędne przekonanie, że przeszłe niezależne zdarzenia
      wpływają na przyszłe. Po serii orłów myślimy, że reszka jest "blisko" –
      mimo że każdy rzut jest niezależny. Widzimy wzorce w losowości i
      oczekujemy "korekty" lub "powrotu", gdy żadna nie jest wymagana.
    one_liner: Przeszłe niezależne zdarzenia nie wpływają na przyszłe – moneta nie ma pamięci.
    try_this:
      - Kiedy myślisz "należy mi się wygrana", zapytaj: Czy te zdarzenia są faktycznie niezależne?
      - Rozróżnij powrót do średniej (rzeczywisty) od błędu gracza (fałszywy).
      - Zwróć uwagę, kiedy widzisz wzorce w losowości.
    ask_yourself:
      - Czy zakładam, że przeszłe wyniki wpływają na przyszłe, gdy są one niezależne?
      - Czy statystyk zgodziłby się z moim rozumowaniem "należy się zmiana"?
    in_more_detail: |
      W uczciwym rzucie monetą każdy rzut jest niezależny. Prawdopodobieństwo
      orła wynosi zawsze 50%, niezależnie od przeszłych wyników. Ale czujemy, że
      długa seria jednego wyniku sprawia, że drugi jest bardziej prawdopodobny.
      Mylimy prawo wielkich liczb (w wielu próbach wyniki uśredniają się) z
      krótkoterminową "korektą". Kasyno nie ma pamięci.

      Błąd ten wpływa na hazard, inwestowanie i codzienne podejmowanie
      decyzji. Zakładamy, że "szczęście" się wyrówna lub że "należy nam się"
      wygrana. Czasem mamy rację – ale z niewłaściwych powodów.
    why_this_is_important: |
      Rozpoznawanie błędu gracza zapobiega kosztownym błędom w hazardzie
      i inwestowaniu. Pomaga również unikać nadinterpretacji krótkich serii
      i oczekiwania fałszywego powrotu. Odróżnia rzeczywisty powrót
      do średniej od błędu.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - ocena_ryzyka
      - rozwiazywanie_problemow
    how_can_you_spot_it:
      due_for_a_change: |
        "Mieliśmy tyle strat – należy nam się wygrana."
      pattern_in_randomness: |
        Widzenie znaczących wzorców w losowych sekwencjach.
      hot_hand_fallacy: |
        Przekonanie, że seria będzie kontynuowana (pokrewny, ale odwrotny błąd).
      independence_ignorance: |
        Traktowanie niezależnych zdarzeń tak, jakby były powiązane.
    examples:
      gambling: |
        Po kilku czerwonych na ruletce, obstawianie czarnego, ponieważ "czerwony nie może ciągle wypadać".
      investing: |
        "Rynek spadał – musi wzrosnąć."
      hiring: |
        "Zatrudniliśmy kilku złych kandydatów – następny na pewno będzie dobry."
      sports: |
        "Tak wiele razy chybił – należy mu się następny rzut."
    real_world_implications: |
      Błąd gracza powoduje straty w hazardzie i złe decyzje inwestycyjne.
      Wyjaśnia również, dlaczego nadinterpretujemy krótkoterminowe wzorce.
      Odróżnienie go od rzeczywistego powrotu do średniej (gdzie istnieje
      rzeczywista średnia, do której należy wrócić) jest ważne.
    professional_application:
      networking_and_relationship_building: |
        Nie zakładaj, że przeszła dynamika relacji "skoryguje się" w
        przyszłości – każda interakcja jest w pewnym stopniu niezależna. Ale ucz się
        z wzorców, gdy istnieje rzeczywista przyczyna leżąca u ich podstaw.
      collaborative_learning_initiative: |
        Przy ocenie wyników rozróżnij losowe wahania od
        systematycznej zmiany. Krótkie serie mogą być szumem; nie reaguj
        nadmiernie na "serie" ani nie oczekuj fałszywego powrotu.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Czasami powrót do średniej jest rzeczywisty (np. wyniki umiejętności).
        Nie odrzucaj całego powrotu jako błędu gracza.
      false_independence: |
        Zakładanie, że zdarzenia są niezależne, gdy tak nie jest (np. powtarzane
        pomiary tej samej rzeczy).
      overcorrection: |
        Nigdy nie oczekiwanie powrotu, gdy istnieje rzeczywista średnia, do której należy wrócić.
      dismissing_patterns: |
        Niektóre wzorce są rzeczywiste – nie cała sekwencja jest losowa.
    related_content:
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Myślenie grupowe
    quick_introduction: |
      Myślenie grupowe to tendencja spójnych grup do przedkładania konsensusu i harmonii
      nad krytyczną ocenę. Członkowie tłumią odmienność zdań, samocenzurują się i
      dostosowują do postrzeganego poglądu grupy. Pragnienie jednomyślności przeważa
      nad pragnieniem najlepszej decyzji.
    one_liner: Harmonia ponad prawdą – grupy przedkładają konsensus nad krytyczną ocenę.
    try_this:
      - Przydziel adwokata diabła; spraw, by odmienność zdań była oczekiwana i bezpieczna.
      - Zapytaj: Czego nie mówimy? Co byśmy powiedzieli, gdybyśmy nie byli w tej grupie?
      - Szukaj zewnętrznych perspektyw przed sfinalizowaniem decyzji grupowych.
    ask_yourself:
      - Czy samocenzuruję się, aby utrzymać harmonię?
      - Czy nasz konsensus jest prawdziwy, czy wynikiem presji na zgodę?
    in_more_detail: |
      Irving Janis badał porażki w polityce zagranicznej (Inwazja w Zatoce Świń, Wietnam) i
      zidentyfikował wzorce: iluzja niezwyciężoności, zbiorowa
      racjonalizacja, presja na konformizm, samocenzura, iluzja jednomyślności i
      strażnicy umysłu, którzy chronią grupę przed sprzecznymi
      informacjami. Wysoka spójność, izolacja i stres zwiększają myślenie grupowe.

      Myślenie grupowe prowadzi do złych decyzji, ponieważ alternatywy nie są
      poważnie rozważane. Odmienność zdań jest postrzegana jako nielojalność. Grupa
      przecenia swoją słuszność i nie docenia ryzyka.
    why_this_is_important: |
      Rozpoznanie myślenia grupowego pomaga w tworzeniu warunków do lepszego
      podejmowania decyzji: zachęcaj do odmienności zdań, wprowadzaj zewnętrzne perspektywy
      i unikaj przedwczesnego konsensusu. Jest to kluczowe dla uniknięcia
      katastrofalnych porażek grupowych.
    when_to_use:
      - przywództwo
      - podejmowanie_decyzji
      - rozwiązywanie_problemów
      - rozwiązywanie_konfliktów
    how_can_you_spot_it:
      pressure_for_consensus: |
        Odmienność zdań jest zniechęcana lub karana; zgoda jest nagradzana.
      illusion_of_unanimity: |
        Cisza jest interpretowana jako zgoda, gdy może być samocenzurą.
      collective_rationalization: |
        Grupa odrzuca ostrzeżenia i wzmacnia swój pogląd.
      mindguards: |
        Członkowie chronią grupę przed informacjami, które podważałyby
        konsensus.
    examples:
      bay_of_pigs: |
        Doradcy Kennedy'ego tłumili wątpliwości dotyczące planu inwazji;
        rezultatem była katastrofa.
      corporate_decisions: |
        Zespół kierowniczy forsował fuzję pomimo czerwonych flag,
        ponieważ nikt nie chciał być tym, który się sprzeciwia.
      product_launches: |
        Zespół wprowadza na rynek wadliwy produkt, ponieważ wszyscy zainwestowali
        w plan i nikt nie zgłasza obaw.
      boards: |
        Członkowie zarządu zatwierdzają propozycje kierownictwa, aby utrzymać
        harmonię.
    real_world_implications: |
      Myślenie grupowe przyczynia się do porażek politycznych, katastrof korporacyjnych
      i utraconych szans. Jest szczególnie niebezpieczne w sytuacjach wysokiego ryzyka
      i stresu. Zapobieganie mu wymaga świadomych
      interwencji strukturalnych.
    professional_application:
      networking_and_relationship_building: |
        Stwórz psychologiczne bezpieczeństwo dla odmienności zdań. Dziękuj osobom, które
        zgłaszają obawy. Modeluj odmienność zdań bez bycia nieprzyjemnym.
      collaborative_learning_initiative: |
        Używaj adwokata diabła, czerwonych zespołów i "premortems". Wymagaj,
        aby ktoś argumentował przeciwko dominującemu poglądowi. Wprowadzaj
        zewnętrzne perspektywy. Lider mówi ostatni, aby uniknąć zakotwiczenia.
    how_can_this_be_misapplied:
      false_dissent: |
        Tworzenie "wyznaczonych dysydentów", którzy nie zgadzają się w rzeczywistości –
        grupa to zauważa.
      excessive_conflict: |
        Zachęcanie do odmienności zdań do punktu niszczycielskiego konfliktu
        i paraliżu.
      dismissing_consensus: |
        Zakładanie, że każdy konsensus to myślenie grupowe – czasem grupa
        ma rację.
      individualism: |
        Nadmierne korygowanie do punktu, w którym żadna decyzja zbiorowa
        nie jest możliwa.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Efekt aureoli
    quick_introduction: |
      Efekt aureoli to tendencja do pozwolenia, aby jedna pozytywna cecha lub wrażenie
      wpływało na naszą ogólną ocenę osoby. Jeśli podoba nam się wygląd kogoś,
      możemy założyć, że jest kompetentny. Jeśli podziwiamy jedną umiejętność,
      zakładamy, że jest dobry we wszystkim. Jedna pozytywna cecha rzuca "aureolę"
      na resztę.
    one_liner: Jedna pozytywna cecha rzuca aureolę na całą naszą ocenę osoby.
    try_this:
      - Oceniaj cechy niezależnie – nie pozwól, aby jedna mocna strona implikowała inne.
      - Zauważaj, kiedy atrakcyjność, charyzma lub jeden sukces zabarwia Twój pogląd.
      - Zapytaj: Czy ocenił(a)bym tę osobę tak samo bez tej jednej pozytywnej cechy?
    ask_yourself:
      - Czy generalizuję z jednej cechy na całą osobę?
      - Czy zauważył(a)bym słabości, gdybym nie był(a) pod wrażeniem jednej mocnej strony?
    in_more_detail: |
      Edward Thorndike zauważył, że oficerowie wojskowi, którzy wysoko oceniali żołnierzy
      pod względem jednej cechy, mieli tendencję do oceniania ich wysoko pod względem innych – nawet niezwiązanych cech. Generalizujemy z części na całość. Atrakcyjność,
      charyzma lub sukces w jednej dziedzinie tworzy aureolę, która się rozlewa.

      Odwrotność – jedna negatywna cecha zabarwiająca wszystko – jest czasem nazywana
      "efektem rogów". Oba są formami nieuzasadnionej generalizacji.
      Efekt aureoli wpływa na rekrutację, oceny pracownicze i codzienne
      wrażenia.
    why_this_is_important: |
      Rozpoznanie efektu aureoli pomaga dokonywać dokładniejszych ocen
      i unikać nadmiernej generalizacji. Jest to niezbędne dla uczciwej rekrutacji,
      zarządzania wydajnością i oceny relacji. Jedna mocna strona nie implikuje
      wszystkich mocnych stron.
    when_to_use:
      - podejmowanie_decyzji
      - przywództwo
      - budowanie_relacji
      - rekrutacja
    how_can_you_spot_it:
      trait_spillover: |
        Jedna pozytywna cecha wpływa na ocenę niezwiązanych cech.
      attractiveness_bias: |
        Atrakcyjni ludzie są oceniani wyżej pod względem kompetencji, wiarygodności itp.
      success_generalization: |
        Sukces w jednym obszarze prowadzi do domniemanej kompetencji w innych.
      first_impression_dominance: |
        Wczesne pozytywne wrażenie zabarwia wszystkie kolejne oceny.
    examples:
      hiring: |
        Kandydat, który jest elokwentny i sympatyczny, jest uważany za
        silnego technicznie – nawet gdy umiejętności są niezwiązane.
      performance_reviews: |
        Jeden wyróżniający się projekt prowadzi do wysokich ocen we wszystkich wymiarach.
      politics: |
        Charyzma polityka prowadzi do domniemanej kompetencji w zakresie polityki.
      branding: |
        Sukces firmy w jednym produkcie prowadzi do domniemanej jakości
        wszystkich produktów.
    real_world_implications: |
      Efekt aureoli zniekształca decyzje dotyczące rekrutacji, oceny pracowniczej i
      inwestycji. Forymuje osoby atrakcyjne, elokwentne i już odnoszące sukcesy.
      Zmniejszenie go wymaga ustrukturyzowanej oceny
      i rozdzielenia wymiarów.
    professional_application:
      networking_and_relationship_building: |
        Oceniaj ludzi według konkretnych wymiarów, a nie ogólnego
        wrażenia. Bądź świadomy, gdy jedna pozytywna cecha wpływa na
        Twoją ocenę innych. Szukaj dowodów zaprzeczających.
      collaborative_learning_initiative: |
        Używaj ustrukturyzowanych wywiadów i ocen, które oceniają wymiary
        niezależnie. Kalibruj oceny między oceniającymi. Zmniejsz
        zależność od ogólnego "intuicyjnego przeczucia".
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Nie każde pozytywne wrażenie to efekt aureoli – czasami ludzie są
        naprawdę silni w wielu wymiarach.
      false_objectivity: |
        Zakładanie, że możemy w pełni wyeliminować efekt aureoli – jest
        wszechobecny i częściowo automatyczny.
      overcorrection: |
        Przejście w przeciwną skrajność i założenie, że atrakcyjne lub
        charyzmatyczne osoby są mniej kompetentne.
      stereotyping: |
        Używanie "efektu aureoli" do odrzucania uzasadnionych pozytywnych cech.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Brzytwa Hanlona
    quick_introduction: |
      Brzytwa Hanlona głosi: "Nigdy nie przypisuj złym zamiarom tego, co można wytłumaczyć
      głupotą." Innymi słowy, nie zakładaj złych intencji, gdy zachowanie można wytłumaczyć
      niekompetencją, przeoczeniem lub niewiedzą.
    one_liner: Nie zakładaj złych intencji, gdy można je wytłumaczyć niekompetencją lub przeoczeniem.
    try_this:
      - Kiedy ktoś Cię frustruje, zapytaj: Czy można to wytłumaczyć błędem lub niewiedzą?
      - Stosuj prostsze wyjaśnienie, zanim zaczniesz zakładać złe intencje.
      - Zwracaj uwagę, kiedy skłaniasz się ku myśli "chcieli mi zaszkodzić".
    ask_yourself:
      - Czy przypisuję złym zamiarom to, co można wytłumaczyć głupotą?
      - Czy chciał(a)bym otrzymać takie samo domniemanie dobrej woli w ich sytuacji?
    in_more_detail: |
      Zasada ta zachęca do dawania ludziom domniemania dobrej woli. Kiedy czyjeś działania
      szkodzą lub frustrują, często domyślnym założeniem jest, że chcieli nam zaszkodzić.
      Brzytwa Hanlona sugeruje, że wiele takich działań wynika z niedbalstwa, braku
      informacji lub słabego wykonania – a nie złej woli.

      Nie oznacza to, że zła wola nigdy nie istnieje. Oznacza to, że nie powinniśmy
      pochopnie przyjmować najgorszej interpretacji, gdy pasuje prostsza. Brzytwa
      zmniejsza paranoję, poprawia relacje i pomaga nam konstruktywniej reagować na problemy.
    why_this_is_important: |
      Stosowanie Brzytwy Hanlona zmniejsza konflikty, zachowuje relacje i koncentruje
      energię na rozwiązywaniu problemów zamiast obwinianiu. Chroni również przed
      stresem wynikającym z zakładania, że wszyscy chcą Cię skrzywdzić.
    when_to_use:
      - rozwiązywanie_konfliktów
      - przywództwo
      - budowanie_relacji
      - podejmowanie_decyzji
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Natychmiast interpretujesz negatywny wynik jako celowe działanie.
      personalizing_mistakes: |
        Kiedy coś idzie nie tak, zakładasz, że było skierowane przeciwko Tobie osobiście.
      ignoring_alternative_explanations: |
        Nie bierzesz pod uwagę niekompetencji, nieporozumień lub przeoczeń jako możliwości.
      escalation_before_inquiry: |
        Reagujesz gniewem lub odwetem, zanim zapytasz, co się stało.
    examples:
      email_tone: |
        Zakładanie, że lakoniczny e-mail jest pasywno-agresywny, gdy nadawca może być po prostu
        w pośpiechu lub mieć problemy z tonem.
      missed_deadline: |
        Interpretowanie opóźnionego dostarczenia przez kolegę jako sabotaż, gdy mógł
        przejąć za dużo lub napotkać przeszkody.
      policy_decisions: |
        Zakładanie, że niechciana polityka firmy została zaprojektowana, aby zaszkodzić pracownikom,
        gdy może to być niezdarna próba rozwiązania innego problemu.
      traffic: |
        Zakładanie, że inny kierowca zajechał Ci drogę celowo, gdy mógł Cię nie zauważyć.
    real_world_implications: |
      Brzytwa Hanlona poprawia kulturę pracy, zmniejsza liczbę sporów sądowych i sprawia,
      że rozwiązywanie konfliktów jest skuteczniejsze. Nadmierne użycie może usprawiedliwiać
      zaniedbania; niedostateczne użycie tworzy niepotrzebne konflikty.
    professional_application:
      networking_and_relationship_building: |
        Kiedy ktoś Cię rozczaruje, poproś o wyjaśnienie, zanim zaczniesz zakładać złe intencje.
        Zachowaj relacje, stosując domniemanie dobrej woli.
      collaborative_learning_initiative: |
        W zespołach stwórz kulturę, w której zakłada się, że błędy są niezamierzone, dopóki
        nie udowodni się inaczej. Skup się na systemach i procesach, a nie na obwinianiu.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Odrzucanie powtarzającej się niekompetencji lub niedbalstwa jako "nie złej woli", gdy
        wymaga to odpowiedzialności.
      ignoring_genuine_malice: |
        Tak rygorystyczne stosowanie brzytwy, że przeoczasz prawdziwych szkodników lub toksyczne
        zachowanie.
      avoiding_difficult_conversations: |
        Używanie Brzytwy Hanlona jako wymówki, aby nie zajmować się problemami z wydajnością.
      gaslighting_victims: |
        Mówienie komuś, kto został prawdziwie skrzywdzony, że "zakłada złą wolę", gdy zła wola
        była obecna.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
  - id: hawthorne_effect
    name: Efekt Hawthorne'a
    quick_introduction: |
      Efekt Hawthorne'a to tendencja ludzi do modyfikowania swojego zachowania,
      gdy wiedzą, że są obserwowani lub badani. Sam akt obserwacji
      może spowodować zmianę — niekoniecznie interwencję, która jest testowana.
      Ludzie reagują na okazywaną im uwagę.
    one_liner: Obserwacja zmienia zachowanie — sama uwaga może spowodować efekt.
    try_this:
      - Podczas oceny interwencji rozważ, czy obserwacja jest siłą napędową wyników.
      - Zauważ, że uwaga i poczucie bycia docenionym mogą poprawić wydajność.
      - Bądź ostrożny przy przypisywaniu zmian konkretnej interwencji, gdy obserwacja się zmieniła.
    ask_yourself:
      - Czy to ulepszenie pochodzi z interwencji, czy z bycia obserwowanym?
      - Czy wyniki utrzymałyby się, gdybyśmy przestali zwracać uwagę?
    in_more_detail: |
      W fabryce Hawthorne Works badacze odkryli, że produktywność
      wzrastała, gdy zmieniano oświetlenie — a także gdy przywracano je do pierwotnego stanu.
      Poprawa wydawała się pochodzić z uwagi i obserwacji, a nie
      z konkretnej interwencji. Późniejsza ponowna analiza sugerowała, że efekt mógł
      być zawyżony, ale koncepcja pozostaje użyteczna: bycie badanym
      zmienia zachowanie.

      Efekt Hawthorne'a komplikuje badania i ewaluację. Może
      zawyożyć postrzegany wpływ interwencji. Sugeruje również, że
      uwaga i poczucie bycia docenionym mogą poprawić wydajność — lekcja dla
      zarządzania.
    why_this_is_important: |
      Zrozumienie efektu Hawthorne'a pomaga interpretować wyniki badań,
      projektować lepsze eksperymenty i dostrzec, że sama uwaga
      może napędzać zmianę. W zarządzaniu sugeruje, że zwracanie
      uwagi na ludzi może być równie ważne, jak konkretna interwencja.
    when_to_use:
      - przywództwo
      - podejmowanie_decyzji
      - uczenie_sie
      - rozwiązywanie_problemów
    how_can_you_spot_it:
      observation_induced_change: |
        Zachowanie zmienia się, gdy ludzie wiedzą, że są obserwowani lub badani.
      attention_effect: |
        Sam akt zwracania uwagi powoduje poprawę, a nie tylko
        konkretną zmianę.
      placebo_analog: |
        Podobnie jak placebo, "leczenie" w postaci bycia badanym może mieć efekty.
      short_term_improvement: |
        Poprawa może minąć, gdy obserwacja się zakończy.
    examples:
      workplace_studies: |
        Wzrost produktywności podczas badania — czy to nowy proces, czy
        to, że ktoś patrzy?
      medical_trials: |
        Grupy placebo poprawiają się — częściowo dlatego, że otrzymują uwagę.
      education: |
        Uczniowie radzą sobie lepiej, gdy obecni są badacze —
        "efekt obserwatora".
      management: |
        Zespoły poprawiają się, gdy zarząd zwraca uwagę — czy to nowa
        inicjatywa, czy sama uwaga?
    real_world_implications: |
      Efekt Hawthorne'a wpływa na trafność badań i ewaluację programów.
      Może prowadzić do przeszacowania efektów interwencji.
      Ma również pozytywną lekcję: uwaga i poczucie bycia badanym
      mogą motywować do poprawy — więc troska i widoczność mają znaczenie.
    professional_application:
      networking_and_relationship_building: |
        Zwracanie uwagi na ludzi może poprawić ich wydajność —
        efekt Hawthorne'a sugeruje, że poczucie bycia obserwowanym i
        docenianym ma znaczenie. Wykorzystaj to pozytywnie: regularne rozmowy,
        widoczność i uznanie.
      collaborative_learning_initiative: |
        Przy ocenie interwencji używaj grup kontrolnych i
        rozważ, czy poprawa wynika z interwencji, czy z uwagi,
        którą ona przynosi. Efekt Hawthorne'a może
        zawyożyć postrzegany sukces.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Używanie "efektu Hawthorne'a" do uzasadnienia ciągłego monitorowania —
        obserwacja może również zmniejszać zaufanie i motywację wewnętrzną.
      dismissing_improvements: |
        Zakładanie, że cała poprawa podczas badań to efekt Hawthorne'a —
        czasem interwencje naprawdę działają.
      overgeneralization: |
        Oryginalne badania Hawthorne'a zostały zakwestionowane;
        efekt może być mniejszy lub inny, niż sądzono.
      manipulation: |
        Tworzenie fałszywej "obserwacji" w celu manipulowania zachowaniem.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Błąd późniejszej wiedzy
    quick_introduction: |
      Błąd późniejszej wiedzy (lub efekt „wiedziałem, że tak będzie”) to tendencja do przekonania,
      że przewidzielibyśmy lub oczekiwalibyśmy danego zdarzenia po tym, jak ono nastąpiło. Rekonstruujemy przeszłość, aby wyniki wydawały się bardziej nieuniknione, niż były w rzeczywistości.
    one_liner: Po fakcie uważamy, że wiedzieliśmy to od dawna.
    try_this:
      - Zanim ocenisz przeszłe decyzje, zapytaj: Co oni wiedzieli w tamtym czasie?
      - Zapisz swoje przewidywania przed wynikami – porównaj później.
      - Zauważ, kiedy sprawiasz, że przeszłość wydaje się bardziej nieunikniona, niż była.
    ask_yourself:
      - Czy oceniam, bazując na informacjach, które nie były wtedy dostępne?
      - Czy faktycznie to przewidziałem, czy po prostu teraz wydaje się to oczywiste?
    in_more_detail: |
      Gdy już znamy wynik, wydaje się on oczywisty. Zapominamy o niepewności, którą odczuwaliśmy wcześniej. Ten błąd zniekształca uczenie się – myślimy, że coś „wiedzieliśmy”, gdy tak naprawdę nie, więc nie aktualizujemy naszych modeli. Prowadzi to również do niesprawiedliwego obwiniania: „Powinni byli to przewidzieć”, gdy przyszłość była naprawdę niepewna.

      Błąd późniejszej wiedzy wpływa na analizy po fakcie, wyroki sądowe i analizy historyczne.
      Oceniamy przeszłe decyzje z perspektywy informacji, które nie były dostępne w tamtym czasie.
    why_this_is_important: |
      Rozpoznanie błędu późniejszej wiedzy poprawia uczenie się na podstawie wyników, uczciwszą ocenę decyzji i dokładniejszą ocenę ryzyka. Zapobiega fałszywej pewności co do naszych zdolności przewidywania.
    when_to_use:
      - podejmowanie_decyzji
      - uczenie_sie
      - ocena_ryzyka
      - przywodztwo
    how_can_you_spot_it:
      inevitability_feeling: |
        Po zdarzeniu wydaje się, że „musiało” się ono wydarzyć.
      reconstructed_certainty: |
        Pamiętamy, że byliśmy bardziej pewni przed zdarzeniem, niż w rzeczywistości byliśmy.
      blame_for_failure: |
        „Powinni byli to wiedzieć”, gdy wynik był naprawdę niepewny.
      undervaluing_luck: |
        Przypisywanie wyników umiejętnościom lub przewidywaniom, gdy rolę odegrał przypadek.
    examples:
      investing: |
        „Wiedziałem, że rynek się załamie” po tym, jak się załamał – gdy nie podjąłeś działań na podstawie tej „wiedzy” wcześniej.
      project_failures: |
        „Powinniśmy byli dostrzec ryzyko” w analizie po fakcie, gdy ryzyko było naprawdę niejednoznaczne.
      elections: |
        Po zaskakującym wyniku, eksperci wyjaśniają, dlaczego „było to oczywiste” po fakcie.
      medical: |
        „Objawy były widoczne” po zdiagnozowaniu rzadkiej choroby po fakcie.
    real_world_implications: |
      Błąd późniejszej wiedzy zniekształca odpowiedzialność prawną, ocenę wyników pracy i uczenie się.
      Sprawia, że jesteśmy zbyt pewni siebie w ocenie i niesprawiedliwi wobec tych, którzy podjęli rozsądne decyzje przy ograniczonych informacjach.
    professional_application:
      networking_and_relationship_building: |
        Oceniając przeszłe decyzje innych, świadomie oddzielaj to, co było wtedy znane, od tego, co wiesz teraz. Unikaj „mówiłem ci”, gdy faktycznie nie przewidziałeś wyniku.
      collaborative_learning_initiative: |
        W analizach po fakcie stosuj techniki „przedmortem” lub „dziennik decyzji”, aby uchwycić niepewność w momencie podejmowania decyzji. Porównaj rzeczywistą niepewność z rekonstrukcją po fakcie.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Odrzucanie każdego niepowodzenia jako „nieprzewidywalnego”, gdy niektóre były przewidywalne.
      no_accountability: |
        Wykorzystywanie błędu późniejszej wiedzy do unikania pociągania ludzi do odpowiedzialności za zaniedbania.
      false_uncertainty: |
        Nadmierne korygowanie, aby wierzyć, że nigdy niczego nie można przewidzieć.
      undermining_learning: |
        Odmawianie wyciągania wniosków, ponieważ „po fakcie wszystko jest jasne” – nadal możemy uczyć się na podstawie wyników.
    related_content:
      - narrative_fallacy
      - survivorship_bias
  - id: hyperbolic_discounting
    name: Dyskontowanie hiperboliczne
    quick_introduction: |
      Dyskontowanie hiperboliczne to tendencja do preferowania mniejszych, wcześniejszych nagród
      nad większymi, późniejszymi – i do zdyskontowania przyszłości w sposób bardziej stromy niż
      przewidują racjonalne modele. Przeceniamy teraźniejszość i niedoceniamy
      przyszłości w niespójny sposób.
    one_liner: Wolimy mniejsze i wcześniejsze nagrody niż większe i późniejsze – i dyskontujemy przyszłość w sposób niespójny.
    try_this:
      - Pre-Commitment: podejmuj decyzje za swojego przyszłego siebie, gdy jesteś w spokojnym stanie.
      - "Przeformułuj: „Czy chciałbym tego za 10 minut? Za 10 miesięcy?” aby ujawnić niespójność."
      - Używaj mechanizmów zobowiązania, aby związać swojego przyszłego siebie do lepszych wyborów.
    ask_yourself:
      - Czy przeceniam teraźniejszość kosztem mojego przyszłego ja?
      - Czy podjąłbym tę decyzję, gdyby nagroda była opóźniona o dzień? Rok?
    in_more_detail: |
      Możemy preferować 50 zł dzisiaj nad 100 zł za rok, ale także preferować 100 zł za
      dwa lata nad 50 zł za rok – mimo że jest to niespójne. Nasza
      stopa dyskontowa nie jest stała; jest hiperboliczna. Bliska przyszłość jest
      mocno dyskontowana; daleka przyszłość jest dyskontowana mniej stromo. To
      wyjaśnia prokrastynację, uzależnienia i niedostateczne oszczędzanie.

      Tendencja do preferowania teraźniejszości to powiązane pojęcie: nadajemy teraźniejszemu momentowi
      nieproporcjonalnie dużą wagę. Dyskontowanie hiperboliczne wyjaśnia, dlaczego podejmujemy
      zobowiązania, których nie dotrzymujemy, i dlaczego planowanie długoterminowe jest trudne.
    why_this_is_important: |
      Zrozumienie dyskontowania hiperbolicznego pomaga projektować lepsze
      bodźce, zobowiązywać swojego przyszłego siebie i unikać pułapek krótkoterminowych.
      Wyjaśnia, dlaczego prokrastynujemy i dlaczego walczymy z
      długoterminowymi celami.
    when_to_use:
      - podejmowanie_decyzji
      - decyzje_zawodowe
      - inwestowanie
      - przywództwo
    how_can_you_spot_it:
      present_preference: |
        Wybieranie natychmiastowej gratyfikacji zamiast opóźnionych, większych nagród.
      inconsistent_time_preferences: |
        Preferencje, które się odwracają w miarę upływu czasu (np. chcemy przejść na dietę
        jutro, ale dzisiaj jemy).
      commitment_failures: |
        Podejmowanie planów, których nie realizujemy, gdy przyszłość staje się teraźniejszością.
      procrastination: |
        Odkładanie ważnych zadań na rzecz natychmiastowego komfortu.
    examples:
      savings: |
        Wybieranie wydawania teraz zamiast oszczędzania na emeryturę – przyszłość
        wydaje się abstrakcyjna.
      health: |
        Rezygnacja z ćwiczeń dzisiaj dla komfortu, mimo wiedzy, że będziemy żałować
        – jutrzejszy żal jest dyskontowany.
      addiction: |
        Wybieranie natychmiastowego haju zamiast długoterminowego zdrowia.
      deadlines: |
        Nicnierobienie do momentu, gdy termin zbliża się nieubłaganie – wtedy „teraźniejszość” obejmuje
        termin i działamy.
    real_world_implications: |
      Dyskontowanie hiperboliczne wpływa na oszczędności, zdrowie, edukację i
      uzależnienia. Wyjaśnia wiele niepowodzeń w samokontroli. Mechanizmy zobowiązania
      (np. automatyczne oszczędzanie, odpowiedzialność) mogą pomóc poprzez
      ograniczanie przyszłych wyborów.
    professional_application:
      networking_and_relationship_building: |
        Prosząc o przyszłe zobowiązania, twórz odpowiedzialność, która
        czyni przyszłość „teraźniejszą” (np. kontrolne spotkania, terminy). Nie
        zakładaj, że ludzie dotrzymają słowa bez struktury.
      collaborative_learning_initiative: |
        Wykorzystuj mechanizmy zobowiązania: publiczne deklaracje, wstępne zobowiązanie do
        terminów i struktury, które sprawiają, że długoterminowe cele wydają się bardziej
        natychmiastowe. Dziel długie projekty na krótsze etapy.
    how_can_this_be_misapplied:
      excessive_control: |
        Nadmierne ograniczanie wyborów ludzi w imię „pomagania”
        ich przyszłym ja.
      paternalism: |
        Zakładanie, że wiemy, co jest najlepsze dla długoterminowych interesów innych.
      ignoring_present_needs: |
        Odrzucanie uzasadnionych obecnych potrzeb na rzecz abstrakcyjnych
        przyszłych korzyści.
      one_size_fits_all: |
        Ludzie różnią się stopami dyskontowymi; nie każdy potrzebuje tych samych
        mechanizmów zobowiązania.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
  - id: illusion_of_control
    name: Iluzja kontroli
    quick_introduction: |
      Iluzja kontroli to tendencja do przeceniania naszej zdolności do
      wpływania na wyniki. Wierzymy, że mamy większą kontrolę, niż w rzeczywistości —
      nad losowymi zdarzeniami, innymi ludźmi i złożonymi systemami. Mylimy korelację
      z przyczynowością, a działanie z wpływem.
    one_liner: Przeceniamy swoją zdolność wpływania na wyniki — zwłaszcza te losowe.
    try_this:
      - Zapytaj: Co by się stało, gdybym nic nie zrobił? Czy moje działanie faktycznie powoduje wynik?
      - Rozróżnij to, co możesz kontrolować, od tego, czego nie możesz.
      - Zwróć uwagę, kiedy w przesądny sposób łączysz swoje działania z losowymi rezultatami.
    ask_yourself:
      - Czy mylę korelację z przyczynowością?
      - Czy wynik byłby inny, gdybym nie działał?
    in_more_detail: |
      Ludzie czują się pewniej wygrywając na loterii, gdy wybierają
      swoje własne liczby — nawet jeśli nie zmienia to szans. Rzucamy kostką
      mocniej, gdy chcemy uzyskać wysokie wyniki. Myślimy, że nasze rytuały lub zachowania
      wpływają na wyniki, które są faktycznie losowe lub determinowane przez czynniki
      poza nami. Iluzja ta jest pocieszająca; zmniejsza niepokój. Może jednak prowadzić do nadmiernej pewności siebie i złych decyzji.

      Iluzja jest silniejsza, gdy jesteśmy zaangażowani w proces, gdy
      odnotowujemy wczesne sukcesy i gdy zadanie jest nam znane. Wpływa ona na
      inwestowanie, zarządzanie i codzienne życie.
    why_this_is_important: |
      Rozpoznanie iluzji kontroli pomaga skalibrować
      oczekiwania, unikać nadmiernej pewności siebie i skupić wysiłek tam, gdzie faktycznie ma to znaczenie. Wyjaśnia również, dlaczego trwamy przy przesądnych zachowaniach i przeceniamy swój wpływ.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - inwestowanie
      - przywództwo
    how_can_you_spot_it:
      overestimated_influence: |
        Przekonanie, że nasze działania wpływają na wyniki, gdy tak nie jest.
      ritual_superstition: |
        Zachowania, o których myślimy, że wpływają na rezultaty (szczęśliwa koszulka, rutyna przedmeczowa), gdy tak nie jest.
      choice_illusion: |
        Poczucie, że wybór daje nam kontrolę, gdy wybór nie wpływa na wynik.
      action_bias: |
        Preferowanie „zrobienia czegoś” zamiast „czekania”, nawet gdy działanie nie pomaga.
    examples:
      gambling: |
        Wybieranie liczb w loterii wydaje się bardziej kontrolowalne niż
        losowy wybór — szanse są takie same.
      investing: |
        Aktywni inwestorzy przeceniają swoją zdolność do pokonania
        rynku; większość osiąga gorsze wyniki po uwzględnieniu kosztów.
      management: |
        Liderzy przeceniają swój wpływ na wyniki organizacji; wiele czynników jest poza ich kontrolą.
      sports: |
        Fani wierzą, że ich doping wpływa na grę; gracze
        mają szczęśliwe rytuały.
    real_world_implications: |
      Iluzja kontroli wpływa na podejmowanie ryzyka, wytrwałość
      w daremnych wysiłkach i przypisywanie wyników. Może ona motywować do działania (czasami użytecznego), ale także prowadzić do
      zmarnowanego wysiłku i nadmiernej pewności siebie. Kalibracja poprawia jakość decyzji.
    professional_application:
      networking_and_relationship_building: |
        Rozpoznaj, co możesz, a czego nie możesz kontrolować. Skoncentruj energię
        na czynnikach, na które masz wpływ. Nie przypisuj sobie zasług za
        wyniki, których nie spowodowałeś — ani nie obwiniaj za te, którym nie mogłeś zapobiec.
      collaborative_learning_initiative: |
        Podczas planowania rozróżnij czynniki, które można kontrolować, od tych, których nie można.
        Unikaj fałszywej pewności siebie wynikającej z wczesnych zwycięstw. Wykorzystaj
        myślenie probabilistyczne do kalibracji oczekiwań.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Nadmierna korekta w celu uwierzenia, że nie mamy kontroli, gdy mamy znaczący wpływ.
      dismissing_agency: |
        „To wszystko szczęście”, gdy umiejętności i wysiłek mają znaczenie w wielu dziedzinach.
      false_fatalism: |
        Używanie iluzji kontroli do usprawiedliwienia bezczynności.
      one_size_fits_all: |
        Kontrola różni się w zależności od dziedziny; niektóre sytuacje są bardziej
        kontrolowane niż inne.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Tendencja do przeceniania wpływu
    quick_introduction: |
      Tendencja do przeceniania wpływu polega na przecenianiu intensywności i czasu trwania
      naszych reakcji emocjonalnych na przyszłe wydarzenia. Myślimy, że dobre rzeczy uszczęśliwią nas bardziej niż faktycznie, a złe rzeczy zasmucą nas bardziej niż faktycznie. Źle przewidujemy swoje emocje.
    one_liner: Przeceniamy, jak bardzo wydarzenia wpłyną na nasze szczęście – i jak długo.
    try_this:
      - Zapytaj: Jak czułem/czułam się po podobnych przeszłych wydarzeniach? Adaptujemy się szybciej, niż przypuszczamy.
      - Nie pozwól, aby przewidywany wpływ kierował decyzjami – źle przewidujemy uczucia.
      - Zwracaj uwagę, kiedy przeceniasz trwały wpływ pojedynczego wyniku.
    ask_yourself:
      - Czy przeceniam, jak długo będę się tak czuć?
      - Co mówi doświadczenie z przeszłości o podobnych wydarzeniach?
    in_more_detail: |
      Daniel Gilbert i Timothy Wilson badają przewidywanie emocji: przeceniamy, jak długo będziemy czuć się dobrze po wygranej lub źle po przegranej.
      Adaptujemy się szybciej, niż przypuszczamy. Przeceniamy również wpływ
      pojedynczych wydarzeń – myślimy, że jeden wynik zdeterminuje nasze szczęście, podczas gdy wiele czynników się do niego przyczynia. Skupiamy się na niewłaściwych rzeczach, przewidując nasze przyszłe uczucia.

      Tendencja do przeceniania wpływu wpływa na ważne decyzje życiowe: przeceniamy, jak bardzo awans, związek czy zakup zmieni nasze szczęście. Przeceniamy również trwały ból po stratach.
    why_this_is_important: |
      Rozpoznanie tendencji do przeceniania wpływu pomaga podejmować lepsze decyzje dotyczące tego, co faktycznie poprawi twoje życie. Zmniejsza nadmierne inwestowanie w wyniki, które nie będą miały takiego znaczenia, jak myślisz, i zmniejsza strach przed wynikami, które nie będą ranić tak długo, jak się spodziewasz.
    when_to_use:
      - podejmowanie_decyzji
      - zmiany_kariery
      - ocena_ryzyka
      - budowanie_relacji
    how_can_you_spot_it:
      overestimated_impact: |
        "To wszystko zmieni", gdy podobne przeszłe wydarzenia miały niewielki
        trwały wpływ.
      duration_overestimation: |
        "Nigdy się z tego nie podniosę", gdy zazwyczaj adaptujemy się szybciej, niż
        przypuszczamy.
      focalism: |
        Skupianie się na jednym wydarzeniu i ignorowanie innych czynników wpływających
        na dobre samopoczucie.
      adaptation_neglect: |
        Zapominanie, że adaptujemy się zarówno do dobrych, jak i złych okoliczności.
    examples:
      career: |
        "Jeśli dostanę ten awans, będę o wiele szczęśliwszy/szczęśliwsza", gdy przeszłe
        awansy miały tymczasowy wpływ.
      purchases: |
        "Ten samochód uszczęśliwi mnie", gdy nowość szybko mija.
      loss: |
        "Nigdy nie otrząsnę się po tym odrzuceniu", gdy zazwyczaj
        adaptujemy się w ciągu kilku miesięcy.
      events: |
        Przecenianie, jak bardzo ślub, wakacje lub kamień milowy wpłyną na długoterminowe szczęście.
    real_world_implications: |
      Tendencja do przeceniania wpływu prowadzi do złych decyzji dotyczących pieniędzy, kariery i relacji. Przepłacamy za doświadczenia, do których się zaadaptujemy, i nadmiernie boimy się strat, od których się odzyskamy. Wpływa to na politykę i planowanie osobiste.
    professional_application:
      networking_and_relationship_building: |
        Podejmując decyzje dotyczące kariery lub relacji, zastanów się, jak czułeś/czułaś się po podobnych przeszłych wydarzeniach. Czy wpływ trwał tak długo,
        jak oczekiwałeś/oczekiwałaś? Wykorzystaj to do kalibracji przyszłych przewidywań.
      collaborative_learning_initiative: |
        Gdy zespoły napotykają na przeszkody lub sukcesy, przypomnij im o adaptacji.
        "Zaadaptujemy się szybciej, niż myślimy", może zmniejszyć zarówno nadmierne
        świętowanie, jak i nadmierne rozpaczy.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Niektóre wydarzenia mają trwały wpływ – traumy, poważne straty. Nie
        lekceważ przewidywania emocji jako tendencyjne.
      cold_rationality: |
        "To nie ma znaczenia", gdy doświadczenie w danej chwili ma znaczenie.
      undervaluing_experiences: |
        Unikanie pozytywnych doświadczeń, ponieważ "i tak się zaadaptujemy".
      invalidating_emotions: |
        Mówienie ludziom, że ich uczucia miną, gdy potrzebują wsparcia
        w danej chwili.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Wewnątrz-grupowe uprzedzenie
    quick_introduction: |
      Wewnątrz-grupowe uprzedzenie to tendencja do faworyzowania osób, które postrzegamy jako należące do naszej grupy, w porównaniu do osób postrzeganych jako spoza grupy. Przypisujemy członkom grupy pozytywne cechy, a członkom spoza grupy negatywne, często na podstawie minimalnych lub arbitralnych rozróżnień.
    one_liner: Fsupsetujemy członków naszej grupy i surowiej oceniamy grupy zewnętrzne – często arbitralnie.
    try_this:
      - Zapytaj: Czy oceniłbym tę osobę tak samo, gdyby należała do mojej grupy?
      - Aktywnie szukaj perspektyw spoza grupy podczas podejmowania decyzji.
      - Zauważaj, kiedy granice grup wpływają na twoją ocenę.
    ask_yourself:
      - Czy faworyzuję kogoś, bo jest "jednym z nas"?
      - Czy zastosowałbym te same standardy do członka grupy zewnętrznej?
    in_more_detail: |
      Nawet gdy grupy są przydzielane losowo (np. przez rzut monetą), ludzie szybko rozwijają preferencje dla swojej grupy. Bardziej ufamy członkom grupy, hojniej przydzielamy im zasoby i łagodniej oceniamy ich działania. Członkowie grup zewnętrznych otrzymują odwrotne traktowanie.

      Wewnątrz-grupowe uprzedzenie napędza plemienność, dyskryminację i konflikty. Wpływa na rekrutację, awanse, współpracę i politykę. Może być oparte na rasie, narodowości, firmie, zespole lub dowolnej wspólnej tożsamości.
    why_this_is_important: |
      Rozpoznawanie wewnątrz-grupowych uprzedzeń pomaga podejmować sprawiedliwsze decyzje, budować bardziej inkluzywne zespoły i unikać faworyzowania. Wyjaśnia również, dlaczego inicjatywy na rzecz różnorodności napotykają na opór – preferencja własnej grupy jest automatyczna.
    when_to_use:
      - przywództwo
      - podejmowanie_decyzji
      - budowanie_relacji
      - rozwiązywanie_konfliktów
    how_can_you_spot_it:
      preferential_treatment: |
        Dawanie "naszym" zaufania co do faktów, ale nie "im".
      resource_allocation: |
        Przydzielanie większej ilości zasobów członkom własnej grupy, gdy członkowie grup zewnętrznych mają równe lub większe potrzeby.
      attribution_asymmetry: |
        Sukces własnej grupy = umiejętności; sukces grupy zewnętrznej = szczęście. Porażka własnej grupy = okoliczności; porażka grupy zewnętrznej = charakter.
      minimal_group_effects: |
        Faworyzowanie pojawia się nawet przy arbitralnym przydzielaniu do grup.
    examples:
      hiring: |
        Preferowanie kandydatów, którzy ukończyli tę samą uczelnię lub dzielą twoje pochodzenie.
      performance_reviews: |
        Bardziej korzystne ocenianie członków własnej grupy w porównaniu do członków grup zewnętrznych o podobnych wynikach.
      collaboration: |
        Ufanie i włączanie "naszego zespołu" przy jednoczesnym wykluczaniu lub wątpieniu w "ich zespół".
      politics: |
        Odrzucanie argumentów grupy zewnętrznej przy jednoczesnym bezkrytycznym przyjmowaniu argumentów własnej grupy.
    real_world_implications: |
      Wewnątrz-grupowe uprzedzenie utrwala nierówności, podważa meritokrację i napędza konflikty. Wpływa na rekrutację, awanse, inwestycje i politykę. Redukcja tego zjawiska wymaga świadomego wysiłku – samo się nie naprawi.
    professional_application:
      networking_and_relationship_building: |
        Aktywnie włączaj osoby spoza swojego najbliższego kręgu. Szukaj zróżnicowanych perspektyw. Kwestionuj, czy faworyzujesz kogoś, bo jest "podobny do ciebie".
      collaborative_learning_initiative: |
        Stosuj ustrukturyzowane procesy (anonimowe oceny, zróżnicowane panele), aby ograniczyć wewnątrz-grupowe uprzedzenia w rekrutacji i ocenie. Twórz projekty międzygrupowe, aby budować wspólną tożsamość.
    how_can_this_be_misapplied:
      forced_diversity: |
        Wprowadzanie kwot lub polityk, które tworzą urazę, nie rozwiązując problemu podstawowych uprzedzeń.
      out_group_hostility: |
        Traktowanie wewnątrz-grupowego uprzedzenia jako jedynego problemu, gdy istnieje również wrogość wobec grup zewnętrznych.
      ignoring_legitimate_differences: |
        Nie wszystkie różnice grupowe są uprzedzeniem – czasami grupy mają różne cechy. Nie zakładaj, że wszystkie dysproporcje są dyskryminacją.
      reverse_discrimination: |
        Nadmierne korygowanie w celu faworyzowania grup zewnętrznych w sposób niesprawiedliwy wobec członków własnej grupy.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Odwrócenie
    quick_introduction: |
      Odwrócenie to technika rozwiązywania problemów, która polega na odwróceniu pytania. Zamiast
      pytać „Jak odnieść sukces?”, zadajesz sobie pytanie „Co doprowadziłoby mnie do porażki?” i unikasz tych rzeczy.
      Ujawnia ryzyka i anty-wzorce, które w codziennym myśleniu często umykają.
    one_liner: Odwróć – zapytaj, co doprowadzi Cię do porażki, a następnie tego unikaj.
    try_this:
      - W odniesieniu do dowolnego celu, wymień główne sposoby, w jakie możesz ponieść porażkę – a następnie ich unikaj.
      - Użyj negatywnej wizualizacji: co mogłoby pójść nie tak?
      - Zapytaj: Co zrobiłaby mądra osoba, aby to wszystko zepsuć?
    ask_yourself:
      - Czy zastanowiłem się, co doprowadzi to do porażki?
      - Czego nie widzę, myśląc tylko do przodu?
    in_more_detail: |
      Spopularyzowane przez Charliego Mungera i zakorzenione w logice matematycznej, odwrócenie wykorzystuje
      fakt, że unikanie porażki jest często łatwiejsze niż dążenie do sukcesu. Jeśli potrafisz
      zidentyfikować główne sposoby, w jakie coś idzie nie tak, możesz je systematycznie eliminować.

      Według doniesień Carl Jacobi powiedział: „Odwracaj, zawsze odwracaj”. Stoicy używali negatywnej
      wizualizacji – wyobrażania sobie straty – aby docenić to, co posiadali i przygotować się na przeciwności.
      Odwrócenie nie jest pesymizmem; to ustrukturyzowany sposób na postęp poprzez usuwanie
      przeszkód.
    why_this_is_important: |
      Odwrócenie pomaga unikać katastrofalnych błędów, testować plany i znajdować
      nieoczywiste rozwiązania. Uzupełnia planowanie do przodu, zapewniając, że nie
      przeoczymy krytycznych trybów awarii.
    when_to_use:
      - rozwiązywanie_problemów
      - podejmowanie_decyzji
      - ocena_ryzyka
      - ruchy_karierze
    how_can_you_spot_it:
      premortem_thinking: |
        Przed projektem zadaj pytanie „Dlaczego to się nie udało?”, jakby już się stało.
      anti_goals: |
        Określenie tego, czego chcesz uniknąć, tak jasno, jak tego, co chcesz osiągnąć.
      reverse_engineering_failure: |
        Studiowanie nieudanych przypadków w celu wyciągnięcia wniosków, zamiast studiowania tylko sukcesów.
      constraint_focus: |
        Identyfikacja ograniczeń i wąskich gardeł przed optymalizacją dla zysku.
    examples:
      investing: |
        Zamiast „Co sprawi, że ta akcja pójdzie w górę?”, zapytaj „Co sprawiłoby, że stracę pieniądze?”
        i unikaj tych scenariuszy.
      career: |
        „Co zrujnowałoby moją reputację?” prowadzi do listy zachowań, których należy unikać.
      product_launch: |
        „Dlaczego większość premier produktów kończy się niepowodzeniem?” ujawnia ryzyka do rozwiązania przed premierą.
      health: |
        „Jakie nawyki skracają długość życia?” daje jaśniejszą listę unikania niż „Co sprawia, że
        jestem zdrowy?”
    real_world_implications: |
      Odwrócenie jest stosowane w inżynierii (analiza trybów awarii), inwestycjach i strategii.
      Zmniejsza nadmierną pewność siebie i poprawia zarządzanie ryzykiem. Nadmierne poleganie może prowadzić do
      nadmiernej ostrożności.
    professional_application:
      networking_and_relationship_building: |
        „Co zaszkodziłoby tej relacji?” pomaga unikać zachowań łamiących zaufanie.
      collaborative_learning_initiative: |
        Przeprowadź analizy post-mortem projektów: „Ten projekt się nie udał. Dlaczego?” Użyj odpowiedzi, aby poprawić
        planowanie i wykonanie.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Koncentrowanie się wyłącznie na unikaniu porażki może sparaliżować działanie i uniemożliwić niezbędne
        podejmowanie ryzyka.
      negativity_bias: |
        Odwrócenie może wzmocnić tendencyjność negatywności, jeśli nie jest zrównoważone z perspektywicznym
        identyfikowaniem możliwości.
      analysis_paralysis: |
        Poświęcanie zbyt wiele czasu na tryby awarii, że nigdy nie dochodzi do realizacji.
      missing_upside: |
        Odwrócenie nie mówi, co robić – tylko czego unikać. Nadal potrzebujesz
        pozytywnych celów.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Prawo malejących przychodów
    quick_introduction: |
      Prawo malejących przychodów stwierdza, że gdy dodajesz więcej jednego czynnika produkcji, podczas gdy inne pozostają niezmienione, dodatkowa produkcja z każdej nowej jednostki nakładu ostatecznie maleje. Więcej nie zawsze znaczy lepiej – istnieje punkt, w którym dodatkowy wysiłek przynosi coraz mniejsze efekty.
    one_liner: Więcej nakładu ostatecznie przynosi mniej wyników – istnieje optymalny punkt.
    try_this:
      - Zapytaj: Czy przekroczyłem punkt, w którym dodatkowy wysiłek przynosi znaczące rezultaty?
      - Priorytetyzuj nakłady o największej dźwigni; zatrzymaj się, gdy malejące przychody spadną.
      - Zauważ, kiedy nadmiernie inwestujesz w coś, co już się opłaciło.
    ask_yourself:
      - Co zyskałbym z jednej dodatkowej jednostki wysiłku tutaj?
      - Czy optymalizuję poza punktem malejących przychodów?
    in_more_detail: |
      W ekonomii dodanie większej liczby pracowników do ograniczonej ilości ziemi ostatecznie prowadzi do mniejszych przyrostów. W produktywności osobistej pierwsza godzina nauki może przynieść większą wartość niż dziesiąta. Zasada ta dotyczy zasobów, wysiłku, czasu i funkcji. Istnieje optymalny punkt; poza nim przychody marginalne spadają, a nawet mogą stać się ujemne.

      Rozpoznanie malejących przychodów pomaga efektywnie alokować zasoby i unikać nadmiernego inwestowania w obszary, które już przyniosły większość swojej wartości.
    why_this_is_important: |
      Zrozumienie malejących przychodów zapobiega nadmiernym inwestycjom, kieruje priorytetyzacją i pomaga wiedzieć, kiedy przestać. Jest to kluczowe dla alokacji zasobów i unikania perfekcjonizmu.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiązywanie_problemów
      - inwestowanie
      - zmiany_w_karierze
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Każda dodatkowa jednostka wysiłku lub zasobu produkuje mniej niż poprzednia.
      perfectionism_trap: |
        Dążenie do ostatnich 10% jakości pochłania nieproporcjonalny wysiłek.
      overinvestment: |
        Kontynuowanie dodawania zasobów, gdy przychód marginalny jest niski lub ujemny.
      optimal_point_passed: |
        Przekroczyłeś punkt, w którym więcej nakładu poprawia wyniki.
    examples:
      studying: |
        Pierwsze 2 godziny przygotowań do egzaminu przynoszą więcej niż godziny 7-8; istnieje punkt malejących przychodów.
      product_features: |
        Dodanie większej liczby funkcji do aplikacji może zdezorientować użytkowników; 20. funkcja dodaje mniej wartości niż 5.
      hiring: |
        Dodanie większej liczby osób do projektu może go spowolnić (Prawo Brooksa) po pewnym punkcie.
      marketing: |
        Podwojenie wydatków na reklamy nie podwaja wyników; przychody maleją w miarę nasycenia rynku.
    real_world_implications: |
      Prawo malejących przychodów kieruje polityką gospodarczą, strategią biznesową i produktywnością osobistą. Ignorowanie go prowadzi do marnotrawstwa zasobów i suboptymalnych wyników. Wspiera zasadę Pareto i koncentrację.
    professional_application:
      networking_and_relationship_building: |
        Inwestowanie w kilka głębokich relacji może przynieść więcej niż rozpraszanie wysiłku na wiele. Rozpoznaj, kiedy dodatkowe nawiązywanie kontaktów przynosi malejące przychody.
      collaborative_learning_initiative: |
        Więcej godzin szkoleniowych nie zawsze oznacza lepsze wyniki. Znajdź optymalną dawkę i unikaj przeciążenia.
    how_can_this_be_misapplied:
      premature_optimization: |
        Zatrzymanie się zbyt wcześnie, zanim osiągnięto rozsądny poziom jakości.
      undershooting: |
        Używanie malejących przychodów jako wymówki dla niewystarczającego wysiłku.
      misidentifying_the_curve: |
        Zakładanie malejących przychodów, gdy faktycznie znajdujesz się na innej części krzywej (np. wczesna faza wykładnicza).
      one_size_fits_all: |
        Stosowanie tego samego "optymalnego punktu" w różnych kontekstach, gdzie krzywe się różnią.
    related_content:
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Awersja do strat
    quick_introduction: |
      We often feel the pain of losing something more intensely than the
      pleasure of gaining something of equal value.
    one_liner: Straty odczuwamy mniej więcej dwukrotnie boleśniej, niż zyski o tej samej wartości dają radości.
    try_this:
      - "Zadaj sobie pytanie: Czy przeceniam to, co mógłbym stracić, w porównaniu do tego, co mógłbym zyskać?"
      - Zmień perspektywę wyboru na zyski zamiast strat i zobacz, czy zmieni się Twój pogląd.
      - Zwróć uwagę, kiedy strach przed stratą bardziej napędza decyzję niż rzeczywista korzyść.
    ask_yourself:
      - Co bym wybrał, gdybym zaczynał od zera?
      - Trzymam się tego ze względu na to, co bym stracił, czy dlatego, że przyszłość jest rzeczywiście lepsza?
    in_more_detail: |
      Opracowana przez Daniela Kahnemana i Amosa Tversky'ego, awersja do strat opisuje, jak straty i zyski
      są postrzegane asymetrycznie. Psychologiczny wpływ utraty 100 dolarów jest zazwyczaj znacznie
      większy niż satysfakcja z zyskania 100 dolarów. Ta stronniczość wpływa na decyzje w obszarach
      finansów, negocjacji i codziennych wyborów, często prowadząc do zachowań unikających ryzyka
      w sytuacjach, gdy potencjalne straty są wyraźne.
    why_this_is_important: |
      Zrozumienie awersji do strat pomaga rozpoznać, kiedy strach przed stratą bardziej napędza decyzje
      niż racjonalna analiza. Wyjaśnia, dlaczego ludzie trzymają się tracących na wartości inwestycji, unikają
      niezbędnych zmian i dokonują suboptymalnych wyborów w negocjacjach i decyzjach zawodowych.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - zmiany_w_karierze
      - ocena_ryzyka
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Zwróć uwagę, kiedy perspektywa utraty czegoś wywołuje nieproporcjonalny niepokój
        lub opór w porównaniu do korzyści z potencjalnego zysku.
      reluctance_to_change: |
        Niechęć do zmiany strategii, odejścia z pracy lub sprzedaży aktywów, nawet gdy
        obiektywna analiza sugeruje, że jest to lepsza opcja.
      framing_sensitivity: |
        Decyzje drastycznie się zmieniają w zależności od tego, czy opcje są przedstawione jako zyski
        czy straty, nawet gdy wyniki są równoważne.
      overvaluing_what_you_have: |
        Efekt posiadania – przypisywanie wyższej wartości rzeczom, które posiadasz, tylko dlatego, że
        je posiadasz – często towarzyszy awersji do strat.
    examples:
      investing: |
        Trzymanie akcji spadających, aby "uniknąć realizacji straty", tracąc przy tym
        lepsze możliwości inwestycyjne gdzie indziej.
      career: |
        Pozostawanie w niesatysfakcjonującej pracy, ponieważ odejście wydaje się stratą bezpieczeństwa,
        nawet gdy nowa okazja oferuje większy rozwój.
      negotiations: |
        Odrzucenie uczciwej oferty, ponieważ jest ona przedstawiona jako "odstąpienie" od czegoś,
        a nie jako "zyskanie" porozumienia.
      product_design: |
        Bezpłatne wersje próbne, które przechodzą w płatne – użytkownicy doświadczają "utraty" usługi,
        gdy wersja próbna się kończy, co motywuje do subskrypcji bardziej niż "zyskanie"
        nowej usługi.
    real_world_implications: |
      Awersja do strat kształtuje rynki, politykę i zachowania jednostek. Wyjaśnia,
      dlaczego ubezpieczenia i gwarancje dobrze się sprzedają, dlaczego ludzie unikają korzystnych zmian
      i dlaczego negatywne wiadomości mają nieproporcjonalny wpływ. Rozpoznanie jej może poprawić
      jakość podejmowanych decyzji i zmniejszyć żal.
    professional_application:
      networking_and_relationship_building: |
        Bądź świadomy, że ludzie mogą opierać się zakończeniu nieproduktywnych relacji lub
        współpracy z powodu awersji do strat – obawiają się "utraty" kontaktu.
        Przedstawiaj nowe możliwości jako zyski, a nie straty, aby zmniejszyć opór.
      collaborative_learning_initiative: |
        Wprowadzając nowe procesy lub narzędzia, podkreślaj to, co zespół zyskuje,
        a nie to, co "traci". Inicjatywy zmian przedstawione jako straty
        często wywołują silniejszy opór.
    how_can_this_be_misapplied:
      manipulation: |
        Wykorzystywanie awersji do strat do naciskania na decyzje – np. oferty "ograniczone czasowo"
        lub ramowanie "nie przegap", które wywołuje strach przed stratą, a nie
        rzeczywistą ocenę wartości.
      misinterpreting_relationships: |
        Zakładanie, że opór osoby wobec zmian jest czysto racjonalny, gdy może on
        być napędzany awersją do strat. Błędne przypisywanie motywów może nadszarpnąć zaufanie.
      overcommitment: |
        Złudzenie kosztów utraconych – kontynuowanie inwestowania w upadający projekt, ponieważ
        "już tyle w to zainwestowaliśmy", zamiast ograniczać straty.
      missed_opportunities_for_conflict_resolution: |
        Odmowa kompromisu, ponieważ jakakolwiek ustępstwo jest postrzegana jako strata,
        nawet gdy alternatywą jest gorszy wynik dla wszystkich.
      vulnerability_to_exploitation: |
        Bycie manipulowanym przez innych, którzy przedstawiają wybory w taki sposób, aby wywołać awersję do strat,
        takie jak taktyki sprzedaży podkreślające to, co "stracisz", jeśli nie działasz.
      reinforcing_negative_perceptions: |
        Nadmierne skupianie się na potencjalnych negatywach może stworzyć pesymistyczną
        perspektywę, która staje się samospełniająca, tracąc możliwości rozwoju.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: Mapa to nie terytorium
    quick_introduction: |
      "Mapa to nie terytorium" oznacza, że reprezentacja rzeczywistości nie jest
      samą rzeczywistością. Modele, teorie i opisy są użytecznymi uproszczeniami,
      ale zawsze coś pomijają. Mylenie mapy z terytorium prowadzi do błędów.
    one_liner: Mapa to nie terytorium — wszystkie modele są błędne; niektóre są użyteczne.
    try_this:
      - Gdy model nie odpowiada rzeczywistości, zaktualizuj mapę — nie zmuszaj rzeczywistości do dopasowania.
      - Zapytaj: Co ten model pomija? Kiedy może zawieść?
      - Traktuj modele jako narzędzia, a nie jako prawdę.
    ask_yourself:
      - Czy mylę mój model z rzeczywistością?
      - Czy terytorium zmieniło się od mojego ostatniego spojrzenia?
    in_more_detail: |
      Alfred Korzybski wprowadził tę ideę w ogólnej semantyce. Mapa miasta jest
      przydatna do nawigacji, ale nie jest miastem — pomija szczegóły,
      starzeje się i nigdy nie może uchwycić wszystkiego. To samo dotyczy modeli
      mentalnych, teorii naukowych i schematów organizacyjnych.

      Wszystkie modele są błędne; niektóre są użyteczne. Niebezpieczeństwo polega
      na traktowaniu modelu jako pełnej prawdy, zwłaszcza gdy terytorium się
      zmieniło. Dobre myślenie wymaga aktualizowania map, gdy rzeczywistość nie
      pasuje.
    why_this_is_important: |
      Rozpoznanie, że mapy różnią się od terytorium, zapobiega nadmiernej
      pewności siebie co do modeli, zachęca do aktualizowania przekonań i
      zmniejsza ryzyko działania na podstawie przestarzałych lub nadmiernie
      uproszczonych informacji.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiazywanie_problemow
      - nauka
      - ocena_ryzyka
    how_can_you_spot_it:
      model_reality_confusion: |
        Traktowanie ram lub teorii tak, jakby w pełni opisywały rzeczywistość.
      outdated_assumptions: |
        Działanie na podstawie informacji lub modeli, które już nie pasują do
        aktualnych warunków.
      oversimplification: |
        Ignorowanie niuansów, ponieważ "mapa" ich nie zawiera.
      map_worship: |
        Obrona modelu, gdy dowody mu zaprzeczają, zamiast jego aktualizacja.
    examples:
      organizational_charts: |
        Zakładanie, że struktura raportowania odzwierciedla faktyczny sposób
        wykonywania pracy.
      financial_models: |
        Traktowanie projekcji arkusza kalkulacyjnego jako prognozy, a nie scenariusza.
      stereotypes: |
        Stosowanie uogólnień na poziomie grupy do jednostek.
      strategy_docs: |
        Wykonywanie planu zgodnie z zapisem, gdy rynek się zmienił.
    real_world_implications: |
      Rozróżnienie mapa-terytorium jest fundamentalne dla nauki, inżynierii i
      filozofii. Leży u podstaw aktualizacji bayesowskiej, metodologii zwinnej i
      pokory epistemicznej. Ignorowanie tego prowadzi do sztywnego myślenia i
      nieudanych strategii.
    professional_application:
      networking_and_relationship_building: |
        Twój model mentalny osoby może być przestarzały. Zaktualizuj go poprzez
        bezpośrednią interakcję, zamiast polegać na starych wrażeniach.
      collaborative_learning_initiative: |
        Zachęcaj zespoły do traktowania planów i modeli jako hipotez do
        przetestowania i rewizji, a nie jako ustalonych prawd.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Dochodzenie do wniosku, że żadna mapa nie jest użyteczna, a cała wiedza jest
        podejrzana.
      constant_revision: |
        Ciągła rewizja, tak że nie wyłania się żadne stabilne zrozumienie.
      dismissing_models: |
        Odrzucanie użytecznych uproszczeń, ponieważ "nie są terytorium".
      relativism: |
        Twierdzenie, że wszystkie mapy są równie ważne, gdy niektóre wyraźnie
        lepiej pasują do terytorium.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: narrative_fallacy
    name: Błąd narracyjny
    quick_introduction: |
      Błąd narracyjny to tendencja do konstruowania historii z przeszłych wydarzeń,
      które sprawiają, że wydają się one bardziej spójne, przewidywalne i znaczące, niż były.
      Retroaktywność do losowości. Zamieniamy chaos historii w uporządkowaną opowieść — a potem wierzymy,
      że ta opowieść była nieunikniona.
    one_liner: Retroaktywność spójnych historii do losowości — a potem wierzymy, że były nieuniknione.
    try_this:
      - Zapytaj: Jak duża część tej historii to retrospekcja? Jaką rolę odegrało szczęście?
      - Bądź sceptyczny wobec uporządkowanych wyjaśnień — przeszłość była bardziej chaotyczna niż nasze historie.
      - Zauważ, kiedy "ma sens" wykonuje pracę "było przewidywalne".
    ask_yourself:
      - Czy konstruuję historię, która sprawia, że przeszłość wydaje się bardziej nieunikniona, niż była?
      - Czy przewidziałbym to przed tym, jak się stało?
    in_more_detail: |
      Nassim Taleb spopularyzował ten termin. Pragniemy narracji — przyczyn i skutków,
      bohaterów i złoczyńców, jasnych łuków. Więc konstruujemy historie, które łączą
      wydarzenia w retrospekcji. Historia wydaje się prawdziwa, ponieważ jest spójna — ale
      spójność nie oznacza, że jest poprawna. Mylimy "ma sens" z
      "było przewidywalne". Niedoceniamy roli szczęścia i
      losowości.

      Błąd narracyjny wpływa na to, jak uczymy się z historii, oceniamy
      sukces i dokonujemy prognoz. Przeważamy moc wyjaśniającą historii i niedoważamy roli przypadku.
    why_this_is_important: |
      Rozpoznanie błędu narracyjnego pomaga unikać nadmiernego uczenia się z
      przeszłości i przeceniania przewidywalności. Zachęca do pokory
      wobec przyczynowości i prognozowania. Nie wszystko, co tworzy dobrą
      historię, jest prawdą lub może być uogólnione.
    when_to_use:
      - podejmowanie_decyzji
      - nauka
      - ocena_ryzyka
      - rozwiązywanie_problemów
    how_can_you_spot_it:
      hindsight_coherence: |
        Przeszłe wydarzenia są wyjaśniane za pomocą uporządkowanej historii, która nie była
        widoczna w tamtym czasie.
      cause_effect_overconfidence: |
        Przypisujemy jasne przyczyny wynikom, które miały wiele
        czynników przyczyniających się.
      luck_minimization: |
        Sukces i porażka są wyjaśniane umiejętnościami i strategią,
        a nie szczęściem.
      story_over_evidence: |
        Przekonująca narracja przyćmiewa dowody statystyczne.
    examples:
      business_success: |
        "Osiągnęli sukces dzięki X", gdy wiele czynników i szczęście
        było zaangażowanych — wybieramy historię, która pasuje.
      investing: |
        Wyjaśnianie ruchów rynkowych za pomocą narracji, które wydają się
        satysfakcjonujące, ale mogą być post-hoc.
      history: |
        Wydarzenia historyczne są opowiadane jako nieuniknione postępy,
        gdy były zależne od wielu czynników.
      career: |
        "Dotarłem tutaj, ponieważ zrobiłem X", gdy szczęście i czas
        odegrały znaczące role.
    real_world_implications: |
      Błąd narracyjny zniekształca naukę, nadmierną pewność siebie
      w prognozowaniu oraz przypisywanie sukcesów i porażek.
      Sprawia, że przeszłość wydaje się bardziej przewidywalna, niż była,
      a przyszłość wydaje się bardziej przewidywalna, niż jest.
    professional_application:
      networking_and_relationship_building: |
        Kiedy ktoś opowiada swoją historię sukcesu, pamiętaj, że
        jest to narracja — spójna i przekonująca, ale potencjalnie
        uproszczona. Szczęście i niewidzialne czynniki mogą być niedoważone.
      collaborative_learning_initiative: |
        Podczas retrospektyw oddzielaj narrację od dowodów.
        Zapytaj "Co byśmy powiedzieli w tamtym czasie?". Używaj
        dzienników decyzyjnych do rejestrowania niepewności przed
        tym, jak wyniki zostaną poznane.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Niektóre narracje są poprawne — nie wszystko jest
        błędem narracyjnym. Istnieje przyczynowość.
      excessive_skepticism: |
        Odrzucanie nauki z przeszłości, ponieważ "błąd
        narracyjny". Nadal możemy wyciągać użyteczne wnioski.
      false_randomness: |
        Zakładanie, że wszystko jest losowe, gdy niektóre wyniki
        można sensownie przypisać.
      undermining_storytelling: |
        Historie mają wartość komunikacyjną i znaczeniową —
        błąd polega na wierze, że są kompletne lub
        przewidywalne, a nie na ich istnieniu.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - map_is_not_the_territory
  - id: negativity_bias
    name: Tendencja do skupiania się na negatywnych informacjach
    quick_introduction: |
      Tendencja do skupiania się na negatywnych informacjach to skłonność do przywiązywania większej wagi do negatywnych informacji niż do pozytywnych. Złe wiadomości, krytyka i zagrożenia przyciągają naszą uwagę i silniej wpływają na nasze decyzje niż porównywalne bodźce pozytywne.
    one_liner: Złe wiadomości ważą więcej niż dobre – jesteśmy zaprogramowani do priorytetyzowania zagrożeń.
    try_this:
      - Aktywnie szukaj i waż pozytywne dowody podczas oceny.
      - Zauważ, kiedy jedna krytyka przeważa nad wieloma pochwałami.
      - Zapytaj: Czy przywiązuję większą wagę do negatywnych informacji, niż na to zasługują?
    ask_yourself:
      - Czy skupiam się na negatywach i pomijam pozytywy?
      - Czy czułbym się inaczej, gdybym skupił się na dobrych dowodach?
    in_more_detail: |
      Ewolucyjnie, przeoczenie zagrożenia mogło być śmiertelne, podczas gdy przeoczenie okazji zazwyczaj nie było. Nasze mózgi są zaprogramowane do priorytetyzowania negatywnych informacji. Jedna krytyczna uwaga może przeważyć nad wieloma pochwałami. Negatywne wydarzenia są zapamiętywane żywiej i na dłużej.

      Ta tendencja wpływa na relacje, podejmowanie decyzji i samopoczucie. Rozpamiętujemy porażki, przewidujemy najgorsze scenariusze i lekceważymy pozytywne dowody. Zrozumienie jej pomaga nam to skorygować.
    why_this_is_important: |
      Rozpoznawanie tendencji do skupiania się na negatywnych informacjach pomaga zrównoważyć informacje zwrotne, unikać nadmiernego reagowania na krytykę i podejmować bardziej wyważone decyzje. Wyjaśnia również, dlaczego złe wiadomości dominują i dlaczego często czujemy się gorzej, niż okoliczności uzasadniają.
    when_to_use:
      - podejmowanie_decyzji
      - budowanie_relacji
      - przywództwo
      - ocena_ryzyka
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Jeden negatywny komentarz przyćmiewa wiele pozytywnych.
      threat_prioritization: |
        Potencjalne negatywy otrzymują więcej uwagi niż porównywalne pozytywy.
      vivid_negative_memories: |
        Negatywne doświadczenia są przywoływane z większą łatwością i z większymi emocjami.
      discounting_positive_evidence: |
        Dobre wiadomości są szybko zapominane lub wyjaśniane.
    examples:
      performance_reviews: |
        Pracownik skupia się na jednej krytycznej uwadze i lekceważy ogólną pozytywną ocenę.
      news_consumption: |
        Negatywne nagłówki dominują uwagę i kształtują światopogląd, pomimo pozytywnych trendów.
      relationships: |
        Jeden argument dominuje nad wieloma dobrymi chwilami.
      investing: |
        Spadki na rynku wywołują większą panikę niż porównywalne wzrosty wywołują euforię.
    real_world_implications: |
      Tendencja do skupiania się na negatywnych informacjach kształtuje media, politykę i kulturę organizacyjną. Przyczynia się do niepokoju, konfliktów i suboptymalnych decyzji. Świadome przeciwdziałanie jej może poprawić samopoczucie i osąd.
    professional_application:
      networking_and_relationship_building: |
        Dostarczając informacji zwrotnej, bądź świadomy, że negatywne komentarze będą ważyć ciężej — równoważ je i podkreślaj rozwój. Odbierając informacje zwrotne, świadomie rozważ pełny obraz.
      collaborative_learning_initiative: |
        Twórz kultury, które aktywnie przeciwdziałają tendencji do skupiania się na negatywnych informacjach: celebruj sukcesy, dokumentuj pozytywne wyniki i równoważ post-mortemy z "pre-mortem" tego, co poszło dobrze.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Odrzucanie uzasadnionych obaw poprzez naleganie na "pozytywne myślenie".
      ignoring_real_threats: |
        Nadmierne korygowanie do tego stopnia, że niedocenia się rzeczywistych zagrożeń.
      feedback_suppression: |
        Unikanie niezbędnej krytyki, ponieważ "negatywność jest zła".
      invalidation: |
        Mówienie komuś, że jego negatywne uczucia to "tylko tendencja do skupiania się na negatywnych informacjach", gdy ma on realny powód do obaw.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Brzytwa Ockhama
    quick_introduction: |
      Brzytwa Ockhama to zasada głosząca, że spośród konkurencyjnych hipotez
      należy preferować tę, która wymaga najmniejszej liczby założeń. Prostsze wyjaśnienia
      są często – choć nie zawsze – poprawne.
    one_liner: Preferuj najprostsze wyjaśnienie, które pasuje do dowodów.
    try_this:
      - Porównując teorie, zapytaj: która wymaga mniej założeń?
      - Nie dodawaj złożoności bez dowodów, które tego wymagają.
      - Zauważ, kiedy preferujesz skomplikowane wyjaśnienie nad prostym.
    ask_yourself:
      - Czy wprowadzam niepotrzebną złożoność?
      - Czy dowody wymagają takiego poziomu wyjaśnienia?
    in_more_detail: |
      Nazwana na cześć Wilhelma Ockhama, zasada ta nie twierdzi, że proste wyjaśnienia
      są zawsze prawdziwe. Sugeruje, że nie należy wprowadzać niepotrzebnej złożoności
      bez dowodów. Jeśli dwie teorie wyjaśniają te same zjawiska, preferowana jest
      prostsza, dopóki dowody nie wskażą inaczej.

      Brzytwa Ockhama jest heurystyką, a nie prawem. Czasami poprawne wyjaśnienie jest
      skomplikowane. Ale chroni przed przetrenowaniem, myśleniem konspiracyjnym i niepotrzebnym
      skomplikowaniem. Foryzuje oszczędność w wyjaśnianiu.
    why_this_is_important: |
      Stosowanie Brzytwy Ockhama poprawia rozwiązywanie problemów, redukuje przetrenowanie modeli
      i pomaga unikać skomplikowanych, ale niepopartych teorii. Jest to użyteczny domyślny
      punkt odniesienia, gdy dowody są niejednoznaczne.
    when_to_use:
      - rozwiązywanie_problemów
      - podejmowanie_decyzji
      - uczenie_się
      - ocena_ryzyka
    how_can_you_spot_it:
      unnecessary_complexity: |
        Wyjaśnienie opiera się na wielu założeniach, gdy wystarczyłoby ich mniej.
      conspiracy_tendencies: |
        Skomplikowane, wieloczynnikowe wyjaśnienia zdarzeń, które mają prostsze przyczyny.
      overfitting: |
        Model lub teoria, która idealnie wyjaśnia dane historyczne, ale zawodzi na nowych danych.
      elegance_in_explanation: |
        Najlepsze wyjaśnienia często wydają się "oczywiste" z perspektywy czasu.
    examples:
      debugging: |
        Gdy pojawia się błąd, sprawdź najpierw najprostsze przyczyny (np. literówka, zła konfiguracja)
        zanim założysz problemy architektoniczne.
      conspiracy_theories: |
        "Rząd zainscenizował X" wymaga wielu ukrytych aktorów; "kilku ludzi
        popełniło błędy" jest prostsze.
      product_failure: |
        Użytkownicy nie korzystają z funkcji – najprostsze wyjaśnienie: nie rozwiązuje to ich
        problemu, a nie to, że są zdezorientowani interfejsem użytkownika.
      medical_diagnosis: |
        "Częste rzeczy są częste" – rozważ częste diagnozy przed rzadkimi.
    real_world_implications: |
      Brzytwa Ockhama kieruje dochodzenia naukowe, inżynierię i codzienne rozumowanie.
      Redukuje zmarnowany wysiłek na skomplikowane błędne teorie. Niewłaściwie zastosowana może odrzucać
      rzeczywiście złożone zjawiska.
    professional_application:
      networking_and_relationship_building: |
        Interpretując zachowanie innych, preferuj proste wyjaśnienia (są zajęci,
        zapomnieli) zanim założysz złośliwość lub skomplikowane motywy.
      collaborative_learning_initiative: |
        Podczas sesji rozwiązywania problemów wyraźnie zapytaj "Jakie jest najprostsze wyjaśnienie?"
        zanim zbudujesz skomplikowane modele.
    how_can_this_be_misapplied:
      oversimplification: |
        Odrzucanie uzasadnionych skomplikowanych wyjaśnień, ponieważ są "zbyt skomplikowane".
      status_quo_bias: |
        Używanie Brzytwy Ockhama do preferowania znanych wyjaśnień nad nowymi, ale poprawnymi.
      scientific_rigidity: |
        Odrzucanie nowych teorii, ponieważ są bardziej skomplikowane, nawet jeśli dowody je popierają.
      missing_nuance: |
        Niektóre dziedziny (np. ludzkie zachowanie, ekosystemy) są z natury złożone;
        prostota może być myląca.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Efekt strusia
    quick_introduction: |
      Efekt strusia to tendencja do unikania negatywnych informacji finansowych — do
      "chowania głowy w piasek" jak struś. Ludzie unikają patrzenia na swoje
      portfele, gdy rynki spadają, zwlekają z otwieraniem rachunków i ignorują sygnały ostrzegawcze,
      które mogłyby im pomóc zareagować.
    one_liner: Unikanie złych wiadomości nie zmienia rzeczywistości — jedynie opóźnia twoją reakcję.
    try_this:
      - Zaplanuj regularne spotkania, aby nie móc uniknąć liczb.
      - Zwróć uwagę, kiedy zwlekasz z otwarciem czegoś lub przyjrzeniem się czemuś.
      - Zapytaj: Czego unikam i co by się zmieniło, gdybym się z tym zmierzył/a?
    ask_yourself:
      - Czy unikam informacji, ponieważ mogą być złe?
      - Czy wcześniejsza świadomość pomogłaby mi lepiej działać?
    in_more_detail: |
      Termin ten został ukuty w finansach behawioralnych, aby opisać inwestorów, którzy unikają
      sprawdzania swoich inwestycji podczas bessy rynkowej. Zachowanie to wykracza poza finanse: unikanie badań medycznych, ignorowanie problemów w relacjach
      i odkładanie trudnych rozmów. Dążymy do uniknięcia niepokoju związanego ze
      złymi wiadomościami, ale unikanie często pogarsza skutki, uniemożliwiając terminowe
      działanie.

      Efekt jest napędzany awersją do strat i pragnieniem uniknięcia dyskomfortu emocjonalnego.
      Niestety, ignorancja nie zmienia rzeczywistości — jedynie opóźnia naszą reakcję.
    why_this_is_important: |
      Rozpoznanie efektu strusia pomaga proaktywnie stawić czoła trudnym informacjom.
      Unikanie złych wiadomości rzadko poprawia wyniki; zazwyczaj je pogarsza.
      Terminowa świadomość umożliwia lepsze decyzje.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - ocena_ryzyka
      - zmiany_w_karierze
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Niewystawianie wyciągów inwestycyjnych, gdy rynki spadają.
      delaying_difficult_information: |
        Odkładanie otwarcia rachunków, wyników badań medycznych lub informacji zwrotnych o wydajności.
      information_avoidance: |
        Aktywne unikanie źródeł, które mogą zawierać złe wiadomości.
      procrastination_on_unpleasant_tasks: |
        Odkładanie działań, które ujawnią lub rozwiążą problemy.
    examples:
      investing: |
        Inwestor przestaje sprawdzać swój fundusz 401(k) podczas bessy, przegapiając
        okazje do rebalansowania.
      health: |
        Unikanie wizyty u lekarza pomimo objawów z powodu strachu przed złymi wiadomościami.
      finances: |
        Nieotwieranie wyciągów z karty kredytowej lub alertów bankowych, aby uniknąć konfrontacji z długiem.
      performance: |
        Menedżer unika udzielania krytycznych informacji zwrotnych do przeglądu rocznego, kiedy
        wcześniejsza interwencja pomogłaby.
    real_world_implications: |
      Efekt strusia prowadzi do gorszych wyników finansowych, opóźnionego leczenia medycznego
      i nierozwiązanych problemów w relacjach i pracy. Pogarsza możliwe do uniknięcia straty. Systemy, które utrudniają ignorowanie informacji, mogą pomóc.
    professional_application:
      networking_and_relationship_building: |
        Nie unikaj trudnych rozmów. Zajmuj się problemami wcześnie, zamiast
        mieć nadzieję, że same się rozwiążą. Twórz regularne spotkania, które ujawniają
        problemy, zanim narastają.
      collaborative_learning_initiative: |
        Buduj pętle informacji zwrotnej, które utrudniają ignorowanie problemów — pulpity nawigacyjne,
        regularne przeglądy i normy, które zachęcają do wczesnego ujawniania złych wiadomości.
    how_can_this_be_misapplied:
      information_overload: |
        Wymuszanie ciągłego monitorowania, gdy pewne unikanie informacji jest zdrowe
        (np. nie sprawdzanie akcji co minutę).
      anxiety_amplification: |
        Tworzenie zbyt dużego nacisku na potencjalne problemy, co zwiększa niepokój
        bez poprawy wyników.
      blame_shifting: |
        Przypisywanie całego unikania "efektowi strusia", gdy pewne unikanie jest
        racjonalne (np. ignorowanie szumu informacyjnego).
      micromanagement: |
        Wykorzystywanie koncepcji do uzasadnienia nadmiernego nadzoru nad innymi.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: parkinsons_law
    name: Prawo Parkinsona
    quick_introduction: |
      Prawo Parkinsona stwierdza, że „praca rozszerza się tak, aby wypełnić czas dostępny na jej
      ukończenie”. Daj zadaniu tydzień, a zajmie tydzień; daj mu dzień, a często zostanie zrobione w jeden dzień. To samo dotyczy budżetów, wielkości zespołów i zasobów.
    one_liner: Praca rozszerza się, aby wypełnić czas dostępny na jej ukończenie.
    try_this:
      - Ustalaj krótsze terminy, aby wymusić koncentrację i zapobiec rozrastaniu się zakresu.
      - Zapytaj: Ile minimalnie czasu realnie może zająć to zadanie?
      - Zwracaj uwagę, kiedy dodatkowy czas lub zasoby są zużywane bez proporcjonalnej wartości.
    ask_yourself:
      - Czy wypełniam czas, czy praca faktycznie go wymaga?
      - Czy krótszy termin wymusiłby lepsze ustalenie priorytetów?
    in_more_detail: |
      C. Northcote Parkinson zaobserwował, że biurokracje rosną niezależnie od ilości
      pracy do wykonania. Zauważył również, że zadania rozszerzają się, aby wypełnić dostępny czas – dostosowujemy nasze wysiłki i tempo do terminu. Krótkie terminy mogą wymusić koncentrację;
      luźne terminy sprzyjają prokrastynacji i rozrastaniu się zakresu.

      Prawo to ma implikacje dla zarządzania projektami, produktywności osobistej i
      projektowania organizacji. Sugeruje, że ograniczenia mogą poprawić wyniki poprzez
      wymuszenie ustalenia priorytetów.
    why_this_is_important: |
      Zrozumienie Prawa Parkinsona pomaga lepiej ustalać terminy, unikać nadmiernego alokowania zasobów do projektów i rozpoznawać, kiedy "więcej czasu" lub "więcej ludzi" nie pomoże – a może zaszkodzić. Ograniczenia mogą być produktywne.
    when_to_use:
      - podejmowanie_decyzji
      - przywództwo
      - rozwiązywanie_problemów
      - zmiany_w_karierze
    how_can_you_spot_it:
      deadline_driven_effort: |
        Praca przyspiesza w miarę zbliżania się terminu; niewielki postęp, gdy termin jest odległy.
      scope_expansion: |
        Projekty rozrastają się, aby wykorzystać dostępne zasoby, zamiast skupiać się na celu.
      bureaucratic_growth: |
        Organizacje dodają ludzi i procesy, nawet gdy obciążenie pracą nie wzrasta.
      budget_exhaustion: |
        Budżety są w pełni wydawane niezależnie od tego, czy wydatki były konieczne.
    examples:
      student_deadlines: |
        Praca zaliczeniowa, której termin oddania jest za miesiąc, pisana jest w ciągu ostatnich 48 godzin.
      project_management: |
        Projekt z 6-miesięcznym harmonogramem zajmuje 6 miesięcy; ten sam zakres przy 3-miesięcznym
        terminie może zostać również ukończony.
      meetings: |
        Godzinne spotkanie wypełnia godzinę, nawet jeśli 30 minut byłoby wystarczające.
      budgets: |
        Dział wydaje cały swój budżet do końca roku, aby uzasadnić ten sam budżet
        w przyszłym roku.
    real_world_implications: |
      Prawo Parkinsona wpływa na produktywność, rozrost organizacyjny i alokację zasobów.
      Sugeruje, że sztuczne ograniczenia (krótsze terminy,
      mniejsze zespoły) mogą poprawić koncentrację i wydajność.
    professional_application:
      networking_and_relationship_building: |
        Ustalaj jasne, krótkie terminy dla pracy zespołowej, aby zapobiec rozrastaniu się zakresu i
        utrzymać dynamikę.
      collaborative_learning_initiative: |
        Używaj time-boxing (ograniczenia czasowe) dla spotkań i projektów. Eksperymentuj z krótszymi terminami,
        aby sprawdzić, czy poprawiają one koncentrację bez poświęcania jakości.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Ustalanie arbitralnie krótkich terminów, które prowadzą do wypalenia lub niskiej jakości.
      underresourcing: |
        Zakładanie, że mniej czasu lub mniej ludzi zawsze zadziała – niektóre zadania wymagają
        odpowiednich zasobów.
      blame_shifting: |
        Przypisywanie opóźnień do "Prawa Parkinsona", gdy praca była rzeczywiście skomplikowana.
      ignoring_quality: |
        Pośpiech w dotrzymaniu sztucznych ograniczeń kosztem trwałych wyników.
    related_content:
      - law_of_diminishing_returns
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Myślenie probabilistyczne
    quick_introduction: |
      Myślenie probabilistyczne to nawyk rozumowania w kategoriach prawdopodobieństw, a nie pewności. Zamiast pytać „czy to się stanie?”, pytamy „jak bardzo prawdopodobne jest, że to się stanie?”.
      Akceptuje niepewność i wykorzystuje ją do podejmowania lepszych decyzji.
    one_liner: Myśl w kategoriach prawdopodobieństwa, nie pewności – zaakceptuj niepewność.
    try_this:
      - Zastąp „czy to się stanie?” pytaniem „jak bardzo prawdopodobne jest, że to się stanie?”.
      - Rozważ wiele scenariuszy i przypisz im przybliżone prawdopodobieństwa.
      - Aktualizuj swoje przekonania w miarę napływu nowych dowodów.
    ask_yourself:
      - Czy myślę w kategoriach zero-jedynkowych, gdy bardziej dokładne byłyby prawdopodobieństwa?
      - Jaki jest zakres wiarygodnych wyników?
    in_more_detail: |
      Większość wyników w rzeczywistym świecie jest niepewna. Myślenie probabilistyczne zastępuje binarne tak/nie stopniowanymi przekonaniami. Obejmuje ono rozważanie wielu scenariuszy,
      przypisywanie przybliżonych prawdopodobieństw i aktualizowanie ich w miarę napływu dowodów. Jest to przeciwieństwo nadmiernej pewności siebie i myślenia w czerni i bieli.

      Kluczowe praktyki obejmują: myślenie w kategoriach zakresów, rozważanie podstawowych wskaźników, aktualizowanie
      przekonań wraz z dowodami oraz rozróżnianie między ryzykiem (znane prawdopodobieństwa)
      a niepewnością (nieznane prawdopodobieństwa). Poprawia to kalibrację i
      jakość podejmowanych decyzji.
    why_this_is_important: |
      Myślenie probabilistyczne zmniejsza nadmierną pewność siebie, poprawia prognozowanie i
      prowadzi do lepszych decyzji w warunkach niepewności. Jest kluczowe w inwestowaniu,
      strategii i każdej dziedzinie, w której przyszłość jest niepewna.
    when_to_use:
      - podejmowanie_decyzji
      - ocena_ryzyka
      - inwestowanie
      - rozwiązywanie_problemów
    how_can_you_spot_it:
      likelihood_language: |
        "Prawdopodobnie", "raczej", "mało prawdopodobne" zamiast "będzie" lub "nie będzie".
      scenario_thinking: |
        Rozważanie wielu możliwych przyszłości z przybliżonymi prawdopodobieństwami.
      calibration: |
        Prognozy, które z czasem odpowiadają rzeczywistym częstościom występowania.
      uncertainty_acknowledgment: |
        Wyraźne stwierdzanie tego, czego nie wiesz.
    examples:
      forecasting: |
        "Myślę, że jest 60% szans na dotrzymanie terminu", zamiast "Dotrzymamy
        terminu".
      investing: |
        "To ma 30% szans na podwojenie wartości i 70% szans na spadek o -50%", zamiast
        "To wystrzeli".
      strategy: |
        Planowanie wielu scenariuszy (najlepszy, podstawowy, najgorszy) z przybliżonymi
        prawdopodobieństwami.
      hiring: |
        "Na podstawie rozmowy kwalifikacyjnej oceniam prawdopodobieństwo sukcesu na 70%", zamiast
        "To świetny kandydat".
    real_world_implications: |
      Myślenie probabilistyczne poprawia kalibrację, zmniejsza zaskoczenia i umożliwia
      lepsze zarządzanie ryzykiem. Jest kluczowe dla skutecznego prognozowania i
      podejmowania decyzji w warunkach niepewności.
    professional_application:
      networking_and_relationship_building: |
        Komunikuj się za pomocą prawdopodobieństw, gdy jest to właściwe – "jestem dość pewien" vs.
        "jestem pewien". Buduje to zaufanie, sygnalizując pokorę epistemiczną.
      collaborative_learning_initiative: |
        Zachęcaj zespoły do wyrażania niepewności. Wykorzystaj rynki prognoz lub
        ćwiczenia kalibracyjne, aby poprawić osąd probabilistyczny.
    how_can_this_be_misapplied:
      false_precision: |
        Przypisywanie dokładnych prawdopodobieństw (np. 73%), gdy nie można być tak precyzyjnym.
      analysis_paralysis: |
        Brak działania z powodu "nie możemy być pewni".
      hedging_overuse: |
        Kwalifikowanie wszystkiego do punktu bezużyteczności.
      dismissing_intuition: |
        Nadmierne korygowanie w celu zignorowania silnych intuicji, gdy mogą one nieść cenne informacje.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Efekt Pigmaliona
    quick_introduction: |
      Efekt Pigmaliona (lub efekt Rosenthala) to zjawisko, w którym wyższe oczekiwania prowadzą do lepszych wyników. Kiedy nauczyciele, menedżerowie lub inni ludzie oczekują więcej od kogoś, ta osoba zazwyczaj osiąga lepsze wyniki. Oczekiwania stają się samorealizującymi się przepowiedniami.
    one_liner: Wyższe oczekiwania prowadzą do lepszych wyników – oczekiwania kształtują rzeczywistość.
    try_this:
      - Stawiaj wysokie, ale osiągalne oczekiwania; komunikuj je jasno.
      - Zwracaj uwagę, kiedy niskie oczekiwania mogą ograniczać czyjeś wyniki.
      - Zapytaj: Czego nieświadomie oczekuję – i jak może to wpłynąć na wyniki?
    ask_yourself:
      - Czy moje oczekiwania pomagają tej osobie, czy ją ograniczają?
      - Czy wyższe oczekiwania zmieniłyby sposób, w jaki traktuję tę osobę – i jej wyniki?
    in_more_detail: |
      Robert Rosenthal i Lenore Jacobson przekazali nauczycielom fałszywą informację, że niektórzy uczniowie "zakwitną" akademicko. Ci uczniowie – wybrani losowo – faktycznie osiągnęli lepsze wyniki niż inni. Oczekiwania nauczycieli wpłynęły na ich zachowanie (więcej uwagi, cieplejsze informacje zwrotne), co wpłynęło na wyniki uczniów. Oczekiwania kształtują rzeczywistość.

      Odwrotność – niskie oczekiwania prowadzące do gorszych wyników – jest czasem nazywana efektem Golema. Oba przypadki pokazują, że nasze przekonania o innych mogą wpływać na ich wyniki. Ma to głębokie implikacje dla przywództwa, edukacji i rodzicielstwa.
    why_this_is_important: |
      Zrozumienie efektu Pigmaliona pomaga wykorzystać siłę oczekiwań. Wysokie oczekiwania, komunikowane szczerze, mogą poprawić wyniki. Niskie oczekiwania mogą prowadzić do samospełniającej się porażki. Twoje przekonania o innych mają znaczenie.
    when_to_use:
      - przywództwo
      - budowanie_relacji
      - nauka
      - podejmowanie_decyzji
    how_can_you_spot_it:
      expectation_performance_link: |
        Ci, od których oczekujemy więcej, zazwyczaj osiągają lepsze wyniki.
      differential_treatment: |
        Traktujemy ludzi inaczej w zależności od naszych oczekiwań – często
        nieświadomie.
      self_fulfilling_prophecy: |
        Przekonania o zdolnościach wpływają na zachowanie, które kształtuje
        zdolności.
      teacher_student_dynamics: |
        Oczekiwania nauczycieli wpływają na wyniki uczniów poprzez
        różnicowanie traktowania.
    examples:
      education: |
        Nauczyciele, którzy oczekują sukcesu od uczniów, zapewniają im więcej
        wsparcia; ci uczniowie osiągają lepsze wyniki. Nauczyciele, którzy
        spodziewają się porażki, mogą ją nieświadomie stworzyć.
      workplace: |
        Menedżerowie, którzy oczekują wysokich wyników od swoich podwładnych,
        zapewniają im więcej możliwości i informacji zwrotnych; wyniki się
        poprawiają.
      parenting: |
        Rodzice, którzy oczekują od swoich dzieci odpowiedzialności, dają im
        więcej obowiązków; dzieci sobie z nimi radzą.
      stereotypes: |
        Groźba stereotypu to odwrotność – negatywne oczekiwania mogą
        pogorszyć wyniki.
    real_world_implications: |
      Efekt Pigmaliona wpływa na edukację, zarządzanie i relacje. Sugeruje,
      że podnoszenie oczekiwań – gdy jest ono wspierające – może poprawić
      wyniki. Ostrzega również, że niskie oczekiwania mogą być destrukcyjne.
    professional_application:
      networking_and_relationship_building: |
        Stawiaj wysokie oczekiwania wobec ludzi – i zapewnij wsparcie, aby je
        spełnić. Wierz w potencjał. Twoje oczekiwania wpływają na twoje
        zachowanie, które wpływa na ich wyniki.
      collaborative_learning_initiative: |
        Twórz kultury wysokich oczekiwań z wysokim wsparciem. Unikaj
        etykietowania ludzi jako "słabych wykonawców" w sposób, który staje
        się samospełniający. Inwestuj w tych, od których oczekujesz sukcesu.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Ustanawianie oczekiwań niemożliwych do spełnienia bez wsparcia prowadzi
        do porażki i demotywacji.
      blame_shifting: |
        "Nie spełnili oczekiwań", kiedy my nie zapewniliśmy wsparcia ani
        warunków do sukcesu.
      ignoring_constraints: |
        Same oczekiwania nie pokonają przeszkód strukturalnych.
      pressure_without_support: |
        Wysokie oczekiwania bez zasobów lub wsparcia mogą być szkodliwe.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regresja_do_sredniej
    name: Regresja do średniej
    quick_introduction: |
      Regresja do średniej to zjawisko statystyczne, w którym skrajne wyniki są zazwyczaj
      zastępowane wynikami bliższymi średniej. Po niezwykle dobrym lub złym
      wyniku, następny wynik będzie prawdopodobnie mniej skrajny – nie z powodu jakiejś interwencji przyczynowej, ale z powodu losowej zmienności.
    one_liner: Skrajne wyniki są zazwyczaj zastępowane wynikami bliższymi średniej.
    try_this:
      - Nie przypisuj "regresji" swojej interwencji – często i tak by się zdarzyła.
      - Po skrajnym wyniku spodziewaj się, że następny będzie mniej skrajny.
      - Zapytaj: Czy ta zmiana wynika z tego, co zrobiłem, czy po prostu z regresji do średniej?
    ask_yourself:
      - Czy przypisuję moją interwencję sukcesowi lub porażce tego, co mogło być losową zmiennością?
      - Czy to by się stało bez mojego działania?
    in_more_detail: |
      Jeśli uczeń uzyska niezwykle wysoki wynik w jednym teście, prawdopodobnie w następnym uzyska wynik bliższy swojej średniej – nie dlatego, że "stał się leniwy", ale dlatego, że pierwszy wynik był częściowo szczęśliwy. To samo dotyczy wyników sportowych, zwrotów z inwestycji i metryk biznesowych. Często przypisujemy "regresję" czemuś, co zrobiliśmy (np.
      karze lub nagrodzie), podczas gdy i tak by się zdarzyła.

      Daniel Kahneman opisuje, jak instruktorzy lotnictwa błędnie doszli do wniosku, że
      pochwały pogarszały wyniki, a krytyka je poprawiała – obserwowali oni
      regresję do średniej po skrajnych wynikach.
    why_this_is_important: |
      Zrozumienie regresji do średniej zapobiega błędnemu przypisywaniu przyczynowości.
      Pomaga uniknąć nadmiernej reakcji na wartości odstające i podejmowania zmian w oparciu o szum informacyjny.
      Jest to kluczowe dla oceny interwencji i wyników.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - ocena_ryzyka
      - przywództwo
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Niezwykle dobry lub zły wynik jest zastępowany wynikiem bliższym średniej.
      spurious_causation: |
        Przypisywanie "powrotu" lub "spadku" interwencji, podczas gdy regresja
        i tak by wystąpiła.
      overreaction_to_outliers: |
        Podejmowanie zmian polityki lub osobistych w oparciu o pojedynczy skrajny punkt danych.
      reward_punishment_confusion: |
        Wierzenie, że kara "zadziałała", gdy poprawa była tylko regresją.
    examples:
      sports: |
        Gracz notuje mecz kariery, a potem wraca do średniej – fani mogą obwiniać "spoczywanie na laurach".
      investing: |
        Akcja ma świetny rok, a potem wraca do normy – inwestorzy mogą przypisywać spadek
        złemu zarządzaniu, podczas gdy jest to częściowo powrót do normy.
      performance_reviews: |
        Pracownik ma zły kwartał, otrzymuje informację zwrotną, poprawia się – informacja zwrotna może uzyskać
        zasługę, podczas gdy regresja wystąpiłaby niezależnie.
      medicine: |
        Pacjent czuje się gorzej, przyjmuje leczenie, poprawia się – leczenie może uzyskać
        zasługę, podczas gdy część poprawy była naturalna.
    real_world_implications: |
      Regresja do średniej wpływa na to, jak oceniamy nauczycieli, lekarzy, zarządzających funduszami i samych siebie.
      Wyjaśnia, dlaczego "co idzie w górę, musi w końcu spaść" często sprawdza się statystycznie. Niezrozumienie jej prowadzi do zmarnowanych interwencji i fałszywej
      wiary w środki zaradcze.
    professional_application:
      networking_and_relationship_building: |
        Nie nadinterpretuj pojedynczej złej interakcji – może to być wartość odstająca, która powróci do średniej
        relacji.
      collaborative_learning_initiative: |
        Przy ocenie interwencji (szkolenia, zmiany procesów) używaj grup kontrolnych
        i wielu punktów danych, aby odróżnić efekt od regresji.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Zakładanie, że każda poprawa po interwencji to "tylko regresja",
        podczas gdy istnieją rzeczywiste efekty.
      underreacting: |
        Ignorowanie rzeczywistych problemów, ponieważ "to się cofnie do średniej".
      statistical_illiteracy: |
        Mylenie regresji z siłą, która "koryguje" wyniki – to tylko
        prawdopodobieństwo.
      overconfidence: |
        Zakładanie, że średnia jest stabilna, gdy proces leżący u jej podstaw mógł się zmienić.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: rosy_retrospection
    name: Różowe retrospekcje
    quick_introduction: |
      Różowe retrospekcje to tendencja do wspominania przeszłości jako lepszej niż była w rzeczywistości.
      Z czasem wspominamy minione doświadczenia bardziej pozytywnie, wygładzając trudności
      i wzmacniając to, co dobre. "Dobre stare czasy" często nie były tak dobre, jak je pamiętamy.
    one_liner: Pamiętamy przeszłość jako lepszą niż była — "dobre stare czasy" nie były aż tak dobre.
    try_this:
      - Porównując z przeszłością, zapytaj: Co tak naprawdę wtedy czułem/czułam?
      - Prowadź dziennik, aby później porównać wspomnienia z rzeczywistością.
      - Zwróć uwagę, kiedy nostalgia zaciemnia twoją ocenę teraźniejszości.
    ask_yourself:
      - Czy idealizuję przeszłość?
      - Czy byłbym/byłabym wtedy szczęśliwy/szczęśliwa, gdybym mógł/mogła cofnąć się w czasie?
    in_more_detail: |
      Mamy tendencję do zapamiętywania pozytywnych aspektów przeszłych doświadczeń i zapominania lub
      minimalizowania negatywnych. Wakacje, prace i związki wydają się w nostalgii lepsze niż w rzeczywistości.
      Może to prowadzić do nierealistycznych porównań — oceniamy teraźniejszość na podstawie zidealizowanej przeszłości.

      Różowe retrospekcje wpływają na podejmowanie decyzji, gdy powtarzamy przeszłe wybory,
      oczekując tego samego (zapamiętanego) rezultatu. Mogą również podsycac nostalgię za
      epokami, które obiektywnie były gorsze. Jest to przeciwieństwo błędu negatywności
      w pamięci.
    why_this_is_important: |
      Rozpoznanie różowych retrospekcji pomaga w dokonywaniu bardziej realistycznych porównań
      i unikaniu powtarzania przeszłych błędów na podstawie zidealizowanych wspomnień. Wyjaśnia
      również, dlaczego czasami tęsknimy za przeszłością pomimo obecnego postępu.
    when_to_use:
      - podejmowanie_decyzji
      - zmiany_w_karierze
      - budowanie_relacji
      - nauka
    how_can_you_spot_it:
      idealized_past: |
        "Kiedyś było lepiej", mimo że obiektywne wskaźniki mogą sugerować inaczej.
      selective_positive_memory: |
        Pamiętanie dobrych i zapominanie złych rzeczy z przeszłych doświadczeń.
      nostalgia_as_evidence: |
        Używanie miłych wspomnień jako dowodu na to, że przeszłe wybory były słuszne.
      present_undervaluation: |
        Teraźniejszość wydaje się gorsza niż jest w rzeczywistości, ponieważ porównujemy ją do zidealizowanej przeszłości.
    examples:
      career: |
        "Moja stara praca była świetna", mimo że odszedłem/odeszłam z dobrych powodów — pamięć wygładziła
        frustracje.
      relationships: |
        "Byliśmy tacy szczęśliwi" w poprzednim związku — zapominając o konfliktach, które doprowadziły do jego zakończenia.
      childhood: |
        "Dzieci miały lepiej za moich czasów", mimo że wiele obiektywnych wskaźników (zdrowie,
        bezpieczeństwo, możliwości) się poprawiło.
      projects: |
        "Ten projekt przebiegł gładko", mimo że faktycznie miał wiele opóźnień — pamiętamy
        wynik, a nie proces.
    real_world_implications: |
      Różowe retrospekcje wpływają na zadowolenie z życia, decyzje zawodowe i
      wybory motywowane nostalgią. Mogą prowadzić do powtarzania przeszłych błędów lub
      nierealistycznych porównań. Wyjaśnia również urok retoryki "powrotu do dobrych starych czasów".
    professional_application:
      networking_and_relationship_building: |
        Rozważając ponowne nawiązanie kontaktu z byłymi współpracownikami lub powrót do przeszłych
        stanowisk, oddziel nostalgię od rzeczywistości. Dokumentuj swoje powody odejścia
        w tamtym czasie; przejrzyj je przed powrotem.
      collaborative_learning_initiative: |
        Podczas retrospektyw, używaj bieżących notatek lub danych, a nie pamięci, do oceny tego, co faktycznie się wydarzyło. Pamięć wygładza trudności.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Nie każda nostalgia jest zwodnicza — czasami przeszłość była w niektórych aspektach naprawdę lepsza.
      invalidating_memories: |
        Mówienie ludziom, że ich pozytywne wspomnienia są "błędne", gdy mogą one odzwierciedlać
        autentyczne subiektywne doświadczenie.
      overcorrection: |
        Zakładanie, że przeszłość była zawsze gorsza niż ją pamiętamy — czasami była
        lepsza.
      present_bias: |
        Używanie różowych retrospekcji jako wymówki do odrzucenia uzasadnionych obaw
        dotyczących obecnego upadku.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Tendencja do zwracania uwagi na to, co wyraziste
    quick_introduction: |
      Tendencja do zwracania uwagi na to, co wyraziste, to skłonność do skupiania się
      na najbardziej rzucających się w oczy lub zauważalnych aspektach sytuacji,
      jednocześnie pomijając mniej oczywiste, ale potencjalnie ważne czynniki. To, co się wyróżnia,
      otrzymuje nieproporcjonalnie dużą uwagę i wagę w naszych osądach.
    one_liner: To, co się wyróżnia, otrzymuje nieproporcjonalną uwagę – subtelności są pomijane.
    try_this:
      - Zapytaj: Czego nie widzę, bo nie jest to wyraziste?
      - Aktywnie szukaj mniej oczywistych czynników przed podjęciem decyzji.
      - Zwracaj uwagę, gdy żywy lub dramatyczny element dominuje w Twoim osądzie.
    ask_yourself:
      - Czy nadmiernie doceniam to, co jest widoczne, a niedoceniam to, co subtelne?
      - Jakie ważne czynniki mogę pomijać?
    in_more_detail: |
      Wyraziste informacje są żywe, nacechowane emocjonalnie lub niedawno napotkane.
      Przyciągają uwagę i wpływają na decyzje bardziej, niż powinny. Nadmiernie cenimy to, co rzuca się w oczy, a niedoceniamy to, co subtelne.
      Dramatyczne wydarzenie lub żywy przykład mogą zdominować nasze myślenie, nawet jeśli nie są reprezentatywne.

      Tendencja do zwracania uwagi na to, co wyraziste, pokrywa się z heurystyką dostępności (to, co przychodzi na myśl) i tendencją do zwracania uwagi na to, co ostatnie (to, co wydarzyło się niedawno).
      Wpływa na percepcję ryzyka, zatrudnianie i strategię. Najbardziej widoczne problemy są rozwiązywane; niewidoczne pogłębiają się.
    why_this_is_important: |
      Rozpoznawanie tendencji do zwracania uwagi na to, co wyraziste, pomaga wyjść poza to, co oczywiste,
      i rozważyć mniej widoczne czynniki. Poprawia ocenę ryzyka, diagnozę problemów i jakość decyzji.
      Ważne rzeczy nie zawsze są wyraziste.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiązywanie_problemów
      - ocena_ryzyka
      - przywództwo
    how_can_you_spot_it:
      prominent_factor_dominance: |
        Najbardziej zauważalny aspekt napędza decyzję.
      overlooking_background: |
        Mniej widoczne czynniki są ignorowane pomimo ich ważności.
      vividness_overweighting: |
        Dramatyczne lub emocjonalne informacje otrzymują nieproporcjonalną wagę.
      visibility_bias: |
        To, co łatwo widzimy lub mierzymy, otrzymuje więcej uwagi niż
        to, czego nie możemy.
    examples:
      risk: |
        Katastrofa samolotu jest wyrazista – przeceniamy ryzyko latania. Wypadki samochodowe są mniej wyraziste jako całość – niedoceniamy ryzyka jazdy.
      hiring: |
        Umiejętności prezentacyjne kandydata są wyraziste; jego
        realizacja zadań może być mniej widoczna, ale równie ważna.
      strategy: |
        Ruchy konkurencji są wyraziste; stopniowe zmiany rynkowe są
        mniej zauważalne, ale mogą mieć większe znaczenie.
      problems: |
        Najgłośniejsza skarga zostaje rozwiązana, podczas gdy systemowe problemy
        pozostają niezauważone.
    real_world_implications: |
      Tendencja do zwracania uwagi na to, co wyraziste, wpływa na to, co otrzymuje uwagę, finansowanie i działania.
      Może prowadzić do rozwiązywania objawów zamiast przyczyn i
      do niewłaściwie alokowanych zasobów. Świadome poszukiwanie nie-wyrazistych
      informacji poprawia decyzje.
    professional_application:
      networking_and_relationship_building: |
        Nie oceniaj ludzi tylko na podstawie ich najbardziej widocznych cech. Szukaj
        mniej oczywistych jakości – niezawodności, spójności, tego, jak
        traktują ludzi, którzy nie mogą im pomóc.
      collaborative_learning_initiative: |
        W rozwiązywaniu problemów wyraźnie zapytaj „Czego nie widzimy?”
        i „Co jest mniej oczywiste, ale ważne?”. Twórz procesy,
        które uwidaczniają nie-wyraziste kwestie.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Czasami to, co wyraziste, jest ważne. Nie odrzucaj
        wszystkiego, co oczywiste.
      false_sophistication: |
        Zakładanie, że niejasne czynniki są zawsze ważniejsze
        niż oczywiste.
      analysis_paralysis: |
        Szukanie tak wielu nie-wyrazistych czynników, że nigdy
        nie działa się na wyrazistych.
      contrarianism: |
        Odrzucanie wyrazistych informacji tylko po to, by być innym.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - confirmation_bias
  - id: scarcity_bias
    name: Prawo niedoboru
    quick_introduction: |
      Prawo niedoboru to tendencja do przypisywania większej wartości rzeczom, gdy wydają się one rzadkie lub ograniczone. Hasła takie jak "ograniczony czas", "zostały tylko 3 sztuki" czy "wyłączny dostęp" wywołują poczucie pilności i pragnienie, często przyćmiewając racjonalną ocenę tego, czy faktycznie potrzebujemy lub chcemy danego przedmiotu.
    one_liner: Niedobór wzmacnia postrzeganą wartość – "ograniczony" wywołuje pilność zamiast racjonalności.
    try_this:
      - Zapytaj: Czy chciałbym tego, gdyby nie było to rzadkie? Pozbądź się presji czasu.
      - Zastanów się przed podjęciem działania pod wpływem ofert "ograniczony czas" lub "zostało tylko X sztuk".
      - Zauważ, kiedy to niedobór, a nie rzeczywista wartość, napędza Twoje pragnienie.
    ask_yourself:
      - Czy cenię to, ponieważ jest rzadkie, czy dlatego, że faktycznie tego potrzebuję?
      - Czy podjąłbym tę decyzję bez podkreślania niedoboru?
    in_more_detail: |
      Niedobór wzmacnia postrzeganą wartość. Kiedy coś jest rzadkie lub znika, chcemy tego bardziej – częściowo dlatego, że niedobór może sygnalizować jakość, a częściowo dlatego, że awersja do strat sprawia, że boimy się przegapienia czegoś. Marketerzy i negocjatorzy wykorzystują niedobór, aby stworzyć poczucie pilności. Ten błąd poznawczy może prowadzić do impulsywnych decyzji, nadmiernych wydatków i złego ustalania priorytetów.

      Niedobór wpływa również na zasoby poznawcze osób, które są rzeczywiście ograniczone pod względem zasobów; ubóstwo może zmniejszać "przepustowość umysłową" dla innych decyzji.
    why_this_is_important: |
      Rozpoznawanie prawa niedoboru pomaga oprzeć się manipulacyjnym taktykom i podejmować bardziej świadome decyzje. Wyjaśnia również, dlaczego przeceniamy edycje limitowane i spieszymy się, gdy nie ma takiej potrzeby.
    when_to_use:
      - podejmowanie_decyzji
      - negocjacje
      - inwestowanie
      - ocena_ryzyka
    how_can_you_spot_it:
      urgency_trigger: |
        "Ograniczony czas" lub "zostało tylko X sztuk" wywołuje nieproporcjonalne pragnienie.
      fear_of_missing_out: |
        Możliwość utraty dostępu bardziej napędza działanie niż jego wewnętrzna wartość.
      impulsive_purchases: |
        Kupowanie rzeczy z powodu ich rzadkości, a nie dlatego, że są potrzebne.
      artificial_scarcity: |
        Niedobór jest sztucznie tworzony (np. fałszywe odliczanie), a nie rzeczywisty.
    examples:
      sales: |
        "Zostały tylko 2 sztuki" lub "Promocja kończy się dziś wieczorem" wywołują zakupy, które nie miałyby miejsca bez presji czasu.
      auctions: |
        Licytujący dają się ponieść rywalizacji i płacą więcej, niż planowali, z powodu rywalizacyjnego niedoboru.
      exclusivity: |
        Dostęp "tylko dla członków" lub "tylko na zaproszenie" zwiększa postrzeganą wartość.
      genuine_scarcity: |
        Gdy zasoby są faktycznie ograniczone, ludzie pod wpływem stresu związanego z niedoborem podejmują gorsze decyzje (np. osoby ubogie, osoby mające mało czasu).
    real_world_implications: |
      Prawo niedoboru napędza zachowania konsumentów, wyniki negocjacji i reakcje na politykę. Może być wykorzystywane etycznie (np. uzasadnione terminy) lub nieetycznie (np. fałszywy niedobór). Zrozumienie go poprawia jakość podejmowanych decyzji.
    professional_application:
      networking_and_relationship_building: |
        Zachowaj ostrożność, gdy inni tworzą sztuczny niedobór ("Przyjmuję tylko kilku klientów"). Sprawdź, czy niedobór jest rzeczywisty. Podczas budowania relacji, rzeczywisty niedobór Twojego czasu może sygnalizować wartość – ale nadużywanie go może być odebrane jako manipulacja.
      collaborative_learning_initiative: |
        Tworząc poczucie pilności dla inicjatyw, upewnij się, że jest ono uzasadnione. Fałszywe terminy, gdy zostaną odkryte, podważają zaufanie.
    how_can_this_be_misapplied:
      manipulation: |
        Celowe tworzenie fałszywego niedoboru, aby wywrzeć presję na innych, by podjęli decyzje.
      impulsive_decisions: |
        Podejmowanie ważnych decyzji pod wpływem sztucznego pośpiechu, gdy więcej czasu poprawiłoby wyniki.
      overvaluing_scarcity: |
        Zakładanie, że rzadkie rzeczy są zawsze lepsze – czasami niedobór jest arbitralny.
      exploiting_vulnerability: |
        Wykorzystywanie taktyki niedoboru wobec osób, które już są obciążone brakiem zasobów.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Myślenie drugiego rzędu
    quick_introduction: |
      Myślenie drugiego rzędu to praktyka rozważania konsekwencji konsekwencji
      swoich działań. Myślenie pierwszego rzędu pyta „co się stanie, jeśli zrobię X?”
      Myślenie drugiego rzędu pyta „a potem co?” i „a potem co po tym?” Ujawnia
      niezamierzone efekty.
    one_liner: Zadaj pytanie „a potem co?” – rozważ konsekwencje konsekwencji.
    try_this:
      - W przypadku każdej decyzji zadaj pytanie „a potem co?” co najmniej dwa razy.
      - Zastanów się, jak inni zareagują na Twoje działanie – a potem na tę reakcję.
      - Zauważ, kiedy efekty pierwszego rzędu odwracają się lub komplikują w łańcuchu.
    ask_yourself:
      - Czy przemyślałem efekty drugiego (i trzeciego) rzędu?
      - Jakich niezamierzonych konsekwencji mogę nie zauważyć?
    in_more_detail: |
      Howard Marks spopularyzował tę koncepcję w inwestowaniu. Pierwszy rząd: „To pójdzie w górę”.
      Drugi rząd: „Jeśli pójdzie w górę, inni zauważą, więcej osób kupi, pójdzie jeszcze
      w górę – aż stanie się przewartościowane i spadnie.” Łańcuch konsekwencji często
      odwraca lub komplikuje efekt pierwszego rzędu.

      Myślenie drugiego rzędu jest trudniejsze – wymaga więcej wysiłku umysłowego i
      wyobraźni. Ale zapobiega wielu błędom. Dobrzy stratedzy myślą kilka kroków
      naprzód i zastanawiają się, jak zareagują inni.
    why_this_is_important: |
      Myślenie drugiego rzędu zapobiega niezamierzonym konsekwencjom i poprawia
      jakość decyzji. Jest niezbędne w strategii, polityce i każdej dziedzinie,
      gdzie działania wywołują reakcje.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiazywanie_problemow
      - strategia
      - ocena_ryzyka
    how_can_you_spot_it:
      consequence_chains: |
        „Jeśli zrobię X, stanie się Y, potem stanie się Z…”
      reaction_anticipation: |
        Rozważanie, jak inni zareagują na Twoje działanie.
      unintended_effects: |
        Szukanie efektów ubocznych i pętli sprzężenia zwrotnego.
      reversals: |
        Efekty drugiego rzędu, które zaprzeczają lub odwracają efekty pierwszego rzędu.
    examples:
      investing: |
        „Jeśli wszyscy uważają, że to dobra inwestycja, prawdopodobnie jest już
        przepełniona – przewaga mogła już zniknąć.”
      policy: |
        „Jeśli dofinansujemy X, wzrośnie popyt, ceny wzrosną – czy dofinansowanie
        rzeczywiście pomaga?”
      negotiation: |
        „Jeśli będę naciskać tutaj, oni odpowiedzą tam – jaki jest ogólny efekt?”
      incentives: |
        „Jeśli nagrodzimy ten wskaźnik, ludzie go wykorzystają – co tak naprawdę zrobią?”
    real_world_implications: |
      Myślenie drugiego rzędu jest cechą charakterystyczną myślenia strategicznego.
      Zapobiega porażkom politycznym, niezamierzonym bodźcom i naiwnemu optymizmowi.
      Wyróżnia dobrych od wybitnych decydentów.
    professional_application:
      networking_and_relationship_building: |
        Zanim podejmiesz działanie, zapytaj: „Jak oni zareagują? A jak ja zareaguję
        na to?” Rozważ dynamikę relacji, nie tylko natychmiastową wymianę.
      collaborative_learning_initiative: |
        Podczas planowania przeprowadzaj ćwiczenia „a potem co?”. Mapuj łańcuchy
        konsekwencji. Identyfikuj niezamierzone efekty, zanim się pojawią.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Myślenie o tylu krokach naprzód, że nigdy nie działasz.
      false_complexity: |
        Zakładanie, że efekty drugiego rzędu zawsze dominują, gdy efekty
        pierwszego rzędu mogą być wystarczające.
      overconfidence: |
        Przekonanie, że potrafisz przewidzieć długie łańcuchy, gdy niepewność się
        kumuluje.
      pessimism: |
        Zawsze zakładanie najgorszego w łańcuchu konsekwencji.
    related_content:
      - inversion
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Złudzenie kosztów utraconych
    quick_introduction: |
      Złudzenie kosztów utraconych to tendencja do kontynuowania inwestowania w decyzję
      ze względu na już poniesione zasoby, zamiast na podstawie przyszłych oczekiwanych zwrotów.
      Zwroty typu "tyle już zaszliśmy" lub "tyle już zainwestowałem" prowadzą do
      dorzucania pieniędzy do nieudanych przedsięwzięć.
    one_liner: Inwestycje z przeszłości przepadły – liczą się tylko przyszłe koszty i korzyści.
    try_this:
      - Zapytaj: Gdybym zaczynał dzisiaj, czy wybrałbym tę ścieżkę?
      - Zdefiniuj z góry "kryteria zakończenia" – warunki, przy których się zatrzymasz.
      - Oceń marginalną decyzję: co zyskam lub stracę od teraz?
    ask_yourself:
      - Czy kontynuuję ze względu na przyszłą wartość, czy by uzasadnić przeszłą inwestycję?
      - Co poradziłbym przyjacielowi, który byłby w mojej sytuacji od zera?
    in_more_detail: |
      Koszty utracone to przeszłe koszty, których nie można odzyskać. Racjonalne podejmowanie
      decyzji je ignoruje – liczą się tylko przyszłe koszty i korzyści. Ale jesteśmy emocjonalnie
      przywiązani do naszych inwestycji. Kończymy posiłek, którego nie lubimy, zostajemy na
      filmie, który nam się nie podoba, i kontynuujemy projekty, które przestały mieć sens. Chcemy
      "nie zmarnować" tego, co włożyliśmy, ale kontynuowanie często marnuje więcej.

      Złudzenie to jest szczególnie silne, gdy zainwestowaliśmy czas, wysiłek lub tożsamość,
      a nie tylko pieniądze. Przyznanie się do błędu może być kosztowne, więc podwajamy nasze
      zaangażowanie.
    why_this_is_important: |
      Rozpoznanie złudzenia kosztów utraconych pomaga ograniczać straty, zmieniać kierunek,
      gdy jest to uzasadnione, i podejmować decyzje w oparciu o przyszłą wartość, a nie przeszłą
      inwestycję. Jest to kluczowe dla projektów, kariery i związków.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - ruchy_karierowe
      - ocena_ryzyka
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "Nie możemy teraz przestać – wydaliśmy już X", gdy przyszłe zwroty nie uzasadniają
        kontynuowania.
      escalation_of_commitment: |
        Inwestowanie więcej w celu uzasadnienia lub "uratowania" wcześniejszej inwestycji.
      identity_investment: |
        Kontynuowanie, ponieważ przyznanie się do porażki zagroziłoby wizerunkowi siebie.
      ignoring_marginal_analysis: |
        Opieranie decyzji na całkowitym koszcie zamiast na kosztach i korzyściach marginalnych.
    examples:
      projects: |
        Kontynuowanie nieudanego projektu, ponieważ "poświęciliśmy mu już 6 miesięcy",
        gdy racjonalne byłoby ograniczenie strat.
      relationships: |
        Pozostawanie w związku, ponieważ "jesteśmy razem od 5 lat", zamiast
        oceny przyszłości.
      careers: |
        Pozostawanie w karierze, której nienawidzisz, ponieważ zainwestowałeś w dyplom lub
        lata doświadczenia.
      investments: |
        Trzymanie akcji ze stratą, aby "wrócić do zera", zamiast reinwestowania w
        lepsze możliwości.
    real_world_implications: |
      Złudzenie kosztów utraconych prowadzi do marnowania zasobów, przedłużania niepowodzeń i
      utraty możliwości. Dotyka jednostki, organizacje i rządy.
      Pokonanie go wymaga jasnych ram decyzyjnych.
    professional_application:
      networking_and_relationship_building: |
        Nie kontynuuj inwestowania w relacje lub współpracę, które już Ci nie służą, tylko
        ze względu na przeszłą inwestycję. Oceń przyszłą wartość.
      collaborative_learning_initiative: |
        Stwórz "kryteria zakończenia" dla projektów – warunki, przy których się zatrzymasz,
        niezależnie od przeszłej inwestycji. Okresowo przeglądaj projekty z perspektywy "od zera".
    how_can_this_be_misapplied:
      quitting_too_early: |
        Używanie "kosztów utraconych" jako wymówki do porzucania rzeczy, które potrzebują
        więcej czasu, by przynieść zyski.
      undervaluing_consistency: |
        Niektóre zobowiązania (np. relacje, reputacja) mają wartość w ciągłości,
        której czysta analiza marginalna nie uwzględnia.
      cold_rationality: |
        Odrzucanie przywiązania emocjonalnego jako irracjonalnego, gdy może ono odzwierciedlać
        prawdziwe wartości.
      analysis_paralysis: |
        Zbyt intensywne analizowanie, czy kontynuować, gdy odpowiedź jest jasna.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Błąd przeżywalności
    quick_introduction: |
      Błąd przeżywalności to błąd logiczny polegający na skupianiu się na osobach lub rzeczach, które "przetrwały" proces, pomijając te, które tego nie zrobiły. Widzimy zwycięzców i zapominamy o przegranych, co prowadzi do nadmiernie optymistycznych wniosków na temat sukcesu i porażki.
    one_liner: Widzimy zwycięzców i zapominamy o przegranych – prowadząc do nadmiernie optymistycznych wniosków.
    try_this:
      - Pytanie: Kto poniósł porażkę robiąc coś podobnego? Czego możemy się od nich nauczyć?
      - Poszukaj "niewidzialnej" próby – tych, którzy nie przetrwali.
      - Zwróć uwagę, kiedy studiujesz tylko historie sukcesu.
    ask_yourself:
      - Czy uczę się tylko od tych, którzy przetrwali?
      - Jak wyglądałby pełny obraz, gdybym uwzględnił porażki?
    in_more_detail: |
      Podczas II wojny światowej statystyk Abraham Wald poprawił rozmieszczenie pancerza na bombowcach, analizując, gdzie trafiono samoloty, które przetrwały – i zalecając pancerz tam, gdzie trafiono samoloty, które *nie* przetrwały, ponieważ te samoloty nigdy nie wróciły. Naturalnie skupiamy się na widzialnej próbie (ocalałych) i ignorujemy niewidzialną (tych, którzy ponieśli porażkę).

      Błąd przeżywalności zniekształca nasz pogląd na przedsiębiorczość, inwestycje, kariery i historię. Studiujemy odnoszące sukcesy firmy i pomijamy tysiące, które poniosły porażkę, robiąc podobne rzeczy. Słyszymy od szczęśliwców i zapominamy o pechowcach.
    why_this_is_important: |
      Korekta błędu przeżywalności prowadzi do bardziej realistycznych oczekiwań i lepszych decyzji. Pomaga uczyć się na błędach, a nie tylko na sukcesach, i unikać kopiowania strategii, które zadziałały tylko dla nielicznych szczęśliwców.
    when_to_use:
      - podejmowanie_decyzji
      - inwestowanie
      - zmiany_w_karierze
      - nauka
    how_can_you_spot_it:
      visible_success_stories: |
        Słyszymy od ludzi sukcesu znacznie częściej niż od tych, którzy próbowali i ponieśli porażkę.
      missing_failures: |
        Próba, którą obserwujemy, wyklucza tych, którym się nie udało i którzy w związku z tym nie mogą opowiedzieć swoich historii.
      copying_survivors: |
        Zakładanie, że to, co zrobili ocalali, spowodowało ich sukces, podczas gdy mogło to być szczęście lub tylko przeżycie.
      overly_optimistic_models: |
        Szacowanie wskaźników sukcesu, które ignorują mianownik prób.
    examples:
      entrepreneurship: |
        "Rzuć studia jak Zuckerberg" ignoruje wielu studentów, którzy rzucili naukę i nie założyli firm wartych miliard dolarów.
      investing: |
        Studiowanie tylko funduszy, które przetrwały, ignoruje te, które zostały zamknięte po słabych wynikach, zawyżając historyczne zwroty.
      career_advice: |
        Ludzie sukcesu przypisują sukces ciężkiej pracy; nie słyszymy od tych, którzy ciężko pracowali i ponieśli porażkę.
      historical_analysis: |
        Studiowanie "wielkich" firm, które przetrwały, ignoruje wiele, które poniosły porażkę z podobnymi strategiami.
    real_world_implications: |
      Błąd przeżywalności zawyża postrzegane wskaźniki sukcesu, zniekształca wzorce do naśladowania i prowadzi do złego naśladowania. Korekta tego błędu wymaga poszukiwania przypadków porażki i zrozumienia podstawowych wskaźników.
    professional_application:
      networking_and_relationship_building: |
        Szukając rady, poszukaj także osób, które próbowały i poniosły porażkę – ich perspektywy są często bardziej pouczające niż perspektywy ocalałych.
      collaborative_learning_initiative: |
        Studiuj nieudane projekty i zamknięte inicjatywy, nie tylko te udane. Prowadź "analizy po porażce", aby uczyć się na tym, co się nie udało.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Nadmierne korygowanie, aby zakładać, że sukces jest zawsze szczęściem i wysiłek nie ma znaczenia.
      dismissing_success: |
        Odrzucanie nauki od ludzi sukcesu z powodu "błędu przeżywalności".
      analysis_paralysis: |
        Zbyt duże skupienie na przypadkach porażki, co prowadzi do braku działania.
      false_equivalence: |
        Traktowanie strategii ocalałych i nie-ocalonych jako równie pouczających, gdy kontekst się różni.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
  - id: zasada_pareto
    name: Zasada Pareto
    quick_introduction: |
      Zasada Pareto (lub reguła 80/20) mówi, że około 80% efektów pochodzi z
      20% przyczyn. Niewielka mniejszość danych wejściowych często produkuje większość danych wyjściowych –
      w sprzedaży, błędach, klientach, wysiłku, funkcjach i nie tylko. Skup się na tym, co kluczowe.
    one_liner: 80% efektów pochodzi z 20% przyczyn – skup się na tym, co kluczowe.
    try_this:
      - Zidentyfikuj 20% danych wejściowych, które dają 80% wyników – zainwestuj w nie więcej.
      - Ogranicz lub obniż priorytet dla 80%, które dają niewiele.
      - Zapytaj: Które z niewielu rzeczy, gdybym zrobił je dobrze, miałyby największe znaczenie?
    ask_yourself:
      - Czy rozkładam wysiłek równomiernie, gdy kilka rzeczy ma większe znaczenie?
      - Jakie jest moje 20% o wysokiej dźwigni?
    in_more_detail: |
      Vilfredo Pareto zauważył, że 80% ziemi we Włoszech należało do 20%
      populacji. Zasada została uogólniona: 80% sprzedaży od 20%
      klientów, 80% błędów z 20% kodu, 80% wyników z 20% wysiłku.
      Dokładny stosunek się różni, ale wzorzec – nierównomierny rozkład – jest powszechny.

      Zasada sugeruje, że zidentyfikowanie i skupienie się na 20% o wysokiej dźwigni
      może znacząco poprawić wyniki. Jest to heurystyka priorytetyzacji, a nie prawo fizyki.
    why_this_is_important: |
      Stosowanie zasady Pareto pomaga bezwzględnie ustalać priorytety, unikać marnowania
      wysiłku na działania o niskim wpływie i osiągać więcej przy mniejszych środkach. Jest fundamentalna
      dla produktywności i strategii.
    when_to_use:
      - podejmowanie_decyzji
      - rozwiązywanie_problemów
      - przywództwo
      - zmiany_w_karierze
    how_can_you_spot_it:
      uneven_distribution: |
        Niewielka część X odpowiada za dużą część Y.
      high_leverage_activities: |
        Kilka działań przynosi większość wyników.
      low_value_tail: |
        Wiele działań wnosi niewiele; ich ograniczenie ma minimalny wpływ.
      vital_few_vs_trivial_many: |
        Kluczem jest zidentyfikowanie, które z niewielu mają największe znaczenie.
    examples:
      sales: |
        20% klientów generuje 80% przychodów – skup się na ich utrzymaniu i rozwijaniu.
      software: |
        20% funkcji napędza 80% użycia – nadaj im priorytet.
      productivity: |
        Kilka nawyków lub rutyn generuje większość Twoich wyników – zainwestuj w nie więcej.
      problems: |
        20% błędów powoduje 80% awarii – napraw te najpierw.
    real_world_implications: |
      Zasada Pareto kieruje alokacją zasobów, strategią produktową i
      osobistą produktywnością. Ignorowanie jej prowadzi do rozproszenia wysiłku.
      Nadmierne jej stosowanie może spowodować zaniedbanie "długiego ogona", gdzie ma to znaczenie.
    professional_application:
      networking_and_relationship_building: |
        Zidentyfikuj relacje, które mają największe znaczenie dla Twoich celów. Zainwestuj
        nieproporcjonalnie więcej w te relacje, zamiast rozkładać wysiłek równomiernie.
      collaborative_learning_initiative: |
        Przy poprawie wyników zespołu znajdź 20% interwencji, które napędzają
        80% wyników. Skup szkolenia i zmiany procesów tam.
    how_can_this_be_misapplied:
      oversimplification: |
        Zakładanie, że 80/20 ma zastosowanie wszędzie; niektóre rozkłady są bardziej równomierne.
      neglecting_the_tail: |
        Ignorowanie "trywialnej większości", gdy zbiorowo ma ona znaczenie (np. wielu małych
        klientów, przypadki brzegowe).
      false_precision: |
        Traktowanie 80/20 jako dosłowne, a nie jako przybliżoną heurystykę.
      misidentifying_the_vital_few: |
        Skupianie się na niewłaściwym 20% z powodu błędnej analizy.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: zeigarnik_effect
    name: Efekt Zeigarnik
    quick_introduction: |
      Efekt Zeigarnik to tendencja do lepszego zapamiętywania zadań niedokończonych lub przerwanych niż tych zakończonych. Niewypełnione zadania generują napięcie psychologiczne, które utrzymuje je aktywne w naszych umysłach. Nasze mózgi chwytają się tego, co jest niedokończone.
    one_liner: Niedokończone zadania tkwią w naszych umysłach – nasze mózgi chwytają się tego, co jest niekompletne.
    try_this:
      - Wykorzystaj dokończenie do "uwolnienia" zadań z mentalnego obciążenia – ukończ je lub świadomie porzuć.
      - Podziel pracę na możliwe do zarządzania fragmenty, aby stworzyć produktywne otwarte pętle.
      - Zwróć uwagę, gdy rozpamiętujesz niedokończone sprawy – zamknij pętlę lub zdecyduj się odpuścić.
    ask_yourself:
      - Jakie niedokończone zadania generują napięcie w moim umyśle?
      - Czy ta otwarta pętla jest warta zachowania, czy mogę ją zamknąć?
    in_more_detail: |
      Bluma Zeigarnik zauważyła, że kelnerzy lepiej pamiętali niezapłacone zamówienia niż te opłacone – gdy zadanie zostało ukończone, zostało ono "uwolnione" z pamięci. Niedokończone zadania tworzą otwartą pętlę, która domaga się zamknięcia. Napędza to zarówno produktywne skupienie (chcemy dokończyć), jak i niepokój (nie możemy przestać myśleć o tym, co jest niedokończone).

      Efekt ten jest wykorzystywany w marketingu (zakończenia pozostawiające w napięciu, niedokończone historie) i produktywności (dzielenie pracy na fragmenty, aby stworzyć wiele "otwartych pętli"). Tłumaczy, dlaczego rozpamiętujemy niedokończone sprawy i dlaczego listy zadań mogą być przytłaczające.
    why_this_is_important: |
      Zrozumienie efektu Zeigarnik pomaga w zarządzaniu obciążeniem umysłowym, projektowaniu angażujących doświadczeń i strategicznym wykorzystywaniu przerw. Tłumaczy, dlaczego nie możemy przestać myśleć o niedokończonej pracy – i dlaczego można to wykorzystać na swoją korzyść lub może być szkodliwe.
    when_to_use:
      - rozwiązywanie_problemów
      - przywództwo
      - uczenie_się
      - podejmowanie_decyzji
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Niedokończone zadania częściej nachodzą myśli niż te zakończone.
      better_recall_of_unfinished: |
        Lepiej pamiętamy przerwanego zadania niż ukończone.
      tension_for_closure: |
        Dyskomfort lub chęć dokończenia tego, co zostało rozpoczęte.
      serial_dramas: |
        Zakończenia pozostawiające w napięciu i "ciąg dalszy" wykorzystują ten efekt.
    examples:
      productivity: |
        Rozpoczęcie zadania tworzy napięcie psychiczne, które napędza jego dokończenie – lub niepokój, jeśli istnieje zbyt wiele otwartych pętli.
      marketing: |
        "Część 1 z 3" lub "Do zobaczenia wkrótce" utrzymuje zaangażowanie widzów i zachęca do powrotu.
      meetings: |
        Zakończenie spotkania bez jasnych kolejnych kroków pozostawia uczestników z nierozwiązanym napięciem.
      learning: |
        Nieodpowiedzione pytania lub niekompletne wyjaśnienia pozostają w pamięci i napędzają dalsze dociekania.
    real_world_implications: |
      Efekt Zeigarnik wpływa na produktywność, zaangażowanie i obciążenie umysłowe. Można go wykorzystać do skupienia lub może prowadzić do przytłoczenia. Tłumaczy atrakcyjność zakończeń pozostawiających w napięciu i ciężar zbyt wielu otwartych zadań.
    professional_application:
      networking_and_relationship_building: |
        Zakończ rozmowy z jasnymi kolejnymi krokami – lub celowymi otwartymi pętlami, jeśli chcesz, aby druga osoba podjęła dalsze działania. Nierozwiązane wątki tworzą zaangażowanie.
      collaborative_learning_initiative: |
        Wykorzystaj efekt Zeigarnik w szkoleniach: zadawaj problemy lub pytania przed przerwami, aby utrzymać zaangażowanie uczestników. Ale unikaj tworzenia zbyt wielu otwartych pętli, które mogłyby przytłoczyć ludzi.
    how_can_this_be_misapplied:
      overwhelm: |
        Tworzenie zbyt wielu otwartych pętli – zbyt wielu niedokończonych zadań – prowadzi do niepokoju i paraliżu.
      manipulation: |
        Świadome pozostawianie rzeczy nierozwiązanych w celu stworzenia zależności lub zaangażowania.
      false_urgency: |
        Wykorzystanie efektu do tworzenia sztucznego pośpiechu, gdy żaden nie istnieje.
      incomplete_work: |
        Rozpoczynanie wielu rzeczy w celu stworzenia "napięcia" bez faktycznego ich dokończenia – prowadzi do rozproszonego wysiłku.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Myślenie o sumie zerowej
    quick_introduction: |
      Myślenie o sumie zerowej to przekonanie, że zysk jednej osoby musi być stratą drugiej –
      że zasoby są ograniczone, a każda przewaga dla ciebie oznacza niedogodność dla mnie.
      W rzeczywistości wiele sytuacji to sytuacje o sumie dodatniej: obie strony mogą zyskać.
    one_liner: Twój zysk nie musi oznaczać mojej straty – wiele sytuacji to sytuacje o sumie dodatniej.
    try_this:
      - Zapytaj: Czy możemy "powiększyć tort"? Czy to faktycznie sytuacja o sumie zerowej?
      - Szukaj możliwości współpracy, zanim założysz konkurencję.
      - Zwróć uwagę, kiedy traktujesz sytuację jako stałą ("fixed-pie"), mimo że tak nie jest.
    ask_yourself:
      - Czy zakładam "stały tort", kiedy moglibyśmy go powiększyć?
      - Czy współpraca stworzyłaby więcej wartości niż konkurencja?
    in_more_detail: |
      W grze o sumie zerowej całość jest stała – twój zysk to moja strata. W sytuacjach o sumie dodatniej
      współpraca tworzy wartość. Handel, innowacje i budowanie relacji
      często są sytuacjami o sumie dodatniej. Myślenie o sumie zerowej prowadzi do niepotrzebnej
      konkurencji, utraconych okazji do współpracy i destrukcyjnej
      rywalizacji.

      Ten błąd poznawczy jest powszechny w negocjacjach, polityce i dynamice organizacyjnej.
      Zakłada "stały tort", podczas gdy tort często można powiększyć. Może stać się
      samospełniającym się proroctwem: jeśli traktujesz innych jako przeciwników, stają się oni przeciwnikami.
    why_this_is_important: |
      Rozpoznawanie myślenia o sumie zerowej otwiera możliwości współpracy i
      tworzenia wartości. Poprawia negocjacje, redukuje konflikty i umożliwia
      wyniki typu "win-win". Wiele najlepszych okazji to sytuacje o sumie dodatniej.
    when_to_use:
      - negocjacje
      - przywództwo
      - budowanie_relacji
      - podejmowanie_decyzji
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "Jeśli oni wygrają, ja przegram", gdy sytuacja może pozwolić obu stronom na zysk.
      competitive_ framing: |
        Automatyczne ujmowanie sytuacji jako "my kontra oni".
      envy_of_others_gains: |
        Uraza z powodu sukcesów innych, tak jakby umniejszały one własne osiągnięcia.
      missed_cooperation: |
        Niemożność dostrzeżenia możliwości współpracy, które przyniosłyby korzyść wszystkim.
    examples:
      negotiation: |
        Zakładanie, że lepsza umowa dla drugiej strony oznacza gorszą umowę dla ciebie – gdy kreatywne rozwiązania często zwiększają wartość dla obu stron.
      salary: |
        "Jeśli mój kolega dostanie podwyżkę, dla mnie zostanie mniej pieniędzy", gdy budżety mogą być elastyczne, a podwyżki uzasadnione stworzoną wartością.
      politics: |
        "Zyski ich partii to nasze straty", gdy wiele wyników polityki mogłoby przynieść korzyść wielu grupom.
      career: |
        "Ich awans oznacza mniej możliwości dla mnie", gdy rozwój organizacji może stworzyć więcej możliwości dla wszystkich.
    real_world_implications: |
      Myślenie o sumie zerowej napędza konflikty, ogranicza współpracę i prowadzi do utraconych możliwości.
      Często jest błędne w ekonomii, relacjach i
      innowacjach. Przejście na postrzeganie sytuacji jako o sumie dodatniej poprawia wyniki.
    professional_application:
      networking_and_relationship_building: |
        Szukaj sposobów na tworzenie wartości dla innych – ich sukces może stworzyć
        możliwości dla ciebie. Buduj relacje, w których obie strony korzystają.
      collaborative_learning_initiative: |
        Ujmuj cele zespołowe jako sytuacje o sumie dodatniej: wspólny sukces, "powiększanie tortu".
        Zachęcaj do współpracy zamiast wewnętrznej konkurencji.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Niektóre sytuacje są o sumie zerowej (np. pojedynczy awans, stały budżet).
        Udawanie, że jest inaczej, może być naiwne.
      naive_cooperation: |
        Zakładanie, że wszyscy będą współpracować, gdy niektórzy gracze są faktycznie
        wrogo nastawieni.
      undervaluing_competition: |
        Konkurencja może napędzać postęp; nie każda rywalizacja jest destrukcyjna.
      exploitation: |
        Używanie ram "sumy dodatniej" do wydobywania wartości od innych, którzy nie odnoszą korzyści.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
  - id: zjawisko_baader_meinhof
    name: Zjawisko Baader-Meinhof
    quick_introduction: |
      Zjawisko Baader-Meinhof (zwane również iluzją częstości) pojawia się, gdy uczysz się
      o czymś nowym, a następnie nagle zauważasz to wszędzie. Wydaje się to zbiegiem okoliczności,
      ale często jest to selektywna uwaga — Twój mózg jest nastawiony na zauważanie tego, co
      niedawno napotkał.
    one_liner: Uczysz się czegoś nowego i nagle widzisz to wszędzie — zawsze tam było.
    try_this:
      - Kiedy coś po nauce wydaje się być "wszędzie", sprawdź jego bazową częstość.
      - Zauważaj, kiedy niedawność sprawia, że coś wydaje się ważniejsze, niż jest w rzeczywistości.
      - Zapytaj: Czy widzę prawdziwy trend, czy tylko zauważam to, co mój mózg jest nastawiony na zauważenie?
    ask_yourself:
      - Czy to faktycznie jest teraz bardziej powszechne, czy po prostu częściej to zauważam?
      - Czy zauważyłbym ten wzorzec, gdybym się o nim niedawno nie dowiedział?
    in_more_detail: |
      Po usłyszeniu o grupie terrorystycznej Baader-Meinhof, osoba może zobaczyć odniesienia
      do niej w wiadomościach, w rozmowach i w artykułach w ciągu kilku dni. Zjawisko to ma
      dwie składowe: selektywną uwagę (zauważasz to, czego szukasz) i błąd potwierdzenia (pamiętasz
      trafienia i zapominasz o chybieniach).

      Iluzją jest to, że rzecz nagle stała się częstsza. W rzeczywistości zawsze była obecna;
      po prostu nie byłeś na nią wyczulony. Może to prowadzić do przeszacowania powszechności
      lub znaczenia niedawno poznanych informacji.
    why_this_is_important: |
      Rozpoznanie zjawiska Baader-Meinhof pomaga uniknąć przeszacowania, jak powszechne lub
      znaczące jest coś na podstawie niedawnego kontaktu. Wyjaśnia również, dlaczego nowe idee,
      produkty lub trendy mogą wydawać się "wszędzie" po tym, jak je po raz pierwszy zauważysz.
    when_to_use:
      - podejmowanie_decyzji
      - nauka
      - ocena_ryzyka
      - rozwiazywanie_problemow
    how_can_you_spot_it:
      sudden_ubiquity: |
        Uczysz się nowego słowa, koncepcji lub produktu i w ciągu kilku dni czujesz, że widzisz
        to ciągle.
      recency_bias: |
        Niedawne informacje wydają się bardziej reprezentatywne dla rzeczywistości, niż faktycznie są.
      pattern_seeking: |
        Twój mózg łączy niepowiązane obserwacje w narrację o tym, że "to jest wszędzie".
      forgetting_the_misses: |
        Nie śledzisz, jak często nie widzisz danego zjawiska — tylko momenty, w których je widzisz.
    examples:
      vocabulary: |
        Uczenie się słowa "serendipity" (szczęśliwy traf) i następnie zauważanie go w trzech
        różnych artykułach w tym samym tygodniu.
      car_purchase: |
        Po zdecydowaniu się na zakup konkretnego modelu samochodu, widzisz go na każdej
        ulicy — choć zawsze tam był.
      health_anxiety: |
        Czytanie o rzadkim objawie, a następnie zauważanie podobnych odczuć u siebie, co prowadzi
        do niepotrzebnego zmartwienia.
      trends: |
        Odkrycie nowej aplikacji lub trendu i poczucie, że nagle dominuje — podczas gdy może
        mieć niewielką bazę użytkowników.
    real_world_implications: |
      Zjawisko to wpływa na sposób, w jaki postrzegamy trendy, ryzyka i możliwości. Marketingowcy
      i media mogą je wykorzystywać, tworząc powtarzającą się ekspozycję. W podejmowaniu decyzji
      może prowadzić do nadmiernego ważenia niedawnych informacji.
    professional_application:
      networking_and_relationship_building: |
        Kiedy ktoś wielokrotnie wspomina o temacie po jego poznaniu, należy pamiętać, że może
        doświadczać iluzji częstości — temat niekoniecznie jest bardziej istotny, tylko bardziej
        widoczny dla tej osoby.
      collaborative_learning_initiative: |
        Podczas szkolenia należy podkreślić, że "widzenie czegoś wszędzie" po poznaniu czegoś
        nowego jest normalne; należy zachęcać do sprawdzania bazowych częstości zamiast polegania
        na poczuciu wszechobecności.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Zakładanie, że coś jest bardziej powszechne lub ważne, niż jest w rzeczywistości,
        ponieważ ostatnio często to zauważasz.
      confirmation_bias_amplification: |
        Wykorzystanie uczucia "widzenia tego wszędzie" jako dowodu na to, że przekonanie
        jest słuszne.
      decision_distortion: |
        Podejmowanie wyborów w oparciu o niedawno poznane informacje, które wydają się nieproporcjonalnie
