# Mental Models & Cognitive Biases (Urdu)
# Consolidated from mental-models-ur/

mental_models:
  - id: ambiguity_effect
    name: ابہام کا اثر
    quick_introduction: |
      ابہام کا اثر یہ رجحان ہے کہ ہم ان اختیارات سے گریز کرتے ہیں جب ہمیں نتائج کے امکانات کے بارے میں معلومات کی کمی ہوتی ہے۔ ہم نامعلوم خطرات پر معلوم خطرات کو ترجیح دیتے ہیں — یہاں تک کہ جب نامعلوم خطرات بہتر ہو سکتے ہیں۔ خود غیر یقینی صورتحال ناگوار محسوس ہوتی ہے۔
    one_liner: ہم نامعلوم خطرات پر معلوم خطرات کو ترجیح دیتے ہیں — یہاں تک کہ جب نامعلوم بہتر ہو سکتا ہے۔
    try_this:
      - پوچھیں: کیا میں یہ اختیار صرف غیر یقینی صورتحال کی وجہ سے سے گریز کر رہا ہوں، یا اس کا کوئی حقیقی نقصان ہے؟
      - جو آپ جانتے ہیں اسے گنتی میں لائیں؛ بعض اوقات "مبہم" اختیار کا واضح فائدہ ہوتا ہے۔
      - اس بات پر توجہ دیں جب آپ صرف اس لیے واقف کو ترجیح دیتے ہیں کیونکہ وہ زیادہ محفوظ محسوس ہوتا ہے۔
    ask_yourself:
      - کیا میں کسی چیز کو اس لیے رد کر رہا ہوں کیونکہ وہ مبہم ہے، یا اس لیے کہ وہ واقعی بدتر ہے؟
      - مجھے کیا جاننے کی ضرورت ہوگی تاکہ میں غیر یقینی اختیار کے ساتھ آرام دہ محسوس کروں؟
    in_more_detail: |
      ایلسبرگ کے تضاد میں، لوگ گیندوں کے نامعلوم تناسب والی برتن پر شرط لگانے کو ترجیح دیتے ہیں بجائے اس کے کہ معلوم تناسب والی برتن پر، یہاں تک کہ جب نامعلوم برتن بہتر مواقع فراہم کر سکتا ہے۔ ہم ابہام کو ناپسند کرتے ہیں — ہم ایک واضح (یہاں تک کہ اگر برا ہو) امکان کو ترجیح دیتے ہیں بجائے ایک غیر واضح کے۔

      یہ اثر سرمایہ کاری، کیریئر کے انتخاب، اور پالیسی میں فیصلوں کو متاثر کرتا ہے۔ جب ہم ایسے اختیارات سے گریز کرتے ہیں جو مبہم لیکن ممکنہ طور پر بہتر ہوں تو یہ نامناسب انتخاب کا باعث بن سکتا ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ ہم واقف برانڈز اور معلوم مقدار کو کیوں ترجیح دیتے ہیں۔
    why_this_is_important: |
      ابہام کے اثر کو پہچاننے سے آپ واقف کو زیادہ ترجیح دینے اور غیر یقینی کو کم ترجیح دینے سے بچنے میں مدد ملتی ہے۔ جب ابہام قابل انتظام ہو تو اس سے مواقع ضائع ہو سکتے ہیں۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ شفافیت اور وضاحت تشویش کو کیوں کم کرتی ہے۔
    when_to_use:
      - فیصلہ_سازی
      - خطرہ_تشخیص
      - سرمایہ_کاری
      - کیریئر_اقدامات
    how_can_you_spot_it:
      preference_for_known_risks: |
        مبہم اختیارات کے بجائے واضح (یہاں تک کہ بدتر) امکانات والے اختیارات کا انتخاب کرنا۔
      avoidance_of_uncertainty: |
        اس لیے کہ "ہمیں کافی نہیں معلوم" بنیادی طور پر اختیارات کو رد کرنا۔
      familiarity_over_optimality: |
        ممکنہ طور پر بہتر نامعلوم کے بجائے معلوم کو ترجیح دینا۔
      information_seeking: |
        ابہام کو کم کرنے والی معلومات کے لیے ادائیگی کی خواہش - یہاں تک کہ جب یہ فیصلے کو تبدیل نہ کرے۔
    examples:
      investing: |
        ملکی اسٹاک کو بین الاقوامی پر ترجیح دینا کیونکہ "ہم انہیں بہتر سمجھتے ہیں" تنوع کے فوائد کے باوجود۔
      employment: |
        ایک معروف ملازمت میں رہنا بجائے اس کے کہ غیر یقینی فائدے والی ملازمت اختیار کی جائے۔
      product_choice: |
        ایک نئے اختیار کو ترجیح دینے کے بجائے ایک واقف برانڈ کا انتخاب کرنا جس کا معیار غیر یقینی ہو۔
      medical: |
        غیر یقینی نتائج والے علاج کے بجائے معلوم ضمنی اثرات والے علاج کو ترجیح دینا، یہاں تک کہ جب مؤخر الذکر بہتر ہو سکتا ہے۔
    real_world_implications: |
      ابہام کا اثر مارکیٹوں، کیریئر کے انتخاب، اور پالیسی کو تشکیل دیتا ہے۔ اسے واضح معلومات فراہم کر کے یا فیصلوں کو دوبارہ بیان کر کے کم کیا جا سکتا ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ شفافیت اور مواصلات تشویش کو کیوں کم کرتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        تعلقات میں ابہام کو کم کریں: توقعات کو واضح کریں، واضح طور پر بات چیت کریں، اور غیر یقینی صورتحال کو کم کریں۔ لوگ واقف حالات کو ترجیح دیتے ہیں۔
      collaborative_learning_initiative: |
        جب تبدیلی متعارف کرائی جائے، تو ابہام کو کم کریں — اس بارے میں واضح معلومات فراہم کریں کہ کیا ہوگا، کب، اور کیوں ہوگا۔ ابہام مزاحمت میں اضافہ کرتا ہے۔
    how_can_this_be_misapplied:
      manipulation: |
        لوگوں کو ترجیحی اختیارات کی طرف لے جانے کے لیے جان بوجھ کر ابہام پیدا کرنا۔
      false_clarity: |
        جب حقیقی غیر یقینی صورتحال موجود ہو تو غلط یقین دہانی فراہم کرنا۔
      overconfidence: |
        یہ فرض کرنا کہ ابہام کو کم کرنے سے فیصلے ہمیشہ بہتر ہوتے ہیں — بعض اوقات مبہم اختیار واقعی بہتر ہوتا ہے۔
      analysis_paralysis: |
        جب کچھ ابہام ناگزیر ہو تو فیصلہ کرنے سے پہلے مکمل معلومات کا انتظار کرنا۔
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: اینکرنگ تعصب (Anchoring Bias)
    quick_introduction: |
      اینکرنگ تعصب (Anchoring bias) یہ ہے کہ فیصلے کرتے وقت پہلی بار ملنے والی معلومات پر بہت زیادہ انحصار کرنے کا رجحان۔ وہ ابتدائی "اینکر" بعد کے فیصلوں کو متاثر کرتا ہے، یہاں تک کہ جب وہ غیر متعلقہ یا بے ترتیب ہو۔
    one_liner: آپ جو پہلا نمبر دیکھتے ہیں وہی آگے آنے والے تمام نمبروں کو تشکیل دیتا ہے۔
    try_this:
      - بات چیت سے پہلے، اپنے ہدف کا نمبر طے کریں اور ان کے بتائے ہوئے اینکر سے بچیں۔
      - تخمینہ لگاتے وقت، دوسروں کا سننے سے پہلے اپنا نمبر خود تیار کریں۔
      - پوچھیں: کیا میں مختلف سوچوں گا اگر میں نے پہلے کوئی اور نمبر دیکھا ہوتا؟
    ask_yourself:
      - مجھے سب سے پہلے کون سا نمبر یا خیال ملا - اور کیا یہ میرے فیصلے کو متاثر کر رہا ہے؟
      - کیا میں اینکر سے کافی ایڈجسٹ کر رہا ہوں، یا اب بھی اس کے بہت قریب ہوں؟
    in_more_detail: |
      ایک کلاسک تجربے میں، اقوام متحدہ میں افریقی ممالک کے فیصد کا تخمینہ لگانے کے لیے کہا گیا لوگوں نے بلند تخمینے دیے اگر انہوں نے حال ہی میں ایک بڑا نمبر (مثلاً، 65 بمقابلہ 10) دیکھا ہو۔ اینکر - یہاں تک کہ جب بے ترتیب ہو - نے ان کے جوابات کو متاثر کیا۔ اینکرنگ بات چیت، قیمتوں، بھرتی اور پیشین گوئیوں کو متاثر کرتی ہے۔

      جو پہلا نمبر ہم دیکھتے ہیں وہ ایک حوالہ نقطہ بن جاتا ہے۔ ہم اس سے دور ایڈجسٹ کرتے ہیں، لیکن عام طور پر ناکافی طور پر۔ یہاں تک کہ جب ہم جانتے ہیں کہ اینکر بے ترتیب ہے، یہ اب بھی ہمیں متاثر کر سکتا ہے۔ ماہرین اس سے محفوظ نہیں ہیں۔
    why_this_is_important: |
      اینکرنگ کو سمجھنا آپ کو بہتر فیصلے کرنے، زیادہ مؤثر طریقے سے بات چیت کرنے اور دھوکہ دہی سے بچنے میں مدد کرتا ہے۔ یہ یہ بھی بتاتا ہے کہ معلومات کا ترتیب اور فریمنگ اتنی اہم کیوں ہے۔
    when_to_use:
      - decision-making (فیصلہ سازی)
      - negotiation (بات چیت)
      - investing (سرمایہ کاری)
      - risk_assessment (خطرات کا اندازہ)
    how_can_you_spot_it:
      first_number_dominance: |
        بات چیت یا تخمینہ میں پہلا نمبر حتمی نتیجے پر غیر متناسب طور پر اثر انداز ہوتا ہے۔
      insufficient_adjustment: |
        جب اینکر سے ایڈجسٹ کیا جاتا ہے، تو لوگ عام طور پر اتنا ایڈجسٹ نہیں کرتے۔
      arbitrary_anchor_influence: |
        یہاں تک کہ واضح طور پر غیر متعلقہ نمبر (مثلاً، سوشل سیکیورٹی نمبر کے آخری ہندسے) بھی تخمینوں کو متاثر کر سکتے ہیں۔
      order_effects: |
        جس ترتیب میں اختیارات پیش کیے جاتے ہیں وہ انتخاب کو بدل دیتا ہے۔
    examples:
      salary_negotiation: |
        ذکر کیا گیا پہلا نمبر - چاہے آجر کی طرف سے ہو یا امیدوار کی طرف سے - اکثر حتمی پیشکش کو اینکر کرتا ہے۔
      real_estate: |
        لسٹنگ کی قیمت خریداروں کے قدر کے ادراک کو اینکر کرتی ہے، یہاں تک کہ جب اسے جان بوجھ کر زیادہ یا کم مقرر کیا گیا ہو۔
      retail: |
        "99$ تھا، اب 49$" فروخت کی قیمت کو ایک سودا بنانے کے لیے اصل قیمت کو اینکر کے طور پر استعمال کرتا ہے۔
      forecasting: |
        پلاننگ میٹنگز میں ابتدائی تخمینے بعد کی پیشین گوئیوں کو اینکر کرتے ہیں، یہاں تک کہ جب پہلا تخمینہ ایک اندازہ تھا۔
    real_world_implications: |
      اینکرنگ بازاروں، بات چیت اور پالیسیوں کو تشکیل دیتی ہے۔ اسے اخلاقی طور پر (مثلاً، معقول توقعات طے کرنا) یا غیر اخلاقی طور پر (مثلاً، جوڑ توڑ والی قیمتیں) استعمال کیا جا سکتا ہے۔ اسے تسلیم کرنے سے فیصلہ سازی کا معیار بہتر ہوتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        بات چیت میں، اینکر طے کرنے کے لیے پہلی پیشکش کرنے پر غور کریں - یا جب دوسرا فریق ایسا کر رہا ہو تو اس سے آگاہ رہیں۔
      collaborative_learning_initiative: |
        میٹنگز میں، اس بات سے ہوشیار رہیں کہ تخمینوں پر کون پہلے بولتا ہے؛ بحث سے پہلے آزادانہ تخمینے جمع کرنے پر غور کریں۔
    how_can_this_be_misapplied:
      manipulation: |
        مطلوبہ نتائج کی طرف دوسروں کو موڑنے کے لیے جان بوجھ کر انتہائی اینکرز کا استعمال۔
      overconfidence_in_anchors: |
        اپنے پہلے تخمینے پر نظر ثانی کیے بغیر بہت زیادہ بھروسہ کرنا۔
      ignoring_relevant_information: |
        اینکر کو زیادہ متعلقہ ڈیٹا کو اوور رائڈ کرنے دینا۔
      exploitation: |
        سیلز کی حکمت عملی جو اصل قیمتوں کو مناسب بنانے کے لیے مبالغہ آمیز "مقابلے میں" قیمتوں کا استعمال کرتی ہیں۔
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: دستیابی کا کیسکیڈ
    quick_introduction: |
      دستیابی کا کیسکیڈ ایک خود کو تقویت دینے والا عمل ہے جہاں کوئی خیال
      عوامی بحث کے اعادہ کے ذریعے قابلِ اعتبار بن جاتا ہے۔ جتنا زیادہ اس پر بات ہوگی،
      اتنا ہی وہ "دستیاب" ہوگا، اتنے ہی زیادہ لوگ اس پر یقین کریں گے، اور اتنی ہی زیادہ اس پر بات ہوگی۔
      مجموعی یقین اپنی بنیادی سچائی سے قطع نظر رفتار پکڑ لیتا ہے۔
    one_liner: جتنا زیادہ کسی خیال کو دہرایا جاتا ہے، اتنا ہی وہ زیادہ قابلِ اعتبار لگتا ہے — ثبوت سے قطع نظر۔
    try_this:
      - پوچھیں: کیا یہ عقیدہ اس لیے وسیع ہے کہ یہ سچا ہے، یا اس لیے کہ اسے دہرایا گیا ہے؟
      - جو سب جانتے ہیں کو قبول کرنے سے پہلے بنیادی ذرائع تلاش کریں۔
      - اس بات کا نوٹس لیں کہ کب صرف تکرار آپ کی اعتبار کی حس کو چلا رہی ہے۔
    ask_yourself:
      - کیا میں اس پر یقین کروں گا اگر میں نے اسے صرف ایک بار سنا ہوتا؟
      - کیا میں "سب کہتے ہیں" کو "ثبوت اس کی تائید کرتے ہیں" کے ساتھ ملا رہا ہوں؟
    in_more_detail: |
      تیمور قران اور کیس سن سٹائن نے وضاحت کی کہ دستیابی کے کیسکیڈ کیسے کام کرتے ہیں:
      معلومات کی دستیابی (ہم کتنی بار کچھ سنتے ہیں) اور اعتبار (یہ کتنا قابلِ یقین لگتا ہے)
      ایک دوسرے کو تقویت دیتے ہیں۔ میڈیا کوریج، سوشل میڈیا، اور عوامی مباحثے مخصوص
      خیالات کو بڑھاوا دیتے ہیں۔ جب کوئی خیال دستیابی کی حد تک پہنچ جاتا ہے، تو یہ تیزی سے پھیل سکتا
      ہے اور "عام علم" بن سکتا ہے، یہاں تک کہ اگر یہ غلط یا مبالغہ آمیز ہو۔

      دستیابی کے کیسکیڈ فائدہ مند (اہم انتباہات پھیلانا) یا نقصان دہ (خوف یا غلط معلومات پھیلانا)
      ہو سکتے ہیں۔ انہیں دستیابی کے ہوریوسٹک اور سماجی ثبوت سے تقویت ملتی ہے۔
    why_this_is_important: |
      دستیابی کے کیسکیڈ کو پہچاننے سے آپ کو یہ جانچنے میں مدد ملتی ہے کہ آیا وسیع پیمانے پر
      یقین ثبوت کی عکاسی کرتا ہے یا محض تکرار کی. یہ بتاتا ہے کہ خیالات وائرل کیسے ہوتے ہیں
      اور مجموعی عقائد غلط کیسے ہو سکتے ہیں۔ یہ میڈیا لٹریسی اور تنقیدی سوچ کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ_سازی
      - خطرات_کا_اندازہ
      - سیکھنا
      - قیادت
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        جتنا زیادہ کسی خیال کو دہرایا جاتا ہے، اتنا ہی وہ زیادہ قابلِ اعتبار لگتا ہے۔
      media_amplification: |
        کوریج یقین کو بڑھاتی ہے جو مزید کوریج کو بڑھاتی ہے۔
      social_proof_belief: |
        "سب اس پر یقین کرتے ہیں" یقین کا ثبوت بن جاتا ہے۔
      threshold_effects: |
        جب کوئی خیال نمائش کی حد عبور کر لیتا ہے، تو یہ تیزی سے پھیلتا ہے۔
    examples:
      health_scares: |
        ایک مطالعہ تجویز کرتا ہے کہ ایک پروڈکٹ خطرناک ہے؛ میڈیا اسے بڑھاوا دیتا ہے؛
        عوام اس سے گریز کرتے ہیں؛ مزید کوریج ہوتی ہے۔ خطرہ مبالغہ آمیز ہو سکتا ہے۔
      financial_panic: |
        بینک کی ناکامی کی افواہیں پھیلتی ہیں؛ لوگ رقم نکالتے ہیں؛ یہ ہجوم خود پورا ہو جاتا ہے۔
      social_media: |
        ایک بیانیہ وائرل ہو جاتا ہے؛ تکرار سے یقین بڑھتا ہے؛ یقین سے شیئرنگ بڑھتی ہے۔
        سچائی اور وائرلٹی الگ ہو سکتی ہیں۔
      organizational: |
        نوکریوں میں کمی کی افواہ پھیلتی ہے؛ تشویش بڑھتی ہے؛ رویے بدلتے ہیں؛ افواہ ردعمل کے ذریعے
        قابلِ اعتبار بن جاتی ہے۔
    real_world_implications: |
      دستیابی کے کیسکیڈ عوامی رائے، پالیسی، اور بازاروں کو تشکیل دیتے ہیں۔
      یہ اہم سچائیوں اور خطرناک غلط فہمیوں دونوں کو پھیلا سکتے ہیں۔
      تنقیدی سوچ کے لیے کیسکیڈ سے چلنے والے یقین سے ثبوت پر مبنی یقین کو الگ کرنا ضروری ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی خیال "ہر جگہ" ہو، پوچھیں: کیا یہ سچ ہے کیونکہ اسے دہرایا گیا ہے، یا اس لیے دہرایا گیا ہے
        کہ یہ سچا ہے؟ بنیادی ذرائع تلاش کریں۔
      collaborative_learning_initiative: |
        بڑھاوے سے پہلے تصدیق کے ضابطے بنائیں۔ "جو سب جانتے ہیں" پر سوال اٹھانے کی حوصلہ افزائی کریں۔
        اس اتفاق رائے میں فرق کریں جو ثبوت کی عکاسی کرتا ہے اور اس اتفاق رائے سے جو دستیابی کی
        عکاسی کرتا ہے۔
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        کبھی کبھار وسیع پیمانے پر یقین درست ہوتا ہے۔ یہ نہ سمجھیں کہ تمام مقبول خیالات
        کیسکیڈ ہیں۔
      conspiracy_thinking: |
        "دستیابی کے کیسکیڈ" کا استعمال جائز خدشات کو ساختہ کے طور پر مسترد کرنے کے لیے۔
      false_skepticism: |
        اچھی طرح سے تائید شدہ خیالات کو مسترد کرنا کیونکہ وہ مقبول ہیں۔
      contrarianism: |
        یہ فرض کرنا کہ جو کچھ وسیع پیمانے پر یقین کیا جاتا ہے وہ غلط ہونا چاہیے۔
