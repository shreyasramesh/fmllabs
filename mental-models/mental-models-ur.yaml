      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: بائز کا نظریہ
    quick_introduction: |
      بائز کا نظریہ یہ بیان کرتا ہے کہ نیا ثبوت ملنے پر کسی مفروضے کے امکان کو کیسے اپ ڈیٹ کیا جائے۔ یہ اس خیال کو باقاعدہ بناتا ہے کہ عقائد کو اس تناسب سے تبدیل ہونا چاہئے کہ ثبوت ان کی کتنی اچھی طرح حمایت کرتا ہے—سب کچھ یا کچھ نہیں، بلکہ بتدریج۔
    one_liner: عقائد کو اس تناسب سے اپ ڈیٹ کریں جس طرح ثبوت ان کی حمایت کرتا ہے۔
    try_this:
      - اپنے پرائر سے شروع کریں؛ پوچھیں کہ اگر آپ غلط ہوتے تو ثبوت کتنا ممکن ہوتا۔
      - بتدریج اپ ڈیٹ کریں—ایک ڈیٹا پوائنٹ پر 0% سے 100% تک نہ پلٹیں۔
      - متبادل مفروضوں پر غور کریں: کیا ثبوت ان کے مطابق بھی ہوں گے؟
    ask_yourself:
      - یہ ثبوت دراصل امکان کو کتنا بدلتا ہے؟
      - کیا میں اپنے عقائد کو اپ ڈیٹ کر رہا ہوں، یا صرف اس کی تصدیق کر رہا ہوں جو میں پہلے ہی سوچ رہا تھا؟
    in_more_detail: |
      نظریہ بیان کرتا ہے کہ ثبوت کو دیکھتے ہوئے کسی مفروضے کا امکان، مفروضے کو دیکھتے ہوئے ثبوت کی زیادہ سے زیادہ امکان کے ساتھ ضرب ہونے والے پرائر امکان کے برابر ہوتا ہے، جسے ثبوت کے امکان سے تقسیم کیا جاتا ہے۔ عملی طور پر: اپنے پرائر عقیدے سے شروع کریں، دیکھیں کہ نیا ثبوت آپ کے مفروضے بمقابلہ متبادلات کے ساتھ کتنا مطابقت رکھتا ہے، اور اسی کے مطابق اپ ڈیٹ کریں۔

      بائزین سوچ تصدیقی تعصب کا مقابلہ کرتی ہے اس بات پر غور کرنے کی ضرورت کے ذریعے کہ اگر آپ غلط ہوتے تو ثبوت کتنا ممکن ہوتا۔ یہ احتمالی استدلال اور سائنسی اپ ڈیٹ کی بنیاد ہے۔
    why_this_is_important: |
      بائزین سوچ غیر یقینی صورتحال میں فیصلہ سازی کو بہتر بناتی ہے، آپ کو زیادہ اعتماد سے بچنے میں مدد دیتی ہے، اور ثبوت سے سیکھنے کے لیے ایک فریم ورک فراہم کرتی ہے۔ یہ تشخیص، پیش گوئی، اور کسی بھی غیر یقینی ڈومین کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ سازی
      - مسئلہ_حل
      - خطرے_کا_م valutazione
      - سیکھنا
    how_can_you_spot_it:
      prior_and_update: |
        ایک بنیادی عقیدے سے شروع کرنا اور نئے ثبوت کی بنیاد پر اسے ایڈجسٹ کرنا۔
      likelihood_ratio_thinking: |
        پوچھنا "اگر میں صحیح ہوں بمقابلہ غلط تو یہ ثبوت کتنا ممکن ہے؟"
      incremental_updating: |
        عقائد اچانک پلٹنے کے بجائے بتدریج ثبوت کے ساتھ بدلتے ہیں۔
      base_rate_respect: |
        پرائر امکانات (بیس ریٹس) اہم ہیں، نہ صرف تازہ ترین ڈیٹا پوائنٹ۔
    examples:
      medical_diagnosis: |
        کسی نایاب بیماری کے لیے مثبت ٹیسٹ—پرائر (کم پھیلاؤ) کا مطلب ہے کہ مثبت نتیجہ اکثر غلط مثبت ہوتا ہے۔ بائز امکان کو اپ ڈیٹ کرتا ہے۔
      forecasting: |
        ابتدائی تخمینوں پر قائم رہنے کے بجائے نیا ڈیٹا آنے پر پیشین گوئیوں کو اپ ڈیٹ کرنا۔
      hiring: |
        بنیادی شرحوں سے شروع کرنا جو نوکری کے لیے موزوں ہوں، پھر انٹرویو کی کارکردگی کی بنیاد پر اپ ڈیٹ کرنا۔
      investing: |
        کسی کمپنی کی کامیابی کے امکان کو اپ ڈیٹ کرنا جیسے نئی معلومات (آمدنی، خبریں) آتی ہیں۔
    real_world_implications: |
      بائزین سوچ جدید AI، طبی تشخیص، اور سائنسی استدلال کی بنیاد ہے۔ یہ بیس ریٹ نظر انداز کرنے اور تصدیقی تعصب کو درست کرتی ہے۔ یہ غیر یقینی صورتحال والے کسی بھی ڈومین کے لیے ایک طاقتور آلہ ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں کے بارے میں اپنے عقائد کو نئے ثبوت کی بنیاد پر اپ ڈیٹ کریں نہ کہ پہلے تاثرات کو مستقل رکھیں۔ اعمال کی تشریح کرتے وقت بیس ریٹس (مثلاً، یہ رویہ کتنا عام ہے؟) پر غور کریں۔
      collaborative_learning_initiative: |
        بحثوں سے پہلے ٹیموں کو واضح طور پر پرائرز بتانے کی ترغیب دیں، پھر ثبوت پیش ہونے پر اپ ڈیٹ کریں۔ یہ اینکرنگ اور تصدیقی تعصب کو کم کرتا ہے۔
    how_can_this_be_misapplied:
      overprecision: |
        زیادہ غیر یقینی صورتحال ہونے پر درست امکانات تفویض کرنا۔
      prior_rigidity: |
        مضبوط پرائرز پر قائم رہنا اور نئے ثبوت کے ساتھ کافی اپ ڈیٹ نہ کرنا۔
      base_rate_tyranny: |
        مضبوط ثبوت کو نظر انداز کرنا کیونکہ بیس ریٹس دوسری صورت کا مشورہ دیتے ہیں—کبھی کبھی ثبوت غالب آنا چاہیے۔
      false_sophistication: |
        اصل استدلال کیے بغیر درست نظر آنے کے لیے بائزین زبان کا استعمال کرنا۔
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: بنجامن فرینکلن کا اثر
    quick_introduction: |
      بنجامن فرینکلن کا اثر ایک نفسیاتی رجحان ہے جس کے تحت لوگ احسان کرنے کے بعد کسی سے زیادہ پسند کرنے لگتے ہیں۔ اس کے برخلاف کہ ہم ان لوگوں کی مدد کرتے ہیں جنہیں ہم پسند کرتے ہیں، ہم اکثر ان لوگوں کو پسند کرنے لگتے ہیں جن کی ہم نے مدد کی ہو۔
    one_liner: ہم ان لوگوں کو پسند کرنے لگتے ہیں جن کی ہم نے مدد کی ہے - ہمارے رویے ہمارے اعمال کی پیروی کرتے ہیں۔
    try_this:
      - اگر آپ کسی رشتے کو بہتر بنانا چاہتے ہیں، تو کسی سے معمولی سا احسان مانگنے پر غور کریں۔
      - اس بات پر غور کریں کہ احسان کرنے سے آپ کے احساسات کسی کے بارے میں کیسے بدلتے ہیں۔
      - اس بات سے آگاہ رہیں کہ دوسروں کو مدد کرنے کے بعد آپ کو وہ زیادہ پسند کر سکتے ہیں۔
    ask_yourself:
      - کیا کسی کی مدد کرنے سے میرے بارے میں اس کے احساسات بدلے ہیں؟
      - کیا میں اپنے ان کی عزت بڑھا کر اپنی کوشش کو درست ثابت کر رہا ہوں؟
    in_more_detail: |
      بنجامن فرینکلن نے اپنے حریف قانون ساز کو اس کی لائبریری سے ایک نایاب کتاب ادھار مانگ کر متاثر کرنے کا مشہور واقعہ بیان کیا۔ آدمی کے ہاں کہنے کے بعد، فرینکلن نے شکریہ کا نوٹ لکھ کر اسے واپس کر دیا۔ اس سے ان کے تعلقات میں نمایاں بہتری آئی۔ یہ اثر بتاتا ہے کہ ہمارے رویے ہمارے اعمال کی پیروی کرتے ہیں: جب ہم کسی کی مدد میں کوشش لگاتے ہیں، تو ہم ان کے بارے میں اپنی مثبت سوچ کو بڑھا کر اس کوشش کو جواز فراہم کرتے ہیں۔

      انسانی ذہنی تضاد کا نظریہ اس کی وضاحت کرتا ہے: جب ہم کسی ایسے شخص کی مدد کرتے ہیں جسے ہم ناپسند کرتے ہیں یا جس کے بارے میں ہم غیر جانبدار محسوس کرتے ہیں، تو ہم اپنے عمل (مدد) اور اپنے رویے (ناپسندیدگی) کے درمیان کشمکش محسوس کرتے ہیں۔ اس کشمکش کو ان کو زیادہ پسند کر کے حل کرنا اکثر اس بات کو تسلیم کرنے سے آسان ہوتا ہے کہ ہم نے اپنی ترجیحات کے خلاف کام کیا۔
    why_this_is_important: |
      بنجامن فرینکلن کے اثر کو سمجھنا آپ کو اسٹریٹجک انداز میں رشتے بنانے اور یہ تسلیم کرنے میں مدد کرتا ہے کہ جب آپ کے اپنے احساسات ماضی کے احسانات سے متاثر ہو سکتے ہیں۔ یہ یہ بھی واضح کرتا ہے کہ کسی رشتے کو بہتر بنانے کی کوشش کرتے وقت چھوٹے احسانات مانگنا انہیں پیش کرنے سے زیادہ مؤثر کیوں ہو سکتا ہے۔
    when_to_use:
      - رشتے_بنانا
      - مذاکرات
      - قیادت
      - تنازعہ_حل
    how_can_you_spot_it:
      liking_after_helping: |
        اس بات پر غور کریں کہ جب آپ کسی کے لیے احسان کرتے ہیں تو آپ ان کے بارے میں زیادہ گرم جوشی محسوس کرتے ہیں، چاہے پہلے آپ غیر جانبدار یا منفی محسوس کر رہے ہوں۔
      others_requesting_small_favors: |
        جب کوئی بار بار چھوٹے احسانات مانگتا ہے، تو وہ تعلق بنانے کے لیے دانستہ یا نادانستہ طور پر اس اثر کا فائدہ اٹھا رہے ہو سکتے ہیں۔
      attitude_shift_post_investment: |
        کسی کی مدد میں وقت یا کوشش لگانے کے بعد، مشاہدہ کریں کہ آیا ان کے بارے میں آپ کی رائے مثبت طور پر تبدیل ہوئی ہے۔
      reciprocal_relationship_dynamics: |
        وہ رشتے جہاں ایک شخص نے بہت سارے احسانات کیے ہوں، عمل میں توازن نظر آنے کے باوجود محبت میں عدم توازن محسوس ہو سکتے ہیں۔
    examples:
      networking: |
        کسی ساتھی سے کسی مسودہ پر رائے مانگنا، جس کی وجہ سے وہ آپ کی کامیابی میں زیادہ سرمایہ کاری محسوس کرتے ہیں اور آپ کے بارے میں زیادہ مثبت رویہ رکھتے ہیں۔
      sales: |
        ایک سیلز پرسن ایک ممکنہ گاہک سے ایک چھوٹا سا احسان (مثلاً، حوالہ یا تعارف) مانگتا ہے، جو گاہک کی وابستگی اور پسند کو بڑھاتا ہے۔
      conflict_resolution: |
        کسی اختلاف کے بعد، دوسرے فریق سے کسی غیر متعلقہ چیز میں مدد مانگنا تناؤ کو کم کر سکتا ہے اور نیک نیتی کو دوبارہ بحال کر سکتا ہے۔
      mentoring: |
        جب کوئی سینئر شخص کسی جونیئر شخص سے ان پٹ یا مدد مانگتا ہے، تو جونیئر شخص اکثر زیادہ قدر اور جڑا ہوا محسوس کرتا ہے۔
    real_world_implications: |
      بنجامن فرینکلن کا اثر ملازمت، فروخت، سفارت کاری اور روزمرہ کی سماجی حرکیات کو متاثر کرتا ہے۔ اسے اخلاقی طور پر پل بنانے کے لیے یا غیر اخلاقی طور پر محبت کو مسخ کرنے کے لیے استعمال کیا جا سکتا ہے۔ اسے پہچاننا آپ کو یہ سمجھنے میں مدد کرتا ہے کہ کچھ رشتے بے ترتیب احسانات کے بعد زیادہ مضبوط کیوں محسوس ہوتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        رشتے بناتے وقت، صرف احسانات پیش کرنے کے بجائے چھوٹے، معقول احسانات مانگنے پر غور کریں۔ مدد کا عمل سرمایہ کاری اور مثبت عزت پیدا کرتا ہے۔
      collaborative_learning_initiative: |
        ٹیموں میں، اراکین کو ایک دوسرے کی مدد کرنے (مثلاً، ساتھی کا جائزہ، باہمی تربیت) سے ہم آہنگی مضبوط ہو سکتی ہے۔ تعاون کو اس طرح منظم کریں کہ ہر کوئی مدد دے اور وصول کرے۔
    how_can_this_be_misapplied:
      manipulation: |
        کسی کو اپنی طرف متوجہ کرنے کے لیے، حقیقی ضرورت کے بغیر، دانستہ طور پر احسانات مانگنا، اگر دریافت ہو جائے تو استحصال کی طرح محسوس ہو سکتا ہے۔
      overreliance_on_favors: |
        یہ فرض کرنا کہ احسانات تنہا ایک خراب رشتے کو ٹھیک کر دیں گے؛ کچھ تنازعات میں براہ راست گفتگو اور احتساب کی ضرورت ہوتی ہے۔
      asymmetric_exploitation: |
        بدلہ دیے بغیر بار بار احسانات مانگنے سے الٹا اثر ہو سکتا ہے اور ناراضی پیدا ہو سکتی ہے۔
      misattributing_motives: |
        کسی کی گرم جوشی کو خالصتاً حقیقی سمجھنا جب یہ جزوی طور پر ان احسانات کا نتیجہ ہو سکتا ہے جو انہوں نے آپ کے لیے کیے ہیں۔
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: محدود منطقیت
    quick_introduction: |
      محدود منطقیت یہ خیال ہے کہ انسانی فیصلے دستیاب معلومات، ادراک کی صلاحیت اور وقت سے محدود ہوتے ہیں۔ ہم زیادہ سے زیادہ حاصل کرنے کی کوشش نہیں کرتے؛ ہم "اطمینان بخش" رویہ اختیار کرتے ہیں — ہم بہترین ممکنہ کے بجائے کافی اچھے اختیارات کا انتخاب کرتے ہیں۔
    one_liner: ہم اطمینان بخش رویہ اختیار کرتے ہیں — ہم بہترین نہیں، بلکہ کافی اچھا انتخاب کرتے ہیں۔
    try_this:
      - جب ممکن ہو تو انتخاب کو آسان بنائیں؛ بہت زیادہ اختیارات محدود منطقیت کو دبا دیتے ہیں۔
      - لامتناہی تلاش سے بچنے کے لیے پہلے سے "کافی اچھا" معیار طے کریں۔
      - اس بات کا نوٹس لیں جب آپ کم ہوتے ہوئے منافع کے مقام سے آگے بہتر بنانے کی کوشش کر رہے ہوں۔
    ask_yourself:
      - کیا میں کامل اختیار تلاش کرنے کی کوشش کر رہا ہوں جب کافی اچھا ہی کافی ہوتا؟
      - کون سی پابندیاں (وقت، معلومات، توجہ) میرے فیصلے کو محدود کر رہی ہیں؟
    in_more_detail: |
      ہاربرٹ سائمن نے کامل معلومات رکھنے والے عقلی اداکاروں کے کلاسیکی اقتصادی مفروضے کو چیلنج کرنے کے لیے اس تصور کو متعارف کرایا۔ حقیقت میں، ہمارے پاس محدود توجہ، کام کرنے کی یادداشت اور وقت ہوتا ہے۔ ہم ایسے فیصلے کرنے کے لیے ہوریوسٹکس (تجربے پر مبنی شارٹ کٹس) اور شارٹ کٹس کا استعمال کرتے ہیں جو ہماری پابندیوں کے پیش نظر "عقلی" ہوتے ہیں، چاہے وہ مثالی معنوں میں بہترین نہ ہوں۔

      محدود منطقیت اس بات کی وضاحت کرتی ہے کہ ہم ہمیشہ بہترین اختیار کا انتخاب کیوں نہیں کرتے، ہم تجربے پر مبنی اصولوں پر کیوں انحصار کرتے ہیں، اور سیاق و سباق اور فریم بندی اتنی اہم کیوں ہے۔ یہ ایک وضاحتی ماڈل ہے کہ ہم حقیقت میں کیسے فیصلہ کرتے ہیں، نہ کہ اس بات کی ہدایت کہ ہمیں کیسے کرنا چاہیے۔
    why_this_is_important: |
      محدود منطقیت کو سمجھنا آپ کو بہتر عمل تیار کرنے، دوسروں کے لیے انتخاب کو آسان بنانے، اور فیصلے کے معیار کے لیے حقیقت پسندانہ توقعات طے کرنے میں مدد کرتا ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ پابندیوں کے تحت "غیر عقلی" رویہ اکثر عقلی کیوں ہوتا ہے۔
    when_to_use:
      - فیصلہ سازی
      - مسئلہ_حل
      - قیادت
      - خطرہ_کا_اندازہ
    how_can_you_spot_it:
      satisficing_behavior: |
        لوگ مکمل طور پر موازنہ کرنے کے بجائے پہلے قابل قبول اختیار کا انتخاب کرتے ہیں۔
      heuristic_reliance: |
        مکمل تجزیہ کے بجائے تجربے پر مبنی اصولوں کا استعمال کرتے ہوئے فیصلے کیے جاتے ہیں۔
      context_dependence: |
        ایک ہی شخص اختیارات کو کس طرح پیش کیا جاتا ہے اس پر منحصر مختلف انتخاب کرتا ہے۔
      information_overload: |
        جب بہت زیادہ معلومات دستیاب ہوتی ہے، تو فیصلے کا معیار کم ہو سکتا ہے۔
    examples:
      hiring: |
        ایک مینیجر بہترین امیدوار کو تلاش کرنے کے لیے غیر معینہ مدت تک انٹرویو کرنے کے بجائے، معیار پر پورا اترنے والے پہلے امیدوار کی خدمات حاصل کرتا ہے۔
      consumer_choice: |
        خریدار دکان میں ہر پروڈکٹ کا موازنہ کرنے کے بجائے شیلف پر موجود چند پہلے اختیارات میں سے انتخاب کرتے ہیں۔
      policy: |
        ووٹر ہر پالیسی پوزیشن کا تجزیہ کرنے کے بجائے پارٹی سے وابستگی یا چند اہم مسائل کو شارٹ کٹس کے طور پر استعمال کرتے ہیں۔
      daily_routines: |
        لوگ ہر فیصلے کو دوبارہ بہتر بنانے کے بجائے عادات اور ڈیفالٹس پر عمل کرتے ہیں۔
    real_world_implications: |
      محدود منطقیت مارکیٹوں، پالیسی ڈیزائن اور تنظیمی رویے کو تشکیل دیتی ہے۔ جھٹکے اور چوائس آرکیٹیکچر اس لیے کام کرتے ہیں کیونکہ وہ ہماری حدود کو مدنظر رکھتے ہیں۔ اسے نظر انداز کرنے سے ایسے پیچیدہ نظام بنتے ہیں جنہیں لوگ مؤثر طریقے سے استعمال نہیں کر سکتے۔
    professional_application:
      networking_and_relationship_building: |
        دوسروں سے حقیقی وقت میں پیچیدہ ٹریڈ آف کو پروسیس کرنے کی توقع نہ کریں۔ انتخاب کو آسان بنائیں اور واضح ڈیفالٹس فراہم کریں۔
      collaborative_learning_initiative: |
        ایسے عمل ڈیزائن کریں جو محدود منطقیت کے ساتھ کام کریں: انتخاب کم کریں، ڈیفالٹس فراہم کریں، اور پیچیدہ فیصلوں کے لیے چیک لسٹ استعمال کریں۔
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        ایسے عمل ڈیزائن کرنا جو لامحدود ادراک کی صلاحیت کا فرض کرتے ہیں، جس سے فیصلے کی تھکاوٹ اور ناقص نتائج برآمد ہوتے ہیں۔
      blaming_irrationality: |
        دوسروں کی پابندیوں پر غور کیے بغیر ان کے انتخاب کو غیر عقلی کہہ کر الزام لگانا۔
      exploitation: |
        مطلوبہ نتائج کی طرف انہیں موڑنے کے لیے جان بوجھ کر لوگوں کو پیچیدگی سے مغلوب کرنا۔
      perfectionism: |
        بہترین فیصلوں کی توقع کرنا جب اطمینان بخش رویہ اکثر عقلی طریقہ کار ہوتا ہے۔
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: تماشائی اثر (Bystander Effect)
    quick_introduction: |
      تماشائی اثر افراد کا مدد پیش کرنے کا امکان کم ہونے کا رجحان ہے جب دوسرے لوگ موجود ہوں۔ جتنے زیادہ تماشائی ہوں گے، اتنے ہی کم امکان ہے کہ کوئی ایک شخص عمل کرے گا۔ ذمہ داری تقسیم ہو جاتی ہے؛ ہم فرض کرتے ہیں کہ کوئی اور مدد کرے گا۔
    one_liner: جتنے زیادہ لوگ موجود ہوں گے، اتنے ہی کم امکان ہے کہ کوئی ایک شخص عمل کرے گا۔
    try_this:
      - ہنگامی صورتحال میں، براہ راست ذمہ داری سونپیں: آپ، 911 پر کال کریں۔
      - یہ فرض نہ کریں کہ کوئی اور مدد کرے گا - عمل کریں یا واضح طور پر تفویض کریں۔
      - جب آپ دوسروں کے پہلے عمل کرنے کا انتظار کر رہے ہوں تو اس پر توجہ دیں۔
    ask_yourself:
      - کیا میں ذمہ داری تقسیم کر رہا ہوں کیونکہ دوسرے موجود ہیں؟
      - کیا میں تنہا ہونے پر مختلف عمل کروں گا؟
    in_more_detail: |
      کیٹی جینوویس کے قتل کے بعد (حالانکہ کہانی کو جزوی طور پر افسانوی بنایا گیا تھا)، محققین نے پایا کہ دوسروں کی موجودگی مدد کو کم کرتی ہے۔ ہم اشاروں کے لیے دوسروں کو دیکھتے ہیں — اگر کوئی عمل نہیں کرتا، تو ہم اسے "کوئی کارروائی درکار نہیں" کے طور پر سمجھتے ہیں۔ ہم ذمہ داری کی تقسیم کا بھی تجربہ کرتے ہیں: بہت سے لوگ موجود ہونے پر، ہر ایک کم ذاتی طور پر ذمہ دار محسوس کرتا ہے۔ ط نشرح جہالت (Pluralistic ignorance) واقع ہو سکتی ہے: ہر کوئی سوچتا ہے کہ کچھ غلط ہے لیکن کوئی بھی عمل نہیں کرتا کیونکہ کوئی اور عمل نہیں کر رہا ہے۔

      یہ اثر اس وقت سب سے زیادہ مضبوط ہوتا ہے جب صورتحال مبہم ہو اور جب تماشائی ایک دوسرے کو نہ جانتے ہوں۔ اسے براہ راست ذمہ داری سونپنے ("آپ، 911 پر کال کریں") سے دور کیا جا سکتا ہے۔
    why_this_is_important: |
      تماشائی اثر کو سمجھنے سے آپ کو اس وقت کارروائی کرنے میں مدد ملتی ہے جب دوسرے نہیں کرتے، اور ایسے نظام ڈیزائن کرنے میں مدد ملتی ہے جو اسے دور کرتے ہیں۔ اگر آپ پریشانی میں ہیں، تو ایک شخص کو نامزد کریں۔ اگر آپ تماشائی ہیں، تو دوسروں کے عمل کرنے کا انتظار نہ کریں۔
    when_to_use:
      - قیادت (leadership)
      - تعلقات کی تعمیر (relationship_building)
      - تنازعات کا حل (conflict_resolution)
      - فیصلہ سازی (decision-making)
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "کوئی اور یہ کر دے گا" جب بہت سے موجود ہوں۔
      pluralistic_ignorance: |
        ہر کوئی سوچتا ہے کہ کارروائی کی ضرورت ہے لیکن کوئی بھی کارروائی نہیں کرتا کیونکہ کوئی اور کارروائی نہیں کر رہا ہے۔
      social_proof_inaction: |
        دوسروں کی غیر کارروائی کو "کوئی کارروائی درکار نہیں" کے طور پر سمجھا جاتا ہے۔
      audience_inhibition: |
        احمق نظر آنے یا زیادہ رد عمل ظاہر کرنے کا خوف عمل کو روکتا ہے۔
    examples:
      emergency: |
        ایک شخص گر جاتا ہے؛ بہت سے تماشائیوں کے ساتھ، ہر ایک مدد کے لیے کم کال کرنے کا امکان رکھتا ہے۔
      workplace: |
        ہر کوئی مسئلہ دیکھتا ہے لیکن کوئی بھی اسے نہیں اٹھاتا — ہر ایک فرض کرتا ہے کہ کوئی اور اٹھائے گا۔
      harassment: |
        ہراساں کرنے کے گواہ مداخلت نہیں کرتے، ہر کوئی سوچتا ہے کہ دوسرے کریں گے۔
      meetings: |
        ایک برا خیال چیلنج کیے بغیر چلا جاتا ہے کیونکہ ہر کوئی فرض کرتا ہے کہ کوئی اور بولے گا۔
    real_world_implications: |
      تماشائی اثر کے ہنگامی صورتحال میں المناک نتائج ہو سکتے ہیں اور تنظیموں میں مسائل کو برقرار رہنے دیتا ہے۔ اسے دور کرنے کے لیے براہ راست ذمہ داری سونپنے اور مداخلت کی حوصلہ افزائی کرنے والے اصولوں کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب آپ کو مدد کی ضرورت ہو، تو ایک مخصوص شخص سے پوچھیں۔ جب آپ کچھ غلط دیکھیں، تو عمل کریں — فرض نہ کریں کہ دوسرے کریں گے۔ ایسے اصول بنائیں جہاں بولنے کی توقع کی جائے اور اسے انعام دیا جائے۔
      collaborative_learning_initiative: |
        لوگوں کو تماشائی اثر کو پہچاننے اور مداخلت کرنے کی تربیت دیں۔ "اگر آپ کچھ دیکھیں، تو کہیں" کا استعمال کریں اور واضح کردار سونپیں۔ جو لوگ پہلے بولتے ہیں انہیں انعام دیں۔
    how_can_this_be_misapplied:
      blaming_bystanders: |
        افراد کو سختی سے جانچنا جب اثر ایک طاقتور لمحاتی قوت ہو — صورتحال کو تبدیل کرنے پر توجہ دیں۔
      false_assumption: |
        یہ فرض کرنا کہ اگر کافی لوگ موجود ہوں تو کوئی ہمیشہ مدد کرے گا — اس کے برعکس اکثر ہوتا ہے۔
      overcorrection: |
        ہر ایک کو ذمہ دار بنانا تاکہ کوئی بھی نہ ہو — ذمہ داری کی تقسیم اب بھی واقع ہو سکتی ہے۔
      individualizing: |
        تماشائی اثر کو لمحاتی رجحان کے بجائے کردار کی خامی کے طور پر دیکھنا۔
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: دائرہ اختیار
    quick_introduction: |
      دائرہ اختیار ایک ذہنی ماڈل ہے جو آپ کو اپنی مہارت کی حدود جاننے اور اہم فیصلے کرتے وقت ان کے اندر رہنے پر زور دیتا ہے۔ وارن بفٹ اور چارلی منگر اس بات پر زور دیتے ہیں کہ آپ جو نہیں جانتے اسے جانیں۔
    one_liner: اپنی مہارت کی حدود جانیں — اور جب یہ اہم ہو تو ان کے اندر رہیں۔
    try_this:
      - نقشہ بنائیں کہ آپ کہاں حقیقی مہارت رکھتے ہیں بمقابلہ کہاں آپ اندازہ لگا رہے ہیں۔
      - جب آپ اپنے دائرہ سے باہر ہوں، تو مشورہ طلب کریں یا کام سونپیں۔
      - ایماندار بنیں: کیا کوئی حقیقی ماہر آپ کے فیصلے سے متفق ہوگا؟
    ask_yourself:
      - کیا میں اپنے دائرہ اختیار کے اندر ہوں، یا میں اندازہ لگا رہا ہوں؟
      - میں نے اس شعبے میں آخری بار "میں نہیں جانتا" کب تسلیم کیا؟
    in_more_detail: |
      ہر شخص کے پاس ایسے شعبے ہوتے ہیں جہاں وہ حقیقی مہارت رکھتے ہیں — جہاں وہ معلومات کا جائزہ لے سکتے ہیں، غلطیاں پکڑ سکتے ہیں، اور قابل اعتماد فیصلے کر سکتے ہیں۔ اس دائرہ سے باہر، وہ کسی دوسرے کی طرح تعصبات اور غلطیوں کا شکار ہوتے ہیں۔ کلید ایماندار خود کا تجزیہ ہے: آپ کہاں واقعی قابل ہیں، اور کہاں آپ اندازہ لگا رہے ہیں؟

      دائرہ جان بوجھ کر سیکھنے کے ذریعے بڑھ سکتا ہے، لیکن اس کی موجودہ حدود کو پہچاننے کے لیے عاجزی کی ضرورت ہوتی ہے۔ اپنے دائرہ سے باہر کام کرنے سے مہنگے غلطیوں کے خطرات بڑھ جاتے ہیں، خاص طور پر جب داؤ پر لگا ہو تو۔
    why_this_is_important: |
      اپنے دائرہ اختیار کے اندر رہنے سے مہنگی غلطیاں کم ہوتی ہیں اور فیصلے کا معیار بہتر ہوتا ہے۔ یہ آپ کو یہ جاننے میں بھی مدد کرتا ہے کہ کب مشورہ طلب کرنا ہے، کام سونپنا ہے، یا دستبردار ہونا ہے۔ اپنے دائرہ سے باہر زیادہ اعتماد ناکامی کا ایک بڑا ذریعہ ہے۔
    when_to_use:
      - فیصلہ_سازی
      - سرمایہ_کاری
      - کیریئر_کے_اقدامات
      - خطرہ_کا_اندازہ
    how_can_you_spot_it:
      honest_boundary_assessment: |
        کیا آپ کسی شعبے میں اپنے علم کی حدود بیان کر سکتے ہیں؟ کیا آپ جانتے ہیں کہ آپ کیا نہیں جانتے؟
      knowing_when_to_defer: |
        ایسی صورتحال کو پہچاننا جہاں آپ کو اکیلے فیصلہ کرنے کے بجائے ماہر کی رائے طلب کرنی چاہئے۔
      consistent_track_record: |
        آپ کے دائرہ کے اندر، آپ کے فیصلے وقت کے ساتھ درست ثابت ہوتے ہیں؛ باہر، وہ نہیں۔
      calibration: |
        کسی شعبے میں آپ کا اعتماد اس شعبے میں آپ کی حقیقی کارکردگی سے میل کھاتا ہے۔
    examples:
      investing: |
        بفٹ ٹیکنالوجی اسٹاک سے گریز کرتے ہیں کیونکہ وہ کہتے ہیں کہ وہ ان کے دائرہ اختیار سے باہر ہیں — وہ ان کا قابل اعتماد اندازہ نہیں لگا سکتے۔
      career: |
        ایک ماہر جو اپنے شعبے میں رہتا ہے بمقابلہ وہ جو ایک غیر متعلقہ علاقے میں "اسٹریچ" کردار ادا کرتا ہے۔
      hiring: |
        یہ جاننا کہ کب اپنی رائے پر انحصار کرنا ہے بمقابلہ تکنیکی کرداروں کے لیے ماہرین کو لانا ہے۔
      advice_giving: |
        اندازہ لگانے کے بجائے اپنی مہارت سے باہر کے موضوعات پر رائے دینے سے انکار کرنا۔
    real_world_implications: |
      دائرہ اختیار ویلیو انویسٹنگ اور پیشہ ورانہ کامیابی کا مرکزی حصہ ہے۔ اسے نظر انداز کرنے سے زیادہ اعتماد، ناکام منصوبے، اور ناقص مشورہ ہوتا ہے۔ دائرہ کو بڑھانے کے لیے جان بوجھ کر کوشش اور ایماندار فیڈ بیک کی ضرورت ہوتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        ان لوگوں کے ساتھ تعلقات بنائیں جن کے دائرہ اختیار آپ کے ساتھ تکمیل کرتے ہیں۔ جانیں کہ کب دوسروں کا تعارف کرانا ہے بجائے خود جواب دینے کے۔
      collaborative_learning_initiative: |
        اوورلیپنگ اور مکمل دائروں والی ٹیمیں بنائیں۔ لوگوں کی حوصلہ افزائی کریں کہ وہ بتائیں جب وہ اپنی صلاحیت سے باہر کام کر رہے ہوں۔
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        کبھی بھی اپنے دائرہ سے باہر نہ نکلنا ترقی اور سیکھنے کو محدود کر سکتا ہے۔
      false_modesty: |
        جوابدہی یا مشکل فیصلوں سے بچنے کے لیے ایک چھوٹا دائرہ ہونے کا دعویٰ کرنا۔
      gatekeeping: |
        دلیل میں شامل ہوئے بغیر دوسروں کو رد کرنے کے لیے "دائرہ اختیار" کا استعمال کرنا۔
      stagnation: |
        دائرہ کو ایک ایسی چیز کے طور پر برتاؤ کرنا جو مقرر ہے بجائے اس کے کہ وہ کوشش سے بڑھ سکتی ہے۔
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: ذہنی تضاد
    quick_introduction: |
      ذہنی تضاد وہ ذہنی تکلیف ہے جو ہمیں تب محسوس ہوتی ہے جب ہم متضاد عقائد رکھتے ہیں، یا جب ہمارے اعمال ہمارے عقائد کے برعکس ہوتے ہیں۔ ہم اس تکلیف کو کم کرنے کے لیے مجبور ہوتے ہیں—اکثر اپنے اعمال سے ملنے کے لیے اپنے عقائد کو تبدیل کر کے، بجائے اس کے کہ اپنے اعمال کو تبدیل کریں۔
    one_liner: ہم اپنے اعمال کے برعکس اپنے عقائد کو زیادہ کثرت سے تبدیل کرتے ہیں۔
    try_this:
      - اس بات کا نوٹس لیں کہ جب آپ رویے کو تبدیل کرنے کے بجائے تکلیف کو کم کرنے کے لیے توجیہ کر رہے ہوں۔
      - پوچھیں: کیا میں نے جو کیا اسے جائز ٹھہرانے کے لیے میں اپنے عقائد کو ایڈجسٹ کر رہا ہوں؟
      - غور کریں کہ آیا عقیدہ تبدیل کرنے کے بجائے عمل کو تبدیل کرنا زیادہ ایماندارانہ ہوگا۔
    ask_yourself:
      - کیا میں توجیہ کر کے تضاد کو کم کر رہا ہوں، یا واقعی تبدیلی کر کے؟
      - کیا میں اس عقیدے کو رکھتا اگر میں نے پہلے سے ہی اس طرح عمل نہیں کیا ہوتا؟
    in_more_detail: |
      لیون فیسٹنگر کا نظریہ بتاتا ہے کہ ہم ہم آہنگی کی تلاش کرتے ہیں۔ جب ہم اپنی اقدار کے خلاف کام کرتے ہیں (مثلاً، جھوٹ بولنا، پیسے ضائع کرنا)، تو ہم تضاد کا تجربہ کرتے ہیں۔ اسے کم کرنے کے لیے، ہم اپنا عقیدہ تبدیل کر سکتے ہیں ("یہ واقعی جھوٹ نہیں تھا") یا عمل کو کم کر سکتے ہیں ("یہ اتنا برا نہیں تھا")۔ ہم اکثر اصلاح کی بجائے توجیہ کرتے ہیں۔

      ذہنی تضاد بین فرینکلن اثر کو تقویت دیتا ہے (ہم ان لوگوں کو پسند کرتے ہیں جن کی ہم نے مدد کی ہے)، یہ بتاتا ہے کہ ہم ماضی کے فیصلوں کو کیوں جائز ٹھہراتے ہیں، اور بہت سے خود کو دھوکہ دینے کی بنیاد ہے۔ یہ عقیدہ کی تشکیل اور تبدیلی میں ایک طاقتور قوت ہے۔
    why_this_is_important: |
      ذہنی تضاد کو سمجھنا آپ کو اپنی توجیہات کو پہچاننے میں مدد کرتا ہے اور یہ سمجھنے میں کہ لوگ اپنے ذہن بدلنے سے کیوں مزاحمت کرتے ہیں۔ یہ یہ بھی بتاتا ہے کہ عہد اور ہم آہنگی قائل کرنے والے طاقتور اصول کیوں ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - تعلقات_بنانا
      - قیادت
      - تنازعات_کا_حل
    how_can_you_spot_it:
      post_decision_rationalization: |
        انتخاب کے بعد، ہم اپنے انتخاب کے مثبت پہلوؤں اور مسترد اختیارات کے منفی پہلوؤں پر زور دیتے ہیں۔
      belief_action_alignment: |
        ہم اپنے پہلے سے کیے گئے اعمال سے ملنے کے لیے اپنے عقائد کو ایڈجسٹ کرتے ہیں۔
      discomfort_with_inconsistency: |
        جب ہم دیکھتے ہیں کہ ہمارا رویہ ہمارے بیان کردہ اقدار سے میل نہیں کھاتا تو بے چینی۔
      resistance_to_disconfirming_evidence: |
        ایسی معلومات کو رد کرنا یا کم کرنا جو ہمارے عہد کے ساتھ متصادم ہوں۔
    examples:
      purchase_justification: |
        مہنگی چیز خریدنے کے بعد، ہم اس کے فوائد پر زور دیتے ہیں اور قیمت کو کم کرتے ہیں۔
      relationship: |
        ہم اچھے پر توجہ مرکوز کر کے اور برے کو کم کر کے ایک برے رشتے میں رہنے کو جائز ٹھہراتے ہیں۔
      career: |
        ہم ایسی نوکری میں رہنے کو جائز ٹھہراتے ہیں جسے ہم ناپسند کرتے ہیں، ان وجوہات پر زور دے کر جن کی وجہ سے ہمیں "رہنا پڑتا ہے"۔
      beliefs: |
        جب ہمارے اعمال ہمارے اقدار کے برعکس ہوتے ہیں، تو ہم اپنے اعمال کے بجائے اپنے اقدار کو تبدیل کرتے ہیں ("میں واقعی سبزی خور نہیں ہوں — میں صرف کبھی کبھی گوشت کھاتا ہوں")۔
    real_world_implications: |
      ذہنی تضاد عقیدہ کی تشکیل، صارفین کے رویے، اور سیاسی رویوں کو تشکیل دیتا ہے۔ یہ بتاتا ہے کہ لوگ بری فیصلوں کے بعد کیوں دوگنا ہو جاتے ہیں اور رویہ بدلنے سے عقیدہ کیوں بدل سکتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        چھوٹے عہد بڑے عہد کی طرف لے جاتے ہیں—لوگ اپنے ماضی کے اعمال کو جائز ٹھہراتے ہیں۔ اسے اخلاقی طور پر استعمال کریں: چھوٹی درخواستوں سے شروع کریں۔ اس بات سے آگاہ رہیں کہ جب آپ اپنے رویے کو جائز ٹھہرا رہے ہیں۔
      collaborative_learning_initiative: |
        تبدیلی کا تعارف کرواتے وقت، ابتدائی منظوری اور چھوٹے عہد حاصل کریں—وہ تضاد پیدا کرتے ہیں جو بڑے پیمانے پر قبولیت کو حوصلہ افزائی کرتا ہے۔ عوامی عہدوں کو مجبور کرنے سے گریز کریں جو ناراضی پیدا کرتے ہیں۔
    how_can_this_be_misapplied:
      manipulation: |
        لوگوں کو تعمیل میں دباؤ ڈالنے کے لیے دانستہ طور پر تضاد پیدا کرنا۔
      dismissing_genuine_change: |
        یہ فرض کرنا کہ تمام عقیدہ تبدیلی توجیہ ہے جب لوگ کبھی کبھی حقیقی طور پر اپ ڈیٹ کرتے ہیں۔
      forced_consistency: |
        لوگوں کو "مستقل" رہنے کے لیے دباؤ ڈالنا جب ان کے خیالات جائز طور پر تیار ہوئے ہوں۔
      self_deception: |
        اپنے بارے میں ناخوشگوار سچائیوں سے بچنے کو جائز ٹھہرانے کے لیے تضاد کے نظریہ کا استعمال کرنا۔
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: تصدیقاتی تعصب
    quick_introduction: |
      تصدیقاتی تعصب وہ رجحان ہے جس میں ہم اپنی موجودہ توہمات کی تصدیق کرنے والے
      معلومات کی تلاش، تشریح اور یاد کرتے ہیں۔ ہم معاون ثبوتوں کو زیادہ وزن دیتے ہیں
      اور ان ثبوتوں کو نظر انداز یا رد کر دیتے ہیں جو ہمارے نظریات کے خلاف ہوں۔ ہم
      اپنے مفروضات کو جانچنے کے بجائے تصدیق کرنے والے سوالات پوچھتے ہیں۔
    one_liner: ہم وہی تلاش کرتے اور یاد رکھتے ہیں جو ہماری توہمات کی تصدیق کرتا ہے؛ ہم اس کو نظر انداز کرتے ہیں جو ان کے خلاف ہو۔
    try_this:
      - پوچھیں: کیا چیز مجھے غلط ثابت کرے گی؟ فعال طور پر تردیدی ثبوت تلاش کریں۔
      - اس وقت نوٹس لیں جب آپ معاون معلومات کو تردیدی معلومات سے زیادہ وزن دے رہے ہوں۔
      - مخالف نظریے پر اپنے نظریے جتنا ہی سنجیدگی سے غور کریں۔
    ask_yourself:
      - کیا میں اپنے مفروضے کو جانچ رہا ہوں یا صرف اس کی تصدیق کر رہا ہوں؟
      - میں نے آخری بار نئے ثبوتوں کی بنیاد پر اپنا خیال کب بدلا؟
    in_more_detail: |
      ہم معلومات کے غیر جانبدار پروسیسر نہیں ہیں۔ ہم تصدیق کی تلاش کرتے ہیں، ابہام
      کی تشریح کو حمایت کے طور پر کرتے ہیں، اور غلطیوں سے زیادہ کامیابیوں کو یاد
      رکھتے ہیں۔ ہم خود کو ہم خیال لوگوں اور میڈیا سے گھیر لیتے ہیں۔ ہم "میں کیوں
      درست ہوں؟" کے بجائے "کیا چیز مجھے غلط ثابت کرے گی؟" پوچھتے ہیں۔ اس سے ہم
      زیادہ پر اعتماد اور اپ ڈیٹ کرنے میں سست ہو جاتے ہیں۔

      تصدیقاتی تعصب سب سے زیادہ پھیلے ہوئے اور اچھی طرح سے دستاویزی تعصبات میں سے
      ایک ہے۔ یہ سائنس، سیاست، تعلقات اور کاروبار کو متاثر کرتا ہے۔ اس پر قابو پانے
      کے لیے جان بوجھ کر کوشش اور منظم عمل کی ضرورت ہے۔
    why_this_is_important: |
      اچھے فیصلہ سازی اور سیکھنے کے لیے تصدیقاتی تعصب کو تسلیم کرنا ضروری ہے۔
      یہ آپ کو تردیدی ثبوت تلاش کرنے، متبادل مفروضوں پر غور کرنے، اور ضرورت
      پڑنے پر اپنی توہمات کو اپ ڈیٹ کرنے میں مدد کرتا ہے۔ یہ سائنسی سوچ کی بنیاد
      ہے۔
    when_to_use:
      - فیصلہ_سازی
      - سیکھنا
      - مسئلہ_حل_کرنا
      - خطرہ_کا_اندازہ
    how_can_you_spot_it:
      seeking_support: |
        اپنے نظریے کو جانچنے کے بجائے تصدیق کرنے والے ثبوت کی تلاش کرنا۔
      asymmetric_interpretation: |
        اپنے موقف کی حمایت کے طور پر مبہم ثبوتوں کی تشریح کرنا۔
      discounting_disconfirming: |
        اپنے نظریات کے خلاف ثبوتوں کو نظر انداز کرنا یا کم کرنا۔
      selective_exposure: |
        صرف ان ذرائع سے معلومات استعمال کرنا جن سے آپ متفق ہیں۔
    examples:
      hiring: |
        جلدی مثبت تاثر قائم کرنا اور پھر ایسے سوالات پوچھنا جو اس بات کی تصدیق
        کریں کہ امیدوار بہترین ہے۔
      investing: |
        اسٹاک خریدنے کے بعد، مثبت خبروں کی تلاش کرنا اور منفی تجزیوں کو نظر انداز
        کرنا۔
      relationships: |
        شریک حیات کے اعمال کی تشریح اس نظرئیے سے کرنا جو ان کے بارے میں آپ
        کے نظریے کی تصدیق کرتا ہے (اچھا یا برا)۔
      politics: |
        اپنی طرف کی معلومات کو بلا تنقید قبول کرنا اور دوسری طرف سے آنے والی
        اسی طرح کی معلومات کو رد کرنا۔
    real_world_implications: |
      تصدیقاتی تعصب غلط توہمات کو برقرار رکھتا ہے، پولرائزیشن کو بڑھاتا ہے،
      اور مہنگے غلطیوں کا سبب بنتا ہے۔ یہ اچھی سائنس اور اچھی فیصلہ سازی کا
      دشمن ہے۔ اس پر قابو پانے کے لیے جان بوجھ کر تردید تلاش کرنے کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں کے بارے میں رائے قائم کرتے وقت، جان بوجھ کر تردیدی ثبوت تلاش
         کریں۔ پوچھیں "کیا چیز میرا خیال بدلے گی؟" اور اسے تلاش کریں۔
      collaborative_learning_initiative: |
        تردیدی نقطہ نظر کو سامنے لانے کے لیے شیطانی وکیل، ریڈ ٹیموں اور
        پری-مورٹم کا استعمال کریں۔ ایسے لوگوں کو انعام دیں جو اچھے ثبوتوں
        کے ساتھ غالب نظریات کو چیلنج کرتے ہیں۔
    how_can_this_be_misapplied:
      false_balance: |
        تمام نظریات کو یکساں طور پر درست سمجھنا جب ثبوت مضبوطی سے ایک
        طرف کی حمایت کرتے ہیں۔
      excessive_skepticism: |
        تمام ثبوتوں کو "تصدیقاتی تعصب" کہہ کر رد کرنا جب کچھ توہمات
        مضبوطی سے تائید شدہ ہوں۔
      contrarianism: |
        تصدیقاتی تعصب سے بچنے کے لیے محض مخالف نظریہ اپنانا — جب اصل
        نظریہ درست ہو سکتا ہے۔
      analysis_paralysis: |
        کبھی بھی کسی نظرئیے پر قائم نہ ہونا کیونکہ "ہم متعصب ہو سکتے ہیں۔"
