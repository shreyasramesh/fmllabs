  - id: curse_of_knowledge
    name: علم کا عذاب
    quick_introduction: |
      علم کا عذاب وہ مشکل ہے جو کسی چیز کو جاننے کے بعد یہ تصور کرنے میں پیش آتی ہے کہ اسے نہ جاننا کیسا ہوتا ہے۔ ماہرین نئے لوگوں کو سکھانے میں مشکل محسوس کرتے ہیں کیونکہ وہ نئے لوگوں کے نقطہ نظر کو دوبارہ تخلیق نہیں کر سکتے۔ جب آپ کوئی چیز جانتے ہیں، تو آپ بھول جاتے ہیں کہ اسے نہ جاننا کیسا تھا۔
    one_liner: جب آپ کوئی چیز جانتے ہیں، تو آپ بھول جاتے ہیں کہ اسے نہ جاننا کیسا ہوتا ہے۔
    try_this:
      - وضاحت کرتے وقت، بنیادی اصولوں سے شروع کریں—فرض کریں کہ آپ کے سامعین کچھ نہیں جانتے۔
      - کسی نئے شخص سے کہیں کہ وہ واپس سمجھائے؛ ان کی الجھن آپ کے اندھے سپاٹس کو ظاہر کرتی ہے۔
      - اس وقت محسوس کریں جب آپ مراحل چھوڑ رہے ہوں یا ایسی اصطلاحات استعمال کر رہے ہوں جنہیں دوسرے شاید نہ جانتے ہوں۔
    ask_yourself:
      - کیا میں فرض کر رہا ہوں کہ دوسروں کے پاس وہی سیاق و سباق ہے جو میرے پاس ہے؟
      - کیا میری پس منظر کے بغیر کوئی شخص اسے سمجھے گا؟
    in_more_detail: |
      ایک کلاسیکی تجربے میں، جن لوگوں کو ایک پہیلی کا جواب معلوم تھا انہوں نے گانے کی دھن کو ٹیپ کیا اور دوسروں سے اس کا اندازہ لگانے کی توقع کی—انہوں نے اس کی واضحیت کو زیادہ سمجھا۔ ٹیپ کرنے والے اپنے ذہن میں گانے کو "سننا بند" نہیں کر سکتے تھے۔ علم "چپکنے والا" ہوتا ہے؛ جہالت کی نقل کرنا مشکل ہے۔

      یہ عذاب تدریس، مواصلات، پروڈکٹ ڈیزائن اور قیادت کو متاثر کرتا ہے۔ ہم فرض کرتے ہیں کہ دوسروں کے پاس وہی سیاق و سباق ہے جو ہمارے پاس ہے۔ ہم اصطلاحات استعمال کرتے ہیں۔ ہم مراحل چھوڑتے ہیں۔ ہم حیران ہوتے ہیں جب لوگ "سمجھ نہیں پاتے"۔
    why_this_is_important: |
      علم کے عذاب کو تسلیم کرنے سے تدریس، مواصلات اور پروڈکٹ ڈیزائن میں بہتری آتی ہے۔ یہ آپ کو لوگوں سے وہاں ملنے میں مدد کرتا ہے جہاں وہ ہیں، نہ کہ جہاں آپ ہیں. یہ مؤثر علم کی منتقلی کے لیے ضروری ہے۔
    when_to_use:
      - سیکھنا
      - قیادت
      - مسئلہ_حل_کرنا
      - رشتہ_سازی
    how_can_you_spot_it:
      obvious_to_you: |
        یہ "ظاہر ہے" تب ہوتا ہے جب یہ صرف اس لیے ظاہر ہوتا ہے کیونکہ آپ جواب جانتے ہیں۔
      jargon_use: |
        ایسی اصطلاحات کا استعمال کرنا جو سامعین نہیں جانتے، انہیں تعریف کیے بغیر۔
      skipped_steps: |
        یہ فرض کرنا کہ دوسرے اس خلا کو پر کریں گے جو آپ نے چھوڑ دیا ہے۔
      frustration_with_learners: |
        "وہ اسے کیوں نہیں دیکھ سکتے؟" جب ان کے پاس آپ کا سیاق و سباق نہ ہو۔
    examples:
      teaching: |
        ایک ریاضی کا پروفیسر ایسے مراحل کو چھوڑ دیتا ہے جو ان کے لیے "ظاہر" ہوتے ہیں لیکن
        طلباء کے لیے ضروری ہوتے ہیں۔
      product_design: |
        ڈیزائنرز ایسے انٹرفیس بناتے ہیں جو ان کے لیے معنی خیز ہوتے ہیں لیکن
        نئے صارفین کو الجھا دیتے ہیں۔
      onboarding: |
        تجربہ کار ملازمین بھول جاتے ہیں کہ نئے ملازمین کیا نہیں جانتے اور
        ناقص تربیت فراہم کرتے ہیں۔
      writing: |
        مصنفین فرض کرتے ہیں کہ قارئین کے پاس وہی پس منظر ہے اور وہ
        ضروری سیاق و سباق سے محروم رہتے ہیں۔
    real_world_implications: |
      علم کا عذاب مواصلات کے فرق، ناکام مصنوعات اور ناکارہ تدریس پیدا کرتا ہے۔ یہی وجہ ہے کہ ماہرین خراب
      استاد ہو سکتے ہیں۔ اس پر قابو پانے کے لیے سامعین کے نقطہ نظر کو اپنانے کے لیے جان بوجھ کر کوشش کرنے کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        وضاحت کرتے وقت، دوسرے شخص کی سطح سے شروع کریں۔ پوچھیں "وہ
        پہلے سے کیا جانتے ہیں؟" اپنی مواصلات کو کسی ایسے شخص کے ساتھ جانچیں
        جس کے پاس آپ کا پس منظر نہ ہو۔
      collaborative_learning_initiative: |
        "مجھے ایسے سمجھاؤ جیسے میں پانچ سال کا ہوں" مشقوں کا استعمال کریں۔ ماہرین سے
        نئے لوگوں کو سکھانے اور رائے حاصل کرنے کو کہیں۔ ایسی دستاویزات بنائیں جو
        کسی بھی سابقہ ​​علم کو فرض نہ کریں۔ ہم مرتبہ تدریس کا استعمال کریں—وہ لوگ جنہوں نے حال ہی میں
        سیکھا ہے وہ نئے شخص کے نقطہ نظر کو یاد رکھتے ہیں۔
    how_can_this_be_misapplied:
      oversimplification: |
        اس حد تک سادہ بنانا جہاں غلطی ہو یا تحقیر ہو۔
      false_assumption: |
        یہ فرض کرنا کہ دوسرے ان سے کم جانتے ہیں—یہ بھی کیلیبریشن کی ناکامی ہے۔
      one_size_fits_all: |
        تمام سامعین کو ایک ہی سطح کی وضاحت کی ضرورت نہیں ہوتی؛ سامعین کے مطابق
        ڈھالیں۔
      avoiding_complexity: |
        کچھ موضوعات پیچیدہ ہوتے ہیں۔ علم کا عذاب کا مطلب یہ نہیں ہے کہ
        جب مناسب ہو تو ہمیں کبھی بھی تکنیکی زبان کا استعمال نہیں کرنا چاہیے۔
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: ڈیفالٹ اثر
    quick_introduction: |
      ڈیفالٹ اثر انتخاب پیش کیے جانے پر پہلے سے منتخب شدہ آپشن کو منتخب کرنے کا رجحان ہے۔
      جو کچھ بھی ڈیفالٹ کے طور پر سیٹ کیا گیا ہے اس کا ایک مضبوط فائدہ ہے — لوگ اکثر
      اس کے ساتھ قائم رہتے ہیں چاہے وہ ان کے لیے بہترین ہو یا نہیں۔
    one_liner: جو کچھ بھی ڈیفالٹ کے طور پر سیٹ کیا گیا ہے اس کا ایک مضبوط فائدہ ہے — ہم اس کے ساتھ قائم رہتے ہیں۔
    try_this:
      - متبادلات کا جائزہ لیے بغیر ڈیفالٹ کو قبول کرتے وقت نوٹس لیں۔
      - انتخاب ڈیزائن کرتے وقت، ایسے ڈیفالٹس سیٹ کریں جو صارفین کے بہترین مفاد میں ہوں۔
      - پوچھیں: کیا میں اسے منتخب کروں گا اگر یہ پہلے سے منتخب نہ ہوتا؟
    ask_yourself:
      - کیا میں جمود کی وجہ سے ڈیفالٹ کا انتخاب کر رہا ہوں، یا اس لیے کہ یہ میرے لیے بہترین ہے؟
      - یہ ڈیفالٹ کس نے سیٹ کیا، اور اس سے انہیں کیا فائدہ ہو سکتا ہے؟
    in_more_detail: |
      ڈیفالٹس جمود، نقصان سے بچاؤ (تبدیلی کا احساس ڈیفالٹ کو کھو دینا ہے)، اور
      مضمون کی منظوری (ہم فرض کرتے ہیں کہ ڈیفالٹ کی سفارش کی گئی ہے) کی وجہ سے کام کرتے ہیں۔
      ملک کے لحاظ سے اعضاء کے عطیہ کی شرحیں نمایاں طور پر مختلف ہوتی ہیں، جو زیادہ تر اس پر مبنی
      ہوتی ہیں کہ ڈیفالٹ آپٹ-ان ہے یا آپٹ-آؤٹ۔ ریٹائرمنٹ بچت کی شرکت میں تیزی آتی ہے
      جب اندراج خودکار ہوتا ہے۔

      ڈیفالٹس کا استعمال اچھے کے لیے (بہتر نتائج کی طرف بڑھانا) یا
      ہیرا پھیری کے لیے (پہلے سے چیک شدہ خانوں میں ناموافق شرائط کو چھپانا) کیا جا سکتا ہے۔
      اس اثر کو سمجھنا آپ کو بہتر نظام ڈیزائن کرنے اور ناپسندیدہ ڈیفالٹس کا مقابلہ کرنے میں مدد کرتا ہے۔
    why_this_is_important: |
      ڈیفالٹ اثر کو سمجھنا آپ کو انتخاب کی وہ فن تعمیر ڈیزائن کرنے میں مدد کرتا ہے جو
      نتائج کو بہتر بناتی ہے، اور یہ آپ کو یہ پہچاننے میں مدد کرتا ہے کہ آپ کے انتخاب
      جان بوجھ کر ترجیح کے بجائے ڈیفالٹس سے کیسے متاثر ہو رہے ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - قیادت
      - مسئلہ_حل
      - خطرہ_تشخیص
    how_can_you_spot_it:
      inertia_toward_default: |
        زیادہ تر لوگ جو کچھ بھی پہلے سے منتخب کیا گیا ہے اس کے ساتھ قائم رہتے ہیں۔
      implied_recommendation: |
        ہم ڈیفالٹ کو "وہ جو ہم سے منتخب کروانا چاہتے ہیں" کے طور پر تعبیر کرتے ہیں۔
      opt_in_vs_opt_out: |
        فریمنگ نے شرکت کو نمایاں طور پر تبدیل کر دیا (آپٹ-ان بمقابلہ آپٹ-آؤٹ)۔
      pre_checked_boxes: |
        پہلے سے منتخب شدہ آپشنز کے فارمز اور سیٹنگز میں ایک مضبوط فائدہ ہوتا ہے۔
    examples:
      organ_donation: |
        آپٹ-آؤٹ ممالک میں آپٹ-ان ممالک کے مقابلے میں بہت زیادہ عطیات کی شرح ہے —
        ڈیفالٹ رویوں سے زیادہ اہم ہے۔
      retirement_savings: |
        خودکار اندراج 401(k) کی شرکت میں نمایاں اضافہ کرتا ہے۔
      software_installers: |
        "تجویز کردہ" آپشنز اور پہلے سے چیک شدہ ایڈ-آنز صارفین کے انسٹال کرنے کے طریقے کو
        شکل دیتے ہیں۔
      subscriptions: |
        مفت ٹرائلز جو خودکار طور پر ادا شدہ اندراج میں ڈیفالٹ ہوتے ہیں وہ بہت سے لوگوں کو
        قبضہ کر لیتے ہیں جو فعال طور پر سبسکرائب کرنے کا انتخاب نہیں کریں گے۔
    real_world_implications: |
      ڈیفالٹ اثر سب سے طاقتور نجز میں سے ایک ہے۔ یہ بچت،
      صحت، رازداری، اور صارفین کے رویے کو تشکیل دیتا ہے۔ اخلاقی انتخاب کی فن تعمیر
      نتائج کو بہتر بنانے کے لیے ڈیفالٹس کا استعمال کرتی ہے۔ تاریک پیٹرن ان کا استحصال کرنے کے لیے استعمال کرتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        دوسروں کے لیے عمل کو ڈیزائن کرتے وقت، ایسے ڈیفالٹس کا انتخاب کریں جو ان کے
        مفادات میں ہوں۔ تاریک پیٹرن سے بچیں جو قدر نکالنے کے لیے ڈیفالٹس کا استعمال کرتے ہیں۔
      collaborative_learning_initiative: |
        ٹیم کے طریقوں کے لیے ڈیفالٹس سیٹ کریں (مثلاً، غیر مطابقت پذیر کے لیے ڈیفالٹ،
        دستاویزات کے لیے ڈیفالٹ) جو مطلوبہ رویے کے ساتھ منسلک ہوں۔ صحیح انتخاب کو آسان انتخاب بنائیں۔
    how_can_this_be_misapplied:
      dark_patterns: |
        لوگوں کو ناگوار انتخاب میں پھنسانے کے لیے ڈیفالٹس کا استعمال (مثلاً، چھپی ہوئی
        فیس، ناپسندیدہ سبسکرپشنز)۔
      paternalism: |
        ایسے ڈیفالٹس مسلط کرنا جو حقیقی ترجیح کو رضامندی کے بغیر اوور رائڈ کرتے ہیں۔
      manipulation: |
        ڈیفالٹس میں ناگوار شرائط کو چھپانا اور جمود پر بھروسہ کرنا۔
      one_size_fits_all: |
        یہ فرض کرنا کہ وہی ڈیفالٹ سب کے لیے صحیح ہے جب ترجیحات مختلف ہوتی ہیں۔
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: ڈننگ-کُروگر اثر
    quick_introduction: |
      ڈننگ-کُروگر اثر ایک معلوماتی تعصب کی وضاحت کرتا ہے جہاں کسی ڈومین میں محدود علم یا مہارت رکھنے والے افراد اپنی اہلیت کو زیادہ سمجھ لیتے ہیں، جبکہ ماہرین اسے کم سمجھنے کا رجحان رکھتے ہیں۔ آپ جتنا کم جانتے ہیں، اتنے ہی زیادہ پُراعتماد ہو سکتے ہیں۔
    one_liner: آپ جتنا کم جانتے ہیں، اتنے ہی زیادہ پُراعتماد ہو سکتے ہیں۔
    try_this:
      - نئے ڈومین میں، یہ فرض کریں کہ آپ زیادہ پُراعتماد ہیں — رائے اور کیلیبریشن کی تلاش کریں۔
      - جب ماہرین شک کا اظہار کرتے ہیں، تو اسے سنجیدگی سے لیں؛ وہ ایج کیسز کو جانتے ہوں گے۔
      - جب کسی شعبے میں نووائس (نئے لوگ) ماہرین سے زیادہ پُراعتماد نظر آئیں تو اس پر غور کریں۔
    ask_yourself:
      - کیا میں "ماؤنٹ اسٹوپڈ کی چوٹی" پر ہوں یا "عاجزی کی وادی" میں؟
      - کیا میرے پاس یہاں اپنی اہلیت کا اندازہ لگانے کی میٹا کوگنیٹو صلاحیت ہے؟
    in_more_detail: |
      ڈننگ اور کُروگر کی تحقیق نے دکھایا کہ نااہل افراد میں اپنی نااہلی کو پہچاننے کی میٹا کوگنیٹو صلاحیت کی کمی ہوتی ہے۔ اپنی کارکردگی کا اندازہ لگانے کے لیے، آپ کو انہی مہارتوں کی ضرورت ہے جو اچھی کارکردگی کے لیے درکار ہیں — اس لیے ناتجربہ کار دوہرے نقصان میں ہیں: وہ خراب کارکردگی کا مظاہرہ کرتے ہیں اور انہیں اس کا علم نہیں ہوتا۔

      جیسے جیسے اہلیت بڑھتی ہے، لوگ اکثر "عاجزی کی وادی" کا تجربہ کرتے ہیں جہاں وہ تسلیم کرتے ہیں کہ وہ کتنا نہیں جانتے۔ حقیقی ماہرین کم پُراعتماد ہو سکتے ہیں کیونکہ وہ باریکیوں اور ایج کیسز سے بخوبی واقف ہوتے ہیں۔
    why_this_is_important: |
      ڈننگ-کُروگر اثر کو پہچاننے سے آپ کو اپنے اعتماد کو کیلیبریٹ کرنے، نووائس (نئے لوگوں) کی آراء کو زیادہ سمجھنے سے بچنے، اور ماہرین کی عاجزی کی تعریف کرنے میں مدد ملتی ہے۔ یہ سیکھنے، بھرتی، اور فیصلہ سازی کے لیے ضروری ہے۔
    when_to_use:
      - سیکھنا
      - فیصلہ_سازی
      - قیادت
      - کیریئر_کے_فیصلے
    how_can_you_spot_it:
      novice_overconfidence: |
        کم تجربہ رکھنے والا شخص مضبوط، غیر مشروط آراء کا اظہار کرتا ہے۔
      expert_underconfidence: |
        اعلیٰ ہنر مند لوگ کم ہنر مند لوگوں کے مقابلے میں زیادہ ہچکچاہٹ کا اظہار کرتے ہیں اور غیر یقینی صورتحال کو بیان کرتے ہیں۔
      inability_to_recognize_quality: |
        خراب کارکردگی کا مظاہرہ کرنے والے اپنے ڈومین میں اچھے اور برے کام کے درمیان فرق نہیں کر سکتے۔
      confidence_competence_mismatch: |
        شروع کرنے والوں میں اعتماد اور حقیقی اہلیت الٹا تعلق رکھتی ہے۔
    examples:
      social_media: |
        کسی موضوع کے سطحی علم رکھنے والے لوگ کسی ڈومین کے ماہرین سے پُراعتماد طریقے سے بحث کرتے ہیں۔
      hiring: |
        انٹرویو میں خراب کارکردگی دکھانے والے امیدوار بعض اوقات اپنی کارکردگی کو اعلیٰ درجہ دیتے ہیں۔
      investing: |
        ابتدائی فتوحات کے بعد نئے سرمایہ کار زیادہ پُراعتماد ہو سکتے ہیں، قسمت کو پہچاننے میں ناکام رہتے ہیں۔
      workplace: |
        جونیئر ملازمین ترقی کے لیے اپنی تیاری کو زیادہ سمجھ سکتے ہیں جبکہ سینئرز خود پر شک کرتے ہیں۔
    real_world_implications: |
      ڈننگ-کُروگر اثر تعلیم، بھرتی، سیاست، اور عوامی بحث کو متاثر کرتا ہے۔
      یہ وضاحت کرتا ہے کہ خراب خیالات کیوں پھیلتے ہیں اور ماہرین کو کیوں رد کیا جا سکتا ہے۔
      انفرادی اور اجتماعی فیصلہ سازی کے لیے کیلیبریشن اہم ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی شخص بہت پُراعتماد ہو، تو غور کریں کہ آیا وہ ڈننگ-کُروگر زون میں ہو سکتا ہے۔
        متنوع نقطہ نظر کی تلاش کریں، بشمول ان لوگوں سے جو غیر یقینی صورتحال کا اظہار کرتے ہیں۔
      collaborative_learning_initiative: |
        ایسی ثقافتیں بنائیں جہاں غیر یقینی صورتحال کا اعتراف قابل قدر ہو۔
        کیلیبریشن مشقوں اور آراء کی حوصلہ افزائی کریں جو لوگوں کو اپنی اہلیت کا درست اندازہ لگانے میں مدد کریں۔
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        یہ فرض کرنا کہ پُراعتماد لوگ ہمیشہ غلط ہوتے ہیں؛ بعض اوقات اعتماد جائز ہوتا ہے۔
      false_modesty: |
        ماہرین جو عاجز نظر آنے کے لیے کم جاننے کا دعویٰ کرتے ہیں۔
      gatekeeping: |
        ڈننگ-کروگر کو "ماہرین" سے اختلاف کرنے والے کسی بھی شخص کو اس کی دلیلوں میں شامل کیے بغیر رد کرنے کے لیے استعمال کرنا۔
      self_doubt_paralysis: |
        اپنے فیصلے پر کبھی بھروسہ نہ کرنے کے نقطہ تک زیادہ اصلاح کرنا۔
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: ہمدردی کا خلا
    quick_introduction: |
      جب ہم خود کسی مختلف حالت میں ہوں تو دوسروں کے ذہنی حالات کو سمجھنے اور ان کی پیشین گوئی کرنے میں درپیش دشواری کو ہمدردی کا خلا کہتے ہیں۔ جب ہم پرسکون ہوں، تو ہم اس بات کو کم سمجھیں گے کہ ہمیں غصہ یا بھوک لگنے پر کیسا محسوس ہوگا۔ جب ہم سیر ہوں، تو ہم اس بات کو کم سمجھیں گے کہ بھوکے ہونے پر ہمیں کھانے کی کتنی خواہش ہوگی۔
    one_liner: ہم کم سمجھ لیتے ہیں کہ ہمیں مختلف حالتوں میں کیسا محسوس ہوگا—اور دوسروں کو کیسا محسوس ہوگا۔
    try_this:
      - جب پرسکون ہوں، تو دباؤ میں ہونے کے لیے عہد کریں؛ پیشگی عہد کریں۔
      - ان لوگوں کو تنقید کا نشانہ نہ بنائیں جو ایسی حالت میں ہیں جس میں آپ نہیں ہیں — بھوکے، تھکے ہوئے، خوفزدہ۔
      - پوچھیں: کیا میں اپنی موجودہ حالت کو اپنے مستقبل کے خود یا دوسروں پر مسلط کر رہا ہوں؟
    ask_yourself:
      - کیا میں کم سمجھ رہا ہوں کہ مجھے کسی مختلف حالت میں کیسا محسوس ہوگا؟
      - کیا میں اس شخص کو بہتر سمجھوں گا اگر میں ان کی حالت میں ہوتا؟
    in_more_detail: |
      ہمیں یہ تصور کرنے میں دشواری ہوتی ہے کہ ہمیں مختلف حالات میں کیسا محسوس ہوگا—اور جب لوگ ان حالتوں میں ہوں جن میں ہم اس وقت نہیں ہیں تو انہیں کیسا محسوس ہوتا ہے۔ ایک ہوش مند شخص نشے کی کشش کو کم سمجھتا ہے۔ ایک اچھی طرح سے آرام کیا ہوا شخص نیند کی کمی کے اثر کو کم سمجھتا ہے۔ ہم اپنی موجودہ حالت کو دوسروں اور اپنے مستقبل کے خود پر مسلط کرتے ہیں۔

      ہمدردی کا خلا ہمارے مستقبل کے لیے کیے گئے فیصلوں (مثلاً، جب ہم حوصلہ افزائی میں ہوں تو ورزش کرنے کا عہد کرنا)، دوسروں کے لیے کیے گئے فیصلوں، اور مختلف حالتوں میں لوگوں کو سمجھنے کی ہماری صلاحیت کو متاثر کرتا ہے۔
    why_this_is_important: |
      ہمدردی کے خلا کو تسلیم کرنے سے آپ کے مستقبل کے لیے فیصلے کرنے، دوسروں کے لیے ہمدردی، اور اپنی تبدیلیوں کو سمجھنے میں بہتری آتی ہے۔ یہ واضح کرتا ہے کہ ہم ایسے عہد کیوں کرتے ہیں جنہیں ہم پورا نہیں کر سکتے اور ہم تکلیف میں دوسروں کو کیوں غلط سمجھتے ہیں۔
    when_to_use:
      - فیصلہ_کرنا
      - تعلقات_بنانا
      - قیادت
      - تنازعہ_حل_کرنا
    how_can_you_spot_it:
      current_state_projection: |
        یہ فرض کرنا کہ دوسروں کو ویسا ہی محسوس ہوتا ہے جیسا ہم اب کرتے ہیں، یا یہ کہ مستقبل میں ہمیں ویسا ہی محسوس ہوگا جیسا ہم اب کرتے ہیں۔
      underestimating_emotional_state: |
        "اس میں کیا بڑی بات ہے؟" جب ہم اس حالت میں نہیں ہوتے جس میں وہ ہیں۔
      commitment_failures: |
        موجودہ حوصلہ افزائی کی بنیاد پر ایسے انتخاب کرنا جنہیں ہم حوصلہ افزائی ختم ہونے پر پورا نہیں کریں گے۔
      misunderstanding_others: |
        دوسروں کے تجربات کو رد کرنا کیونکہ ہم اپنی موجودہ حالت سے ان کا تصور نہیں کر سکتے۔
    examples:
      hunger: |
        جب پیٹ بھرا ہو تو گروسری کی خریداری—ہم اتنا کم خریدتے ہیں جتنا بھوکے ہونے پر ہمیں چاہیے۔
      addiction: |
        غیر نشے کے عادی افراد کے لیے چھوڑنے کی دشواری کو کم سمجھنا؛ صحت یاب ہونے والے نشے کے عادی افراد جب وہ استعمال کر رہے ہوں تو کشش کو کم سمجھ سکتے ہیں۔
      conflict: |
        جب پرسکون ہوں، تو ہم اس بات کو کم سمجھتے ہیں کہ ہم تصادم کے وقت کیسا رد عمل ظاہر کریں گے۔
      motivation: |
        جب ہم حوصلہ افزائی میں ہوں تو 6 بجے کی کلاس کے لیے سائن اپ کرنا—اور جب ہم نیند میں ہوں تو نہ جانا۔
    real_world_implications: |
      ہمدردی کا خلا نشے کے علاج، پالیسی، اور باہمی سمجھ بوجھ کو متاثر کرتا ہے۔ یہ واضح کرتا ہے کہ ہم ایسے عہد کیوں کرتے ہیں جنہیں ہم توڑتے ہیں اور ہم اکثر دوسروں کے نقطہ نظر کو سمجھنے میں کیوں ناکام رہتے ہیں۔ یہ ہمدردی اور اچھے فیصلے کرنے میں ایک رکاوٹ ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی دباؤ، غصے، یا کسی مختلف حالت میں ہو، تو یہ فرض نہ کریں کہ وہ ویسے ہی دلیل کریں گے جیسے آپ کرتے ہیں۔ ان کی حالت کا تصور کرنے کی کوشش کریں۔ جب عہد کر رہے ہوں، تو اس بات پر غور کریں کہ جب حوصلہ افزائی ختم ہو جائے تو آپ کو کیسا محسوس ہوگا۔
      collaborative_learning_initiative: |
        جب منصوبہ بندی کر رہے ہوں، تو اس بات پر غور کریں کہ ٹیم کو کیسا محسوس ہوگا جب وہ تھکے ہوئے، دباؤ میں، یا مایوس ہوں گے۔ صرف حوصلہ افزائی والے منصوبہ بندی کے بجائے ان حالتوں کے لیے ڈیزائن کریں۔
    how_can_this_be_misapplied:
      overattribution: |
        تمام غلط فہمی کو "ہمدردی کا خلا" سمجھنا جب کبھی لوگ واقعی مختلف اقدار رکھتے ہوں۔
      excusing_behavior: |
        "وہ اس سے مدد نہیں کر سکے—ہمدردی کا خلا" جب لوگ اپنی حالتوں کا انتظام کرنے کے ذمہ دار ہوں۔
      false_relativism: |
        یہ فرض کرنا کہ ہم کبھی بھی دوسروں کو نہیں سمجھ سکتے جب ہم کوشش اور تجربے سے بہتر ہو سکتے ہیں۔
      self_excuse: |
        اپنے وعدوں کو پورا کرنے میں ناکامی کی وضاحت کے لیے ہمدردی کے خلا کا استعمال کرنا۔
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: انعطاف الملکیت (Endowment Effect)
    quick_introduction: |
      انعطاف الملکیت وہ رجحان ہے جس میں ہم کسی چیز کی زیادہ قدر کرتے ہیں صرف اس لیے کہ ہم اس کے مالک ہیں۔ ہم اسے دینے کے لیے اس قیمت سے زیادہ کا مطالبہ کرتے ہیں جو اسے حاصل کرنے کے لیے ادا کرنے کو تیار ہوتے ہیں۔ ملکیت ایسی وابستگی پیدا کرتی ہے جو ہماری قدر کو مسخ کرتی ہے۔
    one_liner: ہم اپنی ملکیت کی چیزوں کو ان چیزوں سے زیادہ اہمیت دیتے ہیں جو ہماری ملکیت نہیں ہیں - ملکیت وابستگی پیدا کرتی ہے۔
    try_this:
      - Ask: اگر میں اس کا مالک نہ ہوتا تو اسے حاصل کرنے کے لیے میں کتنا ادا کرتا؟
      - When selling, imagine you're buying—would you pay your asking price? (جب بیچ رہے ہوں، تو تصور کریں کہ آپ خرید رہے ہیں - کیا آپ اپنی مطلوبہ قیمت ادا کریں گے؟)
      - Notice when ownership is inflating your valuation. (نوٹس کریں جب ملکیت آپ کی قدر میں اضافہ کر رہی ہو۔)
    ask_yourself:
      - Am I overvaluing this because I own it? (کیا میں اس کی زیادہ قدر کر رہا ہوں کیونکہ میں اس کا مالک ہوں؟)
      - Would a neutral buyer agree with my price? (کیا ایک غیر جانبدار خریدار میری قیمت سے متفق ہوگا؟)
    in_more_detail: |
      تجربات میں، جن لوگوں کو بے ترتیب طور پر ایک مگ دیا گیا تھا، وہ اسے فروخت کرنے کے لیے اس سے تقریباً دوگنا مطالبہ کرتے ہیں جتنا دوسرے اسے خریدنے کے لیے ادا کرنے کو تیار ہوتے ہیں۔ صرف ملکیت کی حقیقت محسوس شدہ قیمت کو بڑھا دیتی ہے۔ یہ نقصان سے بچنے سے متعلق ہے - کسی چیز کو چھوڑنا نقصان جیسا محسوس ہوتا ہے، اور ہم نقصان سے بچتے ہیں۔ لیکن اثر اس سے آگے بڑھتا ہے: ہم اپنی ملکیت کی چیزوں کو اپنی شناخت میں شامل کرتے ہیں۔

      انعطاف الملکیت مذاکرات، صارف کے رویے، اور تنظیمی تبدیلیوں کو متاثر کرتی ہے۔ یہ بتاتی ہے کہ لوگ اپنے گھروں، اپنے خیالات، اور اپنے موجودہ کرداروں کو کیوں زیادہ اہمیت دیتے ہیں۔ یہ تجارت اور منتقلی میں رکاوٹ پیدا کرتی ہے۔
    why_this_is_important: |
      انعطاف الملکیت کو پہچاننا آپ کو زیادہ مؤثر طریقے سے مذاکرات کرنے، یہ فیصلہ کرنے میں واضح ہونے میں مدد کرتا ہے کہ کیا رکھنا ہے یا کیا چھوڑنا ہے، اور یہ سمجھنے میں مدد کرتا ہے کہ دوسرے اپنی ملکیت کی چیزوں کو کیوں زیادہ اہمیت دیتے ہیں۔ یہ تبدیلی کے خلاف مزاحمت کو بھی واضح کرتا ہے۔
    when_to_use:
      - فیصلہ_سازی (decision_making)
      - مذاکرات (negotiation)
      - سرمایہ_کاری (investing)
      - کیریئر_کی_حرکتیں (career_moves)
    how_can_you_spot_it:
      ownership_premium: |
        "میں اسے اس قیمت پر نہیں بیچوں گا" جب آپ اسے خریدنے کے لیے وہ قیمت ادا نہیں کریں گے۔
      attachment_to_possession: |
        چیزوں کو حاصل کرنے کے بعد انہیں زیادہ اہمیت دینا۔
      resistance_to_trading: |
        تجارت یا تبادلے سے ہچکچاہٹ، یہاں تک کہ جب یہ عقلی ہو۔
      overvaluation_of_own_ideas: |
        ہمارے خیالات، پروجیکٹس، یا کردار ہمارے اپنے ہونے کی وجہ سے زیادہ قیمتی محسوس ہوتے ہیں۔
    examples:
      real_estate: |
        گھر کے مالکان اکثر اپنے گھروں کی قیمت زیادہ لگاتے ہیں - وہ انہیں مارکیٹ سے زیادہ اہمیت دیتے ہیں۔
      negotiations: |
        بیچنے والے اس سے زیادہ مطالبہ کرتے ہیں جو خریدار ادا کرنے کو تیار ہوتے ہیں۔ یہ فرق انعطاف الملکیت کو ظاہر کرتا ہے۔
      career: |
        تبدیلی پر غور کرتے وقت اپنی موجودہ ملازمت، کمپنی، یا کردار کو زیادہ اہمیت دینا۔
      ideas: |
        "یہاں ایجاد نہیں ہوئی" اور "میرا خیال" کا تعصب - ہم جو کچھ تخلیق کرتے ہیں یا جس کے مالک ہوتے ہیں اس کی زیادہ اہمیت دیتے ہیں۔
    real_world_implications: |
      انعطاف الملکیت مارکیٹ میں رکاوٹ پیدا کرتی ہے، فائدہ مند تبادلے کو سست کرتی ہے، اور تبدیلی کے خلاف مزاحمت کو ہوا دیتی ہے۔ یہ انضمام، تنظیم نو، اور ذاتی منتقلی کو متاثر کرتی ہے۔ اسے سمجھنے سے مذاکرات اور تبدیلی کے انتظام میں بہتری آتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی تبدیلی کی مخالفت کرتا ہے، تو غور کریں کہ وہ انعطاف الملکیت کا تجربہ کر رہے ہوں گے - وہ موجودہ صورتحال کو زیادہ اہمیت دیتے ہیں کیونکہ وہ اس کے "مالک" ہیں۔ تبدیلی کو اس انداز میں پیش کریں جو وہ حاصل کریں گے، نہ صرف اس کے علاوہ جو وہ چھوڑ رہے ہیں۔
      collaborative_learning_initiative: |
        نئے عمل متعارف کراتے وقت، تسلیم کریں کہ لوگ موجودہ طریقوں سے وابستہ ہیں۔ نئے کو اپنانے سے پہلے پرانے کو "چھوڑنے" کے لیے نفسیاتی حفاظت پیدا کریں۔
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        کچھ وابستگی عقلی ہوتی ہے - جذباتی قدر، سوئچنگ لاگت۔ ہر مزاحمت انعطاف الملکیت نہیں ہوتی۔
      manipulation: |
        زیادہ قیمتیں نکالنے کے لیے ملکیت کا جھوٹا احساس پیدا کرنا (مثال کے طور پر، انعطاف کو متحرک کرنے کے لیے "مفت آزمائیں")۔
      undervaluing_continuity: |
        تمام مزاحمت کو تبدیلی کے خلاف غیر عقلی فرض کرنا جب تسلسل کی حقیقی قدر ہوتی ہے۔
      cold_rationality: |
        جذباتی وابستگی کو "صرف انعطاف الملکیت" کہہ کر رد کرنا جب وہ حقیقی اقدار کی عکاسی کرتی ہو۔
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: جھوٹے اتفاق کا اثر
    quick_introduction: |
      جھوٹے اتفاق کا اثر دوسروں کے ہمارے عقائد، رویوں اور رویوں سے اتفاق کرنے کی حد کو زیادہ سمجھنے کا رجحان ہے۔ ہم فرض کرتے ہیں کہ ہماری آراء اس سے زیادہ عام ہیں جتنی وہ ہیں، اور ہم یہ تصور کرنے کے لیے جدوجہد کرتے ہیں کہ معقول لوگ متفق نہیں ہو سکتے۔
    one_liner: ہم زیادہ اندازہ لگاتے ہیں کہ دوسرے ہم سے کتنا متفق ہیں۔
    try_this:
      - فعال طور پر ان لوگوں کو تلاش کریں جو متفق نہیں ہیں - اتفاق کا دعویٰ نہ کریں۔
      - شروع کرنے سے پہلے، ان لوگوں کے ساتھ تجربہ کریں جو آپ کے مفروضات کا اشتراک نہیں کرتے ہیں۔
      - پوچھیں: وہ شخص کیا کہے گا جو متفق نہیں ہے؟ اسے سنجیدگی سے لیں۔
    ask_yourself:
      - کیا میں فرض کر رہا ہوں کہ دوسرے میری طرح سوچتے ہیں؟
      - میں آخری بار کسی کے مختلف نظریے سے کب حیران ہوا تھا؟
    in_more_detail: |
      جب ہم کوئی موقف رکھتے ہیں، تو ہم اسے معمول سمجھتے ہیں۔ ہم خود کو ہم خیال لوگوں سے گھیر لیتے ہیں، تصدیق شدہ میڈیا استعمال کرتے ہیں، اور مبہم رائے کو اتفاق کے طور پر سمجھتے ہیں۔ یہ ایک گونج والا چیمبر بناتا ہے جو اتفاق کے وہم کو تقویت دیتا ہے۔

      یہ اثر گہرے عقائد کے لیے اور جب ہم اپنے موقف میں زیادہ سرمایہ کاری کرتے ہیں تو یہ زیادہ مضبوط ہوتا ہے۔ یہ دوسروں کے متفق نہ ہونے پر حیرت، مذاکرات میں دشواری، اور ناقص مارکیٹ ریسرچ کا باعث بن سکتا ہے جب ہم فرض کرتے ہیں کہ گاہک ہماری طرح سوچتے ہیں۔
    why_this_is_important: |
      جھوٹے اتفاق کے اثر کو تسلیم کرنا آپ کو حقیقی اختلاف کے لیے تیار کرنے، بہتر تحقیق کرنے اور زیادہ مؤثر طریقے سے بات چیت کرنے میں مدد کرتا ہے۔ یہ مصنوعات کی ترقی، مذاکرات، اور قیادت کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ_لینا
      - مذاکرات
      - قیادت
      - مسئلہ_حل_کرنا
    how_can_you_spot_it:
      surprise_at_disagreement: |
        آپ اس وقت حقیقی طور پر حیران ہوتے ہیں جب کوئی اس سے متفق نہیں ہوتا جسے آپ واضح سمجھتے ہیں۔
      assuming_shared_values: |
        آپ اس طرح عمل کرتے ہیں جیسے دوسرے آپ کی ترجیحات کا اشتراک کرتے ہیں بغیر تصدیق کے۔
      underestimating_opposition: |
        آپ توقع کرتے ہیں کہ تجاویز کو اس سے کم مزاحمت کا سامنا کرنا پڑے گا جتنا وہ کرتے ہیں۔
      echo_chamber_detection: |
        آپ کا سماجی اور معلوماتی ماحول شاذ و نادر ہی آپ کے خیالات کو چیلنج کرتا ہے۔
    examples:
      product_development: |
        ایک ٹیم فرض کرتی ہے کہ صارفین فیچر X چاہتے ہیں کیونکہ ٹیم کا ہر فرد اسے چاہتا ہے - صرف کم اپنانے کی شرح پانے کے لیے۔
      politics: |
        ایک سیاسی حلقے کے لوگ انتخابی نتائج سے حیران ہوتے ہیں جو ان کی توقعات سے میل نہیں کھاتے۔
      negotiation: |
        یہ فرض کرنا کہ دوسرا فریق شرائط پر متفق ہو جائے گا کیونکہ وہ آپ کو "معقول" لگتے ہیں۔
      hiring: |
        "کلچر فٹ" کے لیے بھرتی کا مطلب یہ ہو سکتا ہے کہ ایسے لوگوں کو بھرتی کیا جائے جو آپ سے متفق ہوں، جھوٹے اتفاق کو بڑھاوا دیں۔
    real_world_implications: |
      جھوٹے اتفاق کا اثر دھ्रुویकरण، ناکام مصنوعات کے آغاز، اور ناکام مذاکرات میں حصہ ڈالتا ہے۔ یہ ہمیں اپنی پیشین گوئیوں میں زیادہ پر اعتماد اور اختلاف کے لیے غیر تیار بناتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        فعال طور پر مختلف نقطہ نظر والے لوگوں کو تلاش کریں۔ مشترکہ عقائد کا دعویٰ نہ کریں - پوچھیں اور سنیں۔
      collaborative_learning_initiative: |
        ٹیموں میں، مہنگا ہونے سے پہلے اختلاف کو ظاہر کرنے کے لیے منظم اختلاف (مثلاً، "پریمارٹمز،" شیطان کا وکیل) استعمال کریں۔
    how_can_this_be_misapplied:
      dismissing_dissent: |
        یہ فرض کرنا کہ متفق نہ ہونے والے غیر معقول یا نا واقف ہیں بجائے اس کے کہ وہ درست مختلف نقطہ نظر رکھتے ہوں اس پر غور کریں۔
      poor_research: |
        کسٹمر ریسرچ چھوڑ دینا کیونکہ "ہم پہلے سے جانتے ہیں کہ وہ کیا چاہتے ہیں۔"
      overconfidence: |
        یہ فرض کرنے کی بنیاد پر پرجوش دعوے کرنا کہ دوسرے متفق ہوں گے۔
      groupthink_amplification: |
        ٹیمیں جو جھوٹے اتفاق کے اثر کو چیلنج نہیں کرتی ہیں وہ گروپ تھنک میں پھنس سکتی ہیں۔
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: فریمینگ اثر
    quick_introduction: |
      فریمینگ اثر اس رجحان کا نام ہے جس میں ہمارے فیصلے اس بات پر منحصر ہوتے ہیں کہ اختیارات کس طرح پیش کیے جاتے ہیں—یہاں تک کہ جب بنیادی حقائق یکساں ہوں۔ "90% بقا" اور "10% موت" ایک ہی نتیجے کو بیان کرتے ہیں لیکن مختلف انتخاب کو جنم دیتے ہیں۔ فریم فیصلے کو شکل دیتا ہے۔
    one_liner: ایک ہی حقائق، مختلف فریم میں، مختلف فیصلوں کی طرف لے جاتے ہیں۔
    try_this:
      - فیصلہ کرنے سے پہلے اختیارات کو کئی طریقوں سے دوبارہ فریم کریں — گین فریم اور لاس فریم۔
      - اس بات پر توجہ دیں کہ جب آپ کی پسند کسی چیز کی الفاظ کی تبدیلی کی وجہ سے بدل جاتی ہے۔
      - پوچھیں: فریم سے ہٹ کر، بنیادی حقائق کیا ہیں؟
    ask_yourself:
      - کیا میں اس کے فائدے بمقابلہ نقصان کے طور پر فریم کیے جانے پر مختلف فیصلہ کروں گا؟
      - کیا میں فریم پر رد عمل ظاہر کر رہا ہوں یا اصل نتیجے پر؟
    in_more_detail: |
      کاہن مین اور ٹورسکی نے دکھایا کہ جب اختیارات کو فوائد کے طور پر فریم کیا جاتا ہے تو لوگ نقصان سے بچنے والے ہوتے ہیں اور جب انہیں نقصانات کے طور پر فریم کیا جاتا ہے تو وہ نقصان اٹھانے کے لیے زیادہ تیار ہوتے ہیں—یہاں تک کہ ایک ہی نتائج کے لیے بھی۔ مثبت فریمینگ ("200 جانیں بچائیں") بمقابلہ منفی فریمینگ ("400 مر جائیں گے") ترجیحات کو بدل دیتا ہے۔ نقصان کے فریم مساوی فوائد کے فریموں سے زیادہ مضبوط جذباتی رد عمل پیدا کرتے ہیں۔

      فریمینگ اثر طبی فیصلوں، پالیسی، مارکیٹنگ اور مذاکرات کو متاثر کرتا ہے۔ یہ سب سے طاقتور اور اچھی طرح سے دستاویزی تعصبات میں سے ایک ہے۔ آگاہی مددگار ہے، لیکن اسے پوری طرح سے قابو پانا مشکل ہے۔
    why_this_is_important: |
      فریمینگ اثر کو تسلیم کرنا آپ کو زیادہ مستقل فیصلے کرنے، ہیرا پھیری کا مقابلہ کرنے اور زیادہ مؤثر طریقے سے بات چیت کرنے میں مدد کرتا ہے۔ یہ یہ بھی بتاتا ہے کہ ایک ہی پیشکش کو پیش کرنے کے طریقے پر منحصر قبول یا مسترد کیا جا سکتا ہے۔
    when_to_use:
      - فیصلہ_سازی
      - مذاکرات
      - قیادت
      - رسک_تشخیص
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        ایک ہی نتیجے کو فوائد بمقابلہ نقصانات کے طور پر فریم کرنے سے مختلف انتخاب پیدا ہوتے ہیں۔
      presentation_dependence: |
        جب صرف فریم بدلتا ہے، مادے میں نہیں، تو فیصلے بدل جاتے ہیں۔
      default_influence: |
        اختیارات کو کس طرح ترتیب دیا یا لیبل کیا گیا ہے، یہ انتخاب کو متاثر کرتا ہے۔
      emotional_trigger: |
        بعض فریم مضبوط جذباتی رد عمل کو جنم دیتے ہیں۔
    examples:
      medical: |
        ایک ہی طریقہ کار کے لیے "90% بقا" بمقابلہ "10% موت" —
        لوگ فریم کی بنیاد پر مختلف انتخاب کرتے ہیں۔
      sales: |
        "$50 بچائیں" بمقابلہ " $50 نہ گنوائیں"—مساوی فریم، مختلف
        نفسیاتی اثر۔
      policy: |
        "ٹیکس ریلیف" بمقابلہ "حکومتی اخراجات"—ایک ہی پالیسی، مختلف
        سیاسی رد عمل۔
      negotiation: |
        پیشکش کو " چھوٹ" بمقابلہ "سرچارج سے بچنا" کے طور پر پیش کرنا
        قبولیت کی شرح کو بدل دیتا ہے۔
    real_world_implications: |
      فریمینگ اثر کا استحصال اشتہارات، سیاست اور
      مذاکرات میں کیا جاتا ہے۔ یہ طبی فیصلوں اور پالیسی کی حمایت کو متاثر کرتا ہے۔
      دوبارہ فریم کرنے سے فیصلے اور بات چیت بہتر ہو سکتی ہے۔ باخبر رہنا
      مدد کرتا ہے لیکن اثر کو مکمل طور پر ختم نہیں کرتا۔
    professional_application:
      networking_and_relationship_building: |
        جب اختیارات پیش کر رہے ہوں، تو متعدد فریم پر غور کریں۔ تجربہ کریں کہ
        مختلف فریم کس طرح استقبال کو متاثر کرتے ہیں۔ معلومات وصول کرتے وقت،
        پوچھیں "اسے اور کس طرح فریم کیا جا سکتا ہے؟"
      collaborative_learning_initiative: |
        فیصلہ سازی میں، فریمینگ اثرات کی جانچ کے لیے اختیارات کو واضح طور پر دوبارہ فریم کریں۔
        "اگر ہم نے اسے نقصان کے طور پر فریم کیا، تو کیا ہم مختلف فیصلہ کریں گے؟"
        منصفانہ ہونے کے لیے مستقل فریم کا استعمال کریں۔
    how_can_this_be_misapplied:
      manipulation: |
        لوگوں کو ان کی آگاہی کے بغیر مطلوبہ نتائج کی طرف موڑنے کے لیے جان بوجھ کر فریم کرنا۔
      false_equivalence: |
        یہ فرض کرنا کہ تمام فریم برابر طور پر درست ہیں جب کہ کچھ اہم
        معلومات کو چھپاتے ہیں۔
      overcorrection: |
        فریمینگ کو مکمل طور پر نظر انداز کرنا اور یہ فرض کرنا کہ یہ کوئی معنی نہیں رکھتا —
        یہ رکھتا ہے۔
      spin: |
        واضح کرنے کے بجائے گمراہ کرنے کے لیے فریمینگ کا استعمال کرنا۔
    related_content:
