  - id: illusion_of_control
    name: کنٹرول کا وہم
    quick_introduction: |
      کنٹرول کا وہم ہمارے نتائج کو متاثر کرنے کی صلاحیت کو زیادہ سمجھنے کا رجحان ہے۔ ہم سمجھتے ہیں کہ ہم بے ترتیب واقعات، دوسرے لوگوں، اور پیچیدہ نظاموں پر جتنا ہمارا کنٹرول ہے اس سے زیادہ کنٹرول رکھتے ہیں۔ ہم رابطے کو وجہ سے اور عمل کو اثر سے خلط ملط کر دیتے ہیں۔
    one_liner: ہم نتائج کو متاثر کرنے کی اپنی صلاحیت کو زیادہ سمجھتے ہیں—خاص کر بے ترتیب نتائج کو۔
    try_this:
      - پوچھیں: اگر میں کچھ نہ کرتا تو کیا ہوتا؟ کیا میرا عمل واقعی نتیجہ کا سبب بن رہا ہے؟
      - اس میں فرق کریں کہ آپ کیا کنٹرول کر سکتے ہیں اور کیا نہیں کر سکتے۔
      - جب آپ اپنے اعمال کو بے ترتیب نتائج سے توہم پرستانہ طور پر جوڑ رہے ہوں تو اس پر توجہ دیں۔
    ask_yourself:
      - کیا میں رابطے کو وجہ سے خلط ملط کر رہا ہوں؟
      - اگر میں نے عمل نہ کیا ہوتا تو کیا نتیجہ مختلف ہوتا؟
    in_more_detail: |
      لوگ لاٹری جیتنے کے بارے میں زیادہ پراعتماد محسوس کرتے ہیں جب وہ اپنے نمبر خود چنتے ہیں—حالانکہ اس سے امکانات نہیں بدلتے۔ جب ہم زیادہ نمبر چاہتے ہیں تو ہم ڈائس زیادہ زور سے پھینکتے ہیں۔ ہم سمجھتے ہیں کہ ہمارے معمولات یا رویے ایسے نتائج کو متاثر کرتے ہیں جو دراصل بے ترتیب ہوتے ہیں یا ہمارے قابو سے باہر کے عوامل سے طے ہوتے ہیں۔ یہ وہم آرام دہ ہوتا ہے۔ یہ اضطراب کو کم کرتا ہے۔ لیکن یہ زیادہ خود اعتمادی اور غلط فیصلوں کا باعث بن سکتا ہے۔

      یہ وہم اس وقت زیادہ مضبوط ہوتا ہے جب ہم عمل میں شامل ہوتے ہیں، جب ہمیں ابتدائی کامیابی ملتی ہے، اور جب کام واقف ہوتا ہے۔ یہ سرمایہ کاری، انتظام، اور روزمرہ کی زندگی کو متاثر کرتا ہے۔
    why_this_is_important: |
      کنٹرول کے وہم کو پہچاننا آپ کو اپنی توقعات کو درست کرنے، زیادہ خود اعتمادی سے بچنے، اور کوشش کو وہاں مرکوز کرنے میں مدد کرتا ہے جہاں یہ واقعی اہمیت رکھتی ہے۔ یہ اس کی بھی وضاحت کرتا ہے کہ ہم توہم پرستانہ رویوں میں کیوں قائم رہتے ہیں اور اپنے اثر و رسوخ کو زیادہ سمجھتے ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - خطرے_کا_م valutazione
      - سرمایہ_کاری
      - قیادت
    how_can_you_spot_it:
      overestimated_influence: |
        یہ یقین کرنا کہ ہمارے اعمال نتائج کو متاثر کرتے ہیں جبکہ وہ ایسا نہیں کرتے۔
      ritual_superstition: |
        ایسے رویے جن کے بارے میں ہم سمجھتے ہیں کہ وہ نتائج کو متاثر کرتے ہیں (قسمت کی قمیض، کھیل سے پہلے کا معمول) جبکہ وہ ایسا نہیں کرتے۔
      choice_illusion: |
        یہ محسوس کرنا کہ انتخاب کرنے سے ہمیں کنٹرول ملتا ہے جبکہ انتخاب کا نتیجے پر کوئی اثر نہیں ہوتا۔
      action_bias: |
        "انتظار" کرنے کے بجائے "کچھ کرنے" کو ترجیح دینا یہاں تک کہ جب عمل مددگار نہ ہو۔
    examples:
      gambling: |
        لاٹری نمبر چننا بے ترتیب انتخاب سے زیادہ قابل کنٹرول محسوس ہوتا ہے—امکانات وہی ہیں۔
      investing: |
        فعال تاجر مارکیٹ کو شکست دینے کی اپنی صلاحیت کو زیادہ سمجھتے ہیں؛ زیادہ تر اخراجات کے بعد کم کارکردگی کا مظاہرہ کرتے ہیں۔
      management: |
        رہنما تنظیمی نتائج پر اپنے اثر و رسوخ کو زیادہ سمجھتے ہیں؛ بہت سے عوامل ان کے کنٹرول سے باہر ہوتے ہیں۔
      sports: |
        شائقین کا ماننا ہے کہ ان کی چیخ و پکار کھیل کو متاثر کرتی ہے؛ کھلاڑیوں کے پاس قسمت کے معمولات ہوتے ہیں۔
    real_world_implications: |
      کنٹرول کا وہم خطرہ مول لینے، بے سود کوششوں میں مستقل مزاجی، اور نتائج کی وجہ کو درست کرنے کو متاثر کرتا ہے۔ یہ عمل کو ترغیب دے سکتا ہے (کبھی کبھی مفید) لیکن ضائع شدہ کوشش اور زیادہ خود اعتمادی کا باعث بھی بن سکتا ہے۔ درستگی فیصلے کے معیار کو بہتر بناتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        اس بات کو پہچانیں کہ آپ کیا کنٹرول کر سکتے ہیں اور کیا نہیں کر سکتے۔ توانائی کو قابل اثر عوامل پر مرکوز کریں۔ ان نتائج کا سہرا اپنے سر نہ لیں جن کا آپ سبب نہیں بنے—یا ان کی وجہ سے الزام نہ لیں جنہیں آپ روک نہیں سکے۔
      collaborative_learning_initiative: |
        منصوبہ بندی کرتے وقت، قابل کنٹرول اور ناقابل کنٹرول عوامل کے درمیان فرق کریں۔ ابتدائی جیت سے جھوٹے اعتماد سے بچیں۔ توقعات کو درست کرنے کے لیے امکانی سوچ کا استعمال کریں۔
    how_can_this_be_misapplied:
      learned_helplessness: |
        بہت زیادہ درستگی کرنا اور یہ یقین کرنا کہ ہمارے پاس کوئی کنٹرول نہیں ہے جب ہمارے پاس بامعنی اثر ہوتا ہے۔
      dismissing_agency: |
        "سب کچھ قسمت ہے" جب بہت سے شعبوں میں ہنر اور کوشش اہم ہوتی ہے۔
      false_fatalism: |
        غیر عملی ہونے کا جواز پیش کرنے کے لیے کنٹرول کے وہم کا استعمال کرنا۔
      one_size_fits_all: |
        کنٹرول ڈومین کے لحاظ سے مختلف ہوتا ہے؛ کچھ حالات دوسروں سے زیادہ قابل کنٹرول ہوتے ہیں۔
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: اثر کا تعصب
    quick_introduction: |
      اثر کا تعصب مستقبل کے واقعات پر ہمارے جذباتی ردعمل کی شدت اور مدت کو زیادہ سے زیادہ سمجھنے کا رجحان ہے۔ ہم سوچتے ہیں کہ اچھی چیزیں ہمیں ان سے زیادہ خوش کریں گی، اور بری چیزیں ہمیں ان سے زیادہ بدبخت کریں گی۔ ہم جذباتی پیشین گوئی میں برے ہیں۔
    one_liner: ہم زیادہ سے زیادہ اندازہ لگاتے ہیں کہ واقعات ہماری خوشی کو کتنی دیر تک متاثر کریں گے۔
    try_this:
      - پوچھیں: پچھلے اسی طرح کے واقعات کے بعد میں نے کیسا محسوس کیا؟ ہم توقع سے زیادہ تیزی سے موافقت کرتے ہیں۔
      - متوقع اثر کو فیصلوں پر اثر انداز نہ ہونے دیں — ہم جذبات کی پیش گوئی میں برے ہیں۔
      - اس وقت کو محسوس کریں جب آپ کسی ایک نتیجے کے دیرپا اثر کو زیادہ سے زیادہ سمجھ رہے ہوں۔
    ask_yourself:
      - کیا میں زیادہ سے زیادہ اندازہ لگا رہا ہوں کہ میں کتنی دیر تک اس طرح محسوس کروں گا؟
      - پچھلا تجربہ اسی طرح کے واقعات کے بارے میں کیا کہتا ہے؟
    in_more_detail: |
      ڈینیئل گلبرٹ اور ٹموتھی ولسن جذباتی پیش گوئی پر تحقیق کرتے ہیں: ہم زیادہ سے زیادہ اندازہ لگاتے ہیں کہ فتح کے بعد ہم کتنی دیر تک خوش یا نقصان کے بعد برا محسوس کریں گے۔ ہم توقع سے زیادہ تیزی سے موافقت کرتے ہیں۔ ہم ایک واقعہ کے اثر کو بھی زیادہ سے زیادہ سمجھتے ہیں - ہم سوچتے ہیں کہ ایک نتیجہ ہماری خوشی کا تعین کرے گا جب بہت سے عوامل اس میں حصہ ڈالتے ہیں۔ ہم اپنے مستقبل کے جذبات کی پیش گوئی کرتے وقت غلط چیزوں پر توجہ دیتے ہیں۔

      اثر کا تعصب اہم زندگی کے فیصلوں کو متاثر کرتا ہے: ہم زیادہ سے زیادہ اندازہ لگاتے ہیں کہ ترقی، رشتہ، یا خریداری ہماری خوشی کو کتنا بدلے گی۔ ہم نقصانات کے دیرپا درد کو بھی زیادہ سے زیادہ سمجھتے ہیں۔
    why_this_is_important: |
      اثر کے تعصب کو پہچاننے سے آپ کو یہ فیصلہ کرنے میں مدد ملتی ہے کہ کون سی چیزیں واقعی آپ کی زندگی کو بہتر بنائیں گی۔ یہ ان نتائج میں زیادہ سے زیادہ سرمایہ کاری کو کم کرتا ہے جن کا اتنا زیادہ اثر نہیں ہوگا جتنا آپ سوچتے ہیں، اور ان نتائج کے خوف کو کم کرتا ہے جو اتنے طویل عرصے تک نقصان نہیں پہنچائیں گے جتنا آپ توقع کرتے ہیں۔
    when_to_use:
      - فیصلہ سازی
      - کیریئر_ترقی
      - خطرہ_تشخیص
      - تعلقات_بنانا
    how_can_you_spot_it:
      overestimated_impact: |
        "یہ سب کچھ بدل دے گا" جب پچھلے اسی طرح کے واقعات کا معمولی دیرپا اثر تھا۔
      duration_overestimation: |
        "میں اس سے کبھی نہیں نکلوں گا" جب ہم عام طور پر توقع سے زیادہ تیزی سے موافقت کرتے ہیں۔
      focalism: |
        ایک واقعہ پر توجہ مرکوز کرنا اور فلاح و بہبود کو متاثر کرنے والے دیگر عوامل کو نظر انداز کرنا۔
      adaptation_neglect: |
        یہ بھول جانا کہ ہم اچھے اور برے دونوں حالات کے مطابق ڈھل جاتے ہیں۔
    examples:
      career: |
        "اگر مجھے یہ ترقی مل گئی، تو میں بہت زیادہ خوش ہوں گا" جب پچھلی ترقیوں کا عارضی اثر تھا۔
      purchases: |
        "یہ کار مجھے خوش کر دے گی" جب نیا پن جلدی ختم ہو جاتا ہے۔
      loss: |
        "میں اس رد ّ سے کبھی ٹھیک نہیں ہو سکوں گا" جب ہم عام طور پر مہینوں کے اندر موافقت کرتے ہیں۔
      events: |
        اس بات کا زیادہ سے زیادہ اندازہ لگانا کہ شادی، چھٹی، یا سنگ میل طویل مدتی خوشی کو کتنا متاثر کرے گا۔
    real_world_implications: |
      اثر کا تعصب پیسہ، کیریئر، اور رشتوں کے بارے میں خراب فیصلوں کی طرف لے جاتا ہے۔ ہم ان تجربات کے لیے زیادہ ادائیگی کرتے ہیں جن کے مطابق ہم ڈھل جائیں گے اور ان نقصانات سے بہت زیادہ ڈرتے ہیں جن سے ہم ٹھیک ہو جائیں گے۔ یہ پالیسی اور ذاتی منصوبہ بندی کو متاثر کرتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        کیریئر یا رشتہ کے فیصلے کرتے وقت، غور کریں کہ آپ نے پچھلے اسی طرح کے واقعات کے بعد کیسا محسوس کیا۔ کیا وہ اثر اتنا ہی دیر تک رہا جتنا آپ نے توقع کی تھی؟ مستقبل کی پیشین گوئیوں کو درست کرنے کے لیے اس کا استعمال کریں۔
      collaborative_learning_initiative: |
        جب ٹیمیں ناکامیوں یا فتوحات کا سامنا کرتی ہیں، تو انہیں موافقت کی یاد دلائیں۔ "ہمیں اس سے زیادہ تیزی سے ڈھل جائیں گے جتنا ہم سوچتے ہیں" ضرورت سے زیادہ جشن اور ضرورت سے زیادہ مایوسی دونوں کو کم کر سکتا ہے۔
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        کچھ واقعات کا دیرپا اثر ہوتا ہے - صدمہ، بڑا نقصان۔ تمام جذباتی پیش گوئی کو متعصب کے طور پر رد نہ کریں۔
      cold_rationality: |
        "اس سے کوئی فرق نہیں پڑے گا" جب اس لمحے کا تجربہ اہم ہوتا ہے۔
      undervaluing_experiences: |
        مثبت تجربات سے گریز کرنا کیونکہ "ہم بہرحال ڈھل جائیں گے۔"
      invalidating_emotions: |
        لوگوں کو یہ بتانا کہ ان کے جذبات گزر جائیں گے جب انہیں اس لمحے میں مدد کی ضرورت ہوتی ہے۔
