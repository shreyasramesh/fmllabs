    name: اندرونی گروہ کا تعصب
    quick_introduction: |
      اندرونی گروہ کا تعصب وہ رجحان ہے جس میں ہم ان لوگوں کو ترجیح دیتے ہیں جنہیں ہم اپنا گروہ سمجھتے ہیں، ان کے مقابلے میں جنہیں ہم باہر والے سمجھتے ہیں۔ ہم اندرونی گروہ کے اراکین کو مثبت خصوصیات اور باہر والے گروہ کے اراکین کو منفی خصوصیات سے منسوب کرتے ہیں، جو اکثر کم یا غیر ضروری امتیازات پر مبنی ہوتا ہے۔
    one_liner: ہم اپنے اندرونی گروہ کو ترجیح دیتے ہیں اور باہر والے گروہوں کو زیادہ سختی سے جانچتے ہیں — اکثر غیر ضروری طور پر۔
    try_this:
      - Ask: کیا میں اس شخص کو اسی طرح جانچوں گا اگر وہ میرے گروہ میں ہوتا؟
      - Actively seek out-group perspectives when making decisions.
      - فیصلہ سازی کرتے وقت باہر والے گروہوں کے نقطہ نظر کو فعال طور پر تلاش کریں۔
      - اس بات پر غور کریں کہ جب گروہی حدود آپ کی جانچ کو متاثر کر رہی ہوں۔
    ask_yourself:
      - Am I favoring someone because they're "one of us"?
      - کیا میں کسی شخص کو اس لیے ترجیح دے رہا ہوں کہ وہ "ہمارے لوگ" میں سے ہے؟
      - Would I apply the same standards to an out-group member?
      - کیا میں باہر والے گروہ کے رکن پر وہی معیار لاگو کروں گا؟
    in_more_detail: |
      یہاں تک کہ جب گروہوں کو اتفاقی طور پر تفویض کیا جاتا ہے (مثلاً، سکہ اچھال کر)، لوگ جلدی سے اپنے اندرونی گروہ کے لیے ترجیح پیدا کر لیتے ہیں۔ ہم اندرونی گروہ کے اراکین پر زیادہ بھروسہ کرتے ہیں، انہیں زیادہ سخاوت سے وسائل مختص کرتے ہیں، اور ان کے اعمال کو زیادہ خیر سگالی سے جانچتے ہیں۔ باہر والے گروہ کے اراکین کو اس کے برعکس سلوک ملتا ہے۔

      اندرونی گروہ کا تعصب قبائلیت، امتیازی سلوک اور تنازعات کو ہوا دیتا ہے۔ یہ ملازمت، ترقی، تعاون اور پالیسی کو متاثر کرتا ہے۔ یہ نسل، قومیت، کمپنی، ٹیم، یا کسی بھی مشترکہ شناخت پر مبنی ہو سکتا ہے۔
    why_this_is_important: |
      اندرونی گروہ کے تعصب کو تسلیم کرنے سے آپ کو منصفانہ فیصلے کرنے، زیادہ جامع ٹیمیں بنانے اور جانبداری سے بچنے میں مدد ملتی ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ تنوع کے اقدامات مزاحمت کا سامنا کیوں کرتے ہیں — اندرونی گروہ کی ترجیح خودکار ہے۔
    when_to_use:
      - leadership
      - قیادت
      - decision-making
      - فیصلہ سازی
      - relationship_building
      - تعلقات کی تعمیر
      - conflict_resolution
      - تنازعہ کا حل
    how_can_you_spot_it:
      preferential_treatment: |
        Giving the benefit of the doubt to "us" but not "them."
        "ہمیں" شک کا فائدہ دینا لیکن "انہیں" نہیں۔
      resource_allocation: |
        Allocating more to in-group members when out-group members have equal
        or greater need.
        جب باہر والے گروہ کے اراکین کی ضرورت برابر یا زیادہ ہو تو اندرونی گروہ کے اراکین کو زیادہ مختص کرنا۔
      attribution_asymmetry: |
        In-group success = skill; out-group success = luck. In-group failure =
        circumstance; out-group failure = character.
        اندرونی گروہ کی کامیابی = ہنر؛ باہر والے گروہ کی کامیابی = قسمت۔ اندرونی گروہ کی ناکامی = حالات؛ باہر والے گروہ کی ناکامی = کردار۔
      minimal_group_effects: |
        Favoritism emerges even with arbitrary group assignments.
        غیر ضروری گروہی تفویضات کے ساتھ بھی جانبداری ابھرتی ہے۔
    examples:
      hiring: |
        Preferring candidates who went to your alma mater or share your background.
        ان امیدواروں کو ترجیح دینا جنہوں نے آپ کے ہی مدرسے سے تعلیم حاصل کی ہو یا آپ کا پس منظر مشترک ہو۔
      performance_reviews: |
        Rating in-group members more favorably than out-group members with
        similar performance.
        ایک جیسی کارکردگی رکھنے والے باہر والے گروہ کے اراکین کے مقابلے میں اندرونی گروہ کے اراکین کو زیادہ سازگار درجہ دینا۔
      collaboration: |
        Trusting and including "our team" while excluding or doubting "their team."
        "اپنی ٹیم" پر بھروسہ کرنا اور اسے شامل کرنا جبکہ "ان کی ٹیم" کو خارج کرنا یا شک کرنا۔
      politics: |
        Dismissing out-group arguments while accepting in-group arguments
        uncritically.
        باہر والے گروہ کے دلائل کو مسترد کرنا جبکہ اندرونی گروہ کے دلائل کو بلا تنقید قبول کرنا۔
    real_world_implications: |
      In-group bias perpetuates inequality, undermines meritocracy, and fuels
      conflict. It affects hiring, promotion, investment, and policy. Reducing
      it requires deliberate effort—it won't fix itself.
      اندرونی گروہ کا تعصب عدم مساوات کو برقرار رکھتا ہے، میرٹاکریسی کو نقصان پہنچاتا ہے، اور تنازعات کو ہوا دیتا ہے۔ یہ ملازمت، ترقی، سرمایہ کاری اور پالیسی کو متاثر کرتا ہے۔ اسے کم کرنے کے لیے جان بوجھ کر کوششوں کی ضرورت ہے — یہ خود ٹھیک نہیں ہوگا۔
    professional_application:
      networking_and_relationship_building: |
        Actively include people outside your immediate circle. Seek diverse
        perspectives. Question whether you're favoring someone because they're
        "like you."
        اپنے قریبی حلقے کے باہر کے لوگوں کو فعال طور پر شامل کریں۔ متنوع نقطہ نظر تلاش کریں۔ سوال کریں کہ کیا آپ کسی کو اس لیے ترجیح دے رہے ہیں کہ وہ "آپ کی طرح" ہے۔
      collaborative_learning_initiative: |
        Use structured processes (blinded reviews, diverse panels) to reduce
        in-group bias in hiring and evaluation. Create cross-group projects
        to build shared identity.
        ملازمت اور تشخیص میں اندرونی گروہ کے تعصب کو کم کرنے کے لیے منظم عمل (بلائنڈ ریویو، متنوع پینل) استعمال کریں۔ مشترکہ شناخت بنانے کے لیے گروہوں کے درمیان منصوبے بنائیں۔
    how_can_this_be_misapplied:
      forced_diversity: |
        Implementing quotas or policies that create resentment without addressing
        underlying bias.
        کوٹے یا پالیسیاں لاگو کرنا جو بنیادی تعصب کو حل کیے بغیر ناراضی پیدا کرتی ہیں۔
      out_group_hostility: |
        Treating in-group bias as the only problem when out-group hostility
        also exists.
        جب باہر والے گروہ کی دشمنی بھی موجود ہو تو اندرونی گروہ کے تعصب کو واحد مسئلہ سمجھنا۔
      ignoring_legitimate_differences: |
        Not all group differences are bias—sometimes groups have different
        characteristics. Don't assume all disparities are discrimination.
        تمام گروہی اختلافات تعصب نہیں ہوتے — کبھی کبھی گروہوں کی مختلف خصوصیات ہوتی ہیں۔ یہ نہ فرض کریں کہ تمام فرق جانبداری ہیں۔
      reverse_discrimination: |
        Overcorrecting to favor out-groups in ways that are unfair to in-group
        members.
        اندرونی گروہ کے اراکین کے لیے ناانصافی والے طریقوں سے باہر والے گروہوں کو ترجیح دینے کے لیے زیادہ درستگی کرنا۔
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: الٹنا (Inversion)
    quick_introduction: |
      الٹنا ایک مسئلہ حل کرنے کی تکنیک ہے جو سوال کو الٹ کر پیش کرتی ہے۔ "میں کیسے کامیاب ہو سکتا ہوں؟" پوچھنے کے بجائے، آپ پوچھتے ہیں "کیا مجھے ناکام بنا دے گا؟" اور ان چیزوں سے گریز کرتے ہیں۔ یہ ان خطرات اور مخالف نمونوں کو سامنے لاتا ہے جنہیں آگے کی سوچ اکثر نظر انداز کر دیتی ہے۔
    one_liner: الٹیں—پوچھیں کہ کیا آپ کو ناکام بنا دے گا، پھر ان چیزوں سے گریز کریں۔
    try_this:
      - کسی بھی مقصد کے لیے، ناکامی کے اہم طریقے درج کریں — پھر ان سے گریز کریں۔
      - منفی تصور کا استعمال کریں: کیا اس کو غلط کر دے گا؟
      - پوچھیں: کوئی ہوشیار شخص اسے خراب کرنے کے لیے کیا کرے گا؟
    ask_yourself:
      - کیا میں نے اس چیز کے بارے میں سوچا ہے جو اسے ناکام بنا دے گی؟
      - آگے کی سوچ کر میں کیا نظر انداز کر رہا ہوں؟
    in_more_detail: |
      چارلی منگر نے اسے مقبول بنایا اور یہ ریاضی کی منطق پر مبنی ہے۔ الٹنا اس حقیقت کا فائدہ اٹھاتا ہے کہ ناکامی سے گریز کرنا اکثر کامیابی کے حصول سے آسان ہوتا ہے۔ اگر آپ ناکامی کے اہم طریقے پہچان سکتے ہیں، تو آپ انہیں منظم طریقے سے ختم کر سکتے ہیں۔

      کارل جیکوبی نے مبینہ طور پر کہا، "الٹنا، ہمیشہ الٹنا۔" سٹویوں نے منفی تصور کا استعمال کیا—نقصان کا تصور کرنا—جو ان کے پاس تھا اس کی تعریف کرنے اور مشکلات کے لیے تیار رہنے کے لیے۔ الٹنا مایوسی نہیں ہے؛ یہ رکاوٹوں کو دور کر کے ترقی کرنے کا ایک منظم طریقہ ہے۔
    why_this_is_important: |
      الٹنا آپ کو تباہ کن غلطیوں سے بچنے، منصوبوں کو جانچنے اور غیر واضح حل تلاش کرنے میں مدد کرتا ہے۔ یہ تنقیدی ناکامی کے طریقوں کو نظر انداز نہ کرنے کو یقینی بنا کر آگے کی منصوبہ بندی کی تکمیل کرتا ہے۔
    when_to_use:
      - مسئلہ_حل_کرنا (problem_solving)
      - فیصلہ_سازی (decision-making)
      - خطرہ_تشخیص (risk_assessment)
      - کیریئر_کی_حرکتیں (career_moves)
    how_can_you_spot_it:
      premortem_thinking: |
        کسی پروجیکٹ سے پہلے، یہ پوچھنا کہ "یہ ناکام کیوں ہوا؟" گویا یہ پہلے ہی ہو چکا ہو۔
      anti_goals: |
        آپ جو حاصل کرنا چاہتے ہیں اسے واضح طور پر بیان کرنے کے ساتھ ساتھ آپ جو بچانا چاہتے ہیں اس کی تعریف کرنا۔
      reverse_engineering_failure: |
        صرف کامیابیوں کا مطالعہ کرنے کے بجائے سبق حاصل کرنے کے لیے ناکام کیسز کا مطالعہ کرنا۔
      constraint_focus: |
        بڑھوتری کے لیے بہتر بنانے سے پہلے رکاوٹوں اور تنگ گلیوں کی نشاندہی کرنا۔
    examples:
      investing: |
        "یہ اسٹاک اوپر کیوں جائے گا؟" پوچھنے کے بجائے، پوچھیں "مجھے پیسہ کیوں کھوئے گا؟"
        اور ان منظرناموں سے گریز کریں۔
      career: |
        "میری ساکھ کو کیا تباہ کر دے گا؟" سے بچنے والے طرز عمل کی فہرست بنتی ہے۔
      product_launch: |
        "زیادہ تر پراڈکٹ لانچ کیوں ناکام ہوتے ہیں؟" لانچ سے پہلے حل کرنے کے لیے خطرات سامنے لاتا ہے۔
      health: |
        "کون سی عادتیں زندگی کو مختصر کرتی ہیں؟" "کیا مجھے صحت مند بناتا ہے؟" کے مقابلے میں بچاؤ کی ایک واضح فہرست دیتا ہے۔
    real_world_implications: |
      الٹنا انجینئرنگ (ناکامی کے طریقوں کا تجزیہ)، سرمایہ کاری اور حکمت عملی میں استعمال ہوتا ہے۔
      یہ زیادہ خود اعتمادی کو کم کرتا ہے اور خطرہ انتظام کو بہتر بناتا ہے۔ زیادہ انحصار ضرورت سے زیادہ احتیاط کا باعث بن سکتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        "اس رشتے کو کیا نقصان پہنچائے گا؟" آپ کو اعتماد توڑنے والے طرز عمل سے بچنے میں مدد کرتا ہے۔
      collaborative_learning_initiative: |
        پروجیکٹس پر پریمورٹم چلائیں: "یہ ناکام ہو گیا۔ کیوں؟" منصوبہ بندی اور عمل درآمد کو بہتر بنانے کے لیے جوابات استعمال کریں۔
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        صرف ناکامی سے بچنے پر توجہ دینے سے عمل سست ہو سکتا ہے اور ضروری خطرات مول لینے سے روکا جا سکتا ہے۔
      negativity_bias: |
        اگر آگے کی سوچ اور مواقع کی شناخت کے ساتھ متوازن نہ کیا جائے تو الٹنا منفی تعصب کو بڑھا سکتا ہے۔
      analysis_paralysis: |
        ناکام ہونے کے طریقوں پر اتنا وقت صرف کرنا کہ آپ کبھی عمل درآمد نہ کریں۔
      missing_upside: |
        الٹنا یہ نہیں بتاتا کہ کیا کرنا ہے — صرف کیا بچنا ہے۔ آپ کو اب بھی مثبت مقاصد کی ضرورت ہے۔
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: منافع میں کمی کا قانون
    quick_introduction: |
      منافع میں کمی کا قانون یہ بیان کرتا ہے کہ جب آپ ایک مقررہ مقدار میں اضافے کے ساتھ ساتھ
      دیگر عوامل کو مستقل رکھتے ہوئے ایک ان پٹ میں اضافہ کرتے ہیں، تو ہر نئی ان پٹ یونٹ سے
      حاصل ہونے والا اضافی آؤٹ پٹ آخر کار کم ہو جاتا ہے۔ زیادہ ہمیشہ بہتر نہیں ہوتا — ایک ایسا
      نقطہ ہوتا ہے جہاں اضافی کوشش کم سے کم نتیجہ دیتی ہے۔
    one_liner: اضافی ان پٹ آخر کار کم آؤٹ پٹ پیدا کرتا ہے — ایک بہتر نقطہ موجود ہے۔
    try_this:
      - پوچھیں: کیا میں اس نقطہ سے آگے نکل گیا ہوں جہاں اضافی کوشش معنی خیز نتائج دے گی؟
      - سب سے زیادہ اثر انداز ہونے والے ان پٹس کو ترجیح دیں؛ جب معمولی منافع کم ہونا شروع ہو جائے تو رک جائیں۔
      - اس وقت کو پہچانیں جب آپ کسی ایسی چیز میں زیادہ سرمایہ کاری کر رہے ہوں جس نے پہلے ہی اپنا بدلہ دے دیا ہو۔
    ask_yourself:
      - یہاں ایک اور یونٹ کی کوشش سے مجھے کیا فائدہ ہوگا؟
      - کیا میں منافع میں کمی کے نقطہ سے آگے بڑھ رہا ہوں؟
    in_more_detail: |
      معیشت میں، زمین کی ایک مقررہ مقدار میں زیادہ کارکنوں کو شامل کرنے سے آخر کار کم
      اضافی فوائد حاصل ہوتے ہیں۔ ذاتی پیداواری صلاحیت میں، مطالعہ کا پہلا گھنٹہ دسویں
      گھنٹے سے زیادہ قدر کا اضافہ کر سکتا ہے۔ یہ اصول وسائل، کوشش، وقت اور خصوصیات پر
      لاگو ہوتا ہے۔ ایک بہتر نقطہ موجود ہے؛ اس سے آگے، معمولی منافع کم ہو جاتا ہے اور
      منفی بھی ہو سکتا ہے۔

      منافع میں کمی کو پہچاننے سے آپ کو وسائل کو مؤثر طریقے سے مختص کرنے اور ان
      علاقوں میں زیادہ سرمایہ کاری سے بچنے میں مدد ملتی ہے جنہوں نے پہلے ہی اپنی زیادہ
      تر قدر فراہم کر دی ہے۔
    why_this_is_important: |
      منافع میں کمی کو سمجھنا زیادہ سرمایہ کاری کو روکتا ہے، ترجیحات کی رہنمائی کرتا ہے،
      اور آپ کو یہ جاننے میں مدد کرتا ہے کہ کب رکنا ہے۔ یہ وسائل کی مختص کرنے اور
      کامل بننے سے بچنے کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ_سازی
      - مسئلہ_حل_کرنا
      - سرمایہ_کاری
      - کیریئر_کے_اقدامات
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        کوشش یا وسائل کی ہر اضافی یونٹ پچھلے والے سے کم آؤٹ پٹ پیدا کرتی ہے۔
      perfectionism_trap: |
        معیار کے آخری 10% کے لیے جدوجہد غیر متناسب کوشش خرچ کرتی ہے۔
      overinvestment: |
        اس وقت اضافی وسائل شامل کرتے رہنا جب معمولی منافع کم یا منفی ہو۔
      optimal_point_passed: |
        آپ اس نقطہ سے آگے بڑھ چکے ہیں جہاں مزید ان پٹ نتائج کو بہتر بناتا ہے۔
    examples:
      studying: |
        امتحان کی تیاری کے پہلے 2 گھنٹے 7-8 گھنٹوں سے زیادہ فائدہ دیتے ہیں؛ منافع میں کمی
        کا ایک نقطہ موجود ہے۔
      product_features: |
        کسی ایپ میں مزید خصوصیات شامل کرنے سے صارفین الجھن میں پڑ سکتے ہیں؛ 20ویں
        خصوصیت 5ویں خصوصیت سے کم قدر کا اضافہ کرتی ہے۔
      hiring: |
        کسی پروجیکٹ میں مزید لوگوں کو شامل کرنے سے ایک نقطہ کے بعد اس میں سست روی آسکتی
        ہے (بروک کا قانون)۔
      marketing: |
        اشتہاری اخراجات کو دوگنا کرنے سے نتائج دوگنا نہیں ہوتے؛ جب آپ مارکیٹ کو سیراب
        کرتے ہیں تو منافع کم ہو جاتا ہے۔
    real_world_implications: |
      منافع میں کمی کا قانون اقتصادی پالیسی، کاروباری حکمت عملی، اور ذاتی
      پیداواری صلاحیت کی رہنمائی کرتا ہے۔ اسے نظر انداز کرنے سے وسائل کا ضیاع اور
      کمزور نتائج سامنے آتے ہیں۔ یہ پیریٹو اصول اور فوکس کی حمایت کرتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        چند گہرے تعلقات میں سرمایہ کاری کرنے سے بہت سے لوگوں میں اپنی کوشش کو
        پھیلانے کی نسبت زیادہ فائدہ ہو سکتا ہے۔ پہچانیں کہ اضافی نیٹ ورکنگ میں منافع
        میں کمی کب آ رہی ہے۔
      collaborative_learning_initiative: |
        تربیتی گھنٹوں کی تعداد ہمیشہ بہتر نتائج کے برابر نہیں ہوتی۔ بہترین خوراک
        تلاش کریں اور زیادہ بوجھ سے بچیں۔
    how_can_this_be_misapplied:
      premature_optimization: |
        معقول معیار تک پہنچنے سے پہلے بہت جلد رک جانا۔
      undershooting: |
        ناکافی کوشش کے عذر کے طور پر منافع میں کمی کا استعمال کرنا۔
      misidentifying_the_curve: |
        جب آپ دراصل منحنی کے کسی دوسرے حصے پر ہوں تو منافع میں کمی کا فرض کرنا
        (مثال کے طور پر، ابتدائی نمو کا مرحلہ)۔
      one_size_fits_all: |
        مختلف سیاق و سباق جہاں منحنی مختلف ہوتے ہیں، ان میں ایک ہی "بہترین نقطہ"
        کو لاگو کرنا۔
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: نقصان سے بچاؤ کا تعصب (Loss Aversion Bias)
    quick_introduction: |
      نقصان سے بچاؤ وہ رجحان ہے جو افراد کو مساوی فوائد حاصل کرنے کی بجائے نقصانات سے بچنے کو ترجیح دینے پر مجبور کرتا ہے۔
      لوگ فائدہ حاصل کرنے کی خوشی کے مقابلے میں نقصان اٹھانے کا درد تقریباً دو گنا زیادہ محسوس کرتے ہیں۔
    one_liner: نقصانات، مساوی فوائد کے احساس سے تقریباً دو گنا زیادہ تکلیف دہ محسوس ہوتے ہیں۔
    try_this:
      - "خود سے پوچھیں: کیا میں جو کھو سکتا ہوں اس کی قدر، جو حاصل کر سکتا ہوں اس سے زیادہ تو نہیں کر رہا؟"
      - انتخاب کو نقصانات کے بجائے فوائد کے تناظر میں دوبارہ پیش کریں اور دیکھیں کہ کیا آپ کا نقطہ نظر بدلتا ہے۔
      - اس بات کا نوٹس لیں جب نقصان کا خوف، اصل فوائد سے زیادہ فیصلہ سازی کو متاثر کر رہا ہو۔
    ask_yourself:
      - اگر میں صفر سے شروع کروں تو میں کیا منتخب کروں گا؟
      - کیا میں اس لیے رکا ہوا ہوں کہ میں کیا کھو دوں گا، یا اس لیے کہ مستقبل واقعی بہتر ہے؟
    in_more_detail: |
      ڈینیئل کین مین اور ایموس ٹیورسکی نے تیار کیا، نقصان سے بچاؤ بیان کرتا ہے کہ نقصانات اور فوائد کو کس طرح غیر متناسب طور پر سمجھا جاتا ہے۔
      $100 کھونے کا نفسیاتی اثر عام طور پر $100 حاصل کرنے کی اطمینان سے بہت زیادہ ہوتا ہے۔ یہ تعصب مالیات، بات چیت، اور روزمرہ کے انتخاب میں فیصلہ سازی کو متاثر کرتا ہے،
      جس کی وجہ سے جب ممکنہ نقصانات نمایاں ہوتے ہیں تو اکثر خطرہ سے بچنے والے طرز عمل کا مظاہرہ ہوتا ہے۔
    why_this_is_important: |
      نقصان سے بچاؤ کو سمجھنے سے آپ کو یہ تسلیم کرنے میں مدد ملتی ہے کہ کب نقصان کا خوف، عقلی تجزیے سے زیادہ فیصلہ سازی کو متاثر کر رہا ہے۔
      یہ بتاتا ہے کہ لوگ کیوں نقصان میں جانے والی سرمایہ کاری کو برقرار رکھتے ہیں، ضروری تبدیلیوں سے گریز کرتے ہیں، اور بات چیت اور کیریئر کے فیصلوں میں غیر معمولی انتخاب کرتے ہیں۔
    when_to_use:
      - فیصلہ_سازی (decision_making)
      - سرمایہ_کاری (investing)
      - کیریئر_میں_اقدامات (career_moves)
      - خطرے_کا_اندازہ (risk_assessment)
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        اس بات کا نوٹس لیں جب کسی چیز کو کھونے کا امکان، ممکنہ فائدے کے مقابلے میں غیر متناسب تشویش یا مزاحمت کو جنم دیتا ہے۔
      reluctance_to_change: |
        جب مقصدی تجزیہ بہتر آپشن کی نشاندہی کرتا ہے تب بھی حکمت عملی تبدیل کرنے، نوکری چھوڑنے، یا اثاثہ فروخت کرنے میں ہچکچاہٹ۔
      framing_sensitivity: |
        انتخابات کے فریم کرنے کے طریقے (فوائد یا نقصانات کے طور پر) کی بنیاد پر فیصلے میں ڈرامائی طور پر تبدیلی، یہاں تک کہ جب نتائج مساوی ہوں۔
      overvaluing_what_you_have: |
        تحفہ اثر (Endowment effect)—صرف اس لیے کہ آپ کے پاس چیزیں ہیں، ان کو زیادہ اہمیت دینا—اکثر نقصان سے بچاؤ کے ساتھ آتا ہے۔
    examples:
      investing: |
        گرتی ہوئی اسٹاک کو "نقصان کو محسوس کرنے سے بچنے" کے لیے برقرار رکھنا، جبکہ کہیں اور بہتر سرمایہ کاری کے مواقع سے محروم رہنا۔
      career: |
        غیر اطمینان بخش ملازمت میں رہنا کیونکہ اسے چھوڑنا سیکورٹی کھونے جیسا لگتا ہے، یہاں تک کہ جب نیا موقع زیادہ ترقی کی پیشکش کرتا ہے۔
      negotiations: |
        ایک منصفانہ پیشکش کو مسترد کرنا کیونکہ اسے کچھ "دینے" کے طور پر پیش کیا گیا ہے، نہ کہ معاہدے "حاصل کرنے" کے طور پر۔
      product_design: |
        مفت ٹرائل جو پیڈ میں تبدیل ہوتے ہیں—صارفین جب ٹرائل ختم ہوتا ہے تو سروس "کھونے" کا تجربہ کرتے ہیں، جو نئی سروس "حاصل کرنے" سے زیادہ سبسکرپشن کو متاثر کرتا ہے۔
    real_world_implications: |
      نقصان سے بچاؤ مارکیٹوں، پالیسی، اور انفرادی رویے کو تشکیل دیتا ہے۔ یہ بتاتا ہے کہ انشورنس اور وارنٹی اچھی طرح کیوں فروخت ہوتے ہیں، لوگ فائدہ مند تبدیلی سے کیوں گریز کرتے ہیں،
      اور منفی خبروں کا اثر زیادہ کیوں ہوتا ہے۔ اسے تسلیم کرنے سے فیصلہ سازی کی بہتری اور پشیمانی سے چلنے والے فیصلوں میں کمی آ سکتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        آگاہ رہیں کہ لوگ نقصان سے بچاؤ کی وجہ سے ناکارہ تعلقات یا تعاون کو ختم کرنے میں مزاحمت کر سکتے ہیں—وہ کنکشن "کھونے" سے ڈرتے ہیں۔
        مزاحمت کو کم کرنے کے لیے نئے مواقع کو نقصانات کے بجائے فوائد کے طور پر پیش کریں۔
      collaborative_learning_initiative: |
        نئے عمل یا ٹولز متعارف کراتے وقت، اس بات پر زور دیں کہ ٹیم کیا حاصل کرتی ہے بجائے اس کے کہ وہ کیا "چھوڑ" رہی ہے۔
        نقصان سے تیار کردہ تبدیلی کی پہل اکثر زیادہ مضبوط مزاحمت کو جنم دیتی ہے۔
    how_can_this_be_misapplied:
      manipulation: |
        فیصلوں پر دباؤ ڈالنے کے لیے نقصان سے بچاؤ کا استحصال کرنا—مثلاً، "محدود وقت کی پیشکشیں" یا "ضائع نہ کریں" کی صورت میں جو حقیقی قدر کے جائزے کے بجائے نقصان کے خوف کو جنم دیتی ہیں۔
      misinterpreting_relationships: |
        کسی شخص کی تبدیلی کے لیے مزاحمت کو مکمل طور پر عقلی سمجھنا جب کہ یہ نقصان سے بچاؤ سے چل رہا ہو۔ محرکات کو غلط منسوب کرنے سے اعتماد کو نقصان پہنچ سکتا ہے۔
      overcommitment: |
        ڈوبے ہوئے اخراجات کا مغالطہ (Sunk cost fallacy)—ناکام منصوبے میں سرمایہ کاری جاری رکھنا کیونکہ "ہم نے پہلے ہی اتنا کچھ ڈال دیا ہے" بجائے اس کے کہ نقصانات کو کم کیا جائے۔
      missed_opportunities_for_conflict_resolution: |
        مفاہمت سے انکار کرنا کیونکہ کوئی بھی رعایت نقصان محسوس ہوتی ہے، یہاں تک کہ جب متبادل سب کے لیے بدتر نتیجہ ہو۔
      vulnerability_to_exploitation: |
        ان لوگوں کے ذریعہ ہیرا پھیری کا شکار ہونا جو نقصان سے بچاؤ کو جنم دینے والے انتخاب کو فریم کرتے ہیں،
        جیسے سیلز کی حکمت عملی جو اس بات پر زور دیتی ہیں کہ اگر آپ عمل نہیں کرتے تو آپ کیا "کھو" دیں گے۔
      reinforcing_negative_perceptions: |
        ممکنہ نقصانات پر حد سے زیادہ توجہ مرکوز کرنے سے ایک مایوس کن نقطہ نظر پیدا ہو سکتا ہے جو خود پورا ہو جاتا ہے، ترقی کے مواقع سے محروم رہتا ہے۔
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: نقش علاقے کا متبادل نہیں ہے
    quick_introduction: |
      "نقش علاقے کا متبادل نہیں ہے" کا مطلب ہے کہ حقیقت کی نمائندگی خود حقیقت نہیں ہے۔ ماڈلز، تھیوریز، اور وضاحتیں مفید سادہ بنانے والے ہیں، لیکن وہ ہمیشہ کچھ چھوڑ دیتے ہیں۔ نقش کو علاقے سمجھنے سے غلطی ہوتی ہے۔
    one_liner: نقش علاقے کا متبادل نہیں ہے—سبھی ماڈلز غلط ہیں؛ کچھ مفید ہیں۔
    try_this:
      - جب کوئی ماڈل حقیقت سے میل نہیں کھاتا، تو نقش کو اپ ڈیٹ کریں—حقیقت کو اس میں فٹ کرنے کے لیے مجبور نہ کریں۔
      - پوچھیں: یہ ماڈل کیا چھوڑ رہا ہے؟ یہ کب ناکام ہو سکتا ہے؟
      - ماڈلز کو سچائی کے بجائے اوزار کے طور پر سمجھیں۔
    ask_yourself:
      - کیا میں اپنے ماڈل کو حقیقت سے گڑبڑ کر رہا ہوں؟
      - کیا علاقے میں اس وقت سے تبدیلی آئی ہے جب میں نے آخری بار دیکھا تھا؟
    in_more_detail: |
      الفریڈ کورزیبسکی نے جنرل سیمنٹکس میں یہ خیال پیش کیا۔ ایک شہر کا نقشہ نیویگیشن کے لیے مفید ہے، لیکن وہ شہر نہیں ہے—یہ تفصیلات کو چھوڑ دیتا ہے، پرانا ہو جاتا ہے، اور کبھی بھی سب کچھ حاصل نہیں کر سکتا۔ یہی حال ذہنی ماڈلز، سائنسی تھیوریز، اور تنظیمی چارٹس کا ہے۔

      سبھی ماڈلز غلط ہیں؛ کچھ مفید ہیں۔ خطرہ یہ ہے کہ کسی ماڈل کو مکمل سچائی کے طور پر سمجھا جائے، خاص طور پر جب علاقے میں تبدیلی آئی ہو۔ اچھی سوچ کے لیے جب حقیقت سے میل نہ کھائے تو نقشوں کو اپ ڈیٹ کرنے کی ضرورت ہوتی ہے۔
    why_this_is_important: |
      یہ تسلیم کرنا کہ نقش علاقے سے مختلف ہوتے ہیں، ماڈلز میں زیادہ اعتماد کو روکتا ہے، عقائد کو اپ ڈیٹ کرنے کی حوصلہ افزائی کرتا ہے، اور پرانی یا زیادہ سادہ معلومات پر عمل کرنے کے خطرے کو کم کرتا ہے۔
    when_to_use:
      - فیصلہ_کرنا
      - مسئلہ_حل_کرنا
      - سیکھنا
      - خطرہ_کا_جائزہ
    how_can_you_spot_it:
      model_reality_confusion: |
        کسی فریم ورک یا تھیوری کو ایسے سمجھنا جیسے یہ حقیقت کو مکمل طور پر بیان کرتا ہے۔
      outdated_assumptions: |
        ایسی معلومات یا ماڈلز پر عمل کرنا جو اب موجودہ حالات سے میل نہیں کھاتے۔
      oversimplification: |
        بنیادی باتوں کو نظر انداز کرنا کیونکہ "نقش" میں وہ شامل نہیں ہیں۔
      map_worship: |
        ثبوتوں کے متضاد ہونے کے باوجود ماڈل کا دفاع کرنا بجائے اس کے کہ اسے اپ ڈیٹ کیا جائے۔
    examples:
      organizational_charts: |
        یہ فرض کرنا کہ رپورٹنگ کا ڈھانچہ کام کرنے کے اصل طریقے کو ظاہر کرتا ہے۔
      financial_models: |
        اسپریڈ شیٹ پروجیکشن کو منظر نامے کے بجائے پیشین گوئی کے طور پر سمجھنا۔
      stereotypes: |
        گروپ کی سطح کی عمومیات کو افراد پر لاگو کرنا۔
      strategy_docs: |
        ایک منصوبے پر عمل کرنا جیسا کہ لکھا گیا تھا جب مارکیٹ بدل چکی ہو۔
    real_world_implications: |
      نقش-علاقے کا فرق سائنس، انجینئرنگ، اور فلسفہ کا بنیادی حصہ ہے۔ یہ Bayesian اپ ڈیٹ، چست طریقہ کار، اور معرفتی عاجزی کی بنیاد ہے۔ اس کو نظر انداز کرنے سے سخت سوچ اور ناکام حکمت عملی ہوتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        کسی شخص کے بارے میں آپ کا ذہنی ماڈل پرانا ہو سکتا ہے۔ پرانے تاثرات پر انحصار کرنے کے بجائے براہ راست بات چیت کے ذریعے اسے اپ ڈیٹ کریں۔
      collaborative_learning_initiative: |
        ٹیموں کو منصوبوں اور ماڈلز کو پرکھنے اور نظر ثانی کرنے کے لیے فرضیات کے طور پر سمجھنے کی حوصلہ افزائی کریں، نہ کہ مقررہ سچائیوں کے طور پر۔
    how_can_this_be_misapplied:
      radical_skepticism: |
        یہ نتیجہ اخذ کرنا کہ کوئی نقشہ مفید نہیں ہے اور تمام علم مشکوک ہے۔
      constant_revision: |
        اتنی کثرت سے نظر ثانی کرنا کہ کوئی مستحکم سمجھ پیدا نہ ہو۔
      dismissing_models: |
        مفید سادہ بنانے والوں کو اس لیے رد کرنا کیونکہ وہ "علاقے نہیں ہیں"۔
      relativism: |
        یہ دعویٰ کرنا کہ تمام نقش برابر کے قابل ہیں جب کچھ واضح طور پر علاقے کو بہتر طور پر فٹ کرتے ہیں۔
