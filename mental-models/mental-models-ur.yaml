      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: نمایاں پن کا تعصب
    quick_introduction: |
      نمایاں پن کا تعصب کسی صورتحال کے سب سے نمایاں یا قابل توجہ پہلوؤں پر توجہ مرکوز کرنے کا رجحان ہے، جبکہ کم واضح لیکن ممکنہ طور پر اہم عوامل کو نظر انداز کر دیا جاتا ہے۔ جو چیز نمایاں ہوتی ہے اسے ہمارے فیصلوں میں غیر متناسب توجہ اور وزن ملتا ہے۔
    one_liner: جو چیز نمایاں ہوتی ہے اسے غیر متناسب توجہ ملتی ہے - باریک بینی نظر انداز ہو جاتی ہے۔
    try_this:
      - Ask: میں ایسی کیا چیز نہیں دیکھ رہا ہوں کیونکہ وہ نمایاں نہیں ہے؟
      - فیصلہ کرنے سے پہلے کم واضح عوامل کو فعال طور پر تلاش کریں۔
      - نوٹس کریں جب کوئی واضح یا ڈرامائی عنصر آپ کے فیصلے پر حاوی ہو رہا ہو۔
    ask_yourself:
      - کیا میں نمایاں چیز کو زیادہ وزن اور باریک چیز کو کم وزن دے رہا ہوں؟
      - میں کن اہم عوامل کو نظر انداز کر رہا ہوں؟
    in_more_detail: |
      نمایاں معلومات واضح، جذباتی طور پر چارج شدہ، یا حال ہی میں سامنے آنے والی ہوتی ہے۔ یہ توجہ حاصل کرتی ہے اور اس سے زیادہ فیصلوں کو متاثر کرتی ہے جتنی اسے کرنی چاہیے۔ ہم نمایاں چیز کو زیادہ وزن دیتے ہیں اور باریک بینی کو کم وزن۔ ایک ڈرامائی واقعہ یا واضح مثال ہماری سوچ پر حاوی ہو سکتی ہے، یہاں تک کہ جب وہ نمائندہ نہ ہو۔

      نمایاں پن کا تعصب دستیابی کے تخمینے (جو ذہن میں آتا ہے) اور حالیہ پن کے تعصب (جو حال ہی میں ہوا) کے ساتھ اوورلیپ ہوتا ہے۔ یہ خطرے کے ادراک، ملازمت، اور حکمت عملی کو متاثر کرتا ہے۔ سب سے زیادہ نظر آنے والے مسائل کو حل کیا جاتا ہے؛ پوشیدہ مسائل بڑھتے رہتے ہیں۔
    why_this_is_important: |
      نمایاں پن کے تعصب کو پہچاننے سے آپ کو واضح چیزوں سے آگے دیکھنے اور کم نظر آنے والے عوامل پر غور کرنے میں مدد ملتی ہے۔ یہ خطرے کے تجزیے، مسئلہ کی تشخیص، اور فیصلے کے معیار کو بہتر بناتا ہے۔ اہم چیزیں ہمیشہ نمایاں نہیں ہوتیں۔
    when_to_use:
      - فیصلہ_سازی
      - مسئلہ_حل_کرنا
      - خطرے_کا_تجزیہ
      - قیادت
    how_can_you_spot_it:
      prominent_factor_dominance: |
        سب سے زیادہ قابل توجہ پہلو فیصلے کو چلاتا ہے۔
      overlooking_background: |
        کم نظر آنے والے عوامل کو ان کی اہمیت کے باوجود نظر انداز کر دیا جاتا ہے۔
      vividness_overweighting: |
        ڈرامائی یا جذباتی معلومات کو غیر متناسب وزن ملتا ہے۔
      visibility_bias: |
        جو چیز ہم آسانی سے دیکھ یا ناپ سکتے ہیں اسے اس چیز سے زیادہ توجہ ملتی ہے جسے ہم نہیں کر سکتے۔
    examples:
      risk: |
        طیارے کا حادثہ نمایاں ہوتا ہے - ہم پرواز کے خطرے کو زیادہ اندازہ کرتے ہیں۔ کار حادثات مجموعی طور پر کم نمایاں ہوتے ہیں - ہم گاڑی چلانے کے خطرے کو کم اندازہ کرتے ہیں۔
      hiring: |
        ایک امیدوار کی پریزنٹیشن کی مہارتیں نمایاں ہوتی ہیں؛ ان کی فالو-تھرو کم واضح ہو سکتی ہے لیکن اتنی ہی اہم ہے۔
      strategy: |
        حریف کی چالیں نمایاں ہوتی ہیں؛ بتدریج مارکیٹ کی تبدیلیاں کم قابل توجہ ہوتی ہیں لیکن شاید زیادہ اہمیت رکھتی ہوں۔
      problems: |
        سب سے بلند شکایت کا ازالہ کیا جاتا ہے جبکہ نظاماتی مسائل نظر انداز ہو جاتے ہیں۔
    real_world_implications: |
      نمایاں پن کا تعصب اس بات کو متاثر کرتا ہے کہ کس چیز کو توجہ، فنڈنگ، اور کارروائی ملتی ہے۔ یہ علامات کو حل کرنے کی طرف لے جا سکتا ہے بجائے وجوہات کے اور وسائل کی غلط تقسیم کی طرف۔ جان بوجھ کر غیر نمایاں معلومات کی تلاش فیصلوں کو بہتر بناتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں کو صرف ان کی سب سے زیادہ نمایاں خصوصیات سے نہ جانچیں۔ کم واضح خصوصیات کی تلاش کریں - قابل اعتماد، مستقل مزاجی، وہ لوگوں کے ساتھ کیسا سلوک کرتے ہیں جو ان کی مدد نہیں کر سکتے۔
      collaborative_learning_initiative: |
        مسئلہ حل کرنے میں، واضح طور پر پوچھیں "ہم کیا نہیں دیکھ رہے ہیں؟" اور "کیا کم واضح ہے لیکن اہم ہے؟" ایسے عمل بنائیں جو غیر نمایاں مسائل کو سامنے لائیں۔
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        کبھی کبھی جو چیز نمایاں ہوتی ہے وہ اہم ہوتی ہے۔ ہر واضح چیز کو رد نہ کریں۔
      false_sophistication: |
        یہ فرض کرنا کہ مبہم عوامل ہمیشہ واضح عوامل سے زیادہ اہم ہوتے ہیں۔
      analysis_paralysis: |
        اتنے سارے غیر نمایاں عوامل کی تلاش کرنا کہ آپ کبھی بھی نمایاں عوامل پر عمل نہیں کر پاتے۔
      contrarianism: |
        صرف مختلف ہونے کے لیے نمایاں معلومات کو مسترد کرنا۔
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: قلت کی تعصب
    quick_introduction: |
      قلت کی تعصب وہ رجحان ہے جس میں چیزوں کو اس وقت زیادہ اہمیت دی جاتی ہے جب وہ نایاب یا محدود نظر آتی ہیں۔ "محدود وقت،" "صرف 3 باقی،" اور "خصوصی رسائی" فوری ضرورت اور خواہش کو جنم دیتے ہیں، جو اکثر اس بات کی عقلی تشخیص پر غالب آ جاتی ہے کہ آیا ہمیں واقعی وہ چیز درکار ہے یا چاہتے ہیں۔
    one_liner: قلت سے سمجھی جانے والی قدر میں اضافہ ہوتا ہے—"محدود" عقلیت پر فوری ضرورت کو جنم دیتا ہے۔
    try_this:
      - پوچھیں: کیا میں اسے چاہتا اگر یہ نایاب نہ ہوتی؟ فوری ضرورت کو ختم کریں۔
      - محدود وقت یا "صرف X باقی" کی پیشکشوں پر عمل کرنے سے پہلے توقف کریں۔
      - نوٹس کریں کہ قلت آپ کی خواہش کو حقیقی قدر سے زیادہ کب چلا رہی ہے۔
    ask_yourself:
      - کیا میں اسے اس لیے اہمیت دے رہا ہوں کہ یہ نایاب ہے، یا اس لیے کہ مجھے واقعی اس کی ضرورت ہے؟
      - کیا میں قلت کے فریم کے بغیر یہ فیصلہ کروں گا؟
    in_more_detail: |
      قلت سے سمجھی جانے والی قدر میں اضافہ ہوتا ہے۔ جب کوئی چیز نایاب یا غائب ہو رہی ہوتی ہے، تو ہم اسے زیادہ چاہتے ہیں—جزوی طور پر اس لیے کہ قلت معیار کی نشاندہی کر سکتی ہے، اور جزوی طور پر اس لیے کہ نقصان سے بچنا ہمیں کچھ کھونے سے ڈراتا ہے۔ مارکیٹرز اور بات چیت کرنے والے فوری ضرورت پیدا کرنے کے لیے قلت کا استعمال کرتے ہیں۔ یہ تعصب جلدی میں فیصلے، زیادہ خرچ، اور ناقص ترجیح کی طرف لے جا سکتا ہے۔

      قلت ان لوگوں کے ادراکی بینڈوڈتھ کو بھی متاثر کرتی ہے جو واقعی وسائل کے محدود ہیں؛ غربت دیگر فیصلوں کے لیے "ذہنی بینڈوڈتھ" کو کم کر سکتی ہے۔
    why_this_is_important: |
      قلت کی تعصب کو تسلیم کرنا آپ کو ہتھکنڈوں کے خلاف مزاحمت کرنے اور زیادہ سوچے سمجھے انتخاب کرنے میں مدد کرتا ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ ہم محدود ایڈیشن کو زیادہ اہمیت کیوں دیتے ہیں اور جب ہمیں ضرورت نہیں ہوتی تو جلدی کرتے ہیں۔
    when_to_use:
      - فیصلہ سازی
      - مذاکرات
      - سرمایہ کاری
      - خطرہ کا اندازہ
    how_can_you_spot_it:
      urgency_trigger: |
        "محدود وقت" یا "صرف X باقی" غیر متناسب خواہش پیدا کرتا ہے۔
      fear_of_missing_out: |
        رسائی کھونے کا امکان کارروائی کو اس کی اصل قدر سے زیادہ چلاتا ہے۔
      impulsive_purchases: |
        چیزیں خریدنا اس لیے کہ وہ نایاب ہیں نہ کہ اس لیے کہ آپ کو ان کی ضرورت ہے۔
      artificial_scarcity: |
        قلت تیار کی جاتی ہے (مثال کے طور پر، جعلی کاؤنٹ ڈاؤن) نہ کہ حقیقی۔
    examples:
      sales: |
        "سٹاک میں صرف 2 باقی" یا "سیل آج رات ختم ہو رہی ہے" ایسی خریداریوں کو جنم دیتا ہے جو فوری ضرورت کے بغیر نہیں ہوتیں۔
      auctions: |
        بولیاں لگانے والے جیتنے کے چکر میں پڑ جاتے ہیں اور مسابقتی قلت کی وجہ سے اپنی منصوبہ بندی سے زیادہ ادا کرتے ہیں۔
      exclusivity: |
        "ممبرز-اونلی" یا "انویٹ-اونلی" رسائی سمجھی جانے والی قدر کو بڑھاتی ہے۔
      genuine_scarcity: |
        جب وسائل واقعی محدود ہوں، تو قلت کے دباؤ میں لوگ بدتر فیصلے کرتے ہیں (مثال کے طور پر، غریب، وقت کے دباؤ والے)۔
    real_world_implications: |
      قلت کی تعصب صارفین کے رویے، بات چیت کے نتائج، اور پالیسی کے ردعمل کو چلاتی ہے۔ اسے اخلاقی طور پر (مثال کے طور پر، جائز آخری تاریخیں) یا غیر اخلاقی طور پر (مثال کے طور پر، جعلی قلت) استعمال کیا جا سکتا ہے۔ اسے سمجھنے سے فیصلے کے معیار میں بہتری آتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب دوسرے مصنوعی قلت پیدا کرتے ہیں تو محتاط رہیں ("میں صرف چند کلائنٹ لے رہا ہوں")۔ تصدیق کریں کہ قلت حقیقی ہے یا نہیں۔ تعلقات کی تعمیر کرتے وقت، آپ کے وقت کی حقیقی قلت قدر کا اشارہ کر سکتی ہے—لیکن زیادہ استعمال ہتھکنڈے جیسا لگتا ہے۔
      collaborative_learning_initiative: |
        پہل کے لیے فوری ضرورت پیدا کرتے وقت، اس بات کو یقینی بنائیں کہ یہ جائز ہے۔ جعلی آخری تاریخیں دریافت ہونے پر اعتماد کو ختم کر دیتی ہیں۔
    how_can_this_be_misapplied:
      manipulation: |
        لوگوں کو فیصلوں میں دباؤ ڈالنے کے لیے جان بوجھ کر جھوٹی قلت پیدا کرنا۔
      impulsive_decisions: |
        مصنوعی فوری ضرورت کے تحت اہم انتخاب کرنا جب زیادہ وقت نتائج کو بہتر بنا سکتا ہے۔
      overvaluing_scarcity: |
        یہ فرض کرنا کہ نایاب چیزیں ہمیشہ بہتر ہوتی ہیں—کبھی کبھی قلت بے ترتیب ہوتی ہے۔
      exploiting_vulnerability: |
        جن لوگوں پر پہلے سے ہی وسائل کا دباؤ ہے ان پر قلت کی ہتھکنڈے استعمال کرنا۔
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: دوسرے درجے کی سوچ
    quick_introduction: |
      دوسرے درجے کی سوچ آپ کے اعمال کے نتائج کے نتائج پر غور کرنے کا عمل ہے۔
      پہلے درجے کی سوچ پوچھتی ہے "اگر میں X کروں تو کیا ہوگا؟" دوسرے درجے کی سوچ
      پوچھتی ہے "اور پھر کیا؟" اور "اس کے بعد پھر کیا؟" یہ غیر ارادی اثرات کو
      سامنے لاتا ہے۔
    one_liner: اور پھر کیا؟ پوچھیں - نتائج کے نتائج پر غور کریں۔
    try_this:
      - کسی بھی فیصلے کے لیے، کم از کم دو بار اور پھر کیا؟ پوچھیں۔
      - غور کریں کہ دوسرے لوگ آپ کے عمل پر کیسے رد عمل ظاہر کریں گے - اور پھر اس رد عمل پر۔
      - نوٹس کریں کہ پہلے درجے کے اثرات سلسلے میں کیسے الٹ جاتے ہیں یا پیچیدہ ہو جاتے ہیں۔
    ask_yourself:
      - کیا میں نے دوسرے درجے (اور تیسرے درجے) کے اثرات پر غور کیا ہے؟
      - میں کن غیر ارادی نتائج کو نظر انداز کر رہا ہوں؟
    in_more_detail: |
      ہاورڈ مارکس نے سرمایہ کاری میں اس تصور کو مقبولیت دی۔ پہلے درجے کی سوچ:
      "یہ بڑھے گا۔" دوسرے درجے کی سوچ: "اگر یہ بڑھے گا، تو دوسرے نوٹس کریں گے،
      زیادہ لوگ خریدیں گے، یہ اور بڑھے گا - جب تک کہ یہ زیادہ قدر نہ ہو جائے اور
      گر نہ جائے۔" نتائج کا سلسلہ اکثر پہلے درجے کے اثر کو الٹ دیتا ہے یا پیچیدہ
      کر دیتا ہے۔

      دوسرے درجے کی سوچ زیادہ مشکل ہے - اس کے لیے زیادہ ذہنی کوشش اور تخیل
      کی ضرورت ہوتی ہے۔ لیکن یہ بہت سی غلطیوں کو روکتا ہے۔ اچھے منصوبہ ساز
      کئی قدم آگے سوچتے ہیں اور غور کرتے ہیں کہ دوسرے لوگ کیسے رد عمل ظاہر
      کریں گے۔
    why_this_is_important: |
      دوسرے درجے کی سوچ غیر ارادی نتائج کو روکتی ہے اور فیصلے کے معیار کو بہتر
      بناتی ہے۔ یہ حکمت عملی، پالیسی، اور کسی بھی ایسے شعبے کے لیے ضروری ہے جہاں
      اعمال رد عمل کو متحرک کرتے ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - مسئلہ_حل
      - حکمت_عملی
      - خطرے_کا_جائزہ
    how_can_you_spot_it:
      consequence_chains: |
        "اگر میں X کروں، تو Y ہوگا، پھر Z ہوگا..."
      reaction_anticipation: |
        اپنے عمل پر دوسروں کے رد عمل پر غور کرنا۔
      unintended_effects: |
        ضمنی اثرات اور فیڈ بیک لوپس کی تلاش۔
      reversals: |
        دوسرے درجے کے اثرات جو پہلے درجے کے اثرات کی تردید کرتے ہیں یا الٹ
        دیتے ہیں۔
    examples:
      investing: |
        "اگر ہر کوئی سوچتا ہے کہ یہ ایک اچھی سرمایہ کاری ہے، تو شاید یہ بھیڑ والا
        ہو - فائدہ شاید ختم ہو گیا ہو۔"
      policy: |
        "اگر ہم X کو سبسڈی دیں، تو طلب بڑھے گی، قیمتیں بڑھیں گی - کیا سبسڈی
        واقعی مدد کرتی ہے؟"
      negotiation: |
        "اگر میں یہاں سختی کروں، تو وہ وہاں بدلہ لیں گے - مجموعی اثر کیا ہوگا؟"
      incentives: |
        "اگر ہم اس میٹرک کو انعام دیں، تو لوگ اسے گیم کریں گے - وہ اصل میں کیا
        کریں گے؟"
    real_world_implications: |
      دوسرے درجے کی سوچ حکمت عملی کی سوچ کی نشانی ہے۔ یہ پالیسی کی ناکامیوں،
      غیر ارادی مراعات، اور سادہ امید پرستی کو روکتا ہے۔ یہ اچھے فیصلہ
      سازوں کو عظیم فیصلہ سازوں سے ممتاز کرتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        کوئی بھی قدم اٹھانے سے پہلے، پوچھیں "وہ کیسے رد عمل کریں گے؟ اور میں اس پر
        کیسے رد عمل کروں گا؟" صرف فوری تبادلے کے بجائے، تعلقات کی حرکیات پر
        غور کریں۔
      collaborative_learning_initiative: |
        منصوبہ بندی میں، "اور پھر کیا؟" مشقیں چلائیں۔ نتائج کے سلسلے بنائیں۔ غیر
        ارادی اثرات کو ظاہر ہونے سے پہلے پہچانیں۔
    how_can_this_be_misapplied:
      analysis_paralysis: |
        اتنے آگے تک سوچنا کہ آپ کبھی عمل ہی نہ کریں۔
      false_complexity: |
        یہ فرض کرنا کہ دوسرے درجے کے اثرات ہمیشہ غالب رہتے ہیں جب پہلے درجے
        کے اثرات کافی ہو سکتے ہیں۔
      overconfidence: |
        یہ یقین کرنا کہ آپ طویل سلسلے کی پیش گوئی کر سکتے ہیں جب غیر یقینی
        مرکب ہو جاتی ہے۔
      pessimism: |
        نتائج کے سلسلے میں ہمیشہ بدترین کا فرض کرنا۔
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: ڈوبے ہوئے اخراجات کا مغالطہ
    quick_introduction: |
      ڈوبے ہوئے اخراجات کا مغالطہ یہ رجحان ہے کہ پہلے سے خرچ کیے گئے وسائل کی وجہ سے کسی فیصلے میں سرمایہ کاری جاری رکھی جائے، بجائے اس کے کہ مستقبل میں متوقع منافع کی بنیاد پر فیصلہ کیا جائے۔
      "ہم اتنی دور آ گئے ہیں" یا "میں نے پہلے ہی بہت زیادہ سرمایہ کاری کر دی ہے" کے خیالات سے مزید نقصان اٹھانے کا سلسلہ جاری رہتا ہے۔
    one_liner: گزشتہ سرمایہ کاری ختم ہو چکی ہے — صرف مستقبل کے اخراجات اور فوائد اہمیت رکھتے ہیں۔
    try_this:
      - پوچھیں: اگر میں آج شروع کرتا، تو کیا میں یہ راستہ منتخب کرتا؟
      - پہلے سے "ختم کرنے کے معیار" کی تعریف کریں — وہ شرائط جن کے تحت آپ رک جائیں گے۔
      - معمولی فیصلے کا جائزہ لیں: یہاں سے آگے مجھے کیا حاصل ہو گا یا کیا نقصان ہو گا؟
    ask_yourself:
      - کیا میں مستقبل کے قدر کی وجہ سے جاری رکھ رہا ہوں، یا گزشتہ سرمایہ کاری کو درست ثابت کرنے کے لیے؟
      - اگر کوئی دوست بالکل نئے سرے سے میری پوزیشن میں ہوتا تو میں اسے کیا مشورہ دیتا؟
    in_more_detail: |
      ڈوبے ہوئے اخراجات وہ گزشتہ اخراجات ہیں جنہیں واپس حاصل نہیں کیا جا سکتا۔ عقلی فیصلے میں انہیں نظر انداز کیا جاتا ہے — صرف مستقبل کے اخراجات اور فوائد اہمیت رکھتے ہیں۔ لیکن ہم اپنی سرمایہ کاری سے جذباتی طور پر جڑے ہوتے ہیں۔ ہم وہ کھانا ختم کرتے ہیں جس سے لطف اندوز نہیں ہو رہے، وہ فلم دیکھتے ہیں جو ہمیں ناپسند ہے، اور ان منصوبوں کو جاری رکھتے ہیں جن کا اب کوئی مطلب نہیں رہا۔ ہم چاہتے ہیں کہ جو ہم نے لگایا ہے وہ "ضائع نہ ہو"، لیکن جاری رکھنے سے اکثر زیادہ ضائع ہوتا ہے۔

      یہ مغالطہ خاص طور پر اس وقت مضبوط ہوتا ہے جب ہم نے صرف رقم ہی نہیں، بلکہ وقت، کوشش، یا اپنی شناخت کی بھی سرمایہ کاری کی ہو۔ یہ تسلیم کرنا کہ ہم غلط تھے، مہنگا محسوس ہو سکتا ہے، لہذا ہم مزید سرمایہ کاری کر دیتے ہیں۔
    why_this_is_important: |
      ڈوبے ہوئے اخراجات کے مغالطے کو پہچاننا آپ کو نقصان کو کم کرنے، ضرورت پڑنے پر سمت تبدیل کرنے، اور گزشتہ سرمایہ کاری کے بجائے مستقبل کی قدر کی بنیاد پر فیصلے کرنے میں مدد کرتا ہے۔
      یہ منصوبوں، کیریئرز اور رشتوں کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ سازی
      - سرمایہ کاری
      - کیریئر میں تبدیلی
      - خطرے کا اندازہ
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "ہم اب نہیں رک سکتے — ہم پہلے ہی X خرچ کر چکے ہیں" جب مستقبل کا منافع جاری رکھنے کو جائز نہیں ٹھہراتا۔
      escalation_of_commitment: |
        گزشتہ سرمایہ کاری کو درست ثابت کرنے یا "محفوظ" کرنے کے لیے مزید سرمایہ کاری کرنا۔
      identity_investment: |
        اس لیے جاری رکھنا کہ ناکامی کو تسلیم کرنے سے خود کی شبیہ کو خطرہ لاحق ہو گا۔
      ignoring_marginal_analysis: |
        کل اخراجات کی بنیاد پر فیصلے کرنا، نہ کہ اضافی اخراجات اور فوائد کی بنیاد پر۔
    examples:
      projects: |
        کسی ناکام منصوبے کو اس لیے جاری رکھنا کہ "ہم نے اس پر پہلے ہی 6 مہینے لگا دیے ہیں" جب نقصان کو کم کرنا عقلی ہوتا۔
      relationships: |
        کسی رشتے میں اس لیے رہنا کہ "ہم 5 سال سے ساتھ ہیں" بجائے اس کے کہ مستقبل کا جائزہ لیا جائے۔
      careers: |
        کسی ناپسندیدہ کیریئر میں اس لیے رہنا کہ آپ نے ڈگری یا تجربے کے سالوں میں سرمایہ کاری کی ہے۔
      investments: |
        کسی نقصان دہ اسٹاک کو "برابر پر واپس آنے" کے لیے رکھنا، بجائے اس کے کہ بہتر مواقع میں دوبارہ سرمایہ کاری کی جائے۔
    real_world_implications: |
      ڈوبے ہوئے اخراجات کا مغالطہ وسائل کا ضیاع، ناکامیوں کا طول پکڑنا، اور مواقع کا ضائع ہونا کا سبب بنتا ہے۔
      یہ افراد، تنظیموں اور حکومتوں کو متاثر کرتا ہے۔ اس پر قابو پانے کے لیے واضح فیصلہ سازی کے فریم ورک کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        ایسے رشتوں یا تعاون میں مزید سرمایہ کاری جاری نہ رکھیں جو اب آپ کے لیے فائدہ مند نہیں ہیں، صرف گزشتہ سرمایہ کاری کی وجہ سے۔ مستقبل کی قدر کا جائزہ لیں۔
      collaborative_learning_initiative: |
        منصوبوں کے لیے "ختم کرنے کے معیار" بنائیں — وہ شرائط جن کے تحت آپ گزشتہ سرمایہ کاری سے قطع نظر رک جائیں گے۔ منصوبوں کا وقتاً فوقتاً "بالکل نئے سرے سے" کے نقطہ نظر سے جائزہ لیں۔
    how_can_this_be_misapplied:
      quitting_too_early: |
        "ڈوبے ہوئے اخراجات" کو ایسی چیزوں کو ترک کرنے کے بہانے کے طور پر استعمال کرنا جنہیں نتیجہ دینے کے لیے مزید وقت کی ضرورت ہے۔
      undervaluing_consistency: |
        کچھ وابستگیوں (مثلاً، رشتے، ساکھ) میں تسلسل کی وجہ سے قدر ہوتی ہے جسے محض معمولی تجزیے نظر انداز کر دیتے ہیں۔
      cold_rationality: |
        جذباتی وابستگی کو غیر منطقی سمجھ کر مسترد کرنا جب یہ حقیقی اقدار کی عکاسی کر سکتا ہے۔
      analysis_paralysis: |
        جاری رکھنے کے بارے میں زیادہ سوچنا جب جواب واضح ہو۔
