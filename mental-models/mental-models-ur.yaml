      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: دستیابی کا استدلال
    quick_introduction: |
      دستیابی کا استدلال وہ رجحان ہے جس میں واقعات کے امکان کا اندازہ اس آسانی سے لگایا جاتا ہے جس سے ان کی مثالیں ذہن میں آتی ہیں۔ اگر ہم آسانی سے مثالیں یاد کر سکتے ہیں، تو ہم فرض کرتے ہیں کہ یہ واقعہ عام ہے۔ واضح، حالیہ، یا جذباتی مثالیں ہمارے امکان کے تخمینوں پر حاوی ہوتی ہیں۔
    one_liner: جو چیز آسانی سے ذہن میں آتی ہے وہ زیادہ ممکنہ محسوس ہوتی ہے—حالانکہ ایسا نہیں ہوتا۔
    try_this:
      - پوچھیں: بنیادی شرح کیا ہے؟ کیا میں واضح یا حالیہ مثالوں کا زیادہ وزن کر رہا ہوں؟
      - ڈیٹا کی تلاش کریں جب آپ کا دل کہے "یہ عام محسوس ہوتا ہے" یا "یہ نادر محسوس ہوتا ہے۔"
      - جب ایک ڈرامائی کہانی آپ کے خطرے کے اندازے کو چلا رہی ہو تو اسے نوٹ کریں۔
    ask_yourself:
      - کیا میں اصل فریکوئنسی کے بجائے یادداشت میں آسانی کی بنیاد پر امکان کا اندازہ لگا رہا ہوں؟
      - اگر میں نے ابھی وہ خبر نہ دیکھی ہوتی تو کیا میں مختلف سوچتا؟
    in_more_detail: |
      ہم فریکوئنسی اور امکان کا اندازہ لگانے کے لیے ذہنی شارٹ کٹس کا استعمال کرتے ہیں۔ ایک شارٹ کٹ دستیابی ہے: جو چیز آسانی سے ذہن میں آتی ہے؟ ہوائی جہاز کے حادثات واضح اور بہت زیادہ رپورٹ شدہ ہوتے ہیں — ہم ان کے امکان کو زیادہ سمجھا دیتے ہیں۔ کار حادثات عام لیکن کم نمایاں ہوتے ہیں — ہم انہیں کم سمجھا دیتے ہیں۔ حالیہ، وضوح، اور جذباتی اثر سب دستیابی میں اضافہ کرتے ہیں۔

      یہ استدلال اس وقت مفید ہے جب دستیابی اصل فریکوئنسی سے متعلق ہو۔ لیکن میڈیا، ذاتی تجربہ، اور نمایاں ہونا اکثر تعلق کو مسخ کر دیتے ہیں۔ ہم نادر لیکن واضح خطرات سے خوفزدہ ہوتے ہیں اور عام لیکن معمولی کو نظر انداز کرتے ہیں۔
    why_this_is_important: |
      دستیابی کے استدلال کو تسلیم کرنے سے آپ کو امکان کے تخمینوں کو درست کرنے، واضح خبروں پر زیادہ رد عمل کرنے سے بچنے، اور خطرے کے بہتر اندازے لگانے میں مدد ملتی ہے۔ یہ فیصلے میں بہت سی منظم غلطیوں کی وضاحت کرتا ہے۔
    when_to_use:
      - فیصلہ_سازی
      - خطرہ_مقداری_تحلیل
      - سرمایہ_کاری
      - مسئلہ_حل_کرنا
    how_can_you_spot_it:
      vividness_dominance: |
        ڈرامائی یا جذباتی مثالیں تخمینوں پر غیر متناسب طور پر اثر انداز ہوتی ہیں۔
      recency_effect: |
        حالیہ واقعات دوبارہ ہونے کا زیادہ امکان محسوس ہوتے ہیں۔
      personal_experience_overweighting: |
        "میں ایسے کسی کو جانتا ہوں جو..." امکان کے تخمینوں کو تشکیل دیتا ہے۔
      media_distortion: |
        جو رپورٹ کیا جاتا ہے وہ اکثر اس سے مطابقت نہیں رکھتا جو اکثر ہوتا ہے۔
    examples:
      risk_perception: |
        دہشت گردی کے خطرے کو زیادہ سمجھنا (واضح، رپورٹ شدہ) اور دل کی بیماری کے خطرے کو کم سمجھنا (عام، کم ڈرامائی)۔
      investing: |
        حالیہ مارکیٹ کے واقعات (گرنا، عروج) مستقبل کے لیے توقعات پر حاوی ہوتے ہیں۔
      hiring: |
        کسی خاص اسکول سے بری بھرتی کے بارے میں ایک واضح کہانی اس اسکول کے تمام امیدواروں کی تشخیص کو متاثر کرتی ہے۔
      health: |
        ایک دوست کی کینسر کی تشخیص کینسر کو بنیادی شرح سے زیادہ ممکنہ بناتی ہے۔
    real_world_implications: |
      دستیابی کا استدلال انشورنس کی خریداری، پالیسی کی ترجیحات، اور ذاتی فیصلوں کو متاثر کرتا ہے۔ میڈیا اور مارکیٹرز اسے استعمال کرتے ہیں۔ اس کے لیے درستگی میں بنیادی شرحوں کی تلاش اور اس بات پر سوال اٹھانا شامل ہے کہ "کیا ذہن میں آتا ہے۔"
    professional_application:
      networking_and_relationship_building: |
        خبردار رہیں کہ کسی شخص یا گروپ کے ساتھ ایک واضح منفی تجربہ آپ کے فیصلے کو مسخ کر سکتا ہے۔ بنیادی شرحوں اور متعدد ڈیٹا پوائنٹس کی تلاش کریں۔
      collaborative_learning_initiative: |
        خطرات یا مواقع کا اندازہ لگاتے وقت، واضح طور پر پوچھیں "بنیادی شرح کیا ہے؟" اور "کیا میں واضح مثالوں کا زیادہ وزن کر رہا ہوں؟" دستیابی سے چلنے والے تخمینوں کو درست کرنے کے لیے ڈیٹا کا استعمال کریں۔
    how_can_this_be_misapplied:
      dismissing_intuition: |
        کبھی کبھی دستیابی معلوماتی ہوتی ہے — حالیہ تجربہ تبدیلی کا اشارہ دے سکتا ہے۔ یہ نہ فرض کریں کہ دستیابی سے چلنے والے تمام فیصلے غلط ہیں۔
      analysis_paralysis: |
        اتنا زیادہ درست کرنے کے چکر میں کہ واضح تجربے سے آنے والے جائز انتباہی اشاروں کو نظر انداز کر دینا۔
      false_objectivity: |
        یہ فرض کرنا کہ بنیادی شرحیں ہمیشہ درست ہوتی ہیں جب وہ پرانی یا غیر قابل اطلاق ہوسکتی ہیں۔
      manipulation: |
        دوسروں کے فیصلوں کو چلانے کے لیے جان بوجھ کر کچھ مثالوں کو واضح بنانا۔
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: باڈر-مین ہاف فینومینن
    quick_introduction: |
      باڈر-مین ہاف فینومینن (جسے فریکوئنسی الیوژن بھی کہا جاتا ہے) اس وقت ہوتا ہے جب آپ کسی نئی چیز کے بارے میں سیکھتے ہیں اور پھر اچانک اسے ہر جگہ دیکھنے لگتے ہیں۔ یہ اتفاق لگتا ہے، لیکن یہ اکثر انتخابی توجہ ہوتی ہے—آپ کا دماغ حال ہی میں دیکھی ہوئی چیزوں کو نوٹس کرنے کے لیے تیار ہو جاتا ہے۔
    one_liner: آپ کوئی نئی چیز سیکھتے ہیں اور اچانک اسے ہر جگہ دیکھتے ہیں—یہ ہمیشہ وہیں موجود تھی۔
    try_this:
      - جب آپ کسی چیز کے بارے میں سیکھنے کے بعد اسے "ہر جگہ" محسوس کرتے ہیں، تو اس کی بنیادی شرح (base rate) کی جانچ کریں۔
      - اس بات کو نوٹس کریں کہ جب حالیہ ہونے کی وجہ سے کوئی چیز ضرورت سے زیادہ اہم لگتی ہے۔
      - پوچھیں: کیا میں ایک حقیقی رجحان دیکھ رہا ہوں، یا صرف اس چیز کو دیکھ رہا ہوں جس کو دیکھنے کے لیے میرا دماغ تیار ہے؟
    ask_yourself:
      - کیا یہ واقعی اب زیادہ عام ہے، یا میں اسے زیادہ نوٹس کر رہا ہوں؟
      - کیا میں نے اس پیٹرن کو دیکھا ہوتا اگر میں نے حال ہی میں اس کے بارے میں نہ سیکھا ہوتا؟
    in_more_detail: |
      باڈر-مین ہاف دہشت گرد گروپ کے بارے میں سننے کے بعد، ایک شخص دنوں کے اندر ہی اسے خبروں، گفتگو اور مضامین میں دیکھ سکتا ہے۔ اس فینومینن کے دو اجزاء ہیں: انتخابی توجہ (آپ وہی دیکھتے ہیں جو آپ ڈھونڈ رہے ہیں) اور کنفرمیشن بائس (آپ کامیابیوں کو یاد رکھتے ہیں اور ناکامیوں کو بھول جاتے ہیں)۔

       یہ الیوژن یہ ہے کہ چیز اچانک زیادہ عام ہو گئی ہے۔ حقیقت میں، یہ ہمیشہ موجود تھی؛ آپ صرف اس کے لیے حساس نہیں تھے۔ یہ حال ہی میں سیکھی گئی معلومات کی کثرت یا اہمیت کو زیادہ سمجھنے کا سبب بن سکتا ہے۔
    why_this_is_important: |
      باڈر-مین ہاف فینومینن کو پہچاننے سے آپ حالیہ نمائش کی بنیاد پر یہ زیادہ سمجھنے سے بچ جاتے ہیں کہ کوئی چیز کتنی عام یا اہم ہے۔ یہ یہ بھی واضح کرتا ہے کہ نئی چیزیں، مصنوعات، یا رجحانات جب آپ انہیں پہلی بار نوٹس کرتے ہیں تو وہ "ہر جگہ" کیوں محسوس ہوتی ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - سیکھنا
      - خطرے_کا_م valutazione
      - مسئلہ_حل_کرنا
    how_can_you_spot_it:
      sudden_ubiquity: |
        آپ ایک نیا لفظ، تصور، یا پروڈکٹ سیکھتے ہیں اور دنوں کے اندر اسے مسلسل دیکھ کر حیران رہ جاتے ہیں۔
      recency_bias: |
        حالیہ معلومات اصل میں جو ہے اس کی نسبت حقیقت کی زیادہ نمائندہ لگتی ہے۔
      pattern_seeking: |
        آپ کا دماغ غیر متعلقہ مشاہدات کو "یہ ہر جگہ ہے" کی کہانی میں جوڑتا ہے۔
      forgetting_the_misses: |
        آپ اس بات کا حساب نہیں رکھتے کہ آپ کتنی بار وہ چیز نہیں دیکھتے—صرف ان اوقات کا جب آپ اسے دیکھتے ہیں۔
    examples:
      vocabulary: |
        لفظ "serendipity" (خوشگوار اتفاق) سیکھنا اور پھر اسے اسی ہفتے تین مختلف مضامین میں دیکھنا۔
      car_purchase: |
        کسی خاص کار ماڈل خریدنے کا فیصلہ کرنے کے بعد، آپ اسے ہر سڑک پر دیکھتے ہیں—حالانکہ یہ ہمیشہ وہیں موجود تھی۔
      health_anxiety: |
        کسی نایاب علامت کے بارے میں پڑھنا اور پھر خود میں اسی طرح کے احساسات کو نوٹس کرنا، جس سے غیر ضروری پریشانی پیدا ہوتی ہے۔
      trends: |
        کسی نئے ایپ یا رجحان کو دریافت کرنا اور محسوس کرنا کہ یہ اچانک حاوی ہو رہا ہے—جبکہ اس کے صارفین کی تعداد کم ہو سکتی ہے۔
    real_world_implications: |
      یہ فینومینن رجحانات، خطرات اور مواقع کے ہمارے ادراک کو متاثر کرتا ہے۔ مارکیٹرز اور میڈیا اسے بار بار نمائش پیدا کر کے استحصال کر سکتے ہیں۔ فیصلہ سازی میں، یہ حالیہ معلومات کو زیادہ وزن دینے کا سبب بن سکتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی شخص کسی موضوع کو سیکھنے کے بعد بار بار اس کا ذکر کرے، تو سمجھیں کہ وہ فریکوئنسی الیوژن کا تجربہ کر رہا ہو سکتا ہے—موضوع لازمی طور پر زیادہ متعلقہ نہیں ہے، بلکہ ان کے لیے زیادہ نمایاں ہے۔
      collaborative_learning_initiative: |
        تربیت میں، اس بات کو دہرائیں کہ کسی نئی چیز کو سیکھنے کے بعد "ہر جگہ دیکھنا" معمول کی بات ہے؛ کثرت کے احساس پر بھروسہ کرنے کے بجائے بنیادی شرح کی جانچ کی حوصلہ افزائی کریں۔
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        کسی چیز کو زیادہ عام یا اہم سمجھنا کیونکہ آپ نے اسے حال ہی میں بار بار دیکھا ہے۔
      confirmation_bias_amplification: |
        "ہر جگہ دیکھنے" کے احساس کو اس بات کے ثبوت کے طور پر استعمال کرنا کہ کوئی عقیدہ درست ہے۔
      decision_distortion: |
        حال ہی میں سیکھی گئی معلومات کی بنیاد پر ایسے انتخاب کرنا جو غیر متناسب طور پر اہم محسوس ہوں۔
      vulnerability_to_manipulation: |
        اشتہارات دینے والے اور پروپیگنڈا کرنے والے کثرت اور اہمیت کے الیوژن کو پیدا کرنے کے لیے بار بار نمائش کا استعمال کرتے ہیں۔
    related_content:
