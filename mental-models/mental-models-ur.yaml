      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: پیریٹو کا اصول
    quick_introduction: |
      پیریٹو کا اصول (یا 80/20 اصول) کہتا ہے کہ تقریباً 80% اثرات 20% وجوہات سے آتے ہیں۔
      کم وسائل والے ان پٹس اکثر زیادہ آؤٹ پٹس پیدا کرتے ہیں—
      سیلز، کیڑے، گاہک، کوشش، خصوصیات، اور بہت کچھ میں۔ اہم چند پر توجہ دیں۔
    one_liner: 80% اثرات 20% وجوہات سے آتے ہیں—اہم چند پر توجہ دیں۔
    try_this:
      - ان 20% ان پٹس کی شناخت کریں جو 80% نتائج پیدا کرتے ہیں—وہاں زیادہ سرمایہ کاری کریں۔
      - ان 80% کو کاٹ دیں یا ترجیح کم کر دیں جو کم پیدا کرتے ہیں۔
      - پوچھیں: چند چیزیں، اگر میں نے انہیں اچھی طرح کیا، تو سب سے زیادہ اہم ہوں گی؟
    ask_yourself:
      - کیا میں اپنی کوششیں برابر بانٹ رہا ہوں جب چند چیزیں زیادہ اہم ہیں؟
      - میرا اعلیٰ فائدہ مند 20% کیا ہے؟
    in_more_detail: |
      ويلفرڈو پیریٹو نے مشاہدہ کیا کہ اٹلی کی 80% زمین 20% آبادی کی ملکیت تھی۔
      اس اصول کو عام کیا گیا ہے: 80% سیلز 20% گاہکوں سے، 80% کیڑے 20% کوڈ سے، 80% نتائج 20% کوشش سے۔
      صحیح تناسب مختلف ہوتا ہے، لیکن پیٹرن—غیر مساوی تقسیم—عام ہے۔

      یہ اصول بتاتا ہے کہ اعلیٰ فائدہ مند 20% کی شناخت اور اس پر توجہ مرکوز کرنے سے
      نتائج میں نمایاں بہتری آسکتی ہے۔ یہ ایک ترجیحی ہدایت ہے، کوئی طبعی قانون نہیں۔
    why_this_is_important: |
      پیریٹو کے اصول کو لاگو کرنے سے آپ کو سختی سے ترجیح دینے، کم اثر والی سرگرمیوں پر
      کوششیں ضائع کرنے سے بچنے، اور کم وسائل میں زیادہ حاصل کرنے میں مدد ملتی ہے۔
      یہ پیداواری صلاحیت اور حکمت عملی کے لیے بنیادی ہے۔
    when_to_use:
      - فیصلہ_سازی
      - مسئلہ_حل_کرنا
      - قیادت
      - کیریئر_کی_حرکتیں
    how_can_you_spot_it:
      uneven_distribution: |
        X کا ایک چھوٹا سا حصہ Y کے ایک بڑے حصے کا ذمہ دار ہے۔
      high_leverage_activities: |
        چند اعمال زیادہ تر نتائج پیدا کرتے ہیں۔
      low_value_tail: |
        بہت سی سرگرمیاں کم حصہ ڈالتی ہیں؛ انہیں کاٹنے کا اثر کم ہوتا ہے۔
      vital_few_vs_trivial_many: |
        اہم بات یہ ہے کہ کون سے چند اہم ہیں ان کی شناخت کی جائے۔
    examples:
      sales: |
        20% گاہک 80% آمدنی پیدا کرتے ہیں—انہیں برقرار رکھنے اور بڑھانے پر توجہ دیں۔
      software: |
        20% خصوصیات 80% استعمال کی وجہ بنتی ہیں—ان کو ترجیح دیں۔
      productivity: |
        چند عادات یا معمولات آپ کی زیادہ تر پیداوار پیدا کرتے ہیں—ان پر زیادہ توجہ دیں۔
      problems: |
        20% کیڑے 80% کریش کی وجہ بنتے ہیں—پہلے انہیں ٹھیک کریں۔
    real_world_implications: |
      پیریٹو کا اصول وسائل کی تقسیم، مصنوعات کی حکمت عملی، اور
      ذاتی پیداواری صلاحیت کی رہنمائی کرتا ہے۔ اسے نظر انداز کرنے سے کوششیں بہت زیادہ پھیل جاتی ہیں۔
      اسے زیادہ لاگو کرنے سے "لانگ ٹیل" کی نظر اندازی ہو سکتی ہے جہاں یہ اہم ہے۔
    professional_application:
      networking_and_relationship_building: |
        اپنے مقاصد کے لیے سب سے اہم تعلقات کی شناخت کریں۔
        کوششوں کو برابر بانٹنے کے بجائے ان پر غیر متناسب طور پر سرمایہ کاری کریں۔
      collaborative_learning_initiative: |
        ٹیم کی کارکردگی کو بہتر بنانے کے لیے، ان 20% مداخلتوں کا پتہ لگائیں جو 80% نتائج کو
         চালনা کرتی ہیں۔ وہاں تربیت اور عمل میں تبدیلیوں پر توجہ مرکوز کریں۔
    how_can_this_be_misapplied:
      oversimplification: |
        یہ فرض کرنا کہ 80/20 ہر جگہ لاگو ہوتا ہے؛ کچھ تقسیمات زیادہ یکساں ہوتی ہیں۔
      neglecting_the_tail: |
        "غیر اہم بہت سے" کو نظر انداز کرنا جب وہ مجموعی طور پر اہم ہوتے ہیں (مثال کے طور پر، بہت سے چھوٹے
        گاہک، ایج کیسز)۔
      false_precision: |
        80/20 کو لفظی کے بجائے ایک تخمینی ہدایت کے طور پر سمجھنا۔
      misidentifying_the_vital_few: |
        غلط تجزیے کی وجہ سے غلط 20% پر توجہ مرکوز کرنا۔
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: پارکنسن کا قانون
    quick_introduction: |
      پارکنسن کا قانون بیان کرتا ہے کہ "کام اس وقت کو پر کرنے کے لیے پھیل جاتا ہے جو اس کی تکمیل کے لیے دستیاب ہوتا ہے۔" کام کو ایک ہفتہ دیں، اور اسے ایک ہفتہ لگتا ہے؛ اسے ایک دن دیں، اور یہ اکثر ایک دن میں ہو جاتا ہے۔ یہی بات بجٹ، ٹیم کے سائز اور وسائل پر بھی لاگو ہوتی ہے۔
    one_liner: کام اس وقت کو پر کرنے کے لیے پھیل جاتا ہے جو اس کی تکمیل کے لیے دستیاب ہوتا ہے۔
    try_this:
      - فوکس کو مجبور کرنے اور دائرہ کار میں اضافے کو روکنے کے لیے سخت ڈیڈ لائن مقرر کریں۔
      - پوچھیں: اس میں معقول طور پر کم سے کم وقت کتنا لگ سکتا ہے؟
      - دیکھیں کہ کب اضافی وقت یا وسائل متناسب قدر کے بغیر استعمال ہو رہے ہیں۔
    ask_yourself:
      - کیا میں وقت پر کر رہا ہوں، یا کام واقعی اس کا مطالبہ کر رہا ہے؟
      - کیا سخت ڈیڈ لائن بہتر ترجیح کو مجبور کرے گی؟
    in_more_detail: |
      سی. نارتھکوٹ پارکنسن نے مشاہدہ کیا کہ کام کی مقدار سے قطع نظر بیوروکریسیاں بڑھتی ہیں۔ انہوں نے یہ بھی نوٹ کیا کہ کام دستیاب وقت کو پر کرنے کے لیے پھیل جاتے ہیں — ہم اپنی کوشش اور رفتار کو ڈیڈ لائن کے مطابق ڈھال لیتے ہیں۔ سخت ڈیڈ لائن فوکس کو مجبور کر سکتی ہیں؛ نرم ڈیڈ لائن ٹال مٹول اور دائرہ کار میں اضافے کو دعوت دیتی ہیں۔

      اس قانون کے پروجیکٹ مینجمنٹ، ذاتی پیداواریت، اور تنظیمی ڈیزائن کے لیے مضمرات ہیں۔ یہ تجویز کرتا ہے کہ ترجیح کو مجبور کرنے سے پابندیاں نتائج کو بہتر بنا سکتی ہیں۔
    why_this_is_important: |
      پارکنسن کے قانون کو سمجھنے سے آپ کو بہتر ڈیڈ لائن مقرر کرنے، منصوبوں کو زیادہ وسائل سے بچانے، اور یہ پہچاننے میں مدد ملتی ہے کہ کب "زیادہ وقت" یا "زیادہ لوگ" مدد نہیں کریں گے — اور نقصان پہنچا سکتے ہیں۔ پابندیاں پیداواری ہو سکتی ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - قیادت
      - مسئلہ_حل
      - کیریئر_کے_اقدامات
    how_can_you_spot_it:
      deadline_driven_effort: |
        ڈیڈ لائن قریب آنے پر کام تیز ہو جاتا ہے؛ جب ڈیڈ لائن دور ہوتی ہے تو بہت کم پیش رفت ہوتی ہے۔
      scope_expansion: |
        منصوبے مرکوز رہنے کے بجائے دستیاب وسائل کو پر کرنے کے لیے بڑھ جاتے ہیں۔
      bureaucratic_growth: |
        تنظیمیں لوگوں اور عمل کو شامل کرتی ہیں یہاں تک کہ جب کام کا بوجھ نہیں بڑھتا۔
      budget_exhaustion: |
        بجٹ مکمل طور پر خرچ ہو جاتے ہیں چاہے خرچ ضروری تھا یا نہیں۔
    examples:
      student_deadlines: |
        ایک مہینے میں واجب الادا کاغذ آخری 48 گھنٹوں میں لکھا جاتا ہے۔
      project_management: |
        6 ماہ کی ٹائم لائن والا پروجیکٹ 6 ماہ لیتا ہے؛ 3 ماہ کی ڈیڈ لائن کے ساتھ اسی دائرہ کار کو بھی مکمل کیا جا سکتا ہے۔
      meetings: |
        1 گھنٹے کی میٹنگ گھنٹہ بھر لیتی ہے چاہے 30 منٹ کافی ہوں۔
      budgets: |
        ایک شعبہ اگلے سال کے لیے اسی بجٹ کو جائز ٹھہرانے کے لیے سال کے آخر تک اپنا مکمل بجٹ خرچ کرتا ہے۔
    real_world_implications: |
      پارکنسن کا قانون پیداواریت، تنظیمی پھول، اور وسائل کی مختص پر اثر انداز ہوتا ہے۔ یہ تجویز کرتا ہے کہ مصنوعی پابندیاں (مختصر ڈیڈ لائن، چھوٹی ٹیمیں) فوکس اور کارکردگی کو بہتر بنا سکتی ہیں۔
    professional_application:
      networking_and_relationship_building: |
        دائرہ کار میں اضافے کو روکنے اور رفتار برقرار رکھنے کے لیے باہمی تعاون کے کام کے لیے واضح، سخت ڈیڈ لائن مقرر کریں۔
      collaborative_learning_initiative: |
        میٹنگز اور پروجیکٹس کے لیے ٹائم باکسنگ کا استعمال کریں۔ یہ جانچنے کے لیے مختصر ڈیڈ لائن کے ساتھ تجربہ کریں کہ کیا وہ معیار کی قربانی کے بغیر فوکس کو بہتر بناتے ہیں۔
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        غیر حقیقی طور پر مختصر ڈیڈ لائن مقرر کرنا جو جلنے یا ناقص معیار کا سبب بنتی ہیں۔
      underresourcing: |
        یہ فرض کرنا کہ کم وقت یا کم لوگ ہمیشہ کام کریں گے — کچھ کاموں کو مناسب وسائل کی ضرورت ہوتی ہے۔
      blame_shifting: |
        جب کام واقعی پیچیدہ تھا تو "پارکنسن کے قانون" کو تاخیر کا ذمہ دار ٹھہرانا۔
      ignoring_quality: |
        پائیدار نتائج کی قیمت پر مصنوعی پابندیوں کو پورا کرنے کے لیے جلدی کرنا۔
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: احتمالی سوچ
    quick_introduction: |
      احتمالی سوچ، یقین دہانیوں کے بجائے امکانات کے لحاظ سے استدلال کرنے کی عادت ہے۔ "کیا یہ ہوگا؟" کے بجائے، ہم پوچھتے ہیں "اس کے ہونے کا کتنا امکان ہے؟" یہ غیر یقینی صورتحال کو قبول کرتا ہے اور بہتر فیصلے کرنے کے لیے اسے استعمال کرتا ہے۔
    one_liner: امکانات کے بارے میں سوچیں، یقین دہانیوں کے بارے میں نہیں—غیر یقینی صورتحال کو قبول کریں۔
    try_this:
      - کیا یہ ہوگا؟ کو "اس کے ہونے کا کتنا امکان ہے؟" سے بدلیں۔
      - متعدد منظرناموں پر غور کریں اور تخمینی امکانات مختص کریں۔
      - نئے ثبوت آنے پر اپنی عقائد کو اپ ڈیٹ کریں۔
    ask_yourself:
      - کیا میں بائنری شرائط میں سوچ رہا ہوں جب امکانات زیادہ درست ہوں گے؟
      - ممکنہ نتائج کی حد کیا ہے؟
    in_more_detail: |
      زیادہ تر حقیقی دنیا کے نتائج غیر یقینی ہیں۔ احتمالی سوچ بائنری ہاں/نہیں کو بتدریج عقائد سے بدل دیتی ہے۔ اس میں متعدد منظرناموں پر غور کرنا، تخمینی امکانات مختص کرنا، اور ثبوت آنے پر اپ ڈیٹ کرنا شامل ہے۔ یہ زیادہ خود اعتمادی اور سیاہ اور سفید سوچ کے برعکس ہے۔

      اہم طریقوں میں شامل ہیں: حدود میں سوچنا، بنیادی شرحوں پر غور کرنا، ثبوتوں کے ساتھ عقائد کو اپ ڈیٹ کرنا، اور خطرے (معروف امکانات) اور غیر یقینی صورتحال (نامعلوم امکانات) کے درمیان فرق کرنا۔ یہ کیلیبریشن اور فیصلے کے معیار کو بہتر بناتا ہے۔
    why_this_is_important: |
      احتمالی سوچ حد سے زیادہ خود اعتمادی کو کم کرتی ہے، پیشین گوئی کو بہتر بناتی ہے، اور غیر یقینی صورتحال میں بہتر فیصلے کرنے کا باعث بنتی ہے۔ یہ سرمایہ کاری، حکمت عملی، اور کسی بھی ایسے شعبے کے لیے ضروری ہے جہاں مستقبل غیر یقینی ہو۔
    when_to_use:
      - فیصلہ سازی
      - خطرے کی تشخیص
      - سرمایہ کاری
      - مسئلہ حل کرنا
    how_can_you_spot_it:
      likelihood_language: |
        "شاید"، "ممکن ہے"، "ناممکن ہے" کے بجائے "ہوگا" یا "نہیں ہوگا"۔
      scenario_thinking: |
        تخمینی امکانات کے ساتھ متعدد ممکنہ مستقبلوں پر غور کرنا۔
      calibration: |
        وقت کے ساتھ ساتھ اصل نتائج کی تعدد سے مماثل پیشین گوئیاں۔
      uncertainty_acknowledgment: |
        واضح طور پر بتانا کہ آپ کیا نہیں جانتے۔
    examples:
      forecasting: |
        "مجھے لگتا ہے کہ ڈیڈ لائن کو پورا کرنے کا 60% امکان ہے" کے بجائے "ہم ڈیڈ لائن کو پورا کریں گے۔"
      investing: |
        "اس کے 2x ہونے کا 30% امکان اور -50% ہونے کا 70% امکان ہے" کے بجائے "یہ بہت بڑھے گا۔"
      strategy: |
        متعدد منظرناموں (بہترین، بنیادی، بدترین صورتحال) کے لیے تخمینی امکانات کے ساتھ منصوبہ بندی کرنا۔
      hiring: |
        "انٹرویو کی بنیاد پر، میں 70% امکان رکھتا ہوں کہ وہ کامیاب ہوں گے" کے بجائے "وہ ایک بہترین ہائرنگ ہیں۔"
    real_world_implications: |
      احتمالی سوچ کیلیبریشن کو بہتر بناتی ہے، حیرت کو کم کرتی ہے، اور بہتر خطرہ انتظام کو قابل بناتی ہے۔ یہ مؤثر پیشین گوئی اور غیر یقینی صورتحال میں فیصلہ سازی کا مرکز ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب مناسب ہو تو امکانات میں بات چیت کریں—"مجھے کافی یقین ہے" بمقابلہ "مجھے یقین ہے۔" یہ علمی عاجزی کا اشارہ دے کر اعتماد پیدا کرتا ہے۔
      collaborative_learning_initiative: |
        ٹیموں کو غیر یقینی صورتحال کا اظہار کرنے کی ترغیب دیں۔ احتمالی فیصلے کو بہتر بنانے کے لیے پیشین گوئی کے بازاروں یا کیلیبریشن مشقوں کا استعمال کریں۔
    how_can_this_be_misapplied:
      false_precision: |
        جب آپ اتنے درست نہیں ہو سکتے تو درست امکانات مختص کرنا (مثلاً، 73%)۔
      analysis_paralysis: |
        کبھی کارروائی نہ کرنا کیونکہ "ہم یقینی نہیں ہو سکتے۔"
      hedging_overuse: |
        ہر چیز کو بیکار ہونے کی حد تک اہل بنانا۔
      dismissing_intuition: |
        جب وہ جائز معلومات لے جا سکتے ہیں تو مضبوط اندرونی احساسات کو نظر انداز کرنے کے لیے زیادہ اصلاح کرنا۔
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: پیگمالین اثر
    quick_introduction: |
      پیگمالین اثر (یا روزینتھل اثر) وہ رجحان ہے جہاں اعلیٰ توقعات بہتر کارکردگی کا باعث بنتی ہیں۔ جب اساتذہ، مینیجرز، یا دیگر افراد کسی سے زیادہ توقعات رکھتے ہیں، تو وہ شخص بہتر کارکردگی دکھانے لگتا ہے۔ توقعات خود کو پورا کرنے والی پیش گوئیاں بن جاتی ہیں۔
    one_liner: اعلیٰ توقعات بہتر کارکردگی کا باعث بنتی ہیں — توقعات حقیقت کو تشکیل دیتی ہیں۔
    try_this:
      - اعلیٰ مگر حاصل کرنے کے قابل توقعات طے کریں؛ انہیں واضح طور پر بتائیں۔
      - اس بات پر توجہ دیں کہ کب کم توقعات کسی کی کارکردگی کو محدود کر رہی ہیں۔
      - پوچھیں: میں پوشیدہ طور پر کیا توقع کر رہا ہوں — اور یہ نتائج کو کیسے متاثر کر سکتا ہے؟
    ask_yourself:
      - کیا میری توقعات اس شخص کی مدد کر رہی ہیں یا اسے محدود کر رہی ہیں؟
      - کیا اعلیٰ توقعات میرے ساتھ ان کے سلوک — اور ان کے نتائج کو بدل دیں گی؟
    in_more_detail: |
      رابرٹ روزینتھل اور لینور جیکبسن نے اساتذہ کو غلط معلومات دی کہ کچھ طلباء تعلیمی طور پر "ب blom" کریں گے۔ ان طلباء — جو بے ترتیب طور پر منتخب کیے گئے تھے — نے درحقیقت دوسروں سے زیادہ بہتری دکھائی۔ اساتذہ کی توقعات نے ان کے رویے کو متاثر کیا (زیادہ توجہ، گرمجوشانہ رائے)، جس نے طالب علم کی کارکردگی کو متاثر کیا۔ توقعات حقیقت کو تشکیل دیتی ہیں۔

      اس کے برعکس — کم توقعات جو بدتر کارکردگی کا باعث بنتی ہیں — اسے بعض اوقات گولیم اثر کہا جاتا ہے۔ دونوں ظاہر کرتے ہیں کہ دوسروں کے بارے میں ہمارے عقائد ان کے نتائج کو متاثر کر سکتے ہیں۔ اس کے قیادت، تعلیم، اور والدین کے لیے گہرے اثرات ہیں۔
    why_this_is_important: |
      پیگمالین اثر کو سمجھنا آپ کو توقعات کی طاقت کو بروئے کار لانے میں مدد کرتا ہے۔ اعلیٰ توقعات، خلوص کے ساتھ بیان کی جائیں، کارکردگی کو بہتر بنا سکتی ہیں۔ کم توقعات خود کو پورا کرنے والی ناکامی پیدا کر سکتی ہیں۔ دوسروں کے بارے میں آپ کے عقائد اہم ہیں۔
    when_to_use:
      - قیادت
      - تعلقات_بنانا
      - سیکھنا
      - فیصلہ_کرنا
    how_can_you_spot_it:
      expectation_performance_link: |
        جن سے ہم زیادہ توقع کرتے ہیں وہ بہتر کارکردگی دکھانے لگتے ہیں۔
      differential_treatment: |
        ہم اپنی توقعات کی بنیاد پر لوگوں کے ساتھ مختلف سلوک کرتے ہیں — اکثر
        غیر شعوری طور پر۔
      self_fulfilling_prophecy: |
        صلاحیت کے بارے میں عقائد اس رویے کو متاثر کرتے ہیں جو صلاحیت کو تشکیل دیتا ہے۔
      teacher_student_dynamics: |
        اساتذہ کی توقعات مختلف سلوک کے ذریعے طالب علم کے نتائج کو متاثر کرتی ہیں۔
    examples:
      education: |
        وہ اساتذہ جو طلباء کی کامیابی کی توقع رکھتے ہیں وہ زیادہ مدد فراہم کرتے ہیں؛
        وہ طلباء بہتر کارکردگی دکھاتے ہیں۔ وہ اساتذہ جو ناکامی کی توقع رکھتے ہیں وہ
        غیر ارادی طور پر اسے پیدا کر سکتے ہیں۔
      workplace: |
        وہ مینیجر جو اپنے ماتحتوں سے اعلیٰ کارکردگی کی توقع رکھتے ہیں وہ
        زیادہ مواقع اور رائے فراہم کرتے ہیں؛ کارکردگی بہتر ہوتی ہے۔
      parenting: |
        وہ والدین جو اپنے بچوں سے ذمہ دار ہونے کی توقع رکھتے ہیں وہ
        انہیں زیادہ ذمہ داری دیتے ہیں؛ وہ اس پر پورا اترتے ہیں۔
      stereotypes: |
        اسٹیرائپ کا دھمکی اس کے برعکس ہے — منفی توقعات
        کارکردگی کو خراب کر سکتی ہیں۔
    real_world_implications: |
      پیگمالین اثر تعلیم، انتظام، اور
      رشتوں کو متاثر کرتا ہے۔ یہ بتاتا ہے کہ توقعات کو بڑھانا — جب
      حمایتی انداز میں کیا جائے — نتائج کو بہتر بنا سکتا ہے۔ یہ تنبیہ بھی کرتا ہے کہ
      کم توقعات تباہ کن ہو سکتی ہیں۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں سے اعلیٰ توقعات رکھیں — اور انہیں پورا کرنے کے لیے مدد فراہم کریں۔
        صلاحیت پر یقین رکھیں۔ آپ کی توقعات آپ کے رویے کو متاثر کرتی ہیں، جو ان کے نتائج کو متاثر کرتی ہیں۔
      collaborative_learning_initiative: |
        اعلیٰ حمایت کے ساتھ اعلیٰ توقعات کے کلچر بنائیں۔
        لوگوں کو "کم کارکردگی دکھانے والے" کے طور پر لیبل کرنے سے گریز کریں جس طرح سے
        یہ خود کو پورا کرنے والا بن جاتا ہے۔ ان میں سرمایہ کاری کریں جن سے آپ
        کامیابی کی توقع رکھتے ہیں۔
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        ایسی توقعات طے کرنا جو بغیر
        حمایت کے پوری نہیں کی جا سکتیں، ناکامی اور مایوسی پیدا کرتی ہیں۔
      blame_shifting: |
        "انہوں نے توقعات پوری نہیں کیں" جب ہم نے حمایت
        یا کامیابی کے لیے حالات فراہم نہیں کیے۔
      ignoring_constraints: |
        صرف توقعات ساختی رکاوٹوں پر قابو نہیں پاتیں۔
      pressure_without_support: |
        وسائل یا حمایت کے بغیر اعلیٰ توقعات نقصان دہ ہو سکتی ہیں۔
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: رجوع کا اوسط کی طرف رجحان
    quick_introduction: |
      رجوع کا اوسط کی طرف رجحان ایک شماریاتی رجحان ہے جہاں انتہائی نتائج کے بعد اوسط کے قریب کے نتائج کا رجحان ہوتا ہے۔ غیر معمولی طور پر اچھے یا برے نتائج کے بعد، اگلا نتیجہ شاید کم انتہائی ہوگا — کسی بھی وجہ سے مداخلت کی وجہ سے نہیں، بلکہ بے ترتیب تغیر کی وجہ سے۔
    one_liner: انتہائی نتائج کے بعد اوسط کے قریب کے نتائج کا رجحان ہوتا ہے۔
    try_this:
      - اپنی مداخلت کو "رجوع" سے منسوب نہ کریں — یہ اکثر بہرحال ہوتا۔
      - انتہائی نتائج کے بعد، اگلے کے کم انتہائی ہونے کی توقع کریں۔
      - پوچھیں: کیا یہ تبدیلی اس کی وجہ سے ہے جو میں نے کیا، یا صرف رجوع کا اوسط کی طرف رجحان؟
    ask_yourself:
      - کیا میں اپنی مداخلت کو اس کی وجہ سے کریڈٹ دے رہا ہوں یا الزام دے رہا ہوں جو شاید بے ترتیب تغیر ہو؟
      - کیا یہ میری کارروائی کے بغیر ہوتا؟
    in_more_detail: |
      اگر کوئی طالب علم ایک امتحان میں غیر معمولی طور پر زیادہ نمبر حاصل کرتا ہے، تو وہ اگلے میں اپنے اوسط کے قریب نمبر حاصل کرے گا — اس لیے نہیں کہ وہ "سست ہوگیا" بلکہ اس لیے کہ پہلا نتیجہ جزوی طور پر قسمت تھا۔ یہی بات کھیلوں کی کارکردگی، اسٹاک کی واپسی، اور کاروباری میٹرکس پر بھی لاگو ہوتی ہے۔ ہم اکثر "رجوع" کو کسی ایسی چیز سے منسوب کرتے ہیں جو ہم نے کی (مثلاً، سزا یا انعام)، جب کہ یہ بہرحال ہوتا۔

      ڈینیل کہنیمن بیان کرتے ہیں کہ فلائٹ انسٹرکٹرز نے غلطی سے یہ نتیجہ نکالا کہ تعریف نے کارکردگی کو خراب کیا اور تنقید نے اسے بہتر بنایا — وہ انتہائی کارکردگی کے بعد رجوع کا اوسط کی طرف رجحان کا مشاہدہ کر رہے تھے۔
    why_this_is_important: |
      رجوع کے اوسط کی طرف رجحان کو سمجھنا وجہ کو غلط منسوب کرنے سے روکتا ہے۔ یہ آپ کو آؤٹ لئرز پر زیادہ رد عمل ظاہر کرنے اور شور کی بنیاد پر تبدیلیاں کرنے سے بچنے میں مدد کرتا ہے۔ یہ مداخلتوں اور کارکردگی کا جائزہ لینے کے لیے ضروری ہے۔
    when_to_use:
      - فیصلہ_سازی
      - سرمایہ_کاری
      - خطرہ_جانچ
      - قیادت
    how_can_you_spot_it:
      extreme_followed_by_average: |
        ایک غیر معمولی طور پر اچھا یا برا نتیجہ اوسط کے قریب والے کے بعد آتا ہے۔
      spurious_causation: |
        "بحالی" یا "گراوٹ" کو کسی مداخلت سے منسوب کرنا جب رجوع بہرحال ہوتا۔
      overreaction_to_outliers: |
        ایک ہی انتہائی ڈیٹا پوائنٹ کی بنیاد پر پالیسی یا ذاتی تبدیلیاں کرنا۔
      reward_punishment_confusion: |
        یہ یقین کرنا کہ سزا "کام کر گئی" جب بہتری صرف رجوع تھی۔
    examples:
      sports: |
        ایک کھلاڑی ایک کیریئر گیم کھیلتا ہے، پھر اوسط پر واپس آجاتا ہے — شائقین "خود اطمینانی" کا الزام لگا سکتے ہیں۔
      investing: |
        ایک اسٹاک نے ایک بہترین سال گزارا، پھر واپس آجاتا ہے — سرمایہ کار برے انتظام کی وجہ سے گراوٹ کا الزام لگا سکتے ہیں جب یہ جزوی طور پر واپسی ہے۔
      performance_reviews: |
        ایک ملازم ایک برا سہ ماہی گزارتا ہے، رائے حاصل کرتا ہے، بہتر ہوتا ہے — جب کہ رجوع بہرحال ہوتا، تو رائے کو اس کا سہرا مل سکتا ہے۔
      medicine: |
        ایک مریض بدتر محسوس کرتا ہے، علاج لیتا ہے، بہتر ہوتا ہے — جب کہ کچھ بہتری قدرتی تھی، تو علاج کو اس کا سہرا مل سکتا ہے۔
    real_world_implications: |
      رجوع کا اوسط کی طرف رجحان اس بات کو متاثر کرتا ہے کہ ہم اساتذہ، ڈاکٹروں، فنڈ مینیجرز، اور خود کا جائزہ کیسے لیتے ہیں۔ یہ بتاتا ہے کہ "جو اوپر جاتا ہے اسے نیچے آنا پڑتا ہے" شماریاتی طور پر اکثر درست ہوتا ہے۔ اس کو غلط سمجھنے سے مداخلتیں ضائع ہوتی ہیں اور علاج پر جھوٹا اعتماد ہوتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        ایک ہی خراب تعامل کو زیادہ اہمیت نہ دیں — یہ ایک آؤٹ لئیر ہو سکتا ہے جو تعلق کے اوسط کی طرف رجوع کرے گا۔
      collaborative_learning_initiative: |
        مداخلتوں (تربیت، عمل میں تبدیلی) کا جائزہ لیتے وقت، اثر کو رجوع سے ممتاز کرنے کے لیے کنٹرول گروپس اور متعدد ڈیٹا پوائنٹس استعمال کریں۔
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        یہ فرض کرنا کہ مداخلت کے بعد کوئی بھی بہتری "صرف رجوع" ہے جب حقیقی اثرات موجود ہوں۔
      underreacting: |
        اس لیے کہ "یہ اوسط کی طرف رجوع کرے گا" حقیقی مسائل کو نظر انداز کرنا۔
      statistical_illiteracy: |
        رجوع کو ایک ایسی قوت کے ساتھ الجھانا جو نتائج کو "درست" کرتی ہے — یہ صرف امکانات ہیں۔
      overconfidence: |
        یہ فرض کرنا کہ اوسط مستحکم ہے جب بنیادی عمل تبدیل ہو سکتا ہے۔
