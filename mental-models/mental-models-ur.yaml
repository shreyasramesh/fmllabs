  - id: base_rate_fallacy
    name: بیس ریٹ کی غلطی (Base Rate Fallacy)
    quick_introduction: |
      بیس ریٹ کی غلطی عام شماریاتی معلومات (بیس ریٹ) کو نظر انداز کرنے کا رجحان ہے جو مخصوص، واضح معلومات کے حق میں ہوتی ہے۔ ہم خاص معاملے کو زیادہ اہمیت دیتے ہیں اور پچھلی امکان کو کم سمجھا جاتا ہے۔ ایک زبردست کہانی اعداد و شمار کی بات کو بدل سکتی ہے۔
    one_liner: ایک زبردست کہانی اعداد و شمار کی بات کو بدل سکتی ہے۔
    try_this:
      - کسی معاملے کا فیصلہ کرنے سے پہلے پوچھیں: اس قسم کی صورتحال کے لیے بیس ریٹ کیا ہے؟
      - مخصوص شواہد کو پچھلی امکان کے ساتھ جوڑیں — دونوں میں سے کسی کو نظر انداز نہ کریں۔
      - نوٹس لیں جب ایک واضح مثال اعداد و شمار کو ختم کر رہی ہو۔
    ask_yourself:
      - کیا میں اس خاص معاملے کو زیادہ اہمیت دے رہا ہوں اور بیس ریٹ کو کم سمجھا جا رہا ہوں؟
      - اگر میں زبردست کہانی کو ایک طرف رکھ دوں تو اعداد و شمار کیا کہیں گے؟
    in_more_detail: |
      اگر کوئی بیماری آبادی کے 1% کو متاثر کرتی ہے اور ایک ٹیسٹ 95% درست ہے، تو مثبت نتیجہ اکثر اس بات کا مطلب ہوتا ہے کہ شخص کو پھر بھی بیماری شاید نہیں ہے — کیونکہ بیس ریٹ بہت کم ہے۔ لیکن ہم بیس ریٹ کو نظر انداز کرتے ہیں اور "ان کا ٹیسٹ مثبت آیا" پر توجہ مرکوز کرتے ہیں۔ ہم مخصوص کے ذریعہ شماریاتی کے بجائے متاثر ہوتے ہیں۔

      یہ غلطی طبی تشخیص، ملازمت، رسک کا اندازہ، اور قانونی فیصلے کو متاثر کرتی ہے۔ ہمیں Bayesian استدلال کا استعمال کرتے ہوئے بیس ریٹ کو کیس کے مخصوص شواہد کے ساتھ جوڑنے کی ضرورت ہے — لیکن ہم اکثر ایسا نہیں کرتے۔
    why_this_is_important: |
      بیس ریٹ کی غلطی کو درست کرنے سے تشخیص، رسک کا اندازہ، اور فیصلے کے معیار میں بہتری آتی ہے۔ یہ ہمیں واضح معاملات پر زیادہ رد عمل ظاہر کرنے اور شماریاتی حقیقت پر کم رد عمل ظاہر کرنے سے روکتا ہے۔
    when_to_use:
      - فیصلہ_سازی (decision-making)
      - رسک_کا_اندازہ (risk_assessment)
      - مسئلہ_حل_کرنا (problem_solving)
      - سرمایہ_کاری (investing)
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        فیصلوں میں بیس ریٹس کو شامل نہیں کیا جاتا۔
      vividness_over_statistics: |
        ایک ہی معاملہ یا کہانی مجموعی ڈیٹا پر حاوی ہوتی ہے۔
      diagnostic_overweighting: |
        بیس ریٹ پر غور کیے بغیر نئے شواہد (مثال کے طور پر، ٹیسٹ کا نتیجہ) کو زیادہ اہمیت دینا۔
      anecdote_override: |
        "میں کسی ایسے شخص کو جانتا ہوں جو..." شماریاتی شواہد پر حاوی ہوتا ہے۔
    examples:
      medical: |
        کسی نادر بیماری کے لیے مثبت ٹیسٹ — بیس ریٹ کم ہے، لہذا مثبت اکثر غلط مثبت ہوتا ہے۔ ہم اسے نظر انداز کرتے ہیں اور فرض کرتے ہیں کہ انہیں بیماری ہے۔
      hiring: |
        ایک امیدوار کا انٹرویو بہت اچھا رہا — ہم انٹرویوز کی کارکردگی کی پیش گوئی کے لیے بیس ریٹ کو نظر انداز کرتے ہیں۔
      risk: |
        جہاز کا حادثہ واضح ہے — ہم ہوائی جہاز کے خطرے کو زیادہ اندازہ لگاتے ہیں اور گاڑی چلانے کے خطرے کو کم اندازہ لگاتے ہیں، بیس ریٹ کو نظر انداز کرتے ہیں۔
      startup_investing: |
        ایک بانی اچھی طرح سے پچ کرتا ہے — ہم اس بات کو نظر انداز کرتے ہیں کہ زیادہ تر اسٹارٹ اپس پچ کے معیار سے قطع نظر ناکام ہوجاتے ہیں۔
    real_world_implications: |
      بیس ریٹ کی غلطی طبی فیصلوں، قانونی فیصلوں، اور کاروباری حکمت عملی کو متاثر کرتی ہے۔ یہ وسائل کی غلط تخصیص اور رسک کے خراب اندازے میں معاون ہے۔ Bayesian سوچ اس کو درست کرتی ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں کا جائزہ لیتے وقت، بیس ریٹ پر غور کریں: مثال کے طور پر، اس قسم کا رویہ کتنی بار ہوتا ہے؟ ایک واضح تعامل کو وسیع نمونے پر حاوی نہ ہونے دیں۔
      collaborative_learning_initiative: |
        فیصلے کرتے وقت، کیس کے مخصوص شواہد کو شامل کرنے سے پہلے بیس ریٹس کو واضح طور پر بیان کریں اور ان پر غور کریں۔ ٹیموں کو Bayesian استدلال میں تربیت دیں۔
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        مضبوط کیس کے مخصوص شواہد کو نظر انداز کرنا جب بیس ریٹس دوسری صورت کا مشورہ دیتے ہیں — بعض اوقات انفرادی کیس استثنیٰ ہوتا ہے۔
      stereotyping: |
        افراد کے بارے میں غیر منصفانہ فیصلے کرنے کے لیے بیس ریٹس کا استعمال کرنا۔
      false_precision: |
        جب بیس ریٹس قریبی تخمینے ہوں تو جھوٹی درستگی کے ساتھ بیس ریٹس کا اطلاق کرنا۔
      dismissing_individuals: |
        "اعداد و شمار کہتے ہیں X" جب آپ کے سامنے موجود فرد تقسیم میں فٹ نہ ہو۔
    related_content:
