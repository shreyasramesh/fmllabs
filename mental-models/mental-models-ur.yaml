  - id: negativity_bias
    name: منفی رجحان
    quick_introduction: |
      منفی رجحان وہ رجحان ہے جس میں مثبت معلومات کے مقابلے میں منفی معلومات کو زیادہ اہمیت دی جاتی ہے۔ بری خبریں، تنقید، اور خطرات ہماری توجہ کو اپنی طرف کھینچتے ہیں اور ہماری زندگی کے فیصلوں پر مثبت محرکات کے مقابلے میں زیادہ مضبوطی سے اثر انداز ہوتے ہیں۔
    one_liner: بری خبروں کا وزن اچھی خبروں سے زیادہ ہوتا ہے—ہم خطرات کو ترجیح دینے کے لیے تیار کیے گئے ہیں۔
    try_this:
      - تشخیص کرتے وقت جان بوجھ کر مثبت شواہد کی تلاش کریں اور انہیں وزن دیں۔
      - جب ایک تنقید بہت ساری تعریفوں پر حاوی ہو جائے تو اس پر توجہ دیں۔
      - پوچھیں: کیا میں منفی معلومات کو اس سے زیادہ وزن دے رہا ہوں جس کی وہ مستحق ہے؟
    ask_yourself:
      - کیا میں منفی چیزوں پر ہی اٹکا ہوا ہوں اور مثبت کو نظر انداز کر رہا ہوں؟
      - اگر میں اچھے شواہد پر توجہ دوں تو کیا مجھے مختلف محسوس ہوگا؟
    in_more_detail: |
      ارتقائی لحاظ سے، کسی خطرے کو نظر انداز کرنا مہلک ہو سکتا ہے، جبکہ کسی موقع کو نظر انداز کرنا عام طور پر قابلِ بقا ہوتا تھا۔ ہمارے دماغ منفی معلومات کو ترجیح دینے کے لیے تیار کیے گئے ہیں۔ ایک تنقیدی تبصرہ بہت سارے تعریفوں پر حاوی ہو سکتا ہے۔ منفی واقعات زیادہ واضح طور پر اور زیادہ دیر تک یاد رکھے جاتے ہیں۔

      یہ رجحان تعلقات، فیصلہ سازی، اور فلاح و بہبود کو متاثر کرتا ہے۔ ہم ناکامیوں پر غور کرتے ہیں، بدترین صورتحال کا اندازہ لگاتے ہیں، اور مثبت شواہد کو کم کر کے سمجھتے ہیں۔ اسے سمجھنا ہمیں اسے درست کرنے میں مدد دیتا ہے۔
    why_this_is_important: |
      منفی رجحان کو تسلیم کرنا آپ کو فیڈ بیک کو متوازن کرنے، تنقید پر زیادہ رد عمل کا اظہار کرنے سے بچنے، اور زیادہ درست فیصلے کرنے میں مدد کرتا ہے۔ یہ اس بات کی بھی وضاحت کرتا ہے کہ بری خبریں کیوں غالب رہتی ہیں اور ہم اکثر حالات کے وارنٹ سے بدتر کیوں محسوس کرتے ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - تعلقات_بنانا
      - قیادت
      - خطرات_کا_اندازہ
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        ایک منفی تبصرہ بہت سارے مثبت تبصروں پر حاوی ہو جاتا ہے۔
      threat_prioritization: |
        ممکنہ نقصانات کو برابر کے فوائد سے زیادہ توجہ دی جاتی ہے۔
      vivid_negative_memories: |
        منفی تجربات زیادہ آسانی سے اور زیادہ جذبے کے ساتھ یاد کیے جاتے ہیں۔
      discounting_positive_evidence: |
        اچھی خبریں جلدی بھول جاتی ہیں یا انہیں ٹال دیا جاتا ہے۔
    examples:
      performance_reviews: |
        ایک ملازم تنقیدی فیڈ بیک کے ایک حصے پر ہی اٹکا رہتا ہے اور مجموعی مثبت تشخیص کو نظر انداز کر دیتا ہے۔
      news_consumption: |
        منفی سرخیاں مثبت رجحانات کے باوجود توجہ پر غالب رہتی ہیں اور دنیا کے نظریہ کو تشکیل دیتی ہیں۔
      relationships: |
        ایک تنہا بحث بہت اچھے لمحات سے زیادہ نمایاں نظر آتی ہے۔
      investing: |
        بازار میں گراوٹ، برابر کے عروج کی خوشی سے زیادہ خوف پیدا کرتی ہے۔
    real_world_implications: |
      منفی رجحان میڈیا، سیاست، اور تنظیمی ثقافت کو تشکیل دیتا ہے۔ یہ تشویش، تنازعہ، اور ناکارہ فیصلوں میں اضافہ کرتا ہے۔ جان بوجھ کر اس کا مقابلہ کرنے سے فلاح و بہبود اور فیصلے بہتر ہو سکتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        جب فیڈ بیک دیا جائے تو، اس بات سے آگاہ رہیں کہ منفی تبصروں کا وزن زیادہ ہوگا—انہیں متوازن کریں اور ترقی پر زور دیں۔ جب فیڈ بیک موصول ہو، تو پوری تصویر پر دانستہ طور پر غور کریں۔
      collaborative_learning_initiative: |
        ایسی ثقافتیں بنائیں جو واضح طور پر منفی رجحان کا مقابلہ کریں: فتوحات کا جشن منائیں، مثبت نتائج دستاویز کریں، اور ناکامیوں کا تجزیہ (post-mortems) کرتے وقت کامیابیوں کے "پہلے کے تجزیے" (pre-mortems) کو متوازن کریں۔
    how_can_this_be_misapplied:
      toxic_positivity: |
        "مثبت سوچ" پر اصرار کر کے جائز خدشات کو مسترد کرنا۔
      ignoring_real_threats: |
        حقیقی خطرات کو کم سمجھنے کے حد تک زیادہ سے زیادہ درست کرنا۔
      feedback_suppression: |
        یہ محسوس کر کے کہ "منفی رجحان برا ہے" ضروری تنقید سے گریز کرنا۔
      invalidation: |
        کسی کو یہ کہنا کہ ان کے منفی جذبات "صرف منفی رجحان ہیں" جب ان کے خدشات کی حقیقی وجہ ہو۔
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: اوکام کا اصول
    quick_introduction: |
      اوکام کا اصول (یا اوکم کا استرا) وہ اصول ہے کہ مسابقتی مفروضات میں سے،
      کم ترین مفروضات والے کو ترجیح دینی چاہیے۔ آسان وضاحتیں اکثر - حالانکہ ہمیشہ نہیں - درست ہوتی ہیں۔
    one_liner: شواہد کے مطابق سب سے آسان وضاحت کو ترجیح دیں۔
    try_this:
      - نظریات کا موازنہ کرتے وقت، پوچھیں: کس میں کم مفروضات ہیں؟
      - ایسے شواہد کے بغیر پیچیدگی کا اضافہ نہ کریں جو اس کا تقاضا کرتا ہو۔
      - نوٹس کریں جب آپ ایک آسان وضاحت کے بجائے ایک پیچیدہ وضاحت کو ترجیح دے رہے ہوں۔
    ask_yourself:
      - کیا میں غیر ضروری پیچیدگی پیدا کر رہا ہوں؟
      - کیا شواہد کو اس سطح کی وضاحت کی ضرورت ہے؟
    in_more_detail: |
      ولیم آف اوکم کے نام پر رکھا گیا، یہ اصول یہ دعویٰ نہیں کرتا کہ آسان وضاحتیں
      ہمیشہ سچ ہوتی ہیں۔ یہ تجویز کرتا ہے کہ شواہد کے بغیر غیر ضروری پیچیدگی کا اضافہ نہیں کیا جانا چاہیے۔ اگر دو نظریات ایک ہی مظاہر کی وضاحت کرتے ہیں، تو آسان والا ترجیح دی جائے گی جب تک کہ شواہد اس کے برعکس نہ ہوں۔

      اوکام کا اصول ایک ہ heuristic ہے، کوئی قانون نہیں۔ کبھی کبھی درست وضاحت
      پیچیدہ ہوتی ہے۔ لیکن یہ overfitting، سازشی سوچ، اور غیر ضروری
      پیچیدگی سے بچاتا ہے۔ یہ وضاحت میں سادگی کو ترجیح دیتا ہے۔
    why_this_is_important: |
      اوکام کے اصول کو اپنانے سے مسائل حل کرنے میں بہتری آتی ہے، ماڈلز میں overfitting کم ہوتا ہے،
      اور آپ کو پیچیدہ لیکن غیر تائید شدہ نظریات سے بچنے میں مدد ملتی ہے۔ یہ ایک مفید ڈیفالٹ ہے
      جب شواہد مبہم ہوں۔
    when_to_use:
      - مسائل_کا_حل
      - فیصلے_کرنا
      - سیکھنا
      - خطرے_کا_اندازہ
    how_can_you_spot_it:
      unnecessary_complexity: |
        ایک وضاحت جو بہت زیادہ مفروضات کا دعویٰ کرتی ہے جب کم ہی کافی ہوں گے۔
      conspiracy_tendencies: |
        ایسے واقعات کے لیے پیچیدہ، کثیر اللاعبین وضاحتیں جن کے آسان اسباب ہوتے ہیں۔
      overfitting: |
        ایک ماڈل یا نظریہ جو پچھلے ڈیٹا کی مکمل وضاحت کرتا ہے لیکن نئے ڈیٹا پر ناکام ہو جاتا ہے۔
      elegance_in_explanation: |
        بہترین وضاحتیں اکثر ریٹرو اسپییکٹ میں "واضح" محسوس ہوتی ہیں۔
    examples:
      debugging: |
        جب کوئی خرابی پیش آتی ہے، تو سب سے آسان اسباب کو پہلے چیک کریں (مثلاً، ٹائپو، غلط کنفیگریشن)
        فن تعمیر کے مسائل کا فرض کرنے سے پہلے۔
      conspiracy_theories: |
        "حکومت نے ایکس کو منظم کیا" کے لیے بہت سے پوشیدہ کھلاڑیوں کی ضرورت ہوتی ہے؛ "چند لوگوں نے
        غلطیاں کیں" آسان ہے۔
      product_failure: |
        صارفین کسی خصوصیت کو نہیں اپنا رہے - سب سے آسان وضاحت: یہ ان کے مسئلے کو حل نہیں کرتا،
        نہ کہ وہ UI سے الجھن کا شکار ہیں۔
      medical_diagnosis: |
        "عام چیزیں عام ہوتی ہیں" - نایاب تشخیص سے پہلے عام تشخیص پر غور کریں۔
    real_world_implications: |
      اوکام کا اصول سائنسی تحقیق، انجینئرنگ، اور روزمرہ کی منطق کی رہنمائی کرتا ہے۔
      یہ پیچیدہ غلط نظریات پر ضائع ہونے والی کوشش کو کم کرتا ہے۔ غلط استعمال ہونے پر، یہ
      حقیقت میں پیچیدہ مظاہر کو رد کر سکتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        دوسروں کے رویے کی تشریح کرتے وقت، سادہ وضاحتوں کو ترجیح دیں (وہ مصروف ہیں،
        وہ بھول گئے) بدنیتی یا پیچیدہ ارادوں کا فرض کرنے سے پہلے۔
      collaborative_learning_initiative: |
        مسائل حل کرنے کے سیشنز میں، واضح طور پر پوچھیں "سب سے آسان وضاحت کیا ہے؟"
        پیچیدہ ماڈلز بنانے سے پہلے۔
    how_can_this_be_misapplied:
      oversimplification: |
        درست پیچیدہ وضاحتوں کو مسترد کرنا کیونکہ وہ "بہت پیچیدہ" ہیں۔
      status_quo_bias: |
        اوکام کے اصول کو استعمال کرنا تاکہ واقف وضاحتوں کو نئے لیکن درست والے پر ترجیح دی جا سکے۔
      scientific_rigidity: |
        نئے نظریات کو مسترد کرنا کیونکہ وہ زیادہ پیچیدہ ہیں، یہاں تک کہ جب شواہد ان کی تائید کرتے ہوں۔
      missing_nuance: |
        کچھ ڈومینز (مثلاً، انسانی رویے، ماحولیاتی نظام) فطری طور پر پیچیدہ ہیں؛
        سادگی گمراہ کن ہو سکتی ہے۔
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: شتر مرغ کا اثر
    quick_introduction: |
      شتر مرغ کا اثر منفی مالی معلومات سے بچنے کا رجحان ہے—شتر مرغ کی طرح "اپنا سر ریت میں چھپانا"۔ لوگ مارکیٹیں گرنے پر اپنے پورٹ فولیو کو دیکھنے سے گریز کرتے ہیں، بل کھولنے میں تاخیر کرتے ہیں، اور ان وارننگ سائنز کو نظر انداز کرتے ہیں جو انہیں کارروائی کرنے میں مدد دے سکتے ہیں۔
    one_liner: بری خبروں سے بچنے سے حقیقت نہیں بدلتی—یہ صرف آپ کے رد عمل میں تاخیر کرتی ہے۔
    try_this:
      - باقاعدہ چیک اِن کا شیڈول بنائیں تاکہ آپ اعداد کو نظر انداز نہ کر سکیں۔
      - نوٹس کریں جب آپ کسی چیز کو کھولنے یا دیکھنے میں تاخیر کر رہے ہوں۔
      - پوچھیں: میں کس چیز سے بچ رہا ہوں، اور اگر میں اس کا سامنا کروں تو کیا بدلے گا؟
    ask_yourself:
      - کیا میں معلومات سے بچ رہا ہوں کیونکہ وہ بری ہو سکتی ہے؟
      - کیا پہلے سے آگاہی مجھے بہتر کارروائی کرنے میں مدد دے گی؟
    in_more_detail: |
      یہ اصطلاح رویے کے مالیات میں وضع کی گئی تھی تاکہ ان سرمایہ کاروں کی وضاحت کی جا سکے جو مارکیٹ میں گراوٹ کے دوران اپنی سرمایہ کاری کو چیک کرنے سے گریز کرتے ہیں۔ یہ رویہ مالیات سے آگے بڑھتا ہے: طبی معائنے سے گریز کرنا، رشتوں کے مسائل کو نظر انداز کرنا، اور مشکل گفتگو میں تاخیر کرنا۔ ہم بری خبروں کی تشویش سے بچنے کی کوشش کرتے ہیں، لیکن بچاؤ اکثر بروقت کارروائی کو روک کر نتائج کو بدتر بنا دیتا ہے۔

      یہ اثر نقصان سے بچاؤ اور جذباتی تکلیف سے بچنے کی خواہش سے چلتا ہے۔ بدقسمتی سے، جہالت حقیقت کو نہیں بدلتی—یہ صرف ہمارے رد عمل میں تاخیر کرتی ہے۔
    why_this_is_important: |
      شتر مرغ کے اثر کو پہچاننا آپ کو مشکل معلومات کا فعال طور پر سامنا کرنے میں مدد کرتا ہے۔ بری خبروں سے بچاؤ سے نتائج شاذ و نادر ہی بہتر ہوتے ہیں؛ یہ عام طور پر انہیں بڑھا دیتا ہے۔ بروقت آگاہی بہتر فیصلے کرنے کے قابل بناتی ہے۔
    when_to_use:
      - فیصلہ_سازی
      - سرمایہ_کاری
      - خطرہ_سازی
      - کیریئر_کی_تحریکیں
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        مارکیٹ گرنے پر سرمایہ کاری کے بیانات کو نہ دیکھنا۔
      delaying_difficult_information: |
        بل، طبی نتائج، یا کارکردگی کی رائے کھولنے میں تاخیر کرنا۔
      information_avoidance: |
        ایسے ذرائع سے فعال طور پر بچنا جن میں بری خبریں ہو سکتی ہیں۔
      procrastination_on_unpleasant_tasks: |
        ایسے کاموں میں تاخیر کرنا جن سے مسائل سامنے آئیں یا ان کا حل ہو۔
    examples:
      investing: |
        ایک سرمایہ کار مارکیٹ میں گراوٹ کے دوران اپنے 401(k) کو چیک کرنا بند کر دیتا ہے، اور دوبارہ توازن کے مواقع سے محروم ہو جاتا ہے۔
      health: |
        بری خبروں کے خوف کی وجہ سے علامات کے باوجود ڈاکٹر کے پاس جانے سے گریز کرنا۔
      finances: |
        قرض کا سامنا کرنے سے بچنے کے لیے کریڈٹ کارڈ کے بیانات یا بینک کے الرٹس کو نہ کھولنا۔
      performance: |
        ایک مینیجر سالانہ جائزے تک تنقیدی رائے دینے سے گریز کرتا ہے، جب پہلے کی مداخلت نے مدد کی ہوتی۔
    real_world_implications: |
      شتر مرغ کا اثر بدتر مالی نتائج، طبی علاج میں تاخیر، اور رشتوں اور کام میں غیر حل شدہ مسائل کا باعث بنتا ہے۔ یہ قابل گریز نقصانات کو بڑھا دیتا ہے۔ ایسے نظام جو معلومات کو نظر انداز کرنا مشکل بنا دیتے ہیں، مدد کر سکتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        مشکل گفتگو سے گریز نہ کریں۔ مسائل کے خود حل ہونے کی امید کے بجائے انہیں جلد حل کریں۔ باقاعدہ چیک اِن بنائیں جو مسائل کے بڑھنے سے پہلے سامنے لائیں۔
      collaborative_learning_initiative: |
        فیڈ بیک لوپس بنائیں جن سے مسائل کو نظر انداز کرنا مشکل ہو—ڈیش بورڈز، باقاعدہ جائزے، اور بری خبروں کے بروقت انکشاف کی حوصلہ افزائی کرنے والے معیارات۔
    how_can_this_be_misapplied:
      information_overload: |
        مسلسل نگرانی پر مجبور کرنا جب کچھ معلومات سے بچاؤ صحت مند ہو (مثلاً، ہر منٹ اسٹاک کو چیک نہ کرنا)۔
      anxiety_amplification: |
        ممکنہ مسائل پر اتنا زیادہ توجہ مرکوز کرنا کہ یہ تشویش کو بڑھا دے بغیر نتائج کو بہتر بنائے۔
      blame_shifting: |
        تمام بچاؤ کو "شتر مرغ کے اثر" سے منسوب کرنا جب کچھ بچاؤ عقلمندانہ ہو (مثلاً، شور کو نظر انداز کرنا)۔
      micromanagement: |
        دوسروں کی ضرورت سے زیادہ نگرانی کو جواز دینے کے لیے اس تصور کا استعمال کرنا۔
    related_content:
