      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: بنیادی استناد کی غلطی
    quick_introduction: |
      بنیادی استناد کی غلطی دوسروں کے رویے کو ان کے کردار یا شخصیت سے منسوب کرنے کا رجحان ہے جبکہ اپنے رویے کو صورتحال کے عوامل سے منسوب کیا جاتا ہے۔ ہم دوسروں کو ان کے اعمال سے اور خود کو اپنی نیتوں سے جانچتے ہیں۔
    one_liner: ہم دوسروں کو ان کے اعمال سے، خود کو اپنی نیتوں سے جانچتے ہیں۔
    try_this:
      - جب کوئی آپ کو مایوس کرے، تو پوچھیں: اس کی وضاحت کے لیے کون سے صورتحال کے عوامل ہو سکتے ہیں؟
      - دوسروں کے ساتھ وہی سخاوت کا اطلاق کریں جو آپ خود پر کرتے ہیں۔
      - جب آپ دوسروں کے رویے کو حالات کے بجائے کردار سے منسوب کر رہے ہوں تو اس پر توجہ دیں۔
    ask_yourself:
      - کیا میں اپنے رویے کی ویسے ہی وضاحت کروں گا جیسے میں ان کے رویے کی وضاحت کر رہا ہوں؟
      - ان کی صورتحال کے بارے میں میں کیا چیز یاد کر رہا ہوں گا؟
    in_more_detail: |
      جب کوئی ہمیں ٹریفک میں کاٹتا ہے، تو ہم سوچتے ہیں "کیا بدتمیز آدمی ہے"۔ جب ہم کسی کو کاٹتے ہیں، تو ہم سوچتے ہیں "مجھے ایسا کرنا پڑا—میں جلدی میں تھا۔" ہم اپنی ناکامیوں کی وضاحت حالات سے کرتے ہیں ("ٹریفک بہت خراب تھی") اور دوسروں کی ناکامیوں کی وضاحت ان کی فطرت سے کرتے ہیں ("وہ سست ہیں")۔ کامیابی کے لیے اس کے برعکس ہوتا ہے: ہم خود کو کریڈٹ دیتے ہیں، ہم دوسروں کی کامیابی کو قسمت سے منسوب کرتے ہیں۔

      یہ غلطی "بنیادی" ہے کیونکہ یہ وسیع اور مستقل ہے۔ یہ ہمدردی کو کمزور کرتی ہے، تنازعات کو ہوا دیتی ہے، اور کارکردگی کی تشخیص کو مسخ کرتی ہے۔
    why_this_is_important: |
      بنیادی استناد کی غلطی کو تسلیم کرنے سے تعلقات بہتر ہوتے ہیں، تنازعات کم ہوتے ہیں، اور منصفانہ فیصلے ہوتے ہیں۔ یہ کسی کے "ہونے" کے بارے میں نتیجہ اخذ کرنے سے پہلے سیاق و سباق پر غور کرنے کی ترغیب دیتا ہے۔
    when_to_use:
      - تعلقات_بنانا
      - تنازعہ_حل_کرنا
      - قیادت
      - فیصلہ_کرنا
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "وہ بس اسی قسم کے شخص ہیں" دوسروں کے رویے کی وضاحت کرتے وقت۔
      situational_explanation_for_self: |
        "میرا کوئی چارہ نہیں تھا" یا "حالات نے مجھے مجبور کیا" جب اپنے رویے کی وضاحت کر رہے ہوں۔
      character_vs_context: |
        کردار کا مفروضہ قائم کرنا جب صورتحال رویے کی وضاحت کر سکتی ہو۔
      asymmetric_standards: |
        خود پر لاگو کرنے والے معیارات سے زیادہ دوسروں پر سخت معیارات لاگو کرنا۔
    examples:
      traffic: |
        دوسرے ڈرائیور کی غلطی = "برا ڈرائیور"۔ ہماری غلطی = "ناگزیر صورتحال"۔
      workplace: |
        ساتھی کی میعاد ختم شدہ ڈیڈلائن = "غیر ذمہ دار"۔ ہماری میعاد ختم شدہ ڈیڈلائن =
        "بہت زیادہ کام اور کوئی بھی بہتر نہیں کر سکتا تھا۔"
      politics: |
        مخالفین کے خیالات = "وہ بیوقوف یا بدکار ہیں"۔ ہمارے خیالات =
        "حقائق کا عقلی جواب"۔
      performance: |
        دوسروں کی کامیابی = "قسمت"۔ ہماری کامیابی = "سخت محنت سے حاصل کی گئی"۔
    real_world_implications: |
      بنیادی استناد کی غلطی تنازعات کو ہوا دیتی ہے، ٹیم ورک کو کمزور کرتی ہے، اور بھرتی اور کارکردگی کی تشخیص کو مسخ کرتی ہے۔ اس کو درست کرنے سے تنظیمی ثقافت اور ذاتی تعلقات بہتر ہوتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی آپ کو مایوس کرے، تو اس نتیجے پر پہنچنے سے پہلے کہ وہ ناقابل اعتبار یا مشکل ہیں، پوچھیں "اس کی وضاحت کے لیے کون سے صورتحال کے عوامل ہو سکتے ہیں؟"
      collaborative_learning_initiative: |
        فیڈ بیک اور ریویو میں، "پہلے صورتحال" کی تشریحات کی حوصلہ افزائی کریں۔
        مینیجرز کو کردار سے منسوب کرنے سے پہلے سیاق و سباق پر غور کرنے کی تربیت دیں۔
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        ہر عمل کو "صورتحال کے مطابق" سمجھ کر مسترد کرنا جب کچھ رویے کردار کی عکاسی کرتے ہیں۔
      no_accountability: |
        لوگوں کو ان کے کیے گئے انتخاب کے لیے جوابدہ ٹھہرانے سے بچنے کے لیے غلطی کا استعمال کرنا۔
      self_deprecation: |
        خود کو ہمیشہ قصور وار ٹھہرانے اور کبھی دوسروں کی ذمہ داری کو تسلیم نہ کرنے کے لیے زیادہ سے زیادہ درست کرنا۔
      ignoring_patterns: |
        جب کوئی صورتحال سے قطع نظر بار بار برا سلوک کرتا ہے، تو فطرت متعلقہ ہو سکتی ہے۔
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: جواری کا مغالطہ
    quick_introduction: |
      جواری کا مغالطہ یہ غلط یقین ہے کہ ماضی کے آزاد واقعات مستقبل کے واقعات کو متاثر کرتے ہیں۔
      اچھی کارکردگی کے بعد، ہم سمجھتے ہیں کہ بری کارکردگی "باقی" ہے — حالانکہ ہر نتیجہ آزاد ہوتا ہے۔
      ہم بے ترتیب پن میں نمونے دیکھتے ہیں اور "اصلاح" یا "واپسی" کی توقع کرتے ہیں جب اس کی ضرورت نہیں ہوتی۔
    one_liner: ماضی کے آزاد واقعات مستقبل کو متاثر نہیں کرتے — سکے کو یادداشت نہیں ہوتی۔
    try_this:
      - جب آپ سوچیں "میں جیتنے والا ہوں"، پوچھیں: کیا یہ واقعات واقعی آزاد ہیں؟
      - اوسط کی طرف رجحان (حقیقی) کو جواری کے مغالطے (غلط) سے ممتاز کریں۔
      - اس بات پر توجہ دیں کہ آپ بے ترتیب پن میں نمونے کب دیکھ رہے ہیں۔
    ask_yourself:
      - کیا میں یہ فرض کر رہا ہوں کہ ماضی کے نتائج مستقبل کے نتائج کو متاثر کرتے ہیں جب وہ آزاد ہیں؟
      - کیا کوئی اعدادوشمار دان میری "تبدیلی کے منتظر" والی دلیل سے متفق ہوں گے؟
    in_more_detail: |
      ایک منصفانہ سکہ اچھالنے میں، ہر اچھال آزاد ہوتی ہے۔
      اچھال کے نتیجے میں ہیڈز کا امکان ہمیشہ 50% ہوتا ہے، ماضی کے نتائج سے قطع نظر۔
      لیکن ہمیں ایسا محسوس ہوتا ہے کہ ایک طویل مدت تک ایک ہی نتیجہ آنے سے دوسرا نتیجہ زیادہ ممکن ہو جاتا ہے۔
      ہم اعداد کے قانون کو (بہت سارے تجربات کے بعد، نتائج اوسط ہو جاتے ہیں) قلیل مدتی "اصلاح" کے ساتھ الجھاتے ہیں۔
      کیسینو کو یادداشت نہیں ہوتی۔

      یہ مغالطہ جوئے، سرمایہ کاری اور روزمرہ کے فیصلے کرنے کو متاثر کرتا ہے۔
      ہم فرض کرتے ہیں کہ "قسمت" برابر ہو جائے گی یا ہم جیتنے والے ہیں "باقی" ہیں۔
      بعض اوقات ہم صحیح ہوتے ہیں — لیکن غلط وجوہات کی بنا پر۔
    why_this_is_important: |
      جواری کے مغالطے کو تسلیم کرنا جوئے اور سرمایہ کاری میں مہنگی غلطیوں کو روکتا ہے۔
      یہ آپ کو قلیل مدتی رجحانات کا زیادہ تجزیہ کرنے اور غلط واپسی کی توقع کرنے سے بھی بچاتا ہے۔
      یہ حقیقی اوسط کی طرف رجحان کو مغالطے سے ممتاز کرتا ہے۔
    when_to_use:
      - فیصلے_کرنا
      - سرمایہ_کاری
      - خطرات_کا_اندازہ_لگانا
      - مسئلہ_حل_کرنا
    how_can_you_spot_it:
      due_for_a_change: |
        "ہمیں بہت ساری ہاریں ملی ہیں — ہم جیتنے والے ہیں"۔
      pattern_in_randomness: |
        بے ترتیب سلسلوں میں بامعنی نمونے دیکھنا۔
      hot_hand_fallacy: |
        یہ یقین کرنا کہ ایک سلسلہ جاری رہے گا (متعلقہ لیکن مخالف غلطی)۔
      independence_ignorance: |
        آزاد واقعات کو اس طرح برتنا جیسے وہ جڑے ہوئے ہوں۔
    examples:
      gambling: |
        رولیٹ پر کئی سرخ آنے کے بعد، سیاہ پر شرط لگانا کیونکہ "سرخ مسلسل نہیں آ سکتا"۔
      investing: |
        "بازار نیچے رہا ہے — اسے اوپر جانا ہی ہوگا"۔
      hiring: |
        "ہم نے کئی خراب امیدواروں کو رکھا ہے — اگلا ضرور اچھا ہوگا"۔
      sports: |
        "اس نے بہت سارے چھوڑے ہیں — اسے اگلا شاٹ لگانا ہے"۔
    real_world_implications: |
      جواری کا مغالطہ جوئے میں نقصانات اور خراب سرمایہ کاری کے فیصلوں کا سبب بنتا ہے۔
      یہ یہ بھی بتاتا ہے کہ ہم قلیل مدتی نمونوں کا زیادہ تجزیہ کیوں کرتے ہیں۔
      اسے حقیقی اوسط کی طرف رجحان سے ممتاز کرنا (جہاں رجوع کرنے کے لیے ایک حقیقی اوسط موجود ہے) اہم ہے۔
    professional_application:
      networking_and_relationship_building: |
        یہ فرض نہ کریں کہ ماضی کے تعلقات کے رجحانات مستقبل میں "درست" ہوں گے — ہر تعامل کسی حد تک آزاد ہوتا ہے۔
        لیکن جب کوئی حقیقی بنیادی وجہ ہو تو نمونوں سے ضرور سیکھیں۔
      collaborative_learning_initiative: |
        کارکردگی کا جائزہ لیتے وقت، بے ترتیب تغیر کو منظم تبدیلی سے ممتاز کریں۔
        قلیل مدتی رجحانات شور ہو سکتے ہیں؛ "سلسلے" پر زیادہ رد عمل نہ کریں یا غلط واپسی کی توقع نہ کریں۔
    how_can_this_be_misapplied:
      ignoring_regression: |
        بعض اوقات اوسط کی طرف رجحان حقیقی ہوتا ہے (مثلاً، ہنر کی کارکردگی)۔
        تمام واپسی کو جواری کے مغالطے کے طور پر رد نہ کریں۔
      false_independence: |
        یہ فرض کرنا کہ واقعات آزاد ہیں جب وہ نہیں ہیں (مثلاً، ایک ہی چیز کی بار بار پیمائش)۔
      overcorrection: |
        جب رجوع کرنے کے لیے کوئی حقیقی اوسط موجود ہو تو کبھی بھی واپسی کی توقع نہ کرنا۔
      dismissing_patterns: |
        کچھ نمونے حقیقی ہوتے ہیں — ہر سلسلہ بے ترتیب نہیں ہوتا۔
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: گروپ تھنک (Groupthink)
    quick_introduction: |
      گروپ تھنک یہ رجحان ہے کہ ہم آہنگ گروہ تنقیدی جانچ پر اتفاق اور ہم آہنگی کو ترجیح دیتے ہیں۔ اراکین اختلاف کو دباتے ہیں، خود سینسر کرتے ہیں، اور سمجھے گئے گروپ کے نظریہ کو قبول کرتے ہیں۔ اتحاد کی خواہش بہترین فیصلے کی خواہش پر غالب آجاتی ہے۔
    one_liner: سچائی پر ہم آہنگی — گروہ تنقیدی جانچ پر اتفاق کو ترجیح دیتے ہیں۔
    try_this:
      - ایک شیطان کے وکیل کو مقرر کریں؛ اختلاف کو متوقع اور محفوظ بنائیں۔
      - پوچھیں: ہم کیا نہیں کہہ رہے ہیں؟ اگر ہم اس گروپ میں نہ ہوتے تو ہم کیا کہتے؟
      - گروپ کے فیصلوں کو حتمی شکل دینے سے پہلے بیرونی نقطہ نظر طلب کریں۔
    ask_yourself:
      - کیا میں ہم آہنگی برقرار رکھنے کے لیے خود سینسر کر رہا ہوں؟
      - کیا ہمارا اتفاق حقیقی ہے یا متفق ہونے کے دباؤ کا نتیجہ ہے؟
    in_more_detail: |
      Irving Janis نے بیرون ملک پالیسی کی ناکامیوں (Bay of Pigs, Vietnam) کا مطالعہ کیا اور رجحانات کی نشاندہی کی: ناقابل تسخیر ہونے کا وہم، اجتماعی عقلیت، مطابقت کے لیے دباؤ، خود سینسر شپ، اتحاد کا وہم، اور مائنڈ گارڈز جو گروپ کو اختلاف رائے والی معلومات سے محفوظ رکھتے ہیں۔ اعلیٰ ہم آہنگی، تنہائی، اور تناؤ گروپ تھنک کو بڑھاتے ہیں۔

      گروپ تھنک ناقص فیصلوں کا باعث بنتا ہے کیونکہ متبادلات کو سنجیدگی سے نہیں لیا جاتا۔ اختلاف کو بے وفائی سمجھا جاتا ہے۔ گروپ اپنی درستگی کو زیادہ سمجھتا ہے اور خطرات کو کم سمجھتا ہے۔
    why_this_is_important: |
      گروپ تھنک کو تسلیم کرنے سے آپ کو بہتر فیصلے کرنے کے لیے حالات پیدا کرنے میں مدد ملتی ہے: اختلاف رائے کی حوصلہ افزائی کریں، بیرونی نقطہ نظر لائیں، اور جلد اتفاق سے بچیں۔ یہ گروپ کی تباہ کن ناکامیوں سے بچنے کے لیے ضروری ہے۔
    when_to_use:
      - قیادت (leadership)
      - فیصلہ سازی (decision-making)
      - مسئلہ حل کرنا (problem_solving)
      - تنازعہ کا حل (conflict_resolution)
    how_can_you_spot_it:
      pressure_for_consensus: |
        اختلاف کو حوصلہ شکنی یا سزا دی جاتی ہے؛ اتفاق کو انعام دیا جاتا ہے۔
      illusion_of_unanimity: |
        خاموشی کو اتفاق کے طور پر سمجھا جاتا ہے جب یہ خود سینسر شپ ہو سکتی ہے۔
      collective_rationalization: |
        گروہ انتباہات کو رد کرتا ہے اور اپنے نظریہ کو مضبوط کرتا ہے۔
      mindguards: |
        ممبران گروپ کو ایسی معلومات سے محفوظ رکھتے ہیں جو اتفاق کو چیلنج کرتی ہے۔
    examples:
      bay_of_pigs: |
        Kennedy کے مشیروں نے حملے کے منصوبے کے بارے میں شکوک و شبہات کو دبا دیا؛ نتیجہ تباہی تھی۔
      corporate_decisions: |
        ایک لیڈرشپ ٹیم سرخ جھنڈیوں کے باوجود انضمام کے ساتھ آگے بڑھتی ہے کیونکہ کوئی بھی منفی کہنے والا نہیں بننا چاہتا۔
      product_launches: |
        ایک ٹیم ناقص پروڈکٹ کو شپ کرتی ہے کیونکہ ہر کسی نے منصوبے میں سرمایہ کاری کی ہے اور کوئی خدشات نہیں اٹھاتا۔
      boards: |
        بورڈ کے ممبران ہم آہنگی برقرار رکھنے کے لیے انتظامیہ کی تجاویز پر مہر لگا دیتے ہیں۔
    real_world_implications: |
      گروپ تھنک پالیسی کی ناکامیوں، کارپوریٹ آفات، اور مواقع سے محرومی میں حصہ ڈالتا ہے۔ یہ خاص طور پر زیادہ داؤ، زیادہ تناؤ والی صورتحال میں خطرناک ہے۔ اس کو روکنے کے لیے جان بوجھ کر ساختی مداخلتوں کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        اختلاف کے لیے نفسیاتی حفاظت پیدا کریں۔ ان لوگوں کا شکریہ ادا کریں جو خدشات اٹھاتے ہیں۔ اختلاف کو نامناسب ہوئے بغیر اختلاف کرنے کا نمونہ بنائیں۔
      collaborative_learning_initiative: |
        شیطان کے وکیل، ریڈ ٹیمز، اور "پریمارٹمز" کا استعمال کریں۔ غالب نظریہ کے خلاف دلیل دینے کے لیے کسی شخص کی ضرورت ہوتی ہے۔ بیرونی نقطہ نظر لائیں۔ رہنما پابند ہونے سے بچنے کے لیے آخری بولے۔
    how_can_this_be_misapplied:
      false_dissent: |
        "نامزد اختلاف کار" بنانا جو حقیقی طور پر متفق نہیں ہیں — گروپ ان کو پہچان لیتا ہے۔
      excessive_conflict: |
        اختلاف کو تباہ کن تنازعہ اور مفلوج ہونے تک حوصلہ افزائی کرنا۔
      dismissing_consensus: |
        یہ فرض کرنا کہ تمام اتفاق گروپ تھنک ہے — کبھی کبھی گروپ صحیح ہوتا ہے۔
      individualism: |
        اس حد تک زیادہ تصحیح کرنا کہ کوئی اجتماعی فیصلہ ممکن نہ ہو۔
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Halo Effect
    quick_introduction: |
      ہیلو اثر ایک ایسا رجحان ہے جس میں کسی شخص کی ایک مثبت خوبی یا تاثر ہمارے مجموعی فیصلے کو متاثر کرتا ہے۔ اگر ہمیں کسی کی ظاہری شکل پسند آتی ہے، تو ہم یہ فرض کر سکتے ہیں کہ وہ قابل ہے۔ اگر ہم کسی ایک ہنر کی تعریف کرتے ہیں، تو ہم یہ فرض کر سکتے ہیں کہ وہ ہر کام میں اچھا ہے۔ ایک مثبت خصوصیت باقی چیزوں پر ایک "ہالو" ڈال دیتی ہے۔
    one_liner: ایک مثبت خوبی کسی شخص کے بارے میں ہمارے پورے فیصلے پر ایک ہالو ڈال دیتی ہے۔
    try_this:
      - خوبیوں کا آزادانہ انداز میں جائزہ لیں - ایک مضبوطی کو دوسری خوبیوں کا اشارہ نہ سمجھیں۔
      - اس بات پر توجہ دیں کہ کب کشش، کرشمہ، یا ایک کامیابی آپ کے نقطہ نظر کو رنگین کر رہی ہے۔
      - پوچھیں: کیا میں اس شخص کا اس ایک مثبت خوبی کے بغیر ویسا ہی فیصلہ کروں گا؟
    ask_yourself:
      - کیا میں ایک خوبی سے پورے شخص کے بارے میں عام بات کر رہا ہوں؟
      - کیا مجھے کمزوریاں نظر آئیں گی اگر میں ایک مضبوطی سے متاثر نہ ہوا ہوتا؟
    in_more_detail: |
      ایڈورڈ تھورنڈائک نے مشاہدہ کیا کہ فوجی افسران جو سپاہیوں کو ایک خوبی میں اونچا درجہ دیتے تھے، وہ انہیں دوسروں میں بھی اونچا درجہ دیتے تھے - یہاں تک کہ غیر متعلقہ خوبیوں میں بھی۔ ہم خاص سے عام کی طرف عام کرتے ہیں۔ کشش، کرشمہ، یا کسی ایک شعبے میں کامیابی ایک ہالو پیدا کرتی ہے جو پھیل جاتا ہے۔

      اس کے برعکس - ایک منفی خوبی جو ہر چیز کو رنگین کر دیتی ہے - کو کبھی کبھی "ہارن ایفیکٹ" کہا جاتا ہے۔ دونوں غیر ضروری عام کرنے کی شکلیں ہیں۔ ہیلو اثر بھرتی، کارکردگی کے جائزوں، اور روزمرہ کے تاثرات کو متاثر کرتا ہے۔
    why_this_is_important: |
      ہیلو اثر کو پہچاننا آپ کو زیادہ درست تشخیص کرنے اور عام باتوں سے بچنے میں مدد دیتا ہے۔ یہ منصفانہ بھرتی، کارکردگی کے انتظام، اور تعلقات کے اندازے کے لیے ضروری ہے۔ ایک مضبوطی تمام مضبوطیوں کا اشارہ نہیں دیتی۔
    when_to_use:
      - فیصلہ_سازی
      - قیادت
      - تعلقات_بنانا
      - بھرتی
    how_can_you_spot_it:
      trait_spillover: |
        ایک مثبت خوبی غیر متعلقہ خوبیوں کے بارے میں فیصلے کو متاثر کرتی ہے۔
      attractiveness_bias: |
        کشش رکھنے والے لوگوں کو اہلیت، بھروسہ مندی وغیرہ میں اونچا درجہ دیا جاتا ہے۔
      success_generalization: |
        ایک شعبے میں کامیابی دوسروں میں فرض شدہ اہلیت کی طرف لے جاتی ہے۔
      first_impression_dominance: |
        ابتدائی مثبت تاثر تمام بعد کے جائزوں کو رنگین کر دیتا ہے۔
    examples:
      hiring: |
        ایک ایسے امیدوار کو جو باتونی اور پسند کرنے والا ہے، تکنیکی طور پر مضبوط سمجھا جاتا ہے - یہاں تک کہ جب خوبیاں غیر متعلقہ ہوں۔
      performance_reviews: |
        ایک شاندار پروجیکٹ تمام جہتوں میں اونچے ریٹنگ کی طرف لے جاتا ہے۔
      politics: |
        ایک سیاستدان کا کرشمہ پالیسی پر فرض شدہ اہلیت کی طرف لے جاتا ہے۔
      branding: |
        ایک کمپنی کی ایک پروڈکٹ میں کامیابی تمام مصنوعات کے فرض شدہ معیار کی طرف لے جاتی ہے۔
    real_world_implications: |
      ہیلو اثر بھرتی، کارکردگی کے جائزوں، اور سرمایہ کاری کے فیصلوں کو مسخ کرتا ہے۔ یہ خوبصورت، باتونی، اور پہلے سے کامیاب لوگوں کے حق میں ہوتا ہے۔ اسے کم کرنے کے لیے منظم تشخیص اور جہتوں کی علیحدگی کی ضرورت ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں کا انفرادی جہتوں پر جائزہ لیں نہ کہ مجموعی تاثر پر۔ اس بات سے ہوشیار رہیں کہ جب ایک مثبت خوبی دوسروں کے بارے میں آپ کے فیصلے کو متاثر کر رہی ہو۔ تردیدی شواہد کی تلاش کریں۔
      collaborative_learning_initiative: |
        منظم انٹرویو اور جائزوں کا استعمال کریں جو جہتوں کا آزادانہ جائزہ لیتے ہیں۔ جائزوں کو جائزہ لینے والوں کے درمیان ہم آہنگ کریں۔ مجموعی "گٹ فیل" پر انحصار کم کریں۔
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        ہر مثبت تاثر ہیلو اثر نہیں ہوتا - کبھی کبھی لوگ واقعی تمام جہتوں میں مضبوط ہوتے ہیں۔
      false_objectivity: |
        یہ فرض کرنا کہ ہم ہیلو اثر کو مکمل طور پر ختم کر سکتے ہیں - یہ وسیع پیمانے پر ہے اور جزوی طور پر خودکار ہے۔
      overcorrection: |
        مخالف انتہا پر جانا اور یہ فرض کرنا کہ خوبصورت یا کرشماتی لوگ کم قابل ہیں۔
      stereotyping: |
        جائز مثبت خوبیوں کو رد کرنے کے لیے "ہیلو اثر" کا استعمال کرنا۔
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: ہینلون کا استرا
    quick_introduction: |
      ہینلون کے استرا کا کہنا ہے: "بدنیتی کو کبھی بھی اس کی وجہ سے منسوب نہ کریں جو جہالت کی وجہ سے بخوبی سمجھائی جا سکتی ہے۔" دوسرے الفاظ میں، جب نااہلی، غفلت، یا لاعلمی رویے کی وضاحت کر سکتی ہو تو بری نیت کا تصور نہ کریں۔
    one_liner: بدنیتی کا تصور اس وقت نہ کریں جب نااہلی یا غفلت اس کی وضاحت کر سکتی ہو۔
    try_this:
      - جب کوئی آپ کو مایوس کرے، تو پوچھیں: کیا یہ غلطی یا لاعلمی سے سمجھایا جا سکتا ہے؟
      - بری نیت کا تصور کرنے سے پہلے آسان ترین وضاحت کو ترجیح دیں۔
      - جب آپ "انہوں نے مجھے تکلیف پہنچانے کا ارادہ کیا" پر پہنچیں تو اس پر غور کریں۔
    ask_yourself:
      - کیا میں بدنیتی کو اس کی وجہ سے منسوب کر رہا ہوں جو جہالت کی وجہ سے سمجھائی جا سکتی ہے؟
      - کیا میں ان کے جوتوں میں اسی فائدے کا شک کرنا چاہوں گا؟
    in_more_detail: |
      یہ اصول لوگوں کو فائدہ کا شک دینے کی ترغیب دیتا ہے۔ جب کسی کے اعمال آپ کو نقصان پہنچاتے ہیں یا مایوس کرتے ہیں، تو عام طور پر یہ فرض کیا جاتا ہے کہ انہوں نے آپ کو تکلیف پہنچانے کا ارادہ کیا تھا۔ ہینلون کا استرا تجویز کرتا ہے کہ ایسے بہت سے اعمال لاپرواہی، معلومات کی کمی، یا خراب عمل درآمد سے پیدا ہوتے ہیں - بری نیت سے نہیں۔

      اس کا مطلب یہ نہیں ہے کہ بدنیتی کبھی موجود نہیں ہوتی۔ اس کا مطلب یہ ہے کہ جب کوئی آسان وضاحت درست ہو تو ہمیں بدترین تشریح پر نہیں پہنچنا چاہیے۔ استرا شک و شبہ کو کم کرتا ہے، تعلقات کو بہتر بناتا ہے، اور ہمیں مسائل پر زیادہ تعمیری طور پر رد عمل ظاہر کرنے میں مدد کرتا ہے۔
    why_this_is_important: |
      ہینلون کے استرا کو لاگو کرنے سے تنازعہ کم ہوتا ہے، تعلقات قائم رہتے ہیں، اور الزام لگانے کے بجائے مسائل کو حل کرنے پر توجہ مرکوز ہوتی ہے۔ یہ آپ کو اس تناؤ سے بھی بچاتا ہے کہ سب لوگ آپ کے خلاف ہیں۔
    when_to_use:
      - تنازعہ_حل
      - قیادت
      - تعلقات_بنانا
      - فیصلہ_سازی
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        آپ فوری طور پر منفی نتیجے کو جان بوجھ کر نقصان کے طور پر تشریح کرتے ہیں۔
      personalizing_mistakes: |
        جب کچھ غلط ہو جاتا ہے، تو آپ فرض کرتے ہیں کہ یہ آپ پر ذاتی طور پر کیا گیا تھا۔
      ignoring_alternative_explanations: |
        آپ نااہلی، غلط فہمی، یا غفلت کو امکانات کے طور پر نہیں سمجھتے۔
      escalation_before_inquiry: |
        آپ پوچھنے سے پہلے کہ کیا ہوا، غصے یا انتقام کے ساتھ رد عمل ظاہر کرتے ہیں۔
    examples:
      email_tone: |
        ایک مختصر ای میل کو جارحانہ سمجھنا جب کہ بھیجنے والا شاید جلد بازی میں ہو یا ٹون میں برا ہو۔
      missed_deadline: |
        کسی ساتھی کی تاخیر سے ترسیل کو توڑ پھوڑ کے طور پر تشریح کرنا جب کہ وہ زیادہ مصروف ہو گئے ہوں یا رکاوٹوں کا سامنا کیا ہو سکتا ہے۔
      policy_decisions: |
        کسی کمپنی کی پالیسی کو ناپسند کرنے کو ملازمین کو نقصان پہنچانے کے لیے ڈیزائن کیا گیا سمجھنا جب کہ یہ کسی دوسرے مسئلے کو حل کرنے کی ایک ناکام کوشش ہو سکتی ہے۔
      traffic: |
        کسی دوسرے ڈرائیور کا آپ کو جان بوجھ کر کاٹنا سمجھنا جب کہ وہ آپ کو دیکھ نہ سکا ہو۔
    real_world_implications: |
      ہینلون کا استرا کام کی جگہ کی ثقافت کو بہتر بناتا ہے، مقدمات کو کم کرتا ہے، اور تنازعہ کے حل کو زیادہ مؤثر بناتا ہے۔ زیادہ استعمال سے غفلت کو چھوٹ مل سکتی ہے؛ کم استعمال سے غیر ضروری تنازعہ پیدا ہوتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب کوئی آپ کو مایوس کرے، تو بری نیت کا تصور کرنے سے پہلے وضاحت طلب کریں۔ خیراتی تشریحات کو ترجیح دے کر تعلقات کو قائم رکھیں۔
      collaborative_learning_initiative: |
        ٹیموں میں، ایک ایسی ثقافت بنائیں جہاں غلطیوں کو ثابت ہونے تک غیر ارادی سمجھا جائے۔ الزام کے بجائے نظام اور عمل پر توجہ دیں۔
    how_can_this_be_misapplied:
      excusing_negligence: |
        بار بار ہونے والی نااہلی یا غفلت کو "بدنیتی نہیں" کہہ کر مسترد کرنا جب کہ اس کا احتساب ضروری ہو۔
      ignoring_genuine_malice: |
        استرا کو اتنی سختی سے لاگو کرنا کہ آپ حقیقی برے اداکاروں یا زہریلے رویے سے محروم رہ جائیں۔
      avoiding_difficult_conversations: |
        کارکردگی کے مسائل کو حل نہ کرنے کے بہانے کے طور پر ہینلون کے استرا کا استعمال کرنا۔
      gaslighting_victims: |
        کسی ایسے شخص سے کہنا جسے حقیقی طور پر غلط کیا گیا تھا کہ وہ "بدنیتی کا تصور کر رہا ہے" جب کہ بدنیتی موجود تھی۔
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: ہاوتھورن اثر
    quick_introduction: |
      ہاوتھورن اثر یہ رجحان ہے کہ جب لوگوں کو معلوم ہوتا ہے کہ ان کا مشاہدہ کیا جا رہا ہے یا ان کا مطالعہ کیا جا رہا ہے تو وہ اپنے رویے کو تبدیل کر لیتے ہیں۔ مشاہدے کا عمل خود تبدیلی پیدا کر سکتا ہے — ضروری نہیں کہ وہ مداخلت جو آزمائی جا رہی ہے۔ لوگ ان توجہ کا جواب دیتے ہیں جو انہیں ملتی ہے۔
    one_liner: مشاہدہ کیے جانے سے رویہ تبدیل ہو جاتا ہے — خود توجہ سے اثر پیدا ہو سکتا ہے۔
    try_this:
      - جب کسی مداخلت کا جائزہ لے رہے ہوں، تو غور کریں کہ آیا مشاہدہ نتائج کو بڑھا رہا ہے۔
      - تسلیم کریں کہ توجہ اور قدر محسوس کرنے سے کارکردگی بہتر ہو سکتی ہے۔
      - جب مشاہدہ تبدیل ہو جائے تو نتائج کو کسی مخصوص مداخلت سے منسوب کرنے میں محتاط رہیں۔
    ask_yourself:
      - کیا یہ بہتری مداخلت سے ہے یا مشاہدہ کیے جانے سے؟
      - اگر ہم توجہ دینا بند کر دیں تو کیا نتائج برقرار رہیں گے؟
    in_more_detail: |
      ہاوتھورن ورکس پلانٹ میں، محققین نے پایا کہ جب انہوں نے روشنی کو تبدیل کیا تو پیداواری صلاحیت میں اضافہ ہوا — اور جب انہوں نے اسے واپس تبدیل کیا تب بھی۔ ایسا لگتا تھا کہ بہتری خود توجہ اور مشاہدے سے آئی ہے، نہ کہ مخصوص مداخلت سے۔ بعد میں دوبارہ تجزیہ سے پتہ چلتا ہے کہ اثر کو زیادہ بڑھا چڑھا کر پیش کیا گیا ہو سکتا ہے، لیکن یہ تصور مفید ہے: مطالعہ کیے جانے سے رویہ بدل جاتا ہے۔

      ہاوتھورن اثر تحقیق اور تشخیص کو پیچیدہ بناتا ہے۔ یہ مداخلتوں کے ظاہر اثر کو بڑھا سکتا ہے۔ یہ یہ بھی تجویز کرتا ہے کہ توجہ اور قدر محسوس کرنے سے کارکردگی بہتر ہو سکتی ہے — مینجمنٹ کے لیے ایک سبق۔
    why_this_is_important: |
      ہاوتھورن اثر کو سمجھنا آپ کو تحقیقی نتائج کی تشریح کرنے، بہتر تجربات ڈیزائن کرنے اور یہ تسلیم کرنے میں مدد کرتا ہے کہ خود توجہ سے تبدیلی آ سکتی ہے۔ مینجمنٹ میں، یہ تجویز کرتا ہے کہ لوگوں پر توجہ دینا مخصوص مداخلت کی طرح اہم ہو سکتا ہے۔
    when_to_use:
      - قیادت (leadership)
      - فیصلہ سازی (decision-making)
      - سیکھنا (learning)
      - مسئلہ حل کرنا (problem_solving)
    how_can_you_spot_it:
      observation_induced_change: |
        جب لوگ جانتے ہیں کہ انہیں دیکھا جا رہا ہے یا ان کا مطالعہ کیا جا رہا ہے تو رویے میں تبدیلی آتی ہے۔
      attention_effect: |
        توجہ دینے کے عمل سے بہتری پیدا ہوتی ہے، نہ کہ صرف مخصوص تبدیلی سے۔
      placebo_analog: |
        پلیسبو کی طرح، مطالعہ کیے جانے کے "علاج" کے اثرات ہو سکتے ہیں۔
      short_term_improvement: |
        جب مشاہدہ ختم ہو جاتا ہے تو بہتری ختم ہو سکتی ہے۔
    examples:
      workplace_studies: |
        کسی مطالعہ کے دوران پیداواری صلاحیت میں اضافہ — کیا یہ نیا عمل ہے یا یہ حقیقت کہ کوئی دیکھ رہا ہے؟
      medical_trials: |
        پلیسبو گروپوں میں بہتری — جزوی طور پر اس لیے کہ انہیں توجہ مل رہی ہے۔
      education: |
        طلباء بہتر کارکردگی کا مظاہرہ کرتے ہیں جب محقق موجود ہوتے ہیں — "مبصر اثر"۔
      management: |
        جب مینجمنٹ توجہ دیتی ہے تو ٹیموں میں بہتری آتی ہے — کیا یہ نیا اقدام ہے یا خود توجہ؟
    real_world_implications: |
      ہاوتھورن اثر تحقیق کی صداقت اور پروگرام کی تشخیص کو متاثر کرتا ہے۔ یہ مداخلت کے اثرات کو زیادہ سمجھنے کا سبب بن سکتا ہے۔ اس کا ایک مثبت سبق بھی ہے: توجہ اور مطالعہ کیے جانے کا احساس بہتری کے لیے حوصلہ افزائی کر سکتا ہے — لہذا دیکھ بھال اور بصارت اہم ہے۔
    professional_application:
      networking_and_relationship_building: |
        لوگوں پر توجہ دینے سے ان کی کارکردگی بہتر ہو سکتی ہے — ہاوتھورن اثر تجویز کرتا ہے کہ مشاہدہ اور قدر محسوس کرنا اہم ہے۔ اس کا مثبت استعمال کریں: باقاعدہ چیک ان، بصارت، اور پہچان۔
      collaborative_learning_initiative: |
        جب مداخلتوں کا جائزہ لے رہے ہوں، تو کنٹرول گروپ استعمال کریں اور غور کریں کہ آیا بہتری مداخلت کی وجہ سے ہے یا اس توجہ کی وجہ سے جو یہ لاتی ہے۔ ہاوتھورن اثر ظاہر کامیابی کو بڑھا سکتا ہے۔
    how_can_this_be_misapplied:
      surveillance_justification: |
        "ہاوتھورن اثر" کو مسلسل نگرانی کے جواز کے طور پر استعمال کرنا — مشاہدہ اعتماد اور اندرونی محرک کو بھی کم کر سکتا ہے۔
      dismissing_improvements: |
        یہ فرض کرنا کہ مطالعے کے دوران تمام بہتری ہاوتھورن اثر کی وجہ سے ہے — کبھی کبھی مداخلتیں واقعی کام کرتی ہیں۔
      overgeneralization: |
        اصل ہاوتھورن مطالعات پر سوال اٹھایا گیا ہے۔ اثر پہلے کے خیال سے چھوٹا یا مختلف ہو سکتا ہے۔
      manipulation: |
        روئیے کو ہیرا پھیری کرنے کے لیے جھوٹی "مشاہدہ" پیدا کرنا۔
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: hindsight_bias
    quick_introduction: |
      Hindsight bias (or the "I knew it all along" effect) is the tendency to believe,
      after an event has occurred, that we would have predicted or expected it. We
      reconstruct the past to make outcomes seem more inevitable than they were.
    one_liner: After the fact, we think we knew it all along.
    try_this:
      - Before judging past decisions, ask: What did they know at the time?
      - Record your predictions before outcomes—compare later.
      - Notice when you're making the past seem more inevitable than it was.
    ask_yourself:
      - Am I judging with information that wasn't available then?
      - Did I actually predict this, or does it just feel obvious now?
    in_more_detail: |
      Once we know the outcome, it feels obvious. We forget the uncertainty we felt
      beforehand. This bias distorts learning—we think we "knew" something when we
      didn't, so we don't update our models. It also leads to unfair blame: "They
      should have seen it coming" when the future was genuinely uncertain.

      Hindsight bias affects post-mortems, legal judgments, and historical analysis.
      We judge past decisions with information that wasn't available at the time.
    why_this_is_important: |
      Recognizing hindsight bias improves learning from outcomes, fairer evaluation
      of decisions, and more accurate risk assessment. It prevents false confidence
      in our predictive abilities.
    when_to_use:
      - decision_making
      - learning
      - risk_assessment
      - leadership
    how_can_you_spot_it:
      inevitability_feeling: |
        After an event, it feels like it "had to" happen.
      reconstructed_certainty: |
        We remember being more certain before the event than we actually were.
      blame_for_failure: |
        "They should have known" when the outcome was genuinely uncertain.
      undervaluing_luck: |
        Attributing outcomes to skill or foresight when luck played a role.
    examples:
      investing: |
        "I knew the market would crash" after it crashes—when you didn't act on that
        "knowledge" beforehand.
      project_failures: |
        "We should have seen the risks" in a post-mortem when the risks were genuinely
        ambiguous.
      elections: |
        After a surprise result, pundits explain why it was "obvious" in hindsight.
      medical: |
        "The signs were there" when diagnosing a rare condition after the fact.
    real_world_implications: |
      Hindsight bias distorts legal liability, performance evaluation, and learning.
      It makes us overconfident in our judgment and unfair to those who made
      reasonable decisions with limited information.
    professional_application:
      networking_and_relationship_building: |
        When evaluating others' past decisions, consciously separate what was known
        then from what you know now. Avoid "I told you so" when you didn't actually
        predict the outcome.
      collaborative_learning_initiative: |
        In post-mortems, use "pre-mortem" or "decision journal" techniques to
        capture uncertainty at the time of the decision. Compare actual uncertainty
        to hindsight reconstruction.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Dismissing every failure as "unpredictable" when some were foreseeable.
      no_accountability: |
        Using hindsight bias to avoid holding people accountable for negligence.
      false_uncertainty: |
        Overcorrecting to believe we can never predict anything.
      undermining_learning: |
        Refusing to extract lessons because "hindsight is 20/20"—we can still learn
        from outcomes.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: ہائپربولک ڈسکاؤنٹنگ
    quick_introduction: |
      ہائپربولک ڈسکاؤنٹنگ وہ رجحان ہے جس میں ہم بڑے، بعد میں ملنے والے انعامات کے مقابلے میں چھوٹے، جلد ملنے والے انعامات کو ترجیح دیتے ہیں — اور مستقبل کو عقلی ماڈلز کی پیشین گوئی سے زیادہ تیزی سے رد کرتے ہیں۔ ہم غیر مستقل طریقوں سے حال کو زیادہ اہمیت دیتے ہیں اور مستقبل کو کم۔
    one_liner: ہم بڑے بعد والے پر چھوٹے جلد والے کو ترجیح دیتے ہیں — اور مستقبل کو غیر مستقل طور پر رد کرتے ہیں۔
    try_this:
      - Pre-commit: جب آپ پرسکون حالت میں ہوں تو اپنے مستقبل کے لیے فیصلے کریں۔
      - 'Reframe: "کیا میں یہ 10 منٹ میں چاہوں گا؟ 10 مہینے میں؟" تاکہ عدم مطابقت کو ظاہر کیا جا سکے۔'
      - اپنے مستقبل کے خود کو بہتر فیصلوں سے باندھنے کے لیے عہد کے آلات استعمال کریں۔
    ask_yourself:
      - کیا میں اپنے مستقبل کے خود کی قیمت پر حال کو زیادہ اہمیت دے رہا ہوں؟
      - کیا میں یہ فیصلہ کرتا اگر انعام ایک دن؟ ایک سال؟ کے لیے ملتوی کر دیا جاتا؟
    in_more_detail: |
      ہم ایک سال میں $100 کے مقابلے میں آج $50 کو ترجیح دے سکتے ہیں، لیکن دو سال میں $100 کو ایک سال میں $50 کے مقابلے میں ترجیح دے سکتے ہیں — حالانکہ یہ غیر مستقل ہے۔ ہماری ڈسکاؤنٹ ریٹ مستقل نہیں ہے۔ یہ ہائپربولک ہے۔ قریبی مستقبل کو بہت زیادہ رد کیا جاتا ہے۔ دور کے مستقبل کو کم تیزی سے رد کیا جاتا ہے۔ یہ ٹال مٹول، لت، اور کم بچت کی وضاحت کرتا ہے۔

      موجودہ تعصب ایک متعلقہ تصور ہے: ہم موجودہ لمحے کو غیر متناسب وزن دیتے ہیں۔ ہائپربولک ڈسکاؤنٹنگ اس بات کی وضاحت کرتا ہے کہ ہم ایسے عہد کیوں کرتے ہیں جنہیں ہم پورا نہیں کرتے اور طویل مدتی منصوبہ بندی مشکل کیوں ہے۔
    why_this_is_important: |
      ہائپربولک ڈسکاؤنٹنگ کو سمجھنا آپ کو بہتر ترغیبات ڈیزائن کرنے، اپنے مستقبل کے خود کو باندھنے، اور قلیل مدتی پھندوں سے بچنے میں مدد کرتا ہے۔ یہ اس بات کی وضاحت کرتا ہے کہ ہم ٹال مٹول کیوں کرتے ہیں اور طویل مدتی اہداف کے ساتھ جدوجہد کیوں کرتے ہیں۔
    when_to_use:
      - فیصلہ_سازی
      - کیریئر_ترقی
      - سرمایہ_کاری
      - قیادت
    how_can_you_spot_it:
      present_preference: |
        فوری اطمینان کو تاخیر سے، بڑے انعامات پر ترجیح دینا۔
      inconsistent_time_preferences: |
        ترجیحات جو وقت گزرنے کے ساتھ الٹ جاتی ہیں (مثال کے طور پر، ہم کل ڈائٹ کرنا چاہتے ہیں لیکن آج کھاتے ہیں)۔
      commitment_failures: |
        ایسے منصوبے بنانا جن پر عمل نہیں کیا جاتا جب مستقبل حال بن جاتا ہے۔
      procrastination: |
        فوری آرام کی خاطر اہم کاموں میں تاخیر کرنا۔
    examples:
      savings: |
        ریٹائرمنٹ کے لیے بچت کرنے کے بجائے ابھی خرچ کرنے کا انتخاب کرنا — مستقبل تجریدی محسوس ہوتا ہے۔
      health: |
        آج آرام کے لیے ورزش چھوڑ دینا، یہ جانتے ہوئے کہ ہمیں پچھتاوا ہوگا — کل کے پچھتاوے کو رد کر دیا جاتا ہے۔
      addiction: |
        طویل مدتی صحت پر فوری نشہ کو ترجیح دینا۔
      deadlines: |
        ڈیڈ لائن کے قریب آنے تک کچھ نہ کرنا — پھر "حال" میں ڈیڈ لائن شامل ہوتی ہے اور ہم عمل کرتے ہیں۔
    real_world_implications: |
      ہائپربولک ڈسکاؤنٹنگ بچت، صحت، تعلیم، اور لت کو متاثر کرتا ہے۔ یہ خود پر قابو پانے کی بہت سی ناکامیوں کی وضاحت کرتا ہے۔ عہد کے آلات (مثال کے طور پر، خودکار بچت، جوابدہی) مستقبل کے فیصلوں کو محدود کرکے مدد کر سکتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        مستقبل کے عہد مانگتے وقت، ایسی جوابدہی پیدا کریں جو مستقبل کو "حال" بنائے (مثال کے طور پر، چیک اِن، ڈیڈ لائن)۔ ڈھانچے کے بغیر لوگوں کے عمل درآمد کرنے کا فرض نہ کریں۔
      collaborative_learning_initiative: |
        عہد کے آلات استعمال کریں: عوامی عہد، ڈیڈ لائن کا پیشگی عہد، اور ایسے ڈھانچے جو طویل مدتی اہداف کو زیادہ فوری محسوس کرائیں۔ طویل منصوبوں کو چھوٹی سنگ میلوں میں تقسیم کریں۔
    how_can_this_be_misapplied:
      excessive_control: |
        " مدد" کے نام پر لوگوں کے فیصلوں پر زیادہ سختی کرنا۔
      paternalism: |
        یہ فرض کرنا کہ ہم دوسروں کے طویل مدتی مفادات کے لیے کیا بہتر ہے۔
      ignoring_present_needs: |
        تجریدی مستقبل کے فوائد کی خاطر جائز حال کی ضروریات کو نظر انداز کرنا۔
      one_size_fits_all: |
        لوگ ڈسکاؤنٹ کی شرحوں میں مختلف ہوتے ہیں۔ سب کو ایک جیسے عہد کے آلات کی ضرورت نہیں ہوتی۔
    related_content:
