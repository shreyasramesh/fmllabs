      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: بچت کا تعصب
    quick_introduction: |
      بچت کا تعصب ایک منطقی غلطی ہے جس میں کسی عمل میں "بچ جانے" والے لوگوں یا چیزوں پر توجہ مرکوز کی جاتی ہے جبکہ جو لوگ یا چیزیں ناکام ہو گئیں انہیں نظر انداز کر دیا جاتا ہے۔ ہم فاتحین کو دیکھتے ہیں اور ہارنے والوں کو بھول جاتے ہیں، جس سے کامیابی اور ناکامی کے بارے میں بہت زیادہ پرامید نتائج نکلتے ہیں۔
    one_liner: ہم فاتحین کو دیکھتے ہیں اور ہارنے والوں کو بھول جاتے ہیں—جس سے بہت زیادہ پرامید نتائج نکلتے ہیں۔
    try_this:
      - پوچھیں: کچھ اسی طرح کا کام کرنے میں کون ناکام ہوا؟ ہم ان سے کیا سیکھ سکتے ہیں؟
      - غیر مرئی نمونے کی تلاش کریں—وہ لوگ جنہوں نے بچت نہیں کی (یعنی ناکام ہو گئے)۔
      - اس بات پر توجہ دیں جب آپ صرف کامیابی کی کہانیاں پڑھ رہے ہوں۔
    ask_yourself:
      - کیا میں صرف بچ جانے والوں سے سیکھ رہا ہوں؟
      - اگر میں ناکامیوں کو شامل کروں تو مکمل تصویر کیسی دکھے گی؟
    in_more_detail: |
      دوسری جنگ عظیم کے دوران، شماریات دان ابراہم والڈ نے بمباروں پر بکتر بندی کے مقامات کو درست کیا، ان طیاروں کا تجزیہ کرتے ہوئے جنہیں بچ جانے والے طیارے کہاں مارے گئے تھے—اور وہاں بکتر بندی کی سفارش کرتے ہوئے جہاں *بچ نہ پانے والے* طیارے مارے گئے تھے، کیونکہ وہ طیارے کبھی واپس نہیں آئے۔ ہم فطری طور پر مرئی نمونے (بچ جانے والے) پر توجہ دیتے ہیں اور غیر مرئی (جو ناکام ہو گئے) کو نظر انداز کرتے ہیں۔

      بچت کا تعصب کاروبار، سرمایہ کاری، کیریئر اور تاریخ کے بارے میں ہمارے نقطہ نظر کو مسخ کرتا ہے۔ ہم کامیاب کمپنیوں کا مطالعہ کرتے ہیں اور ان ہزاروں کو نظر انداز کرتے ہیں جو اسی طرح کے کام کرنے میں ناکام ہو گئیں۔ ہم خوش قسمتوں کی سنتے ہیں اور بدقسمتوں کو بھول جاتے ہیں۔
    why_this_is_important: |
      بچت کے تعصب کو درست کرنے سے زیادہ حقیقت پسندانہ توقعات اور بہتر فیصلے ہوتے ہیں۔ یہ آپ کو ناکامیوں سے سیکھنے میں مدد کرتا ہے، صرف کامیابیوں سے نہیں، اور ایسی حکمت عملیوں کو نقل کرنے سے بچاتا ہے جو صرف چند خوش قسمتوں کے لیے کام کر گئیں۔
    when_to_use:
      - فیصلہ_سازی
      - سرمایہ_کاری
      - کیریئر_کی_حرکات
      - سیکھنا
    how_can_you_spot_it:
      visible_success_stories: |
        ہم کامیاب لوگوں کے بارے میں ان لوگوں کے مقابلے میں کہیں زیادہ سنتے ہیں جنہوں نے کوشش کی اور ناکام ہوئے۔
      missing_failures: |
        جس نمونے کا ہم مشاہدہ کرتے ہیں اس میں وہ لوگ شامل نہیں ہیں جو "کامیاب نہیں ہو سکے" اور اس طرح اپنی کہانیاں نہیں سنا سکتے۔
      copying_survivors: |
        یہ فرض کرنا کہ بچ جانے والوں نے جو کیا اس کی وجہ سے ان کی کامیابی ہوئی جب یہ قسمت یا بچت ہو سکتی تھی۔
      overly_optimistic_models: |
        کامیابی کی شرح کا تخمینہ جو کوششوں کے denominator (حصہ جس سے تقسیم کیا جائے) کو نظر انداز کرتا ہے۔
    examples:
      entrepreneurship: |
        "Zuckerberg کی طرح کالج چھوڑ دو" ان بہت سے کالج چھوڑنے والوں کو نظر انداز کرتا ہے جنہوں نے اربوں ڈالر کی کمپنیاں قائم نہیں کیں۔
      investing: |
        صرف بچ جانے والے فنڈز کا مطالعہ کرنے سے وہ فنڈز نظر انداز ہو جاتے ہیں جو خراب کارکردگی کے بعد بند ہو گئے، جس سے تاریخی منافع بڑھ جاتا ہے۔
      career_advice: |
        کامیاب لوگ کامیابی کو سخت محنت سے منسوب کرتے ہیں؛ ہم ان لوگوں کی نہیں سنتے جنہوں نے سخت محنت کی اور ناکام ہوئے۔
      historical_analysis: |
        "عظیم" کمپنیوں کا مطالعہ جو بچ گئیں، ان میں سے بہت سی ناکام ہو گئیں جن کی حکمت عملی ملتی جلتی تھی۔
    real_world_implications: |
      بچت کا تعصب سمجھی جانے والی کامیابی کی شرح کو بڑھاتا ہے، رول ماڈلز کو مسخ کرتا ہے، اور خراب تقلید کی طرف لے جاتا ہے۔ اس کو درست کرنے کے لیے ناکامی کے معاملات کی تلاش اور بنیادی شرحوں (base rates) کو سمجھنا ضروری ہے۔
    professional_application:
      networking_and_relationship_building: |
        جب مشورہ طلب کریں، تو ان لوگوں کی تلاش کریں جنہوں نے کوشش کی اور ناکام ہوئے—ان کے نقطہ نظر اکثر بچ جانے والوں کے مقابلے میں زیادہ معلوماتی ہوتے ہیں۔
      collaborative_learning_initiative: |
        ناکام پروجیکٹس اور بند ہونے والے اقدامات کا مطالعہ کریں، صرف کامیاب نہ ہوں۔ "ناکامی کے بعد کے تجزیے" (failure post-mortems) کریں تاکہ جو کام نہیں آیا اس سے سیکھا جا سکے۔
    how_can_this_be_misapplied:
      excessive_pessimism: |
        زیادہ سے زیادہ مبالغہ آرائی سے یہ فرض کرنا کہ کامیابی ہمیشہ قسمت ہے اور کوشش کی کوئی اہمیت نہیں۔
      dismissing_success: |
        "بچت کے تعصب" کی وجہ سے کامیاب لوگوں سے سیکھنے سے انکار کرنا۔
      analysis_paralysis: |
        ناکام کیسز پر اتنا زیادہ توجہ مرکوز کرنا کہ آپ کبھی کوئی کارروائی نہیں کرتے۔
      false_equivalence: |
        بچ جانے والے اور نہ بچ جانے والے کی حکمت عملیوں کو برابر معلوماتی سمجھنا جب سیاق و سباق مختلف ہو۔
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: زیگارنک اثر
    quick_introduction: |
      زیگارنک اثر نامکمل یا منقطع کاموں کو مکمل کاموں کے مقابلے میں بہتر یاد رکھنے کا رجحان ہے۔ نامکمل کام ذہنی تناؤ پیدا کرتے ہیں جو انہیں ہمارے ذہنوں میں متحرک رکھتا ہے۔ ہمارا دماغ ان چیزوں کو قائم رکھتا ہے جو نامکمل ہیں۔
    one_liner: نامکمل کام ہمارے ذہنوں میں جم جاتے ہیں—ہمارا دماغ ان چیزوں کو قائم رکھتا ہے جو نامکمل ہیں۔
    try_this:
      - کاموں کو اپنی ذہنی بوجھ سے "خارج" کرنے کے لیے تکمیل کا استعمال کریں — انہیں مکمل کریں یا باضابطہ طور پر ترک کر دیں۔
      - نتیجہ خیز کھلے دائرے بنانے کے لیے کام کو قابل انتظام حصوں میں تقسیم کریں۔
      - نوٹس لیں جب آپ نامکمل کاروبار پر غور کر رہے ہوں — دائرہ بند کریں یا اسے جانے دینے کا فیصلہ کریں۔
    ask_yourself:
      - کون سے نامکمل کام میرے ذہن میں تناؤ پیدا کر رہے ہیں؟
      - کیا یہ کھلا دائرہ رکھنے کے قابل ہے، یا میں اسے بند کر سکتا ہوں؟
    in_more_detail: |
      بلوما زیگارنک نے مشاہدہ کیا کہ ویٹر ادا شدہ آرڈرز کے مقابلے میں غیر ادا شدہ آرڈرز کو بہتر یاد رکھتے تھے — جب کام مکمل ہو جاتا، تو اسے یادداشت سے "خارج" کر دیا جاتا تھا۔ نامکمل کام ایک کھلا دائرہ بناتے ہیں جس کے لیے بندش کا مطالبہ ہوتا ہے۔ یہ نتیجہ خیز توجہ (ہم ختم کرنا چاہتے ہیں) اور اضطراب (ہم ان کاموں کے بارے میں سوچنا بند نہیں کر سکتے جو نہیں ہوئے) دونوں کو چلاتی ہے۔

      یہ اثر مارکیٹنگ (کلف ہینگرز، نامکمل کہانیاں) اور پیداواری صلاحیت (متعدد "کھلے دائرے" بنانے کے لیے کام کو حصوں میں تقسیم کرنا) میں استعمال ہوتا ہے۔ یہ واضح کرتا ہے کہ ہم نامکمل کاروبار پر کیوں غور کرتے ہیں اور ٹو-ڈو لسٹ کیوں مغلوب کن محسوس ہو سکتی ہیں۔
    why_this_is_important: |
      زیگارنک اثر کو سمجھنے سے آپ کو ذہنی بوجھ کا انتظام کرنے، دلکش تجربات ڈیزائن کرنے اور تعطل کو حکمت عملی کے ساتھ استعمال کرنے میں مدد ملتی ہے۔ یہ واضح کرتا ہے کہ ہم نامکمل کام کے بارے میں سوچنا کیوں بند نہیں کر سکتے — اور کیوں اسے استعمال کیا جا سکتا ہے یا نقصان دہ ہو سکتا ہے۔
    when_to_use:
      - مسئلہ_حل
      - قیادت
      - سیکھنا
      - فیصلہ_سازی
    how_can_you_spot_it:
      rumination_on_incomplete: |
        نامکمل کام مکمل کاموں کے مقابلے میں خیالات میں زیادہ گھس جاتے ہیں۔
      better_recall_of_unfinished: |
        ہم منقطع کاموں کو مکمل کاموں کے مقابلے میں بہتر یاد رکھتے ہیں۔
      tension_for_closure: |
        شروع کی گئی چیز کو مکمل کرنے کے لیے تکلیف یا محرک۔
      serial_dramas: |
        کلف ہینگرز اور "جاری رہے گا" اثر کا استحصال کرتے ہیں۔
    examples:
      productivity: |
        کسی کام کا آغاز ذہنی تناؤ پیدا کرتا ہے جو تکمیل کی طرف لے جاتا ہے — یا اگر بہت زیادہ کھلے دائرے ہوں تو اضطراب۔
      marketing: |
        "حصہ 1 میں سے 3" یا "جاری رہے گا" سامعین کو متوجہ رکھتا ہے اور انہیں واپس آنے پر مجبور کرتا ہے۔
      meetings: |
        واضح اگلے اقدامات کے بغیر میٹنگ ختم کرنے سے شرکاء غیر حل شدہ تناؤ کے ساتھ رہ جاتے ہیں۔
      learning: |
        غیر جواب شدہ سوالات یا نامکمل وضاحتیں یادداشت میں جم جاتی ہیں اور مزید تحقیق کی طرف لے جاتی ہیں۔
    real_world_implications: |
      زیگارنک اثر پیداواری صلاحیت، مشغولیت اور ذہنی بوجھ کو متاثر کرتا ہے۔ اسے توجہ کے لیے استعمال کیا جا سکتا ہے یا مغلوبیت پیدا کر سکتا ہے۔ یہ کلف ہینگرز کی اپیل اور بہت زیادہ کھلے کاموں کے بوجھ کو واضح کرتا ہے۔
    professional_application:
      networking_and_relationship_building: |
        بات چیت کو واضح اگلے اقدامات کے ساتھ ختم کریں — یا جان بوجھ کر کھلے دائرے بنائیں اگر آپ چاہتے ہیں کہ دوسرا شخص پیروی کرے۔ غیر حل شدہ دھاگے مشغولیت پیدا کرتے ہیں۔
      collaborative_learning_initiative: |
        تربیت میں زیگارنک اثر کا استعمال کریں: سیکھنے والوں کو متوجہ رکھنے کے لیے وقفے سے پہلے مسائل یا سوالات پیش کریں۔ لیکن بہت زیادہ کھلے دائرے نہ بنائیں کہ لوگ مغلوب محسوس کریں۔
    how_can_this_be_misapplied:
      overwhelm: |
        بہت زیادہ کھلے دائرے بنانا — بہت زیادہ نامکمل کام — اضطراب اور فالج کا باعث بنتا ہے۔
      manipulation: |
        انحصار یا مشغولیت پیدا کرنے کے لیے جان بوجھ کر چیزوں کو غیر حل شدہ چھوڑنا۔
      false_urgency: |
        جب کوئی ہنگامی صورت حال موجود نہ ہو تو مصنوعی ہنگامی صورت حال پیدا کرنے کے لیے اثر کا استعمال کرنا۔
      incomplete_work: |
        "تناؤ" پیدا کرنے کے لیے بہت سی چیزیں شروع کرنا بغیر انہیں مکمل کیے — جس سے کوشش بکھر جاتی ہے۔
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: زیرو سم سوچ
    quick_introduction: |
      زیرو سم سوچ یہ یقین ہے کہ ایک شخص کا فائدہ دوسرے کا نقصان ہونا چاہیے —
      کہ وسائل مقرر ہیں اور آپ کے لیے کوئی بھی فائدہ میرے لیے نقصان کا باعث ہے۔
      حقیقت میں، بہت سی صورتیں مثبت سم ہوتی ہیں: دونوں فریق فائدہ اٹھا سکتے ہیں۔
    one_liner: آپ کا فائدہ میرا نقصان ہونا ضروری نہیں — بہت سی صورتیں مثبت سم ہوتی ہیں۔
    try_this:
      - پوچھیں: کیا ہم پائی کو بڑھا سکتے ہیں؟ کیا یہ واقعی زیرو سم ہے؟
      - مقابلہ فرض کرنے سے پہلے تعاون کی تلاش کریں۔
      - جب آپ کسی صورتحال کو فکسڈ پائی سمجھ رہے ہوں تو اسے نوٹ کریں جب کہ وہ نہ ہو۔
    ask_yourself:
      - کیا میں فکسڈ پائی فرض کر رہا ہوں جب ہم اسے بڑھا سکتے ہیں؟
      - کیا تعاون مقابلے سے زیادہ قدر پیدا کرے گا؟
    in_more_detail: |
      زیرو سم گیم میں، کل مقرر ہوتا ہے — آپ کا فائدہ میرا نقصان ہے۔ مثبت سم
      صورتحال میں، تعاون قدر پیدا کرتا ہے۔ تجارت، جدت، اور تعلقات
      کی تعمیر اکثر مثبت سم ہوتی ہیں۔ زیرو سم سوچ غیر ضروری کی طرف لے جاتی ہے
      مقابلہ، تعاون کے مواقع ضائع، اور تباہ کن
      رقیبت۔

      یہ تعصب مذاکرات، سیاست، اور تنظیمی حرکیات میں عام ہے۔
      یہ فکسڈ پائی فرض کرتا ہے جب پائی اکثر بڑھائی جا سکتی ہے۔ یہ بن سکتا ہے
      خود کو پورا کرنے والا: اگر آپ دوسروں کو دشمن کے طور پر پیش کرتے ہیں، تو وہ دشمن بن جاتے ہیں۔
    why_this_is_important: |
      زیرو سم سوچ کو تسلیم کرنا تعاون اور
      قدر کی تخلیق کے مواقع کھولتا ہے۔ یہ مذاکرات کو بہتر بناتا ہے، تنازعہ کو کم کرتا ہے، اور قابل بناتا ہے
      جیت کی صورتحال۔ بہترین مواقع میں سے بہت سی مثبت سم ہیں۔
    when_to_use:
      - مذاکرات
      - قیادت
      - تعلقات_کی_تعمیر
      - فیصلے_کرنا
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "اگر وہ جیت گئے، تو میں ہار جاؤں گا" جب صورتحال دونوں کو فائدہ اٹھانے کی اجازت دے سکتی ہے۔
      competitive_ framing: |
        صورتحال کو خود بخود ہم بمقابلہ وہ کے طور پر فریم کرنا۔
      envy_of_others_gains: |
        دوسروں کی کامیابی پر حسد کرنا گویا کہ یہ آپ کی کامیابی کو کم کرتی ہے۔
      missed_cooperation: |
        سب کے لیے فائدہ مند تعاون کے مواقع دیکھنے میں ناکام ہونا۔
    examples:
      negotiation: |
        یہ فرض کرنا کہ دوسرے فریق کے لیے ایک بہتر سودا آپ کے لیے ایک بدتر سودا ہے — جب کہ تخلیقی حل اکثر دونوں کے لیے قدر بڑھاتے ہیں۔
      salary: |
        "اگر میرے ساتھی کو تنخواہ میں اضافہ ملا، تو میرے لیے کم ہے" جب بجٹ لچکدار ہو سکتا ہے یا پیدا کی گئی قدر کی وجہ سے اضافے کو درست ٹھہرایا جا سکتا ہے۔
      politics: |
        "ان کی جماعت کے فوائد ہمارے نقصانات ہیں" جب بہت سے پالیسی نتائج متعدد گروہوں کو فائدہ پہنچا سکتے ہیں۔
      career: |
        "ان کی ترقی کا مطلب میرے لیے کم موقع ہے" جب تنظیمی ترقی ہر کسی کے لیے زیادہ مواقع پیدا کر سکتی ہے۔
    real_world_implications: |
      زیرو سم سوچ تنازعہ کو ہوا دیتی ہے، تعاون کو محدود کرتی ہے، اور ضائع شدہ مواقع کا سبب بنتی ہے۔ یہ اکثر
      معیشت، تعلقات، اور
      جدت میں غلط ہوتا ہے۔ مثبت سم فریم کی طرف منتقل کرنے سے نتائج بہتر ہوتے ہیں۔
    professional_application:
      networking_and_relationship_building: |
        دوسروں کے لیے قدر پیدا کرنے کے طریقے تلاش کریں — ان کی کامیابی آپ کے لیے
        مواقع پیدا کر سکتی ہے۔ ایسے تعلقات بنائیں جہاں دونوں فریقوں کو فائدہ ہو۔
      collaborative_learning_initiative: |
        ٹیم کے مقاصد کو مثبت سم کے طور پر فریم کریں: مشترکہ کامیابی، پائی کو بڑھانا۔
        داخلی مقابلے کے بجائے تعاون کی حوصلہ افزائی کریں۔
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        کچھ صورتیں زیرو سم ہوتی ہیں (مثلاً، ایک ہی پروموشن، ایک مقررہ بجٹ)۔
        اس کے برعکس بہانے کو ناپختہ پن سمجھا جا سکتا ہے۔
      naive_cooperation: |
        یہ فرض کرنا کہ ہر کوئی تعاون کرے گا جب کچھ اداکار واقعی
        دشمن ہوں۔
      undervaluing_competition: |
        مقابلہ بہتری کو فروغ دے سکتا ہے؛ ہر رقیبت تباہ کن نہیں ہوتی۔
      exploitation: |
        "مثبت سم" فریم کا استعمال دوسروں سے قدر نکالنے کے لیے جو فائدہ نہیں اٹھاتے۔
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
