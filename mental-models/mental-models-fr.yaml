# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (French)
# Consolidated from mental-models-fr/

mental_models:
  - id: ambiguity_effect
    name: Effet d'ambiguïté
    quick_introduction: |
      L'effet d'ambiguïté est la tendance à éviter les options lorsque nous manquons d'informations
      sur les probabilités des résultats. Nous préférons les risques connus aux risques
      inconnus, même lorsque les risques inconnus pourraient être meilleurs. L'incertitude elle-même semble
      aversion.
    one_liner: Nous préférons les risques connus aux risques inconnus, même lorsque les risques inconnus pourraient être meilleurs.
    try_this:
      - Demandez: Est-ce que j'évite cette option principalement à cause de l'incertitude, ou y a-t-il un inconvénient réel ?
      - Quantifiez ce que vous savez ; parfois, l'option « ambiguë » a un potentiel de gain plus clair.
      - Remarquez lorsque vous optez par défaut pour le familier simplement parce qu'il semble plus sûr.
    ask_yourself:
      - Est-ce que je rejette quelque chose parce que c'est ambigu, ou parce que c'est vraiment pire ?
      - Que faudrait-il savoir pour être à l'aise avec l'option incertaine ?
    in_more_detail: |
      Dans le paradoxe d'Ellsberg, les gens préfèrent parier sur une urne aux proportions connues
      plutôt que sur une urne aux proportions inconnues, même lorsque l'urne inconnue
      pourrait offrir de meilleures chances. Nous n'aimons pas l'ambiguïté ; nous préférons avoir une probabilité claire
      (même si elle est mauvaise) plutôt qu'une probabilité peu claire.

      Cet effet influence les décisions en matière d'investissement, de choix de carrière et de politique.
      Il peut conduire à des choix sous-optimaux lorsque nous évitons des options ambiguës
      mais potentiellement supérieures. Il explique également pourquoi nous préférons les marques familières
      et les quantités connues.
    why_this_is_important: |
      Reconnaître l'effet d'ambiguïté vous aide à éviter de trop préférer le familier
      et de sous-préférer l'incertain. Il peut entraîner des opportunités manquées lorsque
      l'ambiguïté est gérable. Il explique également pourquoi la transparence et la clarté
      réduisent l'anxiété.
    when_to_use:
      - prise_de_decision
      - evaluation_du_risque
      - investissement
      - evolution_professionnelle
    how_can_you_spot_it:
      preference_for_known_risks: |
        Choisir des options avec des probabilités claires (même si moins bonnes) plutôt que des options ambiguës.
      avoidance_of_uncertainty: |
        Rejeter des options principalement parce que « nous n'en savons pas assez ».
      familiarity_over_optimality: |
        Préférer le connu au potentiel mieux inconnu.
      information_seeking: |
        Volonté de payer pour des informations qui réduisent l'ambiguïté, même lorsque cela
        ne change pas la décision.
    examples:
      investing: |
        Préférer les actions nationales aux actions internationales parce que « nous les comprenons
        mieux », malgré les avantages de la diversification.
      employment: |
        Rester dans un emploi connu plutôt que d'accepter un poste avec un potentiel incertain.
      product_choice: |
        Choisir une marque familière plutôt qu'une nouvelle option à la qualité incertaine.
      medical: |
        Préférer un traitement aux effets secondaires connus plutôt qu'un autre aux résultats incertains,
        même lorsque ce dernier pourrait être meilleur.
    real_world_implications: |
      L'effet d'ambiguïté façonne les marchés, les choix de carrière et la politique. Il peut être
      réduit en fournissant des informations plus claires ou en reformulant les décisions. Il
      explique également pourquoi la transparence et la communication réduisent l'anxiété.
    professional_application:
      networking_and_relationship_building: |
        Réduire l'ambiguïté dans les relations : clarifier les attentes, communiquer
        explicitement et réduire l'incertitude. Les gens préfèrent les situations connues.
      collaborative_learning_initiative: |
        Lors de l'introduction d'un changement, réduire l'ambiguïté : fournir des informations claires sur
        ce qui se passera, quand et pourquoi. L'ambiguïté accroît la résistance.
    how_can_this_be_misapplied:
      manipulation: |
        Créer délibérément de l'ambiguïté pour orienter les gens vers des options préférées.
      false_clarity: |
        Fournir une fausse certitude lorsqu'une incertitude réelle existe.
      overconfidence: |
        Supposer que la réduction de l'ambiguïté améliore toujours les décisions ; parfois,
        l'option ambiguë est réellement meilleure.
      analysis_paralysis: |
        Attendre des informations parfaites avant de décider lorsqu'une certaine ambiguïté
        est inévitable.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Biais d'ancrage
    quick_introduction: |
      Le biais d'ancrage est la tendance à trop se fier à la première information
      rencontrée lors de la prise de décisions. Cette première "ancre" fausse les jugements
      ultérieurs, même lorsqu'elle est non pertinente ou arbitraire.
    one_liner: Le premier chiffre que vous voyez façonne tous ceux qui suivent.
    try_this:
      - Avant une négociation, déterminez votre chiffre cible et évitez d'être ancré par le leur.
      - Lors d'une estimation, générez votre propre chiffre avant d'entendre celui des autres.
      - Demandez: penserais-je différemment si j'avais vu un autre chiffre d'abord ?
    ask_yourself:
      - Quel chiffre ou quelle idée ai-je rencontré en premier – et est-ce que cela fausse mon jugement ?
      - Est-ce que j'ajuste suffisamment par rapport à l'ancre, ou suis-je encore trop proche d'elle ?
    in_more_detail: |
      Dans une expérience classique, les personnes à qui l'on demandait d'estimer le pourcentage de nations africaines
      aux Nations Unies donnaient des estimations plus élevées si elles avaient juste vu un nombre plus élevé (par exemple, 65 contre 10).
      L'ancre – même lorsqu'elle était aléatoire – a influencé leurs réponses. L'ancrage affecte les négociations,
      la fixation des prix, l'embauche et les prévisions.

      Le premier chiffre que nous voyons devient un point de référence. Nous nous en éloignons, mais
      généralement pas suffisamment. Même lorsque nous savons que l'ancre est arbitraire, elle peut toujours
      nous influencer. Les experts ne sont pas à l'abri.
    why_this_is_important: |
      Comprendre l'ancrage vous aide à prendre de meilleures décisions, à négocier plus efficacement
      et à éviter d'être manipulé. Il explique également pourquoi l'ordre et le cadrage
      des informations sont si importants.
    when_to_use:
      - prise_de_decision
      - negotiation
      - investissement
      - evaluation_des_risques
    how_can_you_spot_it:
      first_number_dominance: |
        Le premier chiffre dans une négociation ou une estimation influence de manière disproportionnée
        le résultat.
      insufficient_adjustment: |
        Lors de l'ajustement à partir d'une ancre, les gens n'ajustent généralement pas assez.
      arbitrary_anchor_influence: |
        Même des chiffres manifestement non pertinents (par exemple, les derniers chiffres d'un numéro de sécurité sociale)
        peuvent affecter les estimations.
      order_effects: |
        La séquence dans laquelle les options sont présentées modifie les choix.
    examples:
      salary_negotiation: |
        Le premier chiffre mentionné – que ce soit par l'employeur ou le candidat – ancre souvent l'offre finale.
      real_estate: |
        Le prix affiché ancre la perception de la valeur par les acheteurs, même lorsqu'il est délibérément
        fixé haut ou bas.
      retail: |
        "Avant 99 $, maintenant 49 $" utilise le prix d'origine comme ancre pour faire paraître le prix de vente comme une bonne affaire.
      forecasting: |
        Les premières estimations dans les réunions de planification ancrent les projections ultérieures, même lorsque
        la première estimation était une supposition.
    real_world_implications: |
      L'ancrage façonne les marchés, les négociations et les politiques. Il peut être utilisé de manière éthique (par exemple,
      en fixant des attentes raisonnables) ou non éthique (par exemple, fixation de prix manipulative).
      Le reconnaître améliore la qualité des décisions.
    professional_application:
      networking_and_relationship_building: |
        Dans les négociations, envisagez de faire la première offre pour définir l'ancre – ou soyez conscient lorsque l'autre partie le fait.
      collaborative_learning_initiative: |
        Dans les réunions, soyez prudent quant à qui parle en premier sur les estimations ; envisagez
        de collecter des estimations indépendantes avant la discussion.
    how_can_this_be_misapplied:
      manipulation: |
        Utiliser délibérément des ancres extrêmes pour orienter les autres vers les résultats souhaités.
      overconfidence_in_anchors: |
        Faire trop confiance à votre propre première estimation sans la réviser.
      ignoring_relevant_information: |
        Laisser une ancre supplanter des données plus pertinentes.
      exploitation: |
        Tactiques de vente qui utilisent des prix "comparer à" gonflés pour faire paraître les prix réels raisonnables.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Cascade de Disponibilité
    quick_introduction: |
      Une cascade de disponibilité est un processus auto-renforcé où une idée gagne
      en plausibilité par la discussion publique répétée. Plus elle est discutée,
      plus elle devient "disponible", plus les gens y croient, et plus elle est discutée.
      Une croyance collective prend de l'élan indépendamment de sa vérité sous-jacente.
    one_liner: Plus une idée est répétée, plus elle semble plausible — indépendamment des preuves.
    try_this:
      - Demander: Cette croyance est-elle répandue parce qu'elle est vraie, ou parce qu'elle est répétée ?
      - Rechercher les sources primaires avant d'accepter "ce que tout le monde sait".
      - Remarquer quand la répétition seule motive votre sentiment de plausibilité.
    ask_yourself:
      - Croirais-je cela si je l'avais entendu une seule fois ?
      - Suis-je en train de confondre "tout le monde le dit" avec "les preuves le soutiennent" ?
    in_more_detail: |
      Timur Kuran et Cass Sunstein ont décrit le fonctionnement des cascades de disponibilité :
      la disponibilité de l'information (fréquence à laquelle nous entendons quelque chose) et la plausibilité
      (à quel point cela semble crédible) se renforcent mutuellement. La couverture médiatique, les médias sociaux
      et le discours public amplifient certaines idées. Une fois qu'une idée atteint un seuil de disponibilité,
      elle peut se propager rapidement et devenir une "connaissance commune" même si elle est fausse ou exagérée.

      Les cascades de disponibilité peuvent être bénéfiques (diffusion d'avertissements importants)
      ou nuisibles (propagation de la panique ou de la désinformation). Elles sont motivées par
      l'heuristique de disponibilité et la preuve sociale.
    why_this_is_important: |
      Reconnaître les cascades de disponibilité vous aide à évaluer si une croyance répandue reflète des preuves
      ou une simple répétition. Cela explique comment les idées deviennent virales et comment les croyances collectives peuvent être fausses.
      C'est essentiel pour la littératie médiatique et la pensée critique.
    when_to_use:
      - prise_de_decision
      - évaluation_des_risques
      - apprentissage
      - leadership
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Plus une idée est répétée, plus elle semble plausible.
      media_amplification: |
        La couverture médiatique alimente la croyance qui alimente plus de couverture médiatique.
      social_proof_belief: |
        "Tout le monde y croit" devient une preuve de croyance.
      threshold_effects: |
        Une fois qu'une idée franchit un seuil de visibilité, elle se propage rapidement.
    examples:
      health_scares: |
        Une étude suggère qu'un produit est dangereux ; les médias l'amplifient ;
        le public l'évite ; davantage de couverture médiatique s'ensuit. Le risque peut être
        exagéré.
      financial_panic: |
        Des rumeurs de faillite bancaire se répandent ; les gens retirent leur argent ; la ruée
        devient auto-réalisatrice.
      social_media: |
        Un récit devient viral ; la répétition augmente la croyance ; la croyance
        augmente le partage. La vérité et la viralité peuvent diverger.
      organizational: |
        Une rumeur de licenciements se répand ; l'anxiété augmente ; les comportements
        changent ; la rumeur gagne en plausibilité par la réaction.
    real_world_implications: |
      Les cascades de disponibilité façonnent l'opinion publique, les politiques et les marchés.
      Elles peuvent propager à la fois des vérités importantes et des falsités dangereuses.
      La pensée critique exige de distinguer la croyance basée sur des preuves
      de la croyance motivée par une cascade.
    professional_application:
      networking_and_relationship_building: |
        Lorsqu'une idée est "partout", demandez-vous : est-elle vraie parce qu'elle est
        répétée, ou répétée parce qu'elle est vraie ? Recherchez les sources primaires.
      collaborative_learning_initiative: |
        Créez des normes de vérification avant amplification. Encouragez
        la remise en question de "ce que tout le monde sait". Distinguez le consensus
        qui reflète des preuves du consensus qui reflète
        la disponibilité.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Parfois, la croyance répandue est correcte. Ne supposez pas que toutes
        les idées populaires sont des cascades.
      conspiracy_thinking: |
        Utiliser la "cascade de disponibilité" pour rejeter des préoccupations légitimes
        comme étant fabriquées.
      false_skepticism: |
        Rejeter des idées bien étayées parce qu'elles sont populaires.
      contrarianism: |
        Supposer que tout ce qui est largement cru doit être faux.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Heuristique de disponibilité
    quick_introduction: |
      L'heuristique de disponibilité est la tendance à juger la probabilité des événements
      en fonction de la facilité avec laquelle des exemples nous viennent à l'esprit. Si nous pouvons facilement nous souvenir d'instances, nous
      supposons que l'événement est courant. Les exemples vivants, récents ou émotionnels dominent
      nos estimations de probabilité.
    one_liner: Ce qui nous vient facilement à l'esprit semble plus probable, même quand ce n'est pas le cas.
    try_this:
      - Demandez: Quel est le taux de base ? Est-ce que je surévalue les exemples vivants ou récents ?
      - Cherchez des données lorsque votre instinct vous dit "cela semble courant" ou "cela semble rare".
      - Remarquez quand une seule histoire dramatique guide votre évaluation des risques.
    ask_yourself:
      - Est-ce que je juge la probabilité par la facilité de rappel plutôt que par la fréquence réelle ?
      - Penserais-je différemment si je n'avais pas vu ce titre juste avant ?
    in_more_detail: |
      Nous utilisons des raccourcis mentaux pour estimer la fréquence et la probabilité. Un raccourci
      est la disponibilité : ce qui nous vient facilement à l'esprit ? Les crashs d'avion sont vivants et
      largement médiatisés — nous surestimons leur probabilité. Les accidents de voiture sont
      courants mais moins saillants — nous sous-estimons. La récence, la vivacité et
      l'impact émotionnel augmentent tous la disponibilité.

      L'heuristique est utile lorsque la disponibilité est corrélée à la fréquence réelle.
      Mais les médias, l'expérience personnelle et la saillance faussent souvent la corrélation.
      Nous craignons les risques rares mais vivants et ignorons les risques courants mais banals.
    why_this_is_important: |
      Reconnaître l'heuristique de disponibilité vous aide à corriger vos estimations de probabilité,
      à éviter de réagir de manière excessive aux nouvelles vives, et à faire de meilleures évaluations des risques.
      Elle explique de nombreuses erreurs systématiques de jugement.
    when_to_use:
      - prise_de_decision
      - evaluation_des_risques
      - investissement
      - resolution_de_problemes
    how_can_you_spot_it:
      vividness_dominance: |
        Les exemples dramatiques ou émotionnels influencent de manière disproportionnée les estimations.
      recency_effect: |
        Les événements récents semblent plus susceptibles de se reproduire.
      personal_experience_overweighting: |
        "Je connais quelqu'un qui..." façonne les estimations de probabilité.
      media_distortion: |
        Ce qui est rapporté ne correspond souvent pas à ce qui est fréquent.
    examples:
      risk_perception: |
        Surestimation du risque de terrorisme (vif, médiatisé) et sous-estimation
        du risque de maladie cardiaque (courant, moins dramatique).
      investing: |
        Les événements récents du marché (krach, boom) dominent les attentes pour l'avenir.
      hiring: |
        Une histoire marquante sur un mauvais recrutement dans une école donnée affecte
        l'évaluation de tous les candidats de cette école.
      health: |
        Le diagnostic de cancer d'un ami donne l'impression que le cancer est plus probable que ce que suggèrent les taux de base.
    real_world_implications: |
      L'heuristique de disponibilité affecte les achats d'assurance, les priorités des politiques,
      et les décisions personnelles. Elle est exploitée par les médias et les spécialistes du marketing. Corriger
      pour elle nécessite de rechercher les taux de base et de remettre en question ce qui "vient à l'esprit".
    professional_application:
      networking_and_relationship_building: |
        Soyez conscient qu'une expérience négative marquante avec une personne ou un groupe peut
        fausser votre jugement. Recherchez les taux de base et plusieurs points de données.
      collaborative_learning_initiative: |
        Lors de l'évaluation des risques ou des opportunités, demandez explicitement "Quel est le taux de base ?"
        et "Est-ce que je surévalue les exemples vivants ?". Utilisez des données pour corriger
        les estimations basées sur la disponibilité.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Parfois, la disponibilité est informative — l'expérience récente peut signaler un changement.
        Ne supposez pas que tous les jugements basés sur la disponibilité sont erronés.
      analysis_paralysis: |
        Surestimer la correction au point d'ignorer les signes d'alerte légitimes d'une expérience
        marquante.
      false_objectivity: |
        Supposer que les taux de base sont toujours corrects alors qu'ils peuvent être obsolètes ou
        inapplicables.
      manipulation: |
        Rendre délibérément certains exemples marquants pour orienter les jugements des autres.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Le Phénomène Baader-Meinhof
    quick_introduction: |
      Le phénomène Baader-Meinhof (également appelé illusion de fréquence) se produit lorsque
      vous apprenez quelque chose de nouveau et que vous le remarquez soudainement partout.
      Cela peut donner l'impression d'une coïncidence, mais il s'agit souvent d'une attention
      sélective : votre cerveau est prédisposé à remarquer ce qu'il a récemment rencontré.
    one_liner: Vous apprenez quelque chose de nouveau et vous le voyez soudainement partout, alors qu'il a toujours été là.
    try_this:
      - Lorsque quelque chose vous semble "partout" après l'avoir appris, vérifiez le taux de base.
      - Remarquez quand la récence fait qu'une chose semble plus importante qu'elle ne l'est réellement.
      - Demandez-vous: est-ce une vraie tendance ou est-ce que je remarque simplement ce que je suis prédisposé à remarquer ?
    ask_yourself:
      - Est-ce que cela est réellement plus courant maintenant, ou est-ce que je le remarque juste plus ?
      - Aurais-je vu ce schéma si je ne l'avais pas appris récemment ?
    in_more_detail: |
      Après avoir entendu parler du groupe terroriste Baader-Meinhof, une personne pourrait
      voir des références à celui-ci dans les actualités, dans des conversations et dans
      des articles en quelques jours. Le phénomène comporte deux composantes : l'attention
      sélective (vous remarquez ce que vous cherchez) et le biais de confirmation (vous vous
      souvenez des succès et oubliez les échecs).

      L'illusion est que la chose est soudainement devenue plus courante. En réalité, elle
      était toujours présente ; vous n'y étiez simplement pas attentif. Cela peut conduire
      à surestimer la prévalence ou l'importance des informations récemment acquises.
    why_this_is_important: |
      Reconnaître le phénomène Baader-Meinhof vous aide à éviter de surestimer la fréquence
      ou l'importance de quelque chose en fonction d'une exposition récente. Cela explique
      également pourquoi les nouvelles idées, les produits ou les tendances peuvent sembler
      "partout" après que vous les ayez remarqués pour la première fois.
    when_to_use:
      - prise_de_decision
      - apprentissage
      - evaluation_des_risques
      - resolution_de_problemes
    how_can_you_spot_it:
      sudden_ubiquity: |
        Vous apprenez un nouveau mot, concept ou produit et, en quelques jours, vous avez
        l'impression de le voir constamment.
      recency_bias: |
        Les informations récentes semblent plus représentatives de la réalité qu'elles ne
        le sont en réalité.
      pattern_seeking: |
        Votre cerveau relie des observations non liées dans un récit de "c'est partout".
      forgetting_the_misses: |
        Vous ne notez pas combien de fois vous ne voyez pas la chose, seulement les fois où
        vous la voyez.
    examples:
      vocabulary: |
        Apprendre le mot "sérendipité" et le remarquer ensuite dans trois articles différents
        la même semaine.
      car_purchase: |
        Après avoir décidé d'acheter un certain modèle de voiture, vous la voyez dans chaque
        rue, bien qu'elle ait toujours été là.
      health_anxiety: |
        Lire à propos d'un symptôme rare et ensuite remarquer des sensations similaires
        chez soi, ce qui entraîne une anxiété inutile.
      trends: |
        Découvrir une nouvelle application ou tendance et avoir l'impression qu'elle domine
        soudainement, alors qu'elle pourrait avoir une petite base d'utilisateurs.
    real_world_implications: |
      Le phénomène affecte la façon dont nous percevons les tendances, les risques et les
      opportunités. Les spécialistes du marketing et les médias peuvent en tirer parti en
      créant une exposition répétée. Dans la prise de décision, cela peut conduire à surpondérer
      les informations récentes.
    professional_application:
      networking_and_relationship_building: |
        Lorsqu'une personne mentionne un sujet de manière répétée après l'avoir appris,
        reconnaissez qu'elle pourrait connaître une illusion de fréquence : le sujet n'est
        pas nécessairement plus pertinent, juste plus saillant pour elle.
      collaborative_learning_initiative: |
        Dans le cadre de la formation, insistez sur le fait que "le voir partout" après
        avoir appris quelque chose de nouveau est normal ; encouragez à vérifier les taux
        de base plutôt qu'à se fier à la sensation d'ubiquité.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Supposer que quelque chose est plus courant ou important qu'il ne l'est parce que
        vous l'avez remarqué fréquemment récemment.
      confirmation_bias_amplification: |
        Utiliser la sensation de "le voir partout" comme preuve qu'une croyance est correcte.
      decision_distortion: |
        Prendre des décisions basées sur des informations récemment acquises qui semblent
        disproportionnellement significatives.
      vulnerability_to_manipulation: |
        Les publicitaires et les propagandistes utilisent l'exposition répétée pour créer
        l'illusion d'ubiquité et d'importance.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: base_rate_fallacy
    name: Erreur de taux de base
    quick_introduction: |
      L'erreur de taux de base est la tendance à ignorer les informations statistiques générales
      (taux de base) au profit d'informations spécifiques et vivantes. Nous donnons trop d'importance au
      cas particulier et sous-estimons la probabilité a priori. Une seule histoire convaincante
      peut l'emporter sur ce que disent les chiffres.
    one_liner: Une histoire convaincante peut l'emporter sur ce que disent les chiffres.
    try_this:
      - Avant de juger un cas, demandez: Quel est le taux de base pour ce type de situation ?
      - Combinez les preuves spécifiques avec la probabilité a priori, n'ignorez aucune des deux.
      - Remarquez quand un exemple vivant étouffe les statistiques.
    ask_yourself:
      - Est-ce que je donne trop d'importance à ce cas spécifique et pas assez au taux de base ?
      - Que diraient les chiffres si je mettais de côté l'histoire convaincante ?
    in_more_detail: |
      Si une maladie affecte 1 % de la population et qu'un test est précis à 95 %, un
      résultat positif signifie souvent que la personne n'a toujours probablement pas la
      maladie, car le taux de base est très faible. Mais nous ignorons les taux de base et
      nous nous concentrons sur "la personne a eu un résultat positif". Nous sommes influencés par le spécifique plutôt que par le statistique.

      Cette erreur affecte le diagnostic médical, l'embauche, l'évaluation des risques et le jugement juridique. Nous devons combiner les taux de base avec les preuves spécifiques au cas en utilisant
      le raisonnement bayésien, mais nous le faisons souvent pas.
    why_this_is_important: |
      Corriger l'erreur de taux de base améliore le diagnostic, l'évaluation des risques
      et la qualité des décisions. Cela nous empêche de réagir de manière excessive à des cas vivants et
      de sous-estimer la réalité statistique.
    when_to_use:
      - prise_de_decision
      - evaluation_des_risques
      - resolution_de_problemes
      - investissement
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Les taux de base ne sont pas intégrés dans les jugements.
      vividness_over_statistics: |
        Un seul cas ou une seule histoire domine sur les données agrégées.
      diagnostic_overweighting: |
        Surestimation des nouvelles preuves (par exemple, résultat de test) sans tenir compte du taux de base.
      anecdote_override: |
        "Je connais quelqu'un qui..." l'emporte sur les preuves statistiques.
    examples:
      medical: |
        Un test positif pour une maladie rare : le taux de base est faible, donc un résultat positif
        est souvent un faux positif. Nous ignorons cela et supposons que la personne a la maladie.
      hiring: |
        Un candidat a un excellent entretien : nous ignorons les taux de base quant à la façon dont les
        entretiens prédisent la performance.
      risk: |
        Un crash d'avion est marquant : nous surestimons le risque de vol et sous-estimons
        le risque de conduite, en ignorant les taux de base.
      startup_investing: |
        Un fondateur fait une bonne présentation : nous ignorons que la plupart des startups échouent indépendamment de la qualité de la présentation.
    real_world_implications: |
      L'erreur de taux de base affecte les décisions médicales, les jugements juridiques et
      la stratégie d'entreprise. Elle contribue à une mauvaise allocation des ressources et à une
      mauvaise évaluation des risques. La pensée bayésienne la corrige.
    professional_application:
      networking_and_relationship_building: |
        Lors de l'évaluation des personnes, tenez compte des taux de base : par exemple, quelle est la fréquence à laquelle ce
        type de comportement se produit ? Ne laissez pas une interaction vivante l'emporter sur le
        schéma général.
      collaborative_learning_initiative: |
        Lors de la prise de décisions, énoncez et tenez explicitement compte des taux de base avant
        d'intégrer les preuves spécifiques au cas. Formez les équipes au raisonnement bayésien.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Ignorer des preuves spécifiques solides lorsque les taux de base suggèrent le contraire ;
        parfois, le cas individuel est l'exception.
      stereotyping: |
        Utiliser les taux de base pour porter des jugements injustes sur les individus.
      false_precision: |
        Appliquer les taux de base avec une fausse précision alors qu'il s'agit d'estimations approximatives.
      dismissing_individuals: |
        "Les statistiques disent X" alors que l'individu en face de vous ne correspond peut-être pas à la
        distribution.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
  - id: bayes_theorem
    name: Théorème de Bayes
    quick_introduction: |
      Le théorème de Bayes décrit comment mettre à jour la probabilité d'une hypothèse
      lorsque vous recevez de nouvelles preuves. Il formalise l'idée que les croyances devraient changer
      proportionnellement à la façon dont les preuves les soutiennent — pas tout ou rien,
      mais de manière incrémentielle.
    one_liner: Mettez à jour vos croyances proportionnellement à la façon dont les preuves les soutiennent.
    try_this:
      - Commencez par votre *a priori*; demandez quelle est la probabilité que les preuves se produisent si vous aviez tort.
      - Mettez à jour progressivement — ne pas passer de 0% à 100% sur un seul point de données.
      - Considérez des hypothèses alternatives: les preuves les soutiendraient-elles aussi ?
    ask_yourself:
      - Dans quelle mesure cette preuve modifie-t-elle réellement la probabilité ?
      - Est-ce que je mets à jour mes croyances, ou est-ce que je confirme simplement ce que je pensais déjà ?
    in_more_detail: |
      Le théorème stipule que la probabilité d'une hypothèse compte tenu des preuves est égale à
      la probabilité *a priori* multipliée par la vraisemblance des preuves compte tenu de l'
      hypothèse, divisée par la probabilité des preuves. En pratique : commencez
      par votre croyance *a priori*, voyez dans quelle mesure les nouvelles preuves sont cohérentes avec votre
      hypothèse par rapport aux alternatives, et mettez à jour en conséquence.

      La pensée bayésienne s'oppose au biais de confirmation en vous obligeant à considérer
      la probabilité des preuves si vous aviez tort. C'est le fondement du
      raisonnement probabiliste et de la mise à jour scientifique.
    why_this_is_important: |
      La pensée bayésienne améliore la prise de décision en situation d'incertitude, vous aide à
      éviter la surconfiance et fournit un cadre pour apprendre des preuves.
      Elle est essentielle pour le diagnostic, les prévisions et tout domaine comportant de l'incertitude.
    when_to_use:
      - prise_de_decision
      - résolution_de_problèmes
      - évaluation_des_risques
      - apprentissage
    how_can_you_spot_it:
      prior_and_update: |
        Commencer par une croyance de référence et l'ajuster en fonction de nouvelles preuves.
      likelihood_ratio_thinking: |
        Se demander : "Quelle est la probabilité de cette preuve si j'ai raison par rapport à si j'ai tort ?"
      incremental_updating: |
        Les croyances changent progressivement avec les preuves plutôt que de basculer brusquement.
      base_rate_respect: |
        Les probabilités *a priori* (taux de base) sont importantes, pas seulement le dernier point de données.
    examples:
      medical_diagnosis: |
        Un test positif pour une maladie rare — l'a priori (faible prévalence) signifie qu'un
        résultat positif est souvent un faux positif. Bayes met à jour la probabilité.
      forecasting: |
        Mettre à jour les prévisions à mesure que de nouvelles données arrivent plutôt que de s'en tenir aux estimations initiales.
      hiring: |
        Commencer par des taux de base pour l'adéquation au poste, puis mettre à jour en fonction des performances lors des entretiens.
      investing: |
        Mettre à jour la probabilité qu'une entreprise réussisse à mesure que de nouvelles informations
        (bénéfices, nouvelles) arrivent.
    real_world_implications: |
      La pensée bayésienne sous-tend l'IA moderne, le diagnostic médical et l'inférence scientifique.
      Elle corrige la négligence du taux de base et le biais de confirmation. C'est
      un outil puissant pour tout domaine comportant de l'incertitude.
    professional_application:
      networking_and_relationship_building: |
        Mettez à jour vos croyances sur les personnes en fonction de nouvelles preuves plutôt que de
        conserver des premières impressions figées. Considérez les taux de base (par exemple, à quelle fréquence
        ce comportement se produit-il ?) lors de l'interprétation des actions.
      collaborative_learning_initiative: |
        Encouragez les équipes à énoncer explicitement leurs *a priori* avant les discussions, puis à
        mettre à jour à mesure que les preuves sont présentées. Cela réduit l'ancrage et le biais de confirmation.
    how_can_this_be_misapplied:
      overprecision: |
        Attribuer des probabilités exactes lorsque l'incertitude est élevée.
      prior_rigidity: |
        S'en tenir à des *a priori* forts et ne pas suffisamment mettre à jour avec de nouvelles preuves.
      base_rate_tyranny: |
        Ignorer des preuves solides parce que les taux de base suggèrent le contraire — parfois
        les preuves devraient primer.
      false_sophistication: |
        Utiliser un langage bayésien pour paraître rigoureux sans effectuer le raisonnement réel.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: L'effet Ben Franklin
    quick_introduction: |
      L'effet Ben Franklin est le phénomène psychologique par lequel les gens apprécient davantage
      quelqu'un après lui avoir rendu un service. Contrairement à l'intuition selon laquelle nous
      rendons service aux personnes que nous aimons, nous finissons souvent par aimer les personnes
      pour lesquelles nous avons rendu des services.
    one_liner: Nous finissons par aimer les personnes pour qui nous avons rendu service — nos attitudes suivent nos actions.
    try_this:
      - Si vous souhaitez améliorer une relation, envisagez de demander un petit service.
      - Remarquez quand rendre un service modifie vos sentiments envers quelqu'un.
      - Soyez conscient que les autres peuvent vous apprécier davantage après vous avoir aidé.
    ask_yourself:
      - Rendre un service à quelqu'un a-t-il changé ce que je ressens à son égard ?
      - Est-ce que je rationalise mon effort en augmentant mon estime pour eux ?
    in_more_detail: |
      Benjamin Franklin a décrit de manière célèbre comment il a gagné la faveur d'un législateur rival en lui demandant d'emprunter un livre rare dans sa bibliothèque. Après que l'homme ait accédé à sa demande, Franklin le lui a rendu avec une note de remerciement. La relation s'est nettement améliorée. L'effet suggère que nos attitudes suivent nos actions : lorsque nous investissons des efforts pour aider quelqu'un, nous rationalisons cet effort en augmentant notre estime positive à son égard.

      La théorie de la dissonance cognitive explique cela : lorsque nous rendons service à quelqu'un que nous n'aimons pas ou envers qui nous sommes neutres, nous éprouvons une tension entre notre action (aider) et notre attitude (mépris). Résoudre cette tension en l'aimant davantage est souvent plus facile que d'admettre que nous avons agi à l'encontre de nos préférences.
    why_this_is_important: |
      Comprendre l'effet Ben Franklin vous aide à établir des relations de manière stratégique et à reconnaître quand vos propres sentiments peuvent être influencés par des faveurs passées. Il explique également pourquoi demander de petits services peut être plus efficace que d'en offrir lorsque vous essayez d'améliorer une relation.
    when_to_use:
      - construction_relations
      - négociation
      - leadership
      - résolution_conflits
    how_can_you_spot_it:
      liking_after_helping: |
        Remarquez quand vous ressentez une chaleur accrue envers quelqu'un après lui avoir rendu un service, même si vous vous sentiez auparavant neutre ou négatif.
      others_requesting_small_favors: |
        Quand quelqu'un demande à plusieurs reprises de petits services, il peut consciemment ou inconsciemment exploiter cet effet pour établir des liens.
      attitude_shift_post_investment: |
        Après avoir investi du temps ou des efforts pour aider quelqu'un, observez si votre opinion à son égard a changé positivement.
      reciprocal_relationship_dynamics: |
        Les relations dans lesquelles une personne a rendu de nombreux services peuvent sembler déséquilibrées en termes d'affection, même si elles paraissent équilibrées en action.
    examples:
      networking: |
        Demander à un collègue un retour sur un brouillon, ce qui l'amène à se sentir plus investi dans votre succès et plus positivement disposé à votre égard.
      sales: |
        Un vendeur demande à un prospect un petit service (par exemple, une référence ou une introduction), ce qui augmente l'engagement et l'attrait du prospect.
      conflict_resolution: |
        Après un désaccord, demander à l'autre partie de l'aide pour quelque chose sans rapport peut apaiser les tensions et rétablir la bonne volonté.
      mentoring: |
        Lorsqu'une personne expérimentée demande à une personne moins expérimentée son avis ou son aide, la personne moins expérimentée se sent souvent plus valorisée et connectée.
    real_world_implications: |
      L'effet Ben Franklin influence l'embauche, la vente, la diplomatie et la dynamique sociale quotidienne. Il peut être utilisé de manière éthique pour construire des ponts ou de manière non éthique pour manipuler l'affection. Le reconnaître vous aide à comprendre pourquoi certaines relations se renforcent après des échanges de faveurs asymétriques.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous établissez des relations, envisagez de demander de petits services raisonnables plutôt que de seulement en offrir. L'acte d'aider crée un investissement et une estime positive.
      collaborative_learning_initiative: |
        Dans les équipes, faire en sorte que les membres s'entraident (par exemple, examen par les pairs, formation croisée) peut renforcer la cohésion. Structurez la collaboration de manière à ce que chacun donne et reçoive de l'aide.
    how_can_this_be_misapplied:
      manipulation: |
        Demander délibérément des faveurs uniquement pour se faire aimer de quelqu'un, sans véritable besoin, peut sembler exploiteur si cela est découvert.
      overreliance_on_favors: |
        Supposer que les faveurs suffiront à réparer une relation brisée ; certains conflits nécessitent une conversation directe et une prise de responsabilité.
      asymmetric_exploitation: |
        Demander des faveurs de manière répétée sans réciprocité peut se retourner contre vous et engendrer du ressentiment.
      misattributing_motives: |
        Supposer que la chaleur de quelqu'un est purement authentique alors qu'elle peut être en partie le résultat des faveurs qu'il vous a rendues.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: biais_du_survivant
    name: Biais du survivant
    quick_introduction: |
      Le biais du survivant est l'erreur logique qui consiste à se concentrer sur les personnes ou les choses qui ont "survécu" à un processus, tout en négligeant celles qui n'y sont pas parvenues. Nous voyons les gagnants et oublions les perdants, ce qui conduit à des conclusions trop optimistes sur le succès et l'échec.
    one_liner: Nous voyons les gagnants et oublions les perdants, ce qui conduit à des conclusions trop optimistes.
    try_this:
      - Demander: Qui a échoué en faisant quelque chose de similaire ? Qu'apprenons-nous d'eux ?
      - Rechercher l'échantillon "invisible": ceux qui n'ont pas survécu.
      - Noter quand vous étudiez uniquement des histoires de succès.
    ask_yourself:
      - N'apprends-je que des survivants ?
      - À quoi ressemblerait l'image complète si j'incluais les échecs ?
    in_more_detail: |
      Pendant la Seconde Guerre mondiale, le statisticien Abraham Wald a corrigé le placement des blindages sur les bombardiers en analysant les impacts sur les avions survivants et en recommandant des blindages là où les avions *non*-survivants avaient été touchés, car ces derniers n'étaient jamais revenus. Nous nous concentrons naturellement sur l'échantillon visible (les survivants) et ignorons l'invisible (ceux qui ont échoué).

      Le biais du survivant déforme notre vision de l'entrepreneuriat, de l'investissement, des carrières et de l'histoire. Nous étudions les entreprises qui ont réussi et ignorons les milliers qui ont échoué en faisant des choses similaires. Nous entendons les chanceux et oublions les malchanceux.
    why_this_is_important: |
      Corriger le biais du survivant conduit à des attentes plus réalistes et à de meilleures décisions. Cela vous aide à apprendre des échecs, pas seulement des succès, et à éviter de copier des stratégies qui n'ont fonctionné que pour une minorité chanceuse.
    when_to_use:
      - prise_de_decision
      - investissement
      - evolution_de_carriere
      - apprentissage
    how_can_you_spot_it:
      visible_success_stories: |
        Nous entendons parler des personnes qui ont réussi bien plus souvent que de celles qui ont essayé et échoué.
      missing_failures: |
        L'échantillon que nous observons exclut ceux qui n'ont pas "réussi" et qui ne peuvent donc pas raconter leur histoire.
      copying_survivors: |
        Supposer que ce que les survivants ont fait a causé leur succès, alors que cela aurait pu être de la chance ou le biais du survivant lui-même.
      overly_optimistic_models: |
        Estimations des taux de succès qui ignorent le dénominateur des tentatives.
    examples:
      entrepreneurship: |
        "Abandonner l'université comme Zuckerberg" ignore les nombreux étudiants qui ont abandonné sans pour autant fonder des entreprises milliardaires.
      investing: |
        Étudier uniquement les fonds qui ont survécu ignore ceux qui ont fermé après une mauvaise performance, gonflant les rendements historiques.
      career_advice: |
        Les personnes qui ont réussi attribuent leur succès à un travail acharné ; nous n'entendons pas parler de ceux qui ont travaillé dur et ont échoué.
      historical_analysis: |
        Étudier les "grandes" entreprises qui ont survécu ignore les nombreuses qui ont échoué avec des stratégies similaires.
    real_world_implications: |
      Le biais du survivant gonfle les taux de succès perçus, déforme les modèles et conduit à une mauvaise imitation. Le corriger nécessite de rechercher les cas d'échec et de comprendre les taux de base.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous demandez des conseils, recherchez également les personnes qui ont essayé et échoué ; leurs perspectives sont souvent plus éclairantes que celles des survivants.
      collaborative_learning_initiative: |
        Étudier les projets échoués et les initiatives abandonnées, pas seulement ceux qui ont réussi. Mener des "autopsies d'échec" pour apprendre de ce qui n'a pas fonctionné.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Surcorrection consistant à supposer que le succès est toujours de la chance et que l'effort n'a aucune importance.
      dismissing_success: |
        Refuser d'apprendre des personnes qui ont réussi parce que "biais du survivant".
      analysis_paralysis: |
        Être tellement concentré sur les cas d'échec que vous n'agissez jamais.
      false_equivalence: |
        Traiter les stratégies des survivants et des non-survivants comme également informatives alors que le contexte diffère.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Rationalité limitée
    quick_introduction: |
      La rationalité limitée est l'idée que la prise de décision humaine est limitée par les informations
      disponibles, la capacité cognitive et le temps. Nous n'optimisons pas ; nous "satisfaisons" – nous choisissons
      des options qui sont suffisamment bonnes plutôt que les meilleures possibles.
    one_liner: Nous satisfaisons – nous choisissons ce qui est suffisamment bon, pas optimal.
    try_this:
      - Simplifiez les choix lorsque c'est possible ; trop d'options submergent la rationalité limitée.
      - Définissez des critères de "suffisamment bon" à l'avance pour éviter une recherche interminable.
      - Remarquez lorsque vous optimisez au-delà du point de rendements décroissants.
    ask_yourself:
      - Cherche-je à trouver l'option parfaite alors qu'une option suffisamment bonne suffirait ?
      - Quelles contraintes (temps, informations, attention) limitent ma décision ?
    in_more_detail: |
      Herbert Simon a introduit le concept pour contester l'hypothèse économique classique
      des acteurs rationnels avec des informations parfaites. En réalité, notre attention est limitée,
      notre mémoire de travail et notre temps. Nous utilisons des heuristiques et des raccourcis pour prendre des décisions
      qui sont "rationnelles" compte tenu de nos contraintes, même si elles ne sont pas optimales au sens idéal.

      La rationalité limitée explique pourquoi nous ne choisissons pas toujours la meilleure option, pourquoi nous
      nous fions à des règles empiriques, et pourquoi le contexte et le cadrage sont si importants. C'est un modèle descriptif
      de la façon dont nous décidons réellement, pas une prescription de la façon dont nous devrions.
    why_this_is_important: |
      Comprendre la rationalité limitée vous aide à concevoir de meilleurs processus, à simplifier
      les choix pour les autres et à fixer des attentes réalistes quant à la qualité des décisions. Cela explique également
      pourquoi un comportement "irrationnel" est souvent rationnel sous contrainte.
    when_to_use:
      - prise_de_decision
      - résolution_de_problèmes
      - leadership
      - évaluation_des_risques
    how_can_you_spot_it:
      satisficing_behavior: |
        Les gens choisissent la première option acceptable plutôt que de comparer exhaustivement.
      heuristic_reliance: |
        Les décisions sont prises en utilisant des règles empiriques plutôt qu'une analyse complète.
      context_dependence: |
        La même personne prend des décisions différentes selon la manière dont les options sont présentées.
      information_overload: |
        Lorsque trop d'informations sont disponibles, la qualité des décisions peut diminuer.
    examples:
      hiring: |
        Un manager embauche le premier candidat qui répond aux critères plutôt que d'interviewer
        indéfiniment pour trouver le "meilleur" candidat.
      consumer_choice: |
        Les acheteurs choisissent parmi les premières options sur une étagère plutôt que de comparer tous les
        produits du magasin.
      policy: |
        Les électeurs utilisent l'affiliation au parti ou quelques enjeux clés comme raccourcis plutôt que d'analyser toutes les positions politiques.
      daily_routines: |
        Les gens suivent des habitudes et des choix par défaut plutôt que de ré-optimiser chaque décision.
    real_world_implications: |
      La rationalité limitée façonne les marchés, la conception des politiques et le comportement organisationnel.
      Les "coups de pouce" (nudges) et l'architecture des choix fonctionnent parce qu'ils tiennent compte de nos limites. Les ignorer
      conduit à des systèmes trop complexes que les gens ne peuvent pas utiliser efficacement.
    professional_application:
      networking_and_relationship_building: |
        Ne vous attendez pas à ce que les autres traitent des compromis complexes en temps réel. Simplifiez les choix
        et fournissez des options par défaut claires.
      collaborative_learning_initiative: |
        Concevez des processus qui fonctionnent avec la rationalité limitée : réduisez les choix, fournissez
        des options par défaut et utilisez des listes de contrôle pour les décisions complexes.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Concevoir des processus qui supposent une capacité cognitive illimitée, conduisant à la fatigue décisionnelle et à de mauvais résultats.
      blaming_irrationality: |
        Rejeter les choix des autres comme irrationnels sans tenir compte de leurs contraintes.
      exploitation: |
        Submerger délibérément les gens avec de la complexité pour les orienter vers des résultats souhaités.
      perfectionism: |
        Attendre des décisions optimales alors que la satisfaction est souvent l'approche rationnelle.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Effet du témoin
    quick_introduction: |
      L'effet du témoin est la tendance des individus à être moins susceptibles
      d'offrir de l'aide lorsque d'autres personnes sont présentes. Plus il y a de
      témoins, moins il est probable qu'une personne agisse. La responsabilité est
      diffusée ; nous supposons que quelqu'un d'autre aidera.
    one_liner: Plus il y a de personnes présentes, moins il est probable qu'une seule personne agisse.
    try_this:
      - En cas d'urgence, attribuez la responsabilité directement: « Vous, appelez le 112 ».
      - Ne supposez pas que quelqu'un d'autre aidera — agissez ou déléguez explicitement.
      - Remarquez quand vous attendez que d'autres agissent en premier.
    ask_yourself:
      - Est-ce que je diffuse la responsabilité parce que d'autres sont présents ?
      - Agirais-je différemment si j'étais seul ?
    in_more_detail: |
      Après le meurtre de Kitty Genovese (bien que l'histoire ait été en partie
      mythologisée), les chercheurs ont découvert que la présence d'autres personnes
      réduit l'aide. Nous cherchons des indices chez les autres — si personne n'agit,
      nous interprétons cela comme « aucune action nécessaire ». Nous faisons
      également l'expérience de la diffusion de la responsabilité : avec beaucoup de
      personnes présentes, chacun se sent moins personnellement responsable.
      L'ignorance pluraliste peut se produire : tout le monde pense que quelque chose
      ne va pas, mais personne n'agit parce que personne d'autre n'agit.

      L'effet est plus fort lorsque la situation est ambiguë et lorsque les témoins
      ne se connaissent pas. Il peut être surmonté par une attribution directe de la
      responsabilité (« Vous, appelez le 112 »).
    why_this_is_important: |
      Comprendre l'effet du témoin vous aide à agir lorsque les autres ne le font pas,
      et à concevoir des systèmes qui le surmontent. Si vous êtes en difficulté,
      isolez une personne. Si vous êtes un témoin, n'attendez pas que les autres
      agissent.
    when_to_use:
      - leadership
      - développement_relations
      - résolution_conflits
      - prise_de_décision
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        « Quelqu'un d'autre le fera » quand beaucoup sont présents.
      pluralistic_ignorance: |
        Tout le monde pense que l'action est nécessaire mais personne n'agit car
        personne d'autre n'agit.
      social_proof_inaction: |
        L'inaction des autres est interprétée comme « aucune action nécessaire ».
      audience_inhibition: |
        La peur de paraître ridicule ou de réagir de manière excessive empêche l'action.
    examples:
      emergency: |
        Une personne s'effondre ; avec de nombreux témoins, chacun est moins
        susceptible d'appeler à l'aide.
      workplace: |
        Tout le monde voit un problème mais personne ne le soulève — chacun suppose
        que quelqu'un d'autre le fera.
      harassment: |
        Les témoins de harcèlement n'interviennent pas, chacun pensant que les autres
        agiront.
      meetings: |
        Une mauvaise idée n'est pas contestée car tout le monde suppose que quelqu'un
        d'autre prendra la parole.
    real_world_implications: |
      L'effet du témoin peut avoir des conséquences tragiques en cas d'urgence et
      permet aux problèmes de persister dans les organisations. Le surmonter
      nécessite une attribution directe de responsabilité et des normes qui encouragent
      l'intervention.
    professional_application:
      networking_and_relationship_building: |
        Quand vous avez besoin d'aide, demandez à une personne spécifique. Quand vous
        voyez quelque chose qui ne va pas, agissez — ne supposez pas que les autres le
        feront. Créez des normes où prendre la parole est attendu et récompensé.
      collaborative_learning_initiative: |
        Formez les gens à reconnaître l'effet du témoin et à intervenir. Utilisez le
        « si vous voyez quelque chose, dites quelque chose » et attribuez des rôles
        explicites. Récompensez ceux qui parlent en premier.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Juger sévèrement les individus lorsque l'effet est une force situationnelle
        puissante — concentrez-vous sur le changement de la situation.
      false_assumption: |
        Supposer que quelqu'un aidera toujours s'il y a assez de personnes présentes — le
        contraire est souvent vrai.
      overcorrection: |
        Rendre tout le monde responsable de sorte que personne ne le soit — la diffusion
        peut toujours se produire.
      individualizing: |
        Traiter l'effet du témoin comme un défaut de caractère plutôt que comme un
        phénomène situationnel.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Cercle de compétence
    quick_introduction: |
      Le cercle de compétence est un modèle mental qui vous pousse à connaître les limites
      de votre expertise et à rester à l'intérieur de celles-ci lorsque vous prenez des décisions importantes. Warren Buffett
      et Charlie Munger insistent sur la connaissance de ce que l'on ignore.
    one_liner: Connaissez les limites de votre expertise — et restez-y lorsque cela compte.
    try_this:
      - Cartographiez où vous avez une expertise réelle par rapport à où vous supposez.
      - En dehors de votre cercle, demandez conseil ou déléguez.
      - Soyez honnête: un véritable expert serait-il d'accord avec votre jugement ici ?
    ask_yourself:
      - Suis-je dans mon cercle de compétence, ou est-ce que je suppose ?
      - Quand ai-je admis pour la dernière fois "Je ne sais pas" dans ce domaine ?
    in_more_detail: |
      Chaque personne a des domaines où elle possède une expertise réelle — où elle peut évaluer
      des informations, repérer des erreurs et porter des jugements fiables. En dehors de ce cercle, elle
      est sujette aux mêmes biais et erreurs que n'importe qui d'autre. La clé est une auto-évaluation honnête :
      où êtes-vous vraiment compétent, et où supposez-vous ?

      Le cercle peut s'élargir par un apprentissage délibéré, mais il faut de l'humilité pour
      en reconnaître les limites actuelles. Opérer en dehors de votre cercle augmente le
      risque d'erreurs coûteuses, surtout lorsque les enjeux sont élevés.
    why_this_is_important: |
      Rester dans votre cercle de compétence réduit les erreurs coûteuses et améliore la qualité des décisions.
      Cela vous aide également à savoir quand demander conseil, déléguer ou vous abstenir. La surconfiance en dehors de votre cercle est une cause majeure d'échec.
    when_to_use:
      - prise_de_decision
      - investissement
      - evolution_de_carriere
      - evaluation_des_risques
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Pouvez-vous expliquer les limites de vos connaissances dans un domaine ? Savez-vous ce que vous ignorez ?
      knowing_when_to_defer: |
        Reconnaître les situations où vous devriez chercher l'avis d'un expert plutôt que de décider seul.
      consistent_track_record: |
        Dans votre cercle, vos jugements ont tendance à être validés au fil du temps ; en dehors, ils ne le sont pas.
      calibration: |
        Votre confiance dans un domaine correspond à votre performance réelle dans ce domaine.
    examples:
      investing: |
        Buffett évite les actions technologiques car il dit qu'elles sont en dehors de son cercle de compétence — il ne peut pas les évaluer de manière fiable.
      career: |
        Un spécialiste qui reste dans son domaine par rapport à celui qui accepte un rôle "ambitieux" dans un domaine sans rapport.
      hiring: |
        Savoir quand se fier à son propre jugement par rapport à l'embauche de spécialistes pour des postes techniques.
      advice_giving: |
        Refuser de se prononcer sur des sujets en dehors de son expertise plutôt que de supposer.
    real_world_implications: |
      Le cercle de compétence est essentiel à l'investissement axé sur la valeur et au succès professionnel.
      L'ignorer conduit à la surconfiance, à des entreprises échouées et à de mauvais conseils.
      Élargir le cercle nécessite un effort délibéré et des retours honnêtes.
    professional_application:
      networking_and_relationship_building: |
        Établissez des relations avec des personnes dont les cercles de compétence complètent les vôtres.
        Sachez quand présenter d'autres personnes plutôt que de répondre vous-même.
      collaborative_learning_initiative: |
        Créez des équipes avec des cercles qui se chevauchent et se complètent. Encouragez les gens à signaler lorsqu'ils opèrent en dehors de leur compétence.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Ne jamais sortir de son cercle peut limiter la croissance et l'apprentissage.
      false_modesty: |
        Revendiquer un cercle minuscule pour éviter la responsabilité ou les décisions difficiles.
      gatekeeping: |
        Utiliser le "cercle de compétence" pour rejeter les autres sans engager leurs arguments.
      stagnation: |
        Traiter le cercle comme fixe plutôt que comme quelque chose qui peut s'étendre avec des efforts.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Dissonance cognitive
    quick_introduction: |
      La dissonance cognitive est l'inconfort mental que nous ressentons lorsque nous avons des croyances contradictoires, ou lorsque nos actions contredisent nos croyances. Nous sommes motivés à réduire cet inconfort, souvent en changeant nos croyances pour qu'elles correspondent à nos actions plutôt qu'en changeant nos actions.
    one_liner: Nous changeons nos croyances pour qu'elles correspondent à nos actions plus souvent que l'inverse.
    try_this:
      - Remarquez lorsque vous rationalisez pour réduire l'inconfort au lieu de changer de comportement.
      - Demandez-vous: Ajuste-je mes croyances pour justifier ce que j'ai fait ?
      - Considérez si changer l'action serait plus honnête que de changer la croyance.
    ask_yourself:
      - Est-ce que je réduis la dissonance par la rationalisation, ou par un réel changement ?
      - Aurais-je cette croyance si je n'avais pas déjà agi de la sorte ?
    in_more_detail: |
      La théorie de Leon Festinger explique que nous recherchons la cohérence. Lorsque nous agissons contre nos valeurs (par exemple, mentir, gaspiller de l'argent), nous éprouvons une dissonance. Pour la réduire, nous pouvons changer notre croyance (« Ce n'était pas vraiment un mensonge ») ou minimiser l'action (« Ce n'était pas si grave »). Nous rationalisons souvent plutôt que de nous réformer.

      La dissonance cognitive motive l'effet Ben Franklin (nous aimons les gens que nous avons aidés), explique pourquoi nous justifions les décisions passées et sous-tend de nombreuses auto-tromperies. C'est une force puissante dans la formation et le changement des croyances.
    why_this_is_important: |
      Comprendre la dissonance cognitive vous aide à reconnaître vos propres rationalisations et à comprendre pourquoi les gens résistent au changement d'avis. Cela explique également pourquoi l'engagement et la cohérence sont de puissants principes de persuasion.
    when_to_use:
      - prise_de_decision
      - creation_de_ liens
      - leadership
      - resolution_de_conflits
    how_can_you_spot_it:
      post_decision_rationalization: |
        Après un choix, nous mettons l'accent sur les aspects positifs de notre choix et sur les aspects négatifs des options rejetées.
      belief_action_alignment: |
        Nous ajustons nos croyances pour qu'elles correspondent aux actions que nous avons déjà entreprises.
      discomfort_with_inconsistency: |
        Un malaise lorsque nous remarquons que notre comportement ne correspond pas à nos valeurs déclarées.
      resistance_to_disconfirming_evidence: |
        Rejeter ou minimiser les informations qui entrent en conflit avec nos engagements.
    examples:
      purchase_justification: |
        Après avoir acheté un article coûteux, nous mettons en avant ses avantages et minimisons son coût.
      relationship: |
        Nous rationalisons le fait de rester dans une mauvaise relation en nous concentrant sur le positif et en minimisant le négatif.
      career: |
        Nous justifions le fait de rester dans un emploi que nous n'aimons pas en soulignant les raisons pour lesquelles nous "devons" y rester.
      beliefs: |
        Lorsque nos actions contredisent nos valeurs, nous changeons nos valeurs (« Je ne suis pas vraiment végétarien, je mange juste de la viande parfois ») plutôt que nos actions.
    real_world_implications: |
      La dissonance cognitive façonne la formation des croyances, le comportement des consommateurs et les attitudes politiques. Elle explique pourquoi les gens insistent après de mauvaises décisions et pourquoi changer de comportement peut changer les croyances.
    professional_application:
      networking_and_relationship_building: |
        Les petits engagements peuvent mener à des engagements plus importants : les gens rationalisent leurs actions passées. Utilisez cela éthiquement : commencez par de petites demandes. Soyez conscient lorsque vous rationalisez votre propre comportement.
      collaborative_learning_initiative: |
        Lors de l'introduction d'un changement, obtenez une adhésion précoce et de petits engagements : ils créent une dissonance qui motive une adoption plus large. Évitez d'imposer des engagements publics qui créent du ressentiment.
    how_can_this_be_misapplied:
      manipulation: |
        Créer délibérément de la dissonance pour faire pression sur les gens afin d'obtenir leur conformité.
      dismissing_genuine_change: |
        Supposer que tout changement de croyance est une rationalisation alors que les gens mettent parfois à jour leurs croyances de manière authentique.
      forced_consistency: |
        Faire pression sur les gens pour qu'ils soient « cohérents » alors que leurs points de vue ont légitimement évolué.
      self_deception: |
        Utiliser la théorie de la dissonance pour justifier l'évitement de vérités inconfortables sur nous-mêmes.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Biais de confirmation
    quick_introduction: |
      Le biais de confirmation est la tendance à rechercher, interpréter et
      se souvenir d'informations d'une manière qui confirme nos croyances
      existantes. Nous accordons plus de poids aux preuves qui nous soutiennent
      et nous ignorons ou rejetons les preuves qui contredisent nos points de
      vue. Nous posons des questions qui confirment plutôt que qui testent
      nos hypothèses.
    one_liner: Nous cherchons et nous souvenons de ce qui confirme nos croyances ; nous ignorons ce qui les contredit.
    try_this:
      - Demandez: Qu'est-ce qui prouverait que j'ai tort ? Cherchez activement les preuves qui infirment votre opinion.
      - Remarquez quand vous accordez plus de poids à l'information qui confirme qu'à celle qui contredit.
      - Considérez le point de vue opposé aussi sérieusement que le vôtre.
    ask_yourself:
      - Est-ce que je teste mon hypothèse ou est-ce que je la confirme seulement ?
      - Quand ai-je changé d'avis pour la dernière fois sur la base de nouvelles preuves ?
    in_more_detail: |
      Nous ne traitons pas l'information de manière neutre. Nous cherchons la confirmation,
      interprétons l'ambiguïté comme un soutien, et nous souvenons plus des succès
      que des échecs. Nous nous entourons de personnes et de médias partageant les mêmes idées.
      Nous demandons « Pourquoi ai-je raison ? » plutôt que « Qu'est-ce qui prouverait que j'ai tort ? ».
      Cela nous rend trop confiants et lents à nous adapter.

      Le biais de confirmation est l'un des biais les plus omniprésents et les mieux documentés.
      Il affecte la science, la politique, les relations et les affaires. Le surmonter
      nécessite un effort délibéré et des processus structurés.
    why_this_is_important: |
      Reconnaître le biais de confirmation est essentiel pour une bonne prise de décision et
      un bon apprentissage. Cela vous aide à rechercher des preuves qui infirment, à
      envisager des hypothèses alternatives et à mettre à jour vos croyances lorsque cela
      est justifié. C'est le fondement de la pensée scientifique.
    when_to_use:
      - prise_de_decision
      - apprentissage
      - resolution_de_problemes
      - evaluation_des_risques
    how_can_you_spot_it:
      seeking_support: |
        Rechercher des preuves qui confirment plutôt que qui testent votre point de vue.
      asymmetric_interpretation: |
        Interpréter des preuves ambiguës comme un soutien à votre position.
      discounting_disconfirming: |
        Ignorer ou minimiser les preuves qui contredisent vos croyances.
      selective_exposure: |
        Consommer uniquement des informations provenant de sources qui sont
        en accord avec vous.
    examples:
      hiring: |
        Former une impression positive précoce, puis poser des questions qui
        confirment que le candidat est excellent.
      investing: |
        Après avoir acheté une action, rechercher des nouvelles positives et
        ignorer les analyses négatives.
      relationships: |
        Interpréter les actions d'un partenaire à travers un prisme qui confirme
        votre opinion à son sujet (bonne ou mauvaise).
      politics: |
        Accepter l'information de votre camp sans esprit critique et rejeter
        l'information équivalente de l'autre camp.
    real_world_implications: |
      Le biais de confirmation perpétue les fausses croyances, alimente la polarisation
      et entraîne des erreurs coûteuses. C'est l'ennemi d'une bonne science et d'une
      bonne prise de décision. Le surmonter nécessite une recherche délibérée de
      preuves qui infirment.
    professional_application:
      networking_and_relationship_building: |
        Lors de la formation d'opinions sur les personnes, recherchez activement
        des preuves qui infirment. Demandez « Qu'est-ce qui changerait mon opinion ? »
        et cherchez ces éléments.
      collaborative_learning_initiative: |
        Utilisez l'avocat du diable, les équipes rouges et les pré-mortems pour faire
        émerger des perspectives qui infirment. Récompensez les personnes qui
        remettent en question les points de vue dominants avec de bonnes preuves.
    how_can_this_be_misapplied:
      false_balance: |
        Traiter tous les points de vue comme également valides alors que des preuves
        soutiennent fortement un côté.
      excessive_skepticism: |
        Rejeter toutes les preuves comme étant du « biais de confirmation » alors
        que certaines croyances sont bien étayées.
      contrarianism: |
        Adopter le point de vue opposé uniquement pour éviter le biais de confirmation,
        alors que le point de vue initial pourrait être correct.
      analysis_paralysis: |
        Ne jamais s'engager sur un point de vue parce que « nous pourrions être biaisés ».
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Malédiction de la connaissance
    quick_introduction: |
      La malédiction de la connaissance est la difficulté d'imaginer ce que c'est que de ne pas savoir quelque chose une fois que vous le savez. Les experts ont du mal à enseigner aux débutants car ils ne peuvent pas recréer la perspective du débutant. Une fois que vous savez, vous oubliez ce que c'était de ne pas savoir.
    one_liner: Une fois que vous savez quelque chose, vous oubliez ce que c'était de ne pas savoir.
    try_this:
      - Lorsque vous expliquez, partez des principes premiers - supposez que votre public ne sait rien.
      - Demandez à un débutant de reformuler ; leur confusion révèle vos angles morts.
      - Remarquez quand vous sautez des étapes ou utilisez du jargon que d'autres pourraient ne pas connaître.
    ask_yourself:
      - Est-ce que je suppose que les autres ont le même contexte que moi ?
      - Une personne sans mon parcours comprendrait-elle cela ?
    in_more_detail: |
      Dans une expérience classique, des personnes qui connaissaient la réponse à une énigme ont tapé le rythme d'une chanson et s'attendaient à ce que d'autres la devinent - elles ont surestimé à quel point c'était évident. Les tapeurs ne pouvaient pas "désentendre" la chanson dans leur tête. La connaissance est "collante" ; il est difficile de simuler l'ignorance.

      La malédiction affecte l'enseignement, la communication, la conception de produits et le leadership. Nous supposons que les autres ont le même contexte que nous. Nous utilisons du jargon. Nous sautons des étapes. Nous sommes surpris quand les gens ne "comprennent pas".
    why_this_is_important: |
      Reconnaître la malédiction de la connaissance améliore l'enseignement, la communication et la conception de produits. Cela vous aide à rencontrer les gens là où ils sont plutôt que là où vous êtes. C'est essentiel pour un transfert de connaissances efficace.
    when_to_use:
      - apprentissage
      - leadership
      - résolution_de_problèmes
      - développement_de_relations
    how_can_you_spot_it:
      obvious_to_you: |
        "C'est évident" lorsque c'est seulement évident parce que vous connaissez la réponse.
      jargon_use: |
        Utiliser des termes que le public ne connaît pas sans les définir.
      skipped_steps: |
        Supposer que les autres combleront les lacunes que vous avez laissées.
      frustration_with_learners: |
        "Comment peuvent-ils ne pas le voir ?" lorsqu'ils manquent de votre contexte.
    examples:
      teaching: |
        Un professeur de mathématiques saute des étapes qui lui sont "évidentes" mais
        essentielles pour les étudiants.
      product_design: |
        Les concepteurs créent des interfaces qui ont du sens pour eux mais qui
        confusent les nouveaux utilisateurs.
      onboarding: |
        Les employés expérimentés oublient ce que les nouveaux employés ne savent pas et
        fournissent une formation inadéquate.
      writing: |
        Les auteurs supposent que les lecteurs ont le même parcours et manquent
        le contexte nécessaire.
    real_world_implications: |
      La malédiction de la connaissance crée des lacunes de communication, des produits ratés et un enseignement inefficace. C'est l'une des raisons pour lesquelles les experts peuvent être de mauvais
      enseignants. La surmonter demande un effort délibéré pour adopter la
      perspective du public.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous expliquez, commencez au niveau de l'autre personne. Demandez "Que
        savent-ils déjà ?" Testez votre communication avec quelqu'un
        qui n'a pas votre parcours.
      collaborative_learning_initiative: |
        Utilisez des exercices de type "expliquez comme si j'avais cinq ans". Demandez aux experts d'enseigner
        aux débutants et d'obtenir des retours. Créez une documentation qui ne présuppose aucune connaissance préalable. Utilisez l'enseignement par les pairs - ceux qui ont récemment
        appris se souviennent de la perspective du débutant.
    how_can_this_be_misapplied:
      oversimplification: |
        Simplifier à l'excès au point d'être inexact ou condescendant.
      false_assumption: |
        Supposer que les autres en savent moins qu'ils ne le font - également un échec de
        calibrage.
      one_size_fits_all: |
        Tous les publics n'ont pas besoin du même niveau d'explication ; adaptez
        l'explication au public.
      avoiding_complexity: |
        Certains sujets sont complexes ; la malédiction de la connaissance ne signifie pas
        que nous ne devrions jamais utiliser de langage technique lorsque c'est approprié.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Effet par défaut
    quick_introduction: |
      L'effet par défaut est la tendance à choisir l'option présélectionnée lorsqu'on
      est présenté avec des choix. Ce qui est défini par défaut a un avantage considérable —
      les gens s'y tiennent souvent, qu'elle soit optimale pour eux ou non.
    one_liner: Ce qui est défini par défaut a un avantage considérable — nous nous y tenons.
    try_this:
      - Remarquez lorsque vous acceptez le défaut sans évaluer les alternatives.
      - Lors de la conception de choix, définissez des défauts qui servent les meilleurs intérêts des utilisateurs.
      - Demandez: Choisirais-je ceci s'il n'était pas présélectionné ?
    ask_yourself:
      - Est-ce que je choisis le défaut par inertie, ou parce qu'il est le meilleur pour moi ?
      - Qui a défini ce défaut, et qu'est-ce qu'ils pourraient y gagner ?
    in_more_detail: |
      Les défauts fonctionnent en raison de l'inertie, de l'aversion à la perte (changer donne l'impression de perdre le défaut) et de l'approbation implicite (nous supposons que le défaut est recommandé).
      Les taux de don d'organes varient considérablement selon les pays, en grande partie en fonction du fait que le défaut soit opt-in (avec consentement) ou opt-out (sans consentement). La participation aux plans d'épargne retraite bondit lorsque l'inscription est automatique.

      Les défauts peuvent être utilisés pour le bien (encourager de meilleurs résultats) ou pour la manipulation (dissimuler des conditions défavorables dans des cases pré-cochées). Comprendre l'effet vous aide à concevoir de meilleurs systèmes et à résister aux défauts indésirables.
    why_this_is_important: |
      Comprendre l'effet par défaut vous aide à concevoir une architecture de choix qui améliore les résultats, et cela vous aide à reconnaître quand vos choix sont façonnés par les défauts plutôt que par une préférence délibérée.
    when_to_use:
      - prise_de_decision
      - leadership
      - resolution_de_problemes
      - evaluation_des_risques
    how_can_you_spot_it:
      inertia_toward_default: |
        La plupart des gens s'en tiennent à ce qui est présélectionné.
      implied_recommendation: |
        Nous interprétons le défaut comme "ce qu'ils veulent que nous choisissions".
      opt_in_vs_opt_out: |
        Le cadrage modifie considérablement la participation (opt-in vs opt-out).
      pre_checked_boxes: |
        Les options présélectionnées ont un fort avantage dans les formulaires et les paramètres.
    examples:
      organ_donation: |
        Les pays où le défaut est opt-out ont des taux de don beaucoup plus élevés que les pays où le défaut est opt-in — le défaut est plus important que les attitudes.
      retirement_savings: |
        L'inscription automatique augmente considérablement la participation aux plans 401(k).
      software_installers: |
        Les options "recommandées" et les extensions pré-cochées façonnent ce que les utilisateurs installent.
      subscriptions: |
        Les essais gratuits qui se transforment automatiquement en abonnements payants capturent de nombreuses personnes qui ne choisiraient pas activement de s'abonner.
    real_world_implications: |
      L'effet par défaut est l'un des leviers les plus puissants. Il façonne l'épargne, la santé, la vie privée et le comportement des consommateurs. Une architecture de choix éthique utilise les défauts pour améliorer les résultats ; les "dark patterns" les utilisent pour exploiter.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous concevez des processus pour les autres, choisissez des défauts qui servent leurs intérêts. Évitez les "dark patterns" qui utilisent les défauts pour extraire de la valeur.
      collaborative_learning_initiative: |
        Définissez des défauts pour les pratiques d'équipe (par exemple, par défaut de manière asynchrone, par défaut de documentation) qui correspondent au comportement souhaité. Faites du bon choix le choix facile.
    how_can_this_be_misapplied:
      dark_patterns: |
        Utiliser les défauts pour piéger les gens dans des choix défavorables (par exemple, frais cachés, abonnements indésirables).
      paternalism: |
        Imposer des défauts qui outrepassent la préférence réelle sans consentement.
      manipulation: |
        Dissimuler des conditions défavorables dans les défauts et compter sur l'inertie.
      one_size_fits_all: |
        Supposer que le même défaut convient à tout le monde alors que les préférences varient.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Effet Dunning-Kruger
    quick_introduction: |
      L'effet Dunning-Kruger décrit un biais cognitif où les personnes ayant des connaissances ou des compétences limitées dans un domaine surestiment leur compétence, tandis que les experts ont tendance à la sous-estimer. Moins on en sait, plus on peut être confiant.
    one_liner: Moins on en sait, plus on peut être confiant.
    try_this:
      - Dans de nouveaux domaines, supposez que vous êtes trop confiant — recherchez des retours et une calibration.
      - Lorsque les experts expriment des doutes, prenez-les au sérieux ; ils peuvent connaître les cas limites.
      - Remarquez quand les novices sont plus certains que les experts dans un domaine.
    ask_yourself:
      - Suis-je au "pic de la stupidité" ou dans la "vallée de l'humilité" ?
      - Ai-je la capacité métacognitive d'évaluer ma propre compétence ici ?
    in_more_detail: |
      Les recherches de Dunning et Kruger ont montré que les individus incompétents manquent de la capacité métacognitive pour reconnaître leur propre incompétence. Pour évaluer votre performance, vous avez besoin des mêmes compétences requises pour bien performer — ainsi, les non qualifiés sont doublement désavantagés : ils performent mal et ne le savent pas.

      À mesure que la compétence augmente, les gens éprouvent souvent une "vallée de l'humilité" où ils reconnaissent combien ils ne savent pas. Les vrais experts peuvent manquer de confiance car ils sont très conscients des nuances et des cas limites.
    why_this_is_important: |
      Reconnaître l'effet Dunning-Kruger vous aide à calibrer votre propre confiance, à éviter de surestimer les opinions des novices et à apprécier l'humilité des experts. C'est essentiel pour l'apprentissage, l'embauche et la prise de décision.
    when_to_use:
      - apprentissage
      - prise_de_decision
      - leadership
      - parcours_professionnel
    how_can_you_spot_it:
      novice_overconfidence: |
        Quelqu'un avec peu d'expérience exprime des opinions fortes et non qualifiées.
      expert_underconfidence: |
        Les personnes hautement qualifiées sont plus prudentes et expriment plus d'incertitude que les personnes moins qualifiées.
      inability_to_recognize_quality: |
        Les mauvaises performances ne peuvent pas distinguer le bon travail du mauvais travail dans leur domaine.
      confidence_competence_mismatch: |
        La confiance et la capacité réelle sont inversement corrélées chez les débutants.
    examples:
      social_media: |
        Les personnes ayant une connaissance superficielle d'un sujet argumentent avec confiance avec des experts du domaine.
      hiring: |
        Les candidats qui performent mal lors des entretiens évaluent parfois leur propre performance de manière élevée.
      investing: |
        Les nouveaux investisseurs peuvent être trop confiants après des gains précoces, sans reconnaître la chance.
      workplace: |
        Les employés juniors peuvent surestimer leur préparation à une promotion tandis que les seniors doutent d'eux-mêmes.
    real_world_implications: |
      L'effet Dunning-Kruger affecte l'éducation, l'embauche, la politique et le discours public. Il explique pourquoi de mauvaises idées sont amplifiées et pourquoi les experts peuvent être ignorés. La calibration est importante pour la prise de décision individuelle et collective.
    professional_application:
      networking_and_relationship_building: |
        Quand quelqu'un est très confiant, considérez s'il pourrait être dans la zone Dunning-Kruger. Recherchez des perspectives diverses, y compris celles de ceux qui expriment de l'incertitude.
      collaborative_learning_initiative: |
        Créez des cultures où admettre l'incertitude est valorisé. Encouragez les exercices de calibration et les retours qui aident les gens à évaluer précisément leur compétence.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Supposez que les personnes confiantes ont toujours tort ; parfois la confiance est justifiée.
      false_modesty: |
        Des experts prétendant en savoir moins qu'ils ne le font pour paraître humbles.
      gatekeeping: |
        Utiliser Dunning-Kruger pour rejeter toute personne qui n'est pas d'accord avec les "experts" sans engager leurs arguments.
      self_doubt_paralysis: |
        Sur-corriger au point de ne jamais faire confiance à son propre jugement.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: effet_barnum
    name: Effet Barnum
    introduction_rapide: |
      L'effet Barnum (ou effet Forer) est la tendance à accepter des descriptions de personnalité vagues et générales comme étant uniques et précises. Les horoscopes, les diseurs de bonne aventure et les tests de personnalité utilisent des déclarations qui s'appliquent à presque tout le monde, mais nous croyons qu'elles nous sont spécifiques. Nous nous retrouvons dans le générique.
    en_une_phrase: Les déclarations vagues semblent personnelles parce qu'elles s'appliquent à presque tout le monde.
    essayez_ceci:
      - Demandez: Cette description pourrait-elle s'appliquer à beaucoup de personnes ? Testez-la sur quelqu'un d'autre.
      - Recherchez des commentaires comportementaux spécifiques plutôt que des éloges ou des critiques vagues.
      - Remarquez quand les aperçus "personnalisés" semblent trop beaux pour être discriminants.
    demandez_vous:
      - Ce commentaire semblerait-il exact s'il était donné à un étranger ?
      - Est-ce que je me souviens des succès et oublie les échecs ?
    en_plus_de_détail: |
      Le psychologue Bertram Forer a donné à ses étudiants des commentaires "personnalisés" identiques (par exemple, "Vous avez besoin que les autres vous aiment et vous admirent") et ils les ont jugés très précis. Les déclarations étaient suffisamment vagues pour s'appliquer à n'importe qui. P.T. Barnum aurait dit "Il naît un imbécile chaque minute", l'effet porte son nom en raison de son talent à séduire les masses avec des généralités qui semblent personnalisées.

      L'effet fonctionne parce que nous sommes bons pour trouver une pertinence personnelle dans les déclarations ambiguës. Nous nous souvenons des succès et oublions les échecs. C'est la base de la lecture à froid et de nombreux produits de "personnalité".
    pourquoi_c_est_important: |
      Reconnaître l'effet Barnum vous aide à évaluer les évaluations de personnalité, à résister à la manipulation et à éviter de surinterpréter des commentaires vagues. Cela explique pourquoi les horoscopes semblent précis et pourquoi certains conseils "personnalisés" sont génériques.
    quand_utiliser:
      - prise_de_decision
      - apprentissage
      - évaluation_des_risques
      - développement_des_relations
    comment_le_repérer:
      précision_vague: |
        Des commentaires qui semblent personnels mais qui pourraient s'appliquer à de nombreuses personnes.
      ajustement_sélectif: |
        Nous nous concentrons sur ce qui correspond et ignorons ce qui ne correspond pas.
      lecture_à_froid: |
        Quelqu'un vous "lit" avec des déclarations qui sont en fait génériques.
      enthousiasme_pour_les_tests_de_personnalité: |
        Acceptation acritique des résultats d'évaluation comme étant d'une perspicacité unique.
    exemples:
      horoscopes: |
        "Vous doutez parfois de vos décisions" semble personnel mais s'applique à la plupart des gens.
      voyance: |
        Des prédictions vagues que nous interprétons comme spécifiques à notre situation.
      tests_de_personnalité: |
        Certaines évaluations utilisent des déclarations de type Barnum et semblent précises sans être discriminantes.
      retours: |
        Des retours de performance génériques que nous interprétons comme profondément personnalisés.
    implications_dans_le_monde_réel: |
      L'effet Barnum est exploité dans l'astrologie, certains coachings et les évaluations de mauvaise qualité. Il peut créer une fausse confiance dans des outils invalides. Il explique également pourquoi nous sommes sensibles à la flatterie et aux retours positifs vagues.
    application_professionnelle:
      réseautage_et_développement_des_relations: |
        Lorsque vous recevez des commentaires, demandez "Cela pourrait-il s'appliquer à de nombreuses personnes ?" Recherchez des commentaires comportementaux spécifiques plutôt que des éloges ou des critiques vagues. Méfiez-vous des aperçus "personnalisés" qui semblent trop beaux.
      initiative_d_apprentissage_collaboratif: |
        Lors de l'utilisation d'évaluations, choisissez des outils validés avec une validité discriminante. Évitez les instruments qui reposent sur des déclarations de type Barnum. Formez les gens à reconnaître les commentaires vagues.
    comment_cela_peut_être_mal_appliqué:
      rejeter_tous_les_commentaires: |
        Tous les retours personnalisés ne sont pas de type Barnum ; certains sont réellement spécifiques. Ne rejetez pas tout ce qui est vague.
      invalider_l_expérience: |
        Dire à quelqu'un que son expérience d'illumination est "juste Barnum" alors qu'elle peut avoir de la valeur pour lui.
      surcorrection: |
        Rejeter toutes les structures de personnalité parce que certaines utilisent des déclarations de type Barnum.
      faux_scepticisme: |
        Supposer que parce que quelque chose semble précis, cela doit être Barnum ; parfois, les choses sont précises.
    contenu_connexe:
      - biais_de_confirmation
      - effet_de_halo
      - heuristique_de_disponibilité
      - sophisme_narratif
    quick_introduction: |
      The empathy gap is the difficulty of understanding and predicting the mental
      states of others when we're in a different state ourselves. When we're
      calm, we underestimate how we'll feel when angry or hungry. When we're
      full, we underestimate how much we'll want food when hungry.
    in_more_detail: |
      We have trouble imagining how we'll feel in different circumstances—and
      how others feel when they're in states we're not currently in. A sober
      person underestimates the pull of addiction. A well-rested person
      underestimates the impact of sleep deprivation. We project our current
      state onto others and onto our future selves.

      The empathy gap affects decisions we make for our future selves (e.g.,
      committing to exercise when we're motivated), decisions we make for
      others, and our ability to understand people in different states.
    why_this_is_important: |
      Recognizing the empathy gap improves decision-making for future you,
      empathy for others, and understanding of our own variability. It
      explains why we make commitments we can't keep and why we misunderstand
      others in distress.
    when_to_use:
      - decision-making
      - relationship_building
      - leadership
      - conflict_resolution
    how_can_you_spot_it:
      current_state_projection: |
        Assuming others feel as we do now, or that future we will feel as we
        do now.
      underestimating_emotional_state: |
        "What's the big deal?" when we're not in the state they're in.
      commitment_failures: |
        Making choices based on current motivation that we won't follow through
        on when motivation fades.
      misunderstanding_others: |
        Dismissing others' experiences because we can't imagine them from our
        current state.
    examples:
      hunger: |
        Grocery shopping when full—we buy less than we'll want when hungry.
      addiction: |
        Non-addicts underestimate the difficulty of quitting; addicts in
        recovery may underestimate the pull when they're using.
      conflict: |
        When calm, we underestimate how we'll react in the moment of
        confrontation.
      motivation: |
        Signing up for a 6am class when we're motivated—and not going when
        we're sleepy.
    professional_application:
      networking_and_relationship_building: |
        When someone is stressed, angry, or in a different state, don't
        assume they'll reason as you would. Try to imagine their state.
        When making commitments, consider how you'll feel when motivation
        fades.
      collaborative_learning_initiative: |
        When planning, consider how the team will feel when tired, under
        pressure, or frustrated. Design for those states, not just the
        motivated planning state.
    how_can_this_be_misapplied:
      overattribution: |
        Dismissing all misunderstanding as "empathy gap" when sometimes
        people genuinely have different values.
      excusing_behavior: |
        "They couldn't help it—empathy gap" when people are responsible
        for managing their states.
      false_relativism: |
        Assuming we can never understand others when we can improve with
        effort and experience.
      self_excuse: |
        Using the empathy gap to justify our own failures of follow-through.
    real_world_implications: |
      The empathy gap affects addiction treatment, policy, and interpersonal
      understanding. It explains why we make commitments we break and why we
      often fail to understand others' perspectives. It's a barrier to
      empathy and good decision-making.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: empathy_gap
    name: Écart d'empathie
    quick_introduction: |
      L'écart d'empathie est la difficulté de comprendre et de prévoir les états mentaux
      des autres lorsque nous sommes nous-mêmes dans un état différent. Lorsque nous sommes
      calmes, nous sous-estimons ce que nous ressentirons lorsque nous serons en colère ou affamés. Lorsque nous sommes rassasiés, nous sous-estimons ce que nous voudrons manger lorsque nous aurons faim.
    one_liner: Nous sous-estimons ce que nous ressentirons — et ce que les autres ressentent — dans des états différents.
    try_this:
      - Lorsque vous êtes calme, prenez des engagements pour lorsque vous serez stressé ; pré-engagez-vous.
      - Ne jugez pas les autres dans un état où vous n'êtes pas — affamé, fatigué, effrayé.
      - Demandez: Est-ce que je projette mon état actuel sur mon moi futur ou sur les autres ?
    ask_yourself:
      - Est-ce que je sous-estime ce que je ressentirai dans un état différent ?
      - Comprendrais-je mieux cette personne si j'étais dans son état ?
    in_more_detail: |
      Nous avons du mal à imaginer ce que nous ressentirons dans des circonstances différentes — et
      ce que les autres ressentent lorsqu'ils sont dans des états où nous ne sommes pas actuellement. Une personne sobre
      sous-estime l'attrait de la dépendance. Une personne bien reposée
      sous-estime l'impact du manque de sommeil. Nous projetons notre état actuel
      sur les autres et sur nos selves futurs.

      L'écart d'empathie affecte les décisions que nous prenons pour nos selves futurs (par exemple,
      nous engager à faire de l'exercice lorsque nous sommes motivés), les décisions que nous prenons pour
      les autres, et notre capacité à comprendre les personnes dans des états différents.
    why_this_is_important: |
      Reconnaître l'écart d'empathie améliore la prise de décision pour votre moi futur,
      l'empathie envers les autres, et la compréhension de notre propre variabilité. Cela
      explique pourquoi nous prenons des engagements que nous ne pouvons pas tenir et pourquoi nous comprenons mal
      les personnes en détresse.
    when_to_use:
      - prise_de_decision
      - construction_relationnelle
      - leadership
      - resolution_de_conflits
    how_can_you_spot_it:
      current_state_projection: |
        Supposer que les autres ressentent comme nous maintenant, ou que notre futur nous ressentira comme nous
        ressentons maintenant.
      underestimating_emotional_state: |
        "Quel est le problème ?" lorsque nous ne sommes pas dans l'état où ils se trouvent.
      commitment_failures: |
        Prendre des décisions basées sur la motivation actuelle que nous ne suivrons pas
        lorsque la motivation s'estompera.
      misunderstanding_others: |
        Ignorer les expériences des autres parce que nous ne pouvons pas les imaginer depuis notre
        état actuel.
    examples:
      hunger: |
        Faire les courses quand on est rassasié — nous achetons moins que ce que nous voudrons quand nous aurons faim.
      addiction: |
        Les non-addicts sous-estiment la difficulté d'arrêter ; les addicts en
        rétablissement peuvent sous-estimer l'attrait lorsqu'ils consomment.
      conflict: |
        Lorsque nous sommes calmes, nous sous-estimons la façon dont nous réagirions au moment de
        la confrontation.
      motivation: |
        S'inscrire à un cours à 6h du matin quand on est motivé — et ne pas y aller quand
        on est fatigué.
    real_world_implications: |
      L'écart d'empathie affecte le traitement de la dépendance, les politiques et la compréhension interpersonnelle. Il explique pourquoi nous prenons des engagements que nous brisons et pourquoi nous échouons souvent à comprendre les perspectives des autres. C'est un obstacle à l'empathie et à une bonne prise de décision.
    professional_application:
      networking_and_relationship_building: |
        Lorsque quelqu'un est stressé, en colère, ou dans un état différent, n'
        assumez pas qu'il raisonnera comme vous. Essayez d'imaginer son état.
        Lorsque vous prenez des engagements, considérez ce que vous ressentirez lorsque la motivation
        s'estompera.
      collaborative_learning_initiative: |
        Lors de la planification, considérez ce que l'équipe ressentira lorsqu'elle sera fatiguée, sous
        pression, ou frustrée. Concevez pour ces états, pas seulement pour l'état de planification motivé.
    how_can_this_be_misapplied:
      overattribution: |
        Ignorer tout malentendu comme un "écart d'empathie" alors que parfois
        les gens ont de véritables valeurs différentes.
      excusing_behavior: |
        "Ils ne pouvaient pas s'en empêcher — écart d'empathie" alors que les gens sont responsables
        de gérer leurs états.
      false_relativism: |
        Supposer que nous ne pouvons jamais comprendre les autres alors que nous pouvons nous améliorer avec
        l'effort et l'expérience.
      self_excuse: |
        Utiliser l'écart d'empathie pour justifier nos propres échecs de suivi.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Effet de dotation
    quick_introduction: |
      L'effet de dotation est la tendance à accorder plus de valeur à quelque chose simplement
      parce que nous le possédons. Nous demandons plus pour céder un objet que nous serions prêts à payer
      pour l'acquérir. La possession crée un attachement qui déforme notre évaluation.
    one_liner: Nous valorisons davantage ce que nous possédons que ce que nous ne possédons pas — la possession crée un attachement.
    try_this:
      - Demander: Que paierais-je pour acquérir ceci si je ne le possédais pas ?
      - En vendant, imaginez que vous achetez — paieriez-vous votre prix demandé ?
      - Remarquer quand la possession gonfle votre évaluation.
    ask_yourself:
      - Est-ce que je surévalue ceci parce que je le possède ?
      - Un acheteur neutre serait-il d'accord avec mon prix ?
    in_more_detail: |
      Dans les expériences, les personnes à qui l'on donne aléatoirement une tasse demandent environ deux fois plus pour
      la vendre que ce que d'autres sont prêts à payer pour l'acheter. Le simple fait de la possession
      augmente la valeur perçue. Ceci est lié à l'aversion à la perte — céder
      quelque chose ressemble à une perte, et nous sommes averses à la perte. Mais l'effet va
      au-delà de cela : nous intégrons les objets possédés dans notre identité.

      L'effet de dotation affecte les négociations, le comportement des consommateurs et
      les changements organisationnels. Il explique pourquoi les gens surévaluent leurs maisons,
      leurs idées et leurs rôles actuels. Il crée des frictions dans les échanges
      et les transitions.
    why_this_is_important: |
      Reconnaître l'effet de dotation vous aide à négocier plus efficacement,
      à prendre des décisions plus claires sur ce qu'il faut garder ou laisser partir, et à comprendre
      pourquoi les autres surévaluent ce qu'ils ont. Il explique également la résistance au
      changement.
    when_to_use:
      - prise_de_decision
      - negotiation
      - investissement
      - evolution_de_carriere
    how_can_you_spot_it:
      ownership_premium: |
        "Je ne le vendrais pas pour ça" alors que vous ne paieriez pas ça pour l'acheter.
      attachment_to_possession: |
        Valoriser davantage les choses une fois que nous les avons.
      resistance_to_trading: |
        Réticence à échanger ou à faire du commerce même lorsque ce serait rationnel.
      overvaluation_of_own_ideas: |
        Nos idées, projets ou rôles semblent plus précieux parce qu'ils sont les nôtres.
    examples:
      real_estate: |
        Les propriétaires immobiliers surévaluent souvent leurs maisons — ils les valorisent plus que
        le marché ne le fait.
      negotiations: |
        Les vendeurs demandent plus que ce que les acheteurs sont prêts à payer ; l'écart reflète
        l'effet de dotation.
      career: |
        Surévaluation de notre emploi, de notre entreprise ou de notre rôle actuel lorsque l'on envisage
        un changement.
      ideas: |
        Biais "pas inventé ici" et "mon idée" — nous surévaluons ce que nous avons créé ou possédons.
    real_world_implications: |
      L'effet de dotation crée des frictions sur le marché, ralentit les échanges bénéfiques
      et alimente la résistance au changement. Il affecte les fusions, les réorganisations
      et les transitions personnelles. Le comprendre
      améliore la négociation et la gestion du changement.
    professional_application:
      networking_and_relationship_building: |
        Lorsqu'une personne résiste au changement, considérez qu'elle pourrait éprouver
        l'effet de dotation — elle valorise davantage le statu quo parce qu'elle le "possède".
        Cadrez le changement en termes de ce qu'elle gagne, et pas seulement de ce qu'elle cède.
      collaborative_learning_initiative: |
        Lors de l'introduction de nouveaux processus, reconnaissez que les gens sont attachés
        aux méthodes actuelles. Créez une sécurité psychologique pour "lâcher prise" sur
        l'ancien avant d'adopter le nouveau.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Certains attachements sont rationnels — valeur sentimentale, coûts de changement.
        Toute résistance n'est pas l'effet de dotation.
      manipulation: |
        Créer un faux sentiment de propriété pour extraire des prix plus élevés (par exemple,
        "essayez gratuitement" pour déclencher la dotation).
      undervaluing_continuity: |
        Supposer que toute résistance au changement est irrationnelle alors que la continuité
        a une valeur réelle.
      cold_rationality: |
        Rejeter l'attachement émotionnel comme "juste l'effet de dotation" alors qu'il
        reflète des valeurs authentiques.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: L'effet de faux consensus
    quick_introduction: |
      L'effet de faux consensus est la tendance à surestimer dans quelle mesure les autres sont d'accord avec
      nos croyances, attitudes et comportements. Nous supposons que nos points de vue sont plus courants qu'ils ne le sont
      réellement, et nous avons du mal à imaginer que des personnes raisonnables puissent être en désaccord.
    one_liner: Nous surestimons dans quelle mesure les autres sont d'accord avec nous.
    try_this:
      - Recherchez activement les personnes qui ne sont pas d'accord – ne supposez pas le consensus.
      - Avant de vous lancer, testez auprès de personnes qui ne partagent pas vos hypothèses.
      - Demandez: Que dirait quelqu'un qui n'est pas d'accord ? Prenez-le au sérieux.
    ask_yourself:
      - Est-ce que je suppose que les autres pensent comme moi ?
      - Quand ai-je été surpris pour la dernière fois par le point de vue différent de quelqu'un ?
    in_more_detail: |
      Lorsque nous adoptons une position, nous avons tendance à penser que c'est la norme. Nous nous entourons de
      personnes partageant les mêmes idées, consommons des médias confirmants et interprétons les retours ambigus comme un
      accord. Cela crée une chambre d'écho qui renforce l'illusion du consensus.

      L'effet est plus fort pour les croyances profondément ancrées et lorsque nous sommes très investis dans notre
      position. Cela peut entraîner des surprises lorsque d'autres ne sont pas d'accord, des difficultés dans les négociations
      et de mauvaises études de marché lorsque nous supposons que les clients pensent comme nous.
    why_this_is_important: |
      Reconnaître l'effet de faux consensus vous aide à vous préparer à un désaccord réel,
      à mener de meilleures recherches et à communiquer plus efficacement. C'est essentiel pour
      le développement de produits, la négociation et le leadership.
    when_to_use:
      - prise_de_decision
      - négociation
      - leadership
      - résolution_de_problèmes
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Vous êtes sincèrement choqué lorsque quelqu'un n'est pas d'accord avec ce que vous considérez comme évident.
      assuming_shared_values: |
        Vous agissez comme si les autres partageaient vos priorités sans vérifier.
      underestimating_opposition: |
        Vous vous attendez à ce que les propositions rencontrent moins de résistance qu'elles ne le font.
      echo_chamber_detection: |
        Votre environnement social et informationnel remet rarement en question vos points de vue.
    examples:
      product_development: |
        Une équipe suppose que les utilisateurs veulent la fonctionnalité X parce que tout le monde dans l'équipe la veut – pour ensuite
        constater une faible adoption.
      politics: |
        Les personnes dans une bulle politique sont surprises par les résultats d'élection qui ne correspondent pas
        à leurs attentes.
      negotiation: |
        Supposer que l'autre partie acceptera les conditions parce qu'elles vous semblent "raisonnables".
      hiring: |
        Embaucher pour "l'adéquation culturelle" peut signifier embaucher des personnes qui sont d'accord avec vous, renforçant
        le faux consensus.
    real_world_implications: |
      L'effet de faux consensus contribue à la polarisation, aux lancements de produits ratés
      et aux négociations rompues. Il nous rend trop confiants dans nos prédictions et
      mal préparés à la dissidence.
    professional_application:
      networking_and_relationship_building: |
        Recherchez activement des personnes ayant des perspectives différentes. Ne supposez pas de croyances partagées –
        demandez et écoutez.
      collaborative_learning_initiative: |
        Dans les équipes, utilisez la dissidence structurée (par exemple, les "prémortems", l'avocat du diable) pour faire émerger le
        désaccord avant qu'il ne devienne coûteux.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Supposer que ceux qui ne sont pas d'accord sont déraisonnables ou mal informés plutôt que de considérer
        qu'ils peuvent avoir des perspectives différentes et valables.
      poor_research: |
        Sauter la recherche client parce que "nous savons déjà ce qu'ils veulent".
      overconfidence: |
        Faire des paris audacieux sur la supposition que les autres seront d'accord.
      groupthink_amplification: |
        Les équipes qui ne remettent pas en question l'effet de faux consensus peuvent sombrer dans la pensée de groupe.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Effet de cadrage
    quick_introduction: |
      L'effet de cadrage est la tendance de nos décisions à changer en fonction de la manière dont
      les options sont présentées, même lorsque les faits sous-jacents sont identiques. "90 %
      de survie" et "10 % de mortalité" décrivent le même résultat mais suscitent des
      choix différents. Le cadre façonne la décision.
    one_liner: Les mêmes faits, présentés différemment, mènent à des décisions différentes.
    try_this:
      - Recadrez les options de plusieurs manières avant de décider: cadre de gain et cadre de perte.
      - Remarquez quand votre choix change en fonction de la formulation.
      - Demandez: Quels sont les faits sous-jacents, dépouillés du cadre ?
    ask_yourself:
      - Prendrais-je une décision différente si cela était présenté comme un gain par rapport à une perte ?
      - Est-ce que je réagis au cadre ou au résultat réel ?
    in_more_detail: |
      Kahneman et Tversky ont montré que les gens sont averses au risque lorsque les options sont
      présentées comme des gains et qu'ils recherchent le risque lorsqu'elles sont présentées comme des pertes, même pour les mêmes
      résultats. Un cadrage positif ("sauver 200 vies") par rapport à un cadrage négatif ("400
      mourront") modifie les préférences. Les cadres de perte déclenchent des réponses émotionnelles plus fortes
      que des cadres de gain équivalents.

      L'effet de cadrage affecte les décisions médicales, les politiques, le marketing et
      la négociation. C'est l'un des biais les plus puissants et les mieux documentés.
      La prise de conscience aide, mais il est difficile de le surmonter complètement.
    why_this_is_important: |
      Reconnaître l'effet de cadrage vous aide à prendre des décisions plus cohérentes,
      à résister à la manipulation et à communiquer plus efficacement. Il explique également
      pourquoi la même offre peut être acceptée ou rejetée en fonction de la présentation.
    when_to_use:
      - prise_de_decision
      - negotiation
      - leadership
      - evaluation_du_risque
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Le même résultat présenté comme un gain par rapport à une perte produit des choix différents.
      presentation_dependence: |
        Les décisions changent lorsque seul le cadrage change, pas la substance.
      default_influence: |
        La manière dont les options sont ordonnées ou étiquetées affecte les choix.
      emotional_trigger: |
        Certains cadres déclenchent des réponses émotionnelles plus fortes.
    examples:
      medical: |
        "90 % de survie" contre "10 % de mortalité" pour la même procédure :
        les gens choisissent différemment en fonction du cadre.
      sales: |
        "Économisez 50 €" contre "Ne perdez pas 50 €" : cadres équivalents, impact
        psychologique différent.
      policy: |
        "Allègement fiscal" contre "dépenses publiques" : même politique, réponse
        politique différente.
      negotiation: |
        Présenter une offre comme une "réduction" par rapport à "éviter une surtaxe"
        modifie les taux d'acceptation.
    real_world_implications: |
      L'effet de cadrage est exploité dans la publicité, la politique et
      la négociation. Il affecte les décisions médicales et le soutien aux politiques.
      Recadrer peut améliorer les décisions et la communication. Être conscient
      aide, mais n'élimine pas complètement l'effet.
    professional_application:
      networking_and_relationship_building: |
        Lors de la présentation d'options, considérez plusieurs cadres. Testez comment
        différents cadrages affectent la réception. Lorsque vous recevez des informations,
        demandez : "Comment cela pourrait-il être présenté autrement ?"
      collaborative_learning_initiative: |
        En matière de prise de décision, recadrez explicitement les options pour vérifier
        les effets de cadrage. "Si nous présentions cela comme une perte, déciderions-nous différemment ?" Utilisez un cadrage cohérent pour l'équité.
    how_can_this_be_misapplied:
      manipulation: |
        Cadrer délibérément pour orienter les gens vers des résultats souhaités
        sans qu'ils en soient conscients.
      false_equivalence: |
        Supposer que tous les cadrages sont également valides alors que certains obscurcissent
        des informations importantes.
      overcorrection: |
        Ignorer complètement le cadrage en supposant qu'il n'a pas d'importance :
        il en a.
      spin: |
        Utiliser le cadrage pour induire en erreur plutôt que pour clarifier.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Erreur d'attribution fondamentale
    quick_introduction: |
      L'erreur d'attribution fondamentale est la tendance à attribuer le comportement des autres
      à leur caractère ou à leur personnalité, tout en attribuant notre propre comportement à
      des facteurs situationnels. Nous jugeons les autres par leurs actions et nous-mêmes par nos
      intentions.
    one_liner: Nous jugeons les autres par leurs actions, nous-mêmes par nos intentions.
    try_this:
      - Quand quelqu'un vous frustre, demandez: Quels facteurs situationnels pourraient expliquer cela ?
      - Appliquez aux autres la même générosité que vous vous appliquez à vous-même.
      - Remarquez quand vous attribuez le comportement des autres au caractère, et non aux circonstances.
    ask_yourself:
      - Expliquerais-je mon propre comportement de la même manière que j'explique le leur ?
      - Qu'est-ce que je pourrais manquer concernant leur situation ?
    in_more_detail: |
      Quand quelqu'un nous coupe la route dans la circulation, nous pensons "quel imbécile". Quand nous coupons la route à quelqu'un, nous pensons "j'étais obligé, j'étais pressé". Nous expliquons nos propres échecs par la circonstance ("la circulation était terrible") et les échecs des autres par la disposition ("ils sont paresseux"). L'inverse est vrai pour le succès : nous nous attribuons le mérite, nous attribuons le succès des autres à la chance.

      L'erreur est "fondamentale" car elle est omniprésente et persistante. Elle
      mine l'empathie, alimente les conflits et fausse l'évaluation des performances.
    why_this_is_important: |
      Reconnaître l'erreur d'attribution fondamentale améliore les relations,
      réduit les conflits et conduit à des jugements plus justes. Elle encourage à considérer
      le contexte avant de conclure que quelqu'un "est" d'une certaine manière.
    when_to_use:
      - construction_relations
      - resolution_conflits
      - leadership
      - prise_decision
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "C'est juste le genre de personne" pour expliquer le comportement des autres.
      situational_explanation_for_self: |
        "Je n'avais pas le choix" ou "Les circonstances m'ont obligé" pour expliquer le nôtre.
      character_vs_context: |
        Supposer le caractère alors que la situation pourrait expliquer le comportement.
      asymmetric_standards: |
        Tenir les autres à des normes plus strictes que celles que nous nous imposons.
    examples:
      traffic: |
        L'erreur d'un autre conducteur = "mauvais conducteur". Notre erreur = "situation inévitable".
      workplace: |
        Le délai manqué d'un collègue = "irresponsable". Notre délai manqué =
        "surchargé et personne n'aurait pu faire mieux".
      politics: |
        Les opinions des opposants = "ils sont stupides ou méchants". Nos opinions = "réponse rationnelle
        aux faits".
      performance: |
        Le succès des autres = "chanceux". Notre succès = "mérité grâce à un travail acharné".
    real_world_implications: |
      L'erreur d'attribution fondamentale alimente les conflits, nuit au travail d'équipe et
      fausse l'embauche et l'évaluation des performances. La corriger améliore
      la culture organisationnelle et les relations personnelles.
    professional_application:
      networking_and_relationship_building: |
        Quand quelqu'un vous déçoit, demandez "Quels facteurs situationnels pourraient expliquer cela ?" avant de conclure qu'il est peu fiable ou difficile.
      collaborative_learning_initiative: |
        Dans les retours et les évaluations, encouragez les interprétations "la situation d'abord".
        Formez les managers à considérer le contexte avant d'attribuer au caractère.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Rejeter chaque action comme "situationnelle" alors que certains comportements reflètent
        le caractère.
      no_accountability: |
        Utiliser l'erreur pour éviter de tenir les gens responsables des choix qu'ils ont faits.
      self_deprecation: |
        Surcorrection pour toujours se blâmer soi-même et ne jamais reconnaître la responsabilité des autres.
      ignoring_patterns: |
        Quand quelqu'un se comporte mal de manière répétée dans différentes situations, la disposition peut
        être pertinente.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Sophisme du parieur
    quick_introduction: |
      Le sophisme du parieur est la croyance erronée que des événements indépendants passés
      affectent les événements futurs. Après une série de piles, nous pensons que face est "dû"—même
      si chaque lancer est indépendant. Nous voyons des motifs dans le hasard et
      attendons une "correction" ou une "réversion" alors qu'aucune n'est nécessaire.
    one_liner: Les événements indépendants passés n'affectent pas les événements futurs—la pièce n'a pas de mémoire.
    try_this:
      - Lorsque vous pensez "Je suis dû pour une victoire", demandez-vous: ces événements sont-ils réellement indépendants ?
      - Distinguer la régression vers la moyenne (réelle) du sophisme du parieur (faux).
      - Remarquez quand vous voyez des motifs dans le hasard.
    ask_yourself:
      - Est-ce que je suppose que les résultats passés affectent les résultats futurs alors qu'ils sont indépendants ?
      - Un statisticien serait-il d'accord avec mon raisonnement "dû pour un changement" ?
    in_more_detail: |
      Dans un lancer de pièce équilibré, chaque lancer est indépendant. La probabilité de pile
      est toujours de 50%, quelles que soient les issues passées. Mais nous avons le sentiment qu'une longue série
      d'un résultat rend l'autre plus probable. Nous confondons la loi des grands nombres (sur de nombreux essais, les résultats s'équilibrent) avec une "correction" à court terme. Le casino n'a pas de mémoire.

      Le sophisme affecte les jeux de hasard, l'investissement et la prise de décision quotidienne.
      Nous supposons que la "chance" s'équilibrera ou que nous sommes "dûs" pour une victoire.
      Parfois, nous avons raison—mais pour les mauvaises raisons.
    why_this_is_important: |
      Reconnaître le sophisme du parieur évite des erreurs coûteuses dans les jeux de hasard
      et l'investissement. Cela vous aide également à éviter de surinterpréter les courtes séries
      et d'attendre une fausse réversion. Il distingue la véritable régression
      vers la moyenne du sophisme.
    when_to_use:
      - prise_de_decision
      - investissement
      - évaluation_du_risque
      - résolution_de_problèmes
    how_can_you_spot_it:
      due_for_a_change: |
        "Nous avons eu tellement de pertes—nous sommes dus pour une victoire."
      pattern_in_randomness: |
        Voir des motifs significatifs dans des séquences aléatoires.
      hot_hand_fallacy: |
        Croire qu'une série va continuer (erreur liée mais opposée).
      independence_ignorance: |
        Traiter des événements indépendants comme s'ils étaient connectés.
    examples:
      gambling: |
        Après plusieurs rouges à la roulette, parier sur le noir parce que "le rouge ne peut pas continuer à sortir".
      investing: |
        "Le marché a baissé—il doit remonter."
      hiring: |
        "Nous avons embauché plusieurs mauvais candidats—le prochain sera forcément bon."
      sports: |
        "Il a manqué tellement de tirs—il est dû pour marquer le prochain."
    real_world_implications: |
      Le sophisme du parieur entraîne des pertes aux jeux de hasard et de mauvaises décisions d'investissement.
      Il explique aussi pourquoi nous surinterprétons les motifs à court terme.
      Le distinguer de la véritable régression vers la moyenne (où il y a une vraie moyenne vers laquelle régresser) est important.
    professional_application:
      networking_and_relationship_building: |
        Ne supposez pas que les dynamiques relationnelles passées vont "se corriger" à l'avenir—chaque interaction est quelque peu indépendante. Mais apprenez des motifs lorsqu'il y a une véritable cause sous-jacente.
      collaborative_learning_initiative: |
        Lors de l'évaluation des performances, distinguez la variation aléatoire du
        changement systématique. Les courtes séries peuvent être du bruit ; ne réagissez pas de manière excessive aux "séries" ou n'attendez pas de fausse réversion.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Parfois, la régression vers la moyenne est réelle (par exemple, les performances de compétence).
        Ne rejetez pas toute réversion comme étant le sophisme du parieur.
      false_independence: |
        Supposer que les événements sont indépendants alors qu'ils ne le sont pas (par exemple, des mesures répétées de la même chose).
      overcorrection: |
        Ne jamais attendre de réversion lorsqu'il y a une vraie moyenne vers laquelle régresser.
      dismissing_patterns: |
        Certains motifs sont réels—toutes les séquences ne sont pas aléatoires.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Pensée de groupe
    quick_introduction: |
      La pensée de groupe est la tendance des groupes soudés à privilégier le consensus et l'harmonie plutôt que l'évaluation critique. Les membres suppriment la dissidence, s'autocensurent et se conforment à la perception du groupe. Le désir d'unanimité l'emporte sur le désir de prendre la meilleure décision.
    one_liner: Harmonie avant la vérité — les groupes privilégient le consensus plutôt que l'évaluation critique.
    try_this:
      - Désignez un avocat du diable ; faites en sorte que la dissidence soit attendue et sûre.
      - Demandez: Que ne disons-nous pas ? Que dirions-nous si nous n'étions pas dans ce groupe ?
      - Recherchez des perspectives extérieures avant de finaliser les décisions du groupe.
    ask_yourself:
      - M'autocensure-je pour maintenir l'harmonie ?
      - Notre consensus est-il réel ou le résultat d'une pression pour être d'accord ?
    in_more_detail: |
      Irving Janis a étudié les fiasco de la politique étrangère (Ex: Baie des Cochons, Vietnam) et a identifié des schémas : illusion d'invulnérabilité, rationalisation collective, pression à la conformité, autocensure, illusion d'unanimité et "gardiens du groupe" qui protègent le groupe des informations dissidentes. Une forte cohésion, l'isolement et le stress augmentent la pensée de groupe.

      La pensée de groupe conduit à de mauvaises décisions car les alternatives ne sont pas sérieusement envisagées. La dissidence est considérée comme une trahison. Le groupe surestime sa justesse et sous-estime les risques.
    why_this_is_important: |
      Reconnaître la pensée de groupe vous aide à créer des conditions pour une meilleure prise de décision : encourager la dissidence, faire appel à des perspectives extérieures et éviter le consensus prématuré. C'est essentiel pour éviter les échecs catastrophiques des groupes.
    when_to_use:
      - leadership
      - prise_de_decision
      - resolution_de_problemes
      - gestion_des_conflits
    how_can_you_spot_it:
      pressure_for_consensus: |
        La dissidence est découragée ou punie ; l'accord est récompensé.
      illusion_of_unanimity: |
        Le silence est interprété comme un accord alors qu'il peut s'agir d'autocensure.
      collective_rationalization: |
        Le groupe rejette les avertissements et renforce son point de vue.
      mindguards: |
        Les membres protègent le groupe des informations qui remettraient en question le consensus.
    examples:
      bay_of_pigs: |
        Les conseillers de Kennedy ont réprimé leurs doutes sur le plan d'invasion ; le résultat fut un désastre.
      corporate_decisions: |
        Une équipe de direction va de l'avant avec une fusion malgré des signaux d'alarme car personne ne veut être le rabat-joie.
      product_launches: |
        Une équipe lance un produit défectueux car tout le monde est investi dans le plan et personne ne soulève de préoccupations.
      boards: |
        Les membres du conseil d'administration approuvent sans discernement les propositions de la direction pour maintenir l'harmonie.
    real_world_implications: |
      La pensée de groupe contribue à des échecs politiques, des désastres corporatifs et des opportunités manquées. Elle est particulièrement dangereuse dans des situations à enjeux élevés et à stress élevé. La prévenir nécessite des interventions structurelles délibérées.
    professional_application:
      networking_and_relationship_building: |
        Créez une sécurité psychologique pour la dissidence. Remerciez les personnes qui soulèvent des préoccupations. Montrez l'exemple en étant en désaccord sans être désagréable.
      collaborative_learning_initiative: |
        Utilisez l'avocat du diable, les équipes rouges et les "prémortems". Exigez que quelqu'un argumente contre le point de vue dominant. Faites appel à des perspectives extérieures. Le leader parle en dernier pour éviter l'ancrage.
    how_can_this_be_misapplied:
      false_dissent: |
        Créer des "dissidents désignés" qui ne sont pas véritablement en désaccord — le groupe s'en rend compte.
      excessive_conflict: |
        Encourager la dissidence au point d'un conflit destructeur et de la paralysie.
      dismissing_consensus: |
        Supposer que tout consensus est une pensée de groupe — parfois le groupe a raison.
      individualism: |
        Surcorriger au point qu'aucune décision collective n'est possible.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Effet de halo
    quick_introduction: |
      L'effet de halo est la tendance à laisser un trait ou une impression positive
      influencer notre jugement global d'une personne. Si nous aimons l'apparence de quelqu'un,
      nous pouvons supposer qu'il est compétent. Si nous admirons une compétence,
      nous supposons qu'il est bon en tout. Un attribut positif jette un
      "halo" sur le reste.
    one_liner: Un trait positif jette un halo sur notre jugement entier d'une personne.
    try_this:
      - Évaluez les traits indépendamment – ne laissez pas une force impliquer d'autres.
      - Remarquez quand l'attractivité, le charisme ou un succès colore votre vision.
      - Demandez: Jugerais-je cette personne de la même manière sans cet attribut positif unique ?
    ask_yourself:
      - Est-ce que je généralise à partir d'un trait à toute la personne ?
      - Verrais-je des faiblesses si je n'étais pas impressionné par une force ?
    in_more_detail: |
      Edward Thorndike a observé que les officiers militaires qui notaient les soldats
      haute sur un trait avaient tendance à les noter haute sur d'autres – même des
      traits non liés. Nous généralisons du particulier au tout. L'attractivité,
      le charisme ou le succès dans un domaine créent un halo qui déborde.

      L'inverse – un trait négatif colorant tout – est parfois appelé
      l'"effet de corne". Les deux sont des formes de généralisation injustifiée. L'
      effet de halo affecte l'embauche, les évaluations de performance et les impressions quotidiennes.
    why_this_is_important: |
      Reconnaître l'effet de halo vous aide à faire des évaluations plus précises et à
      éviter de sur-généraliser. Il est essentiel pour l'embauche équitable, la gestion de la performance
      et l'évaluation des relations. Une force n'implique pas toutes les forces.
    when_to_use:
      - prise_de_decision
      - leadership
      - construction_relationnelle
      - embauche
    how_can_you_spot_it:
      trait_spillover: |
        Un trait positif influence le jugement des traits non liés.
      attractiveness_bias: |
        Les personnes attirantes sont mieux notées en compétence, fiabilité, etc.
      success_generalization: |
        Le succès dans un domaine conduit à une compétence supposée dans d'autres.
      first_impression_dominance: |
        Une première impression positive colore toute l'évaluation ultérieure.
    examples:
      hiring: |
        Un candidat qui s'exprime bien et est sympathique est supposé être
        techniquement fort – même lorsque les compétences ne sont pas liées.
      performance_reviews: |
        Un projet exceptionnel conduit à des notes élevées dans toutes les dimensions.
      politics: |
        Le charisme d'un politicien conduit à une compétence supposée en matière de politique.
      branding: |
        Le succès d'une entreprise dans un produit conduit à une qualité supposée
        de tous les produits.
    real_world_implications: |
      L'effet de halo déforme l'embauche, l'évaluation de la performance et les
      décisions d'investissement. Il favorise les personnes attirantes, éloquentes et
      déjà performantes. Le réduire nécessite une évaluation structurée
      et une séparation des dimensions.
    professional_application:
      networking_and_relationship_building: |
        Évaluez les personnes selon des dimensions spécifiques plutôt que par une
        impression globale. Soyez conscient lorsqu'un trait positif influence
        votre jugement des autres. Cherchez des preuves de réfutation.
      collaborative_learning_initiative: |
        Utilisez des entretiens structurés et des évaluations qui notent les dimensions
        indépendamment. Calibrez les notes entre les évaluateurs. Réduisez
        la dépendance à l'égard du "ressenti" global.
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Toutes les impressions positives ne sont pas un effet de halo – parfois les gens sont
        véritablement forts dans toutes les dimensions.
      false_objectivity: |
        Supposer que nous pouvons complètement éliminer l'effet de halo – il est
        omniprésent et en partie automatique.
      overcorrection: |
        Aller à l'extrême opposé et supposer que les personnes attirantes ou
        charismatiques sont moins compétentes.
      stereotyping: |
        Utiliser "l'effet de halo" pour rejeter des attributs positifs légitimes.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Rasoir de Hanlon
    quick_introduction: |
      Le Rasoir de Hanlon stipule : "N'attribuez jamais à la malice ce qui s'explique
      adéquatement par la stupidité." En d'autres termes, ne supposez pas une mauvaise intention
      lorsque l'incompétence, un oubli ou l'ignorance pourraient expliquer le comportement.
    one_liner: Ne supposez pas la malice quand l'incompétence ou un oubli peuvent l'expliquer.
    try_this:
      - Quand quelqu'un vous frustre, demandez-vous: est-ce que cela pourrait s'expliquer par une erreur ou une ignorance ?
      - Optez pour l'explication la plus simple avant de supposer une mauvaise intention.
      - Remarquez quand vous sautez à la conclusion "ils voulaient me faire du mal".
    ask_yourself:
      - Est-ce que j'attribue à la malice ce qui pourrait s'expliquer par la stupidité ?
      - Voudrais-je le même bénéfice du doute à leur place ?
    in_more_detail: |
      Le principe encourage à accorder le bénéfice du doute aux gens. Lorsque les actions de quelqu'un
      vous blessent ou vous frustrent, l'hypothèse par défaut est souvent qu'ils voulaient vous faire du mal.
      Le Rasoir de Hanlon suggère que nombre de ces actions découlent d'un manque de soin, d'un manque
      d'information ou d'une mauvaise exécution – et non d'une mauvaise volonté.

      Cela ne signifie pas que la malice n'existe jamais. Cela signifie que nous ne devrions pas sauter à la pire
      interprétation lorsqu'une explication plus simple convient. Le rasoir réduit la paranoïa, améliore
      les relations et nous aide à réagir de manière plus constructive aux problèmes.
    why_this_is_important: |
      Appliquer le Rasoir de Hanlon réduit les conflits, préserve les relations et concentre
      l'énergie sur la résolution des problèmes plutôt que sur l'attribution des fautes. Il vous protège également du
      stress de supposer que tout le monde cherche à vous nuire.
    when_to_use:
      - résolution_de_conflits
      - leadership
      - construction_de_relations
      - prise_de_décision
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Vous interprétez immédiatement un résultat négatif comme un préjudice intentionnel.
      personalizing_mistakes: |
        Quand quelque chose tourne mal, vous supposez que cela vous était dirigé personnellement.
      ignoring_alternative_explanations: |
        Vous n'envisagez pas l'incompétence, la mauvaise communication ou un oubli comme des possibilités.
      escalation_before_inquiry: |
        Vous réagissez avec colère ou par représailles avant de demander ce qui s'est passé.
    examples:
      email_tone: |
        Supposer qu'un email concis est une attaque passive-agressive alors que l'expéditeur est peut-être simplement pressé
        ou mauvais pour le ton.
      missed_deadline: |
        Interpréter la livraison tardive d'un collègue comme un sabotage alors qu'il a peut-être
        manqué de capacité ou rencontré des obstacles.
      policy_decisions: |
        Supposer qu'une politique d'entreprise que vous n'aimez pas a été conçue pour nuire aux employés alors qu'elle pourrait
        être une tentative maladroite de résoudre un autre problème.
      traffic: |
        Supposer qu'un autre conducteur vous a coupé la route intentionnellement alors qu'il ne vous avait peut-être pas vu.
    real_world_implications: |
      Le Rasoir de Hanlon améliore la culture d'entreprise, réduit les litiges et rend la résolution des conflits
      plus efficace. Une utilisation excessive peut favoriser la négligence ; une utilisation insuffisante crée
      des conflits inutiles.
    professional_application:
      networking_and_relationship_building: |
        Quand quelqu'un vous déçoit, demandez des éclaircissements avant de supposer une mauvaise intention.
        Préservez les relations en optant par défaut pour des interprétations bienveillantes.
      collaborative_learning_initiative: |
        Dans les équipes, créez une culture où les erreurs sont supposées être involontaires jusqu'à
        preuve du contraire. Concentrez-vous sur les systèmes et les processus plutôt que sur le blâme.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Rejeter l'incompétence ou la négligence répétée comme "pas de la malice" alors qu'elle mérite
        une responsabilisation.
      ignoring_genuine_malice: |
        Appliquer le rasoir si rigidement que vous manquez de vrais acteurs malveillants ou des comportements toxiques.
      avoiding_difficult_conversations: |
        Utiliser le Rasoir de Hanlon comme excuse pour ne pas aborder les problèmes de performance.
      gaslighting_victims: |
        Dire à quelqu'un qui a été sincèrement lésé qu'il "suppose de la malice" alors que
        la malice était présente.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Effet Hawthorne
    quick_introduction: |
      L'effet Hawthorne est la tendance des personnes à modifier leur comportement
      lorsqu'elles savent qu'elles sont observées ou étudiées. L'acte d'observation
      lui-même peut produire le changement — pas nécessairement l'intervention testée.
      Les gens répondent à l'attention qu'ils reçoivent.
    one_liner: Être observé modifie le comportement — l'attention elle-même peut produire l'effet.
    try_this:
      - Lors de l'évaluation d'une intervention, déterminez si l'observation est à l'origine des résultats.
      - Reconnaissez que l'attention et le sentiment d'être valorisé peuvent améliorer les performances.
      - Soyez prudent en attribuant un changement à une intervention spécifique lorsque l'observation a changé.
    ask_yourself:
      - Cette amélioration provient-elle de l'intervention ou du fait d'être observé ?
      - Les résultats persisteraient-ils si nous arrêtions de faire attention ?
    in_more_detail: |
      Dans l'usine Hawthorne Works, les chercheurs ont constaté que la productivité
      s'améliorait lorsqu'ils modifiaient l'éclairage — et aussi lorsqu'ils le rétablissaient.
      L'amélioration semblait provenir de l'attention et de l'observation, et non de
      l'intervention spécifique. Une réanalyse ultérieure a suggéré que l'effet avait pu
      être exagéré, mais le concept reste utile : le fait d'être étudié
      modifie le comportement.

      L'effet Hawthorne complique la recherche et l'évaluation. Il peut
      gonfler l'impact apparent des interventions. Il suggère également que
      l'attention et le sentiment d'être valorisé peuvent améliorer les performances — une leçon pour
      le management.
    why_this_is_important: |
      Comprendre l'effet Hawthorne vous aide à interpréter les résultats de recherche,
      à concevoir de meilleures expériences et à reconnaître que l'attention
      elle-même peut entraîner un changement. En management, cela suggère que porter
      attention aux gens peut être aussi important que l'intervention spécifique.
    when_to_use:
      - leadership
      - prise_de_decision
      - apprentissage
      - resolution_de_problemes
    how_can_you_spot_it:
      observation_induced_change: |
        Le comportement change lorsque les gens savent qu'ils sont surveillés ou étudiés.
      attention_effect: |
        L'acte de porter attention produit une amélioration, pas seulement le
        changement spécifique.
      placebo_analog: |
        Comme un placebo, le "traitement" d'être étudié peut avoir des effets.
      short_term_improvement: |
        Les améliorations peuvent s'estomper lorsque l'observation cesse.
    examples:
      workplace_studies: |
        La productivité augmente pendant une étude — est-ce le nouveau processus ou
        le fait que quelqu'un regarde ?
      medical_trials: |
        Les groupes placebo s'améliorent — en partie parce qu'ils reçoivent de l'attention.
      education: |
        Les élèves obtiennent de meilleurs résultats lorsque les chercheurs sont présents — l'"effet observateur".
      management: |
        Les équipes s'améliorent lorsque le management porte attention — est-ce la nouvelle
        initiative ou l'attention elle-même ?
    real_world_implications: |
      L'effet Hawthorne affecte la validité de la recherche et l'évaluation des programmes.
      Il peut conduire à surestimer les effets d'une intervention.
      Il a également une leçon positive : l'attention et le sentiment d'être étudié
      peuvent motiver l'amélioration — donc le soin et la visibilité sont importants.
    professional_application:
      networking_and_relationship_building: |
        Porter attention aux gens peut améliorer leurs performances —
        l'effet Hawthorne suggère que le sentiment d'être observé et
        valorisé est important. Utilisez cela positivement : points de contact réguliers,
        visibilité et reconnaissance.
      collaborative_learning_initiative: |
        Lors de l'évaluation d'interventions, utilisez des groupes témoins et
        déterminez si les améliorations sont dues à l'intervention
        ou à l'attention qu'elle suscite. L'effet Hawthorne peut
        gonfler le succès apparent.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Utiliser "l'effet Hawthorne" pour justifier une surveillance constante —
        l'observation peut également réduire la confiance et la motivation intrinsèque.
      dismissing_improvements: |
        Supposer que toute amélioration pendant les études est due à l'effet Hawthorne —
        parfois les interventions fonctionnent réellement.
      overgeneralization: |
        Les études originales de Hawthorne ont été remises en question ;
        l'effet peut être plus faible ou différent qu'on ne le pensait autrefois.
      manipulation: |
        Créer une fausse "observation" pour manipuler le comportement.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Biais rétrospectif
    quick_introduction: |
      Le biais rétrospectif (ou effet « je le savais depuis le début ») est la tendance à croire,
      après qu'un événement se soit produit, que nous l'aurions prédit ou attendu. Nous
      reconstruisons le passé pour que les résultats semblent plus inévitables qu'ils ne l'étaient.
    one_liner: Après coup, on pense qu'on le savait depuis le début.
    try_this:
      - Avant de juger les décisions passées, demandez: Que savaient-ils à l'époque ?
      - Enregistrez vos prédictions avant les résultats — comparez plus tard.
      - Remarquez quand vous rendez le passé plus inévitable qu'il ne l'était.
    ask_yourself:
      - Est-ce que je juge avec des informations qui n'étaient pas disponibles à l'époque ?
      - Ai-je réellement prédit cela, ou cela semble-t-il simplement évident maintenant ?
    in_more_detail: |
      Une fois que nous connaissons le résultat, cela semble évident. Nous oublions l'incertitude que nous ressentions
      auparavant. Ce biais fausse l'apprentissage — nous pensons « savoir » quelque chose alors que ce n'est pas le cas, donc nous ne mettons pas à jour nos modèles. Il conduit également à des blâmes injustes : « Ils auraient dû le prévoir » alors que l'avenir était véritablement incertain.

      Le biais rétrospectif affecte les bilans post-mortem, les jugements juridiques et l'analyse historique.
      Nous jugeons les décisions passées avec des informations qui n'étaient pas disponibles à l'époque.
    why_this_is_important: |
      Reconnaître le biais rétrospectif améliore l'apprentissage des résultats, l'évaluation plus juste des
      décisions et une évaluation plus précise des risques. Il empêche une fausse confiance
      en nos capacités prédictives.
    when_to_use:
      - prise_de_decision
      - apprentissage
      - evaluation_des_risques
      - leadership
    how_can_you_spot_it:
      inevitability_feeling: |
        Après un événement, on a l'impression qu'il « devait » arriver.
      reconstructed_certainty: |
        Nous nous souvenons d'avoir été plus certains avant l'événement que nous ne l'étions réellement.
      blame_for_failure: |
        « Ils auraient dû savoir » alors que le résultat était réellement incertain.
      undervaluing_luck: |
        Attribuer les résultats à l'habileté ou à la prévoyance alors que la chance a joué un rôle.
    examples:
      investing: |
        « Je savais que le marché allait s'effondrer » après qu'il se soit effondré — alors que vous n'avez pas agi sur cette
        « connaissance » auparavant.
      project_failures: |
        « Nous aurions dû voir les risques » dans un bilan post-mortem alors que les risques étaient réellement
        ambigus.
      elections: |
        Après un résultat surprise, les experts expliquent pourquoi c'était « évident » rétrospectivement.
      medical: |
        « Les signes étaient là » lors du diagnostic d'une maladie rare après coup.
    real_world_implications: |
      Le biais rétrospectif fausse la responsabilité juridique, l'évaluation des performances et l'apprentissage.
      Il nous rend trop confiants dans notre jugement et injustes envers ceux qui ont pris
      des décisions raisonnables avec des informations limitées.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous évaluez les décisions passées des autres, séparez consciemment ce qui était connu
        à l'époque de ce que vous savez maintenant. Évitez le « je vous l'avais bien dit » lorsque vous n'avez pas réellement prédit le résultat.
      collaborative_learning_initiative: |
        Dans les bilans post-mortem, utilisez des techniques de « pré-mortem » ou de « journal de décision » pour
        capturer l'incertitude au moment de la décision. Comparez l'incertitude réelle à la reconstruction rétrospective.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Rejeter chaque échec comme « imprévisible » alors que certains étaient prévisibles.
      no_accountability: |
        Utiliser le biais rétrospectif pour éviter de tenir les gens responsables de négligence.
      false_uncertainty: |
        Surestimer et croire que nous ne pouvons jamais rien prédire.
      undermining_learning: |
        Refuser de tirer des leçons parce que « la perspective nous éclaire » — nous pouvons toujours apprendre
        des résultats.
    related_content:
      - narrative_fallacy
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Escompte hyperbolique
    quick_introduction: |
      L'escompte hyperbolique est la tendance à préférer des récompenses plus petites et plus immédiates
      à des récompenses plus grandes et plus tardives — et à dévaluer l'avenir plus fortement que
      les modèles rationnels ne le prédisent. Nous survalorisons le présent et sous-valorisons l'avenir de
      manières incohérentes.
    one_liner: Nous préférons le petit et immédiat au grand et tardif — et dévaluons l'avenir de manière incohérente.
    try_this:
      - Pré-engagement: prenez des décisions pour votre futur moi lorsque vous êtes dans un état calme.
      - Recadrage: Le voudrais-je dans 10 minutes ? Dans 10 mois ? pour révéler l'incohérence.
      - Utilisez des dispositifs d'engagement pour lier votre futur moi à de meilleurs choix.
    ask_yourself:
      - Est-ce que je survalorise le présent au détriment de mon futur moi ?
      - Prendrais-je ce choix si la récompense était retardée d'un jour ? D'un an ?
    in_more_detail: |
      Nous pourrions préférer 50 € aujourd'hui à 100 € dans un an, mais aussi préférer 100 € dans
      deux ans à 50 € dans un an — même si c'est incohérent. Notre taux d'actualisation n'est pas constant ;
      il est hyperbolique. L'avenir proche est
      fortement dévalorisé ; l'avenir lointain est dévalorisé moins fortement. Ceci
      explique la procrastination, la dépendance et la sous-épargne.

      Le biais du présent est un concept connexe : nous accordons au moment présent
      un poids disproportionné. L'escompte hyperbolique explique pourquoi nous
      prenons des engagements que nous ne tenons pas et pourquoi la planification à long terme est difficile.
    why_this_is_important: |
      Comprendre l'escompte hyperbolique vous aide à concevoir de meilleurs
      incitatifs, à engager votre futur moi et à éviter les pièges à court terme.
      Il explique pourquoi nous procrastinons et pourquoi nous luttons avec
      les objectifs à long terme.
    when_to_use:
      - prise_de_decision
      - décisions_de_carrière
      - investissement
      - leadership
    how_can_you_spot_it:
      present_preference: |
        Choisir la gratification immédiate plutôt que des récompenses retardées et plus importantes.
      inconsistent_time_preferences: |
        Des préférences qui s'inversent avec le temps (par exemple, nous voulons faire régime
        demain mais manger aujourd'hui).
      commitment_failures: |
        Prendre des décisions que nous ne suivons pas lorsque l'avenir devient le présent.
      procrastination: |
        Reporter les tâches importantes au profit du confort immédiat.
    examples:
      savings: |
        Choisir de dépenser maintenant plutôt que d'épargner pour la retraite — l'avenir
        semble abstrait.
      health: |
        Sauter l'exercice aujourd'hui pour le confort, tout en sachant que nous le regretterons
        — le regret de demain est dévalué.
      addiction: |
        Choisir le plaisir immédiat plutôt que la santé à long terme.
      deadlines: |
        Ne rien faire jusqu'à ce que la date limite approche — alors le "présent" inclut
        la date limite et nous agissons.
    real_world_implications: |
      L'escompte hyperbolique affecte l'épargne, la santé, l'éducation et
      la dépendance. Il explique de nombreux échecs de maîtrise de soi. Les dispositifs d'engagement
      (par exemple, épargne automatique, responsabilisation) peuvent aider en
      contraignant les choix futurs.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous demandez des engagements futurs, créez une responsabilité qui
        rend l'avenir "présent" (par exemple, points de suivi, dates limites). Ne
        supposez pas que les gens donneront suite sans structure.
      collaborative_learning_initiative: |
        Utilisez des dispositifs d'engagement : engagements publics, pré-engagement aux
        dates limites et structures qui rendent les objectifs à long terme plus immédiats. Décomposez les longs projets en étapes plus courtes.
    how_can_this_be_misapplied:
      excessive_control: |
        Contraindre excessivement les choix des gens au nom de "l'aide"
        apportée à leur futur moi.
      paternalism: |
        Supposer que nous savons ce qui est le mieux pour les intérêts à long terme des autres.
      ignoring_present_needs: |
        Ignorer les besoins présents légitimes au profit d'avantages futurs abstraits.
      one_size_fits_all: |
        Les gens diffèrent dans leurs taux d'actualisation ; tout le monde n'a pas besoin des mêmes
        dispositifs d'engagement.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Illusion de contrôle
    quick_introduction: |
      L'illusion de contrôle est la tendance à surestimer notre capacité à
      influencer les résultats. Nous croyons avoir plus de contrôle que nous n'en avons réellement—sur
      des événements aléatoires, d'autres personnes et des systèmes complexes. Nous confondons corrélation
      et causalité, action et impact.
    one_liner: Nous surestimons notre capacité à influencer les résultats, en particulier les aléatoires.
    try_this:
      - Demander: Que se passerait-il si je ne faisais rien ? Mon action cause-t-elle réellement le résultat ?
      - Distinguer ce que l'on peut contrôler de ce que l'on ne peut pas.
      - Noter quand l'on associe superstitieusement ses actions à des résultats aléatoires.
    ask_yourself:
      - Est-ce que je confonds corrélation et causalité ?
      - Le résultat serait-il différent si je n'avais pas agi ?
    in_more_detail: |
      Les gens se sentent plus confiants pour gagner à la loterie lorsqu'ils choisissent
      leurs propres numéros—même si cela ne change pas les probabilités. Nous lançons les dés
      plus fort quand nous voulons des chiffres élevés. Nous pensons que nos rituels ou comportements
      influencent des résultats qui sont en réalité aléatoires ou déterminés par des facteurs
      qui nous dépassent. L'illusion est réconfortante ; elle réduit l'anxiété. Mais elle
      peut mener à une confiance excessive et à de mauvaises décisions.

      L'illusion est plus forte lorsque nous sommes impliqués dans le processus, lorsque
      nous connaissons un succès précoce, et lorsque la tâche est familière. Elle affecte
      l'investissement, la gestion et la vie de tous les jours.
    why_this_is_important: |
      Reconnaître l'illusion de contrôle aide à calibrer ses
      attentes, à éviter la confiance excessive et à concentrer les efforts là où ils
      sont réellement importants. Elle explique aussi pourquoi nous persistons dans des comportements superstitieux
      et surestimons notre influence.
    when_to_use:
      - prise_de_decision
      - evaluation_du_risque
      - investissement
      - leadership
    how_can_you_spot_it:
      overestimated_influence: |
        Croire que nos actions affectent les résultats alors qu'elles ne le font pas.
      ritual_superstition: |
        Comportements que nous pensons influencer les résultats (chemise porte-bonheur, routine avant un match) alors qu'ils ne le font pas.
      choice_illusion: |
        Avoir l'impression que le choix nous donne le contrôle alors que le choix
        n'affecte pas le résultat.
      action_bias: |
        Préférer "faire quelque chose" plutôt que "attendre" même lorsque l'action
        n'aide pas.
    examples:
      gambling: |
        Choisir ses numéros de loterie donne l'impression d'un plus grand contrôle que
        la sélection aléatoire—les probabilités sont les mêmes.
      investing: |
        Les traders actifs surestiment leur capacité à battre le
        marché ; la plupart sous-performent après les coûts.
      management: |
        Les dirigeants surestiment leur impact sur les résultats organisationnels ; de nombreux facteurs échappent à leur contrôle.
      sports: |
        Les fans pensent que leurs encouragements affectent le jeu ; les joueurs
        ont des rituels porte-bonheur.
    real_world_implications: |
      L'illusion de contrôle affecte la prise de risque, la persistance
      dans des efforts futiles et l'attribution des résultats. Elle peut
      motiver l'action (parfois utile) mais aussi mener à
      du gaspillage d'efforts et à une confiance excessive. La calibration améliore
      la qualité des décisions.
    professional_application:
      networking_and_relationship_building: |
        Reconnaître ce que l'on peut et ne peut pas contrôler. Concentrer son énergie
        sur les facteurs influençables. Ne pas s'attribuer le mérite des
        résultats que l'on n'a pas causés—ni le blâme pour ceux que l'on
        n'a pas pu empêcher.
      collaborative_learning_initiative: |
        Dans la planification, distinguer les facteurs contrôlables des facteurs incontrôlables.
        Éviter la fausse confiance issue des succès précoces. Utiliser
        la pensée probabiliste pour calibrer les attentes.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Sur-corriger en croyant n'avoir aucun contrôle alors que l'on a une influence significative.
      dismissing_agency: |
        "C'est de la chance" alors que l'habileté et l'effort comptent
        dans de nombreux domaines.
      false_fatalism: |
        Utiliser l'illusion de contrôle pour justifier l'inaction.
      one_size_fits_all: |
        Le contrôle varie selon le domaine ; certaines situations sont plus
        contrôlables que d'autres.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Biais d'impact
    quick_introduction: |
      Le biais d'impact est la tendance à surestimer l'intensité et la durée
      de nos réactions émotionnelles face à des événements futurs. Nous pensons que les bonnes choses nous rendront plus heureux qu'elles ne le font, et que les mauvaises choses nous rendront plus malheureux qu'elles ne le font. Nous sommes mauvais pour les prévisions affectives.
    one_liner: Nous surestimons l'impact des événements sur notre bonheur et sa durée.
    try_this:
      - Ask: Comment me suis-je senti lors d'événements passés similaires ? Nous nous adaptons plus rapidement que prévu.
      - Ne laissez pas l'impact anticipé guider vos décisions: nous sommes mauvais pour prévoir nos sentiments.
      - Notez quand vous surestimez l'effet durable d'un seul résultat.
    ask_yourself:
      - Surestime-je la durée pendant laquelle je vais ressentir cela ?
      - Que dit mon expérience passée concernant des événements similaires ?
    in_more_detail: |
      Daniel Gilbert et Timothy Wilson font des recherches sur les prévisions affectives : nous surestimons la durée pendant laquelle nous nous sentirons bien après une victoire ou mal après une défaite.
      Nous nous adaptons plus rapidement que prévu. Nous surestimons également l'impact des
      événements uniques : nous pensons qu'un seul résultat définira notre bonheur alors que
      de nombreux facteurs y contribuent. Nous nous concentrons sur les mauvaises choses lorsque nous prévoyons nos futurs sentiments.

      Le biais d'impact affecte les décisions importantes de la vie : nous surestimons à quel point une promotion, une relation ou un achat changera notre bonheur. Nous
      surestimons également la douleur durable des pertes.
    why_this_is_important: |
      Reconnaître le biais d'impact vous aide à prendre de meilleures décisions quant à ce qui améliorera réellement votre vie. Il réduit la sur-investissement dans des résultats
      qui n'auront pas autant d'importance que vous ne le pensez, et réduit la peur des résultats
      qui ne vous feront pas autant de mal que vous ne le pensez.
    when_to_use:
      - prise_de_decision
      - changements_de_carriere
      - evaluation_des_risques
      - construction_de_relations
    how_can_you_spot_it:
      overestimated_impact: |
        "Cela va tout changer" alors que des événements passés similaires ont eu un impact durable modeste.
      duration_overestimation: |
        "Je ne m'en remettrai jamais" alors que nous nous adaptons généralement plus rapidement que prévu.
      focalism: |
        Se concentrer sur un seul événement et ignorer d'autres facteurs qui affectent le bien-être.
      adaptation_neglect: |
        Oublier que nous nous adaptons aux circonstances bonnes et mauvaises.
    examples:
      career: |
        "Si j'obtiens cette promotion, je serai tellement plus heureux" alors que les promotions passées ont eu un impact temporaire.
      purchases: |
        "Cette voiture me rendra heureux" alors que la nouveauté s'estompe rapidement.
      loss: |
        "Je ne me remettrai jamais de ce rejet" alors que nous nous adaptons généralement en quelques mois.
      events: |
        Surestimer l'impact d'un mariage, de vacances ou d'une étape importante sur le bonheur à long terme.
    real_world_implications: |
      Le biais d'impact conduit à de mauvaises décisions concernant l'argent, la carrière et les relations. Nous surpayons pour des expériences auxquelles nous nous adapterons et nous craignons excessivement les pertes dont nous nous remettrons. Il affecte les politiques et la planification personnelle.
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous prenez des décisions de carrière ou relationnelles, réfléchissez à ce que vous avez ressenti lors d'événements passés similaires. L'impact a-t-il duré aussi longtemps que vous l'aviez prévu ? Utilisez cela pour calibrer vos prédictions futures.
      collaborative_learning_initiative: |
        Lorsque les équipes sont confrontées à des revers ou à des succès, rappelez-leur l'adaptation.
        "Nous nous adapterons plus rapidement que nous ne le pensons" peut réduire à la fois la célébration excessive et le désespoir excessif.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Certains événements ont un impact durable : traumatisme, perte majeure. Ne rejetez pas toutes les prévisions affectives comme étant biaisées.
      cold_rationality: |
        "Cela n'aura pas d'importance" alors que l'expérience vécue sur le moment a de l'importance.
      undervaluing_experiences: |
        Éviter les expériences positives parce que "nous nous adapterons de toute façon."
      invalidating_emotions: |
        Dire aux gens que leurs sentiments passeront alors qu'ils ont besoin de soutien dans l'instant présent.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Biais de groupe
    quick_introduction: |
      Le biais de groupe est la tendance à favoriser les personnes que nous percevons comme appartenant à notre groupe par rapport à celles que nous percevons comme extérieures. Nous attribuons des qualités positives aux membres du groupe interne et des qualités négatives aux membres du groupe externe, souvent sur la base de distinctions minimes ou arbitraires.
    one_liner: Nous favorisons notre groupe interne et jugeons les groupes externes plus sévèrement—souvent arbitrairement.
    try_this:
      - Ask: Jugerais-je cette personne de la même manière si elle appartenait à mon groupe ?
      - Recherchez activement les perspectives des groupes externes lors de la prise de décisions.
      - Observez comment les frontières du groupe façonnent votre jugement.
    ask_yourself:
      - Est-ce que je favorise quelqu'un parce qu'il fait "partie des nôtres" ?
      - Appliquerais-je les mêmes critères à un membre d'un groupe externe ?
    in_more_detail: |
      Même lorsque les groupes sont attribués aléatoirement (par exemple, par tirage au sort), les gens développent rapidement une préférence pour leur groupe interne. Nous faisons davantage confiance aux membres de notre groupe, leur attribuons des ressources plus généreusement et jugeons leurs actions de manière plus charitable. Les membres du groupe externe reçoivent le traitement inverse.

      Le biais de groupe alimente le tribalisme, la discrimination et les conflits. Il affecte l'embauche, la promotion, la collaboration et les politiques. Il peut être basé sur la race, la nationalité, l'entreprise, l'équipe ou toute identité partagée.
    why_this_is_important: |
      Reconnaître le biais de groupe vous aide à prendre des décisions plus justes, à constituer des équipes plus inclusives et à éviter le favoritisme. Cela explique également pourquoi les initiatives de diversité rencontrent des résistances—la préférence pour le groupe interne est automatique.
    when_to_use:
      - leadership
      - prise_de_decision
      - creation_de_liens
      - resolution_de_conflits
    how_can_you_spot_it:
      preferential_treatment: |
        Accorder le bénéfice du doute aux "nôtres" mais pas aux "autres".
      resource_allocation: |
        Allouer davantage aux membres du groupe interne alors que les membres du groupe externe ont des besoins égaux ou plus importants.
      attribution_asymmetry: |
        Succès du groupe interne = compétence ; succès du groupe externe = chance. Échec du groupe interne = circonstance ; échec du groupe externe = caractère.
      minimal_group_effects: |
        Le favoritisme apparaît même avec des attributions de groupe arbitraires.
    examples:
      hiring: |
        Préférer des candidats qui sont allés à votre ancienne école ou partagent votre parcours.
      performance_reviews: |
        Évaluer les membres du groupe interne plus favorablement que les membres du groupe externe avec des performances similaires.
      collaboration: |
        Faire confiance et inclure "notre équipe" tout en excluant ou en doutant de "leur équipe".
      politics: |
        Rejeter les arguments du groupe externe tout en acceptant les arguments du groupe interne sans critique.
    real_world_implications: |
      Le biais de groupe perpétue les inégalités, mine la méritocratie et alimente les conflits. Il affecte l'embauche, la promotion, l'investissement et les politiques. Le réduire demande un effort délibéré—il ne se résoudra pas de lui-même.
    professional_application:
      networking_and_relationship_building: |
        Incluez activement des personnes en dehors de votre cercle immédiat. Recherchez des perspectives diverses. Interrogez-vous si vous favorisez quelqu'un parce qu'il est "comme vous".
      collaborative_learning_initiative: |
        Utilisez des processus structurés (évaluations anonymes, panels diversifiés) pour réduire le biais de groupe dans l'embauche et l'évaluation. Créez des projets inter-groupes pour construire une identité commune.
    how_can_this_be_misapplied:
      forced_diversity: |
        Mettre en œuvre des quotas ou des politiques qui créent du ressentiment sans aborder les biais sous-jacents.
      out_group_hostility: |
        Considérer le biais de groupe comme le seul problème alors que l'hostilité envers le groupe externe existe également.
      ignoring_legitimate_differences: |
        Toutes les différences de groupe ne sont pas des biais—parfois les groupes ont des caractéristiques différentes. Ne supposez pas que toutes les disparités sont de la discrimination.
      reverse_discrimination: |
        Surcompenser pour favoriser les groupes externes de manière injuste pour les membres du groupe interne.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Inversion
    quick_introduction: |
      L'inversion est une technique de résolution de problèmes qui retourne une question. Au lieu de
      demander "Comment réussir ?", vous demandez "Qu'est-ce qui me ferait échouer ?" et vous évitez ces choses.
      Elle révèle les risques et les anti-modèles que la pensée prospective manque souvent.
    one_liner: Inversez — demandez ce qui vous ferait échouer, puis évitez ces choses.
    try_this:
      - Pour tout objectif, listez les principales façons dont vous pourriez échouer, puis évitez-les.
      - Utilisez la visualisation négative: qu'est-ce qui pourrait mal tourner ?
      - Demandez: Que ferait une personne intelligente pour gâcher cela ?
    ask_yourself:
      - Ai-je réfléchi à ce qui pourrait faire échouer cela ?
      - Qu'est-ce que je ne vois pas en pensant uniquement vers l'avant ?
    in_more_detail: |
      Popularisée par Charlie Munger et enracinée dans la logique mathématique, l'inversion exploite
      le fait qu'éviter l'échec est souvent plus facile que de rechercher le succès. Si vous pouvez
      identifier les principales causes d'échec, vous pouvez les éliminer systématiquement.

      Carl Jacobi aurait dit : "Inversez, toujours inversez." Les Stoïciens utilisaient la visualisation
      négative – imaginer la perte – pour apprécier ce qu'ils avaient et se préparer à l'adversité.
      L'inversion n'est pas du pessimisme ; c'est une façon structurée de progresser en éliminant
      les obstacles.
    why_this_is_important: |
      L'inversion vous aide à éviter les erreurs catastrophiques, à tester les plans et à trouver
      des solutions non évidentes. Elle complète la planification prospective en garantissant que vous ne
      négligez pas les modes de défaillance critiques.
    when_to_use:
      - résolution_de_problèmes
      - prise_de_décision
      - évaluation_des_risques
      - évolution_professionnelle
    how_can_you_spot_it:
      premortem_thinking: |
        Avant un projet, demandez "Pourquoi cela a-t-il échoué ?" comme si c'était déjà le cas.
      anti_goals: |
        Définir ce que vous voulez éviter aussi clairement que ce que vous voulez atteindre.
      reverse_engineering_failure: |
        Étudier les cas d'échec pour en tirer des leçons plutôt que d'étudier seulement les succès.
      constraint_focus: |
        Identifier les contraintes et les goulets d'étranglement avant d'optimiser les bénéfices.
    examples:
      investing: |
        Au lieu de "Qu'est-ce qui fera monter cette action ?", demandez "Qu'est-ce qui me ferait perdre de l'argent ?"
        et évitez ces scénarios.
      career: |
        "Qu'est-ce qui ruinerait ma réputation ?" mène à une liste de comportements à éviter.
      product_launch: |
        "Pourquoi la plupart des lancements de produits échouent-ils ?" révèle les risques à traiter avant le lancement.
      health: |
        "Quelles habitudes raccourcissent la durée de vie ?" donne une liste d'évitement plus claire que "Qu'est-ce qui me rend
        en bonne santé ?"
    real_world_implications: |
      L'inversion est utilisée dans l'ingénierie (analyse des modes de défaillance), l'investissement et la stratégie.
      Elle réduit la surconfiance et améliore la gestion des risques. Une dépendance excessive peut conduire à
      une prudence excessive.
    professional_application:
      networking_and_relationship_building: |
        "Qu'est-ce qui nuirait à cette relation ?" vous aide à éviter les comportements qui brisent la confiance.
      collaborative_learning_initiative: |
        Organisez des pré-mortes pour les projets : "Ceci a échoué. Pourquoi ?" Utilisez les réponses pour améliorer
        la planification et l'exécution.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Se concentrer uniquement sur l'évitement de l'échec peut paralyser l'action et empêcher la prise de risque nécessaire.
      negativity_bias: |
        L'inversion peut amplifier le biais de négativité si elle n'est pas équilibrée par l'identification d'opportunités prospectives.
      analysis_paralysis: |
        Passer tellement de temps sur les modes de défaillance que vous n'exécutez jamais.
      missing_upside: |
        L'inversion ne vous dit pas quoi faire – seulement quoi éviter. Vous avez toujours besoin
        d'objectifs positifs.
    related_content:
      - second_order_thinking
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Loi des rendements décroissants
    quick_introduction: |
      La loi des rendements décroissants stipule qu'en ajoutant davantage d'un intrant tout en maintenant les autres constants, le rendement supplémentaire de chaque nouvelle unité d'intrant diminue éventuellement. Plus n'est pas toujours mieux : il y a un point où un effort supplémentaire rapporte de moins en moins.
    one_liner: Plus d'intrant finit par produire moins de rendement ; il y a un point optimal.
    try_this:
      - Demander: Ai-je dépassé le point où un effort supplémentaire produit des rendements significatifs ?
      - Prioriser les intrants à plus fort effet de levier ; arrêter lorsque les rendements marginaux diminuent.
      - Remarquer quand vous sur-investissez dans quelque chose qui a déjà porté ses fruits.
    ask_yourself:
      - Qu'est-ce que je gagnerais avec une unité d'effort supplémentaire ici ?
      - Est-ce que j'optimise au-delà du point de rendements décroissants ?
    in_more_detail: |
      En économie, ajouter plus de travailleurs à une quantité fixe de terres produit éventuellement des gains supplémentaires plus faibles. En productivité personnelle, la première heure d'étude peut apporter plus de valeur que la dixième. Le principe s'applique aux ressources, à l'effort, au temps et aux fonctionnalités. Il y a un point optimal ; au-delà, les rendements marginaux diminuent et peuvent même devenir négatifs.

      Reconnaître les rendements décroissants vous aide à allouer les ressources efficacement et à éviter de sur-investir dans des domaines qui ont déjà produit la majeure partie de leur valeur.
    why_this_is_important: |
      Comprendre les rendements décroissants évite le sur-investissement, guide la priorisation et vous aide à savoir quand arrêter. C'est essentiel pour l'allocation des ressources et pour éviter le perfectionnisme.
    when_to_use:
      - prise_de_decision
      - resolution_de_problemes
      - investissement
      - evolution_de_carriere
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Chaque unité d'effort ou de ressource supplémentaire produit moins de rendement que la précédente.
      perfectionism_trap: |
        Viser les derniers 10% de qualité demande un effort disproportionné.
      overinvestment: |
        Continuer à ajouter des ressources alors que le rendement marginal est faible ou négatif.
      optimal_point_passed: |
        Vous avez dépassé le point où un effort accru améliore les résultats.
    examples:
      studying: |
        Les 2 premières heures de préparation à un examen apportent plus que les heures 7-8 ; il y a un point de rendements décroissants.
      product_features: |
        Ajouter plus de fonctionnalités à une application peut confondre les utilisateurs ; la 20ème fonctionnalité apporte moins de valeur que la 5ème.
      hiring: |
        Ajouter plus de personnes à un projet peut le ralentir (Loi de Brooks) après un certain point.
      marketing: |
        Doubler les dépenses publicitaires ne double pas les résultats ; les rendements diminuent à mesure que le marché est saturé.
    real_world_implications: |
      La loi des rendements décroissants guide la politique économique, la stratégie d'entreprise et la productivité personnelle. L'ignorer conduit à du gaspillage de ressources et à des résultats sous-optimaux. Elle soutient le principe de Pareto et la focalisation.
    professional_application:
      networking_and_relationship_building: |
        Investir dans quelques relations profondes peut rapporter plus que de répartir l'effort sur un grand nombre. Reconnaître quand le réseautage supplémentaire a des rendements décroissants.
      collaborative_learning_initiative: |
        Plus d'heures de formation ne signifient pas toujours de meilleurs résultats. Trouver la dose optimale et éviter la surcharge.
    how_can_this_be_misapplied:
      premature_optimization: |
        Arrêter trop tôt avant d'atteindre un niveau de qualité raisonnable.
      undershooting: |
        Utiliser les rendements décroissants comme excuse pour un effort insuffisant.
      misidentifying_the_curve: |
        Supposer des rendements décroissants alors que vous êtes en fait sur une autre partie de la courbe (par exemple, la phase exponentielle précoce).
      one_size_fits_all: |
        Appliquer le même "point optimal" dans des contextes différents où les courbes divergent.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Biais d'aversion à la perte
    quick_introduction: |
      L'aversion à la perte est la tendance à préférer éviter les pertes plutôt qu'à acquérir des gains équivalents.
      Les gens ressentent la douleur de la perte environ deux fois plus fortement qu'ils ne ressentent le plaisir du gain.
    one_liner: Les pertes semblent environ deux fois plus douloureuses que les gains équivalents sont agréables.
    try_this:
      - "Demandez-vous : Est-ce que je surévalue ce que je perdrais par rapport à ce que je gagnerais ?"
      - Recadrez le choix en termes de gains plutôt que de pertes et voyez si votre point de vue change.
      - Repérez quand la peur de perdre influence la décision plus que le potentiel réel.
    ask_yourself:
      - Que choisirais-je si je partais de zéro ?
      - Est-ce que je m'accroche à cause de ce que je perdrais, ou parce que l'avenir est réellement meilleur ?
    in_more_detail: |
      Développé par Daniel Kahneman et Amos Tversky, l'aversion à la perte décrit comment les pertes et les gains
      sont perçus de manière asymétrique. L'impact psychologique de perdre 100 € est généralement beaucoup
      plus grand que la satisfaction de gagner 100 €. Ce biais influence les décisions dans
      la finance, les négociations et les choix quotidiens, conduisant souvent à un comportement d'aversion au risque
      lorsque les pertes potentielles sont importantes.
    why_this_is_important: |
      Comprendre l'aversion à la perte vous aide à reconnaître quand la peur de la perte influence les décisions
      plus que l'analyse rationnelle. Cela explique pourquoi les gens s'accrochent à des investissements perdants, évitent
      les changements nécessaires et prennent des décisions sous-optimales dans les négociations et les décisions de carrière.
    when_to_use:
      - prise_de_decision
      - investissement
      - evolution_professionnelle
      - evaluation_des_risques
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Remarquez quand la perspective de perdre quelque chose déclenche une anxiété disproportionnée
        ou une résistance par rapport au potentiel d'un gain éventuel.
      reluctance_to_change: |
        Hésitation à changer de stratégie, à quitter un emploi ou à vendre un actif même lorsque
        l'analyse objective suggère que c'est la meilleure option.
      framing_sensitivity: |
        Les décisions changent radicalement selon que les options sont présentées comme des gains
        ou des pertes, même lorsque les résultats sont équivalents.
      overvaluing_what_you_have: |
        L'effet de dotation — accorder une valeur plus élevée aux choses que l'on possède simplement parce
        que l'on les possède — accompagne souvent l'aversion à la perte.
    examples:
      investing: |
        Conserver une action en baisse pour "éviter de réaliser la perte" tout en manquant
        de meilleures opportunités d'investissement ailleurs.
      career: |
        Rester dans un emploi insatisfaisant parce que partir donne l'impression de perdre sa sécurité,
        même lorsque la nouvelle opportunité offre un plus grand potentiel de croissance.
      negotiations: |
        Rejeter une offre juste parce qu'elle est présentée comme "l'abandon" de quelque chose,
        plutôt que "l'obtention" d'un accord.
      product_design: |
        Essais gratuits qui mènent à un paiement — les utilisateurs ressentent la "perte" du service
        lorsque l'essai se termine, ce qui motive davantage l'abonnement que "l'obtention"
        d'un nouveau service ne le ferait.
    real_world_implications: |
      L'aversion à la perte façonne les marchés, les politiques et le comportement individuel. Elle explique
      pourquoi les assurances et les garanties se vendent bien, pourquoi les gens évitent les changements bénéfiques,
      et pourquoi les nouvelles négatives ont un impact disproportionné. La reconnaître peut améliorer
      la qualité des décisions et réduire les regrets.
    professional_application:
      networking_and_relationship_building: |
        Soyez conscient que les gens peuvent résister à la fin de relations ou de collaborations improductives
        en raison de l'aversion à la perte — ils craignent de "perdre" la connexion.
        Présentez les nouvelles opportunités comme des gains plutôt que des pertes pour réduire la résistance.
      collaborative_learning_initiative: |
        Lors de l'introduction de nouveaux processus ou outils, mettez l'accent sur ce que l'équipe gagne
        plutôt que sur ce qu'elle "abandonne". Les initiatives de changement présentées en termes de perte
        déclenchent souvent une résistance plus forte.
    how_can_this_be_misapplied:
      manipulation: |
        Exploiter l'aversion à la perte pour faire pression sur les décisions — par exemple, les "offres à durée limitée"
        ou le cadrage "ne manquez pas" qui déclenche la peur de la perte plutôt qu'une évaluation
        authentique de la valeur.
      misinterpreting_relationships: |
        Supposer que la résistance d'une personne au changement est purement rationnelle alors qu'elle peut
        être motivée par l'aversion à la perte. Mal attribuer les motivations peut nuire à la confiance.
      overcommitment: |
        Le biais des coûts irrécupérables — continuer à investir dans un projet qui échoue parce que
        "nous y avons déjà mis tellement" plutôt que de couper les pertes.
      missed_opportunities_for_conflict_resolution: |
        Refuser de faire des compromis parce que toute concession ressemble à une perte,
        même lorsque l'alternative est un résultat pire pour tout le monde.
      vulnerability_to_exploitation: |
        Être manipulé par d'autres qui cadrent les choix pour déclencher l'aversion à la perte,
        comme les tactiques de vente qui soulignent ce que vous "perdrez" si vous n'agissez pas.
      reinforcing_negative_perceptions: |
        Se concentrer excessivement sur les inconvénients potentiels peut créer une perspective pessimiste
        qui devient auto-réalisatrice, manquant ainsi les opportunités de croissance.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: La carte n'est pas le territoire
    quick_introduction: |
      "La carte n'est pas le territoire" signifie qu'une représentation de la réalité n'est pas la réalité
      elle-même. Les modèles, les théories et les descriptions sont des simplifications utiles, mais ils
      laissent toujours quelque chose de côté. Confondre la carte avec le territoire mène à l'erreur.
    one_liner: La carte n'est pas le territoire — tous les modèles sont faux ; certains sont utiles.
    try_this:
      - Quand un modèle ne correspond pas à la réalité, mettez à jour la carte — ne forcez pas la réalité à s'y conformer.
      - Demandez: Qu'est-ce que ce modèle laisse de côté ? Quand pourrait-il échouer ?
      - Traitez les modèles comme des outils, pas comme la vérité.
    ask_yourself:
      - Est-ce que je confonds mon modèle avec la réalité ?
      - Le territoire a-t-il changé depuis ma dernière observation ?
    in_more_detail: |
      Alfred Korzybski a introduit cette idée dans la sémantique générale. Une carte d'une ville est
      utile pour la navigation, mais ce n'est pas la ville — elle omet les détails, devient obsolète et
      ne peut jamais tout capturer. Il en va de même pour les modèles mentaux, les théories scientifiques
      et les organigrammes.

      Tous les modèles sont faux ; certains sont utiles. Le danger est de traiter un modèle comme s'il
      était la vérité entière, surtout lorsque le territoire a changé. Une bonne réflexion
      exige de mettre à jour les cartes lorsque la réalité ne correspond pas.
    why_this_is_important: |
      Reconnaître que les cartes diffèrent du territoire évite la surconfiance dans les modèles,
      encourage la mise à jour des croyances et réduit le risque d'agir sur des informations obsolètes ou
      simplifiées à l'excès.
    when_to_use:
      - prise_de_decision
      - resolution_de_problemes
      - apprentissage
      - evaluation_des_risques
    how_can_you_spot_it:
      model_reality_confusion: |
        Traiter un cadre ou une théorie comme s'il décrivait pleinement la réalité.
      outdated_assumptions: |
        Agir sur la base d'informations ou de modèles qui ne correspondent plus aux conditions actuelles.
      oversimplification: |
        Ignorer les nuances parce que la "carte" ne les inclut pas.
      map_worship: |
        Défendre un modèle lorsque des preuves le contredisent plutôt que de le mettre à jour.
    examples:
      organizational_charts: |
        Supposer que la structure hiérarchique reflète la façon dont le travail est réellement effectué.
      financial_models: |
        Traiter une projection de tableur comme une prédiction plutôt qu'un scénario.
      stereotypes: |
        Appliquer des généralisations de groupe à des individus.
      strategy_docs: |
        Exécuter un plan tel qu'il est écrit lorsque le marché a évolué.
    real_world_implications: |
      La distinction carte-territoire est fondamentale pour la science, l'ingénierie et
      la philosophie. Elle sous-tend la mise à jour bayésienne, la méthodologie agile et l'humilité épistémique. L'ignorer
      conduit à une pensée rigide et à des stratégies échouées.
    professional_application:
      networking_and_relationship_building: |
        Votre modèle mental d'une personne peut être obsolète. Mettez-le à jour par une interaction directe
        plutôt que de vous fier à de vieilles impressions.
      collaborative_learning_initiative: |
        Encouragez les équipes à traiter les plans et les modèles comme des hypothèses à tester et à
        réviser, et non comme des vérités figées.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Conclure qu'aucune carte n'est utile et que toute connaissance est suspecte.
      constant_revision: |
        Mettre à jour si fréquemment qu'aucune compréhension stable n'émerge.
      dismissing_models: |
        Rejeter des simplifications utiles parce qu'elles ne sont "pas le territoire".
      relativism: |
        Prétendre que toutes les cartes sont également valides alors que certaines correspondent clairement mieux au territoire.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Effet de la simple exposition
    quick_introduction: |
      L'effet de la simple exposition est la tendance à développer une préférence pour les choses
      simplement parce que nous y sommes familiers. Une exposition répétée, même sans
      renforcement, augmente l'appréciation. Nous avons tendance à préférer ce que nous connaissons.
    one_liner: La familiarité engendre l'affection — nous préférons ce que nous avons déjà vu.
    try_this:
      - Demandez: Est-ce que j'aime ceci parce que c'est bien, ou parce que c'est familier ?
      - Lors de l'évaluation d'options, corrigez l'exposition: les nouvelles choses commencent avec un désavantage.
      - Remarquez quand la répétition influence votre préférence.
    ask_yourself:
      - Est-ce que je préfère quelque chose principalement parce que je l'ai déjà vu auparavant ?
      - Choisirais-je différemment si l'exposition était égale ?
    in_more_detail: |
      Robert Zajonc a montré que l'exposition répétée à des stimuli (visages, mots, formes)
      augmente l'affect positif à leur égard, même lorsque nous n'avons pas
      consciemment conscience de l'exposition. La familiarité engendre l'affection, et non le mépris (dans de nombreux
      cas). L'effet est plus fort lorsque nous n'analysons pas et lorsque l'exposition
      est subtile.

      L'effet de la simple exposition affecte la préférence pour les marques, l'attraction interpersonnelle
      et le jugement esthétique. Il explique pourquoi nous préférons la musique familière,
      pourquoi la publicité fonctionne par répétition, et pourquoi nous pouvons préférer
      les personnes que nous avons déjà vues, même sans interaction.
    why_this_is_important: |
      Reconnaître l'effet de la simple exposition vous aide à comprendre vos propres
      préférences et à résister à la manipulation par la répétition. Il explique également
      pourquoi la visibilité et la présence sont importantes pour les relations et les
      marques. La familiarité est une influence puissante mais souvent inconsciente.
    when_to_use:
      - construction_relations
      - prise_de_decision
      - leadership
      - apprentissage
    how_can_you_spot_it:
      familiarity_preference: |
        Préférer les options que nous avons déjà vues à celles qui sont nouvelles.
      repetition_influence: |
        L'exposition répétée augmente l'appréciation sans persuasion explicite.
      unconscious_influence: |
        L'effet fonctionne même lorsque nous n'avons pas conscience de l'exposition.
      brand_recognition: |
        Les marques familières sont préférées même lorsque nous ne pouvons pas expliquer pourquoi.
    examples:
      advertising: |
        L'exposition répétée à une marque augmente la préférence, même sans
        messages persuasifs.
      music: |
        Les chansons que nous avons déjà entendues ont tendance à être plus appréciées que les nouvelles
        dès la première écoute.
      people: |
        Nous avons tendance à apprécier davantage les personnes que nous avons vues à plusieurs reprises (par exemple, camarades de classe,
        collègues) que les étrangers, même sans interaction.
      ideas: |
        Les idées que nous avons rencontrées auparavant nous semblent plus confortables et
        crédibles que les nouvelles.
    real_world_implications: |
      L'effet de la simple exposition façonne le comportement des consommateurs, les préférences politiques
      et l'attraction sociale. Il est exploité dans le marketing
      et peut créer des avantages déloyaux pour le familier. Il explique également
      pourquoi la diversité d'exposition est importante : la familiarité avec
      la différence réduit les biais.
    professional_application:
      networking_and_relationship_building: |
        La visibilité compte. Se présenter, être présent et être
        vu crée une familiarité qui renforce l'affection. Ne sous-estimez pas
        la valeur des contacts répétés à faible enjeu.
      collaborative_learning_initiative: |
        Exposez les gens à diverses perspectives et personnes de manière répétée ;
        la familiarité peut réduire les biais. Mais sachez que la simple exposition
        peut également renforcer la préférence pour le statu quo.
    how_can_this_be_misapplied:
      manipulation: |
        Créer délibérément une exposition répétée pour manipuler
        les préférences sans consentement.
      false_familiarity: |
        Supposer que la familiarité équivaut à la qualité ; parfois, les
        options nouvelles sont meilleures.
      exclusion: |
        Si seules certaines personnes bénéficient de l'exposition, elles obtiennent un avantage déloyal.
        Considérez qui a accès à la visibilité.
      stagnation: |
        S'appuyer excessivement sur la familiarité et ne jamais essayer de nouvelles choses.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Le sophisme narratif
    quick_introduction: |
      Le sophisme narratif est la tendance à construire des histoires à partir d'événements passés
      qui les rendent plus cohérentes, prévisibles et significatives qu'elles ne l'étaient réellement.
      Nous rétrofictons des explications sur le hasard. Nous transformons le chaos de l'histoire
      en une histoire ordonnée – et nous croyons ensuite que cette histoire était inévitable.
    one_liner: Nous rétrofictons des histoires cohérentes sur le hasard – et nous croyons ensuite qu'elles étaient inévitables.
    try_this:
      - Demander: Quelle part de cette histoire est due au recul ? Quel rôle a joué la chance ?
      - Être sceptique face aux explications ordonnées – le passé était plus chaotique que nos récits.
      - Remarquer quand "ça a du sens" remplace "c'était prévisible".
    ask_yourself:
      - Est-ce que je construis une histoire qui rend le passé plus inévitable qu'il ne l'était ?
      - Aurais-je pu prédire cela avant que cela n'arrive ?
    in_more_detail: |
      Nassim Taleb a popularisé le terme. Nous avons soif de récits – cause et effet,
      héros et méchants, arcs narratifs clairs. Nous construisons donc des histoires qui relient
      les événements a posteriori. L'histoire semble vraie parce qu'elle est cohérente – mais
      la cohérence ne signifie pas qu'elle est correcte. Nous confondons "ça a du sens" et
      "c'était prévisible". Nous sous-estimons le rôle de la chance et
      du hasard.

      Le sophisme narratif affecte notre façon d'apprendre de l'histoire, d'évaluer
      le succès et de faire des prédictions. Nous surpondérons le pouvoir explicatif
      des histoires et sous-pondérons le rôle du hasard.
    why_this_is_important: |
      Reconnaître le sophisme narratif vous aide à éviter de trop apprendre du
      passé et à surestimer la prévisibilité. Il encourage l'humilité
      concernant la causalité et la prédiction. Tout ce qui fait une bonne
      histoire n'est pas vrai ni généralisable.
    when_to_use:
      - prise_de_decision
      - apprentissage
      - evaluation_des_risques
      - resolution_de_problemes
    how_can_you_spot_it:
      hindsight_coherence: |
        Les événements passés sont expliqués par une histoire ordonnée qui n'était
        pas visible à l'époque.
      cause_effect_overconfidence: |
        Nous attribuons des causes claires à des résultats qui avaient de nombreux
        facteurs contributifs.
      luck_minimization: |
        Le succès et l'échec sont expliqués par l'habileté et la stratégie,
        et non par la chance.
      story_over_evidence: |
        Un récit convaincant l'emporte sur les preuves statistiques.
    examples:
      business_success: |
        "Ils ont réussi à cause de X" alors que de nombreux facteurs et la chance
        étaient impliqués – nous choisissons l'histoire qui convient.
      investing: |
        Expliquer les mouvements du marché avec des récits qui semblent
        satisfaisants mais qui peuvent être post-hoc.
      history: |
        Les événements historiques sont racontés comme des progressions inévitables
        alors qu'ils dépendaient de nombreux facteurs.
      career: |
        "Je suis arrivé là parce que j'ai fait X" alors que la chance et le timing
        ont joué des rôles importants.
    real_world_implications: |
      Le sophisme narratif déforme l'apprentissage, la confiance excessive dans la prédiction,
      et l'attribution du succès et de l'échec.
      Il rend le passé plus prévisible qu'il ne l'était
      et l'avenir plus prévisible qu'il ne l'est.
    professional_application:
      networking_and_relationship_building: |
        Quand quelqu'un raconte son histoire de succès, rappelez-vous que
        c'est un récit – cohérent et convaincant, mais peut-être
        simplifié. La chance et les facteurs invisibles peuvent être sous-estimés.
      collaborative_learning_initiative: |
        Dans les rétrospectives, distinguez le récit des preuves.
        Demandez "Qu'aurions-nous dit à l'époque ?" Utilisez
        des journaux de décision pour capturer l'incertitude avant
        que les résultats ne soient connus.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Certains récits sont corrects – tout n'est pas
        sophisme narratif. La causalité existe.
      excessive_skepticism: |
        Refuser d'apprendre du passé parce que "sophisme
        narratif". Nous pouvons encore en tirer des leçons utiles.
      false_randomness: |
        Supposer que tout est aléatoire alors que certains résultats
        sont significativement attribuables.
      undermining_storytelling: |
        Les histoires ont de la valeur pour la communication et le sens –
        le sophisme est de croire qu'elles sont complètes ou
        prédictives, pas qu'elles existent.
    related_content:
      - hindsight_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Biais de négativité
    quick_introduction: |
      Le biais de négativité est la tendance à accorder plus de poids à l'information négative qu'à l'information
      positive. Les mauvaises nouvelles, les critiques et les menaces captent notre attention et
      influencent nos décisions plus fortement que des stimuli positifs équivalents.
    one_liner: Les mauvaises nouvelles pèsent plus lourd que les bonnes nouvelles — nous sommes câblés pour prioriser les menaces.
    try_this:
      - Cherchez et pesez activement les preuves positives lors de l'évaluation.
      - Remarquez quand une critique pèse plus que de nombreux compliments.
      - Demandez: Est-ce que j'accorde plus de poids à l'information négative qu'elle ne le mérite ?
    ask_yourself:
      - Est-ce que je m'attarde sur le négatif et déprécie le positif ?
      - Me sentirais-je différemment si je me concentrais sur les bonnes preuves ?
    in_more_detail: |
      D'un point de vue évolutif, manquer une menace pouvait être fatal, tandis que manquer une opportunité
      était généralement survivable. Nos cerveaux sont câblés pour prioriser l'information négative.
      Un seul commentaire critique peut l'emporter sur de nombreux compliments. Les événements négatifs sont
      mémorisés plus vivement et plus longtemps.

      Ce biais affecte les relations, la prise de décision et le bien-être. Nous nous attardons sur
      les échecs, anticipons le pire des cas et déprécions les preuves positives. Le comprendre
      nous aide à le corriger.
    why_this_is_important: |
      Reconnaître le biais de négativité vous aide à équilibrer les retours, à éviter de réagir de manière excessive aux
      critiques et à prendre des décisions plus calibrées. Cela explique également pourquoi les mauvaises nouvelles
      dominent et pourquoi nous nous sentons souvent plus mal que les circonstances ne le justifient.
    when_to_use:
      - prise_de_decision
      - construction_relationnelle
      - leadership
      - evaluation_des_risques
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Un commentaire négatif éclipse de nombreux commentaires positifs.
      threat_prioritization: |
        Les inconvénients potentiels reçoivent plus d'attention que les avantages équivalents.
      vivid_negative_memories: |
        Les expériences négatives sont rappelées plus facilement et avec plus d'émotion.
      discounting_positive_evidence: |
        Les bonnes nouvelles sont rapidement oubliées ou expliquées.
    examples:
      performance_reviews: |
        Un employé s'attarde sur une seule critique et déprécie l'évaluation globale positive.
      news_consumption: |
        Les gros titres négatifs dominent l'attention et façonnent la vision du monde malgré les tendances positives.
      relationships: |
        Une seule dispute pèse plus lourd que de nombreux bons moments.
      investing: |
        Les baisses du marché déclenchent plus de panique que les hausses équivalentes ne déclenchent d'euphorie.
    real_world_implications: |
      Le biais de négativité façonne les médias, la politique et la culture organisationnelle. Il
      contribue à l'anxiété, aux conflits et à des décisions sous-optimales. Y remédier
      délibérément peut améliorer le bien-être et le jugement.
    professional_application:
      networking_and_relationship_building: |
        Lors de la fourniture de retours, soyez conscient que les commentaires négatifs auront plus de poids —
        équilibrez-les et mettez l'accent sur la croissance. Lors de la réception de retours, considérez consciemment
        l'ensemble du tableau.
      collaborative_learning_initiative: |
        Créez des cultures qui contrent explicitement le biais de négativité : célébrez les victoires,
        documentez les résultats positifs et équilibrez les rétrospectives avec des "pré-mortems" de
        ce qui a bien fonctionné.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Rejeter des préoccupations légitimes en insistant sur la "pensée positive".
      ignoring_real_threats: |
        Sur-corriger au point de sous-estimer les risques réels.
      feedback_suppression: |
        Éviter les critiques nécessaires parce que "la négativité est mauvaise".
      invalidation: |
        Dire à quelqu'un que ses sentiments négatifs sont "juste le biais de négativité"
        alors qu'ils ont une cause réelle de préoccupation.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Rasoir d'Ockham
    quick_introduction: |
      Le Rasoir d'Ockham (ou principe de parcimonie) est le principe selon lequel, parmi des hypothèses concurrentes,
      celle qui comporte le moins d'hypothèses doit être préférée. Les explications plus simples sont
      souvent — mais pas toujours — correctes.
    one_liner: Privilégiez l'explication la plus simple qui correspond aux preuves.
    try_this:
      - En comparant des théories, demandez-vous: Laquelle a le moins d'hypothèses ?
      - N'ajoutez pas de complexité sans preuves qui l'exigent.
      - Remarquez quand vous préférez une explication élaborée à une explication simple.
    ask_yourself:
      - Introduis-je une complexité inutile ?
      - Les preuves exigent-elles ce niveau d'explication ?
    in_more_detail: |
      Nommé d'après Guillaume d'Ockham, le principe ne prétend pas que les explications simples
      sont toujours vraies. Il suggère que la complexité inutile ne doit pas être introduite
      sans preuves. Si deux théories expliquent les mêmes phénomènes, la plus simple est
      préférable jusqu'à ce que des preuves prouvent le contraire.

      Le Rasoir d'Ockham est une heuristique, pas une loi. Parfois, l'explication correcte est
      complexe. Mais il protège contre le sur-ajustement, la pensée conspirationniste et la complication inutile.
      Il favorise la parcimonie dans l'explication.
    why_this_is_important: |
      Appliquer le Rasoir d'Ockham améliore la résolution de problèmes, réduit le sur-ajustement dans les modèles,
      et vous aide à éviter les théories élaborées mais non étayées. C'est une valeur par défaut utile
      lorsque les preuves sont ambiguës.
    when_to_use:
      - résolution_de_problèmes
      - prise_de_décisions
      - apprentissage
      - évaluation_des_risques
    how_can_you_spot_it:
      unnecessary_complexity: |
        Une explication fait appel à de nombreuses hypothèses alors que moins suffiraient.
      conspiracy_tendencies: |
        Des explications complexes impliquant de nombreux acteurs pour des événements aux causes plus simples.
      overfitting: |
        Un modèle ou une théorie qui explique parfaitement les données passées mais échoue sur de nouvelles données.
      elegance_in_explanation: |
        Les meilleures explications semblent souvent "évidentes" rétrospectivement.
    examples:
      debugging: |
        Lorsqu'un bug survient, vérifiez d'abord les causes les plus simples (par exemple, faute de frappe, mauvaise configuration)
        avant de supposer des problèmes d'architecture.
      conspiracy_theories: |
        "Le gouvernement a orchestré X" nécessite de nombreux acteurs cachés ; "quelques personnes
        ont fait des erreurs" est plus simple.
      product_failure: |
        Les utilisateurs n'adoptent pas une fonctionnalité — explication la plus simple : elle ne résout pas leur
        problème, pas qu'ils sont confus par l'interface utilisateur.
      medical_diagnosis: |
        "Les choses courantes sont courantes" — considérez les diagnostics fréquents avant les rares.
    real_world_implications: |
      Le Rasoir d'Ockham guide la recherche scientifique, l'ingénierie et le raisonnement quotidien.
      Il réduit le gaspillage d'efforts sur des théories erronées et élaborées. Mal appliqué, il peut rejeter
      des phénomènes réellement complexes.
    professional_application:
      networking_and_relationship_building: |
        Lors de l'interprétation du comportement d'autrui, privilégiez les explications simples (ils sont occupés,
        ils ont oublié) avant de supposer de la malveillance ou des motifs complexes.
      collaborative_learning_initiative: |
        Dans les sessions de résolution de problèmes, demandez explicitement "Quelle est l'explication la plus simple ?"
        avant de construire des modèles complexes.
    how_can_this_be_misapplied:
      oversimplification: |
        Rejeter des explications complexes valides parce qu'elles sont "trop compliquées".
      status_quo_bias: |
        Utiliser le Rasoir d'Ockham pour préférer les explications familières aux explications nouvelles mais correctes.
      scientific_rigidity: |
        Rejeter de nouvelles théories parce qu'elles sont plus complexes, même lorsque les preuves les soutiennent.
      missing_nuance: |
        Certains domaines (par exemple, le comportement humain, les écosystèmes) sont intrinsèquement complexes ;
        la simplicité peut être trompeuse.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Effet autruche
    quick_introduction: |
      L'effet autruche est la tendance à éviter les informations financières négatives – à
      "mettre la tête dans le sable" comme une autruche. Les gens évitent de regarder leurs
      portefeuilles lorsque les marchés baissent, retardent l'ouverture de factures et ignorent les signaux d'alarme qui pourraient les aider à agir.
    one_liner: Éviter les mauvaises nouvelles ne change pas la réalité – cela ne fait que retarder votre réponse.
    try_this:
      - Planifiez des points de contrôle réguliers pour ne pas pouvoir éviter les chiffres.
      - Remarquez quand vous retardez l'ouverture de quelque chose ou l'examen de quelque chose.
      - Demandez: Qu'est-ce que j'évite, et qu'est-ce qui changerait si je y faisais face ?
    ask_yourself:
      - Est-ce que j'évite des informations parce qu'elles pourraient être mauvaises ?
      - Une prise de conscience plus précoce m'aiderait-elle à mieux agir ?
    in_more_detail: |
      Le terme a été inventé en finance comportementale pour décrire les investisseurs qui évitent
      de vérifier leurs investissements lors des baisses du marché. Ce comportement s'étend
      au-delà de la finance : éviter les bilans de santé, ignorer les problèmes relationnels,
      et retarder les conversations difficiles. Nous cherchons à éviter l'anxiété des
      mauvaises nouvelles, mais l'évitement aggrave souvent les résultats en empêchant une action rapide.

      L'effet est motivé par l'aversion à la perte et le désir d'éviter l'inconfort émotionnel.
      Malheureusement, l'ignorance ne change pas la réalité – elle ne fait que retarder
      notre réponse.
    why_this_is_important: |
      Reconnaître l'effet autruche vous aide à confronter les informations difficiles
      de manière proactive. Éviter les mauvaises nouvelles améliore rarement les résultats ; cela les aggrave généralement.
      Une prise de conscience opportune permet de meilleures décisions.
    when_to_use:
      - prise_de_decision
      - investissement
      - evaluation_des_risques
      - changement_de_carriere
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Ne pas regarder les relevés de placement lorsque les marchés sont en baisse.
      delaying_difficult_information: |
        Reporter l'ouverture des factures, des résultats médicaux ou des retours de performance.
      information_avoidance: |
        Éviter activement les sources qui pourraient contenir de mauvaises nouvelles.
      procrastination_on_unpleasant_tasks: |
        Retarder les actions qui révéleraient ou aborderaient les problèmes.
    examples:
      investing: |
        Un investisseur cesse de vérifier son plan 401(k) pendant un marché baissier, manquant
        des opportunités de rééquilibrage.
      health: |
        Éviter un rendez-vous chez le médecin malgré des symptômes par peur de mauvaises nouvelles.
      finances: |
        Ne pas ouvrir les relevés de carte de crédit ou les alertes bancaires pour éviter de faire face à des dettes.
      performance: |
        Un manager évite de donner des retours critiques jusqu'à l'évaluation annuelle, quand
        une intervention plus précoce aurait aidé.
    real_world_implications: |
      L'effet autruche entraîne de moins bons résultats financiers, des traitements médicaux retardés,
      et des problèmes non résolus dans les relations et au travail. Cela aggrave les pertes évitables.
      Les systèmes qui rendent l'information difficile à ignorer peuvent aider.
    professional_application:
      networking_and_relationship_building: |
        N'évitez pas les conversations difficiles. Abordez les problèmes tôt plutôt que
        d'espérer qu'ils se résolvent d'eux-mêmes. Créez des points de contrôle réguliers qui révèlent
        les problèmes avant qu'ils n'escaladent.
      collaborative_learning_initiative: |
        Construisez des boucles de rétroaction qui rendent les problèmes difficiles à ignorer – tableaux de bord,
        examens réguliers et normes qui encouragent la divulgation précoce des mauvaises nouvelles.
    how_can_this_be_misapplied:
      information_overload: |
        Forcer une surveillance constante alors qu'une certaine évitement de l'information est saine
        (par exemple, ne pas vérifier les actions chaque minute).
      anxiety_amplification: |
        Créer tellement d'attention sur les problèmes potentiels que cela augmente l'anxiété
        sans améliorer les résultats.
      blame_shifting: |
        Attribuer tout évitement à "l'effet autruche" alors qu'un certain évitement est
        rationnel (par exemple, ignorer le bruit).
      micromanagement: |
        Utiliser le concept pour justifier une surveillance excessive des autres.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Principe de Pareto
    quick_introduction: |
      Le principe de Pareto (ou loi du 80/20) stipule qu'environ 80 % des effets proviennent
      de 20 % des causes. Une petite minorité d'entrées produit souvent la majorité des sorties—
      dans les ventes, les bugs, les clients, les efforts, les fonctionnalités, et plus encore. Concentrez-vous sur les éléments vitaux.
    one_liner: 80 % des effets proviennent de 20 % des causes — concentrez-vous sur les éléments vitaux.
    try_this:
      - Identifiez les 20 % d'entrées qui produisent 80 % des résultats — intensifiez vos efforts dans ce domaine.
      - Réduisez ou dépriorisez les 80 % qui produisent peu.
      - Demandez: Quelles quelques choses, si je les faisais bien, auraient le plus d'importance ?
    ask_yourself:
      - Est-ce que j'étends mes efforts de manière égale alors que quelques choses sont plus importantes ?
      - Quel est mon 20 % à fort effet de levier ?
    in_more_detail: |
      Vilfredo Pareto a observé que 80 % des terres italiennes appartenaient à 20 % de la
      population. Le principe a été généralisé : 80 % des ventes proviennent de 20 % des
      clients, 80 % des bugs proviennent de 20 % du code, 80 % des résultats proviennent de 20 % des efforts.
      Le ratio exact varie, mais le schéma — la distribution inégale — est courant.

      Le principe suggère qu'identifier et se concentrer sur les 20 % à fort effet de levier
      peut améliorer considérablement les résultats. C'est une heuristique de priorisation, pas une loi physique.
    why_this_is_important: |
      Appliquer le principe de Pareto vous aide à prioriser sans merci, à éviter de perdre du temps sur des activités à faible impact, et à accomplir plus avec moins. Il est fondamental
      pour la productivité et la stratégie.
    when_to_use:
      - prise_de_decision
      - resolution_de_problemes
      - leadership
      - evolution_de_carriere
    how_can_you_spot_it:
      uneven_distribution: |
        Une petite fraction de X représente une grande fraction de Y.
      high_leverage_activities: |
        Quelques actions produisent la plupart des résultats.
      low_value_tail: |
        De nombreuses activités contribuent peu ; les réduire a un impact minimal.
      vital_few_vs_trivial_many: |
        La clé est d'identifier les quelques éléments qui comptent le plus.
    examples:
      sales: |
        20 % des clients génèrent 80 % du chiffre d'affaires — concentrez-vous sur leur fidélisation et leur croissance.
      software: |
        20 % des fonctionnalités sont à l'origine de 80 % de l'utilisation — priorisez celles-ci.
      productivity: |
        Quelques habitudes ou routines produisent la majeure partie de votre production — intensifiez vos efforts dans ce domaine.
      problems: |
        20 % des bugs sont responsables de 80 % des plantages — corrigez-les d'abord.
    real_world_implications: |
      Le principe de Pareto guide l'allocation des ressources, la stratégie produit, et
      la productivité personnelle. L'ignorer conduit à disperser les efforts de manière trop fine.
      L'appliquer à l'excès peut entraîner la négligence de la "longue traîne" là où elle est importante.
    professional_application:
      networking_and_relationship_building: |
        Identifiez les relations qui comptent le plus pour vos objectifs. Investissez
        de manière disproportionnée dans celles-ci plutôt que de répartir vos efforts équitablement.
      collaborative_learning_initiative: |
        Pour améliorer les performances d'une équipe, trouvez les 20 % d'interventions qui génèrent
        80 % des résultats. Concentrez la formation et les changements de processus dans ce domaine.
    how_can_this_be_misapplied:
      oversimplification: |
        Supposer que le 80/20 s'applique partout ; certaines distributions sont plus équilibrées.
      neglecting_the_tail: |
        Ignorer la "masse négligeable" quand elle compte collectivement (par exemple, de nombreux petits
        clients, des cas limites).
      false_precision: |
        Traiter le 80/20 comme une règle littérale plutôt qu'une heuristique approximative.
      misidentifying_the_vital_few: |
        Se concentrer sur les mauvais 20 % en raison d'une analyse erronée.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Loi de Parkinson
    quick_introduction: |
      La loi de Parkinson stipule que « le travail s'étend de manière à occuper tout le temps disponible pour son achèvement ». Donnez une tâche une semaine, et elle prend une semaine ; donnez-lui un jour, et elle est souvent accomplie en un jour. Il en va de même pour les budgets, la taille des équipes et les ressources.
    one_liner: Le travail s'étend de manière à occuper tout le temps disponible pour son achèvement.
    try_this:
      - Fixez des délais plus courts pour forcer la concentration et éviter l'expansion du champ d'application.
      - Demandez: Quel est le temps minimum que cela pourrait raisonnablement prendre ?
      - Remarquez quand du temps ou des ressources supplémentaires sont consommés sans valeur proportionnelle.
    ask_yourself:
      - Est-ce que je consomme le temps, ou est-ce que le travail l'exige réellement ?
      - Un délai plus court forcerait-il une meilleure priorisation ?
    in_more_detail: |
      C. Northcote Parkinson a observé que les bureaucraties croissent indépendamment de la quantité de travail à faire. Il a également noté que les tâches s'étendent pour occuper le temps disponible : nous ajustons notre effort et notre rythme à la date limite. Des délais serrés peuvent forcer la concentration ; des délais souples invitent à la procrastination et à l'expansion du champ d'application.

      Cette loi a des implications pour la gestion de projet, la productivité personnelle et la conception organisationnelle. Elle suggère que les contraintes peuvent améliorer les résultats en forçant la priorisation.
    why_this_is_important: |
      Comprendre la loi de Parkinson vous aide à fixer de meilleurs délais, à éviter de surdimensionner les projets en termes de ressources, et à reconnaître quand « plus de temps » ou « plus de personnes » n'aideront pas, et pourraient nuire. Les contraintes peuvent être productives.
    when_to_use:
      - prise_de_decision
      - leadership
      - resolution_de_problemes
      - evolution_de_carriere
    how_can_you_spot_it:
      deadline_driven_effort: |
        Le travail s'accélère à l'approche de la date limite ; peu de progrès lorsque la date limite est lointaine.
      scope_expansion: |
        Les projets s'étendent pour consommer les ressources disponibles plutôt que de rester concentrés.
      bureaucratic_growth: |
        Les organisations ajoutent des personnes et des processus même lorsque la charge de travail n'augmente pas.
      budget_exhaustion: |
        Les budgets sont entièrement dépensés, que les dépenses aient été nécessaires ou non.
    examples:
      student_deadlines: |
        Un devoir à rendre dans un mois est rédigé dans les dernières 48 heures.
      project_management: |
        Un projet avec une durée de 6 mois prend 6 mois ; le même périmètre avec une date limite de 3 mois pourrait également être réalisé.
      meetings: |
        Une réunion d'une heure remplit l'heure, même si 30 minutes auraient suffi.
      budgets: |
        Un département dépense son budget complet avant la fin de l'année pour justifier le même budget l'année suivante.
    real_world_implications: |
      La loi de Parkinson affecte la productivité, le gonflement organisationnel et l'allocation des ressources. Elle suggère que des contraintes artificielles (délais plus courts, équipes plus petites) peuvent améliorer la concentration et l'efficacité.
    professional_application:
      networking_and_relationship_building: |
        Fixez des délais clairs et serrés pour le travail collaboratif afin d'éviter l'expansion du champ d'application et de maintenir l'élan.
      collaborative_learning_initiative: |
        Utilisez le "time-boxing" (délimitation temporelle) pour les réunions et les projets. Expérimentez avec des délais plus courts pour tester s'ils améliorent la concentration sans sacrifier la qualité.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Fixer des délais arbitrairement courts qui provoquent l'épuisement professionnel ou une mauvaise qualité.
      underresourcing: |
        Supposer que moins de temps ou moins de personnes fonctionneront toujours ; certaines tâches nécessitent des ressources adéquates.
      blame_shifting: |
        Attribuer les retards à la « loi de Parkinson » alors que le travail était réellement complexe.
      ignoring_quality: |
        Se précipiter pour respecter des contraintes artificielles au détriment de résultats durables.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Pensée probabiliste
    quick_introduction: |
      La pensée probabiliste est l'habitude de raisonner en termes de probabilités
      plutôt que de certitudes. Au lieu de demander "cela va-t-il arriver ?", nous
      demandons "quelle est la probabilité que cela arrive ?". Elle accepte
      l'incertitude et l'utilise pour prendre de meilleures décisions.
    one_liner: Pensez en probabilités, pas en certitudes—acceptez l'incertitude.
    try_this:
      - Remplacez "cela va-t-il arriver ?" par "quelle est sa probabilité ?"
      - Considérez plusieurs scénarios et attribuez-leur des probabilités approximatives.
      - Mettez à jour vos croyances à mesure que de nouvelles preuves arrivent.
    ask_yourself:
      - Est-ce que je pense en termes binaires alors que des probabilités seraient plus précises ?
      - Quelle est la gamme des résultats plausibles ?
    in_more_detail: |
      La plupart des résultats dans le monde réel sont incertains. La pensée probabiliste
      remplace le oui/non binaire par des croyances graduées. Elle implique de
      considérer plusieurs scénarios, d'attribuer des probabilités approximatives et
      de mettre à jour ces probabilités à mesure que les preuves arrivent. C'est le
      contraire de la confiance excessive et de la pensée en noir et blanc.

      Les pratiques clés incluent : penser en termes de plages, considérer les taux de base,
      mettre à jour les croyances avec des preuves, et distinguer le risque (probabilités
      connues) de l'incertitude (probabilités inconnues). Elle améliore l'étalonnage et la
      qualité des décisions.
    why_this_is_important: |
      La pensée probabiliste réduit la confiance excessive, améliore les prévisions et
      conduit à de meilleures décisions dans l'incertitude. Elle est essentielle pour
      l'investissement, la stratégie et tout domaine où l'avenir est incertain.
    when_to_use:
      - prise_de_decision
      - evaluation_des_risques
      - investissement
      - resolution_de_problemes
    how_can_you_spot_it:
      likelihood_language: |
        "Probablement", "vraisemblablement", "peu probable" plutôt que "va" ou "ne va pas".
      scenario_thinking: |
        Considérer de multiples futurs possibles avec des probabilités approximatives.
      calibration: |
        Prédictions qui correspondent aux fréquences réelles des résultats au fil du temps.
      uncertainty_acknowledgment: |
        Déclarer explicitement ce que l'on ne sait pas.
    examples:
      forecasting: |
        "Je pense qu'il y a 60 % de chances que nous respections le délai" plutôt que "Nous
        respecterons le délai".
      investing: |
        "Cela a 30 % de chances de doubler et 70 % de chances de chuter de 50 %" plutôt que
        "Ça va exploser".
      strategy: |
        Planifier pour plusieurs scénarios (meilleur cas, cas de base, pire cas) avec des
        probabilités approximatives.
      hiring: |
        "Sur la base de l'entretien, je donnerais 70 % de probabilité qu'ils réussissent"
        plutôt que "C'est une excellente recrue".
    real_world_implications: |
      La pensée probabiliste améliore l'étalonnage, réduit les surprises et permet une
      meilleure gestion des risques. Elle est au cœur des prévisions efficaces et de la
      prise de décision dans l'incertitude.
    professional_application:
      networking_and_relationship_building: |
        Communiquez en probabilités lorsque c'est approprié — "Je suis assez confiant" vs.
        "Je suis certain". Cela renforce la confiance en signalant une humilité épistémique.
      collaborative_learning_initiative: |
        Encouragez les équipes à exprimer leur incertitude. Utilisez des marchés de prédiction ou
        des exercices d'étalonnage pour améliorer le jugement probabiliste.
    how_can_this_be_misapplied:
      false_precision: |
        Attribuer des probabilités exactes (par exemple, 73 %) lorsque l'on ne peut pas être aussi précis.
      analysis_paralysis: |
        Ne jamais agir parce que "nous ne pouvons pas être certains".
      hedging_overuse: |
        Qualifier tout à un point qui le rend inutile.
      dismissing_intuition: |
        Surcorriger pour ignorer les fortes intuitions lorsqu'elles peuvent contenir des informations valides.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Effet Pygmalion
    quick_introduction: |
      L'effet Pygmalion (ou effet Rosenthal) est le phénomène où des attentes plus
      élevées entraînent une amélioration des performances. Lorsque les enseignants,
      les managers ou d'autres attendent davantage de quelqu'un, cette personne a
      tendance à mieux performer. Les attentes deviennent des prophéties qui se
      réalisent d'elles-mêmes.
    one_liner: Des attentes plus élevées mènent à de meilleures performances - les attentes façonnent la réalité.
    try_this:
      - Fixez des attentes élevées mais réalisables ; communiquez-les clairement.
      - Remarquez quand des attentes faibles pourraient limiter les performances de quelqu'un.
      - Demandez: Qu'est-ce que j'attends implicitement - et comment cela pourrait-il influencer les résultats ?
    ask_yourself:
      - Mes attentes aident-elles ou limitent-elles cette personne ?
      - Des attentes plus élevées changeraient-elles la façon dont je la traite - et ses résultats ?
    in_more_detail: |
      Robert Rosenthal et Lenore Jacobson ont donné aux enseignants de fausses informations selon lesquelles certains élèves "écloreraient" académiquement. Ces élèves, sélectionnés au hasard, se sont effectivement améliorés plus que les autres. Les attentes des enseignants ont influencé leur comportement (plus d'attention, des retours plus chaleureux), ce qui a influencé les performances des élèves. Les attentes façonnent la réalité.

      L'inverse - des attentes faibles conduisant à de moins bonnes performances - est parfois appelé l'effet Golem. Les deux montrent que nos croyances sur les autres peuvent influencer leurs résultats. Cela a des implications profondes pour le leadership, l'éducation et la parentalité.
    why_this_is_important: |
      Comprendre l'effet Pygmalion vous aide à exploiter le pouvoir des attentes. Des attentes élevées, communiquées sincèrement, peuvent améliorer les performances. Des attentes faibles peuvent créer un échec auto-réalisateur. Vos croyances sur les autres comptent.
    when_to_use:
      - leadership
      - construction_de_relations
      - apprentissage
      - prise_de_decision
    how_can_you_spot_it:
      expectation_performance_link: |
        Ceux de qui nous attendons plus ont tendance à mieux performer.
      differential_treatment: |
        Nous traitons les gens différemment en fonction de nos attentes - souvent inconsciemment.
      self_fulfilling_prophecy: |
        Les croyances sur les capacités influencent le comportement qui façonne les capacités.
      teacher_student_dynamics: |
        Les attentes des éducateurs influencent les résultats des élèves par un traitement différentiel.
    examples:
      education: |
        Les enseignants qui s'attendent à ce que les élèves réussissent leur apportent plus de soutien ; ces élèves s'améliorent. Les enseignants qui s'attendent à l'échec peuvent involontairement le créer.
      workplace: |
        Les managers qui attendent de hautes performances de leurs subordonnés leur offrent plus d'opportunités et de retours ; les performances s'améliorent.
      parenting: |
        Les parents qui attendent de leurs enfants qu'ils soient responsables leur donnent plus de responsabilités ; ils sont à la hauteur.
      stereotypes: |
        La menace du stéréotype est l'inverse : des attentes négatives peuvent altérer les performances.
    real_world_implications: |
      L'effet Pygmalion affecte l'éducation, la gestion et les relations. Il suggère que hausser les attentes - lorsqu'elles sont faites de manière solidaire - peut améliorer les résultats. Il avertit également que des attentes faibles peuvent être destructrices.
    professional_application:
      networking_and_relationship_building: |
        Ayez des attentes élevées envers les gens - et fournissez le soutien nécessaire pour les atteindre. Croyez en leur potentiel. Vos attentes influencent votre comportement, qui influence leurs résultats.
      collaborative_learning_initiative: |
        Créez des cultures d'attentes élevées avec un soutien élevé. Évitez de qualifier les gens de "mauvais performeurs" d'une manière qui se réalise d'elle-même. Investissez dans ceux dont vous attendez le succès.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Fixer des attentes impossibles à atteindre sans soutien crée l'échec et la démoralisation.
      blame_shifting: |
        "Ils n'ont pas répondu aux attentes" alors que nous n'avons pas fourni le soutien ou les conditions de succès.
      ignoring_constraints: |
        Les attentes seules ne surmontent pas les barrières structurelles.
      pressure_without_support: |
        Des attentes élevées sans ressources ou soutien peuvent être nuisibles.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Régression vers la moyenne
    quick_introduction: |
      La régression vers la moyenne est le phénomène statistique selon lequel des résultats extrêmes ont tendance à être suivis par des résultats plus proches de la moyenne. Après un résultat exceptionnellement bon ou mauvais, le résultat suivant sera probablement moins extrême, non pas en raison d'une intervention causale, mais en raison d'une variation aléatoire.
    one_liner: Les résultats extrêmes ont tendance à être suivis par des résultats plus proches de la moyenne.
    try_this:
      - N'attribuez pas la "régression" à votre intervention: elle se serait souvent produite de toute façon.
      - Après un résultat extrême, attendez-vous à ce que le prochain soit moins extrême.
      - Demandez: Ce changement est-il dû à ce que j'ai fait, ou juste à la régression vers la moyenne ?
    ask_yourself:
      - Est-ce que j'attribue à tort ou à raison mon intervention à ce qui pourrait être une variation aléatoire ?
      - Cela se serait-il produit sans mon action ?
    in_more_detail: |
      Si un étudiant obtient un score exceptionnellement élevé à un test, il obtiendra probablement un score plus proche de sa moyenne au suivant, non pas parce qu'il s'est "relâché", mais parce que le premier score était en partie dû à la chance. Il en va de même pour les performances sportives, les rendements boursiers et les indicateurs commerciaux. Nous attribuons souvent la "régression" à quelque chose que nous avons fait (par exemple, une punition ou une récompense), alors qu'elle se serait produite de toute façon.

      Daniel Kahneman décrit comment les instructeurs de vol ont conclu à tort que les louanges aggravaient les performances et que les critiques les amélioraient : ils observaient la régression vers la moyenne après des performances extrêmes.
    why_this_is_important: |
      Comprendre la régression vers la moyenne empêche d'attribuer à tort une causalité. Cela vous aide à éviter de réagir de manière excessive aux valeurs aberrantes et à apporter des changements basés sur le bruit. C'est essentiel pour évaluer les interventions et les performances.
    when_to_use:
      - prise_de_decision
      - investissement
      - evaluation_du_risque
      - leadership
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Un résultat exceptionnellement bon ou mauvais est suivi par un résultat plus proche de la moyenne.
      spurious_causation: |
        Attribuer le "rétablissement" ou le "déclin" à une intervention alors que la régression se serait produite de toute façon.
      overreaction_to_outliers: |
        Prendre des décisions politiques ou personnelles basées sur un seul point de données extrême.
      reward_punishment_confusion: |
        Croire que la punition a "fonctionné" alors que l'amélioration n'était qu'une régression.
    examples:
      sports: |
        Un joueur réalise un match de carrière, puis revient à la moyenne. Les fans peuvent blâmer la "complaisance".
      investing: |
        Une action connaît une année exceptionnelle, puis se redresse. Les investisseurs peuvent attribuer le déclin
        à une mauvaise gestion alors qu'il s'agit en partie d'une réversion.
      performance_reviews: |
        Un employé connaît un mauvais trimestre, reçoit des commentaires, s'améliore. Les commentaires peuvent être crédités
        alors que la régression se serait produite indépendamment.
      medicine: |
        Un patient se sent mal, suit un traitement, s'améliore. Le traitement peut être crédité
        alors qu'une partie de l'amélioration était naturelle.
    real_world_implications: |
      La régression vers la moyenne affecte la façon dont nous évaluons les enseignants, les médecins, les gestionnaires de fonds et nous-mêmes. Elle explique pourquoi "ce qui monte doit redescendre" est souvent statistiquement vrai. Une mauvaise compréhension conduit à des interventions inutiles et à une fausse confiance dans les remèdes.
    professional_application:
      networking_and_relationship_building: |
        N'interprétez pas outre mesure une seule mauvaise interaction : il peut s'agir d'une valeur aberrante qui régressera
        vers la moyenne de la relation.
      collaborative_learning_initiative: |
        Lors de l'évaluation des interventions (formation, changements de processus), utilisez des groupes témoins
        et plusieurs points de données pour distinguer l'effet de la régression.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Supposer que toute amélioration après une intervention n'est "qu'une régression"
        alors que des effets réels existent.
      underreacting: |
        Ignorer les problèmes réels parce que "ça régressera vers la moyenne".
      statistical_illiteracy: |
        Confondre la régression avec une force qui "corrige" les résultats : c'est juste
        la probabilité.
      overconfidence: |
        Supposer que la moyenne est stable alors que le processus sous-jacent a peut-être changé.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Rétrospection Idéalisée
    quick_introduction: |
      La rétrospection idéalisée est la tendance à se souvenir du passé comme étant meilleur qu'il ne l'était réellement.
      Nous nous remémorons les expériences passées de manière plus positive avec le temps, en lissant les difficultés
      et en amplifiant le positif. "Le bon vieux temps" n'était souvent pas aussi bon que nous nous en souvenons.
    one_liner: Nous nous souvenons du passé comme étant meilleur qu'il ne l'était — "le bon vieux temps" n'était pas si bon.
    try_this:
      - En comparant avec le passé, demandez-vous: Que ressentais-je réellement à l'époque ?
      - Tenez un journal pour comparer ultérieurement la mémoire et la réalité.
      - Remarquez quand la nostalgie colore votre jugement du présent.
    ask_yourself:
      - Est-ce que j'idéalise le passé ?
      - Aurais-je été heureux à l'époque si j'avais pu voyager dans le temps ?
    in_more_detail: |
      Nous avons tendance à nous souvenir des aspects positifs des expériences passées et à oublier ou
      à minimiser les aspects négatifs. Les vacances, les emplois et les relations semblent meilleurs dans
      la nostalgie qu'ils ne l'étaient sur le moment. Cela peut conduire à des comparaisons irréalistes :
      nous jugeons le présent par rapport à un passé idéalisé.

      La rétrospection idéalisée affecte la prise de décision lorsque nous répétons des choix passés
      en attendant le même résultat (souvenu). Elle peut également alimenter la nostalgie pour
      des époques qui étaient objectivement pires. C'est l'opposé du biais de négativité
      dans la mémoire.
    why_this_is_important: |
      Reconnaître la rétrospection idéalisée vous aide à faire des comparaisons plus réalistes
      et à éviter de répéter des erreurs passées basées sur des souvenirs idéalisés. Elle explique également
      pourquoi nous aspirons parfois au passé malgré les progrès actuels.
    when_to_use:
      - prise_de_decision
      - changements_de_carriere
      - construction_de_relations
      - apprentissage
    how_can_you_spot_it:
      idealized_past: |
        "Les choses étaient mieux avant" alors que des mesures objectives peuvent montrer le contraire.
      selective_positive_memory: |
        Se souvenir du bon et oublier le mauvais des expériences passées.
      nostalgia_as_evidence: |
        Utiliser des souvenirs heureux comme preuve que les choix passés étaient corrects.
      present_undervaluation: |
        Le présent semble pire qu'il ne l'est parce que nous nous comparons à un passé idéalisé.
    examples:
      career: |
        "Mon ancien travail était super" alors que vous êtes parti pour de bonnes raisons — la mémoire a lissé
        les frustrations.
      relationships: |
        "Nous étions si heureux" à propos d'une relation passée — oubliant les conflits qui ont
        conduit à sa fin.
      childhood: |
        "Les enfants avaient une meilleure vie de mon temps" alors que de nombreuses mesures objectives (santé,
        sécurité, opportunités) se sont améliorées.
      projects: |
        "Ce projet s'est déroulé sans problème" alors qu'il a en fait connu de nombreux retards — nous nous souvenons
        du résultat, pas du processus.
    real_world_implications: |
      La rétrospection idéalisée affecte la satisfaction de vie, les décisions de carrière et
      les choix motivés par la nostalgie. Elle peut conduire à répéter des erreurs passées ou
      à des comparaisons irréalistes. Elle explique également l'attrait de la rhétorique "retour au bon vieux temps".
    professional_application:
      networking_and_relationship_building: |
        Lorsque vous envisagez de reprendre contact avec d'anciens collègues ou de retourner dans d'anciens
        postes, séparez la nostalgie de la réalité. Documentez vos raisons de partir à l'époque ; revoyez-les avant de revenir.
      collaborative_learning_initiative: |
        Lors des rétrospectives, utilisez des notes ou des données contemporaines plutôt que la mémoire pour évaluer ce qui s'est réellement passé. La mémoire lisse les difficultés.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Toute nostalgie n'est pas trompeuse — parfois le passé était réellement meilleur
        à certains égards.
      invalidating_memories: |
        Dire aux gens que leurs souvenirs positifs sont "faux" alors qu'ils peuvent refléter
        une expérience subjective authentique.
      overcorrection: |
        Supposer que le passé était toujours pire que nous ne nous en souvenons — parfois il était
        meilleur.
      present_bias: |
        Utiliser la rétrospection idéalisée comme excuse pour rejeter les préoccupations légitimes
        concernant le déclin actuel.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Biais de saillance
    quick_introduction: |
      Le biais de saillance est la tendance à se concentrer sur les aspects les plus
      prominents ou visibles d'une situation tout en négligeant des facteurs moins
      évidents mais potentiellement importants. Ce qui ressort attire une attention et
      un poids disproportionnés dans nos jugements.
    one_liner: Ce qui ressort attire une attention disproportionnée - le subtil est négligé.
    try_this:
      - Demander: Qu'est-ce que je ne vois pas parce que ce n'est pas saillant ?
      - Rechercher activement des facteurs moins évidents avant de prendre une décision.
      - Noter quand un élément vif ou dramatique domine votre jugement.
    ask_yourself:
      - Est-ce que je surévalue ce qui est prominent et sous-évalue ce qui est subtil ?
      - Quels facteurs importants pourrais-je négliger ?
    in_more_detail: |
      L'information saillante est vive, chargée émotionnellement ou rencontrée
      récemment. Elle capte l'attention et influence les décisions plus qu'elle ne le
      devrait. Nous surévaluons le conspicuous et sous-évaluons le subtil. Un
      événement dramatique ou un exemple vif peut dominer notre pensée même s'il
      n'est pas représentatif.

      Le biais de saillance chevauche l'heuristique de disponibilité (ce qui nous
      vient à l'esprit) et le biais de récence (ce qui s'est passé récemment). Il
      affecte la perception du risque, l'embauche et la stratégie. Les problèmes les
      plus visibles sont abordés ; les problèmes invisibles s'aggravent.
    why_this_is_important: |
      Reconnaître le biais de saillance vous aide à regarder au-delà de l'évident et à
      considérer des facteurs moins visibles. Cela améliore l'évaluation des risques,
      le diagnostic des problèmes et la qualité des décisions. Les choses
      importantes ne sont pas toujours saillantes.
    when_to_use:
      - prise_de_decision
      - resolution_de_problemes
      - evaluation_des_risques
      - leadership
    how_can_you_spot_it:
      prominent_factor_dominance: |
        L'aspect le plus remarquable dicte la décision.
      overlooking_background: |
        Les facteurs moins visibles sont ignorés malgré leur importance.
      vividness_overweighting: |
        L'information dramatique ou émotionnelle reçoit un poids
        disproportionné.
      visibility_bias: |
        Ce que nous pouvons facilement voir ou mesurer reçoit plus d'attention que
        ce que nous ne pouvons pas.
    examples:
      risk: |
        Un crash d'avion est saillant - nous surestimons le risque de voler. Les
        accidents de voiture sont moins saillants globalement - nous sous-estimons
        le risque de conduire.
      hiring: |
        Les compétences de présentation d'un candidat sont saillantes ; son
        suivi peut être moins visible mais tout aussi important.
      strategy: |
        Les mouvements des concurrents sont saillants ; les évolutions graduelles
        du marché sont moins perceptibles mais peuvent avoir plus d'importance.
      problems: |
        La plainte la plus forte est traitée tandis que les problèmes systémiques
        passent inaperçus.
    real_world_implications: |
      Le biais de saillance affecte ce qui retient l'attention, le financement et
      l'action. Il peut conduire à traiter les symptômes plutôt que les causes et à
      allouer des ressources de manière erronée. Rechercher délibérément des
      informations non saillantes améliore les décisions.
    professional_application:
      networking_and_relationship_building: |
        Ne jugez pas les gens uniquement par leurs traits les plus visibles. Cherchez
        des qualités moins évidentes : fiabilité, cohérence, la façon dont ils
        traitent les personnes qui ne peuvent pas les aider.
      collaborative_learning_initiative: |
        Dans la résolution de problèmes, demandez explicitement "Qu'est-ce que nous ne voyons pas ?"
        et "Qu'est-ce qui est moins évident mais important ?" Créez des processus qui font
        remonter les problèmes non saillants.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Parfois, ce qui est saillant est important. Ne rejetez pas tout ce qui est
        évident.
      false_sophistication: |
        Supposer que les facteurs obscurs sont toujours plus importants que les
        facteurs évidents.
      analysis_paralysis: |
        Rechercher tellement de facteurs non saillants que vous n'agissez jamais sur
        les facteurs saillants.
      contrarianism: |
        Rejeter l'information saillante juste pour être différent.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Biais de rareté
    quick_introduction: |
      Le biais de rareté est la tendance à accorder plus de valeur aux choses lorsqu'elles
      semblent rares ou limitées. Les mentions « temps limité », « seulement 3 restants » et « accès exclusif » créent un sentiment d'urgence et de désir, qui l'emporte souvent sur une évaluation rationnelle de la nécessité ou de l'envie réelle de l'objet.
    one_liner: La rareté amplifie la valeur perçue – le « limité » crée l'urgence au détriment de la rationalité.
    try_this:
      - Demandez: Est-ce que je voudrais cela si ce n'était pas rare ? Éliminez l'urgence.
      - Faites une pause avant d'agir sur les offres « temps limité » ou « seulement X restants ».
      - Remarquez quand la rareté motive votre désir plus que la valeur réelle.
    ask_yourself:
      - Est-ce que j'accorde de la valeur à cela parce qu'il est rare, ou parce que j'en ai réellement besoin ?
      - Prendrais-je cette décision sans le cadre de la rareté ?
    in_more_detail: |
      La rareté amplifie la valeur perçue. Quand quelque chose est rare ou disparaît, nous
      le voulons davantage – en partie parce que la rareté peut signaler la qualité, et en partie parce que
      l'aversion à la perte nous fait craindre de manquer quelque chose. Les spécialistes du marketing et les négociateurs utilisent la rareté
      pour créer un sentiment d'urgence. Ce biais peut conduire à des décisions impulsives, à des dépenses excessives et à une mauvaise priorisation.

      La rareté affecte également la bande passante cognitive de ceux qui sont véritablement
      contraints par les ressources ; la pauvreté peut réduire la « bande passante mentale » pour d'autres décisions.
    why_this_is_important: |
      Reconnaître le biais de rareté vous aide à résister aux tactiques manipulatrices et à faire des choix plus délibérés.
      Il explique également pourquoi nous surévaluons les éditions limitées et nous précipitons quand ce n'est pas nécessaire.
    when_to_use:
      - prise_de_decision
      - négociation
      - investissement
      - évaluation_des_risques
    how_can_you_spot_it:
      urgency_trigger: |
        « Temps limité » ou « seulement X restants » créent un désir disproportionné.
      fear_of_missing_out: |
        La possibilité de perdre l'accès motive l'action plus que la valeur intrinsèque.
      impulsive_purchases: |
        Acheter des choses parce qu'elles sont rares plutôt que parce que vous en avez besoin.
      artificial_scarcity: |
        La rareté est fabriquée (par exemple, de faux comptes à rebours) plutôt que réelle.
    examples:
      sales: |
        « Seulement 2 restants en stock » ou « La promotion se termine ce soir » déclenchent des achats qui n'auraient pas eu lieu sans l'urgence.
      auctions: |
        Les enchérisseurs se laissent prendre par le fait de gagner et paient plus qu'ils ne l'avaient prévu en raison de
        la rareté compétitive.
      exclusivity: |
        L'accès « réservé aux membres » ou « sur invitation uniquement » augmente la valeur perçue.
      genuine_scarcity: |
        Lorsque les ressources sont véritablement limitées, les personnes sous stress de rareté prennent de moins bonnes décisions (par exemple, les pauvres, ceux qui manquent de temps).
    real_world_implications: |
      Le biais de rareté influence le comportement des consommateurs, les résultats des négociations et les réponses politiques.
      Il peut être utilisé de manière éthique (par exemple, des délais légitimes) ou non éthique
      (par exemple, une fausse rareté). Le comprendre améliore la qualité des décisions.
    professional_application:
      networking_and_relationship_building: |
        Soyez prudent lorsque d'autres créent une rareté artificielle (« Je ne prends que quelques
        clients »). Vérifiez si la rareté est réelle. Lors de la construction de relations,
        la rareté authentique de votre temps peut signaler sa valeur, mais une utilisation excessive peut sembler manipulatrice.
      collaborative_learning_initiative: |
        Lors de la création d'un sentiment d'urgence pour des initiatives, assurez-vous qu'il est légitime. De faux délais
        érodent la confiance lorsqu'ils sont découverts.
    how_can_this_be_misapplied:
      manipulation: |
        Créer délibérément une fausse rareté pour faire pression sur les autres afin qu'ils prennent des décisions.
      impulsive_decisions: |
        Prendre des décisions importantes sous une urgence artificielle alors que plus de temps améliorerait
        les résultats.
      overvaluing_scarcity: |
        Supposer que les choses rares sont toujours meilleures – parfois la rareté est arbitraire.
      exploiting_vulnerability: |
        Utiliser des tactiques de rareté sur des personnes déjà stressées par les ressources.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Pensée du second ordre
    quick_introduction: |
      La pensée du second ordre est la pratique consistant à examiner les conséquences des
      conséquences de vos actions. La pensée du premier ordre demande « que se passe-t-il si je
      fais X ? ». La pensée du second ordre demande « et ensuite ? » et « et ensuite après
      cela ? ». Elle fait apparaître les effets non intentionnels.
    one_liner: Demandez « et ensuite ? » — considérez les conséquences des conséquences.
    try_this:
      - Pour toute décision, demandez « et ensuite ? » au moins deux fois.
      - Considérez comment les autres réagiront à votre action — et ensuite à cette réaction.
      - Remarquez quand les effets du premier ordre s'inversent ou se compliquent dans la chaîne.
    ask_yourself:
      - Ai-je réfléchi aux effets du second ordre (et du troisième ordre) ?
      - Quelles conséquences involontaires pourrais-je manquer ?
    in_more_detail: |
      Howard Marks a popularisé le concept dans le domaine de l'investissement. Premier ordre : « Cela
      va monter ». Second ordre : « Si cela monte, d'autres le remarqueront, davantage achèteront,
      cela montera encore plus — jusqu'à ce qu'il soit surévalué et s'effondre. » La chaîne des
      conséquences inverse ou complique souvent l'effet du premier ordre.

      La pensée du second ordre est plus difficile — elle demande plus d'effort mental et
      d'imagination. Mais elle évite de nombreuses erreurs. Les bons stratèges pensent plusieurs
      coups d'avance et considèrent comment les autres réagiront.
    why_this_is_important: |
      La pensée du second ordre évite les conséquences involontaires et améliore la
      qualité des décisions. Elle est essentielle pour la stratégie, la politique et tout domaine
      où les actions déclenchent des réactions.
    when_to_use:
      - prise_de_decision
      - resolution_de_probleme
      - strategie
      - evaluation_des_risques
    how_can_you_spot_it:
      consequence_chains: |
        « Si je fais X, alors Y se produira, puis Z se produira... »
      reaction_anticipation: |
        Considérer comment les autres réagiront à votre action.
      unintended_effects: |
        Rechercher les effets secondaires et les boucles de rétroaction.
      reversals: |
        Les effets du second ordre qui contredisent ou inversent les effets du premier ordre.
    examples:
      investing: |
        « Si tout le monde pense que c'est un bon investissement, il est probablement déjà surpeuplé —
        l'avantage est peut-être perdu. »
      policy: |
        « Si nous subventionnons X, la demande augmente, les prix grimpent — la subvention
        aide-t-elle réellement ? »
      negotiation: |
        « Si je pousse fort ici, ils vont riposter là — quel est l'effet net ? »
      incentives: |
        « Si nous récompensons cette métrique, les gens vont la manipuler — que vont-ils
        réellement faire ? »
    real_world_implications: |
      La pensée du second ordre est la marque de fabrique de la pensée stratégique. Elle évite les
      échecs politiques, les incitations involontaires et l'optimisme naïf. Elle
      distingue les bons des grands décideurs.
    professional_application:
      networking_and_relationship_building: |
        Avant d'agir, demandez-vous « Comment vont-ils réagir ? Et comment vais-je
        réagir à cela ? » Considérez la dynamique relationnelle, pas seulement l'échange immédiat.
      collaborative_learning_initiative: |
        En planification, réalisez des exercices « et ensuite ? ». Cartographiez les chaînes de conséquences.
        Identifiez les effets involontaires avant qu'ils n'apparaissent.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Penser à tellement d'étapes à l'avance que vous n'agissez jamais.
      false_complexity: |
        Supposer que les effets du second ordre dominent toujours alors que les effets du premier
        ordre peuvent être suffisants.
      overconfidence: |
        Croire que l'on peut prédire de longues chaînes lorsque l'incertitude s'accumule.
      pessimism: |
        Toujours supposer le pire dans la chaîne des conséquences.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Le coût irrécupérable
    quick_introduction: |
      Le biais du coût irrécupérable est la tendance à continuer d'investir dans une décision
      en raison des ressources déjà dépensées, plutôt qu'en fonction des rendements futurs attendus.
      "Nous sommes allés aussi loin" ou "J'ai déjà investi tellement" conduit à jeter de l'argent par les fenêtres.
    one_liner: L'investissement passé est perdu — seuls les coûts et bénéfices futurs importent.
    try_this:
      - Ask — Si je commençais aujourd'hui, choisirais-je cette voie ?
      - Define — Définissez à l'avance des critères d'abandon — conditions sous lesquelles vous arrêterez.
      - Evaluate — Évaluez la décision marginale — qu'est-ce que je gagne ou perds à partir de maintenant ?
    ask_yourself:
      - Est-ce que je continue à cause de la valeur future, ou pour justifier l'investissement passé ?
      - Que conseillerais-je à un ami qui serait à ma place, en partant de zéro ?
    in_more_detail: |
      Les coûts irrécupérables sont des coûts passés qui ne peuvent pas être récupérés. La prise de décision rationnelle
      les ignore — seuls les coûts et les bénéfices futurs importent. Mais nous sommes émotionnellement
      attachés à nos investissements. Nous finissons le repas que nous n'apprécions pas, restons au
      film que nous n'aimons pas, et continuons des projets qui n'ont plus de sens. Nous voulons
      "ne pas gaspiller" ce que nous avons investi, mais continuer gaspille souvent davantage.

      Le biais est particulièrement fort lorsque nous avons investi du temps, des efforts, ou notre identité,
      pas seulement de l'argent. Admettre que nous avions tort peut sembler coûteux, alors nous doublons la mise.
    why_this_is_important: |
      Reconnaître le biais du coût irrécupérable vous aide à limiter les pertes, à changer de direction lorsque
      c'est justifié, et à prendre des décisions basées sur la valeur future plutôt que sur l'investissement passé.
      C'est essentiel pour les projets, les carrières et les relations.
    when_to_use:
      - prise_de_decision
      - investissement
      - changements_de_carriere
      - evaluation_des_risques
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "Nous ne pouvons pas nous arrêter maintenant — nous avons déjà dépensé X" lorsque les rendements futurs ne justifient pas
        la continuation.
      escalation_of_commitment: |
        Investir davantage pour justifier ou "sauver" un investissement antérieur.
      identity_investment: |
        Continuer parce qu'admettre l'échec menacerait l'image de soi.
      ignoring_marginal_analysis: |
        Baser les décisions sur le coût total plutôt que sur le coût et le bénéfice incrémentaux.
    examples:
      projects: |
        Continuer un projet en échec parce que "nous y avons déjà consacré 6 mois"
        alors que limiter les pertes serait rationnel.
      relationships: |
        Rester dans une relation parce que "nous sommes ensemble depuis 5 ans" plutôt que
        d'évaluer l'avenir.
      careers: |
        Rester dans une carrière que l'on n'aime pas parce que l'on a investi dans le diplôme ou
        les années d'expérience.
      investments: |
        Garder une action perdante pour "revenir à l'équilibre" plutôt que de réallouer vers
        de meilleures opportunités.
    real_world_implications: |
      Le biais du coût irrécupérable entraîne un gaspillage de ressources, des échecs prolongés et des opportunités manquées.
      Il affecte les individus, les organisations et les gouvernements.
      Le surmonter nécessite des cadres de décision explicites.
    professional_application:
      networking_and_relationship_building: |
        Ne continuez pas à investir dans des relations ou des collaborations qui ne vous servent plus
        simplement à cause d'un investissement passé. Évaluez la valeur prospective.
      collaborative_learning_initiative: |
        Créez des "critères d'abandon" pour les projets — conditions sous lesquelles vous arrêterez
        indépendamment de l'investissement passé. Revoyez périodiquement les projets avec une lentille "à partir de zéro".
    how_can_this_be_misapplied:
      quitting_too_early: |
        Utiliser le "coût irrécupérable" comme excuse pour abandonner des choses qui nécessitent plus de temps pour porter leurs fruits.
      undervaluing_consistency: |
        Certains engagements (par exemple, les relations, la réputation) ont une valeur dans la continuité
        que l'analyse marginale pure néglige.
      cold_rationality: |
        Rejeter l'attachement émotionnel comme irrationnel alors qu'il peut refléter des valeurs authentiques.
      analysis_paralysis: |
        Trop réfléchir à la question de savoir s'il faut continuer alors que la réponse est claire.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: zeigarnik_effect
    name: Effet Zeigarnik
    quick_introduction: |
      L'effet Zeigarnik est la tendance à mieux se souvenir des tâches inachevées ou interrompues
      que de celles qui sont terminées. Les tâches incomplètes créent une tension psychologique
      qui les maintient actives dans notre esprit. Notre cerveau s'accroche à ce qui n'est pas fini.
    one_liner: Les tâches inachevées restent dans notre esprit – notre cerveau s'accroche à ce qui est incomplet.
    try_this:
      - Utilisez l'achèvement pour "libérer" les tâches de votre charge mentale – terminez-les ou abandonnez-les explicitement.
      - Divisez le travail en portions gérables pour créer des boucles ouvertes productives.
      - Remarquez quand vous ruminez sur des affaires inachevées – clôturez la boucle ou décidez de laisser tomber.
    ask_yourself:
      - Quelles tâches inachevées créent de la tension dans mon esprit ?
      - Cette boucle ouverte vaut-elle la peine d'être gardée, ou puis-je la fermer ?
    in_more_detail: |
      Bluma Zeigarnik a observé que les serveurs se souvenaient mieux des commandes impayées
      que des commandes payées – une fois la tâche terminée, elle était "libérée" de la mémoire.
      Les tâches inachevées créent une boucle ouverte qui exige une clôture. Cela favorise à la fois
      la concentration productive (nous voulons finir) et l'anxiété (nous ne pouvons pas arrêter de penser à ce qui reste à faire).

      L'effet est utilisé dans le marketing (cliffhangers, histoires incomplètes) et la
      productivité (diviser le travail en portions pour créer plusieurs "boucles ouvertes").
      Il explique pourquoi nous rumions sur des affaires inachevées et pourquoi les listes de tâches
      peuvent sembler écrasantes.
    why_this_is_important: |
      Comprendre l'effet Zeigarnik vous aide à gérer votre charge mentale, à concevoir des expériences
      captivantes et à utiliser les interruptions de manière stratégique. Il explique pourquoi nous
      ne pouvons pas arrêter de penser au travail inachevé – et pourquoi cela peut être exploité ou nocif.
    when_to_use:
      - résolution_de_problèmes
      - leadership
      - apprentissage
      - prise_de_décision
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Les tâches inachevées s'immiscent dans les pensées plus que les tâches terminées.
      better_recall_of_unfinished: |
        Nous nous souvenons mieux des tâches interrompues que des tâches terminées.
      tension_for_closure: |
        Inconfort ou impulsion à terminer ce qui a été commencé.
      serial_dramas: |
        Les cliffhangers et les "à suivre" exploitent l'effet.
    examples:
      productivity: |
        Commencer une tâche crée une tension mentale qui pousse à l'achèvement – ou à l'anxiété
        s'il y a trop de boucles ouvertes.
      marketing: |
        "Partie 1 de 3" ou "À suivre" maintient l'engagement du public et le fait revenir.
      meetings: |
        Terminer une réunion sans étapes suivantes claires laisse aux participants
        une tension non résolue.
      learning: |
        Les questions sans réponse ou les explications incomplètes restent en mémoire
        et incitent à des recherches plus approfondies.
    real_world_implications: |
      L'effet Zeigarnik affecte la productivité, l'engagement et la charge mentale.
      Il peut être exploité pour la concentration ou créer une surcharge. Il
      explique l'attrait des cliffhangers et le fardeau de trop de tâches ouvertes.
    professional_application:
      networking_and_relationship_building: |
        Terminez les conversations avec des étapes suivantes claires – ou des boucles ouvertes intentionnelles
        si vous souhaitez que l'autre personne fasse un suivi. Les fils non résolus créent de l'engagement.
      collaborative_learning_initiative: |
        Utilisez l'effet Zeigarnik dans la formation : posez des problèmes ou des questions
        avant les pauses pour maintenir l'engagement des apprenants. Mais évitez de créer autant de
        boucles ouvertes que les gens se sentent dépassés.
    how_can_this_be_misapplied:
      overwhelm: |
        Créer trop de boucles ouvertes – trop de tâches inachevées – conduit à
        l'anxiété et à la paralysie.
      manipulation: |
        Laisser délibérément les choses non résolues pour créer une dépendance ou
        un engagement.
      false_urgency: |
        Utiliser l'effet pour créer une urgence artificielle là où il n'y en a pas.
      incomplete_work: |
        Commencer beaucoup de choses pour créer de la "tension" sans réellement
        les terminer – ce qui conduit à des efforts dispersés.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Pensée à somme nulle
    quick_introduction: |
      La pensée à somme nulle est la conviction que le gain d'une personne doit être la perte de l'autre, que les ressources sont fixes et que tout avantage pour vous signifie un désavantage pour moi.
      En réalité, de nombreuses situations sont à somme positive : les deux parties peuvent gagner.
    one_liner: Votre gain n'a pas besoin d'être ma perte ; de nombreuses situations sont à somme positive.
    try_this:
      - Demander: Pouvons-nous agrandir le gâteau ? Est-ce vraiment une somme nulle ?
      - Rechercher la coopération avant de supposer la compétition.
      - Remarquer quand vous traitez une situation comme fixe alors qu'elle ne l'est pas.
    ask_yourself:
      - Est-ce que je suppose un gâteau fixe alors que nous pourrions l'agrandir ?
      - La coopération créerait-elle plus de valeur que la compétition ?
    in_more_detail: |
      Dans un jeu à somme nulle, le total est fixe : votre gain est ma perte. Dans les situations à somme positive, la coopération crée de la valeur. Le commerce, l'innovation et le développement de relations sont souvent à somme positive. La pensée à somme nulle conduit à une compétition inutile, à des occasions manquées de coopération et à une rivalité destructrice.

      Ce biais est courant dans les négociations, la politique et les dynamiques organisationnelles.
      Il suppose un gâteau fixe alors que le gâteau peut souvent être agrandi. Il peut devenir une prophétie auto-réalisatrice : si vous traitez les autres comme des adversaires, ils deviennent des adversaires.
    why_this_is_important: |
      Reconnaître la pensée à somme nulle ouvre des opportunités de coopération et de création de valeur. Elle améliore la négociation, réduit les conflits et permet des résultats gagnant-gagnant. Nombre des meilleures opportunités sont à somme positive.
    when_to_use:
      - négociation
      - leadership
      - développement_de_relations
      - prise_de_décision
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "S'ils gagnent, je perds" alors que la situation pourrait permettre à tous deux de gagner.
      competitive_ framing: |
        Cadrer automatiquement les situations comme nous contre eux.
      envy_of_others_gains: |
        Ressentir le succès des autres comme si cela diminuait le vôtre.
      missed_cooperation: |
        Ne pas voir les opportunités de collaboration qui bénéficieraient à tous.
    examples:
      negotiation: |
        Supposer qu'une meilleure transaction pour l'autre partie signifie une transaction pire pour vous, alors que des solutions créatives élargissent souvent la valeur pour les deux.
      salary: |
        "Si mon collègue obtient une augmentation, il y en a moins pour moi" alors que les budgets peuvent être flexibles ou les augmentations justifiées par la valeur créée.
      politics: |
        "Les gains de leur parti sont nos pertes" alors que de nombreux résultats politiques pourraient bénéficier à plusieurs groupes.
      career: |
        "Leur promotion signifie moins d'opportunités pour moi" alors que la croissance organisationnelle peut créer plus d'opportunités pour tout le monde.
    real_world_implications: |
      La pensée à somme nulle alimente les conflits, limite la coopération et entraîne des occasions manquées. Elle est souvent erronée dans l'économie, les relations et l'innovation. Passer à une perspective à somme positive améliore les résultats.
    professional_application:
      networking_and_relationship_building: |
        Rechercher des moyens de créer de la valeur pour les autres : leur succès peut créer des opportunités pour vous. Construire des relations où les deux parties bénéficient.
      collaborative_learning_initiative: |
        Cadrer les objectifs d'équipe comme étant à somme positive : succès partagé, agrandir le gâteau.
        Encourager la collaboration plutôt que la compétition interne.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Certaines situations sont à somme nulle (par exemple, une promotion unique, un budget fixe).
        Prétendre le contraire peut être naïf.
      naive_cooperation: |
        Supposer que tout le monde coopérera alors que certains acteurs sont véritablement
        adversaires.
      undervaluing_competition: |
        La compétition peut stimuler l'amélioration ; toute rivalité n'est pas destructrice.
      exploitation: |
        Utiliser un cadrage "à somme positive" pour extraire de la valeur des autres qui n'en bénéficient pas.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
