# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Russian)
# Consolidated from mental-models-ru/

mental_models:
  - id: ambiguity_effect
    name: Эффект неопределенности
    quick_introduction: |
      Эффект неопределенности — это тенденция избегать вариантов, когда у нас недостаточно информации о вероятностях исходов. Мы предпочитаем известные риски неизвестным, даже если неизвестные риски могут быть лучше. Сама неопределенность ощущается как неприятная.
    one_liner: Мы предпочитаем известные риски неизвестным, даже когда неизвестные могут быть лучше.
    try_this:
      - Спросите: избегаю ли я этого варианта в основном из-за неопределенности, или есть реальный недостаток?
      - Оцените то, что вы знаете; иногда "неоднозначный" вариант имеет более очевидные преимущества.
      - Обратите внимание, когда вы по умолчанию выбираете знакомое только потому, что оно кажется безопаснее.
    ask_yourself:
      - Отвергаю ли я что-то, потому что это неоднозначно, или потому что это действительно хуже?
      - Что мне нужно было бы знать, чтобы чувствовать себя комфортно с неопределенным вариантом?
    in_more_detail: |
      В парадоксе Эллсберга люди предпочитают ставить на урну с известными пропорциями шаров, а не на урну с неизвестными пропорциями, даже когда неизвестная урна может предложить лучшие шансы. Мы не любим неопределенность — мы скорее хотим иметь четкую (даже если плохую) вероятность, чем неясную.

      Этот эффект влияет на решения в области инвестиций, выбора карьеры и политики. Он может приводить к субоптимальным решениям, когда мы избегаем вариантов, которые являются неоднозначными, но потенциально превосходящими. Он также объясняет, почему мы предпочитаем знакомые бренды и известные величины.
    why_this_is_important: |
      Осознание эффекта неопределенности помогает избежать чрезмерного предпочтения знакомого и недооценки неопределенного. Это может привести к упущенным возможностям, когда неопределенность управляема. Это также объясняет, почему прозрачность и ясность снижают тревожность.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - инвестирование
      - карьерные_шаги
    how_can_you_spot_it:
      preference_for_known_risks: |
        Выбор вариантов с четкими (даже если худшими) вероятностями вместо неоднозначных.
      avoidance_of_uncertainty: |
        Отказ от вариантов в основном потому, что "мы недостаточно знаем".
      familiarity_over_optimality: |
        Предпочтение известного потенциально лучшему неизвестному.
      information_seeking: |
        Готовность платить за информацию, которая снижает неопределенность, даже если она не меняет решения.
    examples:
      investing: |
        Предпочтение отечественных акций международным, потому что "мы их лучше понимаем", несмотря на выгоды диверсификации.
      employment: |
        Оставаться на известной работе, а не занимать должность с неопределенными перспективами.
      product_choice: |
        Выбор знакомого бренда вместо нового варианта с неопределенным качеством.
      medical: |
        Предпочтение лечения с известными побочными эффектами одному с неопределенными исходами, даже когда последнее может быть лучше.
    real_world_implications: |
      Эффект неопределенности формирует рынки, выбор карьеры и политику. Его можно уменьшить, предоставив более ясную информацию или переформулировав решения. Он также объясняет, почему прозрачность и общение снижают тревожность.
    professional_application:
      networking_and_relationship_building: |
        Снижайте неопределенность в отношениях: уточняйте ожидания, общайтесь явно и уменьшайте неуверенность. Люди предпочитают известные ситуации.
      collaborative_learning_initiative: |
        При внедрении изменений снижайте неопределенность: предоставляйте четкую информацию о том, что произойдет, когда и почему. Неопределенность усиливает сопротивление.
    how_can_this_be_misapplied:
      manipulation: |
        Сознательное создание неопределенности для направления людей к предпочтительным вариантам.
      false_clarity: |
        Предоставление ложной уверенности, когда существует реальная неопределенность.
      overconfidence: |
        Предположение, что снижение неопределенности всегда улучшает решения; иногда неоднозначный вариант действительно лучше.
      analysis_paralysis: |
        Ожидание идеальной информации перед принятием решения, когда некоторая неопределенность неизбежна.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Эффект якоря
    quick_introduction: |
      Эффект якоря — это тенденция чрезмерно полагаться на первую полученную информацию
      при принятии решений. Этот начальный «якорь» искажает последующие суждения,
      даже когда он не имеет отношения к делу или является произвольным.
    one_liner: Первое число, которое вы видите, формирует все последующие.
    try_this:
      - Перед переговорами определите свою целевую цифру и избегайте якоря, установленного другой стороной.
      - При оценке сначала сгенерируйте собственную цифру, прежде чем услышать оценки других.
      - Спросите: «Думал бы я иначе, если бы сначала увидел другую цифру?»
    ask_yourself:
      - Какое число или идея встретилась мне первой — и искажает ли оно мое суждение?
      - Достаточно ли я корректирую свои действия относительно якоря, или все еще слишком близко к нему?
    in_more_detail: |
      В классическом эксперименте люди, которым предлагалось оценить процент африканских стран
      в ООН, давали более высокие оценки, если они только что видели более высокое число (например, 65 против 10).
      Якорь — даже произвольный — повлиял на их ответы. Эффект якоря влияет на переговоры,
      ценообразование, наем на работу и прогнозирование.

      Первое число, которое мы видим, становится точкой отсчета. Мы корректируем свои действия от нее, но
      обычно недостаточно. Даже когда мы знаем, что якорь произволен, он все равно может влиять на нас. Эксперты не являются исключением.
    why_this_is_important: |
      Понимание эффекта якоря помогает принимать более обоснованные решения, вести переговоры более эффективно
      и избегать манипуляций. Это также объясняет, почему порядок и формулировка
      информации имеют такое большое значение.
    when_to_use:
      - принятие_решений
      - переговоры
      - инвестирование
      - оценка_рисков
    how_can_you_spot_it:
      first_number_dominance: |
        Первая цифра в переговорах или оценке оказывает непропорциональное влияние на
        результат.
      insufficient_adjustment: |
        При корректировке от якоря люди, как правило, корректируют недостаточно.
      arbitrary_anchor_influence: |
        Даже очевидно нерелевантные числа (например, последние цифры номера социального страхования)
        могут влиять на оценки.
      order_effects: |
        Последовательность представления вариантов меняет выбор.
    examples:
      salary_negotiation: |
        Первая упомянутая цифра — будь то работодатель или кандидат — часто якорит
        окончательное предложение.
      real_estate: |
        Цена, указанная в объявлении, якорит восприятие стоимости покупателями, даже если она сознательно
        установлена высоко или низко.
      retail: |
        «Было 99 долларов, теперь 49 долларов» использует первоначальную цену как якорь, чтобы цена продажи
        казалась выгодной.
      forecasting: |
        Первоначальные оценки на совещаниях по планированию якорят последующие прогнозы, даже когда
        первоначальная оценка была лишь предположением.
    real_world_implications: |
      Эффект якоря формирует рынки, переговоры и политику. Его можно использовать этично (например,
      устанавливая разумные ожидания) или неэтично (например, манипулятивное ценообразование).
      Его распознавание повышает качество решений.
    professional_application:
      networking_and_relationship_building: |
        В переговорах рассмотрите возможность сделать первое предложение, чтобы установить якорь — или будьте в курсе,
        когда это делает другая сторона.
      collaborative_learning_initiative: |
        На совещаниях будьте осторожны с тем, кто говорит первым относительно оценок; рассмотрите
        возможность сбора независимых оценок перед обсуждением.
    how_can_this_be_misapplied:
      manipulation: |
        Преднамеренное использование крайних якорей для направления других к желаемым результатам.
      overconfidence_in_anchors: |
        Чрезмерная уверенность в своей первой оценке без ее пересмотра.
      ignoring_relevant_information: |
        Позволить якорю перевесить более релевантные данные.
      exploitation: |
        Методы продаж, использующие завышенные цены «сравнения», чтобы фактические цены казались
        разумными.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Каскад доступности
    quick_introduction: |
      Каскад доступности — это самоподдерживающийся процесс, в котором
      идея приобретает правдоподобие благодаря многократному
      публичному обсуждению. Чем больше она обсуждается, тем более
      "доступной" она становится, тем больше людей в нее верят, и тем
      больше она обсуждается. Коллективное убеждение набирает
      обороты независимо от его истинности.
    one_liner: Чем чаще повторяется идея, тем более правдоподобной она кажется — независимо от доказательств.
    try_this:
      - Спросите: является ли это убеждение широко распространенным, потому что оно истинно, или потому, что оно повторяется?
      - Ищите первоисточники, прежде чем принимать "то, что знает каждый".
      - Замечайте, когда одно лишь повторение движет вашим чувством правдоподобия.
    ask_yourself:
      - Поверил бы я в это, если бы услышал это только один раз?
      - Смешиваю ли я "все так говорят" с "доказательства это подтверждают"?
    in_more_detail: |
      Тимур Куран и Касс Санстейн описали, как работают каскады доступности:
      доступность информации (как часто мы что-то слышим) и правдоподобие
      (насколько оно кажется правдоподобным) усиливают друг друга.
      Освещение в СМИ, социальные сети и общественный дискурс усиливают
      определенные идеи. Как только идея достигает порога
      доступности, она может быстро распространяться и становиться
      "общим знанием", даже если она ложна или преувеличена.

      Каскады доступности могут быть полезными (распространение важных
      предупреждений) или вредными (распространение паники или
      дезинформации). Они обусловлены эвристикой доступности и
      социальным доказательством.
    why_this_is_important: |
      Признание каскадов доступности помогает вам оценить, отражает ли
      широко распространенное убеждение доказательства или простое
      повторение. Это объясняет, как идеи становятся вирусными и как
      коллективные убеждения могут быть ошибочными. Это важно для
      медиаграмотности и критического мышления.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - обучение
      - лидерство
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Чем больше повторяется идея, тем более правдоподобной она кажется.
      media_amplification: |
        Освещение в СМИ вызывает убеждение, которое вызывает больше освещения.
      social_proof_belief: |
        "Все в это верят" становится доказательством веры.
      threshold_effects: |
        Как только идея пересекает порог видимости, она быстро распространяется.
    examples:
      health_scares: |
        Исследование предполагает, что продукт опасен; СМИ усиливают это;
        общественность избегает его; следует больше освещения. Риск может быть
        преувеличен.
      financial_panic: |
        Распространяются слухи о банкротстве банка; люди снимают деньги;
        набег становится самоисполняющимся.
      social_media: |
        Нарратив становится вирусным; повторение увеличивает веру; вера
        увеличивает распространение. Истина и виральность могут расходиться.
      organizational: |
        Распространяется слух о сокращениях; увеличивается тревожность;
        меняется поведение; слух приобретает правдоподобие через реакцию.
    real_world_implications: |
      Каскады доступности формируют общественное мнение, политику и рынки.
      Они могут распространять как важные истины, так и опасные
      заблуждения. Критическое мышление требует различения убеждений,
      основанных на доказательствах, и убеждений, обусловленных каскадом.
    professional_application:
      networking_and_relationship_building: |
        Когда идея "везде", спросите: истинна ли она потому, что ее
        повторяют, или повторяют потому, что она истинна? Ищите
        первоисточники.
      collaborative_learning_initiative: |
        Создайте нормы проверки перед распространением. Поощряйте
        вопросы о "том, что знает каждый". Различайте консенсус,
        отражающий доказательства, от консенсуса, отражающего
        доступность.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        Иногда широко распространенное убеждение является правильным. Не
        предполагайте, что все популярные идеи являются каскадами.
      conspiracy_thinking: |
        Использование "каскада доступности" для отвержения законных
        беспокойств как искусственно созданных.
      false_skepticism: |
        Отвержение хорошо обоснованных идей, потому что они популярны.
      contrarianism: |
        Предположение, что все, во что широко верят, должно быть неверно.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Эвристика доступности
    quick_introduction: |
      Эвристика доступности — это тенденция оценивать вероятность событий
      по тому, насколько легко приходят на ум примеры. Если мы можем легко вспомнить случаи, мы
      предполагаем, что событие является распространенным. Яркие, недавние или эмоциональные примеры доминируют
      в нашей оценке вероятности.
    one_liner: То, что легко приходит на ум, кажется более вероятным, даже когда это не так.
    try_this:
      - Спросите: Какова базовая ставка? Не переоцениваю ли я яркие или недавние примеры?
      - Ищите данные, когда внутреннее чутье говорит "это кажется распространенным" или "это кажется редким".
      - Обращайте внимание, когда одна драматическая история влияет на вашу оценку риска.
    ask_yourself:
      - Оцениваю ли я вероятность по легкости вспоминания, а не по фактической частоте?
      - Думал бы я иначе, если бы не видел этот заголовок только что?
    in_more_detail: |
      Мы используем ментальные ярлыки для оценки частоты и вероятности. Один из ярлыков
      — это доступность: что легко приходит на ум? Авиакатастрофы яркие и
      широко освещаются — мы переоцениваем их вероятность. Автокатастрофы
      распространены, но менее заметны — мы недооцениваем. Недавность, яркость и
      эмоциональное воздействие — все это повышает доступность.

      Эвристика полезна, когда доступность коррелирует с фактической частотой.
      Но средства массовой информации, личный опыт и заметность часто искажают эту корреляцию.
      Мы боимся редких, но ярких рисков и игнорируем распространенные, но обыденные.
    why_this_is_important: |
      Признание эвристики доступности помогает вам корректировать оценки вероятности,
      избегать чрезмерной реакции на яркие новости и принимать лучшие оценки рисков.
      Это объясняет многие систематические ошибки в суждениях.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - инвестирование
      - решение_задач
    how_can_you_spot_it:
      vividness_dominance: |
        Драматические или эмоциональные примеры непропорционально влияют на оценки.
      recency_effect: |
        Недавние события кажутся более вероятными в будущем.
      personal_experience_overweighting: |
        "Я знаю кого-то, кто..." формирует оценки вероятности.
      media_distortion: |
        То, что сообщается, часто не соответствует тому, что является частым.
    examples:
      risk_perception: |
        Переоценка риска терроризма (яркий, освещается) и недооценка
        риска сердечных заболеваний (распространен, менее драматичен).
      investing: |
        Недавние рыночные события (крах, бум) доминируют в ожиданиях на будущее.
      hiring: |
        Одна яркая история о плохом найме из определенной школы влияет
        на оценку всех кандидатов из этой школы.
      health: |
        Диагноз рака у друга делает рак более вероятным, чем предполагают базовые ставки.
    real_world_implications: |
      Эвристика доступности влияет на покупку страховок, приоритеты политики и
      личные решения. Ее используют средства массовой информации и маркетологи. Для коррекции
      требуется поиск базовых ставок и постановка под сомнение того, что "приходит на ум".
    professional_application:
      networking_and_relationship_building: |
        Помните, что один яркий негативный опыт с человеком или группой может
        исказить ваше суждение. Ищите базовые ставки и множество точек данных.
      collaborative_learning_initiative: |
        При оценке рисков или возможностей явно спрашивайте "Какова базовая ставка?"
        и "Не переоцениваю ли я яркие примеры?". Используйте данные для коррекции
        оценок, основанных на доступности.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        Иногда доступность информативна — недавний опыт может сигнализировать
        об изменениях. Не думайте, что все суждения, основанные на доступности, ошибочны.
      analysis_paralysis: |
        Чрезмерная коррекция до точки игнорирования законных предупреждающих знаков от
        яркого опыта.
      false_objectivity: |
        Предположение, что базовые ставки всегда верны, когда они могут быть устаревшими или
        неприменимыми.
      manipulation: |
        Преднамеренное создание яркости определенных примеров для влияния на суждения других.
    related_content:
      - anchoring_bias
      - salience_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: Феномен Баадера-Майнхоф
    quick_introduction: |
      Феномен Баадера-Майнхоф (также известный как иллюзия частотности) возникает, когда вы узнаете
      что-то новое, а затем внезапно замечаете это повсюду. Это кажется совпадением,
      но часто это избирательное внимание — ваш мозг настроен на то, чтобы замечать то, с чем он недавно столкнулся.
    one_liner: Вы узнаете что-то новое и внезапно видите это повсюду — оно всегда там было.
    try_this:
      - Когда что-то кажется "вездесущим" после того, как вы об этом узнали, проверьте базовую ставку.
      - Замечайте, когда недавность делает что-то более значимым, чем оно есть на самом деле.
      - Спросите: я вижу реальную тенденцию или просто замечаю то, что меня настроили замечать?
    ask_yourself:
      - Действительно ли это сейчас стало более распространенным, или я просто замечаю это чаще?
      - Увидел бы я этот паттерн, если бы недавно о нем не узнал?
    in_more_detail: |
      Узнав о террористической группе Баадера-Майнхоф, человек может увидеть упоминания
      о ней в новостях, в разговорах и в статьях в течение нескольких дней. Феномен имеет
      две составляющие: избирательное внимание (вы замечаете то, что ищете) и
      подтверждающее искажение (вы запоминаете удачи и забываете промахи).

      Иллюзия заключается в том, что вещь внезапно стала более распространенной. На самом деле, она
      всегда присутствовала; вы просто не были к ней настроены. Это может привести к переоценке
      распространенности или важности недавно полученной информации.
    why_this_is_important: |
      Распознавание феномена Баадера-Майнхоф помогает избежать переоценки того, насколько
      распространено или важно что-то, основанное на недавнем опыте. Это также объясняет, почему новые идеи,
      продукты или тенденции могут казаться "вездесущими" после того, как вы впервые их заметили.
    when_to_use:
      - принятие_решений
      - обучение
      - оценка_рисков
      - решение_проблем
    how_can_you_spot_it:
      sudden_ubiquity: |
        Вы узнаете новое слово, концепцию или продукт, и через несколько дней чувствуете, что видите это
        постоянно.
      recency_bias: |
        Недавняя информация кажется более репрезентативной для реальности, чем она есть на самом деле.
      pattern_seeking: |
        Ваш мозг связывает несвязанные наблюдения в повествование "это повсюду".
      forgetting_the_misses: |
        Вы не отслеживаете, как часто вы не видите эту вещь — только те случаи, когда видите.
    examples:
      vocabulary: |
        Узнать слово "serendipity" (находчивость, счастливая случайность), а затем заметить его в трех разных статьях
        на той же неделе.
      car_purchase: |
        После того, как вы решили купить определенную модель автомобиля, вы видите ее на каждой улице — хотя она
        всегда была там.
      health_anxiety: |
        Прочитать о редком симптоме, а затем заметить похожие ощущения у себя,
        что приведет к ненутреннему беспокойству.
      trends: |
        Открыть для себя новое приложение или тренд и почувствовать, что оно внезапно доминирует — хотя оно может
        иметь небольшую пользовательскую базу.
    real_world_implications: |
      Феномен влияет на то, как мы воспринимаем тенденции, риски и возможности. Маркетологи
      и СМИ могут использовать его, создавая повторное воздействие. При принятии решений это может
      привести к переоценке недавней информации.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то упоминает тему повторно после того, как узнал о ней, поймите, что они могут
        испытывать иллюзию частотности — тема не обязательно стала более актуальной, просто
        более заметной для них.
      collaborative_learning_initiative: |
        В обучении подчеркивайте, что "видеть это повсюду" после изучения чего-то нового
        — это нормально; поощряйте проверку базовых ставок, а не доверие к ощущению
        вездесущности.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Предполагать, что что-то более распространенное или важное, чем оно есть, потому что вы заметили это
        часто в последнее время.
      confirmation_bias_amplification: |
        Использовать ощущение "видеть это повсюду" как доказательство правильности убеждения.
      decision_distortion: |
        Принимать решения на основе недавно полученной информации, которая кажется непропорционально значимой.
      vulnerability_to_manipulation: |
        Рекламодатели и пропагандисты используют повторное воздействие для создания иллюзии
        вездесущности и важности.
    related_content:
      - confirmation_bias
      - availability_heuristic
      - salience_bias
  - id: barnum_effect
    name: Эффект Барнума
    quick_introduction: |
      Эффект Барнума (или эффект Форрера) — это тенденция принимать расплывчатые, общие описания личности как уникально точные. Гороскопы, гадалки и тесты на определение личности используют утверждения, которые применимы почти к каждому — но мы считаем, что они касаются именно нас. Мы видим себя в общем.
    one_liner: Расплывчатые утверждения кажутся личными, потому что применимы почти к каждому.
    try_this:
      - Ask: Could this description apply to many people? Test it on someone else.
        Спросите: Может ли это описание подойти многим людям? Проверьте на ком-нибудь другом.
      - Seek specific, behavioral feedback instead of vague praise or criticism. Ищите конкретную, поведенческую обратную связь вместо расплывчатой похвалы или критики.
      - Notice when "personalized" insights feel too good to be discriminating. Обращайте внимание, когда «персонализированные» выводы кажутся слишком хорошими, чтобы быть избирательными.
    ask_yourself:
      - Would this feedback feel accurate if given to a stranger? Показалась бы эта обратная связь точной, если бы ее дали незнакомцу?
      - Am I remembering the hits and forgetting the misses? Я запоминаю удачные совпадения и забываю неудачные?
    in_more_detail: |
      Психолог Бертрам Форрер дал студентам идентичную «персонализированную» обратную связь (например: «У вас есть потребность в том, чтобы другие вас любили и восхищались вами»), и они оценили ее как очень точную. Утверждения были достаточно расплывчатыми, чтобы подходить кому угодно. П. Т. Барнум, по сообщениям, сказал: «Есть лопух, рождающийся каждую минуту» — эффект назван в честь его умения привлекать массы с помощью общих обобщений, которые кажутся персонализированными.

      Эффект работает, потому что мы хорошо находим личную значимость в неоднозначных утверждениях. Мы помним совпадения и забываем промахи. Это основа «холодного чтения» и многих «личностных» продуктов.
    why_this_is_important: |
      Распознавание эффекта Барнума помогает вам оценивать тесты личности, противостоять манипуляциям и избегать чрезмерной интерпретации расплывчатой обратной связи. Это объясняет, почему гороскопы кажутся точными, и почему некоторые «персонализированные» советы являются общими.
    when_to_use:
      - принятие_решений
      - обучение
      - оценка_рисков
      - построение_отношений
    how_can_you_spot_it:
      vague_accuracy: |
        Обратная связь, которая кажется личной, но могла бы подойти многим людям.
      selective_fit: |
        Мы сосредотачиваемся на том, что подходит, и игнорируем то, что не подходит.
      cold_reading: |
        Кто-то «читает» вас с помощью утверждений, которые на самом деле являются общими.
      personality_test_enthusiasm: |
        Некритическое принятие результатов оценки как уникально проницательных.
    examples:
      horoscopes: |
        «Вы иногда сомневаетесь в своих решениях» — это кажется личным, но применимо к большинству людей.
      fortune_telling: |
        Расплывчатые предсказания, которые мы интерпретируем как относящиеся к нашей ситуации.
      personality_tests: |
        Некоторые тесты используют утверждения Барнума и кажутся точными, не являясь при этом избирательными.
      feedback: |
        Общая обратная связь по производительности, которую мы интерпретируем как глубоко персонализированную.
    real_world_implications: |
      Эффект Барнума эксплуатируется в астрологии, некоторых коучинговых практиках и некачественных оценках. Он может создавать ложную уверенность в недействительных инструментах. Он также объясняет, почему мы восприимчивы к лести и расплывчатой положительной обратной связи.
    professional_application:
      networking_and_relationship_building: |
        Получая обратную связь, спросите: «Может ли это относиться ко многим людям?» Ищите конкретную, поведенческую обратную связь вместо расплывчатой похвалы или критики. Будьте скептичны по отношению к «персонализированным» выводам, которые кажутся слишком хорошими.
      collaborative_learning_initiative: |
        При использовании оценок выбирайте валидированные инструменты с дискриминантной валидностью. Избегайте инструментов, которые полагаются на утверждения Барнума. Обучайте людей распознавать расплывчатую обратную связь.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        Не вся персонализированная обратная связь является эффектом Барнума — некоторая действительно специфична. Не отвергайте все расплывчатое.
      invalidating_experience: |
        Говорить кому-то, что его опыт понимания — это «просто Барнум», когда он может иметь для них значение.
      overcorrection: |
        Отвержение всех личностных рамок, потому что некоторые используют утверждения Барнума.
      false_skepticism: |
        Предположение, что, поскольку что-то кажется точным, это должно быть Барнумом — иногда вещи точны.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Ошибка базовой ставки
    quick_introduction: |
      Ошибка базовой ставки — это тенденция игнорировать общую статистическую информацию
      (базовые ставки) в пользу конкретной, яркой информации. Мы переоцениваем
      конкретный случай и недооцениваем априорную вероятность. Одна убедительная
      история может перевесить то, что говорят цифры.
    one_liner: Убедительная история может перевесить то, что говорят цифры.
    try_this:
      - Прежде чем судить о деле, спросите: какова базовая ставка для такой ситуации?
      - Совместите конкретные доказательства с априорной вероятностью — не игнорируйте ни того, ни другого.
      - Замечайте, когда один яркий пример заглушает статистику.
    ask_yourself:
      - Не переоцениваю ли я этот конкретный случай и недооцениваю ли базовую ставку?
      - Что бы сказали цифры, если бы я отложил в сторону эту убедительную историю?
    in_more_detail: |
      Если заболевание поражает 1% населения, а тест на него на 95% точен,
      положительный результат часто означает, что у человека, скорее всего, все еще нет
      заболевания — потому что базовая ставка очень низка. Но мы игнорируем базовые ставки и
      сосредотачиваемся на «у него положительный тест». Нас переубеждает конкретика, а не
      статистика.

      Эта ошибка затрагивает медицинскую диагностику, подбор персонала, оценку рисков и юридические решения.
      Нам необходимо сочетать базовые ставки с доказательствами, специфичными для конкретного случая, используя
      байесовское рассуждение — но мы часто этого не делаем.
    why_this_is_important: |
      Корректировка ошибки базовой ставки улучшает диагностику, оценку рисков
      и качество принимаемых решений. Это предохраняет нас от чрезмерной реакции на яркие случаи и
      недостаточной реакции на статистическую реальность.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - решение_проблем
      - инвестирование
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Базовые ставки не учитываются при суждениях.
      vividness_over_statistics: |
        Единичный случай или история преобладают над агрегированными данными.
      diagnostic_overweighting: |
        Переоценка новых доказательств (например, результата теста) без учета базовой ставки.
      anecdote_override: |
        «Я знаю кого-то, кто...» перевешивает статистические данные.
    examples:
      medical: |
        Положительный тест на редкое заболевание — базовая ставка низка, поэтому положительный
        результат часто является ложноположительным. Мы игнорируем это и предполагаем, что человек болен.
      hiring: |
        Кандидат отлично прошел собеседование — мы игнорируем базовые ставки того, насколько хорошо
        собеседования предсказывают эффективность работы.
      risk: |
        Авиакатастрофа — это яркое событие, мы переоцениваем риск полетов и недооцениваем
        риск вождения, игнорируя базовые ставки.
      startup_investing: |
        Основатель хорошо представил свою идею — мы игнорируем тот факт, что большинство стартапов терпят неудачу, независимо от качества презентации.
    real_world_implications: |
      Ошибка базовой ставки влияет на медицинские решения, юридические решения и
      бизнес-стратегии. Она способствует неэффективному распределению ресурсов и
      неправильной оценке рисков. Байесовское мышление корректирует ее.
    professional_application:
      networking_and_relationship_building: |
        При оценке людей учитывайте базовые ставки: например, как часто встречается данный
        тип поведения? Не позволяйте одному яркому взаимодействию перевесить
        общий паттерн.
      collaborative_learning_initiative: |
        При принятии решений явно формулируйте и учитывайте базовые ставки перед
        тем, как включать в рассмотрение доказательства, специфичные для случая. Обучайте команды байесовскому рассуждению.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Игнорирование сильных доказательств, специфичных для случая, когда базовые ставки указывают на обратное —
        иногда индивидуальный случай является исключением.
      stereotyping: |
        Использование базовых ставок для несправедливых суждений о людях.
      false_precision: |
        Применение базовых ставок с ложной точностью, когда они являются лишь приблизительными оценками.
      dismissing_individuals: |
        «Статистика говорит X», когда конкретный человек перед вами может не соответствовать распределению.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
  - id: bayes_theorem
    name: Теорема Байеса
    quick_introduction: |
      Теорема Байеса описывает, как обновлять вероятность гипотезы при получении
      новых доказательств. Она формализует идею о том, что убеждения должны
      меняться пропорционально тому, насколько хорошо доказательства их
      подтверждают — не категорично, а постепенно.
    one_liner: Обновляйте убеждения пропорционально тому, насколько хорошо доказательства их подтверждают.
    try_this:
      - Начните с вашего априорного мнения; спросите, насколько вероятны доказательства, если бы вы ошибались.
      - Обновляйте постепенно — не переходите от 0% до 100% по одному элементу данных.
      - Рассмотрите альтернативные гипотезы: подходят ли доказательства им тоже?
    ask_yourself:
      - Насколько сильно эти доказательства реально сдвигают вероятность?
      - Обновляю ли я свои убеждения или просто подтверждаю то, что уже думал?
    in_more_detail: |
      Теорема гласит, что вероятность гипотезы при наличии доказательств равна
      априорной вероятности, умноженной на вероятность доказательств при наличии
      гипотезы, разделенной на вероятность доказательств. На практике: начните
      с вашего априорного убеждения, оцените, насколько новые доказательства
      согласуются с вашей гипотезой по сравнению с альтернативами, и обновляйте
      соответствующим образом.

      Байесовское мышление противостоит предвзятости подтверждения, требуя
      рассмотреть, насколько вероятны доказательства, если бы вы были не правы.
      Это основа вероятностного рассуждения и научного обновления.
    why_this_is_important: |
      Байесовское мышление улучшает принятие решений в условиях неопределенности,
      помогает избежать чрезмерной самоуверенности и предоставляет основу для
      обучения на основе доказательств. Это важно для диагностики, прогнозирования
      и любой области с неопределенностью.
    when_to_use:
      - принятие_решений
      - решение_задач
      - оценка_рисков
      - обучение
    how_can_you_spot_it:
      prior_and_update: |
        Начало с базового убеждения и его корректировка на основе новых доказательств.
      likelihood_ratio_thinking: |
        Вопрос: "Насколько вероятны эти доказательства, если я прав, по сравнению с тем, если я не прав?"
      incremental_updating: |
        Убеждения меняются постепенно с учетом доказательств, а не резко.
      base_rate_respect: |
        Априорные вероятности (базовые ставки) имеют значение, а не только последний элемент данных.
    examples:
      medical_diagnosis: |
        Положительный тест на редкое заболевание — априорная вероятность (низкая распространенность) означает, что положительный результат часто является ложноположительным. Байес обновляет вероятность.
      forecasting: |
        Обновление прогнозов по мере поступления новых данных, а не придерживание первоначальных оценок.
      hiring: |
        Начало с базовых ставок соответствия роли, затем обновление на основе результатов собеседования.
      investing: |
        Обновление вероятности успеха компании по мере поступления новой информации (доходы, новости).
    real_world_implications: |
      Байесовское мышление лежит в основе современного ИИ, медицинской диагностики и научного вывода. Оно корректирует пренебрежение базовыми ставками и предвзятость подтверждения. Это мощный инструмент для любой области с неопределенностью.
    professional_application:
      networking_and_relationship_building: |
        Обновляйте свои убеждения о людях на основе новых доказательств, вместо того чтобы придерживаться фиксированных первых впечатлений. Рассмотрите базовые ставки (например, насколько распространено такое поведение?) при интерпретации действий.
      collaborative_learning_initiative: |
        Поощряйте команды явно формулировать априорные убеждения перед обсуждениями, а затем обновлять их по мере представления доказательств. Снижает эффект якорения и предвзятость подтверждения.
    how_can_this_be_misapplied:
      overprecision: |
        Присвоение точных вероятностей, когда неопределенность высока.
      prior_rigidity: |
        Придерживание сильных априорных убеждений и недостаточное их обновление на основе новых доказательств.
      base_rate_tyranny: |
        Игнорирование сильных доказательств, потому что базовые ставки предполагают иное — иногда доказательства должны иметь больший вес.
      false_sophistication: |
        Использование байесовской терминологии для создания видимости строгости без фактического рассуждения.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: Эффект Бенджамина Франклина
    quick_introduction: |
      Эффект Бенджамина Франклина — это психологический феномен, согласно которому люди начинают больше симпатизировать тому, кому они оказали услугу. Вопреки интуитивному представлению о том, что мы делаем одолжения тем, кто нам нравится, мы часто начинаем симпатизировать тем, кому мы оказали услугу.
    one_liner: Мы начинаем симпатизировать людям, которым оказывали услуги — наши установки следуют за нашими действиями.
    try_this:
      - Если вы хотите улучшить отношения, попросите о небольшой услуге.
      - Обратите внимание, как оказание услуги меняет ваше отношение к кому-либо.
      - Помните, что другие могут начать симпатизировать вам больше после оказания вам помощи.
    ask_yourself:
      - Изменило ли оказание услуги кому-то мои чувства к этому человеку?
      - Не рационализирую ли я свои усилия, повышая свое к нему уважение?
    in_more_detail: |
      Бенджамин Франклин знаменит тем, что расположил к себе соперника-законодателя, попросив одолжить редкую книгу из его библиотеки. После того, как тот согласился, Франклин вернул книгу с запиской с благодарностью. Отношения значительно улучшились. Эффект предполагает, что наши установки следуют за нашими действиями: когда мы вкладываем усилия в помощь кому-то, мы рационализируем эти усилия, повышая к ним наше положительное отношение.

      Теория когнитивного диссонанса объясняет это: когда мы делаем услугу человеку, который нам не нравится или к которому мы относимся нейтрально, мы испытываем напряжение между нашим действием (помощь) и нашим отношением (неприязнь). Разрешение этого напряжения через более сильную симпатию часто оказывается проще, чем признание того, что мы действовали вопреки своим предпочтениям.
    why_this_is_important: |
      Понимание эффекта Бенджамина Франклина помогает вам стратегически строить отношения и распознавать, когда ваши собственные чувства могут быть подвержены влиянию прошлых услуг. Это также объясняет, почему просьба о небольших услугах может быть более эффективной, чем предложение их, когда вы пытаетесь улучшить отношения.
    when_to_use:
      - построение_отношений
      - переговоры
      - лидерство
      - разрешение_конфликтов
    how_can_you_spot_it:
      liking_after_helping: |
        Замечайте, когда вы чувствуете себя теплее по отношению к кому-то после того, как оказали ему услугу, даже если раньше вы относились к нему нейтрально или негативно.
      others_requesting_small_favors: |
        Когда кто-то неоднократно просит о небольших услугах, он может сознательно или бессознательно использовать этот эффект для установления раппорта.
      attitude_shift_post_investment: |
        После того, как вы вложили время или усилия в помощь кому-то, понаблюдайте, изменилось ли ваше мнение о нем в положительную сторону.
      reciprocal_relationship_dynamics: |
        Отношения, в которых один человек оказал множество услуг, могут казаться несбалансированными в плане привязанности, несмотря на видимый баланс в действиях.
    examples:
      networking: |
        Попросить коллегу дать отзыв о черновике, что заставит его почувствовать большую заинтересованность в вашем успехе и более положительно к вам относиться.
      sales: |
        Продавец просит потенциального клиента оказать небольшую услугу (например, дать рекомендацию или представить кого-то), что увеличивает вовлеченность и симпатию клиента.
      conflict_resolution: |
        После разногласия попросить другую сторону помочь с чем-то несвязанным может смягчить напряженность и восстановить добрые намерения.
      mentoring: |
        Когда старший сотрудник просит младшего дать вводные данные или помочь, младший сотрудник часто чувствует себя более ценным и связанным.
    real_world_implications: |
      Эффект Бенджамина Франклина влияет на найм, продажи, дипломатию и повседневную социальную динамику. Он может использоваться этично для построения мостов или неэтично для манипулирования привязанностью. Его распознавание помогает понять, почему некоторые отношения становятся крепче после асимметричного оказания услуг.
    professional_application:
      networking_and_relationship_building: |
        При построении отношений рассмотрите возможность просьбы о небольших, разумных услугах, а не только их предоставления. Акт оказания помощи создает вовлеченность и положительное отношение.
      collaborative_learning_initiative: |
        В командах, когда члены помогают друг другу (например, взаимный обзор, перекрестное обучение), это может укрепить сплоченность. Структурируйте сотрудничество так, чтобы каждый как давал, так и получал помощь.
    how_can_this_be_misapplied:
      manipulation: |
        Сознательная просьба об услугах исключительно для того, чтобы кто-то полюбил вас, без реальной необходимости, может ощущаться как эксплуатация, если это будет обнаружено.
      overreliance_on_favors: |
        Предположение, что одни только услуги исправят испорченные отношения; некоторые конфликты требуют прямого разговора и ответственности.
      asymmetric_exploitation: |
        Неоднократные просьбы об услугах без ответной услуги могут иметь обратный эффект и породить обиду.
      misattributing_motives: |
        Принятие теплоты другого человека как чисто искренней, когда она может быть частично результатом услуг, оказанных им вам.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Ограниченная рациональность
    quick_introduction: |
      Ограниченная рациональность — это идея о том, что принятие решений человеком ограничено доступной информацией, когнитивными способностями и временем. Мы не оптимизируем; мы "довольствуемся" — выбираем варианты, которые достаточно хороши, а не наилучшие из возможных.
    one_liner: Мы довольствуемся — выбираем достаточно хорошее, а не оптимальное.
    try_this:
      - По возможности упрощайте выбор; слишком много вариантов перегружают ограниченную рациональность.
      - Заранее установите критерии "достаточно хорошо", чтобы избежать бесконечного поиска.
      - Замечайте, когда вы оптимизируете за точкой убывающей отдачи.
    ask_yourself:
      - Пытаюсь ли я найти идеальный вариант, когда достаточно хорошего было бы достаточно?
      - Какие ограничения (время, информация, внимание) ограничивают мое решение?
    in_more_detail: |
      Герберт Саймон ввел это понятие, чтобы оспорить классическое экономическое предположение о рациональных субъектах с совершенной информацией. В реальности у нас ограничены внимание, рабочая память и время. Мы используем эвристики и упрощенные методы для принятия решений, которые являются "рациональными" с учетом наших ограничений, даже если они не оптимальны в идеальном смысле.

      Ограниченная рациональность объясняет, почему мы не всегда выбираем лучший вариант, почему мы полагаемся на "правила большого пальца" и почему контекст и формулировка имеют такое большое значение. Это описательная модель того, как мы на самом деле принимаем решения, а не предписание того, как мы должны это делать.
    why_this_is_important: |
      Понимание ограниченной рациональности помогает вам создавать лучшие процессы, упрощать выбор для других и устанавливать реалистичные ожидания относительно качества решений. Это также объясняет, почему "иррациональное" поведение часто является рациональным в условиях ограничений.
    when_to_use:
      - принятие_решений
      - решение_задач
      - лидерство
      - оценка_рисков
    how_can_you_spot_it:
      satisficing_behavior: |
        Люди выбирают первый приемлемый вариант, а не исчерпывающе сравнивают.
      heuristic_reliance: |
        Решения принимаются с использованием "правил большого пальца", а не полного анализа.
      context_dependence: |
        Один и тот же человек принимает разные решения в зависимости от того, как представлены варианты.
      information_overload: |
        Когда доступно слишком много информации, качество решений может снизиться.
    examples:
      hiring: |
        Менеджер нанимает первого кандидата, который соответствует требованиям, вместо того, чтобы бесконечно проводить собеседования, чтобы найти "лучшего" кандидата.
      consumer_choice: |
        Покупатели выбирают из первых нескольких вариантов на полке, вместо того, чтобы сравнивать каждый продукт в магазине.
      policy: |
        Избиратели используют партийную принадлежность или несколько ключевых вопросов в качестве упрощенных методов, вместо того, чтобы анализировать каждую политическую позицию.
      daily_routines: |
        Люди следуют привычкам и настройкам по умолчанию, вместо того, чтобы каждый раз заново оптимизировать решения.
    real_world_implications: |
      Ограниченная рациональность формирует рынки, разработку политики и организационное поведение. "Подталкивания" (nudges) и архитектура выбора работают, потому что они учитывают наши ограничения. Игнорирование ее приводит к чрезмерно сложным системам, которые люди не могут эффективно использовать.
    professional_application:
      networking_and_relationship_building: |
        Не ожидайте, что другие будут обрабатывать сложные компромиссы в режиме реального времени. Упрощайте выбор и предоставляйте четкие варианты по умолчанию.
      collaborative_learning_initiative: |
        Разрабатывайте процессы, которые работают с учетом ограниченной рациональности: сокращайте выбор, предоставляйте варианты по умолчанию и используйте контрольные списки для сложных решений.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Проектирование процессов, которые предполагают неограниченные когнитивные способности, что приводит к усталости от принятия решений и плохим результатам.
      blaming_irrationality: |
        Отбрасывание выборов других как иррациональных, не учитывая их ограничений.
      exploitation: |
        Сознательное перегрузка людей сложностью, чтобы направить их к желаемым результатам.
      perfectionism: |
        Ожидание оптимальных решений, когда удовлетворенность часто является рациональным подходом.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Эффект свидетеля
    quick_introduction: |
      Эффект свидетеля — это тенденция, при которой люди с меньшей вероятностью
      предлагают помощь, когда рядом присутствуют другие люди. Чем больше свидетелей,
      тем меньше вероятность того, что кто-то один предпримет действия. Ответственность
      распределяется; мы предполагаем, что кто-то другой поможет.
    one_liner: Чем больше людей присутствует, тем меньше вероятность того, что кто-то один предпримет действия.
    try_this:
      - В экстренных ситуациях прямо назначайте ответственность: Вы, позвоните 112.
      - Не предполагайте, что кто-то другой поможет — действуйте или явно делегируйте.
      - Замечайте, когда вы ждете, пока другие действуют первыми.
    ask_yourself:
      - Распределяю ли я ответственность из-за присутствия других?
      - Действовал бы я иначе, если бы был один?
    in_more_detail: |
      После убийства Китти Дженовезе (хотя история была частично мифологизирована)
      исследователи обнаружили, что присутствие других людей снижает вероятность помощи.
      Мы ищем подсказки у других — если никто не действует, мы интерпретируем это как
      "действие не требуется". Мы также испытываем диффузию ответственности: при
      присутствии многих людей каждый чувствует себя менее лично ответственным. Может
      возникнуть множественное невежество: все считают, что что-то не так, но никто не
      действует, потому что никто другой не действует.

      Эффект наиболее выражен, когда ситуация неоднозначна и когда
      свидетели не знают друг друга. Его можно преодолеть путем прямого
      назначения ответственности ("Вы, позвоните 112").
    why_this_is_important: |
      Понимание эффекта свидетеля помогает вам действовать, когда другие не действуют,
      и разрабатывать системы, которые его преодолевают. Если вы в беде, выделите одного
      человека. Если вы свидетель, не ждите, пока другие действуют.
    when_to_use:
      - руководство
      - построение_отношений
      - разрешение_конфликтов
      - принятие_решений
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "Кто-нибудь другой сделает это", когда присутствует много людей.
      pluralistic_ignorance: |
        Все считают, что необходимо действовать, но никто не действует, потому что никто
        другой не действует.
      social_proof_inaction: |
        Бездействие других интерпретируется как "действие не требуется".
      audience_inhibition: |
        Страх выглядеть глупо или чрезмерно реагировать препятствует действию.
    examples:
      emergency: |
        Человек теряет сознание; при большом количестве свидетелей вероятность того,
        что кто-либо вызовет помощь, снижается.
      workplace: |
        Все видят проблему, но никто не поднимает ее — каждый предполагает,
        что кто-то другой это сделает.
      harassment: |
        Свидетели домогательств не вмешиваются, каждый думает,
        что другие действуют.
      meetings: |
        Плохая идея остается без оспаривания, потому что все предполагают,
        что кто-то другой выскажется.
    real_world_implications: |
      Эффект свидетеля может иметь трагические последствия в чрезвычайных ситуациях
      и позволяет проблемам сохраняться в организациях. Преодоление его
      требует прямого назначения ответственности и норм, поощряющих
      вмешательство.
    professional_application:
      networking_and_relationship_building: |
        Когда вам нужна помощь, обратитесь к конкретному человеку. Когда вы видите
        что-то не так, действуйте — не предполагайте, что другие помогут. Создавайте нормы,
        при которых высказывание ожидается и поощряется.
      collaborative_learning_initiative: |
        Обучайте людей распознавать эффект свидетеля и вмешиваться.
        Используйте принцип "если вы видите что-то, скажите что-то" и назначайте явные
        роли. Поощряйте тех, кто высказывается первым.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Сурово осуждать людей, когда эффект является мощной
        ситуационной силой — сосредоточьтесь на изменении ситуации.
      false_assumption: |
        Предполагать, что кто-то всегда поможет, если присутствует достаточно людей —
        часто бывает наоборот.
      overcorrection: |
        Сделать всех ответственным так, чтобы никто не был — диффузия
        все еще может произойти.
      individualizing: |
        Рассматривать эффект свидетеля как недостаток характера, а не
        как ситуационное явление.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Круг компетенций
    quick_introduction: |
      Круг компетенций — это ментальная модель, которая побуждает вас знать границы
      своей экспертизы и придерживаться их при принятии важных решений. Уоррен Баффет
      и Чарли Мангер подчеркивают важность знания того, чего вы не знаете.
    one_liner: Знайте границы своей экспертизы — и придерживайтесь их, когда это важно.
    try_this:
      - Нанесите на карту области, где у вас есть реальная экспертиза, и где вы угадываете.
      - Когда вы находитесь за пределами своего круга, обратитесь за советом или делегируйте.
      - Будьте честны: согласится ли настоящий эксперт с вашим суждением здесь?
    ask_yourself:
      - Нахожусь ли я в пределах своего круга компетенций, или я угадываю?
      - Когда в последний раз я признавал(а) "я не знаю" в этой области?
    in_more_detail: |
      У каждого человека есть области, в которых он обладает истинной экспертизой — где он может оценивать
      информацию, выявлять ошибки и делать надежные суждения. Вне этого круга он
      подвержен тем же предубеждениям и ошибкам, что и любой другой. Ключ в честной
      самооценке: где вы действительно компетентны, а где вы угадываете?

      Круг может расширяться посредством целенаправленного обучения, но для распознавания
      его текущих границ требуется смирение. Работа вне своего круга увеличивает
      риск дорогостоящих ошибок, особенно когда ставки высоки.
    why_this_is_important: |
      Пребывание в пределах своего круга компетенций снижает количество дорогостоящих ошибок и улучшает
      качество решений. Это также помогает вам знать, когда обращаться за советом, делегировать
      или воздерживаться. Чрезмерная самоуверенность вне своего круга является основным источником неудач.
    when_to_use:
      - принятие_решений
      - инвестирование
      - карьерный_рост
      - оценка_рисков
    how_can_you_spot_it:
      honest_boundary_assessment: |
        Можете ли вы объяснить пределы своих знаний в определенной области? Знаете ли вы, чего вы не знаете?
      knowing_when_to_defer: |
        Распознавание ситуаций, когда следует искать экспертное мнение, а не принимать решение самостоятельно.
      consistent_track_record: |
        В пределах вашего круга ваши суждения, как правило, подтверждаются со временем; за его пределами — нет.
      calibration: |
        Ваша уверенность в определенной области соответствует вашей фактической производительности в этой области.
    examples:
      investing: |
        Баффет избегает акций технологических компаний, потому что, по его словам, они находятся за пределами его круга
        компетенций — он не может надежно их оценить.
      career: |
        Специалист, который остается в своей области, по сравнению с тем, кто принимает "стрессовую" роль в
        не связанной с ней области.
      hiring: |
        Знание того, когда полагаться на собственное суждение, а когда привлекать специалистов для
        технических ролей.
      advice_giving: |
        Отказ высказывать мнение по темам, находящимся за пределами вашей экспертизы, вместо того, чтобы угадывать.
    real_world_implications: |
      Круг компетенций является центральным для стоимостного инвестирования и профессионального успеха.
      Игнорирование его приводит к чрезмерной самоуверенности, неудачным начинаниям и плохим советам. Расширение
      круга требует целенаправленных усилий и честной обратной связи.
    professional_application:
      networking_and_relationship_building: |
        Стройте отношения с людьми, чьи круги компетенций дополняют ваши.
        Знайте, когда лучше представить других, чем отвечать самому.
      collaborative_learning_initiative: |
        Создавайте команды с пересекающимися и дополняющими друг друга кругами. Поощряйте людей сообщать, когда они действуют за пределами своей компетенции.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Никогда не выходить за пределы своего круга может ограничить рост и обучение.
      false_modesty: |
        Утверждение о крошечном круге, чтобы избежать ответственности или сложных решений.
      gatekeeping: |
        Использование "круга компетенций" для отторжения других, не вникая в их аргументы.
      stagnation: |
        Отношение к кругу как к фиксированному, а не как к чему-то, что может расширяться с усилиями.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Когнитивный диссонанс
    quick_introduction: |
      Когнитивный диссонанс — это психологический дискомфорт, который мы испытываем, когда у нас есть противоречащие друг другу убеждения или когда наши действия противоречат нашим убеждениям. Мы мотивированы уменьшить этот дискомфорт, часто меняя наши убеждения, чтобы они соответствовали нашим действиям, а не меняя сами действия.
    one_liner: Мы чаще меняем свои убеждения, чтобы они соответствовали нашим действиям, чем наоборот.
    try_this:
      - Замечайте, когда вы оправдываетесь, чтобы уменьшить дискомфорт, вместо того чтобы менять поведение.
      - Спросите: Корректирую ли я свои убеждения, чтобы оправдать то, что я сделал?
      - Подумайте, было бы ли изменение действия более честным, чем изменение убеждения.
    ask_yourself:
      - Уменьшаю ли я диссонанс за счет оправданий или за счет реальных изменений?
      - Придерживался бы я этого убеждения, если бы уже не действовал подобным образом?
    in_more_detail: |
      Теория Леона Фестингера объясняет, что мы стремимся к последовательности. Когда мы действуем вопреки нашим ценностям (например, лжем, тратим деньги впустую), мы испытываем диссонанс. Чтобы уменьшить его, мы можем изменить свое убеждение ("Это не была настоящая ложь") или минимизировать действие ("Это было не так уж плохо"). Мы часто оправдываемся, а не исправляемся.

      Когнитивный диссонанс лежит в основе эффекта Бенджамина Франклина (мы больше нравимся людям, которым помогли), объясняет, почему мы оправдываем прошлые решения, и является причиной многих самообманов. Это мощная сила в формировании и изменении убеждений.
    why_this_is_important: |
      Понимание когнитивного диссонанса помогает вам распознавать собственные оправдания и понимать, почему люди сопротивляются изменению своего мнения. Это также объясняет, почему приверженность и последовательность являются мощными принципами убеждения.
    when_to_use:
      - принятие_решений
      - построение_отношений
      - лидерство
      - разрешение_конфликтов
    how_can_you_spot_it:
      post_decision_rationalization: |
        После принятия решения мы подчеркиваем положительные стороны нашего выбора и отрицательные стороны отвергнутых вариантов.
      belief_action_alignment: |
        Мы корректируем убеждения, чтобы они соответствовали действиям, которые мы уже совершили.
      discomfort_with_inconsistency: |
        Беспокойство, когда мы замечаем, что наше поведение не соответствует нашим заявленным ценностям.
      resistance_to_disconfirming_evidence: |
        Отбрасывание или минимизация информации, которая противоречит нашим обязательствам.
    examples:
      purchase_justification: |
        После покупки дорогого предмета мы подчеркиваем его преимущества и преуменьшаем стоимость.
      relationship: |
        Мы оправдываем то, что остаемся в плохих отношениях, сосредоточиваясь на хорошем и минимизируя плохое.
      career: |
        Мы оправдываем то, что остаемся на нелюбимой работе, подчеркивая причины, по которым "вынуждены" остаться.
      beliefs: |
        Когда наши действия противоречат нашим ценностям, мы меняем наши ценности ("Я на самом деле не вегетарианец — просто ем мясо иногда"), а не наши действия.
    real_world_implications: |
      Когнитивный диссонанс формирует убеждения, потребительское поведение и политические взгляды. Он объясняет, почему люди упорствуют после плохих решений, и почему изменение поведения может изменить убеждения.
    professional_application:
      networking_and_relationship_building: |
        Небольшие обязательства могут привести к большим — люди оправдывают свои прошлые действия. Используйте это этично: начните с малых просьб. Осознавайте, когда вы оправдываете собственное поведение.
      collaborative_learning_initiative: |
        При внедрении изменений заручитесь ранней поддержкой и небольшими обязательствами — они создают диссонанс, мотивирующий к большему принятию. Избегайте принудительных публичных обязательств, которые вызывают обиду.
    how_can_this_be_misapplied:
      manipulation: |
        Намеренное создание диссонанса для давления на людей с целью получения согласия.
      dismissing_genuine_change: |
        Предположение, что все изменения убеждений являются оправданием, когда люди иногда действительно обновляют свои взгляды.
      forced_consistency: |
        Принуждение людей к "последовательности", когда их взгляды законно развивались.
      self_deception: |
        Использование теории диссонанса для оправдания избегания неприятных истин о себе.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Предвзятость подтверждения
    quick_introduction: |
      Предвзятость подтверждения – это склонность искать, интерпретировать и запоминать информацию
      таким образом, чтобы подтверждать наши существующие убеждения. Мы придаем больший вес подтверждающим
      данным и игнорируем или отвергаем доказательства, противоречащие нашим взглядам. Мы
      задаем вопросы, подтверждающие, а не проверяющие наши гипотезы.
    one_liner: Мы ищем и запоминаем то, что подтверждает наши убеждения; мы игнорируем то, что им противоречит.
    try_this:
      - Задайте вопрос: Что докажет мою неправоту? Активно ищите опровергающие доказательства.
      - Замечайте, когда вы придаете большее значение подтверждающей информации, чем противоречащей.
      - Рассматривайте противоположную точку зрения так же серьезно, как и свою.
    ask_yourself:
      - Проверяю ли я свою гипотезу или просто подтверждаю ее?
      - Когда я в последний раз менял свое мнение на основе новых доказательств?
    in_more_detail: |
      Мы не являемся нейтральными обработчиками информации. Мы ищем подтверждения, интерпретируем
      неоднозначность как поддержку и лучше запоминаем удачи, чем промахи. Мы окружаем себя
      единомышленниками и подобными им СМИ. Мы задаем вопрос "Почему я прав?", а не
      "Что докажет мою неправоту?". Это заставляет нас быть чрезмерно самоуверенными и медленно обновлять свои взгляды.

      Предвзятость подтверждения является одним из самых распространенных и хорошо задокументированных искажений.
      Оно затрагивает науку, политику, отношения и бизнес. Преодоление этого искажения
      требует сознательных усилий и структурированных процессов.
    why_this_is_important: |
      Признание предвзятости подтверждения имеет решающее значение для принятия правильных решений и
      обучения. Это помогает вам искать опровергающие доказательства, рассматривать альтернативные
      гипотезы и обновлять свои убеждения, когда это необходимо. Это основа
      научного мышления.
    when_to_use:
      - принятие_решений
      - обучение
      - решение_задач
      - оценка_рисков
    how_can_you_spot_it:
      seeking_support: |
        Поиск доказательств, которые подтверждают, а не проверяют вашу точку зрения.
      asymmetric_interpretation: |
        Интерпретация неоднозначных доказательств как подтверждение вашей позиции.
      discounting_disconfirming: |
        Игнорирование или преуменьшение доказательств, противоречащих вашим убеждениям.
      selective_exposure: |
        Потребление информации только из источников, которые с вами согласны.
    examples:
      hiring: |
        Формирование раннего положительного впечатления, а затем задавание вопросов,
        подтверждающих, что кандидат отлично подходит.
      investing: |
        После покупки акции поиск положительных новостей и игнорирование негативных
        анализов.
      relationships: |
        Интерпретация действий партнера через призму, подтверждающую ваше
        представление о нем (хорошее или плохое).
      politics: |
        Некритическое принятие информации со своей стороны и отвержение
        аналогичной информации с другой стороны.
    real_world_implications: |
      Предвзятость подтверждения увековечивает ложные убеждения, разжигает поляризацию и
      приводит к дорогостоящим ошибкам. Это враг хорошей науки и хорошего
      принимания решений. Преодоление этого требует целенаправленного поиска опровержений.
    professional_application:
      networking_and_relationship_building: |
        При формировании мнений о людях активно ищите опровергающие
        доказательства. Спросите: "Что изменит мое мнение?" и ищите их.
      collaborative_learning_initiative: |
        Используйте "адвоката дьявола", "красные команды" и "премортемы" для выявления
        опровергающих точек зрения. Поощряйте людей, которые оспаривают преобладающие
        взгляды с помощью хороших доказательств.
    how_can_this_be_misapplied:
      false_balance: |
        Представление всех точек зрения как равноценных, когда доказательства убедительно поддерживают
        одну сторону.
      excessive_skepticism: |
        Отвержение всех доказательств как "предвзятости подтверждения", когда некоторые убеждения
        хорошо обоснованы.
      contrarianism: |
        Принятие противоположной точки зрения просто для того, чтобы избежать предвзятости подтверждения — когда
        первоначальная точка зрения может быть верной.
      analysis_paralysis: |
        Никогда не принимать решение, потому что "мы можем быть предвзяты".
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Проклятие знания
    quick_introduction: |
      Проклятие знания — это трудность в воображении того, каково это — не знать
      чего-то, когда ты уже это знаешь. Экспертам трудно обучать новичков, потому что
      они не могут воссоздать перспективу новичка. Как только вы что-то узнали, вы забываете,
      каково это было — не знать.
    one_liner: Как только вы что-то узнали, вы забываете, каково это было — не знать.
    try_this:
      - При объяснении начинайте с фундаментальных принципов — предполагайте, что ваша аудитория ничего не знает.
      - Попросите новичка объяснить обратно; его замешательство выявит ваши слепые зоны.
      - Обращайте внимание, когда вы пропускаете шаги или используете жаргон, который другие могут не знать.
    ask_yourself:
      - Предполагаю ли я, что у других такой же контекст, как и у меня?
      - Понятно ли это будет человеку без моего бэкграунда?
    in_more_detail: |
      В классическом эксперименте люди, знавшие ответ на головоломку, отстукивали ритм песни и ожидали, что другие его угадают — они переоценивали, насколько он очевиден. Отстукивающие не могли "разслушать" песню в своей голове.
      Знание "липкое"; трудно симулировать невежество.

      Проклятие влияет на преподавание, общение, разработку продуктов и лидерство.
      Мы предполагаем, что у других такой же контекст, как и у нас. Мы используем жаргон. Мы пропускаем
      шаги. Мы удивляемся, когда люди "не понимают".
    why_this_is_important: |
      Распознавание проклятия знания улучшает преподавание, общение и
      разработку продуктов. Это помогает вам встретиться с людьми там, где они находятся, а не
      там, где находитесь вы. Это необходимо для эффективной передачи знаний.
    when_to_use:
      - обучение
      - лидерство
      - решение_проблем
      - построение_отношений
    how_can_you_spot_it:
      obvious_to_you: |
        "Это очевидно", когда это очевидно только потому, что вы знаете ответ.
      jargon_use: |
        Использование терминов, которые аудитория не знает, без их определения.
      skipped_steps: |
        Предположение, что другие сами восполнят то, что вы упустили.
      frustration_with_learners: |
        "Как они этого не видят?", когда им не хватает вашего контекста.
    examples:
      teaching: |
        Профессор математики пропускает шаги, которые "очевидны" для него, но
        существенны для студентов.
      product_design: |
        Дизайнеры создают интерфейсы, которые имеют смысл для них, но сбивают с толку
        новых пользователей.
      onboarding: |
        Опытные сотрудники забывают, чего не знают новые сотрудники, и
        предоставляют неадекватное обучение.
      writing: |
        Авторы предполагают, что читатели имеют такой же бэкграунд, и упускают
        необходимый контекст.
    real_world_implications: |
      Проклятие знания создает коммуникационные разрывы, неудачные продукты
      и неэффективное преподавание. Это одна из причин, почему эксперты могут быть плохими
      учителями. Преодоление его требует сознательных усилий по принятию
      перспективы аудитории.
    professional_application:
      networking_and_relationship_building: |
        При объяснении начинайте с уровня другого человека. Спросите: "Что
        они уже знают?". Проверьте свое общение с кем-то, у кого нет вашего бэкграунда.
      collaborative_learning_initiative: |
        Используйте упражнения "объясни, как будто мне пять". Пусть эксперты учат
        новичков и получают обратную связь. Создавайте документацию, которая предполагает
        отсутствие предварительных знаний. Используйте взаимное обучение — люди, которые недавно
        учились, помнят перспективу новичка.
    how_can_this_be_misapplied:
      oversimplification: |
        Упрощение до точки неточности или снисходительности.
      false_assumption: |
        Предположение, что другие знают меньше, чем на самом деле — также сбой
        калибровки.
      one_size_fits_all: |
        Не всем аудиториям нужен одинаковый уровень объяснений; адаптируйте
        к аудитории.
      avoiding_complexity: |
        Некоторые темы сложны; проклятие знания не означает, что мы никогда не должны использовать технический язык, когда это уместно.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Эффект по умолчанию
    quick_introduction: |
      Эффект по умолчанию — это тенденция выбирать предварительно выбранный вариант при
      представлении нескольких вариантов. То, что установлено по умолчанию, имеет сильное преимущество —
      люди часто придерживаются этого, независимо от того, оптимально ли это для них.
    one_liner: То, что установлено по умолчанию, имеет сильное преимущество — мы придерживаемся этого.
    try_this:
      - Замечайте, когда вы принимаете настройку по умолчанию, не оценивая альтернативы.
      - При разработке вариантов выбора устанавливайте значения по умолчанию, соответствующие наилучшим интересам пользователей.
      - Задайте вопрос: Выбрал бы я это, если бы это не было предварительно выбрано?
    ask_yourself:
      - Я выбираю настройку по умолчанию из-за инерции или потому, что это лучше для меня?
      - Кто установил эту настройку по умолчанию и какую выгоду он мог из этого получить?
    in_more_detail: |
      Значения по умолчанию работают благодаря инерции, неприятию потерь (изменение ощущается как потеря
      значения по умолчанию) и подразумеваемой поддержке (мы предполагаем, что значение по умолчанию рекомендовано).
      Уровень донорства органов значительно различается по странам, в основном в зависимости от того,
      является ли значение по умолчанию «опт-ин» (согласие) или «опт-аут» (отказ). Участие в пенсионных накоплениях резко возрастает
      при автоматическом зачислении.

      Значения по умолчанию могут использоваться как во благо (подталкивая к лучшим результатам), так и для
      манипуляции (скрывая невыгодные условия в предварительно отмеченных полях). Понимание
      эффекта помогает создавать лучшие системы и противостоять нежелательным значениям по умолчанию.
    why_this_is_important: |
      Понимание эффекта по умолчанию помогает создавать архитектуру выбора, которая
      улучшает результаты, и помогает распознать, когда ваш выбор формируется
      значениями по умолчанию, а не сознательным предпочтением.
    when_to_use:
      - принятие_решений
      - лидерство
      - решение_проблем
      - оценка_рисков
    how_can_you_spot_it:
      inertia_toward_default: |
        Большинство людей придерживаются того, что выбрано предварительно.
      implied_recommendation: |
        Мы интерпретируем настройку по умолчанию как "то, что они хотят, чтобы мы выбрали".
      opt_in_vs_opt_out: |
        Формулировка существенно меняет участие (согласие против отказа).
      pre_checked_boxes: |
        Предварительно выбранные опции имеют сильное преимущество в формах и настройках.
    examples:
      organ_donation: |
        В странах с опт-аут (отказ) уровень донорства намного выше, чем в странах с опт-ин (согласие) —
        значение по умолчанию важнее отношения.
      retirement_savings: |
        Автоматическое зачисление значительно увеличивает участие в пенсионных планах 401(k).
      software_installers: |
        "Рекомендуемые" опции и предварительно отмеченные дополнения формируют то, что пользователи устанавливают.
      subscriptions: |
        Бесплатные пробные периоды, которые по умолчанию переводятся в платную подписку, захватывают многих, кто бы не
        выбрал активно подписаться.
    real_world_implications: |
      Эффект по умолчанию является одним из самых мощных толчков. Он формирует сбережения,
      здоровье, конфиденциальность и потребительское поведение. Этичная архитектура выбора использует
      значения по умолчанию для улучшения результатов; темные паттерны используют их для эксплуатации.
    professional_application:
      networking_and_relationship_building: |
        При разработке процессов для других выбирайте значения по умолчанию, соответствующие их интересам.
        Избегайте темных паттернов, использующих значения по умолчанию для извлечения выгоды.
      collaborative_learning_initiative: |
        Устанавливайте значения по умолчанию для командной работы (например, по умолчанию асинхронно, по умолчанию
        документировать), которые соответствуют желаемому поведению. Сделайте правильный выбор — легким выбором.
    how_can_this_be_misapplied:
      dark_patterns: |
        Использование значений по умолчанию для обмана людей с целью совершения невыгодных выборов (например, скрытые
        комиссии, нежелательные подписки).
      paternalism: |
        Навязывание значений по умолчанию, которые игнорируют истинные предпочтения без согласия.
      manipulation: |
        Скрытие невыгодных условий в значениях по умолчанию и расчет на инерцию.
      one_size_fits_all: |
        Предположение, что одно и то же значение по умолчанию подходит всем, когда предпочтения различаются.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Эффект Даннинга-Крюгера
    quick_introduction: |
      Эффект Даннинга-Крюгера описывает когнитивное искажение, при котором люди с ограниченными
      знаниями или навыками в определенной области переоценивают свою компетентность, в то время как эксперты
      склонны недооценивать свою. Чем меньше вы знаете, тем более уверенным вы можете быть.
    one_liner: Чем меньше вы знаете, тем более уверенным вы можете быть.
    try_this:
      - В новых областях предполагайте, что вы переоцениваете свои силы — ищите обратную связь и калибровку.
      - Когда эксперты выражают сомнения, относитесь к этому серьезно; они могут знать об исключениях.
      - Обращайте внимание, когда новички более уверены, чем эксперты в какой-либо области.
    ask_yourself:
      - Нахожусь ли я на «пике горы глупости» или в «долине смирения»?
      - Обладаю ли я метакогнитивной способностью оценивать свою компетентность здесь?
    in_more_detail: |
      Исследование Даннинга и Крюгера показало, что некомпетентные люди не обладают
      метакогнитивной способностью распознавать свою некомпетентность. Чтобы оценить свою
      работу, вам нужны те же навыки, которые требуются для хорошей работы — поэтому неквалифицированные
      люди дважды в проигрыше: они работают плохо и не знают об этом.

      По мере роста компетентности люди часто испытывают «долину смирения», когда они
      осознают, как многого они не знают. Настоящие эксперты могут быть неуверенными, потому что они
      остро осознают нюансы и крайние случаи.
    why_this_is_important: |
      Признание эффекта Даннинга-Крюгера помогает вам калибровать свою собственную уверенность,
      избегать переоценки мнений новичков и ценить смирение экспертов. Это
      необходимо для обучения, найма и принятия решений.
    when_to_use:
      - обучение
      - принятие_решений
      - лидерство
      - карьерные_шаги
    how_can_you_spot_it:
      novice_overconfidence: |
        Кто-то с небольшим опытом высказывает сильные, безоговорочные мнения.
      expert_underconfidence: |
        Высококвалифицированные люди выражают сомнения и неуверенность чаще, чем менее квалифицированные люди.
      inability_to_recognize_quality: |
        Низкопроизводительные работники не могут отличить хорошую работу от плохой в своей области.
      confidence_competence_mismatch: |
        Уверенность и фактические способности обратно коррелируют среди новичков.
    examples:
      social_media: |
        Люди с поверхностными знаниями темы уверенно спорят с экспертами в данной области.
      hiring: |
        Кандидаты, которые показывают низкие результаты на собеседованиях, иногда высоко оценивают свою собственную работу.
      investing: |
        Начинающие инвесторы могут быть чрезмерно уверены после ранних успехов, не осознавая, что это была удача.
      workplace: |
        Младшие сотрудники могут переоценивать свою готовность к продвижению по службе, в то время как старшие
        сомневаются в себе.
    real_world_implications: |
      Эффект Даннинга-Крюгера влияет на образование, найм, политику и общественный дискурс.
      Он объясняет, почему плохие идеи усиливаются и почему экспертов могут игнорировать. Калибровка
      имеет значение для индивидуального и коллективного принятия решений.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то очень уверен в себе, подумайте, не находится ли он в
        зоне Даннинга-Крюгера. Ищите разнообразные точки зрения, в том числе от тех, кто
        выражает неуверенность.
      collaborative_learning_initiative: |
        Создавайте культуру, где признание неуверенности ценится. Поощряйте упражнения по калибровке
        и обратную связь, которая помогает людям точно оценивать свою компетентность.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Предполагать, что уверенные в себе люди всегда неправы; иногда уверенность
        обоснована.
      false_modesty: |
        Эксперты, которые притворяются, что знают меньше, чем на самом деле, чтобы казаться скромными.
      gatekeeping: |
        Использование эффекта Даннинга-Крюгера для отклонения любого, кто не согласен с «экспертами», без
        учета их аргументов.
      self_doubt_paralysis: |
        Чрезмерная коррекция до такой степени, что вы никогда не доверяете собственным суждениям.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Разрыв эмпатии
    quick_introduction: |
      Разрыв эмпатии — это трудность понимания и прогнозирования психических
      состояний других людей, когда мы сами находимся в ином состоянии. Когда мы
      спокойны, мы недооцениваем, как будем себя чувствовать в гневе или голоде. Когда мы
      сыты, мы недооцениваем, как сильно будем хотеть есть, когда будем голодны.
    one_liner: Мы недооцениваем, как будем чувствовать себя — и как чувствуют себя другие — в разных состояниях.
    try_this:
      - Когда вы спокойны, принимайте обязательства на время, когда вы будете в стрессе; заранее обязуйтесь.
      - Не осуждайте других в состоянии, в котором вы не находитесь — голод, усталость, страх.
      - Спросите: проецирую ли я свое текущее состояние на свое будущее "я" или на других?
    ask_yourself:
      - Недооцениваю ли я, как буду себя чувствовать в другом состоянии?
      - Понимал бы я этого человека лучше, если бы находился в его состоянии?
    in_more_detail: |
      Нам трудно представить, как мы будем себя чувствовать в разных обстоятельствах — и как чувствуют себя другие, когда они находятся в состояниях, которых мы в данный момент не испытываем. Трезвый человек недооценивает тягу к зависимости. Хорошо отдохнувший человек
      недооценивает влияние недосыпания. Мы проецируем свое текущее состояние на других и на свое будущее "я".

      Разрыв эмпатии влияет на решения, которые мы принимаем для своего будущего "я" (например,
      обязательства заниматься спортом, когда мы мотивированы), решения, которые мы принимаем для
      других, и нашу способность понимать людей в разных состояниях.
    why_this_is_important: |
      Осознание разрыва эмпатии улучшает принятие решений для вашего будущего "я",
      эмпатию к другим и понимание нашей собственной изменчивости. Это
      объясняет, почему мы принимаем обязательства, которые не можем выполнить, и почему мы неправильно понимаем других в беде.
    when_to_use:
      - принятие_решений
      - построение_отношений
      - лидерство
      - разрешение_конфликтов
    how_can_you_spot_it:
      current_state_projection: |
        Предположение, что другие чувствуют то же, что и мы сейчас, или что будущее "я" будет чувствовать то же, что и мы сейчас.
      underestimating_emotional_state: |
        "Что такого особенного?" когда мы не находимся в том состоянии, в котором находятся они.
      commitment_failures: |
        Принятие решений, основанных на текущей мотивации, которым мы не будем следовать, когда мотивация ослабнет.
      misunderstanding_others: |
        Пренебрежение опытом других, потому что мы не можем представить его из нашего
        текущего состояния.
    examples:
      hunger: |
        Покупка продуктов, когда вы сыты — мы покупаем меньше, чем захотим, когда будем голодны.
      addiction: |
        Люди, не имеющие зависимости, недооценивают сложность отказа; зависимые
        в ремиссии могут недооценивать тягу, когда они употребляют.
      conflict: |
        Когда мы спокойны, мы недооцениваем, как будем реагировать в момент
        конфронтации.
      motivation: |
        Запись на 6-часовое занятие, когда мы мотивированы — и не приходим, когда
        мы сонны.
    real_world_implications: |
      Разрыв эмпатии влияет на лечение зависимостей, политику и межличностное
      понимание. Он объясняет, почему мы принимаем обязательства, которые нарушаем, и почему мы часто не понимаем точки зрения других. Это барьер на пути к эмпатии и хорошему принятию решений.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то находится в состоянии стресса, гнева или в другом состоянии, не
        предполагайте, что он будет рассуждать так же, как вы. Попытайтесь представить его состояние.
        Принимая обязательства, учитывайте, как вы будете себя чувствовать, когда мотивация
        ослабнет.
      collaborative_learning_initiative: |
        При планировании учитывайте, как команда будет себя чувствовать, когда устанет, окажется под
        давлением или будет расстроена. Планируйте для этих состояний, а не только для состояния мотивированного планирования.
    how_can_this_be_misapplied:
      overattribution: |
        Списывание всего недопонимания на "разрыв эмпатии", когда иногда
        у людей действительно разные ценности.
      excusing_behavior: |
        "Они не могли помочь — разрыв эмпатии", когда люди несут ответственность
        за управление своими состояниями.
      false_relativism: |
        Предположение, что мы никогда не сможем понять других, когда мы можем улучшиться с помощью усилий и опыта.
      self_excuse: |
        Использование разрыва эмпатии для оправдания собственных неудач в выполнении обязательств.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Эффект владения
    quick_introduction: |
      Эффект владения — это тенденция оценивать что-либо выше просто
      потому, что мы этим владеем. Мы требуем больше, чтобы расстаться с предметом, чем готовы заплатить,
      чтобы его приобрести. Владение создает привязанность, которая искажает нашу оценку.
    one_liner: Мы ценим то, чем владеем, больше, чем то, чем не владеем — владение создает привязанность.
    try_this:
      - Ask: Сколько я готов(а) заплатить, чтобы приобрести это, если бы я этим не владел(а)?
      - Продавая, представьте, что вы покупатель — заплатили бы вы свою запрашиваемую цену?
      - Обращайте внимание, когда владение завышает вашу оценку.
    ask_yourself:
      - Переоцениваю ли я это, потому что владею этим?
      - Согласился бы нейтральный покупатель с моей ценой?
    in_more_detail: |
      В экспериментах люди, которым случайным образом дарили кружку, требовали примерно в два раза больше, чтобы продать ее, чем другие были готовы заплатить, чтобы купить. Сам факт владения
      увеличивает воспринимаемую ценность. Это связано с неприятием потерь — расставание с чем-то ощущается как потеря, а мы склонны избегать потерь. Но эффект идет
      дальше: мы включаем принадлежащие нам вещи в свою идентичность.

      Эффект владения влияет на переговоры, потребительское поведение и
      организационные изменения. Он объясняет, почему люди переоценивают свои дома,
      свои идеи и свои текущие роли. Он создает трения в сделках
      и переходах.
    why_this_is_important: |
      Распознавание эффекта владения помогает вам вести переговоры более эффективно,
      принимать более четкие решения о том, что сохранить, а что отпустить, и понимать,
      почему другие переоценивают то, что имеют. Это также объясняет сопротивление
      изменениям.
    when_to_use:
      - принятие_решений
      - ведение_переговоров
      - инвестирование
      - карьерные_шаги
    how_can_you_spot_it:
      ownership_premium: |
        "Я бы не стал(а) это продавать за такую цену", когда вы бы не заплатили столько, чтобы купить это.
      attachment_to_possession: |
        Ценность вещей возрастает, как только мы ими владеем.
      resistance_to_trading: |
        Нежелание обменивать или торговать, даже когда это было бы рационально.
      overvaluation_of_own_ideas: |
        Наши идеи, проекты или роли кажутся более ценными, потому что они наши.
    examples:
      real_estate: |
        Владельцы домов часто завышают цены на свои дома — они оценивают их выше, чем
        рынок.
      negotiations: |
        Продавцы требуют больше, чем покупатели готовы заплатить; разрыв отражает
        эффект владения.
      career: |
        Переоценка текущей работы, компании или роли при рассмотрении
        изменений.
      ideas: |
        Предвзятость "не изобретено здесь" и "моя идея" — мы переоцениваем то, что создали или чем владеем.
    real_world_implications: |
      Эффект владения создает рыночные трения, замедляет выгодные
      обмены и подпитывает сопротивление изменениям. Он влияет на слияния,
      реорганизации и личные переходы. Понимание его
      улучшает ведение переговоров и управление изменениями.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то сопротивляется изменениям, рассмотрите возможность того, что он испытывает
        эффект владения — он ценит статус-кво выше, потому что "владеет"
        им. Представляйте изменения с точки зрения того, что он(а) получает, а не только того, от чего отказывается.
      collaborative_learning_initiative: |
        При внедрении новых процессов признайте, что люди привязаны
        к текущим методам. Создайте психологическую безопасность, чтобы "отпустить"
        старое, прежде чем принять новое.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Некоторая привязанность рациональна — сентиментальная ценность, затраты на переключение.
        Не все сопротивление — это эффект владения.
      manipulation: |
        Создание ложного чувства владения для извлечения более высоких цен (например,
        "попробуйте бесплатно", чтобы вызвать эффект владения).
      undervaluing_continuity: |
        Предположение, что все сопротивление изменениям иррационально, когда непрерывность
        имеет реальную ценность.
      cold_rationality: |
        Отбрасывание эмоциональной привязанности как "просто эффекта владения", когда
        это отражает подлинные ценности.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: Эффект ложного единодушия
    quick_introduction: |
      Эффект ложного единодушия — это тенденция переоценивать, насколько другие люди согласны
      с нашими убеждениями, установками и поведением. Мы предполагаем, что наши взгляды более распространены, чем на самом деле, и нам трудно представить, что разумные люди могут не соглашаться.
    one_liner: Мы переоцениваем, насколько другие с нами согласны.
    try_this:
      - Активно ищите людей, которые не согласны — не предполагайте единодушия.
      - Перед запуском проверьте идеи у людей, которые не разделяют ваших предположений.
      - Спросите: что сказал бы тот, кто не согласен? Отнеситесь к этому серьезно.
    ask_yourself:
      - Предполагаю ли я, что другие думают так же, как я?
      - Когда в последний раз меня удивил чей-то отличный от моего взгляд?
    in_more_detail: |
      Когда мы придерживаемся определенной позиции, мы склонны считать ее нормой. Мы окружаем себя единомышленниками, потребляем подтверждающую информацию и интерпретируем неоднозначную обратную связь как согласие. Это создает эхо-камеру, которая усиливает иллюзию единодушия.

      Эффект сильнее проявляется для глубоко укоренившихся убеждений и когда мы сильно вложены в свою позицию. Это может привести к удивлению, когда другие не согласны, к трудностям в переговорах и к плохому исследованию рынка, когда мы предполагаем, что клиенты думают так же, как мы.
    why_this_is_important: |
      Признание эффекта ложного единодушия помогает подготовиться к реальным разногласиям, проводить более качественные исследования и более эффективно общаться. Это важно для разработки продуктов, ведения переговоров и лидерства.
    when_to_use:
      - принятие_решений
      - переговоры
      - лидерство
      - решение_проблем
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Вы искренне шокированы, когда кто-то не согласен с тем, что вы считаете очевидным.
      assuming_shared_values: |
        Вы действуете так, как будто другие разделяют ваши приоритеты, не проверяя.
      underestimating_opposition: |
        Вы ожидаете меньшего сопротивления предложениям, чем оно есть на самом деле.
      echo_chamber_detection: |
        Ваше социальное и информационное окружение редко бросает вызов вашим взглядам.
    examples:
      product_development: |
        Команда предполагает, что пользователи хотят функцию X, потому что ее хочет вся команда — только чтобы обнаружить низкий уровень принятия.
      politics: |
        Люди в политическом пузыре удивлены результатами выборов, которые не соответствуют их ожиданиям.
      negotiation: |
        Предположение, что другая сторона согласится с условиями, потому что они кажутся вам "разумными".
      hiring: |
        Наем по принципу "соответствия культуре" может означать наем людей, которые с вами согласны, усиливая ложное единодушие.
    real_world_implications: |
      Эффект ложного единодушия способствует поляризации, неудачным запускам продуктов и сорванным переговорам. Он заставляет нас переоценивать свои прогнозы и быть неподготовленными к несогласию.
    professional_application:
      networking_and_relationship_building: |
        Активно ищите людей с разными точками зрения. Не предполагайте общего убеждения — спрашивайте и слушайте.
      collaborative_learning_initiative: |
        В командах используйте структурированное несогласие (например, "премортем", "адвокат дьявола"), чтобы выявить разногласия, прежде чем они станут дорогостоящими.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Предположение, что несогласные неразумны или плохо информированы, вместо того чтобы учитывать, что они могут иметь обоснованные, но иные точки зрения.
      poor_research: |
        Пропуск исследования клиентов, потому что "мы уже знаем, чего они хотят".
      overconfidence: |
        Смелые ставки, основанные на предположении, что другие согласятся.
      groupthink_amplification: |
        Команды, которые не бросают вызов эффекту ложного единодушия, могут спирально скатиться в групповое мышление.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Эффект фрейминга
    quick_introduction: |
      Эффект фрейминга — это склонность наших решений меняться в зависимости от того,
      как представлены варианты, — даже когда основополагающие факты идентичны. «90%
      выживаемости» и «10% смертности» описывают один и тот же исход, но вызывают разные
      выборы. Фрейм формирует решение.
    one_liner: Те же факты, представленные по-разному, приводят к разным решениям.
    try_this:
      - Перед принятием решения переформулируйте варианты несколькими способами — фрейм выгоды и фрейм потери.
      - Замечайте, когда ваш выбор меняется в зависимости от формулировки.
      - Спросите: Каковы основополагающие факты, лишенные фрейма?
    ask_yourself:
      - Решил бы я иначе, если бы это было представлено как выгода против потери?
      - Я реагирую на фрейм или на фактический результат?
    in_more_detail: |
      Кейнман и Тверски показали, что люди избегают риска, когда варианты
      представлены как выгоды, и склонны к риску, когда они представлены как потери — даже при одинаковых результатах. Позитивное фреймирование («спасти 200 жизней») против негативного фреймирования («400 умрут») меняет предпочтения. Фреймы потерь вызывают более сильные эмоциональные реакции, чем эквивалентные фреймы выгод.

      Эффект фрейминга влияет на медицинские решения, политику, маркетинг и
      переговоры. Это одно из самых сильных и хорошо задокументированных искажений.
      Осознанность помогает, но полностью преодолеть его трудно.
    why_this_is_important: |
      Распознавание эффекта фрейминга помогает принимать более последовательные решения,
      сопротивляться манипуляциям и более эффективно общаться. Это также объясняет,
      почему одно и то же предложение может быть принято или отклонено в зависимости от представления.
    when_to_use:
      - принятие_решений
      - переговоры
      - лидерство
      - оценка_рисков
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        Одинаковый результат, представленный как выгода против потери, приводит к разным выборам.
      presentation_dependence: |
        Решения меняются, когда меняется только фрейм, а не суть.
      default_influence: |
        Порядок или маркировка вариантов влияют на выбор.
      emotional_trigger: |
        Определенные фреймы вызывают более сильные эмоциональные реакции.
    examples:
      medical: |
        «90% выживаемости» против «10% смертности» при одной и той же процедуре —
        люди выбирают по-разному в зависимости от фрейма.
      sales: |
        «Сэкономьте 50 $» против «Не потеряйте 50 $» — эквивалентные фреймы, разное
        психологическое воздействие.
      policy: |
        «Налоговые льготы» против «государственных расходов» — та же политика, разная
        политическая реакция.
      negotiation: |
        Представление предложения как «скидка» против «избежание надбавки»
        изменяет процент принятия.
    real_world_implications: |
      Эффект фрейминга используется в рекламе, политике и
      переговорах. Он влияет на медицинские решения и поддержку политики.
      Перефреймирование может улучшить решения и общение. Осознание
      помогает, но не устраняет эффект полностью.
    professional_application:
      networking_and_relationship_building: |
        При представлении вариантов рассмотрите несколько фреймов. Проверьте, как
        разные фреймы влияют на восприятие. При получении информации
        спросите: «Как еще это можно представить?»
      collaborative_learning_initiative: |
        При принятии решений явно перефразируйте варианты, чтобы проверить
        эффект фрейминга. «Если бы мы представили это как потерю, приняли бы мы другое решение?»
        Используйте последовательное фреймирование для справедливости.
    how_can_this_be_misapplied:
      manipulation: |
        Преднамеренное фреймирование для направления людей к желаемым результатам
        без их ведома.
      false_equivalence: |
        Предположение, что все фреймы одинаково обоснованы, когда некоторые скрывают
        важную информацию.
      overcorrection: |
        Полное игнорирование фрейминга и предположение, что он не имеет значения —
        он имеет значение.
      spin: |
        Использование фрейминга для введения в заблуждение, а не для прояснения.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Фундаментальная ошибка атрибуции
    quick_introduction: |
      Фундаментальная ошибка атрибуции — это склонность объяснять поведение других
      людей их характером или личностью, в то время как свое собственное поведение
      мы объясняем ситуационными факторами. Мы оцениваем других по их поступкам, а себя — по нашим намерениям.
    one_liner: Мы оцениваем других по их поступкам, себя — по нашим намерениям.
    try_this:
      - Когда кто-то вас расстраивает, спросите: Какие ситуационные факторы могут это объяснить?
      - Проявляйте к другим ту же снисходительность, что и к себе.
      - Замечайте, когда вы объясняете поведение других характером, а не обстоятельствами.
    ask_yourself:
      - Объяснил бы я свое собственное поведение так же, как объясняю их?
      - Что я могу упускать об их ситуации?
    in_more_detail: |
      Когда кто-то подрезает нас в пробке, мы думаем: "Какой же он придурок". Когда мы сами подрезаем кого-то, мы думаем: "Пришлось — я очень спешил". Мы объясняем свои собственные неудачи обстоятельствами ("ужасное движение"), а неудачи других — предрасположенностью ("они ленивые"). Обратное справедливо для успеха: мы приписываем успех себе, а успех других — удаче.

      Ошибка является "фундаментальной", потому что она вездесуща и постоянна. Она
      подрывает эмпатию, разжигает конфликты и искажает оценку результатов работы.
    why_this_is_important: |
      Осознание фундаментальной ошибки атрибуции улучшает отношения,
      снижает конфликтность и приводит к более справедливым суждениям. Это побуждает учитывать
      контекст, прежде чем делать вывод о том, каким "является" человек.
    when_to_use:
      - построение_отношений
      - разрешение_конфликтов
      - лидерство
      - принятие_решений
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "Он просто такой человек" при объяснении поведения других.
      situational_explanation_for_self: |
        "У меня не было выбора" или "Обстоятельства вынудили меня" при объяснении собственного поведения.
      character_vs_context: |
        Предположение о характере, когда ситуацию можно объяснить поведение.
      asymmetric_standards: |
        Применение к другим более строгих стандартов, чем к себе.
    examples:
      traffic: |
        Ошибка другого водителя = "плохой водитель". Наша ошибка = "неизбежная ситуация".
      workplace: |
        Несоблюдение срока коллегой = "безответственный". Наше несоблюдение срока =
        "перегружен и никто не смог бы сделать лучше".
      politics: |
        Взгляды оппонентов = "они глупые или злые". Наши взгляды = "рациональный ответ
        на факты".
      performance: |
        Успех других = "повезло". Наш успех = "заработан тяжелым трудом".
    real_world_implications: |
      Фундаментальная ошибка атрибуции разжигает конфликты, подрывает командную работу и
      искажает наем сотрудников и оценку их работы. Корректировка этого помогает улучшить
      организационную культуру и личные отношения.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то вас разочаровывает, спросите "Какие ситуационные факторы могут это объяснить?", прежде чем делать вывод, что он ненадежный или трудный.
      collaborative_learning_initiative: |
        В обратной связи и оценках поощряйте интерпретации "сначала ситуация".
        Обучите менеджеров учитывать контекст, прежде чем приписывать поведение характеру.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Отбрасывание каждого действия как "ситуационного", когда некоторое поведение действительно отражает
        характер.
      no_accountability: |
        Использование ошибки, чтобы избежать привлечения людей к ответственности за сделанный ими выбор.
      self_deprecation: |
        Чрезмерная самокритика, когда вы всегда вините себя и никогда не признаете ответственность других.
      ignoring_patterns: |
        Когда кто-то неоднократно ведет себя плохо в различных ситуациях, предрасположенность может
        быть релевантной.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Ошибка игрока
    quick_introduction: |
      Ошибка игрока — это ошибочное убеждение, что прошлые независимые события
      влияют на будущие. После серии «орлов» мы думаем, что «орел» «назревает» — даже
      несмотря на то, что каждый бросок независим. Мы видим закономерности в случайности и
      ожидаем «коррекции» или «возврата», когда это не требуется.
    one_liner: Прошлые независимые события не влияют на будущие — у монеты нет памяти.
    try_this:
      - Когда вы думаете, что вам пора выиграть, спросите: являются ли эти события действительно независимыми?
      - Различайте регрессию к среднему (реальное) и ошибку игрока (ложное).
      - Замечайте, когда вы видите закономерности в случайности.
    ask_yourself:
      - Предполагаю ли я, что прошлые результаты влияют на будущие, когда они независимы?
      - Согласился бы статистик с моими рассуждениями «пора что-то менять»?
    in_more_detail: |
      При честном подбрасывании монеты каждый бросок независим. Вероятность выпадения «орла»
      всегда составляет 50% независимо от прошлых результатов. Но мы чувствуем, что длинная серия
      одного исхода делает другой более вероятным. Мы путаем закон больших чисел (при множестве испытаний исходы усредняются) с краткосрочной
      «коррекцией». У казино нет памяти.

      Эта ошибка влияет на азартные игры, инвестирование и повседневное принятие решений.
      Мы предполагаем, что «удача» уравновесится или что нам «пора» выиграть.
      Иногда мы правы — но по неправильным причинам.
    why_this_is_important: |
      Распознавание ошибки игрока предотвращает дорогостоящие ошибки в азартных играх
      и инвестировании. Это также помогает избежать излишней интерпретации коротких серий
      и ожидания ложного возврата. Это отличает истинную регрессию
      к среднему от ошибки.
    when_to_use:
      - принятие_решений
      - инвестирование
      - оценка_рисков
      - решение_проблем
    how_can_you_spot_it:
      due_for_a_change: |
        «У нас было так много проигрышей — нам пора выиграть».
      pattern_in_randomness: |
        Видеть значимые закономерности в случайных последовательностях.
      hot_hand_fallacy: |
        Верить, что серия продолжится (связанная, но противоположная ошибка).
      independence_ignorance: |
        Рассматривать независимые события так, как будто они связаны.
    examples:
      gambling: |
        После нескольких выпадений красного на рулетке ставить на черное, потому что «красное не может выпадать постоянно».
      investing: |
        «Рынок падал — он должен расти».
      hiring: |
        «Мы наняли нескольких плохих кандидатов — следующий точно будет хорошим».
      sports: |
        «Он так много пропустил — ему пора попасть в следующий бросок».
    real_world_implications: |
      Ошибка игрока приводит к убыткам в азартных играх и неверным инвестиционным
      решениям. Она также объясняет, почему мы излишне интерпретируем краткосрочные закономерности.
      Важно отличать ее от истинной регрессии к среднему (где существует реальное среднее, к которому происходит регрессия).
    professional_application:
      networking_and_relationship_building: |
        Не предполагайте, что прошлые динамики отношений «скорректируются» в будущем — каждое взаимодействие в некоторой степени независимо. Но извлекайте уроки из закономерностей, когда существует реальная первопричина.
      collaborative_learning_initiative: |
        При оценке производительности отличайте случайные колебания от систематических изменений. Короткие серии могут быть шумом; не следует чрезмерно реагировать на «серии» или ожидать ложного возврата.
    how_can_this_be_misapplied:
      ignoring_regression: |
        Иногда регрессия к среднему реальна (например, производительность навыков).
        Не отвергайте весь возврат как ошибку игрока.
      false_independence: |
        Предполагать, что события независимы, когда это не так (например, повторные
        измерения одного и того же).
      overcorrection: |
        Никогда не ожидать возврата, когда существует реальное среднее, к которому происходит регрессия.
      dismissing_patterns: |
        Некоторые закономерности реальны — не вся последовательность случайна.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Групповое мышление
    quick_introduction: |
      Групповое мышление — это тенденция сплоченных групп отдавать
      приоритет консенсусу и гармонии перед критической оценкой. Члены
      подавляют несогласие, занимаются самоцензурой и подстраиваются под
      воспринимаемое групповое мнение. Желание единодушия преобладает
      над желанием принять лучшее решение.
    one_liner: Гармония вместо истины — группы отдают приоритет консенсусу перед критической оценкой.
    try_this:
      - Назначьте "адвоката дьявола"; сделайте несогласие ожидаемым и безопасным.
      - Спросите: Что мы не говорим? Что бы мы сказали, если бы не были в этой группе?
      - Ищите внешние точки зрения перед окончательным принятием групповых решений.
    ask_yourself:
      - Занимаюсь ли я самоцензурой, чтобы сохранить гармонию?
      - Является ли наш консенсус подлинным или результатом давления, чтобы согласиться?
    in_more_detail: |
      Ирвинг Джанис изучал провалы во внешней политике (операция в
      Заливе свиней, Вьетнам) и выявил закономерности: иллюзия
      неуязвимости, коллективная рационализация, давление к конформизму,
      самоцензура, иллюзия единодушия и "привратники", которые защищают
      группу от информации, вызывающей несогласие. Высокая сплоченность,
      изоляция и стресс усиливают групповое мышление.

      Групповое мышление приводит к плохим решениям, потому что альтернативы
      не рассматриваются всерьез. Несогласие воспринимается как
      нелояльность. Группа переоценивает свою правоту и недооценивает риски.
    why_this_is_important: |
      Признание группового мышления помогает вам создавать условия для
      лучшего принятия решений: поощрять несогласие, привлекать
      внешние точки зрения и избегать преждевременного консенсуса. Это
      необходимо для предотвращения катастрофических групповых неудач.
    when_to_use:
      - лидерство
      - принятие_решений
      - решение_проблем
      - разрешение_конфликтов
    how_can_you_spot_it:
      pressure_for_consensus: |
        Несогласие не поощряется или наказывается; согласие вознаграждается.
      illusion_of_unanimity: |
        Молчание интерпретируется как согласие, когда это может быть
        самоцензурой.
      collective_rationalization: |
        Группа отвергает предупреждения и подкрепляет свою точку зрения.
      mindguards: |
        Члены группы защищают ее от информации, которая могла бы
        поставить под сомнение консенсус.
    examples:
      bay_of_pigs: |
        Советники Кеннеди подавили сомнения относительно плана вторжения;
        результатом стала катастрофа.
      corporate_decisions: |
        Руководящая команда продвигает слияние, несмотря на тревожные
        признаки, потому что никто не хочет быть противником.
      product_launches: |
        Команда выпускает дефектный продукт, потому что все вложились
        в план, и никто не высказывает опасений.
      boards: |
        Члены совета директоров "штампуют" предложения руководства, чтобы
        сохранить гармонию.
    real_world_implications: |
      Групповое мышление способствует провалам в политике, корпоративным
      катастрофам и упущенным возможностям. Оно особенно опасно в
      ситуациях с высокими ставками и высоким уровнем стресса. Предотвращение
      его требует целенаправленных структурных вмешательств.
    professional_application:
      networking_and_relationship_building: |
        Создайте психологическую безопасность для несогласия. Благодарите
        людей, которые высказывают опасения. Демонстрируйте, как
        не соглашаться, не будучи неприветливым.
      collaborative_learning_initiative: |
        Используйте "адвоката дьявола", "красные команды" и "премортемы".
        Требуйте, чтобы кто-то выступал против преобладающего мнения.
        Привлекайте внешние точки зрения. Лидер говорит последним, чтобы
        избежать якорения.
    how_can_this_be_misapplied:
      false_dissent: |
        Создание "назначенных несогласных", которые на самом деле не
        не соглашаются — группа это чувствует.
      excessive_conflict: |
        Поощрение несогласия до точки деструктивного конфликта и
        паралича.
      dismissing_consensus: |
        Предположение, что любой консенсус является групповым мышлением —
        иногда группа права.
      individualism: |
        Чрезмерная коррекция до такой степени, что принятие коллективного
        решения становится невозможным.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Эффект ореола
    quick_introduction: |
      Эффект ореола – это тенденция позволять одной положительной черте или впечатлению
      влиять на наше общее суждение о человеке. Если нам нравится внешность человека,
      мы можем предположить, что он компетентен. Если мы восхищаемся одним навыком,
      мы предполагаем, что он хорош во всем. Один положительный атрибут бросает
      "ореол" на все остальное.
    one_liner: Одна положительная черта бросает ореол на всё наше суждение о человеке.
    try_this:
      - Оценивайте черты независимо — не позволяйте одной сильной стороне подразумевать другие.
      - Замечайте, когда привлекательность, харизма или один успех окрашивают ваше восприятие.
      - Спросите: Оценил бы я этого человека так же без этого одного положительного атрибута?
    ask_yourself:
      - Обобщаю ли я одну черту на всего человека?
      - Увидел бы я недостатки, если бы меня не впечатлила одна сильная сторона?
    in_more_detail: |
      Эдвард Торндайк заметил, что офицеры, высоко оценивающие солдат по одной черте,
      склонны оценивать их высоко и по другим — даже не связанным чертам. Мы обобщаем
      от частного к целому. Привлекательность, харизма или успех в одной области создают
      ореол, который распространяется.

      Обратное — одна отрицательная черта, окрашивающая все — иногда называется
      "эффектом рогов". Оба являются формами необоснованного обобщения. Эффект ореола
      влияет на наем, оценку производительности и повседневные впечатления.
    why_this_is_important: |
      Распознавание эффекта ореола помогает вам делать более точные оценки и избегать
      чрезмерных обобщений. Это важно для справедливого найма, управления производительностью
      и оценки отношений. Одна сильная сторона не подразумевает все сильные стороны.
    when_to_use:
      - принятие_решений
      - лидерство
      - построение_отношений
      - найм
    how_can_you_spot_it:
      trait_spillover: |
        Одна положительная черта влияет на оценку несвязанных черт.
      attractiveness_bias: |
        Привлекательные люди оцениваются выше по компетентности, надежности и т. д.
      success_generalization: |
        Успех в одной области приводит к предполагаемой компетентности в других.
      first_impression_dominance: |
        Раннее положительное впечатление окрашивает всю последующую оценку.
    examples:
      hiring: |
        Кандидат, который хорошо говорит и приятен, считается технически сильным —
        даже когда навыки не связаны.
      performance_reviews: |
        Один выдающийся проект приводит к высоким оценкам по всем параметрам.
      politics: |
        Харизма политика приводит к предполагаемой компетентности в области политики.
      branding: |
        Успех компании в одном продукте приводит к предполагаемому качеству
        всех продуктов.
    real_world_implications: |
      Эффект ореола искажает найм, оценку производительности и инвестиционные решения.
      Он благоприятствует привлекательным, красноречивым и уже успешным. Сокращение
      его требует структурированной оценки и разделения измерений.
    professional_application:
      networking_and_relationship_building: |
        Оценивайте людей по конкретным параметрам, а не по общему впечатлению.
        Будьте внимательны, когда одна положительная черта влияет на ваше суждение
        о других. Ищите опровергающие доказательства.
      collaborative_learning_initiative: |
        Используйте структурированные собеседования и оценки, которые оценивают
        параметры независимо. Калибруйте оценки между оценщиками. Уменьшите зависимость
        от общего "чутья".
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        Не каждое положительное впечатление — это ореол; иногда люди действительно
        сильны по всем параметрам.
      false_objectivity: |
        Предположение, что мы можем полностью устранить эффект ореола — он
        вездесущ и отчасти автоматичен.
      overcorrection: |
        Переход к противоположной крайности и предположение, что привлекательные
        или харизматичные люди менее компетентны.
      stereotyping: |
        Использование "эффекта ореола" для отклонения законных положительных атрибутов.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Бритва Хэнлона
    quick_introduction: |
      Бритва Хэнлона гласит: "Никогда не приписывайте злобе то, что может быть адекватно объяснено глупостью". Иными словами, не предполагайте злой умысел, когда поведение можно объяснить некомпетентностью, недосмотром или невежеством.
    one_liner: Не предполагайте злой умысел, когда его можно объяснить некомпетентностью или недосмотром.
    try_this:
      - Когда кто-то вас расстраивает, спросите: Можно ли это объяснить ошибкой или невежеством?
      - По умолчанию выбирайте более простое объяснение, прежде чем предполагать злой умысел.
      - Обращайте внимание, когда вы начинаете думать, что он хотел вам навредить.
    ask_yourself:
      - Приписываю ли я злобе то, что можно объяснить глупостью?
      - Хотел бы я получить такое же снисхождение на их месте?
    in_more_detail: |
      Этот принцип побуждает относиться к людям снисходительно. Когда чьи-то действия вредят вам или расстраивают вас, по умолчанию часто предполагается, что они хотели вам навредить. Бритва Хэнлона предполагает, что многие такие действия проистекают из невнимательности, нехватки информации или плохого исполнения — а не из злого умысла.

      Это не означает, что злой умысел никогда не существует. Это означает, что мы не должны переходить к худшей интерпретации, когда подходит более простая. Бритва уменьшает паранойю, улучшает отношения и помогает нам более конструктивно реагировать на проблемы.
    why_this_is_important: |
      Применение Бритвы Хэнлона уменьшает конфликты, сохраняет отношения и направляет энергию на решение проблем, а не на возложение вины. Это также защищает вас от стресса, связанного с предположением, что все хотят вам навредить.
    when_to_use:
      - разрешение_конфликтов
      - руководство
      - построение_отношений
      - принятие_решений
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Вы немедленно интерпретируете негативный результат как преднамеренный вред.
      personalizing_mistakes: |
        Когда что-то идет не так, вы предполагаете, что это было направлено лично против вас.
      ignoring_alternative_explanations: |
        Вы не рассматриваете некомпетентность, недопонимание или недосмотр как возможные причины.
      escalation_before_inquiry: |
        Вы реагируете гневом или местью, прежде чем спросить, что произошло.
    examples:
      email_tone: |
        Предполагая, что короткое письмо пассивно-агрессивно, хотя отправитель, возможно, просто торопился или плохо передает тон.
      missed_deadline: |
        Интерпретируя опоздание коллеги с выполнением задачи как саботаж, когда он, возможно, взял на себя слишком много или столкнулся с препятствиями.
      policy_decisions: |
        Предполагая, что нелюбимая вами политика компании была разработана, чтобы навредить сотрудникам, хотя это может быть неуклюжей попыткой решить другую проблему.
      traffic: |
        Предполагая, что другой водитель специально подрезал вас, когда он, возможно, вас не видел.
    real_world_implications: |
      Бритва Хэнлона улучшает корпоративную культуру, уменьшает количество судебных исков и делает разрешение конфликтов более эффективным. Чрезмерное применение может способствовать халатности; недостаточное применение создает ненужные конфликты.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то вас разочаровывает, попросите разъяснений, прежде чем предполагать злой умысел. Сохраняйте отношения, по умолчанию применяя благожелательные интерпретации.
      collaborative_learning_initiative: |
        В командах создавайте культуру, в которой ошибки предполагаются непреднамеренными, пока не доказано обратное. Сосредоточьтесь на системах и процессах, а не на обвинениях.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Списывать повторяющуюся некомпетентность или халатность как "не злобу", когда это требует ответственности.
      ignoring_genuine_malice: |
        Применять бритву настолько строго, что вы упускаете из виду настоящих злодеев или токсичное поведение.
      avoiding_difficult_conversations: |
        Использовать Бритву Хэнлона как предлог, чтобы не решать проблемы с производительностью.
      gaslighting_victims: |
        Говорить человеку, которому действительно причинили вред, что он "предполагает злобу", когда злоба присутствовала.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Эффект Хоторна
    quick_introduction: |
      Эффект Хоторна — это тенденция людей изменять свое поведение,
      когда они знают, что за ними наблюдают или изучают. Сам акт наблюдения
      может вызвать изменения, а не обязательно тестируемое вмешательство.
      Люди реагируют на уделяемое им внимание.
    one_liner: Наблюдение меняет поведение — само внимание может вызвать эффект.
    try_this:
      - При оценке вмешательства учитывайте, обусловлены ли результаты наблюдением.
      - Осознайте, что внимание и чувство ценности могут повысить производительность.
      - Будьте осторожны, приписывая изменения конкретному вмешательству, когда изменилось наблюдение.
    ask_yourself:
      - Улучшение вызвано вмешательством или наблюдением?
      - Сохранятся ли результаты, если мы перестанем уделять внимание?
    in_more_detail: |
      На заводе Hawthorne Works исследователи обнаружили, что производительность
      улучшилась, когда они изменили освещение — и также когда вернули его обратно.
      Улучшение, казалось, было связано с вниманием и наблюдением, а не
      с конкретным вмешательством. Более поздний повторный анализ предполагал, что эффект мог
      быть преувеличен, но концепция остается полезной: изучение
      меняет поведение.

      Эффект Хоторна осложняет исследования и оценки. Он может
      завышать видимое влияние вмешательств. Он также предполагает, что
      внимание и чувство ценности могут повысить производительность — урок для
      управления.
    why_this_is_important: |
      Понимание эффекта Хоторна помогает интерпретировать результаты исследований,
      разрабатывать лучшие эксперименты и осознавать, что само внимание
      может стимулировать изменения. В управлении это предполагает, что уделение
      внимания людям может иметь такое же значение, как и конкретное вмешательство.
    when_to_use:
      - лидерство
      - принятие_решений
      - обучение
      - решение_проблем
    how_can_you_spot_it:
      observation_induced_change: |
        Поведение меняется, когда люди знают, что за ними наблюдают или изучают.
      attention_effect: |
        Сам акт уделения внимания вызывает улучшение, а не только
        конкретное изменение.
      placebo_analog: |
        Подобно плацебо, "лечение" в виде изучения может иметь эффекты.
      short_term_improvement: |
        Улучшения могут исчезнуть, когда наблюдение прекратится.
    examples:
      workplace_studies: |
        Производительность увеличивается во время исследования — связано ли это с новым процессом или
        с тем, что кто-то наблюдает?
      medical_trials: |
        Группы плацебо улучшаются — частично потому, что им уделяется внимание.
      education: |
        Студенты лучше учатся, когда присутствуют исследователи —
        "эффект наблюдателя".
      management: |
        Команды улучшаются, когда руководство уделяет внимание — связано ли это с новой
        инициативой или самим вниманием?
    real_world_implications: |
      Эффект Хоторна влияет на достоверность исследований и оценку программ.
      Он может привести к завышению оценки эффектов вмешательств.
      Он также несет позитивный урок: внимание и чувство того, что тебя изучают,
      могут мотивировать к улучшению — поэтому забота и видимость имеют значение.
    professional_application:
      networking_and_relationship_building: |
        Уделение внимания людям может повысить их производительность —
        эффект Хоторна предполагает, что чувство наблюдения и
        ценности имеет значение. Используйте это позитивно: регулярные проверки,
        видимость и признание.
      collaborative_learning_initiative: |
        При оценке вмешательств используйте контрольные группы и
        учитывайте, вызваны ли улучшения вмешательством
        или вниманием, которое оно привлекает. Эффект Хоторна может
        завысить видимый успех.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Использование "эффекта Хоторна" для оправдания постоянного мониторинга —
        наблюдение также может снизить доверие и внутреннюю мотивацию.
      dismissing_improvements: |
        Предположение, что все улучшения во время исследований вызваны эффектом Хоторна —
        иногда вмешательства действительно работают.
      overgeneralization: |
        Оригинальные исследования Хоторна были подвергнуты сомнению;
        эффект может быть меньше или отличаться от первоначально предполагаемого.
      manipulation: |
        Создание ложного "наблюдения" для манипулирования поведением.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - salience_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Предвзятость последующего знания
    quick_introduction: |
      Предвзятость последующего знания (или эффект "Я это знал") — это тенденция
      считать, что после наступления события мы могли его предсказать или ожидали.
      Мы реконструируем прошлое, чтобы результаты казались более неизбежными,
      чем они были на самом деле.
    one_liner: После факта нам кажется, что мы всё знали.
    try_this:
      - Прежде чем оценивать прошлые решения, спросите: Что они знали в то время?
      - Записывайте свои прогнозы до наступления результатов — сравните позже.
      - Замечайте, когда вы делаете прошлое более неизбежным, чем оно было.
    ask_yourself:
      - Оцениваю ли я, располагая информацией, которой тогда не было?
      - Действительно ли я это предсказал, или сейчас это просто кажется очевидным?
    in_more_detail: |
      Как только мы узнаем результат, он кажется очевидным. Мы забываем неуверенность,
      которую испытывали раньше. Это искажение мешает обучению — мы думаем, что
      "знали" что-то, когда на самом деле не знали, и поэтому не обновляем свои
      модели. Это также приводит к несправедливым обвинениям: "Они должны были
      это предвидеть", когда будущее было действительно неопределенным.

      Предвзятость последующего знания влияет на анализ инцидентов, судебные решения
      и исторический анализ. Мы оцениваем прошлые решения, располагая информацией,
      которой тогда не было.
    why_this_is_important: |
      Осознание предвзятости последующего знания улучшает обучение на основе
      результатов, более справедливую оценку решений и более точную оценку рисков.
      Это предотвращает ложную уверенность в наших прогностических способностях.
    when_to_use:
      - принятие_решений
      - обучение
      - оценка_рисков
      - лидерство
    how_can_you_spot_it:
      inevitability_feeling: |
        После события кажется, что оно "должно было" произойти.
      reconstructed_certainty: |
        Мы помним, что были более уверены до события, чем на самом деле.
      blame_for_failure: |
        "Они должны были знать", когда результат был действительно неопределенным.
      undervaluing_luck: |
        Приписывание результатов навыкам или предвидению, когда роль сыграла удача.
    examples:
      investing: |
        "Я знал, что рынок рухнет" после того, как он рухнул — когда вы не действовали
        на основе этого "знания" заранее.
      project_failures: |
        "Мы должны были предвидеть риски" на анализе инцидента, когда риски были
        действительно неоднозначными.
      elections: |
        После неожиданного результата эксперты объясняют, почему он был "очевидным"
        в ретроспективе.
      medical: |
        "Признаки были налицо", когда ставится диагноз редкого заболевания постфактум.
    real_world_implications: |
      Предвзятость последующего знания искажает юридическую ответственность,
      оценку эффективности и обучение. Она заставляет нас чрезмерно полагаться
      на собственное суждение и несправедливо относиться к тем, кто принимал
      обоснованные решения при ограниченной информации.
    professional_application:
      networking_and_relationship_building: |
        При оценке прошлых решений других людей сознательно отделяйте то, что было
        известно тогда, от того, что вы знаете сейчас. Избегайте "Я же говорил",
        когда вы на самом деле не предсказывали результат.
      collaborative_learning_initiative: |
        При анализе инцидентов используйте техники "пре-мортем" или "журнал решений"
        для фиксации неопределенности во время принятия решения. Сравнивайте
        фактическую неопределенность с ретроспективной реконструкцией.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Оправдывать все неудачи как "непредсказуемые", когда некоторые были предвидимы.
      no_accountability: |
        Использовать предвзятость последующего знания, чтобы избегать привлечения
        людей к ответственности за халатность.
      false_uncertainty: |
        Чрезмерно корректировать, полагая, что мы никогда ничего не можем предсказать.
      undermining_learning: |
        Отказываться извлекать уроки, потому что "задним числом все умны" — мы все
        еще можем учиться на результатах.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Гиперболическое дисконтирование
    quick_introduction: |
      Гиперболическое дисконтирование — это склонность предпочитать меньшее, но более раннее вознаграждение большему, но более позднему, и дисконтировать будущее круче, чем предсказывают рациональные модели. Мы переоцениваем настоящее и недооцениваем будущее непоследовательными способами.
    one_liner: Мы предпочитаем меньшее, но более раннее, большему, но более позднему — и дисконтируем будущее непоследовательно.
    try_this:
      - Предварительное обязательство: принимайте решения для своего будущего "я", когда вы находитесь в спокойном состоянии.
      - Переформулируйте: Хотел бы я этого через 10 минут? Через 10 месяцев? — чтобы выявить непоследовательность.
      - Используйте устройства обязательств, чтобы связать свое будущее "я" лучшими решениями.
    ask_yourself:
      - Не переоцениваю ли я настоящее в ущерб своему будущему "я"?
      - Принял бы я это решение, если бы вознаграждение было отложено на день? Год?
    in_more_detail: |
      Мы можем предпочесть 50 долларов сегодня, а не 100 долларов через год, но также предпочесть 100 долларов через два года, а не 50 долларов через год — даже если это непоследовательно. Наша ставка дисконтирования не постоянна; она гиперболическая. Ближайшее будущее сильно дисконтируется; дальнее будущее дисконтируется менее круто. Это объясняет прокрастинацию, зависимость и недостаточное сбережение.

      "Предвзятость настоящего" — связанное понятие: мы придаем настоящему моменту непропорциональный вес. Гиперболическое дисконтирование объясняет, почему мы берем на себя обязательства, которые не выполняем, и почему долгосрочное планирование затруднительно.
    why_this_is_important: |
      Понимание гиперболического дисконтирования помогает вам разрабатывать лучшие стимулы, брать обязательства у своего будущего "я" и избегать ловушек краткосрочной выгоды. Это объясняет, почему мы прокрастинируем и почему мы боремся с долгосрочными целями.
    when_to_use:
      - принятие_решений
      - карьерные_шаги
      - инвестирование
      - лидерство
    how_can_you_spot_it:
      present_preference: |
        Выбор немедленного удовлетворения вместо отложенного, но большего вознаграждения.
      inconsistent_time_preferences: |
        Предпочтения, которые меняются по мере прохождения времени (например, мы хотим диетиться завтра, но едим сегодня).
      commitment_failures: |
        Составление планов, которым мы не следуем, когда будущее становится настоящим.
      procrastination: |
        Откладывание важных задач в пользу немедленного комфорта.
    examples:
      savings: |
        Выбор потратить сейчас, а не сберегать на пенсию — будущее кажется абстрактным.
      health: |
        Пропуск тренировки сегодня ради комфорта, несмотря на знание, что мы будем сожалеть об этом — сожаление о завтрашнем дне дисконтируется.
      addiction: |
        Выбор немедленного подъема вместо долгосрочного здоровья.
      deadlines: |
        Ничегонеделание до тех пор, пока не придет крайний срок — тогда "настоящее" включает в себя крайний срок, и мы действуем.
    real_world_implications: |
      Гиперболическое дисконтирование влияет на сбережения, здоровье, образование и зависимости. Оно объясняет многие сбои самоконтроля. Устройства обязательств (например, автоматические сбережения, подотчетность) могут помочь, ограничивая будущие выборы.
    professional_application:
      networking_and_relationship_building: |
        При запросе будущих обязательств создавайте подотчетность, которая делает будущее "настоящим" (например, проверки, крайние сроки). Не предполагайте, что люди будут выполнять обещания без структуры.
      collaborative_learning_initiative: |
        Используйте устройства обязательств: публичные обязательства, предварительное обязательство по срокам и структуры, которые делают долгосрочные цели более ощутимыми. Разбивайте длительные проекты на более короткие этапы.
    how_can_this_be_misapplied:
      excessive_control: |
        Чрезмерное ограничение выбора людей под предлогом "помощи" их будущему "я".
      paternalism: |
        Предположение, что мы знаем, что лучше для долгосрочных интересов других.
      ignoring_present_needs: |
        Игнорирование законных настоящих потребностей в пользу абстрактных будущих выгод.
      one_size_fits_all: |
        Люди различаются по ставкам дисконтирования; не всем нужны одинаковые устройства обязательств.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Иллюзия контроля
    quick_introduction: |
      Иллюзия контроля — это тенденция переоценивать свою способность
      влиять на результаты. Мы верим, что имеем больше контроля, чем на самом деле, над
      случайными событиями, другими людьми и сложными системами. Мы путаем корреляцию
      с причинно-следственной связью, а действие — с результатом.
    one_liner: Мы переоцениваем свою способность влиять на результаты, особенно случайные.
    try_this:
      - Спросите: Что произойдет, если я ничего не буду делать? Действительно ли мое действие вызывает результат?
      - Отличайте то, что вы можете контролировать, от того, что не можете.
      - Замечайте, когда вы суеверно связываете свои действия со случайными результатами.
    ask_yourself:
      - Путаю ли я корреляцию с причинно-следственной связью?
      - Изменился бы результат, если бы я не действовал?
    in_more_detail: |
      Люди чувствуют себя увереннее, когда выигрывают в лотерею, если сами выбирают
      свои номера — даже если это не меняет шансов. Мы бросаем кости сильнее, когда
      хотим получить высокие числа. Мы думаем, что наши ритуалы или поведение влияют на
      результаты, которые на самом деле случайны или определяются факторами, находящимися
      за пределами нашего контроля. Иллюзия успокаивает; она снижает тревогу. Но она
      может привести к чрезмерной уверенности и плохим решениям.

      Иллюзия сильнее, когда мы вовлечены в процесс, когда
      мы добиваемся раннего успеха и когда задача знакома. Она влияет на
      инвестирование, управление и повседневную жизнь.
    why_this_is_important: |
      Признание иллюзии контроля помогает вам правильно оценивать свои
      ожидания, избегать чрезмерной уверенности и направлять усилия туда, где они
      действительно имеют значение. Это также объясняет, почему мы упорствуем в суеверных
      поведениях и переоцениваем свое влияние.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - инвестирование
      - лидерство
    how_can_you_spot_it:
      overestimated_influence: |
        Представление, что наши действия влияют на результаты, когда это не так.
      ritual_superstition: |
        Поведение, которое, как мы думаем, влияет на результаты (счастливая рубашка, предматчевая
        рутина), когда это не так.
      choice_illusion: |
        Ощущение, что выбор дает нам контроль, когда выбор
        не влияет на результат.
      action_bias: |
        Предпочтение "что-то делать" вместо "ждать", даже когда действие
        не помогает.
    examples:
      gambling: |
        Выбор лотерейных номеров кажется более контролируемым, чем
        случайный выбор — шансы одинаковы.
      investing: |
        Активные трейдеры переоценивают свою способность обыграть
        рынок; большинство показывает худшие результаты после учета затрат.
      management: |
        Руководители переоценивают свое влияние на организационные
        результаты; многие факторы находятся вне их контроля.
      sports: |
        Болельщики считают, что их крики влияют на игру; игроки
        имеют "счастливые" ритуалы.
    real_world_implications: |
      Иллюзия контроля влияет на принятие риска, упорство
      в тщетных попытках и приписывание результатов. Она может
      мотивировать к действию (иногда полезному), но также приводить к
      потерянному времени и чрезмерной уверенности. Правильная оценка улучшает
      качество решений.
    professional_application:
      networking_and_relationship_building: |
        Осознавайте, что вы можете и чего не можете контролировать. Направляйте энергию
        на факторы, на которые можно повлиять. Не присваивайте себе заслуги за
        результаты, которые вы не вызвали, и не вините себя за те, которые вы
        не смогли предотвратить.
      collaborative_learning_initiative: |
        При планировании отличайте контролируемые от неконтролируемых
        факторов. Избегайте ложной уверенности от ранних побед. Используйте
        вероятностное мышление для калибровки ожиданий.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Чрезмерная коррекция, приводящая к убеждению, что у нас нет контроля, когда мы
        имеем значительное влияние.
      dismissing_agency: |
        "Все зависит от удачи", когда в
        многих областях важны навыки и усилия.
      false_fatalism: |
        Использование иллюзии контроля для оправдания бездействия.
      one_size_fits_all: |
        Контроль варьируется в зависимости от области; некоторые ситуации
        более контролируемы, чем другие.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Предвзятость воздействия
    quick_introduction: |
      Предвзятость воздействия — это тенденция переоценивать интенсивность и продолжительность
      наших эмоциональных реакций на будущие события. Мы думаем, что хорошие события сделают
      нас счастливее, чем они есть на самом деле, а плохие события сделают нас более несчастными,
      чем они есть на самом деле. Мы плохо прогнозируем чувства.
    one_liner: Мы переоцениваем, насколько события повлияют на наше счастье — и как долго.
    try_this:
      - Спросите: как я себя чувствовал после похожих прошлых событий? Мы адаптируемся быстрее, чем ожидаем.
      - Не позволяйте ожидаемому воздействию влиять на решения — мы плохо прогнозируем чувства.
      - Замечайте, когда вы переоцениваете длительное воздействие одного результата.
    ask_yourself:
      - Переоцениваю ли я, как долго я буду чувствовать себя так?
      - Что говорит прошлый опыт о похожих событиях?
    in_more_detail: |
      Даниэль Гилберт и Тимоти Уилсон исследуют прогнозирование чувств: мы
      переоцениваем, как долго мы будем чувствовать себя хорошо после выигрыша или плохо после проигрыша.
      Мы адаптируемся быстрее, чем ожидаем. Мы также переоцениваем воздействие
      отдельных событий — мы думаем, что один результат определит наше счастье, когда
      многие факторы способствуют этому. Мы фокусируемся не на тех вещах, предсказывая
      наши будущие чувства.

      Предвзятость воздействия влияет на основные жизненные решения: мы переоцениваем, насколько
      повышение, отношения или покупка изменят наше счастье. Мы
      также переоцениваем длительную боль от потерь.
    why_this_is_important: |
      Распознавание предвзятости воздействия помогает принимать лучшие решения о том,
      что действительно улучшит вашу жизнь. Это снижает чрезмерные инвестиции в результаты,
      которые не будут иметь такого значения, как вы думаете, и снижает страх перед результатами,
      которые не причинят столько вреда, сколько вы ожидаете.
    when_to_use:
      - принятие_решений
      - карьерные_шаги
      - оценка_рисков
      - построение_отношений
    how_can_you_spot_it:
      overestimated_impact: |
        «Это все изменит», когда похожие прошлые события имели скромное
        долгосрочное воздействие.
      duration_overestimation: |
        «Я никогда не отойду от этого», когда мы обычно адаптируемся быстрее, чем
        ожидаем.
      focalism: |
        Фокусирование на одном событии и игнорирование других факторов, влияющих
        на благополучие.
      adaptation_neglect: |
        Забывание, что мы адаптируемся как к хорошим, так и к плохим обстоятельствам.
    examples:
      career: |
        «Если я получу это повышение, я буду намного счастливее», когда прошлые
        повышения имели временное воздействие.
      purchases: |
        «Эта машина сделает меня счастливым», когда новизна быстро проходит.
      loss: |
        «Я никогда не оправлюсь от этого отказа», когда мы обычно
        адаптируемся в течение нескольких месяцев.
      events: |
        Переоценка того, насколько свадьба, отпуск или важное событие повлияют
        на долгосрочное счастье.
    real_world_implications: |
      Предвзятость воздействия приводит к плохим решениям в отношении денег, карьеры и
      отношений. Мы переплачиваем за впечатления, к которым адаптируемся, и
      чрезмерно боимся потерь, от которых восстановимся. Это влияет на политику и
      личное планирование.
    professional_application:
      networking_and_relationship_building: |
        Принимая карьерные или личные решения, подумайте, как вы
        чувствовали себя после похожих прошлых событий. Сохранялось ли воздействие так долго,
        как вы ожидали? Используйте это для калибровки будущих прогнозов.
      collaborative_learning_initiative: |
        Когда команды сталкиваются с неудачами или успехами, напомните им об адаптации.
        «Мы адаптируемся быстрее, чем думаем», может уменьшить как чрезмерное
        празднование, так и чрезмерное отчаяние.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Некоторые события имеют длительное воздействие — травмы, крупные потери. Не
        отвергайте все прогнозирование чувств как предвзятое.
      cold_rationality: |
        «Это не будет иметь значения», когда переживание в данный момент действительно имеет значение.
      undervaluing_experiences: |
        Избегание позитивных впечатлений, потому что «мы все равно адаптируемся».
      invalidating_emotions: |
        Говорить людям, что их чувства пройдут, когда им нужна поддержка
        в данный момент.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Предвзятость к своей группе
    quick_introduction: |
      Предвзятость к своей группе — это тенденция отдавать предпочтение людям, которых мы воспринимаем как принадлежащих к нашей группе, перед теми, кого мы воспринимаем как чужаков. Мы приписываем положительные качества членам своей группы и отрицательные качества членам чужих групп, часто на основе минимальных или произвольных различий.
    one_liner: Мы отдаем предпочтение своей группе и судим чужие группы более строго — часто произвольно.
    try_this:
      - Спросите: Осудил бы я этого человека так же, если бы он был в моей группе?
      - Активно ищите точки зрения чужих групп при принятии решений.
      - Замечайте, когда границы группы влияют на ваше суждение.
    ask_yourself:
      - Отдаю ли я кому-то предпочтение, потому что он «один из нас»?
      - Применил бы я те же стандарты к члену чужой группы?
    in_more_detail: |
      Даже когда группы назначаются случайным образом (например, подбрасыванием монеты), люди быстро развивают предпочтение к своей группе. Мы больше доверяем членам своей группы, выделяем им ресурсы более щедро и более снисходительно оцениваем их действия. К членам чужих групп применяется противоположное отношение.

      Предвзятость к своей группе подпитывает трайбализм, дискриминацию и конфликты. Она влияет на наем, продвижение по службе, сотрудничество и политику. Она может основываться на расе, национальности, компании, команде или любой общей идентичности.
    why_this_is_important: |
      Осознание предвзятости к своей группе помогает принимать более справедливые решения, создавать более инклюзивные команды и избегать фаворитизма. Это также объясняет, почему инициативы по разнообразию сталкиваются с сопротивлением — предпочтение своей группы является автоматическим.
    when_to_use:
      - руководство
      - принятие_решений
      - построение_отношений
      - разрешение_конфликтов
    how_can_you_spot_it:
      preferential_treatment: |
        Предоставление "нам" презумпции невиновности, а "им" — нет.
      resource_allocation: |
        Выделение большего членам своей группы, когда члены чужих групп имеют равную или большую потребность.
      attribution_asymmetry: |
        Успех своей группы = навык; успех чужой группы = удача. Неудача своей группы = обстоятельства; неудача чужой группы = характер.
      minimal_group_effects: |
        Фаворитизм проявляется даже при произвольных назначениях в группы.
    examples:
      hiring: |
        Предпочтение кандидатов, которые учились в вашем университете или имеют схожий с вами опыт.
      performance_reviews: |
        Более благоприятная оценка членов своей группы по сравнению с членами чужих групп с аналогичными результатами.
      collaboration: |
        Доверие и включение "нашей команды" при исключении или сомнении в "их команде".
      politics: |
        Отвержение аргументов чужой группы при безоговорочном принятии аргументов своей группы.
    real_world_implications: |
      Предвзятость к своей группе увековечивает неравенство, подрывает меритократию и разжигает конфликты. Она влияет на найм, продвижение по службе, инвестиции и политику. Уменьшение этого требует сознательных усилий — само по себе оно не исчезнет.
    professional_application:
      networking_and_relationship_building: |
        Активно включайте людей за пределами вашего ближайшего круга. Ищите разнообразные точки зрения. Задавайтесь вопросом, отдаете ли вы кому-то предпочтение, потому что он "похож на вас".
      collaborative_learning_initiative: |
        Используйте структурированные процессы (слепые рецензии, разнообразные панели) для снижения предвзятости к своей группе при найме и оценке. Создавайте межгрупповые проекты для формирования общей идентичности.
    how_can_this_be_misapplied:
      forced_diversity: |
        Внедрение квот или политик, которые вызывают недовольство, не устраняя основную предвзятость.
      out_group_hostility: |
        Рассмотрение предвзятости к своей группе как единственной проблемы, когда существует и враждебность к чужой группе.
      ignoring_legitimate_differences: |
        Не все групповые различия являются предвзятостью — иногда группы имеют разные характеристики. Не предполагайте, что все различия являются дискриминацией.
      reverse_discrimination: |
        Чрезмерная коррекция в пользу чужих групп таким образом, что это несправедливо по отношению к членам своей группы.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Инверсия
    quick_introduction: |
      Инверсия — это техника решения проблем, которая переворачивает вопрос с ног на голову. Вместо
      того, чтобы спрашивать "Как мне добиться успеха?", вы спрашиваете "Что может привести меня к провалу?" и избегаете этих вещей.
      Это выявляет риски и антипаттерны, которые часто упускает прямое мышление.
    one_liner: Инвертируйте — спросите, что приведет к провалу, а затем избегайте этого.
    try_this:
      - Для любой цели перечислите основные способы, которыми вы можете потерпеть неудачу, а затем избегайте их.
      - Используйте негативную визуализацию: что может пойти не так?
      - Спросите: что сделает умный человек, чтобы всё испортить?
    ask_yourself:
      - Думал ли я о том, что может привести к провалу?
      - Что я упускаю, думая только вперед?
    in_more_detail: |
      Популяризированная Чарли Мангером и укорененная в математической логике, инверсия использует
      тот факт, что избегать неудач часто легче, чем добиваться успеха. Если вы можете
      определить основные причины неудач, вы можете систематически их устранять.

      Карл Якоби, как сообщается, сказал: «Инвертируйте, всегда инвертируйте». Стоики использовали негативную
      визуализацию — представление потери — чтобы ценить то, что они имели, и готовиться к невзгодам.
      Инверсия — это не пессимизм; это структурированный способ добиваться прогресса путем устранения
      препятствий.
    why_this_is_important: |
      Инверсия помогает избежать катастрофических ошибок, протестировать планы и найти
      неочевидные решения. Она дополняет прямое планирование, гарантируя, что вы не
      упустите критические сценарии провала.
    when_to_use:
      - решение_задач
      - принятие_решений
      - оценка_рисков
      - карьерные_шаги
    how_can_you_spot_it:
      premortem_thinking: |
        Перед проектом спросите «Почему это провалилось?», как будто это уже случилось.
      anti_goals: |
        Четко определите, чего вы хотите избежать, так же, как и того, чего хотите достичь.
      reverse_engineering_failure: |
        Изучайте неудачные случаи, чтобы извлечь уроки, а не только изучайте успехи.
      constraint_focus: |
        Определите ограничения и узкие места перед оптимизацией для получения выгоды.
    examples:
      investing: |
        Вместо «Что заставит эту акцию подорожать?» спросите «Что заставит меня потерять деньги?»
        и избегайте этих сценариев.
      career: |
        «Что может разрушить мою репутацию?» приводит к списку поведений, которых следует избегать.
      product_launch: |
        «Почему большинство запусков продуктов терпят неудачу?» выявляет риски, которые необходимо устранить до запуска.
      health: |
        «Какие привычки сокращают продолжительность жизни?» дает более четкий список того, чего следует избегать, чем «Что делает
        меня здоровым?»
    real_world_implications: |
      Инверсия используется в инженерии (анализ видов и последствий отказов), инвестировании и стратегии.
      Она снижает излишнюю самоуверенность и улучшает управление рисками. Чрезмерное увлечение может привести к
      излишней осторожности.
    professional_application:
      networking_and_relationship_building: |
        «Что может навредить этим отношениям?» помогает избежать разрушающего доверие поведения.
      collaborative_learning_initiative: |
        Проводите премортем-анализ проектов: «Это провалилось. Почему?» Используйте ответы, чтобы улучшить
        планирование и исполнение.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Чрезмерное сосредоточение только на избегании неудач может парализовать действия и предотвратить необходимое
        принятие риска.
      negativity_bias: |
        Инверсия может усилить предвзятость к негативу, если не сбалансирована с выявлением возможностей, ориентированным на будущее.
      analysis_paralysis: |
        Тратить столько времени на сценарии провала, что вы никогда не переходите к действию.
      missing_upside: |
        Инверсия не говорит вам, что делать — только чего избегать. Вам по-прежнему нужны
        позитивные цели.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Закон убывающей отдачи
    quick_introduction: |
      Закон убывающей отдачи гласит, что по мере добавления одного ресурса при
      постоянстве других, дополнительная отдача от каждой новой единицы ресурса
      в конечном итоге уменьшается. Больше — не всегда лучше: есть точка, после
      которой дополнительные усилия приносят все меньше и меньше.
    one_liner: Больше вложений в конечном итоге приносят меньше отдачи — существует оптимальная точка.
    try_this:
      - Ask: Не прошёл ли я точку, после которой дополнительные усилия не дают значимой отдачи?
      - Prioritize the highest-leverage inputs; stop when marginal returns drop. (Приоритезируйте самые эффективные вложения; останавливайтесь, когда предельная отдача падает.)
      - Notice when you're over-investing in something that's already paid off. (Замечайте, когда вы чрезмерно вкладываетесь во что-то, что уже принесло плоды.)
    ask_yourself:
      - What would I gain from one more unit of effort here? (Что я получу от еще одной единицы усилий здесь?)
      - Am I optimizing past the point of diminishing returns? (Оптимизирую ли я после точки убывающей отдачи?)
    in_more_detail: |
      В экономике добавление большего числа рабочих на фиксированный участок земли
      в конечном итоге дает меньший прирост. В личной продуктивности первый час
      обучения может принести больше пользы, чем десятый. Этот принцип применим
      к ресурсам, усилиям, времени и функциям. Существует оптимальная точка;
      за ее пределами предельная отдача снижается и может даже стать отрицательной.

      Понимание убывающей отдачи помогает эффективно распределять ресурсы и
      избегать чрезмерных вложений в области, которые уже принесли большую часть
      своей ценности.
    why_this_is_important: |
      Понимание убывающей отдачи предотвращает чрезмерные вложения, помогает
      расставлять приоритеты и знать, когда остановиться. Это важно для распределения
      ресурсов и избегания перфекционизма.
    when_to_use:
      - принятие_решений
      - решение_проблем
      - инвестирование
      - карьерные_шаги
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Каждая дополнительная единица усилий или ресурсов дает меньше отдачи, чем
        предыдущая.
      perfectionism_trap: |
        Стремление к последним 10% качества требует непропорциональных усилий.
      overinvestment: |
        Продолжение добавления ресурсов, когда предельная отдача низкая или
        отрицательная.
      optimal_point_passed: |
        Вы прошли точку, после которой больше вложений улучшает результаты.
    examples:
      studying: |
        Первые 2 часа подготовки к экзамену дают больше, чем часы 7–8; существует
        точка убывающей отдачи.
      product_features: |
        Добавление новых функций в приложение может сбить с толку пользователей;
        20-я функция приносит меньше пользы, чем 5-я.
      hiring: |
        Добавление большего числа людей в проект может его замедлить (Закон
        Брукса) после определенной точки.
      marketing: |
        Удвоение расходов на рекламу не удваивает результаты; отдача уменьшается
        по мере насыщения рынка.
    real_world_implications: |
      Закон убывающей отдачи направляет экономическую политику, бизнес-стратегию
      и личную продуктивность. Игнорирование его ведет к напрасной трате ресурсов
      и субоптимальным результатам. Он поддерживает принцип Парето и фокусировку.
    professional_application:
      networking_and_relationship_building: |
        Вложения в несколько глубоких отношений могут принести больше пользы, чем
        распыление усилий на множество. Осознавайте, когда дополнительный нетворкинг
        имеет убывающую отдачу.
      collaborative_learning_initiative: |
        Больше часов обучения не всегда означают лучшие результаты. Найдите оптимальную
        дозу и избегайте перегрузки.
    how_can_this_be_misapplied:
      premature_optimization: |
        Слишком раннее прекращение работы до достижения приемлемого уровня качества.
      undershooting: |
        Использование убывающей отдачи как оправдания недостаточных усилий.
      misidentifying_the_curve: |
        Предположение об убывающей отдаче, когда вы фактически находитесь на другой
        части кривой (например, на ранней экспоненциальной фазе).
      one_size_fits_all: |
        Применение одной и той же "оптимальной точки" в разных контекстах, где
        кривые отличаются.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Неприятие потерь
    quick_introduction: |
      Неприятие потерь — это тенденция избегать потерь сильнее, чем приобретать эквивалентные выгоды.
      Люди испытывают боль от потери примерно в два раза сильнее, чем удовольствие от приобретения.
    one_liner: Потери ощущаются примерно в два раза болезненнее, чем эквивалентные выгоды кажутся приятными.
    try_this:
      - "Спросите себя: не переоцениваю ли я то, что потеряю, по сравнению с тем, что приобрету?"
      - Переформулируйте выбор как приобретение, а не потери, и посмотрите, изменится ли ваше мнение.
      - Обратите внимание, когда страх потери движет решением сильнее, чем реальная выгода.
    ask_yourself:
      - Что бы я выбрал, если бы начинал с нуля?
      - Я держусь из-за того, что потеряю, или потому, что будущее действительно лучше?
    in_more_detail: |
      Разработанное Даниэлем Канеманом и Амосом Тверски, неприятие потерь описывает, как потери и приобретения
      воспринимаются асимметрично. Психологическое воздействие потери 100 долларов обычно намного
      больше, чем удовлетворение от получения 100 долларов. Этот уклон влияет на решения в
      финансах, переговорах и повседневных выборах, часто приводя к рискованному поведению
      при наличии явных потенциальных потерь.
    why_this_is_important: |
      Понимание неприятия потерь помогает распознать, когда страх потери движет решениями
      больше, чем рациональный анализ. Это объясняет, почему люди держатся за убыточные инвестиции, избегают
      необходимых изменений и принимают неоптимальные решения в переговорах и карьерном выборе.
    when_to_use:
      - принятие_решений
      - инвестирование
      - карьерные_шаги
      - оценка_рисков
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Обратите внимание, когда перспектива потери чего-либо вызывает непропорциональную тревогу
        или сопротивление по сравнению с выгодой от потенциального приобретения.
      reluctance_to_change: |
        Нерешительность в смене стратегии, уходе с работы или продаже актива, даже когда
        объективный анализ предполагает, что это лучший вариант.
      framing_sensitivity: |
        Решения резко меняются в зависимости от того, как представлены варианты — как приобретения
        или потери, даже если исходы эквивалентны.
      overvaluing_what_you_have: |
        Эффект владения — придание более высокой ценности вещам, которыми вы владеете, просто потому,
        что вы ими владеете — часто сопровождает неприятие потерь.
    examples:
      investing: |
        Удержание падающей акции, чтобы "избежать фиксации убытка", упуская
        лучшие инвестиционные возможности в другом месте.
      career: |
        Оставаться на неудовлетворяющей работе, потому что уход ощущается как потеря безопасности,
        даже когда новая возможность предлагает больший рост.
      negotiations: |
        Отказ от справедливого предложения, потому что оно представлено как "отказ" от чего-то,
        а не "приобретение" соглашения.
      product_design: |
        Бесплатные пробные версии, которые конвертируются в платные — пользователи ощущают "потерю" сервиса
        по окончании пробного периода, что мотивирует подписку сильнее, чем "приобретение"
        нового сервиса.
    real_world_implications: |
      Неприятие потерь формирует рынки, политику и поведение отдельных лиц. Оно объясняет,
      почему страхование и гарантии хорошо продаются, почему люди избегают выгодных изменений
      и почему негативные новости оказывают непропорциональное влияние. Осознание этого может улучшить
      качество принятия решений и уменьшить сожаление о сделанном выборе.
    professional_application:
      networking_and_relationship_building: |
        Помните, что люди могут сопротивляться прекращению непродуктивных отношений или
        сотрудничества из-за неприятия потерь — они боятся "потерять" связь.
        Представляйте новые возможности как приобретения, а не потери, чтобы снизить сопротивление.
      collaborative_learning_initiative: |
        При внедрении новых процессов или инструментов подчеркивайте, что команда приобретает,
        а не от чего она "отказывается". Инициативы по изменению, представленные в виде потерь,
        часто вызывают более сильное сопротивление.
    how_can_this_be_misapplied:
      manipulation: |
        Эксплуатация неприятия потерь для давления на принятие решений — например, "ограниченные по времени предложения"
        или формулировки "не упустите", которые вызывают страх потери, а не
        реальную оценку ценности.
      misinterpreting_relationships: |
        Предположение, что сопротивление человека изменениям является чисто рациональным, когда оно может
        быть обусловлено неприятием потерь. Неправильное приписывание мотивов может подорвать доверие.
      overcommitment: |
        Ошибка невозвратных затрат — продолжение инвестирования в провальный проект, потому что
        "мы уже вложили так много", вместо того чтобы сокращать убытки.
      missed_opportunities_for_conflict_resolution: |
        Отказ от компромисса, потому что любая уступка ощущается как потеря,
        даже когда альтернативой является худший исход для всех.
      vulnerability_to_exploitation: |
        Манипуляции со стороны других, которые формулируют выборы таким образом, чтобы вызвать неприятие потерь,
        например, торговые тактики, подчеркивающие, что вы "потеряете", если не примете меры.
      reinforcing_negative_perceptions: |
        Чрезмерное сосредоточение на потенциальных недостатках может создать пессимистичный
        взгляд, который становится самоисполняющимся, упуская возможности для роста.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: Карта — это не территория
    quick_introduction: |
      "Карта — это не территория" означает, что представление реальности не является самой реальностью.
      Модели, теории и описания являются полезными упрощениями, но они
      всегда что-то упускают. Смешивание карты с территорией приводит к ошибкам.
    one_liner: Карта — это не территория; все модели ошибочны, но некоторые полезны.
    try_this:
      - Когда модель не соответствует реальности, обновите карту — не заставляйте реальность ей соответствовать.
      - Спросите: Что упускает эта модель? Когда она может перестать работать?
      - Относитесь к моделям как к инструментам, а не как к истине.
    ask_yourself:
      - Не путаю ли я свою модель с реальностью?
      - Изменилась ли территория с тех пор, как я в последний раз смотрел?
    in_more_detail: |
      Альфред Коржибский ввел эту идею в общей семантике. Карта города
      полезна для навигации, но это не сам город — она упускает детали, устаревает и
      никогда не может охватить все. То же самое относится к ментальным моделям, научным
      теориям и организационным схемам.

      Все модели ошибочны; некоторые полезны. Опасность заключается в том, чтобы относиться к модели так, как будто она является полной истиной, особенно когда территория изменилась. Хорошее мышление
      требует обновления карт, когда реальность не соответствует им.
    why_this_is_important: |
      Осознание того, что карты отличаются от территории, предотвращает излишнюю уверенность в моделях,
      поощряет обновление убеждений и снижает риск действий на основе устаревшей или
      упрощенной информации.
    when_to_use:
      - принятие_решений
      - решение_задач
      - обучение
      - оценка_рисков
    how_can_you_spot_it:
      model_reality_confusion: |
        Отношение к концепции или теории как к полному описанию реальности.
      outdated_assumptions: |
        Действия на основе информации или моделей, которые больше не соответствуют текущим условиям.
      oversimplification: |
        Игнорирование нюансов, потому что "карта" их не включает.
      map_worship: |
        Защита модели, когда доказательства ей противоречат, вместо того чтобы ее обновлять.
    examples:
      organizational_charts: |
        Предположение, что структура подчинения отражает фактическое выполнение работы.
      financial_models: |
        Отношение к прогнозу в электронной таблице как к предсказанию, а не как к сценарию.
      stereotypes: |
        Применение обобщений на уровне группы к отдельным людям.
      strategy_docs: |
        Выполнение плана в соответствии с текстом, когда рынок изменился.
    real_world_implications: |
      Различие между картой и территорией является фундаментальным для науки, инженерии и
      философии. Оно лежит в основе байесовского обновления, гибкой методологии и эпистемологической
      скромности. Игнорирование этого приводит к ригидному мышлению и провальным стратегиям.
    professional_application:
      networking_and_relationship_building: |
        Ваша ментальная модель человека может быть устаревшей. Обновите ее посредством прямого
        взаимодействия, а не полагаясь на старые впечатления.
      collaborative_learning_initiative: |
        Поощряйте команды относиться к планам и моделям как к гипотезам, которые следует проверять и
        пересматривать, а не как к фиксированным истинам.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Приход к выводу, что ни одна карта не полезна и все знания подозрительны.
      constant_revision: |
        Слишком частые пересмотры, в результате чего не формируется стабильного понимания.
      dismissing_models: |
        Отказ от полезных упрощений, потому что они "не являются территорией".
      relativism: |
        Утверждение, что все карты одинаково действительны, когда некоторые явно лучше соответствуют территории.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Эффект простого знакомства
    quick_introduction: |
      Эффект простого знакомства — это тенденция развивать предпочтение к чему-либо
      просто потому, что мы с этим знакомы. Повторное воздействие — даже без
      подкрепления — увеличивает симпатию. Мы склонны предпочитать то, что знаем.
    one_liner: Знакомство порождает симпатию — мы предпочитаем то, что видели раньше.
    try_this:
      - Спросите: Нравится ли мне это, потому что это хорошо, или потому что я с этим знаком?
      - При оценке вариантов корректируйте с учетом знакомства — новые вещи начинают с недостатком.
      - Обратите внимание, когда повторение влияет на ваши предпочтения.
    ask_yourself:
      - Предпочитаю ли я что-то в основном потому, что я уже это видел?
      - Выбрал бы я иначе, если бы знакомство было равным?
    in_more_detail: |
      Роберт Зайонц показал, что повторное воздействие стимулов (лиц, слов, форм)
      увеличивает положительное отношение к ним — даже когда мы сознательно
      не осознаем воздействия. Знакомство порождает симпатию, а не презрение (во многих
      случаях). Эффект сильнее, когда мы не анализируем и когда воздействие
      тонкое.

      Эффект простого знакомства влияет на предпочтение брендов, межличностную
      привлекательность и эстетическую оценку. Он объясняет, почему мы предпочитаем знакомую
      музыку, почему реклама работает через повторение, и почему мы можем предпочитать
      людей, которых мы видели раньше — даже без взаимодействия.
    why_this_is_important: |
      Распознавание эффекта простого знакомства помогает понять собственные
      предпочтения и сопротивляться манипуляциям через повторение. Это также
      объясняет, почему видимость и присутствие имеют значение для отношений и
      брендов. Знакомство — это мощное, но часто неосознанное влияние.
    when_to_use:
      - построение_отношений
      - принятие_решений
      - лидерство
      - обучение
    how_can_you_spot_it:
      familiarity_preference: |
        Предпочтение знакомых вариантов новым.
      repetition_influence: |
        Повторное воздействие увеличивает симпатию без явного убеждения.
      unconscious_influence: |
        Эффект работает даже тогда, когда мы не осознаем воздействия.
      brand_recognition: |
        Знакомые бренды предпочитаются, даже когда мы не можем объяснить почему.
    examples:
      advertising: |
        Повторное воздействие бренда увеличивает его предпочтение — даже без
        убедительных сообщений.
      music: |
        Песни, которые мы слышали раньше, обычно нравятся больше, чем новые
        при первом прослушивании.
      people: |
        Мы склонны больше любить людей, которых мы видели неоднократно (например, одноклассников,
        коллег), чем незнакомцев — даже без взаимодействия.
      ideas: |
        Идеи, с которыми мы сталкивались раньше, кажутся нам более комфортными и
        правдоподобными, чем новые.
    real_world_implications: |
      Эффект простого знакомства формирует потребительское поведение, политические
      предпочтения и социальную привлекательность. Он используется в маркетинге
      и может создавать несправедливые преимущества для знакомого. Он также
      объясняет, почему разнообразие впечатлений имеет значение — знакомство
      с отличиями уменьшает предвзятость.
    professional_application:
      networking_and_relationship_building: |
        Видимость важна. Появление, присутствие и
        бытие на виду создает знакомство, которое укрепляет симпатию. Не
        недооценивайте ценность повторных низкорисковых контактов.
      collaborative_learning_initiative: |
        Знакомьте людей с разнообразными точками зрения и людьми неоднократно —
        знакомство может уменьшить предвзятость. Но помните, что простое знакомство
        также может укрепить предпочтение к статус-кво.
    how_can_this_be_misapplied:
      manipulation: |
        Сознательное создание повторного воздействия для манипулирования
        предпочтениями без согласия.
      false_familiarity: |
        Предположение, что знакомство равно качеству — иногда новые
        варианты лучше.
      exclusion: |
        Если доступ к видимости имеют только определенные люди, они получают несправедливое
        преимущество. Подумайте, кто имеет доступ к видимости.
      stagnation: |
        Чрезмерная опора на знакомство и никогда не попытка попробовать новое.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Нарративный фаллейси (Ошибка повествования)
    quick_introduction: |
      Ошибка повествования — это тенденция строить истории из прошлых событий,
      которые делают их более связными, предсказуемыми и значимыми, чем они были на самом деле.
      Мы ретроспективно находим объяснения случайности. Мы превращаем хаос истории
      в стройную историю — а затем верим, что эта история была неизбежна.
    one_liner: Мы находим стройные объяснения в случайности — а затем верим, что они были неизбежны.
    try_this:
      - Задайте вопрос: Какая часть этой истории — ретроспективный взгляд? Какую роль сыграла удача?
      - Будьте скептичны к стройным объяснениям — прошлое было более хаотичным, чем наши истории.
      - Замечайте, когда "логично" означает "было предсказуемо".
    ask_yourself:
      - Составляю ли я историю, которая делает прошлое более неизбежным, чем оно было?
      - Предсказал бы я это до того, как это произошло?
    in_more_detail: |
      Нассим Талеб популяризировал этот термин. Мы жаждем нарратива — причинно-следственных связей,
      героев и злодеев, четких арок. Поэтому мы строим истории, которые связывают
      события ретроспективно. История кажется правдивой, потому что она связна — но
      связность не означает, что она верна. Мы путаем "логично" с
      "было предсказуемо". Мы недооцениваем роль удачи и
      случайности.

      Ошибка повествования влияет на то, как мы учимся на истории, оцениваем
      успех и делаем прогнозы. Мы переоцениваем объяснительную силу
      историй и недооцениваем роль шанса.
    why_this_is_important: |
      Распознавание ошибки повествования помогает избежать излишнего обучения на
      прошлом и переоценки предсказуемости. Это способствует смирению
      относительно причинно-следственных связей и прогнозирования. Не все, что хорошо
      звучит в истории, является правдой или может быть обобщено.
    when_to_use:
      - принятие_решений
      - обучение
      - оценка_рисков
      - решение_проблем
    how_can_you_spot_it:
      hindsight_coherence: |
        Прошлые события объясняются стройной историей, которая
        не была очевидна в то время.
      cause_effect_overconfidence: |
        Мы приписываем четкие причины исходам, в которых было множество
        способствующих факторов.
      luck_minimization: |
        Успех и неудача объясняются навыками и стратегией,
        а не удачей.
      story_over_evidence: |
        Убедительный нарратив превалирует над статистическими доказательствами.
    examples:
      business_success: |
        "Они преуспели из-за X", когда было множество факторов и удача
        — мы выбираем историю, которая подходит.
      investing: |
        Объяснение движений рынка нарративами, которые кажутся
        удовлетворительными, но могут быть постфактум.
      history: |
        Исторические события рассказываются как неизбежные последовательности,
        когда они зависели от многих факторов.
      career: |
        "Я достиг этого, потому что сделал X", когда удача и время
        играли значительную роль.
    real_world_implications: |
      Ошибка повествования искажает обучение, излишнюю уверенность
      в прогнозах и приписывание успеха и неудачи.
      Она делает прошлое более предсказуемым, чем оно было,
      и будущее — более предсказуемым, чем оно есть.
    professional_application:
      networking_and_relationship_building: |
        Когда кто-то рассказывает историю своего успеха, помните, что
        это нарратив — связный и убедительный, но, возможно, упрощенный.
        Удача и скрытые факторы могут быть недооценены.
      collaborative_learning_initiative: |
        В ретроспективах отделяйте нарратив от доказательств.
        Спросите: "Что бы мы сказали в то время?" Используйте
        журналы принятия решений для фиксации неопределенности до
        того, как станут известны результаты.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Некоторые нарративы верны — не все является
        ошибкой повествования. Причинно-следственные связи существуют.
      excessive_skepticism: |
        Отказ учиться на прошлом, потому что "ошибка
        повествования". Мы все еще можем извлечь полезные уроки.
      false_randomness: |
        Предположение, что все случайно, когда некоторые исходы
        могут быть осмысленно приписаны.
      undermining_storytelling: |
        Истории имеют ценность для общения и смысла —
        ошибка заключается в вере, что они полны или
        предсказательны, а не в их существовании.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Негативный уклон
    quick_introduction: |
      Негативный уклон — это тенденция придавать больший вес негативной информации, чем
      позитивной. Плохие новости, критика и угрозы привлекают наше внимание и
      влияют на наши решения сильнее, чем эквивалентные позитивные стимулы.
    one_liner: Плохие новости весят больше, чем хорошие — мы запрограммированы на приоритизацию угроз.
    try_this:
      - Активно ищите и взвешивайте позитивные доказательства при оценке.
      - Замечайте, когда одна критика перевешивает множество комплиментов.
      - Спросите: не придаю ли я негативной информации больше веса, чем она заслуживает?
    ask_yourself:
      - Зацикливаюсь ли я на негативе и игнорирую позитив?
      - Чувствовал бы я себя иначе, если бы сосредоточился на хороших доказательствах?
    in_more_detail: |
      Эволюционно, пропуск угрозы мог быть фатальным, в то время как упущенная возможность
      обычно была выживаемой. Наш мозг запрограммирован на приоритизацию негативной информации.
      Один критический комментарий может перевесить множество комплиментов. Негативные события
      запоминаются более ярко и на более долгий срок.

      Этот уклон влияет на отношения, принятие решений и самочувствие. Мы зацикливаемся на
      неудачах, предвидим худшие сценарии и игнорируем позитивные доказательства. Понимание
      его помогает нам скорректировать его.
    why_this_is_important: |
      Распознавание негативного уклона помогает вам сбалансировать обратную связь, избежать чрезмерной реакции на
      критику и принимать более взвешенные решения. Это также объясняет, почему плохие новости
      доминируют и почему мы часто чувствуем себя хуже, чем оправданы обстоятельства.
    when_to_use:
      - принятие_решений
      - построение_отношений
      - лидерство
      - оценка_рисков
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Один негативный комментарий затмевает множество позитивных.
      threat_prioritization: |
        Потенциальные недостатки привлекают больше внимания, чем эквивалентные преимущества.
      vivid_negative_memories: |
        Негативные переживания вспоминаются легче и с большим количеством эмоций.
      discounting_positive_evidence: |
        Хорошие новости быстро забываются или объясняются.
    examples:
      performance_reviews: |
        Сотрудник зацикливается на одном критическом отзыве и игнорирует общую
        позитивную оценку.
      news_consumption: |
        Негативные заголовки доминируют во внимании и формируют мировоззрение, несмотря на позитивные
        тененции.
      relationships: |
        Одна ссора имеет больший вес, чем множество хороших моментов.
      investing: |
        Рыночные спады вызывают больше паники, чем эквивалентные подъемы вызывают эйфорию.
    real_world_implications: |
      Негативный уклон формирует медиа, политику и организационную культуру. Он
      способствует тревожности, конфликтам и неоптимальным решениям.
      Сознательное противодействие ему может улучшить самочувствие и суждения.
    professional_application:
      networking_and_relationship_building: |
        При предоставлении обратной связи помните, что негативные комментарии будут весить больше —
        сбалансируйте их и подчеркните рост. При получении обратной связи сознательно
        рассматривайте полную картину.
      collaborative_learning_initiative: |
        Создавайте культуру, которая явно противостоит негативному уклону: отмечайте победы,
        документируйте позитивные результаты и чередуйте пост-мортемы с "пре-мортемами"
        того, что пошло правильно.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Отрицание законных проблем путем настаивания на "позитивном мышлении".
      ignoring_real_threats: |
        Чрезмерная коррекция до степени недооценки реальных рисков.
      feedback_suppression: |
        Избегание необходимой критики, потому что "негатив — это плохо".
      invalidation: |
        Говорить кому-то, что его негативные чувства — "это просто негативный уклон",
        когда у них есть реальные причины для беспокойства.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Бритва Оккама
    quick_introduction: |
      Бритва Оккама (также Оккамская бритва) — это принцип, согласно которому среди конкурирующих гипотез следует предпочесть ту, которая содержит наименьшее количество предположений. Более простые объяснения зачастую, хотя и не всегда, оказываются верными.
    one_liner: Предпочитайте самое простое объяснение, соответствующее фактам.
    try_this:
      - Сравнивая теории, спросите: какая из них содержит меньше предположений?
      - Не усложняйте без доказательств, которые этого требуют.
      - Обратите внимание, когда вы предпочитаете витиеватое объяснение простому.
    ask_yourself:
      - Не вношу ли я ненужных усложнений?
      - Требует ли имеющаяся информация такого уровня объяснения?
    in_more_detail: |
      Принцип, названный в честь Уильяма Оккама, не утверждает, что простые объяснения всегда истинны. Он предполагает, что ненужные усложнения не следует вводить без доказательств. Если две теории объясняют одно и то же явление, предпочтительнее более простая до тех пор, пока факты не потребуют иного.

      Бритва Оккама — это эвристика, а не закон. Иногда правильное объяснение бывает сложным. Но она защищает от переобучения, конспирологического мышления и ненужных усложнений. Она отдает предпочтение лаконичности в объяснениях.
    why_this_is_important: |
      Применение бритвы Оккама улучшает решение проблем, снижает переобучение в моделях и помогает избежать запутанных, но неподтвержденных теорий. Это полезный инструмент по умолчанию, когда доказательства неоднозначны.
    when_to_use:
      - решение_проблем
      - принятие_решений
      - обучение
      - оценка_рисков
    how_can_you_spot_it:
      unnecessary_complexity: |
        Объяснение предполагает множество допущений, когда достаточно было бы меньшего количества.
      conspiracy_tendencies: |
        Сложные, многоагентные объяснения событий, имеющих более простые причины.
      overfitting: |
        Модель или теория, которая идеально объясняет прошлые данные, но не работает с новыми.
      elegance_in_explanation: |
        Лучшие объяснения часто кажутся "очевидными" постфактум.
    examples:
      debugging: |
        При возникновении ошибки сначала проверьте самые простые причины (например, опечатка, неправильная конфигурация), прежде чем предполагать проблемы с архитектурой.
      conspiracy_theories: |
        "Правительство организовало X" требует множества скрытых акторов; "несколько человек допустили ошибки" — более простое объяснение.
      product_failure: |
        Пользователи не используют функцию — самое простое объяснение: она не решает их проблему, а не то, что они запутаны интерфейсом.
      medical_diagnosis: |
        "Часто встречающееся встречается часто" — рассмотрите частые диагнозы перед редкими.
    real_world_implications: |
      Бритва Оккама направляет научные исследования, инженерию и повседневные рассуждения. Она сокращает напрасные усилия, затрачиваемые на сложные ошибочные теории. Неправильно примененная, она может отвергнуть действительно сложные явления.
    professional_application:
      networking_and_relationship_building: |
        Интерпретируя поведение других, отдавайте предпочтение простым объяснениям (они заняты, они забыли), прежде чем предполагать злонамеренность или сложные мотивы.
      collaborative_learning_initiative: |
        Во время сессий по решению проблем явно спросите: "Какое самое простое объяснение?", прежде чем строить сложные модели.
    how_can_this_be_misapplied:
      oversimplification: |
        Отвержение обоснованных сложных объяснений, потому что они "слишком сложны".
      status_quo_bias: |
        Использование бритвы Оккама для предпочтения привычных объяснений новым, но верным.
      scientific_rigidity: |
        Отказ от новых теорий, потому что они более сложны, даже когда доказательства их подтверждают.
      missing_nuance: |
        Некоторые области (например, человеческое поведение, экосистемы) по своей природе сложны; простота может вводить в заблуждение.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Эффект страуса
    quick_introduction: |
      Эффект страуса — это склонность избегать негативной финансовой информации,
      "зарывая голову в песок", как страус. Люди избегают смотреть на свои
      портфели, когда рынки падают, откладывают открытие счетов и игнорируют
      тревожные сигналы, которые могли бы помочь им действовать.
    one_liner: Избегание плохих новостей не меняет реальность — оно лишь задерживает вашу реакцию.
    try_this:
      - Планируйте регулярные проверки, чтобы не иметь возможности избегать цифр.
      - Замечайте, когда вы откладываете открытие чего-либо или просмотр чего-либо.
      - Задайте себе вопрос: чего я избегаю и что изменится, если я с этим столкнусь?
    ask_yourself:
      - Избегаю ли я информации, потому что она может быть плохой?
      - Помогло бы мне раннее осознание действовать лучше?
    in_more_detail: |
      Термин был введен в поведенческих финансах для описания инвесторов, которые
      избегают проверки своих инвестиций во время спадов на рынке. Такое поведение
      распространяется и за пределы финансов: избегание медицинских осмотров,
      игнорирование проблем в отношениях и откладывание трудных разговоров. Мы
      стремимся избежать тревоги от плохих новостей, но избегание часто усугубляет
      последствия, предотвращая своевременные действия.

      Эффект обусловлен неприятием потерь и желанием избежать эмоционального
      дискомфорта. К сожалению, незнание не меняет реальность — оно лишь задерживает
      нашу реакцию.
    why_this_is_important: |
      Осознание эффекта страуса помогает вам проактивно сталкиваться со сложной
      информацией. Избегание плохих новостей редко улучшает результаты; оно обычно
      усугубляет их. Своевременное осознание позволяет принимать лучшие решения.
    when_to_use:
      - принятие_решений
      - инвестирование
      - оценка_рисков
      - карьерные_шаги
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        Не просматривать отчеты по инвестициям, когда рынки падают.
      delaying_difficult_information: |
        Откладывать открытие счетов, результатов медицинских обследований или
        отзывов о производительности.
      information_avoidance: |
        Активно избегать источников, которые могут содержать плохие новости.
      procrastination_on_unpleasant_tasks: |
        Откладывать действия, которые выявили бы или решили проблемы.
    examples:
      investing: |
        Инвестор перестает проверять свой 401(k) во время медвежьего рынка,
        упуская возможности ребалансировки.
      health: |
        Избегать визита к врачу, несмотря на симптомы, из-за страха плохих новостей.
      finances: |
        Не открывать выписки по кредитным картам или оповещения банка, чтобы
        избежать столкновения с долгом.
      performance: |
        Менеджер избегает давать критические отзывы до ежегодного обзора, когда
        более раннее вмешательство помогло бы.
    real_world_implications: |
      Эффект страуса приводит к ухудшению финансовых результатов, задержке
      медицинского лечения и нерешенным проблемам в отношениях и на работе. Он
      усугубляет избегаемые потери. Системы, которые затрудняют игнорирование
      информации, могут помочь.
    professional_application:
      networking_and_relationship_building: |
        Не избегайте трудных разговоров. Решайте проблемы на ранней стадии,
        вместо того чтобы надеяться, что они разрешатся сами собой. Создайте
        регулярные проверки, которые выявляют проблемы до их эскалации.
      collaborative_learning_initiative: |
        Создавайте циклы обратной связи, которые затрудняют игнорирование проблем —
        информационные панели, регулярные обзоры и нормы, поощряющие раннее
        раскрытие плохих новостей.
    how_can_this_be_misapplied:
      information_overload: |
        Навязывать постоянный мониторинг, когда некоторое избегание информации
        полезно (например, не проверять акции каждую минуту).
      anxiety_amplification: |
        Создавать такой фокус на потенциальных проблемах, который усиливает
        тревогу, не улучшая результатов.
      blame_shifting: |
        Приписывать все избегание "эффекту страуса", когда некоторое избегание
        рационально (например, игнорирование шума).
      micromanagement: |
        Использовать концепцию для оправдания чрезмерного наблюдения за другими.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Принцип Парето
    quick_introduction: |
      Принцип Парето (или правило 80/20) гласит, что примерно 80% эффектов происходят
      от 20% причин. Незначительное меньшинство входных данных часто производит
      большинство выходных данных — в продажах, ошибках, клиентах, усилиях, функциях и
      многом другом. Сосредоточьтесь на жизненно важных немногих.
    one_liner: 80% эффектов происходят от 20% причин — сосредоточьтесь на жизненно важных немногих.
    try_this:
      - Определите 20% входных данных, которые дают 80% результатов — удвойте усилия там.
      - Сократите или понизьте приоритет 80%, которые дают мало.
      - Спросите: Какие немногие вещи, если бы я делал их хорошо, имели бы наибольшее значение?
    ask_yourself:
      - Распределяю ли я усилия равномерно, когда немногие вещи имеют большее значение?
      - Каковы мои 20% с высоким рычагом?
    in_more_detail: |
      Вильфредо Парето заметил, что 80% земель Италии принадлежало 20% населения.
      Принцип был обобщен: 80% продаж от 20% клиентов, 80% ошибок от 20% кода, 80%
      результатов от 20% усилий. Точное соотношение варьируется, но закономерность —
      неравномерное распределение — распространена.

      Принцип предполагает, что определение и фокусировка на 20% с высоким рычагом
      может значительно улучшить результаты. Это эвристика приоритизации, а не
      физический закон.
    why_this_is_important: |
      Применение принципа Парето помогает беспощадно расставлять приоритеты,
      избегать траты усилий на действия с низким влиянием и достигать большего
      меньшими средствами. Это фундаментально для продуктивности и стратегии.
    when_to_use:
      - принятие_решений
      - решение_проблем
      - руководство
      - карьерные_шаги
    how_can_you_spot_it:
      uneven_distribution: |
        Небольшая доля X составляет большую долю Y.
      high_leverage_activities: |
        Некоторые действия дают большинство результатов.
      low_value_tail: |
        Многие действия приносят мало пользы; их сокращение имеет минимальное влияние.
      vital_few_vs_trivial_many: |
        Ключ в том, чтобы определить, какие немногие имеют наибольшее значение.
    examples:
      sales: |
        20% клиентов приносят 80% дохода — сосредоточьтесь на их удержании и росте.
      software: |
        20% функций обеспечивают 80% использования — расставьте приоритеты для них.
      productivity: |
        Некоторые привычки или распорядки дают большую часть вашего результата — удвойте усилия на них.
      problems: |
        20% ошибок вызывают 80% сбоев — исправьте их в первую очередь.
    real_world_implications: |
      Принцип Парето руководит распределением ресурсов, продуктовой стратегией и
      личной продуктивностью. Игнорирование его приводит к чрезмерному размазыванию
      усилий. Чрезмерное применение может привести к пренебрежению "длинным хвостом",
      где это имеет значение.
    professional_application:
      networking_and_relationship_building: |
        Определите отношения, которые имеют наибольшее значение для ваших целей.
        Инвестируйте непропорционально больше в них, а не распределяйте усилия
        равномерно.
      collaborative_learning_initiative: |
        При улучшении производительности команды найдите 20% вмешательств, которые
        дают 80% результатов. Сосредоточьте обучение и изменения процессов там.
    how_can_this_be_misapplied:
      oversimplification: |
        Предположение, что 80/20 применимо везде; некоторые распределения более равномерны.
      neglecting_the_tail: |
        Игнорирование "тривиального большинства", когда они коллективно важны (например,
        многие мелкие клиенты, крайние случаи).
      false_precision: |
        Рассмотрение 80/20 как точного, а не как грубой эвристики.
      misidentifying_the_vital_few: |
        Фокусировка на неправильных 20% из-за ошибочного анализа.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Закон Паркинсона
    quick_introduction: |
      Закон Паркинсона гласит: «Работа заполняет все время, отпущенное на нее».
      Дайте задаче неделю, и она займет неделю; дайте ей день, и часто она будет выполнена за день.
      То же самое применимо к бюджетам, размеру команды и ресурсам.
    one_liner: Работа заполняет все время, отпущенное на ее выполнение.
    try_this:
      - Устанавливайте более сжатые сроки, чтобы сфокусировать внимание и предотвратить разрастание объема работ.
      - Спросите: «Сколько времени минимально может занять эта задача при разумном подходе?»
      - Замечайте, когда дополнительные время или ресурсы расходуются без пропорционального увеличения ценности.
    ask_yourself:
      - Заполняю ли я время, или работа действительно требует его?
      - Поможет ли более сжатый срок лучше расставить приоритеты?
    in_more_detail: |
      Сирил Норткот Паркинсон заметил, что бюрократия растет независимо от объема работы.
      Он также отметил, что задачи расширяются, чтобы заполнить доступное время — мы
      корректируем свои усилия и темп в соответствии со сроками. Сжатые сроки могут
      заставить сконцентрироваться; свободные — способствуют прокрастинации и разрастанию объема работ.

      Закон имеет значение для управления проектами, личной продуктивности и
      организационного дизайна. Он предполагает, что ограничения могут улучшить результаты,
      заставляя расставлять приоритеты.
    why_this_is_important: |
      Понимание Закона Паркинсона помогает устанавливать лучшие сроки, избегать
      избыточного обеспечения проектов ресурсами и распознавать, когда «больше времени»
      или «больше людей» не помогут — а могут и навредить. Ограничения могут быть продуктивными.
    when_to_use:
      - принятие_решений
      - лидерство
      - решение_проблем
      - карьерные_шаги
    how_can_you_spot_it:
      deadline_driven_effort: |
        Работа ускоряется по мере приближения срока; прогресс минимален, когда срок далеко.
      scope_expansion: |
        Проекты разрастаются, чтобы заполнить доступные ресурсы, вместо того чтобы оставаться сфокусированными.
      bureaucratic_growth: |
        Организации добавляют людей и процессы, даже когда объем работы не увеличивается.
      budget_exhaustion: |
        Бюджеты полностью исчерпываются, независимо от того, были ли расходы необходимы.
    examples:
      student_deadlines: |
        Реферат, срок сдачи которого через месяц, пишется в последние 48 часов.
      project_management: |
        Проект с 6-месячным сроком занимает 6 месяцев; тот же объем работ при 3-месячном
        сроке также может быть выполнен.
      meetings: |
        Часовая встреча занимает час, даже если 30 минут было бы достаточно.
      budgets: |
        Отдел тратит весь свой бюджет к концу года, чтобы обосновать тот же бюджет
        на следующий год.
    real_world_implications: |
      Закон Паркинсона влияет на продуктивность, раздувание организационных структур и
      распределение ресурсов. Он предполагает, что искусственные ограничения (более короткие сроки,
      меньшие команды) могут повысить концентрацию и эффективность.
    professional_application:
      networking_and_relationship_building: |
        Устанавливайте четкие, сжатые сроки для совместной работы, чтобы предотвратить разрастание объема и поддерживать импульс.
      collaborative_learning_initiative: |
        Используйте тайм-боксинг для совещаний и проектов. Экспериментируйте с более короткими сроками,
        чтобы проверить, улучшают ли они концентрацию без ущерба для качества.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Установка произвольно коротких сроков, вызывающих выгорание или низкое качество.
      underresourcing: |
        Предположение, что меньше времени или меньше людей всегда сработает — некоторые задачи требуют
        адекватных ресурсов.
      blame_shifting: |
        Приписывание задержек «Закону Паркинсона», когда работа была действительно сложной.
      ignoring_quality: |
        Спешка для соответствия искусственным ограничениям в ущерб устойчивым результатам.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Вероятностное мышление
    quick_introduction: |
      Вероятностное мышление — это привычка рассуждать с точки зрения вероятностей,
      а не абсолютных утверждений. Вместо "случится ли это?" мы спрашиваем "насколько вероятно, что это случится?"
      Оно принимает неопределенность и использует ее для принятия лучших решений.
    one_liner: Думайте о вероятностях, а не об абсолютных утверждениях — примите неопределенность.
    try_this:
      - Замените "случится ли это?" на "насколько вероятно, что это случится?".
      - Рассмотрите несколько сценариев и присвойте им примерные вероятности.
      - Обновляйте свои убеждения по мере поступления новых доказательств.
    ask_yourself:
      - Думаю ли я в бинарных терминах, когда вероятности были бы более точными?
      - Каков диапазон правдоподобных исходов?
    in_more_detail: |
      Большинство реальных исходов неопределенны. Вероятностное мышление заменяет бинарные
      «да/нет» постепенными убеждениями. Оно включает в себя рассмотрение нескольких сценариев,
      присвоение им примерных вероятностей и обновление по мере поступления доказательств. Это противоположность
      чрезмерной уверенности и черно-белому мышлению.

      Ключевые практики включают: мышление в диапазонах, учет базовых ставок, обновление
      убеждений с помощью доказательств и различие между риском (известные вероятности)
      и неопределенностью (неизвестные вероятности). Оно улучшает калибровку и
      качество принимаемых решений.
    why_this_is_important: |
      Вероятностное мышление снижает чрезмерную уверенность, улучшает прогнозирование и
      приводит к принятию лучших решений в условиях неопределенности. Оно необходимо для инвестирования,
      стратегии и любой области, где будущее неопределенно.
    when_to_use:
      - принятие_решений
      - оценка_рисков
      - инвестирование
      - решение_задач
    how_can_you_spot_it:
      likelihood_language: |
        "Вероятно", "скорее всего", "маловероятно" вместо "будет" или "не будет".
      scenario_thinking: |
        Рассмотрение нескольких возможных будущих с примерными вероятностями.
      calibration: |
        Прогнозы, которые со временем соответствуют фактическим частотам исходов.
      uncertainty_acknowledgment: |
        Явное указание на то, чего вы не знаете.
    examples:
      forecasting: |
        "Я думаю, что вероятность выполнения срока составляет 60%", а не "Мы
        уложимся в срок".
      investing: |
        "Это имеет 30% шанс на 2x и 70% шанс на -50%", а не
        "Это взлетит".
      strategy: |
        Планирование нескольких сценариев (лучший, базовый, худший) с примерными
        вероятностями.
      hiring: |
        "Основываясь на собеседовании, я бы оценил вероятность успеха в 70%", а не
        "Они отличный кандидат".
    real_world_implications: |
      Вероятностное мышление улучшает калибровку, снижает неожиданность и позволяет
      лучше управлять рисками. Оно является центральным для эффективного прогнозирования и
      принятия решений в условиях неопределенности.
    professional_application:
      networking_and_relationship_building: |
        Общайтесь с использованием вероятностей, когда это уместно — "Я довольно уверен" против
        "Я уверен". Это укрепляет доверие, сигнализируя об эпистемологической скромности.
      collaborative_learning_initiative: |
        Поощряйте команды выражать неопределенность. Используйте рынки прогнозов или
        упражнения по калибровке для улучшения вероятностных суждений.
    how_can_this_be_misapplied:
      false_precision: |
        Назначение точных вероятностей (например, 73%), когда невозможно быть настолько точным.
      analysis_paralysis: |
        Никогда не действовать, потому что "мы не можем быть уверены".
      hedging_overuse: |
        Квалифицировать все до точки бесполезности.
      dismissing_intuition: |
        Чрезмерно корректировать, чтобы игнорировать сильные предчувствия, когда они могут нести действительную
        информацию.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Эффект Пигмалиона
    quick_introduction: |
      Эффект Пигмалиона (или эффект Розенталя) — это явление, при котором более высокие ожидания приводят к улучшению результатов. Когда учителя, руководители или другие люди ожидают большего от кого-то, этот человек, как правило, работает лучше. Ожидания становятся самоисполняющимися пророчествами.
    one_liner: Более высокие ожидания приводят к лучшим результатам — ожидания формируют реальность.
    try_this:
      - Ставьте высокие, но достижимые ожидания; четко сообщайте о них.
      - Замечайте, когда низкие ожидания могут ограничивать чьи-то результаты.
      - Спросите: чего я неявно ожидаю — и как это может повлиять на результаты?
    ask_yourself:
      - Помогают ли мои ожидания этому человеку или ограничивают его?
      - Изменят ли более высокие ожидания мое отношение к ним — и их результаты?
    in_more_detail: |
      Роберт Розенталь и Ленор Джейкобсон предоставили учителям ложную информацию о том, что определенные ученики "расцветут" академически. Эти ученики — случайно отобранные — действительно показали лучшие результаты, чем другие. Ожидания учителей повлияли на их поведение (больше внимания, более теплая обратная связь), что, в свою очередь, повлияло на успеваемость учеников. Ожидания формируют реальность.

      Обратное — низкие ожидания, приводящие к худшим результатам — иногда называется эффектом Голема. Оба явления показывают, что наши убеждения о других людях могут влиять на их результаты. Это имеет глубокие последствия для руководства, образования и воспитания.
    why_this_is_important: |
      Понимание эффекта Пигмалиона помогает вам использовать силу ожиданий. Высокие ожидания, искренне высказанные, могут улучшить результаты. Низкие ожидания могут привести к самоисполняющемуся провалу. Ваши убеждения о других людях имеют значение.
    when_to_use:
      - руководство
      - построение_отношений
      - обучение
      - принятие_решений
    how_can_you_spot_it:
      expectation_performance_link: |
        Те, от кого мы ожидаем большего, как правило, работают лучше.
      differential_treatment: |
        Мы относимся к людям по-разному в зависимости от наших ожиданий — часто
        бессознательно.
      self_fulfilling_prophecy: |
        Убеждения о способностях влияют на поведение, которое формирует
        способности.
      teacher_student_dynamics: |
        Ожидания преподавателей влияют на результаты учащихся через
        дифференцированное отношение.
    examples:
      education: |
        Учителя, которые ожидают успеха от учеников, оказывают им больше поддержки;
        эти ученики улучшают свои показатели. Учителя, которые ожидают провала, могут
        непреднамеренно способствовать ему.
      workplace: |
        Руководители, которые ожидают высоких результатов от своих подчиненных, предоставляют
        больше возможностей и обратной связи; результаты улучшаются.
      parenting: |
        Родители, которые ожидают от своих детей ответственности, дают им
        больше ответственности; дети справляются с ней.
      stereotypes: |
        Угроза стереотипа — это обратное явление: негативные ожидания
        могут снизить производительность.
    real_world_implications: |
      Эффект Пигмалиона влияет на образование, управление и отношения. Он предполагает, что повышение ожиданий — при
      оказании соответствующей поддержки — может улучшить результаты. Он также предупреждает, что
      низкие ожидания могут быть разрушительными.
    professional_application:
      networking_and_relationship_building: |
        Ставьте высокие ожидания для людей — и предоставьте поддержку
        для их достижения. Верьте в потенциал. Ваши ожидания
        влияют на ваше поведение, которое влияет на их результаты.
      collaborative_learning_initiative: |
        Создавайте культуру высоких ожиданий при высокой поддержке.
        Избегайте ярлыков "низкоэффективных исполнителей" такими способами, которые
        становятся самоисполняющимися. Инвестируйте в тех, от кого вы ожидаете
        успеха.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Установление ожиданий, которые невозможно выполнить без
        поддержки, приводит к неудачам и деморализации.
      blame_shifting: |
        "Они не оправдали ожиданий", когда мы не предоставили
        поддержку или условия для успеха.
      ignoring_constraints: |
        Одни только ожидания не преодолевают структурные барьеры.
      pressure_without_support: |
        Высокие ожидания без ресурсов или поддержки могут быть
        вредны.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Регрессия к среднему
    quick_introduction: |
      Регрессия к среднему — это статистический феномен, при котором экстремальные результаты
      склонны сменяться результатами, более близкими к среднему. После необычайно хорошего или плохого
      результата, следующий результат, скорее всего, будет менее экстремальным — не из-за какого-либо причинного
      вмешательства, а из-за случайных колебаний.
    one_liner: Экстремальные результаты склонны сменяться результатами, более близкими к среднему.
    try_this:
      - Не приписывайте "регрессию" своему вмешательству — оно часто произошло бы само по себе.
      - После экстремального результата ожидайте, что следующий будет менее экстремальным.
      - Спросите: связано ли это изменение с тем, что я сделал, или это просто регрессия к среднему?
    ask_yourself:
      - Приписываю ли я своему вмешательству успех или виню его в том, что могло быть случайным колебанием?
      - Произошло бы это без моего действия?
    in_more_detail: |
      Если студент получил необычно высокий балл на одном тесте, скорее всего, на следующем он получит балл,
      ближе к своему среднему — не потому, что он "стал ленивым", а потому, что первый балл был отчасти
      удачей. То же самое относится к спортивным результатам, доходности акций и бизнес-показателям. Мы часто
      приписываем "регрессию" чему-то, что мы сделали (например, наказанию или поощрению), когда это произошло
      бы само по себе.

      Дэниел Канеман описывает, как летчики-инструкторы ошибочно заключили, что похвала ухудшала результаты,
      а критика улучшала их — они наблюдали регрессию к среднему после экстремальных выступлений.
    why_this_is_important: |
      Понимание регрессии к среднему предотвращает ошибочное приписывание причинности. Это
      помогает избежать чрезмерной реакции на выбросы и внесения изменений на основе "шума".
      Это необходимо для оценки вмешательств и результатов.
    when_to_use:
      - принятие_решений
      - инвестирование
      - оценка_рисков
      - лидерство
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Необычайно хороший или плохой результат сменяется результатом, более близким к среднему.
      spurious_causation: |
        Приписывание "восстановления" или "снижения" вмешательству, когда регрессия
        произошла бы в любом случае.
      overreaction_to_outliers: |
        Принятие политики или личных изменений на основе одной экстремальной точки данных.
      reward_punishment_confusion: |
        Вера в то, что наказание "сработало", когда улучшение было просто регрессией.
    examples:
      sports: |
        Игрок проводит выдающуюся игру в карьере, затем возвращается к среднему уровню — болельщики могут
        обвинить его в "самоуспокоенности".
      investing: |
        Акция показывает отличный год, затем снижается — инвесторы могут приписать падение
        плохому управлению, когда это частично регрессия.
      performance_reviews: |
        Сотрудник проводит плохой квартал, получает обратную связь, улучшается — обратная связь может
        получить заслугу, когда регрессия произошла бы независимо.
      medicine: |
        Пациенту становится хуже, он принимает лечение, улучшается — лечение может
        получить заслугу, когда некоторое улучшение было естественным.
    real_world_implications: |
      Регрессия к среднему влияет на то, как мы оцениваем учителей, врачей, управляющих фондами и самих себя.
      Она объясняет, почему "что поднимается, должно упасть" часто статистически верно. Непонимание этого
      приводит к напрасным вмешательствам и ложной уверенности в средствах.
    professional_application:
      networking_and_relationship_building: |
        Не стоит чрезмерно интерпретировать одну плохую встречу — это может быть выброс, который
        вернется к среднему уровню отношений.
      collaborative_learning_initiative: |
        При оценке вмешательств (обучение, изменения процессов) используйте контрольные группы
        и множество точек данных, чтобы отличить эффект от регрессии.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Предположение, что любое улучшение после вмешательства — это "просто регрессия",
        когда существуют реальные эффекты.
      underreacting: |
        Игнорирование реальных проблем, потому что "оно само вернется к среднему".
      statistical_illiteracy: |
        Путаница регрессии с силой, которая "корректирует" результаты — это просто
        вероятность.
      overconfidence: |
        Предположение, что среднее стабильно, когда исходный процесс мог измениться.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Розовые ретроспективы
    quick_introduction: |
      Розовые ретроспективы — это тенденция вспоминать прошлое как лучшее, чем оно было на самом деле.
      Со временем мы вспоминаем прошлый опыт более позитивно, сглаживая трудности
      и усиливая хорошее. "Хорошие старые времена" часто были не так хороши, как мы помним.
    one_liner: Мы помним прошлое как лучшее, чем оно было — "хорошие старые времена" были не так хороши.
    try_this:
      - Сравнивая с прошлым, спросите: Что я чувствовал на самом деле тогда?
      - Ведите дневник, чтобы позже сравнить воспоминания с реальностью.
      - Обращайте внимание, когда ностальгия окрашивает ваше суждение о настоящем.
    ask_yourself:
      - Идеализирую ли я прошлое?
      - Был бы я счастлив тогда, если бы мог вернуться назад во времени?
    in_more_detail: |
      Мы склонны вспоминать положительные аспекты прошлого опыта и забывать или
      преуменьшать отрицательные. Отпуск, работа и отношения в ностальгии кажутся лучше, чем они были в тот момент. Это может привести к нереалистичным
      сравнениям — мы оцениваем настоящее по идеализированному прошлому.

      Розовые ретроспективы влияют на принятие решений, когда мы повторяем прошлые выборы,
      ожидая того же (запомнившегося) результата. Это также может подпитывать ностальгию по
      эпохам, которые объективно были хуже. Это противоположность негативному предубеждению
      в памяти.
    why_this_is_important: |
      Распознавание розовых ретроспектив помогает вам делать более реалистичные сравнения
      и избегать повторения прошлых ошибок, основанных на идеализированных воспоминаниях. Это также
      объясняет, почему мы иногда скучаем по прошлому, несмотря на текущий прогресс.
    when_to_use:
      - принятие_решений
      - карьерные_шаги
      - построение_отношений
      - обучение
    how_can_you_spot_it:
      idealized_past: |
        "Тогда все было лучше", когда объективные показатели могут показывать обратное.
      selective_positive_memory: |
        Воспоминание хорошего и забывание плохого из прошлого опыта.
      nostalgia_as_evidence: |
        Использование приятных воспоминаний как доказательства того, что прошлые решения были правильными.
      present_undervaluation: |
        Настоящее кажется хуже, чем оно есть, потому что мы сравниваем его с идеализированным прошлым.
    examples:
      career: |
        "Моя прошлая работа была отличной", хотя вы ушли по веским причинам — память сгладила
        разочарования.
      relationships: |
        "Мы были так счастливы" по поводу прошлых отношений — забывая конфликты, которые
        привели к их концу.
      childhood: |
        "В мои дни детям жилось лучше", когда многие объективные показатели (здоровье,
        безопасность, возможности) улучшились.
      projects: |
        "Тот проект прошел гладко", хотя на самом деле было много задержек — мы помним
        результат, а не процесс.
    real_world_implications: |
      Розовые ретроспективы влияют на удовлетворенность жизнью, карьерные решения и
      выборы, обусловленные ностальгией. Это может привести к повторению прошлых ошибок или
      нереалистичным сравнениям. Это также объясняет привлекательность риторики "назад, в хорошие старые времена".
    professional_application:
      networking_and_relationship_building: |
        При рассмотрении возможности возобновления контактов с прошлыми коллегами или возвращения на прошлые
        должности, отделяйте ностальгию от реальности. Документируйте причины своего ухода в то время; пересмотрите их перед возвращением.
      collaborative_learning_initiative: |
        В ретроспективах используйте contemporaneousные заметки или данные, а не память,
        чтобы оценить, что произошло на самом деле. Память сглаживает трудности.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        Не вся ностальгия вводит в заблуждение — иногда прошлое действительно было лучше
        в некоторых отношениях.
      invalidating_memories: |
        Говорить людям, что их позитивные воспоминания "неверны", когда они могут отражать
        искренний субъективный опыт.
      overcorrection: |
        Предполагать, что прошлое всегда было хуже, чем мы помним — иногда оно было
        лучше.
      present_bias: |
        Использование розовых ретроспектив как предлога для игнорирования законных
        опасений по поводу текущего упадка.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: salience_bias
    name: Склонность к заметности
    quick_introduction: |
      Склонность к заметности — это тенденция фокусироваться на наиболее
      выдающихся или заметных аспектах ситуации, игнорируя менее очевидные,
      но потенциально важные факторы. То, что выделяется, получает
      непропорциональное внимание и вес в наших суждениях.
    one_liner: То, что выделяется, получает непропорциональное внимание — неуловимое остается незамеченным.
    try_this:
      - Спросите: Что я упускаю, потому что это не заметно?
      - Активно ищите менее очевидные факторы перед принятием решения.
      - Замечайте, когда яркий или драматичный элемент доминирует в вашем суждении.
    ask_yourself:
      - Не придаю ли я излишний вес тому, что бросается в глаза, и недостаточный вес тому, что неуловимо?
      - Какие важные факторы я могу упускать?
    in_more_detail: |
      Заметная информация является яркой, эмоционально заряженной или недавно встреченной.
      Она привлекает внимание и влияет на решения больше, чем должна. Мы
      придаем излишний вес очевидному и недостаточный вес неуловимому. Драматическое событие
      или яркий пример могут доминировать в нашем мышлении, даже если они не
      являются репрезентативными.

      Склонность к заметности пересекается с эвристикой доступности (то, что приходит на ум)
      и недавней предвзятостью (то, что произошло недавно). Она влияет на восприятие риска,
      найм и стратегию. Наиболее очевидные проблемы решаются;
      невидимые — накапливаются.
    why_this_is_important: |
      Осознание склонности к заметности помогает вам смотреть за пределы очевидного и
      рассматривать менее заметные факторы. Это улучшает оценку риска, диагностику проблем
      и качество принятия решений. Важные вещи не всегда
      заметны.
    when_to_use:
      - принятие_решений
      - решение_проблем
      - оценка_риска
      - лидерство
    how_can_you_spot_it:
      prominent_factor_dominance: |
        Наиболее заметный аспект движет решением.
      overlooking_background: |
        Менее заметные факторы игнорируются, несмотря на их важность.
      vividness_overweighting: |
        Яркая или эмоциональная информация получает непропорциональный вес.
      visibility_bias: |
        То, что мы можем легко увидеть или измерить, привлекает больше внимания, чем
        то, что мы не можем.
    examples:
      risk: |
        Авиакатастрофа — заметное явление, мы переоцениваем риск полетов. Автомобильные
        аварии менее заметны в совокупности — мы недооцениваем
        риск вождения.
      hiring: |
        Навыки презентации кандидата — заметны; его
        упорство может быть менее очевидным, но не менее важным.
      strategy: |
        Действия конкурентов — заметны; постепенные рыночные сдвиги —
        менее заметны, но могут иметь большее значение.
      problems: |
        Самая громкая жалоба решается, в то время как системные проблемы
        остаются незамеченными.
    real_world_implications: |
      Склонность к заметности влияет на то, что получает внимание, финансирование и действия.
      Это может привести к решению симптомов, а не причин, и
      к неэффективному распределению ресурсов. Сознательный поиск невидимой
      информации улучшает решения.
    professional_application:
      networking_and_relationship_building: |
        Не судите людей только по их наиболее заметным чертам. Ищите
        менее очевидные качества — надежность, последовательность, как
        они относятся к людям, которые не могут им помочь.
      collaborative_learning_initiative: |
        При решении проблем явно спрашивайте «Что мы не видим?»
        и «Что менее очевидно, но важно?» Создавайте процессы,
        которые выявляют невидимые проблемы.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        Иногда то, что заметно, важно. Не отбрасывайте
        все очевидное.
      false_sophistication: |
        Предположение, что скрытые факторы всегда важнее
        очевидных.
      analysis_paralysis: |
        Поиск такого множества невидимых факторов, что вы никогда
        не действуете в отношении заметных.
      contrarianism: |
        Отвержение заметной информации просто ради того, чтобы отличаться.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: scarcity_bias
    name: Искажение дефицита
    quick_introduction: |
      Искажение дефицита — это тенденция придавать большую ценность вещам, когда они кажутся
      редкими или ограниченными. "Ограниченное время", "осталось всего 3" и "эксклюзивный доступ"
      вызывают срочность и желание, часто подавляя рациональную оценку того, действительно ли
      нам нужна или хочется эта вещь.
    one_liner: Дефицит усиливает воспринимаемую ценность — "ограниченность" вызывает срочность вместо рациональности.
    try_this:
      - Спросите: Хотел бы я это, если бы это не было дефицитным? Уберите срочность.
      - Остановитесь, прежде чем действовать под влиянием предложений об ограниченном времени или остатке количества.
      - Замечайте, когда дефицит вызывает ваше желание сильнее, чем реальная ценность.
    ask_yourself:
      - Ценю ли я это, потому что это дефицитно, или потому что оно мне действительно нужно?
      - Принял бы я это решение без фрейминга дефицита?
    in_more_detail: |
      Дефицит усиливает воспринимаемую ценность. Когда что-то редкое или исчезает, мы
      хотим этого больше — отчасти потому, что дефицит может сигнализировать о качестве, а отчасти потому,
      что неприятие потерь заставляет нас бояться упустить возможность. Маркетологи и переговорщики используют дефицит
      для создания срочности. Это искажение может приводить к импульсивным решениям, перерасходу средств и плохой приоритизации.

      Дефицит также влияет на когнитивные ресурсы тех, кто действительно
      испытывает нехватку ресурсов; бедность может сокращать "умственные ресурсы" для других решений.
    why_this_is_important: |
      Распознавание искажения дефицита помогает противостоять манипулятивным тактикам и принимать более
      осознанные решения. Это также объясняет, почему мы переоцениваем лимитированные издания и
      спешим, когда нет необходимости.
    when_to_use:
      - принятие_решений
      - ведение_переговоров
      - инвестирование
      - оценка_рисков
    how_can_you_spot_it:
      urgency_trigger: |
        "Ограниченное время" или "осталось всего X" вызывает непропорциональное желание.
      fear_of_missing_out: |
        Возможность потерять доступ побуждает к действию сильнее, чем внутренняя ценность.
      impulsive_purchases: |
        Покупка вещей, потому что они дефицитны, а не потому, что они нужны.
      artificial_scarcity: |
        Дефицит создан искусственно (например, фальшивые таймеры обратного отсчета), а не реален.
    examples:
      sales: |
        "Осталось всего 2 штуки" или "Распродажа заканчивается сегодня вечером" вызывает покупки, которые
        не произошли бы без срочности.
      auctions: |
        Участники торгов увлекаются процессом выигрыша и платят больше, чем планировали, из-за
        конкурентного дефицита.
      exclusivity: |
        Доступ "только для членов клуба" или "только по приглашениям" увеличивает воспринимаемую ценность.
      genuine_scarcity: |
        Когда ресурсы действительно ограничены, люди в условиях стресса от дефицита принимают худшие
        решения (например, бедные, испытывающие нехватку времени).
    real_world_implications: |
      Искажение дефицита влияет на потребительское поведение, результаты переговоров и политические
      решения. Оно может использоваться этично (например, законные сроки) или неэтично
      (например, фальшивый дефицит). Понимание этого улучшает качество принятия решений.
    professional_application:
      networking_and_relationship_building: |
        Будьте осторожны, когда другие создают искусственный дефицит ("Я беру только нескольких
        клиентов"). Проверяйте, реален ли дефицит. При построении отношений
        реальный дефицит вашего времени может сигнализировать о ценности — но чрезмерное использование воспринимается как манипуляция.
      collaborative_learning_initiative: |
        При создании срочности для инициатив убедитесь, что она законна. Фальшивые сроки
        подрывают доверие, когда их обнаруживают.
    how_can_this_be_misapplied:
      manipulation: |
        Преднамеренное создание ложного дефицита для давления на других при принятии решений.
      impulsive_decisions: |
        Принятие важных решений под искусственной срочностью, когда больше времени улучшило бы
        результаты.
      overvaluing_scarcity: |
        Предположение, что дефицитные вещи всегда лучше — иногда дефицит произволен.
      exploiting_vulnerability: |
        Использование тактик дефицита в отношении людей, которые уже испытывают нехватку ресурсов.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Мышление второго порядка
    quick_introduction: |
      Мышление второго порядка — это практика рассмотрения последствий последствий ваших действий. Мышление первого порядка задает вопрос: «Что произойдет, если я сделаю X?» Мышление второго порядка задает вопросы: «А что потом?» и «А что потом после этого?» Оно выявляет непреднамеренные эффекты.
    one_liner: Задавайте вопрос «а что потом?» — рассматривайте последствия последствий.
    try_this:
      - Для любого решения задавайте вопрос «а что потом?» как минимум дважды.
      - Подумайте, как другие отреагируют на ваше действие — а затем на эту реакцию.
      - Замечайте, когда эффекты первого порядка меняются на противоположные или усложняются в цепочке.
    ask_yourself:
      - Продумал ли я последствия второго (и третьего) порядка?
      - Какие непреднамеренные последствия я могу упустить?
    in_more_detail: |
      Ховард Маркс популяризировал эту концепцию в инвестировании. Первое: «Это вырастет». Второе: «Если это вырастет, другие заметят, больше людей купит, это вырастет еще больше — до тех пор, пока не станет переоцененным и не рухнет». Цепочка последствий часто меняет на противоположные или усложняет эффект первого порядка.

      Мышление второго порядка сложнее — оно требует больше умственных усилий и воображения. Но оно предотвращает множество ошибок. Хорошие стратеги думают на несколько шагов вперед и учитывают, как отреагируют другие.
    why_this_is_important: |
      Мышление второго порядка предотвращает непреднамеренные последствия и улучшает качество принятия решений. Оно необходимо для стратегии, политики и любой области, где действия вызывают реакции.
    when_to_use:
      - принятие_решений
      - решение_проблем
      - стратегия
      - оценка_рисков
    how_can_you_spot_it:
      consequence_chains: |
        «Если я сделаю X, произойдет Y, затем произойдет Z…»
      reaction_anticipation: |
        Учет того, как другие отреагируют на ваше действие.
      unintended_effects: |
        Поиск побочных эффектов и циклов обратной связи.
      reversals: |
        Последствия второго порядка, которые противоречат или меняют на противоположные эффекты первого порядка.
    examples:
      investing: |
        «Если все считают это хорошей инвестицией, то, вероятно, на рынке уже тесно — преимуществ может уже не быть».
      policy: |
        «Если мы субсидируем X, спрос растет, цены повышаются — действительно ли субсидия помогает?»
      negotiation: |
        «Если я буду давить здесь, они ответят там — каков будет общий эффект?»
      incentives: |
        «Если мы будем вознаграждать за этот показатель, люди будут манипулировать им — что они на самом деле будут делать?»
    real_world_implications: |
      Мышление второго порядка — отличительная черта стратегического мышления. Оно предотвращает провалы политики, непреднамеренные стимулы и наивный оптимизм. Оно отличает хороших лиц, принимающих решения, от выдающихся.
    professional_application:
      networking_and_relationship_building: |
        Прежде чем предпринять действие, спросите: «Как они отреагируют? А как отреагирую я на это?» Учитывайте динамику отношений, а не только немедленный обмен.
      collaborative_learning_initiative: |
        При планировании проводите упражнения «а что потом?». Намечайте цепочки последствий. Выявляйте непреднамеренные эффекты до того, как они проявятся.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Слишком долгое обдумывание шагов вперед, из-за чего вы никогда не действуете.
      false_complexity: |
        Предположение, что эффекты второго порядка всегда доминируют, когда эффектов первого порядка может быть достаточно.
      overconfidence: |
        Вера в то, что вы можете предсказать длинные цепочки, когда неопределенность накапливается.
      pessimism: |
        Всегда предположение наихудшего в цепочке последствий.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sunk_cost_fallacy
    name: Ошибка невозвратных затрат
    quick_introduction: |
      Ошибка невозвратных затрат — это тенденция продолжать инвестировать в решение из-за
      уже потраченных ресурсов, а не на основе будущих ожидаемых доходов.
      «Мы прошли так далеко» или «Я уже столько вложил» приводит к тому, что хорошие
      деньги идут за плохими.
    one_liner: Прошлые вложения потеряны — важны только будущие затраты и выгоды.
    try_this:
      - Ask: Если бы я начинал сегодня, выбрал бы я этот путь?
      - Define "kill criteria" in advance—conditions under which you'll stop.
      - Evaluate the marginal decision: what do I gain or lose from here forward?
    ask_yourself:
      - Я продолжаю из-за будущей ценности или чтобы оправдать прошлые вложения?
      - Что бы я посоветовал другу, который оказался бы на моем месте с нуля?
    in_more_detail: |
      Невозвратные затраты — это прошлые затраты, которые невозможно возместить. Рациональное
      принятие решений игнорирует их — важны только будущие затраты и выгоды. Но мы эмоционально
      привязаны к нашим вложениям. Мы доедаем еду, которая нам не нравится, продолжаем смотреть
      фильм, который не любим, и запускаем проекты, которые больше не имеют смысла. Мы хотим
      «не потерять» то, что вложили, но продолжение часто приводит к еще большим потерям.

      Ошибка особенно сильна, когда мы вложили время, усилия или идентичность, а не только деньги.
      Признать, что мы ошибались, может быть затратно, поэтому мы удваиваем усилия.
    why_this_is_important: |
      Распознавание ошибки невозвратных затрат помогает сокращать убытки, менять направление,
      когда это оправдано, и принимать решения на основе будущей ценности, а не прошлых вложений.
      Это важно для проектов, карьеры и отношений.
    when_to_use:
      - принятие_решений
      - инвестирование
      - карьерные_шаги
      - оценка_рисков
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        «Мы не можем остановиться сейчас — мы уже потратили X», когда будущие доходы не оправдывают
        продолжения.
      escalation_of_commitment: |
        Вложение большего, чтобы оправдать или «спасти» предыдущие вложения.
      identity_investment: |
        Продолжение, потому что признание неудачи угрожает самооценке.
      ignoring_marginal_analysis: |
        Принятие решений на основе общих затрат, а не предельных затрат и выгод.
    examples:
      projects: |
        Продолжение провального проекта, потому что «мы уже потратили на него 6 месяцев»,
        хотя сокращение убытков было бы рациональным.
      relationships: |
        Оставаться в отношениях, потому что «мы вместе 5 лет», вместо того чтобы
        оценивать будущее.
      careers: |
        Оставаться на работе, которая вам не нравится, потому что вы вложились в получение
        диплома или многолетний опыт.
      investments: |
        Держать убыточные акции, чтобы «вернуться к нулю», вместо того чтобы перераспределить средства
        в более выгодные возможности.
    real_world_implications: |
      Ошибка невозвратных затрат приводит к растрате ресурсов, затяжным неудачам и упущенным
      возможностям. Она затрагивает отдельных лиц, организации и правительства.
      Преодоление ее требует явных рамок принятия решений.
    professional_application:
      networking_and_relationship_building: |
        Не продолжайте инвестировать в отношения или сотрудничество, которые больше не приносят вам пользы,
        только из-за прошлых вложений. Оценивайте перспективную ценность.
      collaborative_learning_initiative: |
        Создайте «критерии прекращения» для проектов — условия, при которых вы остановитесь
        независимо от прошлых вложений. Периодически просматривайте проекты с точки зрения «с нуля».
    how_can_this_be_misapplied:
      quitting_too_early: |
        Использование «невозвратных затрат» как предлога для отказа от того, что требует больше времени,
        чтобы принести плоды.
      undervaluing_consistency: |
        Некоторые обязательства (например, отношения, репутация) имеют ценность в непрерывности,
        которую чисто предельный анализ упускает.
      cold_rationality: |
        Отвержение эмоциональной привязанности как иррациональной, когда она может отражать подлинные
        ценности.
      analysis_paralysis: |
        Чрезмерное размышление о том, продолжать ли, когда ответ очевиден.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Ошибка выжившего
    quick_introduction: |
      Ошибка выжившего — это логическая ошибка, заключающаяся в сосредоточении на людях или вещах, которые "выжили" в процессе, игнорируя тех, кто не выжил. Мы видим победителей и забываем про проигравших, что приводит к излишне оптимистичным выводам об успехе и неудаче.
    one_liner: Мы видим победителей и забываем про проигравших — что приводит к излишне оптимистичным выводам.
    try_this:
      - Ask: Кто потерпел неудачу, делая что-то похожее? Чему мы можем у них научиться?
      - Seek out the "invisible" sample—those who didn't survive.
      - Notice when you're studying only success stories.
    ask_yourself:
      - Am I learning only from survivors?
      - What would the full picture look like if I included the failures?
    in_more_detail: |
      Во время Второй мировой войны статистик Абрахам Вальд скорректировал размещение брони на бомбардировщиках, анализируя, куда попадали пули в выживших самолетах — и рекомендовал броню туда, куда попадали пули в *не*выживших самолетах, поскольку эти самолеты никогда не возвращались. Мы естественным образом фокусируемся на видимой выборке (выживших) и игнорируем невидимую (тех, кто потерпел неудачу).

      Ошибка выжившего искажает наше представление о предпринимательстве, инвестировании, карьере и истории. Мы изучаем успешные компании и упускаем тысячи тех, которые потерпели неудачу, делая похожие вещи. Мы слышим от удачливых и забываем про невезучих.
    why_this_is_important: |
      Корректировка ошибки выжившего приводит к более реалистичным ожиданиям и лучшим решениям. Это помогает вам учиться на неудачах, а не только на успехах, и избегать копирования стратегий, которые сработали только для избранных счастливчиков.
    when_to_use:
      - принятие_решений
      - инвестирование
      - карьерные_шаги
      - обучение
    how_can_you_spot_it:
      visible_success_stories: |
        Мы слышим от успешных людей гораздо больше, чем от тех, кто пытался и потерпел неудачу.
      missing_failures: |
        Выборка, которую мы наблюдаем, исключает тех, кто "не справился" и, следовательно, не может рассказать свои истории.
      copying_survivors: |
        Предположение, что действия выживших стали причиной их успеха, хотя это могла быть удача или сама ошибка выжившего.
      overly_optimistic_models: |
        Оценки коэффициента успеха, игнорирующие знаменатель попыток.
    examples:
      entrepreneurship: |
        "Бросить колледж, как Цукерберг" игнорирует множество бросивших колледж, которые не основали компании стоимостью в миллиард долларов.
      investing: |
        Изучение только выживших фондов игнорирует те, которые закрылись после плохой производительности, раздувая историческую доходность.
      career_advice: |
        Успешные люди приписывают успех усердной работе; мы не слышим от тех, кто усердно работал и потерпел неудачу.
      historical_analysis: |
        Изучение "великих" компаний, которые выжили, игнорирует множество тех, которые потерпели неудачу с похожими стратегиями.
    real_world_implications: |
      Ошибка выжившего раздувает воспринимаемый коэффициент успеха, искажает образцы для подражания и приводит к плохой имитации. Корректировка требует поиска случаев неудач и понимания базовых ставок.
    professional_application:
      networking_and_relationship_building: |
        При поиске совета ищите также людей, которые пытались и потерпели неудачу — их точки зрения часто более информативны, чем у выживших.
      collaborative_learning_initiative: |
        Изучайте провальные проекты и закрытые инициативы, а не только успешные. Проводите "разборы полетов" после неудач, чтобы учиться на том, что не сработало.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Чрезмерная корректировка, ведущая к предположению, что успех — это всегда удача, и усилия не имеют значения.
      dismissing_success: |
        Отказ учиться у успешных людей из-за "ошибки выжившего".
      analysis_paralysis: |
        Чрезмерная сосредоточенность на случаях неудач, из-за чего вы никогда не предпринимаете действий.
      false_equivalence: |
        Рассмотрение стратегий выживших и невыживших как равноценно информативных, когда контекст отличается.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Эффект Зейгарник
    quick_introduction: |
      Эффект Зейгарник — это тенденция лучше запоминать незавершенные или прерванные
      задачи, чем завершенные. Незавершенные задачи создают психологическое
      напряжение, которое удерживает их активными в нашем сознании. Наш мозг цепляется за то, что не закончено.
    one_liner: Незавершенные задачи остаются в нашем сознании — наш мозг цепляется за то, что не закончено.
    try_this:
      - Используйте завершение, чтобы "освободить" задачи от ментальной нагрузки — завершите их или явно откажитесь от них.
      - Разбивайте работу на управляемые части, чтобы создавать продуктивные открытые петли.
      - Обращайте внимание, когда вы размышляете о незавершенных делах — замкните цикл или решите отпустить.
    ask_yourself:
      - Какие незавершенные задачи создают напряжение в моем сознании?
      - Стоит ли эта открытая петля того, чтобы ее сохранять, или я могу ее замкнуть?
    in_more_detail: |
      Блюма Зейгарник заметила, что официанты лучше помнили неоплаченные заказы,
      чем оплаченные — как только задача была выполнена, она "освобождалась" из памяти. Незавершенные задачи создают открытую петлю, которая требует завершения. Это способствует как продуктивной концентрации (мы хотим закончить), так и беспокойству (мы не можем перестать думать о том, что не сделано).

      Эффект используется в маркетинге (клиффхэнгеры, незавершенные истории) и
      продуктивности (разбивка работы на части для создания нескольких "открытых петель").
      Он объясняет, почему мы размышляем о незавершенных делах и почему списки дел
      могут вызывать чувство перегрузки.
    why_this_is_important: |
      Понимание эффекта Зейгарник помогает управлять ментальной нагрузкой, создавать
      вовлекающий опыт и стратегически использовать прерывания. Он объясняет,
      почему мы не можем перестать думать о незавершенной работе — и почему это может быть
      использовано во благо или во вред.
    when_to_use:
      - решение_задач
      - лидерство
      - обучение
      - принятие_решений
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Незавершенные задачи вторгаются в мысли чаще, чем завершенные.
      better_recall_of_unfinished: |
        Мы лучше помним прерванные задачи, чем завершенные.
      tension_for_closure: |
        Дискомфорт или стремление завершить начатое.
      serial_dramas: |
        Клиффхэнгеры и "Продолжение следует" используют этот эффект.
    examples:
      productivity: |
        Начало задачи создает ментальное напряжение, которое способствует завершению — или
        беспокойство, если слишком много открытых петель.
      marketing: |
        "Часть 1 из 3" или "Продолжение следует" удерживают аудиторию и
        заставляют возвращаться.
      meetings: |
        Завершение встречи без четких дальнейших шагов оставляет участников
        с нерешенным напряжением.
      learning: |
        Неотвеченные вопросы или неполные объяснения остаются в памяти
        и стимулируют дальнейшие изыскания.
    real_world_implications: |
      Эффект Зейгарник влияет на продуктивность, вовлеченность и ментальную
      нагрузку. Он может быть использован для концентрации или вызывать перегрузку. Он
      объясняет привлекательность клиффхэнгеров и бремя слишком большого количества
      открытых задач.
    professional_application:
      networking_and_relationship_building: |
        Заканчивайте разговоры с четкими дальнейшими шагами — или преднамеренными открытыми
        петлями, если вы хотите, чтобы другой человек продолжил общение. Незавершенные
        нити создают вовлеченность.
      collaborative_learning_initiative: |
        Используйте эффект Зейгарник в обучении: задавайте проблемы или вопросы
        перед перерывами, чтобы поддерживать вовлеченность учащихся. Но избегайте создания такого количества
        открытых петель, которое может вызвать у людей чувство перегрузки.
    how_can_this_be_misapplied:
      overwhelm: |
        Создание слишком большого количества открытых петель — слишком большого количества незавершенных задач — приводит к
        беспокойству и параличу.
      manipulation: |
        Намеренное оставление чего-либо незавершенным для создания зависимости или
        вовлеченности.
      false_urgency: |
        Использование эффекта для создания искусственной срочности, когда ее нет.
      incomplete_work: |
        Начало множества дел для создания "напряжения" без фактического
        их завершения — что приводит к разрозненным усилиям.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Мышление по принципу «нулевой суммы»
    quick_introduction: |
      Мышление по принципу «нулевой суммы» — это убеждение в том, что выигрыш одного человека неизбежно означает проигрыш другого, то есть ресурсы фиксированы, и любое ваше преимущество означает мой недостаток.
      На самом деле, многие ситуации являются играми с положительной суммой: обе стороны могут выиграть.
    one_liner: Ваш выигрыш не должен быть моим проигрышем — многие ситуации имеют положительную сумму.
    try_this:
      - Ask: Можно ли увеличить «пирог»? Является ли эта ситуация игрой с нулевой суммой?
      - Look for cooperation before assuming competition.: Ищите возможности для сотрудничества, прежде чем предполагать конкуренцию.
      - Notice when you're treating a situation as fixed-pie when it isn't.: Обращайте внимание, когда вы относитесь к ситуации как к фиксированному «пирогу», хотя это не так.
    ask_yourself:
      - Am I assuming a fixed pie when we could expand it?: Предполагаю ли я фиксированный «пирог», когда мы могли бы его увеличить?
      - Would cooperation create more value than competition?: Создаст ли сотрудничество больше ценности, чем конкуренция?
    in_more_detail: |
      В игре с нулевой суммой общее количество фиксировано — ваш выигрыш означает мой проигрыш. В ситуациях с положительной суммой сотрудничество создает ценность. Торговля, инновации и построение отношений часто являются играми с положительной суммой. Мышление по принципу «нулевой суммы» ведет к ненужной конкуренции, упущенным возможностям для сотрудничества и деструктивному соперничеству.

      Этот когнитивный перекос распространен в переговорах, политике и организационной динамике.
      Он предполагает фиксированный «пирог», когда «пирог» часто можно увеличить. Это может стать
      самоисполняющимся пророчеством: если вы относитесь к другим как к противникам, они становятся противниками.
    why_this_is_important: |
      Распознавание мышления по принципу «нулевой суммы» открывает возможности для сотрудничества и
      создания ценности. Оно улучшает ведение переговоров, уменьшает конфликты и способствует
      достижению взаимовыгодных результатов. Многие из лучших возможностей являются играми с положительной суммой.
    when_to_use:
      - negotiation
      - leadership
      - relationship_building
      - decision-making
    how_can_you_spot_it:
      fixed_pie_assumption: |
        «Если они выиграют, я проиграю», когда ситуация может позволить обоим получить выгоду.
      competitive_ framing: |
        Автоматическое представление ситуаций как «мы против них».
      envy_of_others_gains: |
        Зависть к успехам других, как будто они уменьшают ваш собственный.
      missed_cooperation: |
        Неспособность увидеть возможности для сотрудничества, которое принесло бы пользу всем.
    examples:
      negotiation: |
        Предположение, что лучшая сделка для другой стороны означает худшую сделку для
        вас — когда творческие решения часто увеличивают ценность для обеих сторон.
      salary: |
        «Если мой коллега получит повышение, мне достанется меньше», когда бюджеты могут быть
        гибкими, или повышения могут быть обоснованы созданной ценностью.
      politics: |
        «Успех их партии — наш проигрыш», когда многие политические решения могут
        принести пользу нескольким группам.
      career: |
        «Их повышение означает меньше возможностей для меня», когда рост организации
        может создать больше возможностей для всех.
    real_world_implications: |
      Мышление по принципу «нулевой суммы» разжигает конфликты, ограничивает сотрудничество и приводит к упущенным возможностям. Оно часто ошибочно в экономике, отношениях и
      инновациях. Переход к позитивному мышлению с положительной суммой улучшает результаты.
    professional_application:
      networking_and_relationship_building: |
        Ищите способы создать ценность для других — их успех может создать
        возможности для вас. Стройте отношения, где обе стороны получают выгоду.
      collaborative_learning_initiative: |
        Представляйте цели команды как игры с положительной суммой: общий успех, увеличение «пирога».
        Поощряйте сотрудничество вместо внутренней конкуренции.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Некоторые ситуации являются играми с нулевой суммой (например, одно повышение, фиксированный бюджет).
        Притворяться, что это не так, может быть наивным.
      naive_cooperation: |
        Предполагать, что все будут сотрудничать, когда некоторые участники действительно
        враждебны.
      undervaluing_competition: |
        Конкуренция может способствовать совершенствованию; не всякое соперничество деструктивно.
      exploitation: |
        Использование «позитивной суммы» для получения выгоды от других, которые не
        получают никакой пользы.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
