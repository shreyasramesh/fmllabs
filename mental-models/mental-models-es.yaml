# yaml-language-server: $schema=../schema/mental-models-consolidated-schema.json
# Mental Models & Cognitive Biases (Spanish)
# Consolidated from mental-models-es/

mental_models:
  - id: ambiguity_effect
    name: Efecto de Ambigüedad
    quick_introduction: |
      El efecto de ambigüedad es la tendencia a evitar opciones cuando carecemos de información
      sobre las probabilidades de los resultados. Preferimos riesgos conocidos sobre riesgos desconocidos,
      incluso cuando los riesgos desconocidos podrían ser mejores. La incertidumbre en sí misma se siente
      aversiva.
    one_liner: Preferimos riesgos conocidos sobre riesgos desconocidos, incluso cuando lo desconocido podría ser mejor.
    try_this:
      - Pregunta: ¿Estoy evitando esta opción principalmente por incertidumbre, o hay una desventaja real?
      - Cuantifica lo que sí sabes; a veces la opción "ambigua" tiene un potencial de mejora más claro.
      - Nota cuándo recurres a lo familiar solo porque se siente más seguro.
    ask_yourself:
      - ¿Estoy rechazando algo porque es ambiguo, o porque es genuinamente peor?
      - ¿Qué necesitaría saber para sentirme cómodo con la opción incierta?
    in_more_detail: |
      En la paradoja de Ellsberg, las personas prefieren apostar por una urna con proporciones
      conocidas de bolas sobre una urna con proporciones desconocidas, incluso cuando la urna desconocida
      podría ofrecer mejores probabilidades. Desagradamos la ambigüedad: preferimos tener una probabilidad clara
      (incluso si es mala) que una poco clara.

      El efecto influye en las decisiones de inversión, elección de carrera y políticas.
      Puede llevar a elecciones subóptimas cuando evitamos opciones que son ambiguas
      pero potencialmente superiores. También explica por qué preferimos marcas familiares
      y cantidades conocidas.
    why_this_is_important: |
      Reconocer el efecto de ambigüedad te ayuda a evitar sobrevalorar lo familiar
      y subvalorar lo incierto. Puede llevar a oportunidades perdidas cuando
      la ambigüedad es manejable. También explica por qué la transparencia y la claridad
      reducen la ansiedad.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - inversion
      - movimientos_de_carrera
    how_can_you_spot_it:
      preference_for_known_risks: |
        Elegir opciones con probabilidades claras (incluso si peores) sobre otras ambiguas.
      avoidance_of_uncertainty: |
        Rechazar opciones principalmente porque "no sabemos lo suficiente".
      familiarity_over_optimality: |
        Preferir lo conocido sobre lo desconocido potencialmente mejor.
      information_seeking: |
        Disposición a pagar por información que reduzca la ambigüedad, incluso cuando
        no cambie la decisión.
    examples:
      investing: |
        Preferir acciones nacionales sobre internacionales porque "las entendemos
        mejor" a pesar de los beneficios de diversificación.
      employment: |
        Permanecer en un trabajo conocido en lugar de aceptar un puesto con un potencial de mejora incierto.
      product_choice: |
        Elegir una marca familiar en lugar de una nueva opción con calidad incierta.
      medical: |
        Preferir un tratamiento con efectos secundarios conocidos sobre uno con resultados inciertos,
        incluso cuando este último podría ser mejor.
    real_world_implications: |
      El efecto de ambigüedad moldea mercados, elecciones de carrera y políticas. Puede ser
      reducido proporcionando información más clara o reformulando las decisiones.
      También explica por qué la transparencia y la comunicación reducen la ansiedad.
    professional_application:
      networking_and_relationship_building: |
        Reducir la ambigüedad en las relaciones: aclarar expectativas, comunicar
        explícitamente y reducir la incertidumbre. Las personas prefieren situaciones conocidas.
      collaborative_learning_initiative: |
        Al introducir cambios, reducir la ambigüedad: proporcionar información clara sobre
        lo que sucederá, cuándo y por qué. La ambigüedad aumenta la resistencia.
    how_can_this_be_misapplied:
      manipulation: |
        Crear deliberadamente ambigüedad para dirigir a las personas hacia opciones preferidas.
      false_clarity: |
        Proporcionar falsa certeza cuando existe incertidumbre genuina.
      overconfidence: |
        Asumir que reducir la ambigüedad siempre mejora las decisiones; a veces
        la opción ambigua es genuinamente mejor.
      analysis_paralysis: |
        Esperar información perfecta antes de decidir cuando cierta ambigüedad
        es inevitable.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - default_effect
  - id: anchoring_bias
    name: Sesgo de anclaje
    quick_introduction: |
      El sesgo de anclaje es la tendencia a depender demasiado de la primera información
      que se encuentra al tomar decisiones. Ese "ancla" inicial sesga los juicios posteriores,
      incluso cuando es irrelevante o arbitraria.
    one_liner: El primer número que ves moldea a todos los que le siguen.
    try_this:
      - Antes de una negociación, decide tu número objetivo y evita ser anclado por el suyo.
      - Al estimar, genera tu propio número antes de escuchar el de los demás.
      - Pregunta: ¿Pensaría diferente si hubiera visto un número diferente primero?
    ask_yourself:
      - ¿Qué número o idea encontré primero y está sesgando mi juicio?
      - ¿Me estoy ajustando lo suficiente desde el ancla, o sigo demasiado cerca de ella?
    in_more_detail: |
      En un experimento clásico, las personas a las que se les pidió que estimaran el porcentaje de naciones africanas
      en la ONU dieron estimaciones más altas si acababan de ver un número más alto (por ejemplo, 65 frente a 10).
      El ancla, incluso cuando es aleatoria, influyó en sus respuestas. El anclaje afecta las negociaciones,
      la fijación de precios, la contratación y la previsión.

      El primer número que vemos se convierte en un punto de referencia. Nos ajustamos a partir de él, pero
      generalmente de manera insuficiente. Incluso cuando sabemos que el ancla es arbitraria, aún puede influirnos.
      Los expertos no son inmunes.
    why_this_is_important: |
      Comprender el anclaje te ayuda a tomar mejores decisiones, negociar de manera más efectiva y evitar ser manipulado.
      También explica por qué el orden y el encuadre de la información son tan importantes.
    when_to_use:
      - toma_de_decisiones
      - negociacion
      - inversion
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      first_number_dominance: |
        El primer número en una negociación o estimación influye desproporcionadamente en el resultado.
      insufficient_adjustment: |
        Al ajustarse desde un ancla, las personas típicamente no se ajustan lo suficiente.
      arbitrary_anchor_influence: |
        Incluso los números obviamente irrelevantes (por ejemplo, los últimos dígitos de un número de seguro social)
        pueden afectar las estimaciones.
      order_effects: |
        La secuencia en la que se presentan las opciones cambia las elecciones.
    examples:
      salary_negotiation: |
        El primer número mencionado, ya sea por el empleador o el candidato, a menudo ancla la oferta final.
      real_estate: |
        El precio de lista ancla las percepciones de valor de los compradores, incluso cuando se establece deliberadamente
        alto o bajo.
      retail: |
        "Antes $99, ahora $49" utiliza el precio original como ancla para que el precio de venta parezca una ganga.
      forecasting: |
        Las estimaciones iniciales en las reuniones de planificación anclan las proyecciones posteriores, incluso cuando
        la primera estimación fue una suposición.
    real_world_implications: |
      El anclaje moldea mercados, negociaciones y políticas. Puede usarse éticamente (por ejemplo,
      estableciendo expectativas razonables) o sin ética (por ejemplo, precios manipuladores).
      Reconocerlo mejora la calidad de las decisiones.
    professional_application:
      networking_and_relationship_building: |
        En las negociaciones, considera hacer la primera oferta para establecer el ancla, o sé consciente
        de cuándo la otra parte lo está haciendo.
      collaborative_learning_initiative: |
        En las reuniones, ten cuidado con quién habla primero sobre las estimaciones; considera
        recopilar estimaciones independientes antes de la discusión.
    how_can_this_be_misapplied:
      manipulation: |
        Usar deliberadamente anclas extremas para dirigir a otros hacia resultados deseados.
      overconfidence_in_anchors: |
        Confiar demasiado en tu propia primera estimación sin revisarla.
      ignoring_relevant_information: |
        Permitir que un ancla anule datos más relevantes.
      exploitation: |
        Tácticas de venta que utilizan precios inflados de "comparar a" para hacer que los precios reales parezcan
        razonables.
    related_content:
      - framing_effect
      - loss_aversion_bias
      - default_effect
      - availability_heuristic
  - id: availability_cascade
    name: Cascada de disponibilidad
    quick_introduction: |
      Una cascada de disponibilidad es un proceso de auto-refuerzo donde una idea gana
      plausibilidad a través de la discusión pública repetida. Cuanto más se discute,
      más "disponible" se vuelve, más gente la cree, y más se discute. Una creencia colectiva gana impulso independientemente de su
      verdad subyacente.
    one_liner: Cuanto más se repite una idea, más plausible parece, independientemente de la evidencia.
    try_this:
      - Pregunta: ¿Esta creencia está generalizada porque es cierta, o porque se repite?
      - Busca fuentes primarias antes de aceptar "lo que todo el mundo sabe".
      - Observa cuándo la repetición por sí sola está impulsando tu sentido de plausibilidad.
    ask_yourself:
      - ¿Creería esto si lo hubiera oído solo una vez?
      - ¿Estoy confundiendo "todo el mundo lo dice" con "la evidencia lo respalda"?
    in_more_detail: |
      Timur Kuran y Cass Sunstein describieron cómo funcionan las cascadas de disponibilidad:
      la disponibilidad de información (con qué frecuencia oímos algo) y la plausibilidad
      (qué tan creíble parece) se refuerzan mutuamente. La cobertura mediática, las redes sociales
      y el discurso público amplifican ciertas ideas. Una vez que una idea alcanza
      un umbral de disponibilidad, puede propagarse rápidamente y convertirse en "conocimiento común"
      incluso si es falsa o exagerada.

      Las cascadas de disponibilidad pueden ser beneficiosas (difundiendo advertencias importantes)
      o perjudiciales (difundiendo pánico o desinformación). Están impulsadas por la
      heurística de disponibilidad y la prueba social.
    why_this_is_important: |
      Reconocer las cascadas de disponibilidad te ayuda a evaluar si la creencia generalizada
      refleja evidencia o mera repetición. Explica cómo las ideas se vuelven virales
      y cómo las creencias colectivas pueden estar equivocadas. Es esencial para
      la alfabetización mediática y el pensamiento crítico.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - aprendizaje
      - liderazgo
    how_can_you_spot_it:
      repetition_plausibility_spiral: |
        Cuanto más se repite una idea, más plausible parece.
      media_amplification: |
        La cobertura impulsa la creencia, que impulsa más cobertura.
      social_proof_belief: |
        "Todo el mundo lo cree" se convierte en evidencia para la creencia.
      threshold_effects: |
        Una vez que una idea cruza un umbral de visibilidad, se propaga rápidamente.
    examples:
      health_scares: |
        Un estudio sugiere que un producto es peligroso; los medios lo amplifican;
        el público lo evita; sigue más cobertura. El riesgo puede ser
        exagerado.
      financial_panic: |
        Se difunden rumores de quiebra de bancos; la gente retira su dinero; la corrida
        se vuelve auto-cumplida.
      social_media: |
        Una narrativa se vuelve viral; la repetición aumenta la creencia; la creencia
        aumenta el intercambio. La verdad y la viralidad pueden divergir.
      organizational: |
        Se difunde un rumor sobre despidos; la ansiedad aumenta; el comportamiento
        cambia; el rumor gana plausibilidad a través de la reacción.
    real_world_implications: |
      Las cascadas de disponibilidad moldean la opinión pública, la política y los mercados.
      Pueden difundir tanto verdades importantes como falsedades peligrosas.
      El pensamiento crítico requiere distinguir la creencia basada en evidencia
      de la creencia impulsada por cascadas.
    professional_application:
      networking_and_relationship_building: |
        Cuando una idea está "en todas partes", pregunta: ¿Es cierta porque se
        repite, o se repite porque es cierta? Busca fuentes primarias.
      collaborative_learning_initiative: |
        Crea normas de verificación antes de amplificar. Fomenta
        el cuestionamiento de "lo que todo el mundo sabe". Distingue el consenso
        que refleja evidencia del consenso que refleja
        disponibilidad.
    how_can_this_be_misapplied:
      dismissing_all_consensus: |
        A veces la creencia generalizada es correcta. No asumas que todas
        las ideas populares son cascadas.
      conspiracy_thinking: |
        Usar la "cascada de disponibilidad" para descartar preocupaciones legítimas
        como fabricadas.
      false_skepticism: |
        Rechazar ideas bien respaldadas porque son populares.
      contrarianism: |
        Asumir que todo lo que es ampliamente creído debe estar equivocado.
    related_content:
      - availability_heuristic
      - confirmation_bias
      - groupthink
      - bystander_effect
  - id: availability_heuristic
    name: Heurística de disponibilidad
    quick_introduction: |
      La heurística de disponibilidad es la tendencia a juzgar la probabilidad de
      los eventos por la facilidad con la que vienen a la mente ejemplos. Si podemos
      recordar fácilmente instancias, asumimos que el evento es común. Ejemplos vívidos,
      recientes o emocionales dominan nuestras estimaciones de probabilidad.
    one_liner: Lo que viene a la mente fácilmente se siente más probable, incluso cuando no lo es.
    try_this:
      - Preguntar: ¿Cuál es la tasa base? ¿Estoy dando demasiado peso a ejemplos vívidos o recientes?
      - Buscar datos cuando tu instinto diga "esto se siente común" o "esto se siente raro".
      - Notar cuándo una historia dramática está impulsando tu evaluación de riesgo.
    ask_yourself:
      - ¿Estoy juzgando la probabilidad por la facilidad de recuerdo en lugar de la frecuencia real?
      - ¿Pensaría de manera diferente si no hubiera visto ese titular hace poco?
    in_more_detail: |
      Usamos atajos mentales para estimar la frecuencia y la probabilidad. Un atajo es
      la disponibilidad: ¿qué viene a la mente fácilmente? Los accidentes aéreos son vívidos y
      ampliamente informados: sobreestimamos su probabilidad. Los accidentes automovilísticos son
      comunes pero menos salientes: subestimamos. La recencia, la vividez y el
      impacto emocional aumentan la disponibilidad.

      La heurística es útil cuando la disponibilidad se correlaciona con la frecuencia real.
      Pero los medios, la experiencia personal y la saliencia a menudo distorsionan la correlación.
      Tememos riesgos raros pero vívidos e ignoramos los comunes pero mundanos.
    why_this_is_important: |
      Reconocer la heurística de disponibilidad te ayuda a corregir las estimaciones de
      probabilidad, evitar reaccionar exageradamente a noticias vívidas y tomar mejores
      evaluaciones de riesgo. Explica muchos errores sistemáticos en el juicio.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - inversion
      - resolucion_de_problemas
    how_can_you_spot_it:
      vividness_dominance: |
        Ejemplos dramáticos o emocionales influyen desproporcionadamente en las estimaciones.
      recency_effect: |
        Los eventos recientes parecen tener más probabilidades de repetirse.
      personal_experience_overweighting: |
        "Conozco a alguien que..." moldea las estimaciones de probabilidad.
      media_distortion: |
        Lo que se informa a menudo no coincide con lo que es frecuente.
    examples:
      risk_perception: |
        Sobrestimar el riesgo de terrorismo (vívido, informado) y subestimar
        el riesgo de enfermedades cardíacas (común, menos dramático).
      investing: |
        Eventos recientes del mercado (caída, auge) dominan las expectativas para el futuro.
      hiring: |
        Una historia vívida sobre una mala contratación de una escuela determinada afecta
        la evaluación de todos los candidatos de esa escuela.
      health: |
        El diagnóstico de cáncer de un amigo hace que el cáncer parezca más probable de lo que sugieren las tasas base.
    real_world_implications: |
      La heurística de disponibilidad afecta las compras de seguros, las prioridades políticas y
      las decisiones personales. Es explotada por los medios y los especialistas en marketing. Corregir
      para ella requiere buscar tasas base y cuestionar lo que "viene a la mente".
    professional_application:
      networking_and_relationship_building: |
        Ten en cuenta que una experiencia negativa vívida con una persona o grupo puede
        distorsionar tu juicio. Busca tasas base y múltiples puntos de datos.
      collaborative_learning_initiative: |
        Al evaluar riesgos u oportunidades, pregunta explícitamente "¿Cuál es la tasa base?"
        y "¿Estoy dando demasiado peso a ejemplos vívidos?". Usa datos para corregir
        estimaciones impulsadas por la disponibilidad.
    how_can_this_be_misapplied:
      dismissing_intuition: |
        A veces la disponibilidad es informativa: la experiencia reciente puede indicar
        un cambio. No asumas que todos los juicios impulsados por la disponibilidad son erróneos.
      analysis_paralysis: |
        Sobrecerrar hasta el punto de ignorar señales de advertencia legítimas de
        experiencia vívida.
      false_objectivity: |
        Asumir que las tasas base son siempre correctas cuando pueden estar desactualizadas o
        no ser aplicables.
      manipulation: |
        Hacer deliberadamente ciertos ejemplos vívidos para dirigir los juicios de otros.
    related_content:
      - anchoring_bias
      - base_rate_fallacy
      - baader_meinhof_phenomenon
  - id: baader_meinhof_phenomenon
    name: El Fenómeno Baader-Meinhof
    quick_introduction: |
      El fenómeno Baader-Meinhof (también llamado ilusión de frecuencia) ocurre cuando aprendes
      algo nuevo y de repente lo notas en todas partes. Parece una coincidencia,
      pero a menudo es atención selectiva: tu cerebro está preparado para notar lo que ha encontrado recientemente.
    one_liner: Aprendes algo nuevo y de repente lo ves en todas partes; siempre estuvo ahí.
    try_this:
      - Cuando algo te parezca "estar en todas partes" después de haberlo aprendido, comprueba la tasa base.
      - Observa cuándo la recencia hace que algo parezca más significativo de lo que realmente es.
      - Pregunta: ¿Estoy viendo una tendencia real o solo notando lo que mi cerebro está preparado para notar?
    ask_yourself:
      - ¿Es esto realmente más común ahora, o simplemente lo estoy notando más?
      - ¿Habría notado este patrón si no hubiera aprendido sobre él recientemente?
    in_more_detail: |
      Después de escuchar sobre el grupo terrorista Baader-Meinhof, una persona podría ver referencias
      a él en las noticias, en conversaciones y en artículos a los pocos días. El fenómeno tiene
      dos componentes: atención selectiva (notas lo que buscas) y
      sesgo de confirmación (recuerdas los aciertos y olvidas los fallos).

      La ilusión es que la cosa se ha vuelto repentinamente más común. En realidad, siempre
      estuvo presente; simplemente no estabas sintonizado con ella. Esto puede llevar a sobreestimar
      la prevalencia o la importancia de la información recién aprendida.
    why_this_is_important: |
      Reconocer el fenómeno Baader-Meinhof te ayuda a evitar sobreestimar cuán común
      o significativo es algo basándote en la exposición reciente. También explica por qué las nuevas ideas,
      productos o tendencias pueden parecer que están "en todas partes" después de que las notes por primera vez.
    when_to_use:
      - toma_de_decisiones
      - aprendizaje
      - evaluacion_de_riesgos
      - resolucion_de_problemas
    how_can_you_spot_it:
      sudden_ubiquity: |
        Aprendes una nueva palabra, concepto o producto y en pocos días sientes que lo ves
        constantemente.
      recency_bias: |
        La información reciente parece más representativa de la realidad de lo que realmente es.
      pattern_seeking: |
        Tu cerebro conecta avistamientos no relacionados en una narrativa de "esto está en todas partes".
      forgetting_the_misses: |
        No rastreas la frecuencia con la que no ves algo, solo las veces que sí lo haces.
    examples:
      vocabulary: |
        Aprender la palabra "serendipia" y luego notarla en tres artículos diferentes
        la misma semana.
      car_purchase: |
        Después de decidir comprar un modelo de coche específico, lo ves en cada calle, aunque
        siempre estuvo ahí.
      health_anxiety: |
        Leer sobre un síntoma raro y luego notar sensaciones similares en ti mismo,
        lo que lleva a una preocupación innecesaria.
      trends: |
        Descubrir una nueva aplicación o tendencia y sentir que de repente domina, cuando puede
        tener una pequeña base de usuarios.
    real_world_implications: |
      El fenómeno afecta cómo percibimos las tendencias, los riesgos y las oportunidades. Los especialistas en marketing
      y los medios de comunicación pueden explotarlo creando exposición repetida. En la toma de decisiones, puede
      llevar a dar más peso a la información reciente.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien menciona un tema repetidamente después de aprenderlo, reconoce que puede estar
        experimentando la ilusión de frecuencia: el tema no es necesariamente más relevante, solo
        más notorio para esa persona.
      collaborative_learning_initiative: |
        En la formación, refuerza que "verlo en todas partes" después de aprender algo nuevo
        es normal; anima a comprobar las tasas base en lugar de confiar en la sensación
        de ubicuidad.
    how_can_this_be_misapplied:
      overestimating_prevalence: |
        Asumir que algo es más común o importante de lo que es porque lo has notado
        frecuentemente últimamente.
      confirmation_bias_amplification: |
        Usar la sensación de "verlo en todas partes" como evidencia de que una creencia es correcta.
      decision_distortion: |
        Tomar decisiones basadas en información recién aprendida que se siente desproporcionadamente
        significativa.
      vulnerability_to_manipulation: |
        Los anunciantes y propagandistas utilizan la exposición repetida para crear la ilusión de
        ubicuidad e importancia.
    related_content:
      - confirmation_bias
      - availability_heuristic
  - id: barnum_effect
    name: Efecto Barnum
    quick_introduction: |
      El efecto Barnum (o efecto Forer) es la tendencia a aceptar descripciones de personalidad vagas y generales como únicas y precisas. Los horóscopos, los adivinos y las pruebas de personalidad utilizan afirmaciones que se aplican a casi todo el mundo, pero creemos que son específicas de nosotros. Nos vemos en lo genérico.
    one_liner: Las afirmaciones vagas se sienten personales porque se aplican a casi todo el mundo.
    try_this:
      - Ask: ¿Podría esta descripción aplicarse a muchas personas? Pruébala con otra persona.
      - Seek specific, behavioral feedback instead of vague praise or criticism.
      - Notice when "personalized" insights feel too good to be discriminating.
    ask_yourself:
      - ¿Se sentiría precisa esta retroalimentación si se le diera a un desconocido?
      - ¿Estoy recordando los aciertos y olvidando los fallos?
    in_more_detail: |
      El psicólogo Bertram Forer dio a los estudiantes una retroalimentación idéntica "personalizada" (por ejemplo, "Tienes la necesidad de que a los demás les gustes y te admiren") y ellos la calificaron de muy precisa. Las afirmaciones eran lo suficientemente vagas como para aplicarse a cualquiera. P.T. Barnum supuestamente dijo: "Nace un tonto cada minuto", el efecto lleva el nombre de su habilidad para atraer a las masas con generalidades aparentemente personalizadas.

      El efecto funciona porque somos buenos encontrando relevancia personal en afirmaciones ambiguas. Recordamos los aciertos y olvidamos los fallos. Es la base de la lectura en frío y de muchos productos de "personalidad".
    why_this_is_important: |
      Reconocer el efecto Barnum te ayuda a evaluar las evaluaciones de personalidad, resistir la manipulación y evitar la sobreinterpretación de la retroalimentación vaga. Explica por qué los horóscopos se sienten precisos y por qué algunos consejos "personalizados" son genéricos.
    when_to_use:
      - toma_de_decisiones
      - aprendizaje
      - evaluacion_de_riesgos
      - construccion_de_relaciones
    how_can_you_spot_it:
      vague_accuracy: |
        Retroalimentación que se siente personal pero que podría aplicarse a muchas personas.
      selective_fit: |
        Nos centramos en lo que encaja e ignoramos lo que no.
      cold_reading: |
        Alguien te "lee" con afirmaciones que en realidad son genéricas.
      personality_test_enthusiasm: |
        Aceptación acrítica de los resultados de las evaluaciones como única y perspicaz.
    examples:
      horoscopes: |
        "A veces dudas de tus decisiones" se siente personal pero se aplica a la mayoría de las personas.
      fortune_telling: |
        Predicciones vagas que interpretamos como específicas de nuestra situación.
      personality_tests: |
        Algunas evaluaciones utilizan afirmaciones de Barnum y se sienten precisas sin ser discriminatorias.
      feedback: |
        Retroalimentación de rendimiento genérica que interpretamos como profundamente personalizada.
    real_world_implications: |
      El efecto Barnum se explota en la astrología, algunos coaching y evaluaciones de baja calidad. Puede crear una falsa confianza en herramientas inválidas. También explica por qué somos susceptibles a la adulación y a la retroalimentación positiva vaga.
    professional_application:
      networking_and_relationship_building: |
        Al recibir retroalimentación, pregunte "¿Podría aplicarse a muchas personas?". Busque retroalimentación específica y conductual en lugar de elogios o críticas vagas. Sea escéptico ante las ideas "personalizadas" que parecen demasiado buenas.
      collaborative_learning_initiative: |
        Al utilizar evaluaciones, elija herramientas validadas con validez discriminatoria. Evite instrumentos que dependan de afirmaciones de Barnum. Capacite a las personas para que reconozcan la retroalimentación vaga.
    how_can_this_be_misapplied:
      dismissing_all_feedback: |
        No toda la retroalimentación personalizada es de Barnum; alguna es genuinamente específica. No descarte todo lo vago.
      invalidating_experience: |
        Decirle a alguien que su experiencia de "insight" es "solo Barnum" cuando puede tener valor para él.
      overcorrection: |
        Rechazar todos los marcos de personalidad porque algunos utilizan afirmaciones de Barnum.
      false_skepticism: |
        Asumir que porque algo se siente preciso, debe ser de Barnum; a veces las cosas son precisas.
    related_content:
      - confirmation_bias
      - halo_effect
      - availability_heuristic
      - narrative_fallacy
  - id: base_rate_fallacy
    name: Falacia de la Tasa Base
    quick_introduction: |
      La falacia de la tasa base es la tendencia a ignorar información estadística general
      (tasas base) a favor de información específica y vívida. Sobreevaluamos el
      caso particular y subestimamos la probabilidad previa. Una sola historia convincente
      puede anular lo que dicen los números.
    one_liner: Una historia convincente puede anular lo que dicen los números.
    try_this:
      - Antes de juzgar un caso, pregunta: ¿Cuál es la tasa base para este tipo de situación?
      - Combina la evidencia específica con la probabilidad previa, no ignores ninguna.
      - Observa cuándo un ejemplo vívido está ahogando las estadísticas.
    ask_yourself:
      - ¿Estoy sobrevalorando este caso específico y subestimando la tasa base?
      - ¿Qué dirían los números si dejara a un lado la historia convincente?
    in_more_detail: |
      Si una enfermedad afecta al 1% de la población y una prueba es 95% precisa, un
      resultado positivo a menudo significa que la persona todavía probablemente no tiene la
      enfermedad, porque la tasa base es muy baja. Pero ignoramos las tasas base y
      nos centramos en "dio positivo". Nos dejamos llevar por lo específico sobre lo
      estadístico.

      La falacia afecta el diagnóstico médico, la contratación, la evaluación de riesgos y el juicio legal.
      Necesitamos combinar las tasas base con la evidencia específica del caso utilizando
      el razonamiento bayesiano, pero a menudo no lo hacemos.
    why_this_isimportant: |
      Corregir la falacia de la tasa base mejora el diagnóstico, la evaluación de riesgos y la calidad de las decisiones.
      Nos evita reaccionar exageradamente a casos vívidos y reaccionar poco a la realidad estadística.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - resolucion_de_problemas
      - inversion
    how_can_you_spot_it:
      ignoring_prior_probabilities: |
        Las tasas base no se incorporan en los juicios.
      vividness_over_statistics: |
        Un solo caso o historia domina sobre los datos agregados.
      diagnostic_overweighting: |
        Sobreevaluar nueva evidencia (p. ej., resultado de una prueba) sin considerar la tasa base.
      anecdote_override: |
        "Conozco a alguien que..." anula la evidencia estadística.
    examples:
      medical: |
        Una prueba positiva para una enfermedad rara: la tasa base es baja, por lo que un positivo
        a menudo es un falso positivo. Ignoramos esto y asumimos que tienen la enfermedad.
      hiring: |
        Un candidato tiene una gran entrevista: ignoramos las tasas base sobre cuán bien
        las entrevistas predicen el rendimiento.
      risk: |
        Un accidente de avión es vívido: sobreestimamos el riesgo de volar y subestimamos
        el riesgo de conducir, ignorando las tasas base.
      startup_investing: |
        Un fundador presenta bien: ignoramos que la mayoría de las startups fracasan independientemente de la calidad de la presentación.
    real_world_implications: |
      La falacia de la tasa base afecta las decisiones médicas, los juicios legales y la
      estrategia empresarial. Contribuye a la mala asignación de recursos y a
      una pobre evaluación de riesgos. El pensamiento bayesiano lo corrige.
    professional_application:
      networking_and_relationship_building: |
        Al evaluar personas, considera las tasas base: p. ej., ¿con qué frecuencia ocurre este tipo de comportamiento?
        No dejes que una interacción vívida anule el patrón más amplio.
      collaborative_learning_initiative: |
        Al tomar decisiones, declara y considera explícitamente las tasas base antes de
        incorporar evidencia específica del caso. Capacita a los equipos en razonamiento bayesiano.
    how_can_this_be_misapplied:
      base_rate_tyranny: |
        Ignorar evidencia sólida específica del caso cuando las tasas base sugieren lo contrario:
        a veces el caso individual es la excepción.
      stereotyping: |
        Usar tasas base para hacer juicios injustos sobre individuos.
      false_precision: |
        Aplicar tasas base con falsa precisión cuando son estimaciones aproximadas.
      dismissing_individuals: |
        "Las estadísticas dicen X" cuando el individuo frente a ti puede no ajustarse a la
        distribución.
    related_content:
      - bayes_theorem
      - availability_heuristic
      - narrative_fallacy
      - survivorship_bias
    why_this_is_important: |
      Correcting for the base rate fallacy improves diagnosis, risk assessment,
      and decision quality. It prevents us from overreacting to vivid cases and
      underreacting to statistical reality.
  - id: bayes_theorem
    name: Teorema de Bayes
    quick_introduction: |
      El teorema de Bayes describe cómo actualizar la probabilidad de una hipótesis
      cuando se recibe nueva evidencia. Formaliza la idea de que las creencias deben
      cambiar en proporción a cuánto las apoya la evidencia, no de forma absoluta,
      sino de manera incremental.
    one_liner: Actualiza tus creencias en proporción a cuánto las apoya la evidencia.
    try_this:
      - Empieza con tu creencia previa; pregunta cuán probable sería la evidencia si te equivocaras.
      - Actualiza incrementalmente; no cambies de 0% a 100% por un solo dato.
      - Considera hipótesis alternativas: ¿la evidencia también encajaría con ellas?
    ask_yourself:
      - ¿Cuánto cambia realmente esta evidencia la probabilidad?
      - ¿Estoy actualizando mis creencias o solo confirmando lo que ya pensaba?
    in_more_detail: |
      El teorema establece que la probabilidad de una hipótesis dada una evidencia es igual a la
      probabilidad previa multiplicada por la verosimilitud de la evidencia dada la hipótesis,
      dividido por la probabilidad de la evidencia. En la práctica: comienza con tu creencia
      previa, ve cuán consistente es la nueva evidencia con tu hipótesis frente a las alternativas,
      y actualiza en consecuencia.

      El pensamiento bayesiano contrarresta el sesgo de confirmación al requerir que consideres
      cuán probable sería la evidencia si te equivocaras. Es la base del razonamiento probabilístico
      y de la actualización científica.
    why_this_is_important: |
      El pensamiento bayesiano mejora la toma de decisiones bajo incertidumbre, te ayuda a
      evitar la sobreconfianza y proporciona un marco para aprender de la evidencia. Es esencial
      para el diagnóstico, la predicción y cualquier dominio con incertidumbre.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - evaluacion_de_riesgos
      - aprendizaje
    how_can_you_spot_it:
      prior_and_update: |
        Comenzar con una creencia de referencia y ajustarla en función de nueva evidencia.
      likelihood_ratio_thinking: |
        Preguntar "¿Cuán probable es esta evidencia si tengo razón frente a si me equivoco?"
      incremental_updating: |
        Las creencias cambian gradualmente con la evidencia en lugar de hacerlo abruptamente.
      base_rate_respect: |
        Las probabilidades previas (tasas base) importan, no solo el último punto de datos.
    examples:
      medical_diagnosis: |
        Una prueba positiva para una enfermedad rara: la creencia previa (baja prevalencia) significa
        que un resultado positivo a menudo es un falso positivo. Bayes actualiza la probabilidad.
      forecasting: |
        Actualizar predicciones a medida que llegan nuevos datos en lugar de ceñirse a las estimaciones iniciales.
      hiring: |
        Comenzar con tasas base para la adecuación al puesto, y luego actualizar basándose en el desempeño de la entrevista.
      investing: |
        Actualizar la probabilidad de que una empresa tenga éxito a medida que llega nueva información (ganancias, noticias).
    real_world_implications: |
      El pensamiento bayesiano sustenta la IA moderna, el diagnóstico médico y la inferencia científica.
      Corrige la negligencia de la tasa base y el sesgo de confirmación. Es una herramienta poderosa
      para cualquier dominio con incertidumbre.
    professional_application:
      networking_and_relationship_building: |
        Actualiza tus creencias sobre las personas basándote en nueva evidencia en lugar de mantener
        impresiones iniciales fijas. Considera las tasas base (por ejemplo, ¿cuán común es este comportamiento?)
        al interpretar acciones.
      collaborative_learning_initiative: |
        Anima a los equipos a declarar explícitamente sus creencias previas antes de las discusiones, y luego
        actualizar a medida que se presenta la evidencia. Reduce el anclaje y el sesgo de confirmación.
    how_can_this_be_misapplied:
      overprecision: |
        Asignar probabilidades exactas cuando la incertidumbre es alta.
      prior_rigidity: |
        Mantener creencias previas fuertes y no actualizar lo suficiente con nueva evidencia.
      base_rate_tyranny: |
        Ignorar evidencia fuerte porque las tasas base sugieren lo contrario; a veces la evidencia debería dominar.
      false_sophistication: |
        Usar lenguaje bayesiano para sonar riguroso sin hacer el razonamiento real.
    related_content:
      - base_rate_fallacy
      - confirmation_bias
      - probabilistic_thinking
      - map_is_not_the_territory
  - id: ben_franklin_effect
    name: El Efecto Ben Franklin
    quick_introduction: |
      El efecto Ben Franklin es el fenómeno psicológico por el cual las personas quieren más
      a alguien después de haberle hecho un favor. Contrariamente a la intuición de que hacemos favores a personas que nos gustan, a menudo llegamos a querer a personas para las que hemos hecho favores.
    one_liner: Llegamos a querer a las personas a las que les hemos hecho favores—nuestras actitudes siguen nuestras acciones.
    try_this:
      - Si quieres mejorar una relación, considera pedir un pequeño favor.
      - Date cuenta de cuándo hacer un favor cambia tus sentimientos hacia alguien.
      - Sé consciente de que los demás pueden quererte más después de ayudarte.
    ask_yourself:
      - ¿Hacerle un favor a alguien ha cambiado mi opinión sobre esa persona?
      - ¿Estoy racionalizando mi esfuerzo aumentando mi estima hacia ellos?
    in_more_detail: |
      Benjamín Franklin describió famosamente cómo ganarse a un legislador rival pidiéndole prestado un libro raro de su biblioteca. Después de que el hombre accediera, Franklin se lo devolvió con una nota de agradecimiento. La relación mejoró notablemente. El efecto sugiere que nuestras actitudes siguen nuestras acciones: cuando invertimos esfuerzo en ayudar a alguien, racionalizamos ese esfuerzo aumentando nuestra estima positiva hacia esa persona.

      La teoría de la disonancia cognitiva explica esto: cuando le hacemos un favor a alguien que nos desagrada o hacia quien nos sentimos neutrales, experimentamos tensión entre nuestra acción (ayudar) y nuestra actitud (desagrado). Resolver esa tensión queriéndolos más es a menudo más fácil que admitir que actuamos en contra de nuestras preferencias.
    why_this_is_important: |
      Comprender el efecto Ben Franklin te ayuda a construir relaciones estratégicamente y a reconocer cuándo tus propios sentimientos pueden estar influenciados por favores pasados. También explica por qué pedir pequeños favores puede ser más efectivo que ofrecerlos cuando intentas mejorar una relación.
    when_to_use:
      - construccion_de_relaciones
      - negociacion
      - liderazgo
      - resolucion_de_conflictos
    how_can_you_spot_it:
      liking_after_helping: |
        Observa cuándo te sientes más a gusto con alguien después de haberle hecho un favor, incluso si previamente te sentías neutral o negativo.
      others_requesting_small_favors: |
        Cuando alguien pide repetidamente pequeños favores, puede estar aprovechando consciente o inconscientemente este efecto para crear una conexión.
      attitude_shift_post_investment: |
        Después de invertir tiempo o esfuerzo en ayudar a alguien, observa si tu opinión sobre esa persona ha cambiado positivamente.
      reciprocal_relationship_dynamics: |
        Las relaciones en las que una persona ha hecho muchos favores pueden sentirse desequilibradas en afecto a pesar de parecer equilibradas en acción.
    examples:
      networking: |
        Pedirle a un colega su opinión sobre un borrador, lo que lleva a esa persona a sentirse más involucrada en tu éxito y más dispuesta positivamente hacia ti.
      sales: |
        Un vendedor le pide a un prospecto un pequeño favor (por ejemplo, una referencia o una introducción), lo que aumenta el compromiso y la simpatía del prospecto.
      conflict_resolution: |
        Después de un desacuerdo, pedirle a la otra parte ayuda con algo no relacionado puede suavizar las tensiones y reconstruir la buena voluntad.
      mentoring: |
        Cuando una persona mayor le pide a una persona más joven su opinión o ayuda, la persona más joven a menudo se siente más valorada y conectada.
    real_world_implications: |
      El efecto Ben Franklin influye en la contratación, las ventas, la diplomacia y las dinámicas sociales cotidianas. Puede usarse éticamente para construir puentes o de forma poco ética para manipular el afecto. Reconocerlo te ayuda a entender por qué algunas relaciones se sienten más fuertes después de dar favores asimétricos.
    professional_application:
      networking_and_relationship_building: |
        Al construir relaciones, considera pedir favores pequeños y razonables en lugar de solo ofrecerlos. El acto de ayudar crea inversión y estima positiva.
      collaborative_learning_initiative: |
        En los equipos, que los miembros se ayuden mutuamente (por ejemplo, revisión por pares, capacitación cruzada) puede fortalecer la cohesión. Estructura la colaboración para que todos den y reciban ayuda.
    how_can_this_be_misapplied:
      manipulation: |
        Pedir favores deliberadamente solo para que alguien te quiera, sin una necesidad genuina, puede sentirse explotador si se descubre.
      overreliance_on_favors: |
        Asumir que los favores por sí solos arreglarán una relación rota; algunos conflictos requieren una conversación directa y rendición de cuentas.
      asymmetric_exploitation: |
        Pedir favores repetidamente sin reciprocidad puede ser contraproducente y generar resentimiento.
      misattributing_motives: |
        Asumir que la calidez de alguien es puramente genuina cuando puede ser en parte el resultado de favores que te ha hecho.
    related_content:
      - cognitive_dissonance
      - fundamental_attribution_error
      - mere_exposure_effect
      - halo_effect
  - id: bounded_rationality
    name: Racionalidad Limitada
    quick_introduction: |
      La racionalidad limitada es la idea de que la toma de decisiones humana está limitada por la información
      disponible, la capacidad cognitiva y el tiempo. No optimizamos; "satisfacemos", es decir, elegimos
      opciones que son lo suficientemente buenas en lugar de las mejores posibles.
    one_liner: Satisfacemos—elegimos lo suficientemente bueno, no lo óptimo.
    try_this:
      - Simplifica las opciones cuando sea posible; demasiadas opciones abruman la racionalidad limitada.
      - Establece criterios de "suficientemente bueno" con antelación para evitar búsquedas interminables.
      - Date cuenta cuando estás optimizando más allá del punto de rendimientos decrecientes.
    ask_yourself:
      - ¿Estoy tratando de encontrar la opción perfecta cuando lo suficientemente bueno sería suficiente?
      - ¿Qué restricciones (tiempo, información, atención) están limitando mi decisión?
    in_more_detail: |
      Herbert Simon introdujo el concepto para desafiar la suposición económica clásica
      de actores racionales con información perfecta. En realidad, tenemos atención limitada,
      memoria de trabajo y tiempo. Utilizamos heurísticas y atajos para tomar decisiones que
      son "racionales" dadas nuestras limitaciones, aunque no sean óptimas en un sentido ideal.

      La racionalidad limitada explica por qué no siempre elegimos la mejor opción, por qué
      confiamos en reglas generales y por qué el contexto y el encuadre importan tanto. Es un modelo descriptivo
      de cómo decidimos en realidad, no una prescripción de cómo deberíamos hacerlo.
    why_this_is_important: |
      Comprender la racionalidad limitada te ayuda a diseñar mejores procesos, simplificar
      las opciones para otros y establecer expectativas realistas sobre la calidad de las decisiones. También
      explica por qué el comportamiento "irracional" es a menudo racional bajo ciertas restricciones.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - liderazgo
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      satisficing_behavior: |
        Las personas eligen la primera opción aceptable en lugar de comparar exhaustivamente.
      heuristic_reliance: |
        Las decisiones se toman utilizando reglas generales en lugar de un análisis completo.
      context_dependence: |
        La misma persona toma decisiones diferentes dependiendo de cómo se presenten las opciones.
      information_overload: |
        Cuando hay demasiada información disponible, la calidad de la decisión puede disminuir.
    examples:
      hiring: |
        Un gerente contrata al primer candidato que cumple con el estándar en lugar de entrevistar
        indefinidamente para encontrar al "mejor" candidato.
      consumer_choice: |
        Los compradores eligen entre las primeras opciones de un estante en lugar de comparar cada
        producto de la tienda.
      policy: |
        Los votantes utilizan la afiliación partidista o algunas cuestiones clave como atajos en lugar de
        analizar cada posición política.
      daily_routines: |
        Las personas siguen hábitos y valores predeterminados en lugar de re-optimizar cada decisión.
    real_world_implications: |
      La racionalidad limitada da forma a los mercados, el diseño de políticas y el comportamiento organizacional.
      Los "nudges" y la arquitectura de elección funcionan porque tienen en cuenta nuestras limitaciones. Ignorarla
      conduce a sistemas excesivamente complejos que las personas no pueden utilizar eficazmente.
    professional_application:
      networking_and_relationship_building: |
        No esperes que los demás procesen complejas compensaciones en tiempo real. Simplifica las opciones
        y proporciona valores predeterminados claros.
      collaborative_learning_initiative: |
        Diseña procesos que funcionen con la racionalidad limitada: reduce las opciones, proporciona
        valores predeterminados y utiliza listas de verificación para decisiones complejas.
    how_can_this_be_misapplied:
      overcomplicating_decisions: |
        Diseñar procesos que asumen una capacidad cognitiva ilimitada, lo que lleva a
        fatiga de decisión y malos resultados.
      blaming_irrationality: |
        Descartar las elecciones de los demás como irracionales sin considerar sus limitaciones.
      exploitation: |
        Abrumar deliberadamente a las personas con complejidad para dirigirlas hacia resultados deseados.
      perfectionism: |
        Esperar decisiones óptimas cuando satisfacer es a menudo el enfoque racional.
    related_content:
      - default_effect
      - framing_effect
      - availability_heuristic
      - cognitive_dissonance
  - id: bystander_effect
    name: Efecto Espectador
    quick_introduction: |
      El efecto espectador es la tendencia de los individuos a ser menos propensos a
      ofrecer ayuda cuando hay otras personas presentes. Cuantos más espectadores haya, menos
      probable será que una persona actúe. La responsabilidad se difumina; asumimos
      que alguien más ayudará.
    one_liner: Cuantas más personas presentes, menos probable es que una persona actúe.
    try_this:
      - En emergencias, asigna la responsabilidad directamente: Tú, llama al 911.
      - No asumas que alguien más ayudará; actúa o delega explícitamente.
      - Date cuenta cuando esperas a que otros actúen primero.
    ask_yourself:
      - ¿Estoy difuminando la responsabilidad porque hay otros presentes?
      - ¿Actuaría diferente si estuviera solo?
    in_more_detail: |
      Tras el asesinato de Kitty Genovese (aunque la historia fue parcialmente mitificada),
      los investigadores descubrieron que la presencia de otros reduce la ayuda. Buscamos
      en los demás señales; si nadie actúa, interpretamos que "no se necesita acción".
      También experimentamos la difusión de la responsabilidad: con muchas personas presentes,
      cada uno se siente menos personalmente responsable. Puede ocurrir ignorancia pluralista:
      todos piensan que algo anda mal pero nadie actúa porque nadie más está actuando.

      El efecto es más fuerte cuando la situación es ambigua y cuando
      los espectadores no se conocen entre sí. Se puede superar mediante la asignación directa
      de responsabilidad ("Tú, llama al 911").
    why_this_is_important: |
      Comprender el efecto espectador te ayuda a tomar medidas cuando otros no lo hacen,
      y a diseñar sistemas que lo superen. Si tienes problemas, señala a una persona específica.
      Si eres un espectador, no esperes a que otros actúen.
    when_to_use:
      - liderazgo
      - creacion_de_redes
      - resolucion_de_conflictos
      - toma_de_decisiones
    how_can_you_spot_it:
      diffusion_of_responsibility: |
        "Alguien más lo hará" cuando hay muchos presentes.
      pluralistic_ignorance: |
        Todos piensan que se necesita acción pero nadie actúa porque nadie
        más está actuando.
      social_proof_inaction: |
        La inacción de otros se interpreta como "no se necesita acción".
      audience_inhibition: |
        El miedo a parecer tonto o a reaccionar de forma exagerada impide la acción.
    examples:
      emergency: |
        Una persona se desmaya; con muchos espectadores, es menos probable que cada uno
        llame a emergencias.
      workplace: |
        Todos ven un problema pero nadie lo menciona; cada uno asume
        que alguien más lo hará.
      harassment: |
        Los testigos de acoso no intervienen, pensando cada uno
        que otros actuarán.
      meetings: |
        Una mala idea no es cuestionada porque todos asumen
        que alguien más hablará.
    real_world_implications: |
      El efecto espectador puede tener consecuencias trágicas en emergencias
      y permite que los problemas persistan en las organizaciones. Superarlo
      requiere una asignación directa de responsabilidades y normas que fomenten
      la intervención.
    professional_application:
      networking_and_relationship_building: |
        Cuando necesites ayuda, pide a una persona específica. Cuando veas
        algo mal, actúa; no asumas que otros lo harán. Crea normas
        en las que se espere y recompense que se hable.
      collaborative_learning_initiative: |
        Entrena a las personas para que reconozcan el efecto espectador e intervengan.
        Utiliza "si ves algo, di algo" y asigna roles explícitos.
        Recompensa a quienes hablan primero.
    how_can_this_be_misapplied:
      blaming_bystanders: |
        Juzgar duramente a los individuos cuando el efecto es una poderosa
        fuerza situacional; céntrate en cambiar la situación.
      false_assumption: |
        Asumir que alguien siempre ayudará si hay suficientes personas
        presentes; a menudo ocurre lo contrario.
      overcorrection: |
        Hacer que todos sean responsables para que nadie lo sea; la difusión
        aún puede ocurrir.
      individualizing: |
        Tratar el efecto espectador como un defecto de carácter en lugar
        de un fenómeno situacional.
    related_content:
      - groupthink
      - in_group_bias
      - availability_cascade
      - fundamental_attribution_error
  - id: circle_of_competence
    name: Círculo de Competencia
    quick_introduction: |
      El círculo de competencia es un modelo mental que te insta a conocer los límites
      de tu experiencia y a mantenerte dentro de ellos al tomar decisiones importantes. Warren Buffett
      y Charlie Munger enfatizan la importancia de saber lo que no sabes.
    one_liner: Conoce los límites de tu experiencia y mantente dentro de ellos cuando importe.
    try_this:
      - Dibuja dónde tienes experiencia genuina frente a dónde estás adivinando.
      - Cuando estés fuera de tu círculo, busca consejo o delega.
      - Sé honesto: ¿un verdadero experto estaría de acuerdo con tu juicio aquí?
    ask_yourself:
      - ¿Estoy dentro de mi círculo de competencia o estoy adivinando?
      - ¿Cuándo fue la última vez que admití "no sé" en este dominio?
    in_more_detail: |
      Cada persona tiene áreas donde tiene experiencia genuina, donde puede evaluar
      información, detectar errores y emitir juicios fiables. Fuera de ese círculo, son
      propensos a los mismos sesgos y errores que cualquier otra persona. La clave es una
      autoevaluación honesta: ¿dónde eres verdaderamente competente y dónde estás adivinando?

      El círculo puede expandirse a través del aprendizaje deliberado, pero requiere humildad para
      reconocer sus límites actuales. Operar fuera de tu círculo aumenta el riesgo de errores costosos, especialmente cuando las apuestas son altas.
    why_this_is_important: |
      Mantenerse dentro de tu círculo de competencia reduce los errores costosos y mejora
      la calidad de las decisiones. También te ayuda a saber cuándo buscar consejo, delegar o
      abstenerte. El exceso de confianza fuera de tu círculo es una fuente importante de fracaso.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - movimientos_profesionales
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      honest_boundary_assessment: |
        ¿Puedes explicar los límites de tu conocimiento en un dominio? ¿Sabes lo que no sabes?
      knowing_when_to_defer: |
        Reconocer situaciones en las que deberías buscar la opinión de expertos en lugar de decidir solo.
      consistent_track_record: |
        Dentro de tu círculo, tus juicios tienden a ser validados con el tiempo; fuera de él, no lo son.
      calibration: |
        Tu confianza en un dominio coincide con tu desempeño real en ese dominio.
    examples:
      investing: |
        Buffett evita las acciones tecnológicas porque dice que están fuera de su círculo de
        competencia; no puede evaluarlas de manera fiable.
      career: |
        Un especialista que se mantiene en su dominio frente a uno que asume un rol "desafiante" en un
        área no relacionada.
      hiring: |
        Saber cuándo confiar en tu propio juicio frente a la intervención de especialistas para
        roles técnicos.
      advice_giving: |
        Rechazar opinar sobre temas fuera de tu experiencia en lugar de adivinar.
    real_world_implications: |
      El círculo de competencia es fundamental para la inversión en valor y el éxito profesional.
      Ignorarlo conduce a un exceso de confianza, fracasos empresariales y malos consejos. Expandir
      el círculo requiere un esfuerzo deliberado y retroalimentación honesta.
    professional_application:
      networking_and_relationship_building: |
        Establece relaciones con personas cuyos círculos de competencia complementan los tuyos.
        Sabe cuándo presentar a otros en lugar de responder tú mismo.
      collaborative_learning_initiative: |
        Crea equipos con círculos superpuestos y complementarios. Anima a las personas a señalar
        cuando están operando fuera de su competencia.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Nunca aventurarse fuera de tu círculo puede limitar el crecimiento y el aprendizaje.
      false_modesty: |
        Reclamar un círculo diminuto para evitar la rendición de cuentas o decisiones difíciles.
      gatekeeping: |
        Usar el "círculo de competencia" para desestimar a otros sin involucrar sus argumentos.
      stagnation: |
        Tratar el círculo como fijo en lugar de algo que puede expandirse con esfuerzo.
    related_content:
      - dunning_kruger_effect
      - bayes_theorem
      - second_order_thinking
  - id: cognitive_dissonance
    name: Disonancia Cognitiva
    quick_introduction: |
      La disonancia cognitiva es la incomodidad mental que sentimos al tener creencias contradictorias, o cuando nuestras acciones contradicen nuestras creencias. Estamos motivados a reducir esta incomodidad, a menudo cambiando nuestras creencias para que coincidan con nuestras acciones en lugar de cambiar nuestras acciones.
    one_liner: Cambiamos nuestras creencias para que coincidan con nuestras acciones con más frecuencia que al revés.
    try_this:
      - Nota cuándo estás racionalizando para reducir la incomodidad en lugar de cambiar tu comportamiento.
      - Pregunta: ¿Estoy ajustando mis creencias para justificar lo que hice?
      - Considera si cambiar la acción sería más honesto que cambiar la creencia.
    ask_yourself:
      - ¿Estoy reduciendo la disonancia racionalizando, o realmente cambiando?
      - ¿Tendría esta creencia si ya no hubiera actuado de esta manera?
    in_more_detail: |
      La teoría de Leon Festinger explica que buscamos la consistencia. Cuando actuamos en contra de nuestros valores (por ejemplo, mentir, malgastar dinero), experimentamos disonancia. Para reducirla, podríamos cambiar nuestra creencia ("En realidad no fue una mentira") o minimizar la acción ("No fue tan grave"). A menudo racionalizamos en lugar de reformar.

      La disonancia cognitiva impulsa el efecto Ben Franklin (nos gustan las personas a las que hemos ayudado), explica por qué justificamos decisiones pasadas y subyace en muchas autoengaños. Es una fuerza poderosa en la formación y el cambio de creencias.
    why_this_is_important: |
      Comprender la disonancia cognitiva te ayuda a reconocer tus propias racionalizaciones y a entender por qué las personas se resisten a cambiar de opinión. También explica por qué el compromiso y la consistencia son poderosos principios de persuasión.
    when_to_use:
      - toma_de_decisiones
      - construccion_de_relaciones
      - liderazgo
      - resolucion_de_conflictos
    how_can_you_spot_it:
      post_decision_rationalization: |
        Después de una elección, enfatizamos los aspectos positivos de nuestra elección y los negativos de las opciones rechazadas.
      belief_action_alignment: |
        Ajustamos las creencias para que coincidan con las acciones que ya hemos tomado.
      discomfort_with_inconsistency: |
        Malestar cuando notamos que nuestro comportamiento no coincide con nuestros valores declarados.
      resistance_to_disconfirming_evidence: |
        Desestimar o minimizar la información que entra en conflicto con nuestros compromisos.
    examples:
      purchase_justification: |
        Después de comprar un artículo caro, enfatizamos sus beneficios y minimizamos el costo.
      relationship: |
        Racionalizamos quedarnos en una mala relación centrándonos en lo bueno y minimizando lo malo.
      career: |
        Justificamos quedarnos en un trabajo que no nos gusta enfatizando las razones por las que "tenemos que" quedarnos.
      beliefs: |
        Cuando nuestras acciones contradicen nuestros valores, cambiamos nuestros valores ("En realidad no soy vegetariano, solo como carne a veces") en lugar de nuestras acciones.
    real_world_implications: |
      La disonancia cognitiva moldea la formación de creencias, el comportamiento del consumidor y las actitudes políticas. Explica por qué las personas redoblan sus esfuerzos después de malas decisiones y por qué cambiar el comportamiento puede cambiar las creencias.
    professional_application:
      networking_and_relationship_building: |
        Los pequeños compromisos pueden llevar a otros mayores; las personas racionalizan sus acciones pasadas. Úsalo éticamente: comienza con peticiones pequeñas. Sé consciente cuando estás racionalizando tu propio comportamiento.
      collaborative_learning_initiative: |
        Al introducir cambios, obtén la aprobación temprana y compromisos pequeños; crean disonancia que motiva una adopción mayor. Evita forzar compromisos públicos que creen resentimiento.
    how_can_this_be_misapplied:
      manipulation: |
        Crear deliberadamente disonancia para presionar a las personas a cumplir.
      dismissing_genuine_change: |
        Asumir que todo cambio de creencia es racionalización cuando a veces las personas se actualizan genuinamente.
      forced_consistency: |
        Presionar a las personas a ser "consistentes" cuando sus puntos de vista han evolucionado legítimamente.
      self_deception: |
        Usar la teoría de la disonancia para justificar evitar verdades incómodas sobre nosotros mismos.
    related_content:
      - ben_franklin_effect
      - confirmation_bias
      - sunk_cost_fallacy
      - fundamental_attribution_error
  - id: confirmation_bias
    name: Sesgo de confirmación
    quick_introduction: |
      El sesgo de confirmación es la tendencia a buscar, interpretar y recordar
      información de manera que confirme nuestras creencias existentes. Damos más
      peso a la evidencia de apoyo y descartamos o ignoramos la evidencia que
      contradice nuestras opiniones. Hacemos preguntas que confirman en lugar de
      probar nuestras hipótesis.
    one_liner: Buscamos y recordamos lo que confirma nuestras creencias; descartamos lo que las contradice.
    try_this:
      - Pregunta: ¿Qué me haría estar equivocado? Busca activamente evidencia que desacredite tu punto de vista.
      - Observa cuándo le das más peso a la información de apoyo que a la contradictoria.
      - Considera la opinión opuesta tan seriamente como la tuya.
    ask_yourself:
      - ¿Estoy probando mi hipótesis o simplemente confirmándola?
      - ¿Cuándo fue la última vez que cambié de opinión basándome en nueva evidencia?
    in_more_detail: |
      No somos procesadores neutrales de información. Buscamos confirmación,
      interpretamos la ambigüedad como apoyo y recordamos los aciertos más que los
      errores. Nos rodeamos de personas y medios de comunicación afines.
      Preguntamos "¿Por qué tengo razón?" en lugar de "¿Qué me haría estar equivocado?".
      Esto nos hace tener demasiada confianza y lentos para actualizarnos.

      El sesgo de confirmación es uno de los sesgos más generalizados y bien
      documentados. Afecta a la ciencia, la política, las relaciones y los negocios.
      Superarlo requiere un esfuerzo deliberado y procesos estructurados.
    why_this_is_important: |
      Reconocer el sesgo de confirmación es esencial para una buena toma de
      decisiones y aprendizaje. Te ayuda a buscar evidencia que desacredite,
      considerar hipótesis alternativas y actualizar tus creencias cuando esté
      justificado. Es la base del pensamiento científico.
    when_to_use:
      - toma_de_decisiones
      - aprendizaje
      - resolución_de_problemas
      - evaluación_de_riesgos
    how_can_you_spot_it:
      seeking_support: |
        Buscar evidencia que confirme en lugar de probar tu punto de vista.
      asymmetric_interpretation: |
        Interpretar evidencia ambigua como apoyo a tu posición.
      discounting_disconfirming: |
        Descartar o minimizar evidencia que contradice tus creencias.
      selective_exposure: |
        Consumir solo información de fuentes que concuerdan contigo.
    examples:
      hiring: |
        Formar una impresión positiva temprana y luego hacer preguntas que
        confirmen que el candidato es genial.
      investing: |
        Después de comprar una acción, buscar noticias positivas y descartar
        análisis negativos.
      relationships: |
        Interpretar las acciones de una pareja a través de un lente que
        confirme tu visión sobre ella (buena o mala).
      politics: |
        Aceptar información de tu lado sin crítica y rechazar información
        equivalente del otro lado.
    real_world_implications: |
      El sesgo de confirmación perpetúa creencias falsas, alimenta la polarización
      y causa errores costosos. Es el enemigo de la buena ciencia y de la buena
      toma de decisiones. Superarlo requiere una búsqueda deliberada de
      desconfirmación.
    professional_application:
      networking_and_relationship_building: |
        Al formarte opiniones sobre las personas, busca activamente evidencia
        que desacredite tu punto de vista. Pregunta "¿Qué cambiaría mi opinión?"
        y búscala.
      collaborative_learning_initiative: |
        Utiliza al abogado del diablo, equipos rojos y pre-mortem para exponer
        perspectivas que desacrediten tus ideas. Recompensa a las personas que
        desafían las visiones predominantes con buena evidencia.
    how_can_this_be_misapplied:
      false_balance: |
        Tratar todas las opiniones como igualmente válidas cuando la evidencia
        apoya fuertemente un lado.
      excessive_skepticism: |
        Descartar toda la evidencia como "sesgo de confirmación" cuando
        algunas creencias están bien fundamentadas.
      contrarianism: |
        Adoptar la opinión opuesta solo para evitar el sesgo de confirmación,
        cuando la opinión original puede ser correcta.
      analysis_paralysis: |
        Nunca comprometerse con una opinión porque "podríamos estar
        sesgados".
    related_content:
      - false_consensus_effect
      - availability_heuristic
      - bayes_theorem
      - dunning_kruger_effect
  - id: curse_of_knowledge
    name: Maldición del conocimiento
    quick_introduction: |
      La maldición del conocimiento es la dificultad de imaginar cómo es no
      saber algo una vez que lo sabes. Los expertos tienen dificultades para enseñar a los principiantes porque
      no pueden recrear la perspectiva del principiante. Una vez que sabes, olvidas
      cómo era no saber.
    one_liner: Una vez que sabes algo, olvidas cómo era no saberlo.
    try_this:
      - Al explicar, empieza desde los primeros principios: asume que tu audiencia no sabe nada.
      - Pídele a un principiante que te lo explique de vuelta; su confusión revela tus puntos ciegos.
      - Date cuenta cuando te saltas pasos o usas jerga que otros podrían no conocer.
    ask_yourself:
      - ¿Estoy asumiendo que otros tienen el mismo contexto que yo?
      - ¿Alguien sin mi experiencia entendería esto?
    in_more_detail: |
      En un experimento clásico, personas que sabían la respuesta a un acertijo golpearon el
      ritmo de una canción y esperaban que otros la adivinaran; sobreestimaron lo
      obvia que era. Los que golpeaban el ritmo no podían "desoír" la canción en sus cabezas.
      El conocimiento es "pegajoso"; es difícil simular la ignorancia.

      La maldición afecta la enseñanza, la comunicación, el diseño de productos y el liderazgo.
      Asumimos que otros tienen el mismo contexto que nosotros. Usamos jerga. Nos saltamos
      pasos. Nos sorprende cuando la gente no "lo capta".
    why_this_is_important: |
      Reconocer la maldición del conocimiento mejora la enseñanza, la comunicación y
      el diseño de productos. Te ayuda a encontrarte con las personas donde están, en lugar de
      donde estás tú. Es esencial para una transferencia de conocimiento efectiva.
    when_to_use:
      - aprendizaje
      - liderazgo
      - resolucion_de_problemas
      - construccion_de_relaciones
    how_can_you_spot_it:
      obvious_to_you: |
        "Es obvio" cuando solo es obvio porque sabes la respuesta.
      jargon_use: |
        Usar términos que la audiencia no conoce sin definirlos.
      skipped_steps: |
        Asumir que otros completarán lo que has dejado fuera.
      frustration_with_learners: |
        "¿Cómo no pueden verlo?" cuando carecen de tu contexto.
    examples:
      teaching: |
        Un profesor de matemáticas se salta pasos que son "obvios" para él, pero
        esenciales para los estudiantes.
      product_design: |
        Los diseñadores crean interfaces que tienen sentido para ellos, pero confunden
        a los nuevos usuarios.
      onboarding: |
        Los empleados experimentados olvidan lo que los nuevos empleados no saben y
        proporcionan una capacitación inadecuada.
      writing: |
        Los autores asumen que los lectores tienen el mismo bagaje y omiten
        el contexto necesario.
    real_world_implications: |
      La maldición del conocimiento crea brechas de comunicación, productos fallidos
      y enseñanza ineficaz. Es una razón por la que los expertos pueden ser malos
      maestros. Superarla requiere un esfuerzo deliberado para adoptar la
      perspectiva de la audiencia.
    professional_application:
      networking_and_relationship_building: |
        Al explicar, comienza desde el nivel de la otra persona. Pregunta "¿Qué
        saben ya?". Pon a prueba tu comunicación con alguien
        que no tenga tu experiencia.
      collaborative_learning_initiative: |
        Utiliza ejercicios de "explica como si tuviera cinco años". Haz que los expertos enseñen
        a los principiantes y obtén retroalimentación. Crea documentación que asuma
        ningún conocimiento previo. Usa la enseñanza entre pares: las personas que han aprendido
        recientemente recuerdan la perspectiva del principiante.
    how_can_this_be_misapplied:
      oversimplification: |
        Simplificar hasta el punto de la inexactitud o la condescendencia.
      false_assumption: |
        Asumir que otros saben menos de lo que realmente saben; también es un fallo de
        calibración.
      one_size_fits_all: |
        No todas las audiencias necesitan el mismo nivel de explicación; adáptala
        a la audiencia.
      avoiding_complexity: |
        Algunos temas son complejos; la maldición del conocimiento no significa
        que nunca debamos usar lenguaje técnico cuando sea apropiado.
    related_content:
      - dunning_kruger_effect
      - false_consensus_effect
      - empathy_gap
      - availability_heuristic
  - id: default_effect
    name: Efecto por Defecto
    quick_introduction: |
      El efecto por defecto es la tendencia a elegir la opción preseleccionada cuando
      se presentan opciones. Lo que sea que esté configurado como el valor predeterminado
      tiene una gran ventaja: las personas a menudo se quedan con él, independientemente
      de si es óptimo para ellas.
    one_liner: Lo que sea que esté configurado como el valor predeterminado tiene una gran ventaja—nos quedamos con él.
    try_this:
      - Observa cuándo aceptas el valor predeterminado sin evaluar alternativas.
      - Al diseñar opciones, establece valores predeterminados que sirvan a los mejores intereses de los usuarios.
      - Pregúntate: ¿Elegiría esto si no estuviera preseleccionado?
    ask_yourself:
      - ¿Estoy eligiendo el valor predeterminado por inercia, o porque es lo mejor para mí?
      - ¿Quién estableció este valor predeterminado y qué podría ganar de él?
    in_more_detail: |
      Los valores predeterminados funcionan por inercia, aversión a la pérdida (cambiar se siente como perder el valor predeterminado) y respaldo implícito (asumimos que el valor predeterminado es recomendado).
      Las tasas de donación de órganos varían drásticamente según el país, basándose en gran medida en si
      el valor predeterminado es de opt-in (participación voluntaria) u opt-out (exclusión voluntaria). La participación en el ahorro para la jubilación aumenta
      cuando la inscripción es automática.

      Los valores predeterminados se pueden usar para el bien (impulsar hacia mejores resultados) o para la
      manipulación (ocultar términos desfavorables en casillas premarcadas). Comprender
      el efecto te ayuda a diseñar mejores sistemas y a resistir valores predeterminados no deseados.
    why_this_is_important: |
      Comprender el efecto por defecto te ayuda a diseñar una arquitectura de elección que
      mejora los resultados, y te ayuda a reconocer cuándo tus elecciones están siendo
      moldeadas por valores predeterminados en lugar de preferencias deliberadas.
    when_to_use:
      - toma_de_decisiones
      - liderazgo
      - resolucion_de_problemas
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      inertia_toward_default: |
        La mayoría de las personas se quedan con lo que sea que esté preseleccionado.
      implied_recommendation: |
        Interpretamos el valor predeterminado como "lo que quieren que elijamos".
      opt_in_vs_opt_out: |
        El encuadre cambia drásticamente la participación (opt-in vs. opt-out).
      pre_checked_boxes: |
        Las opciones preseleccionadas tienen una fuerte ventaja en formularios y configuraciones.
    examples:
      organ_donation: |
        Los países con exclusión voluntaria (opt-out) tienen tasas de donación mucho más altas que los países con participación voluntaria (opt-in):
        el valor predeterminado importa más que las actitudes.
      retirement_savings: |
        La inscripción automática aumenta drásticamente la participación en 401(k).
      software_installers: |
        Las opciones "recomendadas" y los complementos premarcados moldean lo que los usuarios instalan.
      subscriptions: |
        Las pruebas gratuitas que por defecto pasan a ser inscripciones de pago capturan a muchos que no
        elegirían activamente suscribirse.
    real_world_implications: |
      El efecto por defecto es uno de los impulsos (nudges) más poderosos. Moldea el ahorro,
      la salud, la privacidad y el comportamiento del consumidor. La arquitectura de elección ética utiliza
      los valores predeterminados para mejorar los resultados; los patrones oscuros los utilizan para explotar.
    professional_application:
      networking_and_relationship_building: |
        Al diseñar procesos para otros, elige valores predeterminados que sirvan a sus
        intereses. Evita patrones oscuros que utilicen valores predeterminados para extraer valor.
      collaborative_learning_initiative: |
        Establece valores predeterminados para las prácticas de equipo (por ejemplo, por defecto asíncrono, por defecto
        documentación) que se alineen con el comportamiento deseado. Haz que la elección correcta sea la elección fácil.
    how_can_this_be_misapplied:
      dark_patterns: |
        Usar valores predeterminados para engañar a las personas a tomar decisiones desfavorables (por ejemplo, cargos ocultos,
        suscripciones no deseadas).
      paternalism: |
        Imponer valores predeterminados que anulan la preferencia genuina sin consentimiento.
      manipulation: |
        Ocultar términos desfavorables en valores predeterminados y contar con la inercia.
      one_size_fits_all: |
        Asumir que el mismo valor predeterminado es correcto para todos cuando las preferencias varían.
    related_content:
      - anchoring_bias
      - framing_effect
      - loss_aversion_bias
      - bounded_rationality
  - id: dunning_kruger_effect
    name: Efecto Dunning-Kruger
    quick_introduction: |
      El efecto Dunning-Kruger describe un sesgo cognitivo donde las personas con
      conocimiento o habilidad limitados en un dominio sobreestiman su competencia,
      mientras que los expertos tienden a subestimarla. Cuanto menos sepas, más
      confiado podrías estar.
    one_liner: Cuanto menos sepas, más confiado podrías estar.
    try_this:
      - En dominios nuevos, asume que tienes exceso de confianza: busca retroalimentación y calibración.
      - Cuando los expertos expresan dudas, tómalo en serio; pueden conocer los casos límite.
      - Observa cuándo los novatos están más seguros que los expertos en un campo.
    ask_yourself:
      - ¿Estoy en el "pico de la estupidez" o en el "valle de la humildad"?
      - ¿Tengo la capacidad metacognitiva para evaluar mi propia competencia aquí?
    in_more_detail: |
      La investigación de Dunning y Kruger mostró que los individuos incompetentes
      carecen de la habilidad metacognitiva para reconocer su propia incompetencia.
      Para evaluar tu desempeño, necesitas las mismas habilidades requeridas para
      desempeñarte bien, por lo que los inexpertos están doblemente en desventaja:
      se desempeñan mal y no lo saben.

      A medida que aumenta la competencia, las personas a menudo experimentan un
      "valle de la humildad" donde reconocen cuánto no saben. Los verdaderos expertos
      pueden tener poca confianza porque son muy conscientes de los matices y los
      casos límite.
    why_this_is_important: |
      Reconocer el efecto Dunning-Kruger te ayuda a calibrar tu propia confianza,
      evitar sobreestimar las opiniones de los novatos y apreciar la humildad de los
      expertos. Es esencial para el aprendizaje, la contratación y la toma de decisiones.
    when_to_use:
      - aprendizaje
      - toma_de_decisiones
      - liderazgo
      - movimientos_profesionales
    how_can_you_spot_it:
      novice_overconfidence: |
        Alguien con poca experiencia expresa opiniones fuertes y sin cualificar.
      expert_underconfidence: |
        Las personas altamente cualificadas se reservan y expresan incertidumbre
        más que las personas menos cualificadas.
      inability_to_recognize_quality: |
        Los de bajo rendimiento no pueden distinguir el trabajo bueno del malo en
        su dominio.
      confidence_competence_mismatch: |
        La confianza y la habilidad real están inversamente correlacionadas entre
        los principiantes.
    examples:
      social_media: |
        Personas con conocimiento superficial de un tema discuten con confianza con
        expertos del dominio.
      hiring: |
        Los candidatos que se desempeñan mal en las entrevistas a veces califican
        su propio desempeño de manera alta.
      investing: |
        Los nuevos inversores pueden tener exceso de confianza después de victorias
        tempranas, sin reconocer la suerte.
      workplace: |
        Los empleados junior pueden sobreestimar su preparación para un ascenso,
        mientras que los seniors dudan de sí mismos.
    real_world_implications: |
      El efecto Dunning-Kruger afecta la educación, la contratación, la política y
      el discurso público. Explica por qué las malas ideas se amplifican y por qué
      los expertos pueden ser despedidos. La calibración importa para la toma de
      decisiones individual y colectiva.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien tiene mucha confianza, considera si podría estar en la
        zona Dunning-Kruger. Busca perspectivas diversas, incluidas las de aquellos
        que expresan incertidumbre.
      collaborative_learning_initiative: |
        Crea culturas donde se valore admitir la incertidumbre. Fomenta ejercicios
        de calibración y retroalimentación que ayuden a las personas a evaluar
        con precisión su competencia.
    how_can_this_be_misapplied:
      dismissing_all_confidence: |
        Asumir que las personas seguras siempre se equivocan; a veces la confianza
        está justificada.
      false_modesty: |
        Expertos que fingen saber menos de lo que saben para parecer humildes.
      gatekeeping: |
        Usar Dunning-Kruger para descartar a cualquiera que no esté de acuerdo con
        los "expertos" sin participar en sus argumentos.
      self_doubt_paralysis: |
        Sobrecostos hasta el punto de nunca confiar en tu propio juicio.
    related_content:
      - circle_of_competence
      - confirmation_bias
      - curse_of_knowledge
  - id: empathy_gap
    name: Brecha de Empatía
    quick_introduction: |
      La brecha de empatía es la dificultad para comprender y predecir los estados
      mentales de los demás cuando nosotros mismos nos encontramos en un estado
      diferente. Cuando estamos tranquilos, subestimamos cómo nos sentiremos
      cuando estemos enfadados o hambrientos. Cuando estamos saciados, subestimamos
      cuánto desearemos comida cuando tengamos hambre.
    one_liner: Subestimamos cómo nos sentiremos —y cómo se sienten los demás— en diferentes estados.
    try_this:
      - Cuando estés tranquilo, haz compromisos para cuando estés estresado; comprométete de antemano.
      - No juzgues a los demás en un estado en el que tú no estás: hambriento, cansado, asustado.
      - Pregúntate: ¿Estoy proyectando mi estado actual en mi yo futuro o en los demás?
    ask_yourself:
      - ¿Estoy subestimando cómo me sentiré en un estado diferente?
      - ¿Entendería mejor a esta persona si estuviera en su estado?
    in_more_detail: |
      Tenemos problemas para imaginar cómo nos sentiremos en circunstancias
      diferentes —y cómo se sienten los demás cuando están en estados en los que
      nosotros no nos encontramos actualmente. Una persona sobria subestima el
      atractivo de la adicción. Una persona bien descansada subestima el impacto
      de la privación del sueño. Proyectamos nuestro estado actual en los demás
      y en nuestros yoes futuros.

      La brecha de empatía afecta las decisiones que tomamos para nuestros yoes
      futuros (por ejemplo, comprometernos a hacer ejercicio cuando estamos
      motivados), las decisiones que tomamos para los demás y nuestra capacidad
      para comprender a personas en diferentes estados.
    why_this_is_important: |
      Reconocer la brecha de empatía mejora la toma de decisiones para tu yo
      futuro, la empatía hacia los demás y la comprensión de nuestra propia
      variabilidad. Explica por qué hacemos compromisos que no podemos cumplir
      y por qué malinterpretamos a otros en apuros.
    when_to_use:
      - toma_de_decisiones
      - construccion_de_relaciones
      - liderazgo
      - resolucion_de_conflictos
    how_can_you_spot_it:
      current_state_projection: |
        Asumir que los demás se sienten como nosotros ahora, o que nuestro yo
        futuro se sentirá como nosotros ahora.
      underestimating_emotional_state: |
        "¿Cuál es el gran problema?" cuando no estamos en el estado en el que
        ellos están.
      commitment_failures: |
        Tomar decisiones basadas en la motivación actual que no cumpliremos
        cuando la motivación disminuya.
      misunderstanding_others: |
        Desestimar las experiencias de los demás porque no podemos imaginarlas
        desde nuestro estado actual.
    examples:
      hunger: |
        Ir de compras cuando estás saciado —compramos menos de lo que
        querremos cuando tengamos hambre.
      addiction: |
        Los no adictos subestiman la dificultad de dejarlo; los adictos en
        recuperación pueden subestimar el atractivo cuando están consumiendo.
      conflict: |
        Cuando estamos tranquilos, subestimamos cómo reaccionaremos en el
        momento de la confrontación.
      motivation: |
        Inscribirse en una clase de las 6 am cuando estamos motivados —y no
        ir cuando tenemos sueño.
    real_world_implications: |
      La brecha de empatía afecta el tratamiento de la adicción, las políticas
      y la comprensión interpersonal. Explica por qué hacemos compromisos que
      rompemos y por qué a menudo no logramos comprender las perspectivas de los
      demás. Es una barrera para la empatía y una buena toma de decisiones.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien está estresado, enfadado o en un estado diferente, no
        asumas que razonará como tú. Intenta imaginar su estado. Al hacer
        compromisos, considera cómo te sentirás cuando la motivación
        disminuya.
      collaborative_learning_initiative: |
        Al planificar, considera cómo se sentirá el equipo cuando esté cansado,
        bajo presión o frustrado. Diseña para esos estados, no solo para el
        estado de planificación motivada.
    how_can_this_be_misapplied:
      overattribution: |
        Desestimar toda malinterpretación como "brecha de empatía" cuando a
        veces las personas tienen genuinamente valores diferentes.
      excusing_behavior: |
        "No pudieron evitarlo —brecha de empatía" cuando las personas son
        responsables de gestionar sus estados.
      false_relativism: |
        Asumir que nunca podremos entender a los demás cuando podemos mejorar
        con esfuerzo y experiencia.
      self_excuse: |
        Usar la brecha de empatía para justificar nuestras propias fallas en el
        seguimiento.
    related_content:
      - impact_bias
      - hyperbolic_discounting
      - fundamental_attribution_error
      - availability_heuristic
  - id: endowment_effect
    name: Efecto Dotación
    quick_introduction: |
      El efecto dotación es la tendencia a valorar algo más simplemente
      porque lo poseemos. Demandamos más por ceder un objeto de lo que pagaríamos
      por adquirirlo. La propiedad crea un apego que distorsiona nuestra valoración.
    one_liner: Valoramos más lo que poseemos que lo que no—la propiedad crea apego.
    try_this:
      - Ask: ¿Cuánto pagaría por adquirir esto si no fuera mío?
      - Al vender, imagina que estás comprando: ¿pagarías tu precio de venta?
      - Observa cuándo la propiedad está inflando tu valoración.
    ask_yourself:
      - ¿Estoy sobrevalorando esto porque me pertenece?
      - ¿Un comprador neutral estaría de acuerdo con mi precio?
    in_more_detail: |
      En experimentos, las personas a las que se les dio una taza al azar demandan aproximadamente el doble para
      venderla de lo que otros están dispuestos a pagar por comprarla. El mero hecho de la propiedad
      aumenta el valor percibido. Esto está relacionado con la aversión a la pérdida: ceder
      algo se siente como una pérdida, y somos aversos a las pérdidas. Pero el efecto va
      más allá: incorporamos las cosas poseídas en nuestra identidad.

      El efecto dotación afecta las negociaciones, el comportamiento del consumidor y
      el cambio organizacional. Explica por qué las personas sobrevaloran sus hogares,
      sus ideas y sus roles actuales. Crea fricción en las transacciones
      y transiciones.
    why_this_is_important: |
      Reconocer el efecto dotación te ayuda a negociar de manera más efectiva,
      a tomar decisiones más claras sobre qué conservar o dejar ir, y a entender
      por qué otros sobrevaloran lo que tienen. También explica la resistencia al
      cambio.
    when_to_use:
      - toma_de_decisiones
      - negociacion
      - inversion
      - movimientos_profesionales
    how_can_you_spot_it:
      ownership_premium: |
        "No lo vendería por eso" cuando no pagarías eso por comprarlo.
      attachment_to_possession: |
        Valorar más las cosas una vez que las tenemos.
      resistance_to_trading: |
        Renuencia a comerciar o intercambiar incluso cuando sería racional.
      overvaluation_of_own_ideas: |
        Nuestras ideas, proyectos o roles se sienten más valiosos porque son nuestros.
    examples:
      real_estate: |
        Los propietarios a menudo sobrevaloran sus casas: las valoran más de lo
        que lo hace el mercado.
      negotiations: |
        Los vendedores demandan más de lo que los compradores pagarán; la brecha refleja
        el efecto dotación.
      career: |
        Sobrevalorar nuestro trabajo, empresa o rol actual al considerar
        un cambio.
      ideas: |
        El sesgo de "no inventado aquí" y "mi idea": sobrevaloramos lo que hemos
        creado o poseemos.
    real_world_implications: |
      El efecto dotación crea fricción en el mercado, ralentiza los intercambios beneficiosos
      y alimenta la resistencia al cambio. Afecta fusiones,
      reorganizaciones y transiciones personales. Comprenderlo
      mejora la negociación y la gestión del cambio.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien se resiste al cambio, considera que puede estar experimentando
        el efecto dotación: valora más el statu quo porque lo "posee".
        Enmarca el cambio en términos de lo que ganan, no solo de lo que ceden.
      collaborative_learning_initiative: |
        Al introducir nuevos procesos, reconoce que las personas están apegadas
        a las formas actuales. Crea seguridad psicológica para "soltar" lo
        antiguo antes de abrazar lo nuevo.
    how_can_this_be_misapplied:
      dismissing_legitimate_attachment: |
        Parte del apego es racional: valor sentimental, costos de cambio.
        No toda resistencia es efecto dotación.
      manipulation: |
        Crear una falsa sensación de propiedad para extraer precios más altos (por ejemplo,
        "pruébalo gratis" para activar la dotación).
      undervaluing_continuity: |
        Asumir que toda resistencia al cambio es irracional cuando la continuidad
        tiene valor real.
      cold_rationality: |
        Descartar el apego emocional como "solo efecto dotación" cuando
        refleja valores genuinos.
    related_content:
      - loss_aversion_bias
      - sunk_cost_fallacy
      - anchoring_bias
      - scarcity_bias
  - id: false_consensus_effect
    name: El efecto del falso consenso
    quick_introduction: |
      El efecto del falso consenso es la tendencia a sobreestimar cuánto están de acuerdo los demás con
      nuestras creencias, actitudes y comportamientos. Asumimos que nuestras opiniones son más comunes de lo que son y nos cuesta imaginar que personas razonables puedan estar en desacuerdo.
    one_liner: Sobreestimamos cuánto están de acuerdo los demás con nosotros.
    try_this:
      - Busca activamente personas que no estén de acuerdo; no asumas consenso.
      - Antes de lanzar, prueba con personas que no compartan tus suposiciones.
      - Pregunta: ¿Qué diría alguien que no está de acuerdo? Tómalo en serio.
    ask_yourself:
      - ¿Estoy asumiendo que los demás piensan como yo?
      - ¿Cuándo fue la última vez que me sorprendió la opinión diferente de alguien?
    in_more_detail: |
      Cuando sostenemos una postura, tendemos a pensar que es la norma. Nos rodeamos de
      personas con ideas afines, consumimos medios de comunicación que confirman nuestras creencias e interpretamos la retroalimentación ambigua como acuerdo. Esto crea una cámara de eco que refuerza la ilusión de consenso.

      El efecto es más fuerte para las creencias profundamente arraigadas y cuando estamos muy comprometidos con nuestra postura. Puede generar sorpresa cuando otros no están de acuerdo, dificultad en la negociación e investigación de mercado deficiente cuando asumimos que los clientes piensan como nosotros.
    why_this_is_important: |
      Reconocer el efecto del falso consenso te ayuda a prepararte para desacuerdos genuinos,
      realizar mejores investigaciones y comunicarte de manera más efectiva. Es esencial para
      el desarrollo de productos, la negociación y el liderazgo.
    when_to_use:
      - toma_de_decisiones
      - negociacion
      - liderazgo
      - resolucion_de_problemas
    how_can_you_spot_it:
      surprise_at_disagreement: |
        Te sorprende genuinamente cuando alguien no está de acuerdo con lo que consideras obvio.
      assuming_shared_values: |
        Actúas como si los demás compartieran tus prioridades sin comprobarlo.
      underestimating_opposition: |
        Esperas que las propuestas encuentren menos resistencia de la que encuentran.
      echo_chamber_detection: |
        Tu entorno social y de información rara vez desafía tus puntos de vista.
    examples:
      product_development: |
        Un equipo asume que los usuarios quieren la función X porque todos en el equipo la quieren, solo para
        descubrir una baja adopción.
      politics: |
        Las personas en una burbuja política se sorprenden por los resultados electorales que no coinciden
        con sus expectativas.
      negotiation: |
        Asumir que la otra parte aceptará los términos porque te parecen "razonables".
      hiring: |
        Contratar por "encaje cultural" puede significar contratar personas que están de acuerdo contigo, reforzando
        el falso consenso.
    real_world_implications: |
      El efecto del falso consenso contribuye a la polarización, lanzamientos de productos fallidos
      y negociaciones rotas. Nos hace tener una confianza excesiva en nuestras predicciones y
      estar mal preparados para la disidencia.
    professional_application:
      networking_and_relationship_building: |
        Busca activamente personas con perspectivas diferentes. No asumas creencias compartidas;
        pregunta y escucha.
      collaborative_learning_initiative: |
        En equipos, utiliza la disidencia estructurada (por ejemplo, "pre-mortem", abogado del diablo) para sacar a la luz
        desacuerdos antes de que se vuelvan costosos.
    how_can_this_be_misapplied:
      dismissing_dissent: |
        Asumir que quienes no están de acuerdo no son razonables o no están informados, en lugar de considerar
        que pueden tener perspectivas diferentes y válidas.
      poor_research: |
        Omitir la investigación de clientes porque "ya sabemos lo que quieren".
      overconfidence: |
        Hacer apuestas audaces basándose en la suposición de que los demás estarán de acuerdo.
      groupthink_amplification: |
        Los equipos que no desafían el efecto del falso consenso pueden caer en un pensamiento grupal.
    related_content:
      - confirmation_bias
      - in_group_bias
      - groupthink
      - fundamental_attribution_error
  - id: framing_effect
    name: Efecto de Marco (Framing Effect)
    quick_introduction: |
      El efecto de marco es la tendencia a que nuestras decisiones cambien según cómo
      se presenten las opciones, incluso cuando los hechos subyacentes son idénticos.
      "90% de supervivencia" y "10% de mortalidad" describen el mismo resultado pero
      generan diferentes elecciones. El marco moldea la decisión.
    one_liner: Los mismos hechos, presentados de manera diferente, llevan a decisiones distintas.
    try_this:
      - Replantee las opciones de múltiples maneras antes de decidir: marco de ganancia y marco de pérdida.
      - Note cuándo su elección cambia según cómo se redacta algo.
      - Pregúntese: ¿Cuáles son los hechos subyacentes, despojados del marco?
    ask_yourself:
      - ¿Decidiría de manera diferente si esto se presentara como una ganancia frente a una pérdida?
      - ¿Estoy reaccionando al marco o al resultado real?
    in_more_detail: |
      Kahneman y Tversky demostraron que las personas evitan el riesgo cuando las
      opciones se presentan como ganancias y buscan el riesgo cuando se presentan
      como pérdidas, incluso para los mismos resultados. El encuadre positivo
      ("salvar 200 vidas") frente al encuadre negativo ("morirán 400") cambia las
      preferencias. Los marcos de pérdida desencadenan respuestas emocionales más
      fuertes que los marcos de ganancia equivalentes.

      El efecto de marco afecta las decisiones médicas, las políticas, el marketing y
      la negociación. Es uno de los sesgos más poderosos y bien documentados.
      La conciencia ayuda, pero es difícil de superar por completo.
    why_this_is_important: |
      Reconocer el efecto de marco le ayuda a tomar decisiones más consistentes,
      resistir la manipulación y comunicarse de manera más efectiva. También explica
      por qué la misma oferta puede ser aceptada o rechazada según la presentación.
    when_to_use:
      - toma_de_decisiones
      - negociacion
      - liderazgo
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      gain_loss_asymmetry: |
        El mismo resultado presentado como ganancia frente a pérdida produce
        diferentes elecciones.
      presentation_dependence: |
        Las decisiones cambian cuando solo cambia el marco, no la sustancia.
      default_influence: |
        El orden o el etiquetado de las opciones afecta las elecciones.
      emotional_trigger: |
        Ciertos marcos desencadenan respuestas emocionales más fuertes.
    examples:
      medical: |
        "90% de supervivencia" frente a "10% de mortalidad" para el mismo procedimiento:
        las personas eligen de manera diferente según el marco.
      sales: |
        "Ahorra $50" frente a "No pierdas $50": marcos equivalentes, diferente
        impacto psicológico.
      policy: |
        "Alivio fiscal" frente a "Gasto gubernamental": misma política, diferente
        respuesta política.
      negotiation: |
        Presentar una oferta como un "descuento" frente a "evitar un recargo"
        cambia las tasas de aceptación.
    real_world_implications: |
      El efecto de marco se explota en la publicidad, la política y la
      negociación. Afecta las decisiones médicas y el apoyo a las políticas.
      Replantear puede mejorar las decisiones y la comunicación. Ser consciente
      ayuda, pero no elimina por completo el efecto.
    professional_application:
      networking_and_relationship_building: |
        Al presentar opciones, considere múltiples marcos. Pruebe cómo
        diferentes marcos afectan la recepción. Al recibir información,
        pregúntese: "¿De qué otra manera se podría presentar esto?"
      collaborative_learning_initiative: |
        En la toma de decisiones, replantee explícitamente las opciones para verificar
        los efectos del marco. "¿Si replantearamos esto como una pérdida, decidiríamos
        de manera diferente?" Use un marco consistente para la equidad.
    how_can_this_be_misapplied:
      manipulation: |
        Presentar deliberadamente para dirigir a las personas hacia resultados deseados
        sin su conocimiento.
      false_equivalence: |
        Asumir que todos los marcos son igualmente válidos cuando algunos oscurecen
        información importante.
      overcorrection: |
        Ignorar el marco por completo y asumir que no importa; sí importa.
      spin: |
        Usar el marco para engañar en lugar de para aclarar.
    related_content:
      - loss_aversion_bias
      - anchoring_bias
      - default_effect
      - availability_heuristic
  - id: fundamental_attribution_error
    name: Error de Atribución Fundamental
    quick_introduction: |
      El error de atribución fundamental es la tendencia a atribuir el comportamiento de otros a su carácter o personalidad, mientras que atribuimos nuestro propio comportamiento a factores situacionales. Juzgamos a los demás por sus acciones y a nosotros mismos por nuestras intenciones.
    one_liner: Juzgamos a los demás por sus acciones, a nosotros mismos por nuestras intenciones.
    try_this:
      - Cuando alguien te frustre, pregunta: ¿Qué factores situacionales podrían explicar esto?
      - Aplica la misma generosidad a los demás que te aplicas a ti mismo.
      - Date cuenta cuando atribuyes el comportamiento de otros al carácter, no a las circunstancias.
    ask_yourself:
      - ¿Explicaría mi propio comportamiento de la misma manera que estoy explicando el suyo?
      - ¿Qué podría estar pasando por alto sobre su situación?
    in_more_detail: |
      Cuando alguien nos corta el paso en el tráfico, pensamos "qué imbécil". Cuando cortamos el paso a alguien, pensamos "tuve que hacerlo, tenía prisa". Explicamos nuestros propios fracasos por las circunstancias ("el tráfico era terrible") y los fracasos de los demás por su disposición ("son perezosos"). Lo contrario ocurre con el éxito: nos atribuimos el mérito a nosotros mismos, atribuimos el éxito de los demás a la suerte.

      El error es "fundamental" porque es generalizado y persistente. Socava la empatía, alimenta el conflicto y distorsiona la evaluación del desempeño.
    why_this_is_important: |
      Reconocer el error de atribución fundamental mejora las relaciones, reduce el conflicto y conduce a juicios más justos. Anima a considerar el contexto antes de concluir que alguien "es" de cierta manera.
    when_to_use:
      - construcción_de_relaciones
      - resolución_de_conflictos
      - liderazgo
      - toma_de_decisiones
    how_can_you_spot_it:
      dispositional_explanation_for_others: |
        "Es que es así" al explicar el comportamiento de los demás.
      situational_explanation_for_self: |
        "No tuve otra opción" o "Las circunstancias me obligaron" al explicarnos a nosotros mismos.
      character_vs_context: |
        Asumir el carácter cuando la situación podría explicar el comportamiento.
      asymmetric_standards: |
        Someter a los demás a estándares más estrictos de los que nos aplicamos a nosotros mismos.
    examples:
      traffic: |
        El error de otro conductor = "mal conductor". Nuestro error = "situación inevitable".
      workplace: |
        La fecha límite incumplida de un colega = "irresponsable". Nuestra fecha límite incumplida =
        "sobrecargado y nadie podría haberlo hecho mejor".
      politics: |
        Las opiniones de los oponentes = "son estúpidos o malvados". Nuestras opiniones = "respuesta racional
        a los hechos".
      performance: |
        El éxito de otros = "suerte". Nuestro éxito = "ganado con trabajo duro".
    real_world_implications: |
      El error de atribución fundamental alimenta el conflicto, socava el trabajo en equipo y distorsiona la contratación y la evaluación del desempeño. Corregirlo mejora la cultura organizacional y las relaciones personales.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien te decepciona, pregúntate "¿Qué factores situacionales podrían explicar esto?" antes de concluir que es poco fiable o difícil.
      collaborative_learning_initiative: |
        En la retroalimentación y las revisiones, fomenta interpretaciones de "primero la situación".
        Capacita a los gerentes para considerar el contexto antes de atribuir al carácter.
    how_can_this_be_misapplied:
      excusing_all_behavior: |
        Desestimar cada acción como "situacional" cuando cierto comportamiento sí refleja
        el carácter.
      no_accountability: |
        Usar el error para evitar responsabilizar a las personas por las elecciones que sí hicieron.
      self_deprecation: |
        Sobrerrectificar para culparse siempre a uno mismo y nunca reconocer la responsabilidad de los demás.
      ignoring_patterns: |
        Cuando alguien se comporta mal repetidamente en diversas situaciones, la disposición
        puede ser relevante.
    related_content:
      - hanlons_razor
      - in_group_bias
      - confirmation_bias
      - halo_effect
  - id: gamblers_fallacy
    name: Falacia del jugador
    quick_introduction: |
      La falacia del jugador es la creencia errónea de que eventos independientes pasados
      afectan a los futuros. Después de una racha de caras, pensamos que las cruces "tocan"—incluso
      aunque cada lanzamiento sea independiente. Vemos patrones en la aleatoriedad y
      esperamos una "corrección" o "reversión" cuando no se requiere ninguna.
    one_liner: Los eventos independientes pasados no afectan a los futuros—la moneda no tiene memoria.
    try_this:
      - Cuando pienses "me toca ganar", pregunta: ¿Son estos eventos realmente independientes?
      - Distingue la regresión a la media (real) de la falacia del jugador (falsa).
      - Observa cuándo ves patrones en la aleatoriedad.
    ask_yourself:
      - ¿Estoy asumiendo que los resultados pasados afectan a los futuros cuando son independientes?
      - ¿Estaría de acuerdo un estadístico con mi razonamiento de "toca un cambio"?
    in_more_detail: |
      En un lanzamiento de moneda justo, cada lanzamiento es independiente. La probabilidad de cara
      es siempre del 50%, independientemente de los resultados pasados. Pero sentimos que una racha larga
      de un resultado hace que el otro sea más probable. Confundimos la ley de los grandes números
      (en muchas pruebas, los resultados se promedian) con la "corrección" a corto plazo.
      El casino no tiene memoria.

      La falacia afecta a los juegos de azar, la inversión y la toma de decisiones cotidianas.
      Asumimos que la "suerte" se equilibrará o que nos "toca" ganar.
      A veces tenemos razón, pero por las razones equivocadas.
    why_this_is_important: |
      Reconocer la falacia del jugador previene errores costosos en los juegos de azar
      y la inversión. También te ayuda a evitar sobreinterpretar rachas cortas
      y esperar falsas reversiones. Distingue la regresión genuina a la media
      de la falacia.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - evaluacion_de_riesgos
      - resolucion_de_problemas
    how_can_you_spot_it:
      due_for_a_change: |
        "Hemos tenido tantas pérdidas—nos toca una victoria."
      pattern_in_randomness: |
        Ver patrones significativos en secuencias aleatorias.
      hot_hand_fallacy: |
        Creer que una racha continuará (error relacionado pero opuesto).
      independence_ignorance: |
        Tratar eventos independientes como si estuvieran conectados.
    examples:
      gambling: |
        Después de varios rojos en la ruleta, apostar a negro porque "el rojo no puede seguir saliendo".
      investing: |
        "El mercado ha estado a la baja—tiene que subir."
      hiring: |
        "Hemos contratado a varios candidatos malos—el próximo seguro que será bueno."
      sports: |
        "Ha fallado tantos—le toca meter el próximo tiro."
    real_world_implications: |
      La falacia del jugador causa pérdidas en los juegos de azar y malas decisiones de inversión.
      También explica por qué sobreinterpretamos patrones a corto plazo.
      Distinguirla de la regresión genuina a la media (donde hay una media real a la que regresar) es importante.
    professional_application:
      networking_and_relationship_building: |
        No asumas que las dinámicas de relaciones pasadas se "corregirán" en el
        futuro; cada interacción es algo independiente. Pero aprende de los
        patrones cuando haya una causa subyacente real.
      collaborative_learning_initiative: |
        Al evaluar el rendimiento, distingue la variación aleatoria del
        cambio sistemático. Las rachas cortas pueden ser ruido; no reacciones exageradamente a
        las "rachas" ni esperes falsas reversiones.
    how_can_this_be_misapplied:
      ignoring_regression: |
        A veces la regresión a la media es real (por ejemplo, rendimiento de habilidades).
        No desestimes toda reversión como falacia del jugador.
      false_independence: |
        Asumir que los eventos son independientes cuando no lo son (por ejemplo, mediciones repetidas
        de lo mismo).
      overcorrection: |
        Nunca esperar una reversión cuando hay una media real a la que regresar.
      dismissing_patterns: |
        Algunos patrones son reales; no toda secuencia es aleatoria.
    related_content:
      - regression_to_the_mean
      - narrative_fallacy
      - base_rate_fallacy
      - illusion_of_control
  - id: groupthink
    name: Pensamiento grupal
    quick_introduction: |
      El pensamiento grupal es la tendencia de los grupos cohesivos a priorizar el consenso y la armonía sobre la evaluación crítica. Los miembros suprimen la disidencia, se autocensuran y se ajustan a la visión percibida del grupo. El deseo de unanimidad anula el deseo de la mejor decisión.
    one_liner: Armonía por encima de la verdad—los grupos priorizan el consenso sobre la evaluación crítica.
    try_this:
      - Asignar un abogado del diablo; hacer que la disidencia sea esperada y segura.
      - Preguntar: ¿Qué no estamos diciendo? ¿Qué diríamos si no estuviéramos en este grupo?
      - Buscar perspectivas externas antes de finalizar las decisiones grupales.
    ask_yourself:
      - ¿Me estoy autocensurando para mantener la armonía?
      - ¿Es nuestro consenso genuino o el resultado de la presión para estar de acuerdo?
    in_more_detail: |
      Irving Janis estudió los desastres de política exterior (Bahía de Cochinos, Vietnam) e identificó patrones: ilusión de invulnerabilidad, racionalización colectiva, presión hacia la conformidad, autocensura, ilusión de unanimidad y "guardianes de la mente" que protegen al grupo de información disidente. La alta cohesión, el aislamiento y el estrés aumentan el pensamiento grupal.

      El pensamiento grupal conduce a malas decisiones porque las alternativas no se consideran seriamente. La disidencia se considera deslealtad. El grupo sobreestima su corrección y subestima los riesgos.
    why_this_is_important: |
      Reconocer el pensamiento grupal te ayuda a crear condiciones para una mejor toma de decisiones: fomenta la disidencia, aporta perspectivas externas y evita el consenso prematuro. Es esencial para evitar fallos grupales catastróficos.
    when_to_use:
      - liderazgo
      - toma_de_decisiones
      - resolucion_de_problemas
      - resolucion_de_conflictos
    how_can_you_spot_it:
      pressure_for_consensus: |
        Se desalienta o castiga la disidencia; se recompensa el acuerdo.
      illusion_of_unanimity: |
        El silencio se interpreta como acuerdo cuando puede ser autocensura.
      collective_rationalization: |
        El grupo descarta advertencias y refuerza su punto de vista.
      mindguards: |
        Los miembros protegen al grupo de información que desafiaría el consenso.
    examples:
      bay_of_pigs: |
        Los asesores de Kennedy suprimieron las dudas sobre el plan de invasión; el resultado fue un desastre.
      corporate_decisions: |
        Un equipo directivo avanza con una fusión a pesar de las señales de alarma porque nadie quiere ser el aguafiestas.
      product_launches: |
        Un equipo lanza un producto defectuoso porque todos han invertido en el plan y nadie plantea preocupaciones.
      boards: |
        Los miembros de la junta directiva aprueban a ciegas las propuestas de la dirección para mantener la armonía.
    real_world_implications: |
      El pensamiento grupal contribuye a fracasos de políticas, desastres corporativos y oportunidades perdidas. Es especialmente peligroso en situaciones de alto riesgo y alto estrés. Prevenirlo requiere intervenciones estructurales deliberadas.
    professional_application:
      networking_and_relationship_building: |
        Crea seguridad psicológica para la disidencia. Agradece a las personas que plantean preocupaciones. Modela la discrepancia sin ser desagradable.
      collaborative_learning_initiative: |
        Utiliza al abogado del diablo, equipos rojos y "pre-mortems". Exige que alguien argumente en contra de la opinión predominante. Aporta perspectivas externas. El líder habla el último para evitar el anclaje.
    how_can_this_be_misapplied:
      false_dissent: |
        Crear "disidentes designados" que no discrepan genuinamente: el grupo lo percibe.
      excessive_conflict: |
        Fomentar la disidencia hasta el punto de conflicto destructivo y parálisis.
      dismissing_consensus: |
        Asumir que todo consenso es pensamiento grupal: a veces el grupo tiene razón.
      individualism: |
        Sobrecambiar hasta el punto en que no es posible ninguna decisión colectiva.
    related_content:
      - false_consensus_effect
      - in_group_bias
      - confirmation_bias
      - bystander_effect
  - id: halo_effect
    name: Efecto Halo
    quick_introduction: |
      El efecto halo es la tendencia a dejar que un rasgo o impresión positiva
      influya en nuestro juicio general de una persona. Si nos gusta la
      apariencia de alguien, podemos asumir que es competente. Si admiramos una
      habilidad, asumimos que es buena en todo. Un atributo positivo proyecta un
      "halo" sobre el resto.
    one_liner: Un rasgo positivo proyecta un halo sobre nuestro juicio completo de una persona.
    try_this:
      - Evalúa los rasgos de forma independiente; no dejes que una fortaleza implique otras.
      - Observa cuándo el atractivo, el carisma o un éxito tiñen tu visión.
      - Pregunta: ¿Juzgaría a esta persona igual sin ese atributo positivo?
    ask_yourself:
      - ¿Estoy generalizando de un rasgo a toda la persona?
      - ¿Vería debilidades si no estuviera impresionado por una fortaleza?
    in_more_detail: |
      Edward Thorndike observó que los oficiales militares que calificaban alto a los soldados en un rasgo tendían a calificarlos alto en otros, incluso en rasgos no relacionados. Generalizamos de lo particular a lo general. El atractivo, el carisma o el éxito en un dominio crean un halo que se extiende.

      Lo inverso, un rasgo negativo que tiñe todo, a veces se llama "efecto cuerno". Ambos son formas de generalización injustificada. El efecto halo afecta la contratación, las revisiones de desempeño y las impresiones cotidianas.
    why_this_is_important: |
      Reconocer el efecto halo te ayuda a hacer evaluaciones más precisas y a evitar generalizaciones excesivas. Es esencial para una contratación justa, gestión del desempeño y evaluación de relaciones. Una fortaleza no implica todas las fortalezas.
    when_to_use:
      - toma_de_decisiones
      - liderazgo
      - construccion_de_relaciones
      - contratacion
    how_can_you_spot_it:
      trait_spillover: |
        Un rasgo positivo influye en el juicio de rasgos no relacionados.
      attractiveness_bias: |
        Las personas atractivas son calificadas más alto en competencia, confiabilidad, etc.
      success_generalization: |
        El éxito en un área lleva a asumir competencia en otras.
      first_impression_dominance: |
        Una impresión positiva temprana tiñe toda la evaluación posterior.
    examples:
      hiring: |
        Se asume que un candidato elocuente y agradable es técnicamente fuerte, incluso cuando las habilidades no están relacionadas.
      performance_reviews: |
        Un proyecto destacado lleva a altas calificaciones en todas las dimensiones.
      politics: |
        El carisma de un político lleva a asumir competencia en políticas.
      branding: |
        El éxito de una empresa en un producto lleva a asumir la calidad de todos los productos.
    real_world_implications: |
      El efecto halo distorsiona la contratación, la evaluación del desempeño y las decisiones de inversión. Favorece a los atractivos, elocuentes y ya exitosos. Reducirlo requiere una evaluación estructurada y la separación de dimensiones.
    professional_application:
      networking_and_relationship_building: |
        Evalúa a las personas según dimensiones específicas en lugar de una impresión general. Ten en cuenta cuándo un rasgo positivo influye en tu juicio sobre los demás. Busca evidencia que lo contradiga.
      collaborative_learning_initiative: |
        Utiliza entrevistas y evaluaciones estructuradas que califiquen las dimensiones de forma independiente. Calibra las calificaciones entre los evaluadores. Reduce la dependencia de una "intuición" general.
    how_can_this_be_misapplied:
      dismissing_all_positive_impressions: |
        No todas las impresiones positivas son un halo; a veces las personas son genuinamente fuertes en varias dimensiones.
      false_objectivity: |
        Asumir que podemos eliminar por completo el efecto halo; es generalizado y parcialmente automático.
      overcorrection: |
        Ir al extremo opuesto y asumir que las personas atractivas o carismáticas son menos competentes.
      stereotyping: |
        Usar el "efecto halo" para descartar atributos positivos legítimos.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - confirmation_bias
      - ben_franklin_effect
  - id: hanlons_razor
    name: Navaja de Hanlon
    quick_introduction: |
      La Navaja de Hanlon establece: "Nunca atribuyas a la malicia lo que puede ser explicado adecuadamente por estupidez." En otras palabras, no asumas mala intención cuando la incompetencia, la falta de atención o la ignorancia puedan explicar el comportamiento.
    one_liner: No asumas malicia cuando la incompetencia o la falta de atención puedan explicarlo.
    try_this:
      - Cuando alguien te frustre, pregunta: ¿Podría esto explicarse por un error o ignorancia?
      - Opta por la explicación más simple antes de asumir mala intención.
      - Nota cuándo saltas a "quiso hacerme daño".
    ask_yourself:
      - ¿Estoy atribuyendo a la malicia lo que podría explicarse por estupidez?
      - ¿Quisiera yo el mismo beneficio de la duda en su lugar?
    in_more_detail: |
      El principio fomenta dar el beneficio de la duda a las personas. Cuando las acciones de alguien te dañan o frustran, la suposición predeterminada a menudo es que querían hacerte daño. La Navaja de Hanlon sugiere que muchas de estas acciones provienen de descuido, falta de información o mala ejecución, no de mala voluntad.

      Esto no significa que la malicia nunca exista. Significa que no debemos saltar a la peor interpretación cuando una más simple encaja. La navaja reduce la paranoia, mejora las relaciones y nos ayuda a responder de manera más constructiva a los problemas.
    why_this_is_important: |
      Aplicar la Navaja de Hanlon reduce el conflicto, preserva las relaciones y enfoca la energía en resolver problemas en lugar de asignar culpas. También te protege del estrés de asumir que todos están en tu contra.
    when_to_use:
      - resolución_de_conflictos
      - liderazgo
      - construcción_de_relaciones
      - toma_de_decisiones
    how_can_you_spot_it:
      quick_assumption_of_malice: |
        Interpretas inmediatamente un resultado negativo como un daño intencional.
      personalizing_mistakes: |
        Cuando algo sale mal, asumes que fue dirigido a ti personalmente.
      ignoring_alternative_explanations: |
        No consideras la incompetencia, la mala comunicación o la falta de atención como posibilidades.
      escalation_before_inquiry: |
        Respondes con enojo o represalia antes de preguntar qué sucedió.
    examples:
      email_tone: |
        Asumir que un correo electrónico seco es pasivo-agresivo cuando el remitente puede estar simplemente apurado o ser malo con el tono.
      missed_deadline: |
        Interpretar la entrega tardía de un colega como sabotaje cuando puede haber
        excedido sus compromisos o encontrado obstáculos.
      policy_decisions: |
        Asumir que una política de empresa que no te gusta fue diseñada para perjudicar a los empleados cuando puede ser un intento torpe de abordar un problema diferente.
      traffic: |
        Asumir que otro conductor te cortó el paso intencionalmente cuando puede que no te haya visto.
    real_world_implications: |
      La Navaja de Hanlon mejora la cultura laboral, reduce los litigios y hace que la resolución de conflictos sea más efectiva. El uso excesivo puede permitir la negligencia; el uso insuficiente crea conflictos innecesarios.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien te decepciona, pide aclaración antes de asumir mala intención.
        Preserva las relaciones optando por interpretaciones caritativas.
      collaborative_learning_initiative: |
        En los equipos, crea una cultura donde se asume que los errores son no intencionales hasta que se demuestre lo contrario. Enfócate en sistemas y procesos en lugar de culpas.
    how_can_this_be_misapplied:
      excusing_negligence: |
        Desestimar la incompetencia o el descuido repetidos como "no malicia" cuando merecen
        rendición de cuentas.
      ignoring_genuine_malice: |
        Aplicar la navaja tan rígidamente que pasas por alto a actores maliciosos reales o comportamientos tóxicos.
      avoiding_difficult_conversations: |
        Usar la Navaja de Hanlon como excusa para no abordar problemas de rendimiento.
      gaslighting_victims: |
        Decirle a alguien que fue genuinamente agraviado que está "asumiendo malicia" cuando
        la malicia estaba presente.
    related_content:
      - fundamental_attribution_error
      - confirmation_bias
      - in_group_bias
      - cognitive_dissonance
  - id: hawthorne_effect
    name: Efecto Hawthorne
    quick_introduction: |
      El efecto Hawthorne es la tendencia de las personas a modificar su comportamiento
      cuando saben que están siendo observadas o estudiadas. El acto de observación
      en sí mismo puede producir el cambio — no necesariamente la intervención que
      se está probando. Las personas responden a la atención que reciben.
    one_liner: Ser observado cambia el comportamiento; la atención misma puede producir el efecto.
    try_this:
      - Al evaluar una intervención, considera si la observación está impulsando los resultados.
      - Reconoce que la atención y sentirse valorado pueden mejorar el rendimiento.
      - Sé cauteloso al atribuir el cambio a una intervención específica cuando la observación cambió.
    ask_yourself:
      - ¿Esta mejora proviene de la intervención o de ser observado?
      - ¿Persistirían los resultados si dejáramos de prestar atención?
    in_more_detail: |
      En la planta Hawthorne Works, los investigadores descubrieron que la productividad
      mejoraba cuando cambiaban la iluminación — y también cuando la revertían.
      La mejora parecía provenir de la atención y la observación, no de
      la intervención específica. Un reanálisis posterior sugirió que el efecto pudo
      haber sido exagerado, pero el concepto sigue siendo útil: ser estudiado
      cambia el comportamiento.

      El efecto Hawthorne complica la investigación y la evaluación. Puede
      inflar el impacto aparente de las intervenciones. También sugiere que
      la atención y sentirse valorado pueden mejorar el rendimiento — una lección para
      la gestión.
    why_this_is_important: |
      Comprender el efecto Hawthorne te ayuda a interpretar los resultados de la investigación,
      diseñar mejores experimentos y reconocer que la atención
      en sí misma puede impulsar el cambio. En la gestión, sugiere que prestar
      atención a las personas puede ser tan importante como la intervención específica.
    when_to_use:
      - liderazgo
      - toma_de_decisiones
      - aprendizaje
      - resolución_de_problemas
    how_can_you_spot_it:
      observation_induced_change: |
        El comportamiento cambia cuando las personas saben que están siendo observadas o estudiadas.
      attention_effect: |
        El acto de prestar atención produce mejora, no solo el
        cambio específico.
      placebo_analog: |
        Como un placebo, el "tratamiento" de ser estudiado puede tener efectos.
      short_term_improvement: |
        Las mejoras pueden desvanecerse cuando la observación termina.
    examples:
      workplace_studies: |
        Aumenta la productividad durante un estudio: ¿es el nuevo proceso o
        el hecho de que alguien está observando?
      medical_trials: |
        Los grupos de placebo mejoran — en parte porque están recibiendo atención.
      education: |
        Los estudiantes se desempeñan mejor cuando los investigadores están presentes — el
        "efecto del observador".
      management: |
        Los equipos mejoran cuando la gerencia presta atención — ¿es la nueva
        iniciativa o la atención misma?
    real_world_implications: |
      El efecto Hawthorne afecta la validez de la investigación y la evaluación de programas.
      Puede llevar a sobreestimar los efectos de las intervenciones.
      También tiene una lección positiva: la atención y sentirse estudiado
      pueden motivar la mejora — por lo que el cuidado y la visibilidad importan.
    professional_application:
      networking_and_relationship_building: |
        Prestar atención a las personas puede mejorar su rendimiento —
        el efecto Hawthorne sugiere que sentirse observado y
        valorado importa. Úsalo positivamente: check-ins regulares,
        visibilidad y reconocimiento.
      collaborative_learning_initiative: |
        Al evaluar intervenciones, usa grupos de control y
        considera si las mejoras se deben a la intervención
        o a la atención que trae. El efecto Hawthorne puede
        inflar el éxito aparente.
    how_can_this_be_misapplied:
      surveillance_justification: |
        Usar el "efecto Hawthorne" para justificar el monitoreo constante —
        la observación también puede reducir la confianza y la motivación intrínseca.
      dismissing_improvements: |
        Asumir que toda mejora durante los estudios es Hawthorne —
        a veces las intervenciones realmente funcionan.
      overgeneralization: |
        Los estudios originales de Hawthorne han sido cuestionados;
        el efecto puede ser menor o diferente de lo que se pensaba.
      manipulation: |
        Crear "observación" falsa para manipular el comportamiento.
    related_content:
      - pygmalion_effect
      - confirmation_bias
      - availability_heuristic
  - id: hindsight_bias
    name: Sesgo de retrospectiva
    quick_introduction: |
      El sesgo de retrospectiva (o el efecto "ya lo sabía") es la tendencia a creer,
      después de que un evento ha ocurrido, que lo habríamos predicho o esperado.
      Reconstruimos el pasado para que los resultados parezcan más inevitables de lo que fueron.
    one_liner: Después del hecho, creemos que ya lo sabíamos todo.
    try_this:
      - Antes de juzgar decisiones pasadas, pregunta: ¿Qué sabían en ese momento?
      - Registra tus predicciones antes de los resultados; compáralas después.
      - Date cuenta de cuándo haces que el pasado parezca más inevitable de lo que fue.
    ask_yourself:
      - ¿Estoy juzgando con información que no estaba disponible en ese momento?
      - ¿Realmente predije esto, o simplemente ahora parece obvio?
    in_more_detail: |
      Una vez que conocemos el resultado, parece obvio. Olvidamos la incertidumbre que sentimos
      de antemano. Este sesgo distorsiona el aprendizaje: creemos que "sabíamos" algo cuando no era así,
      por lo que no actualizamos nuestros modelos. También conduce a culpas injustas: "Deberían haberlo visto venir"
      cuando el futuro era genuinamente incierto.

      El sesgo de retrospectiva afecta los análisis post-mortem, los juicios legales y el análisis histórico.
      Juzgamos las decisiones pasadas con información que no estaba disponible en ese momento.
    why_this_is_important: |
      Reconocer el sesgo de retrospectiva mejora el aprendizaje de los resultados, la evaluación justa de
      las decisiones y una evaluación de riesgos más precisa. Previene la falsa confianza en nuestras
      capacidades predictivas.
    when_to_use:
      - toma_de_decisiones
      - aprendizaje
      - evaluacion_de_riesgos
      - liderazgo
    how_can_you_spot_it:
      inevitability_feeling: |
        Después de un evento, se siente como si "tuviera" que suceder.
      reconstructed_certainty: |
        Recordamos haber estado más seguros antes del evento de lo que realmente estábamos.
      blame_for_failure: |
        "Deberían haberlo sabido" cuando el resultado era genuinamente incierto.
      undervaluing_luck: |
        Atribuir resultados a la habilidad o la previsión cuando la suerte jugó un papel.
    examples:
      investing: |
        "Sabía que el mercado colapsaría" después de que colapsa, cuando no actuaste sobre ese
        "conocimiento" de antemano.
      project_failures: |
        "Deberíamos haber visto los riesgos" en un análisis post-mortem cuando los riesgos eran genuinamente
        ambiguos.
      elections: |
        Después de un resultado sorpresa, los comentaristas explican por qué fue "obvio" en retrospectiva.
      medical: |
        "Las señales estaban ahí" al diagnosticar una condición rara después del hecho.
    real_world_implications: |
      El sesgo de retrospectiva distorsiona la responsabilidad legal, la evaluación del desempeño y el aprendizaje.
      Nos hace demasiado confiados en nuestro juicio e injustos con quienes tomaron
      decisiones razonables con información limitada.
    professional_application:
      networking_and_relationship_building: |
        Al evaluar las decisiones pasadas de otros, separa conscientemente lo que se sabía
        entonces de lo que sabes ahora. Evita el "te lo dije" cuando en realidad no predijiste el resultado.
      collaborative_learning_initiative: |
        En los análisis post-mortem, utiliza técnicas de "pre-mortem" o "diario de decisiones" para
        capturar la incertidumbre en el momento de la decisión. Compara la incertidumbre real
        con la reconstrucción retrospectiva.
    how_can_this_be_misapplied:
      excusing_all_failures: |
        Desestimar todos los fracasos como "impredecibles" cuando algunos eran previsibles.
      no_accountability: |
        Usar el sesgo de retrospectiva para evitar responsabilizar a las personas por negligencia.
      false_uncertainty: |
        Sobrecambiar para creer que nunca podemos predecir nada.
      undermining_learning: |
        Negarse a extraer lecciones porque "la retrospectiva es 20/20" (es decir, obvia), todavía podemos aprender
        de los resultados.
    related_content:
      - narrative_fallacy
      - survivorship_bias
      - regression_to_the_mean
  - id: hyperbolic_discounting
    name: Descuento hiperbólico
    quick_introduction: |
      El descuento hiperbólico es la tendencia a preferir recompensas más pequeñas e inmediatas
      en lugar de otras más grandes y futuras, y a descontar el futuro de forma más drástica de lo que predicen los modelos racionales. Sobrecargamos el presente y subestimamos el futuro de maneras inconsistentes.
    one_liner: Preferimos lo pequeño e inmediato a lo grande y futuro, y descontamos el futuro de forma inconsistente.
    try_this:
      - Pre-compromiso: toma decisiones para tu yo futuro cuando estés en un estado de calma.
      - Reformula: ¿Querría esto en 10 minutos? ¿En 10 meses? para revelar inconsistencias.
      - Utiliza dispositivos de compromiso para atar a tu yo futuro a mejores decisiones.
    ask_yourself:
      - ¿Estoy sobrevalorando el presente a expensas de mi yo futuro?
      - ¿Tomaría esta decisión si la recompensa se retrasara un día? ¿Un año?
    in_more_detail: |
      Podríamos preferir 50€ hoy en lugar de 100€ en un año, pero también preferir 100€ en
      dos años en lugar de 50€ en un año, aunque eso sea inconsistente. Nuestra
      tasa de descuento no es constante; es hiperbólica. El futuro cercano
      se descuenta fuertemente; el futuro lejano se descuenta de forma menos drástica. Esto
      explica la procrastinación, la adicción y la falta de ahorro.

      El sesgo de presente es un concepto relacionado: damos al momento
      presente un peso desproporcionado. El descuento hiperbólico explica por qué
      hacemos compromisos que no cumplimos y por qué la planificación a largo plazo es difícil.
    why_this_is_important: |
      Comprender el descuento hiperbólico te ayuda a diseñar mejores
      incentivos, a comprometer a tu yo futuro y a evitar trampas a corto plazo.
      Explica por qué procrastinamos y por qué luchamos con
      objetivos a largo plazo.
    when_to_use:
      - toma_de_decisiones
      - movimientos_profesionales
      - inversión
      - liderazgo
    how_can_you_spot_it:
      present_preference: |
        Elegir la gratificación inmediata sobre recompensas mayores y retrasadas.
      inconsistent_time_preferences: |
        Preferencias que se revierten a medida que pasa el tiempo (por ejemplo, queremos hacer dieta
        mañana pero comemos hoy).
      commitment_failures: |
        Hacer planes que no seguimos cuando el futuro se convierte en presente.
      procrastination: |
        Retrasar tareas importantes en favor de la comodidad inmediata.
    examples:
      savings: |
        Elegir gastar ahora en lugar de ahorrar para la jubilación; el futuro
        parece abstracto.
      health: |
        Saltarse el ejercicio hoy por comodidad, a pesar de saber que nos arrepentiremos;
        el arrepentimiento de mañana se descuenta.
      addiction: |
        Elegir el subidón inmediato sobre la salud a largo plazo.
      deadlines: |
        No hacer nada hasta que se acerca la fecha límite; entonces el "presente" incluye
        la fecha límite y actuamos.
    real_world_implications: |
      El descuento hiperbólico afecta al ahorro, la salud, la educación y
      la adicción. Explica muchos fallos de autocontrol. Los dispositivos de compromiso
      (por ejemplo, ahorros automáticos, rendición de cuentas) pueden ayudar
      restringiendo las elecciones futuras.
    professional_application:
      networking_and_relationship_building: |
        Al pedir compromisos futuros, crea rendición de cuentas que
        haga el futuro "presente" (por ejemplo, seguimientos, fechas límite). No
        asumas que la gente cumplirá sin una estructura.
      collaborative_learning_initiative: |
        Utiliza dispositivos de compromiso: compromisos públicos, pre-compromiso con
        fechas límite y estructuras que hagan que los objetivos a largo plazo parezcan más
        inmediatos. Divide los proyectos largos en hitos más cortos.
    how_can_this_be_misapplied:
      excessive_control: |
        Restringir excesivamente las opciones de las personas en nombre de "ayudar"
        a sus yo futuros.
      paternalism: |
        Asumir que sabemos lo que es mejor para los intereses a largo plazo de los demás.
      ignoring_present_needs: |
        Desestimar las necesidades presentes legítimas en favor de beneficios
        futuros abstractos.
      one_size_fits_all: |
        Las personas difieren en sus tasas de descuento; no todo el mundo necesita los mismos
        dispositivos de compromiso.
    related_content:
      - loss_aversion_bias
      - empathy_gap
      - zeigarnik_effect
      - default_effect
  - id: illusion_of_control
    name: Ilusión de Control
    quick_introduction: |
      La ilusión de control es la tendencia a sobreestimar nuestra capacidad para
      influir en los resultados. Creemos que tenemos más control del que realmente tenemos, sobre
      eventos aleatorios, otras personas y sistemas complejos. Confundimos correlación
      con causalidad y acción con impacto.
    one_liner: Sobreestimamos nuestra capacidad para influir en los resultados, especialmente en los aleatorios.
    try_this:
      - Pregunta: ¿Qué pasaría si no hiciera nada? ¿Está mi acción causando realmente el resultado?
      - Distingue lo que puedes controlar de lo que no.
      - Observa cuándo vinculas supersticiosamente tus acciones a resultados aleatorios.
    ask_yourself:
      - ¿Estoy confundiendo correlación con causalidad?
      - ¿Sería diferente el resultado si no hubiera actuado?
    in_more_detail: |
      Las personas se sienten más seguras al ganar una lotería cuando eligen
      sus propios números, aunque esto no cambie las probabilidades. Tiramos los dados
      más fuerte cuando queremos números altos. Pensamos que nuestros rituales o comportamientos
      influyen en resultados que son en realidad aleatorios o determinados por factores
      fuera de nuestro control. La ilusión es reconfortante; reduce la ansiedad. Pero puede
      llevar a la exceso de confianza y a malas decisiones.

      La ilusión es más fuerte cuando estamos involucrados en el proceso, cuando
      obtenemos éxito temprano y cuando la tarea nos resulta familiar. Afecta
      a la inversión, la gestión y la vida cotidiana.
    why_this_is_important: |
      Reconocer la ilusión de control te ayuda a calibrar tus
      expectativas, evitar el exceso de confianza y enfocar tus esfuerzos donde
      realmente importan. También explica por qué persistimos en comportamientos supersticiosos
      y sobreestimamos nuestra influencia.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - inversion
      - liderazgo
    how_can_you_spot_it:
      overestimated_influence: |
        Creer que nuestras acciones afectan los resultados cuando no es así.
      ritual_superstition: |
        Comportamientos que creemos que influyen en los resultados (camisa de la suerte, rutina previa al partido) cuando no es así.
      choice_illusion: |
        Sentir que la elección nos da control cuando la elección
        no afecta el resultado.
      action_bias: |
        Preferir "hacer algo" en lugar de "esperar" incluso cuando la acción
        no ayuda.
    examples:
      gambling: |
        Elegir números de lotería se siente más controlable que la
        selección aleatoria; las probabilidades son las mismas.
      investing: |
        Los operadores activos sobreestiman su capacidad para superar al
        mercado; la mayoría tiene un rendimiento inferior después de los costos.
      management: |
        Los líderes sobreestiman su impacto en los resultados organizacionales; muchos factores están fuera de su control.
      sports: |
        Los aficionados creen que sus vítores afectan el juego; los jugadores
        tienen rituales de suerte.
    real_world_implications: |
      La ilusión de control afecta la toma de riesgos, la persistencia
      en esfuerzos fútiles y la atribución de resultados. Puede
      motivar la acción (a veces útil) pero también puede llevar a
      esfuerzos desperdiciados y a exceso de confianza. La calibración mejora
      la calidad de las decisiones.
    professional_application:
      networking_and_relationship_building: |
        Reconoce lo que puedes y no puedes controlar. Enfoca tu energía
        en los factores influenciables. No te atribuyas el mérito de
        resultados que no causaste, ni te culpes por aquellos que
        no pudiste prevenir.
      collaborative_learning_initiative: |
        Al planificar, distingue los factores controlables de los incontrolables.
        Evita la falsa confianza por victorias tempranas. Usa
        el pensamiento probabilístico para calibrar las expectativas.
    how_can_this_be_misapplied:
      learned_helplessness: |
        Sobrecorregir para creer que no tenemos control cuando sí
        tenemos una influencia significativa.
      dismissing_agency: |
        "Todo es suerte" cuando la habilidad y el esfuerzo sí importan en
        muchos dominios.
      false_fatalism: |
        Usar la ilusión de control para justificar la inacción.
      one_size_fits_all: |
        El control varía según el dominio; algunas situaciones son más
        controlables que otras.
    related_content:
      - gamblers_fallacy
      - narrative_fallacy
      - hindsight_bias
      - probabilistic_thinking
  - id: impact_bias
    name: Sesgo de impacto
    quick_introduction: |
      El sesgo de impacto es la tendencia a sobreestimar la intensidad y duración
      de nuestras reacciones emocionales ante eventos futuros. Pensamos que las cosas buenas nos
      harán más felices de lo que realmente lo hacen, y las cosas malas nos harán más miserables de lo
      que realmente nos hacen. Somos malos en la predicción afectiva.
    one_liner: Sobreestimamos cuánto nos afectarán los eventos en nuestra felicidad, y por cuánto tiempo.
    try_this:
      - Pregunta: ¿Cómo me sentí después de eventos pasados similares? Nos adaptamos más rápido de lo que esperamos.
      - No dejes que el impacto anticipado impulse tus decisiones: somos malos prediciendo sentimientos.
      - Observa cuándo sobreestimas el efecto duradero de un solo resultado.
    ask_yourself:
      - ¿Estoy sobreestimando cuánto tiempo me sentiré así?
      - ¿Qué dice la experiencia pasada sobre eventos similares?
    in_more_detail: |
      Daniel Gilbert y Timothy Wilson investigan la predicción afectiva:
      sobreestimamos cuánto tiempo nos sentiremos bien después de una victoria o mal después de una derrota.
      Nos adaptamos más rápido de lo que esperamos. También sobreestimamos el impacto de
      eventos únicos: pensamos que un resultado definirá nuestra felicidad cuando
      muchos factores contribuyen. Nos centramos en las cosas equivocadas al predecir
      nuestros sentimientos futuros.

      El sesgo de impacto afecta las decisiones importantes de la vida: sobreestimamos cuánto
      una promoción, relación o compra cambiará nuestra felicidad. También
      sobreestimamos el dolor duradero de las pérdidas.
    why_this_is_important: |
      Reconocer el sesgo de impacto te ayuda a tomar mejores decisiones sobre lo que
      realmente mejorará tu vida. Reduce la sobreinversión en resultados
      que no importarán tanto como crees, y reduce el miedo a resultados
      que no dolerán tanto como esperas.
    when_to_use:
      - toma_de_decisiones
      - movimientos_profesionales
      - evaluacion_de_riesgos
      - construccion_de_relaciones
    how_can_you_spot_it:
      overestimated_impact: |
        "Esto lo cambiará todo" cuando eventos pasados similares tuvieron un impacto duradero modesto.
      duration_overestimation: |
        "Nunca superaré esto" cuando normalmente nos adaptamos más rápido de lo que esperamos.
      focalism: |
        Centrarse en un evento e ignorar otros factores que afectan el bienestar.
      adaptation_neglect: |
        Olvidar que nos adaptamos tanto a las circunstancias buenas como a las malas.
    examples:
      career: |
        "Si consigo esta promoción, seré mucho más feliz" cuando las promociones pasadas tuvieron un impacto temporal.
      purchases: |
        "Este coche me hará feliz" cuando la novedad se desvanece rápidamente.
      loss: |
        "Nunca me recuperaré de este rechazo" cuando normalmente nos adaptamos en unos meses.
      events: |
        Sobreestimar cuánto afectará una boda, unas vacaciones o un hito a la felicidad a largo plazo.
    real_world_implications: |
      El sesgo de impacto conduce a malas decisiones sobre dinero, carrera y
      relaciones. Pagamos de más por experiencias a las que nos adaptaremos y
      tememos en exceso pérdidas de las que nos recuperaremos. Afecta las políticas y la
      planificación personal.
    professional_application:
      networking_and_relationship_building: |
        Al tomar decisiones profesionales o de relaciones, considera cómo te sentiste después de eventos pasados similares. ¿El impacto duró tanto como esperabas? Usa eso para calibrar predicciones futuras.
      collaborative_learning_initiative: |
        Cuando los equipos enfrentan contratiempos o victorias, recuérdales la adaptación.
        "Nos adaptaremos más rápido de lo que pensamos" puede reducir tanto la celebración excesiva como la desesperación excesiva.
    how_can_this_be_misapplied:
      dismissing_all_impact: |
        Algunos eventos sí tienen un impacto duradero: trauma, pérdida importante. No
        desestimes toda predicción afectiva como sesgada.
      cold_rationality: |
        "No importará" cuando la experiencia en el momento sí importa.
      undervaluing_experiences: |
        Evitar experiencias positivas porque "de todos modos nos adaptaremos".
      invalidating_emotions: |
        Decirle a la gente que sus sentimientos pasarán cuando necesitan apoyo en el momento.
    related_content:
      - negativity_bias
      - empathy_gap
      - rosy_retrospection
      - availability_heuristic
  - id: in_group_bias
    name: Sesgo de endogrupo
    quick_introduction: |
      El sesgo de endogrupo es la tendencia a favorecer a las personas que percibimos como pertenecientes a nuestro grupo sobre aquellas que percibimos como extrañas. Atribuimos cualidades positivas a los miembros del endogrupo y cualidades negativas a los miembros del exogrupo, a menudo basándonos en distinciones mínimas o arbitrarias.
    one_liner: Favorecemos a nuestro endogrupo y juzgamos a los exogrupos con más dureza, a menudo de forma arbitraria.
    try_this:
      - Pregunta: ¿Juzgaría a esta persona de la misma manera si perteneciera a mi grupo?
      - Busca activamente perspectivas del exogrupo al tomar decisiones.
      - Observa cuándo los límites del grupo influyen en tu juicio.
    ask_yourself:
      - ¿Estoy favoreciendo a alguien porque es "uno de los nuestros"?
      - ¿Aplicaría los mismos estándares a un miembro del exogrupo?
    in_more_detail: |
      Incluso cuando los grupos se asignan al azar (por ejemplo, por un lanzamiento de moneda), las personas desarrollan rápidamente una preferencia por su endogrupo. Confiamos más en los miembros del endogrupo, les asignamos recursos de forma más generosa y juzgamos sus acciones con más benevolencia. Los miembros del exogrupo reciben el trato opuesto.

      El sesgo de endogrupo alimenta el tribalismo, la discriminación y el conflicto. Afecta a la contratación, la promoción, la colaboración y las políticas. Puede basarse en la raza, la nacionalidad, la empresa, el equipo o cualquier identidad compartida.
    why_this_is_important: |
      Reconocer el sesgo de endogrupo te ayuda a tomar decisiones más justas, a construir equipos más inclusivos y a evitar el favoritismo. También explica por qué las iniciativas de diversidad enfrentan resistencia: la preferencia por el endogrupo es automática.
    when_to_use:
      - liderazgo
      - toma_de_decisiones
      - construccion_de_relaciones
      - resolucion_de_conflictos
    how_can_you_spot_it:
      preferential_treatment: |
        Dar el beneficio de la duda a "nosotros" pero no a "ellos".
      resource_allocation: |
        Asignar más a los miembros del endogrupo cuando los miembros del exogrupo tienen una necesidad igual o mayor.
      attribution_asymmetry: |
        Éxito del endogrupo = habilidad; éxito del exogrupo = suerte. Fracaso del endogrupo = circunstancia; fracaso del exogrupo = carácter.
      minimal_group_effects: |
        El favoritismo surge incluso con asignaciones de grupo arbitrarias.
    examples:
      hiring: |
        Preferir candidatos que fueron a tu misma universidad o comparten tu origen.
      performance_reviews: |
        Calificar a los miembros del endogrupo de forma más favorable que a los miembros del exogrupo con un rendimiento similar.
      collaboration: |
        Confiar e incluir a "nuestro equipo" mientras se excluye o duda de "su equipo".
      politics: |
        Desestimar los argumentos del exogrupo mientras se aceptan los argumentos del endogrupo sin críticas.
    real_world_implications: |
      El sesgo de endogrupo perpetúa la desigualdad, socava la meritocracia y alimenta el conflicto. Afecta a la contratación, la promoción, la inversión y las políticas. Reducirlo requiere un esfuerzo deliberado, no se solucionará solo.
    professional_application:
      networking_and_relationship_building: |
        Incluye activamente a personas fuera de tu círculo inmediato. Busca perspectivas diversas. Cuestiona si estás favoreciendo a alguien porque es "como tú".
      collaborative_learning_initiative: |
        Utiliza procesos estructurados (revisiones ciegas, paneles diversos) para reducir el sesgo de endogrupo en la contratación y la evaluación. Crea proyectos intergrupales para construir una identidad compartida.
    how_can_this_be_misapplied:
      forced_diversity: |
        Implementar cuotas o políticas que generan resentimiento sin abordar el sesgo subyacente.
      out_group_hostility: |
        Tratar el sesgo de endogrupo como el único problema cuando también existe hostilidad hacia el exogrupo.
      ignoring_legitimate_differences: |
        No todas las diferencias grupales son sesgos; a veces los grupos tienen características diferentes. No asumas que todas las disparidades son discriminación.
      reverse_discrimination: |
        Sobrecampasar para favorecer a los exogrupos de maneras que son injustas para los miembros del endogrupo.
    related_content:
      - fundamental_attribution_error
      - halo_effect
      - false_consensus_effect
      - groupthink
  - id: inversion
    name: Inversión
    quick_introduction: |
      La inversión es una técnica de resolución de problemas que invierte una pregunta. En lugar de
      preguntar "¿Cómo tendré éxito?", preguntas "¿Qué me haría fracasar?" y evitas esas cosas.
      Saca a la luz riesgos y antipatrones que la previsión a menudo pasa por alto.
    one_liner: Invierte—pregunta qué te haría fracasar, luego evita esas cosas.
    try_this:
      - Para cualquier objetivo, enumera las principales formas en que podrías fracasar y luego evítalas.
      - Usa visualización negativa: ¿qué podría salir mal?
      - Pregunta: ¿Qué haría una persona inteligente para arruinar esto?
    ask_yourself:
      - ¿He pensado en lo que haría que esto fracasara?
      - ¿Qué no estoy viendo al pensar solo en el futuro?
    in_more_detail: |
      Popularizada por Charlie Munger y arraigada en la lógica matemática, la inversión explota
      el hecho de que evitar el fracaso suele ser más fácil que buscar el éxito. Si puedes
      identificar las principales formas en que algo sale mal, puedes eliminarlas sistemáticamente.

      Según se informa, Carl Jacobi dijo: "Invierte, siempre invierte". Los estoicos usaron la visualización
      negativa (imaginar la pérdida) para apreciar lo que tenían y prepararse para la adversidad.
      La inversión no es pesimismo; es una forma estructurada de progresar eliminando
      obstáculos.
    why_this_is_important: |
      La inversión te ayuda a evitar errores catastróficos, a poner a prueba los planes y a encontrar
      soluciones no obvias. Complementa la planificación futura asegurando que no
      pases por alto modos de fallo críticos.
    when_to_use:
      - resolución_de_problemas
      - toma_de_decisiones
      - evaluación_de_riesgos
      - decisiones_profesionales
    how_can_you_spot_it:
      premortem_thinking: |
        Antes de un proyecto, pregunta "¿Por qué falló esto?", como si ya hubiera sucedido.
      anti_goals: |
        Definir lo que quieres evitar tan claramente como lo que quieres lograr.
      reverse_engineering_failure: |
        Estudiar casos fallidos para extraer lecciones en lugar de solo estudiar éxitos.
      constraint_focus: |
        Identificar restricciones y cuellos de botella antes de optimizar las ventajas.
    examples:
      investing: |
        En lugar de "¿Qué hará que esta acción suba?", pregunta "¿Qué me haría perder dinero?"
        y evita esos escenarios.
      career: |
        "¿Qué arruinaría mi reputación?" conduce a una lista de comportamientos a evitar.
      product_launch: |
        "¿Por qué fallan la mayoría de los lanzamientos de productos?" saca a la luz riesgos a abordar antes del lanzamiento.
      health: |
        "¿Qué hábitos acortan la vida?" ofrece una lista de evitación más clara que "¿Qué me hace
        estar sano?"
    real_world_implications: |
      La inversión se utiliza en ingeniería (análisis de modos de fallo), inversión y estrategia.
      Reduce el exceso de confianza y mejora la gestión de riesgos. La dependencia excesiva puede provocar
      una cautela excesiva.
    professional_application:
      networking_and_relationship_building: |
        "¿Qué dañaría esta relación?" te ayuda a evitar comportamientos que rompen la confianza.
      collaborative_learning_initiative: |
        Realiza análisis premortem de los proyectos: "Esto falló. ¿Por qué?". Usa las respuestas para mejorar
        la planificación y la ejecución.
    how_can_this_be_misapplied:
      excessive_risk_aversion: |
        Centrarse solo en evitar el fracaso puede paralizar la acción e impedir la toma de riesgos necesaria.
      negativity_bias: |
        La inversión puede amplificar el sesgo de negatividad si no se equilibra con la identificación de oportunidades futuras.
      analysis_paralysis: |
        Pasar tanto tiempo en los modos de fallo que nunca se ejecuta.
      missing_upside: |
        La inversión no te dice qué hacer, solo qué evitar. Aún necesitas
        objetivos positivos.
    related_content:
      - second_order_thinking
      - survivorship_bias
      - hindsight_bias
      - loss_aversion_bias
  - id: law_of_diminishing_returns
    name: Ley de los rendimientos decrecientes
    quick_introduction: |
      La ley de los rendimientos decrecientes establece que a medida que se agrega más de un insumo mientras
      se mantienen constantes los demás, la producción adicional de cada nueva unidad de insumo eventualmente
      disminuye. Más no siempre es mejor; hay un punto en el que el esfuerzo adicional produce
      cada vez menos.
    one_liner: Más insumo eventualmente produce menos producto; hay un punto óptimo.
    try_this:
      - Pregunta: ¿He superado el punto en el que el esfuerzo adicional produce rendimientos significativos?
      - Prioriza los insumos de mayor apalancamiento; detente cuando los rendimientos marginales disminuyan.
      - Nota cuándo estás invirtiendo demasiado en algo que ya ha dado frutos.
    ask_yourself:
      - ¿Qué ganaría con una unidad más de esfuerzo aquí?
      - ¿Estoy optimizando más allá del punto de rendimientos decrecientes?
    in_more_detail: |
      En economía, agregar más trabajadores a una cantidad fija de tierra eventualmente produce
      ganancias incrementales más pequeñas. En la productividad personal, la primera hora de estudio puede
      agregar más valor que la décima. El principio se aplica a los recursos, el esfuerzo, el tiempo
      y las características. Hay un punto óptimo; más allá de él, los rendimientos marginales disminuyen y
      pueden incluso volverse negativos.

      Reconocer los rendimientos decrecientes te ayuda a asignar recursos de manera eficiente y
      evitar invertir demasiado en áreas que ya han producido la mayor parte de su valor.
    why_this_is_important: |
      Comprender los rendimientos decrecientes previene la sobreinversión, guía la priorización
      y te ayuda a saber cuándo detenerte. Es esencial para la asignación de recursos y
      evitar el perfeccionismo.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - inversion
      - movimientos_de_carrera
    how_can_you_spot_it:
      incremental_gains_decreasing: |
        Cada unidad adicional de esfuerzo o recurso produce menos producto que la
        anterior.
      perfectionism_trap: |
        Esforzarse por el último 10% de calidad consume un esfuerzo desproporcionado.
      overinvestment: |
        Continuar agregando recursos cuando el rendimiento marginal es bajo o negativo.
      optimal_point_passed: |
        Has ido más allá del punto en el que más insumo mejora los resultados.
    examples:
      studying: |
        Las primeras 2 horas de preparación para el examen agregan más que las horas 7-8; hay un punto de
        rendimientos decrecientes.
      product_features: |
        Agregar más características a una aplicación puede confundir a los usuarios; la característica 20 agrega menos
        valor que la 5ª.
      hiring: |
        Agregar más personas a un proyecto puede ralentizarlo (Ley de Brooks) después de un punto.
      marketing: |
        Duplicar el gasto en publicidad no duplica los resultados; los rendimientos disminuyen a medida que saturas
        el mercado.
    real_world_implications: |
      La ley de los rendimientos decrecientes guía la política económica, la estrategia empresarial y
      la productividad personal. Ignorarla conduce a recursos desperdiciados y resultados subóptimos.
      Apoya el principio de Pareto y el enfoque.
    professional_application:
      networking_and_relationship_building: |
        Invertir en unas pocas relaciones profundas puede producir más que distribuir el esfuerzo
        diluidamente entre muchas. Reconoce cuándo el networking adicional tiene rendimientos decrecientes.
      collaborative_learning_initiative: |
        Más horas de formación no siempre significan mejores resultados. Encuentra la dosis óptima
        y evita la sobrecarga.
    how_can_this_be_misapplied:
      premature_optimization: |
        Detenerse demasiado pronto antes de alcanzar un nivel de calidad razonable.
      undershooting: |
        Usar los rendimientos decrecientes como excusa para un esfuerzo insuficiente.
      misidentifying_the_curve: |
        Asumir rendimientos decrecientes cuando en realidad estás en una parte diferente de la curva
        (por ejemplo, la fase exponencial temprana).
      one_size_fits_all: |
        Aplicar el mismo "punto óptimo" en diferentes contextos donde las curvas difieren.
    related_content:
      - pareto_principle
      - parkinsons_law
      - sunk_cost_fallacy
      - inversion
  - id: loss_aversion_bias
    name: Sesgo de aversión a la pérdida
    quick_introduction: |
      We often feel the pain of losing something more intensely than the
      pleasure of gaining something of equal value.
    one_liner: Las pérdidas se sienten aproximadamente el doble de dolorosas de lo que se sienten bien las ganancias equivalentes.
    try_this:
      - "Pregúntate: ¿Estoy sobrevalorando lo que perdería frente a lo que ganaría?"
      - Replantear la elección como ganancias en lugar de pérdidas y ver si tu punto de vista cambia.
      - Observa cuándo el miedo a perder está impulsando la decisión más que el beneficio real.
    ask_yourself:
      - ¿Qué elegiría si empezara desde cero?
      - ¿Me aferro a esto por lo que perdería, o porque el futuro es genuinamente mejor?
    in_more_detail: |
      Desarrollada por Daniel Kahneman y Amos Tversky, la aversión a la pérdida describe cómo las pérdidas y las ganancias
      se perciben de forma asimétrica. El impacto psicológico de perder $100 es típicamente mucho
      mayor que la satisfacción de ganar $100. Este sesgo influye en las decisiones en
      finanzas, negociaciones y elecciones cotidianas, lo que a menudo lleva a un comportamiento reacio al riesgo
      cuando las pérdidas potenciales son evidentes.
    why_this_is_important: |
      Comprender la aversión a la pérdida te ayuda a reconocer cuándo el miedo a la pérdida está impulsando las decisiones
      más que el análisis racional. Explica por qué las personas se aferran a inversiones perdedoras, evitan
      cambios necesarios y toman decisiones subóptimas en negociaciones y decisiones de carrera.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - movimientos_de_carrera
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      emotional_reaction_to_losses: |
        Observa cuándo la perspectiva de perder algo desencadena una ansiedad
        o resistencia desproporcionada en comparación con el beneficio de una ganancia potencial.
      reluctance_to_change: |
        Duda en cambiar estrategias, dejar un trabajo o vender un activo, incluso cuando
        el análisis objetivo sugiere que es la mejor opción.
      framing_sensitivity: |
        Las decisiones cambian drásticamente según si las opciones se presentan como ganancias
        o pérdidas, incluso cuando los resultados son equivalentes.
      overvaluing_what_you_have: |
        El efecto dotación (endowment effect), que consiste en valorar más las cosas que posees simplemente porque
        las posees, a menudo acompaña a la aversión a la pérdida.
    examples:
      investing: |
        Mantener una acción en declive para "evitar materializar la pérdida" mientras se pierden
        mejores oportunidades de inversión en otros lugares.
      career: |
        Permanecer en un trabajo insatisfactorio porque irse se siente como perder seguridad,
        incluso cuando la nueva oportunidad ofrece un mayor crecimiento.
      negotiations: |
        Rechazar una oferta justa porque se presenta como "renunciar" a algo,
        en lugar de "ganar" un acuerdo.
      product_design: |
        Pruebas gratuitas que se convierten en pago: los usuarios experimentan la "pérdida" del servicio
        cuando finaliza la prueba, lo que motiva la suscripción más de lo que motivaría "ganar"
        un nuevo servicio.
    real_world_implications: |
      La aversión a la pérdida moldea los mercados, las políticas y el comportamiento individual. Explica
      por qué los seguros y las garantías se venden bien, por qué las personas evitan el cambio beneficioso
      y por qué las noticias negativas tienen un impacto desproporcionado. Reconocerla puede mejorar
      la calidad de las decisiones y reducir las decisiones impulsadas por el arrepentimiento.
    professional_application:
      networking_and_relationship_building: |
        Ten en cuenta que las personas pueden resistirse a terminar relaciones o
        colaboraciones improductivas debido a la aversión a la pérdida: temen "perder" la conexión.
        Presenta las nuevas oportunidades como ganancias en lugar de pérdidas para reducir la resistencia.
      collaborative_learning_initiative: |
        Al introducir nuevos procesos o herramientas, enfatiza lo que el equipo gana
        en lugar de lo que está "renunciando". Las iniciativas de cambio con un marco de pérdidas
        a menudo desencadenan una resistencia más fuerte.
    how_can_this_be_misapplied:
      manipulation: |
        Explotar la aversión a la pérdida para presionar decisiones, por ejemplo, "ofertas por tiempo limitado"
        o el encuadre de "no te lo pierdas" que activa el miedo a la pérdida en lugar de
        una evaluación genuina del valor.
      misinterpreting_relationships: |
        Asumir que la resistencia de alguien al cambio es puramente racional cuando puede
        estar impulsada por la aversión a la pérdida. Atribuir erróneamente motivos puede dañar la confianza.
      overcommitment: |
        Falacia del costo hundido: continuar invirtiendo en un proyecto fallido porque
        "ya hemos invertido tanto" en lugar de cortar las pérdidas.
      missed_opportunities_for_conflict_resolution: |
        Negarse a comprometerse porque cualquier concesión se siente como una pérdida,
        incluso cuando la alternativa es un peor resultado para todos.
      vulnerability_to_exploitation: |
        Ser manipulado por otros que enmarcan las elecciones para activar la aversión a la pérdida,
        como tácticas de venta que enfatizan lo que "perderás" si no actúas.
      reinforcing_negative_perceptions: |
        Centrarse excesivamente en los inconvenientes potenciales puede crear una perspectiva pesimista
        que se vuelve autocumplida, perdiendo oportunidades de crecimiento.
    related_content:
      - anchoring_bias
      - endowment_effect
      - sunk_cost_fallacy
  - id: map_is_not_the_territory
    name: El mapa no es el territorio
    quick_introduction: |
      "El mapa no es el territorio" significa que una representación de la realidad no es la realidad
      en sí misma. Los modelos, las teorías y las descripciones son simplificaciones útiles, pero
      siempre dejan algo fuera. Confundir el mapa con el territorio lleva al error.
    one_liner: El mapa no es el territorio — todos los modelos son erróneos; algunos son útiles.
    try_this:
      - Cuando un modelo no coincide con la realidad, actualiza el mapa — no fuerces la realidad a encajar.
      - Pregunta: ¿Qué está dejando fuera este modelo? ¿Cuándo podría fallar?
      - Trata los modelos como herramientas, no como la verdad.
    ask_yourself:
      - ¿Estoy confundiendo mi modelo con la realidad?
      - ¿Ha cambiado el territorio desde la última vez que miré?
    in_more_detail: |
      Alfred Korzybski introdujo esta idea en la semántica general. Un mapa de una ciudad es
      útil para la navegación, pero no es la ciudad — omite detalles, se desactualiza y
      nunca puede capturarlo todo. Lo mismo se aplica a los modelos mentales, las teorías científicas
      y los organigramas.

      Todos los modelos son erróneos; algunos son útiles. El peligro es tratar un modelo como si fuera
      la verdad completa, especialmente cuando el territorio ha cambiado. Pensar bien
      requiere actualizar los mapas cuando la realidad no coincide.
    why_this_is_important: |
      Reconocer que los mapas difieren del territorio previene el exceso de confianza en los modelos,
      fomenta la actualización de creencias y reduce el riesgo de actuar basándose en información obsoleta o
      simplificada en exceso.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - aprendizaje
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      model_reality_confusion: |
        Tratar un marco o teoría como si describiera completamente la realidad.
      outdated_assumptions: |
        Actuar basándose en información o modelos que ya no se corresponden con las condiciones actuales.
      oversimplification: |
        Ignorar los matices porque el "mapa" no los incluye.
      map_worship: |
        Defender un modelo cuando la evidencia lo contradice en lugar de actualizarlo.
    examples:
      organizational_charts: |
        Asumir que la estructura jerárquica refleja cómo se realiza realmente el trabajo.
      financial_models: |
        Tratar una proyección de hoja de cálculo como una predicción en lugar de un escenario.
      stereotypes: |
        Aplicar generalizaciones a nivel de grupo a individuos.
      strategy_docs: |
        Ejecutar un plan tal como está escrito cuando el mercado ha cambiado.
    real_world_implications: |
      La distinción mapa-territorio es fundamental para la ciencia, la ingeniería y la
      filosofía. Subyace a la actualización bayesiana, la metodología ágil y la humildad epistémica. Ignorarla
      conduce a un pensamiento rígido y a estrategias fallidas.
    professional_application:
      networking_and_relationship_building: |
        Tu modelo mental de una persona puede estar desactualizado. Actualízalo a través de la interacción directa
        en lugar de depender de viejas impresiones.
      collaborative_learning_initiative: |
        Anima a los equipos a tratar los planes y modelos como hipótesis a probar y
        revisar, no como verdades fijas.
    how_can_this_be_misapplied:
      radical_skepticism: |
        Concluir que ningún mapa es útil y todo conocimiento es sospechoso.
      constant_revision: |
        Actualizar tan frecuentemente que no surge una comprensión estable.
      dismissing_models: |
        Rechazar simplificaciones útiles porque "no son el territorio".
      relativism: |
        Afirmar que todos los mapas son igualmente válidos cuando algunos se ajustan claramente mejor al territorio.
    related_content:
      - narrative_fallacy
      - confirmation_bias
      - bayes_theorem
      - illusion_of_control
  - id: mere_exposure_effect
    name: Efecto de la mera exposición
    quick_introduction: |
      El efecto de la mera exposición es la tendencia a desarrollar una preferencia por las cosas
      simplemente porque nos resultan familiares. La exposición repetida —incluso sin
      refuerzo— aumenta la simpatía. Tendemos a preferir lo que conocemos.
    one_liner: La familiaridad genera simpatía—preferimos lo que hemos visto antes.
    try_this:
      - Preguntar: ¿Me gusta esto porque es bueno, o porque es familiar?
      - Al evaluar opciones, corrige por exposición: las cosas nuevas empiezan con desventaja.
      - Observa cuándo la repetición influye en tu preferencia.
    ask_yourself:
      - ¿Prefiero algo principalmente porque lo he visto antes?
      - ¿Elegiría de manera diferente si la exposición fuera equitativa?
    in_more_detail: |
      Robert Zajonc demostró que la exposición repetida a estímulos (caras, palabras, formas)
      aumenta el afecto positivo hacia ellos, incluso cuando no somos conscientes
      de la exposición. La familiaridad genera simpatía, no desprecio (en muchos
      casos). El efecto es más fuerte cuando no estamos analizando y cuando la exposición
      es sutil.

      El efecto de la mera exposición afecta la preferencia de marca, la atracción interpersonal
      y el juicio estético. Explica por qué preferimos la música familiar, por qué la publicidad funciona a través de la repetición y por qué podemos preferir
      a personas que hemos visto antes, incluso sin interacción.
    why_this_is_important: |
      Reconocer el efecto de la mera exposición te ayuda a comprender tus propias
      preferencias y a resistir la manipulación a través de la repetición. También
      explica por qué la visibilidad y la presencia importan para las relaciones y
      las marcas. La familiaridad es una influencia poderosa pero a menudo inconsciente.
    when_to_use:
      - construccion_de_relaciones
      - toma_de_decisiones
      - liderazgo
      - aprendizaje
    how_can_you_spot_it:
      familiarity_preference: |
        Preferir opciones que hemos visto antes sobre las novedosas.
      repetition_influence: |
        La exposición repetida aumenta la simpatía sin persuasión explícita.
      unconscious_influence: |
        El efecto funciona incluso cuando no somos conscientes de la exposición.
      brand_recognition: |
        Se prefieren las marcas familiares incluso cuando no podemos articular por qué.
    examples:
      advertising: |
        La exposición repetida a una marca aumenta la preferencia, incluso sin
        mensajes persuasivos.
      music: |
        Las canciones que hemos escuchado antes tienden a gustarnos más que las nuevas
        al primer intento.
      people: |
        Tendemos a que nos gusten más las personas que hemos visto repetidamente (por ejemplo, compañeros de clase,
        colegas) que los extraños, incluso sin interacción.
      ideas: |
        Las ideas que hemos encontrado antes nos resultan más cómodas y
        creíbles que las novedosas.
    real_world_implications: |
      El efecto de la mera exposición moldea el comportamiento del consumidor, las preferencias políticas
      y la atracción social. Es explotado en el marketing y puede crear ventajas injustas para lo familiar. También
      explica por qué la diversidad de exposición importa: la familiaridad con
      la diferencia reduce los prejuicios.
    professional_application:
      networking_and_relationship_building: |
        La visibilidad importa. Aparecer, estar presente y ser
        visto crea familiaridad que genera simpatía. No
        subestimes el valor del contacto repetido de bajo riesgo.
      collaborative_learning_initiative: |
        Expón a las personas a diversas perspectivas y personas repetidamente:
        la familiaridad puede reducir los prejuicios. Pero ten en cuenta que la mera exposición
        también puede reforzar la preferencia por el status quo.
    how_can_this_be_misapplied:
      manipulation: |
        Crear deliberadamente exposición repetida para manipular
        preferencias sin consentimiento.
      false_familiarity: |
        Asumir que la familiaridad equivale a calidad; a veces las
        opciones novedosas son mejores.
      exclusion: |
        Si solo ciertas personas obtienen exposición, obtienen una ventaja injusta.
        Considera quién tiene acceso a la visibilidad.
      stagnation: |
        Depender demasiado de la familiaridad y nunca probar cosas nuevas.
    related_content:
      - ben_franklin_effect
      - availability_heuristic
      - baader_meinhof_phenomenon
      - halo_effect
  - id: narrative_fallacy
    name: Falacia narrativa
    quick_introduction: |
      La falacia narrativa es la tendencia a construir historias a partir de eventos pasados
      que hacen que parezcan más coherentes, predecibles y significativos de lo que realmente fueron.
      Retroalimentamos explicaciones sobre la aleatoriedad. Convertimos el desorden
      de la historia en una historia pulcra, y luego creemos que la historia era inevitable.
    one_liner: Retroalimentamos historias coherentes sobre la aleatoriedad, y luego creemos que eran inevitables.
    try_this:
      - Pregunta: ¿Cuánto de esta historia es retrospectiva? ¿Qué papel jugó la suerte?
      - Sé escéptico ante las explicaciones pulcras; el pasado fue más desordenado que nuestras historias.
      - Observa cuándo "tiene sentido" está haciendo el trabajo de "era predecible".
    ask_yourself:
      - ¿Estoy construyendo una historia que hace que el pasado parezca más inevitable de lo que fue?
      - ¿Habría predicho esto antes de que sucediera?
    in_more_detail: |
      Nassim Taleb popularizó el término. Ansiamos la narrativa: causa y efecto,
      héroes y villanos, arcos claros. Así que construimos historias que conectan
      eventos en retrospectiva. La historia se siente verdadera porque es coherente, pero
      la coherencia no significa que sea correcta. Confundimos "tiene sentido" con
      "era predecible". Subestimamos el papel de la suerte y
      la aleatoriedad.

      La falacia narrativa afecta cómo aprendemos de la historia, evaluamos
      el éxito y hacemos predicciones. Sobredimensionamos el poder explicativo
      de las historias y subestimamos el papel del azar.
    why_this_is_important: |
      Reconocer la falacia narrativa te ayuda a evitar aprender demasiado del
      pasado y sobreestimar la predictibilidad. Fomenta la humildad
      sobre la causalidad y la predicción. No todo lo que hace una buena
      historia es cierto o generalizable.
    when_to_use:
      - toma_de_decisiones
      - aprendizaje
      - evaluacion_de_riesgos
      - resolucion_de_problemas
    how_can_you_spot_it:
      hindsight_coherence: |
        Los eventos pasados se explican con una historia pulcra que no era
        visible en ese momento.
      cause_effect_overconfidence: |
        Asignamos causas claras a resultados que tuvieron muchos
        factores contribuyentes.
      luck_minimization: |
        El éxito y el fracaso se explican por habilidad y estrategia,
        no por suerte.
      story_over_evidence: |
        Una narrativa convincente anula la evidencia estadística.
    examples:
      business_success: |
        "Tuvieron éxito debido a X" cuando muchos factores y suerte
        estaban involucrados; elegimos la historia que encaja.
      investing: |
        Explicar los movimientos del mercado con narrativas que se sienten
        satisfactorias pero que pueden ser post-hoc.
      history: |
        Los eventos históricos se cuentan como progresiones inevitables
        cuando dependían de muchos factores.
      career: |
        "Llegué aquí porque hice X" cuando la suerte y el momento
        jugaron roles significativos.
    real_world_implications: |
      La falacia narrativa distorsiona el aprendizaje, la confianza excesiva
      en la predicción y la atribución del éxito y el fracaso.
      Hace que el pasado parezca más predecible de lo que fue
      y el futuro parezca más predecible de lo que es.
    professional_application:
      networking_and_relationship_building: |
        Cuando alguien cuenta su historia de éxito, recuerda que
        es una narrativa: coherente y convincente, pero posiblemente
        simplificada. La suerte y los factores invisibles pueden estar subestimados.
      collaborative_learning_initiative: |
        En las retrospectivas, distingue la narrativa de la evidencia.
        Pregunta "¿Qué habríamos dicho en ese momento?". Usa
        diarios de decisiones para capturar la incertidumbre antes de que
        se conozcan los resultados.
    how_can_this_be_misapplied:
      dismissing_all_explanation: |
        Algunas narrativas son correctas; no todo es
        falacia narrativa. La causalidad existe.
      excessive_skepticism: |
        Negarse a aprender del pasado porque "falacia
        narrativa". Todavía podemos extraer lecciones útiles.
      false_randomness: |
        Asumir que todo es aleatorio cuando algunos resultados
        son atribuibles de manera significativa.
      undermining_storytelling: |
        Las historias tienen valor para la comunicación y el significado;
        la falacia es creer que son completas o
        predictivas, no que existen.
    related_content:
      - hindsight_bias
      - survivorship_bias
      - regression_to_the_mean
      - map_is_not_the_territory
  - id: negativity_bias
    name: Sesgo de negatividad
    quick_introduction: |
      El sesgo de negatividad es la tendencia a dar más peso a la información negativa que a la
      positiva. Las malas noticias, las críticas y las amenazas capturan nuestra atención e
      influyen en nuestras decisiones con más fuerza que los estímulos positivos equivalentes.
    one_liner: Las malas noticias pesan más que las buenas; estamos diseñados para priorizar las amenazas.
    try_this:
      - Busca y pondera activamente la evidencia positiva al evaluar.
      - Observa cuándo una crítica está pesando más que muchos elogios.
      - Pregunta: ¿Estoy dando a la información negativa más peso del que merece?
    ask_yourself:
      - ¿Me estoy deteniendo en lo negativo y descartando lo positivo?
      - ¿Me sentiría diferente si me enfocara en la evidencia positiva?
    in_more_detail: |
      Evolutivamente, pasar por alto una amenaza podía ser fatal, mientras que pasar por alto una oportunidad
      solía ser sobrevivible. Nuestros cerebros están programados para priorizar la información negativa.
      Un solo comentario crítico puede anular muchos elogios. Los eventos negativos se recuerdan con más
      vividez y durante más tiempo.

      Este sesgo afecta las relaciones, la toma de decisiones y el bienestar. Nos detenemos en los
      fracasos, anticipamos los peores escenarios y descartamos la evidencia positiva. Comprenderlo
      nos ayuda a corregirlo.
    why_this_is_important: |
      Reconocer el sesgo de negatividad te ayuda a equilibrar la retroalimentación, evitar reaccionar
      excesivamente a las críticas y tomar decisiones más calibradas. También explica por qué las
      malas noticias dominan y por qué a menudo nos sentimos peor de lo que las circunstancias
      ameritan.
    when_to_use:
      - toma_de_decisiones
      - construccion_de_relaciones
      - liderazgo
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      disproportionate_impact_of_criticism: |
        Un comentario negativo eclipsa a muchos positivos.
      threat_prioritization: |
        Las desventajas potenciales reciben más atención que las ventajas equivalentes.
      vivid_negative_memories: |
        Las experiencias negativas se recuerdan más fácilmente y con más emoción.
      discounting_positive_evidence: |
        Las buenas noticias se olvidan rápidamente o se descartan.
    examples:
      performance_reviews: |
        Un empleado se fija en un comentario crítico y descarta la evaluación positiva general.
      news_consumption: |
        Los titulares negativos dominan la atención y dan forma a la visión del mundo a pesar de las
        tendencias positivas.
      relationships: |
        Una sola discusión pesa más que muchos buenos momentos.
      investing: |
        Las caídas del mercado desencadenan más pánico que euforia desencadenan las subidas equivalentes.
    real_world_implications: |
      El sesgo de negatividad moldea los medios de comunicación, la política y la cultura organizacional.
      Contribuye a la ansiedad, el conflicto y las decisiones subóptimas. Contrarrestarlo deliberadamente
      puede mejorar el bienestar y el juicio.
    professional_application:
      networking_and_relationship_building: |
        Al dar retroalimentación, ten en cuenta que los comentarios negativos pesarán más;
        equilíbralos y enfatiza el crecimiento. Al recibir retroalimentación, considera conscientemente
        el panorama completo.
      collaborative_learning_initiative: |
        Crea culturas que contrarresten explícitamente el sesgo de negatividad: celebra los éxitos,
        documenta los resultados positivos y equilibra los análisis post-mortem con "pre-mortem"
        de lo que salió bien.
    how_can_this_be_misapplied:
      toxic_positivity: |
        Desestimar preocupaciones legítimas insistiendo en el "pensamiento positivo".
      ignoring_real_threats: |
        Sobrecotrar hasta el punto de subestimar riesgos genuinos.
      feedback_suppression: |
        Evitar críticas necesarias porque "la negatividad es mala".
      invalidation: |
        Decirle a alguien que sus sentimientos negativos son "solo el sesgo de negatividad"
        cuando tienen una razón real para preocuparse.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - impact_bias
      - confirmation_bias
  - id: occams_razor
    name: Navaja de Ockham
    quick_introduction: |
      La Navaja de Ockham es el principio de que, entre hipótesis competidoras,
      se debe preferir aquella con menos suposiciones. Las explicaciones más sencillas
      son a menudo —aunque no siempre— correctas.
    one_liner: Prefiere la explicación más sencilla que se ajusta a la evidencia.
    try_this:
      - Al comparar teorías, pregunta: ¿Cuál tiene menos suposiciones?
      - No añadas complejidad sin evidencia que la demande.
      - Nota cuándo prefieres una explicación elaborada a una simple.
    ask_yourself:
      - ¿Estoy introduciendo complejidad innecesaria?
      - ¿La evidencia requiere este nivel de explicación?
    in_more_detail: |
      Nombrado en honor a Guillermo de Ockham, el principio no afirma que las explicaciones sencillas
      sean siempre verdaderas. Sugiere que la complejidad innecesaria no debe introducirse
      sin evidencia. Si dos teorías explican los mismos fenómenos, la más sencilla es
      preferible hasta que la evidencia exija lo contrario.

      La Navaja de Ockham es una heurística, no una ley. A veces la explicación correcta es
      compleja. Pero protege contra el sobreajuste, el pensamiento conspirativo y la complicación innecesaria.
      Favorece la parsimonia en la explicación.
    why_this_is_important: |
      Aplicar la Navaja de Ockham mejora la resolución de problemas, reduce el sobreajuste en modelos,
      y te ayuda a evitar teorías elaboradas pero sin fundamento. Es un valor por defecto útil
      cuando la evidencia es ambigua.
    when_to_use:
      - resolución_de_problemas
      - toma_de_decisiones
      - aprendizaje
      - evaluación_de_riesgos
    how_can_you_spot_it:
      unnecessary_complexity: |
        Una explicación invoca muchas suposiciones cuando menos serían suficientes.
      conspiracy_tendencies: |
        Explicaciones complejas y con múltiples actores para eventos que tienen causas más simples.
      overfitting: |
        Un modelo o teoría que explica perfectamente los datos pasados pero falla con datos nuevos.
      elegance_in_explanation: |
        Las mejores explicaciones a menudo se sienten "obvias" en retrospectiva.
    examples:
      debugging: |
        Cuando ocurre un error, comprueba primero las causas más sencillas (ej. error tipográfico, configuración incorrecta)
        antes de asumir problemas de arquitectura.
      conspiracy_theories: |
        "El gobierno orquestó X" requiere muchos actores ocultos; "unas pocas personas
        cometieron errores" es más simple.
      product_failure: |
        Los usuarios no adoptan una función —la explicación más sencilla: no resuelve su
        problema, no que estén confundidos por la interfaz de usuario.
      medical_diagnosis: |
        "Las cosas comunes son comunes" — considera diagnósticos frecuentes antes que raros.
    real_world_implications: |
      La Navaja de Ockham guía la investigación científica, la ingeniería y el razonamiento cotidiano.
      Reduce el esfuerzo desperdiciado en teorías erróneas y elaboradas. Mal aplicada, puede descartar
      fenómenos genuinamente complejos.
    professional_application:
      networking_and_relationship_building: |
        Al interpretar el comportamiento de otros, prefiere explicaciones sencillas (están ocupados,
        lo olvidaron) antes de asumir malicia o motivos complejos.
      collaborative_learning_initiative: |
        En sesiones de resolución de problemas, pregunta explícitamente "¿Cuál es la explicación más sencilla?"
        antes de construir modelos complejos.
    how_can_this_be_misapplied:
      oversimplification: |
        Descartar explicaciones complejas válidas porque son "demasiado complicadas".
      status_quo_bias: |
        Usar la Navaja de Ockham para preferir explicaciones familiares sobre otras novedosas pero correctas.
      scientific_rigidity: |
        Rechazar teorías nuevas porque son más complejas, incluso cuando la evidencia las apoya.
      missing_nuance: |
        Algunos dominios (ej. comportamiento humano, ecosistemas) son inherentemente complejos;
        la simplicidad puede ser engañosa.
    related_content:
      - hanlons_razor
      - fundamental_attribution_error
      - narrative_fallacy
      - base_rate_fallacy
  - id: ostrich_effect
    name: Efecto del avestruz
    quick_introduction: |
      El efecto del avestruz es la tendencia a evitar la información financiera negativa, a
      "enterrar la cabeza en la arena" como un avestruz. La gente evita mirar sus
      carteras cuando los mercados bajan, retrasa la apertura de facturas e ignora señales de advertencia
      que podrían ayudarles a actuar.
    one_liner: Evitar las malas noticias no cambia la realidad, solo retrasa tu respuesta.
    try_this:
      - Programa revisiones periódicas para no poder evitar las cifras.
      - Observa cuándo estás retrasando abrir algo o mirar algo.
      - Pregúntate: ¿Qué estoy evitando y qué cambiaría si lo enfrentara?
    ask_yourself:
      - ¿Estoy evitando información porque podría ser mala?
      - ¿Una conciencia más temprana me ayudaría a actuar mejor?
    in_more_detail: |
      El término se acuñó en finanzas conductuales para describir a los inversores que evitan
      revisar sus inversiones durante las caídas del mercado. El comportamiento se extiende
      más allá de las finanzas: evitar chequeos médicos, ignorar problemas en las relaciones y
      retrasar conversaciones difíciles. Buscamos evitar la ansiedad de
      las malas noticias, pero la evitación a menudo empeora los resultados al prevenir una acción oportuna.

      El efecto está impulsado por la aversión a la pérdida y el deseo de evitar el malestar emocional.
      Desafortunadamente, la ignorancia no cambia la realidad, solo retrasa nuestra respuesta.
    why_this_is_important: |
      Reconocer el efecto del avestruz te ayuda a enfrentar la información difícil
      de manera proactiva. Evitar las malas noticias rara vez mejora los resultados; por lo general,
      los agrava. La conciencia oportuna permite tomar mejores decisiones.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - evaluacion_de_riesgos
      - movimientos_profesionales
    how_can_you_spot_it:
      avoiding_portfolio_checks: |
        No mirar los estados de cuenta de inversiones cuando los mercados bajan.
      delaying_difficult_information: |
        Retrasar la apertura de facturas, resultados médicos o comentarios de desempeño.
      information_avoidance: |
        Evitar activamente fuentes que puedan contener malas noticias.
      procrastination_on_unpleasant_tasks: |
        Retrasar acciones que sacarían a la luz o abordarían problemas.
    examples:
      investing: |
        Un inversor deja de revisar su plan de jubilación (401(k)) durante un mercado bajista, perdiendo
        oportunidades de reequilibrio.
      health: |
        Evitar una cita médica a pesar de los síntomas por miedo a malas noticias.
      finances: |
        No abrir estados de cuenta de tarjetas de crédito o alertas bancarias para evitar enfrentar deudas.
      performance: |
        Un gerente evita dar retroalimentación crítica hasta la revisión anual, cuando
        una intervención anterior habría ayudado.
    real_world_implications: |
      El efecto del avestruz conduce a peores resultados financieros, tratamiento médico retrasado
      y problemas no resueltos en relaciones y trabajo. Agrava las pérdidas evitables. Los sistemas que hacen que la información sea difícil de ignorar pueden ayudar.
    professional_application:
      networking_and_relationship_building: |
        No evites las conversaciones difíciles. Aborda los problemas temprano en lugar de
        esperar que se resuelvan solos. Crea revisiones periódicas que saquen a la luz
        problemas antes de que escalen.
      collaborative_learning_initiative: |
        Crea bucles de retroalimentación que dificulten ignorar los problemas: paneles de control,
        revisiones periódicas y normas que fomenten la divulgación temprana de malas noticias.
    how_can_this_be_misapplied:
      information_overload: |
        Forzar el monitoreo constante cuando cierta evitación de información es saludable
        (por ejemplo, no revisar las acciones cada minuto).
      anxiety_amplification: |
        Crear tanto enfoque en problemas potenciales que aumente la ansiedad
        sin mejorar los resultados.
      blame_shifting: |
        Atribuir toda la evitación al "efecto del avestruz" cuando cierta evitación es
        racional (por ejemplo, ignorar el ruido).
      micromanagement: |
        Usar el concepto para justificar la vigilancia excesiva de otros.
    related_content:
      - loss_aversion_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: pareto_principle
    name: Principio de Pareto
    quick_introduction: |
      El principio de Pareto (o regla del 80/20) establece que aproximadamente el 80% de los efectos provienen
      del 20% de las causas. Una pequeña minoría de entradas a menudo produce la mayoría de los resultados—
      en ventas, errores, clientes, esfuerzo, características y más. Enfócate en lo vitalmente importante.
    one_liner: El 80% de los efectos provienen del 20% de las causas—enfócate en lo vitalmente importante.
    try_this:
      - Identifica el 20% de las entradas que producen el 80% de los resultados—enfócate ahí.
      - Elimina o prioriza el 80% que produce poco.
      - Pregunta: ¿Qué pocas cosas, si las hiciera bien, importarían más?
    ask_yourself:
      - ¿Estoy distribuyendo el esfuerzo de manera uniforme cuando unas pocas cosas importan más?
      - ¿Cuál es mi 20% de alto impacto?
    in_more_detail: |
      Vilfredo Pareto observó que el 80% de la tierra de Italia era propiedad del 20% de la
      población. El principio se ha generalizado: el 80% de las ventas provienen del 20% de
      los clientes, el 80% de los errores provienen del 20% del código, el 80% de los resultados provienen del 20% del esfuerzo.
      La proporción exacta varía, pero el patrón —distribución desigual— es común.

      El principio sugiere que identificar y enfocarse en el 20% de alto impacto
      puede mejorar drásticamente los resultados. Es una heurística de priorización, no una
      ley física.
    why_this_is_important: |
      Aplicar el principio de Pareto te ayuda a priorizar implacablemente, evitar desperdiciar
      esfuerzo en actividades de bajo impacto y lograr más con menos. Es fundamental
      para la productividad y la estrategia.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - liderazgo
      - movimientos_de_carrera
    how_can_you_spot_it:
      uneven_distribution: |
        Una pequeña fracción de X representa una gran fracción de Y.
      high_leverage_activities: |
        Pocas acciones producen la mayoría de los resultados.
      low_value_tail: |
        Muchas actividades contribuyen poco; recortarlas tiene un impacto mínimo.
      vital_few_vs_trivial_many: |
        La clave es identificar cuáles pocas importan más.
    examples:
      sales: |
        El 20% de los clientes genera el 80% de los ingresos—enfócate en retenerlos y hacerlos crecer.
      software: |
        El 20% de las características impulsa el 80% del uso—prioriza esas.
      productivity: |
        Unos pocos hábitos o rutinas producen la mayor parte de tu producción—enfócate en ellos.
      problems: |
        El 20% de los errores causa el 80% de las caídas—arregla esas primero.
    real_world_implications: |
      El principio de Pareto guía la asignación de recursos, la estrategia de productos y la
      productividad personal. Ignorarlo lleva a distribuir el esfuerzo de manera demasiado delgada.
      Aplicarlo en exceso puede causar la negligencia de la "larga cola" donde sí importa.
    professional_application:
      networking_and_relationship_building: |
        Identifica las relaciones que más importan para tus objetivos. Invierte
        desproporcionadamente en esas en lugar de distribuir el esfuerzo equitativamente.
      collaborative_learning_initiative: |
        Al mejorar el rendimiento del equipo, encuentra el 20% de las intervenciones que impulsan
        el 80% de los resultados. Enfoca la capacitación y los cambios de proceso ahí.
    how_can_this_be_misapplied:
      oversimplification: |
        Asumir que el 80/20 se aplica en todas partes; algunas distribuciones son más equitativas.
      neglecting_the_tail: |
        Ignorar el "trivial many" cuando colectivamente importa (por ejemplo, muchos clientes pequeños, casos extremos).
      false_precision: |
        Tratar el 80/20 como literal en lugar de una heurística aproximada.
      misidentifying_the_vital_few: |
        Enfocarse en el 20% equivocado debido a un análisis defectuoso.
    related_content:
      - law_of_diminishing_returns
      - parkinsons_law
      - inversion
      - second_order_thinking
  - id: parkinsons_law
    name: Ley de Parkinson
    quick_introduction: |
      La Ley de Parkinson establece que "el trabajo se expande hasta llenar el tiempo disponible para su
      finalización". Dale una semana a una tarea, y te llevará una semana; dale un día, y a menudo se
      realizará en un día. Lo mismo se aplica a los presupuestos, al tamaño del equipo y a los recursos.
    one_liner: El trabajo se expande para llenar el tiempo disponible para su finalización.
    try_this:
      - Establece plazos más ajustados para forzar el enfoque y prevenir la ampliación del alcance.
      - Pregunta: ¿Cuál es el tiempo mínimo que esto podría llevar razonablemente?
      - Observa cuándo se consumen tiempo o recursos adicionales sin un valor proporcional.
    ask_yourself:
      - ¿Estoy llenando el tiempo, o es el trabajo el que realmente lo exige?
      - ¿Un plazo más ajustado forzaría una mejor priorización?
    in_more_detail: |
      C. Northcote Parkinson observó que las burocracias crecen independientemente de la cantidad
      de trabajo a realizar. También señaló que las tareas se expanden para llenar el tiempo disponible: ajustamos
      nuestro esfuerzo y ritmo al plazo. Los plazos ajustados pueden forzar el enfoque; los laxos invitan a la procrastinación y a la ampliación del alcance.

      La ley tiene implicaciones para la gestión de proyectos, la productividad personal y el diseño
      organizacional. Sugiere que las restricciones pueden mejorar los resultados al forzar la priorización.
    why_this_is_important: |
      Comprender la Ley de Parkinson te ayuda a establecer mejores plazos, evitar la sobreasignación de recursos
      a los proyectos y reconocer cuándo "más tiempo" o "más personas" no ayudarán, y pueden perjudicar. Las restricciones pueden ser productivas.
    when_to_use:
      - toma_de_decisiones
      - liderazgo
      - resolucion_de_problemas
      - movimientos_profesionales
    how_can_you_spot_it:
      deadline_driven_effort: |
        El trabajo se acelera a medida que se acerca la fecha límite; poco progreso cuando la fecha límite
        está lejana.
      scope_expansion: |
        Los proyectos crecen para consumir los recursos disponibles en lugar de mantenerse enfocados.
      bureaucratic_growth: |
        Las organizaciones añaden personas y procesos incluso cuando la carga de trabajo no aumenta.
      budget_exhaustion: |
        Los presupuestos se gastan íntegramente independientemente de si el gasto fue necesario.
    examples:
      student_deadlines: |
        Un trabajo con fecha de entrega en un mes se escribe en las últimas 48 horas.
      project_management: |
        Un proyecto con un cronograma de 6 meses tarda 6 meses; el mismo alcance con un plazo de 3 meses
        también podría completarse.
      meetings: |
        Una reunión de 1 hora llena la hora, incluso si 30 minutos fueran suficientes.
      budgets: |
        Un departamento gasta su presupuesto completo a fin de año para justificar el mismo presupuesto
        al año siguiente.
    real_world_implications: |
      La Ley de Parkinson afecta la productividad, la hinchazón organizacional y la asignación de recursos.
      Sugiere que las restricciones artificiales (plazos más cortos, equipos más pequeños) pueden mejorar el enfoque y la eficiencia.
    professional_application:
      networking_and_relationship_building: |
        Establece plazos claros y ajustados para el trabajo colaborativo para prevenir la ampliación del alcance y
        mantener el impulso.
      collaborative_learning_initiative: |
        Utiliza la limitación de tiempo (time-boxing) para reuniones y proyectos. Experimenta con plazos más cortos
        para probar si mejoran el enfoque sin sacrificar la calidad.
    how_can_this_be_misapplied:
      unrealistic_deadlines: |
        Establecer plazos arbitrariamente cortos que causen agotamiento o mala calidad.
      underresourcing: |
        Asumir que menos tiempo o menos personas siempre funcionarán; algunas tareas necesitan
        recursos adecuados.
      blame_shifting: |
        Atribuir retrasos a la "Ley de Parkinson" cuando el trabajo era genuinamente complejo.
      ignoring_quality: |
        Apresurarse a cumplir restricciones artificiales a costa de resultados sostenibles.
    related_content:
      - law_of_diminishing_returns
      - pareto_principle
      - zeigarnik_effect
      - hyperbolic_discounting
  - id: probabilistic_thinking
    name: Pensamiento Probabilístico
    quick_introduction: |
      El pensamiento probabilístico es el hábito de razonar en términos de probabilidades en
      lugar de certezas. En lugar de "¿esto sucederá?", preguntamos "¿qué tan probable es esto?"
      Abraza la incertidumbre y la utiliza para tomar mejores decisiones.
    one_liner: Piensa en probabilidades, no en certezas; abraza la incertidumbre.
    try_this:
      - Reemplaza "¿sucederá?" con "¿qué tan probable es?"
      - Considera múltiples escenarios y asigna probabilidades aproximadas.
      - Actualiza tus creencias a medida que llega nueva evidencia.
    ask_yourself:
      - ¿Estoy pensando en términos binarios cuando las probabilidades serían más precisas?
      - ¿Cuál es el rango de resultados plausibles?
    in_more_detail: |
      La mayoría de los resultados del mundo real son inciertos. El pensamiento probabilístico reemplaza el
      sí/no binario con creencias graduadas. Implica considerar múltiples escenarios,
      asignar probabilidades aproximadas y actualizar a medida que llega la evidencia. Es lo opuesto
      a la excesiva confianza y al pensamiento en blanco y negro.

      Las prácticas clave incluyen: pensar en rangos, considerar tasas base, actualizar
      creencias con evidencia y distinguir entre riesgo (probabilidades conocidas)
      y incertidumbre (probabilidades desconocidas). Mejora la calibración y
      la calidad de las decisiones.
    why_this_is_important: |
      El pensamiento probabilístico reduce la excesiva confianza, mejora la previsión y
      conduce a mejores decisiones bajo incertidumbre. Es esencial para la inversión,
      la estrategia y cualquier dominio donde el futuro sea incierto.
    when_to_use:
      - toma_de_decisiones
      - evaluacion_de_riesgos
      - inversion
      - resolucion_de_problemas
    how_can_you_spot_it:
      likelihood_language: |
        "Probablemente", "es probable", "es poco probable" en lugar de "sucederá" o "no sucederá".
      scenario_thinking: |
        Considerar múltiples futuros posibles con probabilidades aproximadas.
      calibration: |
        Predicciones que coinciden con las frecuencias reales de los resultados a lo largo del tiempo.
      uncertainty_acknowledgment: |
        Declarar explícitamente lo que no sabes.
    examples:
      forecasting: |
        "Creo que hay un 60% de posibilidades de que cumplamos el plazo" en lugar de "Cumpliremos
        el plazo".
      investing: |
        "Esto tiene un 30% de posibilidades de ser 2x y un 70% de posibilidades de ser -50%" en lugar de
        "Esto se disparará".
      strategy: |
        Planificar para múltiples escenarios (el mejor, el base, el peor caso) con probabilidades aproximadas.
      hiring: |
        "Basado en la entrevista, le daría un 70% de probabilidad de que tenga éxito" en lugar de
        "Es una gran contratación".
    real_world_implications: |
      El pensamiento probabilístico mejora la calibración, reduce las sorpresas y permite
      una mejor gestión de riesgos. Es fundamental para una previsión y
      una toma de decisiones efectivas bajo incertidumbre.
    professional_application:
      networking_and_relationship_building: |
        Comunícate en probabilidades cuando sea apropiado: "Tengo bastante confianza" frente a
        "Estoy seguro". Genera confianza al señalar humildad epistémica.
      collaborative_learning_initiative: |
        Anima a los equipos a expresar incertidumbre. Utiliza mercados de predicción o
        ejercicios de calibración para mejorar el juicio probabilístico.
    how_can_this_be_misapplied:
      false_precision: |
        Asignar probabilidades exactas (por ejemplo, 73%) cuando no puedes ser tan preciso.
      analysis_paralysis: |
        No actuar nunca porque "no podemos estar seguros".
      hedging_overuse: |
        Calificar todo hasta el punto de ser inútil.
      dismissing_intuition: |
        Sobrecorregir para ignorar fuertes corazonadas cuando pueden contener información válida.
    related_content:
      - bayes_theorem
      - base_rate_fallacy
      - illusion_of_control
      - narrative_fallacy
  - id: pygmalion_effect
    name: Efecto Pigmalión
    quick_introduction: |
      El efecto Pigmalión (o efecto Rosenthal) es el fenómeno por el cual las
      expectativas más altas conducen a un mejor rendimiento. Cuando los
      profesores, gerentes u otras personas esperan más de alguien, esa
      persona tiende a rendir mejor. Las expectativas se convierten en
      profecías autocumplidas.
    one_liner: Las expectativas más altas conducen a un mejor rendimiento; las expectativas moldean la realidad.
    try_this:
      - Establece expectativas altas pero alcanzables; comunícalas claramente.
      - Observa cuándo las expectativas bajas pueden estar limitando el rendimiento de alguien.
      - Pregunta: ¿Qué estoy esperando implícitamente y cómo podría eso influir en los resultados?
    ask_yourself:
      - ¿Mis expectativas están ayudando o limitando a esta persona?
      - ¿Las expectativas más altas cambiarían mi trato hacia ellos y sus resultados?
    in_more_detail: |
      Robert Rosenthal y Lenore Jacobson dieron a los profesores información falsa
      de que ciertos estudiantes "florecerían" académicamente. Esos estudiantes,
      seleccionados al azar, en realidad mejoraron más que los otros. Las
      expectativas de los profesores influyeron en su comportamiento (más
      atención, comentarios más cálidos), lo que a su vez influyó en el
      rendimiento de los estudiantes. Las expectativas moldean la realidad.

      Lo contrario, las bajas expectativas que conducen a un peor rendimiento,
      a veces se llama el efecto Golem. Ambos demuestran que nuestras creencias
      sobre los demás pueden influir en sus resultados. Esto tiene profundas
      implicaciones para el liderazgo, la educación y la crianza de los hijos.
    why_this_is_important: |
      Comprender el efecto Pigmalión te ayuda a aprovechar el poder de las
      expectativas. Las expectativas altas, comunicadas genuinamente, pueden
      mejorar el rendimiento. Las bajas expectativas pueden crear fracasos
      autocumplidos. Tus creencias sobre los demás importan.
    when_to_use:
      - liderazgo
      - construccion_de_relaciones
      - aprendizaje
      - toma_de_decisiones
    how_can_you_spot_it:
      expectation_performance_link: |
        Aquellos de quienes esperamos más tienden a rendir mejor.
      differential_treatment: |
        Tratamos a las personas de manera diferente según nuestras
        expectativas, a menudo inconscientemente.
      self_fulfilling_prophecy: |
        Las creencias sobre la capacidad influyen en el comportamiento
        que moldea la capacidad.
      teacher_student_dynamics: |
        Las expectativas del educador influyen en los resultados de
        los estudiantes a través de un trato diferencial.
    examples:
      education: |
        Los profesores que esperan que los estudiantes tengan éxito les
        brindan más apoyo; esos estudiantes mejoran. Los profesores que
        esperan el fracaso pueden crearlo inadvertidamente.
      workplace: |
        Los gerentes que esperan un alto rendimiento de sus subordinados
        brindan más oportunidades y comentarios; el rendimiento mejora.
      parenting: |
        Los padres que esperan que sus hijos sean responsables les
        brindan más responsabilidad; estos se esfuerzan por asumirla.
      stereotypes: |
        La amenaza del estereotipo es lo contrario: las expectativas
        negativas pueden perjudicar el rendimiento.
    real_world_implications: |
      El efecto Pigmalión afecta la educación, la gestión y las
      relaciones. Sugiere que elevar las expectativas, cuando se hace de
      manera solidaria, puede mejorar los resultados. También advierte que
      las bajas expectativas pueden ser destructivas.
    professional_application:
      networking_and_relationship_building: |
        Establece altas expectativas para las personas y brinda el apoyo
        para cumplirlas. Cree en el potencial. Tus expectativas influyen
        en tu comportamiento, que influye en sus resultados.
      collaborative_learning_initiative: |
        Crea culturas de altas expectativas con alto apoyo. Evita
        etiquetar a las personas como "bajo rendimiento" de maneras que
        se vuelvan autocumplidas. Invierte en aquellos de quienes esperas
        el éxito.
    how_can_this_be_misapplied:
      unrealistic_expectations: |
        Establecer expectativas que son imposibles de cumplir sin apoyo
        crea fracaso y desmoralización.
      blame_shifting: |
        "No cumplieron las expectativas" cuando no proporcionamos el
        apoyo o las condiciones para el éxito.
      ignoring_constraints: |
        Las expectativas por sí solas no superan las barreras estructurales.
      pressure_without_support: |
        Las altas expectativas sin recursos o apoyo pueden ser perjudiciales.
    related_content:
      - hawthorne_effect
      - halo_effect
      - in_group_bias
      - fundamental_attribution_error
  - id: regression_to_the_mean
    name: Regresión a la media
    quick_introduction: |
      La regresión a la media es el fenómeno estadístico por el cual los resultados extremos tienden
      a ser seguidos por resultados más cercanos al promedio. Después de un resultado inusualmente bueno o malo,
      el siguiente resultado probablemente será menos extremo, no por ninguna intervención causal, sino debido a la variación aleatoria.
    one_liner: Los resultados extremos tienden a ser seguidos por resultados más cercanos al promedio.
    try_this:
      - No atribuyas la "regresión" a tu intervención; a menudo habría ocurrido de todos modos.
      - Después de un resultado extremo, espera que el siguiente sea menos extremo.
      - Pregunta: ¿Este cambio se debe a lo que hice, o solo a la regresión a la media?
    ask_yourself:
      - ¿Estoy atribuyendo a mi intervención méritos o culpas por lo que podría ser variación aleatoria?
      - ¿Habría ocurrido esto sin mi acción?
    in_more_detail: |
      Si un estudiante obtiene una puntuación inusualmente alta en un examen, probablemente obtendrá una puntuación más cercana a
      su promedio en el siguiente, no porque se haya "vuelto perezoso", sino porque la primera puntuación fue en parte suerte. Lo mismo se aplica al rendimiento deportivo, los rendimientos de las acciones y las métricas empresariales. A menudo atribuimos la "regresión" a algo que hicimos (por ejemplo,
      castigo o recompensa), cuando en realidad habría ocurrido de todos modos.

      Daniel Kahneman describe cómo los instructores de vuelo concluyeron erróneamente que
      el elogio empeoraba el rendimiento y la crítica lo mejoraba; estaban observando
      la regresión a la media después de actuaciones extremas.
    why_this_is_important: |
      Comprender la regresión a la media evita atribuir erróneamente la causalidad.
      Te ayuda a evitar reaccionar de forma exagerada a los valores atípicos y a realizar cambios basados en el ruido.
      Es esencial para evaluar intervenciones y rendimiento.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - evaluacion_de_riesgos
      - liderazgo
    how_can_you_spot_it:
      extreme_followed_by_average: |
        Un resultado inusualmente bueno o malo va seguido de otro más cercano a la media.
      spurious_causation: |
        Atribuir la "recuperación" o "disminución" a una intervención cuando la regresión
        habría ocurrido de todos modos.
      overreaction_to_outliers: |
        Realizar cambios de política o personales basados en un único punto de datos extremo.
      reward_punishment_confusion: |
        Creer que el castigo "funcionó" cuando la mejora fue solo regresión.
    examples:
      sports: |
        Un jugador tiene un partido de su carrera y luego vuelve a la media; los aficionados pueden culpar a la "complacencia".
      investing: |
        Una acción tiene un gran año y luego revierte; los inversores pueden atribuir la disminución
        a una mala gestión cuando es en parte reversión.
      performance_reviews: |
        Un empleado tiene un mal trimestre, recibe retroalimentación y mejora; la retroalimentación puede recibir
        crédito cuando la regresión habría ocurrido independientemente.
      medicine: |
        Un paciente se siente peor, toma un tratamiento y mejora; el tratamiento puede recibir
        crédito cuando parte de la mejora fue natural.
    real_world_implications: |
      La regresión a la media afecta cómo evaluamos a profesores, médicos, gestores de fondos y a nosotros mismos.
      Explica por qué "lo que sube tiene que bajar" a menudo se mantiene
      estadísticamente. Malinterpretarla conduce a intervenciones desperdiciadas y a una falsa confianza en los remedios.
    professional_application:
      networking_and_relationship_building: |
        No sobreinterpretes una mala interacción aislada; puede ser un valor atípico que regresará
        a la media de la relación.
      collaborative_learning_initiative: |
        Al evaluar intervenciones (capacitación, cambios de proceso), utiliza grupos de control
        y múltiples puntos de datos para distinguir el efecto de la regresión.
    how_can_this_be_misapplied:
      dismissing_all_interventions: |
        Asumir que cualquier mejora después de una intervención es "solo regresión"
        cuando existen efectos reales.
      underreacting: |
        Ignorar problemas reales porque "regresará a la media".
      statistical_illiteracy: |
        Confundir regresión con una fuerza que "corrige" los resultados; es solo
        probabilidad.
      overconfidence: |
        Asumir que la media es estable cuando el proceso subyacente puede haber cambiado.
    related_content:
      - gamblers_fallacy
      - hindsight_bias
      - base_rate_fallacy
      - narrative_fallacy
  - id: rosy_retrospection
    name: Retrospección color de rosa
    quick_introduction: |
      La retrospección color de rosa es la tendencia a recordar el pasado como mejor de lo que fue.
      Recordamos las experiencias pasadas de forma más positiva con el tiempo, suavizando las dificultades
      y amplificando lo bueno. "Los viejos buenos tiempos" a menudo no fueron tan buenos como los recordamos.
    one_liner: Recordamos el pasado como mejor de lo que fue—los viejos buenos tiempos no fueron tan buenos.
    try_this:
      - Al comparar con el pasado, pregúntate: ¿Qué estaba sintiendo realmente entonces?
      - Lleva un diario para comparar la memoria con la realidad más tarde.
      - Nota cuándo la nostalgia está tiñendo tu juicio del presente.
    ask_yourself:
      - ¿Estoy idealizando el pasado?
      - ¿Habría sido feliz entonces si pudiera viajar en el tiempo hacia atrás?
    in_more_detail: |
      Tendemos a recordar los aspectos positivos de las experiencias pasadas y a olvidar o
      minimizar los negativos. Las vacaciones, los trabajos y las relaciones se sienten mejor en
      la nostalgia de lo que se sintieron en el momento. Esto puede llevar a comparaciones
      poco realistas: juzgamos el presente frente a un pasado idealizado.

      La retrospección color de rosa afecta la toma de decisiones cuando repetimos elecciones pasadas
      esperando el mismo resultado (recordado). También puede alimentar la nostalgia por
      épocas que objetivamente fueron peores. Es lo opuesto al sesgo de negatividad
      en la memoria.
    why_this_is_important: |
      Reconocer la retrospección color de rosa te ayuda a hacer comparaciones más realistas
      y a evitar repetir errores pasados basándote en recuerdos idealizados. También
      explica por qué a veces anhelamos el pasado a pesar del progreso actual.
    when_to_use:
      - toma_de_decisiones
      - cambios_de_carrera
      - construccion_de_relaciones
      - aprendizaje
    how_can_you_spot_it:
      idealized_past: |
        "Las cosas eran mejores entonces" cuando las medidas objetivas pueden mostrar lo contrario.
      selective_positive_memory: |
        Recordar lo bueno y olvidar lo malo de experiencias pasadas.
      nostalgia_as_evidence: |
        Usar recuerdos agradables como evidencia de que las elecciones pasadas fueron correctas.
      present_undervaluation: |
        El presente se siente peor de lo que es porque comparamos con un pasado idealizado.
    examples:
      career: |
        "Mi antiguo trabajo era genial" cuando te fuiste por buenas razones: la memoria ha suavizado
        las frustraciones.
      relationships: |
        "Éramos tan felices" acerca de una relación pasada, olvidando los conflictos que
        llevaron a su fin.
      childhood: |
        "Los niños estaban mejor en mis tiempos" cuando muchas medidas objetivas (salud,
        seguridad, oportunidad) han mejorado.
      projects: |
        "Ese proyecto fue bien" cuando en realidad tuvo muchos retrasos: recordamos
        el resultado, no el proceso.
    real_world_implications: |
      La retrospección color de rosa afecta la satisfacción vital, las decisiones profesionales y
      las elecciones impulsadas por la nostalgia. Puede llevar a repetir errores pasados o
      a comparaciones poco realistas. También explica el atractivo de la retórica de "de vuelta a los viejos buenos tiempos".
    professional_application:
      networking_and_relationship_building: |
        Al considerar reconectar con antiguos colegas o volver a roles pasados, separa la nostalgia
        de la realidad. Documenta tus razones para irte en su momento; revísalas antes de volver.
      collaborative_learning_initiative: |
        En las retrospectivas, utiliza notas o datos contemporáneos en lugar de la memoria
        para evaluar lo que realmente sucedió. La memoria suaviza las dificultades.
    how_can_this_be_misapplied:
      dismissing_nostalgia: |
        No toda la nostalgia es engañosa: a veces el pasado fue genuinamente mejor
        en algunos aspectos.
      invalidating_memories: |
        Decirle a la gente que sus recuerdos positivos están "equivocados" cuando pueden reflejar
        una experiencia subjetiva genuina.
      overcorrection: |
        Asumir que el pasado fue siempre peor de lo que recordamos; a veces fue
        mejor.
      present_bias: |
        Usar la retrospección color de rosa como excusa para desestimar preocupaciones legítimas
        sobre el declive actual.
    related_content:
      - hindsight_bias
      - negativity_bias
      - availability_heuristic
      - impact_bias
  - id: scarcity_bias
    name: Sesgo de escasez
    quick_introduction: |
      El sesgo de escasez es la tendencia a dar mayor valor a las cosas cuando parecen
      escasas o limitadas. "Tiempo limitado", "solo quedan 3" y "acceso exclusivo" activan
      la urgencia y el deseo, a menudo anulando la evaluación racional de si realmente
      necesitamos o queremos la cosa.
    one_liner: La escasez amplifica el valor percibido—lo limitado genera urgencia sobre la racionalidad.
    try_this:
      - Preguntar: ¿Querría esto si no fuera escaso? Elimine la urgencia.
      - Pausar antes de actuar ante ofertas de "tiempo limitado" o "solo quedan X".
      - Notar cuándo la escasez impulsa su deseo más que el valor genuino.
    ask_yourself:
      - ¿Estoy valorando esto porque es escaso, o porque realmente lo necesito?
      - ¿Tomaría esta decisión sin el encuadre de escasez?
    in_more_detail: |
      La escasez amplifica el valor percibido. Cuando algo es raro o desaparece, lo
      queremos más, en parte porque la escasez puede indicar calidad y en parte porque
      la aversión a la pérdida nos hace temer quedarnos fuera. Los especialistas en marketing y los negociadores usan la escasez
      para crear urgencia. El sesgo puede llevar a decisiones impulsivas, gastos excesivos y
      mala priorización.

      La escasez también afecta la capacidad cognitiva de quienes tienen
      recursos genuinamente limitados; la pobreza puede reducir la "capacidad mental" para otras decisiones.
    why_this_is_important: |
      Reconocer el sesgo de escasez le ayuda a resistir tácticas manipuladoras y a tomar decisiones más
      deliberadas. También explica por qué sobrevaloramos las ediciones limitadas y
      nos apresuramos cuando no es necesario.
    when_to_use:
      - toma_de_decisiones
      - negociación
      - inversión
      - evaluación_de_riesgos
    how_can_you_spot_it:
      urgency_trigger: |
        "Tiempo limitado" o "solo quedan X" crea un deseo desproporcionado.
      fear_of_missing_out: |
        La posibilidad de perder el acceso impulsa la acción más que el valor intrínseco.
      impulsive_purchases: |
        Comprar cosas porque son escasas en lugar de porque las necesita.
      artificial_scarcity: |
        La escasez se fabrica (por ejemplo, cuenta atrás falsas) en lugar de ser real.
    examples:
      sales: |
        "Solo quedan 2 en stock" o "La oferta termina esta noche" impulsan compras que no
        ocurrirían sin la urgencia.
      auctions: |
        Los postores se ven atrapados en la victoria y pagan más de lo planeado debido a
        la escasez competitiva.
      exclusivity: |
        El acceso "solo para miembros" o "solo por invitación" aumenta el valor percibido.
      genuine_scarcity: |
        Cuando los recursos son verdaderamente limitados, las personas bajo estrés de escasez toman peores
        decisiones (por ejemplo, los pobres, los que tienen poco tiempo).
    real_world_implications: |
      El sesgo de escasez impulsa el comportamiento del consumidor, los resultados de las negociaciones y las respuestas políticas.
      Puede usarse de manera ética (por ejemplo, plazos legítimos) o poco ética
      (por ejemplo, escasez falsa). Comprenderlo mejora la calidad de las decisiones.
    professional_application:
      networking_and_relationship_building: |
        Sea cauteloso cuando otros creen escasez artificial ("Solo acepto unos pocos
        clientes"). Verifique si la escasez es real. Al construir relaciones,
        la escasez genuina de su tiempo puede indicar valor, pero el uso excesivo se siente manipulador.
      collaborative_learning_initiative: |
        Al crear urgencia para las iniciativas, asegúrese de que sea legítima. Las fechas límite falsas
        erosionan la confianza cuando se descubren.
    how_can_this_be_misapplied:
      manipulation: |
        Crear deliberadamente falsa escasez para presionar a otros a tomar decisiones.
      impulsive_decisions: |
        Tomar decisiones importantes bajo urgencia artificial cuando más tiempo mejoraría
        los resultados.
      overvaluing_scarcity: |
        Asumir que las cosas escasas son siempre mejores; a veces la escasez es arbitraria.
      exploiting_vulnerability: |
        Usar tácticas de escasez en personas que ya están bajo estrés de recursos.
    related_content:
      - loss_aversion_bias
      - availability_heuristic
      - endowment_effect
      - framing_effect
  - id: second_order_thinking
    name: Pensamiento de segundo orden
    quick_introduction: |
      El pensamiento de segundo orden es la práctica de considerar las consecuencias de las
      consecuencias de tus acciones. El pensamiento de primer orden pregunta "¿qué pasa si
      hago X?" El pensamiento de segundo orden pregunta "¿y luego qué?" y "¿y luego qué después
      de eso?" Revela efectos no intencionados.
    one_liner: Pregunta "¿y luego qué?" — considera las consecuencias de las consecuencias.
    try_this:
      - Para cualquier decisión, pregunta "¿y luego qué?" al menos dos veces.
      - Considera cómo responderán otros a tu acción, y luego a esa respuesta.
      - Observa cuándo los efectos de primer orden se revierten o complican en la cadena.
    ask_yourself:
      - ¿He considerado los efectos de segundo (y tercer) orden?
      - ¿Qué consecuencias no intencionadas podría estar pasando por alto?
    in_more_detail: |
      Howard Marks popularizó el concepto en el ámbito de la inversión. Primer orden: "Esto va a subir".
      Segundo orden: "Si sube, otros se darán cuenta, comprarán más, subirá más, hasta que
      se sobrevalore y colapse". La cadena de consecuencias a menudo invierte o complica el efecto de primer orden.

      El pensamiento de segundo orden es más difícil, requiere más esfuerzo mental e
      imaginación. Pero previene muchos errores. Los buenos estrategas piensan varios
      pasos por adelantado y consideran cómo responderán los demás.
    why_this_is_important: |
      El pensamiento de segundo orden previene consecuencias no intencionadas y mejora la
      calidad de las decisiones. Es esencial para la estrategia, la política y cualquier dominio
      donde las acciones desencadenen reacciones.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - estrategia
      - evaluacion_de_riesgos
    how_can_you_spot_it:
      consequence_chains: |
        "Si hago X, entonces sucederá Y, luego Z..."
      reaction_anticipation: |
        Considerar cómo responderán otros a tu acción.
      unintended_effects: |
        Buscar efectos secundarios y bucles de retroalimentación.
      reversals: |
        Efectos de segundo orden que contradicen o revierten los efectos de primer orden.
    examples:
      investing: |
        "Si todo el mundo piensa que esta es una buena inversión, probablemente esté saturada;
        la ventaja puede haber desaparecido".
      policy: |
        "Si subsidiamos X, la demanda aumenta, los precios suben, ¿el subsidio realmente
        ayuda?"
      negotiation: |
        "Si presiono mucho aquí, ellos tomarán represalias allí, ¿cuál es el efecto neto?"
      incentives: |
        "Si recompensamos esta métrica, la gente la manipulará, ¿qué harán realmente?"
    real_world_implications: |
      El pensamiento de segundo orden es el sello distintivo del pensamiento estratégico.
      Previene fallos en políticas, incentivos no intencionados y optimismo ingenuo.
      Distingue a los buenos de los grandes tomadores de decisiones.
    professional_application:
      networking_and_relationship_building: |
        Antes de tomar una acción, pregunta "¿Cómo responderán? ¿Y cómo responderé yo a eso?"
        Considera la dinámica de la relación, no solo el intercambio inmediato.
      collaborative_learning_initiative: |
        Al planificar, realiza ejercicios de "y luego qué". Mapea las cadenas de consecuencias.
        Identifica los efectos no intencionados antes de que se manifiesten.
    how_can_this_be_misapplied:
      analysis_paralysis: |
        Pensar tantos pasos por adelantado que nunca actúas.
      false_complexity: |
        Asumir que los efectos de segundo orden siempre dominan cuando los efectos de primer
        orden pueden ser suficientes.
      overconfidence: |
        Creer que puedes predecir largas cadenas cuando la incertidumbre se acumula.
      pessimism: |
        Asumir siempre lo peor en la cadena de consecuencias.
    related_content:
      - inversion
      - pareto_principle
      - map_is_not_the_territory
      - bayes_theorem
  - id: sesgo_de_salience
    name: Sesgo de Salience
    quick_introduction: |
      El sesgo de salience es la tendencia a centrarse en los aspectos más prominentes o notables
      de una situación, pasando por alto factores menos obvios pero potencialmente
      importantes. Lo que destaca recibe atención y peso desproporcionados en nuestros juicios.
    one_liner: Lo que destaca recibe atención desproporcionada; lo sutil se pasa por alto.
    try_this:
      - Pregunta: ¿Qué no estoy viendo porque no es saliente?
      - Busca activamente factores menos obvios antes de decidir.
      - Observa cuándo un elemento vívido o dramático está dominando tu juicio.
    ask_yourself:
      - ¿Estoy dando demasiado peso a lo prominente y muy poco a lo sutil?
      - ¿Qué factores importantes podría estar pasando por alto?
    in_more_detail: |
      La información saliente es vívida, cargada emocionalmente o encontrada recientemente.
      Capta la atención e influye en las decisiones más de lo que debería. Damos
      más peso a lo conspicuo y menos peso a lo sutil. Un evento dramático
      o un ejemplo vívido pueden dominar nuestro pensamiento incluso cuando no es
      representativo.

      El sesgo de salience se superpone con la heurística de disponibilidad (lo que viene a la mente)
      y el sesgo de recencia (lo que sucedió recientemente). Afecta la percepción del riesgo,
      la contratación y la estrategia. Los problemas más visibles se abordan; los
      invisibles se pudren.
    why_this_is_important: |
      Reconocer el sesgo de salience te ayuda a mirar más allá de lo obvio y
      a considerar factores menos visibles. Mejora la evaluación de riesgos, el diagnóstico de problemas
      y la calidad de las decisiones. Las cosas importantes no siempre
      son salientes.
    when_to_use:
      - toma_de_decisiones
      - resolucion_de_problemas
      - evaluacion_de_riesgos
      - liderazgo
    how_can_you_spot_it:
      prominent_factor_dominance: |
        El aspecto más notable impulsa la decisión.
      overlooking_background: |
        Se ignoran factores menos visibles a pesar de su importancia.
      vividness_overweighting: |
        La información dramática o emocional recibe un peso desproporcionado.
      visibility_bias: |
        Lo que podemos ver o medir fácilmente recibe más atención que
        lo que no podemos.
    examples:
      risk: |
        Un accidente de avión es saliente: sobreestimamos el riesgo de volar. Los accidentes
        de coche son menos salientes en su conjunto: subestimamos el riesgo de conducir.
      hiring: |
        Las habilidades de presentación de un candidato son salientes; su
        seguimiento puede ser menos visible pero igualmente importante.
      strategy: |
        Los movimientos de los competidores son salientes; los cambios graduales del mercado
        son menos notables pero pueden importar más.
      problems: |
        La queja más fuerte se aborda mientras las cuestiones sistémicas
        pasan desapercibidas.
    real_world_implications: |
      El sesgo de salience afecta lo que recibe atención, financiación y acción.
      Puede llevar a abordar síntomas en lugar de causas y
      a recursos mal asignados. La búsqueda deliberada de información no saliente
      mejora las decisiones.
    professional_application:
      networking_and_relationship_building: |
        No juzgues a las personas solo por sus rasgos más visibles. Busca
        cualidades menos obvias: confiabilidad, consistencia, cómo
        tratan a las personas que no pueden ayudarles.
      collaborative_learning_initiative: |
        En la resolución de problemas, pregunta explícitamente "¿Qué no estamos viendo?"
        y "¿Qué es menos obvio pero importante?". Crea procesos
        que hagan aflorar cuestiones no salientes.
    how_can_this_be_misapplied:
      ignoring_salient_info: |
        A veces, lo que es saliente es importante. No descartes
        todo lo obvio.
      false_sophistication: |
        Asumir que los factores oscuros son siempre más importantes
        que los obvios.
      analysis_paralysis: |
        Buscar tantos factores no salientes que nunca actúas sobre los salientes.
      contrarianism: |
        Rechazar información saliente solo por ser diferente.
    related_content:
      - availability_heuristic
      - anchoring_bias
      - baader_meinhof_phenomenon
      - confirmation_bias
  - id: sunk_cost_fallacy
    name: Falacia del Costo Hundido
    quick_introduction: |
      La falacia del costo hundido es la tendencia a seguir invirtiendo en una decisión
      debido a los recursos ya gastados, en lugar de basarse en los rendimientos futuros esperados.
      "Hemos llegado hasta aquí" o "Ya he invertido tanto" lleva a seguir echando dinero bueno al malo.
    one_liner: La inversión pasada se ha ido, solo importan los costos y beneficios futuros.
    try_this:
      - Ask: Si empezara hoy, ¿elegiría este camino?
      - Define "criterios de cancelación" de antemano: condiciones bajo las cuales te detendrás.
      - Evalúa la decisión marginal: ¿qué gano o pierdo a partir de ahora?
    ask_yourself:
      - ¿Continúo por el valor futuro o para justificar la inversión pasada?
      - ¿Qué le aconsejaría a un amigo que estuviera en mi posición desde cero?
    in_more_detail: |
      Los costos hundidos son costos pasados que no se pueden recuperar. La toma de decisiones racional los ignora; solo importan los costos y beneficios futuros. Pero nos apegamos emocionalmente a nuestras inversiones. Terminamos la comida que no disfrutamos, nos quedamos en la película que nos disgusta y continuamos proyectos que ya no tienen sentido. Queremos "no desperdiciar" lo que hemos invertido, pero continuar a menudo desperdicia más.

      La falacia es especialmente fuerte cuando hemos invertido tiempo, esfuerzo o identidad, no solo dinero. Admitir que nos equivocamos puede sentirse costoso, así que redoblamos la apuesta.
    why_this_is_important: |
      Reconocer la falacia del costo hundido te ayuda a cortar pérdidas, cambiar de dirección cuando sea necesario y tomar decisiones basadas en el valor futuro en lugar de la inversión pasada. Es esencial para proyectos, carreras y relaciones.
    when_to_use:
      - toma_de_decisiones
      - inversión
      - movimientos_profesionales
      - evaluación_de_riesgos
    how_can_you_spot_it:
      continuing_because_of_past_investment: |
        "No podemos parar ahora, ya hemos gastado X" cuando los rendimientos futuros no justifican
        continuar.
      escalation_of_commitment: |
        Invertir más para justificar o "rescatar" la inversión previa.
      identity_investment: |
        Continuar porque admitir el fracaso amenazaría la autoimagen.
      ignoring_marginal_analysis: |
        Basar las decisiones en el costo total en lugar del costo y beneficio incremental.
    examples:
      projects: |
        Continuar un proyecto fallido porque "ya hemos invertido 6 meses en él"
        cuando cortar pérdidas sería lo racional.
      relationships: |
        Permanecer en una relación porque "llevamos 5 años juntos" en lugar de
        evaluar el futuro.
      careers: |
        Permanecer en una carrera que no te gusta porque invertiste en el título o
        en años de experiencia.
      investments: |
        Mantener una acción perdedora para "recuperar lo invertido" en lugar de reasignar a
        mejores oportunidades.
    real_world_implications: |
      La falacia del costo hundido causa desperdicio de recursos, fracasos prolongados y oportunidades perdidas. Afecta a individuos, organizaciones y gobiernos.
      Superarla requiere marcos de decisión explícitos.
    professional_application:
      networking_and_relationship_building: |
        No continúes invirtiendo en relaciones o colaboraciones que ya no te sirven solo por la inversión pasada. Evalúa el valor prospectivo.
      collaborative_learning_initiative: |
        Crea "criterios de cancelación" para los proyectos: condiciones bajo las cuales te detendrás
        independientemente de la inversión pasada. Revisa los proyectos periódicamente con una perspectiva de "desde cero".
    how_can_this_be_misapplied:
      quitting_too_early: |
        Usar el "costo hundido" como excusa para abandonar cosas que necesitan más tiempo para dar frutos.
      undervaluing_consistency: |
        Algunos compromisos (p. ej., relaciones, reputación) tienen valor en la continuidad
        que el análisis marginal puro no capta.
      cold_rationality: |
        Descartar el apego emocional como irracional cuando puede reflejar valores genuinos.
      analysis_paralysis: |
        Pensar demasiado si continuar cuando la respuesta es clara.
    related_content:
      - loss_aversion_bias
      - endowment_effect
      - confirmation_bias
      - inversion
  - id: survivorship_bias
    name: Sesgo de Supervivencia
    quick_introduction: |
      El sesgo de supervivencia es el error lógico de centrarse en las personas o cosas que
      "sobrevivieron" a un proceso, pasando por alto a las que no lo hicieron. Vemos a los ganadores
      y olvidamos a los perdedores, lo que lleva a conclusiones demasiado optimistas sobre el éxito
      y el fracaso.
    one_liner: Vemos a los ganadores y olvidamos a los perdedores, lo que lleva a conclusiones demasiado optimistas.
    try_this:
      - Pregunta: ¿Quién fracasó haciendo algo similar? ¿Qué podemos aprender de ellos?
      - Busca la muestra "invisible": aquellos que no sobrevivieron.
      - Nota cuándo estás estudiando solo historias de éxito.
    ask_yourself:
      - ¿Estoy aprendiendo solo de los supervivientes?
      - ¿Cómo sería el panorama completo si incluyera los fracasos?
    in_more_detail: |
      Durante la Segunda Guerra Mundial, el estadístico Abraham Wald corrigió la colocación de la armadura en los bombarderos analizando dónde fueron alcanzados los aviones supervivientes y recomendando armadura donde fueron alcanzados los aviones *no* supervivientes, ya que esos aviones nunca regresaron. Naturalmente, nos centramos en la muestra visible (supervivientes) e ignoramos la invisible (aquellos que fracasaron).

      El sesgo de supervivencia distorsiona nuestra visión del emprendimiento, la inversión, las carreras y la historia. Estudiamos empresas exitosas y pasamos por alto a los miles que fracasaron haciendo cosas similares. Escuchamos a los afortunados y olvidamos a los desafortunados.
    why_this_is_important: |
      Corregir el sesgo de supervivencia conduce a expectativas más realistas y a mejores decisiones. Te ayuda a aprender de los fracasos, no solo de los éxitos, y a evitar copiar estrategias que solo funcionaron para unos pocos afortunados.
    when_to_use:
      - toma_de_decisiones
      - inversion
      - movimientos_profesionales
      - aprendizaje
    how_can_you_spot_it:
      visible_success_stories: |
        Oímos hablar de personas exitosas mucho más que de aquellos que lo intentaron y fracasaron.
      missing_failures: |
        La muestra que observamos excluye a aquellos que no "lo lograron" y, por lo tanto, no pueden
        contar sus historias.
      copying_survivors: |
        Asumir que lo que hicieron los supervivientes causó su éxito cuando pudo haber sido
        suerte o supervivencia.
      overly_optimistic_models: |
        Estimaciones de tasas de éxito que ignoran el denominador de los intentos.
    examples:
      entrepreneurship: |
        "Dejar la universidad como Zuckerberg" ignora a los muchos estudiantes que abandonaron y no fundaron empresas multimillonarias.
      investing: |
        Estudiar solo los fondos que sobrevivieron ignora a los que cerraron tras un mal desempeño, inflando los rendimientos históricos.
      career_advice: |
        Las personas exitosas atribuyen el éxito al trabajo duro; no oímos hablar de aquellos que trabajaron duro y fracasaron.
      historical_analysis: |
        Estudiar "grandes" empresas que sobrevivieron ignora a las muchas que fracasaron con
        estrategias similares.
    real_world_implications: |
      El sesgo de supervivencia infla las tasas de éxito percibidas, distorsiona los modelos a seguir y conduce a una mala imitación. Corregirlo requiere buscar casos de fracaso y comprender las tasas base.
    professional_application:
      networking_and_relationship_building: |
        Al buscar consejo, también busca personas que lo intentaron y fracasaron; sus
        perspectivas son a menudo más informativas que las de los supervivientes.
      collaborative_learning_initiative: |
        Estudia proyectos fallidos e iniciativas cerradas, no solo los exitosos.
        Realiza "análisis post-mortem de fracasos" para aprender de lo que no funcionó.
    how_can_this_be_misapplied:
      excessive_pessimism: |
        Sobrecambiar para asumir que el éxito es siempre suerte y que el esfuerzo no importa.
      dismissing_success: |
        Negarse a aprender de personas exitosas debido al "sesgo de supervivencia".
      analysis_paralysis: |
        Estar tan centrado en los casos de fracaso que nunca se toma ninguna acción.
      false_equivalence: |
        Tratar las estrategias de supervivientes y no supervivientes como igualmente informativas cuando
        el contexto difiere.
    related_content:
      - hindsight_bias
      - narrative_fallacy
      - base_rate_fallacy
      - regression_to_the_mean
  - id: zeigarnik_effect
    name: Efecto Zeigarnik
    quick_introduction: |
      El efecto Zeigarnik es la tendencia a recordar mejor las tareas incompletas o interrumpidas
      que las completadas. Las tareas incompletas crean una tensión psicológica
      que las mantiene activas en nuestra mente. Nuestros cerebros se aferran a lo que está
      incompleto.
    one_liner: Las tareas incompletas se quedan grabadas en nuestra mente; nuestros cerebros se aferran a lo incompleto.
    try_this:
      - Usa la finalización para "liberar" tareas de tu carga mental: termínalas o descártalas explícitamente.
      - Divide el trabajo en partes manejables para crear bucles abiertos productivos.
      - Nota cuándo te estás rumiando sobre asuntos pendientes: cierra el bucle o decide dejarlo ir.
    ask_yourself:
      - ¿Qué tareas incompletas están creando tensión en mi mente?
      - ¿ vale la pena mantener este bucle abierto, o puedo cerrarlo?
    in_more_detail: |
      Bluma Zeigarnik observó que los camareros recordaban mejor los pedidos sin pagar
      que los pagados; una vez completada la tarea, esta se "liberaba" de la memoria.
      Las tareas inacabadas crean un bucle abierto que exige cierre. Esto impulsa tanto el enfoque productivo (queremos terminar) como la ansiedad (no podemos dejar de pensar en lo que queda por hacer).

      El efecto se utiliza en marketing (cliffhangers, historias incompletas) y
      productividad (dividir el trabajo en partes para crear múltiples "bucles abiertos").
      Explica por qué rumiamos sobre asuntos pendientes y por qué las listas de tareas pendientes
      pueden resultar abrumadoras.
    why_this_is_important: |
      Comprender el efecto Zeigarnik te ayuda a gestionar la carga mental, diseñar
      experiencias atractivas y utilizar la interrupción de forma estratégica. Explica
      por qué no podemos dejar de pensar en el trabajo inacabado, y cómo eso puede ser
      aprovechado o perjudicial.
    when_to_use:
      - resolucion_de_problemas
      - liderazgo
      - aprendizaje
      - toma_de_decisiones
    how_can_you_spot_it:
      rumination_on_incomplete: |
        Las tareas incompletas se inmiscuyen en los pensamientos más que las completadas.
      better_recall_of_unfinished: |
        Recordamos mejor las tareas interrumpidas que las terminadas.
      tension_for_closure: |
        Incomodidad o impulso por completar lo que se ha empezado.
      serial_dramas: |
        Los cliffhangers y los "continuará" explotan el efecto.
    examples:
      productivity: |
        Comenzar una tarea crea tensión mental que impulsa la finalización, o
        ansiedad si hay demasiados bucles abiertos.
      marketing: |
        "Parte 1 de 3" o "Continuará" mantiene a las audiencias comprometidas y
        volviendo.
      meetings: |
        Terminar una reunión sin pasos a seguir claros deja a los participantes
        con tensión no resuelta.
      learning: |
        Las preguntas sin respuesta o las explicaciones incompletas se quedan en la memoria
        e impulsan una mayor indagación.
    real_world_implications: |
      El efecto Zeigarnik afecta la productividad, el compromiso y la carga mental.
      Puede ser aprovechado para el enfoque o generar abrumación.
      Explica el atractivo de los cliffhangers y la carga de demasiadas tareas
      pendientes.
    professional_application:
      networking_and_relationship_building: |
        Deja las conversaciones con pasos a seguir claros, o bucles abiertos intencionales
        si quieres que la otra persona te dé seguimiento. Los hilos sin resolver
        crean compromiso.
      collaborative_learning_initiative: |
        Usa el efecto Zeigarnik en la formación: plantea problemas o preguntas
        antes de los descansos para mantener a los alumnos comprometidos. Pero evita crear tantos
        bucles abiertos que la gente se sienta abrumada.
    how_can_this_be_misapplied:
      overwhelm: |
        Crear demasiados bucles abiertos, demasiadas tareas incompletas, lleva a
        ansiedad y parálisis.
      manipulation: |
        Dejar cosas deliberadamente sin resolver para crear dependencia o
        compromiso.
      false_urgency: |
        Usar el efecto para crear urgencia artificial cuando no existe ninguna.
      incomplete_work: |
        Comenzar muchas cosas para crear "tensión" sin realmente
        completarlas, lo que lleva a un esfuerzo disperso.
    related_content:
      - parkinsons_law
      - hyperbolic_discounting
      - loss_aversion_bias
      - scarcity_bias
  - id: zero_sum_thinking
    name: Pensamiento de suma cero
    quick_introduction: |
      El pensamiento de suma cero es la creencia de que la ganancia de una persona debe ser la pérdida de otra, que los recursos son fijos y que cualquier ventaja para ti significa una desventaja para mí.
      En realidad, muchas situaciones son de suma positiva: ambas partes pueden ganar.
    one_liner: Tu ganancia no tiene por qué ser mi pérdida—muchas situaciones son de suma positiva.
    try_this:
      - Preguntar: ¿Podemos expandir el pastel? ¿Es esto realmente de suma cero?
      - Buscar la cooperación antes de asumir la competencia.
      - Notar cuándo estás tratando una situación como de pastel fijo cuando no lo es.
    ask_yourself:
      - ¿Estoy asumiendo un pastel fijo cuando podríamos expandirlo?
      - ¿La cooperación crearía más valor que la competencia?
    in_more_detail: |
      En un juego de suma cero, el total es fijo: tu ganancia es mi pérdida. En situaciones de suma positiva,
      la cooperación crea valor. El comercio, la innovación y la construcción de relaciones
      suelen ser de suma positiva. El pensamiento de suma cero conduce a una competencia innecesaria,
      oportunidades perdidas de cooperación y rivalidad destructiva.

      El sesgo es común en negociaciones, política y dinámicas organizacionales.
      Asume un pastel fijo cuando el pastel a menudo se puede expandir. Puede volverse
      autocumplido: si tratas a los demás como adversarios, se convierten en adversarios.
    why_this_is_important: |
      Reconocer el pensamiento de suma cero abre oportunidades para la cooperación y la creación de valor.
      Mejora la negociación, reduce el conflicto y permite resultados en los que todos ganan.
      Muchas de las mejores oportunidades son de suma positiva.
    when_to_use:
      - negociacion
      - liderazgo
      - construccion_de_relaciones
      - toma_de_decisiones
    how_can_you_spot_it:
      fixed_pie_assumption: |
        "Si ellos ganan, yo pierdo" cuando la situación podría permitir que ambos ganen.
      competitive_ framing: |
        Enmarcar automáticamente las situaciones como nosotros contra ellos.
      envy_of_others_gains: |
        Resentir el éxito de los demás como si disminuyera el tuyo.
      missed_cooperation: |
        No ver oportunidades de colaboración que beneficiarían a todos.
    examples:
      negotiation: |
        Asumir que un mejor trato para la otra parte significa un peor trato para
        ti, cuando las soluciones creativas a menudo expanden el valor para ambos.
      salary: |
        "Si mi colega recibe un aumento, hay menos para mí" cuando los presupuestos pueden ser
        flexibles o los aumentos pueden justificarse por el valor creado.
      politics: |
        "Las ganancias de su partido son nuestras pérdidas" cuando muchos resultados políticos podrían
        beneficiar a múltiples grupos.
      career: |
        "Su promoción significa menos oportunidades para mí" cuando el crecimiento organizacional
        puede crear más oportunidades para todos.
    real_world_implications: |
      El pensamiento de suma cero alimenta el conflicto, limita la cooperación y causa oportunidades perdidas.
      A menudo es incorrecto en economía, relaciones e innovación. Cambiar a un marco de suma positiva
      mejora los resultados.
    professional_application:
      networking_and_relationship_building: |
        Busca formas de crear valor para los demás: su éxito puede crear
        oportunidades para ti. Construye relaciones donde ambas partes se beneficien.
      collaborative_learning_initiative: |
        Enmarca los objetivos del equipo como de suma positiva: éxito compartido, expandiendo el pastel.
        Fomenta la colaboración por encima de la competencia interna.
    how_can_this_be_misapplied:
      ignoring_real_zero_sum: |
        Algunas situaciones son de suma cero (por ejemplo, una sola promoción, un presupuesto fijo).
        Pretender lo contrario puede ser ingenuo.
      naive_cooperation: |
        Asumir que todos cooperarán cuando algunos actores son genuinamente
        adversarios.
      undervaluing_competition: |
        La competencia puede impulsar la mejora; no toda rivalidad es destructiva.
      exploitation: |
        Usar un marco de "suma positiva" para extraer valor de otros que no se benefician.
    related_content:
      - fundamental_attribution_error
      - in_group_bias
      - scarcity_bias
      - endowment_effect
