# Cognitive Dissonance
# Mental Model / Cognitive Bias - Example Entry

id: cognitive_dissonance
name: Cognitive Dissonance

quick_introduction: |
  Cognitive dissonance is the mental discomfort we feel when holding conflicting
  beliefs, or when our actions contradict our beliefs. We're motivated to
  reduce this discomfort—often by changing our beliefs to match our actions
  rather than changing our actions.

one_liner: We change our beliefs to match our actions more often than the reverse.

try_this:
  - Notice when you're rationalizing to reduce discomfort instead of changing behavior.
  - Ask: Am I adjusting my beliefs to justify what I did?
  - Consider whether changing the action would be more honest than changing the belief.

ask_yourself:
  - Am I reducing dissonance by rationalizing, or by actually changing?
  - Would I hold this belief if I hadn't already acted this way?

in_more_detail: |
  Leon Festinger's theory explains that we seek consistency. When we act
  against our values (e.g., lying, wasting money), we experience dissonance.
  To reduce it, we might change our belief ("It wasn't really a lie") or
  minimize the action ("It wasn't that bad"). We often rationalize rather
  than reform.

  Cognitive dissonance drives the Ben Franklin effect (we like people we've
  helped), explains why we justify past decisions, and underlies many
  self-deceptions. It's a powerful force in belief formation and change.

why_this_is_important: |
  Understanding cognitive dissonance helps you recognize your own
  rationalizations and understand why people resist changing their minds.
  It also explains why commitment and consistency are powerful persuasion
  principles.

when_to_use:
  - decision-making
  - relationship_building
  - leadership
  - conflict_resolution

how_can_you_spot_it:
  post_decision_rationalization: |
    After a choice, we emphasize the positives of our choice and the
    negatives of rejected options.
  belief_action_alignment: |
    We adjust beliefs to match actions we've already taken.
  discomfort_with_inconsistency: |
    Unease when we notice our behavior doesn't match our stated values.
  resistance_to_disconfirming_evidence: |
    Dismissing or minimizing information that conflicts with our commitments.

examples:
  purchase_justification: |
    After buying an expensive item, we emphasize its benefits and downplay
    the cost.
  relationship: |
    We rationalize staying in a bad relationship by focusing on the good
    and minimizing the bad.
  career: |
    We justify staying in a job we dislike by emphasizing reasons we "have to"
    stay.
  beliefs: |
    When our actions contradict our values, we change our values ("I'm not
    really a vegetarian—I just eat meat sometimes") rather than our actions.

real_world_implications: |
  Cognitive dissonance shapes belief formation, consumer behavior, and
  political attitudes. It explains why people double down after bad
  decisions and why changing behavior can change beliefs.

professional_application:
  networking_and_relationship_building: |
    Small commitments can lead to larger ones—people rationalize their
    past actions. Use this ethically: start with small asks. Be aware
    when you're rationalizing your own behavior.
  collaborative_learning_initiative: |
    When introducing change, get early buy-in and small commitments—they
    create dissonance that motivates larger adoption. Avoid forcing
    public commitments that create resentment.

how_can_this_be_misapplied:
  manipulation: |
    Deliberately creating dissonance to pressure people into compliance.
  dismissing_genuine_change: |
    Assuming all belief change is rationalization when people sometimes
    genuinely update.
  forced_consistency: |
    Pressuring people to be "consistent" when their views have legitimately
    evolved.
  self_deception: |
    Using dissonance theory to justify avoiding uncomfortable truths about
    ourselves.

related_content:
