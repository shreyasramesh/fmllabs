    path: mental-models-kn/salience-bias.yaml
    description: |
      

  - id: scarcity_bias
    name: ಕೊರತೆಯ ಪಕ್ಷಪಾತ (Scarcity Bias)
    path: mental-models-kn/scarcity-bias.yaml
    description: |
      ಕೊರತೆಯ ಪಕ್ಷಪಾತ ಎಂದರೆ ಯಾವುದೇ ವಸ್ತುಗಳು ದೊರೆಯುವುದು ಕಷ್ಟಕರವಾದಾಗ ಅಥವಾ ಸೀಮಿತವಾಗಿದ್ದಾಗ ಅವುಗಳಿಗೆ ಹೆಚ್ಚಿನ ಮೌಲ್ಯವನ್ನು ನೀಡುವ ಪ್ರವೃತ್ತಿ. "ಸೀಮಿತ ಸಮಯ," "ಕೇವಲ 3 ಬಾಕಿ," ಮತ್ತು "ವಿಶೇಷ ಪ್ರವೇಶ" ಮುಂತಾದ ಪದಗಳು ತುರ್ತು ಮತ್ತು ಆಸೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತವೆ, ಇದು ನಮಗೆ ನಿಜವಾಗಿಯೂ ಆ ವಸ್ತು ಬೇಕೋ ಅಥವಾ ಬೇಡವೋ ಎಂಬುದರ ಬಗ್ಗೆ ತಾರ್ಕಿಕ ಮೌಲ್ಯಮಾಪನವನ್ನು ಮೀರಿಸುತ್ತದೆ.

  - id: second_order_thinking
    name: ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆ
    path: mental-models-kn/second-order-thinking.yaml
    description: |
      ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು ನಿಮ್ಮ ಕ್ರಿಯೆಗಳ ಪರಿಣಾಮಗಳ ಪರಿಣಾಮಗಳನ್ನು ಪರಿಗಣಿಸುವ ಅಭ್ಯಾಸವಾಗಿದೆ. ಮೊದಲ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಾನು X ಮಾಡಿದರೆ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಎರಡನೇ-ಶ್ರೇಣಿಯ ಚಿಂತನೆಯು "ನಂತರ ಏನಾಗುತ್ತದೆ?" ಮತ್ತು "ಅದರ ನಂತರ ಏನಾಗುತ್ತದೆ?" ಎಂದು ಕೇಳುತ್ತದೆ. ಇದು ಅನಿರೀಕ್ಷಿತ ಪರಿಣಾಮಗಳನ್ನು ಮೇಲ್ಮೈಗೆ ತರುತ್ತದೆ.

  - id: sunk_cost_fallacy
    name: ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆ
    path: mental-models-kn/sunk-cost-fallacy.yaml
    description: |
      ಮುಳುಗಿದ ವೆಚ್ಚದ ತಪ್ಪುಗ್ರಹಿಕೆ ಎಂದರೆ, ಭವಿಷ್ಯದ ನಿರೀಕ್ಷಿತ ಲಾಭಗಳ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಧರಿಸುವ ಬದಲು,
      ಇಾಗಲೇ ಖರ್ಚು ಮಾಡಿದ ಸಂಪನ್ಮೂಲಗಳಿಂದಾಗಿ ಒಂದು ನಿರ್ಧಾರದಲ್ಲಿ ಮುಂದುವರಿಯುವ ಪ್ರವೃತ್ತಿ.
      "ಇಲ್ಲಿಯವರೆಗೆ ಬಂದಿದ್ದೇವೆ" ಅಥವಾ "ನಾನು ಈಗಾಗಲೇ ಇಷ್ಟು ಹೂಡಿಕೆ ಮಾಡಿದ್ದೇನೆ" ಎಂಬುದು ಕೆಟ್ಟದರಲ್ಲಿಯೇ ಒಳ್ಳೆಯದನ್ನು
      ಹೂಡಲು ಕಾರಣವಾಗುತ್ತದೆ.

  - id: survivorship_bias
    name: ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ
    path: mental-models-kn/survivorship-bias.yaml
    description: |
      ಬದುಕುಳಿದವರ ಪಕ್ಷಪಾತ ಎಂದರೆ ಒಂದು ಪ್ರಕ್ರಿಯೆಯಲ್ಲಿ "ಬದುಕಿ ಉಳಿದ" ವ್ಯಕ್ತಿಗಳು ಅಥವಾ ವಿಷಯಗಳ ಮೇಲೆ ಮಾತ್ರ ಗಮನ ಕೇಂದ್ರೀಕರಿಸಿ, ಬದುಕಿ ಉಳಿಯದವರನ್ನು ಕಡೆಗಣಿಸುವ ತಾರ್ಕಿಕ ದೋಷವಾಗಿದೆ. ನಾವು ವಿಜೇತರನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಸೋತವರನ್ನು ಮರೆಯುತ್ತೇವೆ, ಇದು ಯಶಸ್ಸು ಮತ್ತು ವೈಫಲ್ಯದ ಬಗ್ಗೆ ಅತಿಯಾದ ಆಶಾವಾದಿ ತೀರ್ಮಾನಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ.

  - id: zeigarnik_effect
    name: ಝೆಗಾರ್ನಿಕ್ ಪರಿಣಾಮ
    path: mental-models-kn/zeigarnik-effect.yaml
    description: |
      ಝೆಗಾರ್ನಿಕ್ ಪರಿಣಾಮವು ಪೂರ್ಣಗೊಳಿಸದ ಅಥವಾ ಅಡ್ಡಿಪಡಿಸಿದ ಕಾರ್ಯಗಳನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ಕಾರ್ಯಗಳಿಗಿಂತ ಉತ್ತಮವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಅಪೂರ್ಣ ಕಾರ್ಯಗಳು ಮಾನಸಿಕ ಒತ್ತಡವನ್ನು ಸೃಷ್ಟಿಸುತ್ತವೆ, ಅದು ನಮ್ಮ ಮನಸ್ಸಿನಲ್ಲಿ ಸಕ್ರಿಯವಾಗಿ ಇಡುತ್ತದೆ. ನಮ್ಮ ಮೆದುಳು ಅಪೂರ್ಣವಾದುದನ್ನು ಹಿಡಿದಿಟ್ಟುಕೊಳ್ಳುತ್ತದೆ.

  - id: zero_sum_thinking
    name: ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆ (Zero-Sum Thinking)
    path: mental-models-kn/zero-sum-thinking.yaml
    description: |
      ಶೂನ್ಯ-ಮೊತ್ತದ ಚಿಂತನೆ ಎಂದರೆ ಒಬ್ಬರ ಲಾಭವು ಇನ್ನೊಬ್ಬರ ನಷ್ಟವಾಗಿರಬೇಕು ಎಂಬ ನಂಬಿಕೆಯಾಗಿದೆ—
      ಅಂದರೆ ಸಂಪನ್ಮೂಲಗಳು ಸ್ಥಿರವಾಗಿರುತ್ತವೆ ಮತ್ತು ನಿಮಗೆ ಯಾವುದೇ ಅನುಕೂಲವೆಂದರೆ ನನಗೆ ಅನನುಕೂಲ.
      ವಾಸ್ತವದಲ್ಲಿ, ಅನೇಕ ಸಂದರ್ಭಗಳು ಸಕಾರಾತ್ಮಕ-ಮೊತ್ತದಾಗಿರುತ್ತವೆ: ಎರಡೂ ಪಕ್ಷಗಳು ಲಾಭ ಪಡೆಯಬಹುದು.
