# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Kannada)

mental_models:
  - id: ambiguity_effect
    name: ಅಸ್ಪಷ್ಟತೆಯ ಪರಿಣಾಮ
    path: mental-models-kn/ambiguity-effect.yaml
    description: |
      ಮಾಹಿತಿಯ ಕೊರತೆಯಿರುವ ಆಯ್ಕೆಗಳನ್ನು ತಪ್ಪಿಸುವ ಪ್ರವೃತ್ತಿ ಇದು, ಫಲಿತಾಂಶಗಳ ಸಂಭವನೀಯತೆಗಳ ಬಗ್ಗೆ ನಮಗೆ ಮಾಹಿತಿ ಇಲ್ಲದಿರುವಾಗ. ನಮಗೆ ತಿಳಿದಿರುವ ಅಪಾಯಗಳನ್ನು ನಾವು ಅಪರಿಚಿತ ಅಪಾಯಗಳಿಗಿಂತ ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ, ಆ ಅಪರಿಚಿತ ಅಪಾಯಗಳು ಉತ್ತಮವಾಗಿದ್ದರೂ ಸಹ. ಅನಿಶ್ಚಿತತೆಯು ಸ್ವತಃ ಅಹಿತಕರವೆನಿಸುತ್ತದೆ.

  - id: anchoring_bias
    name: ಆಂಕರಿಂಗ್ ಬಯಾಸ್
    path: mental-models-kn/anchoring-bias.yaml
    description: |
      ಆಂಕರಿಂಗ್ ಬಯಾಸ್ ಎಂದರೆ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಎದುರಾದ ಮೊದಲ ಮಾಹಿತಿಯ ಮೇಲೆ ಅತಿಯಾಗಿ ಅವಲಂಬಿತರಾಗುವ ಪ್ರವೃತ್ತಿ. ಆ ಮೊದಲ "ಆಂಕರ್" ನಂತರದ ತೀರ್ಪುಗಳನ್ನು ತಿರುಚಿಹಾಕುತ್ತದೆ, ಅದು ಅಪ್ರಸ್ತುತ ಅಥವಾ ಯಾದೃಚ್ಛಿಕವಾಗಿದ್ದರೂ ಸಹ.

  - id: availability_cascade
    name: ಲಭ್ಯತೆಯ ಕುಸಿತ
    path: mental-models-kn/availability-cascade.yaml
    description: |
      ಲಭ್ಯತೆಯ ಕುಸಿತ ಎನ್ನುವುದು ಒಂದು ಸ್ವಯಂ-ಬಲವರ್ಧಿಸುವ ಪ್ರಕ್ರಿಯೆಯಾಗಿದ್ದು, ಇದರಲ್ಲಿ ಒಂದು ಕಲ್ಪನೆ
      ಪುನರಾವರ್ತಿತ ಸಾರ್ವಜನಿಕ ಚರ್ಚೆಯ ಮೂಲಕ ಹೆಚ್ಚು ಸಂಭವನೀಯವೆಂದು ತೋರುತ್ತದೆ.
      ಇದು ಎಷ್ಟು ಹೆಚ್ಚು ಚರ್ಚಿಸಲ್ಪಡುತ್ತದೆಯೋ, ಅಷ್ಟು ಹೆಚ್ಚು "ಲಭ್ಯ"ವಾಗುತ್ತದೆ,
      ಅಷ್ಟು ಹೆಚ್ಚು ಜನರು ಅದನ್ನು ನಂಬುತ್ತಾರೆ, ಮತ್ತು ಅಷ್ಟು ಹೆಚ್ಚು ಅದನ್ನು ಚರ್ಚಿಸಲಾಗುತ್ತದೆ.
      ಒಂದು ಸಾಮೂಹಿಕ ನಂಬಿಕೆಯು ಅದರ ಮೂಲ ಸತ್ಯವನ್ನು ಲೆಕ್ಕಿಸದೆ ವೇಗವನ್ನು ಪಡೆಯುತ್ತದೆ.

  - id: availability_heuristic
    name: ಲಭ್ಯತೆಯ ಅನುಮಾನ (Availability Heuristic)
    path: mental-models-kn/availability-heuristic.yaml
    description: |
      ಲಭ್ಯತೆಯ ಅನುಮಾನ (Availability heuristic) ಎಂದರೆ, ಯಾವುದೇ ಘಟನೆ ಸಂಭವಿಸುವ ಸಂಭವನೀಯತೆಯನ್ನು
      ಅದರ ಉದಾಹರಣೆಗಳು ನಮ್ಮ ಮನಸ್ಸಿನಲ್ಲಿ ಎಷ್ಟು ಸುಲಭವಾಗಿ ಬರುತ್ತವೆ ಎಂಬುದರ ಆಧಾರದ ಮೇಲೆ ನಿರ್ಣಯಿಸುವುದು.
      ನಮಗೆ ಸುಲಭವಾಗಿ ನೆನಪಾಗುವ ಘಟನೆಗಳು ಸಾಮಾನ್ಯವೆಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ. ಸ್ಪಷ್ಟವಾದ, ಇತ್ತೀಚಿನ
      ಅಥವಾ ಭಾವನಾತ್ಮಕ ಉದಾಹರಣೆಗಳು ನಮ್ಮ ಸಂಭವನೀಯತೆಯ ಅಂದಾಜುಗಳನ್ನು ಆವರಿಸುತ್ತವೆ.

  - id: baader_meinhof_phenomenon
    name: Baader-Meinhof ವಿದ್ಯಮಾನ
    path: mental-models-kn/baader-meinhof-phenomenon.yaml
    description: |
      Baader-Meinhof ವಿದ್ಯಮಾನ (ಇದನ್ನು ಆವರ್ತನ ಭ್ರಮೆ ಎಂದೂ ಕರೆಯಲಾಗುತ್ತದೆ) ಎಂದರೆ ನೀವು
      ಏನನ್ನಾದರೂ ಹೊಸದಾಗಿ ಕಲಿಯುವಾಗ ಮತ್ತು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಅದನ್ನು ಎಲ್ಲೆಡೆ ಗಮನಿಸುವುದು. ಇದು ಕಾಕತಾಳೀಯವೆಂದು
      ಅನಿಸುತ್ತದೆ, ಆದರೆ ಇದು ಆಗಾಗ್ಗೆ ಆಯ್ಕೆಮಾಡಿದ ಗಮನ-ನಿಮ್ಮ ಮೆದುಳು ಇತ್ತೀಚೆಗೆ ಎದುರಿಸಿದ್ದನ್ನು ಗಮನಿಸಲು
      ಸಜ್ಜಾಗಿರುತ್ತದೆ.

  - id: barnum_effect
    name: ಬಾರ್ನಮ್ ಪರಿಣಾಮ
    path: mental-models-kn/barnum-effect.yaml
    description: |
      ಬಾರ್ನಮ್ ಪರಿಣಾಮ (ಅಥವಾ ಫೋರರ್ ಪರಿಣಾಮ) ಎಂದರೆ ಅಸ್ಪಷ್ಟ, ಸಾಮಾನ್ಯ ವ್ಯಕ್ತಿತ್ವ ವಿವರಣೆಗಳನ್ನು
      ವಿಶೇಷವಾಗಿ ನಿಖರವೆಂದು ಸ್ವೀಕರಿಸುವ ಪ್ರವೃತ್ತಿ. ಜಾತಕ, ಭವಿಷ್ಯಕಾರರು ಮತ್ತು ವ್ಯಕ್ತಿತ್ವ ಪರೀಕ್ಷೆಗಳು
      ಬಹುತೇಕ ಎಲ್ಲರಿಗೂ ಅನ್ವಯಿಸುವ ಹೇಳಿಕೆಗಳನ್ನು ಬಳಸುತ್ತವೆ-ಆದರೆ ನಾವು ಅವು ನಮ್ಮದೇ ಎಂದು ನಂಬುತ್ತೇವೆ.
      ನಾವು ನಮ್ಮನ್ನು ಸಾಮಾನ್ಯ ವಿಷಯಗಳಲ್ಲಿ ನೋಡುತ್ತೇವೆ.

  - id: base_rate_fallacy
    name: ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ
    path: mental-models-kn/base-rate-fallacy.yaml
    description: |
      ಬೇಸ್ ರೇಟ್ ತಪ್ಪು ಕಲ್ಪನೆ ಎಂದರೆ ನಿರ್ದಿಷ್ಟ, ಸ್ಪಷ್ಟವಾದ ಮಾಹಿತಿಯ ಪರವಾಗಿ
      ಸಾಮಾನ್ಯ ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ಮಾಹಿತಿಯನ್ನು (ಬೇಸ್ ರೇಟ್‌ಗಳು) ನಿರ್ಲಕ್ಷಿಸುವ ಪ್ರವೃತ್ತಿ.
      ನಾವು ನಿರ್ದಿಷ್ಟ ಪ್ರಕರಣವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ ಮತ್ತು ಪೂರ್ವ ಸಂಭವನೀಯತೆಯನ್ನು
      ಕಡಿಮೆಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ. ಒಂದು ಪ್ರಬಲವಾದ ಕಥೆಯು ಸಂಖ್ಯೆಗಳು ಹೇಳುವುದನ್ನು
      ಮೀರಿಸಬಹುದು.

  - id: bayes_theorem
    name: ಬೇಯ್ಸ್ ಪ್ರಮೇಯ
    path: mental-models-kn/bayes-theorem.yaml
    description: |
      ಬೇಯ್ಸ್ ಪ್ರಮೇಯವು ಹೊಸ ಪುರಾವೆಗಳು ಬಂದಾಗ ಒಂದು ಊಹೆಯ ಸಂಭವನೀಯತೆಯನ್ನು ಹೇಗೆ ನವೀಕರಿಸಬೇಕು ಎಂಬುದನ್ನು ವಿವರಿಸುತ್ತದೆ. ನಂಬಿಕೆಗಳು ಪುರಾವೆಗಳು ಅವುಗಳನ್ನು ಎಷ್ಟು ಚೆನ್ನಾಗಿ ಬೆಂಬಲಿಸುತ್ತವೆಯೋ ಅದಕ್ಕೆ ಅನುಗುಣವಾಗಿ ಬದಲಾಗಬೇಕು ಎಂಬ ಕಲ್ಪನೆಯನ್ನು ಇದು ಔಪಚಾರಿಕಗೊಳಿಸುತ್ತದೆ - ಸಂಪೂರ್ಣವಾಗಿ ಅಥವಾ ಏನೂ ಇಲ್ಲ, ಆದರೆ ಹೆಚ್ಚಳವಾಗಿ.

  - id: ben_franklin_effect
    name: ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮ
    path: mental-models-kn/ben-franklin-effect.yaml
    description: |
      ಬೆನ್ ಫ್ರಾಂಕ್ಲಿನ್ ಪರಿಣಾಮವು ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ಸಹಾಯ ಮಾಡಿದ ನಂತರ ಅವರು ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಇಷ್ಟಪಡುತ್ತಾರೆ ಎಂಬ ಮಾನಸಿಕ ವಿದ್ಯಮಾನವಾಗಿದೆ. ನಾವು ಇಷ್ಟಪಡುವ ಜನರಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತೇವೆ ಎಂಬ ಅಂತರ್ಜ್ಞಾನಕ್ಕೆ ವ್ಯತಿರಿಕ್ತವಾಗಿ, ನಾವು ಅನೇಕವೇಳೆ ಸಹಾಯ ಮಾಡಿದ ಜನರನ್ನು ಇಷ್ಟಪಡುತ್ತೇವೆ.

  - id: bounded_rationality
    name: ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆ
    path: mental-models-kn/bounded-rationality.yaml
    description: |
      ಸೀಮಿತ ತರ್ಕಬದ್ಧತೆ ಎನ್ನುವುದು ಲಭ್ಯವಿರುವ ಮಾಹಿತಿ, ಅರಿವಿನ ಸಾಮರ್ಥ್ಯ ಮತ್ತು ಸಮಯದಿಂದಾಗಿ ಮಾನವ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಿಕೆಯು ಸೀಮಿತವಾಗಿರುತ್ತದೆ ಎಂಬ ಕಲ್ಪನೆಯಾಗಿದೆ. ನಾವು ಸೂಕ್ತವಾಗಿರುವುದನ್ನು ಪಡೆಯುವುದಿಲ್ಲ; ನಾವು "ಸಮಧಾನಕರ" ಆಗಿರುತ್ತೇವೆ - ಅಂದರೆ ನಾವು ಸಾಧ್ಯವಾದಷ್ಟು ಉತ್ತಮವಾದುದಕ್ಕಿಂತಲೂ ಸಾಕು ಎನಿಸುವ ಆಯ್ಕೆಗಳನ್ನು ಆರಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.

  - id: bystander_effect
    name: ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮ (Bystander Effect)
    path: mental-models-kn/bystander-effect.yaml
    description: |
      ಪ್ರೇಕ್ಷಕರ ಪರಿಣಾಮ ಎಂದರೆ, ಸುತ್ತಮುತ್ತಲಿನ ಜನರು ಇರುವಾಗ ಸಹಾಯ ಮಾಡಲು ವ್ಯಕ್ತಿಗಳು ಕಡಿಮೆ ಆಸಕ್ತಿ ತೋರಿಸುವ ಪ್ರವೃತ್ತಿ. ಹೆಚ್ಚು ಪ್ರೇಕ್ಷಕರು ಇದ್ದಷ್ಟೂ, ಯಾವುದೇ ಒಬ್ಬ ವ್ಯಕ್ತಿಯು ಕ್ರಿಯಾಶೀಲರಾಗುವ ಸಾಧ್ಯತೆ ಕಡಿಮೆಯಾಗುತ್ತದೆ. ಜವಾಬ್ದಾರಿಯು ಹಂಚಿಹೋಗುತ್ತದೆ; ನಾವು ಬೇರೊಬ್ಬರು ಸಹಾಯ ಮಾಡುತ್ತಾರೆ ಎಂದು ಊಹಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.

  - id: circle_of_competence
    name: ಸಾಮರ್ಥ್ಯದ ವೃತ್ತ
    path: mental-models-kn/circle-of-competence.yaml
    description: |
      ಸಾಮರ್ಥ್ಯದ ವೃತ್ತವು ಒಂದು ಮಾನಸಿಕ ಮಾದರಿಯಾಗಿದ್ದು, ನಿಮ್ಮ ಪರಿಣತಿಯ ಮಿತಿಗಳನ್ನು ತಿಳಿದುಕೊಳ್ಳಲು
      ಮತ್ತು ಪ್ರಮುಖ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಅವುಗಳೊಳಗೆ ಇರಲು ಪ್ರೋತ್ಸಾಹಿಸುತ್ತದೆ. ವಾರೆನ್ ಬಫೆಟ್
      ಮತ್ತು ಚಾರ್ಲಿ ಮುಂಗರ್ ನಿಮಗೆ ಏನು ತಿಳಿದಿಲ್ಲ ಎಂಬುದನ್ನು ತಿಳಿಯುವ ಬಗ್ಗೆ ಒತ್ತಿಹೇಳುತ್ತಾರೆ.

  - id: cognitive_dissonance
    name: ಅರಿವಿನ ಅಸಂಗತತೆ
    path: mental-models-kn/cognitive-dissonance.yaml
    description: |
      ಅರಿವಿನ ಅಸಂಗತತೆ ಎಂದರೆ ನಾವು ಪರಸ್ಪರ ವಿರೋಧಾಭಾಸದ ನಂಬಿಕೆಗಳನ್ನು ಹೊಂದಿರುವಾಗ, ಅಥವಾ ನಮ್ಮ ಕ್ರಿಯೆಗಳು ನಮ್ಮ ನಂಬಿಕೆಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವಾಗ ಅನುಭವಿಸುವ ಮಾನಸಿಕ ಅಸ್ವಸ್ಥತೆ. ಈ ಅಸ್ವಸ್ಥತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಲು ನಾವು ಪ್ರೇರಿತರಾಗುತ್ತೇವೆ - ಆಗಾಗ್ಗೆ ನಮ್ಮ ಕ್ರಿಯೆಗಳನ್ನು ಬದಲಾಯಿಸುವ ಬದಲು ನಮ್ಮ ನಂಬಿಕೆಗಳನ್ನು ನಮ್ಮ ಕ್ರಿಯೆಗಳಿಗೆ ಹೊಂದಿಕೆಯಾಗುವಂತೆ ಬದಲಾಯಿಸಿಕೊಳ್ಳುತ್ತೇವೆ.

  - id: confirmation_bias
    name: ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ
    path: mental-models-kn/confirmation-bias.yaml
    description: |
      ದೃಢೀಕರಣ ಪಕ್ಷಪಾತ ಎಂದರೆ ನಮ್ಮ ಪೂರ್ವಭಾವಿ ನಂಬಿಕೆಗಳನ್ನು ದೃಢಪಡಿಸುವ ರೀತಿಯಲ್ಲಿ ಮಾಹಿತಿಯನ್ನು ಹುಡುಕುವ, ವ್ಯಾಖ್ಯಾನಿಸುವ ಮತ್ತು ನೆನಪಿಟ್ಟುಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಸಹಾಯಕ ಸಾಕ್ಷ್ಯಗಳಿಗೆ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆ ನೀಡುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮ ದೃಷ್ಟಿಕೋನಗಳಿಗೆ ವಿರುದ್ಧವಾಗಿರುವ ಸಾಕ್ಷ್ಯಗಳನ್ನು ಕಡಿಮೆ ಮಾಡುತ್ತೇವೆ ಅಥವಾ ತಿರಸ್ಕರಿಸುತ್ತೇವೆ. ನಾವು ನಮ್ಮ ಕಲ್ಪನೆಗಳನ್ನು ಪರೀಕ್ಷಿಸುವ ಬದಲು ದೃಢಪಡಿಸುವ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳುತ್ತೇವೆ.

  - id: curse_of_knowledge
    name: ಜ್ಞಾನದ ಶಾಪ
    path: mental-models-kn/curse-of-knowledge.yaml
    description: |
      ಒಂದು ವಿಷಯ ಗೊತ್ತಾದ ನಂತರ, ಅದು ಗೊತ್ತಿಲ್ಲದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ಊಹಿಸಲು ಇರುವ ಕಷ್ಟವೇ ಜ್ಞಾನದ ಶಾಪ. ಪರಿಣಿತರು ಆರಂಭಿಕರಿಗೆ ಕಲಿಸಲು ಹೆಣಗಾಡುತ್ತಾರೆ ಏಕೆಂದರೆ ಅವರು ಆರಂಭಿಕರ ದೃಷ್ಟಿಕೋನವನ್ನು ಮರುಸೃಷ್ಟಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ. ಒಮ್ಮೆ ನಿಮಗೆ ಗೊತ್ತಾದ ನಂತರ, ನಿಮಗೆ ಗೊತ್ತಿರದಿದ್ದಾಗ ಹೇಗಿರುತ್ತದೆ ಎಂಬುದನ್ನು ನೀವು ಮರೆತುಬಿಡುತ್ತೀರಿ.

  - id: default_effect
    name: ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮ
    path: mental-models-kn/default-effect.yaml
    description: |
      ಡಿಫಾಲ್ಟ್ ಪರಿಣಾಮ ಎಂದರೆ ಆಯ್ಕೆಗಳನ್ನು ನೀಡಿದಾಗ ಪೂರ್ವ-ಆಯ್ಕೆ ಮಾಡಿದ ಆಯ್ಕೆಯನ್ನು ಆರಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ.
      ಏನನ್ನು ಡಿಫಾಲ್ಟ್ ಆಗಿ ಹೊಂದಿಸಲಾಗಿದೆಯೋ ಅದು ಬಲವಾದ ಪ್ರಯೋಜನವನ್ನು ಹೊಂದಿದೆ—ಆಯ್ಕೆಗಳು ಅವರಿಗೆ ಸೂಕ್ತವಾಗಿದೆಯೇ
      ಎಂಬುದನ್ನು ಲೆಕ್ಕಿಸದೆ ಜನರು ಆಗಾಗ್ಗೆ ಅದಕ್ಕೆ ಅಂಟಿಕೊಳ್ಳುತ್ತಾರೆ.

  - id: dunning_kruger_effect
    name: ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮ
    path: mental-models-kn/dunning-kruger-effect.yaml
    description: |
      ಡನ್ನಿಂಗ್-ಕ್ರೂಗರ್ ಪರಿಣಾಮವು ಒಂದು ಅರಿವಿನ ಪಕ್ಷಪಾತವನ್ನು ವಿವರಿಸುತ್ತದೆ, ಅಲ್ಲಿ ಒಬ್ಬ ವ್ಯಕ್ತಿಗೆ ನಿರ್ದಿಷ್ಟ ವಿಷಯದಲ್ಲಿ ಕಡಿಮೆ ಜ್ಞಾನ ಅಥವಾ ಕೌಶಲ್ಯವಿದ್ದರೆ, ಅವರು ತಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತಾರೆ, ಆದರೆ ತಜ್ಞರು ತಮ್ಮನ್ನು ತಾವು ಕಡಿಮೆ ಅಂದಾಜಿಸುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ನಿಮಗೆ ಎಷ್ಟು ಕಡಿಮೆ ತಿಳಿದಿದೆ, ಅಷ್ಟು ಹೆಚ್ಚು ಆತ್ಮವಿಶ್ವಾಸದಿಂದಿರಬಹುದು.

  - id: empathy_gap
    name: ಎಂಪಥಿ ಗ್ಯಾಪ್ (Empathy Gap)
    path: mental-models-kn/empathy-gap.yaml
    description: |
      ನಾವು ವಿಭಿನ್ನ ಸ್ಥಿತಿಯಲ್ಲಿದ್ದಾಗ ಇತರರ ಮಾನಸಿಕ ಸ್ಥಿತಿಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಮತ್ತು ಊಹಿಸಲು ಇರುವ ಕಷ್ಟವನ್ನು ಎಂಪಥಿ ಗ್ಯಾಪ್ ಎನ್ನುತ್ತಾರೆ. ನಾವು ಶಾಂತವಾಗಿದ್ದಾಗ, ಕೋಪಗೊಂಡಾಗ ಅಥವಾ ಹಸಿದಾಗ ನಾವು ಹೇಗಿದ್ದೀವಿ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ. ನಾವು ತೃಪ್ತರಾಗಿದ್ದಾಗ, ಹಸಿದಿದ್ದಾಗ ನಮಗೆ ಎಷ್ಟು ಆಹಾರ ಬೇಕಾಗುತ್ತದೆ ಎಂಬುದನ್ನು ಕಡಿಮೆ ಅಂದಾಜು ಮಾಡುತ್ತೇವೆ.

  - id: endowment_effect
    name: ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮ (Endowment Effect)
    path: mental-models-kn/endowment-effect.yaml
    description: |
      ನಾವು ಏನನ್ನಾದರೂ ಹೊಂದಿರುವ ಕಾರಣದಿಂದಲೇ ಅದಕ್ಕೆ ಹೆಚ್ಚು ಮೌಲ್ಯ ನೀಡುವ ಪ್ರವೃತ್ತಿಯೇ ಮಾಲೀಕತ್ವದ ಪರಿಣಾಮ.
      ಒಂದು ವಸ್ತುವನ್ನು ಬಿಟ್ಟುಕೊಡಲು ನಾವು ಕೇಳುವ ಬೆಲೆ, ಅದನ್ನು ಪಡೆಯಲು ನಾವು ಪಾವತಿಸಲು ಸಿದ್ಧವಿರುವ ಬೆಲೆಗಿಂತ ಹೆಚ್ಚಿರುತ್ತದೆ.
      ಮಾಲೀಕತ್ವವು ಬಾಂಧವ್ಯವನ್ನು ಸೃಷ್ಟಿಸುತ್ತದೆ, ಅದು ನಮ್ಮ ಮೌಲ್ಯಮಾಪನವನ್ನು ತಿರುಚುತ್ತದೆ.

  - id: false_consensus_effect
    name: ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮ (The False Consensus Effect)
    path: mental-models-kn/false-consensus-effect.yaml
    description: |
      ಸುಳ್ಳು ಒಮ್ಮತದ ಪರಿಣಾಮವೆಂದರೆ ಇತರರು ನಮ್ಮ ನಂಬಿಕೆಗಳು, ವರ್ತನೆಗಳು ಮತ್ತು ಚಟುವಟಿಕೆಗಳೊಂದಿಗೆ
      ಎಷ್ಟು ಒಪ್ಪುತ್ತಾರೆ ಎಂಬುದನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿ. ನಮ್ಮ ಅಭಿಪ್ರಾಯಗಳು
      ಅವುಗಳಿರುವ ಪ್ರಮಾಣಕ್ಕಿಂತ ಹೆಚ್ಚು ಸಾಮಾನ್ಯವೆಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಮತ್ತು ಸಮಂಜಸವಾದ ಜನರು
      ಅಸಮ್ಮತಿ ಸೂಚಿಸಬಹುದು ಎಂದು ನಾವು ಊಹಿಸಲು ಕಷ್ಟಪಡುತ್ತೇವೆ.

  - id: framing_effect
    name: ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್
    path: mental-models-kn/framing-effect.yaml
    description: |
      ಫ್ರೇಮಿಂಗ್ ಎಫೆಕ್ಟ್ ಎಂದರೆ, ಮೂಲಭೂತ ಸಂಗತಿಗಳು ಒಂದೇ ಆಗಿದ್ದರೂ, ಆಯ್ಕೆಗಳನ್ನು
      ಪ್ರಸ್ತುತಪಡಿಸುವ ವಿಧಾನವನ್ನು ಆಧರಿಸಿ ನಮ್ಮ ನಿರ್ಧಾರಗಳು ಬದಲಾಗುವ ಪ್ರವೃತ್ತಿ. "90%
      ಬದುಕುಳಿಯುವಿಕೆ" ಮತ್ತು "10% ಮರಣ" ಒಂದೇ ಫಲಿತಾಂಶವನ್ನು ವಿವರಿಸಿದರೂ ವಿಭಿನ್ನ
      ಆಯ್ಕೆಗಳನ್ನು ನೀಡುತ್ತವೆ. ಫ್ರೇಮ್ ನಿರ್ಧಾರವನ್ನು ರೂಪಿಸುತ್ತದೆ.

  - id: fundamental_attribution_error
    name: ಮೂಲ ಕಾರಣ ದೋಷ
    path: mental-models-kn/fundamental-attribution-error.yaml
    description: |
      ಇತರರ ನಡವಳಿಕೆಯನ್ನು ಅವರ ಗುಣ ಅಥವಾ ವ್ಯಕ್ತಿತ್ವಕ್ಕೆ ಆರೋಪಿಸುವ ಪ್ರವೃತ್ತಿಯೇ ಮೂಲ ಕಾರಣ ದೋಷ.
      ಆದರೆ ನಮ್ಮ ಸ್ವಂತ ನಡವಳಿಕೆಯನ್ನು ಸಂದರ್ಭಕ್ಕೆ ತಕ್ಕಂತೆ ವಿವರಿಸುತ್ತೇವೆ. ನಾವು ಇತರರನ್ನು ಅವರ
      ಕೆಲಸಗಳ ಮೂಲಕ ತೀರ್ಮಾನಿಸುತ್ತೇವೆ ಮತ್ತು ನಮ್ಮನ್ನು ನಮ್ಮ ಉದ್ದೇಶಗಳ ಮೂಲಕ.

  - id: gamblers_fallacy
    name: ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ
    path: mental-models-kn/gamblers-fallacy.yaml
    description: |
      ಜೂಜುಕೋರನ ತಪ್ಪು ತಿಳುವಳಿಕೆ ಎಂದರೆ ಹಿಂದಿನ ಸ್ವತಂತ್ರ ಘಟನೆಗಳು ಭವಿಷ್ಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರುತ್ತವೆ ಎಂಬ ತಪ್ಪು ನಂಬಿಕೆಯಾಗಿದೆ. ಸತತವಾಗಿ 'ತಲೆ' ಬಂದ ನಂತರ, 'ಬಾಲ' ಬರಲು 'ಸಮಯ'ವಾಗಿದೆ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ - ಪ್ರತಿ ಎಸೆತವೂ ಸ್ವತಂತ್ರವಾಗಿದ್ದರೂ ಸಹ. ನಾವು ಯಾದೃಚ್ಛಿಕತೆಯಲ್ಲಿ ಮಾದರಿಗಳನ್ನು ನೋಡುತ್ತೇವೆ ಮತ್ತು ಅಗತ್ಯವಿಲ್ಲದಿದ್ದಾಗ "ಸರಿಪಡಿಸುವಿಕೆ" ಅಥವಾ "ಹಿಮ್ಮುಖ"ವನ್ನು ನಿರೀಕ್ಷಿಸುತ್ತೇವೆ.

  - id: groupthink
    name: ಗುಂಪು ಆಲೋಚನೆ (Groupthink)
    path: mental-models-kn/groupthink.yaml
    description: |
      ಗುಂಪು ಆಲೋಚನೆ ಎಂದರೆ, ಸಮಾನ ಮನಸ್ಕ ಗುಂಪುಗಳು ಟೀಕಾತ್ಮಕ ಮೌಲ್ಯಮಾಂಕನಕ್ಕಿಂತ ಒಮ್ಮತ ಮತ್ತು ಸಾಮರಸ್ಯಕ್ಕೆ ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ. ಸದಸ್ಯರು ಭಿನ್ನಾಭಿಪ್ರಾಯಗಳನ್ನು ಹತ್ತಿಕ್ಕುತ್ತಾರೆ, ಸ್ವಯಂ-ಪ್ರಜ್ಞಾವಂತಿಕೆಯಿಂದ ವರ್ತಿಸುತ್ತಾರೆ ಮತ್ತು ಗ್ರಹಿಸಿದ ಗುಂಪಿನ ದೃಷ್ಟಿಕೋನಕ್ಕೆ ಹೊಂದಿಕೊಳ್ಳುತ್ತಾರೆ. ಏಕಮತದ ಬಯಕೆ ಉತ್ತಮ ನಿರ್ಧಾರದ ಬಯಕೆಗಿಂತ ಹೆಚ್ಚಾಗುತ್ತದೆ.

  - id: halo_effect
    name: ಹಾಲೊ ಎಫೆಕ್ಟ್
    path: mental-models-kn/halo-effect.yaml
    description: |
      ಹಾಲೊ ಎಫೆಕ್ಟ್ ಎಂದರೆ ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣ ಅಥವಾ ಗ್ರಹಿಕೆ
      ಅವರ ಬಗ್ಗೆ ನಮ್ಮ ಒಟ್ಟಾರೆ ನಿರ್ಣಯದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರಲು ಬಿಡುವುದು.
      ನಮಗೆ ಒಬ್ಬರ ನೋಟ ಇಷ್ಟವಾದರೆ, ಅವರು ಸಮರ್ಥರು ಎಂದು ನಾವು ಊಹಿಸಬಹುದು.
      ಒಂದು ಕೌಶಲ್ಯವನ್ನು ಮೆಚ್ಚಿದರೆ, ಅವರು ಎಲ್ಲದರಲ್ಲೂ ಉತ್ತಮರೆಂದು ಊಹಿಸುತ್ತೇವೆ.
      ಒಂದು ಸಕಾರಾತ್ಮಕ ಗುಣವು ಉಳಿದವುಗಳ ಮೇಲೆ "ಹಾಲೊ"ವನ್ನು ಬೀರುತ್ತದೆ.

  - id: hanlons_razor
    name: ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್
    path: mental-models-kn/hanlons-razor.yaml
    description: |
      ಹ್ಯಾನಲೋನ್‌ನ ರೇಜರ್ ಹೇಳುತ್ತದೆ: "ಮೂರ್ಖತನದಿಂದ ಸರಿಯಾಗಿ ವಿವರಿಸಬಹುದಾದ ಯಾವುದನ್ನೂ ದುರುದ್ದೇಶಕ್ಕೆ ಅಧೀನಗೊಳಿಸಬೇಡಿ." ಬೇರೆ ರೀತಿಯಲ್ಲಿ ಹೇಳುವುದಾದರೆ, ಅಸಮರ್ಥತೆ, ಮೇಲ್ವಿಚಾರಣೆ ಅಥವಾ ಅಜ್ಞಾನವು ನಡವಳಿಕೆಯನ್ನು ವಿವರಿಸಬಹುದಾದಾಗ ಕೆಟ್ಟ ಉದ್ದೇಶವನ್ನು ಊಹಿಸಬೇಡಿ.

  - id: hawthorne_effect
    name: ಹಾಥಾರ್ನ್ ಪರಿಣಾಮ
    path: mental-models-kn/hawthorne-effect.yaml
    description: |
      ಹಾಥಾರ್ನ್ ಪರಿಣಾಮವೆಂದರೆ ಜನರು ತಮ್ಮನ್ನು ಗಮನಿಸಲಾಗುತ್ತಿದೆ ಅಥವಾ ಅಧ್ಯಯನ ಮಾಡಲಾಗುತ್ತಿದೆ ಎಂದು ತಿಳಿದಾಗ ತಮ್ಮ ನಡವಳಿಕೆಯನ್ನು ಬದಲಾಯಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ. ನಿರ್ದಿಷ್ಟವಾಗಿ ಪರೀಕ್ಷಿಸಲಾಗುತ್ತಿರುವ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ, ಬದಲಿಗೆ ಗಮನಿಸುವಿಕೆಯ ಕ್ರಿಯೆಯು ಬದಲಾವಣೆಯನ್ನು ಉಂಟುಮಾಡಬಹುದು. ಜನರು ತಮಗೆ ದೊರೆಯುವ ಗಮನಕ್ಕೆ ಪ್ರತಿಕ್ರಿಯಿಸುತ್ತಾರೆ.

  - id: hindsight_bias
    name: ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತ
    path: mental-models-kn/hindsight-bias.yaml
    description: |
      ಯಾವುದೇ ಘಟನೆ ನಡೆದ ನಂತರ, ನಾವು ಅದನ್ನು ಊಹಿಸಿದ್ದೇವೆ ಅಥವಾ ನಿರೀಕ್ಷಿಸಿದ್ದೇವೆ ಎಂದು ನಂಬುವ ಪ್ರವೃತ್ತಿಯೇ ಹಿಂದಿನ ಅರಿವಿನ ಪಕ್ಷಪಾತ (ಅಥವಾ "ನನಗೆ ಮೊದಲೇ ತಿಳಿದಿತ್ತು" ಎಂಬ ಪರಿಣಾಮ). ಆಗಿದ್ದ ಫಲಿತಾಂಶಗಳು ಎಷ್ಟೇ ಅನಿವಾರ್ಯವಾಗಿದ್ದರೂ, ಅವನ್ನು ನಾವು ಆ ರೀತಿಯಲ್ಲಿಯೇ ನಿರೀಕ್ಷಿಸಿದ್ದೆವು ಎಂದು ಪುನರ್ನಿರ್ಮಿಸುತ್ತೇವೆ.

  - id: hyperbolic_discounting
    name: ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿ
    path: mental-models-kn/hyperbolic-discounting.yaml
    description: |
      ಹೈಪರ್ಬೋಲಿಕ್ ರಿಯಾಯಿತಿ ಎಂದರೆ ದೊಡ್ಡ, ನಂತರದ ಬಹುಮಾನಗಳಿಗಿಂತ ಚಿಕ್ಕ, ತಕ್ಷಣದ ಬಹುಮಾನಗಳನ್ನು ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ - ಮತ್ತು ತಾರ್ಕಿಕ ಮಾದರಿಗಳು ಊಹಿಸುವದಕ್ಕಿಂತ ಭವಿಷ್ಯವನ್ನು ಹೆಚ್ಚು ತೀವ್ರವಾಗಿ ರಿಯಾಯಿತಿ ಮಾಡುವುದು. ನಾವು ವರ್ತಮಾನವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜಿಸುತ್ತೇವೆ ಮತ್ತು ಭವಿಷ್ಯವನ್ನು ಅಸಮಂಜಸವಾದ ರೀತಿಯಲ್ಲಿ ಕಡಿಮೆ ಅಂದಾಜಿಸುತ್ತೇವೆ.

  - id: illusion_of_control
    name: ನಿಯಂತ್ರಣದ ಭ್ರಮೆ
    path: mental-models-kn/illusion-of-control.yaml
    description: |
      ನಿಯಂತ್ರಣದ ಭ್ರಮೆ ಎಂದರೆ ಫಲಿತಾಂಶಗಳನ್ನು ಪ್ರಭಾವಿಸುವ ನಮ್ಮ ಸಾಮರ್ಥ್ಯವನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಯಾದೃಚ್ಛಿಕ ಘಟನೆಗಳು, ಇತರ ಜನರು ಮತ್ತು ಸಂಕೀರ್ಣ ವ್ಯವಸ್ಥೆಗಳ ಮೇಲೆ, ನಮಗೆ ಇರುವ ನಿಯಂತ್ರಣಕ್ಕಿಂತ ಹೆಚ್ಚು ನಿಯಂತ್ರಣ ಇದೆ ಎಂದು ನಂಬುತ್ತೇವೆ. ನಾವು ಸಹಸಂಬಂಧವನ್ನು ಕಾರಣವೆಂದು ಮತ್ತು ಕ್ರಿಯೆಯನ್ನು ಪರಿಣಾಮವೆಂದು ಗೊಂದಲಗೊಳಿಸುತ್ತೇವೆ.

  - id: impact_bias
    name: ಪ್ರಭಾವ ಪಕ್ಷಪಾತ
    path: mental-models-kn/impact-bias.yaml
    description: |
      ಪ್ರಭಾವ ಪಕ್ಷಪಾತವು ಭವಿಷ್ಯದ ಘಟನೆಗಳಿಗೆ ನಮ್ಮ ಭಾವನಾತ್ಮಕ ಪ್ರತಿಕ್ರಿಯೆಗಳ ತೀವ್ರತೆ ಮತ್ತು ಅವಧಿಯನ್ನು ಅತಿಯಾಗಿ ಅಂದಾಜು ಮಾಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಒಳ್ಳೆಯ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ಸಂತೋಷಪಡಿಸುವುದಿಲ್ಲ ಎಂದು ನಾವು ಭಾವಿಸುತ್ತೇವೆ, ಮತ್ತು ಕೆಟ್ಟ ವಿಷಯಗಳು ನಮ್ಮನ್ನು ಅವು ಮಾಡುವಷ್ಟು ದುಃಖಿತರನ್ನಾಗಿ ಮಾಡುವುದಿಲ್ಲ. ನಾವು ಭಾವನಾತ್ಮಕ ಮುನ್ಸೂಚನೆಯಲ್ಲಿ ಕೆಟ್ಟವರು.

  - id: in_group_bias
    name: ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತ
    path: mental-models-kn/in-group-bias.yaml
    description: |
      ಆಂತರಿಕ ಗುಂಪು ಪಕ್ಷಪಾತ ಎಂದರೆ ನಮ್ಮ ಗುಂಪಿಗೆ ಸೇರಿದ್ದಾರೆಂದು ನಾವು ಗ್ರಹಿಸುವ ಜನರಿಗೆ, ಹೊರಗಿನವರು ಎಂದು ನಾವು ಗ್ರಹಿಸುವವರಿಗಿಂತ ಹೆಚ್ಚು ಒಲವು ತೋರಿಸುವ ಪ್ರವೃತ್ತಿ. ನಾವು ಆಂತರಿಕ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ಸಕಾರಾತ್ಮಕ ಗುಣಗಳನ್ನು ಮತ್ತು ಹೊರಗಿನ ಗುಂಪಿನ ಸದಸ್ಯರಿಗೆ ನಕಾರಾತ್ಮಕ ಗುಣಗಳನ್ನು ಆರೋಪಿಸುತ್ತೇವೆ, ಇದು ಕನಿಷ್ಠ ಅಥವಾ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸಗಳ ಆಧಾರದ ಮೇಲೆ ಆಗಾಗ್ಗೆ ಸಂಭವಿಸುತ್ತದೆ.

  - id: inversion
    name: ವಿಲೋಮ (Inversion)
    path: mental-models-kn/inversion.yaml
    description: |
      ವಿಲೋಮವು (Inversion) ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸುವ ಒಂದು ತಂತ್ರವಾಗಿದ್ದು, ಇದು ಪ್ರಶ್ನೆಯನ್ನು ತಲೆಕೆಳಗಾಗಿ ತಿರುಗಿಸುತ್ತದೆ. "ನಾನು ಹೇಗೆ ಯಶಸ್ವಿಯಾಗಲಿ?" ಎಂದು ಕೇಳುವ ಬದಲು, ನೀವು "ನನ್ನನ್ನು ವಿಫಲಗೊಳಿಸುವುದು ಯಾವುದು?" ಎಂದು ಕೇಳಿ, ಆ ವಿಷಯಗಳನ್ನು ತಪ್ಪಿಸಿ. ಇದು ಮುಂದೆ ಯೋಚಿಸುವಿಕೆಯು ಆಗಾಗ್ಗೆ ತಪ್ಪಿಸಿಕೊಳ್ಳುವ ಅಪಾಯಗಳು ಮತ್ತು ವಿರೋಧಾಭಾಸಗಳನ್ನು ಮೇಲಕ್ಕೆ ತರುತ್ತದೆ.

  - id: law_of_diminishing_returns
    name: ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ನಿಯಮ
    path: mental-models-kn/law-of-diminishing-returns.yaml
    description: |
      ಕ್ಷೀಣಿಸುತ್ತಿರುವ ಆದಾಯದ ನಿಯಮವು ಹೇಳುವ ಪ್ರಕಾರ, ನೀವು ಇತರ ಇನ್‌ಪುಟ್‌ಗಳನ್ನು ಸ್ಥಿರವಾಗಿಟ್ಟುಕೊಂಡು ಒಂದು ಇನ್‌ಪುಟ್ ಅನ್ನು ಹೆಚ್ಚಿಸಿದಾಗ, ಪ್ರತಿ ಹೊಸ ಇನ್‌ಪುಟ್ ಘಟಕದಿಂದ ಬರುವ ಹೆಚ್ಚುವರಿ ಉತ್ಪಾದನೆಯು ಅಂತಿಮವಾಗಿ ಕಡಿಮೆಯಾಗುತ್ತದೆ. ಹೆಚ್ಚು ಯಾವಾಗಲೂ ಉತ್ತಮವಲ್ಲ - ಹೆಚ್ಚುವರಿ ಪ್ರಯತ್ನವು ಕಡಿಮೆ ಮತ್ತು ಕಡಿಮೆ ಫಲಿತಾಂಶವನ್ನು ನೀಡುವ ಒಂದು ಹಂತವಿದೆ.

  - id: loss_aversion_bias
    name: ನಷ್ಟದ ನಿವಾರಣೆಯ ಪಕ್ಷಪಾತ
    path: mental-models-kn/loss-aversion-bias.yaml
    description: |
      ನಷ್ಟದ ನಿವಾರಣೆ ಎಂದರೆ ಸಮಾನ ಲಾಭವನ್ನು ಗಳಿಸುವುದಕ್ಕಿಂತ ನಷ್ಟವನ್ನು ತಪ್ಪಿಸಲು ಆದ್ಯತೆ ನೀಡುವ ಪ್ರವೃತ್ತಿ.
      ಯಾವುದೇ ವಿಷಯವನ್ನು ಕಳೆದುಕೊಳ್ಳುವ ನೋವು, ಅದನ್ನು ಪಡೆಯುವ ಸಂತೋಷಕ್ಕಿಂತ ಸುಮಾರು ಎರಡು ಪಟ್ಟು ಬಲವಾಗಿ ಅನುಭವಿಸುತ್ತದೆ.

  - id: map_is_not_the_territory
    name: ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ
    path: mental-models-kn/map-is-not-the-territory.yaml
    description: |
      "ನಕ್ಷೆ ಭೂಪ್ರದೇಶವಲ್ಲ" ಎಂದರೆ ವಾಸ್ತವದ ಪ್ರಾತಿನಿಧ್ಯವು ವಾಸ್ತವವೇ ಅಲ್ಲ. ಮಾದರಿಗಳು, ಸಿದ್ಧಾಂತಗಳು ಮತ್ತು ವಿವರಣೆಗಳು ಉಪಯುಕ್ತ ಸರಳೀಕರಣಗಳಾಗಿವೆ, ಆದರೆ ಅವು ಯಾವಾಗಲೂ ಏನನ್ನಾದರೂ ಬಿಟ್ಟುಬಿಡುತ್ತವೆ. ನಕ್ಷೆಯನ್ನು ಭೂಪ್ರದೇಶಕ್ಕಾಗಿ ಗೊಂದಲಗೊಳಿಸುವುದರಿಂದ ದೋಷ ಉಂಟಾಗುತ್ತದೆ.

  - id: mere_exposure_effect
    name: ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮ
    path: mental-models-kn/mere-exposure-effect.yaml
    description: |
      ಕೇವಲ ಪರಿಚಯದ ಪರಿಣಾಮವು ನಾವು ಪರಿಚಿತರಾಗಿರುವುದರಿಂದ ವಸ್ತುಗಳ ಕಡೆಗೆ ಒಲವನ್ನು ಬೆಳೆಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಪುನರಾವರ್ತಿತ ಪರಿಚಯವು - ಬಲವರ್ಧನೆ ಇಲ್ಲದಿದ್ದರೂ ಸಹ - ಇಷ್ಟಪಡುವಿಕೆಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ. ನಮಗೆ ತಿಳಿದಿರುವದನ್ನು ನಾವು ಆದ್ಯತೆ ನೀಡುತ್ತೇವೆ.

  - id: narrative_fallacy
    name: ಕಥನ ದೋಷ (Narrative Fallacy)
    path: mental-models-kn/narrative-fallacy.yaml
    description: |
      ಕಥನ ದೋಷ (Narrative Fallacy) ಎಂದರೆ ಹಿಂದಿನ ಘಟನೆಗಳಿಂದ ಕಥೆಗಳನ್ನು
      ನಿರ್ಮಿಸುವ ಪ್ರವೃತ್ತಿ. ಈ ಕಥೆಗಳು ವಾಸ್ತವಕ್ಕಿಂತ ಹೆಚ್ಚು ಸುಸಂಬದ್ಧ, ಊಹಿಸಬಹುದಾದ
      ಮತ್ತು ಅರ್ಥಪೂರ್ಣವಾಗಿ ಕಾಣುವಂತೆ ಮಾಡುತ್ತದೆ. ನಾವು ಯಾದೃಚ್ಛಿಕತೆಗೆ
      ವಿವರಣೆಗಳನ್ನು ಅನ್ವಯಿಸುತ್ತೇವೆ. ಇತಿಹಾಸದ ಗೊಂದಲವನ್ನು ಅಚ್ಚುಕಟ್ಟಾದ ಕಥೆಯಾಗಿ
      ರೂಪಿಸುತ್ತೇವೆ—ಅದರ ನಂತರ ಆ ಕಥೆಯು ಅನಿವಾರ್ಯವಾಗಿತ್ತು ಎಂದು ನಂಬುತ್ತೇವೆ.

  - id: negativity_bias
    name: ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತ
    path: mental-models-kn/negativity-bias.yaml
    description: |
      ನಕಾರಾತ್ಮಕತೆಯ ಪಕ್ಷಪಾತವು ಸಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗಿಂತ ನಕಾರಾತ್ಮಕ ಮಾಹಿತಿಗೆ ಹೆಚ್ಚಿನ ಮಹತ್ವ ನೀಡುವ ಪ್ರವೃತ್ತಿಯಾಗಿದೆ. ಕೆಟ್ಟ ಸುದ್ದಿಗಳು, ಟೀಕೆಗಳು ಮತ್ತು ಬೆದರಿಕೆಗಳು ನಮ್ಮ ಗಮನವನ್ನು ಸೆಳೆಯುತ್ತವೆ ಮತ್ತು ಸಮಾನವಾದ ಸಕಾರಾತ್ಮಕ ಪ್ರಚೋದನೆಗಳಿಗಿಂತ ನಮ್ಮ ನಿರ್ಧಾರಗಳನ್ನು ಬಲವಾಗಿ ಪ್ರಭಾವಿಸುತ್ತವೆ.

  - id: occams_razor
    name: ಓಕಂ'ಸ್ ರೇಜರ್
    path: mental-models-kn/occams-razor.yaml
    description: |
      ಓಕಂ'ಸ್ ರೇಜರ್ (ಅಥವಾ ಓಕ್'ಹ್ಯಾಮ್'ಸ್ ರೇಜರ್) ಎಂಬುದು ಸ್ಪರ್ಧಾತ್ಮಕ ಊಹೆಗಳ ನಡುವೆ,
      ಅತಿ ಕಡಿಮೆ ಊಹೆಗಳಿರುವ ಊಹೆಗೆ ಆದ್ಯತೆ ನೀಡಬೇಕು ಎಂಬ ತತ್ವವಾಗಿದೆ. ಸರಳವಾದ ವಿವರಣೆಗಳು
      ಹೆಚ್ಚಾಗಿ (ಆದರೆ ಯಾವಾಗಲೂ ಅಲ್ಲ) ಸರಿಯಾಗಿರುತ್ತವೆ.

  - id: ostrich_effect
    name: Ostrich Effect
    path: mental-models-kn/ostrich-effect.yaml
    description: |
      Ostrich effect ಎಂದರೆ ಋಣಾತ್ಮಕ ಹಣಕಾಸಿನ ಮಾಹಿತಿಯನ್ನು ತಪ್ಪಿಸುವ ಪ್ರವೃತ್ತಿ - ಆಸ್ಟ್ರಿಚ್ ನಂತೆ
      "ತಲೆ ಮರಳುಗೊಬ್ಬರದಲ್ಲಿ ಮುಳುಗಿಸುವುದು". ಜನರು ಮಾರುಕಟ್ಟೆ ಕುಸಿಯುತ್ತಿರುವಾಗ ತಮ್ಮ ಪೋರ್ಟ್ಫೋಲಿಯೊಗಳನ್ನು
      ನೋಡುವುದನ್ನು ತಪ್ಪಿಸುತ್ತಾರೆ, ಬಿಲ್ಗಳನ್ನು ತೆರೆಯುವುದನ್ನು ವಿಳಂಬಿಸುತ್ತಾರೆ ಮತ್ತು ಕಾರ್ಯನಿರ್ವಹಿಸಲು ಸಹಾಯ
      ಮಾಡುವ ಎಚ್ಚರಿಕೆ ಚಿಹ್ನೆಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತಾರೆ.

  - id: pareto_principle
    name: ಪರೆಟೊ ತತ್ವ
    path: mental-models-kn/pareto-principle.yaml
    description: |
      ಪರೆಟೊ ತತ್ವ (ಅಥವಾ 80/20 ನಿಯಮ) ಹೇಳುವ ಪ್ರಕಾರ, ಸುಮಾರು 80% ಪರಿಣಾಮಗಳು 20% ಕಾರಣಗಳಿಂದ ಉಂಟಾಗುತ್ತವೆ. ಕಡಿಮೆ ಪ್ರಮಾಣದ ಒಳಹರಿವುಗಳು ಹೆಚ್ಚಾಗಿ ಹೆಚ್ಚಿನ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುತ್ತವೆ—ಮಾರಾಟ, ದೋಷಗಳು, ಗ್ರಾಹಕರು, ಶ್ರಮ, ವೈಶಿಷ್ಟ್ಯಗಳು ಮತ್ತು ಇತರ ಹಲವು ವಿಷಯಗಳಲ್ಲಿ. ಮುಖ್ಯವಾದ ಕೆಲವೇ ವಿಷಯಗಳ ಮೇಲೆ ಗಮನ ಹರಿಸಿ.

  - id: parkinsons_law
    name: ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮ
    path: mental-models-kn/parkinsons-law.yaml
    description: |
      ಪಾರ್ಕಿನ್ಸನ್ ನಿಯಮವು "ಕೆಲಸವು ಅದರ ಪೂರ್ಣಗೊಳ್ಳುವಿಕೆಗೆ ಲಭ್ಯವಿರುವ ಸಮಯವನ್ನು ತುಂಬಲು ವಿಸ್ತರಿಸುತ್ತದೆ" ಎಂದು ಹೇಳುತ್ತದೆ. ಒಂದು ಕಾರ್ಯಕ್ಕೆ ಒಂದು ವಾರ ನೀಡಿದರೆ, ಅದು ಒಂದು ವಾರ ತೆಗೆದುಕೊಳ್ಳುತ್ತದೆ; ಒಂದು ದಿನ ನೀಡಿದರೆ, ಅದು ಆಗಾಗ್ಗೆ ಒಂದು ದಿನದಲ್ಲಿ ಪೂರ್ಣಗೊಳ್ಳುತ್ತದೆ. ಇದೇ ಬಜೆಟ್, ತಂಡದ ಗಾತ್ರ ಮತ್ತು ಸಂಪನ್ಮೂಲಗಳಿಗೆ ಅನ್ವಯಿಸುತ್ತದೆ.

  - id: probabilistic_thinking
    name: ಸಂಭವನೀಯ ಚಿಂತನೆ
    path: mental-models-kn/probabilistic-thinking.yaml
    description: |
      ಸಂಭವನೀಯ ಚಿಂತನೆಯು ನಿಶ್ಚಿತತೆಗಳ ಬದಲಿಗೆ ಸಂಭವನೀಯತೆಗಳ ವಿಷಯದಲ್ಲಿ ತರ್ಕಿಸುವ ಅಭ್ಯಾಸವಾಗಿದೆ. "ಇದು ಸಂಭವಿಸುತ್ತದೆಯೇ?" ಎಂಬುದರ ಬದಲಿಗೆ, ನಾವು "ಇದು ಎಷ್ಟು ಸಂಭವನೀಯತೆ?" ಎಂದು ಕೇಳುತ್ತೇವೆ. ಇದು ಅನಿಶ್ಚಿತತೆಯನ್ನು ಅಪ್ಪಿಕೊಳ್ಳುತ್ತದೆ ಮತ್ತು ಉತ್ತಮ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳಲು ಬಳಸುತ್ತದೆ.

  - id: pygmalion_effect
    name: ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮ
    path: mental-models-kn/pygmalion-effect.yaml
    description: |
      ಪೈಗ್ಮಾಲಿಯನ್ ಪರಿಣಾಮ (ಅಥವಾ ರೋಸೆಂತಲ್ ಪರಿಣಾಮ) ಎಂದರೆ ಹೆಚ್ಚಿನ
      ನಿರೀಕ್ಷೆಗಳು ಸುಧಾರಿತ ಕಾರ್ಯಕ್ಷಮತೆಗೆ ಕಾರಣವಾಗುವ ವಿದ್ಯಮಾನವಾಗಿದೆ. ಶಿಕ್ಷಕರು, ವ್ಯವಸ್ಥಾಪಕರು, ಅಥವಾ
      ಇತರರು ಒಬ್ಬರಿಂದ ಹೆಚ್ಚಿನದನ್ನು ನಿರೀಕ್ಷಿಸಿದಾಗ, ಆ ವ್ಯಕ್ತಿ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ.
      ನಿರೀಕ್ಷೆಗಳು ಸ್ವಯಂ-ಪೂರೈಸುವ ಭವಿಷ್ಯಗಳಾಗುತ್ತವೆ.

  - id: regression_to_the_mean
    name: ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ
    path: mental-models-kn/regression-to-the-mean.yaml
    description: |
      ಸರಾಸರಿಗೆ ಹಿಂಜರಿಕೆ ಎನ್ನುವುದು ಒಂದು ಸಂಖ್ಯಾಶಾಸ್ತ್ರೀಯ ವಿದ್ಯಮಾನವಾಗಿದ್ದು, ಅಸಾಧಾರಣ ಫಲಿತಾಂಶಗಳು
      ಸರಾಸರಿಗೆ ಹತ್ತಿರವಿರುವ ಫಲಿತಾಂಶಗಳಿಂದ ಅನುಸರಿಸಲ್ಪಡುತ್ತವೆ. ಅಸಾಮಾನ್ಯವಾಗಿ ಉತ್ತಮ ಅಥವಾ ಕೆಟ್ಟ
      ಫಲಿತಾಂಶದ ನಂತರ, ಮುಂದಿನ ಫಲಿತಾಂಶವು ಕಡಿಮೆ ತೀವ್ರವಾಗಿರುತ್ತದೆ - ಯಾವುದೇ ಕಾರಣಿಕ ಹಸ್ತಕ್ಷೇಪದಿಂದಲ್ಲ,
      ಆದರೆ ಯಾದೃಚ್ಛಿಕ ವ್ಯತ್ಯಾಸದಿಂದಾಗಿ.

  - id: rosy_retrospection
    name: ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ (Rosy Retrospection)
    path: mental-models-kn/rosy-retrospection.yaml
    description: |
      ರೋಜಿ ರಟ್ರೋಸ್ಪೆಕ್ಷನ್ ಎಂದರೆ, ನಾವು ಕಳೆದ ಘಟನೆಗಳನ್ನು ನಿಜವಾಗಿ ಇದ್ದಕ್ಕಿಂತ ಉತ್ತಮವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ.
      ಕಾಲಾನಂತರದಲ್ಲಿ, ನಾವು ಹಿಂದಿನ ಅನುಭವಗಳನ್ನು ಹೆಚ್ಚು ಸಕಾರಾತ್ಮಕವಾಗಿ ನೆನಪಿಸಿಕೊಳ್ಳುತ್ತೇವೆ, ಕಷ್ಟಗಳನ್ನು ಮೃದುಗೊಳಿಸುತ್ತೇವೆ ಮತ್ತು ಒಳ್ಳೆಯದನ್ನು ವರ್ಧಿಸುತ್ತೇವೆ. "ಹಿಂದಿನ ಒಳ್ಳೆಯ ದಿನಗಳು" ನಾವು ನೆನಪಿಸಿಕೊಳ್ಳುವಷ್ಟು ಒಳ್ಳೆಯದಾಗಿರಲಿಲ್ಲ.

  - id: salience_bias
    name: ಸಲೆ­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­­