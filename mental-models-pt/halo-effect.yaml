id: halo_effect
name: Efeito Halo

quick_introduction: |
  O efeito halo é a tendência de deixar que uma característica ou impressão positiva
  influencie nosso julgamento geral de uma pessoa. Se gostamos da aparência de alguém,
  podemos assumir que essa pessoa é competente. Se admiramos uma habilidade,
  assumimos que ela é boa em tudo. Um atributo positivo lança um
  "halo" sobre o restante.

one_liner: Uma característica positiva lança um halo sobre todo o nosso julgamento de uma pessoa.

try_this:
  - Avalie as características independentemente—não deixe que uma força implique outras.
  - Perceba quando a atratividade, o carisma ou um sucesso está colorindo sua visão.
  - Pergunte: Eu julgaria essa pessoa da mesma forma sem essa única característica positiva?

ask_yourself:
  - Estou generalizando de uma característica para a pessoa inteira?
  - Eu veria fraquezas se não estivesse impressionado com uma força?

in_more_detail: |
  Edward Thorndike observou que oficiais militares que avaliavam soldados
  com notas altas em uma característica tendiam a avaliá-los com notas altas em outras—mesmo em características não relacionadas. Generalizamos do particular para o todo. A atratividade, o carisma ou o sucesso em um domínio cria um halo que se espalha.

  O inverso—uma característica negativa colorindo tudo—às vezes é chamado
  de "efeito chifre". Ambos são formas de generalização injustificada. O
  efeito halo afeta contratações, avaliações de desempenho e impressões cotidianas.

why_this_is_important: |
  Reconhecer o efeito halo ajuda você a fazer avaliações mais precisas e a evitar generalizações excessivas. É essencial para contratações justas, gestão de desempenho e avaliação de relacionamentos. Uma força não implica
  todas as forças.

when_to_use:
  - tomada_de_decisao
  - lideranca
  - construcao_de_relacionamentos
  - contratacao

how_can_you_spot_it:
  trait_spillover: |
    Uma característica positiva influencia o julgamento de características não relacionadas.
  attractiveness_bias: |
    Pessoas atraentes são avaliadas mais alto em competência, confiabilidade, etc.
  success_generalization: |
    O sucesso em uma área leva à suposição de competência em outras.
  first_impression_dominance: |
    A impressão positiva inicial colore toda a avaliação subsequente.

examples:
  hiring: |
    Um candidato que é articulado e agradável é presumido como
    tecnicamente forte—mesmo quando as habilidades não são relacionadas.
  performance_reviews: |
    Um projeto de destaque leva a avaliações altas em todas as dimensões.
  politics: |
    O carisma de um político leva à suposição de competência em políticas.
  branding: |
    O sucesso de uma empresa em um produto leva à suposição de qualidade
    de todos os produtos.

real_world_implications: |
  O efeito halo distorce contratações, avaliações de desempenho e
  decisões de investimento. Favorece os atraentes, articulados e
  já-bem-sucedidos. Reduzi-lo requer avaliação estruturada
  e separação de dimensões.

professional_application:
  networking_and_relationship_building: |
    Avalie as pessoas por dimensões específicas em vez de uma impressão geral. Esteja ciente quando uma característica positiva está influenciando
    seu julgamento sobre os outros. Busque evidências que desconfirmem.
  collaborative_learning_initiative: |
    Use entrevistas e avaliações estruturadas que avaliem dimensões
    independentemente. Calibre as avaliações entre os avaliadores. Reduza
    a dependência do "sentimento intuitivo" geral.

how_can_this_be_misapplied:
  dismissing_all_positive_impressions: |
    Nem toda impressão positiva é halo—às vezes as pessoas são
    genuinamente fortes em todas as dimensões.
  false_objectivity: |
    Presumir que podemos eliminar completamente o efeito halo—ele é
    penetrante e parcialmente automático.
  overcorrection: |
    Ir ao extremo oposto e assumir que pessoas atraentes ou
    carismáticas são menos competentes.
  stereotyping: |
    Usar o "efeito halo" para descartar atributos positivos legítimos.

