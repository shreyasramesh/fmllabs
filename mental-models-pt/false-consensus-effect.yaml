# O Efeito do Falso Consenso
# Modelo Mental / Viés Cognitivo - Exemplo de Entrada

id: false_consensus_effect
name: O Efeito do Falso Consenso

quick_introduction: |
  O efeito do falso consenso é a tendência a superestimar o quanto os outros concordam
  com nossas crenças, atitudes e comportamentos. Assumimos que nossas opiniões são mais
  comuns do que realmente são, e lutamos para imaginar que pessoas razoáveis possam discordar.

one_liner: Superestimamos o quanto os outros concordam conosco.

try_this:
  - Busque ativamente pessoas que discordam — não presuma consenso.
  - Antes de iniciar, teste com pessoas que não compartilham suas suposições.
  - Pergunte: O que alguém que discorda diria? Leve a sério.

ask_yourself:
  - Estou assumindo que os outros pensam como eu?
  - Quando foi a última vez que me surpreendi com a visão diferente de alguém?

in_more_detail: |
  Quando defendemos uma posição, tendemos a pensar que ela é a norma. Cercamo-nos de
  pessoas com ideias semelhantes, consumimos mídia que confirma nossas crenças e interpretamos
  feedback ambíguo como concordância. Isso cria uma câmara de eco que reforça a ilusão de consenso.

  O efeito é mais forte para crenças profundamente arraigadas e quando estamos altamente
  investidos em nossa posição. Pode levar à surpresa quando os outros discordam, dificuldade
  em negociações e pesquisa de mercado inadequada quando assumimos que os clientes pensam
  como nós.

why_this_is_important: |
  Reconhecer o efeito do falso consenso ajuda você a se preparar para desacordos genuínos,
  realizar pesquisas melhores e se comunicar de forma mais eficaz. É essencial para
  desenvolvimento de produtos, negociação e liderança.

when_to_use:
  - tomada_de_decisao
  - negociacao
  - lideranca
  - resolucao_de_problemas

how_can_you_spot_it:
  surprise_at_disagreement: |
    Você fica genuinamente chocado quando alguém discorda do que você considera óbvio.
  assuming_shared_values: |
    Você age como se os outros compartilhassem suas prioridades sem verificar.
  underestimating_opposition: |
    Você espera que as propostas encontrem menos resistência do que realmente encontram.
  echo_chamber_detection: |
    Seu ambiente social e de informação raramente desafia suas opiniões.

examples:
  product_development: |
    Uma equipe assume que os usuários querem o recurso X porque todos na equipe o querem — apenas para
    descobrir baixa adoção.
  politics: |
    Pessoas em uma bolha política ficam surpresas com os resultados eleitorais que não correspondem
    às suas expectativas.
  negotiation: |
    Assumir que a outra parte concordará com os termos porque eles parecem "razoáveis" para você.
  hiring: |
    Contratar por "adequação à cultura" pode significar contratar pessoas que concordam com você, reforçando
    o falso consenso.

real_world_implications: |
  O efeito do falso consenso contribui para a polarização, lançamentos de produtos fracassados
  e negociações falhas. Ele nos torna excessivamente confiantes em nossas previsões e
  mal preparados para a dissidência.

professional_application:
  networking_and_relationship_building: |
    Busque ativamente pessoas com perspectivas diferentes. Não presuma crenças compartilhadas —
    pergunte e ouça.
  collaborative_learning_initiative: |
    Em equipes, use dissidência estruturada (por exemplo, "premortem", advogado do diabo) para expor
    desacordos antes que se tornem custosos.

how_can_this_be_misapplied:
  dismissing_dissent: |
    Assumir que aqueles que discordam são irracionais ou desinformados, em vez de considerar
    que eles podem ter perspectivas diferentes e válidas.
  poor_research: |
    Ignorar pesquisas com clientes porque "já sabemos o que eles querem".
  overconfidence: |
    Fazer apostas ousadas com base na suposição de que outros concordarão.
  groupthink_amplification: |
    Equipes que não desafiam o efeito do falso consenso podem espiralar para o groupthink.

related_content:
  - confirmation_bias
  - in_group_bias
  - groupthink
  - fundamental_attribution_error
