id: survivorship_bias
name: Viés de Sobrevivência

quick_introduction: |
  O viés de sobrevivência é o erro lógico de focar em pessoas ou coisas que
  "sobreviveram" a um processo, enquanto se ignora aqueles que não o fizeram. Vemos os vencedores
  e esquecemos os perdedores, levando a conclusões excessivamente otimistas sobre sucesso
  e fracasso.

one_liner: Vemos os vencedores e esquecemos os perdedores – levando a conclusões excessivamente otimistas.

try_this:
  - Pergunte: Quem falhou ao fazer algo semelhante? O que podemos aprender com eles?
  - Procure a amostra "invisível" – aqueles que não sobreviveram.
  - Observe quando você está estudando apenas histórias de sucesso.

ask_yourself:
  - Estou aprendendo apenas com sobreviventes?
  - Como seria o quadro completo se eu incluísse as falhas?

in_more_detail: |
  Durante a Segunda Guerra Mundial, o estatístico Abraham Wald corrigiu a colocação de blindagem em bombardeiros, analisando onde os aviões sobreviventes foram atingidos – e recomendou blindagem onde os aviões *não* sobreviventes foram atingidos, já que esses aviões nunca retornaram. Naturalmente, focamos na amostra visível (sobreviventes) e ignoramos a invisível (aqueles que falharam).

  O viés de sobrevivência distorce nossa visão sobre empreendedorismo, investimentos, carreiras e história. Estudamos empresas de sucesso e ignoramos as milhares que falharam fazendo coisas semelhantes. Ouvimos os sortudos e esquecemos os azarados.

why_this_is_important: |
  Corrigir o viés de sobrevivência leva a expectativas mais realistas e
  melhores decisões. Ajuda você a aprender com os fracassos, não apenas com os sucessos, e
  evitar copiar estratégias que só funcionaram para os poucos sortudos.

when_to_use:
  - tomada_de_decisao
  - investimentos
  - mudancas_de_carreira
  - aprendizado

how_can_you_spot_it:
  visible_success_stories: |
    Ouvimos falar de pessoas bem-sucedidas com muito mais frequência do que daqueles que tentaram e falharam.
  missing_failures: |
    A amostra que observamos exclui aqueles que não "conseguiram" e, portanto, não podem
    contar suas histórias.
  copying_survivors: |
    Assumir que o que os sobreviventes fizeram causou seu sucesso quando pode ter sido
    sorte ou sobrevivência.
  overly_optimistic_models: |
    Estimativas de taxas de sucesso que ignoram o denominador de tentativas.

examples:
  entrepreneurship: |
    "Abandonar a faculdade como Zuckerberg" ignora os muitos desistentes que não
    fundaram empresas bilionárias.
  investing: |
    Estudar apenas fundos que sobreviveram ignora aqueles que fecharam após baixo
    desempenho, inflando retornos históricos.
  career_advice: |
    Pessoas bem-sucedidas atribuem o sucesso ao trabalho árduo; não ouvimos daqueles
    que trabalharam duro e falharam.
  historical_analysis: |
    Estudar empresas "grandes" que sobreviveram ignora as muitas que falharam com
    estratégias semelhantes.

real_world_implications: |
  O viés de sobrevivência infla as taxas de sucesso percebidas, distorce os modelos a serem seguidos e leva à imitação pobre. Corrigi-lo requer a busca por casos de falha
  e a compreensão das taxas de base.

professional_application:
  networking_and_relationship_building: |
    Ao buscar conselhos, procure também pessoas que tentaram e falharam – suas
    perspectivas são frequentemente mais informativas do que as dos sobreviventes.
  collaborative_learning_initiative: |
    Estude projetos fracassados e iniciativas encerradas, não apenas as bem-sucedidas.
    Conduza "análises pós-fracasso" para aprender com o que não funcionou.

how_can_this_be_misapplied:
  excessive_pessimism: |
    Corrigir em excesso para assumir que o sucesso é sempre sorte e o esforço não importa.
  dismissing_success: |
    Recusar-se a aprender com pessoas bem-sucedidas por causa do "viés de sobrevivência".
  analysis_paralysis: |
    Focar tanto em casos de falha que você nunca toma uma atitude.
  false_equivalence: |
    Tratar as estratégias de sobreviventes e não sobreviventes como igualmente informativas quando o contexto difere.

related_content:
  - hindsight_bias
  - narrative_fallacy
  - base_rate_fallacy
  - regression_to_the_mean
