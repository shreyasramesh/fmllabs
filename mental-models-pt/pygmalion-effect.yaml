id: pygmalion_effect
name: Efeito Pigmaleão

quick_introduction: |
  O efeito Pigmaleão (ou efeito Rosenthal) é o fenômeno onde expectativas mais altas levam a um desempenho melhor. Quando professores, gerentes ou outras pessoas esperam mais de alguém, essa pessoa tende a ter um desempenho melhor. As expectativas se tornam profecias autorrealizáveis.

one_liner: Expectativas mais altas levam a um melhor desempenho – expectativas moldam a realidade.

try_this:
  - Defina expectativas altas, mas alcançáveis; comunique-as claramente.
  - Perceba quando expectativas baixas podem estar limitando o desempenho de alguém.
  - Pergunte: O que estou implicitamente esperando – e como isso pode influenciar os resultados?

ask_yourself:
  - Minhas expectativas estão ajudando ou limitando essa pessoa?
  - Expectativas mais altas mudariam a forma como eu a trato – e seus resultados?

in_more_detail: |
  Robert Rosenthal e Lenore Jacobson deram aos professores informações falsas de que certos alunos "floresceriam" academicamente. Esses alunos – selecionados aleatoriamente – realmente melhoraram mais do que outros. As expectativas dos professores influenciaram seu comportamento (mais atenção, feedback mais caloroso), o que influenciou o desempenho dos alunos. As expectativas moldam a realidade.

  O inverso – expectativas baixas levando a um pior desempenho – é às vezes chamado de efeito Golem. Ambos mostram que nossas crenças sobre os outros podem influenciar seus resultados. Isso tem implicações profundas para liderança, educação e parentalidade.

why_this_is_important: |
  Compreender o efeito Pigmaleão ajuda você a aproveitar o poder das expectativas. Expectativas altas, comunicadas genuinamente, podem melhorar o desempenho. Expectativas baixas podem criar fracasso autorrealizável. Suas crenças sobre os outros importam.

when_to_use:
  - liderança
  - construção_de_relacionamentos
  - aprendizado
  - tomada_de_decisão

how_can_you_spot_it:
  expectation_performance_link: |
    Aqueles de quem esperamos mais tendem a ter um melhor desempenho.
  differential_treatment: |
    Tratamos as pessoas de forma diferente com base em nossas expectativas – muitas vezes
    inconscientemente.
  self_fulfilling_prophecy: |
    Crenças sobre a capacidade influenciam o comportamento que molda
    a capacidade.
  teacher_student_dynamics: |
    As expectativas do educador influenciam os resultados dos alunos através do
    tratamento diferencial.

examples:
  education: |
    Professores que esperam que os alunos tenham sucesso dão mais apoio;
    esses alunos melhoram. Professores que esperam fracasso podem
    inadvertidamente criá-lo.
  workplace: |
    Gerentes que esperam alto desempenho de seus subordinados fornecem
    mais oportunidades e feedback; o desempenho melhora.
  parenting: |
    Pais que esperam que seus filhos sejam responsáveis dão
    a eles mais responsabilidade; eles se elevam a ela.
  stereotypes: |
    A ameaça do estereótipo é o inverso – expectativas negativas
    podem prejudicar o desempenho.

real_world_implications: |
  O efeito Pigmaleão afeta a educação, o gerenciamento e os
  relacionamentos. Sugere que aumentar as expectativas – quando
  feito de forma solidária – pode melhorar os resultados. Também adverte que
  expectativas baixas podem ser destrutivas.

professional_application:
  networking_and_relationship_building: |
    Defina altas expectativas para as pessoas – e forneça o apoio
    para alcançá-las. Acredite no potencial. Suas expectativas
    influenciam seu comportamento, que influencia os resultados delas.
  collaborative_learning_initiative: |
    Crie culturas de altas expectativas com alto apoio.
    Evite rotular pessoas como "desempenho baixo" de maneiras que
    se tornem autorrealizáveis. Invista naqueles de quem você espera
    que tenham sucesso.

how_can_this_be_misapplied:
  unrealistic_expectations: |
    Definir expectativas que são impossíveis de cumprir sem
    apoio cria fracasso e desmoralização.
  blame_shifting: |
    "Eles não atenderam às expectativas" quando nós não fornecemos
    o apoio ou as condições para o sucesso.
  ignoring_constraints: |
    Expectativas sozinhas não superam barreiras estruturais.
  pressure_without_support: |
    Altas expectativas sem recursos ou apoio podem ser
    prejudiciais.

