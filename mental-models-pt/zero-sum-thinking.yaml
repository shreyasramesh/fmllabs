id: zero_sum_thinking
name: Pensamento de Soma Zero

quick_introduction: |
  Pensamento de soma zero é a crença de que o ganho de uma pessoa deve ser a perda de outra —
  que os recursos são fixos e qualquer vantagem para você significa desvantagem para mim.
  Na realidade, muitas situações são de soma positiva: ambas as partes podem ganhar.

one_liner: Seu ganho não precisa ser minha perda — muitas situações são de soma positiva.

try_this:
  - Pergunte: Podemos expandir a torta? Isso é realmente de soma zero?
  - Procure cooperação antes de assumir competição.
  - Observe quando você está tratando uma situação como fixa quando não é.

ask_yourself:
  - Estou assumindo uma torta fixa quando poderíamos expandi-la?
  - A cooperação criaria mais valor do que a competição?

in_more_detail: |
  Em um jogo de soma zero, o total é fixo — seu ganho é minha perda. Em situações de soma positiva,
  a cooperação cria valor. Comércio, inovação e construção de relacionamentos
  são frequentemente de soma positiva. Pensamento de soma zero leva a competição desnecessária,
  oportunidades perdidas de cooperação e rivalidade destrutiva.

  O viés é comum em negociações, política e dinâmicas organizacionais.
  Assume uma torta fixa quando a torta pode frequentemente ser expandida. Pode se tornar
  autoprofético: se você tratar os outros como adversários, eles se tornam adversários.

why_this_is_important: |
  Reconhecer o pensamento de soma zero abre oportunidades para cooperação e
  criação de valor. Melhora a negociação, reduz conflitos e permite
  resultados ganha-ganha. Muitas das melhores oportunidades são de soma positiva.

when_to_use:
  - negociação
  - liderança
  - construção_de_relacionamentos
  - tomada_de_decisão

how_can_you_spot_it:
  fixed_pie_assumption: |
    "Se eles vencerem, eu perco" quando a situação poderia permitir que ambos ganhassem.
  competitive_ framing: |
    Enquadrar automaticamente situações como nós contra eles.
  envy_of_others_gains: |
    Ressentir o sucesso dos outros como se diminuísse o seu.
  missed_cooperation: |
    Não conseguir ver oportunidades de colaboração que beneficiariam a todos.

examples:
  negotiation: |
    Assumir que um acordo melhor para a outra parte significa um acordo pior para
    você — quando soluções criativas frequentemente expandem o valor para ambos.
  salary: |
    "Se meu colega receber um aumento, sobra menos para mim" quando os orçamentos podem ser
    flexíveis ou os aumentos podem ser justificados pelo valor criado.
  politics: |
    "Os ganhos do partido deles são nossas perdas" quando muitos resultados de políticas poderiam
    beneficiar múltiplos grupos.
  career: |
    "A promoção deles significa menos oportunidade para mim" quando o crescimento organizacional
    pode criar mais oportunidades para todos.

real_world_implications: |
  O pensamento de soma zero alimenta conflitos, limita a cooperação e causa oportunidades perdidas.
  É frequentemente errado na economia, relacionamentos e
  inovação. Mudar para um enquadramento de soma positiva melhora os resultados.

professional_application:
  networking_and_relationship_building: |
    Procure maneiras de criar valor para os outros — o sucesso deles pode criar
    oportunidades para você. Construa relacionamentos onde ambas as partes se beneficiam.
  collaborative_learning_initiative: |
    Enquadre metas de equipe como de soma positiva: sucesso compartilhado, expandindo a torta.
    Incentive a colaboração em detrimento da competição interna.

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    Algumas situações são de soma zero (por exemplo, uma única promoção, um orçamento fixo).
    Fingir o contrário pode ser ingênuo.
  naive_cooperation: |
    Assumir que todos irão cooperar quando alguns atores são genuinamente
    adversários.
  undervaluing_competition: |
    A competição pode impulsionar melhorias; nem toda rivalidade é destrutiva.
  exploitation: |
    Usar um enquadramento de "soma positiva" para extrair valor de outros que não se
    beneficiam.

