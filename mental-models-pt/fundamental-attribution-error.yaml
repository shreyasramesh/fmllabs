# yaml-language-server: $schema=../schema/mental-model-schema.json
# Erro Fundamental de Atribuição
# Modelo Mental / Viés Cognitivo - Exemplo de Entrada

id: fundamental_attribution_error
name: Erro Fundamental de Atribuição

quick_introduction: |
  O erro fundamental de atribuição é a tendência de atribuir o comportamento dos outros
  ao seu caráter ou personalidade, enquanto atribuímos nosso próprio comportamento a
  fatores situacionais. Julgamos os outros por suas ações e a nós mesmos por nossas
  intenções.

one_liner: Julgamos os outros por suas ações, a nós mesmos por nossas intenções.

try_this:
  - Quando alguém te frustra, pergunte: Quais fatores situacionais podem explicar isso?
  - Aplique a mesma generosidade aos outros que você aplica a si mesmo.
  - Perceba quando você está atribuindo o comportamento de outras pessoas ao caráter, não à circunstância.

ask_yourself:
  - Eu explicaria meu próprio comportamento da mesma forma que estou explicando o deles?
  - O que posso estar perdendo sobre a situação deles?

in_more_detail: |
  Quando alguém nos corta no trânsito, pensamos "que idiota". Quando cortamos alguém,
  pensamos "eu tive que fazer isso — estava com pressa". Explicamos nossos próprios
  fracassos por circunstâncias ("o trânsito estava terrível") e os fracassos dos outros
  por disposição ("eles são preguiçosos"). O inverso vale para o sucesso: creditamos a nós
  mesmos, atribuímos o sucesso dos outros à sorte.

  O erro é "fundamental" porque é generalizado e persistente. Ele
  mina a empatia, alimenta conflitos e distorce a avaliação de desempenho.

why_this_is_important: |
  Reconhecer o erro fundamental de atribuição melhora os relacionamentos,
  reduz conflitos e leva a julgamentos mais justos. Incentiva a consideração do
  contexto antes de concluir que alguém "é" de uma certa maneira.

when_to_use:
  - construção_de_relacionamentos
  - resolução_de_conflitos
  - liderança
  - tomada_de_decisão

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    "Ele é simplesmente esse tipo de pessoa" ao explicar o comportamento dos outros.
  situational_explanation_for_self: |
    "Eu não tive escolha" ou "As circunstâncias me forçaram" ao explicar o nosso próprio.
  character_vs_context: |
    Assumir caráter quando a situação poderia explicar o comportamento.
  asymmetric_standards: |
    Exigir padrões mais rigorosos dos outros do que de nós mesmos.

examples:
  traffic: |
    O erro de outro motorista = "motorista ruim". Nosso erro = "situação inevitável".
  workplace: |
    Prazo perdido de um colega = "irresponsável". Nosso prazo perdido =
    "sobrecarregado e ninguém poderia ter feito melhor".
  politics: |
    Visões dos oponentes = "eles são estúpidos ou maus". Nossas visões = "resposta racional
    aos fatos".
  performance: |
    Sucesso dos outros = "sorte". Nosso sucesso = "conquistado com trabalho árduo".

real_world_implications: |
  O erro fundamental de atribuição alimenta conflitos, mina o trabalho em equipe e
  distorce a contratação e a avaliação de desempenho. Corrigi-lo melhora a
  cultura organizacional e os relacionamentos pessoais.

professional_application:
  networking_and_relationship_building: |
    Quando alguém te decepciona, pergunte "Quais fatores situacionais podem explicar
    isso?" antes de concluir que a pessoa é não confiável ou difícil.
  collaborative_learning_initiative: |
    Em feedback e avaliações, incentive interpretações do tipo "situação em primeiro lugar".
    Treine gestores a considerar o contexto antes de atribuir ao caráter.

how_can_this_be_misapplied:
  excusing_all_behavior: |
    Descartar toda ação como "situacional" quando algum comportamento reflete
    o caráter.
  no_accountability: |
    Usar o erro para evitar responsabilizar as pessoas por escolhas que elas fizeram.
  self_deprecation: |
    Autocorrigir-se excessivamente a ponto de sempre se culpar e nunca reconhecer a
    responsabilidade dos outros.
  ignoring_patterns: |
    Quando alguém se comporta mal repetidamente em diferentes situações, a disposição pode
    ser relevante.

related_content:
