id: sunk_cost_fallacy
name: Falácia do Custo Irrecuperável

quick_introduction: |
  A falácia do custo irrecuperável é a tendência de continuar investindo em uma decisão
  devido aos recursos já gastos, em vez de com base nos retornos futuros esperados.
  "Já chegamos tão longe" ou "Eu já investi tanto" leva a jogar mais dinheiro em
  algo que já está fadado ao fracasso.

one_liner: O investimento passado se foi — apenas os custos e benefícios futuros importam.

try_this:
  - Pergunte: Se eu estivesse começando hoje, eu escolheria este caminho?
  - Defina "critérios de cancelamento" com antecedência — condições sob as quais você vai parar.
  - Avalie a decisão marginal: o que eu ganho ou perco daqui para frente?

ask_yourself:
  - Estou continuando por causa do valor futuro, ou para justificar o investimento passado?
  - O que eu aconselharia um amigo que estivesse na minha posição começando do zero?

in_more_detail: |
  Custos irrecuperáveis são custos passados que não podem ser recuperados. A tomada de decisão racional os ignora — apenas os custos e benefícios futuros importam. Mas nós nos apegamos emocionalmente aos nossos investimentos. Terminamos a refeição que não estamos gostando, ficamos no filme de que não gostamos e continuamos projetos que não fazem mais sentido. Queremos "não desperdiçar" o que investimos, mas continuar muitas vezes desperdiça mais.

  A falácia é especialmente forte quando investimos tempo, esforço ou identidade, não apenas dinheiro. Admitir que estávamos errados pode parecer custoso, então dobramos a aposta.

why_this_is_important: |
  Reconhecer a falácia do custo irrecuperável ajuda você a cortar perdas, mudar de direção quando
  justificado e tomar decisões com base no valor futuro em vez do investimento passado.
  É essencial para projetos, carreiras e relacionamentos.

when_to_use:
  - tomada_de_decisao
  - investimentos
  - mudancas_de_carreira
  - avaliacao_de_risco

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    "Não podemos parar agora — já gastamos X" quando os retornos futuros não justificam
    continuar.
  escalation_of_commitment: |
    Investir mais para justificar ou "salvar" o investimento anterior.
  identity_investment: |
    Continuar porque admitir o fracasso ameaçaria a autoimagem.
  ignoring_marginal_analysis: |
    Basear decisões no custo total em vez do custo e benefício incrementais.

examples:
  projects: |
    Continuar um projeto fracassado porque "já gastamos 6 meses nele"
    quando cortar as perdas seria o racional.
  relationships: |
    Permanecer em um relacionamento porque "estamos juntos há 5 anos" em vez de
    avaliar o futuro.
  careers: |
    Permanecer em uma carreira que você não gosta porque investiu no diploma ou
    anos de experiência.
  investments: |
    Manter uma ação em queda para "recuperar o prejuízo" em vez de realocar para
    oportunidades melhores.

real_world_implications: |
  A falácia do custo irrecuperável causa desperdício de recursos, fracassos prolongados e oportunidades perdidas. Afeta indivíduos, organizações e governos.
  Superá-la requer quadros de decisão explícitos.

professional_application:
  networking_and_relationship_building: |
    Não continue investindo em relacionamentos ou colaborações que não servem mais a você apenas por causa do investimento passado. Avalie o valor prospectivo.
  collaborative_learning_initiative: |
    Crie "critérios de cancelamento" para projetos — condições sob as quais você vai parar
    independentemente do investimento passado. Revise os projetos periodicamente com uma lente de "começar do zero".

how_can_this_be_misapplied:
  quitting_too_early: |
    Usar "custo irrecuperável" como desculpa para abandonar coisas que precisam de mais tempo para dar retorno.
  undervaluing_consistency: |
    Alguns compromissos (por exemplo, relacionamentos, reputação) têm valor na continuidade
    que a análise marginal pura perde.
  cold_rationality: |
    Descartar o apego emocional como irracional quando ele pode refletir valores genuínos.
  analysis_paralysis: |
    Pensar demais se deve continuar quando a resposta é clara.

related_content:
