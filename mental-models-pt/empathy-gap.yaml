id: empathy_gap
name: Falha de Empatia

quick_introduction: |
  A falha de empatia é a dificuldade em compreender e prever os estados mentais
  de outras pessoas quando nós próprios estamos num estado diferente. Quando
  estamos calmos, subestimamos como nos sentiremos quando estivermos com raiva ou
  com fome. Quando estamos saciados, subestimamos o quanto quereremos comer quando
  estivermos com fome.

one_liner: Subestimamos como nos sentiremos — e como os outros se sentem — em
  estados diferentes.

try_this:
  - Quando calmo, faça compromissos para quando estiver stressado; pré-comprometa-se.
  - Não julgue os outros num estado em que você não se encontra — com fome, cansado, assustado.
  - Pergunte: Estou a projetar o meu estado atual no meu eu futuro ou nos outros?

ask_yourself:
  - Estou a subestimar como me sentirei num estado diferente?
  - Compreenderia melhor esta pessoa se estivesse no estado dela?

in_more_detail: |
  Temos dificuldade em imaginar como nos sentiremos em circunstâncias diferentes — e
  como os outros se sentem quando estão em estados em que não nos encontramos
  atualmente. Uma pessoa sóbria subestima o apelo da adição. Uma pessoa bem
  descansada subestima o impacto da privação de sono. Projetamos o nosso estado
  atual nos outros e nos nossos eus futuros.

  A falha de empatia afeta as decisões que tomamos para os nossos eus futuros (por
  exemplo, comprometer-se a fazer exercício quando estamos motivados), as decisões
  que tomamos para os outros e a nossa capacidade de compreender pessoas em estados
  diferentes.

why_this_is_important: |
  Reconhecer a falha de empatia melhora a tomada de decisões para o seu eu futuro,
  a empatia pelos outros e a compreensão da nossa própria variabilidade. Explica
  por que tomamos compromissos que não conseguimos cumprir e por que
  desentendemos os outros em sofrimento.

when_to_use:
  - tomada_de_decisao
  - construcao_de_relacionamentos
  - lideranca
  - resolucao_de_conflitos

how_can_you_spot_it:
  current_state_projection: |
    Assumir que os outros se sentem como nós agora, ou que o futuro eu se
    sentirá como nós agora.
  underestimating_emotional_state: |
    "Qual é o problema?" quando não estamos no estado em que eles se
    encontram.
  commitment_failures: |
    Tomar escolhas com base na motivação atual que não cumpriremos quando a
    motivação diminuir.
  misunderstanding_others: |
    Ignorar as experiências dos outros porque não as conseguimos imaginar a partir
    do nosso estado atual.

examples:
  hunger: |
    Fazer compras de supermercado quando saciado — compramos menos do que
    quereremos quando tivermos fome.
  addiction: |
    Não viciados subestimam a dificuldade de parar; viciados em recuperação
    podem subestimar o apelo quando estão a usar.
  conflict: |
    Quando calmos, subestimamos como reagiremos no momento do confronto.
  motivation: |
    Inscrever-se numa aula às 6 da manhã quando estamos motivados — e não ir
    quando estamos sonolentos.

real_world_implications: |
  A falha de empatia afeta o tratamento da adição, as políticas e a compreensão
  interpessoal. Explica por que fazemos promessas que quebramos e por que
  muitas vezes falhamos em compreender as perspetivas dos outros. É uma barreira
  à empatia e a uma boa tomada de decisões.

professional_application:
  networking_and_relationship_building: |
    Quando alguém está stressado, zangado ou num estado diferente, não
    assuma que raciocinará como você. Tente imaginar o estado dessa pessoa.
    Ao fazer compromissos, considere como se sentirá quando a motivação
    diminuir.
  collaborative_learning_initiative: |
    Ao planear, considere como a equipa se sentirá quando cansada, sob
    pressão ou frustrada. Desenvolva para esses estados, não apenas para o
    estado de planeamento motivado.

how_can_this_be_misapplied:
  overattribution: |
    Ignorar todos os desentendimentos como "falha de empatia" quando, por
    vezes, as pessoas genuinamente têm valores diferentes.
  excusing_behavior: |
    "Eles não puderam evitar — falha de empatia" quando as pessoas são
    responsáveis por gerir os seus estados.
  false_relativism: |
    Assumir que nunca poderemos compreender os outros quando podemos melhorar
    com esforço e experiência.
  self_excuse: |
    Usar a falha de empatia para justificar as nossas próprias falhas de
    execução.

related_content:
  - impact_bias
  - hyperbolic_discounting
  - fundamental_attribution_error
  - availability_heuristic
