id: framing_effect
name: Efeito de Enquadramento

quick_introduction: |
  O efeito de enquadramento é a tendência de nossas decisões mudarem com base em como as opções são apresentadas—mesmo quando os fatos subjacentes são idênticos. "90% de sobrevivência" e "10% de mortalidade" descrevem o mesmo resultado, mas geram escolhas diferentes. O enquadramento molda a decisão.

one_liner: Os mesmos fatos, enquadrados de forma diferente, levam a decisões diferentes.

try_this:
  - Reenquadre as opções de várias maneiras antes de decidir—enquadramento de ganhos e enquadramento de perdas.
  - Perceba quando sua escolha muda com base em como algo é formulado.
  - Pergunte: Quais são os fatos subjacentes, despidos do enquadramento?

ask_yourself:
  - Eu decidiria de forma diferente se isso fosse enquadrado como um ganho versus uma perda?
  - Estou reagindo ao enquadramento ou ao resultado real?

in_more_detail: |
  Kahneman e Tversky mostraram que as pessoas aversão ao risco quando as opções são enquadradas como ganhos e propensas ao risco quando enquadradas como perdas—mesmo para os mesmos resultados. O enquadramento positivo ("salvar 200 vidas") versus o enquadramento negativo ("400 morrerão") muda as preferências. Os enquadramentos de perda desencadeiam respostas emocionais mais fortes do que os enquadramentos de ganho equivalentes.

  O efeito de enquadramento afeta decisões médicas, políticas, marketing e negociações. É um dos vieses mais poderosos e bem documentados. A conscientização ajuda, mas é difícil superá-lo completamente.

why_this_is_important: |
  Reconhecer o efeito de enquadramento ajuda você a tomar decisões mais consistentes, resistir à manipulação e se comunicar de forma mais eficaz. Também explica por que a mesma oferta pode ser aceita ou rejeitada dependendo da apresentação.

when_to_use:
  - tomada_de_decisao
  - negociacao
  - lideranca
  - avaliacao_de_risco

how_can_you_spot_it:
  gain_loss_asymmetry: |
    O mesmo resultado enquadrado como ganho versus perda produz escolhas diferentes.
  presentation_dependence: |
    As decisões mudam quando apenas o enquadramento muda, não a substância.
  default_influence: |
    Como as opções são ordenadas ou rotuladas afeta as escolhas.
  emotional_trigger: |
    Certos enquadramentos desencadeiam respostas emocionais mais fortes.

examples:
  medical: |
    "90% de sobrevivência" versus "10% de mortalidade" para o mesmo procedimento—
    as pessoas escolhem de forma diferente com base no enquadramento.
  sales: |
    "Economize R$ 50" versus "Não perca R$ 50"—enquadramentos equivalentes,
    impacto psicológico diferente.
  policy: |
    "Alívio fiscal" versus "gastos do governo"—mesma política,
    resposta política diferente.
  negotiation: |
    Apresentar uma oferta como um "desconto" versus "evitar uma sobretaxa"
    muda as taxas de aceitação.

real_world_implications: |
  O efeito de enquadramento é explorado em publicidade, política e
  negociação. Afeta decisões médicas e apoio a políticas.
  O reenquadramento pode melhorar as decisões e a comunicação. Estar ciente
  ajuda, mas não elimina completamente o efeito.

professional_application:
  networking_and_relationship_building: |
    Ao apresentar opções, considere múltiplos enquadramentos. Teste como
    diferentes enquadramentos afetam a recepção. Ao receber informações,
    pergunte "Como mais isso poderia ser enquadrado?"
  collaborative_learning_initiative: |
    Na tomada de decisões, reenquadre explicitamente as opções para verificar
    efeitos de enquadramento. "Se enquadrássemos isso como uma perda, decidiríamos
    de forma diferente?" Use enquadramento consistente para justiça.

how_can_this_be_misapplied:
  manipulation: |
    Enquadrar deliberadamente para direcionar as pessoas para resultados desejados
    sem o conhecimento delas.
  false_equivalence: |
    Assumir que todos os enquadramentos são igualmente válidos quando alguns obscurecem
    informações importantes.
  overcorrection: |
    Ignorar o enquadramento completamente e assumir que ele não importa—
    ele importa.
  spin: |
    Usar o enquadramento para enganar em vez de para esclarecer.

