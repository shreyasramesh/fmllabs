# Viés de Aversão à Perda
# Modelo Mental / Viés Cognitivo - Entrada de Exemplo

id: loss_aversion_bias
name: Viés de Aversão à Perda

quick_introduction: |
  A aversão à perda é a tendência de preferir evitar perdas a adquirir ganhos equivalentes.
  As pessoas sentem a dor de perder aproximadamente duas vezes mais intensamente do que sentem o prazer de ganhar.

one_liner: Perdas parecem aproximadamente duas vezes mais dolorosas do que ganhos equivalentes são prazerosos.

try_this:
  - "Pergunte a si mesmo: Estou supervalorizando o que perderia em comparação com o que ganharia?"
  - Reformule a escolha como ganhos em vez de perdas e veja se sua perspectiva muda.
  - Observe quando o medo de perder está impulsionando a decisão mais do que o benefício real.

ask_yourself:
  - O que eu escolheria se estivesse começando do zero?
  - Estou me apegando por causa do que perderia, ou porque o futuro é genuinamente melhor?

in_more_detail: |
  Desenvolvida por Daniel Kahneman e Amos Tversky, a aversão à perda descreve como perdas e ganhos
  são percebidos de forma assimétrica. O impacto psicológico de perder US$ 100 é tipicamente muito
  maior do que a satisfação de ganhar US$ 100. Esse viés influencia decisões em
  finanças, negociações e escolhas cotidianas, muitas vezes levando a comportamentos avessos ao risco
  quando perdas potenciais são proeminentes.

why_this_is_important: |
  Compreender a aversão à perda ajuda você a reconhecer quando o medo da perda está impulsionando as decisões
  mais do que a análise racional. Explica por que as pessoas se apegam a investimentos perdedores, evitam
  mudanças necessárias e tomam decisões subótimas em negociações e decisões de carreira.

when_to_use:
  - tomada_de_decisao
  - investimento
  - mudancas_de_carreira
  - avaliacao_de_risco

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    Observe quando a perspectiva de perder algo desencadeia ansiedade
    ou resistência desproporcional em comparação com o benefício de um ganho potencial.
  reluctance_to_change: |
    Hesitação em mudar estratégias, deixar um emprego ou vender um ativo, mesmo quando
    a análise objetiva sugere que é a melhor opção.
  framing_sensitivity: |
    As decisões mudam drasticamente com base em se as opções são apresentadas como ganhos
    ou perdas, mesmo quando os resultados são equivalentes.
  overvaluing_what_you_have: |
    O efeito de dotação—valorizar mais as coisas que você possui simplesmente porque
    você as possui—muitas vezes acompanha a aversão à perda.

examples:
  investing: |
    Manter uma ação em declínio para "evitar realizar a perda", enquanto perde
    melhores oportunidades de investimento em outros lugares.
  career: |
    Permanecer em um emprego insatisfatório porque sair parece uma perda de segurança,
    mesmo quando a nova oportunidade oferece maior crescimento.
  negotiations: |
    Rejeitar uma oferta justa porque ela é apresentada como "abrir mão" de algo,
    em vez de "ganhar" um acordo.
  product_design: |
    Testes gratuitos que se convertem em pagos—os usuários sentem a "perda" do serviço
    quando o teste termina, o que motiva a assinatura mais do que "ganhar"
    um novo serviço.

real_world_implications: |
  A aversão à perda molda mercados, políticas e o comportamento individual. Explica
  por que seguros e garantias vendem bem, por que as pessoas evitam mudanças benéficas
  e por que notícias negativas têm um impacto desproporcional. Reconhecê-la pode melhorar
  a qualidade das decisões e reduzir escolhas impulsionadas por arrependimento.

professional_application:
  networking_and_relationship_building: |
    Esteja ciente de que as pessoas podem resistir a encerrar relacionamentos improdutivos ou
    colaborações devido à aversão à perda—elas temem "perder" a conexão.
    Apresente novas oportunidades como ganhos em vez de perdas para reduzir a resistência.
  collaborative_learning_initiative: |
    Ao introduzir novos processos ou ferramentas, enfatize o que a equipe ganha
    em vez do que ela está "abrindo mão". Iniciativas de mudança com enquadramento de perdas
    muitas vezes desencadeiam uma resistência mais forte.

how_can_this_be_misapplied:
  manipulation: |
    Explorar a aversão à perda para pressionar decisões—por exemplo, ofertas de "tempo limitado"
    ou o enquadramento de "não perca" que desencadeia o medo da perda em vez de
    uma avaliação genuína de valor.
  misinterpreting_relationships: |
    Assumir que a resistência de alguém à mudança é puramente racional quando pode
    ser impulsionada pela aversão à perda. Atribuir motivos errôneos pode prejudicar a confiança.
  overcommitment: |
    Falácia dos custos irrecuperáveis—continuar investindo em um projeto falho porque
    "já colocamos tanto nisso" em vez de cortar as perdas.
  missed_opportunities_for_conflict_resolution: |
    Recusar-se a ceder porque qualquer concessão parece uma perda,
    mesmo quando a alternativa é um resultado pior para todos.
  vulnerability_to_exploitation: |
    Ser manipulado por outros que enquadram escolhas para desencadear a aversão à perda,
    como táticas de vendas que enfatizam o que você "perderá" se não agir.
  reinforcing_negative_perceptions: |
    Focar excessivamente em desvantagens potenciais pode criar uma perspectiva pessimista
    que se torna autossustentável, perdendo oportunidades de crescimento.

