id: efeito_dotacao
name: Efeito de Doutação

quick_introduction: |
  O efeito de doutação é a tendência de valorizar algo mais simplesmente
  porque o possuímos. Exigimos mais para desistir de um objeto do que pagaríamos
  para adquiri-lo. A posse cria um apego que distorce nossa avaliação.

one_liner: Valorizamos mais o que possuímos do que o que não possuímos — a posse cria apego.

try_this:
  - Pergunte: Quanto eu pagaria para adquirir isto se eu não o possuísse?
  - Ao vender, imagine que você está comprando — pagaria o preço que está pedindo?
  - Observe quando a posse está inflando sua avaliação.

ask_yourself:
  - Estou superestimando isto porque o possuo?
  - Um comprador neutro concordaria com meu preço?

in_more_detail: |
  Em experimentos, pessoas que receberam uma caneca aleatoriamente exigiram aproximadamente o dobro para vendê-la do que outros estavam dispostos a pagar para comprá-la. O simples fato da posse aumenta o valor percebido. Isso está relacionado à aversão à perda — desistir de algo parece uma perda, e somos avessos à perda. Mas o efeito vai além disso: incorporamos coisas possuídas em nossa identidade.

  O efeito de doutação afeta negociações, comportamento do consumidor e
  mudanças organizacionais. Explica por que as pessoas supervalorizam suas casas,
  suas ideias e seus cargos atuais. Cria atrito em trocas
  e transições.

why_this_is_important: |
  Reconhecer o efeito de doutação ajuda você a negociar de forma mais eficaz,
  tomar decisões mais claras sobre o que manter ou deixar ir, e entender
  por que os outros supervalorizam o que têm. Também explica a resistência à
  mudança.

when_to_use:
  - tomada_de_decisao
  - negociacao
  - investimento
  - mudancas_de_carreira

how_can_you_spot_it:
  ownership_premium: |
    "Eu não venderia por isso" quando você não pagaria isso para comprar.
  attachment_to_possession: |
    Valorizar as coisas mais uma vez que as temos.
  resistance_to_trading: |
    Relutância em negociar ou trocar mesmo quando seria racional.
  overvaluation_of_own_ideas: |
    Nossas ideias, projetos ou cargos parecem mais valiosos porque são nossos.

examples:
  real_estate: |
    Os proprietários de imóveis muitas vezes supervalorizam suas casas — eles as valorizam mais do que
    o mercado.
  negotiations: |
    Vendedores exigem mais do que os compradores pagarão; a lacuna reflete o
    efeito de doutação.
  career: |
    Supervalorizar nosso emprego, empresa ou cargo atual ao considerar
    uma mudança.
  ideas: |
    O viés "não inventado aqui" e "minha ideia" — supervalorizamos o que criamos ou possuímos.

real_world_implications: |
  O efeito de doutação cria atrito no mercado, retarda trocas benéficas
  e alimenta a resistência à mudança. Afeta fusões,
  reorganizações e transições pessoais. Compreendê-lo
  melhora a negociação e o gerenciamento de mudanças.

professional_application:
  networking_and_relationship_building: |
    Quando alguém resiste à mudança, considere que pode estar experimentando
    o efeito de doutação — valorizam o status quo mais porque o "possuem".
    Enquadre a mudança em termos do que eles ganham, não apenas do que desistem.
  collaborative_learning_initiative: |
    Ao introduzir novos processos, reconheça que as pessoas estão apegadas
    às maneiras atuais. Crie segurança psicológica para "soltar" o
    antigo antes de abraçar o novo.

how_can_this_be_misapplied:
  dismissing_legitimate_attachment: |
    Algum apego é racional — valor sentimental, custos de troca.
    Nem toda resistência é efeito de doutação.
  manipulation: |
    Criar uma falsa sensação de posse para extrair preços mais altos (por exemplo,
    "experimente grátis" para acionar a doutação).
  undervaluing_continuity: |
    Assumir que toda resistência à mudança é irracional quando a continuidade
    tem valor real.
  cold_rationality: |
    Descartar o apego emocional como "apenas efeito de doutação" quando
    reflete valores genuínos.

