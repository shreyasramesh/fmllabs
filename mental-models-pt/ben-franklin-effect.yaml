# O Efeito Ben Franklin
# Modelo Mental / Viés Cognitivo - Entrada de Exemplo

id: ben_franklin_effect
name: O Efeito Ben Franklin

quick_introduction: |
  O efeito Ben Franklin é o fenômeno psicológico pelo qual as pessoas gostam mais de alguém
  depois de fazer um favor para elas. Contrário à intuição de que fazemos favores para pessoas
  de quem gostamos, frequentemente passamos a gostar de pessoas para as quais fizemos favores.

one_liner: Passamos a gostar de pessoas para as quais fizemos favores — nossas atitudes seguem nossas ações.

try_this:
  - Se você quiser melhorar um relacionamento, considere pedir um pequeno favor.
  - Observe quando fazer um favor muda seus sentimentos em relação a alguém.
  - Esteja ciente de que os outros podem gostar mais de você depois de serem ajudados por você.

ask_yourself:
  - Fazer um favor para alguém mudou como me sinto em relação a essa pessoa?
  - Estou racionalizando meu esforço aumentando minha consideração por ela?

in_more_detail: |
  Benjamin Franklin descreveu famosamente como conquistou um legislador rival ao pedir emprestado
  um livro raro de sua biblioteca. Depois que o homem concordou, Franklin o devolveu com uma nota de agradecimento.
  O relacionamento melhorou notavelmente. O efeito sugere que nossas atitudes seguem nossas ações: quando investimos
  esforço em ajudar alguém, racionalizamos esse esforço aumentando nossa estima positiva por essa pessoa.

  A teoria da dissonância cognitiva explica isso: quando fazemos um favor para alguém de quem não gostamos ou
  sentimos neutralidade, experimentamos tensão entre nossa ação (ajudar) e nossa atitude (antipatia). Resolver essa
  tensão gostando mais dela é frequentemente mais fácil do que admitir que agimos contra nossas preferências.

why_this_is_important: |
  Entender o efeito Ben Franklin ajuda você a construir relacionamentos estrategicamente e a reconhecer quando
  seus próprios sentimentos podem ser influenciados por favores passados. Também explica por que pedir pequenos favores
  pode ser mais eficaz do que oferecê-los ao tentar melhorar um relacionamento.

when_to_use:
  - construção_de_relacionamentos
  - negociação
  - liderança
  - resolução_de_conflitos

how_can_you_spot_it:
  liking_after_helping: |
    Observe quando você se sente mais caloroso em relação a alguém depois de ter feito um favor, mesmo que
    anteriormente se sentisse neutro ou negativo.
  others_requesting_small_favors: |
    Quando alguém pede repetidamente pequenos favores, pode estar consciente ou inconscientemente
    utilizando esse efeito para construir rapport.
  attitude_shift_post_investment: |
    Após investir tempo ou esforço em ajudar alguém, observe se sua opinião sobre essa pessoa
    mudou positivamente.
  reciprocal_relationship_dynamics: |
    Relacionamentos em que uma pessoa fez muitos favores podem parecer desequilibrados em afeto,
    apesar de parecerem equilibrados em ação.

examples:
  networking: |
    Pedir a um colega feedback sobre um rascunho, o que o leva a se sentir mais investido
    em seu sucesso e mais positivamente inclinado a você.
  sales: |
    Um vendedor pede um pequeno favor a um prospect (por exemplo, uma indicação ou introdução),
    o que aumenta o compromisso e a simpatia do prospect.
  conflict_resolution: |
    Após um desentendimento, pedir à outra parte ajuda com algo não relacionado pode
    amenizar as tensões e reconstruir a boa vontade.
  mentoring: |
    Quando uma pessoa sênior pede a uma pessoa júnior sua opinião ou ajuda, a pessoa júnior geralmente
    se sente mais valorizada e conectada.

real_world_implications: |
  O efeito Ben Franklin influencia contratações, vendas, diplomacia e dinâmicas sociais cotidianas.
  Pode ser usado eticamente para construir pontes ou anti-eticamente para manipular o afeto. Reconhecê-lo
  ajuda a entender por que alguns relacionamentos parecem mais fortes após uma concessão de favores assimétrica.

professional_application:
  networking_and_relationship_building: |
    Ao construir relacionamentos, considere pedir pequenos favores razoáveis em vez de
    apenas oferecê-los. O ato de ajudar cria investimento e estima positiva.
  collaborative_learning_initiative: |
    Em equipes, fazer com que os membros se ajudem (por exemplo, revisão por pares, treinamento cruzado) pode
    fortalecer a coesão. Estruture a colaboração para que todos deem e recebam ajuda.

how_can_this_be_misapplied:
  manipulation: |
    Pedir favores deliberadamente apenas para fazer alguém gostar de você, sem necessidade genuína,
    pode parecer explorador se descoberto.
  overreliance_on_favors: |
    Assumir que os favores sozinhos resolverão um relacionamento quebrado; alguns conflitos exigem
    conversa direta e responsabilização.
  asymmetric_exploitation: |
    Pedir favores repetidamente sem retribuir pode ter um efeito contrário e gerar ressentimento.
  misattributing_motives: |
    Assumir que o calor de alguém é puramente genuíno quando pode ser em parte um resultado de favores
    que essa pessoa fez por você.

related_content:
