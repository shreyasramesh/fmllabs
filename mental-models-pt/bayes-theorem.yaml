id: bayes_theorem
name: Teorema de Bayes

quick_introduction: |
  O teorema de Bayes descreve como atualizar a probabilidade de uma hipótese
  quando você recebe novas evidências. Ele formaliza a ideia de que as crenças devem mudar
  proporcionalmente ao quanto a evidência as apoia — não de forma tudo ou nada,
  mas incrementalmente.

one_liner: Atualize crenças proporcionalmente ao quanto a evidência as apoia.

try_this:
  - Comece com sua crença prévia; pergunte qual a probabilidade da evidência se você estivesse errado.
  - Atualize incrementalmente — não mude de 0% para 100% com base em um único ponto de dados.
  - Considere hipóteses alternativas: a evidência se encaixaria nelas também?

ask_yourself:
  - O quanto esta evidência realmente muda a probabilidade?
  - Estou atualizando minhas crenças ou apenas confirmando o que eu já pensava?

in_more_detail: |
  O teorema afirma que a probabilidade de uma hipótese dada uma evidência é igual à
  probabilidade prévia multiplicada pela verossimilhança da evidência dada a
  hipótese, dividida pela probabilidade da evidência. Na prática: comece
  com sua crença prévia, veja o quão consistente a nova evidência é com sua
  hipótese versus alternativas, e atualize de acordo.

  O pensamento bayesiano combate o viés de confirmação ao exigir que você considere
  o quão provável seria a evidência se você estivesse errado. É a base do
  raciocínio probabilístico e da atualização científica.

why_this_is_important: |
  O pensamento bayesiano melhora a tomada de decisões sob incerteza, ajuda você
  a evitar excesso de confiança e fornece uma estrutura para aprender com a evidência.
  É essencial para diagnóstico, previsão e qualquer domínio com incerteza.

when_to_use:
  - tomada_de_decisao
  - resolucao_de_problemas
  - avaliacao_de_risco
  - aprendizado

how_can_you_spot_it:
  prior_and_update: |
    Começar com uma crença inicial e ajustá-la com base em novas evidências.
  likelihood_ratio_thinking: |
    Perguntar "Qual a probabilidade desta evidência se eu estiver certo versus errado?"
  incremental_updating: |
    Crenças mudam gradualmente com a evidência em vez de mudar abruptamente.
  base_rate_respect: |
    Probabilidades prévias (taxas base) importam, não apenas o último ponto de dados.

examples:
  medical_diagnosis: |
    Um teste positivo para uma doença rara — a probabilidade prévia (baixa prevalência) significa que um
    resultado positivo é frequentemente um falso positivo. Bayes atualiza a probabilidade.
  forecasting: |
    Atualizar previsões à medida que novos dados chegam em vez de se apegar às
    estimativas iniciais.
  hiring: |
    Começar com taxas base de adequação para a função, e então atualizar com base no desempenho da entrevista.
  investing: |
    Atualizar a probabilidade de uma empresa ter sucesso à medida que novas informações
    (lucros, notícias) chegam.

real_world_implications: |
  O pensamento bayesiano sustenta a IA moderna, o diagnóstico médico e a inferência científica.
  Ele corrige a negligência da taxa base e o viés de confirmação.
  É uma ferramenta poderosa para qualquer domínio com incerteza.

professional_application:
  networking_and_relationship_building: |
    Atualize suas crenças sobre as pessoas com base em novas evidências em vez de
    manter primeiras impressões fixas. Considere as taxas base (por exemplo, quão comum
    é este comportamento?) ao interpretar ações.
  collaborative_learning_initiative: |
    Incentive equipes a declararem suas crenças prévias explicitamente antes das discussões, e então
    atualizarem à medida que as evidências são apresentadas. Reduz o ancoramento e o viés de confirmação.

how_can_this_be_misapplied:
  overprecision: |
    Atribuir probabilidades exatas quando a incerteza é alta.
  prior_rigidity: |
    Apegar-se a crenças prévias fortes e não atualizar o suficiente com novas evidências.
  base_rate_tyranny: |
    Ignorar evidências fortes porque as taxas base sugerem o contrário — às vezes
    a evidência deve dominar.
  false_sophistication: |
    Usar linguagem bayesiana para parecer rigoroso sem fazer o raciocínio real.

