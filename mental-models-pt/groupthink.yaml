id: groupthink
name: Pensamento de Grupo

quick_introduction: |
  O pensamento de grupo é a tendência de grupos coesos priorizarem o consenso e a harmonia em detrimento da avaliação crítica. Os membros suprimem dissidências, autocensuram-se e conformam-se à visão percebida do grupo. O desejo por unanimidade prevalece sobre o desejo pela melhor decisão.

one_liner: Harmonia acima da verdade — grupos priorizam o consenso sobre a avaliação crítica.

try_this:
  - Designe um advogado do diabo; faça da dissidência algo esperado e seguro.
  - Pergunte: O que não estamos dizendo? O que diríamos se não estivéssemos neste grupo?
  - Busque perspectivas externas antes de finalizar as decisões do grupo.

ask_yourself:
  - Estou me autocensurando para manter a harmonia?
  - Nosso consenso é genuíno ou o resultado da pressão para concordar?

in_more_detail: |
  Irving Janis estudou fracassos na política externa (Baía dos Porcos, Vietnã) e identificou padrões: ilusão de invulnerabilidade, racionalização coletiva, pressão pela conformidade, autocensura, ilusão de unanimidade e "guardiões" que protegem o grupo de informações dissonantes. Alta coesão, isolamento e estresse aumentam o pensamento de grupo.

  O pensamento de grupo leva a decisões ruins porque as alternativas não são seriamente consideradas. A dissidência é vista como deslealdade. O grupo superestima sua correção e subestima os riscos.

why_this_is_important: |
  Reconhecer o pensamento de grupo ajuda você a criar condições para uma melhor tomada de decisão: incentive a dissidência, traga perspectivas externas e evite o consenso prematuro. É essencial para evitar falhas catastróficas em grupo.

when_to_use:
  - liderança
  - tomada_de_decisao
  - resolucao_de_problemas
  - resolucao_de_conflitos

how_can_you_spot_it:
  pressure_for_consensus: |
    A dissidência é desencorajada ou punida; o acordo é recompensado.
  illusion_of_unanimity: |
    O silêncio é interpretado como concordância quando pode ser autocensura.
  collective_rationalization: |
    O grupo descarta avisos e reforça sua visão.
  mindguards: |
    Membros protegem o grupo de informações que desafiariam o consenso.

examples:
  bay_of_pigs: |
    Os conselheiros de Kennedy suprimiram dúvidas sobre o plano de invasão; o resultado foi um desastre.
  corporate_decisions: |
    Uma equipe de liderança avança com uma fusão apesar dos sinais de alerta porque ninguém quer ser o pessimista.
  product_launches: |
    Uma equipe lança um produto com defeito porque todos investiram no plano e ninguém levanta preocupações.
  boards: |
    Membros do conselho aprovam propostas da administração para manter a harmonia.

real_world_implications: |
  O pensamento de grupo contribui para falhas de políticas, desastres corporativos e oportunidades perdidas. É especialmente perigoso em situações de alto risco e alto estresse. Preveni-lo requer intervenções estruturais deliberadas.

professional_application:
  networking_and_relationship_building: |
    Crie segurança psicológica para a dissidência. Agradeça às pessoas que levantam preocupações. Modele a discordância sem ser desagradável.
  collaborative_learning_initiative: |
    Use o advogado do diabo, equipes vermelhas e "pre-mortens". Exija que alguém argumente contra a visão predominante. Traga perspectivas externas. O líder fala por último para evitar ancoragem.

how_can_this_be_misapplied:
  false_dissent: |
    Criar "dissidentes designados" que não discordam genuinamente — o grupo percebe isso.
  excessive_conflict: |
    Incentivar a dissidência a ponto de conflito destrutivo e paralisia.
  dismissing_consensus: |
    Assumir que todo consenso é pensamento de grupo — às vezes o grupo está certo.
  individualism: |
    Corrigir em excesso a ponto de nenhuma decisão coletiva ser possível.

