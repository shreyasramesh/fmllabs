# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Russian)

mental_models:
  - id: ambiguity_effect
    name: Эффект неопределенности
    path: mental-models-ru/ambiguity-effect.yaml
    description: |
      Эффект неопределенности — это тенденция избегать вариантов, когда у нас недостаточно информации о вероятностях исходов. Мы предпочитаем известные риски неизвестным, даже если неизвестные риски могут быть лучше. Сама неопределенность ощущается как неприятная.

  - id: anchoring_bias
    name: Эффект якоря
    path: mental-models-ru/anchoring-bias.yaml
    description: |
      Эффект якоря — это тенденция чрезмерно полагаться на первую полученную информацию
      при принятии решений. Этот начальный «якорь» искажает последующие суждения,
      даже когда он не имеет отношения к делу или является произвольным.

  - id: availability_cascade
    name: Каскад доступности
    path: mental-models-ru/availability-cascade.yaml
    description: |
      Каскад доступности — это самоподдерживающийся процесс, в котором
      идея приобретает правдоподобие благодаря многократному
      публичному обсуждению. Чем больше она обсуждается, тем более
      "доступной" она становится, тем больше людей в нее верят, и тем
      больше она обсуждается. Коллективное убеждение набирает
      обороты независимо от его истинности.

  - id: availability_heuristic
    name: Эвристика доступности
    path: mental-models-ru/availability-heuristic.yaml
    description: |
      Эвристика доступности — это тенденция оценивать вероятность событий
      по тому, насколько легко приходят на ум примеры. Если мы можем легко вспомнить случаи, мы
      предполагаем, что событие является распространенным. Яркие, недавние или эмоциональные примеры доминируют
      в нашей оценке вероятности.

  - id: baader_meinhof_phenomenon
    name: Феномен Баадера-Майнхоф
    path: mental-models-ru/baader-meinhof-phenomenon.yaml
    description: |
      Феномен Баадера-Майнхоф (также известный как иллюзия частотности) возникает, когда вы узнаете
      что-то новое, а затем внезапно замечаете это повсюду. Это кажется совпадением,
      но часто это избирательное внимание — ваш мозг настроен на то, чтобы замечать то, с чем он недавно столкнулся.

  - id: barnum_effect
    name: Эффект Барнума
    path: mental-models-ru/barnum-effect.yaml
    description: |
      Эффект Барнума (или эффект Форрера) — это тенденция принимать расплывчатые, общие описания личности как уникально точные. Гороскопы, гадалки и тесты на определение личности используют утверждения, которые применимы почти к каждому — но мы считаем, что они касаются именно нас. Мы видим себя в общем.

  - id: base_rate_fallacy
    name: Ошибка базовой ставки
    path: mental-models-ru/base-rate-fallacy.yaml
    description: |
      Ошибка базовой ставки — это тенденция игнорировать общую статистическую информацию
      (базовые ставки) в пользу конкретной, яркой информации. Мы переоцениваем
      конкретный случай и недооцениваем априорную вероятность. Одна убедительная
      история может перевесить то, что говорят цифры.

  - id: bayes_theorem
    name: Теорема Байеса
    path: mental-models-ru/bayes-theorem.yaml
    description: |
      Теорема Байеса описывает, как обновлять вероятность гипотезы при получении
      новых доказательств. Она формализует идею о том, что убеждения должны
      меняться пропорционально тому, насколько хорошо доказательства их
      подтверждают — не категорично, а постепенно.

  - id: ben_franklin_effect
    name: Эффект Бенджамина Франклина
    path: mental-models-ru/ben-franklin-effect.yaml
    description: |
      Эффект Бенджамина Франклина — это психологический феномен, согласно которому люди начинают больше симпатизировать тому, кому они оказали услугу. Вопреки интуитивному представлению о том, что мы делаем одолжения тем, кто нам нравится, мы часто начинаем симпатизировать тем, кому мы оказали услугу.

  - id: bounded_rationality
    name: Ограниченная рациональность
    path: mental-models-ru/bounded-rationality.yaml
    description: |
      Ограниченная рациональность — это идея о том, что принятие решений человеком ограничено доступной информацией, когнитивными способностями и временем. Мы не оптимизируем; мы "довольствуемся" — выбираем варианты, которые достаточно хороши, а не наилучшие из возможных.

  - id: bystander_effect
    name: Эффект свидетеля
    path: mental-models-ru/bystander-effect.yaml
    description: |
      Эффект свидетеля — это тенденция, при которой люди с меньшей вероятностью
      предлагают помощь, когда рядом присутствуют другие люди. Чем больше свидетелей,
      тем меньше вероятность того, что кто-то один предпримет действия. Ответственность
      распределяется; мы предполагаем, что кто-то другой поможет.

  - id: circle_of_competence
    name: Круг компетенций
    path: mental-models-ru/circle-of-competence.yaml
    description: |
      Круг компетенций — это ментальная модель, которая побуждает вас знать границы
      своей экспертизы и придерживаться их при принятии важных решений. Уоррен Баффет
      и Чарли Мангер подчеркивают важность знания того, чего вы не знаете.

  - id: cognitive_dissonance
    name: Когнитивный диссонанс
    path: mental-models-ru/cognitive-dissonance.yaml
    description: |
      Когнитивный диссонанс — это психологический дискомфорт, который мы испытываем, когда у нас есть противоречащие друг другу убеждения или когда наши действия противоречат нашим убеждениям. Мы мотивированы уменьшить этот дискомфорт, часто меняя наши убеждения, чтобы они соответствовали нашим действиям, а не меняя сами действия.

  - id: confirmation_bias
    name: Предвзятость подтверждения
    path: mental-models-ru/confirmation-bias.yaml
    description: |
      Предвзятость подтверждения – это склонность искать, интерпретировать и запоминать информацию
      таким образом, чтобы подтверждать наши существующие убеждения. Мы придаем больший вес подтверждающим
      данным и игнорируем или отвергаем доказательства, противоречащие нашим взглядам. Мы
      задаем вопросы, подтверждающие, а не проверяющие наши гипотезы.

  - id: curse_of_knowledge
    name: Проклятие знания
    path: mental-models-ru/curse-of-knowledge.yaml
    description: |
      Проклятие знания — это трудность в воображении того, каково это — не знать
      чего-то, когда ты уже это знаешь. Экспертам трудно обучать новичков, потому что
      они не могут воссоздать перспективу новичка. Как только вы что-то узнали, вы забываете,
      каково это было — не знать.

  - id: default_effect
    name: Эффект по умолчанию
    path: mental-models-ru/default-effect.yaml
    description: |
      Эффект по умолчанию — это тенденция выбирать предварительно выбранный вариант при
      представлении нескольких вариантов. То, что установлено по умолчанию, имеет сильное преимущество —
      люди часто придерживаются этого, независимо от того, оптимально ли это для них.

  - id: dunning_kruger_effect
    name: Эффект Даннинга-Крюгера
    path: mental-models-ru/dunning-kruger-effect.yaml
    description: |
      Эффект Даннинга-Крюгера описывает когнитивное искажение, при котором люди с ограниченными
      знаниями или навыками в определенной области переоценивают свою компетентность, в то время как эксперты
      склонны недооценивать свою. Чем меньше вы знаете, тем более уверенным вы можете быть.

  - id: empathy_gap
    name: Разрыв эмпатии
    path: mental-models-ru/empathy-gap.yaml
    description: |
      Разрыв эмпатии — это трудность понимания и прогнозирования психических
      состояний других людей, когда мы сами находимся в ином состоянии. Когда мы
      спокойны, мы недооцениваем, как будем себя чувствовать в гневе или голоде. Когда мы
      сыты, мы недооцениваем, как сильно будем хотеть есть, когда будем голодны.

  - id: endowment_effect
    name: Эффект владения
    path: mental-models-ru/endowment-effect.yaml
    description: |
      Эффект владения — это тенденция оценивать что-либо выше просто
      потому, что мы этим владеем. Мы требуем больше, чтобы расстаться с предметом, чем готовы заплатить,
      чтобы его приобрести. Владение создает привязанность, которая искажает нашу оценку.

  - id: false_consensus_effect
    name: Эффект ложного единодушия
    path: mental-models-ru/false-consensus-effect.yaml
    description: |
      Эффект ложного единодушия — это тенденция переоценивать, насколько другие люди согласны
      с нашими убеждениями, установками и поведением. Мы предполагаем, что наши взгляды более распространены, чем на самом деле, и нам трудно представить, что разумные люди могут не соглашаться.

  - id: framing_effect
    name: Эффект фрейминга
    path: mental-models-ru/framing-effect.yaml
    description: |
      Эффект фрейминга — это склонность наших решений меняться в зависимости от того,
      как представлены варианты, — даже когда основополагающие факты идентичны. «90%
      выживаемости» и «10% смертности» описывают один и тот же исход, но вызывают разные
      выборы. Фрейм формирует решение.

  - id: fundamental_attribution_error
    name: Фундаментальная ошибка атрибуции
    path: mental-models-ru/fundamental-attribution-error.yaml
    description: |
      Фундаментальная ошибка атрибуции — это склонность объяснять поведение других
      людей их характером или личностью, в то время как свое собственное поведение
      мы объясняем ситуационными факторами. Мы оцениваем других по их поступкам, а себя — по нашим намерениям.

  - id: gamblers_fallacy
    name: Ошибка игрока
    path: mental-models-ru/gamblers-fallacy.yaml
    description: |
      Ошибка игрока — это ошибочное убеждение, что прошлые независимые события
      влияют на будущие. После серии «орлов» мы думаем, что «орел» «назревает» — даже
      несмотря на то, что каждый бросок независим. Мы видим закономерности в случайности и
      ожидаем «коррекции» или «возврата», когда это не требуется.

  - id: groupthink
    name: Групповое мышление
    path: mental-models-ru/groupthink.yaml
    description: |
      Групповое мышление — это тенденция сплоченных групп отдавать
      приоритет консенсусу и гармонии перед критической оценкой. Члены
      подавляют несогласие, занимаются самоцензурой и подстраиваются под
      воспринимаемое групповое мнение. Желание единодушия преобладает
      над желанием принять лучшее решение.

  - id: halo_effect
    name: Эффект ореола
    path: mental-models-ru/halo-effect.yaml
    description: |
      Эффект ореола – это тенденция позволять одной положительной черте или впечатлению
      влиять на наше общее суждение о человеке. Если нам нравится внешность человека,
      мы можем предположить, что он компетентен. Если мы восхищаемся одним навыком,
      мы предполагаем, что он хорош во всем. Один положительный атрибут бросает
      "ореол" на все остальное.

  - id: hanlons_razor
    name: Бритва Хэнлона
    path: mental-models-ru/hanlons-razor.yaml
    description: |
      Бритва Хэнлона гласит: "Никогда не приписывайте злобе то, что может быть адекватно объяснено глупостью". Иными словами, не предполагайте злой умысел, когда поведение можно объяснить некомпетентностью, недосмотром или невежеством.

  - id: hawthorne_effect
    name: Эффект Хоторна
    path: mental-models-ru/hawthorne-effect.yaml
    description: |
      Эффект Хоторна — это тенденция людей изменять свое поведение,
      когда они знают, что за ними наблюдают или изучают. Сам акт наблюдения
      может вызвать изменения, а не обязательно тестируемое вмешательство.
      Люди реагируют на уделяемое им внимание.

  - id: hindsight_bias
    name: Предвзятость последующего знания
    path: mental-models-ru/hindsight-bias.yaml
    description: |
      Предвзятость последующего знания (или эффект "Я это знал") — это тенденция
      считать, что после наступления события мы могли его предсказать или ожидали.
      Мы реконструируем прошлое, чтобы результаты казались более неизбежными,
      чем они были на самом деле.

  - id: hyperbolic_discounting
    name: Гиперболическое дисконтирование
    path: mental-models-ru/hyperbolic-discounting.yaml
    description: |
      Гиперболическое дисконтирование — это склонность предпочитать меньшее, но более раннее вознаграждение большему, но более позднему, и дисконтировать будущее круче, чем предсказывают рациональные модели. Мы переоцениваем настоящее и недооцениваем будущее непоследовательными способами.

  - id: illusion_of_control
    name: Иллюзия контроля
    path: mental-models-ru/illusion-of-control.yaml
    description: |
      Иллюзия контроля — это тенденция переоценивать свою способность
      влиять на результаты. Мы верим, что имеем больше контроля, чем на самом деле, над
      случайными событиями, другими людьми и сложными системами. Мы путаем корреляцию
      с причинно-следственной связью, а действие — с результатом.

  - id: impact_bias
    name: Предвзятость воздействия
    path: mental-models-ru/impact-bias.yaml
    description: |
      Предвзятость воздействия — это тенденция переоценивать интенсивность и продолжительность
      наших эмоциональных реакций на будущие события. Мы думаем, что хорошие события сделают
      нас счастливее, чем они есть на самом деле, а плохие события сделают нас более несчастными,
      чем они есть на самом деле. Мы плохо прогнозируем чувства.

  - id: in_group_bias
    name: Предвзятость к своей группе
    path: mental-models-ru/in-group-bias.yaml
    description: |
      Предвзятость к своей группе — это тенденция отдавать предпочтение людям, которых мы воспринимаем как принадлежащих к нашей группе, перед теми, кого мы воспринимаем как чужаков. Мы приписываем положительные качества членам своей группы и отрицательные качества членам чужих групп, часто на основе минимальных или произвольных различий.

  - id: inversion
    name: Инверсия
    path: mental-models-ru/inversion.yaml
    description: |
      Инверсия — это техника решения проблем, которая переворачивает вопрос с ног на голову. Вместо
      того, чтобы спрашивать "Как мне добиться успеха?", вы спрашиваете "Что может привести меня к провалу?" и избегаете этих вещей.
      Это выявляет риски и антипаттерны, которые часто упускает прямое мышление.

  - id: law_of_diminishing_returns
    name: Закон убывающей отдачи
    path: mental-models-ru/law-of-diminishing-returns.yaml
    description: |
      Закон убывающей отдачи гласит, что по мере добавления одного ресурса при
      постоянстве других, дополнительная отдача от каждой новой единицы ресурса
      в конечном итоге уменьшается. Больше — не всегда лучше: есть точка, после
      которой дополнительные усилия приносят все меньше и меньше.

  - id: loss_aversion_bias
    name: Неприятие потерь
    path: mental-models-ru/loss-aversion-bias.yaml
    description: |
      Неприятие потерь — это тенденция избегать потерь сильнее, чем приобретать эквивалентные выгоды.
      Люди испытывают боль от потери примерно в два раза сильнее, чем удовольствие от приобретения.

  - id: map_is_not_the_territory
    name: Карта — это не территория
    path: mental-models-ru/map-is-not-the-territory.yaml
    description: |
      "Карта — это не территория" означает, что представление реальности не является самой реальностью.
      Модели, теории и описания являются полезными упрощениями, но они
      всегда что-то упускают. Смешивание карты с территорией приводит к ошибкам.

  - id: mere_exposure_effect
    name: Эффект простого знакомства
    path: mental-models-ru/mere-exposure-effect.yaml
    description: |
      Эффект простого знакомства — это тенденция развивать предпочтение к чему-либо
      просто потому, что мы с этим знакомы. Повторное воздействие — даже без
      подкрепления — увеличивает симпатию. Мы склонны предпочитать то, что знаем.

  - id: narrative_fallacy
    name: Нарративный фаллейси (Ошибка повествования)
    path: mental-models-ru/narrative-fallacy.yaml
    description: |
      Ошибка повествования — это тенденция строить истории из прошлых событий,
      которые делают их более связными, предсказуемыми и значимыми, чем они были на самом деле.
      Мы ретроспективно находим объяснения случайности. Мы превращаем хаос истории
      в стройную историю — а затем верим, что эта история была неизбежна.

  - id: negativity_bias
    name: Негативный уклон
    path: mental-models-ru/negativity-bias.yaml
    description: |
      Негативный уклон — это тенденция придавать больший вес негативной информации, чем
      позитивной. Плохие новости, критика и угрозы привлекают наше внимание и
      влияют на наши решения сильнее, чем эквивалентные позитивные стимулы.

  - id: occams_razor
    name: Бритва Оккама
    path: mental-models-ru/occams-razor.yaml
    description: |
      Бритва Оккама (также Оккамская бритва) — это принцип, согласно которому среди конкурирующих гипотез следует предпочесть ту, которая содержит наименьшее количество предположений. Более простые объяснения зачастую, хотя и не всегда, оказываются верными.

  - id: ostrich_effect
    name: Эффект страуса
    path: mental-models-ru/ostrich-effect.yaml
    description: |
      Эффект страуса — это склонность избегать негативной финансовой информации,
      "зарывая голову в песок", как страус. Люди избегают смотреть на свои
      портфели, когда рынки падают, откладывают открытие счетов и игнорируют
      тревожные сигналы, которые могли бы помочь им действовать.

  - id: pareto_principle
    name: Принцип Парето
    path: mental-models-ru/pareto-principle.yaml
    description: |
      Принцип Парето (или правило 80/20) гласит, что примерно 80% эффектов происходят
      от 20% причин. Незначительное меньшинство входных данных часто производит
      большинство выходных данных — в продажах, ошибках, клиентах, усилиях, функциях и
      многом другом. Сосредоточьтесь на жизненно важных немногих.

  - id: parkinsons_law
    name: Закон Паркинсона
    path: mental-models-ru/parkinsons-law.yaml
    description: |
      Закон Паркинсона гласит: «Работа заполняет все время, отпущенное на нее».
      Дайте задаче неделю, и она займет неделю; дайте ей день, и часто она будет выполнена за день.
      То же самое применимо к бюджетам, размеру команды и ресурсам.

  - id: probabilistic_thinking
    name: Вероятностное мышление
    path: mental-models-ru/probabilistic-thinking.yaml
    description: |
      Вероятностное мышление — это привычка рассуждать с точки зрения вероятностей,
      а не абсолютных утверждений. Вместо "случится ли это?" мы спрашиваем "насколько вероятно, что это случится?"
      Оно принимает неопределенность и использует ее для принятия лучших решений.

  - id: pygmalion_effect
    name: Эффект Пигмалиона
    path: mental-models-ru/pygmalion-effect.yaml
    description: |
      Эффект Пигмалиона (или эффект Розенталя) — это явление, при котором более высокие ожидания приводят к улучшению результатов. Когда учителя, руководители или другие люди ожидают большего от кого-то, этот человек, как правило, работает лучше. Ожидания становятся самоисполняющимися пророчествами.

  - id: regression_to_the_mean
    name: Регрессия к среднему
    path: mental-models-ru/regression-to-the-mean.yaml
    description: |
      Регрессия к среднему — это статистический феномен, при котором экстремальные результаты
      склонны сменяться результатами, более близкими к среднему. После необычайно хорошего или плохого
      результата, следующий результат, скорее всего, будет менее экстремальным — не из-за какого-либо причинного
      вмешательства, а из-за случайных колебаний.

  - id: rosy_retrospection
    name: Розовые ретроспективы
    path: mental-models-ru/rosy-retrospection.yaml
    description: |
      Розовые ретроспективы — это тенденция вспоминать прошлое как лучшее, чем оно было на самом деле.
      Со временем мы вспоминаем прошлый опыт более позитивно, сглаживая трудности
      и усиливая хорошее. "Хорошие старые времена" часто были не так хороши, как мы помним.

  - id: salience_bias
    name: Склонность к заметности
    path: mental-models-ru/salience-bias.yaml
    description: |
      Склонность к заметности — это тенденция фокусироваться на наиболее
      выдающихся или заметных аспектах ситуации, игнорируя менее очевидные,
      но потенциально важные факторы. То, что выделяется, получает
      непропорциональное внимание и вес в наших суждениях.

  - id: scarcity_bias
    name: Искажение дефицита
    path: mental-models-ru/scarcity-bias.yaml
    description: |
      Искажение дефицита — это тенденция придавать большую ценность вещам, когда они кажутся
      редкими или ограниченными. "Ограниченное время", "осталось всего 3" и "эксклюзивный доступ"
      вызывают срочность и желание, часто подавляя рациональную оценку того, действительно ли
      нам нужна или хочется эта вещь.

  - id: second_order_thinking
    name: Мышление второго порядка
    path: mental-models-ru/second-order-thinking.yaml
    description: |
      Мышление второго порядка — это практика рассмотрения последствий последствий ваших действий. Мышление первого порядка задает вопрос: «Что произойдет, если я сделаю X?» Мышление второго порядка задает вопросы: «А что потом?» и «А что потом после этого?» Оно выявляет непреднамеренные эффекты.

  - id: sunk_cost_fallacy
    name: Ошибка невозвратных затрат
    path: mental-models-ru/sunk-cost-fallacy.yaml
    description: |
      Ошибка невозвратных затрат — это тенденция продолжать инвестировать в решение из-за
      уже потраченных ресурсов, а не на основе будущих ожидаемых доходов.
      «Мы прошли так далеко» или «Я уже столько вложил» приводит к тому, что хорошие
      деньги идут за плохими.

  - id: survivorship_bias
    name: Ошибка выжившего
    path: mental-models-ru/survivorship-bias.yaml
    description: |
      Ошибка выжившего — это логическая ошибка, заключающаяся в сосредоточении на людях или вещах, которые "выжили" в процессе, игнорируя тех, кто не выжил. Мы видим победителей и забываем про проигравших, что приводит к излишне оптимистичным выводам об успехе и неудаче.

  - id: zeigarnik_effect
    name: Эффект Зейгарник
    path: mental-models-ru/zeigarnik-effect.yaml
    description: |
      Эффект Зейгарник — это тенденция лучше запоминать незавершенные или прерванные
      задачи, чем завершенные. Незавершенные задачи создают психологическое
      напряжение, которое удерживает их активными в нашем сознании. Наш мозг цепляется за то, что не закончено.

  - id: zero_sum_thinking
    name: Мышление по принципу «нулевой суммы»
    path: mental-models-ru/zero-sum-thinking.yaml
    description: |
      Мышление по принципу «нулевой суммы» — это убеждение в том, что выигрыш одного человека неизбежно означает проигрыш другого, то есть ресурсы фиксированы, и любое ваше преимущество означает мой недостаток.
      На самом деле, многие ситуации являются играми с положительной суммой: обе стороны могут выиграть.
