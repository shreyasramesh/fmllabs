id: pareto_principle
name: 帕累托法则

quick_introduction: |
  帕累托法则（或称80/20法则）指出，大约80%的效应来自于20%的原因。少数关键的投入常常产生大部分的产出——在销售、bug、客户、精力、功能等方面。关注那些至关重要的少数。

one_liner: 80%的效应来自于20%的原因——关注那些至关重要的少数。

try_this:
  - 找出产生80%结果的20%投入——加倍投入那里。
  - 削减或降低产出很少的80%的优先级。
  - 提问：如果我做好哪几件事，会最重要？

ask_yourself:
  - 我是在平均分配精力，而有些事更重要吗？
  - 我的高杠杆20%是什么？

in_more_detail: |
  维尔弗雷多·帕累托观察到，意大利80%的土地由20%的人口拥有。该法则已被推广：80%的销售额来自20%的客户，80%的bug来自20%的代码，80%的结果来自20%的努力。确切的比例各不相同，但这种模式——不均衡的分布——很常见。

  该法则表明，识别并专注于高杠杆的20%可以显著改善结果。它是一种优先级启发式方法，而非物理定律。

why_this_is_important: |
  应用帕累托法则有助于你无情地确定优先级，避免在低影响力活动上浪费精力，并用更少的资源取得更多成就。它对于生产力和战略至关重要。

when_to_use:
  - 决策制定
  - 问题解决
  - 领导力
  - 职业发展

how_can_you_spot_it:
  uneven_distribution: |
    X的一小部分占Y的大部分。
  high_leverage_activities: |
    少数行动产生大部分结果。
  low_value_tail: |
    许多活动贡献甚微；削减它们的影响很小。
  vital_few_vs_trivial_many: |
    关键在于识别哪少数最重要。

examples:
  sales: |
    20%的客户产生80%的收入——专注于留住和发展他们。
  software: |
    20%的功能驱动80%的使用——优先处理那些。
  productivity: |
    少数习惯或例程产生你大部分产出——加倍投入那些。
  problems: |
    20%的bug导致80%的崩溃——先修复那些。

real_world_implications: |
  帕累托法则指导资源分配、产品策略和个人生产力。忽略它会导致精力分散。过度应用它可能导致对“长尾”的忽视，而长尾有时也很重要。

professional_application:
  networking_and_relationship_building: |
    识别对你的目标最重要的关系。不成比例地投入到那些关系中，而不是平均分配精力。
  collaborative_learning_initiative: |
    在提高团队绩效时，找出驱动80%结果的20%干预措施。将培训和流程改进集中在那里。

how_can_this_be_misapplied:
  oversimplification: |
    假设80/20适用于所有地方；有些分布更均匀。
  neglecting_the_tail: |
    在“琐碎多数”集体重要时忽略它们（例如，许多小客户、边缘案例）。
  false_precision: |
    将80/20视为字面意思，而非粗略的启发式方法。
  misidentifying_the_vital_few: |
    由于分析错误而专注于错误的20%。

