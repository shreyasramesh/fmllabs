# yaml-language-server: $schema=../schema/mental-model-schema.json
# मौलिक आरोपण त्रुटि
# मानसिक मॉडल / संज्ञानात्मक पूर्वाग्रह - उदाहरण प्रविष्टि

id: fundamental_attribution_error
name: मौलिक आरोपण त्रुटि

quick_introduction: |
  मौलिक आरोपण त्रुटि दूसरों के व्यवहार को उनके चरित्र या व्यक्तित्व के लिए
  आरोपित करने की प्रवृत्ति है, जबकि अपने स्वयं के व्यवहार को परिस्थितिजन्य
  कारकों के लिए आरोपित करते हैं। हम दूसरों को उनके कार्यों से आंकते हैं और
  स्वयं को अपने इरादों से।

one_liner: हम दूसरों को उनके कार्यों से, स्वयं को अपने इरादों से आंकते हैं।

try_this:
  - जब कोई आपको निराश करे, तो पूछें: इस बात को कौन से परिस्थितिजन्य कारक समझा सकते हैं?
  - दूसरों के प्रति वही उदारता बरतें जो आप स्वयं के प्रति बरतते हैं।
  - तब ध्यान दें जब आप दूसरों के व्यवहार को परिस्थिति के बजाय चरित्र के लिए
    आरोपित कर रहे हों।

ask_yourself:
  - क्या मैं अपने स्वयं के व्यवहार की उसी तरह व्याख्या करूंगा जैसे मैं उनके व्यवहार की
    व्याख्या कर रहा हूँ?
  - उनकी परिस्थिति के बारे में मैं क्या चूक सकता हूँ?

in_more_detail: |
  जब कोई हमें ट्रैफिक में काटता है, तो हम सोचते हैं "कितना बेवकूफ है।" जब हम किसी
  को काटते हैं, तो हम सोचते हैं "मुझे ऐसा करना पड़ा - मुझे जल्दी थी।" हम अपनी
  असफलताओं को परिस्थिति ("ट्रैफिक बहुत खराब था") से और दूसरों की असफलताओं को
  स्वभाव ("वे आलसी हैं") से समझाते हैं। सफलता के लिए इसके विपरीत होता है: हम स्वयं
  को श्रेय देते हैं, हम दूसरों की सफलता को भाग्य के लिए आरोपित करते हैं।

  त्रुटि "मौलिक" है क्योंकि यह व्यापक और लगातार बनी रहती है। यह सहानुभूति को
  कमजोर करती है, संघर्ष को बढ़ावा देती है, और प्रदर्शन मूल्यांकन को विकृत करती है।

why_this_is_important: |
  मौलिक आरोपण त्रुटि को पहचानने से रिश्ते सुधरते हैं, संघर्ष कम होता है, और
  अधिक निष्पक्ष निर्णय लिए जाते हैं। यह किसी को "एक निश्चित तरीके का" निष्कर्ष
  निकालने से पहले संदर्भ पर विचार करने के लिए प्रोत्साहित करता है।

when_to_use:
  - संबंध_निर्माण
  - संघर्ष_समाधान
  - नेतृत्व
  - निर्णय_निर्माण

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    दूसरों के व्यवहार की व्याख्या करते समय "वे बस इसी तरह के इंसान हैं"।
  situational_explanation_for_self: |
    अपने स्वयं के व्यवहार की व्याख्या करते समय "मेरे पास कोई विकल्प नहीं था" या
    "परिस्थितियों ने मुझे मजबूर किया"।
  character_vs_context: |
    यह मान लेना कि चरित्र ही कारण है जब परिस्थिति व्यवहार की व्याख्या कर सकती
    है।
  asymmetric_standards: |
    दूसरों पर स्वयं की तुलना में कड़े मानदंड लागू करना।

examples:
  traffic: |
    दूसरे ड्राइवर की गलती = "बुरा ड्राइवर"। हमारी गलती = "अपरिहार्य परिस्थिति"।
  workplace: |
    एक सहकर्मी की समय सीमा चूकना = "गैर-जिम्मेदार"। हमारी समय सीमा चूकना =
    "बहुत अधिक काम था और कोई भी इससे बेहतर नहीं कर सकता था"।
  politics: |
    विरोधियों के विचार = "वे मूर्ख या दुष्ट हैं"। हमारे विचार = "तथ्यों का तर्कसंगत
    प्रतिक्रिया"।
  performance: |
    दूसरों की सफलता = "किस्मत"। हमारी सफलता = "कड़ी मेहनत से अर्जित"।

real_world_implications: |
  मौलिक आरोपण त्रुटि संघर्ष को बढ़ावा देती है, टीम वर्क को कमजोर करती है, और
  भर्ती और प्रदर्शन मूल्यांकन को विकृत करती है। इसे ठीक करने से संगठनात्मक
  संस्कृति और व्यक्तिगत रिश्तों में सुधार होता है।

professional_application:
  networking_and_relationship_building: |
    जब कोई आपको निराश करे, तो यह निष्कर्ष निकालने से पहले कि वे अविश्वसनीय या
    कठिन हैं, "क्या परिस्थितिजन्य कारक इसकी व्याख्या कर सकते हैं?" पूछें।
  collaborative_learning_initiative: |
    प्रतिक्रिया और समीक्षाओं में, "पहले परिस्थिति" व्याख्याओं को प्रोत्साहित करें।
    प्रबंधकों को चरित्र के लिए आरोपित करने से पहले संदर्भ पर विचार करने के लिए
    प्रशिक्षित करें।

how_can_this_be_misapplied:
  excusing_all_behavior: |
    हर कार्य को "परिस्थितिजन्य" कहकर खारिज करना, जब कुछ व्यवहार वास्तव में
    चरित्र को दर्शाता है।
  no_accountability: |
    इस त्रुटि का उपयोग उन लोगों को जवाबदेह ठहराने से बचने के लिए करना, जिन्होंने
    वास्तव में विकल्प चुने थे।
  self_deprecation: |
    हमेशा खुद को दोष देने और दूसरों की जिम्मेदारी को कभी स्वीकार न करने के लिए
    अति-सुधार करना।
  ignoring_patterns: |
    जब कोई व्यक्ति विभिन्न परिस्थितियों में बार-बार बुरा व्यवहार करता है, तो
    स्वभाव प्रासंगिक हो सकता है।

