id: circle_of_competence
name: सक्षमता का दायरा

quick_introduction: |
  सक्षमता का दायरा एक मानसिक मॉडल है जो आपको अपनी विशेषज्ञता की सीमाओं को जानने और महत्वपूर्ण निर्णय लेते समय उनके भीतर रहने के लिए प्रेरित करता है। वारेन बफेट और चार्ली मंगर इस बात पर जोर देते हैं कि आप क्या नहीं जानते, उसे जानना महत्वपूर्ण है।

one_liner: अपनी विशेषज्ञता की सीमाओं को जानें - और जब यह मायने रखता है तो उनके भीतर रहें।

try_this:
  - यह तय करें कि आपके पास वास्तविक विशेषज्ञता कहाँ है बनाम जहाँ आप अंदाज़ा लगा रहे हैं।
  - अपने दायरे से बाहर होने पर, सलाह लें या किसी और को सौंप दें।
  - ईमानदार रहें: क्या कोई सच्चा विशेषज्ञ आपकी इस राय से सहमत होगा?

ask_yourself:
  - क्या मैं अपनी सक्षमता के दायरे में हूँ, या मैं अंदाज़ा लगा रहा हूँ?
  - इस क्षेत्र में मैंने आखिरी बार "मुझे नहीं पता" कब स्वीकार किया?

in_more_detail: |
  प्रत्येक व्यक्ति के पास ऐसे क्षेत्र होते हैं जहाँ उनकी वास्तविक विशेषज्ञता होती है - जहाँ वे जानकारी का मूल्यांकन कर सकते हैं, त्रुटियों को पहचान सकते हैं, और विश्वसनीय निर्णय ले सकते हैं। उस दायरे के बाहर, वे किसी भी अन्य व्यक्ति की तरह ही पूर्वाग्रहों और गलतियों के शिकार होते हैं। मुख्य बात ईमानदार आत्म-मूल्यांकन है: आप वास्तव में कहाँ सक्षम हैं, और कहाँ आप अंदाज़ा लगा रहे हैं?

  सचेत सीखने के माध्यम से दायरा बढ़ाया जा सकता है, लेकिन इसकी वर्तमान सीमाओं को पहचानने के लिए विनम्रता की आवश्यकता होती है। अपने दायरे से बाहर काम करने से महंगी त्रुटियों का जोखिम बढ़ जाता है, खासकर जब दांव ऊंचे हों।

why_this_is_important: |
  अपनी सक्षमता के दायरे में रहने से महंगी गलतियाँ कम होती हैं और निर्णय की गुणवत्ता में सुधार होता है। यह आपको यह जानने में भी मदद करता है कि कब सलाह लेनी है, किसी और को सौंपना है, या पीछे हटना है। अपने दायरे से बाहर अति आत्मविश्वास विफलता का एक प्रमुख स्रोत है।

when_to_use:
  - निर्णय_लेना
  - निवेश
  - करियर_बदलना
  - जोखिम_मूल्यांकन

how_can_you_spot_it:
  honest_boundary_assessment: |
    क्या आप किसी क्षेत्र में अपने ज्ञान की सीमाओं को समझा सकते हैं? क्या आप जानते हैं कि आप क्या नहीं जानते?
  knowing_when_to_defer: |
    उन स्थितियों को पहचानना जहाँ आपको अकेले निर्णय लेने के बजाय विशेषज्ञ की राय लेनी चाहिए।
  consistent_track_record: |
    आपके दायरे में, आपके निर्णय समय के साथ मान्य होते जाते हैं; बाहर, वे नहीं होते।
  calibration: |
    किसी क्षेत्र में आपका आत्मविश्वास उस क्षेत्र में आपके वास्तविक प्रदर्शन से मेल खाता है।

examples:
  investing: |
    बफेट टेक स्टॉक से बचते हैं क्योंकि उनका कहना है कि वे उनकी सक्षमता के दायरे से बाहर हैं - वह उनका मज़बूती से मूल्यांकन नहीं कर सकते।
  career: |
    एक विशेषज्ञ जो अपने क्षेत्र में रहता है बनाम एक जो असंबंधित क्षेत्र में "मुश्किल" भूमिका निभाता है।
  hiring: |
    यह जानना कि कब अपने निर्णय पर भरोसा करना है बनाम तकनीकी भूमिकाओं के लिए विशेषज्ञों को लाना है।
  advice_giving: |
    अंदाज़ा लगाने के बजाय अपनी विशेषज्ञता से बाहर के विषयों पर राय देने से इनकार करना।

real_world_implications: |
  सक्षमता का दायरा मूल्य निवेश और पेशेवर सफलता के लिए केंद्रीय है। इसे अनदेखा करने से अति आत्मविश्वास, विफल प्रयास और खराब सलाह मिलती है। दायरे को बढ़ाने के लिए सचेत प्रयास और ईमानदार प्रतिक्रिया की आवश्यकता होती है।

professional_application:
  networking_and_relationship_building: |
    ऐसे लोगों के साथ संबंध बनाएं जिनकी सक्षमता का दायरा आपके पूरक हों। जानें कि कब स्वयं उत्तर देने के बजाय दूसरों का परिचय कराना है।
  collaborative_learning_initiative: |
    ओवरलैपिंग और पूरक दायरे वाली टीमें बनाएं। लोगों को अपनी सक्षमता के बाहर काम करते समय झंडा उठाने के लिए प्रोत्साहित करें।

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    कभी भी अपने दायरे से बाहर न निकलने से विकास और सीखना सीमित हो सकता है।
  false_modesty: |
    जवाबदेही या कठिन निर्णय से बचने के लिए एक छोटा दायरा होने का दावा करना।
  gatekeeping: |
    तर्कों में शामिल हुए बिना दूसरों को खारिज करने के लिए "सक्षमता का दायरा" का उपयोग करना।
  stagnation: |
    दायरे को ऐसा मानना ​​जो निश्चित हो, बजाय इसके कि यह प्रयास से बढ़ सकता है।

