# Bayes Theorem
# Mental Model / Cognitive Bias - Example Entry

id: bayes_theorem
name: बेयस प्रमेय

quick_introduction: |
  बेयस प्रमेय बताता है कि जब आपको नया प्रमाण मिलता है तो किसी परिकल्पना की संभावना को कैसे अपडेट किया जाए। यह इस विचार को औपचारिक बनाता है कि विश्वासों को उस अनुपात में बदलना चाहिए जिस अनुपात में प्रमाण उनका समर्थन करता है - न कि सब कुछ या कुछ भी नहीं, बल्कि धीरे-धीरे।

one_liner: विश्वासों को उस अनुपात में अपडेट करें जिस अनुपात में प्रमाण उनका समर्थन करता है।

try_this:
  - अपने पूर्व-विश्वास से शुरुआत करें; पूछें कि यदि आप गलत होते तो प्रमाण की कितनी संभावना होती।
  - धीरे-धीरे अपडेट करें - एक डेटा बिंदु पर 0% से 100% तक न बदलें।
  - वैकल्पिक परिकल्पनाओं पर विचार करें: क्या प्रमाण उन्हें भी फिट करेगा?

ask_yourself:
  - यह प्रमाण वास्तव में संभावना को कितना बदलता है?
  - क्या मैं अपने विश्वासों को अपडेट कर रहा हूँ, या केवल वही पुष्टि कर रहा हूँ जो मैं पहले से सोचता था?

in_more_detail: |
  प्रमेय कहता है कि प्रमाण को देखते हुए किसी परिकल्पना की संभावना, परिकल्पना को देखते हुए प्रमाण की संभावना के साथ पूर्व संभावना का गुणनफल होती है, जिसे प्रमाण की संभावना से विभाजित किया जाता है। व्यवहार में: अपने पूर्व विश्वास से शुरुआत करें, देखें कि नया प्रमाण आपकी परिकल्पना बनाम विकल्पों के साथ कितना सुसंगत है, और तदनुसार अपडेट करें।

  बेयसियन सोच पुष्टिकरण पूर्वाग्रह का मुकाबला करती है, जिसमें आपको यह विचार करने की आवश्यकता होती है कि यदि आप गलत होते तो प्रमाण की कितनी संभावना होती। यह संभाव्य तर्क और वैज्ञानिक अद्यतन का आधार है।

why_this_is_important: |
  बेयसियन सोच अनिश्चितता के तहत निर्णय लेने में सुधार करती है, आपको अत्यधिक आत्मविश्वास से बचने में मदद करती है, और प्रमाण से सीखने के लिए एक ढांचा प्रदान करती है। यह निदान, पूर्वानुमान और अनिश्चितता वाले किसी भी डोमेन के लिए आवश्यक है।

when_to_use:
  - निर्णय_लेना
  - समस्या_समाधान
  - जोखिम_मूल्यांकन
  - सीखना

how_can_you_spot_it:
  prior_and_update: |
    आधारभूत विश्वास से शुरुआत करना और नए प्रमाण के आधार पर उसे समायोजित करना।
  likelihood_ratio_thinking: |
    यह पूछना "यदि मैं सही हूँ बनाम गलत हूँ तो इस प्रमाण की कितनी संभावना है?"
  incremental_updating: |
    विश्वास धीरे-धीरे प्रमाण के साथ बदलते हैं न कि अचानक पलटते हैं।
  base_rate_respect: |
    पूर्व संभावनाएं (आधार दरें) मायने रखती हैं, न कि केवल नवीनतम डेटा बिंदु।

examples:
  medical_diagnosis: |
    दुर्लभ बीमारी के लिए एक सकारात्मक परीक्षण - पूर्व-संभावना (कम प्रसार) का मतलब है कि एक सकारात्मक परिणाम अक्सर एक गलत सकारात्मक होता है। बेयस संभावना को अपडेट करता है।
  forecasting: |
    प्रारंभिक अनुमानों से चिपके रहने के बजाय, नए डेटा के आगमन के साथ भविष्यवाणियों को अपडेट करना।
  hiring: |
    भूमिका उपयुक्तता के लिए आधार दरों से शुरुआत करना, फिर साक्षात्कार प्रदर्शन के आधार पर अपडेट करना।
  investing: |
    जैसे-जैसे नई जानकारी (कमाई, समाचार) आती है, किसी कंपनी के सफल होने की संभावना को अपडेट करना।

real_world_implications: |
  बेयसियन सोच आधुनिक एआई, चिकित्सा निदान और वैज्ञानिक अनुमान का आधार है। यह आधार दर उपेक्षा और पुष्टिकरण पूर्वाग्रह को ठीक करती है। यह अनिश्चितता वाले किसी भी डोमेन के लिए एक शक्तिशाली उपकरण है।

professional_application:
  networking_and_relationship_building: |
    स्थिर पहले प्रभाव रखने के बजाय, नए प्रमाणों के आधार पर लोगों के बारे में अपने विश्वासों को अपडेट करें। कार्यों की व्याख्या करते समय आधार दरों (जैसे, यह व्यवहार कितना आम है?) पर विचार करें।
  collaborative_learning_initiative: |
    चर्चाओं से पहले स्पष्ट रूप से पूर्व-विश्वासों को बताने के लिए टीमों को प्रोत्साहित करें, फिर प्रमाण प्रस्तुत किए जाने पर अपडेट करें। एंकरिंग और पुष्टिकरण पूर्वाग्रह को कम करता है।

how_can_this_be_misapplied:
  overprecision: |
    जब अनिश्चितता अधिक हो तो सटीक संभावनाएं निर्दिष्ट करना।
  prior_rigidity: |
    मजबूत पूर्व-विश्वासों से चिपके रहना और नए प्रमाण के साथ पर्याप्त रूप से अपडेट न करना।
  base_rate_tyranny: |
    आधार दरों का सुझाव देने के कारण मजबूत प्रमाणों को अनदेखा करना - कभी-कभी प्रमाण हावी होना चाहिए।
  false_sophistication: |
    वास्तविक तर्क किए बिना कठोर लगने के लिए बेयसियन भाषा का उपयोग करना।

