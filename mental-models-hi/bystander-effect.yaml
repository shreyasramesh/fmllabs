id: bystander_effect
name: दर्शक प्रभाव

quick_introduction: |
  दर्शक प्रभाव (Bystander Effect) वह प्रवृत्ति है जिसमें व्यक्तियों के उपस्थित होने पर
  मदद की पेशकश करने की संभावना कम होती है। जितने अधिक दर्शक होंगे, किसी एक व्यक्ति द्वारा
  कार्य करने की संभावना उतनी ही कम होगी। जिम्मेदारी विभाजित हो जाती है; हम मानते हैं कि
  कोई और मदद करेगा।

one_liner: जितने अधिक लोग उपस्थित होंगे, किसी एक व्यक्ति द्वारा कार्य करने की संभावना उतनी ही कम होगी।

try_this:
  - आपात स्थितियों में, सीधे जिम्मेदारी सौंपें: "आप, 911 पर कॉल करें।"
  - यह न मानें कि कोई और मदद करेगा - कार्य करें या स्पष्ट रूप से सौंपें।
  - जब आप दूसरों के पहले कार्य करने की प्रतीक्षा कर रहे हों तो ध्यान दें।

ask_yourself:
  - क्या मैं जिम्मेदारी को विभाजित कर रहा हूँ क्योंकि दूसरे उपस्थित हैं?
  - क्या मैं अलग तरह से कार्य करूँगा यदि मैं अकेला होता?

in_more_detail: |
  किटी गेनोवीज़ की हत्या के बाद (हालांकि कहानी को आंशिक रूप से पौराणिक बनाया गया था),
  शोधकर्ताओं ने पाया कि दूसरों की उपस्थिति मदद को कम करती है। हम संकेतों के लिए
  दूसरों की ओर देखते हैं - यदि कोई कार्य नहीं करता है, तो हम इसे "किसी कार्रवाई की आवश्यकता नहीं"
  के रूप में व्याख्या करते हैं। हम जिम्मेदारी के प्रसार का भी अनुभव करते हैं: कई लोग
  उपस्थित होने पर, प्रत्येक व्यक्ति को व्यक्तिगत रूप से कम जिम्मेदार महसूस होता है।
  बहुलतावादी अज्ञानता हो सकती है: हर कोई सोचता है कि कुछ गलत है लेकिन कोई भी कार्य
  नहीं करता क्योंकि कोई और कार्य नहीं कर रहा है।

  यह प्रभाव तब सबसे मजबूत होता है जब स्थिति अस्पष्ट होती है और जब
  दर्शक एक-दूसरे को नहीं जानते हैं। इसे जिम्मेदारी के प्रत्यक्ष असाइनमेंट ("आप, 911 पर
  कॉल करें") द्वारा दूर किया जा सकता है।

why_this_is_important: |
  दर्शक प्रभाव को समझना आपको तब कार्रवाई करने में मदद करता है जब दूसरे नहीं करते,
  और ऐसे सिस्टम डिजाइन करने में मदद करता है जो इसे दूर करते हैं। यदि आप मुसीबत में हैं,
  तो एक व्यक्ति को लक्षित करें। यदि आप एक दर्शक हैं, तो दूसरों के कार्य करने का इंतजार न करें।

when_to_use:
  - नेतृत्व
  - संबंध_निर्माण
  - संघर्ष_समाधान
  - निर्णय_निर्माण

how_can_you_spot_it:
  diffusion_of_responsibility: |
    जब कई लोग उपस्थित हों तो "कोई और कर लेगा"।
  pluralistic_ignorance: |
    हर कोई सोचता है कि कार्रवाई की आवश्यकता है लेकिन कोई भी कार्य नहीं करता क्योंकि
    कोई और कार्य नहीं कर रहा है।
  social_proof_inaction: |
    दूसरों द्वारा निष्क्रियता को "किसी कार्रवाई की आवश्यकता नहीं" के रूप में व्याख्या किया जाता है।
  audience_inhibition: |
    बेवकूफ दिखने या अत्यधिक प्रतिक्रिया करने का डर कार्रवाई को रोकता है।

examples:
  emergency: |
    एक व्यक्ति गिर जाता है; कई दर्शकों के साथ, प्रत्येक के मदद के लिए कॉल करने की संभावना कम होती है।
  workplace: |
    हर कोई एक समस्या देखता है लेकिन कोई भी उसे नहीं उठाता - प्रत्येक मानता है कि कोई और करेगा।
  harassment: |
    उत्पीड़न के गवाह हस्तक्षेप नहीं करते, प्रत्येक सोचता है
    कि दूसरे कार्य करेंगे।
  meetings: |
    एक बुरे विचार को चुनौती नहीं दी जाती क्योंकि हर कोई मानता है
    कि कोई और बोलेगा।

real_world_implications: |
  दर्शक प्रभाव के आपात स्थितियों में दुखद परिणाम हो सकते हैं
  और संगठनों में समस्याओं को बने रहने दे सकता है। इसे दूर करने के लिए
  प्रत्यक्ष जिम्मेदारी असाइनमेंट और हस्तक्षेप को प्रोत्साहित करने वाले मानदंडों की आवश्यकता होती है।

professional_application:
  networking_and_relationship_building: |
    जब आपको मदद की ज़रूरत हो, तो एक विशिष्ट व्यक्ति से पूछें। जब आप कुछ
    गलत देखें, तो कार्रवाई करें - यह न मानें कि दूसरे करेंगे। ऐसे मानदंड
    बनाएं जहां बोलना अपेक्षित और पुरस्कृत हो।
  collaborative_learning_initiative: |
    लोगों को दर्शक प्रभाव को पहचानने और हस्तक्षेप करने के लिए प्रशिक्षित करें।
    "यदि आप कुछ देखते हैं, तो कुछ कहें" का उपयोग करें और स्पष्ट
    भूमिकाएँ सौंपें। जो पहले बोलते हैं उन्हें पुरस्कृत करें।

how_can_this_be_misapplied:
  blaming_bystanders: |
    जब प्रभाव एक शक्तिशाली स्थितिजन्य शक्ति है तो व्यक्तियों को कठोरता से आंकना - स्थिति बदलने पर ध्यान केंद्रित करें।
  false_assumption: |
    यह मान लेना कि यदि पर्याप्त लोग उपस्थित हैं तो कोई हमेशा मदद करेगा - अक्सर इसके विपरीत सच होता है।
  overcorrection: |
    हर किसी को जिम्मेदार बनाना ताकि कोई भी जिम्मेदार न हो - प्रसार
    अभी भी हो सकता है।
  individualizing: |
    दर्शक प्रभाव को एक स्थितिजन्य घटना के बजाय एक चरित्र दोष के रूप में मानना।

