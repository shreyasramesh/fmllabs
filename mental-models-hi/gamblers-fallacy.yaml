id: gamblers_fallacy
name: जुआरी का भ्रम (Gambler's Fallacy)

quick_introduction: |
  जुआरी का भ्रम यह गलत धारणा है कि पिछली स्वतंत्र घटनाएं भविष्य को प्रभावित करती हैं।
  लगातार चित आने के बाद, हम सोचते हैं कि पट "आने वाली" है—भले ही हर उछाल स्वतंत्र हो।
  हम यादृच्छिकता (randomness) में पैटर्न देखते हैं और "सुधार" या "वापसी" की उम्मीद करते हैं
  जब इसकी कोई आवश्यकता नहीं होती।

one_liner: पिछली स्वतंत्र घटनाएं भविष्य को प्रभावित नहीं करतीं—सिक्के की कोई याददाश्त नहीं होती।

try_this:
  - जब आप "मैं जीतने वाला हूँ" सोचें, तो पूछें: क्या ये घटनाएं वास्तव में स्वतंत्र हैं?
  - माध्य की ओर वापसी (regression to the mean) (वास्तविक) और जुआरी के भ्रम (झूठा) में अंतर करें।
  - ध्यान दें कि आप यादृच्छिकता में कब पैटर्न देख रहे हैं।

ask_yourself:
  - क्या मैं यह मान रहा हूँ कि पिछली घटनाएं भविष्य को प्रभावित करेंगी जब वे स्वतंत्र हैं?
  - क्या कोई सांख्यिकीविद (statistician) मेरे "बदलाव की उम्मीद" तर्क से सहमत होगा?

in_more_detail: |
  एक निष्पक्ष सिक्का उछाल में, प्रत्येक उछाल स्वतंत्र होता है। चित आने की
  संभावना हमेशा 50% होती है, चाहे पिछली घटनाएं कुछ भी हों। लेकिन हमें
  ऐसा महसूस होता है कि एक परिणाम का लंबा दौर दूसरे को अधिक संभावित बनाता है।
  हम बड़ी संख्याओं के नियम (law of large numbers) (कई परीक्षणों में,
  परिणाम औसत हो जाते हैं) को छोटी अवधि के "सुधार" के साथ भ्रमित करते हैं।
  कैसीनो की कोई याददाश्त नहीं होती।

  यह भ्रम जुए, निवेश और रोजमर्रा के निर्णय लेने को प्रभावित करता है।
  हम मानते हैं कि "भाग्य" संतुलित हो जाएगा या हम जीतने वाले हैं।
  कभी-कभी हम सही होते हैं—लेकिन गलत कारणों से।

why_this_is_important: |
  जुआरी के भ्रम को पहचानना जुए और निवेश में महंगी गलतियों को रोकता है।
  यह आपको छोटी अवधियों की अधिक व्याख्या करने और झूठी वापसी की उम्मीद करने से
  बचने में भी मदद करता है। यह वास्तविक माध्य की ओर वापसी को भ्रम से अलग करता है।

when_to_use:
  - निर्णय_लेना (decision_making)
  - निवेश (investing)
  - जोखिम_मूल्यांकन (risk_assessment)
  - समस्या_समाधान (problem_solving)

how_can_you_spot_it:
  due_for_a_change: |
    "हमने इतने सारे नुकसान झेले हैं—हम जीतने वाले हैं।"
  pattern_in_randomness: |
    यादृच्छिक (random) अनुक्रमों में सार्थक पैटर्न देखना।
  hot_hand_fallacy: |
    यह विश्वास करना कि एक स्ट्रीक जारी रहेगी (संबंधित लेकिन विपरीत त्रुटि)।
  independence_ignorance: |
    स्वतंत्र घटनाओं को ऐसे मानना ​​जैसे वे जुड़ी हुई हों।

examples:
  gambling: |
    रूलेट (roulette) पर कई बार लाल आने के बाद, काला पर दांव लगाना क्योंकि
    "लाल लगातार नहीं आ सकता।"
  investing: |
    "बाजार नीचे रहा है—यह ऊपर जाना ही चाहिए।"
  hiring: |
    "हमने कई खराब उम्मीदवारों को काम पर रखा है—अगला निश्चित रूप से अच्छा होगा।"
  sports: |
    "उसने इतने सारे चूक दिए हैं—वह अगला शॉट लगाने वाला है।"

real_world_implications: |
  जुआरी का भ्रम जुए में नुकसान और खराब निवेश निर्णय का कारण बनता है।
  यह यह भी बताता है कि हम अल्पावधि पैटर्न की अधिक व्याख्या क्यों करते हैं।
  इसे वास्तविक माध्य की ओर वापसी (जहां वापसी के लिए एक वास्तविक माध्य है) से
  अलग करना महत्वपूर्ण है।

professional_application:
  networking_and_relationship_building: |
    यह न मानें कि पिछले संबंध की गतिशीलता भविष्य में "ठीक" हो जाएगी—
    प्रत्येक बातचीत कुछ हद तक स्वतंत्र होती है। लेकिन जब कोई वास्तविक अंतर्निहित
    कारण हो तो पैटर्न से सीखें।
  collaborative_learning_initiative: |
    प्रदर्शन का मूल्यांकन करते समय, यादृच्छिक भिन्नता को व्यवस्थित परिवर्तन से
    अलग करें। छोटी अवधियां शोर हो सकती हैं; "स्ट्रीक्स" पर अधिक प्रतिक्रिया न दें
    या झूठी वापसी की उम्मीद न करें।

how_can_this_be_misapplied:
  ignoring_regression: |
    कभी-कभी माध्य की ओर वापसी वास्तविक होती है (जैसे, कौशल प्रदर्शन)।
    सभी वापसी को जुआरी का भ्रम समझकर खारिज न करें।
  false_independence: |
    यह मानना ​​कि घटनाएं स्वतंत्र हैं जब वे नहीं हैं (जैसे, एक ही चीज़ का बार-बार
    मापन)।
  overcorrection: |
    जब वापसी के लिए कोई वास्तविक माध्य हो तो कभी भी वापसी की उम्मीद न करना।
  dismissing_patterns: |
    कुछ पैटर्न वास्तविक होते हैं—सभी अनुक्रम यादृच्छिक नहीं होते।

