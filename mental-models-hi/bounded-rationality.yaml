id: bounded_rationality
name: सीमित तर्कसंगतता

quick_introduction: |
  सीमित तर्कसंगतता यह विचार है कि मानवीय निर्णय-निर्माण उपलब्ध जानकारी, संज्ञानात्मक क्षमता और समय से सीमित होता है। हम अनुकूलन नहीं करते; हम "संतुष्टि" करते हैं - हम सर्वोत्तम संभव विकल्पों के बजाय पर्याप्त अच्छे विकल्प चुनते हैं।

one_liner: हम संतुष्टि करते हैं - हम सर्वोत्तम नहीं, बल्कि पर्याप्त अच्छा चुनते हैं।

try_this:
  - जब संभव हो तो विकल्पों को सरल बनाएं; बहुत अधिक विकल्प सीमित तर्कसंगतता को अभिभूत कर देते हैं।
  - अंतहीन खोज से बचने के लिए अग्रिम रूप से "पर्याप्त अच्छे" मानदंड निर्धारित करें।
  - ध्यान दें कि जब आप घटते प्रतिफल के बिंदु से आगे अनुकूलन कर रहे हों।

ask_yourself:
  - क्या मैं सही विकल्प खोजने की कोशिश कर रहा हूँ जब पर्याप्त अच्छा काम करेगा?
  - मेरे निर्णय को कौन सी बाधाएं (समय, जानकारी, ध्यान) सीमित कर रही हैं?

in_more_detail: |
  हर्बर्ट साइमन ने पूर्ण जानकारी वाले तर्कसंगत अभिनेताओं की शास्त्रीय आर्थिक धारणा को चुनौती देने के लिए इस अवधारणा को प्रस्तुत किया। वास्तव में, हमारे पास सीमित ध्यान, कार्यशील स्मृति और समय है। हम निर्णय लेने के लिए अनुमानों और शॉर्टकट का उपयोग करते हैं जो हमारी बाधाओं को देखते हुए "तर्कसंगत" होते हैं, भले ही वे आदर्श अर्थ में इष्टतम न हों।

  सीमित तर्कसंगतता बताती है कि हम हमेशा सबसे अच्छा विकल्प क्यों नहीं चुनते, हम अंगूठे के नियमों पर भरोसा क्यों करते हैं, और संदर्भ और फ्रेमिंग क्यों इतने मायने रखते हैं। यह वर्णन करने का एक मॉडल है कि हम वास्तव में निर्णय कैसे लेते हैं, न कि यह एक नुस्खा है कि हमें कैसे लेना चाहिए।

why_this_is_important: |
  सीमित तर्कसंगतता को समझना आपको बेहतर प्रक्रियाएं डिजाइन करने, दूसरों के लिए विकल्पों को सरल बनाने और निर्णय की गुणवत्ता के लिए यथार्थवादी अपेक्षाएं निर्धारित करने में मदद करता है। यह यह भी बताता है कि "अतार्किक" व्यवहार अक्सर बाधाओं के तहत तर्कसंगत क्यों होता है।

when_to_use:
  - निर्णय_निर्माण
  - समस्या_समाधान
  - नेतृत्व
  - जोखिम_मूल्यांकन

how_can_you_spot_it:
  satisficing_behavior: |
    लोग पूरी तरह से तुलना करने के बजाय पहले स्वीकार्य विकल्प को चुनते हैं।
  heuristic_reliance: |
    निर्णय पूर्ण विश्लेषण के बजाय अंगूठे के नियमों का उपयोग करके किए जाते हैं।
  context_dependence: |
    एक ही व्यक्ति विकल्पों को प्रस्तुत करने के तरीके के आधार पर अलग-अलग विकल्प चुनता है।
  information_overload: |
    जब बहुत अधिक जानकारी उपलब्ध होती है, तो निर्णय की गुणवत्ता कम हो सकती है।

examples:
  hiring: |
    एक प्रबंधक "सर्वश्रेष्ठ" उम्मीदवार को खोजने के लिए अनिश्चित काल तक साक्षात्कार करने के बजाय, निर्धारित स्तर को पूरा करने वाले पहले उम्मीदवार को नियुक्त करता है।
  consumer_choice: |
    खरीदार स्टोर में हर उत्पाद की तुलना करने के बजाय, शेल्फ पर पहले कुछ विकल्पों में से चुनते हैं।
  policy: |
    मतदाता हर नीति की स्थिति का विश्लेषण करने के बजाय, शॉर्टकट के रूप में पार्टी संबद्धता या कुछ प्रमुख मुद्दों का उपयोग करते हैं।
  daily_routines: |
    लोग हर निर्णय को पुनः अनुकूलित करने के बजाय आदतों और डिफ़ॉल्ट का पालन करते हैं।

real_world_implications: |
  सीमित तर्कसंगतता बाजारों, नीति डिजाइन और संगठनात्मक व्यवहार को आकार देती है।
  नज (Nudges) और विकल्प वास्तुकला (choice architecture) इसलिए काम करते हैं क्योंकि वे हमारी सीमाओं को ध्यान में रखते हैं। इसे अनदेखा करने से अत्यधिक जटिल प्रणालियाँ बनती हैं जिनका लोग प्रभावी ढंग से उपयोग नहीं कर सकते।

professional_application:
  networking_and_relationship_building: |
    दूसरों से वास्तविक समय में जटिल व्यापार-बंद (trade-offs) को संसाधित करने की उम्मीद न करें। विकल्पों को सरल बनाएं और स्पष्ट डिफ़ॉल्ट प्रदान करें।
  collaborative_learning_initiative: |
    सीमित तर्कसंगतता के साथ काम करने वाली प्रक्रियाएं डिजाइन करें: विकल्प कम करें, डिफ़ॉल्ट प्रदान करें, और जटिल निर्णयों के लिए चेकलिस्ट का उपयोग करें।

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    ऐसी प्रक्रियाएं डिजाइन करना जो असीमित संज्ञानात्मक क्षमता मानती हैं, जिससे निर्णय थकान और खराब परिणाम होते हैं।
  blaming_irrationality: |
    दूसरों की बाधाओं पर विचार किए बिना उनके विकल्पों को अतार्किक कहकर खारिज करना।
  exploitation: |
    वांछित परिणामों की ओर उन्हें निर्देशित करने के लिए जानबूझकर लोगों को जटिलता से अभिभूत करना।
  perfectionism: |
    अनुकूलित निर्णय की उम्मीद करना जब संतुष्टि अक्सर तर्कसंगत दृष्टिकोण होता है।

