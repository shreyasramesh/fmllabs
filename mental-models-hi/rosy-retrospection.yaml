# गुलाबी पश्चदृष्टि
# मानसिक मॉडल / संज्ञानात्मक पूर्वाग्रह - उदाहरण प्रविष्टि

id: rosy_retrospection
name: गुलाबी पश्चदृष्टि

quick_introduction: |
  गुलाबी पश्चदृष्टि वह प्रवृत्ति है जिसमें हम अतीत को जैसा था उससे बेहतर याद करते हैं।
  समय के साथ हम पिछली घटनाओं को अधिक सकारात्मक रूप से याद करते हैं, कठिनाइयों को कम करके और अच्छी बातों को बढ़ा-चढ़ाकर। "सुनहरे पुराने दिन" अक्सर उतने अच्छे नहीं होते थे जितना हम याद करते हैं।

one_liner: हम अतीत को जैसा था उससे बेहतर याद करते हैं—"सुनहरे पुराने दिन" उतने अच्छे नहीं थे।

try_this:
  - अतीत की तुलना करते समय, पूछें: मैं उस समय वास्तव में कैसा महसूस कर रहा था?
  - बाद में स्मृति की वास्तविकता से तुलना करने के लिए एक पत्रिका रखें।
  - ध्यान दें कि कब पुरानी यादें वर्तमान के आपके निर्णय को रंग रही हैं।

ask_yourself:
  - क्या मैं अतीत का आदर्शीकरण कर रहा हूँ?
  - यदि मैं समय में पीछे यात्रा कर सकता तो क्या मैं तब खुश होता?

in_more_detail: |
  हम पिछली घटनाओं के सकारात्मक पहलुओं को याद रखने और नकारात्मक को भूलने या कम करने की प्रवृत्ति रखते हैं। छुट्टियाँ, नौकरियाँ और रिश्ते पुरानी यादों में उस समय की तुलना में बेहतर लगते हैं जब वे वास्तव में हो रहे थे। इससे अवास्तविक तुलनाएँ हो सकती हैं—हम वर्तमान का मूल्यांकन एक आदर्शित अतीत से करते हैं।

  जब हम पिछली पसंदों को उसी (याद की गई) परिणाम की उम्मीद में दोहराते हैं तो गुलाबी पश्चदृष्टि निर्णय लेने को प्रभावित करती है। यह पुरानी यादों को भी बढ़ावा दे सकती है उन युगों के लिए जो वस्तुनिष्ठ रूप से बदतर थे। यह स्मृति में नकारात्मक पूर्वाग्रह के विपरीत है।

why_this_is_important: |
  गुलाबी पश्चदृष्टि को पहचानना आपको अधिक यथार्थवादी तुलना करने और आदर्शीकृत यादों के आधार पर पिछली गलतियों को दोहराने से बचने में मदद करता है। यह यह भी बताता है कि हम वर्तमान प्रगति के बावजूद कभी-कभी अतीत के लिए क्यों तरसते हैं।

when_to_use:
  - निर्णय_लेना
  - करियर_निर्णय
  - रिश्ता_बनाना
  - सीखना

how_can_you_spot_it:
  idealized_past: |
    "उस समय चीजें बेहतर थीं" जबकि वस्तुनिष्ठ माप अन्यथा दिखा सकते हैं।
  selective_positive_memory: |
    पिछली घटनाओं से अच्छी बातों को याद रखना और बुरी बातों को भूल जाना।
  nostalgia_as_evidence: |
    पुरानी पसंदों को सही साबित करने के लिए सुखद यादों का उपयोग करना।
  present_undervaluation: |
    वर्तमान का मूल्यांकन जितना है उससे बदतर लगता है क्योंकि हम एक आदर्शित अतीत से तुलना करते हैं।

examples:
  career: |
    "मेरी पुरानी नौकरी बहुत बढ़िया थी" जबकि आपने अच्छे कारणों से उसे छोड़ दिया था—स्मृति ने निराशाओं को कम कर दिया है।
  relationships: |
    किसी पुराने रिश्ते के बारे में "हम बहुत खुश थे"—उन संघर्षों को भूल जाना जिन्होंने उसके अंत का नेतृत्व किया।
  childhood: |
    "मेरे समय में बच्चों का जीवन बेहतर था" जबकि कई वस्तुनिष्ठ माप (स्वास्थ्य, सुरक्षा, अवसर) में सुधार हुआ है।
  projects: |
    "वह परियोजना सुचारू रूप से चली" जबकि इसमें वास्तव में कई देरी हुई थी—हम परिणाम याद रखते हैं, प्रक्रिया नहीं।

real_world_implications: |
  गुलाबी पश्चदृष्टि जीवन की संतुष्टि, करियर निर्णयों और पुरानी यादों से प्रेरित विकल्पों को प्रभावित करती है। इससे पिछली गलतियों को दोहराया जा सकता है या अवास्तविक तुलनाएँ हो सकती हैं। यह "सुनहरे पुराने दिनों में वापसी" बयानबाजी की अपील की भी व्याख्या करता है।

professional_application:
  networking_and_relationship_building: |
    जब पिछले सहकर्मियों से फिर से जुड़ने या पिछली भूमिकाओं पर लौटने पर विचार कर रहे हों, तो पुरानी यादों को वास्तविकता से अलग करें। छोड़ने के कारणों को उस समय ही दर्ज करें; लौटने से पहले उनकी समीक्षा करें।
  collaborative_learning_initiative: |
    पिछली समीक्षाओं में, जो वास्तव में हुआ उसका मूल्यांकन करने के लिए स्मृति के बजाय तत्कालीन नोट्स या डेटा का उपयोग करें। स्मृति कठिनाइयों को कम कर देती है।

how_can_this_be_misapplied:
  dismissing_nostalgia: |
    सभी पुरानी यादें भ्रामक नहीं होतीं—कभी-कभी अतीत कुछ मायनों में वास्तव में बेहतर होता था।
  invalidating_memories: |
    लोगों को यह बताना कि उनकी सकारात्मक यादें "गलत" हैं, जबकि वे वास्तविक व्यक्तिपरक अनुभव को दर्शा सकती हैं।
  overcorrection: |
    यह मान लेना कि अतीत हमेशा हमारे याद करने से बदतर था—कभी-कभी यह बेहतर था।
  present_bias: |
    वर्तमान गिरावट के बारे में वैध चिंताओं को खारिज करने के बहाने के रूप में गुलाबी पश्चदृष्टि का उपयोग करना।

