# नैरेटिव फैलेसी
# मेंटल मॉडल / कॉग्निटिव बायस - उदाहरण एंट्री

id: narrative_fallacy
name: नैरेटिव फैलेसी

quick_introduction: |
  नैरेटिव फैलेसी अतीत की घटनाओं से ऐसी कहानियाँ बनाने की प्रवृत्ति है
  जो उन्हें वास्तव में होने से अधिक सुसंगत, पूर्वानुमेय और सार्थक बनाती हैं।
  हम यादृच्छिकता पर स्पष्टीकरण थोपते हैं। हम इतिहास की अव्यवस्था को
  एक व्यवस्थित कहानी में बदल देते हैं—और फिर मानते हैं कि कहानी अवश्यंभावी थी।

one_liner: हम यादृच्छिकता पर सुसंगत कहानियाँ थोपते हैं—और फिर मानते हैं कि वे अवश्यंभावी थीं।

try_this:
  - पूछें: इस कहानी का कितना हिस्सा पश्चदृष्टि है? भाग्य ने क्या भूमिका निभाई?
  - व्यवस्थित स्पष्टीकरणों पर संदेह करें—अतीत हमारी कहानियों से अधिक अव्यवस्थित था।
  - समझ में आता है को नोटिस करें जब यह पूर्वानुमेय था का काम कर रहा हो।

ask_yourself:
  - क्या मैं ऐसी कहानी बना रहा हूँ जो अतीत को जितना था उससे अधिक अवश्यंभावी दिखाती है?
  - क्या मैं इसके होने से पहले इसकी भविष्यवाणी कर पाता?

in_more_detail: |
  नसीम निकोलस तालेब ने इस शब्द को लोकप्रिय बनाया। हम कथा की लालसा रखते हैं—
  कारण और प्रभाव, नायक और खलनायक, स्पष्ट चाप। इसलिए हम ऐसी कहानियाँ बनाते हैं
  जो पश्चदृष्टि में घटनाओं को जोड़ती हैं। कहानी सच लगती है क्योंकि यह सुसंगत है—
  लेकिन सुसंगतता का मतलब यह नहीं है कि यह सही है। हम "समझ में आता है" को
  "पूर्वानुमेय था" के साथ भ्रमित करते हैं। हम भाग्य और यादृच्छिकता की भूमिका को
  कम आंकते हैं।

  नैरेटिव फैलेसी प्रभावित करती है कि हम इतिहास से कैसे सीखते हैं, सफलता का
  मूल्यांकन करते हैं, और भविष्यवाणियाँ करते हैं। हम कहानियों की व्याख्यात्मक शक्ति को
  अधिक महत्व देते हैं और संयोग की भूमिका को कम महत्व देते हैं।

why_this_is_important: |
  नैरेटिव फैलेसी को पहचानना आपको अतीत से अधिक सीखने और पूर्वानुमेयता को
  अधिक आंकने से बचने में मदद करता है। यह कारण और भविष्यवाणी के बारे में
  विनम्रता को प्रोत्साहित करता है। जो कुछ भी एक अच्छी कहानी बनाता है वह सच या
  सामान्यीकृत नहीं होता है।

when_to_use:
  - निर्णय_लेना
  - सीखना
  - जोखिम_आकलन
  - समस्या_समाधान

how_can_you_spot_it:
  hindsight_coherence: |
    अतीत की घटनाओं को एक व्यवस्थित कहानी से समझाया जाता है
    जो उस समय दिखाई नहीं दे रही थी।
  cause_effect_overconfidence: |
    हम उन परिणामों के स्पष्ट कारण बताते हैं जिनमें कई
    योगदान देने वाले कारक थे।
  luck_minimization: |
    सफलता और असफलता को कौशल और रणनीति से समझाया जाता है,
    भाग्य से नहीं।
  story_over_evidence: |
    एक सम्मोहक कथा सांख्यिकीय साक्ष्य पर हावी हो जाती है।

examples:
  business_success: |
    "वे एक्स के कारण सफल हुए" जब कई कारकों और भाग्य
    को शामिल किया गया था—हम वह कहानी चुनते हैं जो फिट बैठती है।
  investing: |
    बाजार के उतार-चढ़ाव को ऐसी कथाओं से समझाना जो
    संतोषजनक लगे लेकिन बाद की हो सकती हैं।
  history: |
    ऐतिहासिक घटनाओं को अवश्यंभावी प्रगति के रूप में बताया जाता है
    जब वे कई कारकों पर निर्भर थीं।
  career: |
    "मैं यहाँ इसलिए पहुँचा क्योंकि मैंने एक्स किया" जब भाग्य और समय
    ने महत्वपूर्ण भूमिका निभाई।

real_world_implications: |
  नैरेटिव फैलेसी सीखने को विकृत करती है, भविष्यवाणी में अति आत्मविश्वास,
  और सफलता और असफलता का श्रेय देती है।
  यह अतीत को जितना था उससे अधिक पूर्वानुमेय और भविष्य को
  जितना है उससे अधिक पूर्वानुमेय दिखाती है।

professional_application:
  networking_and_relationship_building: |
    जब कोई अपनी सफलता की कहानी सुनाता है, तो याद रखें कि
    यह एक कथा है—सुसंगत और सम्मोहक, लेकिन संभवतः
    सरलीकृत। भाग्य और अनदेखे कारकों को कम महत्व दिया जा सकता है।
  collaborative_learning_initiative: |
    पूर्वव्यापी में, कथा को साक्ष्य से अलग करें।
    पूछें "हम उस समय क्या कहते?" परिणामों के ज्ञात होने से पहले
    अनिश्चितता को पकड़ने के लिए निर्णय पत्रिकाओं का उपयोग करें।

how_can_this_be_misapplied:
  dismissing_all_explanation: |
    कुछ कथाएँ सही होती हैं—सब कुछ
    नैरेटिव फैलेसी नहीं है। कारण मौजूद है।
  excessive_skepticism: |
    "नैरेटिव फैलेसी" के कारण अतीत से सीखने से इनकार करना।
    हम अभी भी उपयोगी सबक निकाल सकते हैं।
  false_randomness: |
    यह मानना कि सब कुछ यादृच्छिक है जब कुछ परिणाम
    सार्थक रूप से एट्रीब्यूटेबल होते हैं।
  undermining_storytelling: |
    संचार और अर्थ के लिए कहानियों का मूल्य होता है—
    फैलेसी यह विश्वास करना है कि वे पूर्ण या
    पूर्वानुमानित हैं, न कि उनका अस्तित्व।

