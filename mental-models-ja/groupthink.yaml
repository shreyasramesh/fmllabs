# 集団思考
# メンタルモデル / 認知バイアス - 事例エントリ

id: groupthink
name: 集団思考

quick_introduction: |
  集団思考とは、結束力の強い集団が、批判的な評価よりも合意と調和を優先する傾向のことです。メンバーは反対意見を抑圧し、自己検閲を行い、集団の認識されている見解に同調します。意見の一致を求める願望が、最良の決定を求める願望を凌駕します。

one_liner: 真実よりも調和—集団は批判的評価よりも合意を優先する。

try_this:
  - 悪魔の代弁者を任命し、反対意見を期待され、安全なものにする。
  - 問いかける：「私たちは何を言っていないだろうか？」「この集団にいなかったら、私たちは何を言うだろうか？」
  - 集団の決定を最終決定する前に、外部の視点を求める。

ask_yourself:
  - 調和を保つために自己検閲をしていないか？
  - 私たちの合意は本物か、それとも同意する圧力の結果か？

in_more_detail: |
  アーヴィング・ジャニスは、外交政策の失敗（ピッグス湾事件、ベトナム戦争）を研究し、パターンを特定しました。それは、無敵の錯覚、集団的合理化、同調への圧力、自己検閲、意見の一致の錯覚、そして反対情報から集団を守るマインドガードです。高い結束力、孤立、ストレスが集団思考を増加させます。

  集団思考は、代替案が真剣に検討されないため、誤った決定につながります。反対意見は不忠と見なされます。集団は自分たちの正しさを過大評価し、リスクを過小評価します。

why_this_is_important: |
  集団思考を認識することは、より良い意思決定のための条件を作り出すのに役立ちます。反対意見を奨励し、外部の視点を取り入れ、 premature consensus ( premature consensus) を避けることです。壊滅的な集団的失敗を避けるために不可欠です。

when_to_use:
  - リーダーシップ
  - 意思決定
  - 問題解決
  - コンフリクト解決

how_can_you_spot_it:
  pressure_for_consensus: |
    反対意見は奨励されないか、罰せられます。同意は報われます。
  illusion_of_unanimity: |
    沈黙は、自己検閲である可能性があるにもかかわらず、同意と解釈されます。
  collective_rationalization: |
    集団は警告を却下し、自分たちの見解を強化します。
  mindguards: |
    メンバーは、合意に異議を唱える可能性のある情報から集団を守ります。

examples:
  bay_of_pigs: |
    ケネディ大統領の顧問たちは、侵攻計画に対する疑念を抑圧しました。その結果は悲惨なものでした。
  corporate_decisions: |
    リーダーシップチームが、誰も反対者になりたくないため、赤信号にもかかわらず合併を推進します。
  product_launches: |
    チームは、全員が計画に投資しており、誰も懸念を表明しないため、欠陥のある製品を出荷します。
  boards: |
    取締役会メンバーは、調和を保つために経営陣の提案を無批判に承認します。

real_world_implications: |
  集団思考は、政策の失敗、企業の災害、機会の損失に寄与します。特に、ハイステークス、ハイストレスの状況では危険です。それを防ぐには、意図的な構造的介入が必要です。

professional_application:
  networking_and_relationship_building: |
    反対意見のための心理的安全性を創出します。懸念を表明した人に感謝します。不快にならずに反対することを模範します。
  collaborative_learning_initiative: |
    悪魔の代弁者、レッドチーム、「プレモータム」を使用します。「premortem」を使用します。支配的な見解に反対する議論を要求します。外部の視点を取り入れます。リーダーはアンカリングを避けるために最後に話します。

how_can_this_be_misapplied:
  false_dissent: |
    「指定された反対者」を作成しても、彼らは本当に反対していない—集団はそれを見抜く。
  excessive_conflict: |
    破壊的な対立と麻痺にまで反対意見を奨励すること。
  dismissing_consensus: |
    すべての合意が集団思考であると仮定すること—時には集団が正しい。
  individualism: |
    集団的な意思決定が不可能な時点まで過剰補正すること。

related_content:
  - false_consensus_effect
  - in_group_bias
  - confirmation_bias
  - bystander_effect
