# Scarcity Bias
# Mental Model / Cognitive Bias - Example Entry

id: scarcity_bias
name: 富豪バイアス

quick_introduction: |
  希少性バイアスとは、物事が希少である、あるいは限定的であると認識されたときに、それらの価値を高く評価する傾向のことです。「期間限定」「残り3点のみ」「限定アクセス」といった言葉は、合理的な評価をしばしば超えて、緊急性と欲求を刺激します。

one_liner: 希少性は知覚価値を増幅させる――「限定」は合理性よりも緊急性を刺激する。

try_this:
  - Ask: それが希少でなかったら、本当に欲しかっただろうか？ 緊急性を排除して考えてみよう。
  - Pause before acting on "limited time" or "only X left" offers. 期間限定や「残りX点」のオファーに飛びつく前に、一度立ち止まろう。
  - Notice when scarcity is driving your desire more than genuine value. 本当の価値よりも希少性が、あなたの欲求をどれだけ強く駆り立てているか気づこう。

ask_yourself:
  - Am I valuing this because it's scarce, or because I actually need it? それは希少だから価値があると思っているのか、それとも本当に必要だから価値があると思っているのか？
  - Would I make this decision without the scarcity framing? 希少性という枠組みがなければ、この決断をしていただろうか？

in_more_detail: |
  希少性は知覚価値を増幅させます。何かが稀少であったり、失われつつある場合、私たちはそれをより欲するようになります。これは、希少性が品質のシグナルとなり得ること、そして損失回避の心理から「機会損失」を恐れるためです。マーケターや交渉人は、緊急性を生み出すために希少性を利用します。このバイアスは、衝動的な決断、過剰な支出、不十分な優先順位付けにつながる可能性があります。

  また、希少性は、真にリソースが限られている人々の認知帯域幅にも影響を与えます。貧困は、他の意思決定における「精神的帯域幅」を低下させる可能性があります。

why_this_is_important: |
  希少性バイアスを認識することで、操作的な戦術に抵抗し、より思慮深い選択をすることができます。また、限定版を過大評価したり、必要もないのに急いだりする理由も説明できます。

when_to_use:
  - 意思決定
  - 交渉
  - 投資
  - リスク評価

how_can_you_spot_it:
  urgency_trigger: |
    「期間限定」や「残りX点」は、不均衡な欲求を生み出す。
  fear_of_missing_out: |
    アクセスを失う可能性が、本来の価値よりも行動を強く駆り立てる。
  impulsive_purchases: |
    必要だからではなく、希少だから物を買ってしまう。
  artificial_scarcity: |
    希少性が、本物ではなく、人為的に製造されている（例：偽のカウントダウン）。

examples:
  sales: |
    「在庫残り2点」や「セールは本日終了」といった言葉は、緊急性がなければ起こらなかったであろう購入を促す。
  auctions: |
    競売では、入札者は勝つことに夢中になり、競争による希少性から予定以上の金額を支払ってしまう。
  exclusivity: |
    「会員限定」や「招待制」のアクセスは、知覚価値を高める。
  genuine_scarcity: |
    リソースが真に限定されている場合、希少性のストレス下にある人々はより悪い決定を下す（例：貧困層、時間がない人々）。

real_world_implications: |
  希少性バイアスは、消費者の行動、交渉の成果、政策対応を左右します。倫理的に（例：正当な締め切り）または非倫理的に（例：偽の希少性）使用される可能性があります。それを理解することで、意思決定の質が向上します。

professional_application:
  networking_and_relationship_building: |
    他者が人為的な希少性を作り出した場合（「クライアントは数名しか受け入れていません」）、注意が必要です。希少性が本物かどうかを確認しましょう。人間関係を築く上で、あなたの時間の真の希少性は価値を示すことができますが、使いすぎは操作的に感じられる可能性があります。
  collaborative_learning_initiative: |
    イニシアチブの緊急性を高める際には、それが正当であることを確認してください。偽の締め切りは、発覚した際に信頼を失わせます。

how_can_this_be_misapplied:
  manipulation: |
    他人を意思決定に追い込むために、意図的に偽の希少性を作り出すこと。
  impulsive_decisions: |
    より多くの時間が成果を向上させる可能性があるにもかかわらず、人為的な緊急性の中で重要な選択をしてしまうこと。
  overvaluing_scarcity: |
    希少なものが常に優れていると仮定してしまうこと――時として希少性は恣意的である。
  exploiting_vulnerability: |
    既にリソースのストレス下にある人々に対して、希少性戦術を利用すること。

