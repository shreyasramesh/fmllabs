# インパクトバイアス (Impact Bias)
# メンタルモデル / 認知バイアス - 例

id: impact_bias
name: インパクトバイアス

quick_introduction: |
  インパクトバイアスとは、将来の出来事に対する感情的な反応の激しさや持続時間を過大評価する傾向のことです。良い出来事は期待していたほど幸福感を高めず、悪い出来事は期待していたほど不幸にしないと考えてしまいます。私たちは感情予測が苦手なのです。

one_liner: 出来事が私たちの幸福にどれほど影響するか、そしてその期間を過大評価してしまう。

try_this:
  - 尋ねる：似たような過去の出来事の後、どう感じたか？私たちは予想よりも早く適応する。
  - 予測される影響によって意思決定をしない—感情の予測は苦手である。
  - 単一の結果による持続的な影響を過大評価しているときに気づく。

ask_yourself:
  - この気分がどれくらい続くかを過大評価していませんか？
  - 過去の経験は、似たような出来事について何を語っていますか？

in_more_detail: |
  ダニエル・ギルバートとティモシー・ウィルソンは感情予測の研究をしています。私たちは、勝利後の幸福感や敗北後の不幸感がどれだけ続くかを過大評価します。私たちは予想よりも早く適応します。また、単一の出来事の影響を過大評価します。一つの結果が私たちの幸福を決定すると考えがちですが、実際には多くの要因が幸福に寄与しています。将来の感情を予測する際に、私たちは間違ったことに焦点を当てがちです。

  インパクトバイアスは、昇進、人間関係、購入といった人生の重要な意思決定にも影響を与えます。私たちは、昇進、関係、購入が私たちの幸福をどれだけ変えるかを過大評価します。また、喪失による持続的な痛みを過大評価します。

why_this_is_important: |
  インパクトバイアスを認識することは、実際にあなたの人生を改善するものをより良く決定するのに役立ちます。それは、あなたが考えているほど重要ではない結果への過剰な投資を減らし、あなたが予想しているほど長くは続かない結果への恐怖を減らします。

when_to_use:
  - 意思決定 (decision-making)
  - キャリアの選択 (career_moves)
  - リスク評価 (risk_assessment)
  - 関係構築 (relationship_building)

how_can_you_spot_it:
  overestimated_impact: |
    「これはすべてを変えるだろう」—似たような過去の出来事が、持続的な影響はさほどなかったにもかかわらず。
  duration_overestimation: |
    「もう立ち直れない」—私たちは通常、予想よりも早く適応するにもかかわらず。
  focalism: |
    一つの出来事に焦点を当て、幸福度に影響を与える他の要因を無視する。
  adaptation_neglect: |
    良い状況にも悪い状況にも適応することを忘れている。

examples:
  career: |
    「この昇進が決まれば、もっと幸せになれる」—過去の昇進は一時的な影響しかなかったにもかかわらず。
  purchases: |
    「この車があれば幸せになれる」—新しさはすぐに薄れるのに。
  loss: |
    「この失恋から立ち直れない」—通常、数ヶ月で適応するのに。
  events: |
    結婚式、休暇、節目となる出来事が、長期的な幸福にどれだけ影響するかを過大評価する。

real_world_implications: |
  インパクトバイアスは、お金、キャリア、人間関係に関する誤った意思決定につながります。私たちは、適応してしまう経験にお金を払いすぎ、回復できる喪失を過度に恐れます。これは、政策や個人の計画にも影響を与えます。

professional_application:
  networking_and_relationship_building: |
    キャリアや人間関係の意思決定をする際には、似たような過去の出来事の後、どのように感じたかを考慮してください。その影響は予想していたほど長く続きましたか？それを将来の予測の調整に利用してください。
  collaborative_learning_initiative: |
    チームが失敗や成功に直面したとき、適応することを思い出させてください。「私たちは予想よりも早く適応するだろう」ということは、過剰な祝賀と過剰な絶望の両方を減らすことができます。

how_can_this_be_misapplied:
  dismissing_all_impact: |
    トラウマや大きな喪失など、一部の出来事には永続的な影響があります。感情予測のすべてがバイアスであると軽視しないでください。
  cold_rationality: |
    「気にする必要はない」—その瞬間の経験は、実際には重要であるにもかかわらず。
  undervaluing_experiences: |
    「どうせ適応するだろう」と考えて、肯定的な経験を避けること。
  invalidating_emotions: |
    人々がその瞬間にサポートを必要としているのに、「その感情はすぐに過ぎ去る」と伝えること。

