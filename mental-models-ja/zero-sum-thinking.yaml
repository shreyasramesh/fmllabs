# Zero-Sum Thinking
# Mental Model / Cognitive Bias - Example Entry

id: zero_sum_thinking
name: ゼロサム思考

quick_introduction: |
  ゼロサム思考とは、誰かの利益は誰かの損失でなければならない、つまり資源は固定されており、自分にとってのどんな有利も私にとっての不利になるという考え方です。実際には、多くの状況はポジティブサム（両者が利益を得られる）です。

one_liner: あなたの利益が私の損失である必要はありません—多くの状況はポジティブサムです。

try_this:
  - Ask: パイを拡大することはできますか？これは本当にゼロサムですか？
  - Look for cooperation before assuming competition.  競争を前提とする前に協力を探してください。
  - Notice when you're treating a situation as fixed-pie when it isn't.  そうでない状況を固定パイとして扱っていることに気づいてください。

ask_yourself:
  - Am I assuming a fixed pie when we could expand it?  拡大できるのに固定パイを前提としていませんか？
  - Would cooperation create more value than competition?  競争よりも協力をすることで、より多くの価値が生まれませんか？

in_more_detail: |
  ゼロサムゲームでは、合計は固定されています—あなたの利益は私の損失です。ポジティブサムの状況では、協力が価値を創造します。貿易、イノベーション、関係構築はしばしばポジティブサムです。ゼロサム思考は、不必要な競争、協力の機会の損失、そして破壊的な対立につながります。

  このバイアスは、交渉、政治、組織力学において一般的です。パイがしばしば拡大できるにもかかわらず、固定パイであると仮定します。それは自己成就的になる可能性があります：もしあなたが他人を敵対者として扱えば、彼らは敵対者になります。

why_this_is_important: |
  ゼロサム思考を認識することは、協力と価値創造の機会を開きます。交渉を改善し、対立を減らし、Win-Winの結果を可能にします。最良の機会の多くはポジティブサムです。

when_to_use:
  - negotiation  交渉
  - leadership  リーダーシップ
  - relationship_building  関係構築
  - decision-making  意思決定

how_can_you_spot_it:
  fixed_pie_assumption: |
    状況によっては両者が得られる可能性があるのに、「彼らが勝てば私は負ける」
  competitive_ framing: |
    状況を自動的に「私たち対彼ら」と捉えること。
  envy_of_others_gains: |
    自分のものを減らすかのように、他人の成功を羨むこと。
  missed_cooperation: |
    全員に利益をもたらす協力の機会を見逃すこと。

examples:
  negotiation: |
    相手にとってより良い取引は自分にとってより悪い取引を意味すると仮定すること—創造的な解決策がしばしば両者にとって価値を拡大させるにもかかわらず。
  salary: |
    「同僚が昇給したら、私に回ってくる分が減る」—予算は柔軟であったり、生み出された価値によって昇給が正当化される場合があるにもかかわらず。
  politics: |
    「彼らの党の利益は私たちの損失だ」—多くの政策結果は複数のグループに利益をもたらす可能性があるにもかかわらず。
  career: |
    「彼らの昇進は私の機会を減らす」—組織の成長が皆のためにより多くの機会を生み出す可能性があるにもかかわらず。

real_world_implications: |
  ゼロサム思考は対立を煽り、協力を制限し、機会損失を引き起こします。経済、人間関係、イノベーションにおいてはしばしば誤っています。ポジティブサムのフレームワークに移行することで、結果が改善されます。

professional_application:
  networking_and_relationship_building: |
    他者に価値を創造する方法を探してください—彼らの成功はあなたに機会をもたらす可能性があります。両当事者が利益を得られる関係を構築してください。
  collaborative_learning_initiative: |
    チームの目標をポジティブサムとして捉えてください：共有された成功、パイの拡大。社内競争よりも協力を奨励してください。

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    状況によってはゼロサム（例：単一の昇進、固定予算）である場合があります。それを無視するとナイーブになる可能性があります。
  naive_cooperation: |
    一部の俳優が本当に敵対的である場合に、全員が協力すると仮定すること。
  undervaluing_competition: |
    競争は改善を促進することができます；すべての対立が破壊的であるわけではありません。
  exploitation: |
    利益を得ていない他者から価値を抽出するために「ポジティブサム」のフレーミングを使用すること。

