# バラ色の回顧
# メンタルモデル / 認知バイアス - 例エントリ

id: rosy_retrospection
name: バラ色の回顧

quick_introduction: |
  バラ色の回顧とは、過去を実際よりも良く覚えてしまう傾向のことです。
  私たちは時間の経過とともに過去の経験をより肯定的に思い出し、困難を円滑にし、良い点を増幅させます。「あの頃は良かった」というのは、しばしば私たちが覚えているほど良かったわけではありません。

one_liner: 過去を実際よりも良く覚えてしまう――「あの頃は良かった」は、それほど良くはなかった。

try_this:
  - 過去と比較する際は、次のように尋ねてください：あの時、私は本当にどう感じていたのだろうか？
  - 後で記憶と現実を比較するために、日記をつけましょう。
  - ノスタルジアが現在の判断を歪めていることに気づきましょう。

ask_yourself:
  - 過去を理想化していませんか？
  - もしタイムトラベルして過去に戻れたとしたら、あの時幸せだっただろうか？

in_more_detail: |
  私たちは過去の経験の良い側面を思い出し、悪い点を忘れがち、あるいは軽視しがちです。休暇、仕事、人間関係は、その時よりもノスタルジアの中でより良く感じられます。これは非現実的な比較につながる可能性があります――私たちは理想化された過去と現在を比較して判断します。

  バラ色の回顧は、過去の選択を（記憶されている）同じ結果を期待して繰り返す際に、意思決定に影響を与えます。また、客観的に見てより悪かった時代へのノスタルジアを煽ることもあります。これは記憶におけるネガティビティバイアスの反対です。

why_this_is_important: |
  バラ色の回顧を認識することは、より現実的な比較を行い、理想化された記憶に基づいた過去の過ちの繰り返しを避けるのに役立ちます。また、現在の進歩にもかかわらず、なぜ私たちが過去を恋しく思うことがあるのかを説明します。

when_to_use:
  - 意思決定
  - キャリアの選択
  - 関係構築
  - 学習

how_can_you_spot_it:
  idealized_past: |
    客観的な指標がそうでないことを示している場合でも、「あの頃はもっと良かった」と思う。
  selective_positive_memory: |
    過去の経験の良い点を覚えていて、悪い点を忘れている。
  nostalgia_as_evidence: |
    過去の選択が正しかった証拠として、懐かしい思い出を使う。
  present_undervaluation: |
    理想化された過去と比較するため、現在が実際よりも悪く感じられる。

examples:
  career: |
    「前の仕事は素晴らしかった」――実際には良い理由があって辞めたのに、記憶はフラストレーションを円滑にしている。
  relationships: |
    過去の人間関係について「私たちはとても幸せだった」――別れにつながった対立を忘れている。
  childhood: |
    「私の時代は子供はもっと恵まれていた」――多くの客観的な指標（健康、安全、機会）が改善しているにもかかわらず。
  projects: |
    「あのプロジェクトは順調に進んだ」――実際には多くの遅延があったのに、プロセスではなく結果を覚えている。

real_world_implications: |
  バラ色の回顧は、人生の満足度、キャリアの決定、ノスタルジアに駆られた選択に影響を与えます。過去の過ちの繰り返しや非現実的な比較につながる可能性があります。また、「あの頃は良かった」というレトリックの魅力を説明します。

professional_application:
  networking_and_relationship_building: |
    過去の同僚と再会したり、過去の役割に戻ることを検討する際は、ノスタルジアと現実を区別しましょう。当時辞めた理由を記録し、戻る前にそれらを見直しましょう。
  collaborative_learning_initiative: |
    振り返りの際には、記憶ではなく、その時点での記録やデータを使用して、実際に何が起こったのかを評価しましょう。記憶は困難を円滑にします。

how_can_this_be_misapplied:
  dismissing_nostalgia: |
    すべてのノスタルジアが誤解を招くわけではありません――時には過去の方が、ある意味では実際に良かったこともあります。
  invalidating_memories: |
    人々に、彼らの肯定的な記憶は「間違っている」と伝える――それは本当の主観的な経験を反映しているかもしれません。
  overcorrection: |
    過去は常に私たちが覚えているよりも悪かったと仮定すること――時には、それはより良かったのです。
  present_bias: |
    バラ色の回顧を、現在の衰退に関する正当な懸念を無視する言い訳として使用すること。

related_content:
  - hindsight_bias
  - negativity_bias
  - availability_heuristic
  - impact_bias
