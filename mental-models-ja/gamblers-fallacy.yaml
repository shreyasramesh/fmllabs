id: gamblers_fallacy
name: ギャンブラーの誤謬

quick_introduction: |
  ギャンブラーの誤謬とは、過去の独立した事象が将来の事象に影響を与えるという誤った信念です。連続して表が出た後、私たちは裏が出る「番」だと考えがちですが、実際には各コイン投げは独立しています。私たちはランダム性の中にパターンを見出し、必要のない「修正」や「反転」を期待してしまうのです。

one_liner: 過去の独立した事象は将来の事象に影響しません――コインに記憶はありません。

try_this:
  - 「そろそろ勝つ番だ」と思ったとき、自問してください：これらの事象は実際に独立していますか？
  - 平均への回帰（現実）とギャンブラーの誤謬（誤り）を区別しましょう。
  - ランダム性の中にパターンを見出していることに気づきましょう。

ask_yourself:
  - 独立した事象であるにもかかわらず、過去の結果が将来の結果に影響すると仮定していませんか？
  - 統計学者は私の「変化の番だ」という推論に同意するでしょうか？

in_more_detail: |
  公正なコイン投げでは、各投げは独立しています。表が出る確率は、過去の結果に関わらず常に50%です。しかし、私たちは一方の結果が長く続くと、もう一方が出やすくなると感じてしまいます。私たちは、多数回の試行で結果が平均化される「大数の法則」と、短期的な「修正」を混同してしまうのです。カジノに記憶はありません。

  この誤謬は、ギャンブル、投資、そして日々の意思決定に影響を与えます。「運」が均衡を取るだろうとか、「そろそろ勝つ番だ」と期待してしまいます。時には正しいこともありますが、それは間違った理由からです。

why_this_is_important: |
  ギャンブラーの誤謬を認識することで、ギャンブルや投資における高額な間違いを防ぐことができます。また、短期的な傾向を過剰に解釈したり、誤った反転を期待したりすることを避けるのに役立ちます。これは、真の平均への回帰と誤謬とを区別するのに重要です。

when_to_use:
  - 意思決定
  - 投資
  - リスク評価
  - 問題解決

how_can_you_spot_it:
  due_for_a_change: |
    「負けが続いた――そろそろ勝つ番だ。」
  pattern_in_randomness: |
    ランダムな数列の中に意味のあるパターンを見出すこと。
  hot_hand_fallacy: |
    連勝が続くと信じること（関連するが逆の誤り）。
  independence_ignorance: |
    独立した事象を、関連しているかのように扱うこと。

examples:
  gambling: |
    ルーレットで赤が何回か出た後、「赤がこれ以上続くはずがない」といって黒に賭ける。
  investing: |
    「市場は下落した――上がるに違いない。」
  hiring: |
    「何人かひどい候補者を採用してしまった――次はきっと良い人材に違いない。」
  sports: |
    「彼はたくさん外しすぎた――次のシュートは決める番だ。」

real_world_implications: |
  ギャンブラーの誤謬は、ギャンブルでの損失や不十分な投資判断の原因となります。また、短期的なパターンの過剰解釈を説明するものでもあります。真の平均への回帰（回帰すべき実際の平均が存在する場合）と区別することが重要です。

professional_application:
  networking_and_relationship_building: |
    過去の関係性の力学が将来「修正される」と仮定しないでください――各やり取りはいくぶん独立しています。ただし、真の根本原因がある場合は、パターンから学ぶこともできます。
  collaborative_learning_initiative: |
    パフォーマンスを評価する際は、ランダムな変動と体系的な変化を区別してください。短期的な傾向はノイズである可能性があります。「連勝」に過剰に反応したり、誤った反転を期待したりしないでください。

how_can_this_be_misapplied:
  ignoring_regression: |
    平均への回帰は（例えば、スキルのパフォーマンスなど）現実的な場合があります。すべての反転をギャンブラーの誤謬として却下しないでください。
  false_independence: |
    （同じものの繰り返し測定など）実際には独立していない事象を独立していると仮定すること。
  overcorrection: |
    回帰すべき実際の平均があるのに、決して反転を期待しないこと。
  dismissing_patterns: |
    パターンの中には現実のものもあります――すべての数列がランダムなわけではありません。

