# パレートの法則
# メンタルモデル / 認知バイアス - サンプルエントリ

id: pareto_principle
name: パレートの法則

quick_introduction: |
  パレートの法則（または80/20ルール）は、結果の約80％が原因の約20％から生じるというものです。
  入力のわずかな少数派が、しばしば出力の大多数を生み出します。
  売上、バグ、顧客、労力、機能など、多岐にわたります。
  重要な少数に焦点を当てましょう。

one_liner: 結果の80％が原因の20％からもたらされる — 重要な少数に焦点を当てましょう。

try_this:
  - 結果の80％を生み出す入力の20％を特定し、そこに注力しましょう。
  - ほとんど成果を生まない80％を削減するか、優先度を下げましょう。
  - 問いかけましょう：「もし私がうまくやれば、最も重要になる少数のことは何だろうか？」

ask_yourself:
  - いくつかのことがより重要であるにもかかわらず、努力を均等に分散させていないか？
  - 私のレバレッジの高い20％は何だろうか？

in_more_detail: |
  ヴィルフレド・パレートは、イタリアの土地の80％が人口の20％によって所有されていることを観察しました。
  この法則は一般化されています。顧客の20％から売上の80％、コードの20％からバグの80％、労力の20％から結果の80％。
  正確な比率は変動しますが、パターンの不均一な分布は一般的です。

  この法則は、レバレッジの高い20％を特定し、それに焦点を当てることで、結果を劇的に改善できることを示唆しています。
  これは物理法則ではなく、優先順位付けのヒューリスティックです。

why_this_is_important: |
  パレートの法則を適用することで、徹底的な優先順位付けが可能になり、低影響の活動への労力の浪費を防ぎ、より少ない労力でより多くのことを達成できます。
  生産性と戦略の基本です。

when_to_use:
  - 意思決定
  - 問題解決
  - リーダーシップ
  - キャリアにおける選択

how_can_you_spot_it:
  uneven_distribution: |
    Xのわずかな割合がYの大部分を占める。
  high_leverage_activities: |
    少数の行動がほとんどの結果を生み出す。
  low_value_tail: |
    多くの活動はわずかな貢献しかしない；それらを削減しても影響は最小限である。
  vital_few_vs_trivial_many: |
    重要なのは、最も重要な少数を特定することである。

examples:
  sales: |
    顧客の20％が収益の80％を生み出している — 彼らを維持し、成長させることに集中しましょう。
  software: |
    機能の20％が利用の80％を促進している — それらを優先しましょう。
  productivity: |
    習慣やルーチンのいくつかが、あなたの出力のほとんどを生み出している — それらに注力しましょう。
  problems: |
    バグの20％がクラッシュの80％を引き起こしている — まずそれらを修正しましょう。

real_world_implications: |
  パレートの法則は、リソース配分、製品戦略、個人の生産性を指針します。
  それを無視すると、労力が分散しすぎてしまいます。
  過度に適用すると、「ロングテール」の無視につながる可能性があります。

professional_application:
  networking_and_relationship_building: |
    あなたの目標にとって最も重要な関係を特定しましょう。
    労力を均等に分散させるのではなく、それらに不均衡に投資しましょう。
  collaborative_learning_initiative: |
    チームのパフォーマンスを向上させる際には、結果の80％を推進する介入の20％を見つけましょう。
    トレーニングやプロセス変更をそこに集中させましょう。

how_can_this_be_misapplied:
  oversimplification: |
    80/20がどこにでも当てはまると想定すること；一部の分布はより均一です。
  neglecting_the_tail: |
    それらが全体として重要である場合（例：多くの小規模顧客、エッジケース）に「些細な多数」を無視すること。
  false_precision: |
    80/20を文字通りではなく、おおまかなヒューリスティックとして扱うこと。
  misidentifying_the_vital_few: |
    誤った分析により、間違った20％に焦点を当てること。

