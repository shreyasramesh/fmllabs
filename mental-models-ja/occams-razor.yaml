# Occam's Razor
# Mental Model / Cognitive Bias - Example Entry

id: occams_razor
name: オッカムの剃刀

quick_introduction: |
  オッカムの剃刀（またはオッカムの原則）とは、競合する仮説の中から、最も仮定の少ないものを優先すべきであるという原則です。単純な説明は、常に正しいわけではありませんが、しばしば正しいのです。

one_liner: 証拠に合致する最も単純な説明を優先する。

try_this:
  - 理論を比較する際には、どちらが仮定が少ないかを尋ねてください。
  - それを要求する証拠なしに複雑さを加えないでください。
  - 単純な説明よりも複雑な説明を好んでいることに気づいてください。

ask_yourself:
  - 不必要な複雑さを導入していませんか？
  - 証拠はこのレベルの説明を要求していますか？

in_more_detail: |
  ウィリアム・オブ・オッカムにちなんで名付けられたこの原則は、単純な説明が常に真実であると主張するものではありません。証拠なしに不必要な複雑さを導入すべきではないことを示唆しています。2つの理論が同じ現象を説明する場合、証拠がそう要求するまで、より単純な方が好ましいです。

  オッカムの剃刀は法則ではなく、ヒューリスティック（発見的手法）です。時には、正しい説明は複雑な場合があります。しかし、それは過学習、陰謀論、および不必要な複雑化から保護します。それは説明における簡潔さを支持します。

why_this_is_important: |
  オッカムの剃刀を適用することで、問題解決が改善され、モデルの過学習が減り、複雑で裏付けのない理論を回避するのに役立ちます。証拠が曖昧な場合の有用なデフォルトです。

when_to_use:
  - 問題解決
  - 意思決定
  - 学習
  - リスク評価

how_can_you_spot_it:
  unnecessary_complexity: |
    より少ない仮定で十分な場合に、多くの仮定を呼び出す説明。
  conspiracy_tendencies: |
    単純な原因で説明できる出来事に対して、複雑で多主体的な説明。
  overfitting: |
    過去のデータを完全に説明するが、新しいデータでは失敗するモデルまたは理論。
  elegance_in_explanation: |
    最良の説明は、しばしば後から考えると「明白」に感じられます。

examples:
  debugging: |
    バグが発生した場合、アーキテクチャ上の問題と仮定する前に、最も単純な原因（例：タイポ、間違った設定）を確認してください。
  conspiracy_theories: |
    「政府がXを組織した」は多くの隠された関係者を必要とします。「数人が間違いを犯した」の方が単純です。
  product_failure: |
    ユーザーが機能を採用しない。最も単純な説明は、UIに混乱しているのではなく、彼らの問題を解決していないということです。
  medical_diagnosis: |
    「一般的なものが一般的である」—まれな診断の前に、頻繁な診断を検討してください。

real_world_implications: |
  オッカムの剃刀は、科学的探求、工学、および日常的な推論を導きます。それは、複雑で間違った理論への無駄な労力を削減します。誤って適用されると、真に複雑な現象を却下する可能性があります。

professional_application:
  networking_and_relationship_building: |
    他者の行動を解釈する際には、悪意や複雑な動機を想定する前に、単純な説明（彼らは忙しい、忘れた）を優先してください。
  collaborative_learning_initiative: |
    問題解決セッションでは、複雑なモデルを構築する前に、「最も単純な説明は何ですか？」と明示的に尋ねてください。

how_can_this_be_misapplied:
  oversimplification: |
    「複雑すぎる」という理由で、妥当な複雑な説明を却下すること。
  status_quo_bias: |
    オッカムの剃刀を使用して、新しいが正しい説明よりも、慣れ親しんだ説明を優先すること。
  scientific_rigidity: |
    証拠が裏付けている場合でも、より複雑であるという理由で新しい理論を拒否すること。
  missing_nuance: |
    一部の領域（例：人間の行動、生態系）は本質的に複雑です。単純さは誤解を招く可能性があります。

