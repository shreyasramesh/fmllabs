# Ambiguity Effect
# Mental Model / Cognitive Bias - Example Entry

id: ambiguity_effect
name: あいまいさ効果

quick_introduction: |
  あいまいさ効果とは、結果の確率に関する情報がない場合に、選択肢を避ける傾向のことです。
  たとえ未知のリスクの方が優れている可能性がある場合でも、私たちは既知のリスクを未知のリスクよりも好みます。
  不確実性そのものが嫌悪感を与えます。

one_liner: たとえ未知の方が優れている可能性がある場合でも、私たちは既知のリスクを未知のリスクよりも好みます。

try_this:
  - Ask: Am I avoiding this option mainly because of uncertainty, or is there a real downside? (この選択肢を避けているのは、主に不確実性のせいなのか、それとも実際に欠点があるのか？)
  - Quantify what you do know; sometimes the ambiguous option has clearer upside. (分かっていることを定量化してください。あいまいな選択肢の方が、より明確なメリットがある場合もあります。)
  - Notice when you default to the familiar just because it feels safer. (より安全だと感じるという理由だけで、慣れ親しんだものにデフォルトしていることに気づいてください。)

ask_yourself:
  - Am I rejecting something because it's ambiguous, or because it's genuinely worse? (あいまいだから、それとも本当に悪いから、何かを拒否しているのだろうか？)
  - What would I need to know to feel comfortable with the uncertain option? (不確実な選択肢に納得するために、何を知る必要があるだろうか？)

in_more_detail: |
  エルズバーグのパラドックスでは、人々は、たとえ未知の壺の方が有利な確率を提供する可能性がある場合でも、
  割合が既知の壺への賭けを、割合が未知の壺への賭けよりも好みます。
  私たちはあいまいさを嫌います。不明確な確率よりも、明確な（たとえ悪い）確率を望みます。

  この効果は、投資、キャリア選択、政策決定に影響を与えます。
  あいまいだが潜在的に優れた選択肢を避けることで、最適ではない選択につながる可能性があります。
  また、なぜ私たちが馴染みのあるブランドや既知の数量を好むのかも説明しています。

why_this_is_important: |
  あいまいさ効果を認識することは、馴染みのあるものを過度に好み、不確実なものを過小評価することを避けるのに役立ちます。
  あいまいさが管理可能である場合に、機会を逃す可能性があります。
  また、透明性と明確さが不安を軽減する理由も説明しています。

when_to_use:
  - decision-making
  - risk_assessment
  - investing
  - career_moves

how_can_you_spot_it:
  preference_for_known_risks: |
    あいまいなものよりも、明確な（たとえ悪い）確率を持つ選択肢を選ぶこと。
  avoidance_of_uncertainty: |
    「十分な情報がない」という理由で選択肢を拒否すること。
  familiarity_over_optimality: |
    未知の、より優れた可能性よりも、既知のものを好むこと。
  information_seeking: |
    あいまいさを減らすための情報にお金を払う意思があること。たとえそれが決定を変えなくても。

examples:
  investing: |
    分散投資のメリットがあるにもかかわらず、「より理解している」という理由で、
    国内株を国際株よりも好むこと。
  employment: |
    不確実なアップサイドのある役職に就くよりも、既知の仕事にとどまること。
  product_choice: |
    不確実な品質の新しい選択肢よりも、馴染みのあるブランドを選ぶこと。
  medical: |
    たとえ後者の方が良い場合でも、副作用が既知の治療法を、結果が不確実な治療法よりも好むこと。

real_world_implications: |
  あいまいさ効果は、市場、キャリア選択、政策を形成します。
  より明確な情報を提供したり、決定を再構築したりすることで軽減できます。
  また、透明性とコミュニケーションが不安を軽減する理由も説明しています。

professional_application:
  networking_and_relationship_building: |
    人間関係におけるあいまいさを減らす：期待を明確にし、明確にコミュニケーションを取り、不確実性を減らします。
    人々は既知の状況を好みます。
  collaborative_learning_initiative: |
    変化を導入する際は、あいまいさを減らします。何が起こるか、いつ、なぜ起こるかについて明確な情報を提供します。
    あいまいさは抵抗を増加させます。

how_can_this_be_misapplied:
  manipulation: |
    人々を好ましい選択肢に誘導するために、意図的にあいまいさを作り出すこと。
  false_clarity: |
    真の不確実性が存在する際に、偽の確実性を提供すること。
  overconfidence: |
    あいまいさを減らすことが常に決定を改善すると仮定すること。時にはあいまいな選択肢の方が本当に良い場合もあります。
  analysis_paralysis: |
    一部のあいまいさが避けられない状況で、決定を下す前に完璧な情報を待つこと。

