# サンクコストの誤謬
# メンタルモデル / 認知バイアス - 例エントリ

id: sunk_cost_fallacy
name: サンクコストの誤謬

quick_introduction: |
  サンクコストの誤謬とは、将来の期待リターンに基づいてではなく、
  すでに費やしたリソースのために、意思決定を継続する傾向のことです。
  「ここまで来たのだから」とか「もうたくさん投資した」という考えは、
  悪いものにさらに良いものを投げ込むことにつながります。

one_liner: 過去の投資は失われたもの—将来のコストと利益のみが重要です。

try_this:
  - Ask: もし今日から始めるなら、この道を選びますか？
  - Define "kill criteria" in advance—conditions under which you'll stop. （事前に「終了基準」を定義する—停止する条件。）
  - Evaluate the marginal decision: what do I gain or lose from here forward? （限界的な決定を評価する：ここから先、何を得て何を失うか？）

ask_yourself:
  - Am I continuing because of future value, or to justify past investment? （将来の価値のため、それとも過去の投資を正当化するために続けていますか？）
  - What would I advise a friend who was in my position from scratch? （ゼロから私の立場にいる友人に、何をアドバイスしますか？）

in_more_detail: |
  サンクコストとは、回収できない過去のコストのことです。
  合理的な意思決定は、それを無視します—将来のコストと利益のみが重要です。
  しかし、私たちは投資に感情的に結びついています。
  楽しめない食事を最後まで食べたり、気に入らない映画を見続けたり、
  もはや意味をなさなくなったプロジェクトを続けたりします。
  私たちは、入れたものを「無駄にしたくない」と思いますが、
  続けることはしばしばさらに無駄になります。

  この誤謬は、金銭だけでなく、時間、労力、アイデンティティを投資した場合に特に強く現れます。
  自分が間違っていたことを認めることは、コストがかかると感じられるため、私たちはさらに深みにはまります。

why_this_is_important: |
  サンクコストの誤謬を認識することは、損失を削減し、必要に応じて方向転換し、
  過去の投資ではなく将来の価値に基づいて意思決定を行うのに役立ちます。
  これはプロジェクト、キャリア、人間関係において不可欠です。

when_to_use:
  - 意思決定
  - 投資
  - キャリアの選択
  - リスク評価

how_can_you_spot_it:
  continuing_because_of_past_investment: |
    「もうXも使ったのだから、今止めることはできない」が、将来のリターンが継続を正当化しない場合。
  escalation_of_commitment: |
    過去の投資を正当化するため、または「救済」するために、さらに投資すること。
  identity_investment: |
    失敗を認めることが自己イメージを脅かすため、継続すること。
  ignoring_marginal_analysis: |
    増分コストと利益ではなく、総コストに基づいて意思決定すること。

examples:
  projects: |
    「もう6ヶ月も費やしたのだから、今止めることはできない」として、
    損失を削減することが合理的であるにもかかわらず、失敗したプロジェクトを継続すること。
  relationships: |
    将来を評価するのではなく、「もう5年も一緒にいるのだから」として、
    関係にとどまること。
  careers: |
    学位や経験年数に投資したため、嫌いなキャリアにとどまること。
  investments: |
    より良い機会に再配分するのではなく、「元に戻る」ために損失を出している株を保有し続けること。

real_world_implications: |
  サンクコストの誤謬は、リソースの無駄遣い、失敗の長期化、機会の損失を引き起こします。
  個人、組織、政府に影響を与えます。
  これを克服するには、明確な意思決定フレームワークが必要です。

professional_application:
  networking_and_relationship_building: |
    過去の投資のためだけに、もはやあなたに役立たない関係や協力関係に投資を続けるのをやめましょう。
    将来を見据えた価値を評価してください。
  collaborative_learning_initiative: |
    プロジェクトのために「終了基準」を作成しましょう—過去の投資に関係なく停止する条件です。
    「ゼロから」というレンズでプロジェクトを定期的に見直しましょう。

how_can_this_be_misapplied:
  quitting_too_early: |
    「サンクコスト」を、成果が出るまでにもっと時間が必要なものを放棄する言い訳として使用すること。
  undervaluing_consistency: |
    一部のコミットメント（例：人間関係、評判）は、純粋な限界分析が見落とす継続性において価値があります。
  cold_rationality: |
    感情的な愛着が本物の価値を反映している可能性がある場合に、それを非合理的として却下すること。
  analysis_paralysis: |
    答えが明確であるにもかかわらず、継続すべきかどうかを考えすぎる（分析麻痺）。

