# Base Rate Fallacy
# Mental Model / Cognitive Bias - Example Entry

id: base_rate_fallacy
name: ベイジアン・フォールシー（基本確率の誤謬）

quick_introduction: |
  ベイジアン・フォールシーとは、特定の鮮明な情報に飛びついて、一般的な統計情報（基本確率）を無視する傾向のことです。個別の事例を過大評価し、事前確率を過小評価してしまいます。説得力のある一つの話が、数字が示すものを覆してしまうことがあります。

one_liner: 説得力のある話は、数字が示すものを覆してしまうことがある。

try_this:
  - 事例を判断する前に、こう問いかけよう：この種の状況における基本確率はどのくらいか？
  - 個別の証拠と事前確率を組み合わせよう――どちらも無視しないこと。
  - 一つの鮮明な事例が統計を覆してしまっているときに、それに気づこう。

ask_yourself:
  - この個別の事例を過大評価し、基本確率を過小評価していないか？
  - 説得力のある話を脇に置いた場合、数字はどうなるだろうか？

in_more_detail: |
  もし、ある病気が人口の1%に影響するとし、その検査の精度が95%だったとしても、陽性反応が出たとしても、その人が病気である可能性は低い――なぜなら、基本確率が非常に低いからだ。しかし、私たちは基本確率を無視して「検査で陽性になった」ということに集中してしまう。私たちは統計よりも、個別の情報に流されてしまう。

  この誤謬は、医療診断、採用、リスク評価、法的な判断に影響を与えます。私たちは、ベイジアン推論を用いて、基本確率と個別の証拠を組み合わせる必要がある――しかし、私たちはしばしばそうしない。

why_this_is_important: |
  ベイジアン・フォールシーを修正することで、診断、リスク評価、意思決定の質が向上します。鮮明な事例に過剰に反応したり、統計的な現実を過小評価したりするのを防ぐことができます。

when_to_use:
  - 意思決定
  - リスク評価
  - 問題解決
  - 投資

how_can_you_spot_it:
  ignoring_prior_probabilities: |
    判断に基本確率が考慮されていない。
  vividness_over_statistics: |
    単一の事例や話が、集計データよりも優位に立っている。
  diagnostic_overweighting: |
    基本確率を考慮せずに、新しい証拠（例：検査結果）を過大評価している。
  anecdote_override: |
    「私が知っている人には…」という話が、統計的証拠を覆してしまう。

examples:
  medical: |
    まれな病気の陽性検査結果――基本確率が低いため、陽性結果はしばしば偽陽性だ。私たちはこれを無視し、病気であると仮定してしまう。
  hiring: |
    候補者が面接で素晴らしい――面接が業績を予測する確率の基本確率を無視してしまう。
  risk: |
    飛行機事故は鮮明だ――私たちは飛行のリスクを過大評価し、自動車事故のリスクを過小評価し、基本確率を無視してしまう。
  startup_investing: |
    創業者がうまくピッチする――ピッチの質に関わらず、ほとんどのスタートアップが失敗するという基本確率を無視してしまう。

real_world_implications: |
  ベイジアン・フォールシーは、医療上の意思決定、法的な判断、ビジネス戦略に影響を与えます。資源の誤配分や不十分なリスク評価の原因となります。ベイジアン思考はこれを修正します。

professional_application:
  networking_and_relationship_building: |
    人々を評価する際には、基本確率を考慮しよう：例えば、この種の行動はどのくらいの頻度で起こるか？一つの鮮明なやり取りが、より広範なパターンを覆さないようにしよう。
  collaborative_learning_initiative: |
    意思決定を行う際には、個別の証拠を組み込む前に、明示的に基本確率を述べ、考慮する。チームにベイジアン推論のトレーニングを行う。

how_can_this_be_misapplied:
  base_rate_tyranny: |
    基本確率がそう示唆しているにもかかわらず、強力な個別の証拠を無視すること――個別の事例が例外である場合もある。
  stereotyping: |
    個人に対して不公平な判断を下すために基本確率を使用すること。
  false_precision: |
    基本確率が概算に過ぎないにもかかわらず、誤った精度を適用すること。
  dismissing_individuals: |
    目の前の個人が分布に当てはまらないかもしれないのに、「統計によればXだ」と言うこと。

