# Endowment Effect
# Mental Model / Cognitive Bias - Example Entry

id: endowment_effect
name: エンドーメント効果

quick_introduction: |
  エンドーメント効果とは、単に所有しているという理由だけで、ある物事の価値を高く評価してしまう傾向のことです。私たちは、それを手に入れるために支払うであろう金額よりも、それを手放すためにより多くの金額を要求します。所有は、私たちの評価を歪める愛着を生み出します。

one_liner: 私たちは、持っていないものよりも、持っているものをより高く評価する――所有は愛着を生む。

try_this:
  - Ask: もし私がこれを所有していなかったら、それを手に入れるためにいくら支払うだろうか？
  - When selling, imagine you're buying—would you pay your asking price?
  - Notice when ownership is inflating your valuation.

ask_yourself:
  - Am I overvaluing this because I own it?
  - Would a neutral buyer agree with my price?

in_more_detail: |
  実験では、無作為にマグカップを与えられた人々は、それを売るために、他の人々がそれを買うために支払う用意がある金額の約2倍を要求しました。単に所有しているという事実が、認識される価値を高めます。これは損失回避と関連しています――何かを手放すことは損失のように感じられ、私たちは損失を回避したがります。しかし、その効果はそれ以上のものです。私たちは、所有しているものを自己同一性に取り込みます。

  エンドーメント効果は、交渉、消費者行動、組織変革に影響を与えます。人々が自分の家、自分のアイデア、そして自分の現在の役割を過大評価する理由を説明しています。それは、取引や移行において摩擦を生み出します。

why_this_is_important: |
  エンドーメント効果を認識することは、より効果的に交渉し、保持するか手放すかについてのより明確な意思決定を行い、そして他人が自分の持っているものを過大評価する理由を理解するのに役立ちます。それはまた、変化への抵抗を説明します。

when_to_use:
  - 意思決定
  - 交渉
  - 投資
  - キャリアの転換

how_can_you_spot_it:
  ownership_premium: |
    "それを買うためならそんな金額は払わないだろう"という時に、"そんな金額では売らない"と言う。
  attachment_to_possession: |
    一度手に入れたものを、より高く評価すること。
  resistance_to_trading: |
    たとえそれが合理的であっても、取引や交換をためらうこと。
  overvaluation_of_own_ideas: |
    自分のアイデア、プロジェクト、または役割が、それらが自分のものであるという理由で、より価値があると感じること。

examples:
  real_estate: |
    住宅所有者は、市場が評価するよりも高く、しばしば自分の家を過大評価します。
  negotiations: |
    売り手は買い手が支払う用意のある額よりも多くを要求します。その差はエンドーメント効果を反映しています。
  career: |
    変化を検討する際に、現在の仕事、会社、または役割を過大評価すること。
  ideas: |
    「ここで発明されていない」や「私のアイデア」というバイアス――私たちが作成した、または所有しているものを過大評価します。

real_world_implications: |
  エンドーメント効果は市場の摩擦を生み出し、有益な交換を遅らせ、変化への抵抗を煽ります。それは合併、再編成、そして個人的な移行に影響を与えます。それを理解することは、交渉と変化管理を改善します。

professional_application:
  networking_and_relationship_building: |
    誰かが変化に抵抗するとき、彼らはエンドーメント効果を経験している可能性があることを考慮してください――彼らは現状を「所有」しているため、それをより高く評価しています。変化を、彼らが手放すものだけでなく、彼らが得るものという観点から提示してください。
  collaborative_learning_initiative: |
    新しいプロセスを導入する際には、人々が現在のやり方に愛着を持っていることを認識してください。新しいことを受け入れる前に、古いものを「手放す」ための心理的な安全を作り出してください。

how_can_this_be_misapplied:
  dismissing_legitimate_attachment: |
    一部の愛着は合理的です――感傷的な価値、乗り換えコスト。すべての抵抗がエンドーメント効果ではありません。
  manipulation: |
    より高い価格を引き出すために、偽の所有権の感覚を作り出すこと（例：「無料で試してみて」と促してエンドーメントを引き出す）。
  undervaluing_continuity: |
    すべての変化への抵抗が非合理的であると仮定すること、しかし継続性には真の価値がある場合。
  cold_rationality: |
    感情的な愛着を「単なるエンドーメント効果」として却下すること、しかしそれが真の価値を反映している場合。

