# Bounded Rationality
# Mental Model / Cognitive Bias - Example Entry

id: bounded_rationality
name: 限定合理性

quick_introduction: |
  限定合理性とは、人間の意思決定は、利用可能な情報、認知能力、時間によって制限されるという考え方です。私たちは最適化するのではなく、「満足」します。つまり、可能な限り最善の選択肢ではなく、十分な選択肢を選びます。

one_liner: 私たちは満足する――最適ではなく、十分なものを選ぶ。

try_this:
  - 可能な場合は選択肢を単純化してください。多すぎる選択肢は限定合理性を圧倒します。
  - 無限の検索を避けるために、事前に「十分」な基準を設定してください。
  - 収穫逓減点を超えて最適化しようとしていることに気づいてください。

ask_yourself:
  - 十分で十分な場合に、完璧な選択肢を見つけようとしていませんか？
  - 私の決定を制限している制約（時間、情報、注意）は何ですか？

in_more_detail: |
  ハーバート・サイモンは、完全な情報を持つ合理的なアクターという古典的な経済学の仮定に異議を唱えるために、この概念を導入しました。実際には、私たちの注意、ワーキングメモリ、時間は限られています。私たちはヒューリスティックやショートカットを使用して、理想的な意味では最適ではないにしても、制約を考慮すると「合理的」な意思決定を行います。

  限定合理性は、私たちが常に最良の選択肢を選ばない理由、私たちが経験則に頼る理由、そして文脈とフレーミングがなぜそれほど重要なのかを説明しています。これは、私たちが実際にどのように決定するかを説明するモデルであり、どのように決定すべきかを示す処方箋ではありません。

why_this_is_important: |
  限定合理性を理解することは、より良いプロセスを設計し、他者のための選択肢を単純化し、意思決定の質に対する現実的な期待を設定するのに役立ちます。また、「非合理的」な行動が制約下ではしばしば合理的である理由も説明しています。

when_to_use:
  - 意思決定
  - 問題解決
  - リーダーシップ
  - リスク評価

how_can_you_spot_it:
  satisficing_behavior: |
    人々は、徹底的に比較するのではなく、最初に受け入れ可能な選択肢を選びます。
  heuristic_reliance: |
    意思決定は、完全な分析ではなく、経験則を使用して行われます。
  context_dependence: |
    同じ人が、選択肢の提示方法によって異なる選択をします。
  information_overload: |
    情報が多すぎると、意思決定の質が低下する可能性があります。

examples:
  hiring: |
    マネージャーは、「最高の」候補者を見つけるために無期限に面接するのではなく、基準を満たした最初の候補者を雇用します。
  consumer_choice: |
    買い物客は、店内のすべての製品を比較するのではなく、棚の最初の数個の選択肢から選びます。
  policy: |
    有権者は、すべての政策立案者の立場を分析するのではなく、党派またはいくつかの主要な問題を経由地として使用します。
  daily_routines: |
    人々は、すべての決定を再最適化するのではなく、習慣とデフォルトに従います。

real_world_implications: |
  限定合理性は、市場、政策設計、組織行動を形作ります。ナッジと選択アーキテクチャは、私たちの限界を考慮しているため機能します。それを無視すると、人々が効果的に使用できない複雑すぎるシステムにつながります。

professional_application:
  networking_and_relationship_building: |
    他者がリアルタイムで複雑なトレードオフを処理することを期待しないでください。選択肢を単純化し、明確なデフォルトを提供してください。
  collaborative_learning_initiative: |
    限定合理性で機能するプロセスを設計します。選択肢を減らし、デフォルトを提供し、複雑な意思決定にはチェックリストを使用します。

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    認知能力の限界を仮定するプロセスを設計し、意思決定の疲労と悪い結果につながる。
  blaming_irrationality: |
    制約を考慮せずに、他者の選択を非合理的だと却下する。
  exploitation: |
    望ましい結果に導くために、意図的に複雑さで人々を圧倒する。
  perfectionism: |
    満足することがしばしば合理的なアプローチである場合に、最適な決定を期待する。

