id: loss_aversion_bias
name: 損失回避バイアス

quick_introduction: |
  損失回避とは、同等の利益を得ることよりも損失を避けることを好む傾向のことです。
  人は、得る喜びよりも失う痛みを約2倍強く感じると言われています。

one_liner: 同等の利益を得た時の喜びよりも、損失を被った時の痛みは約2倍強く感じられます。

try_this:
  - "自問自答してみましょう：得られるものより失うものを過大評価していませんか？"
  - 選択肢を損失ではなく利益の観点から捉え直し、見方が変わるか確認してみましょう。
  - 損失への恐怖が、実際のメリットよりも意思決定を動かしていることに気づきましょう。

ask_yourself:
  - もしゼロから始めるなら、どちらを選びますか？
  - 失うものがあるから、それとも将来が本当に良くなるから、執着していますか？

in_more_detail: |
  ダニエル・カーネマンとエイモス・トベルスキーによって提唱された損失回避は、損失と利益が非対称的に認識されることを説明します。100ドルの損失の心理的影響は、通常、100ドルの利益の満足感よりもはるかに大きいです。このバイアスは、金融、交渉、日常の選択に影響を与え、潜在的な損失が顕著な場合には、リスク回避的な行動につながることがよくあります。

why_this_is_important: |
  損失回避を理解することは、合理的な分析よりも損失への恐怖が意思決定を動かしている場合を認識するのに役立ちます。これにより、人々が損失中の投資を保持したり、必要な変更を避けたり、交渉やキャリアの選択で最適ではない選択をしたりする理由が説明されます。

when_to_use:
  - 意思決定
  - 投資
  - キャリアの選択
  - リスク評価

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    潜在的な利益のメリットと比較して、何かを失う可能性が過度な不安や抵抗を引き起こすことに気づきましょう。
  reluctance_to_change: |
    客観的な分析がより良い選択肢を示唆している場合でも、戦略を変更したり、仕事を辞めたり、資産を売却したりすることに躊躇すること。
  framing_sensitivity: |
    結果が同等であっても、選択肢が利益または損失として提示されるかによって、決定が劇的に変化すること。
  overvaluing_what_you_have: |
    自分が所有しているという理由だけで、それらに高い価値を置く保有効果（エンダウメント効果）は、しばしば損失回避と伴います。

examples:
  investing: |
    「損失の実現を避ける」ために下落中の株を保有し続け、他の場所でのより良い投資機会を逃している。
  career: |
    新しい機会がより大きな成長を提供するとしても、辞めることを安全を失うように感じるため、やりがいのある仕事に留まり続ける。
  negotiations: |
    合意を「失う」こととして捉えられるため、公正なオファーを拒否するが、合意に至る「利益」とは考えない。
  product_design: |
    有料に移行する無料トライアル—ユーザーはトライアル終了時にサービスを「失う」ことを経験し、これは新しいサービスを「得る」ことよりも購読を促進する。

real_world_implications: |
  損失回避は、市場、政策、個人の行動を形成します。保険や保証がよく売れる理由、人々が有益な変化を避ける理由、そして否定的なニュースが過剰な影響を与える理由を説明します。それを認識することは、意思決定の質を向上させ、後悔に基づいた選択を減らすことができます。

professional_application:
  networking_and_relationship_building: |
    人は損失回避のため、非生産的な関係や協力関係を終わらせることをためらう可能性があることに注意してください—彼らはつながりを「失う」ことを恐れています。抵抗を減らすために、新しい機会を損失ではなく利益として提示しましょう。
  collaborative_learning_initiative: |
    新しいプロセスやツールを導入する際は、チームが「手放す」ことよりも、何を得るかに焦点を当てましょう。損失を強調する変化への取り組みは、しばしばより強い抵抗を引き起こします。

how_can_this_be_misapplied:
  manipulation: |
    意思決定を圧迫するために損失回避を悪用すること—例えば、「期間限定オファー」や「お見逃しなく」といった、本当の価値評価よりも損失への恐怖を呼び起こすようなフレーミング。
  misinterpreting_relationships: |
    変化への抵抗を単に合理的であると想定すること。実際には損失回避が原因である可能性があるのに。動機を誤解すると、信頼を損なう可能性があります。
  overcommitment: |
    「すでにこれだけ投資した」という理由で、失敗したプロジェクトへの投資を続けるサンクコスト効果（埋没費用効果）—損失をカットするのではなく。
  missed_opportunities_for_conflict_resolution: |
    譲歩は損失のように感じられるため、妥協を拒否すること。たとえ代替案がすべての人にとってより悪い結果であったとしても。
  vulnerability_to_exploitation: |
    行動しないと「失う」ものを強調するような販売戦術のように、損失回避を呼び起こすように選択肢を提示する他者によって操作されること。
  reinforcing_negative_perceptions: |
    潜在的な欠点に過度に焦点を当てることは、自己成就的な悲観的な見通しを作り出し、成長の機会を逃してしまう可能性があります。

