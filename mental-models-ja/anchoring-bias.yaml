# アンカリングバイアス
# メンタルモデル / 認知バイアス - 例エントリ

id: anchoring_bias
name: アンカリングバイアス

quick_introduction: |
  アンカリングバイアスとは、意思決定を行う際に、最初に出会った情報に過度に依存する傾向のことです。その最初の「アンカー」は、たとえそれが無関係または恣意的なものであっても、その後の判断を歪めます。

one_liner: 最初に見る数字が、その後に続くすべての数字を形作ります。

try_this:
  - 交渉の前に、目標とする数字を決め、相手のアンカーに引きずられないようにしましょう。
  - 推定を行う際は、他の人の意見を聞く前に、まず自分自身の数字を生成しましょう。
  - 質問しましょう：最初に別の数字を見ていたら、考え方は変わっていましたか？

ask_yourself:
  - 最初に遭遇した数字またはアイデアは何ですか？それは私の判断を歪めていませんか？
  - アンカーから十分に調整できていますか、それともまだ近すぎますか？

in_more_detail: |
  古典的な実験では、国連におけるアフリカ諸国の割合を推定するように求められた人々は、より高い数字（例：65対10）を見た後に、より高い推定値を示しました。アンカーは、たとえランダムであっても、彼らの回答に影響を与えました。アンカリングは、交渉、価格設定、採用、予測に影響します。

  最初に見る数字は参照点となります。私たちはそこから調整しますが、通常は不十分です。アンカーが恣意的であることを知っていても、それは私たちに影響を与える可能性があります。専門家も例外ではありません。

why_this_is_important: |
  アンカリングを理解することは、より良い意思決定を行い、より効果的に交渉し、操作されるのを避けるのに役立ちます。また、情報の順序とフレーミングがなぜそれほど重要なのかも説明します。

when_to_use:
  - 意思決定
  - 交渉
  - 投資
  - リスク評価

how_can_you_spot_it:
  first_number_dominance: |
    交渉や推定における最初の数字は、結果に不釣り合いな影響を与えます。
  insufficient_adjustment: |
    アンカーから調整する際、人々は通常、十分に調整しません。
  arbitrary_anchor_influence: |
    明らかに無関係な数字（例：社会保障番号の下桁）でさえ、推定値に影響を与える可能性があります。
  order_effects: |
    オプションが提示される順序によって、選択が変わります。

examples:
  salary_negotiation: |
    雇用主または候補者が最初に言及した数字は、しばしば最終的なオファーのアンカーとなります。
  real_estate: |
    リスティング価格は、意図的に高くまたは低く設定されていても、買い手の価値認識をアンカーします。
  retail: |
    「通常99ドル、今なら49ドル」は、元の価格をアンカーとして使用し、販売価格がお得であるかのように見せかけます。
  forecasting: |
    計画会議における初期の推定値は、最初の推定値が推測であったとしても、その後の予測をアンカーします。

real_world_implications: |
  アンカリングは市場、交渉、政策を形作ります。倫理的（例：合理的な期待の設定）または非倫理的（例：操作的な価格設定）に使用できます。それを認識することで、意思決定の質が向上します。

professional_application:
  networking_and_relationship_building: |
    交渉においては、最初のオファーをしてアンカーを設定することを検討するか、相手がそうしている場合はそれに注意しましょう。
  collaborative_learning_initiative: |
    会議においては、推定値について誰が最初に話すかに注意しましょう。議論の前に、独立した推定値を収集することを検討しましょう。

how_can_this_be_misapplied:
  manipulation: |
    操作的な価格設定：極端なアンカーを意図的に使用して、他人を望ましい結果に誘導すること。
  overconfidence_in_anchors: |
    アンカーへの過信：自分の最初の推定値を再検討せずに、それを過剰に信頼すること。
  ignoring_relevant_information: |
    関連情報の無視：アンカーに、より関連性の高いデータを優先させること。
  exploitation: |
    搾取：誇張された「比較対象価格」を使用して、実際の価格を妥当に見せる販売手法。

