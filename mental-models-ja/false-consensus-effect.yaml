# 偽りの合意効果
# メンタルモデル / 認知バイアス - 例

id: false_consensus_effect
name: 偽りの合意効果

quick_introduction: |
  偽りの合意効果とは、他者が私たちの信念、態度、行動にどれだけ同意しているかを過大評価する傾向のことです。私たちは自分の見解が実際よりも一般的であると仮定し、合理的な人々が同意しないということを想像するのが難しいと感じます。

one_liner: 私たちは、他者が私たちにどれだけ同意しているかを過大評価します。

try_this:
  - 意見の異なる人々を積極的に探し出す — 合意を当然と考えない。
  - 始める前に、あなたの仮定を共有しない人々にテストする。
  - 質問する：同意しない人は何と言うだろうか？真剣に受け止める。

ask_yourself:
  - 他の人が私と同じように考えていると仮定していませんか？
  - 最後に、他者の異なる意見に驚いたのはいつですか？

in_more_detail: |
  ある立場を取ると、私たちはそれを規範だと考えがちです。私たちは自分と似たような考えを持つ人々に囲まれ、肯定的なメディアを消費し、曖昧なフィードバックを同意として解釈します。これにより、合意の幻想を強化するエコーチェンバーが生まれます。

  この効果は、深く根付いた信念や、自分たちがその立場に深く関与している場合に強くなります。他者が同意しない場合に驚き、交渉が困難になり、私たちが顧客が自分たちと同じように考えていると仮定した場合に市場調査が不十分になる可能性があります。

why_this_is_important: |
  偽りの合意効果を認識することは、本当の意見の相違に備え、より良い調査を実施し、より効果的にコミュニケーションをとるのに役立ちます。これは、製品開発、交渉、リーダーシップにとって不可欠です。

when_to_use:
  - 意思決定
  - 交渉
  - リーダーシップ
  - 問題解決

how_can_you_spot_it:
  surprise_at_disagreement: |
    自分が明白だと考えていることに誰かが反対した場合、本当にショックを受ける。
  assuming_shared_values: |
    確認せずに、他者が自分の優先順位を共有しているかのように行動する。
  underestimating_opposition: |
    提案が直面する抵抗が、実際よりも少ないと予想する。
  echo_chamber_detection: |
    あなたの社会的および情報的な環境は、あなたの見解にほとんど挑戦しない。

examples:
  product_development: |
    チームの全員が機能Xを求めているため、ユーザーもそれを求めているとチームが仮定する — しかし、採用率が低いことが判明する。
  politics: |
    政治的なバブルにいる人々は、自分たちの期待と一致しない選挙結果に驚く。
  negotiation: |
    相手方にとって「合理的」に見えるため、条件に同意すると仮定する。
  hiring: |
    「カルチャーフィット」で採用することは、あなたに同意する人々を採用することを意味する可能性があり、偽りの合意を強化する。

real_world_implications: |
  偽りの合意効果は、二極化、製品の失敗、交渉の決裂に寄与します。それは私たちの予測に過信させ、異論に unprepared にさせます。

professional_application:
  networking_and_relationship_building: |
    異なる視点を持つ人々を積極的に探し出す。共有された信念を当然と考えず — 尋ねて、耳を傾ける。
  collaborative_learning_initiative: |
    チームでは、構造化された反対意見（例：「プレモーテム」、悪魔の弁護人）を使用して、コストがかかる前に意見の相違を表面化させる。

how_can_this_be_misapplied:
  dismissing_dissent: |
    同意しない人々を、彼らが有効な異なる視点を持っている可能性を考慮するのではなく、非合理的または無知であると仮定する。
  poor_research: |
    「彼らが何を求めているかはすでにわかっている」から顧客調査をスキップする。
  overconfidence: |
    他者が同意すると仮定することに基づいて、大胆な賭けをする。
  groupthink_amplification: |
    偽りの合意効果に挑戦しないチームは、集団思考に陥る可能性がある。

related_content:
