# コンピタンスの範囲
# メンタルモデル / 認知バイアス - 例エントリー

id: circle_of_competence
name: コンピタンスの範囲

quick_introduction: |
  コンピタンスの範囲とは、自身の専門知識の限界を知り、重要な意思決定を行う際にその範囲内に留まることを促すメンタルモデルです。ウォーレン・バフェットとチャーリー・マンガーは、自分が知らないことを知ることの重要性を強調しています。

one_liner: 自分の専門知識の限界を知り、それが重要であるときはその範囲内に留まりましょう。

try_this:
  - 自分に本当の専門知識がある領域と、推測に頼っている領域をマッピングしましょう。
  - 自分の範囲外では、アドバイスを求めたり、委任したりしましょう。
  - 正直に：この分野でのあなたの判断に、真の専門家は同意するでしょうか？

ask_yourself:
  - 私はコンピタンスの範囲内にいるのか、それとも推測しているのか？
  - この分野で「知らない」と認めたのはいつが最後か？

in_more_detail: |
  人はそれぞれ、真の専門知識を持つ領域を持っています。そこでは、情報を評価し、誤りを見抜き、信頼できる判断を下すことができます。その範囲外では、誰でも陥るのと同じバイアスや間違いを犯しやすくなります。重要なのは正直な自己評価です。自分が本当に有能なのはどこで、どこで推測しているのか？

  コンピタンスの範囲は、意図的な学習によって拡大できますが、現在の限界を認識するには謙虚さが必要です。自分の範囲外で活動すると、特にリスクが高い場合、費用のかかる間違いのリスクが高まります。

why_this_is_important: |
  コンピタンスの範囲内に留まることは、費用のかかる間違いを減らし、意思決定の質を向上させます。また、いつアドバイスを求めるべきか、いつ委任すべきか、いつ控えるべきかを知るのに役立ちます。自分の範囲外での過信は、失敗の大きな原因となります。

when_to_use:
  - 意思決定
  - 投資
  - キャリアの選択
  - リスク評価

how_can_you_spot_it:
  honest_boundary_assessment: |
    ある分野における知識の限界を説明できますか？自分が知らないことを知っていますか？
  knowing_when_to_defer: |
    一人で決定するのではなく、専門家の意見を求めるべき状況を認識すること。
  consistent_track_record: |
    自分の範囲内では、判断は時間とともに検証される傾向があります。範囲外では、そうではありません。
  calibration: |
    ある分野における自信が、その分野での実際のパフォーマンスと一致していること。

examples:
  investing: |
    バフェットは、テクノロジー株は自分のコンピタンスの範囲外であり、信頼できる評価ができないと述べて、それらを避けています。
  career: |
    自分の専門分野に留まる専門家 vs. 関係のない分野で「ストレッチ」な役割を引き受ける専門家。
  hiring: |
    自分の判断に頼るべき時と、技術的な役割のために専門家を招聘すべき時を知ること。
  advice_giving: |
    推測するのではなく、自分の専門外のトピックについて意見を述べることを断ること。

real_world_implications: |
  コンピタンスの範囲は、バリュー投資とプロフェッショナルとしての成功の中心です。これを無視すると、過信、失敗した事業、誤ったアドバイスにつながります。範囲を拡大するには、意図的な努力と正直なフィードバックが必要です。

professional_application:
  networking_and_relationship_building: |
    自分のコンピタンスの範囲を補完する人々と関係を築きましょう。自分で答えるのではなく、他人を紹介すべき時を知りましょう。
  collaborative_learning_initiative: |
    重なり合う補完的なコンピタンスの範囲を持つチームを作成しましょう。人々が自分のコンピタンスの範囲外で活動していることを指摘することを奨励しましょう。

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    自分の範囲外に決して venturing しないことは、成長と学習を制限する可能性があります。
  false_modesty: |
    説明責任や困難な決定を避けるために、ごく小さな範囲を主張すること。
  gatekeeping: |
    相手の議論に関与せずに、相手を却下するために「コンピタンスの範囲」を使用すること。
  stagnation: |
    努力によって拡大できるものとしてではなく、範囲を固定されたものとして扱うこと。

