# Bystander Effect
# Mental Model / Cognitive Bias - Example Entry

id: bystander_effect
name: バイスタンダー効果

quick_introduction: |
  バイスタンダー効果とは、他人がいる場合に、個人が助けを提供する可能性が低くなる傾向のことです。目撃者が多ければ多いほど、一人一人が行動を起こす可能性は低くなります。責任が分散され、私たちは「誰かが助けてくれるだろう」と想定してしまいます。

one_liner: 人が多いほど、一人一人が行動する可能性は低くなる。

try_this:
  - 緊急時には、直接責任を割り当てましょう：「あなた、911に電話してください。」
  - 他の誰かが助けてくれるだろうと期待せず、行動するか、明確に指示しましょう。
  - 他の人が最初に行動するのを待っている自分に気づきましょう。

ask_yourself:
  - 他の人がいるからという理由で、責任を分散させていませんか？
  - 一人でいたら、違う行動をとりますか？

in_more_detail: |
  キティ・ジェノヴェーゼ殺害事件（ただし、その物語は部分的に神話化されています）の後、研究者たちは、他人の存在が助けを減らすことを発見しました。私たちは他者からの合図を探します。誰も行動しなければ、それは「行動は不要」と解釈されます。また、責任の分散も経験します。多くの人がいる場合、一人一人が個人的な責任を感じにくくなります。多様な無知（pluralistic ignorance）が発生する可能性があります。全員が何かが間違っていると考えていますが、誰も行動していないので、誰も行動しません。

  この効果は、状況が曖昧であり、目撃者同士がお互いを知らない場合に最も強く現れます。直接的な責任の割り当て（「あなた、911に電話してください」）によって克服できます。

why_this_is_important: |
  バイスタンダー効果を理解することは、他者が行動しないときにあなたが行動を起こすのを助け、それを克服するシステムを設計するのに役立ちます。あなたが困っているなら、特定の一人を選んでください。あなたが目撃者なら、他者の行動を待たないでください。

when_to_use:
  - リーダーシップ
  - 関係構築
  - 対立解決
  - 意思決定

how_can_you_spot_it:
  diffusion_of_responsibility: |
    大勢いるときに「誰か他の人がやるだろう」と考えること。
  pluralistic_ignorance: |
    全員が行動が必要だと考えているが、他の人が行動していないので誰も行動しないこと。
  social_proof_inaction: |
    他者の不作為を「行動は不要」と解釈すること。
  audience_inhibition: |
    愚かに見えることや、過剰反応することを恐れて行動できないこと。

examples:
  emergency: |
    誰かが倒れたとき、多くの目撃者がいると、一人一人が助けを呼ぶ可能性は低くなります。
  workplace: |
    全員が問題に気づいていますが、誰もそれを提起しません。それぞれが他の誰かがするだろうと考えています。
  harassment: |
    ハラスメントを目撃しても介入しない。それぞれが他の人が行動するだろうと考えています。
  meetings: |
    悪いアイデアが疑問視されずに進んでいく。全員が他の誰かが発言するだろうと考えているためです。

real_world_implications: |
  バイスタンダー効果は、緊急時に悲劇的な結果をもたらし、組織内で問題が persist するのを許します。それを克服するには、直接的な責任の割り当てと、介入を奨励する規範が必要です。

professional_application:
  networking_and_relationship_building: |
    助けが必要なときは、特定の人に頼みましょう。問題を見たら、他の人がするだろうと期待せず、行動しましょう。発言が期待され、報われるような規範を作りましょう。
  collaborative_learning_initiative: |
    バイスタンダー効果を認識し、介入する方法を人々に訓練しましょう。「何かを見たら、言いましょう」を使い、明確な役割を割り当てましょう。最初に発言した人を報いましょう。

how_can_this_be_misapplied:
  blaming_bystanders: |
    効果が強力な状況要因である場合に、個人を厳しく非難すること。状況を変えることに焦点を当てましょう。
  false_assumption: |
    十分な人がいれば、誰かが必ず助けてくれるだろうと仮定すること。実際にはその逆が多いです。
  overcorrection: |
    全員を責任者にして、誰も責任者でなくしてしまうこと。責任の分散は依然として発生する可能性があります。
  individualizing: |
    バイスタンダー効果を状況現象ではなく、人格的欠陥として扱うこと。

