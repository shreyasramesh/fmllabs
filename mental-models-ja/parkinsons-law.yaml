# Parkinson's Law
# Mental Model / Cognitive Bias - Example Entry

id: parkinsons_law
name: パーキンソンの法則

quick_introduction: |
  パーキンソンの法則とは、「仕事の量は、完成のために与えられた時間をすべて満たすまで膨張する」というものである。タスクに1週間与えれば1週間かかるが、1日与えれば多くの場合1日で完了する。これは予算、チームの規模、リソースにも同様に当てはまる。

one_liner: 仕事の量は、完成のために与えられた時間をすべて満たすまで膨張する。

try_this:
  - より厳しい締め切りを設定して、集中力を高め、スコープクリープ（要求範囲の無秩序な拡大）を防ぐ。
  - 「このタスクに合理的に必要な最小限の時間でどれくらいか？」と自問する。
  - 比例する価値なく、余分な時間やリソースが消費されていることに気づく。

ask_yourself:
  - 時間を埋めているだけで、実際には仕事がそれを要求しているのか？
  - より厳しい締め切りは、より良い優先順位付けを強制するか？

in_more_detail: |
  C. ノースコート・パーキンソンは、仕事の量に関係なく官僚機構は成長するという観察結果を発表した。また、タスクは利用可能な時間を満たすまで拡大する—締切に合わせて努力とペースを調整する。厳しい締切は集中力を高めることができるが、緩い締切は先延ばしやスコープクリープを招く。

  この法則は、プロジェクト管理、個人の生産性、組織設計に影響を与える。制約は、優先順位付けを強制することで成果を向上させる可能性があることを示唆している。

why_this_is_important: |
  パーキンソンの法則を理解することは、より良い締切を設定し、プロジェクトへの過剰なリソース配分を避け、「時間や人員の追加」が助けにならない、むしろ害になる場合を認識するのに役立つ。制約は生産的になりうる。

when_to_use:
  - 意思決定
  - リーダーシップ
  - 問題解決
  - キャリアの選択

how_can_you_spot_it:
  deadline_driven_effort: |
    締切が近づくにつれて仕事は加速し、締切が遠いときは進捗がほとんどない。
  scope_expansion: |
    プロジェクトは、焦点を維持するのではなく、利用可能なリソースを満たすまで拡大する。
  bureaucratic_growth: |
    組織は、仕事量が増加しない場合でも、人員やプロセスを追加する。
  budget_exhaustion: |
    予算は、その支出が本当に必要だったかどうかに関わらず、すべて使い切られる。

examples:
  student_deadlines: |
    1ヶ月後に提出するレポートが、最後の48時間で書かれる。
  project_management: |
    6ヶ月のタイムラインのプロジェクトは6ヶ月かかる。同じスコープでも3ヶ月の締切であれば完了するかもしれない。
  meetings: |
    30分で十分な場合でも、1時間の会議はその時間すべてを埋める。
  budgets: |
    ある部署は、来年も同じ予算を正当化するために、年度末までに予算をすべて使い切る。

real_world_implications: |
  パーキンソンの法則は、生産性、組織の肥大化、リソース配分に影響を与える。人工的な制約（短い締切、少人数のチーム）が、集中力と効率を向上させる可能性があることを示唆している。

professional_application:
  networking_and_relationship_building: |
    共同作業におけるスコープクリープを防ぎ、勢いを維持するために、明確で厳しい締切を設定する。
  collaborative_learning_initiative: |
    会議やプロジェクトにタイムボクシングを使用する。品質を犠牲にすることなく集中力が向上するかどうかをテストするために、短い締切で実験する。

how_can_this_be_misapplied:
  unrealistic_deadlines: |
    燃え尽き症候群や低品質を引き起こすような、恣意的に短い締切を設定すること。
  underresourcing: |
    時間が少ない、または人が少ない方が常にうまくいくと想定すること。一部のタスクは適切なリソースを必要とする。
  blame_shifting: |
    仕事が実際に複雑だった場合に、遅延を「パーキンソンの法則」のせいにすること。
  ignoring_quality: |
    持続可能な成果を犠牲にして、人工的な制約を満たすために急ぐこと。

