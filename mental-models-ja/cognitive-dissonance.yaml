# 認知的不協和
# メンタルモデル / 認知バイアス - 例エントリ

id: cognitive_dissonance
name: 認知的不協和

quick_introduction: |
  認知的不協和とは、相反する信念を持っているとき、あるいは自分の行動が信念と矛盾するときに感じる精神的な不快感のことです。私たちはこの不快感を軽減しようと動機づけられます。しばしば、行動を変えるのではなく、信念を自分の行動に合わせるように変更します。

one_liner: 逆よりも、私たちは自分の行動に合わせて信念を変えることが多い。

try_this:
  - 行動を変えるのではなく、不快感を軽減するために正当化しているときに気づきましょう。
  - 質問：「自分がしたことを正当化するために、信念を調整していませんか？」
  - 信念を変えることよりも、行動を変えることの方がより正直かどうかを検討しましょう。

ask_yourself:
  - 正当化することによって不協和を軽減していますか、それとも実際に行動を変えることによってですか？
  - もし、もうすでにこのように行動していなかったら、この信念を持っていたでしょうか？

in_more_detail: |
  レオン・フェスティンガーの理論は、私たちが一貫性を求めていると説明しています。私たちが自分の価値観に反する行動（例：嘘をつく、お金を無駄にする）をしたとき、不協和を経験します。それを軽減するために、私たちは自分の信念を変える（「それは本当は嘘ではなかった」）か、行動を最小限に抑える（「それほど悪くはなかった」）かもしれません。私たちはしばしば、改めるのではなく、正当化します。

  認知的不協和は、ベン・フランクリン効果（私たちは助けた人を好きになる）を促進し、過去の決定を正当化する理由を説明し、多くの自己欺瞞の根底にあります。これは、信念の形成と変化における強力な力です。

why_this_is_important: |
  認知的不協和を理解することは、あなた自身の正当化を認識し、人々が考え方を変えることをなぜ抵抗するのかを理解するのに役立ちます。それはまた、コミットメントと一貫性が強力な説得の原則である理由も説明します。

when_to_use:
  - 意思決定
  - 関係構築
  - リーダーシップ
  - コンフリクト解決

how_can_you_spot_it:
  post_decision_rationalization: |
    決定後、私たちは自分の選択の肯定的な側面と、却下された選択肢の否定的な側面を強調します。
  belief_action_alignment: |
    私たちは、すでに取った行動に合うように信念を調整します。
  discomfort_with_inconsistency: |
    私たちの行動が、表明した価値観と一致しないことに気づいたときの不快感。
  resistance_to_disconfirming_evidence: |
    私たちのコミットメントと矛盾する情報を却下または最小限に抑えること。

examples:
  purchase_justification: |
    高価な品物を購入した後、私たちはその利点を強調し、コストを軽視します。
  relationship: |
    私たちは、良い点を強調し、悪い点を最小限に抑えることで、悪い関係に留まることを正当化します。
  career: |
    私たちは、「 stay 」なければならない理由を強調することで、好きではない仕事に留まることを正当化します。
  beliefs: |
    私たちの行動が私たちの価値観と矛盾するとき、私たちは行動を変えるのではなく、私たちの価値観を変えます（「私は本当はベジタリアンではありません。時々肉を食べるだけです」）。

real_world_implications: |
  認知的不協和は、信念の形成、消費者の行動、政治的態度を形成します。それは、人々が悪い決定の後にさらに進む理由と、行動を変えることで信念が変わる理由を説明します。

professional_application:
  networking_and_relationship_building: |
    小さなコミットメントはより大きなコミットメントにつながる可能性があります。人々は過去の行動を正当化します。これを倫理的に使用してください：小さなお願いから始めましょう。あなた自身の行動を正当化しているときに意識しましょう。
  collaborative_learning_initiative: |
    変化を導入するときは、早期の同意と小さなコミットメントを得てください。それらは、より大きな採用を動機づける不協和を生み出します。反感を生む公のコミットメントを強制することは避けてください。

how_can_this_be_misapplied:
  manipulation: |
    コンプライアンスを強制するために、意図的に不協和を作り出すこと。
  dismissing_genuine_change: |
    人々が時々本当に更新するとき、すべての信念の変化が正当化であると想定すること。
  forced_consistency: |
    人々の見解が正当に進化しているときに、「一貫性」を持つように人々を強制すること。
  self_deception: |
    自分自身に関する不快な真実を避けることを正当化するために、不協和理論を使用すること。

