# 確率的思考
# メンタルモデル／認知バイアス - サンプルエントリ

id: probabilistic_thinking
name: 確率的思考

quick_introduction: |
  確率的思考とは、確実性ではなく、可能性（確率）の観点から推論する習慣です。「これが起こるか？」と問う代わりに、「これはどれくらい起こりそうか？」と問います。不確実性を受け入れ、それを利用してより良い意思決定を行います。

one_liner: 確実性ではなく可能性で考え、不確実性を受け入れる。

try_this:
  - 「起こるか？」を「どれくらい起こりそうか？」に置き換える。
  - 複数のシナリオを検討し、おおよその確率を割り当てる。
  - 新しい証拠が入ったら、自分の信念を更新する。

ask_yourself:
  - 二元論的に考えていないか？確率はより正確な場合がある。
  - 妥当な結果の範囲はどれくらいか？

in_more_detail: |
  現実世界のほとんどの結果は不確実です。確率的思考は、二者択一の「はい／いいえ」を、段階的な信念に置き換えます。複数のシナリオを検討し、おおよその確率を割り当て、証拠に基づいて更新することを含みます。これは過信や白黒思考とは対極にあるものです。

  主な実践方法には、範囲で考えること、基準率（ベイスレート）を考慮すること、証拠に基づいて信念を更新すること、リスク（確率が既知）と不確実性（確率が未知）を区別することが含まれます。これは、予測の精度（キャリブレーション）と意思決定の質を向上させます。

why_this_is_important: |
  確率的思考は、過信を減らし、予測を改善し、不確実性下でのより良い意思決定につながります。投資、戦略、そして未来が不確実なあらゆる分野に不可欠です。

when_to_use:
  - 意思決定
  - リスク評価
  - 投資
  - 問題解決

how_can_you_spot_it:
  likelihood_language: |
    「〜だろう」「〜の可能性が高い」「〜の可能性は低い」といった言葉遣い。「〜する」「〜しない」ではなく。
  scenario_thinking: |
    おおよその確率とともに、複数の可能な未来を検討すること。
  calibration: |
    時間の経過とともに、実際の出来事の頻度と一致する予測。
  uncertainty_acknowledgment: |
    自分が知らないことを明確に述べること。

examples:
  forecasting: |
    「締め切りに間に合うだろう」ではなく、「締め切りに間に合う確率は60%だと思う」と言う。
  investing: |
    「これは2倍になる確率が30%、50%下落する確率が70%だ」と言う。「これは爆上がりする」ではなく。
  strategy: |
    複数のシナリオ（最良、標準、最悪）をおおよその確率で計画する。
  hiring: |
    「面接に基づいて、成功する確率は70%だと考えられる」と言う。「彼は素晴らしい採用候補だ」ではなく。

real_world_implications: |
  確率的思考は、予測の精度を向上させ、驚きを減らし、より良いリスク管理を可能にします。効果的な予測と不確実性下での意思決定の中心となるものです。

professional_application:
  networking_and_relationship_building: |
    適切な場面では確率でコミュニケーションをとる。「確信している」ではなく「かなり確信している」と言う。これは認識論的な謙虚さを示し、信頼を築く。
  collaborative_learning_initiative: |
    チームに不確実性を表現することを奨励する。予測市場やキャリブレーション演習を利用して、確率的判断を向上させる。

how_can_this_be_misapplied:
  false_precision: |
    それほど正確には判断できないのに、正確な確率（例：73%）を割り当てること。
  analysis_paralysis: |
    「確信できない」という理由で、決して行動を起こさないこと。
  hedging_overuse: |
    あらゆることを曖昧にしすぎて、無用にするほどまで過度に使うこと。
  dismissing_intuition: |
    有効な情報を含む可能性のある強い直感を無視するために、過度に修正すること。

