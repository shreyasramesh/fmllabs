# Second-Order Thinking
# Mental Model / Cognitive Bias - Example Entry

id: second_order_thinking
name: 第二次思考

quick_introduction: |
  第二次思考とは、自分の行動の結果の、さらにその結果までを考慮する実践のことです。一次思考は「Xをしたらどうなるか？」と問いますが、第二次思考は「その次は？」「さらにその次は？」と問います。これは意図しない影響を浮き彫りにします。

one_liner: 「その次は？」と問い、結果の結果を考慮する。

try_this:
  - どんな決断をするにも、「その次は？」を少なくとも二度問う。
  - 自分の行動に対して、他者がどう反応するか、そしてその反応にどう反応するかを考慮する。
  - 一次的な影響が、連鎖の中で逆転したり複雑化したりする点に気づく。

ask_yourself:
  - 第二次（そして第三次）の影響について、十分に考えただろうか？
  - どのような意図しない結果を見落としている可能性があるだろうか？

in_more_detail: |
  ハワード・マークスが投資の分野でこの概念を広めました。一次思考：「これは上がるだろう」。第二次思考：「もしこれが上がれば、他者も気づき、もっと買うだろう。それが続けば過大評価され、暴落するだろう」。結果の連鎖は、一次的な影響を逆転させたり、複雑化させたりすることがよくあります。

  第二次思考はより困難です。より多くの精神的労力と想像力を必要とします。しかし、多くの間違いを防ぐことができます。優れた戦略家は、数手先を考え、他者の反応を考慮します。

why_this_is_important: |
  第二次思考は、意図しない結果を防ぎ、意思決定の質を向上させます。戦略、政策、そして行動が反応を引き起こすあらゆる分野において不可欠です。

when_to_use:
  - 意思決定
  - 問題解決
  - 戦略
  - リスク評価

how_can_you_spot_it:
  consequence_chains: |
    「Xをしたら、Yが起こり、次にZが起こる…」
  reaction_anticipation: |
    自分の行動に対して、他者がどう反応するかを考慮すること。
  unintended_effects: |
    副作用やフィードバックループを探すこと。
  reversals: |
    一次的な影響と矛盾したり、それを逆転させたりする二次的な影響。

examples:
  investing: |
    「もし皆がこれを良い投資だと考えれば、おそらく混み合っているだろう。有利さは失われたかもしれない。」
  policy: |
    「もしXに補助金を出せば、需要が増え、価格が上がる。補助金は本当に助けになるのだろうか？」
  negotiation: |
    「ここで強く押しすぎれば、あちらで報復されるだろう。正味の影響は？」
  incentives: |
    「もしこの指標を評価すれば、人々はそれを操作するだろう。彼らは実際には何をするだろうか？」

real_world_implications: |
  第二次思考は、戦略的思考の証です。政策の失敗、意図しないインセンティブ、そしてナイーブな楽観主義を防ぎます。優れた意思決定者と偉大な意思決定者を区別します。

professional_application:
  networking_and_relationship_building: |
    行動を起こす前に、「彼らはどう反応するだろうか？そして私はそれにどう反応するだろうか？」と問う。単に即時のやり取りだけでなく、関係性のダイナミクスを考慮する。
  collaborative_learning_initiative: |
    計画段階で、「その次は？」という演習を実行する。結果の連鎖をマッピングする。意図しない影響が現れる前に特定する。

how_can_this_be_misapplied:
  analysis_paralysis: |
    あまりにも多くのステップを先読みしすぎて、決して行動しないこと。
  false_complexity: |
    一次的な影響が十分な場合でも、二次的な影響が常に支配的であると仮定すること。
  overconfidence: |
    不確実性が積み重なる中で、長い連鎖を予測できると信じること。
  pessimism: |
    結果の連鎖において、常に最悪の事態を仮定すること。

