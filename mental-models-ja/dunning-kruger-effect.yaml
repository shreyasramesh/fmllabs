# ダニング＝クルーガー効果
# メンタルモデル / 認知バイアス - 例

id: dunning_kruger_effect
name: ダニング＝クルーガー効果

quick_introduction: |
  ダニング＝クルーガー効果とは、ある分野において知識やスキルが限定的な人々が自身の能力を過大評価し、逆に専門家は自身の能力を過小評価する傾向があるという認知バイアスを指します。知れば知るほど、自信がなくなることがあります。

one_liner: 知れば知るほど、自信がなくなることがあります。

try_this:
  - 新しい分野では、自分が過度に自信を持っていると仮定し、フィードバックや校正を求めましょう。
  - 専門家が疑念を表明するときは、真剣に受け止めましょう。彼らは例外的なケースを知っているかもしれません。
  - ある分野で、専門家よりも初心者のほうが確信を持っていることに気づきましょう。

ask_yourself:
  - 私は「馬鹿の山の頂上」にいるのか、それとも「謙虚の谷」にいるのか？
  - 自分の能力をここで評価するために、メタ認知能力を持っているか？

in_more_detail: |
  ダニングとクルーガーの研究によると、能力の低い個人は、自身の能力の低さを認識するメタ認知能力を欠いていることが示されました。自分のパフォーマンスを評価するには、うまくパフォーマンスを発揮するために必要なのと同じスキルが必要となります。そのため、スキルの低い人は二重に不利になります。彼らはパフォーマンスが悪く、それに気づきません。

  能力が向上するにつれて、人々は「謙虚の谷」を経験することがよくあります。そこでは、自分がどれだけ知らないかに気づきます。真の専門家は、ニュアンスや例外的なケースを鋭く認識しているため、自信を過小評価する可能性があります。

why_this_is_important: |
  ダニング＝クルーガー効果を認識することは、自分の自信を調整し、初心者の意見を過大評価することを避け、専門家の謙虚さを理解するのに役立ちます。学習、採用、意思決定に不可欠です。

when_to_use:
  - 学習
  - 意思決定
  - リーダーシップ
  - キャリアの移動

how_can_you_spot_it:
  novice_overconfidence: |
    経験の浅い人が、強力で無条件の意見を表明する。
  expert_underconfidence: |
    高度なスキルを持つ人々は、スキルが低い人々よりも、不確実性を表明し、ためらう傾向がある。
  inability_to_recognize_quality: |
    パフォーマンスの低い人は、自分の分野における良い仕事と悪い仕事を見分けることができない。
  confidence_competence_mismatch: |
    初心者においては、自信と実際の能力が反比例する。

examples:
  social_media: |
    あるトピックに関する表面的な知識しかない人が、その分野の専門家と自信を持って議論する。
  hiring: |
    面接でのパフォーマンスが低い候補者が、自身のパフォーマンスを高く評価することがある。
  investing: |
    初心者の投資家は、初期の成功の後、運を認識せずに過度に自信を持つことがある。
  workplace: |
    新入社員は昇進の準備ができていると過大評価するかもしれないが、シニア社員は自分自身を疑う。

real_world_implications: |
  ダニング＝クルーガー効果は、教育、採用、政治、公共の議論に影響を与えます。
  これは、なぜ悪いアイデアが拡散し、なぜ専門家が軽視されるのかを説明します。
  個人および集合的な意思決定においては、校正が重要です。

professional_application:
  networking_and_relationship_building: |
    誰かが非常に自信を持っている場合、彼らがダニング＝クルーガーゾーンにいる可能性があるかどうかを検討しましょう。
    不確実性を表明する人々を含む、多様な視点を求めましょう。
  collaborative_learning_initiative: |
    不確実性を認めることが評価される文化を創造しましょう。
    人々が自分の能力を正確に評価するのに役立つ、校正演習とフィードバックを奨励しましょう。

how_can_this_be_misapplied:
  dismissing_all_confidence: |
    自信のある人は常に間違っていると仮定すること。時には自信は正当化される。
  false_modesty: |
    専門家が謙虚に見せるために、自分たちが知っているよりも知らないふりをすること。
  gatekeeping: |
    ダニング＝クルーガー効果を、議論に参加せずに、「専門家」に反対する人をすべて却下するために使用すること。
  self_doubt_paralysis: |
    自分の判断を決して信頼しないほど、過度に修正しすぎること。

