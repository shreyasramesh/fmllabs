# Confirmation Bias
# Mental Model / Cognitive Bias - Example Entry

id: confirmation_bias
name: 確証バイアス

quick_introduction: |
  確証バイアスとは、既存の信念を裏付けるような情報を探し、解釈し、記憶する傾向のことです。私たちは、支持する証拠により重きを置き、自分たちの見解に反する証拠を軽視したり却下したりします。仮説を検証するのではなく、確認するような質問をします。

one_liner: 私たちは信念を確証するものを探し、記憶します。それに反するものは軽視します。

try_this:
  - 質問：「私を間違っていると証明するものは何か？」 積極的に反証を探しましょう。
  - 支持する情報と反証する情報のどちらに重きを置いているかに気づきましょう。
  - 自分の見解と同じくらい真剣に、反対の視点も考慮しましょう。

ask_yourself:
  - 私は仮説を検証しているのか、それとも単に確認しているだけなのか？
  - 新しい証拠に基づいて、最後に自分の考えを変えたのはいつか？

in_more_detail: |
  私たちは情報のニュートラルな処理者ではありません。私たちは確証を求め、曖昧さを支持として解釈し、ミスよりもヒットを記憶します。私たちは、同じ考えを持つ人々やメディアに囲まれます。「なぜ私は正しいのか？」と問うのではなく、「私を間違っていると証明するものは何か？」と問います。これにより、私たちは過信し、更新が遅れます。

  確証バイアスは、最も蔓延しており、よく文書化されているバイアスの1つです。科学、政治、人間関係、ビジネスに影響を与えます。それを克服するには、意図的な努力と構造化されたプロセスが必要です。

why_this_is_important: |
  確証バイアスを認識することは、良い意思決定と学習にとって不可欠です。それは、反証を探し、代替仮説を考慮し、正当な理由があれば信念を更新するのに役立ちます。それは科学的思考の基盤です。

when_to_use:
  - 意思決定
  - 学習
  - 問題解決
  - リスク評価

how_can_you_spot_it:
  seeking_support: |
    自分の見解をテストするのではなく、確認する証拠を探すこと。
  asymmetric_interpretation: |
    曖昧な証拠を自分の立場への支持として解釈すること。
  discounting_disconfirming: |
    自分の信念に反する証拠を却下したり、最小限に抑えたりすること。
  selective_exposure: |
    自分に同意する情報源からの情報のみを消費すること。

examples:
  hiring: |
    早期に肯定的な印象を抱き、その候補者が素晴らしいことを確認するような質問をする。
  investing: |
    株式を購入した後、肯定的なニュースを探し、否定的な分析を却下する。
  relationships: |
    パートナーの行動を、その人に対する自分の見解（良いか悪いか）を確認するレンズを通して解釈する。
  politics: |
    自分の側の情報を無批判に受け入れ、反対側の同等の情報を却下する。

real_world_implications: |
  確証バイアスは、誤った信念を永続させ、対立を煽り、コストのかかる間違いを引き起こします。それは、優れた科学と優れた意思決定の敵です。それを克服するには、意図的な反証の探索が必要です。

professional_application:
  networking_and_relationship_building: |
    人々に対する意見を形成する際に、積極的に反証を探しましょう。「私の考えを変えるものは何か？」と問い、それを見つけましょう。
  collaborative_learning_initiative: |
    悪魔の弁護士、レッドチーム、プレモーテムなどを使用して、反証となる視点を引き出しましょう。優れた証拠をもって、支配的な見解に異議を唱える人々に報酬を与えましょう。

how_can_this_be_misapplied:
  false_balance: |
    証拠が一方の側に強く支持されている場合に、すべての見解を等しく有効として扱うこと。
  excessive_skepticism: |
    一部の信念が十分に支持されている場合に、すべての証拠を「確証バイアス」として却下すること。
  contrarianism: |
    確証バイアスを避けるためだけに、反対の視点を採用すること。その場合、元の視点が正しい可能性があります。
  analysis_paralysis: |
    「私たちはバイアスがかかっているかもしれない」という理由で、決して意見にコミットしないこと。

