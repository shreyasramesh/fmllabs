# Inversion
# Mental Model / Cognitive Bias - Example Entry

id: inversion
name: 逆転の発想

quick_introduction: |
  逆転の発想とは、問題をひっくり返して考える問題解決手法です。「どうすれば成功できるか？」と問う代わりに、「何が私を失敗させるか？」と問い、それらを避けるのです。これは、前向きな思考では見落としがちなリスクやアンチパターンを明らかにします。

one_liner: 逆転の発想—失敗する原因を問い、それらを避けよう。

try_this:
  - どんな目標であっても、失敗する主な方法をリストアップし、それらを避けましょう。
  - ネガティブな想像を使いましょう：何がこれをうまくいかなくさせるでしょうか？
  - 問いましょう：賢い人は、これを台無しにするために何をするでしょうか？

ask_yourself:
  - これが失敗する原因について考えましたか？
  - 前向きなことだけを考えることで、何を見落としていますか？

in_more_detail: |
  チャーリー・マンガーによって広められ、数学的論理に根ざした逆転の発想は、成功を追求するよりも失敗を避ける方がしばしば容易であるという事実を利用します。物事がうまくいかなくなる主な方法を特定できれば、それらを体系的に排除することができます。

  カール・ヤコビは「常に逆転せよ」と言ったと伝えられています。ストア派は、持っているものを感謝し、逆境に備えるために、ネガティブな想像（損失を想像すること）を使用しました。逆転の発想は悲観主義ではありません。障害物を取り除くことで進歩するための構造化された方法です。

why_this_is_important: |
  逆転の発想は、壊滅的な間違いを避け、計画をストレステストし、明白でない解決策を見つけるのに役立ちます。これは、見過ごされがちな重要な失敗モードを確実にしないことで、前向きな計画を補完します。

when_to_use:
  - 問題解決 (problem_solving)
  - 意思決定 (decision_making)
  - リスク評価 (risk_assessment)
  - キャリアの選択 (career_moves)

how_can_you_spot_it:
  premortem_thinking: |
    プロジェクトの前に、「もしすでに失敗していたとしたら、なぜ失敗したのか？」と問うこと。
  anti_goals: |
    達成したいことと同様に、避けたいことを明確に定義すること。
  reverse_engineering_failure: |
    成功例だけでなく、失敗例を研究して教訓を抽出すること。
  constraint_focus: |
    アップサイドを最適化する前に、制約とボトルネックを特定すること。

examples:
  investing: |
    「この株が上がるためには何が必要か？」と問う代わりに、「何が私のお金を失わせるか？」と問い、それらのシナリオを避けましょう。
  career: |
    「私の評判を台無しにするものは何か？」という問いは、避けるべき行動のリストにつながります。
  product_launch: |
    「なぜほとんどの製品ローンチは失敗するのか？」という問いは、ローンチ前に対処すべきリスクを明らかにします。
  health: |
    「寿命を縮める習慣は何ですか？」という問いは、「健康になるためには何が重要か？」という問いよりも、より明確な回避リストを提供します。

real_world_implications: |
  逆転の発想は、工学（故障モード分析）、投資、戦略で使用されます。過信を減らし、リスク管理を改善します。過度に頼りすぎると、過剰な注意深さにつながる可能性があります。

professional_application:
  networking_and_relationship_building: |
    「この関係を損なうものは何か？」という問いは、信頼を壊す行動を避けるのに役立ちます。
  collaborative_learning_initiative: |
    プロジェクトのプレモーテム（事前死亡診断）を実施しましょう：「これは失敗した。なぜか？」という問いに答えて、計画と実行を改善しましょう。

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    失敗を避けることにのみ焦点を当てると、行動が麻痺し、必要なリスクテイクができなくなる可能性があります。
  negativity_bias: |
    逆転の発想は、前向きな機会の特定とバランスが取れていない場合、ネガティブなバイアスを増幅させる可能性があります。
  analysis_paralysis: |
    失敗モードについてあまりにも多くの時間を費やし、実行できなくなること。
  missing_upside: |
    逆転の発想は、何をすべきかを教えてくれるのではなく、何を避けるべきかだけを教えてくれます。ポジティブな目標は依然として必要です。

