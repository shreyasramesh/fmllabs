# Hanlon's Razor
# Mental Model / Cognitive Bias - Example Entry

id: hanlons_razor
name: ハンロンの剃刀

quick_introduction: |
  ハンロンの剃刀とは、「無能で十分に説明できることを悪意に帰するな」という原則です。言い換えれば、無能、見落とし、無知がその行動を説明できる場合に、悪い意図を仮定しないでください。

one_liner: 無能さや見落としで説明できる場合に悪意を仮定しないでください。

try_this:
  - 誰かにイライラさせられたとき、「これは間違いや無知で説明できるだろうか？」と自問してください。
  - 悪意を仮定する前に、より単純な説明をデフォルトとしてください。
  - 「彼らは私を傷つけようとした」と飛びついていることに気づきましょう。

ask_yourself:
  - 無能で説明できることを悪意に帰していないだろうか？
  - 彼らの立場だったら、同じように寛大な見方をしてもらいたいだろうか？

in_more_detail: |
  この原則は、人々に寛大な見方をするように促します。誰かの行動があなたを傷つけたりイライラさせたりした場合、デフォルトの仮定はしばしば、彼らがあなたを傷つけるつもりだったというものです。ハンロンの剃刀は、そのような行動の多くは、悪意からではなく、不注意、情報の不足、または実行のまずさに起因すると示唆しています。

  これは、悪意が決して存在しないという意味ではありません。より単純な説明が当てはまる場合に、最悪の解釈に飛びつくべきではないということです。この剃刀は、パラノイアを減らし、人間関係を改善し、問題に建設的に対応するのに役立ちます。

why_this_is_important: |
  ハンロンの剃刀を適用することは、対立を減らし、人間関係を維持し、非難を特定するのではなく、問題解決にエネルギーを集中させます。また、誰もがあなたを陥れようとしていると仮定するストレスからあなたを守ります。

when_to_use:
  - 対立解消
  - リーダーシップ
  - 関係構築
  - 意思決定

how_can_you_spot_it:
  quick_assumption_of_malice: |
    否定的な結果を意図的な危害として即座に解釈します。
  personalizing_mistakes: |
    何かがうまくいかなかったとき、それは個人的にあなたに向けられたものだと仮定します。
  ignoring_alternative_explanations: |
    無能、誤解、または見落としを可能性として考慮しません。
  escalation_before_inquiry: |
    何が起こったのかを尋ねる前に、怒りや報復で対応します。

examples:
  email_tone: |
    送信者が単に忙しいか、トーンが下手なだけかもしれないのに、簡潔なメールを受動攻撃的だと仮定すること。
  missed_deadline: |
    同僚が期限に遅れたことを、彼らが過剰に約束していたり、障害に遭遇したかもしれないのに、妨害だと解釈すること。
  policy_decisions: |
    自分が嫌いな会社の方針が従業員を傷つけるように設計されたと仮定すること。実際には別の問題に対処するための不器用な試みであるかもしれないのに。
  traffic: |
    他のドライバーがあなたを見ていなかったかもしれないのに、意図的にあなたを割り込ませたと仮定すること。

real_world_implications: |
  ハンロンの剃刀は、職場文化を改善し、訴訟を減らし、対立解消をより効果的にします。過剰な使用は過失を許容する可能性があり、使用不足は不必要な対立を生み出します。

professional_application:
  networking_and_relationship_building: |
    誰かに失望させられたら、悪意を仮定する前に説明を求めてください。寛大な解釈をデフォルトにすることで、人間関係を維持してください。
  collaborative_learning_initiative: |
    チームでは、証明されるまでは間違いは意図的ではないと仮定する文化を築いてください。非難ではなく、システムとプロセスに焦点を当ててください。

how_can_this_be_misapplied:
  excusing_negligence: |
    繰り返される無能さや不注意を「悪意ではない」と片付け、責任を問うべき場合でもそうすること。
  ignoring_genuine_malice: |
    剃刀をあまりにも厳格に適用しすぎて、真の悪意のある人物や有害な行動を見逃すこと。
  avoiding_difficult_conversations: |
    ハンロンの剃刀を、業績の問題に対処しない言い訳として使用すること。
  gaslighting_victims: |
    本当に不当な扱いを受けた人に、「悪意を仮定している」と告げ、実際には悪意が存在していた場合。

