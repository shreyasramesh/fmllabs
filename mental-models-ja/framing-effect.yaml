# フレーミング効果
# メンタルモデル / 認知バイアス - 例

id: framing_effect
name: フレーミング効果

quick_introduction: |
  フレーミング効果とは、根本的な事実は同じであっても、選択肢がどのように提示されるかによって、私たちの決定が変化する傾向のことです。「生存率90%」と「死亡率10%」は同じ結果を表しますが、異なる選択を促します。フレーミングが意思決定を形作ります。

one_liner: 同じ事実でも、異なるフレーミングが異なった決定を導きます。

try_this:
  - 決定する前に、複数の方法で選択肢をフレーミングし直してみてください。ゲインフレームとロスフレームです。
  - 何かがどのように表現されるかによって、選択が変わることに気づいてください。
  - 質問してください：フレーミングから切り離された、根本的な事実は何ですか？

ask_yourself:
  - これがゲインとしてフレーミングされた場合と、ロスとしてフレーミングされた場合で、決定は変わるでしょうか？
  - フレーミングに反応していますか、それとも実際の結果に反応していますか？

in_more_detail: |
  カーネマンとトベルスキーは、人々は、たとえ同じ結果であっても、選択肢がゲインとしてフレーミングされるとリスク回避的になり、ロスとしてフレーミングされるとリスク追求的になることを示しました。肯定的なフレーミング（「200人の命を救う」）と否定的なフレーミング（「400人が死亡する」）は、選好を変えます。ロスフレームは、同等のゲインフレームよりも強い感情的反応を引き起こします。

  フレーミング効果は、医療の決定、政策、マーケティング、交渉に影響を与えます。これは最も強力でよく文書化されたバイアスの1つです。意識することは役立ちますが、完全に克服するのは困難です。

why_this_is_important: |
  フレーミング効果を認識することで、より一貫した意思決定を行い、操作に抵抗し、より効果的にコミュニケーションすることができます。また、同じオファーが提示方法によって受け入れられたり拒否されたりする理由も説明します。

when_to_use:
  - 意思決定
  - 交渉
  - リーダーシップ
  - リスク評価

how_can_you_spot_it:
  gain_loss_asymmetry: |
    同じ結果がゲインかロスとしてフレーミングされると、異なる決定がなされます。
  presentation_dependence: |
    内容ではなく、フレーミングだけが変わると、決定が変動します。
  default_influence: |
    選択肢の順序やラベル付けが、選択に影響を与えます。
  emotional_trigger: |
    特定のフレーミングが、より強い感情的反応を引き起こします。

examples:
  medical: |
    同じ処置に対する「生存率90%」対「死亡率10%」—
    人々はフレーミングに基づいて異なる選択をします。
  sales: |
    「50ドル節約」対「50ドル失わない」—同等のフレーミング、異なる
    心理的影響。
  policy: |
    「減税」対「政府支出」—同じ政策、異なる
    政治的反応。
  negotiation: |
    オファーを「割引」として提示するか、「割増料金の回避」として提示するかで
    受け入れ率が変わります。

real_world_implications: |
  フレーミング効果は、広告、政治、交渉で悪用されます。
  医療の決定や政策支持に影響を与えます。
  フレーミングし直すことで、意思決定とコミュニケーションを改善できます。意識していても、効果を完全に排除することはできません。

professional_application:
  networking_and_relationship_building: |
    選択肢を提示する際は、複数のフレーミングを検討してください。
    異なるフレーミングがどのように受け止め方に影響するかをテストしてください。
    情報を受け取る際は、「他にどのようにフレーミングできるだろうか？」と質問してください。
  collaborative_learning_initiative: |
    意思決定においては、フレーミング効果を確認するために、明示的に選択肢をフレーミングし直してください。
    「これをロスとしてフレーミングした場合、別の決定をするだろうか？」
    公平性のために、一貫したフレーミングを使用してください。

how_can_this_be_misapplied:
  manipulation: |
    相手の認識なしに、望ましい結果に誘導するために意図的にフレーミングすること。
  false_equivalence: |
    一部のフレーミングが重要な情報を曖昧にしているにもかかわらず、すべてのフレーミングが同等に有効であると想定すること。
  overcorrection: |
    フレーミングを完全に無視し、それが重要ではないと想定すること—
    それは重要です。
  spin: |
    明確にするためではなく、誤解を招くためにフレーミングを使用すること。

