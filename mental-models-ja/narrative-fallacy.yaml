# ナラティブの誤謬
# メンタルモデル / 認知バイアス - 例エントリ

id: narrative_fallacy
name: ナラティブの誤謬

quick_introduction: |
  ナラティブの誤謬とは、過去の出来事から、実際よりも首尾一貫していて、予測可能で、意味のあるように見える物語を構築する傾向のことです。私たちはランダムな出来事に後付けで説明をします。歴史の混乱を整然とした物語に変え、そしてその物語が必然だったと信じます。

one_liner: 私たちはランダムな出来事に首尾一貫した物語を後付けし、それが必然だったと信じます。

try_this:
  - 質問: この物語のどの部分が後知恵ですか？運はどのような役割を果たしましたか？
  - 整然とした説明には懐疑的になりましょう。過去は私たちの物語よりも混沌としていました。
  - 「理にかなっている」が「予測可能だった」の役割を果たしていることに気づきましょう。

ask_yourself:
  - 過去が実際よりも必然であったように見える物語を構築していませんか？
  - これが起こる前に予測できたでしょうか？

in_more_detail: |
  ナシム・タレブがこの用語を広めました。私たちは、原因と結果、ヒーローと悪役、明確な展開といった物語を強く求めます。そのため、後知恵で出来事を結びつける物語を構築します。物語は首尾一貫しているので真実のように感じますが、首尾一貫しているからといって正しいわけではありません。「理にかなっている」と「予測可能だった」を混同します。運とランダム性の役割を過小評価します。

  ナラティブの誤謬は、私たちが歴史から学ぶ方法、成功を評価する方法、そして予測を立てる方法に影響を与えます。物語の解説力を過大評価し、偶然の役割を過小評価します。

why_this_is_important: |
  ナラティブの誤謬を認識することは、過去から過剰に学び、予測可能性を過大評価することを避けるのに役立ちます。それは、因果関係と予測に対する謙虚さを奨励します。良い物語になるからといって、すべてが真実であったり、一般化できたりするわけではありません。

when_to_use:
  - 意思決定
  - 学習
  - リスク評価
  - 問題解決

how_can_you_spot_it:
  hindsight_coherence: |
    過去の出来事が、当時見えなかった整然とした物語で説明される。
  cause_effect_overconfidence: |
    多くの要因が関与した結果に、明確な原因を割り当てる。
  luck_minimization: |
    成功や失敗が、運ではなく、スキルや戦略によって説明される。
  story_over_evidence: |
    説得力のある物語が、統計的証拠を上回る。

examples:
  business_success: |
    「彼らはXのせいで成功した」と、多くの要因や運が関わっていたにもかかわらず、当てはまる物語を選ぶ。
  investing: |
    市場の動きを、満足感を与えるが事後的な物語で説明する。
  history: |
    歴史的出来事が、多くの要因に左右されたにもかかわらず、必然的な進歩として語られる。
  career: |
    「Xをしたからここにたどり着けた」と、運とタイミングが大きな役割を果たしたにもかかわらず。

real_world_implications: |
  ナラティブの誤謬は、学習を歪め、予測への過信、成功や失敗の帰属を歪めます。それは、過去を実際よりも予測可能に見せ、未来を現在よりも予測可能に見せます。

professional_application:
  networking_and_relationship_building: |
    誰かが成功談を語るとき、それが物語であることを覚えておいてください。首尾一貫していて説得力がありますが、おそらく単純化されています。運や見えない要因は過小評価されている可能性があります。
  collaborative_learning_initiative: |
    振り返りの際には、物語と証拠を区別してください。「当時、私たちは何と言っただろうか？」と問いかけてください。結果がわかる前に不確実性を記録するために、意思決定ジャーナルを使用してください。

how_can_this_be_misapplied:
  dismissing_all_explanation: |
    一部の物語は正しいです。すべてがナラティブの誤謬ではありません。因果関係は存在します。
  excessive_skepticism: |
    「ナラティブの誤謬」のために、すべての過去からの学習を拒否する。私たちは依然として有益な教訓を引き出すことができます。
  false_randomness: |
    一部の結果は意味のある帰属が可能であるにもかかわらず、すべてがランダムであると仮定する。
  undermining_storytelling: |
    物語はコミュニケーションと意味において価値がありますが、誤謬はそれが完全であるか予測的であると信じることであり、物語が存在することではありません。

