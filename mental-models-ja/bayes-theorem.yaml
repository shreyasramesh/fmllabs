# ベイズの定理
# メンタルモデル / 認知バイアス - 例エントリ

id: bayes_theorem
name: ベイズの定理

quick_introduction: |
  ベイズの定理は、新しい証拠を得たときに仮説の確率を更新する方法を説明します。
  これは、信念は証拠がそれをどれだけうまく支持しているかに比例して変化すべきであるという考え方を形式化したものであり、全か無かではなく、段階的に変化するものです。

one_liner: 証拠がそれをどれだけうまく支持しているかに比例して信念を更新する。

try_this:
  - 事前確率から始め、間違っていた場合に証拠がどれほどありそうか尋ねましょう。
  - 段階的に更新しましょう。1つのデータポイントで0%から100%に切り替えないように。
  - 代替仮説を検討しましょう。証拠はそれらにも適合するでしょうか？

ask_yourself:
  - この証拠は実際に確率をどれだけ変化させるか？
  - 信念を更新しているのか、それともすでに考えていたことを確認しているだけなのか？

in_more_detail: |
  この定理は、証拠が与えられた仮説の確率は、仮説が与えられた証拠の尤度に事前の確率を掛けたものを、証拠の確率で割ったものに等しいと述べています。実際には、事前の信念から始め、新しい証拠が仮説と代替仮説のどちらとどれだけ一致しているかを確認し、それに応じて更新します。

  ベイズ的思考は、間違っていた場合に証拠がどれほどありそうかを検討することを要求することで、確証バイアスに対抗します。これは確率的推論と科学的更新の基礎です。

why_this_is_important: |
  ベイズ的思考は、不確実性下での意思決定を改善し、過信を避けるのに役立ち、証拠から学ぶためのフレームワークを提供します。診断、予測、および不確実性のあるあらゆる分野に不可欠です。

when_to_use:
  - 意思決定
  - 問題解決
  - リスク評価
  - 学習

how_can_you_spot_it:
  prior_and_update: |
    ベースラインの信念から始め、新しい証拠に基づいてそれを調整する。
  likelihood_ratio_thinking: |
    「正しい場合と間違っている場合で、この証拠はどれくらいありそうか？」と尋ねる。
  incremental_updating: |
    証拠によって信念は突然切り替わるのではなく、徐々に変化する。
  base_rate_respect: |
    事前の確率（ベースレート）は、最新のデータポイントだけでなく、重要である。

examples:
  medical_diagnosis: |
    まれな病気に対する陽性検査。事前確率（低い有病率）は、陽性結果が偽陽性であることが多いことを意味します。ベイズの定理は確率を更新します。
  forecasting: |
    最初の推定値に固執するのではなく、新しいデータが到着するにつれて予測を更新する。
  hiring: |
    役割への適合性に関するベースレートから始め、面接のパフォーマンスに基づいて更新する。
  investing: |
    新しい情報（収益、ニュース）が到着するにつれて、企業が成功する確率を更新する。

real_world_implications: |
  ベイズ的思考は、現代のAI、医療診断、科学的推論の基盤となっています。ベースレート無視と確証バイアスを是正します。不確実性のあるあらゆる分野において強力なツールです。

professional_application:
  networking_and_relationship_building: |
    固定された第一印象に固執するのではなく、新しい証拠に基づいて人々に関する信念を更新する。行動を解釈する際には、ベースレート（例：この行動はどれくらい一般的か？）を考慮する。
  collaborative_learning_initiative: |
    議論の前に、チームが明確に事前の仮説を述べ、証拠が提示されたときに更新することを奨励する。アンカリングと確証バイアスを軽減する。

how_can_this_be_misapplied:
  overprecision: |
    不確実性が高い場合に正確な確率を割り当てること。
  prior_rigidity: |
    強い事前の仮説に固執し、新しい証拠で十分に更新しないこと。
  base_rate_tyranny: |
    ベースレートがそう示唆しているからといって、強い証拠を無視すること。時には証拠が優先されるべきである。
  false_sophistication: |
    実際の推論を行わずに、厳密さを装うためにベイズの言葉を使うこと。

