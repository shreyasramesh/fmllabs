# yaml-language-server: $schema=schema/mental-models-index-schema.json
# Mental Models & Cognitive Biases Index (Tamil)

mental_models:
  - id: ambiguity_effect
    name: தெளிவின்மை விளைவு
    path: mental-models-ta/ambiguity-effect.yaml
    description: |
      தெளிவின்மை விளைவு என்பது, விளைவுகளின் நிகழ்தகவு பற்றிய தகவல் இல்லாதபோது, விருப்பங்களைத் தவிர்ப்பதற்கான போக்காகும். அறியப்படாத அபாயங்களை விட அறியப்பட்ட அபாயங்களை நாங்கள் விரும்புகிறோம்—அறியப்படாத அபாயங்கள் சிறந்ததாக இருந்தாலும் கூட. நிச்சயமற்ற தன்மை தணிக்கை உணர்வை ஏற்படுத்துகிறது.

  - id: anchoring_bias
    name: நங்கூரப் பக்கச்சார்பு
    path: mental-models-ta/anchoring-bias.yaml
    description: |
      முடிவுகளை எடுக்கும்போது, முதலில் எதிர்கொள்ளும் தகவலை அதிகமாகச் சார்ந்திருக்கும் போக்குக்கு நங்கூரப் பக்கச்சார்பு என்று பெயர். அந்த ஆரம்ப "நங்கூரம்" பின்னர் வரும் தீர்ப்புகளைத் திரித்துக் காட்டுகிறது, அது பொருத்தமற்றதாகவோ அல்லது தன்னிச்சையாகவோ இருந்தாலும் கூட.

  - id: availability_cascade
    name: கிடைக்கும்தன்மை அடுக்கம் (Availability Cascade)
    path: mental-models-ta/availability-cascade.yaml
    description: |
      கிடைக்கும்தன்மை அடுக்கம் என்பது ஒரு யோசனை மீண்டும் மீண்டும் பொது விவாதங்களில்
      வருவதன் மூலம் நம்பகத்தன்மையை பெறும் ஒரு சுய-வலுப்படுத்தும் செயல்முறையாகும்.
      அதை எவ்வளவு அதிகமாக விவாதிக்கிறோமோ, அவ்வளவு "கிடைக்கும்தன்மை" அடைகிறது,
      அவ்வளவு அதிகமாக மக்கள் அதை நம்புகிறார்கள், மேலும் அது மேலும் விவாதிக்கப்படுகிறது.
      கூட்டு நம்பிக்கை அதன் அடிப்படை உண்மையை பொருட்படுத்தாமல் வேகமெடுக்கிறது.

  - id: availability_heuristic
    name: இருப்புக்கான ஆய்வறிக்கை (Availability Heuristic)
    path: mental-models-ta/availability-heuristic.yaml
    description: |
      ஒரு நிகழ்வின் நிகழ்தகவை, அது எவ்வளவு எளிதாக நினைவுக்கு வருகிறது என்பதைப் பொறுத்து மதிப்பிடும் ஒரு போக்குதான் இருப்புக்கான ஆய்வறிக்கை. நாம் உடனடியாக நினைவுகூரக்கூடிய உதாரணங்கள் இருந்தால், அந்த நிகழ்வு பொதுவானது என்று கருதுகிறோம். தெளிவாக, சமீபத்திய அல்லது உணர்ச்சிகரமான உதாரணங்கள் நமது நிகழ்தகவு மதிப்பீடுகளை ஆதிக்கம் செலுத்துகின்றன.

  - id: baader_meinhof_phenomenon
    name: பாடர்-மெய்ன்ஹோஃப் நிகழ்வு
    path: mental-models-ta/baader-meinhof-phenomenon.yaml
    description: |
      பாடர்-மெய்ன்ஹோஃப் நிகழ்வு (அதிர்வெண் மாயை என்றும் அழைக்கப்படுகிறது) என்பது நீங்கள்
      புதிதாக ஒன்றைப் பற்றிக் கற்றுக்கொண்ட பிறகு, அதை திடீரென்று எல்லா இடங்களிலும் கவனிப்பது.
      இது ஒரு தற்செயல் நிகழ்வு போல் தோன்றலாம், ஆனால் இது பெரும்பாலும் தேர்ந்தெடுக்கப்பட்ட கவனம் -
      நீங்கள் சமீபத்தில் எதிர்கொண்டதை கவனிக்க உங்கள் மூளை தூண்டப்படுகிறது.

  - id: barnum_effect
    name: பர்னம் விளைவு
    path: mental-models-ta/barnum-effect.yaml
    description: |
      பர்னம் விளைவு (அல்லது ஃபோரர் விளைவு) என்பது, தெளிவற்ற, பொதுவான ஆளுமை விளக்கங்களை தனித்துவமாக துல்லியமானதாக ஏற்கும் போக்காகும். ஜாதகம், ஜோதிடர்கள் மற்றும் ஆளுமை சோதனைகள் கிட்டத்தட்ட அனைவருக்கும் பொருந்தக்கூடிய கூற்றுகளைப் பயன்படுத்துகின்றன - ஆனால் நாம் அவற்றை நமக்கே பிரத்யேகமாக நம்புகிறோம். நாம் பொதுவானவற்றில் நம்மைக் காண்கிறோம்.

  - id: base_rate_fallacy
    name: அடிப்படை விகிதப் பிழை (Base Rate Fallacy)
    path: mental-models-ta/base-rate-fallacy.yaml
    description: |
      அடிப்படை விகிதப் பிழை என்பது குறிப்பிட்ட, தெளிவான தகவல்களுக்குச் சாதகமாக,
      பொதுவான புள்ளிவிவரத் தகவல்களை (அடிப்படை விகிதங்கள்) புறக்கணிக்கும் போக்கு ஆகும்.
      நாம் குறிப்பிட்ட வழக்கை அதிகப்படுத்துகிறோம் மற்றும் முந்தைய நிகழ்தகவைக் குறைக்கிறோம்.
      ஒரு கவர்ச்சிகரமான கதை எண்களை மீறிச் செல்லலாம்.

  - id: bayes_theorem
    name: பேயஸ் தேற்றம்
    path: mental-models-ta/bayes-theorem.yaml
    description: |
      பேயஸ் தேற்றம், புதிய ஆதாரம் கிடைக்கும்போது ஒரு கருதுகோளின் நிகழ்தகவை எவ்வாறு புதுப்பிப்பது என்பதை விவரிக்கிறது. இது நம்பிக்கைகள் ஆதரிக்கும் அளவுக்கு விகிதாசாரமாக மாற வேண்டும் என்ற கருத்தை முறைப்படுத்துகிறது—அனைத்தும் அல்லது எதுவும் இல்லை, ஆனால் படிப்படியாக.

  - id: ben_franklin_effect
    name: பென் ஜான்சன் விளைவு
    path: mental-models-ta/ben-franklin-effect.yaml
    description: |
      பென் ஜான்சன் விளைவு என்பது, ஒருவர் நமக்கு உதவிய பிறகு, நாம் அவரை அதிகமாக விரும்புவோம் என்ற உளவியல் நிகழ்வு ஆகும். நாம் விரும்புபவர்களுக்காகவே உதவிகளைச் செய்கிறோம் என்ற உள்ளுணர்வுக்கு மாறாக, நாம் யாருக்காக உதவிகளைச் செய்தோமோ அவர்களை நாம் அதிகமாக விரும்பிவிடுவோம்.

  - id: bounded_rationality
    name: வரையறுக்கப்பட்ட பகுத்தறிவு
    path: mental-models-ta/bounded-rationality.yaml
    description: |
      வரையறுக்கப்பட்ட பகுத்தறிவு என்பது, கிடைக்கக்கூடிய தகவல், அறிவாற்றல் திறன் மற்றும் நேரம் ஆகியவற்றால் மனிதர்களின் முடிவெடுக்கும் திறன் வரையறுக்கப்பட்டுள்ளது என்ற கருத்தாகும். நாம் உகந்ததாகச் செய்வதில்லை; மாறாக "திருப்தி அடைகிறோம்" – அதாவது, சிறந்த சாத்தியமான விருப்பங்களை விட போதுமானதாக இருக்கும் விருப்பங்களைத் தேர்ந்தெடுக்கிறோம்.

  - id: bystander_effect
    name: பார்வையாளர் விளைவு
    path: mental-models-ta/bystander-effect.yaml
    description: |
      பார்வையாளர் விளைவு என்பது, மற்றவர்கள் இருக்கும்போது தனிநபர்கள் உதவி செய்ய வாய்ப்பு குறைவதாகும். பார்வையாளர்கள் அதிகமாக இருந்தால், எந்த ஒரு தனிநபரும் செயல்படுவதற்கான வாய்ப்பு குறையும். பொறுப்பு பரவலாகிறது; யாராவது ஒருவர் உதவுவார் என்று நாம் கருதுகிறோம்.

  - id: circle_of_competence
    name: தகுதி வட்டம்
    path: mental-models-ta/circle-of-competence.yaml
    description: |
      தகுதி வட்டம் என்பது ஒரு மன மாதிரி ஆகும். இது உங்கள் நிபுணத்துவத்தின் எல்லைகளை அறிந்து, முக்கியமான முடிவுகளை எடுக்கும்போது அவற்றுக்குள்ளேயே இருக்குமாறு வலியுறுத்துகிறது. வாரன் பப்பெட் மற்றும் சார்லி முங்கர், உங்களுக்குத் தெரியாததை அறிந்துகொள்வதை வலியுறுத்துகின்றனர்.

  - id: cognitive_dissonance
    name: அறிவாற்றல் முரண்பாடு
    path: mental-models-ta/cognitive-dissonance.yaml
    description: |
      அறிவாற்றல் முரண்பாடு என்பது நாம் முரண்பாடான நம்பிக்கைகளைக் கொண்டிருக்கும்போது, ​​அல்லது நமது செயல்கள் நமது நம்பிக்கைகளுக்கு முரணாக இருக்கும்போது நாம் உணரும் மன அசௌகரியம் ஆகும். இந்த அசௌகரியத்தைக் குறைக்க நாம் தூண்டப்படுகிறோம்—பெரும்பாலும் நமது செயல்களை மாற்றுவதை விட, நமது செயல்களுக்குப் பொருந்த நமது நம்பிக்கைகளை மாற்றுவதன் மூலம்.

  - id: confirmation_bias
    name: உறுதிப்படுத்தல் சார்பு
    path: mental-models-ta/confirmation-bias.yaml
    description: |
      உறுதிப்படுத்தல் சார்பு என்பது நமது ஏற்கனவே உள்ள நம்பிக்கைகளை உறுதிப்படுத்தும் தகவல்களைத் தேடுவது, விளக்குவது மற்றும் நினைவில் கொள்வது ஆகும். நாம் ஆதரவான ஆதாரங்களுக்கு அதிக முக்கியத்துவம் கொடுக்கிறோம், நமது கருத்துக்களை எதிர்க்கும் ஆதாரங்களை புறக்கணிக்கிறோம் அல்லது நிராகரிக்கிறோம். நமது கருதுகோள்களைச் சோதிப்பதை விட, உறுதிப்படுத்தும் கேள்விகளைக் கேட்கிறோம்.

  - id: curse_of_knowledge
    name: அறிவின் சாபம்
    path: mental-models-ta/curse-of-knowledge.yaml
    description: |
      நீங்கள் ஏதோ ஒன்றை அறிந்த பிறகு, அதை அறியாத நிலை எப்படி இருக்கும் என்பதை கற்பனை செய்ய முடியாததே அறிவின் சாபம். நிபுணர்கள் ஆரம்பநிலையினருக்குக் கற்பிப்பதில் சிரமப்படுகிறார்கள், ஏனெனில் அவர்களால் ஆரம்பநிலையாளரின் பார்வையை மீண்டும் உருவாக்க முடியாது. நீங்கள் அறிந்தவுடன், அறியாதிருந்த நிலையை மறந்து விடுகிறீர்கள்.

  - id: default_effect
    name: இயல்புநிலை விளைவு
    path: mental-models-ta/default-effect.yaml
    description: |
      கொடுக்கப்பட்ட தேர்வுகளில், ஏற்கனவே தேர்ந்தெடுக்கப்பட்ட விருப்பத்தை தேர்ந்தெடுக்கும் போக்கு இயல்புநிலை விளைவு ஆகும். இயல்புநிலையாக அமைக்கப்பட்ட எந்தவொரு விஷயத்திற்கும் வலுவான நன்மை உண்டு - அது அவர்களுக்கு உகந்ததா இல்லையா என்பதைப் பொருட்படுத்தாமல் மக்கள் பெரும்பாலும் அதிலேயே நிலைத்து நிற்கிறார்கள்.

  - id: dunning_kruger_effect
    name: டன்னிங்-க்ரூகர் விளைவு
    path: mental-models-ta/dunning-kruger-effect.yaml
    description: |
      டன்னிங்-க்ரூகர் விளைவு என்பது ஒரு அறிவாற்றல் சார்புநிலையை விவரிக்கிறது, இதில் ஒரு துறையில் குறைந்த அறிவு அல்லது திறன் உள்ளவர்கள் தங்கள் திறனை அதிகமாக மதிப்பிடுகிறார்கள், அதேசமயம் நிபுணர்கள் தங்கள் திறனை குறைத்து மதிப்பிட முனைகிறார்கள். உங்களுக்கு எவ்வளவு குறைவாகத் தெரியுமோ, அவ்வளவு நம்பிக்கையுடன் நீங்கள் இருக்கலாம்.

  - id: empathy_gap
    name: இரக்க இடைவெளி
    path: mental-models-ta/empathy-gap.yaml
    description: |
      நாம் ஒரு வித்தியாசமான மனநிலையில் இருக்கும்போது, மற்றவர்களின் மனநிலையை
      புரிந்துகொள்வதிலும் கணிப்பதிலும் உள்ள சிரமம் இரக்க இடைவெளி ஆகும்.
      நாம் அமைதியாக இருக்கும்போது, கோபமாக அல்லது பசியாக இருக்கும்போது நாம் எப்படி
      உணர்வோம் என்பதை குறைத்து மதிப்பிடுகிறோம். நாம் வயிறார சாப்பிட்டிருக்கும்போது,
      பசியாக இருக்கும்போது நமக்கு எவ்வளவு உணவு தேவைப்படும் என்பதை குறைத்து மதிப்பிடுகிறோம்.

  - id: endowment_effect
    name: உடைமைப் பற்றுக் கோளாறு
    path: mental-models-ta/endowment-effect.yaml
    description: |
      உடைமைப் பற்றுக் கோளாறு என்பது, நாம் எதையாவது சொந்தமாகக் கொண்டிருப்பதால் மட்டும் அதன் மதிப்பை அதிகமாகக் கருதும் போக்கு ஆகும். அதை இழக்க நாம் அதிகமாகக் கேட்போம், அதை வாங்குவதற்கு நாம் செலவிட விரும்பும் தொகையை விட. உடைமை என்பது ஒரு பற்றை உருவாக்குகிறது, அது நமது மதிப்பீட்டைத் திரித்துக் காட்டுகிறது.

  - id: false_consensus_effect
    name: தவறான ஒருமித்த கருத்து விளைவு
    path: mental-models-ta/false-consensus-effect.yaml
    description: |
      தவறான ஒருமித்த கருத்து விளைவு என்பது மற்றவர்கள் நமது நம்பிக்கைகள், அணுகுமுறைகள் மற்றும் நடத்தைகளுடன் எவ்வளவு உடன்படுகிறார்கள் என்பதை மிகைப்படுத்தி மதிப்பிடும் ஒரு போக்கு ஆகும். நமது பார்வைகள் உண்மையில் இருப்பதை விட பொதுவானவை என்று நாம் கருதுகிறோம், மேலும் நியாயமானவர்கள் கூட மாறுபட முடியும் என்று கற்பனை செய்ய நாம் சிரமப்படுகிறோம்.

  - id: framing_effect
    name: சட்டக விளைவு
    path: mental-models-ta/framing-effect.yaml
    description: |
      சட்டக விளைவு என்பது, ஒரே மாதிரியான உண்மைகள் இருந்தாலும், விருப்பங்கள் எவ்வாறு வழங்கப்படுகின்றன என்பதைப் பொறுத்து நமது முடிவுகள் மாறும் போக்காகும். "90% உயிர்வாழ்வு" மற்றும் "10% இறப்பு" ஆகியவை ஒரே விளைவை விவரிக்கின்றன, ஆனால் வெவ்வேறு தேர்வுகளைத் தூண்டுகின்றன. சட்டகம் முடிவை வடிவமைக்கிறது.

  - id: fundamental_attribution_error
    name: அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை
    path: mental-models-ta/fundamental-attribution-error.yaml
    description: |
      மற்றவர்களின் நடத்தையை அவர்களின் குணம் அல்லது ஆளுமையுடன் தொடர்புபடுத்தி, ஆனால் நமது சொந்த நடத்தையை சூழ்நிலைக் காரணிகளுடன் தொடர்புபடுத்தும் போக்கு அடிப்படை பண்புக் கூறுகளை மிகைப்படுத்திக் கூறும் பிழை எனப்படும். நாம் மற்றவர்களை அவர்களின் செயல்களால் மதிப்பிடுகிறோம், நம்மை நமது நோக்கங்களால் மதிப்பிடுகிறோம்.

  - id: gamblers_fallacy
    name: சூதாட்டக்காரரின் தவறான நம்பிக்கை
    path: mental-models-ta/gamblers-fallacy.yaml
    description: |
      சூதாட்டக்காரரின் தவறான நம்பிக்கை என்பது கடந்த கால சுயாதீனமான நிகழ்வுகள்
      எதிர்காலத்தை பாதிக்கும் என்ற தவறான நம்பிக்கையாகும். தொடர்ச்சியான தலைகள்
      விழுந்த பிறகு, வால் "வர வேண்டிய நேரம்" என்று நாம் நினைக்கிறோம்—ஒவ்வொரு
      சுழற்சியும் சுயாதீனமானதாக இருந்தாலும். நாம் சீரற்ற தன்மையில் வடிவங்களைக்
      காண்கிறோம் மற்றும் தேவைப்படாதபோது "திருத்தம்" அல்லது "மீள்வீழ்ச்சியை"
      எதிர்பார்க்கிறோம்.

  - id: groupthink
    name: குழு சிந்தனை
    path: mental-models-ta/groupthink.yaml
    description: |
      குழு சிந்தனை என்பது, ஒத்திசைவான குழுக்கள் விமர்சன மதிப்பீட்டை விட ஒருமித்த கருத்து மற்றும் இணக்கத்திற்கு முன்னுரிமை அளிக்கும் ஒரு போக்காகும். உறுப்பினர்கள் கருத்து வேறுபாடுகளை அடக்குகிறார்கள், சுய தணிக்கை செய்கிறார்கள், மற்றும் குழுவின் உணரப்பட்ட பார்வைக்கு இணங்குகிறார்கள். ஒற்றுமையின் ஆசை சிறந்த முடிவின் ஆசையை overrides செய்கிறது.

  - id: halo_effect
    name: ஒளிவட்ட விளைவு
    path: mental-models-ta/halo-effect.yaml
    description: |
      ஒளிவட்ட விளைவு என்பது ஒரு நேர்மறையான பண்பு அல்லது எண்ணம்
      ஒரு நபரைப் பற்றிய நமது ஒட்டுமொத்த தீர்ப்பை பாதிக்கும் போக்கு ஆகும்.
      ஒருவரின் தோற்றம் நமக்கு பிடித்தால், அவர்கள் திறமையானவர்கள் என்று நாம்
      ஊகிக்கலாம். நாம் ஒரு திறமையை பாராட்டினால், அவர்கள் எல்லாவற்றிலும்
      சிறந்தவர்கள் என்று நாம் ஊகிப்போம். ஒரு நேர்மறையான அம்சம் மற்றவற்றின் மீது
      ஒரு "ஒளிவட்டத்தை" வீசுகிறது.

  - id: hanlons_razor
    name: ஹான்லோனின் கத்தி
    path: mental-models-ta/hanlons-razor.yaml
    description: |
      ஹான்லோனின் கத்தி கூறுகிறது: "திறமையின்மையால் போதுமான அளவு விளக்கப்படக்கூடிய ஒன்றை தீய நோக்கத்துடன் தொடர்புபடுத்தாதீர்கள்." வேறுவிதமாகக் கூறினால், திறமையின்மை, மேற்பார்வை அல்லது அறியாமை நடத்தையை விளக்கக்கூடும் போது கெட்ட நோக்கத்தை யூகிக்க வேண்டாம்.

  - id: hawthorne_effect
    name: ஹாதோர்ன் விளைவு
    path: mental-models-ta/hawthorne-effect.yaml
    description: |
      ஹாதோர்ன் விளைவு என்பது மக்கள் கவனிக்கப்படுகிறார்கள் அல்லது ஆய்வு செய்யப்படுகிறார்கள் என்பதை அறிந்தால் தங்கள் நடத்தையை மாற்றிக் கொள்ளும் போக்கைக் குறிக்கிறது. கவனிப்பின் செயல்பாடு, சோதிக்கப்படும் தலையீட்டை விட மாற்றத்தை ஏற்படுத்தக்கூடும். மக்கள் தங்களுக்குக் கிடைக்கும் கவனத்திற்கு எதிர்வினையாற்றுகிறார்கள்.

  - id: hindsight_bias
    name: பின்னோக்கு சார்பு
    path: mental-models-ta/hindsight-bias.yaml
    description: |
      பின்னோக்கு சார்பு (அல்லது "எனக்கு எல்லாம் முன்பே தெரியும்" விளைவு) என்பது,
      ஒரு நிகழ்வு நடந்த பிறகு, அதை நாம் கணித்திருக்கலாம் அல்லது எதிர்பார்த்திருக்கலாம்
      என்று நம்பும் ஒரு போக்காகும். முடிவுகளை அவை இருந்ததை விட தவிர்க்க முடியாதவை
      என்று தோன்றும்படி கடந்த காலத்தை நாம் மறுகட்டமைக்கிறோம்.

  - id: hyperbolic_discounting
    name: அதிபரவளைய தள்ளுபடி
    path: mental-models-ta/hyperbolic-discounting.yaml
    description: |
      அதிபரவளைய தள்ளுபடி என்பது பெரிய, தாமதமான பரிசுகளை விட சிறிய, உடனடி பரிசுகளுக்கு முன்னுரிமை அளிக்கும் போக்காகும்—மேலும் எதிர்காலத்தை பகுத்தறிவு மாதிரிகள் கணிப்பதை விட அதிகமாக தள்ளுபடி செய்கிறது. நாம் நிகழ்காலத்தை மிகைப்படுத்தி, எதிர்காலத்தை சீரற்ற வழிகளில் குறைத்து மதிப்பிடுகிறோம்.

  - id: illusion_of_control
    name: கட்டுப்பாட்டின் மாயத்தோற்றம்
    path: mental-models-ta/illusion-of-control.yaml
    description: |
      கட்டுப்பாட்டின் மாயத்தோற்றம் என்பது விளைவுகளைப் பாதிக்கும் நமது திறனை அதிகமாக மதிப்பிடும் ஒரு போக்கு. சீரற்ற நிகழ்வுகள், மற்றவர்கள் மற்றும் சிக்கலான அமைப்புகள் மீது நாம் நினைப்பதை விட நமக்கு அதிக கட்டுப்பாடு இருப்பதாக நம்புகிறோம். நாம் தொடர்பை காரணத்தோடு குழப்புகிறோம், செயலையும் தாக்கத்தையும் குழப்புகிறோம்.

  - id: impact_bias
    name: தாக்க சார்பு
    path: mental-models-ta/impact-bias.yaml
    description: |
      தாக்க சார்பு என்பது எதிர்கால நிகழ்வுகளுக்கு நாம் உணர்ச்சி ரீதியான எதிர்வினைகளை எவ்வாறு உணர்வோம் மற்றும் எவ்வளவு காலம் உணர்வோம் என்பதை அதிகமாக மதிப்பிடும் போக்காகும். நல்ல விஷயங்கள் நம்மை அவை செய்வதை விட மகிழ்ச்சியாக மாற்றும் என்றும், கெட்ட விஷயங்கள் நம்மை அவை செய்வதை விட மிகவும் துயரமாக மாற்றும் என்றும் நாம் நினைக்கிறோம். நாம் உணர்ச்சிகரமான முன்னறிவிப்புகளில் மோசமானவர்கள்.

  - id: in_group_bias
    name: அகக் குழு சார்பு (In-Group Bias)
    path: mental-models-ta/in-group-bias.yaml
    description: |
      அகக் குழு சார்பு என்பது, நம் குழுவைச் சேர்ந்தவர்கள் என்று நாம் கருதுபவர்களுக்கு, நம் குழுவைச் சாராதவர்களை விட சாதகமாகச் செயல்படும் ஒரு போக்கு ஆகும். நாம் மிகச் சிறிய அல்லது தன்னிச்சையான வேறுபாடுகளின் அடிப்படையில், அகக் குழு உறுப்பினர்களுக்கு நேர்மறையான குணங்களையும், புறக் குழு உறுப்பினர்களுக்கு எதிர்மறையான குணங்களையும் அளிக்கிறோம்.

  - id: inversion
    name: தலைகீழாக்குதல்
    path: mental-models-ta/inversion.yaml
    description: |
      தலைகீழாக்குதல் என்பது ஒரு சிக்கலைத் தீர்க்கும் முறையாகும், இது கேள்வியை வேறு கோணத்தில் பார்க்க உதவுகிறது.
      "நான் எப்படி வெற்றி பெறுவது?" என்று கேட்பதற்குப் பதிலாக, "எது என்னை தோல்வியடையச் செய்யும்?" என்று கேட்டு,
      அந்த விஷயங்களைத் தவிர்க்கலாம். இது முன்னோக்கி சிந்திக்கும் போது பெரும்பாலும் கவனிக்கப்படாத அபாயங்களையும்,
      தவறான அணுகுமுறைகளையும் வெளிக்கொணர்கிறது.

  - id: law_of_diminishing_returns
    name: குறைந்து வரும் வருவாயின் விதி
    path: mental-models-ta/law-of-diminishing-returns.yaml
    description: |
      குறைந்து வரும் வருவாயின் விதி கூறுவதாவது, மற்றவை நிலையாக இருக்கும்போது, ​​ஒரு உள்ளீட்டின் அளவை நீங்கள் அதிகரிக்கும்போது, ​​ஒவ்வொரு புதிய உள்ளீட்டு அலகிலிருந்தும் கிடைக்கும் கூடுதல் உற்பத்தி இறுதியில் குறையும். அதிகமாக இருப்பது எப்போதும் சிறந்தது அல்ல - கூடுதல் முயற்சி குறைவாகவும் குறைவாகவும் பலனளிக்கும் ஒரு புள்ளி உள்ளது.

  - id: loss_aversion_bias
    name: இழப்பு தவிர்ப்பு சார்பு
    path: mental-models-ta/loss-aversion-bias.yaml
    description: |
      இழப்பு தவிர்ப்பு என்பது சமமான ஆதாயங்களைப் பெறுவதை விட இழப்புகளைத் தவிர்ப்பதை விரும்பும் ஒரு போக்கு.
      மக்கள் பெறும் இன்பத்தை விட, இழக்கும் வலியை தோராயமாக இரண்டு மடங்கு அதிகமாக உணர்கிறார்கள்.

  - id: map_is_not_the_territory
    name: வரைபடம் என்பது நிலப்பரப்பு அல்ல
    path: mental-models-ta/map-is-not-the-territory.yaml
    description: |
      "வரைபடம் என்பது நிலப்பரப்பு அல்ல" என்பதன் பொருள் என்னவென்றால், யதார்த்தத்தின் ஒரு பிரதிநிதித்துவம் யதார்த்தம் அல்ல. மாதிரிகள், கோட்பாடுகள் மற்றும் விளக்கங்கள் பயனுள்ள எளிமைப்படுத்தல்கள், ஆனால் அவை எப்போதும் எதையாவது விட்டுவிடுகின்றன. நிலப்பரப்பிற்கான வரைபடத்தை குழப்புவது தவறுக்கு வழிவகுக்கிறது.

  - id: mere_exposure_effect
    name: வெறும் வெளிப்பாடு விளைவு
    path: mental-models-ta/mere-exposure-effect.yaml
    description: |
      வெறும் வெளிப்பாடு விளைவு என்பது நாம் ஒரு விஷயத்துடன் பழக்கப்பட்டுவிட்டோம் என்பதற்காகவே அதை விரும்புவதற்கான போக்காகும். மீண்டும் மீண்டும் பார்ப்பது - வலுவூட்டல் இல்லாமலேயே - விருப்பத்தை அதிகரிக்கிறது. நாம் அறிந்தவற்றை நாம் விரும்புகிறோம்.

  - id: narrative_fallacy
    name: கதைப் பிழை
    path: mental-models-ta/narrative-fallacy.yaml
    description: |
      கதைப் பிழை என்பது கடந்த கால நிகழ்வுகளிலிருந்து கதைகளை உருவாக்கும் ஒரு போக்கு ஆகும்.
      இந்தக் கதைகள், அவை உண்மையில் இருந்ததை விட மிகவும் ஒருங்கிணைந்ததாகவும், கணிக்கக்கூடியதாகவும், அர்த்தமுள்ளதாகவும் தோன்றும்படி செய்கின்றன.
      சீரற்ற தன்மையில் நாம் விளக்கங்களை மீளமைக்கிறோம். வரலாற்றின் குழப்பத்தை ஒரு நேர்த்தியான கதையாக மாற்றுகிறோம் - பின்னர் அந்தக் கதை தவிர்க்க முடியாதது என்று நம்புகிறோம்.

  - id: negativity_bias
    name: எதிர்மறை சார்பு
    path: mental-models-ta/negativity-bias.yaml
    description: |
      எதிர்மறை சார்பு என்பது நேர்மறை தகவல்களை விட எதிர்மறை தகவல்களுக்கு அதிக முக்கியத்துவம் கொடுக்கும் போக்காகும். மோசமான செய்திகள், விமர்சனங்கள் மற்றும் அச்சுறுத்தல்கள் நமது கவனத்தை ஈர்க்கின்றன மற்றும் சமமான நேர்மறை தூண்டுதல்களை விட நமது முடிவுகளை வலுவாக பாதிக்கின்றன.

  - id: occams_razor
    name: ஓக்காமின் கத்தி
    path: mental-models-ta/occams-razor.yaml
    description: |
      ஓக்காமின் கத்தி (அல்லது ஓக்காம்'ஸ் ரேசர்) என்பது போட்டியிடும் கருதுகோள்களில்,
      குறைந்தபட்ச அனுமானங்களைக் கொண்டிருப்பதே விரும்பத்தக்கது என்ற கொள்கையாகும்.
      எளிய விளக்கங்கள் பெரும்பாலும்—ஆனால் எப்போதும் இல்லை—சரியானவை.

  - id: ostrich_effect
    name: நெருப்புக்கோழி விளைவு
    path: mental-models-ta/ostrich-effect.yaml
    description: |
      நெருப்புக்கோழி விளைவு என்பது எதிர்மறையான நிதித் தகவல்களைத் தவிர்ப்பதற்கான ஒரு போக்கு ஆகும் - நெருப்புக்கோழி போல "தங்கள் தலையை மணலில் புதைத்துக் கொள்வது". சந்தைகள் வீழ்ச்சியடையும் போது மக்கள் தங்கள் போர்ட்ஃபோலியோக்களைப் பார்க்கத் தவறிவிடுகிறார்கள், பில்களைத் திறப்பதை தாமதப்படுத்துகிறார்கள், மேலும் செயல்பட உதவும் எச்சரிக்கை அறிகுறிகளைப் புறக்கணிக்கிறார்கள்.

  - id: pareto_principle
    name: பரேட்டோ கோட்பாடு
    path: mental-models-ta/pareto-principle.yaml
    description: |
      பரேட்டோ கோட்பாடு (அல்லது 80/20 விதி) என்பது, சுமார் 80% விளைவுகள் 20% காரணிகளிலிருந்து வருகின்றன என்பதைக் கூறுகிறது. ஒரு சிறிய சிறுபான்மையினர் உள்ளீடுகள் பெரும்பாலும் பெரும்பான்மையான வெளியீடுகளை உற்பத்தி செய்கின்றன - விற்பனை, பிழைகள், வாடிக்கையாளர்கள், முயற்சி, அம்சங்கள் மற்றும் பலவற்றில். முக்கியத்துவமான சிலவற்றில் கவனம் செலுத்துங்கள்.

  - id: parkinsons_law
    name: பார்கின்சன் விதி
    path: mental-models-ta/parkinsons-law.yaml
    description: |
      "பணி அதன் நிறைவுக்குக் கிடைக்கும் நேரத்தைப் பொறுத்து விரிவடைகிறது" என்று பார்கின்சன் விதி கூறுகிறது. ஒரு பணிக்கு ஒரு வாரம் ஒதுக்கப்பட்டால், அது ஒரு வாரத்தை எடுத்துக்கொள்ளும்; ஒரு நாளுக்கு ஒதுக்கப்பட்டால், அது பெரும்பாலும் ஒரு நாளிலேயே முடிந்துவிடும். இதேபோல், வரவுசெலவுத் திட்டங்கள், குழு அளவு மற்றும் வளங்களுக்கும் இது பொருந்தும்.

  - id: probabilistic_thinking
    name: நிகழ்தகவு சிந்தனை
    path: mental-models-ta/probabilistic-thinking.yaml
    description: |
      நிகழ்தகவு சிந்தனை என்பது உறுதிகளை விட சாத்தியக்கூறுகளின் அடிப்படையில் பகுத்தறிவு செய்யும் பழக்கமாகும். "இது நடக்குமா?" என்பதற்குப் பதிலாக, "இது எவ்வளவு சாத்தியம்?" என்று கேட்கிறோம். இது நிச்சயமற்ற தன்மையை ஏற்றுக்கொண்டு, சிறந்த முடிவுகளை எடுக்க அதைப் பயன்படுத்துகிறது.

  - id: pygmalion_effect
    name: பிக்மாலியன் விளைவு
    path: mental-models-ta/pygmalion-effect.yaml
    description: |
      பிக்மாலியன் விளைவு (அல்லது ரோசந்தால் விளைவு) என்பது அதிக எதிர்பார்ப்புகள் மேம்பட்ட செயல்திறனுக்கு வழிவகுக்கும் நிகழ்வு ஆகும். ஆசிரியர்கள், மேலாளர்கள் அல்லது மற்றவர்கள் ஒருவரிடமிருந்து அதிகமாக எதிர்பார்க்கும்போது, ​​அந்த நபர் சிறப்பாக செயல்படுகிறார். எதிர்பார்ப்புகள் சுய-நிறைவேறும் தீர்க்கதரிசனங்களாக மாறும்.

  - id: regression_to_the_mean
    name: சராசரிக்கு திரும்புதல்
    path: mental-models-ta/regression-to-the-mean.yaml
    description: |
      சராசரிக்கு திரும்புதல் என்பது ஒரு புள்ளியியல் நிகழ்வு ஆகும், இதில் உச்சகட்ட விளைவுகள் சராசரிக்கு நெருக்கமான விளைவுகளால் பின்பற்றப்படுகின்றன. அசாதாரணமாக நல்ல அல்லது கெட்ட முடிவு ஏற்பட்ட பிறகு, அடுத்த முடிவு குறைவான உச்சகட்டமாக இருக்கும் - இது எந்தவொரு காரண காரிய தலையீட்டாலும் அல்ல, சீரற்ற மாறுபாடு காரணமாகும்.

  - id: rosy_retrospection
    name: இளஞ்சிவப்பு நினைவுகூர்தல்
    path: mental-models-ta/rosy-retrospection.yaml
    description: |
      இளஞ்சிவப்பு நினைவுகூர்தல் என்பது கடந்த காலத்தை அது இருந்ததை விட சிறப்பாக நினைவில் கொள்ளும் ஒரு போக்கு.
      காலப்போக்கில் கடந்த அனுபவங்களை நாம் நேர்மறையாக நினைவுகூர்கிறோம், சிரமங்களை மென்மையாக்குகிறோம்
      மற்றும் நல்லதை பெருக்குகிறோம். "நல்ல பழைய நாட்கள்" பெரும்பாலும் நாம் நினைப்பதை விட சிறப்பாக இருந்ததில்லை.

  - id: salience_bias
    name: முக்கியத்துவ சார்பு
    path: mental-models-ta/salience-bias.yaml
    description: |
      முக்கியத்துவ சார்பு என்பது ஒரு சூழ்நிலையின் மிக முக்கியமான அல்லது கவனிக்கத்தக்க அம்சங்களில் கவனம் செலுத்தி, குறைவான வெளிப்படையான ஆனால் முக்கியத்துவம் வாய்ந்த காரணிகளை புறக்கணிக்கும் போக்கு ஆகும். எது முக்கியமாகத் தோன்றுகிறதோ அது நமது தீர்ப்புகளில் அதிகப்படியான கவனத்தையும் எடையையும் பெறுகிறது.

  - id: scarcity_bias
    name: அரிதான தன்மை சார்பு
    path: mental-models-ta/scarcity-bias.yaml
    description: |
      அரிதான தன்மை சார்பு என்பது, ஒரு பொருள் அரிதாக அல்லது குறைவாகக் கிடைக்கும்போது, அதற்கு அதிக மதிப்பளிக்கும் போக்காகும். "வரையறுக்கப்பட்ட நேரம்," "இன்னும் 3 மட்டுமே உள்ளன," மற்றும் "பிரத்தியேக அணுகல்" போன்ற வார்த்தைகள் அவசரத்தையும் ஆசையையும் தூண்டுகின்றன. இதனால், அந்தப் பொருளை நாம் உண்மையில் விரும்புகிறோமா அல்லது தேவையா என்பதைப் பகுத்தறிந்து மதிப்பிடுவதற்குப் பதிலாக, இந்த உணர்வுகள் நம்மை ஆட்கொள்கின்றன.

  - id: second_order_thinking
    name: இரண்டாம் நிலை சிந்தனை
    path: mental-models-ta/second-order-thinking.yaml
    description: |
      இரண்டாம் நிலை சிந்தனை என்பது உங்கள் செயல்களின் விளைவுகளின் விளைவுகளைக் கருத்தில் கொள்ளும் ஒரு பயிற்சியாகும். முதல் நிலை சிந்தனை "நான் X செய்தால் என்ன நடக்கும்?" என்று கேட்கிறது. இரண்டாம் நிலை சிந்தனை "அப்புறம் என்ன?" மற்றும் "அதற்குப் பிறகு என்ன?" என்று கேட்கிறது. இது எதிர்பாராத விளைவுகளை வெளிப்படுத்துகிறது.

  - id: sunk_cost_fallacy
    name: மூழ்கிய செலவு தவறு
    path: mental-models-ta/sunk-cost-fallacy.yaml
    description: |
      மூழ்கிய செலவு தவறு என்பது, எதிர்கால எதிர்பார்க்கப்படும் வருமானத்தின் அடிப்படையில் அல்லாமல்,
      ஏற்கனவே செலவிடப்பட்ட வளங்களின் காரணமாக ஒரு முடிவில் தொடர்ந்து முதலீடு செய்யும் போக்காகும்.
      "நாம் இவ்வளவு தூரம் வந்துவிட்டோம்" அல்லது "நான் ஏற்கனவே இவ்வளவு முதலீடு செய்துள்ளேன்" என்பது
      தவறானதைச் சரிசெய்ய மேலும் செலவு செய்ய வழிவகுக்கிறது.

  - id: survivorship_bias
    name: பிழைப்பு சார்பு
    path: mental-models-ta/survivorship-bias.yaml
    description: |
      பிழைப்பு சார்பு என்பது ஒரு செயல்முறையில் "பிழைத்தவர்களை" (survived) மட்டுமே கவனம் செலுத்தி, பிழைக்காதவர்களைப் புறக்கணிக்கும் ஒரு தர்க்கரீதியான பிழை ஆகும். நாம் வெற்றியாளர்களைப் பார்த்து, தோல்வியுற்றவர்களை மறந்து விடுகிறோம், இது வெற்றி மற்றும் தோல்வி பற்றிய மிகைப்படுத்தப்பட்ட நம்பிக்கைகளுக்கு வழிவகுக்கிறது.

  - id: zeigarnik_effect
    name: ஸெய்கார்னிக் விளைவு
    path: mental-models-ta/zeigarnik-effect.yaml
    description: |
      ஸெய்கார்னிக் விளைவு என்பது முடிக்கப்பட்ட பணிகளை விட, முடிக்கப்படாத அல்லது தடைபட்ட பணிகளை நினைவில் கொள்வதற்கான போக்காகும். முடிக்கப்படாத பணிகள் உளவியல் பதற்றத்தை உருவாக்குகின்றன, அவை நம் மனதில் தீவிரமாக இருக்கச் செய்கின்றன. நம் மூளை முடிக்கப்படாதவற்றைத் தக்க வைத்துக் கொள்கிறது.

  - id: zero_sum_thinking
    name: பூஜ்ஜிய-கூட்டல் சிந்தனை
    path: mental-models-ta/zero-sum-thinking.yaml
    description: |
      பூஜ்ஜிய-கூட்டல் சிந்தனை என்பது ஒருவருடைய வெற்றி மற்றவருடைய இழப்பாக இருக்க வேண்டும் என்ற நம்பிக்கை - வளங்கள் நிலையானவை மற்றும் உங்களுக்கு கிடைக்கும் எந்தவொரு நன்மையும் எனக்கு பாதகமானது.
      உண்மையில், பல சூழ்நிலைகள் நேர்மறை-கூட்டல்: இரு தரப்பினரும் பயனடையலாம்.
