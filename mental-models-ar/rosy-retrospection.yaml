# الاسترجاع المتفائل
# النموذج الذهني / الانحياز المعرفي - مثال إدخال

id: rosy_retrospection
name: الاسترجاع المتفائل

quick_introduction: |
  الاسترجاع المتفائل هو الميل لتذكر الماضي على أنه أفضل مما كان عليه.
  نستدعي التجارب السابقة بشكل أكثر إيجابية بمرور الوقت، مع تلطيف الصعوبات
  وتضخيم الجوانب الجيدة. "الأيام الخوالي" غالبًا لم تكن جيدة كما نتذكر.

one_liner: نتذكر الماضي على أنه أفضل مما كان عليه — "الأيام الخوالي" لم تكن بهذا القدر من الجودة.

try_this:
  - عند المقارنة بالماضي، اسأل: ما الذي كنت أشعر به فعليًا حينها؟
  - احتفظ بمفكرة لمقارنة الذاكرة بالواقع لاحقًا.
  - لاحظ متى يكون الحنين يصبغ حكمك على الحاضر.

ask_yourself:
  - هل أُضفي المثالية على الماضي؟
  - هل كنت سأكون سعيدًا حينها لو استطعت السفر عبر الزمن إلى الوراء؟

in_more_detail: |
  نميل إلى تذكر الجوانب الإيجابية للتجارب السابقة ونسيان أو
  تقليل السلبيات. العطلات والوظائف والعلاقات تبدو أفضل في
  الحنين مما كانت عليه في لحظتها. هذا يمكن أن يؤدي إلى مقارنات غير واقعية —
  نحكم على الحاضر مقابل ماضٍ مثالي.

  يؤثر الاسترجاع المتفائل على عملية اتخاذ القرار عندما نكرر خيارات سابقة
  متوقعين نفس النتيجة (المتذكرة). يمكنه أيضًا أن يغذي الحنين إلى
  عصو كانت أسوأ بشكل موضوعي. إنه عكس انحياز السلبية
  في الذاكرة.

why_this_is_important: |
  التعرف على الاسترجاع المتفائل يساعدك على إجراء مقارنات أكثر واقعية
  وتجنب تكرار الأخطاء الماضية بناءً على ذكريات مثالية. كما أنه
  يوضح سبب شوقنا للماضي أحيانًا على الرغم من التقدم الحالي.

when_to_use:
  - اتخاذ_القرار
  - تغييرات_وظيفية
  - بناء_العلاقات
  - التعلم

how_can_you_spot_it:
  idealized_past: |
    "الأمور كانت أفضل في ذلك الوقت" بينما قد تظهر المقاييس الموضوعية خلاف ذلك.
  selective_positive_memory: |
    تذكر الجيد ونسيان السيئ من التجارب السابقة.
  nostalgia_as_evidence: |
    استخدام الذكريات السعيدة كدليل على أن الخيارات السابقة كانت صحيحة.
  present_undervaluation: |
    يشعر الحاضر بسوء مما هو عليه لأننا نقارن بماضٍ مثالي.

examples:
  career: |
    "كانت وظيفتي القديمة رائعة" بينما تركتها لأسباب وجيهة — الذاكرة قد لطفت
    الإحباطات.
  relationships: |
    "كنا سعداء جدًا" بشأن علاقة سابقة — نسيان الصراعات التي
    أدت إلى نهايتها.
  childhood: |
    "كان الأطفال أفضل حالًا في أيامي" بينما تحسنت العديد من المقاييس الموضوعية (الصحة،
    السلامة، الفرص).
  projects: |
    "سار ذلك المشروع بسلاسة" بينما كان في الواقع به العديد من التأخيرات — نتذكر
    النتيجة، وليس العملية.

real_world_implications: |
  يؤثر الاسترجاع المتفائل على الرضا عن الحياة، والقرارات المهنية،
  والخيارات المدفوعة بالحنين. يمكن أن يؤدي إلى تكرار الأخطاء الماضية أو
  مقارنات غير واقعية. كما أنه يفسر جاذبية خطاب "العودة إلى الأيام الخوالي".

professional_application:
  networking_and_relationship_building: |
    عند التفكير في إعادة التواصل مع الزملاء السابقين أو العودة إلى الأدوار السابقة،
    افصل الحنين عن الواقع. وثق أسباب مغادرتك في ذلك الوقت؛ وراجعها قبل العودة.
  collaborative_learning_initiative: |
    في مراجعات ما بعد المشاريع، استخدم ملاحظات أو بيانات معاصرة بدلاً من الذاكرة
    لتقييم ما حدث بالفعل. الذاكرة تلين الصعوبات.

how_can_this_be_misapplied:
  dismissing_nostalgia: |
    ليس كل الحنين مضللًا — أحيانًا كان الماضي أفضل حقًا
    في بعض النواحي.
  invalidating_memories: |
    إخبار الناس بأن ذكرياتهم الإيجابية "خاطئة" بينما قد تعكس
    تجربة ذاتية حقيقية.
  overcorrection: |
    افتراض أن الماضي كان دائمًا أسوأ مما نتذكر — أحيانًا كان
    أفضل.
  present_bias: |
    استخدام الاسترجاع المتفائل كذريعة لتجاهل المخاوف المشروعة
    بشأن التدهور الحالي.

