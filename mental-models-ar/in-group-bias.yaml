# تحيز المجموعة الداخلية
# نموذج عقلي / تحيز معرفي - مثال إدخال

id: in_group_bias
name: تحيز المجموعة الداخلية

quick_introduction: |
  تحيز المجموعة الداخلية هو الميل إلى تفضيل الأشخاص الذين نعتبرهم جزءًا من مجموعتنا على أولئك الذين نعتبرهم غرباء. ننسب صفات إيجابية لأعضاء مجموعتنا الداخلية وصفات سلبية لأعضاء المجموعات الخارجية، غالبًا بناءً على اختلافات طفيفة أو اعتباطية.

one_liner: نحن نفضل مجموعتنا الداخلية ونحكم على المجموعات الخارجية بقسوة أكبر - غالبًا بشكل اعتباطي.

try_this:
  - Ask: هل سأحكم على هذا الشخص بنفس الطريقة لو كان في مجموعتي؟
  - Actively seek out-group perspectives when making decisions.
  - Notice when group boundaries are shaping your judgment.

ask_yourself:
  - Am I favoring someone because they're "one of us"?
  - Would I apply the same standards to an out-group member?

in_more_detail: |
  حتى عندما يتم تعيين المجموعات بشكل عشوائي (على سبيل المثال، عن طريق رمي العملة)، يطور الأشخاص بسرعة تفضيلًا لمجموعتهم الداخلية. نحن نثق بأعضاء مجموعتنا الداخلية أكثر، ونخصص لهم موارد أكثر كرمًا، ونحكم على أفعالهم بمزيد من التعاطف. يتلقى أعضاء المجموعات الخارجية المعاملة المعاكسة.

  يغذي تحيز المجموعة الداخلية القبلية والتمييز والصراع. إنه يؤثر على التوظيف والترقية والتعاون والسياسة. يمكن أن يستند إلى العرق أو الجنسية أو الشركة أو الفريق أو أي هوية مشتركة.

why_this_is_important: |
  التعرف على تحيز المجموعة الداخلية يساعدك على اتخاذ قرارات أكثر عدلاً، وبناء فرق أكثر شمولاً، وتجنب المحسوبية. كما أنه يفسر سبب مواجهة مبادرات التنوع للمقاومة - تفضيل المجموعة الداخلية تلقائي.

when_to_use:
  - القيادة
  - اتخاذ_القرار
  - بناء_العلاقات
  - حل_النزاعات

how_can_you_spot_it:
  preferential_treatment: |
    إعطاء فائدة الشك لـ "نحن" ولكن ليس لـ "هم".
  resource_allocation: |
    تخصيص المزيد لأعضاء المجموعة الداخلية عندما يكون لأعضاء المجموعات الخارجية حاجة متساوية أو أكبر.
  attribution_asymmetry: |
    نجاح المجموعة الداخلية = مهارة؛ نجاح المجموعة الخارجية = حظ. فشل المجموعة الداخلية = ظرف؛ فشل المجموعة الخارجية = شخصية.
  minimal_group_effects: |
    تظهر المحسوبية حتى مع تعيينات المجموعات الاعتباطية.

examples:
  hiring: |
    تفضيل المرشحين الذين ذهبوا إلى جامعتي الأم أو يشاركونني خلفيتي.
  performance_reviews: |
    تقييم أعضاء المجموعة الداخلية بشكل أكثر إيجابية من أعضاء المجموعات الخارجية ذوي الأداء المماثل.
  collaboration: |
    الثقة في "فريقنا" وإشراكه مع استبعاد أو التشكيك في "فريقهم".
  politics: |
    رفض حجج المجموعات الخارجية مع قبول حجج المجموعة الداخلية دون نقد.

real_world_implications: |
  يؤدي تحيز المجموعة الداخلية إلى استمرار عدم المساواة، وتقويض الجدارة، وتغذية الصراع. إنه يؤثر على التوظيف والترقية والاستثمار والسياسة. يتطلب الحد منه جهدًا متعمدًا - لن يصلح نفسه.

professional_application:
  networking_and_relationship_building: |
    قم بتضمين الأشخاص خارج دائرتك المباشرة بنشاط. ابحث عن وجهات نظر متنوعة. تساءل عما إذا كنت تفضل شخصًا لأنه "مثلك".
  collaborative_learning_initiative: |
    استخدم عمليات منظمة (مراجعات معتمدة، لجان متنوعة) لتقليل تحيز المجموعة الداخلية في التوظيف والتقييم. أنشئ مشاريع عبر المجموعات لبناء هوية مشتركة.

how_can_this_be_misapplied:
  forced_diversity: |
    تنفيذ حصص أو سياسات تخلق الاستياء دون معالجة التحيز الأساسي.
  out_group_hostility: |
    التعامل مع تحيز المجموعة الداخلية على أنه المشكلة الوحيدة عندما يكون هناك أيضًا عداء تجاه المجموعة الخارجية.
  ignoring_legitimate_differences: |
    ليست كل الاختلافات بين المجموعات تحيزات - ففي بعض الأحيان تكون للمجموعات خصائص مختلفة. لا تفترض أن جميع التفاوتات هي تمييز.
  reverse_discrimination: |
    الإفراط في التصحيح لتفضيل المجموعات الخارجية بطرق غير عادلة تجاه أعضاء المجموعة الداخلية.

