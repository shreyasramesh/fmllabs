# تأثير دانينغ-كروجر
# نموذج عقلي / تحيز معرفي - مثال لإدخال

id: dunning_kruger_effect
name: تأثير دانينغ-كروجر

quick_introduction: |
  يصف تأثير دانينغ-كروجر تحيزًا معرفيًا حيث يبالغ الأشخاص ذوو المعرفة أو المهارة المحدودة في مجال ما في تقدير كفاءتهم، بينما يميل الخبراء إلى التقليل من تقديرهم. كلما عرفت أقل، كلما كنت أكثر ثقة.

one_liner: كلما عرفت أقل، كلما كنت أكثر ثقة.

try_this:
  - في المجالات الجديدة، افترض أنك مفرط الثقة - اطلب التغذية الراجعة والمعايرة.
  - عندما يعبر الخبراء عن شكوكهم، خذها على محمل الجد؛ قد يعرفون الحالات الاستثنائية.
  - لاحظ عندما يكون المبتدئون أكثر يقينًا من الخبراء في مجال ما.

ask_yourself:
  - هل أنا في "قمة الغباء" أم في "وادي التواضع"؟
  - هل لدي القدرة على الوعي بما وراء المعرفة لتقييم كفاءتي الخاصة هنا؟

in_more_detail: |
  أظهرت أبحاث دانينغ وكروجر أن الأفراد غير الأكفاء يفتقرون إلى القدرة على الوعي بما وراء المعرفة للتعرف على عدم كفاءتهم. لتقييم أدائك، تحتاج إلى نفس المهارات المطلوبة للأداء بشكل جيد - لذلك يكون غير المهرة في وضع مزدوج غير مؤاتٍ: فهم يؤدون بشكل سيء ولا يعرفون ذلك.

  مع زيادة الكفاءة، غالبًا ما يمر الأشخاص بـ "وادي التواضع" حيث يدركون كم لا يعرفون. قد يقلل الخبراء الحقيقيون من ثقتهم لأنهم يدركون تمامًا الفروق الدقيقة والحالات الاستثنائية.

why_this_is_important: |
  يساعدك التعرف على تأثير دانينغ-كروجر على معايرة ثقتك بنفسك، وتجنب المبالغة في تقدير آراء المبتدئين، وتقدير تواضع الخبراء. إنه ضروري للتعلم والتوظيف واتخاذ القرارات.

when_to_use:
  - التعلم
  - اتخاذ_القرارات
  - القيادة
  - التحركات_المهنية

how_can_you_spot_it:
  novice_overconfidence: |
    يعبر شخص يتمتع بخبرة قليلة عن آراء قوية وغير مؤهلة.
  expert_underconfidence: |
    يتحفظ الأشخاص ذوو المهارات العالية ويعبرون عن عدم اليقين أكثر من الأشخاص الأقل مهارة.
  inability_to_recognize_quality: |
    لا يستطيع الأداء الضعيف التمييز بين العمل الجيد والسيئ في مجالهم.
  confidence_competence_mismatch: |
    الثقة والقدرة الفعلية مترابطتان عكسياً بين المبتدئين.

examples:
  social_media: |
    يجادل الأشخاص ذوو المعرفة السطحية بموضوع ما بثقة مع خبراء المجال.
  hiring: |
    يقوم المرشحون الذين يؤدون بشكل سيء في المقابلات بتقييم أدائهم الخاص بشكل كبير أحيانًا.
  investing: |
    قد يكون المستثمرون الجدد مفرطي الثقة بعد الانتصارات المبكرة، دون الاعتراف بالحظ.
  workplace: |
    قد يبالغ الموظفون المبتدئون في تقدير استعدادهم للترقية بينما يشكك كبار الموظفين في أنفسهم.

real_world_implications: |
  يؤثر تأثير دانينغ-كروجر على التعليم والتوظيف والسياسة والخطاب العام. إنه يفسر سبب تضخيم الأفكار السيئة ولماذا يمكن رفض الخبراء. المعايرة مهمة لاتخاذ القرارات الفردية والجماعية.

professional_application:
  networking_and_relationship_building: |
    عندما يكون شخص ما واثقًا جدًا، فكر فيما إذا كان قد يكون في منطقة دانينغ-كروجر. اطلب وجهات نظر متنوعة، بما في ذلك من أولئك الذين يعبرون عن عدم اليقين.
  collaborative_learning_initiative: |
    أنشئ ثقافات يُقدر فيها الاعتراف بعدم اليقين. شجع تمارين المعايرة والتغذية الراجعة التي تساعد الأشخاص على تقييم كفاءتهم بدقة.

how_can_this_be_misapplied:
  dismissing_all_confidence: |
    افتراض أن الأشخاص الواثقين خاطئون دائمًا؛ في بعض الأحيان تكون الثقة مبررة.
  false_modesty: |
    الخبراء الذين يتظاهرون بمعرفة أقل مما يعرفون ليبدو متواضعين.
  gatekeeping: |
    استخدام دانينغ-كروجر لتجاهل أي شخص يختلف مع "الخبراء" دون الانخراط في حججهم.
  self_doubt_paralysis: |
    المبالغة في التصحيح لدرجة عدم الثقة في حكمك الخاص أبدًا.

