id: endowment_effect
name: تأثير الملكية

quick_introduction: |
  تأثير الملكية هو الميل إلى تقدير الشيء بشكل أكبر لمجرد امتلاكه. نطالب بالمزيد للتخلي عن شيء ما مما كنا سندفعه لاكتسابه. الملكية تخلق ارتباطًا يشوه تقييمنا.

one_liner: نحن نقدر ما نملكه أكثر مما لا نملكه - فالملكية تخلق الارتباط.

try_this:
  - Ask: كم سأدفع لاكتساب هذا لو لم أكن أملكه؟
  - When selling, imagine you're buying—would you pay your asking price?
  - لاحظ متى تؤدي الملكية إلى تضخيم تقييمك.

ask_yourself:
  - هل أبالغ في تقييم هذا لأنني أملكه؟
  - هل سيوافق المشتري المحايد على سعري؟

in_more_detail: |
  في التجارب، يطالب الأشخاص الذين مُنحوا كوبًا عشوائيًا بنحو ضعف المبلغ لبيعه مقارنة بما يرغب الآخرون في دفعه لشرائه. مجرد حقيقة الملكية تزيد من القيمة المتصورة. هذا مرتبط بتجنب الخسارة - فالتخلي عن شيء ما يبدو خسارة، ونحن نتجنب الخسارة. لكن التأثير يتجاوز ذلك: فنحن ندمج الأشياء المملوكة في هويتنا.

  يؤثر تأثير الملكية على المفاوضات وسلوك المستهلك والتغيير التنظيمي. ويفسر لماذا يبالغ الناس في تقدير منازلهم وأفكارهم وأدوارهم الحالية. إنه يخلق احتكاكًا في الصفقات والانتقالات.

why_this_is_important: |
  التعرف على تأثير الملكية يساعدك على التفاوض بفعالية أكبر، واتخاذ قرارات أوضح بشأن ما يجب الاحتفاظ به أو التخلي عنه، وفهم سبب مبالغة الآخرين في تقدير ما لديهم. كما أنه يفسر المقاومة للتغيير.

when_to_use:
  - اتخاذ_القرارات
  - التفاوض
  - الاستثمار
  - التنقلات_الوظيفية

how_can_you_spot_it:
  ownership_premium: |
    "لن أبيعه بهذا السعر" بينما لن تدفع هذا المبلغ لشرائه.
  attachment_to_possession: |
    تقدير الأشياء بشكل أكبر بمجرد امتلاكها.
  resistance_to_trading: |
    التردد في المقايضة أو التبادل حتى عندما يكون ذلك منطقيًا.
  overvaluation_of_own_ideas: |
    تبدو أفكارنا ومشاريعنا وأدوارنا أكثر قيمة لأنها ملك لنا.

examples:
  real_estate: |
    غالبًا ما يبالغ أصحاب المنازل في تسعير منازلهم - فهم يقدرونها أكثر
    مما يقدرها السوق.
  negotiations: |
    يطالب البائعون بأكثر مما سيدفعه المشترون؛ الفجوة تعكس
    تأثير الملكية.
  career: |
    المبالغة في تقدير وظيفتنا الحالية أو شركتنا أو دورنا عند التفكير
    في التغيير.
  ideas: |
    تحيز "لم يُخترع هنا" و "فكرتي" - نحن نبالغ في تقدير ما أنشأناه أو امتلكناه.

real_world_implications: |
  يخلق تأثير الملكية احتكاكًا في السوق، ويبطئ التبادلات المفيدة، ويغذي المقاومة للتغيير. يؤثر على عمليات الاندماج وإعادة التنظيم والانتقالات الشخصية. فهمه
  يحسن التفاوض وإدارة التغيير.

professional_application:
  networking_and_relationship_building: |
    عندما يقاوم شخص ما التغيير، ضع في اعتبارك أنه قد يواجه
    تأثير الملكية - فهو يقدر الوضع الراهن أكثر لأنه "يملكه". قم بتأطير التغيير من حيث ما يكسبه، وليس فقط ما يتخلى عنه.
  collaborative_learning_initiative: |
    عند تقديم عمليات جديدة، اعترف بأن الناس مرتبطون
    بالطرق الحالية. قم بإنشاء أمان نفسي لـ "التخلي" عن
    القديم قبل تبني الجديد.

how_can_this_be_misapplied:
  dismissing_legitimate_attachment: |
    بعض الارتباط منطقي - القيمة العاطفية، تكاليف التبديل.
    ليست كل مقاومة هي تأثير ملكية.
  manipulation: |
    خلق شعور زائف بالملكية لاستخلاص أسعار أعلى (مثل،
    "جربها مجانًا" لتفعيل تأثير الملكية).
  undervaluing_continuity: |
    افتراض أن كل مقاومة للتغيير غير منطقية عندما يكون للاستمرارية
    قيمة حقيقية.
  cold_rationality: |
    رفض الارتباط العاطفي على أنه "مجرد تأثير ملكية" عندما
    يعكس قيمًا حقيقية.

