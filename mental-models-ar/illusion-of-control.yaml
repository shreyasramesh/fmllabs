# وهم السيطرة
# نموذج عقلي / تحيز معرفي - مثال

id: illusion_of_control
name: وهم السيطرة

quick_introduction: |
  وهم السيطرة هو الميل إلى المبالغة في تقدير قدرتنا على التأثير في النتائج. نعتقد أن لدينا سيطرة أكثر مما لدينا بالفعل - على الأحداث العشوائية، والآخرين، والأنظمة المعقدة. نخلط بين الارتباط والسببية، وبين الفعل والتأثير.

one_liner: نبالغ في تقدير قدرتنا على التأثير في النتائج - وخاصة العشوائية منها.

try_this:
  - Ask: ماذا سيحدث لو لم أفعل شيئًا؟ هل فعلي يسبب النتيجة بالفعل؟
  - Distinguish what you can control from what you can't. (ميّز ما يمكنك التحكم فيه مما لا يمكنك.)
  - Notice when you're superstitiously linking your actions to random results. (لاحظ متى تربط أفعالك بنتائج عشوائية بشكل خُرافي.)

ask_yourself:
  - Am I confusing correlation with causation? (هل أخلط بين الارتباط والسببية؟)
  - Would the outcome be different if I hadn't acted? (هل ستكون النتيجة مختلفة لو لم أتصرف؟)

in_more_detail: |
  يشعر الناس بمزيد من الثقة في الفوز باليانصيب عندما يختارون أرقامهم الخاصة - على الرغم من أن ذلك لا يغير الاحتمالات. نُلقي النرد بقوة أكبر عندما نريد أرقامًا عالية. نعتقد أن طقوسنا أو سلوكياتنا تؤثر على نتائج عشوائية في الواقع أو محددة بعوامل خارجة عن سيطرتنا. الوهم مريح؛ فهو يقلل القلق. لكنه يمكن أن يؤدي إلى الثقة المفرطة واتخاذ قرارات سيئة.

  يكون الوهم أقوى عندما نشارك في العملية، وعندما نحقق نجاحًا مبكرًا، وعندما تكون المهمة مألوفة. يؤثر هذا على الاستثمار والإدارة والحياة اليومية.

why_this_is_important: |
  التعرف على وهم السيطرة يساعدك على معايرة توقعاتك، وتجنب الثقة المفرطة، وتركيز الجهد حيثما يهم حقًا. كما يفسر سبب استمرارنا في السلوكيات الخرافية والمبالغة في تقدير تأثيرنا.

when_to_use:
  - اتخاذ_القرار
  - تقييم_المخاطر
  - الاستثمار
  - القيادة

how_can_you_spot_it:
  overestimated_influence: |
    الاعتقاد بأن أفعالنا تؤثر على النتائج عندما لا تفعل.
  ritual_superstition: |
    سلوكيات نعتقد أنها تؤثر على النتائج (قميص الحظ، روتين ما قبل المباراة) عندما لا تفعل.
  choice_illusion: |
    الشعور بأن الاختيار يمنحنا السيطرة عندما لا يؤثر الاختيار على النتيجة.
  action_bias: |
    تفضيل "فعل شيء ما" على "الانتظار" حتى عندما لا يساعد الفعل.

examples:
  gambling: |
    اختيار أرقام اليانصيب يبدو أكثر قابلية للتحكم من الاختيار العشوائي - الاحتمالات هي نفسها.
  investing: |
    المتداولون النشطون يبالغون في تقدير قدرتهم على التفوق على السوق؛ معظمهم يحقق أداءً أقل بعد خصم التكاليف.
  management: |
    القادة يبالغون في تقدير تأثيرهم على نتائج المنظمة؛ فالعديد من العوامل خارجة عن سيطرتهم.
  sports: |
    يعتقد المشجعون أن تشجيعهم يؤثر على اللعبة؛ لدى اللاعبين طقوس محظوظة.

real_world_implications: |
  يؤثر وهم السيطرة على المخاطرة، والمثابرة في الجهود العقيمة، وإسناد النتائج. يمكن أن يحفز الفعل (وهو مفيد أحيانًا) ولكنه قد يؤدي أيضًا إلى إهدار الجهد والثقة المفرطة. المعايرة تحسن جودة القرار.

professional_application:
  networking_and_relationship_building: |
    اعرف ما يمكنك التحكم فيه وما لا يمكنك. ركّز طاقتك على العوامل القابلة للتأثير. لا تدّعِ الفضل في نتائج لم تتسبب فيها - أو اللوم على تلك التي لم تستطع منعها.
  collaborative_learning_initiative: |
    في التخطيط، ميّز بين العوامل التي يمكن التحكم فيها وتلك التي لا يمكن. تجنب الثقة الزائفة من الانتصارات المبكرة. استخدم التفكير الاحتمالي لمعايرة التوقعات.

how_can_this_be_misapplied:
  learned_helplessness: |
    التصحيح المفرط للاعتقاد بأننا لا نملك أي سيطرة عندما نملك تأثيرًا ذا مغزى.
  dismissing_agency: |
    "كلها حظ" عندما تكون المهارة والجهد مهمين في العديد من المجالات.
  false_fatalism: |
    استخدام وهم السيطرة لتبرير عدم التصرف.
  one_size_fits_all: |
    تختلف السيطرة حسب المجال؛ بعض المواقف تكون أكثر قابلية للتحكم من غيرها.

