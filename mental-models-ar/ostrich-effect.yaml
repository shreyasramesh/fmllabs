# تأثير النعامة
# نموذج عقلي / تحيز معرفي - مثال إدخال

id: ostrich_effect
name: تأثير النعامة

quick_introduction: |
  تأثير النعامة هو الميل إلى تجنب المعلومات المالية السلبية - "دفن رأسك في الرمال" مثل النعامة. يتجنب الناس النظر إلى محافظهم الاستثمارية عندما تكون الأسواق في حالة هبوط، ويؤخرون فتح الفواتير، ويتجاهلون علامات التحذير التي يمكن أن تساعدهم على التصرف.

one_liner: تجنب الأخبار السيئة لا يغير الواقع - بل يؤخر استجابتك فقط.

try_this:
  - حدد مواعيد فحص منتظمة حتى لا تتمكن من تجنب الأرقام.
  - لاحظ متى تؤجل فتح شيء ما أو النظر في شيء ما.
  - اسأل: ما الذي أتجنبه، وما الذي سيتغير إذا واجهته؟

ask_yourself:
  - هل أتجنب المعلومات لأنها قد تكون سيئة؟
  - هل سيساعدني الوعي المبكر على التصرف بشكل أفضل؟

in_more_detail: |
  صيغ المصطلح في التمويل السلوكي لوصف المستثمرين الذين يتجنبون فحص استثماراتهم خلال فترات تراجع السوق. يمتد هذا السلوك إلى ما هو أبعد من التمويل: تجنب الفحوصات الطبية، وتجاهل مشاكل العلاقات، وتأجيل المحادثات الصعبة. نسعى إلى تجنب القلق الناجم عن الأخبار السيئة، لكن التجنب غالبًا ما يجعل النتائج أسوأ عن طريق منع الإجراءات في الوقت المناسب.

  يقود هذا التأثير النفور من الخسارة والرغبة في تجنب الانزعاج العاطفي. للأسف، الجهل لا يغير الواقع - بل يؤخر استجابتنا فقط.

why_this_is_important: |
  يساعدك التعرف على تأثير النعامة على مواجهة المعلومات الصعبة بشكل استباقي. نادرًا ما يؤدي تجنب الأخبار السيئة إلى تحسين النتائج؛ بل غالبًا ما يزيدها سوءًا. الوعي في الوقت المناسب يمكّن من اتخاذ قرارات أفضل.

when_to_use:
  - صنع_القرار
  - الاستثمار
  - تقييم_المخاطر
  - تحركات_مهنية

how_can_you_spot_it:
  avoiding_portfolio_checks: |
    عدم النظر إلى كشوف الحسابات الاستثمارية عندما تكون الأسواق في حالة هبوط.
  delaying_difficult_information: |
    تأجيل فتح الفواتير أو النتائج الطبية أو تقييم الأداء.
  information_avoidance: |
    تجنب مصادر قد تحتوي على أخبار سيئة بشكل نشط.
  procrastination_on_unpleasant_tasks: |
    تأجيل الإجراءات التي من شأنها أن تكشف المشاكل أو تعالجها.

examples:
  investing: |
    يتوقف مستثمر عن فحص صندوق الادخار 401 (k) الخاص به خلال سوق هابط، مما يفوته فرص إعادة التوازن.
  health: |
    تجنب موعد مع الطبيب على الرغم من ظهور الأعراض بسبب الخوف من أخبار سيئة.
  finances: |
    عدم فتح كشوف حسابات بطاقات الائتمان أو تنبيهات البنك لتجنب مواجهة الديون.
  performance: |
    يتجنب المدير تقديم ملاحظات نقدية حتى المراجعة السنوية، عندما كان التدخل المبكر سيساعد.

real_world_implications: |
  يؤدي تأثير النعامة إلى نتائج مالية أسوأ، وتأخر العلاج الطبي، ومشاكل غير معالجة في العلاقات والعمل. إنه يزيد من الخسائر التي يمكن تجنبها. الأنظمة التي تجعل المعلومات صعبة التجاهل يمكن أن تساعد.

professional_application:
  networking_and_relationship_building: |
    لا تتجنب المحادثات الصعبة. عالج المشاكل مبكرًا بدلاً من الأمل في أن تحل نفسها. قم بإنشاء فحوصات منتظمة تكشف المشاكل قبل تفاقمها.
  collaborative_learning_initiative: |
    بناء حلقات ملاحظات تجعل من الصعب تجاهل المشاكل - لوحات معلومات، ومراجعات منتظمة، ومعايير تشجع على الإفصاح المبكر عن الأخبار السيئة.

how_can_this_be_misapplied:
  information_overload: |
    فرض المراقبة المستمرة عندما يكون بعض تجنب المعلومات صحيًا (على سبيل المثال، عدم التحقق من الأسهم كل دقيقة).
  anxiety_amplification: |
    خلق الكثير من التركيز على المشاكل المحتملة مما يزيد من القلق دون تحسين النتائج.
  blame_shifting: |
    نسبة كل التجنب إلى "تأثير النعامة" عندما يكون بعض التجنب عقلانيًا (على سبيل المثال، تجاهل الضوضاء).
  micromanagement: |
    استخدام المفهوم لتبرير المراقبة المفرطة للآخرين.

