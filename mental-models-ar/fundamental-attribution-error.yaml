id: fundamental_attribution_error
name: خطأ الإسناد الأساسي

quick_introduction: |
  خطأ الإسناد الأساسي هو الميل إلى عزو سلوك الآخرين إلى شخصيتهم أو طبيعتهم
  بينما نعزو سلوكنا نحن إلى عوامل ظرفية. نحن نحكم على الآخرين بأفعالهم
  ونحكم على أنفسنا بنوايانا.

one_liner: نحكم على الآخرين بأفعالهم، وعلى أنفسنا بنوايانا.

try_this:
  - عندما يثير شخص ما إحباطك، اسأل: ما هي العوامل الظرفية التي قد تفسر هذا؟
  - طبّق نفس اللطف على الآخرين الذي تطبقه على نفسك.
  - لاحظ متى تعزو سلوك الآخرين إلى شخصيتهم، وليس إلى ظروفهم.

ask_yourself:
  - هل سأفسر سلوكي بنفس الطريقة التي أفسر بها سلوكهم؟
  - ما الذي قد أكون أفتقده بشأن وضعهم؟

in_more_detail: |
  عندما يقطعنا أحدهم في حركة المرور، نفكر "يا له من أحمق". عندما نقطع أحدهم،
  نفكر "كان عليّ فعل ذلك - كنت في عجلة من أمري". نفسر إخفاقاتنا الخاصة
  بالظروف ("حركة المرور كانت فظيعة") وإخفاقات الآخرين بالطباع ("إنهم كسالى").
  والعكس صحيح بالنسبة للنجاح: ننسب الفضل لأنفسنا، ونعزو نجاح الآخرين
  إلى الحظ.

  الخطأ "أساسي" لأنه منتشر ودائم. إنه يقوّض التعاطف، ويؤجج الصراع،
  ويشوه تقييم الأداء.

why_this_is_important: |
  التعرف على خطأ الإسناد الأساسي يحسّن العلاقات، ويقلل الصراع، ويؤدي
  إلى أحكام أكثر عدلاً. يشجع على النظر في السياق قبل استنتاج أن شخصًا ما "هو"
  بطريقة معينة.

when_to_use:
  - بناء_العلاقات
  - حل_النزاعات
  - القيادة
  - اتخاذ_القرار

how_can_you_spot_it:
  dispositional_explanation_for_others: |
    "إنهم مجرد هذا النوع من الأشخاص" عند شرح سلوك الآخرين.
  situational_explanation_for_self: |
    "لم يكن لدي خيار" أو "الظروف أجبرتني" عند شرح سلوكنا نحن.
  character_vs_context: |
    افتراض وجود صفة شخصية عندما يمكن للظرف أن يفسر السلوك.
  asymmetric_standards: |
    تطبيق معايير أكثر صرامة على الآخرين مما نطبقه على أنفسنا.

examples:
  traffic: |
    خطأ سائق آخر = "سائق سيئ". خطؤنا = "موقف لا مفر منه".
  workplace: |
    تأخير موعد نهائي لزميل = "غير مسؤول". تأخير موعدنا النهائي =
    "مرهق ولا يمكن لأحد أن يفعل أفضل من ذلك".
  politics: |
    آراء الخصوم = "إنهم أغبياء أو أشرار". آراؤنا = "رد فعل عقلاني
    على الحقائق".
  performance: |
    نجاح الآخرين = "محظوظ". نجاحنا = "مكتسب بالعمل الجاد".

real_world_implications: |
  يؤجج خطأ الإسناد الأساسي الصراع، ويقوّض العمل الجماعي، ويشوه التوظيف
  وتقييم الأداء. تصحيحه يحسن الثقافة التنظيمية والعلاقات الشخصية.

professional_application:
  networking_and_relationship_building: |
    عندما يخيب شخص ما أملك، اسأل "ما هي العوامل الظرفية التي قد تفسر
    هذا؟" قبل أن تستنتج أنه غير موثوق به أو صعب.
  collaborative_learning_initiative: |
    في التغذية الراجعة والمراجعات، شجع التفسيرات "ظرفية أولاً".
    درّب المديرين على النظر في السياق قبل عزوه إلى الشخصية.

how_can_this_be_misapplied:
  excusing_all_behavior: |
    تجاهل كل فعل على أنه "ظرفي" عندما يعكس بعض السلوك
    الشخصية.
  no_accountability: |
    استخدام الخطأ لتجنب مساءلة الأشخاص عن الخيارات التي اتخذوها بالفعل.
  self_deprecation: |
    الإفراط في التصحيح للوم نفسك دائمًا وعدم الاعتراف بمسؤولية الآخرين أبدًا.
  ignoring_patterns: |
    عندما يتصرف شخص ما بشكل سيء بشكل متكرر عبر مواقف مختلفة، فقد تكون
    الطباع ذات صلة.

