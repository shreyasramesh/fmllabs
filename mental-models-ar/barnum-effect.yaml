# Barnum Effect
# Mental Model / Cognitive Bias - Example Entry

id: barnum_effect
name: تأثير بارنوم

quick_introduction: |
  تأثير بارنوم (أو تأثير فورر) هو الميل إلى قبول الأوصاف الشخصية الغامضة والعامة
  على أنها دقيقة بشكل فريد. تستخدم الأبراج، والعرافون، واختبارات الشخصية
  عبارات تنطبق على الجميع تقريبًا - لكننا نعتقد أنها خاصة بنا. نرى أنفسنا في العام.

one_liner: العبارات الغامضة تبدو شخصية لأنها تنطبق على الجميع تقريبًا.

try_this:
  - Ask: هل يمكن أن ينطبق هذا الوصف على العديد من الأشخاص؟ اختبره على شخص آخر.
  - Seek specific, behavioral feedback instead of vague praise or criticism.
  - Notice when "personalized" insights feel too good to be discriminating.

ask_yourself:
  - Would this feedback feel accurate if given to a stranger?
  - Am I remembering the hits and forgetting the misses?

in_more_detail: |
  قدم عالم النفس بيرترام فورر للطلاب نفس التغذية الراجعة "الشخصية" (على سبيل المثال، "لديك حاجة لأن يحبك الآخرون ويعجبوا بك") وقيموها على أنها دقيقة للغاية. كانت العبارات غامضة بما يكفي لتنطبق على
  أي شخص. يُقال إن بي. تي. بارنوم قال "هناك أحمق يولد كل دقيقة" - ويُطلق التأثير على اسمه لمهارته في جذب الجماهير بـ
  العموميات التي تبدو شخصية.

  يعمل التأثير لأننا بارعون في إيجاد صلة شخصية بالعبارات الغامضة. نتذكر الإيجابيات ونتجاهل السلبيات.
  هذا هو أساس القراءة الباردة والعديد من منتجات "الشخصية".

why_this_is_important: |
  يساعدك التعرف على تأثير بارنوم على تقييم تقييمات الشخصية، ومقاومة التلاعب، وتجنب الإفراط في تفسير التغذية الراجعة الغامضة.
  يشرح لماذا تبدو الأبراج دقيقة ولماذا تكون بعض النصائح "الشخصية" عامة.

when_to_use:
  - اتخاذ_القرارات
  - التعلم
  - تقييم_المخاطر
  - بناء_العلاقات

how_can_you_spot_it:
  vague_accuracy: |
    التغذية الراجعة التي تبدو شخصية ولكن يمكن أن تنطبق على العديد من الأشخاص.
  selective_fit: |
    نحن نركز على ما يناسب ونتجاهل ما لا يناسب.
  cold_reading: |
    شخص "يقرأك" بعبارات هي في الواقع عامة.
  personality_test_enthusiasm: |
    قبول غير نقدي لنتائج التقييم على أنها رؤى فريدة.

examples:
  horoscopes: |
    "أحيانًا تشكك في قراراتك" تبدو شخصية ولكنها تنطبق
    على معظم الناس.
  fortune_telling: |
    تنبؤات غامضة نفسرها على أنها خاصة بموقفنا.
  personality_tests: |
    تستخدم بعض التقييمات عبارات بارنوم وتبدو دقيقة دون
    أن تكون مميزة.
  feedback: |
    تغذية راجعة عامة للأداء نفسرها على أنها
    شخصية للغاية.

real_world_implications: |
  يتم استغلال تأثير بارنوم في علم التنجيم، وبعض التدريب، والتقييمات منخفضة الجودة.
  يمكن أن يخلق ثقة زائفة في أدوات غير صالحة.
  كما أنه يفسر سبب قابليتنا للإطراء والتغذية الراجعة الإيجابية الغامضة.

professional_application:
  networking_and_relationship_building: |
    عند تلقي التغذية الراجعة، اسأل "هل يمكن أن ينطبق هذا على العديد من الأشخاص؟"
    اطلب تغذية راجعة سلوكية محددة بدلاً من الثناء أو النقد الغامض. كن متشككًا في الرؤى "الشخصية" التي تبدو
    أفضل من أن تكون حقيقية.
  collaborative_learning_initiative: |
    عند استخدام التقييمات، اختر أدوات تم التحقق من صحتها ولديها صلاحية تمييزية.
    تجنب الأدوات التي تعتمد على عبارات بارنوم.
    درب الناس على التعرف على التغذية الراجعة الغامضة.

how_can_this_be_misapplied:
  dismissing_all_feedback: |
    ليست كل التغذية الراجعة الشخصية هي بارنوم - بعضها حقيقي
    ومحدد. لا تتجاهل كل شيء غامض.
  invalidating_experience: |
    أن تخبر شخصًا ما أن تجربته في البصيرة هي "مجرد بارنوم"
    بينما قد يكون لها قيمة بالنسبة له.
  overcorrection: |
    رفض جميع أطر عمل الشخصية لأن البعض يستخدم عبارات بارنوم.
  false_skepticism: |
    الافتراض أنه لأن شيئًا ما يبدو دقيقًا فيجب أن يكون
    بارنوم - في بعض الأحيان تكون الأشياء دقيقة.

