id: narrative_fallacy
name: مغالطة السرد

quick_introduction: |
  مغالطة السرد هي الميل إلى بناء قصص من أحداث الماضي تجعلها تبدو أكثر
  تماسكاً، وقابلية للتنبؤ، وذات معنى مما كانت عليه في الواقع. نعيد تركيب
  التفسيرات للعشوائية. نحول فوضى التاريخ إلى قصة مرتبة—ثم نصدق أن
  القصة كانت حتمية.

one_liner: نعيد تركيب قصص متماسكة للعشوائية—ثم نصدق أنها كانت حتمية.

try_this:
  - اسأل: ما مدى هذه القصة التي هي مجرد رؤية مستقبلية؟ ما هو دور الحظ؟
  - كن متشككاً في التفسيرات المرتبة — فالماضي كان أكثر فوضوية من قصصنا.
  - لاحظ متى يقوم "يجعل المعنى" بعمل "كان يمكن التنبؤ به".

ask_yourself:
  - هل أبني قصة تجعل الماضي يبدو أكثر حتمية مما كان عليه؟
  - هل كنت سأتنبأ بهذا قبل أن يحدث؟

in_more_detail: |
  نشر نسيم طالب هذا المصطلح. نحن نتوق للسرد—السبب والنتيجة،
  الأبطال والأشرار، الأقواس الواضحة. لذلك نبني قصصاً تربط
  الأحداث بأثر رجعي. تشعر القصة بأنها حقيقية لأنها متماسكة—ولكن
  التماسك لا يعني أنها صحيحة. نحن نخلط بين "يجعل المعنى" و
  "كان يمكن التنبؤ به". نحن نقلل من شأن دور الحظ
  والعشوائية.

  تؤثر مغالطة السرد على كيفية تعلمنا من التاريخ، وتقييمنا
  للنجاح، وإجراء تنبؤاتنا. نحن نبالغ في قوة التفسير
  للقصص ونقلل من شأن دور الصدفة.

why_this_is_important: |
  يساعدك إدراك مغالطة السرد على تجنب الإفراط في التعلم من
  الماضي والتقدير المبالغ فيه للقدرة على التنبؤ. إنه يشجع على
  التواضع بشأن السببية والتنبؤ. ليس كل ما يصنع قصة جيدة
  حقيقياً أو قابلاً للتعميم.

when_to_use:
  - اتخاذ_القرار
  - التعلم
  - تقييم_المخاطر
  - حل_المشكلات

how_can_you_spot_it:
  hindsight_coherence: |
    تُفسر أحداث الماضي بقصة مرتبة لم تكن
    واضحة في ذلك الوقت.
  cause_effect_overconfidence: |
    نعزو أسباباً واضحة للنتائج التي كان لها العديد من
    العوامل المساهمة.
  luck_minimization: |
    يُفسر النجاح والفشل بالمهارة والاستراتيجية،
    وليس الحظ.
  story_over_evidence: |
    سرد مقنع يطغى على الأدلة الإحصائية.

examples:
  business_success: |
    "لقد نجحوا بسبب X" بينما كانت هناك عوامل كثيرة وحظ
    متورط - نختار القصة التي تناسب.
  investing: |
    تفسير تحركات السوق بروايات تبدو
    مرضية ولكنها قد تكون بعد الوقائع.
  history: |
    تُروى الأحداث التاريخية على أنها تطورات حتمية
    عندما كانت تعتمد على العديد من العوامل.
  career: |
    "لقد وصلت إلى هنا لأنني فعلت X" بينما لعب الحظ والتوقيت
    أدواراً مهمة.

real_world_implications: |
  تشوه مغالطة السرد التعلم، والثقة المفرطة في التنبؤ، وإسناد
  النجاح والفشل.
  إنها تجعل الماضي يبدو أكثر قابلية للتنبؤ مما كان عليه
  والمستقبل يبدو أكثر قابلية للتنبؤ مما هو عليه.

professional_application:
  networking_and_relationship_building: |
    عندما يروي شخص ما قصة نجاحه، تذكر أن
    هذه قصة - متماسكة ومقنعة، ولكن ربما
    مبسطة. قد يتم التقليل من شأن الحظ والعوامل غير المرئية.
  collaborative_learning_initiative: |
    في المراجعات، فرق بين السرد والأدلة.
    اسأل "ماذا كنا سنقول في ذلك الوقت؟" استخدم
    سجلات القرار لالتقاط عدم اليقين قبل
    معرفة النتائج.

how_can_this_be_misapplied:
  dismissing_all_explanation: |
    بعض الروايات صحيحة - ليس كل شيء
    مغالطة سرد. السببية موجودة.
  excessive_skepticism: |
    رفض التعلم من الماضي لأن "مغالطة
    السرد". لا يزال بإمكاننا استخلاص دروس مفيدة.
  false_randomness: |
    افتراض أن كل شيء عشوائي بينما بعض النتائج
    يمكن عزوها بشكل مفيد.
  undermining_storytelling: |
    للقصص قيمة للتواصل والمعنى -
    فالمغالطة هي الاعتقاد بأنها كاملة أو
    تنبؤية، وليس أنها موجودة.

