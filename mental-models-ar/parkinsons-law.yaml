# قانون باركنسون
# نموذج عقلي / انحياز معرفي - مثال إدخال

id: parkinsons_law
name: قانون باركنسون

quick_introduction: |
  ينص قانون باركنسون على أن "العمل يتوسع ليملأ الوقت المتاح لإنجازه". أعطِ مهمة أسبوعًا، فتستغرق أسبوعًا؛ أعطها يومًا، وغالبًا ما يتم إنجازها في يوم واحد. وينطبق الشيء نفسه على الميزانيات وحجم الفريق والموارد.

one_liner: العمل يتوسع ليملأ الوقت المتاح لإنجازه.

try_this:
  - حدد مواعيد نهائية أكثر صرامة لفرض التركيز ومنع زحف النطاق.
  - اسأل: ما هو الحد الأدنى للوقت الذي يمكن أن يستغرقه هذا بشكل معقول؟
  - لاحظ متى يتم استهلاك وقت أو موارد إضافية دون قيمة متناسبة.

ask_yourself:
  - هل أملأ الوقت، أم أن العمل يتطلبه فعلاً؟
  - هل سيجبر موعد نهائي أكثر صرامة على تحديد أولويات أفضل؟

in_more_detail: |
  لاحظ سي. نورثكوت باركنسون أن البيروقراطيات تنمو بغض النظر عن مقدار العمل المطلوب. ولاحظ أيضًا أن المهام تتوسع لتملأ الوقت المتاح - فنحن نعدل جهدنا وسرعتنا حسب الموعد النهائي. يمكن أن تفرض المواعيد النهائية الصارمة التركيز؛ وتدعو المواعيد النهائية المرنة إلى التسويف وزحف النطاق.

  للقانون آثار على إدارة المشاريع والإنتاجية الشخصية والتصميم التنظيمي. ويشير إلى أن القيود يمكن أن تحسن النتائج من خلال فرض تحديد الأولويات.

why_this_is_important: |
  يساعدك فهم قانون باركنسون على تحديد مواعيد نهائية أفضل، وتجنب الإفراط في تخصيص الموارد للمشاريع، والتعرف على متى "المزيد من الوقت" أو "المزيد من الأشخاص" لن يساعد - وقد يضر. يمكن أن تكون القيود منتجة.

when_to_use:
  - اتخاذ_القرارات
  - القيادة
  - حل_المشكلات
  - تحركات_مهنية

how_can_you_spot_it:
  deadline_driven_effort: |
    يتسارع العمل مع اقتراب الموعد النهائي؛ ويتقدم القليل عندما يكون الموعد النهائي بعيدًا.
  scope_expansion: |
    تنمو المشاريع لتشمل الموارد المتاحة بدلاً من البقاء مركزة.
  bureaucratic_growth: |
    تضيف المنظمات موظفين وعمليات حتى عندما لا يزيد عبء العمل.
  budget_exhaustion: |
    يتم إنفاق الميزانيات بالكامل بغض النظر عما إذا كان الإنفاق ضروريًا.

examples:
  student_deadlines: |
    تتم كتابة ورقة بحثية تستحق بعد شهر في آخر 48 ساعة.
  project_management: |
    مشروع بجدول زمني مدته 6 أشهر يستغرق 6 أشهر؛ نفس النطاق بمهلة 3 أشهر
    قد يتم إنجازه أيضًا.
  meetings: |
    ملء اجتماع مدته ساعة واحدة بحد ذاته، سواء كانت 30 دقيقة تكفي.
  budgets: |
    ينفق القسم ميزانيته بالكامل بحلول نهاية العام لتبرير نفس الميزانية
    في العام المقبل.

real_world_implications: |
  يؤثر قانون باركنسون على الإنتاجية، والتضخم التنظيمي، وتخصيص الموارد. ويشير إلى أن القيود الاصطناعية (مواعيد نهائية أقصر، فرق أصغر) يمكن أن تحسن التركيز والكفاءة.

professional_application:
  networking_and_relationship_building: |
    حدد مواعيد نهائية واضحة وصارمة للعمل التعاوني لمنع زحف النطاق والحفاظ على الزخم.
  collaborative_learning_initiative: |
    استخدم تحديد الوقت للاجتماعات والمشاريع. جرب مواعيد نهائية أقصر
    لاختبار ما إذا كانت تحسن التركيز دون التضحية بالجودة.

how_can_this_be_misapplied:
  unrealistic_deadlines: |
    وضع مواعيد نهائية قصيرة بشكل تعسفي تسبب الإرهاق أو سوء الجودة.
  underresourcing: |
    افتراض أن وقتًا أقل أو عددًا أقل من الأشخاص سيعمل دائمًا - بعض المهام تحتاج
    موارد كافية.
  blame_shifting: |
    إلقاء اللوم على التأخيرات في "قانون باركنسون" عندما كان العمل معقدًا حقًا.
  ignoring_quality: |
    الاندفاع لتلبية القيود الاصطناعية على حساب النتائج المستدامة.

