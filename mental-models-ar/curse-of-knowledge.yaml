# لعنة المعرفة
# نموذج ذهني / تحيز معرفي - مثال إدخال

id: curse_of_knowledge
name: لعنة المعرفة

quick_introduction: |
  لعنة المعرفة هي صعوبة تخيل كيف يكون الأمر ألا تعرف شيئاً بمجرد أن تعرفه.
  يجد الخبراء صعوبة في تعليم المبتدئين لأنهم لا يستطيعون إعادة إنشاء منظور المبتدئ.
  بمجرد أن تعرف، تنسى كيف كان الأمر ألا تعرف.

one_liner: بمجرد أن تعرف شيئاً، تنسى كيف كان الأمر ألا تعرفه.

try_this:
  - عند الشرح، ابدأ من المبادئ الأولية - افترض أن جمهورك لا يعرف شيئاً.
  - اطلب من مبتدئ أن يشرح لك؛ ارتباكه يكشف نقاط ضعفك.
  - لاحظ متى تتخطى خطوات أو تستخدم مصطلحات قد لا يعرفها الآخرون.

ask_yourself:
  - هل أفترض أن الآخرين لديهم نفس السياق الذي لدي؟
  - هل سيفهم شخص ليس لديه خلفيتي هذا؟

in_more_detail: |
  في تجربة كلاسيكية، قام الأشخاص الذين عرفوا حل لغز بنقر إيقاع أغنية
  وتوقعوا من الآخرين تخمينها - لقد بالغوا في تقدير مدى وضوحها.
  لم يستطع الناقرون "إلغاء سماع" الأغنية في رؤوسهم.
  المعرفة "لزجة"؛ من الصعب محاكاة الجهل.

  تؤثر اللعنة على التدريس، والتواصل، وتصميم المنتجات، والقيادة.
  نفترض أن الآخرين لديهم نفس السياق الذي لدينا.
  نستخدم المصطلحات. نتخطى الخطوات. نتفاجأ عندما لا "يفهم" الناس.

why_this_is_important: |
  الاعتراف بلعنة المعرفة يحسن التدريس والتواصل وتصميم المنتجات.
  يساعدك على مقابلة الناس حيث هم بدلاً من حيث أنت.
  إنه ضروري لنقل المعرفة بفعالية.

when_to_use:
  - التعلم
  - القيادة
  - حل_المشكلات
  - بناء_العلاقات

how_can_you_spot_it:
  obvious_to_you: |
    "من الواضح" عندما يكون الأمر واضحاً فقط لأنك تعرف الإجابة.
  jargon_use: |
    استخدام مصطلحات لا يعرفها الجمهور دون تعريفها.
  skipped_steps: |
    افتراض أن الآخرين سيكملون ما تركته.
  frustration_with_learners: |
    "كيف لا يمكنهم رؤية ذلك؟" عندما يفتقرون إلى سياقك.

examples:
  teaching: |
    أستاذ رياضيات يتخطى خطوات "واضحة" بالنسبة له ولكنها ضرورية للطلاب.
  product_design: |
    يقوم المصممون بإنشاء واجهات منطقية لهم ولكنها تربك المستخدمين الجدد.
  onboarding: |
    ينسى الموظفون ذوو الخبرة ما لا يعرفه الموظفون الجدد ويقدمون تدريباً غير كافٍ.
  writing: |
    يفترض المؤلفون أن القراء لديهم نفس الخلفية ويفوتون السياق الضروري.

real_world_implications: |
  تخلق لعنة المعرفة فجوات في التواصل، وفشل المنتجات، والتدريس غير الفعال.
  إنها أحد الأسباب التي تجعل الخبراء معلمين سيئين.
  التغلب عليها يتطلب جهداً متعمداً لتبني منظور الجمهور.

professional_application:
  networking_and_relationship_building: |
    عند الشرح، ابدأ من مستوى الشخص الآخر. اسأل "ماذا يعرفون بالفعل؟"
    اختبر تواصلك مع شخص ليس لديه خلفيتك.
  collaborative_learning_initiative: |
    استخدم تمارين "اشرح لي كأنني خمس سنوات".
    اطلب من الخبراء تعليم المبتدئين والحصول على ملاحظات.
    أنشئ وثائق تفترض عدم وجود معرفة سابقة.
    استخدم التدريس من الأقران - الأشخاص الذين تعلموا مؤخرًا يتذكرون منظور المبتدئ.

how_can_this_be_misapplied:
  oversimplification: |
    التبسيط المفرط لدرجة عدم الدقة أو الاستعلاء.
  false_assumption: |
    افتراض أن الآخرين يعرفون أقل مما يعرفون - فشل في المعايرة أيضاً.
  one_size_fits_all: |
    لا تحتاج جميع الجماهير إلى نفس المستوى من الشرح؛ قم بالتخصيص للجمهور.
  avoiding_complexity: |
    بعض المواضيع معقدة؛ لعنة المعرفة لا تعني أنه لا يجب علينا استخدام لغة تقنية عند الاقتضاء.

