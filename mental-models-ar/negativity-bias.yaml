id: negativity_bias
name: التحيز للسلبية

quick_introduction: |
  التحيز للسلبية هو الميل إلى إعطاء وزن أكبر للمعلومات السلبية مقارنة بالمعلومات
  الإيجابية. الأخبار السيئة، والنقد، والتهديدات تجذب انتباهنا وتؤثر على قراراتنا
  بشكل أقوى من المحفزات الإيجابية المكافئة.

one_liner: الأخبار السيئة أثقل من الأخبار الجيدة - نحن مبرمجون لإعطاء الأولوية للتهديدات.

try_this:
  - ابحث بنشاط عن الأدلة الإيجابية ووزنها عند التقييم.
  - لاحظ متى يطغى نقد واحد على العديد من المديح.
  - اسأل: هل أعطي المعلومات السلبية وزناً أكبر مما تستحق؟

ask_yourself:
  - هل أركز على السلبيات وأتجاهل الإيجابيات؟
  - هل سأشعر بشكل مختلف لو ركزت على الأدلة الجيدة؟

in_more_detail: |
  من الناحية التطورية، قد يكون تفويت التهديد قاتلاً، بينما كان تفويت فرصة
  عادة ما يكون قابلاً للبقاء. أدمغتنا مبرمجة لإعطاء الأولوية للمعلومات السلبية.
  تعليق واحد انتقادي يمكن أن يطغى على العديد من المديح. يتم تذكر الأحداث السلبية
  بشكل أكثر وضوحاً ولفترة أطول.

  يؤثر هذا التحيز على العلاقات، واتخاذ القرارات، والرفاهية. نركز على الإخفاقات،
  ونتوقع أسوأ السيناريوهات، ونتجاهل الأدلة الإيجابية. فهمه يساعدنا على تصحيحه.

why_this_is_important: |
  التعرف على التحيز للسلبية يساعدك على موازنة التغذية الراجعة، وتجنب
  ردود الفعل المبالغ فيها على النقد، واتخاذ قرارات أكثر معايرة. كما أنه يفسر
  لماذا تهيمن الأخبار السيئة ولماذا غالباً ما نشعر بسوء أكثر مما تستدعيه الظروف.

when_to_use:
  - اتخاذ_القرارات
  - بناء_العلاقات
  - القيادة
  - تقييم_المخاطر

how_can_you_spot_it:
  disproportionate_impact_of_criticism: |
    تعليق سلبي واحد يطغى على العديد من التعليقات الإيجابية.
  threat_prioritization: |
    تحظى السلبيات المحتملة باهتمام أكبر من الإيجابيات المكافئة.
  vivid_negative_memories: |
    يتم استدعاء التجارب السلبية بسهولة أكبر وبمشاعر أقوى.
  discounting_positive_evidence: |
    يتم نسيان الأخبار الجيدة بسرعة أو تفسيرها بعيداً.

examples:
  performance_reviews: |
    يركز موظف على قطعة واحدة من التغذية الراجعة النقدية ويتجاهل التقييم
    الإيجابي العام.
  news_consumption: |
    العناوين السلبية تهيمن على الاهتمام وتشكل نظرة العالم على الرغم من
    الاتجاهات الإيجابية.
  relationships: |
    جدال واحد يبرز أكثر من العديد من اللحظات الجيدة.
  investing: |
    تؤدي انخفاضات السوق إلى ذعر أكبر من ارتفاعات السوق المكافئة التي
    تسبب النشوة.

real_world_implications: |
  يشكل التحيز للسلبية الإعلام والسياسة والثقافة التنظيمية. ويساهم
  في القلق والصراع والقرارات دون المستوى الأمثل. يمكن أن يؤدي
  التصدي له عن قصد إلى تحسين الرفاهية والحكم.

professional_application:
  networking_and_relationship_building: |
    عند تقديم التغذية الراجعة، كن على دراية بأن التعليقات السلبية ستزن بشكل
    أثقل - وازنها وركز على النمو. عند تلقي التغذية الراجعة، خذ بعين
    الاعتبار الصورة الكاملة بوعي.
  collaborative_learning_initiative: |
    قم بإنشاء ثقافات تتصدى بشكل صريح للتحيز للسلبية: احتفل بالانتصارات،
    وثّق النتائج الإيجابية، ووازن بين ما بعد الوفاة (post-mortems) و"ما قبل
    الوفاة" (pre-mortems) لما سار على ما يرام.

how_can_this_be_misapplied:
  toxic_positivity: |
    تجاهل المخاوف المشروعة بالإصرار على "التفكير الإيجابي".
  ignoring_real_threats: |
    الإفراط في التصحيح لدرجة التقليل من شأن المخاطر الحقيقية.
  feedback_suppression: |
    تجنب النقد الضروري لأن "السلبية سيئة".
  invalidation: |
    إخبار شخص ما بأن مشاعره السلبية هي "مجرد تحيز للسلبية"
    عندما يكون لديه سبب حقيقي للقلق.

