id: default_effect
name: تأثير الخيار الافتراضي

quick_introduction: |
  تأثير الخيار الافتراضي هو الميل إلى اختيار الخيار المحدد مسبقًا عند
  تقديم خيارات. أي شيء يتم تعيينه كخيار افتراضي يحظى بميزة قوية -
  غالبًا ما يلتزم به الناس بغض النظر عما إذا كان هو الأمثل لهم.

one_liner: أي شيء يتم تعيينه كخيار افتراضي يحظى بميزة قوية - نلتزم به.

try_this:
  - لاحظ متى تقبل الخيار الافتراضي دون تقييم البدائل.
  - عند تصميم الخيارات، قم بتعيين خيارات افتراضية تخدم أفضل مصالح المستخدمين.
  - اسأل: هل سأختار هذا لو لم يكن محددًا مسبقًا؟

ask_yourself:
  - هل أختار الخيار الافتراضي بسبب القصور الذاتي، أم لأنه الأفضل بالنسبة لي؟
  - من وضع هذا الخيار الافتراضي، وما الذي قد يكسبه منه؟

in_more_detail: |
  تعمل الخيارات الافتراضية بسبب القصور الذاتي، وتجنب الخسارة (التغيير يبدو كخسارة
  للخيار الافتراضي)، والموافقة الضمنية (نفترض أن الخيار الافتراضي موصى به).
  تختلف معدلات التبرع بالأعضاء بشكل كبير حسب البلد بناءً على ما إذا كان
  الخيار الافتراضي هو التسجيل الطوعي أو الإلغائي. ترتفع مشاركة مدخرات التقاعد
  عندما يكون التسجيل تلقائيًا.

  يمكن استخدام الخيارات الافتراضية للخير (التوجيه نحو نتائج أفضل) أو
  للتلاعب (إخفاء شروط غير مواتية في مربعات محددة مسبقًا). فهم
  التأثير يساعدك على تصميم أنظمة أفضل ومقاومة الخيارات الافتراضية غير المرغوب فيها.

why_this_is_important: |
  يساعدك فهم تأثير الخيار الافتراضي على تصميم بنية اختيار تحسن النتائج،
  ويساعدك على التعرف على متى يتم تشكيل خياراتك بواسطة الخيارات الافتراضية بدلاً من
  التفضيل المتعمد.

when_to_use:
  - اتخاذ_القرارات
  - القيادة
  - حل_المشكلات
  - تقييم_المخاطر

how_can_you_spot_it:
  inertia_toward_default: |
    يميل معظم الناس إلى الالتزام بأي شيء محدد مسبقًا.
  implied_recommendation: |
    نفسر الخيار الافتراضي على أنه "ما يريدون منا اختياره".
  opt_in_vs_opt_out: |
    يغير التأطير المشاركة بشكل كبير (التسجيل الطوعي مقابل الإلغائي).
  pre_checked_boxes: |
    تحظى الخيارات المحددة مسبقًا بميزة قوية في النماذج والإعدادات.

examples:
  organ_donation: |
    تمتلك الدول التي تتبع نظام الإلغاء معدلات تبرع أعلى بكثير من الدول التي تتبع
    نظام التسجيل الطوعي - الخيار الافتراضي أهم من المواقف.
  retirement_savings: |
    يزيد التسجيل التلقائي بشكل كبير من المشاركة في خطط 401 (k).
  software_installers: |
    تشكل خيارات "موصى بها" والإضافات المحددة مسبقًا ما يقوم المستخدمون بتثبيته.
  subscriptions: |
    النسخ التجريبية المجانية التي تتحول افتراضيًا إلى اشتراك مدفوع تلتقط الكثيرين
    ممن لن يختاروا الاشتراك بنشاط.

real_world_implications: |
  تأثير الخيار الافتراضي هو أحد أقوى الدفعات. إنه يشكل سلوكيات الادخار والصحة والخصوصية
  وسلوك المستهلك. تستخدم بنية الاختيار الأخلاقية الخيارات الافتراضية لتحسين النتائج؛
  تستخدمها الأنماط المظلمة لاستغلالها.

professional_application:
  networking_and_relationship_building: |
    عند تصميم العمليات للآخرين، اختر خيارات افتراضية تخدم مصالحهم.
    تجنب الأنماط المظلمة التي تستخدم الخيارات الافتراضية لاستخراج القيمة.
  collaborative_learning_initiative: |
    ضع خيارات افتراضية للممارسات الجماعية (مثل: الافتراضي للتواصل غير المتزامن،
    الافتراضي للتوثيق) التي تتماشى مع السلوك المرغوب. اجعل الاختيار الصحيح هو الاختيار السهل.

how_can_this_be_misapplied:
  dark_patterns: |
    استخدام الخيارات الافتراضية لخداع الناس في خيارات غير مواتية (مثل: الرسوم المخفية،
    الاشتراكات غير المرغوب فيها).
  paternalism: |
    فرض خيارات افتراضية تتجاوز التفضيل الحقيقي دون موافقة.
  manipulation: |
    إخفاء شروط غير مواتية في الخيارات الافتراضية والاعتماد على القصور الذاتي.
  one_size_fits_all: |
    افتراض أن الخيار الافتراضي نفسه مناسب للجميع عندما تختلف التفضيلات.

