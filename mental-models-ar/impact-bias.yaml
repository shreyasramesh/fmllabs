# تحيز التأثير
# نموذج عقلي / تحيز معرفي - مثال إدخال

id: impact_bias
name: تحيز التأثير

quick_introduction: |
  تحيز التأثير هو الميل إلى المبالغة في تقدير شدة ومدة
  ردود أفعالنا العاطفية تجاه أحداث مستقبلية. نعتقد أن الأشياء الجيدة ستجعلنا
  أسعد مما هي عليه، والأشياء السيئة ستجعلنا أكثر تعاسة مما هي عليه. نحن سيئون في التنبؤ العاطفي.

one_liner: نحن نبالغ في تقدير مدى تأثير الأحداث على سعادتنا - ولفترة طويلة.

try_this:
  - Ask: كيف شعرت بعد أحداث مماثلة في الماضي؟ نحن نتكيف بشكل أسرع مما نتوقع.
  - Don't let anticipated impact drive decisions—we're bad at forecasting feelings. لا تدع التأثير المتوقع يقود القرارات - نحن سيئون في التنبؤ بالمشاعر.
  - Notice when you're overestimating the lasting effect of a single outcome. لاحظ عندما تبالغ في تقدير التأثير الدائم لنتيجة واحدة.

ask_yourself:
  - Am I overestimating how long I'll feel this way? هل أبالغ في تقدير المدة التي سأشعر فيها بهذه الطريقة؟
  - What does past experience say about similar events? ماذا تقول التجربة السابقة عن أحداث مماثلة؟

in_more_detail: |
  يبحث دانيال جيلبرت وتيموثي ويلسون في التنبؤ العاطفي: نحن
  نبالغ في تقدير المدة التي سنشعر فيها بالرضا بعد فوز أو بالسوء بعد خسارة.
  نتكيف بشكل أسرع مما نتوقع. كما نبالغ في تقدير تأثير
  الأحداث الفردية - نعتقد أن نتيجة واحدة ستحدد سعادتنا بينما
  تساهم عوامل كثيرة. نركز على الأشياء الخاطئة عند التنبؤ
  بمشاعرنا المستقبلية.

  يؤثر تحيز التأثير على قرارات الحياة الرئيسية: نبالغ في تقدير مدى
  تغيير ترقية أو علاقة أو شراء لسعادتنا. نبالغ أيضاً في تقدير
  الألم الدائم للخسائر.

why_this_is_important: |
  يساعدك التعرف على تحيز التأثير على اتخاذ قرارات أفضل بشأن ما
  سيحسن حياتك بالفعل. إنه يقلل من الاستثمار الزائد في النتائج
  التي لن تكون مهمة بقدر ما تعتقد، ويقلل من الخوف من النتائج
  التي لن تؤذي بقدر ما تتوقع.

when_to_use:
  - اتخاذ_القرارات
  - تحركات_وظيفية
  - تقييم_المخاطر
  - بناء_العلاقات

how_can_you_spot_it:
  overestimated_impact: |
    "هذا سيغير كل شيء" عندما كان للأحداث الماضية المماثلة تأثير
    محدود ودائم.
  duration_overestimation: |
    "لن أتجاوز هذا أبداً" عندما نتكيف عادة بشكل أسرع مما
    نتوقع.
  focalism: |
    التركيز على حدث واحد وتجاهل العوامل الأخرى التي تؤثر على
    الرفاهية.
  adaptation_neglect: |
    نسيان أننا نتكيف مع الظروف الجيدة والسيئة على حد سواء.

examples:
  career: |
    "إذا حصلت على هذه الترقية، سأكون أسعد بكثير" عندما كان
    للترقيات السابقة تأثير مؤقت.
  purchases: |
    "هذه السيارة ستجعلني سعيداً" عندما يتبدد الابتكار بسرعة.
  loss: |
    "لن أتعافى أبداً من هذا الرفض" عندما نتكيف عادة
    في غضون أشهر.
  events: |
    المبالغة في تقدير مدى تأثير حفل زفاف أو عطلة أو حدث مهم على
    السعادة طويلة الأمد.

real_world_implications: |
  يؤدي تحيز التأثير إلى قرارات سيئة بشأن المال والوظيفة والعلاقات.
  ندفع مبالغ إضافية مقابل تجارب سنتكيف معها ونخاف من خسائر سنتعافى منها.
  يؤثر على السياسات والتخطيط الشخصي.

professional_application:
  networking_and_relationship_building: |
    عند اتخاذ قرارات وظيفية أو علاقات، فكر في شعورك بعد أحداث
    ماضية مماثلة. هل استمر التأثير طويلاً كما توقعت؟ استخدم ذلك
    لتعديل تنبؤاتك المستقبلية.
  collaborative_learning_initiative: |
    عندما تواجه الفرق نكسات أو انتصارات، ذكرهم بالتكيف.
    "سنتكيف بشكل أسرع مما نعتقد" يمكن أن يقلل من الاحتفال المفرط
    واليأس المفرط على حد سواء.

how_can_this_be_misapplied:
  dismissing_all_impact: |
    بعض الأحداث لها تأثير دائم - صدمة، خسارة كبيرة. لا تتجاهل
    كل التنبؤ العاطفي على أنه متحيز.
  cold_rationality: |
    "لن يهم" بينما التجربة في الوقت الحالي مهمة.
  undervaluing_experiences: |
    تجنب التجارب الإيجابية لأن "نا سنتكيف على أي حال".
  invalidating_emotions: |
    إخبار الناس بأن مشاعرهم ستزول بينما يحتاجون إلى الدعم
    في الوقت الحالي.

