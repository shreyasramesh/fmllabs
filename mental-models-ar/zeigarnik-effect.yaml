# تأثير زيجنيك
# نموذج عقلي / تحيز معرفي - إدخال مثال

id: zeigarnik_effect
name: تأثير زيجنيك

quick_introduction: |
  تأثير زيجنيك هو الميل إلى تذكر المهام غير المكتملة أو المقطوعة
  بشكل أفضل من المهام المكتملة. تخلق المهام غير المكتملة توترًا نفسيًا
  يبقيها نشطة في أذهاننا. تتعلق أدمغتنا بما هو غير مكتمل.

one_liner: المهام غير المكتملة تلتصق بأذهاننا - تتعلق أدمغتنا بما هو غير مكتمل.

try_this:
  - استخدم الإكمال "لتحرير" المهام من عبء عقلك - أنهِها أو تخلى عنها بشكل صريح.
  - قسّم العمل إلى أجزاء قابلة للإدارة لإنشاء حلقات مفتوحة مثمرة.
  - لاحظ عندما تفكر بشكل متكرر في أمور غير مكتملة - أغلق الحلقة أو قرر التخلي عنها.

ask_yourself:
  - ما هي المهام غير المكتملة التي تخلق توترًا في ذهني؟
  - هل هذه الحلقة المفتوحة تستحق البقاء، أم يمكنني إغلاقها؟

in_more_detail: |
  لاحظت بلوم زيجنيك أن النُدُل يتذكرون الطلبات غير المدفوعة بشكل أفضل
  من المدفوعة - بمجرد اكتمال المهمة، تم "تحريرها" من الذاكرة. تخلق المهام غير المكتملة حلقة مفتوحة تتطلب الإغلاق. هذا يدفع كلاً من التركيز المثمر (نريد الانتهاء) والقلق (لا يمكننا التوقف عن التفكير فيما لم يتم إنجازه).

  يُستخدم التأثير في التسويق (التعليقات النهائية، القصص غير المكتملة) والإنتاجية (تقسيم العمل إلى أجزاء لإنشاء "حلقات مفتوحة" متعددة).
  ويفسر لماذا نفكر بشكل متكرر في الأمور غير المكتملة ولماذا يمكن أن تشعر قوائم المهام بأنها مرهقة.

why_this_is_important: |
  يساعدك فهم تأثير زيجنيك على إدارة الحمل العقلي، وتصميم تجارب جذابة، واستخدام الانقطاع بشكل استراتيجي. يفسر لماذا لا يمكننا التوقف عن التفكير في العمل غير المكتمل - ولماذا يمكن تسخير ذلك أو قد يكون ضارًا.

when_to_use:
  - حل_المشكلات
  - القيادة
  - التعلم
  - اتخاذ_القرار

how_can_you_spot_it:
  rumination_on_incomplete: |
    تتداخل المهام غير المكتملة مع الأفكار أكثر من المهام المكتملة.
  better_recall_of_unfinished: |
    نتذكر المهام المقطوعة بشكل أفضل من المهام المنتهية.
  tension_for_closure: |
    الانزعاج أو الدافع لإكمال ما بدأ.
  serial_dramas: |
    التعليقات النهائية و"يتبع" يستغلان التأثير.

examples:
  productivity: |
    بدء مهمة يخلق توترًا عقليًا يدفع إلى الإكمال - أو قلق إذا كان هناك الكثير من الحلقات المفتوحة.
  marketing: |
    "الجزء الأول من 3" أو "يتبع" يبقي الجماهير منخرطين ويعودون.
  meetings: |
    إنهاء اجتماع دون خطوات تالية واضحة يترك المشاركين
    مع توتر غير محلول.
  learning: |
    الأسئلة غير المجابة أو التفسيرات غير المكتملة تلتصق بالذاكرة
    وتدفع إلى مزيد من الاستقصاء.

real_world_implications: |
  يؤثر تأثير زيجنيك على الإنتاجية والمشاركة والحمل العقلي. يمكن تسخيره للتركيز أو قد يسبب الإرهاق.
  ويفسر جاذبية التعليقات النهائية وعبء الكثير من المهام المفتوحة.

professional_application:
  networking_and_relationship_building: |
    اترك المحادثات بخطوات تالية واضحة - أو حلقات مفتوحة متعمدة إذا كنت تريد أن يتابع الشخص الآخر. الخيوط غير المحلولة تخلق المشاركة.
  collaborative_learning_initiative: |
    استخدم تأثير زيجنيك في التدريب: اطرح مشاكل أو أسئلة
    قبل الاستراحات لإبقاء المتعلمين منخرطين. ولكن تجنب خلق الكثير من
    الحلقات المفتوحة لدرجة أن يشعر الناس بالإرهاق.

how_can_this_be_misapplied:
  overwhelm: |
    خلق الكثير من الحلقات المفتوحة - الكثير من المهام غير المكتملة - يؤدي إلى
    القلق والشلل.
  manipulation: |
    ترك الأمور غير محلولة عن عمد لخلق الاعتمادية أو
    المشاركة.
  false_urgency: |
    استخدام التأثير لخلق إلحاح مصطنع عندما لا يكون موجودًا.
  incomplete_work: |
    بدء العديد من الأشياء لخلق "توتر" دون فعل
    إكمالها - مما يؤدي إلى جهد مشتت.

