# تحيز الإدراك بأثر رجعي
# نموذج عقلي / انحياز معرفي - مثال على إدخال

id: hindsight_bias
name: تحيز الإدراك بأثر رجعي

quick_introduction: |
  تحيز الإدراك بأثر رجعي (أو تأثير "كنت أعرف ذلك طوال الوقت") هو الميل إلى الاعتقاد،
  بعد وقوع حدث ما، بأننا كنا سنتنبأ به أو نتوقعه. نعيد بناء الماضي لجعل النتائج تبدو أكثر حتمية مما كانت عليه.

one_liner: بعد الحدث، نعتقد أننا كنا نعرف كل شيء طوال الوقت.

try_this:
  - قبل الحكم على القرارات الماضية، اسأل: ماذا كانوا يعرفون في ذلك الوقت؟
  - سجل توقعاتك قبل النتائج - قارن لاحقًا.
  - لاحظ متى تجعل الماضي يبدو أكثر حتمية مما كان عليه.

ask_yourself:
  - هل أحكم بناءً على معلومات لم تكن متاحة حينها؟
  - هل تنبأت بهذا بالفعل، أم أنه يبدو واضحًا الآن فقط؟

in_more_detail: |
  بمجرد أن نعرف النتيجة، تبدو واضحة. ننسى عدم اليقين الذي شعرنا به مسبقًا. هذا التحيز يشوه التعلم - نعتقد أننا "عرفنا" شيئًا لم نعرفه، لذا لا نحدث نماذجنا. يؤدي أيضًا إلى لوم غير عادل: "كان ينبغي عليهم رؤية ذلك قادمًا" عندما كان المستقبل غير مؤكد حقًا.

  يؤثر تحيز الإدراك بأثر رجعي على تحليلات ما بعد الحدث، والأحكام القانونية، والتحليلات التاريخية.
  نحكم على القرارات الماضية بمعلومات لم تكن متاحة في ذلك الوقت.

why_this_is_important: |
  التعرف على تحيز الإدراك بأثر رجعي يحسن التعلم من النتائج، والتقييم العادل للقرارات، وتقييم المخاطر بشكل أكثر دقة. إنه يمنع الثقة الزائفة في قدراتنا التنبؤية.

when_to_use:
  - اتخاذ_القرار
  - التعلم
  - تقييم_المخاطر
  - القيادة

how_can_you_spot_it:
  inevitability_feeling: |
    بعد وقوع حدث ما، يبدو وكأنه "كان لا بد" أن يحدث.
  reconstructed_certainty: |
    نتذكر أننا كنا أكثر يقينًا قبل الحدث مما كنا عليه في الواقع.
  blame_for_failure: |
    "كان ينبغي عليهم أن يعرفوا" عندما كانت النتيجة غير مؤكدة حقًا.
  undervaluing_luck: |
    إرجاع النتائج إلى المهارة أو البصيرة عندما لعب الحظ دورًا.

examples:
  investing: |
    "كنت أعرف أن السوق سينهار" بعد انهياره - عندما لم تتصرف بناءً على تلك "المعرفة" مسبقًا.
  project_failures: |
    "كان ينبغي علينا رؤية المخاطر" في تحليل ما بعد الحدث عندما كانت المخاطر غامضة حقًا.
  elections: |
    بعد نتيجة مفاجئة، يشرح الخبراء لماذا كان الأمر "واضحًا" بأثر رجعي.
  medical: |
    "كانت العلامات موجودة" عند تشخيص حالة نادرة بعد الواقعة.

real_world_implications: |
  يشوه تحيز الإدراك بأثر رجعي المسؤولية القانونية، وتقييم الأداء، والتعلم.
  يجعلنا واثقين بشكل مفرط في حكمنا وغير عادلين تجاه أولئك الذين اتخذوا قرارات معقولة بمعلومات محدودة.

professional_application:
  networking_and_relationship_building: |
    عند تقييم قرارات الآخرين الماضية، افصل بوعي بين ما كان معروفًا حينها وما تعرفه الآن. تجنب عبارة "قلت لك ذلك" عندما لم تتنبأ بالنتيجة بالفعل.
  collaborative_learning_initiative: |
    في تحليلات ما بعد الحدث، استخدم تقنيات "ما قبل الحدث" أو "مذكرات القرار" لالتقاط عدم اليقين وقت اتخاذ القرار. قارن عدم اليقين الفعلي بإعادة بناء الإدراك بأثر رجعي.

how_can_this_be_misapplied:
  excusing_all_failures: |
    تجاهل كل فشل باعتباره "غير قابل للتنبؤ" عندما كان البعض قابلاً للتنبؤ.
  no_accountability: |
    استخدام تحيز الإدراك بأثر رجعي لتجنب محاسبة الناس على الإهمال.
  false_uncertainty: |
    الإفراط في التصحيح للاعتقاد بأننا لا نستطيع التنبؤ بأي شيء أبدًا.
  undermining_learning: |
    رفض استخلاص الدروس لأن "الإدراك بأثر رجعي واضح" - لا يزال بإمكاننا التعلم من النتائج.

