# التنافر المعرفي
# نموذج عقلي / انحياز معرفي - إدخال مثال

id: cognitive_dissonance
name: التنافر المعرفي

quick_introduction: |
  التنافر المعرفي هو الانزعاج الذهني الذي نشعر به عند حمل معتقدات متعارضة،
  أو عندما تتعارض أفعالنا مع معتقداتنا. نحن مدفوعون لتقليل هذا الانزعاج—غالباً
  عن طريق تغيير معتقداتنا لتتوافق مع أفعالنا بدلاً من تغيير أفعالنا.

one_liner: نغير معتقداتنا لتتوافق مع أفعالنا بشكل متكرر أكثر من العكس.

try_this:
  - لاحظ متى تقوم بالتبرير لتقليل الانزعاج بدلاً من تغيير السلوك.
  - اسأل: هل أقوم بتعديل معتقداتي لتبرير ما فعلته؟
  - فكر فيما إذا كان تغيير الفعل سيكون أكثر صدقاً من تغيير الاعتقاد.

ask_yourself:
  - هل أقوم بتقليل التنافر عن طريق التبرير، أم عن طريق التغيير الفعلي؟
  - هل سأحتفظ بهذا الاعتقاد لو لم أكن قد تصرفت بهذه الطريقة بالفعل؟

in_more_detail: |
  تشرح نظرية ليون فيستينجر أننا نسعى للاتساق. عندما نتصرف ضد قيمنا (مثل الكذب،
  إهدار المال)، فإننا نختبر التنافر. لتقليل ذلك، قد نغير اعتقادنا ("لم يكن الأمر
  كذبة حقاً") أو نقلل من أهمية الفعل ("لم يكن سيئاً جداً"). غالباً ما نبرر بدلاً
  من أن نصلح.

  يدفع التنافر المعرفي إلى تأثير بن فرانكلين (نحن نحب الأشخاص الذين ساعدناهم)،
  ويفسر لماذا نبرر القرارات السابقة، ويكمن وراء العديد من خداع الذات. إنها قوة
  قوية في تكوين المعتقدات وتغييرها.

why_this_is_important: |
  يساعد فهم التنافر المعرفي على التعرف على تبريراتك الخاصة وفهم لماذا يقاوم
  الناس تغيير آرائهم. كما يفسر لماذا الالتزام والاتساق مبادئ إقناع قوية.

when_to_use:
  - صنع_القرار
  - بناء_العلاقات
  - القيادة
  - حل_النزاعات

how_can_you_spot_it:
  post_decision_rationalization: |
    بعد الاختيار، نؤكد على إيجابيات اختيارنا وسلبيات الخيارات المرفوضة.
  belief_action_alignment: |
    نقوم بتعديل المعتقدات لتتوافق مع الأفعال التي اتخذناها بالفعل.
  discomfort_with_inconsistency: |
    ضيق عندما نلاحظ أن سلوكنا لا يتوافق مع قيمنا المعلنة.
  resistance_to_disconfirming_evidence: |
    تجاهل أو تقليل المعلومات التي تتعارض مع التزاماتنا.

examples:
  purchase_justification: |
    بعد شراء سلعة باهظة الثمن، نؤكد على فوائدها ونقلل من أهمية التكلفة.
  relationship: |
    نبرر البقاء في علاقة سيئة بالتركيز على الجيد وتقليل السيئ.
  career: |
    نبرر البقاء في وظيفة لا نحبها بالتأكيد على الأسباب التي "تجعلنا" نبقى.
  beliefs: |
    عندما تتعارض أفعالنا مع قيمنا، نغير قيمنا ("أنا لست نباتياً حقاً - أنا فقط
    آكل اللحوم أحياناً") بدلاً من أفعالنا.

real_world_implications: |
  يشكل التنافر المعرفي تكوين المعتقدات، وسلوك المستهلك، والمواقف السياسية.
  ويفسر لماذا يضاعف الناس بعد القرارات السيئة ولماذا يمكن أن يغير تغيير السلوك
  المعتقدات.

professional_application:
  networking_and_relationship_building: |
    يمكن أن تؤدي الالتزامات الصغيرة إلى التزامات أكبر—يبرر الناس أفعالهم السابقة.
    استخدم هذا بشكل أخلاقي: ابدأ بطلبات صغيرة. كن على دراية عندما تبرر سلوكك الخاص.
  collaborative_learning_initiative: |
    عند إدخال التغيير، احصل على موافقة مبكرة والتزامات صغيرة—فهي تخلق تنافراً
    يحفز التبني الأكبر. تجنب فرض الالتزامات العامة التي تخلق الاستياء.

how_can_this_be_misapplied:
  manipulation: |
    إنشاء تنافر متعمد للضغط على الناس للامتثال.
  dismissing_genuine_change: |
    افتراض أن كل تغيير في المعتقدات هو تبرير عندما يقوم الناس أحياناً
    بتحديثات حقيقية.
  forced_consistency: |
    الضغط على الناس ليكونوا "متسقين" عندما تكون آراؤهم قد تطورت بشكل مشروع.
  self_deception: |
    استخدام نظرية التنافر لتبرير تجنب الحقائق غير المريحة عن أنفسنا.

