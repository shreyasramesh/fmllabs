# تقدير الاستدلال بالتوفر
# نموذج ذهني / انحياز معرفي - إدخال مثال

id: availability_heuristic
name: تقدير الاستدلال بالتوفر

quick_introduction: |
  تقدير الاستدلال بالتوفر هو الميل إلى الحكم على احتمالية وقوع أحداث
  بناءً على مدى سهولة تذكر الأمثلة. إذا كان بإمكاننا استدعاء أمثلة بسهولة،
  نفترض أن الحدث شائع. تهيمن الأمثلة الحية أو الحديثة أو العاطفية على
  تقديراتنا للاحتمالات.

one_liner: ما يتبادر إلى الذهن بسهولة يبدو أكثر احتمالاً - حتى لو لم يكن كذلك.

try_this:
  - اسأل: ما هو المعدل الأساسي؟ هل أبالغ في تقدير الأمثلة الحية أو الحديثة؟
  - ابحث عن بيانات عندما يقول لك حدسك "هذا يبدو شائعًا" أو "هذا يبدو نادرًا".
  - لاحظ متى تقود قصة درامية واحدة تقييمك للمخاطر.

ask_yourself:
  - هل أحكم على الاحتمالية بناءً على سهولة الاستدعاء بدلاً من التكرار الفعلي؟
  - هل سأفكر بشكل مختلف لو لم أر هذا العنوان للتو؟

in_more_detail: |
  نحن نستخدم اختصارات ذهنية لتقدير التكرار والاحتمالية. أحد هذه الاختصارات
  هو التوفر: ما الذي يتبادر إلى الذهن بسهولة؟ حوادث الطائرات حية ويتم
  الإبلاغ عنها بكثافة - نحن نبالغ في تقدير احتمالية وقوعها. حوادث السيارات
  شائعة ولكن أقل وضوحًا - نحن نقلل من تقديرها. الحداثة والحيوية والتأثير
  العاطفي كلها تزيد من التوفر.

  الاستدلال مفيد عندما يرتبط التوفر بالتكرار الفعلي.
  ولكن وسائل الإعلام والتجارب الشخصية والوضوح غالبًا ما تشوه العلاقة.
  نحن نخاف من المخاطر النادرة ولكن الحية ونتجاهل المخاطر الشائعة ولكن العادية.

why_this_is_important: |
  التعرف على تقدير الاستدلال بالتوفر يساعدك على تصحيح تقديرات الاحتمالات،
  وتجنب المبالغة في رد الفعل على الأخبار الحية، واتخاذ تقييمات أفضل للمخاطر.
  وهو يفسر العديد من الأخطاء المنهجية في الحكم.

when_to_use:
  - صنع_القرار
  - تقييم_المخاطر
  - الاستثمار
  - حل_المشكلات

how_can_you_spot_it:
  vividness_dominance: |
    الأمثلة الدرامية أو العاطفية تؤثر بشكل غير متناسب على التقديرات.
  recency_effect: |
    الأحداث الأخيرة تبدو أكثر احتمالًا للتكرار.
  personal_experience_overweighting: |
    "أعرف شخصًا..." يشكل تقديرات الاحتمالات.
  media_distortion: |
    ما يتم الإبلاغ عنه غالبًا لا يتطابق مع ما هو شائع.

examples:
  risk_perception: |
    المبالغة في تقدير خطر الإرهاب (حي، تم الإبلاغ عنه) والتقليل من تقدير
    خطر أمراض القلب (شائع، أقل دراماتيكية).
  investing: |
    الأحداث الأخيرة في السوق (الانهيار، الازدهار) تهيمن على التوقعات المستقبلية.
  hiring: |
    قصة حية واحدة عن توظيف سيئ من مدرسة معينة تؤثر على
    تقييم جميع المرشحين من تلك المدرسة.
  health: |
    تشخيص صديق بالسرطان يجعل السرطان يبدو أكثر احتمالًا مما تشير إليه المعدلات الأساسية.

real_world_implications: |
  يؤثر تقدير الاستدلال بالتوفر على شراء التأمين، وأولويات السياسات،
  والقرارات الشخصية. تستغله وسائل الإعلام والمسوقون. يتطلب التصحيح
  له البحث عن المعدلات الأساسية والتساؤل عما "يتبادر إلى الذهن".

professional_application:
  networking_and_relationship_building: |
    كن على دراية بأن تجربة سلبية حية واحدة مع شخص أو مجموعة يمكن أن
    تشوه حكمك. ابحث عن المعدلات الأساسية ونقاط بيانات متعددة.
  collaborative_learning_initiative: |
    عند تقييم المخاطر أو الفرص، اسأل صراحة "ما هو المعدل الأساسي؟" و "هل أبالغ
    في تقدير الأمثلة الحية؟" استخدم البيانات لتصحيح التقديرات المستندة إلى التوفر.

how_can_this_be_misapplied:
  dismissing_intuition: |
    أحيانًا يكون التوفر مفيدًا - التجربة الحديثة يمكن أن تشير إلى
    تغيير. لا تفترض أن جميع الأحكام المستندة إلى التوفر خاطئة.
  analysis_paralysis: |
    المبالغة في التصحيح إلى درجة تجاهل علامات التحذير المشروعة من
    التجربة الحية.
  false_objectivity: |
    افتراض أن المعدلات الأساسية صحيحة دائمًا عندما قد تكون قديمة أو
    غير قابلة للتطبيق.
  manipulation: |
    جعل أمثلة معينة حية بشكل متعمد لتوجيه أحكام الآخرين.

