# التفكير الاحتمالي
# نموذج ذهني / انحياز معرفي - مثال إدخال

id: probabilistic_thinking
name: التفكير الاحتمالي

quick_introduction: |
  التفكير الاحتمالي هو عادة الاستدلال بالمصطلحات الاحتمالية بدلاً من اليقين. بدلاً من "هل سيحدث هذا؟" نسأل "ما مدى احتمالية حدوث هذا؟"
  إنه يحتضن عدم اليقين ويستخدمه لاتخاذ قرارات أفضل.

one_liner: فكر بالاحتمالات، لا باليقين - احتضن عدم اليقين.

try_this:
  - استبدل "هل سيحدث؟" بـ "ما مدى احتمالية حدوثه؟"
  - ضع في اعتبارك سيناريوهات متعددة وقم بتعيين احتمالات تقريبية.
  - قم بتحديث معتقداتك مع وصول أدلة جديدة.

ask_yourself:
  - هل أفكر بثنائية عندما تكون الاحتمالات أكثر دقة؟
  - ما هو نطاق النتائج المعقولة؟

in_more_detail: |
  معظم نتائج العالم الحقيقي غير مؤكدة. يستبدل التفكير الاحتمالي "نعم/لا" الثنائية بالمعتقدات المتدرجة. يتضمن النظر في سيناريوهات متعددة،
  وتعيين احتمالات تقريبية، والتحديث عند وصول الأدلة. إنه عكس الثقة المفرطة والتفكير بالأبيض والأسود.

  تشمل الممارسات الرئيسية: التفكير في نطاقات، والنظر في المعدلات الأساسية، وتحديث
  المعتقدات بالأدلة، والتمييز بين المخاطر (الاحتمالات المعروفة)
  وعدم اليقين (الاحتمالات غير المعروفة). إنه يحسن المعايرة و
  جودة القرار.

why_this_is_important: |
  يقلل التفكير الاحتمالي من الثقة المفرطة، ويحسن التنبؤ، ويؤدي إلى قرارات أفضل في ظل عدم اليقين. إنه ضروري للاستثمار،
  والاستراتيجية، وأي مجال يكون فيه المستقبل غير مؤكد.

when_to_use:
  - اتخاذ_القرارات
  - تقييم_المخاطر
  - الاستثمار
  - حل_المشكلات

how_can_you_spot_it:
  likelihood_language: |
    "من المحتمل"، "مرجح"، "غير مرجح" بدلاً من "سوف" أو "لن".
  scenario_thinking: |
    التفكير في عدة مستقبلات ممكنة مع احتمالات تقريبية.
  calibration: |
    تنبؤات تتطابق مع ترددات النتائج الفعلية بمرور الوقت.
  uncertainty_acknowledgment: |
    التعبير عن ما لا تعرفه صراحة.

examples:
  forecasting: |
    "أعتقد أن هناك فرصة بنسبة 60% للوفاء بالموعد النهائي" بدلاً من "سوف
    نلتزم بالموعد النهائي."
  investing: |
    "هناك فرصة بنسبة 30% لارتفاعه بمقدار 2x وفرصة بنسبة 70% لانخفاضه بنسبة -50%" بدلاً من
    "هذا سيرتفع بجنون."
  strategy: |
    التخطيط لسيناريوهات متعددة (الأفضل، الأساسي، الأسوأ) مع احتمالات تقريبية.
  hiring: |
    "بناءً على المقابلة، أرى احتمالاً بنسبة 70% أن ينجحوا" بدلاً من
    "إنهم موظفون رائعون."

real_world_implications: |
  يحسن التفكير الاحتمالي المعايرة، ويقلل المفاجآت، ويمكّن
  من إدارة أفضل للمخاطر. إنه محوري في التنبؤ الفعال و
  اتخاذ القرار في ظل عدم اليقين.

professional_application:
  networking_and_relationship_building: |
    تواصل باستخدام الاحتمالات عند الاقتضاء - "أنا واثق إلى حد ما" مقابل
    "أنا متأكد." هذا يبني الثقة من خلال الإشارة إلى التواضع المعرفي.
  collaborative_learning_initiative: |
    شجع الفرق على التعبير عن عدم اليقين. استخدم أسواق التنبؤ أو
    تمارين المعايرة لتحسين الحكم الاحتمالي.

how_can_this_be_misapplied:
  false_precision: |
    تعيين احتمالات دقيقة (مثل 73٪) عندما لا يمكنك أن تكون دقيقًا بهذا الشكل.
  analysis_paralysis: |
    عدم التصرف أبداً لأن "نا لا يمكننا أن نكون متأكدين".
  hedging_overuse: |
    تأهيل كل شيء لدرجة عدم الفائدة.
  dismissing_intuition: |
    التصحيح المفرط لتجاهل الشعور الغريزي القوي عندما قد يحمل معلومات صالحة.

