# Availability Cascade
# Mental Model / Cognitive Bias - Example Entry

id: availability_cascade
name: انهيار التوفر

quick_introduction: |
  انهيار التوفر هو عملية تعزيز ذاتي تكتسب فيها فكرة المصداقية من خلال النقاش العام المتكرر. كلما زاد تداولها، أصبحت "أكثر توفراً"، زاد إيمان الناس بها، وزاد تداولها. يكتسب الاعتقاد الجماعي زخماً بغض النظر عن حقيقته الأساسية.

one_liner: كلما تكررت فكرة ما، بدت أكثر مصداقية - بغض النظر عن الأدلة.

try_this:
  - Ask: هل هذا الاعتقاد منتشر لأنه صحيح، أم لأنه متكرر؟
  - Seek: ابحث عن المصادر الأولية قبل قبول "ما يعرفه الجميع".
  - Notice: لاحظ متى يكون التكرار وحده هو ما يقود إحساسك بالمصداقية.

ask_yourself:
  - هل كنت سأصدق هذا لو سمعته مرة واحدة فقط؟
  - هل أخلط بين "الجميع يقول ذلك" و "الأدلة تدعمه"؟

in_more_detail: |
  وصف تيمور كوران وكاس سنشتاين كيف تعمل انهيارات التوفر: توافر المعلومات (كم مرة نسمع شيئاً) والمصداقية (مدى إقناعها) يعزز كل منهما الآخر. التغطية الإعلامية، وسائل التواصل الاجتماعي، والخطاب العام تضخم أفكاراً معينة. بمجرد أن تصل فكرة إلى عتبة معينة من التوفر، يمكن أن تنتشر بسرعة وتصبح "معرفة شائعة" حتى لو كانت خاطئة أو مبالغ فيها.

  يمكن أن تكون انهيارات التوفر مفيدة (نشر تحذيرات مهمة) أو ضارة (نشر الذعر أو المعلومات المضللة). إنها مدفوعة بالاستدلال بالتوفر والإثبات الاجتماعي.

why_this_is_important: |
  يساعدك التعرف على انهيارات التوفر على تقييم ما إذا كان الاعتقاد المنتشر يعكس الأدلة أم مجرد تكرار. إنه يفسر كيف تصبح الأفكار فيروسية وكيف يمكن أن تكون المعتقدات الجماعية خاطئة. إنه ضروري لمحو الأمية الإعلامية والتفكير النقدي.

when_to_use:
  - اتخاذ_القرارات
  - تقييم_المخاطر
  - التعلم
  - القيادة

how_can_you_spot_it:
  repetition_plausibility_spiral: |
    كلما تكررت فكرة ما، بدت أكثر مصداقية.
  media_amplification: |
    التغطية تدفع الاعتقاد الذي يدفع المزيد من التغطية.
  social_proof_belief: |
    "الجميع يؤمن بها" يصبح دليلاً على الاعتقاد.
  threshold_effects: |
    بمجرد أن تعبر فكرة ما عتبة الرؤية، تنتشر بسرعة.

examples:
  health_scares: |
    تقترح دراسة أن المنتج خطير؛ الإعلام يضخمه؛
    الجمهور يتجنبه؛ المزيد من التغطية تتبع. قد يكون الخطر
    مبالغاً فيه.
  financial_panic: |
    تنتشر شائعات عن إفلاس بنك؛ يسحب الناس أموالهم؛
    السحب يصبح تحقيقاً ذاتياً للنبوءة.
  social_media: |
    تنتشر قصة؛ يزيد التكرار الاعتقاد؛
    يزيد الاعتقاد من المشاركة. الحقيقة والفيروسية يمكن أن تتباعد.
  organizational: |
    تنتشر شائعة حول تسريح العمال؛ يزيد القلق؛ يتغير السلوك؛
    تكتسب الشائعة المصداقية من خلال رد الفعل.

real_world_implications: |
  تشكل انهيارات التوفر الرأي العام والسياسات والأسواق.
  يمكنها نشر كل من الحقائق المهمة والأكاذيب الخطيرة.
  يتطلب التفكير النقدي التمييز بين الاعتقاد القائم على الأدلة
  والاعتقاد المدفوع بالانهيار.

professional_application:
  networking_and_relationship_building: |
    عندما تكون فكرة "في كل مكان"، اسأل: هل هي حقيقية لأنها
    متكررة، أم متكررة لأنها حقيقية؟ ابحث عن المصادر الأولية.
  collaborative_learning_initiative: |
    أنشئ معايير للتحقق قبل التضخيم. شجع
    التشكيك في "ما يعرفه الجميع". ميز بين الإجماع
    الذي يعكس الأدلة والإجماع الذي يعكس
    التوفر.

how_can_this_be_misapplied:
  dismissing_all_consensus: |
    في بعض الأحيان يكون الاعتقاد المنتشر صحيحاً. لا تفترض أن جميع
    الأفكار الشائعة هي انهيارات.
  conspiracy_thinking: |
    استخدام "انهيار التوفر" لرفض المخاوف المشروعة
    على أنها مصطنعة.
  false_skepticism: |
    رفض الأفكار المدعومة جيداً لأنها شائعة.
  contrarianism: |
    الافتراض بأن أي شيء يعتقده الجميع يجب أن يكون خاطئاً.

