id: pareto_principle
name: مبدأ باريتو

quick_introduction: |
  ينص مبدأ باريتو (أو قاعدة 80/20) على أن 80% تقريبًا من التأثيرات تأتي من 20% من الأسباب. غالبًا ما تنتج نسبة ضئيلة من المدخلات غالبية المخرجات - في المبيعات، الأخطاء، العملاء، الجهد، الميزات، وغيرها. ركز على القليل الحيوي.

one_liner: 80% من التأثيرات تأتي من 20% من الأسباب - ركز على القليل الحيوي.

try_this:
  - حدد 20% من المدخلات التي تنتج 80% من النتائج - ضاعف تركيزك هناك.
  - قلل أو أعطِ أولوية أقل لـ 80% التي تنتج القليل.
  - اسأل: أي القليل من الأشياء، إذا فعلتها بشكل جيد، ستكون الأكثر أهمية؟

ask_yourself:
  - هل أوزع جهدي بالتساوي عندما يكون لعدد قليل من الأشياء أهمية أكبر؟
  - ما هو الـ 20% الذي لدي والذي له تأثير كبير؟

in_more_detail: |
  لاحظ فيلفريدو باريتو أن 80% من أراضي إيطاليا كانت مملوكة لـ 20% من السكان. تم تعميم المبدأ: 80% من المبيعات من 20% من العملاء، 80% من الأخطاء من 20% من الكود، 80% من النتائج من 20% من الجهد. تختلف النسبة الدقيقة، لكن النمط - التوزيع غير المتكافئ - شائع.

  يقترح المبدأ أن تحديد الـ 20% ذات التأثير الكبير والتركيز عليها يمكن أن يحسن النتائج بشكل كبير. إنها استراتيجية لترتيب الأولويات، وليست قانونًا فيزيائيًا.

why_this_is_important: |
  يساعدك تطبيق مبدأ باريتو على تحديد الأولويات بصرامة، وتجنب إهدار الجهد على الأنشطة ذات التأثير المنخفض، وتحقيق المزيد بأقل. إنه أمر أساسي للإنتاجية والاستراتيجية.

when_to_use:
  - اتخاذ_القرارات
  - حل_المشكلات
  - القيادة
  - التحركات_المهنية

how_can_you_spot_it:
  uneven_distribution: |
    تشكل نسبة صغيرة من X نسبة كبيرة من Y.
  high_leverage_activities: |
    تنتج قلة من الإجراءات معظم النتائج.
  low_value_tail: |
    تساهم العديد من الأنشطة بالقليل؛ تقليمها له تأثير ضئيل.
  vital_few_vs_trivial_many: |
    المفتاح هو تحديد القليل الأكثر أهمية.

examples:
  sales: |
    20% من العملاء يولدون 80% من الإيرادات - ركز على الاحتفاظ بهم وتنميتهم.
  software: |
    20% من الميزات تقود 80% من الاستخدام - أعطِ الأولوية لتلك.
  productivity: |
    تنتج قلة من العادات أو الروتين معظم إنتاجك - ضاعف تركيزك عليها.
  problems: |
    20% من الأخطاء تسبب 80% من الأعطال - أصلح تلك أولاً.

real_world_implications: |
  يوجه مبدأ باريتو تخصيص الموارد، استراتيجية المنتج، والإنتاجية الشخصية. تجاهله يؤدي إلى تشتيت الجهد بشكل مفرط. المبالغة في تطبيقه يمكن أن تسبب إهمال "الذيل الطويل" حيث يكون ذلك مهمًا.

professional_application:
  networking_and_relationship_building: |
    حدد العلاقات التي تهم أهدافك أكثر. استثمر بشكل غير متناسب في تلك العلاقات بدلاً من توزيع الجهد بالتساوي.
  collaborative_learning_initiative: |
    عند تحسين أداء الفريق، ابحث عن 20% من التدخلات التي تحقق 80% من النتائج. ركز التدريب وتغييرات العمليات هناك.

how_can_this_be_misapplied:
  oversimplification: |
    افتراض أن 80/20 ينطبق في كل مكان؛ بعض التوزيعات أكثر توازناً.
  neglecting_the_tail: |
    تجاهل "الكثرة التافهة" عندما تكون مهمة بشكل جماعي (على سبيل المثال، العديد من العملاء الصغار، الحالات الهامشية).
  false_precision: |
    التعامل مع 80/20 كحقيقة حرفية بدلاً من كقاعدة إرشادية تقريبية.
  misidentifying_the_vital_few: |
    التركيز على الـ 20% الخاطئة بسبب تحليل معيب.

