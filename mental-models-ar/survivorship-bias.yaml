# Survivorship Bias
# Mental Model / Cognitive Bias - Example Entry

id: survivorship_bias
name: انحياز البقاء

quick_introduction: |
  انحياز البقاء هو الخطأ المنطقي في التركيز على الأشخاص أو الأشياء التي
  "نجت" من عملية ما مع تجاهل أولئك الذين لم ينجوا. نرى الفائزين
  وننسى الخاسرين، مما يؤدي إلى استنتاجات متفائلة للغاية حول النجاح
  والفشل.

one_liner: نرى الفائزين وننسى الخاسرين - مما يؤدي إلى استنتاجات متفائلة للغاية.

try_this:
  - Ask: من فشل في فعل شيء مشابه؟ ماذا يمكننا أن نتعلم منهم؟
  - Seek out the "invisible" sample—those who didn't survive. (ابحث عن العينة "غير المرئية" - أولئك الذين لم ينجوا.)
  - Notice when you're studying only success stories. (لاحظ عندما تدرس قصص النجاح فقط.)

ask_yourself:
  - Am I learning only from survivors? (هل أتعلم فقط من الناجين؟)
  - What would the full picture look like if I included the failures? (كيف ستبدو الصورة الكاملة إذا أدرجت الإخفاقات؟)

in_more_detail: |
  خلال الحرب العالمية الثانية، قام الإحصائي أبراهام والد بتصحيح وضع الدروع على القاذفات من خلال تحليل الأماكن التي أصيبت فيها الطائرات الناجحة - وأوصى بوضع الدروع في الأماكن التي أصيبت فيها الطائرات *غير* الناجحة، حيث أن تلك الطائرات لم تعد أبدًا. نركز بشكل طبيعي على العينة المرئية (الناجين) ونتجاهل العينة غير المرئية (أولئك الذين فشلوا).

  يشوه انحياز البقاء رؤيتنا لريادة الأعمال والاستثمار والوظائف والتاريخ. ندرس الشركات الناجحة ونتجاهل الآلاف التي فشلت في فعل أشياء مماثلة. نسمع من المحظوظين ونتجاهل غير المحظوظين.

why_this_is_important: |
  يؤدي التصحيح لانحياز البقاء إلى توقعات أكثر واقعية وقرارات أفضل. يساعدك على التعلم من الإخفاقات، وليس فقط النجاحات، وتجنب نسخ الاستراتيجيات التي نجحت فقط مع القلة المحظوظة.

when_to_use:
  - اتخاذ_القرارات
  - الاستثمار
  - الانتقال_الوظيفي
  - التعلم

how_can_you_spot_it:
  visible_success_stories: |
    نسمع من الأشخاص الناجحين أكثر بكثير من أولئك الذين حاولوا وفشلوا.
  missing_failures: |
    تستبعد العينة التي نلاحظها أولئك الذين لم "ينجحوا" وبالتالي لا يمكنهم رواية قصصهم.
  copying_survivors: |
    افتراض أن ما فعله الناجون هو سبب نجاحهم عندما قد يكون الأمر مجرد حظ أو انحياز بقاء.
  overly_optimistic_models: |
    تقديرات معدلات النجاح التي تتجاهل المقام (عدد المحاولات).

examples:
  entrepreneurship: |
    "التسرب من الجامعة مثل زوكربيرج" يتجاهل العديد من المتسربين الذين لم يؤسسوا شركات بمليارات الدولارات.
  investing: |
    دراسة الصناديق التي نجت فقط تتجاهل تلك التي أغلقت بعد أداء ضعيف، مما يضخم العوائد التاريخية.
  career_advice: |
    يعزو الأشخاص الناجحون النجاح إلى العمل الجاد؛ نحن لا نسمع من أولئك الذين عملوا بجد وفشلوا.
  historical_analysis: |
    دراسة الشركات "العظيمة" التي نجت تتجاهل العديد من الشركات التي فشلت باستراتيجيات مماثلة.

real_world_implications: |
  يضخم انحياز البقاء معدلات النجاح المتصورة، ويشوه النماذج، ويؤدي إلى تقليد سيئ. يتطلب التصحيح له البحث عن حالات الفشل وفهم المعدلات الأساسية.

professional_application:
  networking_and_relationship_building: |
    عند طلب النصيحة، ابحث أيضًا عن الأشخاص الذين حاولوا وفشلوا - غالبًا ما تكون وجهات نظرهم أكثر إفادة من وجهات نظر الناجين.
  collaborative_learning_initiative: |
    دراسة المشاريع الفاشلة والمبادرات التي تم إغلاقها، وليس فقط تلك الناجحة. إجراء "تحليلات ما بعد الفشل" للتعلم مما لم ينجح.

how_can_this_be_misapplied:
  excessive_pessimism: |
    الإفراط في التصحيح لافتراض أن النجاح دائمًا ما يكون حظًا وأن الجهد لا يهم.
  dismissing_success: |
    رفض التعلم من الأشخاص الناجحين بسبب "انحياز البقاء".
  analysis_paralysis: |
    التركيز الشديد على حالات الفشل لدرجة أنك لا تتخذ أي إجراء أبدًا.
  false_equivalence: |
    معاملة استراتيجيات الناجين وغير الناجين على أنها مفيدة بنفس القدر عندما يختلف السياق.

