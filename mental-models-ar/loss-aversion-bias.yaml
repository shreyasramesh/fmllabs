id: loss_aversion_bias
name: التحيز لتجنب الخسارة

quick_introduction: |
  التحيز لتجنب الخسارة هو الميل إلى تفضيل تجنب الخسائر على اكتساب مكاسب مكافئة.
  يشعر الناس بألم الخسارة بقوة مضاعفة تقريبًا مقارنة بمتعة المكسب.

one_liner: تبدو الخسائر مؤلمة بضعف ما تبدو عليه المكاسب المكافئة.

try_this:
  - "اسأل نفسك: هل أبالغ في تقدير ما سأخسره مقابل ما سأكتسبه؟"
  - أعد صياغة الخيار كمكاسب بدلاً من خسائر وانظر إذا تغيرت وجهة نظرك.
  - لاحظ متى يكون الخوف من الخسارة هو المحرك الرئيسي للقرار أكثر من الفائدة الحقيقية.

ask_yourself:
  - ماذا سأختار لو بدأت من الصفر؟
  - هل أتمسك بهذا الشيء بسبب ما سأخسره، أم لأن المستقبل أفضل حقًا؟

in_more_detail: |
  تم تطوير التحيز لتجنب الخسارة بواسطة دانيال كانيمان وعاموس تفيرسكي، ويصف كيف يُنظر إلى الخسائر والمكاسب بشكل غير متماثل. التأثير النفسي لخسارة 100 دولار عادة ما يكون أكبر بكثير من الرضا عن كسب 100 دولار. يؤثر هذا التحيز على القرارات في مجالات التمويل والمفاوضات والاختيارات اليومية، وغالبًا ما يؤدي إلى سلوك متحفظ تجاه المخاطر عندما تكون الخسائر المحتملة واضحة.

why_this_is_important: |
  يساعد فهم التحيز لتجنب الخسارة على التعرف على متى يكون الخوف من الخسارة هو المحرك للقرارات أكثر من التحليل العقلاني. يفسر لماذا يتمسك الناس بالاستثمارات الخاسرة، ويتجنبون التغييرات الضرورية، ويتخذون قرارات دون المستوى الأمثل في المفاوضات والقرارات المهنية.

when_to_use:
  - صنع_القرار
  - الاستثمار
  - التحركات_المهنية
  - تقييم_المخاطر

how_can_you_spot_it:
  emotional_reaction_to_losses: |
    لاحظ متى يثير احتمال خسارة شيء ما قلقًا أو مقاومة غير متناسبة مقارنة بفرصة المكسب المحتمل.
  reluctance_to_change: |
    التردد في تغيير الاستراتيجيات، أو ترك وظيفة، أو بيع أصل حتى عندما يشير التحليل الموضوعي إلى أنه الخيار الأفضل.
  framing_sensitivity: |
    تتغير القرارات بشكل كبير بناءً على ما إذا كانت الخيارات مصاغة كمكاسب أو خسائر، حتى عندما تكون النتائج متكافئة.
  overvaluing_what_you_have: |
    تأثير الوقف – تقدير الأشياء التي تمتلكها بقيمة أعلى لمجرد امتلاكها – غالبًا ما يصاحب التحيز لتجنب الخسارة.

examples:
  investing: |
    التمسك بسهم متراجع "لتجنب تحقيق الخسارة" مع تفويت فرص استثمارية أفضل في أماكن أخرى.
  career: |
    البقاء في وظيفة غير مُرضية لأن المغادرة تبدو وكأنها خسارة للأمان، حتى عندما توفر الفرصة الجديدة نموًا أكبر.
  negotiations: |
    رفض عرض عادل لأنه مصاغ على أنه "التخلي" عن شيء ما، بدلاً من "اكتساب" اتفاق.
  product_design: |
    التجارب المجانية التي تتحول إلى مدفوعة - يختبر المستخدمون "خسارة" الخدمة عندما تنتهي الفترة التجريبية، مما يحفز الاشتراك أكثر من "اكتساب" خدمة جديدة.

real_world_implications: |
  يشكل التحيز لتجنب الخسارة الأسواق والسياسات والسلوك الفردي. يفسر سبب بيع التأمين والضمانات بشكل جيد، ولماذا يتجنب الناس التغييرات المفيدة، ولماذا يكون للأخبار السلبية تأثير كبير. يمكن أن يؤدي التعرف عليه إلى تحسين جودة القرارات وتقليل القرارات المدفوعة بالندم.

professional_application:
  networking_and_relationship_building: |
    كن على دراية بأن الأشخاص قد يقاومون إنهاء العلاقات أو التعاون غير المثمر بسبب التحيز لتجنب الخسارة - فهم يخشون "فقدان" الاتصال. صغ الفرص الجديدة كمكاسب بدلاً من خسائر لتقليل المقاومة.
  collaborative_learning_initiative: |
    عند تقديم عمليات أو أدوات جديدة، ركز على ما تكتسبه الفريق بدلاً من ما "يتخلى عنه". غالبًا ما تثير مبادرات التغيير المصاغة على أنها خسارة مقاومة أقوى.

how_can_this_be_misapplied:
  manipulation: |
    استغلال التحيز لتجنب الخسارة للضغط في اتخاذ القرارات - على سبيل المثال، عروض "الوقت المحدود" أو صياغة "لا تفوت" التي تثير الخوف من الخسارة بدلاً من تقييم القيمة الحقيقية.
  misinterpreting_relationships: |
    افتراض أن مقاومة شخص ما للتغيير عقلانية بحتة عندما قد تكون مدفوعة بالتحيز لتجنب الخسارة. يمكن أن يؤدي سوء تفسير الدوافع إلى إلحاق الضرر بالثقة.
  overcommitment: |
    مغالطة التكلفة الغارقة - الاستمرار في الاستثمار في مشروع فاشل لأن "نا قد استثمرنا الكثير بالفعل" بدلاً من قطع الخسائر.
  missed_opportunities_for_conflict_resolution: |
    رفض التسوية لأن أي تنازل يبدو وكأنه خسارة، حتى عندما يكون البديل نتيجة أسوأ للجميع.
  vulnerability_to_exploitation: |
    التعرض للتلاعب من قبل الآخرين الذين يصيغون الخيارات لإثارة التحيز لتجنب الخسارة، مثل تكتيكات المبيعات التي تركز على ما "ستفقده" إذا لم تتصرف.
  reinforcing_negative_perceptions: |
    التركيز المفرط على السلبيات المحتملة يمكن أن يخلق نظرة سلبية تصبح تحقق ذاتها، وتفوت فرص النمو.

