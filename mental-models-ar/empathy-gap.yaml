# فجوة التعاطف
# النموذج العقلي / التحيز المعرفي - إدخال مثال

id: empathy_gap
name: فجوة التعاطف

quick_introduction: |
  فجوة التعاطف هي صعوبة فهم وتوقع الحالات الذهنية للآخرين عندما نكون في حالة مختلفة بأنفسنا. عندما نكون هادئين، نقلل من تقدير شعورنا عندما نكون غاضبين أو جائعين. عندما نكون شبعانين، نقلل من تقدير كم سنرغب في الطعام عندما نكون جائعين.

one_liner: نحن نقلل من تقدير شعورنا - وشعور الآخرين - في حالات مختلفة.

try_this:
  - عندما تكون هادئًا، قم بقطع التزامات لوقت التوتر؛ قم بالالتزام المسبق.
  - لا تحكم على الآخرين في حالة لست فيها - جائع، متعب، خائف.
  - اسأل: هل أنا أسقط حالتي الحالية على نفسي المستقبلية أو الآخرين؟

ask_yourself:
  - هل أقلل من تقدير شعوري في حالة مختلفة؟
  - هل سأفهم هذا الشخص بشكل أفضل لو كنت في حالته؟

in_more_detail: |
  نواجه صعوبة في تخيل كيف سنشعر في ظروف مختلفة - وكيف يشعر الآخرون عندما يكونون في حالات لسنا فيها حاليًا. الشخص الواعي يقلل من تقدير قوة الإدمان. الشخص الذي حصل على قسط كافٍ من الراحة يقلل من تقدير تأثير الحرمان من النوم. نحن نسقط حالتنا الحالية على الآخرين وعلى أنفسنا المستقبلية.

  تؤثر فجوة التعاطف على القرارات التي نتخذها لأنفسنا المستقبلية (على سبيل المثال، الالتزام بممارسة الرياضة عندما نكون متحفزين)، والقرارات التي نتخذها للآخرين، وقدرتنا على فهم الأشخاص في حالات مختلفة.

why_this_is_important: |
  الاعتراف بفجوة التعاطف يحسن اتخاذ القرار للمستقبل، والتعاطف مع الآخرين، وفهم تقلباتنا الخاصة. يفسر سبب قيامنا بالتزامات لا يمكننا الوفاء بها ولماذا نسيء فهم الآخرين في محنة.

when_to_use:
  - صنع_القرار
  - بناء_العلاقات
  - القيادة
  - حل_النزاعات

how_can_you_spot_it:
  current_state_projection: |
    افتراض أن الآخرين يشعرون بما نشعر به الآن، أو أننا في المستقبل سنشعر بما نشعر به الآن.
  underestimating_emotional_state: |
    "ما الأمر الكبير؟" عندما لا نكون في الحالة التي هم فيها.
  commitment_failures: |
    اتخاذ خيارات بناءً على الدافع الحالي لن نلتزم بها عندما يخفت الدافع.
  misunderstanding_others: |
    تجاهل تجارب الآخرين لأننا لا نستطيع تخيلها من حالتنا الحالية.

examples:
  hunger: |
    التسوق لشراء البقالة عندما تكون شبعانًا - نشتري أقل مما سنرغب فيه عندما نكون جائعين.
  addiction: |
    غير المدمنين يقللون من تقدير صعوبة الإقلاع؛ قد يقلل المدمنون في مرحلة التعافي من تقدير الرغبة الشديدة عندما يتعاطون.
  conflict: |
    عندما نكون هادئين، نقلل من تقدير كيفية رد فعلنا في لحظة المواجهة.
  motivation: |
    التسجيل في فصل الساعة 6 صباحًا عندما نكون متحفزين - وعدم الذهاب عندما نكون نعسانين.

real_world_implications: |
  تؤثر فجوة التعاطف على علاج الإدمان والسياسات والفهم بين الأشخاص. تفسر سبب قيامنا بالتزامات نكسرها ولماذا نفشل غالبًا في فهم وجهات نظر الآخرين. إنها حاجز أمام التعاطف واتخاذ قرارات جيدة.

professional_application:
  networking_and_relationship_building: |
    عندما يكون شخص ما متوترًا أو غاضبًا أو في حالة مختلفة، لا تفترض أنه سيفكر كما تفعل. حاول تخيل حالته. عند تقديم التزامات، فكر في شعورك عندما يخفت الدافع.
  collaborative_learning_initiative: |
    عند التخطيط، فكر في شعور الفريق عندما يكون متعبًا أو تحت الضغط أو محبطًا. صمم لهذه الحالات، وليس فقط لحالة التخطيط المتحفز.

how_can_this_be_misapplied:
  overattribution: |
    تجاهل كل سوء فهم على أنه "فجوة تعاطف" عندما يكون لدى الناس أحيانًا قيم مختلفة حقًا.
  excusing_behavior: |
    "لم يكن بإمكانهم المساعدة - فجوة تعاطف" عندما يكون الناس مسؤولين عن إدارة حالاتهم.
  false_relativism: |
    افتراض أننا لا نستطيع أبدًا فهم الآخرين عندما يمكننا التحسن بالجهد والخبرة.
  self_excuse: |
    استخدام فجوة التعاطف لتبرير فشلنا في المتابعة.

