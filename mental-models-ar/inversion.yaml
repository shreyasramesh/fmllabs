id: inversion
name: الانعكاس

quick_introduction: |
  الانعكاس هو تقنية لحل المشكلات تقوم بعكس السؤال رأسًا على عقب. بدلًا من
  السؤال "كيف أنجح؟" تسأل "ما الذي سيجعلني أفشل؟" وتتجنب تلك الأمور.
  إنه يكشف المخاطر والأنماط السلبية التي غالبًا ما تفوتها التفكير الأمامي.

one_liner: اعكس—اسأل ما الذي سيجعلك تفشل، ثم تجنب تلك الأمور.

try_this:
  - لأي هدف، قم بسرد الطرق الرئيسية التي قد تفشل بها—ثم تجنبها.
  - استخدم التصور السلبي: ما الذي سيجعل هذا الأمور تسير بشكل خاطئ؟
  - اسأل: ماذا سيفعل شخص ذكي لإفساد هذا؟

ask_yourself:
  - هل فكرت فيما سيجعل هذا يفشل؟
  - ما الذي لا أراه بالنظر فقط إلى الأمام؟

in_more_detail: |
  اشتهر بها تشارلي مانجر وتستند إلى المنطق الرياضي، يستغل الانعكاس
  حقيقة أن تجنب الفشل غالبًا ما يكون أسهل من السعي لتحقيق النجاح. إذا كان بإمكانك
  تحديد الطرق الرئيسية التي تسوء بها الأمور، يمكنك القضاء عليها بشكل منهجي.

  يقال أن كارل جاكوبي قال: "اعكس، دائمًا اعكس." استخدم الرواقيون التصور السلبي—
  تخيل الخسارة—لتقدير ما لديهم والاستعداد للمصائب.
  الانعكاس ليس تشاؤمًا؛ بل هو طريقة منظمة لإحراز تقدم من خلال إزالة
  العقبات.

why_this_is_important: |
  يساعدك الانعكاس على تجنب الأخطاء الكارثية، واختبار الخطط، والعثور على
  حلول غير واضحة. إنه يكمل التخطيط الأمامي من خلال ضمان عدم
  تجاهل أوضاع الفشل الحرجة.

when_to_use:
  - حل_المشكلات
  - اتخاذ_القرارات
  - تقييم_المخاطر
  - خطوات_مهنية

how_can_you_spot_it:
  premortem_thinking: |
    قبل المشروع، اسأل "لماذا فشل هذا؟" كما لو كان قد فشل بالفعل.
  anti_goals: |
    تحديد ما تريد تجنبه بوضوح كما تحدد ما تريد تحقيقه.
  reverse_engineering_failure: |
    دراسة الحالات الفاشلة لاستخلاص الدروس بدلاً من دراسة النجاحات فقط.
  constraint_focus: |
    تحديد القيود والاختناقات قبل تحسين الإيجابيات.

examples:
  investing: |
    بدلاً من "ما الذي سيجعل سعر السهم هذا يرتفع؟" اسأل "ما الذي سيجعلني أخسر المال؟"
    وتجنب تلك السيناريوهات.
  career: |
    "ما الذي سيدمر سمعتي؟" يؤدي إلى قائمة بالسلوكيات التي يجب تجنبها.
  product_launch: |
    "لماذا تفشل معظم عمليات إطلاق المنتجات؟" يكشف عن المخاطر التي يجب معالجتها قبل الإطلاق.
  health: |
    "ما هي العادات التي تقصر العمر؟" تعطي قائمة أوضح للتجنب من "ما الذي يجعلني
    صحيًا؟"

real_world_implications: |
  يستخدم الانعكاس في الهندسة (تحليل أوضاع الفشل)، والاستثمار، والاستراتيجية.
  إنه يقلل من الثقة المفرطة ويحسن إدارة المخاطر. الاعتماد المفرط يمكن أن يؤدي إلى
  الحذر المفرط.

professional_application:
  networking_and_relationship_building: |
    "ما الذي سيلحق الضرر بهذه العلاقة؟" يساعدك على تجنب السلوكيات التي تدمر الثقة.
  collaborative_learning_initiative: |
    قم بإجراء عمليات ما قبل الوفاة على المشاريع: "فشل هذا. لماذا؟" استخدم الإجابات لتحسين
    التخطيط والتنفيذ.

how_can_this_be_misapplied:
  excessive_risk_aversion: |
    التركيز فقط على تجنب الفشل يمكن أن يشل العمل ويمنع المخاطرة الضرورية.
  negativity_bias: |
    يمكن للانعكاس أن يضخم التحيز السلبي إذا لم يتم موازنته مع تحديد الفرص
    التطلعية.
  analysis_paralysis: |
    قضاء الكثير من الوقت على أوضاع الفشل لدرجة أنك لا تنفذ أبدًا.
  missing_upside: |
    الانعكاس لا يخبرك بما يجب عليك فعله—فقط بما يجب تجنبه. ما زلت بحاجة إلى
    أهداف إيجابية.

