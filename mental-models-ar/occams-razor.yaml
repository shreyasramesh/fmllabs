# Occam's Razor
# Mental Model / Cognitive Bias - Example Entry

id: occams_razor
name: نصل أوكام

quick_introduction: |
  نصل أوكام (أو شفرة أوكام) هو المبدأ القائل بأنه بين الفرضيات المتنافسة،
  يجب تفضيل الفرضية التي تتضمن أقل عدد من الافتراضات. التفسيرات الأبسط غالبًا -
  ولكن ليس دائمًا - تكون صحيحة.

one_liner: فضل أبسط تفسير يتوافق مع الأدلة.

try_this:
  - عند مقارنة النظريات، اسأل: أيها يتضمن افتراضات أقل؟
  - لا تضف تعقيدًا دون دليل يتطلب ذلك.
  - لاحظ متى تفضل تفسيرًا مفصلاً على تفسير بسيط.

ask_yourself:
  - هل أقدم تعقيدًا غير ضروري؟
  - هل تتطلب الأدلة هذا المستوى من التفسير؟

in_more_detail: |
  سمي المبدأ نسبة إلى ويليام أوف أوكام، ولا يدعي أن التفسيرات البسيطة
  صحيحة دائمًا. إنه يقترح أنه لا ينبغي تقديم تعقيد غير ضروري
  دون دليل. إذا فسرت نظريتان نفس الظواهر، فإن النظرية الأبسط
  تكون مفضلة حتى يطلب الدليل خلاف ذلك.

  نصل أوكام هو اختصار عقلي، وليس قانونًا. في بعض الأحيان يكون التفسير الصحيح
  معقدًا. ولكنه يحمي من الإفراط في الملاءمة، والتفكير المؤامراتي، والتعقيد غير الضروري.
  إنه يفضل الإيجاز في التفسير.

why_this_is_important: |
  تطبيق نصل أوكام يحسن حل المشكلات، ويقلل الإفراط في الملاءمة في النماذج،
  ويساعدك على تجنب النظريات المعقدة ولكن غير المدعومة. إنه افتراضي مفيد
  عندما تكون الأدلة غامضة.

when_to_use:
  - حل_المشكلات
  - اتخاذ_القرار
  - التعلم
  - تقييم_المخاطر

how_can_you_spot_it:
  unnecessary_complexity: |
    يقدم تفسير افتراضات كثيرة عندما يكون عدد أقل كافياً.
  conspiracy_tendencies: |
    تفسيرات معقدة ومتعددة الجهات للأحداث ذات الأسباب الأبسط.
  overfitting: |
    نموذج أو نظرية تفسر البيانات السابقة بشكل مثالي ولكنها تفشل مع البيانات الجديدة.
  elegance_in_explanation: |
    غالباً ما تبدو أفضل التفسيرات "واضحة" بأثر رجعي.

examples:
  debugging: |
    عند حدوث خطأ، تحقق من أبسط الأسباب أولاً (مثل خطأ إملائي، تهيئة خاطئة)
    قبل افتراض وجود مشكلات هيكلية.
  conspiracy_theories: |
    "الحكومة دبرت X" يتطلب العديد من الجهات الفاعلة المخفية؛ "ارتكب عدد قليل من الأشخاص
    أخطاء" هو أبسط.
  product_failure: |
    لا يتبنى المستخدمون ميزة - أبسط تفسير: إنها لا تحل مشكلتهم، وليس أنهم
    مرتبكون بسبب واجهة المستخدم.
  medical_diagnosis: |
    "الأشياء الشائعة شائعة" - ضع في اعتبارك التشخيصات المتكررة قبل النادرة.

real_world_implications: |
  يوجه نصل أوكام الاستقصاء العلمي والهندسة والتفكير اليومي.
  إنه يقلل من الجهد الضائع في النظريات الخاطئة المعقدة. عند تطبيقه بشكل خاطئ، يمكنه رفض
  الظواهر المعقدة حقًا.

professional_application:
  networking_and_relationship_building: |
    عند تفسير سلوك الآخرين، فضل التفسيرات البسيطة (إنهم مشغولون،
    لقد نسوا) قبل افتراض سوء النية أو الدوافع المعقدة.
  collaborative_learning_initiative: |
    في جلسات حل المشكلات، اسأل صراحة "ما هو أبسط تفسير؟"
    قبل بناء نماذج معقدة.

how_can_this_be_misapplied:
  oversimplification: |
    رفض التفسيرات المعقدة الصالحة لأنها "معقدة للغاية".
  status_quo_bias: |
    استخدام نصل أوكام لتفضيل التفسيرات المألوفة على التفسيرات الجديدة ولكن الصحيحة.
  scientific_rigidity: |
    رفض النظريات الجديدة لأنها أكثر تعقيدًا، حتى عندما تدعمها الأدلة.
  missing_nuance: |
    بعض المجالات (مثل السلوك البشري، النظم البيئية) معقدة بطبيعتها؛
    يمكن أن يكون البساطة مضللة.

