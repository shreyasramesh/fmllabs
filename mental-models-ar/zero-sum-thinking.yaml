id: zero_sum_thinking
name: تفكير المحصلة الصفرية

quick_introduction: |
  تفكير المحصلة الصفرية هو الاعتقاد بأن مكسب شخص ما يجب أن يكون خسارة لشخص آخر -
  وأن الموارد ثابتة وأي ميزة لك تعني عيباً بالنسبة لي.
  في الواقع، العديد من المواقف تكون ذات محصلة إيجابية: يمكن لكلا الطرفين أن يكسبا.

one_liner: مكسبك لا يجب أن يكون خسارتي - العديد من المواقف تكون ذات محصلة إيجابية.

try_this:
  - Ask: هل يمكننا توسيع الكعكة؟ هل هذا فعلاً ذو محصلة صفرية؟
  - Look for cooperation before assuming competition.: ابحث عن التعاون قبل افتراض المنافسة.
  - Notice when you're treating a situation as fixed-pie when it isn't.: لاحظ عندما تتعامل مع موقف على أنه كعكة ثابتة وهو ليس كذلك.

ask_yourself:
  - Am I assuming a fixed pie when we could expand it?: هل أفترض كعكة ثابتة بينما يمكننا توسيعها؟
  - Would cooperation create more value than competition?: هل سيخلق التعاون قيمة أكبر من المنافسة؟

in_more_detail: |
  في لعبة المحصلة الصفرية، الإجمالي ثابت - مكسبك هو خسارتي. في المواقف ذات المحصلة الإيجابية،
  يخلق التعاون قيمة. التجارة والابتكار وبناء العلاقات غالباً ما تكون ذات محصلة إيجابية. يؤدي تفكير المحصلة الصفرية إلى منافسة غير ضرورية، وفقدان فرص التعاون، وتنافس مدمر.

  هذا التحيز شائع في المفاوضات والسياسة وديناميكيات المنظمات.
  يفترض كعكة ثابتة عندما يمكن غالباً توسيع الكعكة. يمكن أن يصبح
  تحقيقاً ذاتياً: إذا عاملت الآخرين كخصوم، فإنهم يصبحون خصوماً.

why_this_is_important: |
  التعرف على تفكير المحصلة الصفرية يفتح فرصاً للتعاون و
  خلق القيمة. يحسن المفاوضات، ويقلل الصراع، ويمكّن
  نتائج مربحة للجميع. العديد من أفضل الفرص هي ذات محصلة إيجابية.

when_to_use:
  - negotiation: التفاوض
  - leadership: القيادة
  - relationship_building: بناء_العلاقات
  - decision-making: اتخاذ_القرار

how_can_you_spot_it:
  fixed_pie_assumption: |
    "إذا فازوا، خسرت" عندما يسمح الموقف لكليهما بالكسب.
  competitive_ framing: |
    تأطير المواقف تلقائياً على أنها نحن مقابل هم.
  envy_of_others_gains: |
    الاستياء من نجاح الآخرين كما لو كان يقلل من نجاحك.
  missed_cooperation: |
    الفشل في رؤية فرص التعاون التي ستفيد الجميع.

examples:
  negotiation: |
    افتراض أن صفقة أفضل للطرف الآخر تعني صفقة أسوأ لك - بينما غالباً ما توسع الحلول الإبداعية القيمة لكلا الطرفين.
  salary: |
    "إذا حصل زميلي على زيادة، فهناك أقل بالنسبة لي" بينما يمكن أن تكون الميزانيات
    مرنة أو يمكن تبرير الزيادات بالقيمة التي تم إنشاؤها.
  politics: |
    "مكاسب حزبهم هي خسائرنا" بينما يمكن أن تفيد العديد من نتائج السياسات
    مجموعات متعددة.
  career: |
    "ترقيتهم تعني فرصة أقل بالنسبة لي" بينما يمكن أن يخلق نمو المنظمة
    المزيد من الفرص للجميع.

real_world_implications: |
  يغذي تفكير المحصلة الصفرية الصراع، ويحد من التعاون، ويسبب ضياع
  الفرص. غالباً ما يكون خاطئاً في الاقتصاد والعلاقات و
  الابتكار. التحول إلى تأطير المحصلة الإيجابية يحسن النتائج.

professional_application:
  networking_and_relationship_building: |
    ابحث عن طرق لخلق قيمة للآخرين - نجاحهم يمكن أن يخلق
    فرصاً لك. ابنِ علاقات تستفيد منها كلا الطرفين.
  collaborative_learning_initiative: |
    قم بتأطير أهداف الفريق على أنها ذات محصلة إيجابية: نجاح مشترك، وتنمية الكعكة.
    شجع التعاون بدلاً من المنافسة الداخلية.

how_can_this_be_misapplied:
  ignoring_real_zero_sum: |
    بعض المواقف ذات محصلة صفرية (مثل، ترقية واحدة، ميزانية ثابتة).
    التظاهر بخلاف ذلك يمكن أن يكون ساذجاً.
  naive_cooperation: |
    افتراض أن الجميع سيتعاون عندما يكون بعض الفاعلين
    خصوماً حقيقيين.
  undervaluing_competition: |
    يمكن أن تدفع المنافسة إلى التحسين؛ ليست كل المنافسات مدمرة.
  exploitation: |
    استخدام تأطير "المحصلة الإيجابية" لاستخلاص القيمة من الآخرين الذين لا
    يستفيدون.

