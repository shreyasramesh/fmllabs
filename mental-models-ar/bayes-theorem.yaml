# Bayes Theorem
# Mental Model / Cognitive Bias - Example Entry

id: bayes_theorem
name: نظرية بايز

quick_introduction: |
  تصف نظرية بايز كيفية تحديث احتمالية فرضية ما عند
  تلقي دليل جديد. إنها تُضفي طابعًا رسميًا على فكرة أن المعتقدات يجب أن تتغير
  بما يتناسب مع مدى دعم الدليل لها—ليس بشكل كلي أو لا شيء،
  بل بشكل تدريجي.

one_liner: تحديث المعتقدات بما يتناسب مع مدى دعم الدليل لها.

try_this:
  - ابدأ باعتقادك المسبق؛ اسأل عن مدى احتمالية الدليل لو كنت مخطئًا.
  - قم بالتحديث تدريجيًا—لا تنتقل من 0% إلى 100% بناءً على نقطة بيانات واحدة.
  - ضع في اعتبارك الفرضيات البديلة: هل سيتناسب الدليل معها أيضًا؟

ask_yourself:
  - ما مدى تأثير هذا الدليل حقًا على الاحتمالية؟
  - هل أقوم بتحديث معتقداتي، أم مجرد تأكيد لما كنت أعتقده بالفعل؟

in_more_detail: |
  تنص النظرية على أن احتمالية فرضية معينة في ظل دليل معين تساوي
  الاحتمالية المسبقة مضروبة في احتمالية الدليل في ظل الفرضية،
  مقسومة على احتمالية الدليل. عمليًا: ابدأ باعتقادك المسبق،
  وانظر إلى مدى اتساق الدليل الجديد مع فرضيتك مقابل البدائل،
  وقم بالتحديث وفقًا لذلك.

  يفند التفكير البايزي تحيز التأكيد من خلال مطالبة النظر بأن تفكر
  في مدى احتمالية الدليل لو كنت مخطئًا. إنها أساس
  الاستدلال الاحتمالي والتحديث العلمي.

why_this_is_important: |
  يحسّن التفكير البايزي عملية اتخاذ القرار في ظل عدم اليقين، ويساعدك على
  تجنب الثقة المفرطة، ويوفر إطارًا للتعلم من الأدلة.
  إنه ضروري للتشخيص، والتنبؤ، وأي مجال يتضمن عدم يقين.

when_to_use:
  - اتخاذ_القرار
  - حل_المشكلات
  - تقييم_المخاطر
  - التعلم

how_can_you_spot_it:
  prior_and_update: |
    البدء باعتقاد أساسي وتعديله بناءً على دليل جديد.
  likelihood_ratio_thinking: |
    السؤال "ما مدى احتمالية هذا الدليل لو كنت على صواب مقابل خطأ؟"
  incremental_updating: |
    تتحول المعتقدات تدريجيًا مع الدليل بدلاً من التغيير المفاجئ.
  base_rate_respect: |
    الاحتمالات المسبقة (المعدلات الأساسية) مهمة، وليس فقط أحدث نقطة بيانات.

examples:
  medical_diagnosis: |
    نتيجة اختبار إيجابية لمرض نادر—الاحتمالية المسبقة (انتشار منخفض) تعني أن
    نتيجة إيجابية غالبًا ما تكون نتيجة إيجابية خاطئة. تقوم نظرية بايز بتحديث الاحتمالية.
  forecasting: |
    تحديث التوقعات مع وصول بيانات جديدة بدلاً من الالتزام بالتقديرات الأولية.
  hiring: |
    البدء بالمعدلات الأساسية لملاءمة الدور، ثم التحديث بناءً على أداء المقابلة.
  investing: |
    تحديث احتمالية نجاح شركة مع وصول معلومات جديدة (أرباح، أخبار).

real_world_implications: |
  يُشكل التفكير البايزي أساس الذكاء الاصطناعي الحديث، والتشخيص الطبي، والاستدلال العلمي.
  يصحح إهمال المعدل الأساسي وتحيز التأكيد.
  إنها أداة قوية لأي مجال يتضمن عدم يقين.

professional_application:
  networking_and_relationship_building: |
    قم بتحديث معتقداتك حول الأشخاص بناءً على دليل جديد بدلاً من
    التمسك بانطباعات أولى ثابتة. ضع في اعتبارك المعدلات الأساسية (على سبيل المثال، ما مدى شيوع
    هذا السلوك؟) عند تفسير الإجراءات.
  collaborative_learning_initiative: |
    شجع الفرق على ذكر المعتقدات المسبقة بوضوح قبل المناقشات، ثم
    التحديث عند تقديم الأدلة. يقلل من تأثير التثبيت وتحيز التأكيد.

how_can_this_be_misapplied:
  overprecision: |
    تعيين احتمالات دقيقة عندما يكون عدم اليقين مرتفعًا.
  prior_rigidity: |
    التمسك بمعتقدات مسبقة قوية وعدم التحديث بما يكفي مع الأدلة الجديدة.
  base_rate_tyranny: |
    تجاهل الأدلة القوية لأن المعدلات الأساسية تشير إلى خلاف ذلك—أحيانًا
    يجب أن تسود الأدلة.
  false_sophistication: |
    استخدام اللغة البايزية لتبدو دقيقًا دون القيام بالاستدلال الفعلي.

