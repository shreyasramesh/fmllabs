id: groupthink
name: تفكير جماعي

quick_introduction: |
  تفكير جماعي هو ميل المجموعات المتماسكة إلى إعطاء الأولوية للإجماع والوئام على التقييم النقدي. يقوم الأعضاء بقمع المعارضة، والرقابة الذاتية، والتوافق مع الرأي المتصور للمجموعة. تتجاوز الرغبة في الإجماع الرغبة في اتخاذ أفضل قرار.

one_liner: الوئام فوق الحقيقة - المجموعات تعطي الأولوية للإجماع على التقييم النقدي.

try_this:
  - تعيين محامي الشيطان؛ اجعل المعارضة متوقعة وآمنة.
  - اسأل: ما الذي لا نقوله؟ ماذا سنقول لو لم نكن في هذه المجموعة؟
  - ابحث عن وجهات نظر خارجية قبل الانتهاء من قرارات المجموعة.

ask_yourself:
  - هل أقوم بالرقابة الذاتية للحفاظ على الوئام؟
  - هل إجماعنا حقيقي أم نتيجة للضغط للموافقة؟

in_more_detail: |
  درس إيرفينغ جانس فشل السياسة الخارجية (خليج الخنازير، فيتنام) وحدد أنماطًا: وهم المناعة، والترشيد الجماعي، وضغط نحو الامتثال، والرقابة الذاتية، ووهم الإجماع، وحراس العقل الذين يحمون المجموعة من المعلومات المعارضة. يؤدي التماسك العالي والعزلة والتوتر إلى زيادة التفكير الجماعي.

  يؤدي التفكير الجماعي إلى قرارات سيئة لأن البدائل لا تؤخذ بعين الاعتبار بجدية. تُرى المعارضة على أنها خيانة. تبالغ المجموعة في تقدير صحتها وتقلل من شأن المخاطر.

why_this_is_important: |
  يساعدك التعرف على التفكير الجماعي على تهيئة الظروف لاتخاذ قرارات أفضل: تشجيع المعارضة، وجلب وجهات نظر خارجية، وتجنب الإجماع المبكر. إنه ضروري لتجنب فشل جماعي كارثي.

when_to_use:
  - القيادة
  - اتخاذ_القرارات
  - حل_المشكلات
  - حل_النزاعات

how_can_you_spot_it:
  pressure_for_consensus: |
    يتم تثبيط المعارضة أو معاقبتها؛ تتم مكافأة الاتفاق.
  illusion_of_unanimity: |
    يُفسر الصمت على أنه موافقة عندما قد يكون رقابة ذاتية.
  collective_rationalization: |
    تتجاهل المجموعة التحذيرات وتعزز رأيها.
  mindguards: |
    يحمي الأعضاء المجموعة من المعلومات التي من شأنها أن تتحدى
    الإجماع.

examples:
  bay_of_pigs: |
    قمع مستشارو كينيدي الشكوك حول خطة الغزو؛
    كانت النتيجة كارثة.
  corporate_decisions: |
    يواصل فريق قيادي عملية اندماج على الرغم من العلامات الحمراء
    لأن لا أحد يريد أن يكون المعارض.
  product_launches: |
    يقوم فريق بإطلاق منتج معيب لأن الجميع استثمروا
    في الخطة ولا يثير أحد مخاوف.
  boards: |
    تقوم مجالس الإدارة بتمرير مقترحات الإدارة لتجنب
    الإحراج.

real_world_implications: |
  يساهم التفكير الجماعي في فشل السياسات، والكوارث المؤسسية، وضياع الفرص. إنه خطير بشكل خاص في المواقف عالية المخاطر وعالية التوتر. يتطلب منعه تدخلات هيكلية متعمدة.

professional_application:
  networking_and_relationship_building: |
    وفر أمانًا نفسيًا للمعارضة. اشكر الأشخاص الذين
    يثيرون المخاوف. كن قدوة في الاختلاف دون أن تكون بغيضًا.
  collaborative_learning_initiative: |
    استخدم محامي الشيطان، وفرق اللون الأحمر، و"الاستشرافات السابقة". اطلب
    من شخص ما أن يجادل ضد الرأي السائد. جلب
    وجهات نظر خارجية. يتحدث القائد أخيرًا لتجنب التأثير.

how_can_this_be_misapplied:
  false_dissent: |
    إنشاء "معارضين مخصصين" لا يختلفون حقًا -
    المجموعة تكتشف ذلك.
  excessive_conflict: |
    تشجيع المعارضة لدرجة الصراع المدمر
    والشلل.
  dismissing_consensus: |
    افتراض أن كل إجماع هو تفكير جماعي - أحيانًا تكون المجموعة
    على حق.
  individualism: |
    المبالغة في التصحيح لدرجة أنه لا يمكن اتخاذ قرار جماعي
    ممكن.

