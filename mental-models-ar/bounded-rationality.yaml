id: bounded_rationality
name: الرشد المحدود

quick_introduction: |
  الرشد المحدود هو فكرة أن عملية اتخاذ القرار البشري محدودة بالمعلومات المتاحة، والقدرة المعرفية، والوقت. نحن لا نحسن؛ بل "نكتفي" - نختار الخيارات التي تكون جيدة بما فيه الكفاية بدلاً من الأفضل الممكن.

one_liner: نحن نكتفي - نختار الجيد بما يكفي، وليس الأمثل.

try_this:
  - قم بتبسيط الخيارات عندما يكون ذلك ممكنًا؛ فالعديد من الخيارات تطغى على الرشد المحدود.
  - حدد معايير "جيدة بما يكفي" مسبقًا لتجنب البحث اللانهائي.
  - لاحظ متى تحسن بعد النقطة التي تتناقص فيها العوائد.

ask_yourself:
  - هل أحاول العثور على الخيار المثالي عندما يكون الجيد بما يكفي كافيًا؟
  - ما هي القيود (الوقت، المعلومات، الانتباه) التي تحد من قراري؟

in_more_detail: |
  قدم هربرت سيمون المفهوم لتحدي الافتراض الاقتصادي الكلاسيكي للفاعلين العقلانيين ذوي المعلومات الكاملة. في الواقع، لدينا انتباه محدود، وذاكرة عاملة، ووقت. نحن نستخدم الاستدلالات والاختصارات لاتخاذ قرارات "عقلانية" نظرًا لقيودنا، حتى لو لم تكن مثالية بالمعنى المثالي.

  يشرح الرشد المحدود سبب عدم اختيارنا دائمًا لأفضل خيار، ولماذا نعتمد على قواعد عامة، ولماذا السياق والتأطير مهمان جدًا. إنه نموذج وصفي لكيفية اتخاذنا للقرارات فعليًا، وليس وصفة لكيف ينبغي علينا ذلك.

why_this_is_important: |
  يساعدك فهم الرشد المحدود في تصميم عمليات أفضل، وتبسيط الخيارات للآخرين، وتحديد توقعات واقعية لجودة القرارات. كما أنه يشرح سبب كون السلوك "غير العقلاني" غالبًا ما يكون عقلانيًا في ظل القيود.

when_to_use:
  - اتخاذ_القرارات
  - حل_المشكلات
  - القيادة
  - تقييم_المخاطر

how_can_you_spot_it:
  satisficing_behavior: |
    يختار الناس أول خيار مقبول بدلاً من المقارنة بشكل شامل.
  heuristic_reliance: |
    يتم اتخاذ القرارات باستخدام قواعد عامة بدلاً من التحليل الكامل.
  context_dependence: |
    يتخذ نفس الشخص قرارات مختلفة اعتمادًا على كيفية تقديم الخيارات.
  information_overload: |
    عندما تكون المعلومات المتاحة كثيرة جدًا، يمكن أن تنخفض جودة القرار.

examples:
  hiring: |
    يقوم المدير بتعيين المرشح الأول الذي يلبي المعايير بدلاً من إجراء مقابلات لا نهاية لها للعثور على المرشح "الأفضل".
  consumer_choice: |
    يختار المتسوقون من بين الخيارات القليلة الأولى على الرف بدلاً من مقارنة كل منتج في المتجر.
  policy: |
    يستخدم الناخبون الانتماء الحزبي أو عدد قليل من القضايا الرئيسية كاختصارات بدلاً من تحليل كل موقف سياسي.
  daily_routines: |
    يتبع الناس العادات والإعدادات الافتراضية بدلاً من إعادة تحسين كل قرار.

real_world_implications: |
  يشكل الرشد المحدود الأسواق، وتصميم السياسات، والسلوك التنظيمي. تعمل الدفعات وهندسة الاختيار لأنها تأخذ في الاعتبار حدودنا. تجاهلها يؤدي إلى أنظمة معقدة للغاية لا يستطيع الناس استخدامها بفعالية.

professional_application:
  networking_and_relationship_building: |
    لا تتوقع من الآخرين معالجة المفاضلات المعقدة في الوقت الفعلي. قم بتبسيط الخيارات وقدم إعدادات افتراضية واضحة.
  collaborative_learning_initiative: |
    صمم عمليات تعمل مع الرشد المحدود: قلل الخيارات، وقدم إعدادات افتراضية، واستخدم قوائم مرجعية للقرارات المعقدة.

how_can_this_be_misapplied:
  overcomplicating_decisions: |
    تصميم عمليات تفترض قدرة معرفية غير محدودة، مما يؤدي إلى إرهاق القرارات ونتائج سيئة.
  blaming_irrationality: |
    رفض خيارات الآخرين باعتبارها غير عقلانية دون مراعاة قيودهم.
  exploitation: |
    إغراق الناس بالتعقيد عن عمد لتوجيههم نحو النتائج المرجوة.
  perfectionism: |
    توقع قرارات مثالية عندما يكون الاكتفاء بالجيد بما يكفي هو النهج العقلاني غالبًا.

